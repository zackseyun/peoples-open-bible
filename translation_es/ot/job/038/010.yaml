translation:
  language: es
  text: cuando le fijé mi límite[a] y puse barras y puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando le decreté mi decreto»; el hebreo probablemente se refiere a establecer el límite del mar, no a «romper» algo literalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁבֹּר
  english_pob_choice: prescribed
  chosen_spanish: le fijaba
  alternatives_spanish:
  - prescribía
  - decretaba
  - establecía
  lexicon: HALOT
  rationale: El hebreo שׁבר normalmente significa «romper», pero en este contexto la lectura aceptada por la auditoría inglesa entiende la acción como el establecimiento de un límite para el mar. «Le fijaba» comunica esa idea de manera natural en español sin imponer un sentido literal inadecuado.
- source_word: עָלָיו
  english_pob_choice: for it
  chosen_spanish: le
  alternatives_spanish:
  - para ello
  - sobre él
  - contra él
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina singular remite al mar. En español, el dativo «le» encaja con la idea de fijar un límite a algo, y evita una construcción más pesada o literal que no suena natural en este contexto poético.
- source_word: חֻקִּי
  english_pob_choice: my limit
  chosen_spanish: su límite
  alternatives_spanish:
  - mi decreto
  - mi estatuto
  - su frontera
  lexicon: HALOT
  rationale: Aunque חֹק puede significar «decreto» o «estatuto», aquí la auditoría inglesa opta por el sentido concreto de un límite impuesto al mar. «Límite» preserva esa concreción; el posesivo se ajusta al referente del mar en el flujo poético del versículo.
- source_word: וָאָשִׂים
  english_pob_choice: set
  chosen_spanish: le ponía
  alternatives_spanish:
  - colocaba
  - establecía
  - ponía
  lexicon: HALOT
  rationale: שׂים es un verbo general de poner/colocar/establecer. «Le ponía» mantiene la sencillez y la progresión paralela de la imagen, en un español claro y fluido.
- source_word: בְּרִיחַ
  english_pob_choice: bars
  chosen_spanish: cerrojos
  alternatives_spanish:
  - barras
  - trancas
  - cerrajas
  lexicon: HALOT
  rationale: בְּרִיחַ designa una pieza de cierre, como barra o cerrojo. En español, «cerrojos» resulta idiomático y preserva la imagen de impedir el paso; se prefiere una forma singular colectiva en el flujo de la frase española, como imagen de cierre conjunto.
- source_word: וּדְלָתָיִם
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - dobles puertas
  - entradas
  lexicon: HALOT
  rationale: La forma dual sugiere un par de puertas, pero «puertas» es la traducción más natural y fiel para conservar la escena arquitectónica sin recargar el verso con explicaciones.
theological_decisions:
- issue: Imagen concreta del dominio divino sobre el mar
  english_pob_reading: Retain the concrete imagery of God setting a boundary with bars and doors.
  chosen_spanish_reading: Conservar la imagen concreta de Dios fijando un límite y cerrando con cerrojos y puertas.
  alternative_spanish_readings:
  - Reducir la imagen a una afirmación abstracta de soberanía divina.
  - Explicitar una interpretación doctrinal en lugar de mantener la metáfora.
  rationale: El texto poético presenta la soberanía de Dios mediante una imagen arquitectónica concreta. La versión española conserva esa metáfora sin desdibujarla ni convertirla en un resumen doctrinal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español. La redacción sigue la revisión inglesa más reciente al preferir «límite» sobre «frontera» y mantiene la imagen concreta de barras/puertas.
  spanish_consistency_notes:
  - Se usó «límite» para חֻקִּי en armonía con la revisión inglesa más reciente.
  - Se evitó «SEÑOR» y otras sustituciones no motivadas por el hebreo de este versículo.
  - Se mantuvo el tono poético y sobrio, con vocabulario claro para lectura eclesial amplia.
