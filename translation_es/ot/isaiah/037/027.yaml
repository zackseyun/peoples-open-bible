review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: habitantes, impotencia, desmayo/vergüenza, y la serie de comparaciones vegetales. Sin embargo, hay dos desajustes significativos. Primero, la nota [a] está anclada a «sin fuerzas», pero su contenido explica una alternativa para חַתּוּ וָבֹשׁוּ, no para קִצְרֵי יָד; además falta una nota para el modismo «cortos de mano». Segundo, «antes de la espiga» reduce לִפְנֵי קָמָה («antes del grano/mies en pie») a una etapa botánica más estrecha y menos fiel que la documentación inglesa.'
  spanish_quality_summary: El español es claro y digno en general. «Sus habitantes estaban sin fuerzas» funciona, aunque «eran impotentes» o «estaban indefensos» podría sonar menos coloquial; no es necesario cambiarlo. «Terrados» es comprensible, pero «techos» o «azoteas» sería más llano; aun así puede mantenerse por registro bíblico. «Quedaron atemorizados» es entendible, pero «quedaron consternados» o «desmoralizados» se acercaría mejor a «dismayed» sin estrecharlo a miedo. La frase final necesita ajuste para mayor fidelidad y naturalidad.
  glossary_alignment: No hay términos teológicos del glosario principal en este versículo. La decisión idiomática para קִצְרֵי יָד debe conservar la nota del hebreo «cortos de mano». La documentación inglesa también preserva la dificultad de la frase final; eso debe reflejarse sin introducir precisión excesiva como «espiga».
  issues:
  - severity: high
    issue: La nota [a] está mal anclada y mal orientada.
    rationale: En el texto, [a] aparece en «sin fuerzas», que traduce קִצְרֵי יָד; pero la nota habla de «deshechos y avergonzados», alternativa para חַתּוּ וָבֹשׁוּ. Esto rompe la trazabilidad léxica y omite la nota necesaria para el modismo hebreo.
  - severity: medium
    issue: Falta una nota para el modismo קִצְרֵי יָד.
    rationale: El POB inglés conserva explícitamente la alternativa/explicación «Hebrew 'short of hand'». El español debería conservar una nota equivalente, anclada en «sin fuerzas».
  - severity: medium
    issue: «Antes de la espiga» no refleja con suficiente precisión לִפְנֵי קָמָה.
    rationale: קָמָה es mies o grano en pie/erguido, no específicamente la espiga. «Antes de que la mies esté en pie» o «antes del grano en pie» preserva mejor el sentido documentado.
  - severity: low
    issue: La nota [b] tiene comillas y formato poco pulidos.
    rationale: 'Empieza con una comilla innecesaria y podría formularse con español más natural: «Hebreo: “hierba de los terrados/techos”...».'
  revised_spanish_text: Y sus habitantes estaban sin fuerzas[a]; quedaron consternados[b] y avergonzados. Eran como la hierba del campo y el verdor tierno, como la hierba de los terrados[c], y como un campo antes de que la mies esté en pie[d].
  revised_footnotes:
