review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Acab como sujeto, envío a todo Israel, reunión de los profetas, y destino en el monte Carmelo. Sin embargo, la preposición final אֶל indica movimiento hacia el monte, por lo que «en el monte Carmelo» debilita el sentido direccional presente en la fuente y en el POB inglés («to Mount Carmel»).'
  spanish_quality_summary: El español es claro y legible, pero «Ahab» debe ajustarse a la forma española habitual «Acab». Además, «Así que» introduce una conexión discursiva no exigida por el hebreo; «Entonces» o simplemente omitirlo sería más neutral. La frase suena más natural y fiel con «envió a todos los hijos de Israel y reunió a los profetas en el monte Carmelo» cambiando solo la preposición final a «al».
  glossary_alignment: 'No hay términos teológicos sensibles en juego. Se conserva adecuadamente «hijos de Israel» con nota alternativa «israelitas», en línea con la decisión léxica del POB. «Profetas» y «monte Carmelo» están bien. El nombre propio debe adaptarse al español bíblico estándar: «Acab».'
  issues:
  - severity: medium
    issue: La frase «en el monte Carmelo» no refleja con precisión la preposición hebrea אֶל.
    rationale: 'La fuente indica dirección o movimiento hacia un lugar: «al monte Carmelo». «En» cambia el matiz a ubicación estática.'
  - severity: medium
    issue: El nombre propio «Ahab» no está naturalizado al español.
    rationale: En español bíblico y eclesial, la forma normal es «Acab». Mantener «Ahab» reduce la legibilidad y se aparta del uso establecido.
  - severity: low
    issue: «Así que» añade un matiz conectivo no explícito en el hebreo.
    rationale: El waw consecutivo puede representarse de manera simple; «Así que» puede sonar más inferencial que narrativo. «Entonces» es más neutral o puede omitirse.
  revised_spanish_text: Entonces Acab envió a todos los hijos de Israel y reunió a los profetas al monte Carmelo[a].
  revised_footnotes:
  - marker: a
    text: O «a todos los israelitas». El hebreo dice literalmente «a todos los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrigió «Ahab» a «Acab» para adecuarlo al español bíblico natural, se reemplazó «en el monte Carmelo» por «al monte Carmelo» para reflejar mejor אֶל, y se suavizó «Así que» a «Entonces» como conector narrativo más neutral. Se conserva la nota léxica sobre «hijos de Israel».
