translation:
  language: es
  text: Pero el hombre que quede impuro y no se purifique será cortada[a] esa persona de en medio de la asamblea, porque ha contaminado el santuario de Yahvé. El agua de impureza[b] no ha sido rociada sobre él; él está impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esa alma será cortada». La fórmula legal hebrea puede referirse a la persona entera, no solo al alma inmaterial.
    reason: lexical_alternative
  - marker: b
    text: O «el agua para impureza»; tradicionalmente, «el agua de separación». La frase alude al agua de purificación preparada en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - cualquiera
  lexicon: HALOT
  rationale: El hebreo אִישׁ es masculino singular y aquí funciona de modo genérico para un individuo. «El hombre» conserva esa forma y sigue siendo natural en español bíblico actual.
- source_word: יִטְמָא
  english_pob_choice: becomes unclean
  chosen_spanish: se vuelva inmundo
  alternatives_spanish:
  - se haga inmundo
  - esté inmundo
  lexicon: HALOT
  rationale: El qal imperfecto expresa la entrada en un estado de impureza ritual. «Se vuelva inmundo» comunica bien el valor ingressivo sin forzar una lectura moral.
- source_word: יִתְחַטָּא
  english_pob_choice: purify himself
  chosen_spanish: se purifique
  alternatives_spanish:
  - se limpie
  - se cleanse
  lexicon: HALOT
  rationale: En contextos de purificación, el hitpael de חטא refiere a someterse a la purificación ritual. «Se purifique» es idiomático y respeta el sentido técnico.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person shall be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será excluido
  lexicon: HALOT
  rationale: La fórmula legal conserva la expresión idiomática de «cortar» sin definir el mecanismo del juicio. «Será cortado» mantiene la tensión jurídica y teológica del hebreo.
- source_word: מִתּוֹךְ הַקָּהָל
  english_pob_choice: from the midst of the assembly
  chosen_spanish: de en medio de la asamblea
  alternatives_spanish:
  - de entre la asamblea
  - de en medio de la congregación
  lexicon: HALOT
  rationale: «De en medio de» refleja de forma cercana la preposición hebrea y «asamblea» reproduce bien קהל como comunidad reunida.
- source_word: מִקְדַּשׁ יְהוָה
  english_pob_choice: the sanctuary of Yahweh
  chosen_spanish: el santuario de Yahvé
  alternatives_spanish:
  - la santidad de Yahvé
  - el lugar santo de Yahvé
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa el santuario o recinto sagrado. Se mantiene «Yahvé» según la convención del proyecto para el nombre divino.
- source_word: טִמֵּא
  english_pob_choice: has defiled
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha contaminado
  - ha hecho inmundo
  lexicon: HALOT
  rationale: En relación con el santuario, el piel de טמא expresa que quedó ritualmente afectado. «Ha profanado» comunica la gravedad cultual con naturalidad en español, aunque «ha hecho inmundo» queda como alternativa más literal.
- source_word: מֵי נִדָּה
  english_pob_choice: the water for impurity
  chosen_spanish: el agua para impureza
  alternatives_spanish:
  - el agua de impureza
  - el agua de separación
  - el agua para limpieza de impureza
  lexicon: HALOT
  rationale: La expresión señala el agua preparada para remover la impureza en este rito. «El agua para impureza» sigue de cerca el hebreo y evita depender de la fórmula tradicional «agua de separación».
- source_word: זֹרַק עָלָיו
  english_pob_choice: has not been sprinkled on him
  chosen_spanish: no ha sido rociada sobre él
  alternatives_spanish:
  - no le ha sido rociada
  - no ha sido asperjada sobre él
  lexicon: HALOT
  rationale: En lenguaje ritual, זרק puede referirse al rociado o aspersión de líquido. «Rociada» es claro y natural en español; «asperjada» conserva un matiz técnico más marcado.
- source_word: טָמֵא הוּא
  english_pob_choice: he is unclean
  chosen_spanish: inmundo es él
  alternatives_spanish:
  - él está inmundo
  - él es inmundo
  lexicon: HALOT
  rationale: La cláusula nominal hebrea declara el estado resultante. Se conserva el orden enfático con «inmundo es él», y se ofrece «él es inmundo» como alternativa más llana.
theological_decisions:
- issue: Alcance de la fórmula «será cortado»
  english_pob_reading: Retain the idiom 'shall be cut off' without specifying death, excommunication, or divine judgment alone.
  chosen_spanish_reading: Mantener «será cortado» sin precisar si implica muerte, exclusión o juicio divino exclusivamente.
  alternative_spanish_readings:
  - será excluido de la comunidad
  - será muerto
  rationale: La fórmula hebrea de karet no define aquí el mecanismo exacto de la sanción. Conservar el modismo preserva la gravedad legal y deja abierta la tensión interpretativa tal como en el texto fuente.
  doctrine_reference: Preservar la tensión teológica y legal sin resolverla de manera prematura.
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no hubo cambios necesarios en la auditoría inglesa, y la traducción española sigue esa decisión estable. Se mantiene la distinción entre impureza ritual y profanación del santuario, así como la fórmula legal de «ser cortado» sin especificar su ejecución.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, de acuerdo con la norma del proyecto.
  - Se conserva «asamblea» para קהל y «santuario» para מִקְדָּשׁ.
  - «Inmundo» y «purifique» mantienen el campo semántico ritual sin moralizar el pasaje.
  - Se evita «SEÑOR» como máscara del nombre divino, en consonancia con la política del proyecto.
