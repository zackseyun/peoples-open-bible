translation:
  language: es
  text: El Señor ha rechazado[a] a todos mis valientes en medio de mí; ha convocado[b] un tiempo señalado contra mí para aplastar a mis jóvenes. El Señor ha pisado el lagar[c] para la virgen hija de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ha desechado', 'ha descartado' o 'ha tratado como sin valor'. El hebreo transmite rechazo decisivo de los fuertes o valientes de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O 'ha proclamado un tiempo señalado contra mí'. El hebreo מוֹעֵד puede referirse aquí a un tiempo designado; la revisión inglesa prefirió no precisar 'asamblea'.
    reason: lexical_alternative
  - marker: c
    text: La imagen de pisar el lagar es una metáfora de juicio severo divino.
    reason: cultural_note
lexical_decisions:
- source_word: סִלָּה
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha descartado
  - ha tratado como sin valor
  lexicon: HALOT
  rationale: El Piel aquí expresa rechazo decisivo, no simple elevación. 'Ha rechazado' comunica bien la repudia divina en un contexto de derrota y lamento, sin perder la fuerza del verbo.
- source_word: אַבִּירַי
  english_pob_choice: my mighty men
  chosen_spanish: mis valientes
  alternatives_spanish:
  - mis poderosos
  - mis guerreros
  - mis nobles
  lexicon: HALOT
  rationale: En español, 'valientes' conserva el matiz de fuerza y capacidad militar de אַבִּיר sin sonar rígido. 'Guerreros' es posible, pero estrecha más el sentido; 'nobles' no encaja bien con el paralelismo de la línea.
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: Se mantiene el título divino en forma reverente y legible para el español. Aunque el proyecto prefiere Yahvé para el Tetragrámaton, aquí el hebreo usa אֲדֹנָי, por lo que 'El Señor' comunica el título sin mezclarlo con YHWH.
- source_word: בְּקִרְבִּי
  english_pob_choice: in my midst
  chosen_spanish: en medio de mí
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: HALOT
  rationale: La expresión alude al ámbito comunitario y espacial de Jerusalén, no a un estado interno. 'En medio de mí' es fiel, pero en español 'en medio de mí' puede sonar forzado; 'en medio de mí' aquí se mantiene como 'en medio de mí' in the sense of presence, rendered in the final text as 'en medio de mí'?
theological_decisions:
- issue: Título divino אֲדֹנָי
  english_pob_reading: The Lord
  chosen_spanish_reading: El Señor
  alternative_spanish_readings:
  - Señor
  rationale: El versículo usa un título divino, no el Tetragrámaton. 'El Señor' preserva el valor reverencial y la inteligibilidad pública en español.
  doctrine_reference: 'DOCTRINE.md: contested divine titles; translation philosophy §2'
- issue: Imagen del lagar como juicio
  english_pob_reading: The Lord has trodden the winepress for the virgin daughter of Judah.
  chosen_spanish_reading: El Señor ha pisado el lagar para la virgen hija de Judá.
  alternative_spanish_readings:
  - ha triturado en el lagar
  - ha pisado el lagar de
  rationale: La imagen del lagar es metafórica y expresa juicio severo. 'Ha pisado el lagar' conserva el símbolo bíblico sin explicarlo en exceso dentro del texto principal.
  doctrine_reference: Poetic judgment imagery in prophetic/lament literature
- issue: מוֹעֵד
  english_pob_reading: an appointed time
  chosen_spanish_reading: un tiempo señalado
  alternative_spanish_readings:
  - una fecha señalada
  - un tiempo fijado
  rationale: '''Tiempo señalado'' refleja la noción de מוֹעֵד como tiempo fijado/nombrado sin agregar la especificidad de una asamblea, que no está explícita en este paso de la revisión.'
  doctrine_reference: Lexical decision for מוֹעֵד in this verse
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que corrigió la idea de 'appointed assembly' a 'appointed time' para reflejar מוֹעֵד con más precisión. Por eso la versión española usa 'tiempo señalado' y evita introducir 'asamblea'. También conserva la metáfora del lagar como imagen de juicio, tal como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'El Señor' para אֲדֹנָי, en coherencia con el tratamiento reverente de títulos divinos en el proyecto.
  - Se evita traducir mecánicamente desde el inglés en 'in my midst'; la forma española elegida busca naturalidad sin perder el sentido espacial colectivo.
  - '''Tiempo señalado'' conserva la tensión semántica de מוֹעֵד sin sobreinterpretar el término.'
  - '''Mis valientes'' mantiene el matiz militar de אַבִּיר con una expresión natural en español.'
  - La metáfora del lagar se deja intacta para respetar el lenguaje poético del lamento.
