translation:
  language: es
  text: Por eso su altura se elevó sobre todos los árboles del campo, y sus ramas grandes[a] se multiplicaron, y sus ramas[b] se alargaron a causa de muchas aguas, al extenderse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo se refiere aquí al ramaje mayor o a las ramas principales, distinguiéndolas del término siguiente.
    reason: lexical_alternative
  - marker: b
    text: O «brotes». Se usa «ramas» aquí para un segundo término hebreo de ramificación; la frase final literalmente alude a su «extenderse» o «enviar» sus brotes/ramas, con el objeto implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְהָא קֹמָתוֹ
  english_pob_choice: its height rose above
  chosen_spanish: su altura se elevó
  alternatives_spanish:
  - fue alta su altura
  - su estatura creció
  lexicon: HALOT
  rationale: El hebreo usa una idea de elevación y estatura/altura. En español, «su altura se elevó» conserva la imagen de ascenso y el paralelismo con la comparación siguiente.
- source_word: מִכֹּל עֲצֵי הַשָּׂדֶה
  english_pob_choice: above all the trees of the field
  chosen_spanish: sobre todos los árboles del campo
  alternatives_spanish:
  - más que todos los árboles del campo
  - sobre todos los árboles del llano
  lexicon: HALOT
  rationale: La construcción comparativa con מִן queda bien expresada con «sobre». «Árboles del campo» mantiene el lenguaje imagístico y directo del hebreo.
- source_word: סַרְעַפֹּתָיו
  english_pob_choice: its boughs
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus ramas gruesas
  - sus boughs
  lexicon: HALOT
  rationale: El término apunta a ramaje grande o extendido. En español, «ramas» es natural y comprensible; el contexto ya distingue este término del siguiente por el flujo de la frase.
- source_word: וַתִּרְבֶּינָה
  english_pob_choice: multiplied
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - aumentaron
  - se hicieron muchas
  lexicon: HALOT
  rationale: «Multiplicaron» conserva el valor de aumento numérico o expansivo del verbo רבה sin perder el tono poético del original.
- source_word: פארת/ו
  english_pob_choice: its branches
  chosen_spanish: sus ramajes
  alternatives_spanish:
  - sus ramas
  - su fronda
  lexicon: HALOT
  rationale: Para diferenciarlo de סַרְעַפֹּתָיו, se eligió «ramajes», que sugiere la parte ramificada y la extensión vegetal. Así se mantiene la tensión léxica entre los dos miembros.
- source_word: וַתֶּאֱרַכְנָה
  english_pob_choice: grew long
  chosen_spanish: se alargaron
  alternatives_spanish:
  - se hicieron largas
  - se extendieron
  lexicon: HALOT
  rationale: El verbo ארך expresa longitud. «Se alargaron» es claro en español y conserva la idea de crecimiento lineal de las ramas.
- source_word: מִמַּיִם רַבִּים
  english_pob_choice: because of abundant waters
  chosen_spanish: a causa de muchas aguas
  alternatives_spanish:
  - por muchas aguas
  - gracias a muchas aguas
  lexicon: HALOT
  rationale: La preposición y el contexto favorecen un sentido causal. «A causa de» expresa con precisión que el crecimiento depende del suministro de agua abundante.
- source_word: בְּשַׁלְּחוֹ
  english_pob_choice: as it spread out
  chosen_spanish: al extenderse
  alternatives_spanish:
  - cuando enviaba sus brotes
  - en su extenderse
  lexicon: HALOT
  rationale: El hebreo conserva la idea de «enviar/extender» sin objeto explícito. «Al extenderse» reproduce el movimiento de expansión de modo natural en español, sin forzar un objeto implícito.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés POB, especialmente el matiz causal de מִמַּיִם רַבִּים («a causa de muchas aguas»), y mantiene la alternativa implícita de בְּשַׁלְּחוֹ con una formulación española natural («al extenderse»).
  spanish_consistency_notes:
  - Se conserva «campo» para עֲצֵי הַשָּׂדֶה, evitando sustituirlo por un término más técnico o interpretativo.
  - Se distingue léxicamente entre «ramas» y «ramajes» para reflejar la doble imagen hebrea de סַרְעַפֹּתָיו y פארת/ו.
  - La causalidad de «a causa de muchas aguas» sigue la revisión inglesa más reciente, en vez de un simple valor instrumental o locativo.
  - No se introduce «SEÑOR» ni otras convenciones de ocultamiento del nombre divino, porque este versículo no contiene el tetragrámaton.
