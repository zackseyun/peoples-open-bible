source:
  edition: WLC
  text: וְ/הוֹלַכְתִּי֩ עֲלֵי/כֶ֨ם אָדָ֜ם אֶת עַמִּ֤/י יִשְׂרָאֵל֙ וִֽ/ירֵשׁ֔וּ/ךָ וְ/הָיִ֥יתָ לָ/הֶ֖ם לְ/נַחֲלָ֑ה וְ/לֹא תוֹסִ֥ף ע֖וֹד לְ/שַׁכְּלָֽ/ם־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/036/012.yaml
  text: And I will cause people—my people Israel—to walk upon you[a], and they will possess you, and you will be their inheritance[c][b], and you will no longer bereave them.
  footnotes:
  - marker: a
    text: Or 'I will bring people upon you, my people Israel.' The Hebrew literally says 'I will cause man to walk upon you,' with 'my people Israel' explaining who is meant.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will inherit you.' The verb can mean either 'possess' or 'inherit' in land contexts.
    reason: lexical_alternative
  - marker: c
    text: Or 'make them childless' / 'deprive them of children.'
    reason: lexical_alternative
