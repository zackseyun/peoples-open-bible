  text: עָנֵ֨ה נְבֽוּכַדְנֶצַּ֜ר וְ/אָמַ֗ר בְּרִ֤יךְ אֱלָהֲ/הוֹן֙ דִּֽי שַׁדְרַ֤ךְ מֵישַׁךְ֙ וַ/עֲבֵ֣ד נְג֔וֹ דִּֽי שְׁלַ֤ח מַלְאֲכֵ/הּ֙ וְ/שֵׁיזִ֣ב לְ/עַבְד֔וֹ/הִי דִּ֥י הִתְרְחִ֖צוּ עֲל֑וֹ/הִי וּ/מִלַּ֤ת מַלְכָּ/א֙ שַׁנִּ֔יו וִ/יהַ֣בוּ גשמי/הון דִּ֠י לָֽא יִפְלְח֤וּן וְ/לָֽא יִסְגְּדוּן֙ לְ/כָל אֱלָ֔הּ לָהֵ֖ן לֵ/אלָֽהֲ/הֽוֹן־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/028.yaml
  text: Nebuchadnezzar answered and said[a], “Blessed be the God of Shadrach, Meshach, and Abed-nego, who sent his angel and delivered his servants, who trusted in him, and set aside the king’s command, and gave up their bodies[c][b], that they might not serve or worship any god except their own God.”
  footnotes:
  - marker: a
    text: Or “his messenger.” Some interpreters identify the figure more specifically, but the Aramaic term itself means either “angel” or “messenger.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “changed the king’s word,” meaning they refused or set aside the king’s command.
    reason: lexical_alternative
  - marker: c
    text: Or “bow down to.”
    reason: lexical_alternative
