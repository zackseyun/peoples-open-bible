translation:
  language: es
  text: Y se quedaban asombrados[a] de su enseñanza, porque su palabra tenía autoridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mensaje tenía autoridad» o «lo que decía tenía autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: se quedaban asombrados
  alternatives_spanish:
  - se asombraban
  - quedaban atónitos
  - se quedaban maravillados
  lexicon: BDAG
  rationale: El imperfecto griego expresa una reacción continua o reiterada. «Se quedaban asombrados» conserva ese valor aspectual y suena natural en español, sin debilitar la fuerza de la reacción.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  english_pob_choice: at his teaching
  chosen_spanish: de su enseñanza
  alternatives_spanish:
  - por su enseñanza
  - a causa de su enseñanza
  - ante su enseñanza
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo marca aquí el motivo o base del asombro. En español, «de su enseñanza» comunica con naturalidad el objeto que provocó el asombro, sin introducir una explicación extra.
- source_word: διδαχῇ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - instrucción
  - doctrina
  lexicon: BDAG
  rationale: διδαχή puede referirse al acto o al contenido de enseñar. «Enseñanza» abarca ambos matices en español y evita el tono más técnico de «doctrina».
- source_word: ἐν ἐξουσίᾳ
  english_pob_choice: with authority
  chosen_spanish: tenía autoridad
  alternatives_spanish:
  - con autoridad
  - era autoritativa
  - hablaba con autoridad
  lexicon: BDAG
  rationale: El giro describe la cualidad de la palabra de Jesús. En español, «tenía autoridad» reproduce de manera idiomática la idea de ἐν ἐξουσίᾳ y sigue la revisión inglesa que prefirió «had authority» por naturalidad.
- source_word: ὁ λόγος αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - lo que decía
  lexicon: BDAG
  rationale: λόγος puede referirse a palabra, dicho o discurso. «Su palabra» conserva la concisión del griego y el matiz directo de su habla; «su mensaje» desplazaría el foco hacia el contenido solamente.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - por cuanto
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la causa del asombro. «Porque» expresa claramente la relación causal en español contemporáneo.
theological_decisions:
- issue: La autoridad de la palabra de Jesús
  english_pob_reading: his word had authority
  chosen_spanish_reading: su palabra tenía autoridad
  alternative_spanish_readings:
  - su mensaje tenía autoridad
  - lo que decía era con autoridad
  rationale: 'La frase española mantiene la afirmación del texto sin ampliarla doctrinalmente. Preserva la tensión teológica: el versículo declara la autoridad de la palabra de Jesús, pero no explica aquí su fundamento último.'
  doctrine_reference: Preservar la afirmación textual sin resolver la base cristológica de la autoridad en este versículo.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «was with authority» a «had authority» por naturalidad idiomática. La versión española sigue esa misma decisión, usando una formulación igualmente natural («tenía autoridad») y manteniendo el registro formal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se traduce λόγος como «palabra» en coherencia con otros contextos donde el POB distingue entre palabra, mensaje y lo dicho.
  - Se evita «doctrina» para διδαχή, porque en este contexto narrativo «enseñanza» comunica mejor el evento de la sinagoga.
