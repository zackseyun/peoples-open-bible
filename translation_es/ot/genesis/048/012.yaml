translation:
  language: es
  text: Entonces José los sacó de entre las rodillas de Jacob[a], y se inclinó con el rostro a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de junto a las rodillas de Jacob». La expresión hebrea puede describir la posición cercana de los muchachos junto a Jacob durante la escena de bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: brought ... out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los llevó fuera
  lexicon: HALOT
  rationale: El verbo en causativo expresa que José los hizo salir de su posición junto a Jacob. «Los sacó» conserva la fuerza causativa de manera natural en español y sigue de cerca el valor del hebreo sin sobreexplicar el movimiento.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los dos
  lexicon: pronombre directo
  rationale: El objeto directo se refiere a Efraín y Manasés. «Los» es la forma natural en español y mantiene la referencia dual implícita del contexto.
- source_word: מֵעִם בִּרְכָּיו
  english_pob_choice: from between his knees
  chosen_spanish: de entre las rodillas de él
  alternatives_spanish:
  - de junto a sus rodillas
  - de entre sus rodillas
  lexicon: HALOT
  rationale: El hebreo describe la posición cercana de los muchachos respecto de Jacob durante la bendición. «De entre las rodillas de él» conserva el valor locativo de la expresión y deja visible la ambigüedad idiomática documentada por la nota inglesa.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: he bowed
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se inclinó reverentemente
  lexicon: HALOT
  rationale: La forma expresa reverencia mediante una inclinación/prosternación. «Se inclinó» es idiomático en español y permite que la frase siguiente complete la imagen postural.
- source_word: לְאַפָּיו
  english_pob_choice: with his face
  chosen_spanish: con el rostro
  alternatives_spanish:
  - con la cara
  - de cara
  lexicon: HALOT
  rationale: Literalmente apunta al rostro/cara. «Con el rostro» conserva dignidad estilística y se integra bien con la cláusula final.
- source_word: אָרְצָה
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - hasta el suelo
  lexicon: HALOT
  rationale: La forma direccional indica orientación hacia la tierra/suelo. «A tierra» es breve, bíblico y fiel, y junto con «con el rostro» comunica la postración.
theological_decisions:
- issue: Referente del posesivo en 'sus rodillas' / 'de él'
  english_pob_reading: Jacob's knees
  chosen_spanish_reading: las rodillas de él = las rodillas de Jacob
  alternative_spanish_readings:
  - las rodillas de José
  - sus rodillas
  rationale: El sufijo masculino singular se entiende mejor en contexto como referido a Jacob, la figura principal de la escena de bendición. El español explicita «de él» para evitar que «sus» resulte ambiguo; la nota conserva la posibilidad idiomática alternativa sin borrar la lectura contextual preferida.
  doctrine_reference: Decisión pronominal y contextual, no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue el sentido y la estructura del texto hebreo con el mismo criterio de equivalencia óptima observado en la POB inglesa; conserva la ambigüedad idiomática de מֵעִם בִּרְכָּיו mediante una nota alternativa, y evita añadir información no explicitada por el original.
  spanish_consistency_notes:
  - Se mantiene «José» y no «José el patriarca», conforme al contexto narrativo.
  - «A tierra» preserva el gesto de reverencia sin sustituirlo por una paráfrasis más libre.
  - Se usa «rostro» en vez de «cara» por registro más bíblico y uniforme en el proyecto.
