  text: Y Moisés hizo tal como Yahvé le mandó; así lo hizo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - realizó
  - actuó
  lexicon: HALOT 6213
  rationale: En este contexto de obediencia a un mandato, “hizo” expresa de manera natural la acción cumplida y conserva el paralelismo con la cláusula final “así lo hizo”.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico
  rationale: Transliteración española estándar del nombre propio.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - como
  - tal como
  - según
  lexicon: HALOT 834
  rationale: “Exactamente como” comunica con claridad la correspondencia precisa que el hebreo marca, sin perder el énfasis de conformidad total con la orden recibida.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había mandado
  - le había comandado
  lexicon: HALOT 6680
  rationale: “Mandado” es natural en español bíblico contemporáneo y mantiene la fuerza de autoridad del verbo hebreo. El pluscuamperfecto refleja bien la relación temporal con la acción de Moisés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: YHWH → Yahvé'
  rationale: Se conserva el nombre divino revelado en el texto hebreo, conforme a la pauta del proyecto, en lugar de sustituirlo por un título.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - le
  - lo
  lexicon: Pronombre de objeto con referente masculino singular
  rationale: En español, el complemento indirecto “le” resulta más natural con “mandar” (‘mandó a alguien algo’). Aunque el hebreo lleva objeto directo pronominal, el sentido idiomático en español se expresa mejor así.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - así
  - de ese modo
  - de tal manera
  lexicon: HALOT 3651
  rationale: “Así” reproduce de forma breve y precisa el valor resumptivo/enfático del hebreo.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo hizo
  - lo realizó
  lexicon: HALOT 6213
  rationale: La repetición de עשׂה al final refuerza el cumplimiento exacto; “lo hizo” mantiene esa repetición con naturalidad en español. El pronombre retoma la orden implícita.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se preserva el nombre propio divino en vez de ocultarlo tras un título, siguiendo la línea doctrinal del proyecto y la evidencia hebrea directa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: dos verbos de acción con una construcción de conformidad total. Se evitó introducir glosas innecesarias para conservar la brevedad enfática del versículo y el eco de repetición final.'
  spanish_consistency_notes:
  - Se usó “Yahvé” para יְהוָה conforme al estándar del proyecto.
  - Se prefirió “mandado” frente a “ordenado” por naturalidad bíblica en español, sin perder la fuerza de mandato.
  - La construcción “lo hizo” conserva la repetición de עָשָׂה y el cierre enfático del hebreo.
  - “Exactamente como” busca reflejar la precisión de כַּאֲשֶׁר sin sobredimensionar el texto.
