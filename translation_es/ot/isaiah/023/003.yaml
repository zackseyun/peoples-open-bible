translation:
  language: es
  text: Sobre muchas aguas era el grano de Shihor[a], la cosecha del Nilo, su renta[b]; y llegó a ser comerciante de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shihor probablemente se refiere al Nilo o a una de sus ramas; también puede entenderse como «el grano del Nilo».
    reason: lexical_alternative
  - marker: b
    text: 'O: «su producto», «sus ingresos» o «su provecho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְמַיִם רַבִּים
  english_pob_choice: On many waters
  chosen_spanish: Sobre muchas aguas
  alternatives_spanish:
  - En muchas aguas
  - Junto a muchas aguas
  lexicon: HALOT
  rationale: La preposición con מים aquí expresa un trasfondo locativo/comercial marítimo. «Sobre muchas aguas» conserva la imagen de rutas y tráfico por mar sin sonar demasiado literal o torpe en español.
- source_word: זֶרַע
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - semilla
  - cosecha
  - producto
  lexicon: HALOT
  rationale: En este contexto agrícola-comercial, זרע no apunta a «semilla» para sembrar, sino al producto agrícola. «Grano» comunica bien el valor mercantil del término y encaja con «cosecha».
- source_word: שִׁחֹר
  english_pob_choice: Shihor
  chosen_spanish: Shihor
  alternatives_spanish:
  - el Nilo
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo como nombre propio transliterado. El equivalente interpretativo «el Nilo» queda como alternativa contextual, pero el texto principal mantiene el término del original.
- source_word: קְצִיר יְאֹר
  english_pob_choice: the harvest of the Nile
  chosen_spanish: la cosecha del Nilo
  alternatives_spanish:
  - la cosecha del río
  - la cosecha del Nilo
  lexicon: HALOT
  rationale: יְאֹר en contexto egipcio remite al Nilo o a su canal principal. «Cosecha del Nilo» hace explícita la relación genitiva y suena natural en español. Se prefirió «cosecha» por la correspondencia agrícola con זרע.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: her revenue
  chosen_spanish: su renta
  alternatives_spanish:
  - su producto
  - sus ingresos
  - su provecho
  lexicon: HALOT
  rationale: La palabra puede significar producto/rendimiento, pero en la imagen comercial de Tiro el sentido económico es central. «Su renta» conserva esa idea de ganancia o ingreso derivado del comercio, sin reducirlo solo a producción agrícola.
- source_word: וַתְּהִי
  english_pob_choice: and she became
  chosen_spanish: y llegó a ser
  alternatives_spanish:
  - y fue
  - y se convirtió
  lexicon: HALOT
  rationale: El verbo marca un estado resultante. «Llegó a ser» refleja el cambio de condición mejor que una simple cópula y mantiene el sujeto femenino referido a la ciudad.
- source_word: סְחַר גּוֹיִם
  english_pob_choice: the merchant of nations
  chosen_spanish: mercader de naciones
  alternatives_spanish:
  - mercancía de naciones
  - comercio de naciones
  - mercado de naciones
  lexicon: HALOT
  rationale: סחר puede expresar comercio, tráfico mercantil o lo relacionado con un mercader. Como la revisión inglesa reciente prefirió una referencia más directa al comerciante que al lugar del comercio, «mercader de naciones» preserva ese matiz y evita volver a una lectura más espacial.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente, que desplazó «marketplace of nations» hacia «merchant of nations» para reflejar más directamente סְחַר como actividad/figura comercial. Por eso el español evita una traducción espacial y mantiene el valor de agente comercial. También preservé el paralelismo agrícola-comercial del verso: grano / cosecha / renta / mercader.'
  spanish_consistency_notes:
  - Mantuve «Yahvé» fuera de este versículo porque no aparece en el texto.
  - Conservé la alternancia de imágenes agrícolas y comerciales sin armonizarlas en exceso, para no borrar la tensión semántica del hebreo.
  - Usé tratamiento femenino singular implícito en «su» y en el verbo resultativo, coherente con la ciudad de Tiro en el contexto.
