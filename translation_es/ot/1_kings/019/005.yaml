    text: O «mensajero». El hebreo מַלְאָךְ puede referirse a un mensajero humano o a un ser angelical; aquí el contexto favorece «ángel».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea רֹתֶם designa la retama del desierto; «retama» conserva el referente vegetal del texto.
    reason: source_note
  revision_rationale: 'Se corrige la sobreinterpretación de אֶחָד eliminando «solitaria» y restituyendo el valor indefinido simple: «una retama». También se reubica el marcador de la nota léxica para que ancle correctamente «ángel», y se mantiene la nota botánica solo como apoyo secundario. El resto del versículo es fiel y natural en español.'
