lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Saul said
  chosen_spanish: Entonces Saúl dijo
  alternatives_spanish:
  - Y Saúl dijo
  - Saúl dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» reproduce ese impulso secuencial de forma natural en español sin perder el encadenamiento del relato.
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oigan
  lexicon: HALOT
  rationale: Es un imperativo directo de atención; «Escucha» conserva la fuerza exhortativa y suena más natural y digno que un calco más literal.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - te ruego
  lexicon: HALOT
  rationale: En este contexto de llamada o súplica, la POB inglesa revisada prefirió «now» por su naturalidad; en español, «ahora» conserva ese matiz pragmático de apremio o énfasis sin introducir un tono demasiado coloquial.
- source_word: בֶּן אֲחִיטוּב
  english_pob_choice: son of Ahitub
  chosen_spanish: hijo de Ahitub
  alternatives_spanish:
  - Ahitub hijo de
  - descendiente de Ahitub
  lexicon: HALOT
  rationale: Se mantiene la relación filial explícita del hebreo y el modo formal de identificación personal.
- source_word: הִנְנִי
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: La fórmula responde a una llamada con disponibilidad inmediata. «Heme aquí» es una equivalencia tradicional y clara en español bíblico, apta para registro solemne.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - señor
  lexicon: HALOT
  rationale: En este contexto humano de respeto hacia un superior, «mi señor» conserva la deferencia del hebreo mejor que «señor» solo, y evita la sobrecarga de «mi amo».
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título humano de respeto
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - señor
  rationale: No se trata del nombre divino ni de un título teológico para Dios, sino de un tratamiento honorífico dirigido a un superior humano. «Mi señor» preserva la jerarquía social y el tono reverente sin sugerir una lectura doctrinal indebida.
  doctrine_reference: Principio de distinción entre títulos humanos y divinos en traducción bíblica
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «please» por «now» para נָא en este contexto de exhortación; la versión española refleja esa decisión con «ahora», manteniendo el valor pragmático de apremio sin sobretraducirlo como ruego explícito.
  spanish_consistency_notes:
  - Se mantiene el nombre divino según la norma del proyecto cuando aparezca, pero en este versículo no se presenta.
  - «Heme aquí» se usa como fórmula bíblica estable para הִנְנִי y armoniza con el registro solemne del diálogo.
  - Se conserva «mi señor» como tratamiento deferente humano, coherente con la política terminológica del proyecto para אֲדֹנִי en este tipo de contexto.
