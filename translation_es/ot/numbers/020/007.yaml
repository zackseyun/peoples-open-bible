lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El waw consecutivo con דבר introduce una fórmula narrativa de habla. En español, «habló» conserva mejor el registro formal y la cadencia bíblica que «dijo», especialmente antes de «diciendo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La decisión base del POB es no ocultar el nombre divino. En español, «Yahvé» preserva el Tetragrámaton como nombre propio de pacto, evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario del discurso. En español, «a» es la equivalencia natural para introducir el objeto indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio estándar
  rationale: Nombre propio bíblico estándar en español, sin necesidad de variación.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula de introducción del discurso siguiente. «Diciendo» preserva la estructura hebrea y deja claro que continúa la palabra divina.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el principio doctrinal de representar el Nombre divino por transliteración y no por una sustitución como «SEÑOR». En español, «Yahvé» es la forma adoptada para conservar el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: una fórmula narrativa breve, sin variantes textuales indicadas y con consenso alto en la revisión. La única decisión relevante es la representación del Nombre divino como «Yahvé» en lugar de una sustitución reverencial.'
  spanish_consistency_notes:
  - 'Se mantiene el orden natural del español con una estructura coordinada breve: «Y Yahvé habló a Moisés, diciendo».'
  - «Diciendo» conserva el enlace sintáctico del hebreo sin añadir contenido interpretativo.
  - La nota del nombre divino usa el marcador [a] en el texto porque el English POB ya documenta una alternativa transliterada del Tetragrámaton.
