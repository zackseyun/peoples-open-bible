translation:
  language: es
  text: Cuando el hijo de Saúl oyó que Abner había muerto en Hebrón, sus manos se debilitaron[a], y todo Israel quedó alarmado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus manos se debilitaron», un modismo para perder fuerza o ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שָׁאוּל
  english_pob_choice: Saul’s son
  chosen_spanish: el hijo de Saúl
  alternatives_spanish:
  - el hijo de Saúl
  - Saúl’s son
  lexicon: HALOT
  rationale: La construcción hebrea identifica al personaje por filiación sin nombrarlo. En español, «el hijo de Saúl» conserva ese valor identificador de manera natural y fiel, sin añadir el nombre propio que el verso no da.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo oído: «que Abner había muerto». En español, «que» representa mejor esa función subordinante que «cuando» o «porque», que desplazarían el sentido.'
- source_word: מֵת
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - murió
  - estaba muerto
  lexicon: HALOT
  rationale: El perfecto hebreo señala una muerte anterior al momento de oírla; el pluscuamperfecto español expresa bien esa anterioridad narrativa.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón
  - en Hebron
  lexicon: HALOT
  rationale: La preposición locativa בְּ con nombre de lugar se vierte naturalmente como «en». Se conserva el topónimo bíblico en su forma habitual en español.
- source_word: וַיִּרְפּוּ יָדָיו
  english_pob_choice: his hands became weak
  chosen_spanish: sus manos se debilitaron
  alternatives_spanish:
  - sus manos quedaron flácidas
  - sus manos se aflojaron
  - se le debilitaron las manos
  lexicon: HALOT
  rationale: El hebreo usa una imagen corporal de debilidad o desfallecimiento. «Sus manos se debilitaron» mantiene la metáfora y es idiomático en español; evita abstraer demasiado el giro como simple cobardía.
- source_word: נִבְהָלוּ
  english_pob_choice: was alarmed
  chosen_spanish: quedó alarmado
  alternatives_spanish:
  - se alarmó
  - quedó consternado
  - se perturbó
  lexicon: HALOT
  rationale: 'El verbo transmite alarma, conmoción o sobresalto. Como sujeto colectivo, «todo Israel» puede expresarse con singular colectivo: «quedó alarmado», que suena natural en español y conserva la intensidad del estado resultante.'
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el designador colectivo nacional del hebreo. «Todo Israel» es breve, bíblico y fiel; en español funciona como sujeto colectivo singular.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo directo y el audit trail inglés. No hay revisiones aplicadas en el expediente; la versión inglesa reciente quedó sin cambios, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Hebrón» como topónimo estándar en español.
  - Se evitó introducir «Mesías» o «Cristo», ya que el verso no contiene esa terminología.
  - La imagen corporal de las manos se preservó para no borrar el modismo hebreo documentado.
  - Se usó un colectivo singular en español para «todo Israel», siguiendo el valor colectivo del hebreo.
