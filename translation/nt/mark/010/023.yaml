id: MRK.10.23
reference: Mark 10:23
source:
  edition: SBLGNT
  text: Καὶ περιβλεψάμενος ὁ Ἰησοῦς λέγει τοῖς μαθηταῖς αὐτοῦ· Πῶς δυσκόλως οἱ τὰ χρήματα ἔχοντες εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελεύσονται.
translation:
  text: And looking around[a], Jesus says to his disciples, “How difficult it is for those who have wealth to enter the kingdom of God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those who have money,” “those who possess riches.”
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  chosen: after looking around
  alternatives:
  - looking around
  - having looked around
  - glancing around
  lexicon: BDAG
  rationale: Aorist middle participle indicating a completed action prior to the main verb. 'After looking around' preserves the participial sequence in natural English and reflects Jesus surveying those around him.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: Present indicative in Mark often functions as a historical present. Rendering it as 'says' preserves Mark's vivid narrative style better than flattening it to a simple past.
- source_word: Πῶς δυσκόλως
  chosen: How difficult it will be
  alternatives:
  - How hard it is
  - With what difficulty
  - How difficultly
  lexicon: BDAG
  rationale: The combination expresses exclamatory emphasis on difficulty. English idiom prefers 'How difficult it will be' rather than the awkward adverbial 'How difficultly.' The future sense is carried forward from the finite verb εἰσελεύσονται.
- source_word: οἱ τὰ χρήματα ἔχοντες
  chosen: those who have wealth
  alternatives:
  - those who have money
  - the ones possessing riches
  - the rich
  lexicon: BDAG
  rationale: The participial phrase is more literally 'those having money/possessions.' 'Those who have wealth' is natural English and avoids reducing the phrase to a fixed social label ('the rich') while still conveying material abundance.
- source_word: χρήματα
  chosen: wealth
  alternatives:
  - money
  - possessions
  - riches
  lexicon: BDAG
  rationale: χρήματα can denote money or possessions more broadly. 'Wealth' best captures the sense in this context of material resources as a hindrance, without narrowing it to cash alone.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and transparent rendering, preserving both the concrete kingdom language and the theological continuity of Mark's usage.
- source_word: εἰσελεύσονται
  chosen: to enter
  alternatives:
  - to go into
  - to come into
  lexicon: BDAG
  rationale: The future middle verb means 'will enter.' In English, the infinitive 'to enter' after 'it will be difficult for...' naturally conveys the same sense while preserving the future orientation in the governing clause.
