translation:
  language: es
  text: 'Daniel respondió y dijo: «Estaba viendo en mi visión de noche, y he aquí, los cuatro vientos[a] del cielo agitaban el gran mar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritus». La palabra aramea puede significar tanto «vientos» como «espíritus».
    reason: alternative_reading
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - habló y dijo
  lexicon: HALOT
  rationale: La fórmula aramea narrativa introduce el discurso de manera fija. En español, «respondió y dijo» conserva ese giro formal sin exigir que hubiera una pregunta previa. «Contestó» sería posible, pero «respondió» mantiene mejor el paralelismo con el audit trail en inglés.
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I was seeing
  chosen_spanish: yo estaba viendo
  alternatives_spanish:
  - veía
  - yo veía
  - yo vi
  lexicon: HALOT
  rationale: 'El valor aspectual es durativo/imperfectivo: una acción en curso dentro de la visión. «Yo estaba viendo» expresa ese proceso de manera natural en español y sigue la corrección revisada del inglés POB, sin reducirlo al simple pretérito «vi».'
- source_word: בְּחֶזְוִי
  english_pob_choice: in my vision
  chosen_spanish: en mi visión
  alternatives_spanish:
  - en la visión que tuve
  - en mis visiones
  lexicon: HALOT
  rationale: El singular con sufijo de primera persona pide una referencia a una sola experiencia visionaria. «En mi visión» es fiel, claro y evita pluralizar indebidamente el sustantivo.
- source_word: עִם לֵילְיָא
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - en la noche
  lexicon: HALOT
  rationale: La expresión marca el marco temporal nocturno de la visión. «De noche» es la forma más natural y concisa en español, equivalente a «by night».
- source_word: וַאֲרוּ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miré
  - y he aquí que
  lexicon: HALOT
  rationale: Es un marcador discursivo de sorpresa/enfoque apocalíptico. «Y he aquí» conserva el énfasis solemne y no lo aplana a una simple coordinación.
- source_word: אַרְבַּע רוּחֵי שְׁמַיָּא
  english_pob_choice: the four winds of heaven
  chosen_spanish: los cuatro vientos del cielo
  alternatives_spanish:
  - los cuatro vientos de los cielos
  - los cuatro espíritus del cielo
  lexicon: HALOT
  rationale: En este contexto cósmico y con el mar como objeto, «vientos» es la lectura primaria. «Del cielo» refleja bien el genitivo arameo; «espíritus» queda como alternativa interpretativa preservada en la nota.
- source_word: מְגִיחָן
  english_pob_choice: were stirring up
  chosen_spanish: agitaban
  alternatives_spanish:
  - estaban agitando
  - se lanzaban sobre
  lexicon: HALOT
  rationale: El participio describe una acción eficaz sobre el mar. «Agitaban» comunica el efecto con naturalidad en español y preserva la imagen de los vientos removiendo las aguas.
- source_word: לְיַמָּא רַבָּא
  english_pob_choice: the great sea
  chosen_spanish: el gran mar
  alternatives_spanish:
  - el gran océano
  - el mar grande
  lexicon: HALOT
  rationale: La expresión es literal y idiomática. «El gran mar» mantiene la sencillez del hebreo/arameo y la resonancia apocalíptica del sintagma.
theological_decisions:
- issue: רוּחֵי en una visión apocalíptica
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  rationale: El contexto inmediato favorece la imagen de fuerzas atmosféricas que agitan el mar, por lo que la lectura principal es «vientos». Como el término admite también «espíritus» y Daniel 7 es simbólico, se conserva la tensión interpretativa en nota en lugar de resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión teológica/lexical sin cerrarla indebidamente.
translation_notes:
  revision_awareness: El inglés POB revisó su redacción de «looking» a «seeing» para reflejar más directamente חָזֵה; la versión española adopta «estaba viendo» para conservar el aspecto durativo y el registro formal. También se mantiene la nota alternativa sobre רוּחֵי, siguiendo la decisión del audit trail de no resolver la ambigüedad de manera dogmática.
  spanish_consistency_notes:
  - Se usa «Dios» / «Yahvé» solo según corresponda; aquí no aplica.
  - Se mantiene «vientos» como lectura principal y «espíritus» en nota, coherente con el tratamiento POB de רוּחַ.
  - «Mar» y «cielo» se traducen en forma simple y literaria, sin explicitar glosas interpretativas no presentes en el texto.
