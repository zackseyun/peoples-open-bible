translation:
  language: es
  text: la luna y las estrellas para gobernar la noche[a][b], pues su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la luna y las estrellas para regir la noche».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo חֶסֶד puede traducirse también «amor leal», «misericordia» o «fidelidad de pacto», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  english_pob_choice: '[object marker, not translated]'
  chosen_spanish: '[marcador de objeto, no se traduce]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: En hebreo marca el objeto directo de la secuencia anterior y no tiene equivalente natural en español; se omite sin pérdida de sentido.
- source_word: הַיָּרֵחַ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  lexicon: HALOT
  rationale: יַרֵחַ designa el astro lunar; en español ‘la luna’ es la forma natural y fiel.
- source_word: וְכוֹכָבִים
  english_pob_choice: and stars
  chosen_spanish: y las estrellas
  alternatives_spanish:
  - y estrellas
  lexicon: HALOT
  rationale: כוֹכָבִים significa ‘estrellas’. Con artículo plural, ‘las estrellas’ suena más natural en español y conserva la coordinación con ‘la luna’.
- source_word: לְמֶמְשְׁלוֹת
  english_pob_choice: to rule
  chosen_spanish: para gobernar
  alternatives_spanish:
  - para reinar
  - para ejercer dominio
  lexicon: HALOT
  rationale: El sustantivo verbal expresa función o finalidad de dominio. ‘Para gobernar’ comunica esa finalidad con naturalidad; ‘reinar’ podría sonar más personificado y ‘ejercer dominio’ más técnico.
- source_word: בַּלָּיְלָה
  english_pob_choice: over the night
  chosen_spanish: la noche
  alternatives_spanish:
  - durante la noche
  - sobre la noche
  lexicon: HALOT
  rationale: El hebreo indica la esfera nocturna del dominio. En español, la construcción ‘gobernar la noche’ evita un calco áspero y mantiene la idea de ámbito de gobierno.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del estribillo. ‘Porque’ expresa bien la causalidad en español, aunque ‘pues’ podría mantener un tono más litúrgico.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En la fórmula del salmo, la duración indefinida se expresa naturalmente con ‘para siempre’; la noción de permanencia queda reforzada por el verbo ‘permanece’.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su amor fiel
  lexicon: HALOT
  rationale: 'חֶסֶד tiene un campo semántico amplio: amor leal, bondad, misericordia, fidelidad de pacto. ‘Amor constante’ conserva la idea de durabilidad relacional sin reducir el término a una sola faceta.'
theological_decisions:
- issue: Cómo rendir חֶסֶד en el estribillo del Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor constante permanece para siempre
  alternative_spanish_readings:
  - su amor leal permanece para siempre
  - su misericordia permanece para siempre
  - su fidelidad de pacto permanece para siempre
  rationale: La fórmula del salmo subraya el carácter duradero y fiel del amor divino. ‘Amor constante’ preserva la amplitud de חֶסֶד y mantiene el registro poético y litúrgico en español. ‘Permanece para siempre’ traduce la permanencia sin perder la resonancia del refrán.
  doctrine_reference: Salmo 136; fidelidad y misericordia pactal de Yahvé
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo directamente y se ha tomado el audit trail inglés como apoyo para las decisiones léxicas y retóricas, sin copiar mecánicamente la sintaxis inglesa. La principal tensión léxica está en חֶסֶד, que en español se resuelve con una fórmula amplia y comprensible que no estrecha el término a una sola acepción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el refrán no citado aquí; la fórmula de cierre se ha adaptado al español con naturalidad.
  - 'Se prefirió un español claro y poético: «para gobernar la noche» / «permanece para siempre», evitando calcos rígidos.'
  - La opción «amor constante» conserva el valor relacional y duradero de חֶסֶד sin usar terminología eclesiástica más fija como «misericordia» en el texto principal.
