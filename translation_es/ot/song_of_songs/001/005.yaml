    rationale: 'El español puede expresar el predicado nominal sin verbo explícito en poesía: ''Morena[a] soy, pero hermosa…'' o ''Soy morena…''. Si se incluye, no conviene marcarlo con corchetes en el texto final.'
  - severity: low
