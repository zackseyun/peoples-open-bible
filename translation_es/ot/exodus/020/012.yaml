translation:
  language: es
  text: Honra a tu padre y a tu madre[a][b], para que se prolonguen tus días en la tierra[c] que Yahvé tu Dios te da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Honra» traduce el imperativo hebreo con la fuerza de dar peso y valor a los padres, no solo mostrarles cortesía.
    reason: lexical_alternative
  - marker: b
    text: «Se prolonguen tus días» conserva el modismo hebreo para una vida larga; no es una afirmación sobre la extensión literal de cada día.
    reason: cultural_note
  - marker: c
    text: El hebreo dice literalmente «sobre la tierra»; en español también podría traducirse así, pero «en la tierra» expresa con más naturalidad el sentido contextual de la tierra que Dios da.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבֵּד
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Da honor a
  - Respeta
  lexicon: HALOT
  rationale: El imperativo piel de כבד pide tratar a los padres como dignos de peso y honor. «Honra» conserva el mandato ético y el registro solemne mejor que «respeta», que en español puede sonar más débil.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu progenitor
  - tu padre varón
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del sustantivo con sufijo de segunda persona masculina singular. Mantiene el paralelismo con «tu madre».
- source_word: אִמֶּךָ
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - tu progenitora
  - tu madre biológica
  lexicon: HALOT
  rationale: Traducción directa y idiomática del sustantivo con sufijo de segunda persona masculina singular, en paralelo con «tu padre».
- source_word: יַאֲרִכ֣וּן יָמֶ֔י/ךָ
  english_pob_choice: may be long / your days
  chosen_spanish: se prolonguen tus días
  alternatives_spanish:
  - sean largos tus días
  - se alarguen tus días
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de duración de vida. «Se prolonguen tus días» mantiene la imagen y la fuerza idiomática sin sonar forzado en español.
- source_word: עַ֚ל הָ/אֲדָמָ֔ה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: La preposición עַל es literalmente «sobre/upon». En español, «sobre la tierra» reproduce ese valor más de cerca que «en la tierra», aunque el referente sea la tierra/country de la promesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la transliteración del nombre divino según la convención del proyecto en español: «Yahvé», en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶי/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Traducción estándar del constructo con sufijo de segunda persona masculina singular. Preserva la relación de pacto entre Dios e Israel.
- source_word: נֹתֵ֥ן
  english_pob_choice: is giving
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está dando ahora
  lexicon: HALOT
  rationale: Aunque el participio puede reflejar aspecto durativo o inminente, en español «te da» transmite con naturalidad la acción divina en curso/promesa sin sobrecargar el texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. En la línea del proyecto, se preserva el nombre propio divino en español como «Yahvé», evitando la sustitución por un título como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל הָאֲדָמָה
  english_pob_reading: on the land
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - en la tierra
  - en la región
  rationale: En el contexto del Decálogo, la referencia es la tierra dada por Dios a Israel. «Sobre la tierra» conserva el matiz preposicional de עַל sin perder inteligibilidad en español.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source-text plain sense'
- issue: Modismo de duración de vida en יַאֲרִכוּן יָמֶיךָ
  english_pob_reading: your days may be long
  chosen_spanish_reading: se prolonguen tus días
  alternative_spanish_readings:
  - sean largos tus días
  - vivan largos años
  rationale: Se preserva el carácter idiomático hebreo de ‘días largos’ como fórmula de vida prolongada, sin convertirlo en una paráfrasis explicativa que diluya la forma del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve idiom when intelligible'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo directo y la lectura auditada del POB inglés. No introduce cambios de sentido respecto al pasaje fuente; solo adapta el orden y la idiomaticidad al español, preservando el nombre divino Yahvé, el valor imperativo de כבד, el modismo de ‘días largos’ y la preposición עַל con nota de alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «tus días» para reflejar el plural hebreo y el modismo de longevidad.
  - «Tierra» se entiende en sentido covenantal/contextual, no como ‘suelo’ físico.
  - La puntuación y el orden responden al español moderno sin abandonar la cercanía al hebreo.
