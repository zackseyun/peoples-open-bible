lexical_decisions:
- source_word: ηὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: los bendijo
  alternatives_spanish:
  - les dio su bendición
  - los bendijo con una bendición
  lexicon: LSJ
  rationale: El verbo εὐλογέω en este contexto expresa el acto de impartir una bendición. En español, «bendijo» conserva con claridad el valor verbal y la solemnidad del pasaje sin volverlo más explicativo de lo que permite el griego.
- source_word: προσετέθη
  english_pob_choice: was gathered
  chosen_spanish: fue reunido
  alternatives_spanish:
  - fue añadido
  - fue juntado
  lexicon: LSJ
  rationale: El pasivo de προστίθημι significa literalmente «ser añadido», pero en la fórmula de muerte bíblica la idea idiomática de ser reunido con los antepasados es más natural en español. «Fue reunido» mantiene visible el movimiento pasivo del texto y conserva el sentido idiomático sin ocultar la tensión léxica.
- source_word: πρὸς τοὺς πατέρας αὐτοῦ
  english_pob_choice: to his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - a sus padres
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: LSJ
  rationale: La expresión griega es un modismo de muerte que alude a reunirse con los antepasados. En español, «con sus padres» reproduce de cerca la imagen heredada por el texto y es idiomático dentro de un registro bíblico; «antepasados» explicita más el sentido, pero reduce la cercanía formal al original.
theological_decisions:
- issue: Fórmula de muerte προσετέθη πρὸς τοὺς πατέρας αὐτοῦ
  english_pob_reading: was gathered to his fathers
  chosen_spanish_reading: fue reunido con sus padres
  alternative_spanish_readings:
  - fue añadido a sus padres
  - fue reunido con sus antepasados
  - murió
  rationale: La frase conserva el modismo bíblico sin resolverlo por una paráfrasis desnuda. «Fue reunido» mantiene la forma pasiva y la resonancia tradicional de la expresión, mientras que «con sus padres» deja visible el lenguaje heredado. Se evita «murió» porque elimina la imagen figurada del texto.
  doctrine_reference: Preservar la tensión idiomática y el lenguaje bíblico heredado, sin sobreexplicar la antropología de la muerte.
translation_notes:
  revision_awareness: El auditorio en inglés mostró una revisión desde «was added to his fathers» hacia «was gathered to his fathers» por naturalidad formal. La redacción española sigue esa misma dirección idiomática, pero conserva la cercanía al griego con «fue reunido con sus padres», manteniendo visible el modismo de muerte.
  spanish_consistency_notes:
  - Se usa «bendijo» como verbo principal para εὐλόγησεν, en coherencia con el valor bendicional del contexto.
  - Se evita «SEÑOR» o términos de sustitución, porque el versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - La fórmula de muerte se mantiene en registro bíblico y no se reduce a una simple equivalencia narrativa.
  - El posesivo plural «sus padres» sigue la forma heredada del griego y la tradición bíblica del modismo.
