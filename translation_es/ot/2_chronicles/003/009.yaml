translation:
  language: es
  text: Y el peso de los clavos era de cincuenta siclos de oro, y revistió los aposentos altos[a] con oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cámaras altas»; el término hebreo puede referirse de manera más general a estructuras o habitaciones superiores del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁקָל
  english_pob_choice: And the weight
  chosen_spanish: Y el peso
  alternatives_spanish:
  - Y el peso era
  - Ahora bien, el peso
  lexicon: HALOT
  rationale: מִשְׁקָל significa 'peso' o 'lo pesado'. En español, 'Y el peso' reproduce con naturalidad el sustantivo y la coordinación inicial, sin añadir más explicación de la que el hebreo y el inglés auditado requieren.
- source_word: לְמִסְמְרוֹת
  english_pob_choice: of the nails
  chosen_spanish: de los clavos
  alternatives_spanish:
  - para los clavos
  - de las estacas
  lexicon: HALOT
  rationale: מִסְמְרוֹת puede designar clavos o estacas. En el contexto del templo, 'clavos' es la opción más directa y común en español; 'estacas' sería posible, pero más amplia y menos precisa aquí.
- source_word: לִשְׁקָלִים חֲמִשִּׁים
  english_pob_choice: was fifty shekels
  chosen_spanish: era de cincuenta siclos
  alternatives_spanish:
  - equivalía a cincuenta siclos
  - ascendía a cincuenta siclos
  lexicon: HALOT
  rationale: La construcción expresa la medida/peso resultante. En español, 'era de cincuenta siclos' conserva la fuerza cuantitativa sin forzar una paráfrasis explicativa. 'Siclos' mantiene la unidad de peso monetaria/ponderal del texto fuente.
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - de oro
  lexicon: HALOT
  rationale: זָהָב denota el material. 'De oro' es la forma más natural y fiel en español; no se requiere intensificar con 'fino' porque el texto no lo especifica.
- source_word: וְהָעֲלִיּוֹת
  english_pob_choice: the upper rooms
  chosen_spanish: los aposentos altos
  alternatives_spanish:
  - las habitaciones altas
  - los cuartos altos
  - los pisos altos
  lexicon: HALOT
  rationale: עֲלִיּוֹת puede referirse a 'upper rooms/chambers' y el audit trail inglés conserva la ambigüedad arquitectónica. 'Aposentos altos' suena natural en español bíblico contemporáneo y mantiene la referencia a estructuras superiores sin cerrar indebidamente el sentido.
- source_word: חִפָּה
  english_pob_choice: he overlaid
  chosen_spanish: cubrió
  alternatives_spanish:
  - revestió
  - cubrió con
  lexicon: HALOT
  rationale: חפה en contexto arquitectónico puede significar cubrir u overlay. En español, 'cubrió' conserva el acto de recubrimiento sin imponer un tecnicismo que el texto fuente no obliga a precisar aquí.
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: con oro
  alternatives_spanish:
  - de oro
  - en oro
  lexicon: HALOT
  rationale: Con חפה, el complemento natural en español es 'con oro', que expresa claramente el material de cobertura y evita ambigüedad sintáctica.
translation_notes:
  revision_awareness: El inglés POB mantiene la lectura de 'upper rooms' y añade una nota sobre la posibilidad de 'upper chambers' o estructuras superiores. La versión española conserva esa ambigüedad con 'aposentos altos' y refleja fielmente la medida 'cincuenta siclos de oro' como unidad ponderal/material.
  spanish_consistency_notes:
  - Se conserva el estilo bíblico sobrio y moderno, sin recurrir a 'SEÑOR' ni a terminología eclesiástica ajena al hebreo del verso.
  - '''Oro'' y ''siclos'' se mantienen consistentes con el valor material/ponderal del original.'
  - No se introduce una traducción más técnica como 'revestió' porque el auditorio textual en español puede entender 'cubrió' con suficiente precisión en este contexto.
  - La nota al pie se ancla en 'aposentos altos' para reflejar la alternativa lexical preservada por el POB en inglés.
