translation:
  language: es
  text: Y los hijos de Israel hicieron en secreto cosas que no estaban bien contra Yahvé su Dios[a], y se construyeron lugares altos[b] en todas sus ciudades, desde la torre de vigilancia[c] hasta la ciudad fortificada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «encubrieron asuntos que no estaban bien acerca de Yahvé su Dios». El verbo hebreo es raro y puede llevar la idea de encubrir o actuar en secreto.'
    reason: lexical_alternative
  - marker: b
    text: «Lugares altos» traduce el término cultual tradicional para sitios de culto locales, con frecuencia asociados al culto no autorizado.
    reason: cultural_note
  - marker: c
    text: «Desde la torre de vigilancia» hasta «la ciudad fortificada» es una manera de decir que fue por toda la tierra, desde el puesto más pequeño o expuesto hasta la ciudad más defendida.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְחַפְּאוּ
  english_pob_choice: secretly did
  chosen_spanish: hicieron en secreto
  alternatives_spanish:
  - encubrieron
  - hicieron ocultamente
  - procedieron en secreto
  lexicon: HALOT
  rationale: El verbo es raro y en contexto expresa actuación oculta o encubierta. En español, ‘hicieron en secreto’ conserva tanto la clandestinidad como el carácter de acción concreta sin forzar un sentido más específico que el hebreo no exige.
- source_word: דְּבָרִים אֲשֶׁר לֹא כֵן
  english_pob_choice: things that were not right
  chosen_spanish: cosas que no eran rectas
  alternatives_spanish:
  - cosas que no eran así
  - cosas que no estaban bien
  - cosas impropias
  lexicon: HALOT
  rationale: La expresión es idiomática; ‘no eran rectas’ mantiene el juicio moral del texto con un español natural y relativamente cercano al valor literal de la frase.
- source_word: עַל יְהוָה אֱלֹהֵיהֶם
  english_pob_choice: against Yahweh their God
  chosen_spanish: contra Yahvé su Dios
  alternatives_spanish:
  - respecto de Yahvé su Dios
  - acerca de Yahvé su Dios
  - frente a Yahvé su Dios
  lexicon: HALOT
  rationale: Aquí עַל tiene fuerza adversativa por el contexto de infidelidad y prácticas ilícitas. Se mantiene ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide ‘Yahvé’ como forma principal en español para el nombre divino, evitando el reemplazo por una convención de ocultamiento.
- source_word: וַיִּבְנוּ לָהֶם בָּמוֹת
  english_pob_choice: they built for themselves high places
  chosen_spanish: se edificaron lugares altos
  alternatives_spanish:
  - se construyeron lugares altos
  - edificaron para sí lugares altos
  - levantaron para sí lugares altos
  lexicon: HALOT
  rationale: ‘Lugares altos’ conserva el término cultual tradicional y auditable; ‘se edificaron’ refleja el dativo reflexivo/benefactivo לָהֶם con naturalidad en español.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - santuarios en las alturas
  - altos lugares
  - santuarios altos
  lexicon: HALOT
  rationale: El término designa sitios de culto no autorizados. ‘Lugares altos’ preserva la designación técnica bíblica sin perder inteligibilidad en español.
- source_word: בְּכָל עָרֵיהֶם
  english_pob_choice: in all their cities
  chosen_spanish: en todas sus ciudades
  alternatives_spanish:
  - en cada una de sus ciudades
  - por todas sus ciudades
  - en toda clase de sus ciudades
  lexicon: HALOT
  rationale: Es una frase locativa directa; ‘ciudades’ reproduce el sustantivo hebreo y mantiene el alcance distributivo.
- source_word: מִמִּגְדַּל נוֹצְרִים
  english_pob_choice: from watchtower
  chosen_spanish: desde la torre de vigilancia
  alternatives_spanish:
  - desde la torre de los guardas
  - desde la atalaya
  - desde la torre de guardia
  lexicon: HALOT
  rationale: La imagen forma parte de un merismo. ‘Torre de vigilancia’ expresa naturalmente el participio de ‘vigilar/guardar’ sin perder el sentido de un puesto de observación.
- source_word: עַד עִיר מִבְצָר
  english_pob_choice: to fortified city
  chosen_spanish: hasta la ciudad fortificada
  alternatives_spanish:
  - hasta una ciudad fortificada
  - hasta la ciudad amurallada
  - hasta la ciudad fuerte
  lexicon: HALOT
  rationale: Completa el merismo desde el puesto más pequeño hasta la urbe más defendida. ‘Ciudad fortificada’ es la equivalencia más natural y fiel para עִיר מִבְצָר.
theological_decisions:
- issue: Fuerza moral y de pacto de las acciones ocultas
  english_pob_reading: The verse describes covert acts of covenant unfaithfulness done against the LORD, not merely private or inward thoughts.
  chosen_spanish_reading: El versículo describe acciones concretas hechas en secreto, con carácter de infidelidad de pacto contra Yahvé, no solo pensamientos internos o una mera reserva privada.
  alternative_spanish_readings:
  - El versículo podría leerse solo como ocultamiento de asuntos verbales.
  - El versículo enfatiza más la clandestinidad que la rebelión.
  rationale: La secuencia hebrea une un verbo raro de ocultamiento con un objeto concreto (‘cosas’) y luego con la construcción de lugares de culto ilícitos. Por eso la traducción conserva tanto la clandestinidad como la oposición a Yahvé, sin añadir más contenido del que el texto afirma.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal del nombre divino, conforme al estándar del proyecto.
  - ‘Lugares altos’ conserva la terminología cultual tradicional sin sustituirla por una paráfrasis.
  - Se preserva el matiz de ocultamiento del verbo con una construcción española natural y auditable.
  - El merismo geográfico queda explícito mediante una nota para facilitar la lectura sin perder literalidad.
