review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del griego y preserva la personificación difícil del lecho y el juego con «engaño / fue engañado». También mantiene correctamente «esclavos» para δούλους y «tronos» para θρόνους. Sin embargo, «entregaste ... para la matanza» suena menos idiomático que el valor de ἔδωκας ... εἰς φόνον, y la preposición «sobre sus tronos» con «golpeaste» resulta poco natural en español para ἐπὶ θρόνους αὐτῶν.
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un pequeño ajuste de naturalidad y precisión idiomática. «Los diste a la matanza» expresa mejor el giro griego que «entregaste ... para la matanza», y «en sus tronos» funciona mejor con «golpeaste» que «sobre sus tronos». El resto del registro es adecuado para un español eclesial moderno.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: δοῦλος -> «esclavos» está bien; ἄρχοντας/δυνάσταις como «gobernantes» es aceptable en ambos casos; no hay conflictos con nombres divinos o títulos mesiánicos. Se conserva el tono elevado con «lecho».'
  issues:
  - severity: medium
    issue: «entregaste a sus gobernantes para la matanza» es menos natural y menos fiel al giro verbal
    rationale: ἔδωκας ... εἰς φόνον se refleja mejor en español con «diste/entregaste ... a la matanza» que con «para la matanza», que suena teleológico en vez de resultativo.
  - severity: medium
    issue: «sobre sus tronos» con «golpeaste» suena forzado
    rationale: El griego ἐπὶ θρόνους αὐτῶν preserva la imagen de los poderosos en sus tronos; en español, «en sus tronos» mantiene esa imagen con mayor naturalidad sin perder literalidad.
  - severity: low
    issue: La nota al pie sobre «gobernantes» es válida pero no necesaria
    rationale: No hay problema con mantenerla, pero el término principal ya es suficientemente claro. Puede conservarse como alternativa léxica menor.
  revised_spanish_text: Por tanto, diste a sus gobernantes[a] a la matanza, y su lecho, que se avergonzó de su engaño, fue engañado hasta la sangre; y golpeaste a esclavos contra gobernantes, y a gobernantes en sus tronos.
  revised_footnotes:
  - marker: a
    text: O «jefes». El griego ἄρχοντας es un término amplio de autoridad política; se traduce aquí con «gobernantes» para mantener un registro claro y neutral.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes menores: «diste ... a la matanza» para reflejar mejor el giro ἔδωκας ... εἰς φόνον en español natural, y «en sus tronos» para que la última cláusula sea idiomática sin perder la imagen del original. Se mantuvo la cláusula difícil del lecho personificado tal como la documenta el POB inglés.'
