    issue: Marcador de nota al pie anclado en la frase equivocada
    rationale: La nota [a] explica el hebreo «el día de la luna nueva», pero en el texto español está colocada después de «los seis días de trabajo». Esto rompe la correspondencia exigida entre ancla y contenido de la nota.
  - severity: low
    issue: Mayúscula innecesaria tras dos puntos en estilo de cita indirecta
    rationale: Después de «Así dice el Señor Yahvé:» no comienza cita directa entrecomillada, sino la continuación del enunciado. En español es más natural mantener «la puerta...» en minúscula, como ya está; solo se conserva en la revisión por consistencia. No es un problema sustantivo, pero se confirma el estilo correcto.
