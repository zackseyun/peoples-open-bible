translation:
  language: es
  text: Cuando Roboam llegó a Jerusalén, reunió a toda la casa de Judá y a la tribu de Benjamín, ciento ochenta mil guerreros escogidos[a], para pelear contra la casa de Israel, para restaurar el reino a Roboam, hijo de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciento ochenta mil hombres de guerra escogidos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ / ויבאו
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: Con Jerusalén como destino, el verbo de movimiento se expresa de manera natural en español como 'llegó a Jerusalén'. Aunque la forma consonántica presenta una irregularidad respecto del sujeto, el contexto identifica a Roboam como sujeto singular, y la traducción conserva ese sentido narrativo.
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hifil de קהל indica hacer que otros se congreguen. 'Reunió' comunica bien la acción causal sin sonar forzado en español.
- source_word: כָּל בֵּית יְהוּדָה
  english_pob_choice: all the house of Judah
  chosen_spanish: toda la casa de Judá
  alternatives_spanish:
  - todo Judá
  - toda la casa de Judá
  lexicon: HALOT
  rationale: Se conserva el giro político-colectivo 'casa de Judá', en paralelo con 'casa de Israel' más adelante, en vez de simplificarlo solo como 'Judá'.
- source_word: שֵׁבֶט בִּנְיָמִן
  english_pob_choice: the tribe of Benjamin
  chosen_spanish: la tribu de Benjamín
  alternatives_spanish:
  - Benjamín
  lexicon: HALOT
  rationale: שֵׁבֶט nombra explícitamente la tribu; por eso se mantiene el referente tribal y no se reduce al nombre propio.
- source_word: מֵאָה וּשְׁמֹנִים אֶלֶף
  english_pob_choice: one hundred eighty thousand
  chosen_spanish: ciento ochenta mil
  alternatives_spanish:
  - ciento y ochenta mil
  lexicon: HALOT
  rationale: Número cardinal estándar en español moderno, equivalente directo del hebreo y del inglés auditado.
- source_word: בָּחוּר
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - seleccionados
  - jóvenes
  lexicon: HALOT
  rationale: En contexto militar, בָּחוּר no describe solo edad sino calidad o selección para combate. 'Escogidos' conserva esa fuerza selectiva.
- source_word: עֹשֵׂה מִלְחָמָה
  english_pob_choice: warriors
  chosen_spanish: guerreros
  alternatives_spanish:
  - hombres de guerra
  - combatientes
  lexicon: HALOT
  rationale: La expresión literal 'hacer guerra' se vierte con un sustantivo natural que mantiene el sentido militar. 'Guerreros' funciona bien en español bíblico contemporáneo.
- source_word: לְהִלָּחֵם עִם
  english_pob_choice: to fight against
  chosen_spanish: para pelear contra
  alternatives_spanish:
  - para combatir contra
  - para guerrear contra
  lexicon: HALOT
  rationale: El contexto es hostil, así que se explicita la oposición con 'contra'. 'Pelear' es un verbo claro y directo en español actual.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la casa de Israel
  lexicon: HALOT
  rationale: Se conserva el mismo idiomatismo político que en 'casa de Judá', importante para el contraste del reino dividido.
- source_word: לְהָשִׁיב אֶת הַמְּלוּכָה
  english_pob_choice: to restore the kingdom
  chosen_spanish: para devolver el reino
  alternatives_spanish:
  - para restaurar el reino
  - para devolver la realeza
  lexicon: HALOT
  rationale: שׁוב en hifil expresa 'hacer volver' o 'devolver'. 'Devolver el reino' preserva el matiz concreto del intento político de revertir la división; 'reino' sigue la decisión del POB inglés, aunque 'realeza' podría reflejar el matiz de מְלוּכָה.
- source_word: לִרְחַבְעָם בֶּן שְׁלֹמֹה
  english_pob_choice: to Rehoboam son of Solomon
  chosen_spanish: a Roboam, hijo de Salomón
  alternatives_spanish:
  - para Roboam, hijo de Salomón
  lexicon: HALOT
  rationale: El dativo/beneficiario del hebreo se expresa naturalmente en español con 'a' en este contexto de restitución dirigida a Roboam. Se mantiene la filiación explícita.
theological_decisions:
- issue: 'מְלוּכָה: ''kingdom'' versus ''kingship/royal rule'''
  english_pob_reading: restore the kingdom
  chosen_spanish_reading: devolver el reino
  alternative_spanish_readings:
  - restaurar el reino
  - devolver la realeza
  - devolver el gobierno real
  rationale: El versículo describe un objetivo político concreto tras la división del reino. 'Reino' sigue el POB inglés y su lectura contextual, aunque 'realeza' o 'gobierno real' podrían captar mejor el matiz abstracto de מְלוּכָה.
  doctrine_reference: 1 Reyes 12:21; cf. la división del reino en 1 Reyes 12:16-20
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvieron los paralelos ''casa de Judá / casa de Israel'', se respetó el valor militar de בָּחוּר y עֹשֵׂה מִלְחָמָה, y se optó por una formulación española natural para el movimiento y la finalidad política del versículo. No hubo revisiones textuales en el paquete inglés, por lo que la redacción se alinea con la lectura estable más reciente.'
  spanish_consistency_notes:
  - Se usa 'casa de Judá' y 'casa de Israel' de manera paralela para conservar la estructura política del hebreo.
  - '''Roboam'' es la forma castellana habitual; se mantiene la referencia completa ''hijo de Salomón'' para la filiación.'
  - '''Guerreros escogidos'' comunica el matiz selectivo de בָּחוּר sin perder naturalidad en español.'
  - '''Devolver el reino'' preserva la intención de restauración política del hebreo y del inglés auditado.'
