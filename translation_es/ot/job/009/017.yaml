translation:
  language: es
  text: que me aplasta en una tormenta[a] y multiplica mis heridas sin causa[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una tormenta» o «en la tempestad». La preposición hebrea puede expresar modo o instrumento.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede traducirse «me magulla» o, menos probable aquí, «me acomete».
    reason: lexical_alternative
  - marker: c
    text: O «por ningún motivo» o «gratuitamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el que
  - quien
  lexicon: HALOT
  rationale: En este contexto, el hebreo introduce una oración relativa que retoma al sujeto implícito del contexto previo. En español, «que» es la forma más natural y sobria para una relativa explicativa en poesía, sin añadir énfasis innecesario.
- source_word: בִּשְׂעָרָה
  english_pob_choice: in a storm
  chosen_spanish: en la tempestad
  alternatives_spanish:
  - en una tormenta
  - con una tempestad
  - con una tormenta
  lexicon: HALOT
  rationale: El sustantivo puede significar tormenta, tempestad o torbellino, y la preposición ב admite matiz locativo o instrumental. «En la tempestad» conserva la imagen poética y reproduce bien el valor de marco/situación del hebreo, sin forzar la idea de instrumento.
- source_word: יְשׁוּפֵנִי
  english_pob_choice: crushes me
  chosen_spanish: me aplasta
  alternatives_spanish:
  - me machaca
  - me golpea
  - me hiere
  lexicon: HALOT
  rationale: El verbo es raro y su sentido aquí es debatido, pero el contexto de heridas multiplicadas exige una acción de daño intenso. «Me aplasta» comunica una agresión fuerte y poética, cercana al forcejeo físico que el inglés auditado expresa con «crushes me».
- source_word: וְהִרְבָּה
  english_pob_choice: and multiplies
  chosen_spanish: y multiplica
  alternatives_spanish:
  - y aumenta
  - y hace muchas
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer aumentar o volver numeroso. «Multiplica» es una equivalencia natural en español para el efecto acumulativo sobre «mis heridas».
- source_word: פְצָעַי
  english_pob_choice: my wounds
  chosen_spanish: mis heridas
  alternatives_spanish:
  - mis llagas
  - mis golpes
  - mis laceraciones
  lexicon: HALOT
  rationale: פצע designa herida o lesión. «Heridas» es la opción más directa y clara en español contemporáneo, sin perder el registro poético.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin razón
  - gratuitamente
  - de balde
  lexicon: HALOT
  rationale: חִנָּם puede significar gratuitamente, sin causa, por nada. «Sin causa» mantiene el peso moral y judicial de la queja de Job, y evita suavizar la protesta o resolver la tensión teológica del texto.
theological_decisions:
- issue: El alcance de חִנָּם en la queja de Job
  english_pob_reading: without cause
  chosen_spanish_reading: sin causa
  alternative_spanish_readings:
  - sin razón
  - gratuitamente
  - de balde
  rationale: La frase debe quedar como protesta de sufrimiento inmerecido, no como una conclusión doctrinal cerrada sobre la justicia divina. «Sin causa» conserva la tensión del libro y permite que la afirmación siga siendo la voz de Job, no una resolución del narrador.
  doctrine_reference: Preservar la tensión teológica de Job sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y el aparato auditado en inglés. Se ha conservado la tensión de חִנָּם sin reinterpretarla, y se ha mantenido la imaginería de סערה con una equivalencia española natural. No se detectaron revisiones posteriores en el expediente; el último pase indica que no hubo cambios.
  spanish_consistency_notes:
  - Se usa «tempestad» para reforzar el matiz poético de בִּשְׂעָרָה, manteniendo coherencia con el campo semántico de tormenta/torbellino.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino; la referencia depende del contexto, no de una sustitución textual aquí.
  - «Sin causa» se mantiene como fórmula de acusación de Job, sin convertirla en afirmación dogmática sobre culpabilidad o inocencia absoluta.
