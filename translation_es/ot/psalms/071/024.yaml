revisions:
- from: También mi lengua hablará de tu justicia[a] todo el día, porque han sido avergonzados los que buscan mi mal; han quedado deshonrados.
  to: También mi lengua hablará de tu rectitud[a] todo el día, porque han sido avergonzados los que buscan mi mal; han quedado deshonrados.
  rationale: Se corrige únicamente la decisión principal para צִדְקָתֶךָ a «tu rectitud» para seguir la lectura principal auditada («your righteousness») y dejar «tu justicia» como alternativa en nota, preservando mejor la amplitud semántica y teológica documentada. El resto del versículo puede mantenerse porque representa fielmente el hebreo y es buen español.
