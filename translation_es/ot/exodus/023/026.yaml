translation:
  language: es
  text: No habrá en tu tierra ninguna mujer que sufra un aborto espontáneo[a] ni ninguna estéril; yo llenaré[b] el número de tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «privada de hijos». El término hebreo puede referirse más ampliamente a quedar sin hijos; aquí, por el paralelo con «estéril», probablemente se refiere de manera más específica a sufrir un aborto espontáneo o a la pérdida de la criatura.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «llenaré el número de tus días», es decir, llevaré tu vida a su medida plena.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תִהְיֶה
  english_pob_choice: There shall be none
  chosen_spanish: No habrá
  alternatives_spanish:
  - No existirá
  - No se encontrará
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de manera natural en español con «No habrá», manteniendo el sentido de ausencia dentro del ámbito del pacto sin sonar forzado.
- source_word: מְשַׁכֵּלָה
  english_pob_choice: one miscarrying
  chosen_spanish: mujer que aborte
  alternatives_spanish:
  - mujer que pierde a su hijo
  - mujer que tiene un aborto
  lexicon: HALOT
  rationale: El contexto lo vincula con la bendición de fertilidad y el paralelo con «estéril». «Mujer que aborte» conserva la fuerza participial y la idea de pérdida de descendencia sin expandir innecesariamente el texto.
- source_word: עֲקָרָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barren
  - infértil
  lexicon: HALOT
  rationale: «Estéril» es un equivalente claro y bíblicamente comprensible en español para la mujer incapaz de concebir o dar a luz.
- source_word: בְּאַרְצֶךָ
  english_pob_choice: in your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu país
  - en tu tierra prometida
  lexicon: HALOT
  rationale: «Tierra» mantiene el valor covenantal de אֶרֶץ mejor que «país», y encaja con el contexto de la promesa dada a Israel.
- source_word: אֶת מִסְפַּר יָמֶיךָ
  english_pob_choice: the number of your days
  chosen_spanish: el número de tus días
  alternatives_spanish:
  - la medida de tus días
  - tu número de días
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de plenitud temporal sin sustituirla por una paráfrasis como «tu vida», que debilitaría la metáfora.
- source_word: אֲמַלֵּא
  english_pob_choice: I will fulfill
  chosen_spanish: completaré
  alternatives_spanish:
  - llenaré
  - cumpliré
  lexicon: HALOT
  rationale: El verbo מלא conserva en español la idea de llenar hasta la medida plena. «Completaré» comunica bien esa plenitud temporal y evita sonar demasiado interpretativo.
theological_decisions:
- issue: Alcance de la promesa de fertilidad y longevidad
  english_pob_reading: The verse promises covenant blessing in the land, including freedom from miscarriage and barrenness and a full lifespan, without specifying the mechanism or making a universal timeless guarantee detached from the covenant context.
  chosen_spanish_reading: La promesa se entiende como bendición del pacto en la tierra, con ausencia de aborto/miscarriage y esterilidad, y con una vida llevada a su plenitud, sin convertirla en una garantía universal desligada del contexto.
  alternative_spanish_readings:
  - Una promesa universal de que ninguna persona creyente tendrá aborto, esterilidad ni muerte prematura.
  rationale: El hebreo y el contexto del pacto favorecen una lectura situada en Israel y en la tierra prometida. La traducción evita absolutizar el alcance del enunciado más allá de lo que el texto afirma.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó formulaciones menos naturales por «There shall be none...» y «I will fulfill...». En español se adoptó una solución igualmente natural y fiel, manteniendo el paralelismo entre la promesa de fertilidad y la plenitud de los días.
  spanish_consistency_notes:
  - Se prefirió «tierra» para אֶרֶץ por su valor bíblico-covenantal.
  - Se mantuvo la imagen de «el número de tus días» para no desdibujar la metáfora de plenitud temporal.
  - Se usó «estéril» como equivalente bíblico transparente y «mujer que aborte» para conservar el matiz participial de מְשַׁכֵּלָה.
