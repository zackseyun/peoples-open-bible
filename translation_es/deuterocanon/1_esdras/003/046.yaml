    text: O «marchar», «hacer una expedición», o en sentido más amplio «hacer la guerra» para el griego ἐξοδεύειν.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐξοδεύειν a «ir de campaña» para evitar la ambigüedad moderna de «hacer campaña» y mantener el matiz militar/expedicionario. Se cambia κλέπτειν de «robar» a «hurtar» para distinguirlo mejor de λῃστεύειν («saquear»). También se aligera la coordinación en español con una sintaxis más natural y «ríos» sin artículo.
