translation:
  language: es
  text: Él los bendijo[a], y se multiplicaron mucho; y no permitió que disminuyera su ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su ganado no disminuyó». El verbo hebreo es singular y puede entenderse como continuación del sujeto divino («no permitió que disminuyera») o como una cláusula de resultado en español más fluido.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְבָרֲכֵם
  english_pob_choice: He blessed them
  chosen_spanish: Él los bendijo
  alternatives_spanish:
  - Y los bendijo
  lexicon: HALOT
  rationale: ברך en piel con sufijo de 3ª plural expresa impartir bendición; en el contexto del salmo, el sujeto singular continúa siendo Dios. «Bendijo» conserva la acción divina directa sin introducir matices eclesiásticos ajenos al hebreo.
- source_word: וַיִּרְבּוּ
  english_pob_choice: they multiplied
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - aumentaron
  - se hicieron muchos
  lexicon: HALOT
  rationale: רבה aquí es intransitivo y plural, indicando incremento numérico. «Se multiplicaron» reproduce bien la fuerza del verbo y mantiene la conexión con la bendición previa.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muchísimo
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica el grado de aumento. «Grandemente» es una equivalencia natural y sobria en español bíblico contemporáneo.
- source_word: וּבְהֶמְתָּם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su ganado
  lexicon: HALOT
  rationale: בְּהֵמָה es un colectivo de animales domesticados y de propiedad. «Ganado» es natural en español bíblico y comunica la idea de bienes ganaderos sin restringir indebidamente a bovinos; el posesivo se ajusta al flujo español con referente plural previo.
- source_word: לֹא יַמְעִיט
  english_pob_choice: he did not let their livestock decrease
  chosen_spanish: no permitió que disminuyera
  alternatives_spanish:
  - no hizo que menguara
  - no disminuyó
  lexicon: HALOT
  rationale: 'מעט en hiphil es causativo: hacer/permitir que algo se reduzca. En español, «no permitió que disminuyera» conserva la continuidad del sujeto divino y el matiz causativo/protector del hebreo mejor que un simple intransitivo.'
theological_decisions:
- issue: Continuidad del sujeto en la cláusula final
  english_pob_reading: 'The subject remains God: ''he did not let their livestock decrease.'''
  chosen_spanish_reading: 'El sujeto sigue siendo Dios: «no permitió que disminuyera su ganado».'
  alternative_spanish_readings:
  - «su ganado no disminuyó»
  - «no hizo que disminuyera su ganado»
  rationale: El verbo hebreo es singular y, por el paralelismo inmediato, lo más natural es continuar con el mismo sujeto de la primera cláusula. Mantener a Dios como agente preserva el énfasis del salmo en la provisión divina, sin cerrar indebidamente la posibilidad sintáctica que el inglés POB anotó.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve documented syntactic/theological tension.'
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el aparato auditado en inglés. No hubo revisiones aplicadas en la fuente inglesa; la lectura final se mantuvo estable, y la única tensión relevante es la del sujeto singular en la última cláusula, conservada en español con nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; aquí el verso no lo contiene, por lo que el sujeto explícito permanece en tercera persona («Él»).
  - Se evitó «SEÑOR» por convención de máscara; el texto habla de Dios por continuidad contextual.
  - «Ganado» se prefirió por ser más natural que «bestias» y más amplio que «cattle», sin perder el valor colectivo de בְּהֵמָה.
  - La nota [a] se ancla en la cláusula final porque allí está la verdadera ambigüedad sintáctica y teológica.
