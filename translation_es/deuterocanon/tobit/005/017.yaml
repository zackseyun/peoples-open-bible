translation:
  language: es
  text: 'Estuvieron de acuerdo. Entonces dijo a Tobías: «Prepárate para el camino, y que tu viaje sea próspero[a]». Así su hijo preparó lo necesario para el viaje. Luego su padre le dijo: «Ve con el hombre, y que Dios, que habita en el cielo, haga prosperar el camino de ustedes, y que su ángel vaya con ustedes[b]». Entonces ambos salieron para partir, y el perro del muchacho iba con ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que tu camino sea próspero». El griego expresa un deseo de éxito en el trayecto.
    reason: lexical_alternative
  - marker: b
    text: «Ángel» también puede significar «mensajero», pero en Tobit el sentido celestial es el más probable.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐδόκησαν
  english_pob_choice: They agreed
  chosen_spanish: Ellos estuvieron de acuerdo
  alternatives_spanish:
  - Ellos aprobaron
  - Les pareció bien
  lexicon: LSJ
  rationale: El griego expresa aquí consentimiento respecto del plan propuesto. «Estuvieron de acuerdo» comunica la idea de decisión compartida mejor que una mera reacción afectiva como «aprobaron» o «les pareció bien».
- source_word: Ἔτοιμος γίνου
  english_pob_choice: Get ready
  chosen_spanish: Prepárate
  alternatives_spanish:
  - Estate listo
  - Hazte listo
  lexicon: LSJ
  rationale: Es un imperativo de preparación para la partida. «Prepárate» es natural en español y conserva la fuerza del mandato.
- source_word: πρὸς τὴν ὁδόν
  english_pob_choice: for the journey
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - para la travesía
  lexicon: LSJ
  rationale: Aquí ὁδός se refiere al desplazamiento concreto. «Camino» conserva la imagen del griego, mientras que «viaje» explicita el sentido narrativo; se eligió «camino» por su cercanía semántica y su naturalidad bíblica en español.
- source_word: εὐοδωθεῖητε
  english_pob_choice: may your journey be prosperous
  chosen_spanish: que tu viaje sea próspero
  alternatives_spanish:
  - que tu camino prospere
  - que tengas un viaje próspero
  lexicon: LSJ
  rationale: El optativo expresa un deseo de buen éxito en el trayecto. «Que tu viaje sea próspero» refleja la bendición sin perder el matiz de prosperidad/suceso favorable del verbo εὐοδόω.
- source_word: τὰ πρὸς τὴν ὁδόν
  english_pob_choice: what was needed for the journey
  chosen_spanish: lo necesario para el camino
  alternatives_spanish:
  - las provisiones para el viaje
  - las cosas para el camino
  lexicon: LSJ
  rationale: La frase alude a los preparativos o suministros para partir. «Lo necesario para el camino» mantiene la ambigüedad del original sin especificar más de lo que el texto dice.
- source_word: ὁ ἐν τῷ οὐρανῷ οἰκῶν θεός
  english_pob_choice: God, who dwells in heaven
  chosen_spanish: Dios, que habita en el cielo
  alternatives_spanish:
  - el Dios que habita en el cielo
  - Dios que vive en el cielo
  lexicon: LSJ
  rationale: La construcción participial se vierte como relativa en español para mayor claridad. «Habita en el cielo» conserva el tono reverente y la formulación descriptiva del texto griego.
- source_word: εὐοδώσει τὴν ὁδὸν ὑμῶν
  english_pob_choice: make your journey prosper
  chosen_spanish: haga prosperar tu camino
  alternatives_spanish:
  - prosperará tu camino
  - conceda éxito a tu camino
  lexicon: LSJ
  rationale: El griego usa un futuro con sentido de bendición sobre el camino. «Haga prosperar tu camino» reproduce bien el valor desiderativo y el idioma bíblico del éxito en el viaje.
- source_word: ὁ ἄγγελος αὐτοῦ συμπορευθήτω ὑμῖν
  english_pob_choice: may his angel go with you
  chosen_spanish: que su ángel vaya contigo
  alternatives_spanish:
  - que su mensajero vaya contigo
  - que su ángel te acompañe
  lexicon: LSJ
  rationale: En Tobit, ἄγγελος se entiende mejor como ser celestial, no solo como mensajero. «Ángel» preserva ese sentido narrativo y teológico; «vaya contigo» expresa bien συμπορευθήτω.
- source_word: ἐξῆλθαν ἀμφότεροι ἀπελθεῖν
  english_pob_choice: both went out to depart
  chosen_spanish: ambos salieron para partir
  alternatives_spanish:
  - ambos salieron a irse
  - salieron los dos
  lexicon: LSJ
  rationale: La redundancia griega de salir para irse se conserva de manera sobria. «Salieron para partir» mantiene el movimiento narrativo sin resultar forzado.
- source_word: ὁ κύων τοῦ παιδαρίου
  english_pob_choice: the boy’s dog
  chosen_spanish: el perro del muchacho
  alternatives_spanish:
  - el perro del niño
  - el perro del joven
  lexicon: LSJ
  rationale: παιδάριον es un diminutivo que señala a Tobías como muchacho. «Muchacho» es más cercano al matiz del griego que «niño» y evita una imagen demasiado infantil.
theological_decisions:
- issue: Referencia de ἄγγελος
  english_pob_reading: his angel
  chosen_spanish_reading: su ángel
  alternative_spanish_readings:
  - su mensajero
  rationale: Dentro del relato de Tobit, la figura es un agente celestial de guía y protección. «Ángel» sigue la lectura del POB inglés y la evidencia narrativa, sin convertirla en una afirmación doctrinal adicional.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido de la fuente y mantener la tensión solo donde la ambigüedad sea real.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma en cuenta la revisión inglesa más reciente, que prefirió una formulación más cercana al griego para εὐοδωθεῖητε («may your journey be prosperous»). En español se eligió una equivalencia formal-optima: «que tu viaje sea próspero», manteniendo el matiz desiderativo y el registro elevado. También se conservó la secuencia narrativa de preparativos, bendición, salida y la mención del perro, sin añadir elementos ajenos al texto.'
  spanish_consistency_notes:
  - Se empleó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el pasaje dice θεός, por lo que corresponde «Dios».
  - Se mantuvo «ángel» en lugar de «mensajero» por coherencia con la lectura narrativa de Tobit.
  - «Camino» se usó para ὁδός por su valor bíblico y porque en este contexto no se trata de una vía física aislada sino del desplazamiento completo.
