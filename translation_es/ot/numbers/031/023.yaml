translation:
  language: es
  text: Todo objeto que pueda pasar por el fuego, lo pasarán por el fuego, y quedará limpio; solo debe ser purificado con el agua para impureza[a]. Pero todo lo que no pueda pasar por el fuego, lo pasarán por el agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "con el agua de impureza"; tradicionalmente, "con el agua de separación" (cf. Números 19).'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל דָּבָר
  english_pob_choice: Everything
  chosen_spanish: Todo objeto
  alternatives_spanish:
  - Todo
  - Cada cosa
  - Todo artículo
  lexicon: HALOT
  rationale: En este contexto militar y ritual, דָּבָר se refiere a cada objeto tomado como botín. 'Todo objeto' conserva mejor la referencia concreta y distributiva que un abstracto 'todo'.
- source_word: אֲשֶׁר יָבֹא בָאֵשׁ
  english_pob_choice: that can go through the fire
  chosen_spanish: que pueda pasar por el fuego
  alternatives_spanish:
  - que pasa por el fuego
  - que puede soportar el fuego
  lexicon: HALOT
  rationale: La idea no es solo que el objeto entre de hecho al fuego, sino que sea apto para ese tratamiento ritual. 'Pueda pasar por el fuego' preserva esa aptitud.
- source_word: תַּעֲבִירוּ בָאֵשׁ
  english_pob_choice: you shall pass through the fire
  chosen_spanish: lo pasarán por el fuego
  alternatives_spanish:
  - lo harán pasar por el fuego
  - lo pondrán por el fuego
  lexicon: HALOT
  rationale: El hifil de עבר expresa hacer pasar algo por el fuego. En español, 'lo pasarán por el fuego' mantiene la acción ritual y el paralelo verbal con la segunda mitad del versículo.
- source_word: וְטָהֵר
  english_pob_choice: and it shall be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y será limpio
  - y quedará purificado
  lexicon: HALOT
  rationale: 'Se conserva el resultado del tratamiento con fuego: el objeto queda en estado limpio. ''Quedará limpio'' es natural en español y evita hacer de la frase una purificación moral.'
- source_word: בְּמֵי נִדָּה
  english_pob_choice: with the water for impurity
  chosen_spanish: con el agua para impureza
  alternatives_spanish:
  - con el agua de impureza
  - con el agua de separación
  - con el agua para purificación de la impureza
  lexicon: HALOT
  rationale: La construcción hebrea apunta al agua ritual asociada con la impureza, no necesariamente a la fórmula tradicional fija. 'Para impureza' conserva la relación semántica sin imponer una tradición posterior en el texto principal.
- source_word: יִתְחַטָּא
  english_pob_choice: it must be purified
  chosen_spanish: debe ser purificado
  alternatives_spanish:
  - debe purificarse
  - debe ser limpiado
  lexicon: HALOT
  rationale: En contexto sacerdotal, el hitpael de חטא se refiere a purificación ritual, no a perdón moral. 'Debe ser purificado' expresa bien la obligatoriedad y el matiz ceremonial.
- source_word: וְכֹל אֲשֶׁר לֹא יָבֹא בָּאֵשׁ
  english_pob_choice: But everything that cannot go through the fire
  chosen_spanish: Pero todo lo que no pueda pasar por el fuego
  alternatives_spanish:
  - Y todo lo que no pase por el fuego
  - Pero todo lo que no pueda entrar en el fuego
  lexicon: HALOT
  rationale: El contraste es entre objetos aptos y no aptos para el fuego. 'No pueda pasar por el fuego' reproduce el criterio práctico y mantiene la simetría con la primera cláusula.
- source_word: תַּעֲבִ֥ירוּ בַמָּיִם
  english_pob_choice: you shall pass through the water
  chosen_spanish: lo pasarán por el agua
  alternatives_spanish:
  - lo lavarán con agua
  - lo harán pasar por el agua
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'pasar por el fuego'. Aunque 'lavar' sería más idiomático, 'pasar por el agua' mantiene mejor la correspondencia verbal y ritual del hebreo.
theological_decisions:
- issue: Purificación ritual versus limpieza moral
  english_pob_reading: Render the verse in terms of ritual purity/impurity rather than moral cleansing.
  chosen_spanish_reading: Traducirlo en términos de limpieza y purificación ritual, no moral.
  alternative_spanish_readings:
  - Usar solo 'limpio' sin aclaración ritual
  - Traducir חטא como perdón del pecado
  rationale: En Números 31 y en la legislación vinculada de Números 19, el asunto es la purificación ceremonial de objetos. Por eso se mantiene 'limpio' y 'purificado' sin introducir perdón de pecados ni categorías morales que el texto no exige.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que normalizó 'Every thing' a 'Everything' y no cambió el sentido. La versión española adopta una formulación natural equivalente ('Todo objeto') sin perder el matiz distributivo ni el paralelo ritual del versículo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal 'pasar por el fuego' / 'pasar por el agua'.
  - Se evitó 'SEÑOR' porque el texto aquí no contiene el Tetragrámaton.
  - '''Limpio'' y ''purificado'' se usan en sentido ceremonial, no moral.'
  - '''Agua para impureza'' preserva la ambigüedad léxica documentada en el audit trail.'
