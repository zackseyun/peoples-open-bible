translation:
  language: es
  text: 'Así dice Yahvé[a], su Redentor, el Santo de Israel: Por causa de ustedes he enviado a Babilonia y los he hecho bajar a todos como fugitivos, aun a los caldeos[b], en las naves de su regocijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y haré bajar a todos ellos como barras’; la palabra hebrea traducida ‘fugitivos’ es difícil y también se ha entendido como ‘barras’ o, menos probablemente, ‘nobles’.
    reason: lexical_alternative
  - marker: b
    text: O ‘he enviado contra Babilonia’. El hebreo dice literalmente ‘he enviado a Babilonia’, dejando implícito el objeto.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según la práctica del POB en español. ‘Yahvé’ evita la máscara litúrgica y sigue el paralelismo con el audit trail inglés que lee el Tetragrámaton directamente.
- source_word: גֹּאַלְכֶם
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - el que te redime
  - tu pariente redentor
  lexicon: HALOT
  rationale: ‘Redentor’ es la forma más natural y solemne en español para este título de rescate del pacto. Mantiene la fuerza teológica sin volverlo perifrástico.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo que es de Israel
  lexicon: HALOT
  rationale: Se mantiene el título isaiano fijo y reverente con la forma tradicional y transparente en español.
- source_word: לְמַעַנְכֶם
  english_pob_choice: For your sake
  chosen_spanish: Por causa de ustedes
  alternatives_spanish:
  - por ustedes
  - en favor de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea indica propósito/beneficio. ‘Por causa de ustedes’ conserva el valor benefactivo de manera natural en español contemporáneo.
- source_word: שִׁלַּחְתִּי בָבֶלָה
  english_pob_choice: I have sent to Babylon
  chosen_spanish: he enviado a Babilonia
  alternatives_spanish:
  - he enviado contra Babilonia
  - he mandado a Babilonia
  lexicon: HALOT
  rationale: Se preserva el destino explícito ‘a Babilonia’ y el objeto implícito del verbo, como en el texto hebreo y en el audit trail inglés. ‘Contra Babilonia’ queda como posibilidad interpretativa, pero no se impone en el texto principal.
- source_word: וְהוֹרַדְתִּי
  english_pob_choice: and brought them all down
  chosen_spanish: y los he hecho bajar a todos
  alternatives_spanish:
  - y los he derribado a todos
  - y los he hecho descender a todos
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar descenso. ‘Hacer bajar’ mantiene la imagen verbal sin sobrecargarla con derrota explícita que el contexto sí sugiere pero no obliga a expresar de forma más fuerte.
- source_word: בָרִיחִים
  english_pob_choice: as fugitives
  chosen_spanish: como fugitivos
  alternatives_spanish:
  - como barras
  - como nobles
  - como huidizos
  lexicon: HALOT
  rationale: Se sigue la lectura contextual del POB inglés. ‘Como fugitivos’ da sentido fluido en español y conserva la tensión lexical conocida; no se oculta la alternativa principal.
- source_word: כֻּלָּם
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - todos
  lexicon: HALOT
  rationale: El cuantificador totalizador se integra naturalmente con el clítico acusativo en español, manteniendo el alcance completo del descenso.
- source_word: וְכַשְׂדִּים
  english_pob_choice: even the Chaldeans
  chosen_spanish: aun a los caldeos
  alternatives_spanish:
  - y a los caldeos
  - incluso a los caldeos
  lexicon: HALOT
  rationale: ‘Aun’ reproduce el matiz enfático/apositivo del inglés POB (‘even’) y del hebreo coordinado en contexto de inclusión irónica.
- source_word: בָּאֳנִיּוֹת
  english_pob_choice: in the ships
  chosen_spanish: en las naves
  alternatives_spanish:
  - en los barcos
  - a bordo de las naves
  lexicon: HALOT
  rationale: ‘Naves’ es más amplio y literario que ‘barcos’ y encaja con el registro elevado del pasaje profético.
- source_word: רִנָּתָם
  english_pob_choice: of their rejoicing
  chosen_spanish: de su regocijo
  alternatives_spanish:
  - de su alegría
  - de su júbilo
  - de su canto de alegría
  lexicon: HALOT
  rationale: Se mantiene el sustantivo de alegría/júbilo, con un tono más literario que ‘alegría’ y suficientemente cercano al sentido de רנה como grito celebrativo. ‘De su regocijo’ preserva la ironía del cierre.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El POB inglés lo transparenta como Yahweh; en español, ‘Yahvé’ es la equivalencia adoptada para preservar el nombre revelado sin sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Término difícil בָרִיחִים
  english_pob_reading: as fugitives
  chosen_spanish_reading: como fugitivos
  alternative_spanish_readings:
  - como barras
  - como nobles
  rationale: Se mantiene la lectura contextual principal, pero sin borrar la ambigüedad lexical documentada. El texto principal sigue la solución de sentido adoptada por el POB inglés y la nota deja abierta la alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological/interpretive tension where ambiguity is genuine
translation_notes:
  revision_awareness: La comparación con el último pase y el resumen de revisión muestra acuerdo alto y sin cambios necesarios; esta redacción sigue de cerca el texto hebreo y el audit trail inglés, sin introducir modificaciones sustantivas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma uniforme para יְהוָה.
  - Se usa ‘Santo de Israel’ como título fijo isaiano.
  - Se conserva ‘caldeos’ para כַשְׂדִּים en registro bíblico estándar, sin sustituirlo por un equivalente interpretativo.
  - La construcción ‘he hecho bajar’ refleja el valor causativo del hebreo sin añadir una explicación extratextual.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente donde corresponde.
