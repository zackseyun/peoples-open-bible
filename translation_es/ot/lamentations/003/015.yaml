translation:
  language: es
  text: Me ha colmado de amargura[a]; me ha hecho beber ajenjo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha empapado de amargura» o «me ha dado mi lleno de amargura». El verbo hebreo puede expresar dar de beber abundantemente o saturar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׂבִּיעַנִי
  english_pob_choice: has filled me
  chosen_spanish: me ha colmado
  alternatives_spanish:
  - me ha llenado
  - me ha saciado
  lexicon: HALOT
  rationale: El hifil de שׂבע puede significar satisfacer, llenar o colmar. En este contexto de aflicción, 'me ha colmado' conserva la idea de haber sido llenado por algo intenso y negativo, y suena más natural en español que 'me ha saciado', que podría sonar positivo.
- source_word: בַמְּרוֹרִים
  english_pob_choice: with bitterness
  chosen_spanish: de amargura
  alternatives_spanish:
  - con amargura
  - con cosas amargas
  lexicon: HALOT
  rationale: El plural de מרור expresa cosas amargas / amargura. 'De amargura' conserva el valor sustantivo y la carga metafórica de sufrimiento amargo sin volverlo demasiado literal o raro en español.
- source_word: הִרְוַנִי
  english_pob_choice: has made me drink
  chosen_spanish: me ha hecho beber
  alternatives_spanish:
  - me ha dado de beber
  - me ha empapado
  lexicon: HALOT
  rationale: El hifil de רוה puede significar dar de beber, empapar o saturar. 'Me ha hecho beber' preserva la imagen concreta y el paralelismo del versículo, mejor que una paráfrasis más libre.
- source_word: לַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - ajenjo amargo
  - ajenjo silvestre
  lexicon: HALOT
  rationale: לענה designa literalmente el ajenjo, una planta de sabor muy amargo. 'Ajenjo' preserva la imagen bíblica; en español es el equivalente natural y reconocido, aunque 'wormwood' quede mejor explicitado en notas de referencia.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés de POB. Se mantiene la metáfora doble de ser colmado con amargura y hecho beber ajenjo, sin suavizar el lenguaje de aflicción. No se detectaron revisiones textuales adicionales relevantes en el expediente.
  spanish_consistency_notes:
  - Se usa 'ajenjo' para לענה, manteniendo la imagen botánica y bíblica.
  - Se prefiere 'amargura' en lugar de 'bitterness' calcado como 'amargor' para un registro más natural y fiel al sustantivo hebreo.
  - La puntuación con punto y coma refleja el paralelismo poético de dos miembros coordinados.
