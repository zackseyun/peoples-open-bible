review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura temporal, la lista instrumental, el doble mandato de postrarse y rendir homenaje, y la referencia a la imagen de oro erigida por el rey. Sin embargo, varias decisiones léxicas no siguen fielmente el rastro auditado del POB: מַשְׁרוֹקִיתָא fue auditado como ''pipe'' y no conviene fijarlo como ''flauta''; קיתרוס fue auditado como ''lyre'' y ''arpa'' desplaza el instrumento; סוּמְפֹּנְיָה no puede quedar como el anglicismo ''bagpipe'' en texto español. Además, la nota [a] está anclada al instrumento ''cuerno'' cuando en realidad explica el verbo de homenaje/adoración.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'la bagpipe' es impropio en español, y 'el arpa' junto con 'el salterio' reduce la distinción entre instrumentos de cuerda. También conviene evitar fijar en exceso 'flauta' donde 'flauta de caña' o 'caramillo' sería más neutral; aun así, 'flauta' puede tolerarse, pero no es la mejor alineación con el audit trail. La nota [a] debe moverse al verbo pertinente para que la lectura sea inteligible y consistente con la razón dada.
  glossary_alignment: 'No hay términos teológicos de proyecto como Yahvé/Mesías implicados aquí. La decisión teológica principal sobre סגד está bien encaminada con ''rendir homenaje'', pero debe anclarse con la nota alternativa en ese verbo, no en ''cuerno''. En la terminología instrumental, conviene alinearse mejor con el POB inglés: ''lira'' para קיתרוס y una solución española para סוּמְפֹּנְיָה, con nota sobre la incertidumbre.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'cuerno' pero explica el verbo de homenaje/adoración.
    rationale: 'Esto crea una incoherencia semántica y editorial: el lector asocia la nota con el instrumento equivocado, no con ''rendirán homenaje''.'
  - severity: high
    issue: Se usa el anglicismo 'bagpipe' en el texto principal español.
    rationale: No es español natural ni eclesialmente legible. Debe sustituirse por una forma española, manteniendo la incertidumbre en nota.
  - severity: medium
    issue: '''el arpa'' para קיתרוס no preserva bien la decisión auditada ''lyre''.'
    rationale: En español, 'lira' es el equivalente más cercano y mantiene mejor la distinción entre instrumentos de cuerda listados.
  - severity: medium
    issue: '''la flauta'' para מַשְׁרוֹקִיתָא es más específico que el auditado ''pipe''.'
    rationale: No invalida el sentido, pero fija una identificación más estrecha de la que el rastro inglés quiso mantener.
  revised_spanish_text: En el momento en que oigan el sonido del cuerno, la flauta de caña, la lira, el trígono, el salterio, la gaita[a], y toda clase de música, se postrarán y rendirán homenaje[b] a la imagen de oro que el rey Nabucodonosor ha levantado.
  revised_footnotes:
