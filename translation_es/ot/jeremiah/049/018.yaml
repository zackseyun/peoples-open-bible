review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro POB: mantiene la comparación con la catástrofe de Sodoma y Gomorra, usa «Yahvé» para יְהוָה, distingue יֵשֵׁב de יָגוּר con dos verbos, y preserva «hijo de hombre» con nota aclaratoria no mesiánica. Sin embargo, «Como la destrucción de Sodoma, Gomorra y sus ciudades vecinas» suena menos preciso que el hebreo y el inglés auditado: falta la conjunción entre «Sodoma y Gomorra», y «destrucción» atenúa el matiz de «derrocamiento/ruina catastrófica» o la opción temporal-comparativa «como cuando... fueron destruidas».'
  spanish_quality_summary: 'El español es legible, pero tiene dos asperezas importantes. Primero, «Sodoma, Gomorra» sin «y» suena anómalo en una enumeración española normal. Segundo, «morará» para יָגוּר no refleja bien la idea de residir como forastero/estar de paso y además casi duplica «habitará», aplanando el paralelismo semántico. Conviene usar «vivirá como forastero» o equivalente. También «Como la destrucción de...» puede mejorarse a una construcción más natural y fiel: «Como cuando fueron destruidas...».'
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé», «hombre» y la conservación literal de «hijo de hombre» con nota. La principal desalineación lexical está en יָגוּר, donde el inglés POB documenta «sojourn» y el español «morará» no preserva esa fuerza. Además, la alternativa de nota para כְּמַהְפֵּכַת debe mantener correctamente «Sodoma y Gomorra».
  issues:
  - severity: medium
    issue: 'Construcción inicial poco precisa: «Como la destrucción de Sodoma, Gomorra...»'
    rationale: El hebreo כְּמַהְפֵּכַת introduce una comparación; el inglés auditado eligió la cláusula temporal-comparativa «As when ... were overthrown». En español, «Como cuando fueron destruidas...» suena más natural y refleja mejor el evento catastrófico que un sustantivo abstracto con enumeración cortada.
  - severity: high
    issue: «Morará» no representa bien יָגוּר
    rationale: גור añade el matiz de residir como forastero o temporalmente. «Morará» casi repite «habitará» y pierde la distinción deliberada del original y del POB inglés («will sojourn»).
  - severity: low
    issue: Puntuación/conjunción en «Sodoma, Gomorra»
    rationale: En español normal debe leerse «Sodoma y Gomorra». La forma actual dificulta la fluidez y no corresponde a la coordinación hebrea.
  - severity: low
    issue: La nota [a] repite la omisión de la conjunción
    rationale: La alternativa debe decir «Sodoma y Gomorra»; además conviene mantener una formulación más natural en español para la alternativa nominal.
  revised_spanish_text: Como cuando Sodoma y Gomorra y sus ciudades vecinas[a] fueron destruidas, dice Yahvé, no habitará allí hombre, ni vivirá en ella como forastero hijo de hombre[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Como la destrucción de Sodoma y Gomorra y de las ciudades alrededor de ellas».'
    reason: lexical_alternative
  - marker: b
    text: «Hijo de hombre» aquí es un hebraísmo que significa un ser humano o mortal, no un título mesiánico.
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura para reflejar mejor la comparación/evento de כְּמַהְפֵּכַת y mejorar la naturalidad del español; se corrige «Sodoma y Gomorra»; y se reemplaza «morará» por «vivirá en ella como forastero» para conservar el matiz de יָגוּר frente a «habitará». Se mantiene «Yahvé» y la literalidad de «hijo de hombre» con su nota explicativa.
