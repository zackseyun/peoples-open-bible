translation:
  language: es
  text: Pero antes de hacer estas cosas, tráiganme a Ajior el amonita[a], para que vea y reconozca al que ha tratado con desprecio la casa de Israel y lo envió a nosotros como para muerte[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamen a Ajior el amonita para que venga ante mí» / «convoquen a Ajior el amonita». El verbo griego puede expresar llamar o convocar; aquí «tráiganme» explicita de forma natural en español la idea de hacerlo venir ante la hablante.
    reason: lexical_alternative
  - marker: b
    text: 'El pronombre «lo» probablemente se refiere a Ajior: el que trató con desprecio la casa de Israel es quien lo envió a nosotros como para muerte.'
    reason: alternative_reading
  - marker: c
    text: O «como a muerte» / «como destinado a muerte». El griego dice más literalmente «como para muerte» y puede sugerir que fue entregado como si ya estuviera destinado a morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ δὲ τοῦ ποιῆσαι ταῦτα
  english_pob_choice: But before you do these things
  chosen_spanish: Pero antes de hacer estas cosas
  alternatives_spanish:
  - Pero antes de que hagan estas cosas
  - Y antes de hacer estas cosas
  lexicon: LSJ
  rationale: El infinitivo articular con πρό expresa anterioridad temporal; en español, «antes de hacer estas cosas» reproduce con naturalidad esa relación. Se conserva el matiz transicional de δέ con «Pero».
- source_word: καλέσατέ μοι
  english_pob_choice: call Achior the Ammonite to me
  chosen_spanish: llamadme a Ajior el amonita
  alternatives_spanish:
  - llamad a Ajior el amonita ante mí
  - convocadme a Ajior el amonita
  lexicon: LSJ
  rationale: καλέω aquí funciona como orden de llamar o convocar. «Llamadme a...» mantiene la inmediatez del imperativo y el dativo μοι; «a mí» queda integrado en la forma verbal para un español más fluido.
- source_word: Ἀχιὼρ τὸν Ἀμμανείτην
  english_pob_choice: Achior the Ammonite
  chosen_spanish: Ajior el amonita
  alternatives_spanish:
  - Achior el amonita
  - Ajior, el amonita
  lexicon: transliteration standard
  rationale: Se translitera el nombre como Ajior, en línea con la práctica española de nombres bíblicos, y se traduce el etnónimo con minúscula como gentilicio.
- source_word: ἵνα ἴδῃ ἐπιγνοῖ
  english_pob_choice: so that he may see and recognize
  chosen_spanish: para que vea y reconozca
  alternatives_spanish:
  - para que vea y conozca plenamente
  - para que lo vea y lo reconozca
  lexicon: LSJ
  rationale: El griego une dos verbos de percepción/cognición para énfasis. «Vea y reconozca» conserva la progresión y evita diluir la fuerza del doble verbo.
- source_word: τὸν ἐκφαυλίσαντα
  english_pob_choice: the one who has treated ... with contempt
  chosen_spanish: al que ha tratado con desprecio
  alternatives_spanish:
  - al que ha despreciado
  - al que ha deshonrado
  lexicon: LSJ
  rationale: ἐκφαυλίζω implica rebajar, desdeñar o tratar con desprecio. «Tratar con desprecio» comunica bien el valor semántico y mantiene el tono relacional del pasaje.
- source_word: τὸν οἶκον τοῦ Ἰσραήλ
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el linaje de Israel
  - el pueblo de Israel
  lexicon: biblical idiom
  rationale: Se conserva el modismo bíblico «casa de Israel», que en español mantiene el registro escritural y la estructura del original.
- source_word: καὶ αὐτὸν
  english_pob_choice: and who sent him
  chosen_spanish: y que lo envió a nosotros
  alternatives_spanish:
  - y que lo mandó a nosotros
  - y que lo despachó hacia nosotros
  lexicon: LSJ
  rationale: El pronombre αὐτόν probablemente remite a Ajior, como en el audit trail inglés. «Lo envió a nosotros» preserva la referencia sin sobreexplicarla en el texto principal.
- source_word: ὡς εἰς θάνατον
  english_pob_choice: as if to death
  chosen_spanish: como para muerte
  alternatives_spanish:
  - como si fuera a muerte
  - como destinado a muerte
  lexicon: LSJ
  rationale: La secuencia ὡς εἰς θάνατον es más literal que «a su muerte» y puede sugerir trato equivalente a sentencia de muerte. «Como para muerte» preserva esa ambigüedad sin forzar una explicación interpretativa.
theological_decisions:
- issue: Referencia del pronombre αὐτόν
  english_pob_reading: 'The pronoun ''him'' most likely refers to Achior: the one who despised the house of Israel had sent Achior to them as though to death.'
  chosen_spanish_reading: «Lo» se entiende probablemente de Ajior; el que trató con desprecio a la casa de Israel es quien lo envió a nosotros como para muerte.
  alternative_spanish_readings:
  - «lo» podría referirse a otra persona masculina cercana en el discurso
  - el texto podría leerse sin identificar explícitamente el antecedente
  rationale: La continuidad discursiva y la lectura auditada del inglés favorecen que el referente sea Ajior. Mantener el pronombre en el texto principal evita añadir un nombre inexistente en el griego, pero la nota aclara la referencia probable.
  doctrine_reference: Prudencia exegética y referencia pronominal en narración bíblica
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada del audit trail inglés, donde la coordinación final se ajustó a «who sent him to us as if to death» para mayor fluidez. Se preserva el doble verbo «vea y reconozca» y la ambigüedad controlada de «como para muerte», sin introducir explicaciones ajenas al griego.
  spanish_consistency_notes:
  - Se usa Ajior como transliteración coherente para el nombre propio.
  - Se mantiene «casa de Israel» por consistencia bíblica y por fidelidad al modismo del griego.
  - Se conserva el tono imperativo directo en segunda persona plural.
  - Se traduce el etnónimo como «amonita» en minúscula, como gentilicio.
  - No se sustituye el matiz de juicio de ἐκφαυλίζω por un término más débil como «ignorar».
