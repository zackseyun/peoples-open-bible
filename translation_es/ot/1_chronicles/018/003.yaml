translation:
  language: es
  text: David hirió a Hadadezer[a], rey de Zobá, mientras iba a establecer su poder[b] junto al río Éufrates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí el nombre se escribe «Hadadezer»; el pasaje paralelo en 2 Samuel 8:3 tiene la forma variante que a menudo se traduce «Hadarezer».
    reason: textual_variant
  - marker: b
    text: O «restablecer su control»; más literalmente, «establecer su mano» junto al río Éufrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - atacó
  lexicon: HALOT
  rationale: El hebreo נכה expresa la acción concreta de golpear o herir. En español, «hirió» conserva la fuerza física y militar sin implicar necesariamente una derrota total, de modo semejante a «struck» en el audit trail inglés.
- source_word: הֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadézer
  alternatives_spanish:
  - Hadadezer
  - Hadarezer
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio conforme al hebreo de Crónicas. La forma española conserva la misma base consonántica que la elección inglesa y evita normalizarlo con una variante de Samuel.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Soba
  alternatives_spanish:
  - rey de Zobá
  - monarca de Soba
  lexicon: Construct chain
  rationale: La cadena constructa identifica el oficio y el reino. «Soba» es una adaptación española natural de Zobah, clara y bíblicamente reconocible.
- source_word: בְּלֶכְתּוֹ
  english_pob_choice: when he went
  chosen_spanish: cuando iba
  alternatives_spanish:
  - as he went
  - mientras iba
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa circunstancia de acción en curso. «Cuando iba» reproduce bien ese matiz y resulta idiomático en español.
- source_word: לְהַצִּיב יָדוֹ
  english_pob_choice: to establish his power
  chosen_spanish: a establecer su poder
  alternatives_spanish:
  - a restablecer su control
  - a poner su mano
  lexicon: HALOT
  rationale: La locución idiomática hebrea «poner/establecer la mano» en contexto militar-político apunta a afirmar dominio o autoridad. «Establecer su poder» comunica ese sentido sin volverlo literal de forma opaca.
- source_word: בִּנְהַר פְּרָת
  english_pob_choice: at the Euphrates River
  chosen_spanish: junto al río Éufrates
  alternatives_spanish:
  - en el río Éufrates
  - a orillas del río Éufrates
  lexicon: HALOT
  rationale: פְּרָת es el Éufrates, y נָהָר queda explícito como «río». «Junto al» refleja adecuadamente la localización territorial de la campaña sin forzar una precisión mayor que la del hebreo.
translation_notes:
  revision_awareness: El inglés auditado pasó de una redacción con «toward Hamath» a una forma más ajustada al hebreo, suprimiendo esa indicación direccional. La versión española sigue esa revisión y no añade «hacia Hamat», que no está sustentado en el texto base dado aquí.
  spanish_consistency_notes:
  - 'Se mantiene una transliteración consistente de nombres propios: Hadadézer, Soba, Éufrates.'
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton ni una sustitución reverencial en este versículo.
  - La imagen idiomática de לְהַצִּיב יָדוֹ se resuelve con una equivalencia natural en español, sin borrar el trasfondo militar del hebreo.
