id: EZK.17.23
reference: Ezekiel 17:23
source:
  edition: WLC
  text: בְּ/הַ֨ר מְר֤וֹם יִשְׂרָאֵל֙ אֶשְׁתֳּלֶ֔/נּוּ וְ/נָשָׂ֤א עָנָף֙ וְ/עָ֣שָׂה פֶ֔רִי וְ/הָיָ֖ה לְ/אֶ֣רֶז אַדִּ֑יר וְ/שָׁכְנ֣וּ תַחְתָּ֗י/ו כֹּ֚ל צִפּ֣וֹר כָּל כָּנָ֔ף בְּ/צֵ֥ל דָּלִיּוֹתָ֖י/ו תִּשְׁכֹּֽנָּה־׃
translation:
  text: On the high mountain of Israel I will plant it[a], and it will put forth branches and bear fruit and become a majestic cedar. Under it every bird of every wing will dwell[b]; in the shade of its boughs they will dwell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will transplant it.' The Hebrew verb can emphasize setting out a shoot in a new place.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'every bird, every wing'—a poetic way of saying birds of every kind.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הַר מְרוֹם יִשְׂרָאֵל
  chosen: On the high mountain of Israel
  alternatives:
  - On the mountain height of Israel
  - On Israel's lofty mountain
  lexicon: HALOT
  rationale: מְרוֹם denotes height/elevation. The construct phrase is rendered naturally in English as 'the high mountain of Israel,' preserving the geographic-exalted imagery without over-literal awkwardness.
- source_word: אֶשְׁתֳּלֶנּוּ
  chosen: I will plant it
  alternatives:
  - I will transplant it
  lexicon: HALOT
  rationale: The verb from שתל means to plant/set out. 'Plant it' is the plain sense. 'Transplant it' is possible in the broader allegorical context of moving a sprig, but the immediate clause focuses on establishment rather than the transfer process, so 'plant it' is preferred.
- source_word: וְנָשָׂא עָנָף
  chosen: and it will put forth branches
  alternatives:
  - and it will bear branches
  - and it will lift up a branch
  lexicon: HALOT
  rationale: Literally 'and it will bear/lift a branch.' In English, for tree growth imagery, 'put forth branches' best conveys the idiom and the singular עָנָף as a collective/generic growth expression.
- source_word: וְעָשָׂה פֶרִי
  chosen: and bear fruit
  alternatives:
  - and produce fruit
  lexicon: HALOT
  rationale: A standard Hebrew collocation meaning to produce fruit. 'Bear fruit' is idiomatic English and preserves the metaphorical resonance.
- source_word: וְהָיָה לְאֶרֶז אַדִּיר
  chosen: and become a majestic cedar
  alternatives:
  - and become a noble cedar
  - and become a mighty cedar
  lexicon: HALOT
  rationale: אַדִּיר conveys majesty, might, nobility. 'Majestic' fits the exalted arboreal imagery and reads naturally in modern English.
- source_word: וְשָׁכְנוּ תַחְתָּיו
  chosen: Under it ... will dwell
  alternatives:
  - Under it ... will live
  - Under it ... will settle
  lexicon: HALOT
  rationale: שׁכן commonly means dwell/settle. 'Dwell' preserves the elevated register and echoes prophetic imagery of secure habitation.
- source_word: כֹּל צִפּוֹר כָּל כָּנָף
  chosen: every bird of every wing
  alternatives:
  - every kind of bird
  - birds of every sort
  - every winged creature
  lexicon: HALOT
  rationale: The phrase is literally 'every bird, every wing.' Rendering it as 'every bird of every wing' preserves the Hebrew fullness and poetic force better than flattening it to 'every kind of bird,' while remaining intelligible.
- source_word: בְּצֵל דָּלִיּוֹתָיו
  chosen: in the shade of its boughs
  alternatives:
  - in the shadow of its branches
  - in the shade of its branches
  lexicon: HALOT
  rationale: דָּלִיּוֹת refers to hanging branches/boughs. 'Boughs' better captures the large-tree imagery than the more generic 'branches.' 'Shade' is more idiomatic than 'shadow' in this habitat context.
- source_word: תִּשְׁכֹּנָּה
  chosen: they will dwell
  alternatives:
  - it will dwell
  lexicon: HALOT
  rationale: 'Although the form is 3fp singular-looking in orthography, it functions here with the collective subject ''every bird of every wing'' and is best rendered distributively/plurally in English: ''they will dwell.'' This avoids misleading singular English while matching the sense.'
