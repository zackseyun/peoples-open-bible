translation:
  language: es
  text: Porque el primer día del primer mes él puso los cimientos para la subida[a] desde Babilonia, y el primer día del quinto mes llegó a Jerusalén, conforme a la buena mano de su Dios sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la subida». El hebreo dice literalmente «la subida», un modo convencional de hablar del viaje hacia Jerusalén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues que
  - Porque entonces
  lexicon: HALOT
  rationale: El hebreo introduce aquí una explicación con valor discursivo y, en español, «Porque» mantiene ese enlace causal/expositivo de forma natural sin forzar el sentido.
- source_word: בְּאֶחָד לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: on the first day of the first month
  chosen_spanish: en el primer día del mes primero
  alternatives_spanish:
  - el día primero del primer mes
  - en el día primero del mes primero
  lexicon: HALOT
  rationale: La fórmula calendárica hebrea se reproduce con una expresión sobria y transparente en español; «mes primero» conserva el orden y la simetría del original.
- source_word: יְסֻד הַמַּעֲלָה
  english_pob_choice: laid the foundation for the journey up
  chosen_spanish: puso los cimientos de la subida
  alternatives_spanish:
  - comenzó la subida
  - inició el viaje de subida
  - puso fundamento a la subida
  lexicon: HALOT
  rationale: El inglés POB optó por una imagen de fundación para reflejar יְסֻד, no por un simple «empezó». En español, «puso los cimientos de» conserva esa metáfora. «Subida» rinde הַמַּעֲלָה sin borrar el lenguaje convencional de ascenso hacia Jerusalén.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - de Babilonia
  lexicon: HALOT
  rationale: «Desde» comunica mejor el punto de partida del movimiento del viaje y corresponde al valor direccional del hebreo.
- source_word: בָּא אֶל יְרוּשָׁלַם
  english_pob_choice: he came to Jerusalem
  chosen_spanish: llegó a Jerusalén
  alternatives_spanish:
  - vino a Jerusalén
  - arribó a Jerusalén
  lexicon: HALOT
  rationale: «Llegó a» es natural en español y preserva el sentido simple del verbo de movimiento hacia la ciudad sin añadir matices innecesarios.
- source_word: כְּיַד
  english_pob_choice: according to the ... hand
  chosen_spanish: conforme a la ... mano
  alternatives_spanish:
  - según la ... mano
  - por la ... mano
  lexicon: HALOT
  rationale: «Conforme a» mantiene el valor idiomático relacional de כְּ sin convertirlo automáticamente en causa directa; además conserva la imagen de la «mano» divina como en el POB inglés.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de él
  lexicon: HALOT
  rationale: El sufijo posesivo singular se expresa de manera natural con «su Dios», referencia clara a Ezra sin repetir innecesariamente el nombre propio.
- source_word: הַטּוֹבָה
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - bondadosa
  - favorable
  - benigna
  lexicon: HALOT
  rationale: «Buena» conserva el sentido básico y la fórmula bíblica tradicional de la «mano buena» de Dios, evitando estrechar el matiz solo a favor o benevolencia.
- source_word: עָלָיו
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre su vida
  lexicon: HALOT
  rationale: «Sobre él» mantiene el idioma espacial/figurativo del hebreo y sugiere la presencia activa y favorecedora de Dios sin explicarlo en exceso.
theological_decisions:
- issue: El valor de יְסֻד en relación con הַמַּעֲלָה
  english_pob_reading: laid the foundation for the journey up
  chosen_spanish_reading: puso los cimientos de la subida
  alternative_spanish_readings:
  - comenzó la subida
  - inició el viaje de subida
  rationale: La secuencia hebrea y la revisión del POB inglés favorecen conservar una metáfora de «fundación». Traducirlo solo como inicio/partida debilitaría la tensión lexical del texto; «puso los cimientos» la preserva sin volver la frase artificiosa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: La expresión כְּיַד אֱלֹהָיו הַטּוֹבָה עָלָיו
  english_pob_reading: according to the good hand of his God upon him
  chosen_spanish_reading: conforme a la buena mano de su Dios sobre él
  alternative_spanish_readings:
  - porque la buena mano de su Dios estaba sobre él
  - por la buena mano de su Dios sobre él
  rationale: Se mantiene la metáfora de la mano divina como señal de favor y acción providencial, sin borrar la ambigüedad de כְּ. «Conforme a» deja abierta la relación entre la mano buena y el éxito del viaje, como en el POB inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que pasó de una formulación más directa de comienzo a «laid the foundation for the journey up». Por eso el español evita «comenzó» y adopta una imagen de fundación («puso los cimientos») para reflejar mejor יְסֻד, manteniendo a la vez la lectura idiomática del desplazamiento a Jerusalén y la clausura con la mano buena de Dios.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el Tetragrámaton, por lo que se mantuvo «Dios».
  - Se conservó «subida» para הַמַּעֲלָה, siguiendo la preferencia del POB por no ocultar la metáfora direccional de Jerusalén.
  - Se evitó «SEÑOR» y se preservó el paralelismo de las dos fechas y la frase idiomática final.
  - La nota de alternativa en el texto refleja la ambigüedad léxica de הַמַּעֲלָה sin sobreinterpretarla.
