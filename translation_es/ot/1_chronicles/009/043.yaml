translation:
  language: es
  text: Y Moza engendró a Binea, y su hijo fue Refaía, su hijo Eleasa, su hijo Azel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מוֹצָא
  english_pob_choice: Moza
  chosen_spanish: Moza
  alternatives_spanish:
  - Mozá
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma breve y reconocible, sin añadir traducción interpretativa.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - generó
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo expresa paternidad/engendramiento. 'Engendró' mantiene el valor genealógico y es natural en español bíblico sin caer en una paráfrasis amplia.
- source_word: בִּנְעָא
  english_pob_choice: Binea
  chosen_spanish: Binea
  alternatives_spanish:
  - Bina
  lexicon: HALOT
  rationale: Se translitera el nombre propio siguiendo la vocalización masorética reflejada en el texto hebreo y en el audit trail inglés.
- source_word: וּרְפָיָה בְנוֹ
  english_pob_choice: and his son was Rephaiah
  chosen_spanish: y su hijo fue Refaías
  alternatives_spanish:
  - y Refaías, su hijo
  - y Refaías fue su hijo
  lexicon: HALOT
  rationale: El hebreo presenta una cadena genealógica nominal; en español, 'su hijo fue' reproduce de manera fluida la sucesión filial y el verbo implícito que el inglés POB también suplió para la primera transición.
- source_word: אֶלְעָשָׂה בְנוֹ
  english_pob_choice: his son Eleasah
  chosen_spanish: su hijo Elasa
  alternatives_spanish:
  - Elasa, su hijo
  lexicon: HALOT
  rationale: Se mantiene la relación filial repetida en la cadena genealógica. 'Elasa' sigue la transliteración más directa del hebreo y la forma habitual en español para este nombre.
- source_word: אָצֵל בְּנוֹ
  english_pob_choice: his son Azel
  chosen_spanish: su hijo Azel
  alternatives_spanish:
  - Azel, su hijo
  lexicon: HALOT
  rationale: Se conserva el cierre de la secuencia genealógica con transliteración del nombre propio y el vínculo filial explícito, sin añadir conectores interpretativos.
translation_notes:
  revision_awareness: 'El texto hebreo muestra una secuencia genealógica abreviada: ''Y Moza engendró a Binea, y Refaías su hijo, Elasa su hijo, Azel su hijo''. La versión española sigue la decisión auditada en inglés de suplir un verbo copulativo en la primera transición para lograr lectura natural, sin alterar la relación genealógica.'
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la conjunción narrativa del hebreo.
  - Se prefirió 'engendró' sobre 'fue padre de' por concisión y registro bíblico natural.
  - Se conservaron nombres propios transliterados sin castellanización excesiva, en continuidad con el audit trail inglés.
  - No se añadieron notas de pie porque la aclaración genealógica quedó integrada de forma transparente en la frase española.
