translation:
  language: es
  text: Porque en el día en que yo castigue[a] a Israel por sus transgresiones, también castigaré los altares de Betel[b]; los cuernos del altar serán cortados y caerán a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando yo visite a Israel para pedirle cuentas»; el verbo hebreo puede significar «visitar» en el sentido de llamar a cuentas o castigar.'
    reason: lexical_alternative
  - marker: b
    text: Los «cuernos» eran las proyecciones con forma de cuerno en las esquinas del altar, asociadas con su santidad y su uso ritual.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: En este contexto introduce la base o explicación de la sentencia anterior; «Porque» mantiene la fuerza causal/explanatoria de manera natural en español.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: en el día
  alternatives_spanish:
  - en aquel día
  - cuando
  lexicon: HALOT
  rationale: Conserva la estructura temporal del hebreo sin volverla rígida; «en el día» sigue siendo claro en español bíblico contemporáneo.
- source_word: פָּקְדִי
  english_pob_choice: when I punish
  chosen_spanish: en que yo castigue
  alternatives_spanish:
  - cuando yo castigue
  - cuando yo visite
  - cuando yo ponga en cuenta
  lexicon: HALOT
  rationale: En contextos de juicio, פּקד expresa la acción de tomar cuentas o castigar. «Castigue» comunica el sentido judicial con naturalidad; la nota conserva la alternativa «visitar» como valor lexical posible.
- source_word: פִשְׁעֵי
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - rebeldías
  - rebeliones
  - culpas
  lexicon: HALOT
  rationale: «Transgresiones» preserva el peso moral y de pacto del término sin reducirlo a una simple falta legal.
- source_word: יִשְׂרָאֵל עָלָיו
  english_pob_choice: Israel for his transgressions
  chosen_spanish: Israel por sus transgresiones
  alternatives_spanish:
  - Israel por sus transgresiones,
  - Israel por su transgresión
  lexicon: HALOT
  rationale: En español, el posesivo plural «sus» evita una ambigüedad de género y mantiene el referente colectivo singular de Israel; la relación de juicio queda clara sin forzar una forma masculina.
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will also punish
  chosen_spanish: también castigaré
  alternatives_spanish:
  - castigaré también
  - también pondré en cuenta
  - también visitaré con juicio
  lexicon: HALOT
  rationale: La repetición de פּקד vincula el juicio sobre Israel con el de Betel. «También castigaré» preserva la conexión y la fuerza judicial del verbo.
- source_word: מִזְבְּחוֹת בֵּית אֵל
  english_pob_choice: the altars of Bethel
  chosen_spanish: los altares de Betel
  alternatives_spanish:
  - los altares de Betel
  - los altares en Betel
  lexicon: HALOT
  rationale: La cadena constructa se expresa de forma directa y formal; «Betel» se mantiene como nombre propio del lugar.
- source_word: וְנִגְדְּעוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán arrancados
  - serán derribados
  - serán mutilados
  lexicon: HALOT
  rationale: גדע comunica corte violento o definitivo. «Serán cortados» reproduce la imagen sin añadir interpretación excesiva.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: the horns of the altar
  chosen_spanish: los cuernos del altar
  alternatives_spanish:
  - las puntas del altar
  - las proyecciones del altar
  lexicon: HALOT
  rationale: Se conserva literalmente la imagen cultual; «cuernos» es la forma más directa y reconocible en español bíblico para este elemento del altar.
- source_word: וְנָפְלוּ לָאָרֶץ
  english_pob_choice: and fall to the ground
  chosen_spanish: y caerán a tierra
  alternatives_spanish:
  - y caerán al suelo
  - y caerán sobre la tierra
  lexicon: HALOT
  rationale: «A tierra» reproduce bien el movimiento físico y mantiene un registro bíblico sobrio; evita sobreespecificar con «suelo».
theological_decisions:
- issue: Mantenimiento del juicio divino expresado con פקד
  english_pob_reading: when I punish Israel... I will also punish the altars of Bethel
  chosen_spanish_reading: en el día en que yo castigue a Israel... también castigaré los altares de Betel
  alternative_spanish_readings:
  - cuando yo visite a Israel... también visitaré los altares de Betel
  - cuando yo pida cuentas a Israel... también pediré cuentas a los altares de Betel
  rationale: El hebreo usa el mismo verbo para ambos actos de juicio. En español, «castigar» transmite el sentido judicial con claridad; la nota conserva la alternativa semántica «visitar»/«pedir cuentas» para no borrar la tensión léxica del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy over translation tradition
- issue: Conservación literal del símbolo de los cuernos del altar
  english_pob_reading: the horns of the altar will be cut off and fall to the ground
  chosen_spanish_reading: los cuernos del altar serán cortados y caerán a tierra
  alternative_spanish_readings:
  - las proyecciones del altar serán cortadas y caerán a tierra
  - las puntas del altar serán cortadas y caerán a tierra
  rationale: Se preserva la imagen cultual concreta porque tiene valor histórico y ritual en el texto profético; no se la interpreta ni se la reemplaza por una explicación en el cuerpo principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy over translation tradition
translation_notes:
  revision_awareness: El pasaje mantiene alta concordancia con el texto hebreo y con la auditoría inglesa. La única decisión principal en español es conservar la repetición de פּקד con el verbo «castigar», dejando en nota su alternativa lexical «visitar/pedir cuentas»; también se preserva literalmente la imaginería cultual de los «cuernos del altar».
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se prefirió «transgresiones» para פשע, siguiendo el valor moral-covenantal del término.
  - Se mantuvo el paralelismo verbal del hebreo entre el juicio sobre Israel y el juicio sobre los altares de Betel.
  - Se evitó traducir «altar» con términos eclesiales posteriores; el referente es el altar cultual israelita.
