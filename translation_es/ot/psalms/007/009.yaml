review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: Yahvé como sujeto, juicio sobre los pueblos, súplica paralela «júzgame», y la apelación a «mi justicia» y «mi integridad». También mantiene correctamente «Yahvé» y conserva la tensión teológica de la autoafirmación del salmista. Sin embargo, las notas al pie no preservan fielmente el rastro auditado en inglés: la nota [a] está anclada al sintagma equivocado y propone una alternativa para «juzga a los pueblos» en vez de para «júzgame»; la nota [b] deja una alternativa en inglés («blamelessness») en lugar de español; y la nota [c] debería explicar la alternativa idiomática española frente al hebreo literal.'
  spanish_quality_summary: El texto principal es legible y digno. «Yahvé juzga a los pueblos; júzgame, oh Yahvé...» funciona bien. El punto menos natural es «que está sobre mí», que suena algo rígido en español, pero aquí puede conservarse por fidelidad formal si la nota explica la alternativa más idiomática. «Oh Yahvé» es aceptable, aunque sin coma tras «júzgame» se puede leer algo apretado; conviene mantener la puntuación vocativa clara.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; צדק -> «justicia» en contexto forense; תֻּם -> «integridad». No hay conflictos doctrinales relevantes. La única desviación importante es de aparato crítico/notes: las alternativas deben estar en español y corresponder exactamente a las decisiones léxicas documentadas.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «los pueblos» pero comenta una alternativa de «júzgame».
    rationale: El audit trail inglés pone la nota alternativa en la súplica «judge me», no en «the peoples». Además, la redacción actual «vindica a los pueblos / haz justicia a los pueblos» cambia el sentido fuente.
  - severity: medium
    issue: La nota [b] incluye «blamelessness» en inglés.
    rationale: 'Las notas del producto español deben estar plenamente en español y conservar la alternativa léxica pertinente: «irreprochabilidad» o «integridad sin tacha», no una glosa inglesa.'
  - severity: medium
    issue: La nota [c] necesita formular mejor la relación entre la traducción literal y la alternativa idiomática.
    rationale: El inglés auditado conserva «upon me» por literalidad, con alternativa «in me». En español conviene explicitar que «en mí» es una opción más natural, mientras el texto mantiene «sobre mí» por fidelidad al hebreo.
  - severity: low
    issue: La puntuación vocativa puede mejorarse.
    rationale: «júzgame, oh Yahvé,» lee con mayor claridad que «júzgame, oh Yahvé» sin aislar del todo el vocativo.
  revised_spanish_text: Yahvé juzga a los pueblos; júzgame[a], oh Yahvé, conforme a mi justicia y conforme a mi integridad[b], que está sobre mí[c].
