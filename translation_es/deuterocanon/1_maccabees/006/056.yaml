translation:
  language: es
  text: Regresó de Persia y Media[a], y las fuerzas que habían ido con el rey están con él, y que procura hacerse cargo de los asuntos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de esta cláusula es sintácticamente difícil, especialmente en la expresión equivalente a «las fuerzas que habían ido con el rey con él». La traducción se mantiene cerca de la forma transmitida en Swete/Vaticanus en vez de resolver la aspereza más allá de la evidencia.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστρεψεν
  english_pob_choice: he turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - regresó
  - se retiró
  lexicon: LSJ
  rationale: El aoristo de ἀποστρέφω aquí expresa un movimiento de retorno desde una región. «Se volvió» conserva la imagen del giro/retorno y suena natural en español sin perder la dirección del verbo.
- source_word: ἀπὸ τῆς Περσίδος καὶ Μηδίας
  english_pob_choice: from Persia and Media
  chosen_spanish: de Persia y de Media
  alternatives_spanish:
  - desde Persia y Media
  - de Pérsia y Media
  lexicon: LSJ
  rationale: La preposición ἀπό con genitivo se vierte de forma directa como «de». Se conserva la pareja geográfica sin añadir matices no exigidos por el griego.
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - los ejércitos
  - las tropas
  lexicon: LSJ
  rationale: δυνάμεις en narrativa militar puede designar fuerzas armadas. «Las fuerzas» mantiene amplitud semántica y evita precisar más de lo que el texto permite.
- source_word: αἱ πορευθεῖσαι τῷ βασιλεῖ μετʼ αὐτοῦ
  english_pob_choice: that had gone with the king are with him
  chosen_spanish: que habían ido con el rey están con él
  alternatives_spanish:
  - que habían marchado con el rey están con él
  - que habían acompañado al rey están con él
  lexicon: LSJ
  rationale: El griego transmitido es sintácticamente difícil por la doble referencia al rey y a «con él». Se conserva esa tensión con una construcción española completa y cercana al orden del original, sin resolverla de manera interpretativa más allá de la evidencia.
- source_word: ζητεῖ
  english_pob_choice: is seeking
  chosen_spanish: busca
  alternatives_spanish:
  - está buscando
  - procura
  lexicon: LSJ
  rationale: El presente indica acción en curso. «Busca» comunica el estado de intención sin recargar la frase en español.
- source_word: παραλαβεῖν
  english_pob_choice: to take over
  chosen_spanish: tomar el control
  alternatives_spanish:
  - asumir el control
  - hacerse cargo de
  lexicon: LSJ
  rationale: En este contexto político-administrativo, παραλαμβάνω no es solo «recibir», sino asumir o tomar el mando de asuntos. «Tomar el control» expresa bien esa fuerza.
- source_word: τὰ τῶν πραγμάτων
  english_pob_choice: the conduct of affairs
  chosen_spanish: de los asuntos
  alternatives_spanish:
  - de los negocios
  - del gobierno de los asuntos
  lexicon: LSJ
  rationale: La expresión idiomática se refiere a la administración de los asuntos. En español, «los asuntos» mantiene la amplitud del sintagma sin introducir una formulación demasiado moderna o técnica.
theological_decisions:
- issue: No hay término teológico principal; decisión sobre la tensión sintáctica del texto transmitido
  english_pob_reading: The translation stays close to the Swete/Vaticanus wording rather than resolving the awkwardness beyond the evidence.
  chosen_spanish_reading: La traducción conserva la dificultad sintáctica del griego transmitido y no la suaviza interpretativamente.
  alternative_spanish_readings:
  - La traducción podría normalizarse a una frase más fluida, pero perdería la huella del texto transmitido.
  - Podría reinterpretarse la cláusula de las fuerzas para hacerla más elegante, pero eso iría más allá de la evidencia.
  rationale: El valor de este versículo está en presentar la redacción difícil tal como está atestiguada. En una edición POB transparente conviene mantener visible la tensión textual en vez de eliminarla con una paráfrasis.
  doctrine_reference: Principio editorial de transparencia textual; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió el verbo implícito «are» para completar la cláusula sobre las fuerzas. La versión española refleja esa misma completitud con «están», sin intentar despejar la ambigüedad sintáctica del original.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - No se introduce terminología cristiana tradicional ajena al texto; el pasaje es histórico-político.
  - «Las fuerzas» mantiene el valor militar amplio de δυνάμεις sin sobretraducirlo como «tropas» o «ejércitos».
