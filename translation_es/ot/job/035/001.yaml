  lexicon: HALOT
  rationale: El verbo hebreo en esta fórmula narrativa puede significar ‘responder’ o ‘contestar’. En español, ‘respondió’ conserva el valor de réplica directa y suena natural en la fórmula introductoria del discurso de Elihú.
- source_word: אֱלִיהוּ
  english_pob_choice: Elihu
  chosen_spanish: Elihú
  alternatives_spanish:
  - Eliú
  lexicon: transliteración estándar del nombre hebreo
  rationale: Se translitera el nombre propio con ajuste ortográfico al español para reflejar la pronunciación habitual y mantener la identificación clara del personaje.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: HALOT
  rationale: אָמַר es el verbo común de habla; ‘dijo’ reproduce con fidelidad y naturalidad la fórmula hebrea ‘respondió y dijo’ sin añadir matices que el texto no exige.
translation_notes:
