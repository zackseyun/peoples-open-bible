translation:
  language: es
  text: 'Porque me avergonzaba pedir al rey tropas y jinetes para ayudarnos contra el enemigo en el camino[a], ya que habíamos dicho al rey: “La mano de nuestro Dios está sobre todos los que lo buscan para bien[b]; pero su fuerza y su ira están contra todos los que lo abandonan.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “del enemigo en el camino”. La frase hebrea también puede traducirse de manera más literal así; sin embargo, “contra el enemigo en el camino” expresa mejor la petición de protección militar.
    reason: lexical_alternative
  - marker: b
    text: “La mano de nuestro Dios” es una expresión hebrea de su acción eficaz, favorable y poderosa.
    reason: cultural_note
lexical_decisions:
- source_word: בֹשְׁתִּי
  english_pob_choice: I was ashamed
  chosen_spanish: me avergonzaba
  alternatives_spanish:
  - me avergoncé
  - sentía vergüenza
  lexicon: HALOT
  rationale: El hebreo expresa vergüenza/deshonra, no solo incomodidad social. “Me avergonzaba” conserva el peso de la emoción en un español natural y evita suavizar el matiz.
- source_word: לִשְׁאוֹל
  english_pob_choice: to ask
  chosen_spanish: pedir
  alternatives_spanish:
  - solicitar
  - preguntar
  lexicon: HALOT
  rationale: Aquí שאל es pedir algo al rey, no formular una pregunta. “Pedir” comunica mejor la acción pragmática en español y mantiene el sentido de solicitud.
- source_word: חַיִל
  english_pob_choice: troops
  chosen_spanish: tropas
  alternatives_spanish:
  - ejército
  - fuerzas militares
  - soldados
  lexicon: HALOT
  rationale: En este contexto se trata de fuerza armada provista por el rey. “Tropas” es natural y corresponde bien al paralelo con “jinetes” sin exagerar a “ejército”.
- source_word: פָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres de a caballo
  lexicon: HALOT
  rationale: El término designa combatientes montados. “Jinetes” es claro, concreto y conserva la imagen del hebreo sin tecnicismo innecesario.
- source_word: לְעָזְרֵנוּ
  english_pob_choice: to help us
  chosen_spanish: para ayudarnos
  alternatives_spanish:
  - para auxiliarnos
  - para socorrernos
  lexicon: HALOT
  rationale: La expresión de propósito se traduce de modo directo y natural. “Ayudarnos” comunica el sentido sin elevar el registro más de lo que exige el contexto.
- source_word: מֵאוֹיֵב
  english_pob_choice: against the enemy
  chosen_spanish: contra el enemigo
  alternatives_spanish:
  - del enemigo
  - frente al enemigo
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse de manera más literal como “de/enemigo”, el contexto de protección militar justifica “contra”, tal como refleja la POB inglesa.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en el viaje
  - por el camino
  lexicon: HALOT
  rationale: La ruta de viaje se expresa bien en español con “en el camino”, fórmula idiomática y fiel al marco narrativo.
- source_word: יַד אֱלֹהֵינוּ
  english_pob_choice: The hand of our God
  chosen_spanish: La mano de nuestro Dios
  alternatives_spanish:
  - El poder de nuestro Dios
  - La mano de Dios
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo, como hizo la POB inglesa, porque comunica acción eficaz de Dios sin reducirla a un abstracto.
- source_word: עַל כָּל מְבַקְשָׁיו לְטוֹבָה
  english_pob_choice: is for good on all who seek him
  chosen_spanish: está para bien sobre todos los que lo buscan
  alternatives_spanish:
  - está para bien de todos los que lo buscan
  - está favorable sobre todos los que lo buscan
  lexicon: HALOT
  rationale: La construcción hebrea combina preposición y beneficio. “Está para bien sobre” preserva la imagen y el valor benéfico sin perder legibilidad; “lo buscan” mantiene el pronombre objeto implícito en el hebreo.
- source_word: וְעֻזּוֹ
  english_pob_choice: his strength
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su might
  lexicon: HALOT
  rationale: עֹז puede ser fuerza o poder. En español, “poder” encaja mejor con la coordinación con “ira” y con la idea de oposición activa, sin borrar el matiz de capacidad eficaz.
- source_word: וְאַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  lexicon: HALOT
  rationale: El hebreo idiomático remite a ira/enojo. “Ira” conserva el tono bíblico elevado y la fuerza del término sin convertirlo en un coloquialismo.
- source_word: עַל כָּל עֹזְבָיו
  english_pob_choice: are against all who forsake him
  chosen_spanish: están contra todos los que lo abandonan
  alternatives_spanish:
  - están sobre todos los que lo abandonan
  - están contra todos los que lo dejan
  lexicon: HALOT
  rationale: עזב en contexto de alianza connota abandonar/forsake. “Lo abandonan” conserva la ruptura relacional del hebreo; “están contra” refleja la fuerza de עַל con sentido hostil.
theological_decisions:
- issue: Metáfora antropomórfica de ‘la mano de nuestro Dios’
  english_pob_reading: Retain the metaphor as 'The hand of our God' rather than interpret it as abstract 'power' or 'favor.'
  chosen_spanish_reading: Conservar “La mano de nuestro Dios” como metáfora de acción eficaz y favorable de Dios.
  alternative_spanish_readings:
  - El poder de nuestro Dios
  - El favor de nuestro Dios
  rationale: El hebreo usa una imagen corporal intencional. Mantenerla en español preserva la textura teológica y deja que la frase siguiente explicite su alcance de favor y oposición, en lugar de reducirla a una sola categoría abstracta.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo expresar la oposición divina en ‘su fuerza y su ira están contra todos los que lo abandonan’
  english_pob_reading: Translate both terms distinctly as 'his strength and his anger are against all who forsake him.'
  chosen_spanish_reading: Traducir distintamente “su poder y su ira” para no fundir los dos sustantivos hebreos en una sola idea.
  alternative_spanish_readings:
  - su fuerza y su ira
  - su poder y su furor
  rationale: 'El hebreo coordina dos rasgos: capacidad activa y oposición emocional/justiciera. “Poder y ira” mantiene la distinción y comunica que la respuesta divina es a la vez enérgica y personal.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de עַל con el verbo estar
  english_pob_reading: '''The hand of our God is for good on all who seek him'''
  chosen_spanish_reading: “está para bien sobre” como modo de conservar el paralelismo de la construcción hebrea.
  alternative_spanish_readings:
  - está favorable sobre
  - es para bien de
  rationale: El español permite una formulación algo más libre, pero “para bien sobre” conserva la orientación relacional y espacial del hebreo sin hacerla opaca. La frase sigue siendo comprensible y mantiene la imagen original.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del contexto inglés auditado y del hebreo; no hubo cambios sustanciales en la lectura final, y se mantuvo la metáfora de la mano divina junto con la distinción entre poder/ira y la fuerza hostil de עַל.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma predeterminada cuando aparezca el Tetragrámaton; aquí el texto usa ‘Dios’, por lo que no aplica.
  - Se preserva ‘mano’ como metáfora y no se sustituye por un abstracto.
  - Se traduce עַל con ‘contra’ en la clausula final por el sentido hostil del contexto.
  - Se evita el arcaísmo innecesario y se conserva un registro bíblico claro y publicable.
