    rationale: La comparación pertenece a la misma cláusula («halló favor y bondad delante de él más que...»). Quitar la coma mejora la fluidez y refleja mejor la sintaxis del enunciado.
  revised_spanish_text: Y el rey amó a Ester más que a todas las mujeres[a], y ella halló favor y bondad delante de él[b] más que a todas las vírgenes[c]. Puso sobre su cabeza la corona real y la hizo reina en lugar de Vasti.
  revised_footnotes:
