    rationale: '''Graciosidad'' suena poco natural y puede sugerir comicidad o encanto superficial en español moderno. La auditoría inglesa ofrece ''graciousness''; en español es mejor ''gracia'' como elección principal y ''favor'' o ''benevolencia/gracia'' en nota, sin forzar un sustantivo raro.'
  - severity: low
