translation:
  language: es
  text: 'Entonces el hombre dijo[a]: «¡Esto, por fin, es hueso de mis huesos y carne de mi carne! Esta[b] será llamada mujer, porque esta[c] fue tomada del hombre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También, de manera más idiomática: «¡Por fin, hueso de mis huesos y carne de mi carne!»'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo señala enfáticamente a la mujer recién presentada con un demostrativo: «esta» o «esta mujer».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo repite el demostrativo al final para enfatizar a la mujer como referente de la frase.
    reason: source_note
lexical_decisions:
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  lexicon: HALOT
  rationale: En este contexto אָדָם contrasta con אִישׁ/אִשָּׁה y se refiere al varón humano concreto que habla; «el hombre» preserva ese contraste y la fluidez natural del español.
- source_word: זֹאת הַפַּעַם
  english_pob_choice: This at last
  chosen_spanish: ¡Esto, por fin!
  alternatives_spanish:
  - ¡Ahora sí!
  - ¡Por fin!
  lexicon: HALOT
  rationale: La expresión hebrea comunica descubrimiento y alivio gozoso. «¡Esto, por fin!» mantiene el énfasis de la demostrativa y la fuerza exclamativa sin volverla mecánica en español.
- source_word: עֶצֶם מֵעֲצָמַי
  english_pob_choice: bone of my bones
  chosen_spanish: hueso de mis huesos
  alternatives_spanish:
  - hueso de mis huesos, literalmente
  - hueso de entre mis huesos
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de pertenencia y parentesco; «hueso de mis huesos» es la correspondencia natural y tradicional en español, y conserva el paralelismo.
- source_word: וּבָשָׂר מִבְּשָׂרִי
  english_pob_choice: flesh of my flesh
  chosen_spanish: carne de mi carne
  alternatives_spanish:
  - carne de mis carnes
  - carne de mi carne, literalmente
  lexicon: HALOT
  rationale: Se mantiene el paralelo con el primer miembro y se conserva el campo semántico literal de בָשָׂר como «carne».
- source_word: לְזֹאת
  english_pob_choice: this one
  chosen_spanish: a esta
  alternatives_spanish:
  - a esta mujer
  - a ella
  lexicon: HALOT
  rationale: El hebreo vuelve a señalar enfáticamente a la mujer recién presentada. «A esta» conserva la deixis sin añadir más de lo que el texto dice.
- source_word: יִקָּרֵא
  english_pob_choice: will be called
  chosen_spanish: se le llamará
  alternatives_spanish:
  - será llamada
  - será nombrada
  lexicon: HALOT
  rationale: El nifal de קרא expresa designación nominal. «Se le llamará» suena natural en español y mantiene la voz pasiva/impersonal del original.
- source_word: אִשָּׁה
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: HALOT
  rationale: «Mujer» es la equivalencia normal y conserva el juego de palabras con אִישׁ en el siguiente miembro; «esposa» restringiría indebidamente el sentido.
- source_word: מֵאִישׁ
  english_pob_choice: from man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de hombre
  - del varón
  lexicon: HALOT
  rationale: La preposición מִן marca procedencia; «del hombre» expresa con naturalidad el origen y mantiene la relación léxica con אִשָּׁה.
- source_word: לֻקֳחָה
  english_pob_choice: she was taken
  chosen_spanish: fue tomada
  alternatives_spanish:
  - ha sido tomada
  - le fue tomada
  lexicon: HALOT
  rationale: La forma pasiva femenina singular se rinde de modo directo. En español, el sujeto puede recuperarse por el contexto; repetir «ella» no es necesario.
- source_word: זֹאת (final)
  english_pob_choice: represented earlier in the clause
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  - ella
  lexicon: HALOT
  rationale: El demostrativo final se conserva para reflejar la redundancia enfática del hebreo, sin introducir una lectura distinta.
theological_decisions:
- issue: אָדָם en contraste con אִישׁ / אִשָּׁה
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: Aunque אָדָם puede ser genérico, aquí el pasaje se construye alrededor del contraste masculino/femenino y del juego de palabras. «El hombre» preserva esa tensión literaria y semántica.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
- issue: Preservación del juego de palabras אִישׁ / אִשָּׁה
  english_pob_reading: woman ... because from man she was taken
  chosen_spanish_reading: mujer ... porque del hombre fue tomada
  alternative_spanish_readings:
  - esposa ... porque del marido fue tomada
  - mujer ... porque del varón fue tomada
  rationale: «Mujer» y «hombre» permiten reproducir el vínculo léxico de manera comprensible en español. «Esposa/marido» estrecharía el alcance del texto y no es requerido por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del POB inglés en el sentido de mantener la correspondencia cercana de «bone of my bones / flesh of my flesh», pero adapta la exclamación idiomática hebrea a una fórmula natural en español: «¡Esto, por fin!» en lugar de una traducción mecánica. También conserva la deixis enfática final del hebreo mediante «esta».'
  spanish_consistency_notes:
  - Se usa «hombre» para אָדָם en este contexto específico, no «ser humano», por el contraste inmediato con «mujer».
  - Se usa «mujer» para אִשָּׁה y no «esposa», siguiendo el valor léxico amplio del término.
  - Se mantiene «carne» para בָשָׂר y no «naturaleza humana», porque el pasaje es concreto y figurado a la vez.
  - Se conserva el paralelismo «hueso de mis huesos / carne de mi carne» como estructura poética reconocible en español.
  - Los demostrativos «esto / esta / esta» reproducen la insistencia del hebreo sin sobrecargar la sintaxis española.
