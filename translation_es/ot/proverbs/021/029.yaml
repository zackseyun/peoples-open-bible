translation:
  language: es
  text: El hombre malvado pone un rostro atrevido[a], pero el recto hace firme su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «endurece su rostro»; el hebreo describe a alguien que hace audaz o endurece su semblante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵעֵז
  english_pob_choice: puts on a bold face
  chosen_spanish: se muestra atrevido
  alternatives_spanish:
  - endurece su rostro
  - se pone un semblante audaz
  - se vuelve descarado
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático con la imagen del rostro; en español, 'se muestra atrevido' comunica la idea de insolencia/boldness sin volverlo torpemente literal. 'Endurece su rostro' preserva más la metáfora, pero suena menos natural en español actual.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: Se conserva el masculino proverbial singular del hebreo, que funciona como tipo representativo en la sabiduría bíblica.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - impío
  - maligno
  - injusto
  lexicon: HALOT
  rationale: '''Malvado'' expresa bien la categoría moral de la sabiduría; ''impío'' puede sonar más religioso y ''maligno'' más fuerte de lo que exige el contexto.'
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - íntegro
  - recto de conducta
  lexicon: HALOT
  rationale: Aunque 'upright' suele corresponder a 'recto' o 'íntegro', aquí el contraste sapiencial con 'wicked' puede expresarse naturalmente como 'justo' en español. Se mantiene el valor ético del término sin perder claridad.
- source_word: יכין
  english_pob_choice: makes ... sure
  chosen_spanish: hace firme
  alternatives_spanish:
  - establece
  - afianza
  - ordena
  lexicon: HALOT
  rationale: El verbo hiphil de כון comunica establecer, hacer firme o poner en orden. 'Hace firme' conserva la fuerza de estabilidad del hebreo y resulta idiomático con 'camino'.
- source_word: דרכיו
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - sus caminos
  - su senda
  - su proceder
  lexicon: HALOT
  rationale: Aunque el plural hebreo puede ser colectivo, en español el singular 'camino' expresa bien el curso de vida proverbially resumido por el texto.
theological_decisions:
- issue: Contraste moral entre 'malvado' y 'justo'
  english_pob_reading: A wicked man ... but the upright man ...
  chosen_spanish_reading: El hombre malvado ... pero el justo ...
  alternative_spanish_readings:
  - El malvado ... pero el recto ...
  - El hombre impío ... pero el íntegro ...
  rationale: La antítesis sapiencial se conserva con términos éticos claros y naturales en español. 'Justo' mantiene el contraste moral con 'malvado' y evita sobrecargar el verso con una glosa demasiado técnica.
  doctrine_reference: Sabiduría bíblica / ética del carácter
- issue: Imagen facial en הֵעֵז בְּפָנָיו
  english_pob_reading: puts on a bold face
  chosen_spanish_reading: se muestra atrevido
  alternative_spanish_readings:
  - endurece su rostro
  - muestra un rostro audaz
  rationale: La imagen hebrea está documentada como idiomática. En español, se conserva la tensión entre literalidad y naturalidad con una expresión que transmite audacia insolente sin borrar la metáfora subyacente.
  doctrine_reference: Metáfora hebrea / idiomatismo sapiencial
translation_notes:
  revision_awareness: El audit trail inglés revisó 'an upright man' a 'the upright man' para reflejar mejor el contraste hebreo; en español eso se refleja naturalmente con 'el justo' como sujeto contrastivo definido. También se mantuvo la decisión de entender הֵעֵז de forma idiomática, no mecánicamente literal.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto; aquí no hay nombre divino explícito.
  - Se evitó 'SEÑOR' y otros equivalentes cultuales ajenos al hebreo del verso.
  - '''Justo'' se eligió como contraparte moral de ''malvado'' en el estilo sapiencial.'
  - '''Su camino'' conserva el sentido colectivo implícito de דרכיו sin sonar forzado en español.'
