    rationale: El hebreo y la auditoría inglesa favorecen el sentido concreto «la plata», reforzado por la repetición y el contexto de fundición. «Dinero» reduce la materialidad relevante del verso.
  - severity: medium
    issue: «doscientos de plata» es demasiado elíptico
    rationale: Aunque el hebreo omite la unidad, en español esta formulación suena extraña. «Doscientas piezas de plata» conserva la indefinición sin imponer «siclos».
  - severity: high
    issue: «un ídolo tallado» sobretraduce פֶּסֶל
    rationale: La decisión teológica auditada pide evitar una paráfrasis más condenatoria que el sustantivo hebreo. «Imagen tallada» es más fiel y suficientemente claro.
  - severity: medium
    issue: Construcción «él lo hizo un ídolo tallado…» poco natural
    rationale: En español conviene «lo hizo una imagen tallada y una imagen fundida» o «lo convirtió en…» para expresar bien la transformación indicada por el contexto.
  - severity: high
