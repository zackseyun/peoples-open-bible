translation:
  language: es
  text: 'Yahvé se enojó también conmigo[a] por causa de ustedes, diciendo: «Tú tampoco entrarás allí».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé se airó contra mí por causa de ustedes».
    reason: lexical_alternative
  - marker: b
    text: Compárese Números 20:12, donde la exclusión de Moisés de entrar en la tierra se relaciona con su propia falta en Meribá; aquí Deuteronomio enfatiza el papel del pueblo en el asunto.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igual
  lexicon: HALOT
  rationale: La partícula añade o intensifica la afirmación. «También» reproduce bien ese valor aditivo en español y conserva el paralelo con el segundo גַּם del versículo.
- source_word: בִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: Con el verbo de enojo, la preposición puede indicar el objeto del enojo. «Conmigo» es la forma natural en español para este uso, sin cargar la idea más de lo que exige el hebreo.
- source_word: הִתְאַנַּף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - estuvo enojado
  lexicon: HALOT
  rationale: El hitpael expresa enfado o ira. «Se enojó» es claro y directo en español; mantiene el sentido sin sonar arcaico o excesivamente intenso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La decisión proyectada para el POB en español es usar «Yahvé» para el Tetragrámaton, preservando el nombre personal del pacto en lugar de sustituirlo por un título.
- source_word: בִּגְלַלְכֶם
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - a causa de ustedes
  - por ustedes
  lexicon: HALOT
  rationale: La expresión indica causa o motivo. «Por causa de ustedes» es natural en español y conserva la fuerza causal de la frase sin suavizarla.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: La forma introduce el discurso citado. «Diciendo» conserva la conexión sintáctica con la declaración siguiente.
- source_word: לֹא תָבֹא
  english_pob_choice: shall not enter
  chosen_spanish: no entrarás
  alternatives_spanish:
  - no irás a entrar
  - no vendrás
  lexicon: HALOT
  rationale: En este contexto בוא señala entrar en la tierra prometida. «Entrarás» comunica con claridad ese destino sin recurrir a un calco menos natural.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: El adverbio remite al lugar previamente mencionado. «Allí» es el equivalente directo y mantiene el valor deíctico del hebreo.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio divino en vez de reemplazarlo por un título. La forma española «Yahvé» sigue la decisión doctrinal del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / equivalente español "Yahvé"'
- issue: Relación causal entre la ira divina y la culpa de los oyentes
  english_pob_reading: The LORD was angry with Moses because of the people, without resolving broader canonical questions here.
  chosen_spanish_reading: Yahvé se enojó también conmigo por causa de ustedes
  alternative_spanish_readings:
  - Yahvé se enojó conmigo a causa de ustedes y además por mi propia culpa
  - Yahvé se enojó conmigo por ustedes, aunque también hubo otra causa
  rationale: 'La traducción conserva la tensión del texto: el pasaje atribuye una relación causal a los oyentes sin intentar armonizarla en el cuerpo del versículo con Números 20. No se resuelve la cuestión canónica, solo se refleja el enunciado de Deuteronomio.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en lo esencial: nombre divino, valor causal de בגללכם, verbos de ira y de entrada, y preservación de la tensión teológica sin armonización en el texto principal. No se registraron revisiones posteriores con cambios sustanciales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como equivalente español consistente del Tetragrámaton.
  - «También» corresponde al doble גַּם y preserva la repetición enfática.
  - «Por causa de ustedes» mantiene el matiz causal sin volverlo interpretativo.
  - El discurso directo se presenta con comillas angulares, conforme a norma española.
  - Se evita «SEÑOR» para no borrar el nombre propio divino documentado en el proyecto.
