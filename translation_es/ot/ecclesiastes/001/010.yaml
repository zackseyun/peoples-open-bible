translation:
  language: es
  text: '¿Hay alguna cosa de la que se diga: «Mira, esto es nuevo»? Ya existía en las épocas[a] que nos precedieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las edades anteriores a nosotros». El hebreo dice literalmente «en las edades/épocas», con referencia a tiempos remotos anteriores a la generación presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: Is there
  chosen_spanish: ¿Hay
  alternatives_spanish:
  - ¿Existe
  - ¿Hay acaso
  lexicon: HALOT
  rationale: En español, la pregunta existencial se expresa de forma natural con «hay». Conserva la fuerza retórica del hebreo y del inglés POB sin volverla más pesada.
- source_word: דָּבָר
  english_pob_choice: a thing
  chosen_spanish: alguna cosa
  alternatives_spanish:
  - una cosa
  - algún asunto
  lexicon: HALOT
  rationale: «דָּבָר» es muy amplio. «Alguna cosa» mantiene la apertura semántica de una instancia cualquiera de novedad, más cercano al matiz del inglés POB que un término más técnico.
- source_word: שֶׁיֹּאמַר
  english_pob_choice: of which one says
  chosen_spanish: de la que se diga
  alternatives_spanish:
  - de la cual uno diga
  - de la que alguien diga
  lexicon: HALOT
  rationale: La construcción impersonal se conserva con «se diga», que suena natural en español y reproduce el valor genérico del hebreo sin asignar un sujeto concreto.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Imperativo de atención. «Mira» es directo y actual en español; evita el tono arcaizante de «he aquí» o «hebehold» y conserva la deixis del original.
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este
  - aquí
  lexicon: HALOT
  rationale: El demostrativo apunta a la supuesta novedad. «Esto» encaja con la cita directa y con el español coloquial-digno del texto.
- source_word: חָדָשׁ
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - reciente
  - novedoso
  lexicon: HALOT
  rationale: Es el sentido básico del adjetivo. «Nuevo» conserva la afirmación evaluativa del hablante sin ampliar el sentido.
- source_word: כְּבָר הָיָה
  english_pob_choice: It has already been
  chosen_spanish: Ya había existido
  alternatives_spanish:
  - Ya había sido
  - Ya estaba
  lexicon: HALOT
  rationale: La combinación expresa prioridad temporal y existencia previa. «Había existido» comunica con precisión la anterioridad sobre la pretensión de novedad, y «ya» refleja כְּבָר.
- source_word: לְעֹלָמִים
  english_pob_choice: in the ages
  chosen_spanish: en los siglos
  alternatives_spanish:
  - en las edades
  - por siglos
  - en los tiempos
  lexicon: HALOT
  rationale: El plural apunta a períodos de tiempo remotos. «Siglos» es una forma natural en español para esa amplitud temporal; «edades» sonaría menos idiomático y «tiempos» sería más vago.
- source_word: אֲשֶׁר הָיָה מִלְּפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: antes de nosotros
  alternatives_spanish:
  - delante de nosotros
  - que fue antes de nosotros
  lexicon: HALOT
  rationale: La referencia es temporal, no espacial. «Antes de nosotros» es la forma más clara y fiel en español para señalar generaciones o tiempos previos.
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y el auditable del POB en inglés. Se mantuvo la pregunta retórica, la cita entrecomillada y la afirmación de existencia previa; el principal ajuste fue naturalizar «of which one says» como «de la que se diga» y «in the ages before us» como «en los siglos antes de nosotros», sin perder el plural temporal.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» fuera de este versículo porque no aparecen en el texto.
  - Se usó un registro sobrio y publicable, evitando arcaísmos innecesarios.
  - Se prefirió una solución con «ya había existido» para conservar la anterioridad perfecta del hebreo y la lectura idiomática en español.
