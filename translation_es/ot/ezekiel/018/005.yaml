translation:
  language: es
  text: Pero si un hombre es justo y hace justicia y rectitud,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ahora bien, si un hombre» o «Y si un hombre»; la conjunción hebrea puede marcar una simple continuación además de contraste.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ
  english_pob_choice: But if a man
  chosen_spanish: Pero si un hombre
  alternatives_spanish:
  - Ahora si un hombre
  - Y si un hombre
  - Pero si alguien
  lexicon: HALOT
  rationale: אִישׁ es un sustantivo singular masculino; se conserva «un hombre» para mantener la forma representativa y la precisión de género del hebreo. El וְ inicial se vierte con fuerza discursiva como «Pero», siguiendo la lectura de contraste/continuación condicional documentada en el audit trail.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: En esta construcción condicional, כִּי introduce la prótasis; «si» es la equivalencia natural en español y preserva la función sintáctica.
- source_word: יִהְיֶה
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - llega a ser
  - será
  lexicon: HALOT
  rationale: 'Aunque la forma verbal es imperfecta, en español la condición general se expresa de manera idiomática en presente: «es».'
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: HALOT
  rationale: En este contexto ético-forense, «justo» comunica bien la calidad moral exigida y mantiene la correlación con la pareja «justicia / rectitud» del resto del versículo.
- source_word: וְ/עָשָׂה
  english_pob_choice: and does
  chosen_spanish: y practica
  alternatives_spanish:
  - y hace
  - y actúa con
  lexicon: HALOT
  rationale: Con objetos éticos como מִשְׁפָּט y צְדָקָה, «practica» expresa con naturalidad una conducta habitual sin perder el valor concreto de עשה.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo justo
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט se entiende mejor como justicia en el sentido de conducta/juzgar rectamente; «la justicia» evita la ambigüedad de «juicio» en español.
- source_word: וּ/צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la justicia y la rectitud
  lexicon: HALOT
  rationale: Para distinguir el segundo término del binomio hebreo sin colapsarlo con מִשְׁפָּט, «rectitud» funciona bien en español y preserva la pareja semántica justicia/rectitud.
theological_decisions:
- issue: Sujeto masculino singular representativo
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa אִישׁ, masculino singular. Se conserva «un hombre» para respetar la referencia representativa y la precisión de género, sin neutralizarla.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Pareja ética מִשְׁפָּט / צְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: la justicia y la rectitud
  alternative_spanish_readings:
  - el juicio y la justicia
  - la justicia y la justicia
  rationale: La tradición POB distingue los dos términos hebreos sin fusionarlos. En español, «justicia» + «rectitud» conserva la diferencia léxica y el paralelismo del texto.
  doctrine_reference: Lexical distinction in wisdom/prophetic ethical pairs
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia y no registra revisiones aplicadas; esta versión española sigue la misma lectura óptima, conservando la fuerza condicional y la distinción semántica entre «justicia» y «rectitud».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes de máscara porque el verso no contiene el nombre divino.
  - Se mantuvo «hombre» por la singularidad masculina del hebreo אִישׁ, conforme al criterio de precisión de género.
  - Se usó «rectitud» para צְדָקָה a fin de no duplicar «justicia» y preservar el paralelismo hebreo.
