review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del arameo: la metáfora antropomórfica del ''ojo'', el complemento ''de su Dios'', ''los ancianos de los judíos'', la fuerza causativa de ''no los hicieron parar'', la referencia a un decreto/decisión remitido a Darío y la secuencia final sobre una carta acerca del asunto. Sin embargo, varias formulaciones españolas son poco naturales o ligeramente imprecisas para el registro bíblico claro que busca el proyecto.'
  spanish_quality_summary: La principal dificultad no es de fidelidad, sino de naturalidad idiomática. 'Estaba sobre' suena calcado en español; 'vigilando sobre' en nota también es poco idiomático. 'Fuera a Darío' resulta torpe para expresar dirección; 'llegara a Darío' es más natural. 'Ellos enviarían de vuelta' también suena forzado; 'enviarían una respuesta por escrito' o 'enviarían de vuelta una carta' sería mejor, pero dado el sustantivo נִשְׁתְּוָנָא, conviene mantener 'carta' en el texto y dejar 'respuesta por escrito' como alternativa. También conviene omitir el pronombre explícito 'ellos' por naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé ni otros términos de glosario sensibles. La decisión de conservar 'Dios' y la metáfora 'ojo' es correcta. Se recomienda ajustar solo la idiomaticidad española sin alterar las decisiones léxicas clave.
  issues:
  - severity: medium
    issue: '''el ojo de su Dios estaba sobre'' suena calco poco natural en español'
    rationale: Preserva bien la metáfora, pero en español bíblico claro 'estaba puesto sobre' mantiene la imagen y mejora la fluidez.
  - severity: medium
    issue: '''fuera a Darío'' es una construcción poco idiomática'
    rationale: Para expresar el movimiento pendiente del decreto hacia Darío, 'llegara a Darío' comunica mejor el sentido futuro/direccional del arameo sin perder precisión.
  - severity: medium
    issue: '''ellos enviarían de vuelta una carta'' es pesado y poco natural'
    rationale: El pronombre es innecesario, y la secuencia suena traducida mecánicamente. 'entonces enviarían de vuelta una carta' mejora la lectura manteniendo la idea de retorno.
  - severity: low
    issue: Nota [a] usa 'vigilando sobre', también poco idiomático
    rationale: En español es mejor 'vigilando a' o 'velando por'. Como alternativa léxica al modismo, 'velando por los ancianos de los judíos' suena mejor.
