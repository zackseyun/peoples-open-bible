translation:
  language: es
  text: 'A lo largo del límite de Judá, desde el lado oriental hasta el lado occidental, estará la contribución[a] que ustedes apartarán: veinticinco mil de ancho, y de largo como una de las porciones, desde el lado oriental hasta el lado occidental[b][c]; y el santuario estará en medio de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda» o «la porción apartada». El término hebreo se refiere a una parte separada especialmente para uso santo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde el extremo oriental hasta el extremo marítimo»; «lado occidental» expresa el sentido direccional idiomático.
    reason: lexical_alternative
  - marker: c
    text: Es decir, con la longitud de una de las porciones asignadas en el reparto de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde territorial
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, גְּבוּל designa el contorno o demarcación de la porción. «Límite» comunica bien la idea geográfica sin sonar demasiado técnica o militar como «frontera».
- source_word: מִפְּאַת קָדִים ... עַד פְּאַת יָמָּה
  english_pob_choice: from the east side to the west side
  chosen_spanish: desde el lado oriental hasta el lado occidental
  alternatives_spanish:
  - desde el extremo oriental hasta el extremo occidental
  - desde el oriente hasta el occidente
  lexicon: HALOT
  rationale: פֵּאָה indica lado, extremo o borde. «Lado oriental / lado occidental» conserva el valor direccional y evita una traducción demasiado literal de «seaward side», que en español sería opaca en este pasaje de medición.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la porción apartada
  - el distrito apartado
  lexicon: HALOT
  rationale: El término denota algo levantado o apartado para uso santo. «Contribución» mantiene el núcleo léxico y, con el contexto inmediato de «apartarán», deja visible el sentido técnico sin forzarlo a un vocabulario sacrificial.
- source_word: תָּרִימוּ
  english_pob_choice: you shall set apart
  chosen_spanish: apartarán
  alternatives_spanish:
  - ofrecerán
  - levantarán
  lexicon: HALOT
  rationale: El Hifil de רוּם aquí expresa dedicar o separar para un uso consagrado. «Apartarán» es natural en español y evita sugerir exclusivamente un acto de sacrificio que no corresponde al reparto territorial.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - veinticinco mil unidades
  - veinticinco mil codos
  lexicon: HALOT
  rationale: Se conserva el número cardinal de modo directo. Como en el hebreo, la unidad no se repite en esta cláusula; el contexto de medidas del capítulo la provee.
- source_word: רֹחַב
  english_pob_choice: in width
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - en ancho
  lexicon: HALOT
  rationale: Es un sustantivo dimensional en un contexto de medición. «De ancho» resulta natural en español y corresponde a la idea de medida transversal.
- source_word: אֹרֶךְ
  english_pob_choice: in length
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - largo
  lexicon: HALOT
  rationale: También es un sustantivo dimensional. «De largo» conserva la simetría con «de ancho» y suena fluido en español contemporáneo.
- source_word: כְּאַחַד הַחֲלָקִים
  english_pob_choice: like one of the portions
  chosen_spanish: como una de las porciones
  alternatives_spanish:
  - como una de las reparticiones
  - como una de las partes
  lexicon: HALOT
  rationale: חֵלֶק significa porción, parte o lote asignado. El hebreo no dice explícitamente «tribales» en la forma del texto; por eso se mantiene el término general «porciones», en línea con la revisión auditada del POB en inglés.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el templo
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa el recinto o espacio santo. «Santuario» es la equivalencia estándar y suficientemente amplia para esta ubicación central.
- source_word: בְּתוֹכוֹ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en su centro
  lexicon: HALOT
  rationale: La frase indica ubicación central dentro de la franja apartada. En español, «en medio de ella» es claro y mantiene la imagen espacial del hebreo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al mantener «porciones» sin añadir «tribales», porque ese rasgo no está explícito en el hebreo. También se respetó la decisión de traducir el giro direccional como una extensión de este a oeste en sentido idiomático, no como una glosa geográfica literal opaca para el lector español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda al Tetragrámaton, pero este versículo no lo contiene.
  - Se usó «santuario» para מִקְדָּשׁ, consistente con el uso del POB y con el registro bíblico en español.
  - «Contribución» conserva la terminología especial de תְּרוּמָה sin sustituirla por un término devocional más tradicional que podría borrar su valor técnico en el reparto territorial.
