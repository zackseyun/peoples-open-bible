translation:
  language: es
  text: Y no permitas que me engañe la belleza de una mujer impía[a], ni de nada puesto delante de mí por un pecado inútil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni de nada puesto delante de mí».'
