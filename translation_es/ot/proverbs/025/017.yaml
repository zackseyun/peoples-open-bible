translation:
  language: es
  text: Que tu pie sea pocas veces en la casa de tu vecino[a][b], no sea que se sacie de ti y te aborrezca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “Haz raro tu pie de la casa de tu vecino”. La expresión significa visitar con poca frecuencia.'
    reason: lexical_alternative
  - marker: b
    text: O “tu amigo”; el hebreo רֵעַ puede significar “vecino”, “amigo” o “compañero”.
    reason: alternative_reading
lexical_decisions:
- source_word: הֹקַר
  english_pob_choice: Let ... be seldom
  chosen_spanish: Haz raro
  alternatives_spanish:
  - Haz escaso
  - Visita con poca frecuencia
  - Retén
  lexicon: HALOT
  rationale: El hebreo usa un imperativo idiomático que no pide “honrar” literalmente el pie, sino volver raras las visitas. “Haz raro” conserva la fuerza del imperativo y refleja bien la idea de frecuencia baja sin añadir paráfrasis excesiva.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  - tus pasos
  lexicon: HALOT
  rationale: La singular hebrea se conserva con “tu pie”, manteniendo la imagen concreta del cuerpo que funciona como idiom de visitas o ida y vuelta.
- source_word: מִבֵּית
  english_pob_choice: in ... house
  chosen_spanish: en la casa de
  alternatives_spanish:
  - de la casa de
  - a la casa de
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es “de/desde”, en el español del proverbio la relación idiomática se expresa con naturalidad mediante “en la casa de”, porque el punto es la presencia frecuente en ese lugar.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu amigo
  - tu compañero
  lexicon: HALOT
  rationale: רֵעַ puede ser vecino, amigo o compañero. “Prójimo” comunica una relación social cercana pero no necesariamente íntima, y funciona bien en español bíblico actual; se mantiene la amplitud semántica sin restringirla a “amigo”.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o no vaya a ser que
  - no vaya a ser que
  lexicon: HALOT
  rationale: La partícula introduce una advertencia de resultado indeseable. “No sea que” es una manera clara y natural en español de expresar esa prevención.
- source_word: יִשְׂבָּעֲךָ
  english_pob_choice: he have his fill of you
  chosen_spanish: se sacie de ti
  alternatives_spanish:
  - se harta de ti
  - se canse de ti
  - quede lleno de ti
  lexicon: HALOT
  rationale: El verbo de “estar satisfecho/saciado” conserva la metáfora de plenitud que, en este contexto, se vuelve hastío por presencia excesiva. “Se sacie de ti” mantiene esa imagen sin suavizarla demasiado.
- source_word: וּשְׂנֵאֶךָ
  english_pob_choice: and hate you
  chosen_spanish: y te aborrezca
  alternatives_spanish:
  - y te odie
  - y te deteste
  - y te llegue a odiar
  lexicon: HALOT
  rationale: El hebreo expresa el resultado temido con el verbo fuerte de odio. “Aborrezca” conserva un registro bíblico pero claro en español y evita debilitar el matiz con una formulación demasiado leve.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido idiomático confirmado por el audit trail inglés: la rareza de las visitas, el valor amplio de רֵעַ, y el resultado temido de saciedad que termina en odio. No se observan revisiones aplicadas en el paquete fuente, y la versión actual permanece estable.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH como “Yahvé” como norma del proyecto, pero este versículo no lo contiene.
  - Se usa “prójimo” por su amplitud semántica; la nota preserva las alternativas “amigo” y “compañero”.
  - Se conserva la metáfora corporal del “pie” en lugar de reemplazarla por una explicación interpretativa en el texto principal.
  - “Aborrezca” se eligió por su fuerza y registro bíblico, coherente con el odio explícito del hebreo y del texto auditado en inglés.
