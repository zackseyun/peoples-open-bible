translation:
  language: es
  text: Entonces el sacerdote mandará que laven la cosa[a] en la que está la infección, y la aislará[b] por siete días, una segunda vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el artículo en el que está la infección”. La expresión hebrea es deliberadamente amplia y se refiere al objeto afectado que está siendo examinado.
    reason: lexical_alternative
  - marker: b
    text: O “la encerrará”. Más literalmente, “la pondrá bajo encierro”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: Then ... shall command
  chosen_spanish: Entonces ... mandará
  alternatives_spanish:
  - Y ... mandará
  - Luego ... ordenará
  lexicon: HALOT
  rationale: El waw narrativo/instruccional en contexto legal se expresa naturalmente con una secuencia futura en español; «Entonces» conserva el valor procedural de la acción. «Mandará» mantiene el tono de autoridad cultual sin sobrecargar el registro.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En español bíblico actual, «sacerdote» comunica con claridad la figura cultual de Levítico. No se requiere un término más técnico aquí.
- source_word: וְכִבְּסוּ
  english_pob_choice: them to wash
  chosen_spanish: lavar
  alternatives_spanish:
  - que laven
  - para lavar
  lexicon: HALOT
  rationale: El hebreo tiene un verbo plural dependiente del mandato del sacerdote; en español, una subordinada de mandato con infinitivo es natural y evita especificar indebidamente los agentes.
- source_word: אֵת אֲשֶׁר בּוֹ הַנָּגַע
  english_pob_choice: the thing in which the infection is
  chosen_spanish: la cosa en la que está la infección
  alternatives_spanish:
  - la cosa en que está la infección
  - el objeto en el que está la infección
  - la cosa donde está la infección
  lexicon: HALOT
  rationale: La construcción hebrea es deliberadamente amplia y se refiere al objeto afectado; «la cosa» conserva esa amplitud. «Está la infección» reproduce la relación de presencia sin cerrar el sentido a un solo tipo de objeto.
- source_word: הַנָּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la plaga
  - la afección
  - la llaga
  lexicon: HALOT
  rationale: En este contexto de pureza/impureza sobre objetos, «infección» refleja adecuadamente la idea de contaminación o afección que afecta el objeto, manteniendo el valor serio del término sin introducir un matiz demasiado médico o demasiado tradicional.
- source_word: וְהִסְגִּירוֹ
  english_pob_choice: and he shall quarantine it
  chosen_spanish: la pondrá en cuarentena
  alternatives_spanish:
  - la aislará
  - la encerrará
  - la pondrá aparte
  lexicon: HALOT
  rationale: «Poner en cuarentena» comunica bien la función procedural de aislar el objeto para observación; es más transparente en español contemporáneo que un calco como «la encerrará» o «la pondrá aparte».
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: La preposición «por» expresa duración de manera idiomática y precisa en español.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: una segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  - por segunda vez
  lexicon: HALOT
  rationale: «Una segunda vez» reproduce explícitamente la idea de repetición del período de aislamiento, tal como lo hace el inglés auditado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas al texto español con los marcadores [a] y [b]. No se añadieron notas no ancladas.
  spanish_consistency_notes:
  - Se mantuvo el término «sacerdote» por claridad cultual y consistencia bíblica en español.
  - Se preservó «infección» para reflejar el campo semántico de נגע en este contexto de inspección ritual sobre objetos.
  - Se eligió una construcción verbal natural en español para expresar el mandato indirecto sin forzar un calco del plural hebreo.
