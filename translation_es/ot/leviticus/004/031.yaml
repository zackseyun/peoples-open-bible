base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/031.yaml
  text: And he shall remove all its fat[a], just as the fat is removed from the sacrifice of peace offerings, and the priest shall burn it on the altar as a pleasing aroma to Yahweh. And the priest shall make atonement for him[b], and he will be forgiven.
  footnotes:
  - marker: a
    text: Or 'the sacrifice of fellowship offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a pleasing aroma,' a stock sacrificial expression for an offering accepted by the LORD.
    reason: cultural_note
