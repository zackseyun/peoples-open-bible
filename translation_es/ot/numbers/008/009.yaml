revisions:
- from: Entonces harás acercar a los levitas delante del tabernáculo de reunión, y reunirás a toda la congregación de los hijos de Israel[a].
  to: Entonces harás acercar a los levitas delante de la tienda de reunión, y reunirás a toda la congregación de los hijos de Israel[a].
  rationale: Se ajusta אֹהֶל מוֹעֵד a “la tienda de reunión” para reflejar con mayor fidelidad el hebreo y la decisión léxica documentada en el POB inglés. Se conserva “harás acercar” por su valor causativo ritual, aunque no es la opción más idiomática. La nota sobre “los hijos de Israel” se mantiene porque preserva una alternativa española más natural sin perder la forma fuente en el texto principal.
