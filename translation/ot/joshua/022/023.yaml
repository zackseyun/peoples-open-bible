theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the final clause in an oath context
  chosen_reading: may the LORD himself require it
  alternative_readings:
  - the LORD himself will require it
  rationale: The verse continues a self-maledictory oath from the surrounding context. Rendering the clause with 'may' preserves the imprecatory force without overstating simple futurity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
