    text: O «haré contigo» o «actuaré contigo»; el hebreo usa un verbo general con sentido retributivo o judicial.
    reason: lexical_alternative
  - marker: b
    text: O «la maldición»; el hebreo אָלָה puede referirse al juramento solemne y también a la maldición vinculada al pacto.
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura a «Yahvé, el Señor» para preservar explícitamente el nombre divino y el título sin la secuencia menos natural «el Señor Yahvé». Se simplifica «como tú has hecho» a «como has hecho» para un flujo más natural sin pérdida de sentido. La nota [a] se corrige para reflejar alternativas realmente cercanas al hebreo y al audit trail, manteniendo el matiz judicial. La nota [b] se conserva con leve pulido.
