revisions:
- from: Circuncidaréis la carne de vuestro prepucio[a], y será por señal del pacto entre mí y vosotros.
  to: Circuncidarán la carne de su prepucio[a], y esto será una señal del pacto entre mí y ustedes.
  rationale: Se ajusta el registro al español neutral latinoamericano, se reemplaza la formulación algo rígida 'por señal' por la expresión más natural y fiel 'una señal', y se evita 'vosotros' en favor de 'ustedes'. También se explicita con 'esto' el referente de 'será' para mayor claridad en español, sin añadir contenido ajeno al hebreo.
