translation:
  language: es
  text: Y la guerra volvió[a] a empezar, y David salió y peleó contra los filisteos, y les asestó un gran golpe, de modo que huyeron delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la guerra continuó» / «hubo guerra otra vez». El hebreo literalmente dice «la guerra añadió a ser», un modismo que expresa guerra renovada o continuada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹסֶף הַמִּלְחָמָה לִהְיוֹת
  english_pob_choice: the war broke out again
  chosen_spanish: la guerra volvió a empezar
  alternatives_spanish:
  - la guerra continuó
  - hubo guerra otra vez
  lexicon: HALOT
  rationale: El hebreo usa יסף + infinitivo de היה para indicar reanudación o repetición de la guerra. En español, «volvió a empezar» comunica con naturalidad esa reanudación sin perder el matiz de recurrencia; «continuó» suaviza demasiado la idea de reinicio, y «hubo guerra otra vez» es más literal pero menos fluido.
- source_word: וַיֵּצֵא דָוִד
  english_pob_choice: David went out
  chosen_spanish: David salió
  alternatives_spanish:
  - David salió para la batalla
  - David salió de la presencia de Saúl
  lexicon: HALOT
  rationale: צא significa literalmente «salir». Como el contexto militar ya está dado, «David salió» conserva la concisión del hebreo sin añadir lo que el texto no dice explícitamente.
- source_word: וַיִּלָּחֶם בַּפְּלִשְׁתִּים
  english_pob_choice: fought against the Philistines
  chosen_spanish: peleó contra los filisteos
  alternatives_spanish:
  - luchó contra los filisteos
  - hizo guerra contra los filisteos
  lexicon: HALOT
  rationale: La construcción con לחם expresa combate hostil; «contra» evita la ambigüedad de «con» y mantiene el sentido de enfrentamiento militar.
- source_word: וַיַּךְ בָּהֶם מַכָּה גְדוֹלָה
  english_pob_choice: struck them with a great blow
  chosen_spanish: hirió entre ellos un gran golpe
  alternatives_spanish:
  - les asestó un gran golpe
  - les infligió una gran derrota
  lexicon: HALOT
  rationale: נכה + מכה es una fórmula de herir/abatir con fuerza. «Hirió ... un gran golpe» conserva la imagen semítica de un golpe devastador; «asestó» es posible, pero el hebreo mantiene el foco en el golpe recibido más que en la acción del agresor.
- source_word: וַיָּנֻסוּ מִפָּנָיו
  english_pob_choice: they fled before him
  chosen_spanish: huyeron delante de él
  alternatives_spanish:
  - huyeron de delante de él
  - huyeron de él
  lexicon: HALOT
  rationale: מִפָּנָיו literalmente es «de delante de él / de su presencia». «Delante de él» reproduce bien el valor espacial-relacional del hebreo y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail en inglés y mantiene la equivalencia óptima: conserva el giro hebreo de reanudación de la guerra, la concisión de «salió», el valor hostil de «contra», la imagen de «gran golpe» y el desplazamiento espacial de «delante de él».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el proyecto cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se prefiere «filisteos» como etnónimo bíblico habitual en español.
  - Se evita «SEÑOR» y otras sustituciones no presentes en el versículo.
  - La puntuación sigue el castellano moderno con coordinación narrativa clara.
