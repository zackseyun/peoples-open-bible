    text: 'Hebreo: ‘en el año treinta y seis del reinado de Asa’. Esto crea una tensión cronológica con la cronología de Baasa en 1 Reyes; algunos lo entienden contando desde la división del reino, y otros proponen una corrección textual conciliadora.'
    reason: alternative_reading
  revision_rationale: Se ajustó ‘fortificó’ a ‘edificó’ para reflejar mejor el verbo hebreo בנה sin sobreespecificarlo. También se reformuló la cláusula final para que el español comunique con claridad el sentido de bloqueo de acceso relacionado con Asa, evitando la expresión poco natural ‘entrara a Asa’. Se conservó la nota cronológica y la datación masorética en el texto principal.
