translation:
  language: es
  text: Y el gobernador les dijo que no debían comer de las porciones santísimas hasta que se levantara un sacerdote con Urim y Tumim[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Tirshatá», título administrativo persa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las porciones sacerdotales santísimas; no el «Santo de los Santos» del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el Tirshatá
  - el gobernador de la provincia
  lexicon: HALOT
  rationale: La fuente hebrea usa un título administrativo persa, no un nombre propio. En español, «el gobernador» comunica con claridad el oficio y conserva la función del cargo; se deja constancia de la alternativa transliterada porque el texto fuente la admite.
- source_word: אֲשֶׁר לֹא יֹאכְלוּ
  english_pob_choice: that they should not eat
  chosen_spanish: que no debían comer
  alternatives_spanish:
  - que no comieran
  - que no habían de comer
  - que no debían participar
  lexicon: HALOT
  rationale: La forma hebrea expresa una prohibición dentro del discurso reportado. «Debían» conserva el matiz directivo sin sonar áspero en español y se alinea con la revisión inglesa que prefirió una prohibición directa y natural.
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: from the most holy things
  chosen_spanish: de las cosas santísimas
  alternatives_spanish:
  - de las cosas más santas
  - de las porciones santísimas
  - del santo de los santos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en este contexto, se refiere a porciones/ofrendas sagradas, no al santuario interior. «Cosas santísimas» mantiene el superlativo de santidad y evita una lectura engañosa como «Santo de los santos».
- source_word: עַד עֲמֹד הַכֹּהֵן
  english_pob_choice: until a priest should arise
  chosen_spanish: hasta que se levantara un sacerdote
  alternatives_spanish:
  - hasta que surgiera un sacerdote
  - hasta que apareciera un sacerdote
  - hasta que se presentara un sacerdote
  lexicon: HALOT
  rationale: El infinitivo con עַד marca un límite temporal futuro. «Se levantara» conserva la idea de surgir o presentarse para ejercer la función requerida, sin forzar una imagen demasiado literal.
- source_word: לְאוּרִים וְתוּמִּים
  english_pob_choice: with Urim and Thummim
  chosen_spanish: con Urim y Tumim
  alternatives_spanish:
  - por medio de Urim y Tumim
  - mediante Urim y Tumim
  lexicon: HALOT
  rationale: Son términos técnicos sacerdotales que se transliteran. «Con» reproduce de manera natural el valor instrumental/acompañante del hebreo y conserva la referencia cultual tradicional.
theological_decisions:
- issue: Sentido de «las cosas santísimas»
  english_pob_reading: priestly holy portions/offerings, not the inner sanctuary
  chosen_spanish_reading: porciones u ofrendas sagradas destinadas al consumo sacerdotal, no el recinto del santuario interior
  alternative_spanish_readings:
  - el Santo de los Santos
  - las ofrendas más santas
  rationale: El contexto habla de comer, no de entrar en un lugar sagrado. Por eso la traducción debe orientar al lector hacia alimento ritual reservado, evitando trasladar aquí el significado de un espacio sacro.
  doctrine_reference: Translation philosophy §1, §3
- issue: Función de Urim y Tumim
  english_pob_reading: traditional priestly means of discernment
  chosen_spanish_reading: medios sacerdotales de discernimiento, conservados como nombre técnico
  alternative_spanish_readings:
  - instrumentos de juicio
  - dispositivos de consulta
  rationale: La frase remite a un mecanismo cultual de consulta divina cuyo sentido exacto no se especifica aquí. La transliteración preserva la tensión histórica y evita una explicación más precisa de lo que el texto no desarrolla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una prohibición directa («should not eat») y mantuvo «with Urim and Thummim». La versión española refleja esa decisión con una prohibición clara y la transliteración tradicional de los términos técnicos, sin introducir una interpretación adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Urim y Tumim» se conserva como par técnico fijo, con transliteración uniforme.
  - «Gobernador» se usa para el título persa administrativo, coherente con el criterio del proyecto de traducir títulos cuando es posible.
  - «Cosas santísimas» evita la expresión litúrgica tradicional «Santo de los Santos» para no confundir comida sagrada con el recinto del templo.
