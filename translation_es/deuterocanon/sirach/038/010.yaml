translation:
  language: es
  text: Apártate de la maldad, y endereza tus manos[a]; y de todo pecado[b] limpia tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula media es textualmente difícil en el hebreo conservado. El griego paralelo dice «endereza tus manos», lo que probablemente refleja el sentido previsto de rectificar las acciones.
    reason: textual_variant
  - marker: b
    text: O «de todas las transgresiones». El término hebreo puede tener el sentido más fuerte de ofensas rebeldes, aunque el paralelo griego dice «de todo pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: נום / ἀπόστησον
  english_pob_choice: Turn away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Aléjate
  - Vuélvete
  lexicon: HALOT; LXX ἀπόστησον
  rationale: El hebreo y el griego expresan alejamiento activo del mal. «Apártate» conserva el imperativo y suena natural en español bíblico moderno, sin perder la idea de retirada ética.
- source_word: מעול / πλημμελίαν
  english_pob_choice: from wrongdoing
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - de la maldad
  - de la iniquidad
  - de la transgresión
  lexicon: HALOT
  rationale: עול puede abarcar daño, injusticia o torcedura moral. En español, «injusticia» refleja bien ese campo semántico y mantiene la fuerza ética; «transgresión» sería posible, pero en esta primera cláusula suena menos directo que el término general del hebreo.
- source_word: ומהכר פנים / εὔθυνον χεῖρας
  english_pob_choice: and make your hands straight
  chosen_spanish: y endereza tus manos
  alternatives_spanish:
  - y pon rectas tus manos
  - y dirige rectamente tus manos
  - y corrige tus obras
  lexicon: HALOT; Greek parallel
  rationale: El hebreo es difícil y el griego ofrece con claridad «hacer rectas las manos». «Endereza tus manos» sigue de cerca ese sentido y conserva la imagen corporal del texto, que en español puede entenderse como rectificar la conducta.
- source_word: ומכל פשעים / ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: and from every sin
  chosen_spanish: y de todo pecado
  alternatives_spanish:
  - y de toda transgresión
  - y de toda ofensa
  lexicon: HALOT; Greek parallel
  rationale: El hebreo puede sugerir «transgresiones», pero el paralelo griego dice «todo pecado». «Pecado» es suficientemente amplio en español y armoniza con el cierre de la exhortación.
- source_word: טהר לב / καθάρισον καρδίαν
  english_pob_choice: cleanse your heart
  chosen_spanish: limpia tu corazón
  alternatives_spanish:
  - purifica tu corazón
  - lava tu corazón
  lexicon: HALOT
  rationale: טהר significa limpiar/purificar. «Limpia tu corazón» es claro, bíblico y directo; mantiene la acción moral interior sin sonar excesivamente técnico.
theological_decisions:
- issue: Uso del paralelo griego para iluminar una cláusula hebrea difícil
  english_pob_reading: Follow the Hebrew as primary witness, but let the Greek clarify the middle clause as an exhortation to rectify one's actions ('make your hands straight').
  chosen_spanish_reading: Seguir el hebreo como testimonio principal, pero dejar que el griego aclare la cláusula media como una exhortación a rectificar la conducta («endereza tus manos»).
  alternative_spanish_readings:
  - Traducir la cláusula media de forma muy literal según el hebreo incierto
  - Interpretarla como un modismo de expresión facial o gesto sin apoyo claro
  rationale: En Sirácides, el hebreo conservado guía la traducción, pero aquí la lectura es incierta y el paralelo griego ofrece una frase coherente. La versión española refleja ese valor aclaratorio sin ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, usando el paralelo griego como entrada real para Sirácides'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la redacción española se ajusta al estado auditado más reciente, que indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se conserva «Dios»/«Yahvé» como norma del proyecto, pero este versículo no los contiene.
  - Se usa «pecado» para armonizar con el paralelo griego, sin borrar que el hebreo puede tener un matiz más fuerte de transgresión o rebeldía.
  - «Endereza tus manos» mantiene la metáfora corporal y evita una paráfrasis demasiado libre como «corrige tus obras», que se deja solo como alternativa interpretativa.
