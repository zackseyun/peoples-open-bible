  from: returned to go back
  to: turned back to return
  rationale: The Hebrew text uses the root שׁוּב twice for emphasis (וַיָּשֻׁבוּ... לָשׁוּב), signifying 'they returned in order to return.' The draft's 'returned to go back' is a valid attempt to avoid the English awkwardness of 'returned to return,' but it is itself somewhat pleonastic and clunky. Using 'turned back to return' better captures the two distinct verbal ideas (the initial action of turning from the battlefield and the purpose of returning home) while still reflecting the repeated Hebrew root and sounding more natural in English.
