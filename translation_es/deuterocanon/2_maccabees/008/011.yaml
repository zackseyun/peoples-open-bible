translation:
  language: es
  text: Así que enseguida envió mensaje a las ciudades junto al mar,[a] invitándolas a comprar cuerpos judíos, prometiendo entregar noventa cuerpos por un talento;[b] pero no esperaba el castigo del Todopoderoso que estaba por alcanzarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «las ciudades junto al mar»; también puede expresarse como «las ciudades costeras» o «las ciudades de la costa».
    reason: lexical_alternative
  - marker: b
    text: O «la justicia del Todopoderoso que estaba por alcanzarlo». El griego δίκη puede significar justicia en acción o el castigo resultante; aquí se ha optado por «castigo» por el contexto de retribución inminente.
    reason: alternative_reading
lexical_decisions:
- source_word: παραθαλασσίους πόλεις
  english_pob_choice: the cities along the coast
  chosen_spanish: las ciudades junto al mar
  alternatives_spanish:
  - las ciudades costeras
  - las ciudades de la costa
  lexicon: LSJ
  rationale: El griego significa ciudades ubicadas junto al mar o en la costa. «Junto al mar» suena natural en español y conserva la referencia geográfica sin perder claridad.
- source_word: προκαλούμενος
  english_pob_choice: inviting
  chosen_spanish: invitándolas
  alternatives_spanish:
  - llamándolas
  - solicitándolas
  lexicon: LSJ
  rationale: En este contexto comercial la forma verbal expresa una convocatoria o solicitud para comprar. «Invitándolas» conserva el matiz de oferta dirigida sin sobrecargar el español.
- source_word: ἐπʼ ἀγορασμὸν
  english_pob_choice: to buy
  chosen_spanish: a comprar
  alternatives_spanish:
  - para comprar
  - para la compra
  lexicon: LSJ
  rationale: La frase indica propósito de compra. En español, «a comprar» integra bien la idea de finalidad y mantiene el valor verbal del griego.
- source_word: Ἰουδαίων σωμάτων
  english_pob_choice: Jewish bodies
  chosen_spanish: cuerpos judíos
  alternatives_spanish:
  - personas judías
  - judíos
  - esclavos judíos
  lexicon: LSJ
  rationale: Se conserva el lenguaje literal y chocante del original, que objetifica a las víctimas como mercancía. «Cuerpos» evita suavizar el sentido; «personas» borraría la fuerza retórica y «esclavos» añadiría una explicitación no dicha aquí.
- source_word: ὑπισχνούμενος
  english_pob_choice: promising
  chosen_spanish: prometiendo
  alternatives_spanish:
  - ofreciendo
  - comprometiéndose a
  lexicon: LSJ
  rationale: El participio introduce los términos de la oferta. «Prometiendo» reproduce de manera directa la relación comercial del pasaje.
- source_word: ἐνενήκοντα σώματα ταλάντου παραχωρήσειν
  english_pob_choice: to hand over ninety bodies for a talent
  chosen_spanish: entregar noventa cuerpos por un talento
  alternatives_spanish:
  - ceder noventa cuerpos por un talento
  - entregar noventa personas por un talento
  lexicon: LSJ
  rationale: 'La construcción compacta del griego expresa una tasa de venta: noventa cuerpos por un talento. «Entregar» funciona bien para un trato mercantil y conserva la crudeza del original.'
- source_word: οὐ προσδεχόμενος
  english_pob_choice: he did not expect
  chosen_spanish: no esperaba
  alternatives_spanish:
  - no anticipaba
  - no aguardaba
  lexicon: LSJ
  rationale: La negación expresa que no tomó en cuenta lo que venía. «No esperaba» es idiomático y fiel al sentido.
- source_word: τὴν παρὰ τοῦ παντοκράτορος μέλλουσαν παρακολουθήσειν αὐτῷ δίκην
  english_pob_choice: the punishment ... that was about to come upon him
  chosen_spanish: el castigo del Todopoderoso que estaba por venir sobre él
  alternatives_spanish:
  - la justicia del Todopoderoso que estaba por alcanzarlo
  - la pena del Todopoderoso que iba a seguirlo
  lexicon: LSJ
  rationale: δίκη puede ser justicia, sentencia o castigo. En este contexto de retribución divina inminente, «castigo» comunica con claridad el efecto sobre Nicanor; «que estaba por venir sobre él» transmite el valor de inminencia de παρακολουθήσειν.
- source_word: τοῦ παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: LSJ
  rationale: παντοκράτωρ es un título divino que en español se vierte naturalmente como «el Todopoderoso». Es una equivalencia estable, clara y reverente.
theological_decisions:
- issue: Título divino παντοκράτωρ
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el Soberano de todo
  rationale: Se mantiene la referencia directa al poder soberano de Dios sin expandir el título más allá del texto. «El Todopoderoso» es la forma española más natural y reconocible para παντοκράτωρ.
  doctrine_reference: Principio POB sobre títulos divinos; equivalencia funcional controlada
- issue: Valor de δίκη en contexto de retribución
  english_pob_reading: the punishment ... that was about to come upon him
  chosen_spanish_reading: el castigo ... que estaba por venir sobre él
  alternative_spanish_readings:
  - la justicia ... que estaba por alcanzarlo
  - la pena ... que iba a seguirlo
  rationale: El griego admite una tensión entre justicia y castigo. En esta escena de juicio inminente, «castigo» comunica el resultado experimentado por el culpable, mientras que las alternativas conservan la posibilidad semántica de «justicia» si se quisiera enfatizar el acto retributivo.
  doctrine_reference: Tratamiento POB de términos judiciales ambiguos; mantener tensión léxica sin resolverla en exceso
- issue: Lenguaje objetivador de σώματα
  english_pob_reading: Jewish bodies
  chosen_spanish_reading: cuerpos judíos
  alternative_spanish_readings:
  - personas judías
  - esclavos judíos
  rationale: La redacción conserva la brutalidad literaria del pasaje. No se suaviza a «personas», y tampoco se explicita «esclavos» en el texto principal porque el griego dice literalmente «cuerpos».
  doctrine_reference: Principio POB sobre conservar el filo del original en expresiones deshumanizantes
translation_notes:
  revision_awareness: 'Se consideró la revisión más reciente, que no introdujo cambios. La redacción española sigue la línea del inglés auditado: mantiene la dureza de «bodies/cuerpos», conserva la ambigüedad judicial de δίκη en nota, y vierte παντοκράτωρ con un título divino natural en español.'
  spanish_consistency_notes:
  - Se usa «cuerpos» para σώματα en coherencia con el valor literal y deshumanizante documentado por el POB en inglés.
  - «El Todopoderoso» se emplea para παντοκράτωρ de manera consistente con el título divino ya auditado.
  - 'La sintaxis española evita calcos excesivos pero conserva la secuencia narrativa: envío inmediato, oferta comercial, promesa de precio y juicio inminente.'
