translation:
  language: es
  text: lo que hemos oído y conocido[a], y nuestros padres nos han contado[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y los hemos conocido», refiriéndose «los» a los dichos/hechos mencionados en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «antepasados». El hebreo dice literalmente «nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo que
  alternatives_spanish:
  - el cual
  - que
  lexicon: HALOT
  rationale: El hebreo introduce una relativa que enlaza con el contenido del versículo anterior. En español, «lo que» conserva bien la referencia al dicho/hecho previo y suena natural en este contexto poético.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: HALOT
  rationale: El perfecto expresa una recepción ya ocurrida y todavía relevante para la tradición transmitida. «Hemos oído» mantiene ese valor y evita un pretérito menos enlazado con el presente discursivo.
- source_word: וַנֵּדָעֵם
  english_pob_choice: and known
  chosen_spanish: y conocido
  alternatives_spanish:
  - y lo hemos conocido
  - y comprendido
  lexicon: HALOT
  rationale: El verbo ידע conserva aquí el sentido cognitivo de saber/ conocer, con el objeto implícito recuperable del contexto. En español puede omitirse el objeto explícito sin perder referencia, porque «lo que» ya lo recupera.
- source_word: וַאֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros mayores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nuestros padres». Se conserva la forma masculina familiar por fidelidad al texto y porque en este contexto designa representativamente a la generación transmisora.
- source_word: סִפְּרוּ
  english_pob_choice: have told
  chosen_spanish: contaron
  alternatives_spanish:
  - nos relataron
  - nos han contado
  lexicon: HALOT
  rationale: «Contaron» reproduce el valor de narrar/transmitir oralmente. En español resulta más natural que forzar un presente perfecto donde el hebreo no exige esa elección aspectual.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: HALOT
  rationale: El clítico «nos» es la forma española más natural para el objeto indirecto incorporado al verbo «contar».
theological_decisions:
- issue: Traducción de אֲבוֹתֵינוּ con lenguaje familiar masculino
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros ancestros
  rationale: No hay controversia doctrinal, pero sí una decisión de fidelidad lexical. Se mantiene el masculino explícito del hebreo en vez de neutralizarlo, porque el texto subraya la cadena histórica de transmisión de la tradición.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Valor de וַנֵּדָעֵם como conocimiento vinculado al objeto implícito
  english_pob_reading: and known
  chosen_spanish_reading: y conocido
  alternative_spanish_readings:
  - y lo hemos conocido
  - y comprendido
  rationale: Se preserva la tensión entre «saber» y «conocer» sin convertirla en una explicación interpretativa. El objeto implícito queda recuperado por el contexto inmediato, como en la nota inglesa.
  doctrine_reference: DOCTRINE.md § Source-grounded lexical transparency
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del control cruzado y refleja la revisión que prefirió una conexión relativa más natural con el versículo anterior. En español se eligió «lo que» para mantener esa naturalidad sin perder el enlace anafórico, y se conservaron las decisiones léxicas clave del audit trail: oído/conocido, padres, nos contaron.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva el masculino familiar «padres» por fidelidad al hebreo y coherencia con la política del proyecto.
  - Se usa «nos» como clítico natural con «contaron», sin añadir preposiciones innecesarias.
  - La elipsis del objeto de «conocido» es intencional y queda recuperada por el contexto inmediato.
