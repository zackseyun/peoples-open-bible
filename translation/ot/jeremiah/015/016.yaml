theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Handling the covenantal idiom 'your name is called over me'
  chosen_reading: your name is called over me
  alternative_readings:
  - I am called by your name
  rationale: The Hebrew idiom signifies belonging to God and bearing his name. To preserve theological texture without over-interpreting, the main text keeps the more literal form and the idiomatic English equivalent is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
