  to: Yo me fui llena, pero Yahvé me ha hecho volver vacía. ¿Por qué me llaman Noemí, si Yahvé ha testificado contra mí[a] y el Todopoderoso me ha traído calamidad[b]?
  rationale: Se cambia «Naomi» por «Noemí» para ajustarse al español bíblico natural y legible sin perder fidelidad al nombre propio. Se elimina la nota [a] porque no documenta una alternativa significativa. Se conservan las decisiones correctas sobre «Yahvé», el matiz forense de «ha testificado contra mí» y la agencia divina en «me ha traído calamidad».
