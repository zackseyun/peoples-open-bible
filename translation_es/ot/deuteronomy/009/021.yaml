  to: Y tomé su pecado, el becerro que habían hecho, y lo quemé con fuego; luego lo quebré, moliéndolo bien hasta que quedó tan fino como polvo, y eché su polvo en el arroyo[a] que baja de la montaña.
  rationale: Se corrige el anclaje de la nota para que corresponda a «arroyo», se ajusta el verbo a una forma neutral latinoamericana («habían hecho») y se pule ligeramente la naturalidad de la expresión intensiva («moliéndolo bien») sin alterar el sentido del hebreo ni las decisiones del expediente inglés.
