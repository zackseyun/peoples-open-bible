theological_decisions:
- issue: Rendering the Noah name-play in relation to יְנַחֲמֵנוּ
  chosen_reading: Main text uses 'will bring us relief' while preserving more literal/name-linked alternatives in a footnote.
  alternative_readings:
  - will comfort us
  - will give us rest
  rationale: The Hebrew verb is נחם ('comfort/console'), while the name Noah is associated by sound with rest/relief. The verse itself presents a popular etymological explanation rather than a strict lexical derivation. 'Bring us relief' communicates the expected effect in context of cursed labor, while the footnote preserves the more formal lexical rendering and the rest-wordplay.
  doctrine_reference: Translation philosophy §3, §5
