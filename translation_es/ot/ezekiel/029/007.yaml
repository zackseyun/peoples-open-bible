translation:
  language: es
  text: Cuando te agarraron por tu mano, fuiste aplastado, y les desgarraste cada hombro; y cuando se apoyaron en ti[a], fuiste quebrado, y pusiste inestables todos sus lomos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando confiaron en ti». El hebreo conserva la imagen física de «apoyarse en ti», continuando la metáfora de la caña.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todas sus caderas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתָפְשָׂם
  english_pob_choice: when they took hold of
  chosen_spanish: cuando se apoderaron de
  alternatives_spanish:
  - cuando lo tomaron
  - cuando lo asieron
  - cuando lo agarraron
  lexicon: HALOT
  rationale: El valor temporal del infinitivo con ב se conserva con «cuando». «Apoderarse de» transmite el acto concreto de agarrar con fuerza, sin perder la imagen física del pasaje.
- source_word: בְּךָ
  english_pob_choice: of you
  chosen_spanish: de ti
  alternatives_spanish:
  - de ti mismo
  - de ti
  lexicon: HALOT
  rationale: El sufijo de segunda masculina singular se refleja de manera directa en español con «de ti», manteniendo el objeto del agarre.
- source_word: בכפך
  english_pob_choice: by your hand
  chosen_spanish: por tu mano
  alternatives_spanish:
  - en tu mano
  - por la palma de tu mano
  lexicon: HALOT
  rationale: Aunque el contexto del POB inglés interpreta la imagen con el acto de agarrar la caña, la forma hebrea conserva «mano/palma». En español, «por tu mano» comunica mejor el medio o punto de contacto sin introducir un plural no sustentado por la forma hebrea.
- source_word: תֵּרֹוץ
  english_pob_choice: you were crushed
  chosen_spanish: fuiste aplastado
  alternatives_spanish:
  - fuiste triturado
  - fuiste quebrantado
  - fuiste quebrado
  lexicon: HALOT
  rationale: El nifal de רצץ expresa ser aplastado o quebrado. «Aplastado» preserva la violencia de la imagen y distingue este verbo del siguiente «quebrado».
- source_word: וּבָקַעְתָּ
  english_pob_choice: you tore open
  chosen_spanish: les rompiste
  alternatives_spanish:
  - les abriste
  - les rasgaste
  - les quebraste
  lexicon: HALOT
  rationale: בקע puede expresar partir, abrir o romper. En el español de la secuencia metáforica, «les rompiste» conserva el efecto de fractura sobre quienes se apoyaron en Egipto y mantiene el paralelismo con el daño corporal del versículo.
- source_word: כָּל כָּתֵף
  english_pob_choice: every shoulder
  chosen_spanish: cada hombro
  alternatives_spanish:
  - todo hombro
  - cada hombro
  lexicon: HALOT
  rationale: «Hombro» es el equivalente natural y directo de כָּתֵף en español. «Cada» conserva la fuerza distributiva de כָּל en este contexto.
- source_word: וּבְהִשָּׁעֲנָם עָלֶיךָ
  english_pob_choice: when they leaned on you
  chosen_spanish: cuando se apoyaron en ti
  alternatives_spanish:
  - cuando se recostaron en ti
  - cuando confiaron en ti
  - cuando dependieron de ti
  lexicon: HALOT
  rationale: El hebreo mantiene la imagen física de apoyarse en la caña; por eso «se apoyaron en ti» preserva la metáfora, mientras que «confiaron en ti» la explicaría más abstractamente.
- source_word: תִּשָּׁבֵר
  english_pob_choice: you were broken
  chosen_spanish: fuiste quebrado
  alternatives_spanish:
  - fuiste roto
  - fuiste partido
  - fuiste quebrantado
  lexicon: HALOT
  rationale: 'El nifal de שבר pide un pasivo claro: «fuiste quebrado» mantiene el paralelismo con «fuiste aplastado» y evita suavizar la fuerza del texto.'
- source_word: וְהַעֲמַדְתָּ
  english_pob_choice: and you made ... stand unsteadily
  chosen_spanish: pusiste inestables
  alternatives_spanish:
  - hiciste tambalear
  - los dejaste inestables
  - los hiciste quedar inestables
  lexicon: HALOT
  rationale: El hiphil de עמד conserva la idea básica de «hacer estar de pie», pero en este contexto produce desequilibrio. «Pusiste inestables» comunica el efecto sin perder el núcleo verbal.
- source_word: כָּל מָתְנַיִם
  english_pob_choice: all their loins
  chosen_spanish: todos sus lomos
  alternatives_spanish:
  - todos sus riñones
  - todas sus caderas
  - todos sus lomos
  lexicon: HALOT
  rationale: מָתְנַיִם designa la zona de los lomos/cintura. «Lomos» mantiene la precisión formal y la imagen corporal tradicional del hebreo.
theological_decisions:
- issue: Preservación de la metáfora del junco/caña frente a una explicación abstracta
  english_pob_reading: Keep the physical reed metaphor in the main text rather than interpret it as political reliance.
  chosen_spanish_reading: Conservar la imagen corporal de apoyo, golpe y quiebre, en vez de volverla una paráfrasis abstracta sobre dependencia política.
  alternative_spanish_readings:
  - cuando confiaron en ti
  - cuando dependieron de ti
  rationale: El versículo continúa la metáfora previa de Egipto como caña que hiere a quien se apoya en ella. El español mantiene la secuencia física para que la implicación teológica emerja del mismo cuadro profético.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de מָתְנַיִם
  english_pob_reading: Use 'loins' in the main text with the destabilizing sense expressed in the verb phrase.
  chosen_spanish_reading: Usar «lomos» como equivalente formal, con la inestabilidad expresada por el verbo.
  alternative_spanish_readings:
  - cinturas
  - caderas
  rationale: «Lomos» preserva la referencia anatómica más cercana al hebreo y evita restringir indebidamente el sentido a una sola parte moderna del cuerpo.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: 'Tomo en cuenta la última revisión inglesa: se corrigió la relación con «by your hand», se prefirió «tore open», y se ajustó מָתְנַיִם a «loins». En español, el texto conserva la imagen corporal, pero adapta el primer sintagma a una construcción natural y el último a «lomos», equivalente formal más cercano que mantiene la precisión anatómica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se preserva la metáfora corporal completa para evitar una lectura explicativa que borre la imagen del junco.
  - «Lomos» se usa por consistencia con el valor formal de מָתְנַיִם, en lugar de «cinturas» o «caderas», que sonarían más interpretativas.
