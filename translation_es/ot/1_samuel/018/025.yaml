base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/025.yaml
  text: Then Saul said[a], “Thus you shall say to David, ‘The king has no desire for a bride-price except a hundred Philistine foreskins[c][b], to take vengeance on the king’s enemies.’” Now Saul intended to make David fall by the hand of the Philistines.
  footnotes:
  - marker: a
    text: Or “but only a hundred foreskins of the Philistines.”
    reason: lexical_alternative
  - marker: b
    text: “Bride-price” renders Hebrew mohar, the payment customarily given in connection with marriage; it is not the same as a dowry in the modern English sense.
    reason: cultural_note
  - marker: c
    text: “To make David fall” likely means to bring about his death, but the Hebrew expression is left less explicit.
    reason: lexical_alternative
