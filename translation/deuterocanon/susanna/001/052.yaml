id: SUS.1.52
reference: Susanna 1:52
source:
  edition: lxx-swete-1909
  text: ὡς δὲ διεχωρίσθησαν εἷς ἀπὸ τοῦ ἑνός, ἐκάλεσεν τὸν ἕνα αὐτῶν καὶ εἶπεν πρὸς αὐτὸν Πεπαιλαιωμένε ἡμερῶν κακῶν, νῦν ἥκασιν αἱ ἁμαρτίαι σου ἃς ἐποίεις τὸ
  language: Greek
  pages:
  - 606
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Standalone Susanna extraction currently follows the complete Theodotion stream in Swete, because that stream is the cleanest fully numbered extract available in the current corpus.
translation:
  text: But when they had been separated[a], one from the other, he called one of them and said to him, “You who have grown old in evil days[b], now the sins that you were doing before have come upon you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source as extracted here ends with 'τὸ', which appears to continue into the next word or phrase ('before'/'formerly') across the verse boundary; the translation reflects that likely sense.
    reason: textual_variant
  - marker: b
    text: Or 'Old man, grown old in evil.' The Greek address is compressed and can be rendered more literally, but the main text brings out its rebuking force.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεχωρίσθησαν
  chosen: had been separated
  alternatives:
  - were separated
  - had parted
  lexicon: BDAG
  rationale: Aorist passive of διαχωρίζω; the passive sense is clear. 'Had been separated' fits the temporal setup introduced by ὡς δέ and reads naturally in English.
- source_word: εἷς ἀπὸ τοῦ ἑνός
  chosen: one from the other
  alternatives:
  - one from one another
  - each from the other
  lexicon: LSJ
  rationale: This idiom emphasizes the two elders being isolated from each other for separate examination. 'One from the other' preserves the singular phrasing of the Greek while remaining idiomatic.
- source_word: ἐκάλεσεν τὸν ἕνα αὐτῶν
  chosen: he called one of them
  alternatives:
  - he summoned one of them
  lexicon: BDAG
  rationale: ἐκάλεσεν commonly means 'called'; 'summoned' is possible, but 'called' is simpler and sufficient in context.
- source_word: Πεπαιλαιωμένε
  chosen: You who have grown old
  alternatives:
  - Old man
  - You aged one
  lexicon: LSJ
  rationale: Perfect participle of παλαιόω/related form, used vocatively. The phrase is not merely a neutral age label but part of Daniel's rebuke. 'You who have grown old' preserves the participial force better than a flat noun.
- source_word: ἡμερῶν κακῶν
  chosen: in evil days
  alternatives:
  - in wicked days
  - in days of evil
  lexicon: LSJ
  rationale: The genitive phrase qualifies the manner or character of his aging. 'In evil days' keeps the compactness and moral force of the Greek without overinterpreting whether the evil is his own or the times'.
- source_word: νῦν ἥκασιν αἱ ἁμαρτίαι σου
  chosen: now your sins have come upon you
  alternatives:
  - now your sins have arrived
  - now your sins have caught up with you
  lexicon: BDAG
  rationale: ἥκασιν literally means 'have come/arrived.' In context Daniel declares that the elder's past sins are now confronting him in judgment. 'Have come upon you' preserves the metaphor without becoming colloquial.
- source_word: ἃς ἐποίεις
  chosen: which you were doing
  alternatives:
  - which you used to commit
  - that you did
  lexicon: BDAG
  rationale: Imperfect of ποιέω indicates repeated past action. 'Were doing' keeps the aspectual sense; 'used to commit' is interpretive but possible.
- source_word: τὸ
  chosen: before
  alternatives:
  - formerly
  - in the past
  lexicon: LSJ
  rationale: The Swete extract ends with τὸ, evidently carrying the adverbial phrase τὸ πρότερον across the verse break. Rendering the sense as 'before' communicates the incomplete but recoverable phrase honestly and naturally.
