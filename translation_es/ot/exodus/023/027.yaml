translation:
  language: es
  text: Enviaré mi terror[a] delante de ti, y pondré en confusión[b] a todos los pueblos entre los cuales entres; y haré que todos tus enemigos te den la espalda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «mi pavor» o «mi temor».
    reason: lexical_alternative
  - marker: b
    text: 'O: «los haré entrar en pánico»; «los pondré en tumulto».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebraísmo: «dar la espalda» expresa que los enemigos se volverán y huirán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵימָתִי
  english_pob_choice: my terror
  chosen_spanish: mi terror
  alternatives_spanish:
  - mi pavor
  - mi temor
  - mi miedo
  lexicon: HALOT
  rationale: אֵימָה expresa un temor que produce espanto o pánico. «Mi terror» conserva el posesivo divino y la fuerza activa del sustantivo mejor que opciones más suaves como «temor» o «miedo».
- source_word: אֲשַׁלַּח לְפָנֶיךָ
  english_pob_choice: I will send ... ahead of you
  chosen_spanish: enviaré ... delante de ti
  alternatives_spanish:
  - enviaré ... antes de ti
  - mandaré ... delante de ti
  lexicon: HALOT
  rationale: La construcción con לְפָנֶיךָ comunica envío previo o en avance. «Delante de ti» conserva esa relación espacial y temporal de manera natural en español.
- source_word: וְהַמֹּתִי
  english_pob_choice: I will throw into confusion
  chosen_spanish: pondré en confusión
  alternatives_spanish:
  - la confundiré
  - la llenaré de tumulto
  - la pondré en caos
  lexicon: HALOT
  rationale: El verbo המם en este contexto expresa desconcierto, pánico o tumulto. «Pondré en confusión» comunica la acción causativa sin adelantar indebidamente el resultado militar más específico.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todos los pueblos
  - toda la población
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular colectivo, en español «todo el pueblo» suena natural y preserva el sentido colectivo del grupo poblacional encontrado en la marcha.
- source_word: אֲשֶׁר תָּבֹא בָּהֶם
  english_pob_choice: among whom you come
  chosen_spanish: entre el cual entres
  alternatives_spanish:
  - entre quienes entres
  - adonde entres
  - en medio de los cuales entres
  lexicon: HALOT
  rationale: La preposición ב con el pronombre plural apunta a entrar en medio de ellos. «Entre el cual entres» mantiene esa imagen. Se conserva el singular colectivo de «pueblo» para reflejar el hebreo.
- source_word: וְנָתַתִּי ... אֵלֶיךָ עֹרֶף
  english_pob_choice: I will make all your enemies turn their backs to you
  chosen_spanish: haré que todos tus enemigos te den la espalda
  alternatives_spanish:
  - haré que todos tus enemigos huyan delante de ti
  - haré que todos tus enemigos vuelvan la espalda hacia ti
  - entregaré a todos tus enemigos dándote la espalda
  lexicon: HALOT
  rationale: El hebreo expresa el idiomático «dar la nuca / la espalda», es decir, retirarse en huida. «Te den la espalda» conserva la imagen corporal y la idea de derrota sin sobreexplicar el giro idiomático.
theological_decisions:
- issue: Agencia divina directa en el juicio y la victoria
  english_pob_reading: The verse is rendered with direct first-person divine action ('I will send,' 'I will throw into confusion,' 'I will make')
  chosen_spanish_reading: 'La versión mantiene verbos en primera persona divina: «enviaré», «pondré en confusión», «haré».'
  alternative_spanish_readings:
  - Dios enviará...
  - habrá confusión...
  - haré que...
  rationale: El hebreo presenta a Yahvé como sujeto explícito de cada acción. La traducción conserva esa agencia directa, sin suavizarla ni convertirla en una formulación impersonal.
  doctrine_reference: Éxodo 23:27; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado sin cambios en la última pasada y recibió alta concordancia en la verificación cruzada; esta versión española sigue de cerca esa decisión estable, conservando las imágenes hebreas principales y la agencia divina directa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por norma del proyecto cuando el hebreo presenta la acción directa de Dios.
  - Se prefiere «pueblo» en singular colectivo para reflejar el hebreo הָעָם.
  - Se conserva la imagen idiomática de «dar la espalda» en lugar de sustituirla por una paráfrasis militar más explícita.
  - 'El orden verbal respeta la progresión del hebreo: enviar / confundir / hacer retroceder.'
