base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/011.yaml
  text: So Solomon finished the house of Yahweh and the house of the king[c][b][a], and everything that came upon Solomon’s heart to do in the house of Yahweh and in his own house he successfully accomplished.
  footnotes:
  - marker: a
    text: Or 'the royal palace' for 'the house of the king.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''everything that came upon Solomon’s heart,'' meaning what he intended or desired to do.'
    reason: cultural_note
  - marker: c
    text: Or 'he prospered' / 'he succeeded.' The Hebrew verb can denote succeeding or causing something to succeed.
    reason: lexical_alternative
