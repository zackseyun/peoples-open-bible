revisions:
- from: Porque ningún hombre ha hecho sobre ello lo que ellos hicieron.
  to: Porque ningún hombre ha hecho en la tierra lo que ellos hicieron.
  rationale: Se reemplaza 'sobre ello' por 'en la tierra' para expresar de manera natural y fiel el valor locativo de ἐπ' αὐτῆς según el antecedente contextual ἡ γῆ. No se requieren notas, porque la aclaración mejora el español sin introducir ambigüedad nueva ni omitir una alternativa preservada obligatoriamente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:19:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal y comparativa del griego, y ya refleja la corrección clave del inglés auditado: ἐπ'' αὐτῆς se refiere espacialmente a la tierra, no hostilmente contra una ciudad. Sin embargo, la frase española ''sobre ello'' no es natural ni adecuada para referirse a ''la tierra'' en español bíblico legible; el sentido locativo se expresa mejor con ''en la tierra''.'
  spanish_quality_summary: La redacción actual es comprensible pero poco idiomática. 'Sobre ello' suena forzada e incluso impropia en español, especialmente si el referente es 'la tierra'. 'En la tierra' comunica con claridad el valor espacial y mejora mucho la legibilidad sin apartarse del griego. El resto del verso es claro y digno.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Ningún hombre' es aceptable como singular genérico, aunque 'nadie' sería más natural; no es necesario cambiarlo. La principal decisión léxica a corregir es ἐπ' αὐτῆς -> 'en la tierra', dado el antecedente contextual femenino ἡ γῆ y la necesidad de español natural.
  issues:
  - severity: medium
    issue: '''sobre ello'' es una traducción poco natural de ἐπ'' αὐτῆς'
    rationale: Aunque intenta reflejar literalmente 'on it', en español no se refiere bien al antecedente contextual 'la tierra' y produce una frase torpe. El sentido en contexto es 'en la tierra' o 'sobre la tierra'; 'en la tierra' es la opción más idiomática y clara.
  - severity: low
    issue: La justificación de 'sentido neutro en español' para 'la tierra' es incorrecta
    rationale: En español, 'tierra' es femenino. Además, convertir αὐτῆς en 'ello' debilita la coherencia referencial contextual. Conviene resolver la referencia explícitamente en el texto principal.
  revised_spanish_text: Porque ningún hombre ha hecho en la tierra lo que ellos hicieron.
  revision_rationale: Se reemplaza 'sobre ello' por 'en la tierra' para expresar de manera natural y fiel el valor locativo de ἐπ' αὐτῆς según el antecedente contextual ἡ γῆ. No se requieren notas, porque la aclaración mejora el español sin introducir ambigüedad nueva ni omitir una alternativa preservada obligatoriamente.
