    text: El griego distingue «mi país» de «la tierra de Israel»; se conserva esa distinción porque no son simples repeticiones.
    reason: lexical_alternative
  - marker: b
    text: 'El final griego es difícil y queda abrupto en la forma transmitida; se sigue la solución auditada que entiende una referencia duradera: «para todas las generaciones».'
    reason: textual_variant
  revision_rationale: Se ajusta únicamente el orden de «mi padre Neftalí» para representar con más claridad y naturalidad el griego y la decisión inglesa auditada. También se normaliza la puntuación de la nota b quitando comillas sobrantes. No se requieren cambios adicionales.
