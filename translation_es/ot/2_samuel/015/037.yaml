translation:
  language: es
  text: Así que Husai, amigo de David, llegó a la ciudad, y Absalón llegó a Jerusalén.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y Absalón entró en Jerusalén'. La conjunción hebrea puede leerse simplemente como 'y', y el verbo también puede verterse como pasado simple con el sentido de 'entró'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came into
  chosen_spanish: llegó a
  alternatives_spanish:
  - vino a
  - entró en
  lexicon: HALOT
  rationale: בוא expresa movimiento de llegada o entrada. En español, 'llegó a la ciudad' comunica con naturalidad el ingreso al lugar sin forzar una calca como 'vino al' y sin cargar 'entró' con un matiz más cerrado de acceso físico.
- source_word: חוּשַׁי
  english_pob_choice: Hushai
  chosen_spanish: Hushai
  alternatives_spanish:
  - Cusai
  lexicon: Nombre propio
  rationale: Se conserva la transliteración usual del nombre propio, acorde con el texto base y la práctica del POB.
- source_word: רֵעֶה דָוִד
  english_pob_choice: David’s friend
  chosen_spanish: amigo de David
  alternatives_spanish:
  - compañero de David
  - consejero de David
  lexicon: HALOT
  rationale: רֵעַ/רֵעֶה denota amigo, compañero o asociado. 'Amigo de David' es la equivalencia directa y evita introducir la idea más específica de consejero, que no está expresada aquí.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Se conserva el sustantivo común y definido, porque el hebreo dice literalmente 'la ciudad'. En contexto alude a Jerusalén, pero no se reemplaza por el nombre propio en esta cláusula.
- source_word: וְאַבְשָׁלֹם
  english_pob_choice: and Absalom
  chosen_spanish: y Absalón
  alternatives_spanish:
  - mientras Absalón
  - así como Absalón
  lexicon: Conjunción narrativa
  rationale: La waw se entiende aquí de manera coordinante simple. En español, 'y' refleja sin sobreinterpretar el vínculo temporal; no se introduce una construcción simultánea que el texto revisado en inglés descartó.
- source_word: יָבֹא
  english_pob_choice: came into
  chosen_spanish: llegó a
  alternatives_spanish:
  - entró en
  - venía a
  lexicon: HALOT
  rationale: El imperfecto sigue funcionando narrativamente como una acción coordinada de llegada. 'Llegó a' mantiene el valor de acontecimiento en pasado simple y evita añadir una progresión aspectual que el audit trail no sostiene.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushaláyim
  lexicon: Nombre geográfico
  rationale: Se emplea la forma castellana ampliamente reconocida para el topónimo, adecuada para lectura eclesial y coherente con la tradición bíblica en español.
translation_notes:
  revision_awareness: El texto base en inglés pasó de una lectura simultánea ('as Absalom was entering Jerusalem') a una coordinación simple ('and Absalom came into Jerusalem'). La versión española sigue esa revisión y evita introducir simultaneidad adicional.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo del hebreo: llegada de Hushai, luego llegada de Absalón.'
  - '''La ciudad'' se conserva como común, no como sustituto interpretativo por ''Jerusalén''.'
  - La puntuación separa claramente los dos movimientos narrativos sin añadir relaciones causales o temporales no expresadas.
