revisions:
- from: Cuando entraron los mensajeros[a], he aquí, el terafim estaba en la cama[b], y una cubierta de pelo de cabra estaba a su cabecera.
  to: Cuando entraron los mensajeros, he aquí, el terafim[a] estaba en la cama, y un cobertor[b] de pelo de cabra estaba a su cabecera.
  rationale: La revisión conserva el sentido del hebreo y la decisión principal del POB de transliterar תְּרָפִים, pero reubica y corrige las notas para que sigan el rastro auditado en inglés. También mejora la naturalidad de “cubierta” a “cobertor” sin perder cautela lexical.
