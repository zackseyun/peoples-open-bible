translation:
  language: es
  text: 'Él dijo: «No[a]; más bien, ahora he venido como el comandante del ejército de Yahvé». Entonces Josué cayó con su rostro en tierra y se postró[b], y le dijo: «¿Qué dice mi señor a su siervo?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ni uno ni otro; ahora he venido como el comandante del ejército de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo puede también traducirse «adoró»; aquí se opta por «se postró» para preservar el gesto sin resolver la identidad de la figura en este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Ni siquiera
  - Ninguno
  lexicon: HALOT
  rationale: Es la negación directa que responde a la situación planteada por Josué. En español, «No» conserva la respuesta breve y tajante del hebreo sin sobreexplicar.
- source_word: כִּי
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - antes bien
  lexicon: HALOT
  rationale: Aquí כִּי introduce corrección o contraste tras la negación. «Más bien» reproduce bien esa fuerza correctiva en español natural.
- source_word: שַׂר
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - capitán
  - jefe
  - príncipe
  lexicon: HALOT
  rationale: En contexto militar con צְבָא, «comandante» comunica claramente la función de mando sin el matiz anticuado o ambiguo de otras opciones.
- source_word: צְבָא יְהוָה
  english_pob_choice: the army of Yahweh
  chosen_spanish: el ejército de Yahvé
  alternatives_spanish:
  - el ejército de Yahvé
  - el ejército de Yahvé
  - el host de Yahvé
  lexicon: HALOT
  rationale: «צָבָא» en este contexto es claramente militar; por eso se prefiere «ejército». Se mantiene «Yahvé» conforme al principio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se translitera como «Yahvé» según la política terminológica del proyecto, en vez de sustituirse por un título.
- source_word: עַתָּה בָאתִי
  english_pob_choice: I have now come
  chosen_spanish: ahora he venido
  alternatives_spanish:
  - he venido ahora
  - ahora he llegado
  lexicon: HALOT
  rationale: El perfecto expresa una llegada ya realizada con relevancia inmediata. «He venido» conserva esa acción completada; «ahora» mantiene el adverbio temporal.
- source_word: פָּנָיו אַרצה
  english_pob_choice: with his face to the ground
  chosen_spanish: con su rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - postrado con el rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea describe el gesto de caer hacia el suelo con el rostro orientado a tierra. «Con su rostro en tierra» es fiel y sobrio en español bíblico contemporáneo.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - adoró
  - se arrodilló
  lexicon: HALOT
  rationale: El verbo puede abarcar reverencia física y, en ciertos contextos, adoración. «Se postró» preserva el acto corporal sin resolver de antemano la identidad del personaje ni el alcance teológico del gesto.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: En el discurso directo respetuoso, «mi señor» es la forma natural en español y conserva el matiz de deferencia personal.
- source_word: מְדַבֵּר אֶל עַבְדּוֹ
  english_pob_choice: is saying to his servant
  chosen_spanish: está diciendo a su siervo
  alternatives_spanish:
  - habla a su siervo
  - está hablando a su siervo
  lexicon: HALOT
  rationale: El participio hebreo tiene sentido aspectual continuo. «Está diciendo» refleja bien el diálogo en curso; «siervo» traduce con fuerza la autohumillación del hablante.
theological_decisions:
- issue: Si el gesto de Josué debe presentarse como adoración explícita o como reverencia postrada
  english_pob_reading: Render the verb as 'bowed down' rather than 'worshiped' in the main text
  chosen_spanish_reading: Traducir el verbo principal como «se postró» y acompañar con la caída «con su rostro en tierra», sin decir «adoró»
  alternative_spanish_readings:
  - adoró
  - se inclinó reverentemente
  rationale: El hebreo שׁחה puede referirse a un acto de postración reverente o a adoración. Este versículo por sí solo no obliga a resolver la naturaleza exacta del gesto. «Se postró» conserva la acción visible y preserva la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Si la figura debe identificarse como angelical, teofánica o cristofánica
  english_pob_reading: Do not identify the figure beyond the Hebrew title 'commander of the army of the LORD'
  chosen_spanish_reading: No identificarla más allá de «el comandante del ejército de Yahvé»
  alternative_spanish_readings:
  - un ángel
  - una manifestación de Yahvé
  - Cristo preencarnado
  rationale: El texto hebreo nombra la función, pero no resuelve la identidad ontológica de la figura en este versículo. La traducción se mantiene restringida al dato textual y evita decisiones doctrinales no exigidas aquí.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB, que ajustó la frase postural para corresponder más de cerca a «fell with his face to the ground». Por eso el español conserva explícitamente «con su rostro en tierra» junto con «se postró», manteniendo la correspondencia física sin añadir interpretación teológica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - «Siervo» se conserva para עַבְדּוֹ por deferencia y para seguir la fuerza del hebreo.
  - No se introdujo «Cristo» ni «Señor» para la figura, porque el texto base no lo exige.
  - La combinación «con su rostro en tierra» + «se postró» intenta reflejar ambos elementos del hebreo sin redundancia interpretativa excesiva.
