revisions:
- from: Y no se hallaron mujeres tan hermosas como las hijas de Job[a] en toda la tierra; y su padre les dio una herencia entre sus hermanos.
  to: Y no se hallaron mujeres tan hermosas como las hijas de Job en toda la región[a], y su padre les dio una herencia entre sus hermanos.
  rationale: 'Se ajusta בְּכָל הָאָרֶץ a una lectura principal que sigue la decisión contextual del POB («land») sin perder naturalidad en español: «en toda la región». Se conserva «en toda la tierra» como alternativa léxica en nota, y se mueve el marcador al lugar correcto. El resto del versículo es fiel y claro.'
