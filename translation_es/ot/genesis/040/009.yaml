translation:
  language: es
  text: 'Entonces el jefe de los coperos contó su sueño a José y le dijo[a]: «En mi sueño, he aquí, había una vid delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En mi sueño, había una vid delante de mí». El hebreo usa el marcador de atención וְהִנֵּה para introducir con viveza la imagen del sueño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - dijo
  lexicon: HALOT
  rationale: El piel de ספר aquí significa narrar o contar un relato. «Contó» reproduce con naturalidad la acción de comunicar el sueño sin perder el matiz de relato articulado.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el principal copero
  - el jefe de los servidores de bebida
  lexicon: HALOT
  rationale: La expresión designa al funcionario principal encargado de los coperos. «Jefe de los coperos» conserva la función y el rango con claridad en español; «copero» evita el tradicional «copero mayor» que suena más litúrgico o arcaico.
- source_word: אֶת חֲלֹמוֹ
  english_pob_choice: his dream
  chosen_spanish: su sueño
  alternatives_spanish:
  - el sueño que tuvo
  - su visión nocturna
  lexicon: HALOT
  rationale: El objeto directo con sufijo posesivo se rinde de forma directa por «su sueño». «Visión nocturna» sería más interpretativo que el hebreo.
- source_word: לְיוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - para José
  lexicon: HALOT
  rationale: La preposición ל marca destinatario o receptor del relato; en español, «a José» expresa bien ese complemento indirecto.
- source_word: וַיֹּאמֶר ל֔וֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y dijo
  lexicon: HALOT
  rationale: El pronombre objeto explícito se conserva con «le». «Dijo» solo sería posible, pero el hebreo especifica el destinatario del habla.
- source_word: בַּחֲלוֹמִי
  english_pob_choice: In my dream
  chosen_spanish: En mi sueño
  alternatives_spanish:
  - Mientras soñaba
  - Dentro de mi sueño
  lexicon: HALOT
  rationale: La frase introductoria del reporte onírico se expresa de manera idiomática y fiel con «En mi sueño».
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - y he aquí
  lexicon: HALOT
  rationale: El marcador de atención se traduce con una forma natural en español que conserve la viveza de la escena. «Mira» funciona como interjección de captación visual sin sonar excesivamente arcaico.
- source_word: גֶפֶן
  english_pob_choice: a vine
  chosen_spanish: una vid
  alternatives_spanish:
  - una parra
  - una vid de uvas
  lexicon: HALOT
  rationale: En contexto, גפן alude a la planta de la vid. «Vid» es el equivalente más directo y preciso en español bíblico contemporáneo.
- source_word: לְפָנַי
  english_pob_choice: was before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - frente a mí
  - ante mí
  lexicon: HALOT
  rationale: La locución preposicional expresa ubicación espacial ante el hablante. «Delante de mí» transmite bien la presencia visual en el sueño sin forzar una cópula innecesaria.
translation_notes:
  revision_awareness: 'La versión española sigue el mismo sentido que el texto hebreo y la auditoría inglesa: mantiene el sujeto oficial, el destinatario explícito, la introducción del sueño y el marcador de atención וְהִנֵּה. Se prefirió un español claro y narrativo, sin domesticar la imagen onírica ni sustituir la terminología funcional del cargo.'
  spanish_consistency_notes:
  - Se mantuvo «José» para el nombre propio, de acuerdo con la política del proyecto.
  - «Jefe de los coperos» conserva la noción funcional de שַׂר הַמַּשְׁקִים sin recurrir a una fórmula tradicional menos precisa.
  - «Vid» se eligió como equivalente léxico directo de גפן; la nota permite la alternativa «había una vid» para reflejar la construcción copular natural en español.
  - Se tradujo וְהִנֵּה con «mira» para preservar el efecto de atención del hebreo sin caer en una fórmula rígida.
