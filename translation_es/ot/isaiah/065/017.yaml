  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: mantiene el valor explicativo de כִּי, la llamada de atención de הִנְנִי, el aspecto participial de בוֹרֵא, el alcance cósmico de «cielos nuevos y una tierra nueva», y el modismo final con una traducción idiomática. Sin embargo, «las cosas primeras» no es la mejor equivalencia para הָרִאשֹׁנוֹת en español bíblico natural; «las cosas anteriores» o «las cosas pasadas» preserva mejor «the former things». Además, la nota [a] está mal anclada: en el inglés POB la alternativa corresponde a «behold», no a la cláusula sobre recordar.'
