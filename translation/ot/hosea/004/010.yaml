theological_decisions:
- issue: Sense of זנה in Hosea's accusation
  chosen_reading: Rendered as literal/general sexual immorality with possible covenantal resonance left implicit.
  alternative_readings:
  - Rendered more metaphorically as spiritual prostitution/idolatry
  - Rendered more specifically as prostitution
  rationale: The immediate parallel 'but not increase' points to literal sexual behavior and frustrated fertility, yet Hosea often uses sexual language for covenant unfaithfulness. The chosen rendering preserves the concrete sense without excluding the broader theological backdrop.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Interpretation of לִשְׁמֹר after 'they have abandoned the LORD'
  chosen_reading: Understood as abandoning attentiveness/observance toward the LORD, expressed as 'to give heed to him.'
  alternative_readings:
  - '''they have ceased to keep the LORD'''
  - '''they have abandoned keeping [his law]'''
  - treating the infinitive as textually corrupt or incomplete
  rationale: The Hebrew is terse and somewhat elliptical. Rather than emending the text or importing 'his law,' the translation supplies the minimal implied object in English to preserve the sense of neglected covenant attention.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it.
