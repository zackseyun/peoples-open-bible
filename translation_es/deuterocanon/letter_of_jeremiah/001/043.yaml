translation:
  language: es
  text: Pero cuando una de ellas sea arrastrada[a] por uno de los que pasan y se acueste con él[b], reprocha a la que está junto a ella, porque no fue considerada digna como ella, ni se rompió su cordel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea llevada» o «sea atraída»; el griego puede indicar que la conducen o la apartan, aunque el contexto favorece un sentido físico más fuerte.
    reason: lexical_alternative
  - marker: b
    text: El griego usa un eufemismo para relaciones sexuales.
    reason: cultural_note
  - marker: c
    text: El «cordel» probablemente alude a una sujeción o atadura del ídolo; la sátira imagina a las figuras como si fueran mujeres compitiendo por atención sexual.
    reason: cultural_note
lexical_decisions:
- source_word: ἐφελκυσθεῖσα
  english_pob_choice: is dragged away
  chosen_spanish: sea arrastrada
  alternatives_spanish:
  - sea llevada
  - sea atraída
  - sea tirada
  lexicon: LSJ
  rationale: El participio pasivo sugiere que algo la mueve desde fuera; en este contexto satírico, «arrastrada» conserva mejor la fuerza física y coercitiva que una opción más suave como «atraída».
- source_word: ὑπό τινος τῶν παραπορευομένων
  english_pob_choice: by one of the passersby
  chosen_spanish: por uno de los que pasan
  alternatives_spanish:
  - por uno de los transeúntes
  - por alguien de los que van pasando
  lexicon: LSJ
  rationale: La expresión apunta a personas que pasan por el lugar. «Los que pasan» es natural en español y conserva la indefinición social del original.
- source_word: κοιμηθῇ
  english_pob_choice: lies with him
  chosen_spanish: se acueste con él
  alternatives_spanish:
  - duerma con él
  - tenga relaciones con él
  lexicon: BDAG
  rationale: El verbo se usa como eufemismo para relaciones sexuales. «Se acueste con él» mantiene el eufemismo bíblico sin perder claridad.
- source_word: τὴν πλησίον
  english_pob_choice: the one next to her
  chosen_spanish: la que está junto a ella
  alternatives_spanish:
  - su vecina
  - la cercana a ella
  lexicon: LSJ
  rationale: Aquí el griego describe cercanía espacial, no una relación personal de vecindad. «La que está junto a ella» evita una ambigüedad innecesaria en español.
- source_word: ὀνειδίζει
  english_pob_choice: reproaches
  chosen_spanish: reprocha
  alternatives_spanish:
  - insulta
  - reprende
  - afronta
  lexicon: BDAG
  rationale: «Reprocha» transmite bien el matiz de censura o burla entre figuras personificadas, sin volver el tono demasiado coloquial.
- source_word: οὐκ ἠξίωται
  english_pob_choice: was not deemed worthy
  chosen_spanish: no fue considerada digna
  alternatives_spanish:
  - no fue juzgada digna
  - no fue tenida por digna
  lexicon: BDAG
  rationale: El pasivo expresa que no se la juzgó digna de la misma atención. «Considerada digna» conserva el valor evaluativo de manera fluida en español.
- source_word: ὥσπερ καὶ αὐτή
  english_pob_choice: as she was
  chosen_spanish: como ella
  alternatives_spanish:
  - tal como ella
  - igual que ella
  lexicon: LSJ
  rationale: La comparación remite a la figura vecina que sí recibió ese trato. «Como ella» es breve y natural en español, aunque la repetición del referente sigue implícita en el contexto.
- source_word: τὸ σχοινίον αὐτῆς διεράγη
  english_pob_choice: her cord was not broken
  chosen_spanish: se rompió su cordel
  alternatives_spanish:
  - se quebró su cuerda
  - se rasgó su cordón
  lexicon: LSJ
  rationale: «Cordel» reproduce el diminutivo σχοινίον y sugiere la correa o ligadura del ídolo. La cláusula negativa va expresada por el contexto anterior en paralelo con el griego, que coordina la comparación con la misma idea de no haber sido tratada de igual modo.
theological_decisions:
- issue: Personificación de las imágenes/idolos como mujeres rivales
  english_pob_reading: The verse speaks of female idol figures personified as women.
  chosen_spanish_reading: El verso presenta figuras idolátricas personificadas como mujeres que compiten por atención sexual.
  alternative_spanish_readings:
  - Puede entenderse como mujeres asociadas a los santuarios idolátricos, más que como las imágenes mismas.
  - Puede leerse de modo más abstracto, pero el contexto favorece la personificación.
  rationale: El contexto satírico del pasaje trata a los ídolos como si fueran mujeres. Las formas femeninas y la referencia al cordel encajan con esa personificación; la traducción la conserva sin suavizarla.
  doctrine_reference: Conservar la tensión literaria y satírica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se atendió la revisión inglesa más reciente: el cierre refleja de manera directa la coordinación negativa del griego y se mantiene el registro formal. Además, se corrigió la ancla textual para que cada nota aparezca explícitamente en el versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según las reglas generales, aunque este versículo no los contiene.
  - Se usa «cordel» para σχοινίον, preservando el matiz de una ligadura o correa pequeña.
  - Se conserva el eufemismo sexual en español con una nota explicativa, como en el audit trail inglés.
  - La sintaxis prioriza claridad bíblica moderna sin recurrir a calcos innecesarios.
