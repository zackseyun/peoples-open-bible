translation:
  language: es
  text: Su inmundicia estaba en sus faldas; no recordó su futuro[a]. Por eso descendió de manera sorprendente[b]; no había consolador para ella. Mira, Yahvé, mi aflicción, porque el enemigo se ha engrandecido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no recordó su desenlace» o «no consideró su final».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «descendió asombrosamente»; el sentido es una caída o derrumbe extraordinario y chocante.'
    reason: lexical_alternative
  - marker: c
    text: O «porque el enemigo se ha exaltado».
    reason: lexical_alternative
lexical_decisions:
- source_word: טֻמְאָתָהּ
  english_pob_choice: her uncleanness
  chosen_spanish: su inmundicia
  alternatives_spanish:
  - su impureza
  - su suciedad
  lexicon: HALOT
  rationale: El sustantivo comunica una impureza que contamina; «inmundicia» conserva el peso fuerte y deshonroso del término mejor que una neutralización como «impureza».
- source_word: בְּשׁוּלֶיהָ
  english_pob_choice: in her skirts
  chosen_spanish: en los dobladillos de su vestido
  alternatives_spanish:
  - en sus faldas
  - en el borde de su vestido
  lexicon: HALOT
  rationale: La imagen apunta a la parte baja y visible de la prenda. «Dobladillos de su vestido» mantiene la referencia concreta al borde del vestido y sugiere la mancha adherida sin sonar anticuado.
- source_word: לֹא זָכְרָה אַחֲרִיתָהּ
  english_pob_choice: she did not remember her future
  chosen_spanish: no recordó su futuro
  alternatives_spanish:
  - no recordó su final
  - no consideró su destino
  lexicon: HALOT
  rationale: אַחֲרִית puede ser «fin», «resultado» o «futuro». Aquí se sigue la lectura auditada «future» porque expresa mejor la consecuencia venidera sin perder la idea de desenlace.
- source_word: וַתֵּרֶד פְּלָאִים
  english_pob_choice: she came down astonishingly
  chosen_spanish: descendió de manera asombrosa
  alternatives_spanish:
  - cayó de forma estremecedora
  - bajó de manera asombrosa
  lexicon: HALOT
  rationale: El verbo es literalmente «descender», y פְּלָאִים añade el matiz de algo extraordinario o sorprendente. «Descendió de manera asombrosa» conserva ambas piezas y evita una paráfrasis excesiva.
- source_word: אֵין מְנַחֵם לָהּ
  english_pob_choice: there was no comforter for her
  chosen_spanish: no había consolador para ella
  alternatives_spanish:
  - no había quien la consolara
  - no tenía consolador
  lexicon: HALOT
  rationale: Se preserva el sustantivo funcional «consolador», que refleja el participio usado como nombre y mantiene el eco lamentativo recurrente en el libro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se aplica la convención española del proyecto para el nombre divino: «Yahvé». En la invocación directa se mantiene la forma vocativa natural del español bíblico sin sustituir el nombre por un título.'
- source_word: עָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi sufrimiento
  - mi miseria
  lexicon: HALOT
  rationale: «Aflicción» conserva el registro de lamento y la amplitud semántica del sustantivo sin cargarlo excesivamente hacia lo psicológico o lo meramente material.
- source_word: כִּי הִגְדִּיל אוֹיֵב
  english_pob_choice: for the enemy has magnified himself
  chosen_spanish: porque el enemigo se ha engrandecido
  alternatives_spanish:
  - porque el enemigo se ha exaltado
  - porque el enemigo se ha hecho grande
  lexicon: HALOT
  rationale: El Hifil de גדל expresa hacerse grande o ensalzarse. «Se ha engrandecido» mantiene el paralelismo con la lectura inglesa auditada y puede implicar tanto arrogancia como expansión victoriosa.
theological_decisions:
- issue: Nombre divino יְהוָה en una súplica directa
  english_pob_reading: See, O Yahweh, my affliction
  chosen_spanish_reading: Mira, Yahvé, mi aflicción
  alternative_spanish_readings:
  - Ve, Yahvé, mi aflicción
  - Mira, Yahvé, mi sufrimiento
  rationale: Se conserva el nombre personal del pacto como «Yahvé» y se traduce el imperativo de manera natural en español como petición directa de atención divina. «Mira» refleja la urgencia de la súplica sin endurecer el tono.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad de אַחֲרִיתָהּ entre fin, desenlace y futuro
  english_pob_reading: she did not remember her future
  chosen_spanish_reading: no recordó su futuro
  alternative_spanish_readings:
  - no recordó su final
  - no consideró su desenlace
  rationale: Se sigue la lectura auditada que privilegia el sentido de futuro/consecuencia. Así se mantiene la tensión del hebreo entre destino final y futuro venidero, sin cerrar indebidamente la ambigüedad.
  doctrine_reference: Comentario textual/lexical del verso; sin implicación doctrinal directa
- issue: אֲלִיטרACIÓN/registro de lamento en «no hay consolador»
  english_pob_reading: there was no comforter for her
  chosen_spanish_reading: no había consolador para ella
  alternative_spanish_readings:
  - no había quien la consolara
  - nadie la consolaba
  rationale: La forma sustantiva ayuda a conservar el refrán de Lamentaciones y el tono litúrgico de duelo. No se reemplaza por una paráfrasis más explicativa para no perder el eco intertextual.
  doctrine_reference: Poética del libro de Lamentaciones
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del inglés POB, especialmente en אַחֲרִיתָהּ entendido aquí como «futuro» y en el valor de פְּלָאִים como caída sorprendente/extraordinaria. También conserva el nombre divino como forma transliterada y el refrán lamentativo «no había consolador» para mantener la estructura poética y el registro del libro.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología española del proyecto para יְהוָה.
  - Se prefiere «aflicción» para עָנְיִי y «consolador» para מְנַחֵם por consistencia con el tono de Lamentaciones.
  - «Inmundicia» y «dobladillos» conservan la imagen corporal/vestidural sin suavizarla indebidamente.
  - Se evita traducir el descendiente a un simple «cayó» para no borrar el movimiento metáforico del hebreo.
