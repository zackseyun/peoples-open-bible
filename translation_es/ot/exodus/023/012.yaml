  rationale: Se corrige la documentación auditada para que la nota léxica corresponda a שׁבת ('cesarás') y se restaura la nota alternativa sobre בֶּן אֲמָתְךָ. También se sustituye 'forastero' por 'residente extranjero' para reflejar mejor הַגֵּר como categoría legal-social, y se mejora la fluidez con 'pero el séptimo día'.
