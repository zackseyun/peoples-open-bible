revisions:
- from: El Señor Todopoderoso los anuló por mano de una mujer[a].
  to: Yahvé Todopoderoso los anuló por mano de una mujer[a].
  rationale: Se reemplaza «El Señor» por «Yahvé» para ajustarse a la terminología base del proyecto para el nombre/título divino en el texto principal. Se conserva «Todopoderoso» por Παντοκράτωρ, «anuló» por ἠθέτησεν y el modismo «por mano de una mujer» con su nota alternativa porque transmiten fielmente el griego y siguen siendo naturales en español bíblico moderno.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Κύριος Παντοκράτωρ, ἠθέτησεν, αὐτούς y ἐν χειρὶ θηλείας están mayormente bien representados. Sin embargo, según la terminología por defecto del proyecto, κύριος como título divino debe revisarse a «Yahvé» en el texto principal salvo razón contextual fuerte en contra, y aquí no la hay. La construcción instrumental «por mano de una mujer» preserva adecuadamente el modismo y la nota alternativa también está bien.'
  spanish_quality_summary: 'El español es claro, digno y natural. «Por mano de una mujer» suena bíblico e inteligible; «anuló» es comprensible, aunque algo abstracto, pero sigue de cerca el valor de ἠθέτησεν y funciona en contexto. El único ajuste necesario es terminológico: «El Señor Todopoderoso» debe alinearse con la política de «Yahvé».'
  glossary_alignment: 'Desalineación principal: el proyecto establece יהוה / YHWH -> «Yahvé» en el texto principal, y para κύριος con referencia divina o posible trasfondo del nombre divino se debe explicar la decisión. Aquí el borrador usa «Señor» sin justificación especial. «Todopoderoso», «anuló», «por mano de una mujer» y «mujer» sí concuerdan con las decisiones auditadas y con el estilo del proyecto.'
  issues:
  - severity: medium
    issue: Uso de «Señor» en lugar de «Yahvé» para Κύριος como título divino
    rationale: La guía terminológica del proyecto pide «Yahvé» en el texto principal, no «SEÑOR» ni enmascaramiento equivalente, salvo excepción contextual documentada. En Judith 16:5 no se ofrece una razón suficiente para apartarse de esa norma.
  revised_spanish_text: Yahvé Todopoderoso los anuló por mano de una mujer[a].
  revised_footnotes:
  - marker: a
    text: O «por medio de una mujer». El giro griego «por mano de» expresa agencia o instrumentalidad.
    reason: lexical_alternative
