translation:
  language: es
  text: Recorran las calles[a] de Jerusalén, y por favor miren y sepan, y busquen en sus plazas, si hallan a un hombre[b], si hay uno que haga justicia, que busque fidelidad[c], y yo la perdonaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por las calles». El hebreo חוּצוֹת puede referirse a calles o a espacios públicos abiertos de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: «Un hombre» traduce el singular masculino hebreo אִישׁ; el sentido es que no podía hallarse ni siquiera uno así.
    reason: lexical_alternative
  - marker: c
    text: O «verdad» para «fidelidad». El hebreo אֱמוּנָה puede denotar fidelidad, fiabilidad o verdad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹטְטוּ
  english_pob_choice: Roam through
  chosen_spanish: Recorred
  alternatives_spanish:
  - Id de un lado a otro
  - Rodead
  lexicon: HALOT
  rationale: El hebreo pide un recorrido intenso y exploratorio por la ciudad. En español, «recorred» conserva el imperativo plural y la idea de desplazarse por toda el área sin añadir un matiz demasiado libre como «rodead».
- source_word: בְּחוּצוֹת
  english_pob_choice: through the streets
  chosen_spanish: las calles
  alternatives_spanish:
  - las plazas
  - los espacios abiertos
  lexicon: HALOT
  rationale: חוצות puede referirse a calles o lugares públicos abiertos. «Las calles» es natural en español y encaja con el movimiento de buscar por la ciudad.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Transliteración estándar
  rationale: Se usa la forma española usual del nombre propio.
- source_word: וּרְאוּ נָא
  english_pob_choice: and please look
  chosen_spanish: y, por favor, mirad
  alternatives_spanish:
  - y ved, por favor
  - y mirad ahora
  lexicon: HALOT
  rationale: «נא» suaviza y a la vez urge la orden. «Por favor» conserva esa fuerza de apremio de manera idiomática en español.
- source_word: וּדְעוּ
  english_pob_choice: and know
  chosen_spanish: y sabed
  alternatives_spanish:
  - y comprended
  - y reconoced
  lexicon: HALOT
  rationale: 'Aquí el verbo no es meramente intelectual, sino de constatación: comprobar la situación real. «Sabed» mantiene la forma imperativa y su tono solemne.'
- source_word: וּבַקְשׁוּ
  english_pob_choice: and search
  chosen_spanish: y buscad
  alternatives_spanish:
  - y buscad con diligencia
  - y examinad
  lexicon: HALOT
  rationale: El hebreo intensifica la acción de investigar. «Buscad» conserva la secuencia imperativa y permite entender la búsqueda deliberada sin sobreexplicar.
- source_word: בִּרְחוֹבוֹתֶיהָ
  english_pob_choice: in her squares
  chosen_spanish: en sus plazas
  alternatives_spanish:
  - en sus espacios abiertos
  - en sus calles amplias
  lexicon: HALOT
  rationale: רְחוֹבוֹת son espacios públicos amplios; «plazas» es la opción española más natural y mantiene la personificación femenina de Jerusalén con «sus».
- source_word: אִם תִּמְצְאוּ אִישׁ
  english_pob_choice: whether you can find a man
  chosen_spanish: si halláis un hombre
  alternatives_spanish:
  - si encontráis un hombre
  - si halláis a un hombre
  lexicon: HALOT
  rationale: Se conserva el singular masculino אִישׁ con «hombre», como en el inglés POB. «Halláis» reproduce bien el matiz de encontrar tras una búsqueda.
- source_word: אִם יֵשׁ
  english_pob_choice: whether there is one
  chosen_spanish: si hay uno
  alternatives_spanish:
  - si existe uno
  - si se encuentra uno
  lexicon: HALOT
  rationale: La reiteración enfatiza la posibilidad de encontrar siquiera a una sola persona que cumpla la condición. «Si hay uno» es conciso y transmite esa restricción.
- source_word: עֹשֶׂה מִשְׁפָּט
  english_pob_choice: who does justice
  chosen_spanish: que haga justicia
  alternatives_spanish:
  - que practique justicia
  - que ejecute justicia
  lexicon: HALOT
  rationale: «Mishpat» aquí expresa justicia en la conducta. La construcción con subjuntivo mantiene la condición de búsqueda en español y resulta idiomática.
- source_word: מְבַקֵּשׁ אֱמוּנָה
  english_pob_choice: who seeks faithfulness
  chosen_spanish: que busque fidelidad
  alternatives_spanish:
  - que busque verdad
  - que busque lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה admite fidelidad, fiabilidad o verdad. «Fidelidad» preserva mejor el sentido ético y relacional en este contexto; «verdad» queda como alternativa legítima.
- source_word: וְאֶסְלַח לָהּ
  english_pob_choice: and I will forgive her
  chosen_spanish: y yo la perdonaré
  alternatives_spanish:
  - y la perdonaré
  - y yo la absolveré
  lexicon: HALOT
  rationale: El verbo significa perdonar/pardonar. «Yo la perdonaré» conserva el objeto femenino singular de Jerusalén personificada y el valor directo del verbo.
theological_decisions:
- issue: Alcance de אִישׁ como singular masculino representativo
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa el singular masculino אִישׁ. Se mantiene «un hombre» para no neutralizar una forma lexicalmente marcada; el sentido representativo queda implícito en la búsqueda de incluso uno solo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido de אֱמוּנָה en un contexto ético-covenantal
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - honradez
  rationale: En Jeremías, el término apunta a confiabilidad y lealtad moral. «Fidelidad» conserva mejor esa dimensión de pacto y conducta que una simple equivalencia factual como «verdad».
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el registro inglés auditado; no se detectaron revisiones aplicadas en la fuente inglesa reciente, y la redacción española sigue esa lectura sin introducir cambios interpretativos no respaldados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí porque el versículo no contiene el tetragrámaton ni κύριος equivalente.
  - Se conserva la personificación femenina de Jerusalén con el pronombre «la».
  - Se preserva el imperativo plural del hebreo con formas de segunda persona plural («recorred», «mirad», «sabed», «buscad»).
  - Se evita sustituir «fidelidad» por un término doctrinalmente más cargado sin necesidad contextual.
