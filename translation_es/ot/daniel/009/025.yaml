translation:
  language: es
  text: 'Debes saber y entender: desde la salida de la palabra para restaurar y reconstruir Jerusalén hasta un ungido[a], un príncipe, habrá siete semanas[b], y durante sesenta y dos semanas será restaurada y reconstruida, con plaza y foso[c], pero en tiempos de angustia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta Mesías, un príncipe» o «hasta Mesías, el Príncipe». El hebreo dice «ungido, príncipe/gobernante».
    reason: alternative_reading
  - marker: b
    text: El hebreo «siete semanas» también puede traducirse «siete sietes». Igualmente, «sesenta y dos semanas» puede traducirse «sesenta y dos sietes».
    reason: lexical_alternative
  - marker: c
    text: O «plaza y zanja» o «plaza y trinchera». El término hebreo traducido «foso» es incierto y puede designar una zanja o foso defensivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתֵדַע
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - sabrás
  - conoce
  lexicon: HALOT
  rationale: El hebreo exhorta a Daniel a conocer/percibir el dato; en español, después de «Así que», «sabe» mantiene el tono exhortativo y natural. «Sabrás» inclinaría demasiado hacia futuro; «conoce» suena menos idiomático aquí.
- source_word: וְתַשְׂכֵּל
  english_pob_choice: understand
  chosen_spanish: entiende
  alternatives_spanish:
  - discierne
  - comprende
  lexicon: HALOT
  rationale: 'El valor básico es cognitivo: adquirir entendimiento. «Entiende» empareja bien con «sabe» y preserva la duplicación enfática del hebreo sin sobreinterpretarla.'
- source_word: מִן מֹצָא דָבָר
  english_pob_choice: from the issuing of the word
  chosen_spanish: desde la salida de la palabra
  alternatives_spanish:
  - desde la promulgación del decreto
  - desde la salida del asunto
  lexicon: HALOT
  rationale: מֹצָא conserva la imagen de salida/emanación, y דָבָר puede ser «palabra» o «decreto». «Salida de la palabra» sigue de cerca la forma hebrea; se evita fijar «decreto» en el texto principal porque el hebreo no lo explicita de manera obligatoria.
- source_word: לְהָשִׁיב וְלִבְנוֹת
  english_pob_choice: to restore and rebuild
  chosen_spanish: para restaurar y reconstruir
  alternatives_spanish:
  - para hacer volver y edificar
  - para restituir y reedificar
  lexicon: HALOT
  rationale: «Restaurar y reconstruir» transmite bien el doble movimiento de restitución y obra material. «Hacer volver» sería más literal para השיב, pero en español suena más pesado y menos claro en este contexto de Jerusalén.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: Nombre propio estándar
  rationale: Nombre propio establecido en español.
- source_word: עַד מָשִׁיחַ נָגִיד
  english_pob_choice: until an anointed one, a prince
  chosen_spanish: hasta un ungido, un príncipe
  alternatives_spanish:
  - hasta el Mesías, un príncipe
  - hasta un ungido, un gobernante
  - hasta el Mesías, el Príncipe
  lexicon: HALOT
  rationale: מָשִׁיחַ se rinde como «ungido» para conservar el sentido léxico básico sin decidir en el texto principal la identificación teológica. נָגִיד corresponde naturalmente a «príncipe» en este contexto, como en el audio de POB en inglés que ya corrigió «ruler» a «prince» por mayor cercanía léxica.
- source_word: שָׁבֻעִים שִׁבְעָה
  english_pob_choice: seven weeks
  chosen_spanish: siete semanas
  alternatives_spanish:
  - siete sietes
  - siete heptadas
  lexicon: HALOT
  rationale: «Semanas» es la forma tradicional y legible en español, pero la unidad hebrea puede equivaler a «sietes». Se mantiene la lectura usual en el cuerpo del texto, con alternativa documentada.
- source_word: וְשָׁבֻעִים שִׁשִּׁים וּשְׁנַיִם
  english_pob_choice: and for sixty-two weeks
  chosen_spanish: y durante sesenta y dos semanas
  alternatives_spanish:
  - y sesenta y dos semanas
  - y por sesenta y dos semanas
  lexicon: HALOT
  rationale: La preposición temporal en español se expresa bien con «durante», que comunica extensión temporal sin añadir contenido ajeno. Mantiene la función durativa del hebreo.
- source_word: תָּשׁוּב וְנִבְנְתָה
  english_pob_choice: it will be restored and rebuilt
  chosen_spanish: será restaurada y reconstruida
  alternatives_spanish:
  - volverá a ser edificada
  - será de nuevo restaurada y reconstruida
  lexicon: HALOT
  rationale: Los verbos femeninos se refieren a Jerusalén. «Será restaurada y reconstruida» preserva la pasiva y el paralelismo, con fluidez natural en español.
- source_word: רְחוֹב
  english_pob_choice: plaza
  chosen_spanish: plaza
  alternatives_spanish:
  - calle
  - plaza abierta
  - espacio público
  lexicon: HALOT
  rationale: רְחוֹב aquí designa un espacio urbano abierto; «plaza» es la equivalencia más clara y natural en español actual. Se evita «calle» por ser demasiado estrecho semánticamente.
- source_word: וְחָרוּץ
  english_pob_choice: moat
  chosen_spanish: foso
  alternatives_spanish:
  - foso defensivo
  - zanja
  - muralla
  lexicon: HALOT
  rationale: El término es incierto. «Foso» es un equivalente breve y comprensible en español, compatible con la idea de una obra defensiva excavada. Se preserva la incertidumbre léxica sin imponer una especificación excesiva.
- source_word: וּבְצֹק הָעִתִּים
  english_pob_choice: but in troubled times
  chosen_spanish: pero en tiempos de angustia
  alternatives_spanish:
  - y en tiempos de angustia
  - pero en tiempos difíciles
  lexicon: HALOT
  rationale: La frase comunica aflicción/opresión temporal. «Angustia» conserva la carga de presión y dificultad; «tiempos de angustia» refleja bien el contexto sin sonar arcaico.
theological_decisions:
- issue: Cómo traducir מָשִׁיחַ sin imponer de entrada la identificación mesiánica cristológica
  english_pob_reading: an anointed one, a prince
  chosen_spanish_reading: un ungido, un príncipe
  alternative_spanish_readings:
  - el Mesías, un príncipe
  - el Mesías, el Príncipe
  - un consagrado, un príncipe
  rationale: El hebreo permite una lectura léxica amplia («ungido») y no obliga por sí solo a fijar la identificación escatológica en el texto principal. Como el propio audit trail inglés preserva la alternativa «Messiah» en nota, el español mantiene la misma prudencia interpretativa, dejando abierta la discusión y sin borrar la tensión documentada.
  doctrine_reference: Translation philosophy §§1, 3; criterio POB para términos disputados
- issue: Cómo representar שָׁבֻעִים en Daniel 9
  english_pob_reading: seven weeks / sixty-two weeks
  chosen_spanish_reading: siete semanas / sesenta y dos semanas
  alternative_spanish_readings:
  - siete sietes / sesenta y dos sietes
  - semanas de años
  rationale: El término hebreo puede referirse a unidades de siete y el pasaje es cronológicamente debatido. Se conserva «semanas» por ser la solución usual y comprensible, pero se documenta la alternativa más literal para no resolver indebidamente la cuestión.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: He incorporado la revisión del audit trail inglés que ajustó נָגִיד a «prince» por mayor correspondencia léxica, y he mantenido la puntuación fluida con coma tras «siete semanas» en lugar de punto y coma. También he conservado la tensión interpretativa de מָשִׁיחַ y de שָׁבֻעִים, sin resolverlas de forma excesiva en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta colección cuando aparezca el Tetragrámaton; aquí no aparece.
  - «Ungido» se reserva para מָשִׁיחַ cuando el contexto no exige la titulatura fija «Mesías» en el cuerpo principal.
  - Se evita «SEÑOR» como sustituto divino porque no corresponde a este versículo y no aporta claridad adicional.
  - «Plaza» y «foso» siguen el registro urbano-defensivo del hebreo y preservan mejor la imagen que equivalentes más genéricos.
  - La frase temporal «durante sesenta y dos semanas» mantiene el valor durativo del hebreo sin añadir una cronología interpretativa específica.
