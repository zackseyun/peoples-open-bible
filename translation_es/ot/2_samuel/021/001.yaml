translation:
  language: es
  text: 'Ahora bien, hubo una hambruna en los días de David por tres años, año tras año. Y David buscó el rostro[a] de Yahvé, y Yahvé dijo: «Es por causa de Saúl y de su casa culpable de sangre[b], porque dio muerte a los gabaonitas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'buscó a Yahvé' o 'inquirió de Yahvé'; literalmente, 'buscó el rostro de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'casa de sangres', un modismo para una casa o dinastía culpable de derramamiento de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambruna
  alternatives_spanish:
  - hambre
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de una escasez grave de alimentos que afecta al país; en español, 'hambruna' comunica mejor esa intensidad que el más general 'hambre'.
- source_word: שָׁלֹשׁ שָׁנִים שָׁנָה אַחֲרֵי שָׁנָה
  english_pob_choice: for three years, year after year
  chosen_spanish: por tres años, año tras año
  alternatives_spanish:
  - durante tres años, uno tras otro
  - por tres años, de año en año
  lexicon: HALOT
  rationale: La expresión hebrea combina el cardinal con el modismo repetitivo para subrayar continuidad. 'Por tres años, año tras año' conserva ambos elementos sin volverlo pesado.
- source_word: וַיְבַקֵּשׁ ... אֶת־פְּנֵי יְהוָה
  english_pob_choice: sought the face of Yahweh
  chosen_spanish: buscó el rostro de Yahvé
  alternatives_spanish:
  - buscó a Yahvé
  - inquirió de Yahvé
  lexicon: HALOT
  rationale: '''Rostro'' mantiene el modismo hebreo y su matiz personal y relacional. En español suena natural y evita borrar la imagen original.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el Nombre divino. En español, 'Yahvé' preserva el nombre personal de Dios en lugar de sustituirlo por un título.
- source_word: בֵּית הַדָּמִים
  english_pob_choice: bloodguilty house
  chosen_spanish: casa de sangre
  alternatives_spanish:
  - casa sanguinaria
  - casa culpable de sangre
  - casa de derramamiento de sangre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil de verter literalmente. 'Casa de sangre' conserva la forma breve del hebreo; la nota aclara su sentido de culpabilidad por sangre derramada.
- source_word: עַל אֲשֶׁר הֵמִית אֶת־הַגִּבְעֹנִים
  english_pob_choice: because he put the Gibeonites to death
  chosen_spanish: porque dio muerte a los gabaonitas
  alternatives_spanish:
  - porque mató a los gabaonitas
  - porque hizo morir a los gabaonitas
  - porque los gabaonitas fueron muertos por él
  lexicon: HALOT
  rationale: '''Dar muerte a'' expresa el acto con tono más formal y judicial que ''matar'', acorde al contexto de culpa de sangre. ''Gabaonitas'' es la forma usual en español para el pueblo group.'
- source_word: הַגִּבְעֹנִים
  english_pob_choice: the Gibeonites
  chosen_spanish: los gabaonitas
  alternatives_spanish:
  - los gibeonitas
  lexicon: HALOT
  rationale: '''Gabaonitas'' es la transliteración asentada en español bíblico y ofrece mayor naturalidad para lectores hispanohablantes.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide traducir יהוה con el nombre divino transliterado. 'Yahvé' es la forma estándar elegida en español para esa convención, manteniendo la transparencia del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de causa y juicio en la respuesta divina
  english_pob_reading: It is because of Saul and his bloodguilty house, because he put the Gibeonites to death.
  chosen_spanish_reading: Es por causa de Saúl y de su casa de sangre, porque dio muerte a los gabaonitas.
  alternative_spanish_readings:
  - Es contra Saúl y contra su casa de sangre, porque dio muerte a los gabaonitas.
  - Es a causa de Saúl y de su casa culpable de sangre, porque mató a los gabaonitas.
  rationale: La respuesta divina explica la hambruna como juicio por sangre derramada. 'Por causa de' hace explícita la relación causal sin perder la fuerza judicial del hebreo; 'casa de sangre' preserva el modismo y la nota explica su sentido.
  doctrine_reference: 'DOCTRINE.md: Divine judgment and covenant accountability'
translation_notes:
  revision_awareness: La versión inglesa más reciente no presenta cambios respecto del pass anterior; el texto se alinea con la decisión estable y con el control de alta concordancia. Se conservan el paralelismo temporal, el modismo 'buscar el rostro' y la expresión idiomática 'casa de sangre' con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se usa 'hambruna' para רָעָב por el contexto de calamidad nacional, no simplemente 'hambre'.
  - Se conserva el orden narrativo con 'Ahora bien' para וַיְהִי, en un registro bíblico natural en español.
  - '''Casa de sangre'' se deja sin sobreexplicar en el cuerpo del texto para no borrar la tensión idiomática; la explicación va en nota.'
  - '''Gabaonitas'' sigue la transliteración usual en español bíblico.'
