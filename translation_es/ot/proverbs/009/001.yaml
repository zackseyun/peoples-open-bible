    rationale: Aunque es aceptable en español, el expediente POB documenta «pillars» por su fuerza arquitectónica estándar. «Pilares» traslada mejor esa elección y evita un matiz algo más ornamental de «columnas».
  - severity: medium
    issue: «ha labrado» para חָצְבָה puede quedar demasiado amplio
    rationale: El verbo hebreo sugiere cortar/heñir/tallar material, especialmente en un contexto de construcción sólida. «Ha tallado» emparejado con «pilares» comunica más claramente la imagen concreta sin sonar forzado.
  revised_spanish_text: La Sabiduría[a] ha edificado su casa; ha tallado sus siete pilares.
  revised_footnotes:
