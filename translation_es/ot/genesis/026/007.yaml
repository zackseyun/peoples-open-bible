review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: los hombres del lugar preguntan por la esposa de Isaac, él responde «Es mi hermana», y la razón es su temor de que lo maten por causa de Rebeca debido a su belleza. Sin embargo, el inicio «Y cuando» introduce una relación temporal más marcada que el simple waw narrativo del hebreo, y la nota al pie está mal anclada: el pie de nota inglés corresponde a la cláusula de temor («lest... kill me...»), no a «su esposa».'
  spanish_quality_summary: El español es claro y ampliamente legible, con buen registro bíblico moderno. «Los hombres del lugar», «preguntaron por su esposa» y «porque tenía miedo» funcionan bien. No obstante, conviene eliminar la conjunción inicial «Y» para una narración más natural en español y recolocar la nota al segmento pertinente. También puede simplificarse levemente la puntuación sin perder dignidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Rebeca» es una forma española normal y adecuada para רִבְקָה. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. La decisión «de hermoso aspecto» es fiel a טוֹבַת מַרְאֶה, aunque «hermosa de apariencia» también sería posible; no requiere cambio.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «su esposa[a]», pero su contenido corresponde a la cláusula final de temor.
    rationale: El pie de nota inglés ofrece una alternativa para toda la construcción con פֶּן («por temor a que...»), no para לְאִשְׁתּוֹ. En español, debe anclarse donde aparezca «no fuera que...» o una frase equivalente.
  - severity: low
    issue: «Y cuando» sobrerrealiza el waw narrativo y suena algo innecesario en español.
    rationale: El hebreo inicia con wayyiqtol narrativo; en español bíblico natural, «Cuando...» o incluso una formulación sin «Y» fluye mejor sin añadir énfasis conectivo innecesario.
  revised_spanish_text: 'Cuando los hombres del lugar preguntaron por su esposa, él dijo: «Es mi hermana», porque tenía miedo de decir: «Es mi esposa», no fuera que[a] los hombres del lugar me mataran por causa de Rebeca, pues ella era de hermoso aspecto.'
  revised_footnotes:
  - marker: a
    text: 'O: «por temor a que los hombres del lugar me mataran por causa de Rebeca».'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base porque es fiel y natural, pero se corrige la ubicación de la nota al pie para que corresponda a פֶּן / «no fuera que», y se elimina la conjunción inicial «Y» para un español más fluido sin alterar el sentido del hebreo.
