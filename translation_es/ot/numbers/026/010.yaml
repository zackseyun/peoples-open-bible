  rationale: Se corrigen las notas para que coincidan con las alternativas y observaciones documentadas en la auditoría inglesa, y se mejora la naturalidad del español cambiando 'signo' por 'señal' en el texto principal, dejando 'signo' como alternativa en nota. Se añade además la nota de referencia cruzada sobre 'a ellos y a Coré', que el rastro inglés preserva y que ayuda a no armonizar indebidamente el versículo.
