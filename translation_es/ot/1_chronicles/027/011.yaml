translation:
  language: es
  text: 'El octavo, para el octavo mes: Sibecai el husatita, de los zerahitas[a]; y sobre su división había veinticuatro mil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «para el zerahita». La expresión hebrea puede entenderse de manera más literal como un gentilicio singular, pero en contexto probablemente indica pertenencia al clan: «de los zerahitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁמִינִי
  english_pob_choice: The eighth
  chosen_spanish: El octavo
  alternatives_spanish:
  - El octavo comandante
  - La octava división
  lexicon: HALOT
  rationale: El ordinal hebreo aparece de forma elíptica al inicio de una lista administrativa/militar. En español se conserva la brevedad con «El octavo», dejando que el contexto del capítulo aporte el oficio implícito, como en la decisión inglesa.
- source_word: לַחֹדֶשׁ הַשְּׁמִינִי
  english_pob_choice: for the eighth month
  chosen_spanish: para el octavo mes
  alternatives_spanish:
  - para el mes ocho
  - para el servicio del octavo mes
  lexicon: HALOT
  rationale: La preposición ל con חֹדֶשׁ en esta lista indica asignación a un mes de servicio. «Para el octavo mes» es natural en español y conserva el paralelismo administrativo del pasaje.
- source_word: סִבְּכַי
  english_pob_choice: Sibbecai
  chosen_spanish: Sibbecai
  alternatives_spanish:
  - Sibbekai
  lexicon: Convención transliterativa
  rationale: Se mantiene la transliteración convencional del nombre propio para preservar la identificación histórica y la continuidad con la tradición de traducción, sin introducir una grafía menos conocida innecesariamente.
- source_word: הַחֻשָׁתִי
  english_pob_choice: the Hushathite
  chosen_spanish: el husatita
  alternatives_spanish:
  - el hushatita
  - el de Húsa
  lexicon: HALOT
  rationale: El gentilicio se vierte como adjetivo de pertenencia. «Husatita» comunica mejor en español la relación étnica o de clan que un calco más duro, y evita depender de una forma inglesa transliterada.
- source_word: לַזַּרְחִי
  english_pob_choice: of the Zerahites
  chosen_spanish: de los zerahitas
  alternatives_spanish:
  - para el zerahita
  - de la casa de Zera
  lexicon: HALOT
  rationale: La partícula ל aquí marca afiliación/clan. Se prefiere el plural colectivo «de los zerahitas» porque el contexto apunta a pertenencia genealógica o clánica, como señala la nota inglesa; «de la casa de Zera» sería más interpretativo.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y sobre su curso había
  - y su división tenía a su cargo
  lexicon: HALOT
  rationale: מַחֲלֻקָה en este capítulo designa una unidad militar/administrativa. «División» preserva la fuerza organizativa sin volverla arcaica; el verbo «había» completa de manera idiomática la elipsis del hebreo, como en la solución inglesa con «were».
- source_word: מַחֲלֻקְתּוֹ
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - curso
  - compañía
  lexicon: HALOT
  rationale: En 1 Crónicas 27 el término señala una unidad de servicio militar organizada. «División» es la opción española más clara y menos cargada que «curso», y más amplia que «compañía» para no restringir indebidamente el tamaño de la unidad.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: Se usa el cardinal moderno estándar en español. La cifra es directa y no presenta tensión semántica; la forma compuesta moderna mejora la legibilidad sin alterar el valor numérico.
theological_decisions:
- issue: Tratamiento del posible sentido de לַזַּרְחִי como pertenencia clánica más que como simple gentilicio singular
  english_pob_reading: 'Or ''for the Zerahite.'' The Hebrew expression may be taken more woodenly as a singular gentilic, but in context it likely denotes clan affiliation: ''of the Zerahites.'''
  chosen_spanish_reading: de los zerahitas
  alternative_spanish_readings:
  - para el zerahita
  - del zerahita
  rationale: Se conserva la lectura contextual de afiliación colectiva porque el listado de 1 Crónicas 27 funciona como registro de turnos y grupos, no de individuos aislados. La pluralidad evita una lectura demasiado literal que en español podría sonar accidentalmente singular o incompleta.
  doctrine_reference: 1 Crónicas 27:1-15; uso genealógico/clánico de los gentilicios en listas administrativas bíblicas
translation_notes:
  revision_awareness: Se mantuvo la solución previa sin cambios sustanciales, en línea con el último pase de revisión (high_agreement; no applied revisions). La única decisión notable es explicitar en español la misma alternativa de lectura clánica que la nota inglesa ya documenta.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no se presenta.
  - «Mes» y el ordinal se traducen de forma paralela al patrón administrativo del capítulo.
  - Se mantuvo «división» para מַחֲלֻקְתּוֹ por consistencia interna con listas militares de servicio.
  - La transliteración de nombres propios sigue una forma reconocible y estable en español bíblico de este proyecto.
