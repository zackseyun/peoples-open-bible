  spanish_quality_summary: El español es mayormente claro y digno, pero «ha sido reservado» resulta algo forzado con «un número de años». «Han sido guardados» o «están guardados» suena más natural y conserva mejor el matiz metafórico de צפן. También conviene añadir la nota léxica correspondiente al segundo hemistiquio, ya presente en el audit trail inglés.
  glossary_alignment: 'No hay términos del glosario maestro especialmente activados aquí. «El malvado» para רָשָׁע es adecuado; «se retuerce» para מִתְחוֹלֵל es fiel; para עָרִיץ, «el violento» es aceptable aunque «el despiadado» también cabría. La principal desviación es de fidelidad al audit trail, no del glosario: falta la alternativa de נִצְפְּנוּ.'
