translation:
  language: es
  text: La justicia de un padre no será borrada[a], y en lugar de los pecados quedará plantada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Porque la limosna de un padre no será olvidada, y en vez de pecados será edificada para ti». El griego refleja una redacción algo distinta, sobre todo «limosna» y «será edificada».'
    reason: alternative_reading
lexical_decisions:
- source_word: צִדְקַת אָב
  english_pob_choice: a father's righteousness
  chosen_spanish: la justicia de un padre
  alternatives_spanish:
  - la rectitud de un padre
  - la justicia de un padre
  lexicon: HALOT
  rationale: El hebreo habla literalmente de la 'justicia de un padre'. En español, 'justicia' conserva bien el campo ético y relacional del término, y evita reducirlo indebidamente a una sola obra de caridad. Se mantiene la lectura hebrea primaria frente al matiz más específico del griego.
- source_word: לֹא תִּמָּחֶה
  english_pob_choice: will not be wiped away
  chosen_spanish: no será borrada
  alternatives_spanish:
  - no será borrada
  - no será borrada de la memoria
  - no será eliminada
  lexicon: HALOT
  rationale: El nifal de מחה expresa la idea de ser borrado o borrada. 'Borrada' es natural en español y conserva la imagen de eliminación de un registro o recuerdo sin añadir explicaciones.
- source_word: וּתְמוּר
  english_pob_choice: and in place of
  chosen_spanish: y en lugar de
  alternatives_spanish:
  - y en lugar de
  - y como փոխ等
  - y en compensación por
  lexicon: HALOT
  rationale: '''En lugar de'' reproduce el valor de sustitución/exchange de תמור sin interpretar el mecanismo como expiación técnica o recompensa meritoria.'
- source_word: חַטָּאת
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados
  - el pecado
  - las faltas
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sentido plural de acciones culpables encaja mejor. 'Los pecados' sigue de cerca el hebreo y el marco semántico que el POB inglés adoptó con 'sins'.
- source_word: הִיא תְּנַתֵּעַ
  english_pob_choice: it will be planted
  chosen_spanish: será plantada
  alternatives_spanish:
  - será plantada
  - será establecida
  - echará raíces
  lexicon: HALOT
  rationale: El hebreo sugiere un verbo relacionado con plantar. 'Será plantada' mantiene la imagen agrícola del texto hebreo, aunque suene algo pasiva en español; esa ligera dureza es aceptable porque preserva mejor el testimonio primario. El griego ofrece una alternativa distinta ('será edificada'), pero el hebreo gobierna el texto principal.
theological_decisions:
- issue: Relación entre justicia parental, pecado y compensación
  english_pob_reading: The translation preserves the text's substitution language ('in place of sins') without specifying a later doctrinal mechanism of atonement or merit.
  chosen_spanish_reading: La versión conserva el lenguaje de sustitución ('en lugar de los pecados') sin precisar un mecanismo doctrinal posterior de expiación o mérito.
  alternative_spanish_readings:
  - La obra del padre borra pecados
  - La obra del padre expía pecados
  - La obra del padre queda registrada favorablemente a pesar de los pecados
  rationale: Ben Sira usa un lenguaje fuerte de retribución/substitución moral. La traducción no debe suavizarlo a simple recuerdo favorable, pero tampoco debe importar una doctrina más desarrollada que el versículo no formula. Mantener 'en lugar de' deja visible la tensión teológica del texto.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Peso del testimonio hebreo frente al griego
  english_pob_reading: The Hebrew witness is primary here, with the Greek preserved as an alternative reading in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo; la lectura griega queda indicada como variante en nota.
  alternative_spanish_readings:
  - 'Seguir el griego: ''la limosna de un padre no será olvidada, y será edificada'''
  - Fusionar hebreo y griego en una sola redacción
  rationale: El paquete fuente da confianza alta al hebreo de Kahana, mientras que el griego funciona como comprobación y variante de respaldo. En español conviene mantener la línea hebrea en el texto principal y documentar la alternativa griega para no borrar la tensión textual.
  doctrine_reference: DOCTRINE.md §1 Prefer primary source witnesses; §2 Preserve documented textual variants
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó 'for you' por no estar representado en el hebreo. La redacción española sigue ese ajuste y no añade un equivalente implícito. También se respeta la observación de que el griego diverge en 'limosna' y 'será edificada', por lo que esa lectura se preserva solo en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda; aquí no aparece el Tetragrámaton.
  - '''Justicia'' se emplea para צִדְקַת en continuidad con el hebreo y sin reducirlo a limosna.'
  - La pasiva 'será plantada' conserva la imagen verbal hebrea sin introducir sujeto adicional.
  - Se mantiene la diferencia entre el texto principal hebreo y la variante griega documentada en nota.
