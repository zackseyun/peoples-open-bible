review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del hebreo y del POB en inglés: «los jóvenes», «habían crecido con él», «al pueblo», «yugo» y «la cintura de mi padre» son opciones fieles y legibles. Sin embargo, hay varios problemas de precisión y forma: la nota [a] está anclada en el lugar equivocado; el marcador [o] no sigue la secuencia requerida y rompe la disciplina de notas; «mi dedit[o] pequeño» es una forma impropia y poco digna para el registro bíblico; «Así dirás a ellos» suena antinatural en español; y «aligéranos» cambia el objeto implícito del hebreo desde el yugo/carga hacia las personas mismas, aunque la nota intenta justificarlo.'
  spanish_quality_summary: 'La legibilidad es desigual. Buena parte del verso suena natural, pero hay detalles que deterioran la calidad: uso de un diminutivo coloquial («dedit[o]»), sintaxis poco idiomática («Así dirás a ellos»), anidación de comillas mejorable y un sistema de notas inconsistente. Un ajuste menor deja el texto claro, digno y ampliamente legible para español eclesial contemporáneo.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Se preserva «yugo» correctamente. La decisión idiomática para קָטָנִּי debe expresarse en español como «mi dedo pequeño» o «mi meñique», no con diminutivo. «Cintura» concuerda con la racionalidad documentada del POB para מָתְנַיִם, con alternativa «lomos» en nota si se desea preservar el matiz léxico.
  issues:
  - severity: high
    issue: El marcador [a] está puesto después de «hablaron con él» pero la nota trata sobre «los jóvenes».
    rationale: La instrucción exige que cada nota se ancle exactamente en la palabra o frase pertinente. El anclaje actual induce a error.
  - severity: high
    issue: 'El marcador [o] no sigue la secuencia requerida (a, b, c...) y se usa dentro de una palabra artificial: «dedit[o]».'
    rationale: Viola la disciplina formal de notas y produce una forma ortográficamente impropia en el texto bíblico.
  - severity: medium
    issue: «Mi dedit[o] pequeño» es demasiado coloquial y poco digno para el registro meta.
    rationale: Aunque intenta reflejar el idiomatismo, el diminutivo suena infantil y rebaja el tono del pasaje.
  - severity: medium
    issue: «Así dirás a ellos» es una construcción poco natural en español.
    rationale: La forma idiomática es «Así les dirás» o «Así les dirás a ellos».
  - severity: medium
    issue: «Aligéranos» desplaza el objeto del hebreo desde el yugo implícito hacia las personas.
    rationale: El sentido contextual es ‘hazlo más ligero para nosotros’ o ‘alivia nuestra carga’. Conviene expresar el objeto implícito para mayor fidelidad.
