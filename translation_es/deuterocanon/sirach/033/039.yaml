revisions:
- from: Y hay un amigo que se vuelve enemistad[a], y descubrirá una disputa para tu vergüenza[b].
  to: Y hay un amigo que se vuelve hostil[a], y sacará a la luz una disputa para tu vergüenza[b].
  rationale: Se corrige un calco poco natural ('se vuelve enemistad') por una formulación idiomática ('se vuelve hostil') y se preserva en nota el dato importante de que el griego usa un abstracto. También se mejora 'descubrirá' a 'sacará a la luz' para reflejar mejor una exposición deshonrosa en español natural.
