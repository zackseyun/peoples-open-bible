    rationale: El verbo compuesto indica reunir o convocar a una asamblea, no solo llamar. «Convocó a todos los ancianos» preserva mejor la fuerza causativa y el contexto cívico.
  - severity: medium
    issue: «todos sus jóvenes» pierde la referencia masculina de νεανίσκος
    rationale: El griego distingue «sus jóvenes varones» de «las mujeres». En español, «jóvenes» puede sonar inclusivo o mixto, lo cual borra el contraste social explícito del original.
  - severity: low
    issue: La nota al pie actual explica «las mujeres» pero no la decisión más problemática
    rationale: La dificultad real en español está en cómo reflejar νεανίσκος frente a αἱ γυναῖκες. Si se usa una nota, debe anclarse a la expresión de los jóvenes varones, no a «las mujeres».
