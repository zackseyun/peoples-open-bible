translation:
  language: es
  text: 'David respondió al sacerdote y le dijo: «Ciertamente, las mujeres han sido apartadas de nosotros[a] desde ayer y anteayer[b], cuando salí; y los utensilios[c] de los jóvenes son santos, aunque es un viaje ordinario[d]. Cuánto más hoy será santo en el utensilio[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una mujer ha sido apartada de nosotros», o «nos hemos abstenido de mujeres». La expresión hebrea se refiere a abstinencia sexual en preparación para tratar con cosas santas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como ayer, anteayer», un modismo hebreo que alude a días previos; algunos lo entienden con más precisión como «desde hace unos tres días».
    reason: lexical_alternative
  - marker: c
    text: «Utensilios»/«utensilio» puede referirse al equipo de los jóvenes; algunos entienden la expresión de manera eufemística, como sus cuerpos o personas. La frase final sigue siendo oscura y puede mantener la misma ambigüedad.
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo de la última cláusula es difícil. También puede entenderse: «aunque el viaje es ordinario, hoy será santo en lo que respecta al utensilio/equipo», o de manera semejante.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה עֲצֻרָה לָנוּ
  english_pob_choice: women have been kept from us
  chosen_spanish: las mujeres han sido apartadas de nosotros
  alternatives_spanish:
  - una mujer ha sido apartada de nosotros
  - nos hemos abstenido de mujeres
  lexicon: HALOT
  rationale: El hebreo expresa abstinencia sexual respecto de mujeres en un marco de preparación ritual. En español, «han sido apartadas de nosotros» conserva la pasiva y el sentido colectivo sin volver la frase más moralista o más técnica de lo que permite el contexto.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  english_pob_choice: as yesterday and the day before
  chosen_spanish: desde ayer y anteayer
  alternatives_spanish:
  - como ayer y anteayer
  - desde hace unos tres días
  lexicon: HALOT
  rationale: El modismo hebreo apunta a días previos y aquí indica un período previo de abstinencia. «Desde ayer y anteayer» refleja el giro idiomático de manera natural en español y mantiene la fuerza temporal sin imponer una precisión aritmética rígida.
- source_word: בְּצֵאתִי
  english_pob_choice: when I went out
  chosen_spanish: cuando salí
  alternatives_spanish:
  - al salir
  - cuando me puse en camino
  lexicon: HALOT
  rationale: La construcción temporal se traduce de forma directa y fluida en español. «Cuando salí» conserva la referencia al momento de partida del encargo.
- source_word: כְלֵי הַנְּעָרִים
  english_pob_choice: the young men’s vessels
  chosen_spanish: los utensilios de los jóvenes
  alternatives_spanish:
  - el equipo de los jóvenes
  - los cuerpos de los jóvenes
  lexicon: HALOT
  rationale: '«Utensilios» mantiene la cercanía al valor básico de כְּלִי y deja abierta la ambigüedad señalada por la POB inglesa: puede referirse al equipo o, de modo eufemístico, a las personas/cuerpos. Se evita resolver prematuramente la dificultad.'
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - consagrados
  - sagrados
  lexicon: HALOT
  rationale: En este contexto cultual, «santos» comunica el estado de consagración de manera natural en español bíblico, sin trasladar el pasaje a una categoría meramente moral.
- source_word: וְהוּא דֶּרֶךְ חֹל
  english_pob_choice: it is an ordinary journey
  chosen_spanish: es un camino común
  alternatives_spanish:
  - es un viaje ordinario
  - es un camino profano
  lexicon: HALOT
  rationale: חֹל contrasta con lo santo como lo común/ordinario. «Camino común» preserva ese contraste y evita endurecer el matiz hacia «profano» donde el texto simplemente contrapone lo no consagrado a lo santo.
- source_word: וְאַף כִּי
  english_pob_choice: How much more
  chosen_spanish: ¡Cuánto más!
  alternatives_spanish:
  - y más aún
  - con mayor razón
  lexicon: HALOT
  rationale: La partícula introduce intensificación argumentativa. «¡Cuánto más!» expresa bien la inferencia y conserva el tono enfático del hebreo.
- source_word: הַיּוֹם יִקְדַּשׁ
  english_pob_choice: today will it be holy
  chosen_spanish: hoy será santo
  alternatives_spanish:
  - hoy será consagrado
  - hoy será santo/consagrado
  lexicon: HALOT
  rationale: Se conserva el verbo de santificación en forma verbal, sin reducirlo a un adjetivo estático. «Será santo» mantiene la idea de pasar a un estado santo en el momento presente.
- source_word: בַּכֶּלִי
  english_pob_choice: in the vessel
  chosen_spanish: en el utensilio
  alternatives_spanish:
  - con el utensilio
  - en el cuerpo
  lexicon: HALOT
  rationale: La frase final es oscura. Mantener «utensilio» sostiene la continuidad con כְלֵי y evita decidir entre equipo, cuerpo u otra referencia cultual. Aunque suene poco usual, preserva la tensión documentada por la POB inglesa.
theological_decisions:
- issue: Lenguaje de pureza ritual y abstinencia sexual en relación con el pan consagrado
  english_pob_reading: Render the verse in terms of ritual holiness/consecration without importing later doctrinal categories.
  chosen_spanish_reading: Traducir en términos de santidad/consagración ritual, sin convertir el pasaje en una declaración moral general ni en una categoría doctrinal posterior.
  alternative_spanish_readings:
  - Interpretarlo principalmente como pureza moral
  - Presentarlo solo como limpieza práctica
  rationale: El contexto trata de comer pan consagrado y de la idoneidad ritual. La traducción mantiene el marco cultual de santo/común y la abstinencia sexual implícita, sin desplazar el sentido hacia una moralización ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: conserva la secuencia idiomática «ayer y anteayer», mantiene el cierre difícil con lenguaje de «vessel/utensilio», y respeta la intensificación de וְאַף כִּי mediante «¡Cuánto más!».'
  spanish_consistency_notes:
  - Se emplea «santo/santos» para קֹדֶשׁ en sentido cultual, manteniendo la distinción santo/común.
  - Se evita traducir YHWH aquí porque el versículo no lo contiene.
  - Se preserva la ambigüedad lexical de כְּלִי/utensilio para no resolver una dificultad que el audit trail también deja abierta.
