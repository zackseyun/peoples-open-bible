translation:
  language: es
  text: Entonces Elcaná fue a Ramá, a su casa; y el muchacho ministraba a Yahvé delante[a] de Elí el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en presencia de Elí el sacerdote»; el hebreo literalmente dice «ante/en la presencia de Elí el sacerdote».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  - se fue
  lexicon: HALOT
  rationale: El wayyiqtol de הלך avanza la narración con un movimiento simple. En español, "fue" comunica bien ese avance sin añadir el matiz de retorno que el verbo hebreo no expresa por sí mismo.
- source_word: הָרָמָתָה
  english_pob_choice: to Ramah
  chosen_spanish: a Ramá
  alternatives_spanish:
  - hacia Ramá
  - a la Ramá
  lexicon: HALOT
  rationale: El he direccional indica destino. "A Ramá" es natural en español y conserva el sentido de movimiento hacia el lugar.
- source_word: עַל בֵּיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - para su casa
  lexicon: HALOT
  rationale: La preposición עַל en este giro funciona idiomáticamente como destino hacia el hogar. "A su casa" refleja el sentido sin forzar una literalidad engañosa.
- source_word: וְהַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar varios rangos de edad; aquí Samuel aparece como un servidor joven en el santuario. "Muchacho" mantiene esa concreción narrativa y suena natural en español.
- source_word: הָיָה מְשָׁרֵת
  english_pob_choice: was ministering
  chosen_spanish: ministraba
  alternatives_spanish:
  - estaba ministrando
  - servía
  lexicon: HALOT
  rationale: La construcción היה + participio expresa acción continua. En español, el imperfecto "ministraba" comunica duratividad y preserva el matiz cultual de servicio sacro mejor que un simple pasado puntual.
- source_word: אֶת יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - delante de Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino del hebreo como "Yahvé", conforme a la terminología del proyecto, en lugar de ocultarlo con una sustitución por "Señor".
- source_word: אֶת פְּנֵי עֵלִי הַכֹּהֵן
  english_pob_choice: before Eli the priest
  chosen_spanish: delante de Elí el sacerdote
  alternatives_spanish:
  - en presencia de Elí el sacerdote
  - ante Elí el sacerdote
  lexicon: HALOT
  rationale: La expresión literal es "la presencia/rostro de" Elí. "Delante de" conserva esa relación espacial-relacional y evita sobreinterpretar la frase como una mera subordinación administrativa. En español, también mantiene naturalidad formal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Según la norma del proyecto, debe conservarse el nombre divino en español como "Yahvé", manteniendo visible la identidad del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail en inglés primero traduce עַל בֵּיתוֹ como "to his house" y luego revisa la frase relacional final de "in the presence of" a "before". La versión española sigue esa revisión al preferir "delante de" como equivalente más directo y formal del hebreo, y mantiene el nombre divino como Yahvé conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - '"Elí" y "Elcaná" siguen la forma española habitual de nombres propios bíblicos.'
  - El imperfecto "ministraba" conserva el aspecto progresivo del hebreo היה + participio.
  - La nota al pie marca la alternativa relacional de פְּנֵי עֵלִי הַכֹּהֵן sin duplicar el sentido en el texto principal.
