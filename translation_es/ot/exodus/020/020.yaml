translation:
  language: es
  text: 'Y Moisés dijo al pueblo[a]: «No teman, porque Dios ha venido para probarlos, y para que el temor de él[b] esté delante de ustedes[c], para que no pequen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengan miedo». El hebreo usa la misma raíz de temor más adelante en el versículo («el temor de él»), creando un contraste deliberado entre el pánico y el temor apropiado de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «reverencia hacia él» o «temor reverente hacia él». El sustantivo hebreo puede denotar temor en el sentido de reverente asombro, así como miedo.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «sobre sus rostros». Es un modismo que expresa algo puesto delante de una persona o mantenido presente a su conciencia.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה אֶל הָעָם
  english_pob_choice: And Moses said to the people
  chosen_spanish: Y Moisés dijo al pueblo
  alternatives_spanish:
  - Entonces Moisés dijo al pueblo
  - Y Moisés habló al pueblo
  lexicon: HALOT
  rationale: Mantengo el narrador en pasado simple y una fórmula natural en español. 'Al pueblo' conserva el destinatario colectivo sin añadir matices no presentes en el hebreo.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman ustedes
  lexicon: HALOT
  rationale: '''Teman'' conserva el campo semántico de ירא y permite mantener la tensión léxica con ''su temor'' en la segunda mitad del verso. ''No tengan miedo'' sería más idiomático, pero diluye el vínculo verbal.'
- source_word: לְבַעֲבוּר נַסּוֹת
  english_pob_choice: for God has come to test you
  chosen_spanish: para probarlos
  alternatives_spanish:
  - para examinarlos
  - para ponerlos a prueba
  lexicon: HALOT
  rationale: '''Probar'' comunica el propósito divino sin sugerir tentación al mal. Es la opción más breve y fiel al valor de נסה en este contexto.'
- source_word: בָּא הָאֱלֹהִים
  english_pob_choice: God has come
  chosen_spanish: Dios ha venido
  alternatives_spanish:
  - Dios ha llegado
  - Dios vino
  lexicon: HALOT
  rationale: '''Ha venido'' reproduce bien el qatal con relevancia presente en la escena. ''Dios'' refleja el sustantivo genérico הָאֱלֹהִים sin usar una máscara para el nombre divino, que no aparece aquí.'
- source_word: וּבַעֲבוּר תִּהְיֶה יִרְאָתוֹ
  english_pob_choice: and so that the fear of him may be before you
  chosen_spanish: y para que su temor esté delante de ustedes
  alternatives_spanish:
  - y para que el temor de él esté delante de ustedes
  - y para que su reverencia esté delante de ustedes
  lexicon: HALOT
  rationale: Conservo 'temor' para mantener la conexión verbal con 'No teman'. 'Su temor' respeta el posesivo del hebreo; en español es menos literal que 'el temor de él', pero más natural y todavía transparente.
- source_word: עַל פְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - sobre sus rostros
  lexicon: HALOT
  rationale: '''Delante de ustedes'' expresa el sentido idiomático de ''sobre sus rostros'' sin introducir una imagen opaca en la lectura principal. La literalidad queda recogida en nota.'
- source_word: לְבִלְתִּי תֶחֱטָאוּ
  english_pob_choice: so that you may not sin
  chosen_spanish: para que no pequen
  alternatives_spanish:
  - a fin de que no pequen
  - para que no cometan pecado
  lexicon: HALOT
  rationale: '''Pecar'' es el equivalente natural de חטא en español bíblico contemporáneo y mantiene el valor final de la cláusula negativa.'
theological_decisions:
- issue: Tensión entre 'No teman' y 'su temor' en el mismo versículo
  english_pob_reading: Preserve both as 'fear' in the main text
  chosen_spanish_reading: Preservar el vínculo entre 'teman' y 'temor' en el texto principal
  alternative_spanish_readings:
  - Resolver la tensión con 'No tengan miedo' y 'reverencia'
  - Usar 'temor reverente' en lugar de 'temor'
  rationale: El hebreo contrapone el temor de pánico ante la teofanía con el temor adecuado de Dios. Mantener la raíz tem- en español deja visible esa relación en vez de suavizarla interpretativamente.
  doctrine_reference: Translation philosophy §3
- issue: Sentido del verbo divino 'probar'
  english_pob_reading: Translate נַסּוֹת as 'to test' without importing a moral implication of tempting to evil
  chosen_spanish_reading: Traducir נַסּוֹת como 'probar' sin sugerir que Dios tienta al mal
  alternative_spanish_readings:
  - poner a prueba
  - examinar
  rationale: '''Probar'' expresa la finalidad pedagógica y discriminadora del acto divino en el contexto, sin añadir la idea de inducir al pecado.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase de revisión en inglés, que quedó sin cambios. Se mantuvo la decisión auditada de preservar la tensión léxica entre el mandato negativo y 'su temor', y se adaptó al español sin perder la conexión verbal. No se detectaron variantes textuales relevantes.
  spanish_consistency_notes:
  - Se usa 'Dios' para הָאֱלֹהִים, ya que no aparece el tetragrámaton en este versículo.
  - Se prefirió 'teman/temor' para conservar el juego léxico del hebreo; la nota ofrece la alternativa idiomática 'No tengan miedo'.
  - '''Delante de ustedes'' comunica el modismo de עַל פְּנֵיכֶם en español claro; la nota preserva la literalidad.'
  - Se emplea puntuación de cita española y mayúsculas normativas en nombres propios.
