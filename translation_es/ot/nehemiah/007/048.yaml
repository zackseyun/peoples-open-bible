lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los descendientes de
  alternatives_spanish:
  - los hijos de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En listas genealógicas, el hebreo בְּנֵי puede señalar una línea familiar o pertenencia de clan, no solo hijos varones inmediatos. En español, 'descendientes de' conserva esa amplitud y evita restringir indebidamente el sentido, siguiendo la nota auditada del POB en inglés.
- source_word: לְבָנָה
  english_pob_choice: Lebanah
  chosen_spanish: Lebaná
  alternatives_spanish:
  - Lebana
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta la acentuación al español para facilitar lectura, sin alterar la forma del nombre.
- source_word: חֲגָבָה
  english_pob_choice: Hagabah
  chosen_spanish: Hagabá
  alternatives_spanish:
  - Hagaba
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma con acento final refleja la pronunciación castellana moderna sin añadir significado extra.
- source_word: שַׁלְמָי
  english_pob_choice: Shalmai
  chosen_spanish: Shalmay
  alternatives_spanish:
  - Salmay
  - Shalmai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la inicial 'Sh' para reflejar שׁ, y la terminación '-ay' para aproximar la vocalización masorética; se evita castellanizarlo en exceso para no ocultar la forma hebrea.
theological_decisions:
- issue: Sentido genealógico de בְּנֵי en listas de retorno/registro
  english_pob_reading: the sons of ... can denote a family line or clan membership, not only immediate male children.
  chosen_spanish_reading: los descendientes de ... puede denotar una línea familiar o membresía de clan, no solo hijos varones inmediatos.
  alternative_spanish_readings:
  - los hijos de ...
  - los miembros de la familia de ...
  rationale: 'No hay una cuestión doctrinal en sentido estricto, pero sí una decisión semántica relevante: la frase debe leerse como fórmula genealógica amplia. ''Descendientes de'' preserva esa tensión y evita una lectura demasiado literalista o restringida.'
  doctrine_reference: N/A
- issue: Variante nominal en la tradición paralela para el último nombre
  english_pob_reading: Some parallel list traditions spell the final name 'Salmai.' Here the Hebrew form in Nehemiah reads Shalmai.
  chosen_spanish_reading: Aquí se mantiene Shalmay, conforme a la forma hebrea de Nehemías; puede compararse con tradiciones paralelas donde aparece Salmai.
  alternative_spanish_readings:
  - Salmay
  - Salmai
  rationale: La lectura principal debe seguir el hebreo de Nehemías. La nota preserva la tensión textual sin fusionar indebidamente las tradiciones paralelas.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión más reciente del POB en inglés fue revisada y quedó sin cambios; el presente borrador sigue esa lectura estable, con adaptación al español y sin introducir cambios textuales nuevos.
  spanish_consistency_notes:
  - Se usa 'descendientes de' de manera consistente para בְּנֵי en esta lista, porque la fórmula es genealógica y no exige 'hijos' en sentido biológico estricto.
  - Los nombres propios se transliteran y se ajusta solo la acentuación gráfica cuando ayuda a la lectura en español, sin traducirlos.
  - Se conserva la distinción textual entre la forma hebrea de Nehemías y una tradición paralela para el último nombre, sin nivelarlas en el texto principal.
