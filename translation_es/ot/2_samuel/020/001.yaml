translation:
  language: es
  text: 'Y allí había un hombre despreciable[a], cuyo nombre era Seba hijo de Bicri, un benjaminita. Tocó la trompeta[b] y dijo: «No tenemos parte en David[c], ni herencia en el hijo de Isaí. ¡Cada uno a sus tiendas[d], oh Israel!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «malvado», «un sinvergüenza» o, más literalmente, «un hombre de Belial».
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, un cuerno usado como señal pública; tradicionalmente se entiende como cuerno de carnero.
    reason: cultural_note
  - marker: c
    text: O «No tenemos porción en David».
    reason: lexical_alternative
  - marker: d
    text: El hebreo dice «Cada uno a sus tiendas», un modismo distributivo que significa que cada persona debe retirarse a su propia casa o campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְרָא
  english_pob_choice: there happened to be
  chosen_spanish: se encontraba
  alternatives_spanish:
  - había
  - resultó estar
  lexicon: HALOT
  rationale: En este giro existencial con שָׁם, el verbo funciona como introducción narrativa. «Se encontraba» comunica la presencia sin sugerir un acto de nombrar.
- source_word: אִישׁ בְּלִיַּעַל
  english_pob_choice: a worthless man
  chosen_spanish: un hombre indigno
  alternatives_spanish:
  - un hombre malvado
  - un hombre miserable
  - un hombre de Belial
  lexicon: HALOT
  rationale: La frase describe a una persona base o perversa. «Indigno» conserva el juicio moral sin introducir la carga posterior de «Belial» como nombre propio.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: Seba hijo de Bicri
  alternatives_spanish:
  - Sheba hijo de Bicri
  - Seba hijo de Bichri
  lexicon: Convención de transliteración propia del proyecto
  rationale: Los nombres propios se transliteran con forma española estándar. «Seba» refleja la adaptación común del nombre hebreo en español bíblico.
- source_word: אִישׁ יְמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: un benjaminita
  alternatives_spanish:
  - un hombre de Benjamín
  - un benjamita
  lexicon: HALOT
  rationale: La expresión señala afiliación tribal. «Benjaminta» es idiomático, breve y preserva el sentido étnico-tribal.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  english_pob_choice: He blew the trumpet
  chosen_spanish: tocó el shofar
  alternatives_spanish:
  - hizo sonar el cuerno
  - tocó la trompeta
  - hizo sonar el shofar
  lexicon: HALOT
  rationale: Se conserva el término técnico «shofar» para reflejar con precisión el objeto hebreo. «Tocó» expresa el acto de hacer sonar el instrumento en un contexto de señal pública.
- source_word: אֵין לָנוּ חֵלֶק בְּדָוִד
  english_pob_choice: We have no share in David
  chosen_spanish: No tenemos parte en David
  alternatives_spanish:
  - No tenemos participación en David
  - No tenemos porción en David
  lexicon: HALOT
  rationale: «Parte» transmite de manera natural el valor de חֵלֶק como participación o cuota política. Preserva bien la negativa a la vinculación con el reinado de David.
- source_word: וְלֹא נַחֲלָה לָנוּ בְּבֶן יִשַׁי
  english_pob_choice: and no inheritance in the son of Jesse
  chosen_spanish: ni herencia en el hijo de Isaí
  alternatives_spanish:
  - ni posesión en el hijo de Isaí
  - ni heredad en el hijo de Isaí
  lexicon: HALOT
  rationale: «Herencia» mantiene el matiz de נַחֲלָה y su resonancia de posesión asignada, sin perder la fuerza metafórica-política del reclamo.
- source_word: בְּבֶן יִשַׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - el hijo de Jesé
  - Jesse
  lexicon: Convención bíblica española
  rationale: La referencia a David por linaje, no por título, se conserva con «el hijo de Isaí», manteniendo el tono despectivo o desrealizador del hebreo.
- source_word: אִישׁ לְאֹהָלָיו
  english_pob_choice: Every man to his tents
  chosen_spanish: Cada uno a sus tiendas
  alternatives_spanish:
  - Cada hombre a sus tiendas
  - Que cada uno vaya a su tienda
  lexicon: HALOT
  rationale: Es un modismo distributivo. «Cada uno a sus tiendas» conserva el carácter de consigna y fluye de forma natural en español, sin perder la imagen de separación o disolución.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Oh Israel
  - ¡Israel!
  lexicon: Pragmática del discurso
  rationale: En español, el vocativo queda suficientemente marcado por el contexto imperativo y exclamativo; no se fuerza el «Oh» si entorpece la consigna.
theological_decisions:
- issue: Cómo rendir בְּלִיַּעַל sin introducir una categoría demonológica ajena
  english_pob_reading: 'descriptive term: ''worthless man'''
  chosen_spanish_reading: 'descriptivo: «un hombre indigno»'
  alternative_spanish_readings:
  - «un hombre de Belial»
  rationale: El contexto histórico-narrativo caracteriza a Sheba moralmente. Traducir de modo descriptivo evita cargar el pasaje con asociaciones teológicas posteriores no exigidas por el texto.
  doctrine_reference: Primacía del hebreo original sobre la tradición translacional
- issue: Si el cierre debe explicitar el vocativo con «O/Oh»
  english_pob_reading: O Israel
  chosen_spanish_reading: «Israel» como vocativo contextual
  alternative_spanish_readings:
  - «Oh Israel»
  - «¡Israel!»
  rationale: El llamado funciona como arenga política. En español, la exclamación final y el contenido imperativo ya comunican el tono vocativo sin añadir una partícula que suene artificial.
  doctrine_reference: Pragmática del discurso bíblico
- issue: La relación entre שׁוֹפָר y el equivalente español
  english_pob_reading: trumpet / shofar in footnote
  chosen_spanish_reading: «shofar» con nota cultural
  alternative_spanish_readings:
  - «trompeta»
  - «cuerno»
  rationale: Mantener el término técnico respeta la referencia cultural del objeto. La nota puede explicar que se trata de un cuerno usado como señal pública.
  doctrine_reference: Precisión cultural y terminológica
translation_notes:
  revision_awareness: Conforme al control cruzado más reciente, no hubo cambios sustanciales requeridos; se corrigió la anclaje de notas para que cada marcador aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «shofar» como préstamo técnico por precisión cultural, coherente con el contexto hebreo.
  - Se preserva la distinción entre «parte» y «herencia» para reflejar la doble formulación hebrea.
  - La exclamación final se resuelve de manera natural en español sin perder el valor de arenga.
