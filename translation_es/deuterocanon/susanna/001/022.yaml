translation:
  language: es
  text: 'Y dijeron: «Mira, las puertas del jardín[a] están cerradas, y nadie nos ve, y estamos llenos de deseo por ti. Por tanto, consiente en estar con nosotros y estate con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego παράδεισος, aquí con el sentido de un jardín o recinto cerrado, no «paraíso» en el sentido teológico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  - Mira bien
  lexicon: BDAG
  rationale: Es un deíctico que llama la atención. «Mira» conserva la inmediatez del original griego y funciona con naturalidad en español contemporáneo.
- source_word: αἱ θύραι τοῦ παραδείσου
  english_pob_choice: the doors of the garden
  chosen_spanish: las puertas del jardín
  alternatives_spanish:
  - las puertas del parque
  - las puertas del huerto
  lexicon: LSJ
  rationale: Aquí παράδεισος designa un espacio cerrado ajardinado, no el sentido teológico posterior de «paraíso». «Jardín» es la opción más clara y fiel al contexto narrativo de Susana.
- source_word: κέκλεινται
  english_pob_choice: are shut
  chosen_spanish: están cerradas
  alternatives_spanish:
  - han sido cerradas
  - están cerradas con llave
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado presente resultante de la acción. «Están cerradas» transmite ese estado de forma natural en español sin añadir más de lo que dice el griego.
- source_word: θεωρεῖ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - está mirando
  lexicon: BDAG
  rationale: El verbo indica ver/percibir. «Ve» es la traducción más directa y sobria en este contexto de ocultamiento.
- source_word: ἐν ἐπιθυμίᾳ σού ἐσμεν
  english_pob_choice: we are filled with desire for you
  chosen_spanish: estamos llenos de deseo por ti
  alternatives_spanish:
  - estamos dominados por el deseo de ti
  - te deseamos con vehemencia
  lexicon: BDAG
  rationale: ἐπιθυμία denota deseo intenso; el contexto sexual coercitivo lo orienta aquí, pero la revisión inglesa prefirió no intensificar más de lo explicitado. «Estamos llenos de deseo por ti» sigue de cerca la lectura inglesa revisada y preserva la tensión sin exagerarla.
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Marca consecuencia lógica. «Por tanto» es claro, formal y fiel al valor inferencial del griego.
- source_word: συγκατάθου ἡμῖν
  english_pob_choice: consent to us
  chosen_spanish: consiente con nosotros
  alternatives_spanish:
  - consiente a nosotros
  - cede ante nosotros
  - acéptanos
  lexicon: LSJ
  rationale: El imperativo medio pide asentimiento/ceder al reclamo. «Consiente con nosotros» conserva la idea de consentimiento demandado; la preposición española no reproduce de manera literal la construcción griega, pero evita suavizar el tono coercitivo.
- source_word: γενοῦ μεθ᾿ ἡμῶν
  english_pob_choice: be with us
  chosen_spanish: estate con nosotros
  alternatives_spanish:
  - ven con nosotros
  - quédate con nosotros
  lexicon: BDAG
  rationale: La expresión es una invitación/propuesta sexual en contexto. «Estate con nosotros» mantiene cercanía formal al griego y sugiere presencia/compañía sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Sentido de παράδεισος en un relato no escatológico
  english_pob_reading: garden
  chosen_spanish_reading: jardín
  alternative_spanish_readings:
  - paraíso
  - parque
  rationale: En este pasaje la palabra nombra un recinto ajardinado cerrado. Traducir «paraíso» induciría una lectura doctrinal ajena al contexto narrativo; «jardín» evita esa confusión y sigue la decisión auditada del POB en inglés.
  doctrine_reference: Principio de primacía del texto original sobre la tradición de traducción
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que cambió «we are burning with desire for you» por «we are filled with desire for you» para acercarse más a ἐν ἐπιθυμίᾳ σού ἐσμεν sin intensificar indebidamente el matiz. También se mantiene la decisión auditada de traducir παράδεισος como «jardín».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se conserva un registro formal pero legible, adecuado para texto bíblico público.
  - No se usa «paraíso» para παράδεισος, porque el contexto exige un recinto ajardinado.
  - «Consiente con nosotros» y «estate con nosotros» reflejan la coerción y la propuesta del pasaje sin suavizarla.
