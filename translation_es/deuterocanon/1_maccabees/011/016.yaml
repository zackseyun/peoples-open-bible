translation:
  language: es
  text: Y Alejandro huyó a Arabia, para ser resguardado[a] allí; pero el rey Ptolomeo fue exaltado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ser protegido allí», «para hallar refugio allí» o «para ser cobijado allí». La construcción de finalidad con infinitivo pasivo puede sugerir refugio, ocultamiento o protección.
    reason: lexical_alternative
  - marker: b
    text: O «fue elevado» o «llegó a ser poderoso». El griego dice más literalmente «fue exaltado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fled
  - escapó
  - se retiró
  lexicon: LSJ
  rationale: El aoristo de φεύγω expresa huida o escape. En español, «huyó» comunica con naturalidad el movimiento apresurado y el contexto político-militar, sin añadir matices interpretativos.
- source_word: Ἀραβίαν
  english_pob_choice: Arabia
  chosen_spanish: Arabia
  alternatives_spanish:
  - Arabia
  lexicon: Nombre propio
  rationale: Es un topónimo propio y se conserva como nombre geográfico estándar en español.
- source_word: τοῦ σκεπασθῆναι αὐτὸν ἐκεῖ
  english_pob_choice: that he might be sheltered there
  chosen_spanish: para ser protegido allí
  alternatives_spanish:
  - para ser resguardado allí
  - para hallar refugio allí
  - para ser cobijado allí
  lexicon: LSJ
  rationale: El infinitivo articular pasivo expresa finalidad. «Protegido» recoge el valor de σκεπάζω como cubrir/proteger, sin reducirlo solo a ocultamiento. La nota aclara que también podría entenderse como refugio o amparo.
- source_word: ὁ δὲ βασιλεὺς Πτολεμαῖος
  english_pob_choice: but King Ptolemy
  chosen_spanish: pero el rey Ptolomeo
  alternatives_spanish:
  - y el rey Ptolomeo
  - ahora el rey Ptolomeo
  lexicon: Uso narrativo de δέ
  rationale: «Pero» mantiene el contraste narrativo con la huida de Alejandro. El título «rey» se conserva de modo directo y natural.
- source_word: ὑψώθη
  english_pob_choice: was exalted
  chosen_spanish: fue exaltado
  alternatives_spanish:
  - fue levantado
  - fue elevado
  - llegó a ser poderoso
  lexicon: LSJ
  rationale: El pasivo de ὑψόω se vierte literalmente como «fue exaltado» para preservar la elevación formal del verbo y la posible resonancia honorífica o política sin cerrarla en una paráfrasis.
theological_decisions:
- issue: Sentido de ὑψώθη en contexto real-político
  english_pob_reading: was exalted
  chosen_spanish_reading: fue exaltado
  alternative_spanish_readings:
  - fue elevado
  - llegó a ser poderoso
  rationale: Se conserva la tensión del término entre exaltación, elevación y poder. En un contexto monárquico, «fue exaltado» mantiene el lenguaje más cercano al griego sin convertirlo en una interpretación puramente política.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al reflejar con más cercanía el infinitivo pasivo τοῦ σκεπασθῆναι mediante una expresión pasiva en español («para ser protegido allí»), conservando el resto de la oración en paralelo con el texto griego y con la versión inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - «Alejandro» y «Ptolomeo» siguen las formas habituales en español para nombres propios griegos.
  - Se usa «fue exaltado» para conservar la literalidad y la ambigüedad honorífica/política documentada en el audit trail.
  - Las notas a pie de página preservan las alternativas léxicas relevantes sin diluir el texto principal.
