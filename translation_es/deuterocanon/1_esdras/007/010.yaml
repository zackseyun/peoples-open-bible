translation:
  language: es
  text: Y los hijos de Israel, de entre los que estaban en cautiverio[a], celebraron la Pascua el día catorce del primer mes, cuando los sacerdotes y los levitas se habían purificado juntos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del exilio'. El griego dice literalmente 'de la cautividad', refiriéndose a los de Israel asociados con el retorno del exilio.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los sacerdotes y los levitas habían pasado por una purificación ritual en preparación para la Pascua.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Conserva la formulación corporativa heredada del griego sin neutralizarla, y en español resulta natural y bíblica. 'Hijos' mantiene la fuerza ancestral del grupo identificable por linaje e identidad de pacto.
- source_word: τῶν ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: from the captivity
  chosen_spanish: de entre los que estaban en cautiverio
  alternatives_spanish:
  - de entre los del cautiverio
  - de entre los que venían del exilio
  - desde el cautiverio
  lexicon: LSJ
  rationale: El griego literalmente caracteriza al grupo como los vinculados con la cautividad. En español, 'de entre los que estaban en cautiverio' hace explícita la referencia grupal y evita que suene como si todos estuvieran aún cautivos en ese momento. 'Exilio' es posible, pero 'cautiverio' sigue más de cerca el sustantivo griego.
- source_word: ἤγαγον ... τὸ πάσχα
  english_pob_choice: kept the Passover
  chosen_spanish: celebraron la Pascua
  alternatives_spanish:
  - guardaron la Pascua
  - observaron la Pascua
  - hicieron la Pascua
  lexicon: LSJ
  rationale: Aunque ἤγαγον significa literalmente 'llevaron/condujeron', con τὸ πάσχα en contexto cultual funciona idiomáticamente como celebración u observancia de la fiesta. 'Celebraron' comunica bien la acción festiva en español sin perder el sentido ritual.
- source_word: ἐν τῇ τεσσαρεσκαιδεκάτῃ τοῦ πρώτου μηνός
  english_pob_choice: on the fourteenth day of the first month
  chosen_spanish: en el día catorce del primer mes
  alternatives_spanish:
  - el día catorce del mes primero
  - el catorce del primer mes
  lexicon: LSJ
  rationale: La construcción temporal se vierte de forma idiomática en español. 'En el día catorce' refleja el valor locativo-temporal del griego y evita una paráfrasis excesiva.
- source_word: ὅτε ἡγνίσθησαν
  english_pob_choice: when ... had purified themselves
  chosen_spanish: cuando ... se habían purificado
  alternatives_spanish:
  - cuando ... fueron purificados
  - cuando ... se limpiaron ritualmente
  - cuando ... se habían santificado
  lexicon: LSJ
  rationale: ἡγνίσθησαν expresa purificación ritual previa a la celebración. 'Se habían purificado' conserva el matiz de preparación cultual y mantiene la relación temporal anterior a la Pascua.
- source_word: οἱ ἱερεῖς καὶ οἱ λευεῖται
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas del templo
  lexicon: LSJ
  rationale: Es la denominación estándar de los grupos de servicio del templo. No requiere expansión en el texto principal.
- source_word: ἅμα
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - a la vez
  lexicon: LSJ
  rationale: '''Juntos'' expresa la idea de acción conjunta de manera natural y breve en español. Mantiene el sentido de simultaneidad/coincidencia sin sobreespecificar.'
theological_decisions:
- issue: Designación corporativa masculina οἱ υἱοὶ Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - las personas de Israel
  rationale: Se preserva la forma masculina plural del original y del audit trail inglés, siguiendo la política de exactitud de género cuando la expresión es una designación heredada del pueblo. No se neutraliza la frase porque el griego mantiene una fórmula identitaria concreta.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Purificación ritual previa a la Pascua
  english_pob_reading: had purified themselves
  chosen_spanish_reading: se habían purificado
  alternative_spanish_readings:
  - habían sido purificados
  - se habían limpiado ritualmente
  rationale: El contexto es cultual, no moral. 'Se habían purificado' conserva la preparación ritual para la Pascua sin introducir una explicación interpretativa innecesaria en el cuerpo del texto.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete LXX 1909 y concuerda con el audit trail inglés sin depender mecánicamente de él. No se requirieron revisiones respecto del paquete fuente; la formulación española busca ser publicable y auditable, manteniendo la ambigüedad controlada de τῶν ἐκ τῆς αἰχμαλωσίας mediante 'de entre los que estaban en cautiverio'.
  spanish_consistency_notes:
  - '''Pascua'' se usa como nombre fijo de la fiesta, coherente con el uso bíblico en español.'
  - '''Cautiverio'' se mantiene para reflejar el griego αἰχμαλωσίας; no se sustituyó por ''exilio'' en el texto principal para conservar la literalidad requerida.'
  - '''Se habían purificado'' preserva el valor ritual del verbo sin convertirlo en lenguaje moralizado.'
  - No se añadieron notas al pie porque la redacción española no introdujo una ambigüedad textual nueva que requiriera anotación.
