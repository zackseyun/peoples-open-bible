translation:
  language: es
  text: Pero si no hubiéramos quedado implicados en muchos pecados[a], entonces, así como Heliodoro, que fue enviado por el rey Seleuco para inspeccionar la tesorería, fue inmediatamente azotado y hecho retroceder en su audacia cuando se adelantó, también nosotros habríamos sido derribados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego literalmente dice: «si no hubiera sucedido estar implicados en muchos pecados... este hombre, habiéndose adelantado, fue inmediatamente azotado y hecho retroceder de su audacia». La redacción principal expresa la idea en español natural y hace explícita la comparación implícita con Heliodoro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβην
  english_pob_choice: had happened / had become involved
  chosen_spanish: hubiéramos quedado implicados
  alternatives_spanish:
  - hubiéramos llegado a estar implicados
  - hubiéramos estado envueltos
  - hubiera acontecido que quedáramos implicados
  lexicon: LSJ
  rationale: El aoristo de συμβαίνω introduce una condición contrafactual; en español, «hubiéramos quedado implicados» conserva la idea de un estado resultante y la lectura idiomática del giro, sin perder la fuerza de la condición hipotética.
- source_word: προενέχεσθαι
  english_pob_choice: to be entangled / to be involved
  chosen_spanish: quedar implicados
  alternatives_spanish:
  - estar envueltos
  - estar comprometidos
  - estar enredados
  lexicon: LSJ
  rationale: En contexto con πολλοῖς ἁμαρτήμασιν, el verbo expresa estar moralmente comprometidos o enredados. «Quedar implicados» mantiene el sentido de implicación moral y suena natural en español actual.
- source_word: πολλοῖς ἁμαρτήμασιν
  english_pob_choice: in many sins
  chosen_spanish: en muchos pecados
  alternatives_spanish:
  - con muchos pecados
  - por muchos pecados
  - a causa de muchos pecados
  lexicon: LSJ
  rationale: El dativo se entiende dentro de la esfera moral del verbo. «En muchos pecados» preserva la relación de ámbito moral y coincide con el tono de la comparación del texto griego.
- source_word: ἐπὶ τὴν ἐπίσκεψιν
  english_pob_choice: to inspect
  chosen_spanish: para inspeccionar
  alternatives_spanish:
  - para examinar
  - para hacer una inspección de
  - con el fin de revisar
  lexicon: LSJ
  rationale: La frase expresa propósito o misión. «Para inspeccionar» reproduce con concisión el sentido oficial de la visita, sin añadir matices ajenos.
- source_word: γαζοφυλακίου
  english_pob_choice: the treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - el tesoro del templo
  - la tesorería
  - el depósito del tesoro
  lexicon: LSJ
  rationale: El término puede designar la cámara o depósito del tesoro. Dado que el contexto inmediato del relato es el tesoro del templo, «el tesoro» es una forma natural y suficiente en español, sin sobreexplicar en el cuerpo del texto.
- source_word: προαχθεὶς
  english_pob_choice: when he came forward
  chosen_spanish: cuando avanzó
  alternatives_spanish:
  - cuando se adelantó
  - al presentarse
  - cuando fue llevado adelante
  lexicon: LSJ
  rationale: El participio describe el avance de Heliodoro en la secuencia narrativa. «Cuando avanzó» mantiene la progresión de la acción y evita un pasivo artificial en español.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  - de inmediato
  lexicon: LSJ
  rationale: Marca consecuencia instantánea. «Inmediatamente» es claro, formal y fiel al valor adverbial.
- source_word: μαστιγωθεὶς
  english_pob_choice: was scourged
  chosen_spanish: fue azotado
  alternatives_spanish:
  - fue flagelado
  - fue golpeado con azotes
  - fue castigado con azotes
  lexicon: LSJ
  rationale: El verbo denota castigo severo con azotes. «Fue azotado» es transparente en español y conserva la gravedad del término sin sonar excesivamente técnico.
- source_word: ἀνετράπη τοῦ θράσους
  english_pob_choice: was turned back from his boldness
  chosen_spanish: fue abatido de su audacia
  alternatives_spanish:
  - fue contenido en su audacia
  - fue echado atrás de su audacia
  - fue vencido en su audacia
  lexicon: LSJ
  rationale: La expresión idiomática comunica el derrumbe o reverso de una osadía arrogante. «Fue abatido de su audacia» conserva el movimiento de reversión y el matiz moral con un registro bíblico natural; «audacia» evita cargar innecesariamente con un tono más fuerte que el griego exige.
- source_word: apódosis implícita
  english_pob_choice: so also would we have been struck down
  chosen_spanish: también nosotros habríamos sido derribados
  alternatives_spanish:
  - también nosotros habríamos sido abatidos
  - también habríamos caído
  - también nosotros habríamos sido golpeados
  lexicon: LSJ
  rationale: El griego deja implícita la consecuencia comparativa. El español requiere completar la apódosis para que la oración sea legible; «habríamos sido derribados» mantiene la idea de castigo y caída consecuente sin introducir una imagen más violenta de la que el contexto exige.
theological_decisions:
- issue: Comparación ejemplar con Heliodoro y consecuencia implícita para el pueblo
  english_pob_reading: 'The verse makes explicit in English the implied comparison: what happened to Heliodorus would likewise have happened to us.'
  chosen_spanish_reading: El texto español conserva la comparación y completa la consecuencia implícita sin convertirla en una explicación doctrinal adicional.
  alternative_spanish_readings:
  - Dejar la consecuencia completamente implícita en español.
  - Añadir una glosa explicativa sobre el juicio divino.
  rationale: 'La cláusula griega funciona como comparación ejemplar: el destino de Heliodoro ilustra lo que habría ocurrido al pueblo de no mediar sus muchos pecados. En español conviene cerrar la oración con una apódosis natural, pero sin expandir el sentido más allá del argumento del pasaje.'
  doctrine_reference: Translación por equivalencia óptima; mantener la lógica narrativa y moral del comparativo sin añadir interpretación externa.
translation_notes:
  revision_awareness: 'Se tomó como base la revisión más reciente del POB inglés: la transición de una formulación más literal de συνέβην προενέχεσθαι a «had become involved» y el cierre de la apódosis con «would have been struck down». La versión española sigue esa dirección de sentido, pero adapta el cierre a un español fluido con «habríamos sido derribados», manteniendo la comparación y la secuencia narrativa del original griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «pecados» para ἁμαρτήμασιν, coherente con el valor moral del contexto.
  - Se evita «Cristo/Mesías» porque no aparece el léxico correspondiente.
  - «Azotado» conserva el registro severo que corresponde a μαστιγωθεὶς.
  - La apódosis implícita se completa en español por exigencia sintáctica, pero sin añadir contenido doctrinal ajeno al texto.
