translation:
  language: es
  text: Así que Is-bóset envió y la tomó de junto a su marido[b][a], de Paltiel, hijo de Laís.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «del hombre, de Paltiel hijo de Laís». La traducción explicita que «el hombre» es su marido.'
    reason: lexical_alternative
  - marker: b
    text: Algunas versiones inglesas usan «Palti» en pasajes relacionados; aquí la forma hebrea es Paltiel.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió un mensaje
  lexicon: HALOT
  rationale: El verbo שׁלח en narrativa consecutiva expresa el acto de enviar; «envió» conserva la acción básica sin añadir un objeto implícito que el hebreo no menciona.
- source_word: אִישׁ בֹּשֶׁת
  english_pob_choice: Ish-bosheth
  chosen_spanish: Is-bóset
  alternatives_spanish:
  - Ish-bóset
  - Isboset
  lexicon: HALOT
  rationale: El nombre propio se translitera al español de forma cercana al hebreo; se conserva la separación de los dos elementos del nombre para reflejar la forma bíblica.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la llevó
  - la hizo venir
  lexicon: HALOT
  rationale: לקח con sufijo femenino se rinde de manera directa como «la tomó», manteniendo el matiz de traslado o remoción sin intensificarlo a «se la llevó» o «la arrebató».
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: HALOT
  rationale: La preposición de separación se expresa de modo natural en español con «de»; el doble uso en hebreo queda parcialmente reflejado por la repetición de la estructura.
- source_word: אִישׁ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - el hombre
  lexicon: HALOT
  rationale: Aunque el sustantivo básico significa «hombre», aquí el contexto relacional es marital; «su marido» comunica esa relación de manera clara y conserva el valor contextual que el inglés POB explicitó.
- source_word: פַּלְטִיאֵל
  english_pob_choice: Paltiel
  chosen_spanish: Paltiel
  alternatives_spanish:
  - Paltiél
  - Palti
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente desde el hebreo; se mantiene la forma bíblica Paltiel, en línea con el texto fuente.
- source_word: בֶּן־לוּשׁ
  english_pob_choice: the son of Laish
  chosen_spanish: hijo de Laís
  alternatives_spanish:
  - hijo de Laish
  - hijo de Lush
  lexicon: HALOT
  rationale: Se conserva la filiación explícita con «hijo de» y se adapta לוש a la forma española tradicional Laís, que corresponde al nombre propio conocido en la tradición bíblica.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de 2 Samuel 3:15 y el audit trail inglés sin cambios relevantes de revisión; se conserva la estructura narrativa breve y la repetición preposicional del original.
