  - severity: medium
    issue: «manto» para מָסַךְ reduce indebidamente la metáfora
    rationale: Aunque poético, «manto» introduce una imagen de prenda que no está exigida por el hebreo ni por el audit trail. «Cobertura» conserva mejor el valor concreto-metafórico y permite la nota explicativa sobre defensa/protección.
  - severity: low
    issue: La nota léxica debe corresponder exactamente al término principal revisado
    rationale: Si el texto principal usa «cobertura», la nota debe presentar «manto» solo como apoyo explicativo o eliminarlo para evitar tensión innecesaria entre texto y nota.
