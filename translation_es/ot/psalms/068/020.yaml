    issue: La nota [a] afirma erróneamente que el hebreo tiene aquí el nombre divino.
    rationale: La fuente hebrea muestra אֲדֹנָי, no יהוה. Decir «el nombre divino» falsea la evidencia fuente y la justificación terminológica.
  - severity: medium
