translation:
  language: es
  text: Su número[a], junto con sus hermanos instruidos en el canto para Yahvé, todos los que eran hábiles[b], sumaba doscientos ochenta y ocho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Yahvé». El hebreo con ל puede expresar dirección o finalidad en este contexto de servicio musical.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que tenían entendimiento», es decir, todos los que eran competentes o expertos en la obra musical.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפָּרָם
  english_pob_choice: their number
  chosen_spanish: su número
  alternatives_spanish:
  - el número de ellos
  - su cantidad
  lexicon: HALOT
  rationale: El sustantivo denota el total contado. «Su número» conserva la relación posesiva del hebreo y suena natural en español bíblico moderno.
- source_word: עִם אֲחֵיהֶם
  english_pob_choice: together with their brothers
  chosen_spanish: junto con sus hermanos
  alternatives_spanish:
  - con sus hermanos
  - al lado de sus hermanos
  lexicon: HALOT
  rationale: עִם expresa acompañamiento. «Junto con» reproduce bien ese valor y mantiene la referencia literal a «sus hermanos» en un contexto de servicio masculino levítico.
- source_word: מְלֻמְּדֵי שִׁיר
  english_pob_choice: who were trained in singing
  chosen_spanish: que habían sido entrenados en el canto
  alternatives_spanish:
  - entrenados en el canto
  - instruidos en el canto
  - formados para el canto
  lexicon: HALOT
  rationale: El participio pasivo de למד indica personas que han sido enseñadas o entrenadas. «En el canto» conserva el sustantivo hebreo שִׁיר con un español natural; «canto» es más idiomático que «canción» en este contexto litúrgico-musical.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el culto a Yahvé
  lexicon: HALOT
  rationale: 'El ל aquí marca dirección o finalidad en el servicio musical. En el texto principal se mantiene la terminología del proyecto para el nombre divino: «Yahvé». La preposición «para» comunica bien la finalidad cultual sin perder la relación con el destinatario del canto.'
- source_word: כָּל הַמֵּבִין
  english_pob_choice: all who were skillful
  chosen_spanish: todos los que eran hábiles
  alternatives_spanish:
  - todos los que entendían
  - todos los expertos
  - todos los que tenían entendimiento
  lexicon: HALOT
  rationale: El participio de בין aquí no se limita al conocimiento intelectual, sino a competencia/discernimiento en la tarea musical. «Hábiles» preserva esa aptitud práctica mejor que una traducción puramente cognitiva.
- source_word: מָאתַיִם שְׁמוֹנִים וּשְׁמוֹנָה
  english_pob_choice: two hundred eighty-eight
  chosen_spanish: doscientos ochenta y ocho
  alternatives_spanish:
  - '288'
  - doscientos ochenta y ocho
  lexicon: HALOT
  rationale: La secuencia numérica hebrea da 288. Se escribe en palabras por claridad y estilo bíblico en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvéh
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Según la terminología del proyecto, se conserva el nombre divino en español como «Yahvé», en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue de cerca el flujo del hebreo y coincide con la lectura auditada en inglés. Se mantiene la decisión sobre el nombre divino y la ambigüedad funcional de הַמֵּבִין mediante nota, sin introducir paráfrasis adicionales ni suavizar el valor técnico de la aptitud musical.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia sintáctica hebrea: sujeto nominal + acompañamiento + participio descriptivo + finalidad + cuantificación final.'
  - «Yahvé» se usa de forma consistente para יהוה.
  - «Hábiles» se conserva como término funcional para competence/discernment musical, evitando una reducción meramente intelectual.
  - La cifra se expresa en palabras por coherencia con el estilo bíblico en español.
  - Las notas al pie se anclan explícitamente en «Yahvé[a]» y «hábiles[b]» para preservar las alternativas relevantes.
