  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: la acción renovada de וְיָסְפָה, el motivo del remanente/supervivencia, la designación «casa de Judá» y la imagen agrícola contrastiva «raíz abajo / fruto arriba». Sin embargo, «remanente sobreviviente» suena redundante en español y no representa con la mejor naturalidad la relación entre פְּלֵיטַת y הַנִּשְׁאָרָה. Conviene reordenar la expresión para conservar tanto el motivo teológico del remanente como la cualidad de lo que quedó.'
  spanish_quality_summary: El texto es claro, pero «el remanente sobreviviente» resulta algo forzado y poco idiomático. «El remanente que quedó» suena más natural en español bíblico contemporáneo, preserva la doble idea de remanente y supervivencia, y evita una combinación adjetival pesada. El resto del versículo está bien logrado y es legible.
  glossary_alignment: No hay conflicto con la glosa proyectual principal. «Casa de Judá» se conserva correctamente. La terminología de remanente se mantiene, pero se mejora su formulación española al pasar de «remanente sobreviviente» a «remanente que quedó».
  issues:
