review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: pregunta retórica, explicación causal, paralelismo entre el combatiente y el que se queda con los bienes, y reparto igual. Sin embargo, ''escuchará'' en español puede sonar demasiado a mero oír, y el hebreo שׁמע ל aquí implica más bien prestar atención/aceptar la propuesta. También conviene evitar introducir futuro explícito (''será'') donde el hebreo expresa un principio gnómico en paralelismo con ''es''.'
  spanish_quality_summary: El texto es claro y legible, pero puede pulirse para sonar más natural y preciso en español eclesial. '¿Y quién les hará caso...?' comunica mejor la fuerza retórica que 'les escuchará'. 'Junto al equipaje' encaja mejor con כֵּלִים en este contexto de bienes guardados que 'suministros', que puede sugerir provisiones consumibles. El resto del verso fluye bien.
  glossary_alignment: No hay términos teológicos sensibles aquí. Las decisiones léxicas principales están alineadas en general con el POB, pero recomiendo ajustar שׁמע ל a 'hacer caso' y כֵּלִים a 'equipaje' con nota de alternativas como 'pertrechos' o 'equipo'.
  issues:
  - severity: medium
    issue: '''les escuchará'' debilita el valor pragmático de יִשְׁמַע לָכֶם'
    rationale: En este contexto no se trata solo de oír, sino de hacer caso, prestar atención o aceptar la propuesta. El propio audit trail inglés conserva 'heed' como alternativa; en español 'hará caso' transmite mejor esa fuerza.
  - severity: medium
    issue: '''suministros'' puede estrechar demasiado כֵּלִים'
    rationale: El hebreo se refiere ampliamente a objetos/equipo/bagaje. En este relato, los hombres se quedaron con los bienes y bagajes; 'equipaje' resulta más natural y menos restrictivo que 'suministros'.
  - severity: low
    issue: '''así será la parte'' introduce un matiz futuro innecesario'
    rationale: El paralelismo hebreo presenta una equivalencia normativa más que una predicción temporal. Repetir 'es la parte' o usar una formulación nominal mantiene mejor la simetría.
  revised_spanish_text: ¿Y quién les hará caso en este asunto? Porque, así como es la parte del que baja a la batalla[a], así es la parte del que se queda junto al equipaje[b]; juntos repartirán.
  revised_footnotes:
  - marker: a
    text: 'O: «desciende a la batalla». «Baja a la batalla» conserva el giro hebreo de descender al combate.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pertrechos» o «equipo». El hebreo puede referirse ampliamente al bagaje o los artículos guardados.'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes léxicos para reflejar mejor el hebreo y el audit trail: ''les hará caso'' expresa mejor el valor de שׁמע ל en una pregunta retórica de rechazo, y ''equipaje'' representa con más precisión el sentido amplio de כֵּלִים en este contexto. También se regulariza el paralelismo con ''así es la parte'' en vez de ''así será la parte''.'
