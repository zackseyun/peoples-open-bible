  language: en
  yaml_path: translation/ot/ezekiel/008/014.yaml
  text: Then he brought me to the entrance of the gate of the house of Yahweh that faces north[a], and behold, there the women were sitting[b], weeping for Tammuz.
  footnotes:
  - marker: a
    text: Tammuz was a Mesopotamian deity associated with seasonal mourning rites; the women are depicted participating in that lament.
    reason: cultural_note
  - marker: b
    text: Or 'mourning for Tammuz.' The Hebrew verb literally means 'weeping.'
    reason: lexical_alternative
