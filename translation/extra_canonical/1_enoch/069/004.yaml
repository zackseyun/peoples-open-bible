theological_decisions:
- issue: Identity of 'the sons of the angels'
  chosen_reading: Retain the literal familial phrase 'the sons of the angels' in the main text.
  alternative_readings:
  - the angels
  - the angelic host
  - the children of heaven
  rationale: The Ge'ez wording is unusual enough that flattening it to simply 'the angels' would hide a real textual and interpretive feature. Since the Parables are effectively Ge'ez-only here, transparency is preferable to harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Force of the repeated deception verbs
  chosen_reading: Use 'led astray' twice.
  alternative_readings:
  - deceived ... deceived
  - misled ... seduced
  rationale: The verse repeats the same verbal idea in two clauses. Repeating 'led astray' preserves the rhetorical structure and moral force without introducing different nuances not clearly warranted by the Ge'ez.
  doctrine_reference: Consistency of key terms, or documented exception.
