translation:
  language: es
  text: Yahvé tronó desde el cielo, y el Altísimo dio su voz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo oír su voz». El hebreo dice literalmente «dio su voz», una expresión poética paralela a «tronó».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְעֵם
  english_pob_choice: thundered
  chosen_spanish: tronó
  alternatives_spanish:
  - retumbó
  - hizo tronar
  lexicon: HALOT
  rationale: El verbo hifil de רעם expresa producir trueno. «Tronó» es natural en español y conserva la imagen teofánica del texto, mejor que una forma más técnica o perifrástica.
- source_word: מִן שָׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: En contexto de manifestación divina, שָׁמַיִם puede rendirse como «cielos» para mantener el plural hebreo y el tono poético. «Desde los cielos» conserva la elevación espacial y la resonancia teofánica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre divino del tetragrámaton con la forma española establecida por la política del proyecto. «Yahvé» mantiene la referencia al nombre propio, no un sustituto titulado.
- source_word: וְעֶלְיוֹן
  english_pob_choice: and the Most High
  chosen_spanish: y el Altísimo
  alternatives_spanish:
  - y el Exaltado
  lexicon: HALOT
  rationale: עֶלְיוֹן funciona aquí como título divino paralelo. «Altísimo» es la forma española estándar y conserva el valor superlativo del hebreo.
- source_word: יִתֵּן קוֹלוֹ
  english_pob_choice: gave his voice
  chosen_spanish: dio su voz
  alternatives_spanish:
  - hizo oír su voz
  - profirió su voz
  lexicon: HALOT
  rationale: La traducción literal «dio su voz» preserva el giro poético hebreo y su paralelismo con «tronó». En español suena comprensible sin borrar la tensión idiomática del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el tetragrámaton. Se mantiene el nombre propio de Dios en lugar de una sustitución como «SEÑOR», conforme a la decisión doctrinal del proyecto y al deseo de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación poética entre יְהוָה y עֶלְיוֹן
  english_pob_reading: Treat both as parallel titles for the same God within Hebrew poetic parallelism.
  chosen_spanish_reading: Ambos se conservan como títulos paralelos del mismo Dios en el paralelismo hebreo.
  alternative_spanish_readings:
  - Leer Altísimo como una designación separada sin enfatizar la equivalencia poética
  rationale: El hebreo presenta dos designaciones divinas en paralelismo. La traducción no intenta resolver ni suavizar esa relación; simplemente la deja visible en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con la revisión más reciente: no se detectaron cambios necesarios respecto del estado auditado. Se mantuvo la equivalencia óptima y la literalidad poética del giro «dio su voz».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el paralelismo poético entre «tronó» y «dio su voz».
  - «Altísimo» se mantiene como título divino, no como nombre propio.
  - La nota al pie se ancla en «voz» para reflejar la alternativa lexical del hebreo.
