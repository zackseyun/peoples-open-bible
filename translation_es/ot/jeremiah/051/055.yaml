base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/055.yaml
  text: For Yahweh is devastating Babylon and destroying from her the great sound[a]. Their waves roar like many waters[b]; the noise of their voice is given.
  footnotes:
  - marker: a
    text: Or 'their waves surge like mighty waters'; the Hebrew imagery may describe the tumult of Babylon's attackers as sea-like waves.
    reason: lexical_alternative
  - marker: b
    text: Or 'the roar of their voice is raised.' The Hebrew literally says 'the noise of their voice is given,' an idiom for a loud sound being produced.
    reason: lexical_alternative
