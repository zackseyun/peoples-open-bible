translation:
  language: es
  text: Al que teme a Yahvé no le sobrevendrá mal[a], sino que en la prueba[b] lo rescatará de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'daño' o 'desgracia'. El griego κακόν puede abarcar mal, daño o desgracia; el contexto sapiencial deja abierta esa amplitud.
    reason: lexical_alternative
  - marker: b
    text: O 'en la prueba/examen' o 'en la tentación'. El griego πειρασμός puede denotar prueba, examen o tentación; aquí el contexto favorece la adversidad o el tiempo de prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ φοβουμένῳ
  english_pob_choice: the one who fears
  chosen_spanish: al que teme
  alternatives_spanish:
  - el que teme
  - quien teme
  - aquel que teme
  lexicon: BDAG
  rationale: El participio articular griego funciona de manera sustantiva y general. 'Al que teme' conserva el valor proverbial y la referencia singular sin sonar forzado en español.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG / convención POB para יהוה
  rationale: Aunque el texto griego usa κύριος, el contexto de sabiduría y la convención del proyecto para el nombre divino favorecen 'Yahvé' como recuperación transparente del referente divino, en lugar de enmascararlo con 'el Señor'.
- source_word: οὐκ ἀπαντήσει
  english_pob_choice: will confront
  chosen_spanish: no le sobrevendrá
  alternatives_spanish:
  - no lo encontrará
  - no le ocurrirá
  - no vendrá a su encuentro
  lexicon: BDAG
  rationale: ἀπαντάω sugiere encuentro o salida al encuentro; en español, 'sobrevenir' comunica mejor que el mal le llegue o le alcance, manteniendo la idea de encuentro sin literalidad incómoda.
- source_word: κακόν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - desgracia
  lexicon: BDAG
  rationale: En este contexto sapiencial, κακόν abarca tanto mal moral como adversidad dañina. 'Mal' conserva esa amplitud en español mejor que una opción demasiado estrecha.
- source_word: ἐν πειρασμῷ
  english_pob_choice: in trial
  chosen_spanish: en la prueba
  alternatives_spanish:
  - en el juicio
  - en la tentación
  - en la tribulación
  lexicon: BDAG
  rationale: πειρασμός puede significar prueba, examen o tentación. Aquí, por el paralelismo con rescate en la adversidad, 'prueba' expresa adecuadamente el sentido de aflicción sometida a examen, sin cargar el término hacia la tentación moral.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - una vez más
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν expresa repetición; 'de nuevo' suena natural y conserva la idea de rescate repetido en circunstancias sucesivas.
- source_word: ἐξελεῖται
  english_pob_choice: he will rescue him
  chosen_spanish: lo rescatará
  alternatives_spanish:
  - lo librará
  - lo salvará
  - lo entregará
  lexicon: BDAG
  rationale: El verbo significa librar o rescatar. 'Rescatará' conserva la fuerza de intervención activa y evita confundirse con un sentido exclusivamente soteriológico abstracto.
theological_decisions:
- issue: Sujeto implícito de ἐξελεῖται
  english_pob_reading: 'The Lord is the implied subject: ''he will rescue him.'''
  chosen_spanish_reading: Yahvé es el sujeto implícito de 'lo rescatará'.
  alternative_spanish_readings:
  - se le rescatará
  - será rescatado
  rationale: El griego omite el sujeto explícito, pero el contexto inmediato y la estructura sapiencial atribuyen la acción a Dios. En español conviene explicitar el referente implícito mediante el verbo en tercera persona con Yahvé como antecedente lógico.
  doctrine_reference: Conservar la referencia divina implícita sin resolver más allá del contexto; no neutralizar el agente divino.
- issue: Alcance de κακόν
  english_pob_reading: Broad 'evil' rather than narrower 'harm' or 'calamity.'
  chosen_spanish_reading: '''mal'' conserva amplitud moral y de adversidad.'
  alternative_spanish_readings:
  - daño
  - desgracia
  - calamidad
  rationale: La línea sapiencial habla de un mal que puede incluir peligro, aflicción o maldad. 'Mal' mantiene la tensión semántica sin reducirla solo a desgracia física.
  doctrine_reference: Mantener la amplitud semántica del término sin cerrar su alcance a una sola clase de sufrimiento.
translation_notes:
  revision_awareness: 'Se siguió el audio/edición de referencia más reciente: la lectura inglesa mantiene la ambigüedad léxica de κακόν y πειρασμός, y el español conserva esa amplitud con ''mal'' y ''prueba'', evitando una reducción interpretativa excesiva. No se requirieron cambios respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el nombre divino, en lugar de 'el Señor'.
  - Se eligió 'prueba' para πειρασμός, no 'tentación', porque el contexto apunta a adversidad y rescate.
  - Se prefirió 'rescatar' para ἐξελεῖται por su fuerza de liberación activa y su naturalidad en español.
  - La construcción 'al que teme' preserva el valor proverbial del participio articular griego.
