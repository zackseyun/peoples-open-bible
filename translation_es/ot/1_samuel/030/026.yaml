translation:
  language: es
  text: 'Cuando David llegó a Siclag, envió parte del botín a los ancianos de Judá, sus amigos, diciendo: «He aquí, aquí tienen un regalo[a] del botín de los enemigos de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bendición». El hebreo puede significar “bendición”, pero aquí se refiere a un obsequio material enviado del botín.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: When David came
  chosen_spanish: Cuando David llegó
  alternatives_spanish:
  - Y David llegó
  - Y cuando David llegó
  lexicon: HALOT
  rationale: La construcción narrativa con waw consecutiva se expresa de manera natural en español con una subordinada temporal (“Cuando...”), manteniendo la secuencia temporal sin volverla pesada.
- source_word: צִקְלַג
  english_pob_choice: Ziklag
  chosen_spanish: Siclag
  alternatives_spanish:
  - Ziklag
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma tradicional española “Siclag”, ampliamente reconocible en lectura bíblica en español, sin alterar el referente del topónimo.
- source_word: וַיְשַׁלַּח מֵהַשָּׁלָל
  english_pob_choice: he sent some of the spoil
  chosen_spanish: envió parte del botín
  alternatives_spanish:
  - envió del botín
  - envió una parte del botín
  lexicon: HALOT
  rationale: El מִן de מֵהַשָּׁלָל indica porción tomada del total; “parte del botín” comunica esa relación partitiva con naturalidad y conserva el sentido militar de שָׁלָל.
- source_word: לְזִקְנֵי יְהוּדָה
  english_pob_choice: to the elders of Judah
  chosen_spanish: a los ancianos de Judá
  alternatives_spanish:
  - a los mayores de Judá
  - a los jefes de Judá
  lexicon: HALOT
  rationale: “Ancianos” reproduce el valor de זִקְנֵי como líderes reconocidos del pueblo, en un registro bíblico claro y estándar.
- source_word: לְרֵעֵהוּ
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - sus aliados
  lexicon: HALOT
  rationale: En este contexto relacional y político, “amigos” expresa de forma idiomática la relación favorable que David tiene con ellos, sin endurecer el matiz a un término más técnico.
- source_word: הִנֵּה לָכֶם
  english_pob_choice: Behold, here is a gift for you
  chosen_spanish: Miren, aquí tienen
  alternatives_spanish:
  - He aquí
  - Vean, aquí tienen
  lexicon: HALOT
  rationale: הִנֵּה introduce una llamada de atención. “Miren, aquí tienen” conserva esa deixis en español contemporáneo y mantiene el tono directo del discurso.
- source_word: בְּרָכָה
  english_pob_choice: a gift
  chosen_spanish: una dádiva
  alternatives_spanish:
  - una bendición
  - un regalo
  lexicon: HALOT
  rationale: Aunque el término puede significar “bendición”, aquí designa un envío material procedente del botín. “Dádiva” preserva el valor de obsequio formal y permite mantener en nota la alternativa lexical de “bendición” sin borrar la tensión semántica.
- source_word: מִשְּׁלַל
  english_pob_choice: from the spoil
  chosen_spanish: de entre el botín
  alternatives_spanish:
  - del botín
  - del despojo
  lexicon: HALOT
  rationale: La preposición partitiva vuelve a indicar origen dentro del conjunto. “De entre el botín” es una forma española natural que conserva la idea de extracción parcial.
- source_word: אֹיְבֵי יְהוָה
  english_pob_choice: the enemies of Yahweh
  chosen_spanish: los enemigos de Yahvé
  alternatives_spanish:
  - los enemigos de Yahveh
  - los enemigos del Señor
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto para יְהוָה con “Yahvé”. El sintagma posesivo preserva la relación de enemistad sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se adopta la forma española normativa del proyecto para el Tetragrámaton: “Yahvé”, que conserva el nombre propio divino en vez de ocultarlo tras un sustituto.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el nombre pactal de Dios. En español se mantiene como nombre propio transliterado (“Yahvé”), conforme al criterio del proyecto, para no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בְּרָכָה en un contexto de reparto de bienes
  english_pob_reading: a gift
  chosen_spanish_reading: una dádiva
  alternative_spanish_readings:
  - una bendición
  - un regalo
  rationale: Aunque el hebreo puede significar “bendición”, el contexto inmediato habla de un envío de botín. “Dádiva” transmite el objeto material entregado y deja abierta, en la nota, la lectura literal alternativa sin perder el matiz favorable del término.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre el botín y los enemigos de Yahvé
  english_pob_reading: the enemies of Yahweh
  chosen_spanish_reading: los enemigos de Yahvé
  alternative_spanish_readings:
  - los enemigos del Señor
  rationale: La frase no solo describe adversarios militares, sino que los ubica teológicamente como enemigos de Yahvé. Mantener el nombre divino en español conserva esa carga confesional del texto.
  doctrine_reference: 1 Samuel 30:26; DOCTRINE.md Contested terms
translation_notes:
  revision_awareness: El audit trail inglés revisó el término del botín entre “plunder” y “spoil” para mayor consistencia con שָׁלָל, y también ajustó el registro de הִנֵּה a “Behold”. En español se reflejó esa consistencia mediante “botín” en ambos casos y un marcador de atención natural (“Miren, aquí tienen”) sin perder solemnidad. La decisión sobre בְּרָכָה preserva la tensión léxica documentada entre “bendición” y “obsequio material”.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” de forma coherente con el término divino del proyecto.
  - Se usó “botín” para ambas ocurrencias de שָׁלָל/שְׁלַל a fin de conservar la cohesión léxica.
  - Se eligió “ancianos de Judá” como fórmula bíblica idiomática y comprensible en español.
  - La nota al pie está anclada solo en “dádiva”, donde aparece la ambigüedad semántica relevante.
