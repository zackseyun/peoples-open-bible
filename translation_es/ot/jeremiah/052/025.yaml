    issue: סָרִיס se traduce como 'oficial'
    rationale: Aunque posible, 'oficial' en español tiende a sonar militar o demasiado genérico. El rastro inglés justificó específicamente 'court official'; 'funcionario de la corte' conserva mejor el ámbito cortesano sin imponer 'eunuco'.
  - severity: medium
    issue: Falta una nota para 'los que veían el rostro del rey'
    rationale: El inglés POB mantuvo el idiomático en texto y preservó la alternativa explicativa en nota. La revisión española debería hacer lo mismo para conservar la misma transparencia exegética.
  - severity: low
    issue: '''estaba puesto sobre'' suena poco natural en español actual'
    rationale: Comunica la idea, pero 'había sido puesto al frente de' expresa mejor el matiz de designación/encargo administrativo sin calco innecesario.
