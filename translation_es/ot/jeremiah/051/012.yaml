base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/012.yaml
  text: Against the walls of Babylon[a], lift up a signal; strengthen the watch; station watchmen; prepare the ambushes[c][b]. For Yahweh has both planned and done what he spoke against the inhabitants of Babylon.
  footnotes:
  - marker: a
    text: Or 'raise a banner' or 'lift up a standard.' The Hebrew נֵס denotes a raised military signal.
    reason: lexical_alternative
  - marker: b
    text: Or 'prepare the ambushers.' The Hebrew may refer either to the men lying in wait or to the ambush positions.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'what he spoke to the inhabitants of Babylon'; in context this means a word of judgment spoken against them.
    reason: lexical_alternative
