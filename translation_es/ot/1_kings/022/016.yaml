  to: 'Entonces el rey le dijo[a]: «¿Cuántas veces debo hacerte jurar que no me digas más que la verdad en nombre de Yahvé?»'
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español. «No me digas más que la verdad» conserva la exclusividad de רַק אֱמֶת y la estructura de restricción del juramento, pero suena más idiomático y fluido que «no me digas nada sino la verdad». Se mantuvo «Yahvé» conforme a la política del proyecto y se conservó la nota léxica sobre «poner bajo juramento».
