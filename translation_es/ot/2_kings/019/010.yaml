translation:
  language: es
  text: 'Así diréis a Ezequías, rey de Judá: «No te engañe tu Dios[a], en quien confías, diciendo: “Jerusalén no será entregada en manos del rey de Asiria”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu dios»; el hebreo no marca mayúsculas, y el hablante asirio se burla de la confianza de Ezequías.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: El adverbio formulaico introduce un mensaje citado. «Así» conserva el tono de presentación solemne y resulta natural en español bíblico sin ampliar el texto.
- source_word: תֹאמְרוּן
  english_pob_choice: you shall say
  chosen_spanish: diréis
  alternatives_spanish:
  - dirán
  - hablaréis
  lexicon: HALOT
  rationale: 'El imperativo/instrucción en segunda persona plural se expresa bien con futuro exhortativo en español bíblico: «diréis». Mantiene la fuerza directiva y el registro formal.'
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Nombre propio
  rationale: Se usa la forma española establecida del nombre propio para legibilidad e पहचान bíblica estándar.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: El hebreo funciona como aposición titulativa; en español la forma breve sin artículo es idiomática y fiel al valor apposicional.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No permitas
  lexicon: HALOT
  rationale: La partícula de prohibición se vierte con la negación española simple delante del subjuntivo o, en fórmula de cita, con estructura equivalente de prohibición.
- source_word: יַשִּׁאֲךָ
  english_pob_choice: let ... deceive you
  chosen_spanish: te engañe
  alternatives_spanish:
  - te engañe y te desvíe
  - te ilusione
  lexicon: HALOT
  rationale: El causativo de נשׁא aquí tiene sentido de engañar o inducir a error. «Te engañe» reproduce bien la burla asiria y evita suavizar el verbo.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: El hebreo no marca mayúscula/minúscula. En el texto principal se conserva «Dios» por ser la referencia normal al Dios de Israel, aunque la voz enemiga tenga intención sarcástica.
- source_word: אֲשֶׁר אַתָּה בֹּטֵחַ בּוֹ
  english_pob_choice: in whom you trust
  chosen_spanish: en quien confías
  alternatives_spanish:
  - en quien te apoyas
  - en quien pones tu confianza
  lexicon: HALOT
  rationale: בָּטַח con ב expresa confiar en alguien; «en quien confías» es natural, directo y conserva la relación preposicional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - que
  lexicon: HALOT
  rationale: La fórmula introduce el contenido de la supuesta mentira. «Diciendo» mantiene la relación sintáctica sin añadir una preposición que el hebreo no exige.
- source_word: לֹא תִנָּתֵן
  english_pob_choice: will not be given
  chosen_spanish: no será entregada
  alternatives_spanish:
  - no será dada
  - no caerá
  lexicon: HALOT
  rationale: El nifal de נתן tiene pasiva de entrega/entregarse. En español, «será entregada» preserva el pasivo y el matiz de ser puesta en manos del enemigo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: Nombre propio
  rationale: Se emplea la forma española estándar del topónimo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la mano como dominio. «En mano de» mantiene la imagen más de cerca que una paráfrasis como «en poder de».
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa se traduce con el orden natural del español y el artículo definido requerido por el idioma.
theological_decisions:
- issue: Capitalización de אֱלֹהֶיךָ en una burla asiria
  english_pob_reading: your God / your god
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - tu dios
  rationale: El hebreo no distingue mayúsculas. Como la referencia es al Dios de Ezequías, el texto principal usa la forma reverente habitual en español; se preserva la posibilidad de un matiz despectivo en nota, dado el tono burlón del hablante.
  doctrine_reference: Tratamiento reverencial del nombre divino y conservación del matiz irónico del hablante
- issue: Construcción verbal de la prohibición y el engaño
  english_pob_reading: Do not let your God... deceive you
  chosen_spanish_reading: No te engañe tu Dios...
  alternative_spanish_readings:
  - No permitas que tu Dios te engañe...
  rationale: El español admite una prohibición con subjuntivo exhortativo que refleja adecuadamente el hebreo y suena más directa que una perífrasis con 'permitas'.
  doctrine_reference: Sintaxis hebrea de prohibición (אַל + imperfecto)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés auditado, que afinó la relación entre el verbo de engañar y la cláusula introducida por לֵאמֹר. En español se refleja esa relación con una coma antes de «diciendo» y sin añadir preposición innecesaria.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto solo cuando aparece el Tetragrámaton; en este versículo no aparece.
  - Se usa «Asiria» y no una transliteración más cruda para el reino/imperio, siguiendo el estándar bíblico en español.
  - Se mantiene la metáfora de la 'mano' para evitar desactivar la imagen de entrega bajo control enemigo.
  - El orden de la cita española busca claridad tipográfica sin perder la estructura de discurso directo anidado del hebreo.
