id: HOS.8.1
reference: Hosea 8:1
source:
  edition: WLC
  text: אֶל חִכְּ/ךָ֣ שֹׁפָ֔ר כַּ/נֶּ֖שֶׁר עַל בֵּ֣ית יְהוָ֑ה יַ֚עַן עָבְר֣וּ בְרִיתִ֔/י וְ/עַל תּוֹרָתִ֖/י פָּשָֽׁעוּ־־־׃
translation:
  text: Put the trumpet to your mouth! Like an eagle over the house of Yahweh[c][b][a], because they have transgressed my covenant and rebelled against my law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture.' The Hebrew נֶשֶׁר can refer more broadly to a large bird of prey.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have transgressed/broken my covenant.' Literally, 'they have crossed my covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my instruction.' Hebrew תּוֹרָה can mean 'law,' 'instruction,' or 'teaching.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל חִכְּךָ שֹׁפָר
  chosen: Put the trumpet to your mouth
  alternatives:
  - To your palate, a trumpet
  - Set the trumpet to your lips
  lexicon: HALOT
  rationale: 'The Hebrew is verbless and abrupt: literally, ''to your palate/mouth, trumpet.'' In idiomatic English this is best rendered as an imperative call to sound the alarm. ''Mouth'' is clearer than the more anatomical ''palate'' while preserving the concrete image better than a looser paraphrase.'
- source_word: כַּנֶּשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נשר can denote a large bird of prey, often rendered 'eagle' in English tradition. 'Eagle' fits the swift, threatening image and is the default main-text rendering; 'vulture' is a plausible zoological alternative and is preserved in a footnote because the species identification is debated.
- source_word: עַל בֵּית יְהוָה
  chosen: over the house of the LORD
  alternatives:
  - against the house of the LORD
  - upon the house of the LORD
  lexicon: HALOT
  rationale: עַל can mean 'over,' 'upon,' or in hostile contexts 'against.' Here the image is of a predator swooping over the LORD's house/people in judgment. 'Over' preserves the spatial metaphor while allowing the threatening sense to be inferred. 'the LORD' follows the project's default for יְהוָה.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the household of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' In Hosea this likely refers not narrowly to the Jerusalem temple but more broadly to the covenant people/land under Yahweh's claim. 'House of the LORD' preserves the source wording and ambiguity better than interpretive renderings like 'temple' or 'people'.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment. 'Because' is straightforward modern English.
- source_word: עָבְרוּ בְרִיתִי
  chosen: they have crossed my covenant
  alternatives:
  - they have transgressed my covenant
  - they have broken my covenant
  lexicon: HALOT
  rationale: עבר literally means 'cross over/pass over.' In covenant contexts it idiomatically conveys violation. 'Crossed my covenant' keeps the Hebrew metaphor visible while remaining intelligible; more idiomatic alternatives are preserved because many English readers may expect 'transgressed' or 'broken.'
- source_word: תּוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  - my teaching
  lexicon: HALOT
  rationale: תורה can mean instruction or law. In this covenant-lawsuit context, the juridical force is prominent, so 'law' best fits the parallel with covenant violation. 'Instruction' remains a valid lexical alternative and is preserved in a footnote.
- source_word: פָּשָׁעוּ
  chosen: rebelled against
  alternatives:
  - transgressed
  - revolted against
  lexicon: HALOT
  rationale: פשע denotes rebellion or willful transgression, stronger than a mere mistake. 'Rebelled against' captures the relational and covenantal defiance expressed by the verb and works naturally with 'my law'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
