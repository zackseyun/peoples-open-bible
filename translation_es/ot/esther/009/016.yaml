translation:
  language: es
  text: Y el resto de los judíos que estaban en las provincias del rey se reunieron y se mantuvieron firmes[a] por sus vidas, y tuvieron alivio de sus enemigos, y mataron a setenta y cinco mil de los que los odiaban; pero no echaron mano al botín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se mantuvieron firmes en defensa de sus vidas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «botín» también puede traducirse como «despojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: And the rest of
  chosen_spanish: Y el resto de
  alternatives_spanish:
  - Y los demás de
  - Y el remanente de
  lexicon: HALOT
  rationale: שְׁאָר expresa lo que queda o permanece. «El resto de» es natural en español y conserva la idea de continuación respecto del grupo ya mencionado.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En Ester predomina el sentido étnico-religioso del pueblo; «judíos» es la forma más idiomática y clara en español.
- source_word: בִּמְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: who were in the king’s provinces
  chosen_spanish: que estaban en las provincias del rey
  alternatives_spanish:
  - que estaban en las provincias del rey
  - que estaban en las provincias del monarca
  lexicon: HALOT
  rationale: מְדִינוֹת alude a divisiones administrativas del imperio. «Provincias del rey» conserva el sentido político y sigue de cerca la estructura del hebreo.
- source_word: נִקְהֲלוּ
  english_pob_choice: gathered themselves together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El verbo indica reunirse como cuerpo. «Se reunieron» es natural en español, aunque pierde algo del matiz reflexivo que el inglés POB intentó conservar con «gathered themselves together».
- source_word: וְעָמֹד עַל נַפְשָׁם
  english_pob_choice: and stood for their lives
  chosen_spanish: y se pusieron de pie por su vida
  alternatives_spanish:
  - y se pusieron en defensa de su vida
  - y defendieron su vida
  lexicon: HALOT
  rationale: La frase hebrea es un modismo que literalmente dice «estar en pie sobre su vida». El español «se pusieron de pie por su vida» conserva la imagen de estar firmes/levantarse en situación de peligro; «en defensa de su vida» explicita más el sentido, pero suaviza la metáfora.
- source_word: וְנוֹחַ מֵאֹיְבֵיהֶם
  english_pob_choice: and had relief from their enemies
  chosen_spanish: y tuvieron alivio de sus enemigos
  alternatives_spanish:
  - y tuvieron descanso de sus enemigos
  - y hallaron alivio de sus enemigos
  lexicon: HALOT
  rationale: נוח aquí expresa descanso o alivio tras la amenaza. «Tuvieron alivio» es claro, moderno y preserva el resultado narrativo.
- source_word: וְהָרֹג בְּשֹׂנְאֵיהֶם
  english_pob_choice: and killed seventy-five thousand of those who hated them
  chosen_spanish: y mataron a setenta y cinco mil de los que los odiaban
  alternatives_spanish:
  - y mataron a setenta y cinco mil de los que los aborrecían
  - y derribaron a setenta y cinco mil de sus enemigos
  lexicon: HALOT
  rationale: שֹׂנְאֵיהם son «los que los odiaban». «Mataron a» expresa el resultado del verbo; mantener «los que los odiaban» evita suavizar el término relacional.
- source_word: חֲמִשָּׁה וְשִׁבְעִים אָלֶף
  english_pob_choice: seventy-five thousand
  chosen_spanish: setenta y cinco mil
  alternatives_spanish:
  - setenta y cinco mil
  lexicon: HALOT
  rationale: El orden numérico se adapta al uso natural del español sin alterar el valor exacto.
- source_word: וּבַבִּזָּה
  english_pob_choice: but on the plunder
  chosen_spanish: pero no echaron mano al botín
  alternatives_spanish:
  - pero no se apoderaron del botín
  - pero no tocaron el botín
  lexicon: HALOT
  rationale: בִּזָּה designa el botín de guerra. La cláusula adversativa en contexto expresa que, aunque vencieron, no tomaron el botín; en español es más natural decirlo con el verbo de la frase siguiente.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  english_pob_choice: they did not lay a hand
  chosen_spanish: no echaron mano
  alternatives_spanish:
  - no pusieron la mano
  - no extendieron la mano
  lexicon: HALOT
  rationale: Es un modismo hebreo para apoderarse de algo. «No echaron mano» es una equivalencia española idiomática que conserva la idea de no tomar el botín.
theological_decisions:
- issue: Marco moral de la violencia en defensa propia
  english_pob_reading: Retained the text's self-defense framing with 'stood for their lives' rather than a more neutral or aggressive rendering.
  chosen_spanish_reading: Mantener el marco de autodefensa con «se pusieron de pie por su vida» y no convertirlo en una formulación meramente agresiva.
  alternative_spanish_readings:
  - se defendieron
  - tomaron represalias
  - se alzaron contra sus enemigos
  rationale: El hebreo vincula la acción con la preservación de la vida. La traducción debe dejar visible ese marco sin borrar la violencia del relato ni convertirla en algo distinto de la narración bíblica.
  doctrine_reference: 'Estrategia de traducción #1 y #3'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó «among those who hated them» a «of those who hated them» por mayor naturalidad y directitud. En español se siguió ese ajuste con «de los que los odiaban», evitando una construcción equivalente a «entre» que debilitaría el objeto directo.
  spanish_consistency_notes:
  - Se mantiene «botín» como término consistente para בִּזָּה, en lugar de «despojo», porque es más transparente en español bíblico contemporáneo.
  - «Judíos» se conserva por consistencia con Ester y con el uso narrativo del libro.
  - La expresión «se reunieron» conserva el sentido colectivo de נִקְהֲלוּ, aunque sin repetir la reflexividad del hebreo; la nota a compensa la posible pérdida de matiz.
  - Se evita «SEÑOR» o sustituciones litúrgicas porque este versículo no contiene el nombre divino.
