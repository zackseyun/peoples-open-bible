translation:
  language: es
  text: Y no tengas miedo[a], hijo, porque nos hemos vuelto pobres; tienes mucho, si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hay mucho para ti". La expresión griega puede indicar lo que uno posee o lo que está disponible para uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβοῦ
  english_pob_choice: do not be afraid
  chosen_spanish: no tengas miedo
  alternatives_spanish:
  - no temas
  lexicon: BDAG
  rationale: El prohibitivo con φοβέομαι se expresa de forma natural en español con 'no tengas miedo'. Mantiene el sentido imperativo y la tonalidad pastoral sin volverlo excesivamente arcaico.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: muchacho
  alternatives_spanish:
  - niño
  - hijo
  lexicon: BDAG
  rationale: Aunque 'child' puede traducirse literalmente como 'niño', en este contexto de trato afectuoso y familiar 'muchacho' suena más natural en español actual y conserva la cercanía sin añadir posesivo que el griego no explicita.
- source_word: ἐπτωχεύσαμεν
  english_pob_choice: we have become poor
  chosen_spanish: hemos empobrecido
  alternatives_spanish:
  - hemos llegado a la pobreza
  - nos hemos vuelto pobres
  lexicon: BDAG
  rationale: El aoristo de πτωχεύω señala la entrada en un estado de pobreza. 'Hemos empobrecido' conserva ese valor ingresivo de manera más breve y directa que una simple descripción estática.
- source_word: ὑπάρχει σοι πολλὰ
  english_pob_choice: you have much
  chosen_spanish: tú tienes mucho
  alternatives_spanish:
  - mucho te pertenece
  - hay mucho para ti
  lexicon: BDAG
  rationale: La expresión griega puede indicar posesión o disponibilidad. 'Tú tienes mucho' es la equivalencia más clara y natural en español, y preserva la amplitud semántica sin cerrarla a una sola interpretación.
- source_word: ἐὰν φοβηθῇς τὸν θεὸν
  english_pob_choice: if you fear God
  chosen_spanish: si temes a Dios
  alternatives_spanish:
  - si reverencias a Dios
  lexicon: BDAG
  rationale: '''Temer a Dios'' es la forma bíblica estándar en español y conserva mejor el peso teológico del verbo que ''reverenciar'', que suaviza la expresión.'
- source_word: ἀποστῇς ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: turn away from every sin
  chosen_spanish: te apartas de todo pecado
  alternatives_spanish:
  - te desvías de todo pecado
  - te alejas de todo pecado
  lexicon: BDAG
  rationale: ἀφίστημι con ἀπό implica separación o retiro. 'Apartarse de' mantiene ese movimiento moral-volitivo en un español natural.
- source_word: ποιήσῃς τὸ ἀρεστὸν
  english_pob_choice: do what is pleasing
  chosen_spanish: haces lo que le agrada
  alternatives_spanish:
  - haces lo que es agradable
  - haces lo que le complace
  lexicon: BDAG
  rationale: El adjetivo sustantivado τὸ ἀρεστόν se entiende como 'lo que agrada'. En español, 'lo que le agrada' transmite con claridad el sentido relacional del pasaje.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: '''Delante de él'' conserva la idea de estar bajo su mirada y juicio, a la vez que suena natural en español. Mantiene la relación evaluativa sugerida por la locución griega.'
theological_decisions:
- issue: Sentido de 'tú tienes mucho' en contexto de pobreza
  english_pob_reading: The phrase refers to true or sufficient wealth available to the son in a life ordered by fearing God and avoiding sin, without specifying material prosperity as a guarantee.
  chosen_spanish_reading: La frase indica que hay para el hijo una verdadera abundancia o suficiencia ligada a temer a Dios y apartarse del pecado, sin convertirla en una promesa automática de prosperidad material.
  alternative_spanish_readings:
  - La frase promete abundancia material si obedece a Dios.
  - La frase se refiere sobre todo a riquezas espirituales o morales.
  rationale: El griego solo dice 'tú tienes mucho' y lo condiciona a una vida obediente. La redacción española conserva esa amplitud y no fuerza ni una lectura de prosperidad ni una espiritualización excesiva.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera indebida.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el griego Swete 1909. No se detectaron revisiones posteriores que obliguen a cambiar la lectura; se conserva la ambigüedad de ὑπάρχει σοι πολλὰ mediante una nota léxica.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεόν, conforme al estándar POB en español.
  - Se traduce φοβέομαι con una fórmula idiomática ('no tengas miedo' / 'temes a Dios') sin perder la diferencia entre miedo humano y temor reverente.
  - Se conserva el valor moral de ἀποστῇς como apartarse/separarse de pecado.
  - '''Delante de él'' mantiene la relación evaluativa de ἐνώπιον αὐτοῦ sin introducir terminología eclesiástica adicional.'
