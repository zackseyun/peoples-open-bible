translation:
  language: es
  text: Entonces, en efecto, uno de los guardias crueles[a], lanzándose contra sus costados, lo golpeaba sin cesar, para que, al caer[b], se levantara de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los duros guardias de escolta». El griego dice literalmente «portadores de lanza», es decir, guardias armados al servicio del gobernante.
    reason: lexical_alternative
  - marker: b
    text: «Levantarse de nuevo» aquí significa recuperar físicamente la postura tras la caída, no resucitar.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάξ γέ τοι
  english_pob_choice: Then indeed
  chosen_spanish: Entonces, en efecto
  alternatives_spanish:
  - Pues bien
  - Ciertamente
  - Entonces
  lexicon: LSJ
  rationale: La combinación funciona como partícula discursiva enfática de transición; en español, «Entonces, en efecto» preserva el arranque narrativo y la fuerza intensificadora sin forzar un equivalente artificial.
- source_word: τῶν πικρῶν
  english_pob_choice: of the cruel
  chosen_spanish: de los crueles
  alternatives_spanish:
  - de los amargos
  - de los severos
  - de los duros
  lexicon: LSJ
  rationale: Aunque πικρός es literalmente «amargo», aplicado a personas en este contexto violento expresa aspereza/crueldad. «Crueles» conserva mejor la carga moral y el tono del pasaje.
- source_word: δορυφόρων
  english_pob_choice: guards
  chosen_spanish: guardias
  alternatives_spanish:
  - guardias de escolta
  - escoltas armados
  - portadores de lanza
  lexicon: LSJ
  rationale: El término puede referirse etimológicamente a «portadores de lanza» y funcionalmente a guardias de escolta. «Guardias» es claro y natural en español, sin ocultar que se trata de hombres armados al servicio del gobernante.
- source_word: κενεῶνας
  english_pob_choice: sides
  chosen_spanish: sus costados
  alternatives_spanish:
  - sus flancos
  - sus lados
  - sus costillas
  lexicon: LSJ
  rationale: El griego alude a las partes hundidas del cuerpo, especialmente los flancos/costados. «Sus costados» suena natural en español y mantiene la referencia corporal precisa.
- source_word: ἐναλλόμενος
  english_pob_choice: leaping at his sides
  chosen_spanish: saltando hacia sus costados
  alternatives_spanish:
  - arrojándose sobre sus costados
  - saltando contra sus costados
  - lanzándose a sus costados
  lexicon: LSJ
  rationale: El participio expresa un movimiento brusco y violento contra la víctima. «Saltando hacia sus costados» conserva esa energía física sin sonar excesivamente literal o torpe en español.
- source_word: ἔτυπτεν
  english_pob_choice: kept striking
  chosen_spanish: lo golpeaba sin cesar
  alternatives_spanish:
  - lo seguía golpeando
  - lo apaleaba
  - lo hería repetidamente
  lexicon: LSJ
  rationale: El imperfecto indica acción continua o reiterada. «Lo golpeaba sin cesar» transmite la brutalidad repetida y mantiene el aspecto durativo.
- source_word: ὅπως ἐξανίσταιτο
  english_pob_choice: so that ... he might rise again
  chosen_spanish: para que ... se levantara de nuevo
  alternatives_spanish:
  - a fin de que ... volviera a ponerse en pie
  - para que ... se incorporara otra vez
  - de modo que ... se levantara otra vez
  lexicon: LSJ
  rationale: La cláusula expresa propósito físico, no resurrección. «Se levantara de nuevo» comunica el acto corporal de ponerse en pie tras caer, manteniendo la finalidad del golpe.
- source_word: πίπτων
  english_pob_choice: when he fell
  chosen_spanish: cuando cayera
  alternatives_spanish:
  - al caer
  - mientras caía
  - cuando estaba cayendo
  lexicon: LSJ
  rationale: El participio contemporáneo se integra con la cláusula de propósito. «Cuando cayera» resulta natural en español y mantiene la simultaneidad del momento del derrumbe.
theological_decisions:
- issue: Posible lectura de ἐξανίσταιτο como lenguaje de resurrección
  english_pob_reading: physical rising after collapse under torture
  chosen_spanish_reading: levantarse físicamente tras caer bajo los golpes
  alternative_spanish_readings:
  - resucitar
  - volver a la vida
  - alzarse de nuevo
  rationale: El contexto es una escena de tortura; la intención es forzar al hombre a ponerse en pie después de caer. «Se levantara de nuevo» evita importar lenguaje de resurrección que el pasaje no afirma.
  doctrine_reference: Preservar la tensión semántica sin sobrecargar el texto con una lectura doctrinal ajena al contexto inmediato.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una dirección más natural para el golpe («hacia sus costados») y mantener clara la finalidad del castigo, sin diluir la violencia repetida del imperfecto griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «guardias» en vez de un calco demasiado técnico, porque el contexto narrativo de tortura exige claridad inmediata.
  - Se prefirió «se levantara de nuevo» para evitar una lectura de resurrección; la nota explica la restricción semántica.
  - El registro es sobrio y contemporáneo, sin arcaísmos innecesarios, pero conserva la solemnidad del relato.
