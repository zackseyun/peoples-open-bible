translation:
  language: es
  text: Porque dentro de muy poco tiempo, la indignación llegará a su fin, y mi enojo será para su destrucción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su aniquilación», «su consumación» o «su fin». El sustantivo hebreo es raro y su matiz exacto se debate, aunque el contexto señala claramente la caída del opresor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o de motivo del versículo anterior; «Porque» conserva bien ese valor discursivo en español.
- source_word: עוֹד מְעַט מִזְעָר
  english_pob_choice: in just a very little while
  chosen_spanish: dentro de muy poco tiempo
  alternatives_spanish:
  - en un tiempo muy breve
  - dentro de un ratito
  lexicon: HALOT
  rationale: La acumulación de expresiones de brevedad enfatiza la inmediatez. «Dentro de muy poco tiempo» comunica duración mínima sin sonar artificial.
- source_word: וְכָלָה
  english_pob_choice: will come to an end
  chosen_spanish: llegará a su fin
  alternatives_spanish:
  - terminará
  - cesará
  - será acabada
  lexicon: HALOT
  rationale: El verbo en discurso profético expresa cese futuro. «Llegará a su fin» es natural y mantiene la idea de terminación.
- source_word: זַעַם
  english_pob_choice: indignation
  chosen_spanish: la indignación
  alternatives_spanish:
  - la ira
  - el furor
  lexicon: HALOT
  rationale: «Indignación» preserva un registro elevado y ayuda a distinguir este término del siguiente «mi enojo», como hace el POB inglés.
- source_word: וְאַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi enojo
  alternatives_spanish:
  - mi ira
  - mi furia
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática para la ira divina. «Enojo» es claro en español y mantiene la posesión de primera persona sin cargar excesivamente el tono.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - contra
  - sobre
  - hacia
  lexicon: HALOT
  rationale: El POB revisó la cláusula final a «for their destruction», reflejando con mayor literalidad la relación marcada por la preposición. En español, «para» expresa bien la finalidad o destino del enojo en esta construcción.
- source_word: תַּבְלִיתָם
  english_pob_choice: their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su aniquilación
  - su consumación
  - su fin
  lexicon: HALOT
  rationale: El sustantivo es raro y su matiz preciso es debatido, pero el contexto apunta al derribo del opresor. «Su destrucción» conserva esa fuerza sin sobretraducir el término.
theological_decisions:
- issue: Referencia del posesivo en «su destrucción»
  english_pob_reading: The pronoun refers to the enemies/oppressors, especially Assyria in the immediate context, not to Judah.
  chosen_spanish_reading: El posesivo se entiende como referido a los enemigos/opresores, en especial Asiria en el contexto inmediato, no a Judá.
  alternative_spanish_readings:
  - Puede entenderse de manera más abstracta como «para destrucción», sin un referente personal tan marcado.
  rationale: El contexto cercano trata del fin del castigo divino y del juicio sobre el opresor. Mantener el posesivo en español preserva esa referencia contextual sin convertirla en una paráfrasis más general.
  doctrine_reference: Isaías 10:20-27; especialmente 10:24-25
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB inglés, que prefirió la cláusula final más literal («for their destruction») en lugar de expandirla interpretativamente. Por eso la versión española evita añadir una dirección explícita como «contra» y conserva una relación más directa con el hebreo.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «indignación» y «enojo» para reflejar dos términos hebreos relacionados pero no idénticos.
  - Se evitó el uso de «SEÑOR» porque el texto hebreo aquí no contiene el nombre divino, sino la primera persona implícita.
  - La nota de pie marca la rareza léxica de תַּבְלִיתָם y preserva las alternativas relevantes sin fijar en exceso el sentido.
