  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: παρά + genitivo como procedencia, νίκη = «victoria», σοφία = «sabiduría», y σὴ ἡ δόξα = «tuya es la gloria». También preserva correctamente la ambigüedad del destinatario del «tú». Sin embargo, οἰκέτης no se corresponde bien con «esclavo» aquí; el audit trail inglés documenta específicamente «servant/household servant», y el griego enfatiza servicio doméstico/pertenencia más que la condición servil fuerte de δοῦλος.'
  spanish_quality_summary: El español es claro y digno. No obstante, la nota al pie actual es defectuosa e inútil, porque ofrece como alternativa la misma palabra ya usada en el texto («sabiduría»). Además, «tu esclavo» suena más fuerte de lo que exige οἰκέτης y desajusta tanto la evidencia léxica como el registro elevado de la línea.
  glossary_alignment: No hay conflicto con las directrices mayores de terminología divina. La principal cuestión léxica es que la preferencia de proyecto por «esclavo» aplica normalmente a δοῦλος cuando el inglés POB eligió «slave»; aquí la palabra griega es οἰκέτης, y la propia auditoría inglesa justifica «servant» con nota alternativa «household servant». En español conviene «siervo» en el texto principal, con nota «sirviente de la casa» para conservar la especificidad.
  issues:
  - severity: high
    issue: «esclavo» para οἰκέτης
    rationale: οἰκέτης significa específicamente sirviente de casa / miembro servicial del hogar, no necesariamente el término más fuerte para esclavitud. El inglés POB escogió «servant» por esta razón. «Esclavo» sobretraduce y se aparta de la justificación documentada.
  - severity: high
    issue: Nota al pie [a] incorrecta
    rationale: 'La nota dice «O: “sabiduría”», que no ofrece ninguna alternativa real y no corresponde a ninguna ambigüedad del original ni de la auditoría inglesa.'
  - severity: medium
    issue: Falta la alternativa léxica preservada para οἰκέτης
    rationale: La auditoría inglesa conserva una nota con «household servant». La revisión española debería reflejar esa especificidad con una nota como «sirviente de la casa» o equivalente.
  revised_spanish_text: De ti proceden la victoria y la sabiduría, y tuya es la gloria, y yo soy tu siervo[a].
  revised_footnotes:
  - marker: a
    text: O «tu sirviente de la casa». El griego οἰκέτης se refiere específicamente a un sirviente del hogar; «siervo» se usa en el texto principal por estilo natural y digno en español.
