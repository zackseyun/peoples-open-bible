revisions:
- from: 'Por tanto[a], oh rey, acepta mi consejo: rompe tus pecados con justicia, y tus iniquidades con misericordia para con los pobres[b], de modo que quizá haya un prolongamiento de tu prosperidad.'
  to: 'Por tanto[a], oh rey, que mi consejo te sea aceptable: rompe con tus pecados por medio de la justicia, y con tus iniquidades mostrando misericordia a los pobres, para que quizá haya una prolongación de tu prosperidad[b].'
  rationale: 'Se hicieron reparaciones menores para alinear mejor el español con el modismo arameo y con la auditoría inglesa, sin cambiar el sentido: se restauró el tono deferente de la apelación («que mi consejo te sea aceptable»), se volvió idiomática la metáfora de פְרֻק («rompe con tus pecados»), se explicitó mejor la acción misericordiosa hacia los pobres, y se sustituyó «prolongamiento» por la forma más natural «prolongación». También se mantuvo la contingencia de הֵן con «quizá» y la lectura no meritoria del pasaje.'
