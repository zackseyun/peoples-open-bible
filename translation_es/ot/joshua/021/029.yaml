lexical_decisions:
- source_word: יַרְמוּת
  english_pob_choice: Jarmuth
  chosen_spanish: Jarmut
  alternatives_spanish:
  - Yarmut
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español conviene mantener la transliteración, ajustándola a la ortografía española con terminación -t, como forma natural y reconocible del topónimo.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su terreno abierto
  - sus tierras abiertas
  - sus tierras de pastoreo
  lexicon: HALOT
  rationale: En listas de repartos territoriales, מִגְרָשׁ designa el terreno abierto alrededor de la ciudad, funcionalmente apto para pasto. 'Pastizales' comunica esa función con naturalidad en español sin perder el sentido espacial de los alrededores de la ciudad.
- source_word: עֵין גַּנִּים
  english_pob_choice: En-gannim
  chosen_spanish: En-ganim
  alternatives_spanish:
  - Ain-ganim
  - En Ganim
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva como topónimo. En español se prefiere una forma transliterada breve y fluida, sin traducir sus componentes semánticos ('manantial de jardines').
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro poblados
  - cuatro urbes
  lexicon: HALOT
  rationale: Fórmula resumida estándar en listas territoriales. 'Ciudades' es el equivalente más natural y exacto para עָרִים en este contexto.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés presentan alta concordancia; no se detectaron revisiones aplicadas ni cambios textuales relevantes para esta línea.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de la lista con una estructura coordinada simple: nombre + posesivo + sustantivo territorial.'
  - Se evitó 'SEÑOR' u otros términos no pertinentes porque el versículo es un registro topográfico sin vocabulario divino.
  - Se usó 'pastizales' para reflejar la función de מִגְרָשׁ en contextos de asentamiento y no como simple glosa mecánica de 'terreno común'.
