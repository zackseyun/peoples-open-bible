revisions:
- from: Y las jóvenes de Ester y sus eunucos vinieron y le informaron[a]; y la reina quedó muy angustiada. Envió vestidos para vestir a Mardoqueo y para quitarle su cilicio[b][c], pero él no los aceptó.
  to: Las jóvenes que atendían a Ester y sus eunucos vinieron y le informaron[a]; y la reina quedó muy angustiada. Envió prendas para vestir a Mardoqueo y para quitarle su cilicio[c][b], pero él no las aceptó.
  rationale: 'Se revisa el texto para mejorar la naturalidad y precisión del español sin alterar el sentido fuente: ''las jóvenes de Ester'' pasa a ''las jóvenes que atendían a Ester'' para expresar mejor el contexto palaciego; ''vestidos'' pasa a ''prendas'' para evitar una lectura demasiado específica; y la nota [a] se realinea con la alternativa léxica documentada en el POB inglés. Se conservan ''eunucos'' y ''cilicio'' por fidelidad léxica y cultural.'
  reviewer_model: gpt-5.4
