review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa básica del hebreo: fórmula narrativa, entrada en la casa, propósito de hacer su trabajo y ausencia de personas en la casa. Sin embargo, no preserva fielmente un detalle importante de מֵאַנְשֵׁי הַבַּיִת, porque omite «hombres/varones» y lo reduce a «de la casa». Además, la puntuación y repetición final («en la casa») suenan torpes en español.'
  spanish_quality_summary: El texto es comprensible, pero «en tal día» suena algo rígido en español actual; «en una ocasión así» o «un día como este» funciona mejor, aunque puede mantenerse con nota si se quiere cercanía formal. La frase «no había allí ningún hombre de la casa, en la casa» es poco natural por la coma y la repetición mal integrada. Conviene reestructurarla manteniendo el doble locativo hebreo de manera legible.
  glossary_alignment: No hay términos teológicos mayores en este versículo. La principal cuestión léxica es mantener el masculino explícito de מֵאַנְשֵׁי הַבַּיִת como «los hombres de la casa», según la política de precisión de género del proyecto. «Entró en la casa» y «para hacer su trabajo» están bien alineados con el expediente inglés.
  issues:
  - severity: high
    issue: Omisión del componente masculino explícito en מֵאַנְשֵׁי הַבַּיִת
    rationale: El borrador dice «ningún hombre de la casa», pero la decisión léxica justifica reducir «de los hombres de la casa» a «de la casa». Esa reducción no preserva fielmente el hebreo ni la decisión inglesa auditada, que insiste en mantener «men of the house».
  - severity: medium
    issue: Redacción poco natural del doble locativo final
    rationale: «No había allí ningún hombre de la casa, en la casa» conserva la repetición, pero la coma produce una frase pesada y poco idiomática. Debe conservarse el énfasis locativo sin quebrar la sintaxis española.
  - severity: low
    issue: «En tal día» suena rígido
    rationale: No es incorrecto, pero en español moderno eclesial suena menos natural que «en una ocasión así» o similar. Dado que el inglés conserva una nota con la alternativa más literal, puede mejorarse el texto principal y dejar la literalidad en nota.
  revised_spanish_text: Y aconteció que, en una ocasión así[a], él entró en la casa para hacer su trabajo, y no había allí ninguno de los hombres de la casa, en la casa.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «en tal día» o «en este día». La expresión hebrea es idiomática y probablemente significa «en una ocasión así» o «un día como este».
    reason: lexical_alternative
  revision_rationale: La revisión restaura el sentido explícito de «los hombres de la casa», mejora la naturalidad del español al tratar la expresión idiomática temporal, y mantiene el énfasis locativo del hebreo («allí ... en la casa») sin omitir contenido del original. También se elimina la puntuación torpe del borrador.
