  - Se usa «hombres» para reflejar el constructo de אִישׁ en contexto censal, evitando «gente» por ser demasiado general.
  - La nota conserva la alternativa «otro Nebo» porque el hebreo admite esa lectura y la POB inglesa la documenta.
