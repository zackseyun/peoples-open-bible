translation:
  language: es
  text: Pero yo he escogido[a] Jerusalén para que mi nombre esté allí, y he escogido a David para estar sobre mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escogí Jerusalén ... y escogí a David». Las formas wayyiqtol del hebreo pueden verterse como pasado simple; «he escogido» en el texto principal resalta la vigencia continua de la elección divina en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶבְחַר
  english_pob_choice: I have chosen
  chosen_spanish: he escogido
  alternatives_spanish:
  - escogí
  - he seleccionado
  lexicon: HALOT
  rationale: בחר expresa la acción de elegir/escoger. En español, el perfecto compuesto «he escogido» comunica una elección ya establecida con vigencia continua en el contexto, sin perder naturalidad ni introducir matices ajenos.
- source_word: בִּירוּשָׁלַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva la forma española estándar.
- source_word: לִהְיוֹת
  english_pob_choice: to be
  chosen_spanish: para que ... esté
  alternatives_spanish:
  - para ser
  - para que exista
  lexicon: HALOT
  rationale: El infinitivo de היה expresa finalidad. En español, «para que ... esté» transmite de forma natural la finalidad/resultante del hebreo y mantiene la referencia locativa del contexto.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi Nombre
  lexicon: HALOT
  rationale: Se preserva el idioma hebreo de «nombre» en el sentido de presencia, reputación y reclamo pactual de Dios. «Mi nombre» evita una paráfrasis explicativa no presente en el texto.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo simple. «Allí» suena natural en español y conserva el énfasis del hebreo en un lugar concreto.
- source_word: בְּדָוִיד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: El hebreo con בחרי no exige traducir la preposición literalmente en español; el objeto directo se expresa de manera idiomática con «a David».
- source_word: עַל
  english_pob_choice: to be over
  chosen_spanish: esté sobre
  alternatives_spanish:
  - gobierne sobre
  - sea rey sobre
  lexicon: HALOT
  rationale: עַל indica autoridad/superioridad sobre el pueblo. «Esté sobre» conserva la relación de autoridad sin explicitar «gobierne» o «rey», que ampliarían el texto.
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  lexicon: HALOT
  rationale: Se mantiene la construcción posesiva y el nombre propio como en el hebreo, preservando el lenguaje pactual. La coma se omite para no añadir una pausa no exigida por la estructura.
theological_decisions:
- issue: «mi nombre» en contexto templario
  english_pob_reading: Preserve the idiom 'my name to be there' rather than paraphrasing it as God's presence dwelling there.
  chosen_spanish_reading: Conservar «para que mi nombre esté allí» sin explicarlo como «mi presencia».
  alternative_spanish_readings:
  - para que mi presencia esté allí
  - como el lugar donde soy adorado
  rationale: En la teología del templo, «nombre» es una expresión cargada de significado pactual. Mantenerla en español respeta la formulación bíblica y evita sustituirla por una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: La relación de David con el pueblo
  english_pob_reading: Render generally as authority 'over' Israel without specifying kingship in the main text.
  chosen_spanish_reading: 'Traducir con una expresión de autoridad general: «esté sobre mi pueblo Israel».'
  alternative_spanish_readings:
  - sea rey sobre mi pueblo Israel
  - gobierne sobre mi pueblo Israel
  rationale: El hebreo dice literalmente «estar sobre»; la referencia al reinado es contextual, no explícita en esta cláusula. La redacción española conserva esa sobriedad y no añade una identificación que el verso no formula.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente del paralelo inglés no introdujo cambios; el consenso crítico indica alta concordancia. Esta versión sigue esa línea y conserva las decisiones auditadas sin ampliación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en otros contextos del proyecto; en este versículo no se presenta el tetragrámaton.
  - Se conserva «mi nombre» y no se reemplaza por «mi presencia», para mantener la fórmula bíblica pactual.
  - Se usa «he escogido» en el texto principal y se ofrece el pasado simple como alternativa en nota, siguiendo la tensión auditada del hebreo wayyiqtol.
  - «Esté sobre» reproduce la relación de autoridad sin sobredeterminarla como «rey» o «gobernar» en el cuerpo del versículo.
