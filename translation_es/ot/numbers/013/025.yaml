translation:
  language: es
  text: Volvieron de reconocer la tierra al cabo de cuarenta días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de explorar la tierra’ o ‘de espiar la tierra’. El verbo hebreo se refiere a examinar el territorio en una misión de reconocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: They returned
  chosen_spanish: Volvieron
  alternatives_spanish:
  - Y volvieron
  - Regresaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de שוב introduce la acción siguiente en secuencia. En español, ‘volvieron’ comunica el retorno con naturalidad narrativa sin sobrecargar el verso con una conjunción explícita.
- source_word: מִתּוּר
  english_pob_choice: from scouting out
  chosen_spanish: de reconocer
  alternatives_spanish:
  - de explorar
  - de registrar
  lexicon: HALOT
  rationale: 'El infinitivo constructo con מִן indica origen: ‘de/desde reconocer’. ‘Reconocer’ en español bíblico y contemporáneo puede expresar la misión de inspección o exploración del territorio. Evita el matiz excesivamente peyorativo de ‘espiar’, aunque esa también es una posibilidad contextual.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: אָרֶץ aquí se refiere al territorio examinado. ‘La tierra’ es una equivalencia natural y fiel en español, manteniendo el sentido geográfico concreto del contexto.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: La expresión con מִן + קֵץ marca el punto de cierre de un período. ‘Al cabo de’ expresa bien en español ese cierre temporal sin perder la fuerza idiomática del hebreo.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  alternatives_spanish:
  - 40 días
  lexicon: HALOT
  rationale: La medida temporal se traduce de forma directa y idiomática. ‘Cuarenta días’ conserva el valor numérico y narrativo del hebreo.
translation_notes:
  revision_awareness: El texto inglés de referencia fue revisado y quedó sin cambios; el borrador español sigue la misma lectura y conserva la única nota léxica relevante sobre מִתּוּר.
  spanish_consistency_notes:
  - Se usó ‘tierra’ para אָרֶץ en sentido territorial concreto, coherente con el contexto narrativo de reconocimiento.
  - Se prefirió ‘reconocer’ para preservar el matiz de misión de inspección sin imponer automáticamente ‘espiar’.
  - La construcción temporal ‘al cabo de’ refleja adecuadamente el hebreo idiomático מִקֵּץ en español natural.
