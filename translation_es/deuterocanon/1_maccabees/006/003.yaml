translation:
  language: es
  text: Y llegó y procuró apoderarse de la ciudad y saquearla[a], pero no pudo, porque se supo el asunto entre la gente de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''saquearla'' o ''despojarla''. El verbo griego προνομεῦσαι puede referirse al pillaje o a tomar botín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἦλθεν
  english_pob_choice: And he came
  chosen_spanish: Y llegó
  alternatives_spanish:
  - Y vino
  - Y se presentó
  lexicon: LSJ
  rationale: ἦλθεν expresa llegada o venida; en español narrativo, 'llegó' suena natural y conserva la progresión del relato sin añadir matices no presentes en el griego.
- source_word: καταλαβεῖν τὴν πόλιν
  english_pob_choice: to take the city
  chosen_spanish: apoderarse de la ciudad
  alternatives_spanish:
  - tomar la ciudad
  - capturar la ciudad
  lexicon: LSJ
  rationale: En contexto militar, καταλαβεῖν implica ganar control de una ciudad. 'Apoderarse de' comunica bien la idea de captura/control y es idiomático en español, manteniendo la fuerza del verbo.
- source_word: προνομεῦσαι αὐτήν
  english_pob_choice: and plunder it
  chosen_spanish: y saquearla
  alternatives_spanish:
  - y despojarla
  - y expoliarla
  lexicon: LSJ
  rationale: προνομεῦσαι se refiere a tomar botín mediante incursión o pillaje. 'Saquearla' es claro, fuerte y adecuado en registro histórico-bélico.
- source_word: οὐκ ἠδυνάσθη
  english_pob_choice: but he was not able
  chosen_spanish: pero no pudo
  alternatives_spanish:
  - pero no fue capaz
  - pero no le fue posible
  lexicon: BDAG
  rationale: La negación de δύναμαι expresa incapacidad; 'no pudo' es la forma más natural en español y conserva el valor directo del griego.
- source_word: ἐγνώσθη ὁ λόγος
  english_pob_choice: because the matter became known
  chosen_spanish: porque se supo el asunto
  alternatives_spanish:
  - porque se conoció el hecho
  - porque se dio a conocer el plan
  - porque se hizo saber el asunto
  lexicon: BDAG
  rationale: λόγος aquí no exige traducirse como 'palabra'; el audit trail inglés lo trató de manera neutral como 'matter'. 'El asunto' preserva esa neutralidad y la pasiva 'se supo' refleja bien ἐγνώσθη.
- source_word: τοῖς ἐκ τῆς πόλεως
  english_pob_choice: to those in the city
  chosen_spanish: entre los que estaban en la ciudad
  alternatives_spanish:
  - a los habitantes de la ciudad
  - a los de la ciudad
  lexicon: BDAG
  rationale: La frase griega dice literalmente 'a los que son de la ciudad'. El inglés revisado opta por 'those in the city'; en español, 'entre los que estaban en la ciudad' expresa naturalmente el grupo que llegó a conocer el asunto, sin forzar una precisión social que el texto no explicita.
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del audit trail inglés: se evitó traducir λόγος como ''plan'' para no estrechar indebidamente su sentido; en cambio, se adoptó una expresión más neutral (''asunto'') compatible con el contexto narrativo. También se prefirió una formulación natural para τοῖς ἐκ τῆς πόλεως que conserve la referencia a quienes estaban en la ciudad sin introducir detalles no garantizados por el griego.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un registro narrativo sobrio y bélico, acorde con 1 Macabeos.
  - No se añadió sujeto explícito adicional; 'se supo' conserva la pasiva impersonal del griego.
  - '''Apoderarse'' y ''saquear'' preservan la intensidad militar sin recargar el español con términos arcaicos.'
