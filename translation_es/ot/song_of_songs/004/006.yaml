revisions:
- from: Hasta que el día[b][a] sople y las sombras huyan, iré al monte de mirra y al collado de incienso.
  to: Hasta que el día[a] sople y las sombras huyan, iré[b] al monte de mirra y al collado de franquincienso.
  rationale: Se corrige 'incienso' a 'franquincienso' para seguir la decisión léxica documentada sobre לבונה. Se reubica la nota del dativo ético al verbo 'iré', donde realmente corresponde. También se mejora la redacción de la nota sobre 'el día sopla/respira' para que refleje con más fidelidad y naturalidad las alternativas preservadas en la auditoría inglesa.
