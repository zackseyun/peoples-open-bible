translation:
  language: es
  text: En aquel día no te avergonzarás[a] por todas tus acciones con las que te rebelaste contra mí, porque entonces quitaré de en medio de ti a los que se regocijan en tu orgullo[b], y ya no serás altiva en mi santo monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no quedarás avergonzada». El verbo hebreo puede expresar tanto el estado de vergüenza como el quedar en vergüenza o deshonra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los que exultan en tu orgullo». La expresión hebrea se refiere a personas caracterizadas por un gozo arrogante asociado con tu soberbia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵבֹושִׁי
  english_pob_choice: you will not be put to shame
  chosen_spanish: no te avergonzarás
  alternatives_spanish:
  - no serás avergonzada
  - no quedarás avergonzada
  - no serás puesta en vergüenza
  lexicon: HALOT
  rationale: El hebreo admite tanto la experiencia de vergüenza como el quedar en vergüenza/deshonra. En español, ‘no te avergonzarás’ comunica bien el estado sin añadir una pasiva menos natural. La nota conserva la alternativa de ‘puesta en vergüenza’ que el inglés explicitó.
- source_word: מִכֹּל עֲלִילֹתַיִךְ
  english_pob_choice: because of all your deeds
  chosen_spanish: por todas tus acciones
  alternatives_spanish:
  - a causa de todas tus obras
  - por causa de todas tus acciones
  - por todos tus hechos
  lexicon: HALOT
  rationale: עֲלִילָה puede ser ‘acto’, ‘hecho’ u ‘obra’; ‘acciones’ es natural y suficientemente amplio. El hebreo con מִן tras בושׁ expresa la base de la vergüenza, por lo que ‘por’ transmite mejor la relación causal que un ‘de’ literal.
- source_word: פָּשַׁעַתְּ בִּי
  english_pob_choice: you rebelled against me
  chosen_spanish: te rebelaste contra mí
  alternatives_spanish:
  - transgrediste contra mí
  - pecaste contra mí
  lexicon: HALOT
  rationale: פָּשַׁע señala rebelión o ruptura de lealtad, no solo pecado genérico. ‘Te rebelaste contra mí’ conserva mejor esa fuerza relacional y del pacto.
- source_word: אָסִיר
  english_pob_choice: I will remove
  chosen_spanish: quitaré
  alternatives_spanish:
  - removeré
  - apartaré
  - sacaré
  lexicon: HALOT
  rationale: El hifil de סור/סיר expresa retirar o quitar. ‘Quitaré’ es directo y natural en español, y mantiene el gesto de purificación/juzgamiento sin sobre-explicar.
- source_word: מִקִּרְבֵּךְ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu seno
  - de tu interior
  - de entre ti
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a la comunidad o centro del pueblo. ‘De en medio de ti’ conserva ese sentido colectivo mejor que una referencia solo interiorizada.
- source_word: עַלִּיזֵי גַּאֲוָתֵךְ
  english_pob_choice: those who exult in your pride
  chosen_spanish: a los que se regocijan en tu orgullo
  alternatives_spanish:
  - a tus orgullosos y jubilosos
  - a los que se jactan en tu soberbia
  - a los que exultan en tu arrogancia
  lexicon: HALOT
  rationale: עַלִּיזֵי son personas gozosas/exultantes; גַּאֲוָה aquí es negativa, por eso ‘orgullo’ conserva el matiz moral. ‘Se regocijan en’ reproduce bien el vínculo de la construcción sin volverla demasiado técnica.
- source_word: וְלֹא תוֹסִפִי לְגָבְהָה עוֹד
  english_pob_choice: and you will no longer be haughty
  chosen_spanish: ya no volverás a ser altiva
  alternatives_spanish:
  - ya no seguirás siendo orgullosa
  - ya no te ensoberbecerás más
  - ya no volverás a enaltecerte
  lexicon: HALOT
  rationale: El hebreo comunica la cesación de un patrón de exaltación/altivez. ‘Volverás a ser altiva’ traduce naturalmente la idea de ‘no seguir/añadir más’ y preserva el matiz moral de גבה.
- source_word: בְּהַר קָדְשִׁי
  english_pob_choice: on my holy mountain
  chosen_spanish: en mi santo monte
  alternatives_spanish:
  - sobre mi santo monte
  - en mi monte santo
  - en mi monte sagrado
  lexicon: HALOT
  rationale: ‘Santo monte’ es una formulación bíblica clara y fiel. ‘En’ conserva el valor locativo de la escena de Sion sin forzar una preposición más literal que en español sonaría extraña.
theological_decisions:
- issue: Si el versículo niega la vergüenza subjetiva o la deshonra objetiva ligada al pecado pasado.
  english_pob_reading: The verse promises removal of disgrace tied to past rebellious deeds in the context of restoration, not denial that those deeds were shameful.
  chosen_spanish_reading: El versículo promete la remoción de la vergüenza/deshonra vinculada a las rebeliones pasadas, dentro del contexto de restauración, no la negación de que esas acciones hayan sido vergonzosas.
  alternative_spanish_readings:
  - El pueblo simplemente ya no sentirá vergüenza
  - El versículo declara inocencia respecto de las obras pasadas
  rationale: La cláusula ‘por todas tus acciones con las que te rebelaste contra mí’ mantiene la culpa real del pasado. La promesa de Dios de ‘quitar’ a los orgullosos explica cómo cesa la vergüenza sin borrar la culpa histórica. La redacción española conserva esa tensión.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete fuente hebreo y coincide sustancialmente con la lectura inglesa auditada. No se registraron revisiones aplicadas en el pasaje base; la redacción española busca reproducir la misma tensión semántica (vergüenza/deshonra, orgullo/altivez) con sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma por defecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - ‘Mesías/Cristo’ no aplica aquí.
  - Se conserva la distinción entre ‘vergüenza’ y ‘deshonra’ en la nota, porque el hebreo permite ambas y el contexto incluye culpa real y restauración.
  - ‘Orgullo/altivez’ se usa con carga negativa, coherente con גַּאֲוָה y גָּבְהָה en el contexto.
