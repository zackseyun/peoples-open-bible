    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un cordel de treinta codos». La frase describe la circunferencia del recipiente según la manera convencional antigua de medir.'
    reason: cultural_note
  revision_rationale: 'Se conserva el contenido del borrador con una reparación mínima pero necesaria: la nota b se traslada al lugar correcto, junto a «un cordel de treinta codos». También se alisa levemente la redacción de «por todo alrededor» a «todo alrededor» para un español más natural sin perder el énfasis del hebreo.'
