translation:
  language: es
  text: 'Y los hijos de Jerías: Amarías el segundo[a], Jahaziel el tercero, Jecameam el cuarto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo presenta una lista elíptica: literalmente, «Y los hijos de Jerías: Amarías el segundo, Jahaziel el tercero, Jecameam el cuarto». También puede entenderse con un verbo implícito: «Amarías era el segundo», etc.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנָי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: Conservo la conjunción coordinante para reflejar la continuidad con la lista anterior; 'hijos de' mantiene el giro genealógico breve del hebreo y es natural en español bíblico.
- source_word: יְרִיָּהוּ
  english_pob_choice: Jeriah
  chosen_spanish: Jerías
  alternatives_spanish:
  - Jerías
  - Jería
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Jerías' reproduce una forma española natural y cercana al valor convencional del nombre, sin intentar traducirlo.
- source_word: אֲמַרְיָהוּ
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amariah
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso hispano común; 'Amarías' conserva mejor la sonoridad y la adaptabilidad morfológica al español que una forma más letra-por-letra.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - era el segundo
  - segundo
  lexicon: HALOT
  rationale: El hebreo usa un sintagma nominal elíptico. En español, el artículo con ordinal reproduce la lista sin añadir más de lo que el texto exige; el verbo puede suplirse implícitamente, como señala el aparato inglés.
- source_word: יַחֲזִיאֵל
  english_pob_choice: Jahaziel
  chosen_spanish: Jazael
  alternatives_spanish:
  - Jahaziel
  lexicon: HALOT
  rationale: Translitero el nombre en una forma española más fluida. Aunque el inglés usa 'Jahaziel', la vocalización hebrea permite 'Jazael' como representación abreviada y comprensible; se preserva la identidad nominal sin forzar una grafía inglesa.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - era el tercero
  - tercero
  lexicon: HALOT
  rationale: Mantengo el mismo patrón de ordinal elíptico para reflejar la estructura paralela de la lista.
- source_word: יְקַמְעָם
  english_pob_choice: Jekameam
  chosen_spanish: Jecamam
  alternatives_spanish:
  - Jekameam
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Jecamam' sigue una adaptación española más natural y cercana a la raíz consonántica, sin depender de la convención inglesa exacta.
- source_word: הָרְבִיעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - era el cuarto
  - cuarto
  lexicon: HALOT
  rationale: Sostengo la misma elipsis ordinal del hebreo para conservar el estilo conciso de genealogía/lista.
theological_decisions:
- issue: Estructura elíptica de la lista genealógica
  english_pob_reading: 'English may also render the ordinals with an implied verb: ''Amariah was the second,'' etc.'
  chosen_spanish_reading: 'Los ordinales quedan como sintagmas breves: ''el segundo'', ''el tercero'', ''el cuarto''.'
  alternative_spanish_readings:
  - Amarías era el segundo
  - Jazael era el tercero
  - Jecamam era el cuarto
  rationale: El hebreo no expresa explícitamente el verbo 'ser'; por fidelidad al estilo listario, la traducción principal conserva la elipsis. La lectura con verbo queda como alternativa válida en nota.
  doctrine_reference: Ninguno; se trata de sintaxis genealógica, no de una afirmación doctrinal.
translation_notes:
  revision_awareness: Se revisó la opción inglesa y su nota sobre sintaxis elíptica. No se detectaron revisiones textuales; la principal decisión para el español fue cómo verter de forma natural los nombres propios y conservar la lista ordinal sin añadir un verbo no expresado en el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la continuidad genealógica.
  - Se usa 'hijos de' como fórmula genealógica estándar y transparente.
  - Los nombres propios se adaptan a grafía española sin desplazar el contenido léxico del hebreo.
  - Se conserva la secuencia ordinal con artículo para reproducir la elipsis del original.
  - No se introduce terminología teológica ajena al contexto del versículo.
