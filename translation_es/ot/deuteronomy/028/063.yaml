review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa del hebreo, conserva Yahvé para יְהוָה y mantiene correctamente la tensión teológica de que Yahvé ''se alegrará'' también en el juicio. También transmite adecuadamente los dos verbos de destrucción y la expulsión de la tierra. Sin embargo, hay dos fallas de fidelidad/forma: ''se alegró sobre ustedes / se alegrará sobre ustedes'' calca de manera poco natural עֲלֵיכֶם; en español debe expresarse mejor como ''se alegró por ustedes / se alegrará por ustedes''. Además, la nota [a] está mal anclada y no corresponde al lugar ni al tipo de nota del audit trail inglés; la nota necesaria es la del singular hebreo en la cláusula final.'
  spanish_quality_summary: 'El español es en general claro y digno, pero tiene dos puntos mejorables: ''se alegró sobre ustedes'' suena poco idiomático, y ''que van a entrar a poseer'' es menos natural que ''en la cual estás por entrar para poseerla'' o equivalente. Dado que el hebreo cambia a singular al final, conviene preservarlo en el texto español si es posible, en vez de normalizarlo al plural, ya que el español sí puede hacerlo con claridad mediante una nota.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay conflictos con términos doctrinales mayores. La preservación de ''aniquilar'' para וּלְהַשְׁמִיד es aceptable y coherente con el audit trail. La decisión principal a corregir es estilística-sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: ''se alegró sobre ustedes / se alegrará sobre ustedes'''
    rationale: Aunque עַל puede motivar literalmente 'sobre', en español esa construcción resulta forzada. 'Se alegró por ustedes' conserva el sentido de regocijo respecto de ellos sin sonar a calco.
  - severity: medium
    issue: La nota [a] no preserva la documentación relevante del audit trail
    rationale: La nota inglesa documenta el singular hebreo en la cláusula final. El borrador añade en cambio una nota teológica redundante y la ancla en 'aniquilarlos', donde no corresponde.
  - severity: low
    issue: Normalización al plural en la cláusula final pierde un matiz formal preservable
    rationale: El hebreo usa singular en 'que tú entras allí para poseerla', dirigido a Israel como un solo pueblo. El español puede conservar ese singular con naturalidad y explicarlo en nota.
  revised_spanish_text: Y sucederá que, así como Yahvé se alegró por ustedes para hacerles bien y multiplicarlos, así Yahvé se alegrará por ustedes para destruirlos y aniquilarlos; y serán arrancados de la tierra en la cual estás[a] por entrar para poseerla.
  revised_footnotes:
  - marker: a
    text: El hebreo usa singular en 'estás ... entrar' al dirigirse a Israel como un solo pueblo.
    reason: cultural_note
  revision_rationale: Se corrigió el calco poco natural 'sobre ustedes' por 'por ustedes', se eliminó una nota teológica innecesaria y se restituyó la nota relevante sobre el singular hebreo en la cláusula final. También se ajustó la cláusula de entrada/posesión para que el español suene natural y a la vez preserve el cambio intencional del hebreo al singular colectivo.
