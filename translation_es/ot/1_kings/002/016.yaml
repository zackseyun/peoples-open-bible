translation:
  language: es
  text: 'Y ahora te hago una petición: no apartes mi rostro[a]. Y ella le dijo: «Habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «no apartes mi rostro» conserva la imagen del original; su sentido idiomático es «no me rechaces» o «no me niegues lo que pido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la conexión discursiva de וְ y el valor temporal/inmediato de עַתָּה con una fórmula natural en español.
- source_word: שְׁאֵלָה אַחַת
  english_pob_choice: one request
  chosen_spanish: una sola cosa
  alternatives_spanish:
  - una petición
  - una solicitud
  lexicon: HALOT
  rationale: El hebreo expresa una única petición; en español, «una sola cosa» mantiene el énfasis cuantitativo y suena natural en el flujo de la frase. El contexto permite entender que se trata de una petición concreta.
- source_word: אָנֹכִי שֹׁאֵל מֵאִתָּךְ
  english_pob_choice: I am asking of you
  chosen_spanish: te pido
  alternatives_spanish:
  - estoy pidiéndote
  - te estoy pidiendo
  lexicon: HALOT
  rationale: El participio con pronombre independiente comunica una solicitud presente e inmediata. En español, «te pido» transmite esa fuerza sin resultar forzado.
- source_word: אַל תָּשִׁבִי אֶת פָּנַי
  english_pob_choice: do not turn away my face
  chosen_spanish: no apartes mi rostro
  alternatives_spanish:
  - no rechaces mi petición
  - no me niegues
  - no apartes tu rostro de mí
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de «rostro» para no borrar la metáfora auditada por la POB inglesa. «No apartes mi rostro» comunica el giro idiomático de no rechazar la solicitud, con una formulación más natural en español que una calca literal de «volver/torcer el rostro».
- source_word: וַתֹּאמֶר אֵלָיו
  english_pob_choice: And she said to him
  chosen_spanish: Y ella le dijo
  alternatives_spanish:
  - Entonces ella le dijo
  lexicon: HALOT
  rationale: La secuencia narrativa wayyiqtol se vierte con la fórmula normal y clara del relato en español.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dímelo
  lexicon: HALOT
  rationale: El imperativo responde a la invitación a expresar la petición. «Habla» conserva concisión y dignidad, y funciona bien en el registro narrativo.
translation_notes:
  revision_awareness: Se siguió el marco de la POB inglesa sin cambios sustantivos respecto del audit trail; se conservó la metáfora de «rostro» por auditabilidad, pero se ajustó la sintaxis al español para evitar una calca dura. No se documentaron revisiones textuales adicionales en el expediente provisto.
  spanish_consistency_notes:
  - «Y ahora» mantiene la función discursiva de transición.
  - «Te pido» expresa la solicitud inmediata sin sobreformalizar el hebreo.
  - Se preserva «rostro» como imagen hebrea central, con nota explicativa para su sentido idiomático.
  - Se usa el tuteo coherente con la segunda persona singular femenina del hebreo en esta escena.
  - El diálogo se cierra con comillas españolas y puntuación estándar del español.
