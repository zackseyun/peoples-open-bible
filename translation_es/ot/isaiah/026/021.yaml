base_translation:
  language: en
  yaml_path: translation/ot/isaiah/026/021.yaml
  text: For behold[a], Yahweh is coming out from his place to punish the iniquity of the inhabitant of the earth upon him[c][b], and the earth will uncover her blood and will no longer cover her slain.
  footnotes:
  - marker: a
    text: Or 'to call to account the iniquity of the inhabitant of the earth against him.' The Hebrew expression is compact and can be rendered more formally than the main text.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her bloods,' a plural form that can denote bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: c
    text: '''Earth'' may also be rendered ''land'' in Hebrew, but the broader judgment context favors ''earth'' here.'
    reason: lexical_alternative
