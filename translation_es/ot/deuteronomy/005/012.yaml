translation:
  language: es
  text: Guarda el día de sábado[a], para santificarlo, como Yahvé tu Dios te mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Observa el día de sábado» o «Guarda el sábado». El verbo hebreo enfatiza una observancia cuidadosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר
  english_pob_choice: Observe
  chosen_spanish: Guarda
  alternatives_spanish:
  - Observa
  - Vela por
  lexicon: HALOT
  rationale: El hebreo usa un imperativo con matiz de atención cuidadosa y vigilancia del mandato. En español, «guarda» comunica bien esa idea de custodiar y observar con fidelidad, sin perder la fuerza exhortativa del texto.
- source_word: יוֹם הַשַׁבָּת
  english_pob_choice: the Sabbath day
  chosen_spanish: el día de reposo
  alternatives_spanish:
  - el día de sábado
  - el sábado
  lexicon: HALOT
  rationale: La expresión hebrea designa el día concreto apartado para reposo sagrado. «Día de reposo» es natural en español bíblico amplio y conserva la referencia al día sin reducirlo solo al nombre del día de la semana.
- source_word: לְקַדְּשׁוֹ
  english_pob_choice: to keep it holy
  chosen_spanish: para santificarlo
  alternatives_spanish:
  - para hacerlo santo
  - para guardarlo santo
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo expresa finalidad: tratar el día como santo, apartado para Dios. «Santificarlo» conserva mejor el valor verbal y el matiz cultual del hebreo que una frase más interpretativa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La POB inglesa documenta la transliteración del nombre divino. En español, «Yahvé» es la forma corriente y reconocible para ese mismo nombre, manteniendo la decisión de no sustituirlo por un título como «Señor».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona singular se expresa de manera directa como «tu Dios», conservando el tono pactual del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión doctrinal de preservar el nombre propio de Dios en vez de reemplazarlo por una sustitución reverencial. En español, «Yahvé» comunica claramente esa elección y evita la pérdida del nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor imperativo de שָׁמוֹר y relación con la observancia del sábado
  english_pob_reading: Observe / Keep / Guard
  chosen_spanish_reading: Guarda
  alternative_spanish_readings:
  - Observa
  - Guarda con cuidado
  rationale: La tensión entre observar, guardar y velar por el mandato se conserva en español con «guarda», que puede abarcar vigilancia y obediencia concreta sin debilitar el aspecto normativo del verbo hebreo.
  doctrine_reference: HALOT; Deuteronomy 5:12 parallel with Exodus 20:8
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente. La versión inglesa más reciente quedó sin cambios, con acuerdo alto en la revisión cruzada; por ello la presente propuesta sigue de cerca las decisiones auditadas y solo las adapta al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para el nombre divino.
  - «Día de reposo» refleja el sentido funcional de יוֹם הַשַׁבָּת sin introducir términos eclesiásticos ajenos al hebreo.
  - «Santificarlo» conserva el infinitivo de propósito y evita una paráfrasis excesiva.
  - La nota a pie de página recoge las alternativas léxicas documentadas en la POB inglesa y las expresa en español con el mismo valor auditado.
