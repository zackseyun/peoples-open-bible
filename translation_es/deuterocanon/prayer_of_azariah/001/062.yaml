translation:
  language: es
  text: Bendecid[a] al Señor, esclavos[b]; cantadle alabanzas y enaltecedlo grandemente para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabad». εὐλογεῖτε puede expresar bendecir o alabar; aquí se conserva «bendecid» para mantener el matiz tradicional de dirigir palabra de adoración a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «siervos» o «siervos esclavos». δοῦλοι puede denotar servidores en general o personas en condición de esclavitud; el texto principal conserva el sentido más fuerte.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «por los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendecid alabar
  lexicon: BDAG
  rationale: Imperativo plural de εὐλογέω. En este llamado litúrgico, «bendecid» conserva bien la idea de dirigir palabra de alabanza a Dios y suena natural en español reverente.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: δοῦλοι puede significar «siervos» o «esclavos», pero el contexto de pertenencia total al Señor favorece el sentido fuerte. Se mantiene «esclavos» para no suavizar el matiz léxico.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: κύριος funciona aquí como título divino en doxología; «el Señor» preserva ese valor y corresponde al uso bíblico español sin rebajarlo a «maestro».
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantad alabanzas
  alternatives_spanish:
  - hymnad
  - alabad cantando
  lexicon: BDAG
  rationale: ὑμνέω implica cantar un himno o alabanza. «Cantad alabanzas» comunica el matiz musical de forma natural en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: enaltecedlo grandemente
  alternatives_spanish:
  - exaltadlo sobremanera
  - levantadlo en gran manera
  lexicon: BDAG
  rationale: El compuesto intensifica la exaltación. «Enaltecedlo grandemente» conserva la elevación y el grado de intensidad sin sonar forzado.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega significa duración indefinida, literalmente «para los siglos». Se conserva la forma más cercana al griego en español, sin perder inteligibilidad.
theological_decisions:
- issue: La traducción de δοῦλοι en un llamado de adoración dirigido a quienes pertenecen al Señor
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - siervos esclavos
  rationale: La lectura POB mantiene el valor fuerte de pertenencia vinculada a δοῦλος. En español, «esclavos» preserva mejor esa tensión teológica y evita neutralizarla con un término más suave.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος; filosofía de traducción §1'
- issue: La fórmula temporal εἰς τοὺς αἰῶνας
  english_pob_reading: forever
  chosen_spanish_reading: por los siglos
  alternative_spanish_readings:
  - para siempre
  - por los siglos de los siglos
  rationale: La decisión inglesa opta por «forever» como equivalente idiomático, pero el griego conserva literalmente la imagen de «los siglos». En español se retiene esa huella sin oscurecer el sentido durativo.
  doctrine_reference: BDAG, εἰς τοὺς αἰῶνας; criterio de equivalencia óptima para fórmulas doxológicas
translation_notes:
  revision_awareness: El auditoría inglesa muestra una oscilación entre «slaves» y «servants», con restitución final de «slaves» por la política doctrinal del proyecto. La versión española sigue la lectura restaurada y documenta la alternativa más suave sin adoptarla en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «el Señor» como equivalente de κύριος en un contexto doxológico.
  - Se conserva «esclavos» para δοῦλοι por coherencia con la política del proyecto y el matiz de pertenencia total.
  - La fórmula final «por los siglos» intenta reflejar el griego mientras sigue siendo clara para lectores de español.
  - El tono general es litúrgico y directo, sin paráfrasis añadidas.
