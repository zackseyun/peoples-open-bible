translation:
  language: es
  text: Y no se celebró en Israel un Pascua [a] como esta desde los días de Samuel el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pascua» en sentido de la celebración pascual; el griego τὸ πάσχα puede referirse a la fiesta misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤχθη
  english_pob_choice: had been held
  chosen_spanish: se celebró
  alternatives_spanish:
  - se llevó a cabo
  - se realizó
  - se hizo
  lexicon: LSJ
  rationale: El pasivo de ἄγω en este contexto festivo es idiomático para la realización de una observancia. En español, "se celebró" comunica con naturalidad el acto cultual sin perder el valor de evento efectuado.
- source_word: τὸ πάσχα
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - la Pascua
  - el Pasover
  lexicon: LSJ
  rationale: Para el contexto bíblico-litúrgico en español, "Pascua" es la forma natural y reconocible. El artículo griego se integra de manera fluida en la sintaxis española.
- source_word: τοιοῦτο
  english_pob_choice: like this
  chosen_spanish: como esta
  alternatives_spanish:
  - así
  - semejante
  - tal
  lexicon: LSJ
  rationale: La comparación apunta a una Pascua singular e incomparable. "Como esta" conserva la deixis comparativa del griego en un español directo y claro.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - en medio de Israel
  lexicon: LSJ
  rationale: La frase marca el ámbito histórico-comunitario donde no se había celebrado una Pascua semejante. "En Israel" es la correspondencia más natural y fiel.
- source_word: ἀπὸ τῶν χρόνων
  english_pob_choice: since the days of
  chosen_spanish: desde los días de
  alternatives_spanish:
  - desde el tiempo de
  - a partir de los tiempos de
  lexicon: LSJ
  rationale: La locución temporal griega equivale de forma idiomática a "desde los días de" en narración histórica española, manteniendo la fuerza retrospectiva de ἀπό.
- source_word: Σαμουὴλ τοῦ προφήτου
  english_pob_choice: Samuel the prophet
  chosen_spanish: Samuel el profeta
  alternatives_spanish:
  - Samuel, el profeta
  - el profeta Samuel
  lexicon: LSJ
  rationale: El griego nombra explícitamente a Samuel con el título profético. Se conserva el orden más cercano al original para no diluir la referencia nominativa.
theological_decisions:
- issue: Comparación histórica con la tradición paralela hebrea
  english_pob_reading: since the days of Samuel the prophet
  chosen_spanish_reading: desde los días de Samuel el profeta
  alternative_spanish_readings:
  - desde el tiempo de Samuel el profeta
  - desde los días del profeta Samuel
  rationale: La traducción sigue el testimonio griego, que nombra a Samuel y establece la comparación temporal desde sus días. El paralelo hebreo sirve como control del contexto pascual, pero no debe sustituir la formulación griega aquí.
  doctrine_reference: Primacía de la fuente original sobre la tradición de traducción; los paralelos textuales se usan como apoyo, no como control cuando difieren.
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la palabra correspondiente. La redacción mantiene el anclaje al griego y evita imponer la formulación del paralelo hebreo.
  spanish_consistency_notes:
  - Se usa "Pascua" para πάσχα, conforme al uso bíblico estándar en español.
  - '"Se celebró" preserva el valor de evento cultual realizado, en línea con el pasivo idiomático griego.'
  - Se mantiene "Samuel el profeta" para respetar el título explícito del texto fuente.
  - El orden de la cláusula reproduce de cerca la estructura comparativa del griego sin sonar artificial en español.
