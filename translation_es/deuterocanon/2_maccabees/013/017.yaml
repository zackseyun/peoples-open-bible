revisions:
- from: Y cuando el día ya comenzaba a despuntar[a], esto había sucedido, porque la protección del Señor había acudido pronto en su ayuda.
  to: Y cuando el día ya comenzaba a despuntar[a], esto había sucedido, porque el amparo de Yahvé vino pronto en su ayuda.
  rationale: Se ajusta κύριος al estándar del proyecto («Yahvé») y se reemplaza la formulación poco natural «la protección ... había acudido pronto» por una construcción más idiomática en español que conserva la causalidad del griego y el sentido de auxilio protector oportuno. La nota se suaviza para sonar natural en español y mantener la alternativa léxica documentada.
