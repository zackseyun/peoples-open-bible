translation:
  language: es
  text: Y[a], al quitar la gratitud no solo de los hombres, sino también al ensoberbecerse con los alardes de los que son sumamente buenos[b], suponen que escaparán al juicio[c] de Dios, que siempre contempla todas las cosas y aborrece el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La conjunción inicial corresponde al giro griego que enlaza esta frase con el contexto anterior; el sentido es continuativo.
    reason: source_note
  - marker: b
    text: La expresión griega detrás de «los que son sumamente buenos» es difícil en la forma transmitida; probablemente alude a personas consideradas excepcionalmente buenas o nobles.
    reason: textual_variant
  - marker: c
    text: O «justicia» o «castigo». El griego δίκην puede llevar un matiz tanto judicial como punitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστίαν
  english_pob_choice: gratitude
  chosen_spanish: gratitud
  alternatives_spanish:
  - acción de gracias
  - agradecimiento
  lexicon: LSJ
  rationale: El sustantivo expresa la cualidad abstracta de dar gracias; «gratitud» conserva mejor el objeto directo de «quitan» que una fórmula más litúrgica o verbalizada.
- source_word: ἀνταναιροῦντες
  english_pob_choice: taking away
  chosen_spanish: quitan
  alternatives_spanish:
  - apartan
  - quitan de en medio
  - remueven
  lexicon: LSJ
  rationale: El participio indica privar o quitar. «Quitan» es breve, natural y suficientemente concreto para no cargarlo con una violencia que el contexto no exige.
- source_word: κόμποις
  english_pob_choice: boasts
  chosen_spanish: alardes
  alternatives_spanish:
  - jactancias
  - vanaglorias
  - boatos
  lexicon: LSJ
  rationale: κόμπος puede denotar jactancia o arrogante ostentación. «Alardes» comunica el matiz de exhibición orgullosa de manera clara en español actual.
- source_word: ἐπαρθέντες
  english_pob_choice: being puffed up
  chosen_spanish: al ensoberbecerse
  alternatives_spanish:
  - al hincharse de orgullo
  - al envanecerse
  - al ser inflados de orgullo
  lexicon: LSJ
  rationale: El pasivo sugiere ser elevado en orgullo. «Ensoberbecerse» expresa bien la elevación moral negativa sin sonar tan coloquial como «puff up».
- source_word: ἀπεράγἀθων
  english_pob_choice: those who are exceedingly good
  chosen_spanish: los que son sumamente buenos
  alternatives_spanish:
  - los sumamente buenos
  - los muy nobles
  - los considerados excelentísimos
  lexicon: LSJ
  rationale: La forma transmitida es difícil; el POB inglés la entiende como personas tenidas por excepcionalmente buenas o nobles. La traducción conserva esa tensión sin normalizarla indebidamente.
- source_word: κατοπτεύοντος
  english_pob_choice: who always sees all things
  chosen_spanish: que siempre contempla todas las cosas
  alternatives_spanish:
  - que observa todas las cosas
  - que mira siempre todo
  - que vigila todas las cosas
  lexicon: LSJ
  rationale: El participio indica observar o mirar atentamente. «Contempla» mantiene un registro digno y, con «siempre», recoge el alcance universal del griego.
- source_word: μισοπόνηρον
  english_pob_choice: hates evil
  chosen_spanish: aborrece el mal
  alternatives_spanish:
  - odia el mal
  - es enemigo del mal
  - detesta el mal
  lexicon: LSJ
  rationale: El adjetivo significa literalmente «que odia el mal». «Aborrece el mal» preserva la fuerza moral y suena natural en español bíblico contemporáneo.
- source_word: δίκην
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - justicia
  - pena
  - castigo
  lexicon: LSJ
  rationale: En este contexto se trata de una retribución judicial. «Juicio» conserva la amplitud de sentido sin cerrar prematuramente a solo castigo o solo justicia.
theological_decisions:
- issue: Descripción de Dios como omnisciente y moralmente opuesto al mal
  english_pob_reading: the God who always sees all things and hates evil
  chosen_spanish_reading: Dios, que siempre contempla todas las cosas y aborrece el mal
  alternative_spanish_readings:
  - Dios, que todo lo ve y odia el mal
  - Dios, el que observa todo y es enemigo del mal
  rationale: La frase griega acumula atributos divinos de vigilancia total y rechazo moral del mal. La versión española conserva ambos rasgos sin imponer terminología doctrinal externa ni suavizar la tensión ética.
  doctrine_reference: 'Mantener el perfil teológico del texto: omnisciencia divina y oposición activa al mal.'
- issue: Valor del término δίκην en la cláusula final
  english_pob_reading: escape the judgment
  chosen_spanish_reading: escaparán al juicio
  alternative_spanish_readings:
  - escaparán al castigo
  - escaparán a la justicia
  - evitarán la pena
  rationale: El griego permite tanto juicio como castigo. «Juicio» deja abierta la ambigüedad judicial y punitiva que el POB inglés preserva con su nota.
  doctrine_reference: Preservar la tensión entre sentencia judicial y sanción punitiva sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se revisó el rastro de auditoría inglés y la forma griega. La decisión principal fue mantener la ambigüedad de δίκην con «juicio», y traducir la frase difícil ἀπεράγἀθων sin normalizarla más allá de lo que permite el POB inglés. No se siguieron ciegamente las soluciones inglesas: se reexpresaron en español con sintaxis natural y se preservó el tono teológico del pasaje.'
  spanish_consistency_notes:
  - Se emplea «Dios» para θεοῦ, coherente con el proyecto.
  - Se evitó «SEÑOR» porque el texto no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió un español bíblico moderno y digno, con vocabulario transparente y sin arcaísmos innecesarios.
  - Se mantuvo «juicio» para δίκην y no se cerró la posible lectura punitiva, conforme al audit trail inglés.
