  text: וְ/כִֽי יָמ֣וּךְ אָחִ֔י/ךָ וּ/מָ֥טָה יָד֖/וֹ עִמָּ֑/ךְ וְ/הֶֽחֱזַ֣קְתָּ בּ֔/וֹ גֵּ֧ר וְ/תוֹשָׁ֛ב וָ/חַ֖י עִמָּֽ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/035.yaml
  text: If your brother becomes poor and his hand falters with you[a], then you shall support him[b]; he shall live with you as a resident foreigner or a temporary resident.
  footnotes:
  - marker: a
    text: Or, 'support him—the resident foreigner and the temporary resident'; the Hebrew phrase 'resident foreigner and temporary resident' is syntactically compressed and may be understood differently.
    reason: alternative_reading
  - marker: b
    text: Literally, 'his hand falters with you,' an idiom for losing means or becoming unable to support himself.
    reason: lexical_alternative
