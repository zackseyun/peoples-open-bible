base_translation:
  language: en
  yaml_path: translation/ot/judges/006/027.yaml
  text: So Gideon took ten men from among his servants and did as Yahweh had spoken to him. But because he feared his father's household and the men of the city too much to do it by day[a], he did it at night.
  footnotes:
