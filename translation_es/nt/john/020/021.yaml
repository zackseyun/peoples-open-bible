translation:
  language: es
  text: 'Entonces Jesús les dijo otra vez[a]: «Paz a ustedes. Como el Padre me ha enviado, así también yo los envío a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «La paz sea con ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Pues
  lexicon: BDAG
  rationale: Expresa la continuación narrativa y la inferencia suave del contexto anterior sin volver rígido el flujo del diálogo. 'Entonces' es natural en español y conserva el valor conectivo de οὖν.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Indica repetición de la misma despedida/saludo de Jesús. 'Otra vez' es claro, idiomático y mantiene la repetición explícita del griego.
- source_word: Εἰρήνη ὑμῖν
  english_pob_choice: Peace to you
  chosen_spanish: Paz a ustedes
  alternatives_spanish:
  - La paz sea con ustedes
  - Paz con ustedes
  lexicon: BDAG
  rationale: El griego es una expresión breve y sin verbo; 'Paz a ustedes' reproduce esa concisión. Se evita imponer la forma tradicional con verbo, aunque sigue siendo una alternativa válida y más litúrgica.
- source_word: καθὼς
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: BDAG
  rationale: Introduce la comparación entre el envío del Padre y el de Jesús. 'Como' conserva la relación comparativa de manera directa y natural en español.
- source_word: ἀπέσταλκέν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  - ha mandado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con relevancia vigente; en español, 'ha enviado' comunica mejor esa anterioridad con efecto presente que un simple pretérito.
- source_word: πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  - mi Padre
  lexicon: BDAG
  rationale: Se conserva el sustantivo articulado del texto griego. No se añade posesivo porque el griego no lo expresa de forma explícita aquí, y la formulación joánica funciona bien como título relacional.
- source_word: κἀγὼ
  english_pob_choice: even so I
  chosen_spanish: así también yo
  alternatives_spanish:
  - yo también
  - de la misma manera yo
  lexicon: BDAG
  rationale: La crasis añade correspondencia enfática con la comparación anterior. 'Así también yo' refleja esa simetría mejor que un simple 'yo también', que podría sonar meramente aditivo.
- source_word: πέμπω
  english_pob_choice: am sending
  chosen_spanish: los envío
  alternatives_spanish:
  - estoy enviando
  - envío
  lexicon: BDAG
  rationale: El presente griego en contexto de comisión expresa una acción actual y solemne. En español, el presente simple 'los envío' resulta natural y no pierde la fuerza inmediata del encargo; se evita una perífrasis menos idiomática.
theological_decisions:
- issue: Relación entre el envío del Padre y el envío de Jesús a los discípulos
  english_pob_reading: 'Rendered the comparison without expanding it into an ontological or sacramental statement: ''As the Father has sent me, even so I am sending you.'''
  chosen_spanish_reading: 'Se conserva la comparación de misión sin ampliarla a una afirmación ontológica o sacramental: «Como el Padre me ha enviado, así también yo los envío a ustedes».'
  alternative_spanish_readings:
  - Como el Padre me envió, así yo también los envío
  - Tal como el Padre me ha enviado, así os envío
  rationale: El griego presenta una analogía de envío y comisión. La traducción debe mantener esa tensión teológica sin añadir conclusiones sobre identidad, autoridad o mediación que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al borrador inglés; el pasaje mantiene alta concordancia con el audit trail y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene 'Padre' como título relacional sin posesivo añadido, en línea con el griego articular.
  - Se usa 'ha enviado' para reflejar el perfecto griego, y 'los envío' para el presente de comisión inmediata.
  - Se conserva 'Paz a ustedes' como forma breve y textual; la nota recoge la alternativa tradicional más litúrgica.
  - Se evita 'Cristo' porque el texto griego usa Ἰησοῦς, y el nombre propio 'Jesús' es el equivalente directo.
