  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: la asamblea apedrea, luego hiere con espadas, mata a los hijos e hijas y quema las casas. Sin embargo, falla en un punto importante de alineación: los pronombres hebreos son femeninos plurales y el español usa repetidamente «los», lo que altera el referente de las dos mujeres de la alegoría. Además, «derribará» suaviza y desvía el sentido de וּבָרֵא en contexto de violencia con espada; conviene una forma más cercana a «cortará»/«despedazará».'
  spanish_quality_summary: El español es legible, pero hay un problema gramatical-discursivo con el género de los pronombres. «La asamblea» con verbo singular es correcto como colectivo. «Apedreará con piedras» y «quemarán sus casas con fuego» son naturales en registro bíblico moderno. La nota actual necesita ajuste de estilo y de concordancia con el texto revisado.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. La principal cuestión léxica es mantener el valor femenino plural de los pronombres y una traducción más fiel de ברא en piel. «Asamblea», «apedrear», «matarán», «casas» y «con fuego» están bien alineados.
  issues:
  - severity: high
    issue: Pronombres masculinos «los» en lugar de femeninos
    rationale: El hebreo tiene pronombres femeninos plurales (עֲלֵיהֶן / אוֹתְהֶן) referidos a las dos mujeres alegóricas. Cambiarlos a masculino altera el referente y no preserva la cohesión del original.
  - severity: medium
    issue: «Derribará» no representa bien וּבָרֵא en este contexto
    rationale: El verbo en piel aquí tiene sentido de cortar, hendir o hacer pedazos con espada. «Derribar» puede sonar demasiado general o como tumbar, y debilita la violencia específica del original y de la auditoría inglesa.
  - severity: low
    issue: Nota al pie formulada de manera poco natural y con glosa base imprecisa
    rationale: 'La nota dice «Hebreo: “derribará”», pero la función de la nota es ofrecer alternativas léxicas al verbo revisado, no reafirmar una opción menos fiel. Conviene reformularla con alternativas claras en español.'
  revised_spanish_text: Y la asamblea las apedreará con piedras y las cortará[a] con sus espadas. Matarán a sus hijos y a sus hijas, y quemarán sus casas con fuego.
  revised_footnotes:
