translation:
  language: es
  text: Aléjate de la presencia de un hombre insensato[a], porque no percibes labios de sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Aléjate de un hombre insensato, porque no hallarás allí palabras de conocimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Apártate
  alternatives_spanish:
  - Ve
  - Aléjate
  - Sal
  lexicon: HALOT
  rationale: El imperativo expresa una acción inmediata. En español, «apártate» comunica con naturalidad la idea de retirarse de alguien, y encaja con la relación espacial de la línea. «Ve» sería más literal pero menos preciso aquí; «aléjate» también es posible, pero «apártate» conserva mejor la idea de ponerse fuera del alcance o del trato.
- source_word: מִנֶּגֶד
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de en frente de
  - de ante
  lexicon: HALOT
  rationale: La expresión hebrea indica estar delante o frente a alguien, y en contexto puede significar retirarse de su presencia. «De la presencia de» preserva esa imagen espacial y sigue de cerca la decisión auditada en inglés, sin reducirla de manera excesiva a un simple movimiento físico.
- source_word: לְאִישׁ כְּסִיל
  english_pob_choice: a foolish man
  chosen_spanish: un hombre insensato
  alternatives_spanish:
  - un necio
  - un hombre necio
  - un insensato
  lexicon: HALOT
  rationale: Se conserva אִישׁ como «hombre», en línea con el criterio de mantener la referencia masculina del hebreo cuando está explícita. כְּסִיל en la literatura sapiencial es el término técnico para el necio; «insensato» transmite bien la categoría moral y sapiencial sin sonar excesivamente coloquial. «Necio» también sería viable, pero «insensato» resulta más transparente en español moderno.
- source_word: וּבַל
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - y no
  lexicon: HALOT
  rationale: La partícula negativa funciona aquí de modo explicativo-causal. «Porque» expresa con claridad la razón del mandato y evita un calco como «y no» que sonaría torpe en español.
- source_word: יָדַעְתָּ
  english_pob_choice: you do not perceive
  chosen_spanish: no percibes
  alternatives_spanish:
  - no has conocido
  - no sabes
  - no adviertes
  lexicon: HALOT
  rationale: El valor proverbial apunta a la falta de reconocimiento o aprehensión de lo que pudiera llamarse sabio en la խոսa del insensato. «Percibes» conserva esa dimensión de captación/descubrimiento mejor que un simple «sabes», y refleja la lectura auditada de la POB inglesa.
- source_word: שִׂפְתֵי דָעַת
  english_pob_choice: lips of knowledge
  chosen_spanish: labios de conocimiento
  alternatives_spanish:
  - palabras de conocimiento
  - habla de conocimiento
  - labios del saber
  lexicon: HALOT
  rationale: Se retiene la imagen literal de «labios», muy propia del hebreo sapiencial para hablar de la expresión verbal. «Conocimiento» traduce דָעַת de manera directa; «del saber» también sería posible, pero «de conocimiento» mantiene la correspondencia semántica de forma más inmediata.
translation_notes:
  revision_awareness: 'La versión inglesa auditada opta por una equivalencia óptima: conserva la imagen de «presence» y «lips of knowledge», pero hace la cláusula causal más idiomática. La propuesta española sigue esa misma línea, manteniendo la metáfora sapiencial y el matiz de retirada de la presencia del necio, sin forzar un calco sintáctico.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo proverbial breve y directo.
  - Se conserva «hombre» para אִישׁ y no se neutraliza a «persona».
  - Se preserva la metáfora de los «labios» en vez de sustituirla por una paráfrasis más abstracta.
  - La nota recoge la alternativa interpretativa donde el objeto implícito puede entenderse como el habla del insensato, no solo su presencia física.
