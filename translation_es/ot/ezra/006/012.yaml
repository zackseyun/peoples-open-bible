translation:
  language: es
  text: Y que el Dios que ha hecho que su nombre more allí[a] derribe a cualquier rey o pueblo que extienda su mano para cambiar esto, para destruir esta casa de Dios que está en Jerusalén. Yo, Darío, he promulgado un decreto; que se cumpla con toda diligencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ha puesto allí su nombre”. El arameísmo expresa la identificación pactal de Dios con el templo como el lugar asociado a su nombre.
    reason: lexical_alternative
  - marker: b
    text: O “rápidamente”. El adverbio puede destacar tanto la prontitud como la diligencia en la ejecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁכִּן שְׁמֵהּ תַּמָּה
  english_pob_choice: has caused his name to dwell there
  chosen_spanish: ha hecho morar allí su nombre
  alternatives_spanish:
  - ha puesto su nombre allí
  - ha establecido su nombre allí
  lexicon: HALOT
  rationale: Conserva el idiomatismo arameo de la “casa/nombre” sin reducirlo a mera presencia u propiedad. “Ha hecho morar” comunica la acción causativa y mantiene la asociación pactal del templo con el nombre de Dios.
- source_word: יְמַגַּר
  english_pob_choice: overthrow
  chosen_spanish: derribe
  alternatives_spanish:
  - destruya
  - derroque
  lexicon: HALOT
  rationale: El verbo expresa abatir o derribar en sentido de juicio. “Derribe” reproduce bien la fuerza de condena en español sin suponer necesariamente un matiz militar más específico que el del arameo.
- source_word: כָּל מֶלֶךְ וְעַם
  english_pob_choice: any king or people
  chosen_spanish: cualquier rey o pueblo
  alternatives_spanish:
  - todo rey y pueblo
  - cualquier rey y cualquier pueblo
  lexicon: HALOT
  rationale: La expresión es distributiva y general. “Cualquier rey o pueblo” comunica mejor la amplitud indefinida del juramento/deseo real que una coordinación más literal pero menos natural.
- source_word: יִשְׁלַח יְדֵהּ
  english_pob_choice: stretches out his hand
  chosen_spanish: extienda su mano
  alternatives_spanish:
  - alargue su mano
  - ponga su mano
  lexicon: HALOT
  rationale: Es un hebraísmo/arameísmo para emprender una acción hostil o intervenir contra algo. “Extienda su mano” conserva la imagen corporal del original y su valor idiomático.
- source_word: לְהַשְׁנָיָה
  english_pob_choice: to alter this
  chosen_spanish: para cambiar esto
  alternatives_spanish:
  - para alterar esto
  - para modificar esto
  lexicon: HALOT
  rationale: El infinitivo señala cambiar o alterar lo establecido. “Cambiar” es claro y fiel en español; “alterar” sería más técnico, pero menos natural para lectura pública.
- source_word: לְחַבָּלָה בֵּית אֱלָהָא
  english_pob_choice: to destroy this house of God
  chosen_spanish: para destruir esta casa de Dios
  alternatives_spanish:
  - para arruinar esta casa de Dios
  - para dañar esta casa de Dios
  lexicon: HALOT
  rationale: El término apunta a ruina grave o destrucción. “Casa de Dios” preserva el lenguaje del texto y evita sustituirlo por “templo” como interpretación explicativa innecesaria.
- source_word: דֵךְ
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esa
  - aquella
  lexicon: HALOT
  rationale: El demostrativo es específico y deíctico; “esta” refleja la cercanía textual del objeto señalado en el discurso del rey.
- source_word: שָׂמֶת טְעֵם
  english_pob_choice: have issued a decree
  chosen_spanish: he promulgado un decreto
  alternatives_spanish:
  - he emitido un decreto
  - he dado un decreto
  lexicon: HALOT
  rationale: Es una fórmula administrativa regia. “Promulgado” conserva la oficialidad y la fuerza normativa mejor que opciones más coloquiales.
- source_word: אָסְפַּרְנָא
  english_pob_choice: with all diligence
  chosen_spanish: con toda diligencia
  alternatives_spanish:
  - rápidamente
  - sin demora
  lexicon: HALOT
  rationale: El adverbio combina prontitud e intensidad en la ejecución. “Con toda diligencia” reproduce bien esa mezcla de rapidez y cuidado requerida por el contexto.
- source_word: יִתְעֲבִד
  english_pob_choice: let it be done
  chosen_spanish: que se cumpla
  alternatives_spanish:
  - que se haga
  - que sea hecho
  lexicon: HALOT
  rationale: La forma jussiva final pide ejecución efectiva del decreto. “Que se cumpla” comunica bien la obligación de llevarlo a cabo en español administrativo y bíblico.
theological_decisions:
- issue: La expresión sobre el nombre de Dios en el templo
  english_pob_reading: Retain the idiom 'has caused his name to dwell there' rather than paraphrasing it as mere ownership or presence
  chosen_spanish_reading: ha hecho morar allí su nombre
  alternative_spanish_readings:
  - ha puesto su nombre allí
  - ha establecido su nombre allí
  rationale: La frase mantiene la teología bíblica del nombre asociado al lugar de culto sin implicar que Dios esté confinado espacialmente. “Morar” preserva el valor cultual y pactal del original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y la valoración de alta concordancia sin revisiones textuales pendientes; la versión española conserva el idiomatismo del nombre divino, la fuerza jurídica del decreto y el matiz de ejecución urgente sin suavizar el tono de juicio.
  spanish_consistency_notes:
  - Se mantiene “Dios” para אֱלֹהִים y “casa de Dios” para בֵּית אֱלָהָא, conforme al registro bíblico y la terminología del POB.
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - “Mesías/Cristo” no aplica en este versículo.
  - Se conserva un español público y sobrio, evitando calcos innecesarios pero sin expandir el sentido más allá de la evidencia textual.
  - Las notas al pie usan marcadores únicos y corresponden a las alternativas relevantes preservadas por el POB en inglés.
