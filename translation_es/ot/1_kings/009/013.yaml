translation:
  language: es
  text: 'Y dijo: «¿Qué son estas ciudades que me has dado, hermano mío?» Y las llamó la tierra de Cabul[a] hasta el día de hoy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cabul» probablemente es un nombre de lugar, pero el hebreo también puede insinuar un juego despectivo de palabras, quizá con el sentido de algo «sin valor» o «como atado/limitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What are
  chosen_spanish: ¿Qué son
  alternatives_spanish:
  - ¿Qué son estas?
  - ¿Por qué son
  lexicon: HALOT
  rationale: La pregunta exclamativa en hebreo expresa descontento o queja. «¿Qué son» conserva esa fuerza de evaluación sin añadir más explicación que el texto no da.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas urbes
  - estas poblaciones
  lexicon: HALOT
  rationale: עִיר puede ser ‘ciudad’ o ‘pueblo’; «ciudades» sigue el registro estándar y corresponde al plural con demostrativo.
- source_word: אֲשֶׁר נָתַתָּה לִּי
  english_pob_choice: that you have given me
  chosen_spanish: que me has dado
  alternatives_spanish:
  - que me diste
  lexicon: HALOT
  rationale: El perfecto en discurso directo puede reflejarse con presente perfecto en español para expresar una acción completada con relevancia presente. «Me has dado» mantiene naturalidad y fidelidad.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  lexicon: HALOT
  rationale: El sufijo posesivo es explícito. «Hermano mío» conserva el valor relacional y la fórmula diplomática del trato, con un tono algo más solemne en español.
- source_word: וַיִּקְרָא לָהֶם
  english_pob_choice: So he called them
  chosen_spanish: Y las llamó
  alternatives_spanish:
  - Y las nombró
  - Y llamó a esos lugares
  lexicon: HALOT
  rationale: קרא con ל puede significar ‘llamar’ o ‘dar nombre’. En español, «las llamó» es natural y deja abierta la designación que sigue.
- source_word: אֶרֶץ כָּבוּל
  english_pob_choice: the land of Cabul
  chosen_spanish: la tierra de Cabul
  alternatives_spanish:
  - el país de Cabul
  - la tierra de Kabul
  lexicon: HALOT
  rationale: אֶרֶץ es singular y suele traducirse como «tierra» en este tipo de fórmula. Se conserva «Cabul» como transliteración porque el texto lo presenta como nombre propio, sin imponer en el cuerpo principal el juego de palabras posible.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: La fórmula temporal narrativa se expresa de forma idiomática en español con «hasta hoy», que conserva la perspectiva del narrador.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente; no se detectaron alteraciones textuales ni decisiones corregidas que requirieran ajuste adicional en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un español sobrio y publicable, sin expandir la alusión irónica de Cabul al texto principal.
  - Se preservó la ambigüedad lexical de Cabul mediante nota, no mediante paráfrasis en la línea principal.
  - Se usó «la tierra de Cabul» para respetar la singularidad de אֶרֶץ y la forma narrativa del hebreo.
