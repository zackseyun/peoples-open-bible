theological_decisions:
- issue: Nature of the astronomical miracle
  chosen_reading: Render the text straightforwardly as describing the sun and moon stopping, without naturalizing or demythologizing the event.
  alternative_readings:
  - Render phenomenologically without implying an actual stoppage beyond human observation
  - Interpret as poetic citation only
  rationale: The narrative presents the event as extraordinary and ties it to a written source. The translation should preserve the text's claim without importing a modern scientific harmonization or reducing it to metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
