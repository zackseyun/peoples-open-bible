  glossary_alignment: Se respeta correctamente el término del proyecto 'Yahvé' para יְהוָה. No hay conflictos con otra terminología doctrinal principal. La elección 'anduvo en ellos' preserva bien la metáfora bíblica. La nota que explica el singular hebreo בָּהּ también está bien alineada con el rastro inglés.
