translation:
  language: es
  text: Y cuando el sacrificio había sido consumido, los sacerdotes y todos los demás ofrecieron oración, con Jonatán encabezando y los demás respondiendo, como en tiempos de Nehemías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con Jonatán comenzando y los demás clamando en respuesta, como hizo Nehemías». El griego está condensado al final del versículo, y la relación exacta de la comparación con Nehemías puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσευχὴν
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - una oración
  - plegaria
  lexicon: LSJ
  rationale: El sustantivo singular nombra aquí el acto litúrgico de orar. En español, «ofrecieron oración» conserva el valor formal sin volver la frase artificial.
- source_word: ἐποιήσαντο
  english_pob_choice: offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - hicieron
  - pronunciaron
  lexicon: LSJ
  rationale: Aunque literalmente significa «hicieron», en un contexto cultual español suena natural «ofrecieron oración», manteniendo el registro solemne y la idea de un acto realizado.
- source_word: δαπανωμένης
  english_pob_choice: had been consumed
  chosen_spanish: había sido consumido
  alternatives_spanish:
  - había sido gastado
  - había sido usado
  - había terminado
  lexicon: LSJ
  rationale: La forma pasiva pide una rendición que conserve la idea de gasto/consumo. «Había sido consumido» comunica bien que el sacrificio se había agotado por completo.
- source_word: τῆς θυσίας
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la ofrenda
  lexicon: LSJ
  rationale: En este contexto sacrificial, «sacrificio» es la equivalencia más directa y precisa para θυσία.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: LSJ
  rationale: ἱερεῖς designa a los sacerdotes del culto; «sacerdotes» es el equivalente natural y exacto en español.
- source_word: πάντες
  english_pob_choice: all the others
  chosen_spanish: todos los demás
  alternatives_spanish:
  - todos
  - todos los otros
  lexicon: LSJ
  rationale: Como el griego primero menciona a «los sacerdotes» y luego añade «todos», conviene explicitar que se amplía el grupo. «Todos los demás» evita ambigüedad y sigue la lógica del contexto.
- source_word: καταρχομένου
  english_pob_choice: leading
  chosen_spanish: encabezando
  alternatives_spanish:
  - guiando
  - tomando la iniciativa
  - dirigiendo
  lexicon: LSJ
  rationale: El participio sugiere iniciar la acción litúrgica. «Encabezando» mantiene la idea de ir al frente y de marcar el comienzo de la respuesta coral.
- source_word: Ἰωνάθον
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: LSJ
  rationale: Para el español bíblico, «Jonatán» es la forma habitual y plenamente inteligible del nombre.
- source_word: ἐπιφωνούντων
  english_pob_choice: responding
  chosen_spanish: respondiendo
  alternatives_spanish:
  - clamando en respuesta
  - contestando
  - acompañando con aclamaciones
  lexicon: LSJ
  rationale: El verbo implica una respuesta vocal en forma de eco o aclamación. «Respondiendo» conserva la relación antífona-prioridad entre el que inicia y los que replican.
- source_word: ὡς Νεεμίου
  english_pob_choice: as in Nehemiah's time
  chosen_spanish: como en tiempos de Nehemías
  alternatives_spanish:
  - como Nehemías
  - como en la época de Nehemías
  lexicon: LSJ
  rationale: El griego es comprimido y permite varias lecturas. «Como en tiempos de Nehemías» expresa la comparación histórica sin forzar una precisión que el texto no desarrolla.
theological_decisions:
- issue: Referencia comprimida a Nehemías
  english_pob_reading: Render as an allusion to the manner/time of Nehemiah rather than a bare name
  chosen_spanish_reading: Mantener la alusión histórica sin resolverla de manera excesiva
  alternative_spanish_readings:
  - como Nehemías hizo
  - según Nehemías
  rationale: La frase final del griego es breve y admite más de una relación exacta con Nehemías. El español conserva esa referencia histórica de forma inteligible, sin cerrar la ambigüedad documental.
  doctrine_reference: Preservar la tensión textual y documentar la ambigüedad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que reordenó la cláusula para dejar claro que tanto los sacerdotes como todos los demás ofrecieron la oración. Por eso el español coloca el verbo principal con ambos sujetos antes del complemento de participación litúrgica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no lo contiene.
  - Se mantiene el registro cultual con «sacerdotes», «sacrificio» y «oración», sin introducir terminología eclesiástica posterior.
  - Se eligió «Jonatán» como forma española estándar del nombre propio.
  - No se añadió nota al pie porque la ambigüedad de Nehemías puede resolverse dentro del flujo normal de la frase española sin pérdida de fidelidad.
