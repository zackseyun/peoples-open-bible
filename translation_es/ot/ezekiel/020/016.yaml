translation:
  language: es
  text: porque rechazaron mis juicios, y no anduvieron en mis estatutos, y profanaron mis sábados; porque su corazón fue tras sus ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִלּוּלִים, un término despectivo para los ídolos, con posible matiz de ‘ídolos sucios’ o ‘de estiércol’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la condena de manera natural en español y conserva el valor causal del hebreo.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis sentencias
  - mis decretos
  lexicon: HALOT
  rationale: '''Juicios'' conserva el campo jurídico de מִשְׁפָּט sin perder claridad en español. ''Sentencias'' sería más estrecho y ''decretos'' desplaza el matiz hacia mandatos generales.'
- source_word: מָאַסוּ
  english_pob_choice: rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - despreciaron
  - repudiaron
  lexicon: HALOT
  rationale: Expresa rechazo activo y voluntario. 'Despreciaron' añade una carga afectiva que no es necesaria aquí.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' mantiene la distinción tradicional y semántica frente a מִשְׁפָּטִים, sin diluir el paralelo legal del verso.'
- source_word: לֹא הָלְכוּ בָהֶם
  english_pob_choice: did not walk in
  chosen_spanish: no anduvieron en
  alternatives_spanish:
  - no caminaron en
  - no vivieron según
  lexicon: HALOT
  rationale: Conserva la metáfora hebrea de conducta como 'caminar en' un camino o norma, y resulta natural en español bíblico contemporáneo.
- source_word: שַׁבְּתוֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis sábados de reposo
  - mis días de reposo
  lexicon: HALOT
  rationale: '''Sábados'' refleja el plural hebreo y es comprensible en español; evita singularizar indebidamente el término. En contexto litúrgico podría sonar más técnico ''sábados de reposo'', pero el plural breve es fiel y claro.'
- source_word: חִלֵּלוּ
  english_pob_choice: profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - desacralizaron
  lexicon: HALOT
  rationale: '''Profanaron'' expresa correctamente el trato de lo santo como común y conserva el valor cultual del verbo.'
- source_word: אַחֲרֵי גִלּוּלֵיהֶם
  english_pob_choice: after their idols
  chosen_spanish: tras sus ídolos
  alternatives_spanish:
  - después de sus ídolos
  - siguiendo a sus ídolos
  lexicon: HALOT
  rationale: '''Tras'' reproduce bien la dirección y el seguimiento implícitos en el hebreo con una forma breve y bíblicamente idiomática. ''Siguiendo a'' explicita más de lo que exige el texto.'
- source_word: גִלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos inmundos
  - sus ídolos repugnantes
  lexicon: HALOT
  rationale: Mantiene el sentido básico sin sobrecargar el texto principal; la fuerza despectiva del término hebreo queda mejor tratada en la nota.
- source_word: לִבָּם הֹלֵךְ
  english_pob_choice: their heart went
  chosen_spanish: su corazón fue
  alternatives_spanish:
  - su corazón iba
  - su corazón seguía
  lexicon: HALOT
  rationale: '''Fue tras'' permite conservar el movimiento del hebreo y la idea de orientación interior, sin hacerla demasiado interpretativa. El singular ''corazón'' preserva el centro moral de la persona.'
theological_decisions:
- issue: Mantener dos términos legales distintos en la línea de reproche
  english_pob_reading: Different English terms are maintained for מִשְׁפָּטַי ('my judgments') and חֻקּוֹתַי ('my statutes').
  chosen_spanish_reading: 'Se mantienen dos términos distintos: ''juicios'' y ''estatutos''.'
  alternative_spanish_readings:
  - usar 'leyes' para ambos
  - usar 'mandamientos' para ambos
  rationale: El hebreo distingue entre מִשְׁפָּטִים y חֻקִּים; conservar esa diferencia en español evita aplanar la textura jurídica del pasaje.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Preservar la metáfora antropológica del corazón orientado a los ídolos
  english_pob_reading: their heart went after their idols
  chosen_spanish_reading: su corazón fue tras sus ídolos
  alternative_spanish_readings:
  - se entregaron a sus ídolos
  - sus corazones siguieron a sus ídolos
  rationale: La frase mantiene el centro interior de la infidelidad y no la reduce a conducta externa. 'Fue tras' preserva la dirección del deseo y la inclinación del corazón.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Preservar el plural cultual de שַׁבְּתוֹתַי
  english_pob_reading: my Sabbaths
  chosen_spanish_reading: mis sábados
  alternative_spanish_readings:
  - mis días de reposo
  - mis sabatismos
  rationale: El plural hebreo debe quedar visible; 'sábados' comunica el dato sin introducir una perífrasis innecesaria.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue la lectura revisada del POB en inglés: ''for their heart went after their idols'' en lugar de ''kept going after'', manteniendo un español natural (''su corazón fue tras sus ídolos'') que conserva la dirección interior del hebreo sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se conservaron términos distintos para מִשְׁפָּטַי y חֻקּוֹתַי ('juicios' y 'estatutos') para reflejar la distinción del hebreo.
  - '''Sábados'' mantiene el plural hebreo de שַׁבְּתוֹתַי y evita singularizar la referencia.'
  - La nota del marcador a se ancla en 'ídolos' para reflejar la carga despectiva de גִלּוּלִים sin recargar el texto principal.
  - Se prefirió 'fue tras' para hacer audible la metáfora de seguimiento del corazón, coherente con el audit trail inglés.
