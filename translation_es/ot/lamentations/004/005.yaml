translation:
  language: es
  text: Los que comían manjares están desolados en las calles; los que fueron criados sobre escarlata abrazan montones de ceniza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «montones de desechos», «montones de basura» o «estercoleros»; el término hebreo alude a lugares de desperdicio y expresa humillación extrema.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹכְלִים
  english_pob_choice: those who used to eat
  chosen_spanish: Los que comían
  alternatives_spanish:
  - los que solían comer
  - los que comían antes
  - quienes comían
  lexicon: HALOT
  rationale: El participio sustantivado describe a un grupo definido por su costumbre pasada; en español, el imperfecto 'comían' comunica bien ese trasfondo habitual sin añadir más de lo que el hebreo requiere. 'Solían comer' sería más explícito, pero menos directo.
- source_word: לְמַעֲדַנִּים
  english_pob_choice: delicacies
  chosen_spanish: manjares
  alternatives_spanish:
  - delicias
  - golosinas
  - alimentos exquisitos
  lexicon: HALOT
  rationale: El término señala comida delicada o lujosa. 'Manjares' suena natural en español bíblico y conserva la idea de alimentos refinados, sin volverse demasiado coloquial ni técnico.
- source_word: נָשַׁמּוּ
  english_pob_choice: are desolate
  chosen_spanish: se han desolado
  alternatives_spanish:
  - están desolados
  - han sido devastados
  - están arruinados
  lexicon: HALOT
  rationale: El verbo expresa quedar devastado o desolado. 'Se han desolado' mantiene el estado resultante y la fuerza de ruina del contexto de lamento.
- source_word: בַּחוּצוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los lugares públicos
  - en las vías
  lexicon: HALOT
  rationale: El plural hebreo apunta a los espacios públicos de la ciudad. 'Calles' es una equivalencia idiomática clara en español y preserva la exposición pública implícita.
- source_word: הָאֱמֻנִים
  english_pob_choice: those who were brought up
  chosen_spanish: los que fueron criados
  alternatives_spanish:
  - los que fueron criados y cuidados
  - los que fueron nutridos
  - los que fueron educados
  lexicon: HALOT
  rationale: Aquí no se trata de 'fieles', sino de personas criadas o nutridas en un entorno de lujo. 'Fueron criados' refleja el sentido social de crianza, no una cualidad moral.
- source_word: עֲלֵי תוֹלָע
  english_pob_choice: on scarlet
  chosen_spanish: sobre escarlata
  alternatives_spanish:
  - en escarlata
  - sobre carmesí
  - entre telas escarlata
  lexicon: HALOT
  rationale: La preposición y el color aluden al entorno lujoso en que fueron criados. 'Sobre escarlata' conserva la imagen original, incluso si en español resulta ligeramente figurada.
- source_word: חִבְּקוּ
  english_pob_choice: embrace
  chosen_spanish: abrazan
  alternatives_spanish:
  - abrazaron
  - se aferran a
  - estrechan
  lexicon: HALOT
  rationale: El verbo conserva el gesto concreto de 'abrazar'. En este paralelismo lamentoso, el presente histórico español 'abrazan' funciona como presente de vividez y mantiene el contraste con el estado anterior de privilegio.
- source_word: אַשְׁפַּתּוֹת
  english_pob_choice: ash heaps
  chosen_spanish: montones de ceniza
  alternatives_spanish:
  - montones de basura
  - montones de desperdicios
  - estercoleros
  - montones de desechos
  lexicon: HALOT
  rationale: El sustantivo puede referirse a montones de desechos, ceniza o estiércol. 'Montones de ceniza' es una opción tradicional y comprensible en español, adecuada al cuadro de humillación extrema; la alternativa semántica más amplia se preserva en nota.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del pasaje con alta concordancia y sin revisiones pendientes; la principal decisión mantenida es conservar la imagen irónica de quienes antes disfrutaban de lujo y ahora abrazan montones de desperdicio.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque no aparece el nombre divino.
  - '''Manjares'' se usó como equivalente natural de la comida delicada/lujosa, sin introducir un tono demasiado moderno.'
  - '''Sobre escarlata'' conserva la imagen de lujo del hebreo y del audit trail en inglés.'
  - El presente 'abrazan' funciona como presente vívido en español, reflejando la fuerza descriptiva del hebreo sin alterar el sentido temporal del lamento.
