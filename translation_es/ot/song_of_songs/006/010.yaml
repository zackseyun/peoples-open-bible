translation:
  language: es
  text: ¿Quién es esta[a] que se asoma como el alba, hermosa como la luna, clara[b] como el sol, imponente como escuadrones con estandartes[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién es ella que se asoma como el alba ... ?»'
    reason: lexical_alternative
  - marker: b
    text: «Clara» traduce un adjetivo hebreo que también puede significar «pura» o «brillante».
    reason: lexical_alternative
  - marker: c
    text: 'O: «imponente como ejércitos con estandartes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֹאת
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es esta?
  alternatives_spanish:
  - ¿Quién es ella?
  lexicon: HALOT
  rationale: El hebreo usa la interrogación con el demostrativo femenino. En español, «¿Quién es esta?» conserva la pregunta retórica y la referencia femenina sin añadir una paráfrasis innecesaria.
- source_word: הַנִּשְׁקָפָה
  english_pob_choice: who looks forth
  chosen_spanish: que se asoma
  alternatives_spanish:
  - que aparece
  - que mira desde arriba
  lexicon: HALOT
  rationale: נשקף expresa la idea de asomarse, aparecer desde un punto de observación o dejarse ver. «Se asoma» mantiene la imagen visual y poética sin fijar de más el ángulo espacial.
- source_word: כְמוֹ שָׁחַר
  english_pob_choice: like the dawn
  chosen_spanish: como el alba
  alternatives_spanish:
  - como el amanecer
  - como el día que despunta
  lexicon: HALOT
  rationale: שׁחר denota aurora/alba. «Como el alba» es una equivalencia natural en español y conserva la concisión poética del hebreo.
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - linda
  lexicon: HALOT
  rationale: El adjetivo significa belleza visible. «Hermosa» es claro, digno y adecuado al tono poético.
- source_word: כַלְּבָנָה
  english_pob_choice: as the moon
  chosen_spanish: como la luna
  alternatives_spanish:
  - como la luna llena
  lexicon: HALOT
  rationale: La comparación es directa con la luna; en español «como la luna» conserva el paralelismo y evita especificar más de lo que el texto dice.
- source_word: בָּרָה
  english_pob_choice: bright
  chosen_spanish: clara
  alternatives_spanish:
  - brillante
  - pura
  lexicon: HALOT
  rationale: El adjetivo puede significar brillante, clara o pura. En este contexto de luminarias, «clara» transmite el resplandor sin forzar un matiz moral que el verso no exige.
- source_word: כַּחַמָּה
  english_pob_choice: as the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - como el astro del día
  lexicon: HALOT
  rationale: Es una comparación celeste directa; «como el sol» es la forma natural y precisa en español.
- source_word: אֲיֻמָּה
  english_pob_choice: awe-inspiring
  chosen_spanish: imponente
  alternatives_spanish:
  - terrible
  - sobrecogedora
  - majestuosa
  lexicon: HALOT
  rationale: El término hebreo expresa una presencia que infunde temor o sobrecogimiento. «Imponente» comunica esa fuerza con dignidad, sin la carga negativa que «terrible» suele tener hoy.
- source_word: כַּנִּדְגָּלוֹת
  english_pob_choice: as bannered armies
  chosen_spanish: como escuadrones con estandartes
  alternatives_spanish:
  - como ejércitos con banderas
  - como huestes con estandartes
  lexicon: HALOT
  rationale: La imagen evoca unidades militares distinguidas por estandartes. «Escuadrones con estandartes» preserva el carácter marcial y visual del hebreo en un español fluido.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el estado de alta concordancia del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de cuatro comparaciones celestes y militares.
  - Se evitó traducir con «SEÑOR» o «Cristo» porque el versículo no contiene esos términos.
  - Se eligió «alba» en lugar de un giro más explicativo para conservar la densidad poética del hebreo.
  - El sustantivo militar se vertió con un término comprensible en español sin perder la imagen de tropas organizadas por estandartes.
