review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y conserva correctamente Yahvé, la relación temporal, el inicio del canto/alabanza, las naciones atacantes y la nota sobre «a/contra Judá». Sin embargo, hay dos fallas importantes: la nota [a] está anclada en «cánticos» pero en realidad explica מְאָרְבִים («emboscadas»), y «fueron derrotados» debilita el matiz pasivo y súbito de וַיִּנָּגֵפוּ mejor reflejado por «fueron derribados» o «fueron abatidos».'
  spanish_quality_summary: El español es generalmente natural y digno. «Y en el momento en que» funciona, aunque «Y cuando» sería más ágil; no es necesario cambiarlo. «Con cánticos y alabanza» es legible. «Los que venían contra Judá» es entendible, pero conviene mantener la puntuación clara. La corrección principal es recolocar la nota [a] en «emboscadas» y ajustar el verbo final para mayor fidelidad semántica.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en «Yahvé». «Emboscadas» también concuerda con la decisión inglesa y preserva la ambigüedad léxica. No hay conflicto doctrinal. La única desalineación real es funcional: la nota léxica de מְאָרְבִים no está asociada al término correcto en el texto.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «cánticos» pero explica «emboscadas».
    rationale: El contenido de la nota trata el participio מְאָרְבִים, no בְרִנָּה. Esto rompe la trazabilidad del aparato crítico y puede confundir al lector.
  - severity: medium
    issue: «Fueron derrotados» reduce la fuerza de וַיִּנָּגֵפוּ.
    rationale: El niphal de נגף expresa ser golpeados/abatidos/derribados; «derrotados» comunica el resultado militar, pero pierde el matiz de golpe súbito y juicio divino que el inglés POB preserva con «were struck down».
  - severity: low
    issue: La nota [a] usa «emboscados», opción española menos natural que «emboscadores» o «hombres en emboscada».
    rationale: «Emboscados» suele entenderse como quienes han sido objeto de una emboscada, no quienes están apostados en ella. Conviene pulir la alternativa para reflejar mejor el hebreo participial.
  revised_spanish_text: Y en el momento en que comenzaron con cánticos y alabanza, Yahvé puso emboscadas[a] contra los amonitas, Moab y el monte de Seír, los que venían contra Judá[b], y fueron derribados.
  revised_footnotes:
  - marker: a
    text: O «emboscadores» / «hombres en emboscada». El participio hebreo puede referirse a personas apostadas en emboscada o, de manera más general, a la emboscada misma.
    reason: lexical_alternative
  - marker: b
    text: O «que venían a Judá». En el contexto, el movimiento es hostil; por eso se usa «contra Judá» en el texto principal.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota léxica para que quede anclada en «emboscadas», el término que realmente explica מְאָרְבִים. También se cambia «fueron derrotados» por «fueron derribados» para reflejar mejor el pasivo de נגף y el matiz de golpe súbito/divino preservado en la auditoría inglesa. El resto del texto puede mantenerse.
