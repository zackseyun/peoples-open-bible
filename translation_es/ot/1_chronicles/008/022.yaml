- source_word: אֱלִיאֵל
  english_pob_choice: Eliel
  chosen_spanish: Eliel
  lexicon: nombre propio
  rationale: Nombre propio teofórico que se conserva por transliteración. No se descompone en sus elementos significativos porque en genealogías los nombres se presentan como nombres propios, no como expresiones a traducir.
- source_word: וְ / וָ / וֶ
