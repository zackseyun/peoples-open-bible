id: JOS.17.4
reference: Joshua 17:4
source:
  edition: WLC
  text: וַ/תִּקְרַ֡בְנָה לִ/פְנֵי֩ אֶלְעָזָ֨ר הַ/כֹּהֵ֜ן וְ/לִ/פְנֵ֣י יְהוֹשֻׁ֣עַ בִּן נ֗וּן וְ/לִ/פְנֵ֤י הַ/נְּשִׂיאִים֙ לֵ/אמֹ֔ר יְהוָה֙ צִוָּ֣ה אֶת מֹשֶׁ֔ה לָֽ/תֶת לָ֥/נוּ נַחֲלָ֖ה בְּ/ת֣וֹךְ אַחֵ֑י/נוּ וַ/יִּתֵּ֨ן לָ/הֶ֜ם אֶל פִּ֤י יְהוָה֙ נַֽחֲלָ֔ה בְּ/ת֖וֹךְ אֲחֵ֥י אֲבִי/הֶֽן׀־־־־׃
translation:
  text: So they came near before Eleazar the priest[a], and before Joshua son of Nun, and before the leaders, saying, “Yahweh commanded Moses to give us an inheritance among our brothers.” So he gave them, according to the command of Yahweh[c][b], an inheritance among their father's brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'according to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among our brothers'; the daughters are asking for a share within the inheritance allotted to their male clan members.
    reason: cultural_note
  - marker: c
    text: Hebrew 'among their father's brothers,' that is, within their paternal clan.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּקְרַבְנָה
  chosen: they came near
  alternatives:
  - they approached
  - they presented themselves
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fp from קרב, referring to the daughters mentioned in context. 'Came near' preserves the formal sense while remaining natural English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Repeated three times to mark formal appearance before authorities. 'Before' is concise and preserves the juridical/public setting.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן; no contextual reason to expand beyond the office title.
- source_word: הַנְּשִׂיאִים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  lexicon: HALOT
  rationale: נְשִׂיאִים denotes tribal/community leaders. 'Leaders' is clear modern English and avoids the potentially misleading aristocratic nuance of 'princes.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Infinitive introducing direct speech; 'saying' preserves the discourse structure.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִוָּה אֶת־מֹשֶׁה
  chosen: commanded Moses
  alternatives:
  - gave Moses instructions
  lexicon: HALOT
  rationale: צוה is a command verb; 'commanded Moses' best reflects the force of the Hebrew.
- source_word: לָתֶת לָנוּ נַחֲלָה
  chosen: to give us an inheritance
  alternatives:
  - to grant us a possession
  - to give us a hereditary portion
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly refers to allotted hereditary land. 'Inheritance' is the established and accurate rendering.
- source_word: בְּתוֹךְ אַחֵינוּ
  chosen: among our brothers
  alternatives:
  - in the midst of our brothers
  - among our kinsmen
  lexicon: HALOT
  rationale: The phrase indicates inclusion within the allotment of male siblings/clan members. 'Brothers' is gender-accurate to the source and contextually appropriate, since the speakers are daughters appealing for a share alongside their brothers.
- source_word: וַיִּתֵּן
  chosen: he gave
  alternatives:
  - he granted
  lexicon: HALOT
  rationale: Singular verb likely refers to Joshua as the acting authority in the narrative, though the decision is carried out under divine command. 'He gave' follows the Hebrew number directly.
- source_word: אֶל־פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'according to the mouth of.' 'At the command of the LORD' conveys the authoritative force idiomatically in English.
- source_word: אֲחֵי אֲבִיהֶן
  chosen: their father's brothers
  alternatives:
  - their paternal uncles
  - their father's kin
  lexicon: HALOT
  rationale: The Hebrew is specifically 'the brothers of their father,' not merely 'their brothers.' This refers to the wider paternal clan among whom the inheritance was assigned. The more literal rendering preserves the kinship structure.
