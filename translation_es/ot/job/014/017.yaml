translation:
  language: es
  text: Mi transgresión está sellada en una bolsa, y tú cubres[a] mi iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recubres», «embozas» o «tapias» mi iniquidad. El verbo hebreo aquí es difícil, y la imagen exacta está debatida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָתֻם
  english_pob_choice: sealed up
  chosen_spanish: está sellada
  alternatives_spanish:
  - está sellada completamente
  - está cerrada
  - está puesta bajo sello
  lexicon: HALOT
  rationale: 'El participio pasivo expresa un estado resultante: algo dejado bajo sello y cerrado de manera segura. En español, "está sellada" comunica ese estado sin endurecer la imagen con una expresión demasiado técnica.'
- source_word: בִּצְרוֹר
  english_pob_choice: in a bag
  chosen_spanish: en un saco
  alternatives_spanish:
  - en una bolsa
  - en un bulto
  - en una envoltura
  lexicon: HALOT
  rationale: צְרוֹר puede ser un bulto, envoltorio, bolsa o saco. "Saco" mantiene el objeto concreto y resulta natural en español, conservando la imagen de algo atado y guardado.
- source_word: פִּשְׁעִי
  english_pob_choice: my transgression
  chosen_spanish: mi transgresión
  alternatives_spanish:
  - mi rebelión
  - mi ofensa
  lexicon: HALOT
  rationale: פֶּשַׁע expresa transgresión o rebelión; "transgresión" conserva el peso moral del término sin llevarlo más lejos de lo que permite el contexto poético.
- source_word: וַתִּטְפֹּל
  english_pob_choice: you cover over
  chosen_spanish: cubres
  alternatives_spanish:
  - recubres
  - embozas
  - tapias
  lexicon: HALOT
  rationale: 'El verbo es difícil y admite varias imágenes: recubrir, cubrir con yeso, coser o fijar sobre algo. En español, "cubres" reproduce la idea general de poner una capa sobre la iniquidad, dejando abierta la ambigüedad lexical que el inglés POB también preserva en nota.'
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Con טפל, עַל sugiere algo aplicado sobre otra cosa. En español, la preposición queda implícita en "cubres mi iniquidad" para evitar una redundancia forzada y mantener la fluidez poética.
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi maldad
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o el peso de la culpa. "Iniquidad" conserva la carga moral y distingue este término de פֶּשַׁע en el primer miembro.
theological_decisions:
- issue: Fuerza interpretativa de la imagen de cobertura
  english_pob_reading: Job se queja de que Dios guarda y cubre sus pecados para tenerlos en cuenta, no de que los perdona.
  chosen_spanish_reading: Job se queja de que Dios guarda su transgresión y cubre su iniquidad para tenerla presente contra él, no de que la perdona.
  alternative_spanish_readings:
  - Dios oculta sus pecados, lo que podría sugerir perdón
  - Dios limpia sus faltas
  rationale: El contexto inmediato de Job 14:16-17 es lamento y recriminación, no absolución. Por eso la traducción mantiene una cobertura negativa, sin introducir una lectura de perdón que el pasaje no requiere.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta redacción sigue la solución estable del análisis inglés y conserva la ambigüedad verbal documentada.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" fuera del texto porque este versículo no contiene el nombre divino; el sujeto implícito es "tú" en el contexto.
  - Se prefirió "transgresión" e "iniquidad" para distinguir פֶּשַׁע de עָוֹן, siguiendo la diferenciación auditada en inglés.
  - La nota al pie preserva la ambigüedad verbal sin volver a traducir mecánicamente la lista inglesa; se eligieron equivalentes naturales en español con el mismo rango semántico.
