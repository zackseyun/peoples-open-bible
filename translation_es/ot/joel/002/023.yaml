review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: vocativo a los hijos de Sion, doble imperativo de gozo, referencia a Yahvé, motivo causal, y la secuencia de lluvia temprana/tardía con ''como antes''. Sin embargo, omite en el texto principal la difícil frase לִצְדָקָה después de הַמּוֹרֶה y la desplaza solo a notas sin ancla léxica explícita en español. Dado que el inglés auditado preserva esa carga semántica en el cuerpo principal (''for vindication'') y mantiene alternativas en nota, el español debe también expresar ese elemento en el texto principal.'
  spanish_quality_summary: 'El español es claro y legible, con tono digno. ''Regocíjense y alégrense'' funciona bien. ''Y ustedes, hijos de Sion'' suena algo pesado pero aceptable; ''hará descender'' es comprensible, aunque ligeramente menos natural que ''hace descender'' o ''hace caer''. El problema principal no es de fluidez sino de fidelidad: la frase principal deja ''la lluvia temprana'' sin complemento, cuando el hebreo sí añade לִצְדָקָה.'
  glossary_alignment: 'Buen alineamiento con los términos del proyecto: יהוה -> ''Yahvé'', אֱלֹהֵיכֶם -> ''su Dios'', מוֹרֶה -> ''lluvia temprana'' en el texto principal, y preservación de alternativas en notas. No hay conflicto relevante de glosario. La reparación necesaria es incorporar en el texto principal una traducción de לִצְדָקָה, idealmente ''para vindicación'', manteniendo notas para ''para justicia'', ''en justa medida'' y la alternativa ''maestro''.'
  issues:
