translation:
  language: es
  text: Y golpearán toda ciudad fortificada y toda ciudad escogida[a]; derribarán todo árbol bueno, taparán todas las fuentes de agua, y arruinarán todo campo bueno con piedras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ciudad selecta’ o ‘ciudad mejor’ para ‘ciudad escogida’.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘harán doloroso con piedras’; el modismo hebreo se refiere a arruinar la tierra de cultivo arrojándole piedras.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכִּיתֶם
  english_pob_choice: you shall strike
  chosen_spanish: golpearán
  alternatives_spanish:
  - atacarán
  - herirán
  - azotarán
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto militar comunica un golpe/ataque directo contra ciudades. ‘Golpearán’ conserva esa fuerza sin introducir la idea más interpretativa de ‘conquistar’. El futuro español sigue la exhortación profética dirigida al grupo.
- source_word: עִיר מִבְצָר
  english_pob_choice: fortified city
  chosen_spanish: ciudad fortificada
  alternatives_spanish:
  - ciudad amurallada
  - ciudad-fortaleza
  - fortaleza
  lexicon: HALOT
  rationale: מִבְצָר designa una ciudad defendida o fortificada. ‘Ciudad fortificada’ reproduce bien el valor militar y es natural en español.
- source_word: עִיר מִבְחוֹר
  english_pob_choice: choice city
  chosen_spanish: ciudad escogida
  alternatives_spanish:
  - ciudad selecta
  - ciudad mejor
  - ciudad de elite
  lexicon: HALOT
  rationale: 'La forma expresa algo elegido, selecto o de preferencia. ‘Escogida’ mantiene la ambigüedad útil del hebreo: puede ser una ciudad selecta o de primera calidad, sin cerrar el sentido como ‘mejor’.'
- source_word: תַּפִּילוּ
  english_pob_choice: you shall fell
  chosen_spanish: derribarán
  alternatives_spanish:
  - cortarán
  - tumbarán
  - harán caer
  lexicon: HALOT
  rationale: En relación con árboles, el verbo indica hacer caer o abatir. ‘Derribarán’ es claro y fiel al movimiento resultante, sin perder el paralelismo con los objetos enumerados.
- source_word: כָּל עֵץ טוֹב
  english_pob_choice: every good tree
  chosen_spanish: todo árbol bueno
  alternatives_spanish:
  - todo árbol valioso
  - todo árbol productivo
  - todo árbol fructífero
  lexicon: HALOT
  rationale: ‘Bueno’ sigue de cerca el adjetivo טוֹב y preserva la tensión entre una traducción literal y la posible referencia a árboles valiosos o útiles. No se explicita ‘fructífero’ porque eso sería más interpretativo.
- source_word: מַעְיְנֵי מַיִם
  english_pob_choice: springs of water
  chosen_spanish: las fuentes de agua
  alternatives_spanish:
  - los manantiales de agua
  - las vertientes de agua
  - las fuentes de aguas
  lexicon: HALOT
  rationale: La expresión denota nacimientos o surgencias de agua. ‘Fuentes de agua’ es natural en español y mantiene la imagen de una salida de agua, sin restringirla innecesariamente a un término técnico.
- source_word: תִּסְתֹּמוּ
  english_pob_choice: stop up
  chosen_spanish: taparán
  alternatives_spanish:
  - cegarán
  - bloquearán
  - sellarán
  lexicon: HALOT
  rationale: El verbo implica cerrar u obstruir el paso del agua. ‘Taparán’ comunica en español común la acción de inutilizar la fuente; ‘cegarán’ sería más técnico pero menos transparente para lectores generales.
- source_word: הַחֶלְקָה הַטּוֹבָה
  english_pob_choice: every good field
  chosen_spanish: todo campo bueno
  alternatives_spanish:
  - toda parcela buena
  - todo terreno bueno
  - todo campo fértil
  lexicon: HALOT
  rationale: חֶלְקָה puede ser parcela, porción o terreno cultivado. ‘Campo’ funciona bien en el contexto agrícola; ‘bueno’ conserva el adjetivo sin interpretarlo como ‘fértil’, que sería un matiz añadido.
- source_word: תַּכְאִבוּ בָּאֲבָנִים
  english_pob_choice: ruin ... with stones
  chosen_spanish: arruinarán ... con piedras
  alternatives_spanish:
  - harán doler ... con piedras
  - estropearán ... con piedras
  - destruirán ... con piedras
  lexicon: HALOT
  rationale: El hebreo contiene un modismo inusual que, en contexto, describe estropear la tierra arrojándole piedras. ‘Arruinarán ... con piedras’ transmite el efecto agrícola real sin perder la rareza del giro semítico.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura hebrea recibida y coincide sustancialmente con la línea auditada en inglés: ciudades fortificadas y escogidas, árboles, fuentes de agua y campos arruinados con piedras. No se adoptaron revisiones textuales alternativas porque el expediente indica acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ según la norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantuvo ‘Mesías/Cristo’ fuera de la traducción porque no aplica al verso.
  - ‘Fuentes de agua’ y ‘taparán’ preservan la imagen física de inutilizar el suministro hídrico.
  - ‘Arruinarán ... con piedras’ conserva el modismo hebreo sin sobreexplicar en el cuerpo principal.
