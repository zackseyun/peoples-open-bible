lexical_decisions:
- source_word: וַיְהִי + לוֹ
  english_pob_choice: He also had
  chosen_spanish: Él también tuvo
  alternatives_spanish:
  - Y tuvo
  - Y le llegaron a él
  lexicon: HALOT
  rationale: El hebreo usa la construcción idiomática de existencia/posesión con ל + sufijo, que en español se expresa con naturalidad por medio de ‘tener’. ‘También’ conserva la continuidad narrativa que el inglés POB marca con ‘also’.
- source_word: שִׁבְעָנָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: HALOT
  rationale: El cardinal se traduce de manera directa y normal en español.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo especifica masculinidad, en este contexto la oposición explícita viene dada por ‘hijas’ en la segunda cola. En español, ‘hijos’ evita una repetición pesada de ‘hijos varones’ y refleja la familia mixta del versículo; la referencia femenina queda claramente diferenciada por ‘hijas’.
- source_word: וְשָׁלֹשׁ
  english_pob_choice: and three
  chosen_spanish: y tres
  alternatives_spanish:
  - y tres más
  lexicon: HALOT
  rationale: La conjunción y el cardinal se mantienen de modo directo.
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: hijas
  alternatives_spanish:
  - hijas mujeres
  - niñas
  lexicon: HALOT
  rationale: ‘Hijas’ es el equivalente natural y formal en español para el hebreo femenino plural, sin perder el contraste de género del texto.
theological_decisions:
- issue: Uso de un equivalente natural para la posesión en vez de una calca del hebreo
  english_pob_reading: He also had
  chosen_spanish_reading: Él también tuvo
  alternative_spanish_readings:
  - Y él tuvo
  - Y había para él
  rationale: 'No hay una carga doctrinal particular aquí, pero sí una decisión de fidelidad idiomática: el hebreo expresa posesión por medio de una construcción existencial. ‘Tuvo’ comunica el sentido con claridad y sin distorsionar el texto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés POB actual no presenta notas ni revisiones relevantes para este versículo; la traducción española sigue la misma lectura base sin introducir variantes textuales.
