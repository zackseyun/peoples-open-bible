translation:
  language: es
  text: Y también hubo holocaustos en abundancia, con la grasa de los sacrificios de paz[a] y las libaciones para los holocaustos. Así quedó establecido el servicio de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios de comunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Y además
  - También
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la conjunción sin forzar una coordinación pesada en español; 'y también' reproduce el enlace con el contexto anterior.
- source_word: עֹלָה
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: En español bíblico, 'holocaustos' es un término cultual claro y tradicional para עֹלָה; aquí se usa en sentido colectivo por el contexto de abundancia.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran número
  lexicon: HALOT
  rationale: Expresa de manera natural la idea de gran cantidad sin perder el matiz cuantitativo del hebreo.
- source_word: בְּחֶלְבֵי
  english_pob_choice: with the fat of
  chosen_spanish: con la grasa de
  alternatives_spanish:
  - con las porciones de grasa de
  - incluida la grasa de
  lexicon: HALOT
  rationale: En contexto sacrificial, חֶלֶב refiere a la grasa ofrecida a Dios; 'grasa' es transparente en español y evita un tecnicismo innecesario.
- source_word: הַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de comunión
  alternatives_spanish:
  - los sacrificios de paz
  - las ofrendas de comunión
  lexicon: HALOT
  rationale: '''Sacrificios de comunión'' comunica el valor relacional del término sin imponer la fórmula ''peace offerings'' como calco; mantiene una categoría cultual reconocible en español. La alternativa tradicional ''sacrificios de paz'' es menos clara para lectores modernos.'
- source_word: וּבַנְּסָכִים
  english_pob_choice: and the drink offerings
  chosen_spanish: las libaciones
  alternatives_spanish:
  - las ofrendas líquidas
  - las ofrendas de vino
  lexicon: HALOT
  rationale: '''Libaciones'' es el equivalente cultual más preciso para נְסָכִים y suena natural en español bíblico.'
- source_word: לָעֹלָה
  english_pob_choice: for the burnt offerings
  chosen_spanish: para los holocaustos
  alternatives_spanish:
  - para el holocausto
  - correspondientes a los holocaustos
  lexicon: HALOT
  rationale: Mantiene la referencia a la misma categoría sacrificial con concordancia plural acorde al sentido colectivo del pasaje.
- source_word: וַתִּכּוֹן
  english_pob_choice: was established
  chosen_spanish: quedó establecida
  alternatives_spanish:
  - fue establecida
  - se estableció
  lexicon: HALOT
  rationale: '''Quedó establecida'' conserva el resultado y la firmeza del verbo כון, con un español fluido y pasivo-resultativo.'
- source_word: עֲבוֹדַת בֵּית יְהוָה
  english_pob_choice: the service of the house of Yahweh
  chosen_spanish: la obra de la casa de Yahvé
  alternatives_spanish:
  - el servicio de la casa de Yahvé
  - el ministerio de la casa de Yahvé
  lexicon: HALOT
  rationale: '''עֲבוֹדָה'' en este contexto cultual puede abarcar servicio, labor u oficio. ''Obra'' reproduce de forma amplia la acción restaurada en el templo sin perder el sentido de servicio sagrado; ''casa de Yahvé'' preserva el nombre divino conforme a la guía del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: Sigue la terminología española del proyecto para el Tetragrámaton y evita sustituir el nombre por un título genérico.
theological_decisions:
- issue: Cómo verter עֹלָה en un español público actual
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: 'No hay cambio doctrinal: se preserva la categoría sacrificial. ''Holocaustos'' es una equivalencia cultual asentada en español bíblico y refleja el carácter completamente ofrecido de la víctima.'
  doctrine_reference: Lexical category of sacrificial offerings in the Hebrew Bible
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Yahweh
  rationale: Se mantiene el nombre propio del pacto, no una máscara como 'Señor', siguiendo la guía terminológica del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de עֲבוֹדַת בֵּית יְהוָה
  english_pob_reading: the service of the house of Yahweh
  chosen_spanish_reading: la obra de la casa de Yahvé
  alternative_spanish_readings:
  - el servicio de la casa de Yahvé
  - el ministerio de la casa de Yahvé
  rationale: '''Obra'' recoge el resultado institucional y litúrgico de la restauración del culto, sin estrechar el término a una sola función ministerial; la frase sigue siendo claramente cultual y dependiente del contexto del templo.'
  doctrine_reference: Cultic restoration in 2 Chronicles 29
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor de fluidez sin cambio de sentido: se eliminó la repetición de ''with'' y se mantuvo intacta la semántica. La versión española refleja esa misma relación simple de abundancia, asociación de ofrendas y conclusión resultativa, sin introducir elementos ausentes en el hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el paralelismo cultual entre holocaustos, sacrificios de comunión y libaciones.
  - '''Holocaustos'' y ''sacrificios de comunión'' se mantienen como categorías sacrificiales distintas, sin fusionarlas.'
  - '''Quedó establecida'' expresa el estado resultante de וַתִּכּוֹן con español natural.'
  - La puntuación y el orden siguen el flujo hebreo-escénico sin calco rígido.
