translation:
  language: es
  text: Den gracias a Yahvé, porque él es bueno[a], porque su amor fiel[b] es para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Den gracias a Yahvé»; algunas traducciones sustituyen el nombre divino יהוה por un título como «el Señor».'
    reason: alternative_reading
  - marker: b
    text: O «su fidelidad de pacto es para siempre» o «su misericordia es para siempre». El hebreo חֶסֶד expresa amor leal y duradero dentro de una relación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Dad gracias
  alternatives_spanish:
  - Agradeced
  - Alabad
  - Reconoced
  lexicon: HALOT
  rationale: El imperativo plural de ידה en hifil expresa aquí acción litúrgica de gratitud; «dad gracias» reproduce bien la fuerza idiomática sin perder el tono de alabanza implícita.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La fuente hebrea usa el Tetragrámaton directamente. En el español del POB se ha adoptado «Yahvé» para preservar el nombre del pacto y evitar la sustitución por un título genérico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: En ambos casos introduce la base o motivo de la exhortación. «Porque» mantiene la relación causal de forma natural en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - bueno
  lexicon: HALOT
  rationale: El predicado es directo y amplio; «bueno» conserva la afirmación simple del hebreo sin estrecharla a una sola cualidad moral o afectiva.
- source_word: לְעוֹלָם
  english_pob_choice: forever / endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - hasta la eternidad
  lexicon: HALOT
  rationale: La expresión temporal señala duración continua. «Para siempre» es la formulación española más natural y fiel al sentido de permanencia.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד combina amor y lealtad perseverante dentro del pacto. «Amor constante» conserva esa tensión de afecto y fidelidad en un español claro y publicable, sin reducirlo solo a misericordia ni solo a fidelidad contractual.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión sigue la política del proyecto de nombrar el Tetragrámaton con su forma propia en español. «Yahvé» preserva la identidad personal y pactal del nombre divino, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חֶסֶד in a praise refrain
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - amor leal
  - misericordia
  - fidelidad de pacto
  rationale: El hebreo presenta un término cargado que une afecto, lealtad y perseverancia. «Amor constante» comunica esa duración y compromiso relacional de manera idiomática, mientras mantiene la tensión teológica del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la última cláusula de «is forever» a «endures forever» para expresar con más naturalidad לְעוֹלָם חַסְדּוֹ. En español, «para siempre dura su amor constante» refleja esa duración continua sin perder el valor relacional de חֶסֶד.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יהוה.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Amor constante» intenta preservar la amplitud de חֶסֶד; no se reduce a «misericordia» salvo en nota alternativa.
  - 'La sintaxis sigue el paralelismo del versículo: exhortación, fundamento, fundamento ampliado.'
