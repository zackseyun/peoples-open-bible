base_translation:
  language: en
  yaml_path: translation/ot/ezra/007/021.yaml
  text: 'And from me[a], I, King Artaxerxes, issue a decree to all the treasurers in Beyond the River: whatever Ezra the priest, the scribe of the law of the God of heaven, asks of you[b], let it be done exactly.'
  footnotes:
  - marker: a
    text: Or 'let it be done exactly/promptly'; the Aramaic adverb emphasizes careful and full compliance.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the region west of the Euphrates.'
    reason: cultural_note
