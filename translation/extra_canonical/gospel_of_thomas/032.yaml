translation:
  text: Jesus said[1], "A city built upon a high mountain and fortified cannot fall[3][2],
    nor will it be able to be hidden."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:14:03Z'
  footnotes:
  - marker: '1'
    text: The Greek fragment of this saying (P.Oxy. 1) reads 'upon the top of a high
      mountain' (ἐπ' ἄκρον ὄρους ὑψηλοῦ), whereas the Coptic lacks 'the top of'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic shifts to the future tense for the final clause (ⲥⲛⲁϣϩⲱⲡ⳿ ⲁⲛ,
      'nor will it be able to be hidden'), whereas the Greek fragment uses the present
      tense for both verbs ('can neither fall nor be hidden').
    reason: textual_variant
  - marker: '3'
    text: Compare Matthew 5:14 ('A city built on a hill cannot be hid'). Thomas combines
      this saying with the imagery of the house built on rock that does not fall (Matthew
      7:24-25).
    reason: cross_reference
lexical_decisions:
- source_word: ⲕⲱⲧ
  chosen: built
  rationale: Circumstantial 3pl (ⲉⲩⲕⲱⲧ ⲙ̄ⲙⲟⲥ, 'while they build it') modifying an
    undefined noun, functioning as a relative clause translated passively in English.
  lexicon: Crum 120a
- source_word: ⲧⲟⲟⲩ
  chosen: mountain
  rationale: Standard term for mountain or hill.
  lexicon: Crum 438b
- source_word: ϫⲓⲥⲉ
  chosen: high
  rationale: Circumstantial qualitative (ⲉϥϫⲟⲥⲉ) modifying 'mountain'.
  lexicon: Crum 785a
- source_word: ⲧⲁϫⲣⲟ
  chosen: fortified
  rationale: Circumstantial qualitative (ⲉⲥⲧⲁϫⲣⲏⲩ) modifying 'city'. Means 'made firm'
    or 'fortified'.
  lexicon: Crum 461b
- source_word: ϩⲉ
  chosen: fall
  rationale: Used with the negative existential of power (ⲙⲛ̄ ϭⲟⲙ ⲛ̄ⲥϩⲉ, 'there is
    no power for it to fall' / 'it cannot fall').
  lexicon: Crum 652b
- source_word: ϩⲱⲡ
  chosen: hidden
  rationale: Future I with the potential prefix ϣ- (ⲥⲛⲁϣϩⲱⲡ⳿ ⲁⲛ, 'it will not be able
    to be hidden').
  lexicon: Crum 695a
theological_decisions:
- issue: Harmonization with Matthew 5:14
  chosen_reading: cannot fall, nor will it be able to be hidden
  rationale: Thomas explicitly adds the detail that the city 'cannot fall' (ⲙⲛ̄ ϭⲟⲙ
    ⲛ̄ⲥϩⲉ) and 'is fortified' (ⲉⲥⲧⲁϫⲣⲏⲩ), diverging from the canonical version in
    Matthew. The English strictly follows Thomas's expanded wording.
  alternatives_noted:
  - cannot be hid
drafter_notes: The translation preserves the exact Coptic tense structure, including
  the shift to the future tense at the end of the saying, which differs slightly from
  the Greek fragment in P.Oxy. 1. The attributive circumstantial clauses are rendered
  smoothly into English while maintaining their modifying relationship to 'city' and
  'mountain'.
