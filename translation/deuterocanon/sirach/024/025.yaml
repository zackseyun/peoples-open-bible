translation:
  text: It fills with wisdom like the Pishon[d][c][b][a], and like the Tigris in the days of firstfruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'in the days of new growth' or, more literally, 'in the days of new things'; the Greek phrase is difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'He who pours out wisdom like Pishon, and like the Tigris in the days of firstfruits.'.
