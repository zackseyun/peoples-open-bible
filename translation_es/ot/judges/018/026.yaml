translation:
  language: es
  text: Entonces los hijos de Dan siguieron su camino, y Micaía vio que ellos eran más fuertes que él, así que se volvió y regresó a su casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los danitas
  - el pueblo de Dan
  lexicon: HALOT
  rationale: «Hijos de Dan» conserva la expresión familiar y tribal del hebreo sin sustituirla por un etnónimo más interpretativo. En español es natural y mantiene la transparencia del texto fuente.
- source_word: לְדַרְכָּם
  english_pob_choice: went on their way
  chosen_spanish: siguieron su camino
  alternatives_spanish:
  - fueron por su camino
  - continuaron su camino
  lexicon: HALOT
  rationale: La frase hebrea es idiomática; «siguieron su camino» comunica continuidad del viaje de forma natural en español y preserva la imagen de camino/ruta.
- source_word: חֲזָקִים הֵמָּה מִמֶּנּוּ
  english_pob_choice: they were stronger than he was
  chosen_spanish: eran más fuertes que él
  alternatives_spanish:
  - eran demasiado fuertes para él
  - eran más fuertes que él mismo
  lexicon: HALOT
  rationale: El comparativo con מן se expresa bien con «más fuertes que». Se evita una ampliación interpretativa como «demasiado fuertes para él», que intensifica el sentido más allá de lo exigido por el hebreo.
- source_word: וַיִּפֶן
  english_pob_choice: he turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - dio la vuelta
  lexicon: HALOT
  rationale: «Se volvió» refleja el acto de girarse/volverse sin cargar redundancia innecesaria. En español suena natural y deja espacio al verbo siguiente de retorno.
- source_word: וַיָּשָׁב אֶל בֵּיתוֹ
  english_pob_choice: went back to his house
  chosen_spanish: regresó a su casa
  alternatives_spanish:
  - volvió a su casa
  - fue de vuelta a su casa
  lexicon: HALOT
  rationale: «Regresó» expresa bien שׁוב y mantiene la dirección «a su casa». «Casa» conserva בית de manera más directa que «hogar», aunque en contexto puede implicar ambos.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  lexicon: HALOT
  rationale: «Casa» es la correspondencia léxica directa de בית. En este contexto puede entenderse como residencia/domicilio sin perder fidelidad al término fuente.
translation_notes:
  revision_awareness: This draft follows the source Hebrew directly and remains consistent with the English POB audit trail, especially in preserving the sequence of motion verbs and the comparative force of חזק with מן. No textual or theological revisions were applied in the audited English pass.
  spanish_consistency_notes:
  - Se mantiene el nombre «Micaía» de forma consistente con la transliteración hispana común del nombre מִיכָה.
  - 'Se conserva el paralelismo narrativo de dos movimientos sucesivos: primero «se volvió», luego «regresó a su casa».'
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios, y evita reemplazar «hijos de Dan» por una forma más interpretativa.
