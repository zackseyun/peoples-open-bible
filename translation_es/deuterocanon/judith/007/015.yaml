translation:
  language: es
  text: Y les pagarás[a] con una mala retribución, porque se rebelaron y no salieron a encontrarte[b] en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'les pagarás una mala retribución', una construcción cognada que intensifica la idea de retribución o represalia.
    reason: lexical_alternative
  - marker: b
    text: O 'no salieron a recibirte en paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδώσεις
  english_pob_choice: you will repay
  chosen_spanish: les darás... retribución
  alternatives_spanish:
  - les pagarás de vuelta
  - les recompensarás
  lexicon: BDAG
  rationale: El verbo expresa dar en respuesta, con sentido de retribución. En español, 'dar... retribución' comunica bien la acción futura y permite conservar el paralelismo con ἀνταπόδομα sin sonar demasiado mecánico.
- source_word: ἀνταπόδομα πονηρόν
  english_pob_choice: an evil recompense
  chosen_spanish: una mala retribución
  alternatives_spanish:
  - una retribución malvada
  - un mal pago
  lexicon: LEH
  rationale: El sustantivo cognado intensifica la idea de retribución. 'Retribución' preserva esa relación léxica con el verbo y 'mala' transmite πονηρόν de forma clara en español moderno sin suavizar el juicio.
- source_word: ἀνθʼ ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - en razón de que
  - por cuanto
  lexicon: BDAG
  rationale: La expresión introduce la base causal de la retribución. 'Porque' es la forma más natural y fiel en español para esta relación causal.
- source_word: ἐστασίασαν
  english_pob_choice: they rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - se sublevaron
  - causaron disensión
  lexicon: LEH
  rationale: El verbo implica una postura de rebelión o insurrección. 'Se rebelaron' es directo, idiomático y conserva la fuerza hostil del original.
- source_word: οὐκ ἀπήντησαν
  english_pob_choice: did not meet
  chosen_spanish: no salieron a encontrarte
  alternatives_spanish:
  - no te encontraron
  - no fueron a recibirte
  lexicon: BDAG
  rationale: El griego suele significar 'salir al encuentro'. En español, 'salieron a encontrarte' o 'no salieron a encontrarte' expresa mejor el movimiento implícito que un simple 'encontrarte'.
- source_word: τῷ προσώπῳ σου
  english_pob_choice: you
  chosen_spanish: encontrarte
  alternatives_spanish:
  - tu rostro
  - tu presencia
  lexicon: LEH
  rationale: Aunque literalmente dice 'tu rostro', el modismo apunta a la persona misma. En español se integra de forma natural con el verbo de encuentro y evita un calco innecesario.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: BDAG
  rationale: '''En paz'' en español suena natural y conserva el matiz de acercamiento amistoso o de sumisión pacífica que deja abierto el griego.'
theological_decisions:
- issue: Requisito de una retribución divina ante rebelión y falta de paz
  english_pob_reading: A prayer that God repay the offenders for rebellion and failure to approach peacefully
  chosen_spanish_reading: Una afirmación-oración dirigida a Dios para que dé una retribución mala por la rebelión y por no acercarse en paz
  alternative_spanish_readings:
  - Una afirmación general sobre justicia divina
  - Una simple predicción de castigo
  rationale: El futuro verbal, en contexto, funciona como apelación/confianza ante Dios. La traducción conserva ese tono directo sin convertirlo en una explicación doctrinal más amplia que el versículo no explicita.
  doctrine_reference: Preservar la tensión retórica y oracional del texto; primacía del original sobre la tradición de lectura.
translation_notes:
  revision_awareness: La redacción sigue la lectura más reciente del POB inglés, que prefirió 'evil recompense' frente a 'evil repayment' por naturalidad formal, pero conserva en español la relación cognada entre el verbo y el sustantivo mediante 'darás... retribución'. También se mantiene la alternativa de movimiento implícito en ἀπήντησαν.
  spanish_consistency_notes:
  - Se usa 'retribución' para mantener el vínculo léxico con ἀνταπόδομα.
  - Se traduce el modismo de 'tu rostro' como encuentro personal, no como rasgo físico.
  - '''En paz'' conserva el registro bíblico sin arcaísmo excesivo.'
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino ni una cita directa de YHWH.
