revisions:
- from: Él extiende su tienda junto a ella[a], y se hospeda en un buen alojamiento[b].
  to: Él planta su tienda junto a ella[a], y se aloja en una buena morada[b].
  rationale: Se ajusta 'extiende' a 'planta' para reflejar mejor el modismo de montar una tienda en contexto de campamento. También se mejora la naturalidad de la segunda cola con 'se aloja en una buena morada', manteniendo la imagen concreta de habitación y preservando como nota la alternativa más cercana al borrador.
