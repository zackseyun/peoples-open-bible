translation:
  language: es
  text: 'Y de[a] los hijos de Harim: Eliezer, Isshijah[b], Malkijah, Shemaiah y Shimeón[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Y los hijos de Harim: Eliezer, Isshijah, Malkijah, Shemaiah y Shimeón», si la frase se toma como un simple encabezado de lista en vez de expresar explícitamente «de».'
