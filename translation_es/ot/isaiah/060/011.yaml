revisions:
- from: Tus puertas estarán abiertas[a] continuamente; de día y de noche no serán cerradas, para traer a ti la riqueza de las naciones[b], y sus reyes, llevados en procesión.
  to: Tus puertas estarán abiertas[a] continuamente; de día y de noche no serán cerradas, para que te sea traída la riqueza de las naciones[b], con sus reyes llevados en procesión[c].
  rationale: Se ajusta la redacción para un español más natural y fiel al propósito del infinitivo hebreo ('para que te sea traída'), se cambia 'y sus reyes' por 'con sus reyes' para conservar el sentido acompañante documentado en la auditoría inglesa, y se añade una nota para preservar la ambigüedad léxica de נְהוּגִים.
