review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea y preserva la bendición abrahámica, la descendencia y la posesión de la tierra. Sin embargo, 'tierra de tus peregrinaciones' no refleja con suficiente precisión מְגֻרֶיךָ, que apunta a la tierra donde Jacob reside como forastero/sojourns, no principalmente a viajes o peregrinaje. Además, la nota b actual repite prácticamente el texto principal en lugar de ofrecer la alternativa documentada por el POB inglés ('heredar').
  spanish_quality_summary: El español es claro y digno, pero 'peregrinaciones' suena algo desviado hacia desplazamientos devocionales o viajes, y menos hacia residencia temporal como forastero. 'La tierra donde has residido como forastero' suena más natural y exacto en español bíblico moderno. El resto del versículo fluye bien.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: אֱלֹהִים se traduce correctamente como ''Dios''; la bendición de Abraham se conserva; ''descendencia'' representa bien זַרְעֲךָ como colectivo singular. El ajuste principal es semántico para מְגֻרֶיךָ y la nota alternativa de לְרִשְׁתְּךָ.'
  issues:
  - severity: medium
    issue: '"peregrinaciones" para מְגֻרֶיךָ'
    rationale: En español suele evocar viajes o peregrinaje, mientras que el hebreo destaca la condición de residente forastero/estancia temporal en la tierra.
  - severity: medium
    issue: La nota b no preserva la alternativa principal del POB inglés
    rationale: La evidencia auditada conserva la opción 'inherit the land of your sojournings'; la nota española debería reflejar esa alternativa léxica, no solo explicar el matiz de 'peregrinaciones'.
  revised_spanish_text: Que te conceda la bendición de Abraham[a], a ti y a tu descendencia contigo, para que poseas[b] la tierra donde has residido como forastero, que Dios dio a Abraham.
  revised_footnotes:
