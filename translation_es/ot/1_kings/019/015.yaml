translation:
  language: es
  text: 'Yahvé le dijo: «Ve, vuelve por tu camino al desierto de Damasco[a]; y cuando llegues, ungirás a Hazael como rey sobre Aram[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacia el desierto de Damasco». La forma hebrea de «desierto» incluye un sufijo direccional.'
    reason: lexical_alternative
  - marker: b
    text: Aram es el nombre hebreo que con frecuencia se vierte «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md; HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, siguiendo el criterio POB de no sustituirlo por un título. «Yahvé» es la forma española establecida en el proyecto para preservar el nombre personal de Dios.
- source_word: לֵךְ שׁוּב
  english_pob_choice: Go, return
  chosen_spanish: Ve, vuelve
  alternatives_spanish:
  - Ve y vuelve
  - Anda, regresa
  lexicon: HALOT
  rationale: Los dos imperativos se mantienen en español para reflejar la doble fuerza del hebreo. «Ve, vuelve» conserva el movimiento ordenado sin suavizarlo en una sola idea.
- source_word: לְדַרְכְּךָ
  english_pob_choice: by your way
  chosen_spanish: por tu camino
  alternatives_spanish:
  - en tu camino
  - siguiendo tu camino
  lexicon: HALOT
  rationale: «Por tu camino» reproduce de manera natural la relación instrumental o modal del hebreo y sigue la revisión inglesa que prefería reflejar con más precisión el idiomatismo.
- source_word: מִדְבָּרָה דַמָּשֶׂק
  english_pob_choice: to the wilderness of Damascus
  chosen_spanish: al desierto de Damasco
  alternatives_spanish:
  - hacia el desierto de Damasco
  - al yermo de Damasco
  lexicon: HALOT
  rationale: «Desierto» comunica el sentido habitual de מִדְבָּר en español bíblico actual. Se conserva la relación geográfica con Damasco sin añadir explicaciones ajenas al texto.
- source_word: וּבָאתָ
  english_pob_choice: when you arrive
  chosen_spanish: y cuando llegues
  alternatives_spanish:
  - y llegarás
  - al llegar
  lexicon: HALOT
  rationale: Se expresa la secuencia temporal implícita en el hebreo como condición de llegada, siguiendo la función contextual que el inglés POB captó con «when you arrive».
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - y ungirás
  - deberás ungir
  lexicon: HALOT
  rationale: El verbo se traduce con el futuro de mandato en español para conservar el tono directivo y solemne del encargo.
- source_word: חֲזָאֵל
  english_pob_choice: Hazael
  chosen_spanish: Hazael
  alternatives_spanish:
  - Jazael
  lexicon: NPN
  rationale: Se translitera el nombre propio de manera estándar, sin adaptar innecesariamente la forma hebrea.
- source_word: לְמֶלֶךְ עַל אֲרָם
  english_pob_choice: as king over Aram
  chosen_spanish: como rey sobre Aram
  alternatives_spanish:
  - para rey sobre Aram
  - como rey de Aram
  lexicon: HALOT
  rationale: La fórmula de investidura se vierte con «como rey sobre» para conservar la relación de nombramiento y el dominio indicado por עַל. Se retiene «Aram» según la preferencia POB por el nombre hebreo directo.
theological_decisions:
- issue: Nombre divino del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso contiene יְהוָה directamente; por la doctrina del proyecto, se preserva el nombre revelado de Dios en lugar de una sustitución titulatina. «Yahvé» mantiene esa decisión en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aram como nombre propio en vez de equivalencia tradicional
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se conserva el nombre histórico y bíblico directo del texto hebreo. «Siria» sería una equivalencia convencional posterior; aquí no se adopta porque el POB inglés eligió «Aram».
  doctrine_reference: POB geographical-name consistency; lexical audit trail for אֲרָם
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la preposición para reflejar mejor el hebreo idiomático de לְדַרְכְּךָ (“by your way”). En español se resolvió con «por tu camino», manteniendo esa precisión sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «Aram» y no «Siria», en línea con la preferencia POB documentada.
  - Se usa un futuro de mandato en «ungirás» para reflejar el valor exhortativo de la secuencia verbal hebrea.
  - Las notas al pie usan marcadores únicos y están ancladas en el texto principal.
