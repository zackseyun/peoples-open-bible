review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé como sujeto del juramento, la firmeza del compromiso, la negativa a retractarse y la promesa dinástica acerca de un descendiente de David en su trono. Sin embargo, dos giros españoles no preservan bien el valor idiomático ni la naturalidad del original/POB: «con verdad» suena torpe y opaco para אֱמֶת en aposición al juramento, y «no se volverá de ello» no es español natural para לֹא יָשׁוּב מִמֶּנָּה. Conviene reparar ambos sin perder la tensión léxica documentada.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero contiene calcos poco idiomáticos. «Yahvé juró a David con verdad» no suena natural en español bíblico moderno; «con un juramento seguro» comunica mejor el sentido principal, dejando «verdad» como alternativa en nota. Asimismo, «no se volverá de ello» debe cambiarse por «no se retractará de él», que transmite con claridad el sentido de retirarse del juramento. El resto —«Del fruto de tu vientre pondré uno sobre tu trono»— es legible y fiel.
  glossary_alignment: Alinea correctamente «Yahvé» para יהוה y conserva la promesa dinástica sin explicitar el cumplimiento mesiánico en el texto principal. No hay conflicto con la terminología doctrinal del proyecto. La decisión sobre אֱמֶת debe ajustarse para reflejar mejor la solución documentada del POB inglés («a sure oath») en español natural, manteniendo «verdad» en nota como alternativa literal.
  issues:
  - severity: medium
    issue: «con verdad» para אֱמֶת en el texto principal
    rationale: Aunque recoge el núcleo léxico de «verdad», en español no comunica de forma natural la función de אֱמֶת como intensificador/apposición del juramento. El POB inglés justificó «a sure oath» por claridad idiomática; el español debe hacer algo equivalente.
  - severity: medium
    issue: «no se volverá de ello» es un calco poco natural
    rationale: La frase intenta preservar la metáfora de שוב מן, pero en español resulta forzada y poco clara. «No se retractará de él» comunica con fidelidad el sentido de no retirarse del juramento.
  - severity: low
    issue: Nota a con duplicación de «con verdad»
    rationale: Si el texto principal deja de usar «con verdad», la nota puede organizar mejor las alternativas, empezando por la opción más literal («verdad» / «un juramento verdadero») y explicando la elección principal.
