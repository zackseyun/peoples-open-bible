translation:
  language: es
  text: Y adornaron el frente del templo con coronas de oro[a] y pequeños escudos, y renovaron los portones y las cámaras laterales, y les pusieron puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guirnaldas de oro»; el griego στεφάνοις puede designar coronas ornamentales o guirnaldas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεκόσμησαν
  english_pob_choice: adorned
  chosen_spanish: adornaron
  alternatives_spanish:
  - decoraron
  - ornamentaron
  lexicon: LSJ
  rationale: El verbo expresa embellecer o engalanar con ornamentos; «adornaron» comunica bien ese sentido sin volverlo técnico en exceso.
- source_word: τὸ κατὰ πρόσωπον τοῦ ναοῦ
  english_pob_choice: the front of the temple
  chosen_spanish: la parte frontal del templo
  alternatives_spanish:
  - la fachada del templo
  - lo que está delante del templo
  lexicon: LSJ
  rationale: La frase griega designa lo que está de frente o delante del templo. «Parte frontal» conserva la referencia espacial con español natural.
- source_word: στεφάνοις χρυσοῖς
  english_pob_choice: golden crowns
  chosen_spanish: coronas de oro
  alternatives_spanish:
  - guirnaldas de oro
  - coronas doradas
  lexicon: LSJ
  rationale: «Στέφανος» puede ser corona o guirnalda. «Coronas de oro» mantiene la elección principal de la POB inglesa y sigue siendo compatible con el sentido ornamental del contexto.
- source_word: ἀσπιδίσκαις
  english_pob_choice: small shields
  chosen_spanish: escuditos
  alternatives_spanish:
  - pequeños escudos
  - rodelitas
  lexicon: LSJ
  rationale: El diminutivo pide una forma diminutiva en español. «Escuditos» conserva el valor de objeto pequeño y ornamental mejor que una expresión más pesada.
- source_word: ἐνεκαίνισαν
  english_pob_choice: renewed
  chosen_spanish: renovaron
  alternatives_spanish:
  - rededicaron
  - restauraron
  lexicon: LSJ
  rationale: Aquí el verbo se aplica a puertas y cámaras, por lo que la idea de renovar/restaurar es más precisa que una rededicación ceremonial.
- source_word: πύλας
  english_pob_choice: gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - los portones
  - las entradas
  lexicon: LSJ
  rationale: Aunque πύλαι puede ser «puertas» o «portones», en español «puertas» es claro y funciona bien con el paralelo inmediato de ponerles puertas.
- source_word: παστοφόρια
  english_pob_choice: side chambers
  chosen_spanish: las cámaras laterales
  alternatives_spanish:
  - las habitaciones laterales
  - los aposentos laterales
  - las dependencias laterales
  lexicon: LSJ
  rationale: El término alude a habitaciones anexas al complejo del templo. «Cámaras laterales» reproduce la relación espacial sin imponer una función demasiado específica.
- source_word: ἐθύρωσαν
  english_pob_choice: fitted them with doors
  chosen_spanish: les pusieron puertas
  alternatives_spanish:
  - los dotaron de puertas
  - les instalaron puertas
  lexicon: LSJ
  rationale: El verbo significa proveer de puertas. «Les pusieron puertas» es natural en español y mantiene la acción concreta.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellas
  - a estos
  lexicon: LSJ
  rationale: El pronombre retoma colectivamente las puertas y las cámaras laterales; en español, el dativo «les» fluye mejor que un repetido «a ellas».
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el marcador [a] directamente en el texto, junto a la expresión correspondiente, para que la nota quede anclada correctamente.
  spanish_consistency_notes:
  - Se mantuvo el estilo sobrio y público de la POB en español.
  - Se preservó la distinción entre puertas y cámaras laterales.
  - Se evitó una traducción demasiado técnica de παστοφόρια, optando por una expresión clara y auditably cercana al griego.
