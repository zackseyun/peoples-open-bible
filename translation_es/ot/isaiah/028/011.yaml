translation:
  language: es
  text: Porque con labios burlones[a] y con otra lengua[b] hablará a este pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con labios tartamudos»; algunas traducciones entienden que la expresión destaca el habla ininteligible más que la burla.
    reason: lexical_alternative
  - marker: b
    text: «Otra lengua» significa un idioma extranjero; la expresión probablemente alude a Dios hablando en juicio por medio de invasores extranjeros.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: La conjunción introduce la explicación o razón del dicho anterior; en español, «Porque» preserva bien esa relación lógica y mantiene el tono profético.
- source_word: בְּלַעֲגֵי שָׂפָה
  english_pob_choice: with mocking lips
  chosen_spanish: con labios de burla
  alternatives_spanish:
  - con labios burlones
  - con labios de escarnio
  - con labios tartamudos
  lexicon: HALOT
  rationale: La raíz לַעַג apunta a burla, escarnio o mofa. «Con labios de burla» conserva ese sentido léxico y evita resolver de antemano la tensión con la lectura alternativa de habla ininteligible.
- source_word: וּבְלָשׁוֹן אַחֶרֶת
  english_pob_choice: and with another tongue
  chosen_spanish: y con otra lengua
  alternatives_spanish:
  - y con otro idioma
  - y con lengua extranjera
  lexicon: HALOT
  rationale: לָשׁוֹן puede significar literalmente «lengua» o por extensión «idioma». «Otra lengua» mantiene la imagen hebrea y sigue siendo inteligible en español, sin perder la posible referencia a lengua extranjera.
- source_word: יְדַבֵּר
  english_pob_choice: he will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - hablará él
  - dirá
  lexicon: HALOT
  rationale: El imperfecto se lee naturalmente como futuro profético. En español, «hablará» reproduce el valor verbal sin añadir un sujeto explícito que el hebreo no nombra.
- source_word: אֶל הָעָם הַזֶּה
  english_pob_choice: to this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a este pueblo
  - a esta gente
  lexicon: HALOT
  rationale: עָם suele ser «pueblo». «A este pueblo» conserva el deíctico y el tono profético de la acusación o anuncio dirigido al oyente colectivo.
theological_decisions:
- issue: Sentido de la expresión sobre la lengua extraña o burla
  english_pob_reading: The verse refers to God addressing Judah through foreign-speaking invaders, expressed as 'with mocking lips and with another tongue.'
  chosen_spanish_reading: El versículo puede leerse como anuncio de juicio por medio de labios de burla y otra lengua, sin cerrar del todo si la imagen destaca la burla, la incomprensibilidad del habla o ambas cosas.
  alternative_spanish_readings:
  - La frase podría entenderse principalmente como habla ininteligible o tartamudeante.
  - También podría leerse como referencia explícita a una lengua extranjera en contexto de invasión.
  rationale: La forma hebrea לַעֲגֵי permite conservar la idea de burla o mofa, mientras que otras traducciones enfatizan la dificultad de entender el habla. La decisión española mantiene esa tensión y no la resuelve artificialmente; el contexto de juicio queda implícito sin sobreinterpretar el agente en el texto principal.
  doctrine_reference: Preservar la tensión semántica del original y la primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Coincide con el último pase del audit trail: no hubo revisiones aplicadas y el estado final fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual para el nombre divino cuando aparezca en el contexto mayor; en este versículo no aparece explícitamente.
  - Se mantiene «pueblo» para עָם, evitando «nación» para no desplazar el matiz profético y colectivo.
  - Se conserva «lengua» como equivalente de לָשׁוֹן para respetar la metáfora hebrea, con la nota que aclara el posible sentido de idioma.
