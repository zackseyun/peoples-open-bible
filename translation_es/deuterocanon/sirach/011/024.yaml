translation:
  language: es
  text: Hijo mío[a], mantente en tu porción asignada y camina en ella[b], y envejece en tu trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «No digas: “Me basta a mí, y ¿qué mal me vendrá desde ahora?”». El hebreo conservado aquí difiere considerablemente de la tradición griega.'
    reason: alternative_reading
  - marker: b
    text: El hebreo בחקך es difícil. Puede significar algo como «tu porción asignada», «tu esfera prescrita» o «tu camino/regla».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Mi hijo
  lexicon: HALOT
  rationale: Vocativo paternal directo. En español, 'Hijo mío' conserva el tono exhortativo y afectivo del hebreo sin neutralizar el género del hablante ni volverlo más formal de lo necesario.
- source_word: עֲמוֹד
  english_pob_choice: stand by
  chosen_spanish: mantente
  alternatives_spanish:
  - permanece
  - ponte de pie junto a
  - sostente
  lexicon: HALOT
  rationale: La idea no es solo postura física, sino perseverancia y firmeza. 'Mantente' comunica continuidad y fidelidad en una forma natural de español bíblico moderno.
- source_word: בְּחֻקֶּךָ
  english_pob_choice: your appointed lot
  chosen_spanish: en tu lote asignado
  alternatives_spanish:
  - en tu porción asignada
  - en tu esfera prescrita
  - en tu lote nombrado
  lexicon: HALOT
  rationale: El hebreo es difícil y el contexto, con el testimonio griego, sugiere una porción o esfera asignada más que una 'ley' en sentido jurídico. 'Lote asignado' preserva la noción de una parte determinada y evita imponer un matiz legal que el contexto no exige.
- source_word: וּבוֹ הִתְהַלֵּךְ
  english_pob_choice: and walk in it
  chosen_spanish: y camina en él
  alternatives_spanish:
  - y conductúrate en él
  - y sigue por él
  - y anda en él
  lexicon: HALOT
  rationale: La metáfora hebrea de caminar expresa conducta sostenida. 'Camina en él' es idiomático en español y mantiene la imagen de perseverar dentro del camino o porción recibida.
- source_word: וּבִמְלָאכְתְּךָ
  english_pob_choice: in your work
  chosen_spanish: en tu trabajo
  alternatives_spanish:
  - en tu labor
  - en tu ocupación
  - en tu quehacer
  lexicon: HALOT
  rationale: מלאכה abarca trabajo, labor u ocupación. 'Trabajo' es el término más claro y amplio en español contemporáneo sin perder el sentido ocupacional.
- source_word: הִתְיַשֶּׁן
  english_pob_choice: grow old
  chosen_spanish: envejece
  alternatives_spanish:
  - hazte viejo
  - crece en años
  - llega a viejo
  lexicon: HALOT
  rationale: El hebreo apunta a hacerse viejo o llegar a la vejez en el transcurso de la ocupación, no necesariamente a agotarse. 'Envejece' conserva la duración prolongada y el sentido de perseverancia.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el testimonio griego paralelo
  english_pob_reading: Translate the extant Hebrew as the primary witness while allowing the Greek to inform the contextual sense of the difficult Hebrew term בחקך.
  chosen_spanish_reading: Seguir el hebreo como texto principal y reflejar la posible idea de porción asignada en 'lote asignado', sin ocultar la variante griega.
  alternative_spanish_readings:
  - 'Traducir solo desde el griego: ''No digas: “Me basta a mí, y ¿qué mal me vendrá desde ahora?”'''
  - Traducir 'בְּחֻקֶּךָ' como 'tu estatuto' en sentido legal
  rationale: En Sirácida, cuando el hebreo se conserva, la práctica es darle prioridad. Sin embargo, aquí el paralelo griego es una alternativa significativa y muestra una tradición textual distinta. La traducción española sigue el hebreo, pero la formulación elegida deja ver que se trata de una porción asignada, no de una ley formal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el griego paralelo como testimonio real y preservar honestamente la incertidumbre.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que prefirió 'appointed lot' en lugar de 'allotted way'. La versión española conserva esa preferencia con 'lote asignado', manteniendo además la lectura hebrea principal y la nota al testimonio griego.
  spanish_consistency_notes:
  - Se mantiene 'Hijo mío' para el vocativo sapiencial.
  - Se evita 'SEÑOR' o lenguaje litúrgico no presente en el versículo.
  - '''Lote asignado'' conserva la tensión léxica de חקך sin convertirlo en ''estatuto'' jurídico.'
  - La nota al pie separa claramente la variante griega del problema léxico del hebreo.
