translation:
  language: es
  text: 'Un cántico. Un salmo de los hijos de Coré. Al director del coro: según Mahalat Leannot[a]. Maskil[b] de Hemán, el ezraíta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «Mahalat Leannot» es incierta. Puede referirse a una tonada o estilo musical; otras propuestas incluyen «según Mahalat, para cantar responsivamente» o «según Mahalat, acerca de la aflicción».
    reason: lexical_alternative
  - marker: b
    text: «Maskil» es un término técnico en los encabezamientos de los salmos, a menudo entendido como una composición instructiva o contemplativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Un cántico
  alternatives_spanish:
  - Una canción
  - Un canto
  lexicon: HALOT
  rationale: En un encabezamiento poético, «cántico» comunica el género con dignidad y evita la banalidad de «canción». Mantiene la función de rótulo genérico del hebreo שִׁיר sin sobreinterpretarlo.
- source_word: מִזְמ֗וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un salmo musical
  - Un himno
  lexicon: HALOT
  rationale: Es el equivalente establecido y preciso para מִזְמ֗וֹר en los encabezamientos de los Salmos. Conserva el valor genérico/litúrgico del término.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  - perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: La preposición hebrea admite relación de autoría, pertenencia o dedicación. «De los hijos de Coré» preserva esa ambigüedad mejor que imponer «para».
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director de música
  - Al maestro de coro
  lexicon: HALOT
  rationale: «Director del coro» refleja bien la función musical del encabezamiento en español contemporáneo y mantiene la dirección/encargo implícitos en לַמְנַצֵּחַ.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con la melodía de
  - sobre
  lexicon: HALOT
  rationale: En encabezamientos musicales, עַל puede introducir una melodía, estilo o indicación de ejecución. «Según» conserva la indeterminación técnica del original, como en la tradición textual auditada.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalat
  alternatives_spanish:
  - Mahalat (nombre de tonada)
  - Mahalat (término musical)
  lexicon: HALOT
  rationale: Se translitera para no fijar un significado incierto. La forma española normaliza la vocalización sin añadir una explicación que el hebreo no garantiza.
- source_word: לְעַנּוֹת
  english_pob_choice: Leannoth
  chosen_spanish: Leannot
  alternatives_spanish:
  - para responder
  - para cantar responsivamente
  - para la aflicción
  lexicon: HALOT
  rationale: Se conserva como término técnico transliterado porque su fuerza exacta en el encabezamiento es debatida. La variante española refleja la vocalización adaptada al sistema ortográfico del español sin resolver la ambigüedad.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - Un maskil
  - Poema didáctico
  lexicon: HALOT
  rationale: Es un término técnico de encabezamiento; la transliteración preserva su carácter especializado y evita una paráfrasis doctrinal o estilística que no está asegurada por el texto.
- source_word: לְהֵימָן
  english_pob_choice: of Heman
  chosen_spanish: de Hemán
  alternatives_spanish:
  - para Hemán
  - perteneciente a Hemán
  lexicon: HALOT
  rationale: Como en otros encabezamientos con ל, la relación puede ser autoral o asociativa. «De Hemán» es breve, natural y fiel a esa ambigüedad.
- source_word: הָאֶזְרָחִי
  english_pob_choice: the Ezrahite
  chosen_spanish: el ezraíta
  alternatives_spanish:
  - el efrateo
  - el zeraíta
  lexicon: HALOT
  rationale: Se conserva el gentilicio tradicional en forma transparente al español. La minúscula evita convertirlo en nombre propio y mantiene la identificación étnica/geográfica del hebreo.
theological_decisions:
- issue: Encabezamiento musical y autoría/relación de los genitivos con ל
  english_pob_reading: 'The superscription preserves ambiguity: songs of association, dedication, or authorship rather than forcing a single relation.'
  chosen_spanish_reading: Los genitivos con «de» mantienen la misma ambigüedad entre autoría, pertenencia y dedicación.
  alternative_spanish_readings:
  - para los hijos de Coré
  - para Hemán
  rationale: En español, «de» es la opción más neutral y fiel a la elasticidad del hebreo en títulos de salmos. Evita imponer una relación que el texto no especifica.
  doctrine_reference: Principio de fidelidad textual y prudencia exegética en encabezamientos poéticos
- issue: Mahalat Leannot como expresión incierta
  english_pob_reading: The expression 'Mahalath Leannoth' is uncertain. It may refer to a tune or musical style; other proposals include responsive singing or affliction.
  chosen_spanish_reading: Mahalat Leannot se conserva como expresión incierta y técnica, sin resolver su referencia.
  alternative_spanish_readings:
  - según Mahalat, para cantar responsivamente
  - según Mahalat, acerca de la aflicción
  rationale: El hebreo no obliga a una interpretación única. Mantener la transliteración y una nota permite respetar la tensión léxica documentada por el POB en inglés.
  doctrine_reference: Transparencia textual y preservación de incertidumbre léxica
- issue: Maskil como término técnico
  english_pob_reading: '''Maskil'' is a technical term in psalm headings, often understood as an instructive or contemplative composition.'
  chosen_spanish_reading: Maskil se conserva sin traducción interpretativa en el texto principal.
  alternative_spanish_readings:
  - poema didáctico
  - canto contemplativo
  - composición instructiva
  rationale: Traducirlo de modo fijo reduciría una categoría técnica que el propio audit trail trata como ambigua. La transliteración permite una nota explicativa sin sobredeterminar el género.
  doctrine_reference: Respeto por términos técnicos no resueltos
- issue: Heman the Ezrahite as identification
  english_pob_reading: The heading identifies Heman with the gentilic 'the Ezrahite,' retaining the traditional English form.
  chosen_spanish_reading: Hemán, el ezraíta, mantiene la identificación gentilicia sin añadir inferencias históricas.
  alternative_spanish_readings:
  - Hemán, el zeraíta
  - Hemán, el efrateo
  rationale: No hay base suficiente en este versículo para decidir entre propuestas etimológicas o históricas; la forma tradicional en español conserva la identificación del texto.
  doctrine_reference: Precisión onomástica y cautela histórica
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue de cerca el estado auditado final en inglés y traslada su mismo nivel de cautela léxica al español.
  spanish_consistency_notes:
  - Se usó «Coré» y «Hemán» con acento ortográfico español consistente.
  - Se evitó «SEÑOR» porque aquí no aparece el Tetragrámaton.
  - Se mantuvo la transliteración de los términos técnicos inciertos para no cerrar indebidamente su sentido.
  - «Al director del coro» funciona como equivalente natural y eufónico de la función musical del encabezamiento.
