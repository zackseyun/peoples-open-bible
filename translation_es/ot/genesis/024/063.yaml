translation:
  language: es
  text: Y salió Isaac a meditar en el campo al atardecer[a]; alzó sus ojos y miró, y he aquí que venían camellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caminar», «reflexionar», «conversar» o posiblemente «orar» en el campo. El verbo hebreo es raro y su matiz preciso aquí es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - fue hacia afuera
  lexicon: HALOT
  rationale: El verbo hebreo indica salida física. «Salió» es natural en español y conserva la secuencia narrativa sin añadir matices no presentes.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: transliteración estándar
  rationale: Nombre propio; se mantiene la forma usual en español bíblico.
- source_word: לָשׂוּחַ
  english_pob_choice: to meditate
  chosen_spanish: meditar
  alternatives_spanish:
  - pasear
  - musear
  - conversar
  - orar
  lexicon: HALOT
  rationale: El infinitivo es raro y de sentido debatido. «Meditar» comunica actividad reflexiva y solitaria, coherente con el contexto, sin fijar indebidamente una acción concreta como oración.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: שׂדה designa el campo o terreno abierto. «En el campo» es la opción más directa e idiomática en español.
- source_word: לִפְנוֹת עָרֶב
  english_pob_choice: toward evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - hacia la tarde
  - cuando caía la tarde
  - al caer la tarde
  lexicon: HALOT
  rationale: La expresión marca el acercamiento de la tarde/noche. «Al atardecer» transmite bien esa transición con naturalidad en español.
- source_word: וַיִּשָּׂא עֵינָיו
  english_pob_choice: he lifted up his eyes
  chosen_spanish: alzó sus ojos
  alternatives_spanish:
  - levantó sus ojos
  - alzando los ojos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de levantar los ojos, sin reducirla a un simple «miró», porque el texto distingue este gesto del verbo siguiente.
- source_word: וַיַּרְא
  english_pob_choice: and looked
  chosen_spanish: y miró
  alternatives_spanish:
  - y vio
  lexicon: HALOT
  rationale: Después de «alzó sus ojos», aquí el verbo funciona como acto de enfocar la vista. «Miró» evita la repetición mecánica de «ver» y conserva la secuencia narrativa.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y miren
  lexicon: HALOT
  rationale: Expresa la partícula deíctica que introduce una escena repentina o llamativa. «Y he aquí que» mantiene la vivacidad narrativa con un registro bíblico claro.
- source_word: גְמַלִּים בָּאִים
  english_pob_choice: camels were coming
  chosen_spanish: venían camellos
  alternatives_spanish:
  - camellos se acercaban
  - camellos iban viniendo
  lexicon: HALOT
  rationale: El participio indica acción en curso. «Venían camellos» conserva el movimiento de aproximación y suena natural en español.
theological_decisions:
- issue: La traducción de לָשׂוּחַ, cuyo sentido es incierto y puede implicar meditar, caminar, musitar, conversar o incluso orar.
  english_pob_reading: to meditate, with footnote preserving alternatives and uncertainty
  chosen_spanish_reading: meditar, con nota que conserva las alternativas y la incertidumbre
  alternative_spanish_readings:
  - caminar
  - musear
  - conversar
  - orar
  rationale: No conviene cerrar el sentido de un verbo raro cuando el propio testimonio léxico lo presenta como debatido. Se mantiene una opción principal sobria y se documentan las alternativas en nota.
  doctrine_reference: Principio de cautela exegética; no afirmar más de lo que el texto permite.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje; se sigue el consenso alto del audit trail inglés, conservando la ambigüedad documentada de לָשׂוּחַ y la secuencia narrativa de los verbos hebreos.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes; aquí no aparece ninguna referencia divina explícita.
  - Se mantiene «camellos» en plural, reflejando el hebreo גְמַלִּים.
  - Se conserva la distinción entre «alzó» y «miró» para reflejar los dos verbos hebreos consecutivos.
