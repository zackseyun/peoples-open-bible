  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문은 ΒΑΣΙΛΕΥΣ ΒΑΣΙΛΕΩΝ ΚΑΙ ΚΥΡΙΟΣ ΚΥΡΙΩΝ로, 대문자로 기록된 명문(銘文) 형식이다. 한국어에서는 대문자 표기가 불가능하므로 따옴표로 명문을 표시한다.
    reason: typographic_note
