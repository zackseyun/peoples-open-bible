base_translation:
  language: en
  yaml_path: translation/ot/numbers/003/035.yaml
  text: And the chief of the ancestral house of the clans of Merari was Zuriel son of Abihail[b][a]. They were to camp on the north side of the tabernacle.
  footnotes:
