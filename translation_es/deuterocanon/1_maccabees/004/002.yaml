  - severity: medium
    issue: La nota [a] está colocada sobre «de repente», pero la nota trata de «Akra/ciudadela».
    rationale: El anclaje actual crea una referencia engañosa. El marcador debe ir junto a «ciudadela» o la frase correspondiente.
