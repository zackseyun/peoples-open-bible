translation:
  language: es
  text: Juntos yacen en el polvo[a], y los gusanos los cubren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las larvas los cubren». El hebreo רִמָּה puede referirse a gusanos o larvas en contextos de descomposición corporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - Juntos
  - Al mismo tiempo
  - Igualmente
  lexicon: HALOT
  rationale: La partícula adverbial expresa que ambos comparten el mismo destino. «Juntos» conserva esa idea con naturalidad en español y evita una paráfrasis excesiva.
- source_word: עַל עָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo
  - sobre el polvo
  - sobre el polvo de la tierra
  lexicon: HALOT
  rationale: Con שׁכב en contexto de muerte, el sentido apunta al lugar de sepultura o descomposición. «En el polvo» es idiomático y mantiene la imagen funeraria sin forzar un calco.
- source_word: יִשְׁכָּבוּ
  english_pob_choice: they lie down
  chosen_spanish: yacen
  alternatives_spanish:
  - yacen
  - se acuestan
  - y se tienden
  lexicon: HALOT
  rationale: El imperfecto expresa el destino general; en español, «yacen» comunica de modo más directo la idea de reposar en la muerte que «se acuestan», sin perder la concreción de la imagen.
- source_word: רִמָּה
  english_pob_choice: worms
  chosen_spanish: la lombriz
  alternatives_spanish:
  - la lombriz
  - los gusanos
  - los gusanos de la corrupción
  - las larvas
  lexicon: HALOT
  rationale: El término hebreo puede referirse a gusanos o larvas en contexto de descomposición. Se eligió «la lombriz» como singular colectivo para reflejar la fuerza genérica del hebreo, aunque «gusanos» sigue siendo una alternativa válida.
- source_word: תְּכַסֶּה
  english_pob_choice: cover
  chosen_spanish: cubre
  alternatives_spanish:
  - cubre
  - cubrirá
  - los cubre
  lexicon: HALOT
  rationale: El verbo mantiene la imagen vívida de la corrupción que envuelve los cuerpos. El presente gnómico «cubre» reproduce bien el valor general del hebreo.
- source_word: עֲלֵיהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los
  - sobre ellos
  lexicon: HALOT
  rationale: El complemento se integra de forma natural en español con el objeto directo pronominal. Se evita una repetición pesada de la preposición sin alterar el sentido.
translation_notes:
  revision_awareness: 'El texto coincide en sustancia con el seguimiento de la versión inglesa auditada: ambos conservan el paralelismo del destino común, la imagen del polvo como ámbito de muerte y la ambigüedad léxica de רִמָּה. La única diferencia deliberada es la elección española «la lombriz» para reflejar el valor genérico del singular hebreo, que se deja aclarado en nota.'
  spanish_consistency_notes:
  - Se mantiene un registro digno y bíblico sin recurrir a formulaciones arcaizantes innecesarias.
  - Se preserva la imagen corporal de la descomposición sin suavizarla ni exagerarla.
  - La nota conserva la alternativa semántica relevante de רִמָּה para transparencia textual.
