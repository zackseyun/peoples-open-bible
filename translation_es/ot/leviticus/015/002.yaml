translation:
  language: es
  text: 'Hablen a los hijos de Israel y díganles: Cuando algún hombre tenga un flujo[a] de su cuerpo[b], su flujo es inmundo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'emisión' o 'descarga'.
    reason: lexical_alternative
  - marker: b
    text: O 'de su carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Hablen
  - Digan
  lexicon: HALOT
  rationale: El hebreo introduce una orden formal de instrucción legal. En español, el imperativo singular dirigido a Moisés/Aarón mantiene el tono directo de la fórmula sin sonar forzado; 'Hablen' o 'Digan' serían posibles, pero 'Habla' conserva la solemnidad del mandato.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'hijos de Israel' porque el inglés POB retuvo 'sons of Israel' por fidelidad léxica. 'Israelitas' es idiomático, pero neutraliza la forma concreta del hebreo.
- source_word: וַאֲמַרְתֶּם אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles a ellos
  - y háblales
  lexicon: HALOT
  rationale: La secuencia imperativa legal queda natural en español con 'y diles'. Se mantiene el valor directivo y la concisión del hebreo, sin añadir explicación.
- source_word: אִישׁ אִישׁ
  english_pob_choice: any man
  chosen_spanish: algún hombre
  alternatives_spanish:
  - cada hombre
  - cualquier hombre
  - todo hombre
  lexicon: HALOT
  rationale: La repetición distributiva se expresa mejor en español con un indefinido singular. 'Algún hombre' conserva el alcance de caso-ley y el enfoque masculino del contexto ritual.
- source_word: זָב
  english_pob_choice: has a discharge
  chosen_spanish: tenga una emisión
  alternatives_spanish:
  - tenga una descarga
  - tenga un flujo
  - esté con una emisión
  lexicon: HALOT
  rationale: '''Emisión'' comunica el sentido médico-ritual de זָב/זוֹב sin sonar demasiado técnico ni sexualizar el pasaje. ''Descarga'' o ''flujo'' serían posibles, pero ''emisión'' encaja bien con el registro legal.'
- source_word: מִבְּשָׂרוֹ
  english_pob_choice: from his body
  chosen_spanish: de su cuerpo
  alternatives_spanish:
  - de su carne
  - de su organismo
  lexicon: HALOT
  rationale: Aunque בשר literalmente es 'carne', en español 'de su cuerpo' comunica la localización de manera clara y evita asociaciones teológicas ajenas al contexto. El POB inglés eligió 'body' por la misma razón.
- source_word: זוֹבוֹ
  english_pob_choice: his discharge
  chosen_spanish: su emisión
  alternatives_spanish:
  - su descarga
  - su flujo
  lexicon: HALOT
  rationale: Se repite el mismo sustantivo en español para conservar la relación léxica entre condición y resultado. 'Emisión' mantiene la neutralidad técnico-ritual que pide el contexto.
- source_word: טָמֵא הוּא
  english_pob_choice: is unclean
  chosen_spanish: es inmunda
  alternatives_spanish:
  - es impuro
  - está inmundo
  lexicon: HALOT
  rationale: En la ley de pureza levítica, טָמֵא denota impureza ritual. 'Inmunda' mantiene la fuerza legal tradicional en español y preserva el juicio de estado, no de culpa moral. Aunque el hebreo usa el masculino, en español puede concordar con 'emisión' cuando se predica del sustantivo retomado.
theological_decisions:
- issue: Término de impureza ritual en Levítico
  english_pob_reading: unclean
  chosen_spanish_reading: inmunda
  alternative_spanish_readings:
  - impura
  - inmundo
  rationale: El contexto es de pureza ritual, no de pecado moral. 'Inmunda' transmite la categoría levítica con la misma contundencia que 'unclean' en el inglés POB. Se evita suavizar a 'impura' porque en español puede sonar más abstracto o menos tradicional en este marco.
  doctrine_reference: Levítico 15; distinción entre impureza ritual y culpabilidad moral
- issue: Valor case-law de כִּי
  english_pob_reading: When any man has...
  chosen_spanish_reading: Cuando algún hombre tenga...
  alternative_spanish_readings:
  - Si algún hombre tiene...
  - Cuando un hombre tenga...
  rationale: 'El hebreo funciona como formulación casuística: no plantea una hipótesis abstracta sino un caso regulado. ''Cuando'' sigue la revisión del POB inglés y comunica mejor el carácter normativo del precepto que ''Si''.'
  doctrine_reference: Hebreo legal/casuístico en Levítico
- issue: Concordancia de género y referente
  english_pob_reading: any man ... his discharge
  chosen_spanish_reading: algún hombre ... su emisión
  alternative_spanish_readings:
  - alguna persona ... su emisión
  - cualquier hombre ... su emisión
  rationale: Se preserva el masculino del hebreo porque el caso legal trata explícitamente de un varón con emisión corporal. La referencia de 'su' queda clara y evita neutralizaciones que diluyan la forma del texto.
  doctrine_reference: Lenguaje específico del caso en la Torá
translation_notes:
  revision_awareness: La traducción sigue la revisión del POB inglés que cambió 'If' por 'When' para reflejar mejor el valor casuístico de כִּי. También conserva la decisión auditada de traducir זָב/זוֹב con un único campo léxico en español para mantener la relación entre la condición y la emisión resultante.
  spanish_consistency_notes:
  - Se conserva 'hijos de Israel' en lugar de 'israelitas' por fidelidad al hebreo y coherencia con el POB inglés.
  - '''Emisión'' se usa de manera consistente para זָב y זוֹב, manteniendo la conexión léxica del pasaje.'
  - '''Inmunda'' se reserva aquí para טָמֵא en sentido ritual levítico, sin implicación moral.'
  - La forma verbal 'tenga' refleja el uso casuístico de la cláusula con כִּי.
  - Las notas alternativas no introducen nuevas interpretaciones; solo registran opciones léxicas equivalentes.
