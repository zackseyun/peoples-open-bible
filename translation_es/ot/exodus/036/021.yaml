translation:
  language: es
  text: La longitud de cada marco[a] era de diez codos, y la anchura de cada marco era de un codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tabla» o «tablón» para קֶרֶשׁ; el término se refiere a las piezas estructurales del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶשֶׂר אַמֹּת
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez codos de largo
  lexicon: HALOT
  rationale: La expresión numérica más la unidad de medida se conserva de forma directa. «Codos» mantiene la unidad antigua sin convertirla, y «diez codos» reproduce con naturalidad la medida en español.
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  lexicon: HALOT
  rationale: El sustantivo designa la dimensión de longitud; «longitud» refleja mejor el constructo hebreo «la longitud del marco» que un adjetivo.
- source_word: הַקָּרֶשׁ
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - tabla
  - tablón
  - panel
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קֶרֶשׁ se refiere a una pieza estructural. «Marco» evita reducirla a una simple tabla plana y sigue la decisión contextual documentada en la POB inglesa.
- source_word: וְאַמָּה וַחֲצִי הָאַמָּה
  english_pob_choice: a cubit and a half
  chosen_spanish: un codo y medio
  alternatives_spanish:
  - un codo y medio de ancho
  - uno y medio codos
  lexicon: HALOT
  rationale: La construcción hebrea se expresa idiomáticamente en español como «un codo y medio». Conserva el valor exacto de la medida sin forzar una redacción menos natural.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: anchura
  alternatives_spanish:
  - ancho
  lexicon: HALOT
  rationale: El sustantivo indica la dimensión transversal; «anchura» corresponde al paralelo con «longitud» y mantiene la simetría de las medidas.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  english_pob_choice: each frame
  chosen_spanish: cada marco
  alternatives_spanish:
  - el marco individual
  - el único marco
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el marco uno», el valor distributivo en este contexto de medida se expresa naturalmente con «cada». No implica secuencia, sino la medida de cualquier marco individual.
translation_notes:
  revision_awareness: 'El texto inglés POB se mantiene en sentido y decisión léxica: usa «frame» para קֶרֶשׁ y entiende «the one frame» distributivamente como «each frame». No se registraron revisiones posteriores que alteren esa lectura.'
  spanish_consistency_notes:
  - Se mantuvo el patrón de medidas con nombres de sustantivos («longitud», «anchura») y no con adjetivos, para reflejar mejor la sintaxis hebrea.
  - «Marco» conserva la opción contextual de la POB inglesa para קֶרֶשׁ; la nota preserva las alternativas léxicas sin sustituirlas en el texto principal.
  - La medida antigua «codo» se preserva sin conversión, en línea con la transparencia del proyecto.
