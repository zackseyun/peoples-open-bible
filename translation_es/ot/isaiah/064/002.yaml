translation:
  language: es
  text: Cuando hiciste cosas asombrosas que no esperábamos[a], descendiste; los montes se estremecieron[b] delante de ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más allá de nuestra expectativa»; el hebreo puede sugerir tanto que no lo esperábamos como que estaba fuera de lo que aguardábamos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «temblaron» o «se derritieron»; el verbo hebreo evoca la imagen de fluir o disolverse ante Dios.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de delante de tu rostro/presencia»; también podría entenderse «ante tu presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲשׂוֹתְךָ
  english_pob_choice: When you did
  chosen_spanish: Cuando hiciste
  alternatives_spanish:
  - Al hacer tú
  - En tu hacer
  lexicon: HALOT
  rationale: La forma con ב + infinitivo constructo y sufijo de 2ms funciona bien temporalmente. «Cuando hiciste» expresa la relación temporal de modo natural en español sin perder el vínculo causal-poético del hebreo.
- source_word: נוֹרָאוֹת
  english_pob_choice: awesome things
  chosen_spanish: cosas asombrosas
  alternatives_spanish:
  - cosas temibles
  - cosas terribles
  lexicon: HALOT
  rationale: El término comunica la fuerza de lo que inspira asombro y reverencia. «Asombrosas» conserva mejor el valor positivo/majestuoso que «terribles», que en español podría sonar meramente negativo.
- source_word: לֹא נְקַוֶּה
  english_pob_choice: that we did not expect
  chosen_spanish: que no esperábamos
  alternatives_spanish:
  - que no habíamos esperado
  - que no aguardábamos
  lexicon: HALOT
  rationale: קוה puede expresar esperar con anhelo o expectativa. Aquí la idea es que las acciones de Yahvé rebasaban la expectativa; «no esperábamos» transmite esa fuerza de manera natural y fiel.
- source_word: יָרַדְתָּ
  english_pob_choice: you came down
  chosen_spanish: descendiste
  alternatives_spanish:
  - bajaste
  - viniste abajo
  lexicon: HALOT
  rationale: El verbo ירד es literalmente «bajar/descender». «Descendiste» mantiene el matiz teofánico más solemne que «bajaste» y encaja bien con el registro bíblico.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - por tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «de delante de tu rostro/presencia». En español, «delante de ti» es la forma más natural para conservar la escena sin forzar una construcción demasiado literal.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Hermos»/«montes» es plenamente bíblico y poético en español; se ajusta bien al paralelismo y al registro del pasaje. «Montañas» también sería válida, pero «montes» suena más natural en poesía bíblica.
- source_word: נָזֹלּוּ
  english_pob_choice: quaked
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - se derritieron
  lexicon: HALOT
  rationale: La raíz da una imagen de fluir/diluirse, y el audit trail inglés opta por preservar la reacción de las montañas sin imponer un único cuadro físico. En español, «se estremecieron» mantiene el efecto visible y poético, sin cerrar indebidamente la metáfora.
theological_decisions:
- issue: La imagen teofánica de la creación reaccionando a la presencia de Dios
  english_pob_reading: Retain the concrete poetic image of the mountains reacting before God rather than smoothing it into a generic statement.
  chosen_spanish_reading: Conservar la imagen concreta de los montes estremeciéndose delante de Yahvé, sin reducirla a una mera fórmula abstracta.
  alternative_spanish_readings:
  - los montes temblaron ante tu presencia
  - los montes se derritieron ante ti
  rationale: El hebreo presenta una imagen poética viva de la creación ante la manifestación divina. «Se estremecieron» preserva esa tensión sin decidir de forma excesiva entre temblor, derrumbe o disolución.
  doctrine_reference: Doctrina de la manifestación de Dios en la creación; cf. Isaías 64:1-2
translation_notes:
  revision_awareness: He seguido el valor poético-teofánico del hebreo y el audit trail inglés, pero he ajustado el cierre verbal al español bíblico natural. El inglés revisó la imagen final entre «flowed down» y «quaked»; en español he optado por una solución intermedia fiel a la metáfora y a la reacción visible de los montes.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se mantuvo el registro reverente y poético con vocabulario bíblico transparente para lectores contemporáneos.
  - «Montes» se prefirió por su resonancia poética en español, sin alterar el referente.
  - No se introdujo ninguna doctrina adicional; la frase conserva el sentido teofánico del texto hebreo.
