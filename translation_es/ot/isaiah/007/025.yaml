base_translation:
  language: en
  yaml_path: translation/ot/isaiah/007/025.yaml
  text: And as for all the hills that used to be hoed with a hoe[a], you will not go there for fear of briers and thorns[d][c][b]; they will become a place for the sending out of oxen and for the trampling of sheep.
  footnotes:
  - marker: a
    text: Or 'that are dug/cultivated with the hoe.' The Hebrew uses a cognate noun and verb for hoeing.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''you will not go there'' may function generically: ''one will not go there.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a place where oxen are let loose' or more interpretively 'pasture for oxen.'
    reason: lexical_alternative
  - marker: d
    text: '''Sheep'' translates Hebrew שֶׂה, which can also refer more broadly to small livestock.'
    reason: lexical_alternative
