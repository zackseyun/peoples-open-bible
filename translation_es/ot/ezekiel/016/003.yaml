    text: O, con mayor fluidez, «de la tierra de Canaán». El hebreo dice más literalmente «de la tierra del cananeo», preservando el énfasis étnico.
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad básica del borrador y la nota léxica existente, pero se pule la naturalidad del español en los predicados nominales finales. No se fuerza una reingeniería mayor de la fórmula divina porque las opciones plenamente explícitas en español resultan torpes; la forma actual, aunque no perfecta, sigue siendo comprensible y mantiene visible «Yahvé» en el texto principal.
