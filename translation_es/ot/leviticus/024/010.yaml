translation:
  language: es
  text: Entonces salió el hijo de una mujer israelita, y él era hijo de un hombre egipcio, en medio de los hijos de Israel[a]; y en el campamento pelearon[b] el hijo de la mujer israelita y un hombre israelita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los hijos de Israel». El hebreo dice literalmente «en medio de los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «riñeron» o «disputaron». El verbo puede indicar una disputa o una pelea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - se fue
  lexicon: HALOT
  rationale: El imperfecto narrativo con waw consecutivo expresa avance de la acción; «salió» es la forma más natural en español y conserva el movimiento sin añadir dirección no expresada.
- source_word: בֶּן אִשָּׁה יִשְׂרְאֵלִית
  english_pob_choice: the son of an Israelite woman
  chosen_spanish: el hijo de una mujer israelita
  alternatives_spanish:
  - un hijo de una mujer israelita
  lexicon: HALOT
  rationale: La cadena constructa identifica al hombre por la línea materna. En español, «el hijo de una mujer israelita» reproduce bien la identificación y su efecto narrativo.
- source_word: וְהוּא בֶּן אִישׁ מִצְרִי
  english_pob_choice: and he was the son of an Egyptian man
  chosen_spanish: y él era hijo de un hombre egipcio
  alternatives_spanish:
  - y era hijo de un egipcio
  - y su padre era un hombre egipcio
  lexicon: HALOT
  rationale: La cláusula añade la identidad paterna. «Era hijo de un hombre egipcio» conserva la sintaxis del hebreo y sugiere la tensión de doble ascendencia sin explicarla en exceso.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: en medio de los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión formal del hebreo. «En medio de» traduce בְּתוֹךְ con naturalidad y conserva el matiz locativo de presencia dentro del grupo.
- source_word: וַיִּנָּצוּ
  english_pob_choice: fought
  chosen_spanish: riñeron
  alternatives_spanish:
  - pelearon
  - disputaron
  lexicon: HALOT
  rationale: El verbo puede abarcar disputa o pelea. «Riñeron» conserva esa amplitud y evita decidir demasiado pronto por una violencia física mayor de la que el verbo exige por sí mismo.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento de Israel
  - dentro del campamento
  lexicon: HALOT
  rationale: «Campamento» es la equivalencia natural de מַחֲנֶה y funciona bien en el contexto narrativo del desierto.
- source_word: בֶּן הַיִּשְׂרְאֵלִית
  english_pob_choice: the son of the Israelite woman
  chosen_spanish: el hijo de la mujer israelita
  alternatives_spanish:
  - el hijo de la israelita
  lexicon: HALOT
  rationale: La repetición se preserva para mantener la identificación literaria del personaje. En español, se explicita «mujer» para evitar ambigüedad y reflejar la forma femenina del hebreo.
- source_word: וְאִישׁ הַיִּשְׂרְאֵלִי
  english_pob_choice: and an Israelite man
  chosen_spanish: y un hombre israelita
  alternatives_spanish:
  - y el hombre israelita
  - y un varón israelita
  lexicon: HALOT
  rationale: «Hombre israelita» reproduce el contraste con el otro personaje identificado por su ascendencia mixta. Se conserva el indefinido porque el hebreo no marca artículo aquí.
theological_decisions:
- issue: La expresión étnico-covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  rationale: Se conserva la forma masculina plural del hebreo en el texto principal, porque aquí funciona como designación formal del pueblo y no solo como plural genérico. «Israelitas» queda como alternativa interpretativa más fluida, pero menos transparente al original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje fue revisado con acuerdo alto y sin cambios sustanciales en el último pase; la redacción española sigue de cerca el hebreo y respeta la misma decisión del POB inglés en cuanto a los hijos de Israel y el alcance semántico de וַיִּנָּצוּ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y cualquier terminología cristológica porque no aparece en el texto.
  - Se prefirió «hijos de Israel» en la nota teológica para reflejar el valor formal de la expresión hebrea, aunque el texto principal usa una redacción más natural con «de una mujer israelita» y «un hombre israelita».
