translation:
  language: es
  text: Y cuando llegué a ser hombre[a], tomé por esposa a Ana, de la descendencia de nuestra familia paterna[b], y de ella engendré a Tobías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más suavemente: «cuando alcancé la edad adulta». El griego dice literalmente «llegué a ser hombre», subrayando la llegada a la madurez masculina.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la simiente de nuestra familia». La expresión conserva la idea de descendencia dentro del linaje paterno.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενόμην ἀνήρ
  english_pob_choice: I became a man
  chosen_spanish: llegué a ser hombre
  alternatives_spanish:
  - me hice hombre
  - alcancé la edad adulta
  lexicon: BDAG
  rationale: La expresión griega es idiomática para llegar a la adultez masculina. «Llegué a ser hombre» conserva el sentido de madurez y mantiene el matiz de género del original sin volverlo rígidamente arcaico.
- source_word: ἔλαβον ... γυναῖκα
  english_pob_choice: I took Anna as my wife
  chosen_spanish: tomé a Ana por esposa
  alternatives_spanish:
  - me casé con Ana
  - tomé a Ana como mi esposa
  lexicon: BDAG
  rationale: «Tomé ... por esposa» refleja bien el idioma matrimonial del griego, de manera clara en español y sin perder la relación directa con el verbo original de ‘tomar’.
- source_word: ἐκ τοῦ σπέρματος
  english_pob_choice: from the seed of
  chosen_spanish: de la simiente de
  alternatives_spanish:
  - de la descendencia de
  - de la línea de
  lexicon: BDAG
  rationale: Se conserva «simiente» porque reproduce con fuerza la imagen verbal de σπέρμα y preserva el color semítico del texto. En español puede sonar menos común, pero es inteligible en un registro bíblico y evita aplanar la metáfora a una mera abstracción.
- source_word: τῆς πατριᾶς ἡμῶν
  english_pob_choice: our ancestral family
  chosen_spanish: nuestra familia ancestral
  alternatives_spanish:
  - nuestra parentela ancestral
  - nuestro linaje paterno
  lexicon: BDAG
  rationale: La frase griega señala una unidad familiar/clánica de origen paterno. «Familia ancestral» comunica el sentido de grupo de ascendencia sin introducir un tecnicismo innecesario, y mantiene la referencia comunitaria del posesivo plural.
- source_word: ἐγέννησα ἐξ αὐτῆς
  english_pob_choice: by her I fathered
  chosen_spanish: de ella engendré
  alternatives_spanish:
  - por ella engendré
  - tuve de ella
  lexicon: BDAG
  rationale: «Engendré» conserva el valor reproductivo y paternal del verbo griego. Se omite una ampliación como «por ella» porque en español «de ella engendré» ya expresa adecuadamente la procedencia filial sin sobrecargar la frase.
- source_word: Τωβίαν
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  lexicon: LSJ
  rationale: En español bíblico es más reconocible «Tobías» que la forma «Tobiah». Aunque la POB inglesa prefirió una transliteración más directa, aquí se adopta la forma tradicional española para legibilidad e identificación inmediata del personaje.
theological_decisions:
- issue: Preservación de la referencia genealógica y endogámica
  english_pob_reading: from the seed of our ancestral family
  chosen_spanish_reading: de la simiente de nuestra familia ancestral
  alternative_spanish_readings:
  - de nuestra línea ancestral
  - de nuestra parentela
  rationale: La frase no solo describe procedencia familiar, sino una filiación dentro del mismo linaje. Se mantiene la imagen de «simiente» para no borrar esa densidad genealógica, y se evita convertirla en una formulación genérica que pierda el énfasis del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Lenguaje de madurez masculina
  english_pob_reading: I became a man
  chosen_spanish_reading: llegué a ser hombre
  alternative_spanish_readings:
  - alcancé la edad adulta
  - me hice hombre
  rationale: Se conserva el término masculino «hombre» porque el texto habla biográficamente de la adultez de un varón. No se neutraliza a «adulto» para no borrar el matiz sexual y narrativo del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el anclaje griego y el auditorio inglés, pero adopta decisiones españolas propias donde la legibilidad lo pide: mantiene la metáfora de σπέρμα como «simiente», conserva la frase de madurez masculina con «llegué a ser hombre», y traduce el nombre final según el uso bíblico español más reconocido. Se tomó en cuenta la revisión inglesa que suavizó ''our father''s family'' a ''our ancestral family'', reflejando eso en ''nuestra familia ancestral''.'
  spanish_consistency_notes:
  - Se usa «Ana» como forma española estable del nombre Ἄννα.
  - Se usa «Tobías» por legibilidad en español bíblico, aunque la guía inglesa prefiera una transliteración más directa.
  - Se mantiene un registro bíblico claro y sobrio, evitando paráfrasis explicativas dentro del texto principal.
