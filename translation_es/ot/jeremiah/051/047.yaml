    text: O «visitaré con juicio las imágenes talladas de Babilonia».
    reason: lexical_alternative
  - marker: b
    text: O «los ídolos de Babilonia». El término hebreo se refiere específicamente a imágenes cultuales talladas.
    reason: lexical_alternative
  - marker: c
    text: O «toda su tierra quedará avergonzada» o «será deshonrada».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el hebreo y con el audit trail inglés: se cambia «muertos» por «caídos» para reflejar חֲלָלֶיהָ con mayor precisión contextual, y se restauran en español las notas léxicas significativas documentadas para «castigaré» y «imágenes talladas». Se mantiene «he aquí», la personificación femenina y «será avergonzada» como una opción fiel y suficientemente natural.'
