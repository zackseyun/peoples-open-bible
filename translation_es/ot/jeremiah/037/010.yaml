  glossary_alignment: Se mantiene correctamente «caldeos» con nota alternativa «babilonios», en línea con la decisión auditada. No hay términos teológicos sensibles en el verso. La nota [b] conserva adecuadamente la literalidad de מְדֻקָּרִים.
