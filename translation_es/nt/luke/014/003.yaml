review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mantiene la doble introducción narrativa («respondió y dijo»), la pregunta legal sobre lo permitido en sábado y el infinitivo «sanar». Sin embargo, añade una preposición y objeto indirecto no presentes en el griego al decir «a los expertos en la ley y a los fariseos»; πρὸς gobierna a ambos grupos sin repetición de «a», pero eso es aceptable en español. El problema principal está en la nota: en el texto se eligió «expertos en la ley», pero la nota ofrece exactamente la misma expresión como alternativa, en vez de preservar la alternativa documentada del inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «¿Es lícito sanar en sábado, o no?» suena bien en registro bíblico moderno. No obstante, la nota al pie está defectuosa por redundante y no informativa. Además, conviene una formulación de nota que explique la alternativa sin repetir la lectura principal.
  glossary_alignment: 'No hay conflicto con los términos doctrinales principales del proyecto. «Jesús», «fariseos», «sanar» y «lícito» están bien. La elección de «expertos en la ley» para νομικοὺς es válida como excepción contextual frente al inglés «lawyers», y de hecho evita la ambigüedad moderna de «abogados» en español. La nota debe conservar la alternativa «juristas» o «maestros de la ley» solo si se justifica, pero mejor reflejar la opción inglesa/documentada: «abogados» no es recomendable como texto principal en español, aunque puede mencionarse indirectamente como equivalente tradicional solo si ayuda; aquí basta con explicar el sentido del término.'
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en lugar de ofrecer una alternativa real o aclaración útil.
    rationale: El texto principal dice «expertos en la ley[a]», pero la nota dice «O «expertos en la ley»», lo cual no añade información y no preserva correctamente la lógica de una nota de alternativa léxica.
  - severity: low
    issue: La razón de la nota no queda bien representada en español.
    rationale: El inglés auditado usa una nota para preservar una alternativa («experts in the law») frente a «lawyers». Como el español ya puso «expertos en la ley» en el texto, la nota debe reorientarse para aclarar el sentido del término griego, no repetirlo.
  revised_spanish_text: 'Jesús respondió y dijo a los expertos en la ley[a] y a los fariseos: «¿Es lícito sanar en sábado, o no?»'
  revised_footnotes:
