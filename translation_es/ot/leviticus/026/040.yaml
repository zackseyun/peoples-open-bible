translation:
  language: es
  text: Pero si confiesan su iniquidad y la iniquidad de sus padres, en la infidelidad[a] con que me fueron infieles, y también que anduvieron en oposición a mí[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''su traición'' / ''su infidelidad'' para ''la infidelidad''. El hebreo usa formas cognadas para subrayar la ruptura del pacto: ''en su infidelidad con que me fueron infieles''.'
    reason: lexical_alternative
  - marker: b
    text: O 'anduvieron en hostilidad contra mí'. La frase hebrea 'anduvieron conmigo en qeri' usa un término difícil repetido en este capítulo para conducta opositora u hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְוַדּוּ
  english_pob_choice: if they confess
  chosen_spanish: si confiesan
  alternatives_spanish:
  - y confiesan
  - entonces confiesan
  lexicon: HALOT
  rationale: El hebreo es una forma verbal que, en este contexto condicional, continúa la secuencia de la exhortación anterior. En español, 'si confiesan' expresa con naturalidad el valor condicional que la POB inglesa captó con 'if they confess'.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' conserva el peso moral y judicial de עָוֹן y mantiene el paralelismo con la frase siguiente.'
- source_word: עֲוֺן אֲבֹתָם
  english_pob_choice: the iniquity of their fathers
  chosen_spanish: la iniquidad de sus padres
  alternatives_spanish:
  - la iniquidad de sus antepasados
  - la culpa de sus padres
  lexicon: HALOT
  rationale: Se conserva la referencia explícita a 'sus padres', porque el hebreo usa el término masculino ancestral y el contexto pide mantener la confesión corporativa de culpa.
- source_word: בְּמַעֲלָם
  english_pob_choice: in the unfaithfulness
  chosen_spanish: en la infidelidad
  alternatives_spanish:
  - en su traición
  - en su deslealtad
  lexicon: HALOT
  rationale: מַעַל designa infidelidad o quebranto de fidelidad, especialmente en clave de pacto. 'Infidelidad' transmite bien ese campo semántico en español.
- source_word: מָעֲלוּ בִי
  english_pob_choice: they were unfaithful to me
  chosen_spanish: fueron infieles contra mí
  alternatives_spanish:
  - fueron infieles a mí
  - me traicionaron
  lexicon: HALOT
  rationale: La elección mantiene el vínculo léxico con 'infidelidad' y evita suavizar el verbo; 'contra mí' comunica la dirección del quebranto del pacto.
- source_word: וְאַף
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - y aun
  - e incluso
  lexicon: HALOT
  rationale: Añade un elemento adicional a la confesión; 'y también' es claro y no exagera el matiz intensivo.
- source_word: הָלְכוּ עִמִּי
  english_pob_choice: they walked ... to me
  chosen_spanish: anduvieron ... a mí
  alternatives_spanish:
  - caminaron ... conmigo
  - se condujeron ... hacia mí
  lexicon: HALOT
  rationale: El hebreo usa el verbo 'andar/caminar' con una construcción relacional que prepara el modismo siguiente; 'anduvieron' conserva el verbo sin volverlo demasiado interpretativo.
- source_word: בְּקֶרִי
  english_pob_choice: contrary
  chosen_spanish: contrariamente
  alternatives_spanish:
  - en hostilidad
  - con obstinación
  lexicon: HALOT
  rationale: '''Contrariamente'' preserva el carácter difícil y repetido del término en Levítico 26 sin resolverlo por completo en una sola glosa más específica.'
theological_decisions:
- issue: Confesión corporativa que incluye la culpa de los antepasados
  english_pob_reading: Retain 'the iniquity of their fathers' in the main text without softening it to mere consequences or example.
  chosen_spanish_reading: Mantener 'la iniquidad de sus padres' en el texto principal, sin reducirla a simples consecuencias o ejemplo.
  alternative_spanish_readings:
  - la culpa de sus antepasados
  - la iniquidad heredada de sus padres
  rationale: El hebreo presenta una confesión que abarca tanto la culpa propia como la de los padres. La versión española debe conservar esa dimensión corporativa y pactal, sin diluirla con explicaciones posteriores que el texto no formula.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: Revisión final sin cambios sustanciales respecto del último pase auditado; se mantiene la lectura alta de acuerdo y no se incorporan ajustes adicionales.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - '''Iniquidad'' se mantiene de forma consistente para עָוֹן.'
  - '''Infidelidad'' y ''fueron infieles'' preservan la relación léxica del hebreo entre sustantivo y verbo.'
  - '''Contrariamente'' refleja el término difícil קֶרִי sin normalizarlo demasiado.'
