revisions:
- from: Entonces el rey ordenó llamar[a] a los magos, a los encantadores, a los hechiceros y a los caldeos, para que le declararan al rey sus sueños. Y vinieron y se pusieron delante del rey.
  to: Entonces el rey ordenó llamar[a] a los magos, a los encantadores, a los hechiceros y a los caldeos[b], para contarle al rey sus sueños. Y vinieron y estuvieron delante del rey.
  rationale: Se conserva la fidelidad al hebreo y a las decisiones del POB, pero se añade la nota necesaria sobre «caldeos» para preservar la ambigüedad documentada, y se mejora la naturalidad del español cambiando «declararan» por «contarle» y «se pusieron delante» por «estuvieron delante».
