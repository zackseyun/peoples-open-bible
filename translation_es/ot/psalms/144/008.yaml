translation:
  language: es
  text: cuya boca habla[b][a] vanidad, y cuya mano derecha es una mano derecha de falsedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vacío» o «falsedad» para שָׁוְא; el término puede denotar vanidad, vacío o engaño.
    reason: lexical_alternative
  - marker: b
    text: Se conserva la repetición «mano derecha ... mano derecha» del hebreo para énfasis; la mano derecha suele simbolizar juramento, poder o fidelidad comprometida, de modo que una «mano derecha de falsedad» sugiere traición o engaño.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - de quien
  - cuyo
  lexicon: HALOT
  rationale: El relativo introduce una cláusula descriptiva con posesión sobre «boca» y «mano derecha». «Cuya» mantiene la relación posesiva de forma natural en español y conserva el paralelismo con el hebreo.
- source_word: פִּיהֶם
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - su boca
  - sus bocas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «su boca / la boca de ellos», en español «boca» resulta más natural que repetir «mouth» como calco. Se conserva el singular colectivo implícito del hebreo.
- source_word: דִּבֶּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - ha hablado
  - pronuncia
  - dice
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como descripción característica; por eso se traduce con presente gnómico. «Habla» conserva el valor habitual, no un evento puntual pasado.
- source_word: שָׁוְא
  english_pob_choice: emptiness
  chosen_spanish: vaciedad
  alternatives_spanish:
  - vanidad
  - falsedad
  - vacuidad
  lexicon: HALOT
  rationale: 'Se preserva la amplitud semántica de שָׁוְא: vaciedad, vanidad o engaño. «Vaciedad» evita estrechar el sentido solo a mentira y permite que el segundo hemistiquio explicite la falsedad.'
- source_word: וִימִינָם
  english_pob_choice: and whose right hand
  chosen_spanish: y cuya mano derecha
  alternatives_spanish:
  - y su mano derecha
  - y su diestra
  lexicon: HALOT
  rationale: Se repite el relativo posesivo para conservar el paralelismo hebreo y la estructura enfática de los dos miembros.
- source_word: יְמִין
  english_pob_choice: a right hand
  chosen_spanish: una mano derecha
  alternatives_spanish:
  - la mano derecha
  - una diestra
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo para intensificar la expresión. En español, «una mano derecha» reproduce la repetición sin suavizarla; «diestra» sería posible, pero menos uniforme en registro bíblico contemporáneo.
- source_word: שָׁקֶר
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - engaño
  - mentira
  - fraude
  lexicon: HALOT
  rationale: «Falsedad» conserva el carácter abstracto del sustantivo hebreo y armoniza con «vaciedad». Evita reducir el término a una mera mentira individual.
theological_decisions:
- issue: Mantener la repetición enfática de «mano derecha ... mano derecha» en vez de suavizarla
  english_pob_reading: The repeated expression 'right hand ... right hand' is preserved from the Hebrew for emphasis; the right hand commonly symbolizes oath-taking, power, or pledged fidelity, so a 'right hand of falsehood' suggests treachery or deceit.
  chosen_spanish_reading: Se conserva la repetición («mano derecha ... una mano derecha») para reflejar el énfasis hebreo y su carga simbólica de fidelidad juramentada, poder o compromiso; aquí se invierte en falsedad y traición.
  alternative_spanish_readings:
  - y cuya mano derecha es falsa
  - y su mano derecha es de engaño
  rationale: La versión española mantiene la figura retórica y evita una paráfrasis que diluya la ironía del paralelismo. La expresión apunta a la traición de una fidelidad prometida, no solo a la mentira verbal.
  doctrine_reference: Sal 144:8; cf. uso bíblico de la diestra como símbolo de fuerza y fidelidad
- issue: Conservar שָׁוְא como una palabra más amplia que «mentira»
  english_pob_reading: '''Emptiness'' preserves the broad semantic range without over-specifying mere lying, especially since the next colon explicitly uses ''falsehood''.'
  chosen_spanish_reading: «Vaciedad» mantiene el campo semántico amplio de שָׁוְא y deja que el segundo hemistiquio precise la falsedad.
  alternative_spanish_readings:
  - vanidad
  - falsedad
  - vacuidad
  rationale: El paralelo hebreo distingue entre una palabra de vacío/vanidad y una mano de falsedad. Traducir ambos miembros con el mismo valor estrecharía la tensión poética y semántica.
  doctrine_reference: Sal 144:8; paralelismo hebreo
translation_notes:
  revision_awareness: Se revisó el pasaje con acuerdo alto en la auditoría inglesa y sin cambios sustanciales; la redacción española sigue de cerca el hebreo y preserva la repetición enfática y la amplitud semántica de שָׁוְא.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el paralelismo hebreo con dos miembros coordinados y repetición de «cuya».
  - «Vaciedad» y «falsedad» se distribuyen para no colapsar los dos términos hebreos distintos.
