translation:
  language: es
  text: Tú, oh Señor, sin necesitar nada[b], te complaciste en que un templo para tu morada llegara a existir entre nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'en nosotros'; en este contexto de templo, la lectura 'entre nosotros' es más probable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'siendo sin necesidad de todas las cosas', es decir, no necesitando nada de nada ni de nadie.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ, Κύριε
  english_pob_choice: You, O Lord
  chosen_spanish: Tú, oh Señor
  alternatives_spanish:
  - Tú, oh Yahvé
  - Tú, oh Dios
  lexicon: LSJ
  rationale: El griego dirige una oración directa a Dios con énfasis en la segunda persona; 'Tú, oh Señor' conserva la invocación solemne sin sustituir aquí el vocativo por el nombre divino en una fórmula menos natural para este registro de oración.
- source_word: ἀπροσδεὴς ὑπάρχων
  english_pob_choice: being in need of nothing
  chosen_spanish: siendo de nada menester
  alternatives_spanish:
  - no teniendo necesidad de nada
  - siendo independiente de todo
  - sin necesidad de nada
  lexicon: LSJ
  rationale: ἀπροσδεής expresa carencia de necesidad; la construcción tradicional 'de nada menester' conserva esa noción con dignidad bíblica y evita ampliar el sentido más allá del griego. La forma mantiene la tensión teológica de la autosuficiencia divina sin volverla una abstracción filosófica.
- source_word: τῶν ὅλων
  english_pob_choice: of all things
  chosen_spanish: de nada
  alternatives_spanish:
  - de todas las cosas
  - de todo
  - de ninguna cosa
  lexicon: LSJ
  rationale: En combinación con ἀπροσδεὴς, la frase indica que Dios no necesita nada de todo lo existente. En español, 'de nada menester' comunica mejor esa idea total sin volver la frase pesada o redundante.
- source_word: ηὐδόκησας
  english_pob_choice: were pleased
  chosen_spanish: te complaciste
  alternatives_spanish:
  - te agradó
  - quisiste benignamente
  - tuviste a bien
  lexicon: LSJ
  rationale: El verbo expresa beneplácito o decisión favorable. 'Te complaciste' conserva el matiz de gusto/voluntad sin introducir una idea emocional ajena al contexto.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: un templo
  alternatives_spanish:
  - un santuario
  - la casa del templo
  lexicon: LSJ
  rationale: ναός se refiere al templo como lugar sagrado de la presencia divina; 'templo' es la equivalencia directa y transparente en español.
- source_word: τῆς σῆς σκηνώσεως
  english_pob_choice: of your dwelling
  chosen_spanish: para tu morada
  alternatives_spanish:
  - de tu habitación
  - de tu tabernáculo
  - de tu morada
  lexicon: LSJ
  rationale: σκηνώσις alude a morar/acampar/tabernacular. 'Morada' comunica bien la presencia residente de Dios en un registro natural; la preposición 'para' refleja adecuadamente la finalidad en la estructura española de 'templo para tu morada'.
- source_word: ἐν ἡμῖν
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en nosotros
  - dentro de nosotros
  lexicon: LSJ
  rationale: En un contexto de templo y presencia comunitaria, el plural ἐν ἡμῖν se entiende mejor como ubicación en medio del pueblo. 'Entre nosotros' conserva el sentido corporativo mejor que una lectura interiorizada.
- source_word: γενέσθαι
  english_pob_choice: to come into being
  chosen_spanish: viniera a existir
  alternatives_spanish:
  - llegara a ser
  - fuera establecido
  - fuera edificado
  lexicon: LSJ
  rationale: El infinitivo de γίνομαι indica llegar a ser o venir a existir. 'Viniera a existir' evita especificar 'edificado' o 'establecido' más allá de lo que dice el griego, aunque en contexto el referente sea un templo.
theological_decisions:
- issue: Autosuficiencia divina y beneplácito en el templo
  english_pob_reading: being in need of nothing ... were pleased that a temple for your dwelling should come into being among us
  chosen_spanish_reading: siendo de nada menester ... te complaciste en que un templo para tu morada viniera a existir entre nosotros
  alternative_spanish_readings:
  - no teniendo necesidad de nada ... quisiste que un templo para tu morada existiera entre nosotros
  - siendo independiente de todo ... te agradó que un templo para tu morada se levantara entre nosotros
  rationale: 'La formulación mantiene la tensión del texto: Dios no necesita el templo, pero libremente quiso su existencia entre el pueblo. No se suaviza esa autosuficiencia ni se convierte el pasaje en mera piedad devocional.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Sentido comunitario de ἐν ἡμῖν
  english_pob_reading: among us
  chosen_spanish_reading: entre nosotros
  alternative_spanish_readings:
  - en nosotros
  - dentro de nosotros
  rationale: Dado que el contexto habla de templo, la referencia primaria es corporativa y localizada, no interiorista. 'Entre nosotros' conserva esa lectura comunitaria sin excluir totalmente el matiz de presencia en medio del pueblo.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve theological tension where ambiguity remains.'
translation_notes:
  revision_awareness: Se corrigió la ancladura de las notas para que cada marcador aparezca exactamente en el texto español. La redacción española mantiene el paralelismo del griego y evita sobreespecificar el verbo γίνομαι como 'edificar'.
  spanish_consistency_notes:
  - Se usó 'Señor' para Κύριε en el vocativo orante, coherente con el registro bíblico solemne, sin ocultar el nombre divino en el texto fuente.
  - '''Morada'' se prefirió para σκηνώσεως por su naturalidad y por preservar la idea de presencia habitante sin imponer terminología posterior.'
  - '''Entre nosotros'' se mantiene como lectura comunitaria del plural ἐν ἡμῖν, en consonancia con el contexto del templo.'
