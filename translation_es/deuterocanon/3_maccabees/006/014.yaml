translation:
  language: es
  text: Toda la multitud de niños pequeños y sus padres te suplica con lágrimas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἱκετεύει
  english_pob_choice: entreats
  chosen_spanish: te suplica
  alternatives_spanish:
  - te ruega
  - te implora
  - te suplica encarecidamente
  lexicon: BDAG
  rationale: El verbo expresa una súplica intensa y respetuosa. «Suplica» comunica bien la urgencia sin volverse demasiado arcaico, y el tratamiento directo «te» conserva el valor de petición dirigida al rey/oyente implícito en el contexto.
- source_word: τὸ πᾶν πλῆθος
  english_pob_choice: the whole multitude
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - todo el pueblo reunido
  lexicon: LSJ
  rationale: La expresión subraya la totalidad del grupo. «Toda la multitud» mantiene esa fuerza colectiva en español de manera natural y fiel.
- source_word: τῶν νηπίων
  english_pob_choice: of the little children
  chosen_spanish: de los niños pequeños
  alternatives_spanish:
  - de los infantes
  - de los niños tiernos
  lexicon: LSJ
  rationale: νήπιοι puede abarcar niños muy pequeños, incluso lactantes, pero aquí el contexto es una súplica pública colectiva. «Niños pequeños» conserva la compasión y evita restringir innecesariamente el término a recién nacidos.
- source_word: οἱ τούτων γονεῖς
  english_pob_choice: their parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - los padres de هؤلاء niños
  - los padres de ellos
  lexicon: BDAG
  rationale: El referente es claro por el contexto inmediato. «Sus padres» es la forma más natural en español y preserva la relación posesiva sin redundancia.
- source_word: μετὰ δακρύων
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - llorando
  - en lágrimas
  lexicon: LSJ
  rationale: La construcción preposicional se rinde de modo directo como «con lágrimas», que reproduce bien la imaginería emotiva del griego y su tono solemne.
translation_notes:
  revision_awareness: La versión inglesa POB y el texto griego coinciden plenamente en sentido básico; no se detectan variantes textuales ni tensiones lexicales que exijan nota. Se ha mantenido el tono elevado de súplica sin introducir vocabulario eclesiástico posterior.
  spanish_consistency_notes:
  - Se usa «multitud» para πλῆθος, en línea con la POB inglesa.
  - Se evita «infantes» para no estrechar indebidamente νήπιοι; «niños pequeños» preserva mejor el alcance contextual.
  - Se mantiene el paralelismo entre el grupo de niños y sus padres, con una sintaxis sencilla y pública, apropiada para una escena de intercesión colectiva.
