translation:
  language: es
  text: Y diste tu buen Espíritu[a] para instruirlos, y no retuviste tu maná de su boca, y les diste agua para su sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tu buen espíritu». El hebreo רוּחַ puede traducirse de ambas maneras; aquí probablemente se refiere al Espíritu de Dios dado para guiar e instruir a Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחֲךָ הַטּוֹבָה
  english_pob_choice: your good Spirit
  chosen_spanish: tu buen Espíritu
  alternatives_spanish:
  - tu buen espíritu
  lexicon: HALOT
  rationale: רוּחַ puede significar 'espíritu', 'viento' o 'aliento'. En este contexto, donde Dios guía e instruye al pueblo, el sentido más probable es el de su Espíritu divino. Mantengo 'Espíritu' con mayúscula por esa lectura, y conservo 'bueno' como 'buen' para reflejar directamente el adjetivo hebreo.
- source_word: לְהַשְׂכִּילָם
  english_pob_choice: to instruct them
  chosen_spanish: para instruirlos
  alternatives_spanish:
  - para darles entendimiento
  - para hacerlos entender
  lexicon: HALOT
  rationale: La forma hifil de שׂכל expresa causar entendimiento, dar perspicacia o instruir sabiamente. 'Instruirlos' es natural en español y conserva el valor causativo sin ampliar más allá del texto.
- source_word: מַנְךָ
  english_pob_choice: your manna
  chosen_spanish: tu maná
  alternatives_spanish:
  - tu provisión
  lexicon: HALOT
  rationale: El sustantivo designa específicamente el alimento del desierto conocido como maná; por eso se conserva el término establecido.
- source_word: מָנַעְתָּ מִפִּיהֶם
  english_pob_choice: you did not withhold ... from their mouth
  chosen_spanish: no negaste ... a su boca
  alternatives_spanish:
  - no retuviste ... de su boca
  - no lo quitaste de su boca
  lexicon: HALOT
  rationale: מנע significa 'retener' o 'impedir', y el hebreo dice literalmente 'de su boca'. En español, 'no negaste' transmite con claridad la idea de no privarles del alimento, mientras que 'a su boca' conserva la imagen concreta del texto sin volverlo torpe.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: Equivalente léxico directo y claro.
- source_word: לִצְמָאָם
  english_pob_choice: for their thirst
  chosen_spanish: para su sed
  alternatives_spanish:
  - para su necesidad de agua
  - a causa de su sed
  lexicon: HALOT
  rationale: צָמָא significa 'sed'. 'Para su sed' expresa de manera natural que el agua fue dada como provisión para satisfacerla.
theological_decisions:
- issue: Si רוּחֲךָ הַטּוֹבָה debe capitalizarse como referencia al Espíritu de Dios
  english_pob_reading: your good Spirit
  chosen_spanish_reading: tu buen Espíritu
  alternative_spanish_readings:
  - tu buen espíritu
  rationale: El contexto habla de guía e instrucción otorgadas a Israel, lo que favorece entender la frase como referencia al Espíritu de Dios. En español, la mayúscula ayuda a reflejar esa lectura sin borrar la alternativa léxica posible del hebreo.
  doctrine_reference: Mantener la tensión léxica del original; primacía del texto hebreo sobre la costumbre litúrgica.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete auditado; la redacción sigue de cerca el hebreo y la elección inglesa ya verificada, preservando la ambigüedad lexical documentada en רוּחַ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la convención del proyecto solo cuando el Tetragrámaton esté explícito; en este versículo no aparece.
  - '''Espíritu'' se capitaliza por la lectura contextual de referencia divina, no por automatismo.'
  - '''maná'' conserva el término técnico bíblico reconocido en español.'
  - Se preserva la imagen concreta de 'boca' para מִפִּיהֶם sin convertirla en paráfrasis abstracta.
