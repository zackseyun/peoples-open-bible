- from: Y ahora quebraré su yugo[a] de sobre ti, y romperé tus ligaduras.
  to: Y ahora quebraré su yugo[a] de encima de ti, y arrancaré tus cadenas.
  rationale: 'La revisión mantiene todas las decisiones exegéticas correctas del borrador, pero mejora dos puntos: (1) cambia «de sobre ti» por «de encima de ti» para un español más natural sin perder la imagen espacial del hebreo; (2) cambia «romperé tus ligaduras» por «arrancaré tus cadenas» para reflejar mejor el valor de אֲנַתֵּק y hacer más idiomática la metáfora de liberación. Se conserva «su yugo» con la misma nota léxica, ajustando solo la cola de la nota para armonizar con «cadenas».'
