translation:
  language: es
  text: Porque tu corazón era tierno[a] y te humillaste delante de Dios cuando oíste sus palabras contra este lugar y contra sus habitantes, y te humillaste delante de mí y rasgaste tus vestidos y lloraste delante de mí, yo también te he oído, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu corazón era suave». El hebreo describe una disposición interior receptiva y humilde.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce con naturalidad la base causal de la respuesta divina, sin perder el valor explicativo-causal del hebreo.
- source_word: רַךְ לְבָבְךָ
  english_pob_choice: your heart was tender
  chosen_spanish: tu corazón era tierno
  alternatives_spanish:
  - tu corazón era suave
  - tu corazón era receptivo
  lexicon: HALOT
  rationale: Rַךְ con לבב describe una disposición interior sensible y humilde. «Tierno» conserva la metáfora de suavidad y la lectura moral/espiritual, como en el audit trail inglés.
- source_word: וַתִּכָּנַע
  english_pob_choice: you humbled yourself
  chosen_spanish: te humillaste
  alternatives_spanish:
  - te sometiste
  - fuiste humillado
  lexicon: HALOT
  rationale: 'El nifal aquí es reflexivo: Josías se humilló voluntariamente. «Te humillaste» preserva ese sentido mejor que una pasiva.'
- source_word: מִלִּפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: La expresión idiomática indica postura reverente ante la presencia divina. «Delante de Dios» es claro y natural en español, y mantiene la relación espacial/reverencial.
- source_word: בְּשָׁמְעֲךָ
  english_pob_choice: when you heard
  chosen_spanish: cuando oíste
  alternatives_spanish:
  - al oír
  - en tu haber oído
  lexicon: HALOT
  rationale: La construcción temporal se vierte de forma directa y fluida con «cuando oíste».
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su mensaje
  - sus dichos
  lexicon: HALOT
  rationale: El sufijo posesivo se entiende por contexto como referido a Dios. «Sus palabras» conserva el plural hebreo y evita explicitar innecesariamente «mensaje».
- source_word: עַל הַמָּקוֹם הַזֶּה וְעַל יֹשְׁבָיו
  english_pob_choice: against this place and against its inhabitants
  chosen_spanish: contra este lugar y contra sus habitantes
  alternatives_spanish:
  - acerca de este lugar y de sus habitantes
  - sobre este lugar y sobre sus habitantes
  lexicon: HALOT
  rationale: En contexto de juicio, עַל tiene sentido adversativo. «Contra» preserva con fuerza esa dirección de las palabras y la repetición enfática.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: La repetición de la fórmula se mantiene para conservar el énfasis retórico de la respuesta divina.
- source_word: וַתִּקְרַע אֶת בְּגָדֶיךָ
  english_pob_choice: and tore your clothes
  chosen_spanish: rasgaste tus vestidos
  alternatives_spanish:
  - rasgaste tus ropas
  - rompiste tus vestidos
  lexicon: HALOT
  rationale: «Vestidos» es un término digno y ampliamente inteligible para el acto ritual de duelo/penitencia. «Rasgaste» conserva el gesto convencional.
- source_word: וַתֵּבְךְּ
  english_pob_choice: and wept
  chosen_spanish: y lloraste
  alternatives_spanish:
  - y sollozaste
  - y vertiste lágrimas
  lexicon: HALOT
  rationale: El verbo expresa llanto de dolor. «Lloraste» es la opción más directa y natural en español.
- source_word: וְגַם אֲנִי שָׁמַעְתִּי
  english_pob_choice: I also have heard you
  chosen_spanish: yo también te he escuchado
  alternatives_spanish:
  - yo también te escuché
  - también te oí
  lexicon: HALOT
  rationale: Se mantiene la completación con relevancia presente del perfecto español, y se explicita el objeto implícito «te» por el contexto del discurso directo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne y el nombre divino en la forma de proyecto «Yahvé», según la política terminológica del POB en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo termina con el Tetragrama; la política del proyecto para español usa «Yahvé» como transliteración del nombre propio, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lectura de עַל הַמָּקוֹם הַזֶּה וְעַל יֹשְׁבָיו
  english_pob_reading: against this place and against its inhabitants
  chosen_spanish_reading: contra este lugar y contra sus habitantes
  alternative_spanish_readings:
  - acerca de este lugar y de sus habitantes
  - sobre este lugar y sobre sus habitantes
  rationale: En este contexto el contenido de las palabras es de juicio; «contra» preserva la fuerza adversativa sin suavizarla a una mera referencia temática.
  doctrine_reference: HALOT / contexto profético de juicio
- issue: Humillación reflexiva de וַתִּכָּנַע
  english_pob_reading: you humbled yourself
  chosen_spanish_reading: te humillaste
  alternative_spanish_readings:
  - fuiste humillado
  - te sometiste
  rationale: La acción es voluntaria y reflexiva; la pasiva perdería el matiz de respuesta personal de Josías ante Dios.
  doctrine_reference: HALOT / nifal reflexivo de כנע
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del expediente en acuerdo alto, sin cambios reportados en la revisión más reciente; se mantiene la equivalencia óptima del inglés auditado y se adapta a un español natural y reverente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto en español.
  - Se mantiene la repetición de «delante de mí / delante de Dios» para conservar el paralelismo y la fuerza retórica.
  - «Te humillaste» refleja la forma reflexiva del verbo hebreo en ambos casos.
  - «Contra» se conserva por el contexto de juicio y no se suaviza a «acerca de».
  - «Vestidos» se eligió por dignidad y claridad, sin perder el sentido de duelo ritual.
