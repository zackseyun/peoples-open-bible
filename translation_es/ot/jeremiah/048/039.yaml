translation:
  language: es
  text: ¡Cómo ha sido quebrantada! ¡Lamenten! ¡Cómo Moab volvió[b] la espalda, avergonzada! Moab se ha convertido en objeto de burla y en horror[a] para todos los que la rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Horror» refleja la revisión auditada del POB inglés frente a opciones como «terror» u «objeto de consternación».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «volvió la espalda/el cuello»; el hebreo usa este giro idiomático para expresar retirada o apartamiento en vergüenza.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¡Qué
  lexicon: HALOT
  rationale: En un lamento poético, el valor exclamativo se conserva mejor con «¡Cómo!»; añade la fuerza de duelo sin introducir una paráfrasis no sustentada.
- source_word: חַתָּה
  english_pob_choice: shattered
  chosen_spanish: ha sido quebrantada
  alternatives_spanish:
  - está destrozada
  - ha sido destruida
  lexicon: HALOT
  rationale: El hebreo comunica ruina/quebrantamiento; «ha sido quebrantada» mantiene la imagen de colapso sin cargar innecesariamente un sentido psicológico.
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad!
  alternatives_spanish:
  - ¡Lamentad!
  - ¡Gritad de duelo!
  lexicon: HALOT
  rationale: «Aullad» reproduce la intensidad del imperativo plural de duelo y conserva el tono abrupto del original.
- source_word: הִפְנָה עֹרֶף
  english_pob_choice: has turned her back
  chosen_spanish: ha vuelto la espalda
  alternatives_spanish:
  - ha vuelto el cuello
  - se ha retirado
  lexicon: HALOT
  rationale: La idiomática hebrea expresa retirada/vergüenza; «ha vuelto la espalda» es el equivalente natural y fiel en español.
- source_word: בּוֹשׁ
  english_pob_choice: in shame
  chosen_spanish: avergonzada
  alternatives_spanish:
  - en vergüenza
  - cubierta de vergüenza
  lexicon: HALOT
  rationale: El adjetivo/predicado transmite el estado de deshonra; «avergonzada» preserva la lectura de estado sin añadir elementos ajenos.
- source_word: לִשְׂחֹק
  english_pob_choice: a laughingstock
  chosen_spanish: objeto de burla
  alternatives_spanish:
  - motivo de risa
  - escarnio
  lexicon: HALOT
  rationale: «Objeto de burla» comunica claramente el sentido de ser ridiculizado y evita un giro demasiado marcado por registro coloquial.
- source_word: לִמְחִתָּה
  english_pob_choice: a horror
  chosen_spanish: horror
  alternatives_spanish:
  - terror
  - consternación
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que prefirió «horror» frente a «terror», porque el sustantivo puede denotar aquello que causa espanto o dismay.
- source_word: לְכָל סְבִיבָיו
  english_pob_choice: to all around her
  chosen_spanish: para todos los que la rodean
  alternatives_spanish:
  - a todos los de alrededor
  - para todos sus vecinos
  lexicon: HALOT
  rationale: La referencia amplia a los circundantes se expresa con una frase natural en español; «la rodean» conserva la personificación femenina de Moab.
theological_decisions:
- issue: Personificación de Moab y concordancia pronominal
  english_pob_reading: Moab is personified as feminine ('she,' 'her back').
  chosen_spanish_reading: Moab sigue personificada en femenino implícito y explícito en la traducción.
  alternative_spanish_readings:
  - Moab ha vuelto la espalda avergonzado
  - Moab se ha convertido en horror para todos a su alrededor
  rationale: El verso trata a Moab como figura femenina. Mantener «la» y los femeninos de concordancia preserva esa personificación literaria del hebreo y del POB inglés.
  doctrine_reference: N/A (poetic personification)
- issue: Valor de מְחִתָּה
  english_pob_reading: a horror
  chosen_spanish_reading: horror
  alternative_spanish_readings:
  - terror
  - objeto de dismay
  rationale: La revisión auditada del POB inglés cambió de «terror» a «horror» para reflejar mejor el término hebreo en este contexto; la versión española adopta esa misma decisión semántica.
  doctrine_reference: N/A (lexical semantics)
- issue: Retirada vergonzosa en el idiomático 'turn the back/neck'
  english_pob_reading: The Hebrew idiom expresses retreat or withdrawal in shame.
  chosen_spanish_reading: «ha vuelto la espalda avergonzada» comunica retirada deshonrosa.
  alternative_spanish_readings:
  - ha vuelto el cuello avergonzada
  - se ha retirado avergonzada
  rationale: La traducción conserva el contenido idiomático y la nota explicativa de que no se trata solo de un gesto físico, sino de retirada en vergüenza.
  doctrine_reference: N/A (idiom / literary Hebrew)
translation_notes:
  revision_awareness: This draft follows the latest audited English revision, which replaced 'terror' with 'horror' for מְחִתָּה while retaining the rest of the line. The Spanish text mirrors that revision and keeps the lament/exclamation structure and the feminine personification of Moab.
  spanish_consistency_notes:
  - Se mantiene «Moab» sin traducir como nombre propio transliterado.
  - Se preserva la personificación femenina con concordancia en «la rodean» y «avergonzada».
  - Se evita suavizar el paralelismo poético del hebreo.
  - La puntuación reproduce el ritmo exclamativo del lamento.
  - No se usa «SEÑOR» ni vocabulario de culto ajeno al verso.
