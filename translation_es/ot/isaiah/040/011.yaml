review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: símil pastoral, reunión de los corderos, porte cercano en el seno/regazo y guía cuidadosa de las ovejas vulnerables. Sin embargo, la nota c está mal alineada con la evidencia fuente/POB: en inglés la alternativa corresponde a עָלוֹת (''ewes with young''), no a יִשָּׂא (''he will carry them''). Además, «las que crían» es comprensible pero menos preciso que «las ovejas que amamantan» o «las ovejas con cría» para el participio עָלוֹת.'
  spanish_quality_summary: 'El español es claro y digno. «Como pastor, pastoreará» suena algo repetitivo pero sigue siendo aceptable y fiel al paralelismo léxico hebreo. «En su seno» conserva bien la ternura de חֵיק. El principal problema de calidad está en la precisión léxica final: «las que crían» puede entenderse de forma más amplia que lactantes/ovejas con cría, y la nota asociada no corresponde al término correcto.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no introduce nombres divinos ni títulos problemáticos. Las decisiones «rebaño», «corderos», «seno» y «conducirá con cuidado» concuerdan en líneas generales con la filosofía POB. Se requiere ajustar la representación de עָלוֹת para preservar mejor la especificidad pastoral documentada en el audit trail.
  issues:
  - severity: high
    issue: La nota [c] está anclada y formulada para «los llevará», pero en el audit trail inglés la alternativa «ewes with young» corresponde a עָלוֹת, no al verbo «llevar».
    rationale: Esto altera la documentación léxica y asigna una alternativa al segmento equivocado, lo que puede confundir al lector y desalinear el español respecto de la evidencia fuente.
  - severity: medium
    issue: «Las que crían» es menos precisa que el hebreo עָלוֹת y que la decisión inglesa «the nursing ewes».
    rationale: La expresión puede abarcar simplemente hembras que crían en sentido general; el hebreo apunta más específicamente a ovejas lactantes o con cría al pie.
  revised_spanish_text: Como pastor, pastoreará a su rebaño[a]; con su brazo reunirá a los corderos, y en su seno[b] los llevará; conducirá con cuidado a las ovejas que amamantan[c].
  revised_footnotes:
