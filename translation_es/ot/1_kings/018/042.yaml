translation:
  language: es
  text: Entonces Acab subió a comer y a beber, pero[a] Elías subió a la cima del Carmelo[b], y se inclinó[c] hasta el suelo y puso su rostro entre sus rodillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y Elías»; la conjunción hebrea es simplemente «y», aunque en español puede resaltarse mejor el contraste con «pero».
    reason: lexical_alternative
  - marker: b
    text: O «a la cumbre del Carmelo» o «a la cima del monte Carmelo».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea describe la postura física de Elías; el contexto amplio sugiere oración, pero el versículo mismo no lo dice explícitamente. El verbo también puede entenderse como «se agachó» o «se postró» en sentido físico.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲלֶה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente o desplazamiento hacia arriba. En español, «subió» es natural y conserva el valor direccional narrativo sin añadir matices no presentes.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  english_pob_choice: to eat and to drink
  chosen_spanish: a comer y a beber
  alternatives_spanish:
  - para comer y beber
  - a comer y a beber
  lexicon: HALOT
  rationale: Los infinitivos con preposición indican propósito. «A comer y a beber» mantiene la coordinación visible y es idiomático en español.
- source_word: וְאֵלִיָּהוּ
  english_pob_choice: but Elijah
  chosen_spanish: pero Elías
  alternatives_spanish:
  - y Elías
  lexicon: HALOT
  rationale: La conjunción hebrea es simplemente «y», pero el contraste discursivo con Ahab se comunica de manera natural en español con «pero», siguiendo el criterio de equivalencia óptima del audit trail en inglés.
- source_word: עָלָה אֶל רֹאשׁ הַכַּרְמֶל
  english_pob_choice: went up to the top of Carmel
  chosen_spanish: subió a la cima del Carmelo
  alternatives_spanish:
  - subió al top del Carmelo
  - subió a la cima del monte Carmelo
  lexicon: HALOT
  rationale: רֹאשׁ significa literalmente «cabeza» y aquí funciona como idiomático «cima/top». «Cima del Carmelo» conserva la cercanía al hebreo; «monte» no aparece explícitamente en el texto base, por eso se omite en la línea principal.
- source_word: הַכַּרְמֶל
  english_pob_choice: Carmel
  chosen_spanish: el Carmelo
  alternatives_spanish:
  - Carmel
  - monte Carmelo
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma habitual en español bíblico «Carmelo», sin forzar la expansión «monte» que el hebreo no explicita.
- source_word: וַיִּגְהַר אַרְצָה
  english_pob_choice: he bent down to the ground
  chosen_spanish: se inclinó hacia la tierra
  alternatives_spanish:
  - se agachó hasta el suelo
  - se postró hacia la tierra
  lexicon: HALOT
  rationale: גהר describe una postura corporal de inclinarse/bajarse. «Se inclinó hacia la tierra» comunica el gesto sin interpretarlo como adoración ni como plegaria explícita, preservando la tensión contextual.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: hacia la tierra
  alternatives_spanish:
  - al suelo
  - a tierra
  lexicon: HALOT
  rationale: La forma direccional de אֶרֶץ puede ser «tierra» o «suelo». «Hacia la tierra» mantiene la concreción física y la literalidad suficiente en español.
- source_word: וַיָּשֶׂם פָּנָיו בֵּין בִּרְכָּיו
  english_pob_choice: put his face between his knees
  chosen_spanish: puso su rostro entre sus rodillas
  alternatives_spanish:
  - colocó su rostro entre sus rodillas
  - apoyó el rostro entre las rodillas
  lexicon: HALOT
  rationale: La expresión es corporal y concreta. «Puso su rostro entre sus rodillas» reproduce con fidelidad la imagen hebrea sin añadir el contenido interpretativo de oración en la redacción principal.
theological_decisions:
- issue: Si debe explicitarse que Elías estaba orando
  english_pob_reading: Retain the physical description without adding 'prayed.'
  chosen_spanish_reading: Conservar la descripción física sin añadir «oró» o equivalente.
  alternative_spanish_readings:
  - y oró con su rostro entre las rodillas
  - se inclinó en oración
  rationale: El versículo describe la postura del profeta, mientras que el contexto más amplio sugiere oración, pero no la nombra aquí. Para no sobreinterpretar, la redacción española mantiene solo la acción observable.
  doctrine_reference: 'Principio POB: no paraprasear más allá de lo que el texto fuente warrantiza; conservar la tensión textual en vez de resolverla interpretativamente.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto al análisis auditado; se mantiene la lectura de contraste discursivo, la referencia a la cima del Carmelo y la descripción física sin explicitar oración.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aparece en este versículo porque el texto no contiene el tetragrámaton.
  - «Elías» y «Ahab» siguen la forma española estándar del nombre propio.
  - «Tierra»/«suelo» se mantiene como término físico; no se introduce lenguaje devocional adicional.
  - La puntuación reproduce el paralelismo narrativo del hebreo con una cláusula contrastiva en español.
