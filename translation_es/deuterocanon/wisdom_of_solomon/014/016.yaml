translation:
  language: es
  text: Entonces[a], con el paso del tiempo, esa costumbre impía se fortaleció y fue guardada como ley; y por los mandatos de los tiranos se rendía culto a las imágenes talladas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el tiempo» o «en el transcurso del tiempo». La expresión griega señala un desarrollo gradual.
    reason: lexical_alternative
  - marker: b
    text: O «los objetos tallados». El griego alude literalmente a cosas o imágenes esculpidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: LSJ
  rationale: Marca una sucesión argumentativa y temporal; «Entonces» funciona de manera natural en español para introducir el desarrollo posterior sin perder el enlace lógico.
- source_word: ἐν χρόνῳ
  english_pob_choice: as time passed
  chosen_spanish: con el paso del tiempo
  alternatives_spanish:
  - en el tiempo
  - con el tiempo
  lexicon: LSJ
  rationale: La expresión subraya un desarrollo gradual, no un instante puntual. «Con el paso del tiempo» conserva ese matiz progresivo con buen ritmo en español.
- source_word: κρατυνθὲν
  english_pob_choice: grew strong
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se hizo fuerte
  - se afirmó
  - fue fortalecida
  lexicon: LSJ
  rationale: El participio pasivo aoristo expresa que la costumbre llegó a consolidarse. «Se fortaleció» comunica bien esa idea de asentamiento y aumento de fuerza.
- source_word: τὸ ἀσεβὲς ἔθος
  english_pob_choice: that ungodly custom
  chosen_spanish: esa costumbre impía
  alternatives_spanish:
  - esa costumbre irreligiosa
  - esa práctica impía
  - esa costumbre sin piedad
  lexicon: LSJ
  rationale: «ἀσεβής» implica irreverencia o impiedad ante Dios; «impía» conserva el juicio moral-religioso. «Costumbre» refleja ἔθος como práctica establecida.
- source_word: ὡς νόμος ἐφυλάχθη
  english_pob_choice: was kept as a law
  chosen_spanish: fue guardada como ley
  alternatives_spanish:
  - fue observada como ley
  - se mantuvo como ley
  lexicon: LSJ
  rationale: «φυλάσσω» puede ser guardar/observar. En español, «fue guardada como ley» mantiene cercanía formal con el griego y la idea de ser tratada como normativa.
- source_word: τυράννων ἐπιταγαῖς
  english_pob_choice: by the commands of tyrants
  chosen_spanish: por los mandatos de los tiranos
  alternatives_spanish:
  - por las órdenes de los tiranos
  - por los decretos de los tiranos
  - por mandatos tiránicos
  lexicon: LSJ
  rationale: «τύραννοι» es evaluativo, no neutro; «tiranos» preserva la carga crítica. «Mandatos» traduce ἐπιταγαῖς con un tono formal y jurídico adecuado.
- source_word: ἐθρησκεύετο
  english_pob_choice: were worshiped
  chosen_spanish: se rendía culto a
  alternatives_spanish:
  - eran adorados
  - se adoraba a
  - se les rendía culto
  lexicon: LSJ
  rationale: El verbo señala observancia religiosa o culto. En este contexto de idolatría, «se rendía culto a» suena natural en español y conserva la fuerza religiosa sin volverlo demasiado interpretativo.
- source_word: τὰ γλυπτά
  english_pob_choice: the carved images
  chosen_spanish: los objetos tallados
  alternatives_spanish:
  - las imágenes talladas
  - los ídolos tallados
  - los objetos esculpidos
  lexicon: LSJ
  rationale: La expresión griega enfatiza lo manufacturado/carved. «Objetos tallados» mantiene el sentido material sin adoptar automáticamente el término teológico «ídolos», que ya queda implicado por el contexto del culto.
theological_decisions:
- issue: Si τυράννων debe suavizarse como «gobernantes» o mantenerse con la carga negativa de «tiranos»
  english_pob_reading: by the commands of tyrants
  chosen_spanish_reading: por los mandatos de los tiranos
  alternative_spanish_readings:
  - por los mandatos de los gobernantes
  - por los decretos de los gobernantes
  rationale: El griego es deliberadamente crítico. Mantener «tiranos» preserva la evaluación moral del texto y evita diluir su denuncia del poder coercitivo que impone la idolatría.
  doctrine_reference: Principio de primacía del original y preservación de la valoración ética del texto; no neutralizar términos cargados sin base textual.
- issue: Si τὰ γλυπτά debe traducirse como «ídolos» o conservar el énfasis material de lo tallado
  english_pob_reading: the carved images
  chosen_spanish_reading: los objetos tallados
  alternative_spanish_readings:
  - las imágenes talladas
  - los ídolos
  - los objetos esculpidos
  rationale: La frase griega destaca que son cosas hechas por talla o escultura. «Objetos tallados» conserva ese rasgo lexical; el carácter idolátrico queda claro por el culto que se les rinde.
  doctrine_reference: Consistencia lexical y retención del detalle material del texto frente a una interpretación demasiado resumida.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del texto base inglés y del griego: progresión temporal gradual, crecimiento de la costumbre impía, y culto impuesto a objetos tallados por mandato de tiranos. No hubo cambios de revisión relevantes según el registro auditado.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantuvo el tono evaluativo de «impía» y «tiranos» para no suavizar el juicio del pasaje.
  - «Se rendía culto a» conserva el sentido de adoración/culto religioso sin introducir una equivalencia doctrinal adicional.
