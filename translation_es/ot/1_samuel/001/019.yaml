translation:
  language: es
  text: Se levantaron muy de mañana y se postraron delante de Yahvé. Luego regresaron y llegaron a su casa en Ramá, y Elcana conoció a Ana su esposa[a], y Yahvé se acordó de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «conoció», un eufemismo habitual para relaciones sexuales conyugales.
    reason: lexical_alternative
  - marker: b
    text: «Se acordó» en hebreo suele significar más que un simple recuerdo mental; puede implicar que Dios se volvió hacia alguien con atención fiel y eficaz.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּשְׁכִּ֣מוּ / בַבֹּ֗קֶר
  english_pob_choice: They rose early in the morning
  chosen_spanish: Se levantaron muy de mañana
  alternatives_spanish:
  - Se levantaron temprano por la mañana
  - Se alzaron temprano
  lexicon: HALOT
  rationale: El verbo hebreo expresa levantarse temprano; «muy de mañana» preserva el énfasis temporal con español natural y digno, sin sonar mecánico ni excesivamente coloquial.
- source_word: וַיִּֽשְׁתַּחֲווּ֙ לִפְנֵ֣י יְהוָ֔ה
  english_pob_choice: and bowed down before Yahweh
  chosen_spanish: y se postraron delante de Yahvé
  alternatives_spanish:
  - y adoraron delante de Yahvé
  - y se inclinaron delante de Yahvé
  lexicon: HALOT
  rationale: השתחוה describe una postración corporal. «Se postraron» conserva la acción física mejor que «adoraron», y «delante de» transmite bien la relación espacial y reverente del hebreo.
- source_word: יְהוָ֔ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la convención del proyecto para יְהוָה. «Yahvé» conserva el nombre propio del pacto, en lugar de sustituirlo por un título.
- source_word: וַ/יָּשֻׁ֛בוּ / וַ/יָּבֹ֥אוּ אֶל בֵּיתָ֖/ם הָ/רָמָ֑תָ/ה
  english_pob_choice: Then they returned and came to their house at Ramah
  chosen_spanish: Luego regresaron y llegaron a su casa en Ramá
  alternatives_spanish:
  - Luego volvieron y fueron a su casa en Ramá
  - Después regresaron y llegaron a su casa en Ramá
  lexicon: HALOT
  rationale: «Regresaron» y «llegaron» reproducen la secuencia narrativa de retorno y arribo. «En Ramá» comunica el asentamiento del hogar en el lugar, de manera natural en español.
- source_word: הָרָמָתָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Ramah
  lexicon: HALOT
  rationale: El topónimo se translitera con acento gráfico para lectura española. «Ramá» es claro y reconocible sin perder la referencia geográfica.
- source_word: וַיֵּ֤דַע אֶלְקָנָה֙ אֶת חַנָּ֣ה אִשְׁתּ֔/וֹ
  english_pob_choice: and Elkanah knew Hannah his wife
  chosen_spanish: y Elcana conoció a su esposa Ana
  alternatives_spanish:
  - y Elcana tuvo relaciones con su esposa Ana
  - y Elcana se unió íntimamente con su esposa Ana
  lexicon: HALOT
  rationale: ידע funciona aquí como eufemismo sexual. Se conserva «conoció» en el texto principal para respetar el giro hebreo; el sentido se aclara en nota, siguiendo el audit trail del POB inglés.
- source_word: וַיִּֽזְכְּרֶ֖/הָ יְהוָֽה
  english_pob_choice: and Yahweh remembered her
  chosen_spanish: y Yahvé se acordó de ella
  alternatives_spanish:
  - y Yahvé la recordó
  - y Yahvé tuvo presente a ella
  lexicon: HALOT
  rationale: «Se acordó de ella» preserva el verbo זכר sin interpretarlo de más. En español expresa mejor la idea bíblica de una memoria activa y favorable que «la recordó», que suena más literal pero menos natural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. El proyecto pide «Yahvé» como nombre propio del pacto, evitando el reemplazo por un título y manteniendo la transparencia frente al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Eufemismo sexual de ידע
  english_pob_reading: Retain the Hebrew euphemism 'knew' in the main text
  chosen_spanish_reading: Conservar «conoció» en el texto principal
  alternative_spanish_readings:
  - tuvo relaciones con
  - se unió íntimamente con
  rationale: El hebreo usa deliberadamente un eufemismo. «Conoció» conserva el registro y la forma del original; una expansión explícita sería interpretativa y perdería la tensión literaria documentada en el POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: Sentido de «se acordó» aplicado a Dios
  english_pob_reading: '''Remembered'' in Hebrew often means more than mental recollection; it can imply that God turned toward someone in faithful, effective regard.'
  chosen_spanish_reading: «Se acordó» como memoria activa y favorable
  alternative_spanish_readings:
  - tuvo presente a ella
  - la tomó en cuenta
  rationale: Se conserva el verbo de memoria sin convertirlo en una paráfrasis causal. En español, «se acordó de ella» puede comunicar el valor bíblico de atención efectiva sin borrar la literalidad del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El texto coincide con el último paso de revisión: no se aplicaron cambios adicionales respecto del consenso del audit trail, y se mantuvo la decisión del POB inglés de conservar el eufemismo de ידע y el lenguaje de «recordó/acordó» para זכר.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se transliteran los nombres propios como «Elcana», «Ana» y «Ramá» con adaptación ortográfica española.
  - Se mantiene un registro bíblico sobrio, evitando equivalentes eclesiásticos más tradicionales cuando reducirían la transparencia al hebreo.
  - 'La puntuación y el orden de las cláusulas siguen la secuencia narrativa del hebreo: levantarse, postrarse, regresar, llegar, conocer, acordarse.'
