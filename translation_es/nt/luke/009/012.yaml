translation:
  language: es
  text: 'Ahora el día comenzaba a declinar, y los doce se acercaron y le dijeron: «Despide a la multitud, para que vayan a las aldeas y a la zona rural de alrededor, hallen alojamiento y consigan provisiones[b], porque aquí estamos en un lugar desolado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lugar desierto». El griego ἔρημος puede denotar un área deshabitada o escasamente poblada.
    reason: lexical_alternative
  - marker: b
    text: O «consigan comida». El griego ἐπισιτισμός se refiere a provisiones o suministros de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡ δὲ ἡμέρα ἤρξατο κλίνειν
  english_pob_choice: Now the day began to decline
  chosen_spanish: Ahora el día comenzaba a declinar
  alternatives_spanish:
  - Ahora el día empezaba a declinar
  - El día comenzaba a terminar
  - Ahora el día se iba inclinando
  lexicon: BDAG
  rationale: κλίνειν conserva la imagen de “inclinarse/declinar” aplicada al día; en español, «declinar» reproduce bien el movimiento hacia el atardecer sin perder la metáfora temporal.
- source_word: προσελθόντες δὲ οἱ δώδεκα
  english_pob_choice: and the twelve came
  chosen_spanish: y los doce se acercaron
  alternatives_spanish:
  - y los doce vinieron
  - y los doce llegaron
  - y los doce se acercaron a él
  lexicon: BDAG
  rationale: προσέρχομαι implica acercarse o ir hacia alguien. «Se acercaron» comunica mejor el movimiento hacia Jesús que un simple «vinieron», y mantiene el referente colectivo de «los doce».
- source_word: Ἀπόλυσον τὸν ὄχλον
  english_pob_choice: Send the crowd away
  chosen_spanish: Despide a la multitud
  alternatives_spanish:
  - Envía a la multitud lejos
  - Libera a la multitud
  - Despacha a la multitud
  lexicon: BDAG
  rationale: ἀπολύω aquí significa despedir o enviar fuera. «Despide» es natural en español bíblico moderno y conserva la fuerza imperativa sin introducir una tonalidad demasiado técnica.
- source_word: ἵνα πορευθέντες
  english_pob_choice: so that they may go
  chosen_spanish: para que vayan
  alternatives_spanish:
  - a fin de que vayan
  - para que, yendo,
  - para que después de ir
  lexicon: BDAG
  rationale: La combinación de participio con ἵνα expresa finalidad. En español, «para que vayan» integra ese matiz sin forzar una construcción participial poco natural.
- source_word: εἰς τὰς κύκλῳ κώμας καὶ ἀγρούς
  english_pob_choice: into the surrounding villages and countryside
  chosen_spanish: a las aldeas y campos de alrededor
  alternatives_spanish:
  - a las aldeas y campos cercanos
  - a las aldeas y el campo de alrededor
  - a las aldeas y la campiña cercana
  lexicon: BDAG
  rationale: κύκλῳ expresa cercanía circundante; κώμαι son aldeas o poblados pequeños; ἀγροί puede referirse a campos o zona rural. «Aldeas y campos de alrededor» mantiene la estructura y el sentido rural, evitando sobreinterpretar ἀγροί como “countryside” en un español menos directo.
- source_word: καταλύσωσιν
  english_pob_choice: find lodging
  chosen_spanish: hallen alojamiento
  alternatives_spanish:
  - encuentren alojamiento
  - pasen la noche
  - consigan posada
  lexicon: BDAG
  rationale: En este contexto καταλύω apunta a conseguir un sitio donde quedarse. «Hallen alojamiento» conserva la idea de encontrar estancia sin añadir más que lo que el contexto requiere.
- source_word: εὕρωσιν ἐπισιτισμόν
  english_pob_choice: get provisions
  chosen_spanish: consigan provisiones
  alternatives_spanish:
  - encuentren alimento
  - obtengan víveres
  - se provean de comida
  lexicon: BDAG
  rationale: ἐπισιτισμός designa provisiones o suministro de comida. «Consigan provisiones» retiene el matiz de abastecimiento necesario, no solo una comida puntual.
- source_word: ὅτι ὧδε ἐν ἐρήμῳ τόπῳ ἐσμέν
  english_pob_choice: because we are here in a desolate place
  chosen_spanish: porque aquí estamos en un lugar desolado
  alternatives_spanish:
  - porque aquí estamos en un lugar desierto
  - porque estamos aquí en un lugar despoblado
  - porque aquí estamos en un paraje desolado
  lexicon: BDAG
  rationale: ἔρημος puede significar desierto, desolado o despoblado. «Lugar desolado» conserva la falta de recursos y de población sin cargar el texto con asociaciones más específicas de “desierto” donde el contexto inmediato no las exige.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura aprobada del inglés POB y no requiere revisiones sustantivas; se mantuvieron las decisiones léxicas clave de κλίνειν, ἀπολύω, καταλύω, ἐπισιτισμός y ἔρημος con equivalentes naturales en español. La puntuación y el orden se ajustaron a la sintaxis castellana sin alterar la relación de finalidad del griego.
  spanish_consistency_notes:
  - Se prefirió «los doce» para conservar la referencia titulada del grupo apostólico.
  - «Aldeas» se usó para κώμαι, evitando un término demasiado ruralizado que desplace el matiz de poblados pequeños.
  - «Provisiones» mantiene el sentido amplio de ἐπισιτισμός y armoniza con el registro bíblico contemporáneo.
  - «Lugar desolado» conserva la ambigüedad lexical de ἔρημος sin convertirla en interpretación teológica.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el Tetragrama ni κύριος en referencia divina.
