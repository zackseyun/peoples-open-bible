translation:
  language: es
  text: Y bendito sea su nombre glorioso[a] para siempre, y que su gloria llene toda la tierra[b]. Amén y amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el nombre de su gloria».
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra entera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוּךְ
  english_pob_choice: And blessed be
  chosen_spanish: Y bendito sea
  alternatives_spanish:
  - Y sea bendito
  - Bendito sea
  lexicon: HALOT
  rationale: El participio pasivo en contexto doxológico funciona como fórmula de bendición; en español, "bendito sea" conserva mejor el valor jussivo y litúrgico que una forma indicativa.
- source_word: שֵׁם כְּבוֹדוֹ
  english_pob_choice: his glorious name
  chosen_spanish: su nombre glorioso
  alternatives_spanish:
  - el nombre de su gloria
  - su nombre de gloria
  lexicon: HALOT
  rationale: La cadena constructa expresa literalmente "nombre de su gloria"; en español, "su nombre glorioso" comunica con naturalidad la cualidad de gloria sin perder la referencia al nombre.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La fórmula temporal indica perpetuidad; "para siempre" es claro, natural y suficientemente solemne en español bíblico contemporáneo.
- source_word: וְיִמָּלֵא
  english_pob_choice: and may ... fill
  chosen_spanish: y que ... llene
  alternatives_spanish:
  - y llene
  - y sea llenada
  lexicon: HALOT
  rationale: El nifal imperfecto aquí se entiende como jussivo; con sujeto singular en español, "que su gloria llene" preserva el deseo/oración implícito mejor que un futuro o pasiva.
- source_word: כְבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su majestad
  lexicon: HALOT
  rationale: '"Gloria" mantiene el campo semántico doxológico y la continuidad bíblico-teológica del término hebreo en este contexto.'
- source_word: אֶת כֹּל הָאָרֶץ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - la tierra entera
  - todo el mundo
  lexicon: HALOT
  rationale: La frase denota la totalidad de la tierra en sentido universal; "toda la tierra" es idiomático y conserva el alcance cosmológico del salmo.
- source_word: אָמֵן וְאָמֵן
  english_pob_choice: Amen and amen
  chosen_spanish: Amén y amén
  alternatives_spanish:
  - Así sea y así sea
  - Verdaderamente, verdaderamente
  lexicon: HALOT
  rationale: La duplicación litúrgica se conserva por transliteración, siguiendo el valor ritual y la cadencia doxológica del original.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: universal 'earth' rather than localized 'land'
  chosen_spanish_reading: '''toda la tierra'' en sentido universal'
  alternative_spanish_readings:
  - '''toda la tierra'' como ''tierra'' local'
  - '''la tierra de Israel'''
  rationale: En un salmo real-mesiánico que culmina en doxología, el contexto favorece el alcance universal; por eso se evita restringirlo a una sola región.
  doctrine_reference: Universalidad del reinado y de la gloria de Dios en la doxología final del Salmo 72
translation_notes:
  revision_awareness: La versión inglesa reciente se mantuvo sin cambios tras revisión de alta concordancia; la redacción española sigue esa lectura estable y conserva las dos alternativas léxicas documentadas en los puntos de mayor tensión.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero aquí no aparece el tetragrámaton en el hebreo de este versículo.
  - Se usa "gloria" de modo consistente para כבוד en un contexto doxológico.
  - Se conserva "Amén y amén" para reflejar la fórmula litúrgica doble sin explicitarla parafrásticamente.
