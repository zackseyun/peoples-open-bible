  text: נִטְּשׁ֖וּ חֲבָלָ֑יִ/ךְ בַּל יְחַזְּק֤וּ כֵן תָּרְנָ/ם֙ בַּל פָּ֣רְשׂוּ נֵ֔ס אָ֣ז חֻלַּ֤ק עַֽד שָׁלָל֙ מַרְבֶּ֔ה פִּסְחִ֖ים בָּ֥זְזוּ בַֽז־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/033/023.yaml
  text: Your ropes hang loose[a]; they cannot hold firm the base of their mast; they cannot spread the sail. Then abundant plunder will be divided[b]; even the lame will carry off the spoil.
  footnotes:
  - marker: a
    text: Or 'they cannot spread the banner/ensign.' The Hebrew word often means 'banner' or 'signal standard,' but 'sail' fits the ship imagery of the verse.
    reason: lexical_alternative
  - marker: b
    text: The verse continues the metaphor of a disabled ship to depict the downfall of the enemy and the ease with which spoil is taken.
    reason: cultural_note
