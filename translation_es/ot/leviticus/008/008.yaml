    text: O "la placa del pecho". El hebreo חֹשֶׁן se refiere a la pieza del pecho del sumo sacerdote; "pectoral" evita sugerir una armadura.
    reason: lexical_alternative
  - marker: b
    text: '"Urim" y "Tumim" son términos rituales hebreos tradicionalmente transliterados; su forma exacta y su modo de uso son inciertos.'
    reason: cultural_note
  revision_rationale: 'Se corrigen únicamente problemas formales y de presentación: se deja un solo anclaje para la nota léxica de ''pectoral'', se coloca la nota cultural sobre el conjunto ''Urim y Tumim'', y se traducen las notas al español. El texto base no necesita cambios sustantivos de sentido.'
