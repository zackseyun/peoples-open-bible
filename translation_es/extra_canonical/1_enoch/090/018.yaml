base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/018.yaml
  text: And I saw until the Lord of the sheep came to them[a], and he took in his hand the staff of wrath and struck the earth, and the earth was split open, and all the beasts and all the birds of heaven fell away from among those sheep and sank into the earth[c][b], and it covered over them.
  footnotes:
  - marker: a
    text: Or 'the earth was cleft open.' The Ge'ez clause is difficult, but the following lines imply that the ground opens so that the beasts and birds descend into it.
    reason: lexical_alternative
  - marker: b
    text: The 'beasts' and 'birds of heaven' continue the symbolic cast of the Animal Apocalypse, representing hostile powers rather than ordinary animals alone.
    reason: cultural_note
  - marker: c
    text: Or 'the staff of his wrath'.
    reason: previous_rendering
