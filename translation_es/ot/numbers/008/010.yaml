review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Moisés debe hacer acercar/presentar a los levitas ante Yahvé, y los hijos de Israel deben imponerles las manos. También conserva correctamente «Yahvé» para יְהוָה y «los hijos de Israel» para בְנֵי יִשְׂרָאֵל. Sin embargo, la nota al pie actual no corresponde al punto que el rastro inglés documenta; el inglés anota la alternativa colectiva de «the Israelites», no una alternativa para לִפְנֵי.'
  spanish_quality_summary: El español es claro y digno. «Harás acercar» es formalmente fiel, aunque algo tieso; aun así es aceptable en contexto ritual. La frase principal suena natural. El problema principal es de aparato de notas, no de legibilidad.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé», הַלְוִיִּם → «los levitas», בְנֵי יִשְׂרָאֵל → «los hijos de Israel». No hay conflicto léxico-teológico mayor. Conviene alinear la nota con la decisión documentada sobre la expresión colectiva.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Yahvé» pero explica לִפְנֵי («delante de»), y además no coincide con la nota del POB inglés.
    rationale: El rastro inglés preserva una nota lexical alternativa para «the sons of Israel» → «the Israelites». En español, la nota debería aclarar el sentido colectivo de «los hijos de Israel»/«los israelitas», no ofrecer una alternativa para «delante de Yahvé». La nota actual crea desalineación editorial y un anclaje confuso.
  revised_spanish_text: Harás acercar a los levitas delante de Yahvé, y los hijos de Israel[a] pondrán sus manos sobre los levitas.
  revised_footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel», una expresión colectiva habitual para el pueblo de Israel.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y legible. Solo se corrige la nota al pie para que coincida con la evidencia fuente y con el rastro de auditoría inglés: la alternativa documentada recae sobre בְנֵי יִשְׂרָאֵל, no sobre לִפְנֵי יְהוָה. También se mueve el marcador al sintagma correspondiente.'
