revisions:
- from: Por tanto, yo le daré su porción entre los muchos[a], y repartirá el botín con los fuertes, porque derramó su vida hasta la muerte y fue contado[b] con los transgresores; sin embargo, llevó el pecado de muchos y intercede[c] por los transgresores.
  to: Por tanto, yo le daré su porción entre los muchos[a], y repartirá el botín con los fuertes, porque derramó su vida hasta la muerte y fue contado entre los transgresores[b]; sin embargo, llevó el pecado de muchos y intercede[c] por los transgresores.
  rationale: Se hizo una reparación menor para alinear mejor el español con el sentido del hebreo y con la distinción lexical documentada por el POB inglés. 'Fue contado entre los transgresores' es más idiomático en español como texto principal, y la nota [b] ahora preserva correctamente la alternativa cercana 'fue contado con los transgresores'. No se requieren cambios doctrinales ni estructurales.
