review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: no tomarán leña del campo ni la cortarán de los bosques, porque usarán las armas como combustible; luego sigue correctamente la reversión retributiva con verbos cognados, y la fórmula final distingue אֲדֹנָי de יהוה como «el Señor Yahvé». Sin embargo, «encenderán fuego» suena menos natural en español para el sentido de usar las armas como combustible que «harán fuego» o «harán hogueras», y la nota a pie a) no preserva la alternativa principal documentada en el POB inglés sobre el hebreo más literal.'
  spanish_quality_summary: El español es claro y digno, pero hay un pequeño ajuste de naturalidad y precisión idiomática. «No llevarán leña del campo» y «ni la cortarán de los bosques» funcionan bien. La combinación «porque con las armas encenderán fuego» es comprensible, pero menos idiomática que «porque con las armas harán fuego», que además se alinea mejor con el audit trail inglés. El resto del versículo es legible; la repetición «despojarán... despojaron / saquearán... saquearon» preserva bien el efecto retórico.
  glossary_alignment: 'La terminología del proyecto está bien observada en lo esencial: YHWH se traduce «Yahvé» y no se enmascara; אֲדֹנָי se mantiene como «Señor». No hay términos doctrinales conflictivos adicionales en este versículo. La nota b conserva adecuadamente la explicación de la repetición cognada. La nota a debería ajustarse para reflejar la alternativa léxica relevante del inglés: el giro más literal «porque con las armas harán fuego».'
  issues:
  - severity: medium
    issue: La frase «con las armas encenderán fuego» es menos idiomática y menos fiel al matiz contextual que «con las armas harán fuego».
    rationale: El hebreo בַנֶּשֶׁק יְבַעֲרוּ אֵשׁ expresa que las armas servirán para el fuego/como combustible. «Encenderán fuego» en español sugiere más el acto de prender una llama que el uso continuado del armamento como material para hacer fuego.
  - severity: medium
    issue: La nota a no corresponde a la alternativa principal preservada en el POB inglés.
    rationale: El inglés documenta como nota la formulación más literal «for with the weapons they will burn fire», explicando que las armas servirán de combustible. La nota española actual trata solo «del campo / de la campiña», que es secundaria y no la alternativa destacada por la auditoría inglesa.
  revised_spanish_text: No llevarán leña del campo, ni la cortarán de los bosques; porque con las armas harán fuego[a]. Y despojarán a los que los despojaron, y saquearán a los que los saquearon[b], declara el Señor Yahvé.
  revised_footnotes:
