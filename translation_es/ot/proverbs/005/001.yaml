translation:
  language: es
  text: Hijo mío, presta atención[a] a mi sabiduría; inclina tu oído hacia mi entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escucha atentamente a mi sabiduría».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a mi discernimiento» o «a mi perspicacia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, muchacho mío
  - Hijo mío, hijo mío
  lexicon: HALOT
  rationale: El hebreo es un vocativo masculino singular. "Hijo mío" conserva el tono paternal/maestro y la relación de autoridad afectuosa sin neutralizar el género ni volverlo impersonal.
- source_word: לְחָכְמָתִי
  english_pob_choice: to my wisdom
  chosen_spanish: a mi sabiduría
  alternatives_spanish:
  - a mi sabiduría
  - a mi enseñanza sabia
  lexicon: HALOT
  rationale: חָכְמָה se traduce de forma directa como "sabiduría". Con el verbo idiomático de atención, el complemento en español suena mejor con "a mi sabiduría" que con una paráfrasis como "enseñanza", que sería más interpretativa.
- source_word: הַקְשִׁיבָה
  english_pob_choice: pay attention
  chosen_spanish: presta atención
  alternatives_spanish:
  - escucha atentamente
  - pon atención
  lexicon: HALOT
  rationale: El imperativo implica escucha atenta. "Presta atención" expresa bien la fuerza exhortativa en español moderno y conserva la idea de atención concentrada mejor que un calco como "da oído".
- source_word: לִתְבוּנָתִי
  english_pob_choice: to my understanding
  chosen_spanish: a mi entendimiento
  alternatives_spanish:
  - a mi discernimiento
  - a mi discernimiento y entendimiento
  - a mi inteligencia
  lexicon: HALOT
  rationale: תְּבוּנָה abarca entendimiento, discernimiento e insight. "Entendimiento" mantiene el sustantivo abstracto y se corresponde con "sabiduría" en el paralelismo, sin cargar el texto con una explicación excesiva.
- source_word: הַט
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - dobla
  - vuelve
  lexicon: HALOT
  rationale: En combinación con "oído", el verbo mantiene la metáfora de orientación atenta. "Inclina" es la equivalencia más natural y fiel al giro idiomático hebreo.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tus oídos
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, en español "tu oído" comunica la misma imagen con naturalidad. "Oreja" sonaría demasiado corporal; "oídos" pluralizaría sin necesidad una forma singular figurada.
translation_notes:
  revision_awareness: 'El texto coincide con el estado revisado de alta concordancia: no hubo cambios aplicados en la revisión más reciente, y la redacción española refleja directamente el hebreo sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se conservó el paralelismo entre "sabiduría" y "entendimiento" para mantener la relación léxica del hebreo.
  - Se usó el singular metafórico "oído" como equivalente natural de אָזְנֶךָ.
  - Se mantuvo el tono vocativo directo y sapiencial, apropiado para un padre/instructor que exhorta a su hijo.
