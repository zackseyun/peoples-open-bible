translation:
  language: es
  text: Y mi esposa Ana trabajaba en las labores propias de las mujeres;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''en el trabajo de las mujeres''; la expresión griega puede referirse en general al trabajo acostumbrado de las mujeres, no necesariamente a un lugar físico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γυνή μου
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: LSJ
  rationale: En este contexto, γυνή con posesivo significa naturalmente 'esposa'; 'mi esposa' comunica la relación con precisión y con español actual, evitando la ambigüedad de 'mi mujer'.
- source_word: Ἄννα
  english_pob_choice: Anna
  chosen_spanish: Ana
  alternatives_spanish:
  - Anna
  lexicon: convención onomástica
  rationale: El nombre propio se adapta a la forma usual en español bíblico, 'Ana', sin alterar la referencia a la misma persona.
- source_word: ἠριθεύετο
  english_pob_choice: worked
  chosen_spanish: trabajaba
  alternatives_spanish:
  - laboraba
  - trabajaba para ganar el sustento
  lexicon: LSJ
  rationale: El verbo indica realizar trabajo o labor; 'trabajaba' conserva la acción general sin sobreespecificar oficio, salario o tipo de tarea.
- source_word: ἐν τοῖς γυναικείοις
  english_pob_choice: at women's tasks
  chosen_spanish: en las labores propias de las mujeres
  alternatives_spanish:
  - en el trabajo de las mujeres
  - en tareas de mujeres
  - en las labores de las mujeres
  lexicon: LSJ
  rationale: La expresión apunta al ámbito o esfera del trabajo femenino más que a un lugar físico; 'las labores propias de las mujeres' preserva ese sentido idiomático en español y evita concretar indebidamente un tipo de oficio.
translation_notes:
  revision_awareness: La comparación con el texto griego y el audit trail inglés muestra alta concordancia y ninguna revisión necesaria; se mantiene la ambigüedad leve de ἐν τοῖς γυναικείοις en una nota, como en el original auditado.
  spanish_consistency_notes:
  - Se usa 'esposa' para γυνή con posesivo, conforme al valor contextual del griego.
  - Se opta por 'trabajaba' como verbo general, sin añadir un oficio específico no atestiguado.
  - Se evita 'SEÑOR' u otra sustitución teológica, pues el versículo no contiene el nombre divino ni títulos cristológicos.
