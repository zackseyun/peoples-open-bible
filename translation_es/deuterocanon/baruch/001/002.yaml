translation:
  language: es
  text: en el quinto año, el séptimo día[a] del mes, en el tiempo en que los caldeos capturaron Jerusalén y la incendiaron con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «en el séptimo del mes»; aquí se entiende la fórmula cronológica elíptica como «el séptimo día del mes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἔτει τῷ πέμπτῳ
  english_pob_choice: in the fifth year
  chosen_spanish: en el quinto año
  alternatives_spanish:
  - durante el quinto año
  - en año cinco
  lexicon: LSJ
  rationale: La expresión temporal se vierte de manera directa y natural en español con una preposición de marco temporal. 'En el quinto año' conserva la sencillez y la cercanía formal del griego.
- source_word: ἐν ἑβδόμῃ τοῦ μηνός
  english_pob_choice: on the seventh day of the month
  chosen_spanish: el séptimo día del mes
  alternatives_spanish:
  - el séptimo del mes
  - en el séptimo mes
  lexicon: LSJ
  rationale: El griego usa una fórmula elíptica de datación; aunque no aparece ἡμέρᾳ, el sentido histórico es 'el séptimo día del mes'. En español conviene explicitar 'día' para evitar la ambigüedad de leerlo como mes.
- source_word: ἐν τῷ καιρῷ ᾧ
  english_pob_choice: at the time when
  chosen_spanish: en el tiempo en que
  alternatives_spanish:
  - cuando
  - en el momento en que
  lexicon: LSJ
  rationale: '''καιρός'' conserva fuerza temporal concreta; ''en el tiempo en que'' mantiene esa referencia sin perder claridad. ''Cuando'' sería más breve, pero algo menos explícito.'
- source_word: ἔλαβον
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - tomaron
  - se apoderaron de
  lexicon: LSJ
  rationale: Para una ciudad como objeto directo, 'capturaron' comunica mejor el sentido militar que 'tomaron', sin añadir más que el verbo permite.
- source_word: οἱ Χαλδαῖοι
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: LSJ
  rationale: Se conserva el etnónimo del griego, 'Χαλδαῖοι', en vez de sustituirlo por el equivalente histórico-explicativo 'babilonios', que sería menos exacto al texto.
- source_word: ἐνέπρησαν
  english_pob_choice: burned
  chosen_spanish: incendiaron
  alternatives_spanish:
  - quemaron
  - prendieron fuego a
  lexicon: LSJ
  rationale: '''Incendiaron'' expresa con precisión el acto de prender fuego a una ciudad y suena natural en español actual. ''Quemaron'' podría ser más general; ''prendieron fuego a'' es más perifrástico.'
- source_word: ἐν πυρί
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: LSJ
  rationale: La frase instrumental se traduce de forma directa. 'Con fuego' reproduce bien el valor de medio sin recargar la sintaxis.
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del texto fuente y la auditoría inglesa: no se introdujeron cambios de sentido, solo se explicitó en español la elipsis cronológica que el propio POB inglés ya resolvía como ''day of the month''.'
  spanish_consistency_notes:
  - Se mantiene 'los caldeos' para el etnónimo, en coherencia con el griego y con la decisión auditada en inglés.
  - Se usa 'incendiaron' para evitar la posible ambigüedad de 'quemaron' y reflejar mejor el verbo intensivo del original.
  - La nota al pie preserva la alternativa literal del griego y explica la expansión necesaria en español.
