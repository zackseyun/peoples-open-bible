translation:
  language: es
  text: Cuando mi alma se apartaba de Yahvé[c][a], casi resbalé en el descenso del sueño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se alejaba de Yahvé».'
    reason: alternative_reading
  - marker: b
    text: La frase también puede significar «la pesadez del sueño» o «el estupor del sueño».
    reason: lexical_alternative
  - marker: c
    text: 'O: «cuando mi alma se componía».'
    reason: previous_rendering
lexical_decisions:
- source_word: Ἐν τῷ συστάξαι
  english_pob_choice: When my soul was departing
  chosen_spanish: Cuando mi alma se apartaba
  alternatives_spanish:
  - Cuando mi alma se retiraba
  - Cuando mi alma se alejaba
  lexicon: LSJ
  rationale: El valor temporal de ἐν τῷ + infinitivo se vierte naturalmente con «cuando». Dado el estado del texto fuente y la revisión auditada, «se apartaba» expresa la separación interior o relacional sin forzar un matiz técnico que el griego no exige de manera inequívoca aquí.
- source_word: ψυχήν μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: LSJ
  rationale: «ψυχή» en este contexto poético y devocional conserva mejor su fuerza espiritual como «alma» que como «vida» o «ser».
- source_word: ἀπὸ Κυρίου
  english_pob_choice: away from the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - apartada de Yahvé
  - lejos de Yahvé
  lexicon: LSJ
  rationale: El POB inglés opta por una separación relacional («away from»). En español, «se apartaba de Yahvé» ya comunica esa distancia. Mantener «Yahvé» sigue el estándar del proyecto para Κυρίου cuando remite al nombre divino.
- source_word: παρὰ μικρόν
  english_pob_choice: almost
  chosen_spanish: casi
  alternatives_spanish:
  - por poco
  - por un momento
  lexicon: LSJ
  rationale: 'La locución idiomática se traduce con el equivalente español más natural y fiel: «casi».'
- source_word: ὠλίσθησα
  english_pob_choice: I slipped
  chosen_spanish: resbalé
  alternatives_spanish:
  - tropecé
  - deslicé
  lexicon: LSJ
  rationale: El verbo expresa pérdida de apoyo o deslizamiento; «resbalé» conserva la imagen física de manera vívida y directa en español.
- source_word: ἐν καταφορᾷ ὕπνου
  english_pob_choice: in the descent of sleep
  chosen_spanish: en la pendiente del sueño
  alternatives_spanish:
  - en la caída del sueño
  - en la hondura del sueño
  - en el descenso del sueño
  lexicon: LSJ
  rationale: «καταφορά» admite la idea de descenso, inclinación o hundimiento. «Pendiente» mantiene la metáfora de inclinación y el paralelo con «resbalé», sin perder la sensación de movimiento hacia abajo. «Sueño» traduce ὕπνου de forma directa.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: Por norma del proyecto, el referente del nombre divino se vierte como «Yahvé» en el texto principal, no como «Señor» enmascarado. Aquí la separación es respecto de Dios, no un mero título humano.
theological_decisions:
- issue: 'Cómo expresar ἀπὸ Κυρίου: separación relacional o simple procedencia'
  english_pob_reading: 'relational separation: ''away from the Lord'''
  chosen_spanish_reading: 'separación relacional: «se apartaba de Yahvé»'
  alternative_spanish_readings:
  - «de Yahvé»
  - «lejos de Yahvé»
  rationale: La línea transmite peligro espiritual ligado a la distancia de Yahvé. «Se apartaba de Yahvé» conserva esa tensión relacional sin suavizarla ni convertirla en mera procedencia causal.
  doctrine_reference: Primacía del original; mantener tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrige la lectura previa dependiente de un error de OCR y restituye la idea de separación/departing con un símil de sueño más literal. La versión española evita seguir la solución anterior de «slumbered» y mantiene la tensión entre alejamiento y somnolencia sin introducir explicaciones externas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como traducción de Κυρίου conforme a la terminología del proyecto.
  - Se usa «alma» para ψυχή por coherencia con el registro poético y devocional.
  - Se conserva la imagen de descenso/resbalón sin convertirla en paráfrasis explicativa.
  - Las notas alternativas distinguen entre variación lexical legítima y la forma textual discutida del primer verbo.
