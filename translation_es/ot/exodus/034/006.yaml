translation:
  language: es
  text: 'Entonces Yahvé pasó delante de él y proclamó[a]: «Yahvé, Yahvé, un Dios compasivo y clemente, lento para enojarse y abundante en amor leal y fidelidad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'abundante en amor leal y verdad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la decisión POB de transliterar el Nombre divino en vez de sustituirlo por un título. En español, 'Yahvé' es la forma estable y natural para preservar el nombre personal revelado a Israel.
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó delante de
  - fue delante de
  lexicon: HALOT
  rationale: El verbo expresa un movimiento de pasar de un lado a otro o delante de alguien. 'Pasó' es natural en español y conserva la acción narrativa sin añadir más de lo que el hebreo exige.
- source_word: עַל פָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La locución idiomática se vierte de modo relacional y espacial. 'Delante de él' comunica el sentido de presencia sin literalidad extraña como 'sobre su rostro'.
- source_word: וַיִּקְרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - clamó
  - declaró
  lexicon: HALOT
  rationale: En este contexto de autodeclaración divina, 'proclamó' transmite mejor la solemnidad pública que un simple 'llamó' o 'llamó en voz alta'.
- source_word: אֵל
  english_pob_choice: a God
  chosen_spanish: un Dios
  alternatives_spanish:
  - Dios
  - el Dios poderoso
  lexicon: HALOT
  rationale: Aquí אֵל introduce una descripción appositiva del carácter divino. 'Un Dios' conserva el valor descriptivo y la cadencia de la serie de atributos, sin forzar una formulación más interpretativa.
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT
  rationale: '''Compasivo'' comunica bien la sensibilidad de רחום en español moderno y mantiene el paralelismo con los adjetivos siguientes.'
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - bondadoso
  - gracioso en el sentido de favorable
  lexicon: HALOT
  rationale: '''Clemente'' puede expresar con dignidad la idea de favor inmerecido y benevolencia activa. Se evita ''gracioso'' por su ambigüedad en español actual, y ''gracioso'' no reproduce el valor teológico de חַנּוּן.'
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - tardo para la ira
  - paciente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se traduce con un equivalente natural que conserva el sentido de no ser irritable ni pronto al enojo.
- source_word: רַב
  english_pob_choice: abounding in
  chosen_spanish: abundante en
  alternatives_spanish:
  - rico en
  - rebosante de
  lexicon: HALOT
  rationale: Con sustantivos abstractos, רַב indica plenitud. 'Abundante en' reproduce esa idea con fluidez en español.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - misericordia
  - fidelidad amorosa
  lexicon: HALOT
  rationale: '''Amor leal'' intenta preservar la tensión entre amor, lealtad y compromiso pactual que חסד expresa. Evita reducir el término a ''misericordia'' o a una sola cualidad afectiva.'
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - confiabilidad
  lexicon: HALOT
  rationale: En la pareja חסד וֶאֱמֶת, 'fidelidad' capta bien la idea de confiabilidad pactual que el POB inglés expresa como 'faithfulness'. Se mantiene abierta la alternativa 'verdad' en la nota textual.
theological_decisions:
- issue: El Nombre divino יְהוָה en la fórmula repetida
  english_pob_reading: Yahweh, Yahweh
  chosen_spanish_reading: Yahvé, Yahvé
  alternative_spanish_readings:
  - el SEÑOR, el SEÑOR
  - Yahvé, el Dios
  rationale: La repetición del Nombre se conserva como énfasis retórico y teológico. No se sustituye por un título, para mantener la transparencia del texto fuente y la distinción entre el Nombre y el sustantivo descriptivo siguiente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אֱמֶת en la pareja חֶסֶד וֶאֱמֶת
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  rationale: Se adopta 'fidelidad' para reflejar el matiz de confiabilidad relacional y pactual que el contexto exige. 'Verdad' queda como alternativa legítima porque el término también puede significar verdad en sentido léxico más general.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje hebreo y la auditoría inglesa. No se introdujeron revisiones posteriores; el último pase indica que no hubo cambios necesarios y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Nombre divino, en coherencia con el proyecto.
  - Se evitó 'SEÑOR' como sustitución del Tetragrámaton.
  - La pareja final se resolvió con 'amor leal y fidelidad', dejando la alternativa 'verdad' en nota para preservar la tensión léxica.
  - El verbo 'proclamó' reproduce el carácter solemne de וַיִּקְרָא sin sobreexplicación.
