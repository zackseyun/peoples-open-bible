base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/021.yaml
  text: David came to the two hundred men who had become too exhausted to follow David[a], and whom they had left at the Brook Besor. They came out to meet David and to meet the people who were with him[b], and David came near to the people and asked them about their welfare.
  footnotes:
  - marker: a
    text: Or 'asked them about their welfare.' The Hebrew idiom literally refers to asking concerning peace/well-being.
    reason: lexical_alternative
  - marker: b
    text: Or 'had been left behind' / 'were too weary to go on after David' for the clause describing the two hundred men.
    reason: lexical_alternative
