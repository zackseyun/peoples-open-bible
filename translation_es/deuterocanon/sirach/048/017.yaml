  to: Ezequías fortificó su ciudad, y trajo agua a su interior; cortó la roca como bronce[a], y represó un depósito en las montañas[b].
  rationale: 'Se corrige la redacción para ajustarla mejor al hebreo y al audit trail inglés revisado: ''como bronce'' en vez de ''con bronce'', ''cortó la roca'' en vez de ''abrió paso a la roca'', y ''represó un depósito'' en vez de ''levantó un depósito'', que alteraba la acción del verbo fuente.'
