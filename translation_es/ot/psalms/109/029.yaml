translation:
  language: es
  text: Que mis acusadores[a] se vistan de vergüenza, y que se envuelvan en su vergüenza como un manto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mis adversarios'. El término hebreo puede designar oponentes en general o acusadores en un sentido más legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִלְבְּשׁוּ
  english_pob_choice: May ... be clothed
  chosen_spanish: sean vestidos
  alternatives_spanish:
  - se vistan
  - sean cubiertos
  lexicon: HALOT
  rationale: El imperfecto qal plural en este contexto imprecatorio funciona como deseo o petición. En español, 'sean vestidos' conserva el valor de súplica y la imagen de ser revestidos con la vergüenza sin volverla una simple profecía futura.
- source_word: שׂוֹטְנַי
  english_pob_choice: my accusers
  chosen_spanish: mis acusadores
  alternatives_spanish:
  - mis adversarios
  - los que me acusan
  lexicon: HALOT
  rationale: El término puede abarcar adversarios en general o acusadores en sentido más legal. 'Mis acusadores' sigue la elección inglesa y mantiene bien el matiz forense y hostil del salmo, además del sufijo de primera persona.
- source_word: כְּלִמָּה
  english_pob_choice: disgrace
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - humillación
  - desgracia
  lexicon: HALOT
  rationale: La palabra denota vergüenza pública o deshonra. Aquí 'vergüenza' funciona de manera natural con la imagen de vestirse, y evita una repetición forzada con el segundo miembro del versículo.
- source_word: וְיַעֲטוּ
  english_pob_choice: and wrap themselves
  chosen_spanish: y que se envuelvan
  alternatives_spanish:
  - y se cubran
  - y se revistan
  lexicon: HALOT
  rationale: El verbo tiene sentido de envolverse o cubrirse con algo. 'Se envuelvan' preserva la reflexividad de la imagen y se ajusta al paralelismo del vestido.
- source_word: כַמְעִיל
  english_pob_choice: like a robe
  chosen_spanish: como con un manto
  alternatives_spanish:
  - como con una capa
  - como con una ropa
  lexicon: HALOT
  rationale: מְעִיל es una prenda exterior, más naturalmente 'manto' en español bíblico moderno. 'Como con un manto' mantiene la comparación y evita un término demasiado moderno o demasiado litúrgico.
- source_word: בָּשְׁתָּם
  english_pob_choice: their shame
  chosen_spanish: su propia vergüenza
  alternatives_spanish:
  - su vergüenza
  - su deshonra
  - su humillación
  lexicon: HALOT
  rationale: El sustantivo conserva el campo semántico de vergüenza/humillación. 'Su propia vergüenza' refuerza la idea de que el envolvimiento procede de aquello que les pertenece, sin añadir contenido ajeno al hebreo.
theological_decisions:
- issue: Modo verbal en un salmo imprecatorio
  english_pob_reading: 'The imperfects are rendered as a wish/prayer: ''May my accusers be clothed ... and wrap themselves ...'''
  chosen_spanish_reading: 'Se expresan como petición: ''Que ... sean vestidos ... y que se envuelvan ...'''
  alternative_spanish_readings:
  - 'Futuro predictivo: ''Mis acusadores serán vestidos ...'''
  - 'Jussivo más breve: ''Vistan vergüenza mis acusadores ...'''
  rationale: El hebreo imperfecto en este contexto funciona como deseo o súplica, no como simple predicción. 'Que' preserva el tono orante e imprecatorio del salmo y evita convertir la frase en una afirmación neutra del futuro.
  doctrine_reference: Fidelidad al sentido pragmático del texto; preservación de la tensión teológica del salmo imprecatorio sin suavizarla ni amplificarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca la aprobación de alta concordancia del registro inglés y no introduce revisiones textuales nuevas. Se conserva la misma decisión lexical principal para שׂוֹטְנַי, la metáfora de vestirse/envolverse y el valor imprecatorio de los imperfectos.
  spanish_consistency_notes:
  - Se mantiene 'vergüenza' para כְּלִמָּה y בָּשְׁתָּם con una ligera modulación ('su propia vergüenza') para evitar una repetición dura.
  - '''Manto'' se usa para מְעִיל por claridad y por su adecuación como prenda exterior.'
  - La nota textual solo se ancla en 'acusadores' porque allí reside la alternativa léxica documentada.
