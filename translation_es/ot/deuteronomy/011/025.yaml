base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/011/025.yaml
  text: No man will stand before you[a]. Yahweh your God will put the fear and dread of you on the face of all the land on which you tread[b], just as he spoke to you.
  footnotes:
