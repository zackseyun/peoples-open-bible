    issue: נְמֹגִים traducido como 'se derriten'
    rationale: Aunque es una correspondencia posible, en español aplicado a 'la tierra y todos los que habitan en ella' suena más literal-físico que la intención poética de inestabilidad o colapso. 'Se desmoronan' comunica mejor la fuerza contextual y sigue siendo vívido.
  - severity: medium
    issue: עַמּוּדֶיהָ traducido como 'sus columnas'
    rationale: El audit trail inglés defendió explícitamente 'pillars' para preservar la imagen cosmológica. En español, 'pilares' reproduce mejor esa decisión que 'columnas', que suena más arquitectónico-neutral.
  - severity: low
