translation:
  language: es
  text: Y después del terremoto[a], un fuego; Yahvé no estaba en el fuego. Y después del fuego, un sonido de tenue quietud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una voz apacible y delicada», «un murmullo suave» o «un silencio tenue». El hebreo dice literalmente «un sonido/voz de quietud delgada/tenue», una expresión intencionalmente delicada y difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַחַר
  english_pob_choice: And after
  chosen_spanish: Y después de
  alternatives_spanish:
  - Después de
  - Y tras
  lexicon: HALOT
  rationale: El hebreo usa un marcador secuencial que avanza la serie narrativa. «Y después de» conserva esa coordinación y el flujo del relato.
- source_word: הָ/רַעַשׁ
  english_pob_choice: the earthquake
  chosen_spanish: el terremoto
  alternatives_spanish:
  - el temblor
  - la sacudida
  lexicon: HALOT
  rationale: רַעַשׁ puede referirse a sacudida violenta o terremoto; en esta secuencia teofánica, «terremoto» es la equivalencia española más clara y natural.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  - una llama
  lexicon: HALOT
  rationale: El sustantivo aparece sin artículo en hebreo y presenta el siguiente fenómeno de la serie. «Un fuego» conserva la indefinición del original y su valor escénico.
- source_word: לֹא בָ/אֵשׁ יְהוָה
  english_pob_choice: the LORD was not in the fire
  chosen_spanish: Yahvé no estaba en el fuego
  alternatives_spanish:
  - Yahvé no estaba con el fuego
  - Yahvé no estaba en medio del fuego
  lexicon: HALOT
  rationale: La preposición ב se entiende locativamente como «en». Mantener «estaba en el fuego» preserva el paralelismo del versículo sin añadir matices no explicitados por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en su forma aprobada para el proyecto: «Yahvé», en vez de sustituirlo por un título.'
- source_word: קוֹל
  english_pob_choice: a sound
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  - un ruido
  lexicon: HALOT
  rationale: קוֹל abarca «sonido» y «voz». Aquí el giro tradicional español «voz de...» comunica bien el conjunto, aunque el hebreo no obliga a entender discurso articulado.
- source_word: דְּמָמָה
  english_pob_choice: stillness
  chosen_spanish: quietud
  alternatives_spanish:
  - silencio
  - calma
  lexicon: HALOT
  rationale: דְּמָמָה expresa quietud, silencio o calma. «Quietud» conserva la idea de ausencia de ruido y evita cerrar demasiado el valor del término.
- source_word: דַקָּה
  english_pob_choice: thin
  chosen_spanish: delicada
  alternatives_spanish:
  - fina
  - suave
  - tenue
  lexicon: HALOT
  rationale: דַקָּה literalmente es «delgada/fina/tenue». «Delicada» funciona en español para comunicar la fragilidad y sutileza de la expresión sin sonar áspera, y ayuda a sostener la dificultad poética del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton; la forma del proyecto en español es «Yahvé», manteniendo el nombre personal del Dios del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La frase קוֹל דְּמָמָה דַקָּה
  english_pob_reading: a sound of a gentle whisper
  chosen_spanish_reading: una voz de quietud delicada
  alternative_spanish_readings:
  - una voz de un silencio tenue
  - un sonido de quietud delicada
  - un murmullo suave
  rationale: La expresión hebrea es difícil y deliberadamente delicada. «Voz de quietud delicada» mantiene la tensión entre sonido y quietud sin resolverla por completo en una sola imagen interpretativa; se preservan alternativas en nota para no borrar la ambigüedad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La edición inglesa pasó de una traducción más literal de la frase final a una más natural («a gentle whisper»). En español se optó por mantener la tensión semántica del hebreo con «voz de quietud delicada», pero la nota recoge alternativas tradicionales y más interpretativas. El resto del versículo sigue de cerca la secuencia del texto hebreo y el nombre divino se mantiene como Yahvé conforme al estándar del proyecto.
  spanish_consistency_notes:
  - 'Se conserva la secuencia narrativa repetitiva del hebreo con tres eventos: terremoto, fuego y la frase final difícil.'
  - «Yahvé» se usa de manera consistente para el Tetragrámaton.
  - «Un fuego» conserva la indefinición del original.
  - La frase final evita cerrar el hebreo en una sola solución interpretativa y deja constancia de alternativas legítimas en la nota.
  - Se prefiere español claro y publicable, sin caer en una calca rígida de la sintaxis hebrea.
