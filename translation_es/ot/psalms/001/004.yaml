translation:
  language: es
  text: No así los malvados[a]; más bien, son como paja que el viento se lleva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los impíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  english_pob_choice: Not so
  chosen_spanish: No así
  alternatives_spanish:
  - No de ese modo
  - No sucede así
  lexicon: HALOT
  rationale: La construcción hebrea es breve y contrastiva; «No así» conserva la negación abrupta sin añadir verbos innecesarios.
- source_word: הָרְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los injustos
  lexicon: HALOT
  rationale: «Malvados» comunica bien el valor moral de רשעים en el marco sapiencial. «Impíos» es posible, pero puede sonar más eclesiástico o teológico que el hebreo de base.
- source_word: כִּי אִם
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - antes bien
  lexicon: HALOT
  rationale: Aquí la partícula introduce contraste correctivo; «más bien» reproduce ese giro en español natural sin perder la oposición fuerte.
- source_word: כַּמֹּץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como tamo
  - como hojarasca
  lexicon: HALOT
  rationale: מֹץ designa el residuo liviano separado del grano. «Paja» es comprensible y tradicional en español bíblico, aunque «tamo» sería más técnico; se conserva la imagen agrícola sin sonar forzado.
- source_word: רוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - un viento
  - el aire
  lexicon: HALOT
  rationale: En este símil agrícola, רוּחַ es claramente el fenómeno meteorológico. «El viento» es la opción más natural y precisa.
- source_word: תִּדְּפֶנּוּ
  english_pob_choice: drives away
  chosen_spanish: la impulsa y se la lleva
  alternatives_spanish:
  - lo arrebata
  - lo dispersa
  lexicon: HALOT
  rationale: 'El verbo expresa la acción del viento sobre la paja/chaff: empujarla y expulsarla. La doble expresión en español intenta recoger la fuerza dinámica del hebreo sin caer en un calco rígido; el pronombre «se la» mantiene la referencia a la paja.'
theological_decisions:
- issue: Imagen final del destino de los malvados
  english_pob_reading: the wicked are like chaff that the wind drives away
  chosen_spanish_reading: los malvados son como paja que el viento la impulsa y se la lleva
  alternative_spanish_readings:
  - los malvados son como tamo que el viento arrastra
  - los malvados son como paja que el viento dispersa
  rationale: No hay una afirmación doctrinal añadida; se mantiene el símil de fragilidad, falta de peso y fácil remoción. La traducción evita suavizar la imagen y conserva su contraste con el justo del versículo anterior.
  doctrine_reference: Salmo 1:3-4; sabiduría poética sobre la estabilidad del justo y la inestabilidad del malvado
translation_notes:
  revision_awareness: El control cruzado disponible indica alta concordancia y sin cambios aplicados en la revisión más reciente; por eso la redacción se mantiene conservadora, con una solución española natural para el símil final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el contraste breve del hebreo con una estructura igualmente concisa en español.
  - «Paja» funciona como equivalente divulgativo de מֹץ; se señala en la decisión léxica la alternativa técnica «tamo».
