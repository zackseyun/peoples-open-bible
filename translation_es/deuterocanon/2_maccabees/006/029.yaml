translation:
  language: es
  text: Los que lo iban conduciendo cambiaron la buena voluntad que le habían mostrado un poco antes en hostilidad, a causa de las palabras recién dichas, pues las consideraban, según ellos pensaban, locura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «necedad», «insensatez» o «desesperación» para ἀπόνοια. El griego expresa lo que pensaron los escoltas de sus palabras, no necesariamente el juicio propio del narrador.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶνδε ἀγόντων πρὸς αὐτόν
  english_pob_choice: those who were leading him
  chosen_spanish: los que lo iban conduciendo
  alternatives_spanish:
  - los que lo llevaban
  - sus escoltas
  lexicon: LSJ
  rationale: El participio con genitivo absoluto describe a los hombres que acompañaban y guiaban a Eleazar. En español, «iban conduciendo» conserva la idea de llevarlo en marcha sin introducir una lectura demasiado técnica ni perder naturalidad.
- source_word: τὴν μικρῷ πρότερον εὐμένειαν
  english_pob_choice: the goodwill they had shown him a little earlier
  chosen_spanish: la buena voluntad que le habían mostrado un poco antes
  alternatives_spanish:
  - su anterior benevolencia
  - el favor mostrado poco antes
  lexicon: LSJ
  rationale: 'εὐμένεια expresa favor, benevolencia o buena voluntad. La construcción española mantiene la relación interpersonal explícita: la buena voluntad fue algo que ellos le mostraron.'
- source_word: δυσμένειαν
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - mala voluntad
  - enemistad
  lexicon: LSJ
  rationale: Como contraparte de εὐμένεια, δυσμένεια marca el cambio de favor a oposición hostil. «Hostilidad» reproduce bien ese giro y su fuerza relacional.
- source_word: διὰ τὴν τῶν προειρημένων λόγων
  english_pob_choice: because of the words just spoken
  chosen_spanish: a causa de las palabras recién dichas
  alternatives_spanish:
  - por las palabras dichas antes
  - a causa de lo previamente dicho
  lexicon: LSJ
  rationale: προειρημένων indica palabras ya dichas en el contexto inmediato. «Recién dichas» comunica cercanía temporal sin alejarse del valor del griego.
- source_word: ὡς αὐτοὶ ὑπελάμβανον
  english_pob_choice: since they regarded them, as they supposed, as madness
  chosen_spanish: pues ellos las consideraban, según suponían
  alternatives_spanish:
  - según ellos pensaban
  - como ellos creían
  lexicon: LSJ
  rationale: La cláusula preserva la atribución subjetiva a los escoltas. «Según suponían» mantiene la distancia narrativa y evita convertir su juicio en afirmación del narrador.
- source_word: ἀπόνοιαν
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - necedad
  - insensatez
  - desesperación
  lexicon: LSJ
  rationale: ἀπόνοια puede abarcar irracionalidad, desvarío o insensatez. «Locura» es lo bastante fuerte para reflejar la valoración de los escoltas sin fijar demasiado el matiz en una sola opción.
theological_decisions:
- issue: Distancia narratorial respecto del juicio de los escoltas
  english_pob_reading: The final assessment is rendered as the escorts' opinion, not as the narrator's own verdict.
  chosen_spanish_reading: El juicio final queda presentado como opinión de ellos, no como sentencia del narrador.
  alternative_spanish_readings:
  - las palabras eran locura
  - consideraban locas aquellas palabras
  rationale: El griego incluye ὡς αὐτοὶ ὑπελάμβανον, que atribuye expresamente la valoración a los acompañantes. La traducción conserva esa distancia para no borrar la tensión documental del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve ambiguity/tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste más reciente del audio-trail inglés: mantiene el orden básico del griego, conserva ambas relaciones causales («a causa de...», «pues...»), y deja explícito que la valoración pertenece a los escoltas mediante una cláusula de perspectiva subjetiva.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece ninguna forma del nombre divino.
  - Se mantiene «locura» como equivalente principal de ἀπόνοια, con alternativas en nota para preservar el rango semántico documentado.
  - «Hostilidad» traduce la oposición resultante de δυσμένεια, en línea con el valor antonímico frente a εὐμένεια.
