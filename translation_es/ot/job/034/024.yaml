  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Dios es el sujeto implícito, derriba a los poderosos y coloca a otros en reemplazo. «Los poderosos» y «en su lugar» corresponden bien a כַּבִּירִים y תַּחְתָּם. La nota sobre לֹא חֵקֶר preserva adecuadamente las alternativas léxicas del inglés auditado.'
  spanish_quality_summary: El texto es claro y natural, pero «sin investigación» suena algo calcado y poco idiomático en español bíblico corriente. Además, «despedaza» puede sugerir una imagen demasiado física o corporal; «destroza» o «derriba» suenan más naturales, y «destroza» conserva mejor la fuerza de 'shatters'.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. No aparece Yahvé, Mesías, δοῦλος, etc. La decisión principal es estilístico-lexical: mejorar la naturalidad de לֹא חֵקֶר en español manteniendo la fuerza del original y del audit trail inglés.'
  issues:
