review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del hebreo: los zifitas se levantan, van a Zif antes de Saúl, y luego se ubica a David y sus hombres en el desierto de Maón, en la Arabá, al sur del Jesimón. Sin embargo, las notas están mal ancladas: la nota [a] se coloca tras «Saúl» aunque explica «al sur del Jesimón», y la nota [b] se coloca tras «Arabá» aunque explica «Jesimón». Además, «Y David…» pierde un poco el matiz de cambio de escena que el inglés auditado marcó con “Now”; en español conviene «Ahora bien» o «Ahora».'
  spanish_quality_summary: El español es mayormente natural y legible. «Se levantaron y fueron a Zif» y «delante de Saúl» son aceptables. «Desierto de Maón» es inteligible, aunque «wilderness» también podría ser «desierto» en este contexto. La principal corrección necesaria es de coherencia editorial y legibilidad de notas. También es preferible uniformar el topónimo como «Jesimón» en texto y nota, en lugar de mezclar con «Jeshimon».
  glossary_alignment: 'No hay términos teológicos mayores en juego. Los topónimos están en general bien conservados: Zif, Saúl, Maón, Arabá, Jesimón. La decisión de mantener הַיְשִׁימוֹן como topónimo concuerda con la auditoría inglesa, pero la nota debe reflejar la misma forma española del nombre. La decisión geográfica sobre ימין = «sur» está bien, solo debe anclarse al lugar correcto.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota [a] explica «a la derecha del Jesimón / sur», por lo que debe ir en «Jesimón» o en la frase direccional, no en «Saúl». La nota [b] explica el sentido/topónimo de הַיְשִׁימוֹן, por lo que debe ir en «Jesimón», no en «Arabá». Tal como está, el lector recibe información incorrectamente asociada.
  - severity: medium
    issue: Inconsistencia entre «Jesimón» en el texto y «Jeshimon» en la nota.
    rationale: La nota debe seguir la forma española elegida en el texto para evitar confusión editorial y respetar la decisión léxica documentada.
  - severity: low
    issue: «Y David y sus hombres» suena menos marcado como cambio de escena que la auditoría inglesa.
    rationale: El hebreo usa una cláusula nominal para reubicar la atención; en español «Ahora David y sus hombres estaban…» o «Ahora bien, David…» refleja mejor ese giro discursivo sin apartarse del sentido.
  revised_spanish_text: Se levantaron y fueron a Zif delante de Saúl. Ahora David y sus hombres estaban en el desierto de Maón, en la Arabá, al sur del Jesimón[a][b].
  revised_footnotes:
  - marker: a
    text: 'O: «a la derecha del Jesimón». La expresión hebrea dice literalmente «derecha/lado derecho», que en uso geográfico puede significar «sur».'
    reason: lexical_alternative
  - marker: b
    text: «Jesimón» puede entenderse también como «desierto» o «despoblado», pero aquí probablemente funciona como nombre de lugar.
    reason: lexical_alternative
