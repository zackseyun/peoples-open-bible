revisions:
- from: Pero cuando los que rodeaban a Macabeo se enteraron de que él estaba sitiando las fortalezas, con lamentaciones y lágrimas, junto con las multitudes, suplicaban al Señor que enviara un buen ángel para la salvación de Israel[a].
  to: Pero cuando los que estaban con Macabeo se enteraron de que él estaba sitiando las fortalezas, suplicaban al Señor, junto con las multitudes, con lamentaciones y lágrimas, que enviara un buen ángel para la salvación de Israel[a].
  rationale: La revisión mantiene todas las decisiones de fondo del borrador, pero mejora la naturalidad y la precisión idiomática del español. «Los que estaban con Macabeo» comunica mejor el sentido grupal de οἱ περὶ τὸν Μακκαβαῖον, y el reordenamiento de los complementos evita una construcción entrecortada sin perder ninguno de los matices del griego.
