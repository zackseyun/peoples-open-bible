translation:
  language: es
  text: Y Salmón engendró a Booz[a], y Booz engendró a Obed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engendró». El verbo hebreo es un término genealógico estándar que significa «engendró» o «fue padre de».
