review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego: condición introductoria, envío de «la muerte», mandato divino respecto de «nosotros», fundamento en la misericordia divina, y negación de una ira que lleve a la destrucción total. Sin embargo, dos giros españoles no reproducen con suficiente precisión el valor de las cláusulas finales: «le darás orden» suena menos natural y menos directo que «le darás órdenes» o «le ordenarás», y sobre todo «no te enojarás hasta destruirnos por completo» puede sugerir secuencia temporal (''no te enojarás hasta que…'') en vez de resultado/intensidad (''no te enojarás al punto de / de modo que nos destruyas'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita un ajuste menor para evitar ambigüedad sintáctica. «Acerca de nosotros» funciona, aunque «respecto de nosotros» o «con respecto a nosotros» sería más idiomático en este registro. El principal problema de legibilidad/fidelidad es «hasta destruirnos por completo», que en español moderno no expresa bien el infinitivo articular de resultado y puede malentenderse. También conviene suavizar «darás orden» a una formulación más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La muerte», «misericordioso» y el tratamiento de la personificación mediante «le» están alineados con la evidencia y con el rastro de auditoría inglés. La nota sobre la alternativa «peste/pestilencia» es aceptable como alternativa léxica preservada, pero el texto principal correctamente mantiene «muerte».
  issues:
  - severity: medium
    issue: «hasta destruirnos por completo» expresa mal el griego τοῦ συντελέσαι ἡμᾶς
    rationale: El griego indica resultado o grado de la ira ('so as to bring us to an end'), no una secuencia temporal. En español, «hasta destruirnos» tiende a leerse temporalmente.
  - severity: low
    issue: «le darás orden» es poco idiomático
    rationale: Aunque entendible, en registro bíblico natural suena mejor «le darás órdenes» o «le ordenarás». La segunda opción es más concisa y fiel al verbo ἐντελῇ.
  - severity: low
    issue: La nota b atribuye personificación explícita donde el texto español la deja más implícita
    rationale: El uso de «le» mantiene la referencia, pero en español no marca género masculino de forma tan visible como el inglés 'him'. La nota puede formularse con más exactitud como referencia personal/gramatical sin sobreafirmar.
