  language: en
  yaml_path: translation/ot/genesis/038/025.yaml
  text: As she was being brought out[a], she sent word to her father-in-law, saying, “I am pregnant by the man to whom these belong.” And she said, “Please identify whose signet ring, cords, and staff these are.”
  footnotes:
