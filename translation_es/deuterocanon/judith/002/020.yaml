translation:
  language: es
  text: Y una gran multitud mezclada salió con ellos[a], como langostas y como la arena de la tierra, porque no había número a causa de su multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pues eran incontables a causa de su multitud». El griego usa una manera literal de decir que no podían contarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολὺς
  english_pob_choice: a great
  chosen_spanish: una gran
  alternatives_spanish:
  - mucha
  - numerosa
  lexicon: LSJ
  rationale: Con el sujeto colectivo ὁ ἐπίμικτος, el adjetivo expresa tamaño cuantitativo del grupo. En español, «una gran» es natural y conserva el sentido de gran tamaño sin forzar una formulación más abstracta.
- source_word: ὁ ἐπίμικτος
  english_pob_choice: mixed multitude
  chosen_spanish: multitud mixta
  alternatives_spanish:
  - multitud mezclada
  - muchedumbre mixta
  lexicon: LSJ
  rationale: El sustantivo/adjetivo articulado funciona como colectivo sustantivado. «Multitud mixta» conserva la idea de un grupo compuesto por personas de diversa procedencia y mantiene el valor tradicional del término bíblico sin volverlo artificial.
- source_word: συνεξῆλθον αὐτοῖς
  english_pob_choice: went out with them
  chosen_spanish: salió con ellos
  alternatives_spanish:
  - salieron con ellos
  - marchó con ellos
  lexicon: LSJ
  rationale: El verbo compuesto indica acompañamiento en el movimiento de salida. En español, el singular colectivo «multitud» permite «salió» como concordancia natural; «marchó» introduciría una precisión militar no exigida por el griego.
- source_word: ὡς ἀκρίς
  english_pob_choice: like locusts
  chosen_spanish: como langostas
  alternatives_spanish:
  - como saltamontes
  lexicon: LSJ
  rationale: La comparación mantiene la imagen de gran abundancia. «Langostas» es el equivalente idiomático más claro en español bíblico para la plaga/inmensidad evocada por ἀκρίς.
- source_word: ὡς ἡ ἄμμος τῆς γῆς
  english_pob_choice: like the sand of the earth
  chosen_spanish: como la arena de la tierra
  alternatives_spanish:
  - como la arena del suelo
  - como la arena del país
  lexicon: LSJ
  rationale: Se conserva de forma casi literal la imagen bíblica de innumerabilidad. «De la tierra» reproduce γῆς sin decidir entre «suelo» o «país», que serían interpretaciones más estrechas.
- source_word: οὐ γὰρ ἦν ἀριθμὸς
  english_pob_choice: for there was no number
  chosen_spanish: porque no había número
  alternatives_spanish:
  - pues no había número
  - porque eran incontables
  lexicon: LSJ
  rationale: La construcción griega expresa ausencia de conteo. «No había número» sigue de cerca el original y preserva la formulación semítica/helénica sin sustituirla por una paráfrasis explicativa.
- source_word: ἀπὸ πλήθους αὐτῶν
  english_pob_choice: because of their multitude
  chosen_spanish: a causa de su multitud
  alternatives_spanish:
  - por su multitud
  - debido a su multitud
  lexicon: LSJ
  rationale: ἀπό expresa causa o base. «A causa de» refleja bien ese valor causal y conserva πλήθος con su peso nominal de cantidad multitudinaria.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de forma alta; no se observaron revisiones aplicadas en la fuente inglesa. La única tensión traductológica relevante es la forma idiomática de οὐ γὰρ ἦν ἀριθμός, que en español puede mantenerse literal («no había número») o explicitarse como «eran incontables».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto.
  - «Multitud mixta» preserva el eco bíblico de mixed multitude sin introducir terminología eclesiástica posterior.
  - Se eligió concordancia singular con «multitud» para evitar una discordancia artificial con el verbo griego y con el uso natural del español.
