revisions:
- from: Y liberó a Menelao[a], el causante de todo el mal, de entre los acusados; pero a aquellos hombres desdichados—que, aun si hubieran hablado en su defensa ante los escitas[c][b], habrían sido declarados inocentes—para ellos decretó la muerte.
  to: Y liberó a Menelao, el causante de todo el mal, de entre los acusados; pero a aquellos hombres desdichados—que, aun si hubieran presentado su defensa ante los escitas[a], habrían sido absueltos[b]—a estos les decretó la muerte[c].
  rationale: Se corrigió un error serio de anclaje y contenido en las notas, trasladando la nota cultural al lugar de «escitas» y restaurando una formulación coherente con el griego. En el cuerpo, «presentado su defensa» expresa con naturalidad el matiz forense de ἔλεγον; «habrían sido absueltos» alinea mejor con la auditoría inglesa y con el valor judicial de ἀπελύθησαν ἀκατάγνωστοι; y «a estos les decretó la muerte» conserva el énfasis del griego sin redundancia poco natural.
