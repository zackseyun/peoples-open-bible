translation:
  language: es
  text: Y ahora[a], todo lo que has traído sobre nosotros, y todo lo que nos has hecho, lo has hecho en verdadero juicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que has traído sobre nosotros ... todo lo que nos has hecho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con verdadero juicio», «en juicio recto» o «en juicio justo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - y en este momento
  lexicon: BDAG
  rationale: «Ahora» expresa de manera natural el adverbio temporal griego; se conserva la conjunción para reflejar el enlace discursivo con la confesión anterior.
- source_word: πάντα ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - cuanto
  lexicon: BDAG
  rationale: La secuencia griega es enfática y totalizante; «todo lo que» reproduce bien la amplitud sin sonar forzado en español.
- source_word: ἐπήγαγες
  english_pob_choice: have brought upon
  chosen_spanish: has traído sobre
  alternatives_spanish:
  - has traído sobre nosotros
  - has hecho venir sobre
  lexicon: BDAG
  rationale: «Traído sobre» conserva la idea de hacer recaer algo adverso sobre los hablantes, sin agregar más interpretación que el griego.
- source_word: ἐποίησας ἡμῖν
  english_pob_choice: have done to us
  chosen_spanish: has hecho con nosotros
  alternatives_spanish:
  - has hecho a nosotros
  - has tratado con nosotros
  lexicon: BDAG
  rationale: En este contexto adverso, el dativo se entiende como experiencia sufrida; «hecho con nosotros» mantiene la relación verbal y la pasiva de experiencia sin volverla demasiado idiomática o alterar el sentido.
- source_word: ἐν ἀληθινῇ κρίσει
  english_pob_choice: in true judgment
  chosen_spanish: en verdadero juicio
  alternatives_spanish:
  - con verdadero juicio
  - en juicio recto
  - en juicio justo
  lexicon: BDAG
  rationale: 'Se conserva la cercanía a la construcción griega: κρίσις como «juicio» y ἀληθινῇ como «verdadero». Se evita reemplazarlo por «justo» como lectura interpretativa más fuerte, aunque sigue siendo una alternativa válida en español.'
- source_word: ἐποίησας
  english_pob_choice: you have done
  chosen_spanish: lo has hecho
  alternatives_spanish:
  - lo hiciste
  - has obrado así
  lexicon: BDAG
  rationale: El perfecto español comunica adecuadamente la acción divina ya cumplida con vigencia confesional presente. El complemento clítico retoma el conjunto de acciones mencionadas antes.
theological_decisions:
- issue: Atribución de las calamidades a la acción de Dios
  english_pob_reading: The verse affirms that God's acts, including calamity brought upon the people, were done in true judgment.
  chosen_spanish_reading: El versículo afirma que Dios trajo sobre ellos y hizo con ellos lo mencionado, y que todo ello ocurrió en verdadero juicio.
  alternative_spanish_readings:
  - '...en juicio justo'
  - '...en juicio recto'
  rationale: La traducción mantiene la agencia divina sin suavizarla. «Verdadero juicio» conserva la cualidad expresada por ἀληθινῇ, dejando abierta la tensión entre verdad, rectitud y justicia sin imponer una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: se mantiene la repetición de πάντα ὅσα con «todo lo que», la oposición entre «has traído sobre» y «has hecho con», y la clausula final como «en verdadero juicio» para respetar la tensión léxica entre verdad y justicia. Se evitó el calco rígido «traído sobre nosotros» solo cuando el español necesitaba fluidez mínima, pero se conservó la estructura paralela del original.'
  spanish_consistency_notes:
  - Se usa «juicio» para κρίσις en coherencia con el griego y con el registro bíblico, evitando sustituirlo por una explicación más interpretativa.
  - Se mantiene «verdadero» para ἀληθινῇ, en lugar de normalizarlo a «justo», para no borrar la distinción lexical entre verdad y justicia.
  - La frase «has hecho con nosotros» refleja el valor relacional del dativo sin introducir un sujeto distinto o una lectura causal no explicitada.
