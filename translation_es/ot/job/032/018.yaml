lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal de Eliú. «Porque» conserva la relación explicativa de manera natural en español.
- source_word: מָלֵתִי
  english_pob_choice: I am full
  chosen_spanish: estoy lleno
  alternatives_spanish:
  - estoy colmado
  - me he llenado
  lexicon: HALOT
  rationale: El verbo מלא expresa un estado presente resultante de estar lleno; «estoy lleno» reproduce bien ese valor aspectual en español.
- source_word: מִלִּים
  english_pob_choice: of words
  chosen_spanish: de palabras
  alternatives_spanish:
  - con palabras
  - de cosas que decir
  lexicon: HALOT
  rationale: «Palabras» mantiene el plural concreto del hebreo y el sentido de discurso contenido.
- source_word: הֱצִיקַתְנִי
  english_pob_choice: constrains me
  chosen_spanish: me constriñe
  alternatives_spanish:
  - me presiona
  - me aprieta
  - me apremia
  lexicon: HALOT
  rationale: El verbo צוק connota presión, estrechez o constricción. «Me constriñe» conserva esa fuerza física/metafórica y encaja con la necesidad interior de hablar.
- source_word: רוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere a un impulso interior, no a viento o aliento literal. «Espíritu» mantiene la referencia antropológica.
- source_word: בִּטְנִי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en mis entrañas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi vientre / mis entrañas», pero en este contexto apunta al interior de la persona. «Dentro de mí» comunica el sentido sin perder la imagen interna; la opción más literal se preserva en nota.
translation_notes:
  revision_awareness: El texto se mantiene en concordancia alta con el hebreo masorético y con la auditoría inglesa; no se detectaron cambios de revisión que alteren el sentido principal.
  spanish_consistency_notes:
  - Se prefirió «espíritu» para רוּחַ por su valor interior/antropológico en este contexto.
  - «Constriñe» conserva la idea de presión interna mejor que alternativas más suaves como «presiona» o más interpretativas como «compulsa».
  - La nota conserva la alternativa literal de בִּטְנִי para no borrar la imagen corporal hebrea.
