  text: For I do not mean that there should be relief for others and hardship for you[a], but equality—
translation:
  language: ko
  text: 내 말은 다른 이들에게는 여유가 있고 여러분에게는 어려움이 있게 하려는 것이 아니라, 균등을 위함입니다—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄνεσις
  english_pob_choice: relief
  chosen_korean: 여유
  lexicon: BDAG
  rationale: ἄνεσις는 압박에서 놓인 상태. 「여유」가 한국어에서 자연스러운 대비를 만든다.
  alternatives_korean:
  - 편안함
  - 해방
- source_word: θλῖψις
  english_pob_choice: hardship
  chosen_korean: 어려움
  lexicon: BDAG
  rationale: 여기서는 경제적 압박을 가리키므로 「어려움」이 적절. 신학적 「환난」은 무게가 과하다.
  alternatives_korean:
  - 환난
  - 고난
  - 압박
- source_word: ἰσότης
  english_pob_choice: equality
  chosen_korean: 균등
  lexicon: BDAG
  rationale: 바울이 여기서 의도하는 것은 정치적 평등이 아니라 필요와 풍부 사이의 공평한 균형. 「균등」이 적절하다.
  alternatives_korean:
  - 평등
  - 공평
