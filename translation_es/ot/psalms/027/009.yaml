translation:
  language: es
  text: No escondas tu rostro de mí; no apartes[a] a tu siervo en tu ira. Tú has sido mi ayuda. No me rechaces[b], ni me abandones, oh Dios de mi salvación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no apartes a tu siervo en tu ira».'
    reason: alternative_reading
  - marker: b
    text: 'O: «no me arrojes».'
    reason: alternative_reading
  - marker: c
    text: 'O: «Dios de mi liberación».'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּסְתֵּר / hide
  english_pob_choice: hide
  chosen_spanish: escondas
  alternatives_spanish:
  - ocultes
  - hagas ocultar
  lexicon: HALOT
  rationale: El hebreo pide que Yahvé no oculte su rostro. En español, «esconder el rostro» suena claro y natural; conserva la imagen antropomórfica sin volverla abstracta.
- source_word: פָּנֶיךָ / your face
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» mantiene la imaginería bíblica y el paralelismo poético. «Presencia» suavizaría la metáfora original.
- source_word: מִמֶּנִּי / from me
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - apartándose de mí
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición simple reproduce la relación del verbo con el objeto sin añadir matices no explicitados por el hebreo.
- source_word: תַּט בְּאַף / turn ... away in anger
  english_pob_choice: turn your servant away in anger
  chosen_spanish: apartes a tu siervo en tu ira
  alternatives_spanish:
  - inclines a tu siervo en tu ira
  - rechaces a tu siervo en tu ira
  lexicon: HALOT
  rationale: נטה en este contexto expresa apartar/rechazar. Se eligió «apartar» para conservar el movimiento relacional sin traducir de modo mecánico; «en tu ira» expresa el marco emocional del verbo. Se mantiene «siervo» porque aquí la autoidentificación humilde ante Dios es la que domina.
- source_word: עַבְדֶּךָ / your servant
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aunque el término puede implicar esclavitud, en esta oración penitente y de súplica el énfasis recae en la pertenencia reverente y la dependencia ante Dios, por lo que «siervo» es la equivalencia contextual más fiel y natural en español.
- source_word: עֶזְרָתִי / my help
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi socorro
  - mi auxilio
  lexicon: HALOT
  rationale: La frase predicativa «has sido mi ayuda» suena idiomática en español y conserva el sustantivo hebreo sin convertirlo en agente.
- source_word: הָיִיתָ / you have been
  english_pob_choice: you have been
  chosen_spanish: has sido
  alternatives_spanish:
  - has estado
  - fuiste
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una ayuda ya comprobada con vigencia actual. «Has sido» transmite esa continuidad mejor que un pasado simple.
- source_word: תִּטְּשֵׁנִי / cast me off
  english_pob_choice: cast me off
  chosen_spanish: me rechaces
  alternatives_spanish:
  - me abandones
  - me arrojes
  lexicon: HALOT
  rationale: נטש puede significar dejar, abandonar o rechazar. Aquí se optó por «rechazar» para dar cuenta de la fuerza relacional y de ruptura del pedido; se preserva la proximidad semántica con la nota alternativa del POB inglés.
- source_word: תַּעַזְבֵנִי / forsake me
  english_pob_choice: forsake me
  chosen_spanish: me abandones
  alternatives_spanish:
  - me dejes
  - me desampares
  lexicon: HALOT
  rationale: עזב se vierte naturalmente como «abandonar» o «dejar». «Abandones» distingue bien este verbo del anterior y mantiene la progresión suplicante del paralelismo.
- source_word: אֱלֹהֵי יִשְׁעִי / God of my salvation
  english_pob_choice: O God of my salvation
  chosen_spanish: oh Dios de mi salvación
  alternatives_spanish:
  - oh Dios de mi liberación
  - oh Dios que me salva
  lexicon: HALOT
  rationale: Se conserva la forma constructa formal «Dios de mi salvación», que retiene el peso teológico de ישע. «Salvación» es la opción más natural y tradicional en español bíblico sin perder precisión.
theological_decisions:
- issue: Imagen antropomórfica de 'rostro' aplicado a Dios
  english_pob_reading: Retain the anthropomorphic expression 'your face' in the main text
  chosen_spanish_reading: Mantener «tu rostro» en el texto principal
  alternative_spanish_readings:
  - tu presencia
  rationale: El hebreo usa explícitamente 'rostro', y el paralelismo del salmo depende de esa imagen de favor/presencia divina. Traducirla como 'presencia' desdibujaría la metáfora bíblica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de עבד en la súplica dirigida a Dios
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: En este contexto devocional y de apelación reverente, el énfasis está en la dependencia fiel del orante ante Dios, no en la dureza del estatus servil. 'Siervo' preserva la dignidad y la relación de servicio sin borrar la subordinación implícita.
  doctrine_reference: Translation philosophy §1; decisión léxica contextual por analogía con δοῦλος
- issue: Doble petición negativa en los verbos finales
  english_pob_reading: Do not cast me off, and do not forsake me
  chosen_spanish_reading: No me rechaces, ni me abandones
  alternative_spanish_readings:
  - No me arrojes, ni me desampares
  - No me deseches, ni me abandones
  rationale: Se conservan dos verbos distintos para no aplanar el paralelismo hebreo. 'Rechazar' y 'abandonar' distinguen bien la ruptura relacional de cada verbo, manteniendo la tensión súplica-covenantal del texto.
  doctrine_reference: Paralelismo poético hebreo; traducción formal con claridad semántica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y no se siguió mecánicamente su superficie: se mantuvo la imaginería de «rostro», se distinguieron los dos verbos finales (נטש / עזב), y se adoptó «siervo» en lugar de «esclavo» por la saliencia contextual devocional ya documentada. No hubo revisiones aplicadas en el paquete de origen; la presente redacción busca conservar esa estabilidad con equivalencia óptima en español.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «rostro» para פָּנִים, siguiendo el valor relacional del salmo.
  - Se conserva el tono de súplica poética y la secuencia de imperativos negativos.
  - «Siervo» se emplea aquí por razón contextual documentada; no debe convertirse automáticamente en la traducción general de עבד en otros pasajes.
