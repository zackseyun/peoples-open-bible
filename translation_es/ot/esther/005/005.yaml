translation:
  language: es
  text: 'Entonces el rey dijo[a]: «Traigan pronto a Amán, para que se haga la palabra de Ester». Así el rey y Amán fueron al banquete que Ester había preparado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que se cumpla la petición de Ester». El hebreo dice literalmente «para hacer la palabra de Ester», donde «palabra» puede referirse a su solicitud o instrucción expresada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֲרוּ
  english_pob_choice: Hurry, bring Haman
  chosen_spanish: Apresuren a Amán
  alternatives_spanish:
  - Apresúrense con Amán
  - Traigan pronto a Amán
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural de urgencia dirigido a los servidores; en español, «Apresuren» conserva la fuerza inmediata sin volverlo pesado. Se explicita el complemento directo «a Amán» para reflejar אֶת הָמָן y el sentido contextual de llevarlo de inmediato ante el rey.
- source_word: אֶת דְּבַר אֶסְתֵּר
  english_pob_choice: Esther's word may be done
  chosen_spanish: se haga la palabra de Ester
  alternatives_spanish:
  - se cumpla la palabra de Ester
  - se ejecute lo que Ester dijo
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «declaración». El POB en inglés conservó la tensión lexical con «word»; en español, «palabra» mantiene esa cercanía formal. «Se haga» reproduce de modo natural la construcción final del hebreo sin convertirla en una paráfrasis interpretativa como «petición» o «pedido».
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: Aunque בוא puede ser «venir», aquí el movimiento se expresa desde la perspectiva del destino y en español «fueron al banquete» suena más natural. El plural concuerda con «el rey y Amán» y evita una repetición rígida de «vinieron» que sonaría menos idiomática.
- source_word: הַמִּשְׁתֶּה
  english_pob_choice: the banquet
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - el festín
  lexicon: HALOT
  rationale: «Banquete» es el equivalente más estable y digno para מִשְׁתֶּה en un contexto cortesano. Conserva el registro del texto y coincide con la decisión inglesa del POB.
- source_word: אֲשֶׁר עָשְׂתָה אֶסְתֵּר
  english_pob_choice: that Esther had prepared
  chosen_spanish: que Ester había preparado
  alternatives_spanish:
  - que Ester había hecho
  - que Ester había organizado
  lexicon: HALOT
  rationale: עָשָׂה aplicado a un banquete puede significar «hacer», «preparar» u «organizar». «Había preparado» transmite con precisión el acto de disponer el banquete y mantiene un español claro y fiel al sentido contextual.
theological_decisions:
- issue: 'Valor de דְּבַר אֶסְתֵּר: palabra, orden o petición'
  english_pob_reading: '''Esther''s word'' with a footnote allowing ''request'' or ''instruction'''
  chosen_spanish_reading: «la palabra de Ester»
  alternative_spanish_readings:
  - «la petición de Ester»
  - «la orden de Ester»
  - «lo que Ester había dicho»
  rationale: 'Se conserva «palabra» para no borrar la tensión léxica que el POB documenta: el hebreo dice literalmente «la palabra de Ester», pero en contexto puede referirse a su solicitud formal ante la corte. La nota explica la alternativa sin sustituirla en el texto principal.'
  doctrine_reference: Ninguno; decisión lexicosemántica y de registro.
translation_notes:
  revision_awareness: 'La decisión inglesa más reciente cambió de «Bring Haman quickly» a «Hurry, bring Haman» y de «request» a «word» para reflejar con mayor precisión el imperativo y la frase hebrea דְּבַר אֶסְתֵּר. Esta versión española sigue esa revisión: mantiene el valor literal de «palabra» y traslada la urgencia del mandato con un imperativo directo («Apresuren»).'
  spanish_consistency_notes:
  - Se usó «Ester» sin tilde para mantener consistencia con el uso habitual en español bíblico de nombres propios hebreos transliterados.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - 'Se prefirió el pretérito perfecto simple/pluscuamperfecto donde corresponde al flujo narrativo: «dijo», «fueron», «había preparado».'
