    text: Or 'according to the word of Aaron and his sons.' The Hebrew idiom is literally 'upon the mouth of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as a charge.' The Hebrew term can denote an assigned responsibility or obligation.
    reason: lexical_alternative
