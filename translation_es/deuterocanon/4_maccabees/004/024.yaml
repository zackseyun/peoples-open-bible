translation:
  language: es
  text: de modo que aun las mujeres[a], porque habían circuncidado a sus hijos, eran arrojadas de cabeza con sus infantes, aunque sabían de antemano que sufrirían esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'eran arrojadas' o 'eran precipitadas desde una altura'; el verbo griego denota un arrojar violento hacia abajo, probablemente desde un precipicio o lugar elevado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - por lo cual
  lexicon: LSJ
  rationale: Expresa bien el valor resultativo del griego sin volverlo demasiado inferencial; en español suena natural y conserva la relación con lo anterior.
- source_word: γυναῖκας
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  - las esposas
  lexicon: LSJ
  rationale: El contexto apunta a mujeres en general, específicamente madres; 'esposas' sería más restrictivo de lo que permite el griego.
- source_word: ὅτι περιέτεμον τὰ παιδία
  english_pob_choice: because they had circumcised their children
  chosen_spanish: porque habían circuncidado a sus hijos
  alternatives_spanish:
  - porque circuncidaron a sus hijos
  - a causa de que habían circuncidado a sus hijos
  lexicon: LSJ
  rationale: Mantiene la relación causal y el acto de circuncidar sin suavizarlo. 'Sus hijos' recoge la especificación contextual natural del griego.
- source_word: τὰ παιδία
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos varones
  lexicon: LSJ
  rationale: En este contexto, la referencia es a los hijos de esas mujeres; 'hijos varones' sería más explícito de lo que exige el sustantivo griego.
- source_word: μετὰ τῶν βρεφῶν
  english_pob_choice: with their infants
  chosen_spanish: con sus infantes
  alternatives_spanish:
  - con sus bebés
  - junto con sus infantes
  lexicon: LSJ
  rationale: '''Infantes'' conserva el matiz de niños muy pequeños y suena dignamente bíblico; el posesivo está justificado por el contexto.'
- source_word: κατακρημνίζεσθαι
  english_pob_choice: were thrown down headlong
  chosen_spanish: eran arrojadas de cabeza
  alternatives_spanish:
  - eran lanzadas de cabeza
  - eran precipitadas de un despeñadero
  lexicon: LSJ
  rationale: La imagen de ser arrojadas violentamente desde arriba se conserva con naturalidad en español. 'De cabeza' reproduce el matiz de caída violenta sin añadir topografía no explícita.
- source_word: προειδυίας
  english_pob_choice: though they knew beforehand
  chosen_spanish: aunque sabían de antemano
  alternatives_spanish:
  - sabiendo de antemano
  - aunque lo sabían de antemano
  lexicon: LSJ
  rationale: Preserva el valor concesivo del participio y la idea de conocimiento previo de forma idiomática.
- source_word: τοῦτο πείσονται
  english_pob_choice: that they would suffer this
  chosen_spanish: que sufrirían esto
  alternatives_spanish:
  - que experimentarían esto
  - que padecerían esto
  lexicon: LSJ
  rationale: '''Sufrirían'' transmite el sentido de experimentar un mal o castigo, acorde con el contexto de persecución.'
theological_decisions:
- issue: Circuncisión como práctica de pacto en contexto de persecución
  english_pob_reading: Retain 'circumcised' plainly, without softening the act or importing later doctrinal framing.
  chosen_spanish_reading: Mantener 'circuncidado' de manera directa, sin eufemismo ni glosa doctrinal.
  alternative_spanish_readings:
  - marcado según el pacto
  - realizado el rito en sus hijos
  rationale: El verso presenta la práctica judía de circuncisión como motivo directo del castigo; la traducción directa conserva esa tensión histórica y teológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado está marcado como de alta concordancia y sin cambios recientes; se mantuvo la decisión léxica central sobre κατακρημνίζεσθαι y la causalidad de ὅτι, adaptándolas a un español natural y fiel.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - '''Circuncidado'' se mantuvo como forma directa para conservar la fuerza histórica del pasaje.'
  - '''Infantes'' se eligió para βρέφη por su registro bíblico y precisión de edad.'
  - La nota al pie marca la alternativa léxica principal sin introducir detalles topográficos no presentes en el griego.
