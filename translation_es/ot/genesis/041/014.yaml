translation:
  language: es
  text: Entonces Faraón mandó llamar a José[a], y lo sacaron apresuradamente del pozo[b]. Se afeitó, se cambió de ropa y fue ante Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «envió y llamó a José». El hebreo usa dos verbos para expresar la convocatoria real.'
    reason: alternative_reading
  - marker: b
    text: 'O: «cisterna» o «calabozo». El hebreo literalmente dice «pozo», y puede referirse a un lugar de confinamiento subterráneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח פַּרְעֹה וַיִּקְרָא אֶת יוֹסֵף
  english_pob_choice: sent and called for Joseph
  chosen_spanish: mandó llamar a José
  alternatives_spanish:
  - envió y llamó a José
  - envió a llamar a José
  - mandó por José
  lexicon: HALOT
  rationale: La secuencia hebrea expresa una sola acción de convocatoria real mediante dos verbos; en español, "mandó llamar" comunica naturalmente el matiz de ordenar la comparecencia sin separar artificialmente los verbos. "Mandó por José" es posible, pero menos explícito.
- source_word: וַיְרִיצֻהוּ
  english_pob_choice: they quickly brought him
  chosen_spanish: lo sacaron apresuradamente
  alternatives_spanish:
  - lo apresuraron
  - lo hicieron salir con prisa
  - lo sacaron rápidamente
  lexicon: HALOT
  rationale: El verbo intensivo/causativo transmite urgencia en la extracción de José desde su confinamiento. En español, "lo sacaron apresuradamente" preserva el movimiento rápido y evita una calca extraña como "lo hicieron correr".
- source_word: מִן הַבּוֹר
  english_pob_choice: out of the pit
  chosen_spanish: del pozo
  alternatives_spanish:
  - de la cisterna
  - del calabozo
  - de la fosa
  lexicon: HALOT
  rationale: בּוֹר significa literalmente "pozo/fosa" y puede designar una cisterna o confinamiento similar a prisión. "Pozo" mantiene la transparencia léxica del hebreo; "calabozo" interpreta el lugar con mayor especificación.
- source_word: וַיְגַלַּח
  english_pob_choice: He shaved
  chosen_spanish: Se afeitó
  alternatives_spanish:
  - Él se afeitó
  - Fue afeitado
  lexicon: HALOT
  rationale: El hebreo es activo y la acción es reflexiva en español por naturalidad. "Se afeitó" conserva brevedad y el sentido de preparación para presentarse ante Faraón.
- source_word: וַיְחַלֵּף שִׂמְלֹתָיו
  english_pob_choice: changed his clothes
  chosen_spanish: se cambió de ropa
  alternatives_spanish:
  - cambió sus ropas
  - cambió de vestiduras
  - se puso otra ropa
  lexicon: HALOT
  rationale: El giro hebreo indica cambio de vestimenta. "Se cambió de ropa" es natural en español moderno y mantiene el valor simple del verbo sin elevar innecesariamente el registro con "vestiduras".
- source_word: וַיָּבֹא אֶל פַּרְעֹה
  english_pob_choice: came to Pharaoh
  chosen_spanish: vino a Faraón
  alternatives_spanish:
  - fue a Faraón
  - entró ante Faraón
  - se presentó ante Faraón
  lexicon: HALOT
  rationale: בוא אֶל indica llegada/dirección hacia una persona. "Vino a Faraón" es cercano al hebreo y evita añadir matices ceremoniales que no están explícitos; el español natural admite "vino" en este sentido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que mantuvo la doble verbalidad («sent and called for Joseph») para reflejar ambos verbos hebreos, aunque en español se optó por una sola locución idiomática («mandó llamar») porque reproduce mejor la función comunicativa del conjunto. También se conservó la transparencia de «pit» con «pozo», como en el audit trail, sin imponer «calabozo» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como forma castellana estable y transparente para el nombre/título egipcio.
  - Se usa el pasado narrativo simple para seguir el estilo bíblico en español sin arcaísmos innecesarios.
  - La reflexividad en «se afeitó» y «se cambió de ropa» responde al uso natural del español para acciones personales de preparación.
