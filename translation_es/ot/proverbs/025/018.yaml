translation:
  language: es
  text: Una maza[a], una espada y una flecha afilada es el hombre que da falso testimonio contra su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mazo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפִ֣יץ
  english_pob_choice: club
  chosen_spanish: maza
  alternatives_spanish:
  - garrote
  - mazo
  - arma contundente
  lexicon: HALOT
  rationale: El hebreo designa un arma para golpear y quebrar; en español, 'maza' comunica mejor esa función que 'club', que puede sonar anglicado. 'Mazo' o 'garrote' son posibles, pero 'maza' conserva la imagen de arma contundente dentro de la tríada.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - arma blanca
  lexicon: HALOT
  rationale: Es el equivalente directo y natural para חֶרֶב en español bíblico y moderno.
- source_word: חֵץ שָׁנ֑וּן
  english_pob_choice: sharp arrow
  chosen_spanish: flecha aguda
  alternatives_spanish:
  - flecha afilada
  - flecha puntiaguda
  lexicon: HALOT
  rationale: El adjetivo hebreo expresa algo afilado o aguzado; 'aguda' preserva la concisión poética y la progresión de armas. 'Afilada' es una alternativa más explícita, pero menos fluida en la cadencia proverbial.
- source_word: אִ֥ישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: La forma hebrea masculina singular funciona proverbialmente como sujeto representativo; 'el hombre' mantiene esa fuerza general y la estructura predicativa del hebreo.
- source_word: עֹנֶ֥ה
  english_pob_choice: answers
  chosen_spanish: da
  alternatives_spanish:
  - responde
  - testifica
  lexicon: HALOT
  rationale: Aunque el participio literalmente significa 'respondiendo', en este contexto legal la expresión castellana natural es 'dar falso testimonio'. 'Responde' sería demasiado literal y menos idiomático; 'testifica' puede funcionar, pero el conjunto 'da falso testimonio' expresa mejor el giro forense del verso.
- source_word: בְ֝/רֵעֵ֗/הוּ
  english_pob_choice: against his neighbor
  chosen_spanish: contra su prójimo
  alternatives_spanish:
  - contra su vecino
  - contra su amigo
  lexicon: HALOT
  rationale: רֵעַ suele ser 'prójimo' en lenguaje ético-bíblico; 'contra' refleja el valor adversativo del contexto de testimonio falso. 'Vecino' es posible, pero 'prójimo' conserva mejor la resonancia moral y comunitaria.
- source_word: עֵ֣ד שָֽׁקֶר
  english_pob_choice: false witness / false testimony
  chosen_spanish: falso testimonio
  alternatives_spanish:
  - testigo falso
  - un testigo falso
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'testigo de mentira/falsedad'. En español, 'dar falso testimonio' es la forma más clara y exacta para el sentido jurídico del verso, y evita una formulación pesada como 'testigo falso' en una oración proverbial.
theological_decisions:
- issue: Valor legal y ético de 'falso testimonio'
  english_pob_reading: bears false witness against his neighbor
  chosen_spanish_reading: da falso testimonio contra su prójimo
  alternative_spanish_readings:
  - levanta falso testimonio contra su prójimo
  - testifica falsamente contra su prójimo
  rationale: El POB inglés ajusta el hebreo a una fórmula forense clara. En español, 'da falso testimonio' transmite el mismo campo semántico legal sin perder la idea relacional de daño al prójimo. No se atenúa a mera 'mentira' porque el contexto es judicial/ testimonial.
  doctrine_reference: Éxodo 20:16; Deuteronomio 19:16-19
translation_notes:
  revision_awareness: Se siguió el audit trail inglés más reciente, que corrigió una formulación menos idiomática hacia 'bears false witness against his neighbor'. Para el español, se conservó el sentido forense explícito con 'da falso testimonio contra su prójimo', manteniendo la tríada de armas y la progresión retórica del proverbio.
  spanish_consistency_notes:
  - Se mantuvo 'prójimo' para רֵעַ, coherente con el registro ético-bíblico.
  - Se prefirió 'maza' sobre 'club' por naturalidad en español sin alterar el valor léxico de arma contundente.
  - 'La imagen queda en singular proverbial: ''es el hombre'', como en el hebreo y el inglés auditado.'
