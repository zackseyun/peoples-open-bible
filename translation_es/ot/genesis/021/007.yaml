translation:
  language: es
  text: 'Y ella dijo: «¿Quién le habría dicho a Abraham que Sara daría de mamar[a] a niños? Pues he dado a luz un hijo en su vejez».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos» o «sons». Aquí se traduce «niños» porque la expresión «dar de mamar a hijos» funciona idiomáticamente en contexto, mientras que la cláusula siguiente precisa que el nacido fue «un hijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide avance secuencial; en español, «Y ella dijo» conserva el flujo sin añadir matices no explícitos. Se mantiene el sujeto por claridad y naturalidad.
- source_word: מִי מִלֵּל לְאַבְרָהָם
  english_pob_choice: Who would have said to Abraham
  chosen_spanish: ¿Quién le habría dicho a Abraham?
  alternatives_spanish:
  - ¿Quién había dicho a Abraham?
  - ¿Quién podría haber dicho a Abraham?
  lexicon: HALOT
  rationale: La pregunta expresa asombro ante un resultado inesperado. «Habría dicho» reproduce bien la fuerza retórica e incredulidad del hebreo sin volverla una simple afirmación pasada.
- source_word: הֵינִיקָה בָנִים
  english_pob_choice: would nurse children
  chosen_spanish: amamantaría[a] hijos
  alternatives_spanish:
  - sucklara hijos
  - criaría hijos al pecho
  lexicon: HALOT
  rationale: «Amamantar» comunica de forma natural y digna la imagen de dar de mamar. Conservo «hijos» para reflejar el plural hebreo, y la nota explica el valor idiomático del plural en el contexto.
- source_word: שָׂרָה
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre propio, coherente con el registro bíblico en español.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto כִּי introduce la razón o base de la exclamación anterior, no una oposición. «Porque» refleja la relación explicativa que el audit trail inglés corrigió al pasar de un matiz contrastivo a uno causal-explicativo.
- source_word: יָלַדְתִּי בֵן
  english_pob_choice: I have borne a son
  chosen_spanish: he dado a luz un hijo[b]
  alternatives_spanish:
  - he parido un hijo
  - he tenido un hijo
  lexicon: HALOT
  rationale: «Dar a luz» conserva la imagen corporal y el sentido de alumbramiento del perfecto hebreo. «Hijo» mantiene la referencia literal a בן; en español es más natural aquí que «hijo varón» y sigue el paralelismo con la exclamación anterior.
- source_word: לִזְקֻנָיו
  english_pob_choice: in his old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - en su ancianidad
  - cuando era viejo
  lexicon: HALOT
  rationale: La construcción hebrea alude a la avanzada edad de Abraham. «En su vejez» es idiomática, sobria y fiel al sentido, sin perder el vínculo referencial con Abraham.
theological_decisions:
- issue: Sentido de כִּי en la cláusula final
  english_pob_reading: For I have borne a son in his old age.
  chosen_spanish_reading: Porque he dado a luz un hijo en su vejez.
  alternative_spanish_readings:
  - Y he dado a luz un hijo en su vejez.
  - Pues he dado a luz un hijo en su vejez.
  rationale: No se traduce como contraste, sino como explicación o fundamento de la sorpresa expresada antes. Esto sigue la revisión auditada del inglés POB y evita oscurecer la relación lógica del hebreo.
  doctrine_reference: Gramática hebrea; no implica una decisión doctrinal específica.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «Yet» a «For» para reflejar mejor כִּי como explicación. La versión española sigue esa corrección con «Porque» y evita un giro contrastivo. También respeta la nota inglesa sobre el plural hebreo בָנִים mediante una nota lexical en español, manteniendo el juego entre plural idiomático y singular final.
  spanish_consistency_notes:
  - Se usa «Y ella dijo» para el avance narrativo, sin añadir «entonces» salvo que el contexto amplio lo requiera.
  - Se prefiere «Sara» como forma española habitual del nombre propio.
  - Se mantiene «hijo» en singular en la cláusula final para conservar la precisión del hebreo.
  - La expresión «en su vejez» es consistente con el español bíblico moderno y no introduce una interpretación temporal distinta.
