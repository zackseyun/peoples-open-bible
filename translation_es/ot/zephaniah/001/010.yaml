base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/010.yaml
  text: And on that day[a], declares Yahweh, there will be the sound of a cry from the Fish Gate, and a wail from the Second Quarter[c][b], and a great crash from the hills.
