  glossary_alignment: No hay conflictos con la terminología marco del proyecto. 'Seres vivientes' para ζῷα es adecuado en Apocalipsis 4:6 y coherente con la justificación teológica; también sería válido ofrecer 'criaturas vivientes' o 'seres vivientes' como alternativa según el texto principal escogido.
