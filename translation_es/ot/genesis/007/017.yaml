translation:
  language: es
  text: Y el diluvio duró sobre la tierra cuarenta días, y las aguas aumentaron y levantaron el arca, de modo que se elevó por encima de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estuvo
  alternatives_spanish:
  - fue
  - había
  lexicon: HALOT
  rationale: En esta construcción con expresión de tiempo, el hebreo presenta el estado/ocurrencia del diluvio durante un período. «Estuvo» conserva la relación temporal sin forzar un calco idiomático en español.
- source_word: הַמַּבּוּל
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - el diluvio universal
  - la inundación
  lexicon: HALOT
  rationale: «Diluvio» es el equivalente español natural para el término técnico del relato de Noé. «Inundación» sería más general y menos preciso en este contexto.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  alternatives_spanish:
  - por cuarenta días
  lexicon: HALOT
  rationale: La frase expresa duración directa; en español basta con el sintagma temporal sin añadir una preposición que el hebreo no marca explícitamente.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra de
  lexicon: HALOT
  rationale: «Sobre la tierra» reproduce bien el valor espacial amplio de אֶרֶץ en este pasaje y suena natural en español bíblico contemporáneo.
- source_word: וַיִּרְבּוּ הַמַּיִם
  english_pob_choice: the waters increased
  chosen_spanish: las aguas aumentaron
  alternatives_spanish:
  - las aguas se multiplicaron
  - las aguas crecieron
  lexicon: HALOT
  rationale: «Aumentaron» expresa el incremento de cantidad/volumen de manera clara y natural; conserva la fuerza del verbo sin perder legibilidad.
- source_word: וַיִּשְׂאוּ אֶת הַתֵּבָה
  english_pob_choice: lifted up the ark
  chosen_spanish: levantaron el arca
  alternatives_spanish:
  - alzaron el arca
  - sostuvieron el arca
  lexicon: HALOT
  rationale: El hebreo describe a las aguas como las que elevan el arca. «Levantaron» comunica la acción física de alzar con claridad y evita una formulación demasiado literal y pesada.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la arca
  - la caja
  lexicon: HALOT
  rationale: «Arca» es el término bíblico establecido para la embarcación de Noé en español y corresponde al uso contextual del original.
- source_word: וַתָּרָם
  english_pob_choice: it rose
  chosen_spanish: se elevó
  alternatives_spanish:
  - subió
  - fue levantada
  lexicon: HALOT
  rationale: 'El verbo femenino singular indica el resultado: el arca quedó más alta. «Se elevó» mantiene la intransitividad del movimiento resultante de forma elegante en español.'
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: above the earth
  chosen_spanish: por encima de la tierra
  alternatives_spanish:
  - sobre la tierra
  - más arriba de la tierra
  lexicon: HALOT
  rationale: «Por encima de la tierra» expresa la separación vertical con precisión y evita ambigüedad, conservando el sentido espacial del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «continued on the earth forty days» a «was on the earth forty days» para acercarse más al hebreo; por eso el español usa una formulación de estado/duración («estuvo sobre la tierra cuarenta días») y no un equivalente más dinámico como «continuó».
  spanish_consistency_notes:
  - Se mantiene «diluvio» para הַמַּבּוּל, no «inundación», por consistencia con el relato de Noé.
  - Se mantiene «arca» para הַתֵּבָה como término técnico establecido.
  - Se usa «tierra» para הָאָרֶץ en coherencia con el alcance cósmico del pasaje, no «suelo» o «terreno».
