revisions:
- from: 'El primero dice a Sión[a]: «Miren, ahí están[b][c]»; y para Jerusalén doy un heraldo de buenas noticias.'
  to: 'El primero[a] le dice a Sión: «Miren, ahí están[b][c]»; y a Jerusalén doy un heraldo de buenas noticias[d].'
  rationale: La revisión corrige el valor de ל en el segundo miembro con 'a Jerusalén', añade la nota alternativa omitida para la frase del mensajero, y ajusta la nota del inicio para reflejar la alternativa documentada sobre la expresión difícil רִאשׁוֹן לְצִיּוֹן. También mejora levemente la naturalidad con 'le dice a Sión' sin expandir indebidamente el sujeto implícito.
