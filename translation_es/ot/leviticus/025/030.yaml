translation:
  language: es
  text: Pero si no es redimida antes de que se cumpla para ella[a] un año completo, entonces la casa que está en una ciudad que no tiene muralla pasará permanentemente al comprador, por todas sus generaciones[b]; no saldrá en el Jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''antes de que se complete para ella un año completo''. El hebreo expresa el plazo legal de redención como un año entero aplicado a la casa o a su venta.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, no volverá al linaje original en el año del Jubileo; la frase preserva el sentido legal de permanencia hereditaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגָּאֵל
  english_pob_choice: is redeemed
  chosen_spanish: es redimida
  alternatives_spanish:
  - es comprada de vuelta
  - es rescatada
  lexicon: HALOT
  rationale: En el contexto legal de Levítico 25, el niphal de גאל expresa la posibilidad de redención de una propiedad. 'Es redimida' conserva el término técnico y la conexión con el lenguaje de redención del capítulo mejor que opciones más coloquiales.
- source_word: עַד מְלֹאת לוֹ שָׁנָה תְמִימָה
  english_pob_choice: before a full year is completed for it
  chosen_spanish: antes de que se cumpla un año completo para él
  alternatives_spanish:
  - antes de que se complete un año completo para él
  - dentro de un año completo
  lexicon: HALOT
  rationale: La expresión marca el plazo límite para redimir. 'Antes de que se cumpla' comunica con naturalidad el sentido temporal de la frase hebrea sin perder la idea de un período íntegro de un año ligado a la casa vendida.
- source_word: וְקָם
  english_pob_choice: shall pass
  chosen_spanish: quedará establecida
  alternatives_spanish:
  - permanecerá establecida
  - quedará firme
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'y se alzará/estará firme', pero aquí funciona como lenguaje jurídico de validez permanente. 'Quedará establecida' conserva la fuerza legal y evita la ambigüedad de una traducción demasiado literal.
- source_word: הַבַּיִת אֲשֶׁר בָּעִיר אֲשֶׁר לֹא חֹמָה
  english_pob_choice: the house that is in a city that has no wall
  chosen_spanish: la casa que está en una ciudad que no tiene muralla
  alternatives_spanish:
  - la casa en una ciudad sin muralla
  - la casa en una ciudad amurallada no
  lexicon: HALOT
  rationale: Se conserva la estructura relativa expandida del hebreo y la negación explícita. 'Muralla' es más natural y precisa en español que 'muro' para el contexto urbano defensivo.
- source_word: לַצְּמִיתֻת
  english_pob_choice: permanently
  chosen_spanish: permanentemente
  alternatives_spanish:
  - en perpetuidad
  - para siempre
  lexicon: HALOT
  rationale: El sustantivo indica irrevocabilidad o permanencia jurídica. 'Permanentemente' expresa esa fuerza legal de modo claro y sobrio en español moderno.
- source_word: לַקֹּנֶה אֹתוֹ
  english_pob_choice: to the one who bought it
  chosen_spanish: para el comprador
  alternatives_spanish:
  - para el que lo compró
  - para el adquirente
  lexicon: HALOT
  rationale: El participio designa al comprador; en español legal-natural, 'el comprador' comunica de manera directa al destinatario del derecho. Se evita una paráfrasis excesiva y se mantiene la referencia al adquirente de la casa.
- source_word: לְדֹרֹתָיו
  english_pob_choice: throughout his generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - para sus generaciones
  - a lo largo de sus generaciones
  lexicon: HALOT
  rationale: La expresión señala continuidad hereditaria en la línea del comprador. 'Por todas sus generaciones' conserva el tono formal y la duración genealógica sin reducirla simplemente a 'descendientes'.
- source_word: לֹא יֵצֵא בַּיֹּבֵל
  english_pob_choice: it shall not go out in the Jubilee
  chosen_spanish: no saldrá en el Jubileo
  alternatives_spanish:
  - no revertirá en el Jubileo
  - no será liberada en el Jubileo
  lexicon: HALOT
  rationale: Se mantiene el verbo concreto 'salir' como en el hebreo, porque la imagen legal de 'salir' es importante. El contexto deja claro que significa no regresar al dueño original en el año del Jubileo.
theological_decisions:
- issue: Fuerza jurídica de la venta de una casa en ciudad sin muralla
  english_pob_reading: If not redeemed within one full year, the sale becomes permanent and is not reversed at the Jubilee.
  chosen_spanish_reading: Si no es redimida dentro del plazo, la casa queda jurídicamente firme y no vuelve en el Jubileo.
  alternative_spanish_readings:
  - si no se redime, la venta permanece válida
  - si no es redimida, la casa queda en posesión del comprador
  rationale: La combinación de 'quedará establecida', 'permanentemente', 'por todas sus generaciones' y 'no saldrá en el Jubileo' indica un traslado irrevocable en esta clase de propiedad. La traducción refleja esa fuerza legal sin introducir una doctrina ajena al pasaje.
  doctrine_reference: Ley de redención y Jubileo en Levítico 25
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo masorético, la solución inglesa auditada y la observación de revisión externa. No se adoptaron cambios de sentido mayores porque la lectura legal del pasaje está bien respaldada por וְקָם, לַצְּמִיתֻת, לְדֹרֹתָיו y לֹא יֵצֵא בַּיֹּבֵל.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el tetragrámaton en el texto base.
  - '''Jubileo'' se conserva como término técnico ya asentado en Levítico 25.'
  - '''Redimida'' se usa de modo consistente con el campo léxico de גאל en la sección.'
  - Se evita 'SEÑOR' o 'Cristo' por no corresponder al contenido del versículo.
