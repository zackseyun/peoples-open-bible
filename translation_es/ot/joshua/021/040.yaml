review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría en casi todos los elementos: ''Todas las ciudades'', ''para los hijos de Merari'', ''por sus familias'' y ''doce ciudades por sorteo'' reflejan fielmente כָּל הֶעָרִים, לִבְנֵי מְרָרִי, לְמִשְׁפְּחֹתָם y וַיְהִי גּוֹרָלָם ... עָרִים שְׁתֵּים עֶשְׂרֵה. El único desajuste significativo es que הַנּוֹתָרִים se refiere a los meraritas/familias restantes, no a ''las ciudades'' restantes; por eso ''las restantes'' introduce una concordancia interpretativa equivocada en español.'
  spanish_quality_summary: El español es claro y digno, pero 'las restantes' suena algo forzado y además apunta gramaticalmente a 'ciudades'. Cambiarlo por 'los restantes' mejora la fidelidad y la legibilidad, manteniendo la estructura parentética. El resto del versículo es natural y adecuado para un registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Levitas' y 'por sorteo' son adecuados. La alternativa 'meraritas' puede conservarse en nota como opción léxica. No intervienen términos sensibles como Yahvé/Mesías/espíritu.
  issues:
  - severity: medium
    issue: Concordancia errónea en 'las restantes'
    rationale: הַנּוֹתָרִים es masculino plural y en contexto modifica a los hijos/familias meraritas restantes dentro de los levitas, no a 'ciudades'. En español, 'las restantes' hace que el inciso parezca referirse a las ciudades.
  - severity: low
    issue: Nota b ligeramente menos directa que la inglesa
    rationale: La nota 'las restantes de entre las familias levíticas' es entendible, pero la alternativa más cercana al rastro inglés sería 'el resto de las familias levíticas' o similar. Aun así, basta una mínima normalización al revisar el texto principal.
  revised_spanish_text: Todas las ciudades para los hijos de Merari[a], por sus familias—los restantes de entre las familias de los levitas[b]—fueron doce ciudades por sorteo.
  revised_footnotes:
  - marker: a
    text: O 'para los descendientes de Merari' o 'para los meraritas'.
    reason: lexical_alternative
  - marker: b
    text: O 'el resto de las familias levíticas'.
    reason: lexical_alternative
  revision_rationale: 'Se corrige ''las restantes'' a ''los restantes'' para reflejar correctamente el referente de הַנּוֹתָרִים: los meraritas restantes dentro de las familias levíticas, no las ciudades. También se ajusta la nota b para alinearla mejor con la alternativa preservada en inglés.'
