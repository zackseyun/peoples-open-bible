translation:
  language: es
  text: Entonces pasó el presente[a] por delante de él, pero él mismo pasó aquella noche en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regalo». El hebreo מִנְחָה puede significar regalo, tributo u ofrenda; aquí se refiere al presente que Jacob envió por delante a Esaú.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲבֹר
  english_pob_choice: passed on
  chosen_spanish: pasó
  alternatives_spanish:
  - siguió su camino
  - continuó
  - avanzó
  lexicon: HALOT
  rationale: El hebreo expresa avance narrativo de la ofrenda hacia adelante; en español, «pasó» conserva la idea de movimiento sin introducir una imagen más específica que el texto no exige.
- source_word: הַמִּנְחָה
  english_pob_choice: the gift
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - el regalo
  - el presente
  - la dádiva
  lexicon: HALOT
  rationale: Aunque la POB inglesa elige «gift», en este contexto la palabra hebrea מִנְחָה puede abarcar regalo, tributo u ofrenda. Para español, «ofrenda» mantiene amplitud semántica y la carga formal del gesto de Jacob, sin volverlo necesariamente cultual.
- source_word: עַל־פָּנָיו
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - antes que él
  - en frente de él
  - por delante de él
  lexicon: HALOT
  rationale: La locución idiomática literalmente significa «sobre/ante su rostro», pero aquí indica que la ofrenda iba en avance. «Delante de él» comunica ese sentido de manera natural y fiel.
- source_word: וְהוּא
  english_pob_choice: but he himself
  chosen_spanish: pero él mismo
  alternatives_spanish:
  - y él
  - mientras él
  - pero él
  lexicon: HALOT
  rationale: El pronombre es enfático y contrastivo en el hebreo. «Pero él mismo» conserva el contraste entre la ofrenda que va delante y Jacob que permanece, sin sobrecargar el español.
- source_word: לָן
  english_pob_choice: stayed
  chosen_spanish: pasó
  alternatives_spanish:
  - permaneció
  - durmió
  - se alojó
  lexicon: HALOT
  rationale: La idea es que Jacob pasó la noche allí; en español, «pasó aquella noche» reproduce de forma idiomática el valor de לָן dentro de la frase temporal, más que un simple «quedó» o «se alojó».
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - durante aquella noche
  lexicon: HALOT
  rationale: «Aquella noche» es una forma natural y precisa en español para el deíctico temporal hebreo.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en la tienda
  - en el encampamento
  lexicon: HALOT
  rationale: מַחֲנֶה se refiere a un campamento o asentamiento temporal. «Campamento» es claro y conserva la imagen narrativa sin introducir matices militares innecesarios.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el trazado auditado en inglés: mantiene el movimiento de la מִנְחָה «delante de él», conserva el énfasis de וְהוּא con «pero él mismo», y refleja לָן con una expresión natural de permanencia nocturna. No se observan revisiones en el pase inglés posterior, y el acuerdo de control es alto.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene la distinción narrativa entre la ofrenda que avanza y Jacob que permanece en el campamento.
  - El marcador de nota al pie aparece en el sustantivo principal para señalar la alternativa léxica documentada.
