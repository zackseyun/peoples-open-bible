translation:
  language: ko
  text: 우리가 우리 하나님 앞에서 여러분으로 인하여 누리는 모든 기쁨에 대하여, 여러분에 관하여 어떤 감사로 하나님께 보답할 수 있겠습니까[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 보다 자연스러운 옮김은 「우리가 여러분으로 인하여 하나님께 어떻게 충분히 감사할 수 있겠습니까?」. 직역하면 「여러분에 관하여 어떤 감사로 하나님께 갚을 수 있겠습니까?」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα ... εὐχαριστίαν ... ἀνταποδοῦναι
  english_pob_choice: what thanksgiving can we repay
  chosen_korean: 어떤 감사로 ... 보답할 수 있겠습니까
