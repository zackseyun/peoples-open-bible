revisions:
- from: 'Y Jacob[a] te recibirá, y todos los padres te alabarán. Y en cada uno de sus hermanos que era llevado aparte, los que quedaban decían: «No nos avergüences, hermano[b], ni resultes falso para con los que murieron antes que nosotros».'
  to: 'Y Jacob[a] te recibirá, y todos los padres te alabarán. Y a medida que se llevaban a cada uno de sus hermanos, los que quedaban decían: «No nos avergüences, hermano[b], ni les falles a los que murieron antes que nosotros».'
  rationale: Se ajusta la cláusula distributiva para reflejar con naturalidad ἐνὶ ἑκάστῳ τῶν ἀποσπωμένων y se elimina «aparte», que sonaba innecesariamente calcado. También se reemplaza «resultes falso para con» por «les falles», que preserva el sentido testimonial de ψεύσῃ en un español claro y digno. Se mantienen «Jacob», «los padres» y la nota léxica sobre la alternativa más literal.
  reviewer_model: gpt-5.4
