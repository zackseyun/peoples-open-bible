translation:
  language: es
  text: 'el que dice[a]: «Yo me edificaré una casa espaciosa, con amplias habitaciones superiores», y le abre ventanas, la reviste de cedro y la pinta de rojo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien dice».
    reason: alternative_reading
lexical_decisions:
- source_word: הָאֹמֵר
  english_pob_choice: who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - el que está diciendo
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo y describe al sujeto del oráculo; en español, «el que dice» conserva ese valor caracterizador con naturalidad.
- source_word: אֶבְנֶה לִּי
  english_pob_choice: I will build myself
  chosen_spanish: me edificaré
  alternatives_spanish:
  - me construiré
  - edificaré para mí
  lexicon: HALOT
  rationale: El dativo con לִּי expresa beneficio propio; «me edificaré» mantiene el matiz reflexivo y el interés personal sin sonar mecánico.
- source_word: בֵּית מִדּוֹת
  english_pob_choice: a spacious house
  chosen_spanish: una casa espaciosa
  alternatives_spanish:
  - una casa grande
  - una mansión
  lexicon: HALOT
  rationale: La frase señala dimensiones amplias, no un término técnico de «medidas»; «casa espaciosa» comunica bien el sentido de prestigio y amplitud.
- source_word: וַעֲלִיּוֹת מְרֻוָּחִים
  english_pob_choice: with roomy upper chambers
  chosen_spanish: con amplias habitaciones superiores
  alternatives_spanish:
  - con espaciosos aposentos superiores
  - con habitaciones altas y amplias
  lexicon: HALOT
  rationale: עֲלִיּוֹת son habitaciones o cámaras superiores; מְרֻוָּחִים aporta amplitud. «Habitaciones superiores» es claro en español y conserva la imagen arquitectónica.
- source_word: וְקָרַע לוֹ חַלּוֹנָי
  english_pob_choice: and cuts out windows for it
  chosen_spanish: y se abre ventanas para ella
  alternatives_spanish:
  - y corta ventanas para ella
  - y perfora ventanas para ella
  lexicon: HALOT
  rationale: קָרַע literalmente es «rasgar/romper», pero aquí describe la apertura de vanos. «Se abre ventanas» refleja la acción constructiva sin perder la vividez.
- source_word: וְסָפוּן בָּאָרֶז
  english_pob_choice: paneling it with cedar
  chosen_spanish: la reviste de cedro
  alternatives_spanish:
  - la entabla con cedro
  - la cubre con cedro
  lexicon: HALOT
  rationale: סָפוּן indica recubrimiento o entablado en contexto arquitectónico. «La reviste de cedro» es idiomático y preserva el acabado lujoso.
- source_word: וּמָשׁוֹחַ בַּשָּׁשַׁר
  english_pob_choice: painting it red
  chosen_spanish: la pinta de rojo
  alternatives_spanish:
  - la pinta con rojo
  - la pinta con bermellón
  lexicon: HALOT
  rationale: שָׁשַׁר designa un pigmento rojo; la revisión inglesa ajustó la lectura a «red». «De rojo» mantiene la referencia cromática sin introducir especificación no obligada.
translation_notes:
  revision_awareness: La base inglesa pasó de «painting it bright red» a «painting it red» en una revisión posterior para ajustarse mejor al hebreo. En español se siguió esa revisión, evitando añadir un matiz de intensidad no explícito en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo aquí no contiene el nombre divino.
  - Se prefirió un registro sobrio y contemporáneo, coherente con un oráculo profético y con la equivalencia funcional documentada en el POB inglés.
  - «Habitaciones superiores» conserva la imagen de עֲלִיּוֹת sin convertirla en una paráfrasis excesiva como «mansión» o «palacio».
  - El objeto del verbo final se refiere a la casa; por eso se usó el pronombre femenino implícito en español («ella»), de acuerdo con «casa».
