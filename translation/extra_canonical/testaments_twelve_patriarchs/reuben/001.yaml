theological_decisions:
- issue: Nature of Reuben's appeal to God as witness in verse 6
  chosen_reading: 'Rendered as a solemn warning formula: ''today I call the God of heaven to witness against you'''
  alternative_readings:
  - '''I testify to you by the God of heaven today'''
  - '''I adjure you before the God of heaven today'''
  rationale: The Greek has a forensic-testimonial flavor rather than a casual oath. The chosen reading preserves the covenantal seriousness of the exhortation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological weight without archaic obscurity
- issue: Rendering of μετανοέω in verse 9
  chosen_reading: '''I repented'''
  alternative_readings:
  - '''I changed my mind'''
  - '''I turned back'''
  rationale: The project guideline specifies 'repent' in specific-sin contexts. Reuben is confessing a concrete act and describing penitential abstinence.
  doctrine_reference: 'DOCTRINE.md, Contested terms table: μετανοέω'
- issue: Divine judgment language in verses 7-8
  chosen_reading: Preserved as direct divine punishment and near-destruction
  alternative_readings:
  - A softened rendering emphasizing illness without divine agency
  rationale: The Greek explicitly attributes the affliction to divine striking and possible destruction. The translation preserves this theological claim rather than reducing it to mere consequence.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
