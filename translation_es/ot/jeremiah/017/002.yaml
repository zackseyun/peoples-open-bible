translation:
  language: es
  text: Como sus hijos recuerdan sus altares y sus Aserim[a], junto a todo árbol verde, en las colinas altas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus postes de Asera» o «sus postes sagrados». El término hebreo se refiere a objetos de culto asociados con Asera.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Porque
  - Pues
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce aquí una relación circunstancial o explicativa con la unidad anterior. «Como» conserva esa conexión en español sin forzar una causalidad más fuerte que la del hebreo.
- source_word: זְכֹּר
  english_pob_choice: remember
  chosen_spanish: recuerdan
  alternatives_spanish:
  - traen a la memoria
  - se acuerdan
  - recuerdan
  lexicon: HALOT
  rationale: El sentido básico es de memoria/reminiscencia. En español, el presente «recuerdan» expresa bien la acción verbal en esta construcción y mantiene la naturalidad de la frase.
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  - sus hijos varones
  lexicon: HALOT
  rationale: El hebreo puede referirse a descendencia en general. «Hijos» conserva la relación filial/patrimonial y evita restringir indebidamente a «hijos varones»; en español bíblico «sus hijos» funciona de manera amplia y clara.
- source_word: מִזְבְּחוֹתָם
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus sacrificios
  - sus aras
  lexicon: HALOT
  rationale: «Altares» reproduce directamente el sustantivo cultual del hebreo y preserva el contexto idolátrico sin suavizarlo.
- source_word: וַאֲשֵׁרֵיהֶם
  english_pob_choice: their Asherim
  chosen_spanish: sus aseras
  alternatives_spanish:
  - sus Aserim
  - sus postes sagrados
  - sus postes de Aserá
  lexicon: HALOT
  rationale: Se conserva el término técnico vinculado a Asherah/Asera, pero adaptado al plural español («aseras») para que sea legible. Esto mantiene la ambigüedad lexical del hebreo entre objeto cultual y poste/árbol ritual; «postes sagrados» quedaría como interpretación más explícita.
- source_word: עֵץ רַעֲנָן
  english_pob_choice: every green tree
  chosen_spanish: todo árbol frondoso
  alternatives_spanish:
  - todo árbol verde
  - todo árbol lozano
  - cada árbol frondoso
  lexicon: HALOT
  rationale: La expresión hebrea apunta a un árbol fresco/lujuriante asociado con lugares de culto. «Frondoso» comunica mejor en español la idea de exuberancia vegetal que «verde», que podría sonar demasiado literal o genérico.
- source_word: עַל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - sobre
  - cerca de
  - al lado de
  lexicon: HALOT
  rationale: En este contexto cultual y topográfico, la preposición marca ubicación asociada al árbol y al collado. «Junto a» es idiomático y evita imponer una imagen física de estar literalmente encima.
- source_word: גְּבָעוֹת הַגְּבֹהוֹת
  english_pob_choice: on the high hills
  chosen_spanish: en los collados altos
  alternatives_spanish:
  - sobre los montes altos
  - en las alturas de los collados
  - en las colinas elevadas
  lexicon: HALOT
  rationale: La expresión hebrea remite a lugares altos de culto. «Collados altos» conserva el paralelismo y la fuerza topográfica/polémica; «en los collados altos» suena natural en español bíblico y mantiene la referencia a sitios de idolatría.
theological_decisions:
- issue: Rendering of אֲשֵׁרִים in an idolatry context
  english_pob_reading: their Asherim
  chosen_spanish_reading: sus aseras
  alternative_spanish_readings:
  - sus postes sagrados
  - sus postes de Asera
  - sus Aserim
  rationale: La traducción conserva la referencia a un objeto de culto asociado con Asera sin cerrar la discusión sobre su forma exacta. «Aseras» permite un español bíblico legible y mantiene la tensión lexical del hebreo; las alternativas explicitan la función cultual si se desea mayor claridad.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El pasaje se alineó estrechamente con la versión inglesa POB, sin revisiones posteriores registradas; el draft español conserva la misma estructura y la misma decisión de mantener el término técnico para אֲשֵׁרִים, con una nota explicativa equivalente a la del texto inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto para el tetragrámaton, aunque este versículo no lo contiene.
  - Se preservó el plural posesivo «sus» para todos los elementos cultuales, coherente con el hebreo.
  - «Collados altos» se eligió para reproducir el lenguaje de lugares altos de culto sin modernizar en exceso la imagen.
