  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: existencia de esperanza, promesa para el futuro, fórmula profética con el nombre divino Yahvé, y retorno de los hijos al territorio. Sin embargo, las notas al pie están desalineadas con los anclajes del texto y con las decisiones léxicas auditadas: la nota [b] en el texto está anclada a «Yahvé», pero su contenido explica alternativas para «declara Yahvé», mientras que la alternativa sobre «hijos/territorio» del POB inglés no fue preservada.'
  spanish_quality_summary: El español es claro, natural y digno. «Hay esperanza para tu futuro» y «volverán a su territorio» son fluidos y fieles. El uso de rayas es aceptable, pero conviene reparar el sistema de notas para evitar ambigüedad editorial y preservar mejor las alternativas significativas del original y del audit trail.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה. «Esperanza», «futuro» y «territorio» son buenas opciones. «Tus hijos» es admisible en español, pero dado que el POB inglés explicitó la alternativa «sons», conviene conservar esa posibilidad en una nota sobre «hijos», no sobre «Yahvé».
  issues:
  - severity: medium
    issue: La nota [b] está mal anclada en el texto.
    rationale: En «Yahvé[b]», el marcador parece referirse solo al nombre divino, pero la nota ofrece alternativas para toda la fórmula «declara Yahvé» («dice Yahvé», «oráculo de Yahvé»). El marcador debe colocarse sobre la frase pertinente o ajustarse el contenido de la nota.
  - severity: medium
    issue: Falta la alternativa léxica documentada para בָנִים / לִגְבוּלָם.
    rationale: 'El audit trail inglés conserva una nota con «sons» y «territory/border». El borrador español no preserva esa alternativa significativa, pese a que en español también puede aclararse con una nota como «O: “tus hijos varones volverán a su territorio”» o similar.'
  - severity: low
    issue: La nota [a] usa «resultado final», que suena algo interpretativo y menos idiomático que la alternativa auditada.
    rationale: El inglés ofrece “latter end” y “outcome”. En español, «postrer fin» y «desenlace» o «resultado» funcionan mejor que «resultado final», que duplica matiz de cierre.
  revised_spanish_text: Hay esperanza para tu futuro[a] —declara Yahvé—, y tus hijos[b] volverán a su territorio.
