- from: Y Jacob viajó a Sucot[a], y edificó una casa para sí, e hizo cabañas para su ganado. Por eso llamó el nombre del lugar Sucot.
  to: Y Jacob viajó a Sucot[a], y edificó una casa para sí, e hizo refugios para su ganado. Por eso llamó al lugar Sucot.
  rationale: Se suaviza un calco hebraizante que resulta poco idiomático en español («llamó el nombre del lugar») y se afina la nota para reflejar mejor el sentido de סֻכּוֹת en este contexto de abrigo para ganado, manteniendo el juego de palabras con el topónimo.
