revisions:
- from: 'Y cuando los días del banquete habían terminado[a], Job enviaba y los consagraba; se levantaba muy de mañana y ofrecía holocaustos según el número de todos ellos. Porque Job decía: «Quizá mis hijos han pecado y han bendecido a Dios en su corazón». Así hacía Job continuamente.'
  to: 'Y cuando los días del banquete habían terminado, Job enviaba y los consagraba; se levantaba muy de mañana y ofrecía holocaustos según el número de todos ellos. Porque Job decía: «Quizá mis hijos han pecado y han maldecido a Dios[a] en sus corazones». Así hacía Job continuamente.'
  rationale: Se corrige el cuerpo del texto para reflejar el sentido contextual de ברך como eufemismo reverencial por «maldecir», en conformidad con el audit trail inglés y para evitar un sentido opuesto en español. Se reubica la nota al lugar correcto y se ajusta «en sus corazones» por mayor naturalidad y claridad.
