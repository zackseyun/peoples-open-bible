id: EZK.33.31
reference: Ezekiel 33:31
source:
  edition: WLC
  text: וְ/יָב֣וֹאוּ אֵ֠לֶי/ךָ כִּ/מְבוֹא עָ֞ם וְ/יֵשְׁב֤וּ לְ/פָנֶ֨י/ךָ֙ עַמִּ֔/י וְ/שָֽׁמְעוּ֙ אֶת דְּבָרֶ֔י/ךָ וְ/אוֹתָ֖/ם לֹ֣א יַֽעֲשׂ֑וּ כִּֽי עֲגָבִ֤ים בְּ/פִי/הֶם֙ הֵ֣מָּה עֹשִׂ֔ים אַחֲרֵ֥י בִצְעָ֖/ם לִבָּ֥/ם הֹלֵֽךְ־־־׃
translation:
  text: And they come to you as people come[a], and they sit before you as my people, and they hear your words, but they do not do them; for with their mouth they speak lustful things[b], while their heart goes after their unjust gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lusts,' 'sensual desires,' or possibly 'amorous songs.' The Hebrew term is rare and may refer either to what they speak with their mouths or to the kind of entertainment they make of the prophet's words.
    reason: lexical_alternative
  - marker: b
    text: '''Unjust gain'' may also be rendered ''profit,'' ''greed,'' or ''covetous gain.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְבוֹא עָם
  chosen: as people come
  alternatives:
  - as the coming of a people
  - as a crowd comes
  lexicon: HALOT
  rationale: The idiom compares their approach to the ordinary/public manner of a people coming to hear. 'As people come' is natural English and preserves the comparative force of כ־ with מבוא.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Retains the covenantal designation and the irony that they present themselves as belonging to God while remaining disobedient.
- source_word: וְשָׁמְעוּ אֶת־דְּבָרֶיךָ
  chosen: and they hear your words
  alternatives:
  - and they listen to your words
  lexicon: HALOT
  rationale: '''Hear'' preserves the Hebrew verb שמע and allows the following contrast with failure to do what is heard.'
- source_word: וְאוֹתָם לֹא יַעֲשׂוּ
  chosen: but they do not do them
  alternatives:
  - but they will not do them
  - but they do not act on them
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew idiom of 'doing' the words, while 'but' makes the adversative sense clear in English.
- source_word: עֲגָבִים
  chosen: lustful talk
  alternatives:
  - lusts
  - sensual desires
  - amorous songs
  lexicon: HALOT
  rationale: The noun denotes passionate or sensual desire. In this context, linked with 'with their mouth' and contrasted with the heart's pursuit of gain, it points to what they express verbally rather than obedient intent. 'Lustful talk' captures the mouth-focused expression without overcommitting to a specific genre such as singing.
- source_word: בְּפִיהֶם הֵמָּה עֹשִׂים
  chosen: with their mouth they act out
  alternatives:
  - with their mouth they make
  - with their mouth they speak
  - they do with their mouth
  lexicon: HALOT
  rationale: The Hebrew literally says 'they do' with their mouth. Because English does not normally say one 'does lusts' with the mouth, 'act out' preserves the performative sense while remaining readable.
- source_word: בִצְעָם
  chosen: their unjust gain
  alternatives:
  - their profit
  - their greed
  - their covetous gain
  lexicon: HALOT
  rationale: בצע often carries the sense of gain obtained by greed or unjust means. 'Unjust gain' preserves the moral coloring better than the neutral 'profit.'
- source_word: לִבָּם הֹלֵךְ אַחֲרֵי
  chosen: their heart goes after
  alternatives:
  - their heart follows
  - their heart pursues
  lexicon: HALOT
  rationale: A common Hebrew idiom for inward allegiance or desire. 'Goes after' is transparent and preserves the metaphor.
