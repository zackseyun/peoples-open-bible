id: HOS.4.6
reference: Hosea 4:6
source:
  edition: WLC
  text: נִדְמ֥וּ עַמִּ֖/י מִ/בְּלִ֣י הַ/דָּ֑עַת כִּֽי אַתָּ֞ה הַ/דַּ֣עַת מָאַ֗סְתָּ וְ/אֶמְאָֽסְא/ךָ֙ מִ/כַּהֵ֣ן לִ֔/י וַ/תִּשְׁכַּח֙ תּוֹרַ֣ת אֱלֹהֶ֔י/ךָ אֶשְׁכַּ֥ח בָּנֶ֖י/ךָ גַּם אָֽנִי־־׃
translation:
  text: My people are destroyed for lack of knowledge[a]. Because you have rejected knowledge, I also reject you from being priest to me. Since you have forgotten the law of your God[c][b], I also will forget your children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perish,' 'are silenced,' or 'are cut off' for 'are destroyed.'
    reason: lexical_alternative
  - marker: b
    text: '''Law'' translates Hebrew torah, which can also mean ''instruction.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'your sons' if the masculine plural is taken more narrowly.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדְמוּ
  chosen: are destroyed
  alternatives:
  - are silenced
  - perish
  - are cut off
  lexicon: HALOT
  rationale: The Niphal of דמה here is commonly understood in context as ruin/perishing rather than mere silence. 'Are destroyed' fits the judgment context and standard prophetic usage, while remaining natural English. The perfect is rendered as a present/resultative in English to match prophetic declaration.
- source_word: מִבְּלִי הַדָּעַת
  chosen: for lack of knowledge
  alternatives:
  - because there is no knowledge
  - without knowledge
  lexicon: HALOT
  rationale: 'This idiom expresses deprivation: the people are ruined due to absence of knowledge. ''For lack of knowledge'' is concise and idiomatic in English.'
- source_word: הַדָּעַת / הַדַּעַת
  chosen: knowledge
  alternatives:
  - the knowledge
  - understanding
  lexicon: HALOT
  rationale: Though the Hebrew has the article, English idiom normally omits it here. In Hosea, 'knowledge' carries covenantal and moral-religious force, not mere information; nevertheless 'knowledge' best preserves the lexical form without over-interpreting.
- source_word: מָאַסְתָּ
  chosen: have rejected
  alternatives:
  - have despised
  - have refused
  lexicon: HALOT
  rationale: מאס denotes rejection with disdain or refusal. 'Have rejected' is clear, strong, and matches the reciprocal judgment that follows.
- source_word: וְאֶמְאָסְאֲךָ
  chosen: I also reject you
  alternatives:
  - I will reject you
  - I too despise you
  lexicon: HALOT
  rationale: The first-person imperfect following the causal clause expresses Yahweh's responsive judgment. 'I also reject you' preserves the reciprocal force and the adverbial correspondence with the prior rejection.
- source_word: מִכַּהֵן לִי
  lemma: מִן
  chosen: from serving as priest to me
  alternatives:
  - from being priest to me
  - from ministering as priest to me
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive/verb form of כהן indicates exclusion from priestly service. 'From serving as priest to me' is more natural modern English than 'from being priest to me' while preserving the cultic role.
- source_word: וַתִּשְׁכַּח
  chosen: you have forgotten
  alternatives:
  - you forgot
  - you neglected
  lexicon: HALOT
  rationale: Though formally a waw-consecutive form, in this accusatory sequence it is well represented by English present perfect, linking past action with present culpability. 'Forgotten' preserves the lexical sense better than the interpretive 'neglected.'
- source_word: תּוֹרַת אֱלֹהֶיךָ
  chosen: the law of your God
  alternatives:
  - the instruction of your God
  - the Torah of your God
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in prophetic covenant context 'law' is the most recognizable and suitably weighty English rendering. 'Instruction' is possible and worth preserving in a footnote because the Hebrew term is broader than statutory law alone.
- source_word: אֶשְׁכַּח
  chosen: I also will forget
  alternatives:
  - I too will forget
  - I will ignore
  lexicon: HALOT
  rationale: The reciprocal judgment mirrors the prior 'you have forgotten.' 'Will forget' preserves the future force and rhetorical symmetry; 'ignore' would over-interpret the metaphor.
- source_word: בָּנֶיךָ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Though formally masculine plural, in many contexts בנים can denote offspring generally. 'Your children' communicates the likely collective sense in natural English while avoiding an unnecessarily narrow male-only reading.
