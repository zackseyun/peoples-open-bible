revisions:
- from: Tú lo sabes[a], Yahvé; acuérdate de mí y atiéndeme, y haz venganza por mí de mis perseguidores[b]. En tu paciencia no me quites[c]; sabe que por causa de ti llevo reproche[d].
  to: Tú lo sabes, Yahvé; acuérdate de mí y atiéndeme[a], y véngame de mis perseguidores[b]. En tu paciencia no me quites[c]; sabe que por tu causa llevo reproche[d].
  rationale: Se corrige la asignación de notas para que cada una corresponda al lexema correcto del hebreo y al anclaje real en el texto español. También se reemplaza una expresión poco idiomática ('haz venganza por mí de mis perseguidores') por 'véngame de mis perseguidores', que preserva la fuerza judicial de נקם con español natural y digno. Finalmente, se pule 'por causa de ti' a 'por tu causa' por mejor fluidez sin pérdida semántica.
  reviewer_model: gpt-5.4
