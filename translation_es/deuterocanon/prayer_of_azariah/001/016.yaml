lexical_decisions:
- source_word: ἀλλʼ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: LSJ
  rationale: Marca contraste simple y natural con la petición anterior; en español, 'pero' conserva bien la oposición sin volver el verso artificioso.
- source_word: ἐν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en
  - por medio de
  lexicon: BDAG
  rationale: Aunque literalmente equivale a 'en', aquí expresa la condición o el acompañamiento en que se pide la aceptación; 'con' reproduce ese valor idiomático en español.
- source_word: ψυχῇ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  lexicon: BDAG
  rationale: '''Alma'' preserva el peso antropológico y devocional de ψυχή en esta oración penitencial, sin reducirlo a ''vida'' ni diluirlo en un mero ''yo''.'
- source_word: συντετριμμένῃ
  english_pob_choice: broken
  chosen_spanish: quebrantada
  alternatives_spanish:
  - rota
  - contrita
  - quebrada
  lexicon: LSJ
  rationale: El participio perfecto pasivo expresa un estado de estar roto o aplastado; 'quebrantada' comunica bien esa condición en español bíblico actual y evita hacer explícita una interpretación más libre como 'contrita'.
- source_word: πνεύματι
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - ánimo
  - espíritu interior
  lexicon: BDAG
  rationale: En paralelo con ψυχή, πνεῦμα designa la disposición interior; 'espíritu' conserva la distinción léxica y el tono reverente del original.
- source_word: τεταπεινωμένῳ
  english_pob_choice: humbled
  chosen_spanish: humillado
  alternatives_spanish:
  - humilde
  - abatido
  - rebajado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe una condición de haber sido puesto en bajo estado delante de Dios; 'humillado' refleja mejor la pasividad del término que 'humilde', que suena más a virtud habitual.
- source_word: προσδεχθείημεν
  english_pob_choice: may we be accepted
  chosen_spanish: seamos aceptados
  alternatives_spanish:
  - se nos reciba
  - se nos acoja
  - seamos recibidos
  lexicon: BDAG
  rationale: La forma optativa expresa petición o deseo; 'seamos aceptados' mantiene el sentido de recepción favorable por parte de Dios con una formulación natural en español.
theological_decisions:
- issue: Paralelismo antropológico de ψυχή y πνεῦμα
  english_pob_reading: Render distinctly as 'soul' and 'spirit'
  chosen_spanish_reading: Traducirlos distintamente como 'alma' y 'espíritu'
  alternative_spanish_readings:
  - Expresarlos de modo general como 'interioridad'
  - fusionarlos en una sola expresión
  rationale: El griego usa dos términos distintos en paralelismo poético. Mantener ambos en español conserva la textura literaria y la amplitud antropológica del texto, sin fusionarlos indebidamente.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Lenguaje penitencial de συντετριμμένῃ
  english_pob_reading: Use 'broken' rather than 'contrite'
  chosen_spanish_reading: Usar 'quebrantada' antes que 'contrita'
  alternative_spanish_readings:
  - alma contrita
  - alma rota
  rationale: El campo semántico primario es el de estar quebrado o aplastado. 'Quebrantada' es suficientemente literal y a la vez idiomática en español; 'contrita' sería una glosa interpretativa válida, pero más teológica que lexical.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1
translation_notes:
