review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: reconocimiento interior, comparación paternal, repetición de יסר con el mismo verbo, y uso correcto de Yahvé para יְהוָה. Sin embargo, la apertura ''Así que sabe'' no es español natural para un destinatario singular y suena gramaticalmente defectuosa; debe ser ''Así que reconoce'' o ''Debes saber''.'
  spanish_quality_summary: La frase es generalmente clara y fiel, pero 'Así que sabe en tu corazón' resulta poco idiomática e incluso anómala, porque 'sabe' se percibe como imperativo formal mezclado con 'tu'. 'Reconoce en tu corazón' suena natural, mantiene el valor exhortativo/resultativo y preserva la interioridad del hebreo.
  glossary_alignment: Se alinea con la terminología del proyecto en 'Yahvé', 'Dios' y 'disciplina'. La nota léxica sobre יסר es adecuada; 'castiga' como alternativa es aceptable en nota, aunque no como glosa principal. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: 'Apertura española no idiomática: ''Así que sabe en tu corazón'''
    rationale: El hebreo exhorta al oyente a reconocer algo interiormente. En español, 'sabe' con 'tu' mezcla registros y suena defectuoso; no preserva bien la legibilidad ni el tono digno. 'Reconoce en tu corazón' transmite mejor el valor exhortativo y el reconocimiento interno.
  revised_spanish_text: Así que reconoce en tu corazón que[a], así como un hombre disciplina a su hijo, Yahvé tu Dios te disciplina.
