base_translation:
  language: en
  yaml_path: translation/ot/genesis/033/010.yaml
  text: Jacob said[a], “No, please. If I have found favor in your eyes, then take my gift from my hand, for therefore I have seen your face as one sees the face of God[c][b], and you have been pleased with me.”
  footnotes:
  - marker: a
    text: Or 'my present.' The Hebrew מִנְחָה can denote a gift, tribute, or offering; here it refers to Jacob's conciliatory present to Esau.
    reason: lexical_alternative
  - marker: b
    text: Or 'you accepted me' / 'you were pleased with me.' The Hebrew verb conveys favorable reception.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'like seeing the face of a god,' but in context 'God' best fits Jacob's recent encounter at Peniel (Gen 32:30).
    reason: alternative_reading
