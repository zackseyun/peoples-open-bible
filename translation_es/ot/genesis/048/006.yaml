translation:
  language: es
  text: Pero los hijos que tengas después de ellos serán tuyos[a][b]; serán llamados por el nombre de sus hermanos en la herencia de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus descendientes que engendres después de ellos»
    reason: lexical_alternative
  - marker: b
    text: Es decir, no recibirán una heredad tribal separada, sino que serán contados bajo Efraín y Manasés.
    reason: cross_reference
lexical_decisions:
- source_word: וּמוֹלַדְתְּךָ
  english_pob_choice: your offspring
  chosen_spanish: tus descendientes
  alternatives_spanish:
  - tus hijos
  - lo que nace de ti
  lexicon: HALOT
  rationale: El sustantivo indica lo que nace o es engendrado por alguien. «Descendientes» mantiene amplitud genealógica y resulta natural en español sin restringir innecesariamente a hijos inmediatos.
- source_word: הוֹלַדְתָּ
  english_pob_choice: you father
  chosen_spanish: que engendres
  alternatives_spanish:
  - que hayas engendrado
  - que hayas padreado
  lexicon: HALOT
  rationale: El verbo hiphil de ילד expresa causar el nacimiento; en esta frase dirigida a José, el español «engendres» conserva la acción generativa mejor que una formulación pasiva o excesivamente literal.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: después de ellos
  alternatives_spanish:
  - más tarde que ellos
  - tras ellos
  lexicon: HALOT
  rationale: 'La referencia es temporal y genealógica: hijos nacidos después de Efraín y Manasés. «Después de ellos» es directo y claro en español.'
- source_word: לְךָ יִהְיוּ
  english_pob_choice: will be yours
  chosen_spanish: serán tuyos
  alternatives_spanish:
  - te pertenecerán
  - seguirán siendo tuyos
  lexicon: HALOT
  rationale: Expresa pertenencia legal/familiar. «Serán tuyos» reproduce de forma concisa la idea de posesión o pertenencia sin introducir un matiz más fuerte que el hebreo.
- source_word: עַל שֵׁם אֲחֵיהֶם
  english_pob_choice: by the name of their brothers
  chosen_spanish: por el nombre de sus hermanos
  alternatives_spanish:
  - según el nombre de sus hermanos
  - bajo el nombre de sus hermanos
  lexicon: HALOT
  rationale: La construcción hebrea vincula a esos descendientes con el registro/nombre de sus hermanos. «Por el nombre de» conserva la relación nominal sin explicitar más de lo que el texto dice.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - los hermanos de ellos
  - sus parientes
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal. Aunque el referente es Efraín y Manasés, el hebreo emplea el término fraterno y el español lo conserva.
- source_word: יִקָּרְאוּ
  english_pob_choice: they will be called
  chosen_spanish: serán llamados
  alternatives_spanish:
  - serán nombrados
  - serán reconocidos
  lexicon: HALOT
  rationale: El nifal de קרא suele significar «ser llamado/nombrado». «Serán llamados» preserva el enlace léxico y funciona de manera natural en español.
- source_word: בְּנַחֲלָתָם
  english_pob_choice: in their inheritance
  chosen_spanish: en su heredad
  alternatives_spanish:
  - en su herencia
  - en su repartición
  lexicon: HALOT
  rationale: נַחֲלָה en contexto tribal alude a la porción heredada de tierra. «Heredad» comunica bien la idea bíblica de asignación tribal y evita la ambigüedad de una herencia meramente privada.
theological_decisions:
- issue: Inclusión tribal de los descendientes posteriores de José
  english_pob_reading: They would not receive separate tribal inheritances but would be counted under Ephraim and Manasseh.
  chosen_spanish_reading: No recibirían una heredad tribal separada, sino que serían contados bajo el nombre de sus hermanos.
  alternative_spanish_readings:
  - tendrían una heredad aparte
  - serían incluidos en una heredad distinta
  rationale: El contexto inmediato de Génesis 48 explica que los hijos posteriores de José no formarán tribus aparte. La formulación española conserva esa lectura sin añadir interpretación extratextual.
  doctrine_reference: Génesis 48:5–6; comparación con la distribución tribal en Josué 13–19
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura ya establecida en el audit trail inglés y no introduce cambios sustantivos respecto de la decisión revisada como estable e intacta.
  spanish_consistency_notes:
  - Se usa «heredad» para נַחֲלָה de manera consistente con el contexto tribal.
  - Se mantiene el parentesco literal «hermanos» para אֲחֵיהֶם, sin reemplazarlo por una paráfrasis.
  - «Serán tuyos» conserva la idea legal de pertenencia sin convertirla en un matiz de propiedad moderna.
  - La nota a aclara la alternativa léxica donde «descendientes» puede entenderse también como «hijos».
