revisions:
- from: 'Entonces Moisés llamó a Misael y a Elzafán, hijos de Uziel, tío de Aarón, y les dijo: «Acérquense[a]; lleven a sus hermanos[b] de delante del santuario a fuera del campamento».'
  to: 'Entonces Moisés llamó a Misael y a Elzafán, hijos de Uziel, tío de Aarón, y les dijo: «Acérquense; lleven a sus hermanos[a] de delante del santuario[b] fuera del campamento».'
  rationale: Se corrigió la construcción no idiomática «a fuera del campamento» a «fuera del campamento». También se reubicó y simplificó la nota sobre «before the sanctuary» para que quede anclada en «santuario»/la frase locativa correspondiente, y no en el imperativo «Acérquense». El resto del verso es fiel al hebreo y al razonamiento léxico documentado.
