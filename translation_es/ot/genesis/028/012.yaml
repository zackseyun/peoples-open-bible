base_translation:
  language: en
  yaml_path: translation/ot/genesis/028/012.yaml
  text: And he dreamed[a], and behold, a ladder was set up on the earth, and its top reached to heaven; and behold[b], the angels of God were ascending and descending on it.
  footnotes:
  - marker: a
    text: Or 'ladder.' The Hebrew term can refer more generally to a structure for ascent.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'on him,' though the most natural antecedent in context is the stairway.
    reason: alternative_reading
