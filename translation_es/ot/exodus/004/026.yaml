translation:
  language: es
  text: 'Así que lo dejó en paz.[a] Entonces ella dijo: «Un esposo de sangre»[b], a causa de la circuncisión.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lo dejó en paz»; también puede entenderse «se retiró de él» o «desistió de atacarlo». El contexto indica que Yahvé cesó su acción contra Moisés.'
    reason: theological_note
  - marker: b
    text: 'Hebreo: expresión difícil, literalmente «esposo de sangre»; posiblemente una exclamación ligada al rito de la circuncisión.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo en plural: «por las circuncisiones» o «por los ritos de circuncisión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרֶף
  english_pob_choice: he let him alone
  chosen_spanish: se apartó de él
  alternatives_spanish:
  - lo dejó
  - se retiró de él
  - lo dejó en paz
  lexicon: HALOT
  rationale: El verbo רפה en este contexto expresa que la acción hostil cesó. En español, «se apartó de él» comunica con naturalidad ese cese sin añadir interpretación excesiva, y conserva la relación con el objeto pronominal del hebreo.
- source_word: מִמֶּנּוּ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de él mismo
  - de él
  lexicon: HALOT
  rationale: La preposición מן con sufijo indica alejamiento o desistencia respecto de la persona afectada. En español se expresa de forma idiomática como «de él», manteniendo la referencia narrativa a Moisés.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: El adverbio temporal marca la secuencia narrativa inmediata. «Entonces» es la equivalencia española más natural y mantiene el enlace con el evento anterior.
- source_word: אָמְרָה
  english_pob_choice: she said
  chosen_spanish: ella dijo
  alternatives_spanish:
  - ella declaró
  - dijo
  lexicon: HALOT
  rationale: El verbo אמר es el verbo narrativo simple de habla. «Ella dijo» preserva la sencillez del hebreo y deja abierta la identidad de la hablante, aunque el contexto la identifica como Séfora.
- source_word: חֲתַן דָּמִים
  english_pob_choice: a bridegroom of blood
  chosen_spanish: un esposo de sangre
  alternatives_spanish:
  - un novio de sangre
  - un esposo de derramamiento de sangre
  - un esposo sanguinario
  lexicon: HALOT
  rationale: El hebreo contiene un modismo difícil que POB conserva literalmente. En español, «esposo de sangre» reproduce la forma nominal compacta sin resolver indebidamente su fuerza idiomática. «Esposo» comunica la relación matrimonial con mayor neutralidad que «novio».
- source_word: לַמּוּלֹת
  english_pob_choice: because of the circumcision
  chosen_spanish: a causa de la circuncisión
  alternatives_spanish:
  - por las circuncisiones
  - por la circuncisión
  - a causa de los ritos de circuncisión
  lexicon: HALOT
  rationale: El plural hebreo es raro y puede aludir a la circuncisión como acto o a las circuncisiones/ritos. En el texto principal, «a causa de la circuncisión» comunica la relación causal de manera clara; el plural se conserva en la nota.
theological_decisions:
- issue: Identidad del sujeto y objeto en la frase de desistencia
  english_pob_reading: The subject is the LORD and the object is Moses.
  chosen_spanish_reading: Se sobreentiende que Yahvé es quien cesa la acción contra Moisés.
  alternative_spanish_readings:
  - Él se apartó de él, sin precisar más el referente
  - Se apartó del hijo
  - Se apartó de la situación
  rationale: El contexto inmediato de 4:24–25 hace que Yahvé sea el agente más natural y Moisés el afectado. La traducción conserva esa lectura contextual sin forzar el texto a una explicitación doctrinal adicional.
  doctrine_reference: Mantener la tensión narrativa sin borrar la referencia contextual inmediata.
- issue: Sentido exacto de la expresión 'esposo de sangre'
  english_pob_reading: Retain the literal idiom without resolving its exact cultural or emotional force.
  chosen_spanish_reading: Se mantiene el modismo opaco sin explicarlo de manera interpretativa en el texto principal.
  alternative_spanish_readings:
  - Una exclamación de rechazo
  - Una designación ritual vinculada a la circuncisión
  - Una frase dirigida a Moisés o al niño
  rationale: El hebreo es genuinamente difícil y el propio audit trail inglés preserva esa dificultad. En español conviene conservar el tropo literal para no borrar la tensión semántica y cultural del pasaje.
  doctrine_reference: Preservar la dificultad textual y no resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'El registro inglés más reciente se mantuvo sin cambios, y el acuerdo de revisión fue alto. La versión española sigue esa línea estable: conserva el giro difícil «esposo de sangre», mantiene la causalidad explícita de la circuncisión y no introduce ampliaciones interpretativas no sustentadas por el hebreo ni por el audit trail.'
  spanish_consistency_notes:
  - Se usa «Entonces» para ambos אָז y el enlace narrativo inmediato.
  - Se prefiere «circuncisión» en singular en el texto principal por claridad, con nota sobre el plural hebreo.
  - Se conserva el tono sobrio y breve del hebreo, sin añadir sujetos explícitos innecesarios.
  - «Yahvé» no se inserta en el texto porque el hebreo usa pronombres; la identificación queda en nota para no sobreespecificar el verso.
