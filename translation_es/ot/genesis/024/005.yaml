translation:
  language: es
  text: 'Y el siervo le dijo: «Quizá la mujer no esté dispuesta a seguirme[a] a esta tierra. ¿Deberé entonces llevar de vuelta a tu hijo a la tierra de donde saliste?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ir detrás de mí», es decir, «seguirme».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el siervo
  alternatives_spanish:
  - el esclavo
  lexicon: HALOT
  rationale: עֶבֶד puede ser «siervo» o «esclavo». En esta escena narrativa, el vínculo de servicio dentro de la casa de Abraham es claro y en español «siervo» comunica con naturalidad la relación subordinada sin introducir una dureza que el contexto inmediato no enfatiza.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa una posibilidad incierta. «Quizá» mantiene un registro digno y directo, cercano al valor modal del hebreo.
- source_word: לֹא תֹאבֶה
  english_pob_choice: will not be willing
  chosen_spanish: no esté dispuesta
  alternatives_spanish:
  - no quiera
  - no consienta
  lexicon: HALOT
  rationale: אָבָה denota disposición o consentimiento. En español, «estar dispuesta» reproduce bien esa voluntad posible o ausente, y funciona naturalmente con el sujeto «la mujer».
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la joven
  - la futura esposa
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la mujer». No se amplía a «futura esposa» porque esa precisión no está en la forma verbal de esta frase, aunque el contexto narrativo la sugiera.
- source_word: לָלֶכֶת אַחֲרַי
  english_pob_choice: to follow me
  chosen_spanish: a seguirme
  alternatives_spanish:
  - a ir tras de mí
  - a venir conmigo
  lexicon: HALOT
  rationale: Literalmente es «ir detrás de mí». «Seguirme» es la equivalencia española más natural y conserva la idea de desplazamiento en pos del siervo.
- source_word: אֶל הָאָרֶץ הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a esta tierra
  - a este país
  lexicon: HALOT
  rationale: «Tierra» respeta bien el campo semántico de אֶרֶץ en el contexto patriarcal. «Esta tierra» además mantiene la referencia deíctica del hebreo.
- source_word: הֶהָשֵׁב אָשִׁיב
  english_pob_choice: Should I then take your son back
  chosen_spanish: ¿Haré entonces volver a tu hijo?
  alternatives_spanish:
  - ¿Debo entonces devolver a tu hijo?
  - ¿Lo haré volver entonces?
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto más verbo finito intensifica la acción de volver/traer de regreso. En español, una pregunta como «¿Haré entonces volver...?» conserva la fuerza deliberativa sin sobreinterpretar como obligación.
- source_word: אֶת בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - a tu hijo
  lexicon: HALOT
  rationale: Correspondencia directa y suficiente; no se requiere expansión.
- source_word: אֶל הָאָרֶץ אֲשֶׁר יָצָאתָ מִשָּׁם
  english_pob_choice: to the land from which you came
  chosen_spanish: a la tierra de donde saliste
  alternatives_spanish:
  - a la tierra de la que saliste
  - a la tierra de donde viniste
  lexicon: HALOT
  rationale: יָצָא significa «salir». «De donde saliste» conserva más de cerca la raíz verbal que la versión inglesa idiomática, y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'Se corrigió la relación entre notas y texto: los marcadores [a] y [b] aparecen ahora exactamente en el pasaje español. También se evitó introducir una obligación inexistente en la pregunta final, manteniendo el matiz interrogativo del hebreo y la revisión auditada del inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo «siervo» para הָעֶבֶד, coherente con el contexto narrativo y con la práctica POB de reservar «esclavo» para mayor fuerza léxica cuando procede.
  - Se prefirió «tierra» para אֶרֶץ por consistencia con el imaginario patriarcal y el audit trail en inglés.
  - Se eligió «seguirme» por equivalencia idiomática de לָלֶכֶת אַחֲרַי, sin perder la subordinación direccional del hebreo.
  - Se conservó el tono interrogativo de הֶהָשֵׁב אָשִׁיב sin convertirlo en mandato.
