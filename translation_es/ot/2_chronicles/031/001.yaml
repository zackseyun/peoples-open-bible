  to: Y cuando todo esto se terminó, todo Israel que se hallaba presente salió a las ciudades de Judá, y quebraron los pilares, cortaron los asherim[a], derribaron los lugares altos y los altares, por todo Judá y Benjamín, y en Efraín y Manasés, hasta destruirlos por completo. Entonces todos los hijos de Israel regresaron, cada hombre a su posesión, a sus ciudades.
