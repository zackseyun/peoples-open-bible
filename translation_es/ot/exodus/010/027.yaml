translation:
  language: es
  text: Pero Yahvé endureció el corazón de Faraón[a], y no quiso dejarlos ir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo firme» / «fortaleció». El verbo hebreo puede significar «fortalecer» o «hacer firme», pero aquí, con «corazón», expresa endurecimiento.
    reason: lexical_alternative
  - marker: b
    text: O «se negó a dejarlos ir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - hizo firme
  - fortaleció
  lexicon: HALOT
  rationale: El verbo חזק en este contexto formulaico de Éxodo, unido a «corazón», expresa endurecimiento de la disposición. «Endureció» conserva el valor idiomático y la tensión narrativa mejor que una traducción más literal como «fortaleció».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según la convención del proyecto, preservando el Tetragrámaton como nombre personal y no como título sustituido.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - voluntad
  lexicon: HALOT
  rationale: «Corazón» es el equivalente bíblico natural para לֵב y mantiene el modismo hebreo que abarca centro de decisión y disposición.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: «Faraón» es la forma española estándar del título/nombre en este contexto narrativo.
- source_word: לֹא אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto a
  - se negó a
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición. «No quiso» transmite bien la negativa de voluntad sin sobrecargar el verso con una formulación más explicativa.
- source_word: לְשַׁלְּחָם
  english_pob_choice: to let them go
  chosen_spanish: dejarlos ir
  alternatives_spanish:
  - enviarlos lejos
  - soltarlos
  lexicon: HALOT
  rationale: En el relato del éxodo, שׁלח aquí significa permitir su partida. «Dejarlos ir» es la opción española más idiomática y fiel al refrán narrativo.
theological_decisions:
- issue: Endurecimiento divino y voluntad humana
  english_pob_reading: The LORD hardened Pharaoh’s heart, and he was not willing to let them go.
  chosen_spanish_reading: Yahvé endureció el corazón de Faraón, y no quiso dejarlos ir.
  alternative_spanish_readings:
  - Yahvé hizo firme el corazón de Faraón, y se negó a dejarlos ir
  - Yahvé fortaleció el corazón de Faraón, y no estaba dispuesto a dejarlos ir
  rationale: La traducción conserva ambas afirmaciones sin resolver la tensión entre la acción divina y la negativa voluntaria de Faraón. «Endureció» refleja el valor contextual del verbo, mientras que «no quiso» mantiene la agencia de Faraón.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje se cotejó con el texto hebreo masorético y con el rastro de auditoría en inglés; no se introdujeron cambios revisionales adicionales, y se preservó la tensión entre la acción de Yahvé y la voluntad de Faraón.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para el nombre divino.
  - Se usó «corazón» para לֵב y «dejarlos ir» para לְשַׁלְּחָם, en línea con el refrán del Éxodo.
  - Se evitó resolver la relación entre el endurecimiento divino y la negativa de Faraón mediante una paráfrasis explicativa.
