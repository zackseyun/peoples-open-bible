translation:
  language: es
  text: Iré contra él cuando esté cansado y con las manos débiles[a], y lo haré entrar en pánico, de modo que toda la gente que está con él huirá; entonces golpearé al rey, a él solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «débil de manos», un modismo para fuerza o ánimo disminuidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָב֣וֹא עָלָ֗יו
  english_pob_choice: I will come upon him
  chosen_spanish: Yo entraré contra él
  alternatives_spanish:
  - Yo vendré sobre él
  - Yo caeré sobre él
  - Yo iré contra él
  lexicon: HALOT
  rationale: אָמַ/בוא con עַל puede expresar un acercamiento hostil. En español, «entrar contra él» comunica ese movimiento agresivo sin perder el valor verbal y evita una paráfrasis demasiado libre.
- source_word: יָגֵעַ
  english_pob_choice: weary
  chosen_spanish: cansado
  alternatives_spanish:
  - fatigado
  - agotado
  lexicon: HALOT
  rationale: El adjetivo describe desgaste físico. «Cansado» es claro y natural en español contemporáneo; «agotado» sería más intensivo y menos neutro.
- source_word: וּרְפֵה יָדַיִם
  english_pob_choice: weak-handed
  chosen_spanish: con las manos débiles
  alternatives_spanish:
  - de manos flacas
  - de manos flojas
  - sin fuerzas
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal de «manos débiles» para no borrar el modismo que señala fuerza disminuida o ánimo decaído. Se prefiere una construcción natural en español antes que un calco rígido.
- source_word: וְהַחֲרַדְתִּי אֹתוֹ
  english_pob_choice: I will throw him into panic
  chosen_spanish: lo haré entrar en pánico
  alternatives_spanish:
  - lo aterrorizaré
  - lo haré temblar
  - lo espantaré
  lexicon: HALOT
  rationale: 'El hifil de חרד es causativo: hacer temblar o sobresaltar. «Lo haré entrar en pánico» transmite bien el efecto causado en un registro moderno y comprensible, sin perder la fuerza del verbo.'
- source_word: וְנָס כָּל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: so that all the people who are with him will flee
  chosen_spanish: de modo que toda la gente que está con él huirá
  alternatives_spanish:
  - y toda la gente que está con él huirá
  - para que toda la gente que está con él huya
  lexicon: HALOT
  rationale: Aunque el hebreo coordina simplemente las acciones, el español gana claridad al expresar la relación de resultado con «de modo que». «La gente que está con él» conserva la relación personal de אֲשֶׁר אִתּוֹ.
- source_word: וְהִכֵּיתִי אֶת הַמֶּלֶךְ
  english_pob_choice: I will strike down the king
  chosen_spanish: golpearé al rey
  alternatives_spanish:
  - heriré al rey
  - abatiré al rey
  - mataré al rey
  lexicon: HALOT
  rationale: נכה puede significar golpear/smitar y, por el contexto, implicar un ataque letal. «Golpearé» conserva el verbo básico sin añadir explícitamente «mataré»; la conclusión violenta queda sugerida por el contexto.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por sí solo
  - él solo
  - aislado
  lexicon: HALOT
  rationale: «Solo» reproduce de forma concisa la idea de aislamiento del rey como objetivo único. Es la opción más natural y fiel en español.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y sin revisiones aplicadas; el borrador español sigue la misma lectura óptima, conservando el modismo de «manos débiles» y la relación de resultado en la segunda mitad del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se evita «Cristo» porque el término no aparece aquí.
  - Se conserva un registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - La única nota al pie marca el modismo hebreo para no ocultar la tensión léxica entre literalidad e idiomatismo.
