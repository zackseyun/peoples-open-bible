translation:
  language: es
  text: Pero cuando se retiraron rápidamente[a] y se abrió un espacio, él llegó al centro del patio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «se retiraron» también puede entenderse como «retrocedieron»; el griego describe un apartarse físico que dejó lugar libre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναποδισάντων
  english_pob_choice: drew back
  chosen_spanish: se retiraron
  alternatives_spanish:
  - retrocedieron
  - se echaron atrás
  - se replegaron
  lexicon: LSJ
  rationale: El participio describe un movimiento físico hacia atrás de los que estaban alrededor. En español, «se retiraron» comunica el gesto con naturalidad y sin cargarlo de un matiz militar más fuerte que el del contexto inmediato.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - velozmente
  - de inmediato
  - pronto
  lexicon: LSJ
  rationale: Adverbio de rapidez; «rápidamente» conserva la prontitud de la acción con español actual y claro.
- source_word: γενομένου διαστήματος
  english_pob_choice: a space opened up
  chosen_spanish: se abrió un espacio
  alternatives_spanish:
  - se formó un hueco
  - se abrió un intervalo
  - quedó un espacio libre
  lexicon: LSJ
  rationale: El genitivo absoluto expresa que, al apartarse la multitud, surgió separación o lugar libre. «Se abrió un espacio» reproduce bien la imagen sin forzar una construcción demasiado técnica.
- source_word: κατὰ μέσον
  english_pob_choice: into the middle
  chosen_spanish: hasta el centro
  alternatives_spanish:
  - al medio
  - en medio
  - hasta el medio
  lexicon: LSJ
  rationale: La idea es de avanzar hacia el punto central; «hasta el centro» es natural en español y mantiene el sentido direccional.
- source_word: κενεῶνα
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - patio abierto
  - corral
  - atrio
  lexicon: LSJ
  rationale: El término griego denota un espacio abierto interior del recinto. En español, «patio» comunica ese espacio de forma más natural y amplia que «patio abierto», sin perder la referencia arquitectónica.
translation_notes:
  revision_awareness: El texto griego coincide con el testimonio base proporcionado; la redacción española sigue la lectura inglesa auditada, pero ajusta «courtyard» a «patio» por naturalidad y precisión espacial en español. No se detectaron revisiones textuales relevantes en el paquete actual.
  spanish_consistency_notes:
  - Se mantiene «patio» para κενεών/κενεῶνα en este contexto espacial abierto.
  - Se conservó el movimiento direccional con «hasta el centro» para reflejar κατὰ μέσον sin sobreinterpretarlo.
