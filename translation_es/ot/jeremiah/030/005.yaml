translation:
  language: es
  text: 'Porque así dice Yahvé: «Hemos oído un sonido de estremecimiento[a], de miedo[b], y no hay paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una voz de estremecimiento»; el hebreo qol puede significar «sonido», «ruido» o «voz» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «terror» para «estremecimiento» y «pavor» para «miedo»; el hebreo empareja términos muy cercanos para intensificar la sensación de angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la cita profética y da base a lo que sigue; «Porque» conserva bien el valor explicativo/discursivo en español sin sobrecargar la causalidad.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» suena natural en español y mantiene el valor citacional presente del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, preservando el Tetragrámaton como nombre propio y no como un sustituto titular.
- source_word: קוֹל
  english_pob_choice: a sound
  chosen_spanish: una voz[a]
  alternatives_spanish:
  - un sonido[a]
  - un ruido[a]
  lexicon: HALOT
  rationale: El hebreo puede significar ‘voz’, ‘sonido’ o ‘ruido’. Dado el paralelismo y la personificación del estremecimiento, «voz» es posible; se mantiene la alternativa en nota porque el contexto también admite «sonido».
- source_word: חֲרָדָה
  english_pob_choice: trembling
  chosen_spanish: estremecimiento
  alternatives_spanish:
  - temblor
  - terror
  lexicon: HALOT
  rationale: «Estremecimiento» conserva la imagen corporal concreta de temblor/quebranto que el hebreo sugiere y funciona bien con el sustantivo siguiente. Se evita diluirlo en una abstracción como «ansiedad».
- source_word: שָׁמָעְנוּ
  english_pob_choice: We have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - oímos
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una percepción reportada con relevancia presente; «hemos oído» reproduce bien ese valor en español.
- source_word: פַּחַד
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  lexicon: HALOT
  rationale: El término cubre miedo/temor/pavor. «Miedo» es claro y directo en español; se deja abierta la posibilidad de una intensidad mayor en la nota.
- source_word: וְאֵין
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - pero no hay
  - ni hay
  lexicon: HALOT
  rationale: La coordinación y la negación existencial se reproducen de forma simple y fiel con «y no hay».
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: En contraste con miedo/estremecimiento, «paz» es la equivalencia más natural y sobria en español, manteniendo el alcance de calma, seguridad y bienestar que puede tener shalom en este contexto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el criterio doctrinal del proyecto para transliterar el nombre del pacto en lugar de ocultarlo tras un título. «Yahvé» es la forma estándar adoptada en español de esta serie.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y del control de revisión más reciente, que indica alta concordancia y sin cambios necesarios. La redacción española mantiene el paralelismo y la tensión léxica del hebreo sin simplificarla de más.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», coherente con el estándar del proyecto.
  - Se mantuvo una estructura de cita profética breve y directa, acorde con la fórmula hebrea.
  - «Paz» se emplea como equivalente principal de shalom en este contexto de contraste con temor y angustia.
