review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y la fuerza sexual explícita del hebreo, pero falla en un punto léxico importante: רָמָה en este contexto cultual debe conservarse como ''lugar alto'' o equivalente, no ''altura'', porque ''altura'' debilita y oscurece el sentido idolátrico documentado en el POB. Además, la nota b está mal anclada y no corresponde al sintagma traducido en el texto; la alternativa correcta pertenece a ''tu prostitución'', no a ''tu belleza''.'
  spanish_quality_summary: El español es en general claro y natural. 'Hiciste detestable tu belleza', 'abriste tus piernas' y 'multiplicaste tu prostitución' son idiomáticos y fieles al tono del original. 'En cada encrucijada de camino' suena algo rígido; 'en cada cruce de caminos' o 'en cada encrucijada' sería más natural, pero no es un error grave. El problema principal de legibilidad/fidelidad es 'tu altura', que en español no comunica de forma suficiente un sitio cultual.
  glossary_alignment: Cumple bien con la política de lenguaje sexual directo y con 'prostitución' para תַּזְנוּתֵךְ. No hay términos del glosario mayor en juego como Yahvé/Mesías. Sin embargo, se aparta de la decisión léxica auditada para רָמָה ('high place') al usar 'altura' en vez de una forma española que preserve el valor cultual, preferiblemente 'lugar alto'.
  issues:
  - severity: high
    issue: רָמָה fue traducido como 'tu altura'
    rationale: En Ezequiel 16 el término se refiere a un sitio cultual elevado/'high place'. 'Altura' conserva solo la idea espacial y pierde el sentido idolátrico que el English POB preservó deliberadamente.
  - severity: medium
    issue: La nota b no corresponde al segmento anotado
    rationale: En el texto el marcador [b] está en 'belleza', pero la nota dice 'O multiplicaste tu prostitución', que es una alternativa para la cláusula final, no para 'tu belleza'. Esto rompe la trazabilidad del aparato de notas.
  - severity: low
    issue: '''En cada encrucijada de camino'' suena menos natural que otras opciones españolas'
    rationale: Aunque es comprensible y fiel al sentido de cruce/junción, 'en cada cruce de caminos' fluye mejor en español general. No obstante, el borrador no necesita adjudicación difícil para corregirlo.
  revised_spanish_text: En cada cruce de caminos edificaste tu lugar alto[a], e hiciste detestable tu belleza. Abriste tus piernas a todo transeúnte y multiplicaste tu prostitución[b].
  revised_footnotes:
  - marker: a
    text: O 'en cada cabeza del camino'; es decir, en cada cruce o encrucijada de caminos.
    reason: lexical_alternative
  - marker: b
    text: O 'multiplicaste tu prostituirte' no es adecuado en español; otra opción más literal y fuerte sería 'multiplicaste tu prostitución' o 'multiplicaste tu prostituirte/tu ramera conducta', según estilo. También puede expresarse como 'multiplicaste tu fornicación', aunque es menos natural hoy.
    reason: lexical_alternative
  revision_rationale: Se revisa 'tu altura' a 'tu lugar alto' para preservar el sentido cultual de רָמָה conforme al expediente léxico del POB. Se mejora 'encrucijada de camino' a 'cruce de caminos' por naturalidad. Se corrige el aparato de notas para que cada marcador corresponda al segmento correcto; se elimina el anclaje erróneo sobre 'belleza' y se coloca la nota alternativa en la cláusula final.
