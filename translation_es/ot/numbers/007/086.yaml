  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés: doce recipientes de oro, llenos de incienso, con peso distributivo de diez siclos cada uno según el siclo del santuario, para un total de ciento veinte siclos de oro. La nota léxica sobre כַּפּוֹת también preserva las alternativas documentadas.'
  spanish_quality_summary: El español es claro y natural, pero «platos» puede sonar demasiado doméstico o plano en contexto cultual. «Cuencos» comunica mejor un pequeño vaso/recipiente para incienso y además ya aparece como alternativa documentada. También conviene suavizar «fue de» a «era de» o reformular para una suma de peso más idiomática.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Siclo del santuario» y «incienso» están bien alineados. La única mejora léxica recomendada es usar «cuencos» en lugar de «platos» para כַּפּוֹת, manteniendo la nota con alternativas como «recipientes», «platos» y la tradicional «cucharas».
  issues:
  - severity: medium
    issue: «Platos» para כַּפּוֹת puede resultar demasiado doméstico y menos preciso en un contexto cultual.
    rationale: El audit trail inglés eligió «dishes» por naturalidad en inglés, pero en español bíblico y general «cuencos» o «recipientes» refleja mejor un vaso para incienso. «Plato» sugiere más una vajilla llana.
  - severity: low
    issue: «todo el oro de los platos fue de ciento veinte siclos» es entendible, pero algo rígido.
    rationale: Para una suma de peso, «el total del oro de los cuencos era de ciento veinte siclos» o «todo el oro de los cuencos era...» suena más idiomático sin alterar el sentido.
