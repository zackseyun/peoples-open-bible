  glossary_alignment: No hay conflictos con la glosa del proyecto en nombres divinos o títulos, salvo que en la nota alternativa griega debe mantenerse «el Señor» porque cita κύριον en la tradición griega y no el Tetragrámaton hebreo de este verso. «Prudente», «ara», «buey» y «asno» están bien alineados con las decisiones auditadas.
