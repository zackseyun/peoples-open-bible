translation:
  language: es
  text: 'Pero el Señor le dijo: «Ahora ustedes, los fariseos, limpian por fuera la copa y el plato, pero por dentro están llenos de codicia[a] y de maldad.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «robo», «despojo» o «extorsión».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el amo
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el título reverencial y cristológico habitual para κύριος en el Nuevo Testamento. En español, «el Señor» transmite la misma dignidad y es idiomático en este contexto de reprensión directa de Jesús.
- source_word: Νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - En este momento
  lexicon: BDAG
  rationale: Como marcador discursivo que introduce la censura de Jesús, «Ahora» suena natural en español y mantiene el tono de confrontación inmediata.
- source_word: ὑμεῖς οἱ Φαρισαῖοι
  english_pob_choice: you Pharisees
  chosen_spanish: ustedes, los fariseos
  alternatives_spanish:
  - ustedes fariseos
  - ustedes, fariseos
  lexicon: BDAG
  rationale: El pronombre plural enfático y el sustantivo colectivo se expresan con naturalidad en español mediante la aposición «ustedes, los fariseos». Se preserva el énfasis sin endurecer innecesariamente la sintaxis.
- source_word: τὸ ἔξωθεν
  english_pob_choice: the outside
  chosen_spanish: lo de fuera
  alternatives_spanish:
  - el exterior
  - la parte exterior
  lexicon: BDAG
  rationale: El adverbio sustantivado ἔξωθεν pide una formulación flexible. «Lo de fuera» conserva la oposición con «dentro» y evita una rigidez poco natural en español.
- source_word: τοῦ ποτηρίου καὶ τοῦ πίνακος
  english_pob_choice: of the cup and the dish
  chosen_spanish: de la copa y del plato
  alternatives_spanish:
  - de la copa y del vaso
  - de la copa y de la fuente
  lexicon: BDAG
  rationale: ποτήριον se vierte bien como «copa» en este contexto de mesa, y πίναξ como «plato» es claro para lectores actuales. Se mantiene la imagen doméstica sin exagerar la especificidad del utensilio.
- source_word: καθαρίζετε
  english_pob_choice: clean
  chosen_spanish: limpian
  alternatives_spanish:
  - limpian cuidadosamente
  - purifican
  lexicon: BDAG
  rationale: «Limpian» reproduce la acción concreta y la repetición habitual implícita en el presente. Se evita «purifican» porque añadiría un matiz ritual no explicitado por el verbo.
- source_word: τὸ δὲ ἔσωθεν ὑμῶν
  english_pob_choice: inside you
  chosen_spanish: dentro
  alternatives_spanish:
  - por dentro
  - en su interior
  lexicon: BDAG
  rationale: Se conserva la contraposición espacial con lo externo sin especificar una facultad psicológica como «corazón». «Dentro» mantiene el paralelo con el lavado exterior y deja abierta la metáfora moral.
- source_word: γέμει
  english_pob_choice: is full of
  chosen_spanish: están llenos de
  alternatives_spanish:
  - está lleno de
  - rebosan de
  lexicon: BDAG
  rationale: Aunque el griego es singular, en español la referencia recae en el grupo interpelado, por lo que «están llenos» fluye de manera natural. Conserva la idea de plenitud moral en contraste con la limpieza externa.
- source_word: ἁρπαγῆς
  english_pob_choice: greed
  chosen_spanish: rapacidad
  alternatives_spanish:
  - codicia
  - robo
  - extorsión
  lexicon: BDAG
  rationale: ἁρπαγή admite el campo de saqueo, despojo, robo o exacción. «Rapacidad» preserva la fuerza de una disposición depredadora y deja visible la tensión lexical que la versión inglesa resolvió con «greed».
- source_word: πονηρίας
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad moral
  - malicia
  - perversidad
  lexicon: BDAG
  rationale: «Maldad» expresa el alcance general del término y funciona bien en paralelo con «rapacidad». Se evita un término más interpretativo que estrecharía la amplitud moral del sustantivo.
theological_decisions:
- issue: Contraste entre limpieza exterior e impureza interior
  english_pob_reading: Retain the metaphor as a contrast between external cleansing and inner corruption without specifying a psychological faculty.
  chosen_spanish_reading: Mantener el contraste entre lo exterior y lo interior, sin añadir «corazón» ni otra facultad específica.
  alternative_spanish_readings:
  - vuestra corazón está lleno de rapacidad y maldad
  - su interior está lleno de rapacidad y maldad
  rationale: El texto griego contrapone deliberadamente la limpieza de los objetos con la condición interior de los fariseos. En español, conservar «dentro» evita interpretar más de la cuenta y mantiene la fuerza retórica de la acusación.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido moral de ἁρπαγή
  english_pob_reading: Render as 'greed' in the main text, with concrete alternatives footnoted.
  chosen_spanish_reading: Renderizar como «rapacidad» en el cuerpo del texto, con alternativas léxicas en nota.
  alternative_spanish_readings:
  - codicia
  - robo
  - extorsión
  - despojo
  rationale: En este contexto Jesús denuncia una disposición interior depredadora, no solo un acto aislado de hurto. «Rapacidad» conserva mejor la amplitud de ἁρπαγή y mantiene la tensión entre el valor moral general y la posibilidad de actos concretos de despojo.
  doctrine_reference: Translation philosophy §5
- issue: Relación entre κύριος y la voz de Jesús
  english_pob_reading: The Lord said to him
  chosen_spanish_reading: «El Señor le dijo»
  alternative_spanish_readings:
  - «El Maestro le dijo»
  - «El amo le dijo»
  rationale: En este relato, κύριος funciona como título de Jesús y no como simple cortesía. «El Señor» es la forma más fiel y reconocible en español para preservar la referencia cristológica sin perder naturalidad.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El español sigue la última revisión inglesa en mantener el contraste entre lo exterior y lo interior, evitando una especificación psicológica. También evita trasladar mecánicamente «your inside is full»; en su lugar, usa una estructura española natural («dentro están llenos») sin perder el juicio moral ni la imagen espacial. La opción léxica principal para ἁρπαγή se ha ajustado a «rapacidad» para reflejar mejor su fuerza depredadora, mientras la nota conserva el rango semántico alternativo documentado por la POB inglesa.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος conforme al uso POB en NT y la designación de Jesús en el contexto.
  - Se prefirió «lo de fuera / dentro» para preservar la antítesis espacial del pasaje.
  - Se mantuvo un registro digno y contemporáneo, evitando arcaísmos innecesarios.
  - La nota al pie se ancla en «rapacidad» porque ahí se concentra la decisión léxica más discutible del verso.
