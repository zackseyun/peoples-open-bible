translation:
  text: 1 And as I was going to my father[a], I found a bronze shield; therefore the name of the mountain is Aspis, which is near Gebal, on the right of Abim. 2 And I kept these words in my heart. 3 After this I took counsel with my father and with Reuben, that he should tell the sons of Emmor not to circumcise themselves, because I was zealous on account of the abomination which they had committed against my sister. 4 And I killed Shechem first, and Simeon killed Emmor. 5 And after this my brothers came and struck that city with the edge of the sword. 6 And my father heard these things, and being angry he was grieved because they had accepted circumcision and died, and in his blessings he passed over us. 7 For we sinned, because we had done this contrary to his judgment, though he became weak on that day. 8 But I saw that it was a decree of God for evil against them, because they intended to do to Sarah and Rebekah as they had done to Dinah our sister; and the Lord restrained them. 9 And they pursued Abraham our father when he was a stranger, and they oppressed his flocks when they were swollen with increase, and they cruelly mistreated Eblan his home-born servant. 10 And indeed in this way they used to act toward all strangers, seizing foreign women by force and driving them away[b][c][d][e]. 11 But the wrath of God came upon them completely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he overlooked us in the blessings,' that is, Jacob did not favor Levi and Simeon when he pronounced blessings.
    reason: lexical_alternative
    anchor_ref: '6:6'
  - marker: e
    text: The Greek verb rendered 'became weak' is difficult and may suggest that Jacob was softened, weakened, or overcome on that day.
    reason: textual_variant
    anchor_ref: '6:7'
  - marker: d
    text: This verse is textually difficult. The Greek appears to say that the men of Shechem intended to treat Sarah and Rebekah as they had treated Dinah.
    reason: textual_variant
    anchor_ref: '6:8'
  - marker: c
    text: The name 'Eblan' is uncertain in transmission; the sense is that a household-born servant of Abraham was harshly abused.
    reason: textual_variant
    anchor_ref: '6:9'
  - marker: b
    text: Compare the idiom 'wrath ... to the end' for complete or final judgment.
    reason: cross_reference
    anchor_ref: '6:11'
lexical_decisions:
- source_word: ἀσπίδα χαλκῆν
  chosen: a bronze shield
  alternatives:
  - a brazen shield
  - a bronze buckler
  lexicon: LSJ
  rationale: ἀσπίς ordinarily denotes a shield; χαλκῆν specifies bronze/copper alloy. 'Bronze shield' is clear modern English and preserves the etiological link to the place-name Aspis.
- source_word: συνετήρουν ... ἐν τῇ καρδίᾳ μου
  chosen: I kept ... in my heart
  alternatives:
  - I treasured ... in my heart
  - I preserved ... in my heart
  lexicon: LSJ
  rationale: A standard idiom for inwardly retaining words. 'Kept in my heart' preserves the elevated testamentary tone without sounding archaic.
- source_word: συνεβούλευσα
  chosen: I took counsel
  alternatives:
  - I consulted
  - I deliberated
  lexicon: LSJ
  rationale: The verb implies deliberate consultation. 'Took counsel' fits the formal narrative register better than the flatter 'consulted.'
- source_word: μὴ περιτμηθῆναι αὐτούς
  chosen: not to circumcise themselves
  alternatives:
  - not to be circumcised
  - that they should not undergo circumcision
  lexicon: LSJ
  rationale: The infinitive construction here is best rendered as their refraining from circumcision. The middle/passive nuance is naturally expressed in English as 'circumcise themselves' in this context.
- source_word: ἐζήλωσα
  chosen: I was zealous
  alternatives:
  - I was jealous
  - I burned with zeal
  lexicon: LSJ
  rationale: In context Levi speaks of fervent indignation over sexual outrage, not envy. 'Was zealous' preserves the moral intensity without over-paraphrase.
- source_word: βδέλυγμα
  chosen: abomination
  alternatives:
  - detestable thing
  - outrage
  lexicon: LSJ
  rationale: A morally charged term. 'Abomination' keeps the strong ethical and cultic disgust conveyed by the Greek.
- source_word: ἐν στόματι μαχαίρας
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  lexicon: LSJ
  rationale: This is a conventional Semitic/Greek idiom. 'With the edge of the sword' is the natural English equivalent while preserving the force of the expression.
- source_word: παρεῖδεν ἡμῖν
  chosen: he passed over us
  alternatives:
  - he overlooked us
  - he disregarded us
  lexicon: LSJ
  rationale: In context of Jacob's blessings, the sense is that he did not favor or attend to Levi and Simeon. 'Passed over us' preserves the solemn tone and avoids colloquial flattening.
- source_word: παρὰ γνώμην αὐτοῦ
  chosen: contrary to his judgment
  alternatives:
  - against his will
  - contrary to his opinion
  lexicon: LSJ
  rationale: γνώμη here is more than mere opinion; it is considered judgment or decision. This suits the patriarchal authority context.
- source_word: ἐμαλακίσθη
  chosen: he became weak
  alternatives:
  - he was softened
  - he grew faint
  lexicon: LSJ
  rationale: The verb is textually difficult, but the likely sense is weakening or loss of resolve/strength. 'Became weak' is transparent and restrained.
- source_word: ἀπόφασις θεοῦ
  chosen: a decree of God
  alternatives:
  - God's decision
  - a divine sentence
  lexicon: LSJ
  rationale: ἀπόφασις conveys a determined decision or pronouncement. 'Decree of God' preserves the judicial and providential force.
- source_word: εἰς κακά
  chosen: for evil against them
  alternatives:
  - for their harm
  - for calamity
  lexicon: LSJ
  rationale: The phrase indicates adverse judgment falling on the Shechemites. 'For evil against them' keeps the starkness of the Greek while clarifying direction.
- source_word: ἐκώλυσεν
  chosen: restrained
  alternatives:
  - prevented
  - hindered
  lexicon: LSJ
  rationale: The Lord's action is preventative. 'Restrained' fits the moral context and reads with dignified force.
- source_word: οἰκογενῆ
  chosen: home-born servant
  alternatives:
  - house-born servant
  - member of his household
  lexicon: LSJ
  rationale: The term denotes one born in the household. 'Home-born servant' is concise and preserves the social nuance.
- source_word: ἐν δυναστείᾳ ἁρπάζοντες
  chosen: seizing ... by force
  alternatives:
  - snatching ... in their power
  - taking ... violently
  lexicon: LSJ
  rationale: The phrase emphasizes oppressive power and violent taking. 'By force' captures the coercive element clearly.
- source_word: τὰς ξένας
  chosen: their women
  alternatives:
  - foreign women
  - the women of strangers
  lexicon: LSJ
  rationale: The feminine plural likely refers to women belonging to the stranger-group just mentioned. 'Their women' makes the referent clear in English.
- source_word: ἔφθασε ... εἰς τέλος
  chosen: came upon them completely
  alternatives:
  - overtook them to the uttermost
  - reached them at last
  lexicon: LSJ
  rationale: The idiom conveys wrath arriving fully or finally. 'Came upon them completely' is idiomatic and preserves the sense of total judgment.
