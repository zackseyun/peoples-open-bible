base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/003/021.yaml
  text: And in these matters[a], after making known to all their fellow countrymen our lack of resentment, and because of the alliance and the countless matters entrusted to them from the beginning in good faith, we decided to alter their status and deem them worthy of Alexandrian citizenship[b], and to appoint them as sharers in the things of the sanctuary.
  footnotes:
  - marker: a
    text: Or 'our forbearance' or 'our freedom from grudges'; the Greek term denotes not holding wrongs against someone.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the things of the sanctuary'; this may refer broadly to sacred privileges or responsibilities connected with the temple.
    reason: lexical_alternative
