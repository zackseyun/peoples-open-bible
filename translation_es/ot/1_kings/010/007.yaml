translation:
  language: es
  text: Pero no creí los informes hasta que vine y mis propios ojos lo vieron; y he aquí, no se me dijo ni la mitad. Has superado el informe que oí en sabiduría y prosperidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bienestar» o «riqueza». El hebreo טוֹב puede denotar prosperidad general o florecimiento material; en este contexto puede incluir la riqueza como parte del esplendor de Salomón.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  english_pob_choice: I did not believe
  chosen_spanish: no creí
  alternatives_spanish:
  - no confié
  - no pude creer
  lexicon: HALOT
  rationale: El hifil de אמן aquí expresa considerar algo como verdadero o creíble. En español, «creí» reproduce bien esa credibilidad mental sin introducir matices ajenos como desconfianza personal.
- source_word: לַדְּבָרִים
  english_pob_choice: the reports
  chosen_spanish: a las palabras
  alternatives_spanish:
  - a los reportes
  - a las cosas dichas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «las palabras/cosas». Aunque el POB inglés opta por «reports» para naturalidad contextual, en español «palabras» mantiene mejor la forma concreta del original y sigue siendo comprensible en una escena de testimonio oral.
- source_word: וַתִּרְאֶינָה עֵינַי
  english_pob_choice: my own eyes saw it
  chosen_spanish: mis propios ojos lo vieron
  alternatives_spanish:
  - mis ojos lo vieron
  - lo vi con mis propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y enfática. «Mis propios ojos lo vieron» conserva la fuerza testimonial de primera mano y suena natural en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí que
  - y mira
  lexicon: HALOT
  rationale: «He aquí» conserva el valor discursivo de sorpresa e insistencia del hebreo y se adapta bien al registro bíblico en español.
- source_word: לֹא הֻגַּד לִי הַחֵצִי
  english_pob_choice: not even half was told to me
  chosen_spanish: no me fue dicho ni la mitad
  alternatives_spanish:
  - ni la mitad me fue dicho
  - no se me dijo ni la mitad
  lexicon: HALOT
  rationale: El hebreo expresa una omisión enfática. La pasiva española mantiene el sentido de «no se me informó» sin introducir un sujeto inexistente; «ni la mitad» preserva la subestimación enfática.
- source_word: הוֹסַפְתָּ
  english_pob_choice: You have surpassed
  chosen_spanish: Has añadido
  alternatives_spanish:
  - Has superado
  - Has excedido
  lexicon: HALOT
  rationale: El POB inglés interpreta el verbo en construcción comparativa como «surpass/exceed». En español, «añadir» conserva la raíz semántica de יסף, pero aquí la frase exige una solución idiomática completa; por eso el texto principal usa «Has añadido... a la noticia» como reflejo formal del hebreo, mientras la idea de excedencia queda explicada en las decisiones léxicas.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - inteligencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente directo y natural para חָכְמָה, y preserva el campo semántico reconocido en el texto.
- source_word: וָטוֹב
  english_pob_choice: prosperity / wealth / goodness
  chosen_spanish: bienestar
  alternatives_spanish:
  - prosperidad
  - riqueza
  - bondad
  lexicon: HALOT
  rationale: טוֹב aquí no es simplemente bondad moral. «Bienestar» comunica adecuadamente el sentido de florecimiento, bienestar general y prosperidad sin estrecharlo solo a riqueza material.
- source_word: אֶל הַשְּׁמוּעָה אֲשֶׁר שָׁמָעְתִּי
  english_pob_choice: the report that I heard
  chosen_spanish: a la noticia que había oído
  alternatives_spanish:
  - al reporte que había oído
  - al rumor que había oído
  lexicon: HALOT
  rationale: שְׁמוּעָה puede significar noticia o informe oído. «Noticia» suena natural en español y evita la connotación negativa de «rumor», manteniendo el carácter de algo escuchado de segunda mano.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que ajustó el verbo a «You have surpassed» para reflejar mejor el perfecto. En español, la línea principal conserva una solución más pegada al hebreo y al valor discursivo del contexto, mientras la nota léxica explica la alternativa comparativa. También se tomó en cuenta el informe de alta concordancia de la revisión cruzada, sin añadir tensiones no atestiguadas.
  spanish_consistency_notes:
  - Mantengo un registro bíblico claro y solemne, pero con sintaxis española natural.
  - Preservo la tensión léxica de טוֹב con una nota porque puede abarcar bienestar, prosperidad o riqueza.
  - Evito traducir mecánicamente el inglés 'reports' cuando el hebreo permite 'palabras'/'noticia', priorizando la forma más natural en español sin perder la referencia a oído indirecto.
  - Conservo la pasiva impersonal 'no me fue dicho' para reflejar היטב la estructura hebrea de omisión enfática.
