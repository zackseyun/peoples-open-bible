translation:
  language: es
  text: Cuando Ezequías y los oficiales llegaron y vieron los montones[a], bendijeron a Yahvé y a su pueblo Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las pilas'. El sustantivo hebreo se refiere a acumulaciones o montones; aquí probablemente de productos u ofrendas reunidas.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente 'su pueblo, Israel', si 'su' se toma como referido a Ezequías y no a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא se expresa con naturalidad en español como 'llegaron'; comunica la entrada o llegada al lugar donde estaban los montones sin forzar un calco.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hezekías
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española bíblica establecida 'Ezequías', transparente y reconocible para lectores en español.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los gobernantes
  lexicon: HALOT
  rationale: שָׂרִים designa líderes o funcionarios; 'oficiales' conserva el matiz administrativo y evita el arcaísmo de 'príncipes'.
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaron
  - miraron
  lexicon: HALOT
  rationale: ראה aquí es percepción visual directa; 'vieron' es la equivalencia más simple y fiel.
- source_word: הָעֲרֵמוֹת
  english_pob_choice: the heaps
  chosen_spanish: los montones
  alternatives_spanish:
  - los montones apilados
  - las pilas
  lexicon: HALOT
  rationale: El sustantivo denota acumulaciones o montones; 'montones' preserva la imagen concreta y resulta natural en español. 'Heaps' puede ser 'montones' o 'montones apilados', y no exige el tecnicismo 'pilas'.
- source_word: וַיְבָרֲכוּ
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - bendecían
  lexicon: HALOT
  rationale: ברך con Dios como objeto suele significar pronunciar bendición/alabanza; 'bendijeron' mantiene el vínculo léxico bíblico sin necesidad de parafrasear.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: Tetragrámaton
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: ''Yahvé'', transliteración del Tetragrámaton, en lugar de sustituirlo por ''SEÑOR''.'
- source_word: עַמּוֹ יִשְׂרָאֵל
  english_pob_choice: his people Israel
  chosen_spanish: su pueblo Israel
  alternatives_spanish:
  - su pueblo, Israel
  - Israel, su pueblo
  lexicon: HALOT
  rationale: La construcción se mantiene con el pronombre 'su' para reflejar la relación posesiva del hebreo; en español es la forma más directa y fiel.
theological_decisions:
- issue: Referente del sufijo posesivo en 'su pueblo'
  english_pob_reading: 'The suffix refers to the LORD: ''his people Israel.'''
  chosen_spanish_reading: 'El sufijo se entiende, en lectura principal, como referido a Yahvé: ''su pueblo Israel''.'
  alternative_spanish_readings:
  - 'El sufijo podría referirse a Ezequías: ''su pueblo, Israel''.'
  rationale: El contexto inmediato une a Yahvé con Israel como su pueblo de pacto, y esa es la lectura más natural. Aun así, el hebreo permite de manera remota una referencia al rey; por eso la redacción conserva la ambigüedad mínima con 'su'.
  doctrine_reference: Preservar la tensión textual cuando la referencia pronominal es genuinamente ambigua, sin borrar la lectura de pacto más probable.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro auditado en inglés, manteniendo la imagen concreta de los montones y la ambigüedad del posesivo en 'su pueblo' sin resolverla de manera artificial.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se prefiere 'Ezequías' como forma española establecida del nombre.
  - '''Oficiales'' refleja el valor administrativo de שָׂרִים en este contexto.'
  - La puntuación y los posesivos siguen el orden natural del español sin alterar la relación sintáctica del hebreo.
