translation:
  language: es
  text: Proclámenlo y presenten su caso[a]; sí, consulten juntos. ¿Quién anunció esto desde antiguo? ¿Quién lo dio a conocer desde hace mucho? ¿No fui yo, Yahvé? No hay otro Dios fuera de mí, un Dios justo y Salvador[c][b]; no hay ninguno fuera de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «acérquenlo» / «preséntenlo»; el hebreo probablemente tiene un sentido de tribunal: «presenten su caso».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: יְהוָה; tradicionalmente se traduce «SEÑOR».'
    reason: lexical_alternative
  - marker: c
    text: O «un Dios justo y un Salvador».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare it
  chosen_spanish: Proclámenlo
  alternatives_spanish:
  - Declárenlo
  - Díganlo
  lexicon: HALOT
  rationale: El imperativo plural de נגד tiene aquí tono público y formal; en español, «proclámenlo» conserva mejor esa solemnidad que un simple «díganlo».
- source_word: וְהַגִּישׁוּ
  english_pob_choice: present your case
  chosen_spanish: presenten su caso
  alternatives_spanish:
  - presenten su alegato
  - acérquenlo
  lexicon: HALOT
  rationale: El verbo hiphil de נגשׁ en este contexto sugiere un marco forense o de disputa. «Presenten su caso» sigue la fuerza jurídica sin sonar demasiado literal en español.
- source_word: אַף יִוָּעֲצוּ יַחְדָּו
  english_pob_choice: indeed, let them consult together
  chosen_spanish: sí, consulten juntos
  alternatives_spanish:
  - ciertamente, deliberen juntos
  - aun, deliberen juntos
  lexicon: HALOT
  rationale: La partícula refuerza la invitación desafiante a deliberar. «Consulten juntos» / «deliberen juntos» preservan la acción colectiva; «sí» conserva el énfasis de אַף en un español natural.
- source_word: מִי הִשְׁמִיעַ זֹאת
  english_pob_choice: Who announced this
  chosen_spanish: ¿Quién anunció esto
  alternatives_spanish:
  - ¿Quién dio a conocer esto?
  - ¿Quién proclamó esto?
  lexicon: HALOT
  rationale: El idiomático הִשְׁמִיעַ pide una idea de hacer conocer o proclamar; «anunció» es claro y idiomático en español.
- source_word: מִקֶּדֶם
  english_pob_choice: from long ago
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde hace mucho
  - desde tiempos antiguos
  lexicon: HALOT
  rationale: La expresión temporal señala gran antigüedad. «Desde antiguo» es una forma breve y bíblica en español, sin sonar arcaica de más.
- source_word: מֵאָז הִגִּידָהּ
  english_pob_choice: Who declared it from former times
  chosen_spanish: ¿Quién lo dio a conocer desde entonces?
  alternatives_spanish:
  - ¿Quién lo declaró desde tiempos pasados?
  - ¿Quién lo anunció desde entonces?
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la pregunta anterior. «Desde entonces» refleja מאז en relación con un punto de referencia pasado; «dio a conocer» conserva la fuerza de hacer saber.
- source_word: הֲלוֹא אֲנִי יְהוָה
  english_pob_choice: Was it not I, Yahweh?
  chosen_spanish: ¿No soy yo, Yahvé?
  alternatives_spanish:
  - ¿No fui yo, Yahvé?
  - ¿No soy yo, Yahveh?
  lexicon: HALOT
  rationale: El texto hebreo presenta una pregunta retórica de identificación divina. Se usa «Yahvé» por la convención del proyecto para יְהוָה, manteniendo el nombre propio del pacto.
- source_word: וְאֵין עוֹד אֱלֹהִים מִבַּלְעָדַי
  english_pob_choice: There is no other God besides me
  chosen_spanish: No hay otro Dios fuera de mí
  alternatives_spanish:
  - No existe ningún otro Dios además de mí
  - No hay Dios aparte de mí
  lexicon: HALOT
  rationale: La fórmula de exclusividad divina se expresa naturalmente en español con «fuera de mí», que comunica bien la exclusión de otros dioses.
- source_word: אֵל צַדִּיק
  english_pob_choice: a righteous God
  chosen_spanish: Dios justo
  alternatives_spanish:
  - Dios recto
  - Dios justo y recto
  lexicon: HALOT
  rationale: צַדִּיק admite «justo» o «recto/righteous». Aquí «justo» suena más directo en español y mantiene la tensión legal-moral del pasaje.
- source_word: וּמוֹשִׁיעַ
  english_pob_choice: and a Savior
  chosen_spanish: y salvador
  alternatives_spanish:
  - y un salvador
  - y quien salva
  lexicon: HALOT
  rationale: El participio expresa uno que salva; en español, «salvador» es conciso y fiel. Se omite el artículo para ajustar la aposición al español bíblico.
- source_word: אַיִן זוּלָתִי
  english_pob_choice: there is none except me
  chosen_spanish: no hay ninguno fuera de mí
  alternatives_spanish:
  - no hay nadie excepto yo
  - no hay otro fuera de mí
  lexicon: HALOT
  rationale: La segunda cláusula de exclusividad refuerza la anterior. «No hay ninguno fuera de mí» conserva el énfasis absoluto de אַיִן זוּלָתִי.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto en el texto principal y evitando el ocultamiento con mayúsculas convencionales.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Atributo de צַדִּיק aplicado a Dios
  english_pob_reading: righteous God
  chosen_spanish_reading: Dios justo
  alternative_spanish_readings:
  - Dios recto
  - Dios justo y recto
  rationale: En español, «justo» transmite bien la dimensión moral y judicial del término y mantiene la ambigüedad válida entre justicia forense y rectitud ética.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5; Contested terms analogy on δικαιοσύνη'
translation_notes:
  revision_awareness: El borrador sigue de cerca el cierre del último pase, que fue marcado como unchanged y con alta concordancia; no se aplicaron revisiones adicionales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conservó la estructura retórica de dos preguntas sobre el anuncio desde antiguo y desde entonces.
  - «Dios justo» y «salvador» se dejaron en aposición, como en el hebreo, sin expandir el sentido más allá del texto.
  - El registro es formal y bíblico, pero con sintaxis natural para español latinoamericano.
