lexical_decisions:
- source_word: ⲙⲁⲉⲓⲧ
  chosen: form
  alternatives:
  - shape
  - image
  lexicon: Crum, Coptic Dictionary; Layton, Coptic Grammar (glossary)
  rationale: ⲙⲁⲉⲓⲧ regularly denotes outward shape/form. In this metaphysical context
    the best English equivalent preserving technical nuance is “form.”
- source_word: ⲡⲉⲡⲓⲣⲏⲧⲉ
  chosen: time
  alternatives:
  - appointed time
  - season
  lexicon: Crum; NH Coptic usage
  rationale: ⲡⲉⲡⲓⲣⲏⲧⲉ is the Coptic for Greek χρονός/‘time’ in many NH texts. “Time”
    is broad enough, with the nuance of appointment indicated in context elsewhere.
- source_word: ⲕⲁⲓⲣⲟⲥ
  chosen: season
  alternatives:
  - kairos (transliterated)
  - opportune time
  lexicon: Greek loan in Coptic; Crum
  rationale: As a Greek loan it carries the nuance of an appointed/critical season
    distinct from ordinary time. Rendering as “season” retains that nuance while remaining
    readable; the overlap fragment confirms its presence here.
- source_word: ⲡⲉⲧϣⲟⲟⲡ
  chosen: what exists
  alternatives:
  - what is
  - the existent
  lexicon: Crum
  rationale: ⲡⲉⲧϣⲟⲟⲡ is a relative form “that which is.” “What exists” preserves the
    ontological diction of the passage.
- source_word: ⲧⲙⲛⲧⲉⲩⲛⲟⲩ
  chosen: non‑being
  alternatives:
  - nothingness
  - nothing
  lexicon: Crum; philosophical usage in NH texts
  rationale: Valentinian discourse contrasts “those that are” with “non‑being.” “Non‑being”
    best preserves the metaphysical contrast without collapsing it into colloquial
    “nothing.”
- source_word: ⲕⲁⲣⲡⲟⲥ / ⲧⲏⲣϥ
  chosen: fruit
  alternatives:
  - produce
  - harvest
  lexicon: Greek loan ⲕⲁⲣⲡⲟⲥ; Crum (ⲧⲏⲣϥ as ‘fruit’)
  rationale: Both loan and native form occur; “fruit” is the consistent, transparent
    rendering for the metaphor running through the passage.
- source_word: ⲫⲁⲛⲧⲁⲥⲓⲁ
  chosen: phantasies
  alternatives:
  - fantasies
  - illusions
  lexicon: Greek loan; Crum
  rationale: Retaining the Greek loan as “phantasies” preserves the technical connotation
    of imagined appearances in Valentinian psychology; “illusions” is acceptable but
    less transparent to the source term.
- source_word: ⲡⲓⲱⲧ
  chosen: the Father
  alternatives:
  - Father
  lexicon: Crum
  rationale: Definite article is regularly retained with divine titles in Coptic.
    Rendering as “the Father” accords with the theological register.
- source_word: ⲛⲧⲟⲩϣⲏ
  chosen: they will dissolve
  alternatives:
  - they will pass away
  - they will perish
  lexicon: Crum
  rationale: ϣⲏ conveys melting/dissolving; “dissolve” keeps the vivid imagery of
    vanishing self‑assertions in the text.
- source_word: ⲡⲉⲉⲓ (as title)
  chosen: the One‑who‑is
  alternatives:
  - the One who is
  - the Existent One
  lexicon: Crum; NH usage
  rationale: Used as a quasi‑title for the source of being; “the One‑who‑is” preserves
    the titular force and ontological nuance.
technical_vocabulary_note: 'This section employs metaphysical diction central to Valentinian
  thought. We deliberately preserve: aeon (for the realm‑concept often rendered ‘age’),
  non‑being (for ⲧⲙⲛⲧⲉⲩⲛⲟⲩ), the One‑who‑is (as a titular rendering of ⲡⲉⲉⲓ), phantasies
  (for Greek loan ⲫⲁⲛⲧⲁⲥⲓⲁ), and fruit (ⲕⲁⲣⲡⲟⲥ/ⲧⲏⲣϥ). Where “kairos” appears, we render
  it as “season” to keep its appointed‑time nuance without obscuring it by transliteration.
  These choices guard the contemplative imagery and technical contrasts between being
  and non‑being, interior existence in the Father, and outward manifestation.'
textual_note: 'The OCR transcription of Codex I p.28 is fragmentary and unevenly spaced.
  The translation anchors to the following identifiable lexemes and clauses: (1) ⲙⲁⲉⲓⲧ
  (‘form’) with the clause ⲛ̄ⲛⲓⲙ ⲉⲧϣⲟⲟⲡ ϩⲱⲱϥ ϩⲙ̄ ⲡⲓⲱⲧ (‘of the things that are within
  him, in the Father’); (2) the temporal terms ⲡⲉⲡⲓⲣⲏⲧⲉ (‘time’) and the Greek loan
  ⲕⲁⲓⲣⲟⲥ; (3) the fruit metaphor with both ⲠⲔⲀⲢⲠⲞⲤ (‘karpos/fruit’) and ⲡⲧⲏⲣϥ (‘fruit’);
  (4) the dissolution verb ⲛⲧⲟⲩϣⲏ; and (5) the ontological contrast via ⲡⲉⲧϣⲟⲟⲡ (‘what
  exists’), ⲧⲙⲛⲧⲉⲩⲛⲟⲩ (‘non‑being’), and the titular ⲡⲉⲉⲓ (‘the One‑who‑is’). Some
  connective phrasing (e.g., “Do not, then, say…”) reflects the immediate context
  and the negative‑imperative construction visible in ⲁⲧⲣⲉ‑ forms in line with NH
  syntax, but exact particles are difficult to recover from the OCR. The rendering
  maintains the passage’s structure attested in parallel witnesses: latent existence
  in the Father, appointed manifestation, fruit that is not yet revealed, and the
  fate of self‑assertions that ‘have come to be.’'
