translation:
  language: es
  text: En Gat[a], no lo digan; en Bet-leafrá[c][b], revuélcate en el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No lloren en absoluto» o «No lloren». El hebreo es difícil.'
    reason: alternative_reading
  - marker: b
    text: Bet-leafrá probablemente suena como «casa de polvo», en paralelo con la palabra siguiente, «polvo».
    reason: cultural_note
  - marker: c
    text: La forma hebrea detrás de «revuélcate» está escrita como primera persona («me he revolcado») en el texto consonántico; muchos la entienden aquí como un imperativo por el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: בְּגַת
  english_pob_choice: In Gath
  chosen_spanish: En Gat
  alternatives_spanish:
  - En Gath
  lexicon: HALOT
  rationale: Es nombre propio de lugar; en español se translitera como «Gat». Mantengo la preposición local «En» por el valor natural de בְּ aquí.
- source_word: אַל תַּגִּידוּ
  english_pob_choice: do not tell it
  chosen_spanish: no lo digan
  alternatives_spanish:
  - no lo anuncien
  - no lo declaren
  lexicon: HALOT
  rationale: נגד en hifil significa decir, contar o declarar. «No lo digan» conserva la brevedad del mandato y el objeto implícito sin sobreexplicar.
- source_word: בָּכוֹ אַל תִּבְכּוּ
  english_pob_choice: in Beth-leaphrah / weep not at all
  chosen_spanish: no lo lloren
  alternatives_spanish:
  - no lloren en absoluto
  - no lloren amargamente
  - en Bet-leáfrá, no lloren
  lexicon: HALOT
  rationale: El hebreo es difícil y admite una lectura verbal enfática de prohibición. En español, «no lo lloren» comunica el sentido de no expresar lamento, pero el texto poético también mantiene la posibilidad de un juego de palabras en la nota. La lectura toponímica alternativa no se adopta en el texto principal porque el packet revisado favorece la prohibición verbal.
- source_word: בְּבֵית לְעַפְרָה
  english_pob_choice: In Beth-leaphrah
  chosen_spanish: en Bet-leáfrá
  alternatives_spanish:
  - en Bet-le-Áfrá
  - en la casa de polvo
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva como topónimo porque el juego de palabras con «polvo» funciona mejor cuando el nombre sigue siendo nombre.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - dust
  lexicon: HALOT
  rationale: «Polvo» es la equivalencia normal y preserva el paralelismo con el posible sentido del nombre de Bet-leáfrá.
- source_word: התפלשתי
  english_pob_choice: roll yourself
  chosen_spanish: revuélquense
  alternatives_spanish:
  - arróllense
  - revuélcate
  - me he revolcado
  lexicon: HALOT
  rationale: La forma consonántica puede leerse como primera persona, pero el contexto profético favorece un imperativo plural dirigido a la ciudad o a sus habitantes. «Revuélquense» refleja el gesto corporal de humillación asociado al polvo.
theological_decisions:
- issue: Imperativo textual frente a lectura de primera persona en התפלשתי
  english_pob_reading: The consonantal text is written as first person singular ('I have rolled myself'), but many take it as an imperative here because of the context.
  chosen_spanish_reading: Se traduce como imperativo plural («revuélquense»), sin ocultar en nota que la forma consonántica permite una lectura de primera persona.
  alternative_spanish_readings:
  - «me he revolcado»
  - «me revolqué»
  - «revuélcate»
  rationale: La escena es un oráculo de humillación colectiva, así que el imperativo encaja mejor en la línea poética. Aun así, la tensión textual se conserva en la nota para no borrar la alternativa documentada.
  doctrine_reference: Crítica textual y exégesis poética
- issue: Juego de palabras con Bet-leáfrá y polvo
  english_pob_reading: Beth-leaphrah likely sounds like 'house of dust,' matching the following word 'dust.'
  chosen_spanish_reading: Se mantiene el topónimo transliterado y se deja que «polvo» haga audible el juego de palabras para el lector hispano.
  alternative_spanish_readings:
  - traducir el nombre como «Casa de polvo»
  - añadir una glosa explícita en el texto
  rationale: Traducir el nombre borraría la función de toponimia dentro de la cadena de lamentos. La nota conserva la relación semántica sin sacrificar el nombre propio.
  doctrine_reference: Poética profética y onomástica bíblica
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que eliminó la lectura toponímica de «Acco» y mantuvo la prohibición verbal; esta propuesta española sigue esa decisión y evita introducir un topónimo no sostenido por el texto final revisado. También conserva la tensión textual de התפלשתי con una nota, en vez de normalizarla sin advertencia.
  spanish_consistency_notes:
  - Se usa «Gat» como transliteración de nombre propio y «Bet-leáfrá» para el topónimo compuesto.
  - Se prefirió «polvo» por ser la equivalencia más natural y por reproducir el campo semántico del juego de palabras.
  - Se mantuvo un estilo poético breve y directo, acorde con un oráculo de lamentación.
  - La puntuación y el uso de imperativos plurales buscan una lectura natural para español bíblico moderno sin perder la fuerza del original.
