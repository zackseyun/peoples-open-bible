review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro del POB inglés: mantiene la doble repetición de יֶאֱרֹב y de חטף, conserva la imagen del león y la red, y refleja adecuadamente la idea de emboscada y captura del pobre. Sin embargo, hay un desajuste menor en la anotación de notas al pie: la nota [b] está anclada a «guarida», pero en el inglés auditado la alternativa corresponde a «en su lair/den», es decir, a la frase locativa completa del refugio del león. Además, la nota [c] conviene afinarla para reflejar mejor las alternativas documentadas para בְּמָשְׁכוֹ בְרִשְׁתּוֹ.'
  spanish_quality_summary: El español es natural, claro y digno. «Yace al acecho», «como un león en su guarida» y «arrebata al pobre» funcionan bien en registro bíblico moderno. «En lo oculto» es aceptable, aunque algo abstracto; no requiere cambio obligatorio. La frase final es legible, pero la nota [c] actual suena algo forzada en español («mientras lo arrastra en su red») y puede mejorarse sin tocar el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección de «pobre» para עָנִי y «guarida» para בְסֻכֹּה está alineada con la racionalidad léxica documentada. La repetición verbal también se preserva correctamente.
  issues:
  - severity: medium
    issue: El anclaje de la nota [b] es impreciso.
    rationale: La alternativa documentada en el POB inglés («in his den») corresponde a toda la frase «en su guarida/ refugio», no solo al sustantivo aislado. En español, el marcador debe colocarse sobre la frase relevante para reflejar mejor la unidad semántica.
  - severity: low
    issue: La redacción de la nota [c] no refleja con suficiente fidelidad las alternativas auditadas.
    rationale: El inglés preserva «by drawing him into his net» o «with his net». La formulación actual («mientras lo arrastra con/en su red») desplaza ligeramente el foco y suena menos natural. Conviene ajustar la nota para que recoja mejor las posibilidades de medio o manera.
  revised_spanish_text: Él yace al acecho en lo oculto[a], como un león en su guarida[b]; yace al acecho para arrebatar al pobre; arrebata al pobre cuando lo arrastra a su red[c].
  revised_footnotes:
  - marker: a
    text: «En lo oculto» también puede entenderse como «en secreto».
    reason: lexical_alternative
  - marker: b
    text: O «en su escondite»; el término hebreo puede referirse a un refugio, un lugar oculto o una espesura.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «al arrastrarlo a su red» o «con su red».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural. Solo se regulariza el uso de las notas para ajustarlas mejor al alcance semántico y a las alternativas léxicas documentadas en el POB inglés, especialmente en la cláusula final.
