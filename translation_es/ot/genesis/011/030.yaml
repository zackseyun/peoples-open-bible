lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora ... era
  alternatives_spanish:
  - Y ... era
  - Entonces ... era
  lexicon: HALOT
  rationale: El wayyiqtol con היה introduce una nota narrativa de estado; en español, 'Ahora' comunica bien la transición circunstancial sin forzar una coordinación demasiado pesada. 'Era' conserva el aspecto estativo.
- source_word: שָׂרַי
  english_pob_choice: Sarai
  chosen_spanish: Sarai
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio sin transliteración adaptada, conforme al uso estándar en español bíblico y al tratamiento del inglés POB.
- source_word: עֲקָרָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barren
  - infértil
  lexicon: HALOT
  rationale: En español actual, 'estéril' expresa con claridad la idea de incapacidad para concebir y evita la posible aspereza o ambigüedad de 'barren'. 'Infértil' es posible, pero suele sonar más técnico; 'estéril' es idiomático y preciso en este contexto narrativo.
- source_word: אֵין לָהּ
  english_pob_choice: she had no
  chosen_spanish: no tenía
  alternatives_spanish:
  - no había para ella
  - no poseía
  lexicon: HALOT
  rationale: La construcción existencial negativa con sufijo pronominal se vuelve naturalmente posesiva en español. 'No tenía' conserva la sencillez idiomática del hebreo sin añadir matices ajenos.
- source_word: וָלָד
  english_pob_choice: child
  chosen_spanish: hijos
  alternatives_spanish:
  - un hijo
  - descendencia
  lexicon: HALOT
  rationale: Aunque el singular hebreo puede referirse al nacido o a la prole en conjunto, en español 'no tenía hijos' expresa el sentido de manera natural y comunica el estado de esterilidad dentro del marco narrativo. Se evita una literalidad rígida que sonaría menos natural.
translation_notes:
  revision_awareness: El texto inglés POB sigue de cerca el hebreo y mantiene la nota alternativa 'barren / offspring'. La versión española conserva el mismo contenido semántico con un equivalente natural ('estéril / hijos') y refleja la alternativa léxica en nota.
  spanish_consistency_notes:
  - Se mantiene 'Sarai' de forma uniforme con la tradición bíblica y el audit trail en inglés.
  - Se evita 'SEÑOR' o cualquier sustitución teológica porque el versículo no contiene el Tetragrámaton ni un título divino.
  - La nota al pie preserva la alternativa semántica principal del inglés ('child/offspring') en forma idiomática española.
