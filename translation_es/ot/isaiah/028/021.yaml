translation:
  language: es
  text: Porque Yahvé se levantará como en el monte de Perazim[a]; se agitará como en el valle de Gabaón[b], para hacer su obra—su obra extraña[c]—y para cumplir su tarea—su tarea ajena[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El monte de Perazim recuerda la irrupción de Yahvé contra los enemigos de David (2 Samuel 5:20; 1 Crónicas 14:11).
    reason: cross_reference
  - marker: b
    text: El valle de Gabaón probablemente alude a la intervención de Yahvé en la batalla de Gabaón (Josué 10:10–14).
    reason: cross_reference
  - marker: c
    text: O 'su obra ajena ... su tarea extraña'. Los dos adjetivos paralelos destacan que esta acción de juicio se presenta como inusual o ajena.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o explicación del anuncio previo; 'Porque' conserva bien la conexión causal en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino del Tetragrámaton según la convención del proyecto en español: ''Yahvé'', no una sustitución titulada.'
- source_word: כְהַר פְּרָצִים
  english_pob_choice: as at Mount Perazim
  chosen_spanish: como en el monte de Perazim
  alternatives_spanish:
  - como en el monte Perazim
  - como en Perazim
  lexicon: HALOT
  rationale: El כ comparativo se reproduce naturalmente con 'como en', y 'monte de Perazim' conserva el recuerdo topográfico e histórico sin sobreexplicar.
- source_word: יָקוּם
  english_pob_choice: will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - se alzará
  - se levantará
  lexicon: HALOT
  rationale: '''Se levantará'' comunica el movimiento decidido de intervención divina en estilo profético, sin perder la imagen verbal de קום.'
- source_word: כְעֵמֶק בְּגִבְעוֹן
  english_pob_choice: as in the Valley of Gibeon
  chosen_spanish: como en el valle de Gabaón
  alternatives_spanish:
  - como en el valle de Gabaón
  - como en el valle de Gibeón
  lexicon: HALOT
  rationale: '''Valle de Gabaón'' es una forma clara y reconocible en español bíblico; conserva la alusión histórica sin forzar la sintaxis hebrea.'
- source_word: יִרְגָּז
  english_pob_choice: will be stirred up
  chosen_spanish: se agitará
  alternatives_spanish:
  - se conmoverá
  - se agitará
  - se estremecerá
  lexicon: HALOT
  rationale: En este contexto la raíz רגז puede expresar conmoción o excitación activa; 'se agitará' mantiene la fuerza dinámica sin implicar descontrol.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para hacer
  - para realizar
  lexicon: HALOT
  rationale: La infinitiva de עשׂה se expresa de forma directa y breve; 'para hacer' permite conservar la repetición con 'obra'.
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su obra
  - su trabajo
  - su hecho
  lexicon: HALOT
  rationale: '''Obra'' mantiene el sentido de actividad realizada y suena más natural en español bíblico que una repetición mecánica de ''trabajo''.'
- source_word: זָר
  english_pob_choice: strange
  chosen_spanish: extraña
  alternatives_spanish:
  - extraña
  - ajena
  - extraña/ajena
  lexicon: HALOT
  rationale: '''Extraña'' conserva la tensión teológica y retórica de algo fuera de lo esperado; ''ajena'' se reserva para la nota alternativa por su matiz más literal de foreignness.'
- source_word: וְלַעֲבֹד
  english_pob_choice: and to perform
  chosen_spanish: y para cumplir
  alternatives_spanish:
  - y para realizar
  - y para cumplir
  - y para llevar a cabo
  lexicon: HALOT
  rationale: El paralelismo exige un verbo que suene natural con el sustantivo cognado; 'cumplir' comunica el ejecutar una tarea encomendada sin forzar el español.
- source_word: עֲבֹדָתוֹ
  english_pob_choice: his task
  chosen_spanish: su tarea
  alternatives_spanish:
  - su tarea
  - su servicio
  - su labor
  lexicon: HALOT
  rationale: '''Tarea'' distingue con claridad este miembro del paralelismo frente a ''obra'', mientras conserva la idea de actividad asignada o encargada.'
- source_word: נָכְרִיָּה
  english_pob_choice: foreign
  chosen_spanish: extraña
  alternatives_spanish:
  - extraña
  - ajena
  - foránea
  lexicon: HALOT
  rationale: Aunque el inglés POB distinguió 'foreign', en español 'extraña' y 'ajena' se cruzan semánticamente; aquí se preserva el eco paralelo con זָר mediante 'extraña' y se deja constancia de la alternativa más literal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto en español exige transliterar el nombre propio divino. 'Yahvé' preserva el referente personal del pacto sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: La caracterización de la obra de juicio como 'extraña' o 'ajena'
  english_pob_reading: his strange work ... his foreign task
  chosen_spanish_reading: su obra extraña ... su tarea extraña
  alternative_spanish_readings:
  - su obra ajena ... su tarea ajena
  - su obra inesperada ... su tarea inesperada
  rationale: 'Se conserva la tensión del texto: el juicio divino es presentado como algo inusual respecto de la acción habitual de Yahvé. No se suaviza ni se explica en la línea principal.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, incorporando la revisión más reciente que prefiere 'el valle de Gabaón' como giro más natural y exacto. Se preserva el paralelismo entre 'obra' y 'tarea', así como la tensión semántica de זָר / נָכְרִיָּה sin resolverla por paráfrasis.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה.
  - 'Se conserva el paralelismo con dos miembros: ''obra'' / ''tarea''.'
  - '''Extraña'' se emplea para ambos adjetivos por cohesión estilística, con nota que registra la alternativa ''ajena''.'
  - 'Las referencias geográficas se expresan con formas bíblicas naturales en español: ''monte de Perazim'' y ''valle de Gabaón''.'
