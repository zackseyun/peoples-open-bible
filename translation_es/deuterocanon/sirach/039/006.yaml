    rationale: El mismo versículo usa Κύριος al inicio y Κυρίῳ al final con referencia divina. El proyecto pide «Yahvé» en el texto principal, no «SEÑOR/Señor» como convención de enmascaramiento, salvo razón contextual especial, que aquí no consta.
  - severity: medium
