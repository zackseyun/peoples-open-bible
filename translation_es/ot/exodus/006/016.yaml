    rationale: Aunque es cercano al hebreo y al inglés auditado, en español bíblico general «según sus linajes» o «según sus descendencias» suele comunicar mejor la idea de agrupación genealógica de לְתֹלְדֹתָם sin sonar calcado.
  - severity: low
    issue: Coma innecesaria tras «Leví»
    rationale: «Estos son los nombres de los hijos de Leví según sus linajes» fluye mejor sin pausa entre el complemento y la frase preposicional.
  - severity: low
