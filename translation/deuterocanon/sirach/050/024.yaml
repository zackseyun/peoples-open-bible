id: SIR.50.24
reference: Sirach 50:24
source:
  edition: sefaria-ben-sira-kahana
  text: יֵאָמֵן עִם שִׁמְעוֹן חַסְדּוֹ, וְיָקֶם לוֹ בְּרִית פִּינְחָס.<br><small>(כד)</small> אֲשֶׁר לֹא יִכָּרֵת לוֹ, וּלְזַרְעוֹ כִּימֵי שָׁמָיִם.
  language: Hebrew
  pages:
  - 681
  - 722
  - 729
  - 744
  - 765
  - 766
  - 767
  - 768
  - 769
  - 770
  - 771
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐμπιστεῦσαι μεθʼ ἡμῶν τὸ ἔλεος αὐτοῦ, καὶ ἐν ταῖς ἡμέραις αὐτοῦ λυτρωσάσθω ἡμᾶς.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 50:24
translation:
  text: May his mercy remain faithful with Shimon[a], and may he establish for him the covenant of Phinehas[b], which shall not be cut off from him or from his offspring as long as the days of heaven endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Entrust his mercy with us, and in his days may he redeem us.'' This differs substantially from the extant Hebrew, which speaks of Shimon and the covenant of Phinehas.'
    reason: alternative_reading
  - marker: b
    text: '''The covenant of Phinehas'' alludes to the enduring priestly covenant in Numbers 25:12–13.'
    reason: cross_reference
lexical_decisions:
- source_word: יֵאָמֵן
  chosen: remain faithful
  alternatives:
  - be confirmed
  - be trustworthy
  - be established
  lexicon: HALOT
  rationale: From אמן in the nifal/passive-reflexive sense, the Hebrew most naturally expresses firmness or faithfulness. In context with חַסְדּוֹ, 'may his mercy remain faithful' preserves the covenantal nuance better than a flatter 'be confirmed.' The Greek parallel ἐμπιστεῦσαι is difficult and appears to reflect a different Vorlage or interpretive rendering, so the Hebrew is given primacy while the Greek remains in view.
- source_word: עִם
  chosen: with
  alternatives:
  - toward
  - for
  lexicon: HALOT
  rationale: 'The preposition straightforwardly indicates relation or accompaniment: God''s mercy is asked to remain with Shimon.'
- source_word: שִׁמְעוֹן
  chosen: Shimon
  alternatives:
  - Simon
  rationale: Per project philosophy, personal names are transliterated rather than translated into traditional Anglicized forms.
- source_word: חַסְדּוֹ
  chosen: his mercy
  alternatives:
  - his steadfast love
  - his covenant loyalty
  - his kindness
  lexicon: HALOT
  rationale: חסד can denote covenant loyalty or steadfast love. 'Mercy' is chosen here because the Greek parallel has τὸ ἔλεος αὐτοῦ ('his mercy'), supporting that semantic direction, while still allowing covenantal overtones in context.
- source_word: וְיָקֶם
  chosen: may he establish
  alternatives:
  - may he uphold
  - may he confirm
  lexicon: HALOT
  rationale: קום in the hiphil commonly means to establish or confirm, especially with covenant language.
- source_word: בְּרִית פִּינְחָס
  chosen: the covenant of Phinehas
  alternatives:
  - Phinehas's covenant
  - the covenant with Phinehas
  lexicon: HALOT
  rationale: The phrase alludes to the priestly covenant associated with Phinehas (cf. Num 25). 'Covenant of Phinehas' is concise and preserves the allusive force.
- source_word: אֲשֶׁר לֹא יִכָּרֵת
  chosen: which shall not be cut off
  alternatives:
  - which shall not be broken
  - which shall not cease
  lexicon: HALOT
  rationale: The idiom with כרת literally means 'be cut off/cut down.' Retaining 'cut off' preserves the covenantal and legal texture of the Hebrew.
- source_word: וּלְזַרְעוֹ
  chosen: or from his offspring
  alternatives:
  - and from his seed
  - and for his descendants
  lexicon: HALOT
  rationale: The phrase continues the scope of what will not be cut off. 'Offspring' is natural modern English for זרע in genealogical context.
- source_word: כִּימֵי שָׁמָיִם
  chosen: as long as the days of heaven endure
  alternatives:
  - like the days of heaven
  - for the days of heaven
  - as the days of heaven
  lexicon: HALOT
  rationale: This idiom denotes enduring duration. The expanded English makes the temporal force clear without losing the imagery.
