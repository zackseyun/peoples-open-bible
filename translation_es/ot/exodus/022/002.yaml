revisions:
- from: Pero si el sol ya ha salido sobre él[a], hay sangre sobre él[b]. Ciertamente deberá hacer restitución. Si no tiene nada[c], será vendido por su robo.
  to: Pero si el sol ya ha salido sobre él[a], hay culpa de sangre[b]. Sin falta deberá hacer restitución. Si no tiene nada[c], será vendido por su robo.
  rationale: Se revisa el núcleo jurídico del versículo para que el español principal exprese claramente el sentido de bloodguilt/bloodguilt liability de דָּמִים, en línea con el hebreo y el expediente inglés. Se conservan la imagen literal del sol, la obligación enfática de restitución y la venta por insolvencia, con notas que aclaran alternativas y trasfondo sin sustituir el sentido principal.
