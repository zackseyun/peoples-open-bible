translation:
  language: es
  text: Porque son llamados de la ciudad santa[a], y se apoyan en el Dios de Israel; Yahvé de los ejércitos es su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «son llamados desde la ciudad santa». El hebreo puede enfatizar tanto su procedencia como su designación por la ciudad.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la acusación anterior; en español, 'porque' conserva mejor el valor explicativo causal que 'pues' en este contexto.
- source_word: מֵעִיר הַקֹּדֶשׁ
  english_pob_choice: from the holy city
  chosen_spanish: desde la ciudad santa
  alternatives_spanish:
  - de la ciudad santa
  - desde la ciudad santa
  lexicon: HALOT
  rationale: El מן puede expresar origen. 'Desde' mantiene la idea de procedencia con buen español moderno. 'Ciudad santa' conserva el valor del hebreo sin circunlocución.
- source_word: נִקְרָאוּ
  english_pob_choice: are called
  chosen_spanish: son llamados
  alternatives_spanish:
  - son nombrados
  - se llaman
  lexicon: HALOT
  rationale: El nifal de קרא se vierte naturalmente como 'ser llamado/nombrado'. 'Son llamados' es claro y no añade un matiz reflexivo que el hebreo no exige.
- source_word: וְעַל
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y sobre
  - y en
  lexicon: HALOT
  rationale: La preposición se integra de modo natural en la frase verbal española 'se apoyan en'. Mantener solo 'y' evita una duplicación torpe de la estructura preposicional.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Traducción estándar del constructo; 'Dios' preserva el referente singular y el genitivo relacional de Israel.
- source_word: נִסְמָכוּ
  english_pob_choice: they lean on
  chosen_spanish: se apoyan en
  alternatives_spanish:
  - confían en
  - descansan en
  lexicon: HALOT
  rationale: '''סמך'' conserva la metáfora de apoyo físico y dependencia. ''Se apoyan en'' funciona en español sin perder la imagen, y permite percibir el posible tono irónico del contexto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio y no se sustituye por un título. 'Yahvé' es la forma preferida en el proyecto para el tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: '''Ejércitos'' es transparente para lectores en español y refleja bien el título divino sin estrecharlo a una sola esfera semántica.'
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - es su Nombre
  lexicon: HALOT
  rationale: Fórmula nominal hebrea estándar. 'Su nombre' conserva la estructura declarativa y suena natural en español contemporáneo.
theological_decisions:
- issue: 'Sentido de מֵעִיר הַקֹּדֶשׁ: procedencia o designación'
  english_pob_reading: they are called from the holy city / the Hebrew may emphasize either their designation by the city or their origin from it
  chosen_spanish_reading: son llamados desde la ciudad santa
  alternative_spanish_readings:
  - son llamados de la ciudad santa
  - son llamados por la ciudad santa
  rationale: El hebreo admite la tensión entre origen y designación. 'Desde' deja abierta la procedencia sin excluir el trasfondo identitario. La nota conserva la alternativa de lectura sin resolver indebidamente la ambigüedad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preservar tensiones significativas en nota)
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto usa directamente el tetragrámaton, por lo que se preserva el nombre propio en español. 'Yahvé' es la forma establecida en el marco POB para mantener la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail en dos puntos: mantiene la lectura de procedencia para מֵעִיר frente a la opción más interpretativa ''por/by la ciudad'', y conserva la traducción directa del tetragrámaton como nombre propio divino. Se evita la sustitución por una fórmula eclesiástica tradicional.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Dios de Israel'' se mantuvo con mayúscula inicial en ''Dios'' por tratarse del referente divino.'
  - Se prefirió 'de los ejércitos' por claridad, aunque 'Yahvé de los ejércitos' mantiene el título teofórico completo.
  - La nota al pie se ancla en 'desde la ciudad santa' para reflejar la ambigüedad del hebreo sin duplicar notas.
