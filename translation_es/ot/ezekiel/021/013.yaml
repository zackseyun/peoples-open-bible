lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sucedió
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה, el inglés POB eligió 'came' por su sentido idiomático de irrupción de la palabra divina. En español, 'vino' conserva esa llegada/comunicación sin sonar forzado ni demasiado narrativo.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: La expresión constructa דְבַר יְהוָה se refleja con el sustantivo definido 'la palabra', que mantiene la fórmula profética recurrente y su peso revelatorio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio con la forma española establecida por el proyecto, 'Yahvé', en lugar de sustituirlo por un título. Esto mantiene la transparencia respecto del Tetragrámaton.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición y sufijo pronominal indican dirección hacia el profeta; 'a mí' es la equivalencia natural y clara en español moderno.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso siguiente; 'diciendo:' mantiene la función formulaica y prepara la continuación del mensaje.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto exige transliterar el Nombre divino en lugar de ocultarlo tras un sustituto. 'Yahvé' es la forma española del mismo compromiso de transparencia adoptado por el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB mantiene una formulación profética estándar con nota sobre el Tetragrámaton. La versión española conserva esa fórmula, pero adapta 'came' a 'vino' y usa la forma española del Nombre divino ('Yahvé') para publicar un texto natural y a la vez transparente.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - '''Yahvé'' se usa de manera consistente para יְהוָה, no como sustitución reverencial por ''SEÑOR''.'
  - '''diciendo:'' conserva el valor introductorio del infinitivo hebreo sin añadir contenido interpretativo.'
