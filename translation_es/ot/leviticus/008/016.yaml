  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Grasa', 'entrañas', 'lóbulo del hígado' y 'riñones' están bien alineados con las decisiones léxicas documentadas. La revisión propuesta mantiene esa alineación y mejora el tratamiento de קטר con una base principal más idiomática y una nota que conserva la alternativa 'ofreció en humo'.
