translation:
  language: es
  text: Roboam amó a Maaca, la hija de Absalón[a], más que a todas sus esposas y sus concubinas, pues había tomado dieciocho esposas y sesenta concubinas, y engendró veintiocho hijos varones y sesenta hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «descendiente de Absalón»; en hebreo, «hija» a veces puede usarse en sentido genealógico más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - quiso
  lexicon: HALOT
  rationale: אהב expresa amor o afecto; en español, "amó" comunica la afirmación directa del relato sin volverla más interpretativa. "Amaba" podría sugerir aspecto durativo no marcado de manera necesaria en este contexto narrativo.
- source_word: מַעֲכָה בַת אַבְשָׁלֹם
  english_pob_choice: the daughter of Absalom
  chosen_spanish: la hija de Absalón
  alternatives_spanish:
  - descendiente de Absalón
  - nieta de Absalón
  lexicon: HALOT
  rationale: בת normalmente significa "hija". La traducción principal conserva esa relación literal; el español permite mantener la misma apertura interpretativa con una nota, sin resolver excesivamente el vínculo genealógico.
- source_word: מִכָּל נָשָׁיו וּפִילַגְשָׁיו
  english_pob_choice: more than all his wives and his concubines
  chosen_spanish: más que a todas sus esposas y sus concubinas
  alternatives_spanish:
  - por encima de todas sus esposas y concubinas
  - más que todas sus mujeres y concubinas
  lexicon: HALOT
  rationale: מִכָּל marca comparación; en español, "más que a todas" preserva la relación comparativa. Se eligió "esposas" por claridad moderna y para evitar un tono demasiado arcaico; "concubinas" conserva la distinción social del hebreo.
- source_word: נָשָׁי/ו
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - esposas
  lexicon: HALOT
  rationale: En este contexto matrimonial, נָשִׁים significa "wives". "Esposas" es natural en español y precisa; "mujeres" sería demasiado general y perdería el matiz conyugal.
- source_word: וּפִילַגְשָׁיו
  english_pob_choice: his concubines
  chosen_spanish: sus concubinas
  alternatives_spanish:
  - sus mujeres secundarias
  - sus compañeras
  lexicon: HALOT
  rationale: פִּילַגְשִׁים denota una categoría distinta de esposas; "concubinas" es el equivalente preciso y mantiene la fuerza lexical del término sin suavizarlo.
- source_word: נָשָׂא
  english_pob_choice: he had taken
  chosen_spanish: había tomado
  alternatives_spanish:
  - había desposado
  - se había casado con
  lexicon: HALOT
  rationale: נָשָׂא con נשים funciona como un modismo para tomar o contraer matrimonio. "Había tomado" conserva el valor léxico del hebreo y explica el estado previo del rey con un castellano fluido.
- source_word: פִּילַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - consortes secundarias
  - mujeres secundarias
  lexicon: HALOT
  rationale: Se mantiene la correspondencia consistente con el mismo término anterior, porque el hebreo repite la categoría y el español debe reflejarla de manera uniforme.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: Para un sujeto masculino, ילד en esta forma narrativa expresa paternidad efectiva. "Engendró" es preciso y suficientemente digno en español bíblico contemporáneo; "tuvo" sería vago.
- source_word: עֶשְׂרִים וּשְׁמוֹנָה בָּנִים
  english_pob_choice: twenty-eight sons
  chosen_spanish: veintiocho hijos
  alternatives_spanish:
  - veintiocho hijos varones
  - veintiocho varones
  lexicon: HALOT
  rationale: Aunque בנים puede leerse literalmente como "hijos varones", en español el término numérico con "hijos" suele comunicar bien la referencia masculina en este listado familiar. La nota textual puede preservar que el hebreo dice "sons" de forma literal si se desea máxima precisión.
- source_word: וְשִׁשִּׁים בָּנוֹת
  english_pob_choice: sixty daughters
  chosen_spanish: sesenta hijas
  alternatives_spanish:
  - sesenta hijas mujeres
  lexicon: HALOT
  rationale: בנות se traduce directamente como "hijas". Se evita una perífrasis innecesaria porque el español ya expresa con claridad la relación filial.
theological_decisions:
- issue: Designación genealógica de Maaca como hija de Absalón
  english_pob_reading: Retain the literal Hebrew 'daughter of Absalom' in the main text, with a footnote for possible broader descent
  chosen_spanish_reading: Mantener "la hija de Absalón" en el texto principal, con nota sobre posible sentido genealógico más amplio
  alternative_spanish_readings:
  - descendiente de Absalón
  - nieta de Absalón
  rationale: No es una cuestión doctrinal, pero sí interpretativa. La decisión favorece la primacía del hebreo y evita resolver la relación con más precisión de la que el texto exige; la nota conserva la alternativa heredada del audit trail en una forma natural para el español.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto español sigue la lectura final auditada en inglés, conservando la estructura comparativa, la distinción entre esposas y concubinas, y la nota genealógica sobre Maaca. Se adaptó el léxico al español natural sin perder la fuerza del hebreo.
  spanish_consistency_notes:
  - Se usó «concubinas» de manera uniforme para פִּילַגְשִׁים en ambas apariciones.
  - Se mantuvo la comparación con «más que a todas» para reflejar מִכָּל sin convertir el comparativo en una paráfrasis.
  - Se preservó la relación genealógica literal «la hija de Absalón» y se dejó en nota la alternativa amplia.
  - Se eligió «engendró» para reproducir el valor narrativo de וַיּוֹלֶד con un registro bíblico claro y moderno.
