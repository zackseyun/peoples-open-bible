  to: Deben destruir por completo todos los lugares donde las naciones que ustedes están desposeyendo sirvieron a sus dioses[a] allí, en los montes altos, en las colinas y debajo de todo árbol frondoso.
  rationale: Se corrige la incoherencia pronominal cambiando 'Debes' por 'Deben', se preserva mejor שָׁם con 'allí', y se sustituye la nota por la alternativa léxica documentada en el POB inglés para עָבְדוּ שָׁם. El resto del texto puede mantenerse porque es fiel, claro y natural.
