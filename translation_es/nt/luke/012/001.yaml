  text: Ἐν οἷς ἐπισυναχθεισῶν τῶν μυριάδων τοῦ ὄχλου, ὥστε καταπατεῖν ἀλλήλους, ἤρξατο λέγειν πρὸς τοὺς μαθητὰς αὐτοῦ πρῶτον· Προσέχετε ἑαυτοῖς ἀπὸ τῆς ζύμης, ⸂ἥτις ἐστὶν ὑπόκρισις, τῶν Φαρισαίων⸃.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/001.yaml
  text: Meanwhile[a], when the many thousands of the crowd had gathered together, so that they were trampling one another, he began to say first to his disciples, “Beware of the leaven of the Pharisees[b], which is hypocrisy.”
  footnotes:
  - marker: a
    text: Or 'the myriads of the crowd'; Greek μυριάδες can denote 'tens of thousands' or, more generally, a very large multitude.
    reason: lexical_alternative
  - marker: b
    text: Or 'Watch yourselves' / 'Be on your guard against the leaven of the Pharisees.'
    reason: lexical_alternative
