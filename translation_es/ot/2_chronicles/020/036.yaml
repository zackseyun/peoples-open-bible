translation:
  language: es
  text: Así se alió con él para hacer naves para ir a Tarsis[a], y hicieron naves en Ezión-geber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse «para navegar a Tarsis». El hebreo, sin embargo, expresa de manera más directa el destino: «ir a Tarsis».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבְּרֵהוּ
  english_pob_choice: allied himself with him
  chosen_spanish: se alió con él
  alternatives_spanish:
  - se unió con él
  - se asoció con él
  - hizo alianza con él
  lexicon: HALOT
  rationale: El verbo hebreo expresa formar una asociación o alianza, no solo unirse físicamente. «Se alió con él» conserva el valor relacional y político-comercial del contexto, y suena natural en español.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to make
  chosen_spanish: para hacer
  alternatives_spanish:
  - para construir
  - para fabricar
  lexicon: HALOT
  rationale: עָשָׂה es amplio («hacer»). Con naves como objeto, «hacer» sigue de cerca el hebreo y es comprensible en español; «construir» sería posible, pero introduce un matiz más específico que no exige el texto.
- source_word: אֳנִיּוֹת
  english_pob_choice: ships
  chosen_spanish: naves
  alternatives_spanish:
  - barcos
  - buques
  - navíos
  lexicon: HALOT
  rationale: En español bíblico y lector, «naves» comunica bien el tipo de embarcación marítima y evita la posible familiaridad excesiva de «barcos». Mantiene dignidad sin perder precisión.
- source_word: לָלֶכֶת תַּרְשִׁישׁ
  english_pob_choice: to go to Tarshish
  chosen_spanish: para ir a Tarsis
  alternatives_spanish:
  - para navegar a Tarsis
  - para zarpar hacia Tarsis
  - para viajar a Tarsis
  lexicon: HALOT
  rationale: La construcción verbal indica destino. «Ir a Tarsis» reproduce la sintaxis básica del hebreo sin forzar una lectura idiomática de navegación que el texto no exige. Se translitera el topónimo como «Tarsis».
- source_word: תַּרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshish
  lexicon: HALOT
  rationale: Se adapta el topónimo a la forma habitual en español bíblico, «Tarsis», que es reconocible y consistente con la tradición hispana, sin cambiar la referencia geográfica.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - construyeron
  - fabricaron
  lexicon: HALOT
  rationale: El plural concuerda con la acción conjunta de los aliados. «Hicieron» conserva la literalidad básica de עָשָׂה y enlaza con el infinitivo anterior.
- source_word: בְּעֶצְיֹן גָּבֶר
  english_pob_choice: at Ezion-geber
  chosen_spanish: en Ezión-geber
  alternatives_spanish:
  - en Ezión Geber
  - en Ezión-geber
  lexicon: HALOT
  rationale: El בְּ locativo se expresa naturalmente con «en» para el sitio de la construcción. Se translitera el nombre del lugar como «Ezión-geber» con ortografía española clara.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés, conservando la secuencia: alianza, propósito de construir naves, destino Tarsis y lugar de construcción en Ezión-geber. Se han ajustado los topónimos a formas españolas habituales y se han preservado las alternativas relevantes en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «naves» para אֳנִיּוֹת por claridad bíblica y registro digno.
  - «Tarsis» y «Ezión-geber» se han adaptado a grafía española, sin alterar la identificación del lugar.
