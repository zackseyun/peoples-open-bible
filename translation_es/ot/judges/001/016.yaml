translation:
  language: es
  text: Y los descendientes del queneo[a], suegro de Moisés, subieron de la Ciudad de las Palmeras[b] con los descendientes de Judá al desierto de Judá, que está en el Néguev de Arad; y fue y se estableció con el pueblo[d][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pariente por afinidad de Moisés»; el término hebreo puede ser más amplio que «suegro», aunque aquí ese sentido es el más común.
    reason: lexical_alternative
  - marker: b
    text: «Ciudad de las Palmeras» suele entenderse como una referencia a Jericó.
    reason: cross_reference
  - marker: c
    text: 'El hebreo pasa al singular: «y fue y se estableció». Puede referirse al clan queneo como singular colectivo, aunque algunos intérpretes entienden un sentido plural.'
    reason: textual_variant
  - marker: d
    text: O «entre el pueblo». Algunos testigos antiguos leen «con Amalec» en lugar de «con el pueblo».
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the descendants of
  chosen_spanish: Y los descendientes de
  alternatives_spanish:
  - Y los hijos de
  - Y los hijos/descendientes de
  lexicon: HALOT
  rationale: En genealogía y lenguaje tribal, בְּנֵי suele expresar descendencia o membresía clánica. «Descendientes de» conserva ese valor sin limitarlo a hijos inmediatos ni solo varones.
- source_word: קֵינִי
  english_pob_choice: the Kenite
  chosen_spanish: el queneo
  alternatives_spanish:
  - el ceneo
  - el kenita
  lexicon: HALOT
  rationale: Para el gentilicio bíblico, «queneo» evita la transliteración inglesa y mantiene una forma natural en español. Se usa como referente del clan/etnia, no como nombre propio individual.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses’ father-in-law
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - pariente por afinidad de Moisés
  lexicon: HALOT
  rationale: «Suegro» es la acepción más común y probable en este contexto. Se mantiene la relación de afinidad sin forzar una paráfrasis más amplia en el cuerpo del texto.
- source_word: עָלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron
  - ascendieron
  lexicon: HALOT
  rationale: עלה se rinde con el movimiento ascendente literal y narrativo. «Subieron» es natural en español y conserva la imagen del hebreo.
- source_word: מֵעִיר הַתְּמָרִים
  english_pob_choice: from the City of Palms
  chosen_spanish: de la Ciudad de las Palmeras
  alternatives_spanish:
  - de Jericó
  lexicon: HALOT
  rationale: Se conserva el epíteto geográfico del hebreo en el texto principal, porque el original no usa el topónimo directo sino la designación descriptiva. La posible identificación con Jericó queda mejor como nota.
- source_word: אֶת בְּנֵי יְהוּדָה
  english_pob_choice: with the descendants of Judah
  chosen_spanish: con los descendientes de Judá
  alternatives_spanish:
  - con los hijos de Judá
  - junto con el pueblo de Judá
  lexicon: HALOT
  rationale: אֶת se interpreta aquí en sentido asociativo, no como marca de objeto directo. «Con» reproduce la relación de acompañamiento, y «descendientes de Judá» mantiene el matiz tribal.
- source_word: מִדְבַּר יְהוּדָה
  english_pob_choice: to the wilderness of Judah
  chosen_spanish: a la tierra despoblada de Judá
  alternatives_spanish:
  - al desierto de Judá
  - a la región desierta de Judá
  lexicon: HALOT
  rationale: Se opta por una expresión española idiomática que conserve el valor de zona despoblada/árida del hebreo. «Tierra despoblada» evita una rigidez excesiva y mantiene el movimiento hacia la región.
- source_word: אֲשֶׁר בְּנֶגֶב עֲרָד
  english_pob_choice: which is in the Negev of Arad
  chosen_spanish: que está en el Néguev de Arad
  alternatives_spanish:
  - que está al sur de Arad
  - que está en la región sur de Arad
  lexicon: HALOT
  rationale: «Néguev» preserva el nombre regional/literal de נֶגֶב cuando funciona como designación geográfica. Se mantiene «de Arad» para reflejar la relación espacial del hebreo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: and he went
  chosen_spanish: y él fue
  alternatives_spanish:
  - y fue
  - y se fue
  lexicon: HALOT
  rationale: Se respeta el singular del texto masorético, tal como la POB inglesa lo preserva con una nota. «Fue» es una forma sobria y natural; el pronombre explícito ayuda a reflejar el cambio a singular.
- source_word: וַיֵּשֶׁב
  english_pob_choice: and settled
  chosen_spanish: y se estableció
  alternatives_spanish:
  - y habitó
  - y se asentó
  lexicon: HALOT
  rationale: En contexto de migración, ישׁב comunica asentarse/domiciliarse. «Se estableció» suena natural en español y conserva el sentido de fijar residencia.
- source_word: אֶת הָעָם
  english_pob_choice: with the people
  chosen_spanish: con el pueblo
  alternatives_spanish:
  - entre el pueblo
  - con la gente
  lexicon: HALOT
  rationale: Se mantiene la lectura asociativa de אֶת. «El pueblo» conserva la ambigüedad del referentе sin resolverla artificialmente; así no se borra la tensión textual del hebreo.
theological_decisions:
- issue: Sentido de חֹתֵן מֹשֶׁה
  english_pob_reading: father-in-law, with a note allowing broader kinship by marriage
  chosen_spanish_reading: suegro de Moisés, con nota de posible relación de afinidad más amplia
  alternative_spanish_readings:
  - pariente por afinidad de Moisés
  - cuñado/consanguíneo por afinidad de Moisés
  rationale: La traducción principal sigue el sentido más probable y tradicional; la nota preserva la amplitud semántica observada por la POB inglesa. Así no se elimina una tensión lexical real del hebreo.
  doctrine_reference: No doctrinal issue; lexical-historical identification of Moses’ Kenite relation
- issue: Identificación de la Ciudad de las Palmeras
  english_pob_reading: City of Palms, commonly understood to refer to Jericho
  chosen_spanish_reading: Ciudad de las Palmeras, con nota de posible identificación con Jericó
  alternative_spanish_readings:
  - Jericó
  - la ciudad llamada Jericó
  rationale: El hebreo usa un epíteto descriptivo. Mantenerlo en el cuerpo respeta la forma del texto; la nota ofrece la identificación común sin convertirla indebidamente en lectura principal.
  doctrine_reference: No doctrinal issue; geographic identification
- issue: Cambio de singular en וַיֵּלֶךְ וַיֵּשֶׁב
  english_pob_reading: 'The Hebrew shifts to singular: ''then he went and settled.'' This may refer to the Kenite clan as a collective singular, though some interpreters understand a plural sense.'
  chosen_spanish_reading: 'Se conserva el singular: «y él fue y se estableció»; con nota sobre posible singular colectivo o lectura plural de intérpretes.'
  alternative_spanish_readings:
  - y fueron y se establecieron
  - y el clan fue y se estableció
  rationale: La forma masorética singular se conserva sin armonizarla al plural anterior. La nota protege la tensión entre gramática y referente colectivo, importante para una traducción auditable.
  doctrine_reference: Textual-grammatical issue; no doctrinal implication
- issue: Lectura final de אֶת הָעָם
  english_pob_reading: with the people; some ancient witnesses read 'with Amalek' instead of 'with the people'
  chosen_spanish_reading: con el pueblo, con nota de variante antigua 'con Amalec'
  alternative_spanish_readings:
  - con Amalec
  - entre el pueblo
  rationale: Se mantiene el texto masorético en el cuerpo y se registra la variante antigua porque afecta el referente final. No se fuerza una resolución donde el testimonio textual sigue siendo debatido.
  doctrine_reference: Textual criticism; no doctrinal implication
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'into' por 'to' para el destino y eliminó un énfasis temporal añadido a 'then'; por eso el español usa una simple dirección («a») y la coordinación directa «y él fue y se estableció», sin adverbios interpretativos innecesarios.
  spanish_consistency_notes:
  - Se preserva «Yahvé» no aplicable aquí; no aparece el Tetragrámaton en este versículo.
  - Se usa «descendientes» para בְּנֵי en sentido clánico, coherente con el estilo POB.
  - «Queneo» se emplea como gentilicio españolizado para קֵינִי.
  - Se mantiene el epíteto «Ciudad de las Palmeras» en el texto y la identificación con Jericó en nota.
  - Se conserva la ambigüedad textual de «el pueblo» y el singular verbal, con notas para la variante y el posible singular colectivo.
