translation:
  language: es
  text: Y colocó la caballería restante a ambos lados, en los dos flancos del campamento, blandiendo[a] sus armas y plenamente armados[b] en las falanges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agitando» o «sacudiendo amenazantemente» sus armas para κατασείοντες; el objeto queda implícito en el griego.
    reason: lexical_alternative
  - marker: b
    text: O «formados en las falanges» / «apretados en las falanges»; el griego es difícil y puede describir el ajuste o la compactación de la formación.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν ἐπίλοιπον ἵππον
  english_pob_choice: the remaining cavalry
  chosen_spanish: la caballería restante
  alternatives_spanish:
  - el resto de los jinetes
  - el caballo restante
  lexicon: LSJ
  rationale: En contexto militar, ἵππος puede funcionar como colectivo para la caballería; en español, "caballería restante" preserva ese sentido colectivo con naturalidad y evita la literalidad engañosa de "caballo" o la reducción a individuos.
- source_word: ἔνθεν καὶ ἔνθεν
  english_pob_choice: on both sides
  chosen_spanish: a ambos lados
  alternatives_spanish:
  - de un lado y del otro
  - a un lado y al otro
  lexicon: LSJ
  rationale: La locución indica disposición en ambos lados, no dispersión. "A ambos lados" es la equivalencia más directa y clara en español.
- source_word: ἐπὶ τὰ δύο μέρη τῆς παρεμβολῆς
  english_pob_choice: at the two flanks of the camp
  chosen_spanish: en los dos flancos del campamento
  alternatives_spanish:
  - en los dos lados del campamento
  - junto a las dos partes del campamento
  lexicon: LSJ
  rationale: παρεμβολή en narrativa militar es "campamento"; τὰ δύο μέρη señala sus dos lados. "Flancos" conserva el matiz táctico del inglés auditado sin perder legibilidad.
- source_word: κατασείοντες
  english_pob_choice: brandishing
  chosen_spanish: blandiendo
  alternatives_spanish:
  - brandiendo
  - agitándolos
  lexicon: LSJ
  rationale: El participio sugiere un movimiento amenazante de agitar o blandir, con el objeto implícito. "Blandiendo" es un castellano natural que conserva el valor militar de la acción.
- source_word: καταφρασσόμενοι
  english_pob_choice: fully armed
  chosen_spanish: plenamente armados
  alternatives_spanish:
  - armados por completo
  - completamente equipados
  lexicon: LSJ
  rationale: El término es difícil y el audit trail inglés lo entendió como una descripción del estado de armamento o preparación, no como un simple "cerrarse". "Plenamente armados" mantiene esa lectura sin forzar un verbo técnico oscuro en español.
- source_word: ἐν ταῖς φάλαγξιν
  english_pob_choice: in the phalanxes
  chosen_spanish: en las falanges
  alternatives_spanish:
  - en las formaciones
  - en las líneas de batalla
  lexicon: LSJ
  rationale: φάλαγξ designa una formación militar específica. "Falanges" preserva el término técnico y el trasfondo helenístico, como hace el inglés auditado.
translation_notes:
  revision_awareness: 'El texto inglés fue revisado desde «shaking their weapons and closing up in the phalanxes» a «brandishing and fully armed in the phalanxes». La versión española sigue esa revisión: adopta "blandiendo" para κατασείοντες y entiende καταφρασσόμενοι como una referencia al estado de armamento/preparación, reflejado con "plenamente armados".'
  spanish_consistency_notes:
  - Se mantiene "campamento" para παρεμβολή, en coherencia con el registro militar del pasaje.
  - Se conserva el término técnico "falanges" para φάλαγξ, sin sustituirlo por una paráfrasis genérica.
  - '"Caballería" se usa como colectivo militar para ἵππος, evitando la ambigüedad de "caballo" en singular.'
  - Las notas a y b preservan las alternativas lexicológicas relevantes documentadas en el audit trail inglés.
