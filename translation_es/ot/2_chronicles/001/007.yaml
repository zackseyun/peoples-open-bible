translation:
  language: es
  text: 'Aquella noche Dios se apareció a Salomón y le dijo: «Pide qué he de darte[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Pide qué te daré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/לַּ֣יְלָה הַ/ה֔וּא
  english_pob_choice: That night
  chosen_spanish: Aquella noche
  alternatives_spanish:
  - Esa noche
  - En aquella noche
  lexicon: HALOT
  rationale: El hebreo expresa referencia temporal definida; «aquella noche» comunica de forma natural el valor deíctico sin sonar rígido. «En aquella noche» reproduce más literalmente la preposición, pero en español resulta menos idiomático.
- source_word: נִרְאָ֥ה
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  - se reveló
  lexicon: HALOT
  rationale: En un contexto de teofanía, el verbo hebreo en nifal funciona como «aparecer». «Se apareció» preserva la pasividad/reflexividad del encuentro divino mejor que «apareció» y evita ampliar el sentido como «se reveló».
- source_word: אֱלֹהִ֖ים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aquí el verbo singular y el contexto narrativo exigen referencia singular al Dios de Israel. «Dios» es la forma natural y fiel en español; «dioses» no corresponde al uso del texto.
- source_word: לִ/שְׁלֹמֹ֑ה
  english_pob_choice: to Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - para Salomón
  lexicon: HALOT
  rationale: La preposición ל marca destinatario/indirecto; en español, «a Salomón» expresa con claridad la relación del verbo de aparición y del habla posterior.
- source_word: וַ/יֹּ֣אמֶר ל֔/וֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le dijo a él
  lexicon: HALOT
  rationale: «Le dijo» es la forma más natural y precisa para el discurso directo. «Y le dijo a él» sería redundante; «le habló» pierde la referencia exacta a la palabra dicha.
- source_word: שְׁאַ֖ל
  english_pob_choice: Ask
  chosen_spanish: Pide
  alternatives_spanish:
  - Pide tú
  - Pregunta
  lexicon: HALOT
  rationale: El imperativo aquí invita a solicitar un don. En español, «pide» comunica mejor la fuerza pragmática del mandato que «pregunta». Mantiene la amplitud del hebreo sin imponer un objeto explícito.
- source_word: מָ֥ה אֶתֶּן לָֽ/ךְ־
  english_pob_choice: what I should give you
  chosen_spanish: lo que yo te dé
  alternatives_spanish:
  - qué te daré
  - lo que te daré
  - qué debería darte
  lexicon: HALOT
  rationale: 'La construcción hebrea presenta una pregunta indirecta: «qué te daré». En español, después de «Pide», la subordinada final «lo que yo te dé» suena natural y conserva la apertura semántica. «Lo que te daré» es posible, pero menos marcadamente dependiente del verbo principal; «qué debería darte» introduce matiz modal no requerido.'
theological_decisions:
- issue: Cómo reflejar la fórmula de habla divina sin suavizar el encuentro teofánico
  english_pob_reading: That night God appeared to Solomon and said to him
  chosen_spanish_reading: Aquella noche Dios se apareció a Salomón y le dijo
  alternative_spanish_readings:
  - Aquella noche Dios apareció a Salomón y le dijo
  - Aquella noche Dios se manifestó a Salomón y le dijo
  rationale: La forma reflexiva «se apareció» conserva mejor el valor de aparición divina que una simple pasiva o la interpretación más explícita «se manifestó». No se introduce doctrina adicional; solo se comunica el evento narrado con fidelidad al hebreo.
  doctrine_reference: Teofanía; Traducción §1
- issue: Cómo traducir la respuesta divina en discurso indirecto sin perder la pregunta original
  english_pob_reading: Ask what I should give you.
  chosen_spanish_reading: Pide lo que yo te dé
  alternative_spanish_readings:
  - Pide qué te daré
  - Pide lo que yo te daré
  - Pide lo que debería darte
  rationale: 'El hebreo literalmente puede leerse como «qué te daré». En español, dentro de un imperativo, una cláusula de relativo con subjuntivo («lo que yo te dé») preserva el carácter abierto de la solicitud y evita una construcción menos natural. No se cambia el sentido: sigue siendo una invitación a pedir un don de parte de Dios.'
  doctrine_reference: Sintaxis hebrea; Traducción §1
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto hebreo y el seguimiento inglés: la única tensión principal está en la relación entre la pregunta hebrea «qué daré» y la formulación española más natural tras un imperativo. La versión española conserva esa tensión sin domesticarla ni añadir contenido.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en singular por la concordancia verbal y el contexto de teofanía.
  - Se prefirió «se apareció» para conservar la fuerza narrativa del nifal sin volverlo demasiado interpretativo.
  - Se usó «pide» como imperativo directo y no «pregunta», porque el contexto es una invitación a solicitar un don.
  - Se evitó el calco «qué te daré» en el texto principal por fluidez, pero se preservó en nota como alternativa más literal.
