translation:
  language: es
  text: La espada[a] se arremolinará por sus ciudades, y consumirá sus cerrojos[b], y devorará por causa de sus planes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «caerá en sus ciudades» o «rugirá en sus ciudades». El verbo hebreo es difícil y puede indicar un movimiento de giro, caída o furia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus cerrojos de puerta»; algunos entienden el hebreo como «sus gobernantes», pero el contexto de ciudades sitiadas favorece defensas físicas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְחָלָה
  english_pob_choice: will whirl through
  chosen_spanish: pasará como torbellino
  alternatives_spanish:
  - caerá
  - se agitará
  - irrumpirá con furia
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y el contexto de la espada pide una imagen de movimiento violento y devastador. En español, "pasará como torbellino" conserva la fuerza poética sin reducirlo a una mera caída ni suavizarlo en exceso.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la guerra
  - la hoja
  lexicon: HALOT
  rationale: El sustantivo es singular y concreto; "espada" mantiene la imagen bélica exacta del hebreo.
- source_word: בְּעָרָיו
  english_pob_choice: through his cities
  chosen_spanish: por sus ciudades
  alternatives_spanish:
  - en sus ciudades
  - contra sus ciudades
  lexicon: HALOT
  rationale: El valor básico de la preposición es "en", pero con un verbo de movimiento destructivo, "por sus ciudades" comunica mejor el tránsito devastador de la espada en español natural.
- source_word: וְכִלְּתָה
  english_pob_choice: will consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - acabará con
  - destruirá completamente
  lexicon: HALOT
  rationale: '"Consumir" reproduce bien el matiz de llevar hasta el fin o devorar hasta agotar, y además mantiene el paralelismo con el verbo siguiente.'
- source_word: בַדָּיו
  english_pob_choice: his bars
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus barras
  - sus puertas
  - sus gobernantes
  lexicon: HALOT
  rationale: En el contexto de asedio y ciudades atacadas, el sentido físico de defensas urbanas es el más probable. "Cerrojos" funciona de manera clara en español para los elementos que cierran y aseguran puertas o entradas, sin imponer una interpretación de "gobernantes" que el contexto inmediato no favorece.
- source_word: וְאָכָלָה
  english_pob_choice: and devour
  chosen_spanish: y devorará
  alternatives_spanish:
  - y comerá
  - y consumirá
  lexicon: HALOT
  rationale: '"Devorar" conserva la personificación fuerte del hebreo y el tono de juicio profético. No hace falta suplir un objeto en español, ya que el verso continúa con la idea de destrucción general.'
- source_word: מִמֹּעֲצוֹתֵיהֶם
  english_pob_choice: because of their counsels
  chosen_spanish: por causa de sus consejos
  alternatives_spanish:
  - a causa de sus planes
  - por sus designios
  - desde sus consejos
  lexicon: HALOT
  rationale: El prefijo מן tiene aquí fuerza causal. "Por causa de" expresa claramente la relación de motivo/culpa, y "consejos" mantiene el vínculo léxico con עצה sin convertirlo en una paráfrasis más libre como "designios".
theological_decisions:
- issue: Tensión de sufijos singulares y plurales ("sus ciudades... sus cerrojos... sus consejos")
  english_pob_reading: The Hebrew shifts from singular suffixes to a final plural suffix. Preserving that tension is preferable to smoothing it away, since the singular may personify Israel/Ephraim as a corporate son while the plural points to the people's counsels.
  chosen_spanish_reading: Se conservan los posesivos singulares en "sus ciudades" y "sus cerrojos", y también el plural implícito de "sus consejos", sin armonizar artificialmente los referentes.
  alternative_spanish_readings:
  - 'armonizar todo en plural: "sus ciudades... sus cerrojos... sus consejos"'
  - unificar el pasaje en un referente colectivo más explícito
  rationale: El hebreo preserva una oscilación significativa entre sujeto singular corporativo y plural colectivo. La traducción española no debe borrar esa tensión con una normalización excesiva.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al evitar un objeto explícito innecesario con "devorará" y al mantener la expresión causal final. También conserva la elección difícil del verbo inicial mediante una imagen equivalente en español.
  spanish_consistency_notes:
  - Se usa "espada" de forma singular, como en el hebreo.
  - Se mantiene "sus" para reflejar la secuencia de sufijos del texto hebreo.
  - '"Consejos" se conserva como término profético y no se sustituye por una palabra más interpretativa.'
  - El registro es sobrio y bíblico, pero con español natural para lectura pública.
