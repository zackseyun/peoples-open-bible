    issue: Forma corrupta y poco natural en «desnudaráс»
    rationale: Además del carácter cirílico final, la forma verbal no corresponde a la segunda persona requerida por el hebreo. «Desnudar la viña» suena forzado en español; el sentido es no rebuscarla exhaustivamente después de la cosecha principal.
  - severity: high
    issue: «granos caídos» no refleja el referente de פֶּרֶט en una viña
    rationale: En contexto de viñedo/viña, el objeto son uvas, no granos. La elección actual introduce una imagen agrícola equivocada.
  - severity: high
    issue: «Yo soy Yahvé, su Dios» cambia la persona gramatical del hebreo
    rationale: אֱלֹהֵיכֶם es segunda persona plural, ‘su Dios’ puede ser ambiguo o sonar a tercera persona en muchos contextos. Debe preservarse la relación directa del pacto con el auditorio.
  - severity: medium
    issue: Falta la alternativa de «uvas caídas/lo caído» en nota para פֶּרֶט
    rationale: El inglés auditado conserva una nota léxica para el referente de פֶּרֶט. En español conviene explicitar esa alternativa, especialmente al corregir la imagen agrícola.
