  - severity: medium
    issue: Forma «Ramá» menos natural y menos estable en español bíblico
    rationale: Para רָמָה, la alternativa española más reconocible y legible es «Rama». El acento gráfico en «Ramá» no es necesario y suena artificial en una lista de topónimos bíblicos.
  - severity: low
    issue: La nota española añade «Guitaim» sin apoyo en la auditoría inglesa
    rationale: La evidencia auditada solo preserva como alternativa «Gittayim». Añadir «Guitaim» introduce una opción no documentada y potencialmente innecesaria.
