translation:
  language: es
  text: 'Entonces Hiram envió a Salomón, diciendo: «He oído lo que me enviaste[a]. Haré todo tu deseo en cuanto a madera de cedro y madera de ciprés[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que me pediste». El hebreo dice más literalmente «lo que me enviaste», que puede referirse al mensaje de Salomón como una petición.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo בְּרוֹשִׁים; la especie exacta es incierta. También puede traducirse «juníperos» o «abetos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; «Entonces» conserva la secuencia narrativa de modo natural en español sin perder el valor de avance del verbo.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Introducción idiomática de discurso directo en español; «diciendo» mantiene el enlace verbal sin añadir interpretación.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una noticia recibida con efecto presente; «he oído» reproduce bien esa fuerza en español y suena natural en el contexto.
- source_word: אֵת אֲשֶׁר שָׁלַחְתָּ אֵלַי
  english_pob_choice: what you sent to me
  chosen_spanish: lo que me enviaste
  alternatives_spanish:
  - lo que me mandaste
  - el mensaje que me enviaste
  - lo que enviaste a mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «lo que enviaste a mí»; en español, «me enviaste» conserva la referencia directa al envío y evita sobreinterpretar el objeto como «mensaje» o «petición» en el cuerpo principal.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: Haré
  alternatives_spanish:
  - Haceré
  - Voy a hacer
  - Proveeré
  lexicon: HALOT
  rationale: «Hacer» preserva la amplitud de עשה sin estrecharlo a «proveer» o «actuar»; la futura simple es la forma natural en español.
- source_word: כָּל חֶפְצְךָ
  english_pob_choice: all your desire
  chosen_spanish: todo tu deseo
  alternatives_spanish:
  - todo lo que deseas
  - todo tu querer
  - toda tu voluntad
  lexicon: HALOT
  rationale: חֵפֶץ abarca deseo, querer o deleite; «todo tu deseo» sigue de cerca el valor semántico que el POB inglés preservó y es claro en español.
- source_word: בַּעֲצֵי אֲרָזִים
  english_pob_choice: concerning cedar timber
  chosen_spanish: en cuanto a madera de cedro
  alternatives_spanish:
  - con madera de cedro
  - respecto de madera de cedro
  - en materia de madera de cedro
  lexicon: HALOT
  rationale: El ב se entiende como delimitación del ámbito o asunto; «en cuanto a» evita la lectura estrictamente instrumental y encaja con el compromiso de Hiram respecto de esa provisión.
- source_word: וּבַעֲצֵי בְרוֹשִׁים
  english_pob_choice: and cypress timber
  chosen_spanish: y madera de ciprés
  alternatives_spanish:
  - y madera de junípero
  - y madera de abeto
  - y madera de pino
  lexicon: HALOT
  rationale: Se mantiene la equivalencia común de בְרוֹשׁ como «ciprés», acorde con el contexto de maderas de construcción; se preserva la tensión lexicográfica sin forzar una especie más específica.
translation_notes:
  revision_awareness: El texto inglés POB base se mantiene sin revisiones sustantivas; la versión española sigue el mismo criterio de equivalencia óptima y conserva la ambigüedad de אֵת אֲשֶׁר שָׁלַחְתָּ אֵלַי y de בְּרוֹשִׁים en notas, sin incorporar una paráfrasis interpretativa en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «madera de cedro» y «madera de ciprés» para mantener el paralelismo material del hebreo.
  - «Lo que me enviaste» preserva la literalidad base del hebreo y deja abierta la alternativa de petición en la nota.
  - No se introduce «Cristo», «SEÑOR» ni vocabulario eclesiástico no presente en el original.
