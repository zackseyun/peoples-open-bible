base_translation:
  language: en
  yaml_path: translation/ot/2_kings/006/032.yaml
  text: Now Elisha was sitting in his house[a], and the elders were sitting with him. And the king had sent a man from before him, but before the messenger came to him, he said to the elders, “Do you see how this son of a murderer has sent to take away my head? Look, when the messenger comes, shut the door and press him back at the door[b]. Is not the sound of his master’s feet behind him?”
  footnotes:
  - marker: a
    text: Or “to cut off my head.” The Hebrew literally says “to take away my head,” an idiom for execution by beheading.
    reason: lexical_alternative
  - marker: b
    text: “Messenger” here refers to a human royal envoy, not an angel.
    reason: cultural_note
