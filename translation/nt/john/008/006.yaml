id: JHN.8.6
reference: John 8:6
source:
  edition: robinson-pierpont-2005-byzantine
  text: Τοῦτο δὲ ἔλεγον πειράζοντες αὐτόν, ἵνα ἔχωσιν κατηγορίαν κατ' αὐτοῦ. Ὁ δὲ
    Ἰησοῦς κάτω κύψας, τῷ δακτύλῳ ἔγραφεν εἰς τὴν γῆν, μὴ προσποιούμενος.
  language: Greek
translation:
  text: They[a] were saying this to test him, so that they might have an accusation
    against him. But Jesus, bending down, wrote on the ground with his finger, paying
    no attention.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuation of the story of the woman caught in adultery (John 7:53–8:11).
      See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: πειράζω
  chosen: to test
  alternatives:
  - to tempt
  - to trap
  lexicon: BDAG
  rationale: While often translated as 'tempt,' in this context the scribes and Pharisees
    are attempting to trap Jesus in a legal and theological dilemma, making 'test'
    the most accurate rendering of their malicious intent.
- source_word: κατηγορία
  chosen: accusation
  alternatives:
  - charge
  - complaint
  lexicon: BDAG
  rationale: Refers to a formal legal charge or accusation, fitting the context of
    the Mosaic law they had just cited to him.
- source_word: προσποιέομαι
  chosen: paying no attention
  alternatives:
  - as though he did not hear
  - ignoring them
  lexicon: BDAG
  rationale: The participle with the negative particle (μὴ) indicates acting as if
    one does not notice or hear something. 'Paying no attention' captures this deliberate
    ignoring naturally in English.
