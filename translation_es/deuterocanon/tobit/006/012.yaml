translation:
  language: es
  text: Hablaré acerca de ella[a], para que te sea dada por esposa, porque su herencia te corresponde, y tú solo eres de su familia[b]; y la joven es hermosa y prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de ella». El griego permite simplemente «hablar de/con respecto a ella»; aquí se mantiene un español natural sin añadir la idea de abogar por ella.
    reason: lexical_alternative
  - marker: b
    text: O, «de su parentela». El griego puede referirse a familia, parentela o linaje; «familia» es la opción más clara en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλήσω περὶ αὐτῆς
  english_pob_choice: I will speak about her
  chosen_spanish: Hablaré acerca de ella
  alternatives_spanish:
  - Hablaré de ella
  - Hablaré sobre ella
  lexicon: BDAG
  rationale: El futuro de λαλέω con περὶ + genitivo expresa hablar acerca de alguien. «Acerca de ella» mantiene el valor relacional sin añadir la idea de defensa que no está explícita en el griego.
- source_word: τοῦ δοθῆναί σοι αὐτὴν εἰς γυναῖκα
  english_pob_choice: that she may be given to you as a wife
  chosen_spanish: para que te sea dada por esposa
  alternatives_spanish:
  - para que te la den como esposa
  - para que te sea dada como esposa
  lexicon: BDAG
  rationale: El infinitivo articular con τοῦ expresa finalidad. «Por esposa» es una forma natural y digna en español que conserva el sentido matrimonial de εἰς γυναῖκα sin sonar forzada.
- source_word: σοὶ ἐπιβάλλει ἡ κληρονομία αὐτῆς
  english_pob_choice: her inheritance belongs to you
  chosen_spanish: su herencia te pertenece
  alternatives_spanish:
  - su herencia te corresponde
  - sobre ti recae su herencia
  lexicon: BDAG
  rationale: ἐπιβάλλει aquí señala una reclamación o derecho legal ligado al parentesco. «Te pertenece» comunica bien la idea jurídica en español; «te corresponde» sería posible, pero menos explícito sobre la herencia misma.
- source_word: σὺ μόνος εἶ ἐκ τοῦ γένους αὐτῆς
  english_pob_choice: you alone are of her family
  chosen_spanish: tú solo eres de su familia
  alternatives_spanish:
  - tú solo eres de su parentela
  - tú solo eres de su linaje
  lexicon: BDAG
  rationale: γένος puede ser familia, parentela o linaje. «De su familia» es claro y conserva el contexto de parentesco matrimonial e hereditario.
- source_word: τὸ κοράσιον
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  lexicon: BDAG
  rationale: κοράσιον puede significar muchacha o joven mujer. En un contexto de matrimonio, «la joven» suena natural y evita una tonalidad infantil.
- source_word: καλὸν
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  lexicon: BDAG
  rationale: En este contexto, καλός describe atractivo físico. «Hermosa» es clara, digna y suficientemente cercana al valor del original.
- source_word: φρόνιμόν
  english_pob_choice: sensible
  chosen_spanish: prudente
  alternatives_spanish:
  - sensata
  - sabia
  lexicon: BDAG
  rationale: φρόνιμος denota buen juicio, prudencia y sensatez práctica. «Prudente» conserva mejor el matiz de juicio sólido que «sensible» en español bíblico.
theological_decisions:
- issue: Fundamento legal y de parentesco para el matrimonio
  english_pob_reading: because her inheritance belongs to you, and you alone are from her family
  chosen_spanish_reading: porque su herencia te pertenece, y tú solo eres de su familia
  alternative_spanish_readings:
  - porque te corresponde heredarla como pariente
  - porque el derecho sobre su herencia recae en ti, y tú solo eres de su parentela
  rationale: La frase presenta una lógica jurídico-familiar, no una formulación doctrinal. La traducción conserva ese fundamento sin explicitar costumbres ajenas al texto ni suavizar la tensión legal del pasaje.
  doctrine_reference: Principio de equivalencia óptima; preservar el sentido social-jurídico del texto fuente
- issue: Descripción de la joven con atributos físicos y morales
  english_pob_reading: the young woman is beautiful and sensible
  chosen_spanish_reading: la joven es hermosa y prudente
  alternative_spanish_readings:
  - la joven es bella y sensata
  - la muchacha es hermosa y de buen juicio
  rationale: El griego une una cualidad estética y una cualidad de prudencia. La traducción conserva ambas sin moralizar ni ampliar el retrato más allá de lo que dice el texto.
  doctrine_reference: No doctrinal issue; lexical-theological precision in characterization
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del POB inglés: se mantuvo la formulación directa con «para que»/«que» para expresar finalidad, se prefirió «te pertenece» para la herencia por su claridad jurídica, y se conservó un registro más formal con «de su familia».'
  spanish_consistency_notes:
  - Se usó «herencia» para κληρονομία de manera consistente con el valor jurídico del pasaje.
  - Se evitó «Cristo/Mesías» porque no aparece en este versículo.
  - Se eligió «prudente» para φρόνιμος por su fuerza ética-práctica en español bíblico.
  - Se mantuvo un registro neutral y eclesiásticamente legible sin recurrir a arcaísmos innecesarios.
