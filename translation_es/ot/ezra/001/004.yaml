  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» y «casa de Dios» están bien. No aparece el nombre divino ni términos sensibles como «Mesías» o «Yahvé». La decisión de mantener «los hombres de su lugar» concuerda con el rastro auditado de género marcado.
