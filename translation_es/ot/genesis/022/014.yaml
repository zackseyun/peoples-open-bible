revisions:
- from: 'Y Abraham llamó el nombre de aquel lugar «Yahvé ve[a]», como se dice hasta hoy[b]: «En el monte de Yahvé será visto».'
  to: 'Y Abraham llamó el nombre de aquel lugar «Yahvé verá[a]», como se dice hasta hoy[b]: «En el monte de Yahvé será visto».'
  rationale: Se corrige «ve» a «verá» para reflejar fielmente el imperfecto hebreo יִרְאֶה y para que el nombre del lugar mantenga el juego verbal con el dicho posterior. También se ajustan las notas para conservar coherencia temporal y ofrecer alternativas realmente informativas en español.
