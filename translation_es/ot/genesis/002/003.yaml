translation:
  language: es
  text: Así, Dios bendijo el séptimo día y lo santificó[a], porque en él reposó[b] de toda su obra que Dios había creado para hacer[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo hizo santo» o «lo apartó como santo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cesó»; el verbo también puede significar «dejó de» o «interrumpió».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «que Dios había creado para hacer». La expresión final es difícil; también puede entenderse como «que Dios había creado y hecho» o «que Dios había creado al hacerlo».'
    reason: alternative_reading
  - marker: d
    text: 'Otra traducción anterior: «que Dios había creado para hacer».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  lexicon: HALOT
  rationale: ברך en piel expresa impartir bendición; en español, «bendijo» es natural, directo y conserva la acción divina sobre el día sin expandirla innecesariamente.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En Génesis 1–2 el referente es el único Dios verdadero; «Dios» conserva el valor singular del hebreo con acuerdo verbal singular.
- source_word: יּוֹם הַשְּׁבִיעִי
  english_pob_choice: the seventh day
  chosen_spanish: el séptimo día
  lexicon: HALOT
  rationale: Es la equivalencia más natural y fiel del sintagma nominal con ordinal en español.
- source_word: וַיְקַדֵּשׁ אֹתוֹ
  english_pob_choice: made it holy
  chosen_spanish: lo hizo santo
  alternatives_spanish:
  - lo santificó
  - lo apartó como santo
  lexicon: HALOT
  rationale: קדש en piel significa consagrar o hacer santo. «Lo hizo santo» mantiene la idea de conferir santidad sin recurrir a una fórmula eclesiástica más cargada («santificó») ni a una explicación más interpretativa.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la bendición y de la consagración del día; «porque» es claro y plenamente idiomático en español contemporáneo.
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en ese día
  lexicon: HALOT
  rationale: Con antecedente temporal, el español admite «en él» para conservar la referencia al día sin forzar una perífrasis menos compacta.
- source_word: שָׁבַת
  english_pob_choice: rested
  chosen_spanish: reposó
  alternatives_spanish:
  - cesó
  lexicon: HALOT
  rationale: El verbo puede significar cesar o desistir, pero en el contexto de la creación la idea de descanso/reposo comunica bien la conexión sabática sin sugerir fatiga divina. «Cesó» queda como alternativa más estrictamente aspectual.
- source_word: מִכָּל מְלַאכְתּוֹ
  english_pob_choice: from all his work
  chosen_spanish: de toda su obra
  alternatives_spanish:
  - de todo su trabajo
  - de toda su labor
  lexicon: HALOT
  rationale: מלאכה abarca trabajo/obra/actividad. Aquí «obra» funciona bien para el conjunto de la actividad creadora y suena más digno que «trabajo» en español bíblico, sin perder amplitud semántica.
- source_word: אֲשֶׁר בָּרָא אֱלֹהִים
  english_pob_choice: that God had created
  chosen_spanish: que Dios había creado
  alternatives_spanish:
  - que Dios creó
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja adecuadamente la anterioridad respecto al reposo del séptimo día y sigue la lectura auditada del inglés POB.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to make / to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para hacerla
  - para obrar
  lexicon: HALOT
  rationale: La construcción final es difícil. «Para hacer» conserva la forma verbal y la ambigüedad del hebreo entre ‘hacer’ y ‘obrar’ sin resolverla de manera excesiva; mantiene la tensión documentada en el texto fuente.
theological_decisions:
- issue: Descanso divino y conexión sabática en שָׁבַת
  english_pob_reading: rested
  chosen_spanish_reading: reposó
  alternative_spanish_readings:
  - cesó
  rationale: «Reposó» preserva la relación teológica con el día de reposo y evita sugerir cansancio divino. A la vez, no elimina la posibilidad semántica de ‘cesar’, que queda reconocida como alternativa.
  doctrine_reference: Teología del sábado / creación; mantener la tensión léxica sin resolverla unilateralmente
- issue: Consagración del séptimo día en וַיְקַדֵּשׁ אֹתוֹ
  english_pob_reading: made it holy
  chosen_spanish_reading: lo hizo santo
  alternative_spanish_readings:
  - lo santificó
  - lo apartó como santo
  rationale: La formulación conserva la santidad como atributo conferido al día y evita la jerga litúrgica que podría sonar más técnica o menos transparente para lectores modernos.
  doctrine_reference: Santidad del tiempo; equivalencia optimal y lenguaje bíblico claro
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión del inglés POB, especialmente la oscilación entre «that God had created and made» y la forma más literal «that God had created to make». En español se optó por «que Dios había creado para hacer» para conservar la dificultad sintáctica señalada en el audit trail, sin forzar una resolución interpretativa que elimine la tensión del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en coherencia con Génesis 1–2.
  - Se usa «séptimo día» como calco natural del ordinal hebreo.
  - Se preserva la distinción entre «reposó» y «cesó» mediante nota de alternativa lexical.
  - «Hizo santo» evita reemplazar el lenguaje de santidad por una paráfrasis secularizada.
  - La cláusula final conserva la ambigüedad del original y queda apoyada por notas para transparencia auditiva.
