translation:
  language: es
  text: Porque tu amor constante[a] es grande hasta los cielos, y tu fidelidad hasta las nubes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “tu amor leal”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la alabanza precedente. "Porque" conserva bien el valor causal en español y suena natural en el tono poético del versículo.
- source_word: גָדֹל
  english_pob_choice: is great
  chosen_spanish: es grande
  alternatives_spanish:
  - es muy grande
  - es inmenso
  lexicon: HALOT
  rationale: El adjetivo predica magnitud. "Es grande" reproduce de forma sobria la afirmación de amplitud sin añadir intensidad no requerida por el hebreo.
- source_word: עַד שָׁמַיִם
  english_pob_choice: to the heavens
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - hasta los cielos mismos
  - a los cielos
  lexicon: HALOT
  rationale: La preposición marca extensión. "Hasta los cielos" expresa el alcance vertical de manera idiomática en español y mantiene la imagen poética del hebreo.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu fiel amor
  alternatives_spanish:
  - tu amor constante
  - tu amor leal
  - tu misericordia
  lexicon: HALOT
  rationale: חֶסֶד reúne amor, lealtad y constancia de pacto. "Fiel amor" intenta conservar esa unión de afecto y fidelidad sin recurrir a un calco pesado; evita también reducirlo a "misericordia", que estrecha demasiado el sentido.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las alturas
  lexicon: HALOT
  rationale: En poesía hebrea puede referirse a nubes o a los altos cielos. "Las nubes" conserva la imagen concreta y el paralelismo con "los cielos".
- source_word: אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu veracidad
  - tu confiabilidad
  lexicon: HALOT
  rationale: En este paralelismo, אֱמֶת describe la fiabilidad del carácter de Dios. "Fidelidad" comunica mejor esa noción relacional y de pacto que "verdad" en español, aunque se reconoce la alternativa semántica.
theological_decisions:
- issue: Cómo rendir la pareja חֶסֶד / אֱמֶת en un paralelismo de atributos divinos
  english_pob_reading: Translate חֶסֶד as 'steadfast love' and אֱמֶת as 'faithfulness'
  chosen_spanish_reading: Traducir חֶסֶד como "fiel amor" y אֱמֶת como "fidelidad"
  alternative_spanish_readings:
  - '"amor constante" y "verdad"'
  - '"amor leal" y "veracidad"'
  - '"misericordia" y "verdad"'
  rationale: El versículo alaba el carácter de Dios en términos de amor leal y confiable. "Fiel amor" busca retener el matiz de pacto de חֶסֶד sin perder naturalidad, y "fidelidad" preserva la idea de confiabilidad activa que el paralelismo con חֶסֶד sugiere. Se evita "verdad" como opción principal porque en español puede sonar más proposicional que relacional en este contexto poético.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección menor de estilo, de 'great up to the heavens' a 'great to the heavens'; la lectura subyacente no cambió. La versión española sigue directamente el hebreo y conserva el paralelismo, sin depender de la redacción inglesa intermedia.
  spanish_consistency_notes:
  - Se usa "Yahvé" en el proyecto cuando el hebreo contiene el nombre divino, pero este versículo no lo presenta explícitamente.
  - '"Cielos" mantiene el registro poético; "nubes" conserva la imagen concreta del paralelismo.'
  - Se prioriza lenguaje natural en español sin perder la tensión semántica entre amor leal, constancia y fidelidad.
