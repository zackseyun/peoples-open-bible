translation:
  language: es
  text: Y la tierra, porque entonces recibió misericordia y porque sus habitantes no pecaron, fue glorificada por encima de todas las tierras; y la ciudad de Sion entonces gobernó sobre todas las tierras y regiones.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: land
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: land
  rationale: «La tierra» conserva el valor geográfico amplio del pasaje y permite la antítesis con «todas las tierras y regiones» sin restringir indebidamente el alcance.
- source_word: received mercy
  english_pob_choice: received mercy
  chosen_spanish: recibió misericordia
  alternatives_spanish:
  - halló misericordia
  - obtuvo compasión
  lexicon: mercy
  rationale: «Recibió misericordia» sigue de cerca la acción recibida en el original y mantiene el tono pasivo-teológico de favor concedido.
- source_word: sin
  english_pob_choice: did not sin
  chosen_spanish: no pecaron
  alternatives_spanish:
  - no cometieron pecado
  - no hicieron mal
  lexicon: sin
  rationale: «Pecar» es la correspondencia más directa y clara en español para una ausencia de transgresión moral.
- source_word: glorified
  english_pob_choice: was glorified
  chosen_spanish: fue glorificada
  alternatives_spanish:
  - quedó glorificada
  - resultó glorificada
  lexicon: glorify
  rationale: La forma pasiva preserva la elevación recibida por la tierra sin introducir una lectura reflexiva o activa no atestiguada.
- source_word: ruled
  english_pob_choice: then ruled over all lands
  chosen_spanish: entonces gobernó sobre todas las tierras y regiones
  alternatives_spanish:
  - entonces reinó sobre todas las tierras y regiones
  - entonces dominó sobre todas las tierras y regiones
  lexicon: rule
  rationale: «Gobernó sobre» es más natural en español que un calco de «regir sobre», y conserva la amplitud política del dominio de Sion.
- source_word: then
  english_pob_choice: then ruled over all lands
  chosen_spanish: entonces gobernó
  alternatives_spanish:
  - después gobernó
  - luego gobernó
  lexicon: temporal adverb
  rationale: Se mantiene el adverbio temporal para reflejar el matiz revisado del Syriac y el énfasis cronológico del contexto histórico.
theological_decisions:
- issue: Exaltación de la tierra por misericordia y no pecado de sus habitantes
  english_pob_reading: the land, because it then received mercy, and because its inhabitants did not sin, was glorified above all lands
  chosen_spanish_reading: la tierra, porque entonces recibió misericordia y porque sus habitantes no pecaron, fue glorificada sobre todas las tierras
  alternative_spanish_readings:
  - la tierra, ya que entonces obtuvo misericordia y porque sus habitantes no pecaron, fue exaltada sobre todas las tierras
  - la tierra, porque recibió misericordia en aquel tiempo y porque sus habitantes no pecaron, fue glorificada sobre todas las tierras
  rationale: Se conserva la relación causal entre misericordia, conducta de los habitantes y exaltación de la tierra, sin suavizar la afirmación ni desplazarla hacia una idea meramente decorativa de honra.
  doctrine_reference: 2 Baruch 61:7; divine favor and communal righteousness
- issue: Sion como entidad política que domina sobre territorios
  english_pob_reading: the city Zion then ruled over all lands and regions
  chosen_spanish_reading: la ciudad de Sion entonces gobernó sobre todas las tierras y regiones
  alternative_spanish_readings:
  - la ciudad de Sion entonces reinó sobre todas las tierras y regiones
  - la ciudad de Sion entonces dominó sobre todas las tierras y regiones
  rationale: «Gobernó» preserva la idea de autoridad efectiva sin forzar una connotación monárquica más fuerte que la necesaria; mantiene abierta la alternativa de «reinó» reflejada en la nota inglesa.
  doctrine_reference: 2 Baruch 61:7; Zion's historical-political supremacy
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; la revisión anterior añadió el matiz temporal «then» en la segunda cláusula. La presente redacción lo conserva mediante «entonces» en «entonces gobernó».
  spanish_consistency_notes:
  - Se mantiene «Sion» como forma habitual en español bíblico para el topónimo Zion.
  - Se usa «tierras y regiones» para reflejar el alcance amplio de lands and regions sin reducirlo a un solo ámbito político.
  - Se conserva la pasiva «fue glorificada» para no transformar la relación semántica del original en una activa.
