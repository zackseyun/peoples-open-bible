translation:
  language: es
  text: 'Clamé a ti[a], Yahvé; dije: «Tú eres mi refugio, mi porción en la tierra de los vivientes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé». El texto sigue el criterio del proyecto de verter el nombre divino como «Yahvé» en lugar de una sustitución titulada.
    reason: alternative_reading
lexical_decisions:
- source_word: זָעַקְתִּי
  english_pob_choice: I cried out
  chosen_spanish: Clamé
  alternatives_spanish:
  - Grité
  - Clamé con fuerza
  - Llamé
  lexicon: HALOT
  rationale: El verbo hebreo expresa un clamor intenso de auxilio. En español, «clamé» conserva ese tono súplice y más elevado que «grité», sin debilitar la urgencia del verbo original.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  - hacia ti
  lexicon: HALOT
  rationale: La preposición indica dirección del clamor. «A ti» es natural en español y mantiene la relación directa de oración.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé». En vocativo, el español fluye naturalmente sin añadir «Oh».'
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  - declaré
  lexicon: HALOT
  rationale: Es el verbo simple de enunciación. «Dije» reproduce la secuencia narrativa sin sobrecargar el matiz.
- source_word: אַתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú
  - Eres tú
  lexicon: HALOT
  rationale: El hebreo es enfático; en español la cópula es necesaria para una predicación natural. «Tú eres» conserva la confesión personal.
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi amparo
  - mi resguardo
  lexicon: HALOT
  rationale: «Refugio» es la equivalencia más estable y transparente para el sustantivo de protección/shelter, con buen encaje poético en los Salmos.
- source_word: חֶלְקִי
  english_pob_choice: my portion
  chosen_spanish: mi porción
  alternatives_spanish:
  - mi parte
  - mi herencia
  lexicon: HALOT
  rationale: «Porción» preserva la idea de cuota asignada o heredad devocional. «Herencia» sería más interpretativa aquí.
- source_word: בְּאֶרֶץ הַחַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los que viven
  - entre los vivos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo bien establecido para la esfera de la vida terrenal frente a la muerte. «Tierra de los vivientes» es fiel y digno en español.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto, no un título genérico. La política del proyecto en español es transliterarlo como «Yahvé», manteniendo la distinción con títulos como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; por ello se mantiene la estructura, el sentido y el tono del original, con adaptación española natural y sin ampliar el alcance semántico.
  spanish_consistency_notes:
  - Se mantuvo el vocativo del nombre divino como «Yahvé» conforme al proyecto.
  - «Clamé» reproduce el valor intenso de זָעַקְתִּי sin cambiar el registro poético.
  - «Tierra de los vivientes» conserva el modismo hebreo y la antítesis implícita con la muerte.
  - La puntuación respeta la segmentación del hebreo y la cadencia del paralelismo poético.
