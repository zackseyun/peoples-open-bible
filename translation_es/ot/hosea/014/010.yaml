revisions:
- from: ¿Quién es sabio? Que entienda estas cosas[a]. ¿Quién es prudente? Que las conozca. Porque rectos son los caminos de Yahvé, y los justos caminarán en ellos[b], pero los transgresores tropezarán en ellos.
  to: ¿Quién es sabio? Que entienda estas cosas. ¿Quién es entendido? Que las conozca. Porque los caminos de Yahvé son rectos[a], y los justos caminan en ellos, pero los transgresores[b] tropiezan en ellos.
  rationale: Se reubica la nota lexical sobre יְשָׁרִים al término correcto («rectos»), se mueve la nota sobre פֹשְׁעִים al término «transgresores», se ajusta «prudente» a «entendido» para reflejar mejor נָבוֹן en paralelo con «sabio», y se ponen los verbos finales en presente gnómico para un español más natural y sapiencial. Todo ello preserva fielmente el sentido fuente y el razonamiento lexical documentado.
  reviewer_model: gpt-5.4
