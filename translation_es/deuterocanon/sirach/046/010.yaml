translation:
  language: es
  text: para que toda la descendencia de Jacob sepa que es bueno seguir[a] plenamente a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: ''todos los hijos de Israel'' en lugar de ''toda la descendencia de Jacob''.'
    reason: alternative_reading
  - marker: b
    text: El hebreo detrás de 'seguir plenamente' usa un giro algo inusual; el paralelo griego apoya el sentido de 'caminar/ir tras el Señor', es decir, tras Yahvé.
    reason: textual_variant
lexical_decisions:
- source_word: למען / ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT; Greek ὅπως
  rationale: Expresa con naturalidad la finalidad del verbo de conocimiento en español y conserva el valor purposivo de ambas tradiciones textuales.
- source_word: דעת / ἴδωσιν
  english_pob_choice: may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: HALOT; BDAG/LXX usage
  rationale: En este contexto, el propósito es que el pueblo reconozca una verdad evaluativa; 'sepan' es natural y no exagera el matiz cognitivo.
- source_word: כל זרע יעקב / πάντες οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: all the offspring of Jacob
  chosen_spanish: todos los hijos de Jacob
  alternatives_spanish:
  - toda la descendencia de Jacob
  - todos los hijos de Israel
  lexicon: HALOT; Greek parallel
  rationale: Se conserva la base hebrea 'Jacob' como testimonio primario disponible, mientras 'hijos' comunica colectividad y filiación en español; 'descendencia' también sería posible, pero 'hijos' mantiene mejor el paralelismo con la variante griega.
- source_word: כי טוב
  english_pob_choice: that it is good
  chosen_spanish: que es bueno
  alternatives_spanish:
  - que es bueno y correcto
  - que es agradable
  lexicon: HALOT
  rationale: Mantiene la valoración moral/general del hebreo y del griego sin añadir matices no explicitados.
- source_word: למלא אחרי / πορεύεσθαι ὀπίσω
  english_pob_choice: fully follow
  chosen_spanish: seguir plenamente
  alternatives_spanish:
  - ir tras
  - caminar tras
  - seguir de cerca
  lexicon: HALOT; LXX πορεύεσθαι ὀπίσω
  rationale: '''Seguir plenamente'' refleja el juicio revisado de ''fully follow'' y conserva la fuerza idiomática de ''ir/caminar tras'' sin sonar forzado en español. Evita convertir prematuramente el giro en una mera abstracción de obediencia.'
- source_word: יהוה / Κυρίου
  english_pob_choice: Yahweh / the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahweh
  lexicon: Proyecto POB terminology default
  rationale: Se sigue el estándar del proyecto para el Tetragrama. La forma griega 'Señor' se entiende como paralelo de la misma referencia divina, pero no sustituye el nombre propio en el texto español.
theological_decisions:
- issue: Base textual hebrea versus paralelo griego en el descendiente/pueblo destinatario
  english_pob_reading: all the offspring of Jacob
  chosen_spanish_reading: todos los hijos de Jacob
  alternative_spanish_readings:
  - todos los hijos de Israel
  - toda la descendencia de Jacob
  rationale: La lectura hebrea conservada es prioritaria para esta sección de Sirácides; el paralelo griego ofrece una equivalencia interpretativa ('Israel') que se registra como alternativa porque afecta la formulación, no la doctrina.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; use Greek parallel as actual input'
- issue: Sentido del idiomático למלא אחרי
  english_pob_reading: fully follow the LORD
  chosen_spanish_reading: seguir plenamente a Yahvé
  alternative_spanish_readings:
  - caminar tras Yahvé
  - ir tras Yahvé
  - obedecer plenamente a Yahvé
  rationale: '''Seguir plenamente'' reproduce el sentido de dirección/alineación del hebreo y el griego, y refleja la revisión inglesa que añadió ''fully''. Se evita ''obedecer'' como primera opción porque adelanta una abstracción no obligatoria del texto.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que pasó de 'to follow after the LORD' a 'fully follow the LORD'. Por eso la versión española adopta 'seguir plenamente a Yahvé' para reflejar el matiz intensificado sin perder naturalidad ni el carácter idiomático del hebreo y del paralelo griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה, evitando el reemplazo reverencial por 'Señor' en el texto principal.
  - '''Hijos de Jacob'' conserva la base hebrea; la variante griega se documenta en nota porque no cambia el contenido doctrinal.'
  - '''Seguir plenamente'' mantiene la tensión entre un hebraísmo idiomático y la aclaración del paralelo griego, sin volverlo una paráfrasis libre.'
