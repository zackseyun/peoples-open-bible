translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: He levantado mi mano en juramento, que ciertamente las naciones que están alrededor de ustedes llevarán su deshonra[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «he levantado mi mano»; es un modismo para jurar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - el Señor Soberano
  lexicon: HALOT
  rationale: 'El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español conviene preservar ambos elementos sin ocultar el nombre propio: ''Yahvé'' para יְהוִה, y ''el Señor'' para אֲדֹנָי. Se evita ''SEÑOR'' como máscara tipográfica porque el proyecto pide transparencia del nombre divino.'
- source_word: נָשָׂאתִי אֶת יָדִי
  english_pob_choice: I have lifted up my hand in oath
  chosen_spanish: He levantado mi mano en juramento
  alternatives_spanish:
  - He levantado mi mano
  - He jurado
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'he levantado mi mano', un modismo de juramento. 'En juramento' conserva el valor idiomático sin perder la imagen corporal; 'he jurado' sería más interpretativo y borraría la metáfora.
- source_word: אִם לֹא
  english_pob_choice: that
  chosen_spanish: que ciertamente
  alternatives_spanish:
  - que sin duda
  - que de veras
  - si no
  lexicon: HALOT
  rationale: Después de una fórmula de juramento, אִם לֹא funciona de modo asseverativo, no como condicional simple. 'Que ciertamente' transmite esa función solemne en español y mantiene la fuerza enfática que el POB inglés marca con 'surely'.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto se trata de pueblos/naciones extranjeras alrededor de Israel. 'Naciones' es la opción más natural y evita importar el uso religioso posterior de 'gentiles'.
- source_word: מִסָּבִיב
  english_pob_choice: around you
  chosen_spanish: que están alrededor de ustedes
  alternatives_spanish:
  - alrededor de ustedes
  - que los rodean
  lexicon: HALOT
  rationale: La frase marca cercanía geográfica. Se amplía mínimamente con 'que están' para hacer natural la restricción relativa en español y reflejar el ajuste revisionado del POB inglés.
- source_word: כְּלִמָּתָם
  english_pob_choice: their disgrace
  chosen_spanish: su deshonra
  alternatives_spanish:
  - su vergüenza
  - su humillación
  - su reproche
  lexicon: HALOT
  rationale: כְּלִמָּה puede significar vergüenza, deshonra o humillación. 'Deshonra' funciona bien con 'llevar' y conserva el tono judicial/profético del texto, sin reducirlo a una interioridad psicológica.
- source_word: יִשָּׂאוּ
  english_pob_choice: will surely bear
  chosen_spanish: llevarán
  alternatives_spanish:
  - cargarán
  - soportarán
  - llevarán ciertamente
  lexicon: HALOT
  rationale: נשׂא aquí significa llevar/cargar una carga o consecuencia. En español 'llevarán su deshonra' reproduce bien el sentido de asumir y portar la culpa o vergüenza; la certeza queda ya reforzada por 'ciertamente'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוִה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El principio del proyecto exige traducir יְהוָה como 'Yahvé' y no ocultarlo bajo una convención reverencial. Al mismo tiempo, אֲדֹנָי sigue siendo 'el Señor'. La coma ayuda a mantener ambas piezas del título sin forzar una forma extraña en español.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para יְהוָה / YHWH; política de nombres divinos'
- issue: Valor de la fórmula de juramento con נָשָׂאתִי אֶת יָדִי + אִם לֹא
  english_pob_reading: I have lifted up my hand in oath that surely
  chosen_spanish_reading: He levantado mi mano en juramento, que ciertamente
  alternative_spanish_readings:
  - He jurado, que ciertamente
  - He levantado mi mano, que ciertamente
  rationale: La construcción profética no es una simple descripción gestual, sino una autoimprecación/juramento solemne. 'En juramento' preserva la imagen hebrea y 'ciertamente' conserva la fuerza asseverativa de אִם לֹא sin borrar la tensión literaria.
  doctrine_reference: HALOT; uso profético y jurídico del juramento en el AT
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB en el sentido de explicitar la certeza del juramento y hacer más cercana la restricción relativa de 'the nations that are around you'. La versión española conserva esa actualización con 'ciertamente' y 'que están alrededor de ustedes', sin perder la imagen idiomática hebrea de 'levantar la mano'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוִה conforme al estándar del proyecto.
  - Se conserva 'el Señor' para אֲדֹנָי dentro del título compuesto.
  - '''Naciones'' se usa para גּוֹיִם por contexto geopolítico, no ''gentiles''.'
  - '''Deshonra'' mantiene el matiz de כְּלִמָּה con tono profético/judicial.'
  - La nota al pie está anclada solo a 'juramento' porque la alternativa lexical relevante es la literalidad del hebreo.
