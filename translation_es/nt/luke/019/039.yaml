translation:
  language: es
  text: 'Y algunos de los fariseos de entre la multitud[a] le dijeron: «Maestro[b], reprende a tus discípulos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la multitud».
    reason: lexical_alternative
  - marker: b
    text: O «Maestro, reprende a tus discípulos»; también «Profesor» o «amo» no reflejan bien el sentido aquí. Otra posibilidad es «Instructor», pero «Maestro» es la opción natural y respetuosa en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: τινες introduce un grupo no especificado; «algunos» conserva esa indefinición con español natural y claro.
- source_word: τῶν Φαρισαίων
  english_pob_choice: of the Pharisees
  chosen_spanish: de los fariseos
  alternatives_spanish:
  - entre los fariseos
  lexicon: BDAG
  rationale: El genitivo partitivo señala que eran un subconjunto de los fariseos; «de los fariseos» refleja bien esa relación.
- source_word: ἀπὸ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: que estaban entre la multitud
  alternatives_spanish:
  - de la multitud
  - salidos de la multitud
  lexicon: BDAG
  rationale: ἀπό marca procedencia/origen; en este contexto la idea es que estos fariseos estaban dentro del grupo mayor de la multitud. La formulación evita una traducción demasiado mecánica y mantiene el matiz espacial.
- source_word: εἶπαν πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  lexicon: BDAG
  rationale: La fórmula narrativa se expresa de manera natural en español con «le dijeron», que conserva el valor direccional de πρός + acusativo sin sobretraducir.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro, [b]
  - Profesor
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió «Teacher», en español «Maestro» es la equivalencia más natural y respetuosa para el vocativo διδάσκαλος, y no añade una carga eclesiástica indebida.
- source_word: ἐπιτίμησον
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - repréndelos
  - censura
  lexicon: BDAG
  rationale: El imperativo aoristo exige una orden directa de censura verbal; «reprende» preserva el tono y la fuerza de ἐπιτιμάω en un español actual.
- source_word: τοῖς μαθηταῖς σου
  english_pob_choice: your disciples
  chosen_spanish: a tus discípulos
  alternatives_spanish:
  - a tus seguidores
  lexicon: BDAG
  rationale: μαθητής se traduce de forma consistente como «discípulo» en los Evangelios para conservar la relación maestro-discípulo y la terminología estable del NT.
theological_decisions:
- issue: Sentido de ἀπὸ τοῦ ὄχλου en relación con los fariseos
  english_pob_reading: from the crowd
  chosen_spanish_reading: que estaban entre la multitud
  alternative_spanish_readings:
  - de la multitud
  - salidos de la multitud
  rationale: La frase no sugiere que dejaran de ser fariseos, sino que pertenecían al grupo de la multitud presente. La redacción española conserva esa tensión sin resolverla de modo interpretativo excesivo.
  doctrine_reference: Principio de primacía del original y conservación del matiz relacional/espacial del texto.
- issue: Tratamiento del vocativo Διδάσκαλε
  english_pob_reading: Teacher
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Profesor
  rationale: En español, «Maestro» comunica el respeto y la función didáctica del vocativo con menor ambigüedad que «Señor», que podría introducir una lectura más confesional de la que el contexto inmediato exige.
  doctrine_reference: Evitar sobrerreligiosizar títulos cuando el texto presenta una dirección de habla pedagógica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo anclajes explícitos [a] y [b] en el texto español. Además, se ajustó el orden y la sintaxis para que las notas correspondan exactamente a los segmentos marcados.
  spanish_consistency_notes:
  - Se mantuvo «discípulos» para μαθηταί por coherencia con el NT.
  - Se evitó «SEÑOR» para el vocativo, siguiendo una solución más directa y fiel al contexto.
  - «reprende» conserva la fuerza imperativa del griego sin añadir matices de silencio o expulsión.
  - Las notas [a] y [b] están ancladas solo a los dos elementos con alternativa lexical real.
