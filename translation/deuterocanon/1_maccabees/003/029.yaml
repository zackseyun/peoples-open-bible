  text: καὶ εἶδεν ὅτι ἐξέλιπεν τὸ ἀργύριον ἀπὸ τῶν θησαυρῶν· καὶ οἱ φόροι τῆς χώρας ὀλίγοι χάριν τῆς διχοστασίας καὶ πληγῆς ἧς κατεσκεύασεν ἐπὶ τὴν γῆν, τοῦ ἆραι τὰ νόμιμα ἃ ἦσαν ἀφʼ ἡμερῶν τῶν πρώτων.
