id: 2TH.2.11
reference: 2 Thessalonians 2:11
source:
  edition: SBLGNT
  text: καὶ διὰ τοῦτο ⸀πέμπει αὐτοῖς ὁ θεὸς ἐνέργειαν πλάνης εἰς τὸ πιστεῦσαι αὐτοὺς τῷ ψεύδει,
translation:
  text: And because of this[a], God sends them a working of delusion so that they may believe the lie,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a deluding influence,' 'an activity of deception,' or traditionally 'a strong delusion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: The phrase is causal, pointing back to the preceding refusal to love the truth. 'Because of this' preserves the explicit causal force more clearly than the more inferential 'therefore.'
- source_word: πέμπει
  chosen: sends
  alternatives:
  - is sending
  - dispatches
  lexicon: BDAG
  rationale: Present indicative is naturally rendered as a present in English here. 'Sends' is straightforward and idiomatic, preserving the direct divine action stated in the Greek without softening it.
- source_word: ἐνέργειαν
  chosen: a working
  alternatives:
  - an activity
  - an operation
  - a powerful working
  lexicon: BDAG
  rationale: ἐνέργεια denotes operative power or effective working. 'A working' preserves the noun's sense of an active effect without overinterpreting it as either merely internal influence or miraculous power. 'Powerful working' is possible but adds emphasis not explicit in the noun alone.
- source_word: πλάνης
  chosen: of delusion
  alternatives:
  - of deception
  - of error
  - leading astray
  lexicon: BDAG
  rationale: πλάνη can denote deception, delusion, or wandering into error. In this context, where the result is believing falsehood, 'delusion' best captures the state/effect produced, while still allowing the sense of deceptive influence.
- source_word: ἐνέργειαν πλάνης
  chosen: a working of delusion
  alternatives:
  - a deluding influence
  - an activity of deception
  - a powerful delusion
  lexicon: BDAG
  rationale: The genitive is rendered transparently rather than collapsed into a more interpretive phrase. 'A working of delusion' keeps the Greek structure visible and preserves ambiguity between an active deluding force and an effective operation characterized by delusion.
- source_word: εἰς τὸ πιστεῦσαι
  chosen: so that they may believe
  alternatives:
  - for them to believe
  - resulting in their believing
  lexicon: BDAG
  rationale: The construction expresses purpose or result. 'So that they may believe' is natural English and preserves the teleological/resultative force without forcing a sharper distinction than the Greek requires.
- source_word: τῷ ψεύδει
  chosen: the lie
  alternatives:
  - the falsehood
  - what is false
  lexicon: BDAG
  rationale: The dative with πιστεύω is standard ('believe'). The singular with article likely points to a definite falsehood in context, especially tied to the deception surrounding the lawless one. 'The lie' preserves that specificity better than the more abstract 'falsehood'.
