translation:
  language: es
  text: ¿Adónde ha ido tu amado, la más hermosa entre las mujeres? ¿Adónde se ha vuelto[a] tu amado, para que lo busquemos contigo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha apartado». El verbo hebreo también puede sugerir un cambio de dirección, no solo movimiento en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֚נָה
  english_pob_choice: Where
  chosen_spanish: ¿Adónde
  alternatives_spanish:
  - ¿A dónde
  - ¿Dónde
  lexicon: HALOT
  rationale: La forma interrogativa expresa destino o dirección; en español, «adónde» conserva mejor esa orientación que «dónde».
- source_word: הָלַ֣ךְ
  english_pob_choice: has gone
  chosen_spanish: ha ido
  alternatives_spanish:
  - se fue
  - ha caminado
  lexicon: HALOT
  rationale: El perfecto hebreo pide una pregunta por la ubicación resultante de una salida ya ocurrida; «ha ido» suena natural y conserva el valor deceso/movimiento sin endurecer el estilo.
- source_word: דּוֹדֵ֔ךְ
  english_pob_choice: your beloved
  chosen_spanish: tu amado
  alternatives_spanish:
  - tu amado/a
  - tu amante
  lexicon: HALOT
  rationale: «Amado» preserva el registro poético y afectivo de דּוֹד sin introducir la fuerza moderna de «amante», que en español puede sonar más sexual o menos estable.
- source_word: הַ/יָּפָ֖ה בַּ/נָּשִׁ֑ים
  english_pob_choice: most beautiful among women
  chosen_spanish: oh la más hermosa entre las mujeres
  alternatives_spanish:
  - la más bella entre las mujeres
  - la hermosa entre las mujeres
  lexicon: HALOT
  rationale: La construcción con artículo funciona como superlativo en contexto; «la más hermosa entre las mujeres» mantiene la comparación implícita y la apelación retórica al destinatario.
- source_word: פָּנָ֣ה
  english_pob_choice: has turned
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha girado
  - se ha desviado
  lexicon: HALOT
  rationale: El verbo פנה conserva la imagen de cambio de dirección; «se ha vuelto» transmite ese giro sin limitarlo a una mera ida física.
- source_word: וּ/נְבַקְשֶׁ֖/נּוּ
  english_pob_choice: that we may seek him
  chosen_spanish: para que lo busquemos
  alternatives_spanish:
  - para buscarlo
  - y lo buscaremos
  lexicon: HALOT
  rationale: La forma verbal expresa finalidad o resultado previsto; «para que lo busquemos» refleja mejor esa función que una coordinación simple.
- source_word: עִמָּֽ/ךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto a ti
  lexicon: HALOT
  rationale: La preposición con sufijo de 2ª femenina singular se naturaliza en español como «contigo», manteniendo la idea de compañía en la búsqueda.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo WLC y se mantuvo la correspondencia con la traducción auditada en inglés: pregunta por el paradero del amado, vocativo «la más hermosa entre las mujeres», y segunda pregunta con finalidad de búsqueda. No se detectaron revisiones textuales relevantes en el paquete dado.'
  spanish_consistency_notes:
  - Se mantuvo «amado» para דּוֹד y no «Cristo» ni otra lectura alegórica no sustentada por el paquete.
  - Se eligió «adónde» por la orientación espacial de la pregunta y para conservar el paralelismo con la segunda interrogación.
  - Se usó «contigo» para naturalidad idiomática, sin perder el matiz de acompañamiento compartido en la búsqueda.
