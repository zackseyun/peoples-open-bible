translation:
  language: es
  text: 'Pero ella les dijo[a]: «No me llamen Noemí; llámenme Mara, porque el Todopoderoso me ha hecho muy amarga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noemí significa algo como «agradable» o «placentera», mientras que Mara significa «amarga».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But she said
  chosen_spanish: Pero ella les dijo
  alternatives_spanish:
  - Y ella dijo
  - Entonces ella dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración y, en este contexto de respuesta correctiva, «Pero» refleja bien el giro discursivo. «Les dijo» hace explícito el complemento pronominal femenino plural de contexto sin sonar forzado en español.
- source_word: אֲלֵיהֶן
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellas
  - les, a las mujeres
  lexicon: HALOT
  rationale: El sufijo pronominal es femenino plural; en español, «les» conserva la referencia indirecta sin necesidad de repetirla. El contexto identifica a las mujeres de Belén.
- source_word: אַל תִּקְרֶאנָה לִי
  english_pob_choice: Do not call me
  chosen_spanish: No me llamen
  alternatives_spanish:
  - No me nombren
  - No me digan
  lexicon: HALOT
  rationale: קרא con un nombre personal se traduce naturalmente como «llamar». «No me llamen» preserva el valor verbal directo del mandato y la forma plural femenina del hebreo.
- source_word: נָעֳמִי
  english_pob_choice: Naomi
  chosen_spanish: Noemí
  alternatives_spanish:
  - Naomi
  lexicon: HALOT
  rationale: Como nombre propio bíblico en español, «Noemí» es la forma establecida y legible. Mantiene la identificación personal sin alterar el sentido del verso.
- source_word: קְרֶאןָ לִי
  english_pob_choice: call me
  chosen_spanish: llámenme
  alternatives_spanish:
  - nómbrenme
  - llámenme por
  lexicon: HALOT
  rationale: El imperativo paralelo repite la orden con fuerza contrastiva. «Llámenme» reproduce el paralelismo con «No me llamen» y conserva el efecto retórico.
- source_word: מָרָא
  english_pob_choice: Mara
  chosen_spanish: Mara
  alternatives_spanish:
  - Mará
  - amargura
  lexicon: HALOT
  rationale: Aquí funciona como designación personal sustitutiva; por eso se translitera como nombre. El sentido de «amargo» se preserva en la nota y en la frase siguiente.
- source_word: הֵמַר
  english_pob_choice: has made me very bitter
  chosen_spanish: me ha amargado mucho
  alternatives_spanish:
  - me ha hecho muy amarga
  - ha amargado mucho mi vida
  lexicon: HALOT
  rationale: El hiphil de מרר expresa el causar amargura. «Me ha amargado mucho» es natural en español y conserva el juego de palabras con «Mara» (amarga).
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - Shaddai
  lexicon: HALOT
  rationale: Se trata de un título divino, no de un nombre personal. «El Todopoderoso» es la equivalencia tradicional y clara en español, equivalente funcional de la elección inglesa.
- source_word: לִי
  english_pob_choice: with me
  chosen_spanish: me
  alternatives_spanish:
  - conmigo
  - a mí
  lexicon: HALOT
  rationale: En español, con «amargar» el complemento natural es directo («me»). Aunque el hebreo usa una construcción dativa, la versión española conserva el sentido experiencial sin forzar una preposición antinatural.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: מְאֹד intensifica la acción. En este giro verbal, «mucho» transmite el aumento de intensidad de forma idiomática y mantiene el énfasis del hebreo.
theological_decisions:
- issue: Título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  - el Omnipotente
  rationale: El hebreo presenta un título divino con valor descriptivo. En español, «el Todopoderoso» comunica el sentido con claridad y preserva el registro reverente sin transliteración innecesaria.
  doctrine_reference: 'POB translation philosophy §2: traducir títulos; transliterar nombres propios cuando corresponda'
- issue: Juego de palabras entre Mara y la amargura
  english_pob_reading: Naomi means something like “pleasant,” while Mara means “bitter.”
  chosen_spanish_reading: Mara se relaciona con «amargo/amargada», y el verso dice que Yahvé le ha dado amargura.
  alternative_spanish_readings:
  - Mara significa «bitter»
  - Mara quiere decir «amargura»
  rationale: El verso mismo no explica los nombres, pero sí activa el contraste semántico entre Noemí y Mara. La traducción conserva esa tensión en el cuerpo del texto y la amplía en una nota para no perder el efecto literario.
  doctrine_reference: Principio POB de preservar tensiones léxicas documentadas
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una expresión más directa del hebreo para הֵמַר y para el juego de palabras con Mara. En español, «me ha amargado mucho» mantiene esa dirección revisada mejor que una paráfrasis más libre.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero en este versículo el hebreo dice שַׁדַּי, por lo que corresponde «el Todopoderoso».
  - Se mantiene el nombre propio bíblico en la forma española establecida «Noemí».
  - La construcción verbal se ajusta al español natural sin perder la equivalencia del hiphil causativo.
  - La nota al pie conserva el contraste léxico entre los nombres sin sobreexplicar el verso.
