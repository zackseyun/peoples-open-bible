revisions:
- from: El canto será para ustedes como en la noche en que se consagra una fiesta[a], y la alegría de corazón como el que va con flauta[b] para venir al monte de Yahvé[c], al Roca de Israel[d].
  to: El canto será para ustedes como en la noche en que se consagra una fiesta[a], y la alegría de corazón como quien va con flauta[b] para venir al monte de Yahvé[c], a la Roca de Israel[d].
  rationale: Se corrige el error gramatical grave «al Roca» por «a la Roca», tanto en el texto como en la nota correspondiente. También se mejora levemente la naturalidad de la comparación participial con «como quien va con flauta», manteniendo intacto el sentido del hebreo y del POB inglés.
