base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/003/001.yaml
  text: Then Solomon began to build the house of Yahweh in Jerusalem on Mount Moriah[a], where Yahweh had appeared to David his father, at the place that David had prepared[b], on the threshing floor of Ornan the Jebusite.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'where the LORD appeared to David his father.'
    reason: alternative_reading
  - marker: b
    text: Ornan is the name form used in Chronicles; compare Araunah in 2 Samuel 24:16, 18.
    reason: cross_reference
