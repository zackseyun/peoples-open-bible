translation:
  language: es
  text: 'Yahvé dijo a Moisés[a]: «He visto a este pueblo, y he aquí, es un pueblo de cerviz dura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «terco» u «obstinado». El hebreo usa literalmente «de cerviz dura», una metáfora de resistencia u obstinación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: se conserva el Tetragrámaton con una forma española transparente y auditable. ''Yahvé'' preserva el nombre del pacto sin sustituirlo por un título.'
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: En español, el flujo narrativo se mantiene de forma natural con 'dijo'; la conjunción inicial no es necesaria para la claridad y evitaría una repetición poco idiomática en una sola oración breve.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición de destinatario se expresa normalmente con 'a' en español.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  - He observado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con perfecto español para mantener la acción completada con relevancia inmediata en el discurso divino.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: '''Pueblo'' conserva el singular colectivo del hebreo y el demostrativo ''este'' reproduce el tono de cercanía distanciada del original.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y he aquí que
  - y mira bien
  lexicon: HALOT
  rationale: '''Mira'' mantiene la función discursiva de llamar la atención sin sonar arcaico; comunica el valor exhortativo/mostrativo de וְהִנֵּה en español actual.'
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - gente
  - una nación
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo colectivo 'pueblo' para reflejar el énfasis del hebreo.
- source_word: קְשֵׁה עֹרֶף
  english_pob_choice: stiff-necked
  chosen_spanish: de cerviz dura
  alternatives_spanish:
  - duro de cerviz
  - terco
  - obstinado
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. 'De cerviz dura' es una equivalencia fiel y publicable en español; evita aplanar el sentido con un simple 'terco', aunque ese sea el valor interpretativo subyacente.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - lo es
  - son
  lexicon: HALOT
  rationale: El verbo copulativo en español puede omitirse o expresarse con naturalidad; 'es' preserva la frase nominal sin forzar el género del colectivo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el criterio doctrinal del proyecto de no enmascarar el nombre del pacto con un título. 'Yahvé' es la forma española elegida para reproducir el nombre divino directamente y de manera auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idiomático קְשֵׁה עֹרֶף
  english_pob_reading: stiff-necked
  chosen_spanish_reading: de cerviz dura
  alternative_spanish_readings:
  - stubborn
  - terco
  - obstinado
  rationale: 'La POB en inglés preserva la metáfora hebrea y anota su sentido. En español se hace lo mismo: se retiene la imagen corporal para no perder la tensión lexical y teológica del reproche divino, dejando el valor interpretativo de resistencia/obstinación implícito.'
  doctrine_reference: Principio POB de conservar la metáfora del original cuando es inteligible y significativa
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra revisiones aplicadas; se conserva la lectura principal de la POB en inglés, con ajuste natural al español y con la metáfora hebrea mantenida en el sintagma final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva el singular colectivo con «pueblo» y el énfasis reiterado del original.
  - La metáfora «de cerviz dura» se mantiene para reflejar el hebreo y la nota ofrece la alternativa interpretativa habitual.
  - La puntuación y el orden de la frase buscan naturalidad en español sin perder el tono solemne del discurso divino.
