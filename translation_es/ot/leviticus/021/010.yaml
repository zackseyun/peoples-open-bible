    issue: «el sacerdote principal» para הַכֹּהֵן הַגָּדוֹל
    rationale: Aunque comunica primacía, no es la forma más fiel ni la más natural para el cargo técnico. «Sumo sacerdote» es el equivalente bíblico estándar y claro en español.
  - severity: medium
    issue: «de entre sus hermanos» atenúa el matiz de preeminencia
    rationale: מֵאֶחָיו aquí no es mera pertenencia al grupo; en contexto señala su superioridad dentro de los sacerdotes. Conviene reflejarlo con «que es el principal entre sus hermanos» o similar.
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado y no preserva la alternativa auditada
    rationale: La nota inglesa [a] trata del modismo וּמִלֵּא אֶת יָדוֹ («cuya mano ha sido llenada»), no de מֵאֶחָיו. La nota española actual altera la justificación léxica documentada.
  - severity: low
    issue: «ha sido consagrado» puede ser demasiado amplio para el modismo de instalación
    rationale: No es incorrecto, pero «ha sido ordenado» o «investido» refleja mejor la instalación al oficio vinculada a vestir las vestiduras.
