review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: φωνὴν ἤκουσα → «Oí una voz», εἰς Ἰερουσαλήμ con sentido locativo → «en Jerusalén», y πόλιν ἁγιάσματος → «la ciudad santa». No obstante, la nota [a] es incorrecta porque repite literalmente «una voz» como si fuera alternativa, cuando el aparato inglés preserva como nota alternativa la variante de alcance «O ‘Oí una voz’»/historial de traducción, no una glosa literal útil para español.'
  spanish_quality_summary: 'La frase principal es natural, clara y digna en español. «Oí una voz en Jerusalén, la ciudad santa» suena bien y no cae en calco. El único problema real está en las notas: [a] no aporta información válida y además puede confundir al lector.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen nombres divinos ni títulos mesiánicos sensibles. «La ciudad santa» es una solución idiomática y fiel para πόλιν ἁγιάσματος, con buena justificación léxica.
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada y no corresponde a una alternativa significativa preservada por el inglés.
    rationale: El texto español ya dice «Oí una voz», por lo que una nota «Lit. “una voz”» es redundante e incorrecta como nota léxica. La nota inglesa [b] registra una alternativa de traducción previa, no una literalidad distinta; trasladada así al español, no sirve. Debe eliminarse para evitar confusión.
  revised_spanish_text: Oí una voz en Jerusalén, la ciudad santa[a].
  revised_footnotes:
