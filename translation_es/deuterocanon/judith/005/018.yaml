translation:
  language: es
  text: Pero cuando se apartaron del camino[a] que él les había señalado, fueron totalmente destruidos en muchas guerras, de manera extrema[b], y fueron llevados cautivos a una tierra que no era suya, y el templo de su Dios fue derribado hasta el suelo, y sus ciudades quedaron ocupadas por sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Camino» traduce el valor metafórico del griego; también podría entenderse como «vía» o curso de vida prescrito.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega intensifica la magnitud de la destrucción; «de manera extrema» la representa en español de forma natural sin reducirla a duración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστησαν
  english_pob_choice: turned away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se desviaron
  - se alejaron
  - apostataron
  lexicon: BDAG / LSJ
  rationale: En este contexto, el verbo expresa desviación de un camino prescrito. «Se apartaron» conserva la idea de salida del curso debido sin imponer de por sí el matiz más específico de apostasía formal.
- source_word: ὁδοῦ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - vía
  - sendero
  - modo de vida
  lexicon: LSJ
  rationale: Aunque el inglés POB prefirió «way», en español «camino» comunica con naturalidad tanto la imagen literal como la figurada de una conducta o curso de vida dispuesto por Dios.
- source_word: διέθετο
  english_pob_choice: had appointed
  chosen_spanish: les había dispuesto
  alternatives_spanish:
  - les había señalado
  - les había ordenado
  - les había establecido
  lexicon: LSJ
  rationale: El verbo sugiere lo que Dios había fijado para ellos. «Les había dispuesto» preserva la idea de un orden o curso establecido sin sonar excesivamente técnico o rígido en español.
- source_word: ἐξωλεθρεύθησαν
  english_pob_choice: were utterly destroyed
  chosen_spanish: fueron totalmente destruidos
  alternatives_spanish:
  - fueron exterminados por completo
  - fueron aniquilados
  - fueron arrasados por completo
  lexicon: LSJ
  rationale: El compuesto griego es intensivo. «Fueron totalmente destruidos» mantiene la fuerza sin introducir una connotación moderna más cargada que «exterminados».
- source_word: ἐν πολλοῖς πολέμοις
  english_pob_choice: in many wars
  chosen_spanish: en muchas guerras
  alternatives_spanish:
  - en numerosas guerras
  - por muchas guerras
  - a causa de muchas guerras
  lexicon: LSJ
  rationale: La frase es directa y se traduce de manera transparente. «Guerras» corresponde mejor que «batallas» al sustantivo plural griego.
- source_word: ἐπὶ πολὺ σφόδρα
  english_pob_choice: to a very great extent
  chosen_spanish: hasta extremos muy grandes
  alternatives_spanish:
  - en gran manera
  - sumamente
  - de manera muy severa
  lexicon: LSJ
  rationale: La expresión intensifica la magnitud de la ruina. En español conviene conservar esa intensidad de manera idiomática, sin reducirla solo a duración ni omitirla por completo.
- source_word: ᾐχμαλωτεύθησαν
  english_pob_choice: were taken captive
  chosen_spanish: fueron llevados cautivos
  alternatives_spanish:
  - fueron hechos cautivos
  - fueron capturados
  - fueron conducidos cautivos
  lexicon: BDAG
  rationale: El verbo indica ser tomados como cautivos. «Fueron llevados cautivos» conserva la coerción del acto y suena natural en español bíblico contemporáneo.
- source_word: εἰς γῆν οὐκ ἰδίαν
  english_pob_choice: into a land not their own
  chosen_spanish: a una tierra que no era suya
  alternatives_spanish:
  - a una tierra ajena
  - a una tierra no propia
  - a tierra extraña
  lexicon: LSJ
  rationale: La construcción posesiva queda clara en español con «que no era suya», manteniendo el contraste de pertenencia del griego.
- source_word: ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - casa de Dios
  lexicon: LSJ
  rationale: En este contexto judío, «templo» es la equivalencia más natural y específica.
- source_word: ἐγενήθη εἰς ἔδαφος
  english_pob_choice: was leveled to the ground
  chosen_spanish: fue derribado hasta el suelo
  alternatives_spanish:
  - fue abatido al suelo
  - quedó reducido a escombros
  - fue puesto por tierra
  lexicon: LSJ
  rationale: La expresión idiomática comunica demolición total hasta el nivel del suelo. «Fue derribado hasta el suelo» preserva la imagen con naturalidad en español.
- source_word: ἐκρατήθησαν
  english_pob_choice: were occupied
  chosen_spanish: quedaron ocupadas
  alternatives_spanish:
  - fueron ocupadas
  - fueron tomadas
  - quedaron en poder
  lexicon: LSJ
  rationale: El pasivo indica que las ciudades pasaron al control hostil. «Quedaron ocupadas» refleja el resultado continuo mejor que un simple «fueron ocupadas».
- source_word: ὑπεναντίων
  english_pob_choice: adversaries
  chosen_spanish: adversarios
  alternatives_spanish:
  - enemigos
  - opositores
  lexicon: LSJ
  rationale: «Adversarios» mantiene el tono formal del relato y evita volver más estrecho el matiz de oposición que el griego sugiere.
theological_decisions:
- issue: Relación entre desobediencia y juicio
  english_pob_reading: When the people turned away from the divinely appointed way, destruction, captivity, and desecration followed, without explicitly restating God as the direct grammatical agent of each calamity.
  chosen_spanish_reading: Cuando se apartaron del camino que Dios les había dispuesto, siguieron destrucción, cautiverio y profanación, sin añadir una agentividad divina explícita en cada una de las calamidades.
  alternative_spanish_readings:
  - Una versión más interpretativa podría hacer de Dios el agente directo de cada infortunio.
  - Una versión más neutral podría atenuar demasiado la relación de causa y efecto del pacto.
  rationale: El griego vincula los desastres con la desviación del camino prescrito, pero las pasivas no obligan a insertar a Dios como sujeto explícito de cada verbo. La traducción conserva esa tensión teológica y narrativa sin sobreinterpretar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El inglés POB revisó la frase intensiva desde una traducción más literal («to a very great extent») a una formulación más natural; aquí se conserva la intensidad con español idiomático sin reproducir mecánicamente la expansión literal. También se siguió la revisión que favorece «way» sobre «path» mediante «camino», y se reflejó «leveled to the ground» con una expresión española igualmente natural. La última revisión inglesa cambió «seized» por «occupied»; por eso se tradujo con un pasivo/resultativo que puede expresar ocupación sostenida.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, de acuerdo con la pauta del proyecto.
  - Se usó «cautivos» para ᾐχμαλωτεύθησαν, preservando la fuerza coercitiva del verbo.
  - Se evitó introducir terminología eclesiástica posterior donde el contexto judío pide vocabulario más directo y descriptivo.
  - No se añadió una nota de pie para la opción intensiva de ἐπὶ πολὺ σφόδρα porque el sentido quedó integrado en el cuerpo del texto y la nota solo aclara la equivalencia estilística.
