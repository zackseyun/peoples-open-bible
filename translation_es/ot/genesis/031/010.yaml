revisions:
- from: Y aconteció que, al tiempo en que la grey estaba en celo, alcé mis ojos y vi en sueños[a]; y vi que los machos cabríos que montaban la grey eran listados, pintados[b] y abigarrados.
  to: Y aconteció que, al tiempo en que la grey estaba en celo, alcé mis ojos y vi en un sueño, y vi que los machos cabríos que montaban la grey eran listados[a], moteados y abigarrados[b].
  rationale: 'La revisión corrige dos puntos principales: (1) «en un sueño» reproduce mejor בַּחֲלוֹם y el expediente inglés que «en sueños»; (2) «moteados» refleja con más precisión נְקֻדִּים que «pintados». También se realinean las notas al pie con las alternativas léxicas documentadas en el POB inglés: una sobre «listados»/«anillados de rayas» y otra sobre «abigarrados»/«jaspeados». Se conserva «grey» por ser comprensible y de registro bíblico, y se mantiene la estructura general del borrador con una reparación mínima.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:22:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia narrativa y el sentido general del hebreo: marco temporal de apareamiento, alzar los ojos, ver en sueño, los machos cabríos montando la grey y los tres patrones de pelaje. Sin embargo, dos decisiones léxicas no reflejan con suficiente fidelidad el expediente inglés ni el hebreo: «vi en sueños» pluraliza/indefine de forma más libre que בַּחֲלוֹם y el POB inglés «in a dream»; y «pintados» para נְקֻדִּים es demasiado amplio y pierde el valor específico de ‘speckled/spotted’.'
  spanish_quality_summary: El texto es legible y digno, pero puede afinarse para mayor naturalidad y precisión. «Grey» es comprensible en registro bíblico, aunque «rebaño» sería más neutral; no es un error. La coordinación «y vi en sueños; y vi que...» introduce repetición no presente en el original, donde tras «y he aquí» sigue la escena visual. Conviene usar «en un sueño[a], y vi que...» o «en un sueño[a]; y he aquí...».
  glossary_alignment: No hay términos del glosario mayor en juego. Las principales decisiones relevantes son zoológicas y descriptivas. «Machos cabríos» y «montaban la grey» se alinean bien con הָעַתֻּדִים y הָעֹלִים עַל הַצֹּאן. Se debe ajustar el campo semántico de נְקֻדִּים a «moteados» o equivalente, y mantener la distinción entre los tres adjetivos de pelaje.
  issues:
  - severity: medium
    issue: «en sueños» para בַּחֲלוֹם
    rationale: El hebreo lleva singular con artículo/preposición y el POB auditado optó por «in a dream». «En sueños» en español suena idiomático, pero introduce un matiz más genérico o habitual que no está claramente justificado por la evidencia fuente.
  - severity: high
    issue: «pintados» para נְקֻדִּים
    rationale: «Pintados» es demasiado inespecífico y no preserva el valor léxico de ‘speckled/spotted’. El expediente inglés documenta una categoría de manchas o puntos distinta de «striped» y «mottled»; «moteados» o «manchados» mantiene mejor la distinción.
  - severity: medium
    issue: Repetición de «vi ...; y vi que» en lugar de reflejar וְהִנֵּה
    rationale: El original usa «y he aquí / behold» para presentación vívida. Repetir «vi» no falsea gravemente el sentido, pero reduce la fuerza discursiva del hebreo y se aparta de la decisión auditada.
  - severity: low
    issue: Desajuste de notas al pie respecto al expediente inglés
    rationale: La nota [a] del inglés documenta alternativa para «striped/ring-streaked», pero en español se puso una nota sobre «en un sueño». La nota [b] en inglés corresponde a «mottled/dappled», mientras que en español se ancló a «pintados». Conviene realinear las notas con las decisiones léxicas significativas del pasaje.
  revised_spanish_text: Y aconteció que, al tiempo en que la grey estaba en celo, alcé mis ojos y vi en un sueño, y vi que los machos cabríos que montaban la grey eran listados[a], moteados y abigarrados[b].
  revised_footnotes:
  - marker: a
    text: O «anillados de rayas». El término hebreo se refiere a marcas en bandas en los animales.
    reason: lexical_alternative
  - marker: b
    text: O «jaspeados». Los tres términos de color probablemente describen patrones de pelaje distintos entre sí.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos principales: (1) «en un sueño» reproduce mejor בַּחֲלוֹם y el expediente inglés que «en sueños»; (2) «moteados» refleja con más precisión נְקֻדִּים que «pintados». También se realinean las notas al pie con las alternativas léxicas documentadas en el POB inglés: una sobre «listados»/«anillados de rayas» y otra sobre «abigarrados»/«jaspeados». Se conserva «grey» por ser comprensible y de registro bíblico, y se mantiene la estructura general del borrador con una reparación mínima.'
