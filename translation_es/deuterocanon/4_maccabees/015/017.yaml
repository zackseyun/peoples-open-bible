review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: un vocativo a la madre, ahora sometida a dolores más amargos que los dolores de parto relacionados con sus hijos. Sin embargo, «de ellos» suena poco idiomático en español y debilita la referencia natural a los dolores al darles a luz. También conviene hacer más natural «ahora probada» con «ahora puesta a prueba» o mantener «probada» si se prioriza concisión; aquí la mayor necesidad es corregir la frase final.'
  spanish_quality_summary: El texto es mayormente claro, pero «los dolores de parto de ellos» resulta forzado y poco natural en español eclesial general. Una formulación como «los dolores de parto al darlos a luz» preserva mejor el sentido y la legibilidad. La nota también debe ajustarse para no repetir torpemente «ligados a su nacimiento».
  glossary_alignment: No hay términos del glosario teológico mayor en juego. «Madre», «dolores», y «probada/puesta a prueba» se alinean bien con las decisiones del POB. La comparación de πικροτέρων se conserva adecuadamente con «más amargos».
  issues:
  - severity: medium
    issue: «los dolores de parto de ellos» es poco idiomático
    rationale: Aunque intenta seguir de cerca ἐπʼ αὐτοῖς, en español suena extraño y puede sugerir posesión más que relación con el nacimiento. «Al darlos a luz» expresa fielmente la idea documentada en el POB y el matiz del griego.
  - severity: low
    issue: La nota al pie puede formularse con mayor naturalidad
    rationale: «Ligados a su nacimiento» es comprensible, pero una redacción como «los dolores al momento de darles a luz» transmite mejor la alternativa documentada y evita pesadez.
