translation:
  language: es
  text: Entonces[a], cuando se les ordenó hacerlo, los torturadores hicieron comparecer al mayor de ellos y, después de desgarrarle la túnica, le ataron las manos y los brazos a ambos lados con correas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego emplea aquí un sustantivo de agente textual y léxicamente inusual en esta forma; el contexto muestra claramente que se trata de los hombres del rey encargados de infligir la tortura.
    reason: textual_variant
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Por tanto
  - Entonces
  - De modo que
  lexicon: LSJ
  rationale: La partícula introduce la acción siguiente en la narración; «Así» funciona con naturalidad en español sin añadir una conclusión lógica más fuerte que la que exige el contexto.
- source_word: τὸν πρεσβύτατον αὐτῶν
  english_pob_choice: the eldest of them
  chosen_spanish: el mayor de ellos
  alternatives_spanish:
  - el más anciano de ellos
  - el mayor entre ellos
  - el primogénito de ellos
  lexicon: LSJ
  rationale: πρεσβύτατον señala al de mayor edad. «El mayor de ellos» preserva el sentido partitivo y evita «anciano», que en español puede sonar a cargo o estado, no necesariamente a edad.
- source_word: κελευσθέντες
  english_pob_choice: when they were ordered to do so
  chosen_spanish: cuando se les ordenó hacerlo
  alternatives_spanish:
  - habiendo sido mandados
  - cuando fueron mandados
  - al recibir la orden
  lexicon: LSJ
  rationale: El participio aoristo pasivo aporta circunstancia temporal. En español, «cuando se les ordenó hacerlo» conserva la pasiva y el valor circunstancial con fluidez.
- source_word: οἱ μιστισταί
  english_pob_choice: the torturers
  chosen_spanish: los torturadores
  alternatives_spanish:
  - los verdugos
  - los tormentadores
  - los ejecutores
  lexicon: LSJ
  rationale: El contexto describe agentes que infligen tortura; «torturadores» reproduce ese valor inmediato sin convertirlos prematuramente en ejecutores de muerte. La forma griega es inusual, pero el contexto guía la elección.
- source_word: παρήγαγον
  english_pob_choice: brought forward
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - sacaron
  - lo condujeron
  lexicon: LSJ
  rationale: El verbo indica hacer comparecer o poner delante. En español, «trajeron» es suficiente con el complemento «al mayor de ellos» y mantiene la escena sin sobrecargarla.
- source_word: διαρρήξαντες τὸν χιτῶνα
  english_pob_choice: after tearing open his tunic
  chosen_spanish: después de desgarrarle la túnica
  alternatives_spanish:
  - después de romperle la túnica
  - tras rasgar su túnica
  - tras abrirle la túnica a tirones
  lexicon: LSJ
  rationale: χιτών es la túnica o prenda interior. «Desgarrarle» conserva la violencia del aoristo participial; «túnica» es el equivalente más directo y claro en español.
- source_word: διέδησαν
  english_pob_choice: they bound
  chosen_spanish: le ataron
  alternatives_spanish:
  - le sujetaron
  - le amarraron
  - le ligaron
  lexicon: LSJ
  rationale: El verbo expresa atadura firme. «Le ataron» es natural en español y permite completar con el instrumento y la disposición bilateral del siguiente segmento.
- source_word: τὰς χεῖρας αὐτοῦ καὶ τοὺς βραχίονας
  english_pob_choice: his hands and arms
  chosen_spanish: las manos y los brazos
  alternatives_spanish:
  - las manos y los antebrazos
  - las manos y los brazos superiores
  lexicon: LSJ
  rationale: La combinación de χεῖρας y βραχίονας puede traducirse de forma directa como manos y brazos. Esto conserva el detalle corporal sin forzar una precisión anatómica que el texto no exige.
- source_word: ἱμᾶσιν
  english_pob_choice: with straps
  chosen_spanish: con correas
  alternatives_spanish:
  - con tiras
  - con bandas
  - con thongs
  lexicon: LSJ
  rationale: ἱμᾶς es una correa o tira de cuero. «Correas» es transparente en español moderno y mantiene el matiz de sujeción física.
- source_word: ἑκατέρωθεν
  english_pob_choice: on both sides
  chosen_spanish: por ambos lados
  alternatives_spanish:
  - a ambos lados
  - de cada lado
  - en ambos lados
  lexicon: LSJ
  rationale: El adverbio indica disposición bilateral. «Por ambos lados» comunica claramente que las ataduras iban a cada lado del cuerpo.
theological_decisions:
- issue: Identidad de οἱ μιστισταί como agentes de tortura
  english_pob_reading: the context clearly indicates the king's men who carried out the torture
  chosen_spanish_reading: los torturadores
  alternative_spanish_readings:
  - los verdugos
  - los hombres del rey que torturaban
  rationale: No hay contenido doctrinal directo, pero sí una decisión interpretativa importante sobre un agente textual inusual. Se mantiene el valor funcional de la escena sin precisar más de lo que el contexto garantiza.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que mantuvo sin cambios la lectura óptima-equivalente y la nota sobre el agente griego inusual. La versión española conserva esa misma cautela textual al traducir οἱ μιστισταί por «los torturadores».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «Mesías/Cristo» según contexto del pasaje; este versículo no contiene terminología mesiánica.
  - Se prefiere un español sobrio y publicable, sin arcaísmos innecesarios.
  - La nota al pie se ancla en «Así[a]» para reflejar la observación textual del agente inusual, sin duplicar marcadores.
