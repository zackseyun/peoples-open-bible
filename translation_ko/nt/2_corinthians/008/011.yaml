id: 2CO.8.11
reference: '2 Corinthians 8:11'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νυνὶ δὲ καὶ τὸ ποιῆσαι ἐπιτελέσατε, ὅπως καθάπερ ἡ προθυμία τοῦ θέλειν οὕτως καὶ τὸ ἐπιτελέσαι ἐκ τοῦ ἔχειν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/011.yaml
  text: But now complete the doing of it also[a], so that just as there was the eagerness to will it[b], so also there may be the completion from what you have.
translation:
  language: ko
  text: 이제는 그것을 행하기를 완성하십시오. 원하는 일에 보였던 그 자원하는 마음[a]처럼, 가진 것으로[b] 그것을 완성하기까지 그렇게 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「열망」, 「적극성」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「형편껏」, 「여러분이 가진 분량에 따라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτελέσατε
  english_pob_choice: complete
  chosen_korean: 완성하십시오
  lexicon: BDAG
  rationale: 아오리스트 명령형. 시작한 일을 결실로 가져가라는 권면. 「완성하다」가 분명하다.
  alternatives_korean:
  - 마무리하십시오
  - 끝맺으십시오
- source_word: προθυμία
  english_pob_choice: eagerness
  chosen_korean: 자원하는 마음
  lexicon: BDAG
  rationale: προθυμία는 「자원함, 흔쾌한 마음」. 헌금 문맥에서 강제 없는 마음의 자세를 가리킨다.
  alternatives_korean:
  - 열망
  - 간절함
- source_word: ἐκ τοῦ ἔχειν
  english_pob_choice: from what you have
  chosen_korean: 가진 것으로
  lexicon: BDAG
  rationale: 부정사 + 관사로 「가진 것」을 가리킨다. 「가진 것으로」가 자연스럽다.
  alternatives_korean:
  - 가진 분량에서
  - 형편껏
