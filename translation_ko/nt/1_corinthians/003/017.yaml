  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ τις τὸν ναὸν τοῦ θεοῦ φθείρει, φθερεῖ τοῦτον ὁ θεός· ὁ γὰρ ναὸς τοῦ θεοῦ ἅγιός ἐστιν, οἵτινές ἐστε ὑμεῖς.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/003/017.yaml
  text: 'If anyone destroys God''s temple[a], God will destroy him; for God''s temple is holy[b], and you are that temple.'
  footnotes:
  - marker: a
    text: 'Or "corrupts" or "defiles" for both uses of the verb "destroy."'
    reason: lexical_alternative
  - marker: b
    text: 'The "you" is plural; Paul identifies the congregation collectively as God''s temple.'
    reason: cultural_note
translation:
  language: ko
  text: 누구든지 하나님의 성전을 파괴하면, 하나님께서 그를 파괴하실 것입니다. 이는 하나님의 성전은 거룩하며, 여러분이 바로 그 성전이기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φθείρει … φθερεῖ
  english_pob_choice: destroys … will destroy
  chosen_korean: 파괴하면 … 파괴하실
  alternatives_korean:
  - 망치면 … 망치실
  lexicon: BDAG
  rationale: 동근 동사 반복(lex talionis 구조)을 한국어에서도 동일 어휘 반복으로 보존.
- source_word: οἵτινές ἐστε ὑμεῖς
  english_pob_choice: and you are that temple
  chosen_korean: 여러분이 바로 그 성전
  alternatives_korean:
  - 여러분이 그 성전입니다
  lexicon: BDAG
  rationale: 강조 대명사 「바로」 추가.
