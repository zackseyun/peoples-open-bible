translation:
  language: es
  text: Y Aram huyó delante de Israel[a], y David mató de Aram a siete mil combatientes de carro y a cuarenta mil hombres de a pie, y dio muerte a Shofac[b], el comandante del ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El pasaje paralelo de 2 Samuel 10:18 dice: «setecientos carros y cuarenta mil jinetes». Crónicas aquí lee «siete mil combatientes de carro y cuarenta mil hombres de a pie».'
    reason: textual_variant
  - marker: b
    text: En el relato paralelo de 2 Samuel 10:16, 18, el nombre aparece como Shobac/Shobach.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre transliterado para reflejar el hebreo y evitar importar la etiqueta geopolítica posterior «Siria». En este contexto se trata de la fuerza aramea, pero el texto hebreo nombra a Aram.
- source_word: וַיָּנָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - retrocedió en fuga
  lexicon: HALOT
  rationale: «Huyó» transmite de forma natural y directa el sentido narrativo de נוּס, con la idea de retirada desordenada en batalla.
- source_word: מִלִּפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - de delante de Israel
  - ante Israel
  lexicon: HALOT
  rationale: En español «delante de» conserva la imagen idiomática del hebreo sin sonar forzado. La idea es la de huida/rout ante la presencia de Israel.
- source_word: וַיַּהֲרֹג דָּוִיד
  english_pob_choice: David killed
  chosen_spanish: David mató
  alternatives_spanish:
  - David dio muerte
  - David acabó con
  lexicon: HALOT
  rationale: «Mató» es el equivalente natural y directo de הרג en un relato histórico. Se evita una expresión más arcaica sin perder precisión.
- source_word: שִׁבְעַת אֲלָפִים רֶכֶב
  english_pob_choice: seven thousand chariot warriors
  chosen_spanish: siete mil guerreros de carro
  alternatives_spanish:
  - siete mil combatientes de carro
  - siete mil carros
  lexicon: HALOT
  rationale: Rֶכֶב aquí se entiende metonímicamente como la tropa/cuerpo asociado a los carros, no como el vehículo contado literalmente. «Guerreros de carro» evita la ambigüedad de «carros» y no restringe indebidamente a conductores solamente.
- source_word: וְאַרְבָּעִים אֶלֶף אִישׁ רַגְלִי
  english_pob_choice: forty thousand foot soldiers
  chosen_spanish: cuarenta mil hombres de a pie
  alternatives_spanish:
  - cuarenta mil soldados de infantería
  - cuarenta mil infantes
  lexicon: HALOT
  rationale: La expresión hebrea significa infantería; «hombres de a pie» es idiomático y claro en español, manteniendo la distinción militar del texto.
- source_word: שׁוֹפַךְ
  english_pob_choice: Shophach
  chosen_spanish: Shofac
  alternatives_spanish:
  - Shofaj
  - Shofaq
  lexicon: HALOT
  rationale: Se translitera la forma de Crónicas con adaptación ortográfica española coherente. La forma paralela de Samuel, Shobac/Shobach, se preserva como variante en nota.
- source_word: שַׂר הַצָּבָא
  english_pob_choice: the commander of the army
  chosen_spanish: el comandante del ejército
  alternatives_spanish:
  - el jefe del ejército
  - el caudillo del ejército
  lexicon: HALOT
  rationale: «Comandante del ejército» reproduce bien el valor de שַׂר como oficial/caudillo militar y צָבָא como ejército, con registro formal y claro.
- source_word: הֵמִית
  english_pob_choice: he put ... to death
  chosen_spanish: dio muerte a
  alternatives_spanish:
  - lo mató
  - lo hizo morir
  lexicon: HALOT
  rationale: La forma causativa de מות se refleja bien con «dio muerte a», que mantiene una ligera distinción respecto de «mató» y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Variación textual entre Crónicas y Samuel en la descripción de la derrota
  english_pob_reading: The parallel passage in 2 Samuel 10:18 reads 'seven hundred chariots and forty thousand horsemen.' Chronicles here reads 'seven thousand charioteers and forty thousand foot soldiers.'
  chosen_spanish_reading: 'Se conserva la lectura de Crónicas: «siete mil guerreros de carro y cuarenta mil hombres de a pie», sin armonizar con Samuel en el texto principal.'
  alternative_spanish_readings:
  - «setecientos carros y cuarenta mil jinetes»
  - armonizar la cifra con 2 Samuel en una nota interpretativa
  rationale: La POB en inglés mantiene la lectura de Crónicas y explica la diferencia en nota; el español debe preservar esa tensión textual en lugar de suavizarla. La nota permite al lector ver que existe una variante paralela importante.
  doctrine_reference: Textual criticism / parallel passages; cf. 2 Samuel 10:18
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «charioteers» a «chariot warriors» para reflejar mejor el término hebreo asociado con la tropa de carros; el español sigue esa corrección con «guerreros de carro» y no reduce el sentido a conductores. También se conserva la decisión de mantener la lectura distintiva de Crónicas frente a 2 Samuel, con nota textual.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre transliterado, coherente con el criterio POB de no sustituirlo por «Siria».
  - «Guerreros de carro» preserva el matiz militar colectivo del hebreo רֶכֶב mejor que «carros» o «carreteros».
  - «Hombres de a pie» reproduce el hebraísmo de infantería de forma idiomática y legible.
  - La nota del nombre propio usa «Shofac» como forma principal española, con la variante paralela «Shobac/Shobach» documentada en la nota.
