translation:
  language: es
  text: que Dios[a] quisiera aplastarme[c], que soltara[b] su mano y me eliminara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «estuviera dispuesto» o «consintiera». El verbo hebreo expresa voluntad o consentimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «soltara su mano», una expresión idiomática para retirar la restricción y golpear.'
    reason: cultural_note
  - marker: c
    text: 'También: «me acabara» o «me cercenara». El hebreo expresa una destrucción decisiva y final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹאֵל / יֹאֵל
  english_pob_choice: would be willing
  chosen_spanish: se dignara
  alternatives_spanish:
  - quisiera
  - estuviera dispuesto
  - consintiera
  lexicon: HALOT
  rationale: El hebreo expresa voluntad o consentimiento; en español, "se dignara" comunica una disposición voluntaria en un registro digno y natural, sin perder el matiz de deseo/consentimiento del contexto de lamento.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  - Eloah
  lexicon: HALOT
  rationale: Aunque אֱלוֹהַּ puede traducirse directamente como "Dios", en este verso el sujeto es el Dios de Israel al que Job se dirige; el proyecto POB usa "Yahvé" para el nombre divino cuando corresponde, manteniendo la transparencia del texto fuente.
- source_word: וִידַכְּאֵנִי
  english_pob_choice: crush me
  chosen_spanish: aplastarme
  alternatives_spanish:
  - triturarme
  - quebrarme
  - destruirme
  lexicon: HALOT
  rationale: דכא en piel denota acción fuerte de aplastar/quebrar. "Aplastar" conserva la violencia física y la fuerza del verbo sin suavizarlo, y funciona bien con el infinitivo en español.
- source_word: יַתֵּר
  english_pob_choice: would let loose
  chosen_spanish: soltara
  alternatives_spanish:
  - aflojara
  - dejara libre
  - desatara
  lexicon: HALOT
  rationale: El verbo comunica soltar o aflojar; en combinación con "su mano" reproduce de forma natural la imagen idiomática de retirar la restricción para golpear.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su poder
  - su fuerza
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. "Su mano" preserva la imagen antropomórfica sin abstraerla, como en la lectura auditada del POB inglés.
- source_word: וִיבַצְּעֵנִי
  english_pob_choice: cut me off
  chosen_spanish: me cortara
  alternatives_spanish:
  - me cercenara
  - me separara
  - me acabara
  lexicon: HALOT
  rationale: בצע puede expresar cortar/sever. En este contexto, "me cortara" mantiene la idea de ruptura final y permite una fluidez idiomática en español; la finalidad letal queda implícita por el contexto inmediato.
theological_decisions:
- issue: Lenguaje antropomórfico para la acción de Dios
  english_pob_reading: Retain the concrete expression 'his hand' rather than abstracting it to 'his power' or 'his judgment.'
  chosen_spanish_reading: Conservar "su mano" en vez de abstraerlo a "su poder" o "su juicio".
  alternative_spanish_readings:
  - su poder
  - su juicio
  rationale: El hebreo usa imagen corporal para la agencia divina. Mantenerla en español conserva la fuerza emotiva del ruego de Job y sigue la decisión auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente del testimonio inglés no introdujo cambios; el consenso del audit trail es alto. La redacción española sigue de cerca esa lectura estable, sin resolver indebidamente la tensión entre la imagen concreta («su mano») y la acción resultante de destrucción final.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" conforme al estándar del proyecto para el nombre divino.
  - Se conserva el paralelismo y la secuencia verbal del hebreo en una sintaxis española natural.
  - Los matices volitivos y destructivos se reflejan con notas para no borrar alternativas documentadas.
  - No se introduce terminología eclesiástica no respaldada por el texto fuente.
