theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of David's remembered experience in עֻנּוֹתוֹ
  chosen_reading: all his affliction
  alternative_readings:
  - all his hardships
  - all his self-denial
  - all his humiliation
  rationale: The Hebrew can denote affliction or hardship broadly. The translation preserves that breadth rather than narrowing the verse to ascetic self-denial or shame alone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
