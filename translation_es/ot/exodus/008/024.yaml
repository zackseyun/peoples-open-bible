translation:
  language: es
  text: 'Entonces el faraón dijo: “Yo los dejaré ir, para que sacrifiquen a Yahvé su Dios en el desierto. Solo, no vayan muy lejos. Rueguen por mí.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la escena; “Entonces ... dijo” mantiene el valor secuencial de manera natural en español.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: “Faraón” es el título estándar en español y funciona de forma natural en el discurso narrativo.
- source_word: אָנֹכִי אֲשַׁלַּח אֶתְכֶם
  english_pob_choice: I will let you go
  chosen_spanish: Yo los dejaré ir
  alternatives_spanish:
  - Yo mismo los enviaré
  - Yo los soltaré
  lexicon: HALOT
  rationale: En este contexto negociador, שׁלח expresa permitir la partida; “los dejaré ir” comunica el sentido idiomático sin perder el énfasis del pronombre explícito אָנֹכִי, preservado con “Yo”.
- source_word: וּזְבַחְתֶּם
  english_pob_choice: so that you may sacrifice
  chosen_spanish: para que sacrifiquen
  alternatives_spanish:
  - y sacrificarán
  - y ustedes sacrificarán
  lexicon: HALOT
  rationale: La coordinación verbal expresa finalidad en este contexto; “para que” reproduce mejor la relación de propósito que un simple “y”.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: “Yahvé” en el texto principal, conservando el nombre divino revelado y evitando la sustitución por una máscara litúrgica.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: En español, el posesivo de cortesía/plural con “ustedes” se expresa naturalmente como “su Dios”; el referente sigue siendo el Dios de Israel.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: “Desierto” es una equivalencia clara y bíblicamente comprensible para מִדְבָּר en este contexto, sin añadir matices no presentes en el hebreo.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Pero
  lexicon: HALOT
  rationale: Introduce la restricción de Faraón; “Solo” mantiene el matiz limitador de forma concisa.
- source_word: הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת
  english_pob_choice: you must not go very far away
  chosen_spanish: no se alejen mucho para ir
  alternatives_spanish:
  - no se alejen demasiado para ir
  - no vayan muy lejos
  lexicon: HALOT
  rationale: La intensificación por infinitivo absoluto se vierte con una prohibición natural en español; “no se alejen mucho” conserva la restricción de distancia y “para ir” refleja el complemento verbal de לָלֶכֶת.
- source_word: הַעְתִּירוּ
  english_pob_choice: Plead
  chosen_spanish: Rueguen
  alternatives_spanish:
  - Intercedan
  - Suplicuen
  lexicon: HALOT
  rationale: עתר en Hifil aquí es hacer súplica ferviente; “Rueguen” transmite una petición insistente y entendible en español contemporáneo.
- source_word: בַּעֲדִי
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en mi favor
  - a favor mío
  lexicon: HALOT
  rationale: La preposición expresa intercesión en beneficio de Faraón; “por mí” es la formulación más natural y directa en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se adopta el criterio doctrinal del proyecto para el Tetragrámaton. “Yahvé” preserva el nombre propio divino en el texto principal y evita la sustitución por una forma de ocultamiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado ya decidió un sentido idiomático para שׁלח (“let you go”), un valor de finalidad para וּזְבַחְתֶּם, y una restricción de distancia para הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת. La presente versión conserva esos mismos valores semánticos en español y aplica el criterio del proyecto para el nombre divino con Yahvé en vez de la máscara litúrgica.
  spanish_consistency_notes:
  - Se mantiene el nombre divino “Yahvé” de forma consistente con el estándar del proyecto.
  - Se usa “faraón” en minúscula por tratarse del título en flujo narrativo.
  - “Su Dios” refleja adecuadamente el posesivo plural/cortesía en español sin cambiar el referente.
  - No se añade nota a pie porque no hay variante textual ni ambigüedad semántica adicional que el texto español necesite marcar aquí.
