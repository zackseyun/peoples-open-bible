theological_decisions:
- issue: Meaning of the promise that Jonadab will have 'a man standing before me'
  chosen_reading: An enduring promise that Jonadab's line will continue to have a representative in God's presence/service, without specifying a narrower institutional role.
  alternative_readings:
  - A promise of perpetual priestly or temple service for the Rechabites
  - A general promise of ongoing descendants under divine favor
  rationale: The idiom 'standing before me' can denote service before God, but the verse itself does not define the office. The translation keeps the phrase literal to preserve the text's theological tension rather than narrowing it to priestly service or flattening it to mere survival.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
