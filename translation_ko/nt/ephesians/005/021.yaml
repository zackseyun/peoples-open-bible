  text: submitting to one another in the fear of Messiah.
translation:
  language: ko
  text: 메시아를 경외함으로[a] 서로 복종하면서[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아에 대한 두려움 안에서」. 본 문맥의 φόβος는 적대적 두려움이 아니라 경외에 가깝다.
    reason: lexical_alternative
  - marker: b
    text: ὑποτασσόμενοι(분사)는 18절의 「성령으로 충만함을 받으십시오」에 이어지는 다섯 번째 분사로, 22절의 「아내들」 단락을 문법적으로 시작하기도 한다. 본 번역은 본 절을 「충만함을 받으십시오」의 결과·동반 모습으로 두면서, 22절의 「아내들이여, 그대들의 남편에게」가 본 분사에 의존하여 이해되도록 한다.
    reason: structural_note
lexical_decisions:
- source_word: ὑποτασσόμενοι
  english_pob_choice: submitting
  chosen_korean: 복종하면서
  alternatives_korean:
  - 서로 순복하면서
  - 자신을 낮추면서
  lexicon: BDAG
  rationale: 분사형을 그대로 보존하여 한국어로도 「복종하면서」로 옮긴다. 본 동사는 22절을 받침으로써 「상호 복종」의 윤리적 폭이 본 절에서 형성된다.
- source_word: ἐν φόβῳ Χριστοῦ
  english_pob_choice: in the fear of Messiah
  chosen_korean: 메시아를 경외함으로
  alternatives_korean:
  - 메시아에 대한 두려움 안에서
  - 메시아에 대한 경외 가운데
  lexicon: BDAG
  rationale: 본 문맥의 φόβος를 「경외」로 옮겨 적대적 두려움이 아닌 합당한 경외임을 보존한다.
theological_decisions:
- issue: 5:21–33 단락의 도입 분사 ὑποτασσόμενοι와 22절의 문법적 의존
  chosen_reading: 본 절을 분사로 옮기고, 22절은 별도 명령형 동사 없이 본 분사에 의존하여 「아내들이여, 그대들의 남편에게 주께 하듯」 형태로 옮긴다. 한국어 본문은 22절에서 자연스러운 종결을 위해 「복종하십시오」를 보충한다.
  alternative_readings:
  - 21절을 독립 명령으로 끊고 22절을 별도 명령으로 개시
  rationale: 헬라어 본문은 「상호 복종」(21)이 「아내의 복종」(22)을 포괄하는 더 큰 구조임을 분사 의존 구문으로 폭로한다. 본 번역은 본 절의 「상호 복종」과 다음 절의 「아내의 복종」 사이의 신학적 긴장을 줄이지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; PHILOSOPHY.md: Preserve rhetorical/structural relations.'
