id: HEB.9.9
reference: Hebrews 9:9
source:
  edition: SBLGNT
  text: ἥτις παραβολὴ εἰς τὸν καιρὸν τὸν ἐνεστηκότα, καθ’ ⸀ἣν δῶρά τε καὶ θυσίαι προσφέρονται μὴ δυνάμεναι κατὰ συνείδησιν τελειῶσαι τὸν λατρεύοντα,
translation:
  text: which is a parable for the present time[a], according to which both gifts and sacrifices are offered that are not able to perfect the worshiper with respect to conscience,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'symbol' or 'figure' for the present time.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥτις
  chosen: which
  alternatives:
  - this
  lexicon: BDAG
  rationale: Relative pronoun referring back to the preceding tabernacle arrangement; 'which' preserves the explanatory connection without over-specifying.
- source_word: παραβολὴ
  chosen: parable
  alternatives:
  - symbol
  - figure
  - illustration
  lexicon: BDAG
  rationale: Although often rendered 'symbol' here, the lexical sense is broader. 'Parable' is a transparent cognate and preserves the idea of a figurative correspondence; the less familiar sense is clarified by context and an alternative is preserved in a footnote.
- source_word: εἰς τὸν καιρὸν τὸν ἐνεστηκότα
  chosen: for the present time
  alternatives:
  - for the time now present
  - for the current age
  lexicon: BDAG
  rationale: The phrase points to the time then in effect/currently present in the argument. 'For the present time' is idiomatic English while remaining close to the Greek.
- source_word: καθ’ ἣν
  chosen: according to which
  alternatives:
  - under which
  - in accordance with which
  lexicon: BDAG
  rationale: This best captures the governing relation of the parable/tabernacle arrangement to the cultic offerings described.
- source_word: δῶρά τε καὶ θυσίαι
  chosen: both gifts and sacrifices
  alternatives:
  - gifts and sacrifices
  lexicon: BDAG
  rationale: Retains the paired cultic terms and reflects τε καὶ with 'both ... and'.
- source_word: προσφέρονται
  chosen: are offered
  alternatives:
  - are being offered
  lexicon: BDAG
  rationale: Present passive indicates ongoing cultic presentation; simple present is natural in English and sufficient here.
- source_word: μὴ δυνάμεναι
  chosen: are not able
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: Expresses incapacity of the gifts and sacrifices; 'are not able' stays closer to the participial construction than the more compressed 'cannot'.
- source_word: κατὰ συνείδησιν
  chosen: with respect to conscience
  alternatives:
  - as to the conscience
  - in conscience
  lexicon: BDAG
  rationale: The phrase limits the sphere in which perfection is lacking. 'With respect to conscience' is clear and avoids implying merely subjective sincerity.
- source_word: τελειῶσαι
  chosen: to perfect
  alternatives:
  - to make perfect
  - to bring to completion
  lexicon: BDAG
  rationale: Hebrews uses τελειόω with theological weight for bringing to the intended state of fitness/completion before God. 'Perfect' preserves that intertextual force.
- source_word: τὸν λατρεύοντα
  chosen: the worshiper
  alternatives:
  - the one serving in worship
  - the one who worships
  lexicon: BDAG
  rationale: Singular substantive participle referring to the person engaged in cultic worship. 'Worshiper' is concise and natural while retaining the religious setting.
