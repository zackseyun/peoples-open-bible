translation:
  language: es
  text: Los pueblos rugen como el rugido de muchas aguas[a], pero él los reprende[b], y huyen lejos, perseguidos como tamo sobre los montes ante el viento, y como polvo arremolinado[c] ante la tormenta[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las naciones».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo emplea formas singulares («lo reprende ... huye»), probablemente viendo a los muchos pueblos como una masa colectiva o un clamor unificado.
    reason: alternative_reading
  - marker: c
    text: 'O: «como una cosa giratoria» o «como rodadora»; el hebreo también puede aludir a algo que da vueltas o rueda delante de la tormenta.'
    reason: lexical_alternative
  - marker: d
    text: «Tormenta» también puede traducirse como «torbellino» o «tempestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: לְאֻמִּים designa colectividades humanas plurales. "Pueblos" preserva el sentido colectivo y resulta natural en español, sin cargar de inmediato la lectura política que a veces sugiere "naciones".
- source_word: כִּשְׁאוֹן
  english_pob_choice: like the roaring of
  chosen_spanish: como el rugido de
  alternatives_spanish:
  - como el ruido de
  - como el estruendo de
  lexicon: HALOT
  rationale: El sustantivo expresa un estruendo o rugido fuerte. "Rugido" mantiene la fuerza acústica y enlaza bien con la imagen de las aguas que sigue.
- source_word: מַיִם רַבִּים
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - grandes aguas
  - aguas caudalosas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y muy cercana a la forma literal. "Muchas aguas" conserva la imaginería bíblica sin perder claridad.
- source_word: יִשָּׁא֔וּן
  english_pob_choice: roar
  chosen_spanish: rugen
  alternatives_spanish:
  - hacen ruido
  - se alborotan
  lexicon: HALOT
  rationale: El verbo aquí destaca el ruido tumultuoso más que el simple movimiento. "Rugen" transmite ese carácter sonoro y funciona de manera natural con "los pueblos".
- source_word: וְגָעַר בּוֹ
  english_pob_choice: but he rebukes them
  chosen_spanish: pero él los reprende
  alternatives_spanish:
  - pero él lo reprende
  - y él los reprende
  lexicon: HALOT
  rationale: El verbo significa reprender o amonestar con fuerza. Se mantiene el sujeto implícito y se usa plural en español, siguiendo la revisión del POB que trató a los pueblos como plural en la traducción final.
- source_word: וְנָס מִמֶּרְחָק
  english_pob_choice: and they flee far away
  chosen_spanish: y ellos huyen lejos
  alternatives_spanish:
  - y huyen de lejos
  - y ellos huyen a gran distancia
  lexicon: HALOT
  rationale: מִמֶּרְחָק comunica alejamiento. "Huyen lejos" es una solución natural y fiel, sin añadir un matiz direccional que el hebreo no exige.
- source_word: וְרֻדַּף
  english_pob_choice: chased
  chosen_spanish: perseguidos
  alternatives_spanish:
  - echados
  - acribillados
  lexicon: HALOT
  rationale: El pasivo de רדף expresa ser perseguido o acosado. "Perseguidos" conserva la imagen de huida bajo presión externa.
- source_word: כְּמֹץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como tamo
  - como rastrojo
  lexicon: HALOT
  rationale: Aunque el POB inglés usa "chaff", en español "paja" comunica la ligereza y fragilidad del material arrastrado, pero para mayor precisión bíblica se marca la alternativa en nota; "tamo" sería más técnico y menos transparente.
- source_word: הָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - de los montes
  lexicon: HALOT
  rationale: La construcción poética se entiende mejor en español como algo que yace o se esparce "sobre los montes". Se evita una literalidad rígida que oscurecería la imagen.
- source_word: לִפְנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: delante del viento
  alternatives_spanish:
  - ante el viento
  - frente al viento
  lexicon: HALOT
  rationale: Es una expresión idiomática de ser arrastrado por una fuerza. "Delante del viento" conserva el paralelismo formal y la imagen de empuje frontal.
- source_word: וּכְגַלְגַּל
  english_pob_choice: like whirling dust
  chosen_spanish: como algo que gira
  alternatives_spanish:
  - como un remolino
  - como una rueda giratoria
  - como polvo arremolinado
  lexicon: HALOT
  rationale: גַּלְגַּל puede sugerir algo rodante, giratorio o arremolinado. Se elige una formulación abierta para no fijar indebidamente un objeto concreto, conservando la ambigüedad poética que documenta el POB.
- source_word: לִפְנֵי סוּפָה
  english_pob_choice: before the storm
  chosen_spanish: delante de la tormenta
  alternatives_spanish:
  - ante el torbellino
  - delante del temporal
  lexicon: HALOT
  rationale: סוּפָה designa una tormenta violenta, con posible fuerza de torbellino. "Tormenta" es clara y suficientemente amplia en español; la nota preserva la alternativa "torbellino".
theological_decisions:
- issue: Referencia del sujeto implícito que reprende
  english_pob_reading: The implied rebuker is God, but the verse does not name Yahweh explicitly.
  chosen_spanish_reading: Él los reprende, dejando implícito al que reprende sin introducir un nombre divino que el verso no expresa.
  alternative_spanish_readings:
  - Yahvé los reprende
  - el Señor los reprende
  rationale: El hebreo presenta al reprensor de forma implícita. Mantener "él" respeta la economía del texto y evita resolver de antemano la identificación en una traducción donde el verso no nombra a Yahvé.
  doctrine_reference: Preservar la tensión textual y la primacía del original; no añadir explicitación teológica innecesaria.
- issue: Número gramatical en la cadena verbal
  english_pob_reading: The English audit briefly noted the collective singular, but the latest revision moved to plural forms to match 'peoples/nations' and the Hebrew plural verbs.
  chosen_spanish_reading: 'Se tradujo con plurales: "los pueblos... ellos huyen", coherente con la lectura revisada del POB y con el sujeto plural explícito en español.'
  alternative_spanish_readings:
  - los pueblos... huye
  - los pueblos... huye lejos
  rationale: El hebreo y la revisión más reciente favorecen el plural en la representación de los sujetos. En español, el plural evita una discordancia innecesaria y refleja mejor la referencia a varios pueblos.
  doctrine_reference: Coherencia gramatical con la evidencia textual; conservar la polisemia colectiva sin forzar una singularización artificial.
- issue: Imagen final de גַּלְגַּל
  english_pob_reading: like whirling dust / or a whirling thing / or tumbleweed before the storm.
  chosen_spanish_reading: como algo que gira delante de la tormenta, manteniendo abierta la imagen sin especificar "tumbleweed".
  alternative_spanish_readings:
  - como polvo arremolinado
  - como un objeto que gira
  - como una rueda
  rationale: El hebreo permite una imagen de algo giratorio o rodante; el inglés audit trail protege la ambigüedad. El español conserva esa apertura con una formulación no comprometida.
  doctrine_reference: Respetar la ambigüedad léxica documentada; no cerrar el sentido más de lo que lo hace el texto fuente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió las formas singulares a plurales en la línea de los sujetos ('it' → 'them', 'flees' → 'they flee') para concordar con 'the peoples/nations' y con los verbos plurales hebreos. La versión española sigue esa revisión y mantiene la nota sobre la posibilidad de lectura colectiva singular en el hebreo subyacente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto cuando el texto lo nombra; aquí no se introduce porque el verso no lo expresa.
  - Se usó «los pueblos» para לְאֻמִּים, coherente con el estilo bíblico del POB y natural en español.
  - Se preservó la ambigüedad de גַּלְגַּל mediante una traducción abierta, en lugar de fijar una interpretación regional como «tumbleweed».
  - Se evitó «SEÑOR» como sustituto automático del nombre divino, siguiendo la política del proyecto.
