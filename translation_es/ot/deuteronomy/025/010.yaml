revisions:
- from: 'Y se le llamará en Israel[a]: «La casa de aquel cuyo sandalia fue quitada».'
  to: 'Y su nombre será llamado en Israel[a]: «La casa de aquel a quien le quitaron la sandalia».'
  rationale: Se corrige el error gramatical ('cuya/cuyo'), se restituye explícitamente 'su nombre' para reflejar mejor שְׁמוֹ, y se mejora la naturalidad española del título ritual con 'a quien le quitaron la sandalia', que sigue comunicando el participio pasivo contextualizado en el rito. Se conserva la nota alternativa literal del POB inglés con el mismo sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:06:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura legal-formularia del hebreo: וְנִקְרָא + fórmula de nombre público, בְּיִשְׂרָאֵל como ámbito social, y בֵּית como título de casa/linaje. También preserva la nota alternativa literal del inglés. Sin embargo, la frase principal tiene un error gramatical serio en español (''cuyo sandalia'') y una construcción algo forzada que afecta la fidelidad comunicativa del título ritual.'
  spanish_quality_summary: La redacción general es legible, pero 'aquel cuyo sandalia fue quitada' es gramaticalmente incorrecto; debe ser 'cuya sandalia'. Además, en español suena más natural mantener el título con 'aquel a quien le quitaron la sandalia' o una construcción equivalente. Para preservar mejor la dignidad y claridad, conviene también explicitar 'su nombre' al inicio, ya que el hebreo lo incluye y en este registro jurídico español no resulta forzado.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Sandalia' es adecuado para הַנָּעַל. 'Casa de' reproduce bien בֵּית. No intervienen términos como Yahvé, Mesías, esclavo, etc. La revisión propuesta mantiene el matiz legal y el título de vergüenza ritual documentado en el POB inglés.
  issues:
  - severity: high
    issue: 'Error gramatical: ''cuyo sandalia'''
    rationale: En español, 'sandalia' es femenino; debe ser 'cuya sandalia'. Tal como está, el texto no es publicable.
  - severity: medium
    issue: Omisión de 'su nombre' frente al hebreo שְׁמוֹ
    rationale: Aunque 'se le llamará' puede ser idiomático, aquí el hebreo enfatiza la fórmula de designación pública. 'Y su nombre será llamado...' suena natural en registro bíblico-jurídico español y refleja mejor el original.
  - severity: medium
    issue: Construcción principal algo rígida y poco natural
    rationale: '''Aquel cuya sandalia fue quitada'' es comprensible tras corregir el género, pero sigue siendo algo dura. ''Aquel a quien le quitaron la sandalia'' comunica mejor el participio ritual sin perder fidelidad.'
  revised_spanish_text: 'Y su nombre será llamado en Israel[a]: «La casa de aquel a quien le quitaron la sandalia».'
