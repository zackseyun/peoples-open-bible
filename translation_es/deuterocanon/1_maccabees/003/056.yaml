translation:
  language: es
  text: Y dijo que los que edifican una casa, y los prometidos a mujeres, y los que plantan viñas, y los temerosos[b], que cada uno vuelva a su casa, conforme a la ley[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «conforme a la ley» probablemente alude a las exenciones para la guerra de Deuteronomio 20:5–8.
    reason: cross_reference
  - marker: b
    text: O «los tímidos» o «los cobardes» para «los temerosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομοῦσιν οἰκίαν
  english_pob_choice: those building a house
  chosen_spanish: los que edifican una casa
  alternatives_spanish:
  - los que están edificando una casa
  - los constructores de una casa
  lexicon: LSJ
  rationale: Mantiene el participio de acción en curso y el objeto singular natural οἰκίαν como «una casa». «Edifican» es formal y bíblicamente apto, sin endurecer el español con un calco excesivo.
- source_word: μνηστευομένοις γυναῖκας
  english_pob_choice: those betrothed to women
  chosen_spanish: los desposados con mujeres
  alternatives_spanish:
  - los comprometidos con mujeres
  - los prometidos a mujeres
  lexicon: LSJ
  rationale: «Desposados» preserva el sentido social-jurídico de μνηστεύω mejor que «comprometidos», y evita el tono moderno de «engaged». «Con mujeres» refleja el distributivo plural del griego sin sugerir múltiples prometidas por persona.
- source_word: φυτεύουσιν ἀμπελῶνας
  english_pob_choice: those planting vineyards
  chosen_spanish: los que plantan viñas
  alternatives_spanish:
  - los que plantan viñedos
  - los que cultivan viñas
  lexicon: LSJ
  rationale: ἀμπελῶνας designa viñas/viñedos; «viñas» es la forma más natural y breve en español, y conserva la imaginería agrícola del original. «Viñedos» sería posible, pero puede sonar más técnico que el griego simple.
- source_word: δειλοῖς
  english_pob_choice: the fearful
  chosen_spanish: los temerosos
  alternatives_spanish:
  - los tímidos
  - los cobardes
  lexicon: LSJ
  rationale: «Temerosos» mantiene la categoría sin fijar de antemano si el énfasis es miedo real, cobardía moral o timidez. Así se conserva la tensión léxica observada en el inglés POB.
- source_word: ἀποστρέφειν ἕκαστον εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: should each return to his house
  chosen_spanish: cada uno vuelva a su casa
  alternatives_spanish:
  - cada uno regrese a su casa
  - que cada uno vuelva a su casa
  lexicon: LSJ
  rationale: El infinitivo con valor de mandato indirecto se vierte naturalmente en subjuntivo exhortativo. «Su casa» mantiene el distributivo singular masculino de ἕκαστον y del posesivo αὐτοῦ.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - de acuerdo con la ley
  lexicon: LSJ
  rationale: La traducción conserva la referencia genérica «la ley» sin expandirla en el cuerpo del texto. «Conforme a» suena formal y exacto en español bíblico contemporáneo.
theological_decisions:
- issue: Alusión a las exenciones de guerra en Deuteronomio 20:5–8
  english_pob_reading: Retain 'according to the law' without expanding the allusion
  chosen_spanish_reading: Mantener «conforme a la ley» sin explicitar la Torá de Moisés en el texto principal
  alternative_spanish_readings:
  - conforme a la ley de Moisés
  - según prescribe la ley
  rationale: El griego dice sólo «la ley». Nombrar explícitamente a Moisés introduciría una precisión no escrita, aunque la alusión de fondo sea muy probable. La nota preserva esa relación sin sobretraducir el verso.
  doctrine_reference: Principio de no ampliar más allá de lo que el texto fuente afirma; conservar la alusión sin resolverla en la línea principal.
- issue: Valor distributivo masculino de ἕκαστον y αὐτοῦ
  english_pob_reading: Use 'each ... his house'
  chosen_spanish_reading: Usar «cada uno ... su casa»
  alternative_spanish_readings:
  - cada uno ... su hogar
  - cada uno ... la casa de él
  rationale: El español permite conservar el sentido distributivo sin forzar una perífrasis pesada. «Su» comunica adecuadamente la posesión singular correspondiente al griego.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: La redacción española sigue la lectura revisada del inglés POB, que cambió «turn back» por «return» para una formulación más natural sin alterar ἀποστρέφειν. Se mantuvo la estructura enumerativa y la referencia genérica a «la ley», con una nota para la alusión deuteronómica.
  spanish_consistency_notes:
  - Se conserva el registro formal y bíblico contemporáneo, evitando arcaísmos innecesarios.
  - Se mantiene la terminología POB de renderizar YHWH como «Yahvé»; en este versículo no aparece el nombre divino explícito.
  - «Temerosos» preserva la ambigüedad léxica de δειλοῖς sin cerrar prematuramente la interpretación.
  - La construcción «cada uno vuelva a su casa» respeta el distributivo del griego y suena natural en español bíblico.
