translation:
  text: The cold of the north wind returns[a]; like rot, it freezes its spring. Over every standing body of water it settles[b], and the reservoir puts on armor like a breastplate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'like rot, it freezes its spring,' a difficult image. The Greek parallel reads more straightforwardly, 'ice/crystal freezes from water.' The main text follows the Hebrew as primary for Sirach where extant, while preserving the Greek sense here.
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording in the clause rendered 'over every standing body of water it settles' is textually difficult. The Greek parallel supports the sense of ice settling over every gathered body of water.
    reason: textual_variant
lexical_decisions:
- source_word: צִנַּת
  chosen: the cold of
  alternatives:
  - cold
  - chill
  - frost
  lexicon: HALOT
  rationale: The noun denotes coldness/chill. 'The cold of' fits the construct relation with 'north wind/spirit' and reads naturally in English without overinterpreting it as frost.
- source_word: רוּחַ צָפוֹן
  chosen: the north wind
  alternatives:
  - the north spirit
  - a north wind
  lexicon: HALOT
  rationale: In weather context רוּחַ is best rendered 'wind,' not 'spirit.' The Greek parallel βορέης confirms a meteorological sense.
- source_word: יָשִׁיב
  chosen: returns
  alternatives:
  - turns back
  - brings back
  - causes to return
  lexicon: HALOT
  rationale: The Hebrew form is somewhat terse in context. 'Returns' preserves the verbal idea without forcing an object not explicit in the Hebrew. The line describes the recurring onset of northern cold.
- source_word: וְכָרָקָב
  chosen: like rot
  alternatives:
  - like decay
  - like rottenness
  lexicon: HALOT
  rationale: The Hebrew witness reads 'like rot/decay,' though the image is difficult in context and the Greek instead has 'ice/crystal from water.' I retained the Hebrew wording in the main text because Hebrew is the primary witness here, while preserving the Greek-based alternative in a footnote.
- source_word: יִקְפִּיא
  chosen: it freezes
  alternatives:
  - it congeals
  - it makes freeze
  lexicon: HALOT
  rationale: The verb denotes causing to freeze or congeal. 'Freezes' is idiomatic and matches the weather imagery.
- source_word: מְקוֹרוֹ
  chosen: its spring
  alternatives:
  - its source
  - its fountain
  lexicon: HALOT
  rationale: The noun can mean source or spring. 'Its spring' keeps the water imagery vivid and corresponds to the singular suffix in Hebrew.
- source_word: מַעֲמַד מַיִם
  chosen: standing body of water
  alternatives:
  - expanse of water
  - mass of water
  - gathering of water
  lexicon: HALOT
  rationale: The phrase refers to water in a fixed place or collected state. The Greek συναγωγή ὕδατος points to a gathered body of water; 'standing body of water' communicates that clearly in modern English.
- source_word: יְקָרִים
  chosen: it settles
  alternatives:
  - it becomes heavy
  - it lies upon
  - it congeals
  lexicon: HALOT
  rationale: The Hebrew form is difficult and likely corrupt or rare; the Greek parallel καταλύσει suggests settling/resting upon the gathered waters. The translation follows the sense supported by the parallel while acknowledging uncertainty.
- source_word: וּכְשִׁרְיוֹן
  chosen: like a breastplate
  alternatives:
  - like armor
  - like a coat of mail
  lexicon: HALOT
  rationale: שִׁרְיוֹן is armor, especially a breastplate or coat of mail. Because the verse uses a clothing metaphor, 'breastplate' preserves the concrete image and aligns with the Greek θώρακα.
- source_word: יִלְבַּשׁ מִקְוֶה
  chosen: the reservoir puts on
  alternatives:
  - the pool puts on
  - the gathered water puts on
  - the body of water wears
  lexicon: HALOT
  rationale: The Hebrew syntax presents the water reservoir as the subject that 'puts on' armor. 'Reservoir' renders מִקְוֶה as a collected body of water and keeps the metaphor intact.
