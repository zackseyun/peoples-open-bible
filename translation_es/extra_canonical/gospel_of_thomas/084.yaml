base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/084.yaml
  text: Jesus said[images], "On the day you see your likeness, you rejoice. But whenever you see your images that came into being before you, which neither die nor become manifest—how much will you bear!"
  footnotes:
  - marker: images
    text: The Coptic uses the Greek loanword εἰκών (eikōn). The text contrasts the mortal 'likeness' (ⲉⲓⲛⲉ) with the pre-existent, immortal 'images' (ϩⲓⲕⲱⲛ).
    reason: theological_note
  - marker: came into being
    text: The Coptic ⲛ̄ⲧⲁϩϣⲱⲡⲉ uses a regional variant ϩ for the third-person plural pronoun ⲩ (ⲛⲧⲁ-ⲩ-ϣⲱⲡⲉ).
    reason: dialect_note
  - marker: neither die nor become manifest
    text: The Coptic ⲙⲁⲩⲙⲟⲩ and ⲙⲁⲩⲟⲩⲱⲛϩ use the prefix ⲙⲁ-, a regional variant of the negative habitual ⲙⲉⲣⲉ-.
    reason: dialect_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Adjusted the temporal phrase to match the source more closely (“On the day you see”); removed the bracketed duplicate/garbled material so the clause reads cleanly while retaining all established lexical decisions.
translation:
  language: es
  text: 'Jesús dijo: «El día en que ven su semejanza, se alegran. Pero cuando vean sus imágenes[a], que llegaron a ser antes de ustedes[b], las cuales ni mueren ni se manifiestan[c], ¿cuánto soportarán?»'
  philosophy: formal
  footnotes:
  - marker: a
    text: El texto copto usa aquí un préstamo griego equivalente a ‘imagen’; la traducción mantiene la oposición entre ‘semejanza’ e ‘imágenes’.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘antes de ustedes’; la frase indica prioridad temporal de las imágenes respecto de quienes las ven.
    reason: source_note
  - marker: c
    text: El copto emplea un giro negativo habitual regional; por eso se traduce de manera directa como ‘ni mueren ni se manifiestan’.
    reason: source_note
lexical_decisions:
- source_word: ⲉⲓⲛⲉ
  english_pob_choice: likeness
  chosen_spanish: semejanza
  alternatives_spanish:
  - parecido
  - apariencia
  - forma
  lexicon: Crum 78a
  rationale: ‘Semejanza’ preserva la relación de reflejo o correspondencia del término coptico, sin confundirlo con las ‘imágenes’ distintas del resto de la cláusula.
- source_word: ϩⲓⲕⲱⲛ
  english_pob_choice: images
  chosen_spanish: imágenes
  alternatives_spanish:
  - formas
  lexicon: BDAG 288; Crum 661b
  rationale: Se conserva ‘imágenes’ para reflejar el préstamo griego εἰκών y mantener la oposición conceptual con ‘semejanza’.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: came into being
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - existieron
  - fueron hechas
  lexicon: Crum 583b
  rationale: ‘Llegaron a ser’ expresa con naturalidad en español la noción de originación/venida a la existencia sin cargar innecesariamente el texto con una formulación más interpretativa.
- source_word: ϩⲓⲧⲉⲧⲛⲉϩⲏ
  english_pob_choice: before you
  chosen_spanish: antes de ustedes
  alternatives_spanish:
  - delante de ustedes
  - antes que ustedes
  lexicon: Crum 648a
  rationale: La preposición compuesta indica prioridad temporal; ‘antes de ustedes’ es idiomático en español y conserva el sentido temporal del original.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: become manifest
  chosen_spanish: se manifiestan
  alternatives_spanish:
  - aparecen
  - son reveladas
  lexicon: Crum 485b
  rationale: ‘Se manifiestan’ retiene la idea de hacerse visibles o revelarse, sin importar una lectura demasiado teológica en español.
- source_word: ϥⲓ ϩⲁ
  english_pob_choice: bear
  chosen_spanish: soportarán
  alternatives_spanish:
  - endurarán
  - cargarán
  lexicon: Crum 621a
  rationale: En este contexto interrogativo, ‘soportarán’ comunica bien la carga o peso de lo dicho y corresponde al valor de ‘bear/endure’.
theological_decisions:
- issue: Distinción entre ‘likeness’ y ‘images’
  english_pob_reading: likeness vs images
  chosen_spanish_reading: semejanza vs imágenes
  alternative_spanish_readings:
  - apariencia vs formas
  - parecido vs imágenes
  rationale: Se mantiene la distinción terminológica del audit trail para no borrar la tensión entre la imagen mortal y las imágenes preexistentes. ‘Semejanza’ y ‘imágenes’ permiten distinguir claramente ambos términos en español.
  doctrine_reference: Antropología e imaginería del yo; preservación de contraste conceptual del texto
- issue: Lectura temporal de ‘On the day you see’
  english_pob_reading: On the day you see
  chosen_spanish_reading: El día en que vean
  alternative_spanish_readings:
  - Cuando vean
  - El día que vean
  rationale: 'Se sigue la corrección del pass de revisión: el coptico exige una referencia temporal general, no ‘hoy’. ‘El día en que’ mantiene el matiz sin sobrerrepresentarlo.'
  doctrine_reference: Ninguna doctrina específica; precisión temporal del enunciado
- issue: Valor de la cláusula negativa ‘neither die nor become manifest’
  english_pob_reading: neither die nor become manifest
  chosen_spanish_reading: ni mueren ni se manifiestan
  alternative_spanish_readings:
  - ni mueren ni aparecen
  - ni mueren ni se revelan
  rationale: Se conserva la negación paralela y el contraste entre lo mortal y lo no manifestado. ‘Se manifiestan’ evita forzar la frase hacia una interpretación plenamente escatológica o metafísica.
  doctrine_reference: Ontología implícita del dicho; contraste entre lo visible-mortal y lo preexistente
translation_notes:
  revision_awareness: Se incorporó la corrección de revisión que cambia la apertura de ‘Hoy’ a ‘El día en que’ y que evita el futuro en ‘rejoice’, siguiendo el habitual coptico. También se preservó la distinción auditada entre ‘likeness’ y ‘images’ y se eliminó cualquier material duplicado o espurio.
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ como forma fija del nombre propio.
  - Se preserva la distinción semántica ‘semejanza’ / ‘imágenes’ para reflejar la oposición del original.
  - ‘Se manifiestan’ se usa de manera consistente para ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ en un registro neutral y bíblico.
  - No se introdujo vocabulario eclesiástico ajeno al texto; el tono permanece sobrio y fuente-consciente.
