translation:
  language: es
  text: Pero si te has desviado[a] estando bajo tu marido[b], y si te has vuelto impura, y un hombre se ha acostado contigo[c] aparte de tu marido—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''te has extraviado'' o ''has sido infiel a tu marido''. El hebreo dice literalmente ''te has desviado bajo tu marido'', conservando la imagen de desviación en un contexto marital.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'bajo tu marido'; es un modismo hebreo que alude al vínculo matrimonial y a la condición de estar bajo su relación o autoridad.
    reason: cultural_note
  - marker: c
    text: Lit. 'un hombre ha dado su acostarse contigo', un eufemismo hebreo para relaciones sexuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂטִית
  english_pob_choice: have gone astray
  chosen_spanish: te has desviado
  alternatives_spanish:
  - te has extraviado
  - has sido infiel
  lexicon: HALOT
  rationale: Desviarte conserva la metáfora de apartarse del camino o de la fidelidad marital. 'Extraviado' es posible, pero puede sonar más general; 'ser infiel' explicita la conclusión moral, pero interpreta más allá de la imagen verbal del hebreo.
- source_word: תַּחַת אִישֵׁךְ
  english_pob_choice: while under your husband
  chosen_spanish: estando bajo tu marido
  alternatives_spanish:
  - mientras estás bajo tu marido
  - bajo la autoridad de tu marido
  lexicon: HALOT
  rationale: '''Bajo tu marido'' preserva el modismo hebreo y su trasfondo relacional/jurídico. ''Estando bajo tu marido'' suena natural en español y mantiene la idea de condición marital; ''bajo la autoridad de tu marido'' aclara, pero explicita más de lo que el hebreo formula.'
- source_word: נִטְמֵאת
  english_pob_choice: have become defiled
  chosen_spanish: te has contaminado
  alternatives_spanish:
  - te has manchado ritualmente
  - te has hecho impura
  lexicon: HALOT
  rationale: El verbo comunica contaminación ritual y sexual en este contexto. 'Contaminado' es un equivalente amplio y comprensible en español; 'impura' puede sonar más litúrgico, y 'manchado ritualmente' explica demasiado.
- source_word: וַיִּתֵּן אִישׁ בָּךְ אֶת שְׁכָבְתּוֹ
  english_pob_choice: a man has lain with you
  chosen_spanish: un hombre se ha acostado contigo
  alternatives_spanish:
  - un hombre ha yacido contigo
  - un hombre te ha dado su lecho
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual; 'se ha acostado contigo' es natural en español y reproduce bien el sentido sin volverse demasiado técnico. 'Ha yacido contigo' es más literal pero menos idiomático; 'te ha dado su lecho' suena demasiado literal y opaco.
- source_word: מִבַּלְעֲדֵי אִישֵׁךְ
  english_pob_choice: besides your husband
  chosen_spanish: fuera de tu marido
  alternatives_spanish:
  - aparte de tu marido
  - además de tu marido
  lexicon: HALOT
  rationale: '''Fuera de tu marido'' expresa exclusión y contraste con el esposo en un español claro y sobrio. ''Aparte de'' también funciona, pero puede sonar menos enfático; ''además de'' es más ambigua.'
theological_decisions:
- issue: Conservar la tensión entre metáfora de desviación y eufemismo sexual sin moralizar de más
  english_pob_reading: Use 'gone astray while under your husband' and explicit sexual language in the following clause
  chosen_spanish_reading: Mantener 'te has desviado' y luego 'se ha acostado contigo'
  alternative_spanish_readings:
  - has sido infiel
  - te has apartado de tu marido
  rationale: La primera cláusula conserva la imagen de apartarse; la segunda hace explícita la relación sexual mediante un eufemismo español natural. Esto evita tanto suavizar demasiado el pasaje como convertirlo en una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source text''s plain sense without paraphrase beyond warrant.'
translation_notes:
  revision_awareness: Tomé como base la lectura revisada del inglés POB, que suaviza 'under your husband' a 'while under your husband' y prefiere 'has lain with you' como eufemismo más directo. En español opté por una formulación equivalente y natural ('estando bajo tu marido', 'se ha acostado contigo') que conserva la metáfora y el eufemismo sin perder claridad.
  spanish_consistency_notes:
  - Usé 'marido' en vez de 'esposo' para reflejar el paralelismo más sobrio y la relación jurídico-marital del contexto.
  - Mantuve 'desviado' para preservar el valor metafórico de שׂטה.
  - Evité 'impura' como traducción principal de נִטְמֵאת para no cargar el verso con un término exclusivamente ritual si el contexto inmediato ya mezcla lo ritual y lo sexual.
  - No convertí el eufemismo sexual en lenguaje clínico o demasiado explícito; la formulación española conserva la dignidad del texto.
