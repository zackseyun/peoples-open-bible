translation:
  language: es
  text: Porque los que han guardado santamente las cosas santas[a] serán hechos santos, y los que han sido enseñados acerca de ellas encontrarán una defensa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que han observado santamente las cosas sagradas ... serán santificados». El griego usa un encadenamiento deliberado de términos de la misma familia léxica de santidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «encontrarán una respuesta» o «encontrarán justificación». El término griego puede designar una defensa o respuesta frente a examen o acusación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξαντες
  english_pob_choice: have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han observado
  - han custodiado
  lexicon: BDAG
  rationale: φυλάξαντες expresa la idea de conservar o observar con cuidado. «Han guardado» es natural en español y mantiene la noción de fidelidad en el cumplimiento sin cargar el verso con una imagen demasiado física de custodia.
- source_word: ὁσίως
  english_pob_choice: holily
  chosen_spanish: santamente
  alternatives_spanish:
  - piadosamente
  - en santidad
  lexicon: LSJ
  rationale: El adverbio está emparentado con ὅσια y ὁσιωθήσονται, por lo que conviene conservar una forma adverbial que refleje esa repetición. «Santamente» transmite el valor adverbial y mantiene una conexión léxica visible con «santificados».
- source_word: τὰ ὅσια
  english_pob_choice: holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - las realidades santas
  lexicon: LSJ
  rationale: El plural neutro puede referirse de manera amplia a asuntos, observancias u objetos sagrados. «Las cosas santas» conserva la literalidad básica y permite que el enlace con ὁσίως y ὁσιωθήσονται siga siendo transparente en español.
- source_word: ὁσιωθήσονται
  english_pob_choice: will be made holy
  chosen_spanish: serán santificados
  alternatives_spanish:
  - serán hechos santos
  - serán consagrados
  lexicon: LSJ
  rationale: El futuro pasivo pide una traducción pasiva. «Serán santificados» preserva el paralelismo léxico con «santamente» y «cosas santas», y en español comunica bien la idea de quedar hechos santos sin introducir una paráfrasis excesiva.
- source_word: διδαχθέντες
  english_pob_choice: have been taught
  chosen_spanish: han sido enseñados
  alternatives_spanish:
  - han sido instruidos
  - han aprendido
  lexicon: BDAG
  rationale: El participio pasivo indica recepción de instrucción. «Han sido enseñados» refleja con claridad la pasividad y se mantiene cercano al audit trail inglés.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: en ellas
  alternatives_spanish:
  - en ellas mismas
  - acerca de ellas
  lexicon: BDAG
  rationale: El pronombre vuelve naturalmente a «las cosas santas». «En ellas» recoge esa referencia implícita y suena más fluido que repetir un sustantivo ya mencionado.
- source_word: εὑρήσουσιν ἀπολογίαν
  english_pob_choice: will find a defense
  chosen_spanish: encontrarán una defensa
  alternatives_spanish:
  - encontrarán una respuesta
  - encontrarán justificación
  lexicon: BDAG
  rationale: 'ἀπολογία suele tener matiz forense: una defensa o respuesta ante acusación. «Una defensa» conserva ese valor jurídico sin importar la carga teológica más fuerte de «justificación».'
theological_decisions:
- issue: Juego de palabras de santidad (ὁσίως / τὰ ὅσια / ὁσιωθήσονται)
  english_pob_reading: 'Retain explicit holiness language throughout: ''kept holy things holily ... will be made holy.'''
  chosen_spanish_reading: 'Mantener el campo léxico de santidad: «santamente ... cosas santas ... serán santificados».'
  alternative_spanish_readings:
  - «piadosamente ... cosas sagradas ... serán consagrados»
  - «en santidad ... realidades santas ... serán hechos santos»
  rationale: El griego acumula cognados de la misma raíz, y la traducción española debe dejar visible esa estructura. «Santamente / santas / santificados» preserva la repetición sin sacrificar inteligibilidad.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sentido de ἀπολογία
  english_pob_reading: forensic 'defense'
  chosen_spanish_reading: forense 'defensa'
  alternative_spanish_readings:
  - «respuesta»
  - «justificación»
  rationale: En contexto, ἀπολογία puede significar una defensa razonada frente a examen o acusación. «Defensa» mantiene el matiz jurídico y evita importar una categoría doctrinal más técnica que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 y conserva el juego léxico señalado en el audit trail inglés: ὁσίως / τὰ ὅσια / ὁσιωθήσονται. También refleja la última revisión inglesa que prefirió un adverbio más directo («holily»); en español se resolvió con «santamente» para mantener esa relación verbal sin sonar artificioso.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni κύριος.
  - Se eligió «santificados» en lugar de «consagrados» para conservar el vínculo morfológico con «santamente» y «cosas santas».
  - «Defensa» se mantuvo por su valor forense; no se trasladó a «justificación» para no aumentar el contenido doctrinal.
  - La referencia de «en ellas» se entiende a las cosas santas mencionadas inmediatamente antes, evitando añadir un sujeto implícito innecesario.
