  text: וַ֠/יָּבֹאוּ שְׁנֵ֨י הַ/מַּלְאָכִ֤ים סְדֹ֨מָ/ה֙ בָּ/עֶ֔רֶב וְ/ל֖וֹט יֹשֵׁ֣ב בְּ/שַֽׁעַר סְדֹ֑ם וַ/יַּרְא לוֹט֙ וַ/יָּ֣קָם לִ/קְרָאתָ֔/ם וַ/יִּשְׁתַּ֥חוּ אַפַּ֖יִם אָֽרְצָ/ה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/019/001.yaml
  text: The two angels came to Sodom in the evening[a], and Lot was sitting in the gate of Sodom. When Lot saw them[c][b], he rose to meet them and bowed with his face to the ground.
  footnotes:
  - marker: a
    text: Or 'prostrated himself with his face to the ground.' The Hebrew describes a full act of bowing low before them.
    reason: lexical_alternative
  - marker: b
    text: '''In the gate of Sodom'' refers to the city-gate area, a public place associated with civic activity.'
    reason: cultural_note
  - marker: c
    text: Or 'bowed down with his face to the ground'.
    reason: previous_rendering
