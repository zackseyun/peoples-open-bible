- from: Y él estuvo con ellos en la casa de Dios[a], escondiéndose[b] durante seis años, mientras Atalía reinaba sobre la tierra.
  to: Y él estuvo con ellos en la casa de Dios[b], escondiéndose[a] durante seis años, mientras Atalía reinaba sobre el país.
  rationale: Se corrigen los anclajes de las notas para que cada una corresponda al término que explica. Además, se ajusta «sobre la tierra» a «sobre el país» para una lectura más natural y contextual en español, manteniendo el sentido territorial de הָאָרֶץ.
