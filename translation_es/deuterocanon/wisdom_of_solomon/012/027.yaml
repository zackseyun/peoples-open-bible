  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Dios' se usa correctamente; no aparece YHWH, Mesías, Cristo, Espíritu, etc. La elección 'Dios verdadero' concuerda con la decisión teológica del POB inglés y la nota preserva la alternativa adverbial.
