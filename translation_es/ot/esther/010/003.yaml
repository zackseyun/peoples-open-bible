base_translation:
  language: en
  yaml_path: translation/ot/esther/010/003.yaml
  text: For Mordecai the Jew was second to King Ahasuerus[a], great among the Jews, and favored by the multitude of his brothers[c][b], seeking good for his people and speaking peace to all his offspring.
  footnotes:
  - marker: a
    text: Or 'by most of his brothers'; the Hebrew phrase can denote either a multitude or a majority of his fellow Jews.
    reason: lexical_alternative
  - marker: b
    text: '''His brothers'' here likely means his fellow Jews or kinsmen, not only literal male siblings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to all his descendants.' The Hebrew 'offspring/seed' is a collective term.
    reason: lexical_alternative
