  yaml_path: translation/nt/revelation/007/014.yaml
  text: 'And I said to him[a], “My lord, you know.” And he said to me, “These are the ones coming out of the great tribulation[b]. They washed their robes and made them white in the blood of the Lamb.”'
  footnotes:
  - marker: a
    text: Or “out of the great affliction” or “out of the great distress.” The Greek term can denote pressure, affliction, or tribulation.
    reason: lexical_alternative
  - marker: b
    text: The phrase “in the blood of the Lamb” is intentionally retained. The Greek could be understood instrumentally (“by the blood”), but the wording preserves Revelation’s paradoxical cleansing imagery.
    reason: lexical_alternative
translation:
  language: ko
  text: '그래서 내가 그에게 말하기를, 「내 주여, 주께서 아시나이다」 하였습니다. 그러자 그가 내게 말하였습니다. 「이들은 큰 환난에서 나오는 자들이라. 그들이 어린 양의 피에 자기 두루마기를 빨아 희게 하였느니라[a].」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「어린 양의 피에」는 본문 그대로 보존한다. 헬라어는 도구적으로(「피로 말미암아」) 이해될 수도 있으나, 계시록의 역설적 정결 이미지를 살리기 위해 본문 어구를 그대로 둔다.'
    reason: lexical_alternative
