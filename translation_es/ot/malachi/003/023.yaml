translation:
  language: es
  text: ¡Mira[a], yo les envío a Elías el profeta antes de la venida del gran y temible día de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mira» recoge el valor enfático de la partícula hebrea; también podría traducirse «He aquí». Otra posibilidad para el final de la frase es «el gran y terrible día de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una घोषणा/llamado enfático. «Mira» conserva esa fuerza deíctica con español moderno y natural; «He aquí» suena más arcaico.
- source_word: אָֽנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; en español puede expresarse con el orden natural de la oración y, en este caso, con «yo» implícito por la flexión verbal. Para evitar sobrecarga, no se añadió «yo mismo».
- source_word: שֹׁלֵחַ
  english_pob_choice: am sending
  chosen_spanish: envío
  alternatives_spanish:
  - estoy enviando
  - voy a enviar
  - enviaré
  lexicon: HALOT
  rationale: El participio expresa inmediatez/proximidad profética. En español, el presente «envío» comunica bien esa acción en curso o inminente sin forzar una perífrasis poco natural.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  - para ustedes
  lexicon: HALOT
  rationale: El dativo plural se expresa de forma natural con el clítico de objeto indirecto «les», manteniendo el destinatario plural del anuncio.
- source_word: אֵלִיָּה הַנָּבִיא
  english_pob_choice: Elijah the prophet
  chosen_spanish: a Elías el profeta
  alternatives_spanish:
  - a Elías, el profeta
  - a Elías, profeta
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el título apposicional traducido. No se expande interpretativamente el referente en el texto principal; eso queda para nota, si hace falta.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - previo a
  lexicon: HALOT
  rationale: La prioridad temporal se expresa de manera directa con «antes de», que resulta más natural en español que una calca.
- source_word: בּוֹא
  english_pob_choice: the coming of
  chosen_spanish: la venida
  alternatives_spanish:
  - la llegada
  - el venir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona naturalmente como sustantivo verbal en español. «La venida» preserva tanto la acción como el tono bíblico sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino en el texto principal: «Yahvé». Mantiene la referencia al Tetragrámaton sin la convención de máscara litúrgica.'
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: HALOT
  rationale: «Gran» es la forma natural antepuesta del adjetivo en español y conserva el sentido de grandeza e importancia del día.
- source_word: וְהַנּוֹרָא
  english_pob_choice: fearful
  chosen_spanish: temible
  alternatives_spanish:
  - terrible
  - espantoso
  - que inspira temor
  lexicon: HALOT
  rationale: El adjetivo expresa que el día inspira temor/dread. «Temible» preserva esa fuerza con una palabra clara y digna en español.
theological_decisions:
- issue: Referente de «Elías»
  english_pob_reading: Retain the literal name 'Elijah' without interpretive expansion.
  chosen_spanish_reading: Mantener «Elías» sin expansión interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - «un nuevo Elías»
  - «un precursor al estilo de Elías»
  rationale: El hebreo nombra a Elías directamente. La traducción no debe resolver en el texto principal la posible tensión tipológica; esa aclaración pertenece a una nota o comentario, no a la línea traducida.
  doctrine_reference: Primacía del texto original; preservar tensión interpretativa sin imponer una solución dogmática.
- issue: Matiz de יוֹם יְהוָה הַגָּדוֹל וְהַנּוֹרָא
  english_pob_reading: 'Render with both majesty and dread: ''the great and fearful day of Yahweh.'''
  chosen_spanish_reading: «el gran y temible día de Yahvé»
  alternative_spanish_readings:
  - «el gran y terrible día de Yahvé»
  - «el gran y temible día del Señor»
  - «el gran y temible día de Jehová»
  rationale: La frase combina majestad y amenaza judicial. «Temible» mantiene el componente de temor sin suavizarlo; «gran» reproduce la magnitud del día y «Yahvé» conserva el nombre divino según el estándar del proyecto.
  doctrine_reference: Mantener la tensión profética de juicio y grandeza; coherencia con el nombre divino del proyecto.
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés no introdujo cambios; por eso el español sigue de cerca la lectura estable, conservando la sintaxis profética breve y la tensión entre promesa y juicio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto, no «SEÑOR».
  - Se conservó el nombre propio «Elías» sin interpretación añadida en el texto principal.
  - «Temible» fue preferido por su capacidad de expresar temor reverente/judicial sin pérdida del tono profético.
  - La puntuación usa exclamación inicial para reflejar el valor enfático de הִנֵּה.
  - La nota [a] solo marca la alternativa lexical de la interjección inicial y no altera el sentido básico.
