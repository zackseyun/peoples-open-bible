  source_alignment_summary: 'La línea principal capta bien צִיּוֹן, בְּמִשְׁפָּט, תִּפָּדֶה y בִּצְדָקָה, pero falla de manera importante en וְשָׁבֶיהָ. El hebreo es un participio personal: ''los que vuelven/retornan de ella o a ella'', no un sustantivo abstracto como ''retornos''. El rastro inglés revisado además fijó ''her returnees'' para evitar expansión interpretativa. Por tanto, el borrador español no preserva fielmente el referente humano del original.'
  spanish_quality_summary: El borrador es mayormente legible, pero 'sus retornos' es poco natural y semánticamente incorrecto en español, porque designa actos/eventos, no personas. 'Sion' es aceptable en registro bíblico; 'por justicia' y 'por rectitud' son publicables. La nota b también contiene una opción torpe ('sus que vuelven').
  glossary_alignment: 'No hay conflicto relevante con la terminología de proyecto. ''rectitud'' para צְדָקָה es una excepción contextual razonable para distinguirla de מִשְׁפָּט. La corrección necesaria es lexical/sintáctica: usar una forma personal para וְשָׁבֶיהָ, idealmente ''los que regresan a ella'' o ''sus retornantes/retornados'', con nota que preserve la ambigüedad de ''return/turn''.'
