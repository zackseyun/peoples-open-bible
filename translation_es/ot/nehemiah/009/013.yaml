    text: O 'hablaste a ellos desde el cielo'. El hebreo usa literalmente 'con', pero en español también puede expresarse naturalmente con 'a' con este verbo.
    reason: lexical_alternative
  - marker: b
    text: O 'juicios justos' para 'juicios rectos'.
    reason: lexical_alternative
  - marker: c
    text: O 'leyes de verdad' o 'instrucciones verdaderas' para 'leyes verdaderas'.
    reason: lexical_alternative
