  - severity: low
    issue: '''Duodécimo'' es correcto, pero menos natural que ''decimosegundo'' en español eclesial general.'
    rationale: Ambas formas son válidas, pero 'decimosegundo' suele leerse con mayor fluidez en español moderno neutral sin perder dignidad.
