base_translation:
  language: en
  yaml_path: translation/ot/ruth/001/001.yaml
  text: Now it happened in the days when the judges judged that there was a famine in the land[c][b][a], and a man went from Bethlehem of Judah to sojourn in the fields of Moab—he and his wife and his two sons.
  footnotes:
  - marker: a
    text: 'Or ''when the judges ruled.'' The Hebrew repeats the same root (''judge'') in an idiomatic construction: literally, ''when the judges judged.'''
    reason: lexical_alternative
  - marker: b
    text: '''Sojourn'' suggests temporary residence as an outsider, not necessarily permanent settlement.'
    reason: cultural_note
  - marker: c
    text: Or 'in the territory/country of Moab.' Literally, 'in the fields of Moab.'
    reason: lexical_alternative
