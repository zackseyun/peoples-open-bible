  timestamp: '2026-05-07T22:14:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: restricción enfática («solo»), percepción personal («con tus ojos»), doble verbo de observación, y el objeto visto como la retribución debida a los malvados. Sin embargo, «la paga» en español suena demasiado coloquial o laboral y no comunica con suficiente claridad la idea de retribución moral/judicial que שִׁלֻּמַת lleva en este contexto poético.'
  spanish_quality_summary: La frase es legible y natural, pero «la paga de los malvados» puede sonar ambigua en español moderno, incluso como salario o pago recibido por ellos. «La retribución de los malvados» es más clara, más digna estilísticamente, y sigue siendo suficientemente amplia para no reducir el término a castigo explícito. El resto del verso funciona bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección «malvados» para רְשָׁעִים es aceptable. La principal mejora léxica requerida es sustituir «paga» por «retribución» para ajustarse mejor al razonamiento documentado en el POB inglés y a la claridad del español eclesial general.
  issues:
  - severity: medium
    issue: «la paga» es demasiado ambigua para וְשִׁלֻּמַת en este contexto
    rationale: Aunque etimológicamente puede sugerir devolución debida, en español actual «paga» suele asociarse a salario o pago ordinario. Aquí el contexto de Salmo favorece una noción de retribución debida a los malvados; «retribución» preserva mejor el matiz sin sobreespecificar «castigo».
  - severity: low
    issue: La nota al pie incluye «repago», que suena poco natural
    rationale: «Repago» no es la mejor alternativa para español bíblico legible. Conviene mantener alternativas más naturales y documentadas, como «pago debido», «recompensa» o «castigo», según el matiz.
  revised_spanish_text: Tú solo mirarás con tus ojos y verás la retribución[a] de los malvados.
  revised_footnotes:
  - marker: a
    text: 'También: «la paga», «la recompensa» o «el castigo» de los malvados.'
    reason: lexical_alternative
