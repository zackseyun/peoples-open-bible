    text: 'O: «que se alimentan a sí mismos». El verbo hebreo es el mismo verbo pastoral usado en todo el versículo; el sentido es que los líderes de Israel se cuidaban a sí mismos en lugar de al rebaño.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las ovejas». Se vierte «el rebaño» por el sentido colectivo y por la continuidad de la imagen pastoral.'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [a] para alinearla con la evidencia fuente y el audit trail inglés, y se reancla [b] en 'rebaño', donde corresponde la alternativa 'las ovejas'. Además, se mejora la naturalidad y precisión de la fórmula divina con 'el Señor, Yahvé' y se aligera 'diles a ellos' a 'diles'.
