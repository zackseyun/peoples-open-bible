translation:
  language: es
  text: Yo afligiré a Ariel[a], y habrá duelo y lamentación, y será para mí como un fogón del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo אֲרִיאֵל (''Ariel'') probablemente contiene un juego de palabras: la ciudad llamada Ariel llegará a ser como un «fogón del altar». Alternativamente, la frase final puede leerse de modo más formal: «y será para mí como Ariel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲצִיקוֹתִי
  english_pob_choice: And I will distress
  chosen_spanish: Yo afligiré
  alternatives_spanish:
  - Yo angustiaré
  - Yo pondré en apuro
  lexicon: HALOT
  rationale: El hiphil del verbo transmite causar presión, angustia o aflicción. «Afligiré» conserva ese campo semántico en español bíblico actual sin reducirlo a un asedio militar específico.
- source_word: לַאֲרִיאֵל
  english_pob_choice: Ariel
  chosen_spanish: Ariel
  alternatives_spanish:
  - hogar del altar
  - Jerusalén
  lexicon: HALOT
  rationale: En este contexto Ariel funciona como nombre/título propio de la ciudad, por lo que se translitera como nombre. Se preserva el juego de palabras mediante la nota sobre el segundo uso del término.
- source_word: תַאֲנִיָּה
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - lamentación
  lexicon: HALOT
  rationale: El sustantivo expresa lamento fúnebre o duelo. «Duelo» es natural en español y mantiene el tono de pena intensa; el paralelo siguiente refuerza la duplicación poética.
- source_word: וַאֲנִיָּה
  english_pob_choice: and lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - lamento
  - aflicción
  lexicon: HALOT
  rationale: El segundo sustantivo intensifica el primero con un matiz cercano de queja doliente. «Lamentación» conserva la formalidad y la repetición poética sin aplanar la diferencia con el término anterior.
- source_word: וְהָיְתָה לִּי
  english_pob_choice: and she will be to me
  chosen_spanish: y será para mí
  alternatives_spanish:
  - y me será
  - y será para mí como
  lexicon: HALOT
  rationale: El femenino singular se refiere a la ciudad personificada. En español, el referente ya queda claro por el contexto, así que «será para mí» fluye de manera natural sin perder la relación relacional del hebreo.
- source_word: כַּאֲרִיאֵל
  english_pob_choice: like an altar hearth
  chosen_spanish: como un hogar del altar
  alternatives_spanish:
  - como un ara del altar
  - como Ariel
  lexicon: HALOT
  rationale: La segunda ocurrencia explota el sentido probable de אֲרִיאֵל como «hogar del altar»/«fogón del altar». «Hogar del altar» conserva la imagen sacrificial y el juego sonoro con el nombre Ariel; se evita traducirla solo como nombre para no perder la ironía profética.
theological_decisions:
- issue: Juego de palabras entre Ariel como nombre y como imagen cultual
  english_pob_reading: Use 'Ariel' for the first occurrence as the city's name and 'altar hearth' for the second occurrence to reflect the lexical play and likely sacrificial image.
  chosen_spanish_reading: Usar «Ariel» en la primera aparición y «hogar del altar» en la segunda para reflejar el juego léxico y la imagen cultual probable.
  alternative_spanish_readings:
  - Usar «Ariel» en ambas apariciones
  - Usar «hogar del altar» en ambas apariciones
  rationale: El pasaje trata a Ariel como designación de la ciudad, pero la segunda instancia parece explotar el sentido subyacente del término. Mantener el nombre primero y verter el segundo por sentido preserva la tensión literaria y la fuerza profética sin eliminar la ambigüedad documentada.
  doctrine_reference: 'Principio POB: transliterar nombres propios, traducir títulos/funciones, y preservar tensiones semánticas cuando el texto las activa.'
translation_notes:
  revision_awareness: No se registran revisiones textuales en el expediente; la concordancia de control indica alto acuerdo y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Ariel» como nombre propio en la primera ocurrencia, conforme al uso del expediente inglés POB.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - «Afligiré» conserva un sentido amplio de presión/angustia sin especificar indebidamente el modo del castigo.
  - La duplicación poética «duelo y lamentación» preserva el paralelismo del hebreo.
  - «Hogar del altar» intenta reflejar el valor cultual del segundo אֲרִיאֵל sin borrar el juego de palabras.
