translation:
  language: es
  text: Y Johanán hijo de Carea, y todos los comandantes de las fuerzas que estaban en el campo abierto[a], llegaron a Guedalías en Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaban en el campo». La expresión hebrea puede referirse de manera más literal al campo o a los campos, o de forma más amplia al campo abierto o a la zona rural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֽוֹחָנָן
  english_pob_choice: And Johanan
  chosen_spanish: Y Johanán
  alternatives_spanish:
  - Ahora Johanán
  - Entonces Johanán
  lexicon: HALOT
  rationale: La conjunción simple וְ se conserva como 'Y' para mantener el hilo narrativo sin añadir matiz temporal no explicitado. El nombre se translitera como Johanán, forma natural en español bíblico y coherente con la pronunciación del hebreo.
- source_word: בֶּן קָרֵחַ
  english_pob_choice: son of Kareah
  chosen_spanish: hijo de Carea
  alternatives_spanish:
  - el hijo de Carea
  lexicon: HALOT
  rationale: La construcción patronímica se rinde de modo directo con 'hijo de'. 'Carea' conserva el nombre propio hebreo en forma castellana sobria, sin forzar una forma eclesiástica tradicional que no aporta precisión adicional.
- source_word: וְ/כָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - con todos
  lexicon: HALOT
  rationale: '''Y todos'' refleja la coordinación con el grupo mencionado y mantiene el valor totalizador de כָל sin añadir un vínculo instrumental que el hebreo no exige.'
- source_word: שָׂרֵי הַ/חֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los comandantes de las fuerzas
  alternatives_spanish:
  - los capitanes de las tropas
  - los oficiales de las tropas
  - los comandantes de los soldados
  lexicon: HALOT
  rationale: שָׂרֵי se entiende como líderes o comandantes, y חֲיָלִים aquí alude a fuerzas militares. 'Comandantes de las fuerzas' conserva la fuerza militar del hebreo con un español claro y contemporáneo.
- source_word: אֲשֶׁר בַּ/שָּׂדֶה
  english_pob_choice: who were in the open country
  chosen_spanish: que estaban en la campiña
  alternatives_spanish:
  - que estaban en el campo
  - que estaban en el campo abierto
  - que estaban en el campo / la campiña
  lexicon: HALOT
  rationale: La expresión puede referirse literalmente al campo o más ampliamente al campo abierto / zona rural. 'Campiña' comunica bien esa idea en español natural, y evita la posible ambigüedad de 'campo' en contextos militares o agrícolas.
- source_word: בָּ֥אוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  lexicon: HALOT
  rationale: En español, con destino explícito, 'llegaron' suena más natural que un calco de 'vinieron'. Mantiene la dirección del movimiento sin perder el sentido de arribo.
- source_word: אֶל גְּדַלְיָהוּ
  english_pob_choice: to Gedaliah
  chosen_spanish: a Guedalías
  alternatives_spanish:
  - hacia Guedalías
  lexicon: HALOT
  rationale: אֶל marca movimiento hacia una persona; en español se expresa naturalmente con 'a'. El nombre se castellaniza como Guedalías para reflejar la forma hebrea en un registro bíblico legible.
- source_word: הַ/מִּצְפָּתָ/ה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  lexicon: HALOT
  rationale: El topónimo se mantiene como Mizpa. 'En' recoge la localización del encuentro, mientras el matiz direccional del heh final queda implícito en el movimiento hacia el lugar, como en la solución inglesa auditada.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el marcador de nota [a] directamente en el texto principal, unido al término donde surge la alternativa lexical documentada.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para el nombre divino porque este versículo no lo contiene.
  - Se mantuvo un registro bíblico sobrio y modernamente legible, sin introducir matices temporales inexistentes.
  - La nota [a] queda anclada en 'campiña' porque allí surge la alternativa 'campo/campiña/campo abierto'.
