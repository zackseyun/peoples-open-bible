  glossary_alignment: No hay términos del glosario mayor comprometidos en este versículo. «Congregación» para עֵדָה y «murmurara» para el motivo de queja en el desierto están bien alineados con la filosofía del proyecto. Las notas léxicas son útiles, pero la de [b] debería corresponder mejor a una redacción española más idiomática.
