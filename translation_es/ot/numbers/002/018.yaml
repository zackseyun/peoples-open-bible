    reason: lexical_alternative
  - marker: b
    text: O «según sus compañías/huestes». El hebreo tiene un sentido militar-organizativo ordenado.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos de Efraín», designación tribal para los descendientes o el pueblo de Efraín.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «líder» a «jefe» para un registro bíblico más natural y se alinea la construcción con la decisión léxica documentada para לִבְנֵי אֶפְרַיִם: «de los hijos de Efraín». El resto del texto y las notas pueden mantenerse.'
