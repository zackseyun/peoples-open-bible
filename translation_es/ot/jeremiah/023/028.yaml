translation:
  language: es
  text: El profeta que tiene un sueño, que cuente el sueño; pero el que tiene mi palabra, que hable mi palabra con veracidad[a]. ¿Qué tiene que ver la paja con el grano?[b] —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hable mi palabra en verdad» o «que hable mi verdadera palabra». El hebreo puede destacar tanto la manera veraz de hablar como la veracidad de la palabra misma.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Qué tiene en común la paja con el grano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - un profeta
  lexicon: HALOT
  rationale: El artículo definido hebreo está presente, pero funciona de manera genérica o de clase; en español se conserva naturalmente con «el profeta» en este contraste de tipo de profeta.
- source_word: אֲשֶׁר אִתּוֹ חֲלוֹם / יְסַפֵּר חֲלוֹם
  english_pob_choice: who has a dream / tell the dream
  chosen_spanish: que tiene un sueño / que cuente el sueño
  alternatives_spanish:
  - que tiene un sueño-message / que relate el sueño
  - que está con un sueño / que narre el sueño
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión o pertenencia de la experiencia revelada. «Tiene un sueño» comunica ese sentido sin sobreinterpretar. «Que cuente el sueño» conserva el verbo de relatar/recontar sin añadir matices ajenos.
- source_word: וַאֲשֶׁר דְּבָרִי אִתּוֹ / יְדַבֵּר דְּבָרִי אֱמֶת
  english_pob_choice: but let the one who has my word speak my word truthfully
  chosen_spanish: pero el que tiene mi palabra, que hable mi palabra con verdad
  alternatives_spanish:
  - pero el que tiene mi palabra, que hable mi palabra verdaderamente
  - pero el que tiene mi palabra, que hable mi palabra en verdad
  - pero el que tiene mi palabra, que hable mi palabra fielmente
  lexicon: HALOT
  rationale: «Con verdad» mantiene el valor adverbial de אֱמֶת y sugiere la manera veraz de hablar. Evita convertir el adjetivo en una afirmación abstracta sobre la palabra misma, aunque la tensión entre el modo de hablar y la veracidad del mensaje sigue presente.
- source_word: מַה לַתֶּבֶן אֶת הַבָּר
  english_pob_choice: What is straw to grain?
  chosen_spanish: ¿Qué tiene que ver la paja con el grano?
  alternatives_spanish:
  - ¿Qué hay entre la paja y el grano?
  - ¿Qué relación tiene la paja con el grano?
  lexicon: HALOT
  rationale: El hebreo contrasta dos cosas incongruentes. «Paja» preserva el contraste agrícola sin importar un cereal específico; «grano» reproduce בָּר sin añadir «trigo». La formulación idiomática en español expresa la misma oposición.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé
  alternatives_spanish:
  - —dice Yahvé
  - —oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto y la fórmula profética solemne con un verbo natural en español.
theological_decisions:
- issue: Contraste entre sueño profético y palabra verdadera de Yahvé
  english_pob_reading: 'Render the verse as an imperative contrast: the dream-claimant may recount his dream, but the true prophet must speak Yahweh''s word truthfully.'
  chosen_spanish_reading: 'La versión española mantiene el contraste imperativo: el que reclama un sueño puede contarlo, pero el que tiene la palabra de Yahvé debe hablarla con verdad.'
  alternative_spanish_readings:
  - Presentar ambas cláusulas de forma más neutra, sin oposición marcada
  - Suavizar la diferencia entre sueño y palabra
  rationale: El contexto profético opone la revelación falsa basada en sueños a la palabra auténtica de Yahvé. La traducción conserva esa tensión sin resolverla ni añadir contenido doctrinal externo.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Valor de אֱמֶת en la segunda cola
  english_pob_reading: speak my word truthfully
  chosen_spanish_reading: hablar mi palabra con verdad
  alternative_spanish_readings:
  - hablar mi palabra fielmente
  - hablar mi palabra en verdad
  rationale: «Con verdad» permite oír tanto la manera veraz de hablar como la integridad del mensaje, sin cerrar la ambigüedad del hebreo más de lo que exige el texto.
  doctrine_reference: HALOT; project lexical principle for אֱמֶת
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió «faithfully» por «truthfully» para reflejar más directamente אֱמֶת; por eso la opción española usa «con verdad» y no un equivalente centrado en fidelidad. También se conserva el contraste fuerte entre sueño y palabra, y el cultivo agrícola genérico «paja/grano» sin especificar «trigo».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Palabra» traduce דָּבָר en sentido de mensaje revelado, no simplemente habla humana.
  - No se especifica el cereal como trigo, porque בָּר es «grano» o «grano limpio», y el texto no obliga a concretar más.
  - «Con verdad» evita una paráfrasis excesiva y mantiene la tensión semántica de אֱמֶת.
