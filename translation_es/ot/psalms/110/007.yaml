translation:
  language: es
  text: Beberá del arroyo[a] en el camino; por tanto, levantará la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arroyo» traduce נחל de manera natural; también puede significar «corriente», «torrente» o «wadi», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: La expresión «levantará la cabeza» puede sugerir renovada fuerza, confianza o exaltación.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנַּחַל
  english_pob_choice: from the brook
  chosen_spanish: del arroyo
  alternatives_spanish:
  - del río
  - del torrente
  - del cauce
  lexicon: HALOT
  rationale: נחל puede referirse a arroyo, torrente o cauce estacional. «Arroyo» comunica bien la imagen poética en español y conserva la idea de una fuente de agua en el trayecto sin tecnicismo excesivo. Se evita «cauce» por sonar demasiado abstracto aquí.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: by the way
  chosen_spanish: junto al camino
  alternatives_spanish:
  - en el camino
  - por el camino
  - al paso
  lexicon: HALOT
  rationale: דרך significa «camino, ruta, viaje». En español, «junto al camino» transmite con naturalidad la escena de estar en marcha y beber en el trayecto. Se evita la calca «por el camino» si puede sonar menos concreta en esta imagen poética.
- source_word: יִשְׁתֶּה
  english_pob_choice: he will drink
  chosen_spanish: beberá
  alternatives_spanish:
  - bebe
  - tomará de beber
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí funciona con sentido futuro en la secuencia poética. «Beberá» es la equivalencia más directa y natural en español.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La expresión marca consecuencia. «Por tanto» preserva el valor inferencial con registro digno y claro.
- source_word: יָרִים רֹאשׁ
  english_pob_choice: he will lift up his head
  chosen_spanish: alzará su cabeza
  alternatives_spanish:
  - levantará la cabeza
  - mantendrá la frente en alto
  - se alzará la cabeza
  lexicon: HALOT
  rationale: La expresión idiomática hebrea puede sugerir renovada fuerza, confianza o exaltación. «Alzará su cabeza» mantiene la imagen literal y deja abierta la carga figurada, sin resolverla prematuramente.
theological_decisions:
- issue: Referente masculino singular no explícito
  english_pob_reading: Retain the singular pronoun 'he' without identifying the referent in the translation.
  chosen_spanish_reading: Mantener el sujeto implícito en la conjugación verbal, sin identificarlo como rey davídico, sacerdote-rey o Mesías en el texto mismo.
  alternative_spanish_readings:
  - él beberá
  - el rey beberá
  - el Mesías beberá
  rationale: El hebreo presenta verbos masculinos singulares sin un referente explícito en el versículo. El español puede conservar esa indeterminación con formas verbales personales, evitando imponer una identificación cristológica o histórica dentro del texto.
  doctrine_reference: Preservar la tensión interpretativa y el posible uso mesiánico canónico sin resolverlo en la traducción.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] junto a «arroyo» y [b] junto a «cabeza».'
  spanish_consistency_notes:
  - Se mantiene un registro poético y readable para uso eclesial.
  - Se evita reemplazar la imagen idiomática por una paráfrasis explicativa.
  - El sujeto queda no especificado en el texto, acorde con el hebreo.
  - La puntuación española coloca el punto y coma para marcar la relación causal entre las dos mitades del verso.
