base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/022.yaml
  text: Then they slaughtered the cattle[a], and the priests received the blood and splashed it against the altar. They slaughtered the rams and splashed the blood against the altar[b]. They slaughtered the lambs and splashed the blood against the altar.
  footnotes:
  - marker: a
    text: Or 'splashed the blood on the altar' or 'dashed the blood against the altar.' The Hebrew verb denotes a forceful ritual application of blood, not a light sprinkling.
    reason: lexical_alternative
  - marker: b
    text: '''Cattle'' renders a collective Hebrew term for bovine animals; some translations specify ''bulls'' from the sacrificial context.'
    reason: lexical_alternative
