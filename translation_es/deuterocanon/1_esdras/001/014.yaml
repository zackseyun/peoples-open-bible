translation:
  language: es
  text: Y los cantores del templo, los hijos de Asaf, estaban en sus puestos, conforme a lo que había sido dispuesto por David, y Asaf, Zacarías y Eddinous[a], los que eran de parte del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción aquí difiere del paralelo hebreo aproximado en 2 Crónicas, que en esta sección se centra en la distribución del holocausto. 1 Esdras conserva una noticia ampliada acerca de los cantores y de funcionarios nombrados.
    reason: cross_reference
  - marker: b
    text: También podría entenderse «nombrados por el rey». La expresión griega «los que eran de parte del rey» es breve y puede sugerir nombramiento real o afiliación real.
    reason: alternative_reading
lexical_decisions:
- source_word: ἱεροψάλται
  english_pob_choice: temple singers
  chosen_spanish: cantores del templo
  alternatives_spanish:
  - cantores sagrados
  - cantores litúrgicos
  lexicon: LSJ
  rationale: ἱεροψάλται combina la idea de lo sagrado con el canto cultual. En español, “cantores del templo” comunica de modo natural el contexto de servicio en el templo sin introducir una calificación más abstracta que el griego no exige.
- source_word: υἱοὶ Ἀσάφ
  english_pob_choice: the sons of Asaph
  chosen_spanish: los hijos de Asaf
  alternatives_spanish:
  - los hijos de Asaph
  - Asaf y sus hijos
  lexicon: LSJ
  rationale: La expresión es genealógica y organizativa. “Los hijos de Asaf” mantiene la forma tradicional y la relación colectiva con el linaje o gremio de cantores.
- source_word: ἐπὶ τῆς τάξεως αὐτῶν
  english_pob_choice: at their stations
  chosen_spanish: estaban en sus puestos
  alternatives_spanish:
  - estaban en su orden
  - estaban en sus divisiones
  - estaban en sus estaciones
  lexicon: LSJ
  rationale: τάξις aquí se refiere al lugar o función asignada en el servicio. “En sus puestos” preserva la idea de asignación funcional en un español más idiomático que una traducción literal de “orden”.
- source_word: κατὰ τὰ ὑπὸ Δαυεὶδ τεταγμένα
  english_pob_choice: according to what had been appointed by David
  chosen_spanish: conforme a lo que había sido dispuesto por David
  alternatives_spanish:
  - según lo que había sido ordenado por David
  - de acuerdo con lo que David había establecido
  - conforme a las cosas ordenadas por David
  lexicon: LSJ
  rationale: τεταγμένα expresa cosas dispuestas, ordenadas o establecidas. “Había sido dispuesto” conserva la pasiva y deja claro que David es el agente de la organización.
- source_word: οἱ παρὰ τοῦ βασιλέως
  english_pob_choice: who were from the king
  chosen_spanish: los que eran de parte del rey
  alternatives_spanish:
  - los que venían del rey
  - los que estaban con el rey
  - los que eran del rey
  lexicon: LSJ
  rationale: παρά con genitivo puede indicar procedencia o relación de parte de alguien. “De parte del rey” mantiene la ambigüedad del griego mejor que resolverla directamente como “nombrados por el rey”, que sería más interpretativo.
- source_word: Ἐδδεινοὺς
  english_pob_choice: Eddinous
  chosen_spanish: Eddinous
  alternatives_spanish:
  - Eddinus
  - Iddinus
  lexicon: transliteración griega
  rationale: Se conserva una transliteración cercana a la forma griega transmitida en Swete, dado que el equivalente convencional en español no es estable y el testimonio griego es la base primaria.
theological_decisions:
- issue: Relación entre la disposición de David y la posible designación real de los nombres finales
  english_pob_reading: The Greek phrase 'who were from the king' is compressed and may indicate royal appointment or royal affiliation.
  chosen_spanish_reading: los que eran de parte del rey
  alternative_spanish_readings:
  - nombrados por el rey
  - al servicio del rey
  - de parte del rey
  rationale: Se conserva la compresión del griego sin cerrar indebidamente la relación semántica. La formulación permite una lectura de procedencia o de representación real, como en el auditable del inglés POB.
  doctrine_reference: Ninguna; cuestión de sintaxis y referencia histórica.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla primaria, con el paralelo hebreo/MT solo como comprobación de nombres propios y del marco cultual. Se mantuvo la expansión propia de 1 Esdras respecto del paralelo de Crónicas, especialmente la mención de los cantores y de los oficiales nombrados.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se prefirió “cantores del templo” para mantener el registro cultual sin calco duro.
  - Se conservó el nombre propio griego “Eddinous” por estabilidad textual.
  - No se introdujo “Cristo”, “SEÑOR” ni otros equivalentes no presentes en este versículo.
