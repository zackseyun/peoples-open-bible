id: 1CH.26.28
reference: 1 Chronicles 26:28
source:
  edition: WLC
  text: וְ/כֹ֨ל הַֽ/הִקְדִּ֜ישׁ שְׁמוּאֵ֤ל הָ/רֹאֶה֙ וְ/שָׁא֣וּל בֶּן קִ֔ישׁ וְ/אַבְנֵ֣ר בֶּן נֵ֔ר וְ/יוֹאָ֖ב בֶּן צְרוּיָ֑ה כֹּ֚ל הַ/מַּקְדִּ֔ישׁ עַ֥ל יַד שְׁלֹמִ֖ית וְ/אֶחָֽי/ו־־־־׃פ
translation:
  text: And all that Samuel the seer[a], Saul son of Kish, Abner son of Ner[b], and Joab son of Zeruiah had dedicated—everything that anyone had dedicated—was under the care of Shelomith and his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was in the charge of Shelomith and his brothers.'
    reason: lexical_alternative
  - marker: b
    text: '''Seer'' is the Hebrew title רֹאֶה, an older term for a prophetic figure.'
    reason: cultural_note
lexical_decisions:
- source_word: וְכֹל
  chosen: And everything
  alternatives:
  - And all
  lexicon: HALOT
  rationale: כֹּל here refers comprehensively to the dedicated items in context. 'Everything' is natural modern English while preserving the totalizing sense.
- source_word: הַהִקְדִּישׁ
  chosen: had dedicated
  alternatives:
  - consecrated
  - set apart
  lexicon: HALOT
  rationale: From קדשׁ in the Hiphil, referring to dedicating objects to sacred use. 'Had dedicated' fits the retrospective list of donors and the treasury context better than the more abstract 'consecrated'.
- source_word: שְׁמוּאֵל הָרֹאֶה
  chosen: Samuel the seer
  alternatives:
  - Samuel the prophet
  lexicon: HALOT
  rationale: רֹאֶה literally means 'seer,' an older prophetic designation. 'Seer' preserves the specific Hebrew title rather than harmonizing to the broader term 'prophet'.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The genealogical formula is straightforward here and is best rendered literally as 'son of'.
- source_word: צְרוּיָה
  chosen: Zeruiah
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: כֹּל הַמַּקְדִּישׁ
  chosen: everything dedicated
  alternatives:
  - all that had been dedicated
  - every dedicated thing
  lexicon: HALOT
  rationale: This resumptive phrase gathers up the whole class of dedicated items. Because the Hebrew uses a singular participle with כֹּל in a collective sense, idiomatic English is 'everything dedicated' rather than a wooden 'every one dedicating.'
- source_word: עַל יַד
  chosen: was under the care of
  alternatives:
  - was in the charge of
  - was under the authority of
  - was by the hand of
  lexicon: HALOT
  rationale: The idiom עַל־יַד in administrative contexts indicates supervision or charge. 'Under the care of' is clear modern English and fits the treasury-management setting.
- source_word: שְׁלֹמִית
  chosen: Shelomith
  rationale: Personal name transliterated by standard convention.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The masculine plural with 3ms suffix most naturally refers to Shelomith's brothers/kinsmen. 'Brothers' is the more direct rendering and matches the likely family-administrative context.
