revisions:
- from: Entonces Moisés habló en presencia de todo el asamblea de Israel[a], las palabras de este canto, hasta que fueron terminadas.
  to: Entonces Moisés habló a oídos de toda la asamblea de Israel las palabras de este canto, hasta que fueron acabadas[a].
  rationale: Se corrige la concordancia española, se reemplaza «en presencia de» por «a oídos de» para reflejar mejor el idiomatismo hebreo בְּאָזְנֵי, y se mejora la cláusula final con una formulación pasiva más natural en español. También se alinea la nota al pie con la alternativa lexical documentada en el audit trail inglés para עַד תֻּמָּם.
