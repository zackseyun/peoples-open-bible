    reason: lexical_alternative
  revision_rationale: Se revisa 'consagrado' a 'dedicado irrevocablemente' para reflejar mejor el valor técnico de חֵרֶם sin introducir en el texto principal la idea de destrucción. La nota conserva la alternativa tradicional/técnica 'puesto bajo anatema' y la explicación semántica documentada por la auditoría inglesa.
