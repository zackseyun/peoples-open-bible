translation:
  language: es
  text: y lo hizo uno de sus Amigos[a], y lo honró con gran honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de sus amigos». El griego puede referirse tanto a amistad personal como, probablemente aquí, al rango cortesano reconocido de los «Amigos» del rey.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo nombró
  - lo constituyó
  lexicon: LSJ
  rationale: ποιέω en esta construcción con complemento predicativo expresa hacer o constituir a alguien en un cargo o estatus. En español, «lo hizo» conserva la relación verbal directa del griego y deja abierta la función de nombramiento sin forzar un término más interpretativo.
- source_word: τῶν φίλων αὐτοῦ
  english_pob_choice: one of his Friends
  chosen_spanish: uno de sus Amigos
  alternatives_spanish:
  - uno de sus amigos
  - uno de sus compañeros
  lexicon: LSJ
  rationale: El genitivo plural con ἐποίησεν indica incorporación a una clase o grupo. Se mantiene la mayúscula en «Amigos» para reflejar la posible función de título cortesano en el mundo helenístico, tal como lo hace la traducción inglesa POB.
- source_word: ἐδόξασεν
  english_pob_choice: honored
  chosen_spanish: lo honró
  alternatives_spanish:
  - lo glorificó
  - le dio honor
  lexicon: LSJ
  rationale: En este contexto real y político, δοξάζω se refiere a conferir honor o distinción. «Lo honró» comunica ese sentido con naturalidad en español y evita cargar el verbo con resonancias exclusivamente teológicas.
- source_word: δόξῃ μεγάλῃ
  english_pob_choice: with great honor
  chosen_spanish: con gran honor
  alternatives_spanish:
  - con gran gloria
  - con alta distinción
  lexicon: LSJ
  rationale: El dativo instrumental expresa el modo del honor conferido. «Gran honor» reproduce el valor social y cortesano de δόξα aquí mejor que «gloria», que en español suele sonar más teológico.
theological_decisions:
- issue: фίλοι como círculo cortesano o como simple amistad personal
  english_pob_reading: Rendered as 'Friends' with capitalization to preserve probable titular force
  chosen_spanish_reading: «Amigos» con mayúscula para sugerir posible título cortesano
  alternative_spanish_readings:
  - «amigos»
  - «compañeros»
  rationale: En 1 Macabeos y en el uso helenístico de corte, φίλοι puede designar un grupo oficial de asociados del rey. La mayúscula preserva esa tensión entre relación personal y rango institucional sin resolverla de manera excesiva.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El borrador sigue la lectura de alta concordancia del texto griego de Swete y conserva la decisión auditada de la POB inglesa de capitalizar «Friends» por su probable valor titular, sin añadir variantes textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «honró» para δοξάζω en sentido político-social, evitando «glorificó» en el texto principal.
  - Se usa «Amigos» con mayúscula solo en el sentido probable de título cortesano; la nota aclara la alternativa relacional.
  - El texto es breve y pegado al griego, con sintaxis natural para el español bíblico contemporáneo.
