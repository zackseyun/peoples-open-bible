translation:
  language: es
  text: Porque añade rebelión a su pecado; entre nosotros da palmadas[a], y multiplica sus palabras contra Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «golpea las manos»; el gesto probablemente comunica desprecio, desafío o burla.
    reason: lexical_alternative
  - marker: b
    text: 'O «a Dios». La preposición hebrea puede leerse de manera más neutral como dirección («a»), pero el contexto favorece un sentido adversativo: «contra Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del juicio anterior; en español, «Porque» conserva bien la fuerza explicativa sin sobrecargar el tono.
- source_word: יֹסִיף
  english_pob_choice: he adds
  chosen_spanish: añade
  alternatives_spanish:
  - incrementa
  - sigue añadiendo
  lexicon: HALOT
  rationale: El verbo de יסף expresa sumar algo a algo ya existente. «Añade» reproduce la imagen de acumular faltas con naturalidad en español.
- source_word: עַל חַטָּאתוֹ
  english_pob_choice: to his sin
  chosen_spanish: a su pecado
  alternatives_spanish:
  - sobre su pecado
  - encima de su pecado
  lexicon: HALOT
  rationale: La preposición con יסף es idiomática en el sentido de agregar a una realidad previa. «A su pecado» evita un calco duro y mantiene el sentido de acumulación.
- source_word: פֶשַׁע
  english_pob_choice: rebellion
  chosen_spanish: rebelión
  alternatives_spanish:
  - transgresión
  - rebeldía
  lexicon: HALOT
  rationale: «Rebelión» conserva el matiz fuerte de resistencia defiante que el POB inglés quiso destacar, más intenso que un simple «transgresión».
- source_word: בֵּינֵינוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestra presencia
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «entre nosotros»; en español esa forma es natural y mantiene el marco social de observación pública.
- source_word: יִסְפּוֹק
  english_pob_choice: he claps his hands
  chosen_spanish: aplaude con las manos
  alternatives_spanish:
  - golpea las manos
  - da palmadas
  lexicon: HALOT
  rationale: El gesto puede indicar desprecio, desafío o burla. «Aplaude con las manos» conserva el gesto concreto; la ambigüedad interpretativa se preserva en la nota.
- source_word: וְיֶרֶב
  english_pob_choice: and he multiplies
  chosen_spanish: y multiplica
  alternatives_spanish:
  - y aumenta
  - y acumula
  lexicon: HALOT
  rationale: La idea de רבה es aumentar o hacer muchos. «Multiplica» mantiene el paralelismo verbal y el efecto de intensificación.
- source_word: אֲמָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - sus discursos
  lexicon: HALOT
  rationale: Plural amplio para enunciados verbales. «Sus palabras» es la opción más directa y sobria en español.
- source_word: לָאֵל
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - a Dios
  - hacia Dios
  lexicon: HALOT
  rationale: En este contexto acusatorio, la relación es adversativa; «contra Dios» reproduce el juicio del POB inglés y evita suavizar la carga retórica.
theological_decisions:
- issue: Si לָאֵל debe entenderse como dirección neutral («a Dios») o como oposición («contra Dios»).
  english_pob_reading: against God
  chosen_spanish_reading: contra Dios
  alternative_spanish_readings:
  - a Dios
  - hacia Dios
  rationale: 'El contexto del versículo acumula acusaciones: añade rebelión, hace un gesto de burla ante los presentes y multiplica palabras en oposición. «Contra Dios» preserva esa escalada sin resolver la tensión del texto.'
  doctrine_reference: Primacía del hebreo sobre la tradición de suavización; mantener la tensión retórica del original.
- issue: 'El valor del gesto de יִסְפּוֹק: si debe concretarse como un acto de aplauso o dejarse más abierto.'
  english_pob_reading: he claps his hands
  chosen_spanish_reading: aplaude con las manos
  alternative_spanish_readings:
  - golpea las manos
  - da palmadas
  rationale: El hebreo describe un gesto físico concreto; la traducción conserva esa concreción y deja en la nota la posibilidad de burla, desprecio o desafío.
  doctrine_reference: No hay decisión doctrinal; se preserva la ambigüedad lexical sin borrar el matiz social del gesto.
translation_notes:
  revision_awareness: 'Se revisó el estado más reciente de la traducción inglesa POB y su auditoría: no hubo cambios pendientes; la concordancia del revisor fue alta (agree, 1.0). La versión española mantiene las mismas decisiones lexicográficas y teológicas centrales, ajustándolas a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל en concordancia con el estándar del proyecto.
  - Se conserva el valor intensificador de פֶשַׁע como «rebelión», no se suaviza a un término genérico.
  - El gesto de יִסְפּוֹק se traduce de forma concreta, con nota para su matiz interpretativo.
  - La preposición final se vierte como «contra» por el contexto adversativo, no como simple dativo.
  - El tono general es sobrio y bíblico, sin arcaísmos innecesarios ni paráfrasis expansivas.
