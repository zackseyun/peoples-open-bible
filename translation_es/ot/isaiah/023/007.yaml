translation:
  language: es
  text: ¿Es esta para ustedes su ciudad exultante[a], cuya antigüedad es desde días de antaño, cuyos pies la llevaron lejos para residir como forastera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyo origen es desde días de antaño; sus pies la llevaron lejos para habitar»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲזֹאת
  english_pob_choice: Is this
  chosen_spanish: ¿Es esta
  alternatives_spanish:
  - ¿Es ésta
  - ¿Será esta
  lexicon: HALOT
  rationale: La pregunta retórica se conserva en español con una forma natural y directa; el valor interrogativo enfático del hebreo se mantiene sin añadir contenido.
- source_word: לָכֶם
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: En el contexto profético, el posesivo singular en español comunica de forma natural la segunda persona plural hebrea dirigida al auditorio, sin perder el tono de reproche.
- source_word: עַלִּיזָה
  english_pob_choice: exultant city
  chosen_spanish: ciudad exultante
  alternatives_spanish:
  - ciudad jubilosa
  - ciudad gozosa
  lexicon: HALOT
  rationale: Exultante conserva el matiz de júbilo ostentoso o celebratorio; 'ciudad' queda explícita en español por el referente contextual de Tiro.
- source_word: מִימֵי קֶדֶם
  english_pob_choice: from days of old
  chosen_spanish: desde días de antaño
  alternatives_spanish:
  - desde tiempos antiguos
  - desde días de antiguo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de antigüedad se vierte con una formulación natural en español que conserva la profundidad temporal.
- source_word: קַדְמָתָהּ
  english_pob_choice: whose origin
  chosen_spanish: cuya antigüedad
  alternatives_spanish:
  - cuyo origen
  - cuyos comienzos
  lexicon: HALOT
  rationale: El sustantivo puede expresar antigüedad/origen; aquí 'antigüedad' encaja mejor con el paralelismo y conserva la tensión lexical entre origen y antigüedad documentada por el margen inglés.
- source_word: יֹבִל֣וּ/הָ רַגְלֶ֔י/הָ
  english_pob_choice: whose feet carried her
  chosen_spanish: cuyos pies la llevaron
  alternatives_spanish:
  - cuyos pies la condujeron
  - cuyos pies la trajeron
  lexicon: HALOT
  rationale: 'Se mantiene la personificación: los ''pies'' de la ciudad actúan como sujetos. ''Llevaron'' es natural y no diluye la imagen.'
- source_word: מֵֽרָח֖וֹק
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - desde lejos
  - a lo lejos
  lexicon: HALOT
  rationale: El adverbio expresa distancia del desplazamiento y funciona bien con el verbo 'llevaron' en español.
- source_word: לָגֽוּר
  english_pob_choice: to sojourn
  chosen_spanish: para habitar como extranjera
  alternatives_spanish:
  - para sojornar
  - para morar como forastera
  - para residir como extranjera
  lexicon: HALOT
  rationale: '''גור'' implica residir como forastero o residente temporal. ''Habitar como extranjera'' comunica esa condición mejor que un simple ''vivir'', y preserva la tensión del término sin imponer una lectura más técnica de lo necesario.'
theological_decisions:
- issue: El estatus de la ciudad personificada como sujeto femenino
  english_pob_reading: Exultant city ... whose feet carried her
  chosen_spanish_reading: ciudad exultante ... cuyos pies la llevaron
  alternative_spanish_readings:
  - ciudad jubilosa ...
  - la exultante ...
  rationale: La poesía profética personifica a Tiro como mujer/ciudad. El español conserva la personificación y la referencia femenina implícita del hebreo sin forzar explicaciones añadidas.
  doctrine_reference: Poética profética; personificación en literatura bíblica
translation_notes:
  revision_awareness: El borrador anterior falló por incluir una nota sin ancla visible en el texto. Esta versión inserta [a] en 'ciudad exultante[a]' para que la nota alternativa esté correctamente vinculada al segmento correspondiente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita 'SEÑOR' y también se evita añadir interpretaciones doctrinales que no están en el texto.
  - '''Exultante'' conserva mejor el matiz celebrativo que un simple ''alegre''.'
  - '''Habitar como extranjera'' preserva la idea de residencia foránea/temporal propia de לָגוּר.'
