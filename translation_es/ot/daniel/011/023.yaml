translation:
  language: es
  text: Y desde una alianza con él[a], procederá con engaño; subirá y se hará fuerte con una pequeña nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con unas pocas personas». La frase hebrea בִּמְעַט גּוֹי es compacta y puede enfatizar tanto una nación pequeña como un pequeño número de personas por medio de las cuales se fortalece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y desde
  alternatives_spanish:
  - Y de
  - Y a partir de
  lexicon: HALOT
  rationale: La preposición con waw introduce el punto de partida temporal o circunstancial. «Desde» conserva la relación de secuencia y suena natural en español, mientras que «Y de» sería más literal pero menos claro.
- source_word: הִתְחַבְּרוּת
  english_pob_choice: alliance
  chosen_spanish: una alianza
  alternatives_spanish:
  - unirse
  - asociación
  - liga
  lexicon: HALOT
  rationale: El sustantivo verbal de חבר expresa unión o vinculación formal. En este contexto político, «alianza» comunica mejor el acuerdo formal que una mera asociación.
- source_word: אֵלָיו
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a él», el español idiomático con sustantivos de unión prefiere «con él» para expresar el sentido relacional de la alianza.
- source_word: יַעֲשֶׂה מִרְמָה
  english_pob_choice: he will act deceitfully
  chosen_spanish: procederá con engaño
  alternatives_spanish:
  - actuará engañosamente
  - practicará engaño
  - obrará con fraude
  lexicon: HALOT
  rationale: La expresión hebrea «hacer engaño» es idiomática. «Proceder con engaño» preserva la fuerza verbal sin sonar forzado en español y mantiene la idea de traición o fraude.
- source_word: וְעָלָה
  english_pob_choice: and he will rise
  chosen_spanish: y subirá
  alternatives_spanish:
  - y ascenderá
  - y se levantará
  - y avanzará
  lexicon: HALOT
  rationale: עלה significa literalmente «subir». En un marco de ascenso político, «subirá» mantiene la imagen básica y es plenamente natural en español.
- source_word: וְעָצַם
  english_pob_choice: and become strong
  chosen_spanish: y se hará fuerte
  alternatives_spanish:
  - y crecerá en fuerza
  - y se fortalecerá
  - y será poderoso
  lexicon: HALOT
  rationale: El verbo expresa hacerse poderoso o fuerte. «Se hará fuerte» conserva el matiz inceptivo del hebreo y encaja bien con el paralelo de «subirá».
- source_word: בִּמְעַט
  english_pob_choice: with a small
  chosen_spanish: con una pequeña
  alternatives_spanish:
  - por medio de una pequeña
  - mediante una pequeña
  - con un pequeño grupo de
  lexicon: HALOT
  rationale: La construcción compacta del hebreo modifica al sustantivo siguiente. «Con una pequeña» mantiene la ambigüedad entre tamaño y número, dejando que el sustantivo final complete el sentido.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: En el contexto político de Daniel, גוי designa un pueblo o nación. «Nación» es la opción más clara en español y conserva el valor geopolítico.
theological_decisions:
- issue: Ambigüedad de בִּמְעַט גּוֹי
  english_pob_reading: Or 'with a few people.' The Hebrew phrase may emphasize either a small nation or a small number of people by whom he becomes strong.
  chosen_spanish_reading: con una pequeña nación
  alternative_spanish_readings:
  - con unas pocas personas
  - con un pequeño grupo de personas
  - con una nación pequeña
  rationale: El hebreo es compacto y puede apuntar a una nación pequeña o a un pequeño número de personas. El texto principal mantiene «nación» por el sentido geopolítico, y la nota preserva la alternativa humana sin borrar la tensión lexical.
  doctrine_reference: Daniel 11:23
- issue: Sentido de יַעֲשֶׂה מִרְמָה en un contexto de política y traición
  english_pob_reading: he will act deceitfully
  chosen_spanish_reading: procederá con engaño
  alternative_spanish_readings:
  - obrará con engaño
  - actuará con engaño
  - practicará traición
  rationale: La frase puede sonar débil si se reduce a simple deshonestidad, pero el hebreo apunta a conducta fraudulenta o traicionera. «Proceder con engaño» conserva esa carga sin exagerarla más allá del texto.
  doctrine_reference: Daniel 11:23
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y armoniza con la lectura auditada en inglés. Se preservó la ambigüedad de בִּמְעַט גּוֹי mediante una nota, sin eliminar el matiz político de «nación». No se introdujeron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se tradujo la secuencia verbal con futuro simple para reflejar la narrativa profética del hebreo.
  - Se evitó «Cristo» y «Señor» porque no corresponden a este versículo.
  - «Engaño» se usó para מִרְמָה según el contexto de traición política, sin suavizar el término.
  - La nota al pie se ancla en «nación» porque en español esa elección hace visible la alternativa entre un grupo de personas y una nación pequeña.
