translation:
  language: es
  text: 'Dicen[a]: «Tocamos la flauta para ustedes, y no bailaron; entonamos un lamento[c][b], y no se lamentaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con más literalidad verbal, «están diciendo»; el presente griego introduce vívidamente la queja de los niños dentro de la escena.
    reason: lexical_alternative
  - marker: b
    text: O, «lamentamos» o «entonamos un canto fúnebre».
    reason: lexical_alternative
  - marker: c
    text: Más literalmente, «no se golpearon», refiriéndose a gestos habituales de duelo, como golpearse el pecho.
    reason: cultural_note
lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: They say
  chosen_spanish: Dicen
  alternatives_spanish:
  - Están diciendo
  - Dijeron
  lexicon: BDAG
  rationale: El presente narrativo conserva en español la vividez de la escena ilustrativa. «Dicen» es natural y reproduce bien el valor de presente del verbo griego.
- source_word: Ηὐλήσαμεν
  english_pob_choice: We played the flute
  chosen_spanish: Tocamos la flauta
  alternatives_spanish:
  - Pusimos la flauta
  - Pipamos para ustedes
  lexicon: BDAG
  rationale: αὐλέω se refiere específicamente a tocar una flauta o tubo/pipe, no solo a hacer música. «Tocamos la flauta» es claro en español actual y mantiene el instrumento concreto.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: BDAG
  rationale: El dativo de dirección o beneficio se expresa con naturalidad en español con «para». En esta escena de ejecución dirigida a otros, «para ustedes» comunica mejor la relación performativa.
- source_word: ὠρχήσασθε
  english_pob_choice: you did not dance
  chosen_spanish: no bailaron
  alternatives_spanish:
  - no comenzaron a bailar
  - no danzaron
  lexicon: BDAG
  rationale: El verbo medio se rinde de manera directa con «bailaron». En español, el sentido reflexivo no requiere ampliación explícita.
- source_word: ἐθρηνήσαμεν
  english_pob_choice: we sang a lament
  chosen_spanish: entonamos un lamento
  alternatives_spanish:
  - lamentamos
  - entonamos un canto fúnebre
  - clamamos en duelo
  lexicon: BDAG
  rationale: θρηνέω apunta a lamentación ritual o fúnebre. «Entonamos un lamento» conserva el paralelismo performativo con «tocamos la flauta» y evita reducirlo a un lamento genérico.
- source_word: ἐκόψασθε
  english_pob_choice: you did not mourn
  chosen_spanish: no se lamentaron
  alternatives_spanish:
  - no se golpearon el pecho
  - no lloraron de duelo
  lexicon: BDAG
  rationale: En este contexto, κόπτω en medio se refiere a conductas de duelo. «No se lamentaron» comunica el sentido naturalmente en español, mientras que el gesto de golpearse el pecho queda disponible como alternativa o nota.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y coincide con la decisión auditada del POB inglés de mantener el contraste performativo entre tocar la flauta/danzar y entonar un lamento/mourning. No se detectaron revisiones aplicadas en la pasada más reciente; por eso el borrador conserva la misma estructura semántica y solo ajusta la formulación al español natural.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo verbal entre las dos mitades: acción festiva seguida de respuesta ausente, y acción de duelo seguida de respuesta ausente.'
  - Se prefirió «flauta» sobre un calco con «pipa» para mayor claridad en español, sin perder la precisión léxica de αὐλέω.
  - Se distinguió «lamento» como sustantivo y «lamentarse» como verbo reflexivo para reflejar el campo semántico del pasaje sin sobreinterpretarlo.
  - Las comillas angulares se usan de acuerdo con la puntuación española estándar.
