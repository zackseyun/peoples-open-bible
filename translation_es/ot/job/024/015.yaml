translation:
  language: es
  text: 'El ojo del adúltero aguarda el crepúsculo[a], diciendo: «Ningún ojo me verá»; y pone una cobertura sobre su rostro[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anochecer»; el término hebreo puede referirse a la luz tenue del final del día, adecuada al contexto de pecado escondido.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y pone un ocultamiento de rostro». La expresión hebrea indica que se cubre o disfraza para no ser reconocido.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵין
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  - mirada
  lexicon: HALOT
  rationale: En ambos casos del versículo, la imagen concreta del órgano de ver se conserva mejor con «ojo». Mantiene el paralelismo con «ningún ojo me verá» y suena natural en español.
- source_word: נֹאֵף
  english_pob_choice: adulterer
  chosen_spanish: adúltero
  alternatives_spanish:
  - uno que comete adulterio
  - fornicario
  lexicon: HALOT
  rationale: El participio describe al hombre caracterizado por adulterio; «adúltero» conserva esa fuerza nominal y la referencia masculina singular.
- source_word: שָׁמְרָה
  english_pob_choice: waits for
  chosen_spanish: aguarda
  alternatives_spanish:
  - espera
  - está al acecho de
  - vigila
  lexicon: HALOT
  rationale: Aunque el verbo base es «guardar/vigilar», aquí el contexto pide la expectativa de la llegada de la oscuridad. «Aguarda» comunica esa espera activa sin volverlo demasiado interpretativo.
- source_word: נֶשֶׁף
  english_pob_choice: twilight
  chosen_spanish: crepúsculo
  alternatives_spanish:
  - anochecer
  - dusk
  - ocaso
  lexicon: HALOT
  rationale: «Crepúsculo» refleja bien la franja de luz menguante y conserva la ambigüedad útil del hebreo, sin precisar de más si es atardecer o penumbra.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - pensando
  - y dice
  lexicon: HALOT
  rationale: La construcción introduce el pensamiento o habla del adúltero. «Diciendo» es la equivalencia española estándar y suficientemente flexible.
- source_word: תְשׁוּרֵנִי
  english_pob_choice: will see me
  chosen_spanish: me verá
  alternatives_spanish:
  - me observará
  - me mirará
  lexicon: HALOT
  rationale: El sentido es visual y de reconocimiento. «Me verá» es natural en español y preserva la idea de ser detectado por la mirada ajena.
- source_word: וְסֵתֶר פָּנִים
  english_pob_choice: a covering over his face
  chosen_spanish: un cobertor sobre su rostro
  alternatives_spanish:
  - un velo sobre su rostro
  - un ocultamiento del rostro
  - una cobertura sobre su cara
  lexicon: HALOT
  rationale: La expresión hebrea es compacta. «Cobertor sobre su rostro» transmite la acción de cubrir y, al mismo tiempo, la intención de ocultar la identidad sin añadir demasiado.
- source_word: יָשִׂים
  english_pob_choice: he puts
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - pone sobre sí
  lexicon: HALOT
  rationale: Verbo simple y directo; «pone» encaja de manera natural con el complemento nominal y sigue de cerca la fuerza del original.
translation_notes:
  revision_awareness: 'La versión inglesa POB mantiene el paralelismo visual y añade una nota léxica para נֶשֶׁף y otra para וְסֵתֶר פָּנִים. Esta propuesta sigue el mismo perfil: conserva la imagen concreta, traslada la ambigüedad de נֶשֶׁף con un equivalente natural en español y explicita en nota que la frase final implica cobertura/disfraz para evitar el reconocimiento. No se observan revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «adúltero» para נֹאֵף como en la decisión inglesa, evitando «fornicario» u otra generalización.
  - Se evita traducir נֶשֶׁף como «dusk» o «anochecer» en el texto principal para preservar una opción amplia y publicable; la nota recoge la alternativa.
  - «Rostro» se usa en el texto y en la nota para conservar la correspondencia con פָּנִים; no se sustituye por «cara» salvo en nota como variante posible.
  - La puntuación reproduce una pausa tras «crepúsculo» y el discurso directo final con comillas españolas, conforme a estilo bíblico moderno.
