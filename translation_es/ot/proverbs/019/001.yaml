translation:
  language: es
  text: Mejor es el pobre que anda en su integridad[b] que el de habla torcida, y es un necio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que un necio de habla torcida». La sintaxis hebrea permite entender la frase final como una identificación más compacta de la persona contrastada.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «anda en su integridad». «Anda» conserva la metáfora hebrea del modo de vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: Conserva la fórmula proverbial comparativa del hebreo y su valoración preferencial, con una construcción natural en español.
- source_word: רָשׁ
  english_pob_choice: a poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - un pobre
  - el hombre pobre
  - una persona pobre
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo masculino singular. En español, 'el pobre' mantiene la concisión proverbial y la referencia personal sin añadir material ajeno.
- source_word: הוֹלֵךְ
  english_pob_choice: who walks
  chosen_spanish: que anda
  alternatives_spanish:
  - que camina
  - que vive
  - andando
  lexicon: HALOT
  rationale: '''Anda'' preserva la metáfora hebrea de conducta o modo de vida sin volverla demasiado literal o rígida; corresponde al valor ético de ''walk'' en el audit trail.'
- source_word: בְּתֻמּוֹ
  english_pob_choice: in his integrity
  chosen_spanish: en su integridad
  alternatives_spanish:
  - en su inocencia
  - en su blamelessness
  - en su rectitud
  lexicon: HALOT
  rationale: '''Integridad'' comunica bien תֹּם/תֻם como totalidad moral y rectitud de carácter, y sigue de cerca la decisión inglesa documentada.'
- source_word: מֵעִקֵּשׁ שְׂפָתָיו
  english_pob_choice: than one who is crooked in his speech
  chosen_spanish: que el de labios torcidos
  alternatives_spanish:
  - que el de habla torcida
  - que el de palabras torcidas
  - que el que es torcido en su hablar
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de los 'labios' con un giro natural en español. 'Labios torcidos' preserva el paralelismo del hebreo y permite leer la corrupción como expresada en el hablar; no se sustituye por una abstracción más interpretativa que el texto no exige.
- source_word: וְהוּא כְסִיל
  english_pob_choice: and is a fool
  chosen_spanish: y él es un necio
  alternatives_spanish:
  - y es un necio
  - y resulta necio
  - y es un insensato
  lexicon: HALOT
  rationale: '''Necio'' corresponde al campo sapiencial de כְסִיל y conserva el tono bíblico. Se mantiene ''y él es'' para reflejar la lectura sintáctica preferida en el audit trail, donde la cláusula final identifica al sujeto contrastado.'
theological_decisions:
- issue: Relación sintáctica de la cláusula final con el contraste principal
  english_pob_reading: The Hebrew syntax allows the final phrase 'and he is a fool' to identify the contrasted person more compactly.
  chosen_spanish_reading: y él es un necio
  alternative_spanish_readings:
  - y es un necio
  - que es un necio
  - aunque es un necio
  rationale: Se conserva la lectura compacta en la que la cláusula final caracteriza al mismo personaje descrito por 'el de labios torcidos', sin introducir una oposición o concesión no presente en el hebreo.
  doctrine_reference: Proverbios sapienciales; sintaxis hebrea del hemistiquio final
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo de WLC y la decisión auditada en inglés de preservar la metáfora de 'walk' como conducta moral. También atiende la revisión inglesa que hizo más natural la expresión de la segunda mitad, sin borrar la ambigüedad sintáctica documentada en la nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no porque aparezca en este versículo, sino conforme a la norma del proyecto para el Tetragrámaton cuando corresponda.
  - Se mantiene el paralelismo proverbial con una estructura comparativa breve y sobria.
  - '''Necio'' se prefiere sobre ''insensato'' por su fuerte anclaje sapiencial y su cercanía al campo semántico de כְסִיל.'
  - No se expande 'labios' a 'hablar' en el texto principal para no perder la imagen hebrea; la nota aclara la equivalencia funcional.
