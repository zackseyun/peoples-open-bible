translation:
  language: es
  text: Porque era yerno[a] del sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego γαμβρός puede designar en sentido más amplio un pariente por matrimonio; aquí se traduce 'yerno' por ser el sentido más probable en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - había sido
  lexicon: BDAG
  rationale: El imperfecto de εἰμί expresa estado o relación vigente en el trasfondo narrativo; en español, 'era' comunica de forma natural esa situación continua sin sugerir un cambio puntual.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación de lo dicho antes. En español, 'porque' conserva esa función explicativa de manera clara y sobria en una frase breve.
- source_word: γαμβρὸς
  english_pob_choice: son-in-law
  chosen_spanish: yerno
  alternatives_spanish:
  - pariente por matrimonio
  - afín
  lexicon: LSJ
  rationale: En este contexto, el sentido más probable y natural es la relación específica de 'yerno'. Aunque el término griego puede abarcar parentesco por matrimonio más amplio, el español 'yerno' refleja la opción contextual más precisa.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: of the high priest
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del jefe de los sacerdotes
  lexicon: BDAG
  rationale: ἀρχιερεύς es el título usual de 'sumo sacerdote' en contexto judío. En español, esta forma es idiomática, reverente y fiel al título institucional.
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés están en alto acuerdo; no se requieren revisiones textuales. La decisión principal fue mantener el valor explicativo de γάρ y elegir el sentido específico de γαμβρός conforme al contexto.
  spanish_consistency_notes:
  - Se conserva 'sumo sacerdote' como título técnico establecido en español bíblico.
  - Se mantiene un registro de la ambigüedad léxica de γαμβρός en una nota al pie, sin debilitar la lectura contextual principal.
  - El orden y la concisión de la cláusula siguen la estructura breve del original griego, con español natural y publicable.
