translation:
  language: es
  text: He aquí[a], yo estoy a punto de hacer de Jerusalén una copa de aturdimiento[b] para todos los pueblos de alrededor; y esto también será contra Judá en el asedio contra Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren». Fórmula de atención profética.
    reason: lexical_alternative
  - marker: b
    text: O «una copa de mareo». El hebreo puede entenderse también de manera más literal como «una vasija/umbral de aturdimiento», pero en contexto la imagen de una copa que produce desorientación es la que mejor encaja.
    reason: lexical_alternative
  - marker: c
    text: El hebreo de esta segunda cláusula es difícil. También puede significar «Judá también será sitiada junto con Jerusalén» o «esto también vendrá sobre Judá en el asedio contra Jerusalén».
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La fórmula profética introduce un anuncio solemne y de atención inmediata. «He aquí» conserva el tono elevado y no suena tan coloquial como «mira».
- source_word: שָׂם
  english_pob_choice: am about to make
  chosen_spanish: estoy por poner
  alternatives_spanish:
  - voy a poner
  - estoy a punto de poner
  - haré
  lexicon: HALOT
  rationale: El participio con הִנֵּה expresa inminencia profética. «Estoy por poner» comunica cercanía de acción sin perder naturalidad en español, y respeta la imagen de ‘poner/colocar’ un objeto o situación sobre Jerusalén.
- source_word: סַף רַעַל
  english_pob_choice: a cup of staggering
  chosen_spanish: una copa de aturdimiento
  alternatives_spanish:
  - una copa de mareo
  - una copa de reeling
  - una vasija de aturdimiento
  lexicon: HALOT
  rationale: El hebreo admite varias posibilidades léxicas, pero en el contexto de juicio la imagen de una copa que provoca desorientación/intoxicación es la más probable. «Aturdimiento» mantiene el efecto resultante en español y deja abierta la tensión lexical sin forzar una equivalencia mecánica.
- source_word: לְכָל הָעַמִּים סָבִיב
  english_pob_choice: to all the surrounding peoples
  chosen_spanish: para todos los pueblos en derredor
  alternatives_spanish:
  - para todos los pueblos alrededor
  - a todos los pueblos circundantes
  lexicon: HALOT
  rationale: «Pueblos» refleja עַמִּים y «en derredor» reproduce la idea de סביב con un registro bíblico claro, sin sonar arcaizante en exceso.
- source_word: עַל יְהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - sobre Judá
  - acerca de Judá
  lexicon: HALOT
  rationale: En contexto de juicio/hostilidad, עַל funciona como dirección adversativa. «Contra» expresa mejor la fuerza relacional que «sobre» o «acerca de».
- source_word: בַמָּצוֹר
  english_pob_choice: in the siege
  chosen_spanish: habrá sitio
  alternatives_spanish:
  - habrá asedio
  - estará sitiada
  - estará bajo sitio
  lexicon: HALOT
  rationale: El sustantivo מָצוֹר designa el sitio/asedio militar. «Habrá sitio» conserva el sustantivo y evita decidir demasiado pronto si la frase debe leerse como estado o circunstancia exacta.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - para Jerusalén
  lexicon: HALOT
  rationale: En el marco de מָצוֹר, עַל tiene valor hostil. La repetición de «contra Jerusalén» mantiene la dirección del ataque y ayuda a conservar la ambigüedad sintáctica del hebreo.
theological_decisions:
- issue: Interpretación de la cláusula difícil וְגַם עַל יְהוּדָה יִהְיֶה בַמָּצוֹר עַל יְרוּשָׁלִָם
  english_pob_reading: Judah too will be involved adversely in the siege against Jerusalem.
  chosen_spanish_reading: y también contra Judá habrá sitio contra Jerusalén
  alternative_spanish_readings:
  - y también Judá será sitiada junto con Jerusalén
  - y también esto vendrá sobre Judá en el sitio contra Jerusalén
  rationale: 'La sintaxis hebrea es condensada y discutida. La redacción española conserva la tensión sin resolverla del todo: Judá aparece implicada en relación hostil con el sitio de Jerusalén, pero sin imponer una explicación que el hebreo no exige. Así se mantiene la dificultad interpretativa documentada por la POB inglesa.'
  doctrine_reference: Preservar la tensión exegética donde el hebreo es debatido.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el pass más reciente; la concordancia con la evaluación auditada es alta y no hubo cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva la imaginería de juicio sin suavizarla, siguiendo la decisión inglesa de no resolver prematuramente la cláusula difícil.
  - «Pueblos» se usa para עַמִּים y «Judá/Jerusalén» se mantienen como nombres propios bíblicos estándar en español.
