translation:
  language: es
  text: No hay recuerdo de los primeros[a], y aun de los posteriores que han de ser, no habrá recuerdo entre los que vendrán después.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «memoria».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se encuentra
  lexicon: HALOT
  rationale: La negación existencial en español se expresa de forma natural con «No hay», manteniendo el valor impersonal del hebreo sin forzar una construcción más abstracta.
- source_word: זִכְרוֹן / זִכָּרוֹן
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - recordación
  - memorial
  lexicon: HALOT
  rationale: «Recuerdo» comunica bien la idea de recuerdo/evocación pública o mental y evita un registro demasiado litúrgico; «memoria» también es posible, pero puede sonar más abstracto o institucional según el contexto.
- source_word: לָרִאשֹׁנִים
  english_pob_choice: of the former ones
  chosen_spanish: de los primeros
  alternatives_spanish:
  - de los anteriores
  - de los antiguos
  - de los primeros en el tiempo
  lexicon: HALOT
  rationale: «Primeros» conserva la amplitud temporal del hebreo y resulta natural en español. La referencia puede abarcar generaciones anteriores sin precisar más de lo que el texto da.
- source_word: וְגַם
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - y también
  - e incluso
  lexicon: HALOT
  rationale: «Y aun» preserva el matiz enfático de la partícula y mantiene un paralelismo sobrio con la primera cláusula.
- source_word: לָאַחֲרֹנִים
  english_pob_choice: of the later ones
  chosen_spanish: de los últimos
  alternatives_spanish:
  - de los posteriores
  - de los venideros
  - de los más tardíos
  lexicon: HALOT
  rationale: «Últimos» reproduce bien el contraste temporal con «primeros» en español, sin añadir una explicación que el hebreo no explicita.
- source_word: שֶׁיִּהְיוּ
  english_pob_choice: who will be
  chosen_spanish: que han de ser
  alternatives_spanish:
  - que serán
  - que llegarán a ser
  - que existirán
  lexicon: HALOT
  rationale: La forma «han de ser» conserva el valor de futuro relativo del hebreo y suena solemne sin volverse arcaica; evita reducir el matiz a un simple futuro mecánico.
- source_word: לֹא יִהְיֶה לָהֶם זִכָּרוֹן
  english_pob_choice: there will be no remembrance
  chosen_spanish: no habrá recuerdo
  alternatives_spanish:
  - no tendrán recuerdo
  - no se guardará recuerdo
  - no existirá recuerdo para ellos
  lexicon: HALOT
  rationale: El hebreo expresa una negación existencial. «No habrá recuerdo» reproduce esa estructura con naturalidad en español y evita añadir un sujeto personal no presente en el texto.
- source_word: עִם שֶׁיִּהְי֖וּ לָאַחֲרֹנָה
  english_pob_choice: among those who will come afterward
  chosen_spanish: entre los que vendrán después
  alternatives_spanish:
  - entre los que vengan después
  - entre los posteriores
  - entre los que estén al final
  lexicon: HALOT
  rationale: «Entre los que vendrán después» expresa bien la relación social/temporal de עִם y el encadenamiento de generaciones posteriores. La elección mantiene la progresión del texto sin sobreinterpretarla.
theological_decisions:
- issue: Alcance de la referencia a «los primeros» y «los últimos»
  english_pob_reading: The verse speaks broadly of former and later ones, without narrowing the referents beyond temporal succession.
  chosen_spanish_reading: El verso habla de generaciones anteriores y posteriores de manera amplia, sin concretar más los referentes.
  alternative_spanish_readings:
  - Podría leerse como referencia a personas concretas del pasado y del futuro.
  - Podría entenderse como una observación sobre la fama histórica y su desaparición.
  rationale: No hay indicio en el hebreo ni en el audit trail de que debamos restringir la referencia; por eso la versión española conserva su amplitud temporal e histórica.
  doctrine_reference: Eclesiastés 1:11; coherencia con el carácter sapiencial y observacional del libro.
translation_notes:
  revision_awareness: 'El español sigue de cerca la revisión inglesa que eliminó el redundante «of them» en la segunda cláusula. Por eso la versión española también evita un complemento sobrante y mantiene la estructura breve y paralela del hebreo: no hay recuerdo de los primeros, y aun de los últimos que han de ser, no habrá recuerdo entre los que vendrán después.'
  spanish_consistency_notes:
  - Se conserva la distinción entre la primera cláusula («No hay recuerdo de los primeros») y la segunda («no habrá recuerdo entre los que vendrán después»), reflejando el paralelismo hebreo.
  - Se evita introducir «de ellos» en la segunda cláusula, en línea con la revisión inglesa que depuró el redundante complemento.
  - «Primeros» y «últimos» se usan como equivalentes temporales para preservar el contraste del hebreo sin recurrir a términos más interpretativos.
