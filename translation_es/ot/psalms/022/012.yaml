translation:
  language: es
  text: No estés lejos de mí,[a] porque la angustia está cerca, porque no hay quien ayude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflicción». El sustantivo hebreo puede denotar angustia, aflicción o tribulación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas que
  - No te apartes
  lexicon: HALOT
  rationale: La partícula negativa con el verbo siguiente expresa una súplica/prohibición. En español, «No» es la forma más natural y directa para conservar el tono orante.
- source_word: תִּרְחַק
  english_pob_choice: be far
  chosen_spanish: te alejes
  alternatives_spanish:
  - estés lejos
  - permanezcas lejos
  - te mantengas lejos
  lexicon: HALOT
  rationale: El hebreo expresa distancia espacial; «te alejes» conserva el movimiento de alejamiento sin convertirlo en una idea puramente emocional.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartado de mí
  lexicon: HALOT
  rationale: La preposición מן con sufijo de 1.ª persona singular se traduce de modo directo como «de mí»; el contexto ya aporta la idea de separación.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la petición. «Porque» es claro en español y mantiene la relación explicativa del hebreo.
- source_word: צָרָה
  english_pob_choice: trouble
  chosen_spanish: la angustia
  alternatives_spanish:
  - el problema
  - la aflicción
  - el mal
  lexicon: HALOT
  rationale: El sustantivo puede denotar trouble, distress o affliction. «Angustia» preserva la intensidad de la crisis en un registro poético y comprensible; se deja constancia de la alternativa semántica en nota.
- source_word: קְרוֹבָה
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - se ha acercado
  - está próxima
  lexicon: HALOT
  rationale: El adjetivo usado predicativamente indica proximidad. «Está cerca» es el equivalente natural y mantiene la inmediatez del peligro.
- source_word: אֵין
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: HALOT
  rationale: La partícula de inexistencia se expresa de manera idiomática con «no hay», conservando la negación existencial del hebreo.
- source_word: עוֹזֵר
  english_pob_choice: helper
  chosen_spanish: quien ayude
  alternatives_spanish:
  - ayudador
  - auxiliador
  - ayuda
  lexicon: HALOT
  rationale: El participio sustantivado de עזר alude a una persona que ayuda. «Quien ayude» conserva la función personal sin forzar una terminología eclesiástica menos natural; también deja abierto el matiz de sujeto potencial o caracterizado por ayudar.
theological_decisions:
- issue: Lenguaje de distancia divina en lamentación
  english_pob_reading: Do not be far from me
  chosen_spanish_reading: No te alejes de mí
  alternative_spanish_readings:
  - No estés lejos de mí
  - No te apartes de mí
  rationale: El hebreo usa un lenguaje espacial (רחק + מן). «No te alejes de mí» mantiene esa imagen y la tensión devocional del lamento sin convertirla prematuramente en «abandono», que sería una intensificación no explicitada por el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés; no se requieren revisiones adicionales. Se preservó la metáfora espacial del hebreo y se optó por una equivalencia natural en español para la súplica y la negación existencial.
  spanish_consistency_notes:
  - Se usa «angustia» para צָרָה, manteniendo el rango semántico documentado sin reducirlo a un solo matiz.
  - «Quien ayude» conserva el valor personal de עוֹזֵר como participio sustantivado y evita un giro demasiado técnico.
  - Se mantiene la estructura paralela de dos razones con «porque… porque…», en línea con el hebreo y la POB en inglés.
