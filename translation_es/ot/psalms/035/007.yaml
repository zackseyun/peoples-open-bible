translation:
  language: es
  text: Porque sin causa escondieron para mí el foso de su red[a]; sin causa lo cavaron para mi vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el foso para su red» o «el foso de la red de ellos»; la relación exacta entre «foso» y «red» en el hebreo es ambigua.'
    reason: alternative_reading
  - marker: b
    text: «Para mi vida» traduce el hebreo «para mi néfesh», es decir, para mí mismo o mi vida, no necesariamente «alma» en un sentido teológico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del lamento o apelación del salmista. En español, «porque» conserva bien el valor causal de כִּי y suena natural en un verso poético.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - gratuitamente
  - sin motivo
  - sin razón
  lexicon: HALOT
  rationale: Expresa la hostilidad inmerecida con una fórmula breve y idiomática. «Sin causa» refleja bien la repetición enfática del hebreo.
- source_word: טָמְנוּ
  english_pob_choice: hid
  chosen_spanish: escondieron
  alternatives_spanish:
  - ocultaron
  - guardaron oculto
  lexicon: HALOT
  rationale: El verbo indica esconder o ocultar una trampa. «Escondieron» es natural en español y mantiene la acción concreta.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - contra mí
  - para que yo cayera
  lexicon: HALOT
  rationale: El dativo señala el objetivo o desventaja de la acción. «Para mí» conserva la concisión del hebreo y deja claro el daño intentado por el contexto.
- source_word: שַׁחַת רִשְׁתָּם
  english_pob_choice: the pit for their net
  chosen_spanish: el pozo de su red
  alternatives_spanish:
  - el pozo de su trampa
  - el hoyo de su red
  - el pozo para su red
  lexicon: HALOT
  rationale: La construcción hebrea une de manera difícil «pozo» y «su red». «El pozo de su red» preserva ambos sustantivos sin forzar una interpretación excesivamente explicativa, y permite mantener la tensión lexical documentada.
- source_word: חָפְרוּ
  english_pob_choice: dug
  chosen_spanish: lo cavaron
  alternatives_spanish:
  - lo excavaron
  - cavaron
  lexicon: HALOT
  rationale: El verbo es literal y concreto. El pronombre «lo» retoma el pozo/trampa de manera fluida en español.
- source_word: לְנַפְשִׁי
  english_pob_choice: for my life
  chosen_spanish: para mi vida
  alternatives_spanish:
  - para mí
  - para mi alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida/persona del salmista, no a «alma» en sentido teológico posterior. «Para mi vida» comunica el peligro personal de forma clara y fiel.
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión del inglés que hizo más clara la relación entre «pit» y «net»; en español se conserva esa relación ambigua con una formulación breve y publicable, sin resolverla de modo excesivamente interpretativo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en este texto.
  - Se evitó «señuelo» o «trampa» como sustitutos globales para no borrar la imagen específica de «pozo» y «red».
  - Se prefirió «vida» para נֶפֶשׁ siguiendo el criterio POB de no imponer «alma» donde el sentido básico es la persona o la vida.
