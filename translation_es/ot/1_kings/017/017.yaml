translation:
  language: es
  text: Después de estas cosas[a], el hijo de la mujer que era dueña de la casa enfermó, y su enfermedad se volvió muy grave, hasta que no quedó aliento en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hasta que no le quedó vida". El hebreo dice literalmente: "hasta que no quedó aliento en él".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Y aconteció después de estas cosas
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa temporal y el plural de הַדְּבָרִים, con español natural y digno. Evita una calca demasiado pesada como 'y aconteció' en el texto principal.
- source_word: חָלָה
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - cayó enfermo
  - se enfermó
  lexicon: HALOT
  rationale: El verbo expresa inicio de enfermedad; 'enfermó' comunica bien el valor ingressivo sin sonar forzado. 'Cayó enfermo' es posible, pero menos sobrio en este contexto.
- source_word: בֶּן הָאִשָּׁה בַּעֲלַת הַבָּיִת
  english_pob_choice: the son of the woman who owned the house
  chosen_spanish: el hijo de la mujer que era dueña de la casa
  alternatives_spanish:
  - el hijo de la mujer, la dueña de la casa
  - el hijo de la mujer que poseía la casa
  lexicon: HALOT
  rationale: '''בַּעֲלַת הַבָּיִת'' señala a la mujer como propietaria o dueña de la casa. ''Era dueña de la casa'' mantiene esa relación posesiva en español claro, sin recurrir a un arcaísmo.'
- source_word: וַיְהִי חָלְיוֹ חָזָק מְאֹד
  english_pob_choice: his illness became very severe
  chosen_spanish: su enfermedad se volvió muy grave
  alternatives_spanish:
  - su enfermedad se hizo muy grave
  - su enfermedad llegó a ser muy grave
  lexicon: HALOT
  rationale: '''Se volvió muy grave'' expresa el progreso de la afección y sigue de cerca el hebreo. ''Muy grave'' conserva el peso intensivo de מְאֹד.'
- source_word: עַד אֲשֶׁר לֹא נוֹתְרָה בּוֹ נְשָׁמָה
  english_pob_choice: until no breath was left in him
  chosen_spanish: hasta que no le quedó aliento
  alternatives_spanish:
  - hasta que no le quedó respiración
  - hasta que no quedó aliento en él
  lexicon: HALOT
  rationale: '''נְשָׁמָה'' se entiende literalmente como ''aliento'' o ''respiración'', con implicación de vida. ''No le quedó aliento'' preserva el idioma hebreo y evita convertir de inmediato la frase en una paráfrasis explicativa.'
theological_decisions:
- issue: La cláusula final describe la pérdida de aliento, pero no usa una fórmula simple de muerte
  english_pob_reading: Preserve the idiom 'no breath was left in him' rather than interpretively stating 'he died.'
  chosen_spanish_reading: Preservar la expresión 'no le quedó aliento' en vez de traducirla interpretativamente como 'murió'.
  alternative_spanish_readings:
  - hasta que murió
  - hasta que no le quedó vida
  rationale: El hebreo dice literalmente que no quedó נְשָׁמָה en él. La traducción conserva esa tensión semántica entre aliento y vida, dejando al lector percibir la gravedad sin añadir una conclusión interpretativa que el texto no formula aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'grew very severe' por 'became very severe' para ajustarse más al hebreo y a un registro más formal; en español se reflejó con 'se volvió muy grave', que mantiene ese progreso sin intensificarlo más allá del original.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' no aplicable aquí; no hay términos divinos en este versículo.
  - Se usa 'aliento' para נְשָׁמָה, reservando 'vida' como alternativa anotada, para no borrar la imagen corporal del hebreo.
  - '''Enfermó'' se eligió por su valor ingresivo y por coherencia con el inglés POB ''became sick''.'
