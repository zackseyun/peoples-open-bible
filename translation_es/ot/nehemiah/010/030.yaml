- from: Se unen[a] a sus hermanos, sus nobles, y entran en maldición y en juramento, para andar en la ley de Dios, la cual fue dada por mano de Moisés, siervo de Dios, y para guardar y hacer todos los mandamientos de Yahvé nuestro Señor, y sus juicios y sus estatutos.
  to: Se unen[a] a sus hermanos, sus nobles y entran en maldición[b] y en juramento, para andar en la ley de Dios, la cual fue dada por mano[c] de Moisés, siervo de Dios, y para guardar y hacer todos los mandamientos de Yahvé nuestro Señor, y sus juicios y sus estatutos[d].
  rationale: Se conserva el texto base casi intacto porque es fiel y natural, pero se restauran en español las notas léxicas y culturales documentadas en el POB inglés y se pule levemente la puntuación para mejorar la fluidez sin alterar el sentido.
