    issue: «fue engrandecido» para וַיִּנַּשֵּׂא
    rationale: Aunque comunica aumento de grandeza, en español bíblico y general «fue exaltado» refleja mejor el sentido pasivo/resultativo de elevación en estatus o reputación, y coincide más estrechamente con la decisión auditada en inglés.
  - severity: low
    issue: Puntuación con punto y coma antes de la cláusula final
    rationale: No es errónea, pero una coma fluye mejor en una coordinación narrativa simple con tres elementos enlazados por «y».
