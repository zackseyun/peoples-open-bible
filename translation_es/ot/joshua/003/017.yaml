    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «firmemente»; el adverbio enfatiza que los sacerdotes permanecieron inmóviles en el lecho del río.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todo el pueblo». El hebreo usa un término singular colectivo para Israel.'
    reason: lexical_alternative
  revision_rationale: 'Se conservó el texto principal casi intacto porque es fiel y natural. Solo se corrigió el aparato de notas: se movió [b] a la frase que realmente explica, se reformuló [a] para que sea una alternativa útil en español, y se adaptó ‘Or’ a ‘O:’.'
