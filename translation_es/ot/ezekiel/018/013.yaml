base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/013.yaml
  text: He lends at interest and takes profit—and shall he live? He shall not live[a]. He has done all these abominations; he shall surely be put to death[c][b]; his blood shall be upon him.
  footnotes:
  - marker: a
    text: Or 'usury' for 'at interest'; the Hebrew terms refer to interest/profit taken on a loan, especially in condemned exploitative lending.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall surely die.' The Hebrew expression is an emphatic death sentence.
    reason: alternative_reading
  - marker: c
    text: Literally, 'his blood shall be on him,' an idiom meaning he bears responsibility for his own death.
    reason: lexical_alternative
