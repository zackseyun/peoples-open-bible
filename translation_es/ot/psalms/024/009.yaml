revisions:
- from: ¡Alcen sus cabezas[a], oh puertas! Alcense[b], oh puertas antiguas, para que entre el Rey de la gloria.
  to: ¡Alcen sus cabezas[a], oh puertas, y sean alzadas, oh puertas antiguas[b], para que entre el Rey de la gloria!
  rationale: 'Se corrige un problema material de anclaje de nota: la alternativa «eternas» debe ir con «puertas antiguas», no con el verbo. También se mejora la forma verbal para reflejar mejor el matiz pasivo del inglés auditado («be lifted up») y se pule la sintaxis poética en un español más natural y correcto, sin alterar el sentido fuente.'
