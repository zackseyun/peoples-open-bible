base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/031.yaml
  text: And when you present your gifts[a], when you make your sons pass through the fire, you defile yourselves with all your idols to this day. And shall I be inquired of by you, O house of Israel? As I live, declares the Lord GOD[c][b], I will not be inquired of by you.
  footnotes:
  - marker: a
    text: Hebrew 'make your sons pass through the fire,' an idiom for child-sacrifice in idolatrous worship.
    reason: cultural_note
  - marker: b
    text: Or 'offerings' for 'gifts.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew literally uses an oath formula with ''if''; in context it means a strong denial: ''I will certainly not be inquired of by you.'''
    reason: lexical_alternative
