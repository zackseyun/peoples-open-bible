translation:
  language: es
  text: Al cabo de tres años la capturaron. En el sexto año de Ezequías[a], que era el noveno año de Oseas, rey de Israel, Samaria fue capturada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después de tres años la tomaron». El hebreo es más literalmente «al cabo de tres años».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדֻהָ
  english_pob_choice: they captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la apresaron
  lexicon: HALOT
  rationale: El verbo hebreo לכד conserva fuerza de captura/conquista. En español, «capturar» comunica mejor la acción militar que un simple «tomar»; el objeto pronominal femenino concuerda con Samaria implícita en el contexto.
- source_word: מִקְצֵה שָׁלֹשׁ שָׁנִים
  english_pob_choice: At the end of three years
  chosen_spanish: al cabo de tres años
  alternatives_spanish:
  - al final de tres años
  - después de tres años
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica el término de un período. «Al cabo de» transmite bien ese matiz temporal en español sin perder precisión.
- source_word: בִּשְׁנַת שֵׁשׁ לְחִזְקִיָּה
  english_pob_choice: In the sixth year of Hezekiah
  chosen_spanish: en el sexto año de Ezequías
  alternatives_spanish:
  - en el año seis de Ezequías
  lexicon: HALOT
  rationale: Se conserva la fórmula regnal estándar en español natural. «De Ezequías» reproduce la referencia al reinado expresada por לְ.
- source_word: הִיא
  english_pob_choice: which was
  chosen_spanish: que era
  alternatives_spanish:
  - es decir,
  - y era
  lexicon: HALOT
  rationale: El pronombre enlaza las dos dataciones sincronizadas; «que era» mantiene la relación explicativa/apposicional con claridad en español.
- source_word: שְׁנַת תֵּשַׁע לְהוֹשֵׁעַ מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the ninth year of Hoshea king of Israel
  chosen_spanish: el noveno año de Oseas, rey de Israel
  alternatives_spanish:
  - el año noveno de Oseas, rey de Israel
  lexicon: HALOT
  rationale: Se mantiene la segunda sincronización regnal y el título explícito «rey de Israel»; «Oseas» es la forma española usual del nombre hebreo הוֹשֵׁעַ.
- source_word: נִלְכְּדָה שֹׁמְרוֹן
  english_pob_choice: Samaria was captured
  chosen_spanish: Samaria fue capturada
  alternatives_spanish:
  - Samaria fue tomada
  lexicon: HALOT
  rationale: El niphal pasivo requiere una forma pasiva en español. Se repite la raíz semántica de «capturar» para conservar la correspondencia con la primera cláusula.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; se mantiene sin transliteración adicional.
translation_notes:
  revision_awareness: 'Revisado contra el texto hebreo (WLC) y el audit trail en inglés: se preservan la idiomaticidad temporal de מִקְצֵה, la doble sincronización regnal y la repetición verbal de לכד mediante un mismo campo semántico en español. No se registran cambios editoriales adicionales en la revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «Ezequías» y «Oseas» conforme a la forma bíblica usual en español.
  - Se conserva «Samaria» para el topónimo y el paralelismo verbal entre las dos cláusulas.
  - La puntuación separa claramente la serie cronológica sin añadir explicaciones no presentes en el texto.
