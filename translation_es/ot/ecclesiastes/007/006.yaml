source:
  edition: WLC
  text: כִּ֣י כְ/ק֤וֹל הַ/סִּירִים֙ תַּ֣חַת הַ/סִּ֔יר כֵּ֖ן שְׂחֹ֣ק הַ/כְּסִ֑יל וְ/גַם זֶ֖ה הָֽבֶל־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/007/006.yaml
  text: For like the crackling of thorns under a pot[a], so is the laughter of the fool[b]; this too is vapor.
  footnotes:
  - marker: a
    text: Or 'like the sound of thorns under the pot.' The Hebrew says literally 'like the sound/voice of thorns,' while the context suggests the sharp crackling noise they make when burned.
    reason: lexical_alternative
  - marker: b
    text: Hebrew hebel, often rendered 'vanity' or 'breath.' Here 'vapor' preserves the image of something fleeting and insubstantial.
    reason: lexical_alternative
