translation:
  language: es
  text: Después de él[a], Ibzán de Belén juzgó a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Belén». La preposición hebrea puede indicar origen o asociación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - administró justicia
  lexicon: HALOT
  rationale: שׁפט en Jueces denota la función de juez sobre Israel; «juzgó» conserva esa terminología recurrente sin sobreexplicar.
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Luego de él
  - Después de aquel
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal expresa sucesión respecto del juez anterior. En español, «Después de él» reproduce bien la relación temporal sin introducir el nombre del antecesor.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - sobre Israel
  - de Israel
  lexicon: HALOT
  rationale: El marcador de objeto directo no se vierte de forma explícita en español con la misma función; «a Israel» comunica de manera natural el objeto del verbo «juzgó».
- source_word: אִבְצָן
  english_pob_choice: Ibzan
  chosen_spanish: Ibzán
  alternatives_spanish:
  - Ibzan
  lexicon: Convención onomástica del proyecto
  rationale: Se translitera el nombre propio según uso castellano, con acentuación gráfica para ayudar a la lectura en español.
- source_word: מִבֵּית לָחֶם
  english_pob_choice: from Bethlehem
  chosen_spanish: de Belén
  alternatives_spanish:
  - de/desde Belén
  - de la región de Belén
  lexicon: HALOT
  rationale: El prefijo מִן admite origen o asociación. En español, «de Belén» es natural y mantiene abierta la relación de procedencia/adscripción que el inglés POB conserva con su nota.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se conserva la lectura breve y directa del hebreo, con la misma ambigüedad léxica sobre מִבֵּית לָחֶם que el POB inglés anotó.
  spanish_consistency_notes:
  - Se mantiene el patrón de Jueces para שׁפט con «juzgó».
  - Se evita importar el nombre del juez anterior, porque el hebreo sólo dice «después de él».
  - «Belén» se usa como topónimo bíblico normal en español; la nota preserva la alternativa de asociación/origen.
  - La puntuación sigue el orden natural del español y no añade información no presente en el texto fuente.
