lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No deberás
  - No matarás
  lexicon: HALOT
  rationale: La partícula negativa se expresa con la prohibición española natural; en una fórmula legal, «No ...» conserva la fuerza directiva del hebreo sin añadir matiz temporal o modal innecesario.
- source_word: תִּרְצָח
  english_pob_choice: murder
  chosen_spanish: cometer homicidio
  alternatives_spanish:
  - matar
  - asesinar
  lexicon: HALOT
  rationale: El verbo רצח se refiere a muerte ilícita o homicidio, no a toda muerte en general. En español, «cometer homicidio» transmite mejor esa fuerza legal y moral que «matar», que es demasiado amplio, y evita la carga más estrecha de «asesinar», que suena más técnica o moderna que el hebreo en este contexto.
theological_decisions:
- issue: Alcance de la prohibición en el Decálogo
  english_pob_reading: Render רצח as 'murder' rather than 'kill'
  chosen_spanish_reading: Renderizar como «cometer homicidio» en vez de «matar»
  alternative_spanish_readings:
  - No matarás.
  - No asesinarás.
  rationale: 'La lectura española debe preservar la misma restricción semántica que la POB inglesa documenta: no se trata de prohibir todo acto de dar muerte en cualquier circunstancia, sino el homicidio ilícito. «Cometer homicidio» mantiene esa precisión sin ampliar indebidamente el mandato.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preservar el alcance léxico del texto fuente sin importar una formulación doctrinal más amplia que no esté en el hebreo.'
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en la revisión más reciente (high_agreement, unchanged: true). La versión española mantiene esa misma decisión léxica central y no incorpora variaciones no sustentadas por el hebreo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología de sustitución porque el versículo no contiene el nombre divino.
  - Se prefiere «homicidio» para reflejar el alcance legal de רצח; «matar» queda reservado como alternativa anotada.
  - La formulación es breve y normativa, adecuada para un mandamiento del Decálogo en español bíblico contemporáneo.
