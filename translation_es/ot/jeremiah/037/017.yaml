translation:
  language: es
  text: 'Entonces el rey Sedequías envió y lo mandó traer, y el rey lo interrogó en su casa, en privado[a], y dijo: «¿Hay alguna palabra de Yahvé?» Jeremías dijo: «Sí, hay». Luego dijo[b]: «Serás entregado en manos del rey de Babilonia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en secreto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «en manos de», es decir, bajo el poder de.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a buscar
  lexicon: HALOT
  rationale: El hebreo básico es ‘enviar’. En español, ‘envió’ conserva esa base y deja que la acción de traer a Jeremías quede explicada por el siguiente verbo, sin sobrecargar la frase.
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: had him brought
  chosen_spanish: lo mandó traer
  alternatives_spanish:
  - lo tomó
  - lo hizo venir
  lexicon: HALOT
  rationale: No se trata de que el rey lo tomara físicamente, sino de que ordenó que lo trajeran. ‘Lo mandó traer’ comunica bien esa fuerza causativa sin perder naturalidad en español.
- source_word: וַיִּשְׁאָלֵהוּ
  english_pob_choice: questioned him
  chosen_spanish: lo interrogó
  alternatives_spanish:
  - le preguntó
  - lo inquirió
  lexicon: HALOT
  rationale: El contexto es una entrevista real y reservada, seguida de una pregunta precisa. ‘Lo interrogó’ reproduce mejor el carácter formal de la escena que un simple ‘le preguntó’.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  - en su residencia
  lexicon: HALOT
  rationale: בית puede referirse a la casa o residencia real. ‘En su casa’ sigue de cerca el hebreo y evita decidir más de lo que el texto dice.
- source_word: בַּסֵּתֶר
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - en secreto
  - secretamente
  lexicon: HALOT
  rationale: El sustantivo indica ocultamiento o lugar escondido; aquí funciona adverbialmente. ‘En privado’ expresa bien la idea y mantiene la alternativa ‘en secreto’ como matiz posible.
- source_word: הֲיֵשׁ דָּבָר מֵאֵת יְהוָה
  english_pob_choice: Is there any word from Yahweh?
  chosen_spanish: ¿Hay alguna palabra de Yahvé?
  alternatives_spanish:
  - ¿Hay alguna palabra que venga de Yahvé?
  - ¿Hay algún mensaje de Yahvé?
  lexicon: HALOT
  rationale: דָּבָר en lenguaje profético suele ser ‘palabra’, con resonancia de revelación divina. Se mantiene ‘palabra’ y se traduce יְהוָה como ‘Yahvé’ según la pauta del proyecto.
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Sí
  alternatives_spanish:
  - Hay
  - Sí, la hay
  lexicon: HALOT
  rationale: La respuesta hebrea es muy breve. En español, ‘Sí’ conserva la concisión y el efecto dramático antes de la afirmación siguiente.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea puede reflejarse como ‘en manos de’, que es natural en español y conserva la idea de quedar bajo control o poder ajeno.
- source_word: תִּנָּתֵן
  english_pob_choice: you will be given
  chosen_spanish: serás entregado
  alternatives_spanish:
  - te entregarán
  - serás dado
  lexicon: HALOT
  rationale: El nifal expresa pasividad. ‘Serás entregado’ transmite la acción sin perder la fuerza judicial del anuncio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se conserva la forma del nombre divino establecida por el proyecto: ‘Yahvé’, en vez de sustituirlo por un título como ‘Señor’.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Siguiendo la política del proyecto, se preserva el nombre propio divino en español como ‘Yahvé’ para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idioma idiomático de בְּיַד
  english_pob_reading: into the hand of
  chosen_spanish_reading: en manos de
  alternative_spanish_readings:
  - en la mano de
  - bajo el poder de
  rationale: La expresión no describe solo una mano literal, sino la autoridad o control del rey de Babilonia. ‘En manos de’ conserva la metáfora bíblica sin volverla opaca en español.
  doctrine_reference: HALOT / uso idiomático hebreo
- issue: Matiz de בַּסֵּתֶר
  english_pob_reading: privately
  chosen_spanish_reading: en privado
  alternative_spanish_readings:
  - en secreto
  - secretamente
  rationale: El hebreo apunta a ocultamiento o reserva. ‘En privado’ expresa la situación de manera natural, pero no borra la posible connotación de discreción o reserva, que queda abierta.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje base y el audit trail en inglés. No se introdujeron revisiones textuales adicionales; la traducción sigue el estado final sin cambios del expediente, manteniendo la secuencia narrativa y las decisiones léxicas ya validadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «en privado» como base, con la alternativa «en secreto» en nota.
  - Se conservó la metáfora hebrea «en manos de» para la fórmula de entrega/poder.
  - La respuesta breve «Sí» reproduce la tersura del hebreo יֵשׁ.
