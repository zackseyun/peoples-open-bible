translation:
  language: es
  text: Yahvé, en tu fuerza el rey se alegra, y en tu salvación[a] ¡cuánto se regocija!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «salvación»; el término también puede significar «liberación» o «victoria» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio del pacto, no un título. En español POB se conserva como «Yahvé» para reflejar el Tetragrámaton con transparencia audit-able, y se evita el reemplazo devocional por «SEÑOR».
- source_word: בְּעָזְּךָ
  english_pob_choice: in your strength
  chosen_spanish: en tu fuerza
  alternatives_spanish:
  - por tu fuerza
  - con tu fuerza
  - en tu poder
  lexicon: HALOT
  rationale: 'La preposición ב aquí expresa esfera o base: la alegría del rey ocurre dentro de la fuerza de Yahvé. «Fuerza» mantiene el paralelismo con el campo semántico de עֹז y suena natural en español.'
- source_word: יִשְׂמַח
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se regocija
  - se gozará
  - reirá de alegría
  lexicon: HALOT
  rationale: El imperfecto poético comunica una acción de alabanza vigente o general. «Se alegra» conserva el sentido básico de שמח con registro claro y digno en español.
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: HALOT
  rationale: Aunque el hebreo carece de artículo, el contexto hace definido al referente; por eso se traduce como «el rey», tal como refleja el audit trail inglés.
- source_word: וּבִישׁוּעָתְךָ
  english_pob_choice: and in your salvation
  chosen_spanish: y en tu salvación
  alternatives_spanish:
  - y en tu liberación
  - y en tu victoria
  lexicon: HALOT
  rationale: ישועה puede abarcar salvación, liberación o victoria. Se conserva «salvación» por su amplitud teológica y porque el hebreo permite esa gama sin restringirla indebidamente.
- source_word: מַה
  english_pob_choice: how greatly
  chosen_spanish: ¡cuánto!
  alternatives_spanish:
  - ¡cómo!
  - ¡qué tanto!
  lexicon: HALOT
  rationale: Aquí funciona como intensificador exclamativo, no como interrogativo. En español, «¡cuánto!» transmite con naturalidad la fuerza enfática del hebreo.
- source_word: יגיל
  english_pob_choice: he exults
  chosen_spanish: se regocija
  alternatives_spanish:
  - exulta
  - salta de gozo
  lexicon: HALOT
  rationale: גיל expresa alegría exaltada y jubilosa. «Se regocija» mantiene esa intensidad sin introducir un giro demasiado moderno o poético que oscurezca el paralelismo.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: ¡cuánto!
  alternatives_spanish:
  - muchísimo
  - sobremanera
  lexicon: HALOT
  rationale: 'El adverbio intensifica la exclamación final. En combinación con מַה, el español más natural es una sola exclamación enfática: «¡cuánto!».'
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto en forma transparente y ampliamente reconocible en español bíblico. Así se evita ocultar el Tetragrámaton bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh / Spanish project default: Yahvé'
translation_notes:
  revision_awareness: El contexto inglés ya quedó en revisión alta y sin cambios necesarios; esta propuesta conserva ese sentido, pero adapta la exclamación final al español para que no suene mecánica, manteniendo la fuerza intensificadora del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en el cuerpo del texto.
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene.
  - «Salvación» mantiene la amplitud semántica sin fijar indebidamente liberación/victoria.
  - El registro es reverente y público, con sintaxis española natural y sin calcos excesivos.
