base_translation:
  language: en
  yaml_path: translation/ot/joshua/002/014.yaml
  text: The men said to her[a], “Our lives for yours, even to death, if you do not tell this matter of ours. And when Yahweh gives us the land, we will deal kindly and faithfully with you.”
  footnotes:
