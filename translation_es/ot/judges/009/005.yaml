base_translation:
  language: en
  yaml_path: translation/ot/judges/009/005.yaml
  text: Then he went to his father’s house at Ophrah and killed his brothers[a], the sons of Jerubbaal—seventy men—on one stone. But Jotham, the youngest son of Jerubbaal, was left[c][b], because he hid himself.
  footnotes:
