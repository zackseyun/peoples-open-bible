translation:
  language: es
  text: Y los ancianos de la congregación pondrán sus manos sobre la cabeza del toro delante de Yahvé; y el toro será sacrificado[a] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y uno degollará al toro delante de Yahvé». El hebreo pasa del plural «ancianos» a un verbo singular en la segunda mitad del verso; por eso esta traducción no nombra un agente específico para el sacrificio.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָמְכוּ
  english_pob_choice: shall lay
  chosen_spanish: pondrán sus manos
  alternatives_spanish:
  - apoyarán sus manos
  - impondrán sus manos
  lexicon: HALOT
  rationale: En este contexto ritual, סמך describe la acción de colocar o presionar las manos sobre la víctima. 'Pondrán sus manos' comunica la acción de forma natural en español y conserva el valor ceremonial sin añadir una interpretación teológica no explicitada por el texto.
- source_word: זִקְנֵי הָעֵדָה
  english_pob_choice: the elders of the congregation
  chosen_spanish: los ancianos de la congregación
  alternatives_spanish:
  - los ancianos de la asamblea
  - los ancianos de la comunidad
  lexicon: HALOT
  rationale: זקני indica a los ancianos, y העדה señala a la comunidad reunida del pacto. 'Congregación' mantiene bien ese sentido colectivo y litúrgico en español bíblico contemporáneo.
- source_word: אֶת יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: El plural posesivo se expresa de manera directa con 'sus manos'. En español, esto conserva la pluralidad del hebreo sin sonar forzado.
- source_word: עַל רֹאשׁ הַפָּר
  english_pob_choice: on the head of the bull
  chosen_spanish: sobre la cabeza del toro
  alternatives_spanish:
  - sobre la cabeza del bull
  - encima de la cabeza del toro
  lexicon: HALOT
  rationale: רֹאשׁ es 'cabeza' y פַּר es el animal sacrificial, naturalmente 'toro' en español. 'Sobre' reproduce bien la relación espacial del rito.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa 'delante de' o 'en presencia de'. Se mantiene 'Yahvé' por la convención del proyecto para יהוה, en lugar de sustituirlo por un título.
- source_word: וְשָׁחַט
  english_pob_choice: the bull shall be slaughtered
  chosen_spanish: el toro será degollado
  alternatives_spanish:
  - el toro será sacrificado
  - el toro será inmolado
  lexicon: HALOT
  rationale: El verbo שָׁחַט corresponde a una matanza ritual. 'Degollado' conserva con precisión la acción física básica del sacrificio; 'sacrificado' o 'inmolado' pueden ser más interpretativos o litúrgicos.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro joven
  lexicon: HALOT
  rationale: פַּר designa un toro/bull en este contexto sacrificial. 'Toro' es una equivalencia clara y natural en español; evita añadir la noción de juventud que el verso no exige por sí mismo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se translitera como 'Yahvé' para preservar el nombre propio del pacto y no ocultarlo bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Manejo de la lectura singular de וְשָׁחַט tras sujeto plural
  english_pob_reading: the bull shall be slaughtered
  chosen_spanish_reading: el toro será degollado
  alternative_spanish_readings:
  - ellos degollarán al toro
  - y uno degollará al toro
  rationale: El hebreo presenta un verbo singular y la revisión inglesa optó por una construcción impersonal/pasiva para no suplir un sujeto no expresado. En español, la pasiva refleja 'será degollado' conserva esa misma cautela y no fuerza un agente específico.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que corrigió una traducción agente-específica ('he shall slaughter') a una pasiva impersonal ('the bull shall be slaughtered') para no añadir un sujeto ausente en el hebreo. La versión española adopta la misma decisión mediante 'será degollado'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה, de acuerdo con la terminología base del proyecto.
  - Se prefirió 'toro' como equivalente natural de פַּר en un contexto sacrificial.
  - Se evitó 'SEÑOR' como sustitución del nombre divino.
  - La nota al pie preserva la tensión del cambio de número verbal sin resolverla artificialmente.
