revisions:
- from: Ciertamente reuniré[a] a todo ti, Jacob; ciertamente congregaré al remanente de Israel. Juntos los pondré como las ovejas de Bosra[b], como un rebaño en medio de su pastizal; harán ruido[c] por causa de la gente.
  to: Ciertamente reuniré a todo Jacob; ciertamente congregaré al remanente de Israel. Juntos los pondré como las ovejas de Bosra[a], como un rebaño en medio de su pastizal; harán bullicio con gente[b].
  rationale: Se corrigió el error grave de español 'a todo ti, Jacob' por 'a todo Jacob', que comunica de manera natural el sentido corporativo del hebreo. Se retiró la nota de intensificación por no ser necesaria en el texto final. También se ajustó la cláusula final a 'harán bullicio con gente', más natural en español y más cercana al texto principal inglés, preservando en nota la alternativa causal y la dificultad del hebreo.
