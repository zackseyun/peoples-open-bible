  rationale: 'Se hicieron ajustes menores para mejorar la fidelidad semántica y la naturalidad del español: «la anterior» explicita mejor el referente comparativo implícito; «muchos recursos» refleja mejor la amplitud de רְכוּשׁ en contexto militar que «mucho equipo»; y la nota b se reformuló para sonar más natural en español sin perder la observación exegética del POB inglés.'
