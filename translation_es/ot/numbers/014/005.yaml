review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: acción narrativa simple (''cayeron''), el modismo de postración, la presencia pública (''delante de''), y conserva el doblete comunitario ''asamblea de la congregación'' junto con ''los hijos de Israel''. Sin embargo, ''sobre sus rostros'' suena poco natural en español bíblico actual; el sentido del hebreo se preserva mejor con una formulación idiomática española como ''rostro en tierra'' sin perder la imagen fuente.'
  spanish_quality_summary: La redacción es generalmente fiel y clara, con registro digno. La principal debilidad es la naturalidad de 'cayeron sobre sus rostros', que resulta calcada y algo extraña en español. 'Cayeron rostro en tierra' o 'cayeron sobre sus rostros, postrándose' serían más idiomáticas; la opción más concisa y fiel es 'cayeron rostro en tierra'. El resto del versículo lee bien y mantiene la solemnidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Los hijos de Israel' sigue correctamente la decisión documentada para בְּנֵי יִשְׂרָאֵל. 'Asamblea de la congregación' conserva adecuadamente קְהַל עֲדַת. No aparecen términos sensibles del glosario general como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: Calco poco natural en 'cayeron sobre sus rostros'
    rationale: Aunque reproduce de cerca el hebreo עַל־פְּנֵיהֶם, en español suena forzado y menos inteligible que una expresión idiomática equivalente como 'rostro en tierra', que mantiene la imagen de postración sin paráfrasis indebida.
  - severity: low
    issue: Nota al pie a presenta una alternativa idéntica a la lectura principal
    rationale: La nota dice 'O «los israelitas» o «los hijos de Israel»', pero 'los hijos de Israel' ya es el texto principal. Conviene reformularla para indicar que las alternativas son 'los israelitas' o 'los hijos de Israel' en inglés, mientras el hebreo literalmente dice 'los hijos de Israel'; en español la nota puede quedar más limpia simplemente señalando la alternativa 'los israelitas'.
  - severity: low
    issue: 'Pequeño desliz gramatical en la rationale teológica: ''la intensidad del escena'''
    rationale: Debe decir 'de la escena'. No afecta el texto bíblico, pero indica necesidad de pulido editorial.
  revised_spanish_text: Entonces Moisés y Aarón cayeron rostro en tierra delante de toda la asamblea de la congregación de los hijos de Israel[a][b].
  revised_footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «asamblea de la congregación» conserva dos términos comunitarios relacionados para dar énfasis.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la expresión idiomática de postración para que el español sea natural y fiel al hebreo sin caer en un calco rígido. También se depura la nota a para evitar redundancia con el texto principal y dejar más clara la alternativa léxica conservada.
