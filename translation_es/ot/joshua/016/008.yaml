    changes_summary: Changed 'end points were' to the more natural singular 'end was,' reflecting the border's termination at the sea while preserving the source sense.
translation:
  language: es
  text: Desde Tapúah[a] el límite va hacia el oeste hasta el torrente de Caná[b], y su extremo estaba hasta el mar. Esta es la heredad de la tribu de los hijos[c] de Efraín, según sus familias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hacia el mar”; aquí se explicita la dirección occidental que suele estar implícita en fórmulas territoriales hebreas.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse “wadi de Caná”; נַחַל nombra un cauce o valle de escorrentía, no necesariamente un río permanente.
    reason: lexical_alternative
  - marker: c
    text: Hebreo “hijos de Efraín”, designación tribal estándar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתַּפּוּחַ
  english_pob_choice: From Tappuah
  chosen_spanish: Desde Tapúah
  alternatives_spanish:
  - Desde Tappuah
  - Desde Tapuá
  lexicon: HALOT
  rationale: La preposición מִן indica el punto de partida del lindero. Se conserva el nombre propio transliterado, y 'Desde' comunica con naturalidad el origen del recorrido en español.
- source_word: יֵלֵךְ הַגְּבוּל
  english_pob_choice: the border goes
  chosen_spanish: el límite va
  alternatives_spanish:
  - el borde va
  - el límite corre
  lexicon: HALOT
  rationale: En descripciones territoriales, הלך con גְּבוּל expresa el curso de una frontera. 'Límite va' suena natural en español y mantiene el sentido lineal sin forzar una paráfrasis.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el mar
  - al occidente
  lexicon: HALOT
  rationale: En textos de linderos, la forma direccional ligada a 'mar' suele funcionar como indicación geográfica de occidente. Se opta por explicitar la dirección para evitar ambigüedad, sin perder la referencia del texto.
- source_word: נַחַל קָנָה
  english_pob_choice: the Brook of Kanah
  chosen_spanish: el torrente de Caná
  alternatives_spanish:
  - el arroyo de Caná
  - el wadi de Caná
  lexicon: HALOT
  rationale: נַחַל puede referirse a un cauce, torrente o wadi. 'Torrente' conserva el valor geográfico y es comprensible en español bíblico; se mantiene el nombre propio del lugar en transliteración adaptada.
- source_word: וְהָיוּ תֹצְאֹתָיו
  english_pob_choice: and its end was
  chosen_spanish: y su extremo estaba
  alternatives_spanish:
  - y su salida estaba
  - y sus extremos estaban
  lexicon: HALOT
  rationale: תֹצְאוֹת en fórmulas de lindero señala el punto terminal del límite. Aunque el plural hebreo puede sugerir 'extremos', el audit trail inglés ya resolvió el sentido hacia un único punto final; en español 'su extremo estaba' preserva esa resolución.
- source_word: הַיָּמָּה
  english_pob_choice: at the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - al mar
  - hacia el mar
  lexicon: HALOT
  rationale: Aquí יָם conserva su sentido concreto de 'mar' como término del límite. 'En el mar' reproduce el cierre territorial sin convertirlo en una mera dirección abstracta.
- source_word: מַטֵּה
  english_pob_choice: the tribe of
  chosen_spanish: la tribu de
  alternatives_spanish:
  - el clan de
  - la vara de
  lexicon: HALOT
  rationale: En contextos de repartición territorial, מַטֶּה designa la unidad tribal y no el objeto literal 'vara'. 'Tribu' es la equivalencia contextual estable.
- source_word: בְנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - el pueblo de Efraín
  lexicon: HALOT
  rationale: Se conserva la expresión masculina y genealógica del hebreo, tal como hace la POB inglesa. 'Hijos de Efraín' es transparente, fiel y evita neutralizar un designación tribal estable.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their families
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - según sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede verterse como 'familias' o 'clanes'. Se mantiene 'familias' por ser literal y ampliamente inteligible, conforme al valor básico del término.
theological_decisions:
- issue: Designación tribal masculina en בְנֵי אֶפְרַיִם
  english_pob_reading: the sons of Ephraim
  chosen_spanish_reading: los hijos de Efraín
  alternative_spanish_readings:
  - los descendientes de Efraín
  - el pueblo de Efraín
  rationale: El hebreo emplea una expresión filial masculina que funciona como designación tribal. Se preserva en español por fidelidad al texto y por coherencia con la política de mantener el marcador genealógico cuando es semánticamente relevante.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'its end points were' a 'its end was'; por eso el español adopta el singular 'su extremo estaba' para reflejar la terminación unitaria del lindero en el mar, sin reintroducir una pluralidad que el ajuste final ya descartó.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - '''Torrente'' se usa aquí para נַחַל por fluidez y porque el contexto es un límite territorial; ''wadi'' queda como alternativa documentada.'
  - '''Hijos de Efraín'' conserva la fórmula tribal masculina del original y del audit trail inglés.'
  - Se evita 'SEÑOR' porque no hay aquí una sustitución del nombre divino, sino una descripción geográfica de frontera.
