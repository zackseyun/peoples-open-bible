translation:
  language: es
  text: Pero tú[a], habiendo sido azotado del cielo, proclama a todos la majestad del poder de Dios. Y después de decir estas cosas[b], se hicieron invisibles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flagelado». El griego expresa un castigo corporal severo.
    reason: lexical_alternative
  - marker: b
    text: O «desaparecieron» / «se esfumaron de la vista».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμαστιγωμένος
  english_pob_choice: having been scourged
  chosen_spanish: habiendo sido azotado
  alternatives_spanish:
  - habiendo sido flagelado
  - habiendo sido castigado con azotes
  - habiendo sido azotado con severidad
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción sufrida con efecto resultante. «Azotado» comunica el golpe físico con un registro natural en español y evita suavizar la violencia; «flagelado» también sería posible, pero suena más técnico.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: BDAG
  rationale: La frase señala origen o procedencia celestial, no solo ubicación. «Desde el cielo» mantiene la procedencia divina sin añadir explícitamente un sujeto agente que el griego no formula aquí.
- source_word: διάγγελλε
  english_pob_choice: proclaim
  chosen_spanish: proclama
  alternatives_spanish:
  - anuncia
  - declara
  - publica
  lexicon: BDAG
  rationale: El imperativo pide una comunicación pública y enfática. «Proclama» conserva mejor ese tono formal y público que «anuncia».
- source_word: πᾶσι
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los hombres
  - a todos
  lexicon: BDAG
  rationale: El dativo marca el destinatario de la proclamación. «A todos» es directo y suficientemente amplio en español.
- source_word: τὸ μεγαλεῖον
  english_pob_choice: the majestic power
  chosen_spanish: la majestad
  alternatives_spanish:
  - la grandeza
  - la magnificencia
  - lo majestuoso
  lexicon: LSJ
  rationale: El término expresa grandeza/majestad; en esta construcción apposicional con κράτος, en español conviene compactarlo como «la majestad» para evitar una frase pesada, dejando que «del poder de Dios» complete la idea de grandeza poderosa.
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - poderío
  - mando
  lexicon: BDAG
  rationale: En este contexto se trata del poder manifestado de Dios. «Poder» es la equivalencia más natural y fiel; «poderío» sería más idiomático pero menos sobrio.
- source_word: ἀφανεῖς ἐγένοντο
  english_pob_choice: they became invisible
  chosen_spanish: se hicieron invisibles
  alternatives_spanish:
  - desaparecieron
  - se esfumaron
  - se volvieron invisibles
  lexicon: LSJ
  rationale: El griego dice literalmente que «llegaron a ser invisibles/no vistos». «Se hicieron invisibles» preserva esa idea de volverse no visibles mejor que un simple «desaparecieron».
theological_decisions:
- issue: Agencia divina implícita en «desde el cielo»
  english_pob_reading: Retain 'from heaven' without expanding to 'by God from heaven'
  chosen_spanish_reading: Mantener «desde el cielo» sin glosar «por Dios desde el cielo»
  alternative_spanish_readings:
  - castigado por Dios desde el cielo
  - azotado por el cielo
  rationale: El griego nombra el origen celestial y el contexto ya deja clara la agencia divina. La traducción conserva esa economía y evita una explicitación interpretativa no formulada en el texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lectura de la desaparición sobrenatural
  english_pob_reading: they became invisible
  chosen_spanish_reading: se hicieron invisibles
  alternative_spanish_readings:
  - desaparecieron
  - se volvieron invisibles
  rationale: La formulación griega apunta a «llegar a ser no vistos» más que a una simple salida de escena. «Se hicieron invisibles» conserva la textura sobrenatural del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando ambas notas al texto mediante los marcadores [a] y [b]. Además, se ajustó la primera frase para que el referente del texto español coincida exactamente con las notas léxicas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y no se introdujo «SEÑOR».
  - Se preservó el tono formal y narrativo del imperativo con «proclama».
  - Se optó por «se hicieron invisibles» para reflejar el valor literal de ἀφανεῖς ἐγένοντο sin perder naturalidad en español.
  - La expresión «desde el cielo» conserva la procedencia celestial sin añadir una explicación doctrinal extra.
