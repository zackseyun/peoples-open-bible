translation:
  language: es
  text: ¿Y qué tiene de sorprendente si los deseos del alma[a] quedan sin efecto[b] con respecto a la participación en la belleza[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la vida interior»; ψυχή puede referirse al alma o a la vida interior, aunque aquí «alma» preserva mejor el sentido antropológico del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «se invalidan» o «pierden eficacia»; ἀκυροῦνται expresa la pérdida de fuerza o efecto.
    reason: lexical_alternative
  - marker: c
    text: O «en lo bello» o «en aquello que es bello»; la expresión πρὸς τὴν τοῦ κάλλους μετουσίαν es abstracta y puede formularse de manera más explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί θαυμαστόν
  english_pob_choice: what is surprising
  chosen_spanish: ¿qué tiene de sorprendente?
  alternatives_spanish:
  - ¿qué hay de maravilloso?
  - ¿qué tiene de asombroso?
  lexicon: LSJ
  rationale: La pregunta retórica griega pide por qué algo sería sorprendente; en español, ‘¿qué tiene de sorprendente?’ conserva la fuerza idiomática y el tono argumentativo sin sonar arcaico.
- source_word: ἐπιθυμίαι
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - apetitos
  - pasiones
  - ansias
  lexicon: LSJ
  rationale: ‘Deseos’ reproduce de forma amplia y neutral ἐπιθυμίαι, sin moralizar el término ni restringirlo a lo corporal.
- source_word: ψυχῆς
  english_pob_choice: of the soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de la vida
  - del interior
  - de la mente
  lexicon: LSJ
  rationale: En este contexto filosófico-helénico, ‘alma’ conserva el registro antropológico de ψυχή mejor que ‘mente’ o ‘vida’.
- source_word: πρὸς
  english_pob_choice: with respect to
  chosen_spanish: con respecto a
  alternatives_spanish:
  - en relación con
  - respecto de
  - hacia
  lexicon: LSJ
  rationale: ‘Con respecto a’ expresa bien la relación abstracta entre la nulificación de los deseos y el ámbito de la participación en la belleza, siguiendo la revisión inglesa más reciente.
- source_word: τοῦ κάλλους
  english_pob_choice: beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - lo bello
  - aquello que es bello
  - la hermosura
  lexicon: LSJ
  rationale: El griego dice literalmente ‘belleza’; mantener ‘la belleza’ evita introducir una interpretación moralizante no explícita en el texto.
- source_word: μετουσίαν
  english_pob_choice: participation
  chosen_spanish: participación
  alternatives_spanish:
  - comunión
  - participar en
  - compartir
  lexicon: LSJ
  rationale: ‘Participación’ preserva el sustantivo abstracto y el registro filosófico de μετουσία.
- source_word: ἀκυροῦνται
  english_pob_choice: are rendered ineffective
  chosen_spanish: se vuelven ineficaces
  alternatives_spanish:
  - son anulados
  - pierden eficacia
  - quedan invalidados
  lexicon: LSJ
  rationale: El pasivo de ἀκυροῦνται expresa quedar sin fuerza o efecto; ‘se vuelven ineficaces’ es natural en español y sigue de cerca la revisión inglesa que optó por ‘rendered ineffective’.
theological_decisions:
- issue: ψυχή como término antropológico en un contexto filosófico-judaico
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - mente
  - interior
  - vida
  rationale: ‘Alma’ preserva el mundo conceptual del autor respecto a la vida interior y el dominio racional sobre los apetitos, sin reducir ψυχή a psicología moderna.
  doctrine_reference: Translation philosophy §1, §6
- issue: κάλλος como categoría estética/moral sin sobreinterpretación
  english_pob_reading: beauty
  chosen_spanish_reading: belleza
  alternative_spanish_readings:
  - lo bello
  - nobleza
  - hermosura
  rationale: La fuente griega habla de ‘belleza’; la traducción mantiene esa referencia abierta sin convertirla en ‘nobleza’ ni cargarla de una explicación no presente en el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir una formulación natural para ἀκυροῦνται ('se vuelven ineficaces') y conservar el sustantivo abstracto 'participación' para μετουσίαν; también mantiene la ambigüedad controlada de πρὸς τὴν τοῦ κάλλους μετουσίαν con una nota alternativa.
  spanish_consistency_notes:
  - Se usa ‘alma’ para ψυχή, coherente con el registro antropológico-filosófico del pasaje.
  - Se usa ‘belleza’ para κάλλος, evitando añadir una interpretación ética que el griego no explicita.
  - Se mantiene ‘participación’ como sustantivo, no como verbo, para conservar la estructura conceptual del original.
  - ‘Se vuelven ineficaces’ traduce el pasivo de ἀκυροῦνται de forma idiomática y sin borrar la idea de pérdida de fuerza.
