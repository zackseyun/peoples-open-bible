translation:
  language: es
  text: Porque su casa se hunde hacia la muerte, y sus senderos hacia los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las sombras», término poético para los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón dentro del argumento exhortativo del contexto inmediato. «Porque» mantiene la fuerza explicativa de manera natural en español.
- source_word: שָׁחָה
  english_pob_choice: sinks down
  chosen_spanish: se hunde
  alternatives_spanish:
  - se inclina
  - desciende
  - se desploma
  lexicon: HALOT
  rationale: El verbo comunica una caída o descenso hacia abajo. «Se hunde» conserva el movimiento vívido de descenso que el inglés POB captó con «sinks down».
- source_word: אֶל מָוֶת
  english_pob_choice: to death
  chosen_spanish: hacia la muerte
  alternatives_spanish:
  - a la muerte
  - hasta la muerte
  lexicon: HALOT
  rationale: La preposición marca dirección. «Hacia la muerte» expresa mejor el movimiento orientado a un destino que el simple «a», sin añadir interpretación.
- source_word: בֵּיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa y familia
  lexicon: HALOT
  rationale: El sustantivo es literalmente «casa». En español, «su casa» preserva la imagen concreta del hebreo y deja abierta la posible extensión a la esfera doméstica.
- source_word: רְפָאִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - las sombras
  - los difuntos
  - los rephaim
  lexicon: HALOT
  rationale: En este contexto sapiencial designa a los muertos en el ámbito de la muerte, no al pueblo antiguo homónimo. «Los muertos» es claro y fiel; se conserva la alternativa poética en la nota.
- source_word: מַעְגְּלֹתֶיהָ
  english_pob_choice: her paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus huellas
  - sus sendas
  lexicon: HALOT
  rationale: El término refiere a recorridos o trayectorias. «Senderos» mantiene la imagen poética y la paralela con «casa» sin introducir el verbo «conducen», que no está explícito en el hebreo.
theological_decisions:
- issue: Sentido de רְפָאִים en contexto sapiencial
  english_pob_reading: the dead
  chosen_spanish_reading: los muertos
  alternative_spanish_readings:
  - las sombras
  - los difuntos
  rationale: El versículo no parece nombrar una clase étnica sino a los habitantes del dominio de la muerte. La traducción principal evita especulación cosmológica y conserva el tono de advertencia; la nota preserva la alternativa poética tradicional.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se mantiene el paralelismo de la primera línea y se evita agregar un verbo equivalente a «lead» en la segunda, porque en el hebreo solo aparece la noción de dirección hacia los muertos; por eso se traduce con un sintagma direccional simple («hacia los muertos»).'
  spanish_consistency_notes:
  - Se usa «muerte» y no «sepulcro» para respetar el movimiento descendente del hebreo.
  - «Senderos» conserva el paralelismo poético con «casa» y evita sobreinterpretar la acción.
  - La nota mantiene la alternativa poética «las sombras» para reflejar la tensión léxica de רְפָאִים.
