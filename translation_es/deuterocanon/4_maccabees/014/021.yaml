translation:
  language: es
  text: ¡Oh razón[a], tirano sobre las pasiones de los hijos! Y la piedad[b] es más anhelada por una madre que sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oh razón, tirano sobre las pasiones de los hijos»; el genitivo «de los hijos» puede unirse más estrechamente con «pasiones», aunque el sentido sigue siendo que la razón gobierna las pasiones y que la devoción a Dios supera incluso el apego de una madre a sus hijos.
    reason: lexical_alternative
  - marker: b
    text: O «la piedad es más deseable para una madre que sus hijos»; aquí εὐσέβεια expresa fidelidad reverente hacia Dios, no simple religiosidad externa.
    reason: alternative_reading
lexical_decisions:
- source_word: λογισμέ
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - razonamiento
  - mente racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός funciona como la facultad racional que gobierna las pasiones. «Razón» es breve, natural y conserva el énfasis filosófico del pasaje.
- source_word: τέκνων
  english_pob_choice: of children
  chosen_spanish: de los hijos
  alternatives_spanish:
  - de los niños
  - de la descendencia
  lexicon: LSJ
  rationale: τέκνα significa de manera amplia hijos/descendencia. «Hijos» mantiene la relación familiar directa y evita restringir el alcance a «niños».
- source_word: παθῶν
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - sufrimientos
  - emociones
  - deseos
  lexicon: LSJ
  rationale: En esta obra πάθη designa impulsos pasionales sometidos al juicio racional, no meramente sufrimientos. «Pasiones» preserva ese valor moral-filosófico.
- source_word: τύραννε
  english_pob_choice: tyrant over
  chosen_spanish: tirano de
  alternatives_spanish:
  - señor de
  - despótico sobre
  lexicon: LSJ
  rationale: El vocativo τύραννε es fuerte e imagen de dominio. «Tirano de» conserva la fuerza retórica sin sonar forzado en español.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - reverencia
  lexicon: LSJ
  rationale: Aquí εὐσέβεια expresa fidelidad reverente hacia Dios. «Piedad» es un equivalente tradicional y fiel; en una nota se puede matizar que la idea no es simple religiosidad externa sino devoción dirigida a Dios.
- source_word: μητρὶ
  english_pob_choice: to a mother
  chosen_spanish: para una madre
  alternatives_spanish:
  - a una madre
  - en una madre
  lexicon: LSJ
  rationale: El dativo marca referencia/comparación. «Para una madre» resulta idiomático en español y conserva el sentido de preferencia afectiva.
- source_word: ποθεινοτέρα
  english_pob_choice: more desired
  chosen_spanish: más deseable
  alternatives_spanish:
  - más deseada
  - más anhelada
  - más querida
  lexicon: LSJ
  rationale: La comparación expresa ser más objeto de deseo/añoranza. «Más deseable» mantiene la idea sin cargar el verso con un giro poco natural; la nota recoge la alternativa «más deseada» si se prefiere enfatizar el ser buscada o apetecida.
theological_decisions:
- issue: Sentido de εὐσέβεια en contexto martirial y sapiencial
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  rationale: El pasaje contrasta la adhesión a Dios con el vínculo materno-filial. «Piedad» comunica bien la devoción a Dios y evita introducir un tecnicismo doctrinal ajeno al registro del texto, aunque «devoción a Dios» explicita mejor la dirección del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El inglés POB fue revisado en la segunda cláusula desde una construcción menos natural («is to a mother more longed for than children») a «is more desired by a mother than children». La versión española sigue esa lectura revisada y la expresa con una comparación natural: «es más deseable para una madre que los hijos».'
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός, conforme al eje filosófico de 4 Macabeos.
  - Se usó «pasiones» para πάθη para conservar el contraste razón/pasiones.
  - Se prefirió «piedad» para εὐσέβεια, con nota aclaratoria sobre su sentido de devoción a Dios.
  - «Hijos» traduce τέκνα de modo amplio y natural, sin forzar «niños».
