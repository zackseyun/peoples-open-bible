  rationale: Se corrige «entonaré salmos» a «haré música» para reflejar con mayor precisión el valor de וַאֲזַמְּרָה sin añadir un objeto no presente en el hebreo. También se mueve el marcador de nota a «gloria», que es el término realmente explicado por la nota lexical.
