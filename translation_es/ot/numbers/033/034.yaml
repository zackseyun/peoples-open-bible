translation:
  language: es
  text: Salieron de Jotbatá y acamparon en Abroná.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en camino
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa el acto de desplazarse de una estación a otra. «Salieron» comunica de manera natural en español la idea de partir de un lugar, con un matiz breve y narrativo similar al inglés «set out».
- source_word: מִיָּטְבָתָה
  english_pob_choice: from Jotbathah
  chosen_spanish: de Jotbatá
  alternatives_spanish:
  - desde Jotbatá
  - de Yotbatá
  lexicon: HALOT
  rationale: La preposición מִן se vierte con «de» en esta enumeración de trayectos. El nombre propio se translitera de forma consistente al español como Jotbatá, conservando la referencia geográfica sin intentar traducirla.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - e hicieron campamento
  - y acamparon
  lexicon: HALOT
  rationale: En contextos del itinerario del desierto, חנה significa establecer el campamento. «Acamparon» es claro y natural en español moderno, y conserva bien el valor de una parada en ruta.
- source_word: בְּעַבְרֹנָה
  english_pob_choice: at Abronah
  chosen_spanish: en Abroná
  alternatives_spanish:
  - en Abroná
  - a Abroná
  lexicon: HALOT
  rationale: La preposición locativa ב se expresa naturalmente con «en» para un lugar de campamento. El nombre propio se translitera como Abroná, manteniendo la forma breve y reconocible del topónimo.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; la propuesta española sigue de cerca la estructura itineraria del hebreo y la elección léxica ya validada en inglés, sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Se mantiene un estilo breve de registro de itinerario, acorde con la acumulación de estaciones en Números 33.
  - 'Los nombres propios se transliteran de forma consistente al español: Jotbatá, Abroná.'
  - Se evita el calco pesado de «y campó» en favor de «acamparon», que es natural y fiel al sentido situacional.
