base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/005.yaml
  text: Then the king of Aram said[a], “Go now, and I will send a letter to the king of Israel.” So he went and took in his hand ten talents of silver, six thousand pieces of gold[c][b], and ten changes of clothing.
  footnotes:
  - marker: a
    text: Or 'Go ahead'; the Hebrew preserves two imperatives, literally 'Go, come,' likely expressing prompt permission or encouragement.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'six thousand gold'; the specific counted unit is not stated explicitly, so 'pieces of gold' is supplied for natural English.
    reason: lexical_alternative
  - marker: c
    text: '''Aram'' is the Hebrew name; traditionally rendered ''Syria'' in some English versions.'
    reason: alternative_reading
