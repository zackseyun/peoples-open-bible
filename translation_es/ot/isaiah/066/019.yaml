base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/019.yaml
  text: And I will set a sign among them[a], and from them I will send survivors to the nations—to Tarshish, Pul, and Lud, who draw the bow; to Tubal and Javan[d][c][b]; to the distant coastlands that have not heard my report and have not seen my glory—and they will declare my glory among the nations.
  footnotes:
  - marker: a
    text: Or 'in them' or 'on them' for 'among them'; the Hebrew preposition allows more than one nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Who draw the bow'' may be taken as describing Lud specifically; some render more generally ''archers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the faraway islands'; the Hebrew term can refer to islands or coastlands, especially distant maritime regions.
    reason: lexical_alternative
  - marker: d
    text: Or 'have not heard my report/renown.'
    reason: lexical_alternative
