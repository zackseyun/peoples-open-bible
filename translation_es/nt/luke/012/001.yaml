translation:
  language: es
  text: 'Mientras tanto, cuando se habían reunido los muchos miles[a] de la multitud, hasta el punto de pisotearse unos a otros, comenzó a decir primero a sus discípulos: «Guárdense[b] de la levadura de los fariseos, que es hipocresía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las miríadas de la multitud»; μυριάδες puede designar «decenas de miles» o, más ampliamente, una multitud muy grande.
    reason: lexical_alternative
  - marker: b
    text: O «Estén atentos» / «Cuídense» de la levadura de los fariseos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν οἷς
  english_pob_choice: Meanwhile, when
  chosen_spanish: Mientras tanto, cuando
  alternatives_spanish:
  - En ese momento, cuando
  - Entretanto, cuando
  lexicon: BDAG
  rationale: La expresión introduce una circunstancia temporal y de transición, no un lugar. «Mientras tanto, cuando» conserva el vínculo narrativo con el contexto previo y suena natural en español.
- source_word: ἐπισυναχθεισῶν
  english_pob_choice: had gathered together
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se habían congregado
  - habían sido reunidas
  lexicon: BDAG
  rationale: El participio en genitivo absoluto expresa una acción ya completada. «Se habían reunido» comunica bien la reunión de la multitud sin volverse artificialmente literal.
- source_word: τῶν μυριάδων τοῦ ὄχλου
  english_pob_choice: the many thousands of the crowd
  chosen_spanish: las muchas miríadas de la multitud
  alternatives_spanish:
  - las muchas decenas de millares de la multitud
  - los muchos miles de la multitud
  lexicon: BDAG
  rationale: μυριάς puede denotar «diez mil» o, de modo más general, una multitud muy grande. Se conserva «miríadas» para mantener la fuerza hiperbólica del griego y la tensión lexical documentada; «muchas» ayuda a la fluidez en español.
- source_word: ὥστε καταπατεῖν ἀλλήλους
  english_pob_choice: so that they were trampling one another
  chosen_spanish: tanto que se atropellaban unos a otros
  alternatives_spanish:
  - de modo que se pisoteaban unos a otros
  - hasta el punto de pisarse unos a otros
  lexicon: BDAG
  rationale: ὥστε con infinitivo expresa resultado. «Se atropellaban unos a otros» transmite la escena de aglomeración y desorden; «atropellar» en español puede abarcar el empuje y el pisoteo de una multitud apretada.
- source_word: ἤρξατο λέγειν
  english_pob_choice: he began to say
  chosen_spanish: comenzó a decir
  alternatives_spanish:
  - empezó a decir
  - comenzó a hablar
  lexicon: BDAG
  rationale: Es una construcción inceptiva común. «Comenzó a decir» sigue de cerca el griego y funciona con naturalidad en español.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ πρῶτον
  english_pob_choice: first to his disciples
  chosen_spanish: primero a sus discípulos
  alternatives_spanish:
  - ante todo a sus discípulos
  - primero de todo a sus discípulos
  lexicon: BDAG
  rationale: πρῶτον puede marcar prioridad de destinatarios. «Primero a sus discípulos» preserva esa prioridad sin introducir una secuencia discursiva que el texto no exige.
- source_word: Προσέχετε ἑαυτοῖς
  english_pob_choice: Beware of
  chosen_spanish: Guárdense
  alternatives_spanish:
  - Estén atentos
  - Cuídense
  lexicon: BDAG
  rationale: El imperativo con reflexivo pide una advertencia para la propia protección. En español, «guárdense» comunica bien la vigilancia personal implícita sin sobrecargar el texto con una formulación poco natural.
- source_word: ἀπὸ τῆς ζύμης
  english_pob_choice: of the leaven
  chosen_spanish: de la levadura
  alternatives_spanish:
  - de la masa fermentada
  - del fermento
  lexicon: BDAG
  rationale: Se traduce con «levadura» porque mantiene el registro bíblico de la metáfora y es la opción más idiomática en español, aun cuando el símbolo conserve su sentido de influencia penetrante.
- source_word: ἥτις ἐστὶν ὑπόκρισις
  english_pob_choice: which is hypocrisy
  chosen_spanish: que es hipocresía
  alternatives_spanish:
  - que consiste en hipocresía
  - es decir, hipocresía
  lexicon: BDAG
  rationale: La cláusula explicativa identifica la metáfora. «Que es hipocresía» reproduce con claridad la glosa del texto sin añadir interpretación.
- source_word: τῶν Φαρισαίων
  english_pob_choice: of the Pharisees
  chosen_spanish: de los fariseos
  alternatives_spanish:
  - propia de los fariseos
  - de parte de los fariseos
  lexicon: BDAG
  rationale: El genitivo es descriptivo/posesivo. «De los fariseos» es la manera más clara y fiel de presentar la fuente de la levadura simbólica.
theological_decisions:
- issue: Conservación de la metáfora de la levadura
  english_pob_reading: Retain 'leaven' as a metaphor for corrupting influence, explicitly identified in the text as hypocrisy.
  chosen_spanish_reading: Conservar «levadura» como metáfora de una influencia corruptora, identificada explícitamente como hipocresía.
  alternative_spanish_readings:
  - traducir interpretativamente como «influencia»
  - explicar la imagen como «doctrina»
  rationale: El texto mismo define la metáfora; por eso conviene mantener la imagen en vez de reemplazarla por una paráfrasis. Así se preserva la tensión literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de πρῶτον
  english_pob_reading: Jesus spoke 'first to his disciples,' implying priority of audience rather than inserting an unstated sequence of later speeches.
  chosen_spanish_reading: Jesús habló primero a sus discípulos, marcando prioridad de destinatarios.
  alternative_spanish_readings:
  - primero de todo a sus discípulos
  - antes que a otros, a sus discípulos
  rationale: La prioridad parece referirse al orden de destinatarios más que a un marcador temporal rígido. La redacción elegida mantiene esa posibilidad sin sobreinterpretar el griego.
  doctrine_reference: Translation philosophy §3
- issue: Valor reflexivo de ἑαυτοῖς
  english_pob_reading: '''Watch yourselves'' / ''Be on your guard against the leaven of the Pharisees.'''
  chosen_spanish_reading: «Guárdense» conserva la idea de vigilancia personal y protección propia.
  alternative_spanish_readings:
  - «Cuídense»
  - «Estén atentos»
  rationale: El griego incluye un dativo reflexivo que orienta la advertencia hacia los propios oyentes. En español, «guárdense» comunica esa cautela personal de manera natural.
  doctrine_reference: Translation philosophy §§2, 3
translation_notes:
  revision_awareness: La redacción sigue el patrón de revisión del POB inglés al evitar una sobretraducción del reflexivo y al conservar la imagen de la levadura; además, se adapta la matización de πρῶτον como prioridad de destinatarios. Se optó por una formulación española idiomática que mantiene la fuerza del original y la glosa explicativa final.
  spanish_consistency_notes:
  - Se usa «multitud» para ὄχλος y «discípulos» para μαθηταί.
  - Se conserva «levadura» como término metafórico bíblico, no como explicación interpretativa.
  - «Hipocresía» traduce ὑπόκρισις sin suavizar la crítica moral.
  - «Fariseos» se mantiene como designación grupal histórica y religiosa.
  - Se evita introducir «SEÑOR» u otras sustituciones no presentes en el versículo.
