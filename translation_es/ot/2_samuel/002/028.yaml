  to: Entonces Joab tocó la trompeta[a], y todo el pueblo se detuvo, y ya no persiguió a Israel ni siguió peleando.
  rationale: Se elimina la redundancia «ya no ... más» para un español más natural y fiel al valor de cese. También se ajusta «continuaron peleando» a «siguió peleando», que expresa con fluidez la idea de no continuar la acción. Se mantiene «tocó la trompeta» y la nota léxica sobre שׁוֹפָר.
