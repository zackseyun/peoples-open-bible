base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/010.yaml
  text: Therefore I will give their wives to others[a], their fields to those who will possess them; for from the least even to the greatest, every one of them is greedy for unjust gain; from prophet even to priest[c][b], every one of them practices falsehood.
  footnotes:
  - marker: a
    text: Or 'their fields to inheritors/heirs'; the Hebrew verb can mean 'inherit' or 'take possession,' and here likely includes the sense of seizure by new possessors.
    reason: lexical_alternative
  - marker: b
    text: Or 'is greedy for gain'; the Hebrew expression can denote acquisitiveness generally, but in prophetic contexts often implies dishonest or unjust profit.
    reason: lexical_alternative
  - marker: c
    text: Or 'deals falsely' or 'acts deceitfully.'
    reason: lexical_alternative
