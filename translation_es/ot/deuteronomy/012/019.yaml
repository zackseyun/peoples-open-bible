translation:
  language: es
  text: Ten cuidado de no abandonar al levita[a] mientras vivas en tu tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los levitas»; el hebreo tiene el singular «el levita», probablemente usado de manera representativa para la clase levítica.
    reason: lexical_alternative
  - marker: b
    text: O «sobre tu tierra». El hebreo dice literalmente «sobre tu tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  lexicon: HALOT
  rationale: El imperativo nifal con לְךָ funciona como advertencia dirigida a la propia conducta. «Ten cuidado» transmite con naturalidad el matiz exhortativo y preventivo sin perder la fuerza del hebreo.
- source_word: פֶּן
  english_pob_choice: not to / that ... not
  chosen_spanish: de no
  alternatives_spanish:
  - para no
  - no sea que
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia negativa. En español, «de no» encaja bien después de «ten cuidado» y conserva la relación de prevención de la cláusula.
- source_word: תַּעֲזֹב
  english_pob_choice: forsake
  chosen_spanish: abandonar
  alternatives_spanish:
  - desamparar
  - dejar
  lexicon: HALOT
  rationale: עָזַב puede significar dejar, abandonar o forsake. Aquí la obligación pactal hacia el levita pide un verbo con peso moral; «abandonar» comunica ese peso de forma clara en español.
- source_word: אֶת הַלוּיִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: El hebreo usa singular con artículo, probablemente un singular representativo para la clase levítica. Mantener «el levita» sigue la forma del texto y preserva ese valor representativo.
- source_word: כָּל יָמֶיךָ
  english_pob_choice: as long as you live
  chosen_spanish: mientras vivas
  alternatives_spanish:
  - todos tus días
  - todo el tiempo que vivas
  lexicon: HALOT
  rationale: La expresión significa literalmente «todos tus días». En español, «mientras vivas» expresa con naturalidad el alcance temporal continuo que el contexto pide, sin perder el sentido durativo.
- source_word: עַל אַדְמָתֶךָ
  english_pob_choice: in your land / on your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - sobre tu tierra
  - en tu territorio
  lexicon: HALOT
  rationale: אַדְמָה remite a tierra/suelo/terreno. Aunque el hebreo dice literalmente «sobre tu tierra», en español bíblico actual «en tu tierra» es la forma más clara y natural; la preposición se ajusta al uso idiomático sin alterar el referente.
theological_decisions:
- issue: Singular representativo del levita
  english_pob_reading: the Levite
  chosen_spanish_reading: el levita
  alternative_spanish_readings:
  - los levitas
  rationale: Se conserva el singular del hebreo como singular representativo de una clase social dentro de Israel. Así se evita suavizar la forma del texto y se mantiene la tensión entre forma singular y referencia colectiva.
  doctrine_reference: Consistencia terminológica y fidelidad formal al referente social del texto
- issue: Advertencia pactal con prohibición implícita
  english_pob_reading: Be careful not to forsake
  chosen_spanish_reading: Ten cuidado de no abandonar
  alternative_spanish_readings:
  - Cuídate de no abandonar
  - Guárdate de abandonar
  rationale: La combinación de advertencia y prohibición queda reflejada con una exhortación directa seguida de la negativa. Esto conserva el tono de amonestación del pasaje sin forzar una formulación arcaica.
  doctrine_reference: Fidelidad semántica al modo imperativo-admonitorio del hebreo
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado de revisión inglesa en el sentido de preferir una advertencia natural («ten cuidado de no») y una expresión temporal idiomática («mientras vivas»), manteniendo al mismo tiempo el peso semántico de forsake/abandonar y la forma singular representativa de «el levita».
  spanish_consistency_notes:
  - Se mantuvo «levita» en singular para reflejar el artículo singular hebreo y su posible valor representativo.
  - Se prefirió «tierra» sobre «suelo» o «territorio» por claridad y naturalidad en español bíblico contemporáneo.
  - La secuencia «Ten cuidado de no…» conserva el tono de advertencia del imperativo hebreo sin caer en un calco rígido.
