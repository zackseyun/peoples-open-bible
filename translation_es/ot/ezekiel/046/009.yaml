translation:
  language: es
  text: Cuando el pueblo de la tierra venga ante Yahvé en los tiempos señalados[a], el que entre por la puerta del norte para postrarse[b] saldrá por la puerta del sur; y el que entre por la puerta del sur saldrá por la puerta del norte. No volverá por la puerta por la que entró, sino que saldrá recto hacia adelante[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las fiestas señaladas» o «en las festividades».'
    reason: lexical_alternative
  - marker: b
    text: Lit., «inclinarse» o «prosternarse en adoración».
    reason: lexical_alternative
  - marker: c
    text: Lit., «enfrente de él/ello saldrán»; es decir, deben seguir recto y salir por el lado opuesto, no volver por la puerta de entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el común del pueblo
  lexicon: HALOT
  rationale: Mantengo la expresión sustantiva colectiva de forma literal y natural en español. En este contexto de regulación del templo, 'el pueblo de la tierra' conserva el contraste con autoridades cultuales y civiles sin añadir la idea interpretativa de 'clases bajas' o 'común del pueblo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El proyecto español pide 'Yahvé' como forma principal para el nombre divino. Lo uso aquí para reflejar directamente el Tetragrámaton y mantener la transparencia frente al hebreo.
- source_word: בַּמּוֹעֲדִים
  english_pob_choice: at the appointed times
  chosen_spanish: en las fiestas señaladas
  alternatives_spanish:
  - en los tiempos señalados
  - en las festividades
  lexicon: HALOT
  rationale: '''מוֹעֲדִים'' puede significar tiempos señalados o festividades. En este marco del templo, ''fiestas señaladas'' comunica bien el sentido cultual y mantiene la posible referencia festiva sin reducirlo solo a calendario abstracto.'
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: para postrarse
  alternatives_spanish:
  - para adorar
  - para rendir culto
  lexicon: HALOT
  rationale: Prefiero 'postrarse' porque conserva la fuerza física y ritual del verbo hebreo. 'Adorar' es posible, pero en español puede suavizar el gesto concreto que el texto destaca.
- source_word: דֶּרֶךְ שַׁעַר צָפוֹן / דֶּרֶךְ שַׁעַר נֶגֶב
  english_pob_choice: by way of the north gate / by way of the south gate
  chosen_spanish: por la puerta del norte / por la puerta del sur
  alternatives_spanish:
  - por el camino de la puerta del norte
  - a través de la puerta del norte
  lexicon: HALOT
  rationale: '''דֶּרֶךְ'' con lenguaje de puertas funciona en español de manera más natural con ''por''. ''Puerta del norte/sur'' preserva la orientación espacial del mandato sin sobrecargar la frase.'
- source_word: יֵצֵא
  english_pob_choice: shall go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - deberá salir
  - irá a salir
  lexicon: HALOT
  rationale: El imperfecto aquí tiene valor normativo. 'Saldrá' comunica la instrucción legal/ritual con claridad y sin añadir modalidad extra.
- source_word: לֹא יָשׁוּב
  english_pob_choice: He shall not return
  chosen_spanish: No volverá
  alternatives_spanish:
  - No regresará
  - No dará vuelta
  lexicon: HALOT
  rationale: '''שׁוּב'' se rinde de modo directo con ''volver''. Mantiene el contraste con salir por el lado opuesto y evita una paráfrasis más fuerte que el hebreo.'
- source_word: אֲשֶׁר בָּא בוֹ
  english_pob_choice: through which he entered
  chosen_spanish: por la que entró
  alternatives_spanish:
  - por la cual entró
  - por donde entró
  lexicon: HALOT
  rationale: La relativa con preposición se expresa con naturalidad en español como 'por la que entró'. Conserva la referencia al acceso original por esa puerta.
- source_word: כִּי נִכְחוֹ יֵצֵאוּ
  english_pob_choice: but shall go out straight ahead
  chosen_spanish: sino que saldrá de frente
  alternatives_spanish:
  - sino que saldrá recto
  - sino que saldrán enfrente de él
  lexicon: HALOT
  rationale: '''נִכְחוֹ'' indica lo que está enfrente, opuesto o derecho delante. ''De frente'' preserva la idea de avanzar sin retroceder por la misma entrada y mantiene la fuerza práctica de la instrucción. Dado que el hebreo final usa plural, pero el contexto sigue con singular genérico, conservo el singular coordinado en español para fluidez, como hace la POB inglesa.'
theological_decisions:
- issue: Nombre divino יְהוָה en el templo y en contexto legal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Nombre divino. Siguiendo el estándar del proyecto en español, lo translitero como 'Yahvé' para evitar el ocultamiento convencional y conservar la trazabilidad con el original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de לְהִשְׁתַּחֲוֹת
  english_pob_reading: to worship
  chosen_spanish_reading: para postrarse
  alternative_spanish_readings:
  - para adorar
  - para rendir culto
  rationale: Aunque el acto es cultual, el hebreo señala literalmente la acción corporal de postrarse. 'Postrarse' preserva esa tensión sin borrar la dimensión de adoración.
  doctrine_reference: Lexical note on הִשְׁתַּחֲוָה / worship vs. prostration
- issue: Dirección final de salida נִכְחוֹ
  english_pob_reading: straight ahead
  chosen_spanish_reading: de frente
  alternative_spanish_readings:
  - recto
  - en dirección opuesta, por delante
  rationale: La instrucción no solo prohíbe volver; ordena continuar hacia delante y salir por el lado opuesto. 'De frente' mantiene esa orientación sin sobreexplicar.
  doctrine_reference: Temple-access regulation in Ezekiel 46
translation_notes:
  revision_awareness: 'Coincido con el último pase revisado: no se requieren cambios sustantivos respecto del audit trail inglés. La única adaptación relevante para español es mantener la equivalencia funcional de ''straight ahead'' con ''de frente'' y sostener el Nombre divino como ''Yahvé'' según la terminología del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma uniforme para יְהוָה.
  - '''Puerta del norte/sur'' conserva la simetría del mandato de acceso y salida.'
  - El singular genérico ('el que entre', 'saldrá') sigue la estructura normativa del hebreo y la POB inglesa.
  - '''Postrarse'' refleja el gesto corporal del verbo hebreo sin perder el matiz cultual.'
