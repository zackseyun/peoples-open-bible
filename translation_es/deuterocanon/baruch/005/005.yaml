  to: Levántate, Jerusalén, y ponte sobre la altura, y mira hacia el oriente, y ve a tus hijos e hijas reunidos desde la puesta del sol hasta su salida, a la palabra[a] del Santo, regocijándose en el recuerdo de Dios[b].
