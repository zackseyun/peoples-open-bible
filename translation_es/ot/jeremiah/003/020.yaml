review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: mantiene la comparación proverbial, conserva «una mujer» y «su compañero» sin sobreespecificar «esposa/esposo» en el texto principal, preserva «casa de Israel» y usa «Yahvé» conforme al proyecto. La nota alternativa también reproduce correctamente la tensión contextual matrimonial documentada en el rastro inglés.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y puntuación retórica. «Así como..., así ustedes...» es comprensible, pero en español bíblico-natural suena mejor «como..., así...» o «tal como..., así...». Además, «oh casa de Israel» funciona, pero «casa de Israel» queda más fluido si se mantiene entre comas como vocativo formal. También conviene evitar la redundancia enfática «me han traicionado a mí», ya que «me han traicionado» basta y suena más idiomático.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; בֵּית יִשְׂרָאֵל -> «casa de Israel»; el verbo בגד se vierte adecuadamente con «traicionar». No hay conflictos relevantes de glosario.'
  issues:
