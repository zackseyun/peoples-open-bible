lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - cántico
  - salmo musical
  lexicon: HALOT
  rationale: El término de superscripción denota un salmo/cántico con asociación musical. En español, «salmo» es el equivalente más natural y transparente para este encabezado, sin perder el valor literario del rótulo.
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: Para distinguirlo de מִזְמוֹר y conservar el paralelismo de dos sustantivos, «cántico» comunica bien el sentido de «song» en un registro bíblico y culto.
- source_word: לְיוֹם
  english_pob_choice: for the day
  chosen_spanish: para el día
  alternatives_spanish:
  - para uso en el día
  - del día
  lexicon: HALOT
  rationale: La preposición ל indica asociación o destino. «Para el día» preserva esa función de manera idiomática en español y mantiene la estructura breve de una superscripción.
- source_word: הַשַּׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  - el sábado santo
  lexicon: HALOT
  rationale: En español, «sábado» es el equivalente más directo y ampliamente entendido para la referencia específica al Sabbath. Se evita una paráfrasis más interpretativa como «día de reposo» porque el hebreo nombra la institución concreta.
theological_decisions:
- issue: Función literaria como encabezado y no como línea poética desarrollada
  english_pob_reading: 'Translate as a heading: ''A psalm, a song for the Sabbath day.'''
  chosen_spanish_reading: 'Traducir como encabezado: «Un salmo, un cántico para el día del sábado.»'
  alternative_spanish_readings:
  - Tomarlo como el primer verso poético sin puntuación de encabezado
  rationale: El hebreo consiste en sustantivos nominales de superscripción, sin verbo finito. En español conviene conservar su función editorial como encabezado para no introducir una cláusula inexistente en el texto fuente.
  doctrine_reference: Poética bíblica / títulos de salmos
translation_notes:
  revision_awareness: El testimonio en inglés mantiene el valor de superscripción y la alternativa lexical «for the day of the Sabbath». La versión española sigue ese mismo análisis, pero ajusta la naturalidad idiomática al español con «para el día del sábado» y conserva el carácter de encabezado.
  spanish_consistency_notes:
  - Se conserva la distinción entre «salmo» y «cántico» para reflejar los dos sustantivos hebreos.
  - «sábado» se usa como equivalente funcional de הַשַּׁבָּת en un contexto de título litúrgico.
  - La puntuación con coma reproduce el paralelismo nominal del hebreo y la lectura de encabezado.
