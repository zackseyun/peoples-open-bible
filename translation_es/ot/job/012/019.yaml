translation:
  language: es
  text: Él se lleva cautivos a los sacerdotes, despojados[a], y derriba a los poderosos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'despojados de sus bienes'; también puede entenderse como 'saqueados' o 'desposeídos'.
    reason: lexical_alternative
  - marker: b
    text: O 'los firmes' o 'los establecidos', es decir, los que parecían estar sólidamente asentados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  english_pob_choice: leads away
  chosen_spanish: lleva
  alternatives_spanish:
  - conduce
  - lleva lejos
  - los saca
  lexicon: HALOT
  rationale: El hiphil de הלך indica causar que alguien vaya; en este contexto poético de juicio, 'lleva' comunica bien la acción de hacer salir o conducir lejos sin añadir más de lo que exige el hebreo. Se mantiene el sujeto singular implícito del contexto.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes cultuales
  - sacerdotes oficiales
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente léxico natural de כהנים y conserva la referencia a figuras religiosas prominentes. En español, ''sacerdotes'' resulta claro y fiel sin necesidad de expansión.'
- source_word: שׁוֹלָל
  english_pob_choice: stripped
  chosen_spanish: despojados
  alternatives_spanish:
  - desnudos
  - saqueados
  - desposeídos
  lexicon: HALOT
  rationale: El hebreo describe a personas humilladas y privadas de bienes o dignidad. 'Despojados' recoge esa pérdida de manera natural en español y preserva la ambigüedad entre desnudez, saqueo y deshonra que el POB inglés retuvo con 'stripped' y sus alternativas.
- source_word: אֵתָנִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los firmes
  - los establecidos
  lexicon: HALOT
  rationale: Aunque el sustantivo puede sugerir firmeza, permanencia o fuerza, en el paralelismo de Job 12:19 la idea es de quienes parecen establecidos y poderosos. 'Los poderosos' comunica bien esa fuerza social sin perder la nota de estabilidad implícita.
- source_word: יְסַלֵּף
  english_pob_choice: overthrows
  chosen_spanish: derriba
  alternatives_spanish:
  - derriba y trastorna
  - subvierte
  - trastorna
  lexicon: HALOT
  rationale: El piel de סלף puede implicar torcer, pervertir o desbaratar; en este contexto la idea es derribar a quienes parecían firmes. 'Derriba' es natural en español y transmite el resultado de abatir lo estable, en línea con la revisión inglesa a 'overthrows'.
theological_decisions:
- issue: Sujeto divino implícito
  english_pob_reading: Render with singular 'he' referring to God
  chosen_spanish_reading: Él
  alternative_spanish_readings:
  - Dios
  - Yahvé
  rationale: El verso continúa la referencia a Dios sin repetir el nombre en cada línea. Mantener 'Él' respeta el flujo poético y la continuidad del sujeto divino implícito en el contexto inmediato.
  doctrine_reference: Poética hebrea; equivalencia óptima con preservación del sujeto implícito.
- issue: Posible matiz de אֵתָנִים
  english_pob_reading: the mighty, that is, those thought to be firmly established
  chosen_spanish_reading: los poderosos
  alternative_spanish_readings:
  - los firmes
  - los establecidos
  rationale: No se explicita la glosa interpretativa en el texto principal porque el hebreo admite una gama entre fuerza, firmeza y estabilidad. 'Los poderosos' conserva la tensión sin imponer una sola paráfrasis.
  doctrine_reference: Decisión léxica contextual; no doctrinal en sentido estricto.
translation_notes:
  revision_awareness: Se tomó como base la lectura inglesa revisada más reciente ('overthrows') y su decisión auditada para אֵתָנִים; se mantuvo el sujeto singular implícito, y se trasladó a español con una formulación natural y fiel al paralelismo hebreo.
  spanish_consistency_notes:
  - Se usa 'Él' para mantener la continuidad del sujeto divino ya presente en el contexto.
  - '''Despojados'' preserva la tensión semántica de שׁוֹלָל sin reducirla a una sola imagen.'
  - '''Los poderosos'' evita sobreinterpretar אֵתָנִים como mera ''durabilidad'' y conserva el tono de juicio contra los fuertes.'
