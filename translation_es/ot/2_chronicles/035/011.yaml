revisions:
- from: Y degollaron el sacrificio de la Pascua[a], y los sacerdotes rociaban la sangre de sus manos[b], mientras los levitas les quitaban las pieles[c].
  to: Y sacrificaron el sacrificio de la Pascua[a], y los sacerdotes rociaron la sangre, recibiéndola de sus manos[b], mientras los levitas los desollaban[c].
  rationale: Se ajustó «degollaron» a «sacrificaron» para reflejar mejor el verbo sacrificial hebreo; se cambió «rociaban» a «rociaron» para mantener la narrativa; y se reformuló la frase de la sangre para que מִיָּדָם no suene antinatural ni ambiguo en español. También se sustituyó «les quitaban las pieles» por «los desollaban», que es más conciso, más exacto para el contexto sacrificial y mejor alineado con el audit trail inglés.
