translation:
  language: es
  text: Así David y todo Israel subieron a Baala, es decir, a Quiriat-jearim, que pertenece a Judá, para subir desde allí el arca de Dios, Yahvé, que está entronizado sobre los querubines, sobre la cual se invoca su nombre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de modo más idiomático: «el arca de Dios, Yahvé, que está entronizado sobre los querubines, la cual es llamada por el Nombre». Compárese 2 Samuel 6:2.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subió
  - ascendieron
  - fueron
  lexicon: HALOT
  rationale: עלה en contexto narrativo de desplazamiento conserva la idea direccional de 'ir/subir'. En español, 'subieron' comunica bien el movimiento sin sonar forzado.
- source_word: בַּעֲלָתָה
  english_pob_choice: Baalah
  chosen_spanish: Baala
  alternatives_spanish:
  - Baalá
  - Baalat
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera de modo natural al español como Baala, manteniendo la referencia geográfica del texto.
- source_word: אֶל קִרְיַת יְעָרִים
  english_pob_choice: that is, to Kiriath-jearim
  chosen_spanish: es decir, a Quiriat-jearim
  alternatives_spanish:
  - a Quiriat-jearim
  - o sea, a Quiriat-jearim
  lexicon: HALOT
  rationale: La frase appositiva identifica el mismo lugar. 'Es decir' hace clara la equivalencia sin añadir interpretación indebida.
- source_word: אֲשֶׁר לִיהוּדָה
  english_pob_choice: which belongs to Judah
  chosen_spanish: que pertenece a Judá
  alternatives_spanish:
  - que está en Judá
  - que es de Judá
  lexicon: HALOT
  rationale: La construcción indica asociación territorial con Judá; 'pertenece a Judá' conserva esa relación de manera clara en español.
- source_word: לְהַעֲלוֹת מִשָּׁם
  english_pob_choice: to bring up from there
  chosen_spanish: para subir de allí
  alternatives_spanish:
  - para traer de allí
  - para llevar de allí
  lexicon: HALOT
  rationale: Mantiene el vínculo verbal con וַיַּעַל/עלה y su sentido de transportar el arca desde ese lugar.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios
  - el arca del verdadero Dios
  lexicon: HALOT
  rationale: La forma constructa se vierte de manera directa y natural en español, sin expandir el sustantivo más allá de lo que exige el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para el Tetragrámaton, se usa 'Yahvé' en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: יוֹשֵׁב הַכְּרוּבִים
  english_pob_choice: who is enthroned above the cherubim
  chosen_spanish: que está entronizado sobre los querubines
  alternatives_spanish:
  - que se sienta entre los querubines
  - que habita entre los querubines
  lexicon: HALOT
  rationale: '''Está entronizado'' expresa el valor regio del participio en relación con los querubines y mantiene el sentido cultual/arcaico sin forzar el español.'
- source_word: אֲשֶׁר נִקְרָא שֵׁם
  english_pob_choice: whose name is called upon it
  chosen_spanish: sobre la cual es invocado su nombre
  alternatives_spanish:
  - sobre la cual se invoca el Nombre
  - que es llamada por el Nombre
  lexicon: HALOT
  rationale: La cláusula final es elíptica y admite varias lecturas. En español, 'es invocado su nombre' conserva la pasiva y permite la referencia al arca sin resolver en exceso la ambigüedad.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El español del proyecto lo vierte como 'Yahvé' para conservar el nombre propio del pacto y no sustituirlo por una perífrasis.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpreting the final clause אֲשֶׁר נִקְרָא שֵׁם
  english_pob_reading: whose name is called upon it
  chosen_spanish_reading: sobre la cual es invocado su nombre
  alternative_spanish_readings:
  - sobre la cual se invoca el Nombre
  - que es llamada por el Nombre
  rationale: Se preserva la tensión del hebreo y el paralelo de 2 Samuel 6:2 sin decantarse por una expansión interpretativa única. La redacción española mantiene la ambigüedad de si el nombre se invoca sobre el arca o si el arca está identificada por el Nombre.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: el nombre divino se mantiene como Yahweh/Yahvé y la cláusula final se traduce de forma más cercana a la relación del nombre con el arca, sin eliminar la ambigüedad documentada. También se preserva la apposición geográfica entre Baalah y Kiriath-jearim.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se usa 'Quiriat-jearim' con guion para el topónimo hebreo transliterado, manteniendo legibilidad en español.
  - '''Arca de Dios'' conserva la forma consagrada y evita una paráfrasis innecesaria.'
  - La cláusula final se deja con ambigüedad controlada, como en el audit trail inglés, para no resolver la relación del 'nombre' con el arca más allá de lo que el hebreo exige.
