  to: or in what have I been overcome?
  rationale: 'The verb ϫⲣⲟ with ⲉ- means ''conquer, overcome, defeat'' (Crum 785a).
    It only takes the meaning ''compel'' when followed by an infinitive complement
    (e.g., ''compelled me to do X''). Without a complement, in the context of committing
    a sin, it means being overpowered or defeated (by sin or temptation). ''Compelled''
    misses this moral and spiritual force. | Azure: The proposed change is better
    grounded in the Coptic lexeme. Sahidic ϫⲣⲟ commonly means ''conquer, overcome,
    defeat'' (Crum 785a), and the reviewer is right that the causative sense ''compel''
    is typicall'
