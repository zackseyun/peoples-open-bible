translation:
  language: es
  text: Y Abraham exhaló su último aliento y murió en buena vejez, anciano y saciado[a], y fue reunido con su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «satisfecho» o simplemente «lleno»; el hebreo dice «anciano y saciado».
    reason: lexical_alternative
  - marker: b
    text: «Fue reunido con su pueblo» es una fórmula tradicional hebrea de muerte. Puede implicar reunión con los familiares en la muerte, pero la expresión no especifica el modo exacto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְוַע
  english_pob_choice: breathed his last
  chosen_spanish: exhaló su último aliento
  alternatives_spanish:
  - expiró
  - dio su último aliento
  lexicon: HALOT
  rationale: גוע en contextos de muerte expresa el final de la vida; en español, «exhaló su último aliento» conserva la imagen idiomática y distingue este verbo del siguiente «murió», igual que en el audit trail inglés.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: מות es el verbo directo para morir. «Murió» mantiene la afirmación explícita y evita suavizar el enunciado.
- source_word: בְּשֵׂיבָה טוֹבָה
  english_pob_choice: in a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - a buena vejez
  - en una buena ancianidad
  lexicon: HALOT
  rationale: La construcción preposicional describe la circunstancia de la muerte. «En buena vejez» reproduce de forma natural el valor de ב con שֵׂיבָה טוֹבָה y mantiene la cualidad positiva del enunciado.
- source_word: זָקֵן
  english_pob_choice: old
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - de edad avanzada
  lexicon: HALOT
  rationale: El hebreo añade un segundo rasgo descriptivo además de «vejez». «Anciano» conserva esa aposición separada sin fundirla en la frase anterior.
- source_word: וְשָׂבֵעַ
  english_pob_choice: full
  chosen_spanish: saciado
  alternatives_spanish:
  - lleno
  - satisfecho
  lexicon: HALOT
  rationale: El adjetivo significa «satisfecho/saciado, lleno» y en este contexto funerario expresa una vida colmada. «Saciado» preserva mejor la fuerza idiomática que un simple «lleno» en español.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  english_pob_choice: and he was gathered to his people
  chosen_spanish: y fue reunido con su pueblo
  alternatives_spanish:
  - y fue recogido entre su pueblo
  - y se reunió con sus antepasados
  lexicon: HALOT
  rationale: El nifal de אסף con אֶל־עַמָּיו es una fórmula de muerte tradicional. «Fue reunido con su pueblo» conserva la imagen y la ambigüedad del hebreo sin resolverla hacia sepultura o vida post mortem.
- source_word: עַמָּיו
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - sus parientes
  - sus antepasados
  lexicon: HALOT
  rationale: «Pueblo» reproduce el sustantivo עם con sufijo posesivo y mantiene el sentido colectivo/familiar sin restringirlo indebidamente.
theological_decisions:
- issue: Sentido de «fue reunido con su pueblo»
  english_pob_reading: Retain the idiomatic death formula without specifying whether it refers primarily to burial, reunion with ancestors, or conscious postmortem existence.
  chosen_spanish_reading: Mantener la fórmula idiomática sin decidir si alude sobre todo al sepulcro, a la reunión con los antepasados o a la existencia consciente después de la muerte.
  alternative_spanish_readings:
  - Referencia al entierro en la tumba familiar
  - Referencia a la reunión con los muertos/antepasados más allá de la muerte
  rationale: El hebreo permite varias lecturas y el texto no obliga a una explicación única. La traducción española preserva esa tensión en lugar de cerrarla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente del audit trail corrigió la antigua expansión «full of days» a «full» para ajustarse mejor a וְשָׂבֵעַ. En español se optó por «saciado», que conserva la brevedad del hebreo y su valor idiomático sin añadir «días».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aplica.
  - «Pueblo» se conserva para עַמָּיו, siguiendo el valor colectivo del hebreo.
  - 'La secuencia de dos verbos de muerte se preserva en español: primero la imagen idiomática, luego el verbo directo «murió».'
  - Se evitó el calco «lleno de días» porque el hebreo final dice simplemente שָׂבֵעַ, y la auditoría inglesa ya corrigió esa expansión.
