translation:
  language: es
  text: 'Y de la tribu de Gad: Ramot en Galaad[a] con sus pastizales, y Mahanaim con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Ramot-Galaad', la forma tradicional en español del nombre del lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ֨/מַּטֵּה
  english_pob_choice: And from the tribe of
  chosen_spanish: Y de la tribu de
  alternatives_spanish:
  - Y de la vara de
  - Y de la rama de
  lexicon: HALOT
  rationale: En este contexto distributivo de territorios y ciudades levíticas, מַטֵּה significa 'tribu', no 'vara' ni 'rama'. El español natural para la relación de pertenencia/origen es 'de la tribu de'.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gad
  lexicon: nombre propio
  rationale: Nombre propio tribal; se conserva sin traducción.
- source_word: רָאמוֹת בַּגִּלְעָד
  english_pob_choice: Ramoth in Gilead
  chosen_spanish: Ramot en Galaad
  alternatives_spanish:
  - Ramot de Galaad
  - Ramot-galaad
  lexicon: HALOT
  rationale: Se mantiene el topónimo y la preposición בְּ con 'en', como en el inglés auditado, porque refleja con claridad la construcción hebrea sin forzar un calco. Se usa 'Galaad' por la forma española estable del nombre geográfico.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras abiertas
  - sus campos comunales
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a la ciudad; en este listado de ciudades con dependencias territoriales, 'pastizales' comunica bien la idea de terreno abierto/pastable sin perder la función espacial. 'Pastizales' es más natural en español que un calco como 'tierras de pasto'.
- source_word: מַחֲנַיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanáim
  alternatives_spanish:
  - Mahanaim
  lexicon: nombre propio
  rationale: Se translitera con acentuación española para facilitar lectura, manteniendo el nombre propio hebreo.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conectivo
  rationale: La serie nominal en español fluye mejor con 'y'; 'e' no es necesario aquí porque la palabra siguiente no empieza con sonido /i/.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés, sin cambios de sentido respecto del pasaje: una lista de ciudades y sus pastizales dentro del territorio de Gad.'
  spanish_consistency_notes:
  - Se conserva 'Galaad' como forma geográfica habitual en español bíblico.
  - '''Pastizales'' se usa consistentemente para מִגְרָשׁ en este contexto de ciudades levíticas.'
  - Se evita 'SEÑOR' u այլ terminología no pertinente porque no aparece el nombre divino en este versículo.
