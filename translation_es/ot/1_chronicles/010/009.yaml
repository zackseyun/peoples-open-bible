    issue: La nota al pie [a] está colocada sobre «Lo despojaron» pero explica «sus ídolos».
    rationale: La nota dice «O “sus imágenes”», que solo puede referirse a עֲצַבֵּיהֶם. Anclarla al verbo inicial induce a error léxico y rompe la trazabilidad entre texto y evidencia fuente.
  revised_spanish_text: Lo despojaron, tomaron su cabeza y sus armas, y enviaron aviso por toda la tierra de los filisteos, para proclamar la noticia a sus ídolos[a] y al pueblo.
