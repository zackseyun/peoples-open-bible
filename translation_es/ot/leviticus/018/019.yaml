translation:
  language: es
  text: No te acercarás a una mujer durante su impureza menstrual, para descubrir su desnudez[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante la impureza de su menstruación». El hebreo usa lenguaje ritual de pureza e impureza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל + תִקְרַב
  english_pob_choice: You shall not approach
  chosen_spanish: No te acercarás
  alternatives_spanish:
  - No te aproximarás
  - No te llegarás a
  lexicon: HALOT
  rationale: El hebreo combina la preposición אל con קרב en una prohibición legal; en español, «acercarse» transmite de forma natural la idea de aproximación prohibida sin perder el tono jurídico.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a una esposa
  - a una mujer casada
  lexicon: HALOT
  rationale: En este contexto de prohibiciones sexuales, el término es genérico e indefinido; «mujer» refleja mejor el alcance amplio que «esposa», que introduciría una relación no indicada por el texto.
- source_word: בְּ/נִדַּת טֻמְאָתָהּ
  english_pob_choice: during her menstrual uncleanness
  chosen_spanish: durante su impureza menstrual
  alternatives_spanish:
  - durante su impureza ritual menstrual
  - durante la impureza de su menstruación
  lexicon: HALOT
  rationale: נִדָּה y טֻמְאָה pertenecen al lenguaje ritual de pureza/impureza. «Impureza menstrual» conserva esa categoría cultual en español de manera clara y fiel; «uncleanness» en inglés se vuelve aquí «impureza», no una descripción médica.
- source_word: לְ/גַלּוֹת
  english_pob_choice: to uncover
  chosen_spanish: para descubrir
  alternatives_spanish:
  - para desnudar
  - para descubrir la desnudez de
  lexicon: HALOT
  rationale: El valor idiomático de גלה en Levítico 18 es el eufemismo sexual «uncover». En español, «descubrir su desnudez» mantiene el paralelo formal con el hebreo y conserva el eufemismo sin volverlo demasiado explícito.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su intimidad
  - sus partes íntimas
  lexicon: HALOT
  rationale: «Desnudez» es el equivalente tradicional y semánticamente preciso de עֶרְוָה en este contexto legal; mantiene el eufemismo sexual presente en la serie de Levítico 18.
theological_decisions:
- issue: 'Naturaleza de la impureza menstrual: ritual/cultual vs. médica o moral'
  english_pob_reading: ritual uncleanness
  chosen_spanish_reading: impureza ritual menstrual
  alternative_spanish_readings:
  - impureza menstrual
  - menstruación
  rationale: El hebreo טֻמְאָה en Levítico pertenece al ámbito cultual de pureza/impureza. La redacción española debe preservar esa categoría ritual sin reducirla a higiene, medicina o condena moral no explicitada por el texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source text''s plain sense'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el aparato inglés sin cambios de sentido; se conserva la construcción legal prohibitiva, el eufemismo sexual y la categoría ritual de impureza.
  spanish_consistency_notes:
  - Se usa «impureza» para טֻמְאָה en sentido ritual, coherente con el uso de Levítico.
  - «Desnudez» mantiene el eufemismo legal de Levítico 18.
  - La fórmula prohibitiva en español conserva el tono jurídico del hebreo con futuro de mandato negativo.
  - Se evita «esposa» porque אִשָּׁה aquí es genérico en una lista de prohibiciones sexuales.
