revisions:
- from: Y ellas hicieron como ella dijo[a], y cerraron las puertas del jardín y salieron por las puertas laterales para llevar lo que les había sido ordenado, y no vieron a los ancianos, porque estaban escondidos.
  to: Y ellas hicieron como ella dijo[a], y cerraron las puertas del jardín y salieron por las puertas laterales para traer lo que se les había ordenado, y no vieron a los ancianos, porque estaban escondidos.
  rationale: Se ajusta solo el infinitivo de finalidad para reflejar mejor el sentido contextual de ἐνέγκαι y mejorar la naturalidad en español. También se simplifica ligeramente «les había sido ordenado» a «se les había ordenado», sin cambio de sentido. El resto del borrador es fiel y legible.
