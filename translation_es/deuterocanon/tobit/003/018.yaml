translation:
  language: es
  text: Busca consejo de toda persona sabia, y no menosprecies ningún consejo útil[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no menosprecies ningún consejo beneficioso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβουλίαν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - asesoramiento
  - consejo prudente
  - orientación
  lexicon: BDAG
  rationale: συμβουλίαν se refiere a consejo dado para decidir bien. «Consejo» conserva bien el valor deliberativo y funciona naturalmente con el imperativo «busca» en español.
- source_word: παρὰ παντὸς φρονίμου
  english_pob_choice: from every wise person
  chosen_spanish: de toda persona sabia
  alternatives_spanish:
  - de toda persona prudente
  - de todo sabio
  - de todo hombre sabio
  lexicon: BDAG
  rationale: παρά con genitivo expresa fuente, por eso se vierte «de». φρόνιμος tiene el sentido de sabio/prudente/sensato; «persona sabia» mantiene el sentido genérico sin restringirlo a varones.
- source_word: ζήτησον
  english_pob_choice: Seek
  chosen_spanish: Busca
  alternatives_spanish:
  - Busca con diligencia
  - Pide
  - Procura
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción activa. «Busca» transmite bien esa fuerza y suena idiomático en español.
- source_word: μὴ καταφρονήσῃς
  english_pob_choice: do not despise
  chosen_spanish: no menosprecies
  alternatives_spanish:
  - no desprecies
  - no desestimes
  - no desoigas
  lexicon: BDAG
  rationale: καταφρονέω implica tratar con desprecio o desdén. En español, «menospreciar» comunica ese matiz fuerte; «despreciar» también sería posible, pero «menospreciar» encaja con el tono exhortativo.
- source_word: ἐπὶ πάσης συμβουλίας χρησίμης
  english_pob_choice: any useful counsel
  chosen_spanish: ningún consejo útil
  alternatives_spanish:
  - ningún consejo beneficioso
  - todo consejo útil
  - cualquier consejo útil
  lexicon: BDAG
  rationale: La frase expresa de manera distributiva que no debe desestimarse consejo alguno que sea útil/beneficioso. «Ningún consejo útil» condensa bien esa idea en español y evita una repetición forzada.
theological_decisions:
- issue: Referencia genérica en φρονίμου
  english_pob_reading: wise person
  chosen_spanish_reading: persona sabia
  alternative_spanish_readings:
  - hombre sabio
  - sabio
  rationale: El adjetivo sustantivado es genérico, no masculino específico. Se mantiene esa amplitud en español para no introducir una restricción no presente en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés revisado sustituyó «advice» por «counsel» en la segunda cláusula para mantener mayor coherencia léxica con συμβουλίαν/συμβουλίας; la versión española conserva esa coherencia con «consejo» en ambas cláusulas. La nota refleja la alternativa semántica de «beneficioso».
  spanish_consistency_notes:
  - Se mantiene un solo lema principal, «consejo», para συμβουλία/συμβουλίαν en ambas cláusulas.
  - «Persona sabia» preserva el valor genérico de φρόνιμος sin masculinizar el sustantivo.
  - «Menosprecies» traduce el matiz fuerte de καταφρονήσῃς sin suavizarlo a «ignorar».
  - El adjetivo χρησίμης se vierte como «útil», con nota alternativa «beneficioso» para reflejar el rango semántico.
