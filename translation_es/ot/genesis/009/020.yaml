translation:
  language: es
  text: Noé[a], hombre del suelo, comenzó[a] a plantar una viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Noé, hombre del suelo, fue el primero en plantar una viña». El hebreo es comprimido, y algunos entienden «comenzó» en el sentido de «fue el primero».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - fue el primero en
  lexicon: HALOT, BDB
  rationale: 'El valor narrativo más natural aquí es iniciativo: Noé da comienzo a la acción que sigue. En español, «comenzó a plantar» reproduce bien la secuencia comprimida del hebreo sin añadir una conclusión interpretativa como «fue el primero en».'
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noa
  lexicon: nombre propio tradicional
  rationale: Se usa la forma española establecida del nombre propio, que es inteligible y fiel al referente bíblico.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: HALOT, BDB
  rationale: El hebreo coloca el sustantivo en aposición descriptiva. «Hombre» preserva la forma y el paralelismo del original mejor que convertirlo en un título funcional como «labrador».
- source_word: הָאֲדָמָה
  english_pob_choice: of the soil
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - del campo
  lexicon: HALOT, BDB
  rationale: אֲדָמָה remite al terreno cultivable, la tierra/terruño. «De la tierra» es natural en español y conserva la asociación agrícola sin sobreespecificar.
- source_word: וַיִּטַּע
  english_pob_choice: planted
  chosen_spanish: plantar
  alternatives_spanish:
  - sembrar
  - cultivar
  lexicon: HALOT, BDB
  rationale: נטע significa plantar, especialmente en contextos agrícolas. «Plantar» es la correspondencia directa y mantiene el aspecto verbal del original.
- source_word: כָּרֶם
  english_pob_choice: a vineyard
  chosen_spanish: una viña
  alternatives_spanish:
  - un viñedo
  - una vid
  lexicon: HALOT, BDB
  rationale: El término designa una plantación de vides; en español bíblico y común, «viña» es la opción más directa y clara. «Viñedo» también sería posible, pero «viña» conserva mejor la concisión del hebreo.
theological_decisions:
- issue: Cómo reflejar la construcción hebrea compacta וַיָּחֶל ... וַיִּטַּע
  english_pob_reading: Noah, a man of the soil, began to plant a vineyard.
  chosen_spanish_reading: Noé, hombre de la tierra, comenzó a plantar una viña.
  alternative_spanish_readings:
  - Noé, hombre de la tierra, fue el primero en plantar una viña.
  - Noé, hombre de la tierra, comenzó y plantó una viña.
  rationale: 'El hebreo es sintéticamente comprimido: el primer verbo introduce el inicio de la acción y el segundo expresa la acción misma. En español, «comenzó a plantar» transmite con naturalidad esa relación sin forzar una afirmación no explícita como «fue el primero» ni una coordinación menos idiomática.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto editorial en inglés pasó de una formulación más dura («began and planted a vineyard») a la redacción revisada y más idiomática («began to plant a vineyard»). La versión española sigue esa misma relación aspectual con «comenzó a plantar», sin introducir material explicativo no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Noé» como forma española estable del nombre propio.
  - «Tierra» reproduce de manera natural אֲדָמָה en un contexto agrícola.
  - Se conserva la concisión del hebreo con una estructura verbal simple y no se expande a una paráfrasis interpretativa.
  - «Viña» mantiene el registro bíblico y el sentido de cultivo de vid.
