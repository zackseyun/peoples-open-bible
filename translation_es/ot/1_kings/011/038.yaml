translation:
  language: es
  text: Y sucederá que, si escuchas todo lo que yo te mande, y andas en mis caminos, y haces lo recto ante mis ojos, guardando mis estatutos y mis mandamientos, como hizo David, mi siervo, yo estaré contigo y te edificaré una casa fiel[a], como edifiqué para David, y te daré a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una casa segura» o «una casa duradera»; es decir, una dinastía permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: listen
  chosen_spanish: escuchas
  alternatives_spanish:
  - oyes
  - escuchas y obedeces
  lexicon: HALOT
  rationale: שמַע puede significar oír, escuchar u obedecer según el contexto. Aquí conviene conservar el verbo de percepción/audición y dejar que las cláusulas siguientes desarrollen el sentido obediente del pacto.
- source_word: אֲצַוֶּךָ
  english_pob_choice: I command you
  chosen_spanish: yo te mande
  alternatives_spanish:
  - yo te ordene
  - yo te mande
  lexicon: HALOT
  rationale: El valor verbal en la condición expresa una instrucción divina futura o directa. En español, 'te mande' mantiene la relación de mandato sin volverlo más técnico que el hebreo.
- source_word: וְהָלַכְתָּ בִדְרָכַי
  english_pob_choice: walk in my ways
  chosen_spanish: andas en mis caminos
  alternatives_spanish:
  - caminas en mis caminos
  - vives conforme a mis caminos
  lexicon: HALOT
  rationale: Se conserva la metáfora covenantal de 'caminar' para no perder la resonancia bíblica de la expresión.
- source_word: הַיָּשָׁר בְּעֵינַי
  english_pob_choice: what is right in my eyes
  chosen_spanish: lo recto ante mis ojos
  alternatives_spanish:
  - lo justo ante mis ojos
  - lo que es recto a mis ojos
  lexicon: HALOT
  rationale: '''Lo recto ante mis ojos'' reproduce bien el giro evaluativo del hebreo y su fuerza moral.'
- source_word: לִשְׁמֹר
  english_pob_choice: by keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - al guardar
  - para guardar
  lexicon: HALOT
  rationale: El infinitivo se vierte como gerundio para expresar el modo en que se hace lo recto.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es un equivalente bíblico claro y estable para חֻקִּים en contexto legal-pactual.'
- source_word: וּמִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis preceptos
  - mis órdenes
  lexicon: HALOT
  rationale: '''Mandamientos'' mantiene la distinción convencional respecto de ''estatutos'' y su registro pactal.'
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: El inglés POB eligió 'servant' por el contexto honorífico, pero la carga léxica primaria de עבד permite 'esclavo'. Como no hay razón textual para suavizarlo, se conserva la fuerza del término. La estructura posesiva e histórica en español tolera este valor sin perder dignidad contextual.
- source_word: בַיִת נֶאֱמָן
  english_pob_choice: a faithful house
  chosen_spanish: una casa fiel
  alternatives_spanish:
  - una casa fiel y duradera
  - una casa segura
  - una casa firme
  lexicon: HALOT
  rationale: Se mantiene 'casa' para conservar la metáfora dinástica y 'fiel' para reflejar נֶאֱמָן, siguiendo la revisión inglesa que prefirió 'faithful' sobre 'lasting'.
- source_word: בַיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - dinastía
  - linaje
  lexicon: HALOT
  rationale: Se conserva 'casa' en el texto principal para no perder el lenguaje bíblico de linaje real, aunque el sentido sea dinástico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo usa objeto directo con אֶת; en español conviene mantener la preposición 'a' ante el nombre propio como objeto personal de dar.
theological_decisions:
- issue: Sentido de 'casa' en la promesa
  english_pob_reading: dynastic/royal house is intended, while retaining 'house' in the translation
  chosen_spanish_reading: '''casa'' se mantiene como imagen dinástica/real, no como edificio físico'
  alternative_spanish_readings:
  - casa física/palacio
  - dinastía
  - linaje
  rationale: El contexto de comparación con lo que Dios edificó para David y la promesa de permanencia apuntan a una dinastía. Se conserva la metáfora y se aclara en nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de la condición
  english_pob_reading: a genuine conditional covenantal promise dependent on Jeroboam's obedience
  chosen_spanish_reading: promesa condicional real, dependiente de la obediencia
  alternative_spanish_readings:
  - promesa incondicional
  - promesa meramente retórica
  rationale: אִם y la cadena de cláusulas obedienciales deben mantenerse como condición efectiva; no se atenúa la lógica pactual del versículo.
  doctrine_reference: Translation philosophy §3
- issue: Valor de עבד
  english_pob_reading: honorific designation for David in covenant service to God
  chosen_spanish_reading: '''mi esclavo'' conserva la fuerza léxica de עבד sin borrar la relación de servicio'
  alternative_spanish_readings:
  - mi siervo
  - mi servidor
  rationale: Aunque en español eclesial 'siervo' es común, aquí la decisión busca no diluir la tensión léxica donde el texto emplea el término fuerte; el contexto de David impide entenderlo como degradante.
  doctrine_reference: Lexical policy on δοῦλος / עבד
translation_notes:
  revision_awareness: La traducción refleja la revisión inglesa más reciente, que sustituyó 'lasting house' por 'faithful house' para acercarse mejor a נֶאֱמָן sin perder el sentido dinástico. También conserva la estructura condicional y el paralelismo con David, tal como quedó en el pase de revisión con alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino; en este versículo la voz es directa de primera persona, por lo que no se introduce.
  - Se usa 'casa' en vez de 'dinastía' en el texto principal para preservar la metáfora bíblica, con aclaración en nota.
  - Se opta por 'escuchas' para שׁמע, evitando sobretraducirlo como 'obedeces'.
  - Se conserva 'mis estatutos' y 'mis mandamientos' como pareja legal-pactual estándar.
  - Se usa 'mi esclavo' para עבד siguiendo la fuerza léxica del término, aun cuando el contexto sea honorífico.
