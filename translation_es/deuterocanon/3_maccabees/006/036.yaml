revisions:
- from: Y habiendo establecido un estatuto común acerca de estas cosas para toda su comunidad[a], decretaron que los días antes mencionados se celebraran como días de gozo, no por causa de beber y de glotonería, sino a causa de la liberación que les había venido por Dios.
  to: Y habiendo establecido un estatuto común acerca de estas cosas para toda su comunidad, por sus generaciones[a], decretaron que los días antes mencionados se celebraran como días de gozo, no por causa de la bebida y de la glotonería, sino a causa de la liberación que les había llegado de parte de Dios.
  rationale: Se revisa para restaurar εἰς γενεάς en el texto principal («por sus generaciones»), mejorar la naturalidad de «πότου» con «la bebida», y reemplazar la formulación poco idiomática «les había venido por Dios» por «les había llegado de parte de Dios». También se reubica el marcador de nota en la frase donde aparece la referencia a generaciones, ya que la nota existente no corresponde a «comunidad» sino a la referencia textual conservada del versículo; se mantiene una única nota textual conforme al expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:52:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: una norma común para toda la comunidad, observancia continua de los días ya mencionados, y contraste entre celebración sobria y liberación divina. Sin embargo, omite explícitamente εἰς γενεάς en el texto español principal, aunque sí aparece en las decisiones léxicas; además, «les había venido por Dios» suena poco natural para τῆς διὰ θεῶν γενομένης αὐτοῖς.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero necesita dos ajustes de legibilidad y fidelidad: incluir «por generaciones»/«por sus generaciones» en el texto, y reemplazar «por causa de beber» y «les había venido por Dios» por formulaciones más idiomáticas. «Días de gozo» funciona bien, y la nota textual está correctamente anclada.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de traducir διὰ θεῶν como «por Dios» en el texto principal y conservar «a través de los dioses» en nota sigue la rationale inglesa y preserva la tensión textual. No aparecen términos sensibles del glosario principal que requieran corrección adicional.
  issues:
  - severity: high
    issue: Falta en el texto principal el equivalente de εἰς γενεάς.
    rationale: El griego y la POB inglesa incluyen la continuidad intergeneracional («throughout their generations»). El borrador español la documenta en las decisiones léxicas, pero la omite en la línea principal, lo que recorta significado fuente.
  - severity: medium
    issue: «Que les había venido por Dios» es poco idiomático en español.
    rationale: Aunque intenta seguir «had come to them through God», en español suena forzado. Una forma como «que les había llegado de parte de Dios» o «que Dios les había concedido» comunica mejor el sentido sin perder agencia divina.
  - severity: low
    issue: «No por causa de beber» suena algo tosco.
    rationale: No es erróneo, pero «no por causa de la bebida» o «no por motivo de bebida» lee mejor en español y conserva el contraste con «glotonería».
  revised_spanish_text: Y habiendo establecido un estatuto común acerca de estas cosas para toda su comunidad, por sus generaciones[a], decretaron que los días antes mencionados se celebraran como días de gozo, no por causa de la bebida y de la glotonería, sino a causa de la liberación que les había llegado de parte de Dios.
  revised_footnotes:
  - marker: a
    text: 'Griego: «a través de los dioses» (διὰ θεῶν). En este contexto, el sentido probablemente sea la liberación divina atribuida al único Dios; la forma plural puede reflejar la redacción transmitida o un modismo textual.'
    reason: textual_variant
