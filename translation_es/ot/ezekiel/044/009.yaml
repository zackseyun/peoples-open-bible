review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayor parte del hebreo: fórmula profética, título divino con «Yahvé», modismo «extranjero», y la doble caracterización «incircunciso de corazón y de carne». Sin embargo, omite explícitamente la negación de לֹא en el texto corrido, porque «entrará» sin «no» invierte el sentido. Además, la nota [b] está anclada en «mi santuario», pero explica la frase final «entre los hijos de Israel», lo que desajusta la evidencia y crea confusión. La cláusula final puede mantenerse como repetición enfática en español, pero conviene una puntuación que la separe mejor.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico y terminología natural. «Así dice el Señor Yahvé» funciona bien en el marco del proyecto. «Incircunciso de corazón e incircunciso de carne» es legible y fiel. Los problemas principales son de exactitud semántica y de anclaje de nota, no de estilo general. También mejora la fluidez si la cláusula repetida se separa con raya o dos puntos, en vez de simple coma.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé»; בֶּן נֵכָר → «extranjero»; בָּשָׂר → «carne». No hay conflicto doctrinal importante. La única corrección necesaria es restaurar la negación verbal y reubicar la nota sobre «hijos de Israel» al sintagma correspondiente.'
  issues:
  - severity: high
    issue: Falta la negación en «entrará»
    rationale: El hebreo tiene לֹא יָבֹוא, ‘no entrará / no entrará en absoluto’. El borrador dice «entrará», lo cual invierte el sentido legal del versículo.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota explica «entre los hijos de Israel», pero el marcador aparece tras «mi santuario». Según las instrucciones, el marcador exacto debe aparecer en la palabra o frase relevante.
  - severity: low
    issue: La puntuación de la cláusula repetida puede reflejar mejor el valor retomativo/enfático
    rationale: El segundo «ningún extranjero» retoma y refuerza la prohibición. Con una raya o dos puntos, el español comunica mejor esa repetición sin parecer aposición torpe.
