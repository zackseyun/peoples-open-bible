  glossary_alignment: '''Yahvé'' alinea correctamente con la política del proyecto para יהוה. ''He clamado a ti'' refleja bien קְרָאתִיךָ en contexto de lamento. ''Desde las profundidades'' es una buena opción para מִמַּעֲמַקִּים. No hay conflicto grave de glosario; el problema principal es la fidelidad al aparato de notas del POB.'
