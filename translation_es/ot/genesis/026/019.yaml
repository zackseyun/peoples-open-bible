review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y los referentes del hebreo: ויחפרו = «cavaron», עבדֵי יצחק = personal de Isaac en servicio, בנחל = un cauce estacional, וימצאו שם = hallazgo localizado, באר = «pozo», y מים חיים = la expresión literal «agua viva». Sin embargo, «siervos» no sigue la decisión léxica auditada del inglés («servants») tan naturalmente en español actual como «servidores», y el préstamo «wadi» en texto principal reduce la legibilidad eclesial en español cuando puede conservarse el sentido con «cauce» y dejar «wadi» en nota.'
  spanish_quality_summary: El texto es claro y digno, pero «en el wadi» suena demasiado técnico/préstamo crudo para una Biblia española de lectura amplia, aun con nota. «Los siervos de Isaac» es comprensible, pero ligeramente arcaizante y con connotación de servidumbre más marcada que la buscada en la rationale inglesa. «Entonces» y «hallaron» funcionan bien. «Pozo de agua viva» es fiel y natural con nota explicativa.
  glossary_alignment: No hay términos teológicos mayores en juego. La revisión propuesta mantiene «agua viva» para preservar la resonancia bíblica de מַיִם חַיִּים y ajusta עַבְדֵי a «servidores» por consistencia con la rationale contextual que evitó «slave/esclavo». También reemplaza «wadi» en el texto por «cauce[a]», manteniendo la precisión geográfica en la nota.
  issues:
  - severity: medium
    issue: «wadi» en el texto principal suena prestado y poco natural en español bíblico de lectura general.
    rationale: Aunque el inglés auditado usa «wadi», la tarea exige priorizar legibilidad natural en español. «Cauce» comunica bien נחל y la nota puede preservar «wadi» como alternativa precisa.
  - severity: medium
    issue: «siervos» carga más tradicionalmente la idea de servidumbre que la rationale inglesa quiso evitar en este contexto narrativo.
    rationale: La decisión inglesa prefirió «servants» porque el estatus de esclavitud no es saliente. En español actual, «servidores» expresa mejor servicio/dependencia sin intensificar innecesariamente el matiz de esclavitud.
  - severity: low
    issue: La nota b puede explicitar mejor el contraste con agua corriente/de manantial.
    rationale: «Agua fresca» es posible, pero «corriente o de manantial» explica más precisamente el idiomático hebreo frente a agua estancada.
  revised_spanish_text: Entonces los servidores de Isaac cavaron en el cauce[a] y allí hallaron un pozo de agua viva[b].
  revised_footnotes:
