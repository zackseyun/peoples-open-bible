revisions:
- from: Y restauraré la suerte de Egipto[a] y los haré volver a la tierra de Patros[b], a la tierra de su origen; y allí serán un reino humilde.
  to: Y restauraré la suerte de Egipto[a] y los haré volver a la tierra de Patros[b], a la tierra de su origen; y allí serán un reino de poca importancia.
  rationale: Se conserva la estructura y las decisiones principales del borrador, pero se reemplaza «un reino humilde» por «un reino de poca importancia» para reflejar mejor la idea de un reino rebajado, inferior o de escasa relevancia, no una cualidad moral positiva. Las notas se mantienen con leve pulido para preservar la justificación léxica del POB inglés sin introducir nuevas ambigüedades.
