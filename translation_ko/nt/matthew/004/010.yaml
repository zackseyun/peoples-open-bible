  lexicon: BDAG
  rationale: 신명기 6:13 인용. 70인역 κύριος는 יהוה. 본 번역 정책에 따라 「야훼」로 회복한다.
theological_decisions:
- issue: 신명기 6:13 인용의 야훼 회복
  chosen_reading: 너의 하나님 야훼
  alternative_readings:
  - 너의 주 하나님
  rationale: 신명기 6:13의 יהוה를 70인역 κύριος가 차폐한 형태이므로 「야훼」로 회복한다.
  doctrine_reference: Glossary policy
- issue: 예수의 사탄을 향한 직접 명령 — 어법
  chosen_reading: 물러가라, 사탄아
  alternative_readings:
  - 물러가십시오
  - 물러가라
  rationale: 신적 청중을 향한 발화가 아니라 사탄을 향한 권위적 명령이므로, 가장 짧고 단호한 명령형 「물러가라」로 옮긴다. 합쇼체 일관 원칙의 예외(적대자 대상 명령).
