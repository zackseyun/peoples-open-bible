translation:
  language: es
  text: Que aumentes mi grandeza y me consueles de nuevo[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea puede leerse como petición ('que aumentes...') o como futuro ('aumentarás...'); ambas lecturas son posibles en la poesía hebrea.
    reason: alternative_reading
  - marker: b
    text: '''Mi grandeza'' puede entenderse también como honor o dignidad, no solo como tamaño o extensión.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'y volver/volver hacia'; aquí se entiende de manera idiomática como un consuelo renovado.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּרֶב
  english_pob_choice: May you increase
  chosen_spanish: Que aumentes
  alternatives_spanish:
  - Que hagas crecer
  - Que multipliques
  lexicon: HALOT
  rationale: El hebreo es un imperfecto causativo con valor petitorio en poesía; en español, una construcción con subjuntivo tras 'que' conserva el tono de ruego sin forzar un futuro seguro. 'Aumentes' reproduce bien la idea de hacer mayor/incrementar.
- source_word: גְּדֻלָּתִי
  english_pob_choice: my greatness
  chosen_spanish: mi grandeza
  alternatives_spanish:
  - mi honor
  - mi dignidad
  - mi grandeza/majestad
  lexicon: HALOT
  rationale: '''Grandeza'' es el equivalente más directo en español y mantiene el vínculo léxico con ''hacer grande''. ''Honor'' o ''dignidad'' son posibles, pero estrechan el campo semántico.'
- source_word: וְתִסֹּב
  english_pob_choice: and comfort me again
  chosen_spanish: y me consueles de nuevo
  alternatives_spanish:
  - y vuelvas para consolarme
  - y vuelvas a consolarme
  - y te vuelvas para consolarme
  lexicon: HALOT
  rationale: El verbo básico es 'girar/volver/dirigirse'; la revisión inglesa entiende el giro idiomáticamente como una acción renovada de consuelo. En español, 'me consueles de nuevo' refleja la lectura final de la POB y evita una expresión menos natural, mientras conserva la noción de renovación implícita en el giro.
- source_word: תְּנַחֲמֵנִי
  english_pob_choice: comfort me again
  chosen_spanish: me consueles de nuevo
  alternatives_spanish:
  - me confortes de nuevo
  - me consoles otra vez
  lexicon: HALOT
  rationale: El piel de נחם significa 'consolar/comfort'. 'Consolar' es natural y fiel en español. 'De nuevo' comunica la reanudación del consuelo que la revisión inglesa quiso captar con 'again'.
theological_decisions:
- issue: 'Modo verbal: ruego vs. afirmación futura'
  english_pob_reading: '''May you increase ... and comfort me again'' as a prayer/wish, with future reading possible in Hebrew poetry.'
  chosen_spanish_reading: '''Oración de ruego'' con subjuntivo: ''Que aumentes ... y me consueles de nuevo''.'
  alternative_spanish_readings:
  - '''Aumentarás ... y me consolarás de nuevo'''
  - '''Aumentes ... y me consueles de nuevo'''
  rationale: El contexto inmediato es de súplica dirigida a Dios, y el hebreo admite una lectura volitiva o futura. El subjuntivo en español conserva esa tensión sin resolverla artificialmente hacia certeza profética ni diluir el tono orante.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que sustituyó 'turn to comfort me' por 'comfort me again' para reflejar mejor el giro idiomático y el sentido de consuelo renovado. La versión española adopta ese ajuste con 'me consueles de nuevo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera explícitamente; aquí el verso no lo contiene.
  - Se evita 'Cristo' y 'Señor' porque el hebreo no presenta esos términos en este verso.
  - '''Grandeza'' conserva la ambigüedad entre tamaño, honor y dignidad sin imponer una glosa interpretativa única.'
