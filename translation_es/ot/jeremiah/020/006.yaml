translation:
  language: es
  text: 'Y tú, Pashhur, y todos los que habitan en tu casa irán al cautiverio; y tú vendrás a Babilonia, y allí morirás, y allí serás sepultado: tú y todos tus amigos, a quienes profetizaste falsamente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quienes profetizaste mentiras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה / And you
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y usted
  lexicon: WLC / contexto sintáctico
  rationale: Se conserva el énfasis directo sobre Pashhur con un vocativo natural en español. 'Tú' mantiene la segunda persona singular del hebreo y el tono de reproche profético.
- source_word: יֹשְׁבֵי בֵיתֶךָ
  english_pob_choice: all who dwell in your house
  chosen_spanish: todos los que habitan en tu casa
  alternatives_spanish:
  - todos los que viven en tu casa
  - todos los moradores de tu casa
  lexicon: HALOT
  rationale: '''Habitam'' reproduce bien la idea de residencia continua y suena más formal que ''viven''. ''Moradores'' es más literal, pero menos natural en español contemporáneo.'
- source_word: תֵּלְכ֖וּ בַּשֶּׁבִי
  english_pob_choice: will go into captivity
  chosen_spanish: irán al cautiverio
  alternatives_spanish:
  - irán en cautiverio
  - irán cautivos
  - irán al exilio
  lexicon: HALOT
  rationale: '''Cautiverio'' refleja el matiz de שׁבי como ser llevado preso, no solo desplazado. Se evita ''exilio'' porque suaviza la fuerza de captura presente en el hebreo.'
- source_word: וּבָבֶל תָּב֗וֹא
  english_pob_choice: you will come to Babylon
  chosen_spanish: vendrás a Babilonia
  alternatives_spanish:
  - llegarás a Babilonia
  - irás a Babilonia
  lexicon: HALOT
  rationale: '''Vendrás'' sigue de cerca el verbo de movimiento del hebreo. ''Llegarás'' sería más idiomático, pero menos transparente respecto del original.'
- source_word: וְשָׁם תָּמוּת וְשָׁם תִּקָּבֵר
  english_pob_choice: and there you will die, and there you will be buried
  chosen_spanish: y allí morirás, y allí serás sepultado
  alternatives_spanish:
  - y allí morirás, y allí te enterrarán
  - y allí morirás, y allí te sepultarán
  lexicon: HALOT
  rationale: '''Serás sepultado'' conserva la pasiva del hebreo y el paralelismo repetido ''allí''. ''Enterrar'' puede sonar demasiado coloquial; ''sepultar'' mantiene mayor dignidad.'
- source_word: אַתָּה וְכָל אֹהֲבֶיךָ
  english_pob_choice: you and all your friends
  chosen_spanish: tú y todos tus amigos
  alternatives_spanish:
  - tú y todos los que te aman
  - tú y todos tus amados
  lexicon: HALOT
  rationale: '''Amigos'' sigue la revisión inglesa y mantiene el alcance relacional sin introducir una calidez interpretativa excesiva. ''Los que te aman'' explicita el participio, pero suena más interpretativo; ''amados'' sería ambiguo en español.'
- source_word: אֲשֶׁר נִבֵּאתָ לָהֶם בַּשָּׁקֶר
  english_pob_choice: to whom you prophesied falsely
  chosen_spanish: a quienes profetizaste falsamente
  alternatives_spanish:
  - a quienes profetizaste mentiras
  - a quienes profetizaste en falso
  lexicon: HALOT
  rationale: La construcción española mantiene la acusación de falsedad sin añadir explicaciones sobre intención subjetiva. 'Falsamente' es la forma más natural y directa para el cargo profético.
theological_decisions:
- issue: Cómo renderizar la acusación contra Pashhur sin suavizarla ni precisar de más
  english_pob_reading: prophesied falsely
  chosen_spanish_reading: profetizaste falsamente
  alternative_spanish_readings:
  - profetizaste mentiras
  - profetizaste en falso
  rationale: La frase denuncia profecía falsa, pero no obliga a definir si el énfasis recae en el contenido, la intención o ambos. 'Falsamente' preserva esa tensión y evita sobreinterpretación.
  doctrine_reference: Mantener la tensión léxica y profética del texto sin resolver indebidamente el juicio moral.
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del POB inglés, que prefirió 'friends' a 'loved ones' para reflejar אָהֲבֶיךָ sin añadir ternura interpretativa. En español se eligió 'tus amigos' por esa misma razón, y se mantuvo la repetición de 'allí' para reflejar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se conserva 'Babilonia' como nombre propio sin artículo, en paralelo al inglés POB.
  - '''Cautiverio'' se usa para שׁבי en armonía con la decisión inglesa de ''captivity'' frente a ''exile''.'
  - Se usa 'sepultado' para mantener un registro solemne y pasivo coherente con el hebreo.
  - La nota [a] queda anclada en 'falsamente' para ofrecer la alternativa léxica sin alterar el texto principal.
