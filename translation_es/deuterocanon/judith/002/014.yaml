translation:
  language: es
  text: Y salió Holofernes de la presencia de su señor, y llamó a todos los nobles, los generales y los supervisores del ejército de Asur,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo narrativo de ἐξέρχομαι pide un verbo simple de movimiento. «Salió» conserva la acción concreta sin añadir matiz interpretativo.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - alejado de
  lexicon: LEH
  rationale: La expresión idiomática semítica se mantiene bien con «de la presencia de», que conserva el tono cortesano y formal del original.
- source_word: τοῦ κυρίου αὐτοῦ
  english_pob_choice: his lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su soberano
  lexicon: LEH
  rationale: Aquí κύριος designa a un superior humano, no a Dios. «Señor» reproduce el título jerárquico sin introducir connotación divina.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: El verbo indica que hizo venir a estos oficiales. «Llamó» es directo y no añade el grado de formalidad de «convocó».
- source_word: δυνάστας
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - poderosos
  lexicon: LEH
  rationale: El término apunta a hombres de alto rango o poder. «Nobles» funciona naturalmente en el contexto de una jerarquía militar-cortesana.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  lexicon: BDAG
  rationale: στρατηγός es un cargo militar; «generales» es el equivalente moderno más claro y transparente.
- source_word: ἐπιστάτας
  english_pob_choice: overseers
  chosen_spanish: overseers
  alternatives_spanish:
  - supervisores
  - inspectores
  lexicon: BDAG
  rationale: El audit trail inglés optó por «overseers» para preservar el sentido administrativo. En español se deja el término inglés como marca técnica porque no hay una equivalencia única que mantenga a la vez la función de supervisión y el rango sin sobreespecificar.
- source_word: τῆς δυνάμεως Ἀσσούρ
  english_pob_choice: of the Assyrian army
  chosen_spanish: del ejército de Asur
  alternatives_spanish:
  - de las fuerzas de Asur
  - del ejército asirio
  lexicon: LEH
  rationale: δύναμις en este contexto militar significa fuerza armada/ejército. Se traduce «ejército» por naturalidad española, y «Asur» conserva el nombre propio tal como aparece en el griego, evitando una paráfrasis más amplia como «Asiria».
- source_word: Ἀσσούρ
  english_pob_choice: Assyrian
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  - asirio
  lexicon: LEH
  rationale: El griego presenta Ἀσσούρ como nombre propio. «Asur» mantiene esa forma en español; «asirio» se reserva para el adjetivo étnico cuando el contexto lo requiera.
theological_decisions:
- issue: κύριος aplicado a un superior humano
  english_pob_reading: his lord
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su señor humano
  rationale: La escena es cortesana y militar, no teológica. «Señor» conserva el título relacional sin confundirlo con el uso divino de Yahvé.
