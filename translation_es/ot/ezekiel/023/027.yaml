translation:
  language: es
  text: Así pondré fin a tu lascivia, y a tu prostitución de la tierra de Egipto; no alzarás tus ojos hacia ellos[a], y no recordarás Egipto más[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no mirarás hacia ellos»; el hebreo «alzar los ojos hacia» puede implicar deseo, atención o dependencia.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y Egipto no recordarás más».
    reason: word_order_clarity
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: pondré fin a
  alternatives_spanish:
  - haré cesar
  - acabaré con
  lexicon: HALOT
  rationale: 'El hifil de שׁבת es causativo: Dios hace cesar la conducta. «Pondré fin a» transmite esa fuerza causal en español moderno sin perder naturalidad.'
- source_word: זִמָּתֵךְ
  english_pob_choice: your lewdness
  chosen_spanish: tu lascivia
  alternatives_spanish:
  - tu impiedad
  - tu conducta obscena
  lexicon: HALOT
  rationale: En este contexto de juicio sexualizado, זִמָּה no es simple maldad general sino desenfreno sexual vergonzoso. «Lascivia» conserva ese matiz con dignidad y fuerza.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - desde ti
  - fuera de ti
  lexicon: HALOT
  rationale: La preposición expresa remoción de algo desde la persona/cuerpo simbólico. En español, «de ti» resulta natural y conserva la imagen de eliminación.
- source_word: וְאֶת זְנוּתֵךְ
  english_pob_choice: and your prostitution
  chosen_spanish: y a tu prostitución
  alternatives_spanish:
  - y tu fornicación
  - y tu ramería
  lexicon: HALOT
  rationale: זְנוּת denota prostitución/fornicación en sentido metafórico de infidelidad. «Prostitución» mantiene la literalidad semántica y el registro profético.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: desde la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra» para reflejar el hebreo y el trasfondo histórico originario que el texto subraya.
- source_word: לֹא תִשְׂאִי עֵינַיִךְ אֲלֵיהֶם
  english_pob_choice: you will not lift up your eyes to them
  chosen_spanish: no volverás a alzar tus ojos hacia ellos
  alternatives_spanish:
  - no levantarás tus ojos hacia ellos
  - no los mirarás
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de levantar/alzar los ojos, que puede implicar deseo, atención o dependencia. «Volverás a» expresa la cesación futura de esa orientación sin interpretar de más.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: «Hacia ellos» reproduce bien la dirección implícita del gesto idiomático y sugiere la orientación del deseo o atención sin cerrarlo a una sola lectura.
- source_word: וּמִצְרַיִם לֹא תִזְכְּרִי עוֹד
  english_pob_choice: and you will remember Egypt no more
  chosen_spanish: y ya no recordarás más a Egipto
  alternatives_spanish:
  - y no recordarás más a Egipto
  - y Egipto no lo recordarás más
  lexicon: HALOT
  rationale: Se conserva el cese definitivo marcado por עוֹד. «Ya no recordarás más» suena natural en español y mantiene el énfasis de terminación.
theological_decisions:
- issue: Lenguaje sexual explícito en el oráculo profético
  english_pob_reading: Retain the sexualized metaphor in direct form ('lewdness,' 'prostitution') as covenantal/judgment language about Jerusalem's unfaithfulness.
  chosen_spanish_reading: Conservar el lenguaje sexualizado de forma directa («lascivia», «prostitución») como juicio por infidelidad pactual.
  alternative_spanish_readings:
  - su inmoralidad
  - su infidelidad
  rationale: El hebreo presenta deliberadamente una metáfora sexual intensa para denunciar idolatría e infidelidad. Suavizarla debilitaría el alcance retórico del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de «alzar tus ojos hacia ellos»
  english_pob_reading: Preserve the idiom rather than interpret it fully as political dependence or sexual desire.
  chosen_spanish_reading: Preservar el modismo («alzar tus ojos hacia ellos») sin reducirlo a una sola explicación.
  alternative_spanish_readings:
  - mirarlos con deseo
  - buscar su ayuda
  rationale: El hebreo permite varias resonancias. Mantener la imagen protege la tensión semántica del texto y evita una interpretación demasiado estrecha.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió la anclación de notas al incorporar los marcadores [a] y [b] directamente en el texto español. La redacción sigue de cerca el hebreo y el expediente inglés, preservando el paralelismo, el modismo de 'alzar los ojos' y el cierre enfático de 'más'.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el versículo no contiene el nombre divino explícito; la voz en primera persona se mantiene implícita por el contexto del oráculo.
  - Se prefirió «lascivia» y «prostitución» para conservar el tono sexualizado del hebreo, evitando una abstracción moralizante.
  - Se mantuvo «Egipto» con artículo implícito en español y «tierra de Egipto» para reflejar la frase nominal hebrea.
  - «Alzar los ojos hacia» conserva el modismo hebreo; la nota aclara la ambigüedad sin resolverla de antemano.
