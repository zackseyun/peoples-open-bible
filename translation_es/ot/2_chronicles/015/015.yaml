    issue: La nota al pie [a] está colocada sobre «se alegró» en vez de sobre «se dejó hallar por ellos».
    rationale: El rastro de auditoría inglés indica que la nota lexical_alternative pertenece a וַיִּמָּצֵא לָהֶם («he was found by them»), no a וַיִּשְׂמְחוּ. Tal como está, la nota induce a error sobre qué expresión tiene la alternativa literal.
