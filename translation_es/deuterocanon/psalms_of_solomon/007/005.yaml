translation:
  language: es
  text: Cuando tu nombre habite en medio de nosotros[a], se nos mostrará misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de modo más formal: «Cuando tu nombre tabernacle entre nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ κατασκηνοῦν
  english_pob_choice: When ... dwells
  chosen_spanish: Cuando ... habite
  alternatives_spanish:
  - cuando ... more
  - cuando ... tienda su morada
  - cuando ... tabernacle
  lexicon: BDAG
  rationale: El griego usa un infinitivo articular con ἐν que funciona temporalmente; por eso se vierte con «cuando». Para κατασκηνοῦν, «habite» conserva la imagen de residencia/peregrinación sin forzar un calco extraño en español.
- source_word: κατασκηνοῦν
  english_pob_choice: dwells
  chosen_spanish: habite
  alternatives_spanish:
  - more
  - tabernacle
  - tome morada
  lexicon: BDAG
  rationale: «Habite» comunica la idea de morar o establecerse, manteniendo el matiz de presencia estable y reverente que el inglés POB da con «dwells». «Tabernáculo» o «tabernacle» serían demasiado técnicos o duros en español corriente.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu presencia
  - tú mismo
  lexicon: BDAG
  rationale: Se conserva literalmente «tu nombre», porque el uso bíblico permite que el nombre represente la presencia manifestada o la reputación divina. Traducirlo como «tu presencia» resolvería demasiado la metáfora.
- source_word: ἐν μέσῳ ἡμῶν
  english_pob_choice: in our midst
  chosen_spanish: en medio de nosotros
  alternatives_spanish:
  - entre nosotros
  - en nuestro medio
  lexicon: BDAG
  rationale: «En medio de nosotros» es la equivalencia natural y solemne en español, manteniendo la cercanía comunitaria del giro griego sin perder claridad.
- source_word: ἐλεηθησόμεθα
  english_pob_choice: we will be shown mercy
  chosen_spanish: seremos mostrados misericordia
  alternatives_spanish:
  - recibiremos misericordia
  - se nos mostrará misericordia
  - seremos objeto de misericordia
  lexicon: BDAG
  rationale: Se preserva la pasiva futura de forma explícita. «Seremos mostrados misericordia» es menos idiomático que otras opciones, pero reproduce con más fidelidad la forma pasiva y la relación agente/padecimiento del griego y del inglés auditado.
theological_decisions:
- issue: El «nombre» de Dios como presencia manifiesta, no solo etiqueta nominal
  english_pob_reading: your name
  chosen_spanish_reading: tu nombre
  alternative_spanish_readings:
  - tu presencia
  - tu reputación
  rationale: El texto deja la expresión en su forma literal para no borrar la carga bíblica de «nombre» como portador de presencia y autoridad divina. La nota lexical aclara la tensión interpretativa sin anularla.
  doctrine_reference: Biblical theology of the divine name / presencia del nombre
- issue: La voz pasiva divina en «seremos mostrados misericordia»
  english_pob_reading: we will be shown mercy
  chosen_spanish_reading: seremos mostrados misericordia
  alternative_spanish_readings:
  - recibiremos misericordia
  - se nos mostrará misericordia
  rationale: La forma elegida conserva la pasiva del griego y del POB inglés, evitando convertirla sin necesidad en una formulación más activa o más idiomática. Aunque suena marcada, es útil para el audit trail y para no perder la estructura verbal del original.
  doctrine_reference: Divine mercy / voz pasiva en pasajes de petición
- issue: Imagen de morada divina frente a equivalencias más abstractas
  english_pob_reading: dwells / tabernacles
  chosen_spanish_reading: habite
  alternative_spanish_readings:
  - more
  - establezca su morada
  rationale: «Habite» conserva el matiz de residencia estable con resonancia bíblica, sin obligar al lector hispanohablante a una formulación demasiado arcaica o técnica.
  doctrine_reference: Presence of God / tabernacling imagery
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el español propuesto sigue de cerca el texto griego y el audit trail inglés, manteniendo el mismo equilibrio entre literalidad e inteligibilidad.
  spanish_consistency_notes:
  - Se mantiene «tu nombre» de forma literal, sin sustituirlo por «tu presencia».
  - Se usa «habite» para conservar la imagen de morada/presencia, evitando una paráfrasis excesiva.
  - La pasiva futura se conserva de manera explícita para reflejar el griego y el POB inglés.
  - Se emplea puntuación simple y solemne adecuada para una línea poética breve.
