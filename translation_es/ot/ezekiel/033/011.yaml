translation:
  language: es
  text: '«Diles[a]: “Vivo yo —declara el Señor Yahvé— que no me complazco en la muerte del malvado, sino en que el malvado se vuelva de su camino y viva. ¡Vuélvanse, vuélvanse de sus malos caminos! ¿Por qué morirán, casa de Israel?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me deleito en la muerte del malvado». El verbo hebreo puede denotar complacencia, deleite o deseo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como vivo yo
  - Por mi vida
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne. «Vivo yo» conserva la brevedad y el peso idiomático del original en español natural; «tan cierto como vivo yo» explicita el juramento, pero alarga el enunciado.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética de declaración, bien rendida por «declara». YHWH se vierte como «Yahvé» conforme al estándar del proyecto; con אֲדֹנָי delante, «Señor Yahvé» mantiene ambos títulos sin el artificio de «Señor SEÑOR».
- source_word: אִם אֶחְפֹּץ בְּמוֹת הָרָשָׁע
  english_pob_choice: I take no pleasure in the death of the wicked
  chosen_spanish: no me complazco en la muerte del malvado
  alternatives_spanish:
  - no deseo la muerte del malvado
  - no me deleito en la muerte del malvado
  lexicon: HALOT
  rationale: En este juramento, אִם con la idea negativa expresa una negación enfática. חפץ puede ser «complacerse», «deleitarse» o «desear»; «no me complazco» preserva el matiz afectivo sin volverlo más fuerte de lo que exige el hebreo.
- source_word: כִּי אִם
  english_pob_choice: but rather that
  chosen_spanish: sino en que
  alternatives_spanish:
  - sino que
  - más bien en que
  lexicon: HALOT
  rationale: 'La secuencia contrasta dos contenidos: no la muerte, sino la vuelta y la vida. «Sino en que» refleja bien la oposición y enlaza de forma natural con el infinitivo/resultado en español.'
- source_word: בְּשׁוּב רָשָׁע מִדַּרְכּוֹ
  english_pob_choice: that the wicked turn from his way
  chosen_spanish: en que el malvado se vuelva de su camino
  alternatives_spanish:
  - en que el malvado se aparte de su camino
  - en que el malvado vuelva de su camino
  lexicon: HALOT
  rationale: שׁוּב conserva la imagen de «volver/retornar», que el POB inglés mantiene con «turn». «Se vuelva de su camino» reproduce esa metáfora sin sustituirla por una paráfrasis más abstracta.
- source_word: וְחָיָה
  english_pob_choice: and live
  chosen_spanish: y viva
  alternatives_spanish:
  - y viva así
  - y tenga vida
  lexicon: HALOT
  rationale: El verbo queda en forma breve y coordinada, como en el hebreo. «Viva» es simple y fiel, sin añadir explicación.
- source_word: שׁוּבוּ שׁוּבוּ
  english_pob_choice: Turn back, turn back
  chosen_spanish: ¡Vuélvanse, vuélvanse!
  alternatives_spanish:
  - ¡Regresen, regresen!
  - ¡Arrepiéntanse, arrepiéntanse!
  lexicon: HALOT
  rationale: La repetición es enfática. «Vuélvanse» preserva el vínculo verbal con שׁוּב; «arrepentirse» sería doctrinalmente legítimo, pero más interpretativo que la imagen hebrea de retorno.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  english_pob_choice: from your evil ways
  chosen_spanish: de sus malos caminos
  alternatives_spanish:
  - de sus caminos malos
  - de sus caminos perversos
  lexicon: HALOT
  rationale: «Caminos» mantiene la metáfora de conducta, y «malos» refleja el adjetivo plural hebreo de modo natural en español. Se prefiere «sus» por concordancia con la apelación plural directa.
- source_word: וְלָמָּה תָמ֖וּתוּ
  english_pob_choice: Why will you die
  chosen_spanish: ¿Por qué morirán?
  alternatives_spanish:
  - ¿Por qué habrán de morir?
  - ¿Por qué quieren morir?
  lexicon: HALOT
  rationale: El hebreo usa una forma que en este contexto exhortativo puede leerse con valor futuro o retórico. «Morirán» conserva la fuerza directa de la pregunta profética.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel,
  - pueblo de Israel
  lexicon: HALOT
  rationale: La fórmula vocativa conserva el idiomático «casa de Israel», que mantiene el tono profético y el sentido corporativo mejor que una simplificación a «pueblo».
theological_decisions:
- issue: La voluntad/disposición divina respecto a la muerte del malvado
  english_pob_reading: I take no pleasure in the death of the wicked, but rather that the wicked turn from his way and live
  chosen_spanish_reading: no me complazco en la muerte del malvado, sino en que el malvado se vuelva de su camino y viva
  alternative_spanish_readings:
  - no deseo la muerte del malvado, sino que el malvado se vuelva de su camino y viva
  - no me deleito en la muerte del malvado, más bien en que el malvado se vuelva y viva
  rationale: La traducción conserva la afirmación profética sobre la disposición de Yahvé sin resolverla dentro de un sistema teológico posterior. Se mantiene la tensión entre la negativa a la muerte y el deseo/placer por la vuelta y la vida.
  doctrine_reference: Preservar la tensión teológica sin sistematizarla más allá del texto.
- issue: Pasaje del singular representativo al plural exhortativo
  english_pob_reading: the wicked ... his way ... Turn back, turn back from your evil ways
  chosen_spanish_reading: el malvado ... de su camino ... Vuélvanse, vuélvanse de sus malos caminos
  alternative_spanish_readings:
  - el malvado ... de su camino ... Vuélvanse, vuélvanse de sus caminos malos
  - el malvado ... de su camino ... Arrepiéntanse, arrepiéntanse de sus malos caminos
  rationale: El hebreo pasa del singular genérico al plural directo. La versión conserva ese movimiento y evita neutralizarlo con una forma impersonal o doctrinalmente más cargada que la imagen de retorno.
  doctrine_reference: Precisión gramatical y lecturas representativas.
translation_notes:
  revision_awareness: 'Se siguió el contexto de auditoría inglesa sin traducir mecánicamente: se respetó la fórmula juramental, la declaración profética con Yahvé, el valor aspectual/retórico de חפץ y la repetición enfática de שׁוּבוּ. No se incorporaron lecturas no documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto, y «Señor Yahvé» para reproducir Adonai + YHWH sin duplicación artificial.
  - Se prefirió «malvado» para רָשָׁע por coherencia con la fuerza lexical del término y con la genericidad del singular hebreo.
  - «Vuélvanse» mantiene el enlace léxico con «se vuelva» para שׁוּב, preservando la repetición enfática del versículo.
  - Se mantuvo el vocativo «casa de Israel» por su tono profético y corporativo.
