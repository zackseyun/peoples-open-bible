translation:
  language: es
  text: 'Y Ozías le dijo[a]: «Todo lo que has dicho, lo has hablado con un buen corazón, y no hay quien se oponga a tus palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con un buen corazón», expresión que aquí indica intención recta o sincera, no solo el modo eficaz de hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀζείας
  english_pob_choice: Ozias
  chosen_spanish: Ozías
  alternatives_spanish:
  - Uzzías
  lexicon: Transliteración del nombre griego en la tradición deuterocanónica
  rationale: Se conserva la forma griega del nombre propio, como en el inglés POB, en lugar de armonizarlo con la forma hebrea; en español, «Ozías» es la transliteración más directa de Ὀζείας.
- source_word: Πάντα ὅσα εἶπας
  english_pob_choice: Everything you have said
  chosen_spanish: Todo lo que has dicho
  alternatives_spanish:
  - Todo cuanto has dicho
  - Todo lo que dijiste
  lexicon: LSJ
  rationale: La expresión totalizante se vierte de manera natural en español sin perder el alcance comprehensivo del griego. Se prefiere el perfecto compuesto para reflejar la respuesta inmediata al discurso previo, en línea con la opción inglesa.
- source_word: ἀγαθῇ καρδίᾳ
  english_pob_choice: with a good heart
  chosen_spanish: con buen corazón
  alternatives_spanish:
  - con un corazón bueno
  - con buen ánimo
  - con buena intención
  lexicon: LSJ
  rationale: Se mantiene la imagen idiomática de «corazón» para preservar el valor moral y disposicional de la frase griega. «Con buen corazón» suena natural en español y evita reducirlo a un simple adverbio de modo.
- source_word: ἐλάλησας
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - hablaste
  - has dicho
  lexicon: LSJ
  rationale: «Has hablado» conserva el sentido de acción verbal ya cumplida y responde a la distinción observada por la POB entre εἶπας y ἐλάλησας. En español sigue siendo claro y suficientemente cercano al matiz aspectual del griego.
- source_word: ἀντιστήσεται
  english_pob_choice: will oppose
  chosen_spanish: se oponga
  alternatives_spanish:
  - resista
  - se ponga en contra
  lexicon: LSJ
  rationale: Se traduce con una construcción natural en español para la oposición verbal o argumentativa del contexto. El subjuntivo en la relativa negativa expresa adecuadamente la inexistencia de alguien que contradiga sus palabras.
- source_word: τοῖς λόγοις σου
  english_pob_choice: your words
  chosen_spanish: a tus palabras
  alternatives_spanish:
  - tus palabras
  - contra tus palabras
  lexicon: LSJ
  rationale: Se mantiene el sustantivo plural «palabras» para preservar el foco en el contenido dicho por Judit, y se usa la preposición exigida por «oponerse a» en español.
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el testimonio auditado en inglés; no se registran revisiones aplicadas. Se ha preservado la decisión léxica principal de la POB para ἀγαθῇ καρδίᾳ y el valor verbal de ἐλάλησας, adaptándolos a un español natural y publicable.
  spanish_consistency_notes:
  - Se conserva «Y» inicial para reproducir la coordinación narrativa del griego.
  - Se mantiene la referencia directa a la persona con pronombre enclítico y tratamiento de segunda persona singular.
  - Se evita «Cristo» u այլ terminología no pertinente; el versículo no contiene vocabulario teológico de alta tensión doctrinal.
  - La nota al pie marca explícitamente la posible lectura alternativa de ἀγαθῇ καρδίᾳ para no borrar la metáfora del corazón.
