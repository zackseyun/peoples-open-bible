translation:
  language: es
  text: Preservaste mi carne de la fosa[a], y de la mano del Seol libraste mi pie. Me rescataste de la calumnia del pueblo, del azote de una lengua calumniadora y de los labios de los que hablan mentira. Estuviste conmigo contra los que se levantaron contra mí; me ayudaste conforme a la abundancia de tu amor fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio hebreo provisto para esta referencia está marcado como una discrepancia mayor y contiene una redacción distinta; por eso este versículo debe leerse con cautela textual a la luz del expediente fuente.
    reason: textual_variant
lexical_decisions:
- source_word: ἐξομολογοῦμαι
  english_pob_choice: I give thanks
  chosen_spanish: Te doy gracias
  alternatives_spanish:
  - Te confieso
  - Te alabo
  lexicon: BDAG
  rationale: En este contexto de acción de gracias, el verbo griego expresa reconocimiento agradecido más que confesión de pecado; en español, «dar gracias» comunica con naturalidad ese sentido.
- source_word: τῷ ὀνόματί σου
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre
  lexicon: BDAG
  rationale: La construcción con dativo conserva la dirección del agradecimiento hacia el nombre de Dios; «a tu nombre» es la forma natural en español para esa idiomática.
- source_word: σκεπαστής
  english_pob_choice: shelter
  chosen_spanish: protección
  alternatives_spanish:
  - amparo
  - refugio
  - cobertura
  lexicon: LSJ
  rationale: El sustantivo designa a quien cubre o protege. En español, «protección» preserva el valor funcional sin forzar un título personal demasiado específico.
- source_word: βοηθός
  english_pob_choice: helper
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - ayudador
  - auxiliador
  lexicon: BDAG
  rationale: La coordinación con σκεπαστής admite una segunda idea de socorro. «Ayuda» mantiene el paralelismo y es más natural que un sustantivo agentivo menos común.
- source_word: ἐγένου μοι
  english_pob_choice: you became my
  chosen_spanish: fuiste para mí
  alternatives_spanish:
  - llegaste a ser para mí
  - te mostraste como mi
  lexicon: BDAG
  rationale: El aoristo de γίνομαι puede rendirse con una forma resultativa. «Fuiste para mí» conserva la relación predicativa con los sustantivos sin sonar forzado en español.
theological_decisions:
- issue: Alineación con la fuente principal para Sirácides 51:2
  english_pob_reading: The English POB followed the Greek parallel rather than the supplied Hebrew witness, which is marked as a major mismatch.
  chosen_spanish_reading: 'Traducir desde el testimonio griego: una acción de gracias dirigida al nombre de Dios, que lo reconoce como protección y ayuda.'
  alternative_spanish_readings:
  - Intentar armonizar con el hebreo suministrado aunque no corresponda al versículo griego
  rationale: La consigna editorial pide trabajar desde el testimonio original más fiable disponible y explicitar la incertidumbre. Aquí el griego coincide con la referencia del versículo, por lo que se sigue ese texto y se evita mezclar material de otro testimonio desplazado.
  doctrine_reference: 'PHILOSOPHY.md: translate from the most-original available witness; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Este borrador corrige el intento previo, que no anclaba la nota a un marcador en el texto. Ahora la nota [a] aparece en la frase correspondiente y la traducción se mantiene breve y publicable, siguiendo el griego de Sirácides 51:2.
  spanish_consistency_notes:
  - «Te doy gracias» conserva el matiz de agradecimiento del verbo griego en este contexto.
  - «a tu nombre» mantiene la dirección cultual del dativo.
  - «protección y ayuda» reproduce la estructura coordinada de σκεπαστής καὶ βοηθός sin imponer terminología eclesiástica.
  - Se evita introducir contenido del hebreo suministrado, porque el propio expediente lo marca como desajuste mayor respecto del versículo griego.
