translation:
  language: es
  text: En lugar del espino[a], subirá el ciprés[b]; en lugar de la ortiga[c], subirá el mirto. Y será para Yahvé un nombre[d], una señal perpetua que no será cortada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arbusto espinoso»; la especie exacta denotada por el hebreo na'atsuts es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «abeto» para «ciprés»; la especie exacta denotada por el hebreo berosh es incierta.
    reason: lexical_alternative
  - marker: c
    text: O «zarza» o «maleza espinosa» para «ortiga»; la planta exacta denotada por el hebreo sirpad es incierta.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «para un nombre», un modismo de renombre o memorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de
  lexicon: HALOT
  rationale: En este contexto poético de restauración, la preposición expresa sustitución, no ubicación espacial. «En lugar de» transmite bien el contraste entre vegetación dañina y árboles valiosos.
- source_word: נַּעֲצוּץ
  english_pob_choice: thornbush
  chosen_spanish: espino
  alternatives_spanish:
  - arbusto espinoso
  - zarza
  lexicon: HALOT
  rationale: La especie exacta es incierta. «Espino» conserva la idea de planta espinosa sin forzar una identificación botánica más precisa de la que admite el hebreo.
- source_word: בְרֹושׁ
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - abeto
  - enebro
  lexicon: HALOT
  rationale: «Ciprés» es la equivalencia moderna más natural y común para בְרֹושׁ, y comunica una conífera noble y perenne, acorde con el contraste poético.
- source_word: סִּרְפַּד
  english_pob_choice: brier
  chosen_spanish: ortiga
  alternatives_spanish:
  - zarza
  - maleza espinosa
  - bramadera
  lexicon: HALOT
  rationale: El referente botánico es incierto. El campo semántico apunta a una planta molesta o nociva; «ortiga» preserva esa cualidad irritante y funciona en español como contraparte negativa de la imagen anterior.
- source_word: הֲדַס
  english_pob_choice: myrtle
  chosen_spanish: mirto
  alternatives_spanish:
  - arrayán
  - mirto
  lexicon: HALOT
  rationale: «Mirto» es la equivalencia establecida y clara en español. Mantiene la especie favorable y ornamental que contrasta con las plantas espinosas.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יהוה: «Yahvé». La preposición ל־ aquí expresa destino/relación de beneficio o referencia, por lo que «para Yahvé» conserva el sentido idiomático del hebreo.'
- source_word: לְשֵׁם
  english_pob_choice: a name
  chosen_spanish: un nombre
  alternatives_spanish:
  - renombre
  - memorial
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para un nombre», un modismo de reputación o memorial. Se conserva la forma literal en español para no borrar la fuerza idiomática del texto.
- source_word: לְא֥וֹת עוֹלָ֖ם
  english_pob_choice: an everlasting sign
  chosen_spanish: una señal perpetua
  alternatives_spanish:
  - una señal eterna
  - una señal para siempre
  lexicon: HALOT
  rationale: «Señal» reproduce bien אוֹת y «perpetua» expresa la duración de עוֹלָם en un español natural y solemne.
- source_word: לֹ֥א יִכָּרֵֽת
  english_pob_choice: that will not be cut off
  chosen_spanish: que no será cortada
  alternatives_spanish:
  - que no será eliminada
  - que no será arrancada
  lexicon: HALOT
  rationale: El verbo mantiene la imagen de ser «cortada»; en español, el femenino de «señal» permite conservar esa metáfora sin perder claridad. También deja visible el eco verbal de permanencia.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto en español, se traduce como «Yahvé» para preservar el nombre pactal y evitar el reemplazo litúrgico por una máscara titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustanciales; se mantiene la línea óptimo-equivalente, con ajuste español de planta espinosa y preservación explícita del modismo «para un nombre».
  spanish_consistency_notes:
  - Se mantuvo Yahvé según la norma del proyecto para יהוה.
  - Se conservó la imagen verbal de «no será cortada» para reflejar el hebreo y la lectura auditada del inglés.
  - El orden poético y la estructura paralelística siguen de cerca el hebreo y el POB inglés, sin añadir interpretaciones no presentes en la fuente.
