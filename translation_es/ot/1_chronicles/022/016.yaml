    rationale: El English POB preserva la alternativa lexical 'there is no counting / beyond counting'. En español conviene conservar una nota equivalente porque 'no hay número' es formal y admite una glosa aclaratoria.
  - severity: medium
    issue: Falta nota para נְחֹשֶׁת
    rationale: El English POB conserva la alternativa 'copper'. Dado que el borrador eligió 'bronce', debe mantenerse la alternativa lexical en nota también en español.
  - severity: low
