review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el contraste del proverbio y la idea general: el rico se considera sabio, mientras que el pobre con discernimiento penetra su realidad. Sin embargo, ''se cree sabio'' adelanta al predicado una interpretación que el hebreo deja en combinación con ''en sus propios ojos'', y ''el pobre entendido'' suena menos natural y algo ambiguo en español. La nota también debiera reflejar mejor la alternativa inglesa ''finds him out'' como ''lo pone al descubierto'' o ''descubre cómo es en realidad''.'
  spanish_quality_summary: La redacción es comprensible, pero puede mejorar en naturalidad y precisión proverbial. 'A sus propios ojos' reproduce bien el modismo hebreo y es suficientemente natural en registro bíblico. 'El pobre que tiene entendimiento' evita la ambigüedad de 'entendido', que en español puede sugerir experto más que discernimiento moral. 'Lo investiga' es aceptable, pero una nota mejor afinada ayuda a conservar el matiz de examinar o descubrir el verdadero carácter.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas clave deben alinearse mejor con el audit trail inglés: חָכָם -> ''sabio'' sin anticipar ''se cree''; בְּעֵינָיו -> preferible ''a sus propios ojos''; מֵבִין -> mejor ''que tiene entendimiento'' o ''discernimiento'' que ''entendido''; יַחְקְרֶנּוּ -> ''lo investiga'' es viable con nota léxica más precisa.'
  issues:
  - severity: medium
    issue: '''Se cree sabio'' sobreinterpreta חָכָם antes de expresar el modismo reflexivo.'
    rationale: El hebreo dice literalmente 'sabio en sus propios ojos'; la subjetividad ya viene en בְּעֵינָיו. Mantener 'sabio' en el texto principal preserva mejor la estructura y la decisión léxica documentada.
  - severity: medium
    issue: '''En su propia opinión'' es posible, pero pierde parte de la imaginería y del paralelismo proverbial de ''a sus propios ojos''.'
    rationale: El audit trail inglés destacó el modismo. En español bíblico moderno, 'a sus propios ojos' suena natural y más cercano al original sin resultar arcaico.
  - severity: medium
    issue: '''El pobre entendido'' resulta algo forzado y ambiguo.'
    rationale: '''Entendido'' en español puede referirse a un experto o conocedor. ''Que tiene entendimiento'' comunica mejor el sentido atributivo de מֵבִין y la cualidad de discernimiento.'
  - severity: low
    issue: La nota al pie no refleja bien la alternativa 'finds him out'.
    rationale: '''Lo encuentra'' sugiere hallar físicamente, mientras que el contexto apunta a descubrir o poner al descubierto el verdadero carácter del rico.'
  revised_spanish_text: El hombre rico es sabio a sus propios ojos[a], pero el pobre que tiene entendimiento lo investiga.
  revised_footnotes:
