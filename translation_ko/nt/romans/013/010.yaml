id: ROM.13.10
reference: Romans 13:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ ἀγάπη τῷ πλησίον κακὸν οὐκ ἐργάζεται· πλήρωμα οὖν νόμου ἡ ἀγάπη.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/010.yaml
  text: Love does no harm to a neighbor; therefore love is the fulfillment of the law.
translation:
  language: ko
  text: 사랑은 이웃에게 해를 끼치지 않습니다[a]. 그러므로 사랑이 율법의 완성[b]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사랑은 이웃에게 악을 행하지 않는다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「율법의 충만함」. 헬라어 πλήρωμα는 채움·완성을 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_korean: 사랑
  alternatives_korean:
  - 자비
  lexicon: BDAG
  rationale: 정책 글로사리 ἀγάπη→사랑. 절 내 두 차례 반복도 같은 어휘로 일관성 유지.
- source_word: τῷ πλησίον
  english_pob_choice: to a neighbor
  chosen_korean: 이웃에게
  alternatives_korean:
  - 이웃을 향하여
  lexicon: BDAG
  rationale: 여격으로 영향받는 대상. 「이웃」 어휘를 13:9와 일관되게 유지.
- source_word: κακὸν οὐκ ἐργάζεται
  english_pob_choice: does no harm
  chosen_korean: 해를 끼치지 않다
  alternatives_korean:
  - 악을 행하지 않다
  - 해악을 입히지 않다
  lexicon: BDAG
  rationale: 윤리적 문맥에서 κακόν은 가해·피해를 뜻하므로 「해」가 자연스럽다. 「악을 행하지 않다」는 각주 대안.
- source_word: πλήρωμα
  english_pob_choice: the fulfillment
  chosen_korean: 완성
  alternatives_korean:
  - 충만
  - 다 이룸
  lexicon: BDAG
  rationale: 13:8의 「다 이루었다(πεπλήρωκεν)」와 어휘적으로 연결되도록 「완성」으로 옮긴다.
theological_decisions:
- issue: 사랑과 율법의 관계
  chosen_reading: 「사랑이 율법의 완성이다」 명사 절을 그대로 보존
  alternative_readings:
  - 「사랑은 율법을 완성한다」 동사 절로 풀이
  rationale: 헬라어가 명사 술어 구조이므로 한국어도 같은 구조를 유지한다. 사랑과 각 계명의 관계를 본문 너머로 확장하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
