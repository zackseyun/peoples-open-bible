translation:
  language: es
  text: La belleza del cielo y la gloria de las estrellas—su luz resplandece en las alturas de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada conserva aquí una lectura inicial diferente («... la belleza/esplendor del cielo y la majestad de una estrella»), mientras que el texto de la Guenizá de El Cairo lee «La belleza/esplendor de los cielos y la majestad de las estrellas». El texto principal sigue el hebreo de Zona 1, y el paralelo griego apoya un sentido colectivo.
    reason: textual_variant
  - marker: b
    text: 'Paralelo griego: «belleza del cielo, gloria de las estrellas, un adorno que da luz, en las alturas el Señor». Esto apoya la imaginería del verso como un adorno celestial radiante, aunque el texto principal sigue la redacción hebrea conservada.'
    reason: alternative_reading
lexical_decisions:
- source_word: תואר / κάλλος
  english_pob_choice: beauty / splendor
  chosen_spanish: belleza
  alternatives_spanish:
  - esplendor
  - hermosura
  lexicon: HALOT; BDAG
  rationale: En este contexto poético, 'belleza' comunica bien la cualidad visible y admirable del cielo. 'Esplendor' sería posible, pero en español suena algo más marcado; 'belleza' conserva naturalidad sin perder la fuerza estética.
- source_word: שמים / οὐρανοῦ
  english_pob_choice: the heavens / heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  - de los cielos
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'the heavens', en español 'cielo' suena más natural y sigue siendo fiel al campo semántico de שמים en un registro poético. Evita una forma más pesada cuando el sentido es cosmológico/poético.
- source_word: הדר / δόξα
  english_pob_choice: glory / majesty
  chosen_spanish: gloria
  alternatives_spanish:
  - majestad
  - esplendor
  lexicon: HALOT; BDAG
  rationale: '''Gloria'' es el equivalente más estable en español para una cualidad resplandeciente y honorable. Mantiene el paralelismo con ''belleza'' y no introduce una solemnidad innecesaria.'
- source_word: כוכב / ἄστρων
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - una estrella
  - los astros
  lexicon: HALOT
  rationale: El paralelo griego confirma el plural; por eso 'las estrellas' expresa mejor el sentido colectivo que una forma singular. 'Astros' sería posible, pero 'estrellas' es más claro y bíblico en español.
- source_word: ואורו / κόσμος φωτίζων
  english_pob_choice: their light shines / an ornament giving light
  chosen_spanish: su luz resplandece
  alternatives_spanish:
  - su luz brilla
  - su luz da resplandor
  - su luz ilumina
  lexicon: HALOT; BDAG
  rationale: '''Resplandece'' conserva el matiz de brillo intenso del participio y armoniza con el lenguaje poético. El posesivo singular ''su'' funciona en español como colectivo, sin forzar una referencia individual.'
- source_word: מזהיר
  english_pob_choice: shines brightly
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - da brillo
  - alumbra
  lexicon: HALOT
  rationale: El verbo comunica emisión intensa de luz. 'Resplandece' es adecuado para un texto sapiencial y evita añadir la intensificación adverbial que no está explícita en el hebreo.
- source_word: במרומי אל / ἐν ὑψίστοις Κύριος
  english_pob_choice: in the heights of God / in the heights the Lord
  chosen_spanish: en las alturas de Dios
  alternatives_spanish:
  - en las alturas
  - en lo más alto de Dios
  - en las alturas del Altísimo
  lexicon: HALOT; BDAG
  rationale: El hebreo conserva la referencia explícita a אל, por lo que 'Dios' es transparente y fiel. 'En las alturas' solo sería posible si se omitiera la referencia divina, pero aquí no conviene borrar ese elemento del verso.
theological_decisions:
- issue: Cómo reflejar el nombre divino/lo divino en במרומי אל y el paralelo griego ὑψίστοις Κύριος
  english_pob_reading: in the heights of God
  chosen_spanish_reading: en las alturas de Dios
  alternative_spanish_readings:
  - en las alturas del Señor
  - en lo más alto
  rationale: El hebreo fuente incluye explícitamente אל, y el griego paralelo coloca al Señor en las alturas. Para no suavizar ni enmascarar la referencia, 'Dios' mantiene la transparencia del texto base. No se adopta 'Señor' como sustituto litúrgico porque aquí el foco es descriptivo y cósmico, no una fórmula devocional.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source meaning without importing tradition.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó el número a plural colectivo ('their light shines') y favoreció una redacción más natural. Por eso el español evita singularizar indebidamente y mantiene un posesivo colectivo ('su luz').
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אל, conforme al principio POB de transparencia frente al original.
  - Se prefirió 'cielo'/'estrellas' por naturalidad española y por el apoyo del paralelo griego al sentido colectivo.
  - '''Resplandece'' conserva el valor luminoso sin sobretraducción adverbial.'
  - La puntuación con dos puntos reproduce bien la estructura enumerativa del verso y su cierre explicativo.
