revisions:
- from: Y los ancianos de los judíos hallaron favor ante Yahvé[a], habiendo sido puestos sobre el cautiverio para ejercer supervisión.
  to: Y los ancianos de los judíos hallaron favor de parte de Yahvé,[a] habiendo sido puestos sobre el cautiverio para ejercer supervisión.
  rationale: Se corrige «ante Yahvé» a «de parte de Yahvé» para reflejar con fidelidad el valor de fuente/origen de παρὰ τοῦ κυρίου, manteniendo al mismo tiempo la terminología del proyecto («Yahvé»). No se requieren más cambios porque el resto del borrador conserva bien la compresión y ambigüedad del griego.
  reviewer_model: gpt-5.4
