revisions:
- from: Si no recogiste[a] en tu juventud, ¿cómo encontrarás algo en tu vejez?
  to: Si no recogiste[a] en tu juventud, ¿cómo hallarías en tu vejez?
  rationale: La revisión elimina el objeto añadido para preservar la elipsis del griego y de la auditoría POB, y cambia el futuro simple por un condicional retórico más acorde con πῶς ἂν εὕροις. Se conserva 'recogiste' y la nota de incertidumbre textual, con leve pulido de estilo.
