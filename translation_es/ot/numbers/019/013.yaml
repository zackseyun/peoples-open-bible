base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/013.yaml
  text: Everyone who touches a dead person[a], the body of a man who has died, and does not purify himself, has defiled the tabernacle of Yahweh, and that person shall be cut off from Israel. Because the water for impurity was not sprinkled on him, he shall be unclean; his uncleanness is still on him.
  footnotes:
  - marker: a
    text: Or 'the water of purification.' The Hebrew is literally 'water of impurity,' referring to the water used to remove corpse-impurity.
    reason: lexical_alternative
