id: 2KI.2.12
reference: 2 Kings 2:12
source:
  edition: WLC
  text: וֶ/אֱלִישָׁ֣ע רֹאֶ֗ה וְ/ה֤וּא מְצַעֵק֙ אָבִ֣/י אָבִ֗/י רֶ֤כֶב יִשְׂרָאֵל֙ וּ/פָ֣רָשָׁ֔י/ו וְ/לֹ֥א רָאָ֖/הוּ ע֑וֹד וַֽ/יַּחֲזֵק֙ בִּ/בְגָדָ֔י/ו וַ/יִּקְרָעֵ֖/ם לִ/שְׁנַ֥יִם קְרָעִֽים׀׃
translation:
  text: And Elisha was watching[a], and he was crying out, “My father, my father! The chariot of Israel and its horsemen!” Then he saw him no more, and he took hold of his own clothes and tore them into two pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Israel's chariot and horsemen.' Elisha's cry may identify Elijah as Israel's true strength and defense, or it may refer to the heavenly chariot-and-horses scene he is witnessing.
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאֶה
  chosen: was watching
  alternatives:
  - saw
  - was seeing
  lexicon: HALOT
  rationale: 'The participle conveys ongoing action: Elisha is in the act of watching as Elijah is taken up. ''Was watching'' better reflects the durative sense than a simple past ''saw''.'
- source_word: מְצַעֵק
  chosen: was crying out
  alternatives:
  - cried out
  - was shouting
  lexicon: HALOT
  rationale: The participle likewise suggests continuing action accompanying the vision. 'Crying out' preserves both the vividness and the emotional force without overstating volume.
- source_word: אָבִי אָבִי
  chosen: My father, my father!
  alternatives:
  - Father, father!
  lexicon: HALOT
  rationale: The repeated address is retained for emotional intensity. 'My father' reflects the 1cs suffix and the disciple-prophet relationship, not biological paternity.
- source_word: רֶכֶב יִשְׂרָאֵל וּפָרָשָׁיו
  chosen: The chariot of Israel and its horsemen
  alternatives:
  - The chariots of Israel and its horsemen
  - Israel's chariot and horsemen
  lexicon: HALOT
  rationale: The Hebrew is singular 'chariot' with plural 'horsemen' plus 3ms suffix. The phrase is best kept as an exclamatory apposition identifying Elijah as Israel's true defense/strength. 'Its horsemen' reflects the suffix more directly than repeating 'Israel's'.
- source_word: וְלֹא רָאָהוּ עוֹד
  chosen: Then he saw him no more
  alternatives:
  - and he did not see him again
  - and he no longer saw him
  lexicon: HALOT
  rationale: This idiomatic English rendering captures the cessation expressed by 'no longer/again' while maintaining narrative flow.
- source_word: וַיַּחֲזֵק
  chosen: he took hold of
  alternatives:
  - he seized
  - he grasped
  lexicon: HALOT
  rationale: '''Took hold of'' is natural modern English and fits the reflexive-like action on his garments without sounding overly violent.'
- source_word: בִּבְגָדָיו
  chosen: his own clothes
  alternatives:
  - his garments
  - his clothes
  lexicon: HALOT
  rationale: The context is a mourning gesture involving Elisha's own clothing. 'His own clothes' makes explicit what English readers may otherwise miss from the suffix alone.
- source_word: וַיִּקְרָעֵם לִשְׁנַיִם קְרָעִים
  chosen: tore them into two pieces
  alternatives:
  - tore them in two
  - split them into two tears
  lexicon: HALOT
  rationale: This is the standard idiom for tearing garments as a sign of grief. 'Into two pieces' is clear English and reflects the resultative phrase without wooden literalism.
