translation:
  language: es
  text: 'Entonces Abner le dijo: «Desvíate[a] hacia tu derecha o hacia tu izquierda, y apodérate[b] de uno de los jóvenes para ti, y toma su despojo[c] para ti». Pero Asael no quiso dejar de seguirlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gira» o «apártate». El hebreo permite la idea de desviarse del rumbo inmediato, pero el mandato es más fuerte que un simple cambio de postura.
    reason: lexical_alternative
  - marker: b
    text: O «agarra». El verbo hebreo puede sonar más abrupto; «apodérate de» conserva mejor en español el matiz marcial del mandato.
    reason: lexical_alternative
  - marker: c
    text: O «botín», «armadura» o «equipo». El hebreo חֲלִצָה probablemente se refiere a lo quitado a un combatiente, pero el objeto exacto no es seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטֵה
  english_pob_choice: Turn aside
  chosen_spanish: Desvíate
  alternatives_spanish:
  - Aparte
  - Gira a un lado
  - Desvíate de tu camino
  lexicon: HALOT
  rationale: En este contexto militar de persecución, נָטָה/נטה expresa apartarse de la trayectoria actual. «Desvíate» comunica mejor la idea de apartarse de una línea de avance que un simple «gira».
- source_word: עַל יְמִינְךָ אֹו עַל שְׂמֹאלֶךָ
  english_pob_choice: to your right or to your left
  chosen_spanish: hacia tu derecha o hacia tu izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - por tu derecha o por tu izquierda
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se conserva con «tu derecha... tu izquierda». «Hacia» reproduce bien la dirección indicada por עַל en este imperativo.
- source_word: וֶאֱחֹז לְךָ
  english_pob_choice: seize for yourself
  chosen_spanish: agarra para ti
  alternatives_spanish:
  - toma para ti
  - apodérate para ti
  - sujeta para ti
  lexicon: HALOT
  rationale: אחז tiene un rango de «asir/agarrar/tomar». En español, «agarra» mantiene el impulso inmediato del mandato; «para ti» conserva el matiz del beneficio personal del dativo.
- source_word: אֶחָד מֵהַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: a uno de los jóvenes
  alternatives_spanish:
  - a uno de los muchachos
  - a uno de los servidores
  - a uno de los soldados
  lexicon: HALOT
  rationale: «Jóvenes» sigue de cerca נְעָרִים sin forzar la especificación militar. En este relato puede implicar combatientes o asistentes, pero el hebreo no obliga a precisar más.
- source_word: וְקַח לְךָ אֶת חֲלִצָתוֹ
  english_pob_choice: take his spoil for yourself
  chosen_spanish: toma su despojo para ti
  alternatives_spanish:
  - toma su armadura para ti
  - toma su equipo para ti
  - toma su botín para ti
  lexicon: HALOT
  rationale: חֲלִצָה aquí designa lo quitado a un guerrero, probablemente su despojo o botín de combate. «Despojo» preserva esa amplitud sin fijar indebidamente si se trata de armadura, ropa o equipo.
- source_word: וְלֹא אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  - no quiso apartarse
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición. «No quiso» es natural en español y conserva la idea de falta de disposición sin añadir una dureza que el verbo por sí solo no exige.
- source_word: לָסוּר מֵאַחֲרָיו
  english_pob_choice: to turn aside from following him
  chosen_spanish: apartarse de seguirlo
  alternatives_spanish:
  - dejar de seguirlo
  - volverse atrás de tras él
  - desviarse de ir detrás de él
  lexicon: HALOT
  rationale: סור es «apartarse/retirarse/torcerse». «Apartarse de seguirlo» preserva la imagen del seguimiento en plena persecución y suena idiomático en español.
translation_notes:
  revision_awareness: La base inglesa revisada sustituyó «gear» por «spoil» para חֲלִצָה, priorizando precisión léxica en el contexto bélico. La versión española refleja esa revisión con «despojo» y mantiene la ambigüedad responsable del término hebreo.
  spanish_consistency_notes:
  - Se mantiene «Abner» y «Asael» conforme a la tradición de nombres propios en español bíblico.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente; el versículo no contiene nombres divinos.
  - La doble expresión «para ti» conserva el matiz del hebreo לְךָ en dos mandatos consecutivos.
  - «Apartarse de seguirlo» traduce la imagen de persecución sin convertirla en una paráfrasis más libre.
