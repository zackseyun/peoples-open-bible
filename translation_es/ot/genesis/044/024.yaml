translation:
  language: es
  text: Y cuando subimos[a] adonde estaba tu siervo, mi padre, le contamos las palabras de mi señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mi padre, tu siervo”. El orden hebreo es “a tu siervo, mi padre”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva acción consecutiva. En español, “Y cuando” conserva la relación temporal sin cargar con una perífrasis más pesada que no aporta precisión adicional.
- source_word: עָלִינוּ
  english_pob_choice: we went up
  chosen_spanish: subimos
  alternatives_spanish:
  - fuimos hacia arriba
  - regresamos
  lexicon: HALOT
  rationale: עלה conserva el movimiento de ascenso o subida; aquí el contexto geográfico es el viaje de regreso hacia Canaán desde Egipto. “Subimos” preserva ese valor idiomático en español natural.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición de dirección exige en español una solución simple y natural. “A” mantiene la relación direccional sin sobreexplicar.
- source_word: עַבְדְּךָ אָבִי
  english_pob_choice: your servant my father
  chosen_spanish: tu siervo, mi padre
  alternatives_spanish:
  - mi padre, tu siervo
  lexicon: HALOT
  rationale: Se conserva el orden hebreo básico y el matiz de deferencia. En español, la coma ayuda a evitar ambigüedad sintáctica y mantiene visible que Jacob es llamado “tu siervo” delante de la referencia a “mi padre”.
- source_word: וַנַּגֶּד
  english_pob_choice: we told
  chosen_spanish: le contamos
  alternatives_spanish:
  - le dijimos
  - le informamos
  lexicon: HALOT
  rationale: נגד en hifil significa hacer saber, contar o declarar. “Le contamos” es natural y conserva el acto de comunicar verbalmente sin endurecerlo a un registro burocrático.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo español “le” reproduce el objeto indirecto del hebreo y evita una formulación más pesada.
- source_word: אֵת דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - lo que dijo
  lexicon: HALOT
  rationale: דִּבְרֵי significa literalmente “palabras de”. “Las palabras de” mantiene la conexión formal con el contenido previamente dicho sin interpretar de más como “mensaje”.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - usted
  lexicon: HALOT
  rationale: Aquí אֲדֹנִי es un título de respeto humano, no el nombre divino. “Mi señor” conserva la cortesía y el rango del término, y es el equivalente más transparente en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título humano de respeto
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - usted
  rationale: El contexto es una conversación cortesana con José; no hay base para leer el término como referencia divina. “Mi señor” mantiene la deferencia explícita del hebreo y evita borrar el título.
  doctrine_reference: Uso honorífico de adoní en narración patriarcal; distinción entre títulos humanos y el nombre divino Yahvé.
translation_notes:
  revision_awareness: El texto inglés POB sigue de cerca el orden hebreo y conserva la alternativa de puntuación en una nota. En español se ha mantenido esa cercanía, con una puntuación que hace legible el doble referente (“tu siervo, mi padre”) sin perder la alternativa reconocida por el audit trail.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva “mi señor” para אֲדֹנִי por su carácter de título humano de respeto.
  - Se evita “regresamos” porque debilitaría la imagen de ‘subir’ asociada a עלה y al viaje a Canaán.
