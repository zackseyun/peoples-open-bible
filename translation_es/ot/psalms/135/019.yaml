lexical_decisions:
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: House of Israel
  chosen_spanish: Casa de Israel
  alternatives_spanish:
  - hogar de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: Conservo la construcción nominal literal para mantener el paralelismo poético con 'casa de Aarón' y el matiz colectivo/covenantal del hebreo.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendecid
  lexicon: HALOT
  rationale: El imperativo plural requiere una forma verbal exhortativa en español; 'bendigan' mantiene el valor de ברך en un contexto doxológico sin reducirlo a 'alaben'.
- source_word: אֶת יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el nombre divino יְהוָה. La pauta del proyecto para el texto español principal es 'Yahvé', preservando el nombre del pacto y evitando el ocultamiento litúrgico.
- source_word: בֵּית אַהֲרֹן
  english_pob_choice: house of Aaron
  chosen_spanish: casa de Aarón
  alternatives_spanish:
  - hogar de Aarón
  - descendencia de Aarón
  lexicon: HALOT
  rationale: Mantengo la frase constructa paralela a 'Casa de Israel'. 'Casa de Aarón' es transparente y conserva la referencia a la línea sacerdotal sin sobre-explicarla.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El audit trail inglés identifica el Tetragrama y opta por transliterarlo. En la serie española del POB, la convención proyectada es 'Yahvé', que preserva el nombre propio del Dios de pacto sin máscara editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] directamente en el texto principal y anclando la nota al término correspondiente. No se introdujeron notas huérfanas.
  spanish_consistency_notes:
  - 'Se mantuvo la capitalización de nombres propios: Casa de Israel, Aarón, Yahvé.'
  - Se usó el imperativo plural de cortesía/ustedes 'bendigan' para reflejar el plural hebreo.
  - La repetición de la cláusula se preserva para respetar la simetría poética del hebreo.
