translation:
  language: es
  text: Y dejaron allí sus ídolos[b], y David y sus hombres se los llevaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Crónicas 14:12 añade que David dio órdenes y que los ídolos fueron quemados. Aquí el hebreo de Samuel dice solo que David y sus hombres se los llevaron.
    reason: cross_reference
  - marker: b
    text: O «sus imágenes». El término hebreo se refiere a objetos de culto; «ídolos» hace explícito el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: they left
  chosen_spanish: dejaron
  alternatives_spanish:
  - abandonaron
  - dejaron atrás
  lexicon: HALOT
  rationale: עזב expresa aquí la acción de dejar algo en un lugar; en español, «dejaron» comunica de forma natural el acto narrativo sin añadir una matiz más fuerte como «abandonaron».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio locativo simple se rinde con «allí» para mantener la referencia espacial directa del hebreo.
- source_word: עֲצַבֵּיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  lexicon: HALOT
  rationale: El término puede significar imágenes cultuales, pero en este contexto bélico-religioso la carga negativa de «ídolos» expresa mejor el referente y el valor del sustantivo en español bíblico contemporáneo.
- source_word: וַיִּשָּׂאֵם
  english_pob_choice: carried them away
  chosen_spanish: se los llevaron
  alternatives_spanish:
  - los llevaron consigo
  - los cargaron
  lexicon: HALOT
  rationale: נשא puede significar llevar o transportar. «Se los llevaron» preserva el movimiento físico y el complemento pronominal, sin forzar un detalle de propósito que el hebreo no explicita.
- source_word: דָּוִד וַאֲנָשָׁיו
  english_pob_choice: David and his men
  chosen_spanish: David y sus hombres
  alternatives_spanish:
  - David y sus soldados
  - David y sus guerreros
  lexicon: HALOT
  rationale: אֲנָשָׁיו significa literalmente «sus hombres». «Sus hombres» es fiel, claro y mantiene la fórmula narrativa habitual sin introducir una identificación más interpretativa.
theological_decisions:
- issue: Relación con el paralelo de 1 Crónicas 14:12, que añade que los ídolos fueron quemados
  english_pob_reading: Traducir el texto masorético de 2 Samuel como 'carried them away' sin armonizar con Crónicas
  chosen_spanish_reading: 'Traducir 2 Samuel tal como está: «se los llevaron», y preservar en nota que Crónicas añade el dato de que fueron quemados'
  alternative_spanish_readings:
  - «se los llevaron para quemarlos»
  - «los tomaron y los quemaron»
  - «se los llevaron» con nota al paralelo
  rationale: La fidelidad al hebreo de Samuel requiere no importar un dato que pertenece al relato paralelo de Crónicas. La nota permite conservar la tensión textual y la armonización histórica sin alterar el verso traducido.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar tensiones textuales)
- issue: Valor de עֲצַבִּים en contexto
  english_pob_reading: '''idols'' makes the sense explicit'
  chosen_spanish_reading: «ídolos» hace explícito el sentido cultual negativo
  alternative_spanish_readings:
  - «imágenes»
  - «figuras»
  rationale: En español, «ídolos» comunica mejor el carácter de objeto de culto falso. «Imágenes» sería más literal pero menos claro para el lector moderno; además podría suavizar indebidamente la condena implícita.
  doctrine_reference: Lexical transparency and contextual specificity
translation_notes:
  revision_awareness: Sin cambios respecto al último pase auditado; la revisión más reciente indicó que no era necesario modificar la propuesta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se prefirió «ídolos» para עֲצַבִּים por transparencia semántica, coherente con el POB inglés.
  - Se evitó armonizar el texto de Samuel con Crónicas dentro del cuerpo principal; la diferencia queda documentada en nota.
  - La construcción «se los llevaron» conserva el objeto pronominal y el sentido de transporte físico mejor que una simple traducción con «los tomaron».
