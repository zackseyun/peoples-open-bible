translation:
  language: es
  text: Y junto a ellos hicieron reparaciones los tecoítas, pero sus nobles no quisieron poner su cuello[a] a la obra de sus señores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no llevaron su cuello a la obra de sus señores», un modismo que expresa negarse a someterse o a asumir la labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל־יָדָם
  english_pob_choice: And next to them
  chosen_spanish: Y junto a ellos
  alternatives_spanish:
  - Y al lado de ellos
  - Y a su lado
  lexicon: HALOT
  rationale: La expresión indica cercanía y secuencia en la lista de obras; «junto a ellos» comunica esa relación de manera natural en español sin perder el valor espacial del hebreo.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones
  alternatives_spanish:
  - repararon
  - fortalecieron
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo se usa para la labor concreta de restaurar la muralla; «hicieron reparaciones» refleja bien ese sentido contextual y mantiene el estilo de registro de la lista.
- source_word: הַתְּקוֹעִים
  english_pob_choice: the Tekoites
  chosen_spanish: los tecoítas
  alternatives_spanish:
  - los hombres de Tecoa
  lexicon: HALOT
  rationale: El gentilicio se puede verter de forma directa con «tecoítas», forma breve y comprensible que preserva la identidad ligada a Tecoa.
- source_word: וְאַדִּירֵיהֶם
  english_pob_choice: their nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus principales
  - sus líderes
  lexicon: HALOT
  rationale: אַדִּיר aquí designa personas prominentes o poderosas en el ámbito local. «Nobles» conserva bien esa referencia social sin sobreinterpretar.
- source_word: לֹא הֵבִיאוּ צַוָּרָם
  english_pob_choice: would not put their necks
  chosen_spanish: no pusieron su cuello
  alternatives_spanish:
  - no inclinaron su cuello
  - no llevaron su cuello
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y literalmente habla del cuello; la traducción preserva esa tensión metafórica, que alude a negarse a someterse o a cargar con el trabajo.
- source_word: בַּעֲבֹדַת
  english_pob_choice: to the work
  chosen_spanish: a la obra
  alternatives_spanish:
  - al trabajo
  - al servicio
  lexicon: HALOT
  rationale: En este contexto, עֲבֹדָה se refiere a la labor de reconstrucción. «Obra» suena natural en español bíblico y mantiene el carácter concreto del encargo.
- source_word: אֲדֹנֵיהֶם
  english_pob_choice: their lords
  chosen_spanish: de sus señores
  alternatives_spanish:
  - de sus amos
  - de sus superiores
  lexicon: HALOT
  rationale: El plural de אָדוֹן exige preservar una referencia humana plural. «Señores» traduce con fidelidad la relación de autoridad sin convertirla en una referencia divina singular.
theological_decisions:
- issue: Sentido de la expresión final sobre los «señores»
  english_pob_reading: human superiors/officials connected with the rebuilding effort
  chosen_spanish_reading: autoridades humanas vinculadas con la tarea de reconstrucción
  alternative_spanish_readings:
  - el Señor en sentido divino
  - sus amos en sentido de esclavitud literal
  rationale: El hebreo usa un plural posesivo y el contexto de la lista de obras apunta a responsables humanos del proyecto, no a una referencia al Señor divino. La traducción evita armonizar indebidamente el plural con un singular teológico.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Nehemías 3:5 y coincide sustancialmente con la decisión auditada en inglés: cercanía espacial, labor de reparación, gentilicicio tecoíta, nobles locales y la imagen idiomática del cuello sin suavizarla. No se detectaron revisiones aplicadas en el expediente; se mantiene la lectura alta en concordancia.'
  spanish_consistency_notes:
  - Se prefirió «Y junto a ellos» para la fórmula de vecindad en la secuencia narrativa.
  - «Hicieron reparaciones» conserva el valor funcional del verbo en el capítulo 3.
  - «Sus nobles» y «de sus señores» mantienen la relación social plural del hebreo.
  - Se conservó la metáfora del cuello mediante una nota para no borrar la tensión idiomática.
