translation:
  language: es
  text: 'Y les seguía recordando la Escritura de Isaías que dice[a]: «Aunque pases por fuego, una llama no te quemará.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cita remite a Isaías 43:2, pero 4 Macabeos sigue aquí su propia formulación griega: «una llama no te quemará».'
    reason: cross_reference
lexical_decisions:
- source_word: ὑπεμίμνησκεν
  english_pob_choice: he kept reminding
  chosen_spanish: les seguía recordando
  alternatives_spanish:
  - les recordaba
  - les iba recordando
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción շարունակada o repetida; «seguía recordando» conserva esa fuerza iterativa en español natural.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - os
  lexicon: LSJ
  rationale: En español, el complemento indirecto plural mantiene el sentido de dirigirse a los oyentes; «les» es neutro y sobrio para registro bíblico contemporáneo.
- source_word: τὴν Ἡσαΐου γραφὴν
  english_pob_choice: the Scripture of Isaiah
  chosen_spanish: la Escritura de Isaías
  alternatives_spanish:
  - el escrito de Isaías
  - el pasaje de Isaías
  lexicon: LSJ
  rationale: «γραφή» en este contexto judío se refiere a Escritura sagrada, no a un escrito cualquiera. «Escritura de Isaías» conserva esa referencia y el vínculo profético.
- source_word: τὴν λέγουσαν
  english_pob_choice: that says
  chosen_spanish: que dice
  alternatives_spanish:
  - que afirma
  - la cual dice
  lexicon: LSJ
  rationale: La construcción atributiva se vierte de manera natural como «que dice», sin perder la fórmula introductoria de cita.
- source_word: Κἂν
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aunque aun
  - Si aun
  lexicon: LSJ
  rationale: «Aunque» transmite bien el valor concesivo del condicional griego en esta cita, con más naturalidad que una traducción demasiado literal.
- source_word: διὰ πυρὸς διέλθῃς
  english_pob_choice: you pass through fire
  chosen_spanish: pases por el fuego
  alternatives_spanish:
  - pases por fuego
  - atravieses el fuego
  lexicon: LSJ
  rationale: «Pasar por el fuego» reproduce la imagen de atravesar una prueba intensa; el artículo puede omitirse o incluirse en español según estilo, y aquí «el fuego» suena más fluido y bíblico sin forzar la sintaxis.
- source_word: φλὸξ
  english_pob_choice: a flame
  chosen_spanish: la llama
  alternatives_spanish:
  - una llama
  - la flama
  lexicon: LSJ
  rationale: En español, «la llama» mantiene la imagen singular y poética. El griego puede sonar indefinido, pero aquí el valor retórico funciona bien con artículo definido en español como referencia a la llama mencionada en contraste con el fuego anterior.
- source_word: οὐ κατακαύσει σε
  english_pob_choice: will not burn you
  chosen_spanish: no te quemará
  alternatives_spanish:
  - no te consumirá
  - no te abrasará
  lexicon: LSJ
  rationale: «κατακαίω» puede implicar quemar o consumir; en esta alusión isaiana, «quemará» expresa adecuadamente la protección frente al fuego sin exagerar hacia «consumirá».
theological_decisions:
- issue: Cita de Isaías con forma griega propia de 4 Macabeos
  english_pob_reading: Translate the Greek citation as given in 4 Maccabees rather than conforming it to a traditional English form of Isaiah.
  chosen_spanish_reading: Traducir la cita tal como aparece en 4 Macabeos, sin armonizarla con una versión tradicional fija de Isaías.
  alternative_spanish_readings:
  - Ajustarla a una formulación bíblica más conocida de Isaías
  - Sustituir la cita por una redacción litúrgica tradicional
  rationale: La fidelidad auditiva exige seguir la forma concreta del griego de 4 Macabeos, aunque remita a Isaías 43:2. Por eso se mantiene «la llama no te quemará» en lugar de una versión tradicional distinta.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
- issue: Valor aspectual del imperfecto ὑπεμίμνησκεν
  english_pob_reading: Express iterative/continuous force with 'kept reminding.'
  chosen_spanish_reading: Expresar fuerza iterativa o continuada con «seguía recordando».
  alternative_spanish_readings:
  - «recordaba» en pasado simple
  - «estaba recordando»
  rationale: El imperfecto sugiere una acción en curso o repetida. «Seguía recordando» preserva ese matiz sin sonar artificial en español.
  doctrine_reference: Translation philosophy §5, consistency/documented exception
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente; no se requieren cambios sustantivos respecto del apunte auditado. Se mantiene la forma griega propia de 4 Macabeos y el matiz iterativo del imperfecto.
  spanish_consistency_notes:
  - Se conserva «Escritura» para γραφή en sentido bíblico/sagrado.
  - Se traduce la cita según el griego de 4 Macabeos y no se armoniza con una redacción estándar de Isaías.
  - «La llama» se usa para φλὸξ por claridad y naturalidad en español, manteniendo la imagen singular.
  - «Seguía recordando» refleja la continuidad del imperfecto ὑπεμίμνησκεν.
