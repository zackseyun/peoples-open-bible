translation:
  language: es
  text: Que Dios apresure[a] su misericordia sobre Israel. Él nos rescatará de la impureza de enemigos profanos[c][b]. El Señor mismo es nuestro rey por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego abre con un infinitivo que aquí se entiende de manera idiomática como una petición o deseo: «Que Dios apresure...».'
    reason: alternative_reading
  - marker: b
    text: O «contaminación» en lugar de «impureza».
    reason: lexical_alternative
  - marker: c
    text: O «enemigos impíos» en lugar de «enemigos profanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχύναι
  english_pob_choice: hasten
  chosen_spanish: apresure
  alternatives_spanish:
  - acelere
  - dé prisa a
  lexicon: BDAG
  rationale: El infinitivo griego funciona aquí como una petición o deseo. En español, «Que Dios apresure...» conserva ese valor de súplica sin volverlo mecánico ni demasiado literal.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia fiel
  - compasión
  lexicon: BDAG
  rationale: «Misericordia» es la equivalencia directa y natural en español para ἔλεος en este contexto, y mantiene el tono de favor compasivo de Dios hacia Israel.
- source_word: ῥύσεται
  english_pob_choice: will rescue
  chosen_spanish: nos rescatará
  alternatives_spanish:
  - nos librará
  - nos salvará
  lexicon: BDAG
  rationale: «Rescatará» reproduce bien la idea de liberación activa frente a un peligro o estado opresivo, y suena natural en español actual.
- source_word: ἀκαθαρσίας
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: BDAG
  rationale: «Impureza» conserva el campo semántico cultual y moral de ἀκαθαρσία sin sonar excesivamente técnico. En español suena más natural que «inmundicia» en este registro.
- source_word: βεβήλων
  english_pob_choice: profane
  chosen_spanish: profanos
  alternatives_spanish:
  - impíos
  - irreverentes
  lexicon: BDAG
  rationale: «Profanos» mantiene la idea de lo no consagrado, irreverente o impío. En español bíblico es una opción precisa y comprensible.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene la equivalencia tradicional de κύριος como «Señor». Aquí el texto afirma el reinado de Dios como rey de Israel.
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - por los siglos y aún más
  - por siempre jamás
  lexicon: BDAG
  rationale: La fórmula intensiva griega se refleja con una duplicación solemne en español. «Por siempre y para siempre» reproduce el énfasis de duración continua y más allá.
theological_decisions:
- issue: Valor oracional del infinitivo inicial
  english_pob_reading: 'A prayer-like wish: ''May God hasten his mercy upon Israel.'''
  chosen_spanish_reading: «Que Dios apresure su misericordia sobre Israel.»
  alternative_spanish_readings:
  - «Dios apresure su misericordia sobre Israel.»
  - «Ojalá Dios apresure su misericordia sobre Israel.»
  rationale: El griego abre con un infinitivo que, en contexto, expresa deseo/petición. En español, «Que Dios...» conserva ese matiz oracional y evita una traducción rígida.
  doctrine_reference: No aplica una doctrina específica; se trata de la fuerza pragmática de la forma verbal griega.
- issue: Relación entre pureza cultual y mal moral
  english_pob_reading: uncleanness of profane enemies
  chosen_spanish_reading: «la impureza de enemigos profanos»
  alternative_spanish_readings:
  - «la impureza de enemigos impíos»
  - «la contaminación de enemigos profanos»
  rationale: El griego une ἀκαθαρσία con βέβηλοι, combinando impureza y profanidad. El español conserva ambas dimensiones sin reducirlas a una sola idea.
  doctrine_reference: No aplica una doctrina específica; es una decisión semántica y cultual.
- issue: Duración final del reinado divino
  english_pob_reading: forever and ever
  chosen_spanish_reading: «por siempre y para siempre»
  alternative_spanish_readings:
  - «por los siglos y por los siglos»
  - «por siempre y para siempre, y aún más»
  rationale: La forma griega intensifica la eternidad con καὶ ἔτι ('y aún/más'). La duplicación española transmite ese énfasis sin añadir contenido ajeno.
  doctrine_reference: Doctrina bíblica del reinado eterno de Dios.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que ajustó la clausula final a «forever and ever» para reflejar πλήρως la intensificación de εἰς τὸν αἰῶνα καὶ ἔτι. La traducción española adoptó una duplicación equivalente («por siempre y para siempre»), manteniendo el cierre solemne. También se respetó la decisión de leer la apertura como deseo/petición, no como indicativo simple.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como máscara; se usó «Señor» para Κύριος.
  - Se mantuvo «Israel» sin artículo adicional, siguiendo el referente directo del griego.
  - 'Se preservó la tensión entre impureza cultual y profanidad moral con dos términos distintos: «impureza» y «profanos».'
  - La solución «Que Dios...» evita calco sintáctico excesivo y conserva el tono de súplica del original.
