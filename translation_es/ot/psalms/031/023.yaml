translation:
  language: es
  text: 'En cuanto a mí, yo dije en mi alarma[a]: «He sido excluido de delante de tus ojos[b]». Pero tú escuchaste la voz de mis ruegos cuando clamé a ti por ayuda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en mi prisa». El hebreo puede denotar prisa, agitación o pánico.
    reason: lexical_alternative
  - marker: b
    text: 'O «de tu vista». Literalmente: «de delante de tus ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחָפְזִי
  english_pob_choice: in my alarm
  chosen_spanish: en mi alarma
  alternatives_spanish:
  - en mi prisa
  - en mi angustia
  - en mi pánico
  lexicon: HALOT
  rationale: חפז puede abarcar prisa, agitación o pánico. En este lamento, el sentido no es solo rapidez temporal sino sobresalto interior. «En mi alarma» conserva esa carga emocional de manera natural en español; «en mi prisa» sigue siendo una alternativa posible pero menos precisa para el tono del verso.
- source_word: נִגְרַזְתִּי
  english_pob_choice: I am cut off
  chosen_spanish: estoy apartado
  alternatives_spanish:
  - estoy cortado
  - fui cortado
  - soy arrojado lejos
  lexicon: HALOT
  rationale: El nifal de גזר aquí comunica ser separado o removido. «Estoy apartado» mantiene la idea de separación sin sonar áspero en español. «Cortado» preserva la fuerza literal, pero «apartado» resulta más claro y publicable sin perder el sentido de exclusión del contexto.
- source_word: מִנֶּגֶד עֵינֶיךָ
  english_pob_choice: from before your eyes
  chosen_spanish: de delante de tus ojos
  alternatives_spanish:
  - de tu vista
  - de delante de tu presencia
  lexicon: HALOT
  rationale: La expresión es literalmente «de delante de tus ojos». «De delante de tus ojos» conserva la imagen concreta del hebreo y sugiere la idea relacional de quedar fuera de la mirada/favor divinos. «De tu vista» es una opción más idiomática, pero menos fiel a la metáfora espacial.
- source_word: אָכֵן
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Ciertamente
  - De veras
  lexicon: HALOT
  rationale: Aquí אָכֵן introduce contraste entre la conclusión temerosa del hablante y la realidad de la respuesta divina. «Pero» transmite bien ese giro adversativo en español contemporáneo. «Sin embargo» también sería posible, aunque algo más pesado en una lectura poética.
- source_word: קוֹל תַּחֲנוּנַי
  english_pob_choice: the sound of my pleas
  chosen_spanish: la voz de mis ruegos
  alternatives_spanish:
  - el sonido de mis ruegos
  - la voz de mis súplicas
  - mis ruegos
  lexicon: HALOT
  rationale: קוֹל es «voz» o «sonido», y תַּחֲנוּנִים son ruegos/plegarias de súplica. «La voz de mis ruegos» conserva ambos elementos en un español digno y bíblico. «Súplicas» sería posible, pero «ruegos» suena más directo y menos técnico que «súplicas».
- source_word: בְּשַׁוְּעִי אֵלֶיךָ
  english_pob_choice: when I cried to you for help
  chosen_spanish: cuando clamé a ti por ayuda
  alternatives_spanish:
  - cuando te clamé
  - cuando te llamé por ayuda
  - al clamar a ti
  lexicon: HALOT
  rationale: La forma verbal expresa un clamor dirigido a Dios. «Clamé a ti por ayuda» reproduce esa dirección y la finalidad implícita del verbo. «Clamé» es más solemne que «grité» y más fiel al registro del salmo; «por ayuda» explicita la fuerza idiomática del hebreo sin excederla.
- source_word: וַאֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo
  - Yo, por mi parte
  - Pero yo
  lexicon: HALOT
  rationale: La partícula enfática introduce contraste personal. «En cuanto a mí» refleja bien ese valor discursivo en español y evita un calco demasiado duro de «Y yo». La alternativa «Yo, por mi parte» es correcta, pero menos compacta poéticamente.
theological_decisions:
- issue: Tensión entre la percepción de abandono y la respuesta real de Dios
  english_pob_reading: 'The first clause preserves the psalmist’s felt conclusion (''I am cut off from before your eyes'') while the second corrects it: God heard his pleas.'
  chosen_spanish_reading: 'El primer miembro conserva la percepción del salmista de haber quedado apartado «de delante de tus ojos», y el segundo corrige esa impresión: Dios sí escuchó sus ruegos.'
  alternative_spanish_readings:
  - Dios me rechazó
  - Creí que me habías rechazado
  rationale: El hebreo expresa una vivencia subjetiva, no una declaración doctrinal explícita de rechazo definitivo. La traducción mantiene la tensión entre lo que el orante sintió y lo que en realidad ocurrió, sin intensificar indebidamente la acusación contra Dios ni suavizar el dolor del hablante.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Texto revisado a la luz del audit trail inglés; sin cambios de revisión adicionales indicados en la fuente. Se mantuvo el contraste entre la percepción del salmista y la respuesta efectiva de Dios.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como forma estándar cuando corresponda en el proyecto, pero en este verso el hebreo y el audit trail enfatizan el sufijo pronominal de segunda persona, por lo que el texto usa «tus ojos» y «a ti».
  - 'Se mantuvo un registro poético-natural: «ruegos» para תַּחֲנוּנִים y «clamé» para שַׁוְּעִי, evitando términos eclesiásticos más rígidos.'
  - Se prefirió «apartado de delante de tus ojos» para no perder la imagen espacial del hebreo ni borrar la tensión teológica documentada.
