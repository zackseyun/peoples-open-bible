id: LEV.25.33
reference: Leviticus 25:33
source:
  edition: WLC
  text: וַ/אֲשֶׁ֤ר יִגְאַל֙ מִן הַ/לְוִיִּ֔ם וְ/יָצָ֧א מִמְכַּר בַּ֛יִת וְ/עִ֥יר אֲחֻזָּת֖/וֹ בַּ/יֹּבֵ֑ל כִּ֣י בָתֵּ֞י עָרֵ֣י הַ/לְוִיִּ֗ם הִ֚וא אֲחֻזָּתָ֔/ם בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And if one of the Levites redeems it[a], then the sale of the house in the city of his possession shall be released in the Jubilee[b]; for the houses of the cities of the Levites are their possession among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall go out' or 'shall revert' in the Jubilee; the Hebrew is literally 'shall go out,' referring to the sold property leaving the buyer's possession and returning.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: As for one who
  alternatives:
  - and whoever
  - whoever
  lexicon: HALOT
  rationale: Introduces a conditional/relative case. 'As for one who' gives natural English while preserving the casuistic force of the Hebrew construction.
- source_word: יִגְאַל
  chosen: redeems
  alternatives:
  - buys back
  - exercises redemption
  lexicon: HALOT
  rationale: גאל in this legal context refers to redemption or buy-back of property. 'Redeems' preserves the technical covenant-legal sense better than the more colloquial 'buys back'.
- source_word: מִן הַלְוִיִּם
  chosen: from the Levites
  alternatives:
  - from among the Levites
  lexicon: HALOT
  rationale: 'The preposition מן here marks source: the redemption concerns property belonging to Levites. ''From the Levites'' is the most direct rendering.'
- source_word: וְיָצָא
  chosen: shall be released
  alternatives:
  - shall go out
  - shall revert
  lexicon: HALOT
  rationale: Literally 'and it shall go out,' but in context of property law and Jubilee the sense is that the sold property leaves the buyer's possession and returns. 'Shall be released' is idiomatic and close to the legal effect without over-paraphrasing.
- source_word: מִמְכַּר
  chosen: the sale
  alternatives:
  - what was sold
  - the sold property
  lexicon: HALOT
  rationale: The noun denotes the thing sold or the sale transaction. With the following nouns, English reads best as 'the sale of a house...' while retaining the legal-commercial sense.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - house
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: וְעִיר אֲחֻזָּתוֹ
  chosen: in the city of his possession
  alternatives:
  - and the city of his possession
  - in his hereditary city
  lexicon: HALOT
  rationale: The syntax is compressed. In context with the previous verse and the legal topic, this refers to a house located in a Levitical city that is his holding. Rendering with 'in' makes the relationship clear in English without changing the legal sense.
- source_word: בַּיֹּבֵל
  chosen: in the Jubilee
  alternatives:
  - in the year of Jubilee
  - at the Jubilee
  lexicon: HALOT
  rationale: Refers to the Jubilee occasion/year when property reverts. 'In the Jubilee' is concise and natural; capitalization marks the technical institution.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the rule.
- source_word: בָתֵּי עָרֵי הַלְוִיִּם
  chosen: the houses of the cities of the Levites
  alternatives:
  - the houses in the cities of the Levites
  - the houses of the Levitical cities
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the construct chain. 'Levitical cities' is possible but slightly more interpretive; the chosen wording stays closer to the Hebrew.
- source_word: הִוא אֲחֻזָּתָם
  chosen: are their possession
  alternatives:
  - are their property
  - are their hereditary possession
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes landed holding/possession, often hereditary. 'Possession' preserves the legal term and avoids over-specifying inheritance where the context already implies it.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the people of Israel
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy, בְּנֵי יִשְׂרָאֵל is rendered 'sons of Israel' rather than a gender-neutral paraphrase. This preserves the conventional covenantal designation while remaining understandable.
