  text: וַ/יָּ֣קָם יוֹנָ֗ה וַ/יֵּ֛לֶךְ אֶל נִֽינְוֶ֖ה כִּ/דְבַ֣ר יְהוָ֑ה וְ/נִֽינְוֵ֗ה הָיְתָ֤ה עִיר גְּדוֹלָה֙ לֵֽ/אלֹהִ֔ים מַהֲלַ֖ךְ שְׁלֹ֥שֶׁת יָמִֽים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jonah/003/003.yaml
  text: So Jonah arose and went to Nineveh[a], according to the word of Yahweh. Now Nineveh was an exceedingly great city before God[b], a journey of three days.
  footnotes:
  - marker: a
    text: Or 'an exceedingly great city'; the Hebrew literally says 'a great city to/before God,' an idiom that may express superlative greatness.
    reason: alternative_reading
  - marker: b
    text: Or 'three days' journey.' The phrase may describe the time needed to traverse the city or to complete a visit through it.
    reason: lexical_alternative
