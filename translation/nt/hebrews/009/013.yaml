id: HEB.9.13
reference: Hebrews 9:13
source:
  edition: SBLGNT
  text: εἰ γὰρ τὸ αἷμα ⸂τράγων καὶ ταύρων⸃ καὶ σποδὸς δαμάλεως ῥαντίζουσα τοὺς κεκοινωμένους ἁγιάζει πρὸς τὴν τῆς σαρκὸς καθαρότητα,
translation:
  text: For if the blood of goats and bulls[a], and the ashes of a heifer that sprinkle those who have been defiled, sanctify for the purification of the flesh[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who have become unclean'; the Greek refers to ritual defilement.
    reason: lexical_alternative
  - marker: b
    text: That is, purification in an outward, bodily sense under the old covenant rites.
    reason: cultural_note
  - marker: c
    text: An allusion to the purification rite involving the ashes of a heifer in Numbers 19.
    reason: cross_reference
  - marker: d
    text: Or 'the ashes of a heifer sprinkling those who have been defiled'.
    reason: previous_rendering
lexical_decisions:
- source_word: αἷμα
  chosen: blood
  alternatives:
  - bloodshed
  lexicon: BDAG
  rationale: Literal cultic reference in a sacrificial context; 'blood' is the natural and precise rendering.
- source_word: τράγων καὶ ταύρων
  chosen: of goats and bulls
  alternatives:
  - of male goats and bulls
  lexicon: BDAG
  rationale: Genitives depend on 'blood.' 'Goats and bulls' is idiomatic English and matches sacrificial terminology; 'male goats' is more explicit but unnecessary here.
- source_word: σποδὸς δαμάλεως
  chosen: the ashes of a heifer
  alternatives:
  - the ashes of a young cow
  lexicon: BDAG
  rationale: Alludes to the red heifer rite (Num 19). 'Heifer' is the established and accurate cultic term for a young female bovine, preserving the OT connection better than 'young cow.'
- source_word: ῥαντίζουσα
  chosen: sprinkling
  alternatives:
  - that are sprinkled on
  - for sprinkling
  lexicon: BDAG
  rationale: Present participle modifying 'ashes.' Rendering it as 'sprinkling' preserves the participial force and the ritual action without over-expanding the syntax.
- source_word: τοὺς κεκοινωμένους
  chosen: those who have been defiled
  alternatives:
  - those who have become unclean
  - the ceremonially unclean
  lexicon: BDAG
  rationale: κοινόω here refers to ritual defilement/uncleanness. 'Defiled' is concise and serious; the perfect participle is reflected by 'have been defiled.' 'Ceremonially unclean' is interpretively helpful but more expansive than the Greek.
- source_word: ἁγιάζει
  chosen: sanctify
  alternatives:
  - make holy
  - consecrate
  lexicon: BDAG
  rationale: Retains the cultic/theological register of ἁγιάζω and fits the argument contrasting external ritual efficacy with Christ's greater cleansing in the following verse.
- source_word: πρὸς τὴν τῆς σαρκὸς καθαρότητα
  chosen: for the purification of the flesh
  alternatives:
  - for outward purification
  - for bodily cleansing
  lexicon: BDAG
  rationale: καθαρότης is 'purity/purification'; with σάρξ in this ritual context, 'flesh' refers to external bodily/cultic sphere, not sinful nature. The phrase is kept fairly literal to preserve the contrast with conscience in v. 14.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  - outward person
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' when literal. Here it denotes external, bodily, ritual purity rather than moral corruption, so 'flesh' best preserves the lexical link and theological contrast.
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For since
  lexicon: BDAG
  rationale: Standard inferential and conditional opening. 'For if' preserves the argumentative flow into the comparison completed in the next verse.
