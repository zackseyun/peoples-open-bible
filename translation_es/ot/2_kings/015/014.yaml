translation:
  language: es
  text: Entonces Menajem hijo de Gadi subió de Tirsa y llegó a Samaria, y derribó a Salum hijo de Jabés en Samaria, y le dio muerte, y reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  - subió hacia
  lexicon: HALOT
  rationale: עלה conserva la imagen de movimiento ascendente; «subió» es la correspondencia natural en español y no añade una intención militar que el hebreo no explicita por sí mismo.
- source_word: מְנַחֵם בֶּן גָּדִי
  english_pob_choice: Menahem son of Gadi
  chosen_spanish: Menahem hijo de Gadi
  alternatives_spanish:
  - Menahem, hijo de Gadi
  - Menahem, hijo de Gadí
  lexicon: convención onomástica bíblica
  rationale: Se conserva la filiación con «hijo de» y se transliteran los nombres propios de manera reconocible en español, sin españolizar indebidamente el nombre hebreo.
- source_word: מִתִּרְצָה
  english_pob_choice: from Tirzah
  chosen_spanish: desde Tirza
  alternatives_spanish:
  - de Tirza
  - desde Tirsá
  lexicon: HALOT
  rationale: מן marca origen; «desde» reproduce con claridad el punto de partida. «Tirza» sigue la forma habitual del topónimo en español bíblico.
- source_word: וַיָּבֹא שֹׁמְרוֹן
  english_pob_choice: came to Samaria
  chosen_spanish: vino a Samaria
  alternatives_spanish:
  - llegó a Samaria
  - entró en Samaria
  lexicon: HALOT
  rationale: בוא con topónimo puede expresar llegada. «Vino a Samaria» mantiene la sencillez narrativa del hebreo y evita precisar «entró» cuando el texto no lo exige.
- source_word: וַיַּךְ אֶת
  english_pob_choice: struck down
  chosen_spanish: hirió a
  alternatives_spanish:
  - golpeó a
  - atacó a
  - derribó a
  lexicon: HALOT
  rationale: נכה en este contexto real de asesinato comunica un golpe violento. En español, «hirió a» conserva la fuerza del acto sin introducir una formulación demasiado interpretativa; el contexto inmediato completa la idea de violencia mortal.
- source_word: שַׁלּוּם בֶּן יָבֵישׁ
  english_pob_choice: Shallum son of Jabesh
  chosen_spanish: Shallum hijo de Jabés
  alternatives_spanish:
  - Salum hijo de Jabés
  - Shallum, hijo de Jabés
  lexicon: convención onomástica bíblica
  rationale: Se conserva la forma tradicional transliterada «Shallum» y el topónimo/antroponimo «Jabés» en grafía castellana estándar para nombres bíblicos.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en medio de Samaria
  lexicon: HALOT
  rationale: La preposición ב indica localización. «En Samaria» es la forma más directa y preserva la repetición enfática del lugar en el versículo.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mató
  alternatives_spanish:
  - le dio muerte
  - lo hizo morir
  lexicon: HALOT
  rationale: El hiphil de מות es causativo, pero en español «lo mató» expresa con naturalidad la acción letal y evita una construcción más pesada. La secuencia con «hirió» ya indica el desenlace mortal.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: he reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en vez de él
  - ocupó su lugar como rey
  lexicon: HALOT
  rationale: מלך se traduce con el verbo «reinar». La expresión idiomática «en su lugar» reproduce bien la noción de sucesión tras la muerte del antecesor.
translation_notes:
  revision_awareness: El texto inglés base ya había sido revisado y mantenido sin cambios en el último pase; no se detectan notas textuales ni variantes que requieran anclajes adicionales en español para este versículo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente en este versículo, por lo que no hay decisión sobre YHWH.
  - Se usa un español bíblico moderno y claro, evitando arcaísmos como «hiriólo» o «matóle».
  - La repetición de Samaria se conserva para reflejar el énfasis locativo del hebreo.
  - Los nombres propios siguen una transliteración estable y legible para lectores de Biblia en español.
