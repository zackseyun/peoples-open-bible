  rationale: Se ajusta el referente principal a «sus hombres censados» para reflejar la decisión documentada de preservar el referente masculino del contexto censal. Se cambia «fueron» por «eran» para una formulación totalizadora más natural en español en este tipo de listado, sin alterar el sentido. La nota se mantiene, pero con una alternativa más idiomática que «sus numerados».
