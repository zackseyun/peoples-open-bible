translation:
  language: es
  text: 'Y dijeron: «No procedas con nosotros según nuestras maldades, sino según tu misericordia».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χρήσῃ
  english_pob_choice: deal
  chosen_spanish: procedas con nosotros
  alternatives_spanish:
  - trates con nosotros
  - obres con nosotros
  lexicon: LSJ
  rationale: El griego expresa la manera en que alguien se conduce respecto de otros. En español, «procedas con nosotros» conserva la idea relacional de tratar a alguien de cierta manera sin sonar demasiado mecánico; «trates con nosotros» es una alternativa válida, pero ligeramente más directa que el matiz contextual sugiere.
- source_word: κατὰ τὰς πονηρίας ἡμῶν
  english_pob_choice: according to our wickedness
  chosen_spanish: según nuestras maldades
  alternatives_spanish:
  - según nuestra maldad
  - conforme a nuestras malas acciones
  lexicon: LSJ
  rationale: El plural griego τὰς πονηρίας apunta a manifestaciones concretas de maldad. «Maldades» conserva mejor ese plural y el peso moral del texto que un singular abstracto. «Maldad» sería posible, pero atenúa la pluralidad de actos implícita.
- source_word: ἔλεός
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia fiel
  - compasión
  lexicon: LSJ
  rationale: ἔλεος puede traducirse por «misericordia» o «compasión». En español bíblico, «misericordia» comunica de forma clara el contraste entre lo merecido y el favor implorado, y mantiene la tensión penitencial del pasaje. «Compasión» es posible, pero menos directa en este contraste.
- source_word: Μὴ ἡμῖν χρήσῃ
  english_pob_choice: Do not deal with us
  chosen_spanish: No procedas con nosotros
  alternatives_spanish:
  - No trates con nosotros
  - No obres con nosotros
  lexicon: LSJ
  rationale: La petición negativa funciona como súplica directa. «No procedas con nosotros» evita un calco rígido y conserva la relación entre la acción divina y el trato recibido por el pueblo. «No trates con nosotros» también es natural, pero «procedas» mantiene mejor el carácter solemne de la súplica.
theological_decisions:
- issue: Contraste entre castigo merecido y misericordia implorada
  english_pob_reading: Render the contrast straightforwardly as a plea not to be treated according to their wickedness but according to God's mercy.
  chosen_spanish_reading: 'Mantener el contraste de manera directa: no ser tratados conforme a sus maldades, sino conforme a la misericordia de Dios implícita en el pronombre «tu».'
  alternative_spanish_readings:
  - su misericordia
  - tu compasión
  rationale: El griego contrapone de forma simple la conducta humana y la misericordia divina, sin añadir formulaciones doctrinales. En español conviene preservar esa tensión sin suavizarla ni ampliarla. El posesivo «tu» se refiere naturalmente a Dios en la oración, y conviene mantenerlo así en vez de explicitar 'de Dios' dentro del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y coincide sustancialmente con la solución inglesa auditada; no se requiere una revisión textual ni una nota de variante. Se ha preferido una formulación española natural que conserve el tono de súplica penitencial.
  spanish_consistency_notes:
  - Se usó «misericordia» para ἔλεος, coherente con el valor bíblico usual y con la traducción inglesa auditada.
  - Se mantuvo la pluralidad implícita de πονηρίας mediante «maldades» en plural.
  - No se añadió vocabulario eclesiástico ajeno al griego; el texto permanece sobrio y directo.
