translation:
  language: es
  text: Recuerda[a], Yahvé; date a conocer en el tiempo de nuestra aflicción, y anímame, oh Rey[b] que gobiernas sobre los dioses y sobre toda autoridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muéstrate» o «sé hecho conocido». El verbo griego γνώρισθητι permite más de una manera de expresar la petición de manifestación divina.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «oh Rey de los dioses». La expresión subraya la supremacía de Dios sobre todo poder o autoridad reclamada como divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: BDAG
  rationale: El imperativo de oración se expresa de forma natural en español con el reflexivo «acuérdate». Conserva el idiomático bíblico sin endurecerlo mecánicamente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Aunque el griego dice Κύριε, en el marco POB el vocativo divino remite al nombre divino. Según la convención del proyecto, se usa «Yahvé» en el texto principal, y no el título enmascarado «Señor».
- source_word: γνώρισθητι
  english_pob_choice: make yourself known
  chosen_spanish: date a conocer
  alternatives_spanish:
  - muéstrate
  - sé hecho conocido
  lexicon: BDAG
  rationale: El pasivo imperativo admite una fuerza reflexiva/de manifestación. «Date a conocer» reproduce bien la petición de revelación divina sin volverla torpemente literal.
- source_word: ἐν καιρῷ θλίψεως ἡμῶν
  english_pob_choice: in the time of our affliction
  chosen_spanish: en el tiempo de nuestra aflicción
  alternatives_spanish:
  - en el tiempo de nuestra angustia
  - en el momento de nuestra aflicción
  lexicon: BDAG
  rationale: «καιρός» pide un momento/tiempo determinado, y «θλῖψις» corresponde a «aflicción». La forma elegida mantiene el tono solemne y la precisión semántica.
- source_word: ἐμὲ θάρσυνον
  english_pob_choice: encourage me
  chosen_spanish: anímame
  alternatives_spanish:
  - dame valor
  - fortaléceme
  lexicon: BDAG
  rationale: El imperativo de θαρσύνω expresa aliento/valor. «Anímame» es conciso y natural en español, preservando la petición de fortalecimiento interior.
- source_word: Βασιλεῦ τῶν θεῶν
  english_pob_choice: O King who rules over the gods
  chosen_spanish: oh Rey que gobiernas sobre los dioses
  alternatives_spanish:
  - oh Rey de los dioses
  - oh Rey por encima de los dioses
  lexicon: BDAG
  rationale: La frase griega se conserva como título exaltado. En español, «gobiernas sobre» refleja la supremacía explícita sin suavizar la tensión teológica del original.
- source_word: πάσης ἀρχῆς ἐπικρατῶν
  english_pob_choice: who rules over every authority
  chosen_spanish: sobre toda autoridad
  alternatives_spanish:
  - sobre todo poder
  - sobre todo gobierno
  lexicon: BDAG
  rationale: El participio ἐπικρατῶν modifica al Rey y expresa dominio soberano. «Sobre toda autoridad» capta ἀρχή como potestad/autoridad y evita una redundancia innecesaria en español.
theological_decisions:
- issue: Tratamiento del vocativo Κύριε en un contexto de oración dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El texto griego usa el vocativo «Κύριε», pero la política del proyecto prioriza el nombre divino cuando el contexto es una apelación directa a Dios. Se evita el convencionalismo de traducirlo como «Señor» cuando eso ocultaría la referencia al nombre divino.
  doctrine_reference: 'Project terminology defaults: יהוה / YHWH -> Yahvé'
- issue: La expresión «Κing of the gods» / «gobiernas sobre los dioses» como afirmación de supremacía divina
  english_pob_reading: O King who rules over the gods and every authority
  chosen_spanish_reading: oh Rey que gobiernas sobre los dioses y sobre toda autoridad
  alternative_spanish_readings:
  - oh Rey de los dioses y de toda autoridad
  - oh Rey por encima de los dioses y de toda autoridad
  rationale: Se conserva la tensión léxica del original sin diluirla. La frase no afirma politeísmo, sino supremacía absoluta de Yahvé sobre cualquier poder pretendidamente divino o gobernante.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB, que ajustó el cierre para que ἐπικρατῶν modificara al Rey: «O King who rules over the gods and every authority». La versión española conserva ese encuadre sintáctico con «oh Rey que gobiernas sobre los dioses y sobre toda autoridad».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «Acuérdate» reproduce el uso oracional del imperativo de μιμνῄσκομαι sin pérdida de registro.
  - Se evita «Cristo» o terminología cristológica, porque el pasaje no la contiene.
  - «Autoridad» traduce ἀρχή en su sentido de poder/autoridad gobernante, coherente con el contexto.
  - La nota b preserva la tensión del literal griego sin borrar la lectura teológica del inglés POB.
