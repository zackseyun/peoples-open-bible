  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Justos», «adúlteras», «sangre» y el registro judicial están bien elegidos. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de no idiomatizar completamente «blood is on their hands» en el texto principal es defendible porque el hebreo dice literalmente «en sus manos», siempre que la nota explique la culpabilidad implícita.
