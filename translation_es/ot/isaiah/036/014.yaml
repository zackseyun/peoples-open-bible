  glossary_alignment: No hay términos del glosario mayor en juego salvo el nombre Ezequías, bien vertido en español eclesial usual. ‘Librarlos’ encaja con la decisión POB para הַצִּיל, pero debe preservarse la alternativa ‘rescatarlos’ en nota, como en inglés. ‘Engañe’ concuerda con la elección principal para יַשִּׁא, con nota alternativa ‘desvíe’.
