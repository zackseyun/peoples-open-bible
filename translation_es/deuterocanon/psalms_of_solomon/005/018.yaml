translation:
  language: es
  text: Bienaventurado[a][b] aquel de quien Dios se acuerda con suficiencia medida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bienaventurado aquel de quien Dios está consciente en debida medida de contentamiento»'
    reason: lexical_alternative
  - marker: b
    text: αὐτάρκεια también puede significar «contentamiento» o, más literalmente, «autosuficiencia».
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Afortunado
  lexicon: LSJ
  rationale: μακάριος es el término clásico de bienaventuranza; en español, «bienaventurado» conserva mejor el registro salmódico y teológico que «feliz» o «afortunado».
- source_word: οὗ
  english_pob_choice: the one whom
  chosen_spanish: aquel de quien
  alternatives_spanish:
  - el que
  - quien
  lexicon: Greek grammar
  rationale: El relativo genitivo depende de μνημονεύει. «Aquel de quien» mantiene la referencia personal y suena natural en español bíblico sin forzar la sintaxis.
- source_word: μνημονεύει
  english_pob_choice: remembers
  chosen_spanish: se acuerda
  alternatives_spanish:
  - recuerda
  - tiene presente
  lexicon: LSJ
  rationale: μνημονεύω puede significar recordar o tener presente; «se acuerda» comunica bien la idea de una memoria activa y relacional de Dios, sin sonar excesivamente abstracto.
- source_word: ἐν συμμετρίᾳ
  english_pob_choice: with measured
  chosen_spanish: con suficiente medida
  alternatives_spanish:
  - en debida medida
  - con moderación
  - proporcionalmente
  lexicon: LSJ
  rationale: συμμετρία expresa proporción, medida debida o moderación. «Con suficiente medida» intenta preservar la idea de una provisión ajustada, no excesiva, y enlaza bien con el sustantivo siguiente.
- source_word: αὐταρκίας
  english_pob_choice: sufficiency
  chosen_spanish: suficiente medida
  alternatives_spanish:
  - contentamiento
  - autosuficiencia
  - basteza
  lexicon: LSJ
  rationale: αὐτάρκεια puede significar suficiencia, contentamiento o autosuficiencia. En este contexto, donde Dios es el sujeto que actúa, «suficiente medida» evita sugerir independencia humana y mantiene la idea de tener lo necesario por disposición divina.
theological_decisions:
- issue: Sentido de αὐταρκίας aplicado a Dios
  english_pob_reading: The phrase refers to God granting enough in due measure.
  chosen_spanish_reading: La frase refiere a que Dios da lo necesario en la medida conveniente.
  alternative_spanish_readings:
  - La frase destaca el contentamiento interior
  - La frase sugiere autosuficiencia en sentido literal
  rationale: Como el sujeto es Dios, la lectura debe permanecer centrada en su provisión y cuidado. Traducirlo como autosuficiencia humana oscurecería el sentido del verso; por eso se opta por una formulación que conserva la suficiencia dada por Dios.
  doctrine_reference: Providencia divina; suficiencia provista por Dios
translation_notes:
  revision_awareness: El texto griego es breve y estable; se siguió de cerca la lectura auditada inglesa, pero se ajustó el cierre para preservar en español la relación entre συμμετρία y αὐτάρκεια sin introducir una idea de autosuficiencia humana.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, conforme al criterio base.
  - Se traduce μακάριος con «Bienaventurado», manteniendo el tono de beatitud.
  - Se evita «Señor» porque el texto griego no usa κύριος.
  - La nota al pie recoge la alternativa de «contentamiento», equivalente a la observación inglesa sobre αὐταρκία.
