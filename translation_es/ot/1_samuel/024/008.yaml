translation:
  language: es
  text: David contuvo a sus hombres con palabras y no les permitió levantarse contra Saúl[a]. Luego Saúl se levantó de la cueva y siguió su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reprendió severamente a sus hombres con palabras». El verbo hebreo es raro y puede llevar un sentido más fuerte que una simple contención.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁסַּע
  english_pob_choice: restrained
  chosen_spanish: contuvo
  alternatives_spanish:
  - reprendió severamente
  - los apartó
  - los frenó
  lexicon: HALOT
  rationale: El verbo hebreo es raro y fuerte. En este contexto el resultado concreto es que David impide una acción violenta de sus hombres; "contuvo" transmite una restricción enérgica sin imponer más imagen literal de la que el pasaje requiere. "Reprendió severamente" queda como alternativa porque el matiz verbal puede ser más áspero, como señaló el POB en inglés.
- source_word: אֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - sus servidores
  - su gente
  lexicon: HALOT
  rationale: Aquí el sustantivo se refiere a los seguidores varones de David en la cueva. "Sus hombres" es natural en español y conserva la precisión contextual del hebreo.
- source_word: בַּדְּבָרִים
  english_pob_choice: with words
  chosen_spanish: con palabras
  alternatives_spanish:
  - por medio de palabras
  - mediante palabras
  lexicon: HALOT
  rationale: 'La expresión es instrumental: David los detiene verbalmente. "Con palabras" reproduce bien el medio indicado por el hebreo y suena idiomático en español.'
- source_word: וְלֹא נְתָנָם
  english_pob_choice: did not allow them
  chosen_spanish: no les permitió
  alternatives_spanish:
  - no les dio permiso
  - no les concedió
  lexicon: HALOT
  rationale: נתן + infinitivo comunica permiso o autorización. "No les permitió" refleja con claridad esa relación causal y mantiene el sentido de la frase hebrea sin sobreexplicar.
- source_word: לָקוּם אֶל־שָׁאוּל
  english_pob_choice: to rise up against Saul
  chosen_spanish: levantarse contra Saúl
  alternatives_spanish:
  - alzarse contra Saúl
  - atacar a Saúl
  - ponerse contra Saúl
  lexicon: HALOT
  rationale: En este contexto hostil, קום con אֶל implica una acción agresiva contra Saúl. "Levantarse contra Saúl" preserva la imagen verbal y la fuerza adversativa, igual que la decisión inglesa del POB.
- source_word: קָם מֵהַמְּעָרָה
  english_pob_choice: rose from the cave
  chosen_spanish: se levantó de la cueva
  alternatives_spanish:
  - salió de la cueva levantándose
  - se puso en pie en la cueva
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo קום para Saúl. "Se levantó de la cueva" es natural en español y conserva el paralelismo narrativo.
- source_word: וַיֵּלֶךְ בַּדָּרֶךְ
  english_pob_choice: went on his way
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - se fue por el camino
  - siguió por el camino
  lexicon: HALOT
  rationale: La frase hebrea indica partida y continuación del viaje. "Siguió su camino" comunica bien ese valor narrativo en español, equivalente al inglés idiomático del POB.
translation_notes:
  revision_awareness: 'La versión española sigue el texto hebreo base y coincide sustancialmente con la decisión inglesa auditada: se conserva el verbo raro con una solución dinámica controlada, se mantiene la hostilidad de לָקוּם אֶל־שָׁאוּל como "levantarse contra Saúl", y se evita suavizar la secuencia narrativa de Saúl saliendo de la cueva y continuando su camino.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió "Saúl" sin artículos, conforme al uso narrativo bíblico en español.
  - La nota al pie se ancla en "contra Saúl" porque allí se concentra la alternativa lexical del verbo raro.
