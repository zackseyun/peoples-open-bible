translation:
  language: es
  text: Dichoso el hombre cuya boca[a] no lo hizo tropezar, y cuyo corazón no lo condenó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La primera cláusula es difícil en el hebreo transmitido; literalmente dice algo como «cuya boca no lo abandonó». El paralelo griego apoya el sentido de que no tropezó en su hablar.
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Happy is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT
  rationale: אַשְׁרֵי introduce una fórmula sapiencial de dicha/envidiable bienestar. «Dichoso» comunica bien ese valor en español bíblico contemporáneo sin sonar tan coloquial como «feliz» ni cargar de matiz eclesiástico a «bienaventurado».
- source_word: אֱנוֹשׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa un singular representativo masculino propio del estilo sapiencial. «El hombre» conserva esa forma y evita aplanar el perfil del sujeto a un neutro más general.
- source_word: לֹא עֲזָבוֹ פִיהוּ / οὐκ ὠλίσθησεν ἐν στόματι αὐτοῦ
  english_pob_choice: whose mouth has not caused him to stumble
  chosen_spanish: que no tropezó con su boca
  alternatives_spanish:
  - cuya boca no lo hizo tropezar
  - que no se desvió en su hablar
  - que no pecó con su boca
  lexicon: HALOT / LXX parallel
  rationale: El hebreo transmitido es difícil, y el griego apoya la idea de tropiezo en el habla. «Tropezó con su boca» mantiene la imagen verbal sin volverla mecánica, y conserva la ambigüedad entre el órgano de la խոսa y la acción de hablar.
- source_word: וְלֹא אָבַח עָלָיו דִּין לִבּוֹ / καὶ οὐ κατενύγη ἐν λύπῃ ἁμαρτίας
  english_pob_choice: whose heart has not condemned him
  chosen_spanish: cuyo corazón no lo reprendió
  alternatives_spanish:
  - cuyo corazón no lo condenó
  - cuya conciencia no lo reprochó
  lexicon: HALOT / Greek parallel
  rationale: La frase hebrea es incierta, y el griego sugiere una punzada/interioridad ligada al pecado. «Reprendió» conserva la idea de censura interior sin decidir demasiado fuerte entre condena, reproche o dolor de conciencia.
theological_decisions:
- issue: Beatitude sapiencial
  english_pob_reading: Happy is the man
  chosen_spanish_reading: Dichoso el hombre
  alternative_spanish_readings:
  - Bienaventurado el hombre
  - Feliz el hombre
  rationale: Se trata de una dicha sapiencial, no de una fórmula litúrgica de bendición. «Dichoso» expresa mejor el tono de proverbio/observación moral y su fuerza de estado afortunado.
  doctrine_reference: PHILOSOPHY.md; DOCTRINE.md §§4, 6
- issue: Cláusula hebrea difícil con apoyo griego
  english_pob_reading: whose mouth has not caused him to stumble ... whose heart has not condemned him
  chosen_spanish_reading: que no tropezó con su boca ... cuyo corazón no lo reprendió
  alternative_spanish_readings:
  - que no pecó con su boca ... cuyo corazón no lo acusó
  - que su boca no lo hizo tropezar ... y su conciencia no lo reprochó
  rationale: El testimonio hebreo presenta dificultades textuales; por eso se deja visible el sentido general de tropiezo verbal y reproche interior, sin introducir lecturas no atestiguadas en el texto base.
  doctrine_reference: User task requirement on parallel source use; translation philosophy
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al omitir cualquier equivalente explícito de «en la tristeza del pecado», porque esa frase no quedó representada en el hebreo base revisado. También adopta un registro más formal para la imagen de tropiezo, en línea con la corrección auditada hacia «stumble».
  spanish_consistency_notes:
  - Se usa «Dichoso» como equivalente estable de la beatitud sapiencial אַשְׁרֵי.
  - Se mantiene «el hombre» para conservar el singular representativo del hebreo.
  - «Tropezó con su boca» busca ser natural en español y a la vez dejar visible la metáfora del habla.
  - «Reprendió» preserva la ambigüedad entre reproche, condena y punzada interior.
  - No se introduce una glosa de «dolor/tristeza del pecado» en el texto principal, conforme a la revisión más reciente del expediente.
