  - marker: c
    text: 'O: «se consagraron como santos» o «se mantuvieron santos». El hebreo repite la idea de santidad con verbo y sustantivo para dar énfasis.'
    reason: lexical_alternative
  revision_rationale: Se añadió la nota faltante sobre la doble expresión de santidad y se redistribuyeron los marcadores para que coincidan con los puntos relevantes del texto. También se cambió 'se consagraron como santos' a 'se consagraron en santidad', que suena más natural en español y refleja mejor קֹדֶשׁ como sustantivo abstracto, sin perder el énfasis del hebreo.
