base_translation:
  language: en
  yaml_path: translation/ot/judges/016/012.yaml
  text: Then Delilah took new ropes and bound him with them[a], and said to him, “The Philistines are upon you, Samson!” Now the ambush was sitting in the inner room[c][b], but he snapped them from off his arms like a thread.
  footnotes:
  - marker: a
    text: Or 'cords' for 'ropes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one lying in wait was in the inner room.' The Hebrew uses a singular participle for the hidden watcher/ambush.
    reason: lexical_alternative
  - marker: c
    text: '''Inner room'' may also be rendered ''chamber.'''
    reason: lexical_alternative
