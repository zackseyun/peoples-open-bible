translation:
  language: es
  text: Y ahora ruega por nosotros,[a] porque eres una mujer piadosa, y el Señor enviará lluvia para llenar nuestras cisternas, y ya no estaremos en necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no nos faltará nada» o «ya no escasearemos». El griego dice literalmente: «no faltaremos más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεήθητι
  english_pob_choice: pray
  chosen_spanish: ruega
  alternatives_spanish:
  - ora
  - haz súplica
  - intercede
  lexicon: BDAG
  rationale: El imperativo de δέομαι aquí es una petición directa de intercesión. En español, «ruega por nosotros» mantiene el sentido religioso y la petición urgente con naturalidad.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - acerca de nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: Con verbos de petición e intercesión, περί expresa la idea de interceder en favor de alguien. «Por nosotros» es la forma más idiomática en español.
- source_word: γυνὴ εὐσεβὴς
  english_pob_choice: a devout woman
  chosen_spanish: una mujer piadosa
  alternatives_spanish:
  - una mujer devota
  - una mujer temerosa de Dios
  lexicon: BDAG
  rationale: εὐσεβής señala reverencia y piedad hacia Dios. «Piadosa» comunica bien esa cualidad en español bíblico sin sonar tan técnico como «devota» ni ampliar demasiado el sentido.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: 'Se sigue la convención del proyecto para κύριος en contexto bíblico-judaico: «el Señor». En español es la forma establecida y clara para esta referencia divina.'
- source_word: τὸν ὑετόν
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - la lluvia
  - agua
  lexicon: LSJ
  rationale: ὑετός significa lluvia. En español, el artículo puede omitirse por estilo natural; «enviará lluvia» reproduce bien la frase sin carga innecesaria.
- source_word: εἰς πλήρωσιν
  english_pob_choice: to fill
  chosen_spanish: para llenar
  alternatives_spanish:
  - a fin de llenar
  - para el llenado de
  lexicon: LSJ
  rationale: La preposición expresa finalidad/resultado. «Para llenar» es la solución española más natural y fiel al sentido.
- source_word: τῶν λάκκων ἡμῶν
  english_pob_choice: our cisterns
  chosen_spanish: nuestras cisternas
  alternatives_spanish:
  - nuestros pozos
  - nuestros depósitos
  - nuestros hoyos
  lexicon: LSJ
  rationale: Aunque λάκκος puede significar hoyo o foso, el contexto de lluvia y necesidad de agua apunta a un depósito para almacenarla. «Cisternas» preserva ese sentido contextual mejor que «hoyos».
- source_word: οὐκ ἐκλείψομεν ἔτι
  english_pob_choice: we will not perish any longer
  chosen_spanish: no pereceremos más
  alternatives_spanish:
  - ya no nos faltará nada
  - ya no escasearemos
  - no desfalleceremos más
  lexicon: BDAG
  rationale: ἐκλείπω puede expresar faltar, cesar o perecer según contexto. El texto habla de la desaparición de la escasez vinculada al agua; siguiendo la revisión inglesa, «no pereceremos más» recoge con mayor fuerza el resultado vital de la provisión divina.
theological_decisions:
- issue: Renderización de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Se mantiene la convención del proyecto para el término divino en este contexto, sin sustituirlo por una máscara ni por una transliteración del tetragrámaton en el texto base.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Sentido de οὐκ ἐκλείψομεν ἔτι en contexto de escasez
  english_pob_reading: we will not perish any longer
  chosen_spanish_reading: no pereceremos más
  alternative_spanish_readings:
  - ya no nos faltará nada
  - ya no escasearemos
  - no faltaremos más
  rationale: La revisión inglesa prefirió «perish» por reflejar mejor el giro final del griego en contexto. En español, «pereceremos» conserva esa fuerza, aunque quedan posibles lecturas de carencia o agotamiento que no se eliminan por completo.
  doctrine_reference: 'BDAG: ἐκλείπω — fail, give out, come to an end, be lacking'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del auditorio inglés, que cambió «fail» por «perish» para reflejar mejor οὐκ ἐκλείψομεν ἔτι en contexto. La redacción española incorpora esa preferencia con «no pereceremos más», manteniendo a la vez una nota que conserva la alternativa semántica de carencia/escasez presente en el verbo griego.
  spanish_consistency_notes:
  - Se usa «el Señor» para κύριος según la convención del proyecto.
  - Se eligió «cisternas» para λάκκοι por el contexto de almacenamiento de agua.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota al pie preserva la tensión entre «perecer» y «carecer/escasear» presente en ἐκλείπω.
