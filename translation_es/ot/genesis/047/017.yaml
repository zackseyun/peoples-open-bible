translation:
  language: es
  text: Entonces llevaron su ganado a José, y José les dio pan por los caballos, los rebaños, el ganado vacuno y los asnos; y los sostuvo con pan por todo su ganado[a] durante ese año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y los condujo con pan». El verbo hebreo puede significar «conducir, guiar, dirigir o administrar», pero en este contexto probablemente apunta a sustentarlos durante la hambruna.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵיהֶם / מִקְנֵהֶם
  english_pob_choice: their livestock / all their livestock
  chosen_spanish: sus ganados / todos sus ganados
  alternatives_spanish:
  - su ganado
  - sus animales domésticos
  - sus cabezas de ganado
  lexicon: HALOT
  rationale: מִקְנֶה denota ganado o bienes en animales adquiridos, de modo amplio. «Ganados» mantiene el sentido colectivo y permite repetir la idea totalizante al final del versículo.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: «Pan» conserva la forma léxica concreta del hebreo y funciona naturalmente en el contexto de hambre como sustento básico.
- source_word: בַּסּוּסִים
  english_pob_choice: for the horses
  chosen_spanish: por los caballos
  alternatives_spanish:
  - a cambio de los caballos
  - con los caballos
  lexicon: HALOT
  rationale: La preposición ב aquí marca el valor de intercambio. En español, «por» expresa de manera natural la equivalencia transaccional sin añadir más que el hebreo exige.
- source_word: מִקְנֵה הַצֹּאן
  english_pob_choice: the flocks
  chosen_spanish: los rebaños
  alternatives_spanish:
  - las ovejas
  - las majadas
  - los pequeños ganados
  lexicon: HALOT
  rationale: צֹאן es colectivo y puede incluir ovejas y cabras; «rebaños» preserva el carácter colectivo mejor que una reducción a «ovejas».
- source_word: מִקְנֵה הַבָּקָר
  english_pob_choice: the herds
  chosen_spanish: los hatos
  alternatives_spanish:
  - los rebaños de ganado
  - el ganado vacuno
  - las manadas
  lexicon: HALOT
  rationale: בָּקָר designa ganado mayor, especialmente bovinos. «Hatos» mantiene el paralelismo colectivo con «rebaños» sin forzar una especificación innecesaria.
- source_word: חֲמֹרִים
  english_pob_choice: the donkeys
  chosen_spanish: los asnos
  alternatives_spanish:
  - los burros
  - las mulas
  lexicon: HALOT
  rationale: «Asnos» es el equivalente directo y digno en español bíblico para חֲמֹרִים.
- source_word: וַיְנַהֲלֵם
  english_pob_choice: he supplied them
  chosen_spanish: los sostuvo
  alternatives_spanish:
  - los guio
  - los condujo
  - los manejó
  lexicon: HALOT
  rationale: El verbo נהל puede significar guiar, conducir o gestionar, pero aquí, con el pan como medio en un contexto de escasez, la idea resultante es que José los mantuvo/proveyó. «Los sostuvo» conserva esa fuerza contextual sin perder la ambigüedad del verbo.
- source_word: בַּלֶּחֶם
  english_pob_choice: with bread
  chosen_spanish: con pan
  alternatives_spanish:
  - por pan
  - mediante pan
  lexicon: HALOT
  rationale: La preposición indica el medio por el cual José los sostuvo. «Con pan» es directo y natural en español.
- source_word: בְּכָל מִקְנֵהֶם
  english_pob_choice: in exchange for all their livestock
  chosen_spanish: por todos sus ganados
  alternatives_spanish:
  - a cambio de todos sus ganados
  - por todo su ganado
  - en intercambio por todos sus ganados
  lexicon: HALOT
  rationale: La frase resume la transacción total. En español, el simple «por» comunica el intercambio sin recargar la frase; el contexto ya establece el trueque.
- source_word: בַּשָּׁנָה הַהִוא
  english_pob_choice: during that year
  chosen_spanish: durante ese año
  alternatives_spanish:
  - en aquel año
  - aquel año
  lexicon: HALOT
  rationale: La expresión temporal señala la duración del arreglo. «Durante ese año» suena natural y precisa en español contemporáneo.
theological_decisions:
- issue: 'La ambigüedad de וַיְנַהֲלֵם: ¿guiar o sustentar?'
  english_pob_reading: he provided for them / he supplied them
  chosen_spanish_reading: los sostuvo
  alternative_spanish_readings:
  - los guio
  - los condujo
  - los administró
  rationale: El contexto económico y la repetición de pan como medio favorecen una lectura de sostenimiento/provisión. «Los sostuvo» preserva la posibilidad semántica de dirigir/gestionar sin borrar el sentido de sustento que la POB inglesa destacó.
  doctrine_reference: No aplica; decisión lexicográfica-contextual.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del POB inglés, que aclaró la idea de intercambio total en la segunda mitad del versículo. Se mantiene la doble referencia al pan y al trueque, pero en español se evita una repetición innecesaria mediante «por» en ambos miembros, sin perder la relación transaccional que el hebreo sostiene.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere «ganados» para מִקְנֶה, manteniendo el sentido amplio de bienes en animales.
  - «Pan» se conserva para לֶחֶם por fidelidad léxica y por su naturalidad en el contexto de hambre.
  - «Sostuvo» intenta reflejar la tensión entre guiar y proveer en וַיְנַהֲלֵם, siguiendo el auditable matiz del inglés POB.
