review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «Y ahora», «Dios me ha enviado», y «para sanar» corresponden adecuadamente a καὶ νῦν, ἀπέστειλέν, e ἰάσασθαί. Sin embargo, «tu esposa» no preserva fielmente la relación semántica de νύμφη en este contexto, porque el destinatario es Tobit y Sara no es su esposa. El inglés POB eligió «your bride» como solución idiomática inglesa, pero en español «tu esposa» introduce una lectura incorrecta. Debe preferirse una formulación que preserve la apposición con «Sara» y deje la alternativa «tu nuera» en nota.'
  spanish_quality_summary: El español es claro y natural, pero «tu esposa» resulta engañoso e incluso incorrecto narrativamente. Además, «sanarte a ti» suena algo redundante; «sanarte» basta y mantiene fluidez. Una formulación como «sanarte a ti y a Sara, tu novia[a]» sigue siendo problemática por atribuir posesión directa a Tobit. La solución más legible y fiel es «sanarte a ti y a Sara[a]», con nota que explique «tu nuera» y el valor de νύμφη.
  glossary_alignment: No hay conflictos con la terminología base del proyecto salvo la decisión sobre νύμφη. La nota léxica debe conservar la ambigüedad documentada. «Sara» es correcto en español.
  issues:
  - severity: high
    issue: «tu esposa» atribuye a Sara una relación con Tobit que el contexto narrativo no permite
    rationale: νύμφη puede significar «novia/esposa joven» o «nuera», pero dirigida a Tobit, «tu esposa» falsea el referente posesivo y no preserva la tensión léxica del original.
  - severity: medium
    issue: La solución española no reproduce adecuadamente la cautela del POB inglés respecto a νύμφη
    rationale: El audit trail inglés mantiene una nota porque la palabra puede significar «bride» o «daughter-in-law». En español, la elección debe evitar una lectura equivocada y dejar la ambigüedad en nota.
  - severity: low
    issue: «sanarte a ti» es algo enfático de más
    rationale: No es incorrecto, pero «sanarte» suena más natural y suficiente en español, ya que el pronombre enclítico ya expresa el objeto.
  revised_spanish_text: Y ahora Dios me ha enviado para sanarte y a Sara[a].
  revised_footnotes:
  - marker: a
    text: O «a Sara, tu nuera». El griego νύμφη puede significar «novia/esposa joven» o «nuera». Como Tobit es el destinatario, «tu nuera» es una posibilidad léxica clara; la referencia también puede apuntar al estado nupcial reciente de Sara.
    reason: lexical_alternative
