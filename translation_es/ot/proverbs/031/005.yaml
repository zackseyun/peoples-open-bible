translation:
  language: es
  text: para que no beba y olvide lo que ha sido decretado[a], y pervierta la justicia debida a todos los afligidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «lo prescrito» o «el decreto».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «hijos de aflicción», una expresión idiomática para personas que sufren o están oprimidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  - para no
  lexicon: HALOT
  rationale: En español, la construcción final negativa expresa mejor la advertencia preventiva de פֶּן que un calco con valor arcaizante. 'Para que no' mantiene el matiz de evitación del daño advertido.
- source_word: יִ֭שְׁתֶּה
  english_pob_choice: he drink
  chosen_spanish: beba
  alternatives_spanish:
  - quiera beber
  - beberá
  - esté bebiendo
  lexicon: HALOT
  rationale: El imperfecto hebreo tras פֶּן expresa la acción temida; en español, el subjuntivo 'beba' reproduce bien la subordinación de advertencia.
- source_word: וְיִשְׁכַּ֣ח
  english_pob_choice: and forget
  chosen_spanish: y olvide
  alternatives_spanish:
  - y se olvide
  - y llegue a olvidar
  lexicon: HALOT
  rationale: '''Olvide'' conserva el valor verbal simple de שכח sin añadir matices reflexivos que el hebreo no exige.'
- source_word: מְחֻקָּ֑ק
  english_pob_choice: what has been decreed
  chosen_spanish: lo que ha sido decretado
  alternatives_spanish:
  - el decreto
  - lo prescrito
  - la norma establecida
  lexicon: HALOT
  rationale: El participio pasivo de חקק apunta a algo fijado o decretado. 'Lo que ha sido decretado' conserva el pasivo y evita restringir indebidamente el sentido a una sola clase de norma.
- source_word: וִישַׁנֶּה
  english_pob_choice: and pervert
  chosen_spanish: y pervierta
  alternatives_spanish:
  - y altere
  - y distorsione
  - y cambie
  lexicon: HALOT
  rationale: En contexto judicial, שנה en piel expresa cambiar de forma torcida o indebida. 'Pervierta' comunica mejor el sesgo ético-jurídico que 'cambie' o 'altere'.
- source_word: דִּין
  english_pob_choice: the justice due to
  chosen_spanish: la justicia debida a
  alternatives_spanish:
  - el juicio de
  - el caso legal de
  - los derechos de
  lexicon: HALOT
  rationale: דין aquí tiene fuerza judicial y de justa resolución. 'La justicia debida a' preserva tanto el ámbito legal como la idea de trato justo hacia los vulnerables.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: En español, 'todos' fluye naturalmente con el plural siguiente y mantiene el alcance total del cuantificador.
- source_word: בְּנֵי עֹנִי
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los hijos de aflicción
  - los pobres
  - los que sufren
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'hijos de aflicción', un idiomismo para personas oprimidas o en sufrimiento. 'Los afligidos' conserva el sentido idiomático con lectura natural en español.
theological_decisions:
- issue: Retribución judicial hacia los vulnerables
  english_pob_reading: the justice due to all the afflicted
  chosen_spanish_reading: la justicia debida a todos los afligidos
  alternative_spanish_readings:
  - el juicio de todos los afligidos
  - los derechos de todos los afligidos
  rationale: El versículo no habla solo de una sentencia abstracta, sino de una justicia que corresponde a los vulnerables en un marco real de gobierno o juicio. 'Debida a' preserva esa obligación moral y judicial.
  doctrine_reference: Justicia bíblica y deber de imparcialidad en el juicio (cf. Pr 31:9; Dt 16:19).
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el testimonio de auditoría muestra alto acuerdo (1.0). Esta redacción mantiene la fuerza advertencial del hebreo, conserva la ambigüedad lexical de מְחֻקָּק y la carga judicial de דִּין sin suavizarlas indebidamente.
  spanish_consistency_notes:
  - Se mantiene 'afligidos' para בְּנֵי עֹנִי, en línea con el POB inglés, evitando sustituirlo por 'pobres' sin necesidad contextual.
  - Se usa 'Yahvé' como forma de referencia del nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se conserva un registro sobrio y jurídico, apropiado para el contexto sapiencial y para la serie de advertencias de Proverbios 31.
