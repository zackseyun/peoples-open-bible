translation:
  language: es
  text: Entonces el rey Belsasar[a] se alarmó mucho, se le cambió el color del rostro[b], y sus nobles quedaron perplejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Belsasar, el rey». Se conserva el orden más natural en español, aunque el arameo presenta el título unido al nombre.
    reason: lexical_alternative
  - marker: b
    text: Lit. «su brillo/apariencia cambió sobre él». El arameo usa un modismo para indicar la pérdida visible de color en el rostro por temor; también puede traducirse «su rostro palideció».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce el siguiente episodio; «Entonces» conserva la secuencia narrativa de forma natural en español.
- source_word: מַלְכָּא בֵלְשַׁאצַּר
  english_pob_choice: King Belshazzar
  chosen_spanish: el rey Belsasar
  alternatives_spanish:
  - Belsasar, el rey
  - el rey Belshasar
  lexicon: HALOT
  rationale: Se mantiene el título real y el nombre propio transliterado de manera estándar en español bíblico, con orden natural para el español.
- source_word: שַׂגִּיא
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: Intensificador adverbial; «mucho» expresa bien el grado sin sonar arcaico ni forzado.
- source_word: מִתְבָּהַל
  english_pob_choice: became greatly alarmed
  chosen_spanish: se alarmó
  alternatives_spanish:
  - se aterró
  - quedó muy turbado
  lexicon: HALOT
  rationale: El hitpael indica sentirse perturbado o alarmado. «Se alarmó» es fiel y natural; el intensificador previo preserva la fuerza del original.
- source_word: וְזִיוֹהִי
  english_pob_choice: his color
  chosen_spanish: su color
  alternatives_spanish:
  - su rostro
  - su semblante
  - el color de su rostro
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la alteración visible del color/semblante. En español, «su color» mantiene brevedad y el sentido de palidez o cambio visible por el temor.
- source_word: שָׁנַיִן עֲלוֹהִי
  english_pob_choice: changed
  chosen_spanish: cambió
  alternatives_spanish:
  - se alteró
  - mudó
  lexicon: HALOT
  rationale: La expresión aramea es idiomática; en español se vierte de forma directa como cambio de color, sin añadir más de lo que el texto warrants.
- source_word: וְרַבְרְבָנוֹהִי
  english_pob_choice: his nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus señores
  - sus grandes
  lexicon: HALOT
  rationale: Término para los altos funcionarios o dignatarios del rey. «Nobles» comunica bien el rango cortesano sin introducir matices ajenos.
- source_word: מִשְׁתַּבְּשִׁין
  english_pob_choice: were perplexed
  chosen_spanish: quedaron perplejos
  alternatives_spanish:
  - estaban confundidos
  - quedaron turbados
  lexicon: HALOT
  rationale: Participio que expresa confusión o desorden mental. «Quedaron perplejos» refleja la reacción de los oficiales con claridad y dignidad estilística.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del borrador anterior y que existe alto acuerdo con la auditoría en inglés; se conserva esa línea sin introducir ajustes no motivados por la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa «nobles» para הרבְרְבָנֹוהִי siguiendo la decisión auditada en inglés, no «señores», para evitar una lectura señorial moderna ambigua.
  - La frase «su color cambió» se mantiene como equivalente idiomático breve de la expresión aramea sobre el cambio visible del semblante.
