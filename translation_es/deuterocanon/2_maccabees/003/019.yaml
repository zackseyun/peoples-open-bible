revisions:
- from: Y las mujeres, con el saco[a] ceñido bajo los pechos, llenaban las calles; y las vírgenes que estaban encerradas, unas corrían a las puertas, otras a los muros, y otras miraban[b] por las ventanas[c].
  to: Y las mujeres, con cilicio[a] ceñido debajo del pecho, llenaban las calles; y las vírgenes que estaban encerradas, unas corrían a las puertas, otras a las murallas, y algunas se asomaban por las ventanas.
  rationale: Se ajusta σάκκους a "cilicio" para evitar un falso sentido en español, se fortalece διεκύπτον con "se asomaban", se mejora τὰ τείχη con "murallas", y se refleja mejor τινὲς con "algunas". La revisión mantiene el tono natural y digno del español bíblico sin apartarse del griego ni del rastro auditado en inglés.
  reviewer_model: gpt-5.4
