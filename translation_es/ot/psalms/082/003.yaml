translation:
  language: es
  text: Hagan justicia al débil y al huérfano[a][b]; hagan valer el derecho[c] del afligido y del pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «háganles justicia al débil y al huérfano». El verbo hebreo שׁפט aquí tiene el sentido de administrar justicia en favor de alguien.
    reason: lexical_alternative
  - marker: b
    text: O «el huérfano de padre» para «el huérfano».
    reason: lexical_alternative
  - marker: c
    text: O «declaren justo» / «hagan justicia a» para «hagan valer el derecho». El hebreo es lenguaje judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְטוּ
  english_pob_choice: Give justice to
  chosen_spanish: Hagan justicia a
  alternatives_spanish:
  - Juzguen a
  - Defiendan a
  lexicon: HALOT
  rationale: 'El verbo hebreo שׁפט en este contexto tiene fuerza judicial: administrar justicia en favor de alguien. En español, «hacer justicia a» comunica de manera natural esa acción de proveer justicia sin sonar técnico ni introducir la idea de condena del sujeto vulnerable.'
- source_word: דַּל
  english_pob_choice: the weak
  chosen_spanish: el débil
  alternatives_spanish:
  - el pobre
  - el humilde
  lexicon: HALOT
  rationale: דַּל puede señalar fragilidad, debilidad o falta de poder social. «El débil» conserva esa amplitud y evita reducir demasiado el término a la sola carencia económica.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el huérfano de padre
  - el huérfano
  lexicon: HALOT
  rationale: Aunque literalmente el hebreo designa al que carece de padre, «huérfano» es la forma natural y fiel en español. En este contexto mantiene la categoría social vulnerable sin forzar una paráfrasis.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: el afligido
  alternatives_spanish:
  - el pobre
  - el oprimido
  - el necesitado
  lexicon: HALOT
  rationale: עָנִי con frecuencia expresa aflicción, humillación u opresión, no solo pobreza material. «El afligido» preserva esa dimensión experiencial y distingue este término de רָשׁ en el segundo hemistiquio.
- source_word: רָשׁ
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el indigente
  lexicon: HALOT
  rationale: רָשׁ denota pobreza o empobrecimiento. «El pobre» es la equivalencia más directa y transparente en español, especialmente en paralelo con «el afligido».
- source_word: הַצְדִּיקוּ
  english_pob_choice: vindicate
  chosen_spanish: reivindiquen
  alternatives_spanish:
  - declaren justo a
  - hagan justicia a
  - vindiquen
  lexicon: HALOT
  rationale: En el hifil, צדק puede significar declarar justo o tratar como estando en lo correcto en un marco judicial. «Reivindiquen» comunica la idea de reconocer y restaurar públicamente el derecho de alguien sin cargar el término con connotaciones paulinas de «justificar».
theological_decisions:
- issue: Lenguaje judicial dirigido a personas vulnerables
  english_pob_reading: Render the imperatives as calls to administer justice on behalf of the vulnerable
  chosen_spanish_reading: Los imperativos se entienden como mandatos para hacer justicia en favor de los vulnerables, no como juicio contra ellos.
  alternative_spanish_readings:
  - Juzguen al débil y al huérfano; justifiquen al afligido y al pobre
  - Defiendan al débil y al huérfano; vindiquen al afligido y al pobre
  rationale: El paralelismo del versículo y la sintaxis hebrea muestran que el sujeto implícito debe actuar en favor de quienes sufren abuso o desventaja. «Hagan justicia» y «reivindiquen» conservan la fuerza jurídica y ética del texto sin desplazar el sentido hacia un juicio condenatorio sobre las mismas personas vulnerables.
  doctrine_reference: Salmos 82:3; justicia judicial y ética social en el AT
translation_notes:
  revision_awareness: El inglés POB revisó «Defend» por «Give justice to» para acercarse más a שִׁפְטוּ como verbo judicial. La versión española sigue esa revisión con «Hagan justicia a», y mantiene la distinción entre עָנִי («afligido») y רָשׁ («pobre») reflejada en el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se preserva la distinción semántica entre «afligido» y «pobre», siguiendo la separación hecha en el inglés POB entre עָנִי y רָשׁ.
  - «Hagan justicia a» evita tanto el calco rígido como una paraphrasis excesiva, y mantiene la lectura judicial del hebreo.
  - «Reivindiquen» funciona como equivalente de alto registro para הַצְדִּיקוּ sin introducir tecnicismos doctrinales ajenos al contexto.
