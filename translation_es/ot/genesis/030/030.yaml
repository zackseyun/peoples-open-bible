review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: «lo poco», «antes de mí», el crecimiento hacia abundancia, «Yahvé», y la pregunta final sobre atender la propia casa. Sin embargo, la colocación de las notas está invertida respecto al contenido: la nota sobre «a mi pie» está anclada en «abundancia», mientras que la nota sobre la alternativa de la pregunta final está anclada en «a mi pie». Además, «a mi pie» es excesivamente extraño en español y no preserva bien la inteligibilidad del modismo hebreo; una formulación más natural y aún bastante literal como «a mi paso» comunica mejor el sentido documentado sin sobreinterpretar.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de legibilidad: «ha crecido hasta abundancia» suena algo rígido, aunque aceptable; y «te ha bendecido a mi pie» suena poco natural y potencialmente confuso para lectores hispanos. La pregunta final «¿cuándo haré yo también para mi propia casa?» también resulta incompleta en español; conviene explicitar el sentido idiomático con «proveer» o similar, como ya justificó la auditoría inglesa.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé» para יְהוָה. No hay conflictos con términos doctrinales mayores. La principal mejora léxica es usar una expresión idiomática española más fielmente inteligible para לְרַגְלִי y una formulación natural para עשה...לביתי.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas al lugar equivocado.
    rationale: La nota [a] explica «a mi pie», pero está colocada después de «abundancia»; la nota [b] explica la alternativa de la última cláusula, pero está colocada tras «a mi pie». Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: «a mi pie» es demasiado opaco en español.
    rationale: Aunque formalmente cercano al hebreo, en español no funciona como giro inteligible. «a mi paso» conserva cercanía metafórica y comunica mejor el valor idiomático documentado («con mi llegada / por mi causa»).
  - severity: medium
    issue: 'La última cláusula suena incompleta: «¿cuándo haré yo también para mi propia casa?»'
    rationale: El hebreo עשה...לְבֵיתִי es idiomático. En español conviene explicitar «proveer para» para transmitir el sentido económico/familiar sin paráfrasis excesiva, en línea con la decisión inglesa auditada.
  revised_spanish_text: Porque lo poco que tenías antes de mí ha crecido hasta abundancia, y Yahvé te ha bendecido a mi paso[a]. Y ahora[b], ¿cuándo proveeré yo también para mi propia casa?
  revised_footnotes:
