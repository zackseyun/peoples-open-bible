  to: una tierra fructífera en un salitral[a], por causa de la maldad de los que habitan en ella.
  rationale: Se reemplaza «en salina» por «en un salitral» porque expresa con más naturalidad en español un terreno vuelto salado y estéril, preservando tanto la imagen literal como la implicación de desolación indicada en la evidencia léxica inglesa. No se requieren otros cambios.
