    issue: Falta la nota cultural correspondiente a 'leproso'
    rationale: El POB inglés incluye una nota explicativa importante sobre el valor sacerdotal/ritual de מְצֹרָע y su no equivalencia exacta con la lepra moderna. El español conserva 'leproso', pero perdió esa aclaración.
  - severity: low
    issue: '''y con él también todos los sacerdotes'' suena poco natural'
    rationale: La expresión puede sugerir compañía ('con él') más que suma enfática de sujetos. 'y también todos los sacerdotes' o 'y todos los sacerdotes también' refleja mejor וְכָל הַכֹּהֲנִים sin ambigüedad innecesaria.
  - severity: low
    issue: Orden de notas y anclaje deben ajustarse al texto revisado
    rationale: Al restaurar la nota cultural sobre 'leproso', los marcadores deben aparecer exactamente en el texto y en orden único.
