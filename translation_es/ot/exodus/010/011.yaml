translation:
  language: es
  text: ¡No, no así! Vayan ahora los hombres y sirvan a Yahvé[a][b], porque eso es lo que ustedes buscan.” Entonces los expulsó de la presencia de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No así»; una forma más formal de rendir el rechazo brusco de Faraón.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hombres», específicamente los varones, no todo el pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  english_pob_choice: No!
  chosen_spanish: ¡No, no así!
  alternatives_spanish:
  - ¡No!
  - ¡No así!
  - ¡No, de ningún modo!
  lexicon: HALOT
  rationale: La expresión hebrea es una negación abrupta y rechazadora de la propuesta anterior. En español, «¡No, no así!» conserva el rechazo inmediato y la fuerza discursiva, sin sonar demasiado interpretativa.
- source_word: לְכוּ נָא
  english_pob_choice: Let ... go now
  chosen_spanish: Vayan ahora
  alternatives_spanish:
  - Vayan, por favor
  - Vayan ya
  - Dejen ir ahora
  lexicon: HALOT
  rationale: El imperativo plural con נָא aquí marca urgencia o concesión irónica más que cortesía genuina. «Ahora» comunica bien el matiz temporal y el tono apremiante del habla de Faraón.
- source_word: הַגְּבָרִים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los adultos varones
  - la gente
  lexicon: HALOT
  rationale: El hebreo restringe la salida a los varones. «Los hombres» es la forma natural en español para mantener esa limitación específica sin neutralizarla.
- source_word: וְעִבְדוּ אֶת יְהוָה
  english_pob_choice: and serve Yahweh
  chosen_spanish: y sirvan a Yahvé
  alternatives_spanish:
  - y adoren a Yahvé
  - y rindan culto a Yahvé
  - y sirvan al SEÑOR
  lexicon: HALOT
  rationale: עבד con Dios puede implicar servir o rendir culto. «Sirvan a Yahvé» conserva el alcance más amplio del verbo y sigue el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre del pacto y evita la convención de ocultarlo tras «SEÑOR».'
- source_word: כִּי אֹתָהּ אַתֶּם מְבַקְשִׁים
  english_pob_choice: for that is what you are seeking
  chosen_spanish: porque eso es lo que ustedes buscan
  alternatives_spanish:
  - porque eso es lo que buscan
  - porque eso es lo que están buscando
  - pues eso es lo que ustedes desean
  lexicon: HALOT
  rationale: El pronombre femenino puede referirse a la petición/lo pedido implícito. «Eso» permite mantener la referencia indefinida y reproduce bien el sentido de la frase sin forzar un antecedente explícito en español.
- source_word: וַיְגָרֶשׁ אֹתָם
  english_pob_choice: Then he drove them out
  chosen_spanish: Entonces los expulsó
  alternatives_spanish:
  - Entonces los echó
  - Luego los arrojó fuera
  - Y los expulsó
  lexicon: HALOT
  rationale: El verbo expresa una expulsión enérgica. «Expulsó» mantiene la fuerza del hebreo con un registro sobrio; «los echó» sería más coloquial.
- source_word: מֵאֵת פְּנֵי פַרְעֹה
  english_pob_choice: from Pharaoh’s presence
  chosen_spanish: de la presencia de Faraón
  alternatives_spanish:
  - de delante de Faraón
  - de ante Faraón
  - de la presencia del faraón
  lexicon: HALOT
  rationale: La locución hebrea es un modismo de alejamiento desde el lugar de comparecencia. «De la presencia de Faraón» es una equivalencia clara y reverente en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre del pacto de forma audible y transparente, conforme al criterio del proyecto. No se enmascara con «SEÑOR» porque el texto hebreo usa explícitamente el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Restricción de género en la propuesta de Faraón
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - solo los hombres
  rationale: El hebreo limita el permiso a los varones. Se conserva esa tensión narrativa y teológica en lugar de neutralizarla con un colectivo más amplio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto hebreo, la morfología y el rastro auditado en inglés. No se detectaron revisiones posteriores que alteraran la decisión principal; la formulación española busca mantener el rechazo abrupto, la restricción a los varones, el nombre divino y el matiz idiomático de la clausula final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Faraón» se mantiene con mayúscula por consistencia bíblica en español.
  - La versión conserva el sujeto implícito singular del verbo final con referencia a Faraón.
  - «Los hombres» refleja la restricción específica del hebreo y coincide con la nota textual marcada.
