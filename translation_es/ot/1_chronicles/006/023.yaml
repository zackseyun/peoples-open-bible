lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una fórmula genealógica, בן se expresa de manera natural y fiel como «hijo de». Aunque «descendiente de» puede captar una relación genealógica más amplia, aquí no hay indicio inmediato de que deba suavizarse el parentesco directo.
- source_word: יִצְהָר
  english_pob_choice: Izhar
  chosen_spanish: Izhar
  alternatives_spanish:
  - Yizhar
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran por convención. «Izhar» mantiene la forma reconocible en español y corresponde al nombre hebreo del texto fuente.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Qehat
  lexicon: convención onomástica
  rationale: Para este nombre propio, la forma tradicional en español bíblico es «Coat», que comunica mejor al lector hispanohablante que una transliteración más técnica.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: convención onomástica
  rationale: 'Se conserva el nombre propio en su forma habitual en español bíblico con acento gráfico: «Leví».'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: convención onomástica
  rationale: El hebreo dice explícitamente «Israel» y no «Jacob»; por eso se mantiene el nombre del texto fuente en el cuerpo principal.
theological_decisions:
- issue: Identificación de «Israel» como nombre de pacto de Jacob
  english_pob_reading: Hebrew 'Israel'; that is, Jacob under his covenant name.
  chosen_spanish_reading: «Israel» se mantiene en el texto, con nota que aclara que es Jacob bajo su nombre de pacto.
  alternative_spanish_readings:
  - «Jacob» en el cuerpo principal
  rationale: El texto hebreo usa el nombre ישראל. La aclaración evita perder la identificación histórica y teológica sin sustituir la forma léxica del original.
  doctrine_reference: Génesis 32:28; 35:10
translation_notes:
  revision_awareness: 'El pasaje coincide con el auditoría inglesa más reciente: no hubo revisiones aplicadas y el consenso fue de alta concordancia. La versión española conserva la estructura genealógica directa y la nota sobre «Israel» refleja la misma decisión interpretativa del original auditado.'
  spanish_consistency_notes:
  - Se preserva la secuencia genealógica breve y paralela del hebreo.
  - Se usa «hijo de» de forma consistente para בן en toda la línea.
  - Se mantiene el nombre propio bíblico «Leví» con ortografía española establecida.
  - La nota [a] acompaña únicamente a «Israel» y no introduce lecturas ajenas al texto.
