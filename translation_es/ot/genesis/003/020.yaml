review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien las decisiones centrales del hebreo: הָאָדָם como «el hombre», causal «porque», y la amplitud de «madre de todo lo vivo». Sin embargo, la sintaxis principal no preserva fielmente la fórmula de nombrar: «llamó Eva al nombre de su esposa» es español defectuoso y desordena la relación entre «nombre», «su esposa» y «Eva».'
  spanish_quality_summary: 'La frase actual suena poco natural e incluso incorrecta en español. Una formulación digna y fiel sería «Y el hombre llamó Eva[a] al nombre de su esposa,[b] porque ella era madre de todo lo vivo» o mejor, con naturalización moderada, «Y el hombre llamó a su esposa Eva[a], porque ella era madre de todo lo vivo[b]». Dado que el propio proyecto permite evitar calcos de madera cuando el español se vuelve antinatural, conviene usar la segunda. También hay que reubicar las notas: la nota sobre «Adán/el hombre» debe anclarse en «hombre», no en «Eva»; y la nota léxica sobre «todo lo vivo» debe anclarse allí, no en el nombre propio.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Eva», «el hombre», «esposa», «madre» y «todo lo vivo» son compatibles con el expediente inglés. La excepción necesaria es abandonar el calco «al nombre de» en el texto principal por mala legibilidad española, mientras se preserva la información relevante en la traducción y notas.
  issues:
  - severity: high
    issue: Sintaxis española defectuosa en «llamó Eva al nombre de su esposa»
    rationale: Aunque el hebreo contiene la fórmula «llamó el nombre de», en español esta secuencia resulta antinatural y confusa. El proyecto pide evitar calcos de madera cuando dañan la gramática española.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] trata la opción «Adán» frente a «el hombre», pero está colocada sobre «Eva». Debe marcar «hombre».
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota [b] explica «mother of all the living», pero está colocada sobre «Eva». Debe marcar la frase «todo lo vivo» o equivalente.
  revised_spanish_text: Y el hombre[a] llamó a su esposa Eva, porque ella era madre de todo lo vivo[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Adán». El hebreo dice literalmente «el hombre» (ha''adam), con artículo.'
    reason: alternative_reading
  - marker: b
