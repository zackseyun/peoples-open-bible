revisions:
- from: Y Melquisedec, rey de Salem, sacó pan y vino[a][b]. Y era sacerdote del Dios Altísimo.
  to: Y Melquisedec, rey de Salem, sacó pan y vino[a]. Él era sacerdote de Dios Altísimo[b].
  rationale: Se conservó el sentido del borrador, pero se reparó la ubicación de la nota sobre אֵל עֶלְיוֹן para que ancle en «Dios Altísimo», y se simplificó la nota verbal para reflejar una alternativa real al hebreo הוֹצִיא. También se suavizó «Y era sacerdote del Dios Altísimo» a «Él era sacerdote de Dios Altísimo», que suena más natural en español y mantiene fielmente la cláusula hebrea.
