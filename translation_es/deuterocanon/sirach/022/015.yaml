review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la comparación proverbial de cargas materiales con la dificultad de sobrellevar a un hombre ἀσύνετον. «Arena», «sal», «más fácil», «llevar» y «un hombre insensato» corresponden adecuadamente a ἄμμον, ἅλα, εὔκοπον, ὑπενεγκεῖν y ἄνθρωπον ἀσύνετον. Sin embargo, «un terrón de hierro» suena poco natural en español para βῶλον σιδήρου; el griego apunta a una masa o bulto de hierro, y «trozo» o «masa» comunica mejor la imagen sin extrañeza innecesaria. Además, la nota al pie repite la lectura principal como alternativa, y el marcador [a] está mal colocado tras «que» en vez de anclarse a «insensato».'
  spanish_quality_summary: 'El texto es legible y de registro digno, pero tiene dos problemas de calidad: 1) la colocación de [a] rompe la fluidez sintáctica; 2) «terrón de hierro» resulta forzado y poco idiomático en español general, evocando más tierra o azúcar que metal. «Trozo de hierro» suena natural y conserva el peso concreto del proverbio. La nota debe limpiarse para no duplicar «insensato» como alternativa de sí mismo.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «insensato» para ἀσύνετον está bien alineada con el rastro inglés revisado («senseless») y con el tono sapiencial. «Un hombre» también concuerda con la decisión documentada para ἄνθρωπον. La revisión recomendada es estilístico-lexical, no doctrinal.
  issues:
  - severity: medium
    issue: «Terrón de hierro» es poco natural para βῶλον σιδήρου en español.
    rationale: Aunque βῶλος puede denotar terrón o masa, en español «terrón» aplicado a hierro suena extraño y distrae. «Trozo de hierro» o «masa de hierro» preserva mejor la imagen pesada y concreta con buena legibilidad.
  - severity: medium
    issue: El marcador de nota [a] está colocado en una posición incorrecta.
    rationale: La nota explica «insensato», pero el anclaje aparece después de «que». Debe aparecer junto a «insensato» o a toda la frase correspondiente.
  - severity: low
    issue: La nota al pie repite la lectura principal como si fuera alternativa.
    rationale: Dice «O “un hombre sin entendimiento”, “un hombre necio” o “un hombre insensato”», pero «insensato» ya es la lectura del texto. Las alternativas deben excluir la lectura principal.
  revised_spanish_text: Más fácil es llevar arena, sal y un trozo de hierro que a un hombre insensato[a].
  revised_footnotes:
  - marker: a
    text: O «un hombre sin entendimiento» o «un hombre necio».
    reason: lexical_alternative
  revision_rationale: Se corrige «terrón de hierro» a «trozo de hierro» por mayor naturalidad en español sin perder la imagen concreta de βῶλον σιδήρου. Se mueve el marcador [a] para anclarlo a «insensato», que es el término explicado por la nota. También se limpia la nota para que solo incluya alternativas reales a la lectura principal.
