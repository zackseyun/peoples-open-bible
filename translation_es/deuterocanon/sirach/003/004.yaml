translation:
  language: es
  text: Y quien honra a su madre es como quien acumula tesoro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοξάζων
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - glorifica
  - da honor a
  lexicon: BDAG
  rationale: En este contexto sapiencial, δοξάζω expresa dar el honor debido a la madre, no una glorificación en sentido cultual. «Honra» es natural en español y conserva la idea de respeto filial del pasaje.
- source_word: ἀποθησαυρίζων
  english_pob_choice: stores up treasure
  chosen_spanish: acumula tesoro
  alternatives_spanish:
  - guarda tesoro
  - atesora
  - reúne tesoro
  lexicon: LSJ
  rationale: El participio significa literalmente guardar o depositar en un tesoro. «Acumula tesoro» mantiene la imagen concreta de reunir valor duradero sin explicar de más el tipo de tesoro.
- source_word: μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - su propia madre
  - a su madre
  lexicon: BDAG
  rationale: El griego es singular y masculino en forma proverbial. En español, «su madre» conserva el referente sin añadir énfasis innecesario.
- source_word: ὡς
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - es semejante a
  - como
  lexicon: BDAG
  rationale: La partícula introduce comparación. «Es como» reproduce de manera idiomática la relación comparativa del griego.
theological_decisions:
- issue: Imagen de recompensa implícita en el honor filial
  english_pob_reading: The verse compares honoring one's mother to storing up treasure, preserving the wisdom metaphor without specifying whether the treasure is earthly, heavenly, or metaphorical.
  chosen_spanish_reading: El versículo compara honrar a la madre con acumular tesoro, conservando la metáfora sapiencial sin precisar si el tesoro es terrenal, celestial o figurado.
  alternative_spanish_readings:
  - prosperidad material
  - recompensa celestial
  - beneficio moral general
  rationale: El griego afirma la comparación, pero no define la naturaleza del tesoro. Conviene mantener abierta la imagen para no introducir una doctrina de recompensa que el texto no explicita.
  doctrine_reference: Conservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego de Swete y el audit trail inglés, sin cambios revisionales relevantes en el pasaje.
  spanish_consistency_notes:
  - Se mantiene «madre» en singular, en paralelo con el griego.
  - Se usa «tesoro» de forma concreta para preservar la metáfora de acumulación.
  - No se introduce terminología eclesiástica añadida ni se explicita el tipo de recompensa.
