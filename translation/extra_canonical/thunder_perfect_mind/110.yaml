translation:
  text: Hear me, you who hear; and learn my words, you who know me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The OCR shows “words and names” at the end of the snippet (… ϣⲁϫⲉ ⲙⲛ̄ ⲛⲉⲥⲙⲏ),
      but the line-break mapping is uncertain. We therefore limit the main line to
      “learn my words” and flag “names” for possible inclusion upon resegmentation.
    reason: alignment_note
  - marker: b
    text: If ⲛ̄ϭⲟⲙ is read literally, it means “strong/powerful,” giving “Obey me,
      you strong ones.” Many editions read a form related to ⲧⲟⲛ (“obey/obedience”),
      yielding “you who obey/obedient ones.”
    reason: lexical_alternative
  - marker: c
    text: Or 'Obey me, you who obey; and learn my words, you who know me.'.
    reason: previous_rendering
