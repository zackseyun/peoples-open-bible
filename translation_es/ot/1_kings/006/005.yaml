revisions:
- from: Construyó junto al muro de la casa una estructura [a] alrededor, junto a los muros de la casa alrededor, alrededor del [b] santuario y del santuario interior[c]; e hizo cámaras laterales alrededor.
  to: Construyó adosada al muro de la casa una estructura alrededor[a], contra los muros de la casa alrededor, alrededor del salón principal[b] y del santuario interior[c]; e hizo cámaras laterales alrededor.
  rationale: La revisión mejora la naturalidad del español sin apartarse del hebreo ni del expediente del POB inglés. «Adosada al muro» expresa mejor la relación constructiva; «salón principal» preserva claramente la distinción entre הֵיכָל y דְּבִיר sin recurrir al tecnicismo «nave»; y se mantiene la repetición de «alrededor» para reflejar סָבִיב.
