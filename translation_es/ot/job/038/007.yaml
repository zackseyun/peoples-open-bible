translation:
  language: es
  text: cuando las estrellas de la mañana cantaban juntas y todos los hijos de Dios[a] gritaban de alegría?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los seres celestiales" o "los ángeles". Hebreo: "los hijos de Dios".'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/רָן
  english_pob_choice: when ... sang
  chosen_spanish: cuando ... cantaban
  alternatives_spanish:
  - al cantar
  - mientras cantaban
  lexicon: HALOT
  rationale: El ב prefijado en el infinitivo constructo de רנן funciona aquí como marcador temporal. En español, 'cuando ... cantaban' expresa bien la simultaneidad narrativa y conserva el matiz de canto jubiloso del verbo.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - juntamente
  - en un mismo coro
  lexicon: HALOT
  rationale: '''Juntas'' transmite la simultaneidad y unidad de acción de manera natural en español y preserva la fuerza colectiva del hebreo.'
- source_word: כּוֹכְבֵי בֹקֶר
  english_pob_choice: the morning stars
  chosen_spanish: las estrellas de la mañana
  alternatives_spanish:
  - las estrellas matutinas
  - las estrellas del alba
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es 'estrellas de la mañana'. 'Las estrellas de la mañana' conserva la imagen poética con transparencia y sin perder naturalidad.
- source_word: וַיָּרִיעוּ
  english_pob_choice: shouted for joy
  chosen_spanish: gritaban de alegría
  alternatives_spanish:
  - prorrumpían en gritos de júbilo
  - alzaban un grito de alegría
  lexicon: HALOT
  rationale: El verbo puede expresar un grito jubiloso. 'Gritaban de alegría' comunica el sentido celebrativo en español sin exagerar ni suavizar el aspecto de clamor.
- source_word: בְּנֵי אֱלֹהִים
  english_pob_choice: the sons of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los seres celestiales
  - los ángeles
  - los seres divinos
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'los hijos de Dios' para preservar la formulación hebrea y la tensión interpretativa del pasaje, tal como hace la POB en inglés con 'the sons of God'.
theological_decisions:
- issue: Identidad de בְּנֵי אֱלֹהִים
  english_pob_reading: Render literally as 'the sons of God' in the main text
  chosen_spanish_reading: Traducir literalmente 'los hijos de Dios' en el texto principal
  alternative_spanish_readings:
  - los seres celestiales
  - los ángeles
  - los seres divinos
  rationale: En Job, la frase apunta probablemente al consejo celestial, pero resolverla como 'ángeles' interpretaría más de lo que traduce. Mantener la formulación literal deja visible la cuestión al lector y conserva la primacía del hebreo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; prioridad del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La versión española sigue el estado revisado sin cambios sustantivos en el expediente inglés más reciente (misma lectura y misma nota alternativa para 'the sons of God').
  spanish_consistency_notes:
  - Se mantiene 'Dios' con mayúscula para אֱלֹהִים cuando designa al ser divino, en consonancia con el estándar del proyecto.
  - 'Se conserva el paralelismo poético con dos miembros coordinados: canto de las estrellas y grito jubiloso de los hijos de Dios.'
  - La nota al pie en español refleja la misma tensión léxica que la nota inglesa sin resolver interpretativamente la identidad de 'los hijos de Dios'.
