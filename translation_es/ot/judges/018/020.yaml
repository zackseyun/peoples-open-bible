    rationale: La nota literal sobre «fue bueno el corazón» no es errónea, pero no está exigida por el audit trail y desplaza la numeración de las notas significativas ya documentadas. Dado que no resuelve una ambigüedad nueva en español, es mejor omitirla aquí.
  - severity: low
