base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/024.yaml
  text: 'Thus says Yahweh: Behold[b][a], I am bringing disaster on this place and on its inhabitants—all the curses written in the book that they have read before the king of Judah.'
  footnotes:
  - marker: a
    text: Or 'all the oath-curses,' emphasizing covenant sanctions invoked in the law book.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'book'; the term can also refer to a scroll.
    reason: lexical_alternative
