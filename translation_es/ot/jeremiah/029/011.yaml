translation:
  language: es
  text: Porque yo sé los planes que tengo para ustedes —declara Yahvé—, planes de paz[a] y no para daño[b], para darles un futuro y una esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «planes de bienestar» o «planes de plenitud»; שָׁלוֹם puede incluir paz, integridad y florecimiento.
    reason: lexical_alternative
  - marker: b
    text: O «no para desastre» o «no para calamidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la promesa anterior. «Porque» conserva la relación causal/explicativa de forma natural en español sin perder el tono profético.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - yo he conocido
  - yo conozco
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento firme y asentado; en español, «yo sé» comunica mejor ese valor estativo que una forma perifrástica más pesada.
- source_word: הַמַּחֲשָׁבוֹת
  english_pob_choice: the plans
  chosen_spanish: los planes
  alternatives_spanish:
  - los pensamientos
  - las intenciones
  lexicon: HALOT
  rationale: En este contexto de propósito divino y con el infinitivo de finalidad, «planes» refleja mejor la idea de intención ordenada que «pensamientos», manteniendo la vinculación léxica con el verbo siguiente.
- source_word: חֹשֵׁב
  english_pob_choice: I am planning / I have
  chosen_spanish: tengo
  alternatives_spanish:
  - estoy planeando
  - intento
  - pienso
  lexicon: HALOT
  rationale: El audit trail inglés final opta por «I have» para sonar más natural sin perder el hebreo idiomático. En español, «tengo» conserva esa misma naturalidad posesiva/intencional con «planes que tengo para ustedes».
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - respecto de ustedes
  - hacia ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: «Para ustedes» reproduce de modo claro la orientación benevolente de la expresión, siguiendo el sentido pragmático del inglés POB.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la norma del proyecto. «Declara» preserva la solemnidad profética de נְאֻם sin volver la frase artificial en español.
- source_word: מַחְשְׁבוֹת שָׁלוֹם
  english_pob_choice: plans for peace
  chosen_spanish: planes de paz
  alternatives_spanish:
  - planes de bienestar
  - planes de bienestar integral
  - planes de paz y plenitud
  lexicon: HALOT
  rationale: «Paz» es la correspondencia más directa para שָׁלוֹם y conserva la fuerza teológica del término; las alternativas amplían el campo semántico, pero el texto principal evita interpretaciones excesivas.
- source_word: וְלֹא לְרָעָה
  english_pob_choice: and not for harm
  chosen_spanish: y no de mal
  alternatives_spanish:
  - y no para daño
  - y no para desastre
  - y no para calamidad
  lexicon: HALOT
  rationale: «Mal» mantiene la antítesis breve y natural con «paz» en español. Aunque puede abarcar daño o calamidad, en el contexto de restauración sigue siendo una opción fiel y suficientemente abierta.
- source_word: לָתֵת לָכֶם
  english_pob_choice: to give you
  chosen_spanish: para darles
  alternatives_spanish:
  - para concederles
  - para otorgarles
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte con «para darles», preservando la función final de la frase y la referencia plural de segunda persona.
- source_word: אַחֲרִית
  english_pob_choice: a future
  chosen_spanish: un futuro
  alternatives_spanish:
  - un destino
  - un desenlace
  - un resultado final
  lexicon: HALOT
  rationale: En este contexto esperanzador, «futuro» expresa bien la orientación prospectiva del sustantivo sin añadir matices interpretativos innecesarios.
- source_word: תִקְוָה
  english_pob_choice: a hope
  chosen_spanish: una esperanza
  alternatives_spanish:
  - una expectativa
  - una confianza
  lexicon: HALOT
  rationale: «Esperanza» refleja de forma directa el sustantivo hebreo y mantiene el paralelismo con «un futuro» en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La norma del proyecto establece Yahvé para el Tetragrama. Se evita la sustitución por un título para preservar el nombre personal del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Alcance semántico de שָׁלוֹם
  english_pob_reading: peace
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - bienestar integral
  rationale: Se conserva «paz» como equivalente directo en el cuerpo del texto, dejando abierta la riqueza del hebreo sin diluirla con una paráfrasis. El matiz más amplio se puede expresar en nota si hace falta, pero el verso principal debe permanecer sobrio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Valor de רָעָה en contraste con שָׁלוֹם
  english_pob_reading: harm
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - daño
  - desastre
  - calamidad
  rationale: «Mal» conserva la antítesis clásica y breve con «paz». Aunque el hebreo puede abarcar daño o desastre, aquí la oposición conceptual exige una formulación concisa y abarcadora.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El audit trail inglés revisó «that I am planning for you» a «that I have for you» por mayor naturalidad. La redacción española sigue ese mismo criterio al preferir «los planes que tengo para ustedes» frente a una perífrasis más literal, manteniendo intactos «paz», «mal», «futuro» y «esperanza».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene un registro neutro y eclesialmente readable, evitando arcaísmos innecesarios.
  - El plural «ustedes/les» refleja fielmente la segunda persona plural hebrea.
  - La antítesis «paz / mal» conserva la brevedad del original sin borrar el campo semántico ampliado de שָׁלוֹם y רָעָה.
