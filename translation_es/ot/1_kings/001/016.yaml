translation:
  language: es
  text: 'Betsabé se inclinó y se postró ante el rey[a], y el rey dijo: «¿Qué quieres?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Qué [hay] para ti?». Es un modismo que significa «¿Qué quieres?» o «¿Qué te preocupa?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקֹּד
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se agachó
  - se inclinó profundamente
  lexicon: HALOT
  rationale: קָדַד expresa inclinarse o doblarse; en español, «se inclinó» comunica el gesto físico sin forzar una especificación como «arrodilló» que el hebreo no exige. El adverbio o intensificación queda implícito en la acción siguiente.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bathsheba
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma castellana habitual del nombre propio en contexto bíblico, manteniendo la identificabilidad del personaje y la legibilidad en español.
- source_word: וַתִּשְׁתַּחוּ
  english_pob_choice: prostrated herself
  chosen_spanish: se postró
  alternatives_spanish:
  - se postró reverentemente
  - hizo una profunda reverencia
  lexicon: HALOT
  rationale: שׁחה en esta forma intensiva indica una postración u homenaje muy profundo. «Se postró» conserva esa fuerza mejor que un simple «se inclinó» y distingue la segunda acción de la primera.
- source_word: לַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - delante del rey
  - frente al rey
  lexicon: HALOT
  rationale: El ל de dirección/relación con un gesto de homenaje se expresa naturalmente en español con «ante», que conserva el matiz de presencia respetuosa y escena cortesana.
- source_word: מַה לָּךְ
  english_pob_choice: What do you want?
  chosen_spanish: ¿Qué quieres?
  alternatives_spanish:
  - ¿Qué te pasa?
  - ¿Qué es lo que quieres?
  lexicon: HALOT
  rationale: El hebreo idiomático pregunta literalmente «¿qué [hay] para ti?», pero aquí funciona como una pregunta cortés por la petición o asunto de Betsabé. «¿Qué quieres?» refleja la revisión inglesa y evita sobredramatizar el modismo.
theological_decisions:
- issue: Doble gesto de respeto ante el rey
  english_pob_reading: bowed down and prostrated herself before the king
  chosen_spanish_reading: se inclinó y se postró ante el rey
  alternative_spanish_readings:
  - se inclinó y se arrodilló ante el rey
  - hizo una reverencia ante el rey
  rationale: 'El hebreo distingue dos verbos y conviene mantener la progresión del homenaje: una inclinación seguida de una postración. En español, «se inclinó» y «se postró» preservan esa diferencia sin reducirla a un solo gesto.'
  doctrine_reference: Cortesía y homenaje en narrativa histórica; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: La base inglesa revisó la pregunta del rey desde una forma más explicativa («What is it that you want?») a la más directa «What do you want?». La versión española sigue esa revisión con «¿Qué quieres?», manteniendo a la vez la diferencia de los dos verbos hebreos de postura.
  spanish_consistency_notes:
  - Se conserva el nombre «Betsabé», forma castellana estándar y reconocible del personaje.
  - Se distingue entre «se inclinó» y «se postró» para no neutralizar la repetición enfática del hebreo.
  - La pregunta del rey se mantiene breve y natural en español, con nota para el sentido idiomático del hebreo.
