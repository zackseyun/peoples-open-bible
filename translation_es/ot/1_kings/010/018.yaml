translation:
  language: es
  text: Entonces el rey hizo un gran trono de marfil y lo recubrió de oro refinado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Refinado» puede entenderse también como «puro» o «fino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: Then ... made
  chosen_spanish: Entonces ... hizo
  alternatives_spanish:
  - Y ... hizo
  - Hizo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entonces» transmite la secuencia de forma natural en español sin repetir mecánicamente una conjunción inicial.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el equivalente directo y natural en el contexto regio de Salomón.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - silla
  - asiento
  lexicon: HALOT
  rationale: En contexto real, «trono» comunica correctamente el mueble y su función simbólica.
- source_word: שֵׁן
  english_pob_choice: ivory
  chosen_spanish: marfil
  alternatives_spanish:
  - de marfil
  lexicon: HALOT
  rationale: Aunque el sustantivo puede denotar literalmente «diente», en esta construcción con «trono» designa el material, es decir, marfil.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: HALOT
  rationale: «Gran» conserva tanto el tamaño como la majestuosidad del trono, mejor que un adjetivo meramente dimensional.
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: overlaid it
  chosen_spanish: lo recubrió
  alternatives_spanish:
  - lo cubrió
  - lo revestió
  - lo plateó
  lexicon: HALOT
  rationale: El verbo צפה en este uso se refiere a recubrir con un material; «recubrió» es natural y preciso en español para el trabajo artesanal.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro puro
  lexicon: HALOT
  rationale: En español, el material se expresa naturalmente como «oro»; el complemento siguiente especifica su calidad.
- source_word: מוּפָז
  english_pob_choice: refined
  chosen_spanish: refinado
  alternatives_spanish:
  - puro
  - fino
  lexicon: HALOT
  rationale: «Refinado» preserva la idea de oro de alta calidad sin forzar una precisión técnica mayor que la que exige el hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y concuerda con la POB inglesa en la secuencia narrativa, el valor de כִּסֵּא como «trono», שֵׁן como material («marfil») y מוּפָז como oro de alta calidad. No se introdujeron cambios textuales ni tensiones doctrinales.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el material («marfil», «oro») y su cualificación («refinado»).
  - «Entonces» refleja la función narrativa del wayyiqtol sin imponer una coordinación artificial.
  - El tono es sobrio y publicable, adecuado para lectura bíblica en español.
