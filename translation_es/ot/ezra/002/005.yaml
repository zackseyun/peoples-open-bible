  - setecientos y setenta y cinco
  lexicon: HALOT
  rationale: La secuencia hebrea expresa 700 + 5 + 70 = 775. En español, la forma normativa y más legible en una lista es «setecientos setenta y cinco», sin numerales para mantener el estilo literario del registro.
