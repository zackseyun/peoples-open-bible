translation:
  language: es
  text: 'Entonces el rey le dijo: «Pide[a] lo que quieras, más de lo que está escrito, y te lo daremos, porque has sido hallado más sabio; y te sentarás junto a mí[b], y serás llamado mi deudo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que quieras más de lo que está escrito». La frase puede aludir a recompensas ya registradas o decretadas por escrito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te sentarás a mi lado». La expresión griega denota cercanía y honor en la corte.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «serás llamado mi pariente». El giro expresa favor real y un estatus elevado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αἴτησαι
  english_pob_choice: Ask for
  chosen_spanish: Pide
  alternatives_spanish:
  - Pide
  - Solicita
  - Pide lo que quieras
  lexicon: LSJ
  rationale: El imperativo aoristo medio expresa una invitación real directa. En español, «Pide» mantiene la naturalidad y la fuerza breve del mandato/invitación; el complemento se amplía en la cláusula siguiente.
- source_word: ὃ θέλεις πλείω τῶν γεγραμμένων
  english_pob_choice: whatever more you want beyond what has been written
  chosen_spanish: lo que quieras, más de lo que está escrito
  alternatives_spanish:
  - lo que quieras, más de lo que está escrito
  - cualquier cosa más que quieras de lo que está escrito
  - lo que desees más de lo escrito
  lexicon: LSJ
  rationale: La cláusula relativa abierta se vierte con «lo que quieras». «Más de lo que está escrito» conserva el valor comparativo de πλείω y el referente a lo ya escrito, sin añadir una explicación que el griego no exige.
- source_word: δώσομέν σοι
  english_pob_choice: we will give it to you
  chosen_spanish: te lo daremos
  alternatives_spanish:
  - te lo daremos
  - te lo concederemos
  - te lo daremos a ti
  lexicon: LSJ
  rationale: El futuro de δίδωμι se traduce de forma directa. «Te lo daremos» es natural en español y mantiene el tono de promesa real; el pronombre neutro resume el don pedido.
- source_word: ὃν τρόπον
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - ya que
  - pues
  lexicon: LSJ
  rationale: Aunque literalmente significa algo como «en la manera que», aquí introduce el motivo de la concesión. «Porque» expresa con claridad la relación causal preservada por la revisión inglesa.
- source_word: εὑρέθης σοφώτερος
  english_pob_choice: you have been found wiser
  chosen_spanish: has sido hallado más sabio
  alternatives_spanish:
  - has sido hallado más sabio
  - se te ha encontrado más sabio
  - has resultado más sabio
  lexicon: LSJ
  rationale: El pasivo de εὑρίσκω conserva la idea de una evaluación recibida. «Has sido hallado más sabio» sigue de cerca esa forma; «más sabio» preserva el comparativo de σοφώτερος.
- source_word: ἐχόμενός μου καθήσῃ
  english_pob_choice: you shall sit beside me
  chosen_spanish: te sentarás junto a mí
  alternatives_spanish:
  - te sentarás junto a mí
  - te sentarás a mi lado
  - te sentarás cerca de mí
  lexicon: LSJ
  rationale: La expresión con ἐχόμενος y genitivo comunica cercanía y honor en contexto cortesano. «Junto a mí» es una solución idiomática en español que conserva esa proximidad sin volverse demasiado literal.
- source_word: συγγενής μου κληθήσῃ
  english_pob_choice: you shall be called my kinsman
  chosen_spanish: serás llamado mi pariente
  alternatives_spanish:
  - serás llamado mi pariente
  - serás llamado mi pariente cercano
  - serás llamado mi deudo
  lexicon: LSJ
  rationale: συγγενής denota pertenencia al mismo linaje o grupo familiar. «Pariente» es el equivalente más natural en español; evita cargar el texto con un arcaísmo y mantiene la elevación del favor real.
theological_decisions:
- issue: Honor cortesano expresado por la cercanía al rey
  english_pob_reading: Render literally as 'you shall sit beside me'
  chosen_spanish_reading: te sentarás junto a mí
  alternative_spanish_readings:
  - te sentarás junto a mí
  - te sentarás a mi lado
  - te sentarás cerca de mí
  rationale: La frase no trata una doctrina, sino una elevación honorífica en la corte. «Junto a mí» preserva la idea de cercanía privilegiada sin convertirla en una imagen más doméstica o afectiva de lo que el griego dice.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación indicada por συγγενής μου
  english_pob_reading: you shall be called my kinsman
  chosen_spanish_reading: serás llamado mi pariente
  alternative_spanish_readings:
  - serás llamado mi pariente
  - serás llamado mi familiar
  - serás llamado mi aliado
  rationale: El griego expresa parentesco/afinidad familiar, no simplemente amistad o alianza política. «Pariente» conserva esa tensión entre honor y parentesco sin introducir una categoría no atestiguada.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se prefirió una causal explícita («porque») y una formulación de cercanía más formal («junto a mí»), manteniendo el valor comparativo de «más sabio» y el título de parentesco sin suavizarlo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; aquí no hay mención divina.
  - Se usa «pariente» para συγγενής conforme al registro de favor cortesano, no «amigo».
  - Se preserva la distinción entre cercanía física/honorífica y parentesco real mediante las notas alternativas.
  - No se introduce «Cristo», «Señor» ni vocabulario teológico ajeno al pasaje.
