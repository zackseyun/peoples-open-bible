translation:
  language: es
  text: 'Y he aquí[a], algo como la semejanza de un ser humano tocó mis labios. Entonces abrí mi boca, hablé y dije al que estaba delante de mí: «Mi señor, a causa de la visión mis dolores[b] me han sobrevenido, y no me ha quedado fuerza[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, «uno con apariencia humana» o «algo como una figura humana». El hebreo es inusualmente compuesto: «algo como la semejanza de los hijos de hombre / de los seres humanos».'
    reason: lexical_alternative
  - marker: b
    text: O «mis angustias me han sobrevenido» o «mis dolores me han acometido». El hebreo expresa un sufrimiento intenso que se abate sobre Daniel.
    reason: lexical_alternative
  - marker: c
    text: O «y no me ha quedado fuerza alguna».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּדְמוּת בְּנֵי אָדָם
  english_pob_choice: something like the likeness of a son of man
  chosen_spanish: algo como la semejanza de un hijo de hombre
  alternatives_spanish:
  - uno con apariencia humana
  - algo como una figura humana
  - uno como un hombre
  lexicon: HALOT
  rationale: La expresión hebrea es deliberadamente compuesta y no debe aplanarse. En español, «hijo de hombre» conserva la literalidad y la vaguedad de la comparación visionaria, sin convertirla en título mesiánico.
- source_word: נֹגֵעַ עַל שְׂפָתַי
  english_pob_choice: touched my lips
  chosen_spanish: tocó mis labios
  alternatives_spanish:
  - estaba tocando mis labios
  - tocó sobre mis labios
  lexicon: HALOT
  rationale: נגע con עַל expresa contacto físico. En español natural, «tocó mis labios» comunica el acto sin añadir dureza innecesaria.
- source_word: וָאֶפְתַּח פִּי
  english_pob_choice: Then I opened my mouth
  chosen_spanish: Entonces abrí mi boca
  alternatives_spanish:
  - y abrí mi boca
  - entonces abrí los labios
  lexicon: HALOT
  rationale: Es una fórmula narrativa de inicio de habla. «Abrí mi boca» sigue de cerca el hebreo y es plenamente comprensible en español bíblico y moderno.
- source_word: וָאֲדַבְּרָה וָאֹמְרָה
  english_pob_choice: and spoke, and I said
  chosen_spanish: hablé y dije
  alternatives_spanish:
  - y hablé y dije
  - y empecé a hablar y dije
  lexicon: HALOT
  rationale: Mantiene la secuencia verbal del hebreo sin sobrecargarla. En español, la doble fórmula expresa bien el avance del relato.
- source_word: הָעֹמֵד לְנֶגְדִּי
  english_pob_choice: the one standing before me
  chosen_spanish: al que estaba delante de mí
  alternatives_spanish:
  - al que estaba enfrente de mí
  - al que estaba ante mí
  lexicon: HALOT
  rationale: «Delante de mí» conserva el valor relacional de לְנֶגֶד y suena natural en español. Evita una rigidez excesiva como «enfrente de mí».
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - mi señor
  - señor mío
  - mi señor y amo
  lexicon: HALOT
  rationale: En el diálogo de visión, el español reverente y usual es «Señor mío». No se traduce como nombre divino, sino como tratamiento respetuoso dirigido a la figura celestial.
- source_word: בַּמַּרְאָה
  english_pob_choice: because of the vision
  chosen_spanish: a causa de la visión
  alternatives_spanish:
  - por la visión
  - debido a la visión
  - en la visión
  lexicon: HALOT
  rationale: 'El contexto pide un valor causal: Daniel explica por qué sufre. «A causa de la visión» reproduce ese matiz con claridad.'
- source_word: נֶהֶפְכוּ צִירַי עָלַי
  english_pob_choice: my pains have come upon me
  chosen_spanish: mis dolores me han sobrevenido
  alternatives_spanish:
  - mis angustias me han sobrevenido
  - mis penas se han vuelto sobre mí
  - mis convulsiones me han sobrevenido
  lexicon: HALOT
  rationale: צִירִים puede aludir a dolores, angustias o retorcimientos. «Dolores» es una opción sobria y amplia; «me han sobrevenido» refleja la idea de que lo han alcanzado/u oprimido.
- source_word: וְלֹא עָצַרְתִּי כֹחַ
  english_pob_choice: and I have retained no strength
  chosen_spanish: y no me ha quedado fuerza
  alternatives_spanish:
  - y no he retenido fuerza
  - y no ha permanecido fuerza en mí
  - y no pude conservar fuerza
  lexicon: HALOT
  rationale: עצר en esta construcción comunica falta de conservación o retención de fuerzas. «No me ha quedado fuerza» suena natural en español y conserva el sentido de agotamiento total.
theological_decisions:
- issue: כִּדְמוּת בְּנֵי אָדָם no debe leerse como título mesiánico
  english_pob_reading: 'non-titular human reference: ''something like the likeness of a son of man'''
  chosen_spanish_reading: 'referencia humana no titulativa: «algo como la semejanza de un hijo de hombre»'
  alternative_spanish_readings:
  - el Hijo del Hombre
  - una figura humana
  - uno como un hombre
  rationale: El hebreo es una comparación visionaria y pluralizante en su trasfondo idiomático, no un título. Mantener «hijo de hombre» preserva la tensión del original sin importar una lectura cristológica que el versículo no enuncia.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original; no introducir lecturas doctrinales no explicitadas por el pasaje.'
- issue: אֲדֹנִי como tratamiento respetuoso, no como nombre divino
  english_pob_reading: My lord
  chosen_spanish_reading: Señor mío
  alternative_spanish_readings:
  - mi señor
  - mi amo
  - Señor
  rationale: La escena presenta a Daniel dirigiéndose respetuosamente a una figura en visión. En español, «Señor mío» mantiene la deferencia sin confundirlo con Yahvé ni con el uso litúrgico del nombre divino.
  doctrine_reference: 'DOCTRINE.md términos contestados: YHWH se reserva para Yahvé; los títulos se traducen según su sentido contextual.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés, pero ajusta el español para sonar natural: se conserva la comparación visionaria («algo como la semejanza de un hijo de hombre»), la secuencia verbal del relato y el sentido causal de «a causa de la visión». También se mantiene la distinción entre el tratamiento reverente a la figura de la visión («Señor mío») y el nombre divino Yahvé.'
  spanish_consistency_notes:
  - He usado «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Hijo de hombre» se conserva en sentido no titulativo, conforme al análisis del hebreo.
  - «Señor mío» refleja respeto en la visión y no debe leerse como traducción del nombre de Dios.
  - Las alternativas en nota muestran matices de dolor/angustia porque צִירִים admite más de una concreción en español.
