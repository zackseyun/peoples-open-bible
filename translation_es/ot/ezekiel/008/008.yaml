translation:
  language: es
  text: 'Entonces me dijo[a]: «Hijo de hombre, por favor, abre brecha en el muro». Así abrí brecha en el muro, y he aquí que había una abertura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excava en el muro». El verbo hebreo puede significar excavar a través de una pared o abrir brecha en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano
  lexicon: HALOT
  rationale: Conserva el giro vocativo literal y el patrón fijo del libro en un español claro y bíblicamente reconocible. Evita ‘hijo de hombre’ como título cristológico en este contexto, pero mantiene la forma idiomática de la dirección divina a Ezequiel.
- source_word: חֲתָר
  english_pob_choice: dig
  chosen_spanish: perfora
  alternatives_spanish:
  - excava
  - abre paso a través de
  - rompe
  lexicon: HALOT
  rationale: En español, ‘perforar’ transmite mejor que ‘cavar’ la acción de atravesar una pared para abrir un paso. Mantiene la posibilidad semántica de brecha/apertura sin exigir una interpretación excesivamente técnica.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - te ruego
  lexicon: HALOT
  rationale: La partícula suaviza el mandato; ‘por favor’ reproduce bien ese matiz cortés/urgente en español contemporáneo.
- source_word: בַּקִּיר
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: ‘Muro’ funciona de manera natural en español para una barrera estructural que debe abrirse; ‘pared’ suena más doméstico y ‘muralla’ sería demasiado específico.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: ‘He aquí’ preserva la señal narrativa de descubrimiento repentino que el inglés POB refleja con ‘behold’.
- source_word: פֶּתַח אֶחָד
  english_pob_choice: an opening
  chosen_spanish: una abertura
  alternatives_spanish:
  - una abertura
  - una entrada
  - una abertura única
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘una apertura’, en español ‘una abertura’ suena natural y fiel. Se evita añadir ‘una’ como énfasis cuantitativo (‘una sola’) porque el inglés revisado retiró ‘one’ y el hebreo aquí solo introduce un nuevo acceso visible.
theological_decisions:
- issue: Tratamiento de בֶּן אָדָם en el discurso divino a Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - hombre mortal
  - ser humano
  rationale: Se preserva el vocativo tradicional e idiomático del libro sin convertirlo en un título mesiánico. En este pasaje funciona como forma de dirección profética, no como afirmación doctrinal cristológica.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy; Contested terms: אָדָם'
- issue: Valor de פֶּתַח אֶחָד como hallazgo narrativo
  english_pob_reading: an opening
  chosen_spanish_reading: una abertura
  alternative_spanish_readings:
  - una entrada
  - una abertura única
  rationale: La lectura española mantiene el matiz de descubrimiento repentino sin sobreinterpretar el número. ‘Abertura’ comunica el resultado de la acción de perforar el muro con naturalidad y precisión.
  doctrine_reference: DOCTRINE.md §Translation philosophy
translation_notes:
  revision_awareness: La revisión inglesa eliminó ‘one’ antes de ‘opening’ para ajustarse mejor al hebreo. Esta versión española evita cualquier equivalente de ‘one’ y conserva solo la idea de una abertura surgida al perforar el muro.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios salvo ‘he aquí’, que refleja bien el marcador discursivo hebreo.
  - ‘Muro’ y ‘abertura’ forman una combinación natural en español y conservan la imaginería del pasaje sin introducir detalles no presentes en el hebreo.
  - El vocativo ‘Hijo de hombre’ se conserva por coherencia intertextual con Ezequiel y por fidelidad al patrón de habla divina del libro.
