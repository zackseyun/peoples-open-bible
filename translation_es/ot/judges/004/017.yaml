  language: en
  yaml_path: translation/ot/judges/004/017.yaml
  text: But Sisera fled on foot to the tent of Jael[a], the wife of Heber the Kenite[b], because there was peace between Jabin king of Hazor and the house of Heber the Kenite.
  footnotes:
