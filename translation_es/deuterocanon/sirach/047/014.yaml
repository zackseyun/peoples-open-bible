translation:
  language: es
  text: que preparó una casa para su nombre[a], y estableció el santuario para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego proporcionado para este versículo dice más bien: «Cuán sabio te hiciste en tu juventud, y fuiste llenado como un río con entendimiento», lo que refleja una línea distinta en el contexto circundante. El texto principal sigue aquí el hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: אשר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el que
  lexicon: HALOT
  rationale: La partícula relativa introduce una cláusula que retoma al sujeto del contexto anterior. En español, "que" es la forma más natural y no fuerza una referencia más personal de la que el hebreo exige.
- source_word: הכין
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - dispuso
  - preparó para
  - dejó listo
  lexicon: HALOT
  rationale: '"Preparó" conserva el valor de preparación/disposición del verbo sin convertirlo de manera innecesaria en "construyó". Mantiene la diferencia entre preparar y edificar que el hebreo permite.'
- source_word: בית
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - hogar
  - templo
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal "casa" para reflejar la expresión hebrea "casa para su nombre". Aunque el referente es el templo, "casa" preserva mejor el idiomático del texto.
- source_word: לשמו
  english_pob_choice: for his name
  chosen_spanish: para su nombre
  alternatives_spanish:
  - para el nombre de él
  - en honor de su nombre
  - para su Nombre
  lexicon: HALOT
  rationale: '"Para su nombre" mantiene transparente la expresión hebrea sin interpretarla de forma más explícita que el original. En español suena algo más natural que calcar "para su nombre" con mayúscula devocional.'
- source_word: ויצב
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - levantó
  - puso en pie
  - fundó
  lexicon: HALOT
  rationale: '"Estableció" comunica la idea de fijar o dejar firmemente asentado. Es una solución idiomática en español que conserva la fuerza durativa del verbo.'
- source_word: לעד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para todo tiempo
  lexicon: HALOT
  rationale: '"Para siempre" es la equivalencia natural y clara de duración permanente. Preserva la amplitud retórica del hebreo sin sobreexplicar la permanencia idealizada.'
- source_word: מקדש
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el templo
  - el recinto sagrado
  lexicon: HALOT
  rationale: '"Santuario" reproduce el campo semántico de un lugar sagrado dedicado a Dios. Es fiel y suficientemente transparente en español eclesial contemporáneo.'
- source_word: ὡς ἐσοφίσθης ἐν νεότητί σου, καὶ ἐνεπλήσθης ὡς ποταμὸς συνέσεως
  english_pob_choice: not followed in main text
  chosen_spanish: no seguido en el texto principal; preservado en nota textual
  alternatives_spanish:
  - ¡Cuán sabio te hiciste en tu juventud, y fuiste llenado como un río de entendimiento!
  lexicon: BDAG
  rationale: El paralelo griego presenta una línea distinta del hebreo conservado para este versículo. En español no se incorpora al texto principal porque la base hebrea de alta confianza corresponde a la otra lectura, pero se documenta la divergencia.
theological_decisions:
- issue: Idioma del templo y del nombre divino
  english_pob_reading: Retains 'house for his name' rather than interpretively replacing it with 'temple for the LORD.'
  chosen_spanish_reading: Conservar 'casa para su nombre' en vez de 'templo para Yahvé'.
  alternative_spanish_readings:
  - templo para Yahvé
  - templo en honor de Yahvé
  - casa para el Nombre
  rationale: La expresión hebrea vincula el santuario con el nombre de Dios, no con una descripción más explícita del lugar. En español, mantener el idiomático evita borrar esa tensión teológica y evita introducir una formulación interpretativa no requerida por el hebreo.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Permanencia de לעד
  english_pob_reading: Translate as 'forever' in the main text.
  chosen_spanish_reading: Traducir como 'para siempre'.
  alternative_spanish_readings:
  - eternamente
  - por siempre
  - para todo tiempo
  rationale: El verso usa lenguaje de permanencia idealizada para el santuario. "Para siempre" preserva la retórica bíblica y deja intacta la tensión histórica sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el texto hebreo de alta confianza como base principal, de acuerdo con el audit trail inglés. El paralelo griego se registró como variante textual porque corresponde a una línea distinta del contexto y no al contenido del versículo hebreo conservado.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre lenguaje literal del templo y una paráfrasis interpretativa; por eso aparece 'casa' y no 'templo' en el cuerpo principal.
  - Se prefirió 'para su nombre' para conservar la idiomaticidad semítica y el vínculo teológico con el nombre divino.
  - '''Santuario'' se usa como equivalente de מקדש por su amplitud eclesial y fidelidad al campo semántico.'
  - No se incorporó la lectura griega al texto principal para no mezclar dos tradiciones textuales en un solo versículo sin indicación crítica clara.
