id: LUK.16.24
reference: 'Luke 16:24'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτὸς φωνήσας εἶπεν· Πάτερ Ἀβραάμ, ἐλέησόν με καὶ πέμψον Λάζαρον ἵνα βάψῃ τὸ ἄκρον τοῦ δακτύλου αὐτοῦ ὕδατος καὶ καταψύξῃ τὴν γλῶσσάν μου, ὅτι ὀδυνῶμαι ἐν τῇ φλογὶ ταύτῃ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/016/024.yaml
  text: 'And he cried out and said[a], ‘Father Abraham, have mercy on me, and send Lazarus so that he may dip the tip of his finger in water and cool my tongue, because I am in agony in this flame.’'
  footnotes:
  - marker: a
    text: 'Or ''because I am tormented in this flame.'' The Greek verb can denote severe suffering or torment.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「그가 부르짖어 말하였다. 「아버지 아브라함이여, 나를 긍휼히 여기시어 나사로를 보내, 그의 손가락 끝에 물을 찍어 내 혀를 시원하게 하여 주십시오. 제가 이 불꽃 가운데서 괴로움을 받습니다.」」
  philosophy: optimal-equivalence
theological_decisions:
- issue: '16:24, 16:25 — 부자와 나사로의 사후 상태: 「불꽃 / 괴로움」 이미지의 직역 보존'
  chosen_reading: 이 불꽃 가운데서 괴로움을 받습니다 (ὀδυνῶμαι ἐν τῇ φλογὶ ταύτῃ)
  alternative_readings:
  - 이 불꽃 가운데 고통스럽습니다
  - 이 화염 속에서 고통받고 있습니다
  rationale: 본문은 사후의 고통 이미지를 부드럽게 만들지 않는다. βασανίζομαι/ὀδυνῶμαι의 강도와 φλόξ(불꽃)의 시각적 구체성은 의도된 충격이다. 한국 일반 번역의 「괴로워하나이다」 식으로 약화시키지 않고 「불꽃 가운데서 괴로움을 받습니다」 — 화염의 구체성과 수동의 무게를 모두 보존한다. ᾅδης는 「음부」로(최종 심판처 게헨나와 구분).
  doctrine_reference: DOCTRINE.md §1 (Original-language primacy); §5
