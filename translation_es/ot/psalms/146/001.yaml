translation:
  language: es
  text: ¡Alaben a Yah![a] ¡Alaba, alma mía, a Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Alaben a Yah». Tradicionalmente, esta apertura suele representarse con la transliteración «Aleluya».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alabad!
  alternatives_spanish:
  - ¡Alaben!
  - ¡Alabad!
  lexicon: HALOT
  rationale: Es un imperativo plural dirigido a una convocatoria pública. En español, «¡Alabad!» conserva el tono exhortativo y la fuerza litúrgica sin volverlo una paráfrasis.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  - Hallelujah
  lexicon: HALOT
  rationale: Es la forma breve poética del nombre divino. Se mantiene como «Yah» para reflejar que el hebreo presenta un vocablo distinto de יְהוָה y para no absorberlo en una sola expresión.
- source_word: הַלְלִי
  english_pob_choice: Praise
  chosen_spanish: ¡Alaba!
  alternatives_spanish:
  - Alaba
  - Alabe
  lexicon: HALOT
  rationale: Es un imperativo femenino singular dirigido al alma del salmista. «¡Alaba!» conserva la exhortación directa y la segunda persona implícita en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: En el discurso poético de autoexhortación, «alma mía» reproduce bien la función vocativa y la interioridad del hebreo, con un tono natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según el principio del proyecto como «Yahvé», preservando el nombre personal de Dios en lugar de sustituirlo por un título.
theological_decisions:
- issue: Representación de los dos nombres divinos en el mismo versículo
  english_pob_reading: Render יָהּ as 'Yah' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Renderizar יָהּ como «Yah» y יְהוָה como «Yahvé»
  alternative_spanish_readings:
  - Usar «¡Aleluya!» para הַֽלְלוּ יָהּ y «SEÑOR» para יְהוָה
  - Homogeneizar ambos con «Yahvé»
  rationale: El verso distingue entre la forma breve poética יָהּ y el nombre completo יְהוָה. Mantener ambas en español evita borrar esa distinción lexical y teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior al anclar la nota [a] directamente en el texto español junto a «Yah», conservando además la distinción entre la forma breve יָהּ y el Tetragrámaton יְהוָה.
  spanish_consistency_notes:
  - Se mantuvo el imperativo plural en la primera exclamación y el imperativo singular femenino en la segunda.
  - Se evitó sustituir el nombre divino por un título genérico, conforme al criterio del proyecto.
  - La puntuación exclamativa en ambas cláusulas refleja el carácter exhortativo del hebreo.
  - «alma mía» conserva la autoexhortación poética sin introducir explicaciones ajenas al texto.
