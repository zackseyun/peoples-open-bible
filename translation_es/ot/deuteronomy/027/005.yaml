review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mandato de edificar allí un altar, dedicado a Yahvé, específicamente de piedras, con prohibición de aplicar hierro sobre ellas. Sin embargo, ''alzarás hierro'' no suena natural en español y debilita el valor instrumental de לֹא תָנִיף ... בַּרְזֶל en este contexto cultual.'
  spanish_quality_summary: El texto es claro y digno, y usa correctamente 'Yahvé'. No obstante, 'no alzarás hierro sobre ellas' resulta poco idiomático y puede sugerir simplemente levantar hierro por encima de las piedras. Una formulación como 'no usarás hierro sobre ellas' comunica mejor el español natural sin sobrepasar la evidencia fuente. También conviene alinear la nota al lugar correcto del texto.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → ''Yahvé'', אֱלֹהֶיךָ → ''tu Dios'', מִזְבֵּחַ → ''altar''. No hay conflictos teológicos. La única corrección principal es léxica/estilística en תָנִיף + בַּרְזֶל.'
  issues:
  - severity: medium
    issue: '''No alzarás hierro sobre ellas'' es poco natural en español.'
    rationale: Aunque 'alzar' se acerca a un valor literal de נוף, en este contexto la prohibición se refiere al uso o aplicación de herramienta de hierro sobre las piedras. La redacción actual puede resultar confusa o rígida para lectores hispanohablantes.
  - severity: low
    issue: La nota al pie está anclada en 'tu Dios[a]' pero explica la cláusula final sobre el hierro.
    rationale: Los marcadores deben aparecer en el punto relevante del texto. La nota actual no corresponde al segmento donde surge la alternativa léxica.
  revised_spanish_text: Y edificarás allí un altar para Yahvé tu Dios, un altar de piedras; no usarás hierro sobre ellas[a].
  revised_footnotes:
  - marker: a
    text: 'O: «no usarás un instrumento de hierro sobre ellas».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'no alzarás hierro' por 'no usarás hierro' para expresar de manera natural y fiel el sentido contextual de la prohibición, manteniendo el sustantivo literal 'hierro' y preservando en nota la opción más explícita 'instrumento de hierro'. También se mueve el marcador de nota al segmento pertinente.
