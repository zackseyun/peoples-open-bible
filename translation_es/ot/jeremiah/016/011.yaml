review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: causa introducida por עַל אֲשֶׁר («Porque»), abandono pactual de Yahvé, seguimiento de otros dioses, distinción entre servirles y postrarse ante ellos, y cierre con el no guardar la torá. También mantiene correctamente «Yahvé». Sin embargo, hay un problema de naturalidad y fidelidad discursiva en «dirás a ellos», donde el español normal exige «les dirás» o «dirás a[a] ellos»; además, «no guardaron» al final suena innecesariamente calcado por el orden, y conviene ajustarlo a español natural sin pérdida semántica.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta un calco poco natural en «Entonces dirás a ellos[a]». El resto es legible, aunque «mi ley no guardaron» resulta menos idiomático que «no guardaron mi ley». «Se inclinaron ante ellos» es aceptable, pero «se postraron ante ellos» refleja mejor el matiz cultual de השתחוה y suena más bíblico sin arcaísmo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אֱלֹהִים אֲחֵרִים → «otros dioses» correcto; תּוֹרָה → «ley» con nota alternativa a «instrucción», adecuado. La distinción entre עבד y השתחוה se preserva mejor si se usa «les sirvieron» / «se postraron ante ellos».'
  issues:
  - severity: medium
    issue: «Entonces dirás a ellos[a]» es un calco poco natural en español.
    rationale: Aunque «a ellos» corresponde a אֲלֵיהֶם, en español la construcción normal con «decir» lleva pronombre indirecto («les dirás») o la forma enfática «dirás a[a] ellos». La redacción actual suena forzada en un texto bíblico de lectura pública.
  - severity: low
    issue: «mi ley no guardaron» suena rígido por el orden de palabras.
    rationale: El hebreo permite énfasis por orden, pero en español el orden natural «no guardaron mi ley» comunica el mismo sentido con mejor fluidez.
  - severity: low
    issue: «se inclinaron ante ellos» podría afinarse a «se postraron ante ellos».
    rationale: השׁתחוה denota postración/culto. «Se inclinaron» no es incorrecto, pero «se postraron» refleja con más precisión el gesto cultual y sigue distinguiéndose de «les sirvieron».
  revised_spanish_text: 'Entonces les dirás: «Porque sus padres[a] me abandonaron, declara Yahvé, y fueron tras otros dioses, y les sirvieron, y se postraron ante ellos; pero a mí me abandonaron, y no guardaron mi ley[b]».'
  revised_footnotes:
