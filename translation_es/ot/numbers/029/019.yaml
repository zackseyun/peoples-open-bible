translation:
  language: es
  text: y un macho cabrío como ofrenda por el pecado, además del holocausto continuo[a] y su ofrenda vegetal y sus libaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el holocausto regular".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "sus libaciones"; el plural probablemente se refiere a las libaciones que pertenecen al conjunto de ofrendas prescritas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר עִזִּים
  english_pob_choice: and one male goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un cabrío
  - y un macho de las cabras
  lexicon: HALOT
  rationale: שְׂעִיר עִזִּים es la expresión sacrificial normal para un macho cabrío. 'Macho cabrío' comunica bien el sentido zoológico y cultual en español sin volverla torpe.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El cardinal especifica la cantidad del animal ofrendado; en español natural concuerda como artículo indefinido antes del sustantivo.
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - para una ofrenda por el pecado
  - como sacrificio expiatorio
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת designa la ofrenda por el pecado, no el pecado abstracto. 'Como ofrenda por el pecado' conserva la función cultual y evita una paraphrase excesiva.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además del
  lexicon: HALOT
  rationale: Marca que esta ofrenda se añade al conjunto prescrito. 'Además de' es claro y natural en español bíblico contemporáneo.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto continuo
  alternatives_spanish:
  - el holocausto regular
  - el holocausto perpetuo
  lexicon: HALOT
  rationale: '''Holocausto'' preserva el término sacrificial tradicional para עֹלָה, y ''continuo'' refleja הַתָּמִיד. ''Regular'' sería posible, pero ''continuo'' expresa mejor la idea de una ofrenda establecida y repetida.'
- source_word: וּמִנְחָתָהּ
  english_pob_choice: and its grain offering
  chosen_spanish: y su ofrenda vegetal
  alternatives_spanish:
  - y su ofrenda de cereal
  - y su oblación
  lexicon: HALOT
  rationale: מִנְחָה en este marco sacrificial es la ofrenda que acompaña al holocausto. 'Ofrenda vegetal' mantiene una equivalencia usada en tradiciones bíblicas españolas y evita reducirla a 'grano' únicamente.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas líquidas
  - y sus bebidas derramadas
  lexicon: HALOT
  rationale: '''Libaciones'' es el término cultual natural en español para נֶסֶךְ. El plural se conserva como en el hebreo, siguiendo el señalamiento del audit trail inglés.'
theological_decisions:
- issue: Renderización de עֹלָה / הַתָּמִיד
  english_pob_reading: the regular burnt offering
  chosen_spanish_reading: el holocausto continuo
  alternative_spanish_readings:
  - el holocausto regular
  - el holocausto perpetuo
  rationale: No se atenúa el carácter sacrificial de עֹלָה ni el rasgo de continuidad de הַתָּמִיד. 'Continuo' resulta más fiel al valor de una ofrenda permanente/recurrente que 'regular', sin imponer una interpretación doctrinal adicional.
  doctrine_reference: Éxodo 29:38-42; Números 28:3-8
- issue: Conservación del plural en las libaciones
  english_pob_reading: their drink offerings
  chosen_spanish_reading: sus libaciones
  alternative_spanish_readings:
  - su libación
  rationale: Se mantiene el plural del hebreo y del audit trail inglés. Aunque en castellano podría suavizarse a singular por referencia al complejo sacrificial, conservar el plural evita borrar la tensión textual documentada.
  doctrine_reference: Números 28:12-15; Números 29:3-6
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios en el pase más reciente; el veredicto de control cruzado fue de alta concordancia. La redacción española sigue ese mismo perfil estable, sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto cuando el texto no nombra explícitamente el tetragrámaton en este versículo.
  - '''Holocausto'' se conserva como término cultual para עֹלָה, en lugar de ''ofrenda quemada'', por consistencia con la terminología bíblica española del proyecto.'
  - Se preserva el plural 'sus libaciones' para reflejar la forma hebrea וְנִסְכֵּיהֶם y la nota auditada del texto inglés.
