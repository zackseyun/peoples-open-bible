lexical_decisions:
- source_word: מהביט
  chosen: of staring
  alternatives:
  - of looking
  - of gazing
  lexicon: HALOT
  rationale: The Hebrew infinitive from נבט/הביט means 'to look' or 'to regard.' In this shame-list context, the sense is not a neutral glance but a fixed, improper look. 'Staring' brings out the moral force, supported by the Greek κατανοήσεως ('observing, looking closely at').
- source_word: אל פני
  chosen: at the face of
  alternatives:
  - upon
  - toward
  lexicon: HALOT
  rationale: The Hebrew literally says 'to the face of.' Retaining 'face' preserves the concrete idiom and matches the Greek προσώπου in the parallel tradition, while still reading naturally in English.
- source_word: זרה
  chosen: another man’s wife
  alternatives:
  - a strange woman
  - a чужая woman
  - a married woman
  lexicon: HALOT
  rationale: Hebrew זרה can mean 'strange/foreign woman,' but in wisdom literature it often denotes a woman forbidden to the man in view. Here the Greek parallel has γυναικὸς ὑπάνδρου, explicitly 'a married woman.' Because the task requires using the Greek parallel as actual translation input, 'another man’s wife' best captures the likely sense rather than the misleadingly ethnic 'foreign woman.'
- source_word: ומהתקרב
  chosen: and of drawing near
  alternatives:
  - and of approaching
  - and of coming near
  lexicon: HALOT
  rationale: The infinitive from קרב means 'to come near/approach.' 'Drawing near' preserves the physical and potentially sexual impropriety implied by the context.
- source_word: שפחתה
  chosen: her maidservant
  alternatives:
  - her female slave
  - her servant-girl
  lexicon: HALOT
  rationale: שפחה denotes a female servant/slave. 'Maidservant' is a readable rendering that preserves the female domestic role without over-paraphrase. 'Female slave' is possible, but the immediate point is the household subordinate attached to the married woman.
