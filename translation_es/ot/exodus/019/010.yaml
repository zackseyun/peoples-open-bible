review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: Yahvé habla a Moisés, le ordena ir al pueblo, consagrarlo hoy y mañana, y que laven sus vestidos. Conserva correctamente Yahvé para יְהוָה, ‘el pueblo’ para הָעָם, ‘conságralos’ para וְקִדַּשְׁתָּם y ‘hoy y mañana’ para הַיּוֹם וּמָחָר. La nota léxica sobre קדשׁ también preserva las alternativas auditadas.'
  spanish_quality_summary: La redacción es clara y digna, pero ‘y laven sus vestidos’ suena gramaticalmente incompleto en español porque el verbo plural no tiene sujeto expreso y puede leerse torpemente tras el imperativo singular dirigido a Moisés. Conviene explicitar la relación exhortativa con ‘que laven sus vestidos’, que mantiene el sentido del hebreo y mejora la naturalidad. ‘Vestidos’ es aceptable, aunque ‘ropas’ también sería posible; no requiere cambio.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ‘Yahvé’; קדשׁ -> ‘conságralos’ con nota alternativa; no hay conflictos con otros términos doctrinales. La única mejora necesaria es sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: Construcción ‘y laven sus vestidos’ poco natural tras el imperativo a Moisés
    rationale: El hebreo וְכִבְּסוּ es plural y expresa la acción que debe realizar el pueblo como resultado de la orden dada por medio de Moisés. En español, ‘y laven sus vestidos’ queda abrupto y puede percibirse como error de concordancia o mandato directo sin sujeto. ‘Y que laven sus vestidos’ conserva mejor el sentido exhortativo/resultativo.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés: «Ve al pueblo y conságralos[a] hoy y mañana, y que laven sus vestidos».

