translation:
  language: es
  text: Entonces Moisés salió y le comunicó al pueblo las palabras de Yahvé. Reunió a setenta hombres de entre los ancianos del pueblo y los colocó alrededor de la tienda[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los puso» o «los hizo ponerse de pie». El verbo hebreo es literalmente «los hizo ponerse de pie».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la tienda»; por el contexto probablemente se refiere a la tienda de reunión.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: יצא en narración consecutiva expresa salir de un lugar previo. «Salió» es la forma natural y directa en español, sin añadir matices no presentes en el hebreo.
- source_word: וַיְדַבֵּר אֶל הָעָם אֵת דִּבְרֵי יְהוָה
  english_pob_choice: spoke to the people the words of Yahweh
  chosen_spanish: habló al pueblo las palabras de Yahvé
  alternatives_spanish:
  - les comunicó las palabras de Yahvé
  - habló al pueblo el mensaje de Yahvé
  lexicon: HALOT
  rationale: El hebreo conserva la expresión concreta «las palabras de Yahvé». En español, «habló al pueblo las palabras de Yahvé» mantiene esa formulación sin sustituirla por un resumen más libre como «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino revelado, transliterándolo como «Yahvé» en lugar de ocultarlo con un título.
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: HALOT
  rationale: אָסַף indica reunir o congregar. «Reunió» conserva el sentido de agrupar para una función concreta y suena natural en español bíblico contemporáneo.
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: El sustantivo masculino אִישׁ, tras el numeral, refiere aquí a varones. «Hombres» preserva esa referencia y evita neutralizar el dato gramatical y contextual.
- source_word: מִזִּקְנֵי הָעָם
  english_pob_choice: from the elders of the people
  chosen_spanish: de entre los ancianos del pueblo
  alternatives_spanish:
  - de los ancianos del pueblo
  - entre los ancianos del pueblo
  lexicon: HALOT
  rationale: זִקְנֵי no significa simplemente «viejos», sino los ancianos como grupo reconocido de autoridad. «De entre» refleja mejor el valor partitivo de מִן.
- source_word: וַיַּעֲמֵד אֹתָם
  english_pob_choice: stationed them
  chosen_spanish: los colocó
  alternatives_spanish:
  - los puso
  - los hizo estar de pie
  lexicon: HALOT
  rationale: El hifil de עמד es causativo, «hacer estar» o «poner en posición». En español, «los colocó» expresa la idea de situarlos deliberadamente sin sonar mecánico.
- source_word: סְבִיבֹת הָאֹהֶל
  english_pob_choice: around the tent
  chosen_spanish: alrededor de la tienda
  alternatives_spanish:
  - alrededor de la tienda de reunión
  - en torno a la tienda
  lexicon: HALOT
  rationale: הָאֹהֶל es literalmente «la tienda». Aunque el contexto puede referirse a la tienda de reunión, aquí el hebreo solo dice «la tienda», y la traducción conserva esa forma.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión del POB es preservar el nombre propio divino en lugar de sustituirlo por un título. En español, «Yahvé» mantiene esa elección y es coherente con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de אִישׁ en «setenta hombres»
  english_pob_reading: seventy men
  chosen_spanish_reading: setenta hombres
  alternative_spanish_readings:
  - setenta personas
  rationale: El hebreo es masculino y, en este contexto, alude a los ancianos varones seleccionados para una función pública. No se neutraliza el término para no borrar un rasgo del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: «La tienda» en lugar de una expansión interpretativa
  english_pob_reading: around the tent
  chosen_spanish_reading: alrededor de la tienda
  alternative_spanish_readings:
  - alrededor de la tienda de reunión
  - alrededor del tabernáculo
  rationale: El hebreo dice simplemente «la tienda». Aunque el contexto inmediato puede apuntar a la tienda de reunión, no se introduce una expansión que el verso no explicita.
  doctrine_reference: 'DOCTRINE.md: Source-bound translation and controlled inference'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios y el pasaje mantiene alto acuerdo con la auditoría inglesa. Esta versión conserva las decisiones principales: el nombre divino como «Yahvé», la lectura masculina de «hombres» y la literalidad controlada de «la tienda».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה.
  - «Ancianos del pueblo» traduce זִקְנֵי הָעָם sin perder el matiz de autoridad comunitaria.
  - «Los colocó» corresponde al valor causativo de וַיַּעֲמֵד y queda respaldado por la nota alternativa.
  - Se conserva «la tienda» en el cuerpo principal y se aclara su posible referencia contextual en nota.
