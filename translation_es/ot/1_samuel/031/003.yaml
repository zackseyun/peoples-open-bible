    rationale: No es un error grave mantener la información appositiva en nota, pero conviene formularla como alternativa literal/previa, no como si fuera necesaria para el sentido.
  revised_spanish_text: Y la batalla se volvió pesada contra Saúl, y los arqueros[a] lo encontraron, y quedó gravemente herido[b] por los arqueros.
