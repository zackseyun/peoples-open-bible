translation:
  language: es
  text: Elijan para ustedes hombres sabios, entendidos y reconocidos[a] de entre sus tribus, y yo los nombraré como sus jefes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'conocidos' o 'bien conocidos'; el hebreo puede poner el acento en hombres de reputación establecida entre las tribus.
    reason: lexical_alternative
  - marker: b
    text: O 'líderes'. Literalmente, 'cabezas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Choose
  chosen_spanish: Elijan
  alternatives_spanish:
  - Escogan
  - Elijan para ustedes
  lexicon: HALOT
  rationale: En este contexto de selección de líderes, el imperativo pide escoger candidatos; 'Elijan' comunica mejor la acción que un calco como 'traigan' o 'den'.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - por ustedes
  lexicon: HALOT
  rationale: La fuerza reflexiva indica que la elección recae en el propio pueblo; 'para ustedes' mantiene esa idea de manera natural en español.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: El hebreo es masculino plural y se refiere a los varones que ocuparán funciones de liderazgo tribal; 'hombres' preserva ese valor léxico y la precisión de género.
- source_word: חֲכָמִים
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - sensatos
  lexicon: HALOT
  rationale: En este marco de gobierno, el término apunta a juicio y buen criterio; 'sabios' es la equivalencia más directa y digna.
- source_word: וּנְבֹנִים
  english_pob_choice: discerning
  chosen_spanish: discernientes
  alternatives_spanish:
  - entendidos
  - perspicaces
  - de buen discernimiento
  lexicon: HALOT
  rationale: La idea central es la capacidad de percibir con acierto y juzgar bien. 'Discernientes' preserva ese matiz sin diluirlo en mera inteligencia abstracta.
- source_word: וִידֻעִים
  english_pob_choice: well-known
  chosen_spanish: bien conocidos
  alternatives_spanish:
  - conocidos
  - reconocidos
  lexicon: HALOT
  rationale: El participio pasivo sugiere personas reconocidas públicamente, con reputación establecida entre las tribus; 'bien conocidos' refleja esa notoriedad sin añadir más de lo debido.
- source_word: לְשִׁבְטֵיכֶם
  english_pob_choice: from your tribes
  chosen_spanish: de sus tribus
  alternatives_spanish:
  - de entre sus tribus
  - según sus tribus
  lexicon: HALOT
  rationale: Aunque el hebreo admite varios matices, aquí la frase identifica el grupo de procedencia de los candidatos. 'De sus tribus' es idiomático y claro en español.
- source_word: וַאֲשִׂימֵם
  english_pob_choice: I will appoint them
  chosen_spanish: los nombraré
  alternatives_spanish:
  - los pondré
  - los estableceré
  - los designaré
  lexicon: HALOT
  rationale: En esta promesa de instalación en cargo, 'nombraré' comunica la acción oficial de asignarlos a una función de gobierno. 'Designaré' también sería posible, pero 'nombraré' es más natural aquí.
- source_word: בְּרָאשֵׁיכֶם
  english_pob_choice: as your heads
  chosen_spanish: como sus jefes
  alternatives_spanish:
  - como sus cabezas
  - como sus líderes
  lexicon: HALOT
  rationale: Se conserva el sentido de jefatura sin calcar 'cabezas', que en español sonaría menos natural. 'Jefes' expresa la metáfora hebrea de manera clara y fiel.
theological_decisions:
- issue: Rendering of the leadership metaphor ראשׁ
  english_pob_reading: Literally 'heads,' rendered as 'heads' with a note in English about 'leaders.'
  chosen_spanish_reading: '''jefes'' in the main text, preserving the leadership sense of the metaphor'
  alternative_spanish_readings:
  - cabezas
  - líderes
  rationale: El hebreo usa una metáfora de autoridad. En español, 'jefes' transmite esa función con mayor naturalidad que 'cabezas', y evita perder claridad pastoral. La tensión metafórica se conserva en el sentido, aunque no se calque la imagen.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Preserve meaning over form when idiom requires)
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de acuerdo en el texto base y en las decisiones de sentido; no se registran revisiones sustantivas posteriores. La redacción española sigue el mismo perfil de equivalencia óptima que el inglés auditado, con adaptación idiomática mínima donde el calco resultaría poco natural.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y sobrio, adecuado para lectura eclesial.
  - Se conservó la precisión de género de אֲנָשִׁים con 'hombres', conforme al criterio de traducción del proyecto.
  - '''Bien conocidos'' evita reducir וִידֻעִים a un simple ''conocidos'' sin matiz de reputación pública.'
  - '''Jefes'' comunica la metáfora de ראשׁ sin sacrificar comprensibilidad en español.'
  - 'La puntuación y el orden de los elementos siguen la progresión del hebreo: mandato, cualidades, procedencia, nombramiento.'
