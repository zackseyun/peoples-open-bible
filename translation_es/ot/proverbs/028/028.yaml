translation:
  language: es
  text: Cuando se levantan los impíos[a], un hombre se esconde; pero cuando perecen[b], los justos aumentan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es escondido»; el verbo hebreo puede leerse como pasivo («un hombre es escondido») o con sentido reflexivo/medio («un hombre se esconde»).
    reason: lexical_alternative
  - marker: b
    text: «Un hombre» traduce hebreo adam, que puede funcionar de manera genérica para un ser humano en el lenguaje proverbial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקוּם
  english_pob_choice: when ... rise
  chosen_spanish: Cuando se levantan
  alternatives_spanish:
  - Al levantarse
  - En el levantarse de
  lexicon: HALOT
  rationale: La construcción preposicional con infinitivo expresa tiempo. En español, «cuando se levantan» comunica con naturalidad el valor temporal sin perder la relación con el verbo de movimiento/ascenso del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: Es un plural sustantivado para personas caracterizadas por impiedad o maldad. «Impíos» preserva el registro sapiencial y la categoría moral sin añadir matices más intensos que el hebreo no exige.
- source_word: יִסָּתֵר
  english_pob_choice: hides himself
  chosen_spanish: se esconde
  alternatives_spanish:
  - es escondido
  - se oculta
  lexicon: HALOT
  rationale: El nifal puede leerse pasivo o con sentido medio/reflexivo. En este proverbio, la idea más natural en español es que la persona se retira de la vista; «se esconde» conserva esa ambigüedad funcional mejor que un pasivo rígido.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  lexicon: HALOT
  rationale: אָדָם es singular y genérico en lenguaje proverbial. «Un hombre» mantiene la forma proverbial hebrea y el valor representativo sin convertirlo en un abstracto colectivo.
- source_word: וּבְאָבְדָם
  english_pob_choice: but when they perish
  chosen_spanish: pero cuando perecen
  alternatives_spanish:
  - y cuando perecen
  - cuando desaparecen
  lexicon: HALOT
  rationale: La partícula conjuntiva introduce aquí el paralelo antitético del dicho; por eso «pero» refleja mejor la oposición implícita. «Perecen» conserva el valor de desaparecer o morir del verbo sin sobretraducirlo.
- source_word: יִרְבּוּ
  english_pob_choice: increase
  chosen_spanish: aumentan
  alternatives_spanish:
  - se multiplican
  - crecen en número
  lexicon: HALOT
  rationale: El verbo indica hacerse más numerosos. «Aumentan» es breve, idiomático en español y suficientemente amplio para no restringir el matiz a un aumento puramente numérico.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de corazón
  lexicon: HALOT
  rationale: En literatura sapiencial, el plural sustantivado designa a quienes actúan con rectitud. «Los justos» es el equivalente español más estable y fiel al campo semántico del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y coincide en sustancia con el auditor de inglés: cláusula temporal para בְּקוּם, sentido alternante pasivo/reflexivo para יִסָּתֵר, valor genérico de אָדָם, y paralelo antitético en la segunda mitad del proverbio. No se registraron revisiones sustantivas en el pass más reciente.'
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial conciso y proverbial.
  - Se prefirió «impíos/justos» por consistencia bíblica en español y por su valor categorial.
  - Se evitó una traducción demasiado abstracta de אָדָם para conservar el paralelismo con el hebreo.
  - La puntuación reproduce la antítesis del versículo con punto y coma, natural en español bíblico moderno.
