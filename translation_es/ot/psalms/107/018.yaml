translation:
  language: es
  text: Su alma aborrecía todo alimento[a], y ellos se acercaban a las puertas de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su apetito rechazaba todo alimento', o simplemente 'aborrecían todo alimento'; el hebreo 'su alma' (נַפְשָׁם) puede denotar el ser interior, la vida o el apetito según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֹכֶל
  english_pob_choice: all food
  chosen_spanish: todo alimento
  alternatives_spanish:
  - todo comida
  - todo tipo de alimento
  - todo tipo de comida
  lexicon: HALOT
  rationale: כָּל עם אֹכֶל expresa totalidad colectiva. En español, "todo alimento" suena natural y conserva el alcance general sin volverlo demasiado técnico ni fragmentarlo en plural innecesario.
- source_word: תְּתַעֵב
  english_pob_choice: loathed
  chosen_spanish: aborrecía
  alternatives_spanish:
  - detestaba
  - repugnaba
  - odiaba
  lexicon: HALOT
  rationale: El piel de תעב comunica fuerte repulsión. "Aborrecer" transmite bien esa intensidad en español bíblico moderno sin caer en un calco pesado o en un término menos exacto como "odiar".
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su ser interior
  - su vida
  - su apetito
  lexicon: HALOT
  rationale: נפש puede significar alma, vida, persona interior o apetito. Se conserva "alma" para respetar la imagen hebrea y la tensión antropológica documentada por la POB, dejando abierta la posible referencia al apetito mediante la nota.
- source_word: וַיַּגִּיעוּ
  english_pob_choice: they drew near
  chosen_spanish: se acercaban
  alternatives_spanish:
  - se aproximaron
  - llegaron
  - alcanzaron
  lexicon: HALOT
  rationale: El verbo en contexto marca aproximación a un límite. "Se acercaban" reproduce el movimiento hacia el umbral de la muerte y mantiene el valor aspectual de proceso o avance hacia ese punto.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - hasta a
  lexicon: HALOT
  rationale: En español, con "se acercaban" la preposición más natural es "a". La idea de límite queda preservada por la imagen completa de "las puertas de la muerte".
- source_word: שַׁעֲרֵי מָוֶת
  english_pob_choice: the gates of death
  chosen_spanish: las puertas de la muerte
  alternatives_spanish:
  - las puertas de la muerte misma
  - las puertas de muerte
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de umbral o acceso al ámbito de la muerte. "Puertas" es más natural en español que "portones" y mantiene la fuerza imagética del texto.
theological_decisions:
- issue: Valor de נֶפֶשׁ en un contexto de enfermedad extrema
  english_pob_reading: their soul
  chosen_spanish_reading: su alma
  alternative_spanish_readings:
  - su apetito
  - ellos mismos
  - su vida
  rationale: La POB preserva el sustantivo antropológico y anota la posible sombra semántica hacia el apetito. En español, "su alma" mantiene esa textura del hebreo sin reducir el sentido a mero hambre física.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Imagen de proximidad a la muerte
  english_pob_reading: they drew near to the gates of death
  chosen_spanish_reading: se acercaban a las puertas de la muerte
  alternative_spanish_readings:
  - llegaron a las puertas de la muerte
  - estaban por llegar a las puertas de la muerte
  rationale: La formulación conserva la metáfora límite del hebreo sin convertirla en una interpretación más explicativa. "Se acercaban" comunica peligro inminente y respeta la escena poética.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: 'El texto base y la revisión reciente coinciden sustancialmente con el análisis auditado: no se requieren cambios sustantivos. Se mantiene la decisión de conservar la imagen hebrea de נֶפֶשׁ y la metáfora de las puertas de la muerte, con nota de alternativa semántica para el posible matiz de apetito.'
  spanish_consistency_notes:
  - Se conserva 'alma' para נֶפֶשׁ, en línea con la POB inglesa y con el criterio de no aplanar la antropología hebrea.
  - '''Puertas de la muerte'' mantiene la metáfora literal sin introducir ''Seol'' ni otra glosa no presente en el texto fuente.'
  - El tiempo verbal imperfectivo 'se acercaban' ayuda a reflejar el avance hacia el límite descrito por el hebreo.
