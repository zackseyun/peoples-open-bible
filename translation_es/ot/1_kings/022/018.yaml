translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Josafat[a]: «¿No te dije que él no profetizaría bien acerca de mí, sino solo mal?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pero solo desastre». El hebreo dice literalmente «bien ... sino solo mal», usando un contraste tajante que aquí puede referirse a una profecía desfavorable o desastrosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: WLC/HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia con un español natural y digno.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel, Ahab
  lexicon: WLC/HALOT
  rationale: Se mantiene el sintagma del hebreo sin añadir el nombre propio, que no aparece en el texto base.
- source_word: אֶל יְהוֹשָׁפָט
  english_pob_choice: to Jehoshaphat
  chosen_spanish: a Josafat
  alternatives_spanish:
  - a rey Josafat
  - a Jehosafat
  lexicon: WLC/HALOT
  rationale: La preposición introduce discurso directo; se conserva el nombre personal sin título añadido, siguiendo la fuente.
- source_word: הֲלוֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No te dije... ?
  alternatives_spanish:
  - ¿Acaso no te dije... ?
  - ¿No había yo dicho... ?
  lexicon: WLC/HALOT
  rationale: La forma hebrea expresa una pregunta retórica de reproche; en español, «¿No te dije...?» comunica con naturalidad ese tono.
- source_word: אָמַרְתִּי אֵלֶיךָ
  english_pob_choice: tell you
  chosen_spanish: te dije
  alternatives_spanish:
  - te había dicho
  - te lo dije
  lexicon: WLC/HALOT
  rationale: El verbo de habla queda bien en pasado simple dentro de la pregunta retórica; no se introduce un objeto no explícito como «lo».
- source_word: לֹא יִתְנַבֵּא
  english_pob_choice: he would not prophesy
  chosen_spanish: no profetizaría
  alternatives_spanish:
  - no profetiza
  - no profetizará
  lexicon: WLC/HALOT
  rationale: El imperfecto hebreo, en relación con «te dije», se vierte con futuro en el pasado; «profetizaría» refleja esa relación temporal.
- source_word: עָלַי
  english_pob_choice: concerning me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - respecto de mí
  lexicon: WLC/HALOT
  rationale: La preposición permite «acerca de / sobre»; se elige una forma clara y neutral para el habla profética.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - algo bueno
  - lo favorable
  lexicon: WLC/HALOT
  rationale: Aquí el adjetivo funciona en contraste con «mal» dentro de una queja sobre profecía favorable o desfavorable; «bien» mantiene el paralelismo con «mal» en español.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - sino únicamente
  - excepto que
  lexicon: WLC/HALOT
  rationale: Después de la negación, la construcción expresa exclusión/contraste; «sino solo» reproduce ese énfasis de manera natural.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - desastre
  - daño
  lexicon: WLC/HALOT
  rationale: En español, «mal» preserva el contraste léxico directo con «bien» y evita fijar prematuramente una lectura moral o circunstancial; el contexto admite también «desastre».
theological_decisions:
- issue: Contraste טוֹב / רָע en la queja del rey
  english_pob_reading: good ... but only evil, with a footnoted alternative 'disaster'
  chosen_spanish_reading: bien ... sino solo mal, con posibilidad contextual de 'desastre'
  alternative_spanish_readings:
  - bien ... sino solo desastre
  - lo favorable ... sino solo desgracia
  rationale: El hebreo mantiene una oposición fuerte entre términos generales. En español, «bien/mal» conserva el paralelismo sin resolver la amplitud semántica de רָע; la alternativa contextual «desastre» queda indicada para no perder la tensión lexical.
  doctrine_reference: Preservar la tensión léxica y contextual sin suavizar el contraste; coherencia terminológica con notas cuando hay amplitud semántica.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el hebreo y la decisión auditada del texto inglés: un encabezamiento narrativo con waw consecutiva, una pregunta retórica de reproche y el contraste léxico fuerte entre טוֹב y רָע. Se mantuvo la opción de sentido amplio para רָע sin introducir el nombre Ahab ni títulos no presentes en el texto base.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término predeterminado del proyecto, aunque este versículo no lo contiene.
  - Se evita 'Cristo'/'Mesías' porque no aparecen en el pasaje.
  - Se mantiene «profetizar» para נבא, conforme al uso bíblico estándar y al audit trail inglés.
  - Se usa «mal» como equivalente principal de רָע y se reserva la alternativa contextual en nota, para no borrar la tensión léxica del hebreo.
