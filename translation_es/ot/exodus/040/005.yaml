review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: dos mandatos de colocación, el altar de oro para incienso delante del arca del testimonio, y el elemento textil en la entrada del tabernáculo. También mantiene correctamente «arca del testimonio» frente a la tradición «arca del pacto». Sin embargo, «velo» para מָסַךְ no sigue la distinción documentada del POB, que prefiere «screen» para diferenciarlo de otros términos cultuales como el velo interior.'
  spanish_quality_summary: El español es claro y digno, pero «el velo de la entrada del tabernáculo» introduce una asociación terminológica menos precisa en contexto tabernacular. «La cortina para la entrada del tabernáculo» o «la cortina de la entrada del tabernáculo» resulta más natural y más fiel a la función de מָסַךְ sin confundirla con el velo interior. También conviene ajustar la nota [a], porque «el altar de incienso» omite el matiz explícito de oro/oro dorado del hebreo.
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «tabernáculo» y «arca del testimonio». Desalineación principal: מָסַךְ debe evitar «velo» aquí para no borrar la distinción frente a פָּרֹכֶת; una forma como «cortina» refleja mejor la decisión inglesa «screen». La nota alternativa sobre el altar debe reflejar con precisión la alternativa inglesa documentada: «el altar de oro del incienso» o más tradicionalmente «el altar de incienso de oro», no simplemente «el altar de incienso».'
  issues:
  - severity: high
    issue: «velo» para מָסַךְ
    rationale: El expediente inglés eligió «screen» precisamente para distinguir מָסַךְ del velo interior. En español, «velo» tiende a confundirse con el término técnico para פָּרֹכֶת y debilita la precisión cultual del pasaje.
  - severity: medium
    issue: Nota [a] omite el componente «de oro/golden»
    rationale: La nota inglesa ofrece como alternativa «the golden altar of incense», no simplemente «altar of incense». La nota española actual elimina un rasgo léxico explícito del hebreo.
  - severity: low
    issue: Repetición de «pondrás» en ambos verbos
    rationale: No es incorrecto, y el propio borrador lo justifica. Sin embargo, una ligera variación como «colocarás» en el segundo verbo podría reflejar mejor la distinción inglesa. Aun así, no es necesario forzarla en español.
  revised_spanish_text: Y pondrás el altar de oro[a] para incienso delante del arca del testimonio[b], y pondrás la cortina de la entrada del tabernáculo.
  revised_footnotes:
