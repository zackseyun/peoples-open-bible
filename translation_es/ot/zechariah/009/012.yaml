translation:
  language: es
  text: Vuelvan a la fortaleza, prisioneros de esperanza[a]; aun hoy declaro que te restauraré el doble[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cautivos de esperanza». La expresión hebrea es metafórica y puede sugerir a quienes están atados, pero sostenidos por la esperanza.
    reason: lexical_alternative
  - marker: b
    text: O «te restauraré una doble porción» o «te pagaré el doble».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: Volved
  alternatives_spanish:
  - Regresad
  - Volved atrás
  - Volved de nuevo
  lexicon: HALOT
  rationale: El imperativo plural de שוב pide una orden directa. «Volved» conserva la fuerza exhortativa y la dirección de retorno sin sobreexplicar si es física, pactal o ambas.
- source_word: לְבִצָּרוֹן
  english_pob_choice: to the stronghold
  chosen_spanish: a la fortaleza
  alternatives_spanish:
  - al baluarte
  - a la plaza fuerte
  - al refugio
  lexicon: HALOT
  rationale: בִּצָּרוֹן nombra un lugar fortificado. «Fortaleza» mantiene la imagen concreta y es natural en español; «baluarte» o «plaza fuerte» son posibles pero algo más marcados.
- source_word: אֲסִירֵי הַתִּקְוָה
  english_pob_choice: prisoners of hope
  chosen_spanish: presos de esperanza
  alternatives_spanish:
  - prisioneros de esperanza
  - cautivos de esperanza
  lexicon: HALOT
  rationale: La cadena constructa literalmente es «prisioneros de la esperanza». «Presos de esperanza» conserva la metáfora con un español más fluido; «prisioneros de esperanza» es igualmente viable, pero suena más literario/formal.
- source_word: גַּם הַיּוֹם
  english_pob_choice: even today
  chosen_spanish: aun hoy
  alternatives_spanish:
  - también hoy
  - hoy mismo
  - incluso hoy
  lexicon: HALOT
  rationale: La partícula intensifica la inmediatez. «Aun hoy» reproduce bien ese énfasis temporal sin añadir matices inexistentes.
- source_word: מַגִּיד
  english_pob_choice: I declare
  chosen_spanish: declaro
  alternatives_spanish:
  - anuncio
  - proclamo
  - hago saber
  lexicon: HALOT
  rationale: El participio con fuerza verbal funciona como declaración presente. «Declaro» expresa de forma natural esa enunciación solemne en primera persona.
- source_word: מִשְׁנֶה
  english_pob_choice: double
  chosen_spanish: el doble
  alternatives_spanish:
  - una doble porción
  - dos veces más
  lexicon: HALOT
  rationale: מִשְׁנֶה significa «doble» o «doble porción». «El doble» es conciso y deja abierta la clase de restitución, como en el hebreo.
- source_word: אָשִׁיב לָךְ
  english_pob_choice: I will restore double to you
  chosen_spanish: te devolveré el doble
  alternatives_spanish:
  - te restauraré el doble
  - te restituiré el doble
  - te pagaré el doble
  lexicon: HALOT
  rationale: El causativo de שוב aquí tiene sentido restitutivo. «Devolveré» comunica bien la idea de restauración/restitución sin reducirla a un pago meramente transaccional.
theological_decisions:
- issue: Pronombre singular femenino «לָךְ»
  english_pob_reading: Singular 'you' retained without expansion, likely addressing personified Zion/Jerusalem or the covenant people as a collective singular.
  chosen_spanish_reading: Mantener el singular indirecto «te» sin explicitar el referente.
  alternative_spanish_readings:
  - os devolveré el doble
  - les devolveré el doble
  - te devolveré el doble, hija de Sion
  rationale: El sufijo hebreo es singular femenino; el español puede conservar ese valor mediante «te» sin decidir en el texto principal si se trata de Sion personificada, Jerusalén o el pueblo colectivo. Así se preserva la tensión interpretativa documentada por la POB.
  doctrine_reference: Preservar la tensión teológica y gramatical en vez de resolverla en una paráfrasis.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el inglés POB quedó en acuerdo alto y la lectura se mantuvo estable. Esta versión española sigue de cerca el trazado auditado, conservando la metáfora de la esperanza, el énfasis temporal de «aun hoy» y la restitución de «el doble» sin resolver indebidamente el destinatario singular femenino.'
  spanish_consistency_notes:
  - Se mantiene Yahvé en otros contextos según la pauta del proyecto; este versículo no contiene el Tetragrámaton.
  - Se usa «presos» para preservar la fuerza metafórica de אֲסִירֵי sin endurecerla en exceso.
  - «Te» conserva el singular femenino del hebreo sin añadir glosa interpretativa al cuerpo del texto.
  - El registro es bíblico y contemporáneo, evitando arcaísmos innecesarios.
