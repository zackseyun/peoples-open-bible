translation:
  language: es
  text: 'Así que el rey consultó y fabricó dos becerros de oro, y les dijo: “Es demasiado para ustedes subir a Jerusalén[a]. Miren: estos son tus dioses[b], Israel, los que te hicieron subir de la tierra de Egipto.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Ya han subido bastante a Jerusalén.”'
    reason: lexical_alternative
  - marker: b
    text: 'O: “tu Dios, Israel”. La forma hebrea puede funcionar a veces como un título singular, y la redacción evoca Éxodo 32:4; aquí, sin embargo, los dos becerros y el verbo plural favorecen “tus dioses”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: took counsel
  chosen_spanish: consultó
  alternatives_spanish:
  - tomó consejo
  - deliberó
  lexicon: HALOT
  rationale: El nifal de יעץ expresa consulta/deliberación. En español, “consultó” comunica con naturalidad la acción deliberativa del rey sin alejarse del sentido formal del hebreo.
- source_word: עֶגְלֵי זָהָב
  english_pob_choice: calves of gold
  chosen_spanish: becerros de oro
  alternatives_spanish:
  - becerros dorados
  - terneros de oro
  lexicon: HALOT
  rationale: “Becerros de oro” conserva la construcción nominal del hebreo y mantiene el eco de Éxodo 32. “Becerros” es un equivalente natural en español para עגלים en este contexto cultual.
- source_word: רַב לָכֶם מֵעֲלוֹת יְרוּשָׁלַםִ
  english_pob_choice: It is too much for you to go up to Jerusalem
  chosen_spanish: Es demasiado para ustedes subir a Jerusalén
  alternatives_spanish:
  - Basta ya de subir a Jerusalén
  - Subir a Jerusalén es demasiado para ustedes
  lexicon: HALOT
  rationale: La frase admite la idea de carga/exceso. “Es demasiado para ustedes subir a Jerusalén” reproduce bien la fuerza retórica y la ambigüedad controlada del hebreo, sin decidir innecesariamente por “basta ya”.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Aquí están
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: En español, “He aquí” es formal pero puede sonar arcaico; “Aquí están” transmite la presentación enfática del deíctico en una forma más natural, especialmente en un discurso idolátrico directo.
- source_word: אֱלֹהֶיךָ יִשְׂרָאֵל
  english_pob_choice: your gods, O Israel
  chosen_spanish: tus dioses, oh Israel
  alternatives_spanish:
  - tu Dios, oh Israel
  - vuestro Dios, oh Israel
  lexicon: HALOT
  rationale: La forma hebrea es plural y el contexto inmediato menciona dos becerros, además del verbo plural siguiente. Por eso se conserva el plural “tus dioses”, evitando suavizar la pluralidad idolátrica del texto.
- source_word: הֶעֱלוּךָ
  english_pob_choice: who brought you up
  chosen_spanish: los que te hicieron subir
  alternatives_spanish:
  - que te sacaron
  - que te hicieron salir
  lexicon: HALOT
  rationale: El verbo causativo puede traducirse con “hacer subir”. “Los que te hicieron subir” mantiene la imagen verbal y el eco del éxodo sin convertirla en una paráfrasis más general.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra de Egipto
  lexicon: HALOT
  rationale: “De la tierra de Egipto” refleja de modo directo la fórmula hebrea y preserva el paralelismo con la narrativa del éxodo.
theological_decisions:
- issue: ¿Renderizar אֱלֹהֶיךָ como singular o plural en la proclamación de Jeroboam?
  english_pob_reading: 'plural: ''your gods, O Israel'''
  chosen_spanish_reading: 'plural: ''tus dioses, oh Israel'''
  alternative_spanish_readings:
  - 'singular: ''tu Dios, oh Israel'''
  - 'ambigua: ''tu(s) Dios(es), oh Israel'''
  rationale: La gramática hebrea es plural y el contexto inmediato presenta dos becerros; además, el verbo הבא/הֶעֱלוּ es plural. En español conviene conservar esa pluralidad para no borrar la tensión idolátrica del pasaje, aunque el texto aluda a Éxodo 32.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cómo reflejar el eco con la fórmula del éxodo sin atenuar la ironía idolátrica
  english_pob_reading: who brought you up from the land of Egypt
  chosen_spanish_reading: los que te hicieron subir de la tierra de Egipto
  alternative_spanish_readings:
  - que te sacaron de la tierra de Egipto
  - que te hicieron salir de Egipto
  rationale: 'La versión elegida conserva el verbo de ascenso y el nexo con el éxodo, pero mantiene la ironía del discurso de Jeroboam: atribuye a los becerros la acción reservada a Yahvé.'
  doctrine_reference: Éxodo 32:4; 1 Reyes 12:28
- issue: Preservar el tono solemne sin introducir un registro excesivamente arcaico
  english_pob_reading: Behold
  chosen_spanish_reading: Aquí están
  alternative_spanish_readings:
  - He aquí
  - Miren
  rationale: “Aquí están” comunica la función presentativa en un español contemporáneo y readable; evita una fórmula demasiado arcaizante sin perder la solemnidad del anuncio idolátrico.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del POB inglés al preferir una fórmula que exprese con más precisión רַב לָכֶם מֵעֲלוֹת יְרוּשָׁלַם. También conserva la lectura plural de אֱלֹהֶיךָ apoyada por el contexto inmediato y por el verbo plural הֶעֱלוּ, mientras mantiene en nota la posible lectura singular por el eco con Éxodo 32:4.
  spanish_consistency_notes:
  - Se usa “Yahvé” en el proyecto, pero en este versículo el hebreo alude indirectamente al éxodo sin nombrarlo; por eso no aparece una sustitución explícita en el texto.
  - Se mantiene “Jerusalén” con la capitalización española habitual.
  - “Becerros de oro” preserva la referencia cultual y el paralelismo con el hebreo; no se sustituye por un equivalente más interpretativo.
  - La puntuación reproduce discurso directo claro y publicable en español moderno, con comillas angulares no usadas para mantener simplicidad editorial.
