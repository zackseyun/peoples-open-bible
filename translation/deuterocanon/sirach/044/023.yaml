translation:
  text: He established him with a blessing[a], and gave him his inheritance; he set him over the tribes, as twelve divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to divide twelve' is compressed; the Greek parallel reads more explicitly, 'among tribes he divided [them] into twelve,' supporting the sense 'as twelve divisions.'
    reason: alternative_reading
lexical_decisions:
- source_word: ויכוננהו
  chosen: He established him
  alternatives:
  - He confirmed him
  - He made him firm
  lexicon: HALOT
  rationale: From כון in the causative sense of making firm or establishing. 'Established' is natural English and fits the context of confirming Jacob/Israel in blessed status.
- source_word: בברכה
  chosen: with a blessing
  alternatives:
  - in blessing
  - by a blessing
  lexicon: HALOT
  rationale: The preposition ב can be rendered several ways here. 'With a blessing' best captures the instrumental/accompanying sense in idiomatic English while staying close to the Hebrew.
- source_word: נחלתו
  chosen: his inheritance
  alternatives:
  - his heritage
  - his allotted possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance or allotted possession. 'Inheritance' is the most direct and readable rendering, and it aligns with the Greek κληρονομία.
- source_word: ויציבהו
  chosen: he set him over
  alternatives:
  - he stationed him among
  - he established him in relation to
  lexicon: HALOT
  rationale: From יצב, to set or place firmly. Because the following phrase concerns the tribes and their division, 'set him over' best conveys a role of ordering or appointing in relation to them.
- source_word: לשבטים
  chosen: the tribes
  alternatives:
  - for the tribes
  lexicon: HALOT
  rationale: The phrase is tied to Israel's tribal structure. English idiom prefers simply 'the tribes' after 'set him over.'
- source_word: לחלק שנים עשר
  chosen: as twelve divisions
  alternatives:
  - to divide into twelve
  - into twelve portions
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed, literally involving division and the number twelve. The Greek clarifies the sense with 'in tribes he divided [them] twelve.' 'As twelve divisions' preserves the resultative sense without over-paraphrasing.
