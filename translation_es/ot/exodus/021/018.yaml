    issue: El texto principal usa «sino que» donde el hebreo tiene simple coordinación.
    rationale: וְלֹא יָמוּת preserva una coordinación con valor contextual adversativo, pero el POB inglés decidió mantener «and he does not die». En español, «y no muere, y cae en cama / queda en cama» o una reformulación equivalente preserva mejor esa relación que «sino que».
  - severity: low
    issue: La nota al pie suena algo rígida y repetitiva.
    rationale: 'La explicación puede expresarse de forma más natural en español: «Literalmente, “cae a cama”; es decir, queda en cama o confinado a la cama por la lesión.»'
