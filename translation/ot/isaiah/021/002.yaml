id: ISA.21.2
reference: Isaiah 21:2
source:
  edition: WLC
  text: חָז֥וּת קָשָׁ֖ה הֻגַּד לִ֑/י הַ/בּוֹגֵ֤ד בּוֹגֵד֙ וְ/הַ/שּׁוֹדֵ֣ד שׁוֹדֵ֔ד עֲלִ֤י עֵילָם֙ צוּרִ֣י מָדַ֔י כָּל אַנְחָתָ֖/ה הִשְׁבַּֽתִּי־׀׀־׃
translation:
  text: 'A harsh vision has been declared to me: the betrayer betrays[a], and the destroyer destroys. Go up, Elam; lay siege, Media[b]. I have put an end to all her groaning.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the treacherous one deals treacherously, and the plunderer plunders.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'all her groaning'; the feminine referent is not explicitly identified in this verse.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזוּת
  chosen: vision
  alternatives:
  - revelation
  - oracle
  lexicon: HALOT
  rationale: Denotes a prophetic seeing or vision. 'Vision' is the most natural English rendering in Isaiah and preserves the revelatory sense without overinterpreting it as a spoken oracle.
- source_word: קָשָׁה
  chosen: harsh
  alternatives:
  - hard
  - severe
  - grievous
  lexicon: HALOT
  rationale: The adjective conveys severity or hardness. 'Harsh' fits the tone of a dreadful prophetic disclosure in contemporary English better than the more wooden 'hard.'
- source_word: הֻגַּד לִי
  chosen: has been declared to me
  alternatives:
  - was told to me
  - has been reported to me
  lexicon: HALOT
  rationale: The passive of נגד with לִי indicates that the message was made known to the prophet. 'Has been declared to me' preserves the formal prophetic register while remaining readable.
- source_word: הַבּוֹגֵד בּוֹגֵד
  chosen: the traitor betrays
  alternatives:
  - the treacherous one deals treacherously
  - the betrayer betrays
  lexicon: HALOT
  rationale: The participle plus finite-like repetition intensifies and characterizes the action. 'The traitor betrays' is concise, idiomatic, and preserves the rhetorical force of the Hebrew repetition.
- source_word: וְהַשֹּׁדֵד שֹׁדֵד
  chosen: and the destroyer destroys
  alternatives:
  - and the plunderer plunders
  - and the ravager ravages
  lexicon: HALOT
  rationale: שׁדד can denote violent devastation or plundering. In this military context either is possible; 'destroyer destroys' captures the broader devastation and parallels the previous clause well in English.
- source_word: עֲלִי
  chosen: Go up
  alternatives:
  - Advance
  - Come up
  lexicon: HALOT
  rationale: Imperative feminine singular from עלה, used as a summons to attack. 'Go up' is the standard military idiom and preserves the Hebrew image.
- source_word: עֵילָם
  chosen: Elam
  rationale: Proper name; transliterated according to the translation philosophy.
- source_word: צוּרִי
  lemma: צור
  chosen: lay siege
  alternatives:
  - besiege
  - press hard against
  lexicon: HALOT
  rationale: Imperative feminine singular from צור in the siege sense. 'Lay siege' is clear modern English and reflects the military command.
- source_word: מָדַי
  chosen: Media
  rationale: Proper name for the people/land; rendered by the conventional English form 'Media' in parallel with Elam.
- source_word: כָּל אַנְחָתָהּ
  chosen: all her groaning
  alternatives:
  - all her sighing
  - all her moaning
  lexicon: HALOT
  rationale: אַנְחָה denotes groaning or sighing, likely of the oppressed city or people. 'Groaning' best conveys sustained anguish.
- source_word: הִשְׁבַּתִּי
  chosen: I have put an end to
  alternatives:
  - I have stopped
  - I have silenced
  - I have caused to cease
  lexicon: HALOT
  rationale: Hiphil of שבת means to cause to cease. 'I have put an end to' is idiomatic and preserves the causative force.
