    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el oído de los sabios», en singular como expresión colectiva/metafórica de receptividad a la instrucción.'
    reason: cultural_note
  revision_rationale: Se ajusta נָבוֹן a una formulación más natural y precisa en español («con entendimiento») y se mueve la nota cultural al lugar que realmente explica («oído»), manteniendo intactos el sentido, el paralelismo y la repetición retórica del hebreo.
