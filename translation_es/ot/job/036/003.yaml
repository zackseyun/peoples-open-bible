translation:
  language: es
  text: Traeré mi conocimiento de lejos[a], y a mi Hacedor le atribuiré rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Traeré mi conocimiento desde muy lejos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  english_pob_choice: I will bring
  chosen_spanish: Llevaré
  alternatives_spanish:
  - Traeré
  - Llevaré conmigo
  - Portaré
  lexicon: HALOT
  rationale: נשא puede significar levantar, cargar o llevar. En este contexto, con el objeto 'mi conocimiento' y la expresión 'de lejos', la idea es presentar o traer ese conocimiento desde una fuente distante. 'Llevaré' conserva la imagen verbal sin sonar forzado en español.
- source_word: דֵעִי
  english_pob_choice: my knowledge
  chosen_spanish: mi conocimiento
  alternatives_spanish:
  - mi entendimiento
  - mi saber
  - mi opinión
  lexicon: HALOT
  rationale: דעת designa conocimiento o entendimiento. 'Mi conocimiento' es la equivalencia más directa y mantiene el énfasis en una afirmación informada, no meramente subjetiva.
- source_word: לְמֵרָחוֹק
  english_pob_choice: from afar
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de una distancia
  - de un lugar remoto
  lexicon: HALOT
  rationale: La frase expresa origen o alcance distante. 'De lejos' es natural en español y conserva el sentido idiomático del hebreo con brevedad.
- source_word: וּלְפֹעֲלִי
  english_pob_choice: to my Maker
  chosen_spanish: a mi Hacedor
  alternatives_spanish:
  - a mi Creador
  - al que me hizo
  - a mi Creador y Hacedor
  lexicon: HALOT
  rationale: פֹעֵל es literalmente 'el que hace'. 'Hacedor' conserva la forma sustantiva derivada de 'hacer' y refleja bien el valor reverente del hebreo sin introducir una terminología doctrinal ajena al texto.
- source_word: אֶתֵּן
  english_pob_choice: I will ascribe
  chosen_spanish: le atribuiré
  alternatives_spanish:
  - le daré
  - le reconoceré
  - le adjudicaré
  lexicon: HALOT
  rationale: נתן con צדק aquí tiene el valor idiomático de atribuir o adjudicar una cualidad a Dios. 'Atribuiré' expresa ese acto declarativo con precisión en español.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  - justicia recta
  lexicon: HALOT
  rationale: צדק abarca justicia y rectitud. Como el audit trail preserva la alternativa 'justice', se mantiene 'justicia' en el texto principal para no cerrar el rango semántico y para conservar la tensión entre justicia y rectitud divina.
theological_decisions:
- issue: Rango semántico de צדק aplicado a Dios
  english_pob_reading: righteousness, with footnoted alternative justice
  chosen_spanish_reading: justicia, con nota alternativa de rectitud/righteousness
  alternative_spanish_readings:
  - rectitud
  - justicia divina
  - righteousness
  rationale: El hebreo צדק puede referirse tanto a justicia como a rectitud. Para el español, 'justicia' es claro y bíblico, mientras que la nota preserva la posibilidad de 'rectitud' y evita resolver artificialmente la amplitud del término.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios requeridos; se mantiene la lectura auditada por el control de calidad y la concordancia alta con el texto fuente.
  spanish_consistency_notes:
  - Se conserva un verbo de movimiento para נשא, en lugar de un verbo meramente abstracto, para respetar la imagen del hebreo.
  - '''Hacedor'' sigue la elección inglesa ''Maker'' y evita reemplazarla por un término más doctrinalmente cargado como ''Creador'' sin necesidad contextual.'
  - '''Justicia'' mantiene la tensión semántica de צדק; la nota ofrece la alternativa ''rectitud'' sin desplazar el término principal.'
