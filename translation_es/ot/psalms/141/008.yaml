translation:
  language: es
  text: Porque hacia ti, Yahvé, mi Señor, están mis ojos; en ti me refugio. No derrames mi vida[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma». נֶפֶשׁ puede significar «vida», «yo mismo» o «alma», según el contexto; aquí se tomó «vida» por el sentido del ruego.
    reason: lexical_alternative
  - marker: b
    text: La súplica final también puede entenderse como «no me dejes desamparado» o «no me dejes indefenso», reflejando el sentido más amplio del verbo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o motivo del ruego precedente. «Porque» conserva bien la fuerza causal o explicativa del hebreo en español natural.
- source_word: אֵלֶיךָ
  english_pob_choice: toward you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - a ti
  - sobre ti
  lexicon: HALOT
  rationale: Con «ojos» el hebreo expresa dirección de la mirada y dependencia. «Hacia ti» mantiene esa imagen espacial sin sonar forzado.
- source_word: יְהֹוָה
  english_pob_choice: LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahvéh
  lexicon: HALOT
  rationale: Se usa el nombre divino en la forma estándar del proyecto en español. No se oculta con una mayúscula de sustitución; se conserva la referencia explícita al nombre del pacto.
- source_word: אֲדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi Maestro
  - Señor
  lexicon: HALOT
  rationale: Se distingue del nombre divino precedente y se conserva el matiz de dirección reverente con sufijo posesivo de primera persona. «Mi Señor» es idiomático y fiel.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi mirada
  lexicon: HALOT
  rationale: La literalidad mantiene el gesto hebreo de atención fija y dependencia. «Mis ojos» es claro y conserva la metáfora.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contigo
  lexicon: HALOT
  rationale: Con חסה la preposición expresa el ámbito del refugio. «En ti» sigue el uso idiomático del hebreo y del español bíblico sin perder naturalidad.
- source_word: חָסִיתִי
  english_pob_choice: I take refuge
  chosen_spanish: me refugio
  alternatives_spanish:
  - busco refugio
  - he tomado refugio
  lexicon: HALOT
  rationale: La forma verbal comunica una acción/posición de confianza. En español, «me refugio» conserva la imagen de amparo y resulta natural en la oración poética.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  lexicon: HALOT
  rationale: Introduce el prohibitivo con naturalidad en español y mantiene el tono de súplica.
- source_word: תְּעַר
  english_pob_choice: pour out
  chosen_spanish: derrames
  alternatives_spanish:
  - vac&iacute;es
  - despojes
  lexicon: HALOT
  rationale: El hebreo admite el sentido de derramar/vaciar, y el contexto con נֶפֶשׁ favorece una petición de preservación de la vida. «Derrames» conserva el valor imagístico y la fuerza del ruego.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: En este contexto נפש designa la vida o la persona bajo amenaza, no solo el alma en sentido espiritual. «Mi vida» preserva ese sentido contextual y evita importar una antropología posterior.
theological_decisions:
- issue: Diferenciación entre יְהֹוָה y אֲדֹנָי
  english_pob_reading: O Yahweh, my Lord
  chosen_spanish_reading: Yahvé, mi Señor
  alternative_spanish_readings:
  - Señor, mi Señor
  - Yahvé, Señor
  rationale: La línea hebrea combina el nombre del pacto con un título de señorío. El español distingue ambos sin colapsarlos en una sola forma, preservando la capa doble de invocación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נֶפֶשׁ en una súplica de preservación
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: Se mantiene el sentido contextual de la persona/vida en peligro, evitando leer aquí una oposición alma-cuerpo que el hebreo no exige.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve source sense without importing doctrinal claims'
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del expediente inglés y conserva las dos tensiones léxicas principales documentadas: la orientación de los ojos hacia Yahvé y el sentido de נֶפֶשׁ como vida/persona amenazada. No se introdujeron revisiones posteriores ni cambios de criterio respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para el nombre divino en el texto principal.
  - Se traduce אֲדֹנָי como «mi Señor» para distinguirlo del nombre divino y conservar el sufijo posesivo.
  - Se usa «mi vida» para נֶפֶשׁ en el texto principal; la alternativa «mi alma» queda registrada en nota por su posibilidad contextual.
  - El prohibitivo se vierte con «No» más el verbo en subjuntivo, de acuerdo con el español natural y el valor jussivo del hebreo.
