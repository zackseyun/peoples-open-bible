translation:
  language: es
  text: 'Dijiste[a]: «Seré dueña para siempre», de modo que no tomaste estas cosas[a][b] a pecho; no recordaste el fin de ella[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señora para siempre». El hebreo גְבָרֶת designa a una mujer en posición de dominio o rango; «dueña» se usa para conservar ese matiz sin convertirlo en «reina».
    reason: lexical_alternative
  - marker: b
    text: Lit. «no pusiste estas cosas sobre tu corazón». Es decir, no las tomaste en serio ni las consideraste con atención.
    reason: lexical_alternative
  - marker: c
    text: O «su fin». El hebreo tiene un sufijo femenino singular, probablemente porque Babilonia es personificada como mujer.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמְרִי
  english_pob_choice: You said
  chosen_spanish: Tú dijiste
  alternatives_spanish:
  - Y dijiste
  lexicon: HALOT
  rationale: El waw consecutivo avanza el discurso, pero en español un pasado simple directo comunica mejor la progresión narrativa sin forzar una conjunción inicial. El sujeto explícito ayuda a mantener el tono de reprensión directa.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Expresa una pretensión de duración sin fin de manera natural en español moderno y conserva el alcance absoluto del hebreo.
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  lexicon: HALOT
  rationale: El futuro de הָיָה aquí expresa un estado/condición de dominio. «Seré» refleja mejor la identificación de rol que «estaré» en este contexto de pretensión soberbia.
- source_word: גְבָרֶת
  english_pob_choice: mistress
  chosen_spanish: señora
  alternatives_spanish:
  - dueña
  - mistresa
  - reina
  lexicon: HALOT
  rationale: «גברת» denota una mujer en posición de dominio o rango. En español, «señora» conserva la idea de mujer de autoridad/dignidad sin sobreespecificar un título real que el hebreo no exige. Se evita «reina» por exceder el término, y «mistresa» por ser poco natural.
- source_word: עַד לֹא שַׂמְתְּ אֵלֶּה עַל לִבֵּךְ
  english_pob_choice: so that you did not take these things to heart
  chosen_spanish: hasta que no pusiste estas cosas en tu corazón
  alternatives_spanish:
  - de modo que no tomaste estas cosas en cuenta
  - no pusiste estas cosas sobre tu corazón
  lexicon: HALOT
  rationale: La POB inglesa lee el giro como resultado/consecuencia, pero el hebreo conserva la imagen idiomática de poner algo sobre el corazón. En español se mantiene el tropo «en tu corazón», que es claro y auditables, aunque con la partícula «hasta que no» para reflejar el valor resultativo del hebreo.
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas advertencias
  lexicon: HALOT
  rationale: Se conserva el demostrativo plural. El referente en el contexto son las advertencias y juicios previos, pero el hebreo no los nombra aquí; por eso se mantiene la deíxis amplia sin añadir precisión interpretativa.
- source_word: לֹא זָכַרְתְּ
  english_pob_choice: you did not remember
  chosen_spanish: no recordaste
  alternatives_spanish:
  - no te acordaste
  - no tuviste presente
  lexicon: HALOT
  rationale: «Recordar» mantiene el valor cognitivo del verbo y su paralelismo con «poner en el corazón». Se elige una forma directa y literaria que no diluye la fuerza de la reprensión.
- source_word: אַחֲרִיתָהּ
  english_pob_choice: her end
  chosen_spanish: su fin
  alternatives_spanish:
  - su final
  - su desenlace
  - su postrer fin
  lexicon: HALOT
  rationale: El sufijo femenino singular puede reflejar a Babilonia personificada. En español, «su fin» conserva esa referencia sin necesidad de marcar género gramatical en una forma que resultaría menos natural; el antecedente femenino se sostiene por el contexto del discurso.
theological_decisions:
- issue: Personificación femenina de Babilonia y referencia pronominal final
  english_pob_reading: Retain feminine reference in 'her end'
  chosen_spanish_reading: 'Mantener la personificación sin explicitarla de forma pesadamente interpretativa: «su fin»'
  alternative_spanish_readings:
  - «su fin» con nota sobre Babilonia personificada
  - «el fin de ella»
  rationale: El hebreo usa sufijo femenino singular, y el contexto profético personifica a Babilonia como mujer. En español, el posesivo «su» conserva la referencia sin introducir un femenino enfático que vuelva torpe la frase; la personificación queda resguardada por el contexto inmediato y puede explicitarse en nota si fuera necesario.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La traducción inglesa revisada eliminó el artículo antes de 'mistress' por naturalidad; en español se evitó de antemano un artículo innecesario y se optó por «seré señora» para mantener naturalidad y fidelidad al rango expresado por גְבָרֶת. También se conservó la tensión entre el idiomático «poner en tu corazón» y el valor resultativo de עַד לֹא mediante una construcción española que no aplana el hebreo.
  spanish_consistency_notes:
  - Se mantiene «corazón» como sede de evaluación/consideración, coherente con el uso bíblico del hebreo.
  - Se preserva la personificación femenina implícita en el sufijo final, sin sustituirla por un neutro impersonal.
  - No se usa «SEÑOR» para evitar confusión con el nombre divino; «señora» aquí responde al rango social de גְבָרֶת.
  - El paralelismo semántico entre 'poner en el corazón' y 'recordar' se mantiene con dos expresiones distintas pero relacionadas en español.
