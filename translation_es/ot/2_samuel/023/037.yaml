lexical_decisions:
- source_word: צֶלֶק
  english_pob_choice: Zelek
  chosen_spanish: Zelec
  alternatives_spanish:
  - Zelek
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio hebreo. Se usa «Zelec» para mantener una forma española natural y cercana a la convención fonética, sin convertirlo en un nombre traducido.
- source_word: הָעַמֹּנִי
  english_pob_choice: the Ammonite
  chosen_spanish: el amonita
  alternatives_spanish:
  - el ammonita
  lexicon: gentilicio
  rationale: El hebreo identifica a Zelec por origen étnico/nacional. «Amonita» es el gentilicio natural en español y conserva el valor identificador del hebreo.
- source_word: נַחְרַי
  english_pob_choice: Naharai
  chosen_spanish: Naharai
  alternatives_spanish:
  - Nahrai
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio con transliteración estándar. La nota mantiene la variante breve atestiguada en la tradición inglesa y refleja la oscilación de transliteración.
- source_word: הַבְּאֵרֹתִי
  english_pob_choice: the Beerothite
  chosen_spanish: el beerotita
  alternatives_spanish:
  - el de Beerot
  - el hombre de Beerot
  lexicon: gentilicio
  rationale: El hebreo usa una forma gentilicia derivada de Beerot. «Beerotita» preserva la brevedad y el formato de lista del original, sin expandir innecesariamente a una perífrasis.
- source_word: נשאי כְּלֵי
  english_pob_choice: armor-bearer
  chosen_spanish: escudero
  alternatives_spanish:
  - portador de armas
  - portador del equipo militar
  lexicon: participio/función militar
  rationale: El hebreo describe a quien lleva las armas o el equipo de guerra de Joab. En español, «escudero» comunica de manera breve la función militar servicial; se evita «siervo» porque el contexto no apunta a la relación de esclavitud sino a un cargo/función.
- source_word: יוֹאָב בֶּן צְרֻיָה
  english_pob_choice: Joab son of Zeruiah
  chosen_spanish: Joab, hijo de Zeruía
  alternatives_spanish:
  - Joab, hijo de Zeruya
  lexicon: patronímico/matronímico
  rationale: Se conserva la identificación formal del texto. «Zeruía» sigue la transliteración española habitual del nombre femenino hebreo y mantiene el orden y estilo de lista del original.
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios; la presente versión sigue ese estado estable, manteniendo la estructura nominal de lista y la identificación funcional de Joab sin añadir información no explicitada por el hebreo.
  spanish_consistency_notes:
  - Se preserva el formato breve de catálogo militar/genealógico del versículo.
  - «Escudero» se usa aquí como equivalente funcional de «armor-bearer»; no se entiende como un título nobiliario medieval, sino como oficio militar de acompañamiento.
  - Los nombres propios se transliteran de modo consistente con el español, evitando traducción o normalización excesiva.
