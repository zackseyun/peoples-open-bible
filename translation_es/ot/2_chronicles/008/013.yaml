translation:
  language: es
  text: 'según la obligación diaria de ofrecer sacrificios[a], como Moisés mandó, para los sábados, las lunas nuevas y las fiestas señaladas, tres veces en el año: en la Fiesta de los Panes sin Levadura, en la Fiesta de las Semanas[b], y en la Fiesta de las Cabañas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la regla de cada día»; literalmente, «según la materia de un día en su día».'
    reason: lexical_alternative
  - marker: b
    text: La «Fiesta de las Semanas» más tarde se llama «Pentecostés» en el uso griego.
    reason: cross_reference
  - marker: c
    text: 'O: «Fiesta de los Tabernáculos»; el hebreo dice «Cabañas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִדְבַר יוֹם בְּיוֹם
  english_pob_choice: according to the daily requirement
  chosen_spanish: según la obligación diaria
  alternatives_spanish:
  - según la disposición de cada día en su día
  - según la regla de cada día
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a lo que correspondía día tras día. 'Obligación diaria' conserva el sentido administrativo/cultual sin volver el español rígido o opaco.
- source_word: לְהַעֲלוֹת
  english_pob_choice: for offering up sacrifices
  chosen_spanish: de ofrecer sacrificios
  alternatives_spanish:
  - para ofrecer
  - para hacer subir
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de עלה significa ofrecer/elevar sacrificios. 'De ofrecer sacrificios' comunica bien la función cultual en español y mantiene la concreción del acto.
- source_word: כְּמִצְוַת מֹשֶׁה
  english_pob_choice: as Moses commanded
  chosen_spanish: como Moisés mandó
  alternatives_spanish:
  - según el mandamiento de Moisés
  lexicon: HALOT
  rationale: La frase remite a la prescripción mosaica. 'Mandó' es natural en español y preserva la autoridad de Moisés sin perder el vínculo con el mandato.
- source_word: לַשַּׁבָּתוֹת
  english_pob_choice: for the Sabbaths
  chosen_spanish: para los sábados
  alternatives_spanish:
  - para los días de reposo
  lexicon: HALOT
  rationale: Aquí el plural se refiere a los sábados como observancias calendáricas. 'Sábados' evita introducir una equivalencia tradicional más interpretativa como 'días de reposo'.
- source_word: וְלֶחֳדָשִׁים
  english_pob_choice: the new moons
  chosen_spanish: las lunas nuevas
  alternatives_spanish:
  - las nuevas lunas
  - las iniciaciones de mes
  lexicon: HALOT
  rationale: En lenguaje cultual, la referencia es a las observancias de luna nueva. 'Lunas nuevas' es transparente, idiomático y fiel al campo semántico hebreo.
- source_word: וְלַמּוֹעֲדוֹת
  english_pob_choice: the appointed feasts
  chosen_spanish: las fiestas señaladas
  alternatives_spanish:
  - los tiempos señalados
  - las fiestas назначadas
  lexicon: HALOT
  rationale: מועדים aquí anticipa las fiestas de peregrinación enumeradas después. 'Fiestas señaladas' conserva la idea de tiempos fijados por designio, con un español natural.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  english_pob_choice: three times in the year
  chosen_spanish: tres veces en el año
  alternatives_spanish:
  - tres veces al año
  lexicon: HALOT
  rationale: La frase temporal se puede verter literalmente sin pérdida. 'En el año' reproduce de cerca la construcción hebrea y sigue siendo claro en español.
- source_word: בְּחַג הַמַּצּוֹת
  english_pob_choice: at the Feast of Unleavened Bread
  chosen_spanish: en la Fiesta de los Panes sin Levadura
  alternatives_spanish:
  - en la fiesta de los panes ázimos
  lexicon: HALOT
  rationale: El hebreo nombra la fiesta por su rasgo concreto. 'Panes sin Levadura' mantiene la transparencia semántica; 'ázimos' sería más técnico y menos inmediato para lectura pública.
- source_word: וּבְחַג הַשָּׁבֻעוֹת
  english_pob_choice: at the Feast of Weeks
  chosen_spanish: en la Fiesta de las Semanas
  alternatives_spanish:
  - en Pentecostés
  lexicon: HALOT
  rationale: El texto hebreo dice 'Semanas'; conservarlo evita importar el nombre griego posterior. La alternativa tradicional se deja abierta, pero el texto principal sigue la designación original.
- source_word: וּבְחַג הַסֻּכּוֹת
  english_pob_choice: at the Feast of Booths
  chosen_spanish: en la Fiesta de las Cabañas
  alternatives_spanish:
  - en la Fiesta de las Tiendas
  - en la Fiesta de los Tabernáculos
  lexicon: HALOT
  rationale: סֻכּוֹת significa literalmente refugios/cabañas. 'Cabañas' preserva la imagen concreta mejor que el término eclesiástico 'Tabernáculos', más tradicional pero menos transparente.
theological_decisions:
- issue: Si traducir los nombres de las fiestas con formas transparentes o con nombres eclesiásticos tradicionales
  english_pob_reading: Feast of Unleavened Bread / Feast of Weeks / Feast of Booths
  chosen_spanish_reading: Fiesta de los Panes sin Levadura / Fiesta de las Semanas / Fiesta de las Cabañas
  alternative_spanish_readings:
  - Pascua / Pentecostés / Tabernáculos
  - Fiesta de los Panes Ázimos / Pentecostés / Fiesta de los Tabernáculos
  rationale: La lectura base del POB en inglés privilegia la transparencia del hebreo frente a la nomenclatura litúrgica tradicional. En español se conserva esa misma decisión para no ocultar el vocabulario original ni desplazar el acento hacia formas heredadas de uso eclesiástico.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo entender 'los sábados' dentro de la lista cultual
  english_pob_reading: for the Sabbaths
  chosen_spanish_reading: para los sábados
  alternative_spanish_readings:
  - para los días de reposo
  - para los sábados y reposos
  rationale: El hebreo plural se refiere a las observancias sabáticas dentro del calendario cultual. Se conserva 'sábados' porque es la forma más directa y no introduce una paráfrasis explicativa que el texto no exige.
  doctrine_reference: Neh 10:33; 1 Cr 23:31
- issue: La expresión 'lunas nuevas' como observancia calendárica
  english_pob_reading: the new moons
  chosen_spanish_reading: las lunas nuevas
  alternative_spanish_readings:
  - los novilunios
  - las nuevas lunas
  rationale: La referencia es a la celebración de la luna nueva en el culto de Israel. 'Lunas nuevas' es comprensible y mantiene la conexión con el lenguaje bíblico sin recurrir a un tecnicismo innecesario.
  doctrine_reference: Nm 28:11-15; 1 S 20:5
translation_notes:
  revision_awareness: La revisión inglesa más reciente permaneció sin cambios, con acuerdo alto entre auditoría y revisor; por tanto, la propuesta española sigue la misma lectura estable y mantiene las alternativas documentadas sin introducir expansiones nuevas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el versículo lo exija explícitamente; este texto no contiene el tetragrámaton.
  - '''Mesías'' no aplica aquí; se conserva la terminología cultual del calendario.'
  - '''sacrificios'' se usa para reflejar el contexto litúrgico del verbo לְהַעֲלוֹת en vez de una paráfrasis general.'
  - Las fiestas se han traducido con transparencia y con mayúscula inicial por tratarse de nombres de observancias.
