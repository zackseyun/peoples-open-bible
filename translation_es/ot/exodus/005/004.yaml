translation:
  language: es
  text: 'Pero el rey de Egipto les dijo[a]: «¿Por qué, Moisés y Aarón, hacen que el pueblo descuide su trabajo? Vayan a sus cargas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿están distrayendo al pueblo de su labor?»
    reason: lexical_alternative
  - marker: b
    text: O «Vayan a sus trabajos forzados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la escena; en español, «Pero» reproduce bien el giro discursivo frente a la petición anterior y conserva la naturalidad narrativa.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el monarca de Egipto
  - el rey egipcio
  lexicon: HALOT
  rationale: Se mantiene el constructo de forma clara y natural en español, sin añadir matices ajenos al hebreo.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Con qué fin
  lexicon: HALOT
  rationale: Interrogativo directo y idiomático que conserva la fuerza acusatoria de la pregunta.
- source_word: תַּפְרִיעוּ
  english_pob_choice: are you causing ... to neglect
  chosen_spanish: hacen que ... descuide
  alternatives_spanish:
  - están distrayendo a ...
  - están interrumpiendo a ...
  - están haciendo que ... abandone
  lexicon: HALOT
  rationale: El hiphil expresa causar interrupción o cese de la labor. «Hacen que ... descuide» conserva la fuerza causal y la acusación de apartarlos del trabajo, sin forzar un sentido de «liberar» que no corresponde aquí.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los trabajadores
  lexicon: HALOT
  rationale: Se conserva la designación amplia del hebreo; el contexto laboral queda ya implicado por el verbo y el complemento siguiente.
- source_word: מִמַּעֲשָׂיו
  english_pob_choice: their work
  chosen_spanish: su trabajo
  alternatives_spanish:
  - sus labores
  - de su trabajo
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es singular, funciona colectivamente con «el pueblo»; en español, «su trabajo» es la forma más natural y transparente.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ya
  - Váyanse
  lexicon: HALOT
  rationale: Imperativo plural directo, acorde con la escena y con el tono tajante de faraón.
- source_word: לְסִבְלֹתֵיכֶם
  english_pob_choice: to your burdens
  chosen_spanish: a sus cargas
  alternatives_spanish:
  - a sus trabajos forzados
  - a sus labores pesadas
  - a sus cargas de trabajo
  lexicon: HALOT
  rationale: «Cargas» conserva la metáfora concreta de peso y opresión del sustantivo hebreo. «Trabajos forzados» explicita la idea, pero sería más interpretativo que el hebreo inmediato.
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y no se introdujeron cambios textuales respecto a la lectura aprobada; la redacción española busca equivalencia óptima con preservación del contraste discursivo, del tono acusatorio y de la metáfora de «cargas».
  spanish_consistency_notes:
  - Se prefirió «el rey de Egipto» para mantener la estructura del hebreo sin introducir títulos eclesiásticos.
  - Se eligió «su trabajo» en singular colectivo para reflejar el sufijo hebreo y la referencia a un grupo.
  - Se conservó «cargas» para mantener la imagen concreta y la posible lectura de labor opresiva, dejando la alternativa explicativa en nota.
