  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: mantiene la coordinación inicial, el énfasis de «ustedes también», el valor testimonial de μαρτυρεῖτε y la causalidad de ὅτι como «porque». También reproduce adecuadamente el sentido durativo de ἐστε con «han estado» junto con «desde el principio».'
  spanish_quality_summary: 'El español principal es claro, natural y digno. La única reparación necesaria está en la nota léxica de μαρτυρεῖτε: «ser testigos» no corresponde bien como alternativa verbal directa a «dar testimonio» en este contexto; conviene «dar testimonio»/«testificar»/«dar testimonio como testigos» o, más concisamente, «testifican».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles del glosario general. La elección «dan testimonio» es adecuada para μαρτυρεῖτε, y «han estado conmigo desde el principio» preserva bien la explicación auditada del presente griego con sentido continuo.
  issues:
  - severity: medium
    issue: La nota [a] ofrece «ser testigos» como alternativa para μαρτυρεῖτε.
    rationale: «Ser testigos» describe identidad o condición, no la acción verbal de μαρτυρεῖτε. El inglés auditado preserva «bear witness» como alternativa verbal; en español corresponde mejor «dar testimonio» o «testificar».
  revised_spanish_text: Y ustedes también dan testimonio[a][b], porque han estado conmigo desde el principio.
