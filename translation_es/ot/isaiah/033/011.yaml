translation:
  language: es
  text: Ustedes conciben tamo; dan a luz rastrojo[a]. Su aliento es un fuego que los consumirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su espíritu es un fuego que los consumirá». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּהֲרוּ
  english_pob_choice: you conceive
  chosen_spanish: Conciben
  alternatives_spanish:
  - Están encinta de
  - Quedan preñados de
  lexicon: HALOT
  rationale: El hebreo usa el verbo de concebir en forma metafórica. «Conciben» mantiene la imagen de gestación aplicada a un resultado vano, sin volverla una paráfrasis explicativa.
- source_word: חֲשַׁשׁ
  english_pob_choice: chaff
  chosen_spanish: paja
  alternatives_spanish:
  - tamo
  - cascarilla
  lexicon: HALOT
  rationale: El término apunta a material seco, ligero y fácilmente combustible. «Paja» es natural en español y conserva la idea de material sin valor; no sustituye innecesariamente la imagen agrícola.
- source_word: תֵּלְדוּ
  english_pob_choice: you give birth to
  chosen_spanish: dan a luz
  alternatives_spanish:
  - paren
  - engendran
  lexicon: HALOT
  rationale: El verbo de parir/nacer mantiene explícita la metáfora del parto. «Dan a luz» es idiomático y fiel al paralelismo con «conciben».
- source_word: קַשׁ
  english_pob_choice: stubble
  chosen_spanish: rastrojo
  alternatives_spanish:
  - paja
  - tamo
  lexicon: HALOT
  rationale: קַשׁ designa residuo vegetal seco, cercano a «stubble». «Rastrojo» conserva mejor la idea de desecho agrícola y la progresión poética con «paja».
- source_word: רוּחֲכֶם
  english_pob_choice: your breath
  chosen_spanish: Su aliento
  alternatives_spanish:
  - su espíritu
  - su viento
  lexicon: HALOT
  rationale: רוּחַ puede significar aliento, viento o espíritu. Aquí la imagen inmediata con el fuego favorece «aliento», que mantiene la concreción corporal y deja abierta la extensión metafórica a impulso o disposición interior.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: «אֵשׁ» es simplemente fuego; el artículo indefinido hace natural la sintaxis española y conserva el valor imagético.
- source_word: תֹּאכַלְכֶם
  english_pob_choice: will consume you
  chosen_spanish: los consumirá
  alternatives_spanish:
  - los devorará
  - los comerá
  lexicon: HALOT
  rationale: Con fuego como sujeto, «consumirá» comunica el sentido destructivo de אכל sin sonar forzado en español. Mantiene el efecto de destrucción total.
theological_decisions:
- issue: Sentido de רוּחֲכֶם en la imagen de juicio
  english_pob_reading: your breath
  chosen_spanish_reading: Su aliento
  alternative_spanish_readings:
  - su espíritu
  - su viento
  rationale: La poesía profética presenta como agente de destrucción aquello que sale de la propia persona o comunidad. «Aliento» conserva la imagen concreta y no resuelve prematuramente la tensión entre lo físico y lo interior; puede leerse como aliento, impulso o emanación destructiva.
  doctrine_reference: Preservar la tensión poética y semántica sin eliminar la amplitud de רוּחַ.
translation_notes:
  revision_awareness: El texto inglés POB mantiene la ambigüedad de רוּחַ con una nota alternativa. La versión española conserva esa tensión, eligiendo «aliento» como opción principal por su concreción y por su ajuste al paralelismo de juicio, sin descartar la lectura «espíritu».
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos miembros breves: concebir / dar a luz; paja / rastrojo.'
  - Se evita «SEÑOR» u otras convenciones no presentes en el verso, ya que el texto no contiene el nombre divino.
  - Se conserva un registro poético y sobrio, apto para lectura pública, sin añadir interpretación explicativa al cuerpo del verso.
