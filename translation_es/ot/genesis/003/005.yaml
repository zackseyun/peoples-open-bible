    rationale: Es comprensible y doctrinalmente segura, pero «conociendo el bien y el mal» reproduce mejor el participio hebreo «יֹדְעֵי» y mantiene mayor cercanía con la decisión inglesa documentada.
  revised_spanish_text: Porque Dios sabe que, el día que ustedes coman de él[a], sus ojos serán abiertos y ustedes serán como Dios, conociendo el bien y el mal.
  revised_footnotes:
