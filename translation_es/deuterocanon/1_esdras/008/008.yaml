translation:
  language: es
  text: La copia del documento presentado por el rey Artajerjes a Esdras, el sacerdote y lector de la ley del Señor, se expone a continuación.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «lector de la ley del Señor». El paralelo hebreo en Esdras 7:11 tiene «escriba» en lugar de «lector».
    reason: alternative_reading
  - marker: b
    text: La redacción griega de este encabezado es algo abrupta; el sentido es que a continuación se reproduce una copia del documento de Artajerjes a Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: Προσπεσόντος
  english_pob_choice: presented
  chosen_spanish: presentada
  alternatives_spanish:
  - dada
  - entregada
  - puesta
  lexicon: LSJ
  rationale: El griego del encabezado es idiomático y algo abrupto; en contexto documental, indica la puesta o presentación de un escrito. «Presentada» conserva el sentido formal sin forzar una narración más específica de la que el griego asegura.
- source_word: παρὰ Ἀρταξέρξου βασιλέως
  english_pob_choice: by King Artaxerxes
  chosen_spanish: por el rey Artajerjes
  alternatives_spanish:
  - de parte del rey Artajerjes
  - desde el rey Artajerjes
  lexicon: LSJ
  rationale: La preposición con genitivo señala procedencia/autorización. En español, «por el rey Artajerjes» comunica adecuadamente autoría o procedencia del documento con naturalidad.
- source_word: πρὸς Ἔσραν
  english_pob_choice: to Ezra
  chosen_spanish: a Esdras
  alternatives_spanish:
  - para Esdras
  lexicon: LSJ
  rationale: En un encabezado documental, πρός es direccional y puede leerse como destinatario. «A Esdras» es la forma más directa y natural en español.
- source_word: τὸν ἱερέα
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  lexicon: LSJ
  rationale: Título ministerial estándar para Esdras; «sacerdote» es el equivalente directo y claro en español.
- source_word: ἀναγνώστην τοῦ νόμου Κυρίου
  english_pob_choice: reader of the law of the Lord
  chosen_spanish: lector de la ley del Señor
  alternatives_spanish:
  - escriba de la ley del Señor
  - experto en la ley del Señor
  lexicon: LSJ
  rationale: El griego dice literalmente «lector/recitador». Se mantiene «lector» para respetar el testimonio griego de 1 Esdras, aun cuando el paralelo hebreo en Esdras 7:11 tiene «escriba».
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה cuando el hebreo es la base directa, aquí el término fuente es κύριος en una fórmula titulada de la ley. Dado que la POB inglesa también lee «the Lord» y la referencia es a Dios de Israel en este sintagma fijo, «el Señor» es la equivalencia más natural en español.
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - duplicado
  lexicon: LSJ
  rationale: Término documental estándar; «copia» es transparente y fiel al uso administrativo del griego.
- source_word: τὸ ὑποκείμενον
  english_pob_choice: is set out below
  chosen_spanish: se reproduce abajo
  alternatives_spanish:
  - está abajo
  - sigue abajo
  - se presenta abajo
  lexicon: LSJ
  rationale: La expresión es torpe literalmente; en un encabezado, el sentido es que el documento copiado va a continuación. «Se reproduce abajo» conserva la función editorial del griego y la fluidez en español.
theological_decisions:
- issue: Titulación de la ley divina en un encabezado documental
  english_pob_reading: reader of the law of the Lord
  chosen_spanish_reading: lector de la ley del Señor
  alternative_spanish_readings:
  - escriba de la ley del Señor
  - lector de la ley de Yahvé
  rationale: Se mantiene el valor específico del griego ἀναγνώστης y la formulación tradicional de κύριος en esta cita administrativa. No se armoniza con el paralelo hebreo, porque 1 Esdras depende aquí del testimonio griego y la tensión con Esdras 7:11 debe permanecer visible.
  doctrine_reference: Primacía de la fuente original; preservar tensiones textuales sin resolverlas artificialmente
translation_notes:
  revision_awareness: El borrador sigue el testimonio griego de Swete LXX 1909 como fuente primaria. Se tuvo en cuenta la nota de desajuste mayor con el paralelo hebreo, pero no se armonizó el texto principal para no perder la especificidad de 1 Esdras. La traducción inglesa auditada fue usada como contexto de decisiones, no como base mecánica.
  spanish_consistency_notes:
  - Se mantiene «Esdras» para Ἔσρας y «Artajerjes» para Ἀρταξέρξης, coherente con el uso bíblico en español.
  - Se conserva «ley del Señor» para reflejar κύριος en la fórmula griega, evitando una sustitución no justificada por «Yahvé» en este sintagma fijo.
  - «Copia» y «se reproduce abajo» conservan el carácter documental del encabezado.
  - La puntuación y el orden buscan sonar naturales en español sin perder la estructura del original griego.
