review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: peligro mortal, procurarse pan, y causa por la espada en el desierto. También conserva adecuadamente las dos alternativas léxicas del rastro POB en notas. Sin embargo, בְּנַפְשֵׁנוּ está en plural posesivo (''nuestras vidas'' / ''nuestra vida'' idiomáticamente), y en español bíblico-natural suena mejor y más fiel ''la vida'' que ''nuestra vida'' en esta construcción fija. Además, ''a causa de'' es correcto, pero ''por'' resulta más natural y directo aquí sin perder fuerza.'
  spanish_quality_summary: El español es claro y legible, pero 'A riesgo de nuestra vida' suena un poco rígido; 'Arriesgando la vida' o 'A riesgo de la vida' serían más idiomáticos. Para mantener cercanía con la decisión inglesa y el tono digno, 'Arriesgando la vida' funciona mejor. 'Obtenemos nuestro pan' es entendible, aunque un poco administrativo; 'conseguimos nuestro pan' o 'obtenemos nuestro pan' ambos valen. Mantengo 'obtenemos' por cercanía al expediente léxico. Las notas necesitan solo ajuste menor para alinearse con el texto revisado.
  glossary_alignment: No hay términos teológicos de proyecto especialmente implicados. 'Pan', 'espada' y 'desierto' están bien. 'Desierto' es una elección aceptable para הַמִּדְבָּר, aunque 'wilderness' podría también ser 'yermo'; no requiere cambio.
  issues:
  - severity: medium
    issue: La expresión 'A riesgo de nuestra vida' suena menos idiomática en español que otras opciones.
    rationale: El hebreo expresa riesgo mortal como modismo. En español general y eclesial, 'Arriesgando la vida' comunica esa fuerza de manera más natural y digna.
  - severity: low
    issue: La posesión en 'nuestra vida' no suena necesaria ni natural en esta construcción.
    rationale: 'Aunque el hebreo lleva sufijo posesivo plural, el español suele expresar el modismo sin posesivo: ''arriesgando la vida''. Esto preserva el sentido sin calco innecesario.'
  - severity: low
    issue: La frase causal 'a causa de la espada en el desierto' puede simplificarse.
    rationale: '''Por la espada en el desierto'' es más fluido y sigue siendo fiel a מִפְּנֵי. La nota [b] ya preserva la alternativa ''espada del desierto''.'
  revised_spanish_text: Arriesgando la vida obtenemos nuestro pan[a], por la espada en el desierto[b].
