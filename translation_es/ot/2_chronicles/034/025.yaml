revisions:
- from: Porque me han abandonado y han quemado incienso a otros dioses[a], para provocar mi ira por todas las obras de sus manos[b], mi furor será derramado sobre este lugar y no se apagará.
  to: Porque me han abandonado y han quemado incienso a otros dioses[a], para enojarme por todas las obras de sus manos[b], mi furor será derramado sobre este lugar y no se apagará.
  rationale: Se hizo una reparación mínima para reflejar con mayor precisión el objeto personal de הַכְעִיסֵנִי. «Para enojarme» conserva mejor el sentido de provocar a Dios a ira y sigue siendo natural en español moderno. Se mantuvieron el resto del texto y las notas, ya que están bien alineados con la evidencia fuente y la auditoría inglesa.
