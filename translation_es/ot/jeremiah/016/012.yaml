translation:
  language: es
  text: Pero ustedes han hecho peor que sus padres[a], y he aquí, cada uno[b] camina tras la obstinación[c] de su malvado corazón[d], para no escucharme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han actuado más perversamente que sus padres».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre», usado distributivamente para el pueblo en su conjunto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tras la imaginación obstinada de su malvado corazón».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «de su corazón malo» o «de su corazón perverso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֵעֹתֶם
  english_pob_choice: have done worse
  chosen_spanish: han hecho peor
  alternatives_spanish:
  - han obrado más mal
  - han actuado más perversamente
  lexicon: HALOT
  rationale: La forma hifil con מֵאֲבוֹתֵיכֶם tiene fuerza comparativa. En español, «han hecho peor» conserva la comparación de grado y mantiene el juicio moral sin sonar pesado o artificial.
- source_word: לַעֲשׂוֹת
  english_pob_choice: done
  chosen_spanish: hecho
  alternatives_spanish:
  - obrado
  - actuado
  lexicon: HALOT
  rationale: El infinitivo se integra naturalmente con הֲרֵעֹתֶם; en español, «han hecho peor» reproduce esa compactación idiomática sin perder el sentido de conducta.
- source_word: מֵאֲבוֹתֵיכֶם
  english_pob_choice: than your fathers
  chosen_spanish: que sus padres
  alternatives_spanish:
  - que sus antepasados
  lexicon: HALOT
  rationale: «Padres» preserva el paralelismo bíblico y la textura genealógica del hebreo. «Antepasados» aclararía, pero neutraliza el eco profético y diluye la forma original.
- source_word: וְהִנְּכֶם
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y vean
  lexicon: HALOT
  rationale: La partícula enfática הנה se expresa con «he aquí», forma solemne y directamente reconocible en registro bíblico, fiel al carácter de llamada de atención del hebreo.
- source_word: הֹלְכִים
  english_pob_choice: walks
  chosen_spanish: camina
  alternatives_spanish:
  - anda
  - va
  lexicon: HALOT
  rationale: El participio indica acción continua; «camina» conserva la metáfora conductual y sugiere hábito o rumbo moral sin recurrir a una perífrasis más pesada.
- source_word: אִישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada quien
  lexicon: HALOT
  rationale: El singular distributivo masculino funciona para todo el pueblo. «Cada uno» mantiene el valor distributivo sin restringir indebidamente el referente a varones.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo
  lexicon: HALOT
  rationale: «Tras» reproduce bien la imagen hebrea de seguir una dirección o guía interior y suena natural en español bíblico contemporáneo.
- source_word: שְׁרִר֣וּת
  english_pob_choice: stubbornness
  chosen_spanish: obstinación
  alternatives_spanish:
  - terquedad
  - endurecimiento
  - voluntad obstinada
  lexicon: HALOT
  rationale: Este sustantivo en Jeremías denota autoafirmación inflexible. «Obstinación» comunica bien la dureza de voluntad y es una equivalencia natural en español.
- source_word: לִבּֽוֹ הָרָע
  english_pob_choice: his evil heart
  chosen_spanish: de su corazón malo
  alternatives_spanish:
  - de su corazón perverso
  - de su mal corazón
  lexicon: HALOT
  rationale: Conservo el orden hebreo y el adjetivo moral «malo», que refleja el juicio del texto. «Corazón» mantiene el centro volitivo y moral de la antropología bíblica.
- source_word: לְבִלְתִּי שְׁמֹעַ אֵלָי
  english_pob_choice: so as not to listen to me
  chosen_spanish: para no escucharme
  alternatives_spanish:
  - a fin de no escucharme
  - sin escucharme
  lexicon: HALOT
  rationale: La construcción final expresa finalidad/resulto de su conducta. «Para no escucharme» es claro, fiel y conserva la oposición voluntaria al llamado divino.
theological_decisions:
- issue: Valor distributivo de אִישׁ frente a la audiencia plural
  english_pob_reading: each of you
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El hebreo usa un singular masculino distributivo, no una restricción de género. «Cada uno» preserva la referencia a todo el pueblo y evita masculinizar innecesariamente el español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tratamiento del término אָבוֹת en un contexto profético de comparación generacional
  english_pob_reading: fathers
  chosen_spanish_reading: padres
  alternative_spanish_readings:
  - antepasados
  - ancestros
  rationale: Mantener «padres» conserva la formulación profética habitual y la textura del original. El contexto comparativo con generaciones previas no exige neutralizar el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Expresión de la obstinación moral como disposición interna
  english_pob_reading: stubbornness of his evil heart
  chosen_spanish_reading: obstinación de su corazón malo
  alternative_spanish_readings:
  - obstinación de su corazón perverso
  - terquedad de su corazón malo
  rationale: La frase hebrea describe una dirección interna persistente que conduce a la desobediencia. «Obstinación» comunica esa fuerza de voluntad endurecida sin borrar el vínculo con el corazón como centro moral.
  doctrine_reference: Jeremías 16:12; antropología bíblica del corazón
- issue: Construcción final de negativa de obediencia
  english_pob_reading: so as not to listen to me
  chosen_spanish_reading: para no escucharme
  alternative_spanish_readings:
  - a fin de no escucharme
  - para no oírme
  rationale: La construcción לבלתי seguida de infinitivo expresa finalidad negativa. «Para no escucharme» mantiene la estructura y el tono de resistencia deliberada al habla de Dios.
  doctrine_reference: HALOT; sintaxis hebrea de לְבִלְתִּי + infinitivo
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: mantiene el comparativo explícito de culpa («han hecho peor»), conserva la partícula deíctica enfática con un registro más formal («he aquí»), usa un presente general para el participio hebreo («camina»), y traduce לְבִלְתִּי con una negativa final cercana al valor sintáctico del original. Se evitó mecanizar desde el inglés, tomando como base la construcción hebrea completa.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el Tetragrámaton.
  - «Padres» se mantiene como término bíblico generacional conforme al audit trail, sin reemplazarlo por «antepasados» en el texto principal.
  - La metáfora de caminar/andar se conserva con «camina» para reflejar conducta continua.
  - Se mantiene el tono profético sobrio y directo, sin añadir explicación interpretativa al cuerpo principal.
