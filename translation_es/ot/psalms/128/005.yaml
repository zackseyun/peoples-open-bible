translation:
  language: es
  text: Que Yahvé te bendiga desde Sion, y que veas la prosperidad[a] de Jerusalén todos los días de tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el bienestar», «la bondad» o «el bien» de Jerusalén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרֶכְךָ
  english_pob_choice: May ... bless you
  chosen_spanish: Que ... te bendiga
  alternatives_spanish:
  - Que ... te bendiga
  - Bendícete...
  - Que ... lo bendiga
  lexicon: HALOT
  rationale: El imperfecto piel con valor volitivo expresa un deseo o bendición; en español, 'Que ... te bendiga' reproduce mejor el tono benedictivo que un futuro indicativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, conforme al criterio del proyecto, como transliteración reverente y transparente del Tetragrámaton.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sion
  alternatives_spanish:
  - de Sion
  - desde Sion
  - de Jerusalén
  lexicon: HALOT
  rationale: La preposición מן indica origen o procedencia. 'Desde Sion' comunica con naturalidad que la bendición procede de allí, sin añadir explicación interpretativa.
- source_word: וּרְאֵה
  english_pob_choice: and may you see
  chosen_spanish: y que veas
  alternatives_spanish:
  - y veas
  - y que puedas ver
  - y mira
  lexicon: HALOT
  rationale: La forma imperativa en este contexto de bendición funciona como ruego. 'Y que veas' conserva el valor volitivo y suena natural en español.
- source_word: בְּטוּב
  english_pob_choice: the prosperity
  chosen_spanish: el bien
  alternatives_spanish:
  - la prosperidad
  - el bienestar
  - la bondad
  lexicon: HALOT
  rationale: טוּב puede abarcar bien, bienestar, bondad o prosperidad. 'El bien' mantiene amplitud semántica y evita fijar una sola implicación económica o abstracta no obligada por el hebreo.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - todos tus días
  - durante toda tu vida
  lexicon: HALOT
  rationale: 'El modismo hebreo se vierte de forma transparente y natural: ''todos los días de tu vida''.'
theological_decisions:
- issue: Traducción del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton; la traducción conserva el nombre propio divino en forma reconocible para el lector hispano, sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de טוּב aplicado a Jerusalén
  english_pob_reading: the prosperity / the goodness / the well-being of Jerusalem
  chosen_spanish_reading: el bien de Jerusalén
  alternative_spanish_readings:
  - la prosperidad de Jerusalén
  - el bienestar de Jerusalén
  - la bondad de Jerusalén
  rationale: Se mantiene la amplitud semántica del sustantivo hebreo sin cerrar prematuramente la referencia a prosperidad material, bienestar social o bondad moral; el contexto permite una traducción abierta.
  doctrine_reference: HALOT; translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincido con el último pase: no se requieren cambios sustanciales respecto al sentido volitivo de la bendición, la procedencia desde Sion ni la amplitud de טוּב. La redacción española conserva esas decisiones con naturalidad y transparencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en este proyecto.
  - Se conserva «Sion» sin acento por la forma habitual bíblica en español.
  - Se emplea «Jerusalén» y no una paráfrasis explicativa para mantener el nombre propio del texto.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder la estructura hebrea de bendición y resultado.
