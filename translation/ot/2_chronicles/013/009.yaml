id: 2CH.13.9
reference: 2 Chronicles 13:9
source:
  edition: WLC
  text: הֲ/לֹ֤א הִדַּחְתֶּם֙ אֶת כֹּהֲנֵ֣י יְהוָ֔ה אֶת בְּנֵ֥י אַהֲרֹ֖ן וְ/הַ/לְוִיִּ֑ם וַ/תַּעֲשׂ֨וּ לָ/כֶ֤ם כֹּהֲנִים֙ כְּ/עַמֵּ֣י הָ/אֲרָצ֔וֹת כָּל הַ/בָּ֗א לְ/מַלֵּ֨א יָד֜/וֹ בְּ/פַ֤ר בֶּן בָּקָר֙ וְ/אֵילִ֣ם שִׁבְעָ֔ה וְ/הָיָ֥ה כֹהֵ֖ן לְ/לֹ֥א אֱלֹהִֽים־־־־׃ס
translation:
  text: Have you not driven out the priests of Yahweh[a], the sons of Aaron and the Levites[b], and made priests for yourselves like the peoples of the lands? Whoever comes to fill his hand with a young bull and seven rams becomes a priest of what are not gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to fill his hand,'' a technical expression for priestly ordination or installation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for non-gods' or 'of false gods'; Hebrew literally denies that these objects of worship are truly gods.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Did you not
  - Surely you have
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Have you not' preserves the rebuking force in natural English.
- source_word: הִדַּחְתֶּם
  chosen: driven out
  alternatives:
  - cast out
  - expelled
  lexicon: HALOT
  rationale: The Hiphil of נדח conveys causing removal or expulsion. 'Driven out' captures the forceful action without over-paraphrase.
- source_word: כֹּהֲנֵי יְהוָה
  chosen: the priests of the LORD
  alternatives:
  - the LORD's priests
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. YHWH follows project default as 'the LORD' per doctrine.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  - the descendants of Aaron
  lexicon: HALOT
  rationale: A formal kinship expression identifying the legitimate priestly line. 'Sons of Aaron' preserves the source wording and cultic significance.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  alternatives:
  - along with the Levites
  lexicon: HALOT
  rationale: Simple coordination with the previous object; preserves the distinct mention of Levites alongside Aaronic priests.
- source_word: וַתַּעֲשׂוּ לָכֶם כֹּהֲנִים
  chosen: and made priests for yourselves
  alternatives:
  - appointed priests for yourselves
  - set up priests for yourselves
  lexicon: HALOT
  rationale: עשה with predicate accusative here means to make/appoint. 'Made priests for yourselves' preserves both the action and the self-serving nuance of לָכֶם.
- source_word: כְּעַמֵּי הָאֲרָצוֹת
  chosen: like the peoples of the lands
  alternatives:
  - like the peoples of other lands
  - like the nations of the lands
  lexicon: HALOT
  rationale: The comparison is to surrounding non-covenant peoples. 'Peoples of the lands' is a close rendering that avoids importing 'pagans' where the Hebrew uses an ethnic-political expression.
- source_word: כָּל הַבָּא
  chosen: Whoever comes
  alternatives:
  - everyone who comes
  - anyone who comes
  lexicon: HALOT
  rationale: Generic singular construction. 'Whoever comes' is idiomatic and preserves the open-access criticism.
- source_word: לְמַלֵּא יָדוֹ
  chosen: to ordain himself
  alternatives:
  - to fill his hand
  - to install himself
  lexicon: HALOT
  rationale: The idiom 'fill the hand' is a technical expression for consecration/ordination to priestly office. 'Ordain himself' communicates the cultic sense in readable English; the more literal idiom is worth preserving in a footnote.
- source_word: בְּפַר בֶּן בָּקָר
  chosen: with a young bull
  alternatives:
  - with a bull, a son of cattle
  - with a bull from the herd
  lexicon: HALOT
  rationale: Standard sacrificial expression for a young bull/bull from the herd. 'Young bull' is natural and sufficiently precise.
- source_word: וְאֵילִם שִׁבְעָה
  chosen: and seven rams
  alternatives:
  - with seven rams
  lexicon: HALOT
  rationale: Direct rendering of the sacrificial items required by the illegitimate system being criticized.
- source_word: וְהָיָה כֹהֵן
  chosen: becomes a priest
  alternatives:
  - he becomes a priest
  - and he is a priest
  lexicon: HALOT
  rationale: The clause states the result of the procedure. 'Becomes a priest' best conveys resultant status in English.
- source_word: לְלֹא אֱלֹהִים
  chosen: of what are not gods
  alternatives:
  - for non-gods
  - for no-gods
  - of false gods
  lexicon: HALOT
  rationale: Literally 'for not-gods/non-gods.' 'Of what are not gods' preserves the polemical force of denying true deity without adding the interpretive label 'false gods' to the main text.
