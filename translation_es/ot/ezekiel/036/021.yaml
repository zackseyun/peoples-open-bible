translation:
  language: es
  text: Pero tuve consideración por mi santo nombre[a], que la casa de Israel profanó entre las naciones a donde habían ido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tuve piedad de mi santo nombre” o “lo perdoné”. El verbo hebreo puede denotar perdonar, apiadarse o mostrar consideración; aquí se refiere a la preocupación de Yahvé por el honor de su santo nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶחְמֹל
  english_pob_choice: I had pity for
  chosen_spanish: tuve piedad de
  alternatives_spanish:
  - me apiadé de
  - tuve compasión de
  - lo perdoné
  lexicon: HALOT
  rationale: El verbo חמל puede expresar piedad, compasión o el acto de no dejar caer algo. En este contexto el objeto inmediato es el nombre santo de Yahvé, no una persona, así que “tuve piedad de” mantiene la fuerza del verbo sin convertirlo en una compasión emocional hacia un nombre abstracto.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: de
  alternatives_spanish:
  - por
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: Con חמל, עַל introduce el objeto sobre el cual recae la piedad o el cuidado. En español, “tener piedad de” es la colocación natural y conserva la relación del objeto gramatical.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  - mi nombre sagrado
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto y revelación divina. “Santo” funciona mejor en español bíblico contemporáneo que “sagrado” para mantener la resonancia de la santidad como atributo central de Yahvé.
- source_word: אֲשֶׁר חִלְּלוּהוּ
  english_pob_choice: which ... had profaned
  chosen_spanish: que ... profanó
  alternatives_spanish:
  - que ... había profanado
  - que ... deshonró
  - que ... había desecrado
  lexicon: HALOT
  rationale: חלל en piel expresa tratar como común o profanar lo santo. En español, “profanó” preserva el vocabulario de santidad y el contraste teológico del pasaje. Se usa pasado simple para una prosa bíblica fluida en español, sin perder la anterioridad contextual.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética estable, más cercana a la estructura del hebreo y coherente con el registro del libro.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  - en medio de las naciones
  lexicon: HALOT
  rationale: “Naciones” traduce bien גויים en el marco del exilio. “Entre” comunica la dispersión y la presencia de Israel en medio de ellas.
- source_word: אֲשֶׁר בָּאוּ שָׁמָּה
  english_pob_choice: where they had gone
  chosen_spanish: adonde habían ido
  alternatives_spanish:
  - donde habían ido
  - a donde habían llegado
  - a las cuales habían ido
  lexicon: HALOT
  rationale: בוא con שמה expresa llegada a un destino. “Adonde habían ido” conserva el movimiento y suena natural en español, sin exagerar el matiz de llegada.
theological_decisions:
- issue: Relación de Dios con “mi santo nombre” en וָאֶחְמֹל
  english_pob_reading: God expresses concern/pity for the sanctity and honor of his holy name, not pity toward the house of Israel in this clause.
  chosen_spanish_reading: Dios expresa piedad/solicitud por la honra de su santo nombre, no compasión directa por Israel en esta cláusula.
  alternative_spanish_readings:
  - tuve cuidado de mi santo nombre
  - lo preservé por amor a mi santo nombre
  - tuve piedad por causa de mi santo nombre
  rationale: 'El objeto gramatical es el nombre santo de Yahvé, y el contexto inmediato (vv. 20–23) enfatiza la vindicación pública de ese nombre entre las naciones. “Tuve piedad de mi santo nombre” conserva la tensión: no se trata de una emoción dirigida a una persona, sino del acto divino de atender a la honra de su nombre.'
  doctrine_reference: Ezequiel 36:20–23; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la primera redacción de “I had concern for” a “I had pity for” para acercarse más al verbo hebreo sin perder naturalidad. La versión española sigue esa decisión y evita una paráfrasis que diluya el objeto teológico principal: el santo nombre de Yahvé.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” conforme al estándar POB para el nombre divino en español.
  - “Casa de Israel” se conserva como fórmula profética fija.
  - “Naciones” se usa para גויים, sin sustituirlo por “gentiles”, porque aquí el énfasis es geopolítico/exílico.
  - Se conserva la tensión lexical de חמל con una nota, en vez de resolverla de modo interpretativo.
  - El tiempo verbal en español se adapta al flujo narrativo-profético, sin perder el sentido de anterioridad del hebreo.
