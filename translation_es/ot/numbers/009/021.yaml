translation:
  language: es
  text: Y a veces la nube estaba desde la tarde hasta la mañana; cuando la nube se alzaba por la mañana[a], ellos se ponían en marcha. O si era de día y de noche, cuando la nube se alzaba, ellos se ponían en marcha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuando la nube subía». El verbo hebreo puede traducirse más literalmente de esta manera, pero «se alzaba» refleja mejor el levantamiento de la nube como señal para que Israel partiera en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר
  english_pob_choice: And sometimes
  chosen_spanish: Y a veces
  alternatives_spanish:
  - Y en ocasiones
  - Y sucedía que
  lexicon: HALOT
  rationale: La expresión introduce un caso ocasional dentro del patrón anterior; «a veces» comunica bien ese valor circunstancial sin forzar una construcción pesada en español.
- source_word: יִהְיֶה הֶעָנָן
  english_pob_choice: the cloud would be
  chosen_spanish: la nube estaba
  alternatives_spanish:
  - la nube sería
  - la nube permanecía
  lexicon: HALOT
  rationale: En este contexto temporal, היה expresa estado o presencia continua; «estaba» refleja el valor más natural en español sin perder el sentido de permanencia temporal.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  english_pob_choice: from evening until morning
  chosen_spanish: desde la tarde hasta la mañana
  alternatives_spanish:
  - desde la tarde hasta la mañana siguiente
  - de la tarde a la mañana
  lexicon: HALOT
  rationale: Es una expresión temporal directa; «desde... hasta...» mantiene la estructura y el alcance del período indicado.
- source_word: וְנַעֲלָה הֶעָנָן
  english_pob_choice: when the cloud was taken up
  chosen_spanish: cuando la nube era levantada
  alternatives_spanish:
  - cuando la nube se levantaba
  - cuando la nube subía
  lexicon: HALOT
  rationale: עלה en este contexto de guía en el desierto apunta al alzamiento de la nube como señal de partida; «era levantada» conserva la idea pasiva/eventiva que destacó la POB en inglés.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: en la mañana
  alternatives_spanish:
  - por la mañana
  - a la mañana
  lexicon: HALOT
  rationale: Es una equivalencia temporal natural y clara en español; mantiene el marco de la señal de partida.
- source_word: וְנָסָעוּ
  english_pob_choice: they would set out
  chosen_spanish: ellos se ponían en marcha
  alternatives_spanish:
  - partían
  - levantaban el campamento
  lexicon: HALOT
  rationale: נסע en el desierto implica partir de campamento; «se ponían en marcha» es idiomático y conserva la idea de salida sin añadir detalle interpretativo excesivo.
- source_word: א֚וֹ
  english_pob_choice: Or if
  chosen_spanish: O si
  alternatives_spanish:
  - O bien si
  - O cuando
  lexicon: HALOT
  rationale: La partícula introduce una segunda posibilidad paralela; «O si» reproduce con naturalidad la fuerza condicional.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: by day and by night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - por día y por noche
  - durante el día y la noche
  lexicon: HALOT
  rationale: La secuencia describe el marco temporal de la nube, no una duración explícita añadida; «de día y de noche» sigue de cerca el hebreo y la revisión inglesa más reciente.
theological_decisions:
- issue: Sentido de עלה aplicado a la nube como señal de salida
  english_pob_reading: when the cloud was taken up
  chosen_spanish_reading: cuando la nube era levantada
  alternative_spanish_readings:
  - cuando la nube subía
  - cuando la nube se alzaba
  rationale: Se conserva la lectura de la nube como señal divina de partida, sin convertirla en mero fenómeno meteorológico. La forma pasiva/estativa mantiene la función narrativa del signo.
  doctrine_reference: Éxodo 40:36-37; Números 9:17-20
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó el énfasis de continuidad y evitó añadir duración explícita donde el hebreo no la expresa de forma directa en la segunda cláusula. La propuesta española sigue esa revisión: usa «estaba» para el primer caso temporal, y «de día y de noche» para la cláusula alternativa, sin introducir «un día y una noche» como expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «nube» de forma consistente para הֶעָנָן.
  - «Era levantada» se usa de manera uniforme para el motivo repetido de la señal.
  - «Se ponían en marcha» conserva el valor de salida del desierto sin recurrir a una frase demasiado técnica.
  - La puntuación separa claramente los dos escenarios paralelos del versículo.
