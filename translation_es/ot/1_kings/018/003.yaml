translation:
  language: es
  text: Acab llamó a Obadías[a], que estaba a cargo de la casa real. Obadías temía mucho a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaba sobre la casa». El hebreo dice literalmente «que estaba sobre la casa», una expresión para un alto oficial encargado de la casa real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El hebreo indica una acción de llamar dirigida a una persona concreta. En español, «llamó» comunica con naturalidad la acción básica sin añadir una fuerza mayor que el texto no exige.
- source_word: אֶל
  english_pob_choice: called Obadiah
  chosen_spanish: a Obadías
  alternatives_spanish:
  - para Obadías
  - llamó por Obadías
  lexicon: HALOT
  rationale: La construcción con קרא + אֶל se expresa de manera idiomática en español con «llamó a». Mantiene la dirección del llamado sin calco innecesario.
- source_word: עֹבַדְיָהוּ
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Obadiah
  lexicon: conventional transliteration
  rationale: Se usa la forma castellana usual del nombre bíblico, «Obadías», que es clara y reconocible para lectores hispanos.
- source_word: אֲשֶׁר עַל הַבָּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba a cargo de la casa
  - que era mayordomo de la casa
  - que estaba sobre el palacio
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal «sobre la casa», porque el texto subraya el cargo en la casa real. En español, «estaba sobre la casa» preserva la formulación original y deja visible la tensión lexical con la alternativa administrativa.
- source_word: הַבָּיִת
  english_pob_choice: household
  chosen_spanish: la casa
  alternatives_spanish:
  - el palacio
  - la casa real
  - el palacio real
  lexicon: HALOT
  rationale: En este contexto, בַּיִת puede referir a la residencia/ámbito real. «La casa» conserva la base semántica del hebreo; se evita imponer «palacio» como si fuera seguro, aunque sea una posibilidad contextual.
- source_word: הָיָה יָרֵא
  english_pob_choice: feared
  chosen_spanish: temía
  alternatives_spanish:
  - era reverente hacia
  - temía reverentemente
  lexicon: HALOT
  rationale: La combinación expresa un estado o disposición característica. «Temía» comunica bien la reverencia temerosa sin suavizar el verbo ni convertirlo en una simple cualidad abstracta.
- source_word: יָרֵא אֶת יְהוָה
  english_pob_choice: feared Yahweh
  chosen_spanish: temía a Yahvé
  alternatives_spanish:
  - reverenciaba a Yahvé
  - temía al Yahvé
  lexicon: HALOT
  rationale: Se mantiene el verbo «temer» para preservar la fuerza del hebreo ירא. «Yahvé» sigue el estándar del proyecto para יְהוָה y evita la sustitución por un título.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - mucho
  - en gran manera
  - en extremo
  lexicon: HALOT
  rationale: «Grandemente» reproduce con dignidad el intensificador hebreo y encaja bien con el registro bíblico en español. Conserva el valor enfático sin necesidad de parafrasear.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al estándar del proyecto, se traduce como «Yahvé» para preservar el nombre propio del Dios de Israel, no como una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «temer» y reverencia pactual
  english_pob_reading: feared Yahweh
  chosen_spanish_reading: temía a Yahvé
  alternative_spanish_readings:
  - reverenciaba a Yahvé
  - era temeroso de Yahvé
  rationale: El hebreo ירא con Dios incluye temor reverente y lealtad pactual. «Temía a Yahvé» mantiene la tensión entre temor y reverencia sin diluirla en una sola idea más suave.
  doctrine_reference: Uso semántico de ירא en contextos teológicos veterotestamentarios
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que ajustó el orden de «feared ... greatly» para reflejar mejor el hebreo. En español, la redacción final conserva ese énfasis con «temía ... grandemente», manteniendo la adverbialidad intensiva sin alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la terminología del proyecto para יְהוָה.
  - Se usa «Obadías» como forma española estándar del nombre propio.
  - Se conserva «la casa» para reflejar la base hebrea בית y no imponer sin necesidad una interpretación más específica.
