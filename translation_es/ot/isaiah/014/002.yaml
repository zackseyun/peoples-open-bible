review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: los pueblos toman y devuelven a Israel a su lugar; la casa de Israel posee a esos pueblos en la tierra de Yahvé; hay inversión de cautividad y dominio sobre opresores. También conserva correctamente ‘Yahvé’ y no suaviza la esclavitud. Sin embargo, hay desajustes menores entre texto y notas, y una formulación española poco natural en la expresión de género.'
  spanish_quality_summary: La redacción es generalmente clara, pero ‘esclavos varones y esclavas mujeres’ suena forzada e innecesariamente calcada; en español natural y fiel basta ‘esclavos y esclavas’. Además, la nota [a] está anclada en ‘lugar’ aunque explica el verbo ‘los poseerá’, y faltan en español las notas correspondientes al nombre divino y a la explicitación de ambos géneros si se quiere reflejar el rastro de auditoría inglés. ‘Dominarán sobre’ es aceptable, aunque ‘dominarán a’ o ‘gobernarán sobre’ sería más idiomático; no es un error grave.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה → ‘Yahvé’; עבדים/שפחות se mantiene con ‘esclavos’; בֵּית יִשְׂרָאֵל → ‘la casa de Israel’. La única mejora necesaria es evitar la formulación artificial ‘esclavos varones y esclavas mujeres’ mientras se preserva la distinción de género mediante ‘esclavos y esclavas’.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre ‘su lugar’ pero su contenido explica ‘los poseerá / los heredarán’.
    rationale: El anclaje debe aparecer en la palabra o frase relevante del texto. Tal como está, induce a pensar que la variante afecta ‘lugar’, cuando en realidad afecta וְהִתְנַחֲלוּם (‘los poseerá’ / ‘los heredará’).
  - severity: medium
    issue: ‘Como esclavos varones y esclavas mujeres’ es español poco natural.
    rationale: Aunque intenta reflejar ambos géneros, la combinación sustantivo + sustantivo redundante suena torpe en español. ‘Como esclavos y esclavas’ conserva fielmente la distinción explícita del hebreo sin calco innecesario.
  - severity: low
    issue: Falta en las notas españolas la aclaración sobre el nombre divino que sí figura en la auditoría inglesa.
    rationale: No siempre es obligatoria toda nota inglesa, pero aquí puede conservarse fácilmente como nota léxica útil, especialmente dado el énfasis doctrinal del proyecto en Yahvé.
  - severity: low
    issue: La nota [c] ofrece como alternativa exactamente la misma redacción que ya aparece en el texto principal.
    rationale: La nota debe explicar el juego de palabras o dar una alternativa real. Repetir la misma frase no añade valor; conviene reformularla para destacar la repetición de raíz en hebreo.
  revised_spanish_text: Los pueblos los tomarán y los llevarán a su lugar; y la casa de Israel los poseerá[a] en la tierra de Yahvé[b] como esclavos y esclavas[c]. Tomarán cautivos a los que los cautivaron[d], y dominarán sobre sus opresores.
  revised_footnotes:
