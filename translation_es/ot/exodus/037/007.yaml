translation:
  language: es
  text: Hizo dos querubines de oro; los hizo de obra martillada[a], de los dos extremos del propiciatorio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de obra batida». El hebreo se refiere al metal trabajado a martillo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la cubierta de expiación». El término hebreo se refiere a la cubierta del arca, asociada con la expiación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El valor narrativo del verbo עשה en secuencia se conserva con un pretérito simple natural en español. No es necesario repetir una conjunción explícita si el flujo narrativo ya queda claro en la cláusula.
- source_word: שְׁנֵי כְרֻבִים
  english_pob_choice: two cherubim
  chosen_spanish: dos querubines
  alternatives_spanish:
  - dos querubines
  - dos seres alados
  lexicon: HALOT
  rationale: '''Querubines'' mantiene el término técnico del tabernáculo y evita sustituirlo por una descripción genérica que borre la imagen bíblica concreta.'
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro
  - de metal precioso
  lexicon: HALOT
  rationale: La construcción posesiva natural en español para el material es 'de oro'. Conserva el sentido material sin cargarlo de explicaciones.
- source_word: מִקְשָׁה
  english_pob_choice: hammered work
  chosen_spanish: obra martillada
  alternatives_spanish:
  - obra batida
  - metal trabajado a martillo
  - de una sola pieza
  lexicon: HALOT
  rationale: La expresión refiere al trabajo del metal moldeado a martillo. 'Obra martillada' preserva el proceso de fabricación de forma concisa y fiel. No se adopta 'de una sola pieza' en el texto principal porque eso es una implicación contextual, no el núcleo léxico del término.
- source_word: עָשָׂה אֹתָם
  english_pob_choice: he made them
  chosen_spanish: los hizo
  alternatives_spanish:
  - los hizo
  - los confeccionó
  lexicon: HALOT
  rationale: La repetición del verbo en hebreo se refleja de manera natural con 'los hizo', manteniendo el énfasis en la acción constructiva sin sonar forzado.
- source_word: מִשְּׁנֵי קְצוֹת
  english_pob_choice: from the two ends
  chosen_spanish: desde los dos extremos
  alternatives_spanish:
  - desde ambos extremos
  - en los dos extremos
  lexicon: HALOT
  rationale: '''Desde'' expresa bien el origen o la procedencia que marca la preposición מִן, coherente con la imagen de los querubines que surgen de los extremos del objeto.'
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la tapa del arca
  lexicon: HALOT
  rationale: En español bíblico, 'propiciatorio' es el término tradicional y más transparente para כַּפֹּרֶת en este contexto cultual. Se prefiere aquí por claridad litúrgica y continuidad canónica, reconociendo que el sentido descriptivo subyacente es el de la cubierta del arca asociada con la expiación.
theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in tabernacle context
  english_pob_reading: the mercy seat, with an alternative note 'the atonement cover'
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta de expiación
  - la tapa del arca
  rationale: El pasaje trata del cubrimiento del arca y de su función cultual. 'Propiciatorio' es el equivalente bíblico tradicional en español y comunica la función ritual sin necesidad de una paráfrasis. La alternativa más descriptiva puede explicitarse como nota, pero no reemplaza el término asentado en el texto principal.
  doctrine_reference: Terminología cultual del tabernáculo; continuidad intertextual con la tradición bíblica hispana.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo de control informó alta concordancia; por tanto, la propuesta española sigue de cerca el contenido del texto fuente sin requerir ajuste por variantes recientes.
  spanish_consistency_notes:
  - Se mantiene 'querubines' como término técnico estable para כְרֻבִים.
  - Se usa 'propiciatorio' para כַּפֹּרֶת por consistencia con el registro bíblico y cultual en español.
  - La voz pasiva no se introduce; el hebreo activo se refleja con verbos simples en español.
  - La nota de pie preserva la ambigüedad entre el proceso ('obra martillada') y la posible implicación de una sola pieza, sin resolverla de forma unilateral.
