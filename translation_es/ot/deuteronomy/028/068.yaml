base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/068.yaml
  text: And Yahweh will bring you back to Egypt in ships[a], by the way of which I said to you, ‘You shall never see it again.’ And there you will offer yourselves for sale to your enemies as male slaves and female slaves, but there will be no buyer.
