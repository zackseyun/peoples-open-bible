    issue: La nota [b] está anclada en «viviente» pero comenta «ἀπαραπόδιστον / sin tropiezo».
    rationale: Las notas deben aparecer en el punto relevante del texto. Aquí el marcador induce a pensar que la nota explica «viviente», no «sin tropiezo».
  - severity: medium
    issue: «Estabilidad sin tropiezo» es poco natural en español.
    rationale: Aunque intenta reflejar ἀπαραπόδιστον, la combinación no suena idiomática con «estabilidad». «Sin impedimento» o «sin obstáculo» preserva mejor la idea de estabilidad no estorbada.
  - severity: low
    issue: La expresión «Dios todopoderoso, celestial, viviente» debilita la collocación bíblica «Dios viviente».
    rationale: El griego θεοῦ ζῶντος forma una unidad reconocible. En español conviene que «Dios viviente» se perciba claramente, sin perder la serie de descriptores.
