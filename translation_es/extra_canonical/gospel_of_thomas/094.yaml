translation:
  language: es
  text: 'Jesús dijo[a]: El que busca, encontrará; el que toca para entrar[b], se le abrirá[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El inicio «Jesús dijo» está parcialmente reconstruido en el manuscrito (entre corchetes en Dilley) y normalizado como ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ.
    reason: lacuna_or_restoration
  - marker: b
    text: «Toca para entrar» refleja ⲧⲱϩⲙ con la dirección de ⲉϩⲟⲩⲛ («hacia adentro», «para entrar») sin añadir «puerta», que no aparece en el texto.
    reason: cultural_note
  - marker: c
    text: «Se le abrirá» traduce el futuro impersonal en tercera persona plural ⲛⲧⲟⲟⲩ con sentido pasivo; alternativamente, «le abrirán (algo)».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Dijo Jesús
  - Jesús expresó
  lexicon: Crum; Lambdin
  rationale: El incipit narrativo breve se conserva de forma natural en español con el orden directo «Jesús dijo». Mantiene el tono formulaico de Thomas sin añadir contenido.
- source_word: ⲡⲉⲧⲉⲣⲉϣⲓⲛⲉ
  english_pob_choice: the one who seeks
  chosen_spanish: el que busca
  alternatives_spanish:
  - el que procura
  - quien busca
  lexicon: Layton; Crum
  rationale: La construcción relativa genérica se vierte con «el que» para reflejar el valor proverbial del original. «Busca» expresa bien ϣⲓⲛⲉ sin intensificar ni suavizar el sentido.
- source_word: ⲛⲧⲟϥ ⲛⲁϭⲓⲛⲉ
  english_pob_choice: he will find
  chosen_spanish: hallará
  alternatives_spanish:
  - encontrará
  - va a encontrar
  lexicon: Lambdin; Crum
  rationale: «Hallará» es un futuro claro y digno en español y conserva el valor gnómico del futuro coptó. Se evita una perífrasis más moderna que rompería el ritmo proverbial.
- source_word: ⲡⲉⲧⲉⲣⲉⲧⲱϩⲙ ⲉϩⲟⲩⲛ
  english_pob_choice: the one who knocks to enter
  chosen_spanish: el que llama para entrar
  alternatives_spanish:
  - el que golpea para entrar
  - el que llama hacia adentro
  lexicon: Crum
  rationale: Se mantiene la idea de golpear/llamar con la naturalidad española de «llamar» y la dirección de entrada con «para entrar». No se introduce «puerta», porque el coptico no la menciona.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲟⲩⲱⲛ ⲛⲁ ⲛⲧⲟϥ
  english_pob_choice: it will be opened for him
  chosen_spanish: se le abrirá
  alternatives_spanish:
  - le abrirán
  - será abierto para él
  lexicon: Layton; Crum
  rationale: El sujeto impersonal coptó admite pasiva en español. «Se le abrirá» conserva la pasiva/impersonal sin especificar agente y suena natural en una traducción publicada.
theological_decisions:
- issue: Pasiva impersonal y agente no expresado
  english_pob_reading: It will be opened for him renders the impersonal 3pl future with passive sense; alternatively, they will open (it) for him.
  chosen_spanish_reading: se le abrirá
  alternative_spanish_readings:
  - será abierto para él
  - le abrirán
  rationale: El español permite conservar la ambigüedad del agente con una construcción impersonal/pasiva. «Se le abrirá» mantiene la apertura como resultado prometido sin añadir sujeto humano o explícitamente divino.
  doctrine_reference: Gramática funcional del español; sin implicación doctrinal adicional en el dicho
- issue: Direccionalidad de entrada sin objeto explícito
  english_pob_reading: Knocks to enter reflects ⲧⲱϩⲙ with the directional ⲉϩⲟⲩⲛ (‘inwards, to go in’), without adding ‘door,’ which is not expressed.
  chosen_spanish_reading: llama para entrar
  alternative_spanish_readings:
  - golpea para entrar
  - llama hacia adentro
  rationale: La frase conserva la intención direccional del original sin introducir un objeto no atestado. «Para entrar» comunica el movimiento hacia adentro de forma idiomática y fiel.
  doctrine_reference: Crítica textual y semántica del dicho; no hay contenido doctrinal específico
translation_notes:
  revision_awareness: La redacción coincide con la revisión más reciente (sin cambios necesarios) y con la verificación de alto acuerdo entre los controles auditados.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para el nombre propio, en continuidad con el estándar del proyecto.
  - Se conserva la concisión proverbial del dicho, sin expandir el sujeto u objeto implícitos.
  - No se añade «puerta» ni otro complemento no expresado por el coptó.
  - El futuro español se usa con valor gnómico, coherente con la lectura auditada del original.
