id: MRK.14.61
reference: Mark 14:61
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ ἐσιώπα καὶ ⸂οὐκ ἀπεκρίνατο οὐδέν⸃. πάλιν ὁ ἀρχιερεὺς ἐπηρώτα αὐτὸν καὶ λέγει αὐτῷ· Σὺ εἶ ὁ χριστὸς ὁ υἱὸς τοῦ εὐλογητοῦ;
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/061.yaml
  text: But he kept silent and answered nothing[a]. Again the high priest questioned him and says to him, “Are you the Messiah[b], the Son of the Blessed One?”
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title is Χριστός (Christos), here rendered “Messiah” because it functions as a title in a Jewish messianic context.
    reason: alternative_reading
  - marker: b
    text: “The Blessed One” is a reverential Jewish way of referring to God.
    reason: cultural_note
translation:
  language: ko
  text: 그러나 그분께서는 잠잠하시며 아무 대답도 하지 않으셨습니다. 대제사장이 다시 그분께 묻고 그분께 말했습니다. 「당신이 메시아, 곧 송축받으실 분의 아들입니까?」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ χριστὸς
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 유대 종교 지도자의 칭호 질의 문맥이므로 칭호로서의 Χριστός를 「메시아」로 옮긴다.
- source_word: ὁ υἱὸς τοῦ εὐλογητοῦ
  english_pob_choice: the Son of the Blessed One
  chosen_korean: 송축받으실 분의 아들
  alternatives_korean:
  - 복되신 분의 아들
  lexicon: BDAG
  rationale: 「송축받으실 분」(εὐλογητός)은 유대 정황에서 하나님의 이름을 직접 부르지 않기 위한 우회 호칭(parastasis)이다. 「송축받으실 분」으로 옮겨 이 우회의 신학적 분위기를 보존한다.
