review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: la queja de Israel sobre la justicia del proceder divino y la respuesta de juicio individual dentro del marco corporativo. Sin embargo, hay un problema léxico importante: דֶּרֶךְ אֲדֹנָי significa «el camino del Señor / de Adonai», no «de Yahvé», porque aquí no aparece el Tetragrámaton sino אֲדֹנָי. También conviene ajustar la nota [a] para preservar mejor las alternativas del inglés POB («no es imparcial / no es recto») y mejorar el vocativo final con «oh» para reflejar el tono profético.'
  spanish_quality_summary: El español es claro y digno, pero «el camino de Yahvé» introduce una imprecisión terminológica frente al hebreo. «Casa de Israel» funciona, aunque el cierre suena más natural y marcadamente vocativo como «oh casa de Israel». El resto del versículo es fluido y fiel.
  glossary_alignment: Alineación parcial con el glosario. Se usa correctamente «justo» para לֹא יִתָּכֵן en contexto forense, y «cada uno de ustedes» preserva bien la responsabilidad individual. Pero se incumple la distinción entre יהוה -> «Yahvé» y אֲדֹנָי -> «Señor». Aquí debe ser «Señor», no «Yahvé».
  issues:
  - severity: high
    issue: Se traduce אֲדֹנָי como «Yahvé».
    rationale: El texto fuente tiene אֲדֹנָי, título divino, no יהוה. La norma del proyecto para «Yahvé» aplica al Tetragrámaton, no a Adonai. Mantener «Yahvé» aquí altera el dato léxico del original.
  - severity: medium
    issue: La nota [a] no conserva bien la alternativa inglesa «not fair».
    rationale: El audit trail inglés preserva «not fair» y «not right». En español, «no es imparcial» o «no es equitativo» refleja mejor la dimensión de equidad judicial que «no es correcto» por sí solo.
  - severity: low
    issue: El vocativo final puede marcarse con mayor naturalidad.
    rationale: «casa de Israel» es entendible, pero «oh casa de Israel» refleja mejor el vocativo profético de בֵּית יִשְׂרָאֵל y suena más completo en español bíblico moderno.
  revised_spanish_text: 'Sin embargo, ustedes dicen[a]: «El camino del Señor no es justo». Yo juzgaré a cada uno de ustedes según sus caminos[b], oh casa de Israel.'
