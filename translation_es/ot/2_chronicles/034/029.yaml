translation:
  language: es
  text: Entonces el rey envió y reunió a todos los ancianos de Judá y Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Entonces el rey envió y reunió a todos los ancianos de Judá y Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: mandó
  alternatives_spanish:
  - envió
  - mandó a llamar
  lexicon: HALOT
  rationale: El hebreo שׁלח puede significar 'enviar', pero en este contexto la acción va seguida de la reunión de los ancianos, lo que sugiere una convocatoria. En español, 'mandó' comunica con naturalidad esa iniciativa real sin añadir 'palabras' no explicitadas en el texto y sin perder la secuencia narrativa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural del sustantivo definido. El referente es Josías por contexto, pero el hebreo usa el título, así que se mantiene 'el rey'.
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: HALOT
  rationale: אָסף expresa 'juntar/reunir'. 'Reunió' es idiomático y preciso en español para la reunión de líderes, conservando el valor de agrupación sin forzar una lectura más técnica como 'convocó'.
- source_word: אֶת כָּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a la totalidad de
  - todos
  lexicon: HALOT
  rationale: El hebreo marca el objeto directo y la totalidad del grupo. En español, 'a todos' expresa con claridad la amplitud de la convocatoria y conserva el valor cuantificativo de כָּל.
- source_word: זִקְנֵי
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: HALOT
  rationale: זִקְנֵי designa a los ancianos/autoridades del pueblo, no simplemente a personas de edad avanzada. 'Ancianos' preserva la categoría comunitaria y eclesialmente inteligible en español.
- source_word: יְהוּדָה וִירוּשָׁלִָם
  english_pob_choice: of Judah and Jerusalem
  chosen_spanish: de Judá y de Jerusalén
  alternatives_spanish:
  - de Judá y Jerusalén
  - de Judá y Jerusalén
  lexicon: HALOT
  rationale: La repetición de la preposición 'de' hace explícita la pertenencia de los ancianos a ambas esferas geográfica-políticas. Aunque el español puede omitir una preposición, aquí se conserva para reflejar con mayor precisión la estructura del hebreo.
translation_notes:
  revision_awareness: El inglés POB revisó una expansión anterior ('sent word') y volvió a una formulación más estricta ('sent'). La versión española evita cualquier expansión equivalente no sustentada por el hebreo, pero conserva una elección natural ('mandó') para sugerir la convocatoria implícita por el contexto sin introducir un objeto inexistente.
  spanish_consistency_notes:
  - Se mantiene 'el rey' en vez de nombrar a Josías, porque el hebreo usa el título.
  - '''Ancianos'' se usa con valor comunitario de liderazgo, no etario.'
  - Se conserva la doble preposición 'de' en 'de Judá y de Jerusalén' para reflejar la estructura del original.
  - La nota alternativa ofrece una versión más literal sin cambiar el sentido básico.
