  glossary_alignment: No hay conflicto con la terminología teológica del proyecto en este versículo. Sí hay que alinear mejor la decisión léxica de צֹאן como colectivo y restaurar la nota léxica sobre 'el producto/la cosecha del olivo falla'.
  issues:
