translation:
  language: es
  text: ¿No es esta la copa de la que bebe mi señor y por la cual, en verdad, adivina? Han hecho mal[a][b] al hacer esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ciertamente puede adivinar por ella». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Han hecho mal en lo que han hecho».'
    reason: previous_rendering
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is this not
  chosen_spanish: ¿No es esta
  alternatives_spanish:
  - ¿Acaso no es esta?
  - ¿No será esta?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y espera asentimiento. En español, '¿No es esta' conserva ese valor interrogativo sin sonar forzado.
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  - este
  lexicon: HALOT
  rationale: El referente es la copa, un sustantivo femenino implícito en el contexto; 'esta' mantiene la deixis precisa y natural.
- source_word: אֲשֶׁר יִשְׁתֶּה אֲדֹנִי בּוֹ
  english_pob_choice: the one from which my master drinks
  chosen_spanish: aquella de la que bebe mi señor
  alternatives_spanish:
  - la que bebe mi señor
  - la de la que bebe mi señor
  - la copa de la que bebe mi señor
  lexicon: HALOT
  rationale: La preposición ב con beber se expresa naturalmente en español con 'beber de'. 'Mi señor' sigue el valor social del hebreo אֲדֹנִי en este contexto narrativo.
- source_word: וְהוּא
  english_pob_choice: and he indeed
  chosen_spanish: y, en verdad
  alternatives_spanish:
  - y él ciertamente
  - e incluso
  lexicon: HALOT
  rationale: El pronombre aporta énfasis. 'En verdad' traslada esa intensificación sin hacer pesada la sintaxis española.
- source_word: נַחֵשׁ יְנַחֵשׁ
  english_pob_choice: practices divination
  chosen_spanish: adivina
  alternatives_spanish:
  - practica adivinación
  - adivina por él
  - hace adivinación
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto + verbo finito para énfasis. En español, 'adivina' es la opción más natural; el énfasis se conserva con 'en verdad' y en la nota se explica la construcción enfática. Se evita 'practica adivinación' por ser más pesado, aunque sigue siendo posible.
- source_word: בּוֹ
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - con la cual
  - mediante la cual
  lexicon: HALOT
  rationale: La segunda referencia instrumental se expresa mejor con 'por la cual' en español, manteniendo la relación con el acto de adivinación.
- source_word: הֲרֵעֹתֶם
  english_pob_choice: You have done evil
  chosen_spanish: Han hecho mal
  alternatives_spanish:
  - Han obrado mal
  - Han hecho el mal
  - Han hecho lo malo
  lexicon: HALOT
  rationale: El causativo de רעע comunica haber obrado mal/evil. 'Han hecho mal' preserva la fuerza moral y suena natural en español contemporáneo.
- source_word: אֲשֶׁר עֲשִׂיתֶם
  english_pob_choice: in doing this
  chosen_spanish: al hacer esto
  alternatives_spanish:
  - en hacer esto
  - por haber hecho esto
  - con lo que hicieron
  lexicon: HALOT
  rationale: La cláusula relativa especifica la acción concreta. 'Al hacer esto' reproduce la relación circunstancial de forma idiomática y evita la repetición tautológica.
theological_decisions:
- issue: Si el texto debe suavizar o mantener la acusación de adivinación atribuida a José
  english_pob_reading: 'Translate the steward''s accusation straightforwardly as a claim within the narrative speech: ''he indeed practices divination.'''
  chosen_spanish_reading: 'Traducir la acusación de manera directa: ''y, en verdad, adivina''.'
  alternative_spanish_readings:
  - y, en verdad, practica adivinación
  - y, ciertamente, puede adivinar por él
  - y, en verdad, se dice que adivina
  rationale: El hebreo presenta la acusación sin suavizar; la traducción debe reflejar la afirmación tal como aparece en el discurso narrativo, sin resolverla por armonización interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la construcción enfática del hebreo con infinitivo absoluto + verbo finito
  english_pob_reading: The Hebrew uses an infinitive absolute with a finite verb for emphasis.
  chosen_spanish_reading: Conservar el énfasis con 'en verdad' y explicarlo en nota.
  alternative_spanish_readings:
  - tratarlo como simple repetición
  - omitir el énfasis
  rationale: En español no existe un calco natural equivalente. Una marca adverbial como 'en verdad' comunica la intensidad sin alterar el contenido acusatorio.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió 'in doing this' para evitar una tautología en inglés. En español, 'al hacer esto' logra la misma economía y claridad sin perder la referencia específica a la acción cometida. También se respetó el estado final sin cambios del último pase de revisión y el alto grado de acuerdo del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto en otros contextos; aquí no aparece el nombre divino.
  - Se tradujo אֲדֹנִי como 'mi señor' por el valor social del término en la escena narrativa.
  - Se conservó la acusación de adivinación de forma directa, siguiendo la huella auditada del POB en inglés.
  - La puntuación separa la pregunta retórica de la acusación final para reflejar la estructura hebrea.
  - Las notas a y b cubren, respectivamente, la alternativa léxica sobre la adivinación enfática y la variante de la cláusula final.
