translation:
  language: es
  text: Bezalel hizo el arca[a] de madera de acacia. Su longitud era de dos codos y medio, su anchura de un codo y medio, y su altura de un codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'el cofre'. El término hebreo puede referirse de forma más general a una caja o cofre, pero en este contexto del tabernáculo 'arca' es la traducción más precisa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: El verbo hebreo עשה es el término ordinario para 'hacer'. En español, 'hizo' comunica de manera natural la acción sin añadir una idea técnica que el texto no exige.
- source_word: בְּצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  alternatives_spanish:
  - Bezaleel
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico, conservando la identificación del personaje.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - el arca / el cofre
  lexicon: HALOT
  rationale: Aunque אָרוֹן puede significar también 'caja' o 'cofre', en este contexto del tabernáculo la designación más precisa en español es 'arca'. En español, además, el artículo femenino 'el arca' corresponde al uso tradicional del sustantivo en este objeto sagrado.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de acacias
  lexicon: HALOT
  rationale: La construcción hebrea expresa el material. 'De madera de acacia' es una equivalencia clara y natural en español, manteniendo el sustantivo material sin perder el valor descriptivo.
- source_word: אַמָּתַיִם וָחֵצִי
  english_pob_choice: two and a half cubits
  chosen_spanish: dos codos y medio
  alternatives_spanish:
  - dos codos y medio
  - dos codos y medio de largo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codo' por fidelidad al texto y por coherencia con la tradición bíblica de medidas, evitando la conversión a unidades modernas.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - la longitud de él
  lexicon: HALOT
  rationale: אָרֶךְ denota la dimensión longitudinal del arca. 'Su longitud' es preciso y formal en español, sin introducir una paráfrasis explicativa.
- source_word: וְאַמָּה וָחֵצִי
  english_pob_choice: one and a half cubits
  chosen_spanish: un codo y medio
  alternatives_spanish:
  - un codo y medio de ancho
  - un codo y medio
  lexicon: HALOT
  rationale: La medida se mantiene literal y consistente con la primera. En español, 'un codo y medio' es idiomático y exacto.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su largura
  lexicon: HALOT
  rationale: רָחַב expresa la dimensión transversal. 'Anchura' es el sustantivo técnico y claro en español para esta medida.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - su elevación
  lexicon: HALOT
  rationale: קֹמָה indica la dimensión vertical. 'Altura' es la equivalencia natural y precisa para un objeto.
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia del texto fuente y con la revisión más reciente: no se requieren cambios respecto del sentido base. Se preserva la unidad de medida antigua y la referencia cultual específica de הָאָרֹן.'
  spanish_consistency_notes:
  - Se mantiene 'Bezalel' como transliteración uniforme del nombre propio.
  - Se conserva 'arca' para הָאָרֹן en contexto del tabernáculo, en línea con la decisión léxica documentada en inglés POB.
  - Las medidas se expresan de forma consistente con 'codos' y fracciones simples, sin convertir a unidades modernas.
  - El registro español es formal, claro y apto para lectura pública, sin calco innecesario.
