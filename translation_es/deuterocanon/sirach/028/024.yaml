translation:
  language: es
  text: Mira[a], cerca tu propiedad con espinos; asegura tu plata y tu oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira bien»; también puede entenderse: «encierra tus posesiones con zarzas» y «asegura bien tu plata y tu oro». El griego usa una imagen concreta y proverbial para exhortar a resguardar lo valioso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδε
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira bien
  - Atiende
  lexicon: LSJ
  rationale: Es un imperativo breve de atención. «Mira» conserva la fuerza directa y natural del griego mejor que una paráfrasis más larga.
- source_word: περίφραξον
  english_pob_choice: fence in
  chosen_spanish: cerca
  alternatives_spanish:
  - cerca alrededor
  - enclose
  - rodea de cerca
  lexicon: LSJ
  rationale: El verbo expresa la idea de cercar o rodear para proteger. «Cerca» mantiene la imagen concreta en español y suena natural en un mandato.
- source_word: τὸ κτῆμά σου
  english_pob_choice: your property
  chosen_spanish: tu propiedad
  alternatives_spanish:
  - tu posesión
  - tus bienes
  - tu hacienda
  lexicon: LSJ
  rationale: κτῆμα designa lo poseído, especialmente propiedad o bienes. «Propiedad» es amplio y preciso sin caer en arcaísmo.
- source_word: ἀκάνθαις
  english_pob_choice: with thorns
  chosen_spanish: con espinos
  alternatives_spanish:
  - con espinas
  - con zarzas
  - con arbustos espinosos
  lexicon: LSJ
  rationale: El griego usa una imagen concreta y proverbial. «Espinos» reproduce bien el sustantivo plural y el valor instrumental.
- source_word: τὸ ἀργύριόν σου
  english_pob_choice: your silver
  chosen_spanish: tu plata
  alternatives_spanish:
  - tu dinero
  - tu plata acuñada
  lexicon: LSJ
  rationale: El griego dice literalmente «plata». Se conserva el metal para mantener el paralelismo con «oro» y no generalizarlo prematuramente como dinero.
- source_word: τὸ χρυσίον
  english_pob_choice: your gold
  chosen_spanish: tu oro
  alternatives_spanish:
  - tu riqueza
  - tu oro fino
  lexicon: LSJ
  rationale: El término nombra oro de manera directa. «Oro» preserva la pareja de metales preciosos y la concreción del original.
- source_word: κατάδησον
  english_pob_choice: bind up
  chosen_spanish: ata
  alternatives_spanish:
  - asegura
  - sujeta
  - vincula
  lexicon: LSJ
  rationale: El verbo implica atar o sujetar firmemente. «Ata» es breve y comunica el acto de asegurar sin añadir matices ajenos.
theological_decisions:
- issue: Carácter proverbial e imagen concreta de seguridad material
  english_pob_reading: The Greek imagery is concrete and proverbial, urging careful guarding of what is valuable.
  chosen_spanish_reading: La imagen se mantiene literal y proverbial, como una exhortación a resguardar cuidadosamente lo valioso.
  alternative_spanish_readings:
  - Es una metáfora general sobre la prudencia.
  - Es una instrucción espiritual más que material.
  rationale: No hay base en el texto para espiritualizar la orden; el valor está en la imagen concreta de protección y custodia de bienes materiales.
  doctrine_reference: Sabiduría proverbial; no se introduce una lectura doctrinal secundaria
- issue: Referencias a bienes materiales específicos
  english_pob_reading: your silver ... and your gold
  chosen_spanish_reading: tu plata ... y tu oro
  alternative_spanish_readings:
  - tu dinero ... y tu riqueza
  - tus bienes valiosos
  rationale: El griego enumera metales preciosos específicos. Mantenerlos evita diluir la precisión lexical y la fuerza paralela del proverbio.
  doctrine_reference: Precisión lexical y paralelismo poético
translation_notes:
  revision_awareness: Se sigue el texto griego de Swete 1909 y el audit trail inglés, sin cambios sustantivos respecto a la lectura aprobada. La única adaptación principal es la naturalización del imperativo inicial en español y la conservación literal de los metales preciosos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el pasaje lo requiera; aquí no aparece el nombre divino.
  - Se conserva «plata» y «oro» para respetar el paralelismo explícito del griego.
  - «Espinos» traduce el plural instrumental con una imagen natural en español.
  - No se introduce terminología eclesiástica que no está en el original.
