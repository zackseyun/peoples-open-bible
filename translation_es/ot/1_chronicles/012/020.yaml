base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/020.yaml
  text: Some from Manasseh also defected to David when he came with the Philistines against Saul for battle[a], though they did not help them, because the lords of the Philistines, after taking counsel, sent him away, saying[b], “At the cost of our heads he may defect to his master Saul.”
  footnotes:
  - marker: a
    text: Or 'fell to David' / 'joined David'; the Hebrew idiom means to go over to someone's side.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with our heads,' an idiom meaning 'at the cost of our lives' or 'to our own ruin.'
    reason: lexical_alternative
