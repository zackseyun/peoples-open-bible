  yaml_path: translation/deuterocanon/1_esdras/008/074.yaml
  text: And because of our sins and the sins of our fathers[a], we were handed over, together with our brothers, our kings, and our priests, to the kings of the earth, to the sword and captivity and plundering with shame[b], to this present day.
  footnotes:
