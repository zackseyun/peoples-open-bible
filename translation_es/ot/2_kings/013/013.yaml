translation:
  language: es
  text: Joás[a] durmió con sus padres, y Jeroboam se sentó sobre su trono. Joás fue sepultado en Samaria con los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acostó con sus padres»; el hebreo usa una fórmula convencional para la muerte de un rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: WLC/HALOT
  rationale: El hebreo usa una fórmula real convencional de muerte; en español, «durmió» conserva la imagen idiomática sin reducirla al simple «murió», y mantiene el valor narrativo de la fórmula.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: WLC/HALOT
  rationale: «Padres» refleja la fórmula tradicional y literal del hebreo. En español bíblico, «con sus padres» comunica el sentido dinástico de pertenencia a los antepasados.
- source_word: יָשַׁב עַל כִּסְאֹו
  english_pob_choice: sat on his throne
  chosen_spanish: se sentó en su trono
  alternatives_spanish:
  - tomó asiento en su trono
  - reinó en su lugar
  lexicon: WLC/HALOT
  rationale: La expresión hebrea es literalmente entronizadora. «Se sentó en su trono» preserva la imagen y comunica claramente la sucesión real.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - lo sepultaron
  lexicon: WLC/HALOT
  rationale: «Fue sepultado» es una equivalencia digna y natural en español bíblico, y conserva la pasiva del hebreo sin introducir un sujeto no expresado.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la capital de Samaria
  lexicon: WLC/HALOT
  rationale: 'La preposición locativa se traduce de manera directa y natural: «en Samaria».'
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: with the kings of Israel
  chosen_spanish: con los reyes de Israel
  alternatives_spanish:
  - entre los reyes de Israel
  - junto con los reyes de Israel
  lexicon: WLC/HALOT
  rationale: Se mantiene la fórmula hebrea con el sentido de compañía funeraria y asociación dinástica, sin suavizarla a una paráfrasis interpretativa.
theological_decisions:
- issue: Fórmula de muerte real ('slept with his fathers')
  english_pob_reading: Preserves the Hebrew idiom and its conventional narrative force rather than flattening it to 'died.'
  chosen_spanish_reading: Conservar «durmió con sus padres» mantiene el giro idiomático y la solemnidad narrativa de la noticia real.
  alternative_spanish_readings:
  - murió
  - se fue con sus padres
  rationale: No hay necesidad de desactivar la metáfora bíblica; el español entiende bien la fórmula y así se preserva la tensión entre el lenguaje figurado y su función eufemística.
  doctrine_reference: 2 Samuel 7; fórmulas narrativas reales del AT
translation_notes:
  revision_awareness: Este borrador sigue el paquete fuente en alta concordancia con la traducción inglesa auditada. No se registran revisiones aplicadas ni cambios pendientes respecto del texto base contextual.
  spanish_consistency_notes:
  - Se conserva la coordinación narrativa simple de tres cláusulas unidas por «y»/«con» para reflejar la concisión del hebreo.
  - Se usa «Y Joás» al inicio para reproducir la cadencia narrativa del original, aunque en español podría omitirse; se mantiene por fidelidad al patrón fuente.
  - Se eligió «sepultado» como equivalente culto y claro para la pasiva hebrea sin alterar el sentido ni el registro.
