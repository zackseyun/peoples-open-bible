review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido principal del hebreo y del POB inglés: inminencia temporal («Cuando esté por»), imagen concreta de «vientre», juicio divino enviado «contra él», y la metáfora de lluvia de juicio. Sin embargo, la cláusula final y la sintaxis de «hacer llover» necesitan ajuste para reflejar mejor tanto el hebreo בִּלְחוּמוֹ como el inglés auditado «rain it upon him as his food».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «lo hará llover sobre él» suena poco natural y ligeramente trabado. También conviene uniformar «alimento/comida» para una nota más idiomática. «Vientre» y «ardor de su ira» funcionan bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas clave («vientre», «ira», «contra él») son coherentes con la filosofía del POB.
  issues:
  - severity: medium
    issue: «lo hará llover sobre él» es una construcción poco natural en español bíblico moderno
    rationale: Aunque intenta reflejar el objeto directo implícito de «rain it upon him», en español fluye mejor «hará llover esto sobre él» o, más naturalmente, una reestructuración que mantenga la imagen de juicio sin sonar calcada del inglés.
  - severity: medium
    issue: La cláusula final debe reflejar mejor el valor de בִּלְחוּמוֹ como «como su comida/alimento»
    rationale: El POB inglés auditado revisó deliberadamente a «as his food». El español debe conservar esa lectura de manera clara y estrechamente ligada a la lluvia de juicio.
  - severity: low
    issue: La nota al pie usa «comida» mientras el texto usa «alimento»
    rationale: No es un error, pero conviene mayor consistencia estilística entre texto y nota, salvo que la nota preserve una alternativa claramente distinta.
  revised_spanish_text: Cuando esté por llenar su vientre[a], enviará contra él el ardor de su ira y hará llover eso sobre él como su alimento.
  revised_footnotes:
