translation:
  language: es
  text: Yo la bendeciré[a], y además te daré un hijo por medio de ella. La bendeciré, y ella vendrá a ser naciones[b]; de ella saldrán reyes de pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será madre de naciones». El hebreo dice más literalmente: «vendrá a ser/será naciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ella será naciones».'
    reason: previous_rendering
lexical_decisions:
- source_word: וּבֵרַכְתִּי / וּבֵרַכְתִּיהָ
  english_pob_choice: I will bless her / I will bless her
  chosen_spanish: Yo la bendeciré / La bendeciré
  alternatives_spanish:
  - Yo la haré fecunda
  - Yo la prosperaré
  lexicon: HALOT
  rationale: ברך en este contexto de pacto conviene rendirlo como «bendecir», porque mantiene el peso teológico de la acción divina sin sustituirlo por una paráfrasis del efecto. La repetición hebrea se conserva en español para reflejar el énfasis del original.
- source_word: וְגַם
  english_pob_choice: and moreover
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - sí, también
  lexicon: HALOT
  rationale: La partícula añade énfasis, no solo suma. «Además» transmite bien ese matiz enfático en español actual y sigue siendo natural.
- source_word: נָתַתִּי מִמֶּנָּה לְךָ בֵּן
  english_pob_choice: I will give you a son by her
  chosen_spanish: te daré por ella un hijo
  alternatives_spanish:
  - te daré un hijo de ella
  - te daré un hijo por medio de ella
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en una promesa funciona con valor futuro. «Por ella» comunica la procedencia materna sin añadir una explicación más interpretativa que el hebreo.
- source_word: וְהָיְתָה לְגוֹיִם
  english_pob_choice: she will become nations
  chosen_spanish: ella vendrá a ser naciones
  alternatives_spanish:
  - ella se convertirá en naciones
  - ella será para naciones
  - ella llegará a ser naciones
  lexicon: HALOT
  rationale: Se conserva la construcción fuerte y algo extraña del hebreo, evitando suavizarla a «madre de naciones» en el texto principal. «Vendrá a ser» mantiene el valor de devenir con mejor fluidez en español.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - naciones gentiles
  lexicon: HALOT
  rationale: גוֹיִם suele rendirse como «naciones» en contextos patriarcales de promesa. Es la equivalencia más directa y reconocible en español.
- source_word: מַלְכֵי עַמִּים
  english_pob_choice: kings of peoples
  chosen_spanish: reyes de pueblos
  alternatives_spanish:
  - reyes de naciones
  - gobernantes de pueblos
  lexicon: HALOT
  rationale: 'Se preserva la distinción del hebreo entre גוים y עמים: «naciones» y «pueblos». «Reyes de pueblos» es literal y mantiene la paralela relación con el texto fuente.'
- source_word: מִמֶּנָּה יִהְיֽוּ
  english_pob_choice: will come from her
  chosen_spanish: de ella saldrán
  alternatives_spanish:
  - serán de ella
  - procederán de ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente «serán de ella». «Saldrán de ella» expresa con naturalidad en español la idea de origen/genealogía sin perder el sentido del texto.
theological_decisions:
- issue: Promesa corporativa sobre Sara y su descendencia
  english_pob_reading: she will become nations; kings of peoples will come from her
  chosen_spanish_reading: ella vendrá a ser naciones; de ella saldrán reyes de pueblos
  alternative_spanish_readings:
  - ella será madre de naciones; de ella saldrán reyes de pueblos
  - ella se convertirá en naciones; de ella saldrán reyes de pueblos
  rationale: El hebreo expresa de forma sobria y sorprendente que de Sara surgirán entidades nacionales y realeza. Se evita añadir «madre de» al texto principal, porque aunque es una glosa legítima, no está explícita en el versículo y podría desplazar el énfasis del original.
  doctrine_reference: 'Principios de traducción POB: fidelidad semántica, no expansión explicativa sin apoyo textual'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la formulación más literal «she will become nations» se mantuvo en sentido; para el español se eligió «vendrá a ser» por ser la manera más natural de conservar esa literalidad sin introducir la paráfrasis interpretativa «madre de naciones» en el texto principal. También se preservó la repetición de «bendeciré» y la distinción entre «naciones» y «pueblos».'
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Bendecir» se conserva para ברך en coherencia con el criterio POB.
  - «Naciones» y «pueblos» se distinguen para reflejar גוים / עמים.
  - Se evita traducir con fórmulas eclesiásticas añadidas que no estén en el hebreo.
