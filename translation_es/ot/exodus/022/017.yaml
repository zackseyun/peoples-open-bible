translation:
  language: es
  text: No dejarás vivir a una hechicera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "bruja". El sustantivo hebreo es femenino singular y se refiere específicamente a una mujer que practica hechicería.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַשֵּׁפָה
  english_pob_choice: a sorceress
  chosen_spanish: una hechicera
  alternatives_spanish:
  - una bruja
  - una mujer que practica hechicería
  - una encantadora
  lexicon: HALOT
  rationale: El hebreo es femenino singular y designa a una mujer que practica hechicería o magia. En español, "hechicera" conserva el rasgo femenino y comunica con claridad el campo semántico sin cargar tan fuertemente como "bruja" con asociaciones folklóricas posteriores.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - de ningún modo
  lexicon: HALOT
  rationale: La partícula de negación se traduce de forma directa con "no"; en español legal y bíblico puede unirse naturalmente al verbo siguiente sin añadir fuerza ajena al hebreo.
- source_word: תְחַיֶּה
  english_pob_choice: you shall not let ... live
  chosen_spanish: No dejarás vivir
  alternatives_spanish:
  - No permitirás que viva
  - No la mantendrás con vida
  - No la dejarás con vida
  lexicon: HALOT
  rationale: 'El piel imperfecto 2ms de חיה tiene aquí sentido causativo: no permitir vivir / no dejar vivir. "No dejarás vivir" reproduce bien esa fuerza en español y evita importar explícitamente una fórmula judicial que el hebreo no expresa de modo literal.'
theological_decisions:
- issue: Prohibición legal y efecto penal
  english_pob_reading: Translate as a prohibition against allowing such a person to remain alive, without expanding the mechanism of punishment in the main text.
  chosen_spanish_reading: Mantener la prohibición como "No dejarás vivir" sin añadir en el texto principal una formulación explícita de pena de muerte.
  alternative_spanish_readings:
  - Debe morir
  - Será puesta a muerte
  - No la perdonarás
  rationale: El hebreo dice literalmente que no se la deje vivir, y la equivalencia óptima conserva ese alcance sin introducir en la redacción principal una frase interpretativa que no aparece en el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
- issue: Marcado de género del ofensor
  english_pob_reading: 'Render the noun as feminine singular: ''sorceress.'''
  chosen_spanish_reading: Conservar el femenino singular con "hechicera".
  alternative_spanish_readings:
  - hechicero
  - persona que practica hechicería
  rationale: La forma hebrea es inequívocamente femenina; en español conviene preservar ese rasgo para no neutralizar una marca gramatical y semántica del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo cruzado fue de alta concordancia; por eso se mantiene una traducción breve, literal en el núcleo semántico y con nota léxica solo donde el español ofrece una alternativa interpretativa relevante.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" cuando corresponda a tetragrámaton en otros versículos del proyecto; aquí no aparece.
  - Se evita "SEÑOR" porque el texto hebreo no contiene un título divino.
  - Se preserva el tono legal breve del hebreo sin añadir explicaciones en el texto principal.
  - La nota al pie cubre la alternativa lexical más relevante del sustantivo femenino.
