id: COL.1.5
reference: Colossians 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τὴν ἐλπίδα τὴν ἀποκειμένην ὑμῖν ἐν τοῖς οὐρανοῖς, ἣν προηκούσατε ἐν τῷ λόγῳ τῆς ἀληθείας τοῦ εὐαγγελίου
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/005.yaml
  text: because of the hope laid up for you in the heavens, which you heard before in the word of truth, the gospel
translation:
  language: ko
  text: 이는 하늘들[a]에 여러분을 위하여 쌓여 있는 그 소망 때문이니, 여러분은 진리의 말씀 곧 복음 안에서 그 소망을 이미 들었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하늘에」. 헬라어는 복수형 「하늘들」(οὐρανοῖς)이며, 원어 형태를 보존하기 위해 복수로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὴν ἐλπίδα
  english_pob_choice: because of the hope
  chosen_korean: 그 소망 때문이니
  alternatives_korean:
  - 그 소망 때문입니다
  - 그 소망으로 인하여
  lexicon: BDAG
  rationale: διά + 대격은 원인·근거를 나타낸다. 앞 절의 감사와 들음의 근거를 「때문이니」로 자연스럽게 연결한다.
- source_word: ἀποκειμένην
  english_pob_choice: laid up
  chosen_korean: 쌓여 있는
  alternatives_korean:
  - 예비된
  - 간직된
  lexicon: BDAG
  rationale: ἀπόκειμαι는 「보관·예비됨」을 가리킨다. 「쌓여 있는」은 한국어에서 종말론적 보존의 이미지를 자연스럽게 전달한다.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 여러분을 위해
  lexicon: BDAG
  rationale: 이익의 여격을 「~을 위하여」로 옮긴다.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_korean: 하늘들에
  alternatives_korean:
  - 하늘에
  - 하늘들 안에
  lexicon: BDAG
  rationale: 헬라어 복수형을 보존하여 영어 POB의 「the heavens」 결정을 따른다. 한국어에서 「하늘들」은 다소 낯설지만 원어 형태를 살린다.
- source_word: προηκούσατε
  english_pob_choice: you heard before
  chosen_korean: 이미 들었습니다
  alternatives_korean:
  - 미리 들었습니다
  - 앞서 들었습니다
  lexicon: BDAG
  rationale: 합성 동사 προ-ακούω의 「앞서·미리」 의미를 「이미」로 자연스럽게 살린다. 이미 복음 선포 시에 이 소망을 들었음을 강조한다.
- source_word: ἐν τῷ λόγῳ τῆς ἀληθείας
  english_pob_choice: in the word of truth
  chosen_korean: 진리의 말씀 안에서
  alternatives_korean:
  - 진리의 말씀으로
  - 진리의 메시지 안에서
  lexicon: BDAG
  rationale: 「진리의 말씀」은 한국 교회의 정립된 표현이며, λόγος의 무게를 잘 담는다.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: the gospel
  chosen_korean: 복음
  alternatives_korean:
  - 좋은 소식
  lexicon: BDAG
  rationale: 동격 속격으로 「진리의 말씀, 곧 복음」을 가리킨다. 「복음」은 정립된 한국어 어휘이다.
theological_decisions:
- issue: 복수 οὐρανοῖς의 번역
  chosen_reading: 하늘들
  alternative_readings:
  - 하늘
  rationale: 헬라어 복수형을 보존하여 원어 형태와 영어 POB의 결정을 따른다. 한국어 단수 「하늘」로의 자연화는 피한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
