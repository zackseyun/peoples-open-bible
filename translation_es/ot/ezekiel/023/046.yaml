review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: fórmula profética, mandato de hacer subir un grupo reunido, y entrega al terror/horror y al saqueo. Sin embargo, no preserva bien el cambio pronominal significativo de עֲלֵיהֶם (masc. pl.) a אֶתְהֶן (fem. pl.), ya que ''entrégalos'' cambia el referente femenino de Oholá y Oholibá a masculino. Además, en la combinación אֲדֹנָי יְהוִה, dado el estándar del proyecto para YHWH, conviene evitar ''Señor'' con mayúscula reverencial de sabor de sustitución y usar una forma más natural en español que conserve ambos elementos.'
  spanish_quality_summary: 'El español es claro y digno, pero ''Haz subir contra ellos una asamblea'' suena algo calcado. ''Haz subir contra ellas una asamblea'' conserva mejor el referente femenino y sigue siendo aceptable; también se podría usar ''haz venir'', pero no es necesario para una reparación menor. El principal ajuste requerido es pronominal: ''ellas ... entrégalas''.'
  glossary_alignment: Debe mantenerse 'Yahvé' para יהוה. Para אֲדֹנָי יְהוִה, 'el Señor Yahvé' es defendible, pero 'el Señor Dios Yahvé' añadiría un elemento no presente y 'Señor Yahvé' sin artículo suena algo brusco. Se acepta 'el Señor Yahvé' aquí. 'Asamblea', 'terror' y 'saqueo' concuerdan con el audit trail. La nota léxica sobre זַעֲוָה está bien preservada.
  issues:
  - severity: high
    issue: Desajuste de género en los pronombres
    rationale: El hebreo dice 'contra ellos' pero luego 'a ellas', reflejando que el juicio recae sobre las dos mujeres/personificaciones. 'Entrégalos' borra ese giro y cambia el referente. En español puede preservarse de forma natural con 'contra ellas ... entrégalas' o al menos 'entrégalas'.
  - severity: medium
    issue: El texto principal no preserva el referente femenino contextual
    rationale: Aunque el inglés neutraliza el género por limitaciones idiomáticas, el español sí puede expresar 'ellas'. Dado que el source evidence marca femenino explícito en אֶתְהֶן, conviene aprovechar esa capacidad del español.
  - severity: low
    issue: Ligera rigidez en 'Haz subir'
    rationale: No es incorrecto y mantiene la imagen verbal, pero suena algo literal. No exige rechazo; puede mantenerse para conservar cercanía al hebreo.
  revised_spanish_text: 'Porque así dice el Señor Yahvé: Haz subir contra ellas una asamblea, y entrégalas[a] al terror y al saqueo.'
  revised_footnotes:
  - marker: a
    text: 'O también: «al horror y al saqueo». El sustantivo hebreo זַעֲוָה puede traducirse como «horror» o «espanto», destacando que llegan a ser un objeto de pavor.'
    reason: lexical_alternative
  revision_rationale: Se corrige el referente pronominal al femenino para reflejar mejor אֶתְהֶן y el contexto de las dos mujeres simbólicas en el capítulo. Se mantiene 'el Señor Yahvé', 'asamblea', 'terror' y 'saqueo' por fidelidad al audit trail y al glosario del proyecto. La reparación es pequeña y no requiere adjudicación adicional.
