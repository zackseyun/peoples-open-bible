translation:
  language: es
  text: Entonces Moisés y Aarón fueron ante Faraón, e hicieron así, tal como Yahvé había mandado. Entonces Aarón arrojó su vara delante de Faraón y delante de sus siervos, y se convirtió en serpiente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tannin también puede referirse a una criatura semejante a un dragón o a un gran reptil; aquí probablemente designa una serpiente en esta señal ante Faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: entraron ante
  alternatives_spanish:
  - fueron
  - ingresaron ante
  - se presentaron ante
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia la presencia de Faraón; en español, «entraron ante» conserva la entrada a su presencia y funciona naturalmente con el sujeto compuesto «Moisés y Aarón».
- source_word: וַיַּעַשׂוּ כֵן
  english_pob_choice: they did so
  chosen_spanish: hicieron así
  alternatives_spanish:
  - lo hicieron así
  - así lo hicieron
  - hicieron conforme a ello
  lexicon: HALOT
  rationale: La fórmula hebrea indica obediencia exacta al mandato previo. «Hicieron así» es breve, natural y mantiene la idea de cumplimiento.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: just as Yahweh had commanded
  chosen_spanish: tal como Yahvé había mandado
  alternatives_spanish:
  - como Yahvé había mandado
  - justo como Yahvé había mandado
  - tal como Yahvé había ordenado
  lexicon: HALOT
  rationale: «Tal como» refleja la conformidad exacta del acto con el mandato. «Había mandado» conserva el valor de una instrucción previa; «mandado» es más directo que «ordenado» y encaja bien con el registro bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del texto hebreo como «Yahvé», conforme al criterio POB. No se sustituye por un título, porque el pasaje usa el Tetragrámaton de manera explícita.
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: threw down
  chosen_spanish: arrojó
  alternatives_spanish:
  - tiró
  - echó
  - lanzó
  lexicon: HALOT
  rationale: El verbo denota lanzar/arrojar. En español, «arrojó» conserva la fuerza del gesto sin añadir necesariamente la idea de descenso que ya se entiende por el contexto «delante de».
- source_word: מַטֵּהוּ
  english_pob_choice: his staff
  chosen_spanish: su vara
  alternatives_spanish:
  - su bastón
  - su cayado
  - su báculo
  lexicon: HALOT
  rationale: «Vara» es un equivalente bíblico claro y digno para el objeto de señales. Aunque «bastón» podría funcionar, «vara» mantiene mejor el tono narrativo y la función simbólica del instrumento.
- source_word: לִפְנֵי ... וְלִפְנֵי
  english_pob_choice: before ... and before
  chosen_spanish: delante de ... y delante de
  alternatives_spanish:
  - en presencia de ... y de
  - ante ... y ante
  - frente a ... y frente a
  lexicon: HALOT
  rationale: La repetición se conserva para reflejar el énfasis del hebreo en que el acto fue público, realizado ante Faraón y ante sus servidores.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus oficiales
  lexicon: HALOT
  rationale: El hebreo puede referirse a siervos/servidores de la corte. Se elige «siervos» por su fuerza lexical y por corresponder mejor al término básico del original; «servidores» queda como alternativa más idiomática en español.
- source_word: לְתַנִּין
  english_pob_choice: it became a serpent
  chosen_spanish: y se convirtió en serpiente
  alternatives_spanish:
  - y se volvió serpiente
  - y llegó a ser serpiente
  - y se hizo serpiente
  lexicon: HALOT
  rationale: «Se convirtió en serpiente» expresa el cambio de estado con claridad. «Serpiente» sigue la decisión POB para este contexto, donde el signo ante Faraón apunta a una serpiente más que a «dragón» o «gran reptil».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura POB conserva el nombre personal del pacto en vez de ocultarlo bajo un título. En español, «Yahvé» mantiene esa transparencia textual y doctrinal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תַנִּין en el signo
  english_pob_reading: serpent
  chosen_spanish_reading: serpiente
  alternative_spanish_readings:
  - dragón
  - gran reptil
  - culebra
  rationale: En este episodio, el contexto inmediato es una señal delante de Faraón; por eso «serpiente» es la opción más precisa e inteligible. Se evita «dragón» porque sobredetermina la escena, aunque el lexema tenga un rango más amplio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la trayectoria auditada en inglés: verbo de entrada colectiva, fórmula de obediencia exacta, nombre divino preservado como Yahvé, y תַנִּין traducido según el contexto narrativo como serpiente. No se detectan revisiones posteriores que obliguen a modificar la lectura base.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la repetición «delante de ... y delante de» para reflejar el énfasis del hebreo.
  - «Yahvé» se usa de manera uniforme para יְהוָה.
  - «Siervos» y «vara» siguen la terminología bíblica ya adoptada en el borrador; no se introduce la sustitución tradicional «el SEÑOR».
