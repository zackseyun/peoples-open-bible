translation:
  language: es
  text: La plata es mía, y el oro es mío[a], declara Yahvé de los Ejércitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «La plata es mía, y el oro es mío», una afirmación enfática de la posesión de ambos por parte de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: O, de manera más tradicional, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es para mí
  lexicon: HALOT
  rationale: El sufijo de primera persona singular con ל expresa posesión. En español, la forma natural y directa que conserva el énfasis posesivo es «es mío».
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata (metal)
  - la plata en dinero
  - plata
  lexicon: HALOT
  rationale: En este paralelo con «el oro», el sentido material del metal precioso es el más probable. «La plata» preserva la concreción y el paralelismo sin introducir la idea de dinero.
- source_word: וְלִי
  english_pob_choice: and ... is mine
  chosen_spanish: y ... es mío
  alternatives_spanish:
  - y me pertenece
  - y también es mío
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del hebreo, que subraya que ambos metales están explícitamente reclamados por Yahvé.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Se traduce de manera simple como el metal precioso correspondiente, manteniendo el paralelo con «la plata».
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: En fórmulas proféticas, este sustantivo funciona idiomáticamente como introducción de una declaración solemne. «Declara» conserva el tono formal sin arcaísmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino transliterado según el criterio del proyecto, en lugar de sustituirlo por un título como «SEÑOR», para preservar el nombre personal del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: El título expresa la idea de ejércitos/huestes. «De los Ejércitos» comunica el sentido semántico con claridad en español contemporáneo y conserva el carácter soberano y marcial del título.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide rendirlo como «Yahvé» para preservar el nombre del Dios del pacto y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Rendición del título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: La expresión combina el nombre divino con un título de soberanía militar. «De los Ejércitos» traduce el valor semántico de צְבָאוֹת de forma clara y evita el tradicionalismo opaco de «de los ejércitos/huestes» solo por costumbre.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6; contested terms for יְהוָה
translation_notes:
  revision_awareness: La revisión más reciente del expediente indica que no hubo cambios necesarios; el borrador español sigue la lectura estable y alta concordancia del audit trail, manteniendo la doble repetición posesiva y la fórmula profética sin suavizar la afirmación de propiedad divina.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la paralelismo «la plata / el oro» y la repetición «es mío» para reflejar la fuerza enfática del hebreo.
  - «De los Ejércitos» se usa como equivalente transparente de צְבָאוֹת, sin recurrir a «huestes» salvo como alternativa anotada.
