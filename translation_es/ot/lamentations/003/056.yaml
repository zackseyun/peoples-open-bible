    issue: «no ocultes tu oído de...» es poco natural en español
    rationale: Aunque intenta reflejar literalmente la construcción hebrea, en español suena forzado. Una formulación como «no escondas tu oído ante...» preserva la metáfora y mejora la dignidad y claridad.
  - severity: medium
    issue: «clamor de ayuda» no reproduce con naturalidad «cry for help»
    rationale: En español amplio es más idiomático «clamor por ayuda» o «clamor por socorro». La preposición «de» aquí puede sugerir cualidad más que finalidad o contenido.
  - severity: low
    issue: La revisión inglesa documentó «plea for relief», no solo «cry for relief»
    rationale: El español «clamor por alivio» es aceptable, pero «súplica por alivio» refleja mejor la matización introducida en el historial de auditoría inglés.
