  to: Por tanto, el rey[a], un Fálaris en todo, lleno de irracionalidad y teniendo por nada los cambios[b] del alma que se producían en él respecto a la supervisión de los judíos, haciendo firmemente un juramento completísimo, de que sin demora enviaría a estos hombres al Hades[c], mutilados en rodillas y pies por las bestias,
