revisions:
- from: Y los magos no pudieron mantenerse en pie delante de Moisés a causa de los forúnculos[a], porque los forúnculos estaban en los magos y en todo Egipto.
  to: Y los magos no pudieron estar de pie delante de Moisés a causa de los forúnculos,[a] porque los forúnculos estaban sobre los magos y sobre todos los egipcios.
  rationale: La revisión alinea el español con la decisión auditada del POB inglés al hacer explícito el referente personal de וּבְכָל מִצְרַיִם en el texto principal y reservar la literalidad para la nota. También suaviza 'mantenerse en pie' a 'estar de pie', más cercano al hebreo idiomático, y mejora la naturalidad corporal con 'sobre los magos'.
