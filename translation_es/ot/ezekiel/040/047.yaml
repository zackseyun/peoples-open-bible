lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Luego midió
  alternatives_spanish:
  - Y midió
  - Entonces midió
  lexicon: HALOT
  rationale: El verbo מדד expresa medir; en español, «luego» conserva la progresión narrativa del waw consecutivo sin sonar forzado. El sujeto implícito se mantiene como en el hebreo y en la tradición del pasaje.
- source_word: הֶחָצֵר
  english_pob_choice: the court
  chosen_spanish: el atrio
  alternatives_spanish:
  - el patio
  - la corte
  lexicon: HALOT
  rationale: חָצֵר puede ser «court/courtyard». En español bíblico, «atrio» es natural para un recinto del templo y mantiene el sentido arquitectónico de un espacio cercado. «Patio» sería posible, pero menos preciso en este contexto cultual.
- source_word: אֹרֶךְ מֵאָה אַמָּה
  english_pob_choice: one hundred cubits long
  chosen_spanish: cien codos de largo
  alternatives_spanish:
  - una longitud de cien codos
  - cien codos de longitud
  lexicon: HALOT
  rationale: La frase dimensional se vierte de forma natural en español con sustantivo + medida. Se conserva «codos» para no convertir la unidad ni diluir la correspondencia léxica.
- source_word: וְרֹחַב מֵאָה אַמָּה
  english_pob_choice: and one hundred cubits wide
  chosen_spanish: y cien codos de ancho
  alternatives_spanish:
  - y una anchura de cien codos
  - y cien codos de anchura
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la medida anterior y el valor arquitectónico de רֹחַב como anchura. «De ancho» es idiomático y fiel.
- source_word: מְרֻבָּעַת
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - de cuatro lados
  - cuadrada
  lexicon: HALOT
  rationale: El participio pasivo indica forma cuadrada. En español, «cuadrado» funciona como predicativo breve y claro; aunque el antecedente inmediato es «atrio», la forma masculina concuerda con el uso sustantivado de la medida/recinto en español bíblico.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Es la correspondencia estándar de מִזְבֵּחַ en contexto cultual.
- source_word: לִפְנֵי הַבָּיִת
  english_pob_choice: before the house
  chosen_spanish: delante de la casa
  alternatives_spanish:
  - frente a la casa
  - ante la casa
  lexicon: HALOT
  rationale: Se conserva la relación espacial de לִפְנֵי con una preposición natural en español. Se evita «templo» porque el texto hebreo dice literalmente «casa», y el audit trail inglés revisó la decisión para acercarse más a la correspondencia léxica.
theological_decisions:
- issue: Referencia de הַבָּיִת en la visión
  english_pob_reading: house refers to the temple building in Ezekiel's vision
  chosen_spanish_reading: casa se entiende como la construcción del templo en la visión de Ezequiel
  alternative_spanish_readings:
  - templo
  - edificio del templo
  rationale: La frase hebrea es literalmente «la casa», pero el contexto de la visión muestra que se trata del edificio del templo. En español se mantiene «casa» en el texto principal por fidelidad léxica, y la referencia se deja implícita como en el hebreo; la nota aclara el alcance contextual.
  doctrine_reference: Ez 40:47; uso contextual de בַּיִת en la visión del templo
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió «house/casa» frente a «temple/templo» para mayor correspondencia léxica con הַבָּיִת, sin alterar la descripción arquitectónica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «codos» para la unidad de medida, en paralelo con la decisión inglesa de conservar «cubits».
  - Se usa «atrio» como término cultual de recinto, coherente con el valor arquitectónico de הֶחָצֵר.
  - Se conserva la distinción entre la forma literal «casa» en el texto y su referencia contextual al templo en la nota.
  - No se introduce vocabulario litúrgico ajeno al hebreo del versículo.
