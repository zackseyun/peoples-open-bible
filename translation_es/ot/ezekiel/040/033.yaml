    reason: lexical_alternative
  - marker: b
    text: O «jambas» o «pilastras» para «pilares laterales». El término hebreo arquitectónico es difícil y puede referirse a miembros estructurales del acceso.
    reason: lexical_alternative
  - marker: c
    text: O «vestíbulo» o «porche» para «pórtico».
    reason: lexical_alternative
  revision_rationale: Se revisó la cláusula de las ventanas para eliminar el pronombre «él», que en español resulta poco fiel y poco natural en este contexto arquitectónico, y para expresar con claridad que las ventanas pertenecían a la estructura y a sus pilares laterales. También se cambió «postes» por «pilares laterales» para alinearse mejor con la decisión léxica documentada de la POB inglesa para אַיִל, y se reemplazó «alrededor, alrededor» por «por todo alrededor», que conserva la fuerza de סָבִיב סָבִיב con español más idiomático. Además, se restauraron en notas las alternativas léxicas significativas que la auditoría inglesa preserva para «side pillars» y «portico».
