translation:
  language: es
  text: Y además de esto, el rey se quedaba mirándola con la boca abierta; y si ella se reía de él[a], él se reía; pero si se ofendía con él, la halagaba para que se reconciliara con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si ella se reía con él, él se reía». El dativo griego con «se reía» admite más de una relación posible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς τούτοις
  english_pob_choice: besides this
  chosen_spanish: y además de esto
  alternatives_spanish:
  - además
  - aparte de esto
  lexicon: LSJ
  rationale: La función es claramente aditiva y enlaza una observación más en la argumentación; «y además de esto» conserva ese valor con naturalidad en español.
- source_word: χάσκων τὸ στόμα
  english_pob_choice: stared at her with his mouth open
  chosen_spanish: la miraba con la boca abierta
  alternatives_spanish:
  - la contemplaba con la boca abierta
  - la miraba boquiabierto
  lexicon: LSJ
  rationale: La imagen griega es vívida y corporal. «Con la boca abierta» reproduce el gesto sin endurecer el español con un calco excesivo.
- source_word: ἐθεώρει
  english_pob_choice: stared at
  chosen_spanish: la miraba
  alternatives_spanish:
  - la observaba
  - la contemplaba
  lexicon: BDAG
  rationale: En combinación con χάσκων τὸ στόμα, el verbo expresa una mirada sostenida y atenta; en español, «miraba» mantiene el flujo natural, reforzado por la imagen anterior.
- source_word: ἐὰν γελάσῃ αὐτῷ, γελᾷ
  english_pob_choice: if she laughs at him, he laughs
  chosen_spanish: si ella se reía con él, él se reía
  alternatives_spanish:
  - si ella se reía de él, él se reía
  - si ella le sonríe, él sonríe
  lexicon: BDAG
  rationale: El dativo permite más de una lectura; el POB inglés dejó abierta la posibilidad y aquí se opta por «con él» para evitar una carga innecesariamente hostil de «de él/contra él», manteniendo la reciprocidad del gesto y la ambigüedad relacional.
- source_word: πικρανθῇ ἐπʼ αὐτόν
  english_pob_choice: is offended with him
  chosen_spanish: se amargaba contra él
  alternatives_spanish:
  - se ofendía con él
  - se irritaba contra él
  - se entristecía por él
  lexicon: BDAG
  rationale: πικραίνω puede expresar amargarse u ofenderse. «Se amargaba contra él» conserva la fuerza afectiva negativa del griego y evita suavizar demasiado el término.
- source_word: κολακεύει αὐτὴν
  english_pob_choice: he flatters her
  chosen_spanish: la halagaba
  alternatives_spanish:
  - la adulaba
  - la lisonjeaba
  lexicon: LSJ
  rationale: «Halagaba» comunica el acto de ganarse el favor de alguien con un matiz menos arcaico que «adulaba», y preserva el desequilibrio de poder del contexto.
- source_word: ὅπως διαλλαγῇ αὐτῷ
  english_pob_choice: so that she may be reconciled to him
  chosen_spanish: para que se reconciliara con él
  alternatives_spanish:
  - para que se hiciera de nuevo su amiga
  - para que quedara en paz con él
  lexicon: BDAG
  rationale: La construcción final es claramente relacional y teleológica. «Reconciliara» mantiene el sentido de restauración de relación, como en la lectura inglesa del POB.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés del POB, que ya identifica la ambigüedad del dativo en el segmento de la risa y conserva la imagen corporal de la mirada; no se introdujeron cambios textuales respecto del sentido base, solo ajustes para un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la tensión semántica del pasaje entre risa recíproca y posible ofensa/amargura, sin resolverla de forma interpretativa.
  - «Reconciliara» se eligió por su valor relacional y por coherencia con el inglés auditado del POB.
