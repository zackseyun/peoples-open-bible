translation:
  language: es
  text: Él hizo lo malo[a] ante los ojos de Yahvé, tal como había hecho Manasés su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en los ojos de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - E hizo
  lexicon: HALOT
  rationale: El verbo עשה se expresa de forma simple con «hizo». En español, el waw consecutivo no exige conservar explícitamente una conjunción inicial; se mantiene el avance narrativo de manera natural.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La construcción hebrea con artículo funciona idiomáticamente como un sustantivo definido. «Lo malo» conserva el valor evaluativo sin forzar una paráfrasis más larga.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de evaluación. «Ante los ojos de Yahvé» es natural en español y mantiene la imagen de juicio o valoración divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: «Tal como» transmite de manera clara la comparación entre la conducta del hijo y la del padre.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto en español expresa con precisión que la acción de Manasés antecede a la del hijo en la narración.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: HALOT
  rationale: Se usa la forma bíblica castellana estándar del nombre propio, ampliamente reconocible y adecuada para lectura eclesial.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  lexicon: HALOT
  rationale: El posesivo español comunica de forma directa el sufijo pronominal hebreo sin añadir elementos innecesarios.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto pide trasladar el Tetragrámaton como nombre propio divino. «Yahvé» preserva ese valor personal y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto fuente y la traducción inglesa están en alto acuerdo; no hay revisiones aplicadas en el audit trail reciente, así que la versión española sigue la lectura estable sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Lo malo» preserva la carga valorativa del idiomático hebreo sin sonar artificial.
  - 'Se conserva la relación temporal con pluscuamperfecto: la acción de Manasés precede a la del sujeto del versículo.'
