  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido básico del hebreo: la venida de Yahvé, la repetición enfática de ''porque viene'', el juicio universal de la tierra/el mundo, y el cierre con ''su fidelidad''. Sin embargo, las notas al pie no siguen fielmente la pista de auditoría inglesa: la nota [a] está anclada en ''Yahvé'' pero comenta la repetición verbal; la nota [b] introduce una explicación nueva sobre ''mundo'' frente a ''tierra'' que no corresponde a una alternativa preservada en el inglés; y falta la alternativa para ''los pueblos''/''las naciones'' y para ''su fidelidad''/''su verdad''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Delante de Yahvé... porque viene... Juzgará el mundo con justicia, y a los pueblos con su fidelidad' fluye bien y suena eclesialmente legible. El único problema importante es de aparato crítico y anclaje de notas, no de legibilidad principal.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> ''Yahvé''; שׁפט -> ''juzgar''; תבל -> ''mundo''; אֱמוּנָה -> ''fidelidad''. La elección ''justicia'' para בְּצֶדֶק es aceptable en contexto judicial, aunque el inglés POB preservó la alternativa ''truth'' para otro término y ''nations'' para עמים; esas alternativas deben reflejarse en notas españolas donde corresponde.'
  issues:
