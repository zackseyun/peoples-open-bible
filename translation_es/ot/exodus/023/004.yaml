revisions:
- from: Si encuentras el buey de tu enemigo o su asno extraviándose[a], sin falta se lo devolverás.
  to: Si encuentras el buey de tu enemigo o su asno andando perdido[a], deberás devolvérselo sin falta.
  rationale: Se hace un ajuste menor de estilo para reflejar con mayor naturalidad el participio hebreo de animal errante y para expresar de forma más idiomática en español la orden enfática de devolución, sin alterar el sentido ni las decisiones teológicas/lexicales centrales.
