- from: Así que tomé las dos tablas, las arrojé de mis dos manos y las hice pedazos delante de ustedes.
  to: Así que agarré las dos tablas, las arrojé de mis dos manos y las hice pedazos[a] ante sus ojos.
  rationale: Se ajusta 'tomé' a 'agarré' para reflejar mejor el acto físico de asir; se cambia 'delante de ustedes' por 'ante sus ojos' para reproducir con mayor precisión el modismo visual hebreo; y se añade una nota léxica para preservar la alternativa más simple del verbo 'romper/quebrar', en línea con la auditoría inglesa.
