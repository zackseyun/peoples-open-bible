    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el análisis fuente del borrador pero mejora la precisión y la naturalidad: se conserva la mirada dirigida al hogar del hombre, se añade la nota léxica de οἶκος documentada en inglés, se suaviza el símil en español con ''una serpiente'' y se hace más idiomática la expresión recíproca ''de unos y otros''.'
