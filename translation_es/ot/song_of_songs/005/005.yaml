translation:
  language: es
  text: Me levanté para abrir a mi amado, y mis manos destilaron mirra; mis dedos, mirra fluida[a], sobre las manijas del cerrojo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mirra líquida' o 'mirra que fluye' para 'mirra fluida'.
    reason: lexical_alternative
  - marker: b
    text: O 'las manijas del cierre' o 'el pestillo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַמְתִּי אֲנִי
  english_pob_choice: I arose
  chosen_spanish: Me levanté
  alternatives_spanish:
  - Me alzé
  - Me puse de pie
  - Me levanté yo
  lexicon: HALOT
  rationale: קַמְתִּי es perfecto qal 1cs de קום con pronombre explícito para énfasis. 'Me levanté' conserva el sentido de acción realizada y el tono literario sin resultar arcaico en español.
- source_word: לִפְתֹּחַ
  english_pob_choice: to open
  chosen_spanish: para abrir
  alternatives_spanish:
  - a abrir
  - con el fin de abrir
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito de la acción. 'Para abrir' es la construcción natural en español y mantiene la relación final.
- source_word: לְדוֹדִי
  english_pob_choice: to my beloved
  chosen_spanish: a mi amado
  alternatives_spanish:
  - para mi amado
  - a mi amado
  lexicon: HALOT
  rationale: דּוֹד en Cantar de los Cantares designa al amado/pretendiente. 'Amado' es una forma natural y digna en español; se conserva el valor relacional del texto.
- source_word: יָדַי נָטְפוּ מוֹר
  english_pob_choice: my hands dripped with myrrh
  chosen_spanish: mis manos destilaron mirra
  alternatives_spanish:
  - mis manos goteaban mirra
  - mis manos rezumaron mirra
  lexicon: HALOT
  rationale: נָטְפוּ significa 'gotear, destilar'. 'Destilaron mirra' mantiene la imagen líquida y el matiz poético mejor que una traducción más plana.
- source_word: אֶצְבְּעֹתַי
  english_pob_choice: my fingers
  chosen_spanish: mis dedos
  alternatives_spanish:
  - mis dedos de la mano
  - mis falanges
  lexicon: HALOT
  rationale: La equivalencia normal de אֶצְבְּעֹתַי es 'mis dedos'. En español no hace falta una precisión anatómica adicional.
- source_word: מוֹר עֹבֵר
  english_pob_choice: flowing myrrh
  chosen_spanish: mirra fluida
  alternatives_spanish:
  - mirra que fluye
  - mirra líquida
  - mirra corriente
  lexicon: HALOT
  rationale: עֹבֵר aquí conserva la idea de algo que pasa o fluye. 'Mirra fluida' reproduce la cualidad del sustantivo en forma compacta y poética; 'mirra líquida' es una alternativa válida pero menos literaria.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición indica contacto o ubicación respecto del herraje. 'Sobre' comunica bien la relación espacial en español.
- source_word: כַּפּוֹת
  english_pob_choice: handles
  chosen_spanish: las aldabas
  alternatives_spanish:
  - los mangos
  - las manijas
  - las placas
  lexicon: HALOT
  rationale: En este contexto arquitectónico, כַּפּוֹת no debe leerse como 'palmas' sino como partes del herraje. 'Aldabas' es una solución española clara para un elemento de puerta asociado al cierre.
- source_word: הַמַּנְעוּל
  english_pob_choice: the bolt
  chosen_spanish: el cerrojo
  alternatives_spanish:
  - el cierre
  - la tranca
  - el pestillo
  lexicon: HALOT
  rationale: מַנְעוּל denota un dispositivo de cierre/seguro. 'Cerrojo' capta bien el sentido de una pieza de cierre antigua y es más natural que 'lock' o 'candado' en español.
translation_notes:
  revision_awareness: El inglés POB mantiene la imagen sensorial de perfume que impregna las manos y los dedos, y distingue entre la sustancia normal 'myrrh' y 'flowing myrrh'. Esta versión española conserva esa distinción con 'mirra' y 'mirra fluida', y refleja el herraje de la puerta con un par léxico español natural ('aldabas' / 'cerrojo') sin depender de un calco mecánico del inglés.
  spanish_consistency_notes:
  - Se preservó el paralelismo de 'mis manos' / 'mis dedos'.
  - Se mantuvo la ambigüedad controlada de מוֹר עֹבֵר mediante una nota de alternativa.
  - El orden general sigue el hebreo y el inglés auditado, pero con sintaxis española fluida.
  - '''Amado'' se usa como equivalente de דּוֹד en el contexto erótico-poético de Cantar de los Cantares.'
