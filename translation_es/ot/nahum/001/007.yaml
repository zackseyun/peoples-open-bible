translation:
  language: es
  text: Yahvé es bueno, una fortaleza[a] en el día de angustia[b]; conoce a los que se refugian en él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un refugio» o «una fortaleza» para «una fortaleza segura»/«baluarte»; el hebreo se refiere a un lugar de protección o defensa.
    reason: lexical_alternative
  - marker: b
    text: O «en el día de problema» o «en un día de angustia».
    reason: lexical_alternative
  - marker: c
    text: O «los que confían en él». El hebreo habla más literalmente de refugiarse en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benigno
  - bondadoso
  lexicon: HALOT
  rationale: «Bueno» reproduce de forma natural y concisa la afirmación de carácter que el hebreo hace de Yahvé. Mantiene el valor moral y benefactor sin cargar el texto con una explicación que el versículo no expresa explícitamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino, no con una sustitución litúrgica. «Yahvé» es la forma estable del proyecto en español y preserva el nombre personal revelado a Israel.
- source_word: לְמָעוֹז
  english_pob_choice: a stronghold
  chosen_spanish: una fortaleza
  alternatives_spanish:
  - un refugio
  - una plaza fuerte
  lexicon: HALOT
  rationale: «מָעוֹז» designa un lugar de defensa o seguridad. En español, «fortaleza» conserva bien la imagen concreta y resulta idiomática; además mantiene la cercanía semántica con la idea de protección que sigue en el verso.
- source_word: בְּיוֹם צָרָה
  english_pob_choice: in the day of distress
  chosen_spanish: en el día de angustia
  alternatives_spanish:
  - en el día de dificultad
  - en el día de aflicción
  lexicon: HALOT
  rationale: La frase temporal se entiende de modo general, no como un día técnico escatológico. «Angustia» comunica la presión y aflicción de צָרָה con un registro bíblico natural en español, sin exagerar ni suavizar el sentido.
- source_word: וְיֹדֵעַ
  english_pob_choice: he knows
  chosen_spanish: conoce
  alternatives_spanish:
  - y conoce
  - reconoce
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa conocimiento personal con implicación relacional. En español, «conoce» conserva ese núcleo semántico sin convertirlo en una paráfrasis como «cuida de» o «se preocupa por».
- source_word: חֹסֵי בּוֹ
  english_pob_choice: those who take refuge in him
  chosen_spanish: los que se refugian en él
  alternatives_spanish:
  - los que buscan refugio en él
  - los que confían en él
  lexicon: HALOT
  rationale: El participio de חסה apunta a la imagen de buscar amparo/protección. «Se refugian en él» preserva la metáfora de abrigo seguro y encaja bien con «fortaleza», mejor que una equivalencia más abstracta como «confían en él».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el nombre del pacto. La versión española debe mantener ese nombre propio para no ocultar la referencia personal del original ni sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בְּיוֹם צָרָה
  english_pob_reading: 'generic temporal sense: in the day of distress'
  chosen_spanish_reading: 'sentido temporal general: en el día de angustia'
  alternative_spanish_readings:
  - en un día de angustia
  - en el día de tribulación
  rationale: Nada en el versículo obliga a leer una referencia escatológica técnica. La traducción conserva el valor temporal general y evita introducir una lectura doctrinal que el hebreo no exige.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no se registran cambios aplicados y el control cruzado informó alta concordancia. Esta redacción conserva ese acuerdo y ajusta la salida al español con la misma línea lexical y teológica del audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto en español.
  - Se conserva la imagen de refugio/fortaleza sin desplazarla por un lenguaje más abstracto.
  - «Angustia» traduce צָרָה con registro bíblico natural en español, sin convertir el texto en una fórmula técnica.
  - 'La última cláusula preserva el paralelismo de protección personal: conocer a los que buscan amparo en él.'
