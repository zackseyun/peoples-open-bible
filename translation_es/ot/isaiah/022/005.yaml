translation:
  language: es
  text: Porque es un día de tumulto, de pisoteo y de confusión, de parte del Señor Yahvé de los Ejércitos[a], en el Valle de la Visión, derribo[b] del muro y clamor hacia el monte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el Señor Yahvé de los Ejércitos» o «perteneciente al Señor Yahvé de los Ejércitos»; la preposición hebrea puede marcar relación/posesión además de procedencia.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «derribo del muro»; la forma verbal es difícil y también puede entenderse como «quebrantamiento» o «demolición».'
    reason: lexical_alternative
  - marker: c
    text: O «y clamor hacia el monte».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del juicio anunciado; en español, «Porque» mantiene la relación discursiva sin sonar mecánico.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: Equivalente directo y natural en el registro profético.
- source_word: מְהוּמָה
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - confusión
  lexicon: HALOT
  rationale: Conserva la idea de agitación pública y ruido de desastre; «tumulto» encaja bien con la serie de calamidades.
- source_word: מְבוּסָה
  english_pob_choice: trampling
  chosen_spanish: atropello
  alternatives_spanish:
  - pisoteo
  - trampeo
  lexicon: HALOT
  rationale: La imagen es de aplastamiento o treading down. «Atropello» comunica violencia y abatimiento en español sin perder la fuerza de la acción.
- source_word: מְבוּכָה
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - perplejidad
  - desorden
  lexicon: HALOT
  rationale: Es la opción más natural para el estado de desorientación que completa la tríada de juicio.
- source_word: לַאדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: from the Lord GOD of Armies
  chosen_spanish: de parte de Yahvé, el Señor de los Ejércitos
  alternatives_spanish:
  - para Yahvé, el Señor de los Ejércitos
  - perteneciente a Yahvé, el Señor de los Ejércitos
  lexicon: HALOT
  rationale: El ל puede indicar relación, posesión o procedencia. En este contexto de juicio, «de parte de» comunica mejor la fuente/agencia implícita. Se conserva «Yahvé» para יְהוָה según la norma del proyecto, y «Señor de los Ejércitos» para צְבָאוֹת como traducción semántica inteligible.
- source_word: בְּגֵיא חִזָּיוֹן
  english_pob_choice: in the Valley of Vision
  chosen_spanish: en el Valle de la Visión
  alternatives_spanish:
  - en el valle de la visión
  lexicon: HALOT
  rationale: Mantiene el nombre de lugar/título de forma literal y reconocible; la mayúscula en términos geográficos funciona como designación fija.
- source_word: מְקַרְקַר
  english_pob_choice: a battering down
  chosen_spanish: derribo
  alternatives_spanish:
  - demolición
  - derrumbamiento
  lexicon: HALOT
  rationale: La forma es difícil; en contexto expresa acción destructiva sobre una fortificación. «Derribo» conserva la fuerza verbal dentro de una construcción nominal natural en español.
- source_word: קִיר
  english_pob_choice: the wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - la muralla
  lexicon: HALOT
  rationale: Aunque el inglés eligió «wall», en español «muro» resulta más natural para una estructura defensiva; evita un calco rígido y mantiene el sentido de fortificación atacada.
- source_word: וְשׁוֹעַ
  english_pob_choice: and a cry
  chosen_spanish: y clamor
  alternatives_spanish:
  - y grito
  - y alarido
  lexicon: HALOT
  rationale: Sustantivo de clamor/u outcry; «clamor» preserva el tono profético y puede abarcar la fuerza colectiva del grito.
- source_word: אֶל הָהָר
  english_pob_choice: to the mountain
  chosen_spanish: hacia el monte
  alternatives_spanish:
  - al monte
  - a la montaña
  lexicon: HALOT
  rationale: «Hacia» expresa mejor la dirección del movimiento/clamor que un simple «a». «Monte» suena más bíblico y conserva el paralelismo imagístico.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: the Lord GOD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: Se sigue la norma del proyecto de traducir directamente el nombre divino como «Yahvé» en lugar de ocultarlo con una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לַאדֹנָי יְהוִה צְבָאוֹת
  english_pob_reading: from the Lord GOD of Armies
  chosen_spanish_reading: de parte de Yahvé, el Señor de los Ejércitos
  alternative_spanish_readings:
  - para Yahvé, el Señor de los Ejércitos
  - perteneciente a Yahvé, el Señor de los Ejércitos
  rationale: La preposición ל permite matices de relación/posesión además de procedencia. Dado el contexto de juicio, la lectura de procedencia/agencia es la más clara en español, pero se preserva la nota de ambigüedad semántica en la redacción de la decisión.
  doctrine_reference: HALOT; audit trail of English POB footnote a
- issue: Valor de מְקוַרְקַר קִיר
  english_pob_reading: a battering down of the wall
  chosen_spanish_reading: derribo de muro
  alternative_spanish_readings:
  - derribo de la muralla
  - demolición del muro
  rationale: La forma verbal es incierta y el inglés ya documenta la dificultad. En español se mantiene una solución nominal sobria que no resuelve indebidamente la ambigüedad, pero sí comunica destrucción estructural.
  doctrine_reference: HALOT; audit trail of English POB footnote b
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no fueron necesarios cambios adicionales; esta propuesta mantiene el acuerdo alto del control cruzado y conserva las dos ambigüedades relevantes del hebreo: la preposición ל en לַאדֹנָי y la forma difícil מְקַרְקַר.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como «los Ejércitos» para preservar el valor semántico sin transliteración.
  - Se conserva la secuencia de tres desastres con sustantivos coordinados en español.
  - «Monte» se usa para mantener un tono bíblico y la dirección final del clamor.
  - La puntuación refleja una sola oración profética con inciso locativo y cierre nominal.
