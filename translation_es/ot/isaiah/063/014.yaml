- from: Como ganado que desciende al valle, el Espíritu de Yahvé les dio descanso; así guiaste a tu pueblo, para hacerte un nombre glorioso.
  to: Como el ganado que baja al valle[a], el Espíritu de Yahvé les dio descanso; así condujiste a tu pueblo, para hacerte un nombre glorioso[b].
  rationale: Se añaden las notas léxicas significativas preservadas por el POB inglés. También se suaviza la redacción a un español más natural con «el ganado que baja al valle» y se ajusta «guiaste» a «condujiste» para reflejar mejor נִהַגְתָּ. Se mantiene «les dio descanso» conforme a la revisión inglesa ya adoptada en el borrador.
