translation:
  language: es
  text: Cántico de ascensos. De David[a]. Yahvé, mi corazón no se ha enaltecido, ni se han alzado mis ojos; ni he andado en asuntos grandes ni en cosas demasiado maravillosas para mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David» o «Para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «más allá de mí». La expresión hebrea se refiere a asuntos que exceden el lugar o la capacidad debidos al hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלֹות
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascenso
  alternatives_spanish:
  - Cántico de ascensos
  - Canto de ascenso
  - Canto de las subidas
  lexicon: שִׁיר; מַעֲלָה
  rationale: El hebreo funciona como encabezado técnico del Salterio; en español, «cántico» conserva el registro literario y «de ascenso» refleja el valor del término sin forzar una paráfrasis. Se evita «ascensos» en plural porque aquí el sintagma se entiende mejor como título fijo de serie.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - De parte de David
  lexicon: לְ + personal name
  rationale: La preposición hebrea admite varias relaciones; «De David» mantiene la ambigüedad auditada por la POB inglesa entre autoría, asociación o dedicación, sin decidir más de lo que el encabezado permite.
- source_word: יְהוָה
  english_pob_choice: YHWH (rendered as divine name in context)
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: יהוה
  rationale: Se mantiene el nombre divino explícito según la norma del proyecto. Aunque en un encabezado poético no aparece una sustitución pronominal, la forma «Yahvé» preserva la identificación del Tetragrámaton sin ocultarlo.
- source_word: לֹא גָבַהּ לִבִּי
  english_pob_choice: my heart was not haughty / lifted up
  chosen_spanish: mi corazón no fue soberbio
  alternatives_spanish:
  - mi corazón no se enalteció
  - mi corazón no fue altivo
  - mi corazón no se hizo presumido
  lexicon: גבה + לב
  rationale: «Soberbio» transmite el valor moral de la elevación del corazón con naturalidad en español. «Fue soberbio» evita un calco demasiado literal y conserva el juicio de humildad del hebreo.
- source_word: וְלֹא רָמוּ עֵינַי
  english_pob_choice: my eyes were not lofty / haughty
  chosen_spanish: ni se enaltecieron mis ojos
  alternatives_spanish:
  - ni se levantaron mis ojos
  - ni fueron altaneros mis ojos
  - ni se alzaron mis ojos con orgullo
  lexicon: רום + עין
  rationale: La imagen hebrea de ojos levantados expresa arrogancia; «se enaltecieron mis ojos» mantiene la metáfora corporal y su fuerza ética. «Altaneros» sería comprensible, pero menos cercano a la imagen original.
- source_word: וְלֹא הִלַּכְתִּי
  english_pob_choice: and I have not walked
  chosen_spanish: ni caminé
  alternatives_spanish:
  - ni he andado
  - ni me conduje
  - ni anduve
  lexicon: הלך
  rationale: En el paralelismo poético, «caminé» comunica la conducta vital sin añadir matices no explicitados. Se evita un perfecto compuesto porque el hebreo aquí presenta una afirmación de conducta característica.
- source_word: בִּגְדֹלוֹת וּבְנִפְלָאוֹת מִמֶּנִּי
  english_pob_choice: in great matters and in things too wonderful for me / beyond me
  chosen_spanish: en asuntos grandes y en cosas demasiado maravillosas para mí[a]
  alternatives_spanish:
  - en grandes cosas y en cosas maravillosas más allá de mí
  - en cosas grandes y en maravillas que me exceden
  lexicon: גדולות; נפלאות; מן + pronominal suffix
  rationale: 'La primera mitad conserva la amplitud de «asuntos grandes»; la segunda refleja la tensión entre maravilla y límite personal. Se integra la nota textual/lexical de la POB inglesa: el sentido es aquello que excede la esfera o capacidad del hablante.'
theological_decisions:
- issue: Humildad y rechazo de la autosuficiencia en el salmo
  english_pob_reading: The speaker denies pride and refusing to occupy what is beyond his proper place or capacity.
  chosen_spanish_reading: El hablante niega la soberbia y el afán de ocuparse de cosas que lo rebasan.
  alternative_spanish_readings:
  - El hablante niega la altivez y la pretensión de abarcar lo que no le corresponde.
  - El hablante niega la arrogancia y el meterse en asuntos que están más allá de él.
  rationale: El hebreo encadena corazón, ojos y conducta para expresar una postura integral de humildad. La traducción española debe conservar tanto el aspecto moral como el de límite de capacidad; por eso se evita reducir el versículo solo a modestia interior o solo a prudencia práctica.
  doctrine_reference: Humildad bíblica; límites de la criatura ante Dios (cf. Pr 3:7; Ro 12:3).
translation_notes:
  revision_awareness: No se aplicaron revisiones al texto fuente en el último pase registrado; el estado de revisión indica que no había cambios necesarios. La presente propuesta conserva esa lectura estable y resuelve solo la presentación española y sus notas auditables.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme a la terminología del proyecto.
  - Se conserva la ambigüedad de לְדָוִד con «De David», apoyada por nota.
  - El título poético se vierte como encabezado conciso y no como oración completa.
  - La nota [a] se ancla en el sintagma final y recoge la alternativa semántica documentada en la POB inglesa.
  - El estilo general es formal y bíblico, pero con sintaxis española natural.
