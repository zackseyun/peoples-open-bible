translation:
  language: es
  text: para ofrecer holocaustos sobre él[a], conforme a lo que está prescrito en el libro de Moisés, el hombre de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 3:2 dice: «como está escrito en la ley de Moisés, el hombre de Dios». 1 Esdras usa «el libro de Moisés» y «lo que está prescrito», con el mismo sentido básico pero distinta formulación.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσενέγκαι
  english_pob_choice: to offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - traer
  lexicon: BDAG
  rationale: En contexto sacrificial, el infinitivo expresa la acción de presentar ofrendas en el altar; «ofrecer» es la forma natural y precisa en español para este uso.
- source_word: ἐπ’ αὐτοῦ
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - sobre eso
  lexicon: BDAG
  rationale: El antecedente es el altar del contexto inmediato. «Sobre él» conserva la referencia local al altar sin forzar una paráfrasis.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente consumidas
  lexicon: LEH
  rationale: «Holocaustos» es el término técnico más directo en español bíblico para ofrendas completamente consumidas por fuego. Mantiene el valor sacrificial fuerte del griego.
- source_word: ἀκολούθως
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - según
  lexicon: LSJ
  rationale: La partícula expresa conformidad con una norma; «conforme a» suena natural y digno en español, y preserva la idea regulativa.
- source_word: τοῖς ... διηγορευμένοις
  english_pob_choice: what is prescribed
  chosen_spanish: lo que está prescrito
  alternatives_spanish:
  - lo que ha sido mandado
  - lo que ha sido ordenado
  lexicon: LSJ
  rationale: El participio apunta a disposiciones autorizadas y reglamentadas. «Lo que está prescrito» reproduce bien el sentido legal-sacrificial sin sobrerreducirlo a simple mandato.
- source_word: ἐν τῇ Μωσέως βίβλῳ
  english_pob_choice: in the book of Moses
  chosen_spanish: en el libro de Moisés
  alternatives_spanish:
  - en el rollo de Moisés
  - en el libro de Moisés
  lexicon: LEH
  rationale: «Libro» es el equivalente más idiomático de βίβλος en este contexto; mantiene la formulación propia del griego de 1 Esdras, sin sustituirla por la paralela hebrea «ley».
- source_word: τοῦ ἀνθρώπου τοῦ θεοῦ
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el siervo de Dios
  lexicon: LEH
  rationale: Es un título bíblico fijo para Moisés. «El hombre de Dios» conserva la forma tradicional y la relación titulativa exacta del griego y del paralelo hebreo.
theological_decisions:
- issue: Relación entre el texto griego de 1 Esdras y el paralelo hebreo de Esdras 3:2
  english_pob_reading: Retain the Greek expression 'book of Moses' while reflecting the same legal force as the Hebrew parallel.
  chosen_spanish_reading: Conservar «libro de Moisés» y expresar su fuerza normativa con «lo que está prescrito».
  alternative_spanish_readings:
  - «según está escrito en la ley de Moisés»
  - «como está escrito en la ley de Moisés»
  rationale: La fuente primaria de 1 Esdras es el griego, que dice «en el libro de Moisés» y no «en la ley». El paralelo hebreo confirma el sentido normativo, pero no debe reemplazar la redacción griega. Por eso la traducción mantiene el vocabulario del griego y deja que «prescrito» cargue la fuerza legal.
  doctrine_reference: Primacía de la fuente griega para los deuterocanónicos; el paralelo hebreo sirve como verificación de sentido, no como texto rector.
translation_notes:
  revision_awareness: Se siguió la última revisión del inglés auditado, que prefirió «according to» por una redacción más directa. En español, «conforme a» conserva esa formalidad directa sin perder naturalidad. La traducción permanece anclada en el griego, incluyendo la referencia específica a «el libro de Moisés».
  spanish_consistency_notes:
  - Se mantuvo «Moisés» con la tradición nominal española estándar.
  - Se eligió «holocaustos» por su fuerza técnica sacrificial, acorde con el griego ὁλοκαυτώματα.
  - No se sustituyó el título «el hombre de Dios» por una equivalencia más libre, para preservar el valor bíblico fijo del sintagma.
