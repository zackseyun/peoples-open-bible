review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el paralelismo hebreo y las decisiones léxicas principales: עֶבֶד como ''esclavo'', שָׂכִיר como ''jornalero'', יִשְׁאַף como deseo intenso, y פָעֳלוֹ como remuneración. Sin embargo, ''la sombra'' en el texto principal debilita ligeramente el matiz contextual de alivio térmico que el inglés POB explicitó con ''shade''; en español suena más natural y preciso ''la sombra'' o ''la sombra refrescante'', pero la nota ya aclara ese matiz. El ajuste más necesario es de calidad y consistencia: en la nota b se ofrece como alternativa exactamente la misma palabra usada en el texto principal, lo cual invalida la nota.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno. ''Como un esclavo que anhela la sombra, y como un jornalero que espera su salario'' se lee bien. La única falla significativa es editorial: la nota b no presenta una alternativa real al texto. Conviene cambiar el texto principal a ''la sombra'' sin nota de alternativa, o mejor ajustar el principal a ''la sombra'' y la nota a ''O "la sombra"'' si el principal fuera ''la sombra''; pero como eso seguiría redundante, lo mejor es usar ''la sombra'' o ''la sombra'' sin nota. Para preservar el audit trail inglés sobre shade/shadow, en español conviene preferir ''la sombra'' en el texto y omitir la nota b, ya que el contraste inglés no se traslada naturalmente al español.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''esclavo'' respeta la preferencia para עֶבֶד en este contexto; no hay términos teológicos conflictivos. ''Jornalero'' es una buena equivalencia idiomática para שָׂכִיר. No hay conflicto con Yahvé, Mesías, Espíritu, etc. La única desalineación es formal respecto al manejo de alternativas: la nota b no conserva una alternativa significativa en español.'
  issues:
