    text: Peniel sounds like 'face of God,' matching Jacob's explanation, 'I have seen God face to face.'
    reason: cultural_note
  - marker: b
    text: Or 'my soul has been delivered,' with 'soul' here meaning 'life' or 'self.'
    reason: lexical_alternative
  - marker: c
    text: '''God'' could also be understood more broadly as ''a divine being,'' but the context favors ''God.'''
    reason: alternative_reading
