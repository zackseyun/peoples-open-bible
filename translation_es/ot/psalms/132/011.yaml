base_translation:
  language: en
  yaml_path: translation/ot/psalms/132/011.yaml
  text: 'Yahweh swore to David a sure oath[b][a]; he will not turn back from it: “From the fruit of your womb I will set one on your throne.”'
  footnotes:
  - marker: a
    text: Or “a true promise” / “truth”; the Hebrew uses “truth” to emphasize the certainty of the oath.
    reason: lexical_alternative
  - marker: b
    text: That is, one of David’s own descendants. Compare 2 Samuel 7:12 and Acts 2:30 for the covenantal and later messianic use of this promise.
    reason: cross_reference
