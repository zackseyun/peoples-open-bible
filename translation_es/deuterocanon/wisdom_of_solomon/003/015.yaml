translation:
  language: es
  text: Porque el fruto de los buenos trabajos es glorioso, y la raíz del entendimiento[a] no falla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la raíz de la prudencia no falla'.
