  rationale: Se ajusta 'Alto y Sublime' a 'Alto y Exaltado' para reflejar mejor la imaginería de רָם וְנִשָּׂא según el audit trail. Se cambia 'en la altura y en la santidad' por 'en el lugar alto y santo' para preservar el sentido locativo natural de מָרוֹם וְקָדוֹשׁ אֶשְׁכּוֹן. Se mantiene 'quebrantado/quebrantados' conforme a la decisión teológica y léxica del POB, y se suaviza mínimamente la construcción a 'humilde en espíritu' por naturalidad española.
  reviewer_model: gpt-5.4
