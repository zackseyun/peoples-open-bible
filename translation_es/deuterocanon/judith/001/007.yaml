revisions:
- from: Y Nabucodonosor, rey de los asirios, envió a todos los que habitaban en Persia y a todos los que habitaban hacia el occidente[a] —a los que habitaban en Cilicia y Damasco, el Líbano y el Antilíbano, y a todos los que habitaban frente a la costa—.
  to: Y Nabucodonosor, rey de los asirios, envió a todos los que habitaban en Persia y a todos los que habitaban hacia el occidente[a] —a los que habitaban en Cilicia y Damasco, el Líbano y el Antilíbano, y a todos los que habitaban a lo largo de la costa—
  rationale: Se conserva la estructura y las decisiones principales del borrador, pero se corrige la expresión final para reflejar mejor el sentido geográfico de κατὰ πρόσωπον παραλίας y se limpia la puntuación final. No se requiere nota nueva, porque el cambio mejora claridad sin introducir ambigüedad adicional.
