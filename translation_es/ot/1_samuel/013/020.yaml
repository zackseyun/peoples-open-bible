translation:
  language: es
  text: Todo Israel bajó a los filisteos, cada uno para afilar su reja, su azadón, su hacha y su hoz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'su cuchilla de arado' u otro implemento de arado; el término hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento descendente; en español, 'bajó' comunica de forma natural ese desplazamiento sin perder el matiz direccional.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: Todo Israel
  alternatives_spanish:
  - todos los israelitas
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión colectiva se conserva como unidad nacional/corporativa, tal como en el hebreo.
- source_word: הַפְּלִשְׁתִּים
  english_pob_choice: to the Philistines
  chosen_spanish: donde estaban los filisteos
  alternatives_spanish:
  - a los filisteos
  - a Filistea
  lexicon: HALOT
  rationale: El hebreo presenta a los filisteos como el término de la acción. En español, 'donde estaban los filisteos' evita una construcción dura y mantiene la referencia al pueblo, no a la tierra. La inclusión de 'donde' se apoya en el contexto narrativo de ir a buscar afilado.
- source_word: לִלְטוֹשׁ
  english_pob_choice: to sharpen
  chosen_spanish: para afilar
  alternatives_spanish:
  - para aguzar
  - para dar filo a
  lexicon: HALOT
  rationale: '''Afilar'' es el equivalente natural en español para poner filo a herramientas metálicas. Conserva el sentido funcional del verbo hebreo.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: El distributivo singular se expresa de manera inclusiva y natural en español con 'cada uno', sin forzar una marca masculina donde el foco está en la distribución individual.
- source_word: מַחֲרַשְׁתּוֹ
  english_pob_choice: his plowshare
  chosen_spanish: su reja
  alternatives_spanish:
  - su reja de arado
  - su arado
  lexicon: HALOT
  rationale: El término hebreo apunta a un útil de arado o pieza metálica afilada. 'Reja' comunica bien el componente metálico del arado y evita sobreinterpretar el instrumento completo.
- source_word: אֵתוֹ
  english_pob_choice: his mattock
  chosen_spanish: su azadón
  alternatives_spanish:
  - su azuela
  - su pico
  lexicon: HALOT
  rationale: La herramienta de excavación o desyerbe se puede expresar con 'azadón', un equivalente claro y funcional en español para el contexto de herramientas agrícolas.
- source_word: קַרְדֻּמּוֹ
  english_pob_choice: his axe
  chosen_spanish: su hacha
  alternatives_spanish:
  - su destral
  - su hachuela
  lexicon: HALOT
  rationale: La palabra hebrea designa un instrumento cortante similar a un hacha; 'hacha' es la correspondencia directa y más transparente.
- source_word: מַחֲרֵשָׁתוֹ
  english_pob_choice: his sickle
  chosen_spanish: su hoz
  alternatives_spanish:
  - su reja
  - su cuchilla
  lexicon: HALOT
  rationale: Siguiendo la lectura adoptada en la base inglesa, se preserva el sentido de una herramienta agrícola cortante. 'Hoz' es una opción idiomática y comprensible en español para una herramienta de corte agrícola; se mantiene la tensión textual de que el lexema es incierto.
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios; se mantiene la decisión óptima-equivalente ya acordada y la misma incertidumbre léxica para el último término de la lista.
  spanish_consistency_notes:
  - Se mantiene 'filisteos' en minúscula como etnónimo común en español.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - '''Todo Israel'' conserva la colectividad del hebreo sin pluralizar innecesariamente.'
  - La nota al pie marca únicamente la incertidumbre del último término, en continuidad con el aparato inglés.
