revisions:
- from: Hijo de hombre[a], la casa de Israel se ha convertido para mí en escoria; todos ellos son bronce, estaño, hierro y plomo, en medio de un horno; son la escoria de la plata.
  to: Hijo de hombre, la casa de Israel ha llegado a ser escoria para mí; todos ellos son bronce[a], estaño, hierro y plomo en medio de un horno de fundición; son la escoria de la plata.
  rationale: 'Se hicieron ajustes menores de estilo y precisión semántica: «ha llegado a ser escoria para mí» suena más natural que «se ha convertido para mí en escoria», y «horno de fundición» refleja mejor כּוּר. Se mantuvo intacta la metáfora metalúrgica, la estructura del versículo y la nota léxica sobre «bronce/cobre».'
