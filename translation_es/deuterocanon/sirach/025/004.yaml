review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: contraste entre juventud y vejez, y mantenimiento de la elipsis del objeto. También conserva la incertidumbre textual de οὐ συναγίοχας mediante nota. Sin embargo, añade explícitamente ''algo'' en la pregunta principal, cuando la decisión inglesa y la justificación teológica piden dejar el objeto implícito en el texto principal. Además, ''encontrarás'' como futuro simple debilita el matiz potencial/condicional de πῶς ἂν εὕροις.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar mejor la fuerza retórica del original. '¿Cómo hallarías...?' o '¿cómo podrías encontrar...?' suena más proverbial y más cercano al potencial griego que '¿cómo encontrarás...?'. También conviene evitar introducir 'algo' si se quiere preservar plenamente la amplitud semántica del proverbio.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Juventud' y 'vejez' están bien elegidos. 'Recogiste' es aceptable para el probable sentido de συνάγω, aunque 'reuniste' también sería posible; no es necesario cambiarlo. La nota textual está alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: Se añade 'algo' en el texto principal.
    rationale: El griego no expresa objeto, y la decisión teológica documentada pide dejarlo implícito. Añadir 'algo' interpreta la elipsis en vez de preservarla.
  - severity: medium
    issue: '''¿Cómo encontrarás...?'' usa futuro simple en lugar de un valor potencial/condicional.'
    rationale: πῶς ἂν εὕροις expresa posibilidad/condición retórica. En español, '¿cómo hallarías...?' refleja mejor ese matiz.
  - severity: low
    issue: La nota al pie podría sonar más natural en español con 'tradición textual/testimonio textual', pero es comprensible tal como está.
    rationale: No afecta sustancialmente la fidelidad, solo la naturalidad estilística.
