    issue: «de entre los hijos de» sobretraducía מִן בְּנֵי.
    rationale: La construcción hebrea identifica a Sadoc y Ahimelec por su procedencia/linaje. «De entre» sugiere selección interna más que simple pertenencia. Se corrigió a «de los hijos de».
  - severity: low
    issue: Nota al pie innecesaria sobre «Sadoc».
    rationale: La nota no preserva una alternativa significativa del hebreo ni resuelve una ambigüedad. Se eliminó.
