translation:
  language: es
  text: Así Yahvé se enojó mucho con Israel y los quitó de delante de su rostro[a]; no quedó sino la tribu de Judá sola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su presencia». El hebreo dice más literalmente «de delante de su rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַנַּף
  english_pob_choice: was very angry
  chosen_spanish: se enojó mucho
  alternatives_spanish:
  - se enfureció
  - ardió en ira
  lexicon: HALOT
  rationale: El hitpael de אנף expresa el encenderse de la ira. «Se enojó mucho» comunica con naturalidad la fuerza intensa del verbo sin subir innecesariamente a una paráfrasis más fuerte que la evidencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la convención del proyecto y evitando sustituirlo por un título.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: Como intensificador, מְאֹד se vierte con un adverbio natural en español. «Mucho» integra la intensidad de forma fluida junto con el verbo de ira.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: con Israel
  alternatives_spanish:
  - contra Israel
  - respecto de Israel
  lexicon: HALOT
  rationale: Se mantiene la preposición como en el hebreo y en la línea del inglés auditado. En este contexto de ira divina, el complemento señala al objeto del enojo sin forzar una reinterpretación explícita.
- source_word: וַיְסִרֵם
  english_pob_choice: removed them
  chosen_spanish: los apartó
  alternatives_spanish:
  - los removió
  - los quitó
  lexicon: HALOT
  rationale: סור en causativo indica hacer salir o apartar. «Los apartó» conserva la acción directa de alejarlos de la presencia divina y es más idiomático en español que un calco rígido.
- source_word: מֵעַל פָּנָיו
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - de delante de él
  lexicon: HALOT
  rationale: 'Se preserva la imagen antropomórfica concreta del hebreo: «delante de su rostro». Se evita suavizarla a «presencia» en el texto principal porque el audit trail inglés prefirió conservar el color literal.'
- source_word: לֹא נִשְׁאַר
  english_pob_choice: none was left
  chosen_spanish: no quedó
  alternatives_spanish:
  - no permaneció ninguno
  - no se dejó
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa permanecer o quedar. En español, «no quedó» comunica bien el valor colectivo de desaparición sin sobrecargar la frase.
- source_word: רַק
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: Tras una negación, «sino» es la opción natural y fiel para introducir la excepción en español.
- source_word: שֵׁבֶט יְהוּדָה
  english_pob_choice: the tribe of Judah
  chosen_spanish: la tribu de Judá
  alternatives_spanish:
  - el tribu de Judá
  - Judá, la tribu
  lexicon: HALOT
  rationale: La construcción constructa se vierte con la fórmula establecida «la tribu de Judá», clara y fiel al referente histórico.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - solamente
  - por sí sola
  lexicon: HALOT
  rationale: El adverbio enfático final refuerza la exclusividad de Judá. «Sola» reproduce ese énfasis con concisión; concuerda implícitamente con «la tribu».
theological_decisions:
- issue: Lenguaje antropomórfico en מֵעַל פָּנָיו
  english_pob_reading: from before his face
  chosen_spanish_reading: de delante de su rostro
  alternative_spanish_readings:
  - de su presencia
  - de delante de él
  rationale: Se mantiene la imagen corporal y relacional del hebreo. El texto no abstrae la expresión a «presencia», aunque esa sea una alternativa idiomática válida, porque el audit trail inglés preservó la literalidad teológica y literaria.
  doctrine_reference: 'Translation philosophy #3, #6'
- issue: Sentido de «Israel» en el contexto de juicio
  english_pob_reading: Israel refers to the northern kingdom/people as the object of judgment
  chosen_spanish_reading: Israel como el reino del norte sujeto al juicio
  alternative_spanish_readings:
  - Israel como todo el pueblo del pacto en sentido amplio
  rationale: Se conserva el referente histórico inmediato del capítulo sin ampliarlo más allá de lo que el versículo y su contexto requieren.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
translation_notes:
  revision_awareness: 'El registro auditado indica que no hubo revisiones aplicadas y que la última pasada concluyó «unchanged: true». La presente redacción mantiene esa estabilidad, conservando la fuerza del juicio divino, la referencia histórica a Israel y la imagen concreta de alejamiento «de delante de su rostro».'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - 'Se conserva la estructura de juicio: enojo intenso, apartamiento y remanente de Judá.'
  - «De delante de su rostro» preserva la metáfora hebrea; la alternativa idiomática queda en nota.
  - «La tribu de Judá sola» refleja el énfasis final de לְבַדּוֹ sin añadir ideas ajenas al versículo.
