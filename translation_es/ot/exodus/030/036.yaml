translation:
  language: es
  text: Y molerás una parte de ella muy fina[a], y pondrás una parte de ella delante del testimonio en la tienda de reunión, donde me reuniré contigo. Será santísimo para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «santo de los santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַקְתָּ
  english_pob_choice: you shall grind
  chosen_spanish: molerás
  alternatives_spanish:
  - machacarás
  - triturarás
  lexicon: HALOT
  rationale: שׁחק aquí expresa pulverizar la mezcla de incienso. En español, «moler» comunica bien la acción de reducir a polvo sin sonar excesivamente técnico o arcaico.
- source_word: מִמֶּנָּה
  english_pob_choice: some of it
  chosen_spanish: una parte de él
  alternatives_spanish:
  - de él
  - algo de él
  lexicon: HALOT
  rationale: El valor partitivo del pronombre se expresa naturalmente con «una parte de él», que preserva la idea de porción sin forzar una literalidad dura.
- source_word: הָדֵק
  english_pob_choice: very fine
  chosen_spanish: muy fino
  alternatives_spanish:
  - finamente
  - hecho polvo fino
  lexicon: HALOT
  rationale: El intensificador adverbial se traduce de manera directa y natural con «muy fino», manteniendo el resultado del molido.
- source_word: וְנָתַתָּה
  english_pob_choice: and put
  chosen_spanish: y pondrás
  alternatives_spanish:
  - y colocarás
  - y presentarás
  lexicon: HALOT
  rationale: En contexto ritual, «poner» conserva la sencillez del hebreo נתן y sigue siendo claro en español.
- source_word: לִפְנֵי הָעֵדֻת
  english_pob_choice: before the testimony
  chosen_spanish: delante del testimonio
  alternatives_spanish:
  - ante el testimonio
  - frente al testimonio
  lexicon: HALOT
  rationale: Se conserva el término cultual «testimonio» sin expandirlo a «arca» o «tablas», siguiendo la decisión auditada del POB inglés de mantener el referente literal.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» transmite el nombre técnico del santuario de manera transparente y natural en español.
- source_word: אֲשֶׁר אִוָּעֵד לְךָ שָׁמָּה
  english_pob_choice: where I will meet with you
  chosen_spanish: donde yo me encontraré contigo
  alternatives_spanish:
  - donde me reuniré contigo
  - donde yo me citaré contigo
  lexicon: HALOT
  rationale: El nifal de יעד comunica encuentro designado. «Me encontraré contigo» reproduce la relación personal y el sentido de cita divina sin sobreexplicar.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - sumamente santo
  - santo de santos
  lexicon: HALOT
  rationale: La construcción superlativa se vierte con el superlativo español «santísimo», que funciona bien para el incienso y evita confundirlo con el lugar llamado «santo de los santos».
- source_word: תִּהְיֶה לָכֶם
  english_pob_choice: it shall be for you
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - les pertenecerá
  - será de ustedes
  lexicon: HALOT
  rationale: La frase hebrea expresa estatus/beneficio. «Será para ustedes» conserva esa relación sin añadir propiedad exclusiva.
theological_decisions:
- issue: Referente de «el testimonio»
  english_pob_reading: Retain the literal cultic term 'the testimony' rather than interpretively substituting 'the ark' or 'the tablets.'
  chosen_spanish_reading: Mantener «el testimonio» sin sustituirlo por «el arca» ni por «las tablas».
  alternative_spanish_readings:
  - el arca del testimonio
  - las tablas del testimonio
  rationale: El hebreo nombra «el testimonio»; el español mantiene esa misma formulación para no estrechar indebidamente el referente. La nota contextual del POB inglés se preserva así en castellano.
  doctrine_reference: Translation philosophy §1, §5
- issue: Superlativo de santidad
  english_pob_reading: Translate קֹדֶשׁ קָדָשִׁים as 'most holy' in the main text.
  chosen_spanish_reading: Traducir קֹדֶשׁ קָדָשִׁים como «santísimo» en el texto principal.
  alternative_spanish_readings:
  - santo de los santos
  - sumamente santo
  rationale: El hebreo expresa el grado máximo de santidad. «Santísimo» comunica bien la fuerza superlativa en español y evita usar una expresión que en español suele designar el santuario interior.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El inglés POB más reciente indica que no hubo cambios necesarios en la revisión final y mantiene una alta concordancia con las evaluaciones previas. Esta versión española sigue esa línea, conservando el léxico cultual clave («testimonio», «tienda de reunión») y la superlatividad de קֹדֶשׁ קָדָשִׁים sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «tú» en la acción singular y «ustedes» en el cierre, reflejando la alternancia del hebreo entre el destinatario singular de la instrucción y el valor colectivo del resultado.
  - «Tienda de reunión» se usa de forma consistente para אֹהֶל מוֹעֵד.
  - «Testimonio» se conserva como término técnico cultual, sin sustituirlo por expresiones explicativas.
  - «Santísimo» se reserva para la cláusula superlativa y no se emplea como nombre del lugar.
  - El pronombre partitivo se expresa con «una parte de él» para conservar el matiz del hebreo sin perder naturalidad en español.
