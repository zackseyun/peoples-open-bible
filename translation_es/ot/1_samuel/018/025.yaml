translation:
  language: es
  text: 'Entonces Saúl dijo: «Así le dirán a David: “El rey no desea un precio de novia[a] sino cien prepucios de filisteos[b], para vengarse de los enemigos del rey”.» Saúl pensaba hacer caer a David[c] en manos de los filisteos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Precio de novia» refleja el hebreo mohar, el pago asociado con el matrimonio; no equivale a la «dote» en el sentido moderno.
    reason: cultural_note
  - marker: b
    text: O «sino solo cien prepucios de filisteos».
    reason: lexical_alternative
  - marker: c
    text: «Hacer caer a David» probablemente implica provocar su muerte o ruina, pero el hebreo lo deja menos explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹהַר
  english_pob_choice: bride-price
  chosen_spanish: precio de novia
  alternatives_spanish:
  - precio nupcial
  - pago nupcial
  - dote
  lexicon: HALOT
  rationale: מֹהַר es el pago ligado al matrimonio, normalmente entregado por el novio o su familia. En español, “dote” sería engañoso porque sugiere el aporte de la novia; “precio de novia” conserva la función comercial y la tensión del pasaje. Se evita una formulación demasiado eufemística.
- source_word: אֵין חֵפֶץ לַמֶּלֶךְ
  english_pob_choice: The king has no desire
  chosen_spanish: el rey no tiene deseo
  alternatives_spanish:
  - al rey no le agrada
  - el rey no desea
  - el rey no tiene agrado
  lexicon: HALOT
  rationale: חֵפֶץ expresa deseo, gusto o placer. “No tiene deseo” sigue de cerca la fuerza semántica y resulta natural en español; mantiene el tono transaccional del contexto.
- source_word: בְּמֵאָה עָרְלוֹת פְּלִשְׁתִּים
  english_pob_choice: except a hundred Philistine foreskins
  chosen_spanish: sino de cien prepucios de filisteos
  alternatives_spanish:
  - sino cien prepucios de filisteos
  - excepto cien prepucios de filisteos
  lexicon: HALOT
  rationale: Se conserva la concreción chocante del hebreo. “Prepucios” es el equivalente anatómico normal en español y “de filisteos” preserva la relación genitiva sin suavizarla.
- source_word: לְהִנָּקֵם
  english_pob_choice: to take vengeance
  chosen_spanish: para vengarse
  alternatives_spanish:
  - para tomar venganza
  - para ejecutar venganza
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa propósito. “Vengarse” comunica bien la intención de daño retributivo y mantiene la naturalidad del español sin borrar la referencia a la venganza.
- source_word: בְּאֹיְבֵי הַמֶּלֶךְ
  english_pob_choice: on the king’s enemies
  chosen_spanish: de los enemigos del rey
  alternatives_spanish:
  - contra los enemigos del rey
  - sobre los enemigos del rey
  lexicon: HALOT
  rationale: Aunque el hebreo admite la idea de acción sobre/en contra, en español “vengarse de” exige “de”. Se conserva la referencia a los enemigos del rey sin forzar una construcción menos idiomática.
- source_word: חָשַׁב
  english_pob_choice: intended
  chosen_spanish: pensaba
  alternatives_spanish:
  - planeaba
  - intentaba
  - trazaba
  lexicon: HALOT
  rationale: En contexto, חָשַׁב implica una intención deliberada o cálculo. “Pensaba” con el complemento de infinitivo “hacer caer” mantiene la noción de propósito/plan sin volverlo demasiado interpretativo.
- source_word: לְהַפִּיל אֶת דָּוִד
  english_pob_choice: to make David fall
  chosen_spanish: hacer caer a David
  alternatives_spanish:
  - hacer que David cayera
  - hacer caer a David en desgracia
  - derribar a David
  lexicon: HALOT
  rationale: El hiphil de נפל conserva la metáfora de caída. “Hacer caer” mantiene esa imagen y evita explicitar en exceso que el sentido probable sea la muerte o el derribo político.
- source_word: בְּיַד פְּלִשְׁתִּים
  english_pob_choice: by the hand of the Philistines
  chosen_spanish: en manos de los filisteos
  alternatives_spanish:
  - por mano de los filisteos
  - por medio de los filisteos
  lexicon: HALOT
  rationale: La idiomática española “en manos de” comunica agencia y entrega a la acción de otros, preservando la textura bíblica del hebreo ביד.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, especialmente el cambio de una formulación más interpretativa a una más neutra en el conector inicial y en la cláusula final. Se conservó la estructura de discurso directo y el matiz intencional de Saúl, manteniendo la ambigüedad controlada de לְהַפִּיל.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando el texto fuente lo exigiera; aquí no aparece ningún tetragrámaton.
  - Se mantuvo “filisteos” en minúscula por tratarse de un etnónimo común en español.
  - Se evitó “dote” por su sentido invertido respecto del hebreo mohar.
  - Se mantuvo la metáfora de caída sin explicitar “matar”, conforme a la cautela del texto fuente.
