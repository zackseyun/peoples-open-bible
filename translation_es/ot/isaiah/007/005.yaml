  glossary_alignment: 'Se respetan bien los nombres propios POB: «Aram» y «Efraín». «El hijo de Remalías» preserva adecuadamente el patronímico despectivo. No hay conflicto con la terminología teológica por defecto. La mejor alineación léxica con el audit trail para יָעַץ sería «han planeado», con nota alternativa para «han tramado/han conspirado» si se desea conservar el matiz hostil posible.'
