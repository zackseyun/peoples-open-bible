translation:
  language: es
  text: La oración del humilde[a] ha atravesado las nubes, y hasta que se acerque, no habrá consuelo[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha penetrado las nubes»; la imagen griega sugiere la oración que asciende sin impedimento hasta la presencia de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'El griego es algo ambiguo: «hasta que se acerque, no habrá consuelo». La traducción toma «la oración» como la que se acerca, pero usa una formulación impersonal para conservar la tensión sobre quién recibe el consuelo.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσευχὴ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - petición
  - súplica
  lexicon: LSJ
  rationale: En este contexto, la palabra designa una apelación dirigida a Dios. «Oración» es el equivalente natural y digno en español, sin perder el sentido de ruego piadoso.
- source_word: ταπεινοῦ
  english_pob_choice: of the humble
  chosen_spanish: del humilde
  alternatives_spanish:
  - del bajo de condición
  - del afligido
  lexicon: LSJ
  rationale: El genitivo caracteriza a la persona por humildad, no solo por estatus social. «Humilde» conserva la fuerza moral y espiritual del término griego.
- source_word: νεφέλας διῆλθεν
  english_pob_choice: has passed through the clouds
  chosen_spanish: ha atravesado las nubes
  alternatives_spanish:
  - ha pasado por las nubes
  - ha penetrado las nubes
  lexicon: LSJ
  rationale: El verbo e imagen sugieren un movimiento vigoroso e impedido no por obstáculos. «Atravesado» comunica mejor la imagen de paso libre hacia la presencia de Dios.
- source_word: ἕως συνεγγίσῃ
  english_pob_choice: until it draws near
  chosen_spanish: hasta que se acerque
  alternatives_spanish:
  - hasta que llegue cerca
  - hasta que llegue
  lexicon: LSJ
  rationale: La referencia inmediata puede ser la oración, y en español conviene mantener esa continuidad con un neutro impersonal natural. «Se acerque» preserva la imagen sin sobreespecificar el sujeto.
- source_word: οὐ μὴ παρακληθῇ
  english_pob_choice: it will not be comforted
  chosen_spanish: no será consolada
  alternatives_spanish:
  - no recibirá consuelo
  - no será consolado
  lexicon: LSJ
  rationale: La revisión inglesa resolvió la concordancia con el sujeto femenino implícito de «oración». En español, «consolada» mantiene esa concordancia y refleja el matiz de παρακαλέω como consolar/animar.
theological_decisions:
- issue: 'Ambigüedad del segundo hemistiquio: ¿se consuela la oración o la persona humilde?'
  english_pob_reading: The prayer draws near, while the humble person is the one not comforted until God responds.
  chosen_spanish_reading: La oración es la imagen principal; al acercarse, expresa el movimiento hacia la respuesta divina, mientras la persona humilde permanece sin consuelo hasta que Dios actúe.
  alternative_spanish_readings:
  - hasta que él se acerque, no será consolado
  - hasta que la oración se acerque, ella no será consolada
  rationale: El griego permite un leve desplazamiento de sujeto entre la oración personificada y la persona que ora. Se conserva esa tensión sin cerrarla artificialmente; el español mantiene el pronombre impersonal y la concordancia femenina exigida por «oración».
  doctrine_reference: Preservar la tensión poética y semántica del texto fuente, sin resolverla más allá de lo que el griego exige.
translation_notes:
  revision_awareness: Se siguió la lectura revisada del POB inglés que cambió «he will not be comforted» por «it will not be comforted» para concordar con el sujeto femenino «prayer» y con la construcción griega. La redacción española refleja esa corrección al usar «consolada».
  spanish_consistency_notes:
  - Se evitó «Señor» o «Yahvé» porque este versículo no contiene el nombre divino ni una cita directa del mismo.
  - Se prefirió «oración» sobre «petición» por ser el término más natural y reverente en español para προσευχή en este contexto.
  - La imagen espacial se mantuvo literal («ha atravesado las nubes») para conservar el valor poético y teológico del original.
