revisions:
- from: Por la transgresión de una tierra, sus gobernantes son muchos; pero por un hombre[a] que entiende y sabe, se prolonga[b].
  to: Por la transgresión de una tierra, sus gobernantes son muchos; pero por un hombre[a] que entiende y sabe, esta perdura[b].
  rationale: Se reemplaza «se prolonga» por «esta perdura» para que el español exprese con mayor naturalidad el referente implícito que el POB inglés mantuvo como «it». Así se conserva la cautela interpretativa del original auditado sin introducir la expansión más fuerte de «estabilidad».
