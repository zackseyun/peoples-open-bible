id: NUM.4.43
reference: Numbers 4:43
source:
  edition: WLC
  text: מִ/בֶּ֨ן שְׁלֹשִׁ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וְ/עַ֖ד בֶּן חֲמִשִּׁ֣ים שָׁנָ֑ה כָּל הַ/בָּא֙ לַ/צָּבָ֔א לַ/עֲבֹדָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: from thirty years old and upward[a], and up to fifty years old[b], everyone who comes for service, for the work in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who enters for duty.' The Hebrew participle can emphasize those who present themselves or enter into the assigned service.
    reason: lexical_alternative
  - marker: b
    text: '''For service'' translates a term that can denote organized duty, sometimes with military overtones; here it refers to Levitical service.'
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן ... שְׁלֹשִׁים שָׁנָה
  chosen: from thirty years old
  alternatives:
  - from the son of thirty years
  - from the age of thirty years
  lexicon: HALOT
  rationale: The idiom בֶּן + number + שָׁנָה expresses age. English naturally renders this as '... years old' rather than preserving the literal 'son of.'
- source_word: וָמַעְלָה
  chosen: and upward
  alternatives:
  - and above
  - and older
  lexicon: HALOT
  rationale: This adverbial expression marks the lower bound inclusively. 'And upward' is a clear, conventional rendering in census/eligibility contexts.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: and up to fifty years old
  alternatives:
  - even to fifty years old
  - and until fifty years old
  lexicon: HALOT
  rationale: This phrase sets the upper age limit. 'Up to' communicates the range naturally in modern English while preserving the sense.
- source_word: כָּל הַבָּא
  chosen: everyone who comes
  alternatives:
  - all who enter
  - everyone who comes in
  lexicon: HALOT
  rationale: The participle of בוא here functions substantivally for those presenting themselves for duty. 'Everyone who comes' is natural and sufficiently formal without over-specifying motion.
- source_word: לַצָּבָא
  chosen: for service
  alternatives:
  - for duty
  - for the company
  - for the host
  lexicon: HALOT
  rationale: In this cultic/Levitical context צָבָא refers to organized service or duty rather than a military host in the narrow sense. 'Service' fits the context and avoids misleading militarization, while still reflecting structured duty.
- source_word: לַעֲבֹדָה
  chosen: for the work
  alternatives:
  - to do the work
  - for labor
  - for ministry
  lexicon: HALOT
  rationale: עֲבֹדָה denotes work/service. Because לַצָּבָא already conveys entry into service, rendering this second phrase as 'for the work' preserves the parallel structure and avoids collapsing two distinct terms into one.
- source_word: בְּאֹהֶל מוֹעֵד
  lemma: בְּ
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This standard Pentateuchal phrase is best rendered consistently as 'tent of meeting.' 'In' reflects the Hebrew preposition בְּ, though English could also allow 'at' in context.
