translation:
  language: es
  text: ¿Quién proclamará una obra de justicia[a][b], y quién tendrá esperanza en lo decretado[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene un texto difícil aquí, aproximadamente: ''¿Qué es una obra de justicia? ¿Quién la contará?''; el paralelo griego lee con mayor claridad: ''¿Quién declarará obras de justicia...?''.'
    reason: textual_variant
  - marker: b
    text: O 'obras de justicia' o 'una obra de rectitud'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo parece apuntar a 'lo decretado' o 'un estatuto'; el griego lee 'el pacto'.
    reason: alternative_reading
lexical_decisions:
- source_word: מָה מַעֲשֶׂה צֶדֶק / ἔργα δικαιοσύνης
  english_pob_choice: a work of righteousness
  chosen_spanish: una obra de justicia
  alternatives_spanish:
  - unas obras de justicia
  - una obra de rectitud
  - un acto justo
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego apuntan a una acción/obra vinculada con justicia o rectitud. En español, 'obra de justicia' conserva el valor nominal singular de la formulación inglesa y el paralelismo proverbial, sin perder la carga ética de δικαιοσύνη. 'Rectitud' sería posible, pero 'justicia' es más natural en este contexto y mantiene la fuerza bíblica del término.
- source_word: מִי יַגִּידֶנּוּ / τίς ἀναγγελεῖ
  english_pob_choice: Who will declare
  chosen_spanish: ¿Quién proclamará
  alternatives_spanish:
  - ¿Quién declarará
  - ¿Quién anunciará
  - ¿Quién lo dirá
  lexicon: HALOT; BDAG
  rationale: ἀναγγέλλω y el hebreo נגד/הגיד admiten 'declarar', 'anunciar' o 'proclamar'. 'Proclamar' eleva un poco el registro y funciona bien con la pregunta retórica, sin salir del campo semántico de hacer público algo.
- source_word: וְתִקְוַת מָּה כִי אָצוּק חוֹק / ἢ τίς ὑπομενεῖ
  english_pob_choice: and who will hope for what is decreed
  chosen_spanish: y quién esperará lo decretado
  alternatives_spanish:
  - y quién tendrá esperanza de lo decretado
  - y quién lo aguardará
  - y quién perseverará
  lexicon: HALOT; BDAG
  rationale: La revisión inglesa reciente intenta reflejar el hebreo תִקְוַת ('esperanza/expectativa') y חוֹק ('decreto/estatuto'), pero el griego ofrece ὑπομενεῖ ('perseverará / esperará con constancia'). 'Esperará lo decretado' conserva la idea de expectativa paciente y evita introducir un objeto más interpretativo que el del texto fuente.
- source_word: חוֹק / ἡ διαθήκη
  english_pob_choice: the covenant / the statute / the decree
  chosen_spanish: lo decretado
  alternatives_spanish:
  - el decreto
  - la norma
  - el pacto
  lexicon: HALOT; BDAG
  rationale: Dado que el hebreo final usa חוֹק y el griego tiene un verbo de perseverar/esperar en lugar de un sustantivo explícito, 'lo decretado' funciona como un español compacto que mantiene la referencia a una disposición fijada sin elegir de manera total entre 'decreto', 'norma' o 'pacto'. Por eso se prefiere una expresión neutra que refleje la indeterminación textual.
theological_decisions:
- issue: Cómo representar la tensión textual entre el hebreo difícil y el griego más claro sin borrar ninguna de las dos lecturas
  english_pob_reading: Main text follows the clearer Greek sense where the Hebrew appears corrupt or mismatched, while still using Hebrew where it contributes probable semantic overlap.
  chosen_spanish_reading: La redacción principal sigue el sentido más coherente de la línea, pero conserva la ambigüedad del segundo miembro con 'lo decretado', que puede sugerir tanto decreto como disposición establecida.
  alternative_spanish_readings:
  - 'Una traducción más griega: ''¿Quién proclamará una obra de justicia, y quién perseverará?'''
  - 'Una traducción más hebrea: ''¿Quién proclamará una obra de justicia, y quién esperará lo decretado?'''
  rationale: El testimonio hebreo y el griego no coinciden plenamente. En lugar de imponer una armonización artificial, la versión española preserva la pregunta retórica y la noción de una justicia difícil de encontrar o de sostener. 'Lo decretado' deja visible la oscilación entre estatuto, decreto y el valor de la línea griega de endurance/espera.
  doctrine_reference: Principio de honestidad textual y prioridad del sentido atestiguado por las fuentes originales
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una lectura más cercana a 'wait for it' y 'the covenant is far off' a una formulación que integra el hebreo difícil ('hope for what is decreed') y elimina la cláusula del pacto por no corresponder al hebreo provisto. La redacción española sigue esa revisión y evita introducir 'pacto' como lectura principal.
  spanish_consistency_notes:
  - Se mantiene 'justicia' para δικαιοσύνη, conforme al valor jurídico-ético del término.
  - Se evita 'Cristo' y cualquier terminología no presente en el texto.
  - Se usa un registro bíblico claro pero natural en español contemporáneo.
  - Los marcadores de nota se colocan solo en los puntos con tensión textual o alternativa léxica real.
