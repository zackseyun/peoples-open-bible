translation:
  language: es
  text: Con la abundancia de tu sabiduría en tu comercio aumentaste tu riqueza[a][c], y tu corazón se enalteció[b] a causa de tu riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu comercio» o «por tu comercio»; el término hebreo se refiere a actividad comercial.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu corazón fue levantado», un modismo para hacerse orgulloso.'
    reason: lexical_alternative
  - marker: c
    text: La palabra hebrea traducida aquí «riqueza» también puede significar «riquezas», «recursos» o, en algunos contextos, «fuerza/poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב / בְּרֹב חָכְמָתְךָ
  english_pob_choice: By your great wisdom
  chosen_spanish: Con la abundancia de tu sabiduría
  alternatives_spanish:
  - Por tu gran sabiduría
  - En la abundancia de tu sabiduría
  lexicon: HALOT
  rationale: El hebreo expresa medio o circunstancia mediante ב + רֹב; en español, «con la abundancia de» conserva la idea de abundancia sin sonar forzado. «Sabiduría» mantiene el valor léxico principal de חָכְמָה, aunque el contexto sea comercial.
- source_word: בִּרְכֻלָּתְךָ
  english_pob_choice: in your trade
  chosen_spanish: en tu comercio
  alternatives_spanish:
  - en tu negociación
  - en tu tráfico comercial
  - por tu comercio
  lexicon: HALOT
  rationale: רְכֻלָּה apunta a actividad comercial. «Comercio» es natural en español y preserva el campo semántico de intercambio mercantil; «trade» en inglés corresponde bien a esta elección.
- source_word: הִרְבִּיתָ
  english_pob_choice: you increased
  chosen_spanish: aumentaste
  alternatives_spanish:
  - multiplicaste
  - hiciste crecer
  lexicon: HALOT
  rationale: El Hiphil de רבה comunica hacer grande o numeroso. «Aumentaste» es claro y fiel en español moderno.
- source_word: חֵילֶךָ
  english_pob_choice: wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tus riquezas
  - tu poder
  - tus recursos
  lexicon: HALOT
  rationale: En este contexto mercantil, חַיִל puede referirse a riqueza o recursos; «riqueza» mantiene la coherencia contextual con la nota auditada en inglés, sin excluir el matiz potencial de poder.
- source_word: וַיִּגְבַּהּ לְבָבְךָ
  english_pob_choice: your heart became proud
  chosen_spanish: tu corazón se enalteció
  alternatives_spanish:
  - tu corazón se volvió orgulloso
  - tu corazón se elevó
  - tu corazón se ensoberbeció
  lexicon: HALOT
  rationale: El hebreo usa un modismo de elevación del corazón para expresar orgullo. «Se enalteció» conserva la imagen idiomática de elevación y, en español bíblico, comunica soberbia sin perder la metáfora.
- source_word: בְּחֵילֶךָ
  english_pob_choice: because of your wealth
  chosen_spanish: a causa de tu riqueza
  alternatives_spanish:
  - por tu riqueza
  - debido a tu riqueza
  - a causa de tus riquezas
  lexicon: HALOT
  rationale: La preposición ב marca aquí causa u ocasión. «A causa de» explicita esa relación de manera idiomática y precisa.
theological_decisions:
- issue: ¿Conservar la tensión entre 'sabiduría' y el trasfondo de habilidad/prudencia comercial?
  english_pob_reading: wisdom, with commercial context supplying the irony and nuance
  chosen_spanish_reading: sabiduría, con el contexto comercial aportando la ironía y el matiz
  alternative_spanish_readings:
  - habilidad
  - astucia
  rationale: La frase hebrea usa חָכְמָה, que normalmente significa sabiduría; el contexto de Tiro introduce la tensión irónica. Traducir «sabiduría» preserva el núcleo léxico y deja que el contexto haga visible la ironía.
  doctrine_reference: Translation philosophy §1, §5
- issue: ¿Cómo verter el modismo del corazón levantado?
  english_pob_reading: your heart became proud
  chosen_spanish_reading: tu corazón se enalteció
  alternative_spanish_readings:
  - tu corazón se volvió orgulloso
  - tu corazón se elevó
  rationale: La lectura idiomática comunica la soberbia sin borrar la imagen hebrea. «Se enalteció» mantiene una resonancia bíblica y refleja adecuadamente el modismo de exaltación interior.
  doctrine_reference: Translation philosophy §6
- issue: ¿Mantener 'riqueza' para חֵיל en ambos casos?
  english_pob_reading: wealth
  chosen_spanish_reading: riqueza
  alternative_spanish_readings:
  - riquezas
  - recursos
  - poder
  rationale: En el marco mercantil del oráculo, «riqueza» resulta la opción más coherente y publica un sentido amplio sin sobrecargar el verso con una interpretación militar.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del paquete fuente hebreo y del audit trail en inglés; no se identificaron cambios de última revisión que requirieran ajuste adicional, y se mantuvo la solución óptima equivalente con notas para las tensiones léxicas principales.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה y «comercio» para רְכֻלָּה, preservando el contraste irónico del contexto.
  - «Riqueza» se usa de forma consistente para חֵיל, con nota de amplitud semántica.
  - El modismo del corazón elevado se conserva con una formulación natural en español, sin perder su trasfondo figurado.
