translation:
  language: es
  text: 'Entonces dije: «He aquí, he venido[a]; en el rollo del libro está escrito acerca de mí[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Citado en Hebreos 10:7 en relación con el Mesías.
    reason: cross_reference
  - marker: b
    text: O «escrito para mí» o «prescrito para mí». La frase hebrea puede significar lo que está escrito acerca del hablante o lo que le ha sido establecido.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: HALOT
  rationale: Marca la secuencia temporal de la respuesta del hablante; «Entonces» conserva el valor narrativo de אָז con naturalidad en español.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - declaré
  lexicon: HALOT
  rationale: La forma verbal expresa una declaración en primera persona; en español, «dije» mantiene la simplicidad y el tono directo del discurso citado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: El marcador deíctico pide atención inmediata. «Mira» transmite la fuerza exhortativa sin sonar artificial; «He aquí» queda como opción más solemne, pero menos natural en español moderno.
- source_word: בָאתִי
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - he llegado
  - vine
  lexicon: HALOT
  rationale: El perfecto presenta la llegada como hecho relevante en el presente. «He venido» reproduce mejor esa resonancia que un pasado simple.
- source_word: בִּמְגִלַּת סֵפֶר
  english_pob_choice: in the scroll of the book
  chosen_spanish: en el rollo del libro
  alternatives_spanish:
  - en el rollo del escrito
  - en el libro-rollo
  lexicon: HALOT
  rationale: מְגִלָּה es «rollo»; סֵפֶר especifica un documento escrito. «Rollo del libro» conserva la imagen hebrea sin reducirla a «libro» a secas.
- source_word: כָּתוּב
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - escrito está
  lexicon: HALOT
  rationale: El participio pasivo funciona como estado resultante; «está escrito» expresa el valor estativo de manera idiomática en español.
- source_word: עָלַי
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  - para mí
  lexicon: HALOT
  rationale: 'La lectura primaria es relacional: lo escrito trata del hablante. «Acerca de mí» mantiene la ambigüedad documentada entre contenido referido al hablante y posibles matices de prescripción.'
theological_decisions:
- issue: Alcance de כָּתוּב עָלַי en una cita luego aplicada cristológicamente en Hebreos 10:7
  english_pob_reading: about me
  chosen_spanish_reading: acerca de mí
  alternative_spanish_readings:
  - para mí
  - prescrito para mí
  rationale: 'La traducción principal conserva el sentido inmediato del hebreo: algo escrito concerniente al hablante. No se resuelve aquí la lectura cristológica posterior ni se fuerza un sentido de mandato; esa tensión queda abierta, como en el audit trail inglés.'
  doctrine_reference: Preservar la tensión interpretativa sin imponer una lectura dogmática en el versículo.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje base; el texto inglés muestra alta concordancia y se mantiene la lectura principal sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «rollo» para מְגִלָּה y no se lo sustituye por «libro» sin más, para conservar la imagen del original.
  - Se evita resolver en el cuerpo principal la ambigüedad de עָלַי; la alternativa «para mí/prescrito para mí» queda en nota.
  - Se usa puntuación de diálogo española con comillas angulares para un verso poético de discurso directo.
  - Se conserva un registro bíblico digno pero no arcaizante, acorde con el estilo POB en español.
