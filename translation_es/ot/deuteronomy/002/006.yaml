translation:
  language: es
  text: Les comprarán comida con plata, y comerán[a]; y también les comprarán agua con plata, y beberán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más explícita, «para que coman» / «para que beban». La secuencia hebrea puede traducirse más literalmente como «y comerán» / «y beberán», pero en contexto expresa el resultado previsto de comprar las provisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - provisiones
  - algo para comer
  lexicon: HALOT
  rationale: אֹכֶל es un término general para comida/alimento. 'Comida' es natural en español y conserva el sentido amplio, sin limitarse indebidamente a grano.
- source_word: תִּשְׁבְּרוּ
  english_pob_choice: you shall buy
  chosen_spanish: comprarás
  alternatives_spanish:
  - adquirirás
  - pagarás por
  - procurarás
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto comercial, expresa obtener mediante pago. 'Comprarás' comunica con claridad el acto legítimo de adquirir provisiones.
- source_word: מֵאִתָּם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de parte de ellos
  - a ellos
  lexicon: HALOT
  rationale: 'La construcción indica procedencia: Israel debe obtener la comida y el agua de los edomitas, no tomarlos sin compensación.'
- source_word: בַּכֶּסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - por plata
  - con dinero
  lexicon: HALOT
  rationale: '''Plata'' conserva la expresión concreta del hebreo y sigue la decisión auditada en inglés de no sustituirla por una generalización interpretativa como ''dinero''.'
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and you shall eat
  chosen_spanish: y comerás
  alternatives_spanish:
  - y comerán
  - para que comas
  - y así comerás
  lexicon: HALOT
  rationale: 'Aunque el hebreo tiene forma verbal coordinada, el contexto instruccional permite español directo: ''y comerás''. En una edición pública conviene evitar sobreexplicar como finalidad si el hebreo no lo exige explícitamente.'
- source_word: וְגַם
  english_pob_choice: and ... also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - y además
  lexicon: HALOT
  rationale: La partícula añade una instrucción paralela. 'Y también' conserva el valor aditivo y el paralelismo con la primera cláusula.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Equivalente directo y natural en español.
- source_word: תִּכְרוּ
  english_pob_choice: you shall buy
  chosen_spanish: comprarás
  alternatives_spanish:
  - adquirirás
  - obtendrás
  - cavarás
  lexicon: HALOT
  rationale: Aunque el verbo puede significar 'cavar' en otros contextos, aquí el paralelismo con comida y la mención de plata muestran un sentido comercial. 'Comprarás' refleja ese valor contextual.
- source_word: וּשְׁתִיתֶם
  english_pob_choice: and you shall drink
  chosen_spanish: y beberás
  alternatives_spanish:
  - y beberás de él
  - y tomarás
  lexicon: HALOT
  rationale: En paralelo con 'comerás', el verbo final expresa la acción resultante de obtener el agua. 'Beberás' es la equivalencia más natural y fiel.
theological_decisions:
- issue: Forzar o no una lectura de finalidad en los verbos finales
  english_pob_reading: 'The latest English revision chose direct coordination: ''and you shall eat ... and you shall drink'' rather than ''so that you may eat/drink.'''
  chosen_spanish_reading: 'Se mantiene la coordinación directa: ''y comerás; y también comprarás agua ... y beberás.'''
  alternative_spanish_readings:
  - para que comas ... para que bebas
  - y comerás ... y beberás
  rationale: El hebreo coordina las acciones sin añadir explícitamente una cláusula de finalidad. En español, la coordinación directa respeta mejor la sintaxis fuente y evita introducir una interpretación teleológica no marcada.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force legal/moral of payment rather than taking
  english_pob_reading: Israel must pay for provisions rather than take them without compensation.
  chosen_spanish_reading: La fórmula 'con plata' y 'comprarás' deja claro que deben pagarse comida y agua legítimamente.
  alternative_spanish_readings:
  - obtenerás comida y agua
  - recibirás comida y agua
  rationale: 'La elección preserva la fuerza ética y legal del mandato: adquisición con pago, no apropiación gratuita.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una coordinación directa ('and you shall eat/drink') frente a una finalidad explícita. La versión española sigue esa corrección y evita la formulación 'para que comas/bebas'. También se conservó 'plata' para reflejar el concreto hebreo בַּכֶּסֶף.
  spanish_consistency_notes:
  - Se mantuvo 'plata' en lugar de 'dinero' para conservar el colorido léxico del hebreo y la decisión auditada en inglés.
  - Se eligió 'comida'/'agua' como equivalentes naturales y suficientemente amplios.
  - Se evitó 'siervo' o vocabulario eclesiástico no pertinente; el pasaje es legal y narrativo, no litúrgico.
  - La coordinación española sigue de cerca la coordinación hebrea sin sobreinterpretar finalidad.
