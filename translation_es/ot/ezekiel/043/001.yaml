translation:
  language: es
  text: Entonces me llevó a la puerta[a], la puerta que da hacia el oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite «puerta»: «a la puerta, la puerta que da hacia el oriente». La repetición probablemente añade especificidad y énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלִכֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Entonces me trajo
  - Y me llevó
  lexicon: HALOT
  rationale: El Hiphil de הלך con sufijo de 1cs expresa hacer ir/acompañar a alguien. En español, «me llevó» comunica de forma natural el movimiento guiado; «entonces» refleja la secuencia narrativa del wayyiqtol.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional estándar. En español, «a» funciona naturalmente con verbos de movimiento y evita sobrecargar la frase.
- source_word: הַשַּׁעַר / שַׁעַר
  english_pob_choice: the gate / the gate
  chosen_spanish: la puerta / la puerta
  alternatives_spanish:
  - la puerta, la puerta
  lexicon: HALOT
  rationale: El hebreo repite «puerta» en aposición. En español, repetir «la puerta» mantiene la especificación y el énfasis sin sonar innecesariamente rígido.
- source_word: פֹּנֶה
  english_pob_choice: faces
  chosen_spanish: mira
  alternatives_spanish:
  - da al
  - está orientada hacia
  lexicon: HALOT
  rationale: El participio describe orientación. «Mira hacia» es un equivalente natural en español para una apertura o puerta que está orientada en una dirección.
- source_word: דֶּרֶךְ הַקָּדִים
  english_pob_choice: east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La expresión es direccional. «Oriente» conserva el registro bíblico y la referencia geográfica; «hacia el oriente» expresa con claridad la orientación.
theological_decisions:
- issue: Dirección espacial y posible polisemia de קדים
  english_pob_reading: east
  chosen_spanish_reading: oriente
  alternative_spanish_readings:
  - este
  - lado oriental
  rationale: Aquí קדים se entiende como dirección geográfica, no como «viento del oriente». «Oriente» evita ambigüedad y mantiene la orientación espacial del texto.
  doctrine_reference: Ninguna
- issue: Repetición de «puerta» en hebreo
  english_pob_reading: the gate, the gate that faces east
  chosen_spanish_reading: la puerta, la puerta que mira hacia el oriente
  alternative_spanish_readings:
  - la puerta que mira hacia el oriente
  rationale: La repetición del sustantivo en hebreo aporta especificación y énfasis. Se conserva en español para no perder esa tensión retórica.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: El texto sigue de cerca el audio/trazado del POB en inglés, pero adapta la imagen de 'faces east' a una construcción idiomática española («mira hacia el oriente») sin perder la repetición hebrea de «puerta».
  spanish_consistency_notes:
  - Se usa «oriente» por coherencia con el registro bíblico y para evitar la posible ambigüedad de «este» como punto cardinal moderno o como adjetivo.
  - Se mantiene la repetición de «puerta» tanto en el cuerpo como en la nota para reflejar la estructura apposicional del hebreo.
  - No se introduce terminología teológica adicional, ya que el versículo es puramente direccional y espacial.
