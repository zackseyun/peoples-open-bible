review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura genealógica del hebreo: ''Los hijos de Manasés'', ''de Maquir'', ''y Maquir engendró a Galaad'', ''de Galaad''. También refleja correctamente el sentido de ל en la fórmula censal y el verbo הוֹלִיד. Sin embargo, no sigue de manera óptima la decisión auditada de traducir מִשְׁפָּחָה como ''clan'' en este contexto tribal/censal, y ''familia'' debilita esa precisión semántica.'
  spanish_quality_summary: El español es claro y legible, con buen paralelismo. 'Engendró' funciona en registro bíblico digno. No obstante, 'la familia de los maquiritas/galaaditas' suena menos preciso que 'el clan de…' en un censo tribal. La revisión mejora la exactitud sin sacrificar naturalidad.
  glossary_alignment: No hay términos teológicos mayores en juego. Los nombres propios Manasés, Maquir y Galaad son aceptables en español bíblico. La principal desalineación con la filosofía léxica documentada está en מִשְׁפָּחָה, que debe verterse como 'clan' en este capítulo.
  issues:
  - severity: medium
    issue: Uso de 'familia' para מִשְׁפַּחַת
    rationale: En Números 26 el término designa una subdivisión tribal censal, no una familia doméstica. La auditoría inglesa documenta 'clan' como la opción más precisa; en español 'clan' también es natural y exacto.
  revised_spanish_text: 'Los hijos de Manasés: de Maquir, el clan de los maquiritas; y Maquir engendró a Galaad; de Galaad, el clan de los galaaditas.'
  revision_rationale: Se reemplaza 'familia' por 'clan' en ambas ocurrencias para reflejar con precisión מִשְׁפָּחָה en el contexto tribal y alinearse con la decisión léxica auditada. No se requieren notas al pie, ya que la revisión elimina la ambigüedad sin introducir nuevas dificultades.
