  text: '그러자 장로 중 한 사람이 나에게 말하였습니다. 「울지 말라. 보라, 유다 지파에서 난 사자, 곧 다윗의 뿌리가 이기셨으니[a], 두루마리와 그 일곱 인을 펴실 수 있다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「승리하셨으니」. 헬라어 동사는 계시록의 핵심어인 승리 동사이다.'
    reason: lexical_alternative
