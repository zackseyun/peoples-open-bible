translation:
  language: es
  text: '«Hijo de hombre[a], habla a los hijos de tu pueblo y diles: “Si yo traigo una espada sobre una tierra, y el pueblo de la tierra toma de entre ellos a un hombre y lo pone como su centinela,”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si yo traigo la espada sobre una tierra». El hebreo usa «espada» como imagen convencional de guerra o juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hombre mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conservo el vocativo tradicional y literario que corresponde al uso de Ezequiel. «Hijo de hombre» reproduce la forma idiomática sin neutralizarla, y mantiene la función de apelación profética individual.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - declara
  - di
  lexicon: HALOT
  rationale: Es un imperativo directo y simple. «Habla» es natural en español y conserva el tono inmediato del mandato.
- source_word: בְּנֵי עַמְּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu pueblo
  - los hijos de tu gente
  lexicon: HALOT
  rationale: El hebreo es explícitamente plural masculino y filial. «Hijos» conserva esa forma sin borrar la referencia colectiva; «tu pueblo» sería una nivelación menos precisa.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - un país
  - la tierra
  lexicon: HALOT
  rationale: Como no lleva artículo y funciona en un escenario hipotético, «una tierra» expresa bien el caso general. «Tierra» preserva mejor el registro bíblico que «país».
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce una situación condicional, no causal. «Si» refleja mejor la fuerza hipotética del pasaje.
- source_word: אָבִיא עָלֶיהָ חָרֶב
  english_pob_choice: I bring a sword upon a land
  chosen_spanish: yo trajera una espada sobre una tierra
  alternatives_spanish:
  - yo trajera la espada sobre ella
  - yo trajera guerra sobre ella
  lexicon: HALOT
  rationale: Conservo «espada» como imagen concreta convencional de guerra o juicio, tal como lo hace el POB en inglés. En español, el subjuntivo dentro de la condición queda natural como «trajera».
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: La expresión es colectiva y estándar. «Pueblo de la tierra» mantiene la estructura hebrea sin sonar forzada en español.
- source_word: אִישׁ אֶחָד
  english_pob_choice: one man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un solo hombre
  lexicon: HALOT
  rationale: El hebreo marca singular masculino. «Un hombre» conserva ese rasgo de género y número, y es más fiel que «una persona».
- source_word: מִקְצֵיהֶם
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de entre su número
  - desde sus extremos
  lexicon: HALOT
  rationale: Aunque el sustantivo puede aludir literalmente a «extremos», en este giro significa seleccionar a uno del grupo. «De entre ellos» comunica el sentido idiomático natural.
- source_word: וְנָתְנוּ אֹתוֹ לָהֶם לְצֹפֶה
  english_pob_choice: appoint him as their watchman
  chosen_spanish: lo pusieran para ellos como centinela
  alternatives_spanish:
  - lo nombraran como su centinela
  - lo designaran como vigilante
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «dar/poner». En español, «poner para ellos como centinela» conserva la acción de asignación y el rol de vigilancia. «Centinela» es adecuado y claro en este contexto profético.
theological_decisions:
- issue: Imagen de la espada como juicio o guerra
  english_pob_reading: The Hebrew 'sword' is a conventional image for warfare or judgment.
  chosen_spanish_reading: «Espada» se mantiene como imagen convencional de guerra o juicio, no se interpreta como «guerra».
  alternative_spanish_readings:
  - guerra
  - castigo
  rationale: La frase hebrea usa un símbolo concreto que el lector debe percibir. Traducirlo por «guerra» explicaría la imagen, pero borraría la metáfora. Mantener «espada» preserva la tensión literaria y profética.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
- issue: Lenguaje masculino representativo
  english_pob_reading: Retain 'sons' and 'man' where the Hebrew is explicitly masculine
  chosen_spanish_reading: Se conservan «hijos» y «un hombre» porque el hebreo es explícitamente masculino.
  alternative_spanish_readings:
  - tu pueblo
  - una persona
  rationale: El texto fuente marca género masculino en בני y איש. La traducción española mantiene esa marca sin impedir que el lector entienda el alcance colectivo del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente sin cambios sustantivos: el acuerdo de revisión fue alto y no se registraron correcciones. Se mantiene la solución óptima con conservación de la metáfora de la espada, del vocativo profético y del lenguaje masculino explícito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Centinela» se conserva para צֹפֶה, en coherencia con el campo semántico de vigilia profética en Ezequiel.
  - Se mantiene el orden natural del español con subjuntivo condicional («Si yo trajera...») sin añadir contenido interpretativo.
