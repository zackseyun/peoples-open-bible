    rationale: El participio συνεργοῦντες puede expresarse más naturalmente como «colaborando con», que preserva la cooperación activa sin rigidez innecesaria.
  - severity: low
    issue: La nota al pie puede simplificarse y naturalizarse
    rationale: «trabajos/obras santas» dentro de la nota se siente indeciso; conviene presentar alternativas limpias y una explicación más fluida.
