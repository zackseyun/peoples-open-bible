    text: O 'ser viviente' para 'criatura viviente'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'toda carne', un modismo para criaturas vivas de carne.
    reason: cultural_note
  revision_rationale: Se reemplaza 'ser viviente' por 'criatura viviente' por mayor naturalidad; se mantiene la amplitud mediante nota léxica. Se corrige 'dos de cada especie' a 'dos de cada una' para evitar una precisión taxonómica no explícita en el hebreo. Se conserva 'toda carne' con nota, ajustando 'idiomatismo' a 'modismo' para español más natural. Se reordena la cláusula final a 'serán macho y hembra' para mejor legibilidad, preservando plenamente el sentido fuente.
