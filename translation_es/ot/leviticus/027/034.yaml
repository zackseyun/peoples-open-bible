translation:
  language: es
  text: Estos son los mandamientos que Yahvé mandó a Moisés para los hijos de Israel[a] en el monte Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hijos de Israel» o «para los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una conclusión resumidora; en español, «Estas son» mantiene la función discursiva natural y explícita.
- source_word: הַמִּצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: las mandamientos
  alternatives_spanish:
  - los mandamientos
  - los preceptos
  - los mandatos
  lexicon: HALOT
  rationale: Se busca conservar la fuerza legal de מִצְוֹת como mandamientos. La forma esperable en español es «los mandamientos»; se anota la variante para dejar visible la concordancia de género en el sustantivo original y su ajuste idiomático en español.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: «Mandó» reproduce con claridad el valor verbal de imponer/expedir mandatos y mantiene la conexión léxica con «mandamientos» sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el hebreo, siguiendo la norma del proyecto para יְהוָה, con la forma española de uso amplio «Yahvé».
- source_word: אֶל מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La partícula אֶת/אֶל en este contexto requiere una construcción natural en español; «a Moisés» refleja de manera directa la relación verbal de destinatario del mandato.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - para los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión masculina plural del hebreo («hijos de Israel») siguiendo la política de precisión de género del proyecto, y se usa «para» porque el mandato va encaminado a su comunicación y aplicación a Israel.
- source_word: בְּהַר סִינָי
  english_pob_choice: at Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - en el monte de Sinaí
  - en Sinaí
  lexicon: HALOT
  rationale: La ubicación se expresa de modo natural en español con «en el monte Sinaí», equivalente funcional de la fórmula locativa hebrea y del inglés auditado.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La traducción conserva el nombre propio del pacto en lugar de sustituirlo por un título, conforme al criterio del POB. En español, «Yahvé» es la forma más establecida y legible para la audiencia objetivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Fuerza colectiva de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se mantiene la expresión genealógica y masculina del hebreo, sin neutralizarla, porque el texto funciona como designación representativa del pueblo del pacto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: fórmula conclusiva, uso del nombre divino, y la relación de destinatario hacia Israel. No hay revisiones aplicadas en la fuente inglesa; la propuesta española sigue esa misma lectura sin introducir cambios sustantivos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrama.
  - Se usa «Moisés» y no una perífrasis, por corresponder al objeto directo/relacional del verbo mandar en español.
  - La nota de pie conserva la alternativa de dirección semántica de אֶל (a/para) reflejada en el inglés auditado.
  - Se prefirió «en el monte Sinaí» por ser la formulación más natural y fiel en español bíblico moderno.
