  glossary_alignment: No hay conflictos con los términos globales del proyecto. La revisión propuesta mejora la alineación con la decisión lexical auditada para כֹּהֵן הָרֹאשׁ al preferir «sacerdote principal» sobre «sumo sacerdote», dejando esta última como alternativa válida en nota. El resto del vocabulario está bien alineado.
