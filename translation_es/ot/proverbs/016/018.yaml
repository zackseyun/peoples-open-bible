    rationale: El hebreo גֹּבַהּ רוּחַ puede verterse con más naturalidad como «un espíritu altivo», que conserva el antropológico «espíritu» y el matiz moral negativo, además de alinearse mejor con la decisión inglesa «a haughty spirit».
  - severity: low
