translation:
  language: es
  text: 'Les habló conforme al consejo de los jóvenes, diciendo: «Mi padre hizo pesado el yugo de ustedes, y yo añadiré a su yugo. Mi padre los disciplinó con látigos, pero yo los disciplinaré con escorpiones[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «con látigos de escorpión», es decir, látigos con puntas agudas o púas; el hebreo dice literalmente «con escorpiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: He spoke
  chosen_spanish: Habló
  alternatives_spanish:
  - Dijo
  - Les habló
  lexicon: HALOT
  rationale: דבר en piel se traduce naturalmente como ‘hablar’. ‘Habló’ conserva el valor verbal sin convertirlo en una respuesta interpretativa más explícita que el hebreo.
- source_word: כַּעֲצַת
  english_pob_choice: according to the advice of
  chosen_spanish: conforme al consejo de
  alternatives_spanish:
  - según el consejo de
  - de acuerdo con el consejo de
  lexicon: HALOT
  rationale: עֵצָה es ‘consejo’/‘asesoramiento’. ‘Conforme al consejo de’ reproduce היטב la relación comparativa de כ y suena natural en español bíblico contemporáneo.
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes consejeros
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse literalmente como ‘los niños’, el contraste narrativo es con los ancianos consejeros. ‘Los jóvenes’ preserva esa identidad social sin volver la frase infantil en español.
- source_word: הִכְבִּיד
  english_pob_choice: made ... heavy
  chosen_spanish: hizo pesado
  alternatives_spanish:
  - hizo más pesado
  - volvió pesado
  lexicon: HALOT
  rationale: El hiphil de כבד expresa ‘hacer pesado’. ‘Hizo pesado’ mantiene la imagen concreta del yugo y evita abstraerla como simple ‘opresión’.
- source_word: עֻלְּכֶם
  english_pob_choice: your yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su carga
  - vuestro yugo
  lexicon: HALOT
  rationale: 'עוֹל es literalmente ‘yugo’. En español, el posesivo se ajusta al discurso directo: ‘su yugo’ se entiende naturalmente como el yugo puesto sobre los oyentes; se conserva la imagen agrícola-política.'
- source_word: וַאֲנִי אֹסִיף עַל
  english_pob_choice: and I will add to
  chosen_spanish: y yo añadiré a
  alternatives_spanish:
  - y yo aumentaré
  - y yo pondré más sobre
  lexicon: HALOT
  rationale: יסף עם על significa ‘añadir a’. ‘Añadiré a’ sigue el giro hebreo y deja que la imagen del yugo siga operando sin sobreexplicarla.
- source_word: יִסַּר / אֲיַסֵּר
  english_pob_choice: disciplined / will discipline
  chosen_spanish: disciplinó / disciplinaré
  alternatives_spanish:
  - castigó / castigaré
  - corrigió / corregiré
  lexicon: HALOT
  rationale: יסר puede abarcar corrección, disciplina y castigo. ‘Disciplinó/disciplinaré’ conserva ese campo semántico amplio y refleja la decisión del POB inglés de no reducirlo a mera punición.
- source_word: בַּשּׁוֹטִים
  english_pob_choice: with whips
  chosen_spanish: con azotes
  alternatives_spanish:
  - con látigos
  - con correas
  lexicon: HALOT
  rationale: שׁוֹט designa un látigo/azote. ‘Con azotes’ es idiomático en español y mantiene el carácter de castigo corporal que el hebreo comunica.
- source_word: בָּעַקְרַבִּים
  english_pob_choice: with scorpions
  chosen_spanish: con escorpiones
  alternatives_spanish:
  - con látigos de escorpiones
  - con azotes de puntas afiladas
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘con escorpiones’. Se conserva la imagen concreta en el texto principal, como hace el POB inglés, y se deja la posible referencia idiomática para nota.
theological_decisions:
- issue: Imagen de ‘escorpiones’ en el castigo
  english_pob_reading: Retain the literal image 'scorpions' in the main text
  chosen_spanish_reading: Conservar ‘escorpiones’ en el texto principal
  alternative_spanish_readings:
  - ‘látigos de escorpión’
  - ‘azotes con púas’
  rationale: 'No hay una disputa doctrinal aquí, pero sí una tensión léxica: el hebreo usa el sustantivo concreto ‘escorpiones’. Mantener la literalidad preserva la transparencia al original y evita resolver prematuramente una posible expresión idiomática.'
  doctrine_reference: Principio de primacía del texto original; preservar ambigüedad léxica cuando existe
- issue: Valor de יִסַּר / אֲיַסֵּר
  english_pob_reading: discipline / will discipline
  chosen_spanish_reading: disciplinó / disciplinaré
  alternative_spanish_readings:
  - castigó / castigaré
  - corrigió / corregiré
  rationale: En este contexto real, el verbo puede implicar castigo severo, pero el POB inglés eligió ‘discipline’ para no estrechar el sentido. ‘Disciplinó’ conserva la amplitud semántica y la tensión entre corrección y severidad.
  doctrine_reference: 'Criterio léxico-semantico: no reducir la polisemia del verbo hebreo'
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que cambió el primer contraste de ‘but’ a ‘and’ para reflejar mejor la conjunción hebrea. Por eso la primera cláusula final queda coordinada con ‘y’, mientras que el segundo miembro mantiene ‘pero’ para el contraste natural entre ‘whips’ y ‘scorpions’.
  spanish_consistency_notes:
  - Se mantuvo ‘yugo’ de manera literal para preservar la metáfora política y laboral.
  - ‘Disciplinó/disciplinaré’ sigue la elección auditada del POB inglés y evita reducir יסר a solo castigar.
  - ‘Escorpiones’ se conserva en el texto principal, con nota explicativa para la posible lectura idiomática.
  - Se evitó ‘SEÑOR’ o fórmulas eclesiásticas no presentes en el versículo; no hay nombres divinos en este texto.
