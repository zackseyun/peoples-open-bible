translation:
  language: es
  text: Ahora mis ojos estarán abiertos y mis oídos atentos a la oración de este lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la oración ofrecida en este lugar' o 'a la oración que proviene de este lugar'. El hebreo, más literalmente, dice 'a la oración de este lugar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Desde ahora
  - Ahora mismo
  lexicon: HALOT
  rationale: Adverbio temporal natural en español para marcar el cambio de situación introducido por el contexto inmediato. Conserva la fuerza de presente/resultante sin añadir una expansión innecesaria.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mis miradas
  - yo miraré
  lexicon: HALOT
  rationale: Se mantiene la imagen antropomórfica de la atención divina, como en el texto fuente y en la decisión auditada del inglés.
- source_word: יִהְיוּ פְתֻחוֹת
  english_pob_choice: will be open
  chosen_spanish: estarán abiertos
  alternatives_spanish:
  - serán abiertos
  - quedarán abiertos
  lexicon: HALOT
  rationale: La construcción futura/estativa se expresa con una forma natural en español. 'Estarán abiertos' preserva el estado continuo sin perder claridad.
- source_word: וְאָזְנַי
  english_pob_choice: and my ears
  chosen_spanish: y mis oídos
  alternatives_spanish:
  - y mis orejas
  lexicon: HALOT
  rationale: Se conserva el paralelismo literal con 'mis ojos' y la imagen corporal de la percepción divina.
- source_word: קַשֻּׁבוֹת
  english_pob_choice: attentive
  chosen_spanish: atentos
  alternatives_spanish:
  - atentas
  - escuchando
  lexicon: HALOT
  rationale: '''Atentos'' comunica bien la idea de escucha vigilante y mantiene el paralelismo con ''abiertos''. En español suena natural y digno.'
- source_word: לִתְפִלַּת
  english_pob_choice: to the prayer
  chosen_spanish: a la oración
  alternatives_spanish:
  - a la plegaria
  - para la oración
  lexicon: HALOT
  rationale: '''Oración'' es el equivalente más directo y amplio en español. La preposición ''a'' refleja la orientación del verbo/adjetivo hacia esa oración.'
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: of this place / offered in this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - de este sitio
  - ofrecida en este lugar
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la oración de este lugar'. 'De este lugar' conserva la construcción sin introducir una paráfrasis que exceda el texto; la lectura contextual de oración asociada al templo queda implícita, como en el audit trail inglés.
theological_decisions:
- issue: Antropomorfismo en la atención divina
  english_pob_reading: Preserve 'my eyes' and 'my ears' literally
  chosen_spanish_reading: Conservar 'mis ojos' y 'mis oídos' literalmente
  alternative_spanish_readings:
  - Dios me atenderá
  - vigilaré y escucharé
  rationale: Se mantiene la metáfora corporal del original, evitando una abstracción que debilitaría la fuerza relacional y pactual del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre 'la oración de este lugar' y la oración ofrecida en el templo
  english_pob_reading: The Hebrew more literally reads 'to the prayer of this place.'
  chosen_spanish_reading: '''A la oración de este lugar'' con nota sobre el sentido contextual'
  alternative_spanish_readings:
  - a la oración ofrecida en este lugar
  - a la oración que proviene de este lugar
  rationale: El texto hebreo es formalmente posesivo; el español conserva esa forma y deja la interpretación contextual para la nota, sin borrar la tensión lexical documentada.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa revisada añadió 'offered in' para sonar más natural, pero el hebreo sigue siendo literalmente 'la oración de este lugar'. Por eso el español principal conserva la construcción posesiva 'de este lugar' y ofrece en nota la alternativa contextual equivalente, sin imponer una paráfrasis como texto base.
  spanish_consistency_notes:
  - Se mantiene 'oración' para תְפִלָּה, alineado con el registro bíblico y con el valor amplio del término en español.
  - Se conserva la metáfora corporal 'ojos/oídos' para no neutralizar la imagen divina del texto.
  - '''Este lugar'' se usa de manera consistente para הַמָּקוֹם הַזֶּה, evitando términos más litúrgicos que no están en el hebreo.'
