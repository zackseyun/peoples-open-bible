translation:
  language: es
  text: Sé que por causa de estas cosas estos males me han sobrevenido[a], y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego proporcionado para este versículo está incompleto y termina con καὶ; por eso se conserva la conjunción final en español sin completar la frase.
