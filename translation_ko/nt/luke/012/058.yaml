  text: 「네가 너를 고발하는 자와 함께 관원에게 갈 때에 길에서 그와 화해하기를 힘쓰라. 그가 너를 재판관에게 끌고 가고, 재판관이 너를 옥리에게 넘기고, 옥리가 너를 옥에 가둘까 두렵다.」
