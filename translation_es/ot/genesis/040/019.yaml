translation:
  language: es
  text: Dentro de tres días más, Faraón te alzará la cabeza[a] de encima de ti y te colgará en un árbol[b], y las aves comerán tu carne de encima de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «alzará tu cabeza de encima de ti». La expresión conserva el modismo y el juego de palabras con el uso favorable de la misma fórmula en el versículo anterior; aquí implica la remoción de la cabeza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te colgará en madera» / «te empalará en un poste». El hebreo dice literalmente «en un árbol».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעוֹד שְׁלֹשֶׁת יָמִים
  english_pob_choice: In three more days
  chosen_spanish: Dentro de tres días más
  alternatives_spanish:
  - En tres días
  - Dentro de tres días
  lexicon: HALOT
  rationale: La expresión marca un intervalo que aún queda antes del evento. «Dentro de tres días más» conserva ese valor temporal con naturalidad en español y refleja el matiz de espera del hebreo.
- source_word: יִשָּׂא ... אֶת רֹאשְׁךָ
  english_pob_choice: will lift up your head
  chosen_spanish: te alzará la cabeza
  alternatives_spanish:
  - te levantará la cabeza
  - te alzará la cabeza de sobre ti
  lexicon: HALOT
  rationale: El hebreo mantiene una expresión idiomática que, en este contexto, funciona con ironía sombría. «Te alzará la cabeza» conserva el eco verbal; se añade «de sobre ti» para reflejar el complemento repetido en el hebreo y evitar suavizar la imagen.
- source_word: מֵעָלֶיךָ
  english_pob_choice: from upon you
  chosen_spanish: de sobre ti
  alternatives_spanish:
  - de encima de ti
  - de ti
  lexicon: HALOT
  rationale: Se conserva la imagen espacial repetida del hebreo. «De sobre ti» es más literal que «de encima de ti» y mantiene la fuerza de la frase en el marco de la ejecución.
- source_word: וְתָלָה אוֹתְךָ עַל עֵץ
  english_pob_choice: and hang you on a tree
  chosen_spanish: y te colgará de un árbol
  alternatives_spanish:
  - y te colgará en un árbol
  - y te colgará en madera
  lexicon: HALOT
  rationale: «Colgar» reproduce el sentido de תלה. «Árbol» preserva la forma léxica de עֵץ y el vínculo intertextual del texto, sin imponer una paráfrasis más interpretativa como «madero» o «poste» en el cuerpo principal.
- source_word: וְאָכַל הָעוֹף
  english_pob_choice: and the birds will eat
  chosen_spanish: y las aves comerán
  alternatives_spanish:
  - y las aves devorarán
  - y los pájaros comerán
  lexicon: HALOT
  rationale: «Aves» comunica bien el colectivo hebreo הָעוֹף en español bíblico contemporáneo y evita un tono demasiado coloquial. «Comerán» es la equivalencia más directa de אכל.
- source_word: אֶת בְּשָׂרְךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tu carne
  lexicon: HALOT
  rationale: «Carne» traduce בשר con precisión y conserva la crudeza de la escena. «Cuerpo» suavizaría el efecto; «carne» mantiene la concreción física del hebreo.
- source_word: מֵעָלֶיךָ
  english_pob_choice: from upon you
  chosen_spanish: de sobre ti
  alternatives_spanish:
  - de encima de ti
  - de ti
  lexicon: HALOT
  rationale: La repetición final de la misma imagen espacial en el hebreo se preserva para mantener el tono severo y la escena de despojo del cuerpo.
theological_decisions:
- issue: Conservar la ironía del giro respecto de la expresión positiva anterior sin explicarla en exceso
  english_pob_reading: Preserve the Hebrew wordplay and brutality with 'lift up your head from upon you' and 'hang you on a tree.'
  chosen_spanish_reading: Conservar el juego de palabras y la dureza con «te alzará la cabeza de sobre ti» y «te colgará de un árbol».
  alternative_spanish_readings:
  - «te decapitará y colgará tu cuerpo en un poste»
  - «te levantará la cabeza» sin el complemento espacial
  rationale: La frase hebrea es intencionalmente ambigua e irónica; el sentido no debe resolverse por completo en una explicación explícita que borre el paralelismo con el versículo anterior. La redacción elegida mantiene la tensión entre el modismo y la escena de ejecución.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente y no requiere cambios sustanciales; se conserva el valor idiomático del hebreo y la imaginería de ejecución sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Faraón» como nombre propio tradicional y transparente.
  - Se prefirió «carne» para בשר, en continuidad con el estilo del POB cuando la crudeza semántica es relevante.
  - Se empleó «aves» para הָעוֹף por su registro bíblico neutral en español y su claridad colectiva.
