    reason: lexical_alternative
  - marker: b
    text: O 'delante de'. El giro marca la postura reverente en relación con Dios.
    reason: lexical_alternative
  - marker: c
    text: O 'su reino no será arruinado' o 'no perecerá'. El verbo apunta a ruina o destrucción del reino.
    reason: lexical_alternative
