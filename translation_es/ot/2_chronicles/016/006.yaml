translation:
  language: es
  text: Entonces el rey Asa tomó[a] a todo Judá, y ellos se llevaron las piedras de Ramá y su madera, materiales que Baasa había usado para edificar[b]; y con ellos edificó Geba y Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reunió/movilizó a todo Judá'; literalmente 'tomó a todo Judá'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las piedras y la madera que Baasa había usado para edificar Ramá.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַח אֶת כָּל יְהוּדָה
  english_pob_choice: took all Judah
  chosen_spanish: tomó[a] a todo Judá
  alternatives_spanish:
  - reunió a todo Judá
  - movilizó a todo Judá
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice 'tomó a todo Judá'. En contexto, el sentido es que Asa movilizó al pueblo para la tarea, pero 'tomó' conserva la fuerza del hebreo sin perder inteligibilidad. El acusativo personal/directo se expresa naturalmente en español con 'a'.
- source_word: וַיִּשְׂא֞וּ
  english_pob_choice: they carried away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - llevaron
  - cargaron y retiraron
  lexicon: HALOT
  rationale: El verbo puede expresar levantar y transportar materiales. 'Se llevaron' comunica bien la acción de retirar las piedras y la madera de Ramá en un español natural, sin añadir una idea ajena al texto.
- source_word: אַבְנֵי הָרָמָה
  english_pob_choice: the stones of Ramah
  chosen_spanish: las piedras de Ramá
  alternatives_spanish:
  - las piedras de Ramá
  - las piedras de la fortaleza de Ramá
  lexicon: HALOT
  rationale: Se conserva la relación posesiva del constructo con el lugar. 'De Ramá' es fiel y claro en español; no hace falta explicitar 'fortaleza' porque el texto no lo dice aquí.
- source_word: עֵצֶיהָ
  english_pob_choice: its timber
  chosen_spanish: su madera
  alternatives_spanish:
  - su madera de construcción
  - sus maderos
  lexicon: HALOT
  rationale: '''Madera'' es el equivalente más natural y suficientemente amplio para el material de construcción. ''Madera de construcción'' sería más explicativo, pero el hebreo solo indica el material; no conviene precisar más de lo debido.'
- source_word: אֲשֶׁר בָּנָה בַּעְשָׁא
  english_pob_choice: with which Baasha had built
  chosen_spanish: con la cual Baasa había edificado
  alternatives_spanish:
  - con la que Baasa había construido
  - que Baasa había usado para edificar
  lexicon: HALOT
  rationale: La relativa se entiende mejor como referida a las piedras y la madera, es decir, a los materiales con que Baasa había levantado Ramá. 'Había edificado' mantiene un registro digno y cercano al hebreo sin forzar un término técnico distinto.
- source_word: וַיִּ֣בֶן בָּ/הֶ֔ם
  english_pob_choice: and he built with them
  chosen_spanish: con ellas edificó
  alternatives_spanish:
  - edificó con ellas
  - y con ellas construyó
  lexicon: HALOT
  rationale: El sujeto es Asa; el pronombre plural se refiere a los materiales recuperados. 'Edificó' preserva la idea básica de construir sin introducir explícitamente 'fortificó', que sería interpretativo aunque el contexto lo sugiera.
- source_word: גֶּבַע
  english_pob_choice: Geba
  chosen_spanish: Geba
  alternatives_spanish:
  - Geba
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: הַמִּצְפָּה
  english_pob_choice: Mizpah
  chosen_spanish: Mizpa
  alternatives_spanish:
  - Mizpa
  - la Mizpa
  lexicon: HALOT
  rationale: En español, la forma más transparente y usual del topónimo es 'Mizpa'. Se omite el artículo por ser normal en nombres de lugar.
theological_decisions:
- issue: Alcance de 'tomó' en 'tomó a todo Judá'
  english_pob_reading: The English POB keeps 'took all Judah' while noting the idiom can mean summoned/enlisted Judah.
  chosen_spanish_reading: '''Tomó a todo Judá'' se conserva como giro literal, con la idea contextual de movilización sin explicitarla en el texto principal.'
  alternative_spanish_readings:
  - reunió a todo Judá
  - movilizó a todo Judá
  rationale: El hebreo permite una lectura idiomática, pero el POB inglés retuvo la literalidad para no perder la expresión original. En español, 'tomó' es comprensible y preserva esa tensión; las alternativas explican el sentido contextual sin reemplazarlo de forma total.
  doctrine_reference: No aplica; decisión de registro y fidelidad textual.
- issue: Relación de 'con la cual Baasa había edificado' con los materiales
  english_pob_reading: The English POB footnote clarifies that the stones and timber are the materials Baasha had used to build up Ramah.
  chosen_spanish_reading: La relativa se entiende como referida a las piedras y la madera, no solo a uno de los elementos.
  alternative_spanish_readings:
  - con lo cual Baasa había edificado
  - con los cuales Baasa había construido
  rationale: El hebreo admite que la cláusula relativa modifique el conjunto de materiales. La redacción española mantiene esa referencia amplia y no reduce indebidamente la frase a una sola parte.
  doctrine_reference: No aplica; precisión sintáctica y semántica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvieron las decisiones de literalidad controlada en ''tomó a todo Judá'', ''piedras de Ramá'', ''su madera'', y la lectura material de la relativa ''con la cual Baasa había edificado''. También se respetó la preferencia por transliterar los topónimos y no introducir ''fortificó'' en el verbo final.'
  spanish_consistency_notes:
  - Se usa 'Judá' como designación del reino/pueblo, siguiendo el valor colectivo del hebreo.
  - '''Mizpa'' se prefiere a ''Mizpá'' por consistencia con topónimos bíblicos de uso hispano neutral; se mantiene la acentuación solo si la línea editorial lo exigiera, pero aquí la forma sin tilde resulta más estándar en listas bíblicas.'
  - Se evitó 'SEÑOR' para el nombre divino porque este versículo no lo contiene.
  - '''edificó'' se usa en sentido de construir/levantar una obra; no se añadió ''fortificó'' para no desplazar el verbo hebreo.'
