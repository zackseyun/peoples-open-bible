review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del arameo: autorización personal del rey, emisión de un decreto, destinatarios administrativos, identificación de Esdras y mandato de cumplimiento exacto. Sin embargo, hay dos desajustes auditables: (1) el nombre propio aparece como «Ezra» en vez de la forma española normal «Esdras»; (2) las notas al pie están invertidas respecto de la evidencia inglesa y además la nota [a] está anclada al sintagma regional cuando en la auditoría inglesa la nota de alternativa léxica corresponde al mandato final de cumplimiento exacto, mientras que la nota cultural corresponde a «Beyond the River».'
  spanish_quality_summary: El español es claro y digno, pero conviene mejorar la naturalidad administrativa con «a todos los tesoreros» en vez de «para todos los tesoreros». «De parte de mí» es comprensible, aunque «de mí»/«por mí» sería menos natural; puede mantenerse. El uso de «Más Allá del Río» es aceptable como título administrativo con nota cultural. La puntuación y el registro general son buenos.
  glossary_alignment: 'No hay conflicto con terminología teológica principal. «Dios del cielo» está bien para אֱלָהּ שְׁמַיָּא. La principal falta de alineación léxica es onomástica: Ἐσδρας/עֶזְרָא en español bíblico estándar debe ser «Esdras», no «Ezra». También debe preservarse correctamente la racionalidad documentada de אָסְפַּרְנָא mediante nota de alternativa léxica anclada a «exactamente».'
  issues:
  - severity: medium
    issue: Uso de «Ezra» en vez de «Esdras»
    rationale: En una Biblia en español eclesial y de lectura amplia, la forma establecida y natural del nombre es «Esdras». Mantener «Ezra» suena anglicado y rompe la legibilidad/tradición española sin apoyo del source ni de la auditoría inglesa.
  - severity: medium
    issue: Notas al pie invertidas y anclaje incorrecto
    rationale: La nota cultural debe ir en «Más Allá del Río», y la nota léxica sobre la exactitud del cumplimiento debe ir en «exactamente». El borrador pone [a] en la región pero con el contenido cultural correcto, y [b] en «les pida» con contenido que en realidad explica «exactamente». Eso no preserva fielmente la auditoría inglesa ni la disciplina de anclaje.
  - severity: low
    issue: «para todos los tesoreros» suena menos preciso que «a todos los tesoreros»
    rationale: El decreto se dirige a destinatarios concretos; «a todos los tesoreros» refleja mejor el complemento del acto de promulgar/emitir un decreto en español administrativo.
  revised_spanish_text: 'Y de parte de mí, yo, el rey Artajerjes, promulgo un decreto a todos los tesoreros de Más Allá del Río[a]: todo lo que Esdras, el sacerdote, el escriba de la ley del Dios del cielo, les pida, que se haga exactamente[b].'
  revised_footnotes:
