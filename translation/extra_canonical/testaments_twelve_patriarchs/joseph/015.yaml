  text: (XIV continued.) 4. *Ἤθελε γὰρ ὁρᾶν με²⁴ ἐν πόθῳ ⌈ἁμαρτίας⌉²⁵. *ἐγὼ δὲ²⁶ ἠγνόουν ἐν²⁷ πᾶσι τούτοις²⁸. 5. *Εἶπε δὲ πρὸς αὐτήν²⁹· Οὐκ ἐστὶ *τοῦτο τοῖς³⁰ Αἰγυπτίοις πρὸ ἀποδείξεως ἀφαιρεῖσθαι τὰ ἀλλότρια. 6. Ταῦτα ⌜οὖν⌉³¹ εἶπε *περὶ τοῦ μεταβόλου³². *Ὁ δὲ παῖς³³ *ὀφείλει ἐγκατάκλειστος εἶναι³⁴. XV. Μετὰ δὲ¹ *ἡμέρας εἰκοσιτέσσαρας² ἦλθον οἱ Ἰσμαηλῖται· *ἦσαν γὰρ³ ἀκούσαντες⁴ ὅτι Ἰακὼβ ⌜ὁ πατήρ μου πολλὰ⁵⌉ πενθεῖ περὶ ἐμοῦ⁶, *καὶ ἐλθόντες λέγουσι⁷ πρὸς με. 2. Τί ὅτι εἶπας σεαυτὸν⁸ *δοῦλον εἶναι⁹; καὶ ἰδοὺ ⌜ἡμεῖς⌉¹⁰ ἐγνώκαμεν¹¹ ὅτι *υἱὸς εἰ ἀνδρὸς μεγάλου¹² ἐν γῇ¹³ Χαναάν, καὶ *ὁ πατήρ σου ⌜ἔτι⌉ πενθεῖ περί σου¹⁴ *ἐν σάκκῳ ⌜καὶ σποδῷ⌉¹⁵. 3. *Ταῦτα ἀκούσας ἐγὼ διελύθη τὰ σπλάγχνα μου, καὶ ἡ καρδία μου ἐτάκη, καὶ ἤθελον δακρῦσαι πάνυ¹⁶, ἀλλ'¹⁷ ἐπέσχον ἐμαυτόν¹⁸, ἵνα μὴ αἰσχύνω¹⁹ τοὺς ἀδελφούς μου, ⌜*καὶ εἶπον αὐτοῖς²⁰ Ἐγὼ οὐκ οἶδα·²¹ δοῦλός εἰμι⌉. 4. Τότε ⌜οὖν⌉²² ἐβουλεύσαντο²³ πωλῆσαί με, ἵνα μὴ εὑρεθῶ ἐν *ταῖς χερσὶν αὐτῶν²⁴. 5. Ἐφόβουντο γὰρ τὸν *πατέρα μου²⁵, ἵνα μὴ *ἐλθὼν ἐν αὐτοῖς ποιήσῃ²⁶ ἐκδίκησιν κινδύνου²⁷. ἤκουον²⁸ γὰρ ὅτι μέγας ἐστὶ παρὰ Θεῷ²⁹ καὶ³⁰ ἀνθρώποις. 6. Τότε λέγει *αὐτοῖς ὁ μετάβολος³¹· Λύσατέ με ἀπὸ τῆς κρίσεως τοῦ³² Πεντεφρί³³. 7. *Ἐκεῖνοι δὲ προσελθόντες³⁴ ᾔτουν³⁵ με³⁶ λέγοντες· ⌜Εἰπὲ⌉³⁷ ὅτι ἐν ἀργυρίῳ ἠγοράσθης³⁸ ἡμῖν, *κἀκεῖνος ἀπολῦσαι ἡμᾶς ἔχει³⁹.
