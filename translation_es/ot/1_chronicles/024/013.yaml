lexical_decisions:
- source_word: לְ/חֻפָּה
  english_pob_choice: for Huppah
  chosen_spanish: para Hupá
  alternatives_spanish:
  - a Hupá
  - para Huppá
  lexicon: HALOT
  rationale: El ל prefijado en esta lista de asignaciones puede expresarse en español con 'para' o 'a'. 'Para Hupá' conserva el sentido de destino/asignación en el reparto de turnos y suena natural en una enumeración administrativa. Se adapta la transliteración a una forma hispanizable sin alterar el nombre propio.
- source_word: שְׁלֹשָׁה עָשָׂר
  english_pob_choice: the thirteenth
  chosen_spanish: el decimotercero
  alternatives_spanish:
  - trece
  - el trece
  lexicon: HALOT
  rationale: La construcción hebrea funciona ordinalmente en este contexto de sorteo y asignación. En español, 'el decimotercero' transmite mejor el orden que un cardinal simple.
- source_word: לְ/יֶשֶׁבְאָב
  english_pob_choice: for Jeshebeab
  chosen_spanish: para Jeshebeab
  alternatives_spanish:
  - a Jeshebeab
  lexicon: HALOT
  rationale: Se mantiene la misma relación de asignación indicada por el ל. La transliteración de este nombre se conserva cercana a la forma inglesa auditada, sin intentar normalizarla más allá de lo necesario.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: the fourteenth
  chosen_spanish: el decimocuarto
  alternatives_spanish:
  - catorce
  - el catorce
  lexicon: HALOT
  rationale: Como en la primera mitad del versículo, el número cardinal cumple función ordinal en la lista. 'El decimocuarto' es la forma natural y fiel en español.
