revisions:
- from: 'Entonces él le dijo[a]: «Si tu presencia no va, no nos hagas subir de aquí».'
  to: 'Entonces él le dijo[a]: «Si tu presencia no va con nosotros, no nos hagas subir de aquí».'
  rationale: Se mantiene la fidelidad al hebreo y al rastro de decisiones del POB, pero se mejora la naturalidad española añadiendo «con nosotros», que explicita el sentido de acompañamiento ya presente en el contexto y en el verbo «ir». Se conserva «no nos hagas subir» por su valor causativo y la nota léxica sobre «rostro/presencia».
