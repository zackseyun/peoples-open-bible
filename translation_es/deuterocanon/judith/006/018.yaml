- from: Y el pueblo cayó de rodillas y adoró a Dios, y clamaron diciendo,
  to: Y el pueblo cayeron de rodillas y adoraron a Dios, y clamaron diciendo,
  rationale: Se corrige la inconsistencia verbal pasando a plural los verbos principales para concordar con el valor colectivo de «el pueblo» y con las formas plurales del griego. No se requieren notas.
