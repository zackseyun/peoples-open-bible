id: TIT.3.9
reference: Titus 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μωρὰς δὲ ζητήσεις καὶ γενεαλογίας καὶ ⸀ἔρεις καὶ μάχας νομικὰς περιΐστασο, εἰσὶν γὰρ ἀνωφελεῖς καὶ μάταιοι.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/009.yaml
  text: But avoid foolish controversies and genealogies and strife and quarrels about the law[b][a], for they are unprofitable and futile.
  footnotes:
  - marker: a
    text: Or 'disputes' or 'speculations' for 'controversies.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'legal quarrels'; that is, quarrels about the law.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 어리석은 논쟁[a]과 족보 따지기와 다툼과 율법에 관한 싸움[b]은 멀리하십시오. 이런 것들은 무익하고 헛되기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「토론」, 「공허한 사변」. 헬라어 ζήτησις는 그런 폭의 어감을 가진다.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「법적 싸움들」 — 곧 율법에 관한 다툼들.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὰς ζητήσεις
  english_pob_choice: foolish controversies
  chosen_korean: 어리석은 논쟁
  alternatives_korean:
  - 어리석은 토론
  - 미련한 사변
  lexicon: BDAG
  rationale: ζήτησις는 「조사·논쟁·토론」. 본문 흐름에서는 「논쟁」이 가장 자연스럽다.
- source_word: γενεαλογίας
  english_pob_choice: genealogies
  chosen_korean: 족보 따지기
  alternatives_korean:
  - 족보 논쟁
  - 계보
  lexicon: BDAG
  rationale: γενεαλογία는 「족보·계보」이나 본문에서는 그것을 둘러싼 무익한 논쟁을 가리킨다. 「족보 따지기」가 본문의 비판적 어감을 살린다.
- source_word: ἔρεις καὶ μάχας νομικὰς
  english_pob_choice: strife and quarrels about the law
  chosen_korean: 다툼과 율법에 관한 싸움
  alternatives_korean:
  - 다툼과 법적 싸움
  - 분쟁과 율법 논쟁
  lexicon: BDAG
  rationale: ἔρις는 「다툼·분쟁」. μάχη + νομική는 「율법에 관한 싸움」. νόμος를 글로서리 표준 「율법」으로 옮긴다.
- source_word: περιΐστασο
  english_pob_choice: avoid
  chosen_korean: 멀리하십시오
  alternatives_korean:
  - 피하십시오
  - 비켜서십시오
  lexicon: BDAG
  rationale: περιΐσταμαι(중간태)는 「둘러서 피하다·회피하다」. 「멀리하다」가 한국어로 자연스럽고 회피의 적극성을 살린다.
- source_word: ἀνωφελεῖς καὶ μάταιοι
  english_pob_choice: unprofitable and futile
  chosen_korean: 무익하고 헛되기
  alternatives_korean:
  - 이로움이 없고 헛되기
  - 쓸모없고 허망하기
  lexicon: BDAG
  rationale: ἀνωφελής의 표준 등가어 「무익」. μάταιος의 표준 등가어 「헛됨」.
