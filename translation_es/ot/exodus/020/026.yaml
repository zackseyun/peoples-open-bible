translation:
  language: es
  text: No subirás por escalones a mi altar[a], para que tu desnudez no quede expuesta en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que tu desnudez no sea descubierta en él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲלֶה
  english_pob_choice: you shall not go up
  chosen_spanish: no subirás
  alternatives_spanish:
  - no ascenderás
  - no irás subiendo
  lexicon: HALOT
  rationale: עלה expresa subir/ascender. En español, «subirás» conserva la imagen direccional y el tono prohibitivo sin sonar forzado.
- source_word: בְּמַעֲלֹת
  english_pob_choice: by steps
  chosen_spanish: por gradas
  alternatives_spanish:
  - por escalones
  - por una escalera
  lexicon: HALOT
  rationale: מַעֲלוֹת se refiere a escalones o gradas. «Por gradas» es un término digno y natural en español bíblico para una subida ritual.
- source_word: מִזְבְּחִי
  english_pob_choice: my altar
  chosen_spanish: mi altar
  alternatives_spanish:
  - mi ara
  - mi lugar de altar
  lexicon: HALOT
  rationale: Con el sufijo de primera persona singular, la traducción directa y estable es «mi altar».
- source_word: אֲשֶׁר לֹא
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: HALOT
  rationale: La cláusula explica el propósito o resultado de la prohibición. «Para que no» comunica con claridad la finalidad negativa en español moderno.
- source_word: תִגָּלֶה
  english_pob_choice: may not be exposed
  chosen_spanish: se descubra
  alternatives_spanish:
  - se exponga
  - quede descubierta
  lexicon: HALOT
  rationale: El nifal de גלה puede rendirse como «ser descubierta/expuesta». «Se descubra» preserva la pasividad y mantiene el vínculo semántico con la exposición de la desnudez.
- source_word: עֶרְוָתְךָ
  english_pob_choice: your nakedness
  chosen_spanish: tu desnudez
  alternatives_spanish:
  - tu desnudez corporal
  - tu desnudez íntima
  lexicon: HALOT
  rationale: עֶרְוָה denota desnudez con implicación de pudor sexual. «Desnudez» es directo y suficientemente preciso sin añadir especificaciones no expresadas en el hebreo.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - allí
  lexicon: HALOT
  rationale: El pronombre retoma el altar. En español, «en él» fluye mejor con «se descubra» y mantiene la referencia al altar sin rigidizar la frase.
theological_decisions:
- issue: Motivo de la prohibición de subir al altar por gradas
  english_pob_reading: The text is rendered as a concern for bodily exposure and modesty in the sanctuary context, without importing a broader symbolic explanation.
  chosen_spanish_reading: El texto se traduce como una preocupación por la exposición corporal y la modestia en el contexto del santuario, sin añadir una explicación simbólica más amplia.
  alternative_spanish_readings:
  - El mandato simboliza humildad ante Dios
  - La preocupación es específicamente la exposición por causa de las vestiduras sacerdotales
  rationale: El hebreo da como razón explícita que no se descubra la desnudez. La traducción debe conservar ese motivo expreso y no resolver interpretaciones adicionales en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión revisada más reciente no requirió cambios; el consenso de control cruzado fue de alta concordancia y sin observaciones.
  spanish_consistency_notes:
  - Se preservó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton, así que no se introdujo.
  - Se mantuvo el lenguaje de «desnudez» para עֶרְוָה, evitando sustituciones eufemísticas que debiliten la fuerza léxica.
  - «Por gradas» conserva mejor la imagen arquitectónica del hebreo que una paráfrasis más general como «por escalones».
