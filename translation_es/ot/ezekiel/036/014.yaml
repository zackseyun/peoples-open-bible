review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: לָכֵן → «Por tanto», תֹאכְלִי con imagen metafórica → «devorarás», וְגוֹיִךְ singular → «tu nación», y תכשלי según כשל → «harás tropezar». También preserva la nota de la lectura alternativa. Sin embargo, la fórmula final נְאֻם אֲדֹנָי יְהוִה no está idealmente representada por «dice Yahvé, el Señor», porque invierte y separa de forma poco natural el título y el nombre divino respecto del hebreo.'
  spanish_quality_summary: 'El español es claro, pero tiene dos puntos mejorables: «gente» suena algo impreciso para אָדָם colectivo en este contexto, y «ni harás tropezar más» es menos natural y menos simétrico que «y ya no harás tropezar». La clausula final suena más idiomática y fiel como «declara el Señor Yahvé».'
  glossary_alignment: Cumple con el estándar del proyecto al usar «Yahvé» para יְהוָה. No obstante, en el compuesto אֲדֹנָי יְהוִה la forma preferible es «el Señor Yahvé», no «Yahvé, el Señor», para conservar el orden y la relación del original. No hay otros choques relevantes con la glosaría del proyecto.
  issues:
  - severity: medium
    issue: Orden y formulación de אֲדֹנָי יְהוִה
    rationale: «dice Yahvé, el Señor» conserva ambos elementos, pero reordena el hebreo y suena menos natural en español bíblico que «declara el Señor Yahvé». Además, «declara» refleja mejor נְאֻם que «dice».
  - severity: low
    issue: «gente» para אָדָם
    rationale: Es comprensible, pero «personas» o «seres humanos» preserva mejor el objeto colectivo humano sin el matiz coloquial o difuso que puede tener «gente».
  - severity: low
    issue: Asimetría en la expresión de עוֹד
    rationale: El primer miembro usa «ya no», pero el segundo «más». Aunque no es incorrecto, el hebreo repite la misma construcción; «y ya no harás tropezar» reproduce mejor el paralelismo.
  revised_spanish_text: Por tanto, ya no devorarás personas[a], y ya no harás tropezar a tu nación, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O, siguiendo una vocalización o tradición alternativa: «ya no privarás a tu nación».'
    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula final a «declara el Señor Yahvé» para representar con más fidelidad y naturalidad נְאֻם אֲדֹנָי יְהוִה y el estándar del proyecto sobre Yahvé. Se cambia «gente» por «personas» para una referencia colectiva más precisa y digna. Se armoniza la repetición de עוֹד con «y ya no» en ambos miembros.
