translation:
  text: And the chief of the spirits, Mastema, came and said, “Lord, Creator, let
    some of them remain before me, and let them listen to my voice and do all that
    I tell them; for if some of them are not left to me, I will not be able to exercise
    the authority of my will over the sons of men. For these are for corruption and
    for leading astray before my judgment, because the wickedness of the sons of men
    is great.”
  philosophy: optimal-equivalence
