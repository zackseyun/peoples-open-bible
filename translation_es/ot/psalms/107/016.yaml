revisions:
- from: Porque él quebró las puertas de bronce[a] y cortó las barras de hierro.
  to: Porque quebró las puertas de bronce[a] y partió las barras de hierro.
  rationale: Se elimina el pronombre enfático no necesario para reflejar mejor el sujeto implícito del hebreo en español natural. Se cambia «cortó» por «partió» para expresar con más fuerza la acción violenta de גִּדֵּעַ sobre las barras de hierro. Se simplifica y aclara la nota léxica para que preserve la alternativa contextual sin redacción confusa.
  reviewer_model: gpt-5.4
