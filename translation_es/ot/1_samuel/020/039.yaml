translation:
  language: es
  text: Pero el muchacho no sabía nada[a]; solo Jonatán y David sabían el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «la cosa» o «el arreglo». El hebreo דָּבָר es amplio y puede referirse a un asunto, una cuestión o algo tratado entre personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנַּעַר
  english_pob_choice: But the boy
  chosen_spanish: Pero el muchacho
  alternatives_spanish:
  - Y el muchacho
  - el joven
  - el muchacho
  lexicon: HALOT
  rationale: נַעַר puede significar muchacho, joven o sirviente/ayudante según el contexto. Aquí se trata del joven asistente de Jonatán en la escena de la señal, por lo que 'muchacho' comunica bien la edad/condición sin imponer 'siervo'. El וְ inicial tiene valor contrastivo en el contexto, por eso se traduce 'Pero'.
- source_word: לֹא יָדַע
  english_pob_choice: did not know
  chosen_spanish: no supo
  alternatives_spanish:
  - no conoció
  - no entendió
  lexicon: HALOT
  rationale: יָדַע expresa conocimiento básico; en español, 'no supo' preserva el sentido cognitivo sin volverlo demasiado abstracto. 'No entendió' introduciría una interpretación más fuerte que la del hebreo.
- source_word: מְאוּמָה
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - alguna cosa
  lexicon: HALOT
  rationale: En una construcción negativa, מְאוּמָה equivale a 'nada/anything' en sentido idiomático. 'No supo nada' es natural en español y mantiene la fuerza negativa del hebreo.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: sólo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: אַךְ marca restricción o exclusividad. 'Sólo' reproduce bien esa limitación frente al desconocimiento del muchacho.
- source_word: יְהוֹנָתָן וְדָוִד
  english_pob_choice: Jonathan and David
  chosen_spanish: Jonatán y David
  alternatives_spanish:
  - Jonathan y David
  lexicon: convención onomástica
  rationale: Se usan las formas habituales en español bíblico para los nombres propios, con acento en Jonatán conforme a la norma del español.
- source_word: יָדְעוּ
  english_pob_choice: knew
  chosen_spanish: sabían
  alternatives_spanish:
  - conocían
  - supieron
  lexicon: HALOT
  rationale: El mismo verbo aparece dos veces en el verso; en español se conserva la repetición semántica con un verbo de conocimiento natural. 'Sabían' resulta idiomático y mantiene el contraste con 'no supo'.
- source_word: אֶת הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el asunto en cuestión
  - el arreglo
  lexicon: HALOT
  rationale: 'דָּבָר es amplio: ''palabra, cosa, asunto, hecho''. En este contexto alude a la situación o arreglo compartido por Jonatán y David. ''El asunto'' es idiomático en español y suficientemente formal sin especificar de más.'
translation_notes:
  revision_awareness: 'El texto hebreo y la pauta inglesa muestran alta concordancia y no hay revisiones aplicadas; el español mantiene la misma estructura informativa: ignorancia del muchacho, exclusividad del conocimiento de Jonatán y David, y el término amplio דָּבָר.'
  spanish_consistency_notes:
  - Se conserva el contraste entre 'no supo' y 'sabían' para reflejar יָדַע / יָדְעוּ.
  - '''Muchacho'' evita introducir ''siervo'' sin base explícita en este versículo.'
  - '''Asunto'' mantiene la amplitud semántica de דָּבָר y no la restringe a una sola interpretación.'
