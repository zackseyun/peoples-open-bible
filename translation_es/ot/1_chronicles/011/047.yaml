  lexicon: HALOT
  rationale: Nombre propio; se translitera sin traducir para conservar la forma hebrea y mantener la correspondencia directa con el texto fuente y con la tradición POB en inglés.
- source_word: וְעוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - y Obed
