translation:
  language: es
  text: 'Así dice Yahvé: Como cuando se halla vino nuevo[a] en un racimo, y se dice: «No lo destruyas, porque hay bendición en él», así actuaré yo por causa de mis siervos, para no destruirlos a todos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mosto’ o ‘vino fresco’. תִּירוֹשׁ se refiere específicamente a vino nuevo, no al vino en sentido genérico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘para no destruir todo’; el hebreo deja implícito el objeto. En español se hace explícito con ‘los’ para reflejar el grupo aludido.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado. En español bíblico de este proyecto, 'Yahvé' conserva el nombre personal de Dios y evita la sustitución por un título genérico.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera solemne y natural en español con 'Así dice', que mantiene el registro oracular sin volverse arcaizante.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  lexicon: HALOT
  rationale: En español, 'mosto' comunica mejor la idea de vino recién producido o en fase temprana, y conserva el matiz léxico de תִּירוֹשׁ como bebida nueva, no vino genérico.
- source_word: אֶשְׁכּוֹל
  english_pob_choice: cluster
  chosen_spanish: racimo
  alternatives_spanish:
  - racimo de uvas
  - brote
  lexicon: HALOT
  rationale: '''Racimo'' es el equivalente más natural en español para el contexto vitivinícola de este versículo. El referente de uvas queda claro por la imagen del mosto.'
- source_word: וְאָמַר
  english_pob_choice: and one says
  chosen_spanish: y se dice
  alternatives_spanish:
  - y alguien dice
  - y uno dice
  lexicon: HALOT
  rationale: El hebreo usa un sujeto indefinido; 'se dice' preserva esa impersonalidad en un español fluido.
- source_word: אַל תַּשְׁחִיתֵהוּ
  english_pob_choice: Do not destroy it
  chosen_spanish: No lo destruyas
  alternatives_spanish:
  - No lo arruines
  - No lo eches a perder
  lexicon: HALOT
  rationale: '''Destruir'' conserva la fuerza del verbo שׁחת y anticipa la repetición del final del verso, manteniendo la coherencia léxica.'
- source_word: כִּי בְרָכָה בּוֹ
  english_pob_choice: for there is a blessing in it
  chosen_spanish: porque hay bendición en él
  alternatives_spanish:
  - pues hay bendición en él
  - porque contiene bendición
  lexicon: HALOT
  rationale: '''Bendición'' conserva el lenguaje teológico concreto del original. ''En él'' respeta el masculino implícito del racimo/mosto en español.'
- source_word: כֵּן אֶעֱשֶׂה
  english_pob_choice: so I will act
  chosen_spanish: así actuaré yo
  alternatives_spanish:
  - así haré
  - por eso actuaré
  lexicon: HALOT
  rationale: '''Actuaré'' comunica mejor que un simple ''haré'' el sentido aplicativo del paralelismo: Dios procede de esta manera en correspondencia con la comparación.'
- source_word: לְמַעַן עֲבָדַי
  english_pob_choice: for the sake of my servants
  chosen_spanish: por amor de mis siervos
  alternatives_spanish:
  - por causa de mis siervos
  - por el bien de mis siervos
  lexicon: HALOT
  rationale: '''Siervos'' sigue el valor relacional del hebreo en un contexto de pertenencia y servicio a Dios. ''Por amor de'' expresa bien la motivación benevolente del propósito divino.'
- source_word: לְבִלְתִּי הַשְׁחִית הַכֹּל
  english_pob_choice: so as not to destroy all of them
  chosen_spanish: para no destruirlos a todos
  alternatives_spanish:
  - para no destruir a todos
  - sin destruirlos a todos
  lexicon: HALOT
  rationale: El hebreo deja implícito el objeto; en español, 'los' hace explícito que se trata del grupo bajo juicio, y 'a todos' conserva la idea de totalidad sin endurecerla con una abstracción impersonal.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión del POB de transliterar el nombre divino para no ocultar el Tetragrámaton tras un título. En español, 'Yahvé' es la forma más estable y transparente dentro de esta tradición editorial.
  doctrine_reference: Transparencia del nombre divino / Tetragrámaton
- issue: Referente implícito de 'all' al final del versículo
  english_pob_reading: not to destroy all of them
  chosen_spanish_reading: para no destruirlos a todos
  alternative_spanish_readings:
  - para no destruir todo
  - para no destruir a todos
  rationale: El objeto implícito se entiende como el grupo humano bajo juicio, en paralelo con 'mis siervos'. 'Los' evita una lectura impersonal de 'todo' y conserva la tensión del original entre juicio y preservación.
  doctrine_reference: Preservación del remanente / juicio y misericordia
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'them all' por 'all of them' para reflejar mejor el orden del hebreo. En español se optó por 'los a todos' / 'los a todos' no, sino 'los a todos' no es idiomático; por eso se formuló 'para no destruirlos a todos', que mantiene la totalidad del grupo y la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como traducción uniforme del Tetragrámaton.
  - Se conserva la distinción entre 'mosto' y 'vino' para reflejar תִּירוֹשׁ.
  - '''Siervos'' se usa en coherencia con el léxico POB para עֲבָדַי, sin convertirlo en ''esclavos'' en este contexto.'
  - La repetición de 'destruir' conserva el enlace léxico con תַּשְׁחִיתֵהוּ y הַשְׁחִית הַכֹּל.
