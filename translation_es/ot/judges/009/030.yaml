translation:
  language: es
  text: Cuando Zebul, el gobernante de la ciudad, oyó las palabras de Gaal hijo de Ebed, se encendió su ira[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «le ardió la nariz», un modismo que significa «se enojó» o «su ira se encendió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: El hebreo וַיִּשְׁמַע aquí indica recepción auditiva del discurso de Gaal, no obediencia. En español, 'oyó' conserva ese sentido narrativo directo y evita sobrecargar el verso con una idea de atención voluntaria que el contexto no exige.
- source_word: זְבֻל
  english_pob_choice: Zebul
  chosen_spanish: Zebul
  lexicon: Transliteración propia del proyecto
  rationale: Nombre propio transliterado para mantener la identificación del personaje sin castellanizarlo.
- source_word: שַׂר הָעִיר
  english_pob_choice: the ruler of the city
  chosen_spanish: el gobernante de la ciudad
  alternatives_spanish:
  - el jefe de la ciudad
  - el oficial de la ciudad
  - el gobernador de la ciudad
  lexicon: HALOT
  rationale: שַׂר designa a un líder, jefe o funcionario con autoridad. 'Gobernante' preserva la amplitud semántica de 'ruler' en un español natural, sin imponer una figura administrativa moderna más específica que la que sugiere el hebreo.
- source_word: אֶת דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - lo que dijo
  - las declaraciones de
  lexicon: HALOT
  rationale: La expresión hebrea es literal ('palabras de'). Mantener 'las palabras de' conserva la concreción del original y la relación directa con el discurso de Gaal.
- source_word: גַּעַל בֶּן עָבֶד
  english_pob_choice: Gaal son of Ebed
  chosen_spanish: Gaal hijo de Ebed
  alternatives_spanish:
  - Gaal, hijo de Ebed
  lexicon: Patronímico hebreo
  rationale: '''Hijo de'' reproduce de forma natural el patronímico hebreo y conserva el vínculo familiar sin añadir explicación interpretativa.'
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: se encendió su ira
  alternatives_spanish:
  - ardió su ira
  - su enojo ardió
  - su ira se inflamó
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude al 'ardor' del rostro/nariz como idiomática de enojo. 'Se encendió su ira' mantiene la imagen de combustión y su valor idiomático en español, sin caer en el literalismo opaco de 'su nariz ardió'.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la fuente hebrea y coincide con el criterio de la POB en inglés: narración directa, transliteración de nombres propios y conservación del modismo de enojo mediante una imagen verbal equivalente en español.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo, por no aparecer en la fuente.
  - '''Gobernante'' se eligió por amplitud semántica y naturalidad narrativa; no se usa ''gobernador'' para no sobredeterminar el cargo.'
  - La nota [a] preserva la alternativa literal del hebreo y explica el modismo de forma auditable.
