id: T12P.LEV.08
reference: Testament of Levi 8
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: VIII. Κἀκεῖ πάλιν εἶδον¹ *ὅραμα ὡς² τὸ πρότερον μετὰ *τὸ ποιῆσαι ἡμᾶς ἐκεῖ³ ἡμέρας ἑβδομήκοντα⁴. 2. Καὶ εἶδον⁵ ἑπτὰ ἄνδρας⁶ ἐν ἐσθῆτι⁷ λευκῇ⁸ *λέγοντάς μοι⁹· Ἀναστὰς ἔνδυσαι τὴν στολὴν τῆς ἱερατείας, καὶ¹⁰ τὸν στέφανον τῆς δικαιοσύνης¹¹, *καὶ τὸ λόγιον¹² τῆς συνέσεως καὶ τὸν ποδήρη¹³ τῆς ἀληθείας καὶ τὸ πέταλον¹⁴ τῆς πίστεως καὶ τὴν μίτραν¹⁵ †τῆς κεφαλῆς†¹⁶ καὶ τὸ ἐφοὺδ τῆς προφητείας. 3. Καὶ¹⁷ εἷς¹⁸ ἕκαστος αὐτῶν¹⁹ βαστάζοντες *ἦσαν καὶ²⁰ ἐπέθηκαν μοι²¹ καὶ εἰπόν²² μοι²³· Ἀπὸ τοῦ νῦν γενοῦ²⁴ εἰς ἱερέα²⁵, σὺ²⁶ καὶ *πᾶν τὸ σπέρμα²⁷ σου²⁸. 4. Καὶ²⁹ ὁ πρῶτος ἤλειψέ³⁰ με³¹ ἐλαίῳ ἁγίῳ, καὶ ἔδωκέ μοι ῥάβδον³². 5. *Καὶ ὁ³³ δεύτερος ἔλουσέ³⁴ με³⁵ ὕδατι κυρίου καθαρῷ³⁶, καὶ ἐψώμισέν³⁷ με³⁸ *ἄρτον καὶ οἶνον³⁹ ἅγιον⁴⁰ καὶ περιέθηκε⁴¹ μοι στολὴν ἁγίαν⁴² καὶ ἔνδοξον. 6. Ὁ δὲ⁴³ τρίτος βυσσίνην⁴⁴ *μοι περιέθηκεν⁴⁵, ὁμοίαν⁴⁶ ἐφούδ. 7. Ὁ δὲ⁴⁷ τέταρτος ζώνην *μοι περιέβαλεν⁴⁸, ὁμοίαν πορφύρας⁴⁹. 8. Ὁ⁵⁰ πέμπτος *κλάδον μοι ἐλαίας ἔδωκεν πιότητος⁵¹. 9. Ὁ ἕκτος στέφανόν μοι⁵² *τῇ κεφαλῇ⁵³ περιέθηκεν⁵⁴. 10. Ὁ⁵⁵ ἕβδομος *διάδημά μοι ἱερατείας περιέθηκεν καὶ⁵⁶ ἐπλήρωσε⁵⁷ τὰς χεῖράς μου θυμιάματος⁵⁸, ὥστε ἱερατεύειν με⁵⁹ Κυρίῳ, *τῷ θεῷ⁶⁰. 11. *Καὶ λέγουσι⁶¹ πρός με· Λευί⁶², εἰς τρεῖς ἀρχὰς διαιρεθήσεται⁶³ τὸ σπέρμα σου⁶⁴, εἰς⁶⁵ σημεῖον⁶⁶ *δόξης Κυρίου ἐπερχομένου⁶⁷. 12. Καὶ⁶⁸ ὁ πρῶτος κλῆρος ἔσται μέγας· καὶ ὑπὲρ αὐτὸν οὐ γενήσεται ἕτερος. 13. Ὁ δὲ⁷³ δεύτερος ἔσται *ἐν ἱερωσύνῃ⁷⁴. 14. *Ὁ δὲ⁷⁵ τρίτος *ἐπικληθήσεται αὐτῷ ὄνομα καινόν⁷⁶, ὅτι βασιλεὺς †ἐκ τοῦ†⁷⁷ Ἰούδα ἀναστήσεται καὶ ποιήσει *ἱερατείαν νέαν, κατὰ τὸν τύπον τῶν ἐθνῶν εἰς πάντα τὰ ἔθνη⁷⁸. 15. Ἡ δὲ παρουσία⁷⁹ αὐτοῦ ἀγαπητή⁸⁰ ἐστιν⁸¹ ὡς προφήτης⁸² ὑψίστου⁸³ ἐκ σπέρματος Ἀβραὰμ τοῦ⁸⁴ πατρὸς ἡμῶν⁸⁵. 16. *Πᾶν οὖν ἐπιθυμητὸν⁸⁶ ἐν Ἰσραὴλ⁸⁷ σοὶ⁸⁸ ἔσται καὶ τῷ σπέρματί σου⁸⁹, καὶ ἔδεσθε⁹⁰ πᾶν ὡραῖον ἐν⁹¹ ὁράσει, καὶ τὴν τράπεζαν Κυρίου διανεμεῖται⁹² τὸ σπέρμα σου⁹³. 17. Καὶ ἐξ αὐτῶν⁹⁴ ἔσονται ἱερεῖς⁹⁵ καὶ⁹⁶ κριταὶ καὶ⁹⁶ γραμματεῖς· καὶ⁹⁷ ἐπὶ στόματος αὐτῶν †ληφθήσεται⁹⁸ τὸ ἅγιον⁹⁹. 18. *Ἐξυπνισθεὶς οὖν¹⁰⁰ συνῆκα¹⁰¹, ὅτι *τοῦτο ὅμοιόν ἐστι τοῦ πρώτου ὀνείρου¹⁰².
