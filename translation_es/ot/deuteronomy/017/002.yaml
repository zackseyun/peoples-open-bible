translation:
  language: es
  text: Si se encuentra entre ustedes, en una de tus puertas[a], que Yahvé tu Dios te da, un hombre o una mujer que haga lo malo ante los ojos de Yahvé tu Dios, al transgredir su pacto[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una de tus ciudades» o «en uno de tus pueblos»; literalmente, «en una de tus puertas».
    reason: lexical_alternative
  - marker: b
    text: O «al violar su pacto» o «al quebrantar su pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: En una formulación legal casuística, «Si» reproduce mejor la condición abierta del hebreo que «Cuando» o «Porque».
- source_word: יִמָּצֵא
  english_pob_choice: there is found
  chosen_spanish: se encuentra
  alternatives_spanish:
  - es hallado
  - se halla
  lexicon: HALOT
  rationale: El nifal comunica una ocurrencia pasiva/impersonal; «se encuentra» conserva ese tono legal sin sonar forzado en español.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: among you
  chosen_spanish: entre ti
  alternatives_spanish:
  - en medio de ti
  - en tu comunidad
  lexicon: HALOT
  rationale: «Entre ti» mantiene el valor comunitario e incorporado del hebreo. Dado que el versículo usa el singular colectivo de segunda persona, se evita pluralizar.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  english_pob_choice: within one of your gates
  chosen_spanish: en una de tus puertas
  alternatives_spanish:
  - en una de tus ciudades
  - en uno de tus pueblos
  lexicon: HALOT
  rationale: «Puertas» conserva la metáfora urbana/judicial del hebreo; se evita resolverla por completo en «ciudades» porque el POB inglés también preservó la imagen con una nota alternativa.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  english_pob_choice: that Yahweh your God is giving you
  chosen_spanish: que Yahvé tu Dios te está dando
  alternatives_spanish:
  - que Yahvé tu Dios te da
  - que Yahvé tu Dios te concede
  lexicon: HALOT
  rationale: El participio expresa acción continua/presente; «te está dando» mantiene el aspecto progresivo sin perder naturalidad.
- source_word: אִישׁ אוֹ אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - un varón o una mujer
  - alguien, hombre o mujer
  lexicon: HALOT
  rationale: Se conserva explícitamente la pareja de género del hebreo, sin neutralizarla en «persona».
- source_word: אֲשֶׁר יַעֲשֶׂה אֶת־הָרַע
  english_pob_choice: who does what is evil
  chosen_spanish: que haga lo malo
  alternatives_spanish:
  - que cometa el mal
  - que haga el mal
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se vierte de forma natural en español, manteniendo el sentido moral de la acción.
- source_word: בְּעֵינֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: in the eyes of Yahweh your God
  chosen_spanish: ante los ojos de Yahvé tu Dios
  alternatives_spanish:
  - a los ojos de Yahvé tu Dios
  - delante de Yahvé tu Dios
  lexicon: HALOT
  rationale: «Ante los ojos de» conserva la metáfora evaluativa y es idiomático en español bíblico contemporáneo.
- source_word: לַעֲבֹר בְּרִיתוֹ
  english_pob_choice: by transgressing his covenant
  chosen_spanish: al transgredir su pacto
  alternatives_spanish:
  - al violar su pacto
  - al quebrantar su pacto
  - para quebrantar su pacto
  lexicon: HALOT
  rationale: «Transgredir» preserva la fuerza jurídica/covenantal de עבר. «Pacto» es la forma española más natural y transparente para בְּרִית en este contexto; se evita imponer una solución teológica más específica que la del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir el nombre divino como «Yahvé» en el texto principal.
theological_decisions:
- issue: Traducción de בְּרִיתוֹ como 'su pacto' sin especificación adicional
  english_pob_reading: by transgressing his covenant
  chosen_spanish_reading: al transgredir su pacto
  alternative_spanish_readings:
  - al violar su pacto
  - al quebrantar su pacto
  rationale: El versículo habla en términos generales de violación de pacto; el contexto inmediato concreta la clase de delito. Se conserva así la tensión del texto sin identificar prematuramente un contenido doctrinal particular.
  doctrine_reference: Preservar la tensión textual y el encuadre legal-covenantal.
translation_notes:
  revision_awareness: Ajustado a partir del audit trail inglés con acuerdo alto y sin cambios revisados posteriores; se mantuvieron la formulación legal condicional, la imagen de las puertas y la referencia abierta al pacto sin reinterpretación doctrinal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene el singular colectivo de segunda persona con «ti / tus».
  - Se conserva la metáfora de «puertas» y se aclara en nota su posible valor metonímico.
  - «Pacto» traduce בְּרִית de manera transparente y consistente con el contexto legal-covenantal.
  - «Transgredir» conserva la fuerza jurídica del hebreo עבר en este uso.
