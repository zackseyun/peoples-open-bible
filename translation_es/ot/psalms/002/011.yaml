translation:
  language: es
  text: Sirvan a Yahvé con temor[b][a], y alégrense con temblor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con reverencia»; «temor» puede incluir también el sentido de asombro reverente delante de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «regocíjense» para «alégrense».
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְדוּ
  english_pob_choice: Serve
  chosen_spanish: Sirvan
  alternatives_spanish:
  - Sirvan
  - Adoren
  - Presten servicio
  lexicon: HALOT
  rationale: El imperativo plural de עבד en relación con YHWH abarca servicio leal y obediencia reverente. «Sirvan» conserva mejor ese sentido amplio en español sin reducirlo solo a culto litúrgico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Doctrina POB para el Tetragrámaton
  rationale: Se mantiene el nombre divino revelado, siguiendo el criterio del proyecto de usar «Yahvé» en lugar de una sustitución por título o una forma tradicional menos directa.
- source_word: בְּיִרְאָה
  english_pob_choice: with fear
  chosen_spanish: con temor
  alternatives_spanish:
  - con reverencia
  - con miedo
  lexicon: HALOT
  rationale: «Temor» reproduce de forma directa יִרְאָה y preserva la tensión de reverencia, sumisión y seriedad ante Dios. «Reverencia» es posible, pero suaviza el término.
- source_word: וְגִילוּ
  english_pob_choice: and rejoice
  chosen_spanish: y alégrense
  alternatives_spanish:
  - y regocíjense
  - y exulten
  lexicon: HALOT
  rationale: «Alégrense» expresa con naturalidad el mandato plural y conserva el paralelismo con el hebreo. «Regocíjense» o «exulten» serían más marcados, pero menos fluidos en español general.
- source_word: בִּרְעָדָה
  english_pob_choice: with trembling
  chosen_spanish: con temblor
  alternatives_spanish:
  - con temblor
  - con estremecimiento
  lexicon: HALOT
  rationale: «Temblor» traduce רְעָדָה de modo sobrio y mantiene el contraste paradójico con el gozo. «Estremecimiento» es posible, pero más interpretativo.
theological_decisions:
- issue: Mantener la tensión entre gozo y temor reverente
  english_pob_reading: 'Keep both imperatives in their tension: ''Serve Yahweh with fear, and rejoice with trembling.'''
  chosen_spanish_reading: 'Mantener ambos imperativos en tensión: «Sirvan a Yahvé con temor, y alégrense con temblor».'
  alternative_spanish_readings:
  - «Adoren a Yahvé con reverencia, y celebren con temblor»
  - «Sirvan a Yahvé con miedo, y tiembren con alegría»
  rationale: El hebreo une obediencia temerosa y gozo sin resolver el contraste. La redacción española conserva ambos polos sin suavizar la paradoja ni convertirla en una sola idea devocional.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Siguiendo la norma del proyecto, se usa el nombre propio divino en español para evitar el ocultamiento del Tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail en inglés. La revisión más reciente indicó alta concordancia y no introdujo cambios; por eso se preserva la decisión de mantener la tensión semántica de temor/gozo sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Temor» y «temblor» se conservan como pares paralelos para reflejar la fuerza del hebreo.
  - El imperativo plural español mantiene el tono exhortativo del original.
  - Las notas de pie preservan las alternativas léxicas documentadas en el audit trail inglés.
