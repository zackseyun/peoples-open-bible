translation:
  language: es
  text: Que los malvados caigan en sus propias redes[a], juntos[b], mientras yo paso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su red». La forma hebrea ha sido entendida también de manera más literal con posesivo singular, pero aquí se expresa el sentido colectivo/reflexivo como «sus propias redes».
    reason: alternative_reading
  - marker: b
    text: O «todos a la vez».
    reason: lexical_alternative
  - marker: c
    text: Más literalmente, «hasta que yo pase» o «hasta que yo pase de largo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְּלוּ
  english_pob_choice: Let ... fall
  chosen_spanish: Que ... caigan
  alternatives_spanish:
  - Caerán
  - Caigan
  lexicon: HALOT
  rationale: El imperfecto qal plural puede leerse con fuerza volitiva en un contexto de súplica. En español, la construcción exhortativa/subjuntiva «Que ... caigan» conserva bien ese valor de deseo/petición.
- source_word: בְּמַכְמֹרָיו
  english_pob_choice: their own nets
  chosen_spanish: sus propias redes
  alternatives_spanish:
  - en sus redes
  - en su red
  - en sus propias trampas
  lexicon: HALOT
  rationale: מַכְמֹר es una red o lazo. El sufijo masculino singular/plural en la tradición textual auditada crea una tensión con el sujeto plural; la lectura inglesa revisada optó por un sentido colectivo («their own nets»). En español, «sus propias redes» preserva ese sentido colectivo sin forzar la singularidad y mantiene la idea reflexiva-documentada.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa a personas moralmente perversas. «Los malvados» es natural en español, claro y mantiene el valor colectivo sin necesidad de especificar género.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: todos a la vez
  alternatives_spanish:
  - juntos
  - al mismo tiempo
  lexicon: HALOT
  rationale: יַחַד expresa simultaneidad o colectividad. «Todos a la vez» comunica con naturalidad que el destino les ocurre en conjunto; es una leve explicitación, pero fiel al valor adverbial del hebreo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - en cuanto a mí, yo
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español se mantiene con «yo», y el orden de la cláusula contrastiva ya preserva la contraposición con «los malvados».
- source_word: עַד
  english_pob_choice: while
  chosen_spanish: mientras
  alternatives_spanish:
  - hasta que
  - hasta
  lexicon: HALOT
  rationale: Aunque «עד» puede significar «hasta», en esta línea poética la función es temporal y acompaña la acción de pasar. «Mientras» produce un español natural y conserva el marco temporal de la acción del salmista.
- source_word: אֶעֱבוֹר
  english_pob_choice: I pass by
  chosen_spanish: paso
  alternatives_spanish:
  - paso de largo
  - cruzo
  - atravieso
  lexicon: HALOT
  rationale: עבר significa pasar, ir de largo, cruzar. «Paso» es la forma más sobria y natural en español; el contexto ya sugiere el contraste entre la caída de los malvados y el tránsito del hablante sin añadir una inferencia adverbial no explícita.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que eliminó «safely» por no estar explícito en el hebreo, y se conservó la resolución colectiva de la posesión en «their own nets». La versión española evita añadir un matiz de seguridad no documentado y mantiene el paralelismo entre la caída de los malvados y el paso del hablante.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se eligió «los malvados» para רְשָׁעִים por ser un colectivo natural y consistente con el registro bíblico en español.
  - «Redes» mantiene el campo semántico de מַכְמֹר sin introducir una metáfora distinta.
  - Se evitó añadir «seguro» o «sin daño», ya que la revisión inglesa lo retiró por no estar explícito en el hebreo.
