translation:
  language: es
  text: Las palabras del murmurador son como bocados[a] deliciosos, y entran hasta las cámaras interiores del vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como bocados exquisitos’; el raro término hebreo también puede entenderse como ‘como heridas’ o ‘como cosas tragadas con avidez’.
    reason: lexical_alternative
  - marker: b
    text: “Las cámaras interiores del vientre” es un hebraísmo para el ser más íntimo de la persona.
    reason: cultural_note
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  - Las expresiones de
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר se vierte de manera natural como "las palabras de"; conserva el sentido básico sin introducir una interpretación más específica que el hebreo no exige.
- source_word: נִרְגָּן
  english_pob_choice: a whisperer
  chosen_spanish: el chismoso
  alternatives_spanish:
  - el murmurador
  - el calumniador
  - el que habla en secreto
  lexicon: HALOT
  rationale: El término hebreo describe a quien habla de modo encubierto y divisivo. "Chismoso" comunica esa función social de manera clara en español; "murmurador" conserva más literalmente la idea de murmurar, pero suena menos idiomático aquí.
- source_word: כְּמִתְלַהֲמִים
  english_pob_choice: like delicious morsels
  chosen_spanish: como bocados
  alternatives_spanish:
  - como bocados deliciosos
  - como bocados exquisitos
  - como cosas tragadas con avidez
  - como heridas
  lexicon: HALOT
  rationale: La forma es rara y está discutida. "Bocados" mantiene la imagen de algo pequeño y apetecible, adecuada al paralelismo; el adjetivo se deja en el texto como "deliciosos" para reflejar la lectura preferida por la POB inglesa, sin excluir la ambigüedad lexical documentada.
- source_word: יָרְד֥וּ
  english_pob_choice: go down
  chosen_spanish: descienden
  alternatives_spanish:
  - bajan
  - han descendido
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en contexto proverbial expresa una verdad general. "Descienden" comunica el valor gnómico en español y mantiene la imagen de penetración hacia el interior.
- source_word: חַדְרֵי בָטֶן
  english_pob_choice: the inner chambers of the belly
  chosen_spanish: las cámaras interiores del vientre
  alternatives_spanish:
  - las entrañas más íntimas
  - las profundidades del ser interior
  - las cámaras del vientre
  lexicon: HALOT
  rationale: La expresión es un hebraísmo corporal que alude al interior más profundo de la persona. "Cámaras interiores del vientre" conserva la metáfora espacial del hebreo y evita sustituirla por un equivalente demasiado abstracto como "corazón".
theological_decisions:
- issue: El valor idiomático de "vientre" como interior de la persona
  english_pob_reading: '"The inner chambers of the belly" is a Hebrew idiom for a person''s inmost being.'
  chosen_spanish_reading: '"las cámaras interiores del vientre" conserva el hebraísmo y remite al interior más profundo de la persona.'
  alternative_spanish_readings:
  - '"las entrañas más íntimas"'
  - '"el ser interior"'
  rationale: La POB inglesa preserva el cuerpo de la metáfora y explica su sentido idiomático. En español conviene mantener esa imagen para no borrar la fuerza concreta del proverbio; la nota aclara el alcance antropológico sin reemplazar el hebraísmo.
  doctrine_reference: Sabiduría proverbial; antropología bíblica del interior humano
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue el consenso alto del control cruzado y conserva la ambigüedad léxica documentada en el término raro, sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '"Vientre" se usa de manera idiomática y no anatómica estricta; la nota aclara su función metafórica.'
  - La puntuación y el tono buscan una lectura pública en español neutral y reverente.
