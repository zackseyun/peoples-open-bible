translation:
  language: es
  text: ¿Cómo podré describir el afecto de los padres por sus hijos[a], el ardor que imprime la maravillosa semejanza de alma y forma en la pequeña impronta de un niño, sobre todo porque los padres hacen a las madres más tiernamente afectuosas hacia su descendencia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cariño de los padres por sus hijos, el ardor que imprime en un niño la maravillosa semejanza de alma y forma». El griego es densamente retórico y usa una imagen rara de sellar o estampar.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα τρόπον
  english_pob_choice: How can I
  chosen_spanish: ¿Cómo podré
  alternatives_spanish:
  - ¿De qué manera podré?
  - ¿Cómo podría?
  - ¿En qué forma podría?
  lexicon: LSJ
  rationale: La pregunta es retórica y expresa dificultad para encontrar palabras. «Cómo podré» conserva el matiz de posibilidad y del esfuerzo por expresar lo indecible, con un español natural y solemne.
- source_word: ἠθολογήσῃμι
  english_pob_choice: describe
  chosen_spanish: describir
  alternatives_spanish:
  - retratar
  - presentar
  - pintar
  lexicon: LSJ
  rationale: El verbo es raro y apunta a una descripción marcada por el carácter. «Describir» comunica de manera clara la intención retórica sin añadir conjeturas interpretativas.
- source_word: φιλοτέκνα γονέων αἴθη
  english_pob_choice: the affection of parents for their children—the ardor
  chosen_spanish: el afecto de los padres por sus hijos —el ardor
  alternatives_spanish:
  - el amor de los padres por sus hijos —el ardor
  - la ternura de los padres por sus hijos —el ardor
  - el cariño de los padres por sus hijos —el ardor
  lexicon: LSJ
  rationale: φιλοτέκνα expresa amor por los hijos y αἴθη añade calor emocional. «Afecto» mantiene amplitud semántica, mientras «ardor» conserva la intensidad metafórica del griego sin suavizarla demasiado.
- source_word: ψυχῆς τε καὶ μορφῆς ὁμοιότητα
  english_pob_choice: the marvelous likeness of soul and form
  chosen_spanish: la maravillosa semejanza de alma y forma
  alternatives_spanish:
  - la maravillosa semejanza de alma y apariencia
  - la semejanza admirable de alma y forma
  - la admirable semejanza de espíritu y figura
  lexicon: LSJ
  rationale: ψυχή se traduce aquí por «alma» y μορφή por «forma», manteniendo la distinción interior/exterior. «Maravillosa semejanza» reproduce el tono exaltado de θαυμάσιον y el paralelismo del original.
- source_word: εἰς μικρὸν παιδοχαρακτῆρα
  english_pob_choice: upon the little character of a child
  chosen_spanish: en el pequeño rasgo de un niño
  alternatives_spanish:
  - en el pequeño carácter de un niño
  - en la pequeña impronta de un niño
  - en el diminuto sello de un niño
  lexicon: LSJ
  rationale: παιδοχαρακτήρ es imagen densa y poco común, relacionada con marca/sello/impresión. «Rasgo» intenta conservar la idea de un trazo impreso sin volverla demasiado técnica; «pequeño» refleja μικρὸν.
- source_word: ἐναποσφραγίζοντα
  english_pob_choice: impresses
  chosen_spanish: imprime
  alternatives_spanish:
  - estampa
  - sella
  - graba
  lexicon: LSJ
  rationale: El verbo conserva la metáfora de sellar o estampar una marca. «Imprime» es fiel y transparente en español, y permite mantener la imagen de una semejanza grabada en el niño.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: sobre todo
  alternatives_spanish:
  - especialmente
  - en particular
  - máxime
  lexicon: LSJ
  rationale: Introduce la explicación causal siguiente. «Sobre todo» suena natural en español y conserva el valor de énfasis.
- source_word: διὰ τὸ ... καθιστᾶναι
  english_pob_choice: because ... make
  chosen_spanish: porque ... hacen
  alternatives_spanish:
  - debido a que ... hacen
  - porque ... vuelven
  - ya que ... hacen
  lexicon: LSJ
  rationale: La construcción causal se vuelve natural con «porque». «Hacen» reproduce el efecto verbal del infinitivo causativo sin sobrecargar la sintaxis.
- source_word: τῶν πατέρων
  english_pob_choice: fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los padres varones
  - los progenitores varones
  - los padres
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «de los padres», el sentido en español queda más fluido con «los padres». Mantiene la referencia masculina plural presente en el original y en la cadena causal.
- source_word: τοῖς γεννηθεῖσιν
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - los que han nacido
  - su prole
  lexicon: LSJ
  rationale: El participio perfecto alude a los nacidos, es decir, a la prole/hijos. «Su descendencia» conserva la referencia colectiva sin forzar una glosa demasiado larga.
- source_word: τὰς μητέρας καθιστᾶναι συμπαθεστέρας
  english_pob_choice: make mothers more sympathetic
  chosen_spanish: hacen a las madres más compasivas
  alternatives_spanish:
  - vuelven a las madres más afectuosas
  - hacen a las madres más tiernas
  - disponen a las madres con mayor simpatía
  lexicon: LSJ
  rationale: συμπαθεστέρας indica mayor simpatía, participación afectiva o compasión. «Compasivas» comunica la disposición afectuosa hacia los hijos sin perder el matiz de empatía que el griego sugiere.
theological_decisions:
- issue: Relación entre el lenguaje de alma/forma y la antropología del pasaje
  english_pob_reading: The marvelous likeness of soul and form upon the little character of a child
  chosen_spanish_reading: la maravillosa semejanza de alma y forma en el pequeño rasgo de un niño
  alternative_spanish_readings:
  - la maravillosa semejanza de alma y apariencia en el pequeño rasgo de un niño
  - la admirable semejanza de espíritu y forma en el pequeño rasgo de un niño
  rationale: No se diluye la tensión entre interioridad (alma) y exterioridad (forma). El texto presenta una semejanza que se imprime tanto en lo interno como en lo visible; por eso se mantiene la doble referencia sin reducirla a mero parecido físico.
  doctrine_reference: Antropología bíblica; relación entre interioridad personal y expresión visible
translation_notes:
  revision_awareness: 'La redacción inglesa revisada sustituyó «fervor» por «ardor», afinó la imagen de sellar/imprimir y aclaró que el participio final remite a la descendencia. La versión española sigue esa revisión: conserva «ardor», «imprime» y «su descendencia», evitando suavizar la metáfora o convertirla en mera paráfrasis.'
  spanish_consistency_notes:
  - Se evita «Cristo/Señor» porque el versículo no contiene léxico cristológico ni divino.
  - Se mantiene «alma y forma» para preservar la distinción del griego entre ψυχή y μορφή.
  - Se elige «compasivas» en lugar de un equivalente más genérico como «simpatéticas», por naturalidad en español y por el matiz de empatía afectiva del comparativo griego.
  - La puntuación con rayas reproduce la estructura parentética del original y de la auditoría inglesa.
