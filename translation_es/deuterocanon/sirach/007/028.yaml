translation:
  language: es
  text: Recuerda que, si no fuera por ellos[a], no habrías venido al mundo; ¿y qué puedes hacer por ellos, como ellos han hecho por ti?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, tus padres; el pronombre está implícito por el contexto inmediato.
    reason: cross_reference
  - marker: b
    text: 'O, más literalmente: «¿y qué les devolverás, como ellos a ti?». El griego expresa aquí la pregunta en términos de retribución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι / זְכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: HALOT; LXX μιμνήσκομαι
  rationale: El imperativo pide un acto activo de memoria; «Recuerda» es la equivalencia natural y digna en español, y mantiene el tono exhortativo del hebreo y del griego.
- source_word: διʼ αὐτῶν / לוּלֵי הֵם
  english_pob_choice: if not for them
  chosen_spanish: si no fuera por ellos
  alternatives_spanish:
  - de no ser por ellos
  - sin ellos
  lexicon: HALOT; Swete LXX
  rationale: La expresión transmite una dependencia contrafactual. «Si no fuera por ellos» comunica con naturalidad el sentido de causalidad dependiente sin perder la fuerza del original.
- source_word: ἐγενήθης / לֹא בָאתָ לָעוֹלָם
  english_pob_choice: you would not have come into the world
  chosen_spanish: no habrías venido al mundo
  alternatives_spanish:
  - no habrías llegado al mundo
  - no habrías nacido
  lexicon: HALOT; BDAG
  rationale: La imagen literal de «venir al mundo» preserva el giro semítico y resulta clara en español. «Nacido» sería más explícito, pero menos cercano a la formulación del texto.
- source_word: ἀνταποδώσεις / וּמָה אַתָּה עוֹשֶׂה לָהֶם
  english_pob_choice: what can you do for them
  chosen_spanish: ¿qué puedes hacer por ellos?
  alternatives_spanish:
  - ¿qué les puedes pagar?
  - ¿qué puedes retribuirles?
  lexicon: HALOT; BDAG
  rationale: El hebreo pregunta de forma retórica por la posibilidad de responder adecuadamente; el griego explicita la idea de retribución. «¿Qué puedes hacer por ellos?» mantiene la pregunta retórica y el sentido de deuda/repago sin sonar forzado.
- source_word: καθὼς αὐτοί σοι / שֶׁהֵם גּוֹמְלִים לָךְ
  english_pob_choice: as they have done for you
  chosen_spanish: tal como ellos han hecho por ti
  alternatives_spanish:
  - como ellos te han hecho
  - según lo que ellos han hecho por ti
  lexicon: HALOT; BDAG
  rationale: «Tal como» conserva la comparación proporcional del griego y evita añadir «igual a» u otra paráfrasis no exigida. «Han hecho por ti» comunica el beneficio implícito en גמל dentro del contexto filial.
theological_decisions:
- issue: Referente implícito de «ellos»
  english_pob_reading: the verse refers to one's parents; the pronoun is implicit from the surrounding context
  chosen_spanish_reading: el versículo se refiere implícitamente a los padres, sin nombrarlos en el cuerpo del texto
  alternative_spanish_readings:
  - dejar el pronombre sin aclaración adicional
  - insertar «tus padres» en el texto principal
  rationale: El contexto inmediato sobre el honor debido a padre y madre permite identificar el referente, pero el texto mismo no lo nombra. La decisión conserva la forma breve del original y deja la aclaración para nota.
  doctrine_reference: Principio de transparencia textual y respeto por la deixis implícita del original.
- issue: Matiz de retribución en la pregunta final
  english_pob_reading: The Greek explicitly frames the question in terms of repayment.
  chosen_spanish_reading: la pregunta conserva la fuerza de retribución sin convertirla en una afirmación explicativa
  alternative_spanish_readings:
  - ¿qué les puedes retribuir?
  - ¿qué les puedes pagar?
  rationale: El hebreo es más general y el griego explicita la noción de retribución; la formulación española intenta sostener ambas dimensiones. Se evita endurecer el texto con un verbo técnico que oscurezca el paralelismo poético.
  doctrine_reference: Principio de equivalencia óptima con control del matiz semántico.
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés más reciente: conserva la dependencia contrafactual («si no fuera por ellos») y refleja el ajuste de la última revisión al paralelismo «tal como ellos han hecho por ti» en lugar de una paráfrasis de igualdad más interpretativa. Se tomó como base el hebreo de Ben Sira y se verificó con el paralelo griego de Swete.'
  spanish_consistency_notes:
  - Se mantiene «ellos» en el cuerpo principal para respetar el pronombre implícito del original; la identificación con «tus padres» queda en nota.
  - Se prefirió «Recuerda» frente a «Acuérdate» por ser más directo y sobrio en un contexto sapiencial.
  - Se evitó «retribuir» en el texto principal para no sobrecargar la línea, aunque se documenta como alternativa lexical fiel al griego.
  - «Tal como» preserva la comparación del hebreo/griego sin introducir una glosa doctrinal o interpretativa.
