  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The translation philosophy prefers original-language primacy over inherited English tradition. 'Armies' more transparently communicates the Hebrew noun than the traditional but less immediately clear 'hosts.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
