review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien el sentido básico del hebreo: prohibición, fuerza causativa de יבטח, uso de Yahvé para יהוה, énfasis en «nos librará ciertamente», y pasivo de «no será entregada». Sin embargo, hay desalineaciones formales en las notas: los marcadores [a] y [b] están invertidos respecto de las notas inglesas y respecto de sus anclajes en el texto. Además, la nota sobre «en mano de» está anclada a «Yahvé» en lugar de a la frase pertinente final.'
  spanish_quality_summary: El español es claro y digno, pero «os» pertenece más al registro peninsular que al objetivo neutral latinoamericano. También «en mano del rey de Asiria» suena algo rígido en español general; «en poder del rey de Asiria» comunica mejor el sentido, dejando la imagen hebrea en nota. La construcción global es legible y fiel.
  glossary_alignment: Se alinea con la terminología del proyecto en «Yahvé» y «Ezequías». «Librará» para נצל es adecuado en contexto militar. La preservación literal de «mano» no es obligatoria; por estilo español y claridad, conviene mover esa alternativa a nota y usar «en poder de» en el texto principal.
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] no corresponden a los lugares correctos del texto.
    rationale: La nota sobre la construcción enfática hebrea debe anclarse a «nos librará ciertamente», no a «Yahvé». La nota sobre «en mano/poder de» debe anclarse a la frase final, no al nombre divino.
  - severity: medium
    issue: Uso de «os» en vez de una formulación más neutral latinoamericana.
    rationale: El proyecto pide español neutral latinoamericano o ampliamente legible en iglesia. «No dejen que Ezequías los haga confiar» evita el sesgo peninsular y sigue siendo natural.
  - severity: medium
    issue: «En mano del rey de Asiria» es menos natural en español contemporáneo general.
    rationale: Aunque refleja la imagen hebrea, «en poder del rey de Asiria» comunica mejor en el texto principal. La imagen «mano» puede conservarse en nota como alternativa léxica.
  revised_spanish_text: 'Y no dejen que Ezequías los haga confiar en Yahvé, diciendo: «Yahvé nos librará ciertamente[a]; esta ciudad no será entregada en poder[b] del rey de Asiria».'
  revised_footnotes:
