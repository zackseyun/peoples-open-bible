translation:
  language: es
  text: Pero si el sacerdote lo examina, y he aquí que no hay pelo blanco en la mancha brillante, y no está más hundida que la piel[a], sino que está apagada, entonces el sacerdote lo aislará[b] por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no está más baja que la piel», es decir, no parece hundida por debajo de la piel circundante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo pondrá en cuarentena» o «lo confinará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֶנָּה
  english_pob_choice: examines it
  chosen_spanish: lo examina
  alternatives_spanish:
  - lo mira
  - lo observa
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el verbo no describe una simple percepción visual, sino una inspección formal para discernir el estado de la lesión. «Lo examina» comunica mejor esa acción diagnóstica sin alejarse del sentido básico de ver.
- source_word: בַּבֶּהֶרֶת
  english_pob_choice: in the bright spot
  chosen_spanish: en la mancha brillante
  alternatives_spanish:
  - en la mancha
  - en el brillo
  - en la zona brillante
  lexicon: HALOT
  rationale: La expresión hebrea designa una marca cutánea con rasgo visual de claridad o blancura. «Mancha brillante» conserva el valor descriptivo del POB en inglés y sugiere la apariencia visible sin convertirlo en un término médico moderno.
- source_word: שֵׂעָר לָבָן
  english_pob_choice: white hair
  chosen_spanish: pelo blanco
  alternatives_spanish:
  - cabello blanco
  - un pelo blanco
  - pelos blancos
  lexicon: HALOT
  rationale: El hebreo usa una expresión singular con fuerza colectiva. «Pelo blanco» mantiene la sencillez del signo diagnóstico y resulta natural en español, sin perder el criterio observable.
- source_word: וּשְׁפָלָה אֵינֶנָּה מִן הָעוֹר
  english_pob_choice: it is not deeper than the skin
  chosen_spanish: no está más hundida que la piel
  alternatives_spanish:
  - no está más baja que la piel
  - no está hundida debajo de la piel
  - no es más profunda que la piel
  lexicon: HALOT
  rationale: La raíz expresa estar bajo, rebajado o deprimido. En español, «más hundida que la piel» conserva la imagen espacial de no verse deprimida respecto de la superficie, siguiendo la decisión inglesa de evitar una paráfrasis demasiado interpretativa.
- source_word: כֵהָה
  english_pob_choice: faded
  chosen_spanish: apagada
  alternatives_spanish:
  - desvaída
  - pálida
  - diluida
  lexicon: HALOT
  rationale: El término apunta a una apariencia debilitada, sin brillo o intensidad. «Apagada» funciona de manera idiomática en español para una marca cutánea y refleja bien la idea de pérdida de viveza que el POB inglés expresó con «faded».
- source_word: וְהִסְגִּירוֹ
  english_pob_choice: the priest shall isolate him
  chosen_spanish: el sacerdote lo aislará
  alternatives_spanish:
  - el sacerdote lo pondrá en cuarentena
  - el sacerdote lo confinará
  - el sacerdote lo encerrará
  lexicon: HALOT
  rationale: El verbo hebreo indica poner aparte o confinar para observación. «Aislará» transmite la función procedimental sin introducir de manera excesiva el lenguaje moderno de salud pública, aunque «poner en cuarentena» sería una alternativa contextual posible.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - siete días
  - durante siete días
  lexicon: HALOT
  rationale: La construcción temporal se puede expresar de forma natural en español con «por siete días», que comunica el período de separación y mantiene la equivalencia directa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado provisto y el audit trail inglés sin cambios relevantes; no hubo revisiones aplicadas en el POB inglés, y la decisión española conserva la misma estructura diagnóstica, incluyendo el marcador discursivo «y he aquí».
  spanish_consistency_notes:
  - Se preservó la terminología sacerdotal con «el sacerdote» y la secuencia observacional del hebreo.
  - «Mancha brillante» sigue la decisión inglesa «bright spot» sin sobreespecificar el tipo de lesión.
  - «Aislará» refleja el valor procedimental de הִסְגִּירוֹ y evita forzar una equivalencia técnica moderna más fuerte que la del contexto.
  - Se mantuvo la cadencia legal/ritual del versículo con una sintaxis clara y publicable en español.
