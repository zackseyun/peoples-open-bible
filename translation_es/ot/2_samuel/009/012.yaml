translation:
  language: es
  text: Mefibóset tenía un hijo joven, y su nombre era Mica. Y todos los que vivían en la casa de Siba eran siervos[a] de Mefibóset.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo עֲבָדִים también puede significar «esclavos», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth had
  chosen_spanish: Mefibóset tenía
  alternatives_spanish:
  - Y a Mefibóset le había
  - Y Mefibóset tenía
  lexicon: HALOT
  rationale: La construcción hebrea con ל expresa posesión/existencia de manera idiomática. En español, «tenía» comunica naturalmente esa relación posesiva sin perder el valor del original ni forzar un calco.
- source_word: בֵּן קָטָן
  english_pob_choice: a young son
  chosen_spanish: un hijo pequeño
  alternatives_spanish:
  - un hijo joven
  - un hijo chico
  lexicon: HALOT
  rationale: בֵּן es «hijo» y קָטָן describe pequeñez/juventud. Aquí «pequeño» conserva la ambigüedad del hebreo y suena natural en español; «joven» interpretaría más claramente la edad, pero restringe un poco el matiz.
- source_word: וּ/שְׁמ֣/וֹ מִיכָ֑א
  english_pob_choice: and his name was Mica
  chosen_spanish: y su nombre era Mica
  alternatives_spanish:
  - y se llamaba Mica
  - cuyo nombre era Mica
  lexicon: HALOT
  rationale: La cláusula hebrea nombra directamente al hijo. «Su nombre era Mica» sigue de cerca la estructura del original y mantiene la forma de nombre transliterado usual.
- source_word: וְ/כֹל מוֹשַׁב בֵּית צִיבָא
  english_pob_choice: And all who lived in the house of Ziba
  chosen_spanish: Y todos los que vivían en la casa de Siba
  alternatives_spanish:
  - Y toda la casa de Siba
  - Y todos los de la casa de Siba
  lexicon: HALOT
  rationale: מוֹשַׁב se refiere a la morada o a quienes habitan allí. «Los que vivían en la casa de Siba» explicita bien el sentido colectivo sin reducirlo demasiado pronto a «casa» como mero linaje o institución.
- source_word: עֲבָדִים
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: HALOT
  rationale: El inglés POB opta por «servants» pero reconoce la tensión léxica de עֲבָדִים, que puede significar también «slaves» según el contexto. En español, «esclavos» preserva mejor esa fuerza lexical y mantiene visible la posible relación de dependencia laboral/bondad que el hebreo permite.
- source_word: לִ/מְפִיבֹֽשֶׁת
  english_pob_choice: to Mephibosheth
  chosen_spanish: de Mefibóset
  alternatives_spanish:
  - para Mefibóset
  - a Mefibóset
  lexicon: HALOT
  rationale: Después de «eran esclavos», el hebreo ל indica relación/dirección hacia Mefibóset. En español, la preposición más natural para expresar pertenencia o dependencia de servicio en esta estructura es «de».
theological_decisions:
- issue: Relación de servicio de la casa de Siba con Mefibóset
  english_pob_reading: all who lived in the house of Ziba were servants to Mephibosheth
  chosen_spanish_reading: todos los que vivían en la casa de Siba eran esclavos de Mefibóset
  alternative_spanish_readings:
  - toda la casa de Siba era esclava de Mefibóset
  - todos los de la casa de Siba servían a Mefibóset
  rationale: La lectura del POB mantiene abierta la cuestión de si se trata de una designación de oficio/estatus o de esclavitud en sentido fuerte. «Esclavos» deja visible la tensión del término עֲבָדִים sin suavizarla teológicamente ni convertirla en mera cortesía.
  doctrine_reference: Léxico y antropología bíblica; términos de servidumbre en el AT
- issue: Nombre propio Mephibosheth/Mica en español
  english_pob_reading: Mephibosheth... Mica
  chosen_spanish_reading: Mefibóset... Mica
  alternative_spanish_readings:
  - Mephibóset... Mica
  rationale: Se adopta la transliteración española habitual de Mephibosheth como «Mefibóset» para una lectura natural en español, sin alterar la identidad del referente. «Mica» conserva el nombre breve del hijo según el hebreo.
  doctrine_reference: Criterios de transliteración y consistencia onomástica
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la fuente hebrea y con el audit trail inglés. No se aplicaron revisiones textuales; la redacción española solo ajusta transliteración y decisiones léxicas para una lectura natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo la transliteración española «Mefibóset» para el nombre principal y «Siba» para צִיבָא.
  - Se conservó «Mica» para el nombre del hijo, siguiendo la forma corta del hebreo.
  - Se eligió «esclavos» para עֲבָדִים por coherencia con la política léxica del proyecto cuando el contexto permite una relación de servidumbre fuerte.
  - La estructura general del versículo se mantuvo en tres miembros, reflejando la sintaxis hebrea sin calco excesivo.
