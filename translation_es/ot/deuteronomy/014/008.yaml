    text: O 'el puerco'.
    reason: lexical_alternative
  - marker: b
    text: O 'no mastica el bolo alimenticio'.
    reason: lexical_alternative
  revision_rationale: Se cambió 'impuro' por 'inmundo' para reflejar mejor la categoría ritual/legal de טָמֵא en este contexto de Torá y alinearse más estrechamente con la decisión POB 'unclean'. Se reparó la nota [b], que antes era circular e inútil, sustituyéndola por una alternativa léxica real para la expresión de rumiar. Se mantuvo el resto del texto, que es fiel y natural en español.
