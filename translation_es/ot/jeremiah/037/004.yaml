translation:
  language: es
  text: Ahora Jeremías iba y venía entre el pueblo, porque aún no lo habían puesto en la casa de confinamiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «en prisión». El hebreo dice literalmente, «en la casa de confinamiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִרְמְיָהוּ
  english_pob_choice: Now Jeremiah
  chosen_spanish: Ahora Jeremías
  alternatives_spanish:
  - Y Jeremías
  - Jeremías
  lexicon: WLC / conjunction discourse function
  rationale: El וְ inicial introduce la escena y avanza el relato; en español, «Ahora» comunica ese valor narrativo con naturalidad. «Jeremías» conserva el nombre propio sin añadir interpretación.
- source_word: בָּא וְיֹצֵא
  english_pob_choice: was coming and going
  chosen_spanish: iba y venía
  alternatives_spanish:
  - andaba de un lado a otro
  - venía y salía
  lexicon: HALOT
  rationale: La secuencia verbal expresa movimiento libre o actividad habitual. «Iba y venía» es una equivalencia natural en español que preserva el idiomatismo sin perder el sentido de circulación continua.
- source_word: בְּתוֹךְ הָעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en medio del pueblo
  - entre la gente
  lexicon: HALOT
  rationale: בְּתוֹךְ señala ubicación dentro de un grupo. «Entre el pueblo» conserva la relación espacial y social del hebreo; «pueblo» mantiene el matiz colectivo más formal que «gente».
- source_word: וְלֹא נָתְנוּ אֹתוֹ
  english_pob_choice: for they had not yet put him
  chosen_spanish: porque aún no lo habían puesto
  alternatives_spanish:
  - y no lo habían puesto
  - pues todavía no lo habían puesto
  lexicon: HALOT
  rationale: El hebreo puede leerse como explicación causal del estado previo de Jeremías. «Porque» explicita esa relación discursiva tal como hace la POB inglesa con «for». «Lo habían puesto» reproduce el uso idiomático de colocar a alguien bajo custodia.
- source_word: בֵּית הַכְּלִיא
  english_pob_choice: in the prison house
  chosen_spanish: en la casa de la prisión
  alternatives_spanish:
  - en la casa de confinamiento
  - en la prisión
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa de confinamiento/prisión». «Casa de la prisión» conserva la imagen concreta del original sin diluirla en el más general «prisión».
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura ya acordada en la POB inglesa y conserva la equivalencia óptima del giro verbal idiomático, la relación causal introducida por la conjunción y la imagen concreta de «casa» asociada a la detención. No se registraron revisiones posteriores en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para הָעָם por su fuerza colectiva y su correspondencia con el registro bíblico.
  - «Casa de la prisión» conserva la metáfora institucional del hebreo sin sustituirla por una abstracción.
  - No se usó «SEÑOR» ni terminología no presente en el versículo.
  - La puntuación con coma después de «pueblo[a]» ayuda a reflejar la cláusula causal del hebreo.
