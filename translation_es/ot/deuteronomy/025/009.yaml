translation:
  language: es
  text: 'entonces la viuda de su hermano se acercará a él en presencia de los ancianos; le quitará la sandalia de su pie, le escupirá en el rostro[a], y responderá y dirá[b]: «Así se hará al hombre que no construya la casa de su hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de él». Algunos intérpretes entienden el hebreo como una escupida frente al hombre, no directamente en su rostro.'
    reason: lexical_alternative
  - marker: b
    text: «Construir la casa de su hermano» significa establecer o continuar su linaje y su hogar por medio del matrimonio levirático.
    reason: cultural_note
lexical_decisions:
- source_word: יְבִמְתּוֹ
  english_pob_choice: his brother’s widow
  chosen_spanish: la viuda de su hermano
  alternatives_spanish:
  - su cuñada
  - la viuda de su hermano difunto
  lexicon: HALOT
  rationale: En el contexto del levirato, la relación específica es la viuda del hermano muerto; «la viuda de su hermano» comunica con claridad el vínculo legal y evita la ambigüedad de «cuñada».
- source_word: לְעֵינֵי הַזְּקֵנִים
  english_pob_choice: in the sight of the elders
  chosen_spanish: a vista de los ancianos
  alternatives_spanish:
  - en presencia de los ancianos
  - delante de los ancianos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente visual y pública; «a vista de» conserva el carácter de acto presenciado sin sonar forzado en español.
- source_word: וְחָלְצָה נַעֲלוֹ מֵעַל רַגְלוֹ
  english_pob_choice: remove his sandal from on his foot
  chosen_spanish: le quitará la sandalia de sobre su pie
  alternatives_spanish:
  - le quitará la sandalia de su pie
  - le descalzará de la sandalia
  lexicon: HALOT
  rationale: «Quitar» reproduce la acción de remover el calzado; «sandalia» mantiene el singular del hebreo y «de sobre su pie» refleja el complemento espacial de מֵעַל.
- source_word: וְיָרְקָה בְּפָנָיו
  english_pob_choice: spit in his face
  chosen_spanish: le escupirá en el rostro
  alternatives_spanish:
  - le escupirá en la cara
  - escupirá delante de él
  lexicon: HALOT
  rationale: La lectura directa del hebreo apunta a una humillación personal y visible; «en el rostro» evita una tonalidad demasiado coloquial de «cara» y mantiene la fuerza del gesto.
- source_word: וְעָנְתָה וְאָמְרָה
  english_pob_choice: answer and say
  chosen_spanish: responderá y dirá
  alternatives_spanish:
  - contesterá y dirá
  - responderá declarando
  lexicon: HALOT
  rationale: La fórmula hebrea legal se conserva con un binomio verbal natural en español; no se reduce a un solo verbo para no perder el ritmo formal.
- source_word: כָּכָה יֵעָשֶׂה
  english_pob_choice: This is what shall be done
  chosen_spanish: Así se hará
  alternatives_spanish:
  - Esto se hará
  - De esta manera se hará
  lexicon: HALOT
  rationale: La fórmula demostrativa se vuelve a un español bíblico claro y breve; «Así se hará» preserva el tono legal sin añadir contenido.
- source_word: לָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: HALOT
  rationale: El hebreo singular masculino se expresa de forma directa y natural en español; «hombre» mantiene el referente legal específico.
- source_word: לֹא יִבְנֶה אֶת בֵּית אָחִיו
  english_pob_choice: who will not build up his brother’s house
  chosen_spanish: que no edifique la casa de su hermano
  alternatives_spanish:
  - que no levante la casa de su hermano
  - que no establezca la casa de su hermano
  lexicon: HALOT
  rationale: Se conserva el verbo «edificar» para reflejar la metáfora hebrea de «construir la casa»; «casa» mantiene el sentido de linaje/hogar sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Cómo traducir la vergüenza ritual de escupir בְּפָנָיו
  english_pob_reading: spit in his face
  chosen_spanish_reading: le escupirá en el rostro
  alternative_spanish_readings:
  - le escupirá delante
  - le escupirá en la cara
  rationale: Se sigue el sentido directo del hebreo, preservando el acto de humillación personal. No se suaviza a una mera acción ‘delante de’ él, porque el audit trail inglés ya documenta esa tensión y la lectura más llana del texto apunta a un gesto dirigido al hombre.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
- issue: Cómo reflejar el sentido idiomático de ‘casa’ en el levirato
  english_pob_reading: build up his brother’s house means to establish or continue his brother’s family line and household through levirate marriage.
  chosen_spanish_reading: no edifique la casa de su hermano
  alternative_spanish_readings:
  - no establezca la casa de su hermano
  - no continúe la casa de su hermano
  rationale: La traducción mantiene la metáfora de ‘casa’ sin convertirla en una paráfrasis explicativa dentro del versículo. El sentido de linaje y continuidad familiar queda disponible por contexto y por la nota, respetando el registro legal del texto.
  doctrine_reference: Translation philosophy §2 (Metaphor preserved when semantically transparent)
translation_notes:
  revision_awareness: El texto español sigue la lectura principal del hebreo y la decisión del POB inglés de mantener la fuerza humillante de בְּפָנָיו. No se adoptaron revisiones sustantivas en el pasaje inglés reciente; por eso la traducción conserva la misma línea interpretativa y solo ajusta naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Casa» conserva el valor idiomático de linaje/hogar, coherente con el proyecto.
  - Se evita «SEÑOR» por norma del proyecto y no es pertinente aquí.
  - «Ancianos» traduce el plural legal sin singularizar ni amplificar.
