revisions:
- from: para que Yahvé, tu Dios, nos indique el camino por[a] donde hemos de andar, y la cosa que hemos de hacer.
  to: para que Yahvé, tu Dios, nos indique el camino por el que hemos de andar[a], y lo que hemos de hacer.
  rationale: Se ajusta la sintaxis para un español más natural («por el que hemos de andar») y se reemplaza «la cosa que hemos de hacer» por «lo que hemos de hacer», que preserva el sentido amplio de הַדָּבָר con mejor legibilidad y dignidad estilística. Se conserva la nota léxica para reflejar la alternativa documentada en la auditoría inglesa.
