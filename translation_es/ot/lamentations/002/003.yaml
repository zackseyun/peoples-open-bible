translation:
  language: es
  text: En ardiente ira ha cortado todo cuerno de Israel[a]; ha retirado su mano derecha de delante del enemigo[b], y ha ardido en Jacob como fuego llameante que devora todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuerno» es una metáfora hebrea de fuerza, poder o exaltación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha retirado su mano derecha de delante del enemigo». La imagen sugiere que Dios retira su poder o protección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַע
  english_pob_choice: has cut down
  chosen_spanish: ha cortado
  alternatives_spanish:
  - ha cortado de raíz
  - ha derribado
  - ha cortado en pedazos
  lexicon: HALOT
  rationale: El verbo expresa una acción destructiva de corte/derribo. En español, «ha cortado» conserva la violencia básica sin introducir una imagen más específica de la que el hebreo exige.
- source_word: בָּחֳרִי אַף
  english_pob_choice: in burning anger
  chosen_spanish: En ardiente ira
  alternatives_spanish:
  - En ira ardiente
  - En ira encendida
  - En furor ardiente
  lexicon: HALOT
  rationale: La frase combina calor/fuego con ira. «Ardiente ira» conserva la imaginería del fuego y suena natural en español bíblico contemporáneo.
- source_word: כָּל קֶרֶן יִשְׂרָאֵל
  english_pob_choice: every horn of Israel
  chosen_spanish: todo cuerno de Israel
  alternatives_spanish:
  - toda la fuerza de Israel
  - todo poder de Israel
  - todo cuerno de Israel
  lexicon: HALOT
  rationale: Se conserva «cuerno» para mantener la metáfora hebrea de fuerza/exaltación, como hizo el POB en inglés. No se sustituye por «fuerza» en el texto principal para no perder la transparencia textual.
- source_word: הֵשִׁיב אָחוֹר יְמִינוֹ
  english_pob_choice: he has drawn back his right hand
  chosen_spanish: ha retraído su mano derecha
  alternatives_spanish:
  - ha retirado su mano derecha
  - ha vuelto atrás su mano derecha
  - ha apartado su mano derecha
  lexicon: HALOT
  rationale: «Retraído» comunica bien la retirada deliberada de la mano/poder. «Mano derecha» mantiene la imagen corporal y, por extensión, la fuerza o protección implicadas.
- source_word: מִפְּנֵי אוֹיֵב
  english_pob_choice: from before the enemy
  chosen_spanish: de delante del enemigo
  alternatives_spanish:
  - ante el enemigo
  - de la presencia del enemigo
  - frente al enemigo
  lexicon: HALOT
  rationale: «De delante de» refleja con bastante literalidad el hebreo y sugiere la retirada en presencia del enemigo. En español es comprensible y conserva el valor espacial del original.
- source_word: וַיִּבְעַר בְּיַעֲקֹב
  english_pob_choice: he has burned in Jacob
  chosen_spanish: ha ardido en Jacob
  alternatives_spanish:
  - se ha encendido en Jacob
  - ha quemado en Jacob
  - ha prendido en Jacob
  lexicon: HALOT
  rationale: El verbo puede expresar arder o encenderse. «Ha ardido en Jacob» preserva la imagen de un fuego activo dentro/de entre Jacob, siguiendo el flujo del verso hacia la metáfora de consumo.
- source_word: כְּאֵשׁ לֶהָבָה
  english_pob_choice: like a flaming fire
  chosen_spanish: como fuego de llama
  alternatives_spanish:
  - como fuego flamígero
  - como llama de fuego
  - como fuego ardiente
  lexicon: HALOT
  rationale: Se mantiene la doble imagen hebrea de fuego + llama. «Fuego de llama» es algo más literal que «fuego flamígero» y evita suavizar la intensificación poética.
- source_word: אָכְלָה סָבִיב
  english_pob_choice: that devours all around
  chosen_spanish: que devora en derredor
  alternatives_spanish:
  - que devora alrededor
  - que consume en derredor
  - devorando alrededor
  lexicon: HALOT
  rationale: «Devora» reproduce el verbo de consumo destructivo. «En derredor» conserva la idea de totalidad periférica de סָבִיב con un registro bíblico claro en español.
theological_decisions:
- issue: Metáforas de juicio divino preservadas en lugar de interpretadas
  english_pob_reading: Retain the metaphors 'horn,' 'right hand,' and fire imagery rather than interpret them away.
  chosen_spanish_reading: Conservar «cuerno», «mano derecha» y el lenguaje de fuego sin sustituirlos por abstracciones interpretativas.
  alternative_spanish_readings:
  - Reemplazar «cuerno» por «fuerza»
  - Reemplazar «mano derecha» por «poder»
  - Parafrasear el fuego como destrucción sin metáfora
  rationale: 'El verso articula el juicio mediante imágenes encadenadas: fuerza derribada, protección retirada y fuego consumidor. Mantener esas metáforas deja visible la lógica poética y teológica del hebreo, en línea con la filosofía de transparencia del POB.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios; por tanto, este borrador sigue de cerca el texto auditado en inglés y conserva sus decisiones léxicas y figurativas principales.
  spanish_consistency_notes:
  - Se mantiene el uso de «Yahvé» como norma del proyecto, pero en este versículo no aparece el nombre divino explícito en el hebreo.
  - «Cuerno» se conserva como metáfora transparente, no como glosa interpretativa en el texto principal.
  - «Mano derecha» y la imaginería de fuego se mantienen para no perder la progresión poética del versículo.
  - El registro busca ser bíblico y digno, pero en español natural, sin calcos más pesados de lo necesario.
