revisions:
- from: Y la tierra produjo vegetación[a], plantas que dan semilla según sus clases, y árboles que dan fruto, en los cuales está su semilla, según sus clases[b]. Y Dios vio que era bueno.
  to: Y la tierra hizo brotar vegetación[a], plantas que dan semilla según sus tipos, y árboles que dan fruto, con su semilla en él, según sus tipos[b]. Y Dios vio que era bueno.
  rationale: Se ajustó la redacción para reflejar mejor la fuerza de וַתּוֹצֵא ('hizo brotar'), aclarar la relación de la semilla con el fruto ('con su semilla en él') y mejorar la naturalidad de לְמִינֵהוּ en español ('según sus tipos'). También se corrigió la nota [a], que antes repetía la lectura principal en lugar de ofrecer una alternativa o explicación útil.
