translation:
  language: es
  text: También, todos sus días come en tinieblas[a], con mucha frustración[b] y enfermedad y enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En tinieblas» puede leerse literalmente o como figura de una vida sombría, sin gozo.
    reason: lexical_alternative
  - marker: b
    text: O «y mucha tristeza»; la frase hebrea es muy condensada y puede denotar frustración, vexación o dolor interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  - Y también
  lexicon: HALOT
  rationale: La partícula introduce una idea adicional dentro de la descripción del hombre. «También» conserva el valor aditivo con naturalidad en español y evita una calca demasiado rígida.
- source_word: כָּל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - toda su vida
  - a lo largo de todos sus días
  - durante toda su vida
  lexicon: HALOT
  rationale: Se mantiene la expresión idiomática hebrea de forma transparente. «Todos sus días» preserva el eco de Qohelet sin imponer una paráfrasis más interpretativa como «toda su vida».
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  - en sombras
  lexicon: HALOT
  rationale: «Tinieblas» conserva el sustantivo concreto y el posible sentido metafórico de una vida sombría o sin alegría. «En oscuridad» suena menos natural en español; «tinieblas» es más bíblico sin perder claridad.
- source_word: יֹאכֵל
  english_pob_choice: he eats
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  - comerá
  - vive comiendo
  lexicon: HALOT
  rationale: 'El imperfecto hebreo expresa acción habitual o característica. En español, el presente simple transmite bien ese valor gnómico: su modo de vida es así.'
- source_word: וְכָעַס הַרְבֵּה
  english_pob_choice: with much vexation
  chosen_spanish: con mucha vejación
  alternatives_spanish:
  - con mucho enojo
  - con gran frustración
  - con mucha aflicción
  lexicon: HALOT
  rationale: El hebreo es comprimido y puede abarcar vexación, frustración o desazón. «Vejación» conserva una molestia interior fuerte y mantiene la tensión semántica sin cerrarla del todo a una sola emoción.
- source_word: חָלְיוֹ
  english_pob_choice: sickness
  chosen_spanish: enfermedad
  alternatives_spanish:
  - mal de salud
  - dolencia
  - achaque
  lexicon: HALOT
  rationale: El sustantivo denota enfermedad o malestar físico. «Enfermedad» es directo y claro en español actual, y conserva la referencia concreta del término.
- source_word: וָקָצֶף
  english_pob_choice: and anger
  chosen_spanish: y enojo
  alternatives_spanish:
  - y furor
  - y ira
  - y resentimiento
  lexicon: HALOT
  rationale: Aquí el término describe su estado anímico agriado o irritado, no la ira divina. «Enojo» es la opción más natural y evita cargar el verso con un matiz excesivamente solemne que el contexto no exige.
translation_notes:
  revision_awareness: Se mantuvo la lectura estable del pasaje sin cambios respecto al último pase auditado, con atención especial a la frase hebrea condensada de וְכָעַס הַרְבֵּה y a la imagen de בַּחֹשֶׁךְ, que en español se resolvió con un término concreto pero natural.
  spanish_consistency_notes:
  - Se preserva el estilo sobrio y transparente de la serie POB.
  - Se usa «Yahvé» solo cuando aparece el Tetragrámaton; este verso no lo contiene.
  - «Tinieblas» se eligió por su fuerza bíblica y su capacidad para conservar tanto el sentido literal como el figurado.
  - La secuencia final mantiene una enumeración sin conjunciones explicativas añadidas, para respetar la concisión del hebreo.
