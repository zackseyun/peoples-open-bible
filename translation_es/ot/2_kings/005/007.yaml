  - severity: medium
    issue: «a quitarle a un hombre su lepra» no refleja bien el idiomatismo hebreo y suena poco natural
    rationale: לֶאֱסֹף אִישׁ מִצָּרַעְתּוֹ significa idiomáticamente curar/sanar/librar a alguien de su lepra. «Quitarle... su lepra» es comprensible, pero menos natural en español bíblico legible y menos alineado con la decisión auditada en inglés («to cure a man of his leprosy»).
