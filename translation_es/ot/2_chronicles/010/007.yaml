translation:
  language: es
  text: 'Le hablaron, diciendo: «Si tú eres bueno con este pueblo, si los agradas[a] y les hablas palabras buenas, entonces serán tus siervos[b] todos tus días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les muestras favor». El verbo hebreo puede implicar agradar, ganar favor o tratar favorablemente.
    reason: lexical_alternative
  - marker: b
    text: O «te servirán continuamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ אֵלָיו לֵאמֹר
  english_pob_choice: They spoke to him, saying
  chosen_spanish: Ellos le hablaron, diciendo
  alternatives_spanish:
  - Le dijeron
  - Le hablaron así
  lexicon: HALOT / uso narrativo estándar
  rationale: La construcción narrativa se vierte de modo directo y natural en español, conservando el verbo de habla y la fórmula introductoria sin añadir interpretación.
- source_word: תִּהְיֶה לְטוֹב
  english_pob_choice: you will be good
  chosen_spanish: tú eres bueno
  alternatives_spanish:
  - tú harás el bien
  - tú serás favorable
  lexicon: HALOT
  rationale: La idiomática hebrea expresa ser o volverse bueno/beneficioso para alguien. En español, «eres bueno con» transmite esa relación de beneficio de forma clara y digna, evitando una traducción mecánica.
- source_word: לְהָעָם הַזֶּה
  english_pob_choice: to this people
  chosen_spanish: con este pueblo
  alternatives_spanish:
  - a este pueblo
  - para este pueblo
  lexicon: HALOT
  rationale: El contexto político y relacional favorece «con» en español para expresar benevolencia hacia el pueblo. «Pueblo» mantiene la referencia colectiva del hebreo sin forzar «nación».
- source_word: וּרְצִיתָם
  english_pob_choice: you please them
  chosen_spanish: los agradas
  alternatives_spanish:
  - les das gusto
  - les muestras favor
  - los satisfaces
  lexicon: HALOT
  rationale: רצה aquí tiene el sentido de ganar la aprobación o favor de alguien. «Agradar» es la equivalencia española más natural y conserva el matiz relacional que el inglés POB también documenta como posible favor.
- source_word: וְדִבַּרְתָּ אֲלֵהֶם דְּבָרִים טוֹבִים
  english_pob_choice: and speak good words to them
  chosen_spanish: les hablas palabras buenas
  alternatives_spanish:
  - les hablas palabras favorables
  - les dices cosas buenas
  lexicon: HALOT
  rationale: Se mantiene la repetición hebrea de «hablar» + «palabras» + «buenas» de manera natural en español. «Palabras buenas» preserva la forma del original mejor que una paráfrasis como «les hablas bien».
- source_word: וְהָיוּ לְךָ עֲבָדִים
  english_pob_choice: then they will be your servants
  chosen_spanish: serán tus esclavos
  alternatives_spanish:
  - serán tus siervos
  - te servirán
  lexicon: HALOT
  rationale: Aunque el contexto es político, el texto hebreo usa עֲבָדִים, y el proyecto POB suele reservar «esclavos» para conservar la fuerza léxica del término. Se mantiene así la tensión léxica, aunque el uso social aquí no sea el de esclavitud doméstica o chattel en sentido estricto.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - todos los días
  - siempre
  lexicon: uso idiomático bíblico
  rationale: El hebreo expresa duración continua mediante la frase literal «todos los días». En español, «todos tus días» refleja el posesivo explícito presente en el hebreo y resulta más natural que una simple calca.
theological_decisions:
- issue: Alcance de עֲבָדִים en un contexto real y político
  english_pob_reading: then they will be your servants
  chosen_spanish_reading: serán tus esclavos
  alternative_spanish_readings:
  - serán tus siervos
  - te servirán
  rationale: Se conserva la fuerza del término hebreo sin suavizarla hacia un lenguaje eclesiástico tradicional. Aunque el contexto apunta a sujeción política, la decisión deja visible la carga semántica del original.
  doctrine_reference: Lexical force / translation transparency
translation_notes:
  revision_awareness: El inglés POB pasó de «all the days» a «all your days» por el posesivo explícito del hebreo. La versión española incorpora ese matiz con «todos tus días». También se atiende la nota léxica sobre רצה, manteniendo en español la posibilidad de entenderlo como agradar o mostrar favor.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para עָם en coherencia con el contexto y con el inglés POB.
  - 'Se conserva el paralelismo verbal del hebreo: ser bueno / agradar / hablar palabras buenas / ser tus esclavos.'
  - Se evita «SEÑOR» o terminología litúrgica no presente en el versículo.
  - 'Los corchetes de notas se colocan solo donde hay alternativa real en el texto: «agradas[a]» y «esclavos[b]».'
