    text: O, «la ofrenda por fuego» o «la ofrenda de fuego».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para reflejar mejor el hebreo y el audit trail inglés: ‘les dirás’ mejora la naturalidad sin pérdida de sentido; הָאִשֶּׁה se lleva a ‘ofrenda de alimento’ para corresponder a la elección principal documentada, manteniendo en nota las alternativas relacionadas con fuego; תַּקְרִיבוּ se afina a ‘presentarán’ por cercanía al matiz de acercar/presentar; y תמיד se vierte como ‘regular’, que expresa la recurrencia establecida del holocausto diario sin la posible sobrelectura de ‘perpetuo’.'
