    issue: La cláusula inicial «No permitan los de mente vana que bendigan...» representa mal μὴ ... εὐλογησάτωσαν.
    rationale: 'El griego expresa una prohibición de tercera persona: «que los de mente vana no bendigan/exulten». El español draft convierte a «los de mente vana» en sujetos de «permitan», lo cual cambia la sintaxis y oscurece el sentido.'
  - severity: medium
