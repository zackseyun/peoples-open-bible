translation:
  language: es
  text: 'Hijo de hombre, di a Faraón, rey de Egipto, y a su multitud[a]: ¿A quién te pareces en tu grandeza?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "a sus hordas" o "a su muchedumbre"; el hebreo puede denotar la masa de personas, fuerzas o séquito asociado con Faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el idiomático vocativo profético recurrente en Ezequiel y mantiene el paralelismo con la forma tradicional del libro. En español, "Hijo de hombre" es una fórmula estable y transparente para este uso, sin suavizar el tono literario del original.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - dile
  - habla
  lexicon: HALOT
  rationale: Es el imperativo directo de אמר. "Di" mantiene la inmediatez de la orden profética y suena natural en español sin añadir matices ausentes del hebreo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Nombre/título establecido en español bíblico. Se conserva como transliteración habitual y clara.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - monarca de Egipto
  lexicon: HALOT
  rationale: Sigue la relación constructa de manera natural y precisa. "Rey de Egipto" expresa la титulación sin sobreinterpretar el cargo.
- source_word: הֲמוֹנוֹ
  english_pob_choice: his multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - sus hordas
  - su muchedumbre
  - su tropa
  lexicon: HALOT
  rationale: '"Multitud" preserva la amplitud semántica del sustantivo hebreo, que puede abarcar masa de gente, fuerzas o séquito asociado con Faraón. Se evita especificar militarmente "hordas" o "tropa" sin que el texto lo exija.'
- source_word: אֶל מִי
  english_pob_choice: To whom
  chosen_spanish: ¿A quién... ?
  alternatives_spanish:
  - ¿A quién te comparas... ?
  - ¿Con quién... ?
  lexicon: HALOT
  rationale: La frase española refleja el valor comparativo del giro interrogativo con naturalidad. El complemento preposicional se integra mejor en español como pregunta directa sobre comparación.
- source_word: דָּמִיתָ
  english_pob_choice: are you like
  chosen_spanish: te has comparado
  alternatives_spanish:
  - te pareces
  - eres semejante
  lexicon: HALOT
  rationale: El verbo דמה expresa comparación o semejanza. Aquí se traduce con una forma que hace explícita la comparación retórica sin perder el sentido de semejanza.
- source_word: בְגָדְלְךָ
  english_pob_choice: in your greatness
  chosen_spanish: en tu grandeza
  alternatives_spanish:
  - en tu magnificencia
  - por tu grandeza
  lexicon: HALOT
  rationale: '"Grandeza" conserva el sustantivo abstracto del hebreo y deja abierta la referencia a poder, esplendor o estatura imperial, como en el texto fuente.'
translation_notes:
  revision_awareness: La versión inglesa de referencia fue revisada de "Whom are you like" a "To whom are you like" para reflejar con más naturalidad el אֶל־מִי del hebreo. La redacción española adopta esa relación interrogativa comparativa de modo directo y fluido, sin añadir explicaciones que el texto no contiene.
  spanish_consistency_notes:
  - Se mantiene "Faraón" como título propio estable en lugar de un equivalente descriptivo.
  - '"Hijo de hombre" conserva el vocativo literario característico de Ezequiel.'
  - '"Su multitud" deja abierta la amplitud semántica de הֲמוֹנוֹ, coherente con la nota alternativa.'
  - La pregunta retórica se formula con "¿A quién... ?" para seguir el valor comparativo de אֶל מִי y evitar una construcción forzada en español.
