  to: Y la costa se convertirá en pastos[a], con refugios para los pastores y cercados para los rebaños.
  rationale: Se ajusta «el litoral del mar» a «la costa» para mayor naturalidad y fidelidad idiomática en español, se simplifica «pastizales» a «pastos» por mejor fluidez bíblica, y se restaura en la nota la alternativa auditada «cisternas ... rediles» para conservar el expediente léxico del POB.
