lexical_decisions:
- source_word: מִשְׁמָע
  english_pob_choice: Mishma
  chosen_spanish: Misma
  alternatives_spanish:
  - Mishma
  - Mishmá
  lexicon: nombre propio
  rationale: Se trata de un nombre propio en una lista genealógica; por eso se translitera y no se traduce. Se adapta la forma a la ortografía española con acento final para indicar el acento natural en lectura pública.
- source_word: וְ/דוּמָה
  english_pob_choice: and Dumah
  chosen_spanish: Dumá
  alternatives_spanish:
  - y Dumá
  - Duma
  lexicon: nombre propio
  rationale: La conjunción hebrea no se explicita en la línea principal porque la serie nominal en español se entiende bien con comas y la última 'y'. דוּמָה es un nombre propio y se translitera; se marca el acento para una pronunciación española clara.
- source_word: מַשָּׂא
  english_pob_choice: Massa
  chosen_spanish: Masá
  alternatives_spanish:
  - Massa
  - Massá
  lexicon: nombre propio
  rationale: En este contexto genealógico funciona como nombre propio, no como el sustantivo común 'carga/oráculo'. Se conserva la fuerza onomástica mediante transliteración española.
- source_word: חֲדַד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Hadad
  - Hadar
  lexicon: nombre propio
  rationale: Se conserva la lectura de Crónicas frente al paralelo de Génesis 25:15, que tiene una forma distinta. Como nombre propio, se translitera sin traducir.
- source_word: וְ/תֵימָא
  english_pob_choice: and Tema
  chosen_spanish: Temá
  alternatives_spanish:
  - y Temá
  - Tema
  lexicon: nombre propio
  rationale: Nombre propio en la lista; se translitera y se acentúa gráficamente para lectura española. La coordinación final queda expresada por la 'y' del cierre de la serie.
translation_notes:
  revision_awareness: El texto en inglés mantiene los cinco nombres propios en transliteración y conserva una nota textual para la variante Hadad/Hadar. La versión española sigue esa misma decisión auditada, adaptando solo la forma ortográfica y acentual al español.
  spanish_consistency_notes:
  - Se preserva la estructura de lista genealógica con nombres propios transliterados.
  - Se evita traducir los nombres como sustantivos comunes, porque el contexto morfológico y la pauta auditada del POB los trata como antropónimos.
  - La nota textual sobre Hadad/Hadar se mantiene porque es una variante significativa entre Crónicas y el paralelo de Génesis.
