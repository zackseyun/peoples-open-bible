base_translation:
  language: en
  yaml_path: translation/deuterocanon/prayer_of_azariah/001/021.yaml
  text: And let all who show evil to your slaves be put to shame[a], and let them be disgraced from all their dominion[c][b], and let their strength be broken.
  footnotes:
  - marker: a
    text: Or 'your servants.' The Greek is 'your slaves' (τοῖς δούλοις σου), emphasizing belonging to God.
    reason: alternative_reading
  - marker: b
    text: Or 'those who inflict evil on your slaves.' The Greek participle literally means 'those who show evil' toward them.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from all their dominion' may also be understood more loosely as 'in all their power' or 'despite all their dominion.'
    reason: lexical_alternative
