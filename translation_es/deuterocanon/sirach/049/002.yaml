base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/049/002.yaml
  text: For he had compassion on our backsliding[c][b][a], and removed the abominations of vanity.
  footnotes:
  - marker: a
    text: Or, following the Greek parallel more closely, 'For he set the people right in their return' or 'in the people's repentance.' The Hebrew reads 'our backsliding,' while the Greek reflects a more positive 'turning/return.'
    reason: alternative_reading
  - marker: b
    text: '''Abominations of emptiness'' likely refers to idolatrous abominations; compare the Hebrew use of ''emptiness/vanity'' as a polemical term for idols.'
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel reads 'and he removed the abominations of lawlessness,' differing from the Hebrew 'abominations of emptiness.'
    reason: textual_variant
