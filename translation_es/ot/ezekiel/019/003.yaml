translation:
  language: es
  text: Ella crió a uno de sus cachorros; llegó a ser un león joven, y aprendió a desgarrar presas; devoró a la gente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «devoró seres humanos» / «devoró al hombre». Hebreo: «אָדָם» en singular, con sentido humano genérico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  english_pob_choice: She brought up
  chosen_spanish: Ella crió
  alternatives_spanish:
  - Ella levantó
  - Ella hizo subir
  - Ella lo crió
  lexicon: HALOT
  rationale: En este contexto maternal y animal, el verbo transmite la idea de criar o sacar adelante a un cachorro. «Crió» es natural en español y conserva el sentido de rearing/raising sin perder el trasfondo literal de «hacer subir».
- source_word: אֶחָד מִגֻּרֶיהָ
  english_pob_choice: one of her cubs
  chosen_spanish: a uno de sus cachorros
  alternatives_spanish:
  - a uno de sus crías
  - a uno de sus cachorros de león
  - a uno de sus pequeños
  lexicon: HALOT
  rationale: גּוּר designa un animal joven; en español «cachorro» es idiomático y transmite bien la relación partitiva «uno de». «Cría» sería posible, pero «cachorro» conserva mejor la imagen animal concreta.
- source_word: כְּפִיר
  english_pob_choice: a young lion
  chosen_spanish: un león joven
  alternatives_spanish:
  - un cachorro de león
  - un leoncillo
  - un león
  lexicon: HALOT
  rationale: כְּפִיר indica un león joven, ya apto para la caza, no solo un cachorro. «León joven» mantiene esa etapa de desarrollo mejor que «leoncillo» y evita reducirlo a una mera cría.
- source_word: וַיִּלְמַד לִטְרָף טֶרֶף
  english_pob_choice: he learned to tear prey
  chosen_spanish: aprendió a desgarrar la presa
  alternatives_spanish:
  - aprendió a atrapar la presa
  - aprendió a despedazar la presa
  - aprendió a cazar
  lexicon: HALOT
  rationale: La construcción intensifica la acción depredadora. «Desgarrar la presa» conserva la violencia concreta del hebreo mejor que una expresión más general como «cazar» o «atrapar».
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - personas
  - humanos
  - el hombre
  lexicon: HALOT
  rationale: Aunque el hebreo es singular («אָדָם»), en español «la gente» comunica de modo natural el sentido colectivo/genérico que la POB inglesa expresó con «people». Además evita un singular artificioso y mantiene el contraste humano frente al león.
- source_word: אָכָל
  english_pob_choice: he devoured
  chosen_spanish: devoró
  alternatives_spanish:
  - comió
  - consumió
  - devoró a
  lexicon: HALOT
  rationale: «Devoró» reproduce bien el matiz predatorio y violento del contexto; es más fiel que «comió» y más vívido que «consumió». El complemento «a la gente» completa el objeto natural en español.
theological_decisions:
- issue: Tratamiento del singular hebreo אָדָם con sentido genérico
  english_pob_reading: people
  chosen_spanish_reading: la gente
  alternative_spanish_readings:
  - personas
  - humanos
  - el hombre
  rationale: El hebreo usa un singular genérico. La POB inglesa revisada optó por «people» para sonar natural sin perder el alcance humano. En español, «la gente» comunica ese valor colectivo y evita forzar un singular que sonaría extraño en la secuencia narrativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La base inglesa auditada cambió de «man» a «people» para reflejar אָדָם como singular genérico de manera natural. La redacción española sigue esa revisión con «la gente», manteniendo el tono predatorio del resto del verso y sin añadir interpretaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «León joven» preserva la fuerza de כְּפִיר sin rebajarla a «cachorro» en el núcleo predicativo.
  - La nota usa únicamente una alternativa realmente apoyada por el hebreo para no multiplicar opciones superfluas.
