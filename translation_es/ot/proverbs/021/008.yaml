translation:
  language: es
  text: El camino del hombre culpable es torcido[a] y extraño[b], pero la conducta del puro es recta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «retorcido». El hebreo puede referirse a algo torcido o distorsionado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La senda del hombre es torcida y extraña»; el término hebreo traducido «culpable» es difícil y también puede dar la idea de «extraño», «forastero» o «ajeno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲפַכְפַּךְ
  english_pob_choice: crooked
  chosen_spanish: torcida
  alternatives_spanish:
  - doblada
  - retorcida
  - perversa
  lexicon: HALOT
  rationale: El adjetivo expresa algo torcido o distorsionado. “Torcida” conserva la imagen física y funciona de modo natural en contraste con “recto” al final del versículo.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: senda
  alternatives_spanish:
  - camino
  - curso
  - conducta
  lexicon: HALOT
  rationale: En Proverbios, דֶּרֶךְ suele referirse al modo de vida o a la trayectoria moral. “Senda” mantiene la metáfora y suena natural en español bíblico sin volverse arcaizante.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el POB inglés preserva esa precisión. “Hombre” mantiene la referencia gramatical y proverbial.
- source_word: וָזָר
  english_pob_choice: guilty / strange
  chosen_spanish: extraño
  alternatives_spanish:
  - ajeno
  - forastero
  - culpable
  lexicon: HALOT
  rationale: El término hebreo es difícil y puede significar “extraño”, “forastero” o “ajeno”; el inglés POB también preserva esa tensión con una nota. En español conviene mantener la ambigüedad primaria con “extraño” y no resolverla del todo como “culpable” en el texto principal.
- source_word: זַךְ
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - inocente
  lexicon: HALOT
  rationale: En el contexto sapiencial, el adjetivo expresa pureza moral. “Puro” reproduce bien ese sentido y empareja con el contraste del verso.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - derecho
  - íntegro
  lexicon: HALOT
  rationale: El hebreo describe rectitud moral y responde naturalmente a “torcida”. “Recto” conserva el paralelismo espacial y ético.
- source_word: פָּעֳלוֹ
  english_pob_choice: conduct
  chosen_spanish: proceder
  alternatives_spanish:
  - obra
  - acción
  - conducta
  lexicon: HALOT
  rationale: El sustantivo puede referirse a obra o acto, pero aquí funciona como resumen del modo de actuar de la persona pura. “Proceder” da un equivalente fluido y abarcador en español.
translation_notes:
  revision_awareness: Se siguió el testimonio del hebreo masorético (WLC) y el audit trail inglés. Se mantuvo la tensión léxica de וָזָר como término difícil, sin cerrar prematuramente la interpretación en la línea principal; el contraste con זַךְ / יָשָׁר se preservó mediante 'puro' / 'recto'. No se detectaron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se evitó traducir דֶּרֶךְ de forma abstracta como 'conducta' en la primera cola para conservar la metáfora sapiencial de 'senda'.
  - Se empleó 'recto' para יָשָׁר por su paralelismo natural con 'torcida'.
  - Se mantuvo 'extraño' en el texto principal para reflejar la dificultad lexical de וָזָר y no borrar la ambigüedad documentada.
  - 'El orden y la puntuación siguen la antítesis poética del hebreo: primera cola negativa, segunda cola positiva con ''pero''.'
