revisions:
- from: Yahvé tu Dios está en medio de ti[a], un poderoso que salva; se gozará sobre ti con alegría; callará en su amor; se regocijará sobre ti con gritos de júbilo.
  to: Yahvé tu Dios está en medio de ti[a], un poderoso que salva; se gozará sobre ti con alegría; callará en su amor; se regocijará sobre ti con cánticos.
  rationale: Se corrige la nota para reflejar fielmente las alternativas preservadas en el POB inglés y se ajusta ברנה a 'con cánticos' para mantener la decisión auditada 'with singing' sin perder naturalidad en español. El resto del texto puede permanecer igual porque transmite bien el hebreo y la lógica traductológica documentada.
