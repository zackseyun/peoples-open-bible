base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/017/024.yaml
  text: And it made them noble and courageous in infantry combat and siege warfare[a], and after sacking them[c][b], he conquered all the enemies.
  footnotes:
  - marker: a
    text: Or 'for infantry battle'; the Greek literally refers to fighting on foot.
    reason: lexical_alternative
  - marker: b
    text: The Greek participle means 'after sacking' or 'after devastating' and commonly has cities or strongholds in view.
    reason: lexical_alternative
  - marker: c
    text: The Greek leaves the subject compressed and somewhat implicit in this clause; the English preserves that abruptness rather than specifying a subject from the wider context.
    reason: alternative_reading
