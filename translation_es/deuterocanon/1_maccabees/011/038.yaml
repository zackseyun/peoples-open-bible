base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/011/038.yaml
  text: And King Demetrius saw that the land was quiet before him and that nothing opposed him[a], so he dismissed all his forces, each to his own place, except for the foreign forces that he had recruited from the islands of the nations[b]; and all the forces from his fathers became hostile to him.
  footnotes:
  - marker: a
    text: Or 'mercenary forces' for 'foreign forces'; the Greek specifically refers to non-native troops and may imply hired foreign soldiers.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'all the forces from the time of his fathers' likely means the traditional troops inherited from his forefathers' rule, in contrast to the foreign troops he retained.
    reason: cultural_note
