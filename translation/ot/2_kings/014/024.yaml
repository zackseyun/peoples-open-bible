theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the relative clause אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen_reading: 'The clause is rendered instrumentally with reference to Jeroboam''s sins/practices: ''by which he caused Israel to sin.'''
  alternative_readings:
  - 'The clause refers directly to Jeroboam: ''who caused Israel to sin.'''
  rationale: In English, attaching 'who caused Israel to sin' directly to 'Jeroboam son of Nebat' is possible and traditional. However, because the immediate antecedent in the flow is 'sins,' rendering it as 'by which' better captures the sense that Amaziah's successor persisted in the same sinful practices introduced by Jeroboam, while still leaving Jeroboam as the implied subject of 'caused.' This preserves the Hebrew's compactness without obscuring the causative relationship.
