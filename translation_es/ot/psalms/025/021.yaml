translation:
  language: es
  text: La integridad y la rectitud me preserven[a], porque te espero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me preservarán»; el verbo hebreo puede expresar aquí una expectativa confiada o un ruego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Pongo mi esperanza en ti»; el verbo hebreo incluye la idea de esperar con esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּם
  english_pob_choice: Integrity
  chosen_spanish: integridad
  alternatives_spanish:
  - blamelessness
  - inocencia
  lexicon: HALOT
  rationale: תֹּם denota plenitud o integridad moral. «Integridad» es natural en español moderno y conserva el valor ético sin exagerar la idea hacia «inocencia».
- source_word: וָיֹשֶׁר
  english_pob_choice: and uprightness
  chosen_spanish: y la rectitud
  alternatives_spanish:
  - y la justicia recta
  - y la honestidad
  lexicon: HALOT
  rationale: יֹשֶׁר expresa rectitud o lo derecho en sentido ético. «Rectitud» mantiene el paralelismo poético con «integridad» y evita una paráfrasis demasiado interpretativa.
- source_word: יִצְּרוּנִי
  english_pob_choice: may preserve me
  chosen_spanish: me preserven
  alternatives_spanish:
  - me guarden
  - me protejan
  - me custodien
  lexicon: HALOT
  rationale: De נצר, ‘guardar, preservar’. El yiqtol puede expresar deseo o confianza en una oración; el subjuntivo «me preserven» refleja bien el tono petitorio y conserva la posibilidad de lectura volitiva.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base o razón del ruego/confianza anterior. «Porque» es claro en español y mantiene la relación causal o justificativa del hemistiquio.
- source_word: קִוִּיתִיךָ
  english_pob_choice: I wait for you
  chosen_spanish: en ti espero
  alternatives_spanish:
  - en ti aguardo
  - en ti pongo mi esperanza
  - espero en ti
  lexicon: HALOT
  rationale: קוה incluye esperar con esperanza. «En ti espero» es idiomático en español y conserva tanto la espera como la confianza implícita; evita reducirlo a mera expectativa temporal.
theological_decisions:
- issue: Si las cualidades morales del salmista funcionan como mérito propio o como lenguaje de confianza/petición dentro de un marco pactual
  english_pob_reading: The verse is rendered as a prayer that integrity and uprightness preserve the psalmist, without importing a doctrine of self-righteous merit.
  chosen_spanish_reading: El versículo se traduce como una oración en la que la integridad y la rectitud son las que preservan al salmista, sin convertir la frase en una afirmación doctrinal de mérito autosuficiente.
  alternative_spanish_readings:
  - Una lectura más fuerte en la que el salmista apela a su propia rectitud como base de liberación
  rationale: El hebreo atribuye la acción preservadora a estas cualidades morales en paralelo con la espera confiada en Yahvé. La traducción conserva esa tensión sin suavizar el lenguaje ético ni añadir explicaciones que cierren indebidamente la ambigüedad.
  doctrine_reference: Conservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés, manteniendo la ambigüedad del yiqtol en יִצְּרוּנִי y el matiz de espera esperanzada en קִוִּיתִיךָ. No se detectaron revisiones posteriores que alteren la base de trabajo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino explícito, por lo que se conserva la referencia pronominal «ti».
  - Se eligió «integridad» y «rectitud» como pares éticos complementarios, coherentes con el uso POB de lexicalización moral sin recurrir a formulaciones eclesiásticas más tradicionales.
  - «En ti espero» mantiene el valor de espera confiada sin borrar la posibilidad de «esperar con esperanza».
