base_translation:
  language: en
  yaml_path: translation/ot/exodus/013/007.yaml
  text: Unleavened bread shall be eaten throughout the seven days[a], and no leaven shall be seen with you[b], and no yeast shall be seen with you within all your territory.
  footnotes:
  - marker: a
    text: Or 'anything leavened' for 'leavened bread.' The Hebrew חָמֵץ denotes what is leavened, while שְׂאֹר in the next clause refers more specifically to the leavening agent itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'shall not be seen with you.' The wording implies that no leavened product or yeast is to remain anywhere in your possession or domain during the seven days.
    reason: lexical_alternative
