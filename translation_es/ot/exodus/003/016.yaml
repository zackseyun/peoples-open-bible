revisions:
- from: 'Ve, y reúne a los ancianos de Israel, y diles: «Yahvé, el Dios de sus padres —el Dios de Abraham, de Isaac y de Jacob— se me apareció, diciendo: “Ciertamente he atendido[a] a ustedes y a lo que se les ha hecho en Egipto”».'
  to: 'Ve y reúne a los ancianos de Israel, y diles: «Yahvé, el Dios de sus padres —el Dios de Abraham, de Isaac y de Jacob— se me apareció, diciendo: “Ciertamente he atendido[a] a ustedes y a lo que se les ha hecho en Egipto”».'
  rationale: 'El borrador es sustancialmente fiel, pero requiere una reparación menor de estilo y normalización editorial: se elimina la coma innecesaria tras «Ve», se conserva la forma projectual «Yahvé», y se mantiene la nota léxica correctamente anclada solo en «atendido». No se necesita cambiar el sentido ni la terminología principal.'
