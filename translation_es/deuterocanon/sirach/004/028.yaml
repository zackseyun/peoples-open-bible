translation:
  language: es
  text: No te sientes con un juez injusto[a], porque con él el juicio será según su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice de manera sustancialmente diferente: «Lucha por la verdad hasta la muerte, y el Señor Dios peleará por ti».'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תֵּשֵׁב
  english_pob_choice: Do not sit
  chosen_spanish: No te sientes
  alternatives_spanish:
  - No te sientes a
  - No tomes asiento
  - No te pongas a
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'sentar(se)', pero aquí el sentido es no asociarse ni participar junto a esa persona. En español, la forma con imperativo negativo de trato directo comunica la misma advertencia sin sonar forzada.
- source_word: שׁוֹפֵט
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez que juzga
  - magistrado
  - árbitro
  lexicon: HALOT
  rationale: El término apunta a quien decide causas. 'Juez' es la equivalencia más natural y directa en español jurídico y conserva el valor forense del hebreo.
- source_word: עַוָּל
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - malvado
  - perverso
  - inicuo
  lexicon: HALOT
  rationale: En contexto judicial, 'injusto' reproduce mejor la noción de conducta torcida en el ejercicio de juzgar. 'Inicuo' sería posible, pero es más marcado y menos transparente para lectores generales.
- source_word: כַאֲשֶׁר כִּרְצוֹנוֹ
  english_pob_choice: according to his pleasure
  chosen_spanish: conforme a su gusto
  alternatives_spanish:
  - según su voluntad
  - a su antojo
  - de acuerdo con su deseo
  lexicon: HALOT
  rationale: La frase hebrea expresa arbitrariedad guiada por la propia voluntad. 'Conforme a su gusto' mantiene el matiz de preferencia personal y evita una formulación demasiado abstracta; 'según su voluntad' sería también posible, pero puede sonar más solemne que el hebreo en este contexto.
- source_word: תִּשְׁפּוֹט עִמּוֹ
  english_pob_choice: with him judgment will be according to his pleasure
  chosen_spanish: el juicio será conforme a su gusto
  alternatives_spanish:
  - juzgarás con él
  - el juicio se hará con él
  - con él se juzgará
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil y el antecedente exacto en inglés/audited context se entiende como una afirmación sobre cómo resultará el juicio en su compañía. En español, una frase impersonal conserva esa lectura y evita imponer una segunda persona explícita que el hebreo no garantiza con claridad.
theological_decisions:
- issue: Texto hebreo como base principal frente al paralelo griego muy diferente
  english_pob_reading: Hebrew base text is primary; Greek is noted as a substantially different reading in a footnote.
  chosen_spanish_reading: Se traduce el testimonio hebreo como texto principal y se señala el griego como lectura sustancialmente distinta.
  alternative_spanish_readings:
  - Traducir el griego en el texto principal
  - fundir hebreo y griego en una sola redacción
  rationale: Sirácida conserva aquí un testimonio hebreo claro, y el paralelo griego no es una simple variante verbal sino otra formulación de sentido muy distinto. Para mantener la transparencia textual del POB, la redacción principal sigue el hebreo y la lectura griega se preserva en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; registrar honestamente divergencias textuales mayores'
translation_notes:
  revision_awareness: He seguido la decisión revisada del audit trail de mantener la segunda cláusula más cercana al hebreo, evitando una paráfrasis libre. La redacción española conserva la advertencia legal del texto base y deja constancia de la tradición griega divergente en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' reservado para el Tetragrámaton; aquí no aparece porque el hebreo base no lo contiene.
  - '''Juez'' se usa por transparencia legal, en coherencia con el registro de sabiduría jurídica del versículo.'
  - La nota usa comillas latinas españolas y conserva el contraste textual sin mezclar ambas tradiciones en el cuerpo principal.
