revisions:
- from: No te fatigues para hacerte rico[a]; deja de depender de tu propia prudencia.
  to: No te fatigues para llegar a ser rico[a]; desiste de tu propio entendimiento.
  rationale: Se ajusta el segundo hemistiquio para reflejar con más literalidad חֲדָל מִבִּינָתְךָ, evitando la adición interpretativa 'depender de'. También se cambia 'prudencia' por 'entendimiento' para alinearse mejor con בינה y con la auditoría inglesa. En el primer hemistiquio, 'llegar a ser rico' ofrece un registro más natural y digno, mientras la alternativa 'hacerte rico' se conserva en nota.
