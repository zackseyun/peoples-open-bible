revisions:
- from: Pero tú estás lleno del juicio del impío[a]; juicio y justicia te alcanzan.
  to: Pero tú estás lleno del juicio del impío[a]; juicio y justicia te sujetan[b].
  rationale: 'Se reemplaza ''te alcanzan'' por ''te sujetan'' para reflejar mejor el valor posible de יִתְמֹכוּ en esta línea comprimida: una acción de sostener o asir, no simplemente de llegar. También se añade una nota léxica para preservar las alternativas documentadas por el POB inglés y la ambigüedad del hebreo.'
