translation:
  language: es
  text: 'Y Ozías les dijo: «¡Cobren ánimo, hermanos! Resistamos todavía cinco días más, durante los cuales el Señor, nuestro Dios, hará volver su misericordia hacia nosotros, porque no nos abandonará para siempre[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no nos dejará para siempre». La expresión griega εἰς τέλος puede implicar abandono final o completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρσεῖτε
  english_pob_choice: Take courage
  chosen_spanish: ¡Cobren ánimo!
  alternatives_spanish:
  - ¡Tengan valor!
  - ¡Ánimo!
  - ¡Sean valientes!
  lexicon: LSJ
  rationale: El imperativo plural exhorta a la valentía en una situación de presión. «Cobren ánimo» preserva la fuerza exhortativa con naturalidad en español actual, sin perder el matiz de ánimo y coraje.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - consanguíneos
  - parientes
  lexicon: LSJ
  rationale: El vocativo plural masculino se conserva como «hermanos», siguiendo la forma directa del griego y la decisión documental de mantener la precisión de género cuando el contexto no exige neutralización.
- source_word: διακαρτερήσωμεν
  english_pob_choice: let us hold out
  chosen_spanish: Resistamos
  alternatives_spanish:
  - Perseveremos
  - Soportemos
  - Aguantemos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo expresa perseverancia continua bajo presión. «Resistamos» comunica con claridad la idea de mantenerse firmes por un tiempo determinado en el contexto del asedio.
- source_word: ἔτι πέντε ἡμέρας
  english_pob_choice: for five more days
  chosen_spanish: cinco días más
  alternatives_spanish:
  - todavía cinco días
  - por otros cinco días
  - aún cinco días
  lexicon: LSJ
  rationale: «Más» reproduce el sentido aditivo de ἔτι y es la formulación más natural en español para una extensión temporal.
- source_word: ἐν αἷς
  english_pob_choice: within which
  chosen_spanish: durante los cuales
  alternatives_spanish:
  - en los cuales
  - en cuyo tiempo
  - mientras
  lexicon: LSJ
  rationale: La cláusula relativa marca el período de espera en el que se espera la acción divina. «Durante los cuales» mantiene la relación temporal sin sonar forzado.
- source_word: ἐπιστρέψει
  english_pob_choice: will turn ... toward us
  chosen_spanish: hará volver ... hacia nosotros
  alternatives_spanish:
  - volverá ... hacia nosotros
  - dirigirá ... hacia nosotros
  - hará retornar ... hacia nosotros
  lexicon: LSJ
  rationale: Con τὸ ἔλεος αὐτοῦ y ἐφʼ ἡμᾶς, el verbo es transitivo y la misericordia es el objeto. «Hará volver su misericordia hacia nosotros» conserva la construcción del griego y evita introducir «de nuevo» sin base explícita.
- source_word: Κύριος ὁ θεὸς ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: el Señor, nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - el Señor Dios nuestro
  - nuestro Señor y Dios
  lexicon: LSJ
  rationale: 'Para κύριος en este contexto deuterocanónico, el auditable equivalente español de la traducción inglesa es «Señor». La coma ayuda a reflejar la aposición natural en español: «el Señor, nuestro Dios».'
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su piedad
  - su compasión
  - su clemencia
  lexicon: LSJ
  rationale: ἔλεος se vierte mejor como «misericordia» en registro bíblico español. Es preciso, reverente y no desplaza el sentido hacia una mera emoción.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - sobre nosotros
  - para nosotros
  - sobre nosotros de nuevo
  lexicon: LSJ
  rationale: Con el movimiento de la misericordia expresado por ἐπιστρέψει, el complemento direccional natural en español es «hacia nosotros».
- source_word: οὐ γὰρ ἐγκαταλείψει ἡμᾶς εἰς τέλος
  english_pob_choice: for he will not abandon us forever
  chosen_spanish: porque no nos abandonará para siempre
  alternatives_spanish:
  - porque no nos abandonará hasta el final
  - porque no nos abandonará completamente
  - porque no nos dejará para siempre
  lexicon: LSJ
  rationale: La cláusula idiomática εἰς τέλος puede expresar abandono final o completo. «Para siempre» sigue la revisión inglesa más natural y mantiene la fuerza de permanencia negativa sin sobrerrazonar el modismo.
theological_decisions:
- issue: Rendering of κύριος referring to Israel's God in Greek deuterocanonical prose
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Dueño
  rationale: En este pasaje el original inmediato es griego κύριος, no un Tetragrámaton hebreo explícito. Por eso se mantiene «Señor», coherente con la política documental del proyecto para κύριος en contexto griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered vocative ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanas y hermanos
  - hermanos y hermanas
  rationale: El griego usa masculino plural; se conserva «hermanos» para respetar la forma fuente y evitar una neutralización no sustentada por el texto.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: εἰς τέλος idiom in negated abandonment statement
  english_pob_reading: he will not abandon us forever
  chosen_spanish_reading: no nos abandonará para siempre
  alternative_spanish_readings:
  - no nos abandonará hasta el final
  - no nos abandonará completamente
  rationale: La expresión griega puede comunicar abandono completo o final. «Para siempre» reproduce la decisión inglesa revisada y conserva el sentido idiomático sin añadir una idea temporal estricta no obligatoria por el griego.
  doctrine_reference: LSJ / revision pass on εἰς τέλος
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que eliminó «back» de la cláusula de misericordia y prefirió «forever» para εἰς τέλος; por eso no se introduce «de vuelta» ni «otra vez» en español. También se conserva la estructura de exhortación, espera temporal y esperanza divina sin ampliar el contenido más allá del griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en contexto griego deuterocanónico, sin convertirlo en «Yahvé» porque el texto fuente aquí no es el Tetragrámaton hebreo.
  - «Misericordia» se usa de modo consistente para ἔλεος, manteniendo el tono bíblico y la decisión léxica del audit trail inglés.
  - El vocativo plural se conserva como «hermanos», alineado con la precisión de género del texto fuente.
  - La nota al pie [a] está anclada en el texto y ofrece la alternativa idiomática permitida por εἰς τέλος.
