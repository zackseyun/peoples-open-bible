  from: Still I will pour out instruction like prophecy, and I will leave it for generations forever.
  to: I will yet pour out instruction like prophecy, and I will leave it behind for everlasting generations.
  rationale: The blind draft offers a more precise and natural rendering. 'I will yet' avoids the potential ambiguity of 'Still'. 'Leave it behind' accurately reflects the force of καταλείψω (to bequeath or transmit to the future). Finally, 'generations of ages' is a faithful and elevated rendering of the genitive phrase γενεὰς αἰώνων, improving upon the slightly clunky 'generations forever'.
