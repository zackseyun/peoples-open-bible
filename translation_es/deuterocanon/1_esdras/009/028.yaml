translation:
  language: es
  text: 'Y de los hijos de Zamot[a]: Elíadas, Eleiasimo, Othonías, Jarimot, Sabados[b] y Zeralías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista sigue el texto griego de 1 Esdras; no se armoniza con paralelos hebreos o con Esdras/Nehemías cuando los nombres difieren.
    reason: alternative_reading
  - marker: b
    text: La transcripción del testimonio griego presenta una ligera incertidumbre en nombres propios; por eso se conserva una transliteración prudente.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - entre los hijos de
  - de entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ marca procedencia o pertenencia al grupo; en español, «de los hijos de» conserva la fórmula genealógica y resulta natural en una lista de nombres.
- source_word: Ζαμόθ
  english_pob_choice: Zamoth
  chosen_spanish: Zamot
  alternatives_spanish:
  - Zamoth
  - Zamot
  lexicon: LSJ
  rationale: Se translitera directamente del griego, ajustando mínimamente la ortografía al español para una lectura más natural sin armonizar con otra tradición nominal.
- source_word: Ἐλιάδας
  english_pob_choice: Eliadas
  chosen_spanish: Elíadas
  alternatives_spanish:
  - Eliadas
  - Eliadás
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega; se conserva el acento prosódico natural del español para facilitar la lectura pública.
- source_word: Ἐλειάσειμος
  english_pob_choice: Eleiasimus
  chosen_spanish: Eleiasimo
  alternatives_spanish:
  - Eleiasimus
  - Eleasimo
  lexicon: LSJ
  rationale: La forma griega es rara y la tradición paralela muestra variación; se mantiene una transliteración conservadora sin forzar una identificación hebrea.
- source_word: Ὀθονίας
  english_pob_choice: Othonias
  chosen_spanish: Otonías
  alternatives_spanish:
  - Othonías
  - Otonias
  lexicon: LSJ
  rationale: Nombre propio transliterado con adaptación ortográfica mínima al español. Se preserva la forma griega sin reconstrucción semítica.
- source_word: Ἰαριμώθ
  english_pob_choice: Jarimoth
  chosen_spanish: Jarimot
  alternatives_spanish:
  - Járimot
  - Iarimot
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre griego; se omite la -h final inglesa porque no corresponde al español estándar y no añade valor fonético.
- source_word: Σάβαδος
  english_pob_choice: Sabados
  chosen_spanish: Sabados
  alternatives_spanish:
  - Sábados
  - Sabadós
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera conservadora desde el testimonio griego. No se armoniza con posibles equivalentes hebreos porque 1 Esdras usa la forma griega transmitida.
- source_word: Ζεραλίας
  english_pob_choice: Zeralias
  chosen_spanish: Zeralías
  alternatives_spanish:
  - Zeralias
  - Jeralías
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente del griego, con acentuación española para lectura clara. Se evita sustituirlo por una forma hebraizante no atestiguada aquí.
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando en el texto los marcadores de nota [a] y [b] exactamente donde corresponden, manteniendo la transliteración conservadora del listado griego.
  spanish_consistency_notes:
  - Se preservó la fórmula genealógica «de los hijos de» para ἐκ τῶν υἱῶν.
  - Se mantuvo la transliteración griega de los nombres propios sin armonización al hebreo paralelo.
  - Se añadió acentuación española solo donde ayuda a la lectura pública sin alterar la identificación del nombre.
