review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: un ay profético contra quien construye y afianza poder urbano mediante violencia y perversión jurídica/moral. Conserva correctamente הוֹי como denuncia, בְּדָמִים como modismo de violencia/sangre derramada, y בְּעַוְלָה como instrumental. Sin embargo, la distribución de notas no sigue fielmente el rastro auditado del inglés: la nota sobre la alternativa ''founds a city'' corresponde a la expresión verbal completa ''establece una ciudad'', no solo a ''población'', y en español ''población'' resulta menos preciso para קִרְיָה.'
  spanish_quality_summary: 'El español es claro y digno, pero ''población'' suena algo administrativo/demográfico y menos natural en este paralelismo profético que ''ciudad''. Dado que en español repetir ''ciudad'' es idiomáticamente aceptable, conviene priorizar precisión y naturalidad sobre variación artificial. También es mejor anclar ambas notas exactamente donde afectan: una en ''derramamiento de sangre'' y otra en la segunda cláusula.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales están alineadas con el POB: ''¡Ay de quien...!'', ''edifica'', ''derramamiento de sangre'', ''establece''. La única desalineación relevante es usar ''población'' para reproducir la variación inglesa; en español no mejora la fidelidad y debilita la legibilidad.'
  issues:
  - severity: medium
    issue: '''población'' para קִרְיָה'
    rationale: Aunque intenta reflejar la variación inglesa city/town, en español 'población' puede evocar número de habitantes o un término administrativo, y no suena tan natural en un oráculo poético como 'ciudad'. Repetir 'ciudad' aquí preserva mejor el sentido del hebreo.
  - severity: medium
    issue: La nota b está anclada de forma imprecisa
    rationale: La alternativa inglesa 'Or “founds a city” for “establishes a town”' corresponde a toda la segunda unidad verbal-nominal, no solo a 'población'. Debe anclarse en la frase 'establece una ciudad'.
  revised_spanish_text: ¡Ay de quien edifica una ciudad con derramamiento de sangre[a] y establece una ciudad[b] con injusticia!
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «con sangres», un modismo para derramamiento de sangre o culpa de sangre.'
    reason: lexical_alternative
  - marker: b
    text: O «funda una ciudad» para «establece una ciudad».
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'población' por 'ciudad' para mayor precisión semántica y mejor naturalidad en español bíblico contemporáneo. Se reubica la nota b para que corresponda a toda la expresión alternativa documentada en el audit trail inglés. El resto del versículo preserva adecuadamente el sentido fuente y el tono profético.
