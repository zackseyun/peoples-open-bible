  glossary_alignment: 'Alineado con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego. «Candelabro» como traducción principal de מְנוֹרָה concuerda con la política de traducir el sustantivo común; «menorá» puede quedar solo en nota. «Puro» para טָהוֹר y «incienso» para קְטֹרֶת son adecuados y fieles.'
