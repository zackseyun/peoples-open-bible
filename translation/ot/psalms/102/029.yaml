id: PSA.102.29
reference: Psalms 102:29
source:
  edition: WLC
  text: בְּנֵֽי עֲבָדֶ֥י/ךָ יִשְׁכּ֑וֹנוּ וְ֝/זַרְעָ֗/ם לְ/פָנֶ֥י/ךָ יִכּֽוֹן־׃
translation:
  text: The children of your servants will dwell[a], and their offspring will be established before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sons of your servants will dwell, and their seed will be established before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The children of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. In English, 'children of' best conveys the familial-descendant sense naturally and can include both male and female descendants. 'Sons of' would be more formally literal but is unnecessarily restrictive here.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean 'servant' or 'slave.' In this psalmic address to God, 'servants' is the most idiomatic and contextually fitting rendering; the bonded-status nuance is not foregrounded here as it is in some NT uses of δοῦλος.
- source_word: יִשְׁכּוֹנוּ
  chosen: will dwell secure
  alternatives:
  - will dwell
  - will live
  - will abide
  lexicon: HALOT
  rationale: From שכן, 'to dwell, settle, reside.' In context of enduring stability after the contrast with creation's transience, 'dwell secure' brings out the settled, protected sense implied by the promise, without over-paraphrasing.
- source_word: וְזַרְעָם
  chosen: and their offspring
  alternatives:
  - and their seed
  - and their descendants
  lexicon: HALOT
  rationale: זֶרַע often denotes offspring/descendants collectively. 'Offspring' is natural modern English and preserves the collective singular sense better than the more archaic 'seed.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before your face/presence.' 'Before you' is concise and faithful, while still carrying the sense of being in God's presence.
- source_word: יִכּוֹן
  chosen: will be established
  alternatives:
  - will stand firm
  - will be made secure
  lexicon: HALOT
  rationale: Niphal of כון conveys being established, fixed, or made firm. 'Will be established' matches the passive/resultative force and fits the covenantal-stability theme of the verse.
