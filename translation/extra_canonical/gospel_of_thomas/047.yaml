    footnotes:
    - marker: a
      text: ‘Single one’ renders ⲥⲱⲏⲣⲡ, an idiom in Thomas for undivided, integrated
        personhood. The strangeness is preserved.
      reason: cultural_note
    - marker: b
      text: ⲃⲣⲣⲉ can mean ‘new/young’ or ‘child’; here it modifies being ‘single’
        (ⲥⲱⲏⲣⲡ). Reading ‘as new’ is possible, but Thomas elsewhere links becoming
        a ‘single one’ with being ‘like a little child’.
      reason: lexical_alternative
    - marker: c
      text: ⲁⲥⲕⲟⲥ here is the verb ‘to sew’ (Crum s.v. ⲕⲟⲥ), not the Greek noun ἀσκός
        ‘wineskin’. The context is mending garments.
      reason: dialect_note
    - marker: d
      text: Or 'Let a person be a single one, and let their mind desire to be single
        like a little child. And no one sews a new patch onto an old garment, because
        it will make a tear; nor does one sew an old patch onto a new garment, lest
        it tear it, and a split will happen in the new garment.'.
      reason: previous_rendering
