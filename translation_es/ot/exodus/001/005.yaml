translation:
  language: es
  text: Y todas las personas que salieron de los lomos de Jacob fueron setenta personas[a], y José ya estaba en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «que salieron del muslo de Jacob». Es un modismo para sus descendientes directos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... were
  chosen_spanish: y ... fueron
  alternatives_spanish:
  - y ... resultaron ser
  - y ... eran
  lexicon: HALOT
  rationale: El hebreo introduce la cláusula de manera narrativa con וַיְהִי; en español, una coordinación simple con «y» más el verbo finito «fueron» conserva el enlace narrativo y el valor resultativo sin caer en una fórmula arcaica.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - el total de
  - la totalidad de
  lexicon: HALOT
  rationale: «כָּל» expresa la amplitud total del grupo; «todas» reproduce esa fuerza cuantitativa de manera natural en español.
- source_word: נֶפֶשׁ ... נָפֶשׁ
  english_pob_choice: persons ... persons
  chosen_spanish: personas ... personas
  alternatives_spanish:
  - almas ... almas
  - gentes ... gentes
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona como término de conteo para individuos, no como «alma» en sentido antropológico. «Personas» mantiene el valor contable y evita una lectura doctrinal ajena al contexto.
- source_word: יֹצְאֵי יֶרֶךְ יַעֲקֹב
  english_pob_choice: who came from Jacob’s loins
  chosen_spanish: que salieron de los lomos de Jacob
  alternatives_spanish:
  - que salieron del muslo de Jacob
  - que descendieron de Jacob
  - que provinieron de Jacob
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo, donde la expresión alude a los descendientes directos de Jacob. «Lomos» es el equivalente español más cercano y comprensible para mantener la idiomaticidad y la concreción del original.
- source_word: שִׁבְעִים
  english_pob_choice: seventy
  chosen_spanish: setenta
  lexicon: HALOT
  rationale: Número cardinal directo, sin matiz adicional.
- source_word: וְיוֹסֵף
  english_pob_choice: and Joseph
  chosen_spanish: y José
  alternatives_spanish:
  - e José
  lexicon: HALOT
  rationale: La conjunción copulativa simple se mantiene como «y»; el nombre propio se adapta a la forma española estándar «José».
- source_word: הָיָה בְמִצְרָיִם
  english_pob_choice: was already in Egypt
  chosen_spanish: ya estaba en Egipto
  alternatives_spanish:
  - estaba en Egipto
  - había estado en Egipto
  lexicon: HALOT
  rationale: El hebreo indica la presencia previa de José en Egipto respecto del grupo contado. «Ya estaba» comunica esa anterioridad de forma idiomática en español, sin forzar un pluscuamperfecto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la traducción inglesa auditada y confirma la misma decisión central para יֹצְאֵי יֶרֶךְ יַעֲקֹב: conservar la imagen corporal del hebreo en español mediante «lomos», con nota explicativa. No se registran revisiones textuales adicionales en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - «José» sigue la forma española estándar del nombre propio; no afecta decisiones terminológicas especiales.
  - La duplicación de «personas» mantiene el paralelismo del hebreo y la lectura contable del sustantivo נֶפֶשׁ.
