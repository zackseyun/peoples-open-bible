review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa del hebreo: Abimelec llega a la torre, combate contra ella, se acerca a la entrada y lo hace con el propósito de quemarla. Sin embargo, la expresión final no preserva de manera idiomática y exacta לְשָׂרְפוֹ בָאֵשׁ. «Prenderla fuego» es una construcción no estándar; el hebreo expresa claramente ‘quemarla con fuego’.'
  spanish_quality_summary: El texto es generalmente claro y legible, pero la cláusula final suena antinatural en español general. «Para prenderle fuego» sería idiomático, pero cambiaría el referente pronominal; como el hebreo lleva sufijo directo sobre ‘la torre’, la forma más fiel y natural es «para quemarla con fuego».
  glossary_alignment: No hay términos teológicos sensibles aquí. «Abimelec» y «torre» están bien. «Combatió contra ella» es aceptable, aunque «luchó contra ella» también habría servido. El principal problema es léxico-sintáctico en la traducción de לְשָׂרְפוֹ בָאֵשׁ.
  issues:
  - severity: medium
    issue: «para prenderla fuego» es español no idiomático
    rationale: En español estándar se dice «prenderle fuego» o «quemarla». La forma actual afecta la naturalidad y puede distraer al lector.
  - severity: medium
    issue: Se omite explícitamente el valor instrumental de בָאֵשׁ
    rationale: Aunque el medio puede quedar implícito en ciertos giros españoles, aquí el hebreo lo expresa abiertamente. «Con fuego» preserva mejor la forma y el sentido del original.
  - severity: low
    issue: La justificación lexical de evitar «quemarla» no es convincente
    rationale: «Quemarla» es precisamente la opción más directa para שׂרף con sufijo directo, y en esta frase resulta más fiel que el giro propuesto.
  revised_spanish_text: Abimelec llegó a la torre y combatió contra ella, y se acercó a la entrada de la torre para quemarla con fuego.
  revision_rationale: Se reemplaza «para prenderla fuego» por «para quemarla con fuego» para reflejar con fidelidad e idiomaticidad el infinitivo hebreo לְשָׂרְפוֹ y el instrumental בָאֵשׁ. No se requieren notas.
