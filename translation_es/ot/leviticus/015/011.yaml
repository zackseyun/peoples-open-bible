translation:
  language: es
  text: Y todo aquel a quien toque el hombre con el flujo[a], sin haberse lavado las manos en agua,[b] lavará su ropa y se bañará en agua, y quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el que tiene flujo''. El hebreo usa un participio sustantivado masculino para la persona afectada por esta secreción corporal en la ley de pureza.'
    reason: lexical_clarity
  - marker: b
    text: 'O: ''si no se ha lavado las manos en agua''. El hebreo puede leerse como la condición bajo la cual el contacto transmite impureza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el záb
  alternatives_spanish:
  - el hombre con el flujo
  - el que tiene la descarga
  lexicon: HALOT
  rationale: Conservo el término técnico POB 'záb' para el varón afectado por la descarga, porque el hebreo usa aquí un participio sustantivado masculino y el registro de pureza legal exige precisión lexical. El glosario o notas del proyecto pueden explicar el referente sin perder la fuerza terminológica del contexto.
- source_word: וְכֹל אֲשֶׁר יִגַּע בּוֹ
  english_pob_choice: everyone whom the man with the discharge touches
  chosen_spanish: Y todo el que toque
  alternatives_spanish:
  - Y cualquiera que toque
  - Y toda persona que toque
  lexicon: HALOT
  rationale: La construcción distributiva hebrea se vierte naturalmente como 'todo el que'. Mantiene el alcance general y evita una paráfrasis excesiva. El objeto tocado se sobreentiende en español por el contexto inmediato.
- source_word: וְיָדָיו לֹא שָׁטַף בַּמָּיִם
  english_pob_choice: without having washed his hands in water
  chosen_spanish: sin haber lavado sus manos en agua
  alternatives_spanish:
  - sin que sus manos hayan sido lavadas en agua
  - si no ha lavado sus manos en agua
  lexicon: HALOT
  rationale: שָׁטַף se entiende mejor aquí como 'lavar/enjuagar' en el contexto del contacto previo. Sigo el ajuste revisado en inglés hacia 'washed' por ser más natural, pero mantengo la estructura circunstancial que refleja la posible condición del hebreo. 'En agua' preserva el complemento instrumental literal.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - lavará su ropa
  lexicon: HALOT
  rationale: כִּבֵּס refiere al lavado de prendas. 'Vestidos' conserva un tono más formal y bíblico sin perder claridad; además distingue esta acción del lavado corporal posterior.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará en agua
  - y se bañará con agua
  lexicon: HALOT
  rationale: רָחַץ aquí indica lavado del cuerpo. 'Bañarse en agua' mantiene la distinción lexical frente a 'lavar sus vestidos' y es idiomático en español, aunque algo más literal que 'lavarse'.
- source_word: וְטָמֵא עַד הָעָרֶב
  english_pob_choice: and be unclean until the evening
  chosen_spanish: y quedará impuro hasta la tarde
  alternatives_spanish:
  - y será impuro hasta la tarde
  - y estará impuro hasta la tarde
  lexicon: HALOT
  rationale: טָמֵא expresa impureza ritual, no culpa moral. 'Impuro' comunica esa categoría en español contemporáneo de manera más clara que 'inmundo', y 'hasta la tarde' reproduce הָעָרֶב con naturalidad bíblica.
theological_decisions:
- issue: Impureza ritual versus inmoralidad
  english_pob_reading: Render טמא as 'unclean' in a ritual/purity sense, not as moral defilement.
  chosen_spanish_reading: Traducir טָמֵא como 'impuro' en sentido ritual, no moral.
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: El versículo pertenece a legislación de pureza vinculada a contacto corporal y a ritos de lavado. 'Impuro' evita cargar el texto con connotaciones éticas ajenas al contexto y preserva la categoría cultual.
  doctrine_reference: Levítico 15; pureza ritual en la Torá
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió 'washed' frente a 'rinsed' para שָׁטַף, sin alterar la distinción entre lavar las manos, lavar los vestidos y bañarse. La versión española mantiene esa distinción mediante 'lavado sus manos', 'lavará sus vestidos' y 'se bañará en agua'.
  spanish_consistency_notes:
  - Se mantiene 'impuro' para טָמֵא, coherente con el tratamiento ritual del libro.
  - Se conserva 'záb' como término técnico transliterado para no perder la precisión del participio sustantivado hebreo.
  - '''Vestidos'' distingue la ropa del lavado corporal y sigue un registro bíblico digno sin depender de fórmulas eclesiásticas tradicionales.'
