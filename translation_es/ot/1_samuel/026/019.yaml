translation:
  language: es
  text: 'Y ahora[a], por favor, que mi señor el rey oiga las palabras de su esclavo. Si Yahvé te ha incitado contra mí, acepte él una ofrenda; pero si son hombres, ellos están malditos delante de Yahvé, porque hoy me han expulsado de tener parte[b] en la heredad de Yahvé, diciendo: «Ve, sirve a otros dioses».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «huela una ofrenda», un giro idiomático para aceptar un sacrificio u ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O «de adherirme a la heredad de Yahvé». La expresión hebrea puede enfatizar estar unido, incorporado o incluido dentro de la porción asignada por Yahvé a su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La partícula conjuntiva ו más el adverbio temporal pide una transición discursiva natural. «Y ahora» conserva el enlace y el arranque apelativo del hebreo.
- source_word: יִשְׁמַע נָא
  english_pob_choice: please let ... hear
  chosen_spanish: por favor, que ... oiga
  alternatives_spanish:
  - por favor, oiga
  - que ... escuche, por favor
  lexicon: HALOT
  rationale: El jussivo con נָא expresa súplica cortés, no una orden desnuda. «Que ... oiga» mantiene el valor exhortativo y «por favor» conserva el matiz de deferencia.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi soberano el rey
  lexicon: HALOT
  rationale: «Señor» es el equivalente natural y reverente de אֲדֹנִי en un contexto cortesano; no implica divinidad aquí. «Rey» traduce הַמֶּלֶךְ de forma directa.
- source_word: דִּבְרֵי עַבְדּוֹ
  english_pob_choice: the words of his servant
  chosen_spanish: las palabras de su esclavo
  alternatives_spanish:
  - las palabras de tu siervo
  - las palabras de su siervo
  lexicon: HALOT
  rationale: Se conserva el estilo humilde en tercera persona y la fuerza léxica de עבד. Dado que la POB inglesa prefiere «servant» solo por cortesía contextual en algunos casos, aquí el hebreo permite «esclavo» como término más fuerte y preciso.
- source_word: אִם יְהוָה הֱסִיתְךָ בִי
  english_pob_choice: If Yahweh has stirred you up against me
  chosen_spanish: Si Yahvé te ha incitado contra mí
  alternatives_spanish:
  - Si Yahvé te ha movido contra mí
  - Si Yahvé te ha estimulado contra mí
  lexicon: HALOT
  rationale: הסית puede significar incitar, instigar o mover. «Incitado» comunica mejor la fuerza causativa y preserva la tensión sobre la agencia divina sin suavizarla indebidamente.
- source_word: יָרַח מִנְחָה
  english_pob_choice: may he accept an offering
  chosen_spanish: acepte él una ofrenda
  alternatives_spanish:
  - huela él una ofrenda
  - acepte él un sacrificio
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático ligado al olfato para la aceptación de una ofrenda. En español, «acepte una ofrenda» comunica el sentido sacrificial sin perder claridad; el posible trasfondo idiomático queda reflejado en una nota.
- source_word: וְאִם בְּנֵי הָאָדָם
  english_pob_choice: but if it is men
  chosen_spanish: pero si son los hijos de los hombres
  alternatives_spanish:
  - pero si son hombres
  - pero si son seres humanos
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea literal porque el texto contrasta con Yahvé y puede abarcar a agentes humanos en general. «Hijos de los hombres» mantiene la forma del original y su tono solemne.
- source_word: אֲרוּרִים הֵם לִפְנֵי יְהוָה
  english_pob_choice: they are cursed before Yahweh
  chosen_spanish: malditos sean ellos delante de Yahvé
  alternatives_spanish:
  - están malditos delante de Yahvé
  - malditos están delante de Yahvé
  lexicon: HALOT
  rationale: La secuencia nominal con pronombre puede leerse como declaración con valor resultativo o desiderativo en español. «Malditos sean» deja abierta esa fuerza sin decidir en exceso y «delante de Yahvé» conserva el marco judicial/covenantal.
- source_word: גֵרְשׁוּנִי
  english_pob_choice: they have driven me out
  chosen_spanish: me han expulsado
  alternatives_spanish:
  - me han echado
  - me han desterrado
  lexicon: HALOT
  rationale: גרש implica expulsión forzosa. «Expulsado» es preciso y claro en español moderno, y mantiene el carácter de exclusión violenta.
- source_word: מֵהִסְתַּפֵּחַ
  english_pob_choice: from having a share
  chosen_spanish: para que no me aparte
  alternatives_spanish:
  - para no poder asociarme
  - para no ser unido
  lexicon: HALOT
  rationale: El hitpael de ספח puede expresar adherirse, unirse o quedar incluido en una porción. Aquí se traduce de forma funcional para evitar una formulación forzada, sin perder la idea de exclusión de la comunidad/heredad; la nota mantiene la alternativa más literal.
- source_word: בְּנַחֲלַת יְהוָה
  english_pob_choice: in Yahweh’s inheritance
  chosen_spanish: de la heredad de Yahvé
  alternatives_spanish:
  - en la heredad de Yahvé
  - de la herencia de Yahvé
  lexicon: HALOT
  rationale: נחלה puede ser heredad, porción o herencia. «Heredad» conserva el valor tradicional y el sentido de posesión asignada por Yahvé, con resonancia tanto territorial como comunitaria.
- source_word: לֵךְ עֲבֹד אֱלֹהִים אֲחֵרִים
  english_pob_choice: Go, serve other gods
  chosen_spanish: Ve, sirve a otros dioses
  alternatives_spanish:
  - Ve, adora a otros dioses
  - Ve, rinde servicio a otros dioses
  lexicon: HALOT
  rationale: עבד aplicado a deidades tiene el valor de servir y rendir culto. «Sirve» preserva la fuerza del verbo y el vínculo de lealtad religiosa mejor que una traducción más interpretativa.
theological_decisions:
- issue: Relación entre la acción de Yahvé y la de los seres humanos en la incitación contra David
  english_pob_reading: The translation retains the conditional statement without resolving how divine causation relates to human agency.
  chosen_spanish_reading: Se mantiene la condición sin explicar cómo se relacionan la iniciativa divina y la humana.
  alternative_spanish_readings:
  - Si Yahvé lo hizo directamente
  - Si solo fue una अनुमति/providencia permisiva
  rationale: El hebreo presenta la apelación de David como una condición abierta. La traducción española conserva esa tensión teológica sin imponer una solución doctrinal externa.
  doctrine_reference: Preservar la tensión teológica del texto.
- issue: Alcance de la exclusión de la heredad de Yahvé
  english_pob_reading: Rendered as exclusion from having a share in the LORD's inheritance, encompassing land and covenant community.
  chosen_spanish_reading: Se entiende como exclusión de la heredad de Yahvé, con posible alcance territorial y comunitario-cultual.
  alternative_spanish_readings:
  - Solo exclusión de la tierra
  - Solo exclusión del culto
  rationale: El hebreo puede abarcar tanto la porción asignada en la tierra como la pertenencia a la comunidad del pacto. «Heredad» permite conservar esa amplitud.
  doctrine_reference: Mantener el alcance amplio de נחלה en contexto del pacto.
translation_notes:
  revision_awareness: Se cotejó el borrador con el paquete fuente hebreo y el audit trail inglés. No se detectaron revisiones posteriores que obligaran cambios; se preservó la tensión léxica principal en הסית y en la imagen idiomática de יָרַח מִנְחָה, y se mantuvo el alcance amplio de נחלה.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה.
  - Se usa «esclavo» para עבד en este contexto de auto-humillación cortesana.
  - Se mantiene «heredad» para נחלה para asegurar consistencia con el lenguaje del pacto y la porción asignada.
  - Se evita «SEÑOR» como máscara y se conserva la referencia explícita al nombre divino.
  - La nota [a] se ancla en la imagen idiomática de la ofrenda; la nota [b] en la posible lectura de pertenencia/participación en la heredad.
