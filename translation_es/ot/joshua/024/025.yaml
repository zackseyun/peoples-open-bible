translation:
  language: es
  text: Así que Josué hizo un pacto[a] con el pueblo aquel día, y allí en Siquem estableció para ellos un estatuto y una ordenanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortó un pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estableció para ellos un estatuto y un juicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרֹת
  english_pob_choice: made
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - cortó un pacto
  - concertó un pacto
  lexicon: HALOT
  rationale: La expresión hebrea כּרת ברית es literalmente «cortar un pacto», pero en español bíblico claro y natural la equivalencia establecida es «hacer un pacto». «Hizo un pacto» conserva el sentido relacional y jurídico sin volver opaca la frase.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: En español, «pacto» comunica bien la fuerza bilateral y vinculante de בְּרִית en este contexto narrativo-jurídico. «Alianza» puede sonar más política o moderna; «covenio» no es idiomático.
- source_word: לָעָם
  english_pob_choice: with the people
  chosen_spanish: con el pueblo
  alternatives_spanish:
  - para el pueblo
  - con el pueblo de Israel
  lexicon: HALOT
  rationale: 'Aunque la preposición hebrea es ל, en la idiomática del acto de pactar el sentido es relacional: Josué pactó con el pueblo. «Con el pueblo» respeta esa relación sin añadir especificación innecesaria.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» es natural en español y conserva la referencia temporal definida. Se evita una formulación más pesada sin perder el demostrativo del hebreo.
- source_word: וַיָּשֶׂם
  english_pob_choice: set
  chosen_spanish: estableció
  alternatives_spanish:
  - puso
  - fijó
  lexicon: HALOT
  rationale: Aquí שׂים introduce la imposición o instauración de normas legales. «Estableció» comunica mejor esa idea en español que «puso», que sería demasiado genérico.
- source_word: ל֛וֹ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para él
  - para eso
  lexicon: HALOT
  rationale: El hebreo es formalmente singular, pero el referente colectivo es «el pueblo». En español se debe explicitar el sentido distributivo/colectivo como «para ellos»; mantener singular oscurecería la referencia.
- source_word: חֹק
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - estatuto legal
  - decreto
  lexicon: HALOT
  rationale: «Estatuto» conserva el valor de disposición fija o establecida. Aunque «estatuto» puede sonar institucional, aquí funciona bien junto con «ordenanza» para reflejar el par legal hebreo.
- source_word: וּמִשְׁפָּט
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - juicio
  - sentencia
  - justicia
  lexicon: HALOT
  rationale: En este entorno legal, מִשְׁפָּט no apunta principalmente a «justicia» abstracta, sino a una disposición normativa. «Ordenanza» mantiene el matiz de regla/mandato jurídico y complementa «estatuto».
- source_word: בִּשְׁכֶם
  english_pob_choice: there in Shechem
  chosen_spanish: allí en Siquem
  alternatives_spanish:
  - en Siquem
  - en aquella Siquem
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Siquem» y se mantiene el deíctico «allí», como en el inglés POB, para enlazar la acción legal con el lugar narrativo ya mencionado. La presencia locativa refuerza el escenario del pacto.
theological_decisions:
- issue: Naturaleza del acto de pacto de Josué
  english_pob_reading: Joshua made a covenant with the people
  chosen_spanish_reading: Josué hizo un pacto con el pueblo
  alternative_spanish_readings:
  - Josué cortó un pacto con el pueblo
  - Josué renovó el pacto en favor del pueblo
  rationale: El versículo presenta a Josué como sujeto agente del acto de pactar, sin desarrollar aquí una explicación teológica más amplia. La traducción principal mantiene esa superficie textual y no añade una interpretación que el versículo por sí solo no explicita.
  doctrine_reference: Preservar la tensión teológica y no resolverla más allá del texto.
translation_notes:
  revision_awareness: La versión sigue de cerca el audit trail inglés y la hebreo-textualidad del versículo, sin cambios editoriales adicionales; se conserva la equivalencia óptima aprobada en el último pase de revisión.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí no aparece el nombre divino.
  - Se mantiene «pacto» para בְּרִית como término bíblico-jurídico natural en español.
  - Se conserva la distinción legal de חֹק y מִשְׁפָּט con «estatuto» y «ordenanza», evitando la traducción abstracta «justicia» en este contexto.
  - El deíctico «allí» reproduce la fuerza discursiva de בִּשְׁכֶם en continuidad con el inglés POB.
