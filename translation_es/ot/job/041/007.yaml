translation:
  language: es
  text: Sus hileras de escudos son su orgullo[a], cerradas como con un sello bien ajustado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus hileras de escamas están cerradas, selladas estrechamente». El hebreo dice literalmente «hileras de escudos», usando una metáfora militar para las escamas de Leviatán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּאֲוָה
  english_pob_choice: its pride
  chosen_spanish: su orgullo
  alternatives_spanish:
  - su majestad
  - su altivez
  lexicon: HALOT
  rationale: El hebreo puede significar orgullo, exaltación o majestad. Siguiendo la revisión inglesa más cercana al hebreo, "su orgullo" conserva la relación posesiva y el valor nominal de גַּאֲוָה sin convertirlo en una cualidad meramente subjetiva.
- source_word: אֲפִיקֵי
  english_pob_choice: rows of
  chosen_spanish: hilera de
  alternatives_spanish:
  - filas de
  - cursos de
  - partes firmes de
  lexicon: HALOT
  rationale: En el contexto de escudos/escamas de Leviatán, el término describe una disposición en líneas o series. "Hilera de" comunica de manera natural la imagen estructural preservando la metáfora.
- source_word: מָגִנִּים
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - escamas
  lexicon: HALOT
  rationale: Se mantiene el sustantivo literal "escudos" para conservar la metáfora militar del hebreo, tal como hace la versión inglesa. La lectura contextual "escamas" queda implícita en la nota.
- source_word: סָגוּר
  english_pob_choice: shut up
  chosen_spanish: cerrada
  alternatives_spanish:
  - cerrado
  - sellada
  lexicon: HALOT
  rationale: La forma pasiva/adjetival expresa algo cerrado o apretadamente unido. En español, "cerrada" fluye bien con "como con un sello apretado" y mantiene la imagen de compactación.
- source_word: חוֹתָם
  english_pob_choice: sealed
  chosen_spanish: sello
  alternatives_spanish:
  - sellada
  - como un sello
  lexicon: HALOT
  rationale: El hebreo apunta a la imagen de un sello. En español, la construcción "como con un sello apretado" conserva el sustantivo y el valor figurado de cierre firme.
- source_word: צָר
  english_pob_choice: tightly
  chosen_spanish: apretado
  alternatives_spanish:
  - estrecho
  - ajustado
  - con fuerza
  lexicon: HALOT
  rationale: El adjetivo expresa estrechez o compresión. "Apretado" transmite de modo claro y natural la idea de cierre firme y compacto.
translation_notes:
  revision_awareness: Esta redacción sigue la revisión inglesa que recupera el posesivo («su orgullo») y preserva la imagen de «escudos» como metáfora, sin aplanarla a «escamas» en el texto principal. También refleja la compresión poética del cierre «como con un sello apretado».
  spanish_consistency_notes:
  - Se emplea «Yahvé» en lugar de una sustitución reverencial genérica cuando corresponda en el proyecto; este versículo no contiene el nombre divino.
  - Se mantiene la metáfora militar literal («escudos») en el texto principal, con la alternativa contextual explicada en nota, para conservar la tensión lexical del hebreo.
  - La puntuación española con coma antes de la comparación respeta el paralelismo poético y la cadencia del verso.
