translation:
  language: es
  text: Toda la asamblea en conjunto fue de cuarenta y dos mil trescientos sesenta.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «como uno». La frase indica que la asamblea fue contada como un solo total.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: The whole
  chosen_spanish: Toda
  alternatives_spanish:
  - Todo el
  - La totalidad de
  lexicon: HALOT
  rationale: כָּל con el sustantivo definido siguiente expresa totalidad. En español, «toda la asamblea» conserva ese sentido integral de manera natural y bíblica.
- source_word: הַקָּהָל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - comunidad
  lexicon: HALOT
  rationale: קָהָל designa al grupo reunido. «Asamblea» mantiene el valor de colectivo reunido y funciona bien en un contexto de registro/censo.
- source_word: כְּאֶחָד
  english_pob_choice: together
  chosen_spanish: junta
  alternatives_spanish:
  - como uno
  - en conjunto
  lexicon: HALOT
  rationale: La expresión significa literalmente «como uno». En este resumen numérico, la idea es que el total se cuenta en bloque; «junta» comunica esa unidad colectiva con naturalidad en español.
- source_word: אַרְבַּע רִבּוֹא
  english_pob_choice: forty thousand
  chosen_spanish: cuarenta mil
  alternatives_spanish:
  - cuatro decenas de millares
  lexicon: HALOT
  rationale: La expresión hebrea equivale a 40.000. La forma española normal del cardinal es la más fiel e inteligible.
- source_word: אַלְפַּיִם
  english_pob_choice: two thousand
  chosen_spanish: dos mil
  alternatives_spanish:
  - dos millares
  lexicon: HALOT
  rationale: 'Cardinal estándar: 2.000.'
- source_word: שְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - trescientas
  lexicon: HALOT
  rationale: Cardinal estándar dentro del total.
- source_word: וְשִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - sesenta y
  lexicon: HALOT
  rationale: Último elemento del total compuesto; en español se integra en la cifra completa como «sesenta».
theological_decisions:
- issue: Sentido de כְּאֶחָד / unidad del conjunto
  english_pob_reading: Literally, 'as one.' The phrase means the assembly counted as a single total.
  chosen_spanish_reading: «junta» expresa que la asamblea fue contada como un solo total.
  alternative_spanish_readings:
  - «como uno»
  - «en conjunto»
  rationale: No hay una afirmación doctrinal adicional, sino una precisión semántica y contable. Conviene preservar la idea de unidad sin volver la frase forzada en español.
  doctrine_reference: No aplica; cuestión lexical/estructural.
translation_notes:
  revision_awareness: El texto inglés revisado quedó sin cambios y el control cruzado reporta alta concordancia; por eso la versión española sigue la lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «asamblea» para קָהָל, coherente con el contexto de lista/censo.
  - Se evita «congregación» por su matiz más cultual y eclesial.
  - La cifra se presenta con la ortografía numérica española estándar y sin desglosar innecesariamente la aritmética hebrea en el texto principal.
