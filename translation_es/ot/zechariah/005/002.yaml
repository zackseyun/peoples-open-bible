translation:
  language: es
  text: 'Y él me dijo: «¿Qué ves?». Y respondí: «Veo un rollo que vuela. Su longitud es de veinte codos[a], y su anchura es de diez codos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un codo era una unidad antigua de longitud, aproximadamente la distancia del codo a la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y él me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y me dijo
  lexicon: HALOT
  rationale: El hebreo avanza la narración con waw consecutiva; en español, «Y él me dijo» conserva la secuencia de manera natural y clara. Se explicita «él» para evitar ambigüedad en un contexto de visión profética.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see?
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  lexicon: HALOT
  rationale: El participio hebreo expresa percepción presente; en español, el presente simple «¿Qué ves?» es idiomático y fiel sin añadir progresión aspectual.
- source_word: וָאֹמַר אֲנִי רֹאֶה
  english_pob_choice: And I said, “I see
  chosen_spanish: 'Y respondí: «Veo'
  alternatives_spanish:
  - 'Y dije: «Veo'
  - 'Y dije: «Estoy viendo'
  lexicon: HALOT
  rationale: La respuesta directa en primera persona se expresa de forma natural con «respondí». El presente «Veo» reproduce bien el valor perceptivo del participio sin forzar una perífrasis.
- source_word: מְגִלָּה
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - pergamino
  - códice
  lexicon: HALOT
  rationale: «מְגִלָּה» designa un documento enrollado. En español, «rollo» conserva mejor la imagen física del objeto que «pergamino», que puede sonar demasiado material o específico.
- source_word: עָפָה
  english_pob_choice: flying
  chosen_spanish: que vuela
  alternatives_spanish:
  - volador
  - volando
  lexicon: HALOT
  rationale: El participio modifica al sustantivo y expresa la acción visible del objeto. «Que vuela» es fluido en español y evita una calca pesada.
- source_word: אָרְכָּהּ
  english_pob_choice: Its length
  chosen_spanish: Su longitud
  alternatives_spanish:
  - Su largo
  - Su lado largo
  lexicon: HALOT
  rationale: Se mantiene el valor dimensional literal del hebreo. «Longitud» preserva el paralelo técnico con «anchura» y evita una paráfrasis.
- source_word: עֶשְׂרִים בָּאַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: de veinte codos
  alternatives_spanish:
  - de veinte codos de largo
  lexicon: HALOT
  rationale: «אַמָּה» se traduce con la unidad española tradicional «codo», que corresponde al cubit bíblico y mantiene la medida antigua sin convertirla.
- source_word: וְרָחְבָּהּ
  english_pob_choice: and its width
  chosen_spanish: y su anchura
  alternatives_spanish:
  - y su ancho
  - y su largura
  lexicon: HALOT
  rationale: «Anchura» conserva el paralelismo formal con «longitud» y refleja bien la dimensión opuesta del objeto.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten cubits
  chosen_spanish: de diez codos
  alternatives_spanish:
  - de diez codos de ancho
  lexicon: HALOT
  rationale: Se mantiene la misma unidad de medida que en la primera mitad del versículo. El contexto dimensional ya está claro por «anchura».
theological_decisions:
- issue: Medida antigua y precisión del dato profético
  english_pob_reading: The text preserves the ancient unit 'cubits' without conversion, and the note explains the measure culturally.
  chosen_spanish_reading: Se conserva «codos» sin convertir la medida moderna, con una nota que aclara su valor antiguo.
  alternative_spanish_readings:
  - Convertir a metros
  - Añadir una equivalencia en el texto principal
  rationale: El dato funciona como parte de la visión y su forma antigua es relevante para el auditorio bíblico. La equivalencia moderna puede explicarse, pero no debe sustituir la medida del texto.
  doctrine_reference: Principios de fidelidad textual y preservación del marco histórico del pasaje
translation_notes:
  revision_awareness: El texto inglés auditado recibió una corrección menor para hacer más natural la última parte («is ten cubits»), sin cambio de sentido. La versión española sigue esa lectura estable y mantiene exactamente el valor dimensional del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la unidad «codos» de manera uniforme para las dos medidas.
  - Se evitó «SEÑOR» o terminología interpretativa no presente en este versículo.
  - «Rollo» conserva la imagen de un documento enrollado y es más natural que un calco técnico.
  - La nota cultural se ancla en la primera aparición de la medida para no repetir información en el texto principal.
