translation:
  language: es
  text: ¿Por qué escondes tu rostro y olvidas nuestra aflicción y nuestra opresión?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu presencia'. El hebreo dice literalmente 'tu rostro', una expresión común de atención favorable o cercanía.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: Es la equivalencia natural y directa en español para una pregunta de causa o motivo, y mantiene el tono de lamento urgente del hebreo.
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu presencia
  - tu semblante
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo para no diluir la metáfora. 'Tu rostro' comunica el valor relacional de la expresión sin convertirla de antemano en abstracción.
- source_word: תַסְתִּיר
  english_pob_choice: hide
  chosen_spanish: escondes
  alternatives_spanish:
  - ocultas
  - cobres
  lexicon: HALOT
  rationale: En español, 'escondes' combina naturalidad y fuerza poética en paralelo con 'rostro'. Mantiene la idea de hacer que el rostro quede fuera de la vista.
- source_word: תִּשְׁכַּח
  english_pob_choice: forget
  chosen_spanish: olvidas
  alternatives_spanish:
  - te olvidas de
  - pasas por alto
  lexicon: HALOT
  rationale: '''Olvidas'' preserva la literalidad básica del verbo y la audacia del lamento, que atribuye a Dios una aparente omisión o desatención.'
- source_word: עָנְיֵנוּ
  english_pob_choice: our affliction
  chosen_spanish: nuestra aflicción
  alternatives_spanish:
  - nuestra angustia
  - nuestro sufrimiento
  lexicon: HALOT
  rationale: '''Aflicción'' es un equivalente establecido, solemne y suficientemente amplio para עָנְיֵנוּ, y encaja bien con el registro de lamento comunitario.'
- source_word: וְלַחֲצֵנוּ
  english_pob_choice: our oppression
  chosen_spanish: nuestra opresión
  alternatives_spanish:
  - la presión sobre nosotros
  - nuestra angustia
  lexicon: HALOT
  rationale: '''Opresión'' reproduce con precisión la fuerza externa y hostil de לַחַץ, mejor que términos más generales como ''distress'' o ''presión''.'
theological_decisions:
- issue: 'Lenguaje antropomórfico: ''your face'' / ''tu rostro'''
  english_pob_reading: Retain the anthropomorphic expression literally as 'your face.'
  chosen_spanish_reading: Se mantiene literalmente 'tu rostro' en vez de suavizarlo como 'tu presencia'.
  alternative_spanish_readings:
  - tu presencia
  - tu favor
  rationale: El hebreo usa lenguaje relacional e imagético para la cercanía o atención divina. Conservarlo en español preserva la tensión poética y evita resolver la metáfora demasiado pronto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El texto concuerda con el auditorial inglés: se mantiene la imagen de ''rostro'' y el paralelismo de los dos sustantivos finales; no hay revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'rostro' y no 'cara' por registro bíblico más digno y por su cercanía con la terminología teológica habitual en español.
  - Se prefirió 'aflicción' y 'opresión' para reflejar el paralelismo y la fuerza semántica de los sustantivos hebreos.
  - La puntuación interrogativa inicial y la nota al final preservan el tono de queja orante del salmo.
