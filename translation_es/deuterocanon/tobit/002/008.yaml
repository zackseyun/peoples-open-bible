translation:
  language: es
  text: 'Y los vecinos se burlaban[a], diciendo: «Ya no teme ser ejecutado por este asunto; huyó, y mira, otra vez entierra a los muertos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otras tradiciones textuales de Tobit difieren mucho aquí. La retrotraducción hebrea indirecta pone en boca de Ana un reproche sobre las obras de bondad y justicia de Tobit, en vez de la burla de los vecinos por su entierro de los muertos.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ πλησίον
  english_pob_choice: the neighbors
  chosen_spanish: los vecinos
  alternatives_spanish:
  - los de cerca
  - la gente de alrededor
  lexicon: LSJ
  rationale: ὁ πλησίον sustantivado designa a los que están cerca; en español, «los vecinos» comunica de modo natural a las personas del entorno inmediato sin perder el sentido social del grupo que comenta.
- source_word: ἐνέγελων
  english_pob_choice: were mocking
  chosen_spanish: se burlaban
  alternatives_spanish:
  - se mofaban
  - lo ridiculizaban
  lexicon: LSJ
  rationale: El imperfecto expresa una acción continuada o repetida; «se burlaban» mantiene esa fuerza de escarnio de manera idiomática en español.
- source_word: Οὐκέτι φοβεῖται
  english_pob_choice: He is no longer afraid
  chosen_spanish: Ya no teme
  alternatives_spanish:
  - ya no tiene miedo
  - ya no teme ser
  lexicon: LSJ
  rationale: La negación con οὐκέτι y el verbo de temor se reflejan bien con «ya no teme», breve y natural; evita una perífrasis innecesaria y conserva el tono acusatorio.
- source_word: φονευθῆναι
  english_pob_choice: of being put to death
  chosen_spanish: ser asesinado
  alternatives_spanish:
  - ser puesto a muerte
  - ser matado
  lexicon: LSJ
  rationale: El infinitivo pasivo indica ser matado; «ser asesinado» recoge la idea de muerte violenta en el contexto de amenaza contra Tobit, aunque no añade un matiz técnico ajeno al pasaje.
- source_word: περὶ τοῦ πράγματος τούτου
  english_pob_choice: over this matter
  chosen_spanish: por este asunto
  alternatives_spanish:
  - a causa de este asunto
  - por esta causa
  lexicon: LSJ
  rationale: πρᾶγμα aquí significa asunto o caso; «por este asunto» reproduce con claridad la relación causal y la burla de los vecinos.
- source_word: ἀπέδρα
  english_pob_choice: he ran away
  chosen_spanish: huyó
  alternatives_spanish:
  - se escapó
  - salió huyendo
  lexicon: LSJ
  rationale: El aoristo recuerda una huida previa; «huyó» es conciso y fiel, y mantiene el reproche implícito del discurso directo.
- source_word: καὶ ἰδοὺ
  english_pob_choice: and look
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y observa
  lexicon: LSJ
  rationale: ἰδού introduce algo llamativo; «y mira» conserva la inmediatez coloquial del gesto de señalar, sin arcaísmo.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: LSJ
  rationale: «Otra vez» es la equivalencia más natural para repetir la acción destacada por πάλιν.
- source_word: θάπτει τοὺς νεκρούς
  english_pob_choice: he is burying the dead
  chosen_spanish: entierra a los muertos
  alternatives_spanish:
  - está enterrando a los muertos
  - sepulta a los muertos
  lexicon: LSJ
  rationale: El presente en el discurso directo puede leerse como acción actual o habitual; «entierra a los muertos» suena natural en español y conserva la acusación de que vuelve a realizar esa obra.
theological_decisions:
- issue: Elección de la tradición textual principal frente a la tradición semítica indirecta
  english_pob_reading: Main text follows the Greek accusation from the neighbors.
  chosen_spanish_reading: El texto principal sigue la acusación griega de los vecinos.
  alternative_spanish_readings:
  - La versión indirecta hebrea presenta a Ana reprochando a Tobit que sus obras de misericordia y justicia no le aprovecharon en su aflicción.
  - Otra tradición textual cambia por completo la escena y no conserva la burla de los vecinos.
  rationale: La evidencia primaria para esta sección es el griego de Swete; la hebrea indirecta es una retrotraducción tardía y no debe desplazar la forma griega. Conviene, sin embargo, reconocer la variante porque el aparato inglés documenta una divergencia sustancial.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original y manejo responsable de variantes textuales.'
translation_notes:
  revision_awareness: El borrador sigue la lectura griega principal del versículo, en línea con el audit trail inglés, y conserva la variante textual relevante solo en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo un registro sencillo y directo, acorde con un relato narrativo y con el tono de burla del original.
  - «Los muertos» se conserva de forma literal para reflejar el objeto directo plural del griego sin suavizarlo.
