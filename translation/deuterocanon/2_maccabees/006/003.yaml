id: 2MA.6.3
reference: 2 Maccabees 6:3
source:
  edition: lxx-swete-1909
  text: χαλεπὴ δὲ καὶ τοῖς ὅλοις ἦν δυσχερὴς ἡ ἐπίστασις τῆς κακίας.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: And the pressure of this evil was harsh and grievous for everyone[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the imposition of this evil was severe and hard to bear for all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαλεπὴ
  chosen: harsh
  alternatives:
  - severe
  - painful
  - hard
  lexicon: LSJ
  rationale: The adjective conveys severity or harshness. 'Harsh' fits natural English and pairs well with δυσχερής without collapsing the two terms into one idea.
- source_word: δυσχερὴς
  chosen: grievous
  alternatives:
  - hard to bear
  - troublesome
  - distressing
  lexicon: LSJ
  rationale: The word suggests something difficult, oppressive, or hard to endure. 'Grievous' preserves the weight of affliction and distinguishes it from χαλεπή.
- source_word: τοῖς ὅλοις
  chosen: for everyone
  alternatives:
  - for all
  - for the people as a whole
  - universally
  lexicon: LSJ
  rationale: The phrase is idiomatic and refers broadly to all concerned, not merely 'the whole' in an abstract sense. 'For everyone' gives clear modern English while preserving the universal scope.
- source_word: ἡ ἐπίστασις
  chosen: the pressure
  alternatives:
  - the onset
  - the imposition
  - the visitation
  - the oppression
  lexicon: LSJ
  rationale: In context, the noun refers to the pressing presence or imposition of the evil just described, not merely abstract 'knowledge.' 'Pressure' captures the sense of something bearing down on the people.
- source_word: τῆς κακίας
  chosen: of this evil
  alternatives:
  - of evil
  - of wickedness
  - of this malice
  lexicon: LSJ
  rationale: κακία can denote evil, wickedness, or malignity. In this narrative context it points to the oppressive wicked policy just mentioned, so 'this evil' makes the reference concrete in English.
