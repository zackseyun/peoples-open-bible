theological_decisions:
- issue: Referent of 'Egypt' in the scattering clause
  chosen_reading: Retain 'Egypt' in the main text while allowing the following plural pronoun 'them' to indicate the people of Egypt are being scattered.
  alternative_readings:
  - Translate explicitly as 'the Egyptians' in both clauses
  rationale: The Hebrew first uses the place-name מִצְרַיִם and then a plural object suffix, a common shift from land/nation to inhabitants. Preserving 'Egypt' respects the source wording while the pronoun naturally communicates the people as the affected referent.
