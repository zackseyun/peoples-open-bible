translation:
  language: es
  text: Entonces abre el oído de los hombres y sella su instrucción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su corrección», «su disciplina» o «su advertencia». El hebreo מוּסָר puede significar instrucción, corrección, disciplina o advertencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la secuencia temporal respecto al contexto anterior; «entonces» conserva el valor adverbial con naturalidad en español.
- source_word: יִגְלֶה אֹזֶן
  english_pob_choice: opens the ears
  chosen_spanish: abre el oído
  alternatives_spanish:
  - abre los oídos
  - descubre el oído
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de «abrir/des-cubrir el oído» para habilitar la escucha. En español, «abre el oído» conserva la metáfora de forma más directa que una paráfrasis explicativa; el singular es natural con el idiomático hebreo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la humanidad
  lexicon: HALOT
  rationale: Sigue de cerca el plural masculino del hebreo y mantiene la fuerza representativa humana del sustantivo.
- source_word: מֹסָר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - corrección
  - disciplina
  - amonestación
  - advertencia
  lexicon: HALOT
  rationale: El término hebreo admite varios matices; en este contexto, la POB inglesa opta por «instruction» y la versión española «instrucción» preserva esa amplitud sin perder la posibilidad de corrección o advertencia implícita.
- source_word: יַחְתֹּם
  english_pob_choice: seals
  chosen_spanish: sella
  alternatives_spanish:
  - sella sobre
  - imprime
  - graba
  lexicon: HALOT
  rationale: «Sellar» conserva la metáfora de fijar o autenticar internamente el contenido recibido, en línea con la elección inglesa.
theological_decisions:
- issue: Sentido de מוּסָר en un contexto de advertencia divina
  english_pob_reading: their instruction, with alternatives warning / discipline
  chosen_spanish_reading: su instrucción, con posibles matices de corrección o advertencia
  alternative_spanish_readings:
  - su corrección
  - su disciplina
  - su advertencia
  rationale: 'No se borra la tensión semántica del término hebreo: el contexto permite varias lecturas. La redacción principal sigue la decisión inglesa y las notas preservan los demás matices posibles.'
  doctrine_reference: Sabiduría bíblica / disciplina divina
- issue: Imagen de Dios capacitando para oír
  english_pob_reading: opens the ears of men
  chosen_spanish_reading: abre el oído de los hombres
  alternative_spanish_readings:
  - abre los oídos de los hombres
  - les abre el oído
  rationale: La frase conserva la imagen antropomórfica de habilitar la recepción del mensaje divino, sin convertirla en explicación interpretativa.
  doctrine_reference: Revelación divina y corrección
- issue: Relación entre abrir el oído y sellar la instrucción
  english_pob_reading: opens... and seals...
  chosen_spanish_reading: abre... y sella...
  alternative_spanish_readings:
  - descubre... y fija...
  - abre... e imprime...
  rationale: 'Se conserva la secuencia paralela y la doble acción divina: primero dispone para escuchar, luego fija el contenido recibido.'
  doctrine_reference: Providencia y enseñanza divina
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente: no se requieren cambios respecto al estado revisado, y la decisión española sigue de cerca la lectura inglesa auditada sin añadir interpretaciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; aquí el versículo no lo explicita.
  - Se conserva el valor idiomático de «abrir el oído» en lugar de sustituirlo por una paráfrasis más explicativa.
  - «Instrucción» se usa como término principal, con la amplitud semántica de מוּסָר preservada en la nota.
  - El registro es bíblico-moderno y evita arcaísmos innecesarios.
