translation:
  language: es
  text: a quien vino la palabra de Yahvé en los días de Josías, hijo de Amón, rey de Judá, en el decimotercer año de su reinado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲשֶׁר / אֵלָיו
  english_pob_choice: to whom
  chosen_spanish: al cual
  alternatives_spanish:
  - a quien
  - al que
  lexicon: HALOT
  rationale: La cláusula relativa retoma a Jeremías y contiene la idea direccional de que la palabra llega “a” él. En español, “al cual” conserva esa relación formal con tono neutro y publicado; “a quien” también sería posible, pero “al cual” evita ambigüedad de antecedente y mantiene el valor relativo con mejor control sintáctico.
- source_word: הָיָה דְבַר יְהוָה אֵלָיו
  english_pob_choice: the word of Yahweh came to whom
  chosen_spanish: vino la palabra de Yahvé
  alternatives_spanish:
  - llegó la palabra de Yahvé
  - fue la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa la fórmula profética idiomática de llegada de la palabra divina. “Vino” reproduce bien ese valor de irrupción/revelación en español y evita una traducción meramente copulativa (“era/ fue”), que oscurecería la fórmula profética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para יְהוָה como nombre divino propio. “Yahvé” conserva el tetragrámaton como nombre y evita la sustitución por título. No se usa “SEÑOR” porque el mandato editorial del proyecto pide transliteración del nombre divino.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el tiempo de
  lexicon: HALOT
  rationale: Es una fórmula temporal estándar de encabezamientos proféticos. “En los días de” es la equivalencia española más directa y natural para el uso narrativo-cronológico del hebreo.
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josiah
  lexicon: HALOT
  rationale: Se adapta el nombre propio a la forma española habitual y reconocible en contexto bíblico.
- source_word: בֶן אָמוֹן
  english_pob_choice: son of Amon
  chosen_spanish: hijo de Amón
  alternatives_spanish:
  - descendiente de Amón
  lexicon: HALOT
  rationale: La relación genealógica se expresa de manera directa en español como “hijo de”. “Amón” conserva la forma del nombre propio en español bíblico.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  lexicon: HALOT
  rationale: Equivalencia directa del título real y su territorio.
- source_word: בִּשְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the thirteenth year
  chosen_spanish: en el año trece
  alternatives_spanish:
  - en el decimotercer año
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, “año trece” suena más natural y mantiene la misma referencia cronológica; “decimotercer año” sería igualmente correcto, pero más marcado y menos fluido.
- source_word: לְמָלְכוֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su gobierno
  - cuando reinaba
  lexicon: HALOT
  rationale: “Reinado” expresa la noción regnal de manera precisa y clara en español. “Gobierno” sería más general y menos ajustado al contexto monárquico.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino y no se lo sustituye por un título. “Yahvé” sigue la política terminológica del proyecto y mantiene visible la referencia al Tetragrámaton en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética de revelación
  english_pob_reading: the word of Yahweh came
  chosen_spanish_reading: vino la palabra de Yahvé
  alternative_spanish_readings:
  - llegó la palabra de Yahvé
  - fue la palabra de Yahvé
  rationale: La elección preserva la fuerza de acontecimiento revelador del hebreo. En este tipo de encabezamiento profético, la llegada de la palabra no describe simple posesión o estado, sino irrupción de revelación divina.
  doctrine_reference: Uso profético estándar en Jeremías y otros profetas
