translation:
  language: es
  text: Porque tú pones bendiciones[a] sobre él para siempre; lo llenas de alegría con gozo en tu presencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo haces bendiciones para siempre»; o: «lo haces una bendición para siempre». La expresión hebrea es compacta y puede sugerir tanto bendiciones puestas sobre él como que el rey mismo llega a ser una fuente de bendición.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación previa; en español, «Porque» expresa con naturalidad la relación causal o explicativa sin perder el vínculo argumental.
- source_word: תְשִׁיתֵהוּ
  english_pob_choice: you make him
  chosen_spanish: lo conviertes
  alternatives_spanish:
  - lo pones
  - lo haces
  - lo estableces
  lexicon: HALOT
  rationale: La raíz שׁית admite la idea de poner/establecer/hacer. En español, con un predicado nominal como «bendiciones», «lo conviertes» evita la aspereza de una traslación demasiado mecánica y conserva la función predicativa.
- source_word: בְרָכוֹת
  english_pob_choice: blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendición
  - favores
  - prosperidad
  lexicon: HALOT
  rationale: Se mantiene el plural para reflejar la forma hebrea y su intensidad o abundancia. «Bendiciones» conserva mejor la plenitud del término que un singular genérico.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre jamás
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Equivale de manera natural y digna a la duración continua indicada por el hebreo.
- source_word: תְּחַדֵּהוּ
  english_pob_choice: you gladden him
  chosen_spanish: lo llenas de alegría
  alternatives_spanish:
  - lo alegras
  - lo haces regocijarse
  - lo haces feliz
  lexicon: HALOT
  rationale: 'El piel de חדה es causativo: producir gozo. «Lo llenas de alegría» comunica el efecto causal con fluidez en español; «alegras» también sería posible, pero puede sonar menos pleno en este contexto poético.'
- source_word: בְשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - en gozo
  - con regocijo
  lexicon: HALOT
  rationale: Se preserva el matiz de acompañamiento o medio. «Gozo» mantiene un registro bíblico claro sin caer en arcaísmo excesivo.
- source_word: אֶת פָּנֶי/ךָ
  english_pob_choice: in your presence
  chosen_spanish: en tu presencia
  alternatives_spanish:
  - ante tu rostro
  - delante de ti
  - frente a tu rostro
  lexicon: HALOT
  rationale: El hebreo literalmente alude a la «faz/rostro» de Dios; en español, «en tu presencia» es la equivalencia idiomática más clara y reverente, sin perder la relación personal implícita.
theological_decisions:
- issue: Cómo reflejar la frase compacta «תְשִׁיתֵהוּ בְרָכוֹת» sin resolver en exceso su ambigüedad
  english_pob_reading: The king is portrayed as the recipient and embodiment of abundant blessing, without narrowing the phrase to a specifically messianic or merely material sense.
  chosen_spanish_reading: El rey es presentado como receptor de bendiciones abundantes y, por la misma fórmula, como alguien que participa de una plenitud de bendición sin cerrar la ambigüedad del hebreo.
  alternative_spanish_readings:
  - lo conviertes en bendición
  - le impones bendiciones
  - lo haces abundantemente bendecido
  rationale: El hebreo permite tanto la idea de bendiciones otorgadas como la de una persona convertida en fuente o encarnación de bendición. La traducción conserva el plural y evita fijar una interpretación demasiado estrecha.
  doctrine_reference: Preservar la tensión textual y canónica sin sobre-resolverla.
- issue: Alcance de «en tu presencia» como expresión de intimidad con Dios
  english_pob_reading: in your presence
  chosen_spanish_reading: en tu presencia
  alternative_spanish_readings:
  - ante tu rostro
  - delante de ti
  rationale: La frase evita una interpretación meramente espacial y comunica la relación cultual/personal con Dios, coherente con el paralelismo del versículo.
  doctrine_reference: Lenguaje de comunión con Dios en poesía hebrea.
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión inglesa al conservar la literalidad de «blessings» como plural, pero la adapta al español con una construcción natural («lo conviertes en bendiciones») y mantiene la ambigüedad productiva del hebreo. También resuelve la imagen idiomática de «in your presence» como «en tu presencia» para evitar un calco innecesario.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero en este versículo el destinatario está implícito por la segunda persona; por eso no se introduce un nombre divino artificial.
  - Se conserva el paralelismo poético con dos miembros coordinados por punto y coma, apropiado para el hebreo breve del versículo.
  - «Gozo» y «alegría» se distinguen funcionalmente para no repetir mecánicamente la misma raíz emocional; esto refleja el paralelismo del original sin endurecerlo.
