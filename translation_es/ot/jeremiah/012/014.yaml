revisions:
- from: 'Así dice Yahvé acerca de todos mis vecinos perversos, los que tocan[a] la herencia que hice heredar a mi pueblo, a Israel: he aquí, yo los arrancaré[b] de sobre su tierra, y arrancaré la casa de Judá de en medio de ellos.'
  to: 'Así dice Yahvé acerca de todos mis vecinos perversos, los que tocan[a] la herencia que hice heredar a mi pueblo, a Israel: he aquí, estoy por arrancarlos[b] de su tierra, y arrancaré la casa de Judá de en medio de ellos.'
  rationale: Se corrige la nota [a] para reflejar fielmente la alternativa contextual de נגע ('invaden/atentan contra', no 'encajan en'). También se ajusta el primer verbo a «estoy por arrancarlos» para conservar la inminencia de הִנְנִי + participio, documentada en la auditoría inglesa. Se alisa «de sobre su tierra» a «de su tierra» para un español más natural sin pérdida sustancial de sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: fórmula profética, vecinos malvados, toque/encroachment sobre la herencia, la herencia dada a Israel, y la doble acción de arrancar/quitar. Sin embargo, no preserva suficientemente el matiz aspectual de הִנְנִי + participio נֹתְשָׁם, que en el expediente inglés se entendió como acción inminente (''I am about to uproot them''). Además, la nota [a] contiene un error léxico grave: «encajan en la herencia» no corresponde a נגע ni al sentido documentado de ''encroach on''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos mejorables: «de sobre su tierra» suena algo forzado; «de su tierra» o «de encima de su tierra» serían más naturales, aunque el primero puede bastar en español. Más importante, «yo los arrancaré» pierde la inminencia marcada en el hebreo y en la auditoría inglesa. «Estoy a punto de arrancarlos» o «estoy por arrancarlos» suena más fiel. El resto del verso lee bien, y «la casa de Judá» está bien preservado.'
  glossary_alignment: Se respeta correctamente Yahvé para יְהוָה. «Herencia» para נחלה y «casa de Judá» para בֵּית יְהוּדָה concuerdan con el proyecto. El verbo נתש está mejor representado en español con una imagen de desarraigo/arranque; «arrancar» es aceptable, pero conviene mantener también la inminencia en la primera instancia. No hay conflicto doctrinal que requiera adjudicación superior.
  issues:
  - severity: high
    issue: La nota [a] traduce erróneamente la alternativa como «encajan en la herencia».
    rationale: El inglés documenta «encroach on the inheritance» como alternativa contextual a «touch the inheritance». «Encajar en» no significa invadir ni entrometerse; introduce un sentido ajeno al hebreo נגע y puede confundir al lector.
  - severity: medium
    issue: «yo los arrancaré» no conserva el matiz de inminencia de הִנְנִי + participio.
    rationale: El expediente inglés justificó explícitamente «I am about to uproot them». En español, un futuro simple debilita esa proximidad temporal. Conviene reflejarla con «estoy por arrancarlos» o equivalente.
  - severity: low
    issue: «de sobre su tierra» es comprensible pero poco natural en español actual.
    rationale: Aunque reproduce מֵעַל con cierta literalidad, en español bíblico moderno suena rígido. «De su tierra» es más natural; el matiz espacial ya queda suficientemente claro con el verbo de remoción.
  revised_spanish_text: 'Así dice Yahvé acerca de todos mis vecinos perversos, los que tocan[a] la herencia que hice heredar a mi pueblo, a Israel: he aquí, estoy por arrancarlos[b] de su tierra, y arrancaré la casa de Judá de en medio de ellos.'
  revised_footnotes:
  - marker: a
    text: O «invaden la herencia»; el hebreo dice literalmente «tocan la herencia», con la idea de interferencia hostil sugerida por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «los desarraigaré». El hebreo emplea un verbo recurrente en Jeremías para arrancar en juicio, con imagen agrícola.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para reflejar fielmente la alternativa contextual de נגע ('invaden/atentan contra', no 'encajan en'). También se ajusta el primer verbo a «estoy por arrancarlos» para conservar la inminencia de הִנְנִי + participio, documentada en la auditoría inglesa. Se alisa «de sobre su tierra» a «de su tierra» para un español más natural sin pérdida sustancial de sentido.
