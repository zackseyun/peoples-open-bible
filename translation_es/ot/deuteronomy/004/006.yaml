translation:
  language: es
  text: 'Así que guárdenlos y háganlos, porque esta es su sabiduría y su entendimiento a los ojos de los pueblos, que oirán todos estos estatutos[a] y dirán: «Ciertamente[b], esta gran nación es un pueblo sabio y entendido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Estatutos» traduce חֻקִּים, término jurídico que también puede verterse como «decretos» u «ordenanzas».
    reason: lexical_alternative
  - marker: b
    text: 'O: «solamente». El hebreo רַק puede significar más literalmente «solo», pero aquí probablemente funciona como una exclamación enfática: «ciertamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: keep
  chosen_spanish: guárdenlos
  alternatives_spanish:
  - obsérvenlos
  - custodienlos
  lexicon: HALOT
  rationale: שׁמר en contexto pactual y legal expresa guardar/observar mandamientos. En español, «guardar» conserva bien ese valor de fidelidad y cumplimiento, y el pronombre los retoma los estatutos implícitos del contexto inmediato.
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: do
  chosen_spanish: háganlos
  alternatives_spanish:
  - cúmplanlos
  - practíquenlos
  lexicon: HALOT
  rationale: עשה añade la idea de ejecutar efectivamente lo mandado. «Hacerlos» mantiene la pareja breve «guardar y hacer» y refleja con claridad la obediencia concreta.
- source_word: כִּי הִוא
  english_pob_choice: for this is
  chosen_spanish: porque esta es
  alternatives_spanish:
  - pues esto es
  - porque ello es
  lexicon: HALOT
  rationale: El pronombre femenino remite colectivamente a los estatutos ya mencionados. «Esta es» conserva esa referencia colectiva en español sin volverla abstracta en exceso.
- source_word: חָכְמַתְכֶם
  english_pob_choice: your wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su prudencia
  - su pericia
  lexicon: HALOT
  rationale: חכמה aquí apunta a sabiduría práctica y moral visible ante otros pueblos. «Sabiduría» es la equivalencia más directa y digna; el plural de cortesía mantiene la dirección al pueblo.
- source_word: וּבִינַתְכֶם
  english_pob_choice: your understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su discernimiento
  - su comprensión
  lexicon: HALOT
  rationale: בינה se distingue de חכמה y señala capacidad de discernir. «Entendimiento» preserva el paralelismo léxico con «sabiduría» sin fundir ambos términos.
- source_word: לְעֵינֵי הָעַמִּים
  english_pob_choice: in the sight of the peoples
  chosen_spanish: a los ojos de los pueblos
  alternatives_spanish:
  - ante los pueblos
  - a la vista de los pueblos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ocular y pública. «A los ojos de los pueblos» conserva esa imagen sin perder naturalidad en español.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: «Pueblos» conserva la distinción con גוי más adelante, donde aparece «nación». Evita aplanar ambos términos en una sola palabra.
- source_word: אֲשֶׁר יִשְׁמְעוּן
  english_pob_choice: who will hear
  chosen_spanish: que oirán
  alternatives_spanish:
  - cuando oigan
  - que escuchen
  lexicon: HALOT
  rationale: El relativo introduce a los pueblos como oyentes futuros de lo que Israel practica. «Oirán» refleja bien el imperfecto en contexto profético/narrativo.
- source_word: כָּל הַחֻקִּים הָאֵלֶּה
  english_pob_choice: all these statutes
  chosen_spanish: todos estos estatutos
  alternatives_spanish:
  - todos estos decretos
  - todas estas ordenanzas
  lexicon: HALOT
  rationale: חֻקִּים es un término jurídico importante. «Estatutos» mantiene su fuerza legal y coincide con el uso bíblico tradicional sin borrar su precisión.
- source_word: וְאָמְרוּ
  english_pob_choice: and say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y dirían
  - y dirán entonces
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia futura. «Dirán» reproduce con naturalidad el efecto de la cláusula relativa anterior.
- source_word: רַק
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Sin duda
  lexicon: HALOT
  rationale: Aunque רַק puede significar «solo», aquí funciona como exclamación enfática. «Ciertamente» recoge esa fuerza sin convertirlo en un exclusivo lógico que oscurezca el tono admirativo.
- source_word: עַם חָכָם וְנָבוֹן
  english_pob_choice: a wise and understanding people
  chosen_spanish: un pueblo sabio y entendido
  alternatives_spanish:
  - un pueblo sabio y de discernimiento
  - un pueblo sabio e inteligente
  lexicon: HALOT
  rationale: נבון deriva de בינה y conviene mantener la relación con el par «sabiduría/entendimiento» del versículo. «Entendido» preserva esa conexión y suena natural en español bíblico.
- source_word: הַגּוֹי הַגָּדוֹל הַזֶּה
  english_pob_choice: this great nation
  chosen_spanish: esta gran nación
  alternatives_spanish:
  - este gran pueblo
  - esta gran nación esta
  lexicon: HALOT
  rationale: גוי aquí nombra a Israel como entidad nacional-covenantal. «Nación» es la mejor equivalencia para conservar esa dimensión política y corporativa.
theological_decisions:
- issue: Relación entre obediencia y sabiduría
  english_pob_reading: The verse presents Israel's keeping and doing of God's statutes as the public display of wisdom and understanding before other peoples.
  chosen_spanish_reading: El versículo presenta guardar y hacer los estatutos de Yahvé como la manifestación pública de la sabiduría y el entendimiento de Israel ante otros pueblos.
  alternative_spanish_readings:
  - Los estatutos mismos son la sabiduría y el entendimiento de Israel, sin énfasis en su obediencia
  - El versículo solo celebra la reputación nacional de Israel
  rationale: La sintaxis une «guarden y hagan» con «porque esta es su sabiduría y su entendimiento», por lo que la traducción deja ver que la obediencia manifiesta esa sabiduría. No se introduce una teología ajena de mérito; se conserva la tensión entre mandamiento y testimonio público.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: no hubo revisiones aplicadas en la última pasada y el veredicto de revisión fue de alta concordancia, por lo que la redacción española sigue de cerca las decisiones léxicas y retiene la nota sobre רַק y חֻקִּים.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se conserva la distinción entre «pueblos» y «nación» para reflejar הָעַמִּים y הַגּוֹי.
  - Se usa la pareja verbal «guardar y hacer» para reproducir la fuerza compacta del hebreo.
  - Se emplea «sabiduría» y «entendimiento» para mantener el paralelismo lexical con חכמה / בינה / נבון.
