review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: motivo (''למען''), grupo doble (''mis hermanos y mis compañeros''), resolución de hablar, y bendición directa a Jerusalén en 2fs. Sin embargo, hay dos desajustes importantes respecto al sentido y al rastro auditado: (1) ''hablaré ahora'' suena menos idiomático con cita directa que ''diré ahora'', y el propio POB inglés justificó ''say'' en vez de ''speak''; (2) la nota [c] mezcla indebidamente dos asuntos distintos, pues el anclaje está en ''ti'' / בךְ pero la nota introduce el sentido amplio de ''shalom'', que debería anclarse a ''Paz'' o separarse. También ''Por causa de'' es aceptable, pero ''Por el bien de'' transmite mejor לְמַעַן en este contexto de consideración afectiva.'
  spanish_quality_summary: 'El texto es legible y digno, pero ''hablaré ahora: «Paz dentro de ti»'' resulta algo tieso en español bíblico-natural. ''Diré ahora'' fluye mejor antes de una cita. La puntuación con dos puntos funciona. ''Paz dentro de ti'' es entendible, aunque con ciudad personificada puede sonar algo corporal; ''Paz en ti'' es más natural, pero ''dentro de ti'' conserva mejor el matiz espacial de ''within you''. Se puede mantener. Las notas necesitan limpieza: ''entreaty'' quedó sin traducir, y la nota [c] no corresponde al anclaje textual.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'mis hermanos' y 'Paz' están bien. 'compañeros' sigue la decisión inglesa. La revisión propuesta acerca mejor אֲדַבְּרָה al valor idiomático español sin perder el matiz volitivo. También reubica correctamente la observación sobre shalom en una nota anclada a 'Paz'.
  issues:
  - severity: medium
    issue: '''hablaré ahora'' no es la mejor equivalencia española para אֲדַבְּרָה con cita directa'
    rationale: Aunque literalmente posible, en español suena forzado antes de una cita breve. El audit trail inglés ya decidió 'I will ... say' por idiomaticidad. 'Diré ahora' preserva mejor el sentido natural.
  - severity: medium
    issue: La nota [c] combina el valor de בךְ con el matiz semántico de שָׁלוֹם
    rationale: El marcador está puesto en 'ti', pero la nota añade información sobre 'shalom'. Esto desordena la correspondencia entre texto y nota y viola la disciplina de anclar la nota al término relevante.
  - severity: low
    issue: '''Por causa de'' es menos preciso que ''Por el bien de'' en este contexto'
    rationale: לְמַעַן aquí expresa motivo orientado al bien o consideración de otros más que simple causalidad. 'Por el bien de' suena más natural y más ajustado al contexto litúrgico-poético.
  - severity: low
    issue: La nota [b] contiene inglés residual ('entreaty')
    rationale: Debe decirse plenamente en español, por ejemplo 'súplica' o 'ruego'.
