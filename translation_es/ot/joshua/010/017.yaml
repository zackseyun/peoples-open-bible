  glossary_alignment: No hay conflictos con la terminología del proyecto. «Josué», «reyes», «cueva» y «Makeda» son adecuados. No aparecen términos teológicos sensibles. La decisión «escondidos» para נֶחְבְּאִים coincide con la racionalidad documentada y la alternativa «escondiéndose» se conserva correctamente en nota.
