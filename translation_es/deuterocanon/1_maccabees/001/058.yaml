translation:
  language: es
  text: Con su poder[a] seguían haciendo esto a Israel, a los que eran hallados en las ciudades, mes tras mes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con su poder» puede entenderse también como «por la fuerza»; el griego permite enfatizar la fuerza coercitiva como medio de acción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en cada mes y mes»; la repetición subraya una acción reiterada cada mes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἰσχύϊ αὐτῶν
  english_pob_choice: By their power
  chosen_spanish: Con su poder
  alternatives_spanish:
  - por su fuerza
  - con su fuerza
  - por su poder
  lexicon: LSJ
  rationale: La construcción instrumental expresa el medio por el cual actuaban. «Con su poder» conserva esa relación y suena natural en español; «por su fuerza» también sería posible, pero puede sonar más marcadamente físico que el griego.
- source_word: ἐποίουν οὕτω
  english_pob_choice: they kept doing this
  chosen_spanish: hacían esto
  alternatives_spanish:
  - seguían haciendo esto
  - lo hacían así
  - hacían de ese modo
  lexicon: LSJ
  rationale: El imperfecto indica acción repetida o continuada. En español, «hacían esto» puede llevar ese valor iterativo en contexto; las alternativas explicitan más la continuidad, pero «hacían esto» mantiene concisión sin perder el sentido.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - contra Israel
  - para Israel
  lexicon: LSJ
  rationale: Se conserva el dativo con una preposición directa. El matiz hostil viene del contexto narrativo; «contra Israel» sería más explícito, pero añadiría una interpretación que el griego aquí no marca con preposición adversativa.
- source_word: τοῖς εὑρισκομένοις
  english_pob_choice: to those who were found
  chosen_spanish: a los que eran hallados
  alternatives_spanish:
  - a los que se encontraban
  - a los hallados
  - a los que eran encontrados
  lexicon: LSJ
  rationale: El participio pasivo indica personas localizadas o descubiertas. «Eran hallados» preserva la pasividad y funciona bien en español bíblico; «eran encontrados» sería más literal, pero menos idiomático.
- source_word: ἐν παντὶ μηνὶ καὶ μηνὶ
  english_pob_choice: month after month
  chosen_spanish: mes tras mes
  alternatives_spanish:
  - cada mes
  - en cada mes y mes
  - mes a mes
  lexicon: LSJ
  rationale: La repetición distributiva se comunica de manera idiomática con «mes tras mes». Mantiene la idea de recurrencia periódica sin sonar mecánico.
- source_word: ἐν ταῖς πόλεσιν
  english_pob_choice: in the cities
  chosen_spanish: en las ciudades
  alternatives_spanish:
  - en los pueblos
  - por las ciudades
  - en las urbes
  lexicon: LSJ
  rationale: «Ciudades» es la equivalencia directa y neutral para πόλεις. «Pueblos» puede reducir el alcance; «por las ciudades» añade un matiz distributivo no expresado de forma explícita.
translation_notes:
  revision_awareness: Se siguió el sentido iterativo del imperfecto y la construcción instrumental del griego. La redacción española evita un calco rígido, pero conserva la ambigüedad entre poder y fuerza, así como la repetición mensual del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al tetragrámaton; aquí no aplica.
  - Se mantuvo «Israel» como objeto dativo sin convertirlo en una oposición más fuerte de la que marca la forma griega.
  - «Mes tras mes» preserva el valor distributivo de μηνὶ καὶ μηνὶ con naturalidad en español.
  - No se introdujeron términos eclesiásticos ajenos al contexto histórico del texto.
