translation:
  language: es
  text: Porque el oído prueba las palabras[a], como el paladar prueba el alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el paladar prueba lo que se come».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el dicho anterior. «Porque» conserva bien el valor causal/explanatorio y suena natural en español.
- source_word: אֹזֶן
  english_pob_choice: the ear
  chosen_spanish: el oído
  alternatives_spanish:
  - el oído humano
  - el oído
  lexicon: HALOT
  rationale: Aunque el hebreo usa el órgano físico, en español «el oído» funciona de manera proverbial y es más natural que repetir literalmente «la oreja» o una forma más anatómica.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las expresiones
  lexicon: HALOT
  rationale: El plural arameizante se refiere a palabras habladas. «Palabras» es la equivalencia más directa y clara para el lector español.
- source_word: תִּבְחָן
  english_pob_choice: tests
  chosen_spanish: prueba
  alternatives_spanish:
  - examina
  - discierne
  - somete a prueba
  lexicon: HALOT
  rationale: «Prueba» reproduce el sentido evaluativo de בחן y mantiene el paralelismo con la segunda mitad del versículo, sin sonar forzado.
- source_word: חֵךְ
  english_pob_choice: the palate
  chosen_spanish: el paladar
  alternatives_spanish:
  - la boca
  - el gusto
  lexicon: HALOT
  rationale: El término hebreo apunta específicamente al órgano del gusto. «Paladar» conserva mejor la precisión sensorial que una traducción más general como «boca».
- source_word: יִטְעַם
  english_pob_choice: tastes
  chosen_spanish: saborea
  alternatives_spanish:
  - degusta
  - prueba
  - gusta
  lexicon: HALOT
  rationale: «Saborea» comunica la acción gustativa de manera idiomática y mantiene la imagen proverbial. «Prueba» podría sonar redundante junto a «prueba» en la primera cláusula.
- source_word: לֶאֱכֹל
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - lo que se come
  - la comida
  lexicon: HALOT
  rationale: La construcción infinitiva funciona sustantivamente, equivalente a «lo que se come». «El alimento» es una solución digna y clara en español, cercana al sustantivo abstracto que la comparación requiere.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el sentido del versículo; se mantiene la lectura proverbial y la equivalencia sensorial ear/palate con la alternativa anotada para la última cláusula.
  spanish_consistency_notes:
  - Se mantuvo «paladar»/«alimento» como opción principal para preservar la imagen sensorial con buen castellano.
  - No se usó «SEÑOR» ni terminología teológica especial porque el versículo no contiene el Tetragrámaton ni vocabulario doctrinal específico.
  - 'El paralelismo se conserva con dos miembros breves y equilibrados: oído/paladar, prueba/saborea.'
