translation:
  language: es
  text: Sí, sí, Dios de mi padre y Dios de la herencia de Israel[a], Soberano[b] de los cielos y de la tierra, Creador de las aguas, Rey de toda tu creación, tú—escucha mi súplica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios de la herencia de Israel»; la frase también puede entenderse como «Dios de la heredad de Israel».'
    reason: lexical_alternative
  - marker: b
    text: «Soberano» traduce el griego déspota (δέσποτα), un término más fuerte que kyrios («Señor»), que enfatiza autoridad absoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὶ ναὶ
  english_pob_choice: Yes, yes
  chosen_spanish: Sí, sí
  alternatives_spanish:
  - Ciertamente, ciertamente
  - En verdad, en verdad
  lexicon: LSJ
  rationale: La repetición enfática se conserva de forma natural en español con 'Sí, sí'. Mantiene el tono orante sin introducir una fórmula solemne ajena al contexto.
- source_word: ὁ θεὸς τοῦ πατρὸς μου
  english_pob_choice: O God of my father
  chosen_spanish: Dios de mi padre
  alternatives_spanish:
  - Oh Dios de mi padre
  lexicon: LSJ
  rationale: En español, el vocativo ya queda claro por el contexto de la oración y el ritmo de la frase; se conserva la relación posesiva singular 'mi padre' sin añadir un 'Oh' obligatorio.
- source_word: θεὸς κληρονομίας Ἰσραήλ
  english_pob_choice: God of Israel’s inheritance
  chosen_spanish: Dios de la herencia de Israel
  alternatives_spanish:
  - Dios de la heredad de Israel
  - Dios de la herencia de Israel
  lexicon: LSJ
  rationale: 'κληρονομία puede significar herencia, patrimonio o heredad. ''Herencia'' mantiene la concreción del sustantivo y permite la misma ambigüedad documentada en el POB inglés: puede entenderse como ''la herencia de Israel'' o ''la herencia que pertenece a Israel''.'
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Se conserva la fuerza de autoridad absoluta de δέσποτα sin confundirlo con κύριος. 'Dueño' expresa pertenencia y dominio; 'Señor' sería más tradicional pero menos distintivo, y 'Soberano' suena más abstracto.
- source_word: τῶν οὐρανῶν καὶ τῆς γῆς
  english_pob_choice: of the heavens and of the earth
  chosen_spanish: de los cielos y de la tierra
  alternatives_spanish:
  - de los cielos y de la tierra
  - del cielo y de la tierra
  lexicon: LSJ
  rationale: Se mantiene el plural 'cielos' para reflejar el griego τῶν οὐρανῶν. En español suena natural en registro elevado y conserva la huella del original.
- source_word: κτίστα
  english_pob_choice: Creator
  chosen_spanish: Creador
  alternatives_spanish:
  - Hacedor
  - Fundador
  lexicon: LSJ
  rationale: '''Creador'' es el equivalente normal y preciso para κτίστα en este contexto litúrgico y cósmico.'
- source_word: τῶν ὑδάτων
  english_pob_choice: of the waters
  chosen_spanish: de las aguas
  alternatives_spanish:
  - del agua
  lexicon: LSJ
  rationale: El plural se conserva como en el griego. 'Aguas' es la forma más fiel y fluida en español.
- source_word: βασιλεῦ πάσης κτίσεώς σου
  english_pob_choice: King of all your creation
  chosen_spanish: Rey de toda tu creación
  alternatives_spanish:
  - Rey de toda criatura tuya
  - Rey de todo lo que has creado
  lexicon: LSJ
  rationale: κτίσις puede significar creación o criatura. Aquí el conjunto cósmico favorece 'creación', y el posesivo σου se conserva con 'tu'.
- source_word: σὺ εἰσάκουσον
  english_pob_choice: you—hear
  chosen_spanish: tú—oye
  alternatives_spanish:
  - tú escucha
  - oye tú
  lexicon: LSJ
  rationale: El pronombre enfático σὺ se expresa con 'tú' y un corte enfático con raya. 'Oye' funciona como imperativo de ruego y mantiene el registro directo de la súplica.
- source_word: τῆς δεήσεώς μου
  english_pob_choice: my prayer
  chosen_spanish: mi súplica
  alternatives_spanish:
  - mi oración
  - mi petición
  lexicon: BDAG
  rationale: δέησις es una petición urgente, una súplica. 'Súplica' preserva mejor esa fuerza que 'oración' en este versículo.
theological_decisions:
- issue: Título divino δέσποτα en la invocación
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: Se distingue deliberadamente de las traducciones habituales de κύριος. 'Dueño' retiene la idea de autoridad y posesión absoluta que el POB inglés quiso destacar con 'Master'.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original y distinción entre títulos divinos cercanos pero no idénticos.'
- issue: Ambigüedad de κληρονομίας Ἰσραήλ
  english_pob_reading: God of Israel’s inheritance / God of the inheritance of Israel
  chosen_spanish_reading: Dios de la herencia de Israel
  alternative_spanish_readings:
  - Dios de la heredad de Israel
  - Dios de la herencia que pertenece a Israel
  rationale: La construcción genitiva se conserva sin decidir en exceso entre los dos matices posibles. Así no se borra la tensión documentada por la nota inglesa.
  doctrine_reference: Principio de conservación de ambigüedad léxica donde el original la permite.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el griego de Swete y conserva las decisiones auditadas del POB inglés: repetición enfática, vocativo directo, genitivo ambiguo en κληρονομία, distinción de δέσποτα frente a κύριος, plural de οὐρανοί y de ὕδατα, y el valor petitorio de δέησις. No se registraron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «Dios» de manera uniforme para θεός.
  - Se conserva «herencia» para κληρονομία y no se reemplaza por términos más eclesiásticos como «patrimonio» salvo en nota.
  - Se mantiene el registro de oración directa con vocativo implícito y raya enfática.
  - Se evita «SEÑOR» como máscara para δέσποτα, siguiendo la primacía del matiz original.
  - Se conserva el plural «cielos» y «aguas» para reflejar los plurales griegos.
