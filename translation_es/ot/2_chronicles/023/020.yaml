    text: Or 'the mighty men' for 'the nobles.' The Hebrew term can denote prominent or powerful persons.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the people of the land,' a common expression in royal narratives for the populace as a socio-political body.
    reason: cultural_note
  - marker: c
    text: Or 'the royal palace' for 'the king’s house.'
    reason: lexical_alternative
