translation:
  language: es
  text: 'Así dirán, cada hombre a su prójimo y cada hombre a su hermano: «¿Qué ha respondido Yahvé[a]?», y: «¿Qué ha hablado Yahvé[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Qué ha respondido Yahvé?».'
    reason: alternative_reading
  - marker: b
    text: O «¿Qué ha dicho Yahvé?»
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - De este modo
  lexicon: HALOT
  rationale: Introduce la fórmula prescrita de habla en un español natural y breve, equivalente al valor directivo de la partícula.
- source_word: תֹאמְרוּ
  english_pob_choice: shall say
  chosen_spanish: dirá
  alternatives_spanish:
  - dirán
  - deberá decir
  lexicon: HALOT
  rationale: El hebreo usa segunda persona plural con valor directivo; en español, la construcción impersonal/distributiva «cada hombre dirá» o «dirá» expresa mejor el mandato sin forzar una segunda persona plural.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: Conserva el valor distributivo y el masculino explícito del hebreo, en paralelo con el texto fuente.
- source_word: עַל רֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - acerca de su prójimo
  lexicon: HALOT
  rationale: En este giro de habla, עַל funciona idiomáticamente como destinatario indirecto; «prójimo» preserva el matiz interpersonal de רֵעַ sin volverlo demasiado doméstico.
- source_word: וְאִישׁ אֶל אָחִיו
  english_pob_choice: and each man to his brother
  chosen_spanish: y cada hombre a su hermano
  alternatives_spanish:
  - y cada uno a su hermano
  - y un hombre a su hermano
  lexicon: HALOT
  rationale: Mantiene el paralelismo y la relación de parentesco/solidaridad expresada por אָחִיו, que en español se transmite con «hermano».
- source_word: מֶה עָנָה
  english_pob_choice: What has Yahweh answered?
  chosen_spanish: ¿Qué ha respondido?
  alternatives_spanish:
  - ¿Qué ha contestado?
  - ¿Qué ha dado como respuesta?
  lexicon: HALOT
  rationale: «Responder» cubre bien ענה en este contexto de informe de la palabra divina. Se omite el complemento en la cita directa porque el sujeto «Yahvé» ya lo lleva la pregunta, tal como en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no una sustitución titular.'
- source_word: וּמַה דִּבֶּר
  english_pob_choice: and, ‘What has Yahweh spoken?’
  chosen_spanish: '; y: «¿Qué ha hablado Yahvé?»'
  alternatives_spanish:
  - 'y: «¿Qué ha dicho Yahvé?»'
  - '; y: «¿Qué ha declarado Yahvé?»'
  lexicon: HALOT
  rationale: «Hablar» reproduce la raíz דבר con mayor cercanía que «decir» y mantiene la paralela pregunta sobre la palabra de Yahvé. La puntuación separa las dos preguntas sin añadir contenido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en español con la forma auditada del proyecto, evitando la sustitución por un título y manteniendo la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre «respondido» y «hablado» en el paralelismo final
  english_pob_reading: What has Yahweh answered? ... What has Yahweh spoken?
  chosen_spanish_reading: ¿Qué ha respondido? ... ¿Qué ha hablado?
  alternative_spanish_readings:
  - ¿Qué ha contestado? ... ¿Qué ha dicho?
  - ¿Qué ha respondido? ... ¿Qué ha declarado?
  rationale: El hebreo presenta dos verbos distintos y paralelos; la traducción conserva esa tensión sin fundirlos en una sola noción de «dicho».
  doctrine_reference: Paralelismo poético y uso lexical de ענה / דבר en el texto hebreo
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia del control cruzado y sin cambios sustantivos en la lectura base. La versión española sigue el hebreo de forma transparente y conserva el paralelismo final entre «responder» y «hablar».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «prójimo» para רֵעַ y «hermano» para אָח, preservando el paralelismo semántico.
  - La puntuación en estilo de cita directa separa claramente las dos preguntas sin introducir interpretación adicional.
