  yaml_path: translation/ot/nehemiah/003/005.yaml
  text: And next to them the Tekoites made repairs[b][a], but their nobles would not put their necks to the work of their lords.
  footnotes:
  - marker: a
    text: Or 'their leading men' for 'their nobles.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'did not bring their neck to the work of their lords,' an idiom for refusing to submit to or take up the labor.
    reason: lexical_alternative
