id: JOS.16.8
reference: Joshua 16:8
source:
  edition: WLC
  text: מִ/תַּפּ֜וּחַ יֵלֵ֨ךְ הַ/גְּב֥וּל יָ֨מָּ/ה֙ נַ֣חַל קָנָ֔ה וְ/הָי֥וּ תֹצְאֹתָ֖י/ו הַ/יָּ֑מָּ/ה זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵי אֶפְרַ֖יִם לְ/מִשְׁפְּחֹתָֽ/ם־׃
translation:
  text: From Tappuah the border goes westward to the Brook of Kanah[a], and its end was at the sea[c][b]. This is the inheritance of the tribe of the sons of Ephraim according to their families.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the sea,” with “westward” reflecting the common directional sense of the Hebrew in land-boundary descriptions.
    reason: lexical_alternative
  - marker: b
    text: “Brook” may also be rendered “wadi.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “sons of Ephraim,” a standard tribal designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתַּפּוּחַ
  lemma: מִן
  chosen: From Tappuah
  alternatives:
  - From Tapuah
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks the starting point of the boundary description. The place name is transliterated per project policy for names. English convention commonly spells the town 'Tappuah.'
- source_word: יֵלֵךְ הַגְּבוּל
  chosen: the border goes
  alternatives:
  - the boundary goes
  - the border runs
  lexicon: HALOT
  rationale: הלך with גְּבוּל in territorial descriptions idiomatically describes the course of a boundary. 'Border goes' is a natural but still fairly formal rendering; 'boundary' is possible, but 'border' is more readable modern English.
- source_word: יָמָּה
  lemma: יָם
  chosen: westward
  alternatives:
  - toward the sea
  - to the west
  lexicon: HALOT
  rationale: The directional form from יָם literally relates to 'sea' but in boundary texts commonly means 'westward' because the Mediterranean lies to the west. Rendering it 'westward' communicates the directional sense directly in English.
- source_word: נַחַל קָנָה
  chosen: the Brook of Kanah
  alternatives:
  - the Wadi Kanah
  - the Valley of Kanah
  lexicon: HALOT
  rationale: נַחַל can denote a wadi, streambed, or brook. In English Bible style for a named boundary feature, 'Brook of Kanah' is clear and traditional without being archaic. 'Wadi' is more geographically precise but less accessible for general readers.
- source_word: וְהָיוּ תֹצְאֹתָיו
  chosen: and its end points were
  alternatives:
  - and its goings out were
  - and its extremities were
  - and its outlets were
  lexicon: HALOT
  rationale: תּוֹצָאוֹת in boundary formulas refers to the terminal points or extremities of a border. 'End points' conveys the surveying sense in clear modern English. The singular suffix refers back to the border as a collective line.
- source_word: הַיָּמָּה
  chosen: at the sea
  alternatives:
  - at the west
  - at the Sea
  lexicon: HALOT
  rationale: 'Here the noun retains its concrete sense: the border terminates at the sea, likely the Mediterranean. Lowercase ''sea'' is appropriate because the Hebrew does not specify a formal title. ''At the west'' would flatten the geographic endpoint into mere direction.'
- source_word: זֹאת נַחֲלַת
  chosen: This is the inheritance of
  alternatives:
  - This was the inheritance of
  - This is the allotted inheritance of
  lexicon: HALOT
  rationale: The demonstrative plus noun summarizes the territorial allotment. Present tense works idiomatically in English for a formal territorial notice.
- source_word: מַטֵּה
  chosen: the tribe of
  alternatives:
  - the staff of
  - the branch of
  lexicon: HALOT
  rationale: In allotment contexts מַטֶּה denotes a tribal unit, not the literal object 'staff.' 'Tribe of' is the established contextual sense.
- source_word: בְנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the people of Ephraim
  - the descendants of Ephraim
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Ephraim.' Per gender-accurate policy, the masculine familial expression is preserved rather than neutralized, since it denotes the tribal descendants through the named ancestor.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their families
  alternatives:
  - by their clans
  - according to their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת can be rendered 'families' or 'clans.' 'Families' is a straightforward rendering of the Hebrew form; 'clans' is also possible in tribal contexts, but the more literal choice is retained here.
