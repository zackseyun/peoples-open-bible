review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura causal, el contexto cultual, la metáfora de tropiezo, el gesto idiomático de juicio y el cierre de responsabilidad: ''Porque… por tanto… y llevarán su iniquidad'' refleja fielmente el hebreo. También preserva correctamente ''casa de Israel'' y el uso de ''Yahvé'' conforme al proyecto. Sin embargo, hay dos problemas de alineación del aparato: (1) las notas a y b están invertidas respecto de sus anclajes en el texto; [a] está colocado tras ''la casa de Israel'' pero la nota a trata sobre ''he alzado mi mano'', y [b] está colocado tras ''Señor Yahvé'' pero la nota b trata sobre el nombre divino. (2) Falta una nota para la ambigüedad de אוֹתָם (''les/a ellos'' posiblemente a los asociados con los ídolos o, por sentido, a los ídolos mismos), que el rastro inglés conservó y que sigue siendo pertinente en español.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'les ministraron' suena algo forzado en español bíblico natural; 'les sirvieron' sería más idiomático, pero dado que el proyecto desea conservar el matiz cultual, puede mantenerse si se apoya con una nota de alternativa o si se opta por una formulación más natural. Además, la frase 'fueron un tropiezo' es aceptable, aunque 'se convirtieron en un tropiezo' refleja mejor el valor resultativo de וְהָיוּ. La puntuación con rayas es buena.
  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé', 'casa de Israel' e 'iniquidad'. No hay conflicto con términos doctrinales principales. La resolución 'Señor Yahvé' para אֲדֹנָי יְהוִה es defendible en español bajo la política del proyecto, aunque conviene mantener la nota teológica correspondiente correctamente anclada.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a los anclajes en el texto.
    rationale: El marcador [a] aparece tras 'la casa de Israel' pero la nota a explica 'he alzado mi mano'; el marcador [b] aparece tras 'Señor Yahvé' pero la nota b corresponde a la fórmula divina. Esto rompe la trazabilidad exigida y puede confundir al lector.
  - severity: medium
    issue: Falta la nota sobre la ambigüedad del pronombre hebreo אוֹתָם.
    rationale: El rastro inglés preservó explícitamente la alternativa 'they served them before their idols'; en español sigue siendo útil aclarar que 'les' puede referirse a personas asociadas con los ídolos o, por sentido, a los propios ídolos.
  - severity: medium
    issue: '''Les ministraron'' es poco natural en español general.'
    rationale: Aunque intenta conservar el matiz cultual de יְשָׁרְתוּ, en español suena menos idiomático que 'les sirvieron' o 'les prestaron servicio'. Puede mejorarse sin perder fidelidad.
  - severity: low
    issue: '''Y fueron un tropiezo'' refleja menos claramente el sentido resultativo de וְהָיוּ.'
    rationale: '''Se convirtieron en un tropiezo'' comunica mejor la idea de resultado/consecuencia señalada en las decisiones léxicas inglesas.'
  revised_spanish_text: Porque les sirvieron[a] delante de sus ídolos y se convirtieron en un tropiezo de iniquidad para la casa de Israel, por tanto he alzado mi mano contra ellos[b] —declara el Señor Yahvé[c]—, y llevarán su iniquidad.
  revised_footnotes:
