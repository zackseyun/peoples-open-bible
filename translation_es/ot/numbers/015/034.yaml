translation:
  language: es
  text: Entonces lo pusieron bajo custodia, porque no se había aclarado[a] qué debía hacerse con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se había especificado qué se debía hacer con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחוּ
  english_pob_choice: they put
  chosen_spanish: pusieron
  alternatives_spanish:
  - lo colocaron
  - lo dejaron
  lexicon: HALOT
  rationale: El verbo en Hifil de נוח admite la idea de poner o colocar. En este contexto narrativo-legal, «pusieron» comunica con naturalidad que lo hicieron quedar bajo una medida de restricción.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo / él
  alternatives_spanish:
  - a él
  - al hombre
  lexicon: Pronombre objeto masculino singular
  rationale: El objeto directo masculino singular se refiere al hombre del contexto previo. En español, «lo» en la oración principal mantiene la referencia sin recargar el estilo.
- source_word: בַּמִּשְׁמָר
  english_pob_choice: in custody
  chosen_spanish: bajo custodia
  alternatives_spanish:
  - bajo guardia
  - en detención
  - en prisión
  lexicon: HALOT
  rationale: מִשְׁמָר puede significar custodia o lugar de retención. «Bajo custodia» preserva la fuerza legal de la retención sin convertirla en una prisión formal.
- source_word: לֹא פֹרַשׁ
  english_pob_choice: it had not been made clear
  chosen_spanish: no se había aclarado
  alternatives_spanish:
  - no se había especificado
  - no se había declarado
  - no se había explicado
  lexicon: HALOT
  rationale: La pasiva de פרש indica que el asunto no había sido claramente expuesto o determinado. «No se había aclarado» conserva esa pasividad y la incertidumbre jurídica de manera natural en español.
- source_word: מַה יֵּעָשֶׂה לוֹ
  english_pob_choice: what should be done to him
  chosen_spanish: qué debía hacerse con él
  alternatives_spanish:
  - qué se le debía hacer
  - qué había que hacerle
  - qué debía hacerse para él
  lexicon: HALOT
  rationale: La cláusula pregunta por la acción que correspondía realizar respecto de él. «Qué debía hacerse con él» refleja el matiz deliberativo/legal sin imponer una sentencia específica.
theological_decisions:
- issue: Naturaleza de la incertidumbre legal
  english_pob_reading: The required action had not yet been clearly specified, without implying ignorance of the law in general.
  chosen_spanish_reading: La acción requerida todavía no había sido claramente determinada.
  alternative_spanish_readings:
  - No se conocía la ley aplicable en general.
  - Todavía no se había dictado la pena exacta.
  rationale: El hebreo se centra en la falta de una especificación clara del caso, no en desconocimiento general de la ley. La traducción conserva esa tensión procesal sin resolverla ni ampliarla.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje fue revisado y el estado más reciente indica que no se requirieron cambios; la redacción propuesta sigue de cerca ese consenso y conserva el matiz legal del hebreo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se mantiene un registro jurídico sobrio, acorde con el contexto narrativo de detención temporal.
  - «Custodia» se usa en sentido legal de retención provisional, no como encarcelamiento penal pleno.
