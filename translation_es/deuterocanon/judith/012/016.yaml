    rationale: El imperfecto con τηρέω expresa estar observando o atento a una ocasión apropiada, no solo esperar pasivamente. Una formulación como «estaba atento a una oportunidad» o «estaba esperando la ocasión» refleja mejor el griego y el audit trail.
