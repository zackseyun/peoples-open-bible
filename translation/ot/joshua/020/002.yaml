id: JOS.20.2
reference: Joshua 20:2
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר תְּנ֤וּ לָ/כֶם֙ אֶת עָרֵ֣י הַ/מִּקְלָ֔ט אֲשֶׁר דִּבַּ֥רְתִּי אֲלֵי/כֶ֖ם בְּ/יַד מֹשֶֽׁה־־־־׃
translation:
  text: Speak to the sons of Israel[a], saying, ‘Appoint for yourselves the cities of refuge, about which I spoke to you through Moses,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak
  lexicon: HALOT
  rationale: Piel imperative of דבר addressed to Joshua. 'Speak' preserves the direct command form without adding interpretive nuance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the formal familial expression is retained in the main text rather than flattened to the ethnic label 'Israelites,' though that is a natural alternative.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - thus
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the direct speech. 'Saying' is concise and transparent to the Hebrew structure.
- source_word: תְּנוּ לָכֶם
  chosen: Appoint for yourselves
  alternatives:
  - Set apart for yourselves
  - Give yourselves
  - Designate for yourselves
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this administrative context the sense is to assign or designate cities for a specific function. 'Appoint for yourselves' captures the idiomatic force in readable English without over-paraphrasing.
- source_word: עָרֵי הַמִּקְלָט
  chosen: the cities of refuge
  alternatives:
  - the refuge cities
  - the asylum cities
  lexicon: HALOT
  rationale: Established and accurate rendering of the legal term for designated places of protection. 'Cities of refuge' is both idiomatic and faithful.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֲלֵיכֶם
  chosen: that I spoke to you about
  alternatives:
  - which I spoke to you
  - that I told you of
  lexicon: HALOT
  rationale: English requires a natural complement for 'spoke.' Adding 'about' makes the clause idiomatic while preserving the content reference.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by means of Moses
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' commonly denotes mediated agency. 'Through Moses' communicates the sense clearly in modern English; the more literal form is preserved in a footnote.
