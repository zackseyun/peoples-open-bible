review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «fuego consumió» para אָכְלָה אֵשׁ, «sus vírgenes» para וּבְתוּלֹתָיו, y mantiene la negación de לֹא הוּלָּלוּ. Sin embargo, «sus jóvenes» para בַּחוּרָיו pierde el rasgo masculino explícito de «young men», y «no fueron cantadas» no expresa adecuadamente el sentido pasivo de ser celebradas o alabadas en canto.'
  spanish_quality_summary: El español es mayormente claro, pero «no fueron cantadas» suena poco natural y semánticamente impreciso en contexto; sugiere que ellas mismas eran el contenido de una canción, no que fueron celebradas con cantos. «Sus jóvenes» también queda demasiado genérico en español. Una leve revisión mejora fidelidad y legibilidad.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Vírgenes» está bien justificado frente a «doncellas». La revisión propuesta preserva esa decisión y ajusta «jóvenes» a «jóvenes varones» para reflejar mejor בַּחוּרָיו.
  issues:
  - severity: medium
    issue: «sus jóvenes» no marca el sexo masculino de בַּחוּרָיו
    rationale: El hebreo y la auditoría inglesa apuntan específicamente a «young men», no a jóvenes en general. En español, «jóvenes» puede incluir ambos sexos y debilita el paralelismo con «vírgenes».
  - severity: high
    issue: «no fueron cantadas» no representa bien לֹא הוּלָּלוּ
    rationale: הוּלָּלוּ aquí tiene el sentido de ser celebradas/alabadas, probablemente con cantos nupciales en mente. «Cantadas» es una formulación poco natural y semánticamente más estrecha que el hebreo y la auditoría inglesa.
  - severity: low
    issue: La nota al pie contiene comillas y puntuación torpes
    rationale: La nota comienza con una comilla innecesaria antes de «O:», lo que afecta la pulcritud editorial del español.
