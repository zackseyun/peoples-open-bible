translation:
  language: es
  text: Entonces Moisés extendió su vara hacia el cielo, y Yahvé envió truenos y granizo, y fuego[a] descendió a la tierra. Yahvé hizo llover granizo sobre la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el fuego fue hacia la tierra"; el hebreo dice literalmente "fuego", pero en contexto probablemente se refiere al relámpago.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  lexicon: HALOT
  rationale: El hebreo נָטָה expresa la acción de extender o alargar. En español, 'extendió' comunica con naturalidad el gesto de Moisés con la vara sin caer en una calca rígida.
- source_word: מַטֵּהוּ
  english_pob_choice: his staff
  chosen_spanish: su vara
  alternatives_spanish:
  - su bastón
  - su cayado
  lexicon: HALOT
  rationale: מַטֶּה puede ser 'vara' o 'bastón'. 'Vara' conserva la fuerza bíblica y funciona bien en el episodio de las plagas; 'cayado' suena más específico y pastoral.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo arriba
  - hacia los cielos
  lexicon: HALOT
  rationale: El hebreo indica dirección hacia arriba, literalmente 'sobre los cielos'. 'Hacia el cielo' es natural en español y conserva el movimiento ascendente del gesto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé', conforme al criterio del proyecto para יְהוָה. Es la forma española estable y readable para el nombre personal de Dios.
- source_word: נָתַן קֹלֹת וּבָרָד
  english_pob_choice: sent thunder and hail
  chosen_spanish: envió truenos y granizo
  alternatives_spanish:
  - dio truenos y granizo
  - hizo caer truenos y granizo
  lexicon: HALOT
  rationale: קֹלֹת en contexto tormentoso se entiende como 'truenos'. 'Envió' comunica bien la iniciativa divina del verbo hebreo con un español natural.
- source_word: קֹלֹת
  english_pob_choice: thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - ruidos
  - voces
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar literalmente 'voces/sonidos', en este contexto meteorológico el sentido es 'truenos'. Mantenerlo así evita ambigüedad innecesaria.
- source_word: וַתִּהֲלַךְ אֵשׁ אָרְצָה
  english_pob_choice: fire came down to the earth
  chosen_spanish: fuego descendió a la tierra
  alternatives_spanish:
  - fuego bajó a la tierra
  - fuego cayó a tierra
  - fuego fue hacia la tierra
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de 'fuego' moviéndose hacia la tierra; 'descendió' refleja esa dirección con solemnidad. Se evita identificarlo de modo explícito como 'relámpago' en el texto principal, porque el hebreo dice 'fuego'.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - relámpago
  - llamas
  lexicon: HALOT
  rationale: La palabra hebrea es 'fuego'. Aunque el referente probable sea un fenómeno eléctrico de la tormenta, el texto mantiene la imagen de fuego y no la sustituye en el cuerpo principal.
- source_word: וַיַּמְטֵר
  english_pob_choice: rained
  chosen_spanish: hizo llover
  alternatives_spanish:
  - llovió
  - envió lluvia
  lexicon: HALOT
  rationale: El hiphil de מָטַר expresa causar lluvia. En español, 'hizo llover' conserva la causatividad del hebreo mejor que un simple 'llovió'.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: '''Granizo'' es la equivalencia normal y clara en español para בָּרָד en este contexto de plaga.'
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - Egipto
  lexicon: HALOT
  rationale: Se preserva la referencia explícita a la 'tierra'/'land' de Egipto. 'Tierra de Egipto' es natural en español bíblico y mantiene el énfasis geográfico del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la política del proyecto de transliterarlo como 'Yahvé', en vez de sustituirlo por un título como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֵשׁ en la tormenta
  english_pob_reading: fire came down to the earth (likely lightning in context)
  chosen_spanish_reading: fuego descendió a la tierra
  alternative_spanish_readings:
  - relámpago descendió a la tierra
  - fuego cayó a tierra
  rationale: Se conserva la tensión lexical entre 'fuego' y la probable referencia natural a un fenómeno de tormenta. El texto principal no resuelve la imagen interpretándola como 'relámpago', pero la lectura contextual sigue siendo compatible con ello.
  doctrine_reference: Principio POB de preservar el término fuente cuando la imagen del original es deliberada
translation_notes:
  revision_awareness: 'He incorporado la revisión más reciente del POB inglés: la frase final mantiene el verbo de descenso del fuego (''came down to the earth''), pero en español se opta por ''descendió a la tierra'' para sostener una equivalencia formal y natural. También se ha conservado el manejo de ''thunder'' como ''truenos'' y de יְהוָה como el nombre divino transliterado según el estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma uniforme para יְהוָה.
  - '''vara'' traduce מַטֶּה con el registro bíblico adecuado y coherente con el episodio de Moisés.'
  - '''granizo'' y ''truenos'' siguen el campo semántico meteorológico de la plaga sin añadir explicación al texto principal.'
  - La nota al pie marca la posible equivalencia contextual de 'fuego' con 'relámpago' sin borrar la imagen hebrea original.
