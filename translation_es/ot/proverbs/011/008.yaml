revisions:
- from: El justo es rescatado de la angustia[a], y el impío llega en su lugar.
  to: El justo es librado de la dificultad[a], y el impío ocupa su lugar.
  rationale: Se ajusta "angustia" a "dificultad" para reflejar mejor el sentido amplio de צָרָה en un proverbio general, y se cambia "llega en su lugar" por "ocupa su lugar" para un español más natural que preserve claramente la idea de sustitución de תַּחְתָּיו. "Es librado" mejora el registro proverbial y representa bien el pasivo de נֶחֱלָץ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:24:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y la idea central: el justo es librado de una situación adversa y el impío ocupa su lugar en una reversión/sustitución. También preserva correctamente la nota sobre תַּחְתָּיו. Sin embargo, "angustia" estrecha algo el sentido de צָרָה, que en este proverbio general se expresa mejor como "dificultad" o "aflicción/adversidad". Además, el verbo español "llega" para וַיָּבֹא suena menos natural en esta construcción proverbial que una formulación más idiomática de sustitución.'
  spanish_quality_summary: El texto es claro y legible, pero "el impío llega en su lugar" suena algo rígido y menos natural en español bíblico contemporáneo. "El impío ocupa su lugar" comunica mejor la sustitución implícita por תַּחְתָּיו sin añadir detalle narrativo. "Es librado" también armoniza mejor con la lectura sapiencial general que "es rescatado", que puede sugerir una escena más concreta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. "El justo" y "el impío" son adecuados en este contexto. El ajuste propuesto favorece una equivalencia más natural en español sin apartarse del análisis léxico documentado.
  issues:
  - severity: medium
    issue: '"de la angustia" restringe el campo semántico de צָרָה'
    rationale: צָרָה en este proverbio general denota trouble/distress/adversity en sentido amplio. "Angustia" en español suele leerse más como estado interior o emocional, mientras que el hebreo admite una situación adversa más amplia.
  - severity: medium
    issue: '"el impío llega en su lugar" es poco idiomático'
    rationale: Aunque וַיָּבֹא literalmente es "vino/llega", en español esta combinación con "en su lugar" suena forzada. Una formulación como "ocupa su lugar" o "viene a estar en su lugar" comunica mejor la sustitución que el hebreo expresa mediante תַּחְתָּיו.
  - severity: low
    issue: '"es rescatado" puede sonar demasiado concreto'
    rationale: El nifal נֶחֱלָץ indica ser librado/sacado, y "es librado" encaja muy bien en registro proverbial español. "Rescatado" no es incorrecto, pero puede sugerir una intervención más puntual o dramática.
  revised_spanish_text: El justo es librado de la dificultad[a], y el impío ocupa su lugar.
  revised_footnotes:
  - marker: a
    text: O «en vez de él»; la expresión hebrea puede indicar sustitución, sugiriendo que el impío cae en la dificultad en lugar del justo.
    reason: lexical_alternative
  revision_rationale: Se ajusta "angustia" a "dificultad" para reflejar mejor el sentido amplio de צָרָה en un proverbio general, y se cambia "llega en su lugar" por "ocupa su lugar" para un español más natural que preserve claramente la idea de sustitución de תַּחְתָּיו. "Es librado" mejora el registro proverbial y representa bien el pasivo de נֶחֱלָץ.
