revisions:
- from: '¿Por qué han de decir las naciones: «¿Dónde está su Dios?» Que se dé a conocer entre las naciones, ante nuestros ojos, la venganza por la sangre derramada de tus esclavos[a].'
  to: ¿Por qué han de decir las naciones, «¿Dónde está su Dios?» Que se dé a conocer entre las naciones, ante nuestros ojos, la venganza por la sangre derramada de tus siervos[a].
