base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/028/021.yaml
  text: And behold[a], the divisions of the priests and the Levites are for all the service of the house of God, and with you in all the work will be every willing man with skill for every kind of service; the officials also, and all the people[b], will be at your command in all your matters.
  footnotes:
  - marker: a
    text: Or 'every volunteer skilled in wisdom.' The Hebrew literally has 'every willing man in wisdom' for every service.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for all your words'; that is, ready to carry out all your directives or matters.
    reason: lexical_alternative
