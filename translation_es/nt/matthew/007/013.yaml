review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador español sigue bien el sentido del griego: imperativo directo («Entren»), contraste entre puerta estrecha/puerta ancha y camino amplio, cláusula relativa «que lleva», y cierre con énfasis en «muchos». También preserva correctamente la referencia pronominal de δι’ αὐτῆς con «por ella» sin sobreexplicitar. Sin embargo, hay un problema de anclaje de nota: la nota [a] explica una alternativa para στενός, no para toda la frase «puerta angosta», y el anclaje debe ir sobre el adjetivo, no sobre la frase completa.’
  spanish_quality_summary: ‘El español es claro y legible. «Entren por la puerta angosta» suena natural en registro bíblico contemporáneo. «Porque ancha es la puerta y espacioso el camino» es comprensible y digno, aunque algo elíptico; sigue siendo aceptable en español. La única corrección necesaria es técnica y menor: ubicar la marca [a] donde corresponde semánticamente. Las demás notas están bien formuladas y el texto no presenta calcos ni problemas gramaticales graves.’
  glossary_alignment: ‘No hay términos del glosario mayor en disputa en este versículo. Las decisiones léxicas son coherentes con el expediente inglés: στενός → «angosta» con alternativa «estrecha»; εὐρύχωρος → «espacioso» con alternativas «ancho/amplio»; ἀπώλεια → «destrucción» con alternativas «ruina/perdición».’
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «puerta angosta» en vez de al adjetivo «angosta».
    rationale: La nota dice «O «puerta estrecha». στενός puede significar «estrecho» o «angosto»». El elemento léxico alternativo es στενός, por lo que el marcador debe aparecer en la palabra que lo traduce. Así se evita sugerir que la nota afecta a toda la locución o a «puerta».
  revised_spanish_text: Entren por la puerta angosta[a]. Porque ancha es la puerta y espacioso[b] el camino que lleva a la destrucción[c], y muchos son los que entran por ella.
  revised_footnotes:
  - marker: a
    text: O «puerta estrecha». στενός puede significar «estrecho» o «angosto».
    reason: lexical_alternative
  - marker: b
    text: O «ancho» o «amplio». εὐρύχωρος puede significar «ancho» o «espacioso».
    reason: lexical_alternative
  - marker: c
    text: O «ruina» o «perdición». ἀπώλεια puede denotar destrucción, ruina o perdición.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto base porque es fiel y natural; solo se precisa que la nota [a] debe entenderse como anclada al adjetivo «angosta», que traduce στενός. No se requieren cambios de redacción ni de contenido léxico.
