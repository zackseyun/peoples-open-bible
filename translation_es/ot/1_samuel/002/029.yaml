- from: ¿Por qué desprecian[a] mi sacrificio y mi ofrenda, que yo mandé para el santuario[b], y honras a tus hijos más que a mí, engordándolos[c] con lo primero de toda ofrenda de Israel, mi pueblo?
  to: ¿Por qué desprecian[a] mi sacrificio y mi ofrenda, que yo mandé para la morada[b], y honras a tus hijos más que a mí, engordándoos[c] con lo primero de toda ofrenda de Israel, mi pueblo?
  rationale: 'Se corrige el error principal de sentido en לְהַבְרִיאֲכֶם, restaurando el valor reflexivo/benefactivo de segunda persona plural: el reproche es que Eli y su casa se benefician ellos mismos de las ofrendas. También se ajusta מָעוֹן a ''la morada'' en el texto principal para seguir más de cerca la decisión auditada, manteniendo la explicación cultual en nota. Las notas se rehacen para alinearlas con la evidencia fuente y evitar defender una lectura incompatible con la morfología hebrea.'
