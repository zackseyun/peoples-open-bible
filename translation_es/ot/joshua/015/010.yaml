translation:
  language: es
  text: Entonces el límite giró desde Baalá hacia el occidente[a] hasta el monte Seir, pasó por la ladera norte del monte Yearim (es decir, Chesalón), descendió a Bet-semes y pasó a Timná.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hacia el mar», una expresión idiomática estándar para «hacia el occidente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - dio vuelta
  lexicon: HALOT
  rationale: En una descripción de fronteras, el verbo expresa un cambio de dirección del límite. «Se volvió» mantiene ese movimiento geográfico de forma natural en español sin forzar una imagen mecánica.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En este contexto territorial, «límite» es claro y idiomático en español. Conserva la idea de línea demarcatoria sin introducir matices modernos de frontera política que no están en el texto.
- source_word: מִבַּעֲלָה
  english_pob_choice: from Baalah
  chosen_spanish: desde Baalá
  alternatives_spanish:
  - de Baalá
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera natural en español bíblico. «Desde» reproduce el punto de partida del recorrido fronterizo.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - al poniente
  lexicon: HALOT
  rationale: El hebreo usa una forma direccional literalmente relacionada con «mar», pero el sentido idiomático es occidental. «Hacia el occidente» comunica el valor direccional con estilo sobrio y fiel.
- source_word: אֶל הַר שֵׂעִיר
  english_pob_choice: to Mount Seir
  chosen_spanish: hasta el monte Seir
  alternatives_spanish:
  - al monte Seir
  - hacia el monte Seir
  lexicon: HALOT
  rationale: «Hasta» expresa bien la progresión del trazado fronterizo hacia ese punto de referencia. Se conserva el topónimo en forma transliterada tradicional.
- source_word: וְעָבַר
  english_pob_choice: passed along
  chosen_spanish: pasó a
  alternatives_spanish:
  - pasó junto a
  - se extendió hasta
  lexicon: HALOT
  rationale: En fórmulas de límites, el verbo indica que el borde continúa por o junto a otro rasgo geográfico. «Pasó a» mantiene la secuencia sin sobreexplicar el recorrido.
- source_word: אֶל כֶּתֶף
  english_pob_choice: to the ... slope
  chosen_spanish: a la ladera
  alternatives_spanish:
  - al costado
  - al hombro
  lexicon: HALOT
  rationale: כֶּתֶף puede significar «hombro» o «lado/flanco». En español geográfico, «ladera» comunica la parte lateral o inclinada de una montaña de manera natural, sin perder la idea del flanco.
- source_word: הַר יְעָרִים
  english_pob_choice: Mount Jearim
  chosen_spanish: del monte Yearim
  alternatives_spanish:
  - del monte Jearim
  - del monte de los bosques
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración coherente en español. Dado que el inglés POB trató el término como topónimo fijo, se evita una traducción semántica que podría oscurecer la referencia geográfica.
- source_word: מִצָּפוֹנָה
  english_pob_choice: northern
  chosen_spanish: septentrional
  alternatives_spanish:
  - norte
  - del lado norte
  lexicon: HALOT
  rationale: La forma señala el lado norte de la montaña. «Septentrional» es una opción digna y precisa en español bíblico; mantiene la referencia direccional sin redundancia.
- source_word: הִיא כְסָלוֹן
  english_pob_choice: (that is, Chesalon)
  chosen_spanish: (es decir, Chesalón)
  alternatives_spanish:
  - (o sea, Chesalón)
  - (esto es, Chesalón)
  lexicon: HALOT
  rationale: La cláusula funciona como identificación explicativa del lugar previo. «Es decir» reproduce bien la aposición aclaratoria del hebreo y el tratamiento del inglés POB.
- source_word: וְיָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se hizo más bajo
  lexicon: HALOT
  rationale: El verbo topográfico expresa descenso de altitud o de recorrido. «Descendió» es fiel y sobrio en español, y preserva la imagen espacial.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Beth-semes
  - Bet Shemesh
  lexicon: HALOT
  rationale: Nombre propio transmitido en forma habitual y legible para lectores en español. Se adapta la transliteración para evitar una grafía demasiado anglicada.
- source_word: וְעָבַר
  english_pob_choice: passed on to
  chosen_spanish: y pasó a
  alternatives_spanish:
  - y continuó hacia
  - y siguió hasta
  lexicon: HALOT
  rationale: La repetición del verbo en el contexto del límite indica continuidad del trayecto. «Y pasó a» conserva el movimiento secuencial sin añadir interpretaciones.
- source_word: תִּמְנָה
  english_pob_choice: Timnah
  chosen_spanish: Timná
  alternatives_spanish:
  - Timna
  - Timnah
  lexicon: HALOT
  rationale: Se preserva el topónimo en transliteración española con acento gráfico para facilitar la lectura. Es el equivalente natural de la forma inglesa transliterada dentro de un registro bíblico.
theological_decisions:
