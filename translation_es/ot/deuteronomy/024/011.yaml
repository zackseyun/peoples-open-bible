revisions:
- from: Tú te quedarás fuera[a], y el hombre a quien tú estés haciendo el préstamo sacará hacia ti el objeto dado en prenda.
  to: Te quedarás de pie fuera, y el hombre a quien le haces el préstamo[a] sacará la prenda a ti desde afuera.
  rationale: Se ajusta el texto para seguir más de cerca el hebreo y la auditoría inglesa, a la vez que se mejora la naturalidad del español. «Te quedarás de pie fuera» recupera mejor la concreción de תעמד. «A quien le haces el préstamo» expresa de forma idiomática la decisión principal sobre נשה, mientras la nota conserva la alternativa «está endeudado contigo». «La prenda» simplifica sin perder la fuerza legal. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la escena legal de permanecer fuera y recibir la prenda desde dentro, pero varias elecciones no siguen de cerca la evidencia fuente ni la auditoría inglesa. תַּעֲמֹד se debilitó de «estar de pie/ponerse afuera» a «te quedarás», y אֲשֶׁר אַתָּה נֹשֶׁה בוֹ quedó en una construcción española poco natural («estés haciendo el préstamo»). Además, אֵלֶיךָ se expresa mejor como «a ti» que «hacia ti», y conviene reflejar en nota la alternativa auditada «el hombre que está endeudado contigo».
  spanish_quality_summary: 'El español es generalmente comprensible, pero tiene giros poco idiomáticos para lectura bíblica amplia: «tú estés haciendo el préstamo» suena forzado, y «sacará hacia ti» no es la forma natural de expresar entrega. «Objeto dado en prenda» es fiel pero más pesado de lo necesario; «la prenda» funciona bien en contexto legal-bíblico. También es preferible evitar el pronombre explícito repetido «tú» salvo donde aporte contraste, que aquí no hace falta.'
  glossary_alignment: No hay términos teológicos de proyecto en juego. La decisión sobre עבוט debe mantener el matiz legal; «la prenda» concuerda con la auditoría inglesa («pledge») y con español bíblico natural. La alternativa semántica de נשה documentada en inglés debe preservarse en una nota española, no reemplazarse por una formulación principal menos natural.
  issues:
  - severity: medium
    issue: «Te quedarás fuera» no preserva con suficiente precisión תַּעֲמֹד
    rationale: El hebreo manda literalmente «estar de pie/stand». Aunque implica esperar fuera, la auditoría inglesa retuvo el sentido concreto. «Te quedarás» desplaza el foco a permanencia y omite la imagen física principal.
  - severity: high
    issue: «A quien tú estés haciendo el préstamo» es poco natural y no refleja bien la relación jurídica
    rationale: La construcción resulta ajena al español estándar y no mejora la fidelidad. Una formulación como «a quien le haces el préstamo» o «a quien prestas» conserva la decisión inglesa sin torpeza.
  - severity: medium
    issue: Falta en la nota la alternativa auditada sobre endeudamiento
    rationale: La nota actual sobre «afuera» no corresponde a la nota inglesa, que documenta la ambigüedad de נשה entre prestar y estar endeudado. Esa información debe preservarse.
  - severity: low
    issue: «Hacia ti» suena menos natural que «a ti» para אֵלֶיךָ
    rationale: El hebreo marca dirección hacia el acreedor, pero en español de entrega directa «a ti» comunica mejor esa relación sin rigidez.
  - severity: low
    issue: «El objeto dado en prenda» es innecesariamente pesado
    rationale: «La prenda» ya expresa con claridad el objeto tomado como garantía y suena más fluido en español bíblico-jurídico.
  revised_spanish_text: Te quedarás de pie fuera, y el hombre a quien le haces el préstamo[a] sacará la prenda a ti desde afuera.
  revised_footnotes:
