translation:
  language: es
  text: si yo he pagado con mal al que estaba en paz conmigo, o he librado a mi enemigo sin causa[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «o he despojado a mi enemigo sin causa», tomando el verbo como «despojar/arrancar» en vez de «librar/rescatar».'
