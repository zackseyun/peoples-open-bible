  glossary_alignment: No hay términos de glosario mayor afectados. 'Orden de nacimiento' está bien para כְּתוֹלְדֹתָם en este contexto. 'Restantes' para הַנּוֹתָרִים es adecuado. No hay conflicto con terminología teológica del proyecto.
