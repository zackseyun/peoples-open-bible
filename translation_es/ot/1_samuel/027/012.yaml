    text: O, más idiomáticamente, «se ha hecho totalmente detestable entre su pueblo de Israel». El hebreo dice literalmente «se ha hecho apestoso», un modismo para volverse odioso o detestable.
    reason: lexical_alternative
  - marker: b
    text: «Siervo» aquí también podría traducirse «esclavo», pero el contexto sugiere servicio permanente de dependencia hacia Aquís, más que enfatizar condición de propiedad.
    reason: lexical_alternative
