translation:
  language: es
  text: Harás lo recto y lo bueno a los ojos de Yahvé[a], para que te vaya bien, y puedas entrar y tomar posesión de la buena tierra que Yahvé juró a tus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'heredar la buena tierra'. El verbo hebreo puede significar 'heredar', 'poseer' o 'tomar posesión de'; aquí se refiere a la entrada de Israel y a su posesión de la tierra prometida por juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: you shall do
  chosen_spanish: Harás
  alternatives_spanish:
  - deberás hacer
  - debes hacer
  lexicon: HALOT
  rationale: El perfecto con vav consecutiva en un contexto exhortativo expresa mandato futuro. En español, el futuro simple comunica bien la obligación/mandato sin volver la frase pesada; 'harás' mantiene el tono de instrucción del pacto.
- source_word: הַיָּשָׁר
  english_pob_choice: what is right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo derecho
  - lo justo
  lexicon: HALOT
  rationale: El hebreo describe lo correcto, lo recto/upright. 'Lo recto' conserva la imagen moral de algo derecho o correcto y suena natural junto con el término siguiente.
- source_word: וְהַטּוֹב
  english_pob_choice: and good
  chosen_spanish: y lo bueno
  alternatives_spanish:
  - y el bien
  - y lo bueno y recto
  lexicon: HALOT
  rationale: Se conserva el par coordinado de valores éticos. 'Lo bueno' evita reducirlo a 'el bien' como sustantivo abstracto y mantiene el paralelismo con 'lo recto'.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa un modismo evaluativo. 'Ante los ojos de Yahvé' preserva la metáfora visual y el valor de juicio/evaluación; se mantiene 'Yahvé' por el nombre divino explícito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino en lugar de sustituirlo por un título. ''Yahvé'' es la forma establecida en el estándar español del proyecto.'
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce finalidad. 'Para que' es la equivalencia natural y clara en español; conserva la relación causal/final sin añadir matices no presentes.
- source_word: יִיטַב לָךְ
  english_pob_choice: it may go well for you
  chosen_spanish: te vaya bien
  alternatives_spanish:
  - te resulte bien
  - te suceda bien
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y habla de bienestar general. 'Te vaya bien' comunica el sentido de manera idiomática en español, sin restringirlo a prosperidad material.
- source_word: וּבָאתָ
  english_pob_choice: you may go in
  chosen_spanish: entrarás
  alternatives_spanish:
  - irás adentro
  - podrás entrar
  lexicon: HALOT
  rationale: En este contexto de entrada a la tierra, el verbo de movimiento funciona como entrada al territorio. 'Entrarás' es más natural en español y conserva el valor direccional.
- source_word: וְיָרַשְׁתָּ
  english_pob_choice: and take possession of
  chosen_spanish: tomarás posesión de
  alternatives_spanish:
  - heredarás
  - poseerás
  lexicon: HALOT
  rationale: El verbo puede significar heredar, poseer o tomar posesión. Se elige 'tomarás posesión de' para conservar la idea activa de ocupar la tierra prometida, tal como la nota inglesa distingue de una herencia pasiva.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - la tierra fértil
  lexicon: HALOT
  rationale: Se conserva el adjetivo de valoración con la colocación natural del español ('la buena tierra'). No se expande a 'fértil' porque el hebreo dice 'buena', no específicamente fértil.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  english_pob_choice: that Yahweh swore
  chosen_spanish: que Yahvé juró
  alternatives_spanish:
  - que Yahvé prometió con juramento
  - que Yahvé había jurado
  lexicon: HALOT
  rationale: נשבע implica jurar un juramento de pacto. 'Juró' preserva la fuerza del acto solemne mejor que 'prometió', que debilitaría el peso jurídico del texto.
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  - a tus padres y antepasados
  lexicon: HALOT
  rationale: Se mantiene el término filial masculino plural del hebreo. 'Padres' conserva la referencia tradicional al linaje patriarcal del pacto y corresponde a la elección del POB inglés.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. El proyecto traduce el nombre divino como 'Yahvé' para preservar la identidad personal del Dios del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lexical force of וְיָרַשְׁתָּ in relation to the land promise
  english_pob_reading: take possession of / inherit
  chosen_spanish_reading: tomarás posesión de
  alternative_spanish_readings:
  - heredarás
  - poseerás
  rationale: El contexto es la entrada efectiva de Israel en la tierra prometida por juramento. 'Tomarás posesión de' mantiene la dimensión activa y territorial del verbo sin ocultar la tensión entre herencia prometida y ocupación histórica.
  doctrine_reference: POB lexical note on ירש as covenantal possession
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el control más reciente: no se requieren cambios respecto del consenso de revisión y la lectura auditada permanece estable.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera uniforme para יְהוָה.
  - Se conserva el paralelismo ético 'lo recto y lo bueno' sin fusionarlo en un solo concepto abstracto.
  - La cláusula final preserva el valor de 'tomar posesión' como decisión léxica principal, con nota alternativa sobre 'heredar'.
  - El estilo general es español moderno, formal y apto para publicación eclesial, sin sustituir el nombre divino por 'SEÑOR'.
