  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: clamor dirigido a Yahvé, razón causal introducida por כי, posesión de novecientos carros de hierro y opresión de Israel por veinte años. Sin embargo, en español el verbo principal de la segunda cláusula queda mejor como imperfecto («oprimía») para acompañar la duración continua «durante veinte años», mientras que el hebreo perfecto puede expresar la situación de opresión en contexto narrativo. También conviene alinear la nota [c] con la alternativa inglesa documentada, que contrasta «con fuerza» con «severamente/con violencia».'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. «Clamaron», «los hijos de Israel» y «Yahvé» funcionan bien. La frase «y oprimió ... durante veinte años» suena algo puntual en español; «y oprimía» o «y estuvo oprimiendo» comunica mejor la opresión sostenida. El resto es natural y fiel.
  glossary_alignment: 'Se respeta correctamente la política del proyecto: יְהוָה → «Yahvé»; בְנֵי יִשְׂרָאֵל → «los hijos de Israel» conforme a la decisión corporativa formal; לָחַץ → «oprimía/oprimió» mantiene el sentido de opresión; בְּחָזְקָה → «con fuerza» sigue la revisión inglesa hacia fuerza más que mera aspereza. No hay conflicto terminológico mayor.'
  issues:
  - severity: medium
    issue: Aspecto verbal de «oprimió ... durante veinte años»
    rationale: Aunque el hebreo usa perfecto narrativo tras וְהוּא, en español «oprimió durante veinte años» puede sonar demasiado puntual. «Oprimía» expresa mejor la opresión continua indicada por la duración de veinte años y mejora la naturalidad sin alterar el sentido.
  - severity: low
