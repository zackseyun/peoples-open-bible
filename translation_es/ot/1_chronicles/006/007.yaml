translation:
  language: es
  text: 'Los hijos de Coat: Amminadab su hijo[a], Coré su hijo, Assir su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos comparan genealogías paralelas donde el antepasado correspondiente aparece como Izhar en lugar de Amminadab; el hebreo aquí lee Amminadab.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Descendientes de
  lexicon: HALOT
  rationale: La forma constructa plural introduce una genealogía. En español, «los hijos de» conserva con naturalidad la relación filial directa que el texto repite después con «su hijo», sin ampliar innecesariamente a «descendientes».
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Qehat
  lexicon: convención bíblica hispana
  rationale: Se usa la forma tradicional española del nombre propio bíblico, que es reconocible y fluida en lectura eclesial.
- source_word: עַמִּינָדָב
  english_pob_choice: Amminadab
  chosen_spanish: Amminadab
  lexicon: convención bíblica internacional
  rationale: Nombre propio transliterado; se mantiene la forma convencional en español. El texto hebreo aquí lee Amminadab, por lo que no se corrige en el cuerpo principal.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: El sufijo posesivo con el sustantivo singular expresa sucesión filial. «Su hijo» reproduce esa relación de modo directo y transparente en español.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: convención bíblica hispana
  rationale: Se adopta la forma española tradicional del nombre propio bíblico, más natural para el lector hispanohablante que la transliteración inglesa.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: Se mantiene la misma solución que en la primera ocurrencia para conservar la cadena genealógica y la transparencia del hebreo.
- source_word: אַסִּיר
  english_pob_choice: Assir
  chosen_spanish: Assir
  lexicon: convención bíblica internacional
  rationale: Nombre propio transliterado; no se traduce por su posible valor léxico porque aquí funciona como antropónimo.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: La repetición final del término genealógico se vierte de manera consistente para reflejar la estructura del verso.
translation_notes:
  revision_awareness: El borrador sigue de cerca la versión inglesa auditada y el texto hebreo, conservando la estructura genealógica y la variante textual señalada en la nota.
  spanish_consistency_notes:
  - Se prefieren formas bíblicas españolas establecidas para nombres propios cuando son de uso tradicional (Coat, Coré).
  - Se mantiene «su hijo» para los tres enlaces genealógicos, como reflejo directo del hebreo repetido.
  - La nota al pie marca únicamente la variante textual documentada en el aparato inglés; no se añaden notas especulativas.
