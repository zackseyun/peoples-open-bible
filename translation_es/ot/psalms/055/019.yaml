translation:
  language: es
  text: Él ha redimido mi alma en paz del combate contra mí[a], porque muchos estaban conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque muchos estaban contra mí». El hebreo literalmente dice «porque muchos estaban conmigo», lo cual en contexto puede entenderse de forma idiomática como una referencia a numerosos adversarios.
    reason: alternative_reading
lexical_decisions:
- source_word: פָּדָה
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha rescatado mediante pago
  - ha librado
  lexicon: HALOT
  rationale: פדה expresa la idea de redimir/rescatar. «Ha redimido» conserva el valor fuerte de rescate y el aspecto perfecto del hebreo sin caer en una paráfrasis más general como «ha librado».
- source_word: בְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en seguridad
  - pacíficamente
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. «En paz» es la equivalencia más directa y natural en español, y mantiene abierto el rango semántico del término.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - a mí
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o yo mismo. Aquí «mi alma» preserva el paralelismo poético y el registro bíblico sin reducirlo a una simple referencia a la vida física.
- source_word: מִקֲּרָב לִי
  english_pob_choice: from the battle against me
  chosen_spanish: de la batalla contra mí
  alternatives_spanish:
  - de la batalla para mí
  - del combate contra mí
  - de mi conflicto
  lexicon: HALOT
  rationale: קְרָב es «batalla» o «combate», y el valor adversativo de לִי se expresa de forma natural en español con «contra mí». Esto preserva la imagen militar y la oposición del contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: En este contexto poético, כִּי introduce la razón del rescate. «Porque» comunica con claridad la relación causal en español.
- source_word: בְרַבִּים
  english_pob_choice: they were many
  chosen_spanish: muchos
  alternatives_spanish:
  - eran muchos
  - había muchos
  - en gran número
  lexicon: HALOT
  rationale: La frase hebrea, leída en conjunto con el verbo siguiente, alude a la multitud de los presentes. «Muchos» mantiene la concisión del hebreo y deja abierta la lectura idiomática del verso.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - a mi lado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «conmigo». «Conmigo» conserva esa forma y permite mantener la tensión interpretativa que surge del contexto bélico, sin resolverla de antemano en la línea principal.
theological_decisions:
- issue: Interpretación de la cláusula final בְרַבִּים הָי֥וּ עִמָּדִי
  english_pob_reading: for many were with me
  chosen_spanish_reading: porque muchos estaban conmigo
  alternative_spanish_readings:
  - porque muchos estaban contra mí
  - porque eran muchos los que estaban conmigo
  - porque muchos estaban de mi lado
  rationale: La forma hebrea עִמָּדִי significa de manera más directa «conmigo», y el POB inglés decidió preservar esa redacción en el texto principal. En español, «estaban conmigo» mantiene la literalidad, pero puede leerse en tensión con el contexto de hostilidad; por eso la nota ofrece la lectura adversativa como posibilidad contextual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que eliminó el pronombre explícito «they» para reflejar más literalmente el hebreo y dejó la cláusula final como «for many were with me». La redacción española mantiene esa literalidad y traslada la ambigüedad interpretativa a la nota, en lugar de resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - Se mantiene «alma» para נֶפֶשׁ, en línea con el registro poético bíblico y la terminología POB.
  - «Conmigo» conserva la forma hebrea con עִמָּדִי y evita cerrar prematuramente la ambigüedad del final del verso.
