  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Dios», «juicios» y «para siempre» están bien. La decisión formal sobre δικαιόω se respeta. El único punto léxico a corregir es ἔντιμον: mejor «honorable» que «honrado» en este contexto.'
