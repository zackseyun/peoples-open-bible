    issue: La nota [c] está mal planteada porque repite como alternativa la misma formulación principal.
    rationale: Una nota de alternativa léxica debe preservar una opción real distinta. «O “arroyos que fluyen desde el Líbano”» no añade información si esa es ya la lectura del texto.
  - severity: low
    issue: El orden y anclaje de las notas puede mejorarse para reflejar mejor la auditoría inglesa.
    rationale: En el inglés, la nota de alternativa sobre la frase final está vinculada al segmento de «living water»/frase final combinada. En español conviene anclar una nota solo donde haya verdadera ambigüedad o alternativa relevante.
  - severity: low
    issue: «Desde el Líbano» es válido, pero «del Líbano» resulta más compacto y poético en este versículo.
    rationale: Ambas opciones son fieles a מִן, pero «del Líbano» encaja mejor con el registro lírico de Cantares sin pérdida de sentido.
  revised_spanish_text: Un manantial de jardines[a], un pozo de agua viva[b], y arroyos que fluyen del Líbano[c].
