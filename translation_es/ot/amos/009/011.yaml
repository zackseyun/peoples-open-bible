revisions:
- from: En aquel día levantaré la tienda caída[a] de David, y cerraré sus brechas[b]; levantaré sus ruinas y la reedificaré como en los días de antaño[c].
  to: En aquel día levantaré el refugio[a] caído de David, y cerraré sus brechas[b]; levantaré sus ruinas y lo reedificaré como en los días de antaño[c].
  rationale: Se corrige la principal imprecisión léxica y teológica de la nota [a], eliminando 'tienda de reunión', que no corresponde al hebreo ni al razonamiento documentado. También se ajusta el texto principal a 'refugio' para alinearlo mejor con la elección del POB y evitar asociaciones cultuales innecesarias, conservando en nota las alternativas tradicionales relevantes.
