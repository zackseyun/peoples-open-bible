lexical_decisions:
- source_word: לְחֵזִיר
  english_pob_choice: to Hezir
  chosen_spanish: a Hezir
  alternatives_spanish:
  - para Hezir
  - a Hezir
  lexicon: HALOT
  rationale: El prefijo ל en esta lista de suertes marca asignación o adjudicación. En español, 'a' expresa naturalmente la asignación de cada turno o lote. Se conserva el nombre propio en transliteración, sin intentar traducirlo.
- source_word: שִׁבְעָה עָשָׂר
  english_pob_choice: the seventeenth
  chosen_spanish: el decimoséptimo
  alternatives_spanish:
  - diecisiete
  - el diecisiete
  lexicon: HALOT
  rationale: En una enumeración de turnos o suertes, el valor es ordinal, no cardinal. 'El decimoséptimo' suena natural y conserva la función de orden del hebreo.
- source_word: לְהַפִּצֵּץ
  english_pob_choice: to Happizzez
  chosen_spanish: a Happizzez
  alternatives_spanish:
  - para Happizzez
  - a Happizzez
  lexicon: HALOT
  rationale: Como con el primer nombre, ל indica adjudicación en la serie. Se mantiene la transliteración del nombre propio para respetar el testimonio textual.
- source_word: שְׁמוֹנָה עָשָׂר
  english_pob_choice: the eighteenth
  chosen_spanish: el decimoctavo
  alternatives_spanish:
  - dieciocho
  - el dieciocho
  lexicon: HALOT
  rationale: También aquí el contexto exige un ordinal. 'El decimoctavo' preserva el sentido de secuencia en la distribución de las suertes.
