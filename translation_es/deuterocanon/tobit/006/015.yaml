    reason: cultural_note
  revision_rationale: Se corrigió el anclaje de la nota [a] para que corresponda a 'los anteriores'. Se ajustó la segunda mitad del versículo para reflejar mejor el modismo griego de causar la muerte en dolor, manteniendo la imagen de 'descender ... al sepulcro' pero en un español más natural. También se reemplazó 'perjudica' por 'daña' y 'se acercan' por 'vienen a ella' para alinearse mejor con la revisión inglesa auditada.
