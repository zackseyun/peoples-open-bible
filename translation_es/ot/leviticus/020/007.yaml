translation:
  language: es
  text: Conságrense[a] y sean santos, porque yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Santifíquense» o «Háganse santos». El verbo hebreo está en forma reflexiva y llama a Israel a una autoconsagración activa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְקַדִּשְׁתֶּם
  english_pob_choice: Consecrate yourselves
  chosen_spanish: Santifíquense
  alternatives_spanish:
  - Conságrense
  - Santifíquense a sí mismos
  lexicon: HALOT
  rationale: El verbo hitpael tiene fuerza reflexiva y exhortativa; en español, «Santifíquense» comunica la llamada activa a apartarse para Dios con naturalidad y sin perder el matiz de acción deliberada. «Conságrense» también es posible, pero «santificarse» conserva mejor la relación con el campo léxico de קדשׁ en este contexto.
- source_word: וִהְיִיתֶם קְדֹשִׁים
  english_pob_choice: and be holy
  chosen_spanish: y sean santos
  alternatives_spanish:
  - y sean santos para Dios
  - y estén santos
  - y sean consagrados
  lexicon: HALOT
  rationale: El par verbal en secuencia funciona como una segunda exhortación. «Sean santos» reproduce bien el sentido ético-covenantal de קְדֹשִׁים; «santos» es la opción más idiomática y fiel aquí, mientras que «consagrados» podría sonar más técnico o limitar el alcance moral del término.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón fundante del mandato. «Porque» expresa de manera clara y directa la causalidad del hebreo sin añadir matices innecesarios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton en español como «Yahvé», conforme al criterio del proyecto de no reemplazarlo por una sustitución como «SEÑOR». Esta forma es ampliamente reconocible en español bíblico y mantiene el valor propio del nombre personal de Dios.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea tiene sufijo de segunda persona plural, en español neutral de amplio alcance es preferible «su Dios» por concordancia con el registro público y eclesial moderno. «Vuestro Dios» sería más marcado regionalmente; «su Dios» preserva el referente singular contextual sin perder la relación de posesión.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, «Yahvé» mantiene la decisión del POB de preservar el nombre divino y evita la sustitución litúrgica por «el Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Reflexive sanctification command
  english_pob_reading: Consecrate yourselves
  chosen_spanish_reading: Santifíquense
  alternative_spanish_readings:
  - Conságrense
  - Santifíquense a sí mismos
  rationale: El hitpael de קדשׁ expresa una acción reflexiva/causativa del sujeto sobre sí mismo. «Santifíquense» conserva esa fuerza y, al mismo tiempo, suena natural en español bíblico contemporáneo. No se reduce a un simple estado pasivo.
  doctrine_reference: HALOT on קדשׁ; POB lexical note on reflexive self-consecration
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y con la auditoría inglesa sin cambios de revisión aplicados; se mantuvo la equivalencia óptima y la lectura del nombre divino como nombre propio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el tetragrámaton, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - «Santifíquense» preserva el matiz reflexivo del hitpael hebreo.
  - «su Dios» comunica correctamente el sufijo plural de segunda persona en un español neutral y eclesialmente usable.
