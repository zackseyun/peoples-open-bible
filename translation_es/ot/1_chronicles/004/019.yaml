translation:
  language: es
  text: Y los hijos de la esposa de Hodía, hermana de Naham[b], fueron el padre[a] de Queila el garmita y Eshtemoa el maacatita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías, «padre de» puede significar fundador, antepasado o cabeza de clan, no solo padre biológico inmediato.
    reason: lexical_alternative
  - marker: b
    text: El hebreo combina «hijos» en plural con «padre de» en singular; la frase puede resumir una relación de clan y no solo una secuencia padre-hijo.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  lexicon: HALOT
  rationale: En genealogías, בנים puede referirse a hijos literales o a descendientes. «Hijos de» conserva mejor la forma concreta del hebreo y la economía de la lista genealógica.
- source_word: אֵשֶׁת
  english_pob_choice: the wife of
  chosen_spanish: la esposa de
  alternatives_spanish:
  - la mujer de
  lexicon: HALOT
  rationale: El constructo identifica la relación con Hodías. «Esposa de» es natural en español contemporáneo y mantiene el valor relacional del hebreo sin añadir interpretación.
- source_word: הוֹדִיָּה
  english_pob_choice: Hodiah
  chosen_spanish: Hodías
  alternatives_spanish:
  - Hodía
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio al español con adaptación gráfica mínima para fluidez y lectura eclesial.
- source_word: אֲחוֹת נַחַם
  english_pob_choice: the sister of Naham
  chosen_spanish: hermana de Naham
  alternatives_spanish:
  - la hermana de Naham
  lexicon: HALOT
  rationale: La frase constructa se vierte de forma transparente. Se omite el artículo repetido para evitar pesadez en español, pero se mantiene la relación de parentesco.
- source_word: אֲבִי
  english_pob_choice: were the father of
  chosen_spanish: fueron el padre de
  alternatives_spanish:
  - fueron el fundador de
  - fueron el antepasado de
  lexicon: HALOT
  rationale: Se conserva la fórmula literal «padre de» porque el hebreo emplea un uso genealógico comprimido que puede indicar progenitor, fundador o cabeza de clan. No se resuelve en paráfrasis.
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Queila
  alternatives_spanish:
  - Keila
  lexicon: nombre propio transliterado
  rationale: Se adapta el topónimo/nombre propio a la ortografía española habitual, manteniendo la identificación sin explicar más allá del texto.
- source_word: הַגַּרְמִי
  english_pob_choice: the Garmite
  chosen_spanish: el garmita
  alternatives_spanish:
  - el descendiente de Garm
  - el miembro del clan de Garm
  lexicon: HALOT
  rationale: El gentilicio/adjetivo con artículo se expresa con sustantivo de pertenencia en español. «Garmita» conserva la fuerza etnónima/clánica sin expandir el hebreo.
- source_word: וְאֶשְׁתְּמֹעַ
  english_pob_choice: and Eshtemoa
  chosen_spanish: y Eshtemoa
  alternatives_spanish:
  - y Eshtemúa
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio con transliteración estándar y conjunción coordinante, como en el hebreo.
- source_word: הַמַּעֲכָתִי
  english_pob_choice: the Maacathite
  chosen_spanish: el maacatita
  alternatives_spanish:
  - el descendiente de Maacá
  - el miembro del clan de Maacá
  lexicon: HALOT
  rationale: El gentilicio/adjetival con artículo se vierte como etnónimo en español. «Maacatita» preserva el valor de pertenencia/clan.
theological_decisions:
- issue: Sentido genealógico de «padre de» en אבי
  english_pob_reading: Hebrew 'father of' in genealogies can mean founder, ancestor, or clan-head, not only immediate biological father.
  chosen_spanish_reading: «padre de» se mantiene sin explicitar una sola opción, dejando abierto que pueda significar progenitor, fundador o cabeza de clan.
  alternative_spanish_readings:
  - «fundador de»
  - «antepasado de»
  - «cabeza de clan de»
  rationale: La expresión hebrea es intencionalmente comprimida y el POB inglés conserva esa tensión. En español conviene no eliminarla con una decisión interpretativa cerrada.
  doctrine_reference: Uso genealógico del hebreo bíblico; notar especialmente fórmulas de descendencia/clan en Crónicas.
- issue: Relación entre plural «hijos» y singular «padre de»
  english_pob_reading: Because the Hebrew says 'sons' but then uses singular 'father of,' the line is compressed and may summarize a clan relationship rather than a simple father-son sequence.
  chosen_spanish_reading: Se respeta la compresión sintáctica del hebreo sin armonizarla artificialmente.
  alternative_spanish_readings:
  - reformular como una relación lineal de paternidad
  - explicitar una relación de clan en el texto principal
  rationale: La tensión entre plural y singular forma parte del dato textual. Debe conservarse para no borrar la estructura genealógica abreviada del pasaje.
  doctrine_reference: Crónicas y genealogías como registros de linajes, aldeas o clanes; principio de no sobreinterpretar el parentesco inmediato.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el rastro auditado del POB en inglés. No se detectaron revisiones aplicadas en el expediente; el borrador español conserva la compresión genealógica y las opciones léxicas documentadas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió «hijos de» a «descendientes de» por transparencia genealógica.
  - Se prefirió conservar los gentilicios como etnónimos («garmita», «maacatita») para reflejar el hebreo con mínima expansión interpretativa.
  - 'Los nombres propios se adaptan a ortografía española de lectura pública: Hodías, Queila, Eshtemoa, Naham.'
