translation:
  language: es
  text: Pero ustedes, acérquense aquí, hijos de una adivina[a], descendencia de un adúltero y de una prostituta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de una mujer que practica adivinación» o «hijos de una mujer que pronostica presagios». El hebreo alude a una práctica adivinatoria ilícita.
    reason: lexical_alternative
  - marker: b
    text: La línea puede funcionar como una invectiva profética metafórica sobre adulterio espiritual e idolatría, no necesariamente como una afirmación literal sobre la ascendencia.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Asú como ustedes
  - Pero vosotros
  lexicon: HALOT
  rationale: La partícula con pronombre introduce contraste fuerte; en español, «Pero ustedes» reproduce la oposición de forma natural y clara en registro bíblico moderno.
- source_word: קִרְבוּ הֵנָּה
  english_pob_choice: come here
  chosen_spanish: acérquense aquí
  alternatives_spanish:
  - vengan aquí
  - acérquense hasta aquí
  - vengan acá
  lexicon: HALOT
  rationale: El imperativo plural de קרב pide una orden desafiante de aproximación. «Acérquense aquí» conserva el imperativo y la deixis de cercanía sin sonar arcaico.
- source_word: בְּנֵי עֹנְנָה
  english_pob_choice: sons of a sorceress
  chosen_spanish: hijos de una adivina
  alternatives_spanish:
  - hijos de una hechicera
  - hijos de una mujer que practica adivinación
  - hijos de una soothsayer
  lexicon: HALOT
  rationale: עֹנְנָה se refiere a práctica adivinatoria ilícita. «Adivina» comunica mejor ese campo semántico en español común que «hechicera», y mantiene el sentido ofensivo-profético del hebreo.
- source_word: זֶרַע
  english_pob_choice: offspring of
  chosen_spanish: descendencia de
  alternatives_spanish:
  - simiente de
  - hijos de
  - descendientes de
  lexicon: HALOT
  rationale: En lenguaje injurioso genealógico, «descendencia de» transmite el valor colectivo y figurado de זֶרַע con buena naturalidad en español.
- source_word: מְנָאֵף
  english_pob_choice: an adulterer
  chosen_spanish: un adúltero
  alternatives_spanish:
  - uno que comete adulterio
  - un infiel
  lexicon: HALOT
  rationale: El participio masculino singular denota a un hombre adúltero. «Un adúltero» preserva la forma y la fuerza del insulto profético.
- source_word: וַ/תִּזְנֶה
  english_pob_choice: and a prostitute
  chosen_spanish: y de una prostituta
  alternatives_spanish:
  - y una prostituta
  - y de una mujer prostituida
  - y de una ramera
  lexicon: HALOT
  rationale: La forma femenina singular de זנה se presta aquí a un sustantivo nominal en español. «Prostituta» es claro y contemporáneo; la preposición repetida en la serie («de un... y de una...») hace fluida la enumeración.
theological_decisions:
- issue: Naturaleza literal o metafórica de la invectiva
  english_pob_reading: The verse uses prophetic invective describing the audience as offspring of occult and sexually unfaithful figures, likely metaphorical for covenant unfaithfulness rather than a literal statement of parentage.
  chosen_spanish_reading: El verso conserva una invectiva profética que puede funcionar como metáfora de infidelidad al pacto, sin resolverla a una denuncia meramente literal de ascendencia.
  alternative_spanish_readings:
  - Denuncia literal de una genealogía inmoral real
  - Metáfora exclusiva de idolatría sin posible referencia social
  rationale: La línea profética combina imagen genealógica y denuncia moral/espiritual. La traducción mantiene esa tensión sin suavizarla ni cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica sin forzar una resolución interpretativa.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura óptima-equivalente sin cambios recientes; esta versión española sigue el mismo perfil semántico y retórico, conservando el tono de invectiva, la deixis («aquí») y la tensión entre posible metáfora y denuncia genealógica.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología de máscara porque no aparece el Tetragrámaton en este versículo.
  - Se prefirió «adivina» sobre «hechicera» para representar con precisión y naturalidad la práctica de עֹנְנָה en español.
  - Se conservó la fuerza masculina singular de «un adúltero» y la femenina singular de «una prostituta» para reflejar la morfología del hebreo.
  - El orden y la repetición de «de» ayudan a reproducir la cadencia invectiva de la lista genealógica hebrea.
