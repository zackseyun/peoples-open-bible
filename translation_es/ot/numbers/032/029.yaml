revisions:
- from: 'Y Moisés les dijo: «Si los hijos de Gad y los hijos de Rubén cruzan el Jordán con ustedes, todo hombre armado para la guerra delante de Yahvé, y la tierra es sometida delante de ustedes, entonces les darán la tierra de Galaad como posesión».'
  to: 'Y Moisés les dijo: «Si los hijos de Gad y los hijos de Rubén cruzan el Jordán con ustedes, todo hombre armado para la guerra delante de Yahvé, y la tierra queda sometida ante ustedes, entonces les darán la tierra de Galaad como posesión».'
  rationale: Se hicieron ajustes menores de estilo para evitar un calco poco natural («es sometida») y mejorar la fluidez («ante ustedes»), manteniendo intacto el sentido del hebreo y las decisiones léxicas del audit trail.
