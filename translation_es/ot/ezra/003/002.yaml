  to: Entonces Jesúa, hijo de Josadac, se levantó con sus hermanos, los sacerdotes[a], y Zorobabel, hijo de Sealtiel, con sus hermanos, y edificaron el altar del Dios de Israel para ofrecer sobre él holocaustos, como está escrito en la Ley de Moisés[b], hombre de Dios.
