translation:
  language: es
  text: Él expulsó a las naciones de delante de ellos y les asignó una herencia con cuerda de medir[a]; hizo habitar a las tribus de Israel en sus tiendas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les asignó una herencia por línea de medir»; el hebreo une la idea de reparto con la de división medida de la tierra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en sus moradas»; literalmente, «en sus tiendas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - desalojó
  lexicon: HALOT
  rationale: גרש expresa sacar o expulsar con fuerza. 'Expulsó' comunica bien el movimiento de remoción del territorio sin añadir matices no presentes en el hebreo.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - ante ellos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es 'de delante de ellos'. En español, 'de delante de ellos' conserva esa relación espacial e idiomática de manera clara.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto de conquista, 'naciones' es el equivalente más directo y respeta el uso del texto base para los habitantes no israelitas de la tierra.
- source_word: וַיַּפִּילֵם
  english_pob_choice: allotted them
  chosen_spanish: les asignó
  alternatives_spanish:
  - les repartió
  - les tocó en suerte
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente remite a 'hacer caer', en contextos de reparto territorial alude a asignación por reparto o sorteo. 'Les asignó' mantiene la idea de distribución sin forzar una imagen moderna de loteo.
- source_word: בְּחֶבֶל נַחֲלָה
  english_pob_choice: by measuring line
  chosen_spanish: por cuerda de medición
  alternatives_spanish:
  - por línea de medición
  - con cuerda de reparto
  lexicon: HALOT
  rationale: חבל puede significar cuerda o línea de medición, y con נַחֲלָה evoca la división medida de la tierra. 'Cuerda de medición' preserva la imagen concreta y la relación idiomática con la repartición de la herencia.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una heredad
  - una posesión heredada
  lexicon: HALOT
  rationale: '''Herencia'' o ''heredad'' son opciones posibles; aquí ''una herencia'' comunica con naturalidad el sentido de porción recibida como patrimonio territorial.'
- source_word: וַיַּשְׁכֵּן
  english_pob_choice: he settled
  chosen_spanish: estableció
  alternatives_spanish:
  - hizo habitar
  - hizo morar
  lexicon: HALOT
  rationale: El causativo de שכן implica hacer habitar. 'Estableció' es una forma natural en español y mantiene la idea de fijar a Israel en un lugar.
- source_word: בְּאָהֳלֵיהֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus moradas
  - en sus viviendas
  lexicon: HALOT
  rationale: '''Tendas'' o ''tiendas'' preserva la imagen concreta del hebreo אֹהֶל. Aunque puede referirse metonímicamente a viviendas, la metáfora de tiendas es la más cercana al texto.'
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - las tribus israelitas
  lexicon: HALOT
  rationale: La construcción genitiva es directa y 'las tribus de Israel' es la forma más clara y natural en español.
theological_decisions:
- issue: Agencia divina en la conquista y asentamiento
  english_pob_reading: The subject throughout is God, who removes the nations and apportions the land to Israel.
  chosen_spanish_reading: El sujeto sigue siendo Dios, quien expulsa a las naciones, asigna la herencia y establece a Israel en la tierra.
  alternative_spanish_readings:
  - Él expulsó a las naciones y repartió la tierra a Israel.
  - Dios removió a las naciones y dio a Israel su herencia.
  rationale: La puntuación y el sujeto implícito de la estrofa mantienen la acción divina continua. La traducción conserva esa agencia sin introducir formulaciones doctrinales externas.
  doctrine_reference: Salmo 78:55; Josué 24:13
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al preferir 'inheritance' sobre una formulación más explicativa, y se conservó la imagen de 'measuring line' mediante 'cuerda de medición'. También se mantuvo la referencia concreta a 'tents' con una nota alternativa, conforme al aparato auditado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino explícito.
  - Se evita 'SEÑOR' como sustituto automático porque el hebreo aquí no lo presenta.
  - '''Naciones'' se mantiene por coherencia con el campo semántico de conquista territorial.'
  - '''Tribus de Israel'' conserva la estructura constructa estándar y es consistente con el resto del proyecto.'
  - Se preserva la imagen de reparto territorial medida, no una mera idea abstracta de posesión.
