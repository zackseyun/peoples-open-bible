translation:
  language: es
  text: tres copas con forma de flor de almendro en una rama[a], con botón[b] y flor, y tres copas con forma de flor de almendro en una rama, con botón y flor; así será para las seis ramas que salen del lamparero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tres copas hechas como flores de almendro en una rama ... y tres copas hechas como flores de almendro en una rama».'
    reason: lexical_alternative
  - marker: b
    text: «Botón» traduce el hebreo כַּפְתֹּר, una proyección ornamental redondeada; alternativamente, «nudo».
    reason: lexical_alternative
  - marker: c
    text: Hebreo מְנֹרָה, a menudo transliterado «menorá»; aquí se traduce «lamparero».
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבִעִים
  english_pob_choice: cups
  chosen_spanish: copas
  alternatives_spanish:
  - vasos
  - cuencos
  lexicon: HALOT
  rationale: El término designa recipientes o formas cóncavas. En este contexto ornamental de la menorá, «copas» conserva la imagen de la pieza decorativa y corresponde bien a la repetición del diseño.
- source_word: מְשֻׁקָּדִים
  english_pob_choice: almond-blossom-shaped
  chosen_spanish: con forma de flor de almendro
  alternatives_spanish:
  - con forma de almendra
  - hechas como flores de almendro
  lexicon: HALOT
  rationale: La raíz alude al almendro y, por el contexto artístico del tabernáculo, describe un motivo floral. «Con forma de flor de almendro» explicita mejor el diseño decorativo que una simple referencia a la almendra como fruto.
- source_word: קָּנֶה
  english_pob_choice: branch
  chosen_spanish: rama
  alternatives_spanish:
  - brazo
  - vara
  lexicon: HALOT
  rationale: En la descripción de la menorá se refiere al elemento proyectado desde el cuerpo central. «Rama» conserva la metáfora vegetal coherente con la ornamentación floral del pasaje y es natural en español.
- source_word: כַּפְתֹּר
  english_pob_choice: bulb
  chosen_spanish: cáliz
  alternatives_spanish:
  - nudo
  - botón
  - protuberancia redonda
  lexicon: HALOT
  rationale: El hebreo describe una proyección ornamental redondeada. Dado el paralelo inmediato «y flor», «cáliz» mantiene la imaginería botánica y permite una lectura fluida en español, aunque el término no agota por completo la idea de relieve ornamental.
- source_word: פֶרַח / פָרַח
  english_pob_choice: flower
  chosen_spanish: flor
  alternatives_spanish:
  - floración
  - blossom
  lexicon: HALOT
  rationale: El sustantivo denota una flor o floración. «Flor» es la opción más clara y natural en español para acompañar el motivo vegetal del versículo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual manera
  - de este modo
  lexicon: HALOT
  rationale: Marca la correspondencia del patrón para todas las ramas. «Así» mantiene la fuerza instructiva y la brevedad del hebreo.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  english_pob_choice: for the six branches
  chosen_spanish: para las seis ramas
  alternatives_spanish:
  - en las seis ramas
  - a las seis ramas
  lexicon: HALOT
  rationale: La preposición más el numeral señalan aplicación distributiva del mismo diseño. «Para las seis ramas» comunica de forma natural que la disposición vale para cada una.
- source_word: הַיֹּצְאִים מִן הַמְּנֹרָה
  english_pob_choice: coming out from the lampstand
  chosen_spanish: que salen del candelabro
  alternatives_spanish:
  - que brotan del candelabro
  - que salen de la menorá
  lexicon: HALOT
  rationale: El participio expresa ramas que se proyectan desde la pieza central. «Que salen del candelabro» es claro y respeta la imagen espacial sin forzar el español.
- source_word: מְנֹרָה
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - menorá
  - lámpara de pie
  lexicon: HALOT
  rationale: Aunque «candelabro» no es transliteración, es el equivalente español reconocido para la pieza tabernacular. Se evita «menorá» porque aquí el sustantivo común del objeto es lo que importa, no un nombre ritualizado.
theological_decisions:
- issue: 'Naturaleza de la imagen de la menorá: vegetal u ornamental'
  english_pob_reading: three almond-blossom-shaped cups ... with bulb and flower
  chosen_spanish_reading: tres copas con forma de flor de almendro ... con cáliz y flor
  alternative_spanish_readings:
  - tres copas hechas como flores de almendro ... con nudo y flor
  - tres copas con forma de almendra ... con botón y flor
  rationale: 'El hebreo presenta un diseño ornamental con imaginería botánica. La traducción mantiene esa tensión: no reduce todo a formas geométricas ni elimina el carácter artístico del objeto sagrado.'
  doctrine_reference: Éxodo 25:31-40; simbolismo del mobiliario del tabernáculo
translation_notes:
  revision_awareness: La redacción inglesa más reciente añade explícitamente «it shall be» para hacer natural la comparación final; en español se refleja con «así será». También se conserva la estructura repetitiva del hebreo y se evita fundir la conclusión en una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefiere vocabulario descriptivo y sobrio, sin recurrir a un transliterado técnico donde el español común ofrece un equivalente claro.
  - Se conserva la repetición de la cláusula paralela para reflejar el ritmo del hebreo y no borrar la simetría del diseño.
