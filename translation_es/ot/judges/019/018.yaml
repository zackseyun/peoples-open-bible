translation:
  language: es
  text: 'Le dijo: «Vamos de paso desde Belén de Judá hasta las partes remotas de la región montañosa de Efraín. Yo soy de allí; fui a Belén de Judá, y voy a la casa de Yahvé[a], pero ningún hombre me recibe en su casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «voy a mi casa» / «voy a casa». Algunos entienden aquí un uso idiomático del hebreo o una lectura distinta, porque «la casa de Yahvé» resulta contextualmente inesperado.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹבְרִים אֲנַחְנוּ
  english_pob_choice: We are passing from
  chosen_spanish: Vamos pasando
  alternatives_spanish:
  - Estamos pasando
  - Vamos de paso
  lexicon: HALOT
  rationale: La forma participial con pronombre expresa desplazamiento en curso. «Vamos pasando» conserva la idea de tránsito continuo sin perder naturalidad en español.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem in Judah
  chosen_spanish: desde Belén de Judá
  alternatives_spanish:
  - de Belén de Judá
  - desde Belén, en Judá
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto y la distinción geográfica respecto de otras localidades llamadas Belén. «Desde» refleja היטב el punto de partida.
- source_word: יַרְכְּתֵי הַר אֶפְרַיִם
  english_pob_choice: the remote parts of the hill country of Ephraim
  chosen_spanish: las partes remotas de la región montañosa de Efraín
  alternatives_spanish:
  - los confines de la región montañosa de Efraín
  - las extremidades de la región montañosa de Efraín
  lexicon: HALOT
  rationale: יַרְכְּתֵי indica extremos o zonas remotas. «Región montañosa» comunica el sentido geográfico de הַר sin sonar forzado en español.
- source_word: מִשָּׁם אָנֹכִי
  english_pob_choice: I am from there
  chosen_spanish: yo soy de allí
  alternatives_spanish:
  - soy de allí
  - de allí soy
  lexicon: HALOT
  rationale: La frase expresa origen. En español, «soy de allí» es el equivalente más natural; se mantiene el pronombre explícito para claridad y énfasis narrativo.
- source_word: וָאֵלֵךְ עַד בֵּית לֶחֶם יְהוּדָה
  english_pob_choice: and I went to Bethlehem in Judah
  chosen_spanish: fui a Belén de Judá
  alternatives_spanish:
  - y fui a Belén de Judá
  - y me dirigí a Belén de Judá
  lexicon: HALOT
  rationale: El wayyiqtol de הלך se rinde como pasado narrativo simple. «Fui» preserva la forma verbal sin añadir matices no exigidos.
- source_word: וְאֶת בֵּית יְהוָה אֲנִי הֹלֵךְ
  english_pob_choice: and I am going to the house of Yahweh
  chosen_spanish: y voy a la casa de Yahvé[a]
  alternatives_spanish:
  - y voy a la casa de Yahvé
  - y voy a la casa del SEÑOR
  lexicon: HALOT
  rationale: Se sigue el texto masorético, que dice literalmente «la casa de Yahvé». Como el proyecto español usa «Yahvé» para יהוה, esa forma se conserva. La frase retiene la tensión textual que también anota el POB inglés.
- source_word: וְאֵין אִישׁ מְאַסֵּף אוֹתִי הַבָּיְתָה
  english_pob_choice: but no man is taking me into his house
  chosen_spanish: pero nadie me recibe en su casa[b]
  alternatives_spanish:
  - pero ningún hombre me recibe en su casa
  - pero nadie me acoge en su casa
  lexicon: HALOT
  rationale: אָסַף en este contexto de hospitalidad significa recibir o acoger. «Recibe» evita una expresión demasiado literal y mantiene la fuerza de la hospitalidad rechazada. El singular masculino implícito se puede conservar en nota si se desea, pero en español «nadie» fluye mejor y no altera el sentido.
theological_decisions:
- issue: YHWH / יְהוָה en la frase «la casa de Yahvé»
  english_pob_reading: and I am going to the house of Yahweh
  chosen_spanish_reading: y voy a la casa de Yahvé
  alternative_spanish_readings:
  - y voy a la casa del SEÑOR
  - y voy a la casa de Dios
  rationale: El texto hebreo dice explícitamente יְהוָה. Se mantiene la transliteración «Yahvé» según la convención doctrinal del proyecto, en vez de sustituir el nombre por un título. Esto también conserva la dificultad contextual señalada por la tradición textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura difícil de «la casa de Yahvé» frente a posibles entendimientos idiomáticos de «mi casa / mi hogar»
  english_pob_reading: Some understand the Hebrew here idiomatically or as reflecting a different reading because 'the house of the LORD' is contextually unexpected.
  chosen_spanish_reading: Se conserva «la casa de Yahvé» en el texto principal y la lectura alternativa se anota aparte.
  alternative_spanish_readings:
  - voy a mi casa
  - voy a casa
  rationale: El texto consonántico y masorético apuntan a «la casa de YHWH». Aunque el contexto hace pensar en una posible idiomaticidad o en una lectura diferente, el principio del proyecto es no reemplazar la lectura fuente en el cuerpo principal sin base textual suficiente.
  doctrine_reference: Principio de fidelidad al texto fuente / nota textual del POB inglés
- issue: אִישׁ en contexto de hospitalidad
  english_pob_reading: no man is taking me into his house
  chosen_spanish_reading: nadie me recibe en su casa
  alternative_spanish_readings:
  - ningún hombre me recibe en su casa
  - no hay hombre que me reciba en su casa
  rationale: El sustantivo masculino singular אִישׁ puede conservarse como «hombre», pero en español la construcción negativa con «nadie» es más idiomática y no borra la referencia a la falta de hospitalidad de un anfitrión masculino. La tensión de género se documenta en la decisión léxica.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión inglesa en dos puntos: (1) usa una formulación más natural para el tránsito, equivalente a «passing from»; (2) conserva el nombre divino como Yahvé, en lugar de una sustitución por título. También mantiene la lectura textual principal de «la casa de Yahvé» con nota de alternativa, en paralelo al POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con las normas del proyecto.
  - Se prefirió «Belén de Judá» para el topónimo, manteniendo la distinción geográfica.
  - «Región montañosa» traduce de manera natural הַר אֶפְרַיִם sin perder el sentido de la zona alta de Efraín.
  - Se evitó «SEÑOR» como máscara, porque la instrucción del proyecto pide transliterar el nombre divino.
  - La nota textual se ancla en «casa de Yahvé» por la lectura alternativa documentada en el POB inglés.
