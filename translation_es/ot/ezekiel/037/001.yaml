base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/037/001.yaml
  text: The hand of Yahweh was upon me[a], and he brought me out by the Spirit of Yahweh and set me down in the middle of the valley[b]; it was full of bones.
  footnotes:
