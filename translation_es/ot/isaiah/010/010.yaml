translation:
  language: es
  text: Como mi mano ha alcanzado a los reinos de los ídolos[a], cuyas imágenes talladas eran mayores que las de Jerusalén y Samaria,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Como mi mano encontró los reinos de los ídolos, y sus imágenes talladas de Jerusalén y de Samaria». El hebreo es elíptico; el sentido es comparativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: La construcción introduce comparación o base para la afirmación siguiente. «Como» conserva esa relación comparativa de manera natural en español y funciona bien con la continuación del contexto.
- source_word: מָצְאָה יָדִי
  english_pob_choice: my hand has reached
  chosen_spanish: mi mano ha alcanzado
  alternatives_spanish:
  - mi mano ha encontrado
  - mi mano ha tomado
  lexicon: HALOT
  rationale: El hebreo literalmente dice «mi mano encontró», pero en este contexto de conquista imperial expresa haber llegado con poder y dominio. «Ha alcanzado» conserva la imagen de la mano y el valor dinámico sin forzar todavía una especificación más dura que el versículo no exige por sí solo.
- source_word: לְמַמְלְכֹת
  english_pob_choice: the kingdoms of
  chosen_spanish: a los reinos de
  alternatives_spanish:
  - contra los reinos de
  - sobre los reinos de
  lexicon: HALOT
  rationale: El verbo anterior rige idiomáticamente la idea de llegar a esos reinos. En español, «alcanzado a los reinos de» comunica la dirección y el objeto del alcance de forma fluida.
- source_word: הָאֱלִיל
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos sin valor
  - los dioses falsos
  lexicon: HALOT
  rationale: אֱלִיל lleva carga peyorativa, pero «ídolos» es el equivalente más directo y claro. Mantiene el tono despectivo del término hebreo sin introducir una glosa interpretativa innecesaria.
- source_word: וּפְסִילֵיהֶם
  english_pob_choice: whose carved images
  chosen_spanish: cuyos ídolos tallados
  alternatives_spanish:
  - y sus imágenes talladas
  - y sus imágenes esculpidas
  lexicon: HALOT
  rationale: פְסִילִים se refiere a imágenes talladas o esculpidas. En español, «ídolos tallados» conserva la relación posesiva implícita y la fuerza negativa del sustantivo, evitando una paráfrasis más larga.
- source_word: מִירוּשָׁלַם וּמִשֹּׁמְרוֹן
  english_pob_choice: than those of Jerusalem and Samaria
  chosen_spanish: que los de Jerusalén y Samaria
  alternatives_spanish:
  - de Jerusalén y de Samaria
  - más que Jerusalén y Samaria
  lexicon: HALOT
  rationale: La partícula con מִן aquí funciona en sentido comparativo. Español exige expresar claramente el segundo término de comparación con «que», como ya lo hace el sentido contextual del hebreo y la lectura auditada en inglés.
theological_decisions:
- issue: Comparación elíptica al final del versículo
  english_pob_reading: whose carved images were greater than those of Jerusalem and Samaria
  chosen_spanish_reading: cuyos ídolos tallados eran mayores que los de Jerusalén y Samaria
  alternative_spanish_readings:
  - y sus ídolos tallados de Jerusalén y Samaria
  - cuyos ídolos tallados eran de Jerusalén y Samaria
  rationale: El hebreo es elíptico, pero el contexto exige una comparación. La traducción la hace explícita para reflejar el sentido llano del argumento, sin borrar la tensión sintáctica subyacente.
  doctrine_reference: 'Translation philosophy: equivalencia óptima; primacía del idioma original; preservar el sentido comparativo evidente del texto'
translation_notes:
  revision_awareness: El texto sigue de cerca el último estado revisado del POB en inglés, sin cambios reportados en la auditoría más reciente. Se conservó la resolución comparativa explícita del cierre, coherente con la nota inglesa y sin introducir elementos ajenos al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «ídolos» para הָאֱלִיל por ser el término directo y despectivo en contexto.
  - Se eligió «ídolos tallados» para פְסִילִים, manteniendo la concreción material de las imágenes.
  - La comparación final se marcó con «que», porque el español requiere explícitamente el segundo término de comparación.
  - Se evitó «SEÑOR» u otra sustitución terminológica, ya que no aparece el Tetragrámaton en este versículo.
