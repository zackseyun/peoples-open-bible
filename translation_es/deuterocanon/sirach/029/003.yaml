translation:
  language: es
  text: Mantén tu palabra[a], y sé fiel a él, y en todo tiempo encontrarás lo que necesitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muéstrate digno de confianza con ello», tomando la referencia de manera más abstracta, como alusión a tu palabra dada o a tu acuerdo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στερέωσον
  english_pob_choice: Keep
  chosen_spanish: Afirma
  alternatives_spanish:
  - Mantén
  - Confirma
  - Sostén
  lexicon: LSJ
  rationale: El imperativo aoristo de στερεόω expresa hacer firme o establecer algo. En este contexto sapiencial sobre un compromiso, «afirma» comunica bien la idea de fijar y sostener con firmeza la propia palabra, sin perder naturalidad en español.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - promesa
  - compromiso
  - acuerdo
  lexicon: LSJ
  rationale: λόγος aquí apunta a la palabra dada, es decir, a un compromiso verbal. «Palabra» conserva la relación directa con el griego y funciona de manera clara en español bíblico actual.
- source_word: πιστώθητι
  english_pob_choice: be faithful
  chosen_spanish: sé fiel
  alternatives_spanish:
  - muéstrate digno de confianza
  - sé digno de confianza
  - sé confiable
  lexicon: LSJ
  rationale: La forma media/pasiva imperativa expresa mostrarse fiel o digno de confianza. «Sé fiel» mantiene el valor moral de fiabilidad que subraya el texto griego y es natural en español.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  - para con él
  - ante él
  lexicon: LSJ
  rationale: Aunque el contexto inglés revisado prefirió «to him», el griego literalmente dice «con él». En español, «sé fiel con él» preserva mejor la relación preposicional explícita, manteniendo abierta la posibilidad de que la referencia sea a la persona o, de forma más abstracta, al compromiso mismo.
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en cualquier tiempo
  - en toda ocasión
  lexicon: LSJ
  rationale: La expresión denota amplitud temporal total. «En todo tiempo» es una equivalencia natural y suficientemente literal para el registro sapiencial.
- source_word: εὑρήσεις
  english_pob_choice: you will find
  chosen_spanish: encontrarás
  alternatives_spanish:
  - hallarás
  - obtendrás
  - tendrás
  lexicon: LSJ
  rationale: El futuro de εὑρίσκω significa literalmente «encontrarás». En este contexto puede implicar obtener ayuda o provisión, pero «encontrarás» conserva la forma más directa del original.
- source_word: τὴν χρείαν σου
  english_pob_choice: what you need
  chosen_spanish: lo que necesitas
  alternatives_spanish:
  - tu necesidad
  - la ayuda que necesitas
  - tu necesidad y provecho
  lexicon: LSJ
  rationale: χρεία significa necesidad, necesidad práctica o lo necesario. «Lo que necesitas» expresa con claridad el sentido de provisión requerida sin endurecer el español con un calco como «tu necesidad».
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada del inglés en cuanto a la fidelidad dirigida a la persona, pero preserva de forma transparente la relación literal del griego μετʼ αὐτοῦ con «con él», y mantiene el valor resultativo de εὑρήσεις con un futuro simple natural en español.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo «palabra» en vez de «promesa» para conservar la fuerza del λόγος comprometido y su conexión con el audit trail en inglés.
  - No se usó «siervo» ni «Cristo»; no aplican a este versículo.
  - La cláusula final evita paraphrasear más allá del griego y conserva el sentido de provisión/descubrimiento con «lo que necesitas».
