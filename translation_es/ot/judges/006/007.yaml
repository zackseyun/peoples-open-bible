translation:
  language: es
  text: Y sucedió que[a], cuando los hijos de Israel clamaron a Yahvé por causa de Madián[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «a causa de Madián».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened that
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un nuevo desarrollo en la historia. «Y sucedió que» mantiene el marcador narrativo hebreo de manera natural en español, sin cargar el texto con arcaísmo innecesario.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce una cláusula temporal dependiente de «y sucedió». «Cuando» reproduce mejor la relación sintáctica que «que» o «porque».
- source_word: זָעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  lexicon: HALOT
  rationale: El verbo denota un clamor de angustia o súplica. «Clamaron» comunica la urgencia y el carácter de petición, y funciona con naturalidad en español bíblico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea literal. En español, «los hijos de Israel» es comprensible y conserva la transparencia hacia la forma del texto fuente.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - hacia Yahvé
  lexicon: HALOT
  rationale: 'La preposición אֶל marca dirección hacia quien se dirige el ruego; en español se expresa naturalmente con «a». Se sigue el criterio del proyecto para el Nombre divino: «Yahvé».'
- source_word: עַל אֹדוֹת
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: La locución causal expresa el motivo del clamor. «Por causa de» es clara y reproduce bien el valor explicativo de עַל אֹדוֹת en este contexto.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Midian
  lexicon: HALOT
  rationale: Se usa la forma tradicional y reconocible en español para el nombre propio del pueblo/lugar. Es una transliteración estable y fácilmente identificable para lectores bíblicos.
theological_decisions:
- issue: Renderización del Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrama. Conforme al criterio del proyecto, se preserva el Nombre con una transliteración reverente y auditable, en lugar de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El cierre en español mantiene la estructura narrativa y causal del hebreo, siguiendo el estado de alta concordancia del audit trail inglés sin introducir reinterpretaciones. No se requirieron revisiones adicionales.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como forma principal del Nombre divino, coherente con la política del proyecto.
  - Se mantuvo «los hijos de Israel» por transparencia con el hebreo, con nota alternativa para «los israelitas».
  - «Madián» se adoptó como forma española usual y clara para el nombre propio.
  - La puntuación reproduce una sola oración con pausa causal final, equivalente al flujo del hebreo.
