revisions:
- from: Todo alimento[a] lo come el estómago, pero hay alimento[b] mejor que alimento.
  to: Todo alimento lo recibe el estómago, pero un alimento es mejor que otro.[a]
  rationale: Se corrige el anclaje defectuoso de la nota y se mejora la naturalidad del español sin perder el sentido del griego. «Lo recibe el estómago» conserva la idea proverbial de que el estómago acepta cualquier comida, y «un alimento es mejor que otro» expresa con claridad la comparación idiomática ya documentada por el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:53:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «Toda comida la comerá la κοιλία/estómago, pero hay comida mejor que comida». El sentido proverbial está bien captado en conjunto, especialmente la idea de que el estómago acepta cualquier alimento pero los alimentos difieren en calidad. Sin embargo, el borrador español introduce una construcción menos fiel y menos natural en la primera cláusula («lo come el estómago») y conserva de manera demasiado rígida la repetición comparativa en la segunda cláusula («hay alimento mejor que alimento»), cuando el rastro POB inglés ya resolvió idiomáticamente «one food is better than another».'
  spanish_quality_summary: El español del borrador es comprensible, pero suena algo forzado. «Todo alimento lo come el estómago» es menos proverbial y menos natural que «Todo alimento es digerido por el estómago» o, mejor aún, una formulación gnómica más llana; además la nota [a] es incorrecta porque marca «alimento» pero explica «estómago». La segunda mitad también resulta poco idiomática; en español bíblico legible es preferible «un alimento es mejor que otro».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Alimento» y «estómago» concuerdan bien con las decisiones léxicas del proyecto. La principal corrección es estilística y de fidelidad idiomática, no de glosario doctrinal.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «alimento» pero su contenido explica «el estómago».
    rationale: Las instrucciones requieren que cada marcador aparezca en el lugar relevante del texto. Actualmente el anclaje no corresponde al contenido de la nota, lo que hace inválida la documentación.
  - severity: medium
    issue: «Todo alimento lo come el estómago» es una formulación poco natural y no refleja bien la fuerza gnómica del pasivo griego.
    rationale: φάγεται se usa proverbialmente. En español, la activa con objeto anticipado suena torpe; una formulación más natural y fiel es «Todo alimento lo recibe el estómago» o similar.
  - severity: medium
    issue: «hay alimento mejor que alimento» conserva demasiado literalmente una construcción griega que en español queda abrupta.
    rationale: El propio POB inglés documenta la resolución idiomática «one food is better than another». En español, «un alimento es mejor que otro» transmite la comparación con claridad y dignidad.
  revised_spanish_text: Todo alimento lo recibe el estómago, pero un alimento es mejor que otro.[a]
  revised_footnotes:
  - marker: a
    text: Literalmente, «hay alimento mejor que alimento»; el comparativo griego expresa que algunos alimentos son mejores que otros.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje defectuoso de la nota y se mejora la naturalidad del español sin perder el sentido del griego. «Lo recibe el estómago» conserva la idea proverbial de que el estómago acepta cualquier comida, y «un alimento es mejor que otro» expresa con claridad la comparación idiomática ya documentada por el POB inglés.
