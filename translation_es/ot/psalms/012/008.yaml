    text: El hebreo cambia de plural en «los guardarás» a singular en «lo guardarás». Algunas traducciones armonizan la segunda cláusula como «los guardarás».
    reason: alternative_reading
  revision_rationale: Se restaura el singular de la segunda cláusula para reflejar la tensión pronominal del texto hebreo masorético, en línea con la filosofía de preservar tensiones significativas de la fuente. También se corrige la nota para que explique el fenómeno textual real y se ajusta levemente la puntuación del vocativo para mejor español.
