base_translation:
  language: en
  yaml_path: translation/ot/job/031/021.yaml
  text: if I have raised my hand against the fatherless because I saw that I had support in the gate—[a][b][c]
  footnotes:
  - marker: a
    text: Or 'the orphan.' The Hebrew term refers specifically to one deprived of a father and therefore socially vulnerable.
    reason: lexical_alternative
  - marker: b
    text: The 'gate' refers to the city gate, where elders judged cases and public decisions were made.
    reason: cultural_note
  - marker: c
    text: Literally 'my help'; here it means support or backing in a legal/public setting.
    reason: lexical_alternative
