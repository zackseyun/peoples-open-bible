review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia ritual y las decisiones léxicas principales del hebreo: נתן como ''pondrá'', el partitivo ''un poco del aceite'', el lóbulo de la oreja, el pulgar, el dedo gordo del pie, y la referencia final al mismo lugar donde estaba la sangre del אָשָׁם. Sin embargo, ''del que se está purificando'' desplaza ligeramente el sentido pasivo/procesual de הַמִּטַּהֵר (''el que está siendo purificado/limpiado''), y la repetición de ''sobre'' donde español pide una mejor distribución puede pulirse sin perder literalidad.'
  spanish_quality_summary: 'El texto es claro y legible, pero puede sonar algo pesado por la cadena repetida de ''sobre''. Además, ''purificando'' en voz media reflexiva suena menos preciso para un proceso ritual administrado por otros. Una revisión menor mejora fidelidad y naturalidad: ''del que está siendo purificado'' y ''en el lugar de la sangre...'' en la cláusula final.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Ofrenda por la culpa' es una representación válida y explícita de אָשָׁם en este contexto. No aparecen términos sensibles del glosario general como Yahvé/Mesías. La nota alternativa se conserva adecuadamente.
  issues:
  - severity: medium
    issue: '''del que se está purificando'' para הַמִּטַּהֵר'
    rationale: El participio hitpael aquí describe a la persona que está en proceso de ser declarada/ritualmente limpiada dentro del rito. En español, la forma reflexiva 'se está purificando' puede sugerir acción autocausada; 'está siendo purificado' preserva mejor la fuerza procesual sin ambigüedad.
  - severity: low
    issue: Cláusula final 'sobre el lugar de la sangre de la ofrenda por la culpa'
    rationale: Es comprensible y cercana al hebreo, pero en español suena más natural 'en el lugar de la sangre...' o 'en el sitio donde se había aplicado...'. Dado que la nota ya preserva la alternativa explícita, conviene suavizar la preposición principal sin perder el vínculo locativo.
  revised_spanish_text: Y el sacerdote pondrá un poco del aceite que está sobre su palma sobre el lóbulo de la oreja derecha del que está siendo purificado[a], y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho, en el lugar de la sangre de la ofrenda por la culpa.
  revised_footnotes:
  - marker: a
    text: O, «sobre el sitio donde se había aplicado la sangre de la ofrenda por la culpa».
    reason: alternative_reading
  revision_rationale: La revisión corrige un matiz aspectual importante en הַמִּטַּהֵר al pasar de una formulación reflexiva a una pasiva procesual más fiel, y mejora la naturalidad de la cláusula final en español sin apartarse del sentido locativo del hebreo ni de la nota alternativa documentada.
