translation:
  language: es
  text: Moisés tomó la mitad de la sangre y la puso en cuencos[a], y la mitad de la sangre la arrojó contra el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tazones». El hebreo אַגָּנֹת designa recipientes para contener líquido; «cuencos» se eligió como término claro y natural en este contexto ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - levantó
  lexicon: HALOT
  rationale: לקח en secuencia narrativa wayyiqtol se expresa de manera natural con «tomó». Conserva el acto simple y directo de Moisés sin añadir matiz innecesario.
- source_word: חֲצִי הַדָּם
  english_pob_choice: half of the blood
  chosen_spanish: la mitad de la sangre
  alternatives_spanish:
  - media sangre
  - la mitad de sangre
  lexicon: HALOT
  rationale: La construcción partitiva se vierte de forma clara y natural como «la mitad de la sangre», manteniendo el sentido exacto del hebreo.
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: la puso
  alternatives_spanish:
  - la colocó
  - la depositó
  lexicon: HALOT
  rationale: שׂים es un verbo amplio de colocación; «la puso» es el equivalente más natural en español y mantiene la sencillez narrativa.
- source_word: בָּאַגָּנֹת
  english_pob_choice: in basins
  chosen_spanish: en vasijas
  alternatives_spanish:
  - en cuencos
  - en tazones
  lexicon: HALOT
  rationale: אַגָּנֹת designa recipientes para contener líquido. «Vasijas» es amplio y digno en español; se evita restringirlo demasiado a una forma específica que el hebreo no exige.
- source_word: זָרַק
  english_pob_choice: threw against
  chosen_spanish: arrojó
  alternatives_spanish:
  - salpicó
  - esparció
  - lanzó
  lexicon: HALOT
  rationale: En contexto sacrificial, זָרַק puede implicar lanzar o arrojar sangre con fuerza. «Arrojó» preserva esa energía mejor que «roció» o «esparció».
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: contra el altar
  alternatives_spanish:
  - sobre el altar
  - en el altar
  lexicon: HALOT
  rationale: Con זָרַק, «contra el altar» transmite la acción física de la sangre lanzada hacia la superficie del altar, siguiendo la decisión auditada del POB inglés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico.
theological_decisions:
- issue: Intensidad del gesto ritual con la sangre
  english_pob_reading: Rendered זָרַק with forceful sacrificial language ('threw against the altar') rather than softer 'sprinkled.'
  chosen_spanish_reading: 'Se mantiene un verbo fuerte: «arrojó contra el altar».'
  alternative_spanish_readings:
  - roció sobre el altar
  - salpicó sobre el altar
  rationale: La fuente hebrea describe una acción ritual concreta y enérgica; el español debe reflejar esa fuerza sin suavizarla mediante un término más débil o más tradicional por costumbre.
  doctrine_reference: Principio de primacía del texto original y preservación del sentido ritual inmediato.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio auditado del POB en inglés. Se conserva la decisión principal sobre זָרַק con un verbo fuerte en español y se evita suavizarla hacia «rociar» o «espolvorear». No se detectan revisiones textuales pendientes en el paquete de entrada.
  spanish_consistency_notes:
  - Se usa «Moisés» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se mantiene «sangre» con artículo definido por la construcción partitiva del hebreo.
  - «Vasijas» funciona aquí como término general; el pie de nota preserva las alternativas posibles sin sobreespecificar el objeto.
  - «Contra el altar» conserva la orientación física de la acción y corresponde al valor auditado de la traducción inglesa.
