translation:
  language: es
  text: Yo conozco su ira[a] —declara Yahvé—. No es así; sus jactancias no han logrado nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus mentiras son falsas; no han hecho así»; o «sus palabras vacías no han logrado nada». El hebreo de la cláusula final es difícil y condensado.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Yo conozco
  alternatives_spanish:
  - Yo sé
  - He conocido
  lexicon: HALOT
  rationale: El perfecto hebreo en primera persona funciona aquí como conocimiento presente y declarado con certeza profética. «Conozco» conserva ese valor actual mejor que una forma exclusivamente pasada.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de modo solemne y natural en español con «declara». Se mantiene «Yahvé» según la pauta del proyecto para el nombre divino.
- source_word: עֶבְרָת֖וֹ
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su enojo
  lexicon: HALOT
  rationale: עֶבְרָה denota ira desbordada o ira judicial. «Ira» es el equivalente más claro y digno en español; «furor» sería posible, pero menos neutral.
- source_word: וְלֹא כֵן
  english_pob_choice: and it is not so
  chosen_spanish: y no es así
  alternatives_spanish:
  - pero no es así
  - y no es cierto
  lexicon: HALOT
  rationale: La frase breve niega la validez de lo dicho o supuesto. «Y no es así» preserva la concisión del hebreo y su fuerza de rechazo.
- source_word: בַּדָּיו
  english_pob_choice: his boasts
  chosen_spanish: sus jactancias
  alternatives_spanish:
  - sus mentiras
  - sus vanas palabras
  - sus fanfarronadas
  lexicon: HALOT
  rationale: בדים puede referirse a palabras vacías, falsedades o jactancia. Dado el contexto de Moab y el paralelo con la cláusula final, «jactancias» conserva el matiz de alarde vano sin cerrar otras posibilidades.
- source_word: לֹא כֵן עָשׂוּ
  english_pob_choice: have accomplished nothing
  chosen_spanish: no han logrado nada
  alternatives_spanish:
  - no han hecho así
  - no han conseguido nada
  - no se ha hecho así
  lexicon: HALOT
  rationale: El hebreo final es comprimido y difícil. En contexto, el sentido es que las afirmaciones vacías no produjeron realidad alguna. «No han logrado nada» expresa ese valor sin perder la tensión del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como «Yahvé», manteniendo la referencia directa al nombre divino y evitando la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: 'Cláusula final difícil: בַּדָּיו לֹא כֵן עָשׂוּ'
  english_pob_reading: his boasts have accomplished nothing
  chosen_spanish_reading: sus jactancias no han logrado nada
  alternative_spanish_readings:
  - sus mentiras no han hecho así
  - sus palabras vacías no han conseguido nada
  - no han hecho lo que decían
  rationale: Se conserva el sentido de vaciedad y fracaso de las afirmaciones de Moab, sin eliminar la ambigüedad textual que el hebreo presenta. La traducción elegida sigue la línea interpretativa de la POB inglesa, pero en un español natural.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tensions where the source is compressed or difficult'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió «wrath» como equivalente más estándar de עֶבְרָה; por eso se usa «ira» en vez de una opción más enfática como «furor». También se conserva la resolución interpretativa de la POB para la cláusula final difícil, con una nota que mantiene alternativas plausibles.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evita «Señor» como máscara del nombre divino.
  - «Ira» mantiene un registro formal y bíblico, alineado con la revisión inglesa que ajustó el valor de עֶבְרָה.
  - «Jactancias» conserva el tono de autoexaltación implícito en בַּדָּיו sin convertirlo en una explicación excesivamente interpretativa.
