translation:
  language: es
  text: Él me sacó[a] a un lugar espacioso; me rescató[b], porque se complació[c] en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un lugar abierto» o «a un lugar espacioso». La imagen hebrea contrasta la estrechez con la libertad y la seguridad.
    reason: lexical_alternative
  - marker: b
    text: O «me libró».
    reason: lexical_alternative
  - marker: c
    text: O «porque estaba complacido conmigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵנִי
  english_pob_choice: He brought me out
  chosen_spanish: Él me sacó
  alternatives_spanish:
  - Él me llevó fuera
  - Él me hizo salir
  lexicon: HALOT
  rationale: El verbo causativo de יצא expresa hacer salir o sacar. «Me sacó» es natural en español y conserva la imagen de liberación sin añadir matices no presentes en el hebreo.
- source_word: לַמֶּרְחָב
  english_pob_choice: into a broad place
  chosen_spanish: a un lugar espacioso
  alternatives_spanish:
  - a un lugar abierto
  - a un lugar ancho
  lexicon: HALOT
  rationale: מֶרְחָב denota amplitud, apertura o espacio. «Lugar espacioso» comunica bien la metáfora de salir de la estrechez a la libertad; evita el calco duro «lugar amplio» y mantiene la imagen.
- source_word: יְחַלְּצֵנִי
  english_pob_choice: he rescued me
  chosen_spanish: me rescató
  alternatives_spanish:
  - me libró
  - me redimió
  lexicon: HALOT
  rationale: חלץ en Piel puede significar sacar, librar o rescatar. «Rescató» reproduce la fuerza de liberación y es claro en español contemporáneo; «libró» es posible, pero menos concreto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la liberación. «Porque» conserva el valor causal de forma directa y fluida.
- source_word: חָפֵץ
  english_pob_choice: he delighted
  chosen_spanish: se complació
  alternatives_spanish:
  - se deleitó
  - tuvo placer
  lexicon: HALOT
  rationale: חפץ expresa deleite, complacencia o favor. «Se complació» mantiene la idea de favor personal sin resolverla en una formulación más doctrinal o afectiva de lo que el hebreo exige.
- source_word: בִּי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - conmigo
  lexicon: HALOT
  rationale: La preposición ב con חפץ normalmente expresa complacencia en alguien. «En mí» sigue de cerca el hebreo y mantiene la relación directa del favor divino.
theological_decisions:
- issue: Naturaleza del favor divino como motivo de la liberación
  english_pob_reading: because he delighted in me
  chosen_spanish_reading: porque se complació en mí
  alternative_spanish_readings:
  - porque se deleitó en mí
  - porque tuvo placer en mí
  rationale: El verso presenta la liberación como motivada por la complacencia/favor de Yahvé, sin explicar el mecanismo teológico. «Se complació en mí» conserva esa apertura y no introduce de manera explícita categorías como mérito o elección.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La fuente inglesa y el texto hebreo están en alto acuerdo; no se registran revisiones aplicadas y el pasaje permanece estable. La traducción española sigue el valor causal y la metáfora espacial sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo en el contexto del salmo; este versículo usa pronombre de tercera persona como en el hebreo.
  - «Rescató» se usa para חלץ por su fuerza de liberación; no se reemplaza por «libró» en el texto principal para conservar el tono concreto.
  - «Lugar espacioso» refleja la metáfora de amplitud sin perder la oposición a la angustia o confinamiento.
