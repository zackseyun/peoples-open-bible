base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/021/001.yaml
  text: Now there was a famine in the days of David for three years[a], year after year. And David sought the face of Yahweh, and Yahweh said, “It is because of Saul and his bloodguilty house[b], because he put the Gibeonites to death.”
  footnotes:
