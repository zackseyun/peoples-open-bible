base_translation:
  language: en
  yaml_path: translation/ot/isaiah/063/017.yaml
  text: Why[a], Yahweh, do you make us wander from your ways and harden our hearts from fearing you? Return for the sake of your servants[c][b], the tribes of your inheritance.
  footnotes:
  - marker: a
    text: Or 'do you lead us astray' or 'do you let us wander.' The Hebrew verb is causative ('make/cause to wander'), and the prayer voices the tension of God's sovereignty in Israel's straying.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'our heart' (singular), a collective expression for the people as one.
    reason: lexical_alternative
  - marker: c
    text: Or 'Turn back.' The plea asks God to turn again toward his people in covenant favor.
    reason: lexical_alternative
