translation:
  language: es
  text: Y yo, antes de haber probado nada, me levanté de un salto y lo llevé a un cuarto hasta que se puso el sol.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición semítica más larga refleja el sentido: «Y cuando se puso el sol, fui y lo enterré», haciendo explícito el entierro al ocaso en lugar de la sola colocación temporal del cuerpo en un cuarto.'
    reason: textual_variant
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Yo también
  - Y en cuanto a mí
  lexicon: contextual
  rationale: El griego enlaza la narración con la primera persona de manera directa; «Y yo» mantiene la continuidad narrativa sin añadir énfasis ajeno al contexto.
- source_word: πρὶν ἢ γεύσασθαί με
  english_pob_choice: before I had tasted anything
  chosen_spanish: antes de haber probado nada
  alternatives_spanish:
  - antes de comer
  - antes de haber gustado nada
  lexicon: BDAG
  rationale: γεύσασθαί me puede ser idiomático para comer, pero «haber probado nada» conserva mejor la imagen de «gustar/probar» y sigue siendo natural en español. «Nada» refleja el indefinido implícito del griego en el contexto de una comida.
- source_word: ἀναπηδήσας
  english_pob_choice: sprang up
  chosen_spanish: me levanté de un salto
  alternatives_spanish:
  - salté de pie
  - me incorporé rápidamente
  lexicon: LSJ
  rationale: El participio indica movimiento súbito y enérgico. «Me levanté de un salto» transmite la rapidez y viveza del gesto sin sonar artificial en español.
- source_word: ἀνειλόμην
  english_pob_choice: took him
  chosen_spanish: lo llevé
  alternatives_spanish:
  - lo tomé
  - lo transporté
  - lo llevé conmigo
  lexicon: LSJ
  rationale: En este contexto el verbo describe tomar/coger al difunto para trasladarlo. «Lo llevé» expresa con naturalidad el traslado sin forzar un detalle de método que el griego no especifica.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Aunque el referente es un cadáver, el griego lo presenta con pronombre masculino personal. En español, «lo» mantiene la referencia al cuerpo del hombre sin volver la frase pesada.
- source_word: εἰς τι οἴκημα
  english_pob_choice: into a room
  chosen_spanish: a un cuarto
  alternatives_spanish:
  - a una habitación
  - a un aposento
  - a una estancia
  lexicon: LSJ
  rationale: οἴκημα puede significar cuarto, cámara o vivienda. En este pasaje, una estancia interior temporal es lo más probable; «cuarto» es claro y no exagera el sentido hacia una casa completa.
- source_word: ἕως οὗ ἔδυ ὁ ἥλιος
  english_pob_choice: until the sun set
  chosen_spanish: hasta que se puso el sol
  alternatives_spanish:
  - hasta el ocaso
  - hasta que el sol se puso
  - hasta la puesta del sol
  lexicon: BDAG
  rationale: La cláusula temporal es directa. «Hasta que se puso el sol» es idiomático en español y conserva el sujeto explícito del griego.
theological_decisions:
- issue: Relación entre la tradición griega breve y la tradición semítica más larga en Tobit 2:4
  english_pob_reading: Translate the Greek wording 'sprang up and took him into a room until the sun set,' while noting the longer tradition that makes the burial explicit at sunset.
  chosen_spanish_reading: 'Traducir el movimiento y la colocación temporal según el griego: «me levanté de un salto y lo llevé a un cuarto hasta que se puso el sol», dejando constancia de la variante tradicional más larga.'
  alternative_spanish_readings:
  - Y cuando se puso el sol, fui y lo enterré.
  - Y al ponerse el sol, fui y lo sepulté.
  rationale: El testimonio griego base describe primero el traslado del cuerpo a un cuarto y luego el límite temporal del ocaso. La tradición semítica/larga hace explícito el entierro al ponerse el sol. Para respetar la primacía del texto griego y no ocultar la tensión textual, la traducción principal sigue el griego y la nota preserva la lectura alternativa significativa.
  doctrine_reference: 'PHILOSOPHY.md: primacía del texto fuente seleccionado y transparencia ante variantes textuales'
- issue: Referencia personal al difunto mediante pronombre masculino
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - a él
  - él
  rationale: El griego usa αὐτόν, masculino personal, aunque el referente sea un cadáver. Mantener el pronombre de objeto directo evita despersonalizar al difunto y conserva la forma narrativa del original.
  doctrine_reference: BDAG sobre pronombres personales y referencia anafórica
- issue: Modo de expresar el tiempo de la acción
  english_pob_reading: before I had tasted anything
  chosen_spanish_reading: antes de haber probado nada
  alternative_spanish_readings:
  - antes de comer
  - antes de haber comido algo
  rationale: La formulación española mantiene la secuencia temporal exacta y la leve literalidad de «probar/tastar» del griego, sin perder naturalidad. No se diluye a un simple «comer» porque el matiz del original queda más visible así.
  doctrine_reference: 'PHILOSOPHY.md: preservar la imagen verbal cuando el español la admite con naturalidad'
translation_notes:
  revision_awareness: La redacción inglesa de referencia pasó de «removed him» a «took him» para ἀνειλόμην. La versión española sigue esa revisión con un verbo de traslado directo («lo llevé»), evitando una paráfrasis más abstracta y manteniendo el tono sobrio y preciso del registro fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estable en el proyecto solo cuando corresponda; aquí no aparece el tetragrámaton.
  - «Cuarto» fue preferido sobre «cámara» o «aposento» por claridad contemporánea sin perder el sentido de espacio interior temporal.
  - No se suavizó el movimiento intenso de ἀναπηδήσας; «me levanté de un salto» conserva su energía narrativa.
  - La nota textual distingue con claridad entre el texto griego base y la tradición semítica/larga, sin fusionarlos en el cuerpo principal.
