translation:
  language: es
  text: Ella se convertirá en un lugar para extender redes[a], en medio del mar, porque yo he hablado, declara Señor Yahvé, y llegará a ser botín para las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un lugar para tender redes de pesca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁטַח
  english_pob_choice: a place for spreading
  chosen_spanish: un lugar para extender
  alternatives_spanish:
  - un lugar para tender
  - una superficie extendida
  lexicon: HALOT
  rationale: El sustantivo designa un sitio o superficie extendida; en este contexto náutico, la expresión natural en español es "un lugar para extender" redes, sin perder la imagen de una superficie usada para secarlas o desplegarlas.
- source_word: חֲרָמִים
  english_pob_choice: nets
  chosen_spanish: redes
  alternatives_spanish:
  - redes de pesca
  - redes
  lexicon: HALOT
  rationale: El plural se refiere a redes de pesca. En español, "redes" comunica con claridad la imagen, y el contexto marítimo ya determina el tipo de redes.
- source_word: בְּתוֹךְ הַיָּם
  english_pob_choice: in the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - en el corazón del mar
  lexicon: HALOT
  rationale: '"En medio del mar" transmite bien la localización y mantiene un tono digno y profético en español. Se prefirió "mar" a "océano" por fidelidad al término hebreo.'
- source_word: תִּהְיֶה ... וְהָיְתָה
  english_pob_choice: She will become ... and she will become
  chosen_spanish: Ella se convertirá ... y será
  alternatives_spanish:
  - Ella se volverá ... y será
  - Será ... y será
  lexicon: HALOT
  rationale: Los verbos femeninos se refieren a Tiro, ciudad personificada. En español, "ella" conserva esa personificación y evita una impersonalización que debilitaría el efecto literario.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - proclama
  lexicon: HALOT
  rationale: La fórmula profética requiere un verbo de anuncio solemne. "Declara" es la opción más natural y fiel para el valor formular del término.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la norma del proyecto: יְהוָה → Yahvé. La combinación con אֲדֹנָי se resuelve en español como "el Señor Yahvé" para respetar ambos elementos sin repetir "Señor" de forma torpe.'
- source_word: לְבַז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - saqueo
  lexicon: HALOT
  rationale: לְבַז indica la condición de ser entregada como despojo. "Botín" es un equivalente claro y natural en español bíblico contemporáneo.
- source_word: לַגּוֹיִם
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - para los pueblos
  - para las naciones
  lexicon: HALOT
  rationale: En este contexto de juicio, גּוֹיִם se refiere a las naciones en sentido amplio. "Naciones" conserva esa referencia sin introducir un matiz teológico posterior innecesario.
theological_decisions:
- issue: Representación del nombre divino יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La edición española sigue el principio del proyecto de traducir el nombre divino como "Yahvé" en lugar de ocultarlo con una convención tipográfica. En la fórmula compuesta, "el Señor Yahvé" preserva tanto אֲדֹנָי como el Tetragrámaton sin caer en una repetición extraña en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación femenina de Tiro en los verbos עתיד y perfecto
  english_pob_reading: She will become ... and she will become
  chosen_spanish_reading: Ella se convertirá ... y será
  alternative_spanish_readings:
  - It will become ... and will become
  - Se convertirá ... y será
  rationale: El hebreo usa formas femeninas singulares para la ciudad de Tiro. Mantener "ella" en español conserva esa personificación literaria y evita perder una señal gramatical significativa del original.
  doctrine_reference: Poética profética y personificación en el discurso oracular
translation_notes:
  revision_awareness: 'El draft coincide con el sentido del texto hebreo y con el audio de revisión inglesa; se mantuvo la equivalencia óptima de la POB inglesa, pero ajustada al estándar español del proyecto: Yahvé en lugar de una convención de ocultamiento del nombre divino, y una formulación natural para la imagen de las redes en el mar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «naciones» para גּוֹיִם, no «gentiles», por el contexto de juicio nacional.
  - Se conservó la personificación femenina con «ella» para Tiro.
  - La nota a pie de página se ancla en «redes» para reflejar la alternativa léxica preservada en la fuente inglesa.
