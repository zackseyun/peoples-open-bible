translation:
  language: es
  text: Pero cuando se acercó a Asdod[a], le mostraron el templo de Dagón incendiado, y Asdod y sus aldeas circundantes derribadas, y los cuerpos esparcidos, y los que habían sido quemados en la guerra; porque habían hecho montones[b] de ellos a lo largo de su ruta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'Azoto', la forma griega del nombre de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: El griego usa un término raro aquí; puede referirse a 'montones' o 'piras funerarias'. El contexto inmediato favorece la idea de montones de cuerpos o restos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - llegó cerca
  - se aproximó
  lexicon: LSJ
  rationale: El verbo griego expresa acercamiento físico; 'se acercó' es natural en español y conserva el movimiento sin sobrecarga arcaizante.
- source_word: Ἄζωτον
  english_pob_choice: Ashdod
  chosen_spanish: Asdod
  alternatives_spanish:
  - Azoto
  lexicon: LSJ
  rationale: Se conserva el topónimo bíblico más reconocible en español. 'Asdod' evita depender de la forma griega latinizada cuando la ciudad es conocida por su nombre hebreo/español.
- source_word: ἱερὸν Δαγὼν
  english_pob_choice: the temple of Dagon
  chosen_spanish: el templo de Dagón
  alternatives_spanish:
  - el santuario de Dagón
  lexicon: LSJ
  rationale: ἱερόν designa aquí un recinto/templo cultual pagano; 'templo' comunica con claridad el sitio de culto destruido.
- source_word: ἐνεπυρισμένον
  english_pob_choice: burned down
  chosen_spanish: incendiado
  alternatives_spanish:
  - quemado
  - arrasado por el fuego
  lexicon: LSJ
  rationale: El participio perfecto presenta el estado resultante del fuego. 'Incendiado' suena natural en español y mantiene la idea de destrucción por fuego.
- source_word: τὰ περιπόλια αὐτῆς
  english_pob_choice: its surrounding villages
  chosen_spanish: sus aldeas circundantes
  alternatives_spanish:
  - sus suburbios
  - sus distritos periféricos
  - sus aldeas alrededor
  lexicon: LSJ
  rationale: περιπόλια se refiere a asentamientos o distritos alrededor de la ciudad. 'Aldeas circundantes' preserva el sentido concreto sin modernizar indebidamente.
- source_word: καθῃρημένα
  english_pob_choice: torn down
  chosen_spanish: derribadas
  alternatives_spanish:
  - demolidas
  - arrasadas
  lexicon: LSJ
  rationale: El participio indica algo abatido o destruido. 'Derribadas' reproduce bien la imagen de estructuras echadas abajo.
- source_word: τὰ σώματα ἐρριμμένα
  english_pob_choice: the bodies thrown about
  chosen_spanish: los cuerpos esparcidos
  alternatives_spanish:
  - los cuerpos arrojados
  - los cadáveres diseminados
  lexicon: LSJ
  rationale: En contexto bélico, σώματα se entiende como cuerpos sin vida. 'Esparcidos' conserva la dispersión violenta sin sonar redundante en español.
- source_word: τοὺς ἐμπεπυρισμένους
  english_pob_choice: those burned
  chosen_spanish: a los que habían sido quemados
  alternatives_spanish:
  - a los quemados
  - a los que fueron quemados
  lexicon: LSJ
  rationale: 'El participio perfecto pasivo destaca el estado resultante: personas que ya estaban quemadas. La perífrasis española lo hace explícito y evita ambigüedad.'
- source_word: ἐν τῷ πολέμῳ
  english_pob_choice: in the war
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en la batalla
  - durante la guerra
  lexicon: LSJ
  rationale: πόλεμος abarca el conflicto bélico en general; 'en la guerra' mantiene ese alcance amplio.
- source_word: βωμίας
  english_pob_choice: heaps
  chosen_spanish: montones
  alternatives_spanish:
  - pilas
  - mounds
  - hileras
  lexicon: LSJ
  rationale: La palabra es rara y su matiz es incierto. 'Montones' conserva la acumulación sin fijar indebidamente un sentido más específico como 'piras funerarias'.
- source_word: ἐν τῇ ὁδῷ αὐτοῦ
  english_pob_choice: along his route
  chosen_spanish: a lo largo de su ruta
  alternatives_spanish:
  - en su camino
  - sobre el camino por donde iba
  lexicon: LSJ
  rationale: La frase indica disposición a lo largo del trayecto. 'A lo largo de su ruta' sigue de cerca el sentido y suena comprensible en español contemporáneo.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail en inglés y la evaluación de revisión más reciente, que indicó estabilidad del contenido (unchanged) y sin cambios requeridos. Se mantuvo la tensión léxica de τὰ περιπόλια αὐτῆς y βωμίας sin sobreespecificar más allá del contexto.
  spanish_consistency_notes:
  - Se prefiere 'Dagón' para el nombre del dios filisteo, consistente con uso bíblico en español.
  - Se conserva la distinción entre el templo incendiado, las aldeas derribadas y los cuerpos esparcidos, reflejando la acumulación retórica del griego.
  - No se tradujo δοῦλος ni otros términos de estatus aquí; no aplica a este versículo.
  - Se evitó 'SEÑOR' porque no aparece el nombre divino en este texto.
