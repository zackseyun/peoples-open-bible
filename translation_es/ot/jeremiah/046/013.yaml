translation:
  language: es
  text: La palabra que Yahvé dirigió al profeta Jeremías acerca de la venida de Nabucodonosor, rey de Babilonia, para golpear la tierra de Egipto:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nabucodrezar»; la forma tradicional en español es «Nabucodonosor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - El asunto
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר puede ser “palabra”, “asunto” o “mensaje”; “la palabra” conserva la fórmula bíblica sin volverla rígidamente literal ni diluir su alcance profético.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: Con Yahvé como sujeto y una introducción profética, “habló” transmite bien el acto revelador y mantiene un registro elevado y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: “Yahvé” preserva el nombre propio divino y evita la sustitución titular de “SEÑOR”.'
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Es un título apposicional aplicado a Jeremías; “el profeta” reproduce de manera directa la función identificadora del hebreo.
- source_word: לָבוֹא
  english_pob_choice: about the coming of
  chosen_spanish: acerca de la venida de
  alternatives_spanish:
  - sobre la llegada de
  - cuando vendría
  lexicon: HALOT
  rationale: El infinitivo constructo con ל introduce el tema del mensaje. “Acerca de la venida de” conserva el valor prospectivo y evita convertirlo en una oración finita que desplace el foco.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodreuzar
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional ampliamente reconocible para legibilidad; el hebreo de esta forma se refleja en una nota textual para no ocultar la variante ortográfica.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: La construcción en cadena se traduce de forma directa y natural, manteniendo tanto el cargo como el reino de procedencia.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike
  chosen_spanish: para golpear
  alternatives_spanish:
  - para herir
  - para atacar
  - para derrotar
  lexicon: HALOT
  rationale: נכה abarca golpear, herir y atacar. “Golpear” conserva la fuerza verbal básica sin decidir anticipadamente entre matiz militar o judicial; se evita “herir” porque estrecha demasiado el sentido.
- source_word: אֶרֶץ מִצְרָיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - la tierra de Mizraim
  - Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente אֶרֶץ; “la tierra de Egipto” preserva ese foco territorial, en paralelo con la opción inglesa de no reducirlo simplemente a “Egipto”.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea doctrinal del proyecto pide conservar el nombre propio del pacto. “Yahvé” es la forma española coherente con ese criterio y mantiene visible el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de לָבוֹא en la fórmula profética
  english_pob_reading: about the coming of
  chosen_spanish_reading: acerca de la venida de
  alternative_spanish_readings:
  - sobre la llegada de
  - cuando vendría
  rationale: No se toma como tiempo narrativo pasado ni como simple “cuando”; el hebreo presenta el contenido del oráculo, y la traducción debe conservar esa estructura de anuncio.
  doctrine_reference: Hebrew syntax and prophetic superscription usage
translation_notes:
  revision_awareness: Se ha revisado el paralelismo con la formulación inglesa POB y el hebreo; no se detectan revisiones textuales que alteren el sentido, por lo que se mantiene una correspondencia estable con el original y con el registro auditado.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma estándar para יְהוָה, conforme al criterio del proyecto.
  - Se conserva “la tierra de Egipto” para reflejar explícitamente אֶרֶץ.
  - El nombre propio se adapta a una forma castellana legible, con nota que preserva la grafía hebrea subyacente.
  - El tono general es formal y bíblico, pero en español natural y publicable.
