translation:
  language: es
  text: Me acerqué a uno de los que estaban allí y le pregunté por la certeza[a] acerca de todo esto. Entonces me dijo y me dio a conocer la interpretación del asunto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En arameo, el término puede significar «lo cierto», «la verdad» o «la certeza».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la interpretación de las palabras»; aquí «palabras» probablemente se refiere al contenido o asunto de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבֵת
  english_pob_choice: I approached
  chosen_spanish: Me acerqué
  alternatives_spanish:
  - Me aproximé
  - Me llegué
  lexicon: HALOT
  rationale: El verbo arameo expresa acercamiento físico o narrativo hacia alguien. «Me acerqué» es natural en español y conserva el movimiento hacia la figura consultada.
- source_word: עַל חַד מִן קָאֲמַיָּא
  english_pob_choice: one of those standing there
  chosen_spanish: a uno de los que estaban allí
  alternatives_spanish:
  - a uno de los que estaban de pie
  - a uno de los que estaban presentes
  lexicon: HALOT
  rationale: La expresión describe a uno entre los que estaban de pie/presentes. «Estaban allí» mantiene la referencia amplia sin sobreinterpretar la escena.
- source_word: וְיַצִּיבָא
  english_pob_choice: the certainty
  chosen_spanish: la certeza
  alternatives_spanish:
  - la verdad
  - lo cierto
  lexicon: HALOT
  rationale: El término arameo puede significar lo firme, cierto o verdadero. Dado el ajuste de la revisión inglesa, «la certeza» refleja mejor el objeto directo implícito y preserva la tensión semántica entre certeza y verdad.
- source_word: אֶבְעֵא מִנֵּהּ
  english_pob_choice: I asked him
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le inquirí
  - le pedí
  lexicon: HALOT
  rationale: בעא con מן puede expresar pedir o preguntar a alguien. «Le pregunté» es idiomático en español y comunica la acción de inquirir sin añadir una formulación demasiado explícita.
- source_word: עַל כָּל דְּנָה
  english_pob_choice: about all this
  chosen_spanish: acerca de todo esto
  alternatives_spanish:
  - sobre todo esto
  - con respecto a todo esto
  lexicon: HALOT
  rationale: La frase se refiere al conjunto de la visión o su contenido. «Acerca de todo esto» es claro, amplio y fiel al demonstrativo global.
- source_word: וַאֲמַר לִי
  english_pob_choice: So he told me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Luego me dijo
  lexicon: HALOT
  rationale: La waw narrativa introduce la respuesta. «Entonces me dijo» conserva la secuencia narrativa sin forzar un matiz explicativo inexistente en el arameo.
- source_word: וּפְשַׁר מִלַּיָּא
  english_pob_choice: the interpretation of the matter
  chosen_spanish: la interpretación del asunto
  alternatives_spanish:
  - la interpretación de las palabras
  - la explicación del asunto
  lexicon: HALOT
  rationale: פְשַׁר es «interpretación» o «explicación», y מִלַּיָּא puede aludir al contenido, no solo a palabras aisladas. «Asunto» comunica bien el referente global en español.
- source_word: יְהוֹדְעִנַּנִי
  english_pob_choice: made known to me
  chosen_spanish: me dio a conocer
  alternatives_spanish:
  - me hizo saber
  - me hizo conocer
  lexicon: HALOT
  rationale: El causativo de ידע expresa hacer saber o dar a conocer. «Me dio a conocer» mantiene el valor causativo con un registro bíblico-natural en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «for certainty» por «the certainty» para reflejar el objeto directo del arameo. La versión española adopta «la certeza» para conservar ese ajuste y evita una paráfrasis que convierta indebidamente la frase en una fórmula de petición. También mantiene la interpretación de מִלַּיָּא como el asunto/contenido de la visión, no solo «palabras» aisladas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» sin intervenir porque este versículo no contiene esos términos.
  - Se usa «la certeza» para respetar la tensión lexical del arameo entre certeza y verdad.
  - Se evita «siervo» o vocabulario eclesiástico no presente en el texto.
  - «Me dio a conocer» conserva el causativo de ידע sin exceso de literalismo.
