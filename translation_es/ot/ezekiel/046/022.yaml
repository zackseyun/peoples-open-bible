translation:
  language: es
  text: En las cuatro esquinas del atrio había patios cerrados[a], de cuarenta de largo y treinta de ancho[b][c]; los cuatro patios tenían la misma medida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "patios amurallados" o "patios cerrados". El adjetivo hebreo probablemente describe estos espacios como recintos encerrados.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo no repite explícitamente la unidad "codos" aquí, aunque se sobreentiende por las medidas del contexto del templo.
    reason: cultural_note
  - marker: c
    text: El término final hebreo es raro y difícil. También puede entenderse como un refuerzo de que se trataba de los cuatro patios de esquina.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֹעוֹת
  english_pob_choice: corners
  chosen_spanish: esquinas
  alternatives_spanish:
  - ángulos
  - rincones
  - sectores de esquina
  lexicon: HALOT
  rationale: En contexto arquitectónico, el término señala las esquinas o secciones de esquina del atrio. "Esquinas" es natural en español y conserva bien la referencia espacial.
- source_word: חֲצֵרוֹת
  english_pob_choice: courts
  chosen_spanish: recintos
  alternatives_spanish:
  - atrios
  - patios
  - cortes
  lexicon: HALOT
  rationale: El plural describe espacios menores dentro del conjunto del templo. "Recintos" comunica la idea de espacios delimitados sin forzar una identificación técnica impropia en español.
- source_word: קְטֻרוֹת
  english_pob_choice: enclosed
  chosen_spanish: cerrados
  alternatives_spanish:
  - encerrados
  - amurallados
  - cerrados al paso
  lexicon: HALOT
  rationale: El adjetivo apunta a espacios encerrados o delimitados. "Cerrados" mantiene la idea general de clausura/encierro sin especificar el material de cerramiento.
- source_word: אַרְבָּעִים אֹרֶךְ וּשְׁלֹשִׁים רֹחַב
  english_pob_choice: forty long and thirty wide
  chosen_spanish: de cuarenta de largo y treinta de ancho
  alternatives_spanish:
  - de cuarenta codos de largo y treinta codos de ancho
  - con cuarenta de largo y treinta de ancho
  lexicon: HALOT
  rationale: El hebreo expresa las dimensiones de manera elíptica. En español, la formulación natural es completar con "de largo" y "de ancho". No se añade "codos" en el texto principal porque el hebreo de este versículo no lo repite explícitamente, aunque el contexto del templo lo implique.
- source_word: מִדָּה אַחַת
  english_pob_choice: the same measurement
  chosen_spanish: la misma medida
  alternatives_spanish:
  - una sola medida
  - una misma medida
  lexicon: HALOT
  rationale: La frase expresa uniformidad entre los cuatro recintos. "La misma medida" comunica de forma clara e idiomática que todos tenían dimensiones idénticas.
- source_word: לְאַרְבַּעְתָּם
  english_pob_choice: the four of them
  chosen_spanish: los cuatro
  alternatives_spanish:
  - para los cuatro
  - los cuatro juntos
  lexicon: HALOT
  rationale: El sufijo pronominal remite a los cuatro recintos de esquina. En español, la expresión resumptiva más natural es "los cuatro".
- source_word: מְהֻקְצָעוֹת
  english_pob_choice: had / reinforced corner correspondence
  chosen_spanish: correspondían a las esquinas
  alternatives_spanish:
  - estaban dispuestos en las esquinas
  - eran de esquina
  - quedaban en las esquinas
  lexicon: HALOT
  rationale: Este término raro es difícil y parece reforzar la correspondencia de los recintos con las cuatro esquinas. La redacción principal evita sobrerrepresentar la morfología rara y conserva el sentido arquitectónico.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; se preservó la dificultad del último término hebreo sin resolverla de manera excesiva, y se mantuvo la omisión explícita de "codos" en el texto principal.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió "recintos" frente a "patios" para evitar una asociación demasiado doméstica en el contexto del templo.
  - Se mantuvo una formulación elíptica de las medidas para respetar la ausencia explícita de la unidad en el hebreo.
  - La puntuación y el orden sintáctico buscan lectura pública clara sin alejarse del valor léxico del original.
