translation:
  language: es
  text: Vengamos ante su rostro[a] con acción de gracias; démosle gritos de júbilo con cánticos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su presencia». El hebreo dice literalmente «su rostro», un giro común para referirse a la presencia personal de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְקַדְּמָה
  english_pob_choice: Let us come before
  chosen_spanish: Acerquémonos
  alternatives_spanish:
  - Vayamos delante
  - Lleguemos delante
  - Presentémonos
  lexicon: HALOT
  rationale: El cohorte 1cp en hifil expresa una invitación exhortativa. En español, «acercarnos» comunica bien la idea de presentarse delante de alguien sin sonar forzado; además encaja naturalmente con el complemento siguiente.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su presencia
  - su faz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «su rostro/faz». Mantengo la imagen concreta con «rostro» y dejo implícita la fuerza idiomática de presencia, como hace el POB inglés con «his face» y su nota alternativa.
- source_word: בְּתוֹדָה
  english_pob_choice: with thanksgiving
  chosen_spanish: con agradecimiento
  alternatives_spanish:
  - con acción de gracias
  - con gratitud
  - con alabanza
  lexicon: HALOT
  rationale: תוֹדָה puede abarcar gratitud, acción de gracias o alabanza. Aquí el paralelismo con el canto favorece una respuesta devocional, por lo que «agradecimiento» es natural en español y conserva la tonalidad de gracias dadas a Dios.
- source_word: בִּזְמִרוֹת
  english_pob_choice: with songs
  chosen_spanish: con cánticos
  alternatives_spanish:
  - con canciones
  - con salmos
  - con melodías
  lexicon: HALOT
  rationale: זְמִרוֹת alude a cantos musicales, a menudo de alabanza. «Cánticos» conserva el registro bíblico y el matiz musical sin limitarlo demasiado como «salmos».
- source_word: נָרִיעַ
  english_pob_choice: let us shout joyfully
  chosen_spanish: aclamémoslo
  alternatives_spanish:
  - gritémosle con júbilo
  - clamemos con alegría
  - hagamos un grito de júbilo
  lexicon: HALOT
  rationale: El hifil cohortativo expresa un clamor jubiloso dirigido a alguien. «Aclamar» en español bíblico-literario comunica bien la exclamación celebrativa, y el objeto implícito se recupera claramente en el pronombre enclítico «lo».
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El ל con sufijo 3ms marca dirección hacia la persona a la que se dirige el clamor. En español, el pronombre enclítico en «aclamémoslo» mantiene la referencia directa y evita una repetición pesada.
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje hebreo consonante del WLC y el rastro auditado en inglés del POB, sin cambios de revisión relevantes; se conservó la imagen de «rostro» y el paralelismo exhortativo de los dos cola.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el hebreo explícitamente lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantuvo un registro culto y bíblico en «cánticos» y «aclamémoslo», evitando una literalidad áspera.
  - Se preservó la imagen corporal «rostro» con nota alternativa para la lectura idiomática de presencia.
