- from: Y hablaron contra el Dios de Jerusalén, como contra los dioses de los pueblos de la tierra, obra de manos humanas.[a][b]
  to: Y hablaron contra el Dios de Jerusalén, como contra los dioses de los pueblos de la tierra, la obra de manos humanas.[a][b]
  rationale: Se ajusta la frase final para que suene natural en español y refleje mejor el sentido definido del hebreo, y se corrige la nota a por un error gramatical evidente ('al', no 'a el'), manteniendo intactas las decisiones léxicas y teológicas del POB.
