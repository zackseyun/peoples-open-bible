  yaml_path: translation/ot/exodus/022/004.yaml
  text: If a man causes a field or vineyard to be grazed over[a], and lets his animal loose so that it grazes in another man's field[b], he shall make restitution from the best of his own field and the best of his own vineyard.
  footnotes:
  - marker: a
    text: Or, 'If a man burns a field or vineyard.' The Hebrew verb בער can refer to burning in some contexts, but here the immediate mention of releasing his animal strongly supports the sense of grazing/consuming by livestock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'another field'; 'man's' is supplied in English to make the legal sense explicit.
    reason: lexical_alternative
