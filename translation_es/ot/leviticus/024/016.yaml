review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: conserva ‘Yahvé’, entiende נֹקֵב como ofensa profanadora (‘blasfeme’), mantiene la fórmula penal y la distinción entre גֵּר y אֶזְרָח. Sin embargo, hay pequeños problemas de fidelidad formal y de legibilidad: la nota [b] está anclada en la primera cláusula aunque explica ‘el Nombre’ de la segunda; ‘ciertamente lo apedreará’ con sujeto singular colectivo suena menos natural que el plural explícito del hebreo; y ‘será muerto’ es comprensible pero menos idiomático que ‘será condenado a muerte’ o ‘será ejecutado’, aunque conviene mantener la pasiva judicial.'
  spanish_quality_summary: El español es claro y digno, pero necesita pulido menor. ‘Toda la congregación ciertamente lo apedreará’ suena forzado por el singular verbal; ‘lo apedreará’ debería ir en plural. También conviene reubicar la nota sobre ‘el Nombre’ en la segunda cláusula, donde realmente corresponde. El resto es legible y adecuado para un registro bíblico moderno.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> ‘Yahvé’; שֵׁם -> ‘nombre’ / ‘Nombre’ según función reverencial; גֵּר / אֶזְרָח bien contrastados. ‘Blasfeme’ sigue correctamente la decisión POB. No hay conflicto terminológico mayor.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en ‘será muerto’ de la primera cláusula, pero explica ‘el Nombre’ en la segunda.
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. Aquí la nota cultural trata del uso reverencial de ‘el Nombre’ en la segunda cláusula.
  - severity: medium
    issue: ‘Toda la congregación ciertamente lo apedreará’ usa singular donde el hebreo tiene verbo plural explícito.
    rationale: Aunque ‘congregación’ es colectivo singular, en español bíblico y natural suena mejor ‘toda la congregación lo apedreará’ o ‘todos los de la congregación lo apedrearán’. El borrador actual se percibe más rígido y menos natural.
  - severity: low
    issue: ‘Será muerto’ es una pasiva legal posible, pero poco idiomática en español contemporáneo.
    rationale: La frase preserva el valor pasivo, pero ‘será condenado a muerte’ o ‘será ejecutado’ sería más natural. Aun así, para no alejarse del formulario penal fuente, puede mantenerse si se mejora el resto.
  revised_spanish_text: Cualquiera que blasfeme el nombre de Yahvé[a] ciertamente será muerto; toda la congregación ciertamente lo apedreará. Tanto el forastero como el natural del país, cuando blasfeme el Nombre[b], será muerto.
  revised_footnotes:
