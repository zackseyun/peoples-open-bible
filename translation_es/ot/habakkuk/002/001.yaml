  text: עַל מִשְׁמַרְתִּ֣/י אֶעֱמֹ֔דָה וְ/אֶֽתְיַצְּבָ֖ה עַל מָצ֑וֹר וַ/אֲצַפֶּ֗ה לִ/רְאוֹת֙ מַה יְדַבֶּר בִּ֔/י וּ/מָ֥ה אָשִׁ֖יב עַל תּוֹכַחְתִּֽ/י־־־־־׃
