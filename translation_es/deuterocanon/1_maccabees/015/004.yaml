translation:
  language: es
  text: Pero yo quiero salir por el territorio[a], para perseguir a los que han devastado nuestra tierra y han asolado muchas ciudades en el reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega κατὰ τὴν χώραν puede referirse al desplazamiento por todo el territorio; también podría entenderse «por la tierra» o «a través del territorio».
    reason: lexical_alternative
  - marker: b
    text: El verbo μετέλθω también puede llevar el sentido de «proceder contra» o «castigar» a los culpables; aquí se traduce «perseguir» para conservar el sentido principal sin excluir ese matiz hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: βούλομαι
  english_pob_choice: I want
  chosen_spanish: yo quiero
  alternatives_spanish:
  - yo deseo
  - yo tengo intención de
  lexicon: LSJ
  rationale: Expresa voluntad/intención directa del hablante. «Yo quiero» es natural en español moderno y conserva el tono personal e inmediato del original.
- source_word: ἐκβῆναι
  english_pob_choice: to go out
  chosen_spanish: salir
  alternatives_spanish:
  - ponerse en marcha
  - salir a campaña
  lexicon: LSJ
  rationale: El infinitivo literalmente significa «salir» o «ir fuera». En este contexto militar-político, «salir» es claro y suficientemente cercano sin añadir una especificación no explícita.
- source_word: κατὰ τὴν χώραν
  english_pob_choice: into the country
  chosen_spanish: a recorrer la tierra
  alternatives_spanish:
  - por la tierra
  - a través de la tierra
  - por el territorio
  lexicon: LSJ
  rationale: La preposición con movimiento puede indicar desplazamiento por el territorio. «A recorrer la tierra» comunica el movimiento por la región con fluidez natural en español y deja abierta la amplitud del recorrido, como el audit trail inglés reconoce.
- source_word: ὅπως μετέλθω
  english_pob_choice: so that I may pursue
  chosen_spanish: para ir contra
  alternatives_spanish:
  - para perseguir
  - para proceder contra
  - para castigar
  lexicon: LSJ
  rationale: μετέρχομαι puede significar perseguir o proceder contra, con matiz hostil. «Ir contra» preserva la intención agresiva sin forzar de manera exclusiva una imagen de persecución física o de castigo judicial.
- source_word: τοὺς κατεφθαρκότας
  english_pob_choice: those who have devastated
  chosen_spanish: los que han devastado
  alternatives_spanish:
  - los que han arruinado
  - los que han destruido
  - los que han corrompido
  lexicon: LSJ
  rationale: El perfecto participial de καταφθείρω expresa a quienes han causado ruina. «Devastado» sigue de cerca la fuerza adoptada en el inglés revisado y conserva la gravedad del daño.
- source_word: τὴν χώραν ἡμῶν
  english_pob_choice: our country
  chosen_spanish: nuestra tierra
  alternatives_spanish:
  - nuestro país
  - nuestro territorio
  - nuestra región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, territorio o país. «Nuestra tierra» mantiene el paralelismo con el término repetido en la frase y suena natural en español bíblico sin volverlo demasiado moderno-político.
- source_word: τοὺς ἠρημωκότας
  english_pob_choice: those who have laid waste
  chosen_spanish: han asolado
  alternatives_spanish:
  - han desolado
  - han dejado desoladas
  - han arrasado
  lexicon: LSJ
  rationale: ἐρημόω significa hacer desolado o dejar en ruinas. «Asolar» conserva bien la fuerza devastadora del verbo y suena idiomático en español bíblico.
- source_word: πόλεις πολλὰς
  english_pob_choice: many cities
  chosen_spanish: muchas ciudades
  alternatives_spanish:
  - muchas poblaciones
  - muchas villas
  lexicon: LSJ
  rationale: Equivalencia directa y natural de πόλεις πολλὰς. «Ciudades» es la correspondencia normal para πόλεις.
- source_word: ἐν τῇ βασιλείᾳ
  english_pob_choice: in the kingdom
  chosen_spanish: en el reino
  alternatives_spanish:
  - dentro del reino
  - en mi reino
  lexicon: LSJ
  rationale: El griego dice simplemente «en el reino», sin posesivo explícito. Se conserva esa forma más cercana al texto, sin añadir «mi» aunque sea inferible por el contexto real.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del inglés POB: se optó por una expresión que refleje el movimiento territorial de κατὰ τὴν χώραν sin limitarlo a una sola preposición, y por un verbo de mayor fuerza para κατεφθαρκότας («devastado»). También se conservó el paralelo con «many cities» mediante «muchas ciudades», y se evitó añadir posesivos no explícitos en ἐν τῇ βασιλείᾳ.'
  spanish_consistency_notes:
  - Se mantiene «tierra» para χώρα en la primera y segunda aparición, por coherencia léxica y para reflejar el campo semántico territorial.
  - Se evita «Señor» o terminología teológica ajena al pasaje, que es narrativo-político.
  - «Ir contra» conserva el matiz hostil de μετέλθω sin convertirlo en una decisión judicial explícita.
  - La puntuación reproduce una estructura de propósito clara y lecturable en español contemporáneo.
