  source_alignment_summary: 'El borrador español sigue fielmente el hebreo masorético y el rastro de auditoría del POB inglés. Conserva correctamente la estructura proverbial: «La corona de los sabios es su riqueza[a], pero la necedad de los necios es necedad». La imagen de עֲטֶרֶת como símbolo de honor se mantiene con «corona»; חֲכָמִים como colectivo general se refleja bien en «los sabios»; עָשְׁרָם se comunica con naturalidad mediante «su riqueza». La cláusula difícil אִוֶּלֶת כְּסִילִים אִוֶּלֶת se preserva como tautología enfática, en línea con la decisión principal del POB inglés y con la evidencia del MT.'
