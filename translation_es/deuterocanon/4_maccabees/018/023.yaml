review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido global del griego: los descendientes de Abraham, junto con su madre, son reunidos al ámbito de sus antepasados tras recibir de Dios almas puras e inmortales. Conserva bien χῶρος como «lugar» y ψυχὰς ἁγνὰς καὶ ἀθανάτους como «almas puras e inmortales». Sin embargo, hay un problema de anclaje de notas: la nota [a] está puesta en «Abraham», pero su contenido explica toda la expresión Ἀβραμιαῖοι ... παῖδες, es decir, «hijos de Abraham».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Junto con su madre portadora de la victoria» suena algo pesado, pero es defendible por la intención de preservar la imaginería atlética de ἀθλοφόρος. La oración fluye bien en español bíblico moderno. El ajuste necesario es técnico y menor: colocar la nota [a] sobre la frase pertinente para evitar ambigüedad editorial.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεοῦ se vierte bien como «Dios»; no aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión de usar «hijos» en lugar de «niños» o «descendientes» está bien justificada por el contexto de los hermanos mártires, aunque el inglés revisado prefirió «children» por amplitud. En español, «hijos de Abraham» sigue siendo fiel y legible.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica la expresión completa «hijos de Abraham», pero el marcador aparece solo tras «Abraham», lo que puede hacer pensar que la nota comenta únicamente el nombre propio o el genitivo.
  revised_spanish_text: Pero los hijos de Abraham[a], junto con su madre portadora de la victoria[b], son reunidos al lugar de sus padres, habiendo recibido de Dios almas puras e inmortales.
  revised_footnotes:
  - marker: a
    text: O «los descendientes de Abraham»; παῖδες puede señalar pertenencia familiar o descendencia, pero el contexto de los hermanos mártires favorece «hijos».
    reason: lexical_alternative
  - marker: b
    text: «Portadora de la victoria» conserva la imagen atlética de ἀθλοφόρος; alternativamente, «madre vencedora» o «madre premiada».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la redacción base porque es fiel y natural, pero se corrige el uso editorial de la nota [a]: debe entenderse como anclada a la expresión «hijos de Abraham», no solo al nombre «Abraham». No se requieren cambios léxicos sustantivos.'
