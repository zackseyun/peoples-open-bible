review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: Jesús reprende al espíritu, le ordena callar y salir del hombre. «Reprendió», «diciendo», «Calla» y «sal de él» corresponden adecuadamente a ἐπετίμησεν, λέγων, Φιμώθητι y ἔξελθε ἐξ αὐτοῦ. Sin embargo, la nota léxica introduce un problema serio al usar «muzlado», forma no estándar en español, y la formulación «Sé amordazado» suena torpe. Conviene conservar la alternativa más literal de manera idiomática y comprensible.'
  spanish_quality_summary: 'La redacción principal es clara, natural y digna para español bíblico moderno. «Y Jesús lo reprendió, diciendo: “Calla, y sal de él”» se lee bien y mantiene la energía del pasaje. El único problema de calidad importante está en la nota, donde una alternativa poco idiomática y una forma inexistente o muy defectuosa dañan la legibilidad y la confiabilidad editorial.'
  glossary_alignment: No hay conflicto con los términos de proyecto en este versículo. «Jesús» está correcto. No aparecen Yahvé/Mesías/Espíritu ni otros términos sensibles del glosario. La decisión de mantener «lo» para αὐτῷ es aceptable en español, aunque el contexto debe seguir dejando claro que el destinatario es el espíritu inmundo.
  issues:
  - severity: medium
    issue: La nota usa «Sé muzlado», forma no estándar o incorrecta en español.
    rationale: El inglés auditado preserva la alternativa literal «Be muzzled». En español, «muzlado» no es una forma recomendable ni ampliamente reconocible; debilita la precisión y la calidad editorial.
  - severity: medium
    issue: La nota «Sé amordazado» es demasiado literal y poco idiomática.
    rationale: 'Aunque intenta reflejar el valor literal de φιμόω, en español suena forzada. Una formulación como «O más literalmente: “Sé amordazado”» todavía es comprensible, pero conviene ofrecer una alternativa mejor formada y más útil para lectores, por ejemplo «O más literalmente: “Sé amordazado”», sin añadir la forma defectuosa «muzlado».'
  revised_spanish_text: 'Y Jesús lo reprendió[a], diciendo: «Calla, y sal de él».'
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «Sé amordazado».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego y natural en español. Se corrige únicamente la nota léxica para eliminar la forma defectuosa «muzlado» y dejar una alternativa literal comprensible y editorialmente sólida para φιμώθητι.
