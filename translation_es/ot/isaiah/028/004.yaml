translation:
  language: es
  text: 'Y será la flor marchita de su hermosa gloria, la cual está sobre la cabeza del valle fértil[a], como un higo temprano[b] antes del verano: quien lo ve, mientras aún está en su palma, se lo traga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el valle de las grosuras» o «de la abundancia»; es un modismo para un valle rico o fértil.
    reason: cultural_note
  - marker: b
    text: O «como un fruto primerizo antes del verano». El hebreo בִּכּוּרָה puede denotar en general fruto de primera sazón, aunque en este contexto la imagen suele entenderse como un higo temprano.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיצַת נֹבֵל
  english_pob_choice: the fading flower
  chosen_spanish: la flor marchita
  alternatives_spanish:
  - la flor que se marchita
  - la flor que va decayendo
  lexicon: HALOT
  rationale: צִיצַת evoca una flor o floración visible, y נֹבֵל añade la idea de marchitarse o decaer. «Flor marchita» conserva la imagen y la fuerza participial con español natural.
- source_word: צְבִי תִפְאַרְתּוֹ
  english_pob_choice: his glorious beauty
  chosen_spanish: su hermosa gloria
  alternatives_spanish:
  - su gloriosa hermosura
  - la hermosura de su gloria
  lexicon: HALOT
  rationale: El hebreo combina dos sustantivos de esplendor/belleza. «Hermosa gloria» mantiene la duplicación semántica sin sonar forzado en español, y conserva la referencia posesiva de -וֹ.
- source_word: גֵּיא שְׁמָנִים
  english_pob_choice: the fertile valley
  chosen_spanish: el valle fértil
  alternatives_spanish:
  - el valle de abundancia
  - el valle rico
  lexicon: HALOT
  rationale: שְׁמָנִים literalmente alude a «grasuras/riquezas», un modismo de fertilidad. «Valle fértil» expresa el sentido idiomático con claridad, como en la audición inglesa.
- source_word: כְּבִכּוּרָהּ בְּטֶרֶם קַיִץ
  english_pob_choice: like an early fig before summer
  chosen_spanish: como una higuera temprana antes del verano
  alternatives_spanish:
  - como un higo temprano antes del verano
  - como una primicia antes del verano
  lexicon: HALOT
  rationale: בִּכּוּרָה puede referirse a fruto primicia, especialmente higo temprano en esta imagen profética. «Higuera temprana» mantiene la imagen agrícola de forma comprensible en español.
- source_word: אֲשֶׁר יִרְאֶה הָרֹאֶה אֹתָהּ
  english_pob_choice: whoever sees it
  chosen_spanish: quien la ve
  alternatives_spanish:
  - el que la ve
  - cualquiera que la vea
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y enfatiza la inmediatez de la visión. «Quien la ve» traduce con naturalidad sin repetir mecánicamente el verbo de la manera hebrea.
- source_word: בְּעוֹדָהּ בְּכַפּוֹ
  english_pob_choice: while it is still in his palm
  chosen_spanish: mientras aún está en su palma
  alternatives_spanish:
  - mientras todavía está en su mano
  - cuando aún la tiene en la palma
  lexicon: HALOT
  rationale: כַּף es literalmente palma/mano. «Palma» sigue de cerca la precisión léxica del inglés revisado y conserva la vividez concreta del gesto.
- source_word: יִבְלָעֶנָּה
  english_pob_choice: swallows it down
  chosen_spanish: se la traga
  alternatives_spanish:
  - la engulle
  - la devora
  lexicon: HALOT
  rationale: בלע significa tragar/consumir con rapidez. «Se la traga» mantiene el acto concreto y el tono inmediato del verbo sin sobrecargarlo.
- source_word: וְהָיְתָה
  english_pob_choice: will be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y llegará a ser
  - Y resultará ser
  lexicon: HALOT
  rationale: El verbo introduce el resultado comparativo de la imagen. «Y será» es la manera más directa y fiel en español.
translation_notes:
  revision_awareness: La redacción sigue el giro del texto hebreo y la revisión inglesa reciente que precisó «palm/palma» para כַּף. Se evitó una traducción mecánica del inglés, pero se conservó su decisión léxica central sobre la imagen del higo temprano y la expresión idiomática del valle fértil.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto cuando el pasaje lo requiriera; este verso no contiene el Tetragrámaton.
  - «Español» aquí privilegia claridad pública y dignidad litúrgica sin caer en arcaísmos innecesarios.
  - Se mantuvo «palma» para כַּף por precisión léxica y por coherencia con la revisión inglesa auditada.
