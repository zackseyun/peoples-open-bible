    text: Or 'cast you' or 'throw you.' The Hebrew verb is forceful, describing violent expulsion from the land.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''your ancestors.'' Hebrew: ''your fathers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'worship other gods.' The Hebrew verb commonly means 'serve' and can include worshipful service.
    reason: lexical_alternative
  - marker: d
    text: Or 'for I will grant you no grace/mercy.' The Hebrew noun denotes favor or graciousness.
    reason: lexical_alternative
