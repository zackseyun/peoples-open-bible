translation:
  language: es
  text: Y además[a], asegúrense de sacar para ella algo de los manojos y déjenlo, para que lo recoja[b]; y no la reprendan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las gavillas». El término hebreo se refiere a manojos o haces de tallos ya reunidos.
    reason: lexical_alternative
  - marker: b
    text: O «dejen que ella espigue». El verbo hebreo es el término normal para espigar en un campo cosechado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y además
  alternatives_spanish:
  - También
  - Y asimismo
  lexicon: HALOT
  rationale: La partícula añade énfasis e introduce una instrucción adicional. «Y además» conserva el enlace y el valor aditivo con naturalidad en español.
- source_word: שֹׁל תָּשֹׁלּוּ
  english_pob_choice: you must surely pull out
  chosen_spanish: arranquen
  alternatives_spanish:
  - saquen con cuidado
  - arranquen deliberadamente
  - extraigan
  lexicon: HALOT
  rationale: El hebreo usa intensificación con infinitivo absoluto y verbo finito. En este contexto agrícola, «arranquen» comunica la acción intencional de desprender espigas para ella sin suavizar la fuerza del mandato.
- source_word: לָהּ
  english_pob_choice: for her
  chosen_spanish: para ella
  alternatives_spanish:
  - a ella
  - en su favor
  lexicon: HALOT
  rationale: La preposición expresa beneficio. «Para ella» transmite de forma directa que la acción se hace en beneficio de Rut.
- source_word: מִן הַצְּבָתִים
  english_pob_choice: from the bundles
  chosen_spanish: de los manojos
  alternatives_spanish:
  - de las gavillas
  - de los haces
  lexicon: HALOT
  rationale: צְּבָתִים designa agrupaciones de tallos ya reunidos. «Manojos» es claro y natural en español; «gavillas» es posible, pero más tradicional y menos transparente.
- source_word: וַעֲזַבְתֶּם
  english_pob_choice: and leave it
  chosen_spanish: y déjenlo
  alternatives_spanish:
  - y déjenlo allí
  - y abańdonenlo
  lexicon: HALOT
  rationale: El mandato es dejar caer o quedar el grano para que Rut lo recoja. «Déjenlo» es breve y preciso; evita la dureza innecesaria de «abandonenlo».
- source_word: וְלִקְּטָה
  english_pob_choice: so that she may gather it
  chosen_spanish: para que ella lo recoja
  alternatives_spanish:
  - para que ella lo espigue
  - para que ella lo glean
  lexicon: HALOT
  rationale: לקט es el verbo técnico de espigar/recoger espigas. Aquí «lo recoja» fluye de manera natural en español y conserva la idea de recoger lo dejado atrás; la nota preserva la alternativa más técnica.
- source_word: וְלֹא תִגְעֲרוּ בָהּ
  english_pob_choice: and you must not rebuke her
  chosen_spanish: y no la reprendan
  alternatives_spanish:
  - y no la reprendan duramente
  - y no la regañen
  lexicon: HALOT
  rationale: גער expresa reprensión o corrección fuerte. «Reprendan» mantiene la fuerza sin caer en coloquialismos como «regañen».
translation_notes:
  revision_awareness: 'Se siguió el acuerdo alto del audit trail inglés y no hubo revisiones aplicadas en la fuente. La redacción española busca equivalencia óptima: conserva la intensificación del mandato, el sentido benefactivo de לָהּ, el valor agrícola de צְּבָתִים y el verbo técnico לקט, evitando un calco rígido donde el español exige mayor naturalidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió un español neutro y readable, con vocabulario agrícola claro («manojos», «recoja») y sin arcaísmos innecesarios.
  - La nota [b] preserva la alternativa técnica «espigar» para no perder el matiz lexical de לקט.
