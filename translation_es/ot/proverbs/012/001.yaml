translation:
  language: es
  text: El que ama la disciplina ama el conocimiento, pero el que aborrece la reprensión es necio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bruto» o «insensato» para «necio». El adjetivo hebreo בָּעַר puede designar a una persona torpe, sin entendimiento o parecida a una bestia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: Whoever loves
  chosen_spanish: El que ama
  alternatives_spanish:
  - Quien ama
  - Quienquiera que ama
  lexicon: HALOT
  rationale: El participio hebreo funciona de modo proverbial y genérico. «El que ama» conserva ese valor sin sonar mecánico en español y mantiene la estructura antitética del proverbio.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la instrucción
  - la corrección
  - el entrenamiento
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר incluye corrección formativa y disciplina educativa. «Disciplina» recoge bien ese rango en español y conserva la fuerza sapiencial del término.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - la sabiduría
  - el entendimiento
  - el saber
  lexicon: HALOT
  rationale: La pareja con מוּסָר pide un sustantivo directo y natural. «Conocimiento» sigue de cerca la elección inglesa y expresa adecuadamente la adquisición de saber en contexto sapiencial.
- source_word: וְשֹׂנֵא
  english_pob_choice: but he who hates
  chosen_spanish: pero el que aborrece
  alternatives_spanish:
  - y el que odia
  - sino el que aborrece
  lexicon: HALOT
  rationale: La conjunción marca contraste antitético; por eso se traduce «pero». «Aborrece» reproduce el tono fuerte del hebreo sin suavizarlo indebidamente.
- source_word: תוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: la reprensión
  alternatives_spanish:
  - la reprensión correctiva
  - la amonestación
  - la corrección
  lexicon: HALOT
  rationale: תוֹכַחַת designa corrección verbal, reprensión o reprobación. «Reprensión» es una opción clara y digna en español, suficientemente cercana al valor proverbial del término.
- source_word: בָּעַר
  english_pob_choice: stupid
  chosen_spanish: necio
  alternatives_spanish:
  - bruto
  - insensato
  - estúpido
  lexicon: HALOT
  rationale: Aunque la nota inglesa ofrece «brutish» como alternativa léxica, en español «necio» comunica bien la evaluación sapiencial con menos dureza vulgar que «estúpido» y sin perder la idea de insensatez moral e intelectual.
theological_decisions:
- issue: Valor peyorativo de בָּעַר en un proverbio sapiencial
  english_pob_reading: stupid, with footnoted alternative 'brutish'
  chosen_spanish_reading: necio, con nota sobre el rango semántico de ‘bruto/insensato/beastlike’
  alternative_spanish_readings:
  - bruto
  - insensato
  - estúpido
  rationale: El texto no formula una doctrina, sino una evaluación sapiencial fuerte. En español conviene una palabra que sea seria y bíblicamente registrable; «necio» evita una crudeza innecesaria, pero la nota preserva la tensión semántica del hebreo.
  doctrine_reference: Sabiduría proverbial; carácter moral e intelectual del insensato en literatura sapiencial
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se registraron revisiones posteriores con cambios sustantivos; el estado más reciente indica que no hacía falta modificar la lectura base.
  spanish_consistency_notes:
  - Se mantuvo «disciplina» para מוּסָר y «conocimiento» para דָּעַת, coherente con la terminología sapiencial estándar del proyecto.
  - Se eligió «reprensión» para תוֹכַחַת para conservar el matiz de corrección verbal y no diluirlo en un término más general.
  - Se usó «necio» como equivalente contextual de בָּעַר, pero la nota preserva las alternativas léxicas documentadas por la tradición de traducción.
