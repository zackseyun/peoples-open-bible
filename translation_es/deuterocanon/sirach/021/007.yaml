review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: contraste entre el hombre poderoso en el habla y el entendido que percibe su desliz. Sin embargo, hay un problema de anclaje y correspondencia de notas: la nota sobre «cuando tropieza» está anclada a «de lejos» en vez de al verbo final. Además, «cuándo resbala» debe llevar «cuando» sin tilde, porque aquí es conjunción temporal, no interrogativa indirecta.'
  spanish_quality_summary: El español es claro y digno. «Un hombre poderoso en el hablar» es aceptable, aunque algo menos vívido que «poderoso en la lengua/palabra»; no requiere cambio forzoso. «Es conocido de lejos» suena natural. El ajuste principal es ortográfico y de colocación de la nota final para mantener legibilidad y exactitud editorial.
  glossary_alignment: 'No hay términos de glosario mayor implicados. Las decisiones léxicas principales son coherentes con el audit trail inglés: γνωστὸς μακρόθεν -> «es conocido de lejos»; ὁ δυνατὸς ἐν γλώσσῃ -> «un hombre poderoso en el hablar»; ὁ δὲ νοήμων -> «el que tiene entendimiento»; ἐν τῷ ὀλισθάνειν αὐτόν -> debe reflejarse como «cuando resbala», conservando la imagen de resbalar/tropezar.'
  issues:
  - severity: medium
    issue: Uso de «cuándo» en lugar de «cuando».
    rationale: En español, la conjunción temporal no lleva tilde. La tilde convertiría la forma en interrogativa/exclamativa indirecta, lo cual no corresponde al griego ni al sentido de la frase.
  - severity: high
    issue: La nota [b] está anclada en el lugar incorrecto.
    rationale: La nota [b] explica la alternativa de ὀλισθάνειν («cuando tropieza»), pero en el texto actual aparece junto a «de lejos». Esto rompe la correspondencia editorial entre texto y nota y puede confundir al lector.
  revised_spanish_text: Un hombre poderoso en el hablar es conocido de lejos[a]; pero el que tiene entendimiento sabe cuando resbala[b].
