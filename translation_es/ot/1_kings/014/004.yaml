translation:
  language: es
  text: La esposa de Jeroboam hizo así. Se levantó y fue a Silo[a], y llegó a la casa de Ahías. Y Ahías no podía ver, porque sus ojos se habían nublado a causa de su vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sus ojos quedaron fijos por su vejez», un modismo que describe pérdida de visión relacionada con la edad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּ֤עַשׂ כֵּן
  english_pob_choice: did so
  chosen_spanish: hizo así
  alternatives_spanish:
  - lo hizo
  - hizo conforme a eso
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea expresa que actuó conforme a la instrucción previa. «Hizo así» conserva la relación con el mandato sin volver la frase pesada o arcaica.
- source_word: אֵ֣שֶׁת יָרָבְעָ֔ם
  english_pob_choice: Jeroboam’s wife
  chosen_spanish: la esposa de Jeroboam
  alternatives_spanish:
  - la mujer de Jeroboam
  - la esposa de Jeroboam
  lexicon: HALOT
  rationale: Se mantiene el vínculo posesivo de manera natural en español. «Esposa» es más formal y transparente que «mujer» en este contexto narrativo.
- source_word: וַתָּ֨קָם
  english_pob_choice: she arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: Verbo de movimiento normal en español para la secuencia narrativa. Conserva el orden de acciones sin añadir matiz interpretativo.
- source_word: וַתֵּ֣לֶךְ שִׁלֹ֔ה
  english_pob_choice: went to Shiloh
  chosen_spanish: fue a Silo
  alternatives_spanish:
  - viajó a Silo
  - se fue a Silo
  lexicon: HALOT
  rationale: «Fue a» reproduce con claridad el desplazamiento hacia la ciudad. Se usa «Silo» como topónimo usual en español bíblico.
- source_word: וַתָּבֹ֖א בֵּ֣ית אֲחִיָּ֑ה
  english_pob_choice: came to Ahijah’s house
  chosen_spanish: llegó a la casa de Ahías
  alternatives_spanish:
  - entró en la casa de Ahías
  - llegó a la casa de Ahías
  lexicon: HALOT
  rationale: El hebreo señala llegada a la casa, no necesariamente el énfasis en cruzar al interior. «Llegó a la casa de» preserva ese valor con naturalidad.
- source_word: וַאֲחִיָּ֨הוּ֙
  english_pob_choice: Now Ahijah
  chosen_spanish: Ahora Ahías
  alternatives_spanish:
  - Y Ahías
  - Entonces Ahías
  lexicon: HALOT
  rationale: La conjunción aquí cambia el foco de la escena hacia Ahías. «Ahora» funciona como marcador discursivo, igual que en la solución inglesa auditada.
- source_word: לֹֽא יָכֹ֣ל לִ/רְא֔וֹת
  english_pob_choice: could not see
  chosen_spanish: no podía ver
  alternatives_spanish:
  - no era capaz de ver
  - no podía mirar
  lexicon: HALOT
  rationale: La expresión de incapacidad más directa y natural en español es «no podía ver», que conserva el sentido básico del verbo sin sobreinterpretarlo.
- source_word: כִּ֛י
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce de manera directa la causa de su incapacidad visual.
- source_word: קָ֥מוּ עֵינָ֖יו
  english_pob_choice: his eyes were dim
  chosen_spanish: sus ojos se habían nublado
  alternatives_spanish:
  - sus ojos estaban apagados
  - sus ojos se habían oscurecido
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «sus ojos se levantaron/estuvieron de pie», un giro idiomático que indica deterioro de la vista por la edad. «Se habían nublado» expresa ese efecto en español sin perder la causa física ni depender de una calca impropia.
- source_word: מִ/שֵּׂיבֽ/וֹ
  english_pob_choice: because of his old age
  chosen_spanish: a causa de su vejez
  alternatives_spanish:
  - por su vejez
  - debido a su edad avanzada
  lexicon: HALOT
  rationale: La preposición indica causa. «Vejez» conserva la referencia al envejecimiento como motivo del problema visual, con un registro claro y digno.
theological_decisions:
- issue: Tratamiento del nombre divino y ausencia de términos teológicos explícitos en el versículo
  english_pob_reading: The verse contains no divine-name substitution or overt theological title requiring a doctrinal choice.
  chosen_spanish_reading: No hay términos teológicos explícitos que requieran decisión doctrinal en este versículo.
  alternative_spanish_readings:
  - —
  rationale: El versículo es narrativo y no contiene יהוה, Mesías/Cristo, ni vocabulario doctrinal que exija una nota teológica específica.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audit trail inglés, incorporando la corrección revisada para expresar que los ojos estaban nublados por la vejez, no «fijos»; se mantiene la secuencia narrativa y la causa de la ceguera parcial con una equivalencia óptima en español.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Ahías» para אֲחִיָּה, coherente con el uso bíblico en español.
  - «Silo» se usa como topónimo establecido, sin artículo.
  - La nota [a] está anclada en el texto en «Silo[a]» para cumplir la trazabilidad de la expresión idiomática hebrea.
