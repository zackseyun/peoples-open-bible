translation:
  language: es
  text: Cuando todos los líderes de la torre de Siquem[a] oyeron esto, entraron en la cámara interior[b] de la casa de El-berit[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Migdal-siquem’, tomando la frase como nombre de lugar en vez de ‘la torre de Siquem’.
    reason: alternative_reading
  - marker: b
    text: O ‘bóveda’, ‘recinto fortificado’ o ‘habitación interior’ para el término hebreo que describe una cámara protegida.
    reason: lexical_alternative
  - marker: c
    text: El-berit puede significar ‘Dios del pacto’. Compárese el nombre relacionado ‘Baal-berit’ en este mismo capítulo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard it
  chosen_spanish: oyeron[a] esto
  alternatives_spanish:
  - oyeron
  - escucharon esto
  lexicon: HALOT
  rationale: El verbo פשוט means ‘oír’. En español, ‘oyeron esto’ reproduce con naturalidad el objeto implícito en el contexto narrativo sin añadir información ajena.
- source_word: בַּעֲלֵי
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - señores
  - dueños
  - jefes
  lexicon: HALOT
  rationale: Aquí la expresión designa a los principales o dirigentes vinculados con la torre de Siquem. ‘Líderes’ conserva el valor sociopolítico sin introducir la idea de propiedad.
- source_word: מִגְדַּל שְׁכֶם
  english_pob_choice: the tower of Shechem
  chosen_spanish: la torre de Siquem
  alternatives_spanish:
  - Migdal-Siquem
  - el baluarte de Siquem
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘torre de Siquem’. Mantener esa forma es transparente y no fuerza la lectura de nombre propio, aunque la alternativa toponímica queda abierta en el texto fuente.
- source_word: צְרִיחַ
  english_pob_choice: the inner chamber
  chosen_spanish: la cámara interior[b]
  alternatives_spanish:
  - la bóveda
  - el recinto fortificado
  - la habitación interior
  lexicon: HALOT
  rationale: El término sugiere un espacio interior protegido; ‘cámara interior’ es una solución sobria y fiel que conserva la idea de un refugio interno sin precisar más de lo que el hebreo permite.
- source_word: בֵּית אֵל בְּרִית
  english_pob_choice: the house of El-berith
  chosen_spanish: la casa de El-berit[c]
  alternatives_spanish:
  - el templo de El-berit
  - la casa de Dios del pacto
  lexicon: HALOT
  rationale: Se preserva la forma del nombre/título ‘El-berit’ para no resolver prematuramente su ambigüedad. ‘Casa de’ traduce בֵּית de manera literal y puede implicar un santuario o templo según el contexto.
theological_decisions:
- issue: Ambigüedad del nombre/título אֵל בְּרִית
  english_pob_reading: El-berith may mean 'God of the covenant.' Compare the related name 'Baal-berith' elsewhere in this chapter.
  chosen_spanish_reading: El-berit puede significar ‘Dios del pacto’.
  alternative_spanish_readings:
  - ‘Baal-berit’ por armonización con el contexto cercano
  - ‘el templo de El-berit’
  rationale: La traducción principal conserva la ambigüedad del hebreo mediante transliteración. La nota permite la posible interpretación semántica sin borrar la tensión textual ni armonizar el pasaje con otros versículos.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: This draft follows the latest revision pass by rendering the hearing clause more directly as ‘oyeron esto’ rather than a looser ‘oyeron de ello’. It also preserves the English POB's cautious handling of the architectural term and the cultic name/title, while adapting them into publication-readable Spanish.
  spanish_consistency_notes:
  - Se usa ‘Siquem’ para el topónimo, conforme al uso bíblico en español.
  - Se mantiene ‘El-berit’ transliterado para respetar la ambigüedad lexical y teológica del hebreo.
  - ‘Cámara interior’ conserva el matiz arquitectónico del término sin exagerar la especificidad.
  - No se emplea ‘SEÑOR’ ni equivalentes de sustitución para este versículo, porque no aparece el Tetragrámaton.
