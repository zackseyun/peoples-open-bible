translation:
  language: es
  text: 'Y les dio órdenes, diciendo: «Cuiden[a] de este pueblo, y no entablen batalla contra las naciones hasta que nosotros volvamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Velen por este pueblo». El imperativo griego puede subrayar tanto la vigilancia protectora como la prudencia general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: le dio órdenes
  alternatives_spanish:
  - le mandó
  - les dio una orden
  lexicon: BDAG
  rationale: El verbo griego expresa una orden con autoridad. «Le dio órdenes» conserva ese tono sin sonar rígidamente literal en español.
- source_word: Πρόσεχετε
  english_pob_choice: Take care of
  chosen_spanish: Tengan cuidado
  alternatives_spanish:
  - Velen por
  - Tengan vigilancia sobre
  - Cuídense de
  lexicon: BDAG
  rationale: Aquí el imperativo con el genitivo del pueblo implica atención protectora o vigilancia. «Tengan cuidado» permite ese matiz sin reducirlo solo a atención mental.
- source_word: τοῦ λαοῦ τούτου
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo
  lexicon: BDAG
  rationale: «Laός» refiere a un colectivo. «Este pueblo» reproduce bien la referencia corporativa y el demostrativo del griego.
- source_word: μὴ συνάψητε πόλεμον
  english_pob_choice: do not join battle
  chosen_spanish: no entablen batalla
  alternatives_spanish:
  - no entren en guerra
  - no se involucren en combate
  - no inicien una batalla
  lexicon: LSJ
  rationale: La expresión idiomática griega indica entrar en conflicto bélico. «Entablar batalla» es natural en español y preserva el sentido militar sin ampliar innecesariamente a ‘guerra’.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: En 1 Macabeos, ἔθνη suele referirse a los pueblos no judíos alrededor de Israel. «Las naciones» mantiene la transparencia y evita cargar el texto con un término más técnico como «gentiles».
- source_word: ἕως τοῦ ἐπιστρέψαι ἡμᾶς
  english_pob_choice: until we return
  chosen_spanish: hasta que nosotros volvamos
  alternatives_spanish:
  - hasta nuestro regreso
  - hasta que regresemos
  - hasta que volvamos
  lexicon: BDAG
  rationale: El infinitivo articular expresa límite temporal. «Hasta que nosotros volvamos» refleja con claridad la primera persona plural del griego y el valor temporal de la cláusula.
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés muestran acuerdo alto; no se requieren cambios de fondo. La principal decisión en español fue conservar el matiz de vigilancia protectora en Πρόσεχετε y el valor militar específico de συνάψητε πόλεμον sin sobrertraducir a ‘guerra’.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usó «las naciones» de forma consistente con la traducción auditada en inglés.
  - El registro es formal y bíblico, pero evita arcaísmos innecesarios.
