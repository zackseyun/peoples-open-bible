translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Reúne[a] para mí setenta hombres de entre los ancianos de Israel, a quienes conoces como los ancianos del pueblo y sus oficiales[b], y llévalos a la tienda de reunión, y que se presenten allí contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Convoca para mí».
    reason: lexical_alternative
  - marker: b
    text: O «funcionarios»; el término hebreo se refiere a oficiales administrativos bajo los ancianos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre propio divino y la pauta del proyecto pide ‘Yahvé’ en el texto principal. ‘Yahvé’ conserva el nombre del pacto sin sustituirlo por un título, y evita la convención de ocultarlo como ‘el SEÑOR’.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: La fórmula narrativa directa de introducción al habla se expresa naturalmente en español con ‘dijo’.
- source_word: אֶסְפָה לִּי
  english_pob_choice: Gather for me
  chosen_spanish: Reúne para mí
  alternatives_spanish:
  - Reúne conmigo
  - Agrupa para mí
  - Convoca para mí
  lexicon: HALOT
  rationale: El verbo implica convocar/reunir personas con destino a una misión. ‘Reúne’ comunica bien la acción y mantiene el matiz de la dativa לִּי con ‘para mí’.
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: אִישׁ en este contexto de liderazgo se refiere a varones adultos. ‘Hombres’ preserva la referencia social y numérica sin suavizarla.
- source_word: מִזִּקְנֵי יִשְׂרָאֵל
  english_pob_choice: from the elders of Israel
  chosen_spanish: de entre los ancianos de Israel
  alternatives_spanish:
  - de los ancianos de Israel
  - entre los ancianos de Israel
  lexicon: HALOT
  rationale: מִן marca selección desde un grupo mayor; ‘de entre’ refleja mejor esa extracción que un simple ‘de’.
- source_word: אֲשֶׁר יָדַעְתָּ כִּי
  english_pob_choice: whom you know to be
  chosen_spanish: a quienes conoces como
  alternatives_spanish:
  - a quienes sabes que son
  - a quienes conoces que son
  lexicon: HALOT
  rationale: La estructura hebrea presenta conocimiento previo como base de selección. ‘Conoces como’ expresa de forma idiomática que Moisés los reconoce en calidad de ancianos/representantes.
- source_word: זִקְנֵי הָעָם
  english_pob_choice: the elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los mayores del pueblo
  - los ancianos del pueblo
  lexicon: HALOT
  rationale: ‘Ancianos’ conserva el término institucional de liderazgo y evita una lectura meramente etaria.
- source_word: וְשֹׁטְרָיו
  english_pob_choice: and its officers
  chosen_spanish: y sus oficiales
  alternatives_spanish:
  - y sus administradores
  - y sus inspectores
  lexicon: HALOT
  rationale: El término designa funcionarios administrativos bajo autoridad. ‘Oficiales’ sigue la decisión auditada en inglés y mantiene el sentido administrativo sin reducirlo a un cargo moderno demasiado específico.
- source_word: וְלָקַחְתָּ אֹתָם
  english_pob_choice: and bring them
  chosen_spanish: y llévalos
  alternatives_spanish:
  - y tómalos
  - y tráelos
  lexicon: HALOT
  rationale: Aunque לקח literalmente es ‘tomar’, en un mandato de movimiento hacia un destino en español ‘llevar’ es natural y conserva la dirección implicada.
- source_word: אֶל אֹהֶל מוֹעֵד
  english_pob_choice: to the tent of meeting
  chosen_spanish: al tabernáculo de reunión
  alternatives_spanish:
  - a la tienda de reunión
  - al tabernáculo del encuentro
  lexicon: HALOT
  rationale: ‘Tabernáculo de reunión’ es la designación tradicional y comprensible del santuario en español bíblico, y reproduce el valor de אֹהֶל מוֹעֵד sin perder precisión.
- source_word: וְהִתְיַצְּבוּ שָׁם עִמָּךְ
  english_pob_choice: and let them stand there with you
  chosen_spanish: y que se presenten allí contigo
  alternatives_spanish:
  - y que estén allí contigo
  - y que tomen allí su lugar contigo
  - y que se pongan de pie allí contigo
  lexicon: HALOT
  rationale: El hitpael de יצב puede implicar presentarse o ponerse en pie. ‘Se presenten’ comunica la idea de comparecer ante Yahvé con Moisés, y es más natural que una reproducción literal de ‘ponerse de pie’.
theological_decisions:
- issue: Tratamiento del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el Nombre propio del pacto en forma transliterada, conforme a la pauta del proyecto y al testimonio del hebreo. No se sustituye por un título devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido administrativo de שֹׁטְרִים
  english_pob_reading: officers
  chosen_spanish_reading: oficiales
  alternative_spanish_readings:
  - administradores
  - funcionarios
  rationale: El contexto es de organización del liderazgo israelita, no militar. ‘Oficiales’ preserva la función administrativa sin imponer una modernización excesiva.
  doctrine_reference: HALOT; contexto narrativo de organización comunitaria
- issue: Valor de וְהִתְיַצְּבוּ
  english_pob_reading: let them stand there with you
  chosen_spanish_reading: que se presenten allí contigo
  alternative_spanish_readings:
  - que se pongan de pie allí contigo
  - que comparezcan allí contigo
  rationale: La forma reflexiva de יצב puede expresar comparecer/presentarse para una función o comisión. ‘Se presenten’ evita un literalismo corporal que oscurezca la función ritual-administrativa del acto.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: El audit trail inglés mantiene el verbo de convocatoria con la nota alternativa ‘Assemble for me’ y conserva ‘officers’ con una nota explicativa. La versión española sigue esas decisiones semánticas, pero adapta la sintaxis para que el mandato fluya de forma natural en español bíblico moderno. No se detectaron cambios posteriores en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, en coherencia con la terminología del proyecto.
  - Se conserva ‘ancianos’ para זקנים como término de liderazgo institucional, no meramente etario.
  - Se usa ‘oficiales’ para שֹׁטְרִים, alineado con la nota auditada sobre función administrativa.
  - Se emplea ‘tabernáculo de reunión’ como equivalente estable de אֹהֶל מוֹעֵד.
  - Se opta por ‘se presenten’ para reflejar el valor de comparecencia del hitpael de יצב en un contexto de comisión.
