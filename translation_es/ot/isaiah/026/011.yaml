translation:
  language: es
  text: Yahvé, tu mano está alzada, pero ellos no ven. Verán y serán avergonzados ante el celo por el pueblo[a]; de hecho[b], fuego consumirá a tus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el celo del pueblo». La frase hebrea es compacta y puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: O «el fuego de tus enemigos». La redacción hebrea permite otra relación sintáctica, aunque «fuego consumirá a tus enemigos» se ajusta mejor al contexto de juicio divino.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como ‘Yahvé’, conforme al estándar del proyecto para evitar el ocultamiento del nombre mediante un título genérico. En español no se usa el vocativo ‘Oh’ de manera necesaria; el apelativo directo basta.
- source_word: רָמָה יָדְךָ
  english_pob_choice: your hand is lifted up
  chosen_spanish: tu mano está alzada
  alternatives_spanish:
  - tu mano está levantada
  - tu mano se alza
  lexicon: HALOT
  rationale: ‘Está alzada’ preserva la imagen de una mano elevada sin añadir interpretación excesiva. Mantiene el valor visual y la posibilidad de entenderlo como acción o disposición divina.
- source_word: בַּל יֶחֱזָיוּן
  english_pob_choice: they do not see
  chosen_spanish: pero ellos no ven
  alternatives_spanish:
  - pero ellos no perciben
  - pero ellos no lo ven
  lexicon: HALOT
  rationale: El verbo simple ‘ver’ reproduce la concisión hebrea y el contraste retórico con el siguiente ‘Verán’. Se añade ‘pero’ para reflejar la oposición implícita en la cláusula.
- source_word: יֶחֱזוּ
  english_pob_choice: They will see
  chosen_spanish: Verán
  alternatives_spanish:
  - Verán claramente
  - Llegarán a ver
  lexicon: HALOT
  rationale: 'El futuro español expresa bien el giro profético: aunque ahora no ven, después verán. Se evita un imperativo que no corresponde al contexto.'
- source_word: וְיֵבֹשׁוּ
  english_pob_choice: and be put to shame
  chosen_spanish: y serán avergonzados
  alternatives_spanish:
  - y quedarán avergonzados
  - y serán puestos en vergüenza
  lexicon: HALOT
  rationale: ‘Serán avergonzados’ conserva el sentido pasivo/judicial del verbo y su tono de vergüenza pública. ‘Puestos en vergüenza’ sería más literal, pero menos natural en español.
- source_word: קִנְאַת עָם
  english_pob_choice: at the zeal for the people
  chosen_spanish: por el celo del pueblo
  alternatives_spanish:
  - por el celo por el pueblo
  - por la celosa intervención del pueblo
  - por los celos del pueblo
  lexicon: HALOT
  rationale: 'La construcción hebrea es compacta y admite más de una relación sintáctica. Se mantiene una formulación breve y abierta: ‘el celo del pueblo’. Esto preserva la tensión auditada sin forzar ‘por tu pueblo’ como única solución, aunque el contexto puede sugerirla.'
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - en verdad
  - además
  lexicon: HALOT
  rationale: ‘Sí’ funciona como intensificador enfático en español y prepara la cláusula final. Se conserva el valor aditivo/enfático sin recargar el estilo.
- source_word: אֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: Se traduce de forma literal para preservar la imagen de juicio. En español el artículo definido ayuda a identificar el fuego como una realidad concreta en la escena.
- source_word: צָרֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - los que te adversan
  lexicon: HALOT
  rationale: ‘Enemigos’ es la equivalencia más directa y natural en este contexto judicial. Mantiene la oposición entre Yahvé y los hostiles a él.
- source_word: תֹאכְלֵם
  english_pob_choice: will consume them
  chosen_spanish: consumirá
  alternatives_spanish:
  - devorará
  - los consumirá
  lexicon: HALOT
  rationale: Con ‘el fuego’ como sujeto, el verbo español ‘consumir’ conserva la imagen destructiva del hebreo sin introducir un equivalente demasiado crudo o interpretativo. La omisión explícita del pronombre ‘los’ se debe a la fluidez del español, sin perder el referente del objeto.
theological_decisions:
- issue: Interpretación de קִנְאַת עָם
  english_pob_reading: divine zeal for the LORD's people
  chosen_spanish_reading: el celo del pueblo
  alternative_spanish_readings:
  - el celo por el pueblo
  - el celo de tu pueblo
  - la pasión por el pueblo
  rationale: El hebreo es comprimido y la tradición auditada reconoce una ambigüedad real. En español se preserva esa apertura con una formulación sobria que no resuelve de antemano la relación sintáctica. Así se evita borrar la tensión textual, dejando espacio para la lectura contextual del juicio divino.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Relación entre el fuego y los enemigos
  english_pob_reading: fire will consume your enemies
  chosen_spanish_reading: el fuego consumirá a tus enemigos
  alternative_spanish_readings:
  - el fuego de tus enemigos los consumirá
  - fuego consumirá a tus enemigos
  rationale: Se mantiene el sujeto ‘el fuego’ como agente destructor, que encaja con el paralelismo y con el contexto de juicio. Esto evita una lectura posesiva que podría oscurecer el sentido inmediato del hebreo.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó la segunda cláusula para acercarse más al hebreo: ‘at the zeal for the people’ y ‘fire will consume your enemies’. La versión española refleja esa misma cautela, conservando la ambigüedad de קִנְאַת עָם y manteniendo el fuego como sujeto directo del verbo final.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo futuro/negación: ‘no ven’ / ‘Verán’.'
  - ‘Celo’ se mantiene como término principal para קִנְאָה, sin fijar de manera excesiva si es celo divino o del pueblo.
  - ‘Consumirá’ conserva el valor de juicio del verbo hebreo sin sustituirlo por una paráfrasis.
  - La puntuación busca mantener el ritmo oracular breve del hebreo.
