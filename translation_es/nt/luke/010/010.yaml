translation:
  language: es
  text: 'Pero en cualquier ciudad[a] que entren y no los reciban, salgan a sus plazas[b] y digan:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la ciudad que sea' o 'en cualquier ciudad adonde entren'. El griego introduce una referencia indefinida y general.
    reason: lexical_alternative
  - marker: b
    text: O 'calles anchas' o 'plazas públicas'. El griego πλατείας se refiere a vías o espacios abiertos y públicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν πόλιν
  english_pob_choice: whatever city
  chosen_spanish: en cualquier ciudad
  alternatives_spanish:
  - en toda ciudad
  - en la ciudad que sea
  lexicon: BDAG
  rationale: La construcción relativa con ἄν expresa una referencia indefinida y general; en español, 'en cualquier ciudad' comunica mejor esa apertura que una forma más literal y pesada.
- source_word: εἰσέλθητε
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - entren ustedes
  - lleguen a
  lexicon: BDAG
  rationale: El verbo de movimiento con sentido de entrada se expresa naturalmente con 'entren'; mantiene la idea de ingreso a la ciudad sin añadir matices no presentes.
- source_word: μὴ δέχωνται ὑμᾶς
  english_pob_choice: they do not receive you
  chosen_spanish: no los reciban
  alternatives_spanish:
  - no los reciban con agrado
  - no los acojan
  lexicon: BDAG
  rationale: '''Reciban'' conserva el valor amplio de δέχομαι y evita reducirlo a mero ''acoger'' o ''dar la bienvenida''; además encaja con el lenguaje misional del contexto.'
- source_word: ἐξελθόντες
  english_pob_choice: go out
  chosen_spanish: salgan
  alternatives_spanish:
  - habiendo salido
  - vayan fuera
  lexicon: BDAG
  rationale: 'Aunque formalmente es un participio circunstancial, en español la secuencia se expresa de manera más natural como un mandato coordinado: ''salgan ... y digan''.'
- source_word: τὰς πλατείας αὐτῆς
  english_pob_choice: its streets
  chosen_spanish: sus plazas
  alternatives_spanish:
  - sus calles anchas
  - sus plazas públicas
  lexicon: BDAG
  rationale: πλατεῖα puede referirse a espacios públicos abiertos, plazas o vías anchas. 'Plazas' preserva mejor el matiz de lugar público donde se proclama el mensaje; se mantiene la alternativa semántica en nota.
- source_word: εἴπατε
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - hablen
  - declaren
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω se rinde con 'digan', la forma más directa y natural para introducir la cita siguiente.
translation_notes:
  revision_awareness: 'Texto alineado con el griego SBLGNT y con el audit trail inglés: mantiene la genericidad de ἄν, el valor de δέχομαι como ''recibir'', y la ambigüedad de πλατείας mediante nota lexical en español.'
  spanish_consistency_notes:
  - Se usa 'ciudad' para πόλις y 'plazas' para πλατεῖα, evitando uniformar indebidamente ambos términos.
  - Se conserva el tono imperativo directo del original con 'salgan ... y digan'.
  - La puntuación introduce la cita final como en el griego, con dos puntos en español.
