revisions:
- from: 'Entonces Yahvé dijo al Adversario[a]: «¿De dónde vienes?». Y el Adversario respondió a Yahvé y dijo: «De andar recorriendo la tierra y de pasearme por ella».'
  to: 'Entonces Yahvé dijo al Adversario[a]: «¿De dónde vienes?» Y el Adversario respondió a Yahvé y dijo: «De recorrer la tierra y de andar por ella».'
  rationale: La revisión conserva todas las decisiones léxicas principales del borrador, pero reemplaza «pasearme por ella» por «andar por ella» para reflejar mejor el movimiento repetido del hebreo sin matiz ligero o coloquial. También simplifica «de andar recorriendo» a «de recorrer» para mejorar fluidez y paralelismo, y ajusta la puntuación del diálogo al uso natural del español.
