lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si es que
  lexicon: HALOT
  rationale: La forma abre una condición en un juramento o protesta inocente; en español, «si» comunica con naturalidad esa protasis.
- source_word: גָּמַלְתִּי
  english_pob_choice: I have repaid
  chosen_spanish: he pagado
  alternatives_spanish:
  - he retribuido
  - he correspondido
  lexicon: HALOT
  rationale: El verbo puede expresar tratar a alguien conforme a lo recibido o devolverle algo en reciprocidad. «He pagado» conserva la idea de retribución moral y resulta natural en español; «he correspondido» podría suavizar demasiado el matiz de reciprocidad/repago.
- source_word: שׁוֹלְמִי
  english_pob_choice: the one at peace with me
  chosen_spanish: al que estaba en paz conmigo
  alternatives_spanish:
  - a mi aliado
  - a mi amigo
  - al que vivía en paz conmigo
  lexicon: HALOT
  rationale: La forma remite a una relación de paz/armonía, no necesariamente a una amistad formal. «El que estaba en paz conmigo» mantiene ese valor relacional sin introducir una interpretación más específica de la necesaria.
- source_word: רָע
  english_pob_choice: with evil
  chosen_spanish: con maldad
  alternatives_spanish:
  - con mal
  - con maldad/daño
  - con daño
  lexicon: HALOT
  rationale: Aquí funciona como el contenido de la retribución. «Con maldad» conserva el valor moral y suena más natural que un calco literal rígido.
- source_word: וָאֲחַלְּצָה
  english_pob_choice: or delivered
  chosen_spanish: o he despojado
  alternatives_spanish:
  - o he entregado
  - o he rescatado
  - o he librado
  lexicon: HALOT
  rationale: El hebreo admite la lectura de «sacar/liberar», pero el contexto del paralelismo puede entenderse como una acción hostil. Para no borrar esa tensión textual, el texto principal adopta una lectura que preserve la serie de ofensas negadas, mientras se deja abierta la alternativa de rescate en la nota.
- source_word: צוֹרְרִי
  english_pob_choice: my enemy
  chosen_spanish: a mi enemigo
  alternatives_spanish:
  - a mi adversario
  - a mi opresor
  - a mi rival
  lexicon: HALOT
  rationale: El participio sustantivado denota hostilidad activa. «Mi enemigo» es la equivalencia más clara y ampliamente comprensible en español.
- source_word: רֵיקָם
  english_pob_choice: for nothing
  chosen_spanish: sin causa
  alternatives_spanish:
  - en vano
  - de balde
  - vacío
  lexicon: HALOT
  rationale: En este contexto la expresión puede significar «sin causa» o «sin motivo justo». «Sin causa» captura mejor la idea de injusticia que motiva el juramento, aunque la nota preserve la lectura alternativa relacionada con rescate «sin causa»/«de balde».
theological_decisions:
- issue: Sentido de וָאֲחַלְּצָה צוֹרְרִי רֵיקָם
  english_pob_reading: or delivered my enemy for nothing
  chosen_spanish_reading: o he despojado a mi enemigo sin causa
  alternative_spanish_readings:
  - o he librado a mi enemigo sin causa
  - o he rescatado a mi enemigo sin causa
  rationale: 'El hebreo es difícil y admite una lectura positiva («liberar/rescatar») o una negativa («despojar/arrancar»). La edición inglesa POB mantuvo la posibilidad de «delivered» en nota. En español, conviene dejar visible la tensión: el texto principal sigue la lectura que mejor conserva el paralelismo de faltas negadas, mientras la nota señala la alternativa de rescate para no cerrar indebidamente el hebreo.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretiva cuando el texto fuente la permite, en vez de resolverla silenciosamente.'
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció «the one at peace with me» y volvió a «delivered» para reflejar יותר fielmente ואחלצה. Esta versión española mantiene la precisión relacional de שׁוֹלְמִי y refleja la misma tensión de traducción en torno a ואחלצה mediante una lectura principal hostil con nota alternativa de rescate.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto, conforme a la política del proyecto.
  - Se evita «SEÑOR» como sustituto automático; no aplica en este versículo.
  - «En paz conmigo» mantiene la relación semítica de shalom sin convertirla en un título amistoso más interpretativo.
  - La frase final «sin causa» conserva la ambigüedad relevante de רֵיקָם entre falta de motivo y vaciedad/resultado nulo, pero aquí se orienta por el contexto judicial del juramento.
