translation:
  language: es
  text: No subieron[a] a las brechas ni levantaron un muro para la casa de Israel, para que pudiera mantenerse firme en la batalla en el día de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las brechas». El hebreo se refiere a roturas en una muralla, siguiendo la imagen defensiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלִיתֶם
  english_pob_choice: gone up
  chosen_spanish: subiste
  alternatives_spanish:
  - subiste a
  - subiste en
  - fuiste
  lexicon: HALOT
  rationale: עלה conserva la imagen concreta de subir hacia un punto vulnerable; en español, «subir a» comunica la misma acción física sin volverla abstracta. Aquí se mantiene la fuerza de reproche dirigida a quienes debían acudir al lugar de ruptura.
- source_word: בַּפְּרָצוֹת
  english_pob_choice: into the breaches
  chosen_spanish: a las brechas
  alternatives_spanish:
  - en las brechas
  - a las grietas
  - en los boquetes
  lexicon: HALOT
  rationale: פרצות refiere a aperturas o roturas en una muralla. «Brechas» preserva el campo militar/defensivo de la imagen y suena natural en español bíblico contemporáneo.
- source_word: וַתִּגְדְּרוּ גָדֵר
  english_pob_choice: built up a wall
  chosen_spanish: levantaste un muro
  alternatives_spanish:
  - reparaste un muro
  - edificaste un muro
  - cerraste una cerca
  lexicon: HALOT
  rationale: La construcción verbal intensifica la acción de cerrar una ruptura defensiva. «Levantar un muro» conserva la metáfora fortificada mejor que «cerca», que sería demasiado débil y menos solemne en español.
- source_word: עַל בֵּית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - por la casa de Israel
  - sobre la casa de Israel
  - a favor de la casa de Israel
  lexicon: HALOT
  rationale: Aquí עַל funciona con sentido de propósito/protección en el marco de la imagen militar. «Para la casa de Israel» refleja bien la relación de beneficio y resguardo sin forzar una imagen espacial que en español sonaría menos natural que en inglés.
- source_word: לַעֲמֹד
  english_pob_choice: so that it might stand
  chosen_spanish: para que ella pudiera mantenerse firme
  alternatives_spanish:
  - para que pudiera permanecer
  - para que resistiera
  - para estar firme
  lexicon: HALOT
  rationale: El infinitivo marca finalidad. «Mantenerse firme» comunica la idea de resistencia/estabilidad en contexto de asedio, y «ella» retoma de manera natural a «la casa de Israel» como colectivo singular.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en guerra
  - en el combate
  - en la lucha
  lexicon: HALOT
  rationale: «Batalla» conserva la concreción bélica inmediata del texto y evita suavizarlo con un término más general como «guerra».
- source_word: בְּיוֹם יְהוָה
  english_pob_choice: on the day of Yahweh
  chosen_spanish: en el día de Yahvé
  alternatives_spanish:
  - para el día de Yahvé
  - en el día de Yahweh
  - en aquel día de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión profética fija y el nombre divino según el criterio del proyecto. «En el día de Yahvé» mantiene el valor escatológico/judicial sin sustituir el nombre por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en vez de un sustituto titulado.
theological_decisions:
- issue: Imagen militar aplicada a la responsabilidad profética
  english_pob_reading: Retain the concrete imagery of breaches, wall, battle, and day of Yahweh rather than paraphrasing it into abstract spiritual failure.
  chosen_spanish_reading: Conservar las imágenes concretas de brechas, muro, batalla y día de Yahvé, sin convertir la reprensión en una paráfrasis abstracta.
  alternative_spanish_readings:
  - No defendieron a Israel para que sobreviviera al juicio.
  - No hicieron lo necesario para proteger a Israel espiritualmente.
  rationale: La metáfora de fortificación es central al reproche del profeta; mantenerla permite que el lector perciba tanto la imagen bélica como su carga teológica sin introducir interpretación de más.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el patrón de equivalencia documental del proyecto para el nombre divino, evitando la sustitución reverencial que borra el nombre propio.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión que prefería «para la casa de Israel» frente a una formulación espacial más literal. También evita cualquier nota sin anclaje textual: la alternativa sobre בַּפְּרָצוֹת queda marcada directamente en «brechas[a]».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conservó el singular colectivo «la casa de Israel» y su referencia pronominal con «ella» para reflejar el sustantivo hebreo como entidad colectiva.
  - Se eligió «muro» y no «cerca» por la imaginería fortificada del verso.
  - La nota [a] está anclada explícitamente en «brechas[a]» para cumplir la validación de footnotes.
