translation:
  language: es
  text: Porque, he aquí[a], los que están lejos de ti perecerán; destruyes a todos los que te son infieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todos los que se prostituyen de ti», metáfora hebrea de infidelidad espiritual o de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa con el verso precedente; «Porque» conserva bien ese valor en español natural y litúrgicamente digno.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: Es una partícula deíctica de énfasis. En español, «mira» comunica la llamada de atención sin sonar arcaizante como «he aquí».
- source_word: רְחֵקֶיךָ
  english_pob_choice: those far from you
  chosen_spanish: los que están lejos de ti
  alternatives_spanish:
  - los lejanos de ti
  - los alejados de ti
  lexicon: HALOT
  rationale: La forma sustantivada plural describe personas caracterizadas por distancia relacional respecto de Dios. «Los que están lejos de ti» mantiene ese sentido relacional con español claro.
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - serán destruidos
  lexicon: HALOT
  rationale: Verbo de ruina o perdición; «perecerán» conserva el peso poético y la idea de venir a ruina.
- source_word: הִצְמַתָּה
  english_pob_choice: you destroy
  chosen_spanish: destruyes
  alternatives_spanish:
  - has destruido
  - pones fin a
  lexicon: HALOT
  rationale: El hifil expresa causar destrucción o poner fin. El presente gnómico «destruyes» sigue la fuerza proverbial/poética del hebreo y el valor asegurado del enunciado.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno de
  - a todos los
  lexicon: HALOT
  rationale: Conservar el alcance total de la expresión hebrea dentro de una construcción española natural con objeto directo.
- source_word: זוֹנֶה
  english_pob_choice: who are unfaithful
  chosen_spanish: que te son infieles
  alternatives_spanish:
  - que se prostituyen
  - que cometen infidelidad
  lexicon: HALOT
  rationale: El participio es metafórico para infidelidad espiritual o de pacto, no meramente sexual. «Te son infieles» transmite el valor relacional sin crudeza innecesaria.
- source_word: מִמֶּךָּ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - de ti
  - contra ti
  lexicon: HALOT
  rationale: Con זנה, la preposición marca al destinatario de la infidelidad; en español, el dativo «te» es más idiomático que repetir «de ti» en la frase final.
theological_decisions:
- issue: Sentido metafórico de זנה respecto de Dios
  english_pob_reading: Render as covenantal/spiritual unfaithfulness rather than literal prostitution
  chosen_spanish_reading: infidelidad de pacto o espiritual expresada como deslealtad a Dios
  alternative_spanish_readings:
  - prostitución espiritual
  - fornicación contra ti
  rationale: El contexto del salmo trata de cercanía y lejanía respecto de Dios, por lo que la metáfora apunta a apostasía o infidelidad de pacto. La redacción española preserva esa tensión sin convertirla en un vulgarismo ni borrar la imagen.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje hebreo masorético y el audit trail inglés; la revisión más reciente no introdujo cambios y el estado de concordancia fue alto. No se detectaron variantes textuales que obligaran a una nota crítica en la versión española.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el pronombre «ti», conforme al contexto salmódico y al audit trail inglés.
  - Se evitó «SEÑOR» porque el versículo no contiene יהוה explícito en esta línea; la referencia es relacional en segunda persona.
  - Se prefirió un presente gnómico («destruyes») para reflejar la fuerza poética y sentenciosa del hebreo.
