  · / ⲧⲉⲧⲛⲥⲱⲧⲙ ⲉⲣⲟⲓ … ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ ϩⲛ ⲟⲩⲡ… ⲉⲧⲉⲧⲛⲧⲁⲩⲟ”. I read ⲡⲱϣⲥ ⲙ̄ⲡⲁⲣⲁⲛ as “the sound
  of my name,” ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ as “I am undefiled,” and ⲁⲛⲟⲕ ⲉⲧⲥⲱⲧⲙ̄ as “I am the one
