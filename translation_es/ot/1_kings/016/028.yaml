translation:
  language: es
  text: Y Omri durmió con sus padres[a] y fue sepultado en Samaria, y Acab su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», expresión convencional de muerte en las narraciones reales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En la fórmula real de muerte y sucesión, el hebreo usa un eufemismo convencional. «Durmió» conserva ese giro idiomático en español sin perder la claridad narrativa, y refleja la opción del POB inglés por mantener la imagen verbal del texto fuente.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres/padres ancestrales
  lexicon: HALOT
  rationale: En español, «sus padres» reproduce de manera natural la fórmula dinástica de muerte/sepultura. «Antepasados» aclararía el sentido, pero suaviza la repetición tradicional del hebreo; por eso se prefiere la expresión más cercana al paralelo original.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue sepultado en
  lexicon: HALOT
  rationale: El pasivo hebreo se rinde naturalmente con una pasiva española. «Sepultado» es formal y bíblicamente adecuado; «enterrado» sería posible, pero menos elevado para un registro narrativo real.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en Samaria, la capital
  lexicon: HALOT
  rationale: La preposición locativa ב se expresa de forma directa con «en». No hay razón textual para ampliar el topónimo con explicaciones que el hebreo no ofrece.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: En la fórmula de sucesión, «reinó» es la forma más directa y natural en español, y conserva el valor factual del wayyiqtol sin añadir un matiz inceptivo no explicitado por el hebreo.
- source_word: בְּנ֖וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El posesivo español basta para expresar la relación filial sin sobrecargar el sintagma.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - como sucesor suyo
  lexicon: HALOT
  rationale: La locución marca sucesión dinástica. «En su lugar» es la equivalencia idiomática más natural en español y preserva la idea de reemplazo sin reinterpretarla.
theological_decisions:
- issue: Fórmula de muerte real y continuidad dinástica
  english_pob_reading: 'The verse uses a conventional royal formula: Omri ''slept with his fathers'' and Ahab reigned in his place.'
  chosen_spanish_reading: Omrí «durmió con sus padres» y Ahab «reinó en su lugar», manteniendo la fórmula convencional de muerte y sucesión.
  alternative_spanish_readings:
  - Omrí murió y fue sepultado en Samaria, y Ahab reinó después de él.
  - Omrí descansó con sus antepasados...
  rationale: La versión española conserva el giro formulaico y la secuencia de reemplazo, porque el valor literario del hebreo está precisamente en esa expresión fija. Traducir solo «murió» borraría la tensión entre eufemismo y relato dinástico que el texto presenta.
  doctrine_reference: Narrativa histórica / fórmulas reales de la monarquía israelita
translation_notes:
  revision_awareness: Se revisó el tramo frente al audit trail inglés y no se detectaron cambios posteriores aplicados; la solución sigue la lectura estable del POB para una fórmula real convencional, con equivalencia idiomática natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se usa «reinó» y «en su lugar» para conservar la fórmula sucesoria sin expansión interpretativa.
  - «Durmió con sus padres» se deja como giro idiomático reconocible, con nota explicativa para lectores que prefieran una lectura menos literal.
