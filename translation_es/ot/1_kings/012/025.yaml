translation:
  language: es
  text: Entonces Jeroboam edificó Siquem en la región montañosa de Efraín y habitó allí; y salió de allí y edificó Penuel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Penuel también aparece escrito Peniel en algunas traducciones y en pasajes bíblicos relacionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  - fortificó
  lexicon: HALOT
  rationale: En español, "edificar" comunica con naturalidad la acción de construir una ciudad o establecimiento. Mantiene el sentido básico de בנה sin añadir la especificación de 'fortificar' ni la de 'reconstruir' que el hebreo no exige aquí.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Sichem
  lexicon: Nombre propio bíblico estándar
  rationale: Se translitera al uso bíblico en español como "Siquem", forma reconocible y fiel al nombre propio hebreo.
- source_word: בְּהַר אֶפְרַיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la tierra montañosa de Efraín
  - en los montes de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: הַר puede referirse a una zona montañosa, no solo a un monte singular. "Región montañosa" expresa mejor esa extensión geográfica en español que "monte", que podría sonar demasiado puntual.
- source_word: וַיֵּשֶׁב בָּהּ
  english_pob_choice: and lived there
  chosen_spanish: y habitó allí
  alternatives_spanish:
  - y vivió allí
  - y se estableció allí
  - y moró allí
  lexicon: HALOT
  rationale: '"Habitar" conserva el valor de residencia de ישב con un registro bíblico sobrio en español. "Allí" evita reproducir mecánicamente el sufijo femenino del hebreo y sigue el sentido idiomático del inglés auditado.'
- source_word: וַיֵּצֵא מִשָּׁם
  english_pob_choice: and he went out from there
  chosen_spanish: luego salió de allí
  alternatives_spanish:
  - y salió de allí
  - y partió de allí
  - y se fue de allí
  lexicon: HALOT
  rationale: '"Salir de allí" preserva el movimiento literal de יצא. "Luego" refleja la secuencia narrativa del hebreo con naturalidad en español.'
- source_word: פְּנוּאֵל
  english_pob_choice: Penuel
  chosen_spanish: Penuel
  alternatives_spanish:
  - Peniel
  lexicon: Nombre propio bíblico estándar
  rationale: Se conserva la forma consonántica representada en el texto fuente, "Penuel". La variante "Peniel" queda como alternativa tradicional en nota.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en alto acuerdo; no se detectan revisiones aplicadas ni cambios pendientes. La versión española sigue la misma decisión principal de la POB inglesa: traducir בנה de forma no especificada como construcción general, mantener el topónimo y conservar el flujo narrativo lineal.'
  spanish_consistency_notes:
  - Se mantiene "Siquem" como forma bíblica estándar en español.
  - Se conserva "Penuel" por correspondencia directa con el hebreo consonántico, con nota sobre la variante "Peniel".
  - '"Habitó allí" evita arcaísmos excesivos pero conserva un registro bíblico elevado.'
  - '"Región montañosa de Efraín" refleja el valor geográfico de הַר sin reducirlo a un monte aislado.'
