translation:
  language: es
  text: Así pues[a], he aclarado todo lo que debía presentarse al rey, y él concedió lo que era posible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este versículo suena como una conclusión editorial o epistolar en primera persona («he aclarado...»), algo abrupta en el contexto; la traducción sigue el texto tal como está transmitido en Swete.
    reason: textual_variant
lexical_decisions:
- source_word: ὅσα μὲν οὖν
  english_pob_choice: So then, whatever
  chosen_spanish: Así pues, todo lo que
  alternatives_spanish:
  - Por tanto, todo lo que
  - Ahora bien, todo lo que
  lexicon: LSJ
  rationale: La fórmula introduce una conclusión/resumen. «Así pues» conserva bien el valor inferencial de οὖν sin sonar artificial; «todo lo que» expresa con naturalidad el relativo neutro plural.
- source_word: ἔδει
  english_pob_choice: had to be
  chosen_spanish: debía
  alternatives_spanish:
  - tenía que
  - era necesario
  lexicon: BDAG
  rationale: El imperfecto de δεῖ expresa necesidad u obligación en perspectiva pasada. «Debía» transmite esa obligación de forma natural en español y mantiene la fuerza de necesidad.
- source_word: τῷ βασιλεῖ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - para el rey
  lexicon: LSJ
  rationale: El dativo con el infinitivo pasivo de προσφέρω aquí funciona como destinatario de lo presentado. «Al rey» es la solución más directa y fiel en español.
- source_word: προσενεχθῆναι
  english_pob_choice: be presented
  chosen_spanish: presentarse
  alternatives_spanish:
  - ser llevado delante
  - ser sometido
  lexicon: LSJ
  rationale: En un contexto administrativo, el verbo indica llevar o someter asuntos ante una autoridad. El infinitivo pasivo se vierte con el giro impersonal «debía presentarse» para conservar el registro formal sin calco pesado.
- source_word: διεσάφησα
  english_pob_choice: I have made clear
  chosen_spanish: he aclarado
  alternatives_spanish:
  - he explicado con detalle
  - he dejado claro
  lexicon: LSJ
  rationale: El verbo expresa aclarar o exponer distintamente. «He aclarado» conserva el valor de explicación completa y evita sobredeterminar el matiz con ampliaciones innecesarias.
- source_word: ἃ δὲ ἦν ἐνδεχόμενα
  english_pob_choice: what was possible
  chosen_spanish: lo que era posible
  alternatives_spanish:
  - lo que era factible
  - lo que podía hacerse
  lexicon: LSJ
  rationale: ἐνδεχόμενα señala lo posible o factible. En español, «lo que era posible» reproduce bien el alcance neutro del relativo y su sentido colectivo.
- source_word: συνεχώρησεν
  english_pob_choice: he granted
  chosen_spanish: concedió
  alternatives_spanish:
  - permitió
  - accedió
  lexicon: LSJ
  rationale: El verbo puede significar permitir, conceder o ceder. Aquí, en relación con un rey que responde favorablemente, «concedió» refleja mejor el matiz administrativo y de autorización.
theological_decisions:
- issue: Redacción del sujeto implícito y primera persona del verbo «διεσάφησα»
  english_pob_reading: The Greek of this verse reads like a first-person editorial or epistolary conclusion ('I have made clear...'), which is somewhat abrupt in context; the translation follows the source as transmitted in Swete.
  chosen_spanish_reading: 'He mantenido la primera persona: «he aclarado».'
  alternative_spanish_readings:
  - lo dejó claro
  - se dejó claro
  rationale: El griego transmitido presenta una primera persona explícita; no conviene suavizarla a impersonal o tercera persona porque borraría una tensión textual documentada en el testimonio base.
  doctrine_reference: Principio de fidelidad textual y respeto al testimonio transmitido
