  rationale: Se corrige el nombre propio a la forma española establecida «Booz», se reemplaza la expresión poco idiomática «a su joven» por «a su joven servidor» para mayor claridad y naturalidad, y se añade la nota alternativa sobre la afiliación/pertenencia implícita en לְמִי, ya documentada en la auditoría inglesa.
