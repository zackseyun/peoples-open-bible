base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/025.yaml
  text: by the God of your father[a], who will help you, and by the Almighty, who will bless you with blessings of heaven above, blessings of the deep lying beneath[b], blessings of breasts and womb.
  footnotes:
  - marker: a
    text: Or 'from the God of your father ... and with the Almighty.' The Hebrew prepositions and the particle before 'the Almighty' are syntactically compressed, and the line may be understood as source, agency, or close apposition.
    reason: alternative_reading
  - marker: b
    text: Or 'the deep crouching below.' The Hebrew verb can mean 'lying down' or 'crouching.'
    reason: lexical_alternative
