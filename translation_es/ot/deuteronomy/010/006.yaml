translation:
  language: es
  text: Entonces los hijos de Israel partieron de Beerot Bene-jaacán[a] a Moserá. Allí murió Aarón, y allí fue sepultado; y Eleazar, su hijo, ejerció el sacerdocio en su lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beerot Bene-jaacán puede entenderse literalmente como «los pozos de los hijos de Jaacán», pero aquí se conserva como nombre de lugar por transliteración.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Eleazar, su hijo, ejerció el sacerdocio después de él». El hebreo dice literalmente «en su lugar», indicando sucesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  english_pob_choice: Now the sons of Israel
  chosen_spanish: Entonces los hijos de Israel
  alternatives_spanish:
  - Y los hijos de Israel
  - Los israelitas
  lexicon: HALOT
  rationale: La expresión hebrea conserva una forma genealógico-nacional que en español se puede rendir naturalmente como «los hijos de Israel». «Entonces» reproduce la función de transición narrativa de ו en este contexto, sin perder el valor de enlace.
- source_word: נָסְעוּ
  english_pob_choice: journeyed
  chosen_spanish: partieron
  alternatives_spanish:
  - viajaron
  - se pusieron en camino
  lexicon: HALOT
  rationale: En el contexto del itinerario del desierto, נסע implica levantar el campamento y avanzar. «Partieron» comunica ese movimiento concreto con mayor naturalidad que un simple «viajaron».
- source_word: מִ/בְּאֵרֹ֥ת בְּנֵי יַעֲקָ֖ן
  english_pob_choice: from Beeroth Bene-jaakan
  chosen_spanish: de Beerot Bene-jaacán
  alternatives_spanish:
  - de las pozos de los hijos de Jaacán
  - de Beerot de los hijos de Jaacán
  lexicon: HALOT
  rationale: Siguiendo el criterio auditado de la POB inglesa, el sintagma se trata como topónimo y se translitera. En español, «Beerot Bene-jaacán» mantiene la forma nominal del lugar sin forzar una traducción literal que podría oscurecer el itinerario.
- source_word: מוֹסֵרָה
  english_pob_choice: to Moserah
  chosen_spanish: a Moserá
  alternatives_spanish:
  - hasta Moserá
  - a Moserah
  lexicon: HALOT
  rationale: Aunque no hay preposición explícita antes del topónimo, el verbo de movimiento y el valor del itinerario justifican en español una meta introducida con «a». La transliteración «Moserá» conserva el nombre propio.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - allí mismo
  lexicon: HALOT
  rationale: El adverbio locativo se repite con énfasis en el hebreo. «Allí» refleja bien esa repetición y su función de anclaje espacial.
- source_word: מֵת אַהֲרֹן
  english_pob_choice: Aaron died
  chosen_spanish: murió Aarón
  alternatives_spanish:
  - Aarón murió
  - allí murió Aarón
  lexicon: HALOT
  rationale: El hebreo presenta el adverbio antes del verbo y del sujeto; en español se mantiene el sujeto posverbal en la primera cláusula narrativa anterior y aquí se opta por una sintaxis natural que conserva el hecho sin sobrecargar el orden.
- source_word: וַ/יִּקָּבֵר
  english_pob_choice: he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - lo sepultaron
  lexicon: HALOT
  rationale: El nifal es pasivo; «fue sepultado» preserva ese valor y suena sobrio y bíblico en español moderno. «Sepultado» es preferible a un activo no respaldado por la forma verbal.
- source_word: וַ/יְכַהֵן
  english_pob_choice: served as priest
  chosen_spanish: ejerció el sacerdocio
  alternatives_spanish:
  - sirvió como sacerdote
  - ofició como sacerdote
  lexicon: HALOT
  rationale: כהן como verbo indica desempeñar funciones sacerdotales. «Ejerció el sacerdocio» comunica la acción continuada y evita la posible ambigüedad de «se hizo sacerdote», que introduciría un matiz no presente en el verbo.
- source_word: אֶלְעָזָר בְּנ֖/וֹ תַּחְתָּֽי/ו
  english_pob_choice: Eleazar his son served as priest in his place
  chosen_spanish: Eleazar, su hijo, ejerció el sacerdocio en su lugar
  alternatives_spanish:
  - Eleazar, su hijo, sirvió como sacerdote después de él
  - Eleazar, su hijo, ejerció el sacerdocio en vez de él
  lexicon: HALOT
  rationale: תחתיו expresa sucesión e inversión de cargo, literalmente «en lugar de él». «En su lugar» preserva esa fuerza de reemplazo sin caer en arcaísmos; además, se mantiene la relación filial explícita del hebreo.
theological_decisions:
- issue: Sucesión sacerdotal de Aarón a Eleazar
  english_pob_reading: Eleazar his son served as priest in his place.
  chosen_spanish_reading: Eleazar, su hijo, ejerció el sacerdocio en su lugar.
  alternative_spanish_readings:
  - Eleazar, su hijo, sirvió como sacerdote después de él
  - Eleazar, su hijo, ejerció el sacerdocio en vez de él
  rationale: La frase subraya sucesión, no mera cronología. «En su lugar» conserva la noción de reemplazo institucional implícita en תחתיו, sin añadir interpretaciones externas.
  doctrine_reference: Nm 20:28; Dt 10:6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada de la POB inglesa y mantiene sus dos decisiones clave: tratar Beeroth Bene-jaakan como topónimo transliterado y conservar el valor de sucesión de תחתיו en la cláusula final. No se registran revisiones aplicadas en el paquete inglés, por lo que no hay cambios de revisión que incorporar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene «hijos de Israel» para conservar la fórmula hebrea, en vez de sustituirla por «israelitas».
  - Se elige «sepultado» por su tono bíblico sobrio y por su fidelidad al pasivo hebreo.
  - La transliteración de los topónimos sigue el criterio auditado para nombres de lugar no traducidos.
