review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido general del hebreo: Job niega haber privado a los pobres de lo que deseaban/necesitaban y haber hecho desfallecer los ojos de la viuda. Sin embargo, la forma verbal española ''Si yo hubiera retenido'' introduce una construcción contrafactual más marcada de lo necesario; en esta secuencia de juramento de inocencia conviene una forma más directa que preserve la revisión de conducta pasada sin sonar irreal. También conviene mejorar la preposición con ''privado a los pobres de...'' para representar con más naturalidad מנע + מן.'
  spanish_quality_summary: El español es claro y digno, pero 'retenido de los pobres' suena poco natural. 'Privado a los pobres de lo que deseaban' fluye mejor y conserva el sentido. La segunda mitad está bien lograda; 'hecho desfallecer los ojos de la viuda' es natural y mantiene el modismo. Las notas son útiles, aunque la nota a debe ajustarse al nuevo anclaje y evitar repetir exactamente la redacción principal como alternativa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'los pobres', 'la viuda' y el tratamiento del modismo hebreo son adecuados. No hay nombres divinos ni términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: Construcción verbal demasiado contrafactual en 'Si yo hubiera retenido'
    rationale: El hebreo אִם + yiqtol en esta sección introduce la condición del juramento de Job. En español bíblico natural aquí funciona mejor 'Si privé' o 'Si he privado' que un pluscuamperfecto de subjuntivo, que suena más irreal/hipotético de lo necesario.
  - severity: medium
    issue: Expresión poco natural 'retenido de los pobres'
    rationale: Aunque intenta seguir de cerca מנע מן, en español 'retener de alguien' es forzado. 'Privar a alguien de algo' representa mejor la relación semántica y mejora la legibilidad sin perder precisión.
  - severity: low
    issue: Nota a redundante con la redacción principal
    rationale: Si el texto principal usa 'lo que deseaban', la nota no debe ofrecer exactamente la misma frase como alternativa principal; debe resaltar otras posibilidades léxicas, como 'su deseo' o 'lo que necesitaban' por contexto.
  revised_spanish_text: Si privé[a] a los pobres de lo que deseaban, o hice desfallecer los ojos de la viuda[b],
