translation:
  language: es
  text: Vean que no he trabajado para mí solo[a], sino para todos los que la buscan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vean que no trabajé para mí solo, sino para todos los que la buscan».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἴδετε
  english_pob_choice: See that
  chosen_spanish: Vean que
  alternatives_spanish:
  - Vean
  - Miren
  - Consideren
  lexicon: LSJ
  rationale: El imperativo plural ἴδετε funciona como una apelación a que la audiencia reconozca un hecho. «Vean que» conserva ese tono exhortativo de forma natural en español.
- source_word: οὐκ ἐμοὶ μόνῳ
  english_pob_choice: not for myself alone
  chosen_spanish: no he trabajado para mí solo
  alternatives_spanish:
  - no he trabajado solo para mí
  - no he trabajado para mí solamente
  - no he trabajado para mi propio beneficio
  lexicon: LSJ
  rationale: La combinación expresa beneficio exclusivo; en español, «para mí solo» conserva la exclusividad y suena más idiomático que una versión demasiado literal.
- source_word: ἐκοπίασα
  english_pob_choice: I have labored
  chosen_spanish: he trabajado
  alternatives_spanish:
  - he laborado
  - he fatigado
  - trabajé
  lexicon: LSJ
  rationale: El aoristo griego presenta una labor ya cumplida con efecto vigente. «He trabajado» comunica mejor ese resultado presente que un simple pasado, y evita un calco duro.
- source_word: ἀλλὰ πᾶσι
  english_pob_choice: but for all
  chosen_spanish: sino para todos
  alternatives_spanish:
  - sino para todos
  - sino para todos los demás
  - sino para toda la gente
  lexicon: LSJ
  rationale: El contraste con la primera mitad requiere «sino». «Para todos» preserva la amplitud del beneficio sin sobreespecificar.
- source_word: τοῖς ἐκζητοῦσιν
  english_pob_choice: who seek
  chosen_spanish: los que buscan
  alternatives_spanish:
  - los que diligentemente buscan
  - los que procuran
  - los que indagan
  lexicon: LSJ
  rationale: ἐκζητέω intensifica la idea de buscar, pero en español «los que buscan» transmite bien la categoría del grupo sin agregar énfasis no explicitado por el contexto inmediato.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la buscan
  alternatives_spanish:
  - la buscan
  - buscan a ella
  - la buscan a ella
  lexicon: LSJ
  rationale: El pronombre retoma a la Sabiduría personificada en femenino. El español permite mantener ese referente con el clítico «la» sin volverla abstracta como «lo» o «it».
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Translate as 'her,' referring to personified Wisdom
  chosen_spanish_reading: Conservar el femenino implícito de la Sabiduría con «la buscan»
  alternative_spanish_readings:
  - «lo buscan» si se tratara de sabiduría abstracta
  - «la Sabiduría» explícita para despejar el referente
  rationale: Sirácide 24 presenta a la Sabiduría como figura personificada y femenina. El español puede preservar esa textura mediante el pronombre femenino, sin añadir una glosa innecesaria al texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; preservar el sentido del स्रोत y el género cuando el contexto lo requiere
translation_notes:
  revision_awareness: El audit trail inglés mantiene el presente perfecto («have not labored») tras revisión, aunque admite como alternativa el pasado simple. En español se eligió un perfecto compuesto equivalente («he trabajado») para reflejar una acción completada con relevancia presente, acorde con la revisión más reciente y con el uso natural del español.
  spanish_consistency_notes:
  - Se usó «Sabiduría» implícita y femenino en «la buscan», coherente con la personificación de Sirácides 24.
  - Se evitó «Señor» o fórmulas de ocultamiento del referente, porque aquí no aparece el nombre divino sino la Sabiduría personificada.
  - «Trabajado» se prefirió sobre «laborado» por claridad y naturalidad en español bíblico moderno.
