translation:
  language: es
  text: ¿juicio[a], y vengarás a nuestros hermanos? Nosotros nos complacemos en servir a tu padre y en caminar conforme a lo que él dice[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego comienza a mitad de oración en esta transmisión; «juicio» probablemente continúa un pensamiento procedente de la cláusula anterior.
    reason: textual_variant
  - marker: b
    text: O «vindicar a nuestros hermanos». El verbo griego puede denotar tanto venganza como procurar justicia para alguien.
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente «caminar conforme a las cosas dichas por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - justicia
  - sentencia
  - caso jurídico
  lexicon: LSJ
  rationale: El contexto griego es fragmentario y la frase conserva el comienzo de un pensamiento interrumpido; «juicio» reproduce el sentido formal de κρίσιν sin fijar en exceso una matiz legal que el fragmento no explicita.
- source_word: ἐκδικήσεις
  english_pob_choice: avenge
  chosen_spanish: vengarás
  alternatives_spanish:
  - vindicarás
  - harás justicia a
  - reivindicarás
  lexicon: LSJ
  rationale: El verbo puede expresar venganza o vindicación. En español, «vengarás» conserva la fuerza inmediata del verbo y su relación directa con «nuestros hermanos», sin borrar la tensión entre represalia y justicia.
- source_word: τοὺς ἀδελφοὺς ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros hermanos y compañeros
  lexicon: LSJ
  rationale: Se mantiene el sustantivo literal «hermanos» como en el griego, porque el proyecto preserva el valor léxico de ἀδελφοί; el contexto sugiere compatriotas o correligionarios, pero eso no debe ocultarse en la traducción principal.
- source_word: εὐδοκοῦμεν
  english_pob_choice: We are pleased
  chosen_spanish: nos complacemos
  alternatives_spanish:
  - estamos dispuestos
  - nos place
  - estamos contentos
  lexicon: LSJ
  rationale: «Nos complacemos» transmite la disposición favorable de εὐδοκοῦμεν con un registro digno y claro en español. Evita sobreactuar la idea de voluntad pura o de mera emoción.
- source_word: δουλεύειν
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - ser esclavos de
  - estar sujetos a
  lexicon: LSJ
  rationale: Aunque δουλεύειν puede llevar fuerza de esclavitud, aquí la relación es de lealtad política al padre del rey; «servir» respeta el contexto y sigue la decisión inglesa de no cargar el término con esclavitud no explicitada.
- source_word: τῷ πατρί σου
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre
  - a vuestro padre
  lexicon: LSJ
  rationale: La construcción dativa se rinde de forma directa y natural con «a tu padre». Mantiene la referencia personal sin ampliaciones interpretativas.
- source_word: πορεύεσθαι
  english_pob_choice: to walk
  chosen_spanish: caminar
  alternatives_spanish:
  - andar
  - conductarnos
  - proceder
  lexicon: LSJ
  rationale: En combinación con lo que sigue, el verbo conserva la metáfora de conducta vital; «caminar» es la opción más transparente y sobria en español, sin perder el matiz figurado.
- source_word: τοῖς ὑπʼ αὐτοῦ λεγομένοις
  english_pob_choice: according to what is said by him
  chosen_spanish: conforme a lo que es dicho por él
  alternatives_spanish:
  - según lo que él dice
  - de acuerdo con sus palabras
  - conforme a sus mandatos
  lexicon: LSJ
  rationale: La frase griega dice literalmente «las cosas dichas por él». Se conserva la pasiva perifrástica «es dicho» para no intensificar el sentido hacia «mandatos»; la expresión «conforme a» comunica bien la idea de vivir o andar según sus dichos.
theological_decisions:
- issue: Sentido de ἐκδικήσεις entre venganza y vindicación
  english_pob_reading: avenge / vindicate our brothers
  chosen_spanish_reading: vengar a nuestros hermanos
  alternative_spanish_readings:
  - vindicar a nuestros hermanos
  - hacer justicia a nuestros hermanos
  rationale: El griego permite tanto una idea retributiva como una de vindicación. En el texto principal se conserva «vengar» porque reproduce la fuerza verbal de manera directa, pero se deja visible la alternativa semántica en nota para no borrar la tensión existente en la fuente.
  doctrine_reference: Equilibrio entre retribución y justicia en el uso léxico bíblico; cf. el valor polisémico de ἐκδικέω en textos helenísticos.
- issue: Carácter fragmentario del inicio del verso
  english_pob_reading: judgment[a], and avenge our brothers?
  chosen_spanish_reading: ¿juicio[a], y vengarás a nuestros hermanos?
  alternative_spanish_readings:
  - ¿juicio, y vengar a nuestros hermanos?
  - ¿juicio, y harás justicia a nuestros hermanos?
  rationale: Se conserva el arranque elíptico con interrogación, porque el testimonio griego comienza a mitad de oración. La traducción no debe completar artificialmente la frase ni ocultar su fragmentariedad textual.
  doctrine_reference: Crítica textual y respeto por la transmisión del texto; el verso inicia en medio de una unidad sintáctica mayor.
- issue: δουλεύειν aplicado al padre del rey
  english_pob_reading: to serve your father
  chosen_spanish_reading: servir a tu padre
  alternative_spanish_readings:
  - ser esclavos de tu padre
  - estar sujetos a tu padre
  rationale: Aunque el campo semántico de δουλεύειν incluye esclavitud, aquí el contexto es político y de lealtad hacia una autoridad real. Traducirlo por «esclavos» exageraría una connotación que el pasaje no necesita forzar.
  doctrine_reference: Política y léxico de servidumbre en griego koiné; principio de no sobretraducir el componente servil cuando el contexto no lo destaca.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que suaviza «what is spoken by him» a «what is said by him» por naturalidad. La versión española refleja esa decisión con una fórmula igualmente natural pero aún suficientemente cercana al griego: «conforme a lo que es dicho por él».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda; este versículo no la contiene.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se preservó la tensión entre «vengar» y «vindicar» mediante nota, en vez de resolverla unilateralmente.
  - Se mantuvo el registro bíblico de «caminar» como metáfora de conducta, sin volverlo arcaizante.
