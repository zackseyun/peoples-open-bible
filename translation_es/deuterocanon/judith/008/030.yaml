review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del rastro de auditoría inglés: contraposición con ''Pero'', sed intensa, coerción del pueblo, cumplimiento de lo previamente dicho y el juramento que no será violado. Sin embargo, en español ''traer sobre nosotros un juramento'' suena poco natural y el propio inglés POB conservó esa literalidad solo con nota alternativa; en español conviene trasladar el sentido idiomático principal sin perder la alternativa literal en nota.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'a traer sobre nosotros un juramento' resulta calcado y torpe en español eclesial contemporáneo. 'A ligarnos con un juramento' o 'a comprometernos con un juramento' comunica mejor el sentido. También la nota actual está formulada con comillas innecesarias al inicio y puede pulirse.
  glossary_alignment: No hay términos del glosario maestro especialmente activados aquí. 'Juramento' para ὅρκον y 'quebrantaremos' para παραβησόμεθα están bien alineados. La revisión propuesta mantiene la decisión auditada preservando la alternativa literal en nota.
  issues:
  - severity: medium
    issue: Calco poco natural en 'a traer sobre nosotros un juramento'
    rationale: Aunque refleja literalmente ἐπαγαγεῖν ἐφʼ ἡμᾶς ὅρκον, en español suena forzado y menos inteligible que una expresión idiomática equivalente. El inglés ya documentó como alternativa interpretativa 'to bind ourselves by an oath'; en español esa opción comunica mejor el sentido principal.
  - severity: low
    issue: Redacción mejorable de la nota al pie
    rationale: La nota comienza con una comilla sobrante y puede expresar con más naturalidad la relación entre la traducción principal y la literal griega.
  revised_spanish_text: Pero el pueblo tuvo muchísima sed, y nos obligaron a hacer como les habíamos dicho, y a ligarnos con un juramento[a] que no quebrantaremos.
  revised_footnotes:
  - marker: a
    text: 'O: «a traer sobre nosotros un juramento». El griego dice literalmente: «a traer sobre nosotros un juramento».'
    reason: lexical_alternative
