translation:
  language: es
  text: 'El aliento de nuestras narices[a], el ungido de Yahvé, fue capturado en sus fosas; de quien dijimos: «Bajo su sombra viviremos entre las naciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus trampas» o «en sus lazos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֤וּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - viento
  lexicon: HALOT
  rationale: En esta expresión idiomática, רוּחַ no designa 'espíritu' ni un 'viento' literal, sino el soplo vital. 'Aliento' conserva la metáfora corporal con naturalidad en español y mantiene la fuerza afectiva de dependencia.
- source_word: אַפֵּינוּ
  english_pob_choice: our nostrils
  chosen_spanish: de nuestras narices
  alternatives_spanish:
  - de nuestro nariz
  - de nuestras fosas nasales
  lexicon: HALOT
  rationale: El hebreo usa el plural constructo con sufijo de primera persona plural. 'De nuestras narices' conserva la imagen corporal de forma directa; 'fosas nasales' sería más técnico pero menos idiomático en un texto poético.
- source_word: מְשִׁיחַ יְהוָה
  english_pob_choice: Yahweh’s anointed
  chosen_spanish: el ungido de Yahvé
  alternatives_spanish:
  - el ungido de Yahweh
  - el Mesías de Yahvé
  lexicon: HALOT
  rationale: מְשִׁיחַ significa literalmente 'ungido'. Aquí el contexto es el rey davídico histórico, no una alusión directa al Mesías escatológico; por eso se mantiene 'ungido'. 'De Yahvé' preserva el nombre divino conforme al estándar español del proyecto.
- source_word: נִלְכַּד
  english_pob_choice: was captured
  chosen_spanish: fue capturado
  alternatives_spanish:
  - fue tomado
  - fue apresado
  lexicon: HALOT
  rationale: El nifal expresa haber sido atrapado o capturado. 'Fue capturado' refleja bien el contexto militar y conserva el sentido de caída en manos enemigas.
- source_word: בִּשְׁחִיתוֹתָם
  english_pob_choice: in their pits
  chosen_spanish: en sus fosas
  alternatives_spanish:
  - en sus trampas
  - en sus lazos
  lexicon: HALOT
  rationale: El sustantivo puede referirse a fosas o a trampas destructivas. 'Fosas' reproduce la imagen concreta del hebreo, mientras que las alternativas reflejan la posible lectura figurada de trampa o lazo, que el inglés POB también preservó en nota.
- source_word: אֲשֶׁר אָמַרְנוּ
  english_pob_choice: he of whom we said
  chosen_spanish: de quien dijimos
  alternatives_spanish:
  - acerca de quien dijimos
  - de quien habíamos dicho
  lexicon: HALOT
  rationale: La cláusula relativa retoma al ungido. 'De quien dijimos' es una construcción natural en español y mantiene la referencia sin recargar la sintaxis.
- source_word: בְּצִלּוֹ
  english_pob_choice: under his shadow
  chosen_spanish: bajo su sombra
  alternatives_spanish:
  - bajo su amparo
  - bajo su protección
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'en/ bajo su sombra'. 'Bajo su sombra' conserva el símil de protección sin explicitarlo demasiado, como pide la traducción fuente.
- source_word: נִחְיֶה
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - viviremos seguros
  - seguiremos con vida
  lexicon: HALOT
  rationale: El verbo significa 'vivir'. En este contexto implica también supervivencia, pero 'viviremos' es la forma más directa y permite que el contexto aporte el matiz de preservación.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם alude aquí a naciones extranjeras. 'Entre las naciones' es claro y evita la connotación excesivamente neotestamentaria de 'gentiles'.
theological_decisions:
- issue: Si מְשִׁיחַ יְהוָה debe sonar como una referencia mesiánica escatológica
  english_pob_reading: Rendered as 'Yahweh’s anointed' referring to the historical Davidic king
  chosen_spanish_reading: '''el ungido de Yahvé'' como referencia al rey davídico histórico'
  alternative_spanish_readings:
  - '''el Mesías de Yahvé'''
  - '''el Cristo de Yahvé'''
  rationale: El contexto inmediato en Lamentaciones habla del rey de Judá capturado, no de una profecía mesiánica directa. Traducir 'ungido' conserva el valor teológico del título sin imponer una lectura cristológica que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3; principio de títulos mesiánicos/ungidos en contexto histórico
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente, que no introdujo cambios respecto del borrador anterior; el consenso de auditoría es de alta concordancia y no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el tetragrámaton, conforme al estándar del proyecto.
  - Se conserva 'ungido' en vez de 'Mesías' para no sobredeterminar el título en este contexto histórico.
  - 'Se opta por lenguaje poético natural pero fiel: ''aliento'', ''sombra'', ''naciones''.'
  - La nota conserva la alternativa lexical relevante para בִּשְׁחִיתוֹתָם, que puede entenderse también como trampas o lazos.
