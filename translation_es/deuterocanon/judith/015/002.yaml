  yaml_path: translation/deuterocanon/judith/015/002.yaml
  text: And terror and fear fell upon them[a], and no man remained standing before his neighbor any longer; but, scattering in all directions[b], they fled along every road of the plain and of the hill country.
  footnotes:
  - marker: a
    text: Or 'dispersing' or more literally 'being poured out'; the Greek pictures the troops breaking apart in panic.
    reason: lexical_alternative
  - marker: b
    text: '''With one accord'' is a possible rendering of the adverb, but here it likely means they fled all together or all at once rather than in harmonious unity.'
    reason: lexical_alternative
