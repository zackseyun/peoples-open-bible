base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/034.yaml
  text: Now the rest of the acts of Jehoshaphat[a], the first and the last, behold, they are written in the records of Jehu son of Hanani[b], which are included in the Book of the Kings of Israel.
  footnotes:
  - marker: a
    text: Or 'in the account of Jehu son of Hanani'; Hebrew 'in the words/records of Jehu son of Hanani.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew clause literally says 'which he caused to go up upon the Book of the Kings of Israel,' likely meaning that Jehu's record was incorporated into or included in that larger royal source.
    reason: alternative_reading
