revisions:
- from: Yahvé enviará sobre ti la maldición[a], la confusión y la reprensión en todo aquello a lo que pongas la mano y hagas, hasta que seas destruido y hasta que perezcas pronto, por la maldad de tus obras con las cuales me has abandonado.
  to: Yahvé enviará sobre ti la maldición, la confusión y la reprensión en toda obra[a] que emprendas, hasta que seas destruido y hasta que perezcas rápidamente, por la maldad de tus obras con las cuales me has abandonado.
  rationale: 'Se corrige el tramo central para representar el modismo hebreo con español natural: ''en toda obra[a] que emprendas'' conserva la idea de todo aquello a lo que uno pone la mano, mientras la nota mantiene la alternativa más literal, como en el audit trail inglés. También se ajusta ''pronto'' a ''rápidamente'' para reflejar mejor מַהֵר en este contexto. No se alteran las decisiones teológicas ni la sintaxis final sobre las obras por las cuales el destinatario abandonó a Dios.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés en los elementos principales: mantiene a Yahvé como sujeto agente, conserva la tríada de sanciones (''maldición, confusión y reprensión''), refleja el modismo de ''poner la mano'' con nota explicativa, y preserva la cláusula relativa final vinculada a las obras por las cuales el destinatario ha abandonado a Dios. Sin embargo, la secuencia ''en todo aquello a lo que pongas la mano y hagas'' no representa con claridad la estructura hebrea ''en todo envío/empresa de tu mano que hagas'' y suena defectuosa en español. También ''pronto'' para מַהֵר es menos natural aquí que ''rápidamente''.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta un tramo poco natural: ''en todo aquello a lo que pongas la mano y hagas''. En español bíblico natural, conviene algo como ''en toda obra[a] que emprendas'' o ''en todo lo que emprendas''. Además, ''reprensión'' es aceptable pero algo rígida; puede mantenerse por fidelidad léxica. El resto del versículo es legible y adecuado para un registro eclesial moderno.'
  glossary_alignment: 'Alineación correcta con la terminología del proyecto: יהוה -> ''Yahvé''; no hay términos doctrinales conflictivos adicionales. La decisión de mantener la relativa ''con las cuales me has abandonado'' es defendible y consistente con el rationale inglés. No se requieren cambios doctrinales, solo mejora estilística y sintáctica en el modismo de מִשְׁלַח יָדְךָ אֲשֶׁר תַּעֲשֶׂה.'
  issues:
  - severity: medium
    issue: La frase 'en todo aquello a lo que pongas la mano y hagas' es gramaticalmente torpe y no suena natural en español.
    rationale: El hebreo expresa 'en toda empresa/obra de tu mano que hagas'. La versión actual duplica la acción con 'pongas la mano y hagas' sin nexo claro, lo que entorpece la lectura y no preserva bien la estructura fuente.
  - severity: low
    issue: '''Pronto'' para מַהֵר es menos idiomático en esta construcción que ''rápidamente''.'
    rationale: Aunque semánticamente posible, 'perezcas pronto' puede sugerir solo cercanía temporal. 'Rápidamente' comunica mejor el adverbio como modo/rapidez de la ruina, en línea con el inglés 'quickly'.
  revised_spanish_text: Yahvé enviará sobre ti la maldición, la confusión y la reprensión en toda obra[a] que emprendas, hasta que seas destruido y hasta que perezcas rápidamente, por la maldad de tus obras con las cuales me has abandonado.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «en todo el poner de tu mano», es decir, en todo lo que emprendas o hagas.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el tramo central para representar el modismo hebreo con español natural: ''en toda obra[a] que emprendas'' conserva la idea de todo aquello a lo que uno pone la mano, mientras la nota mantiene la alternativa más literal, como en el audit trail inglés. También se ajusta ''pronto'' a ''rápidamente'' para reflejar mejor מַהֵר en este contexto. No se alteran las decisiones teológicas ni la sintaxis final sobre las obras por las cuales el destinatario abandonó a Dios.'
