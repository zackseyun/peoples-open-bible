    rationale: El expediente inglés usa la segunda nota para conservar variantes como 'habían sido dejados atrás' / 'estaban demasiado cansados para seguir adelante', no para explicar la sintaxis abreviada de 'el pueblo que con él'. La nota actual añade información menos necesaria y omite la alternativa documentada.
