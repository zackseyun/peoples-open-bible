translation:
  language: es
  text: Así son los caminos de todos los que se olvidan de Dios[a], y la esperanza del impío perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el hipócrita». El término hebreo puede designar a una persona impía o irreverente; aquí «el impío» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: Introduce la conclusión comparativa del versículo anterior con una fórmula natural en español. «Así» conserva la fuerza inferencial sin sonar forzado.
- source_word: אָ֭רְחוֹת
  english_pob_choice: paths
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - rutas
  lexicon: HALOT
  rationale: El plural hebreo alude a las trayectorias de vida. «Caminos» comunica bien la imagen en español y es idiomático en lenguaje bíblico.
- source_word: שֹׁ֣כְחֵי אֵ֑ל
  english_pob_choice: who forget God
  chosen_spanish: los que se olvidan de Dios
  alternatives_spanish:
  - los que olvidan a Dios
  - los olvidadores de Dios
  lexicon: HALOT
  rationale: El participio se vierte de manera relacional y natural en español. «Se olvidan de Dios» conserva el matiz de descuido/rechazo continuo sin volverlo mecánico.
- source_word: אֵ֑ל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  - Dios Altísimo
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común, por lo que «Dios» es la equivalencia española directa y más transparente.
- source_word: תִקְוַ֖ת
  english_pob_choice: the hope of
  chosen_spanish: la esperanza de
  alternatives_spanish:
  - la expectativa de
  - la espera de
  lexicon: HALOT
  rationale: «Esperanza» es el equivalente más natural y fiel al sustantivo en contexto sapiencial, manteniendo el sentido de expectativa confiada.
- source_word: חָנֵ֣ף
  english_pob_choice: the godless
  chosen_spanish: el impío
  alternatives_spanish:
  - el hipócrita
  - el irreverente
  - el malvado
  lexicon: HALOT
  rationale: En Job, el término suele designar a quien es irreverente o sin piedad delante de Dios. «Impío» conserva el peso moral y religioso sin reducirlo a mera doblez externa, como podría sugerir «hipócrita».
- source_word: תֹּאבֵֽד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - desaparecerá
  - será destruida
  lexicon: HALOT
  rationale: El verbo expresa ruina o desaparición final. «Perecerá» mantiene el tono solemne y la fuerza de juicio del hebreo.
theological_decisions:
- issue: Valor de חָנֵף en Job 8:13
  english_pob_reading: the godless
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el hipócrita
  - el irreverente
  rationale: 'La lectura inglesa documenta una decisión interpretativa: evitar «hypocrite» como etiqueta principal porque puede estrechar demasiado el campo semántico. En español, «impío» expresa bien la falta de reverencia y la oposición a Dios, y armoniza con el contraste del versículo.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Uso de «Dios» para אֵל
  english_pob_reading: who forget God
  chosen_spanish_reading: los que se olvidan de Dios
  alternative_spanish_readings:
  - los que se olvidan de El
  rationale: El hebreo usa un título divino común, no un nombre propio transliterado. La traducción directa «Dios» es más clara para el lector español y coincide con la decisión auditada del inglés.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el borrador español sigue de cerca la decisión auditada de traducir חָנֵף como «the godless», pero la adapta a un equivalente natural en español («el impío») sin perder el matiz religioso-moral. Se preserva también la comparación inferencial de כֵּן con una expresión breve y bíblicamente transparente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, conforme al criterio del proyecto, y no se translitera el título divino.
  - Se evita «SEÑOR» porque el hebreo no usa aquí el Tetragrámaton.
  - «Perecerá» conserva la gravedad del verbo hebreo אבד y su paralelismo con la ruina de la esperanza.
  - El pie de página se coloca solo en el sintagma afectado por la alternativa lexical documentada.
