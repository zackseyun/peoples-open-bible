translation:
  language: es
  text: Hasta que se cumplió[a] su palabra[b], la palabra de Yahvé lo probó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegó su palabra». El verbo hebreo es literalmente «vino/llegó», pero con «su palabra» puede expresar que lo dicho llegó a cumplirse.'
    reason: lexical_alternative
  - marker: b
    text: «Su palabra» puede referirse a la palabra o predicción de José, o a la palabra de Dios acerca de José. El hebreo permite ambas posibilidades.
    reason: alternative_reading
  - marker: c
    text: Lit. «lo refinó»; el verbo lleva la imagen de metal depurado en el fuego, por eso también puede traducirse «lo probó» o «lo puso a prueba».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: Until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - Hasta
  lexicon: HALOT
  rationale: La preposición temporal marca duración hasta un punto; en español, 'hasta que' comunica con naturalidad ese límite temporal y mantiene la estructura del hebreo.
- source_word: עֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - el tiempo señalado
  lexicon: HALOT
  rationale: עֵת nombra un tiempo o sazón; 'el tiempo' conserva el valor general sin añadir una determinación que el hebreo no explicita.
- source_word: בֹּא
  english_pob_choice: came to pass
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se cumplió
  lexicon: HALOT
  rationale: Con דְבָרוֹ, el verbo apunta al arribo/realización de lo dicho. 'Llegó' permite una formulación natural en español sin perder el sentido de cumplimiento implícito en el contexto.
- source_word: דְבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su asunto
  lexicon: HALOT
  rationale: 'דבר puede ser ''palabra'', ''asunto'' o ''cosa''. ''Su palabra'' preserva la forma léxica y deja abierta la referencia: la palabra/predicción de José o la palabra de Dios sobre José.'
- source_word: אִמְרַת
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la declaración
  - el dicho
  lexicon: HALOT
  rationale: אָמַר/אִמְרָה es un paralelo cercano de דבר con matiz de dicho pronunciado. 'La palabra' conserva el paralelismo y la fluidez en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma estándar del proyecto, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: צְרָפָתְהוּ
  english_pob_choice: tested him
  chosen_spanish: lo probó
  alternatives_spanish:
  - lo refinó
  - lo examinó
  - lo sometió a prueba
  lexicon: HALOT
  rationale: El verbo procede de צרף, con imagen de refinar metal; en español, 'lo probó' comunica la prueba/validación y conserva la amplitud semántica, mientras que la imagen de refinación se documenta en nota.
theological_decisions:
- issue: Referente de 'su palabra'
  english_pob_reading: Joseph's word/prediction; some understand God's word concerning Joseph
  chosen_spanish_reading: La frase puede referirse a la palabra/predicción de José o a la palabra de Dios acerca de José
  alternative_spanish_readings:
  - La palabra de José se cumplió
  - La palabra de Dios acerca de José se cumplió
  rationale: El hebreo permite más de una lectura del sufijo posesivo; no se resuelve dogmáticamente. La traducción principal conserva la ambigüedad y la nota la explicita.
  doctrine_reference: Preservar la tensión exegética documentada por la POB sin cerrarla artificialmente.
- issue: Imagen verbal de צרף
  english_pob_reading: The verb carries the imagery of metal being refined, hence 'tested' or 'proved'.
  chosen_spanish_reading: '''Lo probó'' mantiene el sentido de prueba y deja la imagen de refinación para la nota'
  alternative_spanish_readings:
  - lo refinó
  - lo probó
  - lo examinó
  rationale: La metáfora metalúrgica es real en el hebreo; en español, una traducción sólo con 'refinó' sería demasiado técnica y una sólo con 'probó' podría ocultar la imagen. Se conserva el sentido principal en el texto y la imagen en la nota.
  doctrine_reference: Mantener la metáfora y su fuerza sin oscurecer la lectura pública.
translation_notes:
  revision_awareness: Alineado con la última revisión auditada, que no introdujo cambios y fue confirmada como de alta concordancia. La versión española conserva la ambigüedad del referente de 'su palabra' y documenta la metáfora de refinación de צְרָף sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'palabra' para דבר/אמרת para mantener el paralelismo y la ambigüedad lexical.
  - Se opta por 'lo probó' en el cuerpo y se explicita la opción 'refinó' en nota, evitando perder la imagen metalúrgica.
  - La puntuación y el orden de las cláusulas buscan naturalidad en español sin añadir elementos ausentes del hebreo.
