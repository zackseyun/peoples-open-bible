  - illness
  lexicon: Crum, Coptic Dictionary (ⲛⲁⲥⲓⲉ = sickness/weakness; adj./noun)
  rationale: Common Sahidic term for sickness; here as self-predicate in the paradox
    pair.
- source_word: ⲓⲁⲡ (appearing as ⲫⲁⲡ)
  chosen: physician
  alternatives:
  - healer
  lexicon: Greek loan ἰατρός/ἴαμα > Coptic iap-/iatros
  rationale: The surrounding antitheses elsewhere in Thunder pair sickness with healing;
    “physician” keeps the sharp paradox sick/doctor rather than smoothing to a state
    like “well.”
- source_word: ⲗⲏⲙⲏⲛ / ⲗⲏⲛ
  chosen: harbor (not retained in main line)
  alternatives:
  - haven
  - pleasant place
  lexicon: Greek λιμήν (harbor) as a Coptic loanword
  rationale: OCR suggests a λιμήν-term may be present; placement within this cola
    is unclear. We note the likely gloss but omit from the main line to avoid false
    precision.
parallelism_check: 'The rendering preserves the strict antithetical parallel: “I am
  … sick” // “I am … the physician.” Both clauses retain the first-person declaration
