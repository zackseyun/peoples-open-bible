    text: Or 'in your mind' for 'in your thoughts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the chambers of your bed,' that is, in the privacy of your bedroom.
    reason: cultural_note
  - marker: c
    text: Hebrew 'a bird of the heavens'; compare the idiom behind the expression 'a little bird told me.'
    reason: cross_reference
