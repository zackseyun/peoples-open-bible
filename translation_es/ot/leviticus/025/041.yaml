translation:
  language: es
  text: Entonces él y sus hijos con él saldrá de ti, y volverá a su clan[a] y volverá a la propiedad de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su familia»; el término hebreo puede denotar un grupo de parentesco más amplio o un clan.
    reason: lexical_alternative
  - marker: b
    text: O «la posesión de sus padres» o «su propiedad ancestral».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: shall go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrá
  - saldrá fuera
  lexicon: HALOT
  rationale: En contexto legal, el verbo expresa salida/separación efectiva de la casa o servicio. El plural en español concuerda con «él y sus hijos con él»; se conserva la imagen concreta de salida sin explicitar «ser liberado», que sería interpretativo.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - desde contigo
  - de tu servicio
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de con vosotros/ti». En español natural, «de ti» comunica la separación de manera directa y sin sobreinterpretar la relación jurídica.
- source_word: הוּא וּבָנָיו עִמּוֹ
  english_pob_choice: he and his sons with him
  chosen_spanish: él y sus hijos con él
  alternatives_spanish:
  - él y sus hijos junto con él
  - él y sus niños con él
  lexicon: HALOT
  rationale: Se mantiene el lenguaje masculino explícito del hebreo («hijos»), en vez de neutralizarlo como «hijos e hijas» o «hijos». La colocación «con él» reproduce la relación de acompañamiento.
- source_word: וְשָׁב
  english_pob_choice: and he shall return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - volverá de nuevo
  lexicon: HALOT
  rationale: «Volverá» es la forma más natural para conservar el motivo de restauración presente en la repetición del verbo en el versículo, sin perder el valor de retorno.
- source_word: מִשְׁפַּחְתּוֹ
  english_pob_choice: his clan
  chosen_spanish: su clan
  alternatives_spanish:
  - su familia
  - su linaje
  lexicon: HALOT
  rationale: En este marco de herencia y tenencia de tierra, «clan» reproduce mejor el alcance socio-legal de מִשְׁפָּחָה que «familia», que en español suele sugerir un grupo más reducido.
- source_word: אֲחֻזַּת אֲבֹתָיו
  english_pob_choice: the property of his fathers
  chosen_spanish: la propiedad de sus padres
  alternatives_spanish:
  - la posesión de sus padres
  - su propiedad ancestral
  - la heredad de sus padres
  lexicon: HALOT
  rationale: Se conserva la referencia ancestral del hebreo mediante «sus padres», evitando sustituirla por una formulación más eclesiástica. «Propiedad» comunica de manera clara la noción de herencia/tenencia; «padres» mantiene el idiomatismo genealógico.
- source_word: יָשׁוּב
  english_pob_choice: return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - retornará
  lexicon: HALOT
  rationale: La repetición del verbo de retorno queda preservada con «volverá», manteniendo el paralelismo y el énfasis restaurativo del hebreo.
theological_decisions:
- issue: Lenguaje de salida dentro del marco jubilar
  english_pob_reading: go out from you
  chosen_spanish_reading: saldrán de ti
  alternative_spanish_readings:
  - saldrá de ti
  - serán liberados de ti
  rationale: La redacción conserva el verbo concreto de salida, como en el POB inglés, sin sustituirlo por una interpretación explícita de liberación. El contexto legal jubilar permite entender la liberación sin cargarla en el verbo principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 1
- issue: Mantenimiento del lenguaje masculino de parentesco
  english_pob_reading: his sons ... his fathers
  chosen_spanish_reading: sus hijos ... sus padres
  alternative_spanish_readings:
  - sus hijos ... sus ancestros
  - sus descendientes ... sus padres
  rationale: Se preserva el marcador masculino del hebreo. En este pasaje jurídico sobre herencia paterna, neutralizar el lenguaje borraría una parte del contenido social del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: Se corrigió la validación previa evitando notas al pie no ancladas en el texto. La redacción mantiene las decisiones léxicas del POB inglés y las expresa en español natural, sin añadir marcadores de nota.
  spanish_consistency_notes:
  - Se usó «volverá» de forma consistente para ambos verbos de שׁוב, preservando la repetición del hebreo.
  - Se mantuvo «clan» para מִשְׁפַּחְתּוֹ por coherencia con la lectura socio-legal del pasaje.
  - Se evitó «SEÑOR» u otro sustituto teológico, porque el verso no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se conservó el tono legal y la terminología de herencia con «propiedad de sus padres».
