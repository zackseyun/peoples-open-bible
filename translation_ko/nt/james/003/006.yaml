  []
theological_decisions:
- issue: '혀에 관한 비유(3:1-12)의 강도 보존'
  chosen_reading: '게헨나의 불, 인생의 수레바퀴, 죽음의 독 등 강한 이미지를 그대로 유지'
  alternative_readings:
  - '「지옥」으로 의역, 「수레바퀴」를 「과정」으로 풀이'
  rationale: '야고보의 혀 단락은 격렬한 동방 지혜문학의 이미지로 구성되어 있다. 한국어로 풀어 약화시키면 본문의 충격이 사라진다. 「숲」, 「수레바퀴」, 「게헨나」 등 본문의 구체적 어휘를 모두 보존한다.'
