translation:
  language: es
  text: Porque si te niegas a dejarlos ir y todavía los retienes,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y todavía los sigues reteniendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si
  - Pues si
  - En efecto, si
  lexicon: HALOT
  rationale: La combinación introduce una explicación condicional ligada al versículo anterior. En español, «Porque si» conserva la fuerza explicativa de כִּי y la condicional de אִם de manera natural y clara.
- source_word: מָאֵן
  english_pob_choice: refuse
  chosen_spanish: te niegas
  alternatives_spanish:
  - rehúsas
  - te niegas a
  - no quieres
  lexicon: HALOT
  rationale: El verbo expresa negativa voluntaria y resistencia, no incapacidad. «Te niegas» comunica bien la idea de rechazo obstinado en este contexto de advertencia.
- source_word: לְשַׁלֵּחַ
  english_pob_choice: to let them go
  chosen_spanish: a dejarlos ir
  alternatives_spanish:
  - a soltarlos
  - a enviarlos fuera
  - a liberarlos
  lexicon: HALOT
  rationale: En el contexto del Éxodo, el verbo con objeto humano funciona como la fórmula de permitir partir. «Dejarlos ir» es idiomático y fiel al valor contextual del hebreo.
- source_word: וְעוֹדְךָ
  english_pob_choice: and still
  chosen_spanish: todavía
  alternatives_spanish:
  - y aún
  - y sigues
  - mientras todavía
  lexicon: HALOT
  rationale: La forma expresa continuidad de la acción de Faraón. «Todavía» transmite esa persistencia de manera breve y natural en español.
- source_word: מַחֲזִיק
  english_pob_choice: hold them back
  chosen_spanish: los retienes
  alternatives_spanish:
  - los mantienes sujetos
  - los sigues reteniendo
  - los detienes
  lexicon: HALOT
  rationale: El participio de חזק aquí tiene el sentido de retener o mantener a alguien impedido de irse. «Retienes» conserva la fuerza de retención sin cargar el español con una perífrasis innecesaria.
- source_word: בָּם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los israelitas
  lexicon: HALOT
  rationale: El pronombre se refiere a los israelitas. En español, el objeto directo masculino plural se expresa de forma natural con «los»; el sentido referencial queda claro por el contexto.
translation_notes:
  revision_awareness: La traducción sigue el sentido revisado del audit trail inglés, donde «hold on to them» fue ajustado a «hold them back» por ser más natural y preciso en el contexto de retener/impedir la salida.
  spanish_consistency_notes:
  - Se mantiene el pronombre de objeto directo masculino plural «los» para referirse a Israel, coherente con el referente plural del hebreo.
  - Se evita «SEÑOR» u otra sustitución reverencial, ya que este verso no contiene el nombre divino.
  - La estructura condicional-explanatoria se conserva con «Porque si», siguiendo la fuerza de כִּי אִם sin calco rígido.
