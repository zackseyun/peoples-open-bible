revisions:
- from: 'Fue informado al rey de Egipto que el pueblo había huido, y el corazón de Faraón y de sus siervos[a] se volvió contra el pueblo; y dijeron: «¿Qué es esto que hemos hecho[b], al haber dejado ir a Israel para que nos sirviera?»'
  to: 'Se le informó al rey de Egipto que el pueblo había huido, y el corazón de Faraón y de sus siervos[a] se volvió contra el pueblo, y dijeron: «¿Qué es esto que hemos hecho[b], que hemos dejado ir a Israel de servirnos?»'
  rationale: Se corrige la cláusula final para reflejar el sentido de separación/cese de מֵעָבְדֵנוּ ('de servirnos') en vez de una finalidad ('para que nos sirviera'). También se mejora la naturalidad de la apertura con 'Se le informó' y se alisa la puntuación narrativa. Se conservan 'corazón' y la pregunta enfática, en línea con la justificación léxica y teológica auditada.
  reviewer_model: gpt-5.4
