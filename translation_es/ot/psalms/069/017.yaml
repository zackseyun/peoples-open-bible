revisions:
- from: Respóndeme[a], oh Yahvé, porque bueno es tu amor constante; conforme a la abundancia de tus misericordias, vuélvete hacia mí.
  to: Respóndeme[a], oh Yahvé, porque tu amor fiel es bueno; conforme a la abundancia de tus misericordias, vuélvete a mí.
  rationale: Se propone una revisión menor para mejorar la naturalidad y la precisión léxica del español sin apartarse del hebreo ni del rastro de auditoría inglés. «Tu amor fiel» expresa mejor חֶסֶד que «tu amor constante», y «porque tu amor fiel es bueno» evita un orden sintáctico demasiado calcado. «Vuélvete a mí» simplifica y naturaliza la petición final manteniendo el sentido de פְּנֵה אֵלַי. La nota alternativa se conserva con el anclaje correcto.
