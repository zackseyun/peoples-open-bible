translation:
  language: es
  text: Además, seguían hablando bien de él en mi presencia[a], y seguían transmitiéndole mis palabras[b]. Tobías envió cartas para atemorizarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus buenas cualidades» o «las cosas buenas de él»; la frase hebrea es más amplia que «buenas obras», pero aquí se refiere a una recomendación favorable de Tobías ante Nehemías.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «iban sacando mis palabras a él»; es un modismo para transmitir o reportar las palabras de Nehemías a Tobías.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Asimismo
  lexicon: HALOT
  rationale: La partícula añade un elemento final a la secuencia narrativa; «Además» conserva el valor aditivo con español natural y digno.
- source_word: טוֹבֹתָיו
  english_pob_choice: his good deeds
  chosen_spanish: hablando bien de él
  alternatives_spanish:
  - sus buenas obras
  - sus cualidades buenas
  - las cosas buenas de él
  lexicon: HALOT
  rationale: El plural sustantivado de «bueno» es más amplio que «deeds»; en este contexto de recomendación favorable ante Nehemías, «hablando bien de él» comunica mejor la idea de elogio o favorable commendation sin restringirla a solo obras.
- source_word: הָיוּ אֹמְרִים
  english_pob_choice: they kept speaking
  chosen_spanish: seguían hablando
  alternatives_spanish:
  - seguían diciendo
  - iban diciendo
  lexicon: HALOT
  rationale: El perfecto + participio expresa acción continuada en el pasado. «Seguían hablando» refleja ese aspecto iterativo de forma natural en español.
- source_word: לְפָנַי
  english_pob_choice: in my presence
  chosen_spanish: en mi presencia
  alternatives_spanish:
  - delante de mí
  - ante mí
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara de «before me» en español contemporáneo, sin perder la cercanía personal del hebreo.
- source_word: וּדְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - lo que decía
  - mis asuntos
  lexicon: HALOT
  rationale: Aquí דְבָרַי se refiere a lo que Nehemías decía y que luego era transmitido; «mis palabras» es la forma más directa y fiel.
- source_word: הָיוּ מוֹצִיאִים לוֹ
  english_pob_choice: they kept reporting ... to him
  chosen_spanish: seguían llevando mis palabras a él
  alternatives_spanish:
  - seguían reportándole mis palabras
  - seguían transmitiéndole mis palabras
  lexicon: HALOT
  rationale: El hebreo dice literalmente «iban sacando / llevando fuera mis palabras a él», una expresión idiomática de transmisión de información. Se conserva la imagen verbal con «llevando» y se hace comprensible en español.
- source_word: אִגְּרוֹת
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - misivas
  - escritos
  lexicon: HALOT
  rationale: Término estándar y natural para correspondencia escrita en español.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: HALOT
  rationale: «Envió» mantiene el sentido narrativo simple del verbo y suena natural en español.
- source_word: לְיָרְאֵנִי
  english_pob_choice: to frighten me
  chosen_spanish: para atemorizarme
  alternatives_spanish:
  - para asustarme
  - para hacerme temer
  lexicon: HALOT
  rationale: El causativo expresa inducir temor; «atemorizarme» conserva mejor la fuerza del verbo que un simple «asustarme» y funciona bien en registro bíblico moderno.
translation_notes:
  revision_awareness: 'Se tomó como base la última pasada revisada, que quedó sin cambios y con alto acuerdo entre revisores; no hubo revisiones aplicadas al texto fuente inglés. La redacción española mantiene la secuencia narrativa y las dos imágenes idiomáticas clave del hebreo: elogio favorable en la presencia de Nehemías y transmisión de sus palabras a Tobías.'
  spanish_consistency_notes:
  - Se mantiene «Tobías» como nombre propio usual en español bíblico.
  - Se usa «además» para la partícula aditiva inicial, evitando un calco rígido.
  - Se conserva el paralelismo de las dos cláusulas verbales con «seguían».
  - Se traduce la finalidad con «para atemorizarme» para expresar el propósito del envío de las cartas.
