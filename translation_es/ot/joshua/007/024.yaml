revisions:
- from: Entonces Josué tomó a Acán hijo de Zera, y la plata, el manto, la barra de oro[a], sus hijos, sus hijas, su buey, su asno, su rebaño, su tienda[b], y todo lo que le pertenecía; y todo Israel con él; y los hicieron subir al valle de Acor.
  to: Entonces Josué tomó a Acán hijo de Zera, la plata, el manto, la barra de oro[a], sus hijos, sus hijas, su buey, su asno, su rebaño, su tienda, y todo lo que le pertenecía —y todo Israel con él—, y los llevaron al valle de Acor[b].
  rationale: Se ajusta el verbo final para reflejar con más naturalidad el hebreo y la decisión inglesa auditada ('brought them up') sin introducir un causativo fuerte. Se mejora la puntuación para que 'y todo Israel con él' funcione como inciso claro. Se corrige y localiza la nota cultural al español, y se ancla la nota [b] directamente en 'Acor', que es donde corresponde.
