translation:
  language: es
  text: Tomen a su padre y a sus hogares[a], y vengan a mí, y yo les daré lo mejor de la tierra de Egipto, y comerán la grasa[b] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''sus casas''. El hebreo בית puede referirse a la casa como unidad doméstica o al grupo de personas que la integran.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''lo más rico de la tierra''. El hebreo ''grasa de la tierra'' es un modismo para la parte más escogida o abundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְחוּ
  english_pob_choice: Take
  chosen_spanish: Lleven
  alternatives_spanish:
  - Tomen
  - Traigan
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural de לקח. En español, con el objeto directo 'a su padre y a sus casas', 'lleven' comunica mejor el acto de trasladarlos hacia el hablante sin perder el valor directivo del verbo. 'Tomen' es más literal, pero menos natural en este contexto; 'Traigan' añade una perspectiva algo más idiomática, aunque no siempre refleja con tanta claridad el valor básico del verbo.
- source_word: אֲבִיכֶם
  english_pob_choice: your father
  chosen_spanish: su padre
  alternatives_spanish:
  - vuestro padre
  - el padre de ustedes
  lexicon: HALOT
  rationale: El sufijo de 2mp se vierte naturalmente en español como 'su' en registro neutro latinoamericano. Se mantiene el singular 'padre' porque se refiere a Jacob.
- source_word: בָּתֵּיכֶם
  english_pob_choice: your households
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus familias
  lexicon: HALOT
  rationale: El POB inglés eligió 'households' para preservar la unidad social del hebreo בית. En español, 'casas' conserva el paralelismo formal del hebreo y deja visible la imagen básica; 'hogares' y 'familias' interpretan más la referencia social. Aquí se conserva 'casas' para no borrar la concreción del término.
- source_word: וּבֹאוּ אֵלַי
  english_pob_choice: and come to me
  chosen_spanish: y vengan a mí
  alternatives_spanish:
  - y vuelvan a mí
  - y acérquense a mí
  lexicon: HALOT
  rationale: La preposición אֵל con בוא se vierte de manera directa como 'a mí'. 'Vengan' reproduce bien la exhortación plural. 'Vuelvan' introduce una noción de regreso que no está explícita en el hebreo; 'acérquense' es más interpretativo.
- source_word: וְאֶתְּנָה לָכֶם
  english_pob_choice: and I will give you
  chosen_spanish: y yo les daré
  alternatives_spanish:
  - y déjenme darles
  - y les daré
  lexicon: HALOT
  rationale: La forma cohortativa funciona aquí como promesa. 'Yo les daré' expresa con claridad la seguridad del ofrecimiento. Se explicita 'yo' para mantener el énfasis del hebreo y el flujo promisor.
- source_word: טוּב אֶרֶץ מִצְרַיִם
  english_pob_choice: the best of the land of Egypt
  chosen_spanish: lo mejor de la tierra de Egipto
  alternatives_spanish:
  - los mejores bienes de la tierra de Egipto
  - la bondad de la tierra de Egipto
  lexicon: HALOT
  rationale: טוּב denota bondad, excelencia o lo mejor. 'Lo mejor' conserva el sentido superlativo/escogido que el POB inglés expresó como 'the best'. 'Bienes' es posible pero más interpretativo; 'bondad' sería demasiado abstracto.
- source_word: וְאִכְלוּ
  english_pob_choice: and you shall eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y coman
  - y ustedes comerán
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperativa coordinada, en el marco de la promesa su valor resulta resultativo o futuro. 'Comerán' reproduce esa secuencia de promesa y consecuencia en español.
- source_word: חֵלֶב הָאָרֶץ
  english_pob_choice: the fat of the land
  chosen_spanish: la grasa de la tierra
  alternatives_spanish:
  - lo más rico de la tierra
  - la parte más rica de la tierra
  - la abundancia de la tierra
  lexicon: HALOT
  rationale: חֵלֶב significa literalmente 'grasa' y en hebreo puede funcionar idiomáticamente para la parte más rica o escogida. El POB inglés conservó la metáfora como 'the fat of the land'. En español se mantiene la imagen con 'grasa', dejando visible la tensión entre el sentido literal e idiomático para el lector.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido ya estabilizado en el POB inglés para Génesis 45:18, sin cambios de revisión reportados en el paquete de auditoría y con acuerdo alto en la comprobación cruzada. Se ha ajustado el español para preservar tanto la imagen hebrea como la fluidez natural del registro.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto para el nombre divino, aunque este versículo no lo contiene.
  - Se prefiere 'Jesús' / 'Mesías' según corresponda en otros contextos; aquí no aplica.
  - Se conserva la tensión entre literalidad e idiomatismo en 'grasa de la tierra' mediante nota, en paralelo al tratamiento del POB inglés.
