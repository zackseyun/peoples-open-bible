  to: 'Después de consultar con el pueblo, designó cantores para Yahvé, que alababan el esplendor de la santidad[a], al salir delante de la vanguardia[b], diciendo: «Den gracias a Yahvé, porque su amor fiel[c] perdura para siempre».'
