translation:
  language: es
  text: Y ahora no hay quien nos ayude[a]; antes bien, Dios nos ha entregado[b] en sus manos, para ser derribados[c] delante de ellos en sed y en gran destrucción[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «no existe nuestro ayudador». El griego expresa de forma personal la ausencia de alguien que venga en nuestra ayuda.
    reason: lexical_alternative
  - marker: b
    text: 'O: «nos ha vendido». El verbo griego πέπρακεν significa literalmente «ha vendido», una metáfora más fuerte de ser puestos bajo poder enemigo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para ser abatidos», «para ser vencidos» o «para ser postrados». La frase griega puede entenderse como resultado: quedar humillados delante de ellos.'
    reason: lexical_alternative
  - marker: d
    text: 'También puede entenderse: «por sed y gran ruina» o «mediante sed y gran destrucción», describiendo el medio o la condición de su caída.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βοηθός
  english_pob_choice: one to help
  chosen_spanish: quien nos ayude
  alternatives_spanish:
  - ayudante
  - auxiliador
  - ayuda
  lexicon: BDAG
  rationale: 'El griego usa un sustantivo singular con sentido de persona que ayuda. En español, la forma más natural y clara es una cláusula personal: «quien nos ayude». Mantiene el sentido relacional sin sonar artificial.'
- source_word: πέπρακεν
  english_pob_choice: has delivered
  chosen_spanish: nos ha entregado
  alternatives_spanish:
  - nos ha vendido
  - nos ha entregado en manos de ellos
  - nos ha dado
  lexicon: LSJ
  rationale: El verbo griego literalmente significa «ha vendido», pero el audit trail inglés optó finalmente por «has delivered» para mayor naturalidad contextual. En español, «nos ha entregado» conserva la idea de ser puestos en poder del enemigo sin perder del todo la fuerza del acto divino; «nos ha vendido» sería más literal, pero más duro y menos idiomático.
- source_word: εἰς τὰς χεῖρας αὐτῶν
  english_pob_choice: into their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en manos de ellos
  - en su poder
  - a sus manos
  lexicon: BDAG
  rationale: La expresión idiomática se conserva de forma natural en español con «en sus manos», que reproduce la imagen bíblica de quedar bajo el poder del enemigo.
- source_word: τοῦ καταστρωθῆναι
  english_pob_choice: to be laid low
  chosen_spanish: para ser derribados
  alternatives_spanish:
  - para ser abatidos
  - para ser vencidos
  - para ser postrados
  lexicon: LSJ
  rationale: La pasiva infinitiva expresa resultado o propósito. «Ser derribados» comunica derrota y humillación de manera clara y fiel; mantiene la idea de ser abatidos ante otros sin introducir una imagen más específica que el griego no exige.
- source_word: ἐναντίον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  - frente a ellos
  lexicon: BDAG
  rationale: «Delante de ellos» refleja bien el valor espacial/relacional de la frase y suena natural en español contemporáneo, manteniendo la humillación pública implícita.
- source_word: ἐν δίψει
  english_pob_choice: in thirst
  chosen_spanish: en sed
  alternatives_spanish:
  - por sed
  - a causa de la sed
  - con sed
  lexicon: BDAG
  rationale: Se conserva la preposición con una formulación breve y paralela al griego. «En sed» es algo concentrado, pero refleja la construcción y deja abierta la lectura de circunstancia o condición.
- source_word: ἀπωλείᾳ μεγάλῃ
  english_pob_choice: great destruction
  chosen_spanish: gran destrucción
  alternatives_spanish:
  - gran ruina
  - gran perdición
  - gran pérdida
  lexicon: BDAG
  rationale: «Destrucción» traduce bien ἀπώλεια en este contexto de ruina militar. «Gran destrucción» mantiene la fuerza cuantitativa/intensiva de μεγάλῃ sin desplazar el sentido hacia matices doctrinales posteriores.
theological_decisions:
- issue: Atribución de la derrota al acto de Dios
  english_pob_reading: God has delivered us into their hands
  chosen_spanish_reading: Dios nos ha entregado en sus manos
  alternative_spanish_readings:
  - Dios nos ha vendido en sus manos
  - Dios nos ha abandonado en sus manos
  - Dios nos ha dejado en sus manos
  rationale: El texto atribuye explícitamente la situación a la acción divina; la versión española conserva esa tensión teológica sin suavizarla. «Entregado» sigue de cerca el sentido contextual adoptado en el audit trail inglés y evita rebajar la afirmación a mera pasividad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Fuerza metafórica del verbo griego frente a la naturalidad en español
  english_pob_reading: The Greek verb literally means 'has sold,' a stronger metaphor of being given over to enemy power.
  chosen_spanish_reading: nos ha entregado
  alternative_spanish_readings:
  - nos ha vendido
  - nos ha dado
  rationale: Aunque el verbo griego es literalmente «vender», la recepción canónica en el audit trail reconoce la posibilidad de una formulación menos chocante en inglés. En español, «entregado» mantiene la relación de sometimiento y resulta más publicable; la tensión literal se documenta en la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El audit trail inglés comenzó con «has sold us» y fue revisado a «has delivered us» por naturalidad contextual; la presente versión española sigue esa revisión, pero deja constancia de la metáfora comercial del griego en la nota léxica. También se conserva la estructura general de la frase final, con una solución española idiomática para el infinitivo pasivo de resultado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva la imaginería bíblica de «en sus manos» como expresión de dominio o poder.
  - No se emplea «Señor» para el nombre divino, porque aquí el sujeto es θεός y no el Tetragrámaton.
  - «Entregado» se usa como solución principal, pero la nota preserva la tensión con el literal «vendido».
  - 'La secuencia final conserva el paralelismo de condición y ruina: «en sed y en gran destrucción».'
