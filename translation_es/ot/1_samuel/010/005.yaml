  text: אַ֣חַר כֵּ֗ן תָּבוֹא֙ גִּבְעַ֣ת הָ/אֱלֹהִ֔ים אֲשֶׁר שָׁ֖ם נְצִבֵ֣י פְלִשְׁתִּ֑ים וִ/יהִי֩ כְ/בֹאֲ/ךָ֨ שָׁ֜ם הָ/עִ֗יר וּ/פָגַעְתָּ֞ חֶ֤בֶל נְבִיאִים֙ יֹרְדִ֣ים מֵֽ/הַ/בָּמָ֔ה וְ/לִ/פְנֵי/הֶ֞ם נֵ֤בֶל וְ/תֹף֙ וְ/חָלִ֣יל וְ/כִנּ֔וֹר וְ/הֵ֖מָּה מִֽתְנַבְּאִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/010/005.yaml
  text: After that you will come to Gibeath-ha-Elohim[a], where the Philistine garrison is. And when you enter there, into the city, you will meet a band of prophets coming down from the high place, with harp, tambourine, flute, and lyre before them[c][b], and they will be prophesying.
  footnotes:
  - marker: a
    text: Or 'the hill of God' / 'Gibeah of God'; the Hebrew may be understood as a place name or as a descriptive title for the location.
    reason: alternative_reading
  - marker: b
    text: Or 'Philistine outpost' or 'Philistine prefects'; the Hebrew term can refer either to a military station or to officials, though the context favors a garrison.
    reason: alternative_reading
  - marker: c
    text: 'The exact identification of the instruments is uncertain: ''harp'' (נֵבֶל) could also be ''lute,'' and ''flute'' could also be ''pipe.'''
    reason: lexical_alternative
