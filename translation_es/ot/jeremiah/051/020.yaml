translation:
  language: es
  text: Tú eres mi maza de guerra[a], mi arma de batalla; contigo aplasto naciones[b], y contigo destruyo reinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacha de batalla» o «martillo» para מַפֵּץ; el hebreo denota un arma destinada a golpear y destrozar.
    reason: lexical_alternative
  - marker: b
    text: El «tú/ti» es singular. El referente no se nombra en este versículo; los intérpretes lo identifican de diversas maneras, como Babilonia, Ciro o los medos-persas, o Israel/Jacob, según el contexto más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: מַפֵּץ
  english_pob_choice: war club
  chosen_spanish: maza de guerra
  alternatives_spanish:
  - garrote de guerra
  - bastón de guerra
  - hacha de batalla
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento para golpear y destrozar. En español, «maza de guerra» comunica bien la idea de arma contundente y mantiene el valor martillante del contexto, sin forzar el sentido más específico de «hacha».
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es literalmente «para mí / a mí», en español la relación posesiva-instrumental se expresa naturalmente con «mi»: «Tú eres mi…». Esto conserva la pertenencia e instrumentalidad divina del enunciado.'
- source_word: כְּלֵי מִלְחָמָה
  english_pob_choice: weapon of battle
  chosen_spanish: arma de batalla
  alternatives_spanish:
  - arma de guerra
  - instrumento de guerra
  - armas de guerra
  lexicon: HALOT
  rationale: El hebreo tiene un sustantivo colectivo/constructo («utensilios, armas de guerra»), pero en este verso el destinatario es singular, así que en español conviene un singular natural. «Arma de batalla» conserva el campo semántico bélico y el paralelismo con la imagen de golpe contundente.
- source_word: נִפַּצְתִּי
  english_pob_choice: I shatter
  chosen_spanish: aplasto
  alternatives_spanish:
  - hago pedazos
  - quiebro
  - destrozo
  lexicon: HALOT
  rationale: El verbo expresa romper con fuerza, hacer añicos o destrozar. «Aplasto» en español transmite bien la acción violenta y además armoniza con la imagen de una maza; evita una redundancia excesiva con «destruyo» en la segunda línea.
- source_word: בְךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con tu ayuda
  - por medio de ti
  - por ti
  lexicon: HALOT
  rationale: La preposición indica instrumento o medio. «Contigo» es la forma española más natural en esta construcción repetida y mantiene la idea de que el agente divino actúa mediante este instrumento singular.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto de juicio, el término apunta a entidades políticas o colectivas. «Naciones» es el equivalente claro y estándar en español.
- source_word: הִשְׁחַתִּי
  english_pob_choice: I destroy
  chosen_spanish: destruyo
  alternatives_spanish:
  - arruino
  - devasto
  - causo ruina
  lexicon: HALOT
  rationale: El causativo expresa causar ruina o destrucción. «Destruyo» es directo, bíblico y paralelo a «aplasto» en la línea anterior.
- source_word: מַמְלָכֹת
  english_pob_choice: kingdoms
  chosen_spanish: reinos
  alternatives_spanish:
  - monarquías
  - dominios
  lexicon: HALOT
  rationale: El sustantivo se refiere a entidades regias o políticas. En español, «reinos» es la forma más natural y mantiene el paralelismo con «naciones».
theological_decisions:
- issue: Identidad del «tú» singular
  english_pob_reading: Retain the second-person singular without specifying the referent in translation.
  chosen_spanish_reading: Mantener el singular sin nombrar al referente.
  alternative_spanish_readings:
  - Tú eres mi maza de guerra, Babilonia...
  - Tú eres mi maza de guerra, Ciro...
  - Tú eres mi maza de guerra, Israel/Jacob...
  rationale: El hebreo no nombra al destinatario en este versículo y el contexto amplio permite lecturas diversas. La traducción debe conservar esa ambigüedad documentada en lugar de resolverla sin base textual directa.
  doctrine_reference: Preservar la tensión interpretativa del texto profético.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail en inglés, conservando la ambigüedad del destinatario singular y el sentido de arma contundente para מַפֵּץ. No se aplicaron revisiones previas adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto no hace falta en este versículo porque el nombre divino no aparece de forma explícita en la línea.
  - 'Se prefirieron términos bélicos sobrios y modernos: «maza de guerra», «arma de batalla», «aplasto», «destruyo».'
  - 'Se mantuvo la singularidad del destinatario con formas consistentes: «tú», «mi», «contigo».'
