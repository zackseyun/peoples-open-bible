translation:
  language: es
  text: Y en aquellos días Judit oyó[a], hija de Merari hijo de Ox hijo de José hijo de Oziel hijo de Elkías hijo de Eliú hijo de Chelquías hijo de Eliab hijo de Natanael hijo de Salamiel hijo de Sarasadai hijo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de la genealogía de Judit aparecen en formas griegas de nombres más conocidos en la tradición hebrea; posibles equivalentes incluyen Oziel/Uzziel y Sarasadai/Zurishaddai. El texto principal sigue el testimonio griego y no reconstruye formas hebreas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó sobre
  lexicon: BDAG
  rationale: El griego expresa que Judit recibió la noticia; en español bíblico natural, 'oyó' conserva la brevedad y no añade un objeto explícito que el versículo aún no da. 'Escuchó' puede sonar más activo de lo que el contexto exige.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - por entonces
  lexicon: BDAG
  rationale: La fórmula temporal narrativa se mantiene con su valor de marco histórico. 'En aquellos días' es idiomático en español y preserva el tono formal del pasaje.
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - descendiente
  lexicon: BDAG
  rationale: Se trata de una designación genealógica literal; 'hija' refleja el vínculo sin suavizarlo.
- source_word: υἱοῦ
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: BDAG
  rationale: La cadena genealógica repetida en griego se conserva con 'hijo de' para no diluir la estructura de linaje. 'Descendiente de' sería una paráfrasis más libre.
- source_word: Ἰουδεὶθ
  english_pob_choice: Judith
  chosen_spanish: Judit
  alternatives_spanish:
  - Judith
  lexicon: transliteration
  rationale: En español, la forma usual del nombre es 'Judit'. Mantiene identificación clara y lectura natural.
- source_word: Μεραρὶ / Ὢξ / Ἰωσὴφ / Ὀζιὴλ / Ἐλκεία / Ἠλειοὺ / Χελκείου / Ἐλεὰβ / Ναθαναὴλ / Σαλαμιὴλ / Σαρασαδαὶ / Ἰσραήλ
  english_pob_choice: Merari / Ox / Joseph / Oziel / Elkiah / Eliou / Chelkias / Eliab / Nathanael / Salamiel / Sarasadai / Israel
  chosen_spanish: Merari / Ox / José / Oziel / Elkías / Eliú / Quelquías / Eliab / Natanael / Salmiel / Sarasadai / Israel
  alternatives_spanish:
  - Merari / Uz / José / Uzziel / Hilcías / Elíhu / Hilcías / Eliab / Natanael / Selumiel / Zurisadai / Israel
  lexicon: transliteration
  rationale: Los nombres se transliteran desde el griego, no se reconstruyen desde formas hebreas hipotéticas. Se conservan las formas griegas principales, pero adaptadas a ortografía española; cuando un equivalente hebreo es muy reconocible, se mantiene como alternativa en la nota.
theological_decisions:
- issue: Tratamiento de la genealogía y de las variantes onomásticas
  english_pob_reading: The main text follows the Greek witness rather than reconstructing Hebrew forms.
  chosen_spanish_reading: El texto principal sigue el testimonio griego y no reconstruye formas hebreas presuntas.
  alternative_spanish_readings:
  - Retrovertir los nombres a equivalentes hebreos más familiares
  - Normalizar toda la cadena a formas tradicionales castellanas
  rationale: 'No hay disputa doctrinal, pero sí una decisión de fidelidad textual: mantener la genealogía tal como la transmite el griego evita imponer una reconstrucción que el testimonio base no ofrece. La nota conserva la tensión entre forma griega y equivalentes hebreos conocidos.'
  doctrine_reference: Principio de fidelidad textual / crítica textual conservadora
translation_notes:
  revision_awareness: 'El contexto inglés fue ajustado para hacer más natural la puntuación sin cambiar la genealogía. La versión española sigue ese mismo criterio: mantiene la secuencia nominal íntegra, adapta la sintaxis al español y conserva la decisión del POB de no retrovertir sistemáticamente los nombres griegos a formas hebreas.'
  spanish_consistency_notes:
  - Se usó 'Judit' como forma española estable del nombre propio.
  - Se prefirió 'en aquellos días' para conservar el marco narrativo bíblico sin arcaísmo excesivo.
  - La genealogía se mantuvo completa y en orden, con 'hijo de' repetido como en el griego.
  - Se adaptaron los nombres propios a grafía española cuando es posible sin perder la forma griega base.
  - La nota al pie marca la alternativa onomástica principal sin alterar el texto leído.
