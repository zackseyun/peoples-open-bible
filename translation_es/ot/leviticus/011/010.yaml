    rationale: El hebreo dice literalmente «todo lo que no tiene aleta y escama en los mares y en los arroyos…», no «todo lo que está en los mares… y que no tiene…». La redacción actual reestructura el texto de manera menos fiel y más pesada.
  - severity: medium
    issue: «les es detestable» es poco idiomático
    rationale: Aunque intenta reflejar לָכֶם, en español natural el predicado debe expresarse como «son detestables para ustedes» o equivalente. La forma actual suena gramaticalmente extraña.
  - severity: medium
    issue: Falta la nota léxica sobre נְחָלִים
    rationale: El POB inglés preserva la alternativa «streams / rivers / wadis». Dado que «arroyos» estrecha parcialmente el campo semántico, conviene mantener una nota española equivalente.
