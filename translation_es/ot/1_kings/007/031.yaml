base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/031.yaml
  text: Its opening projected upward from within the capital by a cubit[a], and its opening was round, like the work of a pedestal, a cubit and a half; and also on its opening were carvings, and their panels were square[c][b], not round.
  footnotes:
  - marker: a
    text: Or 'its mouth'; the Hebrew uses an architectural metaphor for the opening.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'made like a pedestal' is technically difficult; alternatives include 'the workmanship of a stand' or 'made like a base.'
    reason: lexical_alternative
  - marker: c
    text: Or 'engraved work,' 'wreaths,' or 'garlands' for the decorative term here.
    reason: lexical_alternative
