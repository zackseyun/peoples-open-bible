lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se reproduce con una coordinación simple en español. Se añade el sujeto explícito por claridad natural en español, sin alterar el contenido.
- source_word: בְּנֹתָיו
  english_pob_choice: to his daughters
  chosen_spanish: a sus hijas
  alternatives_spanish:
  - a sus muchachas
  lexicon: HALOT
  rationale: El sustantivo literal es 'hijas'; mantiene la relación familiar y la referencia posesiva de tercera masculina singular.
- source_word: וְאַיּוֹ
  english_pob_choice: Where is he then?
  chosen_spanish: ¿Dónde está él, pues?
  alternatives_spanish:
  - ¿Y dónde está él?
  - ¿Dónde está él entonces?
  lexicon: HALOT
  rationale: La partícula conjuntiva e interrogativa se expresa de manera idiomática con 'pues' al final, conservando el matiz discursivo de continuación y énfasis.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why is it that
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué es esto que
  - ¿Por qué, pues
  lexicon: HALOT
  rationale: En español, la combinación enfática puede expresarse de forma natural con una pregunta directa. El valor enfático queda parcialmente absorbido por el contexto y por 'pues' en la primera pregunta.
- source_word: עֲזַבְתֶּן
  english_pob_choice: you left
  chosen_spanish: han dejado
  alternatives_spanish:
  - dejaron
  - abandonaron
  lexicon: HALOT
  rationale: La forma de 2fpl se refleja con un verbo plural de trato directo en español. 'Han dejado' mantiene cercanía temporal y fluidez; 'abandonaron' sería más fuerte de lo que exige el contexto.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - al hombre
  - a ese hombre
  lexicon: HALOT
  rationale: El referente es inmediato en el contexto; 'este hombre' preserva la deixis discursiva del hebreo y su referencia concreta.
- source_word: קִרְאֶן לוֹ
  english_pob_choice: Call him
  chosen_spanish: Llámenlo
  alternatives_spanish:
  - Invítenlo
  - Háganlo venir
  lexicon: HALOT
  rationale: El imperativo femenino plural se adapta al plural de cortesía/mandato en español. 'Llámenlo' conserva el mandato directo y la relación con el objeto pronominal.
- source_word: וְיֹאכַל לָחֶם
  english_pob_choice: so that he may eat bread
  chosen_spanish: para que coma pan
  alternatives_spanish:
  - y coma pan
  - para que tome pan
  lexicon: HALOT
  rationale: Se mantiene el idioma literal 'comer pan' para preservar la imagen hebrea y su posible sentido idiomático de tomar alimento, como en el texto fuente y la nota inglesa.
translation_notes:
  revision_awareness: Esta versión corrige la falla de validación anterior eliminando toda nota sin anclaje textual. También ajusta la segunda pregunta a un orden natural en español ('¿Dónde está él, pues?') manteniendo el valor discursivo de וְאַיּוֹ y conserva el idiomatismo hebreo de 'comer pan' sin añadir una nota independiente.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo el plural femenino implícito en 'Llámenlo' por la forma hebrea dirigida a las hijas.
  - Se conservó 'pan' para reflejar literalmente לָחֶם y el idiomatismo alimentario del hebreo.
