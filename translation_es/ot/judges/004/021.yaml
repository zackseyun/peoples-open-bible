translation:
  language: es
  text: Entonces Jael[a], la esposa de Héber, tomó una estaca de tienda y puso un martillo en su mano, y se le acercó en silencio y clavó la estaca en su sien, y esta se hundió en la tierra[b]. Él estaba profundamente dormido y agotado, y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sigilosamente' para 'en silencio'. El hebreo enfatiza una aproximación silenciosa y discreta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'y se hundió en la tierra', con el verbo refiriéndose más naturalmente a la estaca.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָעֵל / Jael
  english_pob_choice: Jael
  chosen_spanish: Jael
  alternatives_spanish:
  - Yael
  lexicon: nombre propio bíblico
  rationale: Se conserva la forma habitual del nombre propio en español bíblico, sin transliteración innecesaria que dificultaría el reconocimiento del personaje.
- source_word: אֵשֶׁת חֶבֶר
  english_pob_choice: the wife of Heber
  chosen_spanish: la esposa de Héber
  alternatives_spanish:
  - la mujer de Héber
  - la esposa de Heber
  lexicon: HALOT
  rationale: La apposición hebrea se vierte de manera natural en español con 'la esposa de', manteniendo el vínculo identificador con Héber y el tono narrativo.
- source_word: יְתַד הָאֹהֶל
  english_pob_choice: tent peg
  chosen_spanish: una estaca de la tienda
  alternatives_spanish:
  - una clavija de tienda
  - un estaca de tienda
  - un palo de tienda
  lexicon: HALOT
  rationale: En español 'estaca' comunica bien la pieza para fijar la tienda; 'de la tienda' preserva el referente concreto. 'Clavija' suena menos natural para este contexto narrativo.
- source_word: הַמַּקֶּבֶת
  english_pob_choice: hammer
  chosen_spanish: un martillo
  alternatives_spanish:
  - una maza
  - un mazo
  lexicon: HALOT
  rationale: '''Martillo'' es el equivalente más directo y natural. ''Mazo'' o ''maza'' podrían sugerir otra herramienta o mayor especificidad, sin base suficiente en el contexto.'
- source_word: בְּיָדָהּ
  english_pob_choice: in her hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con su mano
  lexicon: HALOT
  rationale: La frase expresa posesión/tenencia del martillo; 'en su mano' es la formulación idiomática y clara en español.
- source_word: בַּלָּאט
  english_pob_choice: quietly
  chosen_spanish: en silencio
  alternatives_spanish:
  - sigilosamente
  - calladamente
  - quietamente
  lexicon: HALOT
  rationale: La POB inglesa destacó el matiz de acercamiento silencioso y unobtrusivo. En español, 'en silencio' conserva bien ese énfasis sin cargar más de lo que exige el hebreo; 'sigilosamente' añade una nota de ocultamiento más fuerte.
- source_word: וַתִּתְקַע
  english_pob_choice: drove
  chosen_spanish: clavó
  alternatives_spanish:
  - hincó
  - hundió
  - golpeó
  lexicon: HALOT
  rationale: En contexto con la estaca y el martillo, el verbo describe introducirla con fuerza. 'Clavó' es el equivalente español más natural y preciso para ese acto.
- source_word: בְּרַקָּתוֹ
  english_pob_choice: into his temple
  chosen_spanish: en su sien
  alternatives_spanish:
  - en su templo
  - en la sien de él
  - en la parte lateral de su cabeza
  lexicon: HALOT
  rationale: '''רַקָּה'' designa la sien/temporal. En español ''sien'' es la forma idiomática y anatómicamente clara.'
- source_word: וַתִּצְנַח בָּאָרֶץ
  english_pob_choice: and it went down into the ground
  chosen_spanish: y ésta cayó a tierra
  alternatives_spanish:
  - y la estaca cayó a tierra
  - y se hundió en la tierra
  - y bajó hasta el suelo
  lexicon: HALOT
  rationale: La POB inglesa aclaró que el sujeto natural es la estaca; en español, el demostrativo 'ésta' retoma con claridad la estaca sin añadir más de lo necesario. 'A tierra' refleja el movimiento hacia el suelo/terreno sin especificar más de la cuenta.
- source_word: נִרְדָּם
  english_pob_choice: fast asleep
  chosen_spanish: profundamente dormido
  alternatives_spanish:
  - dormido
  - en profundo sueño
  lexicon: HALOT
  rationale: El participio señala un estado de sueño. 'Profundamente dormido' expresa bien la intensidad narrativa y es natural en español; evita la coloquialidad de 'fast asleep' sin perder fuerza.
- source_word: וַיָּעַף
  english_pob_choice: exhausted
  chosen_spanish: agotado
  alternatives_spanish:
  - cansado
  - fatigado
  - exhausto
  lexicon: HALOT
  rationale: '''Agotado'' refleja adecuadamente la fatiga extrema que la POB inglesa destacó. Mantiene el paralelismo con el sueño y no suaviza la intensidad del hebreo.'
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: Se conserva la finalidad narrativa y directa del hebreo sin eufemismo.
theological_decisions:
- issue: Tratamiento del nombre divino no presente en el versículo
  english_pob_reading: No issue in verse
  chosen_spanish_reading: No aplica en este versículo
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene el tetragrámaton ni un título divino que requiera decisión terminológica especial.
  doctrine_reference: N/A
- issue: Narración violenta y finalidad del acto
  english_pob_reading: The verse reports the action bluntly and without embellishment
  chosen_spanish_reading: La traducción mantiene el tono sobrio y factual del relato
  alternative_spanish_readings:
