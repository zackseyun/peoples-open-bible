id: 1TH.2.12
reference: 1 Thessalonians 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παρακαλοῦντες ὑμᾶς καὶ παραμυθούμενοι καὶ μαρτυρόμενοι, εἰς τὸ ⸀περιπατεῖν ὑμᾶς ἀξίως τοῦ θεοῦ τοῦ καλοῦντος ὑμᾶς εἰς τὴν ἑαυτοῦ βασιλείαν καὶ δόξαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/012.yaml
  text: encouraging[a], comforting, and urging you to walk worthily of God[c][b], who calls you into his own kingdom and glory.
  footnotes:
  - marker: a
    text: Or 'exhorting you ... and testifying to you'; the three participles describe Paul's fatherly ministry with overlapping nuances of encouragement, comfort, and solemn appeal.
    reason: lexical_alternative
  - marker: b
    text: '''Walk'' is a biblical metaphor for one''s manner of life; alternatively, ''live'' or ''conduct yourselves.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'encouraging you and comforting you and urging you'.
    reason: previous_rendering
translation:
  language: ko
  text: 곧 여러분을 권면하고[a] 위로하며 엄히 권하여, 여러분을 자기의 나라와 영광으로 부르시는 하나님께 합당하게 행하게[b] 하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「격려하며 ... 증언하며」. 세 분사는 부성적 사역의 권면·위로·엄숙한 호소를 함께 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「행함」(걷다)은 삶의 양식을 가리키는 성경적 비유. 또는 「살게」, 「처신하게」.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλοῦντες
  english_pob_choice: encouraging
  chosen_korean: 권면하고
  alternatives_korean:
  - 격려하고
  - 호소하고
  lexicon: BDAG
  rationale: παρακαλέω의 권면·호소 의미. 「권면」이 한국 교회 전통에서 정형화되어 있으며 부성적 사역 정황에 잘 맞는다.
- source_word: παραμυθούμενοι
  english_pob_choice: comforting
  chosen_korean: 위로하며
  alternatives_korean:
  - 다독이며
  - 격려하며
  lexicon: BDAG
  rationale: παραμυθέομαι의 부드러운 위로·다독임. 「위로」가 가장 자연스럽다.
- source_word: μαρτυρόμενοι
  english_pob_choice: urging
  chosen_korean: 엄히 권하여
  alternatives_korean:
  - 증언하여
  - 엄숙히 호소하여
  lexicon: BDAG
  rationale: μαρτύρομαι는 「엄숙히 증언·호소」. 한국어 「엄히 권하여」가 권면 어휘군 안에서 가장 무게 있는 호소의 의미를 담는다.
- source_word: περιπατεῖν ἀξίως τοῦ θεοῦ
  english_pob_choice: to walk worthily of God
  chosen_korean: 하나님께 합당하게 행하게
  alternatives_korean:
  - 하나님께 합당하게 살게
  - 하나님께 합당하게 걸어가게
  lexicon: BDAG
  rationale: περιπατέω의 비유적 「걸음=삶의 양식」을 한국 교회 전통의 「행하다」로 옮긴다. 비유적 의미는 각주에 명시한다.
- source_word: εἰς τὴν ἑαυτοῦ βασιλείαν καὶ δόξαν
  english_pob_choice: into his own kingdom and glory
  chosen_korean: 자기의 나라와 영광으로
  alternatives_korean:
  - 자신의 나라와 영광 안으로
  - 그분의 나라와 영광 안으로
  lexicon: BDAG
  rationale: 재귀 ἑαυτοῦ를 「자기의」로 옮겨 하나님 자신의 나라임을 명시한다. 「~으로」가 부르심의 방향성을 자연스럽게 담는다.
