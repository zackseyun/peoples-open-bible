translation:
  language: es
  text: A Yahvé nuestro Dios pertenece la justicia[a], pero a nosotros y a nuestros padres nos pertenece la vergüenza del rostro[b], como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud». El griego δικαιοσύνη puede denotar tanto rectitud como justicia; aquí el texto principal conserva «justicia» por claridad en español y por el contexto confesional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vergüenza del rostro», un giro idiomático para indicar deshonra o humillación pública.
    reason: cultural_note
lexical_decisions:
- source_word: Τῷ κυρίῳ θεῷ ἡμῶν
  english_pob_choice: To the Lord our God belongs
  chosen_spanish: De Yahvé nuestro Dios es
  alternatives_spanish:
  - A Yahvé nuestro Dios pertenece
  - Yahvé nuestro Dios tiene
  lexicon: BDAG
  rationale: El dativo de posesión/atribución se expresa en español con una construcción de pertenencia. Se conserva el nombre divino «Yahvé» según el estándar del proyecto, y «nuestro Dios» mantiene el paralelismo confesional del griego.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: En este contexto confesional, el término puede abarcar tanto rectitud como justicia. Se elige «justicia» porque en español comunica bien la idea de que Dios está en lo correcto, sin forzar una lectura puramente forense ni eliminar la tensión lexical documentada.
- source_word: ἡμῖν δὲ καὶ τοῖς πατράσιν ἡμῶν
  english_pob_choice: but to us and to our fathers belongs
  chosen_spanish: pero de nosotros y de nuestros padres es
  alternatives_spanish:
  - pero a nosotros y a nuestros padres pertenece
  - pero para nosotros y para nuestros padres es
  lexicon: BDAG
  rationale: La preposición posesiva en español se naturaliza con «de... es», preservando el contraste del griego y la inclusión explícita de los antepasados en la confesión.
- source_word: ἡ αἰσχύνη τῶν προσώπων
  english_pob_choice: shame of face
  chosen_spanish: la vergüenza del rostro
  alternatives_spanish:
  - la vergüenza en el rostro
  - la vergüenza de la cara
  - el oprobio público
  lexicon: BDAG
  rationale: Se mantiene el idiomatismo semítico-septuagintal de «rostro/cara» para no borrar la imagen concreta. «Vergüenza del rostro» es suficientemente literal y legible en español, y deja ver la idea de humillación pública.
- source_word: ὡς ἡ ἡμέρα αὕτη
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como es este día
  - como hasta hoy
  - tal como sucede hoy
  lexicon: BDAG
  rationale: La fórmula se vuelve a una expresión española natural que conserva el valor de situación presente y manifiesta. «En este día» reproduce el tono de fórmula confesional sin sobreexplicar.
theological_decisions:
- issue: δικαιοσύνη predicada de Dios
  english_pob_reading: God's righteousness/rightness is contrasted with Israel's public shame
  chosen_spanish_reading: La justicia pertenece a Yahvé, y la vergüenza pertenece al pueblo y a sus padres
  alternative_spanish_readings:
  - La rectitud pertenece a Yahvé, y la vergüenza al pueblo
  - La justicia de Yahvé contrasta con la humillación de Israel
  rationale: 'Se conserva la tensión teológica: Dios es el referente de la justicia, mientras que el pueblo carga con la vergüenza. «Justicia» permite abarcar rectitud y derecho sin reducir el término a mera retribución judicial, en línea con el auditable default del proyecto.'
  doctrine_reference: 'DOCTRINE.md: contested terms for δικαιοσύνη; preserve breadth rather than over-resolve into ''justice'' only or ''righteousness'' only.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la revisión auditada en inglés; no se registran cambios aplicados en el ciclo más reciente y la presente propuesta sigue la lectura aprobada, adaptando solo la formulación al español con cuidado de no neutralizar el idiomatismo ni la tensión semántica de δικαιοσύνη.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene la antítesis entre la justicia de Dios y la vergüenza del pueblo.
  - «Vergüenza del rostro» conserva la imagen semítica sin volverla demasiado interpretativa.
  - La puntuación reproduce el paralelismo y la pausa fuerte del original griego.
