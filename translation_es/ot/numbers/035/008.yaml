translation:
  language: es
  text: 'Y las ciudades que ustedes darán de la posesión de los hijos de Israel[b]: del que tiene mucho darán más[a], y del que tiene poco darán menos. Cada uno, según su heredad que hereda, dará de sus ciudades a los levitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «de lo mucho aumentarán, y de lo poco disminuirán»; la idea es una asignación proporcional desde heredades mayores y menores.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los israelitas» por «los hijos de Israel». El texto principal conserva la expresión formal masculina del hebreo mientras se refiere al pueblo del pacto en su conjunto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los pueblos
  lexicon: HALOT
  rationale: עִיר designa una ciudad o población. En este contexto jurídico de asignación de ciudades levíticas, 'las ciudades' conserva el término técnico y sigue de cerca la estructura del original.
- source_word: תִּתְּנוּ
  english_pob_choice: you give
  chosen_spanish: ustedes darán
  alternatives_spanish:
  - ustedes den
  - ustedes entregarán
  lexicon: HALOT
  rationale: El imperfecto en instrucción legal expresa obligación futura o normativa. 'Darán' mantiene esa fuerza sin sonar artificial en español.
- source_word: מֵאֲחֻזַּת
  english_pob_choice: possession
  chosen_spanish: de la posesión
  alternatives_spanish:
  - de la propiedad
  - de la heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה se refiere a una posesión hereditaria de tierra. 'Posesión' es suficientemente amplio y preserva el valor de tenencia tribal/covenantal sin adelantar más de lo que el hebreo dice.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal del hebreo. 'Hijos de Israel' es natural en español bíblico y refleja el masculino formal del original.
- source_word: מֵאֵת הָרַב תַּרְבּוּ
  english_pob_choice: from the many you shall increase
  chosen_spanish: de los muchos aumentarán[a]
  alternatives_spanish:
  - de los muchos multiplicarán
  - de los más aumentarán
  lexicon: HALOT
  rationale: La POB inglesa optó por 'the many' como traducción más literal del sustantivo colectivo הָרַב; en español 'los muchos' conserva ese valor. 'Aumentarán' reproduce la Hifil de רבה, manteniendo el matiz de hacer mayor la cantidad de ciudades asignadas.
- source_word: וּמֵאֵת הַמְעַט תַּמְעִיטוּ
  english_pob_choice: and from the few you shall diminish
  chosen_spanish: y de los pocos disminuirán
  alternatives_spanish:
  - y de los pocos reducirán
  - y de los menos disminuirán
  lexicon: HALOT
  rationale: Se sigue el paralelismo con 'los muchos'. 'Disminuirán' conserva el registro formal y la correspondencia con la raíz מעט, sin endurecer el español con un calco innecesario.
- source_word: אִישׁ
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada hombre
  - Cada persona
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino singular, el sentido distributivo es el principal. 'Cada uno' evita restringir el alcance a varones individuales y mantiene la función distributiva del término.
- source_word: כְּפִי נַחֲלָתוֹ
  english_pob_choice: according to his inheritance
  chosen_spanish: según su heredad
  alternatives_spanish:
  - conforme a su heredad
  - en proporción a su heredad
  lexicon: HALOT
  rationale: El modismo כְּפִי expresa medida o proporción. 'Según su heredad' es claro en español y conserva el sentido de asignación proporcional sin añadir explicaciones al cuerpo del versículo.
- source_word: אֲשֶׁר יִנְחָלוּ
  english_pob_choice: that he inherits
  chosen_spanish: que hereda
  alternatives_spanish:
  - que recibe en heredad
  - que ha de heredar
  lexicon: HALOT
  rationale: Aunque el hebreo plural puede mirar al grupo tribal, la revisión inglesa corrigió la concordancia para ajustarla a 'Cada uno'. En español, 'que hereda' mantiene la relación verbal con la heredad y la corrección distributiva.
- source_word: מֵעָרָיו
  english_pob_choice: some of his cities
  chosen_spanish: de sus ciudades
  alternatives_spanish:
  - de algunas de sus ciudades
  - de las ciudades que tenga
  lexicon: HALOT
  rationale: El partitivo מִן se expresa naturalmente con 'de'. La POB inglesa añadió 'some of' para explicitar el valor partitivo; en español 'de sus ciudades' ya deja esa relación abierta sin sobrerredactar.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  - a favor de los levitas
  lexicon: HALOT
  rationale: La designación tribal estándar se traduce con el nombre habitual en español bíblico. 'A los levitas' mantiene la dirección de la entrega y su función legal.
theological_decisions:
- issue: Distribución proporcional según la heredad tribal
  english_pob_reading: from the many you shall increase, and from the few you shall diminish
  chosen_spanish_reading: de los muchos aumentarán, y de los pocos disminuirán
  alternative_spanish_readings:
  - de los muchos aumentarán, y de los pocos reducirán
  - de los muchos darán más, y de los pocos darán menos
  rationale: El punto del texto no es solo aritmético, sino proporcional y jurídico. La formulación elegida conserva el paralelismo hebreo y la obligación de ajustar el número de ciudades según el tamaño de la heredad, sin convertir el versículo en una explicación interpretativa extensa.
  doctrine_reference: Distribución justa de la heredad; organización levítica en Números 35
- issue: Alcance distributivo de אִישׁ
  english_pob_reading: Each one
  chosen_spanish_reading: Cada uno
  alternative_spanish_readings:
  - Cada hombre
  - Cada persona
  rationale: El hebreo usa un singular masculino con fuerza distributiva. 'Cada uno' preserva esa función sin imponer un sentido exclusivamente masculino para el conjunto de los que poseen heredad, que en el contexto es representativo del pueblo tribal.
  doctrine_reference: Uso distributivo del singular en hebreo bíblico
- issue: Relación entre heredades y ciudades entregadas
  english_pob_reading: each ... shall give some of his cities to the Levites
  chosen_spanish_reading: cada uno ... dará de sus ciudades a los levitas
  alternative_spanish_readings:
  - cada uno ... dará algunas de sus ciudades a los levitas
  - cada uno ... entregará ciudades de su heredad a los levitas
  rationale: El texto establece que las ciudades levíticas provienen de las posesiones tribales. 'De sus ciudades' conserva la partícula partitiva y deja claro que la entrega se hace desde la propia heredad, sin precisar más de lo necesario.
  doctrine_reference: Ciudades levíticas; provisión para los levitas
- issue: Terminología de heredad
  english_pob_reading: inheritance / possession
  chosen_spanish_reading: heredad / posesión
  alternative_spanish_readings:
  - herencia / propiedad
  - posesión / heredad
  rationale: Se conserva la distinción entre el ámbito territorial recibido en reparto ('posesión') y la cuota hereditaria ('heredad'). 'Heredad' suena más bíblico y técnico que 'herencia' en este pasaje de distribución territorial.
  doctrine_reference: Lenguaje de tierra heredada en la Torá
translation_notes:
  revision_awareness: 'La traducción inglesa revisada abandonó ''larger tribes/smaller'' por ''the many/the few'' para acercarse más al hebreo, y corrigió la concordancia de ''that they inherit'' a singular ''that he inherits''. La versión española sigue esa revisión: conserva ''los muchos/los pocos'' y ajusta el verbo a ''que hereda'' en relación con ''Cada uno''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto no aplicable aquí porque el versículo no contiene el nombre divino.
  - '''Levitas'' se conserva como designación tribal estable.'
  - '''Heredad'' se usa de modo consistente para el reparto territorial; ''posesión'' se reserva para אֲחֻזָּה en el encabezado del versículo.'
  - Se evita 'siervo' u otra terminología ajena, porque el hebreo trata aquí de asignación territorial y no de estatus personal.
  - La puntuación con dos puntos en la primera cláusula ayuda a reflejar la transición del sustantivo inicial al mandato proporcional.
