translation:
  language: es
  text: Cuando salgas a la guerra contra tus enemigos, y Yahvé tu Dios los ponga[a] en tu mano, y tomes cautivos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lo/ello pondrá en tu mano»; el sufijo singular probablemente se refiere de manera colectiva a la fuerza enemiga, por eso aquí se traduce «los».
    reason: lexical_alternative
  - marker: b
    text: 'O: «y captures cautivos de ellos». El hebreo usa una expresión cognada de verbo y sustantivo para la idea de tomar prisioneros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto casuístico, כִּי introduce una situación prevista; «Cuando» conserva ese valor mejor que una condicional más general como «Si».
- source_word: תֵצֵא
  english_pob_choice: you go out
  chosen_spanish: salgas
  alternatives_spanish:
  - vayas fuera
  - salieras
  lexicon: HALOT
  rationale: El hebreo expresa salir hacia una campaña militar. «Salgas» mantiene la acción concreta y suena natural en español.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to war
  chosen_spanish: a la guerra
  alternatives_spanish:
  - a la batalla
  - para la guerra
  lexicon: HALOT
  rationale: La expresión denota el ámbito de combate; «a la guerra» comunica bien el sentido militar sin recargar la frase.
- source_word: עַל אֹיְבֶיךָ
  english_pob_choice: against your enemies
  chosen_spanish: contra tus enemigos
  alternatives_spanish:
  - sobre tus enemigos
  lexicon: HALOT
  rationale: עַל con acción hostil se entiende naturalmente como «contra» en español. «Tus enemigos» preserva el plural del original.
- source_word: וּנְתָנוֹ
  english_pob_choice: gives them
  chosen_spanish: los ponga en tu mano
  alternatives_spanish:
  - los entregue en tu mano
  - te los dé
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «lo pondrá» con sufijo singular, pero el referente es colectivo. En español, «los ponga en tu mano» mantiene la imagen idiomática de entrega y hace explícito el plural del antecedente, como en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Es la fórmula pactal estándar; «tu Dios» es la traducción directa y natural.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - bajo tu poder
  - en tu poder
  lexicon: HALOT
  rationale: Se conserva la imagen corporal hebrea de «mano», que en contexto significa dominio o control. En español, «en tu mano» es suficientemente transparente.
- source_word: וְשָׁבִיתָ
  english_pob_choice: and you take
  chosen_spanish: y los tomes cautivos
  alternatives_spanish:
  - y captures
  - y los lleves cautivos
  lexicon: HALOT
  rationale: שָׁבָה expresa capturar/tomar cautivo. Como el sustantivo siguiente repite la idea, «tomes cautivos» comunica el resultado sin perder la fuerza verbal.
- source_word: שִׁבְיֹו
  english_pob_choice: them captive
  chosen_spanish: cautivos
  alternatives_spanish:
  - cautiverio
  - prisioneros
  lexicon: HALOT
  rationale: El sustantivo cognado de «captividad/cautivos» se traduce con un término español que preserve la repetición semántica del hebreo. «Cautivos» refleja bien el doblete verbal-sustantivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se mantiene la política del proyecto para el nombre personal de Dios. Esto evita ocultarlo bajo una sustitución titular y conserva la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen idiomática de la «mano» para entrega en poder
  english_pob_reading: into your hand
  chosen_spanish_reading: en tu mano
  alternative_spanish_readings:
  - en tu poder
  - bajo tu control
  rationale: La expresión hebrea conserva fuerza idiomática. Traducirla literalmente en español permite que el lector perciba la metáfora de dominio sin eliminarla.
  doctrine_reference: Uso idiomático hebreo de בְּיָדֶךָ
translation_notes:
  revision_awareness: Se corrigió el problema previo asegurando que cada nota al pie esté anclada explícitamente en el texto español mediante los marcadores [a] y [b]. La redacción general se ajustó para ser publicable y conservar la imaginería hebrea de entrega «en tu mano» y cautiverio.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología por defecto del proyecto para יְהוָה.
  - Se conserva la imagen de la «mano» para בְּיָדֶךָ, en vez de sustituirla por una abstracción interpretativa.
  - «Cautivos» reproduce mejor la repetición cognada de שָׁבָה / שִׁבְיֹו que una paráfrasis más libre.
