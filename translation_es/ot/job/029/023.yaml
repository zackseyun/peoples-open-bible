translation:
  language: es
  text: Me esperaban como a la lluvia, y abrían su boca de par en par para la lluvia tardía[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para la lluvia de primavera' o 'para la lluvia postrera'. El hebreo מַלְקוֹשׁ se refiere a la lluvia tardía de la estación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִחֲלוּ
  english_pob_choice: they waited
  chosen_spanish: lo esperaban
  alternatives_spanish:
  - esperaban
  - aguardaban
  - lo aguardaban
  lexicon: HALOT
  rationale: יַחַל expresa esperar con expectativa. En español, 'lo esperaban' conserva la idea de espera orientada a la persona de Job; el pronombre lo mantiene la referencia explícita de לִי sin añadir una interpretación más amplia como 'sus palabras'.
- source_word: כַמָּטָר
  english_pob_choice: as for the rain
  chosen_spanish: como a la lluvia
  alternatives_spanish:
  - como lluvia
  - como para la lluvia
  lexicon: HALOT
  rationale: La comparación usa כ + מָטָר. 'Como a la lluvia' suena natural en español y conserva la comparación afectiva/expectante del texto, sin forzar una paráfrasis.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: lo
  alternatives_spanish:
  - para mí
  - por mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'para mí'. En español, 'lo esperaban' permite retener esa referencia de forma idiomática en el verbo de espera, mientras el contexto sigue mostrando que el referente es Job mismo.
- source_word: וּפִיהֶם
  english_pob_choice: and their mouths
  chosen_spanish: la boca
  alternatives_spanish:
  - sus bocas
  - la boca de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español 'abrían la boca de par en par' es una expresión natural y fiel al acto descrito. El plural puede sonar pesado en la expresión idiomática; el sentido colectivo sigue claro por el sujeto plural.
- source_word: פָּעֲרוּ
  english_pob_choice: they opened wide
  chosen_spanish: abrían de par en par
  alternatives_spanish:
  - abrían ampliamente
  - abrían mucho
  - abrían
  lexicon: HALOT
  rationale: פער comunica apertura amplia, especialmente de la boca. 'Abrían de par en par' transmite bien esa amplitud y mantiene la imagen vívida sin añadir connotación extra.
- source_word: לְמַלְקוֹשׁ
  english_pob_choice: for the spring rain
  chosen_spanish: para la lluvia tardía
  alternatives_spanish:
  - para la lluvia de primavera
  - para la lluvia final
  - para el 'latter rain'
  lexicon: HALOT
  rationale: מַלְקוֹשׁ denota la lluvia tardía de la estación lluviosa. 'Lluvia tardía' preserva mejor el valor léxico y la resonancia bíblica que 'lluvia de primavera', aunque esa sea una aclaración posible en nota.
translation_notes:
  revision_awareness: La versión inglesa ya estaba estable y de alta concordancia; el ajuste principal en español fue conservar el valor léxico de מַלְקוֹשׁ como 'lluvia tardía' y evitar una equivalencia más interpretativa como 'lluvia de primavera' en el texto principal, reservando esa aclaración para la nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma de traducción del nombre divino, pero este versículo no lo contiene.
  - Se conservó una equivalencia natural y no arcaizante para 'abrían la boca de par en par', acorde con el registro público del proyecto.
  - La nota usa una alternativa española ('lluvia de primavera') para comunicar la referencia estacional sin perder la lectura más literal ('lluvia tardía').
