revisions:
- from: Rociará sobre el que se está purificando de la enfermedad de la piel siete veces[a], y lo declarará limpio[b], y soltará el ave viva sobre el campo abierto.
  to: Rociará[a] sobre el que está siendo purificado de la enfermedad de la piel siete veces[b], y lo declarará limpio[c], y soltará el ave viva sobre el campo abierto.
  rationale: 'Se aplican dos ajustes menores: (1) se explicita mediante nota el objeto implícito de ''rociará'' para que el español no quede truncado, y (2) se reemplaza ''se está purificando'' por ''está siendo purificado'' para reflejar mejor el valor procesual del participio hebreo. Se conservan las decisiones léxicas principales del POB y se reanclan las notas con marcadores únicos y coherentes con el texto revisado.'
