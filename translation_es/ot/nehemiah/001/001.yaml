revisions:
- from: Las palabras de Nehemías hijo de Hacalías[a]. Y aconteció en el mes de Kislev, en el año veinte[b], mientras yo estaba en Susa, la ciudadela[c].
  to: Las palabras de Nehemías hijo de Hacalías[a]. Ahora bien, sucedió en el mes de Kislev, en el vigésimo año[b], mientras yo estaba en Susa la ciudadela[c],
  rationale: 'La revisión hace tres ajustes menores: (1) usa una fórmula narrativa más natural en español contemporáneo («Ahora bien, sucedió»), (2) reemplaza «año veinte» por «vigésimo año» en el texto principal, dejando el literal en nota, y (3) une «Susa la ciudadela» sin coma para reflejar mejor la construcción hebrea y la intención topográfica. También se adapta la nota c para que el alternante corresponda a la frase revisada.'
