translation:
  language: es
  text: Sin embargo, pusieron a prueba[a] a Dios, el Altísimo, y se rebelaron[c]; no guardaron sus testimonios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «probaron a Dios, el Altísimo».
    reason: lexical_alternative
  - marker: b
    text: O «sus decretos» o «sus estatutos».
    reason: lexical_alternative
  - marker: c
    text: O «pusieron a prueba y se rebelaron contra Dios, el Altísimo».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְנַסּוּ
  english_pob_choice: they tested
  chosen_spanish: probaron
  alternatives_spanish:
  - pusieron a prueba
  - tentaron
  lexicon: HALOT
  rationale: נסה en este contexto pactal expresa poner a prueba; «probaron» comunica bien la idea en español y conserva la fuerza de la reprensión sin arcaísmo. «Pusieron a prueba» también sería posible, pero es más largo.
- source_word: וַיַּמְרוּ
  english_pob_choice: rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - fueron rebeldes
  - provocaron
  lexicon: HALOT
  rationale: מרה describe desafío o rebelión contra Dios. «Se rebelaron» transmite la acción abierta y activa que el contexto exige.
- source_word: אֶת אֱלֹהִים עֶלְיוֹן
  english_pob_choice: against God Most High
  chosen_spanish: a Dios Altísimo
  alternatives_spanish:
  - contra Dios Altísimo
  - a Dios, el Altísimo
  - al Dios Altísimo
  lexicon: HALOT
  rationale: En español, con «probar» el objeto directo se expresa naturalmente con «a». El segundo verbo, «se rebelaron», ya lleva la idea de oposición, por lo que no requiere repetir «contra». «Dios Altísimo» preserva el título divino sin añadir matices ajenos.
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - el Altísimo
  - Muy Alto
  lexicon: HALOT
  rationale: «Altísimo» es la forma natural y reverente en español para el título divino עֶלְיוֹן. Mantiene el valor honorífico sin sobreexplicar.
- source_word: וְעֵדוֹתָיו
  english_pob_choice: and his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus decretos
  - sus estatutos
  - sus mandatos
  lexicon: HALOT
  rationale: «Testimonios» conserva mejor la conexión léxica con el hebreo עֵדוֹת, que alude a las declaraciones/estipulaciones que dan testimonio del pacto. Se evita reducirlo de entrada a un término legal más estrecho.
- source_word: לֹא שָׁמָרוּ
  english_pob_choice: they did not keep
  chosen_spanish: no guardaron
  alternatives_spanish:
  - no observaron
  - no conservaron
  lexicon: HALOT
  rationale: שׁמר con mandatos o testimonios se traduce bien por «guardar» en español bíblico y contemporáneo, manteniendo la idea de observar fielmente y obedecer.
theological_decisions:
- issue: Relación entre «Dios» y el título divino «Altísimo»
  english_pob_reading: God Most High
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - Dios, el Altísimo
  - el Altísimo Dios
  rationale: La expresión conserva la unidad del título y evita una formulación demasiado explicativa. No se introduce una distinción doctrinal extra; simplemente se refleja la elevación del nombre divino.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Valor pactal de עֵדוֹתָיו
  english_pob_reading: his testimonies
  chosen_spanish_reading: sus testimonios
  alternative_spanish_readings:
  - sus decretos
  - sus estatutos
  rationale: El versículo acusa infidelidad al pacto. «Testimonios» preserva el matiz de testimonio/autoridad pactual mejor que una reducción genérica a normas legales.
  doctrine_reference: 'Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'El auditable English POB llega a una forma revisada estable: separa los dos verbos principales, mantiene el matiz acusatorio de נסה/מרה y conserva «testimonies» para עֵדוֹתָיו. La versión española sigue esa lectura y evita una construcción forzada con «contra» después de «probar»; por eso el objeto se expresa con «a Dios Altísimo» y la rebelión queda como verbo coordinado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «Altísimo» para עֶלְיוֹן, reflejando el título compuesto sin cambiar a «SEÑOR».
  - «Testimonios» se conserva de manera consistente para עֵדוֹת, en línea con el léxico pactal del Salterio.
  - «Guardar» reproduce el valor covenantal de שׁמר sin sustituirlo por un verbo menos preciso como «obedecer».
