translation:
  language: es
  text: Te quedarás de pie fuera, y el hombre a quien le haces el préstamo[a] sacará la prenda a ti desde afuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hombre que está endeudado contigo sacará la prenda a ti desde afuera». La expresión hebrea puede enfatizar ya sea el acto del acreedor de prestar o el estado de endeudamiento del deudor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - outside
  lexicon: HALOT
  rationale: El hebreo indica la posición exterior respecto de la casa. En español jurídico-bíblico, «fuera» es natural y conserva la instrucción concreta de no entrar.
- source_word: תַּעֲמֹד
  english_pob_choice: you shall stand
  chosen_spanish: te quedarás
  alternatives_spanish:
  - te pondrás de pie
  - permanecerás de pie
  - estarás de pie
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie», en este contexto legal la idea funcional es permanecer esperando afuera. «Te quedarás fuera» comunica la postura obligatoria sin sonar forzado en español; la concreción física queda implícita por el contexto.
- source_word: וְהָאִישׁ
  english_pob_choice: and the man
  chosen_spanish: y el hombre
  alternatives_spanish:
  - y el varón
  - y la persona
  lexicon: HALOT
  rationale: איש aquí se refiere al deudor varón del caso legal. «Hombre» mantiene la referencia de género presente en el hebreo y evita neutralizar el término sin base textual.
- source_word: אֲשֶׁר אַתָּה נֹשֶׁה בוֹ
  english_pob_choice: to whom you are making the loan
  chosen_spanish: a quien tú estés haciendo el préstamo
  alternatives_spanish:
  - a quien tú prestas
  - que está endeudado contigo
  - a quien tú le haces el préstamo
  lexicon: HALOT
  rationale: El verbo נשה admite el matiz de prestar o de tener a alguien en deuda. Siguiendo la decisión auditada del inglés, se conserva el acto de préstamo como relación jurídica principal. «Estés haciendo» refleja el aspecto verbal en esta instrucción de caso y evita cerrar indebidamente la ambigüedad entre prestar y estar endeudado.
- source_word: יוֹצִיא
  english_pob_choice: shall bring
  chosen_spanish: sacará
  alternatives_spanish:
  - traerá
  - sacará afuera
  - hará salir
  lexicon: HALOT
  rationale: El hifil de יצא significa hacer salir. «Sacará» es el equivalente español más natural y fiel al movimiento causado desde el interior hacia el exterior.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - a ti
  - para ti
  - hasta ti
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el acreedor. «Hacia ti» conserva ese movimiento direccional junto con la escena de entrega fuera de la casa.
- source_word: הָעֲבוֹט
  english_pob_choice: the pledge
  chosen_spanish: el objeto dado en prenda
  alternatives_spanish:
  - la prenda
  - el aval
  - la garantía
  lexicon: HALOT
  rationale: עבוט es el bien entregado como garantía de un préstamo. «Objeto dado en prenda» explicita el valor legal del término sin reducirlo a una sola palabra moderna que pueda ser demasiado técnica o ambigua. Se evita «collateral» por ser poco natural en español bíblico.
- source_word: הַחוּצָה
  english_pob_choice: out
  chosen_spanish: hacia afuera
  alternatives_spanish:
  - afuera
  - al exterior
  - fuera
  lexicon: HALOT
  rationale: La forma direccional añade movimiento hacia el exterior. En español se integra en la oración con «sacará hacia ti» y el valor de salida queda recogido por el verbo; no se repite de modo pesado.
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado por el audit trail inglés: obligación de permanecer fuera y de recibir el objeto en prenda mediante entrega del deudor o del hombre endeudado. No se detectaron revisiones posteriores que alteraran la lectura.'
  spanish_consistency_notes:
  - Se mantuvo «prenda» en el sentido jurídico de garantía del préstamo, coherente con el léxico del pasaje.
  - Se conservó la ambigüedad funcional de נשה mediante una formulación que permite tanto la relación de préstamo como la de deuda, sin forzar una de las dos opciones.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, y no hay términos cristológicos o doctrinales en este versículo.
