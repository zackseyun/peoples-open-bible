review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: finalidad («para que»), dos contingencias paralelas («si sucede algo inesperado» / «si sobreviene alguna dificultad»), el participio circunstancial («sabiendo»), y el propósito de evitar perturbación pública. Sin embargo, la frase «sabiendo a quienes han sido encomendados los asuntos» invierte la relación sintáctica del original. El griego ᾧ καταλέλειπται τὰ πράγματα significa «a quien se le han dejado/encomendado los asuntos», no «a quienes han sido encomendados los asuntos»; en español actual la redacción propuesta suena como si «quienes» fueran los asuntos o los receptores de una encomienda distinta. Además, falta tilde en «quién» por tratarse de interrogativo/relativo tónico en construcción indirecta («sabiendo a quién...»), y lo más probable es singular, porque el griego tiene dativo singular ᾧ.'
  spanish_quality_summary: El español es generalmente claro y digno. «Para que», «algo inesperado», «alguna dificultad» y «no se turben» son legibles y adecuados. La principal dificultad de naturalidad y precisión está en «a quienes han sido encomendados los asuntos», que resulta gramaticalmente forzada y semánticamente ambigua. Una reparación mínima y elegante es «sabiendo a quién se le han encomendado los asuntos», o más cerca de la nota alternativa, «a quién se le han dejado los asuntos».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales concuerdan con la auditoría inglesa. La nota alternativa debe mantenerse porque el inglés preserva la ambigüedad entre «dejados» y «encomendados».
  issues:
  - severity: high
    issue: La construcción «a quienes han sido encomendados los asuntos» no representa fielmente ᾧ καταλέλειπται τὰ πράγματα.
    rationale: El griego expresa el destinatario singular de la delegación («a quien se le han dejado/encomendado los asuntos»). El borrador usa una construcción que en español suena mal formada y altera la relación entre el referente y «los asuntos».
  - severity: medium
    issue: Número y acentuación de «a quienes».
    rationale: 'El original tiene dativo singular ᾧ, por lo que conviene «a quién». Además, en esta construcción indirecta corresponde la tilde diacrítica: «sabiendo a quién...».'
  - severity: low
    issue: «No se turben» es aceptable, pero algo menos fuerte que «no sean arrojados a la confusión».
    rationale: No exige cambio obligatorio, pero la intensidad de ἐπιταράσσωνται podría también expresarse como «no se llenen de confusión» o «no caigan en confusión». Aun así, «no se turben» sigue siendo defendible en registro bíblico.
  revised_spanish_text: para que[a], si sucede algo inesperado y sobreviene alguna dificultad, los que están en el país, sabiendo a quién se le han encomendado los asuntos, no se turben;
  revised_footnotes:
  - marker: a
    text: 'O: «a quién se le han dejado los asuntos». El perfecto pasivo griego puede enfatizar tanto que los asuntos han sido simplemente dejados como que han sido formalmente encomendados.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula de delegación para reflejar con precisión el dativo singular griego y producir una construcción idiomática en español: «a quién se le han encomendado los asuntos». Se conserva la nota alternativa documentada por la auditoría inglesa, ajustada al español natural.'
