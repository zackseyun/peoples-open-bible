revisions:
- from: Y aconteció que, mientras ella oraba largamente delante de Yahvé[a], Elí observaba su boca.
  to: Y mientras ella seguía orando delante de Yahvé[a], Elí observaba su boca.
  rationale: Se reemplazó «Y aconteció que, mientras ella oraba largamente» por «Y mientras ella seguía orando» para reflejar con mayor naturalidad en español el sentido de acción continuada de הִרְבְּתָה לְהִתְפַּלֵּל, en línea con la decisión del POB inglés («continued praying»). Se conservó «delante de Yahvé» y «su boca» por fidelidad léxica. La nota se ajustó para preservar la alternativa más formal y más cercana a la fórmula narrativa hebrea.
