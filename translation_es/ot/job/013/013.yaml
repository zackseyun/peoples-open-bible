translation:
  language: es
  text: Guarden silencio[a] ante mí, y déjenme hablar; y que venga sobre mí lo que sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «de mí»; aquí la expresión significa guardar silencio en relación conmigo, es decir, «ante mí» o «en mi presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרִישׁוּ
  english_pob_choice: Be silent
  chosen_spanish: Callad
  alternatives_spanish:
  - Guardad silencio
  - Callaos
  lexicon: HALOT
  rationale: El imperativo plural expresa la orden de guardar silencio. «Callad» conserva la brevedad y la fuerza directa del hebreo sin sonar excesivamente arcaico.
- source_word: מִמֶּנִּי
  english_pob_choice: before me
  chosen_spanish: ante mí
  alternatives_spanish:
  - de mí
  - frente a mí
  lexicon: HALOT
  rationale: Aunque literalmente es «de mí», en este contexto idiomático la idea es callar en la presencia de Job. «Ante mí» comunica mejor esa relación que un calco más duro.
- source_word: וַאֲדַבְּרָה
  english_pob_choice: and let me speak
  chosen_spanish: y hablaré yo
  alternatives_spanish:
  - y déjame hablar
  - y que yo hable
  lexicon: HALOT
  rationale: La cohortativa de primera persona expresa resolución. «Hablaré yo» preserva la voluntad del hablante y mantiene el énfasis del pronombre independiente.
- source_word: אָנִי
  english_pob_choice: me
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español conviene expresarlo de forma explícita para conservar la fuerza retórica.
- source_word: וְיַעֲבֹר
  english_pob_choice: then let come
  chosen_spanish: y pase
  alternatives_spanish:
  - y venga
  - y suceda
  - y pase sobre mí
  lexicon: HALOT
  rationale: עָבַר con עַלַי sugiere algo que ‘pasa sobre’ Job, es decir, que le sobreviene. «Pase» mantiene el valor verbal básico y funciona con naturalidad en español.
- source_word: עָלַי
  english_pob_choice: upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - en mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición con el verbo ‘pasar’ conserva la imagen de algo que cae o se abate sobre el hablante.
- source_word: מָה
  english_pob_choice: what may
  chosen_spanish: lo que sea
  alternatives_spanish:
  - lo que fuere
  - cualquier cosa
  lexicon: HALOT
  rationale: El indefinido expresa resignación ante cualquier eventualidad. «Lo que sea» transmite bien esa indefinición sin endurecer el español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto español, de modo que la nota quede anclada al punto donde aparece la alternativa léxica relevante.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverencial de Yahvé como convención del proyecto, aunque este versículo no lo contiene explícitamente.
  - Se evitó «SEÑOR» porque no hay aquí un tetragrámaton ni una cita directa que obligue a un sustituto teológico.
  - La cadencia del versículo conserva la estructura imperativa + cohortativa + jussiva del hebreo.
