translation:
  language: es
  text: Porque yo los nutrí con alegría, pero los envié lejos con llanto y duelo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔθρεψα
  english_pob_choice: I nourished
  chosen_spanish: los crié
  alternatives_spanish:
  - los alimenté
  - los nutrí
  - los crié y sustenté
  lexicon: BDAG
  rationale: τρέφω puede expresar alimentar, nutrir o criar. En español, «crié» conserva el matiz de cuidado continuado y de relación de crianza que la POB inglesa buscó con «nourished», sin reducirlo al acto puntual de dar comida.
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  - en alegría
  lexicon: BDAG
  rationale: εὐφροσύνη abarca alegría, gozo y festividad. «Con alegría» es natural en español y conserva la fuerza acompañante de μετά sin volverlo más solemne de lo que exige el griego.
- source_word: ἐξαπέστειλα
  english_pob_choice: I sent them away
  chosen_spanish: los despedí
  alternatives_spanish:
  - los envié lejos
  - los envié fuera
  - los mandé lejos
  lexicon: BDAG
  rationale: El verbo compuesto intensifica el envío y aquí expresa separación. «Despedí» comunica bien la partida y la distancia afectiva; evita el tecnicismo de «envié lejos» y mantiene el matiz de despedida implícito en el contexto.
- source_word: μετὰ κλαυθμοῦ
  english_pob_choice: with weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - con lágrimas
  - entre llanto
  - con lágrimas y llanto
  lexicon: BDAG
  rationale: κλαυθμός es llanto o lamento. «Con llanto» es idiomático en español y preserva el paralelismo con «con alegría».
- source_word: πένθους
  english_pob_choice: mourning
  chosen_spanish: lamento
  alternatives_spanish:
  - duelo
  - moción de duelo
  - tristeza
  lexicon: BDAG
  rationale: πένθος denota duelo, luto o lamentación por una pérdida. «Lamento» mantiene el peso emocional del término sin introducir necesariamente una observancia ritual específica que el contexto no explicita.
theological_decisions:
- issue: Voz maternal y dolor de la separación
  english_pob_reading: The first-person verbs are rendered straightforwardly without adding explanatory material, allowing the speaker's grief over the children's departure to remain implicit.
  chosen_spanish_reading: Los verbos en primera persona se traducen de forma directa, sin añadir una explicación como «al exilio» en el texto principal, para dejar visible el contraste afectivo entre criar con alegría y despedir con llanto.
  alternative_spanish_readings:
  - Explicitar el exilio en el texto principal
  - Parafrasear como una madre que pierde a sus hijos
  rationale: El griego presenta el contraste emocional de manera inmediata, pero no reexpresa aquí la causa. La versión española debe conservar esa tensión sin resolverla con una interpretación añadida.
  doctrine_reference: Preservar la tensión textual; no ampliar más allá de lo que el versículo afirma.
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios y con acuerdo alto; por eso la propuesta española sigue de cerca el patrón semántico confirmado, sin introducir notas textuales ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y natural en español.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al versículo.
  - Se conserva la correlación entre alegría/llanto y gladness/weeping del original.
  - «Lamento» evita sobreespecificar πένθος como un rito de duelo cuando el contexto solo exige la pérdida y la aflicción.
