translation:
  language: es
  text: Hizo diez pilas[a], y puso cinco a la derecha y cinco a la izquierda, para lavar en ellas; en ellas enjuagaban lo que era para el holocausto[b]. Pero el mar era para que los sacerdotes se lavaran en él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuentes»; el hebreo se refiere a recipientes de lavado para el servicio del templo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «la obra del holocausto»; la expresión parece referirse a lo asociado con la preparación de la ofrenda, no solo a un acto abstracto.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el gran depósito llamado «el mar» estaba destinado al lavado de los sacerdotes.
    reason: cultural_note
lexical_decisions:
- source_word: כִּיּוֹרִים
  english_pob_choice: basins
  chosen_spanish: lavabos
  alternatives_spanish:
  - baquetas
  - lavabos rituales
  - cuencos
  lexicon: HALOT
  rationale: El hebreo designa recipientes de lavado para el servicio del templo. «Lavabos» comunica la función y suena natural en español actual; «basins» en inglés POB busca claridad moderna, y aquí se conserva esa claridad sin perder el sentido ritual. Se evita «laver» por ser menos transparente en español.
- source_word: מִיָּמִין / מִשְּׂמֹאול
  english_pob_choice: on the right / on the left
  chosen_spanish: a la derecha / a la izquierda
  alternatives_spanish:
  - del lado derecho / del lado izquierdo
  - a mano derecha / a mano izquierda
  lexicon: HALOT
  rationale: Estas expresiones indican posición espacial. «A la derecha» y «a la izquierda» reproducen directamente la orientación indicada por el hebreo sin añadir «lado» innecesariamente.
- source_word: לְרָחְצָה
  english_pob_choice: to wash
  chosen_spanish: para lavar
  alternatives_spanish:
  - para lavarse
  - para el lavado
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para lavar» conserva la finalidad con una construcción natural en español.
- source_word: מַעֲשֵׂה הָעוֹלָה
  english_pob_choice: the things used for the burnt offering
  chosen_spanish: lo que era para el holocausto
  alternatives_spanish:
  - los utensilios del holocausto
  - lo relacionado con el holocausto
  - el trabajo del holocausto
  lexicon: HALOT
  rationale: La frase hebrea es elíptica. El inglés POB decidió no estrecharla a un abstracto ni expandirla más de lo necesario. En español, «lo que era para el holocausto» conserva esa apertura y refleja que se trata de aquello vinculado con la ofrenda, sin especificar más de lo que el texto garantiza.
- source_word: יָדִיחוּ
  english_pob_choice: they rinsed
  chosen_spanish: enjuagaban
  alternatives_spanish:
  - enjuagaban
  - lavaban
  - enjuagaban por costumbre
  lexicon: HALOT
  rationale: El verbo denota lavar/enjuagar, con matiz más preciso que un simple «lavar». El imperfecto hebreo puede expresar acción habitual; por eso «enjuagaban» da una lectura natural y durativa en español, cercana al valor contextual del inglés POB «they rinsed».
- source_word: וְהַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el Mar
  - la gran cuba
  lexicon: HALOT
  rationale: Se mantiene el nombre consagrado del gran depósito de bronce. «El mar» conserva la designación tradicional y la imagen distintiva del objeto, como en el inglés POB.
- source_word: לַכֹּהֲנִים
  english_pob_choice: for the priests
  chosen_spanish: para que los sacerdotes se lavaran en él
  alternatives_spanish:
  - para los sacerdotes
  - para que los sacerdotes se lavaran
  - para el lavado de los sacerdotes
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/uso. En este contexto, el inglés POB aclara que el mar era para el lavado sacerdotal; en español se hace explícita esa finalidad para evitar ambigüedad y mantener la función cultual del objeto.
theological_decisions:
- issue: Sentido de מַעֲשֵׂה הָעוֹלָה en un contexto ritual
  english_pob_reading: the things used for the burnt offering
  chosen_spanish_reading: lo que era para el holocausto
  alternative_spanish_readings:
  - los utensilios del holocausto
  - el trabajo del holocausto
  - lo relacionado con el holocausto
  rationale: No se debe reducir la frase a la mera «obra» abstracta ni introducir más detalle del que el hebreo ofrece. La redacción elegida preserva la referencia a lo asociado con la ofrenda quemada, manteniendo la tensión y la ambigüedad presentes en el texto fuente.
  doctrine_reference: Cultic terminology of Levitical/temple service; lexical caution in ritual texts
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente: mantiene la colocación simétrica «a la derecha / a la izquierda», conserva el sentido habitual del imperfecto con «enjuagaban», y refleja la aclaración contextual de que el gran «mar» servía para el lavado sacerdotal. También evita expandir innecesariamente la frase del holocausto, pero preserva su ambigüedad controlada.'
  spanish_consistency_notes:
  - Se usa «holocausto» para traducir הָעוֹלָה en coherencia con el uso cultual tradicional del término, pero se acompaña con una formulación que mantiene la elasticidad del hebreo.
  - «El mar» se conserva como designación técnica del gran recipiente de bronce, no como referencia al mar literal.
  - «Sacerdotes» se emplea para כֹּהֲנִים conforme al registro bíblico español estándar.
  - Los marcadores de nota [a], [b], [c] están colocados en el texto exactamente donde corresponden.
