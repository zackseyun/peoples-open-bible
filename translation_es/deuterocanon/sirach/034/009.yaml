review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue el testigo operativo adoptado en el expediente inglés. La evidencia hebrea suministrada es materialmente divergente, pero el rastro auditado de POB y las decisiones léxicas/teológicas para este registro establecen que el texto principal debe seguir el griego de Sirácides 34:9, no la línea hebrea desplazada. El borrador actual traduce el griego, pero omite la nota textual obligatoria sobre la divergencia del hebreo y no refleja la revisión aplicada en el expediente inglés.
  spanish_quality_summary: El español es legible, pero «ha conocido muchas cosas» y «contará el entendimiento» suenan algo menos naturales y más literales de lo necesario en registro sapiencial. «Conoce muchas cosas» y «relatará entendimiento/entendimiento» todavía requieren ajuste idiomático; «relatará entendimiento» no es español natural. Conviene usar una formulación más idiomática como «relatará su entendimiento» o mejor «expondrá entendimiento/entendimiento», pero dado el expediente auditado, una traducción clara y fiel es preferible.
  glossary_alignment: No hay términos de glosario mayor (Yahvé, Mesías, etc.) en este versículo. El problema principal no es terminológico sino de alineación con la decisión textual auditada. También falta en español la nota de variante textual que el POB inglés sí conserva y que aquí es esencial.
  issues:
  - severity: high
    issue: El borrador no preserva la decisión textual documentada en el expediente inglés.
    rationale: El POB audit trail para este registro adoptó como texto principal la línea hebrea divergente tras una revisión posterior, aunque simultáneamente reconoce un conflicto con la decisión teológica previa. El borrador español traduce el griego y por tanto no coincide con el texto inglés auditado actualmente asociado al registro.
  - severity: high
    issue: Falta la nota textual sobre la divergencia entre el hebreo suministrado y el griego.
    rationale: Sea cual sea la base principal escogida, la discrepancia entre testigos es central y debe preservarse honestamente en nota, como ya hace el expediente inglés.
  - severity: medium
    issue: La nota léxica actual no corresponde a la nota conservada en el expediente inglés.
    rationale: El inglés incluye una alternativa sobre el sentido de la cláusula griega inicial, no solo sobre «ὁ πολυπειρῶν». La nota española actual desplaza el foco y no refleja la justificación auditada.
  - severity: medium
    issue: El texto actual presenta giros poco naturales en español bíblico moderno.
    rationale: «Ha conocido muchas cosas» y sobre todo «contará el entendimiento» no son las mejores opciones idiomáticas para un proverbio sapiencial en español amplio de iglesia.
  revised_spanish_text: En todas tus obras muestra un rostro alegre[a], y con gozo diezma lo santo.
  revised_footnotes:
  - marker: a
    text: 'El testigo hebreo suministrado para este versículo diverge materialmente y dice aproximadamente: «En todas tus obras muestra un rostro alegre, y con gozo diezma lo santo». Como esa línea no coincide con el contexto de Sirácides 34:9 en el testigo griego, existe una tensión textual en el expediente; aquí se conserva la redacción principal actualmente auditada y se señala la divergencia.'
    reason: textual_variant
  revision_rationale: 'Reviso para alinear el español con el texto principal actualmente presente en el expediente inglés auditado, aunque la evidencia fuente muestra una dificultad textual real. También añado la nota indispensable sobre la divergencia entre el hebreo y el griego. La redacción española usa un registro natural y digno: «muestra un rostro alegre» refleja האר פנים sin calco tosco, y «diezma lo santo» conserva הקדש מעשר de forma concisa.'
