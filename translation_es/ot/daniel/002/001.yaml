translation:
  language: es
  text: En el segundo año del reinado de Nabucodonosor, Nabucodonosor soñó sueños[a], y su espíritu se perturbó[b], y su sueño lo abandonó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «soñó sueños».
    reason: lexical_alternative
  - marker: b
    text: O, «su espíritu estaba agitado».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «su sueño lo dejó» o «su sueño se apartó de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת שְׁתַּיִם
  english_pob_choice: In the second year
  chosen_spanish: En el segundo año
  alternatives_spanish:
  - Y en el segundo año
  - Ahora bien, en el segundo año
  lexicon: HALOT
  rationale: La construcción hebrea con prefijo conjuntivo más preposición introduce una indicación temporal narrativa. En español, «En el segundo año» comunica con naturalidad el inicio temporal sin añadir peso innecesario a la conjunción.
- source_word: לְמַלְכוּת
  english_pob_choice: of ... reign
  chosen_spanish: del reinado de
  alternatives_spanish:
  - de la realeza de
  - del reino de
  lexicon: HALOT
  rationale: Aquí מַלְכוּת se refiere al período de gobierno real, no al territorio. «Reinado» conserva ese valor temporal y dinástico mejor que «reino».
- source_word: נְבֻכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  lexicon: transliteración tradicional en español
  rationale: Se adopta la forma española más establecida y legible. Mantiene la referencia inequívoca al nombre propio sin forzar una transliteración académica innecesaria.
- source_word: חָלַם ... חֲלֹמוֹת
  english_pob_choice: dreamed dreams
  chosen_spanish: soñó sueños
  alternatives_spanish:
  - tuvo sueños
  - soñó
  lexicon: HALOT
  rationale: El hebreo usa un acusativo cognado, una intensificación expresiva que el POB inglés preserva como «dreamed dreams». En español, «soñó sueños» conserva esa fuerza formal sin perder inteligibilidad.
- source_word: וַתִּתְפָּעֶם רוּחוֹ
  english_pob_choice: his spirit was troubled
  chosen_spanish: su espíritu se perturbó
  alternatives_spanish:
  - su espíritu se agitó
  - su ánimo se turbó
  - su mente se perturbó
  lexicon: HALOT
  rationale: Se mantiene רוּחַ como «espíritu» para no psicologizar la frase con «mente». «Se perturbó» expresa la agitación interior con un registro natural en español y conserva el sentido del hebreo.
- source_word: וּשְׁנָתוֹ נִהְיְתָה עָלָיו
  english_pob_choice: his sleep left him
  chosen_spanish: su sueño lo abandonó
  alternatives_spanish:
  - se le fue el sueño
  - su sueño se alejó de él
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y significa que el sueño se apartó. En español, «lo abandonó» permite reflejar la imagen verbal de salida/alejamiento sin caer en una literalidad rígida.
theological_decisions:
- issue: רוּחַ en el estado emocional de Nabucodonosor
  english_pob_reading: his spirit was troubled
  chosen_spanish_reading: su espíritu se perturbó
  alternative_spanish_readings:
  - su alma se perturbó
  - su mente se perturbó
  rationale: No se interpreta como el Espíritu Santo ni se reduce a mera cognición. «Espíritu» preserva la amplitud antropológica del término hebreo y su posible tensión entre interioridad, ánimo y aliento vital.
  doctrine_reference: Antropología bíblica; uso contextual de רוּחַ en el AT
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una equivalencia óptima con tres notas: la construcción cognada de ''dreamed dreams'', la agitación de ''his spirit was troubled'' y el modismo ''his sleep left him''. No se registran revisiones posteriores que alteren el sentido base, y el borrador español conserva esas mismas tensiones sin resolverlas de modo excesivamente libre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología POB, pero este versículo no contiene el nombre divino.
  - Se usa «Nabucodonosor» como forma española establecida del nombre propio.
  - Se preserva «espíritu» para רוּחַ, evitando sustituirlo por «mente» salvo necesidad contextual clara.
  - La nota [a] va anclada en «sueños», [b] en «espíritu» y [c] en «sueño», para corresponder con las alternativas auditadas del inglés POB.
