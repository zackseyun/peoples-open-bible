  rationale: La oposición con la caballería pide un equivalente claro; «soldados de a pie» comunica bien el contraste y conserva el valor militar del genitivo.
- source_word: ἵππων
  english_pob_choice: horsemen
  chosen_spanish: de los caballos
  alternatives_spanish:
