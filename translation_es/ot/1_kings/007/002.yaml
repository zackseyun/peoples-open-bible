translation:
  language: es
  text: Edificó la Casa del Bosque del Líbano[a], de cien codos de largo, cincuenta codos de ancho y treinta codos de alto[b], sobre cuatro hileras de columnas de cedro[c], con vigas de cedro[d] sobre las columnas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con cuatro hileras de columnas de cedro»; la preposición puede describir la disposición («con») o el apoyo («sobre»).'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «cien codos su longitud, cincuenta codos su anchura y treinta codos su altura».'
    reason: previous_rendering
  - marker: c
    text: O «sobre cuatro hileras de columnas de cedro» puede también entenderse como «con cuatro hileras de columnas de cedro».
    reason: lexical_alternative
  - marker: d
    text: El hebreo dice literalmente «piezas cortadas de cedro»; puede referirse a vigas, maderos, travesaños u otro elemento estructural labrado de cedro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Él edificó
  alternatives_spanish:
  - Él construyó
  - Y edificó
  lexicon: HALOT
  rationale: El hebreo introduce una acción narrativa en pasado. En español, ‘edificar’ conserva mejor el tono de construcción monumental y arquitectónica que ‘construir’, sin perder naturalidad.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  english_pob_choice: the House of the Forest of Lebanon
  chosen_spanish: la Casa del Bosque del Líbano
  alternatives_spanish:
  - el Palacio del Bosque del Líbano
  - la Casa del Bosque de Líbano
  lexicon: HALOT
  rationale: Se conserva la cadena nominal hebrea con ‘Casa’, porque el texto nombra el edificio sin explicitar aquí su función. ‘Bosque’ refleja יַעַר y ‘del Líbano’ mantiene el constructo sin reinterpretarlo como ‘palacio’.
- source_word: מֵאָה אַמָּה אָרְכּוֹ
  english_pob_choice: one hundred cubits long
  chosen_spanish: de cien codos de largo
  alternatives_spanish:
  - su largo era de cien codos
  - cien codos de longitud
  lexicon: HALOT
  rationale: La medida se vierte con el idioma natural del español arquitectónico, manteniendo ‘codos’ como unidad antigua y sin convertirla.
- source_word: וַחֲמִשִּׁים אַמָּה רָחְבּוֹ
  english_pob_choice: fifty cubits wide
  chosen_spanish: cincuenta codos de ancho
  alternatives_spanish:
  - su ancho era de cincuenta codos
  - cincuenta codos de anchura
  lexicon: HALOT
  rationale: Se conserva el paralelismo dimensional del hebreo con una formulación fluida en español.
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתוֹ
  english_pob_choice: thirty cubits high
  chosen_spanish: treinta codos de alto
  alternatives_spanish:
  - su altura era de treinta codos
  - treinta codos de altura
  lexicon: HALOT
  rationale: קוֹמָה se refiere a la altura del edificio; ‘de alto’ es la equivalencia más natural en español.
- source_word: עַל אַרְבָּעָה טוּרֵי עַמּוּדֵי אֲרָזִים
  english_pob_choice: on four rows of cedar pillars
  chosen_spanish: sobre cuatro hileras de columnas de cedro
  alternatives_spanish:
  - con cuatro hileras de columnas de cedro
  - apoyado sobre cuatro hileras de columnas de cedro
  lexicon: HALOT
  rationale: עַל puede expresar apoyo o disposición. ‘Sobre’ preserva la relación espacial abierta y el sentido de soporte. ‘Hileras’ refleja טוּרֵי y ‘columnas’ es un equivalente claro de עַמּוּדֵי.
- source_word: וּכְרֻתֹת אֲרָזִים
  english_pob_choice: with cedar beams
  chosen_spanish: con piezas de cedro
  alternatives_spanish:
  - con vigas de cedro
  - con maderos de cedro
  - con piezas labradas de cedro
  lexicon: HALOT
  rationale: El sustantivo deriva de ‘cortar’ y designa literalmente piezas cortadas de cedro. Como el término exacto es estructuralmente ambiguo, ‘piezas de cedro’ preserva la tensión sin forzar ‘vigas’ en el texto principal.
- source_word: עַל הָעַמּוּדִים
  english_pob_choice: on the pillars
  chosen_spanish: sobre las columnas
  alternatives_spanish:
  - encima de las columnas
  - en las columnas
  lexicon: HALOT
  rationale: El hebreo repite la relación espacial de apoyo/ubicación. ‘Sobre’ mantiene esa relación sin añadir precisión no garantizada por el hebreo.
theological_decisions:
- issue: Naturaleza y función del nombre del edificio
  english_pob_reading: the House of the Forest of Lebanon; the building is named as such without forcing a functional category like 'palace'.
  chosen_spanish_reading: la Casa del Bosque del Líbano
  alternative_spanish_readings:
  - el Palacio del Bosque del Líbano
  - la Casa de la Selva del Líbano
  rationale: No se introduce ‘palacio’ en el texto principal porque el hebreo solo nombra la construcción. Se evita también ‘selva’, demasiado moderno y con connotación distinta de יַעַר.
  doctrine_reference: Principio de proximidad semántica y no sobreinterpretación del nombre propio.
translation_notes:
  revision_awareness: La revisión inglesa favoreció una expresión dimensional más idiomática (‘long/wide/high’) sin alterar el contenido; la versión española sigue esa misma naturalidad y conserva la alternativa abierta de la preposición en la estructura de cedro.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton cuando aparezca, aunque este versículo no lo contiene.
  - Se conserva ‘codos’ como unidad de medida antigua, sin conversión métrica.
  - ‘Casa’ se usa para בית por fidelidad al nombre del edificio, evitando ‘palacio’ en ausencia de justificación contextual explícita.
