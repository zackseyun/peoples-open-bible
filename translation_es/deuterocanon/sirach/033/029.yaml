translation:
  language: es
  text: Porque la ociosidad ha enseñado mucho mal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολλὴν
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - gran
  - muchas cosas
  lexicon: LSJ
  rationale: El adjetivo cuantifica κακίαν en singular; en español, «mucho mal» reproduce bien la cantidad o intensidad sin forzar una expresión menos natural como «gran mal».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - en efecto
  lexicon: LSJ
  rationale: La partícula introduce la razón o explicación del dicho anterior. «Porque» conserva esa función causal-explicativa de manera clara en español.
- source_word: κακίαν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - vicio
  lexicon: LSJ
  rationale: κακία puede abarcar maldad, perversidad o vicio. En este proverbio, «mal» comunica el sentido moral general sin restringirlo demasiado ni volverlo técnico.
- source_word: ἐδίδαξεν
  english_pob_choice: has taught
  chosen_spanish: ha enseñado
  alternatives_spanish:
  - enseñó
  - ha producido
  - ha formado en
  lexicon: LSJ
  rationale: El aoristo tiene valor gnómico. «Ha enseñado» mantiene la metáfora pedagógica y refleja bien la observación proverbial de la frase.
- source_word: ἡ ἀργία
  english_pob_choice: idleness
  chosen_spanish: la ociosidad
  alternatives_spanish:
  - la pereza
  - la inactividad
  - la holgazanería
  lexicon: LSJ
  rationale: ἀργία designa ociosidad o inactividad. «Ociosidad» es una equivalencia clara y digna en español, más precisa que «pereza» y menos coloquial que «holgazanería».
translation_notes:
  revision_awareness: 'El griego coincide estrechamente con la redacción inglesa auditada: una sentencia proverbial causal con imagen pedagógica. No se introducen notas porque no hay variante textual relevante ni tensión léxica que requiera aclaración adicional.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras convenciones no pertinentes; el versículo no contiene el Nombre divino.
  - Se mantuvo la metáfora de enseñanza («ha enseñado») para respetar ἐδίδαξεν.
  - «Ociosidad» preserva el campo semántico de ἀργία sin moralizar más allá del texto.
