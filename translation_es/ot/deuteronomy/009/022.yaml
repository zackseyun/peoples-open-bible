revisions:
- from: Y en Taberá[a], y en Masá, y en Kibrot-hatavá, estuvieron provocando a Yahvé a ira.
  to: Y en Taberá, y en Masá, y en Kibrot-hatavá[a], provocaban la ira de Yahvé.
  rationale: Se corrigió el anclaje de la nota al topónimo pertinente y se reemplazó la expresión calcada 'a ira' por la formulación idiomática y fiel 'la ira de Yahvé'. También se simplificó 'estuvieron provocando' a 'provocaban' para reflejar mejor en español la acción continua o característica del hebreo en este contexto.
