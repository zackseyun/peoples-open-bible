translation:
  language: es
  text: Y los hijos del pacto prevalecían sobre ellos en medio de las naciones mezcladas; no había entre ellos, en Jerusalén, quien hiciera misericordia y verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordia y fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκρατοῦσαν
  english_pob_choice: were prevailing over
  chosen_spanish: prevalecían sobre
  alternatives_spanish:
  - dominaban sobre
  - tenían dominio sobre
  - superaban
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso; en español, «prevalecían sobre» conserva esa duratividad y el matiz de superioridad o predominio sin forzar una imagen exclusivamente militar o política. Mantiene el sentido contextual que el auditor inglés corrigió hacia prevalecer, no solo vencer.
- source_word: υἱοὶ τῆς διαθήκης
  english_pob_choice: sons of the covenant
  chosen_spanish: hijos del pacto
  alternatives_spanish:
  - hijos del convenio
  - hijos de la alianza
  - personas del pacto
  lexicon: BDAG
  rationale: Se conserva la imagen masculina plural y el valor identitario de la expresión. «Pacto» es el equivalente más natural y teológicamente transparente en español; «alianza» o «convenio» suenan menos idiomáticos aquí.
- source_word: ἐθνῶν συμμίκτων
  english_pob_choice: the mixed nations
  chosen_spanish: las naciones mezcladas
  alternatives_spanish:
  - los pueblos mezclados
  - las naciones mingladas
  - las naciones mixtas
  lexicon: LSJ
  rationale: «Mezcladas» comunica la idea de mezcla/mestizaje colectiva de συμμίκτων y conserva el sustantivo «naciones» del griego. «Mixtas» sería más técnico y menos natural en español actual.
- source_word: ὁ ποιῶν
  english_pob_choice: doing
  chosen_spanish: quien hiciera
  alternatives_spanish:
  - quien practicara
  - quien obrara
  - quien hiciera el bien
  lexicon: BDAG
  rationale: El participio es amplio y semitizante; en esta frase negativa, una relativa con subjuntivo («quien hiciera») suena natural en español y reproduce el sentido de la inexistencia de alguien que realizara una acción moral concreta.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia y compasión
  - piedad
  - amor leal
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «misericordia» es el equivalente más directo y solemne de ἔλεος. Se evita «amor leal» como paráfrasis demasiado interpretativa para el texto principal.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lealtad
  - firmeza
  lexicon: BDAG
  rationale: «Verdad» mantiene la correspondencia literal con el griego y preserva la tensión posible hacia «fidelidad» sin resolverla en el texto principal. En una nota se puede explicitar la alternativa covenantal.
theological_decisions:
- issue: Cómo reflejar la frase hebraica/semítica ἔλεος καὶ ἀλήθειαν
  english_pob_reading: mercy and truth, with a footnote allowing mercy and faithfulness
  chosen_spanish_reading: misericordia y verdad, con nota que permite entender también fidelidad
  alternative_spanish_readings:
  - misericordia y fidelidad
  - amor leal y fidelidad
  - misericordia y lealtad
  rationale: El binomio es una fórmula ética-covenantal. El texto principal retiene la pareja literal para no aplanar la tensión semítica; la nota explica que ἀλήθεια puede implicar fidelidad. «Verdad» conserva la forma más transparente y permite al lector captar el eco bíblico amplio.
  doctrine_reference: Preservar tensión lexical y covenantal sin resolverla excesivamente.
- issue: Cómo traducir υἱοὶ τῆς διαθήκης sin neutralizar el plural masculino
  english_pob_reading: sons of the covenant
  chosen_spanish_reading: hijos del pacto
  alternative_spanish_readings:
  - hijos de la alianza
  - personas del pacto
  - los del pacto
  rationale: El griego es explícitamente masculino plural y parece identitario. Se mantiene la forma masculina en español por fidelidad al texto fuente y a la política de precisión de género del proyecto, evitando una neutralización no motivada por el contexto.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: El auditorio inglés corrigió ἐπεκρατοῦσαν de una lectura de dominio militar hacia «prevailed over», y en una revisión posterior se mantuvo ese valor. La versión española sigue ese ajuste con «prevalecían sobre» y conserva la puntuación que separa claramente el escenario general de la cláusula final en Jerusalén. También conserva la pareja literal «misericordia y verdad», dejando la alternativa covenental en nota, como hizo el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «pacto» para διαθήκη en coherencia con el registro bíblico del proyecto.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay Tetragrámaton en este versículo.
  - 'La puntuación española refleja dos miembros paralelos: predominio entre las naciones y ausencia de práctica moral en Jerusalén.'
  - «Verdad» se deja en el texto principal por fidelidad literal; la posible lectura de «fidelidad» queda en nota.
