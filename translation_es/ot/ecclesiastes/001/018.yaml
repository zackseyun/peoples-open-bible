revisions:
- from: Porque en mucha sabiduría hay mucha vexación[a], y quien añade conocimiento añade dolor[b].
  to: Porque con mucha sabiduría viene mucha aflicción[a], y quien aumenta conocimiento aumenta dolor[b].
  rationale: 'Se corrige una cuestión menor pero importante de español natural y fiel: «con mucha sabiduría viene mucha aflicción» transmite mejor בְּרֹב חָכְמָה רָב כָּעַס que «en mucha sabiduría hay mucha vexación», evita un calco poco idiomático y reemplaza una palabra poco natural en español general. En el segundo hemistiquio, «aumenta» mantiene claramente el paralelismo proverbial con el hebreo, mientras la nota conserva la alternativa más literal «añade».'
