theological_decisions:
- issue: Description of the transfiguration's visible effect
  chosen_reading: Render the verse as a vivid description of Jesus' clothes becoming supernaturally brilliant without adding explanatory theological language.
  alternative_readings:
  - Use more interpretive wording such as 'radiant with glory'
  rationale: The verse itself describes the appearance of the clothes, not an explicit doctrinal explanation of glory. The translation should preserve the narrative description and let theology arise from the context rather than importing it into this verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
