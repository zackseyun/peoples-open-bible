review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia ritual del hebreo y la terminología clave de Levítico, incluyendo «ofrenda por el pecado» con nota alternativa y «hará expiación». Sin embargo, altera indebidamente la persona gramatical del verbo inicial y de la cláusula comparativa: el hebreo mantiene tercera persona singular a lo largo del versículo («hará… como hizo… así hará…»), mientras que el español draft pasa a segunda persona singular («Harás… hiciste»), rompiendo la referencia al sacerdote y la coherencia con el contexto y con la segunda mitad del versículo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la mezcla de segunda y tercera persona produce una lectura confusa e incorrecta. Además, la nota [a] está anclada en «becerro», cuando la alternativa léxica realmente corresponde a «ofrenda por el pecado», no al animal mismo. Conviene también preferir «serán perdonados» o «se les perdonará» frente a «les será perdonado», que suena algo elíptico en español sin un antecedente explícito para «lo».
  glossary_alignment: 'Alinea bien con el glosario del proyecto en los términos relevantes: no hay nombres divinos aquí; «הַחַטָּאת» como «ofrenda por el pecado» con alternativa «ofrenda de purificación» es apropiado; «כפר» como «hará expiación» preserva la fuerza cultual. La revisión solo corrige persona verbal, anclaje de nota y una formulación final más natural en español.'
  issues:
  - severity: high
    issue: Cambio incorrecto de tercera a segunda persona en el texto principal
    rationale: El hebreo usa tercera persona singular en וְעָשָׂה, עָשָׂה, יַעֲשֶׂה. El borrador dice «Harás… hiciste», introduciendo un destinatario en segunda persona que no está en el texto y desajustando la referencia al sacerdote/oficiante.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La alternativa «ofrenda de purificación» corresponde a הַחַטָּאת / «ofrenda por el pecado», no a «becerro». El marcador debe colocarse sobre la expresión de la ofrenda para evitar ambigüedad.
  - severity: low
    issue: «les será perdonado» suena menos natural y menos claro que alternativas disponibles
    rationale: Aunque intenta reflejar el pasivo/resultativo hebreo, en español queda elíptico porque no se explicita qué es lo perdonado. «serán perdonados» comunica con más claridad el sentido de וְנִסְלַח לָהֶם y coincide con la auditoría inglesa.
  revised_spanish_text: Él hará con el becerro lo mismo que hizo con el becerro de la ofrenda por el pecado[a]; así hará con él. Y el sacerdote hará expiación por ellos, y serán perdonados.
  revised_footnotes:
