translation:
  language: es
  text: Escuchen la palabra de Yahvé[a], gobernantes de Sodoma; presten oído a la instrucción de nuestro Dios[b], pueblo de Gomorra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaías se dirige a los líderes y al pueblo de Judá con los nombres «Sodoma» y «Gomorra» como comparación profética, no como identificación literal.
    reason: cultural_note
  - marker: b
    text: También puede entenderse «ley» o «enseñanza» para «instrucción» (hebreo torá).
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oíd!
  alternatives_spanish:
  - Escuchad
  - Oigan
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa y profética. «Oíd» conserva fuerza y solemnidad sin sonar tan arcaico como otras opciones; además mantiene el paralelismo con el segundo imperativo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Señor
  lexicon: HALOT
  rationale: דבר se rinde naturalmente como «palabra» en este formulario profético. Se conserva «Yahvé» por la convención doctrinal del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: קְצִינֵי
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - jefes
  - líderes
  - magistrados
  lexicon: HALOT
  rationale: El sustantivo apunta a autoridades o dirigentes. «Gobernantes» comunica bien la carga de denuncia profética en español y se integra de forma natural con el vocativo.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: HALOT
  rationale: Nombre propio bíblico en español. Se usa la forma habitual «Sodoma» para claridad y reconocimiento lector.
- source_word: הַאֲזִינוּ
  english_pob_choice: give ear
  chosen_spanish: escuchad
  alternatives_spanish:
  - prestad oído
  - dad oído
  lexicon: HALOT
  rationale: Aunque la imagen literal es «dar oído», en español «escuchad» transmite la misma llamada enfática sin sonar forzado. Se conserva el segundo imperativo como contraste retórico, no como simple repetición mecánica.
- source_word: תּוֹרַת
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: תורה aquí puede significar ley, enseñanza o instrucción. «Instrucción» reproduce la amplitud semántica que el POB inglés preserva y evita estrecharlo solo a un código legal.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Se mantiene el sufijo de primera persona plural explícito. «Nuestro Dios» suena natural en español y conserva la relación de pacto implícita aun en la reprensión.
- source_word: עַם
  english_pob_choice: people of
  chosen_spanish: pueblo de
  alternatives_spanish:
  - gente de
  - pueblo
  lexicon: HALOT
  rationale: En el vocativo final, «pueblo de Gomorra» reproduce la construcción directa del hebreo con una forma natural en español. «Pueblo» retiene la carga colectiva y acusatoria del original.
- source_word: עֲמֹרָה
  english_pob_choice: Gomorrah
  chosen_spanish: Gomorra
  alternatives_spanish:
  - Gomorra
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. Se usa «Gomorra» por reconocimiento y para mantener la referencia intertextual con Sodoma.
theological_decisions:
- issue: Vocativos proféticos con nombres de ciudades como comparación implícita
  english_pob_reading: Retain the literal vocatives 'rulers of Sodom' and 'people of Gomorrah' in the main text as metaphorical denunciation.
  chosen_spanish_reading: Mantener «gobernantes de Sodoma» y «pueblo de Gomorra» en el texto principal como denuncia metafórica implícita.
  alternative_spanish_readings:
  - «gobernantes que son como Sodoma»
  - «pueblo que es como Gomorra»
  rationale: El hebreo llama a los oyentes con estos nombres de ciudad sin añadir una explicación. La traducción conserva el impacto profético y deja la interpretación para la nota, sin desdibujar la forma directa del original.
  doctrine_reference: Primacía del texto original; no ampliar ni explicitar más allá de lo que el hebreo dice.
translation_notes:
  revision_awareness: Sin cambios respecto al último pase registrado; la decisión de mantener la fuerza vocativa y la amplitud de torá coincide con el audit trail inglés y con la revisión más reciente, que no propuso ajustes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la convención del proyecto para el Tetragrámaton.
  - Se prefirió «Sodoma» y «Gomorra» como formas españolas estándar de los nombres propios.
  - «Instrucción» preserva la amplitud semántica de torá sin convertirla automáticamente en «ley».
  - La sintaxis usa dos imperativos coordinados para reflejar el paralelismo hebreo.
