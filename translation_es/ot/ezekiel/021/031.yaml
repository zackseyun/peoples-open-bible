translation:
  language: es
  text: 'Así dice el Señor Yahvé: Quita el turbante[a] y quita la corona. Esto no permanecerá igual[b]: enaltece al humilde y humilla al encumbrado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Turbante» puede referirse más específicamente a un tocado sacerdotal; «corona» se refiere a la autoridad real. El versículo anuncia la remoción de los símbolos establecidos de liderazgo.
    reason: cultural_note
  - marker: b
    text: 'O: «Esto ya no será así», «Esto no será más» o «Esto no será como antes». El hebreo es breve y elíptico, y enfatiza que el orden presente está siendo trastornado.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָסִיר
  english_pob_choice: Remove
  chosen_spanish: Quita
  alternatives_spanish:
  - Retira
  - Quita de en medio
  lexicon: HALOT
  rationale: El imperativo causativo transmite una orden directa de quitar o remover; «quita» es natural en español y conserva la brevedad profética del hebreo.
- source_word: הַמִּצְנֶפֶת
  english_pob_choice: the turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - la tiara
  - el tocado
  - la mitra
  lexicon: HALOT
  rationale: Designa una prenda para la cabeza, con posible referencia sacerdotal. «Turbante» comunica el sentido general sin recurrir a «mitra», que en español suena eclesiástico y más marcado.
- source_word: וְהָרִים
  english_pob_choice: and take off
  chosen_spanish: y toma
  alternatives_spanish:
  - y quita
  - y levanta
  - y retira
  lexicon: HALOT
  rationale: En este contexto, el verbo de «levantar» funciona idiomáticamente como quitar de encima o retirar. «Toma» permite una imagen natural de quitar lo que está puesto, sin perder el movimiento de despojo.
- source_word: הָעֲטָרָה
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - el diadema
  - la diadema
  lexicon: HALOT
  rationale: עֲטָרָה es una corona o adorno real. «Corona» es el equivalente más claro y amplio en español.
- source_word: זֹאת לֹא זֹאת
  english_pob_choice: This will not remain the same
  chosen_spanish: Esto no permanecerá igual
  alternatives_spanish:
  - Esto ya no será así
  - Esto no será lo mismo
  - Esto no quedará igual
  lexicon: HALOT
  rationale: La frase hebrea es muy tersa y elíptica, señalando una reversión del orden presente. «No permanecerá igual» conserva la idea de discontinuidad sin resolver en exceso la elipsis.
- source_word: הַשָּׁפָלָה הַגְבֵּהַ
  english_pob_choice: exalt the lowly
  chosen_spanish: enaltece al humilde
  alternatives_spanish:
  - levanta al humilde
  - exalta al bajo
  - eleva al abatido
  lexicon: HALOT
  rationale: שָׁפָל comunica lo bajo, humilde o abatido; el Hiphil implica elevar. «Enaltece al humilde» preserva el contraste de reversión y suena natural en español bíblico contemporáneo.
- source_word: וְהַגָּבֹהַ הַשְׁפִּיל
  english_pob_choice: and humble the exalted
  chosen_spanish: y humilla al encumbrado
  alternatives_spanish:
  - y abate al exaltado
  - y humilla al alto
  - y abaja al elevado
  lexicon: HALOT
  rationale: גָּבֹהַ significa alto, elevado o exaltado; el Hiphil de שׁפל es hacer bajar, humillar. «Encumbrado» mantiene el paralelo con «humilde» y expresa bien la idea de altura/estatus.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir יְהוָה como «Yahvé». En la fórmula compuesta, «Señor Yahvé» conserva ambos elementos sin convertir el nombre divino en un simple título anónimo.
theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita; según la norma del proyecto, debe mantenerse como «Yahvé» en la columna principal española. La combinación con אֲדֹנָי se resuelve de manera idiomática en español como «el Señor Yahvé», evitando ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de la frase elíptica זֹאת לֹא זֹאת
  english_pob_reading: This will not remain the same
  chosen_spanish_reading: Esto no permanecerá igual
  alternative_spanish_readings:
  - Esto no será así
  - Esto no quedará igual
  - Esto ya no será lo mismo
  rationale: La hebra es comprimida y no conviene decidir demasiado el alcance exacto. La traducción conserva la idea de inversión del orden presente y deja visible la tensión profética de un cambio radical.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no modificó el contenido; el consenso de auditoría es alto y solo registró observaciones menores. Se mantiene la solución española que preserva la brevedad elíptica del hebreo y la distinción entre símbolo sacerdotal y corona real.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto para יְהוָה.
  - Se evita «Cristo» u otra terminología no pertinente; el versículo trata del título divino y de símbolos de autoridad.
  - «Turbante» y «corona» conservan el paralelismo entre insignia sacerdotal y real sin sobreespecificar.
  - La frase «Esto no permanecerá igual» se tradujo como «Esto no permanecerá igual»/«no permanecerá igual» en sentido continuo para reflejar la elipsis hebrea.
  - «Humilde» y «encumbrado» mantienen la reversión de estatus más que una lectura meramente moral.
