translation:
  language: es
  text: Con ellos[a] el médico alivia el dolor, y asimismo el perfumero[b] prepara una mezcla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Por ellos"; la frase instrumental hebrea y el paralelo griego también apoyan la idea de que estos remedios son el medio por el cual se alivia el dolor.
    reason: lexical_alternative
  - marker: b
    text: '"Perfumero" traduce el hebreo רוקח, uno que mezcla compuestos aromáticos o medicinales; "apotecario" es una alternativa tradicional.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐν αὐτοῖς / בהם
  english_pob_choice: By them
  chosen_spanish: Con ellos
  alternatives_spanish:
  - Por ellos
  - Mediante ellos
  lexicon: HALOT; LXX ἐν αὐτοῖς
  rationale: La frase instrumental apunta a los remedios o sustancias medicinales mencionadas antes. En español, 'con ellos' comunica bien el medio empleado sin forzar una construcción demasiado literal.
- source_word: ἐθεράπευσεν / יניח
  english_pob_choice: relieves pain
  chosen_spanish: alivia el dolor
  alternatives_spanish:
  - relleva el dolor
  - quita el dolor
  - mitiga el dolor
  lexicon: HALOT; LSJ θεραπεύω
  rationale: El hebreo sugiere aliviar o hacer descansar el dolor, y el paralelo griego de θεραπεύω apoya una idea de curación/alivio. 'Alivia el dolor' conserva la fuerza sin implicar necesariamente eliminación total.
- source_word: τὸν πόνον / מכאוב
  english_pob_choice: pain
  chosen_spanish: el dolor
  alternatives_spanish:
  - el sufrimiento
  - la aflicción
  lexicon: HALOT; LSJ πόνος
  rationale: '''Dolor'' es la equivalencia más natural en español para un contexto médico y mantiene la correspondencia con πόνος.'
- source_word: καὶ ἦρεν
  english_pob_choice: likewise
  chosen_spanish: y asimismo
  alternatives_spanish:
  - y también
  - e igualmente
  lexicon: LSJ αἴρω
  rationale: La segunda cláusula mantiene el paralelismo del texto hebreo y griego. 'Y asimismo' expresa continuidad y comparación sin perder la coordinación.
- source_word: רוקח
  english_pob_choice: the perfumer
  chosen_spanish: el perfumista
  alternatives_spanish:
  - el perfumero
  - el apotecario
  - el compuestos
  lexicon: HALOT
  rationale: '''רוקח'' designa a quien mezcla compuestos aromáticos o medicinales. ''Perfumista'' es un equivalente claro y entendible en español contemporáneo, aunque el contexto tenga un matiz medicinal.'
- source_word: עושה מרקחת
  english_pob_choice: prepares a mixture
  chosen_spanish: prepara una mezcla
  alternatives_spanish:
  - compone un preparado
  - prepara un compuesto
  - hace una mezcla
  lexicon: HALOT
  rationale: La expresión hebrea habla de hacer una mezcla o compuesto. 'Prepara una mezcla' conserva la amplitud del término sin imponer un objeto más específico que el texto no exige.
theological_decisions:
- issue: Relación entre el medio usado y la acción de curar
  english_pob_reading: By them the physician relieves pain
  chosen_spanish_reading: Con ellos el médico alivia el dolor
  alternative_spanish_readings:
  - Por ellos el médico alivia el dolor
  - El médico alivia el dolor con ellos
  rationale: El texto presenta los remedios como instrumentos de alivio, no como agentes autónomos. La formulación española mantiene esa relación de medio sin oscurecerla.
  doctrine_reference: Sabiduría práctica / medicina como medio providencial, sin atribuir causalidad divina explícita al instrumento
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. La traducción mantiene el sentido instrumental del hebreo y el paralelo griego sin añadir marcadores de nota.
  spanish_consistency_notes:
  - Se prefirió 'médico' y 'perfumista' por registro claro y contemporáneo, evitando arcaísmos.
  - Se mantuvo un paralelismo breve y directo entre las dos cláusulas, acorde con el hebreo y el griego.
  - No se usó 'Cristo', 'Señor' ni terminología teológica ajena al versículo.
  - La versión evita intensificar 'alivia' a 'cura' para no exceder el alcance del hebreo יניח ni del griego ἐθεράπευσεν en este contexto.
