review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue la línea del POB inglés: plural colectivo para נִבְלַת, futura resultativa para וְהָיְתָה, y objeto implícito explicitado en la cláusula final. Sin embargo, la nota al pie no corresponde bien a la alternativa inglesa, porque presenta una mera reordenación sintáctica en vez de conservar la alternativa significativa de singular colectivo y la elipsis final.'
  spanish_quality_summary: El español es claro, natural y digno. «Los cadáveres de este pueblo» y «para las aves del cielo y para las bestias de la tierra» funcionan bien. «Comida» es entendible, pero «alimento» suena un poco más bíblico; aun así no exige cambio. La mejora necesaria está principalmente en la nota al pie.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales son adecuadas: «cadáveres», «pueblo», «aves del cielo», «bestias de la tierra».'
  issues:
  - severity: medium
    issue: La nota al pie no preserva fielmente la alternativa documentada en el POB inglés.
    rationale: La nota inglesa ofrece como alternativa «el cadáver de este pueblo ... y nadie los espantará / ninguno los espantará», destacando el singular colectivo de נִבְלַת y la elipsis del objeto. La nota española actual introduce una formulación alternativa que básicamente reordena la cláusula final y no presenta con claridad la opción de singular colectivo.
  - severity: low
    issue: La nota usa «carroña» como posible equivalente de נִבְלַת.
    rationale: Aunque puede rozar el campo semántico de carcass/carroña, para restos humanos «cadáver» o «carcasa/cuerpo muerto» es más fiel y natural. «Carroña» en español suele sugerir carne podrida para animales y puede distorsionar el registro.
  revised_spanish_text: Los cadáveres de este pueblo se convertirán en comida para las aves del cielo y para las bestias de la tierra[a], y no habrá nadie que las espante.
  revised_footnotes:
  - marker: a
    text: 'O: «El cadáver de este pueblo se convertirá en comida para las aves del cielo y para las bestias de la tierra, y nadie las espantará». El hebreo singular «cadáver» puede funcionar de manera colectiva, y la última cláusula deja implícito el objeto.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, pero se corrige la nota al pie para que refleje la alternativa real preservada por el POB inglés: el singular colectivo «cadáver» y la cláusula final con objeto implícito. También se elimina «carroña», que aquí no es la mejor opción para restos humanos.'
