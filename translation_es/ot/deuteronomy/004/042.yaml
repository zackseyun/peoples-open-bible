translation:
  language: es
  text: para que un homicida que mata a su prójimo sin conocimiento[a], y no lo odiaba antes[b], pueda huir allí a una de estas ciudades y vivir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, "sin conocimiento"; en este contexto legal, la idea es que la muerte fue involuntaria o no intencional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "desde ayer o anteayer", un modismo que significa "anteriormente" o "desde antes".
    reason: lexical_alternative
lexical_decisions:
- source_word: לָנֻס שָׁמָּה
  english_pob_choice: so that ... may flee there
  chosen_spanish: para que ... pueda huir allí
  alternatives_spanish:
  - para huir allí
  - a fin de huir allí
  lexicon: HALOT
  rationale: El infinitivo de finalidad con ל se expresa naturalmente en español con una subordinada final. "Puede huir" conserva la idea de propósito y evita una construcción forzada.
- source_word: רוֹצֵחַ
  english_pob_choice: manslayer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  - el que da muerte
  lexicon: HALOT
  rationale: En el contexto de las ciudades de refugio, el término no exige culpa intencional plena; "homicida" preserva el valor legal amplio mejor que "asesino".
- source_word: אֲשֶׁר יִרְצַח
  english_pob_choice: who kills
  chosen_spanish: que mata
  alternatives_spanish:
  - que da muerte
  - que hiere de muerte
  - que mata a
  lexicon: HALOT
  rationale: '"Mata" es un verbo natural y directo en español para reflejar el hebreo verbal sin añadir matices no presentes.'
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  - otro
  lexicon: HALOT
  rationale: '"Prójimo" comunica el vínculo personal y relacional del término hebreo en un registro bíblico claro y comprensible.'
- source_word: בִּבְלִי דַעַת
  english_pob_choice: without knowledge / unintentionally
  chosen_spanish: sin darse cuenta, sin saberlo
  alternatives_spanish:
  - sin conocimiento
  - involuntariamente
  - sin intención
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es "sin conocimiento"; en español, la doble formulación mantiene la fuerza léxica y deja claro el sentido legal de acto no deliberado.
- source_word: וְהוּא לֹא שֹׂנֵא לוֹ מִתְּמֹל שִׁלְשֹׁם
  english_pob_choice: and was not hating him previously
  chosen_spanish: y que no le tenía odio desde ayer ni anteayer
  alternatives_spanish:
  - y que no lo odiaba anteriormente
  - y que no era su enemigo desde antes
  - y que no le guardaba odio de antaño
  lexicon: HALOT
  rationale: El participio hebreo expresa una disposición continua; "no le tenía odio" conserva ese trasfondo mejor que un simple pasado puntual. "Desde ayer ni anteayer" refleja el modismo temporal literal sin perder inteligibilidad.
- source_word: וְנָס
  english_pob_choice: may flee
  chosen_spanish: pueda huir
  alternatives_spanish:
  - huya
  - podrá huir
  - puede huir
  lexicon: HALOT
  rationale: El verbo se integra en la finalidad de la cláusula precedente. "Pueda huir" mantiene el valor resultativo y suena natural en español jurídico-narrativo.
- source_word: אֶל אַחַת מִן הֶעָרִים הָאֵל
  english_pob_choice: to one of these cities
  chosen_spanish: a una de estas ciudades
  alternatives_spanish:
  - hacia una de estas ciudades
  - a una de las ciudades estas
  lexicon: HALOT
  rationale: Se conserva el demostrativo inmediato con "estas" y la estructura de destino con "a".
- source_word: וָחָי
  english_pob_choice: and live
  chosen_spanish: y vivir
  alternatives_spanish:
  - y viva
  - y quede con vida
  - para vivir
  lexicon: HALOT
  rationale: El hebreo coordina el resultado final con un verbo simple; "y vivir" mantiene concisión y se ajusta al movimiento del versículo.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó "without prior knowledge" a "without knowledge" para acercarse más a בבלי דעת; la versión española refleja esa elección con "sin darse cuenta, sin saberlo" y una nota que conserva la literalidad de "sin conocimiento". También se mantuvo la idea idiomática de מִתְּמֹל שִׁלְשֹׁם con una nota explicativa sobre el valor temporal literal.
  spanish_consistency_notes:
  - Se usó "Yahvé" como término por defecto para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - '"Homicida" se eligió por precisión legal en el contexto de refugio; no se usó "asesino" para no introducir una culpabilidad no explicitada.'
  - '"Prójimo" conserva mejor la relación interpersonal del hebreo que "vecino" en este contexto.'
  - Se evitó una traducción rígida de los tiempos verbales ingleses; el español sigue la finalidad legal del hebreo.
  - 'Las notas a y b mantienen las dos tensiones principales: el valor literal de "sin conocimiento" y el modismo temporal de "desde ayer ni anteayer".'
