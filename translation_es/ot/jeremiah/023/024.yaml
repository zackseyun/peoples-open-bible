translation:
  language: es
  text: ¿Puede un hombre esconderse en lugares secretos, de modo que yo no lo vea?[a] declara Yahvé. ¿No lleno yo el cielo y la tierra?[b] declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si un hombre se esconde en lugares secretos, ¿no lo veré?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los cielos y la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Can
  chosen_spanish: ¿Puede
  alternatives_spanish:
  - Si
  - ¿Acaso puede
  lexicon: HALOT
  rationale: En esta pregunta retórica, la fuerza no es condicional sino desafiante; «¿Puede» transmite en español esa lectura mejor que un simple «Si».
- source_word: יִסָּתֵר
  english_pob_choice: hide himself
  chosen_spanish: esconderse
  alternatives_spanish:
  - ocultarse
  - ser escondido
  lexicon: HALOT
  rationale: El nifal puede leerse con matiz reflexivo; en contexto, el hombre intenta evadir la vista divina. «Esconderse» conserva ese sentido voluntario y natural en español.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es singular masculino genérico. «Un hombre» preserva la forma fuente y la fuerza representativa sin neutralizarla indebidamente.
- source_word: בַּמִּסְתָּרִים
  english_pob_choice: in secret places
  chosen_spanish: en lugares secretos
  alternatives_spanish:
  - en escondrijos
  - en lugares ocultos
  lexicon: HALOT
  rationale: El plural sugiere múltiples ocultamientos o recesos; «lugares secretos» suena natural en español y mantiene el plural implícito.
- source_word: וַאֲנִי לֹא אֶרְאֶנּוּ
  english_pob_choice: so that I do not see him
  chosen_spanish: de modo que yo no lo vea
  alternatives_spanish:
  - y no lo vea
  - sin que yo lo vea
  lexicon: HALOT
  rationale: La construcción retórica expresa resultado o propósito. «De modo que yo no lo vea» comunica bien esa fuerza en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de forma idiomática y sobria. Se mantiene «declara» para el matiz solemne y el nombre divino «Yahvé» según el criterio POB.
- source_word: הֲלוֹא
  english_pob_choice: Do I not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es verdad que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con respuesta afirmativa esperada; «¿No» conserva esa fuerza de manera directa.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: Aunque en inglés POB opta por el merismo idiomático «heaven and earth», el hebreo usa el plural «los cielos»; aquí se conserva esa precisión y el paralelismo tradicional.
- source_word: מָלֵא
  english_pob_choice: fill
  chosen_spanish: lleno
  alternatives_spanish:
  - lleno completamente
  - estoy llenando
  lexicon: HALOT
  rationale: El predicado expresa plenitud/presencia total. En español, la forma «yo lleno» mantiene la fuerza verbal sin convertirla en una abstracción doctrinal.
theological_decisions:
- issue: Omnipresencia divina expresada como llenura
  english_pob_reading: Do I not fill heaven and earth?
  chosen_spanish_reading: ¿No lleno yo los cielos y la tierra?
  alternative_spanish_readings:
  - ¿No estoy presente en todo los cielos y la tierra?
  - ¿No lleno completamente los cielos y la tierra?
  rationale: Se conserva la metáfora bíblica de «llenar» en lugar de reemplazarla por una paráfrasis doctrinal como «estar presente en todas partes».
  doctrine_reference: Preservar la tensión teológica del original; primacía del lenguaje fuente sobre la abstracción explicativa.
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La transliteración del nombre divino se mantiene como decisión doctrinal y textual del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador corrige la validación anterior anclando cada nota con su marcador correspondiente en el texto español. También alinea la fórmula profética con el nombre divino «Yahvé» y mantiene la metáfora de «llenar» sin resolverla en lenguaje doctrinal abstracto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la interrogación retórica con «¿Puede…?» y «¿No…?» para reflejar la fuerza del hebreo.
  - Se mantiene «los cielos y la tierra» para respetar el paralelismo hebreo y el pie de nota lexical.
  - El tono es bíblico, digno y comprensible en español latinoamericano contemporáneo.
