translation:
  language: es
  text: Él examinará la infección[a], y si la infección en las paredes de la casa consiste en depresiones verdosas o rojizas, y su aspecto es más profundo que la pared[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «depresiones» por «zonas hundidas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «más bajo que la pared»; es decir, con apariencia de estar hundido por debajo de la superficie de la pared.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: He shall examine
  chosen_spanish: Él examinará
  alternatives_spanish:
  - Él verá
  - Él inspeccionará
  lexicon: HALOT
  rationale: En este contexto sacerdotal de diagnóstico, ראה no es solo “ver”, sino realizar una evaluación. «Examinará» comunica la acción procedimental de manera natural en español.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la afección
  - la mancha
  - la plaga
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada en inglés, «infección» comunica el estado anómalo y contaminante sin recurrir a «plaga», que en español puede sonar demasiado general o tradicionalista.
- source_word: וְהִנֵּה
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: En prosa legal/procedimental, la expresión introduce la condición descubierta al examinar. «Y si» expresa mejor esa fuerza que una traducción literal y solemne.
- source_word: בְּקִירֹת הַבַּיִת
  english_pob_choice: in the walls of the house
  chosen_spanish: en las paredes de la casa
  alternatives_spanish:
  - sobre las paredes de la casa
  lexicon: HALOT
  rationale: «En las paredes» respeta la imagen de hundimientos o cavidades dentro de la superficie, coherente con la descripción posterior del relieve hundido.
- source_word: שְׁקַעֲרוּרֹת
  english_pob_choice: sunken areas
  chosen_spanish: depresiones
  alternatives_spanish:
  - hendiduras
  - hoyuelos
  - zonas hundidas
  lexicon: HALOT
  rationale: El término raro describe lugares rebajados o hundidos. «Depresiones» es preciso y legible en español, y mantiene la idea de concavidad.
- source_word: יְרַקְרַקֹּת
  english_pob_choice: greenish
  chosen_spanish: verdosas
  alternatives_spanish:
  - verdes
  - de tono verde
  lexicon: HALOT
  rationale: El reduplicado indica matiz, no verde intenso. «Verdosas» conserva la atenuación del color mejor que «verdes».
- source_word: אֲדַמְדַּמֹּת
  english_pob_choice: reddish
  chosen_spanish: rojizas
  alternatives_spanish:
  - rojizas tirando a rojo
  - de tono rojo
  lexicon: HALOT
  rationale: La forma reduplicada expresa un tinte rojizo, no un rojo fuerte. «Rojizas» preserva esa cualidad atenuada.
- source_word: וּמַרְאֵיהֶן
  english_pob_choice: and their appearance
  chosen_spanish: y su apariencia
  alternatives_spanish:
  - y su aspecto
  - y cómo se ven
  lexicon: HALOT
  rationale: מראה se refiere al aspecto visible. «Apariencia» es natural y preciso en español para este valor perceptivo.
- source_word: שָׁפָל מִן הַקִּיר
  english_pob_choice: is deeper than the wall
  chosen_spanish: es más baja que la pared
  alternatives_spanish:
  - está más profunda que la pared
  - está rebajada respecto de la pared
  lexicon: HALOT
  rationale: Literalmente, la expresión indica un nivel inferior al de la superficie de la pared. «Más baja que la pared» conserva la comparación espacial del hebreo; «más profunda» sería una aclaración interpretativa válida, pero aquí se preserva el motivo visual con sobriedad.
theological_decisions:
- issue: Tratamiento del ‘nגע’ de la casa como afección ritual sin diluir su fuerza
  english_pob_reading: the infection
  chosen_spanish_reading: la infección
  alternative_spanish_readings:
  - la plaga
  - la afección impura
  rationale: La POB en inglés eligió «infection» para evitar el término tradicional «plague» y su carga histórica. En español, «infección» mantiene esa decisión y comunica bien el carácter anómalo/contaminante del caso, sin afirmar más de lo que el texto dice.
  doctrine_reference: Levítico 14:33-57; pureza/impureza ritual en la Torá
- issue: Relación entre el hundimiento descrito y la superficie de la pared
  english_pob_reading: deeper than the wall
  chosen_spanish_reading: es más baja que la pared
  alternative_spanish_readings:
  - está más profunda que la pared
  - aparece hundida bajo la pared
  rationale: El hebreo habla de una posición inferior respecto de la pared. La redacción española conserva la comparación espacial sin convertirla en una explicación excesiva; la idea diagnóstica es visual, no doctrinal.
  doctrine_reference: Levítico 14:37; descripción diagnóstica de la impureza de la casa
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó la sintaxis para reflejar con más naturalidad la idea de depresiones hundidas en la pared. La versión española sigue esa revisión: evita una construcción más rígida y conserva el valor procedimental del examen, la rareza del término de hundimiento y la comparación espacial final.'
  spanish_consistency_notes:
  - Se mantiene «infección» en lugar de «plaga» para conservar la decisión terminológica auditada.
  - «Depresiones» y la nota de pie de página preservan la alternativa semántica de «zonas hundidas», como en el registro inglés.
  - Se usa lenguaje neutral y culto, apto para lectura eclesial amplia, sin recurrir a fórmulas arcaizantes innecesarias.
