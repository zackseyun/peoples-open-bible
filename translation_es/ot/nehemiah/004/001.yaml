base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/004/001.yaml
  text: Now when Sanballat and Tobiah and the Arabs and the Ammonites and the Ashdodites heard that the repair of Jerusalem’s walls had gone up[a], that the breaches had begun to be closed[b], they became very angry.
  footnotes:
  - marker: a
    text: Or 'the restoration of Jerusalem’s walls had advanced.' The Hebrew uses a term often associated with healing or restoration metaphorically for repair work.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gaps' instead of 'the breaches.'
    reason: lexical_alternative
