translation:
  language: es
  text: Ahora bien, cuando las vírgenes[a] fueron reunidas por segunda vez[b], Mardoqueo estaba sentado en la puerta[c] del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doncellas» o «jóvenes». El hebreo dice literalmente «vírgenes».
    reason: lexical_alternative
  - marker: b
    text: O «otra vez». El hebreo dice literalmente «por segunda vez».
    reason: lexical_alternative
  - marker: c
    text: «La puerta del rey» probablemente se refiere al área de la puerta del palacio real, un lugar asociado con el servicio oficial y la administración.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְהִקָּבֵץ
  english_pob_choice: Now when ... were gathered
  chosen_spanish: Ahora bien, cuando ... fueron reunidas
  alternatives_spanish:
  - Y cuando ... fueron reunidas
  - Mientras ... eran reunidas
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal introduce una cláusula de tiempo. «Ahora bien, cuando» conserva el avance narrativo natural del hebreo y del inglés POB, sin perder el valor temporal de la forma pasiva.
- source_word: בְּתוּלוֹת
  english_pob_choice: the virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - las jóvenes
  - las doncellas
  lexicon: HALOT
  rationale: El término hebreo denota de manera directa a mujeres vírgenes; en este contexto de selección de mujeres del palacio, la precisión lexical es preferible a una suavización como «jóvenes».
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: La expresión significa literalmente «segunda vez»; «por segunda vez» conserva con claridad ese valor adverbial y evita ambigüedad.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio qal expresa una अवस्था durativa; «estaba sentado» refleja mejor esa continuidad que un pretérito simple como «se sentó».
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: at the king's gate
  chosen_spanish: a la puerta del rey
  alternatives_spanish:
  - en la puerta del rey
  - en la puerta real
  lexicon: HALOT
  rationale: La referencia apunta al área de la puerta del complejo real, asociada con funciones oficiales. «A la puerta del rey» es natural en español y mantiene el sentido espacial y administrativo del hebreo.
theological_decisions:
- issue: Valor de בְּתוּלוֹת en un contexto cortesano
  english_pob_reading: the virgins
  chosen_spanish_reading: las vírgenes
  alternative_spanish_readings:
  - las jóvenes
  - las doncellas
  rationale: No hay razón textual para diluir el rasgo de virginidad; el término hebreo lo expresa de manera directa y la POB inglesa también lo conservó. Mantenerlo evita perder una precisión relevante del texto.
  doctrine_reference: Precisión lexical del hebreo; no implica afirmación doctrinal adicional.
translation_notes:
  revision_awareness: El texto base coincide sustancialmente con la tradición POB inglesa; no se documentan revisiones textuales sustantivas en el paquete provisto. La decisión principal es mantener la fuerza temporal de הִקָּבֵץ y la precisión de בְּתוּלוֹת, junto con la referencia cultural de la puerta del rey.
  spanish_consistency_notes:
  - Se mantiene «Mardoqueo» para el nombre propio, conforme a la convención de transliteración en español.
  - «Yahvé» no aparece en este versículo; no aplica decisión terminológica sobre el tetragrámaton.
  - «puerta del rey» preserva el valor administrativo/cortesano del hebreo sin añadir glosa al cuerpo del texto.
