translation:
  text: Give to the good[a], and withhold from the evil; honor the poor, and do not give to a stranger.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'withhold from evil' or possibly 'from an evil person'; the Greek parallel reads 'do not support the sinner,' which guides the main text here.
    reason: alternative_reading
  - marker: b
    text: Or 'to an outsider' or 'to a foreigner.' The Hebrew term can refer broadly to one outside the community or proper circle.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּן
  chosen: Give
  alternatives:
  - Provide
  - Grant
  lexicon: HALOT
  rationale: Simple imperative of נתן; 'Give' is the most direct and natural English equivalent.
- source_word: לַטּוֹב
  chosen: to the good
  alternatives:
  - to the good person
  - to the righteous
  lexicon: HALOT
  rationale: Hebrew literally 'to the good.' Retaining 'the good' preserves the concise ethical category of the Hebrew, while the Greek τῷ ἀγαθῷ confirms a personal referent.
- source_word: וּמְנַע
  chosen: do not support
  alternatives:
  - withhold from
  - hold back from
  - restrain yourself from helping
  lexicon: HALOT
  rationale: The Hebrew מנע normally means 'withhold,' but the Greek parallel μὴ ἀντιλάβῃ τοῦ ἁμαρτωλοῦ points toward refraining from taking hold of or assisting the sinner. 'Do not support' best reflects the combined evidence of the Hebrew and Greek without over-paraphrase.
- source_word: מֵרָע
  chosen: the sinner
  alternatives:
  - the evil person
  - evil
  lexicon: HALOT
  rationale: The Hebrew consonants suggest 'from evil/evil person,' but the Greek parallel has τοῦ ἁμαρτωλοῦ, 'the sinner.' Given the parallel source and the ethical-personal contrast with 'the good,' rendering as 'the sinner' best captures the intended referent while acknowledging the Hebrew's ambiguity.
- source_word: הֹקֵיר
  chosen: Honor
  alternatives:
  - Esteem
  - Value
  lexicon: HALOT
  rationale: Imperative meaning to honor or hold in esteem. 'Honor' is concise and idiomatic.
- source_word: מָךְ
  chosen: the poor
  alternatives:
  - the lowly
  - the needy
  lexicon: HALOT
  rationale: מָךְ denotes one who is poor or of low status. 'The poor' is the clearest modern rendering in this context.
- source_word: וְאַל תִּתֵּן
  chosen: and do not give
  alternatives:
  - and do not hand over
  - and do not grant
  lexicon: HALOT
  rationale: Straightforward negative imperative from נתן; 'do not give' preserves the formal simplicity of the Hebrew.
- source_word: לְזֵר
  chosen: to a stranger
  alternatives:
  - to an outsider
  - to a foreigner
  lexicon: HALOT
  rationale: זָר can mean stranger, outsider, or foreigner. 'Stranger' is the broadest and least overdetermined choice, preserving the social distance implied by the Hebrew.
