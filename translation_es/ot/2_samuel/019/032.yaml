translation:
  language: es
  text: Y Barzilai el galaadita había descendido de Rogelim[a], y cruzó con el rey el Jordán para despedirlo en el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «descendió de Rogelim y cruzó con el rey el Jordán para escoltarlo». El hebreo permite maneras ligeramente distintas de expresar cómo Barzilai acompañó al rey en el río.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַרְזִלַּי
  english_pob_choice: Barzillai
  chosen_spanish: Barzilai
  alternatives_spanish:
  - Barzillai
  lexicon: N/A (nombre propio)
  rationale: Se translitera el nombre propio de forma reconocible en español, conservando la forma más natural para lectura bíblica.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - el de Galaad
  - el hombre de Galaad
  lexicon: HALOT
  rationale: El adjetivo gentilicio se expresa con el etnónimo españolizado más conciso y natural; mantiene la identificación regional sin añadir explicaciones ajenas al texto.
- source_word: יָרַד
  english_pob_choice: had come down
  chosen_spanish: había descendido
  alternatives_spanish:
  - descendió
  - había bajado
  lexicon: HALOT
  rationale: El hebreo usa un perfecto narrativo referido a movimiento desde Rogelim hacia el Jordán. 'Había descendido' conserva la anterioridad relativa que el inglés POB marcó con past perfect.
- source_word: מֵרֹגְלִים
  english_pob_choice: from Rogelim
  chosen_spanish: de Rogelim
  alternatives_spanish:
  - desde Rogelim
  lexicon: N/A (topónimo)
  rationale: Se conserva el topónimo por transliteración y la preposición 'de' comunica origen de manera natural en español.
- source_word: וַיַּעֲבֹר
  english_pob_choice: he crossed
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - cruzó junto con
  lexicon: HALOT
  rationale: En este contexto, עבר indica el acto de cruzar el río. 'Cruzó' es la forma más directa y fiel en español.
- source_word: אֶת הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: Aunque אֶת normalmente marca objeto directo, aquí la relación con el verbo de movimiento exige valor asociativo/comitativo. 'Con el rey' reproduce la lectura del POB inglés sin forzar un objeto directo imposible en español.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se usa el nombre geográfico habitual en español bíblico; 'río' no es necesario para identificarlo.
- source_word: לְשַׁלְּחוֹ
  english_pob_choice: to send him off
  chosen_spanish: para despedirlo
  alternatives_spanish:
  - para acompañarlo
  - para despedirlo del todo
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo expresa propósito: acompañar al rey en su partida y darle despedida. ''Para despedirlo'' comunica bien la intención sin perder la idea de envío/partida.'
- source_word: אֶת בַּיַּרְדֵּן
  english_pob_choice: at the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - junto al Jordán
  - a orillas del Jordán
  lexicon: HALOT
  rationale: La preposición final localiza el acto de despedida en el lugar del cruce. 'En el Jordán' es breve y natural; la nota aclara que el sentido abarca el punto del cruce/despedida.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español, y la nota ancla la alternativa léxica correspondiente. La redacción mantiene el valor comitativo de ''con el rey'' y el lugar de despedida en el Jordán sin sobreparafrasear.'
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'el Jordán' como nombre del río, consistente con la terminología bíblica española natural.
  - '''Despedirlo'' se eligió por su capacidad de abarcar tanto la despedida como el acto de acompañarlo en la partida, acorde con la ambigüedad documentada por el POB inglés.'
