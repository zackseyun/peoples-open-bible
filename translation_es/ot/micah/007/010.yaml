translation:
  language: es
  text: 'Entonces mi enemiga verá, y la vergüenza la cubrirá —la que me dijo: «¿Dónde está Yahvé tu Dios?»—. Mis ojos la verán[a]; ahora será pisoteada como barro en las calles.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis ojos la mirarán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será para ser pisoteada, como barro en las calles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתֵרֶא
  english_pob_choice: Then ... will see
  chosen_spanish: Entonces ... lo verá
  alternatives_spanish:
  - Y ... verá
  - Luego ... verá
  lexicon: HALOT
  rationale: El waw consecutivo aquí continúa la secuencia narrativa y, en español, «Entonces» expresa mejor la progresión del discurso que un simple «y». Se mantiene el valor futuro de la forma verbal.
- source_word: אֹיַבְתִּי
  english_pob_choice: my enemy
  chosen_spanish: mi enemiga
  alternatives_spanish:
  - mi enemigo
  - mi adversaria
  lexicon: HALOT
  rationale: El hebreo presenta una forma femenina y el contexto sigue con referentes femeninos. En español conviene explicitar el género con «mi enemiga» para conservar la concordancia del texto original.
- source_word: וּתְכַסֶּהָ בוּשָׁה
  english_pob_choice: and shame will cover her
  chosen_spanish: y la vergüenza la cubrirá
  alternatives_spanish:
  - y la cubrirá la vergüenza
  - y la cubrirá la vergüenza y la deshonra
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la vergüenza que envuelve a una persona. «Vergüenza» mantiene el valor básico de בוּשָׁה sin introducir matices no sustentados por el texto.
- source_word: הָאֹמְרָה אֵלַי
  english_pob_choice: the one who said to me
  chosen_spanish: la que me decía
  alternatives_spanish:
  - la que me dijo
  - la que me estaba diciendo
  lexicon: HALOT
  rationale: El participio femenino sustantivado funciona como una caracterización continua o identificadora de la enemiga. En español, «la que me decía» suena natural y conserva la fuerza de identificación del original.
- source_word: אַיּוֹ יְהוָה אֱלֹהָיִךְ
  english_pob_choice: Where is Yahweh your God?
  chosen_spanish: «¿Dónde está Yahvé tu Dios?»
  alternatives_spanish:
  - «¿Dónde está Yahvé, tu Dios?»
  - «¿Dónde está Yahvé, el Dios tuyo?»
  lexicon: HALOT
  rationale: Se traduce יְהוָה como «Yahvé» conforme al criterio del proyecto. «¿Dónde está...?» reproduce la burla de presencia/ausencia contenida en el interrogante hebreo y evita forzar un calco. «Tu Dios» preserva el ataque directo en segunda persona femenina.
- source_word: עֵינַי תִּרְאֶינָּה בָּהּ
  english_pob_choice: My eyes will look on her
  chosen_spanish: Mis ojos la verán
  alternatives_spanish:
  - Mis ojos la mirarán
  - Yo la veré
  lexicon: HALOT
  rationale: El hebreo conserva el sujeto explícito «mis ojos»; en español puede mantenerse, pero «Mis ojos la verán» es más directo y fiel que «Yo la veré», sin perder el énfasis visual del original.
- source_word: לְמִרְמָס
  english_pob_choice: will be trampled down
  chosen_spanish: será pisoteada
  alternatives_spanish:
  - será hollada
  - será para ser pisoteada
  lexicon: HALOT
  rationale: La noción de trampling/being trodden underfoot se expresa de manera natural en español con «pisoteada». Se evita una paráfrasis abstracta y se conserva el valor de humillación y derrota.
- source_word: כְּטִיט חוּצֽוֹת
  english_pob_choice: like mud in the streets
  chosen_spanish: como el barro de las calles
  alternatives_spanish:
  - como el lodo de las calles
  - como el barro en las calles
  lexicon: HALOT
  rationale: «Barro» comunica bien טִיט en español y conserva la imagen de algo despreciable y pisoteado. «De las calles» reproduce חוּצוֹת de manera natural y pública, como en el inglés auditado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y el proyecto pide «Yahvé» como forma principal en español. Se evita la sustitución por un título para conservar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Género de la enemiga y concordancia pronominal
  english_pob_reading: my enemy ... her ... the one who said to me
  chosen_spanish_reading: mi enemiga ... la ... la que me decía
  alternative_spanish_readings:
  - mi enemigo ... lo ... el que me decía
  - mi adversaria ... la ... la que me decía
  rationale: El hebreo marca femenino en la enemiga y en los verbos relacionados; el español debe reflejar esa concordancia para no borrar un rasgo gramatical importante del texto.
  doctrine_reference: 'DOCTRINE.md: Fidelity to grammatical gender when textually significant'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que sustituyó una redacción más perifrástica de לְמִרְמָס por una más directa («will be trampled down»). Por eso el español usa «será pisoteada», manteniendo la acción concreta de ser hollada sin añadir explicaciones.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se conservó la referencia femenina de la enemiga, de acuerdo con la morfología hebrea y la cadena de pronombres del verso.
  - «Barro de las calles» mantiene el registro bíblico sin caer en arcaísmo excesivo.
  - Las notas a pie de página solo se emplearon donde hay una alternativa lexical real atestiguada por el audit trail inglés.
