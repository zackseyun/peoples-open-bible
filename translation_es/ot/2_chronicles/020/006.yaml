revisions:
- from: 'y dijo[a]: «Oh Yahvé, Dios de nuestros padres, ¿no eres tú Dios en los cielos? ¿Y no gobiernas sobre todos los reinos de las naciones? En tu mano están el poder y la fuerza, y no hay quien pueda ponerse[b] en tu presencia».'
  to: 'y dijo[a]: «Oh, Yahvé, Dios de nuestros padres, ¿no eres tú Dios en los cielos? ¿Y no gobiernas sobre todos los reinos de las naciones? En tu mano están el poder y la fuerza, y no hay quien pueda hacerte frente[b]»'
  rationale: Se revisa solo la cláusula final para reflejar con más fidelidad el sentido contextual de לְהִתְיַצֵּב como oposición o resistencia frente a Yahvé. «Hacerte frente» conserva la fuerza del hebreo y coincide con la rationale documentada en el POB inglés. También se mejora levemente la puntuación del vocativo en español.
