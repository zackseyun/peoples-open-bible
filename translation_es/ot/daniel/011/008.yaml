translation:
  language: es
  text: También llevará a Egipto a sus dioses, junto con sus imágenes fundidas y sus valiosos vasos de plata y de oro, como botín; y por algunos años se mantendrá apartado del rey del norte.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por algunos años continuará más tiempo que el rey del norte», o «se mantendrá más fuerte que el rey del norte por años». La cláusula hebrea está condensada y puede leerse comparativamente más que como abstención.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: La partícula añade continuidad e intensificación respecto de lo anterior. «También» reproduce esa fuerza aditiva de manera natural en español sin sobrecargar la oración.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses/ídolos
  - sus deidades
  lexicon: HALOT
  rationale: El hebreo emplea el plural con sufijo posesivo para los dioses del pueblo vencido. «Dioses» es la correspondencia directa; el matiz idolátrico queda claro por el contexto de saqueo bélico y no requiere añadirse al cuerpo principal.
- source_word: נְסִכֵיהֶם
  english_pob_choice: their cast images
  chosen_spanish: sus imágenes fundidas
  alternatives_spanish:
  - sus ídolos fundidos
  - sus imágenes de metal
  lexicon: HALOT
  rationale: La idea es de imágenes hechas por fundición. «Imágenes fundidas» conserva el dato manufacturero con español claro y respetuoso del sentido léxico.
- source_word: כְּלֵי חֶמְדָּתָם
  english_pob_choice: their precious vessels
  chosen_spanish: sus valiosos vasos
  alternatives_spanish:
  - sus vasos preciosos
  - sus utensilios valiosos
  - sus objetos preciosos
  lexicon: HALOT
  rationale: כְּלֵי es un término amplio para recipientes/vasos/objetos. En este contexto de tesoros y botín, «vasos» es natural y suficientemente amplio; «valiosos» expresa el valor deseable de חֶמְדָּתָם sin forzar una lectura específicamente cultual.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: of silver and gold
  chosen_spanish: de plata y de oro
  alternatives_spanish:
  - de plata y oro
  - de plata y oro fino
  lexicon: HALOT
  rationale: El hebreo enumera los materiales. En español, «de plata y de oro» mantiene la serie de materiales unida a «vasos» y suena más natural que intentar una reordenación interpretativa.
- source_word: בַּשְּׁבִי
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - como presa de guerra
  - en botín
  lexicon: HALOT
  rationale: La expresión modifica el traslado de objetos a Egipto y apunta al despojo de guerra. «Botín» es la forma breve y directa de comunicar esa función.
- source_word: יָבִא מִצְרָיִם
  english_pob_choice: he will carry off to Egypt
  chosen_spanish: traerá a Egipto
  alternatives_spanish:
  - llevará a Egipto
  - se llevará a Egipto
  lexicon: HALOT
  rationale: El verbo הִבִיא puede traducirse «traer», pero en contexto militar describe el traslado de lo saqueado a Egipto. «Traerá a Egipto» conserva la forma verbal sin abandonar la dirección del movimiento; el matiz de despojo ya queda explicitado por «como botín».
- source_word: שָׁנִים
  english_pob_choice: for some years
  chosen_spanish: por algunos años
  alternatives_spanish:
  - por años
  - durante algunos años
  lexicon: HALOT
  rationale: El plural es indefinido. «Por algunos años» hace explícita la duración aproximada sin fijar una cifra y suena idiomático en español.
- source_word: יַעֲמֹד מִמֶּלֶךְ הַצָּפוֹן
  english_pob_choice: he will refrain from attacking the king of the north
  chosen_spanish: se mantendrá apartado del rey del norte
  alternatives_spanish:
  - se abstendrá de atacar al rey del norte
  - permanecerá alejado del rey del norte
  - se mantendrá al margen del rey del norte
  lexicon: HALOT
  rationale: La raíz עמד con מן admite una lectura de separación/abstención; la POB inglesa optó por una interpretación dinámica de no agresión. «Se mantendrá apartado» conserva la imagen de distancia y la ambigüedad del hebreo mejor que resolverla en un solo verbo más interpretativo.
theological_decisions:
- issue: Interpretación de וְהוּא שָׁנִים יַעֲמֹד מִמֶּלֶךְ הַצָּפוֹן
  english_pob_reading: For some years he will refrain from attacking the king of the north, while preserving the possibility of a comparative reading in a footnote.
  chosen_spanish_reading: Por algunos años se mantendrá apartado del rey del norte.
  alternative_spanish_readings:
  - Por algunos años permanecerá más fuerte que el rey del norte.
  - Por algunos años se abstendrá de atacar al rey del norte.
  rationale: La cláusula hebrea es comprimida y admite más de una relación sintáctica y semántica. La redacción principal conserva la imagen verbal de distancia y evita cerrar la tensión con una paráfrasis excesivamente decidida. Las alternativas quedan disponibles por fidelidad al audit trail y a la ambigüedad documentada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa más reciente suavizó la lista de objetos y prefirió una traducción dinámica de יַעֲמֹד. La presente redacción mantiene la separación conceptual entre el botín y la acción de Egipto, y conserva la ambigüedad de יַעֲמֹד con una formulación española que no fuerza ni la lectura comparativa ni la de ataque explícito.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - «Dioses» se conserva en plural conforme al hebreo; no se sustituye por «ídolos» en el texto principal.
  - «Botín» comunica el valor de בַּשְּׁבִי como despojo de guerra aplicado a objetos.
  - La sintaxis española mantiene un orden fluido sin añadir sujetos o conectores no presentes en el hebreo.
