review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente el rango de edad, el sentido general de כָּל הַבָּא, y el contexto del servicio levítico en el tabernáculo. Sin embargo, «todo el que venga» suena subjuntivo/condicional en español y debilita el valor participial más directo de «el que viene». Además, la repetición «obra de servicio ... obra de cargar» no refleja tan bien la diferenciación del hebreo/POB entre «work of service» y «service of carrying»; en español resulta más claro y más fiel distinguir «la obra del servicio» y «el servicio de llevar cargas».
  spanish_quality_summary: El texto es legible, pero «todo el que venga» y «la obra de cargar» suenan menos naturales en español eclesial general. «Tienda de reunión» es aceptable y fiel. Conviene suavizar la estructura para que suene más idiomática sin apartarse del original.
  glossary_alignment: No hay conflictos con los términos teológicos del proyecto. «Tienda de reunión» concuerda con una equivalencia transparente de אֹהֶל מוֹעֵד. La revisión propuesta mejora la correspondencia léxica de עֲבֹדַת עֲבֹדָה y וַעֲבֹדַת מַשָּׂא sin introducir terminología ajena.
  issues:
  - severity: medium
    issue: «todo el que venga»
    rationale: El hebreo כָּל הַבָּא es participial sustantivado, mejor reflejado en español por «todo el que viene» o «todo el que entra/presenta». «Venga» puede leerse como subjuntivo inespecífico y suena menos directo aquí.
  - severity: medium
    issue: «la obra de cargar»
    rationale: Aunque entiende el sentido básico, la frase suena poco natural y no expresa con claridad la relación de servicio vinculada a מַשָּׂא. «El servicio de llevar cargas» refleja mejor la construcción y el sentido concreto de carga/porte, además de preservar la alternativa registrada en la nota inglesa.
  - severity: low
    issue: «la obra de servicio»
    rationale: Es comprensible, pero «la obra del servicio» suena más idiomático en español y conserva mejor la doble estructura nominal del hebreo sin rigidez excesiva.
  revised_spanish_text: desde los treinta años de edad y en adelante[a], hasta los cincuenta años de edad, todo el que viene para hacer la obra del servicio y el servicio de llevar cargas en la tienda de reunión.
  revised_footnotes:
