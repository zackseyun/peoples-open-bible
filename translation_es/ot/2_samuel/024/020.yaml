translation:
  language: es
  text: Araunah se asomó y vio al rey y a sus siervos pasando ante él[a]. Entonces Araunah salió y se inclinó ante el rey con el rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acercándose a él»; el hebreo describe literalmente al rey y a sus siervos moviéndose en relación con Araunah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁקֵף
  english_pob_choice: looked out
  chosen_spanish: se asomó
  alternatives_spanish:
  - miró hacia afuera
  - se inclinó para mirar
  - observó desde arriba
  lexicon: HALOT
  rationale: El verbo comunica mirar desde una posición elevada o desde una abertura; «se asomó» conserva la idea de mirar desde un punto de ventaja en español natural.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - advirtió
  - alcanzó a ver
  lexicon: HALOT
  rationale: Después de «se asomó», «vio» expresa de forma directa la secuencia narrativa sin añadir matices no presentes.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus sirvientes
  - sus oficiales
  lexicon: HALOT
  rationale: En un contexto real, «servidores» es claro y amplio; evita imponer un rango técnico más preciso que el texto no exige.
- source_word: עֹבְרִים עָלָיו
  english_pob_choice: passing by him
  chosen_spanish: pasando junto a él
  alternatives_spanish:
  - pasando por delante de él
  - pasando sobre él
  - acercándose a él
  lexicon: HALOT
  rationale: La expresión hebrea indica movimiento en relación con Araunah. «Pasando junto a él» mantiene esa relación sin forzar una interpretación distinta. Se evita «acercándose», porque esa lectura suaviza el valor literal de עבר + על.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - salió de allí
  lexicon: HALOT
  rationale: «Salió» es la equivalencia directa y natural para יצא.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - rindió homenaje
  - se inclinó en reverencia
  lexicon: HALOT
  rationale: El gesto es de reverencia corporal ante un rey humano. «Se inclinó» preserva la acción física sin convertirla en adoración; «se postró» sería posible pero más fuerte en español.
- source_word: אַפָּיו אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - con el rostro hacia el suelo
  - postrado rostro en tierra
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de modo natural en español con «con el rostro en tierra», que comunica la prostración completa.
- source_word: אֲרַוְנָה
  english_pob_choice: Araunah
  chosen_spanish: Araunah
  alternatives_spanish:
  - Ornan
  lexicon: Nombre propio; Samuel vs. Crónicas
  rationale: Se conserva la forma del texto de Samuel. «Ornan» pertenece al paralelo de Crónicas, no a este versículo.
theological_decisions:
- issue: Naturaleza del gesto de Araunah ante el rey
  english_pob_reading: civil homage/prostration before a human king, rendered 'bowed down to the king'
  chosen_spanish_reading: reverencia civil ante un rey humano, no adoración
  alternative_spanish_readings:
  - adoró al rey
  - se postró en adoración ante el rey
  rationale: El verbo admite más de un uso, pero aquí el objeto es David. «Se inclinó ante el rey» preserva la reverencia física sin importar una lectura de culto.
  doctrine_reference: Translation philosophy §3 (preserve tension without importing doctrinal claims)
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del audit trail, que ajustó la relación espacial de עֹבְרִים עָלָיו hacia una lectura más literal de movimiento «junto a/by him» en lugar de una interpretación más libre como «acercándose».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Servidor/es» se usó con valor cortesano, sin cargarlo con una acepción eclesiástica posterior.
  - No se tradujo el gesto de inclinarse como adoración para no borrar la tensión léxica entre homenaje humano y postración cultual.
