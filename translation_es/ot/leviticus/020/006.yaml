review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en los puntos principales: הַנֶּפֶשׁ como «la persona», תִּפְנֶה como «se vuelva a», el par técnico «médiums / espiritistas», la metáfora de זנה, la idiomática judicial «pondré mi rostro contra», y la fórmula sancionadora «cortar». Sin embargo, hay un problema importante en la realización española de וְהִכְרַתִּי אֹתוֹ: «la cortaré» suena impropio en español para una persona y puede sugerir mutilación literal, no la fórmula legal de exclusión/jucio. Conviene reparar la frase para preservar el sentido jurídico abierto del hebreo.'
  spanish_quality_summary: El texto es legible y digno, pero «la cortaré de entre su pueblo» no es español bíblico-natural ni claro para lectores modernos; afecta tanto la inteligibilidad como la fidelidad semántica. Además, la nota b usa «actuar como prostituta», que en español tiende a feminizar la imagen y no corresponde bien al hebreo aplicado a una persona genérica; es mejor una alternativa más neutra. El resto del verso suena bien en español general eclesial.
  glossary_alignment: No hay conflicto con las pautas globales de terminología del proyecto. «Médiums» y «espiritistas» son coherentes con el rastro inglés. La preservación de la metáfora sexual y de la fórmula «cortar» va en la dirección correcta, pero debe ajustarse en español a una formulación natural como «la eliminaré» en el texto con nota que preserve «cortar», o una solución equivalente que no pierda la apertura jurídica. Aquí la mejor reparación mínima es usar una formulación idiomática en español y dejar constancia del hebreo en la nota.
  issues:
  - severity: high
    issue: «y la cortaré de entre su pueblo» es una formulación española defectuosa para כרת
    rationale: Aunque el inglés puede retener literalmente «cut him off», en español «cortar a una persona» suena físico o extraño. No comunica bien la fórmula jurídica de eliminación/exclusión y puede malinterpretarse. Se necesita una redacción idiomática que exprese el juicio sin sobreespecificarlo.
  - severity: medium
    issue: La nota b («actuar como prostituta») introduce un matiz de género no deseado
    rationale: El hebreo usa una metáfora de prostitución aplicada a una persona genérica; en español, «actuar como prostituta» se oye marcado en femenino y menos natural. Una alternativa más neutra preserva mejor la metáfora sin sesgo innecesario.
  revised_spanish_text: Y la persona que se vuelva a los médiums y a los espiritistas[a], para prostituirse tras ellos[b], yo pondré mi rostro contra esa persona y la eliminaré[c] de entre su pueblo.
