revisions:
- from: 'Y sucedió que, después de haberlo sepultado, dijo a sus hijos: «Cuando yo muera, sepúltenme en el sepulcro donde está sepultado el hombre de Dios; pongan mis huesos junto a los huesos de él».'
  to: 'Y sucedió que, después de haberlo sepultado, dijo a sus hijos: «Cuando yo muera, sepúltenme en el sepulcro donde está sepultado el hombre de Dios; pongan mis huesos junto a sus huesos».'
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y reflejar mejor la decisión léxica documentada: se reemplaza ''junto a los huesos de él'' por ''junto a sus huesos'', que es idiomático y claro en contexto. Además, la revisión presupone que la nota editorial/lexical sobre בָּנָיו debe ajustarse para no diluir la especificidad masculina del hebreo, aunque el texto principal ''sus hijos'' puede permanecer.'
