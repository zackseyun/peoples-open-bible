translation:
  language: es
  text: Y sucedió[a] que, cuando Jehú estaba ejecutando juicio contra la casa de Acab, halló a los oficiales de Judá y a los hijos de los hermanos de Ocozías, sirviendo a Ocozías[b], y los mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando Jehú estaba juzgando la casa de Acab».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hijos de los hermanos de Ocozías»; es decir, los sobrinos de Ocozías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יְהִ֕י
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se vierte con una expresión natural en español que conserve la continuidad del relato sin sonar excesivamente coloquial. 'Aconteció' mantiene un registro bíblico sobrio y fiel a la función discursiva del hebreo.
- source_word: כְּ/הִשָּׁפֵ֥ט
  english_pob_choice: was executing judgment
  chosen_spanish: estaba ejecutando juicio
  alternatives_spanish:
  - estaba juzgando
  - estaba aplicando juicio
  - estaba ejerciendo juicio
  lexicon: HALOT
  rationale: Se preserva el matiz judicial/forense del verbo, como en la elección inglesa. 'Ejecutando juicio' suena algo más marcado en español, pero refleja mejor la acción punitiva y judicial del contexto que un simple 'juzgando'.
- source_word: עִם בֵּית אַחְאָב
  english_pob_choice: on the house of Ahab
  chosen_spanish: sobre la casa de Acab
  alternatives_spanish:
  - contra la casa de Acab
  - sobre la casa de Ajab
  - contra la dinastía de Acab
  lexicon: HALOT
  rationale: '''Casa de Acab'' conserva el idiomatismo dinástico. Se usa ''sobre'' para seguir la línea inglesa de acción judicial dirigida hacia ese grupo; ''contra'' sería posible, pero añade un matiz más explícitamente hostil que el hebreo permite sin imponerlo.'
- source_word: שָׂרֵ֨י יְהוּדָ֜ה
  english_pob_choice: the officials of Judah
  chosen_spanish: los oficiales de Judá
  alternatives_spanish:
  - los príncipes de Judá
  - los líderes de Judá
  - los jefes de Judá
  lexicon: HALOT
  rationale: '''שָׂרִים'' puede abarcar autoridades, jefes u oficiales. ''Oficiales'' encaja con el entorno cortesano-político y evita estrechar indebidamente el grupo como ''príncipes''.'
- source_word: וּ/בְנֵ֨י אֲחֵ֧י אֲחַזְיָ֛הוּ
  english_pob_choice: the sons of Ahaziah’s brothers
  chosen_spanish: los hijos de los hermanos de Ocozías
  alternatives_spanish:
  - los sobrinos de Ocozías
  - los hijos de los hermanos de Acazías
  lexicon: HALOT
  rationale: Se mantiene la relación genealógica explícita del hebreo en lugar de sustituirla por el equivalente idiomático 'sobrinos'. Eso preserva la auditabilidad textual y evita perder la forma original de la expresión.
- source_word: מְשָׁרְתִ֥ים
  english_pob_choice: serving
  chosen_spanish: sirviendo
  alternatives_spanish:
  - prestando servicio
  - atendiendo
  - ministrando
  lexicon: HALOT
  rationale: El participio presenta una acción en curso. 'Sirviendo' es natural en español y suficientemente amplio para un servicio de corte o asistencia, sin introducir connotaciones cultuales innecesarias.
- source_word: לַ/אֲחַזְיָ֖הוּ
  english_pob_choice: Ahaziah
  chosen_spanish: a Ocozías
  alternatives_spanish:
  - a Acazías
  - para Ocozías
  - en favor de Ocozías
  lexicon: HALOT
  rationale: Se sigue la forma española tradicional del nombre bíblico 'Ocozías', común y reconocible para lectores de iglesia en español. El lamed se expresa de manera natural con 'a' en el contexto de servicio.
- source_word: וַ/יַּהַרְגֵֽ/ם
  english_pob_choice: and he killed them
  chosen_spanish: y los mató
  alternatives_spanish:
  - y los asesinó
  - y los hirió de muerte
  - y los dio muerte
  lexicon: HALOT
  rationale: El verbo הרג se rinde con el verbo directo 'matar', sin suavizar ni intensificar. 'Los mató' conserva la crudeza factual del hebreo y la simplicidad de la auditable English POB.
theological_decisions:
- issue: Valor judicial de la acción de Jehú
  english_pob_reading: Render שׁפט with judicial force as 'executing judgment' without expanding into explicit divine endorsement.
  chosen_spanish_reading: 'Traducir con fuerza judicial: ''estaba ejecutando juicio'', sin añadir una declaración explícita de aprobación divina.'
  alternative_spanish_readings:
  - estaba juzgando
  - estaba castigando
  - estaba haciendo justicia contra
  rationale: El hebreo presenta la acción en términos judiciales, pero el versículo no explicita aquí una evaluación teológica completa de cada muerte. La traducción conserva el lenguaje forense sin convertirlo en una glosa doctrinal.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que eliminó 'who were' antes de 'serving Ahaziah' para una redacción más directa. En español se refleja esa misma concisión con 'sirviendo a Ocozías'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conservó 'casa de Acab' como idiomático dinástico, en paralelo con el inglés auditado.
  - Se usó 'Ocozías' por consistencia con el nombre bíblico en español eclesial ampliamente reconocido.
  - No se expandió 'hijos de los hermanos' a 'sobrinos' en el cuerpo para preservar la forma hebrea y su trazabilidad.
