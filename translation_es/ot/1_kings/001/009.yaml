translation:
  language: es
  text: Adonías sacrificó ovejas, ganado y animales cebados[a] junto a la piedra de Zohelet[b], que está al lado de En-rogel, e invitó[c] a todos sus hermanos, los hijos del rey, y a todos los hombres de Judá[d], los siervos del rey[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ganado cebado» o «ganado estabulado para engorde».
    reason: lexical_alternative
  - marker: b
    text: Zohelet es un topónimo; su significado exacto es incierto.
    reason: cultural_note
  - marker: c
    text: O «llamó» o «convocó».
    reason: lexical_alternative
  - marker: d
    text: O «la gente de Judá», aunque el hebreo dice «los hombres de Judá».
    reason: lexical_alternative
  - marker: e
    text: «Los siervos del rey» puede referirse a sirvientes o funcionarios de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - inmoló
  - mató en sacrificio
  lexicon: HALOT
  rationale: זבח en este contexto no es solo degollar, sino realizar un acto sacrificial. «Sacrificó» conserva el valor cultual y narrativo sin añadir explicaciones ajenas al texto.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - animales del rebaño
  lexicon: HALOT
  rationale: El hebreo puede abarcar ganado menor en general, pero en una lista sacrificial el español natural y fiel es «ovejas». Mantiene una representación concreta y clara del conjunto.
- source_word: בָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bueyes
  - vacunos
  lexicon: HALOT
  rationale: El término es colectivo y amplio para bovinos. «Ganado» refleja mejor el sentido genérico que «bueyes», que sería más estrecho.
- source_word: מְרִיא
  english_pob_choice: fattened animals
  chosen_spanish: animales engordados
  alternatives_spanish:
  - ganado engordado
  - animales cebados
  lexicon: HALOT
  rationale: La revisión inglesa corrigió «calves» a un término más amplio. En español, «animales engordados» comunica ese alcance sin restringirlo indebidamente a terneros.
- source_word: עִם אֶבֶן הַזֹּחֶלֶת
  english_pob_choice: by the stone of Zoheleth
  chosen_spanish: junto a la piedra de Zohelet[a]
  alternatives_spanish:
  - al lado de la piedra de Zohelet
  - cerca de la piedra de Zohelet
  lexicon: HALOT
  rationale: Es un topónimo, no un sustantivo común. Se translitera para preservar el nombre propio y la incertidumbre semántica del término, con una nota explicativa.
- source_word: עֵין רֹגֵל
  english_pob_choice: En-rogel
  chosen_spanish: En-rogel
  alternatives_spanish:
  - la fuente de Rogel
  lexicon: HALOT
  rationale: Se conserva la transliteración porque es un nombre geográfico fijo. Traducirlo podría ocultar que se trata de un lugar identificable.
- source_word: וַיִּקְרָא
  english_pob_choice: invited
  chosen_spanish: invitó
  alternatives_spanish:
  - llamó
  - convocó
  - citó
  lexicon: HALOT
  rationale: En el marco de un banquete o reunión política, el verbo apunta a invitar a participar. «Invitó» expresa bien esa acción sin sobreinterpretarla.
- source_word: אֶת כָּל אֶחָיו בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all his brothers, the king’s sons
  chosen_spanish: a todos sus hermanos, los hijos del rey
  alternatives_spanish:
  - a todos sus hermanos, los hijos del rey
  - a todos sus hermanos, es decir, los hijos del rey
  lexicon: HALOT
  rationale: El apposicional hebreo identifica qué hermanos son. Mantener ambas expresiones preserva el énfasis del original y deja claro el contexto real.
- source_word: אַנְשֵׁי יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - la gente de Judá
  - los líderes de Judá
  lexicon: HALOT
  rationale: El plural masculino hebreo es explícito. Se conserva como «los hombres de Judá» para respetar la precisión gramatical y la política de fidelidad al género cuando no hay razón textual para neutralizarlo.
- source_word: עַבְדֵי הַמֶּלֶךְ
  english_pob_choice: the king’s servants
  chosen_spanish: los siervos del rey
  alternatives_spanish:
  - los servidores del rey
  - los oficiales del rey
  - los servidores/siervos del rey
  lexicon: HALOT
  rationale: עבדים puede abarcar servidores o funcionarios de la corte. «Siervos» mantiene el vínculo léxico directo con el hebreo y funciona bien en el registro bíblico; la alternativa «oficiales» sería más interpretativa.
theological_decisions:
- issue: Alcance de אַנְשֵׁי יְהוּדָה
  english_pob_reading: the men of Judah
  chosen_spanish_reading: los hombres de Judá
  alternative_spanish_readings:
  - la gente de Judá
  rationale: El texto hebreo usa un sustantivo masculino plural. Se conserva ese rasgo en español, aunque puede referirse socialmente a un grupo más amplio de asistentes o representantes masculinos.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail inglés, que amplió «fattened calves» a «fattened animals» para reflejar mejor מְרִיא como ganado engordado en sentido amplio. También conserva las decisiones estables del registro: transliteración de los topónimos, lectura locativa de עִם y verbo de invitación para וַיִּקְרָא.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se conserva la transliteración de topónimos para evitar perder la referencia geográfica.
  - Se evita «Cristo» y otros términos no pertinentes al pasaje.
  - El registro es bíblico y sobrio, con puntuación moderna del español.
  - Los corchetes de notas aparecen solo en los lugares anclados en el texto.
