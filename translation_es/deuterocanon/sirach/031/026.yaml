translation:
  language: es
  text: Años de vida están con un hombre prudente; se acostará hasta la mañana[a], y su vida[b] está con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega paralela citada aquí difiere marcadamente del hebreo y dice aproximadamente: «El que quita a su prójimo el sustento lo mata». Esto parece reflejar una forma textual distinta, por lo que el texto principal sigue el testimonio hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: El hebreo dice literalmente «y su vida está con él». También puede traducirse «y su alma está con él», porque נפש puede significar vida, ser o alma según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שנות חיים
  english_pob_choice: Years of life
  chosen_spanish: Años de vida
  alternatives_spanish:
  - Años de vivir
  - Años vividos
  - Larga vida
  lexicon: HALOT
  rationale: Conserva el giro nominal del hebreo sin convertirlo en una paráfrasis interpretativa. En español, "Años de vida" mantiene la estructura y la idea de duración vital.
- source_word: איש נבון
  english_pob_choice: a discerning man
  chosen_spanish: un hombre prudente
  alternatives_spanish:
  - un hombre discernidor
  - un hombre entendido
  - un hombre sabio
  lexicon: HALOT
  rationale: נבון apunta a discernimiento y buen juicio más que a sabiduría genérica; "prudente" comunica bien esa cualidad en español sin forzar un tecnicismo.
- source_word: ילין עד בקר
  english_pob_choice: he will lodge until morning
  chosen_spanish: se acostará hasta la mañana
  alternatives_spanish:
  - permanecerá hasta la mañana
  - pasará la noche hasta la mañana
  - dormirá hasta la mañana
  lexicon: HALOT
  rationale: El verbo indica pasar la noche/pernoctar. "Se acostará hasta la mañana" es natural en español y conserva la imagen nocturna sin sobreespecificar el modo.
- source_word: ונפשו עמו
  english_pob_choice: and his life is with him
  chosen_spanish: y su vida está con él
  alternatives_spanish:
  - y su alma está con él
  - y sigue con vida
  - y su ser está con él
  lexicon: HALOT
  rationale: נפש puede significar vida, ser, alma o aliento según el contexto. Aquí, como en el audit trail inglés, la referencia más natural es a la continuidad de la vida, no a un enunciado doctrinal sobre el alma.
- source_word: φονεύων τὸν πλησίον ὁ ἀφαιρούμενος συμβίωσιν
  english_pob_choice: used as a control witness indicating a major divergence, not followed for the main text
  chosen_spanish: el que quita a su prójimo el medio de vida lo está matando
  alternatives_spanish:
  - el que priva a su prójimo del sustento lo mata
  - quien arrebata a su prójimo los medios de vida es homicida
  lexicon: BDAG
  rationale: La tradición griega citada en el expediente difiere fuertemente del hebreo y funciona aquí como testigo de control. No gobierna el texto principal, pero se documenta como divergencia relevante.
theological_decisions:
- issue: Sentido antropológico de נפש
  english_pob_reading: life/self-presence rather than immaterial 'soul'
  chosen_spanish_reading: vida/presencia vital, no 'alma' en sentido doctrinal
  alternative_spanish_readings:
  - alma
  - ser
  - vida
  rationale: Para no importar una antropología posterior ajena al contexto, se traduce como continuidad vital. Así se preserva la tensión semántica sin imponer un sentido dogmático.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than import doctrinal claims; readable modern English.'
- issue: Divergencia entre el hebreo y la versión griega
  english_pob_reading: main text follows the surviving Hebrew witness
  chosen_spanish_reading: el texto principal sigue el hebreo conservado; el griego queda como testigo divergente
  alternative_spanish_readings:
  - traducir el griego en el texto principal
  - armonizar ambas lecturas en una sola frase
  rationale: En Sirácides, cuando el hebreo sobrevive, se toma como base principal, mientras el griego se mantiene en la documentación crítica. Aquí la discrepancia es sustancial, por lo que no se fusionan lecturas.
  doctrine_reference: 'PHILOSOPHY.md: Sefaria Ben Sira Hebrew is used where it survives; Swete LXX remains in view as Greek source for deuterocanonical books.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que ajustó las opciones léxicas de "understanding" a "discerning" y de "lodge" a una expresión más natural para la noche. La redacción española busca reflejar ese refinamiento sin perder la transparencia frente al hebreo conservado.
  spanish_consistency_notes:
  - Se usa "vida" para נפש en este contexto, evitando "alma" como término doctrinal no requerido.
  - '"Prudente" se elige por naturalidad española y por su cercanía semántica a נבון; no se emplea "sabio" para no ampliar el alcance.'
  - La frase verbal conserva la idea de pernoctar hasta la mañana sin introducir elementos ausentes en el hebreo.
  - Se documenta la discrepancia con el griego, pero el texto principal sigue el testimonio hebreo conservado.
