translation:
  language: es
  text: Yahvé oyó la voz de Israel y entregó a los cananeos en sus manos, y ellos los dedicaron a destrucción, junto con sus ciudades. Por eso aquel lugar fue llamado Horma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Horma» suena al hebreo relacionado con חרם, “dedicar a destrucción” o “poner bajo el anatema”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se conserva como nombre propio divino. En español, 'Yahvé' mantiene la transliteración del nombre revelado sin recurrir a la sustitución por un título.
- source_word: וַיִּשְׁמַע ... בְּקוֹל
  english_pob_choice: heard the voice of
  chosen_spanish: oyó la voz de
  alternatives_spanish:
  - escuchó
  - oyó
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'oyó la voz de'. En español, 'oyó la voz de' reproduce el giro idiomático con naturalidad suficiente y conserva la imagen de una respuesta atenta al clamor de Israel.
- source_word: וַיִּתֵּן אֶת־הַכְּנַעֲנִי
  english_pob_choice: gave the Canaanites over to them
  chosen_spanish: entregó a los cananeos en manos de ellos
  alternatives_spanish:
  - los entregó a ellos
  - los puso en poder de ellos
  lexicon: HALOT
  rationale: נתן con objeto hostil expresa entregar o poner en poder de otro. 'Entregó ... en manos de ellos' refleja bien esa fuerza relacional y bélica. Se opta por el plural colectivo 'los cananeos' siguiendo la revisión inglesa más reciente y el sentido natural del colectivo hebreo.
- source_word: וַיַּחֲרֵם
  english_pob_choice: devoted them and their cities to destruction
  chosen_spanish: los dedicaron a destrucción
  alternatives_spanish:
  - los destruyeron por completo
  - los pusieron bajo el anatema
  lexicon: HALOT
  rationale: חרם conserva el sentido técnico de poner algo bajo ḥerem, irrevocablemente destinado a destrucción. 'Dedicaron a destrucción' mantiene esa tensión entre consagración y exterminio sin suavizarla ni volverla demasiado técnica en el cuerpo del texto.
- source_word: וְאֶת עָרֵי/הֶם
  english_pob_choice: and their cities
  chosen_spanish: junto con sus ciudades
  alternatives_spanish:
  - y sus ciudades
  - y las ciudades de ellos
  lexicon: HALOT
  rationale: '''Junto con sus ciudades'' integra el segundo objeto directo de modo natural en español, sin perder el alcance total de la acción sobre personas y centros urbanos.'
- source_word: וַיִּקְרָא שֵׁם הַמָּקוֹם
  english_pob_choice: So the name of the place was called
  chosen_spanish: el nombre de aquel lugar fue llamado
  alternatives_spanish:
  - se llamó el nombre de aquel lugar
  - llamaron aquel lugar
  lexicon: HALOT
  rationale: El hebreo presenta una formulación de nombramiento con verbo singular e implicación poco explícita del sujeto. La pasiva española preserva esa indeterminación sin atribuir innecesariamente la acción a un agente específico.
- source_word: חָרְמָה
  english_pob_choice: Hormah
  chosen_spanish: Horma
  alternatives_spanish:
  - Horma
  lexicon: HALOT
  rationale: Como topónimo, se translitera. En español se usa 'Horma' para adaptarlo a la ortografía y pronunciación del idioma, preservando la referencia al nombre propio.
theological_decisions:
- issue: Terminología de ḥerem en el lenguaje de guerra
  english_pob_reading: devoted them and their cities to destruction
  chosen_spanish_reading: los dedicaron a destrucción
  alternative_spanish_readings:
  - los destruyeron por completo
  - los pusieron bajo el anatema
  rationale: La frase mantiene la categoría bíblica de ḥerem sin sustituirla por una paráfrasis que borre su carácter técnico ni por un término eclesiástico tradicional que no aparece en el texto. 'Dedicaron a destrucción' conserva la tensión semántica entre consagración irrevocable y eliminación total.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without paraphrase.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al reflejar el sentido colectivo plural de הַכְּנַעֲנִי como 'los cananeos', en lugar de un singular colectivo. También se preservó la nota etimológica sobre Horma/Horma en forma adaptada al español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se mantuvo 'cananeos' en plural por el valor colectivo natural del hebreo y la revisión inglesa posterior.
  - Se conservó la tensión de חרם con 'dedicaron a destrucción' sin sustituirlo por un eufemismo.
  - El topónimo se adaptó a 'Horma' por normalización ortográfica del español, con nota etimológica para mantener el vínculo con el hebreo.
