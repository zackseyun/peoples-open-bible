translation:
  text: Here everyone pushes on to destruction the man guilty of temple robbery[a], or one who has committed some outstanding excess of other evils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrilege.' The Greek term specifically refers to violating or robbing a temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνταῦθα
  chosen: Here
  alternatives:
  - In that place
  - There
  lexicon: LSJ
  rationale: Adverb of place referring to the locale/custom just described; 'Here' is natural English and keeps the immediate deictic force.
- source_word: ἱεροσυλίας
  chosen: temple robbery
  alternatives:
  - sacrilege
  - temple plundering
  lexicon: LSJ
  rationale: The noun denotes robbing or violating a temple. 'Temple robbery' is more concrete and source-near than the broader theological term 'sacrilege,' which could overgeneralize beyond theft/profanation.
- source_word: ἔνοχον
  chosen: guilty
  alternatives:
  - liable
  - answerable
  lexicon: LSJ
  rationale: 'Standard judicial sense: one held guilty or liable for an offense. ''Guilty'' is the clearest idiomatic fit with the genitive of the crime.'
- source_word: ὑπεροχὴν πεποιημένον
  chosen: has committed some outstanding excess
  alternatives:
  - has done some extraordinary wickedness
  - has perpetrated some surpassing crime
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and literally suggests having made a preeminence/excess. In context it describes someone distinguished by especially grave wrongdoing. 'Outstanding excess' preserves the comparative force without paraphrasing too freely.
- source_word: τινων ἄλλων κακῶν
  chosen: of other evils
  alternatives:
  - of certain other crimes
  - of other wicked acts
  lexicon: LSJ
  rationale: κακά can denote evils, wrongs, or crimes. 'Evils' keeps the broader moral sense, while the context still implies serious offenses.
- source_word: ἅπαντες
  chosen: everyone
  alternatives:
  - all
  - all people
  lexicon: LSJ
  rationale: The word is comprehensive. 'Everyone' is idiomatic in English and captures the universal participation of the people in this action.
- source_word: προωθοῦσιν εἰς ὄλεθρον
  chosen: pushes on to destruction
  alternatives:
  - drives to ruin
  - thrusts toward death
  lexicon: LSJ
  rationale: The verb means to push forward or thrust onward; with εἰς ὄλεθρον it conveys forcing someone toward ruin/destruction. 'Pushes on to destruction' preserves the physical metaphor and the severe outcome.
