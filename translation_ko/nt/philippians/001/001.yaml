id: PHP.1.1
reference: Philippians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος καὶ Τιμόθεος δοῦλοι ⸂Χριστοῦ Ἰησοῦ⸃ πᾶσιν τοῖς ἁγίοις ἐν Χριστῷ Ἰησοῦ τοῖς οὖσιν ἐν Φιλίπποις σὺν ἐπισκόποις καὶ διακόνοις·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/001.yaml
  text: 'Paul and Timothy[a], slaves of Messiah Jesus, to all the saints in Messiah Jesus who are in Philippi[c][b], together with the overseers and deacons:'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either way in English; here it is translated as 'Messiah' to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'servants' or 'bondservants.'
    reason: lexical_alternative
  - marker: c
    text: Or 'bishops' for 'overseers.'
    reason: lexical_alternative
translation:
  language: ko
  text: '메시아 예수의 노예[a]인 바울과 디모데가, 빌립보에 있는 메시아 예수 안의 모든 성도와 감독들[b]과 집사들에게 편지합니다:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종」. 헬라어 δοῦλος는 단순한 봉사자가 아니라 주인에게 매인 자를 가리키며, 본문은 그 매임의 신학적 무게를 의도적으로 드러낸다. DOCTRINE.md §1에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「주교」. 헬라어 ἐπίσκοπος는 「감독하는 자」를 뜻하며, 후대의 교계 직제 의미를 피하기 위해 「감독」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: 헬라어 δοῦλος는 매임(bonded status)을 본질로 가지며, DOCTRINE.md는 빌립보서 1:1을 그 매임을 신학적으로 드러내야 할 본보기로 명시한다. 한국어 「종」은 봉사 기능을 시사할 뿐 매임을 약화시키므로, 영어 POB의 「slaves」 결정을 그대로 반영하여 「노예」로 옮긴다.
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: Χριστός는 본래 칭호이며, 빌립보서 인사 정식에서도 칭호의 의미가 살아 있다. 한국 전통 번역의 「그리스도」는 음역으로 굳어져 칭호성이 가려지므로, 영어 POB와 동일하게 「메시아」로 옮겨 칭호를 보존한다.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_korean: 성도
  alternatives_korean:
  - 거룩한 자들
  lexicon: BDAG
  rationale: 「성도」는 바울 서신의 인사 정식에서 가장 자연스럽고 간결한 한국어 등가어이며, 언약 공동체로서의 거룩한 정체성을 그대로 담는다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안의
  alternatives_korean:
  - 메시아 예수 안에 있는
  - 메시아 예수와 연합한
  lexicon: BDAG
  rationale: 처소격(在)의 ἐν을 유지하여 바울의 「그리스도 안에」 정형 표현을 풀어쓰지 않는다. 같은 절 내 반복은 구조적 충실성을 위해 보존한다.
- source_word: τοῖς οὖσιν ἐν Φιλίπποις
  english_pob_choice: who are in Philippi
  chosen_korean: 빌립보에 있는
  alternatives_korean:
  - 빌립보에 거하는
  - 빌립보에 있는 자들
  lexicon: BDAG
  rationale: 분사 구문을 자연스러운 한국어 관형절로 옮기되, 빌립보라는 지명 지시를 명시적으로 유지한다.
- source_word: σὺν
  english_pob_choice: together with
  chosen_korean: 과/와 (아울러)
  alternatives_korean:
  - 함께
  lexicon: BDAG
  rationale: σὺν의 결속·동반의 의미를 한국어 접속조사 「과/와」와 열거 구조로 자연스럽게 표현하되, 「감독들과 집사들에게」로 함께 묶어 동반의 의미를 드러낸다.
- source_word: ἐπισκόποις
  english_pob_choice: overseers
  chosen_korean: 감독
  alternatives_korean:
  - 주교
  lexicon: BDAG
  rationale: 헬라어의 본뜻(감독하는 자)을 그대로 전달하며, 후대 교계 직제의 함의가 강한 「주교」를 피한다.
- source_word: διακόνοις
  english_pob_choice: deacons
  chosen_korean: 집사
  alternatives_korean:
  - 봉사자
  - 일꾼
  lexicon: BDAG
  rationale: 감독과 짝지어 등장하는 교회 직제 문맥에서는 「집사」가 가장 분명한 한국어 등가어이며, 일반적 「봉사」가 아닌 인지된 직무 역할을 가리킨다.
- source_word: πᾶσιν τοῖς ἁγίοις
  english_pob_choice: to all the saints
  chosen_korean: 모든 성도
  alternatives_korean:
  - 모든 거룩한 백성에게
  lexicon: BDAG
  rationale: 헬라어에 없는 단어를 더하지 않고 인사 정식의 간결한 구조를 유지한다.
theological_decisions:
- issue: 빌립보서 인사에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아 예수
  alternative_readings:
  - 그리스도 예수
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 번역하도록 지시한다. 한국 전통 번역은 「그리스도」로 음역해 왔으나, 그렇게 하면 칭호성이 사라지고 본문에 박제된 이름처럼 읽힌다. 빌립보서 인사 정식에서도 칭호의 무게가 그대로 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: 빌립보서 1:1의 δοῦλοι를 매임을 드러내는 강한 어휘로 번역
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 하인
  rationale: DOCTRINE.md는 빌립보서 1:1을 δοῦλος가 매임의 신학적 의미로 읽혀야 할 본보기로 명시한다. 한국 전통의 「종」은 친숙하지만 매임의 무게를 약화시키므로, 본문의 무게를 보존하기 위해 「노예」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
