review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y del English POB: mantiene los singulares distributivos iniciales, preserva ''virgen'', ''niños pequeños'', ''la marca'', la prohibición de acercarse, el comienzo en el santuario y la nota alternativa sobre ''ancianos''. Sin embargo, hay errores de anclaje de notas y varias elecciones de español poco fieles o poco naturales.'
  spanish_quality_summary: La legibilidad necesita mejora. '[a]' está mal colocado al inicio en vez de sobre 'la marca', y '[b]' está mal colocado sobre 'hasta la destrucción' cuando esa nota corresponde a 'los hombres viejos/ancianos'. 'Viejo' y 'hombres viejos' suenan bruscos o poco dignos en español bíblico; 'hombre viejo' y 'hombres viejos' son menos naturales que 'anciano'/'hombres ancianos' o 'hombre de edad'. 'Hasta la destrucción' es poco idiomático; 'por completo' comunica mejor el intensivo. 'Comiencen desde mi santuario' suena calcado; 'comiencen por mi santuario' es más natural y fiel al punto de inicio.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La decisión sobre הַתָּו como 'la marca' con nota sobre 'taw' es correcta. La alternativa 'ancianos' debe quedar en nota; en el texto principal conviene una formulación etaria natural en español. 'Santuario' está bien.
  issues:
  - severity: high
    issue: Marcadores de notas colocados en lugares incorrectos
    rationale: La nota [a] explica הַתָּו ('taw' / la marca) pero está al inicio del versículo; la nota [b] explica 'ancianos' pero está anclada a 'hasta la destrucción'. Esto rompe la trazabilidad exigida por el proyecto.
  - severity: medium
    issue: '''Hasta la destrucción'' es español poco natural para לְמַשְׁחִית'
    rationale: Aunque intenta conservar la fuerza nominal, suena forzado en español. El English POB adoptó 'utterly'; en español 'por completo' o 'hasta exterminarlos' expresa mejor el intensivo sin paráfrasis excesiva.
  - severity: medium
    issue: '''Viejo'' y ''hombres viejos'' tienen registro brusco y poco digno'
    rationale: En español eclesial neutral, 'viejo' aplicado a personas puede sonar despectivo. Se debe conservar la categoría de edad, pero con formulación más natural y digna, por ejemplo 'hombre anciano' / 'hombres ancianos', dejando 'ancianos' como alternativa institucional en nota.
  - severity: low
    issue: '''Comiencen desde mi santuario'' suena calcado'
    rationale: En este contexto de punto inicial de juicio, 'comiencen por mi santuario' o 'empiecen en mi santuario' es mejor español. 'Por' expresa bien el punto de arranque.
