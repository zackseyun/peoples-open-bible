translation:
  language: es
  text: Ellos harán brotar el recuerdo de tu bondad abundante[a], y cantarán con gozo de tu rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la memoria de tu gran bondad».
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia».
    reason: alternative_reading
lexical_decisions:
- source_word: זֵכֶר
  english_pob_choice: the memory
  chosen_spanish: el recuerdo
  alternatives_spanish:
  - la memoria
  - el memorial
  - la mención
  lexicon: HALOT
  rationale: זֵכֶר puede significar recuerdo, memorial o mención. En español, «el recuerdo» conserva el valor nominal y encaja de manera natural con יַבִּיעוּ, que expresa algo que brota o se derrama en palabras.
- source_word: רַב
  english_pob_choice: abundant
  chosen_spanish: gran
  alternatives_spanish:
  - abundante
  - grande
  - mucho
  lexicon: HALOT
  rationale: El adjetivo rַב modifica טוּבְךָ y comunica amplitud o grandeza. Aquí «gran» suena más natural en español con «bondad», sin perder la idea de plenitud o abundancia.
- source_word: טוּבְךָ
  english_pob_choice: your goodness
  chosen_spanish: tu bondad
  alternatives_spanish:
  - tu bondad abundante
  - tu benevolencia
  - tu bien
  lexicon: HALOT
  rationale: טוּב denota bondad, benevolencia o bien. «Bondad» es el equivalente más natural y amplio en español para este contexto de alabanza, y evita restringir el término a un favor material.
- source_word: יַבִּיעוּ
  english_pob_choice: will pour forth
  chosen_spanish: harán brotar
  alternatives_spanish:
  - derramarán
  - expresarán
  - harán fluir
  lexicon: HALOT
  rationale: El hifil de נבע sugiere algo que mana, brota o se derrama. «Harán brotar» conserva la metáfora vívida del original y funciona bien con «el recuerdo» como objeto del verbo.
- source_word: וְצִדְקָתְךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu justicia recta
  - tu rectitud
  - tu justicia y rectitud
  lexicon: HALOT
  rationale: צִדְקָה puede significar justicia o rectitud. Dado que el paralelo inglés preserva la alternativa «justice» y que en español «justicia» comunica con claridad tanto el carácter recto de Dios como sus actos justos, se la adopta como lectura principal, manteniendo la tensión semántica.
- source_word: יְרַנֵּנוּ
  english_pob_choice: they will sing for joy
  chosen_spanish: cantarán con gozo
  alternatives_spanish:
  - clamarán con gozo
  - cantarán jubilosos
  - entonarán con gozo
  lexicon: HALOT
  rationale: El piel de רנן expresa exclamación gozosa o canto jubiloso. «Cantarán con gozo» recoge bien el paralelo poético y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: 'צדקה en contexto de alabanza: justicia/righteousness'
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu rectitud
  - tu justicia y rectitud
  rationale: El hebreo admite una gama que incluye justicia y rectitud. En español, «justicia» es una opción válida y clara, y preserva la fuerza ética y judicial del término sin reducirlo a una sola faceta. La alternativa «rectitud» queda implícitamente disponible por el campo semántico, y se documenta la tensión en vez de resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Preservar tensiones teológicas y semánticas; no aplanar términos disputados de justicia/rectitud.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se detectaron revisiones aplicadas en la fuente. La traducción española sigue la misma estructura poética de dos miembros y mantiene la metáfora de brotar/derramar para יַבִּיעוּ.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH implícito según la convención del proyecto cuando no aparece explícitamente en el versículo.
  - Se usa «justicia» como traducción principal de צדקה en línea con una lectura teológica amplia, sin excluir la alternativa de «rectitud».
  - La sintaxis conserva el paralelismo hebreo y la imagen verbal del primer hemistiquio.
