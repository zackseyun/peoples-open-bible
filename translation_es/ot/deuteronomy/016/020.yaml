translation:
  language: es
  text: Justicia[a], justicia perseguirás[b], para que vivas y poseas la tierra que Yahvé tu Dios te está dando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud, rectitud». El hebreo צֶדֶק puede abarcar ambos campos semánticos; aquí «justicia» encaja mejor con el contexto legal.
    reason: lexical_alternative
  - marker: b
    text: O «heredes la tierra». El verbo puede tener también el sentido de heredar, además de poseer.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק צֶדֶק
  english_pob_choice: Justice, justice
  chosen_spanish: Justicia, justicia
  alternatives_spanish:
  - Rectitud, rectitud
  - Lo justo, lo justo
  lexicon: HALOT
  rationale: El sustantivo duplicado es enfático. En este contexto legal, 'justicia' conserva mejor el sentido judicial y público que 'rectitud', que en español puede sonar más interior o moralizante.
- source_word: תִּרְדֹּף
  english_pob_choice: you shall pursue
  chosen_spanish: perseguirás
  alternatives_spanish:
  - deberás perseguir
  - has de perseguir
  lexicon: HALOT
  rationale: רָדַף significa literalmente 'perseguir'. 'Perseguirás' mantiene la fuerza exhortativa del hebreo en un español natural y formal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Marca propósito. 'Para que' es la forma más clara y natural en español contemporáneo.
- source_word: תִּחְיֶה
  english_pob_choice: you may live
  chosen_spanish: vivas
  alternatives_spanish:
  - puedas vivir
  - vivas plenamente
  lexicon: HALOT
  rationale: El hebreo expresa resultado/cumplimiento bajo el pacto. 'Vivas' mantiene brevedad y evita añadir matices no explícitos en el texto.
- source_word: וְיָרַשְׁתָּ
  english_pob_choice: and possess
  chosen_spanish: y poseas
  alternatives_spanish:
  - y heredes
  - y tomes posesión de
  lexicon: HALOT
  rationale: ירשׁ puede implicar heredar o poseer. Aquí 'poseas' comunica la tenencia efectiva de la tierra sin limitarlo solo al matiz patrimonial de 'heredar'.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Deuteronomio, 'la tierra' es el término del pacto para la tierra prometida. 'Tierra' preserva esa resonancia mejor que 'país'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: 'La construcción posesiva singular se traduce de forma directa y covenantal: ''tu Dios''.'
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te está dando
  alternatives_spanish:
  - te da
  - te da en este momento
  lexicon: HALOT
  rationale: El participio expresa acción en curso o característica. 'Te está dando' conserva esa vivacidad y la relación de don presente con el pacto.
theological_decisions:
- issue: Sentido de צֶדֶק en un contexto judicial
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El contexto inmediato de Deuteronomio 16 trata de jueces e integridad legal; por eso el sentido forense/cívico de 'justicia' es primario. 'Rectitud' no se descarta, pero en español desplaza el foco hacia una cualidad más interior.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el Nombre propio del pacto, conforme a la doctrina del proyecto para el Tetragrámaton, en vez de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail en la evaluación más reciente: no hubo revisiones aplicadas y el control cruzado indicó alta concordancia. Se mantuvo la repetición enfática de צֶדֶק, el matiz resultativo de לְמַעַן, el participio presente de נֹתֵן y la decisión del proyecto de traducir el Nombre divino como Yahvé/Yahvé en español.'
  spanish_consistency_notes:
  - Se conservó la repetición enfática «Justicia, justicia» sin suavizarla.
  - «Te está dando» refleja el participio hebreo נֹתֵן con acción presente/continua.
  - «Poseas» deja abierta la alternativa de «heredar» sin perder el matiz de tenencia efectiva.
  - «Yahvé» mantiene la terminología del proyecto para יְהוָה en todo el texto principal.
