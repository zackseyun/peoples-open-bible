translation:
  language: es
  text: El que trabaja en esto no se enriquecerá[a], y el que desprecia las cosas pequeñas quedará arruinado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «un trabajador borracho no se enriquecerá», haciendo explícito el tipo de trabajador implícito en el hebreo breve «el que trabaja en esto».'
    reason: alternative_reading
  - marker: b
    text: 'El paralelo griego añade la matización «poco a poco» a la cláusula final: «el que desprecia las cosas pequeñas caerá poco a poco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹעֵל
  english_pob_choice: worker / one who works
  chosen_spanish: el que trabaja
  alternatives_spanish:
  - el trabajador
  - quien trabaja
  - el que se ocupa de esto
  lexicon: HALOT
  rationale: El participio hebreo expresa a la persona que realiza la acción. «El que trabaja» conserva esa fuerza verbal y suena natural en español, sin añadir una categoría más fija que el texto no exige.
- source_word: זֹאת
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - esto
  - en esta tarea
  - en tal cosa
  lexicon: HALOT
  rationale: El demostrativo hebreo es elíptico. «En esto» conserva la deixis sin forzar una especificación que el hebreo no desarrolla, y refleja bien la lectura breve del testimonio hebreo.
- source_word: לֹא יַעֲשִׁיר
  english_pob_choice: will not become rich
  chosen_spanish: no se enriquecerá
  alternatives_spanish:
  - no prosperará
  - no llegará a ser rico
  - no crecerá en riqueza
  lexicon: HALOT
  rationale: El verbo en este contexto comunica llegar a tener riqueza. «No se enriquecerá» reproduce de forma natural el valor intransitivo y mantiene el sentido de resultado futuro.
- source_word: וְבוֹזֶה
  english_pob_choice: and one who despises
  chosen_spanish: y el que desprecia
  alternatives_spanish:
  - y el que menosprecia
  - y quien desprecia
  - y el que tiene en poco
  lexicon: HALOT
  rationale: בזה expresa desprecio o tener en poco. «Desprecia» es directo, claro y fiel al tono sapiencial del dicho.
- source_word: מְעוּטִים
  english_pob_choice: small things
  chosen_spanish: las cosas pequeñas
  alternatives_spanish:
  - las cosas insignificantes
  - las cosas pequeñas o insignificantes
  - las cosas menores
  lexicon: HALOT
  rationale: El plural puede referirse a cosas pequeñas o poco importantes. «Las cosas pequeñas» mantiene la amplitud semántica del hebreo y permite que la cláusula abarque tanto lo pequeño en cantidad como lo insignificante en valor.
- source_word: יִתְעַרְעָר
  english_pob_choice: will be ruined
  chosen_spanish: caerá poco a poco
  alternatives_spanish:
  - se derrumbará
  - será arruinado
  - se tambaleará
  lexicon: HALOT
  rationale: La tradición hebrea apunta a ser sacudido o desestabilizado; el paralelo griego añade explícitamente la idea gradual de «poco a poco». En español se preserva esa gradualidad en el texto principal con «caerá poco a poco», sin perder el resultado desfavorable del proverbio.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo como base principal, pero incorpora en nota la explicitación del paralelo griego sobre el tipo de trabajador y la caída gradual. Se evita mecanicismo y se conserva la tersura proverbial del hebreo con apoyo del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el tono sapiencial conciso del proverbio.
  - Se eligió «se enriquecerá» para conservar el valor de resultado futuro del hebreo.
  - Se reflejó en nota la diferencia entre la brevedad hebrea y la explicitación griega del trabajador borracho.
  - Se preservó la idea de gradualidad del cierre con una traducción natural en español y una nota de apoyo al paralelo griego.
