- from: 'Tomad palabras con vosotros y volved a Yahvé. Decidle: «Quita toda iniquidad y recibe lo bueno[a], y nosotros pagaremos con el fruto de nuestros labios[b]».'
  to: 'Lleven palabras con ustedes y vuelvan a Yahvé. Díganle: «Quita toda iniquidad[a] y recibe lo bueno, y pagaremos con los toros de nuestros labios[b]».'
  rationale: 'Se corrige el principal desajuste con la evidencia fuente y la racionalidad documentada: el texto principal debe conservar la metáfora masorética «los toros de nuestros labios» y dejar «el fruto de nuestros labios» en nota. Además, se regulariza el registro al español neutro latinoamericano con formas de «ustedes».'
