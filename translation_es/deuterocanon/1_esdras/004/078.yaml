    issue: '''Escribió para darles'' es poco idiomático en español para ἔγραψε δοῦναι'
    rationale: Aunque refleja formalmente el infinitivo, en español suena torpe y puede sugerir finalidad personal de escribir, no el contenido de una orden escrita. 'Ordenó por escrito darles' o 'escribió que se les diera' comunica mejor la función directiva del griego.
  - severity: medium
    issue: Faltan notas léxicas para κλήρους y ὀψώνια
    rationale: La auditoría inglesa preserva alternativas significativas para ambos términos. Dado que el español también puede generar estrechamiento semántico, conviene mantener notas equivalentes.
  - severity: low
    issue: '''Salario'' en singular estrecha un poco ὀψώνια'
    rationale: ὀψώνια puede denotar paga, pagos o raciones/provisiones. 'Pagos' encaja mejor con el plural griego y conserva amplitud semántica.
  revised_spanish_text: Y a todos los que vigilaban la ciudad, ordenó por escrito darles porciones asignadas[a] y pagos[b].
