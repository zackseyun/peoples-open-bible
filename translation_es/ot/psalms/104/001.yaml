translation:
  language: es
  text: Bendice, alma mía, a Yahvé[a]. Yahvé, mi Dios, eres muy grande; te has vestido de esplendor y majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; aquí y en todo el libro, se traduce como «Yahvé» según la política de traducción.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרֲכִי
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Alaba
  - Bendice tú
  lexicon: HALOT
  rationale: El imperativo dirigido al propio ser interior conserva mejor el valor doxológico de ברך en un contexto de autoexhortación litúrgica. «Bendice» mantiene la fuerza de adoración mejor que «alaba».
- source_word: נַפְשִׁי
  english_pob_choice: O my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - oh alma mía
  lexicon: HALOT
  rationale: El hebreo se dirige al yo interior con tono poético. En español, «alma mía» suena natural y elevado; el vocativo explícito «oh» es posible, pero no necesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto para יהוה es usar «Yahvé» en el texto principal. «SEÑOR» ocultaría el nombre propio y «Jehová» no corresponde al criterio adoptado.
- source_word: יְהוָה אֱלֹהַי
  english_pob_choice: LORD my God
  chosen_spanish: Yahvé, mi Dios
  alternatives_spanish:
  - Yahvé mi Dios
  - oh Yahvé, mi Dios
  lexicon: HALOT
  rationale: La secuencia nominal conserva el nombre divino seguido del posesivo. La coma refleja la dirección vocativa del hebreo sin añadir contenido extra.
- source_word: גָּדַלְתָּ מְּאֹד
  english_pob_choice: you are very great
  chosen_spanish: eres muy grande
  alternatives_spanish:
  - te has hecho muy grande
  - eres grandemente grande
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en este contexto poético funciona con sentido estativo de alabanza. «Eres muy grande» es idiomático y conserva el intensificador מְּאֹד.
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - majestad
  - gloria
  lexicon: HALOT
  rationale: En el marco de vestidura regia, «esplendor» comunica mejor la magnificencia visible que «honor» o «gloria».
- source_word: וְהָדָר
  english_pob_choice: and majesty
  chosen_spanish: y majestad
  alternatives_spanish:
  - y honor
  - y adorno
  lexicon: HALOT
  rationale: Como par cercano de הוֹד, «majestad» es el complemento español más natural para expresar grandeza regia.
- source_word: לָבָשְׁתָּ
  english_pob_choice: you have clothed yourself with
  chosen_spanish: te has vestido de
  alternatives_spanish:
  - te has revestido de
  - has vestido
  lexicon: HALOT
  rationale: El verbo «vestirse» permite en español conservar la metáfora de llevar cualidades como ropa. «Te has vestido de» reproduce el valor reflexivo implícito en el contexto.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de manera explícita; el proyecto español sigue la convención de traducirlo como «Yahvé» para conservar el nombre pactual en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto en inglés no requirió revisiones textuales: el análisis auditado mantiene el sentido poético y la referencia directa al nombre divino. La versión española sigue esa lectura sin introducir variantes no atestiguadas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה de forma consistente con la política del proyecto.
  - Se prefirió «alma mía» como vocativo poético natural en español.
  - «Esplendor» y «majestad» conservan el paralelismo de magnificencia regia del hebreo.
  - La construcción reflexiva «te has vestido de» respeta la metáfora de vestidura sin forzar un calco literal.
