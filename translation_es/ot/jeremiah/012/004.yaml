  rationale: Se corrige la nota [b], que estaba mal construida, y se ajusta אַחֲרִיתֵנוּ a «nuestro desenlace» para reflejar mejor el matiz de resultado/postrimería que el audit trail inglés quiso preservar con «our latter end». También se suaviza «de todo campo» a «de cada campo» por naturalidad sin perder el sentido distributivo.
