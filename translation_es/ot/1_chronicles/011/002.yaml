base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/002.yaml
  text: Even in times past[a], even before, when Saul was king, you were the one who led Israel out and brought them in; and Yahweh your God said to you, ‘You shall shepherd my people Israel[c][b], and you shall be ruler over my people Israel.’
  footnotes:
  - marker: a
    text: Literally, 'both yesterday and the day before yesterday,' a Hebrew idiom meaning 'formerly' or 'in times past.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'you were the one who led out and brought in Israel,' a Hebrew expression for exercising leadership over the people.
    reason: lexical_alternative
  - marker: c
    text: Or 'leader' or 'prince' for 'ruler'; the Hebrew term is not the usual word for 'king.'
    reason: lexical_alternative
