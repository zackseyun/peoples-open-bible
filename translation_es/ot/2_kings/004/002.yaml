translation:
  language: es
  text: 'Y Eliseo le dijo: «¿Qué haré por ti? Dime, ¿qué tienes en casa?». Y ella respondió: «Tu sierva no tiene nada en casa, excepto una jarra[a] de aceite».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אָסוּךְ designa un pequeño recipiente para aceite; según el contexto puede entenderse como jarra, frasco o vasija pequeña.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיָה אֱלִישָׁע
  english_pob_choice: And Elisha said to her
  chosen_spanish: Y Eliseo le dijo
  alternatives_spanish:
  - Entonces Eliseo le dijo
  - Y Eliseo dijo a ella
  lexicon: WLC + HALOT
  rationale: Se conserva el referente masculino singular y el dativo de dirección con le. En español, 'le dijo' suena natural y fiel al movimiento del hebreo sin sobrecargar la frase.
- source_word: מָה אֶעֱשֶׂה לָּךְ
  english_pob_choice: What shall I do for you?
  chosen_spanish: ¿Qué haré por ti?
  alternatives_spanish:
  - ¿Qué puedo hacer por ti?
  - ¿Qué he de hacer por ti?
  lexicon: HALOT
  rationale: El hebreo expresa una pregunta deliberativa sobre la acción que Eliseo podría realizar en favor de ella. 'Haré' conserva ese matiz de decisión/proyección y suena natural en español.
- source_word: הַגִּידִי לִי
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Te ruego que me digas
  - Declárame
  lexicon: HALOT
  rationale: El imperativo de נגד se vierte con 'Dime' porque comunica claramente la petición directa sin introducir cortesía que no está en el texto.
- source_word: מַה יֶּשׁ לָכִי בַּבָּיִת
  english_pob_choice: what do you have in the house?
  chosen_spanish: ¿qué tienes en casa?
  alternatives_spanish:
  - ¿qué tienes en la casa?
  - ¿qué hay para ti en la casa?
  lexicon: HALOT
  rationale: La construcción existencial con ל posesivo se naturaliza en español con posesión directa. 'En casa' mantiene el ámbito doméstico y evita una literalidad áspera.
- source_word: לְשִׁפְחָתְךָ
  english_pob_choice: Your female servant
  chosen_spanish: Tu sierva
  alternatives_spanish:
  - Tu esclava
  - Tu servidora
  lexicon: HALOT
  rationale: שִׁפְחָה designa a una mujer en condición de servidumbre. 'Sierva' conserva el valor de dependencia y es un término bíblico comprensible en español; 'esclava' sería más fuerte, pero el contexto de deferencia favorece 'sierva' aquí.
- source_word: אֵין ... כֹל
  english_pob_choice: has nothing in the house
  chosen_spanish: no tiene nada en casa
  alternatives_spanish:
  - no tiene absolutamente nada en casa
  - no tiene nada en la casa
  lexicon: HALOT
  rationale: La negación absoluta del hebreo se expresa con 'nada'; no se añade intensificador porque el texto revisado en inglés retiró 'at all' para adherirse más estrechamente al hebreo.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - pero sí
  lexicon: HALOT
  rationale: La cláusula introduce una única excepción; 'excepto' es la forma más clara y sobria en español.
- source_word: אָסוּךְ שָׁמֶן
  english_pob_choice: a jar of oil
  chosen_spanish: una[a] jarra de aceite
  alternatives_spanish:
  - un[a] vasija de aceite
  - un[a] frasco de aceite
  lexicon: HALOT
  rationale: אָסוּךְ es un recipiente pequeño para aceite. 'Jarra' sigue la revisión inglesa hacia un recipiente más natural; la nota aclara que el sentido básico es un pequeño envase/recipiente, sin fijar indebidamente la forma.
theological_decisions:
- issue: Valor de שִׁפְחָה en el discurso humilde de la mujer
  english_pob_reading: Your female servant
  chosen_spanish_reading: Tu sierva
  alternative_spanish_readings:
  - Tu esclava
  - Tu servidora
  rationale: No se impone 'esclava' porque el contexto inmediato es la autodesignación deferente de la mujer ante Eliseo. 'Sierva' preserva la relación de subordinación sin introducir una dureza social mayor de la que el pasaje exige.
  doctrine_reference: Uso bíblico de términos de servidumbre; pragmática del discurso respetuoso.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'flask' por 'jar' y eliminó 'at all' para ajustarse más al hebreo. La propuesta española sigue esa revisión al usar una expresión simple de negación ('no tiene nada') y al optar por 'jarra', con nota explicativa para no fijar indebidamente la forma del recipiente.
  spanish_consistency_notes:
  - Se mantiene 'Eliseo' para el nombre propio y 'Yahvé' no aparece en este versículo.
  - Se usa tratamiento directo con 'tú'/'tu' coherente con el hebreo y con la POB inglesa.
  - '''Sierva'' conserva el matiz de dependencia femenina sin convertirlo automáticamente en ''esclava''.'
  - La nota [a] está anclada en el texto para cumplir la relación entre marcador y comentario.
