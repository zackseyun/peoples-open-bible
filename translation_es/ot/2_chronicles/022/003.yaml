translation:
  language: es
  text: También él anduvo en los caminos de la casa de Acab, porque su madre fue su consejera[a] para obrar mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue su asesora para obrar mal» / «lo aconsejaba en la maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם הוּא
  english_pob_choice: He too
  chosen_spanish: También él
  alternatives_spanish:
  - Él también
  - Él asimismo
  lexicon: HALOT
  rationale: גַּם con el pronombre independiente añade inclusión y énfasis. «También él» conserva ese valor aditivo de forma natural en español.
- source_word: הָלַךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - andaba
  lexicon: HALOT
  rationale: En contextos morales, הלך puede referirse a la conducta de vida. «Anduvo» preserva el modismo bíblico en español y comunica conducta, no solo movimiento físico.
- source_word: בְּדַרְכֵי
  english_pob_choice: in the ways of
  chosen_spanish: en los caminos de
  alternatives_spanish:
  - según los caminos de
  - en la senda de
  lexicon: HALOT
  rationale: El plural constructo expresa un patrón de conducta. «En los caminos de» es fiel al hebreo y idiomático en español bíblico.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la dinastía de Ahab
  - la familia de Ahab
  lexicon: HALOT
  rationale: «Casa de» conserva el sentido dinástico y familiar de בֵּית sin volverlo interpretativo. Se mantiene el nombre propio Ahab por correspondencia bíblica estable.
- source_word: הָיְתָה יֹעַצְתּוֹ
  english_pob_choice: was his counselor
  chosen_spanish: fue su consejera
  alternatives_spanish:
  - era su consejera
  - le aconsejaba
  lexicon: HALOT
  rationale: 'La construcción es nominal: ella «fue su consejera», no meramente que realizó una acción puntual. «Consejera» mantiene el papel asesor y el femenino explícito del sujeto.'
- source_word: לְהַרְשִׁיעַ
  english_pob_choice: to act wickedly
  chosen_spanish: para obrar mal
  alternatives_spanish:
  - para actuar perversamente
  - para hacer lo malo
  lexicon: HALOT
  rationale: El infinitivo Hifil de רשע expresa inducir a la maldad. «Para obrar mal» conserva el valor de conducta moral y suena natural en español sin atenuar el juicio ético.
theological_decisions:
- issue: Juicio moral sobre la conducta del rey bajo influencia materna
  english_pob_reading: Retain the text's explicit statement that his mother counseled him toward wickedness without softening or expanding it.
  chosen_spanish_reading: Mantener la afirmación explícita de que su madre lo aconsejaba para el mal, sin suavizar ni ampliar el juicio moral.
  alternative_spanish_readings:
  - su madre lo animaba a hacer el mal
  - su madre lo guiaba a la maldad
  rationale: El hebreo usa לְהַרְשִׁיעַ, una formulación inequívocamente moral. «Para obrar mal» conserva esa evaluación sin añadir matices psicológicos ajenos al texto.
  doctrine_reference: Principio de primacía del texto original; preservar el juicio moral del pasaje sin paráfrasis expansiva.
translation_notes:
  revision_awareness: El inglés auditado pasó de «in doing wickedly» a «to act wickedly» para una traducción más directa del infinitivo. En español se optó por «para obrar mal», que mantiene la fuerza moral del hebreo y suena natural; no fue necesario reflejar un cambio distinto en la redacción final.
  spanish_consistency_notes:
  - Se mantiene «Ahab» sin adaptar a «Acab» para seguir la forma del dossier fuente y la coherencia interna del registro.
  - «Casa de» se conserva como fórmula dinástica estable, evitando sustituirla por «dinastía» en el texto principal.
  - «Obrar mal» se prefiere a «hacer lo malo» por su tono bíblico y claridad moral en español contemporáneo.
