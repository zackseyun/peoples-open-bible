translation:
  language: es
  text: 'Entonces Elías se acercó a todo el pueblo y dijo[a]: «¿Hasta cuándo van a cojear entre dos ramas? Si Yahvé es Dios, síganlo; pero si Baal, síganlo». Pero el pueblo no le respondió palabra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'titubear entre dos opiniones'. El hebreo, de manera más literal, habla de cojear sobre o entre dos ramas/bifurcaciones, una metáfora de lealtad dividida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se allegó
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia el auditorio; 'se acercó' es natural en español y conserva el gesto confrontativo de Elías.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo allí
  - el pueblo entero
  lexicon: HALOT
  rationale: La expresión colectiva se vierte de forma directa y completa, sin añadir una localización que el hebreo no explicita.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta cuándo van a...?
  lexicon: HALOT
  rationale: La fórmula hebrea es una pregunta de desafío temporal; '¿Hasta cuándo?' es el equivalente idiomático más natural en español.
- source_word: פֹּסְחִים
  english_pob_choice: keep limping
  chosen_spanish: cojear
  alternatives_spanish:
  - ir cojeando
  - titubear
  lexicon: HALOT
  rationale: El participio evoca literalmente la cojera/hobleo; 'cojear' conserva la imagen concreta y evita resolver de entrada el sentido figurado en un término abstracto.
- source_word: עַל שְׁתֵּי הַסְּעִפִּים
  english_pob_choice: between two opinions
  chosen_spanish: entre dos ramas
  alternatives_spanish:
  - entre dos opiniones
  - entre dos bifurcaciones
  lexicon: HALOT
  rationale: Aunque la revisión inglesa optó por 'opinions' para captar la idea, el hebreo habla de 'ramas/forks' de manera más literal. En español conviene mantener la metáfora visible para no borrar la tensión léxica del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: POB doctrinal default
  rationale: Se sigue el estándar del proyecto para el Nombre divino, preservando la forma auditada 'Yahvé' en el texto principal.
- source_word: לְכוּ אַחֲרָיו
  english_pob_choice: follow him
  chosen_spanish: síganlo
  alternatives_spanish:
  - vayan tras él
  - sigan detrás de él
  lexicon: HALOT
  rationale: El hebreo idiomático implica lealtad y seguimiento; 'síganlo' comunica esa idea con naturalidad en español.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Es un nombre propio divino y se conserva sin artículo en español para mantener el uso estándar y la fluidez.
- source_word: וְלֹא עָנוּ הָעָם אֹתוֹ דָּבָר
  english_pob_choice: But the people did not answer him a word
  chosen_spanish: Pero el pueblo no le respondió palabra
  alternatives_spanish:
  - Y el pueblo no le respondió palabra
  - pero el pueblo no contestó una palabra
  lexicon: HALOT
  rationale: La locución hebrea expresa silencio total; esta versión lo reproduce de manera idiomática y breve en español.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión confesional y auditable del proyecto de no ocultar el Nombre con una sustitución litúrgica genérica. 'Yahvé' es la forma establecida en el español POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de lealtad dividida en פֹּסְחִים עַל שְׁתֵּי הַסְּעִפִּים
  english_pob_reading: keep limping between two opinions
  chosen_spanish_reading: cojear entre dos ramas
  alternative_spanish_readings:
  - titubear entre dos opiniones
  - cojear entre dos opiniones
  rationale: Se conserva la metáfora corporal del verbo y la imagen concreta de las 'ramas/bifurcaciones' del hebreo, evitando cerrar demasiado pronto el sentido interpretativo de la frase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'branches' por 'opinions' en la traducción auditada para captar mejor el sentido idiomático; esta propuesta española decide conservar la metáfora hebrea visible en el texto principal y dejar la lectura interpretativa como nota alternativa, manteniendo la trazabilidad del desacuerdo lexical.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según el estándar del proyecto para יְהוָה.
  - Se preservó el tono profético directo en segunda persona plural con 'van a cojear' / 'síganlo' implícito en el imperativo español.
  - Se mantuvo 'Baal' como nombre propio sin artículo para evitar una forma menos natural en español.
  - La nota al pie queda anclada en '[a]' dentro del texto para cumplir la validación y no hay pies sin ancla.
