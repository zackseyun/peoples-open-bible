  text: γυνὴ ἐν ἡσυχίᾳ μανθανέτω ἐν πάσῃ ὑποταγῇ·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/011.yaml
  text: A woman must learn in quietness[b][a], in all submission.
  footnotes:
  - marker: a
    text: Or 'wife,' depending on context; the Greek word can mean either 'woman' or 'wife.'
    reason: alternative_reading
  - marker: b
    text: Or 'in silence'; the Greek term can also mean 'quietness' or 'calmness,' not necessarily absolute muteness.
    reason: lexical_alternative
translation:
  language: ko
  text: 여자[a]는 조용한 가운데[b] 온전히 순종함으로 배워야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아내」. 헬라어 γυνή는 문맥에 따라 「여자」 또는 「아내」를 가리킬 수 있다.
    reason: alternative_reading
  - marker: b
    text: 또는 「침묵 가운데」. 헬라어 ἡσυχία는 절대적 무언이 아니라 「고요함·차분함」의 어감도 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ
  english_pob_choice: A woman
  chosen_korean: 여자
  alternatives_korean:
  - 아내
  - 여인
  lexicon: BDAG
  rationale: γυνή는 「여자」 또는 「아내」 두 의미가 가능. 본 문맥은 회중 안의 가르침 문제이므로 일반적 「여자」를 본문에 둔다.
- source_word: ἐν ἡσυχίᾳ
  english_pob_choice: in quietness
  chosen_korean: 조용한 가운데
  alternatives_korean:
  - 침묵 가운데
  - 고요한 자세로
  lexicon: BDAG
  rationale: ἡσυχία는 「조용·차분」의 어감이며 절대 침묵이 아니다. 「조용한 가운데」가 그 폭을 보존한다.
- source_word: μανθανέτω
  english_pob_choice: must learn
  chosen_korean: 배워야 합니다
  alternatives_korean:
  - 배우라
  - 배우게 하라
  lexicon: BDAG
  rationale: 3인칭 명령법을 합쇼체로 「~해야 합니다」로 옮긴다.
- source_word: ἐν πάσῃ ὑποταγῇ
  english_pob_choice: in all submission
  chosen_korean: 온전히 순종함으로
  alternatives_korean:
  - 모든 복종 가운데
  - 온전한 굴복으로
  lexicon: BDAG
  rationale: ὑποταγή의 「순종·복종」을 「순종」으로, πᾶσα를 「온전히」로 옮긴다.
theological_decisions:
- issue: 2:11 - 여자의 배움과 「조용함·순종」
  chosen_reading: 여자는 조용한 가운데 온전히 순종함으로 배워야 합니다.
  alternative_readings:
  - 여자는 침묵 가운데 모든 복종으로 배우라.
  - 아내는 조용히, 온전히 순종하며 배워야 합니다.
  rationale: 본 구절은 본 번역의 북극성(저자의 의도·본문의 강력한 의미를 그대로)에 따라 약화하거나 강화하지 않고 옮긴다. 헬라어 ἡσυχία는 「조용함」이며 절대 침묵이 아니다(13절·동일 어휘는 8절 διαλογισμός 문맥에서도 회중 질서). ὑποταγή는 「순종·복종」이며 πᾶσα는 「온전히」로 강조된다. γυνή가 「여자/아내」 둘 다 가능한 모호성은 각주에 보존한다. 본문이 가르치는 회중 질서의 무게를 그대로 전달하되, 한 가지 해석으로 좁히지 않는다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not soften or sharpen; original-language primacy'
