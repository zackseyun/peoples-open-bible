translation:
  language: es
  text: No nos desatiendas[a], nuestro Dios, no sea que las naciones nos traguen, como si no hubiera nadie que redima[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No nos pases por alto» o «No nos ignores».
    reason: lexical_alternative
  - marker: b
    text: O «como si no hubiera un redentor» o «como si no hubiera quien nos redima».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ὑπερίδῃς
  english_pob_choice: Do not overlook
  chosen_spanish: No nos pases por alto
  alternatives_spanish:
  - No nos ignores
  - No nos desprecies
  - No nos desatiendas
  lexicon: LSJ
  rationale: El verbo expresa pasar por encima con la mirada o dejar de tomar en cuenta. «Pasar por alto» comunica bien la idea de no atendernos ni ignorarnos, sin endurecer innecesariamente el tono.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: Gramática griega
  rationale: Objeto directo de la súplica; en español el clítico plural mantiene naturalidad y concisión.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - oh Dios nuestro
  - Dios nuestro
  lexicon: Gramática griega
  rationale: La fuerza vocativa está en el contexto orante. «Nuestro Dios» preserva esa dirección relacional y suena natural en español bíblico contemporáneo.
- source_word: ἵνα μὴ
  english_pob_choice: lest
  chosen_spanish: para que ... no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: Gramática griega
  rationale: En español, «para que no» expresa de manera clara el resultado temido sin forzar un giro arcaico. Conserva la finalidad negativa implícita del griego.
- source_word: καταπίωσιν
  english_pob_choice: swallow us up
  chosen_spanish: nos devoren
  alternatives_spanish:
  - nos traguen
  - nos consuman
  lexicon: LSJ
  rationale: La imagen es corporal y violenta; «devorar» conserva mejor la fuerza metafórica que opciones más abstractas. En español, «nos devoren» fluye con naturalidad en una advertencia de peligro.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: En este contexto judío, el término alude a las potencias extranjeras. El artículo definido refleja mejor el valor colectivo y contextual que un genérico sin artículo.
- source_word: ὡς μὴ ὄντος λυτρουμένου
  english_pob_choice: as though there were no one to redeem
  chosen_spanish: como si no hubiera nadie que redima
  alternatives_spanish:
  - como si no hubiera redentor
  - como si no hubiera quien nos redima
  lexicon: LSJ
  rationale: La forma participial sugiere la ausencia de un agente redentor. «Nadie que redima» conserva el matiz verbal y evita convertir prematuramente la expresión en un título nominal.
theological_decisions:
- issue: λ υτρουμένου como acción o título
  english_pob_reading: to redeem / no one to redeem
  chosen_spanish_reading: nadie que redima
  alternative_spanish_readings:
  - redentor
  - nadie que nos libere
  rationale: La fuente griega presenta una forma participial, no un título formal. Mantener un giro verbal preserva la tensión entre redención y liberación sin imponer una identificación doctrinal más específica de la que el texto ofrece.
  doctrine_reference: Preservar la tensión lexical y no resolverla hacia un título cristológico o una formulación dogmática posterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente en el tramo final, que recupera la fuerza participial de λυτρουμένου. En español se refleja con una construcción verbal («nadie que redima») para evitar convertir el participio en un sustantivo rígido y mantener la naturalidad sintáctica.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene «naciones» con artículo definido para ἔθνη, por el valor colectivo contextual.
  - Se evita «SEÑOR» porque el texto griego no contiene el tetragrámaton ni κύριος aquí.
  - Se conserva la imagen fuerte de destrucción con «devoren», sin suavizarla a un verbo abstracto.
