translation:
  language: es
  text: Y fueron reunidos los hijos de los cantores, de la comarca alrededor de Jerusalén y de los asentamientos de los netofatitas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura alrededor de Jerusalén». El hebreo כִּכָּר puede denotar una llanura, un círculo o un distrito, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «las aldeas de los netofatitas». El hebreo חַצְרֵי suele referirse a pequeños asentamientos o aldeas sin murallas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: were gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se juntaron
  lexicon: HALOT
  rationale: El nifal de אסף expresa una reunión efectiva sin precisar si fue activa o pasiva. «Se reunieron» conserva esa neutralidad y suena natural en español; «fueron reunidos» podría sugerir más fuertemente intervención externa.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - miembros de
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «hijos de». En español bíblico, «hijos de» es una equivalencia fiel y entendible; «miembros de» aclararía el grupo, pero se aleja del sintagma fuente.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores que cantaban
  - los músicos
  lexicon: HALOT
  rationale: El participio sustantivado designa a quienes cantan. «Cantores» preserva el valor funcional del término y evita ampliar indebidamente a «músicos» en general.
- source_word: הַכִּכָּר סְבִיבוֹת יְרוּשָׁלִַם
  english_pob_choice: the district around Jerusalem
  chosen_spanish: la comarca alrededor de Jerusalén
  alternatives_spanish:
  - la llanura alrededor de Jerusalén
  - el distrito alrededor de Jerusalén
  lexicon: HALOT
  rationale: כִּכָּר puede señalar una región circular, llanura o distrito. «Comarca» comunica bien una zona circundante amplia sin fijar indebidamente la topografía; mantiene la tensión entre «llanura» y «distrito» reflejada en la nota inglesa.
- source_word: חַצְרֵי
  english_pob_choice: the settlements of
  chosen_spanish: las aldeas de
  alternatives_spanish:
  - los poblados de
  - los villorrios de
  lexicon: HALOT
  rationale: En contexto geográfico, חַצְרֵי se refiere a asentamientos pequeños y no amurallados. «Aldeas» expresa esa idea de forma natural en español; «poblados» es posible, pero menos concreta.
- source_word: נְטֹפָתִי
  english_pob_choice: the Netophathites
  chosen_spanish: los netofatitas
  alternatives_spanish:
  - los habitantes de Netofá
  - los de Netofá
  lexicon: HALOT
  rationale: El gentilicio señala al grupo asociado con Netofá. «Netofatitas» conserva el matiz étnico/geográfico del hebreo y sigue el mismo tipo de designación que en la solución inglesa.
translation_notes:
  revision_awareness: 'La versión sigue de cerca la lectura inglesa auditada y mantiene las dos ambigüedades léxicas documentadas: כִּכָּר y חַצְרֵי. No se introdujeron cambios textuales respecto del sentido base confirmado por la revisión más reciente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni un sustituto reverencial.
  - Se usa «cantores» para el oficio, no «músicos», para no ampliar el término fuente.
  - «Netofatitas» conserva el gentilicio y armoniza con el patrón de nombres de pueblos en español bíblico.
  - Las notas al pie preservan las alternativas relevantes sin sobrecargar el texto principal.
