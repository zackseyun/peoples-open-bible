translation:
  language: es
  text: Habla ahora a oídos del pueblo[a], y que cada hombre pida de su vecino, y cada mujer de su vecina, objetos de plata y objetos de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pida prestado». El verbo hebreo significa «pedir» o «solicitar» y no indica por sí mismo que los objetos deban devolverse.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֶּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Diles
  lexicon: HALOT
  rationale: El imperativo piel de דבר pide un mandato directo de comunicación verbal. «Habla» es natural en español y conserva el tono imperativo directo.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - te ruego
  lexicon: HALOT
  rationale: La partícula expresa urgencia o insistencia. En este contexto, «ahora» transmite inmediatez sin introducir una cortesía que no es necesaria en la escena.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: al oído del pueblo
  alternatives_spanish:
  - en presencia del pueblo
  - a los oídos del pueblo
  lexicon: HALOT
  rationale: La imagen hebrea literal alude a los oídos, es decir, a una comunicación audible y pública. «Al oído del pueblo» conserva mejor la metáfora idiomática que una paráfrasis más plana.
- source_word: וְיִשְׁאֲלוּ
  english_pob_choice: and let each man ask
  chosen_spanish: que cada hombre pida
  alternatives_spanish:
  - y que cada hombre solicite
  - y cada hombre pregunte
  lexicon: HALOT
  rationale: שאל significa pedir o solicitar; no implica por sí mismo «prestar» ni devolver. «Pida» mantiene la fuerza del ruego/solicitud y evita introducir la idea de préstamo.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - todo hombre
  lexicon: HALOT
  rationale: El sustantivo singular funciona distributivamente y está en paralelo con «mujer». «Cada hombre» preserva ese paralelo y el matiz de género del hebreo.
- source_word: מֵאֵת רֵעֵהוּ
  english_pob_choice: from his neighbor
  chosen_spanish: de su vecino
  alternatives_spanish:
  - de su compañero
  - de su amigo
  lexicon: HALOT
  rationale: רֵעַ puede significar vecino, compañero o prójimo. «Vecino» funciona bien en español y refleja la relación próxima y comunitaria que el texto presupone.
- source_word: וְאִשָּׁה
  english_pob_choice: and each woman
  chosen_spanish: y cada mujer
  alternatives_spanish:
  - y toda mujer
  lexicon: HALOT
  rationale: Se mantiene el paralelismo distributivo con «cada hombre». La forma explícita evita ambigüedad en español.
- source_word: מֵאֵת רְעוּתָהּ
  english_pob_choice: from her neighbor
  chosen_spanish: de su vecina
  alternatives_spanish:
  - de su compañera
  - de su amiga
  lexicon: HALOT
  rationale: Corresponde al femenino del miembro anterior. «Vecina» conserva la relación recíproca y mantiene la coherencia terminológica con la primera cláusula.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: objetos de plata
  alternatives_spanish:
  - vasos de plata
  - artículos de plata
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos, utensilios o vasijas. «Objetos de plata» conserva esa amplitud sin concretar indebidamente la forma.
- source_word: וּכְלֵי זָהָב
  english_pob_choice: and articles of gold
  chosen_spanish: objetos de oro
  alternatives_spanish:
  - vasos de oro
  - artículos de oro
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior y el mismo alcance semántico amplio de כְּלִי.
theological_decisions:
- issue: Sentido de שאל en el contexto del pedido de bienes a los egipcios
  english_pob_reading: ask
  chosen_spanish_reading: pida
  alternative_spanish_readings:
  - preste
  - pida prestado
  rationale: El hebreo expresa pedir o solicitar, no necesariamente tomar prestado con obligación de devolución. Por eso se evita «prestar» o «pedir prestado» en el texto principal. La traducción conserva la tensión lexical del original.
  doctrine_reference: Principio de primacía del texto original y de no imponer una interpretación no contenida en el verbo hebreo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al reflejar la secuencia imperativa+jussive con «Habla ahora ... y que cada hombre pida ...». También conserva la opción léxica principal de «ask» frente a «borrow», explicitada en nota, sin introducir una interpretación de préstamo no sostenida por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, aunque en este versículo no aparece explícitamente.
  - «Vecino/vecina» mantiene el paralelismo distributivo y la reciprocidad entre hombre y mujer.
  - «Objetos» conserva la amplitud de כְּלִי sin especificar recipientes o joyas.
