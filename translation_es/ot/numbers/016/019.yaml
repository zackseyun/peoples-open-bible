revisions:
- from: Y Coré reunió contra ellos a toda la congregación a la entrada de la tienda del encuentro[a], y la gloria de Yahvé se apareció a toda la congregación.
  to: Y Coré reunió contra ellos a toda la congregación a la entrada de la tienda de reunión[a], y la gloria de Yahvé apareció a toda la congregación.
  rationale: 'Se corrigen dos puntos de estilo y fidelidad idiomática: «apareció» en lugar de «se apareció» para una manifestación visible de «la gloria de Yahvé», y «tienda de reunión» en lugar de «tienda del encuentro» por mayor naturalidad y reconocimiento en español eclesial. No se requieren cambios doctrinales ni de sentido de fondo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Coré reúne a toda la congregación contra Moisés y Aarón, en la entrada de la tienda, y la gloria de Yahvé se manifiesta a toda la congregación. Se preservan correctamente «contra ellos», «toda la congregación» y «Yahvé». Sin embargo, «se apareció» para וַיֵּרָא כְבוֹד יְהוָה suena menos natural en español con sujeto inanimado («la gloria») que el simple «apareció».'
  spanish_quality_summary: El texto es claro y mayormente digno y natural. «La tienda del encuentro» es comprensible, pero en español bíblico más amplio «tienda de reunión» suele ser más natural y reconocible para אֹהֶל מוֹעֵד. Además, «la gloria de Yahvé se apareció» resulta poco idiomático; «apareció» es mejor español y sigue fielmente el valor de manifestación visible.
  glossary_alignment: Buena alineación con la terminología del proyecto en el uso de «Yahvé». «Congregación» también encaja bien para עֵדָה. Recomiendo ajustar «tienda del encuentro» a «tienda de reunión» por naturalidad e inteligibilidad eclesial, sin apartarse del sentido fuente.
  issues:
  - severity: medium
    issue: «la gloria de Yahvé se apareció» es poco natural en español
    rationale: Aunque el nifal de ראה expresa manifestación visible, en español con sujeto como «la gloria» la forma simple «apareció» es más idiomática y fiel que «se apareció», que suele usarse con sujetos personales.
  - severity: low
    issue: «la tienda del encuentro» suena menos establecido que «la tienda de reunión»
    rationale: Ambas opciones pueden defenderse para אֹהֶל מוֹעֵד, pero «tienda de reunión» es más natural y reconocible en español bíblico general, manteniendo el valor de lugar designado de encuentro.
  revised_spanish_text: Y Coré reunió contra ellos a toda la congregación a la entrada de la tienda de reunión[a], y la gloria de Yahvé apareció a toda la congregación.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
  revision_rationale: 'Se corrigen dos puntos de estilo y fidelidad idiomática: «apareció» en lugar de «se apareció» para una manifestación visible de «la gloria de Yahvé», y «tienda de reunión» en lugar de «tienda del encuentro» por mayor naturalidad y reconocimiento en español eclesial. No se requieren cambios doctrinales ni de sentido de fondo.'
