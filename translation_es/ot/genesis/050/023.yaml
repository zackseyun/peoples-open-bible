translation:
  language: es
  text: José vio a los hijos de Efraín hasta la tercera generación[a]. También[b], los hijos de Machir, hijo de Manasés, nacieron en las rodillas de José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «José vivió para ver a los hijos de Efraín hasta la tercera generación». El hebreo dice literalmente «José vio».'
    reason: lexical_alternative
  - marker: b
    text: «Nacieron en las rodillas de José» es un modismo hebreo que puede implicar reconocimiento familiar, recepción o aceptación especial de los niños.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - llegó a ver
  - vivió para ver
  lexicon: HALOT
  rationale: El hebreo dice literalmente que José “vio”. En español, “vio” conserva la forma verbal directa y sigue siendo natural; la idea de que vivió lo suficiente para ver a sus descendientes queda implícita, como en el audit trail inglés.
- source_word: לְאֶפְרַיִם
  english_pob_choice: Ephraim’s
  chosen_spanish: de Efraín
  alternatives_spanish:
  - para Efraín
  - pertenecientes a Efraín
  lexicon: HALOT
  rationale: La preposición ל con esta fórmula genealógica expresa relación de pertenencia/descendencia; en español, “de Efraín” comunica de manera natural que se trata de sus descendientes.
- source_word: בְּנֵי שִׁלֵּשִׁים
  english_pob_choice: children to the third generation
  chosen_spanish: los hijos hasta la tercera generación
  alternatives_spanish:
  - la descendencia hasta la tercera generación
  - los hijos de la tercera generación
  lexicon: HALOT
  rationale: La expresión hebrea señala descendientes que alcanzan la tercera generación. “Hasta la tercera generación” conserva el alcance genealógico sin fijar más de lo que el hebreo especifica.
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: Marca una cláusula adicional paralela. “También” es la correspondencia española más natural y mantiene la relación aditiva.
- source_word: בְּנֵי מָכִיר בֶּן מְנַשֶּׁה
  english_pob_choice: the children of Machir son of Manasseh
  chosen_spanish: los hijos de Machir, hijo de Manasés
  alternatives_spanish:
  - los descendientes de Machir, hijo de Manasés
  - los hijos de Machir, hijo de Manasés
  lexicon: HALOT
  rationale: Se mantiene “hijos” para reproducir בְּנֵי y su valor genealógico amplio. “Hijo de Manasés” conserva la aposición identificadora sin forzarla a una paráfrasis más explicativa.
- source_word: יֻלְּדוּ
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron nacidos
  - fueron engendrados
  lexicon: HALOT
  rationale: El pasivo hebreo de ילד se traduce de forma idiomática en español con “nacieron”. Es más natural que una pasiva literal y no añade información ajena al texto.
- source_word: עַל בִּרְכֵּי יוֹסֵף
  english_pob_choice: on Joseph’s knees
  chosen_spanish: sobre las rodillas de José
  alternatives_spanish:
  - en las rodillas de José
  - sobre las piernas de José
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo y la decisión auditada en inglés. “Sobre las rodillas” es transparente en español y permite mantener la posible carga idiomática sin explicitarla en el cuerpo del texto.
theological_decisions:
- issue: El valor de “vio” en un contexto genealógico/longevitativo
  english_pob_reading: Joseph saw Ephraim’s children to the third generation.
  chosen_spanish_reading: José vio a los hijos de Efraín hasta la tercera generación.
  alternative_spanish_readings:
  - José vivió para ver a los hijos de Efraín hasta la tercera generación.
  rationale: El hebreo dice literalmente “vio”; el inglés POB preserva esa literalidad y anota la implicación de longevidad como alternativa. El español principal mantiene la misma tensión sin resolverla por paráfrasis.
  doctrine_reference: Génesis 50:23; nota lexical del POB en inglés
- issue: El idiomático “sobre las rodillas de José” y su posible sentido de reconocimiento familiar
  english_pob_reading: ‘Were born on Joseph’s knees’ is a Hebrew idiom that may imply familial acknowledgment, reception, or special acceptance of the children.
  chosen_spanish_reading: los hijos de Machir, hijo de Manasés, nacieron sobre las rodillas de José.
  alternative_spanish_readings:
  - nacieron en las rodillas de José
  - José los recibió como propios
  rationale: El texto hebreo usa una imagen concreta que el audit trail inglés conserva en el texto principal y explica en nota. El español mantiene la misma literalidad para no borrar la posible fuerza idiomática; la interpretación de reconocimiento/aceptación queda como posibilidad, no como sustitución del dicho.
  doctrine_reference: Génesis 50:23; nota cultural del POB en inglés
translation_notes:
  revision_awareness: 'El audit trail inglés no introdujo revisiones sustantivas: la lectura aprobada permanece sin cambios, con acuerdo alto entre revisiones. Se conservó la literalidad hebrea donde el POB inglés también la preserva, y se mantuvieron las alternativas interpretativas solo en notas.'
  spanish_consistency_notes:
  - Se usa «José» para יוֹסֵף, «Efraín» para אֶפְרַיִם y «Manasés» para מְנַשֶּׁה de forma consistente con el proyecto.
  - Se prefirió «hijos» para בְּנֵי siguiendo el valor genealógico amplio y la decisión inglesa documentada.
  - Se mantuvo «sobre las rodillas» en el texto principal para preservar la imagen idiomática sin suavizarla.
  - Las notas usan el mismo sistema de marcadores a/b y no introducen marcadores adicionales.
