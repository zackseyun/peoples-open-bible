translation:
  language: es
  text: Estos son los reyes que reinaron en la tierra de Edom, antes de que reinara un rey sobre los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que reinara un rey sobre los israelitas». El hebreo dice literalmente: «antes de reinar un rey sobre/para los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La forma presentacional del hebreo introduce una lista o sección; en español, «Estos son» conserva esa función con naturalidad y sin añadir matiz innecesario.
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo y se conserva con «los reyes».
- source_word: אֲשֶׁר מָלְכוּ
  english_pob_choice: who reigned
  chosen_spanish: que reinaron
  alternatives_spanish:
  - que gobernaron
  - que fueron reyes
  lexicon: HALOT
  rationale: El verbo מלך en Qal indica ejercer realeza; «reinaron» es el equivalente más preciso y natural en español.
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tierra de Edom»; «tierra» preserva el alcance territorial del sustantivo original mejor que una forma más breve.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  lexicon: HALOT
  rationale: Aquí el valor es temporal. En español, «antes de que» permite introducir con claridad la cláusula verbal siguiente sin perder el sentido temporal.
- source_word: מְלָךְ מֶלֶךְ
  english_pob_choice: before a king reigned
  chosen_spanish: reinara un rey
  alternatives_spanish:
  - reinara algún rey
  - hubiera reinado un rey
  lexicon: HALOT
  rationale: El hebreo presenta una construcción singular y genérica; «reinara un rey» refleja ese valor sin ampliar indebidamente a «cualquier rey».
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: over the sons of Israel
  chosen_spanish: sobre los hijos de Israel
  alternatives_spanish:
  - sobre los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional «hijos de Israel» por su fidelidad formal y porque el contexto político de reinar justifica «sobre».
theological_decisions:
- issue: Tratamiento de לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel
  rationale: La expresión hebrea es un etnónimo bíblico estándar. «Hijos de Israel» mantiene la forma del original y evita una neutralización que el texto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación semántica de reinar con לִפְנֵי
  english_pob_reading: before a king reigned over the sons of Israel
  chosen_spanish_reading: antes de que reinara un rey sobre los hijos de Israel
  alternative_spanish_readings:
  - antes de que un rey reinara sobre los hijos de Israel
  - antes de un rey sobre los hijos de Israel
  rationale: El sentido temporal del hebreo es claro; se conserva la secuencia histórica sin intensificarla más allá de lo que el texto dice.
  doctrine_reference: Genesis 36:31 audit trail
translation_notes:
  revision_awareness: El texto inglés pasó de «before any king reigned» a «before a king reigned» para ajustarse mejor al singular hebreo y evitar expansión interpretativa. La versión española sigue esa revisión con «antes de que reinara un rey», sin introducir «algún» o «cualquier».
  spanish_consistency_notes:
  - Se usa «Edom» como topónimo fijo y «tierra de Edom» para preservar el matiz territorial.
  - Se mantiene «hijos de Israel» por consistencia con la política de etnónimos del proyecto.
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el Tetragrámaton en este versículo.
  - Se prefirió «reinar» frente a «gobernar» por correspondencia directa con מלך en contexto monárquico.
