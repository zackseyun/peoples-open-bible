translation:
  language: es
  text: No pueden juzgar su propio caso[a], ni pueden rescatar al agraviado, porque son incapaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No pueden decidir su propio juicio, ni pueden librar del agravio». El griego es compacto, y ἀδίκημα puede entenderse como «injusticia/agravio» o, por sentido, como la causa o la persona afectada por esa injusticia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσίν
  english_pob_choice: case
  chosen_spanish: caso
  alternatives_spanish:
  - juicio
  - causa
  - litigio
  lexicon: BDAG
  rationale: El contexto jurídico de κρίσις junto con διακρίνωσιν pide en español una expresión natural que conserve el matiz de asunto o disputa. «Caso» transmite bien la idea de un asunto que debe decidirse sin cargarlo de tecnicismos innecesarios.
- source_word: διακρίνωσιν
  english_pob_choice: judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - decidir
  - discernir
  - adjudicar
  lexicon: BDAG
  rationale: Con κρίσίν, el verbo expresa la acción de resolver o adjudicar el asunto. «Juzgar» mantiene el campo judicial y suena natural en español.
- source_word: ἑαυτῶν
  english_pob_choice: their own
  chosen_spanish: su propio
  alternatives_spanish:
  - de sí mismos
  - para sí mismos
  - propio
  lexicon: BDAG
  rationale: El reflexivo señala que el asunto les pertenece a ellos mismos. «Su propio» reproduce esa referencia de manera clara e idiomática.
- source_word: ῥύσωνται
  english_pob_choice: rescue
  chosen_spanish: rescatar
  alternatives_spanish:
  - librar
  - salvar
  - liberar
  lexicon: BDAG
  rationale: ῥύομαι denota sacar de peligro o de una situación adversa. «Rescatar» conserva esa fuerza concreta sin introducir por sí solo un sentido soteriológico más amplio.
- source_word: ἀδίκημα
  english_pob_choice: one who is wronged
  chosen_spanish: al agraviado
  alternatives_spanish:
  - al injustamente tratado
  - a la víctima de la injusticia
  - al que sufre agravio
  lexicon: BDAG
  rationale: La frase griega es compacta y puede entenderse concretamente como la persona afectada por la injusticia. «Al agraviado» mantiene la referencia al daño sufrido y funciona con naturalidad en español.
- source_word: ἀδύνατοι ὄντες
  english_pob_choice: because they are powerless
  chosen_spanish: porque son impotentes
  alternatives_spanish:
  - porque son incapaces
  - ya que carecen de poder
  - porque son débiles
  lexicon: BDAG
  rationale: El participio causal explica la imposibilidad anterior. «Impotentes» expresa de forma directa la carencia de poder y la polémica contra los ídolos; es un equivalente fuerte y comprensible en español.
theological_decisions:
- issue: Alcance de la incapacidad de los ídolos
  english_pob_reading: The verse is rendered as a statement of practical and judicial impotence, not as a broader metaphysical claim beyond the text.
  chosen_spanish_reading: El versículo se entiende como una afirmación de impotencia práctica y judicial, no como una tesis metafísica más amplia que el texto no expresa.
  alternative_spanish_readings:
  - Los ídolos no pueden ejercer juicio ni salvar.
  - Los ídolos carecen de poder para decidir y rescatar.
  rationale: La construcción griega es muy compacta y la sección del Letter of Jeremiah insiste en que los ídolos no actúan, no juzgan y no salvan. La traducción española debe aclarar esa impotencia sin añadir implicaciones doctrinales ajenas al versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requirieron cambios sustanciales respecto del audit trail inglés. Se preservó la tensión léxica de ἀδίκημα mediante una nota alternativa y se mantuvo el tono jurídico del verso.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Impotentes» traduce el valor causal de ἀδύνατοι ὄντες con un español directo y publicable.
  - «Al agraviado» conserva la ambigüedad entre injusticia como hecho y la persona afectada, tal como lo permite el griego y lo documenta la nota inglesa.
