  yaml_path: translation/ot/exodus/010/003.yaml
  text: 'So Moses and Aaron went in to Pharaoh and said to him[a], “Thus says Yahweh, the God of the Hebrews: How long will you refuse to humble yourself before me? Let my people go[b], so that they may serve me.”'
  footnotes:
