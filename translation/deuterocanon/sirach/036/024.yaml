theological_decisions:
- issue: Gendered wording in a wisdom saying
  chosen_reading: Retain 'woman' and 'man' in the main text.
  alternative_readings:
  - A person's beauty brightens the face, and surpasses every human desire.
  rationale: 'The Greek presents a gendered observation: γυναικός is set in relation to ἀνθρώπου in a context about attraction. Neutralizing both terms would flatten the source''s social and rhetorical shape. This is not a doctrinally contested term, but it is a translation-philosophy decision governed by the project''s gender-accurate principle.'
