    ܘܬܬܦܬܚ ܬܘܒ ܚܙܬܐ

    ܕܚܟܡܬܐ. ܘܬܬܝܗܒ ܠܐܝܠܝܢ

    ܕܗܝܡܢܘ. ܘܬܬܚܕܬ

    ܐܪܥܐ. ܘܗܢܘܢ ܕܐܬܕܒܪܘ

    ܒܗ ܢܬܢܗܪܘܢ. ܘܗܢܘܢ

    ܕܐܬܡܟܘ ܒܗ ܒܣܒܪܐ

    ܕܗܢܐ ܢܩܘܡܘܢ. ܘܗܘܐ

    ܣܘܓܐܐ ܕܢܦ̈ܫܬܐ ܕܐܝ

    ܕܝܐܝܬܝܗܘܢ. ܘܫ̈ܪܝܐ ܕܥ̈ܡܡܐ

    ܘܗܘ. ܕܝܐܝܬܝܗܘܢ ܘܩܫܝܐ

    ܡܢ. ܕܗ̈ܘܝܘ ܟܠܗܝܢ ܕܒܒܠ

    ܘܒܩܘܫܬܐ ܬܒܥܝܢ ܬܘܒ

    ܗܢܘܢ. ܕܐܬܬܣܝܡܘ ܬܘܒ ܡܢ

    ܕܐܒܕܘ ܝܘܡܢܐ ܘܗܘ ܙܒܢܐ

    ܘܗܘ ܚܫܒܘܢܐ ܕܙܒܢܐ.

    ܘܗܘ ܡܬܚܫܒܢܐ ܕܙܒܢܐ

    ܕܝܢ ܡܪܝ. ܗܢܘܢ ܕܒܙܒܢܐ

    ܐܬܝܠܕܘ ܐܝܟܢܐ ܢܥܒܕܘܢ ܐܘ

    ܐܝܠܝܢ ܕܡܩܕܡܝܢ ܢܗܘܘܢ

