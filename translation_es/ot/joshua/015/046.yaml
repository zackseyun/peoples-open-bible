translation:
  language: es
  text: desde Ecrón hacia el oeste[a], todo lo que está junto a Asdod[b], y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el mar», es decir, «hacia el oeste».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al lado de Asdod»; es un modismo espacial que indica proximidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֶקְרוֹן
  english_pob_choice: from Ekron
  chosen_spanish: desde Ecrón
  alternatives_spanish:
  - de Ecrón
  - desde Ecrón en adelante
  lexicon: HALOT
  rationale: El hebreo marca un punto de partida territorial con מִן; en español, «desde» comunica bien ese inicio de delimitación. «Ecrón» conserva el nombre propio transliterado de forma estándar.
- source_word: וָיָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - al oeste
  - hacia el mar
  lexicon: HALOT
  rationale: La expresión direccional ligada a «mar» funciona idiomáticamente como orientación geográfica. En español, «hacia el oeste» expresa la dirección con naturalidad y mantiene el sentido territorial; «hacia el mar» queda como alternativa más literal pero menos explícita para el lector moderno.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La construcción hebrea introduce la totalidad de lo incluido en la delimitación. «Todo lo que» es la forma española más natural y fiel al valor inclusivo.
- source_word: עַל יַד
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  - junto de
  lexicon: HALOT
  rationale: El hebreo usa un modismo espacial que literalmente significa «a la mano de» y aquí denota proximidad o adyacencia. «Junto a» conserva esa cercanía sin sonar mecánico.
- source_word: אַשְׁדּוֹד
  english_pob_choice: Ashdod
  chosen_spanish: Asdod
  alternatives_spanish:
  - Asdod
  - Azdod
  lexicon: HALOT
  rationale: Se adopta la transliteración usual en español bíblico académico, «Asdod», manteniendo el nombre de lugar reconocido.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  - y sus villas
  lexicon: HALOT
  rationale: חָצֵר en estos catálogos territoriales designa dependencias rurales o núcleos menores subordinados. «Aldeas» comunica bien esa realidad en español sin sobrecargar el término.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el expediente inglés auditado: conserva el inicio territorial («desde Ecrón»), resuelve el giro direccional de וָיָמָּה con una equivalencia idiomática natural en español y mantiene la lectura plural de la cláusula relativa («todo lo que está junto a Asdod»), sin perder la nota de proximidad que el inglés documenta en su glosa marginal.'
  spanish_consistency_notes:
  - Se usa «Asdod» como forma española estándar del topónimo.
  - Se evita «SEÑOR» o equivalentes porque no aparece el Tetragrámaton ni un referente divino en este versículo.
  - «Aldeas» traduce el plural posesivo de חַצְרֵיהֶן en contexto de lista territorial.
  - La nota sobre «hacia el mar» preserva la alternativa semántica del hebreo sin imponerla en el texto principal.
