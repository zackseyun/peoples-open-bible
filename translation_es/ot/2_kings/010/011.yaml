revisions:
- from: Así Jehu derribó a todos los que habían quedado de la casa de Acab en Jezreel, y a todos sus grandes[a], a sus íntimos[b] y a sus sacerdotes, hasta no dejarle ningún sobreviviente[c].
  to: Así Jehú mató a todos los que habían quedado de la casa de Acab en Jezreel, y a todos sus principales[a], sus allegados[b] y sus sacerdotes, hasta no dejarle ningún sobreviviente[c].
  rationale: Se corrige «derribó» a «mató» para reflejar claramente la fuerza letal de וַיַּךְ en el contexto. Se reemplaza «sus grandes» por «sus principales» para mejorar la naturalidad del español sin perder la idea de hombres prominentes; la opción «nobles» permanece en nota. Se ajusta «sus íntimos» a «sus allegados» por mayor claridad y neutralidad semántica en español general. Se conserva la ambigüedad del pronombre final con «dejarle», en línea con la evidencia fuente y la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:07Z'
