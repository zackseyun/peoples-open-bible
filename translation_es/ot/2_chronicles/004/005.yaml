translation:
  language: es
  text: Su espesor era de un palmo, y su borde era como el trabajo del borde de una copa, como un lirio en flor. Podía contener tres mil batos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un bato era una antigua unidad hebrea de medida de líquidos.
    reason: cultural_note
  - marker: b
    text: 1 Reyes 7:26 dice que el mar contenía dos mil batos. Aquí Crónicas da tres mil batos, probablemente por la capacidad total frente al volumen normal de uso, o por una diferencia textual/tradicional.
    reason: cross_reference
lexical_decisions:
- source_word: עָבְיוֹ
  english_pob_choice: its thickness
  chosen_spanish: su espesor
  alternatives_spanish:
  - su grosor
  - su anchura
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término describe el grosor de la pieza metálica. «Espesor» conserva la precisión técnica y suena natural en español.
- source_word: טֶפַח
  english_pob_choice: a handbreadth
  chosen_spanish: un codo
  alternatives_spanish:
  - un palmo
  - un palmo de mano
  lexicon: HALOT
  rationale: La unidad hebrea טֶפַח corresponde a una medida pequeña de longitud; en español, «codo» no sería equivalente y «palmo» comunica mejor la medida tradicional. Se mantiene el valor aproximado de medida antigua sin fingir una equivalencia exacta en el texto principal.
- source_word: שְׂפָתוֹ
  english_pob_choice: its rim
  chosen_spanish: su borde
  alternatives_spanish:
  - su labio
  - su orilla
  lexicon: HALOT
  rationale: Para un recipiente grande, «borde» es idiomático y claro en español. «Labio» sería más literal, pero menos natural; «orilla» suena menos adecuado para una vasija.
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: was like the work of
  chosen_spanish: era como el trabajo de
  alternatives_spanish:
  - era como la obra de
  - era como el diseño de
  lexicon: HALOT
  rationale: La construcción comparativa señala forma o factura. «Era como el trabajo de» reproduce la comparación con fidelidad y sin sobreinterpretar.
- source_word: שְׂפַת כּוֹס
  english_pob_choice: the rim of a cup
  chosen_spanish: el borde de una copa
  alternatives_spanish:
  - el borde de un vaso
  - el labio de una copa
  lexicon: HALOT
  rationale: Se mantiene la repetición de «borde» para reflejar el paralelo hebreo con שָׂפָה. «Copa» conserva la imagen de una vasija fina y redondeada.
- source_word: פֶּרַח שׁוֹשַׁנָּה
  english_pob_choice: a lily blossom
  chosen_spanish: un lirio en flor
  alternatives_spanish:
  - una flor de lirio
  - un lirio florecido
  lexicon: HALOT
  rationale: La expresión describe la forma floral del remate. «Un lirio en flor» es natural, visual y conserva el valor imagético sin excesiva paráfrasis.
- source_word: מַחֲזִיק
  english_pob_choice: could hold
  chosen_spanish: podía contener
  alternatives_spanish:
  - podía alojar
  - tenía capacidad para
  lexicon: HALOT
  rationale: El participio expresa capacidad. «Podía contener» comunica la capacidad volumétrica de manera natural en español.
- source_word: בַּתִּים
  english_pob_choice: baths
  chosen_spanish: batos
  alternatives_spanish:
  - medidas de bato
  - baths
  lexicon: HALOT
  rationale: Se translitera la unidad antigua de medida para mantener la transparencia del texto fuente y la coherencia con la práctica POB de conservar unidades hebreas con nota explicativa.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - '3.000'
  lexicon: HALOT
  rationale: Corresponde directamente al numeral cardinal del hebreo y se expresa de forma estándar en español.
- source_word: יָכִיל
  english_pob_choice: It could hold
  chosen_spanish: Podía contener
  alternatives_spanish:
  - Podía albergar
  - Tenía capacidad para
  lexicon: HALOT
  rationale: Refuerza la idea de capacidad de volumen; «podía contener» es idiomático y evita una repetición torpe de «contener» si se leyera junto con la cláusula anterior.
theological_decisions:
- issue: 'Capacidad reportada: tres mil batos frente a la cifra paralela de 1 Reyes 7:26'
  english_pob_reading: Chronicles here gives three thousand baths, likely reflecting either total capacity versus normal working volume, or a textual/tradition difference.
  chosen_spanish_reading: Crónicas aquí da tres mil batos, lo que puede reflejar la capacidad total frente al volumen normal de uso, o una diferencia textual/tradicional.
  alternative_spanish_readings:
  - Crónicas aquí da tres mil batos, quizá por una tradición textual diferente.
  - Crónicas aquí da tres mil batos, posiblemente por capacidad total y no por volumen de trabajo.
  rationale: Se conserva la tensión documental sin resolverla artificialmente. La redacción española mantiene abierta la alternativa entre explicación funcional y variante textual, tal como lo hace el expediente inglés.
  doctrine_reference: Texto paralelo / crítica textual
- issue: Unidad de medida antigua
  english_pob_reading: A bath was an ancient Hebrew unit of liquid measure.
  chosen_spanish_reading: Un bato era una antigua unidad hebrea de medida de líquidos.
  alternative_spanish_readings:
  - Un bato era una antigua medida hebrea de capacidad.
  - Un bato era una unidad hebrea antigua para líquidos.
  rationale: La nota debe explicar la unidad sin sustituirla por una equivalencia moderna incierta. «Bato» preserva la transparencia del término hebreo y la comprensión del lector.
  doctrine_reference: Metrología bíblica
- issue: Imagen ornamental del borde
  english_pob_reading: Its rim was like the work of the rim of a cup, like a lily blossom.
  chosen_spanish_reading: Su borde era como el trabajo del borde de una copa, como un lirio en flor.
  alternative_spanish_readings:
  - Su borde era como la obra del borde de una copa, como un lirio en flor.
  rationale: Se conserva la repetición de «borde» para reflejar el hebreo y el audit trail inglés, que explícitamente retuvo la duplicación de rim. No se suaviza la imagen ornamental.
  doctrine_reference: Fidelidad descriptiva
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «was made like» por «was like» para acercarse más al hebreo y conservar la repetición de «rim». La versión española sigue esa revisión al usar «era como el trabajo del borde de una copa» y al repetir «borde» para reflejar con mayor fidelidad la estructura del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se traduce la unidad de medida antigua con transliteración explicada en nota, para preservar la transparencia del texto fuente.
  - Se conserva la duplicación retórica de «borde» en la cláusula comparativa, siguiendo el expediente inglés y el hebreo.
  - Se usa un español sobrio y publicable, evitando calcos innecesarios pero sin desactivar la imaginería ornamental del pasaje.
