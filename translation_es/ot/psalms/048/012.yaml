  glossary_alignment: No hay conflictos con la terminología clave del proyecto. No aparece el nombre divino en este versículo. 'Sión', 'Judá' y 'juicios' están bien alineados. La metáfora 'hijas de Judá' se conserva correctamente con nota alternativa.
