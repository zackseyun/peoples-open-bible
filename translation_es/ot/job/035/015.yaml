translation:
  language: es
  text: Y ahora[a], porque su ira no ha castigado, y no presta mucha atención a la transgresión[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ahora». El hebreo introduce una transición discursiva con fuerza de enlace temporal.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo es incierto; también puede entenderse como «rebelión», «insolencia» u «ofensa grave».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Entonces ahora
  - Pero ahora
  lexicon: HALOT
  rationale: Mantiene la transición temporal y discursiva del hebreo con una conjunción simple y natural en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Conserva el valor explicativo/causal del hebreo en una forma clara y directa en español.
- source_word: פָּקַד
  english_pob_choice: has not punished
  chosen_spanish: no ha castigado
  alternatives_spanish:
  - no ha visitado
  - no ha atendido
  - no ha ejercido castigo
  lexicon: HALOT
  rationale: En este contexto, el verbo admite el matiz de visita punitiva; 'castigado' comunica bien la acción judicial sin sonar rígidamente literal. Se evita 'visitar' por resultar opaco en español.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  - su nariz
  lexicon: HALOT
  rationale: אַף en este uso idiomático designa ira/enojo. 'Ira' conserva mejor el tono elevado y la fuerza judicial del pasaje.
- source_word: יָדַע
  english_pob_choice: does not greatly heed
  chosen_spanish: no presta mucha atención
  alternatives_spanish:
  - no reconoce
  - no toma en cuenta
  - no conoce
  lexicon: HALOT
  rationale: El hebreo aquí expresa más que conocimiento mental; por eso se traduce con una locución que implica atención o consideración efectiva. 'Presta mucha atención' preserva bien el sentido relacional y evita la ambigüedad de 'conoce'.
- source_word: בַּפַּשׁ
  english_pob_choice: transgression
  chosen_spanish: la transgresión
  alternatives_spanish:
  - la rebelión
  - la insolencia
  - la ofensa grave
  lexicon: HALOT
  rationale: Se mantiene la opción principal del POB en español, porque encaja con el campo semántico jurídico-moral del contexto. La rareza y dificultad del término se deja visible en la nota.
- source_word: מְאֹד
  english_pob_choice: much / greatly
  chosen_spanish: mucha
  alternatives_spanish:
  - mucho
  - en gran manera
  - muy
  lexicon: HALOT
  rationale: Como intensificador de 'presta atención', 'mucha' funciona de forma natural en español y reproduce la idea de gran medida sin forzar la sintaxis.
theological_decisions:
- issue: Cómo reflejar el sentido difícil de פָּקַד sin borrar la tensión lexical
  english_pob_reading: God's anger has not punished / has not visited in anger
  chosen_spanish_reading: su ira no ha castigado
  alternative_spanish_readings:
  - su ira no ha visitado
  - su ira no ha ejercido castigo
  - su ira no ha punido
  rationale: El hebreo permite varios matices; en español, 'castigado' comunica el sentido punitivo sin convertir la cláusula en una paráfrasis excesiva. Se conserva así la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión lexical y no resolverla con un solo matiz doctrinal.
- issue: Cómo traducir la segunda cola sin convertirla en una afirmación fuerte sobre ignorancia divina
  english_pob_reading: he does not greatly heed transgression
  chosen_spanish_reading: no presta mucha atención a la transgresión
  alternative_spanish_readings:
  - no conoce la transgresión
  - no toma en cuenta la transgresión
  - no reconoce la transgresión
  rationale: El hebreo es oscuro y puede sugerir descuido o falta de atención más que ignorancia intelectual. La formulación elegida conserva el juicio reportado del texto sin atribuir a Dios una doctrina de ignorancia o indiferencia.
  doctrine_reference: Preservar la tensión teológica del versículo tal como aparece en el discurso de Eliú.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, evitando un giro demasiado interpretativo en פָּקַד y manteniendo una formulación concisa para יָדַע + מְאֹד. Se conserva además la incertidumbre léxica del segundo hemistiquio mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene «ira» para אַף en coherencia con el uso idiomático de la raíz en contextos de juicio.
  - Se conserva «transgresión» como término jurídico-moral amplio, alineado con el POB inglés y adecuado para el campo semántico del contexto.
  - La puntuación refleja una cláusula causal subordinada seguida de la apódosis, con coma antes de la segunda cola para claridad de lectura.
