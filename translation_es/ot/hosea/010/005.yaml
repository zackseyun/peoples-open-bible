base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/005.yaml
  text: The inhabitants of Samaria tremble for the calves of Beth-aven[a], because its people mourn over it, and its idolatrous priests exult over it, over its glory[c][b], because it has departed from it.
  footnotes:
  - marker: a
    text: Beth-aven is a prophetic, polemical name for Bethel, meaning something like 'house of wickedness' or 'house of vanity.'
    reason: cultural_note
  - marker: b
    text: Or 'its priests rejoice over it'; the Hebrew verb ordinarily means 'rejoice/exult,' but here many understand it ironically or in a lament context.
    reason: lexical_alternative
  - marker: c
    text: Or 'it has gone into exile from it' / 'it has been carried away from it.'
    reason: lexical_alternative
