translation:
  language: es
  text: Y juzgará entre muchos pueblos[a], y arbitrará para naciones poderosas lejanas; y harán de sus espadas rejas de arado[b] y de sus lanzas podaderas. Nación no alzará espada contra nación, ni aprenderán guerra[c] nunca más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y reprenderá» / «y arbitrará» para naciones poderosas lejanas.
    reason: lexical_alternative
  - marker: b
    text: O «cuchillas de arado».
    reason: lexical_alternative
  - marker: c
    text: El hebreo «aprender guerra» también puede significar «entrenarse para la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַט
  english_pob_choice: and he will judge
  chosen_spanish: y juzgará
  alternatives_spanish:
  - y juzgará como juez
  - y gobernará
  lexicon: HALOT
  rationale: שׁפט conserva aquí el matiz judicial de decidir en controversias. «Juzgará» mantiene ese campo semántico en español sin expandirlo indebidamente a «gobernará».
- source_word: בֵּין עַמִּים רַבִּים
  english_pob_choice: between many peoples
  chosen_spanish: entre muchos pueblos
  alternatives_spanish:
  - entre muchas naciones
  - entre numerosos pueblos
  lexicon: HALOT
  rationale: עַמִּים suele referirse a pueblos/grupos étnicos o políticos. «Pueblos» distingue mejor este matiz que «naciones» en español y sigue de cerca בֵּין.
- source_word: וְהוֹכִיחַ
  english_pob_choice: and will arbitrate
  chosen_spanish: y arbitrará
  alternatives_spanish:
  - y reprenderá
  - y decidirá disputas
  - y fallará
  lexicon: HALOT
  rationale: En este contexto forense e internacional, יכח tiene fuerza de resolver o pronunciarse en una disputa. «Arbitrará» conserva esa función de mediación/decisión sin cargar el texto con una reprensión moral que aquí sería menos precisa.
- source_word: לְגוֹיִם עֲצֻמִים עַד רָחוֹק
  english_pob_choice: for strong nations far away
  chosen_spanish: para naciones poderosas lejanas
  alternatives_spanish:
  - para naciones fuertes muy lejanas
  - para naciones poderosas de lejos
  lexicon: HALOT
  rationale: גוֹיִם se traduce naturalmente por «naciones» en este contexto; עֲצֻמִים expresa fuerza/poder, por lo que «poderosas» es idiomático y fiel. «Lejanas» mantiene עַד רָחוֹק sin forzar una construcción más pesada.
- source_word: וְכִתְּת֨וּ
  english_pob_choice: and they will beat
  chosen_spanish: y convertirán
  alternatives_spanish:
  - y golpearán
  - y machacarán
  - y forjarán
  lexicon: HALOT
  rationale: El verbo כִתֵּת sugiere golpear hasta transformar. En español, «convertirán» expresa bien la idea del cambio de armas a herramientas; el golpeo implícito queda en la imagen completa y evita una formulación mecánica.
- source_word: חַרְבֹתֵי/הֶם
  english_pob_choice: their swords
  chosen_spanish: sus espadas
  alternatives_spanish:
  - sus armas
  - sus espadas de guerra
  lexicon: HALOT
  rationale: «Espadas» es la correspondencia directa y mantiene el simbolismo bélico del texto.
- source_word: לְ/אִתִּים
  english_pob_choice: into plowshares
  chosen_spanish: en rejas de arado
  alternatives_spanish:
  - en arados
  - en cuchillas de arado
  lexicon: HALOT
  rationale: אִתִּים designa implementos de arado. En español, «rejas de arado» es una forma clara y precisa; conserva el carácter agrícola sin introducir una equivalencia demasiado general como «arados».
- source_word: וַ/חֲנִיתֹֽתֵי/הֶם
  english_pob_choice: and their spears
  chosen_spanish: y sus lanzas
  alternatives_spanish:
  - y sus picas
  - y sus venablos
  lexicon: HALOT
  rationale: חֲנִיתֹת son armas arrojadizas o de asta; «lanzas» es el equivalente más natural y ampliamente entendido en español.
- source_word: לְ/מַזְמֵר֔וֹת
  english_pob_choice: into pruning hooks
  chosen_spanish: en podaderas
  alternatives_spanish:
  - en tijeras de podar
  - en ganchos de poda
  lexicon: HALOT
  rationale: מַזְמֵרוֹת son herramientas de poda. «Podaderas» es suficientemente preciso y más natural en español bíblico que una expresión demasiado técnica o perifrástica.
- source_word: לֹֽא יִשְׂא֞וּ גּ֤וֹי אֶל גּוֹי֙ חֶ֔רֶב
  english_pob_choice: Nation will not lift up sword against nation
  chosen_spanish: No alzará nación contra nación la espada
  alternatives_spanish:
  - Ninguna nación alzará la espada contra otra nación
  - No tomarán nación contra nación la espada
  lexicon: HALOT
  rationale: נשא חרב es un modismo para empuñar o alzar la espada en hostilidad. La sintaxis española conserva el paralelismo del hebreo y el distributivo singular «nación… nación».
- source_word: וְלֹא יִלְמְד֥וּ/ן ע֖וֹד מִלְחָמָֽה
  english_pob_choice: nor will they learn war anymore
  chosen_spanish: ni aprenderán más la guerra
  alternatives_spanish:
  - ni se entrenarán más para la guerra
  - ni estudiarán más la guerra
  lexicon: HALOT
  rationale: למד מלחמה puede incluir la idea de entrenarse para la guerra. «Aprenderán más la guerra» mantiene de cerca la frase hebrea y deja abierta esa amplitud semántica, como en el inglés POB.
theological_decisions:
- issue: Sujeto singular implícito de los primeros verbos
  english_pob_reading: Retained the singular pronoun 'he' without identifying the referent in the verse itself.
  chosen_spanish_reading: Conservo el sujeto singular implícito mediante los verbos en tercera persona singular («juzgará», «arbitrará») sin nombrar explícitamente al referente.
  alternative_spanish_readings:
  - Yahvé juzgará...
  - Él juzgará...
  - El Mesías juzgará...
  rationale: El hebreo no nombra el sujeto en este versículo. La traducción mantiene esa ambigüedad textual y no introduce una identificación teológica que exceda la línea misma, preservando la tensión contextual.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: El POB inglés pasó de «decide disputes» a «arbitrate» para acercarse más a הוֹכִיחַ sin perder registro formal; en español, «arbitrará» recoge esa revisión y evita sobrerrepresentar la idea como mera reprensión. También se mantuvo la solución distributiva en «nación contra nación» y la imaginería agrícola con equivalentes naturales del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando no aparece explícito el Tetragrámaton en este versículo, sin forzar su inserción.
  - '«Pueblos» y «naciones» se distinguen de acuerdo con el contexto: pueblos en el primer hemistiquio, naciones en el segundo.'
  - Se conserva el paralelismo poético y la progresión verbal del hebreo con un español fluido y publicable.
