  - marker: b
    text: O «la vanguardia», es decir, los hombres armados que iban delante del arca.
    reason: lexical_alternative
  revision_rationale: Se ajustan los imperativos a un español neutral latinoamericano («Avancen», «rodeen») sin cambiar el sentido del hebreo ni la decisión léxica del POB. También se afina la nota [a] para reflejar mejor las alternativas documentadas en la audit trail inglesa, manteniendo «pueblo» como lectura principal.
