    rationale: En Baruc 1:13, dentro de un contexto claramente veterotestamentario de fórmula pactual («κύριος θεὸς ἡμῶν»), la directriz del proyecto exige «Yahvé» en el texto principal, no la convención enmascaradora «Señor». La nota lexical del borrador además justifica una excepción no respaldada por las instrucciones del proyecto.
