translation:
  language: es
  text: 'Vayan ahora, hagan más preparativos, y averigüen y vean el lugar donde esté su pie[a], quién lo ha visto allí; porque me dicen[b]: «él es muy astuto[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘donde esté su pie’, una expresión idiomática para indicar sus andanzas o paradero.
    reason: lexical_alternative
  - marker: b
    text: O, ‘porque él me dijo’; el hebreo no identifica explícitamente al sujeto de ‘dijo’, por lo que la traducción impersonal ‘me dicen’ evita precisarlo.
    reason: alternative_reading
  - marker: c
    text: El hebreo emplea una construcción cognada, literalmente algo como ‘astutamente actúa con astucia’, para intensificar la idea.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכִינוּ עוֹד
  english_pob_choice: make further preparations
  chosen_spanish: hagan más preparativos
  alternatives_spanish:
  - prepárense más
  - hagan preparativos adicionales
  lexicon: HALOT
  rationale: El hebreo en hifil de הכין con עוד expresa intensificación o continuación de la preparación. ‘Hagan más preparativos’ conserva ese sentido de acción adicional sin sonar demasiado técnico en español.
- source_word: וּדְעוּ וּרְאוּ
  english_pob_choice: know and see
  chosen_spanish: averigüen y vean
  alternatives_spanish:
  - sepan y vean
  - investiguen y observen
  lexicon: HALOT
  rationale: La pareja imperativa subraya investigación cuidadosa. ‘Averigüen y vean’ mantiene el doble mandato y su fuerza práctica en español natural.
- source_word: מְקוֹמוֹ
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - su lugar
  - la ubicación
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por ‘the place’ para evitar una literalidad rara, el sufijo posesivo hebreo sigue presente. En español, ‘el lugar’ funciona de manera natural dentro de la expresión idiomática completa, que luego aclara la referencia espacial.
- source_word: אֲשֶׁר תִּהְיֶה רַגְלוֹ
  english_pob_choice: where his foot is
  chosen_spanish: donde estará su pie
  alternatives_spanish:
  - donde pisa
  - donde se encuentre
  - donde ponga el pie
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de ‘su pie’ para no borrar el hebraísmo. ‘Estará’ reproduce con naturalidad el valor del imperfecto y el sentido de ubicación/movimiento.
- source_word: מִי רָאָהוּ שָׁם
  english_pob_choice: who has seen him there
  chosen_spanish: quién lo ha visto allí
  alternatives_spanish:
  - quién lo vio allí
  - quién lo ha observado allí
  lexicon: HALOT
  rationale: La pregunta busca testigos o informantes. ‘Quién lo ha visto allí’ conserva la referencia directa al testimonio sin sobreexplicarla.
- source_word: כִּי אָמַר אֵלַי
  english_pob_choice: for I am told
  chosen_spanish: porque me dicen
  alternatives_spanish:
  - porque me han dicho
  - porque me dijeron
  - porque me fue dicho
  lexicon: HALOT
  rationale: El hebreo no explicita el sujeto de ‘dijo’. Siguiendo el sentido impersonal de la revisión inglesa, ‘me dicen’ evita atribuir un hablante concreto y suena más natural que una pasiva rígida.
- source_word: עָרוֹם יַעְרִם הוּא
  english_pob_choice: He is very cunning
  chosen_spanish: Él es muy astuto
  alternatives_spanish:
  - Él es muy cauto
  - Él actúa con gran astucia
  - Él es muy sagaz
  lexicon: HALOT
  rationale: El hebreo usa un juego cognado para intensificar la idea de astucia/cautela estratégica. ‘Astuto’ refleja bien el juicio suspicaz de Saúl, sin convertirlo en una cualidad positiva de ‘prudencia’.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una formulación más natural para ‘the place’ y ‘I am told’, pero conserva la imagen hebrea del ‘pie’ y la fuerza intensiva de la expresión cognada final. También atiende la ambigüedad del sujeto implícito en כִּי אָמַר אֵלַי sin especificarlo.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantuvo ‘pie’ por fidelidad al hebraísmo, con nota explicativa para evitar que el lector lo tome literalmente de modo rígido.
  - ‘Astuto’ traduce la evaluación suspicaz del hablante sin suavizarla a ‘sagaz’ o ‘prudente’, que en español podrían sonar más neutrales o positivas.
