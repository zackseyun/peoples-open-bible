  - severity: low
    issue: «todo vientre» es fiel pero algo menos idiomático que «todo seno materno» o «cada vientre»
    rationale: No es un error y puede mantenerse por concreción léxica. Dado el principio del proyecto de preservar la imaginería corporal, no requiere cambio obligatorio.
  revised_spanish_text: Porque Yahvé había cerrado por completo todo vientre en la familia de Abimelec a causa de Sara[a], la esposa de Abraham.
  revised_footnotes:
