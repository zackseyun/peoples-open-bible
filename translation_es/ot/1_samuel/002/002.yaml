translation:
  language: es
  text: No hay santo como Yahvé[a]; porque no hay nadie fuera de ti, y no hay roca como nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». Se sigue aquí el criterio del proyecto de traducir el nombre divino יהוה como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is none / there is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No hay ninguno
  lexicon: HALOT
  rationale: El hebreo expresa inexistencia de manera existencial; «No hay» reproduce con naturalidad esa fuerza y permite repetir el paralelismo del versículo.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - santo
  lexicon: HALOT
  rationale: «Santo» es el equivalente normal y teológicamente cargado en español para la cualidad de exclusividad y trascendencia divina aquí afirmada.
- source_word: כַּיהוָה
  english_pob_choice: like Yahweh
  chosen_spanish: como Yahvé
  alternatives_spanish:
  - como el SEÑOR
  - como Yahvé
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige «como». Se conserva «Yahvé» según el criterio del proyecto para יהוה, en vez de ocultarlo con una sustitución litúrgica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la razón del enunciado anterior; «porque» comunica con claridad la relación explicativa en español.
- source_word: בִּלְתֶּךָ
  english_pob_choice: besides you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - además de ti
  - aparte de ti
  - fuera de ti
  lexicon: HALOT
  rationale: La forma expresa exclusión total. «Fuera de ti» conserva bien la idea de que no hay ningún otro aparte de Dios, manteniendo la dirección en segunda persona.
- source_word: צוּר
  english_pob_choice: rock
  chosen_spanish: roca
  alternatives_spanish:
  - peñasco
  - roca
  - refugio
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de fuerza y estabilidad. «Roca» es la opción más fiel y natural en español, sin interpretar prematuramente el símbolo.
- source_word: כֵּאלֹהֵינוּ
  english_pob_choice: like our God
  chosen_spanish: como nuestro Dios
  alternatives_spanish:
  - como nuestro Dios
  - como nuestros dioses
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים puede ser morfológicamente plural, aquí funciona como título singular del Dios de Israel; por eso se traduce «nuestro Dios».
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: 'El texto hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto para el nombre divino, se conserva su forma propia en español: «Yahvé».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El control cruzado en inglés reporta alta concordancia y no registró cambios pendientes; por tanto, la redacción española se alinea con el texto fuente y con las decisiones léxicas y teológicas auditadas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo tripartito del hebreo con tres cláusulas negativas.
  - «Yahvé» se usa de forma consistente para יהוה, según la pauta del proyecto.
  - «Roca» conserva la metáfora sin explicitarla como refugio.
  - No se añadió puntuación o léxico interpretativo que debilitara la fuerza poética del versículo.
