translation:
  language: es
  text: ¿Quién ha cruzado más allá del mar y la ha hallado[a], y la traerá por oro escogido?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la ha hallado ... la traerá’; el griego usa pronombres femeninos porque la sabiduría es femenina gramaticalmente y está personificada en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha sido el que
  lexicon: LSJ
  rationale: Conserva el interrogativo retórico de la fuente y el tono de imposibilidad implícita; en español, «¿Quién» es la forma más natural y fiel.
- source_word: διέβη πέραν τῆς θαλάσσης
  english_pob_choice: has crossed beyond the sea
  chosen_spanish: ha cruzado más allá del mar
  alternatives_spanish:
  - ha pasado el mar
  - ha cruzado el mar
  lexicon: LSJ
  rationale: «Más allá del mar» conserva πέραν y el matiz espacial de ir al otro lado; el perfecto español reproduce la acción completada con fuerza retórica.
- source_word: εὗρεν αὐτήν
  english_pob_choice: found her
  chosen_spanish: la ha hallado
  alternatives_spanish:
  - la encontró
  - la encontró a ella
  lexicon: LSJ
  rationale: Se mantiene el pronombre femenino porque la referencia es a la sabiduría personificada; «hallar» es un equivalente digno y bíblico, sin perder naturalidad.
- source_word: οἴσει αὐτὴν
  english_pob_choice: will bring her
  chosen_spanish: la traerá
  alternatives_spanish:
  - la llevará
  - la conducirá
  lexicon: LSJ
  rationale: El futuro de φέρω admite «traer» o «llevar»; aquí «traerá» expresa bien la idea de regresar con lo hallado, sin añadir «de vuelta» que no está en el griego.
- source_word: χρυσίου ἐκλεκτοῦ
  english_pob_choice: for choice gold
  chosen_spanish: por oro escogido
  alternatives_spanish:
  - por oro fino
  - a cambio de oro escogido
  - por oro selecto
  lexicon: LSJ
  rationale: «Oro escogido» reproduce el valor de χρυσίου ἐκλεκτοῦ como oro precioso, selecto. «Por» puede reflejar precio o intercambio en el contexto interrogativo.
theological_decisions:
- issue: Sabiduría personificada en el pronombre femenino
  english_pob_reading: Use feminine 'her' throughout the verse
  chosen_spanish_reading: 'Mantener el femenino: «la ha hallado», «la traerá»'
  alternative_spanish_readings:
  - Usar «lo» para neutralizar el referente
  - Usar «la» solo en la primera cláusula
  rationale: El griego usa pronombres femeninos porque la sabiduría es femenina gramaticalmente y personificada en el contexto; el español debe preservar ese rasgo literario-teológico.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar «back» porque no está en el griego; por eso el español evita añadir cualquier equivalente de regreso y conserva solo «la traerá».
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «sabiduría» implícita mediante el femenino pronominal, siguiendo la personificación del contexto griego.
  - No se fuerza un calco como «cruzó el mar» si se pierde el valor de πέραν; «más allá del mar» preserva mejor la imagen.
