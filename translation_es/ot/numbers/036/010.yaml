translation:
  language: es
  text: Así como Yahvé había ordenado a Moisés[a], así hicieron las hijas de Zelofehad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Como/justo como Yahvé ordenó a Moisés, así hicieron las hijas de Zelofehad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: HALOT
  rationale: La partícula introduce correspondencia exacta entre el mandato y la acción. «Así como» comunica esa conformidad de manera natural en español y conserva la relación comparativa del hebreo.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - mandó
  - había ordenado
  lexicon: HALOT
  rationale: El verbo expresa un mandato dado. El pluscuamperfecto en español mantiene la anterioridad del mandato respecto de la acción de las hijas, como en el contexto inglés auditado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino en forma transliterada, siguiendo la decisión doctrinal del proyecto para no sustituirlo por un título. «Yahvé» es la forma española correspondiente a «Yahweh».
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  - para Moisés
  lexicon: HALOT
  rationale: Aunque el hebreo marca a Moisés como objeto del verbo, en español el régimen natural de «mandar» es con complemento con «a». Esto evita una construcción poco idiomática sin cambiar el sentido.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de la misma manera
  lexicon: HALOT
  rationale: La partícula señala correspondencia directa. «Así» mantiene la simetría con «Así como» y reproduce la estructura correlativa del original.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - procedieron
  lexicon: HALOT
  rationale: El verbo simple indica cumplimiento de lo mandado. «Hicieron» conserva la fuerza verbal directa del hebreo sin añadir matices ajenos.
- source_word: בְּנוֹת צְלָפְחָד
  english_pob_choice: the daughters of Zelophehad
  chosen_spanish: las hijas de Zelofehad
  alternatives_spanish:
  - las hijas de Zelofehad
  - las hijas de Zelofhad
  lexicon: HALOT
  rationale: Se mantiene la estructura constructa del hebreo con un español claro y bíblico. «Hijas» es la designación natural del grupo; «Zelofehad» reproduce el nombre propio de manera coherente en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La pauta doctrinal del proyecto es traducir el Tetragrámaton con el nombre propio divino, no con una sustitución titulada. «Yahvé» preserva esa decisión en español con la forma más establecida para lectores hispanos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones sustantivas ni cambios pendientes; la concordancia externa reporta alto acuerdo y el texto inglés quedó sin cambios en el último pase. La versión española sigue esa lectura estable, adaptando solo la sintaxis al español natural sin alterar la correspondencia semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se prefirió «hijas de Zelofehad» para conservar el paralelismo constructo del hebreo y la identificación del grupo.
  - «Así como ... así ...» reproduce la relación de conformidad exacta del original.
  - No se usó «SEÑOR» para evitar la sustitución del nombre divino por un título.
