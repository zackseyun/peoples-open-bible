translation:
  language: es
  text: Lo levantan sobre el hombro[a], lo cargan, y lo colocan en su lugar, y queda allí de pie; no se mueve de su sitio. Aun si alguien clama a él, no responde; no lo salva de su angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, en hebreo: «lo ponen debajo de él»; probablemente significa que lo colocan en su sitio o sobre su base o pedestal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂאֻהוּ
  english_pob_choice: they lift it
  chosen_spanish: lo levantan
  alternatives_spanish:
  - lo alzan
  - lo cargan
  lexicon: HALOT
  rationale: El verbo primero expresa el acto de elevar o izar el ídolo; «levantar» distingue bien este movimiento inicial del verbo siguiente de llevar/cargar.
- source_word: עַל כָּתֵף
  english_pob_choice: onto the shoulder
  chosen_spanish: sobre el hombro
  alternatives_spanish:
  - en el hombro
  - al hombro
  lexicon: HALOT
  rationale: La imagen es de transporte sobre el hombro; «sobre el hombro» conserva la dirección sin sonar forzado en español.
- source_word: יִסְבְּלֻהוּ
  english_pob_choice: they carry it
  chosen_spanish: lo cargan
  alternatives_spanish:
  - lo llevan
  - lo soportan
  lexicon: HALOT
  rationale: סבל comunica llevar una carga; «cargar» mantiene la idea de peso y resulta natural en español moderno.
- source_word: וְיַנִּיחֻהוּ תַחְתָּיו
  english_pob_choice: they set it in its place
  chosen_spanish: lo colocan en su lugar
  alternatives_spanish:
  - lo ponen en su sitio
  - lo colocan debajo de él
  lexicon: HALOT
  rationale: El hebreo es literalmente más oscuro («debajo de él»), pero el contexto apunta a colocarlo en su base o pedestal. «En su lugar» comunica la función contextual sin perder la relación con el original.
- source_word: וְיַעֲמֹד
  english_pob_choice: it stands there
  chosen_spanish: allí queda en pie
  alternatives_spanish:
  - permanece en pie
  - allí está
  lexicon: HALOT
  rationale: La estatua, una vez colocada, permanece inmóvil; «queda en pie» refleja ese estado resultante con fluidez.
- source_word: מִמְּקוֹמוֹ לֹא יָמִישׁ
  english_pob_choice: it does not move from its place
  chosen_spanish: no se mueve de su sitio
  alternatives_spanish:
  - no se aparta de su lugar
  - no se desplaza de su sitio
  lexicon: HALOT
  rationale: מושׁ/מישׁ expresa no moverse o no ser removido; «de su sitio» mantiene el tono concreto y la burla sobre la inmovilidad del ídolo.
- source_word: אַף
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Incluso si
  lexicon: HALOT
  rationale: 'Aquí introduce una concesión enfática: aun cuando le clamen, la imagen no responde. «Aunque» es el equivalente más natural en español.'
- source_word: יִצְעַק אֵלָיו
  english_pob_choice: someone cries out to it
  chosen_spanish: alguien le clame
  alternatives_spanish:
  - alguien le grite
  - uno le clame
  lexicon: HALOT
  rationale: El hebreo usa tercera persona singular con valor genérico; «alguien» preserva el carácter indefinido, y «clame» refleja bien el registro de súplica o llamada.
- source_word: וְלֹא יַעֲנֶה
  english_pob_choice: it does not answer
  chosen_spanish: no responde
  alternatives_spanish:
  - no contesta
  - no da respuesta
  lexicon: HALOT
  rationale: ענה en este contexto es responder a un clamor; «no responde» es breve, claro y fiel.
- source_word: מִצָּרָתוֹ לֹא יוֹשִׁיעֶנּוּ
  english_pob_choice: it does not save him from his distress
  chosen_spanish: no lo salva de su angustia
  alternatives_spanish:
  - no lo libra de su aflicción
  - no lo rescata de su angustia
  lexicon: HALOT
  rationale: צָרָה puede ser angustia, aflicción o apuro; «angustia» comunica bien la idea de necesidad apremiante. «Salvar» mantiene el valor de ישׁע en este contexto.
theological_decisions:
- issue: Pronombre genérico singular en la última cláusula
  english_pob_reading: someone ... him ... his distress
  chosen_spanish_reading: alguien ... lo ... su angustia
  alternative_spanish_readings:
  - él ... lo ... su angustia
  - una persona ... lo ... su angustia
  rationale: El hebreo es singular masculino con fuerza genérica. Se conserva el singular en español para no diluir la forma del original, mientras «alguien» marca el valor indefinido sin volverlo plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Objeto idolátrico inmóvil y burlado
  english_pob_reading: the idol remains useless, unable to answer or save
  chosen_spanish_reading: el ídolo queda inmóvil, sin responder ni salvar
  alternative_spanish_readings:
  - la imagen queda inmóvil, sin responder ni salvar
  - el ídolo permanece sin moverse, sin responder ni salvar
  rationale: 'El versículo es una burla contra la impotencia del ídolo: se lo mueve, se lo coloca, pero no actúa. La redacción conserva esa ironía sin añadir interpretación extra.'
  doctrine_reference: Isaías 46:7; contexto inmediato de la sátira contra los ídolos
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el trazado auditado en inglés. Se mantiene la secuencia de acciones (levantar, cargar, colocar) y la clausula final con valor genérico singular. No se introducen cambios textuales respecto del paquete fuente; la principal decisión española fue resolver la frase idiomática תַחְתָּיו como «en su lugar», con nota alternativa literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «salva» para ישׁע en coherencia con el valor de rescate/deliverance del contexto.
  - Se evita «SEÑOR» o fórmulas litúrgicas no presentes en el texto fuente.
  - El tono es sobrio y bíblico moderno, sin arcaísmos innecesarios.
