translation:
  language: es
  text: Y envió a su hermano como jefe del grupo, y pidió a sus amigos nabateos que recibieran en custodia[a] su abundante equipaje.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que se hicieran cargo de su gran cantidad de equipaje». El infinitivo griego también puede dar la idea de recibir y resguardar bienes confiados por alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  lexicon: LSJ
  rationale: El verbo narrativo simple se expresa de manera natural con «envió», que conserva el sentido básico de enviar sin sobrecargar el estilo.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su propio hermano
  lexicon: LSJ
  rationale: La relación posesiva está clara en el griego; «a su hermano» es fiel y no introduce énfasis innecesario.
- source_word: ἡγούμενον
  english_pob_choice: as leader of
  chosen_spanish: como jefe de
  alternatives_spanish:
  - como líder de
  - al frente de
  lexicon: LSJ
  rationale: Como participio que modifica a «su hermano», aquí indica función de mando o encabezamiento. «Como jefe de» comunica esa función de modo natural en español sin forzar una militarización mayor que la del griego.
- source_word: τοῦ ὄχλου
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la compañía
  - el grupo
  lexicon: LSJ
  rationale: ὄχλος puede ser «multitud», «gente» o «grupo». «Multitud» mantiene el valor más directo del término y funciona bien en español bíblico sin sonar artificial.
- source_word: παρεκάλεσεν
  english_pob_choice: urged
  chosen_spanish: rogó
  alternatives_spanish:
  - suplicó
  - pidió
  - instó
  lexicon: LSJ
  rationale: El verbo puede abarcar pedir, exhortar o apremiar. En este contexto narrativo, «rogó» expresa una petición insistente y respetuosa, acorde con el acto de encomendar bienes a amigos aliados.
- source_word: τοὺς Ναβαταίους φίλους αὐτοῦ
  english_pob_choice: his Nabatean friends
  chosen_spanish: a sus amigos nabateos
  alternatives_spanish:
  - a sus amigos, los nabateos
  - a los nabateos, sus amigos
  lexicon: LSJ
  rationale: La etnia y la relación de amistad se mantienen ambas. El orden español «sus amigos nabateos» es idiomático y conserva el matiz de vínculo personal y étnico.
- source_word: παραθέσθαι
  english_pob_choice: to take charge of
  chosen_spanish: tomaran en custodia
  alternatives_spanish:
  - guardaran
  - recibieran en depósito
  - se hicieran cargo de
  lexicon: LSJ
  rationale: El infinitivo medio puede implicar recibir algo para resguardarlo. «Tomaran en custodia» preserva la idea de recibir y proteger lo confiado, que el audit trail inglés también reconoce con la alternativa de recibir en fideicomiso/guarda.
- source_word: τὴν ἀποσκευήν
  english_pob_choice: baggage
  chosen_spanish: equipaje
  alternatives_spanish:
  - bagaje
  - bienes
  - pertenencias
  lexicon: LSJ
  rationale: En contexto de viaje, ἀποσκευή alude al conjunto transportado. «Equipaje» es claro para el lector actual y compatible con el sentido de carga llevada en ruta.
- source_word: τὴν πολλήν
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - mucho
  - numeroso
  - grande
  lexicon: LSJ
  rationale: El adjetivo subraya cantidad. «Abundante» reproduce bien la idea de gran cantidad y coincide con el registro formal del texto.
theological_decisions:
- issue: Valor de παραθέσθαι como recepción custodia de bienes
  english_pob_reading: The Greek infinitive can carry the sense of receiving and safeguarding property for someone.
  chosen_spanish_reading: tomaran en custodia
  alternative_spanish_readings:
  - recibieran en depósito
  - guardaran en confianza
  rationale: No se trata solo de recibir materialmente el equipaje, sino de aceptarlo con responsabilidad de resguardo. La expresión elegida conserva esa tensión entre recepción y protección.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «as leader of the crowd» y «abundant baggage». La versión española sigue esa actualización al traducir ἡγούμενον como función de jefatura y τὴν πολλήν con un término de registro más formal («abundante»). También se conservó el valor custodial de παραθέσθαι, destacado en el aparato crítico inglés.
  spanish_consistency_notes:
  - Se usa «nabateos» como etnónimo en minúscula por ser gentilicio común en español.
  - Se evitó «SEÑOR» o equivalentes no pertinentes; no hay léxico divino en este versículo.
  - «Multitud» y «equipaje» mantienen un registro bíblico legible sin arcaísmo excesivo.
  - No se añadieron notas al texto porque no fue necesario exponer una lectura alternativa en el cuerpo.
