translation:
  language: es
  text: 'Y ahora, te ruego, sea grande[a] el poder del Señor, tal como tú has hablado, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea magnificado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el nexo discursivo de ו junto con עַתָּה. En español, «Y ahora» reproduce bien la transición peticional sin sonar forzado; «Ahora» sería más breve, pero pierde un poco del enlace explícito.
- source_word: יִגְדַּל
  english_pob_choice: let ... be great
  chosen_spanish: sea grande
  alternatives_spanish:
  - sea magnificado
  - se engrandezca
  - sea aumentado
  lexicon: HALOT
  rationale: 'El jussivo expresa petición: «sea grande» mantiene la fuerza de deseo y sigue de cerca el hebreo. «Sea magnificado» es posible, pero introduce un tono más interpretativo y menos directo en español.'
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ruego
  lexicon: HALOT
  rationale: Partícula de ruego/entreaty. «Por favor» es natural y digna en español moderno; conserva el tono suplicante sin arcaísmo.
- source_word: כֹּחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  - potencia
  lexicon: HALOT
  rationale: כֹּחַ puede ser fuerza o poder. Aquí, por el contexto divino de capacidad efectiva para actuar, «poder» comunica bien la idea y suena natural en español bíblico contemporáneo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: El título divino אֲדֹנָי se vierte de forma idiomática como «el Señor» en español. No se usa «Yahvé» aquí porque el hebreo no contiene el Tetragrama sino el título אדני, como en el contexto auditado en inglés.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La comparación remite a una correspondencia directa con la խոսa divina previa. «Tal como» expresa con claridad esa equivalencia sin sobrerreligiosidad o calco.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you have spoken
  chosen_spanish: tú has hablado
  alternatives_spanish:
  - hablaste
  - tú dijiste
  lexicon: HALOT
  rationale: El perfecto hebreo mira a una palabra ya pronunciada y aún vigente. En español, «has hablado» conserva esa actualidad; el pronombre explícito ayuda a reflejar la apelación directa a Dios.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijiste
  lexicon: HALOT
  rationale: Fórmula introductoria de cita. «Diciendo» mantiene la abertura formal hacia lo que sigue, igual que en el texto fuente y en la versión inglesa auditada.
theological_decisions:
- issue: Traducción del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Se mantiene el valor de título divino del hebreo sin sustituirlo por el nombre propio Yahvé, porque el source packet usa אֲדֹנָי. En español, «el Señor» es la forma natural y reverente para este título, y preserva la distinción con el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (אֲדֹנָי/κύριος → Señor); Translation philosophy §2'
- issue: Fuerza del jussivo en una oración de Moisés
  english_pob_reading: let the power of the Lord be great
  chosen_spanish_reading: sea grande el poder del Señor
  alternative_spanish_readings:
  - que el poder del Señor sea grande
  - engrandezcase el poder del Señor
  rationale: El hebreo expresa una petición deseativa, no una simple afirmación descriptiva. «Sea grande» reproduce esa fuerza orante sin convertirla en una paráfrasis más libre.
  doctrine_reference: Hebrew jussive in petition contexts; prayer discourse register
translation_notes:
  revision_awareness: El contexto auditado en inglés se mantuvo estable en la última revisión, sin cambios necesarios. La presente versión sigue de cerca la decisión inglesa de preservar el sentido jussivo y la relación comparativa con lo que Dios ha dicho, adaptándolo a una sintaxis española natural.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para אֲדֹנָי, coherente con el tratamiento titulado de la fuente.
  - Se evitó «Yahvé» porque no aparece el Tetragrama en este versículo; esto preserva la distinción terminológica del proyecto.
  - «Por favor» traduce la partícula נָא con un tono de ruego moderno y respetuoso.
  - La nota alternativa en el pie conserva la tensión lexical entre «grande» y «magnificado» sin borrarla.
