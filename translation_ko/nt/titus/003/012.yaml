id: TIT.3.12
reference: Titus 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὅταν πέμψω Ἀρτεμᾶν πρὸς σὲ ἢ Τυχικόν, σπούδασον ἐλθεῖν πρός με εἰς Νικόπολιν, ἐκεῖ γὰρ κέκρικα παραχειμάσαι.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/012.yaml
  text: When I send Artemas or Tychicus to you[a], make every effort to come to me at Nicopolis[b], for I have decided to spend the winter there.
  footnotes:
  - marker: a
    text: Or 'be diligent to come to me' or 'do your best to come to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have resolved to winter there.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 아데마나 두기고를 그대에게 보내거든, 힘써 니고볼리로 나에게 오십시오[a]. 내가 거기서 겨울을 보내기로 정했기[b] 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「부지런히 나에게 오십시오」, 「최선을 다해 나에게 오십시오」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「거기서 월동하기로 결심했기」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀρτεμᾶν ... Τυχικόν
  english_pob_choice: Artemas ... Tychicus
  chosen_korean: 아데마 ... 두기고
  alternatives_korean:
  - 아르테마스 ... 튀키코스
  lexicon: BDAG
  rationale: 한국 교회 정착된 음역을 따른다(글로서리 기본값).
- source_word: σπούδασον ἐλθεῖν
  english_pob_choice: make every effort to come
  chosen_korean: 힘써 ~ 오십시오
  alternatives_korean:
  - 부지런히 오십시오
  - 서둘러 오십시오
  lexicon: BDAG
  rationale: σπουδάζω의 명령형은 「힘쓰다·부지런히 하다」. 「힘써」가 합쇼체와 어울린다.
- source_word: εἰς Νικόπολιν
  english_pob_choice: to Nicopolis
  chosen_korean: 니고볼리로
  alternatives_korean:
  - 니코폴리스로
  lexicon: BDAG
  rationale: 한국 교회 정착된 음역(글로서리 기본값).
- source_word: κέκρικα παραχειμάσαι
  english_pob_choice: I have decided to spend the winter
  chosen_korean: 겨울을 보내기로 정했기
  alternatives_korean:
  - 월동하기로 결심했기
  - 겨울을 나기로 정했기
  lexicon: BDAG
  rationale: κρίνω 완료(결정 상태) + παραχειμάζω(겨울을 나다). 「겨울을 보내기로 정하다」가 자연스럽다.
