translation:
  language: es
  text: Los muertos no alaban a Yah, ni[a] ninguno de los que descienden al silencio.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni todos los que descienden al silencio». El hebreo usa «todo», pero en español «ninguno» expresa mejor el sentido distributivo en esta construcción negativa.
    reason: lexical_alternative
  - marker: b
    text: «Silencio» es una expresión poética para el estado o ámbito de la muerte; algunos la entienden más específicamente como «la tumba» o «el Seol».
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֵּתִים
  english_pob_choice: The dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los muertos mismos
  lexicon: HALOT
  rationale: El participio sustantivado de מות funciona como un sustantivo colectivo para personas fallecidas. «Los muertos» es natural en español, formal y fiel al valor nominal sin añadir matices no presentes en el hebreo.
- source_word: יְהַלְלוּ
  english_pob_choice: do not praise
  chosen_spanish: no alaban
  alternatives_spanish:
  - no glorifican
  - no ensalzan
  lexicon: HALOT
  rationale: En el campo de הלל, «alabar» es la equivalencia más directa y reconocible en contexto de culto. Mantiene la conexión semántica con el lenguaje de alabanza del salterio.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT
  rationale: יָהּ es la forma breve poética del nombre divino, distinta de יהוה. Por eso se conserva como «Yah» en español, en vez de normalizarla como «Yahvé» o «el Señor».
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: ninguno
  alternatives_spanish:
  - ninguno de todos
  - todos
  lexicon: HALOT
  rationale: En esta construcción negativa, el hebreo distribuye la negación sobre el grupo entero. En español, «ninguno de los que...» expresa mejor ese valor distributivo que un calco como «todo» o «cualquiera».
- source_word: יֹרְדֵי
  english_pob_choice: who go down
  chosen_spanish: de los que descienden
  alternatives_spanish:
  - que bajan
  - que van descendiendo
  lexicon: HALOT
  rationale: El participio de ירד describe a quienes están en la condición de bajar. «Descienden» conserva la imagen vertical y el carácter general/descriptivo del participio.
- source_word: דוּמָה
  english_pob_choice: silence
  chosen_spanish: silencio
  alternatives_spanish:
  - quietud
  - la tumba
  - el Seol
  lexicon: HALOT
  rationale: «Silencio» reproduce el valor poético y metafórico de דוּמָה sin resolverlo prematuramente como «la tumba» o «el Seol». Así se preserva la tensión interpretativa del texto fuente.
theological_decisions:
- issue: Si el verso debe explicitar la idea de la muerte como sepulcro o reino de los muertos
  english_pob_reading: 'Retain the poetic statement without importing a full doctrine of the intermediate state: ''The dead do not praise Yah, nor do any who go down into silence.'''
  chosen_spanish_reading: 'Conservar la afirmación poética sin introducir en el texto principal una explicación doctrinal de la condición de los muertos: «Los muertos no alaban a Yah, ni ninguno de los que descienden al silencio.»'
  alternative_spanish_readings:
  - «Los muertos no alaban a Yah, ni todos los que descienden al sepulcro.»
  - «Los muertos no alaban a Yah, ni ninguno de los que bajan al Seol.»
  rationale: El hebreo usa lenguaje poético convencional que contrasta a los vivos adoradores con los muertos. El español debe conservar esa imagen y su tensión, sin resolverla dentro del versículo principal mediante una identificación interpretativa específica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete auditado; el pasaje muestra alto acuerdo entre revisores y el texto se mantiene sin cambios sustanciales respecto del análisis fuente.
  spanish_consistency_notes:
  - Se conserva «Yah» para יָהּ, coherente con la política de distinguir la forma breve del nombre divino de יהוה.
  - Se usa «alaban» para הלל, manteniendo el registro de culto y la conexión léxica con el salterio.
  - «Silencio» queda en el texto principal para respetar la metáfora hebrea sin sobreinterpretación.
  - La negación distributiva se expresa con «ninguno de los que...», una solución natural en español para כָּל en este contexto negativo.
