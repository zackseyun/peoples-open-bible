translation:
  text: and to make the sanctuary taxable in silver[a], like the other temples of the nations, and to make the high priesthood sold each year[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'subject to a silver tax' / 'assessed for monetary tribute.' The rare adjective ἀργυρολόγητον indicates making the sanctuary a source of money revenue, parallel to pagan temples.
    reason: lexical_alternative
  - marker: b
    text: Or 'to put the high priesthood up for sale each year.' The Greek presents the office itself as vendible, underscoring the proposed profanation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  chosen: sanctuary
  alternatives:
  - temple
  - holy place
  lexicon: LSJ
  rationale: In this context the reference is specifically to the Jerusalem sacred precinct. 'Sanctuary' preserves the cultic sense without implying only the building structure as 'temple' might, and distinguishes it from τεμένη later in the verse.
- source_word: ἀργυρολόγητον
  chosen: taxable with silver
  alternatives:
  - subject to a silver tax
  - assessed for tribute in money
  - liable to monetary taxation
  lexicon: LSJ
  rationale: The adjective is rare and built on silver/money plus collection/levy language. The sense is that the sanctuary should be made a source of monetary revenue. 'Taxable with silver' stays close to the Greek while remaining intelligible.
- source_word: τεμένη
  chosen: temples
  alternatives:
  - sanctuaries
  - shrines
  lexicon: LSJ
  rationale: Refers to sacred precincts of the nations. 'Temples' is the most natural modern English equivalent here, though the Greek can also denote sanctuaries or precincts.
- source_word: πρατὴν
  chosen: a thing to be sold
  alternatives:
  - saleable
  - for sale
  - to be farmed out
  lexicon: LSJ
  rationale: The adjective conveys that the office is made vendible. Because English lacks a natural adjective here, the phrase 'a thing to be sold' makes explicit the commercializing force of the Greek.
- source_word: ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - the office of high priest
  lexicon: LSJ
  rationale: This denotes the office/dignity of the high priest, not merely the person. 'High priesthood' is concise and standard.
- source_word: κατʼ ἔτος
  chosen: each year
  alternatives:
  - yearly
  - annually
  lexicon: LSJ
  rationale: A straightforward temporal phrase indicating recurring annual sale or appointment.
- source_word: ποιήσειν
  chosen: to make
  alternatives:
  - to render
  - to cause to be
  lexicon: LSJ
  rationale: The infinitive governs both proposals in the verse. 'To make' preserves the causative force simply in English.
