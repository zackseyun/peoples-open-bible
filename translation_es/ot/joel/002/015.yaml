translation:
  language: es
  text: Toquen la trompeta[a] en Sión; consagren un ayuno[b]; convoquen una asamblea solemne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerno de carnero» para שׁוֹפָר, subrayando el instrumento específico usado para alarma o convocatoria sagrada.
    reason: lexical_alternative
  - marker: b
    text: O «santifiquen un ayuno». El verbo hebreo significa apartar algo como santo para un propósito sagrado.
    reason: lexical_alternative
  - marker: c
    text: O «proclamen una asamblea sagrada». עֲצָרָה denota una reunión religiosa formal marcada por solemnidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  english_pob_choice: Blow
  chosen_spanish: Toquen
  alternatives_spanish:
  - Suenen
  - Toquen la trompeta
  lexicon: HALOT
  rationale: El verbo imperativo plural expresa la acción de hacer sonar el instrumento. En español, «toquen» conserva bien el mandato comunitario y encaja de forma natural con el instrumento explícito, sin perder la fuerza imperativa.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - el cuerno de carnero
  - el cuerno
  - la trompeta de carnero
  lexicon: HALOT
  rationale: El POB inglés documenta la posible especificación «ram's horn», pero eligió «trumpet» por idiomaticidad. En español, «trompeta» mantiene la claridad pública y litúrgica; se deja la nota para la alternativa más específica del instrumento.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sión
  alternatives_spanish:
  - sobre Sión
  - dentro de Sión
  lexicon: HALOT
  rationale: La preposición locativa se traduce de manera directa como «en». «Sión» es la forma española usual del topónimo bíblico.
- source_word: קַדְּשׁוּ
  english_pob_choice: consecrate
  chosen_spanish: consagren
  alternatives_spanish:
  - santifiquen
  - aparten como santo
  - dediquen
  lexicon: HALOT
  rationale: La idea es apartar el ayuno para un propósito sagrado. «Consagren» comunica bien la designación formal y evita la carga más eclesiástica o arcaica de «santifiquen», aunque esa sigue siendo una alternativa válida.
- source_word: צוֹם
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - el ayuno
  - el acto de ayunar
  lexicon: HALOT
  rationale: El sustantivo designa la práctica concreta convocada. «Un ayuno» conserva el carácter de una observancia específica, tal como en el inglés del POB.
- source_word: קִרְאוּ
  english_pob_choice: call
  chosen_spanish: convoquen
  alternatives_spanish:
  - llamen
  - proclamen
  - citen
  lexicon: HALOT
  rationale: En este contexto no se trata sólo de decir palabras, sino de reunir públicamente a la comunidad. «Convoquen» expresa mejor la función de convocación que el simple «llamen», sin abandonar el mandato público implícito.
- source_word: עֲצָרָה
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea sagrada
  - una reunión solemne
  - una asamblea de solemnidad
  lexicon: HALOT
  rationale: La expresión tradicional en español bíblico es inteligible y preserva la formalidad cultual. «Solemne» refleja la gravedad religiosa marcada por el término hebreo, mientras «asamblea» mantiene el sentido de reunión comunitaria convocada.
translation_notes:
  revision_awareness: El texto en inglés del POB y la comparación con el hebreo presentan alto acuerdo; no se registraron revisiones aplicadas en el pasaje fuente. La traducción española sigue ese mismo perfil estable y conserva las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se usa «Sión» como topónimo bíblico estándar en español.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni κύριος en la fuente dada.
  - «Consagren» y «asamblea solemne» mantienen un registro bíblico claro sin depender de fórmulas eclesiásticas más rígidas.
  - La puntuación con punto y coma refleja bien la secuencia imperativa del hebreo.
