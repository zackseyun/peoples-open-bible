translation:
  language: es
  text: Mis raíces estaban extendidas hacia las aguas, y el rocío pasaba la noche sobre mis ramas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «en mi cosecha». El hebreo aquí es inusual en este contexto; se elige «ramas» porque encaja de manera más natural con la imagen vegetal de raíces y rocío.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְשִׁי
  english_pob_choice: My roots
  chosen_spanish: Mis raíces
  alternatives_spanish:
  - Mi raíz
  lexicon: HALOT
  rationale: Aunque el hebreo tiene singular con sufijo de 1ª persona, en español la imagen arbórea se expresa con naturalidad en plural cuando se habla del sistema radical. "Mis raíces" conserva la metáfora y evita una forma menos idiomática sin alterar el sentido.
- source_word: פָתוּחַ
  english_pob_choice: were spread out
  chosen_spanish: estaban extendidas
  alternatives_spanish:
  - estaban abiertas
  - fueron extendidas
  lexicon: HALOT
  rationale: El participio pasivo describe un estado. "Estaban extendidas" transmite en español la imagen de amplitud y expansión mejor que "estaban abiertas", que suena más abstracto o menos vegetal en este contexto poético.
- source_word: אֱלֵי מָיִם
  english_pob_choice: to the waters
  chosen_spanish: hacia las aguas
  alternatives_spanish:
  - junto a las aguas
  - a las aguas
  lexicon: HALOT
  rationale: אֱלֵי expresa dirección o relación. "Hacia las aguas" conserva ese matiz direccional y mantiene el plural poético de מָיִם sin reducirlo a "agua".
- source_word: וְטַל
  english_pob_choice: and dew
  chosen_spanish: y el rocío
  alternatives_spanish:
  - y el relente
  lexicon: HALOT
  rationale: טַל se traduce de manera directa como "rocío". En español bíblico contemporáneo es claro y fiel; "relente" sería más regional y menos preciso para lectores generales.
- source_word: יָלִין
  english_pob_choice: stayed overnight
  chosen_spanish: pasaba la noche
  alternatives_spanish:
  - pernoctaba
  - se quedaba de noche
  lexicon: HALOT
  rationale: El verbo לון implica pasar la noche o alojarse. "Pasaba la noche" suena natural en español y conserva el valor temporal sin cargar una connotación extra de hospedaje.
- source_word: בִּקְצִירִי
  english_pob_choice: on my branches
  chosen_spanish: sobre mis ramas
  alternatives_spanish:
  - en mi cosecha
  - sobre mi ramaje
  - sobre mis brotes
  lexicon: HALOT
  rationale: La POB en inglés documenta la tensión entre el sentido más literal de "cosecha" y la imagen vegetal requerida por el paralelismo. En español, "sobre mis ramas" mantiene la coherencia de la metáfora agrícola/arbórea con raíces y rocío, y evita una expresión que resultaría oscura en este contexto poético.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo consonántico y la lectura auditada de la POB en inglés. No se adoptaron revisiones nuevas respecto del expediente; la decisión principal en español fue resolver el hebreo inusual בִּקְצִירִי con una equivalencia natural («ramas») y dejar la alternativa literal en nota.
  spanish_consistency_notes:
  - Se mantuvo el tono poético y la sintaxis compacta del versículo.
  - '"Aguas" conserva el plural hebreo de מָיִם.'
  - No se usó "SEÑOR" ni terminología doctrinal no presente en el versículo.
  - El pie de nota marca explícitamente la lectura alternativa literal para no borrar la tensión léxica documentada.
