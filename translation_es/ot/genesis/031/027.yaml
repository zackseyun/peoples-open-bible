translation:
  language: es
  text: ¿Por qué te escondiste para huir y te escabulliste de mí[a], y no me lo dijiste, para que yo te hubiera despedido con alegría y con cantos[b], con tamboril[c] y lira[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «me robaste». El hebreo usa un giro idiomático que significa irse a escondidas o escabullirse de alguien sin que lo note.
    reason: lexical_alternative
  - marker: b
    text: O «y con canto».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente «tímpano».
    reason: lexical_alternative
  - marker: d
    text: O «arpa», aunque el hebreo designa más específicamente una lira.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: Interrogativo natural y directo en español; conserva el tono de reproche de la pregunta.
- source_word: נַחְבֵּאתָ
  english_pob_choice: did you hide yourself
  chosen_spanish: te escondiste
  alternatives_spanish:
  - te ocultaste
  - te escondiste a ti mismo
  lexicon: HALOT
  rationale: El nifal de חבא expresa el acto reflexivo de esconderse; en español, «te escondiste» comunica ese matiz de forma natural.
- source_word: לִבְרֹחַ
  english_pob_choice: to flee
  chosen_spanish: para huir
  alternatives_spanish:
  - para escapar
  - para salir huyendo
  lexicon: HALOT
  rationale: Infinitivo de finalidad/verbal en español; «huir» preserva el sentido de escape apresurado sin suavizarlo.
- source_word: וַתִּגְנֹב אֹתִי
  english_pob_choice: and steal away from me
  chosen_spanish: y me robaste[a]
  alternatives_spanish:
  - y me robaste a escondidas
  - y te escabulliste de mí
  lexicon: HALOT
  rationale: Se mantiene la fuerza literal del hebreo, que dice «me robaste» como giro idiomático. En español, la nota explica que el sentido es «escaparte a escondidas / irte sin ser notado»; se conserva así la tensión léxica sin borrar la imagen verbal.
- source_word: וְלֹא הִגַּדְתָּ לִּי
  english_pob_choice: and not tell me
  chosen_spanish: y no me lo dijiste
  alternatives_spanish:
  - y no me informaste
  - y no me avisaste
  lexicon: HALOT
  rationale: 'Hifil de נגד: comunicar o decir algo a alguien. «Me lo dijiste» es idiomático y mantiene el paralelismo de la queja.'
- source_word: וָאֲשַׁלֵּחֲךָ
  english_pob_choice: so that I might have sent you away
  chosen_spanish: para que yo te hubiera despedido
  alternatives_spanish:
  - para que yo te hubiera dejado ir
  - de modo que yo te hubiera enviado
  lexicon: HALOT
  rationale: El valor consecuencial/irrealis del verbo se expresa con imperfecto de subjuntivo más pluscuamperfecto de subjuntivo, una construcción natural en español para una acción no realizada en el pasado.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: HALOT
  rationale: «Alegría» es claro y solemne en español; reproduce bien el sustantivo abstracto y el tono festivo del contexto.
- source_word: וּבְשִׁרִים
  english_pob_choice: and with songs
  chosen_spanish: y con cantos[b]
  alternatives_spanish:
  - y con canciones
  - y con canto
  lexicon: HALOT
  rationale: El plural hebreo admite tanto «cantos» como «canciones»; «cantos» conserva mejor el paralelismo litúrgico y la amplitud semántica. La nota recoge la alternativa de «canto / canto cantado» que puede reflejar el sustantivo o la acción de cantar.
- source_word: בְּתֹף
  english_pob_choice: with tambourine
  chosen_spanish: con tamboril[c]
  alternatives_spanish:
  - con pandero
  - con tambor
  lexicon: HALOT
  rationale: Se adopta un término tradicional pero todavía comprensible en ámbito bíblico y eclesial; la nota ofrece «pandero» como equivalente moderno más común en algunas regiones.
- source_word: וּבְכִנּוֹר
  english_pob_choice: and lyre
  chosen_spanish: y lira[d]
  alternatives_spanish:
  - y arpa
  - y cítara
  lexicon: HALOT
  rationale: «Lira» es la equivalencia más precisa para el instrumento de cuerda hebreo כִּנּוֹר. Se evita «arpa» por ser más amplia y potencialmente menos exacta.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés de POB, conservando la imagen idiomática de «robar» para וַתִּגְנֹב אֹתִי y la secuencia de despedida festiva. No se incorporaron revisiones posteriores porque el pass más reciente indica que no hubo cambios.
  spanish_consistency_notes:
  - Se mantiene el uso de «lira» para כִנּוֹר y «tamboril» para תֹף, con notas alternativas para claridad regional.
  - Se conserva la tensión entre literalidad e idiomatismo en «me robaste»; la nota evita borrar la metáfora hebrea.
  - «Alegría» y «cantos» reproducen el registro festivo sin arcaizar en exceso.
  - La puntuación sigue el ritmo interrogativo y acumulativo del hebreo, con una única frase larga en estilo bíblico publicado.
