translation:
  language: es
  text: Como un trabajador asalariado, año por año estará con él[a]; no ejercerá dominio sobre él con dureza ante tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Como un siervo asalariado, año por año estará con él.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּשְׂכִיר
  english_pob_choice: Like a hired worker
  chosen_spanish: Como un trabajador asalariado
  alternatives_spanish:
  - Como un siervo asalariado
  - Como un obrero asalariado
  lexicon: HALOT
  rationale: El prefijo כ introduce comparación (“como”). שׂכיר designa a una persona contratada por salario, no a un esclavo. En español, “trabajador asalariado” conserva la comparación y el rasgo de remuneración sin trasladar indebidamente la idea de esclavitud.
- source_word: שָׁנָה בְּשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año por año
  alternatives_spanish:
  - de año en año
  - cada año
  lexicon: HALOT
  rationale: La expresión hebrea indica recurrencia anual y continuidad. “Año por año” es natural en español y mantiene el sentido distributivo del hebreo.
- source_word: יִהְיֶה עִמּוֹ
  english_pob_choice: he shall be with him
  chosen_spanish: estará con él
  alternatives_spanish:
  - permanecerá con él
  - seguirá con él
  lexicon: HALOT
  rationale: El verbo básico es “ser/estar”, sin añadir una idea de servicio que el hebreo no expresa aquí. “Estará con él” preserva la sobriedad del original.
- source_word: לֹא יִרְדֶּנּוּ
  english_pob_choice: he shall not rule over him
  chosen_spanish: no lo dominará
  alternatives_spanish:
  - no reinará sobre él
  - no ejercerá dominio sobre él
  lexicon: HALOT
  rationale: רדה puede significar “gobernar” o “dominar”. En este contexto legal de trato al rescatado, “dominar” comunica la relación de poder sin sonar excesivamente político como “reinará”.
- source_word: בְּפֶרֶךְ
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - con rudeza
  - de manera cruel
  lexicon: HALOT
  rationale: El término alude a trato severo, opresivo o cruel, especialmente en contexto de trabajo forzado. “Con dureza” es una equivalencia sobria en español y evita suavizar el matiz.
- source_word: לְעֵינֶיךָ
  english_pob_choice: in your sight
  chosen_spanish: a tus ojos
  alternatives_spanish:
  - ante tus ojos
  - en tu presencia
  lexicon: HALOT
  rationale: La frase hebrea remite literalmente a la esfera visual del interlocutor. “A tus ojos” conserva esa imagen; en español suena idiomático y puede leerse como “a la vista de ti”.
theological_decisions:
- issue: 'Estado del israelita vendido al extranjero: comparación laboral, no esclavitud de propiedad'
  english_pob_reading: Rendered as a comparison to a hired worker rather than as a slave, reflecting the legal protection and temporary status in context.
  chosen_spanish_reading: Se traduce como comparación con un trabajador asalariado, no como esclavo de propiedad.
  alternative_spanish_readings:
  - Como un siervo asalariado
  - Como un esclavo asalariado
  rationale: El hebreo usa שׂכיר, no un sustantivo de esclavo. En español, “trabajador asalariado” mantiene la comparación legal y evita imponer una categoría más fuerte que la del texto. Aun así, el contexto sigue siendo de servidumbre regulada, por lo que no se borra la tensión del pasaje.
  doctrine_reference: Transparencia lexical y primacía del texto original; preservar matices legales del Pentateuco sin armonización tradicional
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría fue de alta concordancia con objeciones menores únicamente. Se mantuvo la decisión principal de comparar con un trabajador asalariado y la estructura anual continua del hebreo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como término por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió “trabajador asalariado” para שׂכיר, coherente con el criterio POB de evitar “esclavo” cuando el hebreo no lo exige.
  - La imagen final “a tus ojos” conserva el hebraísm o visual sin sobreexplicación.
