lexical_decisions:
- source_word: ἴδωμεν
  english_pob_choice: Let us see
  chosen_spanish: Veamos
  alternatives_spanish:
  - Miremos
  - Veamos bien
  lexicon: LSJ
  rationale: El subjuntivo exhortativo de primera persona plural se expresa de forma natural con «veamos», conservando el tono deliberativo y desafiante del griego.
- source_word: οἱ λόγοι αὐτοῦ
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dice
  - sus dichos
  lexicon: LSJ
  rationale: «Palabras» mantiene la cercanía al sustantivo λόγοι y funciona bien en español; el posesivo «sus» conserva el referente personal sin forzar una paráfrasis.
- source_word: ἀληθεῖς
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - verdaderas en verdad
  - ciertas
  lexicon: LSJ
  rationale: «Verdaderas» reproduce el valor adjetival directo de ἀληθεῖς y suena natural en español, sin desplazar el foco hacia la veracidad del hablante como persona.
- source_word: πειράσωμεν
  english_pob_choice: let us test
  chosen_spanish: probemos
  alternatives_spanish:
  - pongamos a prueba
  - testeemos
  lexicon: LSJ
  rationale: El verbo griego implica probar o someter a examen. «Probemos» comunica una prueba activa y aceptable en español; en contexto, conserva el matiz hostil de desafiar la validez de sus afirmaciones.
- source_word: τὰ ἐν ἐκβάσει αὐτοῦ
  english_pob_choice: what will happen at his end
  chosen_spanish: lo que sucederá en su desenlace
  alternatives_spanish:
  - su resultado final
  - lo que será de él al final
  - su final
  lexicon: LSJ
  rationale: ἐκβάσις puede significar resultado, desenlace o fin. «Desenlace» recoge el sentido de resultado final sin reducirlo a una mera muerte física ni fijar más de lo que el griego afirma.
theological_decisions:
- issue: 'Alcance de ἐκβάσις: resultado final o final del justo'
  english_pob_reading: what will happen at his end
  chosen_spanish_reading: lo que sucederá en su desenlace
  alternative_spanish_readings:
  - su resultado final
  - su final
  rationale: El contexto pone en boca de los impíos el intento de comprobar si las afirmaciones del justo se verifican al final. «Desenlace» preserva esa tensión de resultado final sin resolverla en una doctrina más específica que la del texto.
  doctrine_reference: Preservar la tensión textual sobre el resultado final sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; la redacción española sigue de cerca el sentido adjudicado de λόγοι, ἀληθεῖς y ἐκβάσις, sin introducir elementos ajenos al griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no aparece terminología propia de YHWH en este versículo.
  - «Verdaderas» conserva el valor predicativo de ἀληθεῖς sin convertirlo en una glosa explicativa.
  - «Desenlace» se usa consistentemente para reflejar ἐκβάσις como resultado final, no como evento aislado.
