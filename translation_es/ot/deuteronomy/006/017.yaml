translation:
  language: es
  text: Debes guardar cuidadosamente los mandamientos de Yahvé tu Dios[a], y sus testimonios y sus estatutos[b], que él te ha mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «de seguro guardarás» / «guardarás con diligencia»; el hebreo usa un infinitivo absoluto con el verbo finito para intensificar la exhortación.'
    reason: lexical_alternative
  - marker: b
    text: «Testimonios» también puede entenderse como «decretos» o «estipulaciones del pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר תִּשְׁמְרוּן
  english_pob_choice: shall diligently keep
  chosen_spanish: Guardarás cuidadosamente
  alternatives_spanish:
  - Ciertamente guardarás
  - Guardarás con diligencia
  - Observarás cuidadosamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con el imperfecto intensifica el mandato. En español, «guardarás cuidadosamente» conserva la fuerza enfática sin sonar mecánico, y mantiene el lenguaje de pacto propio del contexto deuteronómico.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los mandatos
  - las órdenes
  lexicon: HALOT
  rationale: «Mandamientos» reproduce bien el campo legal y covenantal de מִצְוֹת y coincide con el registro formal del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», transliteración del nombre divino, no la sustitución «SEÑOR».'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: El hebreo usa la fórmula de pacto «Yahvé tu Dios». En español bíblico de alcance amplio, «tu Dios» refleja el singular genérico del discurso y mantiene naturalidad; no hace falta explicitar el plural aquí.
- source_word: עֵדֹתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus decretos
  - sus estipulaciones del pacto
  lexicon: HALOT
  rationale: «Testimonios» conserva la decisión léxica marcada en el audit trail y permite distinguir este término de «mandamientos» y «estatutos» sin borrar la tensión semántica.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus ordenanzas
  - sus preceptos
  lexicon: HALOT
  rationale: «Estatutos» es la correspondencia española más estable para חֻקִּים en un contexto jurídico; mantiene la diferenciación interna con «mandamientos» y «testimonios».
- source_word: אֲשֶׁר צִוָּךְ
  english_pob_choice: which he has commanded you
  chosen_spanish: que él te ha mandado
  alternatives_spanish:
  - que él te mandó
  - que él te ordenó
  lexicon: HALOT
  rationale: El relativo aplica a la serie legal anterior. «Te ha mandado» refleja el perfecto hebreo con relevancia presente y suena natural en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre divino en español como «Yahvé» conforme a la política del proyecto, evitando la sustitución por título y manteniendo la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el testimonio auditado en inglés sin copiarlo mecánicamente: conserva la intensificación hebrea, distingue los tres términos jurídicos («mandamientos», «testimonios», «estatutos») y adopta la convención del proyecto para el nombre divino. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular («tu», «te», «guardarás») porque el español del versículo puede representar el адресado colectivo sin perder naturalidad.
  - «Yahvé» se usa de manera consistente para יְהוָה en el texto principal.
  - Se conserva una progresión léxica distinta entre «mandamientos», «testimonios» y «estatutos» para no neutralizar la terminología legal del pasaje.
