translation:
  text: Jesus said[a], “Woe to the flesh that depends on the soul[c][b]; woe to the
    soul that depends on the flesh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb ⲉⲓϣⲉ can also be rendered “hangs upon” or “leans on,” preserving
      a more concrete image.
    reason: lexical_alternative
  - marker: b
    text: ⲯⲩⲭⲏ (psyche) can also mean “life” or “self,” but “soul” keeps the stark
      flesh/soul polarity of the Coptic.
    reason: lexical_alternative
  - marker: c
    text: MS shows ⲧⲁⲉⲓ (fem. demonstrative) in both clauses; Dilley normalizes to
      ⲡⲁⲓ. The demonstrative is semantically bleached here (“that [which]”), so gender
      does not affect the meaning.
    reason: dialect_note
lexical_decisions:
- source_word: ⲟⲩⲟⲉⲓ / ⲟⲩⲟⲓ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: Crum; loan from Gk οὐαί
  rationale: Retains the oracular denunciatory force of the interjection; “woe” is
    the established equivalent for Coptic ⲟⲩⲟⲓ (from Gk οὐαί).
- source_word: ⲥⲁⲣⲝ
  chosen: flesh
  alternatives:
  - body
  lexicon: Crum; Greek loanword
  rationale: “Flesh” preserves the Greek connotation and Thomas’s stark flesh/soul
    pairing; “body” risks softening the contrast.
- source_word: ⲯⲩⲭⲏ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: Crum; Greek loanword
  rationale: “Soul” aligns with ψυχή’s core semantic range here and maintains the
    deliberately sharp opposition to “flesh.”
- source_word: ⲉⲧⲉⲣⲉⲉⲓϣⲉ (ⲉⲓϣⲉ)
  chosen: depends on
  alternatives:
  - hangs upon
  - leans on
  lexicon: Crum; Layton (grammar) on ⲉⲓϣⲉ with ⲛ
  rationale: ⲉⲓϣⲉ with object preposition ⲛ conveys reliance/attachment; “depends
    on” communicates functional dependence while allowing the pictorial sense (“hang
    upon”) as an alternative.
- source_word: ⲡⲁⲓ (demonstrative)
  chosen: that [which]
  alternatives:
  - this one who
  lexicon: Layton (grammar) on demonstratives with relative clauses
  rationale: Used to introduce the relative clause; in English the demonstrative is
    absorbed into “that” introducing the clause for naturalness while preserving structure.
- source_word: preposition ⲛ with ⲟⲩⲟⲓ/verb
  chosen: to/on
  alternatives:
  - upon
  lexicon: Lambdin (grammar) on dative-like ⲛ
  rationale: Marks the dative-like relation (“woe to …”) and the object of ⲉⲓϣⲉ (“depend
    on”).
textual_note: No lacunae are present in this saying. The manuscript writes the interjection
  as ⲟⲩⲟⲉⲓ (NHAM02.51 l.10–11), which Dilley normalizes to ⲟⲩⲟⲓ (οὐαί). The demonstrative
  appears in the phrase-joined transcription as ⲧⲁⲉⲓ in both clauses (l.11–12), while
  Dilley normalizes to masculine ⲡⲁⲓ; this yields a gender mismatch in the first clause
  (masc. ⲥⲁⲣⲝ vs. fem. demonstrative) if read strictly at the surface level, but the
  sense is simply “the one that…,” and the normalization removes any mismatch. The
  verb appears phrase-joined as ⲉⲧⲟϣⲉ, which Dilley analyzes/normalizes as the relative
  construction ⲉⲧⲉⲣⲉⲉⲓϣⲉ (“who depends on / hangs upon”). No restorations are required.
