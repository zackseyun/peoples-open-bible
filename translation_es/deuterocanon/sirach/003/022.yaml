translation:
  language: es
  text: Considera lo que se te ha asignado[a], y las cosas ocultas no te conciernen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lo que te fue permitido/autorizado»; el paralelo griego dice «lo que te fue mandado». El texto principal sigue el sentido de lo asignado a tu ámbito de responsabilidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἃ προσετάγη σοι / הוּרְשֵׁיתָ
  english_pob_choice: what you have been assigned
  chosen_spanish: lo que se te ha asignado
  alternatives_spanish:
  - lo que se te ha encomendado
  - lo que se te ha permitido
  - lo que se te ha autorizado
  lexicon: LXX προτάσσω / Heb. הורשׁ
  rationale: El griego expresa algo mandado u ordenado, mientras que el hebreo puede inclinarse hacia la idea de autorización o asignación. 'Se te ha asignado' conserva la idea de una esfera de responsabilidad confiada al lector sin endurecer indebidamente el matiz hacia un mandato estricto; además, corresponde bien al español natural en un contexto sapiencial.
- source_word: διανοοῦ
  english_pob_choice: consider
  chosen_spanish: considera
  alternatives_spanish:
  - reflexiona sobre
  - piensa en
  - medita en
  lexicon: LSJ / BDAG
  rationale: El verbo pide atención mental deliberada. 'Considera' es breve, claro y acorde con el registro exhortativo del texto.
- source_word: οὐ γάρ ἐστί σοι χρεία τῶν κρυπτῶν / וְאֵין לְךָ עֵסֶק בְּנִסְתָּרוֹת
  english_pob_choice: you have no business with hidden things
  chosen_spanish: no tienes que ver con las cosas ocultas
  alternatives_spanish:
  - no tienes asunto con las cosas ocultas
  - no te conciernen las cosas ocultas
  - no tienes que ocuparte de las cosas ocultas
  lexicon: χρεία / עֵסֶק / נִסְתָּרוֹת
  rationale: La combinación griega-hebrea apunta a falta de incumbencia o participación, no solo a ausencia de necesidad. 'No tienes que ver con' comunica con naturalidad esa idea de no incumbencia en español, sin perder el tono admonitorio.
- source_word: τῶν κρυπτῶν / בְּנִסְתָּרוֹת
  english_pob_choice: hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - las cosas secretas
  - los misterios
  lexicon: κρυπτός / סתר
  rationale: '''Cosas ocultas'' reproduce el sentido de aquello escondido o no accesible. Se evita ''misterios'' para no introducir una carga teológica posterior que el contexto inmediato no exige.'
theological_decisions:
- issue: Tensión entre la lectura hebrea de autorización/asignación y la lectura griega de mandato
  english_pob_reading: The main text follows the Greek-supported sense of what has been assigned to your concern, while the footnote preserves the Hebrew-based alternative.
  chosen_spanish_reading: El texto principal sigue la idea de lo asignado a tu ámbito de responsabilidad, con la nota preservando la posibilidad hebrea de autorización o permiso.
  alternative_spanish_readings:
  - lo que se te ha permitido
  - lo que se te ha autorizado
  - lo que se te ha encomendado
  rationale: 'La edición hebrea y el paralelo griego no son idénticos. Para una traducción española auditable conviene mantener la tensión: no borrar la diferencia, pero tampoco sobrecargarla. ''Asignado'' funciona como puente entre ambas líneas de lectura.'
  doctrine_reference: 'PHILOSOPHY.md: preservar honestamente la incertidumbre de la fuente y traducir el paralelo griego como input real sin ocultar la huella hebrea.'
- issue: Alcance de 'cosas ocultas' en un contexto sapiencial
  english_pob_reading: hidden things
  chosen_spanish_reading: cosas ocultas
  alternative_spanish_readings:
  - secretos
  - misterios
  rationale: El contexto exhorta a limitarse al ámbito dado y no a especular sobre lo escondido. 'Cosas ocultas' mantiene el énfasis en aquello que permanece fuera del alcance humano, sin cargar la frase con un tecnicismo religioso posterior.
  doctrine_reference: Sabiduría judía del texto; evitar importaciones conceptuales no exigidas por el pasaje.
translation_notes:
  revision_awareness: El borrador inglés de trabajo pasó de 'commanded' a 'assigned' para reflejar mejor el hebreo הורשיתָ, mientras que el griego sigue aportando la idea de algo ordenado o fijado para ti. La versión española intenta conservar ese equilibrio con 'se te ha asignado', evitando tanto un mandato demasiado rígido como una mera licencia sin compromiso.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Cosas ocultas'' se usó de forma consistente para κρυπτά / נִסְתָּרוֹת.'
  - El tono es exhortativo sapiencial, no polémico ni doctrinalmente cargado.
