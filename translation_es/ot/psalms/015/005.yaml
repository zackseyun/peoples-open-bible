  text: כַּסְפּ֤/וֹ לֹא נָתַ֣ן בְּ/נֶשֶׁךְ֮ וְ/שֹׁ֥חַד עַל נָקִ֗י לֹ֥א לָ֫קָ֥ח עֹֽשֵׂה אֵ֑לֶּה לֹ֖א יִמּ֣וֹט לְ/עוֹלָֽם׀־־־׃
base_translation:
