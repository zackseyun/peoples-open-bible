theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether לְלֹא אֱלֹהִים should be smoothed to 'false gods'
  chosen_reading: of what are not gods
  alternative_readings:
  - of false gods
  - for non-gods
  rationale: The Hebrew is a polemical denial of deity rather than merely a classificatory label. The chosen rendering preserves that theological sharpness and the wording of the source more closely.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
