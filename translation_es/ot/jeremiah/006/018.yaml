  glossary_alignment: No hay conflictos con la terminología global del proyecto. «Congregación» es aceptable como equivalente principal de עֵדָה con alternativas en nota. Debe preservarse la nota léxica para «congregación» y añadirse la nota para «lo que hay entre ellos / en ellos». La nota actual sobre «oigan» no corresponde al aparato inglés y no hace falta.
