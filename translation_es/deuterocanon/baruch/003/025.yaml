    rationale: El griego significa ‘inmedible / inconmensurable’. En español contemporáneo, «imponderable» normalmente no comunica medida sino valoración, importancia o un factor imprevisible; por tanto puede desviar el sentido fuente.
  - severity: medium
    issue: La nota literal propuesta usa «alta», introduciendo femenino/género no presente en el verso español principal.
    rationale: Aunque el referente contextual es Sabiduría, la línea griega es elíptica y el texto principal correctamente evita explicitar sujeto. La nota debe conservar esa misma economía y no añadir una marcación gramatical innecesaria.
