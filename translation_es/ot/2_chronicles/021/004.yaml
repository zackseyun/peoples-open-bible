translation:
  language: es
  text: Entonces, cuando Joram ascendió al reino de su padre y se fortaleció[a], mató a todos sus hermanos con la espada, y también a algunos de los príncipes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortaleció su posición». El hebreo puede referirse tanto a fortalecerse personalmente como a consolidar el poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: had risen / rose over
  chosen_spanish: llegó al reino
  alternatives_spanish:
  - subió al reino
  - accedió al reino
  - se levantó sobre el reino
  lexicon: HALOT
  rationale: En contexto real, קום con עַל expresa acceso al gobierno. En español, «llegó al reino» comunica la entrada al ejercicio real sin introducir una imagen extraña de «levantarse sobre».
- source_word: עַל מַמְלֶכַת אָבִיו
  english_pob_choice: over his father's kingdom / to his father's kingdom
  chosen_spanish: al reino de su padre
  alternatives_spanish:
  - sobre el reino de su padre
  - al reino de su padre
  - en el reino de su padre
  lexicon: HALOT
  rationale: La preposición עַל aquí marca relación de dominio/ascenso. «Al reino de su padre» es natural en español y conserva la idea de acceso a la realeza heredada.
- source_word: וַיִּתְחַזַּק
  english_pob_choice: had strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se hizo fuerte
  - se afianzó
  - fortaleció su posición
  lexicon: HALOT
  rationale: El hitpael es reflexivo; «se fortaleció» preserva esa fuerza sin especificar de más si el fortalecimiento fue político, militar o interno.
- source_word: וַיַּהֲרֹג
  english_pob_choice: he killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - asesinó
  - hizo morir
  lexicon: HALOT
  rationale: «Mató» es el equivalente moderno más directo y fiel al valor narrativo del verbo.
- source_word: אֶת כָּל אֶחָיו
  english_pob_choice: all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus hermanos varones
  - a todos sus hermanos y hermanas
  - a toda su parentela
  lexicon: HALOT
  rationale: El hebreo especifica hermanos varones; en español, «sus hermanos» conserva el sentido y el pronombre posesivo mantiene la referencia familiar.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con espada
  alternatives_spanish:
  - a filo de espada
  - con la espada
  - por la espada
  lexicon: HALOT
  rationale: La fórmula idiomática hebrea se expresa de modo natural en español con «con espada», sin perder el instrumento de ejecución violenta.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  - y aun
  lexicon: HALOT
  rationale: La partícula añade otro grupo a los hermanos; «y también» refleja esa suma con claridad.
- source_word: מִשָּׂרֵי יִשְׂרָאֵל
  english_pob_choice: some of the princes of Israel
  chosen_spanish: a algunos de los príncipes de Israel
  alternatives_spanish:
  - a algunos de los oficiales de Israel
  - a algunos de los líderes de Israel
  - a parte de los príncipes de Israel
  lexicon: HALOT
  rationale: El prefijo מִן es partitivo, por eso se expresa «a algunos de». «Príncipes» mantiene el matiz cortesano/administrativo que la POB inglesa conservó, sin resolver la ambigüedad de oficio frente a nobleza.
theological_decisions:
- issue: Referente de «Israel» en «príncipes de Israel»
  english_pob_reading: Retain 'Israel' as written without narrowing it to 'Judah' or paraphrasing it as 'the nation.'
  chosen_spanish_reading: Conservar «Israel» sin reducirlo a «Judá» ni expandirlo a «la nación».
  alternative_spanish_readings:
  - príncipes de Judá
  - líderes de la nación
  rationale: Crónicas usa «Israel» en sentidos amplios y a veces tensionados dentro de contextos de Judá. Mantener el término preserva esa tensión histórica y teológica en vez de resolverla por paráfrasis.
  doctrine_reference: Preservar la tensión textual e histórica sin armonización interpretativa excesiva.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo base con la misma secuencia narrativa: ascenso al reino, fortalecimiento reflexivo, قتل de los hermanos y adición partitiva de algunos príncipes. Se incorporó la lectura narrativa inicial con «Entonces» para reflejar el waw consecutivo de apertura, siguiendo el criterio auditado de la POB inglesa de hacer la transición narrativa natural sin perder el valor temporal.'
  spanish_consistency_notes:
  - Se emplea «Israel» tal como en el fuente, sin sustituirlo por «Judá».
  - Se eligió «príncipes» por coherencia con la decisión inglesa y para mantener el matiz de rango/autoridad.
  - «Se fortaleció» conserva la reflexividad del hebreo y evita sobredeterminar la naturaleza del fortalecimiento.
