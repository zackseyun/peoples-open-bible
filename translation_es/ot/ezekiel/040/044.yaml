base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/044.yaml
  text: And outside the inner gate were chambers for singers in the inner court[a], which were beside the side of the north gate, with their front toward the south; one was beside the side of the east gate[c][b], facing toward the north.
  footnotes:
  - marker: a
    text: Or 'beside the side of the north gate.' The Hebrew uses 'shoulder' metaphorically for the side or flank of a structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'beside the side of the east gate.' The Hebrew again uses 'shoulder' for the side of the gate structure.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew text of this verse is syntactically compressed, and some translations smooth the layout description differently; the sense is that singer-chambers stood in the inner court near the north and east gates, with opposite orientations southward and northward.
    reason: alternative_reading
