    rationale: El audit trail prioriza 'did not catch' con alternativas de 'seize/overtake'; en español 'no encontraron' puede reducirse a mera ausencia de hallazgo, mientras el contexto sugiere que no lograron alcanzarlo o atraparlo.
  - severity: medium
