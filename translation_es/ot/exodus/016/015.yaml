translation:
  language: es
  text: 'Cuando los hijos de Israel lo vieron, se dijeron unos a otros[a]: «¿Qué es?[b]»; pues no sabían qué era. Y Moisés les dijo: «Es el pan que Yahvé les ha dado para comer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un hombre a su hermano». Es un modismo que significa que se lo dijeron unos a otros.'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea detrás de «¿Qué es?» se relaciona tradicionalmente con el nombre «maná».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la estructura genealógica del hebreo con una forma natural en español. «Hijos de Israel» refleja mejor el constructo original que «israelitas», aunque esta última sería una alternativa más fluida.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno a su hermano
  - un hombre a su hermano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no debe leerse literalmente como parentesco físico. «Unos a otros» comunica el sentido recíproco de manera natural en español, manteniendo la referencia idiomática del original.
- source_word: מָן הוּא
  english_pob_choice: What is it?
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué es?
  - ¿Qué es eso?
  - maná
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual interrogativa: la frase expresa la pregunta del pueblo, no un nombre propio en la línea principal. «¿Qué es esto?» es idiomático en español y conserva la tensión con la explicación inmediata de que no sabían qué era.'
- source_word: לֹא יָדְעוּ מַה הוּא
  english_pob_choice: they did not know what it was
  chosen_spanish: no sabían qué era
  alternatives_spanish:
  - no sabían qué era esto
  - no sabían qué fuese
  lexicon: HALOT
  rationale: La cláusula explicativa pide una traducción directa. «No sabían qué era» mantiene el contenido cognitivo sin sobrecargar el español con una calca.
- source_word: הוּא הַלֶּחֶם
  english_pob_choice: It is the bread
  chosen_spanish: Es el pan
  alternatives_spanish:
  - Es el pan aquel
  - Esto es el pan
  lexicon: HALOT
  rationale: «Pan» es la forma natural y bíblicamente adecuada en español para la comida básica entregada por Dios; la identificación con el sustantivo definido conserva la estructura del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Sigo el estándar del proyecto para el Tetragrámaton. «Yahvé» es la forma española establecida aquí para preservar el nombre divino en vez de sustituirlo por un título.
- source_word: לְאָכְלָה
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - para ser comido
  - como alimento
  lexicon: HALOT
  rationale: La construcción final expresa propósito. «Para comer» reproduce con naturalidad la función del infinitivo y evita introducir una paráfrasis más amplia que el hebreo no exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Nombre del pacto. Mantenerlo en español como «Yahvé» sigue la convención del proyecto y evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de מָן הוּא como pregunta y no como nombre propio en el cuerpo principal
  english_pob_reading: 'Translate the phrase contextually as an interrogative: ''What is it?'''
  chosen_spanish_reading: «¿Qué es esto?»
  alternative_spanish_readings:
  - maná
  - ¿Qué es?
  - ¿Qué es eso?
  rationale: La narración explica que el pueblo no sabía qué era; por eso la frase debe conservarse como pregunta. La tradición de «maná» queda implícita, pero no debe adelantarse como si el texto ya estuviera nombrando el alimento.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and source-first naming'
- issue: Referencia a la reciprocidad de habla en אִישׁ אֶל אָחִיו
  english_pob_reading: to one another
  chosen_spanish_reading: unos a otros
  alternative_spanish_readings:
  - cada uno a su hermano
  - un hombre a su hermano
  rationale: La idea no es una afirmación sobre hermanos literales, sino una acción recíproca. «Unos a otros» preserva ese valor idiomático sin perder la fuerza del hebreo.
  doctrine_reference: 'DOCTRINE.md: preserve idiom where literalness would mislead'
translation_notes:
  revision_awareness: 'El contexto inglés POB ya fijó una lectura de alta concordancia: mantener el Nombre divino como Yahweh/Yahvé, entender מָן הוּא como pregunta contextual y conservar el sentido idiomático de אִישׁ אֶל אָחִיו. La presente versión sigue esas decisiones sin añadir variantes textuales ni reinterpretaciones doctrinales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - «Pan» se mantuvo como sustantivo simple, sin introducir «alimento» o «provisión», porque el hebreo dice literalmente «el pan».
  - La pregunta principal se tradujo de forma interrogativa para reflejar el juego de sentido del original y no convertir prematuramente la frase en el nombre «maná».
  - El español fluye de manera publicable, pero sigue de cerca el orden y las relaciones lógicas del hebreo cuando eso aporta transparencia al texto.
