revisions:
- from: Así que me levanté y salí al valle[a]; y he aquí que allí estaba la gloria de Yahvé, de pie, como la gloria que yo había visto junto al río Quebar; y caí sobre mi rostro.
  to: Entonces me levanté y salí al valle[a]; y he aquí que allí estaba la gloria de Yahvé, como la gloria que yo había visto junto al río Quebar; y caí rostro en tierra.
  rationale: Se ajusta el inicio a «Entonces» para un avance narrativo más natural; se elimina la construcción forzada «de pie» tras «estaba la gloria de Yahvé», preservando la descripción de presencia manifiesta sin español torpe; y se reemplaza «caí sobre mi rostro» por «caí rostro en tierra», que comunica con mayor claridad y dignidad la postración ante la gloria divina. La nota léxica se conserva con leve pulido de puntuación.
