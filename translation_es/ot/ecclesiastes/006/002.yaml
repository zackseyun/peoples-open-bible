  to: Hay un hombre a quien Dios da riqueza, posesiones y honor, y no le falta nada para sí de todo lo que desea; pero Dios no le concede comer de ellos, porque un extranjero[a] los come. Esto es vanidad y un mal grave.
  rationale: Se corrigió el anclaje de la nota al lugar correspondiente a אִישׁ נָכְרִי y se ajustaron los pronombres a plural para una referencia más natural en español al conjunto de bienes, sin perder la imagen concreta de 'comer'.
