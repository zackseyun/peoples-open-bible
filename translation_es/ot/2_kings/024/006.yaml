- from: Y Joacim[?] durmió con sus padres[a], y Joaquín, su hijo, reinó en su lugar.
  to: Y Joacim durmió con sus padres[a], y Joaquín, su hijo, llegó a ser rey en su lugar.
  rationale: Se elimina la marca editorial residual en el nombre propio y se ajusta «reinó» a «llegó a ser rey» para reflejar mejor el matiz de sucesión/entronización de וַיִּמְלֹךְ, en línea con la evidencia fuente y el razonamiento del POB en inglés. Se conserva la fórmula idiomática «durmió con sus padres» con la misma nota explicativa, porque el hebreo no explicita entierro y la traducción no debe añadirlo.
