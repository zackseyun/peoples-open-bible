    rationale: El hebreo usa una construcción cognada enfática. Aunque no debe calcarse torpemente, conviene una formulación española más fuerte, como «sintió un deseo intenso», que preserve mejor el énfasis auditado.
  - severity: medium
    issue: «¿Quién nos dará carne?» no refleja suficientemente el hiphil de אכל.
    rationale: La pregunta no es solo por recibir carne sino por ser alimentados con carne. «¿Quién nos dará de comer carne?» mantiene la naturalidad del español y el sentido causativo de יַאֲכִלֵנוּ mejor que «nos dará carne».
