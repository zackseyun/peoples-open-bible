- from: Según la cantidad que hagáis, así haréis[a] por cada uno según su cantidad.
  to: Según el número que harán[a], así harán para cada uno según su número.
  rationale: Se reemplaza «cantidad» por «número» para reflejar mejor מִסְפָּר en ambas ocurrencias, se ajusta «por cada uno» a «para cada uno» por naturalidad distributiva en español, y se conserva la amplitud de עשה con «harán», manteniendo en nota la alternativa contextual «preparen/prepararán» documentada por el English POB. No se requiere adjudicación adicional.
