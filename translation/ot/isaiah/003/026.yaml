theological_decisions:
- issue: Referent of the feminine singular subject
  chosen_reading: The feminine subject is personified daughter Zion/Jerusalem continuing from the surrounding context.
  alternative_readings:
  - A generic feminine city figure
  rationale: The verse concludes the oracle against the daughters of Zion and the city imagery of Jerusalem. Rendering with 'her' and 'she' preserves the personification without over-specifying beyond the context.
