translation:
  language: es
  text: 'Los hijos de Isacar según sus clanes: de Tola, el clan de los tolaítas; de Puva[a], el clan de los punitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En pasajes relacionados, este nombre aparece con la grafía «Puá».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי / sons of
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En contextos genealógicos y censales, בְּנֵי introduce la descendencia tribual. «Los hijos de» conserva la estructura formal del hebreo y encaja con la lista censal sin perder claridad en español.
- source_word: יִשָּׂשכָר / Issachar
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issachar
  lexicon: HALOT
  rationale: Nombre propio tribal. En español bíblico es inteligible «Isacar»; se conserva la transliteración adaptada y no se traduce.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí designa subdivisiones tribales en un registro censal. «Por sus clanes» refleja bien ese valor organizativo y evita el término más general «familias».
- source_word: תּוֹלָע
  english_pob_choice: Tola
  chosen_spanish: Tola
  alternatives_spanish:
  - Tolá
  lexicon: HALOT
  rationale: Nombre propio. Se mantiene la transliteración del nombre del antepasado/clan.
- source_word: מִשְׁפַּחַת הַתּוֹלָעִי
  english_pob_choice: the clan of the Tolaites
  chosen_spanish: el clan de los tolaítas
  alternatives_spanish:
  - la familia del tolaíta
  lexicon: HALOT
  rationale: El adjetivo gentilicio indica el clan derivado de Tola. En español, el plural colectivo «tolaítas» reproduce naturalmente el valor de clan, mientras que «familia del tolaíta» suena menos idiomático en una fórmula censal.
- source_word: לְפֻוָה
  english_pob_choice: of Puvah
  chosen_spanish: de Puvá
  alternatives_spanish:
  - de Puá
  lexicon: HALOT
  rationale: La forma consonántica y vocálica de este versículo favorece «Puvá». Mantenerla distingue esta grafía de la variante tradicional «Puá», documentada en pasajes relacionados.
- source_word: מִשְׁפַּחַת הַפּוּנִי
  english_pob_choice: the clan of the Punites
  chosen_spanish: el clan de los punitas
  alternatives_spanish:
  - la familia del punita
  lexicon: HALOT
  rationale: El gentilicio funciona como nombre colectivo de clan. «Punitas» conserva el paralelo formal con «tolaítas» y refleja el patrón censal repetido.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al nombre propio en el texto mediante [a]. La redacción mantiene la fórmula censal del hebreo y la decisión léxica sobre la variante Puvá/Puá queda explicitada sin añadir otra nota no anclada.
  spanish_consistency_notes:
  - Se mantuvo «clan» para מִשְׁפָּחָה, en línea con el valor censal del pasaje.
  - 'Se conservaron nombres propios transliterados/adaptados de manera consistente: Isacar, Tola, Puvá.'
  - El plural colectivo «tolaítas» y «punitas» reproduce el paralelo del hebreo y la solución del POB en inglés.
  - No se introdujeron términos eclesiásticos ajenos al registro genealógico/censal del versículo.
