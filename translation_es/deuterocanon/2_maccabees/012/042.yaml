translation:
  language: es
  text: Se volvieron a la súplica, pidiendo que el pecado cometido fuera completamente borrado. Pero el noble Judas exhortó a la multitud a mantenerse libres de pecado[a], pues habían visto con sus propios ojos lo que había sucedido por el pecado de los que habían caído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantenerse sin pecado» / «conservarse sin pecado». El adjetivo griego puede traducirse más literalmente, pero la redacción principal usa una expresión más idiomática en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἱκεσίαν ἐτράπησαν
  english_pob_choice: they turned to supplication
  chosen_spanish: Se volvieron a la súplica
  alternatives_spanish:
  - Acudieron a la súplica
  - Se volvieron a la oración
  lexicon: LSJ
  rationale: ἱκεσία expresa una petición solemne y apremiante; «súplica» conserva ese matiz mejor que el más general «oración». «Se volvieron» reproduce bien el giro idiomático de ἐτράπησαν sin sonar forzado en español.
- source_word: ἀξιώσαντες
  english_pob_choice: asking
  chosen_spanish: pidiendo
  alternatives_spanish:
  - suplicando
  - solicitando
  lexicon: LSJ
  rationale: El participio introduce el contenido de la petición. «Pidiendo» es natural en español y no intensifica más de lo que el griego exige.
- source_word: τὸ γεγονὸς ἁμάρτημα
  english_pob_choice: the sin that had been committed
  chosen_spanish: el pecado cometido
  alternatives_spanish:
  - el pecado que había sido cometido
  - el pecado ocurrido
  lexicon: LSJ
  rationale: El participio perfecto γεγονός presenta el pecado como un hecho ya realizado. «Pecado cometido» conserva esa idea de acto consumado con una forma concisa y clara.
- source_word: τελείως ἐξαλειφθῆναι
  english_pob_choice: might be completely blotted out
  chosen_spanish: fuera completamente borrado
  alternatives_spanish:
  - fuera totalmente borrado
  - fuera completamente borrado de la memoria
  lexicon: LSJ
  rationale: ἐξαλείφω puede significar borrar o borrar por completo; en español «borrado» comunica bien la remoción total. «Completamente» refleja τελείως sin añadir matiz doctrinal extra.
- source_word: ὁ δὲ γενναῖος Ἰούδας
  english_pob_choice: But the noble Judas
  chosen_spanish: Pero el noble Judas
  alternatives_spanish:
  - Pero Judas, el noble
  - Pero el valiente Judas
  lexicon: LSJ
  rationale: γενναῖος puede ser «noble» o «valiente». Aquí funciona como caracterización honorífica; «noble» preserva el tono moral y heroico a la vez.
- source_word: παρεκάλεσε τὸ πλῆθος
  english_pob_choice: urged the multitude
  chosen_spanish: exhortó a la multitud
  alternatives_spanish:
  - animó a la multitud
  - instó a la multitud
  lexicon: LSJ
  rationale: παρακαλέω aquí es exhortativo. «Exhortó» conserva el tono persuasivo y solemne; «multitud» refleja τὸ πλῆθος como colectivo presente.
- source_word: συντηρεῖν αὐτοὺς ἀναμαρτήτους εἶναι
  english_pob_choice: to keep themselves free from sin
  chosen_spanish: a mantenerse libres de pecado
  alternatives_spanish:
  - a conservarse sin pecado
  - a guardarse sin pecado
  lexicon: LSJ
  rationale: Ἀναμαρτήτους puede traducirse más literalmente como «sin pecado», pero en español «libres de pecado» transmite mejor la exhortación ética sin sugerir impecabilidad absoluta. «Mantenerse» refleja la idea de sostener esa condición.
- source_word: ὑπʼ ὄψιν ἑωρακότας
  english_pob_choice: since they had seen before their eyes
  chosen_spanish: pues habían visto con sus propios ojos
  alternatives_spanish:
  - ya que habían visto ante sus ojos
  - porque habían visto claramente
  lexicon: LSJ
  rationale: La expresión subraya experiencia directa y visible. «Con sus propios ojos» es idiomático en español y preserva la vividez del original.
- source_word: τὰ γεγονότα
  english_pob_choice: the things that had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - los acontecimientos
  - las cosas que habían sucedido
  lexicon: LSJ
  rationale: El sustantivado neutro plural requiere una forma natural en español. «Lo que había sucedido» resume adecuadamente el referente sin perder el carácter de hechos visibles.
- source_word: διὰ τὴν τῶν προπεπτωκότων ἁμαρτίαν
  english_pob_choice: because of the sin of those who had fallen
  chosen_spanish: por el pecado de los que habían caído
  alternatives_spanish:
  - a causa del pecado de los que habían caído
  - por la culpa de los caídos
  lexicon: LSJ
  rationale: προπεπτωκότων alude a los que habían caído, con probable referencia a caída en batalla o muerte. «Los que habían caído» conserva esa fuerza contextual y mantiene explícita la relación causal con el pecado.
theological_decisions:
- issue: ἀναμαρτήτους y el alcance moral de la exhortación
  english_pob_reading: Rendered as 'free from sin' rather than 'sinless.'
  chosen_spanish_reading: «mantenerse libres de pecado» en vez de «sin pecado» o «sin pecado alguno» como formulación principal.
  alternative_spanish_readings:
  - sin pecado
  - sin pecado alguno
  - sin pecado por completo
  rationale: El griego exhorta a evitar el tipo de transgresión que trajo juicio, no a afirmar una impecabilidad absoluta. «Libres de pecado» comunica la intención ética sin importar una doctrina de perfección sin pecado.
  doctrine_reference: Translation philosophy §6; preservar el sentido moral sin sobredeterminar la antropología.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y el control cruzado la considera en alto acuerdo; la redacción española sigue esa misma lectura estable, procurando naturalidad sin perder los matices léxicos ni la tensión moral de ἀναμαρτήτους.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene «Judas» como nombre propio y «noble» para γενναῖος, evitando sustituirlo por «valiente» en el texto principal porque el audit trail prioriza el matiz honorífico.
  - «Súplica» conserva el tono de petición solemne de ἱκεσία y evita rebajar el registro a una simple «oración».
  - «Libres de pecado» evita tanto el tecnicismo eclesial como la idea de impecabilidad absoluta.
