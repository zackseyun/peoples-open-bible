translation:
  language: es
  text: Los pobres y los necesitados buscan agua, pero no hay; su lengua se seca por la sed. Yo, Yahvé, les responderé; yo, el Dios de Israel, no los abandonaré.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: הָעֲנִיִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los afligidos
  - los humildes
  lexicon: HALOT
  rationale: עֲנִי puede abarcar pobreza, aflicción u opresión. En este paralelismo con אֶבְיוֹנִים, el sentido socioeconómico es el más visible; por eso 'los pobres' preserva mejor la pareja semántica sin espiritualizarla indebidamente.
- source_word: וְהָאֶבְיוֹנִים
  english_pob_choice: and needy
  chosen_spanish: y los necesitados
  alternatives_spanish:
  - y los desposeídos
  - y los indigentes
  lexicon: HALOT
  rationale: אֶבְיוֹן designa a quien está en necesidad o carencia. 'Necesitados' mantiene la distinción respecto de 'pobres' y suena natural en español contemporáneo.
- source_word: מְבַקְשִׁים מַיִם
  english_pob_choice: seek water
  chosen_spanish: buscan agua
  alternatives_spanish:
  - están buscando agua
  - buscan agua
  lexicon: HALOT
  rationale: El participio expresa acción continua; en español, el presente simple en estilo poético comunica esa búsqueda persistente de manera clara y natural.
- source_word: וָאַיִן
  english_pob_choice: but there is none
  chosen_spanish: y no hay ninguna
  alternatives_spanish:
  - pero no hay ninguna
  - y no hay agua
  lexicon: HALOT
  rationale: La expresión hebrea marca inexistencia de lo buscado. 'Y no hay ninguna' conserva la negación absoluta y evita agregar una palabra innecesaria si el contexto ya menciona 'agua'.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - sus lenguas
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con sufijo plural. En español, el singular 'su lengua' mantiene la imagen corporal intensa y concuerda con el uso poético.
- source_word: בַּצָּמָא
  english_pob_choice: with thirst
  chosen_spanish: por la sed
  alternatives_spanish:
  - de sed
  - a causa de la sed
  lexicon: HALOT
  rationale: La preposición expresa circunstancia o condición. 'Por la sed' suena natural con 'se seca' y conserva la causa del desecamiento.
- source_word: נָשָׁתָּה
  english_pob_choice: is parched
  chosen_spanish: se seca
  alternatives_spanish:
  - está seca
  - se ha secado
  lexicon: HALOT
  rationale: El verbo comunica secarse, quedar reseca o desecarse. 'Se seca' reproduce bien el proceso y funciona de forma idiomática con 'lengua' en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: El texto fuente usa directamente el Tetragrámaton. En la línea doctrinal del proyecto, se vierte como 'Yahvé' en el texto principal, manteniendo el nombre del pacto en lugar de una sustitución reverencial.
- source_word: אֶעֱנֵם
  english_pob_choice: will answer them
  chosen_spanish: les responderé
  alternatives_spanish:
  - les contestaré
  - les responderé
  lexicon: HALOT
  rationale: ענה aquí significa responder a una necesidad o clamor. 'Les responderé' es claro y conserva el valor relacional y de intervención divina.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: I, the God of Israel
  chosen_spanish: yo, el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - yo, Dios de Israel
  lexicon: HALOT
  rationale: 'La frase está en aposición a la autodeclaración divina. Repetir ''yo'' en español conserva el énfasis del hebreo: ''Yo, Yahvé... yo, el Dios de Israel...''.'
- source_word: לֹא אֶעֶזְבֵם
  english_pob_choice: will not forsake them
  chosen_spanish: no los abandonaré
  alternatives_spanish:
  - no los dejaré
  - no los abandonaré
  lexicon: HALOT
  rationale: עָזַב puede ser dejar, abandonar o desamparar. 'Abandonaré' comunica bien la fuerza relacional y de compromiso del verbo en un registro natural para español.
theological_decisions:
- issue: El nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El audit trail en inglés documenta la decisión de traducir el Tetragrámaton como 'Yahweh'. En español, la forma correspondiente y de uso académico-comunitario del proyecto es 'Yahvé', preservando el nombre propio del pacto sin masking reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la lectura final coincide con la última pasada revisada y con el resumen de alta concordancia.
  spanish_consistency_notes:
  - He mantenido 'Yahvé' de forma coherente con la directriz del proyecto para יְהוָה.
  - Conservé el paralelismo 'los pobres / los necesitados' para reflejar el binomio hebreo עֲנִיִּים / אֶבְיוֹנִים.
  - La imagen corporal de la lengua reseca se mantuvo sin suavizarla, porque forma parte de la fuerza poética del verso.
