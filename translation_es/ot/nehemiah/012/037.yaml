  text: וְ/עַל֩ שַׁ֨עַר הָ/עַ֜יִן וְ/נֶגְדָּ֗/ם עָלוּ֙ עַֽל מַעֲלוֹת֙ עִ֣יר דָּוִ֔יד בַּֽ/מַּעֲלֶ֖ה לַ/חוֹמָ֑ה מֵ/עַל֙ לְ/בֵ֣ית דָּוִ֔יד וְ/עַ֛ד שַׁ֥עַר הַ/מַּ֖יִם מִזְרָֽח־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/037.yaml
  text: And by the Fountain Gate[a], in front of them, they went up by the stairs of the city of David, at the ascent of the wall, above the house of David[b], and as far as the Water Gate on the east.
  footnotes:
  - marker: a
    text: Or 'the Spring Gate.' The Hebrew term for 'fountain' can also denote a spring or source of water.
    reason: lexical_alternative
  - marker: b
    text: Or 'the steps of the city of David.' The Hebrew may refer either to stairs as a built structure or, more broadly, to ascents.
    reason: lexical_alternative
