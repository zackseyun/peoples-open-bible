revisions:
- from: Y Jacob separó los corderos[a], y puso las caras del rebaño hacia los listados y todos los oscuros[b] entre el rebaño de Laban. Luego apartó rebaños para sí, y no los puso con el rebaño de Laban.
  to: Y Jacob separó los corderos[a], y puso el rebaño de cara a los listados y a todos los oscuros[b] entre el rebaño de Labán[c]. Luego apartó rebaños para sí, y no los puso con el rebaño de Labán.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro de auditoría del POB: «puso el rebaño de cara a» comunica mejor la orientación de פְּנֵי הַצֹּאן que la calca «las caras del rebaño»; se normalizó «Labán» con tilde; y se añadió una nota c para conservar la alternativa documentada en inglés sobre la frase referente al rebaño de Labán.'
  reviewer_model: gpt-5.4
