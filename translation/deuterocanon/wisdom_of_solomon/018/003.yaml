translation:
  text: Instead of these things[a], you provided a pillar blazing with fire, both as a guide for an unknown journey and as a harmless sun for their honored exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a noble sojourn in a foreign land.' The Greek φιλοτίμου ξενιτείας is difficult and may emphasize the dignity of Israel's life abroad rather than exile in a strictly negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  chosen: Instead of these things
  alternatives:
  - In return for which
  - Instead of which
  lexicon: LSJ
  rationale: Introduces a contrast with what preceded. 'Instead of these things' is idiomatic English and preserves the adversative-recompensive force without over-specifying the referent.
- source_word: πυριφλεγῆ στῦλον
  chosen: a pillar blazing with fire
  alternatives:
  - a fiery pillar
  - a fire-blazing pillar
  lexicon: LSJ
  rationale: The compound adjective intensifies the image beyond merely 'fiery.' 'A pillar blazing with fire' preserves the vividness and alludes naturally to the wilderness pillar tradition.
- source_word: ὁδηγόν
  chosen: as a guide
  alternatives:
  - a leader
  - one who leads
  lexicon: LSJ
  rationale: In apposition to 'pillar,' it describes function. 'Guide' is the most natural English equivalent in travel context.
- source_word: ἀγνώστου ὁδοιπορίας
  chosen: for an unknown journey
  alternatives:
  - for a journey through unknown places
  - for unfamiliar travel
  lexicon: LSJ
  rationale: Genitive construction describing the journey as unknown/unfamiliar. 'Unknown journey' is concise and preserves the sense of traveling a route not previously known.
- source_word: ἥλιον
  chosen: sun
  alternatives:
  - light
  lexicon: LSJ
  rationale: The text explicitly says 'sun,' not merely 'light'; the metaphor should be retained.
- source_word: ἀβλαβῆ
  chosen: harmless
  alternatives:
  - without harm
  - unharming
  - safe
  lexicon: LSJ
  rationale: Contrasts with the destructive darkness/plagues on the Egyptians. 'Harmless' is clear modern English and preserves the adjective's force.
- source_word: φιλοτίμου ξενιτείας
  chosen: their honored exile
  alternatives:
  - their noble sojourn
  - their glorious foreign stay
  - their ambitious exile
  lexicon: LSJ
  rationale: ξενιτεία denotes life in a foreign land / exile / sojourn abroad. φιλοτίμου literally suggests honor-loving or noble, here characterizing the exile/sojourn positively. 'Honored exile' best captures the elevated valuation without importing modern psychological nuance from 'ambitious.'
- source_word: παρέσχες
  chosen: you provided
  alternatives:
  - you supplied
  - you granted
  lexicon: LSJ
  rationale: Direct address to God with aorist verb of furnishing/providing. 'Provided' is natural and suitably dignified.
