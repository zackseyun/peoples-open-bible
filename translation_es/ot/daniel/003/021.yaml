base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/021.yaml
  text: Then these men were bound in their trousers[a], their tunics, their cloaks, and their other garments[b], and they were thrown into the midst of the blazing furnace.
  footnotes:
