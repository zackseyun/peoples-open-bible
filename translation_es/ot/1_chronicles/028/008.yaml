translation:
  language: es
  text: Y ahora, a los ojos de todo Israel, la asamblea de Yahvé, y a oídos de nuestro Dios, guarden y busquen todos los mandamientos de Yahvé su Dios, para que posean[a] la buena tierra y la dejen en herencia a sus hijos[b] después de ustedes para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hereden la buena tierra’. El verbo hebreo puede expresar heredar o poseer, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘hijos’; el término es masculino plural, no el más general ‘hijos e hijas’ o ‘descendientes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el giro discursivo y el enlace con la exhortación anterior; en español, ‘Y ahora’ reproduce mejor la fuerza conectiva de ‘And now’.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente visual y pública. ‘A los ojos de’ mantiene el valor idiomático de testimonio público sin sonar forzado en español.
- source_word: קְהַל יְהוָה
  english_pob_choice: the assembly of Yahweh
  chosen_spanish: la asamblea de Yahvé
  alternatives_spanish:
  - la congregación de Yahvé
  - la reunión de Yahvé
  lexicon: HALOT
  rationale: ‘קהל’ designa un grupo reunido; ‘asamblea’ es claro y solemne en español y evita sustituirlo por un término eclesiástico más cargado que el hebreo.
- source_word: וּבְאָזְנֵי אֱלֹהֵינוּ
  english_pob_choice: and in the hearing of our God
  chosen_spanish: y a oídos de nuestro Dios
  alternatives_spanish:
  - y en la presencia de nuestro Dios
  - y en el oído de nuestro Dios
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y antropomórfica. ‘A oídos de nuestro Dios’ conserva la imagen original con naturalidad en español.
- source_word: שִׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  lexicon: HALOT
  rationale: En contexto de mandamientos, ‘guardar’ reproduce bien el sentido covenantal de atender y cumplir fielmente.
- source_word: וְדִרְשׁוּ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen después de
  - inquieran
  lexicon: HALOT
  rationale: Aquí no es búsqueda intelectual, sino dedicación activa a los mandamientos; ‘busquen’ conserva ese impulso volitivo.
- source_word: כָּל מִצְוֺת
  english_pob_choice: all the commandments
  chosen_spanish: todos los mandamientos
  alternatives_spanish:
  - cada uno de los mandamientos
  - todas las órdenes
  lexicon: HALOT
  rationale: La pluralidad completa del hebreo se expresa con naturalidad en español como ‘todos los mandamientos’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ‘Yahvé’, preservando el nombre del pacto en lugar de sustituirlo por una convención de ocultamiento.'
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: En español rioplatense y amplia lectura eclesial, ‘su Dios’ comunica la relación posesiva plural sin marcar voseo peninsular.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: Introduce finalidad de modo claro y natural en español.
- source_word: תִּירְשׁוּ
  english_pob_choice: may possess
  chosen_spanish: posean
  alternatives_spanish:
  - hereden
  - tomen posesión de
  lexicon: HALOT
  rationale: ‘ירשׁ’ puede ser heredar o poseer según contexto. Aquí, con ‘la buena tierra’, ‘posean’ expresa la tenencia efectiva y la continuidad del don sin reducirlo a conquista inicial.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - la tierra fértil
  lexicon: HALOT
  rationale: Es una fórmula bíblica reconocible y directa; ‘buena tierra’ preserva literalidad y resonancia covenantal.
- source_word: וְהִנְחַלְתֶּם
  english_pob_choice: and leave it as an inheritance
  chosen_spanish: y la dejen en herencia
  alternatives_spanish:
  - y se la hereden
  - y la transmitan como herencia
  lexicon: HALOT
  rationale: El causativo de נחל pide la idea de hacer heredar. ‘La dejen en herencia’ comunica bien ese sentido en español natural.
- source_word: לִבְנֵיכֶם
  english_pob_choice: to your sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos hombres
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘a sus hijos/sons’, en este contexto la frase española ‘sus hijos’ puede sonar más fluida para la herencia generacional; se deja constancia en la decisión teológica del dato masculino explícito del hebreo.
- source_word: אַחֲרֵיכֶם
  english_pob_choice: after you
  chosen_spanish: después de ustedes
  alternatives_spanish:
  - tras ustedes
  - después de su tiempo
  lexicon: HALOT
  rationale: Refiere a la siguiente generación; ‘después de ustedes’ es idiomático y claro.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  lexicon: HALOT
  rationale: Equivale naturalmente al idiomático hebreo de duración indefinida y duradera.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene ‘Yahvé’ conforme al estándar del proyecto, preservando el nombre del pacto y evitando una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered descendant term בנים
  english_pob_reading: sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus descendientes
  rationale: El hebreo es masculino plural y la POB inglesa documentó ese dato. En el texto español se opta por ‘sus hijos’ para legibilidad, dejando la precisión masculina explícita en las decisiones léxicas y teológicas.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el único marcador de nota, [a], aparezca exactamente en el texto español. No se incluyen notas sin anclaje en el texto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Nombre divino, coherente con los estándares del proyecto.
  - Se evita ‘SEÑOR’ como máscara del Tetragrámaton.
  - 'El orden sintáctico reproduce la secuencia retórica del hebreo: llamado público, mandato, propósito y herencia generacional.'
  - Se conserva el valor plural de las exhortaciones con verbos en segunda persona plural.
  - La frase ‘sus hijos’ se mantiene en un registro legible; la nota teológica y léxica registra que el hebreo dice literalmente ‘sons’.
