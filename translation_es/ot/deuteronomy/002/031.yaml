translation:
  language: es
  text: 'Yahvé me dijo: «Mira, he comenzado a entregar a Sijón y su tierra en tus manos[a]. Comienza a tomar posesión[b] de su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «delante de ti». La expresión significa aquí que Yahvé pone a Sijón y su tierra bajo tu poder.
    reason: lexical_alternative
  - marker: b
    text: O «Comienza a poseer, a tomar posesión de su tierra». El hebreo repite el mismo verbo para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre del pacto aparece explícitamente en hebreo; se conserva como nombre propio «Yahvé» según la convención del proyecto, en vez de sustituirlo por un título. Esto mantiene la transparencia frente al texto fuente.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Mira, observa
  lexicon: HALOT
  rationale: Es un imperativo de atención. «Mira» suena natural en español moderno y conserva el impulso directo del hebreo sin volverse arcaico.
- source_word: הַחִלֹּתִי
  english_pob_choice: I have begun
  chosen_spanish: he comenzado
  alternatives_spanish:
  - he empezado
  - comencé
  lexicon: HALOT
  rationale: El perfecto en discurso directo expresa una acción ya iniciada. «He comenzado» reproduce bien ese valor aspectual y la idea de una acción en curso.
- source_word: תֵּת
  english_pob_choice: to give
  chosen_spanish: entregar
  alternatives_spanish:
  - dar
  - poner en manos
  lexicon: HALOT
  rationale: En este contexto de conquista, el verbo «dar» implica transferencia de control; «entregar» comunica mejor en español la idea de poner algo bajo poder de otro, sin perder la base verbal del hebreo.
- source_word: לְפָנֶיךָ
  english_pob_choice: over to you
  chosen_spanish: en tus manos
  alternatives_spanish:
  - delante de ti
  - ante ti
  lexicon: HALOT
  rationale: Literalmente significa «delante de ti», pero en contexto militar indica poner a alguien a disposición/poder de otro. «En tus manos» transmite esa fuerza idiomática en español natural. La nota preserva la lectura literal.
- source_word: הָחֵל
  english_pob_choice: Begin
  chosen_spanish: Comienza
  alternatives_spanish:
  - Empieza
  lexicon: HALOT
  rationale: 'El imperativo retoma de forma intencional el comienzo divino: Dios ha comenzado a entregar; Israel debe comenzar a actuar. «Comienza» mantiene el paralelismo.'
- source_word: רָשׁ / לָרֶשֶׁת
  english_pob_choice: to take possession
  chosen_spanish: tomar posesión
  alternatives_spanish:
  - poseer
  - apoderarte de
  lexicon: HALOT
  rationale: El verbo de heredar/poseer en Deuteronomio se refiere a tomar control de la tierra. «Tomar posesión» es claro y fiel, y evita la ambigüedad de «poseer».
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su territorio
  - su país
  lexicon: HALOT
  rationale: «Tierra» conserva el sentido territorial y de promesa/campo de dominio que tiene אֶרֶץ en este contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la política del proyecto, para evitar la sustitución por un título y preservar la identidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza idiomática de לְפָנֶיךָ en un contexto de conquista
  english_pob_reading: over to you
  chosen_spanish_reading: en tus manos
  alternative_spanish_readings:
  - delante de ti
  - ante ti
  - a tu disposición
  rationale: La frase hebrea literalmente dice «delante de ti», pero aquí expresa entrega efectiva en poder del destinatario. «En tus manos» hace explícita esa transferencia de control sin perder la tensión militar del pasaje.
  doctrine_reference: Uso contextual de idiomatismos hebreos en textos de conquista
- issue: Repetición verbal para énfasis en הָחֵל / רָשׁ / לָרֶשֶׁת
  english_pob_reading: Begin to take possession of his land
  chosen_spanish_reading: Comienza a tomar posesión de su tierra
  alternative_spanish_readings:
  - Empieza a tomar posesión de su tierra
  - Comienza a poseer su tierra
  rationale: El hebreo repite la raíz para reforzar la acción de apropiación. En español, una sola formulación fluida conserva el mandato sin sonar redundante o forzado.
  doctrine_reference: Retórica hebrea y equivalencia funcional
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se evitó una duplicación pesada equivalente a «poseer, desposeer» y se optó por una sola cláusula natural en español («Comienza a tomar posesión de su tierra»), manteniendo la repetición hebrea de forma implícita y sin sobrecargar la frase.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «Sijón» como transliteración habitual del nombre propio.
  - «Tierra» se emplea para אֶרֶץ en sentido territorial, coherente con el estilo del proyecto.
  - «Tomar posesión» se reserva para el verbo de ocupación/adquisición de tierra, evitando mezclarlo con «poseer» cuando el contexto exige acción concreta.
