review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y mantiene correctamente los nombres Bel/Nebo, el sentido polémico de עֲצַבֵּיהֶם como «ídolos», y la imagen de los ídolos convertidos en carga para animales cansados. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) כָּרַע se vertió como perfecto compuesto («se ha inclinado»), cuando el POB documenta un presente vívido profético; en español conviene «se inclina» para conservar la inmediatez paralela con «se encorva». (2) נְשֻׂאֹתֵיכֶם corresponde al inglés auditado «your loads are borne», pero el borrador dice «Sus cargas», cambiando indebidamente la persona de 2mp a 3mp. También conviene reforzar que la nota a [a] preserve la alternativa del inglés sobre «imágenes», no una alternativa nueva desconectada del sustantivo relevante.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Bel se ha inclinado» suena menos natural en paralelismo profético que «Bel se inclina». «Como un peso» es comprensible, aunque «como una carga» o «como una carga pesada» enlaza mejor con מַשָּׂא y la ironía del verso. «Para el fatigado» es gramatical, pero algo abstracto; el anclaje de nota permite mantenerlo si se aclara la posible referencia al animal exhausto. En conjunto, basta una reparación pequeña para fidelidad y fluidez.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres propios están bien. «Ídolos» concuerda con la decisión teológica documentada. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La principal corrección léxica es de persona pronominal («vuestras cargas», no «sus cargas») y de aspecto/tempo verbal («se inclina», no «se ha inclinado»).
  issues:
