  text: וַ/יֹּ֨אמֶר בָּלָ֜ק אֶל בִּלְעָ֗ם הֲ/לֹא֩ שָׁלֹ֨חַ שָׁלַ֤חְתִּי אֵלֶ֨י/ךָ֙ לִ/קְרֹא לָ֔/ךְ לָ֥/מָּה לֹא הָלַ֖כְתָּ אֵלָ֑/י הַֽ/אֻמְנָ֔ם לֹ֥א אוּכַ֖ל כַּבְּדֶֽ/ךָ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/037.yaml
  text: And Balak said to Balaam[c][b][a], “Did I not indeed send to you to call you? Why did you not come to me? Am I really not able to honor you?”
  footnotes:
  - marker: a
    text: Or 'Did I not certainly send to you,' with the Hebrew using an infinitive absolute plus finite verb for emphasis; some understand the emphasis contextually as repeated or urgent sending.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Why did you not go to me?'
    reason: lexical_alternative
  - marker: c
    text: '''Honor you'' may include the sense of bestowing reward or high status, not merely showing respect.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
