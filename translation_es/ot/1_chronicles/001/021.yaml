  - Hadoram, y Uzal, y Dikla
  lexicon: gramática hebrea
  rationale: El hebreo repite la partícula de objeto con cada nombre, pero en español la coordinación natural de una genealogía es una lista simple. Reproducir cada repetición sonaría forzado y no añade contenido semántico.
