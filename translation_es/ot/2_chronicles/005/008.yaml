    issue: La nota al pie a no refleja fielmente la alternativa léxica del English POB.
    rationale: 'El English POB ofrece ''Or “stretching out their wings over the ark''s place.”'' La nota española ''O: «sobre el sitio del arca»'' solo cambia ''lugar/sitio'' y no preserva la alternancia estructural relevante (''el lugar del arca'' / ''el lugar propia del arca'' frente a otra formulación).'
  - severity: medium
    issue: '''Cubrían'' reduce la fuerza narrativa del wayyiqtol hebreo.'
    rationale: Aunque el contexto describe postura continua, וַיְכַסּוּ es una forma narrativa consecutiva. En español natural, 'cubrieron' mantiene mejor la progresión del relato sin perder el sentido espacial.
  revised_spanish_text: Y los querubines estaban desplegando sus alas sobre el lugar del arca[a], y los querubines cubrieron el arca y sus varas desde arriba.
  revised_footnotes:
