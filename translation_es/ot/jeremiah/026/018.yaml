revisions:
- from: 'Miqueas el morastita profetizó en los días de Ezequías rey de Judá, y dijo a todo el pueblo de Judá: «Así dice Yahvé de los ejércitos: Sión será arada como un campo, y Jerusalén se volverá ruinas, y el monte de la Casa, alturas boscosas[a][b]».'
  to: 'Miqueas el morasteo profetizó en los días de Ezequías, rey de Judá, y dijo a todo el pueblo de Judá: «Así dice Yahvé de los ejércitos[a]: “Sión será arada como un campo, y Jerusalén quedará en ruinas, y el monte de la Casa[b] será alturas boscosas[c]”».'
  rationale: 'Se ajusta el español para mayor naturalidad y precisión sin apartarse del hebreo: ''morasteo'' mejora el gentilicio; se añade la coma vocativa/appositiva natural en ''Ezequías, rey de Judá''; ''quedará en ruinas'' expresa mejor el resultado; se explicita ''será'' en la cláusula final para que la elipsis sea legible en español; y se añade la nota léxica faltante para preservar la alternativa documentada del audit trail inglés.'
