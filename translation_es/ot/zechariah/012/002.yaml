base_translation:
  language: en
  yaml_path: translation/ot/zechariah/012/002.yaml
  text: Behold[a], I am about to make Jerusalem a cup of staggering to all the surrounding peoples[b]; and it will also be against Judah in the siege against Jerusalem.
  footnotes:
  - marker: a
    text: Or 'a cup of reeling.' The Hebrew expression may also be understood more literally as 'a basin/threshold of reeling,' but the sense of a vessel causing intoxicated staggering best fits the context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second clause is difficult. It may also mean 'Judah also will be besieged along with Jerusalem' or 'this will also come upon Judah in the siege against Jerusalem.'
    reason: alternative_reading
