review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura temporal y militar del hebreo: «cuando combatió contra… y Joab volvió…». Conserva adecuadamente los topónimos transliterados Aram-naharaim y Aram-zobah, y mantiene «doce mil de Edom» sin expandir interpretativamente a «edomitas», en línea con la revisión inglesa auditada. Sin embargo, falta una nota para Aram-zobah, ya que el inglés POB preserva una alternativa/documentación también para ese nombre, y la ubicación de la nota actual no refleja bien ambos topónimos.'
  spanish_quality_summary: El español es claro y digno. «Combatió contra», «volvió» y «doce mil de Edom» son naturales. «Derrotó» es aceptable, pero «derribó» o «hirió/mató» sonarían menos naturales o más interpretativos; por eso no requiere cambio. El ajuste principal es de aparato de notas, no de fluidez. «Valle de Sal» es entendible y fiel al patrón del inglés auditado.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios. Se respeta la política de transliterar Aram-naharaim y Aram-zobah. No hay conflicto con Yahvé/Mesías/etc. La decisión de mantener «de Edom» en vez de «edomitas» coincide con la racionalidad documentada del POB.
  issues:
  - severity: medium
    issue: Falta reflejar en notas la documentación léxica para «Aram-zobah».
    rationale: 'El inglés POB marca ambos topónimos con notas [b][a]: una para «Aram-naharaim» y otra para una alternativa/antecedente de «Aram-zobah». El borrador español solo conserva una nota para Aram-naharaim, perdiendo parte del rastro auditado relevante.'
  - severity: low
    issue: La nota [a] está anclada al final del versículo en lugar del término correspondiente.
    rationale: La instrucción del proyecto pide que cada marcador aparezca en la palabra o frase pertinente. En español, la nota explicativa debe anclarse en «Aram-naharaim», y la nota adicional en «Aram-zobah».
  revised_spanish_text: cuando combatió contra Aram-naharaim[a] y Aram-zobah[b], y Joab volvió y derrotó a doce mil de Edom en el Valle de Sal.
  revised_footnotes:
  - marker: a
    text: Aram-naharaim significa «Aram de los Dos Ríos».
    reason: lexical_alternative
  - marker: b
    text: O «Aram de Zobah».
    reason: previous_rendering
  revision_rationale: El texto principal ya es fiel y natural en español, pero debe completarse el aparato de notas para conservar el rastro léxico del POB inglés y anclar cada nota en el nombre correspondiente.
