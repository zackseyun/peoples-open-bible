translation:
  language: es
  text: El necio da a conocer su ira de inmediato[a], pero el prudente encubre la vergüenza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'en el día'; la idea en este contexto es 'ese mismo día' o 'de inmediato'.
    reason: lexical_alternative
  - marker: b
    text: O 'encubre una afrenta' o 'una deshonra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el tonto
  - el insensato
  lexicon: HALOT
  rationale: En Proverbios, אֱוִיל describe a una persona moralmente insensata y refractaria a la instrucción, no solo poco inteligente. 'Necio' conserva ese valor sapiencial con dignidad bíblica y evita el matiz excesivamente coloquial de 'tonto'.
- source_word: כַּעְסוֹ
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - vexación
  lexicon: HALOT
  rationale: '''כַּעַס'' denota enojo o irritación intensa; ''ira'' funciona en español bíblico y mantiene la fuerza afectiva del término sin volverlo demasiado informal. Se evitó ''enojo'' por ser más débil en registro y ''furor'' por ser más fuerte de lo que exige el contexto.'
- source_word: בַּיּוֹם / יִוָּדַע
  english_pob_choice: at once / is known
  chosen_spanish: se conoce al instante
  alternatives_spanish:
  - se conoce en el día
  - se da a conocer ese mismo día
  - se hace evidente al instante
  lexicon: HALOT
  rationale: La secuencia hebrea literalmente dice 'en el día... será conocida', pero en este proverbio la idea es de inmediatez. 'Se conoce al instante' conserva la pasiva y reproduce la fuerza idiomática que la POB inglesa explicó como 'at once'.
- source_word: וְכֹסֶה
  english_pob_choice: but ... covers
  chosen_spanish: pero encubre
  alternatives_spanish:
  - pero cubre
  - pero oculta
  - pero disimula
  lexicon: HALOT
  rationale: El participio de כסה es 'cubrir, ocultar'. 'Encubre' mantiene la imagen y suena natural en español; además permite que el objeto permanezca directo, como en el hebreo.
- source_word: קָלוֹן
  english_pob_choice: shame
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - la deshonra
  - el oprobio
  - la afrenta
  lexicon: HALOT
  rationale: קָלוֹן puede abarcar vergüenza, deshonra u oprobio. 'Vergüenza' es la opción más breve y comprensible en español; conserva la amplitud semántica sin forzar un matiz exclusivamente social o insultante.
- source_word: עָרוּם
  english_pob_choice: a prudent man
  chosen_spanish: el prudente
  alternatives_spanish:
  - el hombre prudente
  - el sagaz
  - el astuto
  lexicon: HALOT
  rationale: 'En Proverbios, עָרוּם suele ser positivo: prudente, perspicaz. ''El prudente'' expresa bien el tipo sapiencial y evita ''astuto'', que en español puede sonar engañoso. Se omite la marca masculina explícita porque el sustantivo está usado proverbialmente como tipo general.'
theological_decisions:
- issue: 'Naturaleza del contraste sapiencial: reacción impulsiva frente a autocontrol prudente'
  english_pob_reading: A fool’s anger is known at once, but a prudent man covers shame.
  chosen_spanish_reading: La ira del necio se conoce al instante, pero el prudente encubre la vergüenza.
  alternative_spanish_readings:
  - El enojo del necio se conoce enseguida, pero el prudente cubre la vergüenza.
  - La ira del necio se da a conocer de inmediato, pero el prudente oculta la afrenta.
  rationale: El proverbio contrapone manifestación inmediata del enojo con la discreción del prudente. La traducción conserva ese paralelo sin suavizar la oposición moral ni convertirla en simple psicología.
  doctrine_reference: Sabiduría sapiencial bíblica; dominio propio y prudencia (cf. Pr 12:23; 14:29)
- issue: Sentido de קָלוֹן en el segundo hemistiquio
  english_pob_reading: a prudent man covers shame / conceals an insult/disgrace
  chosen_spanish_reading: el prudente encubre la vergüenza
  alternative_spanish_readings:
  - el prudente cubre la deshonra
  - el prudente oculta la afrenta
  rationale: La POB inglesa preservó la tensión semántica entre 'shame' y 'insult/disgrace'. 'Vergüenza' deja abierta la posibilidad de deshonra pública o de una ofensa que conviene no divulgar, sin añadir una interpretación más estrecha que la del hebreo.
  doctrine_reference: Ética del habla y prudencia en Proverbios; integridad y discreción (cf. Pr 11:12-13; 17:9)
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el texto base y con el audit trail inglés; no se requieren revisiones textuales ni notas de variante. La principal decisión fue idiomática: reflejar la inmediatez de בַּיּוֹם sin volver el español artificial, y conservar la ambigüedad semántica de קָלוֹן con ''vergüenza''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' reservado para el tetragrámaton; este versículo no lo contiene.
  - Se eligió 'necio' para אֱוִיל en coherencia con el vocabulario sapiencial de la colección.
  - '''Encubre'' se usó para preservar la metáfora de כסה sin introducir una explicación interpretativa adicional.'
  - No se usó 'Cristo', 'Señor' ni otra terminología no presente en el hebreo.
  - La formulación es apta para lectura pública y conserva el paralelismo poético hebreo.
