translation:
  language: es
  text: 'Entonces Labán dijo a Jacob: «¿Qué has hecho, que me has robado el corazón[a] y te has llevado a mis hijas como cautivas de la espada[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que me has engañado». El hebreo dice literalmente: «que me has robado el corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión hebrea literal: «como cautivas de la espada», es decir, como mujeres tomadas en guerra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה עָשִׂיתָ
  english_pob_choice: What have you done
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué hiciste?
  - ¿Qué has hecho tú?
  lexicon: HALOT
  rationale: La pregunta acusatoria en español suena natural en pretérito perfecto compuesto, manteniendo la fuerza de una acción ya realizada con efecto presente. No conviene volverla más interpretativa que el hebreo.
- source_word: וַתִּגְנֹב אֶת לְבָבִי
  english_pob_choice: that you have stolen my heart
  chosen_spanish: que has robado mi corazón
  alternatives_spanish:
  - que me has engañado
  - que me has decepcionado
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'robar el corazón'. En español, 'mi corazón' conserva la imagen fuente y evita sustituir sin base textual la metáfora por una explicación. La ambigüedad entre robo literal e idiomático se deja visible.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi entendimiento
  lexicon: HALOT
  rationale: לֵב/לֵבָב puede referirse al centro interior, pero 'corazón' es la forma más fiel y transparente en español. Las alternativas ya interpretan la metáfora y por eso se reservan solo como opciones.
- source_word: וַתְּנַהֵג
  english_pob_choice: driven ... away
  chosen_spanish: has llevado
  alternatives_spanish:
  - has conducido
  - has arrastrado
  lexicon: HALOT
  rationale: El verbo puede significar 'conducir' o 'llevar'. En español, 'has llevado' comunica el movimiento causado por Jacob sin añadir un matiz innecesariamente técnico; el contexto de cautiverio aporta la violencia implícita.
- source_word: בְּנֹתַי
  english_pob_choice: my daughters
  chosen_spanish: mis hijas
  lexicon: HALOT
  rationale: Traducción directa y relacionalmente importante en el discurso de Labán; no hay razón para diluir la posesión familiar.
- source_word: כִּשְׁבֻיֹות חָרֶב
  english_pob_choice: like captives of the sword
  chosen_spanish: como cautivas de la espada
  alternatives_spanish:
  - como prisioneras de guerra
  - como cautivas tomadas por la espada
  lexicon: HALOT
  rationale: 'La expresión hebrea es literal: ''cautivas de la espada''. En español, ''cautivas de la espada'' mantiene la imagen bélica y la dureza del reclamo. ''Prisioneras de guerra'' explica el sentido pero borra la metáfora fuente.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones inglés-español: la frase idiomática de גנב לב se mantuvo literal en la línea principal para conservar la imagen hebrea, mientras que la alternativa interpretativa se deja en nota; también se conservó la imaginería bélica de כִּשְׁבֻיֹות חָרֶב.'
  spanish_consistency_notes:
  - Se preservó el tratamiento directo y acusatorio de Labán con un registro bíblico sobrio.
  - Se evitó introducir 'Cristo', 'SEÑOR' u otras terminologías no pertinentes a este versículo.
  - La puntuación y las comillas siguen el uso español estándar.
