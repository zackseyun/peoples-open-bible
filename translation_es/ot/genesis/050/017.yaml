base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/017.yaml
  text: 'This is what you shall say to Yosef: ‘Please forgive the transgression of your brothers and their sin[a], for they repaid you with evil. And now[b], please forgive the transgression of the servants of the God of your father.’ And Yosef wept when they spoke to him.'
  footnotes:
  - marker: a
    text: Or 'Please pardon the offense of your brothers and their sin.' The Hebrew idiom literally uses 'lift/carry' for forgiving guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Yosef'' is the direct transliteration of the Hebrew name traditionally rendered ''Joseph.'''
    reason: cultural_note
