translation:
  language: es
  text: 'Y el joven dijo al ángel[a]: «Azarías, hermano, ¿para qué son el hígado, el corazón y la hiel del pez?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bilis del pez». El griego χολή puede renderizarse como «hiel» o «bilis».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el niño
  lexicon: BDAG
  rationale: παιδάριον puede referirse a un niño, muchacho o joven. En el contexto narrativo de Tobit, se trata de Tobías en edad de viajar y actuar con independencia; por eso «el joven» conserva la referencia a su juventud sin hacerlo sonar infantil.
- source_word: τῷ ἀγγέλῳ
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  lexicon: BDAG
  rationale: Aunque ἄγγελος puede significar «mensajero», aquí el compañero es presentado explícitamente como figura angélica. «Ángel» refleja el sentido contextual directo y coincide con la identificación del personaje en el texto griego.
- source_word: Ἀζαρία
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: Transliteración tradicional en español bíblico
  rationale: El nombre propio se vierte por transliteración al español. «Azarías» es la forma natural y transparente para la lectura en español.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano mío
  - amigo
  lexicon: BDAG
  rationale: El vocativo dice literalmente «hermano». Aunque funciona como fórmula de trato respetuoso o familiar, se conserva el término literal para no suavizar la forma de dirección y mantener la transparencia lexical.
- source_word: τί ἐστιν
  english_pob_choice: what are ... for?
  chosen_spanish: ¿para qué son ...?
  alternatives_spanish:
  - ¿qué son ...?
  - ¿qué sirven ...?
  lexicon: BDAG
  rationale: Aunque literalmente expresa «qué es/son», en este contexto la pregunta apunta al uso o finalidad de las partes del pez. «¿Para qué son ...?» comunica naturalmente la intención interrogativa sin perder el valor funcional del griego.
- source_word: τὸ ἧπαρ
  english_pob_choice: the liver
  chosen_spanish: el hígado
  alternatives_spanish:
  - el hígado
  lexicon: BDAG
  rationale: Sentido anatómico estándar.
- source_word: ἡ καρδία
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el corazón
  lexicon: BDAG
  rationale: Sentido anatómico estándar.
- source_word: ἡ χολή
  english_pob_choice: the gall
  chosen_spanish: la hiel
  alternatives_spanish:
  - la bilis
  - la hiel
  lexicon: BDAG
  rationale: χολή puede traducirse como «gall» o «bile». En español bíblico, «hiel» conserva el valor tradicional y conciso, aunque «bilis» es una alternativa moderna válida. Se usa «hiel» para mantener la correspondencia semántica sin perder la cadencia bíblica.
- source_word: τοῦ ἰχθύος
  english_pob_choice: of the fish
  chosen_spanish: del pez
  alternatives_spanish:
  - del pez
  - del pescado
  lexicon: BDAG
  rationale: El genitivo especifica pertenencia al pez. «Pez» es la traducción más directa y natural del griego ἰχθύς en este contexto narrativo.
theological_decisions:
- issue: Forma de tratamiento ἀδελφέ dirigida al compañero angelical
  english_pob_reading: Rendered literally as 'brother' in direct address
  chosen_spanish_reading: Se conserva literalmente «hermano» en el vocativo
  alternative_spanish_readings:
  - «amigo»
  - omitir el vocativo para mayor fluidez
  rationale: El pasaje no afirma parentesco literal; usa una forma normal de trato. Aun así, la traducción conserva la tensión lexical del original en vez de resolverla con un equivalente más libre como «amigo», manteniendo la transparencia del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia; no se registran revisiones aplicadas. La versión española sigue esa lectura estable, ajustando solo la naturalidad sintáctica del español y una elección léxica equivalente para χολή.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios bíblicos.
  - «Ángel» conserva la identificación explícita del personaje en el griego.
  - «Hiel» se usa como equivalente bíblico de χολή; la nota ofrece «bilis» como alternativa.
  - El vocativo «hermano» se conserva para reflejar la dirección literal del original.
