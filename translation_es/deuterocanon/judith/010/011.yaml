translation:
  language: es
  text: Y seguían derecho por el patio, y una guardia de avanzada asiria[a] le salió al encuentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa singular en «le salió al encuentro», aunque la primera cláusula dice «seguían». Eso estrecha el foco narrativo en Judit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  english_pob_choice: they were going
  chosen_spanish: avanzaban
  alternatives_spanish:
  - iban
  - seguían avanzando
  lexicon: LSJ
  rationale: El imperfecto griego expresa movimiento en curso; «avanzaban» conserva ese valor progresivo en español sin sonar forzado.
- source_word: ἐν τῷ αὐλῶνι
  english_pob_choice: through the courtyard
  chosen_spanish: por el patio
  alternatives_spanish:
  - en el patio
  - a través del patio
  lexicon: LSJ
  rationale: αὐλών es un espacio cerrado de tipo patio/corral. Con un verbo de movimiento, «por el patio» comunica el desplazamiento dentro de ese espacio de forma natural en español.
- source_word: εἰς εὐθεῖαν
  english_pob_choice: straight ahead
  chosen_spanish: en línea recta
  alternatives_spanish:
  - rectamente
  - derecho
  lexicon: LSJ
  rationale: La expresión adverbial indica trayecto directo, sin desviarse. «En línea recta» preserva la idea de dirección recta y es idiomático en español.
- source_word: συνήντησεν
  english_pob_choice: met
  chosen_spanish: se encontró con
  alternatives_spanish:
  - la encontró
  - la afrontó
  lexicon: LSJ
  rationale: El aoristo de συναντάω puede ser «encontrarse con» o «toparse con». «Se encontró con» mantiene el encuentro narrativo sin añadir matices ajenos.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: con ella
  alternatives_spanish:
  - a ella
  - la
  lexicon: LSJ
  rationale: El dativo singular se refiere a Judit, aunque la cláusula anterior usa plural. «Con ella» refleja el encuentro con el foco narrativo singular sin perder naturalidad.
- source_word: προφυλακὴ
  english_pob_choice: advance guard
  chosen_spanish: destacamento avanzado
  alternatives_spanish:
  - vanguardia
  - guardia avanzada
  - puesto avanzado
  lexicon: LSJ
  rationale: προφυλακή designa una fuerza adelantada de vigilancia o protección. «Destacamento avanzado» expresa bien una unidad militar móvil y evita una traducción demasiado técnica o rígida.
- source_word: τῶν Ἀσσυρίων
  english_pob_choice: Assyrian
  chosen_spanish: de los asirios
  alternatives_spanish:
  - asirios
  - asirio
  lexicon: LSJ
  rationale: El genitivo plural identifica a la tropa como perteneciente al bando asirio. «De los asirios» conserva la relación posesiva de manera transparente en español.
theological_decisions:
- issue: Foco narrativo singular en medio de un verbo plural
  english_pob_reading: The Greek says 'they were going,' but then 'met her,' singular, so the narrative focus narrows specifically to Judith.
  chosen_spanish_reading: 'Aunque el verbo inicial es plural, el encuentro se formula en singular: «se encontró con ella», manteniendo el foco en Judit.'
  alternative_spanish_readings:
  - y un destacamento avanzado de los asirios la encontró
  - y un destacamento avanzado de los asirios se les encontró
  rationale: 'No hay una cuestión doctrinal, sino narrativa y sintáctica: el griego cambia del plural al singular para centrar la escena en Judit. La traducción debe conservar ese estrechamiento del foco.'
  doctrine_reference: Narrative focus / Greek syntax
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó 'ahead' de 'going straight ahead' para dejar solo la idea de movimiento recto; por eso el español usa «en línea recta» sin añadir una noción espacial extra.
  spanish_consistency_notes:
  - Se mantuvo «asirios» con minúscula según uso étnico/nacional en español.
  - «Judit» se usa como forma estándar española del nombre bíblico.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el tetragrámaton ni vocabulario teológico equivalente.
