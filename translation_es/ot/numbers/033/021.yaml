  text: Partieron de Libna y acamparon en Rissá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Siguieron el camino
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa salida/avance desde un campamento previo. «Partieron» mantiene el movimiento narrativo de salida con naturalidad en español y sin añadir matices ajenos.
- source_word: מִלִּבְנָה
  english_pob_choice: from Libnah
  chosen_spanish: de Libna
  alternatives_spanish:
  - desde Libna
  lexicon: HALOT
  rationale: La preposición מִן indica procedencia. En español, «de» es la forma más directa y natural para marcar origen en este tipo de lista itineraria; el nombre propio se translitera como «Libna».
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y establecieron campamento
  lexicon: HALOT
  rationale: חנה es el verbo habitual para detenerse y hacer campamento. «Acamparon» conserva el sentido de instalación nocturna o de parada en el desierto con español claro y moderno.
- source_word: בְּרִסָּה
  english_pob_choice: at Rissah
  chosen_spanish: en Risá
  alternatives_spanish:
  - en Rissá
  - en Rissah
  lexicon: HALOT
  rationale: La preposición ב marca ubicación. Como topónimo, se translitera; «Risá» adapta la vocalización al español sin perder la identificación del lugar.
