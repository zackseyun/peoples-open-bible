  spanish_quality_summary: El español es claro y digno, pero puede mejorarse levemente para mayor naturalidad y precisión de anclaje. «No es para ustedes ni para nosotros construir...» es comprensible, aunque suena algo rígido; aun así es aceptable por su cercanía al hebreo y a la revisión inglesa. Conviene mover [a] a «solos» y añadir una nota [b] a «casa» para evitar pérdida del aparato auditado.
