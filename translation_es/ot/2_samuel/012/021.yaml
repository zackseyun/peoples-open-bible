translation:
  language: es
  text: 'Entonces sus siervos le dijeron: «¿Qué es esto que has hecho? Mientras el hijo estaba vivo, ayunaste y lloraste; pero cuando el hijo murió, te levantaste y comiste pan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «comiste pan», una expresión que puede referirse a tomar alimento o comer una comida.'
    reason: cultural_note
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: En el contexto de la corte de David, ‘siervos’ comunica bien la relación funcional sin hacer del estatus de esclavitud el foco del verso. ‘Esclavos’ sería más fuerte de lo que exige el contexto; ‘servidores’ suena más administrativo y menos fiel al valor amplio del hebreo.
- source_word: מָה הַדָּבָר הַזֶּה
  english_pob_choice: What is this thing
  chosen_spanish: ¿Qué es esto que has hecho?
  alternatives_spanish:
  - ¿Qué es esta cosa que has hecho?
  - ¿Qué es este asunto que has hecho?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta concreta eינטensificada por ‘esto’; en español, ‘¿Qué es esto que has hecho?’ conserva el asombro y evita una paráfrasis demasiado abstracta como ‘¿por qué has hecho esto?’.
- source_word: בַּעֲבוּר הַיֶּלֶד חַי
  english_pob_choice: While the child was alive
  chosen_spanish: Mientras el niño estaba vivo
  alternatives_spanish:
  - Cuando el niño estaba vivo
  - En tanto el niño vivía
  lexicon: HALOT
  rationale: La frase introduce el marco temporal del contraste posterior. ‘Mientras’ reproduce bien esa relación y ‘niño’ es natural en español para הַיֶּלֶד en este contexto familiar.
- source_word: צַמְתָּ
  english_pob_choice: you fasted
  chosen_spanish: ayunaste
  alternatives_spanish:
  - te ayunaste
  - observaste ayuno
  lexicon: HALOT
  rationale: ‘Ayunar’ es el verbo normal y directo en español para צום. ‘Observaste ayuno’ sería más pesado; ‘te ayunaste’ no es idiomático.
- source_word: וַתֵּבְךְּ
  english_pob_choice: and wept
  chosen_spanish: y lloraste
  alternatives_spanish:
  - y lloraste amargamente
  - y te lamentaste
  lexicon: HALOT
  rationale: ‘Lloraste’ mantiene el registro sobrio del relato. ‘Wept’ en inglés no exige necesariamente un término más solemne en español aquí.
- source_word: מֵת הַיֶּלֶד
  english_pob_choice: the child died
  chosen_spanish: el niño murió
  alternatives_spanish:
  - el niño falleció
  - el niño estaba muerto
  lexicon: HALOT
  rationale: El verbo hebreo es dinámico; ‘murió’ refleja el cambio de estado. ‘Falleció’ suaviza el tono; ‘estaba muerto’ desplaza el sentido verbal.
- source_word: קַמְתָּ
  english_pob_choice: you got up
  chosen_spanish: te levantaste
  alternatives_spanish:
  - te alzaste
  - te pusiste de pie
  lexicon: HALOT
  rationale: ‘Te levantaste’ es la forma más natural y idiomática en español para קום en este contexto narrativo.
- source_word: וַתֹּאכַל לָחֶם
  english_pob_choice: and ate bread
  chosen_spanish: y comiste pan
  alternatives_spanish:
  - y comiste
  - y tomaste alimento
  lexicon: HALOT
  rationale: Se mantiene la concreción del hebreo ‘pan’, que puede funcionar idiomáticamente como comida. ‘Comiste’ sería más libre y perdería la imagen concreta del texto.
translation_notes:
  revision_awareness: El estado de revisión reporta alta concordancia y sin cambios sustantivos en la última pasada; se ha conservado la estructura y el contenido del original con una adaptación española natural y auditable.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se ha mantenido ‘siervos’ para reflejar el contexto real de la corte sin forzar ‘esclavos’.
  - Se preserva la concreción de ‘pan’ con nota cultural, siguiendo el auditrail en inglés.
  - No se añadió paráfrasis causal en lugar de la secuencia temporal del hebreo.
