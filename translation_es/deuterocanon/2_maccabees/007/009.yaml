  rationale: 'Se revisa para reflejar mejor dos decisiones léxicas centrales del rastro POB: el insulto ἀλάστωρ como reproche fuerte y ἀπολύεις como ‘soltar/liberar’ de la vida presente, no simplemente ‘privar’. También se ajusta «nos levantará» para preservar mejor el paralelismo con la rara expresión «renovación eterna de la vida», y se pule la sintaxis española.'
  reviewer_model: gpt-5.4
