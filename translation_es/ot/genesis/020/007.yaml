translation:
  language: es
  text: 'Ahora bien[a], devuelve la esposa del hombre, porque es profeta, y orará por ti, y vivirás. Pero si no la devuelves, sabe que ciertamente morirás: tú y todos los que son tuyos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora». El hebreo funciona como marcador de urgencia e implicación discursiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tú y todo lo que es tuyo» / «tú y todo lo que tienes». La expresión hebrea es amplia y puede incluir a los miembros de la casa, así como todo lo que pertenece a Abimelec.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: El marcador discursivo introduce una transición urgente y una orden. En español, «Ahora» comunica de forma natural la inmediatez; la inferencia exhortativa se mantiene por el contexto y la puntuación.
- source_word: הָשֵׁב
  english_pob_choice: return
  chosen_spanish: devuelve
  alternatives_spanish:
  - restaura
  - vuelve a entregar
  lexicon: HALOT
  rationale: El imperativo de שוב en causativo pide restituir a la mujer a su lugar legítimo. «Devuelve» conserva la fuerza directa y es idiomático en español actual.
- source_word: אֵשֶׁת הָאִישׁ
  english_pob_choice: the man's wife
  chosen_spanish: la esposa del hombre
  alternatives_spanish:
  - la mujer del hombre
  - su esposa
  lexicon: HALOT
  rationale: La construcción hebrea es formal y no usa pronombre posesivo explícito; «la esposa del hombre» preserva esa relación nominal sin adelantar el pronombre «su».
- source_word: כִּי נָבִיא הוּא
  english_pob_choice: for he is a prophet
  chosen_spanish: porque él es profeta
  alternatives_spanish:
  - pues él es profeta
  - porque es profeta
  lexicon: HALOT
  rationale: כִּי introduce la razón de la orden. «Porque» expresa bien la causalidad; se conserva «profeta» como título directo de נָבִיא.
- source_word: וְיִתְפַּלֵּל בַּעַדְךָ
  english_pob_choice: and he will pray for you
  chosen_spanish: y él orará por ti
  alternatives_spanish:
  - y él intercederá por ti
  - y rogará por ti
  lexicon: HALOT
  rationale: בְּעַד indica una acción en favor de otro, con matiz intercesor. «Orará por ti» es transparente y evita forzar un término más técnico donde el español puede entender la función de intercesión por contexto.
- source_word: וֶחְיֵה
  english_pob_choice: and you will live
  chosen_spanish: y vivirás
  alternatives_spanish:
  - y vivirás entonces
  - para que vivas
  lexicon: HALOT
  rationale: La forma expresa el resultado esperado de la oración de Abraham. En español, la futura «vivirás» comunica ese desenlace de modo natural y breve.
- source_word: וְאִם אֵינְךָ מֵשִׁיב
  english_pob_choice: But if you do not return her
  chosen_spanish: Pero si no la devuelves
  alternatives_spanish:
  - Y si no la devuelves
  - Pero si no la restituyes
  lexicon: HALOT
  rationale: El participio negativo indica una acción no realizada o rehusada; en español fluye mejor con un verbo finito. El objeto femenino se explicita por el contexto inmediato.
- source_word: דַּע
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - sé
  - ten por seguro
  lexicon: HALOT
  rationale: El imperativo singular de ידע puede dirigirse a un varón en español con «sabe»; mantiene el tono de advertencia solemne. La forma con tilde, «sé», sería homógrafa pero menos clara aquí por el valor verbal de mandato contextual.
- source_word: מוֹת תָּמוּת
  english_pob_choice: you will surely die
  chosen_spanish: ciertamente morirás
  alternatives_spanish:
  - morirás sin falta
  - morirás de seguro
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la certeza. «Ciertamente morirás» preserva la solemnidad y la fuerza enfática sin sonar arcaico.
- source_word: אַתָּה וְכָל אֲשֶׁר לָךְ
  english_pob_choice: you and all who are yours
  chosen_spanish: tú y todo lo que es tuyo
  alternatives_spanish:
  - tú y todo lo que tienes
  - tú y todos los que son tuyos
  lexicon: HALOT
  rationale: La expresión hebrea es amplia y puede abarcar familia, casa y posesiones. «Todo lo que es tuyo» mantiene esa amplitud sin restringirla solo a personas o solo a bienes.
theological_decisions:
- issue: Alcance de la amenaza en «tú y todo lo que es tuyo»
  english_pob_reading: 'Render broadly as extending to Abimelech and those belonging to his household: ''you and all who are yours.'''
  chosen_spanish_reading: 'Se traduce de forma amplia, incluyendo a Abimelec y todo lo perteneciente a él: «tú y todo lo que es tuyo».'
  alternative_spanish_readings:
  - tú y todos los que son tuyos
  - tú y todo lo que tienes
  rationale: El contexto narrativo sugiere un juicio que rebasa a la persona de Abimelec e impacta su casa. La formulación española conserva esa amplitud sin cerrar el sentido a una sola categoría (personas o posesiones).
  doctrine_reference: Translation philosophy §3, §5
- issue: Función de בַּעַדְךָ
  english_pob_reading: and he will pray for you
  chosen_spanish_reading: y él orará por ti
  alternative_spanish_readings:
  - y él intercederá por ti
  - y él rogará por ti
  rationale: El hebreo expresa oración en favor de otro; el español «orará por ti» deja abierta la intercesión sin imponer un tecnicismo que podría sonar más doctrinal que textual.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: Se revisó la correspondencia con el texto hebreo (WLC) y el audit trail inglés POB; no se detectaron ajustes pendientes respecto de la lectura léxica ni del alcance de la amenaza.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se conservó «profeta» como título directo, sin sustituirlo por un equivalente interpretativo.
  - Se evitó «siervo»/«esclavo» porque no hay δοῦλος ni equivalente relevante en este versículo.
  - La alternancia de pronombres y formas verbales busca naturalidad española sin perder la referencia singular a Abimelec.
