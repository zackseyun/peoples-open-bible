revisions:
- from: En el año dieciocho del reinado de Josías[a], se celebró este[a] Pascua.
  to: En el año dieciocho del reinado de Josías, se celebró[a] esta Pascua.
  rationale: Se corrige la concordancia del demostrativo ('esta Pascua'), se elimina la reutilización incorrecta del marcador [a], y la nota léxica se ancla correctamente en el verbo que traduce נַעֲשָׂה. El resto del sentido y la terminología pueden mantenerse sin necesidad de adjudicación adicional.
