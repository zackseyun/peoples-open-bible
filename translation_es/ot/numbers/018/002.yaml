    text: 'O: "que te acompañen" o "que estén adheridos a ti"; el verbo hebreo también hace eco del nombre Leví.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "la tienda del testimonio"; muchas versiones en español leen "la tienda del encuentro" por familiaridad con otras expresiones del tabernáculo.'
    reason: alternative_reading
  revision_rationale: Se reemplazó 'acerca contigo' por 'haz que se acerquen contigo' para lograr un español natural sin perder el matiz de 'bring near with you'. Se conservó el resto del sentido fuente, incluida la formulación 'la tienda del testimonio'. También se corrigió el anclaje de la nota [b] para que aparezca en la frase que realmente comenta.
