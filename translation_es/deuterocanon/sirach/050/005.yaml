translation:
  language: es
  text: ¡Cuán espléndido fue cuando se asomó desde la tienda[a], cuando salió de la casa del velo[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «¡Cómo fue glorificado en el giro/círculo del pueblo!», en lugar del hebreo «cuando se asomó desde la tienda». Esto señala una divergencia textual en la primera línea.'
    reason: textual_variant
  - marker: b
    text: O «cortina» para «velo»; hebreo parójet, griego katapétasma, la cortina ante el santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה נֶהְדַּר
  english_pob_choice: How splendid
  chosen_spanish: ¡Cuán espléndido fue!
  alternatives_spanish:
  - ¡Cuán glorioso fue!
  - ¡Cuán majestuoso fue!
  - ¡Cuán honrado fue!
  lexicon: HALOT
  rationale: El exclamativo מַה con נהדר expresa admiración por una apariencia impresionante. «Espléndido» conserva la idea visual de magnificencia y honra sin sonar demasiado litúrgico. También armoniza con el valor de ἐδοξιάσθη en el paralelo griego, sin perder la fuerza descriptiva del hebreo.
- source_word: בְּהַשְׁגִּיחוֹ
  english_pob_choice: when he looked out
  chosen_spanish: cuando miró desde la tienda
  alternatives_spanish:
  - cuando apareció
  - cuando se asomó
  - cuando levantó la vista
  lexicon: HALOT
  rationale: La forma sugiere mirar hacia fuera o quedar a la vista. En español, «miró desde la tienda» mantiene la idea de estar visible desde el recinto sagrado y evita sobreinterpretar el movimiento. El paralelo griego ofrece una línea distinta, pero el hebreo es la base principal.
- source_word: מֵאֹהֶל
  english_pob_choice: from the tent
  chosen_spanish: desde la tienda
  alternatives_spanish:
  - desde el tabernáculo
  - desde la tienda sagrada
  - desde el santuario
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tienda». Aunque en contexto cultual puede evocar el tabernáculo, aquí se conserva el término concreto para respetar la imagen del texto, sin armonizarlo prematuramente con «templo».
- source_word: וּבְצֵאתוֹ
  english_pob_choice: when he came out
  chosen_spanish: cuando salió
  alternatives_spanish:
  - y al salir
  - cuando emergió
  lexicon: HALOT
  rationale: Expresa de forma natural el valor temporal del verbo en paralelo con la primera cláusula, manteniendo la secuencia narrativa y la simetría del hebreo.
- source_word: מִבֵּית הַפָּרֹכֶת
  english_pob_choice: from the house of the curtain
  chosen_spanish: de la casa del velo
  alternatives_spanish:
  - de la casa del cortinaje
  - del santuario interior
  - de la casa de la cortina
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la cortina/velo del santuario. «Casa del velo» reproduce con sobriedad la expresión hebrea y conserva la imagen cultual sin explicitar más de lo que el texto dice. En español, «velo» comunica bien la función sagrada del parójet.
theological_decisions:
- issue: Mantener la imagen mixta de santuario («tienda» / «casa del velo») sin nivelarla a una sola arquitectura cultual
  english_pob_reading: Retain the Hebrew's mixed sanctuary imagery rather than harmonize it to 'temple' or 'tabernacle.'
  chosen_spanish_reading: 'Conservar la mezcla de imágenes cultuales del hebreo: «tienda» y «casa del velo».'
  alternative_spanish_readings:
  - «desde el santuario, cuando salió del templo»
  - «desde la tienda sagrada, cuando salió del velo»
  rationale: El hebreo combina אֹהֶל con בֵּית הַפָּרֹכֶת, lo que preserva ecos tabernaculares dentro del culto del templo. Traducirlo todo como «templo» o «tabernáculo» aplanaría esa tensión literaria. La elección española sigue el texto hebreo y no disuelve la imagen compuesta.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Divergencia textual con el paralelo griego en la primera línea
  english_pob_reading: The Greek parallel reads, 'How he was glorified in the turning/circuit of the people,' instead of the Hebrew 'when he looked out from the tent.'
  chosen_spanish_reading: Mantener la línea hebrea principal y señalar implícitamente la lectura alternativa del griego en la nota.
  alternative_spanish_readings:
  - «¡Cuán glorificado fue en el giro del pueblo!»
  - «¡Cuán glorioso fue en la vuelta del pueblo!»
  rationale: La base primaria aquí es el hebreo. No obstante, el paralelo griego documenta una divergencia real en el primer colon. La traducción principal no la armoniza, y la nota permite que el lector vea la alternativa textual sin perder la continuidad del texto base.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Tomé en cuenta la revisión reciente que sustituyó una formulación explicativa por «de la casa del velo» para acercarse más a מִבֵּית הַפָּרֹכֶת sin añadir interpretación. La versión española sigue esa preferencia y evita expandir el sintagma más allá del hebreo. También se conservó la tensión textual entre el hebreo y el paralelo griego, tal como indica el audit trail.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando no aparece en este versículo; aquí no era necesario.
  - Mantuve «tienda» para אֹהֶל y «velo» para פָּרֹכֶת, evitando sustituirlos por «templo» o «santuario» sin base explícita.
  - Elegí un registro solemne pero natural en español moderno, con exclamación inicial para reflejar el valor admirativo del hebreo.
  - La puntuación reproduce la cadencia bipartita del verso con coma interna y cierre exclamativo final.
