revisions:
- from: Así que Moisés extendió su vara sobre la tierra de Egipto[a], y Yahvé condujo un viento del oriente sobre la tierra todo aquel día y toda aquella noche. Cuando llegó la mañana, el viento del oriente trajo las langostas.
  to: Así que Moisés extendió su vara sobre la tierra de Egipto, y Yahvé condujo un viento del oriente[a] sobre la tierra todo aquel día y toda aquella noche. Cuando llegó la mañana, el viento del oriente trajo las langostas.
  rationale: Se conserva la traducción principal porque es sustancialmente fiel y legible, pero se corrige la nota al pie para que exprese una alternativa léxica real en español, en vez de duplicar la misma frase del texto principal.
  reviewer_model: gpt-5.4
