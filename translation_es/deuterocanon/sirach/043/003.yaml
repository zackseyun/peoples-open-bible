translation:
  language: es
  text: En su resplandor hace hervir el mundo[b][a], y delante de su espada, ¿quién podrá resistir?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «delante de su espada»; el paralelo griego dice: «ante su calor/ardor, ¿quién resistirá?». El texto principal conserva la metáfora hebrea.'
    reason: alternative_reading
  - marker: b
    text: El testimonio masada más antiguo de este verso es fragmentario en este punto; el hebreo de la Geniza de El Cairo proporciona la redacción principal usada aquí, con el griego consultado como control.
    reason: textual_variant
lexical_decisions:
- source_word: בהצהירו
  english_pob_choice: At its shining
  chosen_spanish: En su resplandor
  alternatives_spanish:
  - Cuando resplandece
  - En su brillo
  - Al mediodía
  lexicon: HALOT
  rationale: La base hebrea apunta al fulgor o resplandor intenso; en español, «en su resplandor» conserva esa imagen sin volverla cronométrica. Evita depender solo de la lectura griega de «mediodía» y mantiene el matiz de luminosidad extrema.
- source_word: ירתיח
  english_pob_choice: it makes ... boil
  chosen_spanish: hace hervir
  alternatives_spanish:
  - hace arder
  - lo hace se...
  - abrasa
  lexicon: HALOT
  rationale: «Hervir» reproduce la fuerza concreta del verbo hebreo רתח y conserva la metáfora vívida de calor extremo. Es más fiel que suavizarlo con «calienta».
- source_word: תבל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - el mundo habitado
  lexicon: HALOT
  rationale: «El mundo» es natural en español y comunica bien el alcance amplio de תבל, entendido como la tierra habitada.
- source_word: חרבו
  english_pob_choice: its sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su filo
  - su calor
  - su cuchilla
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literal de «espada», porque el POB inglés también la retiene como imagen del sol. En español, «su espada» mantiene el golpe poético y la tensión interpretativa frente a la lectura griega de «calor/ardor».
- source_word: מי יתכלכל
  english_pob_choice: who can endure?
  chosen_spanish: ¿quién podrá mantenerse?
  alternatives_spanish:
  - ¿quién podrá resistir?
  - ¿quién podrá soportarlo?
  - ¿quién podrá endurecerse?
  lexicon: HALOT
  rationale: El hebreo expresa la idea de sostenerse o mantenerse bajo presión. «Mantenerse» conserva el sentido de resistencia sin sobreinterpretar; además, encaja bien con la pregunta retórica del verso.
translation_notes:
  revision_awareness: Se revisó el cruce hebreo-griego y se mantuvo la metáfora hebrea de «espada» en el texto principal, como hace el inglés POB. La solución española evita calcar el griego y conserva la tensión textual documentada entre «espada» y «calor».
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el versículo no contiene el nombre divino.
  - «Mundo» se eligió para תבל por naturalidad y alcance cósmico, sin perder el sentido de tierra habitada.
  - La pregunta final usa «podrá mantenerse» para reflejar resistencia/soporte, evitando una paráfrasis excesiva.
