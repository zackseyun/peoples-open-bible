translation:
  language: es
  text: Y envió mensajeros a la ciudad[a], a Acab, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia la ciudad». La forma hebrea lleva un sufijo direccional en «ciudad», que indica movimiento hacia la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Entonces envió
  - Así envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración en pasado. En español, 'Y envió' conserva esa secuencia sin forzar una paráfrasis.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - ángeles
  - emisarios
  lexicon: HALOT
  rationale: El contexto es político/militar, por lo que se trata de agentes humanos. 'Mensajeros' es natural y fiel; 'ángeles' sería incorrecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En español, el complemento de destinatario se expresa de forma natural con 'a'.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Ahab
  alternatives_spanish:
  - Acab
  lexicon: conventional proper name
  rationale: Se conserva la forma tradicional del nombre propia de la transliteración bíblica en español.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: La cadena constructa nombra el oficio real de Ahab. En aposición, 'Ahab, rey de Israel' es natural y fiel al hebreo.
- source_word: הָעִירָה
  english_pob_choice: into the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - dentro de la ciudad
  lexicon: HALOT
  rationale: El sufijo direccional de עִיר indica movimiento hacia un lugar. En español, 'a la ciudad' transmite ese destino de modo natural; no hace falta marcar 'dentro' explícitamente.
translation_notes:
  revision_awareness: El contexto inglés revisó el orden para sonar más natural sin perder el sentido hebreo de que los mensajeros fueron enviados hacia la ciudad, a Ahab rey de Israel. La versión española sigue esa misma lógica y conserva el matiz direccional de הָעִירָה mediante la nota.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Ahab, coherente con la transliteración usada en el proyecto para este personaje.
  - Se prefirió 'mensajeros' frente a 'envoyados' o 'ángeles' por el contexto narrativo.
  - La nota explica la ambigüedad entre 'a la ciudad' e 'hacia la ciudad' derivada del sufijo direccional hebreo.
