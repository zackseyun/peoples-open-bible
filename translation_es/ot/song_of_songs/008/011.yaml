review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: posesión de Salomón, topónimo transliterado, entrega de la viña a quienes la guardan, valor distributivo de אִישׁ, obligación/expectativa de יָבִא y la cantidad ''mil plata'' sin especificar unidad. Sin embargo, no preserva una alternativa importante del inglés auditado sobre בְּפִרְיוֹ (''su fruto'' puede referirse a la viña o al fruto de cada guardador), y la ubicación de las notas [c][b] en ''guardianes'' no corresponde a sus contenidos.'
  spanish_quality_summary: 'El español es legible y digno, pero ''guardianes'' suena algo menos natural que ''cuidadores'' o ''guardadores'' en contexto agrícola; aun así puede mantenerse si se aclara. El mayor problema de calidad es documental: la nota b actual explica נָתַן en vez de la ambigüedad de בְּפִרְיוֹ, y por tanto no sigue el rastro de auditoría del POB. También conviene reubicar las notas para que anclen el término o frase pertinente.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Viña' para כֶּרֶם, 'Solomón tenía', 'Baal-hamón', 'Cada hombre', 'debía traer' y 'mil piezas de plata' están bien alineados con el análisis fuente-POB. La decisión 'guardianes' para נֹטְרִים es aceptable, aunque no necesariamente la más idiomática; debe sostenerse con nota léxica. Falta alinear la nota sobre 'su fruto' con la decisión inglesa documentada.
  issues:
  - severity: medium
    issue: La nota b no corresponde a בְּפִרְיוֹ ni preserva la alternativa documentada sobre 'su fruto'.
    rationale: El POB inglés conserva explícitamente la ambigüedad entre 'su fruto' de la viña y 'su fruto' de cada cuidador/arrendatario. La nota española actual habla de 'dio' y 'les dio la viña', repitiendo otro punto léxico y omitiendo la alternativa relevante del hebreo.
  - severity: medium
    issue: Los marcadores [c][b] están colocados tras 'guardianes', pero una de las notas debe anclarse en 'su fruto'.
    rationale: Las notas deben aparecer en la palabra o frase pertinente. La nota sobre נֹטְרִים va con 'guardianes'; la nota sobre בְּפִרְיוֹ debe ir con 'su fruto'.
  - severity: low
    issue: Falta una nota cultural para 'mil piezas de plata' si se quiere seguir de cerca el POB auditado.
    rationale: El inglés incluye una nota indicando que el hebreo dice literalmente 'mil plata' y no especifica unidad. El español ya lo refleja en la traducción, pero una nota breve preserva mejor la trazabilidad del razonamiento.
  revised_spanish_text: Solomón tenía una viña en Baal-hamón[a]; dio la viña a los guardianes[b]. Cada hombre debía traer mil piezas de plata[c] por su fruto[d].
  revised_footnotes:
