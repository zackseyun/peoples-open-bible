revisions:
- from: Porque un enemigo ha perseguido mi alma[a]; ha aplastado mi vida hasta el suelo; me ha hecho habitar en lugares oscuros[b], como los muertos de antaño.
  to: Porque un enemigo ha perseguido mi alma[a]; ha aplastado por tierra mi vida; me ha hecho habitar en lugares oscuros[b], como los muertos de antaño.
  rationale: Se propone una revisión menor, no por infidelidad sustancial, sino para corregir la nota b y pulir la idiomaticidad de לָאָרֶץ. «Por tierra» expresa mejor el abatimiento al nivel del suelo en español natural. La nota a se ajusta para reflejar con más precisión la alternativa del POB inglés («me ha perseguido»), y la nota b se alinea con la alternativa real sin repetir el texto principal.
