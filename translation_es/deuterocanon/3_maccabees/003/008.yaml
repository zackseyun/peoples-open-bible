translation:
  language: es
  text: Pero los griegos de la ciudad, no habiendo sufrido ninguna injusticia, al ver la inesperada conmoción acerca de los hombres[a] y las súbitas aglomeraciones que se iban produciendo, no podían ayudar; porque su disposición los llevaba a una súplica[b], y algunos también estaban agitados[c] y suponían que estas cosas cambiarían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en torno a los hombres". El griego περί aquí probablemente expresa referencia ("acerca de los hombres"), aunque el contexto también puede permitir un matiz espacial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "los movía a una apelación", "a un ruego" o "a una exhortación". La cláusula griega es sintácticamente comprimida y el sentido exacto de παράκλησις es difícil de expresar con plena precisión.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "también se veían arrastrados por la conmoción". El raro adverbio griego puede aludir tanto a agitación interna como a quedar envueltos en el tumulto colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ κατὰ τὴν πόλιν Ἕλληνες
  english_pob_choice: But the Greeks in the city
  chosen_spanish: Pero los griegos de la ciudad
  alternatives_spanish:
  - Y los griegos de la ciudad
  - Pero los griegos que estaban en la ciudad
  lexicon: LSJ
  rationale: κατὰ τὴν πόλιν ubica a los griegos dentro de la ciudad; por eso "de la ciudad" conserva la localización sin forzar un sentido distributivo. "Pero" refleja δέ como contraste suave con el grupo anterior.
- source_word: οὐδὲν ἠδικημένοι
  english_pob_choice: having suffered no wrong
  chosen_spanish: no habiendo sufrido ninguna injusticia
  alternatives_spanish:
  - no habiendo sido agraviados en nada
  - sin haber recibido daño alguno
  lexicon: LSJ
  rationale: El participio pasivo perfecto de ἀδικέω indica que no habían sido tratados injustamente. "Injusticia" mantiene el valor pasivo y jurídico más claramente que una mera idea de daño.
- source_word: ταραχὴν ἀπροσδόκητον
  english_pob_choice: the unexpected turmoil
  chosen_spanish: la inesperada conmoción
  alternatives_spanish:
  - el inesperado tumulto
  - la inesperada agitación
  lexicon: LSJ
  rationale: ταραχή puede ser conmoción, tumulto o agitación; "conmoción" funciona bien en español para un desorden público. "Inesperada" sigue ἀπροσδόκητον.
- source_word: περὶ τοὺς ἄνδρας
  english_pob_choice: concerning the men
  chosen_spanish: alrededor de los hombres
  alternatives_spanish:
  - acerca de los hombres
  - en torno a los hombres
  lexicon: LSJ
  rationale: Aunque περί aquí puede ser de referencia, el contexto de una conmoción visible permite conservar la imagen espacial "alrededor de" sin excluir el matiz referencial. Esta elección sigue el rumbo de la revisión inglesa que no quiso fijar demasiado el referente.
- source_word: συνδρομὰς ἀπροκόπους γινομένας
  english_pob_choice: the sudden gatherings taking place
  chosen_spanish: las súbitas aglomeraciones que se iban produciendo
  alternatives_spanish:
  - las reuniones repentinas que se formaban
  - las multitudes que se iban reuniendo
  lexicon: LSJ
  rationale: συνδρομή puede ser reunión, concurrencia o aglomeración; ἀπρόκοπος sugiere algo sin desarrollo ordenado, sin avance claro. "Aglomeraciones" transmite bien el amontonamiento público, y "súbitas" sigue la revisión inglesa que suavizó el rasgo de desorden pero conservó la rapidez del hecho.
- source_word: βοηθεῖν μὲν οὐκ ἔσθενον
  english_pob_choice: were not able to help
  chosen_spanish: no podían ayudar
  alternatives_spanish:
  - no tenían fuerza para ayudar
  - no eran capaces de ayudar
  lexicon: LSJ
  rationale: ἔσθενον expresa capacidad/fuerza para actuar. "No podían" es natural en español y mantiene la idea de incapacidad, no de falta de voluntad.
- source_word: παρακλῆσιν γὰρ ἡ διάθεσις παρεκάλουν
  english_pob_choice: for their disposition was calling for an appeal
  chosen_spanish: porque su disposición los llevaba a una súplica
  alternatives_spanish:
  - porque su disposición pedía una exhortación
  - porque su inclinación los movía a una súplica
  lexicon: LSJ
  rationale: La frase es comprimida. διάθεσις es disposición/inclinación, y παράκλησις puede ser súplica, exhortación o apelación. "Los llevaba a una súplica" conserva el movimiento interior sin cerrar indebidamente la ambigüedad de παρακλῆσις.
- source_word: οἱ δὲ καὶ συνδρόμως εἶχον
  english_pob_choice: and some also were in a state of agitation
  chosen_spanish: y algunos también estaban agitados
  alternatives_spanish:
  - y algunos también estaban en conmoción
  - y algunos también se veían arrastrados por la confusión
  lexicon: LSJ
  rationale: συνδρόμως es raro y puede apuntar a agitación interna o a quedar envuelto en el tumulto. "Estaban agitados" deja abierta esa doble posibilidad y es idiomático en español.
- source_word: μεταπεσεῖσθαι ταῦτα ὑπελάμβανον
  english_pob_choice: supposed that these things would change
  chosen_spanish: suponían que estas cosas cambiarían
  alternatives_spanish:
  - pensaban que estas cosas darían un giro
  - presumían que esto cambiaría
  lexicon: LSJ
  rationale: μεταπίπτω indica cambio o giro; ὑπολαμβάνω con infinitivo expresa suponer. "Cambiarían" es fiel y claro sin añadir interpretación.
theological_decisions:
- issue: Relación entre injusticia sufrida y reacción de los griegos
  english_pob_reading: having suffered no wrong ... were not able to help
  chosen_spanish_reading: no habiendo sufrido ninguna injusticia ... no podían ayudar
  alternative_spanish_readings:
  - sin haber sido agraviados ... no podían ayudar
  - no habiendo recibido daño ... no podían ayudar
  rationale: El verso contrapone la ausencia de agravio personal con la incapacidad de intervenir. Mantener "injusticia" y "no podían ayudar" conserva esa tensión ética y social sin moralizarla.
  doctrine_reference: Ninguna doctrina específica; observación textual y narrativa.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la última revisión inglesa en tres puntos: evita sobrecargar συνδρομὰς ἀπροκόπους con una lectura demasiado negativa; traduce la incapacidad con una forma natural en vez de "fuerza"; y conserva la ambigüedad de παράκλησις y συνδρόμως sin decidirlas de modo excesivamente estrecho. Donde la revisión inglesa suaviza, la española también suaviza; donde la gramática española permite más naturalidad, se ha preferido un orden más fluido pero aún auditable.'
  spanish_consistency_notes:
  - Se mantiene "griegos" en minúscula como etnónimo común en español.
  - Se evita "SEÑOR" porque el pasaje no contiene el Tetragrámaton ni un κύριος divino en el texto citado.
  - '"Injusticia" se usa para reflejar ἠδικημένοι con fuerza jurídica/ética, no meramente física.'
  - '"Súplica" se prefiere a "apelación" por mayor naturalidad bíblica en español, pero la nota preserva la alternativa semántica.'
  - '"Agitados" conserva la posible doble referencia de συνδρόμως: emoción interna o participación en el tumulto.'
