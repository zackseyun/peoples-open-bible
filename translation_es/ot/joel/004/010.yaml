base_translation:
  language: en
  yaml_path: translation/ot/joel/004/010.yaml
  text: Beat your plowshares into swords[a], and your pruning hooks into spears; let the weak say[b], “I am a warrior.”
  footnotes:
  - marker: a
    text: This reverses the imagery of Isa 2:4 and Mic 4:3, where weapons are beaten into farming tools.
    reason: cross_reference
  - marker: b
    text: Or “I am mighty,” “I am strong.” The Hebrew גִּבּוֹר can denote a mighty man, strong man, or warrior; here the military context favors “warrior.”
    reason: lexical_alternative
