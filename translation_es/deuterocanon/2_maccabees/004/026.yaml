review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido griego y conserva la simetría retórica de ὑπονοθεύσας / ὑπονοθευθεὶς con «suplantó / fue suplantado». También refleja correctamente «su propio hermano» y el movimiento de huida hacia territorio ammonita. Sin embargo, «habiendo sido él mismo suplantado» suena algo calcado en español, y «se fue al país de los amonitas» puede mejorarse para corresponder más de cerca a «went into the land» con una formulación más natural y precisa.
  spanish_quality_summary: El español es mayormente claro y digno, pero la doble secuencia «huyó y se fue» resulta algo floja y redundante, y el gerundio compuesto pasivo suena pesado. Una leve revisión puede hacer el versículo más natural sin perder la estructura irónica ni la precisión semántica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jasón», «suplantó», «su propio hermano» y «los amonitas» son adecuados. La nota léxica también preserva correctamente la alternativa y la observación sobre la repetición del mismo verbo en activa y pasiva.
  issues:
  - severity: medium
    issue: Construcción demasiado calcada en «habiendo sido él mismo suplantado por otro»
    rationale: Aunque es fiel, en español bíblico-natural suena más fluido «después de ser él mismo suplantado por otro» o «al ser él mismo suplantado por otro», manteniendo la ironía sin rigidez.
  - severity: low
    issue: Redundancia en «huyó y se fue»
    rationale: El griego expresa fuga y entrada al territorio; en español conviene distinguir mejor ambos movimientos con «huyó y se refugió en» o «huyó y entró en», evitando un verbo demasiado genérico.
  - severity: low
    issue: «país» es posible, pero «tierra» corresponde mejor a χώρα en registro bíblico
    rationale: «La tierra de los amonitas» suena más natural y más cercano al valor narrativo-geográfico del original que «el país de los amonitas».
  revised_spanish_text: Y Jasón[a], que había suplantado a su propio hermano, después de ser él mismo suplantado por otro, huyó y se refugió en la tierra de los amonitas.
