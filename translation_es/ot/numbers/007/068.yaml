  text: un plato de oro[a], de diez siclos, lleno de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un plato de oro, diez, lleno de incienso»; en la fórmula repetida de Números 7 se sobreentiende la unidad de peso «siclos».'
