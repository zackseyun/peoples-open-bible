translation:
  language: es
  text: Y afligiré la descendencia de David por causa de esto, pero no para siempre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no todos los días». Es decir, no para siempre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאעַנֶּה
  english_pob_choice: I will afflict
  chosen_spanish: afligiré
  alternatives_spanish:
  - humillaré
  - oprimiré
  lexicon: HALOT
  rationale: En este contexto de juicio, ענה en piel expresa causar aflicción o humillación. «Afligiré» comunica bien el golpe judicial sin volverlo más social o político de lo que el hebreo exige. «Humillaré» es posible, pero puede sonar más interior o ético; «oprimiré» resulta demasiado específico y fuerte.
- source_word: זֶרַע דָּוִד
  english_pob_choice: the offspring of David
  chosen_spanish: la descendencia de David
  alternatives_spanish:
  - la semilla de David
  - los descendientes de David
  lexicon: HALOT
  rationale: זֶרַע es un singular colectivo. «Descendencia» conserva ese valor colectivo y es natural en español bíblico contemporáneo. «Semilla» es más literal pero menos idiomática aquí; «descendientes» pierde un poco la unidad colectiva del singular hebreo.
- source_word: לְמַעַן זֹאת
  english_pob_choice: because of this
  chosen_spanish: por causa de esto
  alternatives_spanish:
  - a causa de esto
  - por este motivo
  lexicon: HALOT
  rationale: La frase introduce la causa del juicio y remite al contexto previo. «Por causa de esto» es claro, fiel y suficientemente cercano al hebreo sin sonar forzado.
- source_word: אַךְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  - solo
  lexicon: HALOT
  rationale: Aquí אַךְ restringe y contrasta la declaración anterior. «Pero» es el conector más natural en español. «Solo» sería demasiado ambiguo; «sin embargo» y «no obstante» son correctos, pero menos directos.
- source_word: לֹא כָל הַיָּמִים
  english_pob_choice: not forever
  chosen_spanish: no para siempre
  alternatives_spanish:
  - no todos los días
  - no eternamente
  lexicon: HALOT
  rationale: 'Aunque el hebreo dice literalmente «no todos los días», el POB inglés actualizó a la forma idiomática «not forever». En español, «no para siempre» transmite esa misma limitación temporal de manera natural y conserva la tensión: habrá aflicción real, pero no interminable.'
theological_decisions:
- issue: Duración limitada del castigo sobre la casa de David
  english_pob_reading: The judgment is temporary, not perpetual.
  chosen_spanish_reading: El juicio es real, pero temporal; no es definitivo ni interminable.
  alternative_spanish_readings:
  - El castigo no será para siempre.
  - La aflicción será solo por un tiempo.
  rationale: 'El hebreo limita expresamente la duración del sufrimiento. La traducción mantiene esa tensión teológica: hay disciplina verdadera sobre la línea de David, pero no un abandono perpetuo. No se debe suavizar ni absolutizar el juicio más allá de lo que el versículo afirma.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto inglés POB fue revisado desde «not for all days» a «not forever» por su mayor naturalidad sin perder el sentido hebreo. La versión española sigue esa misma decisión de equivalencia óptima: evita un calco como «no todos los días» en el texto principal y reserva la literalidad en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando corresponda; en este versículo no aparece el nombre divino explícito.
  - «Descendencia» preserva el singular colectivo de זֶרַע mejor que un plural simple.
  - «Afligiré» conserva el tono judicial del contexto y evita un matiz excesivamente interno de «humillaré».
  - La nota al pie preserva la tensión entre literalidad hebrea e idiomatización española.
