translation:
  language: es
  text: Y después de arrojar a una multitud sin sepultar, él mismo quedó sin ser llorado[a], y no tuvo parte en sepultura alguna, ni en su sepulcro ancestral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «ni tuvo parte en sepultura, ni en la ley de sus padres». La cláusula final es difícil; puede referirse más literalmente a la costumbre o ley ancestral, en vez de especificar estrictamente un sepulcro ancestral.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una gran multitud
  - mucha gente
  lexicon: LSJ
  rationale: Aunque el griego tiene artículo, en español resulta más natural e igualmente fiel una expresión indefinida. «Multitud» conserva el tono colectivo y la amplitud del original.
- source_word: ἀτάφων
  english_pob_choice: unburied
  chosen_spanish: sin sepultar
  alternatives_spanish:
  - sin enterrar
  - insepulta
  lexicon: LSJ
  rationale: La idea central es la falta de sepultura; «sin sepultar» mantiene el valor verbal y el carácter sobrio del adjetivo griego.
- source_word: ἐκρίψας
  english_pob_choice: after casting out
  chosen_spanish: después de arrojar
  alternatives_spanish:
  - después de echar
  - tras expulsar
  lexicon: LSJ
  rationale: El participio anterior expresa una acción previa. «Arrojar» preserva la violencia implícita en el acto de lanzar cuerpos fuera de un trato funerario digno.
- source_word: ἀπένθητος ἐγενήθη
  english_pob_choice: became unwept
  chosen_spanish: quedó sin lamento
  alternatives_spanish:
  - quedó sin ser llorado
  - quedó sin duelo
  lexicon: LSJ
  rationale: «Sin lamento» comunica que nadie lo lloró y conserva la inversión retórica del griego. Se evita una formulación demasiado interpretativa como «sin duelo» si se quiere mantener el matiz de llanto/mournful lament.
- source_word: κηδείας
  english_pob_choice: burial
  chosen_spanish: sepultura
  alternatives_spanish:
  - entierro
  - ritos funerarios
  lexicon: LSJ
  rationale: En este contexto, «sepultura» responde bien a la negación de los honores funerarios y permite una correspondencia clara con el campo semántico de burial.
- source_word: οὐδ᾽ ἥτινος
  english_pob_choice: of any kind
  chosen_spanish: alguna
  alternatives_spanish:
  - de ningún tipo
  - en modo alguno
  lexicon: LSJ
  rationale: La frase griega intensifica la negación de manera difícil. En español, «sepultura alguna» transmite con naturalidad la exclusión total sin sobreexplicar la construcción.
- source_word: πατρῴου νόμου
  english_pob_choice: his ancestral tomb / the law of his fathers / ancestral custom
  chosen_spanish: su ley paterna
  alternatives_spanish:
  - la costumbre de sus padres
  - la ley de sus padres
  - su tumba ancestral
  lexicon: LSJ
  rationale: Se conserva más de cerca la redacción transmitida («ley paterna») para no borrar la tensión textual documentada. Aunque el contexto apunta a normas o costumbres funerarias ancestrales, el griego leído literalmente dice «ley de los padres».
theological_decisions:
- issue: Tratamiento de πατρῴου νόμου en un contexto funerario
  english_pob_reading: his ancestral tomb
  chosen_spanish_reading: su ley paterna
  alternative_spanish_readings:
  - la costumbre de sus padres
  - su tumba ancestral
  - la ley de sus padres
  rationale: La evidencia textual es difícil y la POB inglesa opta por una solución contextual. En español, se prefiere mantener la tensión del griego transmitido con «ley paterna», evitando resolverla demasiado pronto como si el texto dijera inequívocamente una tumba. La nota deja abierta la lectura contextual de costumbre/ley ancestral.
  doctrine_reference: Principio de transparencia textual de la POB; preservar variantes de sentido cuando el griego transmitido es difícil.
translation_notes:
  revision_awareness: El inglés de la POB fue revisado para afinar μετέσχεν como «had no share in» y κηδείας οὐδ᾽ ἥτινος como «burial of any kind». La versión española refleja ese ajuste con «no tuvo parte en sepultura alguna», y conserva la dificultad de πατρῴου νόμου sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «sepultura» para el campo funerario, en coherencia con el registro digno y bíblico del pasaje.
  - «Ley paterna» conserva la tensión literal del griego y evita sustituirla por una explicación excesiva en el cuerpo del texto.
  - Se evita una calca rígida de la estructura inglesa; el orden español busca legibilidad sin perder las relaciones sintácticas básicas del original.
