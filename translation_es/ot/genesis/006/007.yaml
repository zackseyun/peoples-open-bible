  text: וַ/יֹּ֣אמֶר יְהוָ֗ה אֶמְחֶ֨ה אֶת הָ/אָדָ֤ם אֲשֶׁר בָּרָ֨אתִי֙ מֵ/עַל֙ פְּנֵ֣י הָֽ/אֲדָמָ֔ה מֵֽ/אָדָם֙ עַד בְּהֵמָ֔ה עַד רֶ֖מֶשׂ וְ/עַד ע֣וֹף הַ/שָּׁמָ֑יִם כִּ֥י נִחַ֖מְתִּי כִּ֥י עֲשִׂיתִֽ/ם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/006/007.yaml
  text: So Yahweh said[a], “I will blot out man, whom I have created[c][b], from the face of the ground—from man to livestock to creeping things and to the birds of the heavens—for I regret that I have made them.”
  footnotes:
  - marker: a
    text: Or “humankind.” Hebrew adam can denote humanity collectively; here “man” preserves the representative force and the repetition with the next phrase.
    reason: lexical_alternative
  - marker: b
    text: Or “I am sorry that I have made them.” The Hebrew expresses divine regret/sorrow; “I regret” is used to preserve the sense without implying moral wrongdoing in God.
    reason: alternative_reading
  - marker: c
    text: “Birds of the heavens” is a literal Hebrew expression, often rendered “birds of the sky.”
    reason: lexical_alternative
