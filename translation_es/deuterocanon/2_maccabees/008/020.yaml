    issue: Ortografía y forma del etnónimo «galatas»
    rationale: En español debe escribirse «Gálatas». Además, al referirse a un pueblo/etnónimo en este contexto histórico, la mayúscula inicial es preferible en esta obra por claridad referencial.
  - severity: low
    issue: «siguió así» para γενομένην
    rationale: Es comprensible, pero menos natural y menos preciso que «fue así» o «se desarrolló así» para introducir cómo ocurrió o resultó la batalla.
  - severity: medium
    issue: Registro de «estaban muy apurados»
    rationale: Suena coloquial en español general y no transmite tan bien el matiz militar de ἀπορουμένων. «Estaban en apuros» mantiene mejor dignidad y claridad.
  - severity: medium
    issue: «gran provecho» para ὠφέλειαν πολλὴν
    rationale: Puede sugerir provecho económico o idiomática comercial. En contexto militar, «gran ventaja» preserva mejor la amplitud de beneficio estratégico/práctico.
  - severity: low
    issue: Nota al pie del etnónimo
    rationale: Si el texto principal usa «Gálatas», la alternativa debe ser «galos», no «gálatas». La nota actual no acompaña bien la forma principal propuesta.
