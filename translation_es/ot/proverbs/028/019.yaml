translation:
  language: es
  text: El que trabaja su tierra se saciará de pan, pero el que persigue cosas vanas[a] se saciará de pobreza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «cosas vacías»; el hebreo, según algunos, podría aludir a cosas vacías o a personas inútiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵד
  english_pob_choice: works
  chosen_spanish: trabaja
  alternatives_spanish:
  - labra
  - cultiva
  - obra
  lexicon: HALOT
  rationale: El participio expresa labor activa sobre la tierra. «Trabaja» es natural en español moderno y conserva la idea amplia de esfuerzo agrícola sin restringirla demasiado a una técnica específica.
- source_word: אַדְמָתוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su terreno
  - su suelo
  - su campo
  lexicon: HALOT
  rationale: אַדָמָה puede referirse a tierra, suelo o terreno. En este proverbio agrícola, «su tierra» mantiene la imagen concreta y suena idiomático en español.
- source_word: יִשְׂבַּע לָחֶם
  english_pob_choice: will have plenty of bread
  chosen_spanish: se saciará de pan
  alternatives_spanish:
  - tendrá abundancia de pan
  - tendrá pan en abundancia
  - tendrá suficiente pan
  lexicon: HALOT
  rationale: El verbo de saciarse conserva la idea de plenitud. «Pan» mantiene la imagen hebrea concreta; en español, «se saciará de pan» comunica bien la suficiencia sin diluir el símbolo.
- source_word: וּמְרַדֵּף
  english_pob_choice: but he who pursues
  chosen_spanish: pero el que persigue
  alternatives_spanish:
  - y el que persigue
  - pero quien persigue
  - y quien sigue tras
  lexicon: HALOT
  rationale: El waw contrasta con la primera línea del paralelismo. «Pero» refleja mejor esa oposición proverbial que un simple «y».
- source_word: רֵקִים
  english_pob_choice: worthless things
  chosen_spanish: cosas vanas
  alternatives_spanish:
  - cosas vacías
  - cosas inútiles
  - personas vacías
  lexicon: HALOT
  rationale: רֵקִים es literalmente «vacíos» y puede entenderse como cosas vacías o personas vacías. «Cosas vanas» preserva la ambigüedad útil y suena natural en español, sin cerrar indebidamente el sentido hacia personas.
- source_word: יִשְׂבַּע רִישׁ
  english_pob_choice: will have his fill of poverty
  chosen_spanish: se saciará de pobreza
  alternatives_spanish:
  - tendrá abundancia de pobreza
  - quedará lleno de pobreza
  - tendrá su llenura de pobreza
  lexicon: HALOT
  rationale: Se conserva el juego verbal de «saciarse» en ambos miembros del proverbio. «Pobreza» traduce רִישׁ de manera directa y mantiene el contraste irónico.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; la versión española sigue ese mismo juicio de equilibrio, manteniendo el paralelismo, el juego de «saciarse» y la ambigüedad de רֵקִים sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra terminología de sustitución porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos como «hará lleno de pan».
  - «Cosas vanas» preserva la posibilidad de una lectura no personal, mientras la nota abre la alternativa más literal «cosas vacías».
