translation:
  language: es
  text: Aunque te eleves[a] como el águila, y aunque pongas tu nido entre las estrellas, desde allí yo te haré descender, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si te elevas como el águila ... si pones tu nido entre las estrellas». La partícula hebrea puede traducirse «si», pero aquí funciona con fuerza concesiva: incluso en la mayor altura, Yahvé te hará descender.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  - Aun si
  lexicon: HALOT
  rationale: La partícula condicional introduce aquí un valor concesivo en el paralelismo poético-profético. «Aunque» comunica mejor esa fuerza que un simple «si», sin perder la posibilidad hipotética del hebreo.
- source_word: תַּגְבִּיהַּ
  english_pob_choice: you soar high
  chosen_spanish: te eleves
  alternatives_spanish:
  - te alcances
  - te engrandezcas
  - subas en alto
  lexicon: HALOT
  rationale: El verbo causa/eleva la imagen de altura. En español, «te eleves» conserva la idea de alzarse a gran altura y encaja con la metáfora del águila sin volverla mecánica.
- source_word: כַּנֶּשֶׁר
  english_pob_choice: like the eagle
  chosen_spanish: como el águila
  alternatives_spanish:
  - como un águila
  lexicon: HALOT
  rationale: El comparativo כ pide «como». «El águila» mantiene la imagen genérica y suena natural en español bíblico contemporáneo, sin oscurecer que se trata de un ave emblemática de altura.
- source_word: וְאִם
  english_pob_choice: and though
  chosen_spanish: y aunque
  alternatives_spanish:
  - y si
  - aunque
  lexicon: HALOT
  rationale: La segunda cláusula repite el valor concesivo. «Y aunque» mantiene el paralelismo y el movimiento acumulativo del texto hebreo.
- source_word: בֵּין כּוֹכָבִים
  english_pob_choice: among the stars
  chosen_spanish: entre las estrellas
  alternatives_spanish:
  - en medio de las estrellas
  - entre los astros
  lexicon: HALOT
  rationale: בֵּין admite «entre»; en español esta opción es la más directa y conserva la imposibilidad retórica de un nido situado a esa altura. «Estrellas» es la equivalencia más natural del hebreo.
- source_word: שִׂים קִנֶּךָ
  english_pob_choice: you set your nest
  chosen_spanish: pongas tu nido
  alternatives_spanish:
  - places tu nido
  - establezcas tu nido
  lexicon: HALOT
  rationale: שִׂים es un verbo general de poner/colocar. «Pongas tu nido» es la forma más simple y fiel en español; mantiene la concreción del nido sin añadir matices de permanencia no expresados explícitamente.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: La referencia espacial se conserva literalmente. «Desde allí» suena más natural en español que una repetición más pesada del deíctico.
- source_word: אוֹרִידְךָ
  english_pob_choice: I will bring you down
  chosen_spanish: yo te haré bajar
  alternatives_spanish:
  - te haré descender
  - yo te derribaré
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar el descenso. «Te haré bajar» preserva esa causalidad de manera idiomática y no añade la violencia específica de «derribaré».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y la fórmula profética se vierte con una expresión clara y sobria. «Dice» mantiene la función de cierre oracular sin sobretraducir.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto pide «Yahvé» para preservar la forma del nombre divino y evitar la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la doble condición con אִם ... וְאִם
  english_pob_reading: Though ... and though ...
  chosen_spanish_reading: Aunque ... y aunque ...
  alternative_spanish_readings:
  - Si ... y si ...
  - Aun si ... y aun si ...
  rationale: 'La construcción no apunta a una mera condición hipotética, sino a una concesión enfática: incluso en el punto más alto imaginable, Yahvé lo hará descender. «Aunque ... y aunque ...» conserva esa tensión retórica.'
  doctrine_reference: 'DOCTRINE.md: conditional concession in poetic prophecy'
- issue: Imagen de altura y descenso
  english_pob_reading: you soar high ... I will bring you down
  chosen_spanish_reading: te eleves ... te haré bajar
  alternative_spanish_readings:
  - te engrandezcas ... te haré descender
  - subas ... te derribaré
  rationale: 'La imagen del texto es espacial y poética: altura extrema seguida por descenso impuesto por Dios. «Te eleves / te haré bajar» conserva la oposición sin cargar la frase con intensificación interpretativa adicional.'
  doctrine_reference: 'DOCTRINE.md: prophetic reversal motif'
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del auditor inglés: אִם/וְאִם se entienden de forma concesiva, no meramente hipotética; כַּנֶּשֶׁר mantiene la imagen del águila; בֵּין כּוֹכָבִים se vierte literalmente como «entre las estrellas»; y נְאֻם יְהוָה se expresa con una fórmula profética breve. No se aplicaron revisiones posteriores al pasaje en el historial aportado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable del nombre divino en español.
  - Se evita «SEÑOR» para no ocultar el Tetragrámaton.
  - Se conserva el paralelismo de dos cláusulas concesivas con «aunque ... y aunque ...».
  - Se opta por un español bíblico moderno, claro y digno, sin arcaísmos innecesarios.
