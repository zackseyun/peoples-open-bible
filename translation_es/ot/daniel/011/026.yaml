review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: traición de allegados de mesa, ruina del rey, derrota del ejército y gran mortandad. Sin embargo, en dos puntos puede alinearse mejor con la evidencia fuente y el rastro POB: «su pan» es aceptable pero «su comida» refleja con más naturalidad el sentido de provisión del modismo; y «será arrasado» debilita la imagen de desbordamiento/arrastre de יִשְׁטוֹף, mejor preservada por «será barrido» o similar.'
  spanish_quality_summary: El español es claro y digno, pero «lo quebrantarán» suena algo elevado y menos natural con objeto personal; no es incorrecto, pero el ajuste principal necesario está en la nota de inundación y en el verbo para el ejército. También conviene pulir la nota a para una redacción más natural en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas son en general sólidas. La excepción es que «arrasado» se aleja del matiz de inundación/arrastre documentado por el POB para יִשְׁטוֹף.
  issues:
  - severity: medium
    issue: «será arrasado» para יִשְׁטוֹף
    rationale: El verbo hebreo evoca desbordamiento/inundación; «arrasado» comunica derrota, pero pierde la imagen específica que el POB quiso conservar con nota. «Será barrido» mantiene mejor el arrastre implícito y funciona bien en español.
  - severity: low
    issue: «su pan» puede sonar algo más literal/idiomático que natural en español actual
    rationale: El hebreo es un modismo de provisión/mesa. «Los que comen su comida» suena más natural en español general sin perder el valor metafórico, mientras la nota preserva la alternativa más literal «el pan de su mesa».
  - severity: low
    issue: Redacción de la nota c
    rationale: «su ejército desbordará / será arrasado» mezcla una alternativa activa con una principal pasiva y además «arrasado» no refleja bien el campo semántico del verbo. Conviene armonizarla con «será barrido / será arrollado por la inundación» o «desbordará / será barrido», explicando que la imagen es de inundación.
  revised_spanish_text: Los que comen su comida[a] lo quebrantarán[b], y su ejército será barrido[c], y caerán muchos muertos.
  revised_footnotes:
