- from: Y establecieron para sí un consejo[a], y cada día deliberaban trescientos veinte, tomando continuamente consejo acerca de la multitud, para ordenarse bien.
  to: Y establecieron para sí un consejo[a], y cada día deliberaban trescientos y veinte, tomando continuamente consejo acerca del pueblo, para mantenerse en buen orden.
  rationale: 'Se ajusta el español para expresar con mayor naturalidad el sentido cívico del griego y del audit trail inglés: «pueblo» aclara πλῆθος en contexto, «mantenerse en buen orden» comunica mejor εὐκοσμεῖν ἑαυτούς, y «trescientos y veinte» mejora la fluidez del registro. La nota se conserva, pero reequilibrada para reflejar ahora la alternativa más literal.'
