review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: עָלָיו עָלָה se refleja adecuadamente como acción hostil contra él; וַיַּאַסְרֵהוּ como sujeción física; בַּנְחֻשְׁתַּיִם como restricciones de bronce; y לְהֹלִיכוֹ בָּבֶלָה como traslado a Babilonia. No hay problemas teológicos. La principal corrección es estilística/léxica en español: ‘subió contra él’ suena poco natural en este contexto narrativo, y la nota al pie introduce ‘cepos’, que no corresponde bien al campo semántico de restricciones puestas sobre un cautivo.'
  spanish_quality_summary: El español es claro y mayormente fiel, pero ‘subió contra él’ resulta algo calcado y menos idiomático que ‘marchó contra él’ o ‘vino contra él’. Además, en la nota al pie ‘cepos de bronce’ suena impropio para este contexto; ‘grilletes’ o ‘cadenas’/‘ataduras’ funcionan mejor. El resto del verso lee bien en español bíblico moderno y digno.
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé, Mesías o δοῦλος. ‘Nabucodonosor’, ‘Babilonia’, ‘bronce’ y la formulación general concuerdan con el proyecto. La revisión propuesta conserva la decisión documentada sobre el metal y la naturaleza de las restricciones.
  issues:
  - severity: medium
    issue: ‘subió contra él’ es un calco poco natural en español
    rationale: Aunque reproduce la imagen direccional del hebreo, en español narrativo moderno y digno suena forzado. ‘Marchó contra él’ conserva el contexto militar sin sobreinterpretar como ataque total.
  - severity: low
    issue: La nota al pie incluye ‘cepos de bronce’ como alternativa
    rationale: ‘Cepos’ no refleja bien el sentido probable de נְחֻשְׁתַּיִם como restricciones metálicas puestas al prisionero; puede sugerir un dispositivo distinto. Conviene limitar las alternativas a ‘grilletes’ o ‘ataduras’/‘cadenas’.
  revised_spanish_text: Nabucodonosor, rey de Babilonia, marchó contra él y lo ató con cadenas de bronce para llevarlo a Babilonia[a].
  revised_footnotes:
