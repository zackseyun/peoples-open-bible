  glossary_alignment: No hay términos de glosario mayor en disputa en este versículo. El borrador sigue bien la política del proyecto al conservar la forma explícita «los hijos de tu pueblo» y al no introducir paráfrasis innecesaria. La nota al pie explica adecuadamente el modismo hebreo sin desplazar la literalidad del texto principal.
