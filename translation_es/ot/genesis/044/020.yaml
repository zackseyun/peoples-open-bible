  text: וַ/נֹּ֨אמֶר֙ אֶל אֲדֹנִ֔/י יֶשׁ לָ֨/נוּ֙ אָ֣ב זָקֵ֔ן וְ/יֶ֥לֶד זְקֻנִ֖ים קָטָ֑ן וְ/אָחִ֨י/ו מֵ֜ת וַ/יִּוָּתֵ֨ר ה֧וּא לְ/בַדּ֛/וֹ לְ/אִמּ֖/וֹ וְ/אָבִ֥י/ו אֲהֵבֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/044/020.yaml
  text: And we said to my lord[a], ‘We have an elderly father, and a young son born in his old age. His brother is dead, so he alone is left of his mother[c][b], and his father loves him.’
  footnotes:
  - marker: a
    text: Or, 'a child born in his old age.' The Hebrew idiom 'child of old age' refers to a child born when the father was advanced in years.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he alone is left to his mother,' that is, he is his mother's only remaining son.
    reason: lexical_alternative
  - marker: c
    text: Or 'he alone is left to his mother'.
    reason: previous_rendering
