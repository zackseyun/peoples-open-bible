translation:
  language: es
  text: Yo los llevaré al desierto de los pueblos[b], y allí entraré en juicio con ustedes cara a cara[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los juzgaré allí cara a cara». El verbo hebreo también puede traducirse más simplemente como «juzgar»; sin embargo, la construcción también sugiere entablar un proceso judicial con ustedes.'
    reason: lexical_alternative
  - marker: b
    text: «El desierto de los pueblos» puede referirse a un lugar desolado entre las naciones donde Israel había sido dispersado.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: I will bring
  chosen_spanish: los haré entrar
  alternatives_spanish:
  - los traeré
  - los llevaré
  lexicon: HALOT
  rationale: El hebreo hifil de בוא expresa causar que alguien llegue o entre. En español, "los haré entrar" conserva bien la idea de causación y de movimiento hacia un lugar.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los / ustedes
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: —
  rationale: El pronombre plural objeto se vierte naturalmente como "los" en este contexto; "ustedes" queda claro por el sentido y mantiene un registro bíblico actual para el español latinoamericano.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - a
  - hasta
  lexicon: HALOT
  rationale: Con un destino espacial, el hebreo puede ser "a" o "en/into". En español, "hacer entrar en" expresa mejor el ingreso al lugar nombrado que una simple dirección.
- source_word: מִדְבַּר
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - desierto inculto
  - región desolada
  lexicon: HALOT
  rationale: Aunque "wilderness" puede ser "desierto" o "desierto/campo inculto", aquí "desierto" funciona de modo natural y conserva la resonancia del éxodo sin forzar una perífrasis.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: de los pueblos
  alternatives_spanish:
  - de las naciones
  - de los pueblos entre los cuales
  lexicon: HALOT
  rationale: '"Los pueblos" sigue de cerca el plural hebreo עַמִּים y preserva la precisión formal de la frase. "Naciones" es posible, pero "pueblos" refleja mejor el término base.'
- source_word: וְנִשְׁפַּטְתִּי אִתְּכֶם
  english_pob_choice: I will enter into judgment with you
  chosen_spanish: entraré en juicio con ustedes
  alternatives_spanish:
  - los juzgaré
  - contenderé en juicio con ustedes
  lexicon: HALOT
  rationale: El niphal con אִתְּכֶם sugiere no solo dictar sentencia, sino entablar un proceso judicial. "Entraré en juicio con ustedes" conserva esa tensión mejor que el más simple "los juzgaré".
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: —
  rationale: Adverbio locativo normal en español; se refiere al desierto recién mencionado.
- source_word: פָּנִים אֶל פָּנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - rostro a rostro
  - personalmente
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de manera natural con "cara a cara", que transmite el encuentro directo y personal del hebreo.
theological_decisions:
- issue: Alcance judicial de וְנִשְׁפַּטְתִּי אִתְּכֶם
  english_pob_reading: I will enter into judgment with you
  chosen_spanish_reading: entraré en juicio con ustedes
  alternative_spanish_readings:
  - los juzgaré
  - contenderé en juicio con ustedes
  rationale: La lectura mantiene el matiz de litigio o proceso judicial y no lo reduce a una mera sentencia unilateral. Esto conserva el tono solemne del oráculo y la imagen de confrontación pactual.
  doctrine_reference: Translation philosophy §3, §5
- issue: Naturaleza de 'el desierto de los pueblos'
  english_pob_reading: The wilderness of the peoples may refer to a wilderness-like place among the nations where Israel had been scattered.
  chosen_spanish_reading: el desierto de los pueblos
  alternative_spanish_readings:
  - el desierto entre los pueblos
  - el desierto de las naciones
  rationale: Se mantiene la construcción nominal sin explicar el referente en el texto principal, porque el hebreo es deliberadamente denso. La posible referencia geográfica o histórica queda abierta sin borrar la ambigüedad documentada.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa, que permaneció sin cambios, y conserva sus decisiones principales: ''wilderness of the peoples'', el matiz judicial de נִשְׁפַּטְתִּי, y la idiomática ''face to face''. No se observan revisiones posteriores que obliguen a modificar el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evita 'SEÑOR' como máscara teológica; aquí no hay necesidad de sustituir un nombre divino.
  - '''Pueblos'' se usa para reflejar el plural hebreo עַמִּים, en coherencia con la terminología POB.'
  - '''Juicio'' se emplea para respetar el tono forense del hebreo, evitando reducirlo a una simple condena.'
  - La expresión idiomática se vierte como 'cara a cara' para conservar el valor de encuentro directo.
