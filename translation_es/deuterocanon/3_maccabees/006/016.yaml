translation:
  language: es
  text: Pero justo cuando Eleazar terminaba su oración[a], el rey pasaba junto al hipódromo con las bestias y con todo el tumulto de sus fuerzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con toda la fanfarronería de sus fuerzas». La frase griega usa un lenguaje vívido para el bullicio desafiante y amenazante que acompañaba el poder militar del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: λήγοντος ἄρτι
  english_pob_choice: just as ... was finishing
  chosen_spanish: justo cuando ... terminaba
  alternatives_spanish:
  - acababa de terminar
  - estaba terminando
  lexicon: LSJ
  rationale: La construcción del genitivo absoluto con ἄρτι exige cercanía temporal inmediata. «Justo cuando ... terminaba» conserva la simultaneidad en el momento final de la oración sin volverla demasiado rígida.
- source_word: προσευχῆς
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - oración de ruego
  lexicon: LSJ
  rationale: «Oración» es el equivalente natural y fiel en español para προσευχή en este contexto, sin añadir matices que el griego no requiere.
- source_word: παρῆγεν
  english_pob_choice: came along
  chosen_spanish: avanzaba
  alternatives_spanish:
  - pasaba
  - proseguía
  lexicon: LSJ
  rationale: El verbo indica movimiento procesional o de paso junto a un lugar. «Avanzaba» conserva la idea de desplazamiento continuo en la escena, con buena naturalidad en español.
- source_word: κατὰ τὸν ἱππόδρομον
  english_pob_choice: by the hippodrome
  chosen_spanish: por el hipódromo
  alternatives_spanish:
  - junto al hipódromo
  - a lo largo del hipódromo
  lexicon: LSJ
  rationale: La preposición con acusativo sugiere movimiento local relacionado con el hipódromo. «Por el hipódromo» es claro y no fuerza una precisión espacial que el texto no ofrece.
- source_word: θηρίοις
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  lexicon: LSJ
  rationale: En este relato se trata de animales peligrosos destinados a la ejecución. «Bestias» mantiene la dureza y el tono ominoso de θηρία.
- source_word: παντὶ τῷ τῆς δυνάμεως φρύαγματι
  english_pob_choice: all the tumult of his forces
  chosen_spanish: todo el tumulto de sus fuerzas
  alternatives_spanish:
  - toda la fanfarronería de sus fuerzas
  - todo el bramido de sus tropas
  lexicon: LSJ
  rationale: φρύαγμα tiene un campo vivo de resoplido, arrogancia y estruendo; «tumulto» recoge el efecto sonoro y amenazante sin decidir en exceso por una sola metáfora. «Sus fuerzas» conserva τῆς δυνάμεως como poder militar del rey.
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del audit trail inglés y mantiene la tensión expresiva de φρύαγμα sin suavizarla. No se introducen cambios textuales respecto del griego; la única variación relevante es optar por «avanzaba» y «por el hipódromo» para una fluidez española más natural sin perder el sentido procesional.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Bestias» conserva el registro narrativo y amenazante del contexto.
  - «Fuerzas» se usa en sentido militar, no como simple energía o capacidad.
  - La nota [a] queda anclada en «oración» para reflejar la alternativa léxica relevante en español.
