id: MAT.12.31
reference: Matthew 12:31
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο λέγω ὑμῖν, πᾶσα ἁμαρτία καὶ βλασφημία ἀφεθήσεται τοῖς ἀνθρώποις, ἡ δὲ τοῦ πνεύματος βλασφημία οὐκ ⸀ἀφεθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/031.yaml
  text: 'Therefore I tell you[a], every sin and blasphemy will be forgiven people[b], but blasphemy against the Spirit will not be forgiven.'
  footnotes:
  - marker: a
    text: Or 'blasphemy against the Holy Spirit.' The referent is the Holy Spirit from the surrounding context, though this verse itself reads simply 'the Spirit.'
    reason: alternative_reading
  - marker: b
    text: Or 'will be forgiven people'.
    reason: previous_rendering
translation:
  language: ko
  text: '그러므로 내가 너희에게 말한다. 사람들이 짓는 모든 죄와 신성모독은 용서받을 것이나, 영을 거스르는 신성모독은 용서받지 못할 것이다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 12:31-32 성령 모독의 용서받지 못함 — 본문의 강한 표현 보존
  chosen_reading: 「영을 거스르는 신성모독은 용서받지 못할 것이다」 / 「이 세대에서도 다가올 세대에서도 용서받지 못할 것이다」
  alternative_readings:
  - 용서 가능성을 시사하는 완화 표현
  - 경고로만 다루는 풀이
  rationale: 본문은 이중 부정의 강한 종말론적 단언이다. 한국 전통 번역도 「용서받지 못할 것이다」를 유지하며, 「영원한 죄」의 무게(막 3:29 병행)를 약화시키지 않도록 직역한다. 본문의 충격을 보존하는 것이 북극성 원칙(저자가 의도한 강도 그대로 전달)이다.
  doctrine_reference: 'DOCTRINE.md: §5 본문이 가진 무게 그대로 옮긴다'
