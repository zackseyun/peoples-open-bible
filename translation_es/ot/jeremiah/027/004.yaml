translation:
  language: es
  text: 'Y ordénales que les digan a sus amos[a]: «Así dice Yahvé de los ejércitos, el Dios de Israel: Así dirán a sus amos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a sus señores/amos»; aquí el término se refiere a gobernantes humanos, no al título divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוִּיתָ
  english_pob_choice: And command
  chosen_spanish: Y manda
  alternatives_spanish:
  - Y les mandarás
  - Y ordena
  lexicon: HALOT
  rationale: El hebreo tiene una forma verbal con valor directivo en una secuencia instructiva; en español, el imperativo singular transmite mejor la instrucción inmediata que una forma futura más pesada.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a los enviados
  - a ellos mismos
  lexicon: HALOT
  rationale: El pronombre se refiere a los mensajeros/enviados del contexto; «a ellos» conserva la referencia sin añadir interpretación innecesaria.
- source_word: אֶל אֲדֹנֵיהֶם
  english_pob_choice: to their masters
  chosen_spanish: a sus amos
  alternatives_spanish:
  - a sus señores
  - a sus señores humanos
  lexicon: HALOT
  rationale: Como en la auditable decisión inglesa, el sustantivo denota superiores humanos y no el título divino. En español, «amos» conserva la fuerza de autoridad humana y evita confusión con «Señor».
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa con un presente natural y solemne en español, equivalente al uso convencional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el nombre divino tetragramático: «Yahvé» en el texto principal, preservando el nombre propio del pacto en vez de una sustitución titulada.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: La expresión fija se vierte con un equivalente transparente y reverente en español bíblico contemporáneo. «Ejércitos» comunica el sentido de huestes/poderes sin el giro más arcaico de «huestes».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en genitivo se traduce de manera directa y reconocible como título pactual.
- source_word: כֹּה תֹּאמְרוּ
  english_pob_choice: Thus you shall say
  chosen_spanish: Así diréis
  alternatives_spanish:
  - Así les diréis
  - Así deben decir
  lexicon: HALOT
  rationale: El plural manda a los destinatarios colectivos; el futuro exhortativo «diréis» mantiene el tono directivo y profético del hebreo.
- source_word: אֶל אֲדֹנֵיכֶם
  english_pob_choice: to your masters
  chosen_spanish: a vuestros amos
  alternatives_spanish:
  - a vuestros señores
  - a sus amos
  lexicon: HALOT
  rationale: Se conserva la misma solución léxica para la repetición del sustantivo, ahora con sufijo de segunda persona plural, manteniendo consistencia y evitando la ambigüedad de «señores».
theological_decisions:
- issue: Rendering of the divine name יהוה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Siguiendo la política del proyecto, se conserva el nombre propio divino en español como «Yahvé», sin sustituirlo por un título, para mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of אֲדֹנִים/אֲדֹנֵי in reference to human authority
  english_pob_reading: masters
  chosen_spanish_reading: amos
  alternative_spanish_readings:
  - señores
  - dueños
  rationale: La referencia es a gobernantes humanos, no a una designación divina. «Amos» conserva la relación de autoridad y la decisión auditada de evitar confusión con el título sagrado «Señor».
  doctrine_reference: POB lexical policy on human vs. divine lordship terminology
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas y el último pass indica que no hubo cambios; por eso esta versión sigue de cerca la lectura ya aprobada, adaptando únicamente la sintaxis y la terminología al español del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, en coherencia con el estándar del proyecto.
  - Se conserva «Dios de Israel» como título pactual directo.
  - Se usa «amos» en ambos casos para אֲדֹנֵיהֶם / אֲדֹנֵיכֶם por consistencia léxica y para evitar la ambigüedad de «Señor».
  - La puntuación reproduce una cita profética introductoria clara y publicable en español moderno.
