translation:
  language: es
  text: ¡Miren![a] Yo estoy trayendo contra ustedes una nación desde lejos, oh casa de Israel, declara Yahvé. Es una nación poderosa; es una nación antigua[b], una nación cuya lengua no conocen[c], y cuya habla no entienden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». «Miren» conserva la fuerza de llamada solemne con español contemporáneo.
    reason: alternative_reading
  - marker: b
    text: O «de antaño» o «de tiempos antiguos» para «una nación antigua».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «cuya lengua no conoces, y no entiendes lo que habla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look, I
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: La fórmula introduce una declaración solemne e inminente. «Miren» conserva el valor deíctico y exhortativo de manera natural en español contemporáneo; el vocativo plural se adecua al tono profético dirigido al pueblo.
- source_word: מֵבִיא עֲלֵיכֶם
  english_pob_choice: am bringing against you
  chosen_spanish: estoy trayendo contra ustedes
  alternatives_spanish:
  - traigo sobre ustedes
  - estoy trayendo sobre ustedes
  lexicon: HALOT
  rationale: El participio con la preposición expresa una acción en curso y cercana. «Contra ustedes» hace explícito el sentido hostil de עַל en este contexto de juicio, sin suavizarlo.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  lexicon: HALOT
  rationale: «Nación» es el equivalente más natural para un ente político/étnico y mantiene la repetición retórica del hebreo.
- source_word: מִמֶּרְחָק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - desde un lugar distante
  lexicon: HALOT
  rationale: La expresión transmite distancia espacial real y el carácter amenazante de la invasión con español claro y breve.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: oh casa de Israel
  alternatives_spanish:
  - casa de Israel
  lexicon: HALOT
  rationale: Se conserva la forma vocativa del original. «Casa de Israel» mantiene la imagen colectiva y la apelación directa del profeta.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé». «Declara» reproduce la fórmula profética נְאֻם con dignidad y precisión; no se sustituye por un título enmascarado.'
- source_word: גּוֹי אֵיתָן
  english_pob_choice: a mighty nation
  chosen_spanish: una nación poderosa
  alternatives_spanish:
  - una nación fuerte
  - una nación firme
  - una nación duradera
  lexicon: HALOT
  rationale: אֵיתָן puede implicar fuerza, firmeza o solidez duradera. «Poderosa» comunica bien la amenaza militar y mantiene abierta la posibilidad semántica sin resolverla demasiado estrechamente.
- source_word: גּוֹי מֵעוֹלָם
  english_pob_choice: an ancient nation
  chosen_spanish: una nación antigua
  alternatives_spanish:
  - una nación de tiempos antiguos
  - una nación de antaño
  - una nación de antiguo
  lexicon: HALOT
  rationale: En este contexto מֵעוֹלָם señala antigüedad, no eternidad. «Antigua» es breve, clara y fiel al valor histórico del término.
- source_word: לֹא תֵדַע לְשֹׁנוֹ
  english_pob_choice: whose language you do not know
  chosen_spanish: cuya lengua no conoces
  alternatives_spanish:
  - de cuya lengua no tienes conocimiento
  - cuyo idioma no conoces
  lexicon: HALOT
  rationale: «Lengua» conserva el campo semántico de לָשׁוֹן y funciona bien en español bíblico actual. «No conoces» expresa la falta de conocimiento lingüístico de forma directa.
- source_word: וְלֹא תִשְׁמַע מַה יְדַבֵּר
  english_pob_choice: and whose speech you do not understand
  chosen_spanish: y cuyo hablar no entiendes
  alternatives_spanish:
  - y no entiendes lo que habla
  - y no comprenderás lo que dice
  lexicon: HALOT
  rationale: שׁמע aquí implica oír con comprensión. «No entiendes» comunica el efecto deseado, más que una mera percepción auditiva; «hablar» mantiene el paralelismo con «lengua».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el Señor
  - dice Yahvé
  rationale: Se preserva el nombre divino como nombre propio, conforme al criterio editorial del proyecto, en lugar de reemplazarlo por una sustitución tradicional. La fórmula profética se mantiene con un verbo de declaración sobrio y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל en «מֵבִיא עֲלֵיכֶם»
  english_pob_reading: bringing against you
  chosen_spanish_reading: trayendo contra ustedes
  alternative_spanish_readings:
  - trayendo sobre ustedes
  - trayendo sobre vosotros
  rationale: En el marco de juicio profético, la preposición debe comunicar hostilidad y no solo proximidad. «Contra» evita atenuar el anuncio de amenaza.
  doctrine_reference: Contexto profético de juicio en Jeremías 5
- issue: Alcance de מֵעוֹלָם
  english_pob_reading: ancient
  chosen_spanish_reading: antigua
  alternative_spanish_readings:
  - de antaño
  - de tiempos antiguos
  rationale: No se adopta una lectura de eternidad. La referencia es temporal e histórica, por lo que «antigua» conserva la tensión sin sobreinterpretarla.
  doctrine_reference: HALOT / contexto histórico del oráculo
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y la concordancia morfológica hebrea. No hubo revisiones pendientes en el pass más reciente; la versión española mantiene el paralelismo, la repetición de גּוֹי y la distinción entre distancia, antigüedad y incomprensibilidad lingüística.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «nación» para גּוֹי y no se sustituye por «pueblo» porque el contexto es geopolítico y de invasión.
  - Se conserva la repetición retórica de «nación» para reflejar el hebreo.
  - «Lengua» y «hablar» se diferencian para reproducir el paralelismo entre idioma y discurso.
  - Se evita «SEÑOR» como máscara del nombre divino.
