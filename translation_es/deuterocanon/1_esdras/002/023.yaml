translation:
  language: es
  text: y sus habitantes llevaban a cabo rebeliones y guerras en ella[a], y había en Jerusalén reyes fuertes y severos, que gobernaban y exigían tributo a Celesiria y Fenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 4:20 describe a Jerusalén como una ciudad rebelde que dañaba a reyes y provincias, con rebelión en ella desde tiempos antiguos. 1 Esdras aquí amplía la descripción con «rebeliones y guerras» y con el tributo de Celesiria y Fenicia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποστάσεις
  english_pob_choice: rebellions
  chosen_spanish: rebeliones
  alternatives_spanish:
  - revueltas
  - sediciones
  lexicon: LSJ
  rationale: ἀποστάσεις designa actos de rebelión o insurrección política. «Rebeliones» conserva el plural y el tono político del contexto, igual que la decisión inglesa.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - luchas
  - batallas
  lexicon: LSJ
  rationale: El plural griego pide un plural directo. «Guerras» reproduce el alcance general del término sin estrecharlo a combates puntuales.
- source_word: συντελοῦντες
  english_pob_choice: carrying out
  chosen_spanish: perpetrando
  alternatives_spanish:
  - llevando a cabo
  - cometiendo
  - realizando
  lexicon: LSJ
  rationale: El participio expresa participación activa en producir esas rebeliones y guerras. «Perpetrando» mantiene la fuerza deliberada y el matiz negativo mejor que una opción más neutra.
- source_word: ἰσχυροὶ καὶ σκληροὶ
  english_pob_choice: strong and harsh
  chosen_spanish: fuertes y severos
  alternatives_spanish:
  - poderosos y duros
  - fuertes y duros
  - poderosos y severos
  lexicon: LSJ
  rationale: La pareja de adjetivos caracteriza a los reyes como poderosos y severos. «Fuertes y severos» distingue ambos rasgos en un español natural y digno.
- source_word: κυριεύοντες
  english_pob_choice: ruling
  chosen_spanish: gobernando
  alternatives_spanish:
  - dominando
  - ejercendo dominio
  lexicon: LSJ
  rationale: El participio indica ejercicio de dominio o gobierno. «Gobernando» es idiomático en español y conserva el sentido político.
- source_word: φορολογοῦντες
  english_pob_choice: exacting tribute from
  chosen_spanish: cobrando tributo de
  alternatives_spanish:
  - exigiendo tributo a
  - imponiendo tributo a
  - cobrando impuestos de
  lexicon: LSJ
  rationale: El verbo expresa imposición de tributo/tasa. «Cobrando tributo de» refleja la exacción imperial sin perder la idea de tributo, acorde con la opción inglesa.
- source_word: κοίλην Συρίαν
  english_pob_choice: Coele-Syria
  chosen_spanish: Celesiria
  alternatives_spanish:
  - Coele-Siria
  - Siria Celesiria
  lexicon: LSJ
  rationale: Se trata de un topónimo helenístico estándar. La transliteración tradicional «Celesiria» funciona bien en español bíblico y evita una traducción literal inadecuada.
- source_word: Φοινίκην
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenicia
  lexicon: LSJ
  rationale: Nombre geográfico estándar en español. «Fenicia» es la forma usual y clara en registro bíblico.
- source_word: ἐν αὐτῇ
  english_pob_choice: within it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - allí
  lexicon: LSJ
  rationale: El pronombre retoma la ciudad mencionada. «En ella» conserva la referencia interna sin añadir énfasis innecesario.
theological_decisions:
- issue: Relación entre el texto griego de 1 Esdras y el paralelo masorético de Esdras 4:20
  english_pob_reading: Mantener en el texto principal la redacción griega más amplia sobre rebeliones, guerras y tributo de Celesiria y Fenicia.
  chosen_spanish_reading: Mantener en el texto principal la redacción griega más amplia sobre rebeliones, guerras y tributo de Celesiria y Fenicia.
  alternative_spanish_readings:
  - 'Una versión más breve y cercana al paralelo masorético: la ciudad era rebelde y dañaba a reyes y provincias, y desde antiguo había rebelión en ella.'
  rationale: Para 1 Esdras, el griego es el texto primario. El paralelo hebreo/araméo sirve como control y ayuda de sanidad textual, pero no debe reemplazar la expansión griega atestiguada aquí.
  doctrine_reference: 'PHILOSOPHY.md: en libros deuterocanónicos, el griego es fuente primaria; los paralelos masoréticos se usan como referencia comparativa, no como base principal.'
translation_notes:
  revision_awareness: 'El pasaje presenta una expansión griega frente al paralelo masorético: se conserva la formulación amplia de ἀποστάσεις y πολέμους, así como la mención geográfica de Celesiria y Fenicia. La revisión más reciente no requirió cambios, y la presente redacción mantiene esa decisión textual.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se usa «rebeliones» para ἀποστάσεις y «guerras» para πολέμους, preservando el paralelismo del griego.
  - «Celesiria» y «Fenicia» se tratan como topónimos propios y no se traducen literalmente.
  - La nota al pie marca la relación con el paralelo de Esdras 4:20 sin desplazar el griego como texto base.
