translation:
  language: es
  text: Harás dos anillos de oro sobre el pectoral, y pondrás los dos anillos sobre los dos extremos del pectoral[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'O: «en los dos extremos del pectoral».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - y harás
  - deberás hacer
  - harás tú
  lexicon: HALOT
  rationale: La forma verbal hebrea, en secuencia instructiva, funciona como mandato. En español, el futuro simple transmite bien la instrucción normativa sin sonar rígido; se evita añadir un 'y' inicial que en español puede resultar innecesario.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  - para
  lexicon: HALOT
  rationale: Para un objeto que se fija físicamente al pectoral, 'sobre' conserva el sentido espacial de contacto/colocación mejor que alternativas más abstractas.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral sacerdotal
  - la pieza del pecho
  - el peto
  lexicon: HALOT
  rationale: '''Pectoral'' es el término español bíblico más natural y claro para el accesorio sacerdotal. Se evita ''peto'' por sonar demasiado moderno o ambiguo, y no se añade ''de juicio'' porque aquí no aparece la expresión constructa correspondiente.'
- source_word: שְׁתֵּי טַבְּעוֹת זָהָב
  english_pob_choice: two gold rings
  chosen_spanish: dos anillos de oro
  alternatives_spanish:
  - dos anillos de oro
  - dos sortijas de oro
  - dos aros de oro
  lexicon: HALOT
  rationale: '''Anillos de oro'' mantiene el material explícito y es plenamente natural en español. ''De oro'' refleja con más fidelidad la relación de material que un adjetivo simple, aunque ambas opciones son posibles.'
- source_word: וְנָתַתָּ
  english_pob_choice: and put
  chosen_spanish: y pondrás
  alternatives_spanish:
  - y colocarás
  - y colocarás allí
  - y poner
  lexicon: HALOT
  rationale: '''Pondrás'' reproduce el verbo de colocación física con sencillez y corresponde al tono procedimental del pasaje. Se conserva la coordinación con ''y'' porque el hebreo también continúa la secuencia instructiva.'
- source_word: אֶת שְׁתֵּי הַטַּבָּעוֹת
  english_pob_choice: the two rings
  chosen_spanish: los dos anillos
  alternatives_spanish:
  - las dos argollas
  - los dos aros
  - las dos sortijas
  lexicon: HALOT
  rationale: El artículo definido y el numeral se expresan de forma directa en español. 'Anillos' mantiene el término ya usado en la primera mitad del versículo, favoreciendo cohesión terminológica.
- source_word: עַל שְׁנֵי קְצֹוֹת הַחֹשֶׁן
  english_pob_choice: on the two ends of the breastpiece
  chosen_spanish: sobre los dos extremos del pectoral
  alternatives_spanish:
  - en los dos extremos del pectoral
  - sobre los dos bordes del pectoral
  - en ambos extremos del pectoral
  lexicon: HALOT
  rationale: '''Extremos'' traduce de modo directo קְצֹות y conserva la imagen de dos puntos terminales del objeto. ''Sobre'' mantiene el valor espacial de fijación, sin cerrar la leve posibilidad alternativa de localización más general.'
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con el texto hebreo y con la solución inglesa auditada: mandato secuencial, material explícito y localización en los extremos del pectoral. La principal decisión fue usar la terminología española natural ''pectoral'' y ''anillos de oro'', preservando la alternativa literal en nota donde el español ofrece otra forma igualmente válida.'
  spanish_consistency_notes:
  - Se conservó 'pectoral' como término fijo para הַחֹשֶׁן en esta unidad.
  - Se mantuvo 'anillos' de manera consistente en ambas ocurrencias de טַבָּעוֹת.
  - La preposición 'sobre' refleja la colocación física y armoniza con la instrucción artesanal del contexto.
