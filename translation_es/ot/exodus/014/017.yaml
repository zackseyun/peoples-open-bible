translation:
  language: es
  text: Y yo—sí, yo—estoy endureciendo el corazón de los egipcios[a] para que entren tras ellos, y obtendré gloria sobre Faraón y sobre todo su ejército, sobre sus carros y sobre sus jinetes.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el corazón de los egipcios», con el singular usado de manera colectiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «seré glorificado sobre Faraón y sobre todo su ejército».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: behold, I
  chosen_spanish: mira[a], yo
  alternatives_spanish:
  - he aquí, yo
  - mira, yo
  lexicon: HALOT
  rationale: La partícula enfática con sufijo de primera persona expresa autorreferencia intensificada. En español, 'mira' reproduce el golpe de atención con naturalidad; 'he aquí' sería más tradicional, pero menos conversacional en este contexto.
- source_word: מְחַזֵּק
  english_pob_choice: am hardening
  chosen_spanish: estoy endureciendo
  alternatives_spanish:
  - endureceré
  - estoy fortaleciendo
  lexicon: HALOT
  rationale: El piel de חזק en este contexto de Éxodo expresa el endurecimiento judicial del ánimo. El presente progresivo comunica acción en curso/inminente y mantiene la agencia directa de Dios sin suavizarla; 'fortaleciendo' sería léxicamente posible, pero no recoge bien el valor narrativo-teológico aquí.
- source_word: לֵב מִצְרַיִם
  english_pob_choice: the hearts of the Egyptians
  chosen_spanish: el corazón de los egipcios[b]
  alternatives_spanish:
  - los corazones de los egipcios
  - el corazón de Egipto
  lexicon: HALOT
  rationale: El singular hebreo puede ser colectivo. Conservar 'corazón' refleja la forma de la fuente y la nota explica el valor colectivo; 'corazones' sería una normalización posible, pero menos cercana al hebreo.
- source_word: וְיָבֹאוּ אַחֲרֵיהֶם
  english_pob_choice: so that they will go in after them
  chosen_spanish: para que entren tras ellos
  alternatives_spanish:
  - y irán tras ellos
  - para que vayan tras ellos
  lexicon: HALOT
  rationale: El verbo בוא en este marco de cruce del mar se expresa mejor como 'entrar' en la escena de la persecución acuática. 'Tras ellos' conserva la secuencia espacial sin añadir interpretación excesiva.
- source_word: וְאִכָּבְדָה
  english_pob_choice: I will get glory
  chosen_spanish: me glorificaré
  alternatives_spanish:
  - recibiré gloria
  - seré glorificado
  lexicon: HALOT
  rationale: La forma nifal expresa que YHWH aparece glorioso/recibe honor en juicio. 'Me glorificaré' conserva la voz reflexiva y la manifestación de su gloria; 'seré glorificado' también es válido, pero suena más pasivo en español.
- source_word: בְּפַרְעֹה
  english_pob_choice: over Pharaoh
  chosen_spanish: sobre el faraón
  alternatives_spanish:
  - contra el faraón
  - por medio del faraón
  lexicon: HALOT
  rationale: Con כבד, la preposición marca el ámbito o el objeto sobre el que se exhibe la gloria. 'Sobre' preserva la idea de triunfo/jucio mejor que una lectura instrumental.
- source_word: חֵילוֹ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - su fuerza
  - su hueste
  lexicon: HALOT
  rationale: חיל en contexto militar designa las fuerzas armadas; 'ejército' es el equivalente contemporáneo más claro y natural.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su carrocería
  - sus carros de guerra
  lexicon: HALOT
  rationale: El hebreo singular con sufijo puede tener sentido colectivo. 'Carros' es natural en español bíblico contemporáneo y evita tecnicismos; 'carros de guerra' explicita pero añade más que la fuente.
- source_word: פָרָשָׁיו
  english_pob_choice: his horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - su caballería
  - sus montados
  lexicon: HALOT
  rationale: El término designa tropas montadas. 'Jinetes' es concreto y claro en español; 'caballería' sería más colectivo/técnico, menos directo.
theological_decisions:
- issue: Endurecimiento divino de Egipto/Faraón
  english_pob_reading: Explicitly render God's direct agency as 'I am hardening' without softening to mere permission.
  chosen_spanish_reading: estoy endureciendo
  alternative_spanish_readings:
  - permito que se endurezcan
  - dejo que se endurezca
  rationale: El hebreo atribuye directamente la acción a Dios. Mantener 'estoy endureciendo' preserva la tensión entre soberanía divina y responsabilidad humana, sin diluirla en una mera permisión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Gloria de Yahvé manifestada en juicio
  english_pob_reading: Use 'I will get glory' to express God's honor manifested through judgment over Pharaoh.
  chosen_spanish_reading: me glorificaré
  alternative_spanish_readings:
  - seré glorificado
  - recibiré gloria
  rationale: La idea central no es solo honor abstracto, sino la manifestación visible de la gloria de Yahvé en el juicio sobre Faraón. 'Me glorificaré' conserva el valor eventivo y reflexivo con buen español moderno.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic or academic)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que ajustó el singular colectivo en inglés ('the heart' -> 'the hearts of the Egyptians'). En español se optó por conservar el singular hebreo ('el corazón') con nota explicativa, o bien puede leerse colectivamente; también se mantuvo la fuerza de la autorreferencia enfática y del endurecimiento divino directo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el texto bíblico general del proyecto, pero en este versículo la referencia divina está implícita por la primera persona; por eso no se introduce el nombre divino explícitamente.
  - '''Faraón'' se escribe con mayúscula/minúscula según uso bíblico editorial; aquí se eligió minúscula por estilo castellano corriente, aunque puede capitalizarse si la serie editorial lo prefiere.'
  - '''Jinetes'' y ''carros'' mantienen coherencia militar con el resto del sintagma (''ejército'').'
