translation:
  language: es
  text: Pero si lo empujó de repente, sin hostilidad[a], o le arrojó cualquier objeto[b] sin estar al acecho,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin enemistad». El término hebreo denota hostilidad personal o animosidad.
    reason: lexical_alternative
  - marker: b
    text: O «sin emboscada» o «sin premeditación». Literalmente, «sin estar al acecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula introduce un caso contrastante frente al anterior; «Pero si» conserva el valor adversativo natural en español y la condición legal.
- source_word: בְּפֶתַע
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: HALOT
  rationale: Expresa la idea de un acto abrupto e inesperado con español natural, manteniendo la fuerza de suddenness del hebreo.
- source_word: בְּלֹא אֵיבָה
  english_pob_choice: without hostility
  chosen_spanish: sin hostilidad
  alternatives_spanish:
  - sin enemistad
  - sin odio
  lexicon: HALOT
  rationale: אֵיבָה señala enemistad/hostilidad entre personas; «sin hostilidad» conserva el matiz interpersonal y es claro en español contemporáneo.
- source_word: הֲדָפוֹ
  english_pob_choice: pushed him
  chosen_spanish: lo empujó
  alternatives_spanish:
  - lo apartó
  - lo golpeó al empujar
  lexicon: HALOT
  rationale: El verbo describe empujar o dar un empujón; «lo empujó» es la correspondencia más directa y natural para este contexto legal.
- source_word: הִשְׁלִיךְ עָלָיו
  english_pob_choice: threw ... at him
  chosen_spanish: le arrojó
  alternatives_spanish:
  - le lanzó
  - lo arrojó contra él
  lexicon: HALOT
  rationale: El verbo implica arrojar/castar algo sobre o hacia una persona; el dativo español evita una construcción pesada y mantiene la dirección del acto.
- source_word: כָּל כְּלִי
  english_pob_choice: any object
  chosen_spanish: cualquier objeto
  alternatives_spanish:
  - cualquier utensilio
  - cualquier instrumento
  lexicon: HALOT
  rationale: כְּלִי es amplio; «objeto» conserva la generalidad del término sin restringirlo a utensilio o vasija.
- source_word: בְּלֹא צְדִיָּה
  english_pob_choice: without lying in wait
  chosen_spanish: sin estar al acecho
  alternatives_spanish:
  - sin emboscada
  - sin premeditación
  lexicon: HALOT
  rationale: צְדִיָּה alude a acecho/emboscada; «sin estar al acecho» preserva la imagen concreta del texto legal y evita sustituirla por una categoría jurídica más abstracta.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la estructura condicional adversativa, la repentina ausencia de hostilidad, el empujón accidental y la alternativa de arrojar un objeto sin acecho. No se detectaron revisiones aplicadas en el expediente inglés, y el estado de acuerdo es alto.'
  spanish_consistency_notes:
  - Se conserva el registro legal sobrio y directo.
  - Se evita traducir mecánicamente con calcos duros cuando el español puede sonar más natural sin perder precisión.
  - Los marcadores de nota [a] y [b] se colocan exactamente donde la ambigüedad léxica aparece en el texto.
