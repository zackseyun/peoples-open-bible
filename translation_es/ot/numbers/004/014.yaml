translation:
  language: es
  text: 'Entonces pondrán sobre él todos sus utensilios con los que ministran en él: los braseros, los garfios, las palas y las vasijas; todos los utensilios del altar. Luego extenderán sobre él una cubierta de cuero fino[a] y pondrán en su lugar sus varas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una cubierta de piel de cabra», «una cubierta de piel de marsopa» o, más generalmente, «una cubierta de cuero durable». El término hebreo para el animal o la piel (taḥash) es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: Then they shall place
  chosen_spanish: Entonces pondrán
  alternatives_spanish:
  - y pondrán
  - luego pondrán
  - entonces colocarán
  lexicon: HALOT
  rationale: El waw consecutivo en instrucciones procedimentales marca secuencia; «Entonces» conserva ese valor. «Pondrán» suena natural en español y mantiene la acción concreta de disponer los objetos sobre el altar.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ello
  lexicon: HALOT
  rationale: El antecedente es el altar, masculino en español. «Sobre él» expresa la colocación física sin endurecer la frase.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  lexicon: HALOT
  rationale: כְּלִי abarca objetos de servicio; «utensilios» comunica bien ese campo semántico en contexto cultual y corresponde al criterio del POB en inglés.
- source_word: אֲשֶׁר יְשָׁרְתוּ עָלָיו בָּהֶם
  english_pob_choice: with which they minister at it
  chosen_spanish: con los que ministran en él
  alternatives_spanish:
  - con los que sirven en él
  - con los que prestan servicio en él
  lexicon: HALOT
  rationale: שרת tiene un sentido técnico de servicio sagrado. «Ministran» preserva ese registro de culto mejor que un «servir» genérico, y «en él» evita la repetición pesada de «sobre él».
- source_word: הַמַּחְתֹּת
  english_pob_choice: the fire pans
  chosen_spanish: las brasas[a]
  alternatives_spanish:
  - los incensarios
  - los braseros
  - las bandejas de fuego
  lexicon: HALOT
  rationale: El hebreo designa un recipiente para brasas o fuego; en español, para no forzar una equivalencia tradicional ambigua, se optó por una forma breve que refleje la función. Se ancla una nota porque el término exacto del utensilio puede entenderse de varias maneras en español y el inglés POB también documenta la incertidumbre léxica.
- source_word: הַמִּזְלָגֹת
  english_pob_choice: the forks
  chosen_spanish: los garfios
  alternatives_spanish:
  - los tenedores
  - las horquillas
  lexicon: HALOT
  rationale: En contexto de altar, «garfios» expresa mejor el implemento de gancho o tridente que un «tenedor» moderno, evitando una lectura doméstica.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las paletas
  - los recogedores
  lexicon: HALOT
  rationale: El término refiere a herramientas para retirar ceniza o material del altar; «palas» es natural en español y suficientemente amplio sin perder la función.
- source_word: הַמִּזְרָקֹת
  english_pob_choice: the basins
  chosen_spanish: los tazones
  alternatives_spanish:
  - las vasijas
  - los cuencos
  lexicon: HALOT
  rationale: Para recipientes cultuales, «tazones» es claro y sobrio en español. Aunque «vasijas» es posible, «tazones» mantiene la idea de recipientes de servicio de manera más concreta.
- source_word: כֹּל כְּלֵי הַמִּזְבֵּחַ
  english_pob_choice: all the utensils of the altar
  chosen_spanish: todos los utensilios del altar
  alternatives_spanish:
  - todos los implementos del altar
  - todos los vasos del altar
  lexicon: HALOT
  rationale: Se conserva la repetición de «utensilios» para mantener la cohesión léxica con כֵּלָיו y la lista enumerada. «Del altar» hace explícito el ámbito cultual.
- source_word: וּפָרְשׂוּ עָלָיו
  english_pob_choice: Then they shall spread over it
  chosen_spanish: Luego extenderán sobre él
  alternatives_spanish:
  - y extenderán sobre él
  - y lo cubrirán
  lexicon: HALOT
  rationale: פָרַשׂ significa extender o desplegar; «extenderán» conserva la imagen de cubrir mediante una pieza desplegada y evita adelantar demasiado el sentido de «cubrir».
- source_word: כְּסוּי
  english_pob_choice: a covering
  chosen_spanish: una cubierta
  alternatives_spanish:
  - un cobertor
  - un recubrimiento
  lexicon: HALOT
  rationale: «Cubierta» es una opción natural y digna en español para un objeto destinado a cubrir algo. Evita redundancia con el verbo anterior y mantiene el estilo inventarial.
- source_word: עוֹר תַּחַשׁ
  english_pob_choice: fine leather
  chosen_spanish: cuero fino
  alternatives_spanish:
  - cuero durable
  - piel de tájash
  - cuero de piel desconocida
  lexicon: HALOT
  rationale: Siguiendo el criterio del POB en inglés, se evita identificar zoológicamente el término incierto תַּחַשׁ. «Cuero fino» comunica material de calidad y deja abierta la incertidumbre léxica sin introducir una especie no segura.
- source_word: וְשָׂמּוּ בַדָּיו
  english_pob_choice: and put its poles in place
  chosen_spanish: y pondrán en su lugar sus varas
  alternatives_spanish:
  - y colocarán sus varas
  - y ajustarán sus varas
  lexicon: HALOT
  rationale: בַּדִּים son varas de transporte. «Pondrán en su lugar» aclara la idea de instalación/preparación para el traslado y mantiene el matiz funcional del inglés POB.
translation_notes:
  revision_awareness: 'Coincidencia alta con el audit trail inglés: no hubo revisiones aplicadas en el inglés POB y el consenso de revisión fue de acuerdo total; por ello, la redacción española sigue de cerca las decisiones léxicas ya auditadas, especialmente en la lista de utensilios, la acción de extender la cubierta y la expresión cautelosa para תַּחַשׁ.'
  spanish_consistency_notes:
  - Se mantiene «utensilios» para כְּלִי en ambas ocurrencias, preservando cohesión terminológica.
  - Se usa «ministran» para reflejar el servicio cultual técnico de שׁרת, en lugar de un simple «servir».
  - La nota [a] se ancla en «cuero fino» para reflejar la incertidumbre léxica del término תַּחַשׁ sin resolverla de forma especulativa.
  - Se emplea «varas» para בַּדִּים, que en este contexto son piezas de transporte del altar.
