id: 2KI.19.18
reference: 2 Kings 19:18
source:
  edition: WLC
  text: וְ/נָתְנ֥וּ אֶת אֱלֹהֵי/הֶ֖ם בָּ/אֵ֑שׁ כִּי֩ לֹ֨א אֱלֹהִ֜ים הֵ֗מָּה כִּ֣י אִם מַעֲשֵׂ֧ה יְדֵֽי אָדָ֛ם עֵ֥ץ וָ/אֶ֖בֶן וַֽ/יְאַבְּדֽוּ/ם־־־׃
translation:
  text: and they have cast their gods into the fire[a], for they were not gods, but the work of human hands, wood and stone; therefore they destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they put their gods in the fire.' The Hebrew verb is literally 'gave/put,' used here in the sense of casting something into the fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: they have thrown
  alternatives:
  - they gave
  - they put
  - they cast
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put,' but in the idiom with 'into the fire' the sense is effectively 'throw/cast into.' 'Thrown' is natural modern English and fits the destructive context better than the overly wooden 'gave.' Perfect aspect is represented with 'have' in this reported past context, though simple past would also be possible in English.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their idols
  lexicon: HALOT
  rationale: 'The noun is literally ''their gods.'' Although the referents are idols, the text states the nations'' claim before denying their divinity in the next clause. Rendering it ''gods'' preserves the rhetorical force: they were called gods, but were not truly gods.'
- source_word: בָּאֵשׁ
  chosen: into the fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: With the motion verb, English idiom prefers 'into the fire' rather than the more static 'in the fire.'
- source_word: כִּי לֹא אֱלֹהִים הֵמָּה
  chosen: for they were not gods
  alternatives:
  - for they are not gods
  - because they were no gods
  lexicon: HALOT
  rationale: This clause gives the reason those objects could be burned. 'Were not gods' fits the narrative frame and English style. The predicate is qualitative/denial of true deity, not merely a statement about names.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: 'Here כי אם introduces a strong contrast: not gods, but rather something else. ''But'' is the clearest concise rendering in modern English.'
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  chosen: the work of human hands
  alternatives:
  - the work of man's hands
  - a work of human hands
  - what human hands made
  lexicon: HALOT
  rationale: This phrase emphasizes human manufacture. 'Human hands' communicates the generic sense of אָדָם here and follows the doctrine's gender-accurate principle for generic humanity.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: In this context אָדָם is generic rather than referring to a male individual. 'Human' in the phrase 'human hands' is natural, accurate, and preserves the contrast between the living God and man-made objects.
- source_word: עֵץ וָאֶבֶן
  chosen: wood and stone
  alternatives:
  - timber and stone
  lexicon: HALOT
  rationale: A straightforward material description of the idols. 'Wood and stone' is idiomatic and traditional without being archaic.
- source_word: וַיְאַבְּדוּם
  chosen: so they destroyed them
  alternatives:
  - and they destroyed them
  - and so they perished
  - thus they destroyed them
  lexicon: HALOT
  rationale: 'The form is best taken transitively with 3mp subject and 3mp object: the invaders destroyed the idols. ''So'' brings out the result/inference from the previous clause: because they were only wood and stone, they destroyed them.'
