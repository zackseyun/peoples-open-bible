  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: consecuencia (''Por eso''), sujeto doble (''los sacerdotes de Dagón y todos los que entran en la casa de Dagón''), la acción habitual de no pisar el umbral, la ubicación en Asdod y la fórmula temporal ''hasta el día de hoy''. También sigue correctamente la revisión inglesa que prefirió ''casa'' sobre ''templo'' y ''umbral de Dagón'' de forma explícita.'
  spanish_quality_summary: 'El español base es claro y natural, pero contiene errores formales que impiden aprobarlo: ''Dagn[a]'' en el texto, una nota al pie mal anclada y redundante, e inconsistencias ortográficas entre ''Dagn'', ''Dagon'' y ''Dagón'' en las decisiones léxicas. La lectura principal necesita una reparación menor y conviene eliminar la nota porque no preserva una alternativa real en español.'
  glossary_alignment: No hay términos del glosario de proyecto en conflicto. 'Dagón', 'Asdod', 'casa' y 'umbral' son adecuados. La elección de 'casa de Dagón' concuerda con la preferencia documentada por fidelidad léxica al hebreo בֵּית.
  issues:
  - severity: high
    issue: 'Error textual en el nombre propio: ''Dagn[a]'''
    rationale: El texto principal tiene una forma corrupta del nombre y un marcador de nota incrustado indebidamente. Esto afecta la legibilidad y la exactitud del referente.
  - severity: medium
    issue: La nota al pie no preserva una alternativa significativa y está mal ubicada
    rationale: La nota repite casi exactamente la redacción principal ('no pisan el umbral de Dagón') en lugar de ofrecer una variante real como en el audit trail inglés. Además, el marcador está puesto sobre el nombre propio, no sobre la frase pertinente.
  - severity: low
    issue: 'Inconsistencia ortográfica en material de apoyo: ''Dagn'', ''Dagon'' y ''Dagón'''
    rationale: 'Aunque no todo esto está en el texto principal, conviene normalizar al español bíblico esperado: ''Dagón''.'
  revised_spanish_text: Por eso los sacerdotes de Dagón y todos los que entran en la casa de Dagón en Asdod no pisan el umbral de Dagón hasta el día de hoy.
  revision_rationale: Se corrige el error tipográfico/codificación en 'Dagón' y se elimina la nota al pie porque no aporta una alternativa léxica útil en español ni corresponde adecuadamente al punto anotado. El resto de la redacción ya era fiel al hebreo, natural en español y coherente con el audit trail.
