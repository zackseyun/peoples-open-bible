  yaml_path: translation/deuterocanon/2_maccabees/007/037.yaml
  text: But I[a], like my brothers, give up both body and life for the laws of our fathers, calling on God quickly to become merciful to the nation, and for you, through torments and whippings[b], to confess that he alone is God.
  footnotes:
  - marker: a
    text: Or 'life' could be rendered 'fate' or 'lot'; the Greek term τύχην can denote one's lot or destiny, but here it refers concretely to the life being surrendered in martyrdom.
    reason: lexical_alternative
  - marker: b
    text: Or 'to acknowledge openly'; the verb translated 'to confess' can also mean public acknowledgment.
    reason: lexical_alternative
