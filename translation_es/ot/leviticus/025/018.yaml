    text: Or 'my decrees ... my ordinances.' The Hebrew distinguishes two legal terms, חֻקִּים and מִשְׁפָּטִים.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats ''do'': literally, ''and you shall do my statutes ... and my judgments you shall keep and do them.'''
    reason: lexical_alternative
  - marker: c
    text: That is, dwell in the promised land in safety.
    reason: cultural_note
