translation:
  language: es
  text: Y el sacerdote los ofrecerá, uno como ofrenda por el pecado[a] y el otro como holocausto, y el sacerdote hará expiación por él delante de Yahvé a causa de su flujo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno para una ofrenda de purificación». El término hebreo חַטָּאת puede designar la ofrenda usada para quitar impureza ritual, no solo una ofrenda por pecado moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall offer
  chosen_spanish: los ofrecerá
  alternatives_spanish:
  - los hará
  - los presentará
  - los preparará
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה con los objetos de la ofrenda se entiende como realizar el rito de ofrecer. «Ofrecerá» comunica naturalmente esa acción cultual en español sin perder precisión.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el ministro
  lexicon: HALOT
  rationale: כהן en legislación cultual se traduce de forma estable como «sacerdote», término claro y fiel al marco levítico.
- source_word: אֶחָד חַטָּאת
  english_pob_choice: one as a sin offering
  chosen_spanish: uno como ofrenda por el pecado
  alternatives_spanish:
  - uno como ofrenda de purificación
  - uno para purificación
  lexicon: HALOT
  rationale: Se conserva la equivalencia tradicional de חטאת como «ofrenda por el pecado», pero en español también se deja abierta la lectura ritual de purificación mediante la nota. Esto evita borrar la tensión léxica presente en el hebreo.
- source_word: וְהָאֶחָד עֹלָה
  english_pob_choice: and the other as a burnt offering
  chosen_spanish: y el otro como holocausto
  alternatives_spanish:
  - y el otro como ofrenda quemada
  - y el otro como ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda íntegramente consumida por fuego; «holocausto» es el término bíblico tradicional y preciso en español. Se mantiene por fidelidad cultual y claridad interconfesional.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: and ... shall make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará atonación por él
  - hará expiación en favor de él
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal puede expresarse como «hacer expiación», que en español bíblico conserva el sentido ritual y teológico sin reducirlo a una sola teoría de la expiación. Se elige «por él» para reflejar על + pronombre.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. «Delante de» refleja היטב la fórmula espacial-ritual de לִפְנֵי y su carácter litúrgico.
- source_word: מִזּוֹבוֹ
  english_pob_choice: because of his discharge
  chosen_spanish: a causa de su flujo
  alternatives_spanish:
  - por causa de su flujo
  - a causa de su flujo corporal
  - por su descarga
  lexicon: HALOT
  rationale: זוב refiere a una emisión/fluir corporal; «flujo» es el equivalente español más natural en lenguaje bíblico y médico-ritual. La preposición מ aquí expresa causa/origen, por lo que «a causa de» comunica mejor el sentido que un literal «de» o «desde».
theological_decisions:
- issue: Sentido de חַטָּאת en un contexto de pureza ritual
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda para purificación
  rationale: En Levítico, חַטָּאת puede abarcar una ofrenda que trata la impureza ritual, no solo el pecado moral. La forma principal mantiene la expresión bíblica tradicional en español, mientras la nota preserva la alternativa técnica para no aplanar la ambigüedad ritual del hebreo.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de כפר en la fórmula sacerdotal
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer atonación
  - purgar ritualmente
  rationale: «Hacer expiación» conserva la densidad cultual de כפר sin forzar una interpretación doctrinal única. Es la opción más fiel y reconocible en español bíblico para el acto sacerdotal descrito.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión inglesa sin cambios sustantivos; el español mantiene esa lectura estable y conserva la nota léxica sobre חַטָּאת para reflejar la tensión ritual documentada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «sacerdote» para כהן en contexto levítico cultual.
  - Se mantiene el paralelismo de dos ofrendas con una estructura sintáctica clara y no interpretativa.
  - «Expiación» se usa como término técnico bíblico en lugar de una paráfrasis más explicativa.
  - La nota de חַטָּאת preserva la alternativa de purificación sin desplazar el texto principal.
