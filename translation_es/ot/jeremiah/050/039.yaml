translation:
  language: es
  text: Por tanto, criaturas del desierto habitarán allí con hienas[a], y avestruces[b] habitarán en ella[c]; no volverá a ser habitada, ni vivirá nadie en ella de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chacales» o «criaturas aulladoras»; la identificación exacta de los términos hebreos para estos animales del desierto es incierta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hijas del avestruz»; es decir, avestruces. Versiones antiguas a veces lo traducen como «búhos».
    reason: lexical_alternative
  - marker: c
    text: 'La ciudad está personificada en femenino en hebreo: «en ella», «no volverá a ser habitada».'
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca consecuencia inferencial de la sentencia previa; en español, «por tanto» mantiene el valor conclusivo con registro bíblico natural.
- source_word: צִיִּים
  english_pob_choice: desert creatures
  chosen_spanish: criaturas del desierto
  alternatives_spanish:
  - animales del desierto
  - criaturas salvajes del desierto
  lexicon: HALOT
  rationale: El término apunta a seres asociados con parajes desolados; «criaturas del desierto» conserva la indeterminación zoológica documentada en el texto fuente.
- source_word: אִיִּים
  english_pob_choice: hyenas
  chosen_spanish: hienas
  alternatives_spanish:
  - chacales
  - criaturas aulladoras
  - animales salvajes
  lexicon: HALOT
  rationale: La identificación exacta es incierta, pero la opción inglesa principal fue «hyenas». En español se mantiene esa propuesta específica y se reserva la incertidumbre en nota.
- source_word: בְּנוֹת יַעֲנָה
  english_pob_choice: ostriches
  chosen_spanish: las hijas del avestruz
  alternatives_spanish:
  - avestruces
  - hembras de avestruz
  - búhos
  lexicon: HALOT
  rationale: Literalmente es un giro idiomático hebreo equivalente a «avestruces». Se conserva la forma transparente «hijas del avestruz» porque el POB inglés preservó la literalidad en nota y así se ve la base semítica.
- source_word: בָהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella, la ciudad
  - en eso
  lexicon: Hebrew grammar
  rationale: El sufijo femenino singular remite a la ciudad personificada. «En ella» conserva esa personificación sin forzar un sustantivo adicional en el verso principal.
- source_word: לֹא תֵשֵׁב עוֹד לָנֶצַח
  english_pob_choice: she will never again be inhabited
  chosen_spanish: No volverá a ser habitada
  alternatives_spanish:
  - Nunca más será habitada
  - No será habitada jamás
  lexicon: HALOT
  rationale: El hebreo combina negación de repetición y permanencia; el español recoge el sentido enfático con una forma fluida, sin duplicar innecesariamente «para siempre».
- source_word: לֹא תִשְׁכּוֹן
  english_pob_choice: nor will she be dwelt in
  chosen_spanish: ni será habitada
  alternatives_spanish:
  - ni morará nadie en ella
  - ni será morada de nadie
  lexicon: HALOT
  rationale: Se mantiene el valor de residencia/domicilio del verbo con un pasivo natural en español. Dado que la ciudad sigue como sujeto implícito, «ser habitada» expresa bien la idea.
- source_word: עַד דּוֹר וָדוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - a lo largo de las generaciones
  lexicon: HALOT
  rationale: Es la equivalencia idiomática española estándar para duración sucesiva entre generaciones.
theological_decisions:
- issue: Personificación femenina de la ciudad
  english_pob_reading: 'The city is personified as feminine in Hebrew: ''in her,'' ''she will not be inhabited.'''
  chosen_spanish_reading: 'La ciudad sigue personificada en femenino: «en ella» y los verbos en femenino singular.'
  alternative_spanish_readings:
  - en it
  - no volverá a ser habitada, ni será habitado
  rationale: El hebreo usa sufijos y verbos femeninos para la ciudad; el español debe conservar esa personificación para no borrar el rasgo literario y profético del texto.
  doctrine_reference: Jeremías 50:39; personificación profética del oráculo de juicio
- issue: Intensidad de la desolación permanente
  english_pob_reading: she will never again be inhabited; nor will she be dwelt in from generation to generation
  chosen_spanish_reading: No volverá a ser habitada, ni será habitada de generación en generación.
  alternative_spanish_readings:
  - Nunca más será habitada
  - No será habitada jamás
  rationale: El hebreo refuerza la permanencia mediante dos expresiones; el español conserva ambas dimensiones sin suavizarlas, manteniendo el tono de juicio definitivo.
  doctrine_reference: Jeremías 50:39; juicio contra Babilonia
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente: elimina cualquier redundancia equivalente a «para siempre» tras la idea de «no volverá a ser habitada», mantiene el paralelismo entre los dos verbos de residencia con un español más formal, y conserva la incertidumbre zoológica mediante nota en lugar de resolverla de forma dogmática.'
  spanish_consistency_notes:
  - Se usa «habitar» / «ser habitada» de manera consistente para los dos verbos hebreos de residencia.
  - Se preserva «en ella» para la ciudad personificada, evitando neutralizar el femenino del hebreo.
  - Se mantiene «de generación en generación» como equivalente idiomático estable.
  - «Hienas» se deja en el texto principal siguiendo la opción inglesa documentada, con alternativas en nota.
