review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene el infinitivo dependiente con valor de propósito/resultado, conserva «naciones», «desde el extremo de la tierra», «ver su gloria» y la idea de que los hijos son traídos como dones. Sin embargo, «para que naciones vengan» introduce una subordinada finita menos ceñida que el infinitivo español natural «para que las naciones vengan» o mejor «para que vengan naciones»; además falta el artículo con «naciones». Más importante, «sus hijos» debilita innecesariamente el valor masculino específico de υἱούς, que el expediente inglés quiso preservar como «sons».'
  spanish_quality_summary: El español es bastante legible, pero «para que naciones vengan» suena incompleto/áspero por la ausencia del artículo y puede mejorarse con una formulación más idiomática. «Como ofrenda» es entendible, pero «como dones» o «como ofrendas» se acerca más al plural δῶρα; aun así en español singular colectivo puede funcionar. La mejora principal es hacer la frase más natural y preservar «hijos varones»/«hijos» con referencia masculina explícita. La mejor solución fluida es «sus hijos debilitados como dones», con nota alternativa preservada.
  glossary_alignment: No hay conflicto con términos teológicos mayores del glosario del proyecto. La decisión clave es mantener el valor específico de υἱούς mejor que el actual «sus hijos» si este puede leerse de modo inclusivo; en este contexto conviene «sus hijos» solo si se entiende como masculino, pero para mayor fidelidad puede reforzarse con la nota o con redacción que no neutralice el matiz. «Naciones» y «gloria» están alineados.
  issues:
  - severity: medium
    issue: Falta el artículo en «para que naciones vengan».
    rationale: En español estándar, «para que las naciones vengan» o «para que vengan naciones» suena natural; la forma actual es áspera y menos idiomática.
  - severity: medium
    issue: «Sus hijos» neutraliza parcialmente el masculino específico de υἱούς.
    rationale: El expediente inglés documenta expresamente que debe preservarse «sons» frente a «children». En español «hijos» puede funcionar, pero conviene evitar que se perciba como neutralizador si hay una opción más fiel y natural en contexto.
  - severity: low
    issue: La nota al pie no refleja exactamente la mejor alternativa española del texto revisado.
    rationale: Si se ajusta el orden para mayor naturalidad, la nota debe actualizarse para corresponder exactamente al anclaje y a las alternativas preservadas.
