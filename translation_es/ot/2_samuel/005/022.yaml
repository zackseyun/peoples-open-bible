translation:
  language: es
  text: Y los filisteos subieron de nuevo y se desplegaron en el Valle de Refaim[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se desplegaron' o 'hicieron una incursión/se extendieron'. El verbo hebreo probablemente describe a los filisteos tomando posición a lo largo del valle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִ֥פוּ ע֛וֹד
  english_pob_choice: came up again
  chosen_spanish: subieron de nuevo
  alternatives_spanish:
  - volvieron a subir
  - subieron otra vez
  - subieron nuevamente
  lexicon: HALOT
  rationale: El hebreo expresa repetición de la acción de subir; en español, 'subieron de nuevo' conserva la repetición sin forzar un calco como 'añadieron otra vez'.
- source_word: פְּלִשְׁתִּ֖ים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar; en español bíblico y actual, 'filisteos' es la forma natural y fiel.
- source_word: לַֽ/עֲל֑וֹת
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron subiendo
  - avanzaron
  lexicon: HALOT
  rationale: עלה significa literalmente 'subir'; en narrativa militar, 'subieron' conserva la imagen de movimiento hacia las alturas sin añadir interpretación.
- source_word: וַ/יִּנָּֽטְשׁ֖וּ
  english_pob_choice: spread out
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se extendieron
  - tomaron posición
  - se repartieron
  lexicon: HALOT
  rationale: El verbo aquí describe la disposición del ejército en el valle. 'Se desplegaron' expresa bien la toma de posición militar y deja abierta la tensión lexical entre despliegue y posible incursión indicada por el audit trail inglés.
- source_word: בְּ/עֵ֥מֶק
  english_pob_choice: in the Valley
  chosen_spanish: en el Valle
  alternatives_spanish:
  - en el valle
  lexicon: HALOT
  rationale: עֵמֶק significa 'valle'; se capitaliza como parte de un topónimo establecido con Refaim/Rephaim.
- source_word: רְפָאִֽים
  english_pob_choice: Rephaim
  chosen_spanish: Refaim
  alternatives_spanish:
  - Refaím
  - Rephaim
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. 'Refaim' es una forma clara y habitual en español, mientras que se evita traducir el topónimo.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva; la elección española mantiene la misma lectura de repetición, movimiento ascendente y despliegue militar en el valle.
  spanish_consistency_notes:
  - Se mantiene 'filisteos' para el etnónimo y 'Refaim' para el topónimo, con capitalización del lugar como en el inglés auditado.
  - Se evita 'SEÑOR' u სხვა equivalentes no pertinentes, ya que no aparece el Tetragrámaton en este versículo.
  - '''Se desplegaron'' conserva la ambigüedad lexical documentada en el audit trail inglés sin imponer una interpretación más estrecha.'
