base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/005/009.yaml
  text: He who had made many exiles from their homeland perished in a foreign land[b][a], having gone up to the Lacedaemonians as though he would obtain protection because of the kinship.
  footnotes:
  - marker: a
    text: Or 'to the Spartans.' 'Lacedaemonians' is the more literal rendering of the Greek ethnic name.
    reason: lexical_alternative
  - marker: b
    text: The 'kinship' likely refers to the traditional claimed relationship between the Jews and the Spartans mentioned elsewhere (compare 1 Maccabees 12:6-23).
    reason: cross_reference
