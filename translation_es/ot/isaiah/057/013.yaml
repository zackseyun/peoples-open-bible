revisions:
- from: Cuando clames[a], ¡que te rescaten tus cosas reunidas! Pero el viento se los llevará a todos; un soplo[b] los arrebatará. Pero el que se refugia en mí heredará la tierra[c] y poseerá mi santo monte.
  to: Cuando clames[a], ¡que te rescaten tus ídolos reunidos! Pero el viento se los llevará a todos; un soplo[b] los arrebatará. Pero el que se refugia en mí heredará la tierra[c] y poseerá mi santo monte.
  rationale: La revisión principal sustituye «tus cosas reunidas» por «tus ídolos reunidos» para alinear el español con la decisión contextual documentada en el POB inglés y mejorar la naturalidad en español. Se conserva la alternativa más literal en nota [a], junto con los posibles referentes contextuales. También se ajusta la nota [c] para que presente una alternativa auténtica y explique mejor el valor de אֶרֶץ en este contexto.
