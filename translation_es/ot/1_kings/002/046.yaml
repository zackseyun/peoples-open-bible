translation:
  language: es
  text: Entonces el rey mandó a Benaía hijo de Joyadá, y él salió y lo derribó, y murió. Así, el reino quedó establecido en la mano de Salomón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “quedó firmemente establecido bajo Salomón” / “en poder de Salomón”. El hebreo “en la mano de” expresa control o posesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio órdenes a
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato. En español, 'mandó' conserva el tono real y narrativo sin sonar rígido; 'ordenó' también sería posible, pero 'mandó' fluye mejor en este contexto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El referente contextual es Salomón. 'El rey' es la forma natural y directa en español para mantener la referencia narrativa.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joyadá
  alternatives_spanish:
  - Benaía, hijo de Joyadá
  lexicon: transliteración bíblica estándar
  rationale: Los nombres propios se adaptan a la forma bíblica habitual en español. 'Hijo de' conserva el valor constructo sin forzar una sintaxis extraña.
- source_word: וַיֵּצֵא
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  lexicon: HALOT
  rationale: יצא significa salir/ir fuera. 'Salió' es breve y natural, y mantiene la secuencia narrativa.
- source_word: וַיִּפְגַּע בּוֹ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió de muerte
  alternatives_spanish:
  - lo atacó
  - cayó sobre él
  - lo golpeó
  lexicon: HALOT
  rationale: פגע con ב puede expresar golpear, acometer o herir. Dado que el resultado inmediato es 'y murió', 'lo hirió de muerte' comunica el acto violento con claridad sin perder la relación causal del hebreo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: מות se traduce de manera directa. 'Murió' preserva la secuencia explícita del texto.
- source_word: וְהַמַּמְלָכָה
  english_pob_choice: So the kingdom
  chosen_spanish: Así, el reino
  alternatives_spanish:
  - Y el reino
  - Entonces el reino
  lexicon: HALOT
  rationale: ממלכה puede ser 'reino' o 'reinado'. 'Reino' es la opción más natural aquí y mantiene el alcance político del pasaje. 'Así' expresa la consecuencia narrativa.
- source_word: נָכוֹנָה
  english_pob_choice: was established
  chosen_spanish: quedó establecido
  alternatives_spanish:
  - fue establecido
  - quedó firmemente establecido
  - se afianzó
  lexicon: HALOT
  rationale: 'Niphal de כון: quedar establecido, firmarse, quedar firme. ''Quedó establecido'' expresa bien el estado resultante; ''quedó'' ayuda a marcar la situación consolidada.'
- source_word: בְּיַד שְׁלֹמֹה
  english_pob_choice: in the hand of Solomon
  chosen_spanish: en la mano de Salomón
  alternatives_spanish:
  - bajo el control de Salomón
  - en poder de Salomón
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea 'en la mano de' porque el inglés POB la retiene como idiomática y explica su sentido de control/posesión. En español, la expresión sigue siendo comprensible y transparente.
theological_decisions:
- issue: Idiom of control/possession in 'in the hand of Solomon'
  english_pob_reading: The Hebrew idiom 'in the hand of' expresses control or possession.
  chosen_spanish_reading: La expresión 'en la mano de Salomón' conserva la imagen hebrea y se entiende como dominio o posesión del reino por parte de Salomón.
  alternative_spanish_readings:
  - bajo el control de Salomón
  - en poder de Salomón
  - bajo Salomón
  rationale: No hay tensión doctrinal, pero sí una decisión interpretativa sobre una metáfora semítica. Se conserva la metáfora en el texto principal y se explicita su sentido idiomático en nota, siguiendo el audit trail inglés.
  doctrine_reference: Ninguna; decisión de fraseología e imagen idiomática.
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del pasaje en el audit trail inglés y no introduce revisiones nuevas. Se mantiene la secuencia verbal del hebreo y la imagen idiomática final, con una nota explicativa equivalente a la del inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - '''Benaía'' y ''Joyadá'' siguen la forma bíblica habitual en español para nombres propios.'
  - Se mantiene la metáfora 'en la mano de' con apoyo de nota para preservar la transparencia source-grounded.
  - '''Reino'' se usa como equivalente contextual de ממלכה, sin introducir ''reinado'' porque aquí la referencia principal es el dominio real consolidado.'
