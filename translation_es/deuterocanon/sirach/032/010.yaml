translation:
  language: es
  text: Antes del granizo, relampaguea el rayo; y antes de la vergüenza, sale el favor.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gracia» para «favor» (hebreo חֵן).
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo difiere sustancialmente: «Con buen ojo glorifica al Señor, y no disminuyas las primicias de tus manos». El texto principal de este registro sigue aquí el testimonio hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἀγαθῷ ὀφθαλμῷ
  english_pob_choice: with a good eye
  chosen_spanish: Con buen ojo
  alternatives_spanish:
  - con ojo bueno
  - con buena mirada
  lexicon: LXX/Ben Sira usage; Spanish idiom
  rationale: El griego expresa una disposición favorable o generosa, no un detalle físico. 'Con buen ojo' conserva la imagen semítica/grecolatina de una mirada favorable y suena natural en español bíblico sin explicitar más de lo que el texto dice.
- source_word: δόξασον
  english_pob_choice: glorify
  chosen_spanish: glorifica
  alternatives_spanish:
  - honra
  - da gloria a
  lexicon: BDAG / LXX usage
  rationale: '''Glorifica'' corresponde de manera directa al mandato de dar gloria. ''Honra'' podría sugerir un matiz distinto, y ''da gloria a'' es más perifrástico.'
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Dios
  lexicon: LXX divine-name convention
  rationale: Aunque el proyecto suele usar 'Yahvé' para יהוה, aquí el texto fuente inmediato es griego κύριον dentro de una tradición sapiencial griega. En el verso griego no hay un marcador explícito de sustitución del nombre divino, por lo que 'Señor' refleja fielmente el paralelismo del griego recibido y evita introducir una decisión no atestiguada en este record.
- source_word: μὴ μικρύνῃς
  english_pob_choice: do not diminish
  chosen_spanish: no disminuyas
  alternatives_spanish:
  - no reduzcas
  - no empequeñezcas
  lexicon: LSJ / LXX context
  rationale: '''Disminuyas'' reproduce bien la idea de no hacer menor o insuficiente algo debido. ''Reduzcas'' funciona, pero ''disminuyas'' es más cercano al campo semántico del griego y al tono proverbial.'
- source_word: ἀπαρχὴν χειρῶν σου
  english_pob_choice: the firstfruits of your hands
  chosen_spanish: las primicias de tus manos
  alternatives_spanish:
  - la primicia de tus manos
  - los primeros frutos de tus manos
  lexicon: LXX cultic phrase
  rationale: '''Primicias'' es el término bíblico usual para ἀπαρχή y mantiene la resonancia cultual/ofrenda. ''De tus manos'' conserva el origen de la obra o del don. ''Los primeros frutos'' explica la imagen, pero pierde la carga terminológica cultual.'
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew witness here, while noting that the Greek parallel reads differently.
  chosen_spanish_reading: El texto principal sigue el griego disponible de este registro, con nota de que el hebreo conservado en la fuente auditada difiere sustancialmente.
  alternative_spanish_readings:
  - 'Seguir solo el hebreo: ''Antes del granizo…'''
  - Ofrecer ambos textos en el cuerpo principal
  rationale: El paquete fuente para este encargo incluye un paralelo griego completo y un hebreo muy diferente. Dado que se solicita un borrador español basado en la evidencia original más el rastro auditado, el cuerpo principal se adhiere al griego aquí citado y la nota registra la divergencia textual. Esto preserva la tensión documental sin borrarla.
  doctrine_reference: Principio de crítica textual y transparencia de fuentes en la People's Open Bible.
- issue: Elección de 'Señor' frente a 'Yahvé'
  english_pob_reading: the Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto griego usa κύριον en una forma que, aunque relacionada con el nombre divino, llega aquí como tradición textual sapiencial griega. Sin un anclaje explícito en este record para sustituirlo por 'Yahvé', 'Señor' evita sobreespecificar y mantiene la coherencia con el paralelo griego.
  doctrine_reference: Convención de traducción para κύριος cuando el paralelo griego es el testimonio base inmediato.
translation_notes:
  revision_awareness: El registro auditado en inglés marca una divergencia mayor entre el hebreo conservado y el paralelo griego, y no presenta revisiones aplicadas. Para este borrador español se priorizó el paralelo griego porque el paquete fuente lo proporciona explícitamente y porque el hebreo del archivo fuente no corresponde al contenido del griego citado.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, evitando calcos duros salvo en la frase cultual 'primicias de tus manos'.
  - '''Señor'' se usa aquí como traducción del κύριον griego del paralelo, no como sustitución automática de יהוה.'
  - La nota textual usa un marcador único [b] y no se añadió pie para 'buen ojo' porque la frase es suficientemente transparente en español.
