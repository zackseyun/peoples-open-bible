translation:
  language: es
  text: Estos son los clanes de Neftalí, por sus clanes[a], y los registrados de entre ellos[b] fueron cuarenta y cinco mil cuatrocientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus clanes».
    reason: lexical_alternative
  - marker: b
    text: O «los contados de entre ellos»; el hebreo se refiere a los inscritos en el censo, sin explicitar aquí «hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas eran
  lexicon: HALOT
  rationale: La fórmula demostrativa de cierre de censo en español suena natural en presente y conserva el valor de introducción resumidora del hebreo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En español bíblico, 'familias' comunica bien la subdivisión tribal de un censo; 'clanes' es posible, pero aquí 'familias' mantiene la relación de parentesco sin sonar demasiado técnico.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: Transliteración estándar
  rationale: Se usa la forma española usual del nombre tribal.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: familias[a]
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: El prefijo ל en esta fórmula de censo expresa distribución o clasificación. En español, 'de Neftalí' ya incorpora la pertenencia tribal, y la nota explica la alternativa 'según sus familias' para reflejar el matiz organizativo del hebreo.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered of them
  chosen_spanish: los registrados de ellos[b]
  alternatives_spanish:
  - los contados de ellos
  - los enrolados de ellos
  lexicon: HALOT
  rationale: El sustantivo participial de פקד en contexto censal se refiere a los que fueron contados/registrados. 'Registrados' conserva el valor formal del censo sin añadir 'hombres', que el hebreo aquí no expresa de manera explícita.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: forty-five thousand four hundred
  chosen_spanish: cuarenta y cinco mil cuatrocientos
  alternatives_spanish:
  - 45,400
  lexicon: Sistema numeral español
  rationale: Se traduce el número de forma idiomática en español, manteniendo el orden natural y la equivalencia exacta.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden estrechamente: la única tensión interpretativa relevante es el valor de לְמִשְׁפְּחֹתָם (''por/según sus familias'') y el matiz censal de וּפְקֻדֵיהֶם (''los registrados/contados''). Se mantuvo una redacción española fluida y auditable, con notas para conservar esas alternativas documentadas.'
  spanish_consistency_notes:
  - Se preservó el estilo formular de los listados censales de Números.
  - '''Neftalí'' se normaliza según uso bíblico en español.'
  - Se evitó introducir 'hombres' para no ampliar indebidamente el alcance del hebreo.
  - La puntuación sigue la estructura coordinada del original.
