id: GEN.29.26
reference: Genesis 29:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָבָ֔ן לֹא יֵעָשֶׂ֥ה כֵ֖ן בִּ/מְקוֹמֵ֑/נוּ לָ/תֵ֥ת הַ/צְּעִירָ֖ה לִ/פְנֵ֥י הַ/בְּכִירָֽה־׃
translation:
  text: Laban said[a], “It is not done this way in our place[c][b], to give the younger before the older.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in our region” or “among us”; the Hebrew is literally “in our place,” referring to local custom.
    reason: lexical_alternative
  - marker: b
    text: “To give” means to give in marriage; the Hebrew leaves “in marriage” implicit.
    reason: lexical_alternative
  - marker: c
    text: Or “the older” or “the elder daughter”; “the firstborn” preserves the Hebrew emphasis on birth order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: לֹא יֵעָשֶׂה כֵן
  chosen: It is not done this way
  alternatives:
  - It is not the custom to do so
  - This is not done
  lexicon: HALOT
  rationale: The Niphal/imperfect of עשה with כֵן expresses customary or acceptable practice rather than mere possibility. 'It is not done this way' preserves the impersonal social-custom sense in natural English.
- source_word: בִּמְקוֹמֵנוּ
  chosen: in our place
  alternatives:
  - in our country
  - among us
  - in our region
  lexicon: HALOT
  rationale: מָקוֹם literally means 'place.' Here it refers to local custom. 'In our place' keeps the concrete wording while still sounding idiomatic; broader alternatives are possible but slightly more interpretive.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to give in marriage
  lexicon: HALOT
  rationale: The infinitive of נתן is simply 'to give.' In context it refers to giving a daughter in marriage, but the Hebrew leaves that implicit, so the main text preserves the simpler verb.
- source_word: הַצְּעִירָה
  chosen: the younger
  alternatives:
  - the younger daughter
  - the younger one
  lexicon: HALOT
  rationale: The adjective functions substantivally for the younger female. 'The younger' is concise and mirrors the Hebrew; 'daughter' is contextually implied but not explicit.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - ahead of
  - prior to
  lexicon: HALOT
  rationale: In this context לִפְנֵי marks precedence in order, not spatial position. 'Before' is the most direct English equivalent.
- source_word: הַבְּכִירָה
  chosen: the firstborn
  alternatives:
  - the older
  - the elder daughter
  lexicon: HALOT
  rationale: בְּכִירָה denotes the firstborn/elder daughter. 'The firstborn' preserves the birth-order emphasis present in the Hebrew better than the flatter 'older.'
