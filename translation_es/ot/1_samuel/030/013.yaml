base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/013.yaml
  text: David said to him[a], “To whom do you belong, and where are you from?” He said, “I am an Egyptian young man, a slave of an Amalekite man[c][b], and my master abandoned me because I fell sick three days ago.”
  footnotes:
  - marker: a
    text: Or “I am an Egyptian youth.”
    reason: lexical_alternative
  - marker: b
    text: Or “a servant of an Amalekite.” The Hebrew עֶבֶד can mean either “servant” or “slave”; here “slave” is used because the ownership relationship is foregrounded.
    reason: lexical_alternative
  - marker: c
    text: Literally, “today three [days],” a Hebrew idiom meaning “three days ago.”
    reason: cultural_note
