translation:
  language: es
  text: ¡Bienaventurado[a] el que tú escoges y acercas para que habite en tus atrios; nos saciaremos con la bondad[b] de tu casa, la santidad de tu templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Cuán bienaventurado es el que tú escoges y acercas para que habite en tus atrios!»'
    reason: lexical_alternative
  - marker: b
    text: «Bondad» también puede traducirse como «bienes» o «abundancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: ¡Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  - ¡Cuán bienaventurado
  lexicon: HALOT
  rationale: אַשְׁרֵי introduce una fórmula de bienaventuranza. En español, «bienaventurado» conserva mejor el tono bíblico y devocional que «feliz», sin reducirlo a un estado emocional.
- source_word: תִּבְחַר
  english_pob_choice: you choose
  chosen_spanish: tú escoges
  alternatives_spanish:
  - tú eliges
  - tú seleccionas
  lexicon: HALOT
  rationale: בחר expresa la acción de escoger. «Escoges» es natural en español bíblico actual y preserva la iniciativa divina sin cargar con terminología doctrinal adicional.
- source_word: וּתְקָרֵב
  english_pob_choice: and bring near
  chosen_spanish: y acercas
  alternatives_spanish:
  - y haces acercar
  - y haces venir cerca
  lexicon: HALOT
  rationale: El Hifil de קרב es causativo. «Acercas» comunica de forma clara y breve que Dios hace posible la aproximación a su presencia, sin sonar mecánico.
- source_word: יִשְׁכֹּן
  english_pob_choice: to dwell
  chosen_spanish: para que habite
  alternatives_spanish:
  - para morar
  - para vivir
  lexicon: HALOT
  rationale: La forma verbal expresa permanencia en la esfera sagrada. En español, una cláusula final («para que habite») reproduce bien el valor resultativo de la construcción en este contexto.
- source_word: חֲצֵרֶיךָ
  english_pob_choice: your courts
  chosen_spanish: tus atrios
  alternatives_spanish:
  - tus patios
  - tus patios sagrados
  - tus cortiles
  lexicon: HALOT
  rationale: En contexto de templo, חצר se refiere a los espacios del santuario. «Atrios» es el equivalente culto y tradicional más claro en español para el ámbito del templo.
- source_word: נִשְׂבְּעָה
  english_pob_choice: we will be satisfied
  chosen_spanish: nos saciaremos
  alternatives_spanish:
  - seremos satisfechos
  - quedaremos satisfechos
  - nos satisfaremos
  lexicon: HALOT
  rationale: El valor volitivo/confidente de la forma se expresa bien con futuro en español. «Nos saciaremos» mantiene la fuerza de plenitud y abundancia mejor que «estaremos satisfechos».
- source_word: בְּטוּב
  english_pob_choice: with the goodness
  chosen_spanish: con el bien
  alternatives_spanish:
  - con la bondad
  - con la abundancia
  - con los bienes
  lexicon: HALOT
  rationale: טוּב puede denotar bondad, bien o abundancia/buena provisión. «Con el bien» preserva la amplitud semántica sin decidir prematuramente entre cualidad moral y provisión generosa.
- source_word: בֵּיתֶךָ
  english_pob_choice: of your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu hogar
  - de tu casa santa
  lexicon: HALOT
  rationale: En paralelo con «tu templo», aquí «casa» se refiere al ámbito de adoración de Dios. «Casa» conserva la relación genitiva y el paralelismo del verso.
- source_word: קְדֹשׁ
  english_pob_choice: the holiness of
  chosen_spanish: la santidad de
  alternatives_spanish:
  - lo santo de
  - el carácter santo de
  - la sacralidad de
  lexicon: HALOT
  rationale: קדש funciona de manera atributiva/apposicional con el templo. «La santidad de» transmite la cualidad sagrada sin forzar una paráfrasis explicativa.
- source_word: הֵיכָלֶךָ
  english_pob_choice: your temple
  chosen_spanish: tu templo
  alternatives_spanish:
  - tu palacio
  - tu santuario
  lexicon: HALOT
  rationale: En este contexto cultual, היכל se refiere al templo/santuario. «Templo» es la opción más transparente y concordante con «atríos» y «casa».
theological_decisions:
- issue: Iniciativa divina en el acceso a Dios
  english_pob_reading: Retained the straightforward language of God's choosing and bringing near without importing a specific doctrinal system of election.
  chosen_spanish_reading: Se conserva el lenguaje directo de que Dios escoge y acerca, sin convertirlo en una fórmula doctrinal cerrada sobre la elección.
  alternative_spanish_readings:
  - Dios te elige de antemano para una doctrina explícita de predestinación
  - Dios te selecciona solo en sentido litúrgico
  rationale: El hebreo atribuye claramente a Dios la iniciativa de escoger y acercar. La traducción mantiene esa tensión sin resolverla en una formulación confesional más estrecha que el texto.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Imágenes concretas del culto
  english_pob_reading: Rendered sanctuary terms concretely ('courts,' 'house,' 'temple') rather than spiritualizing them.
  chosen_spanish_reading: Se traducen de forma concreta las imágenes del santuario («atrios», «casa», «templo») en lugar de espiritualizarlas.
  alternative_spanish_readings:
  - presencia
  - morada
  - lugar de adoración
  rationale: El verso está enraizado en el culto del templo. Mantener los términos concretos preserva la imaginería original y permite una aplicación teológica posterior sin paraphrasear el texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo y coincide sustancialmente con el análisis auditado en inglés: beatitud inicial, elección y acercamiento divinos, permanencia en los atrios, satisfacción con el טוב de la casa y culminación en la santidad del templo. Se optó por una formulación española fluida que preserva la estructura poética y las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo cultual con «atrios / casa / templo».
  - Se conservó el sujeto divino explícito («tú») para reflejar la segunda persona del hebreo.
  - «Bienaventurado» y no «bendecido» para respetar el tono de beatitud.
  - «Nos saciaremos» refleja una expectativa confiada compatible con la forma verbal hebrea.
  - No se usó «SEÑOR» como sustituto, conforme al estándar del proyecto para el nombre divino cuando aparezca.
