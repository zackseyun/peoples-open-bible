    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «carne común» en contraste con lo consagrado.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐμίανιν a «contaminaron» para preservar con más precisión el sentido de impureza ritual del griego y evitar confundirlo con βέβηλα («profana»), que ya expresa el contraste sagrado/común en la comparación final. También se mejora levemente la fluidez española eliminando la coma tras «Yahvé[a]».
