translation:
  language: es
  text: Cuando Urías vino a él[a], David preguntó por el bienestar de Joab, por el bienestar de las tropas y por el bienestar de la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ‘David preguntó por el bienestar de Joab, y por el bienestar de las tropas, y por el bienestar de la guerra’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - entró
  lexicon: HALOT
  rationale: El verbo בוא admite ‘venir’/‘llegar’/‘entrar’. En este contexto narrativo y con el complemento אֵלָיו, ‘vino’ conserva el movimiento hacia David con naturalidad en español.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  lexicon: HALOT
  rationale: La preposición con sufijo señala dirección hacia David. ‘A él’ reproduce ese valor relacional de forma directa y sobria.
- source_word: וַיִּשְׁאַל
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - consultó
  lexicon: HALOT
  rationale: שׁאל aquí introduce una pregunta de David. ‘Preguntó’ es el equivalente natural y formal en español, sin añadir matiz de interrogatorio.
- source_word: לִשְׁלוֹם
  english_pob_choice: about the welfare of
  chosen_spanish: por el bienestar de
  alternatives_spanish:
  - acerca del bienestar de
  - por la paz de
  lexicon: HALOT
  rationale: לִשְׁלוֹם expresa estado, bienestar o condición. El español ‘por el bienestar de’ conserva esa idea de indagar por la condición de alguien o algo, manteniendo la triple repetición del hebreo.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  lexicon: uso estándar de nombre propio
  rationale: Nombre propio transliterado de modo estándar en español bíblico.
- source_word: הָעָם
  english_pob_choice: the troops
  chosen_spanish: las tropas
  alternatives_spanish:
  - el pueblo
  - la gente
  - el ejército
  lexicon: HALOT
  rationale: Aunque עָם puede ser ‘pueblo’, el contexto militar apunta al contingente en campaña. ‘Las tropas’ comunica mejor el referente que ‘el pueblo’ en español.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la batalla
  - el combate
  - la campaña
  lexicon: HALOT
  rationale: מִלְחָמָה denota guerra o combate armado. ‘La guerra’ mantiene el alcance amplio del término y funciona bien en la serie paralela con ‘Joab’, ‘las tropas’ y ‘la guerra’.
translation_notes:
  revision_awareness: El texto hebreo presenta tres expresiones paralelas con לִשְׁלוֹם. A diferencia de una paráfrasis como ‘cómo estaba’, esta versión mantiene la forma más formal y repetida del original, siguiendo la revisión auditada del POB en inglés que prefirió ‘about the welfare of’ para preservar la equivalencia léxica.
  spanish_consistency_notes:
  - Se mantiene ‘Joab’ como nombre propio sin transliteración adicional.
  - ‘Bienestar’ se usa de manera consistente para לִשְׁלוֹם en esta cláusula, evitando alternarlo con ‘paz’ o ‘salud’ para no borrar la repetición paralela.
  - ‘Tropas’ refleja el contexto militar de הָעָם, sin convertirlo en ‘pueblo’ de manera demasiado general.
  - ‘Guerra’ conserva el sustantivo amplio de מִלְחָמָה y evita una restricción indebida a ‘batalla’.
