translation:
  language: es
  text: En un banquete de vino no reprendas a tu prójimo, ni lo rebajes en su alegría; no le digas una palabra de reproche, y no lo angusties con exigencias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo angusties al exigirle pago»; el término griego puede referirse a una demanda o exacción, a menudo en el sentido de cobrar lo debido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν συμποσίῳ οἴνου
  english_pob_choice: a banquet of wine
  chosen_spanish: en un banquete de vino
  alternatives_spanish:
  - en un festín de vino
  - en una reunión de vino
  - en un banquete con vino
  lexicon: LSJ
  rationale: «Banquete de vino» conserva la estructura del griego y comunica un contexto festivo con vino sin volverlo coloquial. Se evita una paráfrasis más libre que borre el carácter ceremonial/social de la escena.
- source_word: ἐλέγξῃς
  english_pob_choice: rebuke
  chosen_spanish: reprendas
  alternatives_spanish:
  - corrijas
  - reprendas severamente
  - censures
  lexicon: BDAG
  rationale: En este contexto sapiencial el verbo apunta a una amonestación o reprensión interpersonal. «Reprendas» es natural en español y mantiene la fuerza de prohibición sin exagerar hacia una corrección formal.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  - tu semejante
  lexicon: BDAG
  rationale: «Prójimo» preserva el registro ético-bíblico de «neighbor» y sigue siendo inteligible en español bíblico. Aunque el sentido inmediato es un comensal o asociado, «prójimo» mantiene la amplitud del término.
- source_word: ἐξουδενώσῃς
  english_pob_choice: belittle
  chosen_spanish: lo rebajes
  alternatives_spanish:
  - lo desprecies
  - lo humilles
  - lo tengas en poco
  lexicon: BDAG
  rationale: El verbo significa tratar como nada o hacer menos. «Rebajes» comunica bien la acción social de disminuir al otro, más cerca de «belittle» que de un término puramente interno como «despreciar».
- source_word: ἐν εὐφροσύνῃ αὐτοῦ
  english_pob_choice: in his gladness
  chosen_spanish: en su alegría
  alternatives_spanish:
  - en su gozo
  - en su regocijo
  - en su festividad
  lexicon: LSJ
  rationale: «Alegría» refleja de modo claro y digno el estado festivo del sujeto. Se prefiere una palabra natural en español antes que una opción más literaria que oscurezca el sentido.
- source_word: λόγον ὀνειδισμοῦ
  english_pob_choice: a word of reproach
  chosen_spanish: una palabra de reproche
  alternatives_spanish:
  - una palabra insultante
  - una palabra de oprobio
  - un dicho de reproche
  lexicon: BDAG
  rationale: La construcción del griego se conserva de forma bastante literal y comprensible. «Palabra de reproche» mantiene el tono sapiencial y evita intensificar el insulto más de lo que el texto requiere.
- source_word: θλίψῃς
  english_pob_choice: distress
  chosen_spanish: lo angusties
  alternatives_spanish:
  - lo aflijas
  - lo molestes
  - lo oprimas
  lexicon: BDAG
  rationale: Aquí el verbo expresa causar presión o aflicción. «Angusties» comunica bien el efecto personal en español moderno, sin convertir el verbo en una carga física demasiado fuerte.
- source_word: ἐν ἀπαιτήσει
  english_pob_choice: by making demands
  chosen_spanish: con exigencias
  alternatives_spanish:
  - al exigir pago
  - al pedir reembolso
  - al reclamar lo debido
  lexicon: LSJ
  rationale: El sustantivo puede referirse a demanda, exigencia o exacción. «Con exigencias» mantiene la amplitud semántica en el texto principal; la nota preserva la posible lectura de cobro o presión por pago.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego de Swete y coincide con el sentido auditado del inglés POB. Se conservó la ambigüedad de ἐν ἀπαιτήσει con una redacción amplia en el cuerpo y una nota que explicita la posible lectura de cobro o reclamación. No hubo revisiones previas que alteraran el sentido base.
  spanish_consistency_notes:
  - Se mantiene «prójimo» para conservar el registro ético bíblico del término πλησίον.
  - Se eligió «reprendas»/«reproche» para mantener la fuerza sapiencial sin sobretraducción.
  - «Exigencias» en el texto principal deja abierta la variante financiera señalada por la nota, conforme al audit trail inglés.
  - Se evitó «SEÑOR» u otra terminología de sustitución, porque este versículo no contiene el nombre divino ni una cita directa de YHWH.
