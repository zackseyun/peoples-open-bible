translation:
  language: es
  text: En el segundo mes, el día catorce, al atardecer[a], lo celebrarán; lo comerán con panes sin levadura y hierbas amargas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las tardes», una expresión idiomática para el período alrededor de la puesta del sol o el atardecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: In the second month
  chosen_spanish: En el segundo mes
  alternatives_spanish:
  - En la segunda luna/mes
  lexicon: HALOT
  rationale: En contexto calendárico, חֹדֶשׁ se entiende naturalmente como 'mes'. 'Segundo mes' conserva el valor temporal sin introducir una paráfrasis innecesaria. 'Luna' o 'luna/mes' sería más literal pero menos claro en español.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  english_pob_choice: on the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - el catorce día
  - el día catorce del mes
  lexicon: HALOT
  rationale: La construcción hebrea funciona idiomáticamente como fecha. En español, 'el día catorce' es natural y fiel; se sobreentiende el mes por el contexto inmediato.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: at twilight
  chosen_spanish: al atardecer
  alternatives_spanish:
  - al anochecer
  - al crepúsculo
  - entre las dos tardes
  lexicon: HALOT
  rationale: El hebreo describe el período alrededor de la puesta del sol. 'Al atardecer' comunica bien ese rango en español moderno. Se conserva la posibilidad literal 'entre las dos tardes' en nota por ser la forma idiomática hebrea subyacente.
- source_word: יַעֲשׂוּ אֹתוֹ
  english_pob_choice: they shall keep it
  chosen_spanish: lo celebrarán
  alternatives_spanish:
  - lo guardarán
  - lo observarán
  - lo harán
  lexicon: HALOT
  rationale: En el marco de la Pascua, עשה con este objeto no significa simplemente 'hacer', sino ejecutar/celebrar la observancia. En español, 'celebrarán' transmite mejor la idea cultual de una fiesta ordenada, sin perder la referencia al acto de observarla.
- source_word: עַל מַצּוֹת
  english_pob_choice: with unleavened bread
  chosen_spanish: con panes sin levadura
  alternatives_spanish:
  - con pan sin levadura
  - sobre panes sin levadura
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre/upon', en este contexto alimentario expresa acompañamiento. 'Panes sin levadura' es más natural en español y preserva el sentido festivo-alimentario del pasaje.
- source_word: וּמְרֹרִים
  english_pob_choice: and bitter herbs
  chosen_spanish: y hierbas amargas
  alternatives_spanish:
  - y cosas amargas
  - y amarguras
  lexicon: HALOT
  rationale: El plural designa las hierbas amargas tradicionales de la Pascua. 'Hierbas amargas' es la equivalencia precisa y reconocible en español.
- source_word: יֹאכְלֻהוּ
  english_pob_choice: they shall eat it
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo comerán ellos
  - de él comerán
  lexicon: HALOT
  rationale: 'El verbo es simple y directo: comer el objeto referido al sacrificio/comida pascual. ''Lo comerán'' mantiene la referencia pronominal y el tono legal-futuro.'
theological_decisions:
- issue: Sentido cultual de la instrucción pascual
  english_pob_reading: they shall keep it
  chosen_spanish_reading: lo celebrarán
  alternative_spanish_readings:
  - lo guardarán
  - lo observarán
  rationale: No se trata solo de ejecutar una acción, sino de observar/celebrar una festividad regulada. 'Celebrarán' comunica mejor el carácter litúrgico sin borrar la idea de obediencia ritual. En este verso no hay cambio doctrinal, sino ajuste idiomático.
  doctrine_reference: Éxodo 12; Números 9:1-14
- issue: Temporalidad de בֵּין הָעַרְבַּיִם
  english_pob_reading: at twilight
  chosen_spanish_reading: al atardecer
  alternative_spanish_readings:
  - entre las dos tardes
  - al anochecer
  rationale: 'La frase hebrea tiene una tensión lexical conocida: puede señalar el lapso alrededor de la puesta del sol. ''Al atardecer'' mantiene la amplitud temporal sin forzar una precisión artificial. La nota preserva la alternativa literal para no ocultar la idiomaticidad hebrea.'
  doctrine_reference: Éxodo 12:6; Deuteronomio 16:6
translation_notes:
  revision_awareness: Concordamos con el audit trail inglés en los valores calendáricos, la lectura idiomática de בין הערבים y el sentido cultual de עשה en contexto pascual. No se observaron revisiones aplicadas en el expediente previo; esta versión mantiene esa estabilidad con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se mantiene 'mes' para חֹדֶשׁ en contexto calendárico, consistente con el uso bíblico normal y con el criterio POB en inglés.
  - Se preserva el valor idiomático de בֵּין הָעַרְבַּיִם mediante una traducción natural y una nota literal, sin oscurecer el hebreo.
  - '''Panes sin levadura'' y ''hierbas amargas'' conservan la terminología tradicional de la Pascua sin introducir vocabulario eclesiástico ajeno al texto.'
  - '''Lo celebrarán'' busca reflejar la observancia pascual ordenada por el verbo hebreo en contexto, sin distorsionar el objeto pronominal.'
