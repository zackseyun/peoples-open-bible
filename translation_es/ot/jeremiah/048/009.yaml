translation:
  language: es
  text: Poned un ala a Moab[a], porque ciertamente huirá[b]; y sus ciudades serán una desolación, sin habitante en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo צִיץ puede significar también «flor», «roseta» u «ornamento»; aquí se traduce «un ala» porque el contexto inmediato de huida/salida favorece una imagen relacionada con el vuelo.
    reason: lexical_alternative
  - marker: b
    text: 'La construcción hebrea intensifica la acción: literalmente, «al salir saldrá»; el sentido contextual es «huirá» o «se irá con rapidez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: Give
  chosen_spanish: Poned
  alternatives_spanish:
  - Dad
  - Den
  lexicon: HALOT
  rationale: Es un imperativo plural de נתן. «Poned» conserva el valor exhortativo/taunt del mandato y suena más natural en español bíblico que un calco con «dad» en este contexto poético.
- source_word: צִ֣יץ
  english_pob_choice: a wing
  chosen_spanish: un ala
  alternatives_spanish:
  - una flor
  - una roseta
  - un ornamento
  lexicon: HALOT
  rationale: Aunque צִיץ suele referirse a ‘flor’ o ‘ornamento’, el contexto inmediato de huida/fuga apoya la imagen de vuelo. En español, «un ala» preserva la metáfora dinámica mejor que las alternativas botánicas u ornamentales.
- source_word: לְמוֹאָב
  english_pob_choice: to Moab
  chosen_spanish: a Moab
  alternatives_spanish:
  - para Moab
  lexicon: HALOT
  rationale: El ל puede ser dativo o de beneficio. «A Moab» funciona de forma natural con el imperativo y conserva la dirección del gesto figurado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» expresa de manera clara la relación causal sin perder el tono profético.
- source_word: נָצֹא תֵּצֵא
  english_pob_choice: she will surely flee away
  chosen_spanish: ciertamente huirá
  alternatives_spanish:
  - saldrá sin falta
  - saldrá ciertamente
  - huirá y saldrá
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la acción. Dado el contexto de vuelo/fuga, «ciertamente huirá» transmite la intensidad y evita una literalidad pesada como «saldrá, saldrá».
- source_word: וְעָרֶי/הָ
  english_pob_choice: and her cities
  chosen_spanish: y sus ciudades
  alternatives_spanish:
  - y las ciudades de ella
  lexicon: HALOT
  rationale: El sufijo femenino remite a Moab personificada. «Sus ciudades» es la forma española más fluida y mantiene la referencia sin sobreexplicar.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una ruina
  - devastación
  lexicon: HALOT
  rationale: שַׁמָּה denota devastación/desolación. «Una desolación» conserva el sustantivo de juicio profético y su fuerza semántica.
- source_word: תִֽהְיֶ֔ינָה
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - vendrán a ser
  lexicon: HALOT
  rationale: Con לְשַׁמָּה, el español puede expresar el resultado directamente con «serán». Es natural y comunica el estado resultante sin añadir perífrasis innecesarias.
- source_word: מֵאֵ֥ין יוֹשֵׁ֖ב בָּהֵן
  english_pob_choice: with no inhabitant in them
  chosen_spanish: sin habitante en ellas
  alternatives_spanish:
  - sin nadie que habite en ellas
  - sin ningún habitante en ellas
  lexicon: HALOT
  rationale: La locución expresa despoblación total. «Sin habitante en ellas» es breve, formal y fiel al sentido idiomático del hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la imagen de plural a singular («a wing») y prefirió «flee away» para expresar mejor la idiomática de la huida. La redacción española refleja ese ajuste con «un ala» y «huirá», manteniendo la fuerza poética del texto hebreo.
  spanish_consistency_notes:
  - Se mantiene «Moab» como nombre propio sin artículo, conforme al uso bíblico y al paralelismo poético.
  - Se evita «SEÑOR» o sustituciones reverenciales porque aquí no aparece el Tetragrámaton.
  - «Una desolación» conserva el tono de juicio profético y la abstracción nominal del hebreo.
  - El plural final «ellas» concuerda con «ciudades» y con el sufijo femenino plural del hebreo.
