translation:
  language: es
  text: Yair, hijo de Manasés, fue y capturó sus aldeas[a]; y las llamó Havot-yair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Havot-yair significa «aldeas de Yair» o «asentamientos de Yair».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָאִיר
  english_pob_choice: Jair
  chosen_spanish: Yair
  alternatives_spanish:
  - Jair
  lexicon: HALOT
  rationale: Se translitera el nombre propio para conservar la forma nominal, pero en español se prefiere «Yair» para reflejar la vocal inicial del hebreo y mantener consistencia fonética en el sistema español.
- source_word: בֶּן מְנַשֶּׁה
  english_pob_choice: son of Manasseh
  chosen_spanish: hijo de Manasés
  alternatives_spanish:
  - descendiente de Manasés
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «hijo de Manasés»; se mantiene esa relación genealógica directa en español. «Descendiente» sería posible, pero atenúa la forma concreta del hebreo.
- source_word: הָלַךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - se fue
  lexicon: HALOT
  rationale: En español narrativo, «fue» comunica de modo natural el avance de la acción sin añadir dirección o matiz no presente en el hebreo.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  - conquistó
  lexicon: HALOT
  rationale: El verbo indica toma por fuerza en contexto militar/territorial. «Capturó» conserva bien esa fuerza semántica sin sobrecargarlo con un matiz más interpretativo como «conquistó».
- source_word: חַוֺּתֵיהֶם
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus poblados
  - sus asentamientos rurales
  - sus villas
  lexicon: HALOT
  rationale: חַוּוֹת se refiere a asentamientos pequeños y abiertos. «Aldeas» es una equivalencia española natural que conserva la idea de población pequeña mejor que una transliteración descriptiva demasiado técnica.
- source_word: וַיִּקְרָא אֶתְהֶן
  english_pob_choice: he called them
  chosen_spanish: las llamó
  alternatives_spanish:
  - las nombró
  - les puso por nombre
  lexicon: HALOT
  rationale: El hebreo puede significar «llamar» o «nombrar». En español, «las llamó» mantiene la ambigüedad útil entre acto de nombrar y acto de designar, tal como el texto lo permite.
- source_word: חַוֹּת יָאִיר
  english_pob_choice: Havvoth-jair
  chosen_spanish: Havot‑Yair
  alternatives_spanish:
  - aldeas de Yair
  - poblados de Yair
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio tradicional transliterado, pero adaptado al español con una grafía más transparente. La forma marca el vínculo etimológico con el sustantivo «aldeas/aldeas pequeñas» y el nombre Yair.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran alta concordancia: acción narrativa simple («fue»), captura territorial («capturó») y un topónimo derivado de חַוּוֹת + Yair. No se registran revisiones aplicadas en el expediente inglés, así que la propuesta española mantiene la lectura base sin introducir armonizaciones externas.'
  spanish_consistency_notes:
  - Se mantiene «Yair» en el nombre propio y en el topónimo para coherencia interna.
  - «Aldeas» funciona como equivalente natural de חַוּוֹת sin perder el sentido de asentamientos pequeños.
  - 'La puntuación y el orden narrativo siguen de cerca el hebreo: sujeto + movimiento + captura + nombramiento.'
