    text: Un 'efod' era un objeto cultual asociado con el uso sacerdotal; aquí el texto no especifica con exactitud su forma o función.
    reason: cultural_note
  - marker: b
    text: O 'se prostituyeron tras él'; el hebreo usa una imagen de infidelidad sexual para la idolatría de Israel.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras relevantes en el texto. También se mejoró la naturalidad y precisión de 'lo hizo un efod' a 'lo convirtió en un efod', que refleja mejor el sentido resultativo del hebreo. Se mantuvo 'todo Israel se prostituyó' como singular colectivo, ajustando la nota alternativa sin alterar el sentido. El resto del versículo puede permanecer sustancialmente igual.
