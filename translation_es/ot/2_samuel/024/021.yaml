revisions:
- from: 'Y Araúna dijo[a]: «¿Por qué ha venido mi señor el rey a su siervo?» Y David dijo: «Para comprar de ti la era, para edificar un altar a Yahvé, para que la plaga sea detenida de sobre el pueblo».'
  to: 'Y Araúna dijo[a]: «¿Por qué ha venido mi señor el rey a su siervo?» Y David dijo: «Para comprarte la era, para edificar un altar a Yahvé, para que la plaga sea detenida y quitada de sobre el pueblo».'
  rationale: 'Se conservó fielmente el sentido del hebreo y las decisiones del POB, pero se ajustaron dos expresiones para lograr un español más natural y claro: «comprarte la era» mejora la sintaxis transaccional, y «sea detenida y quitada de sobre el pueblo» evita un calco duro mientras retiene el matiz espacial de מֵעַל.'
  reviewer_model: gpt-5.4
