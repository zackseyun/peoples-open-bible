review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: el rey actúa hacia Jonatán como lo hicieron sus predecesores, y luego lo eleva por encima de los φίλοι de la corte. También conserva adecuadamente la nota sobre la alternativa espacial de ἐναντίον. Sin embargo, dos giros españoles quedan poco naturales o ambiguos de manera no útil: «hizo por él» y, sobre todo, «los que antes que él», que omite el sentido claro de predecesores del rey.'
  spanish_quality_summary: El texto es comprensible, pero suena algo calcado del inglés/griego. «Hizo por él» es posible, aunque menos idiomático en español bíblico actual que «hizo con él» o «lo trató». Además, «los que antes que él» resulta incompleto y poco fluido; «sus predecesores» o «los que lo precedieron» comunica mejor el sentido. «Sobre todos sus amigos» es aceptable, pero «por encima de todos sus amigos» expresa con más claridad la elevación de rango sin perder dignidad.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Amigos» para φίλοι es correcto dada la terminología cortesana helenística, y la nota preserva la alternativa «delante de / en presencia de».
  issues:
  - severity: medium
    issue: «los que antes que él» es una formulación defectuosa en español
    rationale: Aunque intenta preservar οἱ πρὸ αὐτοῦ de forma literal, en español queda elíptico y poco natural. El sentido contextual es «sus predecesores» o «los que lo precedieron».
  - severity: medium
    issue: «hizo por él» suena poco idiomático en este contexto
    rationale: Reproduce de cerca el inglés revisado, pero en español «hacer por alguien» suele sugerir beneficio o favor personal. Aquí ποιέω con dativo se refiere más ampliamente al trato o proceder del rey hacia Jonatán.
  - severity: low
    issue: «sobre todos sus amigos» es menos claro que «por encima de todos sus amigos»
    rationale: La opción actual es entendible, pero «por encima de» expresa mejor la comparación de rango asociada con ὕψωσεν + ἐναντίον en este contexto cortesano.
