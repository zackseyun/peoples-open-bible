revisions:
- from: Entonces estos hombres llegaron de común acuerdo[a] y encontraron a Daniel orando y suplicando delante de su Dios[b].
  to: Entonces estos hombres llegaron de común acuerdo[a] y encontraron a Daniel pidiendo y suplicando delante de su Dios[b].
  rationale: Se cambia «orando» por «pidiendo» para reflejar mejor el valor de בָּעֵא («hacer petición») y preservar la distinción con «suplicando». También se ajusta la nota b para que la alternativa recoja la formulación más amplia de oración sin competir con una traducción principal menos precisa.
