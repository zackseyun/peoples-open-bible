translation:
  language: es
  text: Cuando los hombres de Israel vieron que Abimelec estaba muerto[a], cada uno se fue a su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «los hombres de Israel ... cada uno a su lugar». El singular distributivo se expresa en español con «cada uno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - se dieron cuenta de
  - repararon en
  lexicon: HALOT
  rationale: ראה en la secuencia narrativa expresa percepción visual que conduce al reconocimiento; «vieron» conserva esa relación de manera natural en español.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - cada hombre de Israel
  lexicon: HALOT
  rationale: El singular colectivo אִישׁ con verbo plural se vierte mejor con un colectivo masculino explícito; «los hombres de Israel» mantiene la fuerza representativa del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo visto o reconocido: «vieron que Abimelec había muerto».'
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - murió
  lexicon: HALOT
  rationale: El participio/predicado hebreo señala el estado de Abimelec en el momento de la percepción; «había muerto» expresa bien ese estado ya consumado sin forzar un matiz diferente.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma española estándar «Abimelec».
- source_word: וַיֵּלְְכוּ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se retiró
  lexicon: HALOT
  rationale: הלך en narrativa simple indica desplazamiento; en español, el distributivo singular «cada uno» se combina naturalmente con «se fue» para reflejar la acción individualizada.
- source_word: אִישׁ לִמְקֹמוֹ
  english_pob_choice: each went to his own place
  chosen_spanish: cada uno ... a su lugar
  alternatives_spanish:
  - cada hombre ... a su lugar
  - cada uno ... a su propio lugar
  lexicon: HALOT
  rationale: El אִישׁ distributivo después del verbo plural se refleja con «cada uno»; מָקוֹם se traduce de forma literal como «lugar», preservando la sobriedad del hebreo.
translation_notes:
  revision_awareness: El texto inglés POB ya refleja la lectura distributiva del hebreo y fue revisado sin cambios; la versión española conserva esa misma decisión, ajustándola a una formulación natural y fiel en español.
  spanish_consistency_notes:
  - Se conserva el nombre propio en forma española estándar, «Abimelec».
  - Se mantiene el distributivo singular del hebreo con «cada uno», sin convertirlo en una pluralidad genérica.
  - «Lugar» se prefiere a «hogar» o «casa» para no añadir una especificación no presente en el hebreo.
