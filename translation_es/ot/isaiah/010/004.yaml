revisions:
- from: Nada queda sino encorvarse entre los cautivos[a] o caer entre los muertos. Por todo esto su ira no se ha apartado, y todavía su mano está extendida.
  to: Nada queda sino agacharse entre los cautivos[a] o caer entre los caídos. Por todo esto su ira no se ha apartado, y su mano sigue extendida.
  rationale: Se mantiene la estructura y la nota del borrador, pero se corrige 'los muertos' a 'los caídos' para reflejar mejor הֲרוּגִים ('the slain') en contexto de juicio bélico. Se ajusta 'encorvarse' a 'agacharse' por mayor naturalidad, y 'todavía su mano está extendida' a 'su mano sigue extendida' por mejor fluidez idiomática sin pérdida semántica.
