- from: Mejor es el lento para la ira[a] que el poderoso, y el que domina su espíritu[b] que el que toma una ciudad.
  to: Mejor es el que tarda en airarse[a] que el poderoso, y el que domina su espíritu[b] que el que toma una ciudad.
  rationale: Se ajusta la primera expresión para lograr un español más natural y digno sin apartarse del sentido del hebreo ni de la decisión auditada del POB. Se conserva «su espíritu» por fidelidad léxica y amplitud semántica, y se mantiene la imagen militar de «toma una ciudad».
