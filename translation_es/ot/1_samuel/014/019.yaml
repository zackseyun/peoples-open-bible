revisions:
- from: 'Y aconteció[a], mientras Saúl hablaba al sacerdote, que el tumulto en el campamento de los filisteos iba aumentando cada vez más. Entonces Saúl dijo al sacerdote: «Retira tu mano».'
  to: 'Y aconteció, mientras Saúl hablaba al sacerdote, que el tumulto en el campamento de los filisteos iba aumentando cada vez más. Entonces Saúl dijo al sacerdote: «Retira[a] tu mano».'
