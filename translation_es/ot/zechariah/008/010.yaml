base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/010.yaml
  text: For before those days there was no wage for man[a], and no wage for beast; and for the one going out and the one coming in there was no peace because of the adversary[c][b], and I set every man against his neighbor.
  footnotes:
  - marker: a
    text: Or 'there was no safety/well-being'; Hebrew shalom can include peace, safety, and welfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the enemy' or 'from the foe'; the Hebrew term can denote an adversary in a hostile sense.
    reason: lexical_alternative
  - marker: c
    text: Literally 'I sent every man, each against his neighbor'; the sense is that God gave them over to mutual hostility.
    reason: lexical_alternative
