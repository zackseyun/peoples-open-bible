translation:
  language: es
  text: 'Cuando iba a Ziclag, algunos de Manasés se pasaron a su lado[a]: Adná, Jozabad, Jediael, Micael, otro Jozabad, Elihú y Ziletai[c][b], jefes de los millares que pertenecían a Manasés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘cayeron sobre él’, un modismo que significa que se pasaron al lado de David.
    reason: lexical_alternative
  - marker: b
    text: El nombre Jozabad aparece dos veces en la lista hebrea, por lo que se trata de dos personas distintas con el mismo nombre.
    reason: cultural_note
  - marker: c
    text: ‘Jefes de los millares’ puede referirse a comandantes de unidades militares o a líderes de divisiones de clan dentro de Manasés.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתּוֹ
  english_pob_choice: As he went
  chosen_spanish: Cuando iba
  alternatives_spanish:
  - Mientras iba
  - Al ir
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo + sufijo expresa circunstancia de tiempo; en español, ‘Cuando iba’ comunica de forma natural el trasfondo narrativo y conserva el valor progresivo sin endurecerlo.
- source_word: אֶל צִיקְלַג
  english_pob_choice: to Ziklag
  chosen_spanish: a Ziclag
  alternatives_spanish:
  - hacia Ziclag
  - para Ziclag
  lexicon: HALOT
  rationale: אֶל indica movimiento hacia un destino. ‘A Ziclag’ es la opción más natural en español y mantiene la referencia geográfica sin sobreinterpretar dirección o propósito.
- source_word: נָפְלוּ עָלָיו
  english_pob_choice: defected to him
  chosen_spanish: desertaron a él
  alternatives_spanish:
  - se pasaron a él
  - cayeron sobre él
  lexicon: HALOT
  rationale: El modismo puede expresar cambio de bando en contexto militar-político. ‘Desertaron a él’ preserva la idea de ruptura de lealtad que la POB inglesa destacó con ‘defected to him’, aunque suena algo más directo en español. ‘Se pasaron a él’ es posible, pero menos preciso en tono bélico.
- source_word: מִמְּנַשֶּׁה
  english_pob_choice: from Manasseh
  chosen_spanish: de Manasés
  alternatives_spanish:
  - de la tribu de Manasés
  lexicon: HALOT
  rationale: La frase identifica procedencia tribal; ‘de Manasés’ es conciso y claro en contexto, y la forma posesiva de grupo en español no necesita explicitar ‘tribu’ salvo necesidad.
- source_word: עַדְנַח וְיוֹזָבָד וִידִיעֲאֵל וּמִיכָאֵל וְיוֹזָבָד וֶאֱלִיהוּא וְצִלְּתָי
  english_pob_choice: Adnah, Jozabad, Jediael, Michael, another Jozabad, Elihu, and Zillethai
  chosen_spanish: Adná, Jozabad, Jediael, Micael, otro Jozabad, Elihú y Ziletai
  alternatives_spanish:
  - Adná, Jozabad, Jediael, Miguel, otro Jozabad, Eliú y Ziletai
  lexicon: HALOT
  rationale: Son nombres propios transliterados. Se conserva la repetición de Jozabad con ‘otro’ para reflejar que el hebreo nombra a dos personas distintas con el mismo nombre, sin corregir el texto.
- source_word: רָאשֵׁי הָאֲלָפִים
  english_pob_choice: chiefs of the thousands
  chosen_spanish: jefes de los millares
  alternatives_spanish:
  - cabezas de los millares
  - capitanes de los millares
  - jefes de los mil
  lexicon: HALOT
  rationale: ‘Jefes’ transmite רָאשֵׁי de forma idiomática. ‘Millares’ mantiene la pluralidad del hebreo אֲלָפִים y deja abierta la posible referencia a unidades militares o divisiones de clan, como refleja la POB inglesa.
- source_word: אֲשֶׁר לִמְנַשֶּׁה
  english_pob_choice: that belonged to Manasseh
  chosen_spanish: que pertenecían a Manasés
  alternatives_spanish:
  - que eran de Manasés
  - que pertenecían a la tribu de Manasés
  lexicon: HALOT
  rationale: La cláusula relativa señala pertenencia/adscripción. El plural concuerda con ‘jefes’ y ‘millares’, y ‘pertenecían’ preserva la relación de afiliación sin añadir precisión no explícita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y armoniza con la POB inglesa en tres puntos marcados: el modismo נפל על como cambio de lealtad, la repetición de יוֹזָבָד, y la ambigüedad de הָאֲלָפִים. No se adoptaron revisiones textuales ni enmiendas.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió ‘Manasés’ como nombre tribal, no ‘la tribu de Manasés’, porque el contexto ya lo deja claro.
  - ‘Millares’ conserva la literalidad de אֲלָפִים sin fijar indebidamente una estructura militar exclusiva.
