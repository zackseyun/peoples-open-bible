translation:
  language: es
  text: En mi lecho, en las noches, busqué al que ama mi alma; lo busqué[a], pero no lo hallé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «en las noches» (plural), no simplemente «de noche».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מִשְׁכָּבִי
  english_pob_choice: On my bed
  chosen_spanish: En mi lecho
  alternatives_spanish:
  - Sobre mi cama
  - En mi cama
  lexicon: HALOT
  rationale: מִשְׁכָּב designa un lugar de acostarse o reposo. «Lecho» conserva el tono poético y la concreción sin sonar rígido en español.
- source_word: בַּ/לֵּיל֔וֹת
  english_pob_choice: in the nights
  chosen_spanish: en las noches
  alternatives_spanish:
  - por la noche
  - en la noche
  - de noche
  lexicon: HALOT
  rationale: El hebreo está en plural; «en las noches» preserva mejor la pluralidad y la idea de búsquedas repetidas que una singularización idiomática.
- source_word: בִּקַּ֕שְׁתִּי
  english_pob_choice: I sought
  chosen_spanish: busqué
  alternatives_spanish:
  - quise hallar
  - anduve buscando
  - busqué con afán
  lexicon: HALOT
  rationale: בקשׁ expresa buscar/solicitar. «Busqué» es natural y suficientemente literal en español poético.
- source_word: אֵ֥ת שֶׁ/אָהֲבָ֖ה נַפְשִׁ֑/י
  english_pob_choice: the one my soul loves
  chosen_spanish: al que ama mi alma
  alternatives_spanish:
  - al que mi alma ama
  - al amado de mi alma
  - a quien ama mi alma
  lexicon: HALOT
  rationale: La construcción hebrea apunta al objeto amado. En español, «al que ama mi alma» mantiene el vínculo afectivo y evita una formulación forzada; se conserva «alma» por la carga poética de נֶפֶשׁ.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  - mi interior
  lexicon: HALOT
  rationale: «Alma» reproduce la equivalencia poética tradicional de נֶפֶשׁ y es transparente para el lector hispanohablante, sin reducir el sentido a «vida».
- source_word: בִּקַּשְׁתִּ֖י/ו
  english_pob_choice: I sought him
  chosen_spanish: lo busqué
  alternatives_spanish:
  - lo procuré
  - lo busqué a él
  lexicon: HALOT
  rationale: El sufijo pronominal exige un objeto explícito en español. «Lo» mantiene el referente masculino y el paralelismo del verbo repetido.
- source_word: וְ/לֹ֥א מְצָאתִֽי/ו
  english_pob_choice: but I did not find him
  chosen_spanish: pero no lo hallé
  alternatives_spanish:
  - y no lo hallé
  - pero no lo encontré
  - y no lo encontré
  lexicon: HALOT
  rationale: מצא se puede verter por hallar/encontrar. «Hallé» conserva un registro literario acorde con el poema; «pero» expresa bien el resultado adverso implícito.
translation_notes:
  revision_awareness: 'Alineado con el texto hebreo y con la auditoría inglesa: se conserva el plural de «las noches», la repetición del verbo buscar, y el valor afectivo de נֶפֶשׁ sin borrar la tensión poética.'
  spanish_consistency_notes:
  - Se prefirió «lecho» por registro poético, pero sin arcaísmo innecesario.
  - Se mantuvo la repetición verbal («busqué... lo busqué») para reflejar el paralelismo hebreo.
  - «Alma» se usa como equivalente bíblico de נֶפֶשׁ en este contexto amoroso-poético.
  - La nota al pie marca la pluralidad de «las noches» para no diluirla en una expresión singular idiomática.
