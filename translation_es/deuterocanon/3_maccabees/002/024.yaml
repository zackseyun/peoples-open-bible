translation:
  language: es
  text: Pero después de algún tiempo[a], cuando se hubo recobrado, de ninguna manera llegó a arrepentirse[b] cuando fue reprendido; más bien, después de proferir una amenaza severa, se retiró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «cuando se hubo recompuesto» o «cuando hubo recobrado el dominio de sí». La expresión griega probablemente indica que recuperó la compostura tras el episodio anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «no cambió de parecer en absoluto». La expresión puede abarcar ausencia de remordimiento o negativa a reconsiderar lo hecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν χρόνῳ δὲ ὕστερον
  english_pob_choice: But after some time
  chosen_spanish: Pero después de algún tiempo
  alternatives_spanish:
  - Y más tarde
  - Pero después
  lexicon: LSJ
  rationale: La frase marca un momento posterior en la narración; «pero» conserva el leve matiz adversativo de δέ, y «después de algún tiempo» reproduce con naturalidad el valor temporal sin endurecerlo.
- source_word: ἀναλεξάμενος αὐτόν
  english_pob_choice: when he had recovered himself
  chosen_spanish: cuando hubo recobrado la calma
  alternatives_spanish:
  - cuando se hubo recobrado
  - cuando había recobrado el dominio de sí
  - cuando se recompuso
  lexicon: LSJ
  rationale: El participio medio con αὐτόν es idiomático y apunta a que recuperó la compostura tras el episodio previo. En español, «recobrado la calma» expresa bien esa recuperación interior sin forzar un objeto explícito.
- source_word: οὐδαμῶς εἰς μετάμελον ἦλθεν
  english_pob_choice: he in no way came to regret it
  chosen_spanish: de ninguna manera llegó a arrepentirse
  alternatives_spanish:
  - de ningún modo llegó al arrepentimiento
  - en absoluto cambió de parecer
  - no se arrepintió en absoluto
  lexicon: LSJ
  rationale: El giro significa literalmente que no llegó a tener remordimiento o reconsideración. «Arrepentirse» preserva la fuerza moral del término en español y permite mantener la tensión entre remordimiento y cambio de decisión.
- source_word: ἐπιτιμηθείς
  english_pob_choice: when he was rebuked
  chosen_spanish: cuando fue reprendido
  alternatives_spanish:
  - después de ser reprendido
  - cuando se le reprendió
  - al ser censurado
  lexicon: LSJ
  rationale: El participio pasivo indica que recibió una reprensión. «Reprendido» es claro y fiel, sin elevar innecesariamente el registro a «censurado».
- source_word: μετὰ ἀπειλῆς δὲ πικρᾶς
  english_pob_choice: rather, having issued a bitter threat
  chosen_spanish: más bien, después de proferir una amenaza amarga
  alternatives_spanish:
  - más bien, con una amenaza cruel
  - pero con una amenaza severa
  - más bien, tras lanzar una amenaza amarga
  lexicon: LSJ
  rationale: πικρός puede expresar amargura o severidad. «Amenaza amarga» conserva la imagen verbal y el matiz fuerte, evitando suavizar el tono del original.
- source_word: θέμενος
  english_pob_choice: having issued
  chosen_spanish: después de proferir
  alternatives_spanish:
  - habiendo emitido
  - tras hacer
  - habiendo formulado
  lexicon: LSJ
  rationale: Literalmente es «habiendo puesto/hecho», pero con ἀπειλή la idea es formular o lanzar una amenaza. «Proferir» da una equivalencia natural en español y mantiene el acto verbal.
- source_word: ἀνέλυσεν
  english_pob_choice: he departed
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - se fue
  - se marchó
  lexicon: LSJ
  rationale: En contexto narrativo el verbo puede significar retirarse o marcharse. «Se retiró» conserva el matiz formal y evita la ambigüedad de una simple ida sin contexto.
theological_decisions:
- issue: 'Sentido de μετάμελον: arrepentimiento moral vs. cambio de decisión'
  english_pob_reading: he in no way came to regret it; or, he did not change his mind at all
  chosen_spanish_reading: de ninguna manera llegó a arrepentirse
  alternative_spanish_readings:
  - no cambió de parecer en absoluto
  - no sintió remordimiento alguno
  - de ningún modo reconsideró lo hecho
  rationale: El griego puede señalar tanto falta de remordimiento como negativa a reconsiderar. En español, «arrepentirse» preserva la dimensión moral que el contexto sugiere, sin cerrar la posibilidad de la lectura alternativa documentada por la nota inglesa.
  doctrine_reference: Lexical-semantic range of μετάμελος / μετάμελομαι in LSJ; no doctrinal assertion
- issue: Valor de la reprensión frente a la obstinación del sujeto
  english_pob_reading: when he was rebuked; rather...
  chosen_spanish_reading: cuando fue reprendido; más bien...
  alternative_spanish_readings:
  - después de ser reprendido; sin embargo...
  - aunque fue reprendido...
  rationale: La estructura muestra que la reprensión no produjo cambio alguno. Mantener «cuando fue reprendido» deja visible la tensión narrativa entre corrección externa y dureza interna.
  doctrine_reference: Narrative ethics; no doctrinal assertion
translation_notes:
  revision_awareness: Se verificó la correspondencia con el texto griego de Swete (ἐν χρόνῳ δὲ ὕστερον ἀναλεξάμενος αὐτόν, οὐδαμῶς εἰς μετάμελον ἦλθεν ἐπιτιμηθείς, μετὰ ἀπειλῆς δὲ πικρᾶς θέμενος ἀνέλυσεν) y con la auditoría inglesa. No se detectaron cambios de revisión recientes; se conservó el matiz adversativo de δέ, la ambigüedad semántica de μετάμελον y el sentido narrativo de ἀνέλυσεν como retirada/departida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque no aparece en este versículo.
  - Se evita la calca de «regret it» como puro remordimiento sentimental; se deja abierta la tensión entre arrepentimiento y reconsideración.
  - «Recobrado la calma» funciona como solución idiomática para ἀναλεξάμενος αὐτόν sin introducir un objeto no justificado.
