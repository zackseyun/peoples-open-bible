revisions:
- from: Y los que queden entre ustedes se consumirán por su iniquidad en las tierras de sus enemigos; y también por las iniquidades de sus padres con ellos se consumirán.
  to: Y los que queden entre ustedes se consumirán[a] por su iniquidad en las tierras de sus enemigos; y también, por las iniquidades de sus padres, con ellos[b], se consumirán.
  rationale: La revisión hace un ajuste mínimo de orden para que el español sea más natural y preserve mejor la ambigüedad de «con ellos», y además reincorpora las dos notas significativas ya respaldadas por la auditoría inglesa.
