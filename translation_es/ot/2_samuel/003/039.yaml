base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/039.yaml
  text: And I am still weak today[a], though anointed king; and these men, the sons of Zeruiah, are too harsh for me[b]. May Yahweh repay the evildoer according to his evil.
  footnotes:
