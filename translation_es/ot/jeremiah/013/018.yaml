translation:
  language: es
  text: 'Di al rey y a la reina madre[b]: «Humíllense; siéntense, porque ha bajado de sus cabezas la corona de su gloria[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más formalmente: «la corona de su gloria ha bajado de sus cabezas».'
    reason: lexical_alternative
  - marker: b
    text: «Reina madre» traduce el hebreo גְּבִירָה, un título real que puede designar a la madre del rey y no necesariamente a su esposa.
    reason: cultural_note
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: HALOT
  rationale: El imperativo singular de אמר funciona como introducción profética de un mensaje que debe ser comunicado; en español, «Di» conserva la inmediatez y la naturalidad del mandato directo.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al monarca
  lexicon: HALOT
  rationale: El sustantivo definido con preposición se refiere de manera directa al rey reinante; «al rey» es la equivalencia natural y exacta en español.
- source_word: וְלַגְּבִירָה
  english_pob_choice: and to the queen mother
  chosen_spanish: y a la reina madre
  alternatives_spanish:
  - y a la gran señora
  - y a la reina
  lexicon: HALOT
  rationale: גְּבִירָה en contexto real suele designar a la reina madre o dama principal de la corte; «reina madre» preserva esa lectura histórica y evita equipararla sin más con la esposa del rey.
- source_word: הַשְׁפִּילוּ
  english_pob_choice: Humble yourselves
  chosen_spanish: Humíllense
  alternatives_spanish:
  - Bájense
  - Humíllense ustedes
  lexicon: HALOT
  rationale: El hiphil imperativo plural de שׁפל expresa descenso/abatimiento de estatus; en español, «Humíllense» conserva la fuerza de rebajarse bajo juicio o degradación social.
- source_word: שֵׁבוּ
  english_pob_choice: sit down
  chosen_spanish: siéntense
  alternatives_spanish:
  - siéntense aquí
  - siéntense ustedes
  lexicon: HALOT
  rationale: El imperativo plural de ישׁב se expresa de manera idiomática como «siéntense»; mantiene el paralelismo con el mandato anterior y la idea de pasar de la dignidad a una postura baja.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» es la forma más clara y natural en español para esta relación causal.
- source_word: יָרַד
  english_pob_choice: has come down
  chosen_spanish: ha bajado
  alternatives_spanish:
  - ha descendido
  - ha caído
  lexicon: HALOT
  rationale: El qal perfecto de ירד conserva el movimiento de descenso; «ha bajado» reproduce la imagen sin decidir si la corona cayó accidentalmente o fue retirada en juicio.
- source_word: מַרְאֲשׁוֹתֵיכֶם
  english_pob_choice: your heads
  chosen_spanish: de vuestra cabeza
  alternatives_spanish:
  - de sus cabezas
  - de la cabeza de ustedes
  - de vuestro lugar sobre la cabeza
  lexicon: HALOT
  rationale: Aunque el plural del hebreo literalmente apunta a las cabezas o al lugar donde descansa la corona, en español la imagen se vuelve más fluida en singular colectivo con «vuestra cabeza», manteniendo el sentido idiomático del original.
- source_word: עֲטֶרֶת תִּפְאַרְתְּכֶם
  english_pob_choice: your glorious crown
  chosen_spanish: la corona de vuestra gloria
  alternatives_spanish:
  - vuestra corona gloriosa
  - la corona gloriosa de ustedes
  lexicon: HALOT
  rationale: La cadena constructa dice literalmente «la corona de vuestra gloria/ hermosura»; se conserva esa relación nominal para no perder la tensión lexical que el inglés POB también documenta como alternativa más formal.
theological_decisions:
- issue: Identidad de גְּבִירָה
  english_pob_reading: Queen mother renders Hebrew גְּבִירָה, a royal title that can denote the king's mother rather than his wife.
  chosen_spanish_reading: reina madre
  alternative_spanish_readings:
  - reina
  - señora
  rationale: La forma española mantiene el valor de título cortesano y la posible referencia a la madre del rey, que es la lectura histórica más probable en este contexto. Evita neutralizar el matiz político del pasaje.
  doctrine_reference: Historia y contexto monárquico del AT
- issue: Relación entre la corona y la gloria
  english_pob_reading: Or, more formally, 'the crown of your glory has come down from your heads.'
  chosen_spanish_reading: la corona de vuestra gloria ha bajado de vuestra cabeza
  alternative_spanish_readings:
  - vuestra corona gloriosa ha bajado de vuestra cabeza
  - la corona de vuestro esplendor ha bajado de vuestra cabeza
  rationale: Se preserva la construcción genitiva para no borrar la posible tensión entre la corona material y la gloria/honor que la caracteriza. La formulación mantiene abierta la alternativa formal documentada por el POB inglés.
  doctrine_reference: Lenguaje poético y real del juicio divino
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; esta propuesta conserva ese consenso, manteniendo la imagen de descenso de la corona y la lectura cortesana de גְּבִירָה.
  spanish_consistency_notes:
  - Se conservó Yahvé/ Mesías en línea con la terminología del proyecto, aunque este versículo no los contiene.
  - Se prefirió un español sobrio y público, evitando calcos innecesarios pero reteniendo la metáfora de descenso y la construcción posesiva de la corona.
  - Se usó «vuestra» para respetar la pluralidad del hebreo y el tono bíblico solemne en la dirigencia real.
