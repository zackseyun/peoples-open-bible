translation:
  language: es
  text: Sácame de esta red que me han escondido[a], porque tú eres mi baluarte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la red que han escondido para mí»; el hebreo conserva la imagen de una red escondida, aunque en español también puede expresarse como una trampa que me han tendido.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹצִיאֵנִי
  english_pob_choice: Bring me out
  chosen_spanish: Sácame
  alternatives_spanish:
  - Hazme salir
  - Sácame de allí
  - Llévame fuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa causar que salga. En español, «sácame» comunica con naturalidad el valor causativo sin añadir énfasis interpretativo extra.
- source_word: מֵרֶשֶׁת
  english_pob_choice: out of this net
  chosen_spanish: de esta red
  alternatives_spanish:
  - de esta trampa
  - fuera de esta red
  lexicon: HALOT
  rationale: רֶשֶׁת es literalmente una red. «Red» conserva la imagen concreta del hebreo; «trampa» interpreta la metáfora y por eso queda como alternativa.
- source_word: זוּ
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - la cual
  - que
  lexicon: HALOT
  rationale: El demostrativo apunta a una red específica y conocida en el contexto. «Esta» mantiene la referencia directa y fluida en español.
- source_word: טָמְנוּ לִי
  english_pob_choice: they have hidden for me
  chosen_spanish: han ocultado para mí
  alternatives_spanish:
  - han puesto para mí
  - han tendido para mí
  - han escondido para mí
  lexicon: HALOT
  rationale: טמן significa esconder u ocultar. «Han ocultado» conserva el sentido léxico básico sin forzar una expresión idiomática ajena al hebreo; el valor hostil lo da el contexto de la red.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base de la súplica. «Porque» comunica bien la relación causal en español actual.
- source_word: מָעוּזִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi baluarte
  alternatives_spanish:
  - mi refugio
  - mi fortaleza
  - mi lugar de fortaleza
  lexicon: HALOT
  rationale: מָעוֹז denota un lugar o fuente de fuerza y protección. «Baluarte» preserva la imagen defensiva y es un equivalente digno y natural en español bíblico moderno; «refugio» suaviza más la imagen, y «fortaleza» también es posible, pero «baluarte» refleja bien la idea de protección resistente.
theological_decisions:
- issue: Metáfora protectora aplicada a Dios
  english_pob_reading: you are my stronghold
  chosen_spanish_reading: tú eres mi baluarte
  alternative_spanish_readings:
  - tú eres mi refugio
  - tú eres mi fortaleza
  rationale: El verso presenta a Dios con lenguaje metafórico de protección y firmeza, no con una afirmación doctrinal más específica. «Baluarte» conserva esa imagen sin estrecharla innecesariamente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios sustanciales en la revisión más reciente; se conservó la equivalencia óptima, manteniendo la imagen de la red oculta y la metáfora de protección en «baluarte».
  spanish_consistency_notes:
  - Se mantuvo «red» para רֶשֶׁת y no se sustituyó por «trampa» en el texto principal.
  - Se evitó «SEÑOR» y se tradujo la referencia divina de modo directo en la metáfora, sin alterar el sentido del hebreo.
  - «Baluarte» se usa como equivalente funcional de «stronghold», con registro bíblico claro pero en español natural.
