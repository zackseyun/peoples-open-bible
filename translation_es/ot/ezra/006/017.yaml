review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del arameo: dedicación, casa de Dios, inventario sacrificial, alcance corporativo de «todo Israel» y relación con las doce tribus. Sin embargo, los marcadores de notas están mal anclados respecto al contenido: la nota sobre la alternativa de «por todo Israel / en favor de todo Israel» fue colocada en «toros», y la nota cultural sobre las doce tribus fue colocada en «expiación». Además, «como expiación» es comprensible, pero atenúa la especificidad léxica de לְחַטָּא como ofrenda/sacrificio por el pecado en una lista sacrificial.'
  spanish_quality_summary: El español es claro, natural y digno. «Toros», «carneros», «corderos» y «machos cabríos» suenan bien. No obstante, «como ofrenda por el pecado» es más fiel y más claro en contexto cultual que «como expiación», que puede sonar más abstracto. También conviene corregir la ubicación de las notas para evitar confusión del lector.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto principal. La decisión relevante es sacrificial: para לְחַטָּא, «ofrenda por el pecado» se alinea mejor con la decisión inglesa documentada («as a sin offering») que «expiación». «Casa de Dios» preserva adecuadamente el original frente a «templo».'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados en palabras equivocadas.
    rationale: 'La nota a dice «O: en favor de todo Israel», pero está puesta en «toros», donde no tiene sentido. La nota b explica el número doce y las tribus, pero está puesta en «expiación», no en «doce machos cabríos» o una frase contigua.'
  - severity: medium
    issue: «Como expiación» pierde la especificidad de la expresión sacrificial.
    rationale: לְחַטָּא en este contexto de inventario de animales sacrificiales se entiende mejor como «como ofrenda por el pecado» o «como sacrificio por el pecado». «Expiación» comunica efecto o función, pero no tan claramente la categoría de ofrenda.
  - severity: low
    issue: La nota a contiene comillas y puntuación innecesariamente recargadas.
    rationale: 'Puede simplificarse a una formulación más limpia en español: «O: “en favor de todo Israel”» o incluso sin comillas internas, manteniendo el estilo editorial consistente.'
  revised_spanish_text: Y ofrecieron para la dedicación de esta casa de Dios cien toros, doscientos carneros, cuatrocientos corderos y doce machos cabríos[b] como ofrenda por el pecado por todo Israel[a], conforme al número de las tribus de Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «en favor de todo Israel».'
    reason: lexical_alternative
  - marker: b
    text: El número doce corresponde a las doce tribus de Israel, expresando el alcance representativo de la ofrenda.
    reason: cultural_note
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan al contenido que explican. También se cambió «como expiación» a «como ofrenda por el pecado» para reflejar con mayor precisión el valor sacrificial de לְחַטָּא y la decisión léxica documentada en el POB inglés, sin perder naturalidad en español.
