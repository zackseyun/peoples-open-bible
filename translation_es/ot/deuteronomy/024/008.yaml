revisions:
- from: Ten cuidado en el caso de un brote de enfermedad de la piel[a], para guardar diligentemente y hacer conforme a todo lo que los sacerdotes levitas te instruyan; como yo les he mandado, así deberás tener cuidado de hacerlo.
