- from: Y David consultó con los comandantes de los millares y de los cientos[a], con todo líder.
  to: Y David consultó con los comandantes de miles y de cientos[a], con todo líder.
  rationale: Se ajusta la frase numérica a un español más natural y claro («de miles y de cientos») sin perder la referencia a unidades militares/administrativas del hebreo. Se mantiene «consultó», «comandantes» y «líder» por fidelidad al análisis léxico del POB. La nota alternativa conserva la opción documentada «tomó consejo» con una sintaxis española más fluida.
