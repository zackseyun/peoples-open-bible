  to: Ninguna ciudad sitiada jamás resistió tantos y tan variados ingenios de guerra como aquel santísimo[a], quien, mientras su alma sagrada era quemada con torturas y la rueda[b], agitó a los que lo sitiaban por medio de la razón que defiende la piedad.
  rationale: Se corrige un calco no idiomático al inicio ('Ninguna ciudad...'), se refuerza ἐκίνησεν con 'agitó' para reflejar mejor el efecto sobre los sitiadores, y se depura la nota [a] eliminando la alternativa no española 'all-santo'. El resto del texto preserva adecuadamente la metáfora de asedio, la imaginería del martirio y el papel central de la razón que defiende la piedad.
