base_translation:
  language: en
  yaml_path: translation/ot/genesis/016/005.yaml
  text: Then Sarai said to Abram[a], “The wrong done to me is on you. I gave my female slave into your embrace, and when she saw that she had conceived, I became contemptible in her eyes[b]. May Yahweh judge between me and you.”
  footnotes:
  - marker: a
    text: Or, “My wrong be upon you,” preserving the more literal Hebrew wording; the sense is an accusation that Abram bears responsibility for the injustice Sarai has suffered.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into your bosom,” an idiom here for intimate reception.
    reason: lexical_alternative
