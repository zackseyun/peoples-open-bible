base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/006/009.yaml
  text: My dove[a], my flawless one, is the only one; she is the only one of her mother, pure to the one who bore her. Daughters saw her and called her blessed[c][b]; queens and concubines also praised her.
  footnotes:
  - marker: a
    text: Or 'my perfect one' for 'my flawless one.' The Hebrew term can convey completeness or blamelessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'choice' / 'radiant' for 'pure.' The Hebrew adjective may emphasize purity or exceptional quality.
    reason: lexical_alternative
  - marker: c
    text: '''Daughters'' may refer more broadly to young women or maidens in the poem''s idiom.'
    reason: cultural_note
