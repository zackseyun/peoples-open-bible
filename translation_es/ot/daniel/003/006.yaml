translation:
  language: es
  text: Y cualquiera que no se postre y adore[a] será arrojado, en aquella misma hora, en medio de un horno de fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo: «en aquella hora», un modismo que significa inmediatamente o al instante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַן דִּי
  english_pob_choice: And whoever
  chosen_spanish: Y cualquiera que
  alternatives_spanish:
  - Y quien
  - Y todo el que
  lexicon: HALOT
  rationale: La expresión aramea introduce una condición general e indefinida. «Cualquiera que» conserva bien ese alcance universal en español sin volverlo rígido.
- source_word: לָא יִפֵּל
  english_pob_choice: does not fall down
  chosen_spanish: no se postre
  alternatives_spanish:
  - no caiga
  - no se incline
  lexicon: HALOT
  rationale: En este contexto de adoración a la imagen, el verbo de ‘caer’ expresa la acción corporal de postrarse. «Postre» comunica esa postura ritual con naturalidad en español.
- source_word: וְיִסְגֻּד
  english_pob_choice: and worship
  chosen_spanish: ni rinda culto
  alternatives_spanish:
  - ni adore
  - ni haga homenaje
  lexicon: HALOT
  rationale: El verbo puede implicar reverencia u homenaje religioso; como el objeto es una imagen, «rinda culto» preserva el sentido cultual sin reducirlo solo a la postura física. El «ni» coordina la negación con la cláusula anterior.
- source_word: בַּהּ שַׁעֲתָא
  english_pob_choice: in that hour
  chosen_spanish: en esa hora
  alternatives_spanish:
  - en aquel momento
  - en esa misma hora
  - de inmediato
  lexicon: HALOT
  rationale: Se mantiene la referencia idiomática temporal más cercana al arameo («en esa hora») en lugar de convertirla en una explicación interpretativa como «de inmediato».
- source_word: יִתְרְמֵא
  english_pob_choice: shall be thrown
  chosen_spanish: será arrojado
  alternatives_spanish:
  - será echado
  - será lanzado
  lexicon: HALOT
  rationale: El pasivo de castigo se expresa de forma directa con «será arrojado», que conserva la fuerza judicial del verbo sin arcaísmo excesivo.
- source_word: לְגוֹא
  english_pob_choice: into the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el interior de
  lexicon: HALOT
  rationale: «En medio de» reproduce la imagen de ser arrojado al centro/interior del horno. En español suena más natural que una calca como «dentro del medio de».
- source_word: אַתּוּן
  english_pob_choice: a furnace
  chosen_spanish: un horno
  alternatives_spanish:
  - un horno de fundición
  - un horno grande
  lexicon: HALOT
  rationale: El término designa un horno industrial o de castigo; «horno» es suficiente y claro en español, y el contexto completa su carácter judicial.
- source_word: נוּרָא יָקִדְתָּא
  english_pob_choice: of blazing fire
  chosen_spanish: de fuego ardiente
  alternatives_spanish:
  - de fuego abrasador
  - de fuego encendido
  - ardiente
  lexicon: HALOT
  rationale: La doble idea aramea de fuego y ardor se conserva con «fuego ardiente». Mantiene la intensificación sin sonar demasiado libre ni demasiado literal.
theological_decisions:
- issue: La acción exigida ante la imagen es ‘fall down’ + ‘worship’, que en contexto implica adoración idolátrica y no solo una reverencia social.
  english_pob_reading: does not fall down and worship
  chosen_spanish_reading: no se postre ni rinda culto
  alternative_spanish_readings:
  - no se incline ni adore
  - no caiga y adore
  rationale: La combinación española mantiene la distinción entre postura corporal («se postre») y acto religioso («rinda culto»), conservando la tensión del original y evitando suavizar el carácter idolátrico.
  doctrine_reference: Adoración exclusiva a Dios; prohibición de idolatría (Éxodo 20:3-5).
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió ‘immediately’ por ‘in that hour’ para ajustarse con mayor precisión a בַּהּ שַׁעֲתָא. La línea española conserva esa precisión idiomática con «en esa hora», sin convertirla en una paráfrasis temporal más explícita.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo; no aparece vocabulario divino directo aquí.
  - «Postre» y «rinda culto» preservan tanto la postura como la acción religiosa, evitando colapsar ambos verbos en una sola idea.
  - «Fuego ardiente» sigue el paralelismo intensivo del arameo sin introducir ‘llamas’ u otras ampliaciones no atestiguadas.
