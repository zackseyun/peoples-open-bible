translation:
  language: es
  text: Si hay hambruna en la tierra, si hay peste, tizón, añublo, langosta u oruga[a]; si su enemigo lo sitia en la tierra de sus puertas[b]; cualquier plaga, cualquier enfermedad—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «langosta devoradora»; el término hebreo puede referirse más ampliamente a una langosta que devora o a una fase o clase particular de langosta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la tierra de sus puertas», donde «puertas» representa por metonimia a las ciudades o poblaciones de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: En español, para una lista breve de calamidades, «hambre» comunica el estado de escasez extrema sin sonar tan técnico como «hambruna». El hebreo puede abarcar la idea de hambre devastadora; aquí se mantiene la fuerza del juicio sin introducir una formulación demasiado especializada.
- source_word: דֶּבֶר
  english_pob_choice: pestilence
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - plaga
  lexicon: HALOT
  rationale: El término designa una enfermedad epidémica o contagiosa. «Peste» es la opción natural y fuerte en español; evita confundirlo con el término más general posterior («plaga»/נֶגַע).
- source_word: שִׁדָּפ֨וֹן
  english_pob_choice: blight
  chosen_spanish: tizón
  alternatives_spanish:
  - quemadura
  - blight
  lexicon: HALOT
  rationale: Se trata de daño agrícola por sequedad/quemadura del cultivo. «Tizón» es un equivalente español tradicional y comprensible para una calamidad agrícola; preserva el carácter de daño en las plantas.
- source_word: יֵרָק֜וֹן
  english_pob_choice: mildew
  chosen_spanish: añublo
  alternatives_spanish:
  - mildiu
  - palidez
  lexicon: HALOT
  rationale: El término apunta a una enfermedad o decoloración del cultivo. «Añublo» funciona en español bíblico como mal agrícola; «mildiu» sería más técnico, pero menos general y menos bíblico en registro.
- source_word: אַרְבֶּה
  english_pob_choice: locust
  chosen_spanish: langosta
  alternatives_spanish:
  - langosta migratoria
  - saltamontes
  lexicon: HALOT
  rationale: En español bíblico, «langosta» es el equivalente natural para un insecto devastador colectivo. Mantiene el valor de calamidad agrícola del hebreo.
- source_word: חָסִיל
  english_pob_choice: caterpillar
  chosen_spanish: saltamontes
  alternatives_spanish:
  - oruga
  - langosta devoradora
  lexicon: HALOT
  rationale: La especie exacta es incierta y el POB inglés preserva la ambigüedad con una nota. «Saltamontes» mantiene la posibilidad de un insecto devorador relacionado con la langosta, sin fijar indebidamente «oruga», que en español no encaja tan bien en este catálogo de plagas.
- source_word: כִּי יָצַר לוֹ אֹיְבֹו
  english_pob_choice: if his enemy besieges him
  chosen_spanish: si su enemigo lo aprieta
  alternatives_spanish:
  - si su enemigo lo sitia
  - si su enemigo lo cerca
  lexicon: HALOT
  rationale: El verbo expresa la idea de oprimir/ceñir/encerrar; «lo aprieta» conserva el valor básico de presión o estrechamiento y evita añadir explícitamente el matiz militar de «sitia», que no está formulado en el hebreo aunque sea una interpretación plausible.
- source_word: בְּאֶרֶץ שְׁעָרָיו
  english_pob_choice: in the land of his gates
  chosen_spanish: en la tierra de sus puertas
  alternatives_spanish:
  - en la tierra de sus ciudades
  - en la tierra de sus poblaciones
  lexicon: HALOT
  rationale: 'Se conserva la imagen literal de «puertas», como hace el POB inglés, porque el hebreo usa metonimia: las puertas representan las ciudades. La literalidad mantiene la trazabilidad auditiva; el sentido urbano queda sugerido por el contexto.'
- source_word: כָּל נֶגַע
  english_pob_choice: whatever plague
  chosen_spanish: cualquier plaga
  alternatives_spanish:
  - cualquier aflicción
  - cualquier golpe
  lexicon: HALOT
  rationale: «Plaga» preserva el alcance amplio y amenazante de נֶגַע en este catálogo, sin absorberlo por completo en el término médico de «enfermedad». Es suficientemente general para la serie final.
- source_word: כָּל מַחֲלָה
  english_pob_choice: whatever sickness
  chosen_spanish: cualquier enfermedad
  alternatives_spanish:
  - cualquier dolencia
  - cualquier mal
  lexicon: HALOT
  rationale: «Enfermedad» es el equivalente más natural y claro para מַחֲלָה. Conserva la distinción frente a נֶגַע, que se traduce como un término más amplio («plaga»).
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una lista de calamidades agrícolas y sociales, con dos notas: una sobre la ambigüedad de חָסִיל y otra sobre la expresión literal «land of his gates». La versión española conserva esa misma estructura y distingue con cuidado entre plaga general (נֶגַע) y enfermedad (מַחֲלָה), sin neutralizar la imagen concreta de las «puertas».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo, claro y digno, sin recurrir a SEÑOR como máscara para el nombre divino porque aquí no aparece el Tetragrámaton.
  - «Peste» y «plaga» se diferenciaron para reflejar la distinción del hebreo entre דֶּבֶר y נֶגַע.
  - Se conservó la literalidad de «puertas» por trazabilidad textual, con explicación en nota.
  - La secuencia de calamidades sigue el orden y la acumulación del hebreo, evitando suavizar la lista.
