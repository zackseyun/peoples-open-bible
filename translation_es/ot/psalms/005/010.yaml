    text: O «no hay nada fiable en la boca de él», si se desea conservar más estrictamente la forma singular al comienzo del verso.
    reason: alternative_reading
  - marker: b
    text: O «su ser interior es destrucción» o «su corazón es destrucción».
    reason: lexical_alternative
  - marker: c
    text: O «con su lengua hablan con suavidad».
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse, pero la nota [a] debe corregirse para reflejar la alternativa real documentada en la auditoría inglesa: el singular de «su boca / la boca de él». También se pule la redacción de la nota [c] para mayor naturalidad en español.'
