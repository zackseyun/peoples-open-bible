translation:
  language: es
  text: Entonces Mardoqueo se fue e hizo conforme a todo lo que Ester le había mandado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “siguió adelante” o “pasó adelante”. El hebreo עבר tiene el sentido literal de “pasar por/atravesar”, pero aquí probablemente describe la partida de Mardoqueo para hacer lo que Ester le mandó.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - pasó adelante
  - se encaminó
  lexicon: HALOT / uso narrativo de עבר
  rationale: El hebreo עבר tiene un sentido amplio de 'pasar' o 'atravesar', pero en este contexto narrativo la acción es la salida de Mardoqueo para cumplir lo mandado por Ester. 'Se fue' comunica bien la partida sin forzar un calco como 'pasó adelante', que en español puede sonar menos natural o más ambiguo.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  - llevó a cabo
  lexicon: HALOT
  rationale: עָשָׂה es el verbo común 'hacer'. 'Hizo' conserva la sencillez narrativa del original y corresponde al inglés POB 'did' sin introducir más interpretación de la necesaria.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como
  lexicon: HALOT
  rationale: La construcción expresa conformidad completa con la orden de Ester. 'Conforme a todo lo que' preserva la fuerza totalizadora de כֹּל y suena natural en español bíblico moderno.
- source_word: צִוְּתָה
  english_pob_choice: had commanded
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había comandado
  - le había dado instrucciones
  lexicon: HALOT
  rationale: צוה significa 'mandar/ordenar'. 'Había mandado' mantiene la relación temporal anterior a la acción de Mardoqueo, como en el inglés POB, y evita una dureza innecesaria en español.
- source_word: עָלָיו
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - sobre él
  lexicon: HALOT
  rationale: Con צוה, על señala a la persona sobre la que recae el mandato. En español, el clítico dativo 'le' transmite de manera idiomática esa relación personal sin perder el sentido.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: Convención onomástica del proyecto
  rationale: Se mantiene el nombre propio en su forma española habitual 'Ester'. La ortografía sin h refleja el uso castellano estándar, a la vez que identifica inequívocamente al personaje bíblico.
translation_notes:
  revision_awareness: Se sigue de cerca el texto hebreo y el audit trail en inglés POB. La única decisión relevante es resolver עבר en una forma natural de partida en español, manteniendo en nota la alternativa literal de 'pasar'. No se detectan revisiones previas que obliguen a cambios.
  spanish_consistency_notes:
  - Se usa 'Ester' como forma española del nombre propio.
  - Se prefiere 'mandó/mandado' para צוה en esta escena narrativa, en concordancia con el registro sobrio del versículo.
  - No se introduce lenguaje doctrinal adicional, ya que el versículo es puramente narrativo.
