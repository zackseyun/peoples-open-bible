base_translation:
  language: en
  yaml_path: translation/ot/ruth/002/020.yaml
  text: Naomi said to her daughter-in-law[a], “Blessed be he by Yahweh, whose kindness has not forsaken the living or the dead.” Then Naomi said to her, “The man is a close relative of ours[b]; he is one of our redeemers.”
  footnotes:
  - marker: a
    text: Or, 'May he be blessed by the LORD, who has not forsaken his kindness toward the living and the dead,' with 'his kindness' understood as Boaz's kindness rather than the LORD's.
    reason: alternative_reading
  - marker: b
    text: Or 'one of our kinsman-redeemers.' The Hebrew refers to a near relative with a recognized duty or right to redeem a family member or property.
    reason: lexical_alternative
