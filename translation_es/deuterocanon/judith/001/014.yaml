translation:
  language: es
  text: Y se apoderó de sus ciudades, y llegó hasta Ecbátana, y tomó sus torres y saqueó sus plazas[a], y convirtió su esplendor en oprobio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego πλατείας puede referirse más específicamente a calles anchas o plazas públicas de la ciudad, no solo a «calles» en sentido general.
    reason: lexical_alternative
  - marker: b
    text: Griego κόσμος aquí significa el adorno o la magnificencia de la ciudad, no «mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκυρίευσεν
  english_pob_choice: gained control of
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - ganó control de
  - dominó
  - subyugó
  lexicon: BDAG
  rationale: κυριεύω expresa ejercer dominio o señorío en un contexto de conquista. «Se apoderó de» comunica la toma efectiva de control con fuerza militar sin sonar tan abstracto como «ganó control de» ni tan técnico como «subyugó».
- source_word: πόλεων
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - urbes
  lexicon: LSJ
  rationale: πόλις significa normalmente «ciudad». «Ciudades» conserva el sentido básico y el tono de lista militar.
- source_word: ἀφίκετο ἕως Ἐκβατάνων
  english_pob_choice: came as far as Ecbatana
  chosen_spanish: llegó hasta Ecbátana
  alternatives_spanish:
  - avanzó hasta Ecbátana
  - vino hasta Ecbátana
  lexicon: LSJ
  rationale: ἀφικνέομαι indica llegar, y ἕως marca extensión. «Llegó hasta» expresa bien el alcance de la campaña. Se usa «Ecbátana» como adaptación castellana del topónimo.
- source_word: ἐκράτησεν τῶν πύργων
  english_pob_choice: seized its towers
  chosen_spanish: tomó sus torres
  alternatives_spanish:
  - se apoderó de sus torres
  - capturó sus torres
  lexicon: BDAG
  rationale: κρατέω con genitivo puede indicar tomar o hacerse con algo por la fuerza. «Tomó» es natural en español, y el contexto bélico conserva la fuerza de captura.
- source_word: ἐπρονόμευσε
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - despojó
  - pilló
  lexicon: LSJ
  rationale: El verbo denota tomar botín. «Saqueó» es el equivalente español más directo y claro en un contexto militar.
- source_word: πλατείας
  english_pob_choice: streets
  chosen_spanish: plazas
  alternatives_spanish:
  - calles amplias
  - plazuelas
  - avenidas
  lexicon: LSJ
  rationale: πλατεῖαι puede referirse a calles anchas o espacios públicos abiertos. «Plazas» mantiene en español esa posible amplitud urbana mejor que «calles» y deja abierta la ambigüedad lexical documentada.
- source_word: κόσμον
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - adorno
  - ornato
  - belleza
  lexicon: BDAG
  rationale: Aquí κόσμος no significa «mundo», sino adorno o magnificencia visible. «Esplendor» transmite bien la idea de magnificencia urbana.
- source_word: ἔθηκεν εἰς ὄνειδος
  english_pob_choice: turned ... into disgrace
  chosen_spanish: convirtió ... en oprobio
  alternatives_spanish:
  - convirtió ... en vergüenza
  - hizo ... un oprobio
  - lo puso en descrédito
  lexicon: BDAG
  rationale: El giro significa hacer algo objeto de reproche o deshonra. «Convirtió ... en oprobio» preserva el paralelismo retórico entre la gloria previa y su humillación.
- source_word: ὄνειδος
  english_pob_choice: disgrace
  chosen_spanish: oprobio
  alternatives_spanish:
  - deshonra
  - vergüenza
  - desprestigio
  lexicon: BDAG
  rationale: ὄνειδος denota reproche, afrenta o deshonra. «Oprobio» es un término digno y fiel al matiz de reproche público.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Jdt 1:14 y toma en cuenta el criterio revisado del POB en inglés: el final debe leerse como «en oprobio», no «en su oprobio», porque el griego dice εἰς ὄνειδος αὐτῆς, literalmente «en oprobio de ella / para su deshonra», con un giro idiomático que no exige repetir un posesivo en español. También se respeta la observación lexical sobre πλατείας y κόσμος mediante notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Esplendor» se mantiene para κόσμος por coherencia con el audit trail del POB y por contraste retórico con «oprobio».
  - «Saqueó» se conserva para ἐπρονόμευσε como término militar claro y no eufemístico.
  - La adaptación «Ecbátana» sigue la forma castellana usual del topónimo y mantiene la referencia histórica/geográfica reconocible.
