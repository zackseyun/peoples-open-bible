translation:
  language: es
  text: después de haber llevado al destierro Nabucodonosor, rey de Babilonia, a Jeconías, a los gobernantes, a los prisioneros, a los hombres poderosos y al pueblo de la tierra desde Jerusalén, y de haberlo llevado a Babilonia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un pronombre singular ('lo'), aparentemente referido de manera específica a Jeconías; algunos lectores pueden entender el sentido de forma más amplia como 'los' para todo el grupo deportado.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὸ ἀποικίσαι
  english_pob_choice: after ... had taken ... into exile
  chosen_spanish: después de que ... había llevado al destierro
  alternatives_spanish:
  - después de deportar
  - después de haber llevado en destierro
  - después de haber deportado
  lexicon: LSJ
  rationale: El infinitivo articular con μετά es temporal; en español, 'después de que' con pluscuamperfecto reproduce bien la anterioridad. ἀποικίζω aquí expresa deportación/exilio, por lo que 'llevar al destierro' conserva la fuerza causal y el matiz de exilio sin suavizarlo.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nabucodonosor
  lexicon: uso estándar bíblico en español
  rationale: El nombre del rey babilónico tiene una forma española ampliamente reconocida. Mantiene la transparencia frente al griego y la legibilidad para lectores de Biblia en español.
- source_word: βασιλέα Βαβυλῶνος
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: rendimiento genitivo directo
  rationale: La relación genitiva es directa y no requiere paráfrasis. 'Rey de Babilonia' es la forma natural y fiel en español.
- source_word: τὸν Ἰεχονίαν
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Joaquín
  lexicon: uso bíblico hispano + transparencia griega
  rationale: La forma griega corresponde directamente a Jeconías/Jeconías; se conserva esta forma para mantener la cercanía al original. 'Joaquín' reflejaría la tradición hebrea/latina, pero es menos transparente respecto del griego dado.
- source_word: τοὺς ἄρχοντας
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los dirigentes
  - los magistrados
  lexicon: LSJ
  rationale: ἄρχοντες denota figuras de autoridad. 'Gobernantes' preserva el sentido político sin especificar un cargo no atestado.
- source_word: τοὺς δεσμώτας
  english_pob_choice: the prisoners
  chosen_spanish: los prisioneros
  alternatives_spanish:
  - los cautivos
  - los que estaban encadenados
  - los encarcelados
  lexicon: LSJ
  rationale: δεσμώτης es literalmente alguien en prisiones o ataduras. 'Prisioneros' conserva el término más directo y distinto de 'destierro'.
- source_word: τοὺς δυνατοὺς
  english_pob_choice: the mighty men
  chosen_spanish: los hombres poderosos
  alternatives_spanish:
  - los poderosos
  - los hombres fuertes
  - los hombres valientes
  lexicon: LSJ
  rationale: δυνατοί aquí se refiere a hombres de peso social o militar. 'Hombres poderosos' mantiene el perfil humano y la amplitud semántica del griego.
- source_word: τὸν λαὸν τῆς γῆς
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente del país
  - el pueblo del país
  - la población de la tierra
  lexicon: LSJ
  rationale: La expresión griega se vierte de manera transparente como 'el pueblo de la tierra'. Aunque puede funcionar como designación social, aquí no se fuerza una interpretación más específica.
- source_word: ἀπὸ Ἰερουσαλήμ
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  lexicon: uso preposicional natural
  rationale: '''Desde Jerusalén'' refleja el punto de origen de la deportación y suena natural en español dentro del encadenamiento verbal.'
- source_word: καὶ ἤγαγεν αὐτὸν εἰς Βαβυλῶνα
  english_pob_choice: and had brought him to Babylon
  chosen_spanish: y lo había llevado a Babilonia
  alternatives_spanish:
  - y lo llevó a Babilonia
  - y los había llevado a Babilonia
  lexicon: LSJ
  rationale: El griego tiene αὐτόν en singular; se conserva el singular en español ('lo') para no armonizar con el grupo plural precedente. El pluscuamperfecto mantiene la relación temporal con la cláusula inicial.
theological_decisions:
- issue: Número del pronombre final
  english_pob_reading: Preserve the singular 'him' in the main text.
  chosen_spanish_reading: Conservar el singular 'lo' en la cláusula final.
  alternative_spanish_readings:
  - '''los'' para referirse al grupo deportado'
  - reformular en plural para suavizar la referencia
  rationale: Es una cuestión textual/interpretativa, no doctrinal. El testimonio griego leído aquí usa αὐτόν en singular, por lo que la traducción debe reflejarlo. Se documenta la posible lectura de sentido colectivo en una nota, en lugar de nivelarla silenciosamente.
  doctrine_reference: Principio de primacía del original y transparencia auditiva del POB
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del contexto inglés, que reordenó la frase temporal para reflejar mejor el griego: primero la referencia al lugar de origen (''desde Jerusalén'') y luego el destino (''a Babilonia''). No introduce cambios sustanciales adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se conserva la distinción entre 'destierro' y 'prisioneros', evitando fusionar ἀποικίσαι con δεσμώτας.
  - Se usa 'Jeconías' para mantener transparencia con el griego Ἰεχονίαν.
  - La secuencia verbal en pluscuamperfecto respeta la anterioridad narrativa marcada por μετά + infinitivo articular.
