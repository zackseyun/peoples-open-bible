review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del hebreo: propósito («Para que»), rescate/liberación, afecto plural («tus amados»), súplica de salvación, y la imagen de la diestra divina. Sin embargo, no preserva fielmente la decisión léxica auditada de POB para יְדִידֶיךָ, que en inglés se fijó como «your beloved ones» para explicitar la pluralidad; «tus amados» es aceptable, pero la nota actual no ofrece una verdadera alternativa ni mejora la claridad. Además, la nota b contiene inglés mezclado («construals») y formula de modo impreciso la situación textual.'
  spanish_quality_summary: 'El español es natural, digno y legible. «Para que tus amados sean librados, salva con tu diestra y respóndeme» suena bien en registro bíblico moderno. Aun así, conviene una reparación menor: hacer más explícita la pluralidad afectiva con «tus seres amados» o equivalente sería menos idiomático; por eso el texto principal puede mantenerse en «tus amados», pero la nota debe corregirse. También la nota b necesita español más limpio y exacto.'
  glossary_alignment: 'No hay conflicto con los términos teológicos por defecto del proyecto. «Salva», «diestra» y «respóndeme» son adecuados. La principal observación es de precisión léxica: יְדִידֶיךָ es plural afectuoso; el español principal lo transmite suficientemente, pero la nota asociada debe justificar mejor esa elección. La revisión inglesa final adoptó singular en la última súplica, aunque el expediente fuente favorece «answer us»; por coherencia con el estado auditado, el español puede conservar «respóndeme» con nota textual clara.'
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa real y es redundante con el texto principal.
    rationale: Dice «O “tus amados”» cuando el texto ya dice exactamente «tus amados». Eso no cumple bien la función de una nota léxica útil para el lector ni refleja la alternativa preservada en el expediente inglés.
  - severity: medium
    issue: La nota [b] mezcla inglés y español y describe de forma poco pulida la variante textual.
    rationale: «otras construals» no es español natural. Además, la nota debe explicar con claridad que otras lecturas entienden «respóndenos», no solo remitir vagamente al aparato inglés.
  revised_spanish_text: Para que tus amados[a] sean librados, salva con tu diestra y respóndeme[b].
  revised_footnotes:
  - marker: a
    text: O «tus seres queridos»; el hebreo es plural y expresa afecto.
    reason: lexical_alternative
  - marker: b
    text: La revisión auditada adopta la lectura singular «respóndeme»; otras lecturas entienden «respóndenos».
    reason: textual_variant
  revision_rationale: Se conserva el texto principal porque es fiel, natural y coherente con el estado auditado, pero se corrigen las notas para que sean útiles, idiomáticas en español y más precisas respecto de la alternativa léxica y la variante textual.
