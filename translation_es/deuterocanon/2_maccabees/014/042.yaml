translation:
  language: es
  text: queriendo morir noblemente antes que quedar sujeto[a] a esos criminales y ser maltratado de un modo indigno de su propia nobleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser ultrajado» o «ser insultado»; el verbo griego puede abarcar un trato humillante y abusivo en sentido amplio, no solo un insulto verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - honrosamente
  - de manera noble
  lexicon: LSJ
  rationale: El adverbio conserva la idea de conducta digna de nobleza o alto linaje. «Noblemente» mantiene el vínculo léxico con εὐγενείας y reproduce bien el contraste moral del pasaje.
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo firmemente
  lexicon: BDAG
  rationale: El participio expresa intención o resolución. «Queriendo» funciona de forma natural en español y preserva la relación participial sin cargar el sentido emocional.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - encontrar la muerte
  lexicon: BDAG
  rationale: Es el infinitivo básico de morir; «morir» es la equivalencia directa y suficientemente clara en español.
- source_word: ἤπερ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más bien que
  - en vez de
  lexicon: LSJ
  rationale: Introduce contraste comparativo entre la opción preferida y la rechazada. «Antes que» suena natural y conserva el valor de preferencia.
- source_word: ἀλιτηρίοις
  english_pob_choice: those criminals
  chosen_spanish: esos criminales
  alternatives_spanish:
  - esos malvados
  - esos impíos
  - esos perversos
  lexicon: LSJ
  rationale: El término es fuertemente peyorativo y apunta a personas culpables o criminales. «Criminales» transmite la hostilidad moral con claridad, y «esos» conserva el matiz de referencia despectiva.
- source_word: ὑποχείριος γενέσθαι
  english_pob_choice: to become subject to
  chosen_spanish: quedar sujeto
  alternatives_spanish:
  - ser sometido
  - caer bajo el poder
  - quedar bajo dominio
  lexicon: LSJ
  rationale: El giro idiomático indica pasar al dominio de otro. «Quedar sujeto» refleja bien la idea de sujeción sin alejarse del sentido más literal que el audit trail inglés preservó.
- source_word: τῆς ἰδίας εὐγενείας
  english_pob_choice: his own nobility
  chosen_spanish: de su propia nobleza
  alternatives_spanish:
  - de su propio honor
  - de su noble condición
  lexicon: LSJ
  rationale: La expresión retoma εὐγενῶς y mantiene el juego léxico con εὐγενεία. «Nobleza» conserva tanto la dignidad social como la calidad moral que el contexto sugiere.
- source_word: ἀναξίως
  english_pob_choice: in a way unworthy of
  chosen_spanish: de un modo indigno de
  alternatives_spanish:
  - indignamente para
  - de manera no digna de
  lexicon: LSJ
  rationale: El adverbio modifica la manera del ultraje en relación con la nobleza del sujeto. «De un modo indigno de» es claro, formal y mantiene la relación evaluativa del griego.
- source_word: ὑβρισθῆναι
  english_pob_choice: be mistreated
  chosen_spanish: ser maltratado
  alternatives_spanish:
  - ser ultrajado
  - ser insultado
  - ser vejadamente tratado
  lexicon: BDAG
  rationale: El pasivo de ὑβρίζω puede abarcar abuso humillante y trato violento o vejatorio. «Ser maltratado» conserva ese campo semántico amplio sin reducirlo solo a insulto verbal.
translation_notes:
  revision_awareness: El texto español sigue de cerca el último estado del audit trail inglés, especialmente la preferencia por ὑποχείριος γενέσθαι como sujeción y por ὑβρισθῆναι como maltrato amplio. Se conserva también la correlación léxica entre εὐγενῶς y εὐγενείας mediante «noblemente / nobleza».
  spanish_consistency_notes:
  - Se evitó «Cristo/SEÑOR» porque el versículo no contiene vocabulario cristológico ni el nombre divino.
  - «Esos criminales» mantiene el tono despectivo del griego sin exagerar con arcaísmos.
  - La estructura participial se adaptó al español para que el periodo resulte legible y publicable sin perder la relación de contraste.
