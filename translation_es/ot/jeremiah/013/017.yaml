review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: lamento profético en primera persona, llanto en secreto por el orgullo, y cautividad del rebaño de Yahvé. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) las notas al pie están ancladas en un lugar incorrecto, ya que [b] y [c] explican expresiones anteriores pero aparecen junto a «lágrimas»; y (2) la nota [e] es errónea, porque ofrece como alternativa «el rebaño de Yahvé», que es idéntico al texto principal, cuando debe reflejar la alternativa inglesa equivalente a «el rebaño del Señor». Además, «derramarán lágrimas» es aceptable, pero pierde algo de la imagen de ירד, mejor reflejada por «correrán» o «se desharán en lágrimas».'
  spanish_quality_summary: El español es claro, natural y digno. «Mi alma llorará en secreto a causa del orgullo» funciona muy bien. La secuencia «mis ojos llorarán amargamente y derramarán lágrimas» es comprensible, pero un ajuste a «correrán lágrimas» o «se desharán en lágrimas» suena más idiomático y conserva mejor la imagen de lágrimas que descienden. La puntuación y el registro son apropiados.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יהוה, «mi alma» para נַפְשִׁי, «orgullo» para גֵוָה, y «ha sido llevado cautivo» para נִשְׁבָּה. La única falla glosarial real está en la nota [e], que no preserva la alternativa documentada «del Señor».'
  issues:
  - severity: high
    issue: Las notas [b] y [c] están ancladas junto a «lágrimas», aunque explican «en secreto» y «orgullo».
    rationale: El proyecto exige que cada marcador aparezca en la palabra o frase relevante. Tal como está, el lector asociará mal las alternativas léxicas.
  - severity: high
    issue: La nota [e] repite el texto principal en vez de dar una alternativa real.
    rationale: La auditoría inglesa conserva la alternativa «the LORD's flock»; en español debe reflejarse como «el rebaño del Señor», no «el rebaño de Yahvé», que ya está en el texto.
  - severity: medium
    issue: «Derramarán lágrimas» atenúa la imagen verbal de «descender/correr» en וְתֵרַד עֵינִי דִּמְעָה.
    rationale: No es una infidelidad grave, pero «correrán lágrimas» refleja mejor el hebreo y su imaginería poética en español natural.
