review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: trabajo agrícola → aumento del montón de grano; agradar a personas eminentes → expiación/encubrimiento de la injusticia. Sin embargo, la formulación clave ''atonará'' no es español natural ni eclesialmente estándar para ἐξιλάσεται, y por ello no preserva adecuadamente el peso léxico del original para lectores hispanos.'
  spanish_quality_summary: El español es mayormente claro y fiel, pero 'atonará' suena incorrecto o impropio en español contemporáneo. 'Atonar' no funciona aquí como equivalente digno y legible; una forma natural y precisa es 'hará expiación por'. También conviene suavizar la puntuación quitando el punto y coma innecesario.
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. La decisión sobre ἐξιλάσεται debe ajustarse a una expresión española estable: ''hará expiación por'' o ''expiará''. ''Harán expiación'' preserva mejor la fuerza cultual documentada en el rastro inglés que el no idiomático ''atonará''.'
  issues:
  - severity: high
    issue: Uso de 'atonará por la injusticia'
    rationale: Aunque intenta seguir el inglés 'atone', 'atonar' no es una opción natural ni estándar en español bíblico general. Riesga incomprensión y debilita la fidelidad funcional al verbo griego ἐξιλάσεται.
  - severity: low
    issue: Puntuación con punto y coma
    rationale: La coordinación simple con 'y' funciona mejor en español fluido; el punto y coma no es necesario aquí.
  - severity: low
    issue: Nota al pie con 'cubrirá el mal'
    rationale: La alternativa inglesa es 'will cover over wrongdoing'; en español, 'cubrirá la injusticia' o 'encubrirá el mal' se alinea mejor con ἀδικίαν que 'el mal' a secas, aunque la nota actual sigue siendo aceptable.
  revised_spanish_text: El que trabaja la tierra levantará su montón de grano[a], y el que agrada a los grandes hará expiación por la injusticia.
  revised_footnotes:
  - marker: a
    text: O 'cubrirá la injusticia'. El griego dice 'hará expiación por la injusticia', lo cual quizá describa el efecto práctico de ganarse el favor de personas influyentes.
