translation:
  language: es
  text: 'Entonces Asa sacó plata y oro de las tesorerías de la casa de Yahvé y de la casa del rey, y los envió a Ben-adad, rey de Aram[a], que habitaba en Damasco, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «rey de Aram»; tradicionalmente, «rey de Siria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó afuera
  - extrajo
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir algo de un lugar de resguardo. En español, «sacó» reproduce con naturalidad la acción concreta de retirar bienes del depósito sin añadir matices interpretativos.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  - metal y oro
  lexicon: HALOT
  rationale: La pareja hebrea nombra metales valiosos de forma literal. «Plata y oro» conserva el paralelismo y evita generalizar a «dinero», que sería menos preciso.
- source_word: מֵאֹצְרוֹת
  english_pob_choice: from the treasuries
  chosen_spanish: de los tesoros
  alternatives_spanish:
  - de los almacenes
  - del tesoro
  lexicon: HALOT
  rationale: En español, «tesoros» comunica bien la idea de bienes acumulados y guardados, aunque no reproduce tan de cerca el plural constructo como «treasuries». Se prefirió por fluidez y por el contexto de riqueza templaria y real.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene «casa» por fidelidad al hebreo בית y por su paralelismo con «casa del rey». Se usa «Yahvé» según el estándar del proyecto para יְהוָה, no la sustitución eufemística «Señor».
- source_word: וּבֵית הַמֶּלֶךְ
  english_pob_choice: and of the king’s house
  chosen_spanish: y de la casa del rey
  alternatives_spanish:
  - y del palacio real
  - y de la casa real
  lexicon: HALOT
  rationale: «Casa del rey» conserva la repetición formal del hebreo frente a «casa de Yahvé» y evita introducir el término más explicativo «palacio», que no está explícito en el texto.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent them
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los remitió
  lexicon: HALOT
  rationale: El verbo es «enviar». En español se antepone el objeto implícito «los» para hacer explícito que Asa envía la plata y el oro mencionados antes, como hace la traducción inglesa.
- source_word: אֶל בֶּן הֲדַד
  english_pob_choice: to Ben-hadad
  chosen_spanish: a Ben-adad
  alternatives_spanish:
  - a Ben-hadad
  - a Ben Adad
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración accesible al español. «Ben-adad» mantiene mejor la forma hebrea que «Ben-hadad», aunque ambas son posibles en español.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se prefiere «Aram» por ser el nombre del texto hebreo, en línea con la decisión auditada del POB inglés de evitar la equivalencia tradicional e interpretativa «Siria».
- source_word: הַיּוֹשֵׁב בְּדַרְמֶשֶׂק
  english_pob_choice: who lived in Damascus
  chosen_spanish: que habitaba en Damasco
  alternatives_spanish:
  - que vivía en Damasco
  - que residía en Damasco
  lexicon: HALOT
  rationale: El participio señala residencia continua. «Habitaba» preserva ese valor durativo y suena más literario que «vivía» sin dejar de ser claro en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con este mensaje:'
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el discurso directo. «Diciendo» mantiene la construcción abierta para el contenido de la cita siguiente, como en el hebreo y en el POB inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto usa «Yahvé» como forma principal en español. Se evita «el Señor» porque funciona como máscara litúrgica y borra la presencia explícita del nombre del pacto en el original.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado recibió aprobación sin cambios sustanciales; se mantuvieron sus decisiones centrales, especialmente el uso de «Aram» frente a «Siria» y la referencia directa al nombre divino. La principal adaptación fue ajustar la sintaxis natural del español sin perder la estructura narrativa del hebreo.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia concreta del hebreo: acción de sacar bienes, procedencia doble de los tesoros, envío a Ben-adad y marcador de discurso directo.'
  - «Casa de Yahvé» y «casa del rey» conservan el paralelismo formal del original.
  - «Aram» y «Ben-adad» siguen la primacía del hebreo sobre equivalentes tradicionales más interpretativos.
  - La nota al pie se ancla en «Yahvé» para señalar la alternativa histórica «Siria» sin alterar el texto principal.
