revisions:
- from: Y las escribirás sobre los postes de tu casa y sobre tus puertas[a][b].
  to: Y las escribirás sobre los postes de la puerta[a] de tu casa y en tus portones[b].
  rationale: Se ajusta מְזוּזוֹת a una expresión española más precisa ('postes de la puerta') y שְׁעָרֶיךָ a 'portones', que refleja mejor entradas o accesos que 'puertas'. También se cambia la segunda preposición a 'en' para acomodar con naturalidad la alternativa documentada 'at your gates' y evitar la imagen menos idiomática de escribir 'sobre' portones.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura imperatival/futura de וּכְתַבְתָּם y el objeto plural femenino implícito ('las'). 'De tu casa' refleja correctamente בֵּיתֶךָ. Sin embargo, מְזוּזוֹת se traduce mejor como 'postes de la puerta' o 'jambas' que el más ambiguo 'postes', y וּבִשְׁעָרֶיךָ no se preserva bien con 'tus puertas', porque שְׁעָרִים apunta más naturalmente a 'portones/puertas de entrada' o al área de acceso, no a puertas interiores. La nota inglesa distingue 'gates' y 'at your gates'; el español debe reflejar mejor esa diferencia.
  spanish_quality_summary: El español es fluido y legible, pero 'postes de tu casa' suena algo incompleto/extraño sin especificar que son los de la puerta. 'Sobre tus puertas' también resulta menos natural en este contexto y puede sugerir hojas de puerta más que entradas o portones. Una leve revisión mejora precisión y naturalidad eclesial.
  glossary_alignment: No hay términos teológicos mayores del glosario implicados. La revisión propuesta respeta la política de evitar transliteraciones innecesarias ('mezuzot') y mantiene un español moderno y digno.
  issues:
  - severity: medium
    issue: '''postes'' es demasiado indeterminado para מְזוּזוֹת'
    rationale: El hebreo denota los postes laterales del acceso. En español, 'postes' solo puede evocar soportes genéricos; 'postes de la puerta' aclara el referente sin tecnicismo excesivo.
  - severity: medium
    issue: '''tus puertas'' debilita el sentido de שְׁעָרֶיךָ'
    rationale: La palabra hebrea se refiere a portones/entradas o al área de acceso. 'Puertas' en español tiende a sugerir puertas domésticas comunes y no distingue bien este término de 'doorposts'.
  - severity: low
    issue: La nota a no coincide del todo con el texto principal
    rationale: Si el texto principal usa simplemente 'postes', la alternativa 'postes de la puerta' en nota parece en realidad una mejora necesaria más que una mera alternativa.
  revised_spanish_text: Y las escribirás sobre los postes de la puerta[a] de tu casa y en tus portones[b].
  revised_footnotes:
  - marker: a
    text: O 'jambas'. El término hebreo se refiere a los postes laterales de la entrada.
    reason: lexical_alternative
  - marker: b
    text: O 'a tus portones'. El hebreo puede referirse tanto a los portones mismos como al área de la entrada.
    reason: lexical_alternative
  revision_rationale: Se ajusta מְזוּזוֹת a una expresión española más precisa ('postes de la puerta') y שְׁעָרֶיךָ a 'portones', que refleja mejor entradas o accesos que 'puertas'. También se cambia la segunda preposición a 'en' para acomodar con naturalidad la alternativa documentada 'at your gates' y evitar la imagen menos idiomática de escribir 'sobre' portones.
