translation:
  language: es
  text: Han tratado con infidelidad a Yahvé, porque han tenido hijos extranjeros[a]. Ahora la luna nueva[b] los devorará con sus porciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Hijos extranjeros’ puede referirse a hijos procedentes de uniones covenantalmente ilícitas o, más ampliamente, a una generación alejada de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O ‘un mes los devorará a ellos y a sus porciones’. El hebreo חֹדֶשׁ puede significar ‘luna nueva’ o ‘mes’.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיהוָה
  english_pob_choice: with the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - contra Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: La preposición hebrea con בגד expresa la parte contra la cual se comete la traición; por eso en español resulta más natural y fiel ‘a Yahvé’ o ‘contra Yahvé’ que ‘con Yahvé’. Se mantiene Yahvé por la norma del proyecto para el nombre divino.
- source_word: בָּגָדוּ
  english_pob_choice: have dealt faithlessly
  chosen_spanish: han tratado con infidelidad
  alternatives_spanish:
  - han actuado traidoramente
  - han sido infieles
  lexicon: HALOT
  rationale: בגד comunica deslealtad de pacto y traición relacional. ‘Han tratado con infidelidad’ conserva ese sentido sin sonar demasiado arcaico; ‘han sido infieles’ es posible, pero menos activo y menos marcado.
- source_word: בָנִים זָרִים
  english_pob_choice: foreign children
  chosen_spanish: hijos extraños
  alternatives_spanish:
  - hijos extranjeros
  - hijos ajenos
  - hijos ilícitos
  lexicon: HALOT
  rationale: זָרִים puede significar ‘extraños/foráneos’ y el contexto deja una ambigüedad entre descendencia vinculada a uniones ilícitas y una generación alienada de Yahvé. ‘Hijos extraños’ conserva mejor esa tensión que ‘hijos ilícitos’, que interpretaría demasiado.
- source_word: יָלָדוּ
  english_pob_choice: have borne
  chosen_spanish: han dado a luz
  alternatives_spanish:
  - han engendrado
  - han tenido
  lexicon: HALOT
  rationale: El verbo admite una referencia parental general, pero en español, con ‘hijos’, ‘han dado a luz’ suena natural y mantiene la imagen de nacimiento. No se especifica más de lo que el hebreo exige.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Entonces
  - En este momento
  lexicon: HALOT
  rationale: Marca inmediatez profética y efecto consecuente. ‘Ahora’ reproduce bien esa urgencia en español contemporáneo.
- source_word: יֹאכְלֵם
  english_pob_choice: will devour them
  chosen_spanish: los devorará
  alternatives_spanish:
  - los consumirá
  - los comerá
  lexicon: HALOT
  rationale: Aunque literalmente es ‘comer’, en lenguaje de juicio ‘devorar’ comunica mejor la destrucción intensa sin perder la imagen original.
- source_word: חֹדֶשׁ
  english_pob_choice: the new moon
  chosen_spanish: la luna nueva
  alternatives_spanish:
  - el mes
  - el novilunio
  lexicon: HALOT
  rationale: חֹדֶשׁ puede significar ‘mes’ o ‘luna nueva’. Aquí se conserva la resonancia cultual y calendárica con ‘luna nueva’, que en español es clara y natural; la alternativa temporal sigue siendo viable.
- source_word: חֶלְקֵיהֶם
  english_pob_choice: their portions
  chosen_spanish: sus porciones
  alternatives_spanish:
  - sus parcelas
  - sus heredades
  - sus lotes
  lexicon: HALOT
  rationale: חלק puede referirse a porción, parte o posesión asignada. ‘Porciones’ mantiene amplitud semántica y evita restringir prematuramente a tierra o herencia.
theological_decisions:
- issue: Sentido de ‘hijos extraños’
  english_pob_reading: Children marked by covenantal estrangement, likely through idolatrous or illicit unions, without specifying ethnicity alone.
  chosen_spanish_reading: Hijos marcados por extrañamiento del pacto, quizá por uniones ilícitas o por una descendencia apartada de Yahvé, sin reducirlo a etnicidad.
  alternative_spanish_readings:
  - Hijos nacidos de matrimonios con extranjeros
  - Una generación espiritualmente ajena a Yahvé
  rationale: 'La frase profética debe conservar su tensión: puede incluir dimensión familiar/corporal y también espiritual/covenantal. La traducción evita resolverla de modo definitivo y no la reduce a una sola explicación.'
  doctrine_reference: Preservar la tensión teológica y no cerrarla interpretativamente.
- issue: Sentido de חֹדֶשׁ en la cláusula de juicio
  english_pob_reading: '''the new moon'' as a likely reference to the festal/new-moon cycle becoming an occasion of judgment'
  chosen_spanish_reading: ‘la luna nueva’ como referencia probable al ciclo festivo/calendárico que se vuelve ocasión de juicio
  alternative_spanish_readings:
  - ‘el mes’ en el sentido de un plazo breve hasta el juicio
  rationale: Ambos valores léxicos son posibles. La redacción principal conserva la resonancia cultual de la luna nueva, muy adecuada en Oseas; la lectura temporal se mantiene como alternativa legítima.
  doctrine_reference: Preservar la tensión exegética y no resolverla sin necesidad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y la revisión más reciente, manteniendo la cláusula final con la relación directa ‘con sus porciones’/‘with their portions’. Se preserva además la ambigüedad de חֹדֶשׁ y de ‘hijos extraños’ sin imponer una interpretación única.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en lugar de ‘SEÑOR’ conforme al estándar del proyecto.
  - Se eligió ‘infidelidad’ para בגד por su fuerza de pacto y relación, más que un simple ‘engaño’.
  - Se mantiene ‘luna nueva’ para חֹדֶשׁ por su posible trasfondo cultual.
  - ‘Porciones’ conserva la amplitud de חלק sin limitarlo a tierra, herencia o parcelas.
  - La construcción ‘han dado a luz hijos extraños’ es idiomática en español y no fuerza el sujeto sexual más allá de lo que el hebreo permite en el contexto poético-profético.
