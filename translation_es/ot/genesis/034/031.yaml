review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: respuesta adversativa de los hermanos, pregunta retórica, comparación «como una prostituta» y objeto «nuestra hermana». También conserva la nota léxica sobre עשה. Sin embargo, «Debía tratar» suena menos natural en esta pregunta retórica puntual y puede leerse como obligación pasada más que como reproche inmediato.'
  spanish_quality_summary: La frase es clara y fiel, pero en español bíblico actual y general resulta más natural «¿Iba a tratar...?» o «¿Acaso iba a tratar...?». Además, «como a una prostituta» está bien anclado al uso de «tratar a alguien como a...». La puntuación y registro son adecuados.
  glossary_alignment: No hay términos del glosario mayor en juego aparte de una buena elección de «prostituta» frente a opciones arcaizantes como «ramera». No hay conflictos teológicos ni terminológicos del proyecto.
  issues:
  - severity: medium
    issue: «¿Debía tratar...?» suena poco idiomático en este contexto retórico.
    rationale: 'Aunque transmite parte del sentido modal, «debía» en español suele sugerir obligación o conveniencia pasada. El hebreo aquí expresa una protesta indignada: «¿Iba a tratar...?» reproduce mejor la fuerza contextual sin añadir paráfrasis.'
  - severity: low
    issue: La nota alternativa «hacer a nuestra hermana como a una prostituta» es poco natural en español.
    rationale: Si se conserva una alternativa más literal basada en «hacer», conviene formularla de modo comprensible, por ejemplo «¿Iba a hacer de nuestra hermana una prostituta?» o explicar que el hebreo dice literalmente «hacer».
  revised_spanish_text: 'Pero ellos dijeron[a]: «¿Iba a tratar a nuestra hermana como a una prostituta?»'
