    rationale: Aunque intenta conservar la imagen hebrea, la construcción es torpe. 'duros de frente' o 'de frente dura' son posibles, pero la primera es más idiomática y sigue siendo bastante literal.
  - severity: low
    issue: El paralelismo volitivo puede afinarse en la segunda cláusula.
    rationale: '''no querrá escucharte ... no quieren escucharme'' no es incorrecto, pero ''no querrá ... no querrán ...'' refleja mejor el paralelismo retórico y el matiz de disposición en ambas formas hebreas.'
  revised_spanish_text: Pero la casa de Israel no querrá escucharte, porque no querrán escucharme; pues toda la casa de Israel es dura de frente[a] y obstinada de corazón[b].
