base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/028/021.yaml
  text: For Ahaz plundered the house of Yahweh[a], and the house of the king and the princes, and gave it to the king of Assyria[c][b], but it did not help him.
  footnotes:
