translation:
  language: es
  text: Y él entregará sus reyes en tu mano, y harás perecer su nombre de debajo del cielo. Ningún hombre[a] se mantendrá delante de ti hasta que los hayas destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en sentido inclusivo, «Nadie se mantendrá delante de ti». El hebreo usa אִישׁ, «hombre», en sentido representativo singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: And he will give
  chosen_spanish: Y él pondrá
  alternatives_spanish:
  - Y él dará
  - Y él entregará
  lexicon: HALOT
  rationale: El contexto es promesa futura; en español, «poner en la mano» conserva la imagen hebrea de entrega en poder de otro y suena natural. Mantiene mejor la metáfora que un simple «dar».
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - los reyes de ellos
  lexicon: HALOT
  rationale: El sufijo de tercera plural se expresa de manera directa como posesivo plural en español. «Sus reyes» es claro y fiel al constructo.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu mano
  lexicon: HALOT
  rationale: La imagen hebrea de mano como esfera de poder se conserva con «en tu mano». En español, «poner en tu mano» comunica la entrega y evita una abstracción excesiva.
- source_word: וְהַאֲבַדְתָּ
  english_pob_choice: and you shall make ... perish
  chosen_spanish: y harás perecer
  alternatives_spanish:
  - y destruirás
  - y borrarás
  lexicon: HALOT
  rationale: El hiphil de אבד es causativo; con «nombre» como objeto, «harás perecer» conserva la fuerza causativa sin convertirlo en una mera aniquilación física.
- source_word: אֶת שְׁמָם
  english_pob_choice: their name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  - sus nombres
  lexicon: HALOT
  rationale: El singular hebreo «nombre» puede ser colectivo para memoria o renombre. En español, el singular mantiene la forma y la idea de borrar su memoria o reputación.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de debajo de los cielos
  - de la tierra
  lexicon: HALOT
  rationale: «Debajo del cielo» es la forma más natural en español para este modismo hebreo de eliminación total del ámbito humano, sin perder su color idiomático.
- source_word: לֹא יִתְיַצֵּב אִישׁ
  english_pob_choice: No man will stand
  chosen_spanish: Ningún hombre se mantendrá
  alternatives_spanish:
  - Nadie se mantendrá
  - Ninguna persona se mantendrá
  lexicon: HALOT
  rationale: Se conserva el singular representativo אִישׁ con «hombre», como en la decisión inglesa. «Se mantendrá» refleja el matiz de tomar posición o mantenerse firme.
- source_word: בְּפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: En contexto de conflicto, «delante de ti» expresa la posición hostil o de resistencia sin sobrecargar el texto con una paráfrasis interpretativa.
- source_word: עַד הִשְׁמִדְךָ אֹתָם
  english_pob_choice: until you have destroyed them
  chosen_spanish: hasta que los hayas destruido
  alternatives_spanish:
  - hasta que los destruyas
  - hasta haberlos destruido
  lexicon: HALOT
  rationale: La construcción marca un punto final; el pluscuamperfecto de subjuntivo en español comunica bien la anterioridad completada respecto al límite temporal.
theological_decisions:
- issue: Uso de lenguaje masculino genérico para אִישׁ
  english_pob_reading: No man will stand before you
  chosen_spanish_reading: Ningún hombre se mantendrá delante de ti
  alternative_spanish_readings:
  - Nadie se mantendrá delante de ti
  - Ninguna persona se mantendrá delante de ti
  rationale: Se mantiene el valor representativo masculino del hebreo, coherente con la decisión auditada en inglés. En español es posible entenderlo genéricamente sin neutralizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión auditada del inglés: entrega en poder («en tu mano»), borrado del nombre como fórmula de eliminación total, y el singular representativo de אִישׁ. No se detectaron revisiones aplicadas en el expediente inglés, y el pasaje permanece en alto acuerdo.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» implícito en el contexto sin añadirlo al versículo porque el hebreo aquí usa la referencia pronominal al agente divino ya establecida en el contexto inmediato.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la terminología del proyecto.
  - «Nombre» se mantuvo en singular por fidelidad al hebreo y para conservar el sentido colectivo de memoria/renombre.
  - La nota [a] se ancla en «hombre» porque el español, como el inglés auditado, preserva el masculino representativo del hebreo.
