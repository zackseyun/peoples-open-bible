review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Moisés comunica «estas palabras» a todo Israel, y el pueblo responde con duelo intenso. Sin embargo, «se enlutó» para וַיִּתְאַבְּלוּ suena menos natural que «hizo duelo» o «estuvo de duelo», y la nota al pie repite la misma frase del texto como si fuera alternativa tradicional, cuando en realidad la alternativa tradicional inglesa corresponde más bien a «los hijos de Israel» frente a «los israelitas».'
  spanish_quality_summary: El español es claro y digno, pero «el pueblo se enlutó mucho» resulta algo forzado en registro bíblico natural. «El pueblo hizo gran duelo» o «el pueblo estuvo muy de duelo» fluye mejor. Además, la nota debe distinguir adecuadamente entre la opción más idiomática «los israelitas» y la forma tradicional/conservadora «los hijos de Israel».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Hijos de Israel» preserva bien בְּנֵי יִשְׂרָאֵל en el texto principal. La corrección propuesta mantiene esa decisión y mejora la nota léxica. No intervienen términos como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «Se enlutó» es una opción poco idiomática aquí para וַיִּתְאַבְּלוּ.
    rationale: Aunque comprensible, en español bíblico general suena menos natural que expresiones como «hizo gran duelo» o «estuvo de duelo». El hebreo denota entrar en duelo/mourning; conviene una formulación más fluida y comunitaria.
  - severity: medium
    issue: La nota al pie presenta de forma inexacta la alternativa tradicional.
    rationale: 'El texto principal ya dice «hijos de Israel»; por tanto, no puede listarse esa misma formulación como alternativa. La nota debe ofrecer alternativas reales: «los israelitas» y, si se quiere reflejar el inglés, una formulación equivalente tradicional si difiere de la principal; en español, la principal ya coincide con la tradicional.'
  revised_spanish_text: Moisés habló estas palabras a todos los hijos de Israel[a], y el pueblo hizo gran duelo.
  revised_footnotes:
  - marker: a
    text: O «a todos los israelitas».
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad al hebreo y a la decisión léxica del POB para בְּנֵי יִשְׂרָאֵל, pero se sustituye «se enlutó mucho» por «hizo gran duelo», que representa mejor el sentido de mourning y suena más natural y digno en español bíblico. También se corrige la nota al pie para que solo incluya una alternativa real y no repita la lectura principal.
