translation:
  language: es
  text: Y vendrán sobre ti todas estas maldiciones, y te perseguirán y te alcanzarán[a], hasta que seas destruido, porque no escuchaste la voz de Yahvé tu Dios, para guardar sus mandamientos y sus estatutos que él te mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no obedeciste a Yahvé tu Dios guardando sus mandamientos y sus estatutos». El hebreo dice literalmente «no escuchaste la voz de»; la alternativa expresa el sentido de obediencia implícito en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán sobre ti
  - te sobrevendrán
  lexicon: HALOT
  rationale: El futuro expresa bien la amenaza pactal del contexto. 'Vendrán sobre ti' conserva el movimiento del hebreo y la relación hostil de las maldiciones con el destinatario.
- source_word: עָלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: '''Sobre ti'' reproduce el valor direccional de עַל sin forzar un matiz exclusivamente adversativo; en español suena natural y conserva la imagen de carga/asedio.'
- source_word: כָּל הַקְּלָלוֹת הָאֵלֶּה
  english_pob_choice: all these curses
  chosen_spanish: todas estas maldiciones
  alternatives_spanish:
  - todas estas maldiciones pactales
  - todas estas maldiciones-juicio
  lexicon: HALOT
  rationale: '''Maldiciones'' es el equivalente normal y fiel en esta sección de bendiciones y maldiciones. No se añade especificación interpretativa que el texto no exige.'
- source_word: וּרְדָפוּךָ
  english_pob_choice: pursue you
  chosen_spanish: te perseguirán
  alternatives_spanish:
  - te acosarán
  - te seguirán persiguiendo
  lexicon: HALOT
  rationale: '''Perseguirán'' mantiene el verbo de persecución con registro solemne. ''Acosar'' sería demasiado interpretativo; ''seguirán persiguiendo'' recarga innecesariamente la frase.'
- source_word: וְהִשִּׂיגוּךָ
  english_pob_choice: overtake you
  chosen_spanish: te alcanzarán
  alternatives_spanish:
  - te sobrepasarán
  - te darán alcance
  lexicon: HALOT
  rationale: '''Alcanzarán'' es la manera más natural de expresar el resultado de perseguir. Aunque ''overtake'' puede ser ''alcanzar'', el español mantiene bien la secuencia progresiva ''perseguirán y te alcanzarán''.'
- source_word: עַד הִשָּׁמְדָךְ
  english_pob_choice: until you are destroyed
  chosen_spanish: hasta que seas destruido
  alternatives_spanish:
  - hasta ser destruido
  - hasta que te aniquilen
  lexicon: HALOT
  rationale: La forma pasiva/resolutiva del hebreo se refleja bien con 'seas destruido'. 'Aniquilen' introduce un agente no explícito; 'hasta ser destruido' es posible pero menos fluido en este contexto.
- source_word: כִּי לֹא שָׁמַעְתָּ בְּקוֹל
  english_pob_choice: because you did not listen to the voice
  chosen_spanish: porque no obedeciste a la voz
  alternatives_spanish:
  - porque no escuchaste la voz
  - porque no prestaste atención a la voz
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'no escuchaste la voz', en español 'obedeciste a la voz' comunica con más precisión el valor covenantal de שׁמע בקול sin perder la referencia auditiva. La nota preserva la literalidad subyacente.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el Señor tu Dios
  - Yahvé, tu Dios
  lexicon: HALOT
  rationale: Se conserva 'Yahvé' según el criterio del proyecto para el Tetragrámaton. 'Tu Dios' refleja el genitivo relacional del hebreo; no se enmascara el nombre divino.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para obedecer
  - a fin de guardar
  lexicon: HALOT
  rationale: '''Para guardar'' expresa de modo natural el infinitivo final en español y mantiene la idea de cumplir/observar mandamientos. ''Obedecer'' ya quedó sugerido en la cláusula anterior y aquí el verbo de custodia/legalidad es más exacto.'
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: '''Mandamientos'' mantiene el registro pactal y legal del término. ''Preceptos'' sería posible, pero menos directo para la pareja habitual con ''estatutos''.'
- source_word: וְחֻקֹּתָיו
  english_pob_choice: and his statutes
  chosen_spanish: y sus estatutos
  alternatives_spanish:
  - y sus decretos
  - y sus ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es la contraparte tradicional y suficientemente clara de ''mandamientos'', distinguiendo היטב la terminología legislativa de Deuteronomio.'
- source_word: אֲשֶׁר צִוָּךְ
  english_pob_choice: that he commanded you
  chosen_spanish: que él te mandó
  alternatives_spanish:
  - que te ordenó
  - que te había mandado
  lexicon: HALOT
  rationale: '''Mandó'' reproduce bien el acto directo de imponer mandamientos y evita una perífrasis innecesaria. El sujeto explícito ''él'' aclara la referencia a Yahvé.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide renderizar YHWH como 'Yahvé'. Esto preserva el nombre del pacto en lugar de ocultarlo con una convención litúrgica, y mantiene la transparencia con el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'שׁמע בְּקוֹל: si traducir como ''escuchar la voz'' o ''obedecer'''
  english_pob_reading: did not listen to the voice ... to keep
  chosen_spanish_reading: no obedeciste a la voz ... para guardar
  alternative_spanish_readings:
  - no escuchaste la voz ... para guardar
  - no atendiste a la voz ... para guardar
  rationale: 'El hebreo conserva la metáfora auditiva, pero el contexto es claramente de obediencia pactal. ''No obedeciste a la voz'' integra ambos niveles en español: la imagen de oír/escuchar y el sentido de desobediencia. La cláusula final con ''para guardar'' muestra el contenido concreto de esa obediencia.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than overresolve'
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión más reciente del audit trail inglés, especialmente en la cláusula final con infinitivo de propósito ('para guardar'), y conserva el ajuste formal que privilegia la estructura hebrea sobre una paráfrasis libre. También se atiende la tensión documentada entre la metáfora literal de 'escuchar la voz' y el sentido contextual de obedecer, resolviéndola con una formulación española que no la elimina.
  spanish_consistency_notes:
  - Se mantiene la forma 'Yahvé' para el nombre divino, en coherencia con el criterio general del proyecto.
  - '''Mandamientos'' y ''estatutos'' preservan la terminología legal/covenantal del hebreo, sin sustituirla por vocabulario eclesiástico más genérico.'
  - La secuencia verbal 'vendrán... perseguirán... alcanzarán' reproduce el encadenamiento del hebreo con claridad natural en español.
  - La nota al pie recoge la alternativa literal para no perder la imagen de 'escuchar la voz'.
