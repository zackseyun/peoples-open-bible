translation:
  language: es
  text: Servirá entre grandes hombres, y se presentará delante de un gobernante; recorrerá la tierra de naciones extranjeras, porque ha probado lo bueno y lo malo entre los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha experimentado lo bueno y lo malo entre las personas». El verbo griego puede denotar probar por ensayo o aprender por experiencia, y ἀνθρώποις también puede traducirse de manera más inclusiva como «personas», según la filosofía de traducción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὰ μέσον
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre medio de
  lexicon: LSJ
  rationale: La expresión indica ubicación relacional dentro de un grupo. «Entre» es la forma natural en español y conserva la idea de estar en medio de ese entorno social.
- source_word: μεγιστάνων
  english_pob_choice: great men
  chosen_spanish: grandes hombres
  alternatives_spanish:
  - magnates
  - nobles
  - grandes personajes
  lexicon: LSJ
  rationale: El término apunta a personas de alto rango o eminencia. «Grandes hombres» mantiene el plural masculino y el matiz social elevado sin tecnicismo excesivo.
- source_word: ὑπηρετήσει
  english_pob_choice: will serve
  chosen_spanish: servirá
  alternatives_spanish:
  - ministrará
  - atenderá
  lexicon: BDAG
  rationale: El verbo expresa prestar servicio o asistencia. «Servirá» reproduce esa amplitud sin introducir connotaciones eclesiales que no están en el contexto.
- source_word: ἔναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: LSJ
  rationale: La preposición señala presencia frente a alguien de rango. «Delante de» es claro y natural en español contemporáneo.
- source_word: ἡγουμένου
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un líder
  - un gobernante civil
  - uno que gobierna
  lexicon: BDAG
  rationale: El participio denota a quien dirige o gobierna. «Gobernante» comunica bien la autoridad implicada en el contexto cortesano.
- source_word: ὀφθήσεται
  english_pob_choice: will appear
  chosen_spanish: se presentará
  alternatives_spanish:
  - aparecerá
  - será visto
  lexicon: BDAG
  rationale: Aunque literalmente es «ser visto», aquí funciona como lograr audiencia o presentarse ante una autoridad. «Se presentará» comunica mejor ese sentido idiomático en español.
- source_word: ἐν γῇ ἀλλοτρίων ἐθνῶν
  english_pob_choice: through the land of foreign nations
  chosen_spanish: la tierra de naciones extranjeras
  alternatives_spanish:
  - la tierra de pueblos extranjeros
  - la tierra de naciones ajenas
  lexicon: LSJ
  rationale: La frase subraya el ámbito geográfico de extranjería. «La tierra de naciones extranjeras» conserva el plural de ἐθνῶν y el matiz de ajenidad de ἀλλοτρίων.
- source_word: διελεύσεται
  english_pob_choice: will travel through
  chosen_spanish: recorrerá
  alternatives_spanish:
  - pasará por
  - viajará por
  lexicon: BDAG
  rationale: El verbo significa atravesar o pasar por un lugar. «Recorrerá» es idiomático en español y mantiene la idea de tránsito por esas tierras.
- source_word: ἀγαθὰ καὶ κακὰ
  english_pob_choice: good and evil
  chosen_spanish: lo bueno y lo malo
  alternatives_spanish:
  - el bien y el mal
  - cosas buenas y malas
  lexicon: LSJ
  rationale: Aquí la pareja puede entenderse como realidad moral y también experiencial. «Lo bueno y lo malo» conserva el contraste sin forzar una formulación más abstracta.
- source_word: ἐπείρασεν
  english_pob_choice: has tested
  chosen_spanish: ha probado
  alternatives_spanish:
  - ha experimentado
  - ha puesto a prueba
  - ha aprendido por experiencia
  lexicon: BDAG
  rationale: El verbo puede significar probar, tentar o experimentar. «Ha probado» deja abierta la fuerza de haber pasado por la prueba y por la experiencia.
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre las personas
  - entre la gente
  lexicon: BDAG
  rationale: La forma masculina plural conserva la textura del griego y la decisión del POB inglés de mantener el valor masculino/genericamente representativo en el texto principal.
theological_decisions:
- issue: Lenguaje de género en μεγιστάνων y ἀνθρώποις
  english_pob_reading: Render with 'men' rather than gender-neutral 'people' in the main text
  chosen_spanish_reading: Mantener «hombres» en el texto principal
  alternative_spanish_readings:
  - personas
  - gente
  - humanidad
  rationale: El griego usa formas masculinas con fuerza representativa. En este pasaje, conservar «hombres» respeta la textura del original y la decisión auditada del POB inglés de no neutralizar el lenguaje sin necesidad contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés sin depender mecánicamente de él: conserva la ambigüedad lexical de ἐπείρασεν («ha probado» / «ha experimentado») y mantiene el lenguaje masculino representativo donde el griego lo hace. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no aplica la convención del nombre divino.
  - 'Se mantiene el paralelismo de la escena cortesana: servicio entre grandes hombres y comparecencia ante un gobernante.'
  - «Recorrerá» evita una traducción demasiado literal de διελεύσεται y suena natural en español.
  - La nota [a] preserva la alternativa inclusiva que el audit trail inglés dejó abierta para ἐπείρασεν / ἀνθρώποις.
