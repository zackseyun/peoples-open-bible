theological_decisions:
- issue: Rendering Ἑβραίους
  chosen_reading: Hebrews
  alternative_readings:
  - Jews
  rationale: The Greek explicitly uses Ἑβραίους. To maintain source-language primacy and transparency, the translation keeps 'Hebrews' rather than substituting the more familiar 'Jews.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Divine aid in battle
  chosen_reading: because the mighty God was fighting alongside them
  alternative_readings:
  - since God was their ally
  - with the powerful God helping them
  rationale: The text presents God's active military support as the reason for their unconquerable status. The rendering preserves that theological claim without softening it into generic assistance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
