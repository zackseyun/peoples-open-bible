translation:
  language: es
  text: Yo estaba de pie entre Yahvé y ustedes en aquel tiempo[a], para declararles la palabra de Yahvé, porque tenían miedo a causa del fuego y no subieron al monte, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde el rostro/presencia del fuego», un giro idiomático que significa «a causa del fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֠נֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente 1cs funciona aquí con énfasis, pero en español el sujeto explícito ya cumple naturalmente esa función sin recargar el estilo. 'Yo mismo' sería posible, pero resulta más enfático de lo que el contexto exige.
- source_word: עֹמֵ֨ד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba en pie
  - estuve de pie
  lexicon: HALOT
  rationale: El participio hebreo en contexto narrativo expresa una acción en curso en el pasado. 'Estaba de pie' conserva ese matiz progresivo mejor que un simple pretérito puntual como 'estuve de pie'.
- source_word: בֵּין יְהוָ֤ה וּבֵֽינֵיכֶם
  english_pob_choice: between Yahweh and you
  chosen_spanish: entre Yahvé y ustedes
  alternatives_spanish:
  - entre Yahvé y vosotros
  - entre Yahvé y el pueblo
  lexicon: HALOT
  rationale: La preposición dual marca mediación entre dos partes. Se conserva 'Yahvé' según el criterio del proyecto para el nombre divino, y 'ustedes' mantiene un español amplio para lectores latinoamericanos.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese momento
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal es idiomática; 'en aquel tiempo' suena natural y solemne en español bíblico sin volver al calco rígido.
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: para declararles
  alternatives_spanish:
  - para decirles
  - para comunicarles
  lexicon: HALOT
  rationale: El infinitivo hifil introduce la mediación de la palabra divina. 'Declararles' preserva mejor la solemnidad y el peso público de la comunicación que 'decirles'.
- source_word: אֶת דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: '''דבר'' en este contexto es el discurso divino comunicado; ''palabra'' conserva la fórmula profética y covenantal. Se mantiene ''Yahvé'' por coherencia con el nombre divino del proyecto.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón causal por la que Moisés actuó como mediador. 'Porque' expresa la relación causal de manera directa y clara.
- source_word: יְרֵאתֶם
  english_pob_choice: you were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - temían
  - se aterraron
  lexicon: HALOT
  rationale: El verbo expresa temor ante la teofanía. 'Tenían miedo' es idiomático y comunica la reacción humana sin sonar demasiado literario o arcaizante.
- source_word: מִפְּנֵי הָאֵשׁ
  english_pob_choice: because of the fire
  chosen_spanish: a causa del fuego
  alternatives_spanish:
  - por el fuego
  - ante el fuego
  lexicon: HALOT
  rationale: La expresión hebrea literal 'desde el rostro/presencia de' funciona idiomáticamente como causal. 'A causa del fuego' preserva esa fuerza causal sin forzar una imagen extraña en español.
- source_word: וְלֹא עֲלִיתֶם בָּהָר
  english_pob_choice: and did not go up the mountain
  chosen_spanish: y no subieron al monte
  alternatives_spanish:
  - y no subieron a la montaña
  - y no ascendieron al monte
  lexicon: HALOT
  rationale: עלה con בהר expresa ascenso al monte Sinaí/Horeb. 'Subieron al monte' reproduce bien el movimiento ascendente y mantiene el registro bíblico natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - así diciendo,
  lexicon: HALOT
  rationale: Funciona como marcador discursivo que enlaza con la cita del versículo siguiente. 'Diciendo,' conserva el enlace sintáctico y el tono de continuidad del hebreo.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Se sigue la convención del proyecto para preservar el nombre del pacto en forma española estable ('Yahvé'), en vez de enmascararlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la puntuación antes de 'saying' a una coma. En español se refleja naturalmente con la coma final de 'diciendo,' para mantener la continuidad discursiva con el versículo siguiente.
  spanish_consistency_notes:
  - 'Se mantuvo la misma decisión terminológica para el nombre divino: Yahvé.'
  - Se conservó la progresión verbal del participio hebreo con una forma imperfectiva española ('estaba de pie').
  - Se eligió un español neutro latinoamericano ('ustedes') para legibilidad amplia sin perder dignidad textual.
  - Se preservó la tensión idiomática de מִפְּנֵי הָאֵשׁ mediante nota, no en el cuerpo principal.
