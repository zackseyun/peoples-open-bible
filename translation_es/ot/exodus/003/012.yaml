translation:
  language: es
  text: 'Y él dijo[a]: «Ciertamente yo estaré contigo, y esta será la señal para ti de que yo te he enviado: cuando saques al pueblo de Egipto, ustedes servirán a Dios[b] en este monte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y dijo». El hebreo introduce la respuesta de Yahvé con una fórmula narrativa simple.
    reason: source_note
  - marker: b
    text: O «adorarán a Dios». El verbo hebreo puede significar tanto «servir» como, en relación con Dios, «adorar».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Certainly
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Porque
  - En verdad
  lexicon: HALOT
  rationale: Aquí כִּי introduce una respuesta de ánimo y garantía; «Ciertamente» comunica mejor ese valor asseverativo en español que un simple «porque».
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: estaré
  alternatives_spanish:
  - seré
  - estoy
  lexicon: HALOT
  rationale: El imperfecto expresa una promesa futura de presencia acompañante; «estaré» suena natural en español y conserva ese matiz prospectivo.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - a tu lado
  lexicon: HALOT
  rationale: La preposición con sufijo se expresa de forma natural con «contigo» en la segunda persona singular.
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - la prueba
  - el signo
  lexicon: HALOT
  rationale: «Señal» es el equivalente más transparente y bíblicamente natural para אוֹת en este contexto de confirmación.
- source_word: כִּי אָנֹכִי שְׁלַחְתִּיךָ
  english_pob_choice: that I have sent you
  chosen_spanish: de que yo te he enviado
  alternatives_spanish:
  - de que yo te envié
  - de que fui yo quien te envió
  lexicon: HALOT
  rationale: La cláusula explica el contenido de la señal; el perfecto compuesto español comunica bien la vigencia del envío completado sin perder el peso del acto divino.
- source_word: בְּהוֹצִיאֲךָ
  english_pob_choice: when you bring out
  chosen_spanish: cuando saques
  alternatives_spanish:
  - al sacar
  - cuando tú saques
  lexicon: HALOT
  rationale: El infinitivo con ב tiene valor temporal; en español, «cuando saques» expresa con claridad la acción futura de conducir al pueblo fuera de Egipto.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: El artículo definido señala al pueblo de Israel ya en vista en el relato; «al pueblo» mantiene la referencia sin añadir información no explícita.
- source_word: תַּעַבְדוּן
  english_pob_choice: you will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - adorarán
  - serviréis
  lexicon: HALOT
  rationale: Se conserva «servir» para mantener la amplitud léxica de עבד en relación con Dios; en español, el sujeto implícito se adapta naturalmente al plural del pueblo.
- source_word: אֶת־הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios verdadero
  - al Dios
  lexicon: HALOT
  rationale: El objeto definido refiere al Dios de Israel; «a Dios» es claro y no introduce una glosa interpretativa.
- source_word: עַל הָהָר הַזֶּה
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: HALOT
  rationale: Aunque עַל puede ser «sobre/en», en español «en este monte» resulta más natural y mantiene la localización concreta del encuentro y del servicio.
theological_decisions:
- issue: Naturaleza de la señal prometida
  english_pob_reading: The sign is the future worship/serving of God at this mountain after the exodus.
  chosen_spanish_reading: La señal se identifica con el futuro servicio a Dios en este monte después del éxodo.
  alternative_spanish_readings:
  - La señal es ante todo la promesa presente de la presencia divina con Moisés.
  - La señal abarca tanto la seguridad inmediata como su cumplimiento futuro.
  rationale: La sintaxis del hebreo apunta al evento que sigue como contenido de la señal; la traducción española conserva esa tensión sin convertir la señal en algo meramente inmediato.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el audit trail inglés POB. No se hicieron revisiones recientes sobre este versículo; se mantuvo la lectura que entiende la señal como el cumplimiento futuro en el servicio a Dios en el monte, preservando la ambigüedad funcional de עבד con una nota alternativa en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» en la traducción principal del nombre divino cuando aparece explícito; aquí el texto hebreo usa el habla directa de Dios sin el tetragrama, por lo que se mantuvo la referencia simple a «Dios» en la frase final.
  - Se prefirió «monte» en vez de «montaña» para corresponder al registro bíblico y a la resonancia narrativa del éxodo.
  - Se mantuvo «servir» como traducción principal de עבד para conservar la amplitud semántica entre servicio cultual y adoración.
