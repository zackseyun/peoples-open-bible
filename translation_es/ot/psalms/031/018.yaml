translation:
  language: es
  text: Yahvé, no permitas que sea avergonzado, porque te invoco; que sean avergonzados los impíos; que callen en el Seol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Seol» conserva el término hebreo para el ámbito de los muertos. También puede entenderse «que estén en silencio en el Seol» o «que estén quietos en el Seol»; el verbo hebreo admite la idea de silencio o quietud en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo como forma principal en español, siguiendo la política del proyecto de no ocultar el Tetragrámaton con una sustitución reverencial. «Yahvé» mantiene el valor vocativo del hebreo y es idiomático en español bíblico contemporáneo.
- source_word: אַל אֵבוֹשָׁה
  english_pob_choice: let me not be put to shame
  chosen_spanish: no permitas que yo sea avergonzado
  alternatives_spanish:
  - no me dejes ser avergonzado
  - que yo no sea avergonzado
  - no permitas que yo quede avergonzado
  lexicon: HALOT
  rationale: El אַל con forma cohortativa expresa una súplica negativa; en español se transmite de forma natural con «no permitas que». «Ser avergonzado» conserva el matiz resultativo/pasivo de בושׁ, sin reducirlo a un simple sentimiento interno de vergüenza.
- source_word: כִּי קְרָאתִיךָ
  english_pob_choice: for I call on you
  chosen_spanish: porque te he invocado
  alternatives_spanish:
  - porque te invoco
  - porque te llamo
  - porque he clamado a ti
  lexicon: HALOT
  rationale: El hebreo usa un perfecto que, en la poesía de súplica, funciona como base de la petición. «Te he invocado» conserva el valor de apelación a Dios mejor que un mero «te llamo», y explica con naturalidad la base de la súplica en español.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  - los perversos
  lexicon: HALOT
  rationale: «Impíos» es una equivalencia bíblica sólida para רשעים y mantiene el peso moral/judicial del término. «Los malvados» también sería posible, pero «impíos» resulta más cercano al registro poético del salmo.
- source_word: יֵבֹשׁוּ
  english_pob_choice: let ... be put to shame
  chosen_spanish: que sean avergonzados
  alternatives_spanish:
  - que queden avergonzados
  - que sean puestos en vergüenza
  - que se avergüencen
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «sea avergonzado» y la misma familia léxica de בושׁ. «Sean avergonzados» reproduce bien la fuerza desiderativa/jussiva sin sobrecargar el verso.
- source_word: יִדְּמ֥וּ
  english_pob_choice: let them be silent / let them be still
  chosen_spanish: que callen
  alternatives_spanish:
  - que guarden silencio
  - que estén quietos
  - que queden en silencio
  lexicon: HALOT
  rationale: El verbo admite la idea de silencio o quietud; «que callen» es breve, poético y fiel a la línea revisada del audit trail («silent»), sin imponer por ahora la variante más interpretativa de «quietos».
- source_word: לִשְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en el Seol
  alternatives_spanish:
  - en Sheol
  - en el reino de los muertos
  - en el sepulcro
  lexicon: HALOT
  rationale: Se translitera el término para preservar su carga conceptual propia y evitar reducirlo a «sepulcro» o reinterpretarlo como «infierno». En español, «Seol» es una forma reconocible y transparente para lectores bíblicos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto en vez de una sustitución tradicional. «Yahvé» sigue la decisión doctrinal del proyecto y es coherente con el texto hebreo directo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: שְׁאוֹל como esfera de los muertos
  english_pob_reading: Sheol
  chosen_spanish_reading: el Seol
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el reino de los muertos
  rationale: «Seol» mantiene la tensión teológica del hebreo y evita importar de antemano una doctrina posterior de condenación final. La frase «en el Seol» sigue el valor locativo del verso y conserva la referencia al ámbito de los muertos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «let them be silenced in Sheol» a «let them be silent in Sheol» para reflejar mejor el valor de quietud/silencio del verbo. La redacción española sigue esa revisión con «que callen en el Seol», manteniendo el paralelismo con la cláusula anterior y la opción de transliterar Seol. Se evitó traducir el nombre divino como «SEÑOR» porque el proyecto ya documenta Yahvé como forma principal.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal entre «sea avergonzado / sean avergonzados».
  - «Yahvé» se usa como vocativo directo, sin artículo.
  - «Seol» se translitera de forma consistente con el tratamiento doctrinal del término.
  - La sintaxis conserva el modo volitivo del hebreo mediante «no permitas que» y «que + subjuntivo».
