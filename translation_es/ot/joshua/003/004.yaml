translation:
  language: es
  text: Sin embargo, habrá una distancia entre ustedes y el arca, como de dos mil codos[a] según la medida. No se acerquen a ella, para que sepan el camino por el cual irán, porque no han pasado por este camino antes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dos mil codos» conserva la unidad de medida antigua del hebreo; un codo era una medida estándar antigua de longitud, aproximadamente la longitud de un antebrazo.
    reason: cultural_note
  - marker: b
    text: Literalmente, «desde ayer y anteayer», un modismo que significa «antes» o «anteriormente».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: El hebreo introduce una restricción o contraste respecto de la instrucción previa. «Sin embargo» conserva bien ese matiz adversativo en un español natural y digno.
- source_word: רָחוֹק יִהְיֶה
  english_pob_choice: there shall be a distance
  chosen_spanish: habrá una distancia
  alternatives_spanish:
  - estará lejos
  - debe mantenerse lejos
  lexicon: HALOT
  rationale: La construcción hebrea expresa la existencia de separación. «Habrá una distancia» mantiene esa estructura sin convertirla en mandato directo.
- source_word: בֵּינֵיכֶם וּבֵינוֹ
  english_pob_choice: between you and it
  chosen_spanish: entre ustedes y ella
  alternatives_spanish:
  - entre ustedes y él
  - entre ustedes y eso
  lexicon: HALOT
  rationale: El referente es el arca, implícita por contexto; en español, por concordancia con «arca», «ella» es la referencia más natural. Se conserva la distancia referencial del pronombre, sin despersonalizar el objeto en exceso.
- source_word: כְּאַלְפַּיִם אַמָּה
  english_pob_choice: about two thousand cubits
  chosen_spanish: como de dos mil codos
  alternatives_spanish:
  - aproximadamente dos mil codos
  - unos dos mil codos
  lexicon: HALOT
  rationale: Se retiene la unidad antigua «codos» para preservar la especificidad del texto fuente. «Como de» refleja bien el valor aproximativo del prefijo comparativo כְּ.
- source_word: בַּמִּדָּה
  english_pob_choice: by measure
  chosen_spanish: por medida
  alternatives_spanish:
  - medidos
  - según la medida
  lexicon: HALOT
  rationale: «Por medida» reproduce de forma breve y clara la referencia al cálculo/medición del tramo, sin sobrerreformular.
- source_word: אַל תִּקְרְב֣וּ אֵלָ֗י/ו
  english_pob_choice: Do not come near it
  chosen_spanish: No se acerquen a ella
  alternatives_spanish:
  - No vayan cerca de ella
  - No se aproximen a ella
  lexicon: HALOT
  rationale: El imperativo negativo se expresa de modo natural en español. «Acercarse» comunica la proximidad espacial exigida por el contexto, y mantiene el tono directo.
- source_word: לְמַ֤עַן אֲשֶׁר תֵּֽדְעוּ
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - a fin de que sepan
  - de modo que sepan
  lexicon: HALOT
  rationale: Se conserva la finalidad. «Saber» traduce היטב ידע en este contexto de guía práctica; «para que» es la forma española más sobria y directa.
- source_word: אֶת הַדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  english_pob_choice: the way by which you shall go
  chosen_spanish: el camino por el cual han de ir
  alternatives_spanish:
  - el camino por el que irán
  - el camino que han de seguir
  lexicon: HALOT
  rationale: «Camino» es una equivalencia natural de דֶּרֶךְ aquí. «Por el cual» preserva la relación direccional, y «han de ir» mantiene el registro formal sin añadir necesidad modal fuerte.
- source_word: כִּי לֹא עֲבַרְתֶּם בַּדֶּרֶךְ מִתְּמוֹל שִׁלְשׁוֹם
  english_pob_choice: for you have not passed this way before
  chosen_spanish: porque no han pasado por este camino antes
  alternatives_spanish:
  - porque no habían pasado por este camino hasta ahora
  - porque no han recorrido este camino anteriormente
  lexicon: HALOT
  rationale: «Pasar por este camino» reproduce bien el verbo de tránsito del hebreo. «Antes» comunica la idea idiomática de «desde ayer y anteayer» sin sobrecargar el texto principal con una perífrasis literal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que cambió «must go» por «shall go» para evitar añadir modalidad no explícita. Por eso la versión española usa «han de ir», una formulación formal y no obligatoria, coherente con el hebreo y con la decisión revisada en inglés. También se conservó la idiomaticidad de מִתְּמוֹל שִׁלְשׁוֹם mediante «antes» en el cuerpo y se explicó la unidad de medida en nota.
  spanish_consistency_notes:
  - Se mantiene «camino» para דֶּרֶךְ en toda la cláusula final.
  - Se conserva el tratamiento plural de cortesía/lectura eclesial con «ustedes» y la concordancia verbal en plural.
  - Se evitó «Señor» u այլ masking convention, pues este versículo no contiene el Tetragrámaton ni una sustitución de κύριος.
  - La referencia espacial se mantiene concreta y no se amplía a interpretaciones simbólicas no presentes en el hebreo.
