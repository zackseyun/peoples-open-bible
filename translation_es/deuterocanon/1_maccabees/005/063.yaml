translation:
  language: es
  text: Judas y sus hermanos eran muy honrados[a] ante todo Israel y todas las naciones, dondequiera que se oía su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente “el hombre Judas” (ὁ ἀνήρ Ἰούδας), una apposición que en español puede suavizarse sin perder el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀνὴρ Ἰούδας
  english_pob_choice: the man Judas
  chosen_spanish: Y Judas
  alternatives_spanish:
  - Y el hombre Judas
  - Y Judas el hombre
  lexicon: LSJ
  rationale: El griego incluye ὁ ἀνήρ como apposición, pero en español su reproducción literal ('el hombre Judas') suena forzada y no añade claridad. Sigo el ajuste de la revisión inglesa, que suaviza la apposición sin perder la referencia a Judas.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: LSJ
  rationale: '''Hermanos'' es la correspondencia natural y directa del plural masculino griego. Mantiene el sentido familiar sin introducir una precisión innecesaria.'
- source_word: ἐδοξάζοντο
  english_pob_choice: were greatly honored
  chosen_spanish: eran muy honrados
  alternatives_spanish:
  - eran grandemente honrados
  - eran muy glorificados
  lexicon: LSJ
  rationale: El verbo pasivo imperfectivo expresa que recibían honor/reconocimiento. En español, 'eran muy honrados' conserva la idea de estima pública sin el peso poco natural de 'glorificados' en este contexto histórico.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: LSJ
  rationale: Es un intensificador simple. 'Muy' resulta natural en español con 'honrados' y conserva la fuerza del adverbio griego.
- source_word: ἐναντίον παντὸς Ἰσραὴλ
  english_pob_choice: before all Israel
  chosen_spanish: delante de todo Israel
  alternatives_spanish:
  - ante todo Israel
  - en presencia de todo Israel
  lexicon: LSJ
  rationale: '''ἐναντίον'' aquí indica la esfera de evaluación o reconocimiento. ''Delante de'' reproduce bien esa relación en español y es idiomático.'
- source_word: καὶ τῶν ἐθνῶν πάντων
  english_pob_choice: and all the nations
  chosen_spanish: y de todas las naciones
  alternatives_spanish:
  - y de todos los pueblos
  - y de todas las gentes
  lexicon: LSJ
  rationale: '''ἔθνη'' en este contexto histórico apunta a las naciones/pueblos circundantes. ''Naciones'' conserva el alcance político y etnográfico sin cargar el término con el uso teológico posterior de ''gentiles''.'
- source_word: οὗ ἠκούετο τὸ ὄνομα αὐτῶν
  english_pob_choice: wherever their name was heard
  chosen_spanish: dondequiera que se oía su nombre
  alternatives_spanish:
  - donde se oía su nombre
  - adondequiera que llegaba su nombre
  lexicon: LSJ
  rationale: La cláusula relativa expresa un ámbito general de difusión. 'Dondequiera que se oía su nombre' mantiene la idea de fama o reputación sin explicitarla de modo interpretativo.
theological_decisions:
- issue: Gloria/honor aplicado a personajes humanos
  english_pob_reading: were greatly honored
  chosen_spanish_reading: eran muy honrados
  alternative_spanish_readings:
  - eran grandemente glorificados
  - eran altamente estimados
  rationale: No hay aquí una referencia a la gloria divina, sino a reconocimiento público. 'Honrados' evita sugerir una gloria teológica que el contexto no exige, pero conserva la elevación social que el griego comunica.
  doctrine_reference: Reconocimiento público/honor humano, no doxología divina
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que aparta la lectura demasiado literal “the man Judas” y prefiere un inglés más natural. En español, esa decisión se refleja mejor omitiendo la apposición literal y conservando el contenido semántico del resto de la frase. También he alineado ἐδοξάζοντο con un verbo de honor público, no con una traducción excesivamente solemne de “glorificar”.
  spanish_consistency_notes:
  - Conservo 'Judas' como forma estándar del nombre en 1 Macabeos.
  - Uso 'naciones' para ἔθνη, no 'gentiles', porque el contexto es histórico-político.
  - Mantengo la pasiva imperfectiva con 'eran muy honrados' para reflejar estado/resultante continuado.
  - '''Delante de'' reproduce adecuadamente la valoración pública de ἐναντίον en este versículo.'
