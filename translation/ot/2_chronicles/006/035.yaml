id: 2CH.6.35
reference: 2 Chronicles 6:35
source:
  edition: WLC
  text: וְ/שָׁמַעְתָּ֙ מִן הַ/שָּׁמַ֔יִם אֶת תְּפִלָּתָ֖/ם וְ/אֶת תְּחִנָּתָ֑/ם וְ/עָשִׂ֖יתָ מִשְׁפָּטָֽ/ם־־־׃
translation:
  text: then hear from heaven their prayer and their plea for favor[a], and maintain their cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grant them justice' or 'execute their judgment.' The Hebrew says literally, 'do their justice/judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: then hear
  alternatives:
  - and hear
  - hear
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of שׁמע in this prayer context functions as a petition/wish directed to God: ''hear.'' The prefixed conjunction links it to the preceding conditional sequence, so ''then hear'' brings out the discourse flow in natural English without overtranslating.'
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, הַשָּׁמַיִם commonly refers idiomatically to 'heaven' in English, especially in prayer formulas about God's dwelling place. Singular English is the most natural equivalent.
- source_word: תְּפִלָּתָם
  chosen: their prayer
  alternatives:
  - their prayer petition
  lexicon: HALOT
  rationale: תְּפִלָּה is the general term for prayer. Singular with 3mp suffix is best rendered collectively as 'their prayer.'
- source_word: תְּחִנָּתָם
  chosen: their plea for favor
  alternatives:
  - their supplication
  - their plea
  - their entreaty
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest plea for mercy or favor. 'Plea for favor' preserves the nuance better for modern readers than the more traditional but less accessible 'supplication.'
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  chosen: uphold their cause
  alternatives:
  - execute their judgment
  - grant them justice
  - maintain their right
  lexicon: HALOT
  rationale: Literally 'do/make their judgment/justice.' In context of God hearing and responding to an afflicted people's prayer, the idiom means to act on their behalf by vindicating them or giving them justice. 'Uphold their cause' captures the judicial-relational sense in clear English without sounding overly technical.
