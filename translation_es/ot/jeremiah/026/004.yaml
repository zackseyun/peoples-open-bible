translation:
  language: es
  text: 'Y les dirás: «Así dice Yahvé: Si no me escuchan[a] al andar en mi ley[b] que he puesto delante de ustedes»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me obedecen»; el verbo hebreo שׁמע puede implicar oír con atención o responder obedeciendo, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O «instrucción»: la palabra hebrea torá puede significar ley, enseñanza o instrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And you shall say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Y debes decir
  - Entonces dirás
  lexicon: HALOT
  rationale: La forma verbal funciona en el contexto profético como mandato/instrucción dirigida a Jeremías. «Dirás» conserva esa fuerza directiva en español natural, sin añadir énfasis ajeno al hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a ellos mismos
  - para ellos
  lexicon: HALOT
  rationale: Es la marca estándar del destinatario del discurso. «A ellos» mantiene la relación directa con los oyentes del mensaje.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera idiomática y solemne en español con «Así dice». Se conserva «Yahvé» para el nombre divino, conforme al criterio del proyecto.
- source_word: אִם לֹא
  english_pob_choice: If you do not
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  - Si ustedes no
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de advertencia. En español, «Si no» es la forma más concisa y fiel al inicio del protasis.
- source_word: תִשְׁמְעוּ אֵלַי
  english_pob_choice: listen to me
  chosen_spanish: me escuchan
  alternatives_spanish:
  - me oyen
  - me obedecen
  lexicon: HALOT
  rationale: שמע con אֶל puede significar oír/escuchar/obedecer según contexto. Aquí se conserva la imagen auditiva con «escuchan», dejando que la obediencia quede desarrollada por la frase siguiente.
- source_word: לָלֶכֶת
  english_pob_choice: by walking
  chosen_spanish: andando
  alternatives_spanish:
  - al andar
  - caminando
  lexicon: HALOT
  rationale: El infinitivo de הלך expresa conducta continua. «Andando» reproduce la metáfora de manera natural en español y mantiene el valor de modo/conducta que la revisión inglesa destacó con «by walking».
- source_word: בְּתוֹרָתִי
  english_pob_choice: in my law
  chosen_spanish: en mi ley[b]
  alternatives_spanish:
  - en mi instrucción[b]
  - según mi ley[b]
  lexicon: HALOT
  rationale: En este contexto de alianza y obediencia, «ley» preserva la fuerza jurídica/covenantal de תּוֹרָה, siguiendo la decisión inglesa. Se mantiene «instrucción» como alternativa legítima.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  english_pob_choice: that I have set before you
  chosen_spanish: que yo he puesto delante de ustedes
  alternatives_spanish:
  - que he colocado delante de ustedes
  - que puse delante de ustedes
  lexicon: HALOT
  rationale: El idiomático נתן לפני se vierte con «poner delante de» en español. El perfecto compuesto «he puesto» expresa bien la vigencia del acto de presentar la norma al pueblo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la directriz del proyecto de transliterar el Tetragrámaton como «Yahvé», evitando la sustitución por un título y preservando el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תּוֹרָה en contexto de pacto
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: En Jeremías 26:4 la referencia es a la norma pactal que debe ser obedecida. «Ley» conserva mejor ese matiz jurídico-covenantal que «instrucción», aunque esta última sigue siendo una alternativa léxica válida.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción española refleja la revisión inglesa más reciente al expresar la construcción con לָלֶכֶת mediante un gerundio de modo («andando») en lugar de un infinitivo forzado, manteniendo a la vez la metáfora de conducta y la estructura condicional del versículo. También conserva la decisión auditada de traducir יהוה como Yahvé y de mantener la alternancia léxica de torá en nota.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con el proyecto.
  - Se conserva la metáfora de caminar/andar como conducta de obediencia, sin convertirla en una paráfrasis interpretativa.
  - «Ley» se usa en el texto principal por la fuerza pactal del contexto, con nota para la alternativa «instrucción».
  - El pronombre de segunda persona plural se adapta naturalmente a «ustedes» para lectura bíblica estándar en español latinoamericano.
