theological_decisions:
- issue: Corporate judgment language regarding children born from adulterous unions
  chosen_reading: Retain the verse's stark statement as a wisdom judgment without softening it into a merely social observation.
  alternative_readings:
  - Interpret as only social stigma affecting descendants
  - Generalize into a proverb about illegitimacy without moral-legal force
  rationale: The Greek presents a severe evaluative statement tied to adultery and unlawful union. The translation should preserve that tension and gravity rather than dilute it, while not importing a more specific doctrine of inherited guilt than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
