review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea y la metáfora brutal: comen la carne, quitan la piel, rompen los huesos y los cortan para la olla. Sin embargo, la nota b no preserva la razón documentada en el POB inglés: allí se explica el cambio contextual de ''flesh'' a ''meat'' en la imagen culinaria, no una variante de recipiente. Además, ''de encima'' es fiel al matiz espacial de מֵעֲלֵיהֶם, pero conviene anclar mejor el posesivo para evitar una leve aspereza referencial en español.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Los trocean' y 'como lo que está en una olla' funcionan bien. La frase 'le arrancan la piel de encima' suena algo brusca por el singular dativo tras el plural previo; 'les arrancan la piel de encima[a]' mejora la concordancia con el referente colectivo y permite conservar la alternativa léxica en nota. La actual nota b no ayuda al lector y crea una alternativa innecesaria ('caldera') menos natural que 'caldero'.
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Carne' para שְׁאֵר / בָּשָׂר es defendible en ambos lugares en español, pero debe explicarse en nota como equivalencia contextual del inglés POB entre 'flesh' y 'meat'. 'Caldero' es adecuado para קַלָּחַת. No hay términos divinos o cristológicos en este versículo.
  issues:
  - severity: medium
    issue: La nota b no corresponde a la evidencia ni al rastro de auditoría inglés.
    rationale: 'El POB inglés conserva una nota sobre el valor léxico de בָּשָׂר: antes ''flesh'', aquí ''meat'' por la imagen culinaria. La nota española sustituye eso por una variante ''caldera'', que no preserva la decisión documentada ni aporta una alternativa significativa.'
  - severity: low
    issue: La frase 'le arrancan la piel de encima' presenta una ligera incoherencia de número/pronombre.
    rationale: Tras 'mi pueblo' entendido colectivamente y luego 'les rompen los huesos', el singular dativo 'le' suena menos natural. 'Les arrancan la piel de encima' mantiene la referencia colectiva y la violencia concreta del hebreo.
  - severity: low
    issue: La nota a puede formularse con mayor naturalidad en español.
    rationale: '''Les desuellan la piel de encima'' es redundante, porque ''desollar'' ya implica quitar la piel. Una alternativa más limpia es ''O: "los desuellan"''.'
  revised_spanish_text: que comen la carne de mi pueblo, les arrancan la piel de encima[a], les rompen los huesos en pedazos y los trocean como lo que está en una olla, como carne[b] dentro de un caldero.
  revised_footnotes:
  - marker: a
    text: 'O: "los desuellan".'
    reason: lexical_alternative
  - marker: b
    text: Hebreo "carne" antes en el versículo; aquí "carne" encaja en la imagen culinaria.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota b para que refleje la decisión léxica documentada por el POB inglés sobre בָּשָׂר en la imagen culinaria, en vez de introducir una variante de recipiente no respaldada por la auditoría. También se suaviza la referencia pronominal a plural colectivo con 'les arrancan', y se mejora la nota a para una alternativa española natural y precisa.
