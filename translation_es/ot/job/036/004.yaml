translation:
  language: es
  text: Porque ciertamente, mis palabras no son falsas; uno perfecto en conocimiento[a] está contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “el que es perfecto en conocimiento está contigo”, posiblemente refiriéndose a Dios más que a Eliú mismo.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: La partícula introduce la afirmación de Eliú con fuerza explicativa o confirmativa. «Porque» conserva esa conexión discursiva de manera natural en español.
- source_word: אָמְנָם
  english_pob_choice: truly
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en verdad
  - verdaderamente
  - sin duda
  lexicon: HALOT
  rationale: Es un adverbio de afirmación/intensificación. «Ciertamente» preserva el énfasis sin volver el registro artificioso.
- source_word: לֹא שֶׁקֶר
  english_pob_choice: are not false
  chosen_spanish: no son falsas
  alternatives_spanish:
  - no son mentira
  - no son engaño
  - no son falsas
  lexicon: HALOT
  rationale: El hebreo niega la falsedad aplicada a «mis palabras». «No son falsas» reproduce con precisión la predicación y suena idiomático en español.
- source_word: מִלָּי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis expresiones
  - mis dichos
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de primera persona se rinde de forma directa como «mis palabras», la equivalencia más clara y natural.
- source_word: תְּמִים
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - íntegro
  - irreprochable
  lexicon: HALOT
  rationale: En este contexto sapiencial la palabra describe integridad o plenitud en conocimiento. «Perfecto» conserva la fuerza retórica del hebreo y coincide con la decisión inglesa documentada.
- source_word: דֵּעוֹת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría
  - conocimientos
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el español suele expresar esta abstracción en singular. «Conocimiento» mantiene el sentido general sin artificialidad.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con usted
  - permanece contigo
  - está junto a ti
  lexicon: HALOT
  rationale: La preposición indica cercanía/presencia con el destinatario. «Contigo» respeta el sufijo de segunda persona y la lectura directa del discurso.
theological_decisions:
- issue: Referente de «uno perfecto en conocimiento»
  english_pob_reading: A self-reference by Elihu
  chosen_spanish_reading: Una autodesignación de Eliú
  alternative_spanish_readings:
  - Una referencia a Dios como el que es perfecto en conocimiento y está contigo
  - Una formulación intencionalmente ambigua que deje abierta la referencia
  rationale: El contexto inmediato defiende la veracidad de «mis palabras», por lo que la lectura más probable es que Eliú se describa a sí mismo. La redacción española conserva la apertura sintáctica suficiente para no cerrar del todo la alternativa, pero el sentido principal queda a favor de la autodesignación.
  doctrine_reference: Preservar la tensión interpretativa donde el texto es genuinamente ambiguo.
translation_notes:
  revision_awareness: El hebreo y el audit trail inglés coinciden en la ambigüedad del sujeto de «uno perfecto en conocimiento». La versión española mantiene esa abertura con una puntuación y una nota que no resuelven artificialmente la referencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en otros pasajes; aquí no aparece.
  - Se mantiene «conocimiento» como abstracción singular, coherente con la decisión inglesa y con el plural hebreo de intensidad/abstracción.
  - «Perfecto» conserva la audacia retórica del texto sapiencial sin imponer una lectura dogmática de perfección moral.
