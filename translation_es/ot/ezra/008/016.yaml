review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: la secuencia narrativa, la lista de nombres, la repetición de Elnatán, la aposición de רָאשִׁים a la primera lista y de מְבִינִים a la última pareja. Sin embargo, וָאֶשְׁלְחָה aquí, según el audit trail inglés, no es simplemente ''envié a'' sino ''mandé llamar / envié por'', porque los nombres son personas convocadas a Esdras, no personas a quienes se despachó. Ese matiz de convocatoria debe preservarse mejor en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'cabezas' suena demasiado literal y poco natural en este contexto eclesial/bíblico en español actual; además, la nota ya reconoce que 'jefes' o 'líderes' expresan el sentido. 'Hombres de entendimiento' es aceptable, aunque algo rígido; puede mantenerse por cercanía léxica. El cambio principal necesario es hacer natural y fiel la acción verbal inicial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). Los nombres propios están adecuadamente castellanizados en general. La preservación de Elnatán repetido tres veces está bien. La elección 'cabezas' no viola el glosario, pero sí necesita ajuste por legibilidad y fidelidad funcional al sentido contextual de רָאשִׁים.
  issues:
  - severity: high
    issue: Entonces envié a
    rationale: El hebreo con esta lista de personas, y el audit trail inglés, indican una convocatoria ('sent for'), no meramente un envío dirigido a destinatarios. 'Envié a' en español sugiere que Ezra los despachó, casi lo contrario de la escena.
  - severity: medium
    issue: cabezas[a]
    rationale: Aunque literal, en español moderno suena torpe y potencialmente confuso para personas de rango. Dado que el proyecto permite evitar calcos de madera cuando el español resulta antinatural, 'jefes' preserva mejor el sentido contextual de רָאשִׁים.
