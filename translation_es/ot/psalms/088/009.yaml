translation:
  language: es
  text: Tú has alejado de mí a mis compañeros[a]; me has hecho aborrecible[b] para ellos. Estoy encerrado[c] y no puedo salir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis conocidos» o «los que me son conocidos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me has hecho una abominación para ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Estoy recluido y no puedo salir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְחַקְתָּ
  english_pob_choice: have driven ... far
  chosen_spanish: has alejado
  alternatives_spanish:
  - has apartado
  - has puesto lejos
  - has removido
  lexicon: HALOT
  rationale: El hiphil expresa causar distancia. «Has alejado» comunica con naturalidad en español la acción de separar o poner lejos, sin perder el tono lamentoso del hebreo.
- source_word: מְיֻדָּעַי
  english_pob_choice: my companions
  chosen_spanish: mis conocidos
  alternatives_spanish:
  - mis compañeros
  - mis amigos
  - los que me conocen
  lexicon: HALOT
  rationale: La base ידע apunta a personas conocidas por el hablante. «Mis conocidos» conserva ese valor relacional sin afirmar un grado de intimidad mayor que el del hebreo.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartados de mí
  lexicon: HALOT
  rationale: La preposición hebrea marca separación; en español, «de mí» es la forma más directa y natural en esta construcción.
- source_word: שַׁתַּנִי
  english_pob_choice: have made me
  chosen_spanish: me has hecho
  alternatives_spanish:
  - me has puesto
  - me has colocado
  - me has constituido
  lexicon: HALOT
  rationale: Con predicado acusativo, שׂים funciona idiomáticamente como «hacer/renderizar». «Me has hecho» mantiene esa fuerza predicativa en español.
- source_word: תוֹעֵבוֹת
  english_pob_choice: abhorrent
  chosen_spanish: abominación
  alternatives_spanish:
  - repugnante
  - detestable
  - algo abominable
  lexicon: HALOT
  rationale: El sustantivo hebreo conserva una carga fuerte de repulsión ritual/moral. «Abominación» preserva esa intensidad y el tono bíblico del término, aunque en español suena nominal donde el inglés optó por un adjetivo.
- source_word: לָמוֹ
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: HALOT
  rationale: El pronombre refiere a los mencionados antes. «Para ellos» expresa bien el resultado relacional de ser tratado como repulsivo por parte de ellos.
- source_word: כָּלֻא
  english_pob_choice: I am confined
  chosen_spanish: estoy encerrado
  alternatives_spanish:
  - estoy confinado
  - estoy recluido
  - estoy encerrado dentro
  lexicon: HALOT
  rationale: El sentido pasivo/estativo de כלא es estar retenido o encerrado. «Estoy encerrado» es claro, natural y suficientemente amplio para no sobreespecificar un tipo de prisión.
- source_word: וְלֹא אֵצֵא
  english_pob_choice: and cannot go out
  chosen_spanish: y no puedo salir
  alternatives_spanish:
  - y no salgo
  - y no puedo irme
  - y no puedo salir de allí
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse literalmente como «no saldré / no salgo», en contexto el sentido es incapacidad. «No puedo salir» transmite mejor la fuerza del lamento.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustanciales respecto al texto base; el acuerdo entre controles fue alto, así que la redacción española sigue de cerca las decisiones léxicas auditadas sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se preserva «Yahvé» para el nombre divino cuando aparezca; aquí no se presenta.
  - Se mantiene «mis conocidos» para reflejar מְיֻדָּעַי sin sobrerromantizarlo como «amigos».
  - «Abominación» conserva la fuerza semántica fuerte de תועבה, aunque en español su función es nominal.
  - La secuencia final mantiene la doble idea de encierro e imposibilidad de salir, como en el inglés auditado.
