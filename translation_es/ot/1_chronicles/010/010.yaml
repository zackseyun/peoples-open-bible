translation:
  language: es
  text: Pusieron su armadura en la casa[a] de sus dioses, y fijaron su cráneo[b] en la casa de Dagón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de sus dioses» / «el templo de Dagón». El hebreo dice literalmente «casa», término común para el santuario de una divinidad.
    reason: lexical_alternative
  - marker: b
    text: O «su cabeza». El término hebreo puede referirse a la cabeza o al cráneo, pero «cráneo» refleja con más precisión el sustantivo usado aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: They put
  chosen_spanish: Pusieron
  alternatives_spanish:
  - Colocaron
  - Pusieron
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar. "Pusieron" es natural y fiel al valor verbal simple del hebreo narrativo.
- source_word: כֵּלָיו
  english_pob_choice: his armor
  chosen_spanish: su armadura
  alternatives_spanish:
  - sus armas
  - su equipo
  - sus objetos
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar objetos o implementos, el contexto de guerra y la revisión inglesa favorecen el sentido de las prendas o piezas defensivas capturadas; "armadura" es la opción más clara en español sin forzar el texto.
- source_word: בֵּית אֱלֹהֵיהֶם
  english_pob_choice: the house of their gods
  chosen_spanish: la casa de sus dioses
  alternatives_spanish:
  - el templo de sus dioses
  - la casa de sus divinidades
  lexicon: HALOT
  rationale: בית significa literalmente "casa"; se conserva esa forma como en el POB inglés, sin sustituirla automáticamente por "templo". "Dioses" refleja el plural del hebreo.
- source_word: גֻּלְגָּלְתּוֹ
  english_pob_choice: his skull
  chosen_spanish: su cráneo
  alternatives_spanish:
  - su cabeza
  - su calavera
  lexicon: HALOT
  rationale: El sustantivo puede referirse a cabeza o cráneo. "Cráneo" mantiene la precisión léxica del POB inglés "skull" y su tono crudo.
- source_word: תָקְעוּ
  english_pob_choice: they fastened
  chosen_spanish: fijaron
  alternatives_spanish:
  - aseguraron
  - sujetaron
  - clavaron
  lexicon: HALOT
  rationale: El verbo admite la idea de empujar, clavar o asegurar. "Fijaron" comunica una sujeción o exhibición sin añadir una imagen más fuerte que el hebreo no exige explícitamente.
- source_word: בֵּית דָּגוֹן
  english_pob_choice: the house of Dagon
  chosen_spanish: la casa de Dagón
  alternatives_spanish:
  - el templo de Dagón
  lexicon: HALOT
  rationale: Se mantiene "casa" por fidelidad al hebreo y por coherencia con la decisión del POB inglés; Dagón se translitera como nombre propio de la deidad.
theological_decisions:
- issue: Casa de los dioses / casa de Dagón como lenguaje cultual
  english_pob_reading: the house of their gods / the house of Dagon
  chosen_spanish_reading: la casa de sus dioses / la casa de Dagón
  alternative_spanish_readings:
  - el templo de sus dioses / el templo de Dagón
  rationale: No se suaviza el lenguaje cultual hebreo. "Casa" conserva la literalidad y evita reemplazar sin justificación el término documentado por una glosa interpretativa.
  doctrine_reference: Neutral textual rendering; no doctrinal expansion
translation_notes:
  revision_awareness: La revisión inglesa cambió 'weapons' por 'armor' para reflejar mejor que Saúl había sido despojado de su equipo de batalla. La versión española sigue esa última decisión auditada con 'armadura'.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Dioses» (plural idolátrico) y el nombre propio «Dagón».
  - Se evita traducir mecánicamente «house» por «templo» para respetar la huella hebrea y la política del POB.
  - «Cráneo» reproduce la precisión léxica del inglés auditado y no se rebaja a «cabeza» en el texto principal.
