- from: 'Y Shequem dijo a Hamor, su padre[a]: «Tómame a esta muchacha por esposa».'
  to: 'Y Shequem dijo a Hamor, su padre: «Toma para mí a esta muchacha[a] como esposa».'
  rationale: Se revisa la frase verbal para evitar la ambigüedad de «Tómame» y reflejar mejor el imperativo hebreo con dativo («toma para mí»). Se sustituye la nota sobre la aposición de Hamor por la nota léxica relevante para הַיַּלְדָּה, en línea con la auditoría inglesa. También se ajusta «por esposa» a «como esposa» por mayor naturalidad en español moderno sin pérdida de sentido.
