base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/026.yaml
  text: Her priests have done violence to my law and have profaned my holy things[a]. They have not distinguished between the holy and the common, and they have not made known the difference between the unclean and the clean. They have hidden their eyes from my Sabbaths[b], and I have been profaned among them.
  footnotes:
  - marker: a
    text: Or 'between the holy and the profane.' The Hebrew term here more precisely means what is common or ordinary, in contrast to what is holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'I was profaned in their midst.'
    reason: lexical_alternative
