translation:
  language: es
  text: Y todas ellas[a], extendiendo sus manos hacia el cielo, hacían la súplica[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las mujeres», ya que el adjetivo griego está en femenino plural y probablemente se refiere a las mujeres mencionadas en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: El griego usa aquí un término que significa petición intensa o súplica; no necesariamente una «letanía» en el sentido eclesiástico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαι
  english_pob_choice: all of them
  chosen_spanish: todas ellas
  alternatives_spanish:
  - todas
  - todas las mujeres
  lexicon: LSJ
  rationale: El femenino plural probablemente retoma a las mujeres del contexto inmediato. En español, «todas ellas» mantiene el alcance colectivo sin forzar explícitamente un antecedente que el contexto ya sugiere; «todas las mujeres» sigue siendo posible, pero aquí sonaría más pesado.
- source_word: προτείνουσαι
  english_pob_choice: stretching out
  chosen_spanish: extendiendo
  alternatives_spanish:
  - estirando
  - alargando
  - tendiendo
  lexicon: LSJ
  rationale: El participio expresa una acción física de extender las manos. «Extendiendo» es natural en español y conserva el gesto de levantar las manos en oración sin añadir matices no presentes en el griego.
- source_word: τὰς χεῖρας
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos
  lexicon: LSJ
  rationale: En español, el posesivo con partes del cuerpo es idiomático y comunica claramente la referencia del contexto. Se conserva la posesión implícita que en griego se entiende por el contexto.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - hacia los cielos
  - al cielo
  lexicon: LSJ
  rationale: En este gesto de oración, οὐρανός puede expresarse en español como «cielo» sin perder la referencia vertical y devocional. «Hacia el cielo» reproduce la dirección de εἰς y suena natural; «cielo» evita una rigidez innecesaria, aunque «cielos» sería posible en registro más tradicional.
- source_word: ἐποιοῦντο
  english_pob_choice: were making
  chosen_spanish: hacían
  alternatives_spanish:
  - estaban haciendo
  - presentaban
  - elevaban
  lexicon: LSJ
  rationale: El imperfecto indica acción en curso. «Hacían» preserva ese valor progresivo de manera simple y fiel; el objeto nominal «la súplica» completa el sentido sin introducir una formulación eclesiástica fija.
- source_word: τὴν λιτανείαν
  english_pob_choice: supplication
  chosen_spanish: la súplica
  alternatives_spanish:
  - la petición ferviente
  - la súplica ferviente
  - la rogativa
  lexicon: LSJ
  rationale: El término designa una petición intensa o súplica, no necesariamente una «letanía» litúrgica en sentido posterior. «La súplica» comunica bien el valor semántico básico en español y evita trasladar indebidamente una forma ritual más tardía.
theological_decisions:
- issue: Sentido de οὐρανός en un contexto de oración
  english_pob_reading: heaven
  chosen_spanish_reading: el cielo
  alternative_spanish_readings:
  - el cielo físico
  - los cielos
  rationale: La escena describe una apelación orante con las manos alzadas; en español, «el cielo» puede expresar tanto la dirección visible del gesto como la esfera divina implícita por el contexto. No se impone una formulación doctrinal adicional; se conserva la referencia devocional del original.
  doctrine_reference: Traducción con primacía del texto original; claridad devocional sin sobreinterpretación
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Swete con alta concordancia y mantiene la observación auditada de que πᾶσαι probablemente remite a las mujeres del contexto inmediato. También conserva la distinción semántica de λιτανεία como súplica, evitando una lectura litúrgica anacrónica.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «cielo» frente a «heaven» o «cielos» para un español natural y reverente.
  - No se introdujo «letanía» para λιτανεία, siguiendo la advertencia auditada contra una equivalencia litúrgica tardía.
  - El imperfecto griego quedó reflejado con «hacían», manteniendo la acción continua en pasado.
