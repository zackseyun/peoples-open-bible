translation:
  language: es
  text: Pasan como barcos de papiro[a], como un águila que se abalanza sobre la presa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «barcos de junco».
    reason: lexical_alternative
  - marker: b
    text: O «como un buitre que se abalanza sobre la comida/la presa». El hebreo נֶשֶׁר puede referirse de manera más amplia a un ave carroñera grande o ave rapaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָ֭לְפוּ
  english_pob_choice: pass by
  chosen_spanish: pasan
  alternatives_spanish:
  - han pasado
  - salen volando
  lexicon: HALOT
  rationale: El verbo qal perfecto de חלף expresa pasar con rapidez. En español, el presente poético «pasan» reproduce bien la vivacidad del símil, como en el inglés POB, sin forzar un pretérito donde el contexto es imagético y atemporal.
- source_word: עִם
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - con
  - junto con
  lexicon: HALOT
  rationale: Aunque normalmente significa «con», en este uso comparativo introduce el símil. «Como» es la opción natural y fiel en español.
- source_word: אֳנִיּוֹת
  english_pob_choice: boats
  chosen_spanish: barcos
  alternatives_spanish:
  - naves
  - barcas
  lexicon: HALOT
  rationale: El término puede abarcar barcos o embarcaciones. «Barcos» conserva la imagen y resulta claro; «barcas» podría sonar demasiado pequeño, y «naves» más amplio y menos concreto.
- source_word: אֵבֶה
  english_pob_choice: papyrus
  chosen_spanish: de papiro
  alternatives_spanish:
  - de junco
  - de carrizo
  lexicon: HALOT
  rationale: El POB revisado optó por «papyrus boats» para mayor precisión lexical. En español, «de papiro» mantiene esa precisión y preserva la referencia tradicional del símil, sin reducirla a un genérico «de caña».
- source_word: כְּנֶשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como un águila
  alternatives_spanish:
  - como un buitre
  - como un ave rapaz
  lexicon: HALOT
  rationale: נשר puede referirse a un ave grande de presa, a menudo «águila», aunque en algunos contextos también puede acercarse a «buitre». Se mantiene «águila» como lectura convencional del símil, coherente con el audit trail inglés.
- source_word: יָטוּשׂ
  english_pob_choice: swooping
  chosen_spanish: que se abalanza
  alternatives_spanish:
  - que se lanza
  - que cae en picada
  lexicon: HALOT
  rationale: El verbo describe un movimiento rápido y agresivo sobre el objetivo. «Que se abalanza» expresa bien la velocidad y el ímpetu del depredador en español.
- source_word: עֲלֵי
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: Con un ave de presa y su objetivo, «sobre» es idiomático y conserva el valor direccional del hebreo.
- source_word: אֹכֶל
  english_pob_choice: prey
  chosen_spanish: la presa
  alternatives_spanish:
  - el alimento
  - la comida
  lexicon: HALOT
  rationale: Literalmente significa «alimento», pero en este símil la referencia es al objeto cazado. «La presa» preserva el sentido figurado que el POB inglés también resguarda con «prey».
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado de «reed boats» a «papyrus boats» para mayor precisión lexical; la versión española sigue esa revisión con «barcos de papiro». También se preserva la alternativa léxica del ave de presa mediante nota, porque el hebreo נשר admite un rango más amplio que «águila».
  spanish_consistency_notes:
  - Se usa «papiro» para mantener la precisión del término revisado en el audit trail inglés.
  - Se prefirió «la presa» sobre «alimento» para conservar el valor imagético del símil depredador.
  - La puntuación y el orden mantienen un estilo poético natural en español, sin añadir explicaciones al cuerpo del verso.
