translation:
  language: es
  text: Pero ustedes[a], amados, recuerden las palabras dichas de antemano por los apóstoles de nuestro Señor Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς δέ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero vosotros
  - Y ustedes
  - Mas ustedes
  lexicon: BDAG
  rationale: Conserva el giro contrastivo de δέ y el énfasis del sujeto explícito Ὑμεῖς sin sonar forzado en español latinoamericano. 'Pero ustedes' marca con claridad el contraste con los falsos maestros del contexto inmediato.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - amados míos
  - amados hermanos
  lexicon: BDAG
  rationale: El vocativo expresa afecto pastoral. 'Amados' conserva mejor el tono epistolar y solemne que una opción más coloquial como 'queridos'.
- source_word: μνήσθητε
  english_pob_choice: remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - acuérdense
  - traigan a la memoria
  - mantengan presente
  lexicon: BDAG
  rationale: Es un imperativo aoristo que exhorta a evocar conscientemente una instrucción previa. 'Recuerden' es natural, directo y suficientemente fuerte en español.
- source_word: τῶν ῥημάτων
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las expresiones
  - las declaraciones
  - lo dicho
  lexicon: BDAG
  rationale: ῥήματα aquí se refiere a dichos o enunciados concretos. 'Palabras' es el equivalente más transparente y mantiene la referencia verbal del texto.
- source_word: τῶν προειρημένων
  english_pob_choice: spoken beforehand
  chosen_spanish: dichas de antemano
  alternatives_spanish:
  - ya dichas
  - previamente dichas
  - anunciadas de antemano
  lexicon: BDAG
  rationale: El participio perfecto pasivo de προλέγω indica algo dicho con anterioridad. 'Dichas de antemano' conserva tanto la prioridad temporal como la naturaleza verbal de la expresión.
- source_word: ὑπὸ τῶν ἀποστόλων
  english_pob_choice: by the apostles
  chosen_spanish: por los apóstoles
  alternatives_spanish:
  - por los enviados
  - por los emisarios
  lexicon: BDAG
  rationale: ἀπόστολοι se traduce con el término establecido 'apóstoles', que en este contexto remite a los testigos autorizados del Señor.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Maestro
  - de nuestro Dueño
  lexicon: BDAG
  rationale: '''Señor'' es el equivalente normal de κύριος y respeta el tono confesional del texto. La relación genitiva indica pertenencia y autoridad sobre los apóstoles.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como 'Mesías', conforme a la guía terminológica del proyecto. 'Jesucristo' queda como alternativa tradicional, pero aquí se prefiere una traducción más transparente del título.
theological_decisions:
- issue: Cómo verter Χριστοῦ en la fórmula cristológica final
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: La guía del proyecto favorece 'Mesías' cuando Χριστός funciona como título. En esta expresión, el término conserva su sentido cristológico y mesiánico, por lo que 'Jesús Mesías' refleja mejor la forma y el contenido del griego que la transliteración tradicional.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Cómo entender 'los apóstoles' en una exhortación a recordar
  english_pob_reading: by the apostles of our Lord Jesus Messiah
  chosen_spanish_reading: por los apóstoles de nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - por los enviados de nuestro Señor Jesús Mesías
  - por los apóstoles de nuestro Señor Jesús Cristo
  rationale: El texto presenta a los apóstoles como mediadores autorizados de palabras previamente pronunciadas. Traducirlos como 'apóstoles' preserva el peso eclesial y testimonial del término sin diluirlo en una paráfrasis.
  doctrine_reference: Hechos 1:21-22; Efesios 2:20
- issue: Tono del mandato a la comunidad
  english_pob_reading: remember
  chosen_spanish_reading: recuerden
  alternative_spanish_readings:
  - acuérdense
  - traigan a la memoria
  rationale: El mandato no es meramente intelectual; implica retener activamente la enseñanza apostólica frente a la influencia de los falsos maestros. 'Recuerden' expresa bien esa exhortación sin añadir contenido que el griego no exige.
  doctrine_reference: 2 Pedro 3:1-2; Judas 1:5
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación editorial entre 'Jesus Christ' y 'Jesus Messiah', con restauración final de 'Messiah' por coherencia doctrinal. La versión española sigue esa decisión final y mantiene 'Mesías' como traducción del título Χριστός, evitando una transliteración automática que ocultaría el valor titular del griego.
  spanish_consistency_notes:
  - Se usó 'Mesías' para Χριστός según la política terminológica del proyecto; no se sustituyó por 'Cristo'.
  - '''Señor'' se conserva para κύριος como término confesional estándar, sin mayúsculas litúrgicas de máscara.'
  - El vocativo plural se expresó con 'amados' para mantener el tono epistolar afectivo.
  - Se prefirió 'recuerden' por naturalidad en español, sin perder el carácter imperativo del aoristo griego.
