translation:
  language: es
  text: Bajo su autoridad estaban Edén[a], Miniamín, Jesúa, Semaías, Amarías y Secanías, en las ciudades de los sacerdotes, para distribuir fielmente a sus hermanos[b] por divisiones[c], tanto al grande como al pequeño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su lado» / «bajo su cuidado»; el modismo hebreo puede expresar agencia, supervisión o autoridad.
    reason: lexical_alternative
  - marker: b
    text: «Sus hermanos» se refiere a sus compañeros dentro de la comunidad sacerdotal.
    reason: cultural_note
  - marker: c
    text: O «según divisiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל־יָדוֹ
  english_pob_choice: Under his authority
  chosen_spanish: Bajo su autoridad
  alternatives_spanish:
  - A su lado
  - Bajo su mano
  - En su encargo
  lexicon: HALOT
  rationale: El hebreo idiomático עַל־יָד puede expresar agencia, supervisión o autoridad. En este contexto administrativo, «Bajo su autoridad» comunica con naturalidad la relación de subordinación/encargo sin perder la fuerza del original.
- source_word: עֵדֶן וּמִנְיָמִן וְיֵשׁוּעַ וּשְׁמַעְיָהוּ אֲמַרְיָהוּ וּשְׁכַנְיָהוּ
  english_pob_choice: Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah
  chosen_spanish: Eden, Miniamín, Jesúa, Semaías, Amarías y Secanías
  alternatives_spanish:
  - Eden, Miniamín, Yeshúa, Shemaías, Amarías y Shecanías
  lexicon: Transliteración onomástica estándar
  rationale: Los nombres propios se transliteran; «Jesúa» refleja la forma española habitual para יֵשׁוּעַ en este contexto histórico, y «Miniamín» sigue la transliteración estándar de מִנְיָמִן.
- source_word: בְּעָרֵי הַכֹּהֲנִים
  english_pob_choice: in the cities of the priests
  chosen_spanish: en las ciudades de los sacerdotes
  alternatives_spanish:
  - en las ciudades sacerdotales
  - en las ciudades de los sacerdotes
  lexicon: HALOT
  rationale: La construcción genitiva es directa; «ciudades de los sacerdotes» preserva la relación formal del hebreo y resulta clara en español.
- source_word: בֶּאֱמוּנָה
  english_pob_choice: faithfully
  chosen_spanish: fielmente
  alternatives_spanish:
  - con fidelidad
  - de manera fiel
  lexicon: HALOT
  rationale: Aquí אֱמוּנָה describe la forma confiable en que se cumple la tarea. «Fielmente» mantiene el sentido de lealtad/veracidad y suena natural en español.
- source_word: לָתֵת
  english_pob_choice: to distribute
  chosen_spanish: para distribuir
  alternatives_spanish:
  - para dar
  - para repartir
  lexicon: HALOT
  rationale: Aunque el verbo base es «dar», el contexto es una asignación ordenada de porciones; «distribuir» hace explícito ese sentido administrativo sin añadir contenido ajeno.
- source_word: לַאֲחֵיהֶם
  english_pob_choice: to their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos de comunidad
  - a sus parientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hermanos». En este contexto, se refiere a miembros de la comunidad sacerdotal; se conserva la expresión literal por fidelidad textual.
- source_word: בְּמַחְלְקוֹת
  english_pob_choice: by divisions
  chosen_spanish: por divisiones
  alternatives_spanish:
  - según divisiones
  - en divisiones
  lexicon: HALOT
  rationale: מַחְלְקוֹת alude a turnos o secciones ordenadas. «Por divisiones» reproduce de forma breve y fiel la organización del reparto.
- source_word: כַּגָּדוֹל כַּקָּטָן
  english_pob_choice: to great and small alike
  chosen_spanish: tanto al grande como al pequeño
  alternatives_spanish:
  - al grande y al pequeño por igual
  - tanto al mayor como al menor
  lexicon: HALOT
  rationale: La expresión es idiomática e indica distribución imparcial entre todos los rangos o tamaños. «Tanto al grande como al pequeño» conserva el paralelismo y la inclusividad del hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó el orden de «faithfully to distribute» para reflejar con más naturalidad la frase hebrea sin cambiar el contenido. En español, se preserva ese valor adverbial con «fielmente» colocado antes del infinitivo, de modo igualmente natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Los nombres propios se transliteran de manera consistente y no se traducen.
  - Se conserva «hermanos» para reflejar el lenguaje comunitario literal del hebreo, siguiendo la decisión auditada del inglés POB.
