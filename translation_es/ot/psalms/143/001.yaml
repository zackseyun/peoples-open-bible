  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> ‘Yahvé’; אֱמוּנָה -> ‘fidelidad’; צְדָקָה -> ‘justicia’ en el texto principal con alternativa preservada en nota. No hay conflictos doctrinales ni terminológicos mayores.'
