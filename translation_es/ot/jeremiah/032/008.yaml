base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/008.yaml
  text: Then Hanamel the son of my uncle came to me in the court of the guard[a], according to the word of Yahweh, and he said to me, “Please buy my field that is at Anathoth, in the land of Benjamin, for the right of inheritance is yours and the redemption is yours. Buy it for yourself.” Then I knew that this was the word of Yahweh.
  footnotes:
  - marker: a
    text: Or, more explicitly, “the right of redemption is yours.” The Hebrew says literally, “the redemption is yours,” referring to the kinship-based legal right or duty to redeem family property.
