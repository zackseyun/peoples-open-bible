translation:
  language: es
  text: Y entregaron los decretos del rey a los administradores reales y a los gobernadores de Siria y Fenicia[a], y honraron a la nación y al santuario del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «glorificaron a la nación y al santuario del Señor». El verbo griego también puede rendirse más literalmente como «glorificaron», pero aquí probablemente indica honrar o distinguir públicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκαν
  english_pob_choice: delivered
  chosen_spanish: entregaron
  alternatives_spanish:
  - dieron
  - entregaron formalmente
  - pusieron en manos de
  lexicon: BDAG
  rationale: En este contexto administrativo, el verbo expresa la transmisión de documentos oficiales. «Entregaron» conserva esa acción concreta y suena natural en español, sin perder el matiz formal.
- source_word: τὰ προστάγματα
  english_pob_choice: the decrees
  chosen_spanish: los decretos
  alternatives_spanish:
  - los mandatos
  - las órdenes
  - los edictos
  lexicon: LSJ
  rationale: El término refiere a disposiciones oficiales del rey. «Decretos» mantiene la fuerza normativa y el carácter escrito/oficial que el contexto exige.
- source_word: τοῖς βασιλικοῖς οἰκονόμοις
  english_pob_choice: to the royal stewards
  chosen_spanish: a los administradores reales
  alternatives_spanish:
  - a los mayordomos reales
  - a los administradores de la corte
  - a los mayordomos del rey
  lexicon: LSJ
  rationale: οἰκονόμος puede ser «mayordomo» o «administrador». En un marco imperial, «administradores reales» comunica mejor la función oficial sin limitarla indebidamente al manejo doméstico.
- source_word: τοῖς ἐπάρχοις
  english_pob_choice: to the governors
  chosen_spanish: a los gobernadores
  alternatives_spanish:
  - a los prefectos
  - a los sátrapas
  - a los oficiales provinciales
  lexicon: LSJ
  rationale: «Gobernadores» es la equivalencia más clara y accesible para ἐπάρχος en este contexto provincial.
- source_word: ἐδόξασαν
  english_pob_choice: they honored
  chosen_spanish: honraron
  alternatives_spanish:
  - glorificaron
  - dieron honra a
  - exaltaron
  lexicon: BDAG
  rationale: Aunque el verbo puede traducirse «glorificar», aquí el objeto no es Dios sino la nación y el santuario. «Honraron» preserva el sentido de conferir estima/distinción sin introducir lenguaje de adoración.
- source_word: τὸ ἔθνος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  - la comunidad
  lexicon: BDAG
  rationale: En este pasaje designa al pueblo judío como entidad colectiva y política. «La nación» conserva mejor ese alcance que «el pueblo».
- source_word: τὸ ἱερὸν
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el recinto sagrado
  - la casa santa
  lexicon: BDAG
  rationale: ἱερόν puede referirse al complejo sagrado o santuario. «Santuario» mantiene el valor sacro y evita restringir el término a un solo aspecto arquitectónico.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: BDAG
  rationale: La fuente primaria es griega y usa κύριος; por norma del proyecto se vierte «Señor». Aunque la tradición paralela apunta al nombre divino, no se sustituye aquí por «Yahvé» porque el texto base no lo expresa explícitamente.
theological_decisions:
- issue: Tratamiento de κύριος en 1 Esdras de tradición griega
  english_pob_reading: the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  - del Señor Dios
  rationale: 'Se mantiene la convención del proyecto para κύριος en griego: «Señor». Esto respeta la fuente primaria y evita imponer una máscara de nombre divino que no aparece en el texto griego de este versículo.'
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; יְהוָה → Yahvé'
- issue: Sentido de ἐδόξασαν aplicado a objetos no divinos
  english_pob_reading: they honored the nation and the sanctuary
  chosen_spanish_reading: honraron a la nación y al santuario
  alternative_spanish_readings:
  - glorificaron a la nación y al santuario
  - dieron gloria a la nación y al santuario
  rationale: Para no cargar el verbo con un matiz de glorificación cultual inexistente aquí, se traduce como reconocimiento público de estima. Así se conserva la tensión semántica documentada por el inglés POB sin exagerarla teológicamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el último pase revisado, que no señaló cambios necesarios, y se mantuvo la alineación con el cierre auditado del inglés POB: entrega de decretos oficiales, destinatarios administrativos imperiales y la ambigüedad de ἐδόξασαν resuelta en español con «honraron», dejando constancia de la alternativa «glorificaron» en nota.'
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριος conforme a la convención del proyecto en griego, sin reemplazarlo por «Yahvé» en el texto principal.
  - «Nación» y «santuario» siguen el alcance colectivo y sacro del griego, evitando simplificaciones a «pueblo» o «templo» salvo en nota alternativa.
  - El registro busca ser bíblico y digno, pero no arcaizante; por eso se prefirió «entregaron» y «gobernadores» como soluciones claras en español actual.
