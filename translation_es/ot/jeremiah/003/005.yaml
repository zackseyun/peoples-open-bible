translation:
  language: es
  text: ¿Se enojará para siempre? ¿Lo guardará hasta el fin? Mira[a], has hablado[b], y has hecho maldades[c], y has prevalecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Guardará la ira para siempre? ¿La conservará perpetuamente?»'
    reason: lexical_alternative
  - marker: b
    text: Las consonantes hebreas de «has hablado» también pueden leerse «he hablado»; el contexto favorece que se esté hablando a Judá.
    reason: textual_variant
  - marker: c
    text: O «y has podido», con el sentido de que Judá persistió con éxito en hacer el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיִנְטֹר
  english_pob_choice: Will he be angry
  chosen_spanish: ¿Se enojará
  alternatives_spanish:
  - ¿Guardará rencor
  - ¿Retendrá la ira
  lexicon: HALOT
  rationale: נטר en este contexto expresa retener enojo o resentimiento. En español, «se enojará» comunica de forma natural la idea de mantener la ira sin volver la línea rígidamente literal. Las alternativas conservan con más fuerza la imagen de retener o guardar rencor.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: עוֹלָם indica una duración indefinida y sostenida. «Para siempre» es natural en español y reproduce el valor durativo de la pregunta.
- source_word: יִשְׁמֹר
  english_pob_choice: keep it
  chosen_spanish: lo guardará
  alternatives_spanish:
  - lo retendrá
  - guardará la ira
  lexicon: HALOT
  rationale: שׁמר significa «guardar, vigilar, conservar». En paralelo con נטר, «lo guardará» preserva la imagen verbal sin sobrecargar la frase con un objeto explícito que el contexto ya sugiere.
- source_word: לָנֶצַח
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - para siempre
  - perpetuamente
  lexicon: HALOT
  rationale: נֶצַח expresa continuidad duradera. «Hasta el fin» mantiene el paralelismo con la primera pregunta y evita una repetición innecesaria en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador discursivo de atención. «Mira» es claro, actual y conserva el tono exhortativo sin arcaísmo.
- source_word: דברתי
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - he hablado
  - has dicho
  lexicon: HALOT
  rationale: La consonancia hebrea admite una lectura alternativa de primera persona, pero el contexto favorece la segunda persona dirigida a Judá. «Has hablado» sigue el valor acusatorio del pasaje; la alternativa de primera persona se conserva como posibilidad interpretativa en la nota.
- source_word: וַתַּעֲשִׂי
  english_pob_choice: and you have done
  chosen_spanish: y has hecho
  alternatives_spanish:
  - y hiciste
  - y has practicado
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la acusación. «Y has hecho» mantiene la secuencia verbal y la relación con las malas acciones señaladas por el contexto.
- source_word: הָרָעוֹת
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - maldades
  - actos malos
  lexicon: HALOT
  rationale: El plural con artículo apunta a acciones concretas de maldad. «Cosas malas» suena natural en español y conserva el plural sin introducir una interpretación más fuerte que la del hebreo.
- source_word: וַתּוּכָל
  english_pob_choice: and you have prevailed
  chosen_spanish: y has prevalecido
  alternatives_spanish:
  - y has podido
  - y has persistido con éxito
  lexicon: HALOT
  rationale: יכל puede significar «poder, prevalecer». «Has prevalecido» transmite la fuerza de éxito persistente en el mal, de acuerdo con la lectura auditada del POB en inglés.
theological_decisions:
- issue: Flujo de la acusación y posible lectura de la forma consonántica de דברתי
  english_pob_reading: 'The clause addresses Judah directly: ''you have spoken ... you have done ... you have prevailed.'''
  chosen_spanish_reading: 'La cláusula se entiende como dirigido a Judá en segunda persona: «has hablado ... has hecho ... has prevalecido».'
  alternative_spanish_readings:
  - «he hablado ... he hecho ... he prevalecido»
  rationale: El contexto inmediato presenta a Judá como interlocutor y mantiene la acusación retórica contra palabras presuntuosas frente a obras malas. La lectura de primera persona es posible en la consonancia, pero el flujo discursivo favorece la segunda persona.
  doctrine_reference: Decisión textual/interpretativa; no doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del POB en inglés: se mantuvo la conjunción simple en la secuencia final y se conservó el sentido plural de las malas acciones sin volverla excesivamente enfática en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto, pero este verso no contiene el nombre divino explícito.
  - Se evitó «Cristo/Mesías» porque el pasaje no lo presenta.
  - Se preservó la tensión entre una posible lectura de primera persona de דברתי y la lectura contextual de segunda persona, en nota.
  - «Prevalecido» traduce la fuerza de יכל sin suavizarla a una simple capacidad.
