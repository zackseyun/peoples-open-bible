    rationale: El hebreo tiene una expresión temporal con preposición. En español, la formulación más natural y suficientemente fiel aquí puede incluir 'en el primer día' dentro de la oración completa.
  - severity: medium
    issue: Falta una nota al pie que preserve la alternativa léxica documentada sobre 'el que presentó/ofreció' y 'de la tribu de Judá'.
    rationale: El English POB preservó esta alternativa; la revisión española debe mantenerla también, especialmente porque en español la variación sigue siendo pertinente.
  revised_spanish_text: Y el que presentó su ofrenda en el primer día fue Nahsón hijo de Amminadab[a], de la tribu de Judá.
