    text: Or 'A burden concerning Egypt' or 'A pronouncement concerning Egypt.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before him,' that is, at the LORD's presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'within him'; the Hebrew treats Egypt as a singular entity.
    reason: lexical_alternative
