translation:
  language: es
  text: '¡Oye, tierra! Mira: yo traigo calamidad sobre este pueblo, el fruto de sus pensamientos[a], porque no han prestado atención a mis palabras, y han rechazado mi ley[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «el fruto de sus planes» o «el resultado de sus planes».
    reason: lexical_alternative
  - marker: b
    text: O «mi instrucción». תּוֹרָה puede significar «ley» o «instrucción»; aquí se eligió «ley» para conservar la fuerza pactal de la acusación.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעִי
  english_pob_choice: Hear
  chosen_spanish: ¡Oye!
  alternatives_spanish:
  - Escucha
  - Oye, tierra
  lexicon: HALOT
  rationale: El imperativo femenino singular dirigido a la tierra personificada pide un verbo breve y vocativo en español. 'Oye' conserva el tono profético de llamada solemne; 'escucha' es viable, pero suena un poco más explicativo. Se mantiene el carácter de apelación directa al testigo cósmico.
- source_word: הָאָרֶץ
  english_pob_choice: O earth
  chosen_spanish: tierra
  alternatives_spanish:
  - tierra, O
  - mundo
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el alcance amplio del hebreo y la personificación del destinatario. ''Mundo'' sería demasiado interpretativo; ''país'' estrecharía injustificadamente el sentido.'
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: '''Mira'' expresa la deíxis solemne de הִנֵּה en español natural y digno. ''He aquí'' es más tradicional, pero menos natural en español moderno; el sentido anunciador se conserva.'
- source_word: מֵבִיא רָעָה
  english_pob_choice: I am bringing disaster
  chosen_spanish: traigo calamidad
  alternatives_spanish:
  - estoy trayendo desastre
  - traigo desastre
  lexicon: HALOT
  rationale: רָעָה aquí designa juicio dañino, no mal moral. 'Calamidad' comunica bien el castigo divino. Se prefirió el presente simple 'traigo' para reflejar la fuerza del participio con אָנֹכִי sin forzar una perífrasis innecesaria en español.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo
  - esta gente
  lexicon: HALOT
  rationale: '''Pueblo'' preserva el valor colectivo singular de עָם y su tono profético-covenantal. ''Gente'' debilita el matiz identitario y jurídico.'
- source_word: פְּרִי מַחְשְׁבוֹתָם
  english_pob_choice: the fruit of their thoughts
  chosen_spanish: el fruto de sus pensamientos
  alternatives_spanish:
  - el fruto de sus planes
  - el resultado de sus pensamientos
  lexicon: HALOT
  rationale: Se mantiene la metáfora de fruto y la amplitud de מַחְשְׁבוֹתָם. 'Pensamientos' sigue de cerca el hebreo; 'planes' es una alternativa posible, pero estrecha el campo semántico más de lo que exige el texto.
- source_word: עַל דְּבָרַי לֹא הִקְשִׁיבוּ
  english_pob_choice: they have not listened to my words
  chosen_spanish: no han prestado atención a mis palabras
  alternatives_spanish:
  - no han escuchado mis palabras
  - no obedecieron mis palabras
  lexicon: HALOT
  rationale: הקשיב implica escuchar atentamente o prestar atención. 'Prestar atención' expresa mejor la atención concentrada que se niega aquí; 'obedecieron' iría más allá del verbo, aunque la desobediencia está implícita por el contexto.
- source_word: וְתוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  lexicon: HALOT
  rationale: En el contexto profético de denuncia del pacto, תּוֹרָה tiene fuerza normativa y judicial. 'Ley' conserva ese peso en español. 'Instrucción' sigue siendo una alternativa válida, pero menos fuerte para esta acusación.
- source_word: וַיִּמְאֲסוּ בָהּ
  english_pob_choice: they have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han despreciado
  - la han desechado
  lexicon: HALOT
  rationale: מָאַס expresa rechazo con desprecio. 'Han rechazado' es claro y fuerte sin añadir un matiz excesivamente emocional. El pronombre final se absorbe naturalmente en español por el objeto previo.
theological_decisions:
- issue: Rendering of תּוֹרָה in a covenantal prophetic accusation
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  rationale: El verso acusa al pueblo de repudiar el estándar revelado y vinculante de Yahvé. 'Ley' preserva la dimensión pactal, normativa y forense que el contexto exige. 'Instrucción' se mantiene como alternativa léxica, pero no como lectura principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registraron cambios respecto del texto inglés auditado, y la convergencia general del control cruzado fue alta.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma editorial general, pero en este versículo el nombre divino no aparece explícitamente en el hebreo; por eso no se introdujo.
  - Se evitó 'Cristo' y terminología eclesiástica no presente en el texto.
  - '''Ley'' se mantuvo como equivalente principal de תּוֹרָה por la carga covenantal del contexto profético.'
