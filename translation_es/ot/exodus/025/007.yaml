translation:
  language: es
  text: piedras de ónice[a] y piedras para engaste[b], para el efod y para el pectoral[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo puede designar una piedra preciosa distinta; la identificación exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O "piedras para montar" o "piedras para ser montadas".
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, "coraza".
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבְנֵי
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras preciosas
  - gemas
  lexicon: HALOT
  rationale: אַבְנֵי es el plural constructo de אֶבֶן, cuyo sentido básico es “piedras”. En este inventario de materiales, “piedras” conserva la base léxica y permite que el contexto determine su valor y función.
- source_word: שֹׁהַם
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - onyx
  - cornalina
  - piedra de ónice
  lexicon: HALOT
  rationale: El término hebreo tiene identificación incierta. En español, “ónice” es una forma natural y reconocible para la piedra preciosa tradicionalmente asociada al pasaje; se mantiene la cautela implícita por la incertidumbre de identificación mediante nota.
- source_word: אַבְנֵי מִלֻּאִים
  english_pob_choice: stones for setting
  chosen_spanish: piedras para engaste
  alternatives_spanish:
  - piedras para montar
  - piedras para ser montadas
  - piedras de engaste
  lexicon: HALOT
  rationale: מִלֻּאִים alude a “rellenos/engastes” y, en contexto sacerdotal, a piedras destinadas a ser montadas. “Piedras para engaste” expresa con naturalidad esa función técnica en español sin perder el matiz artesanal.
- source_word: לָאֵפֹד
  english_pob_choice: for the ephod
  chosen_spanish: para el efod
  alternatives_spanish:
  - para el ephod
  lexicon: HALOT
  rationale: אֵפוֹד es un término técnico vestimentario; en español bíblico “efod” es la transliteración más estable y comprensible.
- source_word: וְלַחֹשֶׁן
  english_pob_choice: for the breastpiece
  chosen_spanish: para el pectoral
  alternatives_spanish:
  - para el breastpiece
  - para el pecho
  lexicon: HALOT
  rationale: חֹשֶׁן designa la pieza pectoral sacerdotal que contiene las piedras. “Pectoral” comunica con claridad esa función en español y evita la posible confusión de “placa” o “coraza” que sugiere “breastplate”.
translation_notes:
  revision_awareness: El texto inglés POB mantiene una solución de equivalencia óptima con notas para la incertidumbre de שֹׁהַם, la función de מִלֻּאִים y el término técnico חֹשֶׁן. La versión española preserva esas mismas tensiones léxicas con equivalentes naturales y notas alineadas al audit trail.
  spanish_consistency_notes:
  - Se usa “efod” como transliteración técnica, en consonancia con el uso bíblico común y con el inglés POB.
  - Se usa “pectoral” en lugar de “breastplate” para evitar una lectura militar ajena al contexto sacerdotal.
  - Se mantiene “ónice” con nota de incertidumbre, reflejando la cautela del original y del POB inglés.
