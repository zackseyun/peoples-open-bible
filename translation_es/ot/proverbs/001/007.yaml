translation:
  language: es
  text: El temor[a] de Yahvé es el principio del conocimiento; los necios desprecian la sabiduría y la disciplina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reverencia a Yahvé» o «asombro ante Yahvé». La frase hebrea incluye reverencia, asombro y temor sumiso ante Dios.
    reason: lexical_alternative
  - marker: b
    text: O «instrucción» o «corrección». El término hebreo incluye formación que puede implicar corrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  english_pob_choice: fear of
  chosen_spanish: temor de
  alternatives_spanish:
  - reverencia por
  - awe de
  lexicon: HALOT
  rationale: En español, «temor de Yahvé» conserva la fuerza moral y pactal de la expresión sapiencial, sin reducirla a un simple sentimiento. «Reverencia» o «awe» captan parte del sentido, pero pueden suavizar la carga ética que el hebreo mantiene.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino en forma transliterada según la norma del proyecto. «Yahvé» evita la sustitución por un título y mantiene la referencia personal del Tetragrámaton.
- source_word: רֵאשִׁית
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - comienzo
  - primer principio
  - parte principal
  lexicon: HALOT
  rationale: «Principio» funciona bien en español sapiencial y deja abierta la doble idea de punto de partida y base fundacional. «Comienzo» es posible, pero suena un poco más temporal; las otras opciones interpretan más de la cuenta.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  lexicon: HALOT
  rationale: «Conocimiento» es la correspondencia más directa y natural en español para este sustantivo en contextos sapienciales. «Entendimiento» se acerca, pero desplaza el énfasis; «sabiduría práctica» añade interpretación.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia estándar y plenamente natural en Proverbios, manteniendo el valor ético y práctico del término.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  lexicon: HALOT
  rationale: «Disciplina» en español puede abarcar formación, corrección y entrenamiento, como el término hebreo en Proverbios. «Instrucción» pierde fuerza correctiva; «corrección» estrecha demasiado el campo semántico.
- source_word: אֱוִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: «Necios» refleja el juicio moral sapiencial mejor que un mero rasgo intelectual. «Insensatos» también es posible, pero «necios» es más sobrio y tradicionalmente apto en Proverbios.
- source_word: בָּזוּ
  english_pob_choice: despise
  chosen_spanish: desprecian
  alternatives_spanish:
  - desdeñan
  - tratan con desprecio
  lexicon: HALOT
  rationale: «Desprecian» reproduce bien la fuerza del rechazo y la desestimación que expresa el verbo. «Desdeñan» es viable, pero menos directo; «tratan con desprecio» resulta más explicativo que el hebreo.
theological_decisions:
- issue: Cómo verter la fórmula sapiencial «fear of Yahweh» sin diluir su peso teológico
  english_pob_reading: Retain the literal phrase 'fear of the LORD' in the main text.
  chosen_spanish_reading: Mantener «temor de Yahvé» en el texto principal.
  alternative_spanish_readings:
  - reverencia por Yahvé
  - awe de Yahvé
  rationale: La expresión es programática en Proverbios y combina reverencia, asombro y sumisión. En español, «temor de Yahvé» conserva esa tensión sin domesticarla; las alternativas aclaran un matiz, pero reducen la densidad teológica del hebreo.
  doctrine_reference: 'Translation philosophy §3; términos en conflicto: יְהוָה / YHWH → Yahvé'
- issue: Relación de רֵאשִׁית con דָּעַת en la sentencia
  english_pob_reading: '''the beginning of knowledge'''
  chosen_spanish_reading: «el principio del conocimiento»
  alternative_spanish_readings:
  - «el comienzo del conocimiento»
  - «el principio fundamental del conocimiento»
  rationale: '«Principio» conserva la amplitud del hebreo: inicio real y fundamento rector. «Comienzo» enfatiza solo el orden temporal, y «principio fundamental» interpreta más de lo que exige el texto.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide con la decisión auditada del inglés POB: mantener el nombre divino, conservar la fórmula sapiencial fuerte de יִרְאָה, y traducir מוּסָר con un término que abarque formación y corrección. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se usa «temor de Yahvé» en lugar de una paráfrasis interpretativa para no debilitar la fuerza sapiencial.
  - «Sabiduría» y «conocimiento» se distinguen, reflejando la estructura poética hebrea.
  - No se introdujeron notas al pie porque el texto español no requiere una alternativa textual adicional en este caso.
