    text: Or 'to your heart.' The Hebrew expression may mean that the plagues are aimed at Pharaoh himself, at the core of his being.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all the land,' if the phrase is taken more locally; here it is rendered 'earth' because the statement emphasizes the LORD's unmatched uniqueness universally.
