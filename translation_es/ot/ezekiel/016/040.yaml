review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura general: reunión hostil, apedreamiento y violencia con espada. Sin embargo, «te atravesarán» no refleja bien וּבִתְּקוּךְ, que según el expediente inglés denota cortar violentamente, incluso despedazar, no simplemente traspasar. Además, «Levantarán contra ti una asamblea» suena menos natural en español para este uso de הֶעֱלוּ; conviene una formulación que preserve la imagen sin dureza sintáctica innecesaria.'
  spanish_quality_summary: El español es claro, pero «levantar una asamblea contra ti» resulta poco idiomático en registro bíblico moderno, y «atravesarán» reduce la fuerza semántica del corte violento. Una revisión menor mejora fidelidad y naturalidad sin perder dignidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Asamblea» y «apedrearán» están bien alineadas. La principal desviación léxica está en וּבִתְּקוּךְ, donde «te harán pedazos» o similar representa mejor la decisión documentada que «te atravesarán».
  issues:
  - severity: medium
    issue: «Levantarán contra ti una asamblea» es poco natural para הֶעֱלוּ ... קָהָל
    rationale: Aunque «levantarán» intenta conservar la imagen verbal, en español «harán subir contra ti una asamblea» o «traerán contra ti una asamblea» comunica mejor la acción convocada/dirigida. El propio expediente inglés conserva como alternativa idiomática «bring an assembly against you». En español, «levantar una asamblea» suena forzado.
  - severity: high
    issue: «Te atravesarán» debilita el sentido de וּבִתְּקוּךְ
    rationale: El verbo בתק apunta a cortar, trocear o despedazar violentamente. «Atravesar» desplaza la imagen a perforación/estocada y no preserva el matiz de corte violento documentado en el POB inglés ni la tensión judicial-militar del hebreo.
  - severity: low
    issue: La nota [a] no corresponde a la mejor alternativa española
    rationale: Si se revisa el texto principal a una opción más idiomática, la nota debe ajustarse para reflejar una alternativa real y útil en español, evitando una defensa de «levantarán» que no termina de funcionar bien en el texto.
  revised_spanish_text: Harán subir contra ti una asamblea[a], te apedrearán y te harán pedazos con sus espadas[b].
  revised_footnotes:
  - marker: a
    text: 'O: «traerán contra ti una asamblea». El hebreo puede expresarse de manera más idiomática en español con «traerán contra ti» que con la forma más literal «harán subir contra ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te cortarán con sus espadas». El verbo hebreo sugiere un corte violento, incluso de despedazamiento.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «levantarán» por «harán subir» para conservar mejor la imagen verbal de הֶעֱלוּ sin la torpeza de «levantar una asamblea», dejando en nota la alternativa más idiomática «traerán contra ti». Se sustituye «te atravesarán» por «te harán pedazos» para reflejar adecuadamente el sentido violento de בתק, en línea con la alternativa documentada del POB inglés. Se mantienen «asamblea», «te apedrearán» y «con sus espadas» por su fidelidad y naturalidad.
