translation:
  text: There is a friend who turns into an enemy[a], and he will expose the quarrel that brings your disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the quarrel of your disgrace he will expose.' The Hebrew construction is terse; the translation brings out the probable sense that the dispute becomes a source of public shame.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ אוֹהֵב
  chosen: There is a friend
  alternatives:
  - There is one who loves
  - There is a lover/friend
  lexicon: HALOT
  rationale: Although אוֹהֵב literally means 'one who loves' or 'lover/friend,' in wisdom context and confirmed by the Greek φίλος, it denotes a friend rather than romantic love. 'There is a friend' is idiomatic and fits the parallel warnings about unreliable companions in the surrounding context.
- source_word: נֶהְפָּךְ לְשׂוֹנֵא
  chosen: who turns into an enemy
  alternatives:
  - who is changed into hatred
  - who becomes hateful
  - who turns into one who hates
  lexicon: HALOT
  rationale: 'The Hebrew participle/passive-reflexive sense of נהפך with לְ plus שׂוֹנֵא conveys a reversal of relationship: a friend becoming an enemy. The Greek μετατιθέμενος εἰς ἔχθραν supports the sense of changing over into enmity. ''Turns into an enemy'' is clear modern English.'
- source_word: רִיב
  chosen: the quarrel
  alternatives:
  - the dispute
  - the contention
  - the lawsuit/case
  lexicon: HALOT
  rationale: רִיב can denote strife, dispute, or legal contention. Here, with the Greek μάχην and the context of a former friend publicizing shame, 'quarrel' best captures interpersonal conflict without over-legalizing the line.
- source_word: חֶרְפָּתְךָ
  chosen: that brings your disgrace
  alternatives:
  - of your disgrace
  - your reproach
  - your shame
  lexicon: HALOT
  rationale: 'The construct relation is compressed in Hebrew and mirrored by Greek ὀνειδισμοῦ σου. A wooden rendering like ''the quarrel of your disgrace'' is awkward in English. ''The quarrel that brings your disgrace'' expresses the likely sense: the conflict becomes a source of public shame.'
- source_word: יַחְשֹׂף
  chosen: he will expose
  alternatives:
  - he will uncover
  - he will reveal
  - he will make known
  lexicon: HALOT
  rationale: חשׂף means to uncover or expose. The Greek ἀποκαλύψει confirms disclosure. 'Expose' fits the hostile action of making a shameful dispute public.
