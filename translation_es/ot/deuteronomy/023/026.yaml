review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: cláusula casuística con «Cuando», permiso limitado de tomar manualmente y prohibición de aplicar una hoz a la mies ajena. También preserva la especificidad de קָמָה como grano/mies en pie y de מְלִילֹת como espigas/cabezas de grano. Sin embargo, las notas al pie están desalineadas con sus anclajes: [a] está colocado sobre «mies en pie» pero explica «heads/espigas», mientras que [b] está sobre «tu mano» y sí corresponde. Además, «sobre la mies en pie» es entendible, pero «a la mies en pie» o «contra» sería menos espacialmente literal y más idiomático; aun así, no es un error grave.'
  spanish_quality_summary: 'El español es legible, digno y bastante natural. «Mies en pie» y «prójimo» son comprensibles en registro bíblico, aunque algo más literarios que «grano en pie» o «vecino». El principal problema de calidad es técnico-editorial: la nota [a] debe moverse a «espigas», no a «mies en pie». También conviene ajustar ligeramente la redacción de la segunda mitad para mayor naturalidad: «no le pondrás la hoz a la mies en pie de tu prójimo».'
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé, Mesías, Espíritu, etc. La elección de «prójimo» para רֵעֶךָ es defendible y coherente con el razonamiento documentado. «Espigas» para מְלִילֹת y «hoz» para חֶרְמֵשׁ están bien alineados con la evidencia léxica.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al sintagma equivocado.
    rationale: La nota [a] explica una alternativa para מְלִילֹת ('heads/ears of grain'), es decir, «espigas», pero en el texto está colocada en «mies en pie». Esto rompe la correspondencia exigida entre anclaje y contenido.
  - severity: low
    issue: La frase «poner la hoz sobre la mies» suena algo menos natural en español que otras opciones cercanas.
    rationale: Aunque reproduce razonablemente la revisión inglesa y el valor de עַל, en español bíblico-natural suele sonar mejor «poner la hoz a la mies» o «usar la hoz sobre la mies». Es una mejora estilística menor, no un fallo de fidelidad.
  revised_spanish_text: Cuando entres en la mies en pie de tu prójimo, podrás arrancar espigas[a] con tu mano[b], pero no le pondrás la hoz a la mies en pie de tu prójimo.
  revised_footnotes:
  - marker: a
    text: O «cabezas de grano» o «espigas de grano»; la expresión hebrea se refiere a la parte del cereal que puede arrancarse a mano.
    reason: lexical_alternative
  - marker: b
    text: O «a mano»; el hebreo subraya que la acción permitida es manual, no con herramienta.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda a «espigas», que es el término explicado por la nota del inglés POB. También se suaviza la segunda mitad a un español más natural («no le pondrás la hoz a...»), manteniendo el mismo sentido legal y la cercanía al hebreo documentado.
