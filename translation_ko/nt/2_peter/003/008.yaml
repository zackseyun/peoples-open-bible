id: 2PE.3.8
reference: 2 Peter 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἓν δὲ τοῦτο μὴ λανθανέτω ὑμᾶς, ἀγαπητοί, ὅτι μία ἡμέρα παρὰ κυρίῳ ὡς χίλια ἔτη καὶ χίλια ἔτη ὡς ἡμέρα μία.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/008.yaml
  text: 'But do not let this one thing escape your notice[a], beloved: with the Lord one day is like a thousand years[c][b], and a thousand years like one day.'
  footnotes:
  - marker: a
    text: Or 'do not be unaware of this one thing.'
    reason: lexical_alternative
  - marker: b
    text: The comparison uses 'like/as,' expressing analogy rather than a literal equation of one day with a thousand years.
    reason: cultural_note
  - marker: c
    text: Echoing Psalm 90:4.
    reason: cross_reference
translation:
  language: ko
  text: '사랑하는 자들이여, 이 한 가지를 잊지 마십시오: 야훼[a] 앞에서는 하루가 천 년 같고 천 년이 하루 같습니다[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 구절은 시편 90:4를 반영하며, 헬라어 κύριος는 여기서 구약의 YHWH(야훼)를 가리킨다. 본 번역은 YHWH 인용/암시 문맥에서 κύριος를 「야훼」로 옮기는 프로젝트 정책을 따른다.
    reason: cross_reference
  - marker: b
    text: 비교는 「~같이/~처럼」으로, 하루와 천 년의 문자적 동일시가 아니라 유비를 표현한다.
    reason: cultural_note
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  - 주님
  lexicon: BDAG
  rationale: 본 구절은 시편 90:4를 인용·반영하며 κύριος는 YHWH를 가리킨다. 용어집 정책에 따라 「야훼」로 옮긴다.
theological_decisions:
- issue: 3:8의 κύριος를 「주」가 아닌 「야훼」로 옮길 것인가
  chosen_reading: 야훼 (시 90:4 인용 문맥)
  alternative_readings:
  - 주 (예수께 적용 가능)
  rationale: 시편 90:4를 직접 반영하는 본 구절의 κύριος는 구약 YHWH를 가리킨다. 베드로후서의 다른 곳에서 κύριος가 예수를 가리킬 때 「주」로 옮긴 것과 구별하여, 여기서는 인용 문맥의 본래 지시 대상을 보존한다. 용어집의 「κύριος (= YHWH) → 야훼」 규칙 적용.
  doctrine_reference: 'Glossary: κύριος (=YHWH); LXX citation policy'
