id: LUK.3.4
reference: Luke 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὡς γέγραπται ἐν βίβλῳ λόγων Ἠσαΐου τοῦ ⸀προφήτου· Φωνὴ βοῶντος ἐν τῇ ἐρήμῳ· Ἑτοιμάσατε τὴν ὁδὸν κυρίου, εὐθείας ποιεῖτε τὰς τρίβους αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/003/004.yaml
  text: 'as it is written in the book of the words of Isaiah the prophet[a], “A voice of one crying in the wilderness: ‘Prepare the way of the Lord[b]; make his paths straight.’”'
  footnotes:
  - marker: a
    text: Or, “the LORD.” The quotation echoes Isaiah 40:3, where the Hebrew has the divine name YHWH.
    reason: alternative_reading
  - marker: b
    text: 'The phrase “in the wilderness” may be understood with “crying” as here, or with the command that follows: “A voice of one crying, ‘In the wilderness prepare the way of the Lord.’”'
    reason: alternative_reading
translation:
  language: ko
  text: 예언자 이사야의 책에 기록된 그대로입니다. 「광야에서 외치는 자의 소리가 있어, 야훼[a]의 길을 예비하라, 그분의 길을 곧게 하라.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 사 40:3의 LXX 인용. 본문의 「κυρίου」는 야훼를 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: τὴν ὁδὸν κυρίου
  english_pob_choice: the way of the Lord
  chosen_korean: 야훼의 길
  alternatives_korean:
  - 주의 길
  lexicon: BDAG
  rationale: 사 40:3의 「YHWH의 길」을 직접 인용하므로 야훼로 옮긴다.
theological_decisions:
- issue: 누가 3:4-6의 사 40:3-5 LXX 인용
  chosen_reading: 사 40 인용 전체를 「야훼」 정책과 LXX 양식의 한국어 시적 운율로 옮긴다
  alternative_readings:
  - 전통적 「주」 일관 사용
  rationale: 누가는 사 40을 마가복음보다 길게 확장하여 6절 「모든 육체가 하나님의 구원을 보리라」까지 인용한다. 이는 누가의 만민 구원 주제(사 49:6)와 직접 연결되며, 본문 의도를 위해 OT 정형을 살린다.
  doctrine_reference: 'DOCTRINE.md: OT citation policy'
