id: 2CO.3.7
reference: 2 Corinthians 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰ δὲ ἡ διακονία τοῦ θανάτου ἐν ⸀γράμμασιν ⸀ἐντετυπωμένη λίθοις ἐγενήθη ἐν δόξῃ, ὥστε μὴ δύνασθαι ἀτενίσαι τοὺς υἱοὺς Ἰσραὴλ εἰς τὸ πρόσωπον Μωϋσέως διὰ τὴν δόξαν τοῦ προσώπου αὐτοῦ τὴν καταργουμένην,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/007.yaml
  text: But if the ministry of death, engraved in letters on stones, came with glory, so that the sons of Israel were not able to gaze at Moses' face because of the glory of his face, which was fading away,
  footnotes:
  - marker: a
    text: Or "which was being brought to an end" or "which was passing away."
    reason: alternative_reading
  - marker: b
    text: '"The sons of Israel" could be rendered "the Israelites," but the masculine expression is retained to reflect the Greek more closely.'
    reason: lexical_alternative
translation:
  language: ko
  text: 죽음의 사역, 곧 돌에 새겨진 문자로 된 그 사역도 영광 가운데 임하였습니다. 그래서 이스라엘 자손이 모세의 얼굴에 서린 영광 — 사라져 가는 영광 — 때문에 모세의 얼굴을 똑바로 바라볼 수 없었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διακονία
  english_pob_choice: ministry
  chosen_korean: 사역
  alternatives_korean:
  - 직분
  lexicon: BDAG
  rationale: 본 장의 핵심 어휘 διακονία는 「사역」으로 통일.
- source_word: ἐντετυπωμένη λίθοις
  english_pob_choice: engraved on stones
  chosen_korean: 돌에 새겨진
  alternatives_korean:
  - 돌에 인 친
  lexicon: BDAG
  rationale: ἔντυπος는 「새겨진·각인된」. 출애굽기의 돌판에 새겨진 십계명을 가리킨다.
- source_word: δόξῃ / δόξαν
  english_pob_choice: glory
  chosen_korean: 영광
  alternatives_korean: []
  lexicon: BDAG
  rationale: 본 단락의 핵심 어휘. 일관되게 「영광」.
- source_word: ἀτενίσαι
  english_pob_choice: gaze
  chosen_korean: 똑바로 바라보다
  alternatives_korean:
  - 응시하다
  lexicon: BDAG
  rationale: ἀτενίζω는 지속적으로 똑바로 응시함.
- source_word: καταργουμένην
  english_pob_choice: fading away
  chosen_korean: 사라져 가다
  alternatives_korean:
  - 폐하여지다
  - 소멸되다
  lexicon: BDAG
  rationale: καταργέω는 「무력화되다·끝나다」. 모세 얼굴 영광의 일시성을 표현.
