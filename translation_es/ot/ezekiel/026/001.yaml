translation:
  language: es
  text: 'Y aconteció en el undécimo año[a], el primer día del mes, que la palabra de Yahvé vino a mí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el primero del mes», una fórmula de fecha estándar que significa el primer día del mes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un episodio fechado; «aconteció» conserva el giro discursivo bíblico sin sonar mecánico ni excesivamente arcaico.
- source_word: בְּעַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eleventh year
  chosen_spanish: en el undécimo año
  alternatives_spanish:
  - en año once
  - en el año once
  lexicon: HALOT
  rationale: La construcción fechada del hebreo se expresa de manera natural en español como «en el undécimo año», manteniendo el valor ordinal del numeral compuesto.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: en el primer día del mes
  alternatives_spanish:
  - el primero del mes
  - en el primero del mes
  lexicon: HALOT
  rationale: El hebreo usa una fórmula cronológica fija que literalmente es «en uno del mes»; en español, la equivalencia clara y fiel es «en el primer día del mes».},{
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión del POB de no ocultar el nombre divino tras un título. En español, «Yahvé» preserva el valor onomástico del Tetragrámaton y es la forma consistente con el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahweh'
- issue: Formula profética הָיָה דְבַר יְהוָה אֵלַי
  english_pob_reading: the word of Yahweh came to me
  chosen_spanish_reading: la palabra de Yahvé vino a mí
  alternative_spanish_readings:
  - la palabra de Yahvé llegó a mí
  - me vino la palabra de Yahvé
  rationale: Se conserva la fórmula profética estándar y la dirección de la revelación al profeta. «Vino a mí» refleja adecuadamente el hebreo y evita desplazar el centro a una reformulación más libre.
  doctrine_reference: Uso profético recurrente en Ezequiel; fórmula narrativa de revelación
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de referencia; se siguió el texto hebreo WLC y el audit trail inglés sin cambios sustantivos.
  spanish_consistency_notes:
  - «Yahvé» se usa conforme al estándar del proyecto para יְהוָה.
  - Se conserva el tono profético y fechado del original sin añadir interpretación.
  - «Aconteció» mantiene el valor narrativo de וַיְהִי en español contemporáneo culto.
