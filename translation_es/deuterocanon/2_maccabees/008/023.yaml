- from: 'También llevó a Eleazar[a]; y, después de sacar a la vista el libro santo y dar la contraseña[b]: «Ayuda de Dios», él mismo, encabezando la primera compañía, se enfrentó con Nicanor.'
  to: También presentó[a] a Eleazar; y, después de presentar el libro santo y dar la contraseña[b], «Ayuda de Dios», él mismo, encabezando la primera compañía[c], se enfrentó con Nicanor.
  rationale: Se corrige el anclaje de la nota de παραγαγών, se sustituye la expresión poco natural «sacar a la vista» por «presentó / presentar», que refleja mejor la secuencia narrativa y el valor contextual del griego, y se añade la nota sobre «primera compañía» para conservar una alternativa militar presente en la auditoría inglesa.
