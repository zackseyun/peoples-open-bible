translation:
  language: es
  text: Salomón revistió el interior de la casa con oro puro[a], y tendió cadenas de oro a través del frente del santuario interior[b][c], y lo revistió de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro refinado». La expresión hebrea dice literalmente «oro, cerrado/sellado», un giro idiomático para indicar oro de alta calidad.
    reason: lexical_alternative
  - marker: b
    text: O «delante del santuario interior». El hebreo puede describir cadenas colocadas frente al santuario interior; «a través del frente de» refleja el sentido probable con el verbo «hizo pasar».
    reason: alternative_reading
  - marker: c
    text: «Santuario interior» corresponde al debir, la cámara más interna del templo, llamada después el Lugar Santísimo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַף
  english_pob_choice: overlaid
  chosen_spanish: revistió
  alternatives_spanish:
  - cubrió
  - forró
  - placó
  lexicon: HALOT
  rationale: En el contexto de construcción del templo, צפה expresa cubrir una superficie con una capa de material precioso. «Revestir» comunica bien esa cobertura material en español, sin perder la imagen arquitectónica del original.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». En el contexto de Reyes se refiere al templo, pero conservar «casa» mantiene la forma fuente y la terminología bíblica del pasaje.
- source_word: מִפְּנִימָה
  english_pob_choice: the inside of
  chosen_spanish: el interior de
  alternatives_spanish:
  - dentro de
  - en el interior de
  lexicon: HALOT
  rationale: La forma adverbial indica el lado interior del edificio. «El interior de» es natural en español y preserva con claridad la relación espacial.
- source_word: זָהָב סָגוּר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro cerrado
  lexicon: HALOT
  rationale: La expresión hebrea describe oro de alta calidad. «Oro puro» transmite de manera idiomática ese sentido; se evita una traducción literal de «cerrado» que sería oscura en español.
- source_word: וַיְעַבֵּר
  english_pob_choice: he drew
  chosen_spanish: hizo pasar
  alternatives_spanish:
  - extendió
  - colocó
  - tendió
  lexicon: HALOT
  rationale: El verbo עבר aquí conserva su idea básica de «hacer pasar». Como el texto describe cadenas delante del santuario, «hizo pasar» refleja el movimiento sin imponer un detalle interpretativo excesivo.
- source_word: בְּרַתּוּקוֹת
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - cadenas enlazadas
  - eslabones
  - barrotes
  lexicon: HALOT
  rationale: El sustantivo raro designa algo dispuesto delante del santuario interior y, por el contexto, se entiende mejor como «cadenas». En español, esta opción es clara y coincide con la lectura contextual del POB inglés.
- source_word: לִפְנֵי הַדְּבִיר
  english_pob_choice: across the front of the inner sanctuary
  chosen_spanish: delante del santuario interior
  alternatives_spanish:
  - frente al santuario interior
  - ante el santuario interior
  - a través del frente del santuario interior
  lexicon: HALOT
  rationale: El sintagma puede indicar ubicación «delante de» más que un recorrido literal. «Delante del santuario interior» conserva la ambigüedad espacial permitida por el hebreo y resulta fluido en español.
- source_word: הַדְּבִיר
  english_pob_choice: the inner sanctuary
  chosen_spanish: el santuario interior
  alternatives_spanish:
  - el lugar santísimo
  - la cámara interior
  - el santo de los santos
  lexicon: HALOT
  rationale: Debir se refiere a la cámara interna del templo. «Santuario interior» comunica el sentido sin forzar la terminología posterior de «Lugar Santísimo» en el texto principal.
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: overlaid it
  chosen_spanish: lo revistió
  alternatives_spanish:
  - lo cubrió
  - lo placó
  lexicon: HALOT
  rationale: El sufijo pronominal vuelve al objeto inmediato del contexto, y el verbo repite la idea de revestimiento con oro. «Lo revistió» mantiene coherencia con la primera cláusula y con la imagen constructiva.
theological_decisions:
- issue: Terminología del templo para הַבַּיִת y הַדְּבִיר
  english_pob_reading: the house / the inner sanctuary
  chosen_spanish_reading: la casa / el santuario interior
  alternative_spanish_readings:
  - el templo / el Lugar Santísimo
  - la casa / la cámara interior
  rationale: Se conserva la literalidad de «casa» para הַבַּיִת y se traduce דְּבִיר como «santuario interior» para evitar imponer una etiqueta litúrgica posterior en el texto principal. La nota permite identificar la referencia tradicional sin desplazar el léxico del hebreo.
  doctrine_reference: Terminología del templo en 1 Reyes 6; uso contextual de debir como cámara interna del santuario.
- issue: זָהָב סָגוּר como calidad del oro
  english_pob_reading: pure gold / refined gold
  chosen_spanish_reading: oro puro
  alternative_spanish_readings:
  - oro refinado
  - oro cerrado
  rationale: El hebreo presenta una expresión idiomática sobre oro de calidad superior. «Oro puro» comunica el valor y evita una traducción opaca, sin perder la tensión lexical documentada por el POB inglés.
  doctrine_reference: Lexema descriptivo de calidad material; sin implicación doctrinal directa.
- issue: לִפְנֵי הַדְּבִיר con el verbo וַיְעַבֵּר
  english_pob_reading: across the front of the inner sanctuary
  chosen_spanish_reading: delante del santuario interior
  alternative_spanish_readings:
  - a través del frente del santuario interior
  - frente al santuario interior
  rationale: El hebreo permite entender una colocación en la zona frontal del debir. En español, «delante de» preserva la relación espacial sin comprometerse más de lo que el texto exige; la nota puede expresar la alternativa de un movimiento «a través del frente».
  doctrine_reference: Descripción arquitectónica del templo; sin tensión doctrinal.
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado del POB inglés más reciente, que fue aprobado como de alta concordancia y sin revisiones aplicadas. Se mantiene la decisión de traducir el hebreo con equivalencia óptima, conservando la ambigüedad espacial de לִפְנֵי הַדְּבִיר y la expresión idiomática de זָהָב סָגוּר mediante una nota lexicográfica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque el texto no contiene el tetragrámaton ni una cita explícita de su nombre.
  - Se prefiere «revistió»/«lo revistió» para coherencia interna con la cobertura metálica del templo en esta unidad textual.
  - «Santuario interior» se usa de manera consistente para debir en el texto principal; la identificación tradicional queda en nota.
  - La puntuación y el orden de cláusulas buscan reproducir la estructura coordinada del hebreo sin sonar forzados en español.
