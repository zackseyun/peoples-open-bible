  to: Su fuerza está consumida por el hambre, y la calamidad está lista[a] a su lado.
  rationale: Se reemplaza «está hambrienta» por «está consumida por el hambre» para expresar de manera más natural y clara en español la idea de hambre extrema aplicada metafóricamente a la fuerza/vigor. Se conserva la estructura del versículo, el registro poético y la alternativa léxica documentada para לְצַלְעוֹ. La nota se limpia estilísticamente y se ancla correctamente en el punto relevante del texto.
