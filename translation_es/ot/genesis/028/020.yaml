  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: Jacob hace un voto, se mantiene la condicionalidad con «Si», y se reflejan adecuadamente la presencia divina, la protección, el camino, el pan y la ropa. Sin embargo, «Si Dios estará conmigo» no es español natural para esta prótasis y debe ajustarse a «Si Dios está conmigo» o «si Dios ha de estar conmigo». Además, «por el cual voy» es entendible, pero «por donde voy» suena más natural sin perder el sentido del relativo hebreo.'
  spanish_quality_summary: El español es en general claro y digno, pero tiene una construcción futura poco natural después de «si» y una relativa algo rígida. También conviene suavizar «ropa para vestir» a una forma más idiomática como «ropa para ponerme», porque el infinitivo hebreo expresa finalidad concreta respecto de la prenda.
  glossary_alignment: 'La terminología clave está bien alineada: אֱלֹהִים -> «Dios»; נדר -> «hizo un voto»; שׁמר -> «me guardará» con alternativas adecuadas; לֶחֶם -> «pan»; בגד -> «ropa». No hay conflictos con los términos por defecto del proyecto.'
  issues:
  - severity: medium
    issue: Construcción «Si Dios estará conmigo»
    rationale: 'Aunque refleja el futuro inglés, en español estándar y bíblico legible esta forma suena poco natural en una cláusula condicional. El hebreo con אִם + yiqtol aquí se traduce mejor con presente de valor futuro: «Si Dios está conmigo».'
  - severity: low
    issue: Relativa «por el cual voy» algo rígida
    rationale: Es fiel, pero menos natural que «por donde voy» o «que recorro». Puede mejorarse sin perder correspondencia con אֲשֶׁר אָנֹכִי הוֹלֵךְ.
  - severity: low
    issue: «ropa para vestir» suena algo formular
    rationale: No es incorrecto, pero en español resulta menos idiomático que «ropa para ponerme». El hebreo ללבש apunta a la finalidad de usar la ropa.
