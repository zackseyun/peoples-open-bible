review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: una mujer casada está vinculada legalmente a su marido mientras él vive, y al morir él queda libre de ese vínculo legal. También mantiene adecuadamente el sentido general de νόμῳ como principio legal matrimonial, no necesariamente la Ley mosaica. Sin embargo, la nota al pie no preserva una alternativa real, porque repite exactamente la misma redacción ya presente en el texto principal.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «La mujer casada», «por ley», «mientras él vive» y «queda libre» funcionan bien. «Está unida» es aceptable, aunque «está ligada» podría sonar un poco más jurídico; no es necesario cambiarlo. La única reparación necesaria es la nota al pie, que debe ofrecer una alternativa genuina y no duplicar el texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, carne, etc. La elección de «por ley» concuerda con la decisión auditada sobre νόμῳ, y «de la ley de su marido» preserva la compresión genitiva del griego según la racionalidad documentada.
  issues:
  - severity: medium
    issue: La nota al pie marcada [a] no presenta una alternativa léxica real.
    rationale: 'El texto principal ya dice «queda libre de la ley de su marido», y la nota dice «O: “queda libre de la ley de su marido”». Esto incumple la función de una nota de alternativa léxica y no preserva adecuadamente la alternativa documentada en inglés («she is freed from her husband''s law» frente a «released from the law of her husband»).'
  revised_spanish_text: Porque la mujer casada está unida por ley a su marido mientras él vive; pero si el marido muere[a], queda libre de la ley de su marido.
  revised_footnotes:
  - marker: a
    text: 'O: «es liberada de la ley de su marido»; el griego probablemente alude al vínculo legal que la unía a su marido.'
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se corrige únicamente la nota al pie para que ofrezca una alternativa léxica auténtica y útil, en línea con la auditoría inglesa, en lugar de repetir exactamente la misma formulación del cuerpo del texto.
