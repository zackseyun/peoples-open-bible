translation:
  language: es
  text: Tú ciertamente has golpeado a Edom, y tu corazón se ha enaltecido[a]. Sé honrado[b], y quédate en casa. ¿Por qué provocarías una desgracia, de modo que caigas tú y Judá contigo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu corazón se ha vuelto orgulloso». El hebreo dice literalmente: «tu corazón te ha levantado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Gloríate en eso» / «jáctate». El hebreo probablemente significa tomar el honor de tu victoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּה הִכִּיתָ
  english_pob_choice: You have indeed struck
  chosen_spanish: has verdaderamente golpeado
  alternatives_spanish:
  - has ciertamente golpeado
  - has de veras golpeado
  - has realmente golpeado
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la acción. «Verdaderamente» conserva la fuerza enfática sin sobreinterpretar el resultado militar.
- source_word: אֶת אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: a Edom
  alternatives_spanish:
  - contra Edom
  - Edom
  lexicon: HALOT
  rationale: El objeto directo marca a Edom como la nación atacada.
- source_word: וּנְשָׂאֲךָ לִבֶּךָ
  english_pob_choice: your heart has lifted you up
  chosen_spanish: tu corazón se ha enaltecido
  alternatives_spanish:
  - tu corazón se ha levantado
  - tu corazón se ha vuelto orgulloso
  - te has enorgullecido
  lexicon: HALOT
  rationale: Conservo la imagen del hebreo, donde el sujeto es «corazón». «Enaltecido» transmite la autoexaltación sin borrar la metáfora.
- source_word: הִכָּבֵד
  english_pob_choice: Be honored
  chosen_spanish: Gloríate
  alternatives_spanish:
  - Honra eso
  - Sé honrado
  - Enaltece eso
  lexicon: HALOT
  rationale: El niphal imperativo aquí probablemente exhorta a tomar o disfrutar el honor de la victoria. En español, «Gloríate en eso» comunica esa idea con naturalidad y mantiene la tensión lexical entre honor y jactancia.
- source_word: וְשֵׁב בְּבֵיתֶךָ
  english_pob_choice: stay at home
  chosen_spanish: quédate en casa
  alternatives_spanish:
  - permanece en tu casa
  - siéntate en tu casa
  - quedate en tu hogar
  lexicon: HALOT
  rationale: Es un modismo exhortativo de permanecer en el propio lugar en vez de buscar más conflicto; «quédate en casa» es natural y fiel.
- source_word: וְלָמָּה תִתְגָּרֶה בְּרָעָה
  english_pob_choice: Why should you provoke disaster
  chosen_spanish: ¿Por qué te provocarías a hacer el mal?
  alternatives_spanish:
  - ¿Por qué provocarías desastre?
  - ¿Por qué te meterías en desgracia?
  - ¿Por qué te incitarías al mal?
  lexicon: HALOT
  rationale: 'Aquí hay una dificultad: רעה puede referirse a calamidad o mal. Dado el contexto de guerra y caída, la POB inglesa optó por «disaster». En español mantengo la advertencia como pregunta retórica, pero con una formulación más literal respecto de תִתְגָּרֶה y del campo semántico de רעה, sin eliminar la tensión entre «mal» y «desastre».'
- source_word: וְנָפַלְתָּה
  english_pob_choice: so that you fall
  chosen_spanish: de modo que caerías
  alternatives_spanish:
  - y caerías
  - para que caigas
  - de manera que caerás
  lexicon: HALOT
  rationale: El perfecto puede expresar el resultado esperado de la provocación. «De modo que caerías» comunica la consecuencia futura en un español fluido.
- source_word: אַתָּה וִיהוּדָה עִמָּךְ
  english_pob_choice: you and Judah with you
  chosen_spanish: tú y Judá contigo
  alternatives_spanish:
  - tú y Judá con usted
  - tú y Judá junto contigo
  - tú y Judá a tu lado
  lexicon: HALOT
  rationale: Preservo la estructura hebrea que une la caída del rey con la de Judá; «contigo» refleja la dependencia del destino nacional respecto del rey.
theological_decisions:
- issue: 'Sentido de בְּרָעָה: mal moral vs. calamidad'
  english_pob_reading: disaster
  chosen_spanish_reading: hacer el mal / calamidad amenazada
  alternative_spanish_readings:
  - desastre
  - desgracia
  - mal
  rationale: La advertencia no trata de una maldad ética abstracta, sino del resultado funesto de provocar una guerra innecesaria. Por eso el español deja abierta la tensión entre «mal» y el daño consecuente, en línea con el valor contextual de רעה.
  doctrine_reference: Sapiential and prophetic usage of רעה as calamity rather than moral evil; cf. contextual semantics in narrative Hebrew.
- issue: Implicación del orgullo del rey
  english_pob_reading: your heart has lifted you up
  chosen_spanish_reading: tu corazón se ha enaltecido
  alternative_spanish_readings:
  - te has enorgullecido
  - tu corazón ha quedado orgulloso
  - tu corazón se ha levantado
  rationale: El texto atribuye la elevación al corazón, no simplemente al ego del individuo. Mantener la metáfora evita borrar la antropología bíblica del corazón como centro interior de decisión y valoración.
  doctrine_reference: Biblical anthropology in Hebrew narrative; heart as center of will and self-perception.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que sustituyó «Glory in that» por «Be honored» para reflejar con más formalidad הִכָּבֵד. En español se optó por «Gloríate» como equivalente funcional de participación en el honor de la victoria, mientras se dejó en nota la alternativa más literal «Sé honrado» para no perder la tensión léxica. También se respetó la lectura revisada de la pregunta retórica como advertencia sobre el desastre consecuente.
  spanish_consistency_notes:
  - Se usa «Edom», «Judá» y «Yahvé» según la terminología POB, aunque este versículo no contiene el nombre divino.
  - Se conserva la metáfora de «corazón» para נשא לב.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en el versículo.
  - La pregunta retórica se mantiene en segunda persona singular para corresponder al hebreo.
