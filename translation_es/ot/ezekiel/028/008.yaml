translation:
  language: es
  text: Te harán descender a la fosa[a], y morirás la muerte de uno caído[b], en el corazón de los mares[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro» o «a la destrucción»; hebreo «a la fosa».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «las muertes de uno caído», un modismo que expresa una muerte violenta.
    reason: lexical_alternative
  - marker: c
    text: O «en medio de los mares».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשַּׁחַת
  english_pob_choice: to the pit
  chosen_spanish: al pozo
  alternatives_spanish:
  - a la fosa
  - al sepulcro
  - a la destrucción
  lexicon: HALOT
  rationale: שַׁחַת puede referirse a un pozo, fosa, sepulcro o destrucción. En español, 'pozo' conserva la imagen concreta de descenso y evita especificar más de lo que el hebreo exige aquí.
- source_word: יוֹרִד֑וּךָ
  english_pob_choice: they will bring you down
  chosen_spanish: Te harán descender
  alternatives_spanish:
  - te bajarán
  - te arrojarán abajo
  - te harán caer
  lexicon: HALOT
  rationale: 'El hiphil de ירד es causativo: ''hacer descender''. ''Te harán descender'' mantiene la causalidad y el tono profético sin añadir violencia que el verbo por sí solo no obliga.'
- source_word: וָמַתָּה
  english_pob_choice: and you will die
  chosen_spanish: y morirás
  alternatives_spanish:
  - y morirás ciertamente
  - y morirás
  lexicon: HALOT
  rationale: Forma verbal simple en discurso profético. 'Morirás' es natural en español moderno y preserva el anuncio futuro.
- source_word: מְמוֹתֵי חָלָל
  english_pob_choice: the death of one slain
  chosen_spanish: de la muerte de uno muerto[b]
  alternatives_spanish:
  - de la muerte de uno herido de muerte
  - de una muerte violenta
  - de la muerte de un muerto
  lexicon: HALOT
  rationale: El hebreo tiene un plural intensivo/idiomático ('muertes de') que expresa una muerte violenta. 'De la muerte de uno muerto' conserva la estructura extraña del original; se acompaña de nota para explicar el hebraísmo. 'Uno muerto' reproduce con literalidad el sustantivo חָלָל sin convertirlo en una paráfrasis más interpretativa.
- source_word: חָלָל
  english_pob_choice: one slain
  chosen_spanish: uno muerto
  alternatives_spanish:
  - uno muerto de arma
  - uno herido de muerte
  - uno caído
  lexicon: HALOT
  rationale: חָלָל designa a alguien abatido, muerto o mortalmente herido. 'Uno muerto' es breve y fidelísimo al valor básico; la nota explica el hebraísmo resultante en español.
- source_word: בְּלֵב יַמִּים
  english_pob_choice: in the heart of the seas
  chosen_spanish: en el corazón de los mares
  alternatives_spanish:
  - en medio de los mares
  - en lo más hondo de los mares
  lexicon: HALOT
  rationale: לֵב literalmente es 'corazón' y en sentido espacial significa centro o interior. 'Corazón de los mares' conserva la metáfora viva y coincide con el valor auditable del hebreo.
theological_decisions:
- issue: Si שַׁחַת debe llevar una equivalencia más doctrinal como 'sepulcro' o 'abismo'
  english_pob_reading: to the pit
  chosen_spanish_reading: al pozo
  alternative_spanish_readings:
  - al sepulcro
  - al abismo
  - a la destrucción
  rationale: El hebreo no obliga a una doctrina específica del más allá; 'pozo' mantiene la imagen de descenso/juicio sin importar un sentido teológico posterior. 'Sepulcro' o 'abismo' cargarían el texto con una precisión no exigida por el original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo tratar el hebraísmo intensivo 'muertes de un muerto' sin borrarlo
  english_pob_reading: the death of one slain
  chosen_spanish_reading: la muerte de uno muerto[b]
  alternative_spanish_readings:
  - una muerte violenta
  - la muerte de un caído
  rationale: La forma hebrea expresa muerte violenta de manera enfática. En español, una equivalencia lisa como 'muerte violenta' aclararía el sentido pero borraría la tensión formal. Se conserva la rareza con nota para no perder el valor estilístico y lexical del original.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El audito inglés quedó en alta concordancia (0.95) y no requirió cambios de fondo; la redacción española sigue de cerca las decisiones lexicográficas y conserva las tensiones documentadas, especialmente שַׁחַת y מְמוֹתֵי חָלָל.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino según la norma del proyecto; este versículo no lo contiene.
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se preservó la metáfora espacial de 'corazón' para לֵב y la nota aclara la alternativa espacial 'en medio de'.
  - La secuencia de notas sigue el orden del texto y no reutiliza marcadores.
