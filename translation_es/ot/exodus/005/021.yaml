    rationale: La nota [a] explica הִבְאַשְׁתֶּם אֶת רֵיחֵנוּ («han hecho apestar nuestro olor»), pero en el borrador está anclada a «Yahvé». Eso rompe la correspondencia exigida entre nota y palabra/frase relevante.
  - severity: medium
    issue: Calco poco natural en «en los ojos de Faraón»
    rationale: Aunque intenta preservar בְּעֵינֵי, en español esta formulación suena forzada. «Ante los ojos de» conserva la imagen perceptiva y mejora la legibilidad sin paraprasear.
  - severity: low
    issue: Pronombre explícito innecesario en «Y ellos les dijeron»
    rationale: El hebreo no exige énfasis en el sujeto, y en español narrativo «Y les dijeron» es más natural. No afecta gravemente el sentido, pero mejora el estilo.
