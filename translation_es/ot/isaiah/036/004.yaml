translation:
  language: es
  text: 'Entonces el Rabsaqué les dijo[a]: «Por favor, digan a Ezequías: “Así dice el gran rey, el rey de Asiria: ¿Qué es esta confianza en la que has confiado[b]?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rabsaqué» probablemente es un título oficial asirio; las opciones incluyen «jefe de los coperos» u otro alto funcionario cortesano o militar.
    reason: cultural_note
  - marker: b
    text: 'O: «¿Qué es esta confianza que has puesto?» El hebreo usa un sustantivo y un verbo de la misma raíz para dar énfasis retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el jefe de los coperos
  - el comandante de campo
  lexicon: HALOT
  rationale: Se conserva el título histórico transliterado, porque el cargo asirio es discutido y el POB inglés también lo trata como designación/título propio. «Rabsaqué» mantiene la referencia cultural sin forzar una equivalencia funcional incierta.
- source_word: אִמְרוּ נָא
  english_pob_choice: Please say
  chosen_spanish: Por favor, digan
  alternatives_spanish:
  - Digan, por favor
  - Les ruego que digan
  lexicon: HALOT
  rationale: El imperativo plural con נָא expresa una súplica cortés o atenuada. «Por favor» conserva ese matiz en español moderno y sobrio.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jizquías
  lexicon: nombre propio bíblico estándar
  rationale: Se usa la forma castellana bíblica asentada, inteligible en registro eclesial amplio.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula mensajera/profética se reproduce con una forma natural en español que mantiene el tono solemne e inmediatamente reconocible.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el rey grande
  - el poderoso rey
  lexicon: HALOT
  rationale: «Gran rey» refleja el título regio asirio sin añadir matices ajenos. Se evita «poderoso» porque el hebreo destaca la grandeza titulary más que la fuerza.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Se conserva la relación posesiva normal en español y el paralelismo del original, que repite «rey» como parte del estilo diplomático/propagandístico.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál
  lexicon: HALOT
  rationale: Interrogativo directo para abrir la pregunta retórica del desafío.
- source_word: הַבִּטָּחוֹן הַזֶּה
  english_pob_choice: this confidence
  chosen_spanish: esta confianza
  alternatives_spanish:
  - esta seguridad
  - esta confianza en que te apoyas
  lexicon: HALOT
  rationale: «Confianza» es el equivalente natural del sustantivo hebreo y preserva la fuerza nominal del insulto/retórica del texto.
- source_word: אֲשֶׁר בָּטָחְתָּ
  english_pob_choice: that you have trusted in
  chosen_spanish: que has puesto
  alternatives_spanish:
  - en la que has confiado
  - en que has confiado
  - en la que te apoyas
  lexicon: HALOT
  rationale: Se traduce el verbo de la raíz בטח con una construcción idiomática en español que evita la repetición pesada de «confiar» tras el sustantivo «confianza», pero mantiene la idea de haber depositado la confianza en algo. El anclaje queda en la nota para recordar la correspondencia cognada del hebreo.
theological_decisions:
- issue: La autoafirmación imperial «el gran rey»
  english_pob_reading: the great king
  chosen_spanish_reading: el gran rey
  alternative_spanish_readings:
  - el poderoso rey
  - el rey, el grande
  rationale: Se conserva el título propagandístico asirio tal como aparece en el original; no se suaviza ni se espiritualiza, porque la frase sirve al desafío político del pasaje.
  doctrine_reference: No aplica; título histórico y retórico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó la cláusula final a una formulación más natural («that you have trusted in») sin perder el juego cognado hebreo; por eso el español evita una calca rígida y usa una construcción idiomática que sigue expresando la confianza depositada en algo. También se respetó el tratamiento del título asirio como designación histórica transliterada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - «Rabsaqué» se capitaliza como título propio en contexto narrativo, alineado con su función histórica.
  - Se preserva el paralelismo retórico del hebreo entre el sustantivo «confianza» y el verbo de confiar, aunque el verbo español se expanda a una expresión más natural.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no pertinentes al versículo.
