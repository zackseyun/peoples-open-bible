translation:
  language: es
  text: Los que habían quedado en la ciudad quedaron desconcertados y salieron corriendo[a], sin tener claro lo que estaba ocurriendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «teniendo por incierto lo que estaba ocurriendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κατὰ τὴν πόλιν ἀπολειπόμενοι
  english_pob_choice: Those left behind in the city
  chosen_spanish: Los que habían quedado en la ciudad
  alternatives_spanish:
  - los que permanecían en la ciudad
  - los que habían sido dejados en la ciudad
  lexicon: LSJ
  rationale: La frase participial indica a quienes quedaron en la ciudad; «habían quedado» conserva la idea de resultado/pasividad sin sonar forzado en español.
- source_word: ταραχθέντες
  english_pob_choice: were thrown into confusion
  chosen_spanish: se llenaron de confusión
  alternatives_spanish:
  - fueron perturbados
  - se turbaron
  - quedaron alarmados
  lexicon: LSJ
  rationale: El aoristo pasivo expresa una conmoción causada por el acontecimiento. «Se llenaron de confusión» comunica bien la agitación pública y mantiene un tono natural.
- source_word: ἐξεπήδησαν
  english_pob_choice: rushed out
  chosen_spanish: salieron corriendo
  alternatives_spanish:
  - saltaron afuera
  - salieron de golpe
  - se precipitaron afuera
  lexicon: LSJ
  rationale: El verbo sugiere salida súbita; «salieron corriendo» conserva la rapidez y la brusquedad en español actual.
- source_word: ἄδηλον τιθέμενοι τὸ γινόμενον
  english_pob_choice: being uncertain about what was happening
  chosen_spanish: en incertidumbre acerca de lo que estaba ocurriendo
  alternatives_spanish:
  - considerando incierto lo que estaba ocurriendo
  - sin saber lo que estaba ocurriendo
  - teniendo por incierto lo que acontecía
  lexicon: LSJ
  rationale: La expresión literal es «considerando incierto lo que sucedía». «En incertidumbre acerca de» preserva la idea de falta de claridad reconocida por ellos, reflejando la revisión inglesa desde «not knowing» a «being uncertain about».
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «not knowing what was happening» a «being uncertain about what was happening» para acercarse más a ἄδηλον τιθέμενοι. La redacción española adopta esa misma matización, evitando reducirla a una simple negación del conocimiento.
  spanish_consistency_notes:
  - Se mantiene «ciudad» para πόλις en un sentido literal y contextual.
  - Se preserva la pasividad/resultatividad donde el griego la sugiere, sin volver la frase excesivamente literal.
  - «En incertidumbre» refleja la cualidad de incertidumbre más que un simple acto de ignorancia momentánea.
