id: ISA.21.8
reference: Isaiah 21:8
source:
  edition: WLC
  text: וַ/יִּקְרָ֖א אַרְיֵ֑ה עַל מִצְפֶּ֣ה אֲדֹנָ֗/י אָנֹכִ֞י עֹמֵ֤ד תָּמִיד֙ יוֹמָ֔ם וְ/עַל מִ֨שְׁמַרְתִּ֔/י אָנֹכִ֥י נִצָּ֖ב כָּל הַ/לֵּילֽוֹת־׀־־׃
translation:
  text: Then he cried[a], “A lion! On the watchtower, my lord, I stand continually by day[b], and at my post I am stationed all the nights.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “A lion!” or “Lion!” The phrase is difficult; the main text renders it as an exclamatory comparison to preserve the Masoretic reading in intelligible English.
    reason: alternative_reading
  - marker: b
    text: Or “every night” / “all night long.” Hebrew has the plural, “all the nights.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then he cried
  alternatives:
  - Then he called
  - Then he proclaimed
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא commonly means 'call out/cry out.' 'Cried' fits the report of an urgent exclamation better than the flatter 'called.' 'Then' reflects the narrative wayyiqtol sequence.
- source_word: אַרְיֵה
  chosen: Like a lion!
  alternatives:
  - A lion!
  - Lion!
  lexicon: HALOT
  rationale: The Hebrew noun literally means 'lion.' This verse is textually and syntactically difficult; many understand the cry as comparing the watchman's shout to that of a lion, hence 'Like a lion!' This preserves the Masoretic reading while yielding intelligible English. The more literal alternatives are preserved in a footnote because the phrase is disputed.
- source_word: עַל מִצְפֶּה
  chosen: On the watchtower
  alternatives:
  - Upon a lookout
  - At the watchpost
  lexicon: HALOT
  rationale: מִצְפֶּה denotes a lookout point/watchtower. 'On the watchtower' is natural English and fits the image of a sentinel stationed at elevation.
- source_word: אֲדֹנָי
  chosen: my lord
  alternatives:
  - Lord
  - sir
  lexicon: HALOT
  rationale: With 1cs suffix, this is 'my lord/master,' addressed to the superior receiving the report, not the divine name. Lowercase avoids confusing it with the title for God.
- source_word: אָנֹכִי
  chosen: I
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis; English can convey this adequately with explicit 'I' in both clauses.
- source_word: עֹמֵד
  chosen: stand
  alternatives:
  - am standing
  lexicon: HALOT
  rationale: Participle expresses ongoing posture. Simple present 'stand' communicates the durative sense in idiomatic English.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - constantly
  - regularly
  lexicon: HALOT
  rationale: תמיד indicates uninterrupted or habitual continuance. 'Continually' best matches the watchman's persistent vigilance.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - all day
  lexicon: HALOT
  rationale: The adverb means 'by day/daytime.' 'By day' pairs well with the following nighttime expression.
- source_word: וְעַל מִשְׁמַרְתִּי
  chosen: and at my post
  alternatives:
  - and at my guardpost
  - and on my watch
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת can mean guard duty, watch, or post. 'At my post' is concise and idiomatic while preserving the military/sentinel setting.
- source_word: נִצָּב
  chosen: I am stationed
  alternatives:
  - I stand
  - I am posted
  lexicon: HALOT
  rationale: The Niphal participle conveys being set/placed in position. 'I am stationed' brings out the passive/resultative nuance better than simply repeating 'stand.'
- source_word: כָּל הַלֵּילוֹת
  chosen: all the nights
  alternatives:
  - every night
  - all night long
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew. 'All the nights' preserves the form, likely expressing repeated nightly vigilance rather than a single night; smoother alternatives are noted in the footnote.
