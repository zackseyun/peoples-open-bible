  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: petición volitiva de Jacob, recorrido por el rebaño, separación de animales marcados, contraste entre ovejas y cabras, y cierre sobre el salario. Sin embargo, no preserva una nota léxica importante del POB inglés sobre חוּם (''oscuro'' / ''marrón''), y una formulación puede afinarse para reflejar mejor la serie nominal hebrea.'
  spanish_quality_summary: El español es claro y bastante natural. 'Deja que pase', 'rebaño', 'apartando de allí' y 'mi salario' funcionan bien. No obstante, 'todo animal de color oscuro entre las ovejas' es menos preciso y menos elegante que una formulación que mantenga la referencia ganadera explícita dentro de la serie. También conviene añadir la nota sobre 'marrón' para no perder el matiz auditado.
  glossary_alignment: 'No hay términos teológicos de proyecto implicados. Las decisiones léxicas principales están alineadas: צֹאן -> ''rebaño'', נָקֹד -> ''moteada'', טָלוּא -> ''manchada'', שְׂכָרִי -> ''mi salario''. La excepción relevante es que falta preservar en nota la alternativa documentada para חוּם.'
