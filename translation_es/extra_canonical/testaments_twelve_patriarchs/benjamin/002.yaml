translation:
  language: es
  text: '1 Y cuando bajamos a Egipto[a], José mi hermano me reconoció y me dijo: «Mancharon tu túnica con sangre y dijeron: ‹Mira si esta es la túnica de tu hijo›».


    2 Y me dijo: «Sí, hermano. Pues cuando los ismaelitas me llevaron, uno de ellos me despojó de mi túnica y me dio un taparrabo; y después de azotarme, me ordenó correr.


    3 Y mientras él se alejaba para esconder mi vestidura, un león salió a su encuentro y lo mató[b].


    4 Así sus compañeros, atemorizados, me vendieron a otros de su grupo[c].


    5 Y ellos mismos no mintieron al decir estas cosas; pues él quería ocultarme los hechos de nuestros hermanos.


    6 Y llamó a sí a sus hermanos y dijo:


    7 ‹No digan a mi padre lo que me hicieron, sino hablen así, tal como expliqué a Benjamín.


    8 Y que tales pensamientos[d] sean en ustedes, y que estas palabras no lleguen al corazón de mi padre…›»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testimonios leen más explícitamente: «La enviaron y dijeron: ‹Mira si esta es la túnica de tu hijo›».'
    reason: textual_variant
  - marker: b
    text: Otros testigos formulan el episodio de modo distinto, pero todos conservan el sentido de que el hombre que llevaba la prenda de José fue muerto por una bestia salvaje, comúnmente un león.
    reason: textual_variant
  - marker: c
    text: Algunos manuscritos leen que lo vendieron a ismaelitas; otros, como aquí, a otros mercaderes de su grupo.
    reason: textual_variant
  - marker: d
    text: El texto griego se interrumpe aquí. La frase inacabada se ha dejado incompleta en lugar de reconstruirla.
    reason: textual_variant
lexical_decisions:
- source_word: ἐγνώρισέ με
  english_pob_choice: recognized me
  chosen_spanish: me reconoció
  alternatives_spanish:
  - se dio a conocer a mí
  - me distinguió
  lexicon: LSJ
  rationale: En contexto, José identifica a Benjamín al llegar a Egipto. 'Me reconoció' es lo más natural en español para identificación personal.
- source_word: ἔφυραν
  english_pob_choice: smeared
  chosen_spanish: mancharon
  alternatives_spanish:
  - embadurnaron
  - mezclaron
  - tiñeron
  lexicon: LSJ
  rationale: El verbo significa literalmente mezclar/amasar, pero con sangre sobre una vestidura el sentido contextual es manchar o untar. 'Mancharon' conserva la viveza física.
- source_word: χιτών
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  - vestido
  lexicon: LSJ
  rationale: Cognado natural en español; conserva el referente del relato de Génesis 37.
- source_word: περίζωμα
  english_pob_choice: loincloth
  chosen_spanish: taparrabo
  alternatives_spanish:
  - paño
  - ceñidor
  - cinturón
  lexicon: LSJ
  rationale: El término denota una tela alrededor de los lomos. 'Taparrabo' es claro y concreto en español moderno.
- source_word: φραγελλώσας
  english_pob_choice: after flogging me
  chosen_spanish: después de azotarme
  alternatives_spanish:
  - después de flagelarme
  - después de golpearme con un látigo
  lexicon: LSJ
  rationale: El participio describe golpiza física. 'Azotarme' es fuerte y legible y conserva la brutalidad.
- source_word: τρέχειν
  english_pob_choice: to run
  chosen_spanish: correr
  alternatives_spanish:
  - que corriera
  lexicon: LSJ
  rationale: Infinitivo tras εἶπε naturalmente se traduce 'me ordenó correr'.
- source_word: ὑπήντησεν αὐτῷ λέων
  english_pob_choice: a lion met him
  chosen_spanish: un león salió a su encuentro
  alternatives_spanish:
  - un león se topó con él
  - un león lo encontró
  lexicon: LSJ
  rationale: El idioma es vívido y narrativo. 'Salió a su encuentro' conserva la fuerza simple del griego antes de la acción de matar.
- source_word: ἀνεῖλεν
  english_pob_choice: killed
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo dio muerte
  - lo destruyó
  lexicon: LSJ
  rationale: '''Mató'' es directo y legible; alternativas más arcaicas no encajan con la filosofía de traducción.'
- source_word: μέτοχοι
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - asociados
  - socios
  lexicon: LSJ
  rationale: Se refiere a los compañeros del hombre en el grupo de comerciantes. 'Compañeros' suena natural en contexto narrativo.
- source_word: διαπωλοῦσί με
  english_pob_choice: sold me
  chosen_spanish: me vendieron
  alternatives_spanish:
  - me traspasaron
  - me revendieron
  lexicon: LSJ
  rationale: El verbo compuesto intensifica la venta comercial, pero 'me vendieron' encaja mejor en la narrativa española conservando el significado central.
- source_word: τὰ ἔργα τῶν ἀδελφῶν
  english_pob_choice: the deeds of our brothers
  chosen_spanish: las obras de nuestros hermanos
  alternatives_spanish:
  - las acciones de nuestros hermanos
  - lo que nuestros hermanos habían hecho
  lexicon: LSJ
  rationale: ἔργα aquí señala actos concretos. 'Obras' conserva el peso moral y el tono testamentario.
- source_word: ἐξηγησάμην
  english_pob_choice: I explained
  chosen_spanish: expliqué
  alternatives_spanish:
  - relaté
  - narré
  lexicon: LSJ
  rationale: El verbo indica narrar o explicar. 'Expliqué' es claro y encaja con la instrucción de José.
- source_word: ἔννοιαι
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - intenciones
  - disposiciones
  lexicon: LSJ
  rationale: El sustantivo concierne disposiciones internas. 'Pensamientos' es suficientemente amplio y permite la fuerza parenética de la orientación moral interior.
theological_decisions:
- issue: Inestabilidad textual en todo el capítulo, especialmente vv. 1-5 y el final fragmentario en v. 8
  chosen_reading: Traducir la narrativa principal a partir del testimonio griego más completo representado en el aparato proporcionado, conservando con honestidad el final truncado en lugar de reconstruir más allá del texto extante.
  alternative_readings:
  - Formas más cortas que omiten el motivo de ocultamiento de José
  - Lecturas donde el episodio del león se formula de modo distinto o la venta se hace de nuevo a los ismaelitas
  rationale: El capítulo sobrevive en formas divergentes en el aparato. La secuencia más completa produce una narrativa coherente y la transición parenética, pero la cláusula final está claramente incompleta en el texto provisto, por lo que la traducción termina suspendida en lugar de completarse conjeturalmente.
  doctrine_reference: 'PHILOSOPHY.md: transparencia y primacía del idioma original'
- issue: Ocultamiento por José de la culpa de los hermanos
  chosen_reading: Presentar a José como ocultando intencionalmente las obras de los hermanos a Benjamín.
  alternative_readings:
  - José simplemente repite los hechos sin énfasis en el ocultamiento
  rationale: El griego ἤθελεν γὰρ κρύπτειν ἀπʼ ἐμοῦ τὰ ἔργα τῶν ἀδελφῶν ἡμῶν explícitamente da el motivo. Este matiz moral importa para el retrato benjaminita de la mansedumbre y contención de José.
translation_notes:
  revision_awareness: El POB inglés fue revisado para corregir la puntuación de la cita en v. 2 (cerrar comillas tras 'run'). La versión española sigue la formulación revisada con cierre de comillas tras 'correr'.
  spanish_consistency_notes:
  - χιτών → 'túnica'
  - Ἰωσήφ → 'José'
  - Βενιαμίν → 'Benjamín'
  - Αἴγυπτος → 'Egipto'
  - Ἰσμαηλίτης → 'ismaelita'
  - ἀδελφός → 'hermano'
  - ἔργα → 'obras'
