translation:
  language: es
  text: 'Por tanto[a], pastores, oigan la palabra de Yahvé:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se ha vertido «el SEÑOR» en muchas traducciones; aquí se conserva el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión lógica del reproche previo. 'Por tanto' mantiene un registro formal y suena natural en español bíblico sin perder la fuerza inferencial.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores-shepherds
  - guías
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'pastores'. En español, 'pastores' es comprensible, pero puede sonar más pastoral-eclesiástico que metafórico; 'pastores' conserva la imagen, mientras que 'guías' la diluye. Se elige 'pastores' como equivalente directo y transparente.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oigan y atiendan
  lexicon: HALOT
  rationale: El imperativo plural de שמע pide respuesta atenta a la palabra profética. 'Oigan' conserva mejor el registro solemne y la resonancia bíblica que 'escuchen' en español contemporáneo, sin introducir matices de obediencia no explícitos en el verbo.
- source_word: דְּבַר
  english_pob_choice: the word of
  chosen_spanish: la palabra de
  alternatives_spanish:
  - el mensaje de
  - la palabra proveniente de
  lexicon: HALOT
  rationale: La construcción profética estándar דְּבַר + nombre divino se rinde de manera más transparente como 'la palabra de'. 'Mensaje' sería posible, pero atenúa la fórmula bíblica estable.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española de uso amplio 'Yahvé', coherente con el criterio del proyecto de no sustituir el Tetragrama por una máscara como 'SEÑOR'. La elección preserva el nombre personal del pacto y es idiomática en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo contiene el Tetragrama. En español, 'Yahvé' comunica el nombre revelado de Dios sin ocultarlo tras un título. 'Jehová' es una forma tradicional, pero no es la preferida por la política terminológica del proyecto; 'SEÑOR' eliminaría la transparencia del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preserving the prophetic metaphor of 'shepherds'
  english_pob_reading: shepherds
  chosen_spanish_reading: pastores
  alternative_spanish_readings:
  - líderes
  - gobernantes
  rationale: En Ezequiel 34 la metáfora del pastor es central para la acusación contra los dirigentes de Israel. Traducirla como 'líderes' o 'gobernantes' explicaría la imagen pero borraría la metáfora textual. 'Pastores' la conserva y permite la lectura profética plena.
  doctrine_reference: 'Ezekiel 34 context: metaphor of shepherds as Israel''s rulers'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo breve de WLC y el audit trail en inglés. No se introducen expansiones explicativas; se conserva la secuencia discursiva, el vocativo plural y la fórmula profética «la palabra de Yahvé» con el nombre divino explícito. No hay revisiones aplicadas en el pasaje de referencia consultado, y el acuerdo interrevisor fue alto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para el Tetragrama, en coherencia con la terminología del proyecto.
  - '''Pastores'' conserva la metáfora de Ezequiel 34 sin reemplazarla por un término interpretativo.'
  - '''Oigan'' refleja el imperativo plural de שמע con registro bíblico natural en español.'
  - La puntuación con dos puntos reproduce adecuadamente la clausula introductoria seguida de la exhortación.
