translation:
  language: es
  text: Yahvé tu Dios te hará entrar en la tierra que tus padres poseyeron[a], y tú la poseerás; y te hará bien[b] y te multiplicará más que a tus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tus padres heredaron» / «que tus padres tomaron posesión de». El verbo hebreo puede llevar el matiz de heredar o de poseer.
    reason: lexical_alternative
  - marker: b
    text: O «te prosperará».
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱבִיאֲךָ
  english_pob_choice: will bring you
  chosen_spanish: te hará entrar
  alternatives_spanish:
  - te traerá
  - te conducirá a entrar
  lexicon: HALOT
  rationale: El hiphil de בוא con sufijo de 2ms expresa hacer entrar/traer. En español, «te hará entrar» comunica con claridad la acción causativa sin añadir explícitamente «de nuevo», que el contexto sugiere pero este verbo no dice por sí solo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política española del proyecto fija «Yahvé» como forma principal para el Tetragrámaton, preservando el nombre propio del pacto en lugar de reemplazarlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La construcción con sufijo de segunda persona masculina singular se vierte de manera directa como «tu Dios», manteniendo la relación de pacto entre Yahvé y el destinatario.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio, el referente es la tierra prometida. «Tierra» conserva mejor el sentido geográfico-covenantal que «país» en español.
- source_word: אֲשֶׁר יָרְשׁוּ אֲבֹתֶיךָ
  english_pob_choice: that your fathers possessed
  chosen_spanish: que tus padres poseyeron
  alternatives_spanish:
  - que tus padres heredaron
  - que tus padres tomaron posesión de
  lexicon: HALOT
  rationale: ירשׁ admite las ideas de heredar y poseer. Aquí, con la tierra como objeto, «poseyeron» suena natural y mantiene la idea de tenencia real, mientras que «heredaron» podría sonar demasiado pasivo.
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus padres». En español, «padres» puede referirse naturalmente a los antepasados varones en este contexto y evita neutralizar innecesariamente el término del original.
- source_word: וִירִשְׁתָּהּ
  english_pob_choice: and you will possess it
  chosen_spanish: y tú la poseerás
  alternatives_spanish:
  - y la heredarás
  - y tomarás posesión de ella
  lexicon: HALOT
  rationale: El verbo חוזר a ירשׁ con objeto femenino singular («la tierra»). «Poseerás» mantiene la continuidad léxica con el primer miembro y conserva el matiz activo de ocupar/poseer la tierra.
- source_word: וְהֵיטִבְךָ
  english_pob_choice: and he will prosper you
  chosen_spanish: y te hará bien
  alternatives_spanish:
  - y te prosperará
  - y te tratará bien
  lexicon: HALOT
  rationale: היטיב con sufijo puede significar «hacer bien a» alguien. «Te hará bien» reproduce con fidelidad ese valor, sin forzar una interpretación económica de «prosperar» que el hebreo no exige aquí.
- source_word: וְהִרְבְּךָ
  english_pob_choice: and multiply you
  chosen_spanish: y te multiplicará
  alternatives_spanish:
  - y te aumentará
  - y te hará numeroso
  lexicon: HALOT
  rationale: רבה en hiphil significa hacer numeroso/aumentar. «Te multiplicará» preserva el lenguaje bíblico del crecimiento del pueblo y su resonancia pactal.
- source_word: מֵאֲבֹתֶיךָ
  english_pob_choice: more than your fathers
  chosen_spanish: más que a tus padres
  alternatives_spanish:
  - más que a tus antepasados
  lexicon: HALOT
  rationale: El comparativo מן indica excedencia respecto de los padres. En español, «más que a tus padres» es claro y fiel; se conserva la referencia masculina explícita del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio del pacto en lugar de sustituirlo por «el SEÑOR». La forma española adoptada por el proyecto es «Yahvé», coherente con la política terminológica general.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Kinship plural masculino אֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  rationale: El hebreo usa un plural masculino. Se mantiene esa concreción en la traducción para no neutralizar el rasgo formal del texto; en este contexto, «padres» comunica bien la referencia a los antepasados de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se mantuvo el consenso de alta concordancia del auditoría inglesa y no se requirieron cambios respecto de la lectura base; la versión española sigue de cerca la sintaxis y las decisiones léxicas auditadas, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «tus padres» para conservar la referencia masculina del hebreo, sin introducir neutralización innecesaria.
  - Se traduce יטיב como «te hará bien», con nota opcional que preserva la alternativa semántica «te prosperará» si se desea resaltar el sentido benefactivo.
