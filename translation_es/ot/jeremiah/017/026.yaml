translation:
  language: es
  text: Y vendrán de las ciudades de Judá y de los alrededores de Jerusalén, y de la tierra de Benjamín, y de la llanura baja[a], y de la región montañosa, y del Neguev[b], trayendo holocaustos, sacrificios, ofrendas de cereal y olíbano, y trayendo ofrendas de agradecimiento a la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Sefelá»; es la región baja de Judá.
    reason: lexical_alternative
  - marker: b
    text: O «el sur»; «Neguev» es el nombre de la región meridional de Judá.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «casa de Yahvé», es decir, el templo.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: And they will come
  chosen_spanish: Y vendrán
  alternatives_spanish:
  - Y vendrán
  - Y llegarán
  lexicon: HALOT
  rationale: El imperfecto con waw consecutivo en este contexto profético se expresa naturalmente como futuro en español. «Y» conserva la coordinación del hebreo.
- source_word: מֵעָרֵי יְהוּדָה
  english_pob_choice: from the cities of Judah
  chosen_spanish: de las ciudades de Judá
  alternatives_spanish:
  - de los pueblos de Judá
  - de las villas de Judá
  lexicon: HALOT
  rationale: «Ciudades» refleja היטב el plural de עָרֵי; «Judá» mantiene el nombre territorial bíblico de forma transparente.
- source_word: וּמִסְּבִיבוֹת יְרוּשָׁלִַם
  english_pob_choice: from the areas around Jerusalem
  chosen_spanish: de los alrededores de Jerusalén
  alternatives_spanish:
  - de las regiones circundantes de Jerusalén
  - de los contornos de Jerusalén
  lexicon: HALOT
  rationale: סְבִיבוֹת denota zonas circundantes; «alrededores» es una equivalencia natural y clara en español.
- source_word: וּמֵאֶרֶץ בִּנְיָמִן
  english_pob_choice: from the land of Benjamin
  chosen_spanish: de la tierra de Benjamín
  alternatives_spanish:
  - del territorio de Benjamín
  lexicon: HALOT
  rationale: «Tierra» reproduce el valor territorial de אֶרֶץ sin perder la referencia geográfica regional ligada a Benjamín.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefelá
  alternatives_spanish:
  - la llanura baja
  - la zona baja
  lexicon: HALOT
  rationale: Aquí conviene conservar el topónimo regional tradicional «Sefelá», dado que el inglés POB preserva la tensión entre significación descriptiva y nombre geográfico mediante la nota alternativa.
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la sierra
  - la zona montañosa
  lexicon: HALOT
  rationale: En listas geográficas de Judá, הָהָר funciona como designación regional; «región montañosa» comunica el valor geográfico sin forzar un calco demasiado técnico.
- source_word: הַנֶּגֶב
  english_pob_choice: the Negeb
  chosen_spanish: el Neguev
  alternatives_spanish:
  - el Négueb
  - el sur
  lexicon: HALOT
  rationale: Se preserva el topónimo bíblico «Neguev», como en el texto inglés, para no diluir la referencia regional del sur de Judá.
- source_word: מְבִאִים
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - que traen
  - llevando
  lexicon: HALOT
  rationale: El participio expresa acción concomitante con «vendrán»; «trayendo» mantiene esa relación sin añadir explicación.
- source_word: עוֹלָה
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - holocausto
  lexicon: HALOT
  rationale: «Holocaustos» es el término cultual tradicional en español para עוֹלָה y conserva con precisión la ofrenda totalmente quemada.
- source_word: וְזֶבַח
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - víctimas
  - ofrendas sacrificiales
  lexicon: HALOT
  rationale: «Sacrificios» transmite de forma directa el sustantivo colectivo de זֶבַח en una lista cultual.
- source_word: וּמִנְחָה
  english_pob_choice: grain offerings
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - ofrenda vegetal
  lexicon: HALOT
  rationale: «Ofrenda de cereal» traduce con precisión la ofrenda no animal de מִנְחָה; evita la ambigüedad de «ofrenda» a secas.
- source_word: וּלְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: olíbano
  alternatives_spanish:
  - incienso
  - franquincienso
  lexicon: HALOT
  rationale: «Olíbano» es el término español preciso para לְבוֹנָה, más exacto que el genérico «incienso».
- source_word: וּמְבִאֵי תוֹדָה
  english_pob_choice: and bringing thank offerings
  chosen_spanish: y trayendo ofrendas de agradecimiento
  alternatives_spanish:
  - y trayendo ofrendas de acción de gracias
  - y traedores de gratitud
  lexicon: HALOT
  rationale: תוֹדָה en contexto sacrificial expresa una ofrenda de agradecimiento; «ofrendas de agradecimiento» conserva el sentido culto sin sonar arcaico.
- source_word: בֵּית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa de Yahvé
  lexicon: HALOT
  rationale: «Casa de Yahvé» sigue de cerca la expresión hebrea בֵּית יְהוָה y mantiene el nombre divino según la convención POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma española establecida por el proyecto, en lugar de sustituirlo por una титulación como «Señor».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. La convención del proyecto exige el nombre divino transliterado en la forma española establecida, preservando el nombre propio del pacto y evitando el sustituto titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic list of offerings
  english_pob_reading: burnt offerings and sacrifices, grain offerings and frankincense, and bringing thank offerings
  chosen_spanish_reading: holocaustos, sacrificios, ofrenda de cereal y olíbano, y trayendo ofrendas de agradecimiento
  alternative_spanish_readings:
  - ofrendas quemadas y sacrificios, ofrenda de grano e incienso, y trayendo ofrendas de acción de gracias
  rationale: La lista hebrea conserva categorías sacrificiales distintas. El español debe mantener esa diferenciación cultual sin suavizarla a términos genéricos; por eso se distinguen holocaustos, sacrificios, ofrenda de cereal, olíbano y ofrendas de agradecimiento.
  doctrine_reference: Lexical cultic categories in OT sacrificial system
- issue: Geographic regional terms
  english_pob_reading: the lowland / the hill country / the Negeb
  chosen_spanish_reading: la Sefelá / la región montañosa / el Neguev
  alternative_spanish_readings:
  - la llanura baja / la sierra / el sur
  rationale: 'El versículo enumera regiones de Judá. Donde el inglés POB conserva el nombre regional o lo traduce descriptivamente, el español puede equilibrar transparencia y toponimia: Sefelá y Neguev preservan nombres históricos; región montañosa comunica el valor descriptivo de הָהָר.'
  doctrine_reference: Geographic designations in Judah
- issue: Temple reference in 'house of Yahweh'
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  rationale: La expresión hebrea es literalmente 'casa de YHWH'. Mantenerla como «casa de Yahvé» preserva el paralelismo del hebreo y deja implícita la referencia al templo, como lo hace el audit trail inglés.
  doctrine_reference: Temple terminology / בֵּית יְהוָה
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el hebreo masorético y la auditoría inglesa: conserva la secuencia geográfica, las categorías sacrificiales y el nombre divino, sin introducir expansiones interpretativas. Se adopta la convención española del proyecto para יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene la coordinación repetida con «y/de» para reflejar la cadencia enumerativa del hebreo.
  - «Holocaustos» y «ofrenda de cereal» preservan categorías cultuales específicas y no se reemplazan por términos más genéricos.
  - «Sefelá» y «Neguev» conservan topónimos regionales bíblicos; la nota aclara el valor descriptivo donde corresponde.
  - «Casa de Yahvé» respeta la expresión hebrea literal sin sustituirla por «templo» en el texto principal.
