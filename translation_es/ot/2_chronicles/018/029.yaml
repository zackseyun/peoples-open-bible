revisions:
- from: 'Entonces el rey de Israel dijo a Josafat: «Desfigúrate[a] y entra en la batalla; pero tú, ponte tus ropas». Así el rey de Israel se disfrazó, y ellos entraron en la batalla.'
  to: 'Entonces el rey de Israel dijo a Josafat: «Disfrázate[a] y entra en la batalla; pero tú, ponte tus vestiduras». Así el rey de Israel se disfrazó, y entraron en la batalla.'
  rationale: Se corrige el verbo principal para reflejar con fidelidad el sentido de ocultar la identidad mediante disfraz, no de desfigurar el cuerpo o el rostro. También se ajusta «ropas» a «vestiduras» para expresar mejor el contraste regio señalado en la auditoría inglesa, y se elimina «ellos» por naturalidad narrativa en español.
