  text: וּֽ/בְ/חַסְדְּ/ךָ֮ תַּצְמִ֪ית אֹ֫יְבָ֥/י וְֽ֭/הַאֲבַדְתָּ כָּל צֹרֲרֵ֣י נַפְשִׁ֑/י כִּ֝֗י אֲנִ֣י עַבְדֶּֽ/ךָ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/143/012.yaml
  text: And in your steadfast love you will cut off my enemies[a], and you will destroy all the adversaries of my soul[b], for I am your servant.
