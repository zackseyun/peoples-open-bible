revisions:
- from: 'Cuando el pueblo lo vio[a], alabó a su dios, porque dijeron: «Nuestro dios ha entregado a nuestro enemigo en nuestra mano, al devastador de nuestra tierra[b], que multiplicó nuestros muertos[c]».'
  to: 'Cuando el pueblo lo vio, alabó a su dios, porque dijo: «Nuestro dios ha entregado a nuestro enemigo en nuestra mano[a], al devastador de nuestra tierra[b], que multiplicó nuestros caídos[c]».'
  rationale: Se corrige el aparato de notas para que preserve la nota idiomática documentada por el POB inglés; se mejora la naturalidad española con «porque dijo» en concordancia con «el pueblo»; y se ajusta la frase final a «nuestros caídos» para reflejar mejor חֲלָלֵינוּ, manteniendo las alternativas documentadas en nota.
