theological_decisions:
- issue: '18장 바벨론 애가의 「한 시간에 망하였도다」 후렴의 보존(18:10, 16, 19)'
  chosen_reading: '세 후렴(왕들·상인들·뱃사람들)에서 「한 시간에 ... 망하였도다」 형식을 일관되게 보존'
  alternative_readings:
  - 각 발언에 맞춰 표현 다양화
  rationale: '18장의 슬픔 노래는 세 집단(왕/상인/뱃사람)이 같은 형식의 후렴을 반복하는 의도적 구조를 갖는다. 한국어에서도 「한 시간에 (...) 망하였도다/황폐하게 되었도다」 식의 반복을 살려 애가의 운율을 보존한다.'
  doctrine_reference: 'DOCTRINE.md: Preserve liturgical/poetic repetition'
