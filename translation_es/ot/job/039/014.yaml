translation:
  language: es
  text: Porque ella deja sus huevos en la tierra y los calienta sobre el polvo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘abandona sus huevos en la tierra’. El verbo hebreo puede tener un sentido más fuerte que simplemente ‘deja’, pero la línea siguiente sugiere exposición sobre el suelo más que deserción absoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza explicativa/causal del hebreo en un español natural; aquí ‘Porque’ introduce la razón de la conducta descrita, como ‘For’ en la POB inglesa.
- source_word: תַעֲזֹב
  english_pob_choice: leaves
  chosen_spanish: deja
  alternatives_spanish:
  - abandona
  - desampara
  lexicon: HALOT
  rationale: ‘Deja’ reproduce el gesto básico del verbo sin cargarlo de abandono total; el contexto poético posterior matiza la idea, como en la lectura inglesa de la POB.
- source_word: לָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: Mantiene la imagen concreta de dirección hacia la tierra; ‘a la tierra’ es una equivalencia directa y comprensible en español bíblico moderno.
- source_word: בֵּצֶיהָ
  english_pob_choice: her eggs
  chosen_spanish: sus huevos
  alternatives_spanish:
  - sus huevos
  - sus crías
  lexicon: HALOT
  rationale: ‘Huevos’ refleja con precisión el sustantivo hebreo y evita suavizar la imagen zoológica. Se mantiene el referente femenino implícito en el sufijo pronominal.
- source_word: וְעַל עָפָר
  english_pob_choice: on the dust
  chosen_spanish: sobre el polvo
  alternatives_spanish:
  - sobre el polvo
  - en el polvo
  - sobre el polvo de la tierra
  lexicon: HALOT
  rationale: ‘Polvo’ preserva el registro poético y la concreción del hebreo mejor que ‘tierra’ o ‘suciedad’. ‘Sobre’ corresponde al valor locativo de עַל.
- source_word: תְּחַמֵּם
  english_pob_choice: warms them
  chosen_spanish: los calienta
  alternatives_spanish:
  - los mantiene calientes
  - los incuba
  lexicon: HALOT
  rationale: ‘Los calienta’ es una traducción directa y fiel del verbo piel de חמם. ‘Incuba’ sería más técnico e interpretativo de lo que el hebreo exige; se conserva la sencillez de la imagen.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene ‘leaves’ en lugar de ‘abandons’ y anota la posibilidad léxica más fuerte; la versión española conserva esa misma tensión con ‘deja’ y una nota alternativa que permite ‘abandona’ sin imponerla como lectura principal.
  spanish_consistency_notes:
  - Se usó ‘tierra’ para לָאָרֶץ y ‘polvo’ para עָפָר, manteniendo la distinción imagística del hebreo.
  - Se evitó ‘incuba’ para no introducir un tecnicismo ajeno al verbo hebreo y al criterio de la POB inglesa.
  - La sintaxis española sigue el paralelismo del hebreo sin forzar una paráfrasis explicativa.
