translation:
  language: es
  text: 'Entonces Joiadá, el sacerdote, mandó a los capitanes de cien, encargados del ejército, y les dijo: «Sáquenla entre las filas[a], y al que venga tras ella, mátenlo a espada». Porque el sacerdote había dicho: «No debe ser ejecutada en la casa de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera de las filas» / «al espacio entre las líneas»; la expresión hebrea es difícil y probablemente alude a sacarla por entre los guardias formados.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: captains of hundreds
  chosen_spanish: capitanes de centenas
  alternatives_spanish:
  - comandantes de centenas
  - centuriones
  lexicon: HALOT
  rationale: Conservo el título militar de forma directa y transparente. «Centenas» mantiene la referencia numérica del hebreo y evita el anacronismo de «centuriones», que sugiere el mundo romano.
- source_word: פְּקֻדֵי הַחַיִל
  english_pob_choice: who were appointed over the army
  chosen_spanish: encargados del ejército
  alternatives_spanish:
  - designados sobre el ejército
  - nombrados sobre la tropa
  lexicon: HALOT
  rationale: El participio pasivo de פקד expresa designación/encargo. «Encargados» comunica bien la función administrativa y evita una construcción demasiado pesada en español.
- source_word: הוֹצִיאוּ אֹתָהּ
  english_pob_choice: Bring her out
  chosen_spanish: Saquen a ella
  alternatives_spanish:
  - Sáquenla
  - Llévenla fuera
  lexicon: HALOT
  rationale: En este contexto el mandato es sacar a la reina del recinto. «Sáquenla» sería más natural, pero «Saquen a ella» conserva de manera más visible el objeto enfático del hebreo, aunque suene ligeramente más marcado.
- source_word: אֶל מִבֵּית לַשְּׂדֵרוֹת
  english_pob_choice: between the ranks
  chosen_spanish: entre las filas
  alternatives_spanish:
  - entre los rangos
  - al espacio entre las líneas
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual del POB: una salida a través/de entre las formaciones ordenadas de guardias. «Filas» es idiomático en español y conserva la imagen militar sin forzar una literalidad oscura.'
- source_word: וְהַבָּא אַחֲרֶיהָ
  english_pob_choice: whoever follows after her
  chosen_spanish: al que venga tras ella
  alternatives_spanish:
  - quien venga detrás de ella
  - el que la siga
  lexicon: HALOT
  rationale: El participio con artículo funciona genéricamente. «Al que venga tras ella» reproduce bien el sentido de cualquier persona que la siga o se acerque después.
- source_word: הָמֵת בֶּחָרֶב
  english_pob_choice: put to death with the sword
  chosen_spanish: mátenlo a espada
  alternatives_spanish:
  - denle muerte a espada
  - mátelo con la espada
  lexicon: HALOT
  rationale: La construcción intensiva pide un mandato fuerte de ejecución. En español, «mátenlo a espada» transmite con naturalidad el valor imperativo y violento del hebreo.
- source_word: אַל תּוּמַת
  english_pob_choice: She must not be put to death
  chosen_spanish: No sea muerta
  alternatives_spanish:
  - No debe ser muerta
  - No la maten
  lexicon: HALOT
  rationale: Mantengo la pasiva prohibitiva, porque el hebreo no formula simplemente una orden negativa activa. «No sea muerta» conserva esa tensión formal, aunque resulte menos corriente que una paráfrasis activa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: «Casa» sigue de cerca el hebreo y «Yahvé» preserva el nombre divino según la convención del proyecto. No recurro a «templo» para no borrar la metáfora original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: «Yahvé» en lugar de una sustitución por título o una forma tradicional distinta.'
theological_decisions:
- issue: Nombre divino en בית יהוה
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - la casa del SEÑOR
  - el templo de Yahvé
  rationale: El hebreo usa explícitamente el Tetragrámaton. Mantener «Yahvé» conserva el nombre personal del pacto y evita ocultarlo bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Prohibición pasiva en אַל תּוּמַת
  english_pob_reading: She must not be put to death
  chosen_spanish_reading: No sea muerta
  alternative_spanish_readings:
  - No debe ser muerta
  - No la maten
  rationale: 'La pasiva preserva la forma del hebreo y la tensión judicial del mandato: no solo se prohíbe la acción, sino su ejecución dentro de la casa de Yahvé.'
  doctrine_reference: Hebrew jussive/passive force in prohibitions
- issue: Rango militar y lectura de אֶל מִבֵּית לַשְּׂדֵרֹת
  english_pob_reading: between the ranks
  chosen_spanish_reading: entre las filas
  alternative_spanish_readings:
  - entre los rangos
  - al espacio entre las líneas
  rationale: La frase es difícil; la lectura escogida sigue la solución del POB en inglés y conserva el matiz de un pasaje entre guardias formados, sin fijar indebidamente un detalle incierto.
  doctrine_reference: Lexical ambiguity handled by contextual rendering
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que requirieran ajuste; el inglés POB final ya había resuelto el pasaje con acuerdo alto y solo una nota léxica menor sobre la frase difícil.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יהוה.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Casa de Yahvé» conserva la metáfora hebrea y la terminología del proyecto.
  - La voz pasiva prohibitiva «No sea muerta» se conserva por fidelidad formal al hebreo.
  - Se usa un español moderno pero reverente, sin calco innecesario salvo donde la estructura original lo pide.
