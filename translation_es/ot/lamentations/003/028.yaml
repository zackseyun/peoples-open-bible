translation:
  language: es
  text: Que se siente solo[a] y calle, porque lo ha puesto sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permanezca en silencio» o «esté quieto». El hebreo puede abarcar tanto callar como quedar en quietud silenciosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  english_pob_choice: Let him sit
  chosen_spanish: Que se siente
  alternatives_spanish:
  - Que esté sentado
  - Que se siente allí
  lexicon: HALOT
  rationale: 'El hebreo imperfecto/jusivo en este contexto funciona como exhortación. En español, la forma natural y digna para conservar ese valor exhortativo es un subjuntivo exhortativo: «Que se siente».'
- source_word: בָּדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en soledad
  - aislado
  lexicon: HALOT
  rationale: El término expresa soledad o aislamiento. «Solo» es la equivalencia más natural en español moderno y conserva el tono del mandamiento sin sonar recargado.
- source_word: וְיִדֹּם
  english_pob_choice: and be silent
  chosen_spanish: y calle
  alternatives_spanish:
  - y permanezca callado
  - y guarde silencio
  - y esté en silencio
  lexicon: HALOT
  rationale: El verbo comunica silencio bajo aflicción. «Calle» mantiene la fuerza verbal y la coordinación breve del hebreo, además de sonar más natural que una perífrasis.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación. «Porque» expresa con claridad la relación causal en español.
- source_word: נָטַל
  english_pob_choice: has laid it on
  chosen_spanish: se lo ha puesto encima
  alternatives_spanish:
  - se lo ha impuesto
  - se lo ha cargado encima
  - lo ha puesto sobre él
  lexicon: HALOT
  rationale: El verbo con עַל transmite la idea idiomática de poner o imponer una carga sobre alguien. «Se lo ha puesto encima» conserva la ambigüedad del objeto implícito («lo») y del sujeto implícito, sin resolverlos más de lo que permite el hebreo.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: encima
  alternatives_spanish:
  - sobre él
  - sobre sí
  lexicon: HALOT
  rationale: La relación preposicional queda absorbida naturalmente por «encima» en la construcción pronominal anterior. Esta opción evita repetir una frase pesada y mantiene el sentido de carga colocada sobre alguien.
theological_decisions:
- issue: Sujeto y objeto implícitos en נָטַל עָלָיו
  english_pob_reading: The subject is left implicit ('he'), and the imposed burden is represented by 'it' in English without specifying God or naming the burden.
  chosen_spanish_reading: 'Se preserva la impersonalidad: «se lo ha puesto encima», sin nombrar al sujeto ni especificar la carga.'
  alternative_spanish_readings:
  - porque Yahvé se lo ha impuesto
  - porque se lo ha cargado encima
  - porque le ha puesto una carga
  rationale: El hebreo no identifica explícitamente ni al sujeto ni al objeto. La versión española conserva esa tensión al no insertar a Yahvé ni definir la carga, evitando resolver interpretativamente lo que el texto deja abierto.
  doctrine_reference: Preservar la tensión textual y no sobreespecificar la agencia divina o la carga.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del sentido principal; solo se formula en español la exhortación y la carga implícita con una construcción natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el proyecto, pero aquí no se explicita porque el hebreo no lo nombra.
  - Se conserva un tono exhortativo y sobrio acorde con la poesía de Lamentaciones.
  - No se introduce «Mesías», «SEÑOR» ni otra terminología que altere la fuente.
