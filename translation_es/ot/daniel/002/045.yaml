translation:
  language: es
  text: Así como viste que una piedra fue cortada del monte, no por manos[a], y trituró el hierro, el bronce, el barro, la plata y el oro, el gran Dios ha dado a conocer al rey lo que sucederá después de esto. El sueño es cierto, y su interpretación es digna de confianza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin manos» / «no con manos»; el modismo arameo indica que el corte de la piedra no fue realizado por intervención humana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Porque
  - Puesto que
  lexicon: HALOT
  rationale: La expresión aramea introduce una relación explicativa/comparativa con el sueño; «Así como» conserva esa función sin volverla demasiado causal en español.
- source_word: חֲזַיְתָ
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - viste
  - observaste
  - contemplaste
  lexicon: HALOT
  rationale: Se mantiene el trato directo al rey con el pretérito simple natural en español.
- source_word: מִטּוּרָא
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte
  - de la montaña aquella
  lexicon: HALOT
  rationale: «Monte» conserva bien el registro bíblico y la referencia a la visión; el artículo definido sigue el valor determinado del arameo.
- source_word: אִתְגְּזֶרֶת אֶבֶן
  english_pob_choice: a stone was cut
  chosen_spanish: una piedra fue cortada
  alternatives_spanish:
  - una piedra fue cortada
  - una piedra fue desprendida
  - una piedra fue extraída
  lexicon: HALOT
  rationale: «Fue cortada» refleja con precisión la pasiva/reflexiva aramea sin añadir interpretación no exigida por el texto.
- source_word: דִּי לָא בִידַיִן
  english_pob_choice: not by hands
  chosen_spanish: no por manos[a]
  alternatives_spanish:
  - sin manos[a]
  - no con manos
  - no por mano humana
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la agencia no humana. «No por manos» es literal y permite la nota que aclara el sentido idiomático sin resolverlo en el cuerpo del texto.
- source_word: וְהַדֶּקֶת
  english_pob_choice: and that it crushed
  chosen_spanish: e hizo pedazos
  alternatives_spanish:
  - y aplastó
  - y trituró
  - e hizo pedazos
  lexicon: HALOT
  rationale: El verbo arameo expresa trituración/aplastamiento; «hizo pedazos» comunica la fuerza del acto de manera idiomática en español. La adición de «e» responde a eufonía ante vocal inicial.
- source_word: פַּרְזְלָא נְחָשָׁא חַסְפָּא כַּסְפָּא וְדַהֲבָא
  english_pob_choice: the iron, the bronze, the clay, the silver, and the gold
  chosen_spanish: el hierro, el bronce, el barro, la plata y el oro
  alternatives_spanish:
  - el hierro, el bronce, el barro, la plata y el oro
  - el hierro, el bronce, la arcilla, la plata y el oro
  lexicon: HALOT
  rationale: Se conserva la secuencia de materiales y el sentido tradicional de los metales. «Barro» mantiene el valor material básico de חַסְפָּא, sin forzar una especificación más técnica que el contexto no exige.
- source_word: אֱלָהּ רַב
  english_pob_choice: the great God
  chosen_spanish: el gran Dios
  alternatives_spanish:
  - el gran Dios
  - el Dios grande
  - Dios grande
  lexicon: HALOT
  rationale: Se traduce el sintagma con orden natural en español y artículo definido, preservando el tono de supremacía divina del contexto de Daniel.
- source_word: הוֹדַע לְמַלְכָּא
  english_pob_choice: has made known to the king
  chosen_spanish: ha dado a conocer al rey
  alternatives_spanish:
  - ha dado a conocer al rey
  - ha hecho saber al rey
  - ha revelado al rey
  lexicon: HALOT
  rationale: «Dar a conocer» reproduce bien el valor causativo de informar/making known y suena natural en español contemporáneo.
- source_word: מָה דִּי לֶהֱוֵא אַחֲרֵי דְנָה
  english_pob_choice: what will happen after this
  chosen_spanish: lo que sucederá después de esto
  alternatives_spanish:
  - lo que sucederá después de esto
  - lo que será después de esto
  - lo que vendrá después de esto
  lexicon: HALOT
  rationale: La cláusula apunta a una secuencia futura; «sucederá» evita una traducción demasiado literal de «será» que sonaría más ambigua en español.
- source_word: וְיַצִּיב חֶלְמָא
  english_pob_choice: The dream is certain
  chosen_spanish: El sueño es cierto
  alternatives_spanish:
  - El sueño es cierto
  - El sueño es firme
  - El sueño es seguro
  lexicon: HALOT
  rationale: «Cierto» comunica bien la idea de firmeza/estabilidad del adjetivo, manteniendo la brevedad sentenciosa del original.
- source_word: וּמְהֵימַן פִּשְׁרֵהּ
  english_pob_choice: and its interpretation is trustworthy
  chosen_spanish: y su interpretación es digna de confianza
  alternatives_spanish:
  - y su interpretación es digna de confianza
  - y su interpretación es confiable
  - y su interpretación es fidedigna
  lexicon: HALOT
  rationale: מְהֵימַן expresa fiabilidad. «Digna de confianza» es natural en español y conserva la evaluación positiva de la interpretación sin sobrecargar el estilo.
theological_decisions:
- issue: La agencia implícita en «no por manos»
  english_pob_reading: 'Retain the idiom without explicit expansion: ''not by hands'''
  chosen_spanish_reading: 'Retener el giro sin explicarlo en el cuerpo principal: «no por manos»'
  alternative_spanish_readings:
  - «sin manos»
  - «no por mano humana»
  - «sin intervención humana»
  rationale: El arameo sostiene la tensión teológica de una acción no humana. La redacción principal preserva esa forma idiomática y la nota aclara su alcance sin resolverlo dentro del texto.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Coincido con el pasaje auditado en el sentido general y en la decisión de conservar la fuerza idiomática de דִּי לָא בִידַיִן. La principal adaptación al español fue elegir una formulación natural («no por manos») con nota explicativa, y ajustar léxico para que el final («digna de confianza») suene publicable sin perder la equivalencia semántica.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלָהּ y «el gran Dios» para אֱלָהּ רַב, en línea con el estándar POB.
  - Se conserva «monte» en vez de «montaña» por registro bíblico y fluidez en español.
  - «Piedra» en lugar de «piedrecita» o ampliaciones interpretativas, para no debilitar la imagen del texto.
  - La nota [a] queda anclada solo en «no por manos» y no se reutiliza en otro lugar.
