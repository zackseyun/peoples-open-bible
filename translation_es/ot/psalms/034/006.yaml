revisions:
- from: Ellos miraron hacia él[a] y resplandecieron[b], y sus rostros no fueron avergonzados.
  to: Miraron hacia él[a] y resplandecieron[b], y sus rostros no fueron humillados.
  rationale: Se elimina «Ellos» para mejorar la fluidez poética en español. Se cambia «no fueron avergonzados» por «no fueron humillados» para expresar de manera más idiomática la idea de no ser puestos en vergüenza o deshonra pública, preservando mejor el valor resultativo del hebreo sin un calco rígido.
