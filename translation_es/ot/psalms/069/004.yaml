translation:
  language: es
  text: Estoy cansado de tanto clamar; se me ha secado la garganta[a]; mis ojos se consumen mientras espero en mi Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se me ha enronquecido la garganta». El hebreo sugiere más directamente sequedad o ardor por clamar largamente.
    reason: lexical_alternative
  - marker: b
    text: O «mientras espero con esperanza en mi Dios». El verbo hebreo puede expresar tanto esperar como esperar con expectación confiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגַעְתִּי
  english_pob_choice: I am weary
  chosen_spanish: Estoy cansado
  alternatives_spanish:
  - Me he fatigado
  - Estoy exhausto
  lexicon: HALOT
  rationale: יגע expresa cansancio o agotamiento. «Estoy cansado» comunica de forma natural el estado resultante en un lamento y conserva el valor de desgaste físico y emocional.
- source_word: בְּקָרְאִי
  english_pob_choice: from my crying
  chosen_spanish: de mi clamor
  alternatives_spanish:
  - por mi clamar
  - mientras clamo
  lexicon: HALOT
  rationale: קרא aquí tiene el sentido de clamar o pedir auxilio. «Clamor» conserva el tono de súplica intensa mejor que un verbo más neutro, y la preposición «de» expresa la causa del cansancio.
- source_word: נִחַר
  english_pob_choice: is parched
  chosen_spanish: se me ha secado
  alternatives_spanish:
  - está reseca
  - está acalorada
  lexicon: HALOT
  rationale: El hebreo sugiere sequedad, ardor o inflamación. En español, «se me ha secado la garganta» transmite con claridad el efecto físico de llorar o clamar largamente, sin perder la imagen corporal.
- source_word: גְּרוֹנִי
  english_pob_choice: my throat
  chosen_spanish: la garganta
  alternatives_spanish:
  - mi garganta
  - mi cuello
  lexicon: HALOT
  rationale: גרון significa garganta. Se mantiene la imagen anatómica literal, con una formulación natural en español.
- source_word: כָּלוּ
  english_pob_choice: fail
  chosen_spanish: fallan
  alternatives_spanish:
  - se consumen
  - se agotan
  - se nublan
  lexicon: HALOT
  rationale: כלה puede significar terminarse, consumirse o fallar. «Fallan» es una equivalencia idiomática clara en español para ojos agotados por el llanto o la espera.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  lexicon: HALOT
  rationale: Término anatómico directo; se conserva literalmente para mantener la imaginería corporal del salmo.
- source_word: מְיַחֵל
  english_pob_choice: while I wait
  chosen_spanish: mientras espero
  alternatives_spanish:
  - mientras aguardo
  - mientras espero con esperanza
  lexicon: HALOT
  rationale: יחל puede expresar esperar con esperanza. «Mientras espero» es natural y deja abierta la tensión entre espera temporal y esperanza expectante, como en el auditrack inglés.
- source_word: לֵאלֹהָי
  english_pob_choice: for my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - por mi Dios
  - en espera de mi Dios
  lexicon: HALOT
  rationale: La preposición ל con יחל marca el objeto de la espera/esperanza. «A mi Dios» preserva la dirección personal de la espera sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: Ambigüedad de מְיַחֵל entre esperar y esperar con esperanza
  english_pob_reading: while I wait for my God
  chosen_spanish_reading: mientras espero a mi Dios
  alternative_spanish_readings:
  - mientras espero con esperanza a mi Dios
  - mientras aguardo a mi Dios
  rationale: El hebreo admite una espera cargada de esperanza, pero el inglés POB optó por «wait» para conservar el componente temporal. El español sigue esa decisión y mantiene implícita la esperanza sin convertirla en explicación explícita.
  doctrine_reference: Salmo de lamentación; espera confiada en Dios
- issue: 'Imagen física de la garganta: sequedad vs. voz ronca'
  english_pob_reading: my throat is parched
  chosen_spanish_reading: se me ha secado la garganta
  alternative_spanish_readings:
  - mi garganta está reseca
  - mi garganta está ronca
  rationale: El texto hebreo enfatiza la sequedad/ardor por clamar mucho. La opción elegida preserva la fuerza corporal de la imagen; «ronca» se deja como alternativa interpretativa, pero no como texto principal, porque desplaza el énfasis del hebreo.
  doctrine_reference: Poética hebrea; imaginería corporal del sufrimiento
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo masorético sin añadir contenido nuevo. La principal decisión fue conservar la tensión de יחל como espera con posible esperanza, y la imagen de נִחַר como sequedad física, usando español natural y publicable.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto, pero este versículo no contiene el nombre divino explícito; por eso aparece «mi Dios» siguiendo el hebreo.
  - Se mantuvo una sintaxis breve y poética, con paralelismo de miembros, para conservar el tono lamentativo del salmo.
  - «Clamor» se prefirió por su registro bíblico y porque en español refleja mejor el grito insistente de la lamentación que «llanto» o «llamado».
