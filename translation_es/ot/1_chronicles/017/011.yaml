  text: וְ/הָיָ֗ה כִּֽי מָלְא֤וּ יָמֶ֨י/ךָ֙ לָ/לֶ֣כֶת עִם אֲבֹתֶ֔י/ךָ וַ/הֲקִֽימוֹתִ֤י אֶֽת זַרְעֲ/ךָ֙ אַחֲרֶ֔י/ךָ אֲשֶׁ֥ר יִהְיֶ֖ה מִ/בָּנֶ֑י/ךָ וַ/הֲכִינוֹתִ֖י אֶת מַלְכוּתֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/017/011.yaml
  text: And it shall be[a], when your days are fulfilled to go to be with your fathers, that I will raise up your offspring after you, who shall be one of your sons, and I will establish his kingdom.
  footnotes:
  - marker: a
    text: Literally, 'to go with your fathers,' a Hebrew idiom for dying and joining one's ancestors.
    reason: cultural_note
