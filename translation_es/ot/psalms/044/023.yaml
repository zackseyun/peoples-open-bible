revisions:
- from: Porque por tu causa[a] somos muertos todo el día; somos considerados como ovejas para el matadero[b].
  to: Pues por tu causa[a] nos matan todo el día; somos considerados como ovejas al matadero[b].
  rationale: Se ajusta el conector inicial a un español más natural en contexto discursivo ('Pues'), se reemplaza 'somos muertos' por 'nos matan' para reflejar con claridad y dignidad la idea hebrea de muerte continua o repetida, y se corrige la alternativa de la nota a para evitar una expresión española equívoca. Se mantiene 'somos considerados' por el valor evaluativo de נחשׁבנו y la imagen de las ovejas destinadas a la matanza.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:28:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una razón introducida por כִּי, sufrimiento continuo ''todo el día'', y la comparación con ovejas destinadas a la matanza. También preserva correctamente la tensión teológica de עָלֶיךָ como sufrimiento en relación con Dios y no necesariamente causado directamente por él. Sin embargo, hay dos puntos donde el español no representa bien el registro ni la naturalidad del original/POB: ''somos muertos'' es poco natural en español moderno y ''Porque'' al inicio puede sonar más subordinante que discursivo, donde ''Pues'' encaja mejor con el valor explicativo de כִּי en el flujo del salmo.'
  spanish_quality_summary: El texto es comprensible y mayormente fiel, pero necesita un ajuste de estilo importante para sonar natural y digno en español eclesial contemporáneo. 'Somos muertos' resulta forzado; 'nos matan' expresa mejor el pasivo/impersonal de sufrimiento repetido en español sin pérdida de sentido. 'Para el matadero' es aceptable, aunque 'al matadero' es más idiomático con 'ovejas'. Las notas son útiles, pero la nota a debe corregir 'por tu cuenta', que en español no significa 'on your account' en este contexto.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en el texto del versículo. Las decisiones léxicas principales se alinean en general con el POB inglés, salvo que la alternativa española 'por tu cuenta' no es una equivalencia válida aquí. La preferencia del POB por una traducción natural pero fiel favorece 'nos matan' frente a 'somos muertos'.
  issues:
  - severity: medium
    issue: '''somos muertos'' es antinatural en español actual'
    rationale: Aunque intenta conservar el pasivo del inglés, en español bíblico moderno suena torpe y poco idiomático. 'Nos matan' comunica con naturalidad la realidad continua/repetida del hebreo poético sin cambiar el sentido.
  - severity: low
    issue: '''Porque'' al inicio puede sonar menos natural que ''Pues'' en este enlace discursivo'
    rationale: כִּי aquí explica la queja anterior. 'Pues' funciona mejor en español como conector explicativo de discurso, mientras que 'porque' puede percibirse como subordinante fuerte.
  - severity: medium
    issue: La nota 'por tu cuenta' es inadecuada
    rationale: En español, 'por tu cuenta' suele significar 'por iniciativa propia' o 'a tu cargo', no 'on your account' en el sentido de referencia/causa. Debe reemplazarse por una alternativa idiomática como 'por causa tuya'.
  revised_spanish_text: Pues por tu causa[a] nos matan todo el día; somos considerados como ovejas al matadero[b].
  revised_footnotes:
  - marker: a
    text: O «por causa tuya» o «a causa de ti». El hebreo puede expresar sufrimiento soportado en relación con Dios.
    reason: lexical_alternative
  - marker: b
    text: O «somos contados como ovejas para el matadero».
    reason: lexical_alternative
  revision_rationale: Se ajusta el conector inicial a un español más natural en contexto discursivo ('Pues'), se reemplaza 'somos muertos' por 'nos matan' para reflejar con claridad y dignidad la idea hebrea de muerte continua o repetida, y se corrige la alternativa de la nota a para evitar una expresión española equívoca. Se mantiene 'somos considerados' por el valor evaluativo de נחשׁבנו y la imagen de las ovejas destinadas a la matanza.
