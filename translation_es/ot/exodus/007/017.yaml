translation:
  language: es
  text: 'Así dice Yahvé: Con esto sabrás que yo soy Yahvé: he aquí, estoy golpeando con la vara que está en mi mano las aguas[a] que están en el Nilo, y se convertirán en sangre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las aguas ... se convertirán en sangre». El inglés POB suaviza el plural a «el agua ... será convertida en sangre», pero en español se puede conservar el plural de forma natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así habla Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética de mensajero se conserva con una construcción natural en español. «Así dice» mantiene el valor solemne y formular del hebreo sin volverla demasiado pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: transliteración del Tetragrámaton como «Yahvé», no una sustitución por título.'
- source_word: בְּזֹאת
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - Mediante esto
  lexicon: HALOT
  rationale: La preposición instrumental/adverbial expresa el medio por el cual se conocerá a Yahvé. «Por esto» comunica bien la relación de medio/señal en español.
- source_word: תֵּדַע
  english_pob_choice: you will know
  chosen_spanish: sabrás
  alternatives_spanish:
  - conocerás
  - llegarás a saber
  lexicon: HALOT
  rationale: El verbo en contexto apunta a reconocimiento cognitivo por la señal; «sabrás» es más natural que una calca más pesada y conserva el futuro predictivo.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el Dios verdadero
  - que yo soy Yahvé
  lexicon: HALOT
  rationale: Se mantiene la autoidentificación pactual del texto. «Yo soy Yahvé» conserva el énfasis directo del hebreo sin desplazarlo a una formulación interpretativa.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - fíjate
  lexicon: HALOT
  rationale: En español moderno, «mira» comunica la deíxis enfática y la inmediatez dramática de forma más natural que «he aquí», sin perder solemnidad.
- source_word: אָנֹכִי מַכֶּה
  english_pob_choice: I am striking
  chosen_spanish: estoy golpeando
  alternatives_spanish:
  - voy a golpear
  - golpearé
  lexicon: HALOT
  rationale: El participio con pronombre independiente expresa acción vívida e inminente; «estoy golpeando» conserva mejor ese valor aspectual que un futuro simple.
- source_word: בַּמַּטֶּה אֲשֶׁר בְּיָדִי
  english_pob_choice: with the staff that is in my hand
  chosen_spanish: con la vara que está en mi mano
  alternatives_spanish:
  - con el bastón que está en mi mano
  - con la vara en mi mano
  lexicon: HALOT
  rationale: «מַטֶּה» puede ser «vara» o «bastón/vara de autoridad». Aquí «vara» mantiene la resonancia narrativa de la señal y del instrumento usado por Moisés; se conserva además la relativa sobre la mano para reflejar el hebreo.
- source_word: עַל הַמַּיִם
  english_pob_choice: the water
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - sobre el agua
  lexicon: HALOT
  rationale: El hebreo usa plural («las aguas»), y el POB inglés suaviza a singular por idiomática. En español se puede conservar el plural sin forzar la gramática, manteniendo mejor la huella del original.
- source_word: אֲשֶׁר בַּיְאֹר
  english_pob_choice: that is in the Nile
  chosen_spanish: que están en el Nilo
  alternatives_spanish:
  - que está en el Nilo
  - que están en el río
  lexicon: HALOT
  rationale: «יְאֹר» en Éxodo refiere específicamente al Nilo; «en el Nilo» es claro y directo. Se armoniza el plural con «las aguas».
- source_word: וְנֶהֶפְכוּ לְדָם
  english_pob_choice: and it will be turned to blood
  chosen_spanish: y se convertirán en sangre
  alternatives_spanish:
  - y serán convertidas en sangre
  - y se volverán sangre
  lexicon: HALOT
  rationale: El pasivo/resultativo hebreo se reproduce con «se convertirán». «Sangre» mantiene el sustantivo concreto y natural en español, sin suavizar la transformación.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del POB en inglés distingue el nombre propio del título. En español se conserva esa decisión teológica y traductológica con «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés presentan alta concordancia y no requieren revisiones sustanciales. Se mantuvieron las decisiones clave: nombre divino como «Yahvé», la fórmula profética, el participio vívido y el sentido plural de «las aguas» propio del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva el plural «las aguas» para reflejar el hebreo, aun cuando el inglés lo suaviza a singular.
  - «Vara» se elige por coherencia narrativa y lexical en el contexto de Moisés.
  - La puntuación reproduce el tono solemne del oráculo con dos puntos y una estructura paralela clara.
