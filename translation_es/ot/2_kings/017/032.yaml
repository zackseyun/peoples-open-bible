  text: וַ/יִּהְי֥וּ יְרֵאִ֖ים אֶת יְהוָ֑ה וַ/יַּעֲשׂ֨וּ לָ/הֶ֤ם מִ/קְצוֹתָ/ם֙ כֹּהֲנֵ֣י בָמ֔וֹת וַ/יִּהְי֛וּ עֹשִׂ֥ים לָ/הֶ֖ם בְּ/בֵ֥ית הַ/בָּמֽוֹת־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/032.yaml
  text: They feared Yahweh[a], and they appointed for themselves from among all their people priests of the high places[b], who were serving for them in the houses of the high places.
  footnotes:
  - marker: a
    text: Or 'from all classes of them'; the Hebrew expression is idiomatic and may suggest selection from the people at large without proper distinction.
    reason: lexical_alternative
  - marker: b
    text: That is, priests serving at local shrine sites rather than at the central sanctuary.
    reason: cultural_note
