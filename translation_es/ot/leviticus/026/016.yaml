    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «consunción». El término exacto de la enfermedad es incierto; el hebreo probablemente se refiere de manera más general a una enfermedad que debilita o consume.
    reason: lexical_alternative
  - marker: c
    text: 'O: «que hacen desfallecer los ojos y consumen la vida».'
    reason: lexical_alternative
  revision_rationale: Se ajustó «haré esto contra ustedes» a «les haré esto» para no sobreinterpretar la preposición hebrea; se cambió «pondré sobre ustedes» por «haré venir sobre ustedes» en el texto principal para un español más natural y plenamente compatible con la alternativa auditada; se añadieron las notas léxicas que el POB inglés preserva para פקד, הַשַּׁחֶפֶת y la frase participial sobre ojos/vida; y se suavizó «enfermedad que consume» a «enfermedad debilitante» para mejorar la lectura sin perder el sentido de desgaste.
