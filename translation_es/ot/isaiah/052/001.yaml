review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: mantiene la doble exhortación, la metáfora de vestirse, la aposición «Jerusalén, la ciudad santa» y la exclusión futura de «el incircunciso y el impuro». Sin embargo, las notas no corresponden a la evidencia auditada: la nota inglesa [a] pertenece a «put on your beautiful garments / garments of splendor», no a «Awake». Además, la nota [b] inglesa explica «the uncircumcised and the unclean», pero en el borrador español se trasladó erróneamente a «la ciudad santa».'
  spanish_quality_summary: 'El español es claro y digno, pero hay detalles mejorables: repetir la misma marca [a] dos veces dentro de la misma frase no sigue bien la disciplina de anclaje; «vestidos hermosos» es aceptable, aunque «vestiduras hermosas» suena algo más bíblico-natural; y conviene conservar la nota explicativa sobre «el incircunciso y el impuro» para reflejar la tensión teológica documentada. «Entrará en ti» funciona bien para una ciudad personificada.'
  glossary_alignment: 'No hay conflicto con la glosa de nombres propios: «Sion» y «Jerusalén» son apropiados. El borrador preserva correctamente el lenguaje de pacto/pureza con «incircunciso» e «impuro». La principal desalineación está en la ubicación y contenido de las notas, no en la terminología principal.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Despierta» pero su contenido trata de «vestidos de esplendor».
    rationale: La evidencia inglesa documenta la alternativa léxica para לִבְשִׁי בִּגְדֵי תִפְאַרְתֵּךְ, no para עוּרִי עוּרִי. Así, el anclaje actual distorsiona la justificación léxica.
  - severity: high
    issue: La nota [b] comenta «la ciudad santa» en vez de «el incircunciso y el impuro».
    rationale: La nota auditada explica el lenguaje de pacto y pureza de עָרֵל וְטָמֵא. Trasladarla a «la ciudad santa» altera el foco teológico documentado.
  - severity: medium
    issue: Se reutiliza la marca [a] dos veces para la misma nota dentro del texto.
    rationale: Aunque apunta al mismo contenido, la disciplina del proyecto pide anclaje exacto y ordenado; basta un solo anclaje en la frase relevante.
  - severity: low
    issue: «Vestidos hermosos» es comprensible pero algo menos idiomático que «vestiduras hermosas» en este registro.
    rationale: No es error de fidelidad, pero «vestiduras» encaja mejor con el tono bíblico-digno sin volverse arcaico.
