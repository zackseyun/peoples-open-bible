- from: sino con los que están aquí con nosotros hoy, en pie delante de Yahvé nuestro Dios[a], y con los que no están aquí con nosotros hoy.
  to: sino con los que hoy están aquí con nosotros, de pie ante Yahvé nuestro Dios, y con los que no están aquí con nosotros hoy[a].
  rationale: Se ajusta la sintaxis para reflejar con más naturalidad y precisión la doble idea hebrea de presencia y postura («están aquí... de pie ante»), y se reubica la nota al lugar que realmente comenta.
