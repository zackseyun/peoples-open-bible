translation:
  language: es
  text: Y el rey de Egipto reunió muchas fuerzas, como la arena a la orilla del mar, y muchas naves; y buscó apoderarse[a] del reino de Alejandro por engaño, y añadirlo a su propio reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'tomar control del reino de Alejandro' o 'ganar dominio sobre el reino de Alejandro'. El verbo griego puede implicar prevalecer sobre o tomar control.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθροισεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - congregó
  lexicon: LSJ
  rationale: ἤθροισεν expresa reunir o concentrar fuerzas. 'Reunió' es natural en español y conserva el sentido de movilización militar sin añadir matices no explícitos.
- source_word: δυνάμεις πολλὰς
  english_pob_choice: many forces
  chosen_spanish: muchas fuerzas
  alternatives_spanish:
  - muchas tropas
  - grandes fuerzas
  - muchos ejércitos
  lexicon: LSJ
  rationale: '''Fuerzas'' mantiene la amplitud del griego δυνάμεις en contexto militar. ''Tropas'' estrecha demasiado, y ''ejércitos'' intensifica más de lo que el texto exige.'
- source_word: ὡς ἡ ἄμμος ἡ παρὰ τὸ χεῖλος τῆς θαλάσσης
  english_pob_choice: like the sand by the seashore
  chosen_spanish: como la arena junto a la orilla del mar
  alternatives_spanish:
  - como la arena junto a la costa
  - como la arena en la orilla del mar
  - como la arena junto al borde del mar
  lexicon: LSJ
  rationale: La comparación bíblica expresa cantidad inmensa. 'Junto a la orilla del mar' preserva la imagen idiomática con español claro y digno; 'arena' traduce mejor ἄμμος que 'sand' con naturalidad en español.
- source_word: πλοῖα πολλά
  english_pob_choice: many ships
  chosen_spanish: muchas naves
  alternatives_spanish:
  - muchos barcos
  - numerosas naves
  lexicon: LSJ
  rationale: '''Naves'' es el equivalente más sobrio y amplio para πλοῖα en estilo bíblico. ''Barcos'' sería más coloquial; ''muchas naves'' mantiene el paralelismo con ''muchas fuerzas''.'
- source_word: ἐζήτησεν
  english_pob_choice: he sought
  chosen_spanish: buscó
  alternatives_spanish:
  - trató de
  - intentó
  - procuró
  lexicon: LSJ
  rationale: ἐζήτησεν puede introducir intención o intento. 'Buscó' funciona bien en español, pero aquí se combina con el infinitivo de resultado; la construcción completa conserva la idea de propósito activo.
- source_word: κατακρατῆσαι
  english_pob_choice: to gain control of
  chosen_spanish: apoderarse
  alternatives_spanish:
  - ganar control de
  - tomar el control de
  - dominar
  lexicon: LSJ
  rationale: El verbo puede abarcar prevalecer sobre o tomar dominio. 'Apoderarse' da la fuerza de control/predominio que el audit trail destaca, sin limitarlo a simple ocupación militar.
- source_word: τῆς βασιλείας Ἀλεξάνδρου
  english_pob_choice: Alexander’s kingdom
  chosen_spanish: del reino de Alejandro
  alternatives_spanish:
  - del reino de Alejandro
  - del reino de Alejandro Magno
  - de la realeza de Alejandro
  lexicon: LSJ
  rationale: βασιλεία aquí es reino o dominio político, no 'realeza'. 'Alejandro' basta para identificar al referente; 'reino de Alejandro' reproduce la relación posesiva de forma natural.
- source_word: δόλῳ
  english_pob_choice: by deceit
  chosen_spanish: por engaño
  alternatives_spanish:
  - con engaño
  - por fraude
  - con astucia
  lexicon: LSJ
  rationale: δόλος es engaño, dolo, astucia engañosa. 'Por engaño' es directo y transparente en español, sin cargar el término con una condena más fuerte que la del griego.
- source_word: προσθεῖναι αὐτὴν τῇ βασιλείᾳ αὐτοῦ
  english_pob_choice: to add it to his own kingdom
  chosen_spanish: y añadirlo a su propio reino
  alternatives_spanish:
  - y anexarlo a su reino
  - y sumarlo a su reino
  - y agregarlo a su reino
  lexicon: LSJ
  rationale: προσθεῖναι es literalmente 'añadir'. 'Añadirlo a su propio reino' preserva la metáfora política del texto y evita introducir un tecnicismo moderno como 'anexar'.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto griego y el análisis inglés muestran alta concordancia, sin variantes textuales o interpretativas relevantes que requieran ajuste adicional en español.
  spanish_consistency_notes:
  - Se mantuvo 'rey de Egipto' como reflejo directo del sujeto griego sin expandirlo innecesariamente.
  - Se conservó el paralelismo entre 'muchas fuerzas' y 'muchas naves' para reproducir el ritmo del original.
  - '''Por engaño'' se usó de manera consistente con la nota de alternativa, sin sustituir el sentido político de dominación implícito en κατακρατῆσαι.'
  - No se añadió puntuación explicativa ni vocabulario teológico ajeno al pasaje.
