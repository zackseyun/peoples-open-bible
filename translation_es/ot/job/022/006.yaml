translation:
  language: es
  text: Porque tomaste prendas de tus hermanos[a] sin motivo[b], y despojaste de su ropa a los desnudos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tus hermanos» puede referirse más ampliamente a miembros de la comunidad, no solo a hermanos biológicos.
    reason: cultural_note
  - marker: b
    text: 'O: «tomaste garantías de tus hermanos sin causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la acusación con valor explicativo/causal, como en el texto fuente y en la POB inglesa. En español, «Porque» comunica con naturalidad esa conexión discursiva sin añadir énfasis interpretativo.
- source_word: תַחְבֹּל
  english_pob_choice: you took pledges
  chosen_spanish: tomaste prendas
  alternatives_spanish:
  - tomaste garantías
  - tomaste un prenda
  - apropiaste de bienes en prenda
  lexicon: HALOT
  rationale: El verbo se refiere a tomar una prenda o garantía por deuda. «Prendas» conserva el valor técnico de la acción sin forzar una paráfrasis más amplia. Se evita «collateral» por su sesgo anglojurídico y «garantías» por ser menos concreto en este contexto.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus parientes
  - tus semejantes
  - tus compatriotas
  lexicon: HALOT
  rationale: Se mantiene el vínculo literal de parentesco/fraternidad que trae el hebreo, en línea con la POB inglesa. En español, «hermanos» también puede abarcar a miembros de la comunidad sin neutralizar el término.
- source_word: חִנָּם
  english_pob_choice: for no reason
  chosen_spanish: sin motivo
  alternatives_spanish:
  - sin causa
  - gratuitamente
  - sin razón
  lexicon: HALOT
  rationale: Expresa la acusación de acción injustificada de manera natural en español. «Sin motivo» conserva la fuerza moral de «for no reason» sin sugerir que la falta sea solo financiera.
- source_word: וּבִגְדֵי
  english_pob_choice: and the clothing
  chosen_spanish: y la ropa
  alternatives_spanish:
  - y las vestiduras
  - y los vestidos
  - y la vestimenta
  lexicon: HALOT
  rationale: El plural constructo con el sustantivo siguiente funciona de forma colectiva. «Ropa» es idiomático en español y transmite la idea de prendas sin sonar arcaico.
- source_word: עֲרוּמִּים
  english_pob_choice: the naked
  chosen_spanish: de los desnudos
  alternatives_spanish:
  - de los desnudos de ropa
  - de los que estaban desnudos
  - de los despojados
  lexicon: HALOT
  rationale: «Desnudos» conserva la imagen fuerte del hebreo y la ironía del acto de despojar vestiduras. Se mantiene el sustantivo/adjetivo humano, evitando suavizarlo como «desnudos de ropa».
- source_word: תַּפְשִׁיט
  english_pob_choice: stripped
  chosen_spanish: desnudaste
  alternatives_spanish:
  - despojaste
  - arrancaste
  - quitaste
  lexicon: HALOT
  rationale: El verbo hifil expresa quitar la ropa, desnudar. «Desnudaste» reproduce con claridad el acto y la dureza de la acusación; se evita «despojaste» porque podría perder la referencia explícita a las vestiduras.
theological_decisions:
- issue: Alcance de «אַחֶיךָ» en una acusación sapiencial
  english_pob_reading: '''Your brothers'' may refer more broadly to fellow members of the community, not only biological siblings.'
  chosen_spanish_reading: «tus hermanos» puede abarcar a los miembros de la comunidad, no solo a hermanos biológicos.
  alternative_spanish_readings:
  - tus parientes
  - tus compatriotas
  - tus semejantes
  rationale: Se conserva el término literal y se deja abierta su extensión comunitaria, como en la nota inglesa. Esto evita reducir indebidamente el sentido social del hebreo.
  doctrine_reference: Nota cultural/comunitaria; no doctrinal
- issue: Violencia social implícita en tomar prendas de los pobres
  english_pob_reading: you took pledges / stripped the clothing from the naked
  chosen_spanish_reading: tomaste prendas ... y desnudaste la ropa de los desnudos
  alternative_spanish_readings:
  - tomaste garantías ... y quitaste la ropa de los desnudos
  - seizure de bienes ... y despojaste a los desvestidos
  rationale: La formulación conserva la acusación concreta de explotación económica y humillación pública. No se atenúa la dureza del acto, porque el hebreo y la POB inglesa presentan una denuncia moral directa.
  doctrine_reference: Justicia social en el marco sapiencial bíblico
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente indicado como sin cambios y con acuerdo alto; no se incorporaron revisiones adicionales porque el registro fuente no muestra modificaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se preserva el paralelismo acusatorio con dos miembros coordinados por «y».
  - Se evita la neutralización innecesaria de «hermanos» para conservar el eco social del hebreo.
  - Se eligió un registro digno y moderno, sin arcaísmos de traducción tradicional donde no eran necesarios.
