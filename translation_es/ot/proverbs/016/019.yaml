translation:
  language: es
  text: Mejor es ser de espíritu bajo con los pobres[a] que dividir el botín con los soberbios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los afligidos»; también puede entenderse «humilde en espíritu con los pobres». El hebreo עניים puede referirse a los pobres, a los afligidos o, según el contexto, a los humildes.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  lexicon: HALOT
  rationale: El hebreo abre con una evaluación proverbial breve; «Mejor es» conserva ese valor comparativo de forma natural en español y mantiene el tono sapiencial conciso.
- source_word: שְׁפַל ר֭וּחַ
  english_pob_choice: to be lowly in spirit
  chosen_spanish: ser humilde de espíritu
  alternatives_spanish:
  - ser bajo de espíritu
  - tener un espíritu humilde
  lexicon: HALOT
  rationale: La expresión apunta a una disposición interior de humildad. «Humilde de espíritu» comunica bien esa actitud en español y evita una paráfrasis excesiva; «bajo de espíritu» suena menos idiomático.
- source_word: אֶת עניים
  english_pob_choice: with the poor
  chosen_spanish: con los pobres
  alternatives_spanish:
  - con los afligidos
  - entre los pobres
  - con los humildes
  lexicon: HALOT
  rationale: En este contexto, אֶת funciona en sentido asociativo. «Los pobres» sigue la paralela social del proverbio y conserva la tensión lexical documentada en la nota inglesa, donde עניים puede abarcar también a los afligidos o humildes.
- source_word: מֵֽ/חַלֵּ֥ק
  english_pob_choice: than to divide
  chosen_spanish: que dividir
  alternatives_spanish:
  - que repartiendo
  - que compartir
  lexicon: HALOT
  rationale: El prefijo comparativo מִן tras טוֹב se expresa de manera natural con «que». «Dividir» reproduce el acto de repartir el botín sin suavizarlo con «compartir», que sería menos preciso en este contexto.
- source_word: שָׁ֝לָ֗ל
  english_pob_choice: plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  lexicon: HALOT
  rationale: «Botín» es el término español más claro y estable para bienes tomados en guerra o saqueo. Conserva el sentido de riqueza obtenida violentamente que exige el proverbio.
- source_word: אֶת גֵּאִֽים
  english_pob_choice: with the proud
  chosen_spanish: con los soberbios
  alternatives_spanish:
  - con los orgullosos
  - con los arrogantes
  lexicon: HALOT
  rationale: «Soberbios» funciona bien como contraparte de «humilde de espíritu» y refleja con fuerza moral el hebreo גֵּאִים. «Orgullosos» sería posible, pero «soberbios» preserva mejor el matiz de elevación altiva.
translation_notes:
  revision_awareness: El texto base en inglés no presenta revisiones sustantivas; el pasaje se mantiene en acuerdo alto y sin cambios en la última revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «con» para el valor asociativo de אֶת, sin convertirlo en un mero acompañamiento narrativo.
  - Se conserva el paralelismo antitético entre humildad interior y asociación con los pobres frente al reparto de botín con los soberbios.
