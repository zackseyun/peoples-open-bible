translation:
  language: es
  text: Y haré que seas mi esposa en fidelidad[a], y conocerás a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en lealtad» o, más formalmente, «en fe». El término hebreo lleva la idea de fiabilidad y fidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵרַשְׂתִּיךְ
  english_pob_choice: And I will betroth you
  chosen_spanish: Y te desposaré
  alternatives_spanish:
  - Y te betrotaré
  - Y te desposaré en matrimonio
  lexicon: HALOT
  rationale: El hebreo ארשׂ se refiere específicamente a entrar en una relación de desposorio o compromiso matrimonial, no a un matrimonio ya consumado. En español, «desposar» preserva mejor esa imagen covenantal-marital que un verbo más general como «casar»; «betrotar» suena artificial en español actual.
- source_word: לִי
  english_pob_choice: to myself
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: La construcción expresa destino personal y relacional. «Conmigo» comunica de forma natural en español la unión y cercanía implicadas, sin perder el sentido de pertenencia personal del hebreo.
- source_word: בֶּאֱמוּנָה
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en fe
  - en firmeza
  - en fidelidad de pacto
  lexicon: HALOT
  rationale: אֱמוּנָה aquí denota fiabilidad, lealtad y fidelidad en un marco de pacto. «Fidelidad» conserva ese campo semántico. «Fe» es posible formalmente, pero en español podría inclinarse hacia creencia subjetiva; «fidelidad» mantiene mejor la tensión relacional y matrimonial.
- source_word: וְיָדַעַתְּ
  english_pob_choice: and you shall know
  chosen_spanish: y conocerás
  alternatives_spanish:
  - y sabrás
  - y reconocerás
  lexicon: HALOT
  rationale: ידע suele significar «conocer», y en Oseas lleva profundidad relacional y de pacto. «Conocerás» preserva esa amplitud sin explicarla demasiado. «Reconocerás» o «sabrás» reducirían o desplazarían el matiz relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton debe conservarse como nombre propio divino en el texto español. La forma editorial estable del proyecto es «Yahvé», que mantiene la distinción frente a un sustituto como «SEÑOR».
theological_decisions:
- issue: Fuerza relacional de 'conocer' en contexto de pacto-esponsal
  english_pob_reading: retain 'know' in the main text without expanding it to 'know intimately' or 'acknowledge'
  chosen_spanish_reading: mantener «conocerás» sin ampliar a «conocerás íntimamente» ni a «reconocerás»
  alternative_spanish_readings:
  - conocerás íntimamente a Yahvé
  - reconocerás a Yahvé
  rationale: El hebreo ya carga con profundidad relacional y de pacto. Ampliarlo en el texto principal sería interpretar de más y podría estrechar el alcance. Mantener «conocerás» preserva la tensión teológica y la riqueza del verbo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el estado de alta concordancia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - «Desposaré» mantiene la imagen matrimonial de ארשׂ sin suavizarla hacia un verbo más genérico.
  - «Fidelidad» preserva el valor covenantal de אֱמוּנָה sin convertirlo en «fe» confesional.
  - «Conocerás» conserva la carga relacional de ידע sin añadir explicaciones interpretativas en el texto principal.
