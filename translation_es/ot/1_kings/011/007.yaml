translation:
  language: es
  text: Entonces Salomón edificó un lugar alto para Quemós, la abominación de Moab, en el monte que está frente a Jerusalén, y para Moloc[a], la abominación de los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Milcom» para «Moloc»; la forma hebrea aquí se lee tradicionalmente como «Moloc», aunque algunos la relacionan con la deidad ammonita Milcom.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español moderno y conserva el valor temporal sin añadir explicación.
- source_word: יִבְנֶה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en la narración funciona como pasado; «edificó» transmite bien la acción de levantar una estructura cultual.
- source_word: בָּמָה
  english_pob_choice: high place
  chosen_spanish: lugar alto
  alternatives_spanish:
  - altar en una altura
  - santuario alto
  lexicon: HALOT
  rationale: «Lugar alto» conserva el término técnico culto sin volverlo demasiado interpretativo; en español suena más natural que un calco rígido de «alto lugar».
- source_word: לִכְמוֹשׁ
  english_pob_choice: for Chemosh
  chosen_spanish: para Quemós
  alternatives_spanish:
  - para Quemos
  - para Camós
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del dios moabita en transliteración cercana a la forma hebrea. «Quemós» evita la adaptación tradicional a formas menos transparentes y sigue el valor de dedicación del sitio.
- source_word: שִׁקֻּץ מוֹאָב
  english_pob_choice: the abomination of Moab
  chosen_spanish: la abominación de Moab
  alternatives_spanish:
  - el ídolo detestable de Moab
  - la cosa detestable de Moab
  lexicon: HALOT
  rationale: «Abominación» preserva la fuerza peyorativa y religiosa del hebreo שִׁקֻּץ, como en el audit trail inglés, sin suavizar la condena narrativa.
- source_word: בָּהָר אֲשֶׁר עַל פְּנֵי יְרוּשָׁלִָם
  english_pob_choice: on the mountain that is opposite Jerusalem
  chosen_spanish: en el monte que está frente a Jerusalén
  alternatives_spanish:
  - en el monte opuesto a Jerusalén
  - en el monte que mira hacia Jerusalén
  lexicon: HALOT
  rationale: «Frente a» reproduce bien עַל־פְּנֵי en sentido espacial de oposición/facing. «Monte» mantiene la referencia geográfica sin precisar más de lo que da el texto.
- source_word: וּלְמֹלֶךְ
  english_pob_choice: and for Molech
  chosen_spanish: y para Moloc
  alternatives_spanish:
  - y para Molec
  - y para Milcom
  lexicon: HALOT
  rationale: La vocalización masorética favorece «Moloc» en la línea principal. Se conserva la ambigüedad textual documentada respecto de la identificación del nombre.
- source_word: שִׁקֻּץ בְּנֵי עַמּוֹן
  english_pob_choice: the abomination of the Ammonites
  chosen_spanish: la abominación de los amonitas
  alternatives_spanish:
  - la abominación de los hijos de Amón
  - el ídolo detestable de los amonitas
  lexicon: HALOT
  rationale: «Amonitas» es el equivalente idiomático natural de בְּנֵי עַמּוֹן. Se conserva la repetición de «abominación» para reflejar el paralelismo hebreo.
theological_decisions:
- issue: Designación peyorativa de deidades extranjeras
  english_pob_reading: Render שִׁקֻּץ as 'abomination' in both occurrences
  chosen_spanish_reading: Traducir שִׁקֻּץ como «abominación» en ambas ocurrencias
  alternative_spanish_readings:
  - «detestable cosa»
  - «ídolo detestable»
  rationale: El narrador bíblico expresa una valoración teológica negativa explícita. «Abominación» mantiene esa fuerza sin atenuarla ni reinterpretarla.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the text''s theological tension and force.'
- issue: Identidad de מֹלֶךְ
  english_pob_reading: Molech in the main text
  chosen_spanish_reading: Moloc en el texto principal
  alternative_spanish_readings:
  - Milcom
  - Molec
  rationale: La forma consonántica y la vocalización tradicional apoyan «Moloc». Como la identificación histórica sigue discutida, se preserva la alternativa en nota sin resolverla en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; document contested alternatives in footnotes.'
translation_notes:
  revision_awareness: 'El contexto auditado de la POB inglesa no muestra revisiones sustantivas posteriores: el texto quedó aprobado sin cambios en la última pasada, con acuerdo alto entre revisores. La versión española mantiene ese perfil, conservando las decisiones léxicas y la tensión teológica documentadas, sin introducir aclaraciones no respaldadas por la fuente.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «la abominación de Moab» y «la abominación de los amonitas».
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni un sustituto griego del nombre divino.
  - «Monte» y «lugar alto» conservan la distinción espacial y cultual del hebreo.
  - La nota sobre «Moloc» preserva la alternativa tradicional «Milcom» sin incorporarla al texto principal.
