translation:
  language: es
  text: Bienaventurado[a] el hombre cuya fuerza está en ti[b]; en su corazón están las calzadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sus corazones». El hebreo tiene un sufijo plural en «su(s) corazón(es)», aunque el verso comienza con el singular «el hombre».'
    reason: lexical_alternative
  - marker: b
    text: Las «calzadas» probablemente se refieren a rutas de peregrinación que llevan a la morada de Dios, pero este versículo no dice explícitamente «a Sion».
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: La fórmula hebrea de bienaventuranza pide una expresión elevada y breve. En español, «Bienaventurado» conserva el tono sapiencial y devocional mejor que una simple paráfrasis como «Feliz».
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico. En español, «el hombre» mantiene ese valor representativo sin neutralizar indebidamente la forma del original.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT
  rationale: Aquí el término designa vigor o capacidad proveniente de Dios. «Fuerza» es natural en español y preserva mejor el sentido funcional que una imagen más concreta como «fortaleza».
- source_word: לוֹ / בָךְ
  english_pob_choice: whose strength is in you
  chosen_spanish: cuya fuerza está en ti
  alternatives_spanish:
  - cuyo vigor está en ti
  - para quien tú eres fuerza
  lexicon: Hebrew grammar / HALOT
  rationale: El valor relacional del hebreo se expresa con una relativa posesiva en español. «Está en ti» conserva la localización/metáfora de dependencia sin añadir elementos no explícitos.
- source_word: מְסִלּוֹת
  english_pob_choice: the highways
  chosen_spanish: los caminos
  alternatives_spanish:
  - las calzadas
  - los senderos
  lexicon: HALOT
  rationale: El sustantivo puede referirse a vías elevadas o rutas principales. En español, «caminos» es más natural y mantiene el sentido de rutas de peregrinación sin forzar un tecnicismo. Se evita ampliar a «a Sion» porque no está explícito en el verso.
- source_word: בִּלְבָבָם
  english_pob_choice: in whose heart are
  chosen_spanish: en su corazón están
  alternatives_spanish:
  - en sus corazones están
  - en su corazón están los caminos
  lexicon: HALOT
  rationale: El hebreo presenta un sufijo plural («su(s) corazón(es)»), aunque el sujeto inicial es singular. El español puede conservar el sujeto representativo con singular («su corazón») y dejar constancia de la pluralidad del sufijo en una nota.
theological_decisions:
- issue: Sufijo plural en «su corazón» frente a sujeto singular «el hombre»
  english_pob_reading: in whose heart are the highways
  chosen_spanish_reading: en su corazón están los caminos
  alternative_spanish_readings:
  - en sus corazones están los caminos
  - en su corazón están los caminos
  rationale: La lectura principal conserva la fluidez del singular representativo, mientras que la nota explica que el hebreo usa un sufijo plural. Así no se borra la tensión gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Sentido implícito de peregrinación de מְסִלּוֹת
  english_pob_reading: the highways
  chosen_spanish_reading: los caminos
  alternative_spanish_readings:
  - las rutas de peregrinación
  - los caminos a Sion
  rationale: El contexto del Salmo sugiere peregrinación al lugar de Dios, pero el verso no lo dice de forma explícita. La traducción principal no introduce ese destino; la nota preserva la inferencia contextual sin convertirla en texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios, y el cotejo posterior reportó alta concordancia; por ello, no se introdujeron cambios de sentido, solo una adaptación española conservadora y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este verso no lo contiene.
  - Se evita «Cristo/Mesías» porque no aplica al versículo.
  - Se usa puntuación breve y poética para respetar el paralelismo hebreo.
  - «Caminos» se eligió por naturalidad en español, sin expandir el texto con «a Sion» en el cuerpo principal.
