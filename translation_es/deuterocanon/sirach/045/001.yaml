  yaml_path: translation/deuterocanon/sirach/045/001.yaml
  text: Beloved by God and men was Moses[c][b][a], whose memory is for blessing.
  footnotes:
  - marker: a
    text: Or, more literally, 'his memory is for good.' The Greek parallel reads 'whose memorial is in blessings,' which supports the idiomatic sense 'whose memory is for blessing.'
