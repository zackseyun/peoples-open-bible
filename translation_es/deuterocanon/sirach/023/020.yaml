- from: Antes de que todas las cosas fueran creadas[a], ya era conocido para él; así también después de haber sido llevadas a cabo.
  to: Antes de que todas las cosas fueran creadas[a], ya le era conocido; así también después de completarse.
  rationale: Se ajusta αὐτῷ a 'le' para reflejar mejor el dativo y se reemplaza la perífrasis pesada final por 'después de completarse', que expresa con más naturalidad y precisión el articular infinitivo μετὰ τὸ συντελεσθῆναι. Se conserva la nota sobre la ambigüedad representable de ἔγνωσται y el referente implícito del pronombre.
