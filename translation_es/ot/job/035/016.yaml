translation:
  language: es
  text: Así que Job abre su boca en vano[a]; sin conocimiento multiplica palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Job abre su boca en vano»; הֶבֶל puede denotar vanidad, futilidad o vaciedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - con vaciedad
  - con vanidad
  - en vacuidad
  lexicon: HALOT
  rationale: הֶבֶל expresa aquí la idea de vaciedad/futilidad aplicada al discurso. En español, «en vano» es la opción más natural y fiel al valor adverbial, manteniendo la tensión entre vacío y futilidad sin forzar una paráfrasis.
- source_word: יִפְצֶה פִּי/הוּ
  english_pob_choice: opens his mouth
  chosen_spanish: abre su boca
  alternatives_spanish:
  - desata su boca
  - pronuncia su boca
  - abre la boca
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para comenzar a hablar. «Abre su boca» conserva esa imagen; añadí «su» para reflejar el sufijo pronominal del hebreo y lograr una frase natural en español.
- source_word: בִּבְלִי דַעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - sin entendimiento
  - en ignorancia
  lexicon: HALOT
  rationale: בִּבְלִי marca ausencia, y דַעַת es «conocimiento». «Sin conocimiento» sigue de cerca el hebreo y mantiene la acusación de falta de saber, sin desplazarla hacia una interpretación más fuerte de «entendimiento».
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - dichos
  - discursos
  lexicon: HALOT
  rationale: El plural arameizante significa «palabras» o «dichos». «Palabras» es el equivalente más directo y claro en español.
- source_word: יַכְבִּר
  english_pob_choice: he multiplies
  chosen_spanish: multiplica
  alternatives_spanish:
  - aumenta
  - acumula
  - amontona
  lexicon: HALOT
  rationale: El hifil de כָּבַר comunica hacer abundante o numeroso. «Multiplica» conserva bien la fuerza causativa y combina naturalmente con «palabras».
- source_word: וְאִיּוֹב
  english_pob_choice: So Job
  chosen_spanish: Así que Job
  alternatives_spanish:
  - Y Job
  - Pero Job
  lexicon: HALOT
  rationale: El contexto concluye una argumentación previa; «Así que» refleja mejor el valor inferencial que un simple «y», sin imponer una oposición que el hebreo no exige.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Job 35:16 y armoniza con el expediente inglés de la POB. Se conservó la fuerza adverbial de הֶבֶל con «en vano», como en la revisión final inglesa, y se mantuvo el paralelismo entre «abre su boca» y «sin conocimiento multiplica palabras».
  spanish_consistency_notes:
  - Se usa «Job» como nombre propio, sin transliteración adicional.
  - Se conserva el registro bíblico sobrio y directo, evitando ampliaciones interpretativas.
  - «Palabras» mantiene el paralelismo con la acusación de discurso vacío y abundante.
