translation:
  language: es
  text: un tiempo para amar[a], y un tiempo para odiar[b]; un tiempo para la guerra[c], y un tiempo para la paz[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una estación». El hebreo עֵת puede denotar un tiempo o una estación, pero «tiempo» encaja mejor con el ritmo repetitivo del poema.
    reason: lexical_alternative
  - marker: b
    text: «Odiar» aquí traduce directamente el verbo hebreo. En este contexto sapiencial expresa una fuerte oposición o aversión, no necesariamente malicia pecaminosa.
    reason: lexical_alternative
  - marker: c
    text: «Guerra» traduce מִלְחָמָה, que también puede expresarse como «batalla» o «conflicto armado»; aquí «guerra» es la opción más clara e idiomática.
    reason: lexical_alternative
  - marker: d
    text: «Paz» traduce שָׁלוֹם, que también puede significar «bienestar» o «plenitud»; aquí el contraste con guerra favorece «paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - una temporada
  - una ocasión
  lexicon: HALOT
  rationale: עֵת designa un momento o período de tiempo. «Un tiempo» conserva el paralelismo poético repetido del pasaje y suena natural en español.
- source_word: לֶאֱהֹב
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - querer
  - tener amor
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de amar de manera directa. «Amar» corresponde bien al verbo hebreo y mantiene la simetría con el siguiente infinitivo.
- source_word: לִשְׂנֹא
  english_pob_choice: to hate
  chosen_spanish: odiar
  alternatives_spanish:
  - aborrecer
  - tener aversión
  lexicon: HALOT
  rationale: El verbo hebreo significa odiar con su fuerza básica. En español, «odiar» conserva mejor esa antítesis tajante con «amar» que suavizarlo con una paráfrasis.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el combate
  - la batalla
  - la guerra armada
  lexicon: HALOT
  rationale: מִלְחָמָה se refiere naturalmente a guerra o conflicto armado. «La guerra» es la equivalencia más clara y idiomática en este paralelismo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - el bienestar
  - la plenitud
  lexicon: HALOT
  rationale: Aunque שָׁלוֹם puede abarcar bienestar o integridad, el contraste inmediato con guerra favorece «paz» como sentido contextual principal.
theological_decisions:
- issue: Fuerza moral de «odiar» en el contraste sapiencial
  english_pob_reading: Retain 'hate' in the main text without softening.
  chosen_spanish_reading: Mantener «odiar» sin atenuarlo en el texto principal.
  alternative_spanish_readings:
  - «no amar»
  - «oponerse a»
  - «mostrar aversión»
  rationale: La línea enumera tiempos apropiados bajo la providencia de Dios; no formula un mandato moral absoluto. Mantener la dureza del contraste preserva la tensión poética y evita resolverla interpretativamente en la traducción.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica y poética sin alisarla.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios posteriores y el control cruzado mostró alta concordancia sin observaciones.'
  spanish_consistency_notes:
  - Se preservó «tiempo» para עֵת en coherencia con el patrón poético del libro.
  - Se mantuvo la antítesis directa amar/odiar para reflejar la fuerza lexical del hebreo.
  - Se eligió «la paz» para שָׁלוֹם por contraste inmediato con «la guerra», sin perder el trasfondo más amplio de bienestar.
