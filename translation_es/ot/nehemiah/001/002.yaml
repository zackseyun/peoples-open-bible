translation:
  language: es
  text: Hanani[a], uno de mis hermanos, vino —él y algunos hombres de Judá—, y yo les pregunté acerca de los judíos que habían escapado[b], los que habían quedado de la cautividad[c], y acerca de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judeanos». El término hebreo puede referirse a la gente de Judá o al pueblo judío en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «los sobrevivientes» o «el remanente» para «que habían escapado».
    reason: lexical_alternative
  - marker: c
    text: O «del exilio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino
  lexicon: HALOT
  rationale: El verbo narra movimiento y llegada en pasado simple. «Vino» conserva la naturalidad narrativa y corresponde bien al wayyiqtol sin añadir matices no presentes.
- source_word: חֲנָנִי
  english_pob_choice: Hanani
  chosen_spanish: Hanani
  alternatives_spanish:
  - Jananí
  lexicon: Transliteración propia
  rationale: Nombre propio transliterado. Se mantiene la forma estable en español bíblico sin adaptar innecesariamente la fonética.
- source_word: אֶחָד מֵאַחַי הוּא
  english_pob_choice: one of my brothers
  chosen_spanish: uno de mis hermanos
  alternatives_spanish:
  - uno de mis parientes
  - un hermano mío
  lexicon: HALOT
  rationale: La expresión idiomática indica que Hanani era uno entre los hermanos de Nehemías. «Hermanos» preserva el término familiar masculino y sigue el sentido directo del hebreo.
- source_word: וַאֲנָשִׁים מִיהוּדָה
  english_pob_choice: he and some men from Judah
  chosen_spanish: con hombres de Judá
  alternatives_spanish:
  - y algunos hombres de Judá
  - junto con hombres de Judá
  lexicon: HALOT
  rationale: El hebreo añade acompañantes asociados con Hanani. En español, «con hombres de Judá» expresa esa asociación de forma natural sin forzar la cantidad implícita.
- source_word: וָאֶשְׁאָלֵם
  english_pob_choice: I asked them
  chosen_spanish: yo les pregunté
  alternatives_spanish:
  - yo les hice preguntas
  - yo les inquirí
  lexicon: HALOT
  rationale: שאל aquí significa preguntar/inquirir. «Les pregunté» es claro y fiel; el pronombre explícito «les» conserva el objeto directo indirecto del hebreo.
- source_word: עַל
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: La preposición introduce el tema de la consulta. «Acerca de» es natural en español y refleja bien el valor temático de עַל.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En este contexto persa-posbabilónico, el término puede abarcar al pueblo judío más ampliamente. «Los judíos» es la opción más reconocible y coherente con la lectura amplia adoptada por la POB inglesa.
- source_word: הַפְּלֵיטָה
  english_pob_choice: who had escaped / the survivors / the remnant
  chosen_spanish: que habían escapado
  alternatives_spanish:
  - los sobrevivientes
  - el remanente
  lexicon: HALOT
  rationale: El sustantivo apunta a los escapados/sobrevivientes. En español, la relativa «que habían escapado» integra bien el sustantivo con el grupo mencionado sin volverlo pesado.
- source_word: אֲשֶׁר נִשְׁאֲרוּ
  english_pob_choice: who were left
  chosen_spanish: los que habían quedado
  alternatives_spanish:
  - los que quedaron
  - los que permanecieron
  lexicon: HALOT
  rationale: La cláusula relativizada refuerza que ese grupo era el que permaneció tras la crisis. «Los que habían quedado» preserva el valor resultativo/pasivo mejor que una simple narración activa.
- source_word: מִן הַשֶּׁבִי
  english_pob_choice: from the captivity / from the exile
  chosen_spanish: de la cautividad
  alternatives_spanish:
  - del exilio
  - de la cautividad
  lexicon: HALOT
  rationale: שבי designa cautiverio/exilio. «Cautividad» mantiene la fuerza concreta del sustantivo y se ajusta a la manera tradicional pero todavía inteligible de hablar del destierro sin borrarlo.
- source_word: וְעַל יְרוּשָׁלִָם
  english_pob_choice: and about Jerusalem
  chosen_spanish: y acerca de Jerusalén
  alternatives_spanish:
  - y sobre Jerusalén
  - y respecto de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior. «Acerca de» mantiene el valor de asunto investigado y suena natural en español.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto hebreo y el trazado auditado en inglés. No hubo revisiones aplicadas en el pasaje inglés; por eso la traducción española refleja directamente las decisiones léxicas estables del POB, conservando las ambigüedades documentadas en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el Tetragrámaton como forma independiente en la superficie española porque el texto no lo exige explícitamente en la redacción del versículo.
  - Se ha preferido «cautividad» para شבי por fidelidad léxica y por continuidad con el registro bíblico español.
  - «Judíos» se usa como término amplio, con nota alternativa «Judeanos» para reflejar la posibilidad semántica del hebreo.
  - La puntuación con comas y coordinación reproduce la estructura narrativa del hebreo sin sobrerrepresentar la sintaxis inglesa.
