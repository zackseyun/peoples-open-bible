translation:
  language: es
  text: Y no darás tu emisión a la esposa de tu compañero[a], para quedar inmundo con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Y a la esposa de tu compañero no darás tu yacer/emisión para semilla, para quedar inmundo con ella». La expresión es un modismo para relaciones sexuales con emisión seminal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: And ... to
  chosen_spanish: Y ... a
  alternatives_spanish:
  - Y ... hacia
  - Y ... con
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección o relación hacia una persona. En español, «a» conserva esa dirección en la construcción verbal sin volverla extraña en una prohibición legal.
- source_word: אֵשֶׁת
  english_pob_choice: wife of
  chosen_spanish: esposa de
  alternatives_spanish:
  - mujer de
  - mujer esposa de
  lexicon: HALOT
  rationale: En este contexto legal-sexual, el sentido es el de una mujer casada; «esposa de» es natural en español y mantiene la especificidad del constructo.
- source_word: עֲמִיתְךָ
  english_pob_choice: your fellow man
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu semejante
  - tu compañero
  - tu vecino
  lexicon: HALOT
  rationale: El término apunta a un miembro del mismo cuerpo comunitario en un marco legal. «Prójimo» es una equivalencia natural en español y conserva la relación interpersonal sin sonar demasiado técnica.
- source_word: לֹא תִתֵּן
  english_pob_choice: you shall not give
  chosen_spanish: no darás
  alternatives_spanish:
  - no debes dar
  - no debes entregar
  lexicon: HALOT
  rationale: El imperfecto con לֹא en lenguaje legal expresa prohibición. «No darás» refleja ese valor de mandato prohibitivo y conserva el verbo básico del hebreo.
- source_word: שְׁכָבְתְּךָ
  english_pob_choice: your emission
  chosen_spanish: tu emisión
  alternatives_spanish:
  - tu semen
  - tu tendido
  lexicon: HALOT
  rationale: Sigue la decisión de la POB inglesa de conservar el valor idiomático ligado a la emisión seminal sin explicitar en exceso el acto sexual. «Tu emisión» es claro en español y mantiene la tensión léxica del hebreo.
- source_word: לְזָרַע
  english_pob_choice: to become unclean
  chosen_spanish: para hacerte inmundo
  alternatives_spanish:
  - para volverte inmundo
  - para quedar inmundo
  lexicon: HALOT
  rationale: La secuencia es idiomática y difícil de reproducir de manera literal en español. El inglés POB integra el sentido resultativo en la cláusula principal; en español, «para hacerte inmundo» expresa el resultado ritual de la acción sin perder la noción de impureza.
- source_word: לְ/טָמְאָה
  english_pob_choice: to become unclean
  chosen_spanish: hacerte inmundo
  alternatives_spanish:
  - contaminarte ritualmente
  - volverte impuro
  lexicon: HALOT
  rationale: «Inmundo» conserva el registro bíblico de impureza ritual/moral y evita una paráfrasis doctrinal. El reflexivo «hacerte» reproduce la orientación resultativa del infinitivo con ל.
- source_word: בָֽ/הּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - por ella
  - en ella
  lexicon: HALOT
  rationale: En este contexto sexual, la preposición hebrea funciona idiomáticamente. «Con ella» es la opción española más natural y evita lecturas anatómicas incorrectas.
theological_decisions:
- issue: Prohibición sexual y lenguaje de impureza
  english_pob_reading: The verse prohibits sexual intercourse with another man's wife while preserving the text's own language of uncleanness.
  chosen_spanish_reading: La frase se entiende como prohibición de relaciones sexuales con la esposa de otro, manteniendo el lenguaje bíblico de inmundicia ritual.
  alternative_spanish_readings:
  - No te acostarás con la esposa de tu prójimo, y quedarás impuro con ella.
  - No darás tu semen a la esposa de tu prójimo, para contaminarte con ella.
  rationale: La traducción conserva la forma idiomática del hebreo y no sustituye la categoría textual de impureza por un lenguaje moral moderno más explicativo. «Inmundo» mantiene la tensión entre lo ritual y lo ético sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se revisó el hebreo consonántico y la segmentación morfológica junto con la traducción auditada en inglés. La versión española sigue la solución idiomática de la POB, pero ajusta el verbo principal para mantener naturalidad y el valor legal de la prohibición.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «prójimo» para עֲמִיתְךָ por su valor comunitario y legal, en lugar de «vecino» o un término más general.
  - «Inmundo» se usa aquí como término bíblico de impureza, no como juicio social.
  - La nota al pie preserva la alternativa literal «para semilla» porque el hebreo la contiene explícitamente y la lectura idiomática podría ocultarla.
