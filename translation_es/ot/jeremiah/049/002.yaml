translation:
  language: es
  text: Por tanto, he aquí, vienen días, dice Yahvé, en que haré oír contra Rabá de los amonitas el clamor de guerra[a], y se convertirá en un montículo de desolación, y sus ciudades hijas[b] serán incendiadas. Entonces Israel desposeerá a los que lo desposeyeron[c], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el grito de guerra' o 'la alarma de guerra'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'sus hijas', un modismo para las ciudades o aldeas menores dependientes de una ciudad principal.
    reason: cultural_note
  - marker: c
    text: 'El hebreo repite la misma raíz: Israel ''desposeerá'' a los que lo ''desposeyeron''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa la relación inferencial con el juicio precedente. 'Por tanto' conserva el valor conclusivo profético sin sonar forzado en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: HALOT
  rationale: Mantiene la fuerza deíctica y solemne del anuncio profético. 'He aquí' es más natural en registro bíblico que omitirlo.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - los días vienen
  lexicon: HALOT
  rationale: Conserva el modismo profético de futuro inminente con una construcción natural en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se sigue el nombre divino Yahvé según el criterio del proyecto. 'Dice Yahvé' reproduce la fórmula profética final con sobriedad y claridad en español.
- source_word: וְהִשְׁמַעְתִּי
  english_pob_choice: I will cause ... to be heard
  chosen_spanish: haré oír
  alternatives_spanish:
  - haré que se oiga
  - haré sonar
  lexicon: HALOT
  rationale: El hifil es causativo; 'haré oír' comunica esa causación de manera idiomática y fiel.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: En contexto de guerra, 'contra' expresa mejor la dirección hostil del clamor que un calco preposicional.
- source_word: רַבַּת בְּנֵי עַמּוֹן
  english_pob_choice: Rabbah of the Ammonites
  chosen_spanish: Rabá de los amonitas
  alternatives_spanish:
  - Rabá de los hijos de Amón
  - Rabá amonita
  lexicon: HALOT
  rationale: Se conserva el topónimo Rabá y el valor gentilicio del constructo con una forma natural para español bíblico.
- source_word: תְּרוּעַת מִלְחָמָה
  english_pob_choice: the battle cry
  chosen_spanish: el clamor de guerra
  alternatives_spanish:
  - el grito de guerra
  - la alarma de guerra
  lexicon: HALOT
  rationale: '''Clamor de guerra'' transmite el grito/estruendo bélico sin reducirlo a una sola matiz. Preserva la amplitud semántica del término hebreo y la alternativa inglesa.'
- source_word: וְהָיְתָה לְתֵל שְׁמָמָה
  english_pob_choice: it will become a desolate mound
  chosen_spanish: se convertirá en un montículo de desolación
  alternatives_spanish:
  - será un montículo de desolación
  - se volverá un montón arruinado
  lexicon: HALOT
  rationale: '''Montículo'' conserva la imagen de תֵל sin tecnicismo arqueológico; ''de desolación'' retiene el sustantivo abstracto y el tono profético del hebreo.'
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus hijas
  - sus pueblos dependientes
  - sus aldeas
  lexicon: HALOT
  rationale: Se preserva el idiomático 'hijas' con aclaración explícita en español. 'Ciudades hijas' mantiene la metáfora de asentamientos subordinados a la ciudad principal.
- source_word: בָּאֵשׁ תִּצַּתְנָה
  english_pob_choice: will be set on fire
  chosen_spanish: serán incendiadas por el fuego
  alternatives_spanish:
  - serán puestas en fuego
  - arderán en el fuego
  lexicon: HALOT
  rationale: Se vierte el resultado pasivo de destrucción con un español claro. 'Incendiadas por el fuego' conserva el énfasis intensivo del hebreo sin sobreexplicar.
- source_word: וְיָרַשׁ
  english_pob_choice: will dispossess
  chosen_spanish: desposeerá
  alternatives_spanish:
  - tomará posesión de
  - heredará
  lexicon: HALOT
  rationale: '''Desposeerá'' reproduce la reversión de dominio y la fuerza adversarial de ירש en este contexto, mejor que ''heredará'' para el sentido judicial de despojo.'
- source_word: אֶת יֹרְשָׁיו
  english_pob_choice: those who dispossessed him
  chosen_spanish: a los que lo habían desposeído
  alternatives_spanish:
  - a sus despojadores
  - a los que tomaron posesión de él
  lexicon: HALOT
  rationale: Se mantiene el juego verbal de la raíz ירש al traducir ambas formas con 'desposeer'. El pronombre singular 'lo' conserva el singular colectivo de Israel.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  lexicon: HALOT
  rationale: Fórmula conclusiva profética breve y natural, coherente con el resto del versículo y con el nombre divino adoptado por el proyecto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el Tetragrámaton con la forma española estándar del proyecto, evitando la sustitución por un título. Esto mantiene visible el nombre del pacto en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Juego verbal con ירש en la cláusula final
  english_pob_reading: Israel will dispossess those who dispossessed him
  chosen_spanish_reading: Israel desposeerá a los que lo habían desposeído
  alternative_spanish_readings:
  - Israel heredará a sus herederos
  - Israel tomará posesión de los que lo poseyeron
  rationale: La doble raíz se conserva con 'desposeer/desposeído', de modo que el lector perciba la inversión de la agresión original. Esto evita borrar la tensión retórica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve lexical and rhetorical tensions)
- issue: Israel como singular colectivo en el sufijo final
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - los
  rationale: El hebreo trata a Israel como singular colectivo. 'Lo' conserva esa referencia singular sin forzar una pluralización que desdibujaría la gramática de origen.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Redacción alineada con la lectura auditada de alta concordancia; se preservan el nombre divino, el modismo de 'hijas' y el juego verbal final con ירש. No se incorporaron revisiones adicionales porque el pasaje ya estaba marcado como unchanged en el último pass.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene el registro profético con 'he aquí' y 'dice Yahvé'.
  - '''Desposeer/desposeído'' se repite para conservar la raíz hebrea en la cláusula final.'
  - '''Sus ciudades hijas'' explicita el modismo sin borrar la metáfora original.'
  - El sufijo singular de Israel se refleja con 'lo' para respetar el colectivo singular hebreo.
