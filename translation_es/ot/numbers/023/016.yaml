translation:
  language: es
  text: 'Yahvé encontró a Balaam y puso una palabra en su boca[a], y le dijo: «Vuelve a Balac, y así hablarás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vino sobre Balaam» o «se encontró con Balaam».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּר / קָרָה
  english_pob_choice: met
  chosen_spanish: se encontró con
  alternatives_spanish:
  - se le apareció
  - se topó con
  - encounteró
  lexicon: HALOT
  rationale: El hebreo puede expresar un encuentro o una ocurrencia; con Yahvé como sujeto, «se encontró con» comunica un encuentro real sin añadir más de lo que el texto dice. Evita una formulación demasiado técnica o visionaria que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino, en línea con la política del POB de no sustituir el Tetragrama por una mayúscula reverencial. «Yahvé» conserva el valor de nombre personal del pacto y es la forma acordada para el español.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - declaración
  - asunto
  lexicon: HALOT
  rationale: En la expresión hebrea, דָּבָר funciona como una unidad de habla dada por Dios. «Palabra» preserva el singular y la metáfora profética de poner una palabra en la boca.
- source_word: וַיָּשֶׂם ... בְּפִיו
  english_pob_choice: put a word in his mouth
  chosen_spanish: puso una palabra en su boca
  alternatives_spanish:
  - puso palabras en su boca
  - le puso un mensaje en la boca
  lexicon: HALOT
  rationale: Se conserva el giro idiomático casi literalmente porque el español lo entiende bien y refleja con precisión el singular de דָּבָר. «Puso palabras» pluralizaría innecesariamente el hebreo.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve atrás
  - Retorna
  lexicon: HALOT
  rationale: El imperativo apunta al regreso a Balac. «Vuelve» es natural en español y mantiene la directividad breve del hebreo.
- source_word: וְכֹה תְדַבֵּר
  english_pob_choice: and thus you shall speak
  chosen_spanish: y así hablarás
  alternatives_spanish:
  - y de esta manera hablarás
  - y esto dirás
  - y así dirás
  lexicon: HALOT
  rationale: «Y así hablarás» conserva el valor de כֹה como adverbio de manera y mantiene el tono formal-profético del mandato. Se prefiere «hablarás» para no forzar un cambio innecesario a «dirás» si se desea conservar el eco del verbo de habla.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama. La traducción española conserva el nombre divino como nombre propio, no como título sustitutivo, para mantener la transparencia textual y la coherencia doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Encuentro divino expresado por וַיִּקָּר
  english_pob_reading: met Balaam
  chosen_spanish_reading: se encontró con Balaam
  alternative_spanish_readings:
  - vino sobre Balaam
  - se le acercó a Balaam
  - encuentró a Balaam
  rationale: El verbo admite matices de encuentro/irrupción. En español, «se encontró con» transmite un encuentro directo sin exagerar el modo de la manifestación. No se traduce como una teofanía más específica porque el hebreo aquí no la desarrolla.
  doctrine_reference: HALOT; contexto narrativo de Números 23:16
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir una traducción directa y natural del verbo de encuentro, evitando añadir una preposición innecesaria. También conserva el singular de דָּבָר y el mandato final con tono profético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יְהוָה.
  - Se usa «palabra» en singular para reflejar דָּבָר y evitar una pluralización interpretativa.
  - El cierre «y así hablarás» conserva la fórmula de mandato profético con buena naturalidad en español.
  - La puntuación reproduce el flujo narrativo del hebreo con una cita directa final.
