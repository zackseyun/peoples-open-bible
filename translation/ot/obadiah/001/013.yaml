theological_decisions:
- issue: Singular and plural pronominal shifts in the verse
  chosen_reading: Retain 'their disaster' for the first clause and 'his calamity/disaster' in the following clauses
  alternative_readings:
  - Harmonize all suffixes as plural in English
  - Harmonize all suffixes as singular in English
  rationale: The Hebrew shifts from plural ('their') to singular ('his'), likely reflecting movement between the collective people and the personified nation/brother. Preserving the shift respects the source text's rhetoric rather than smoothing it away.
  doctrine_reference: 'Translation philosophy #3, #5'
