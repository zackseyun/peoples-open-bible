revisions:
- from: Él es el que se sienta sobre[a] el círculo de la tierra, y sus habitantes son como langostas[b]; él extiende los cielos como un toldo y los despliega como una tienda para habitar.
  to: Él es el que está sentado sobre[a] el círculo de la tierra, y sus habitantes son como saltamontes[b]; él extiende los cielos como una cortina y los despliega como una tienda para habitar.
  rationale: Se corrigieron dos elecciones léxicas que se apartaban del hebreo y del audit trail inglés ('langostas' → 'saltamontes'; 'toldo' → 'cortina') y se suavizó la primera cláusula para reflejar mejor el valor estativo del participio hebreo en español natural.
