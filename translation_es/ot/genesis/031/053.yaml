    issue: «el dios de su padre» no refleja adecuadamente אֱלֹהֵי אֲבִיהֶם
    rationale: El hebreo lleva posesivo plural «de su padre de ellos / de su antepasado». En español, «su padre» tiende a leerse como singular del referente inmediato y puede confundir. «Su antepasado» preserva mejor la referencia compartida y la naturalidad.
  - severity: medium
    issue: La nota [a] reproduce la misma imprecisión con «su padre»
    rationale: La nota alternativa debe reflejar con fidelidad la lectura capitalizada completa del hebreo. Mantener «su padre» allí arrastra el mismo problema y reduce la utilidad explicativa de la nota.
  revised_spanish_text: Que el Dios de Abraham y el dios de Nacor[a], el dios de su antepasado, juzgue entre nosotros. Y Jacob juró por el Temor de su padre Isaac[b].
