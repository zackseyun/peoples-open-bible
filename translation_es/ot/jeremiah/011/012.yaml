translation:
  language: es
  text: Entonces las ciudades de Judá y los habitantes de Jerusalén irán y clamarán a los dioses a quienes queman incienso, pero no los salvarán en el momento de su calamidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el momento de su desastre' o 'en el tiempo de su aflicción'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  english_pob_choice: Then ... will go
  chosen_spanish: Entonces ... irán
  alternatives_spanish:
  - Y ... irán
  - Así que ... irán
  lexicon: HALOT
  rationale: La secuencia profética pide un valor futuro en español. 'Entonces' conserva la fuerza consecutiva que el POB inglés marcó con 'Then', sin volverlo mecánico.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las urbes de Judá
  - las ciudades pertenecientes a Judá
  lexicon: HALOT
  rationale: La cadena constructa se expresa de forma natural y transparente con 'de Judá'.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: and the inhabitants of Jerusalem
  chosen_spanish: y los habitantes de Jerusalén
  alternatives_spanish:
  - y los que habitan en Jerusalén
  - y los residentes de Jerusalén
  lexicon: HALOT
  rationale: '''Habitantes'' preserva el sentido colectivo del participio y suena idiomático en español moderno.'
- source_word: וְזָעֲקוּ אֶל
  english_pob_choice: and cry out to
  chosen_spanish: y clamarán a
  alternatives_spanish:
  - y gritarán a
  - y pedirán auxilio a
  lexicon: HALOT
  rationale: זעק expresa un clamor de angustia; 'clamar' conserva mejor el tono de súplica desesperada que 'llamar' o 'pedir'.
- source_word: הָאֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - los dioses falsos
  - las deidades
  lexicon: HALOT
  rationale: El plural está requerido por el contexto de idolatría y por el verbo/incensación dirigida a ellos; 'los dioses' mantiene la referencia sin añadir calificativos no presentes.
- source_word: אֲשֶׁר הֵם מְקַטְּרִים לָהֶם
  english_pob_choice: to whom they burn incense
  chosen_spanish: a quienes queman incienso
  alternatives_spanish:
  - a quienes ofrecen incienso
  - a quienes les queman incienso
  lexicon: HALOT
  rationale: '''Quemar incienso'' es una forma española clara y tradicional para קטר en este contexto cultual; el relativo se mantiene directo y sin sobreexplicación.'
- source_word: וְהוֹשֵׁעַ לֹא יוֹשִׁיעוּ לָהֶם
  english_pob_choice: but they will not save them
  chosen_spanish: pero no los salvarán
  alternatives_spanish:
  - pero de ningún modo los salvarán
  - pero no podrán salvarlos
  lexicon: HALOT
  rationale: El hebreo intensifica la raíz de salvar, pero la revisión inglesa eliminó 'certainly' por no estar exigido. En español, la forma simple 'no los salvarán' conserva fidelidad y naturalidad sin añadir énfasis extra.
- source_word: בְּעֵת רָעָתָם
  english_pob_choice: at the time of their trouble
  chosen_spanish: en el tiempo de su calamidad
  alternatives_spanish:
  - en el tiempo de su desastre
  - en el tiempo de su angustia
  - en el momento de su calamidad
  lexicon: HALOT
  rationale: רָעָה aquí señala aflicción/calamidad, no mal moral. 'Calamidad' sigue de cerca el matiz del POB inglés y conserva la tensión del pasaje; 'tiempo de su angustia' sería más interpretativo.
theological_decisions:
- issue: Referencia de הָאֱלֹהִים en un contexto de idolatría
  english_pob_reading: false gods/idols worshiped by Judah and Jerusalem
  chosen_spanish_reading: los dioses a los que se dirige el culto idolátrico
  alternative_spanish_readings:
  - los dioses falsos
  - las divinidades idolátricas
  rationale: El contexto inmediato menciona incienso ofrecido a estos seres, por lo que el plural no es genérico sino polémico. 'Los dioses' mantiene la lectura del POB y deja visible la ironía profética sin suavizarla.
  doctrine_reference: Jeremías 11:12; contexto de denuncia de idolatría en Jeremías
- issue: Intensificación de la negación en יוֹשִׁיעוּ
  english_pob_reading: they will not save them
  chosen_spanish_reading: no los salvarán
  alternative_spanish_readings:
  - no podrán salvarlos
  - de ningún modo los salvarán
  rationale: La revisión inglesa eliminó el intensificador 'certainly' por no requerirse estrictamente. En español se evita añadir un adverbio equivalente, manteniendo la negación sencilla y fiel al texto revisado.
  doctrine_reference: Jeremías 11:12; fuerza verbal de la raíz ישׁע
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del POB inglés: se eliminó el intensificador innecesario en la negación y se prefirió una expresión temporal más natural. Por eso el español evita sobretraducir la fuerza del verbo y mantiene ''en el tiempo de su calamidad'' como opción principal, con alternativas en nota.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - '''Dios''/''dioses'' se distingue por contexto: aquí el plural es deliberado por el marco de idolatría.'
  - '''Calamidad'' se eligió para reflejar רָעָה en sentido de adversidad sufrida, no de mal moral.'
  - La puntuación mantiene una cadencia profética clara y publicable en español moderno.
