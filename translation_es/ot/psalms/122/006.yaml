review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: imperativo exhortativo dirigido a los oyentes, ''paz'' para שָׁלוֹם, y segundo hemistiquio como deseo/oración en vez de promesa categórica. También mantiene correctamente el trato directo a Jerusalén con ''te''. Sin embargo, omite una alternativa importante ya preservada en el rastro inglés para יִשְׁלָיוּ: la lectura/puntuación posible como deseo o como afirmación (''prosperen'' / ''prosperarán'').'
  spanish_quality_summary: La redacción es clara, natural y digna. 'Pidan por la paz de Jerusalén' es comprensible, pero 'Oren por la paz de Jerusalén' suena más idiomático en español eclesial para una exhortación litúrgica a interceder; además evita el matiz algo coloquial de 'pidan por'. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Jerusalén', 'paz' y el tratamiento directo a la ciudad están bien. La decisión 'prosperen' concuerda con la revisión inglesa final.
  issues:
  - severity: medium
    issue: La expresión principal 'Pidan por la paz de Jerusalén' es menos idiomática que 'Oren por la paz de Jerusalén' en registro bíblico-litúrgico.
    rationale: Aunque שַׁאֲלוּ puede significar 'pedir', la decisión inglesa principal ya interpretó el contexto como intercesión ('Pray for'). En español neutro de iglesia, 'oren por' comunica mejor esa exhortación sin añadir sentido ajeno.
  - severity: medium
    issue: Falta una nota que preserve la alternativa de lectura del segundo hemistiquio ('prosperarán').
    rationale: El POB inglés conserva explícitamente la ambigüedad/juego entre deseo y afirmación para יִשְׁלָיוּ. El español debería mantener esa alternativa en nota, ya que la formulación principal 'que prosperen' selecciona solo una posibilidad.
  revised_spanish_text: 'Oren por la paz de Jerusalén[a]: que prosperen los que te aman[b].'
  revised_footnotes:
  - marker: a
    text: 'O: «Pidan por la paz de Jerusalén» o «Busquen la paz de Jerusalén».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que prosperen los que te aman» o «los que te aman prosperarán».'
    reason: alternative_reading
  revision_rationale: Se ajusta el imperativo principal a 'Oren por' para reflejar con más naturalidad el valor litúrgico/intercesor documentado para שַׁאֲלוּ en este contexto. También se añade la alternativa del segundo hemistiquio para preservar la ambigüedad poética de יִשְׁלָיוּ entre deseo/oración y afirmación, en línea con el rastro inglés del POB.
