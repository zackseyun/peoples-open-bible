translation:
  language: es
  text: Al tercer día[a], mientras estaban con dolor, dos de los hijos de Jacob, Simeón y Leví, hermanos de Dina, cada uno tomó su espada; cayeron sobre la ciudad sin sospecharlo[b], y mataron a todo varón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y sucedió que al tercer día, mientras estaban con dolor...». El hebreo incluye una fórmula narrativa introductoria que puede expresarse de manera más plena.'
    reason: previous_rendering
  - marker: b
    text: O «confiadamente / seguros»; el hebreo בֶּטַח puede describir la manera de los atacantes o el estado desprevenido y seguro de la ciudad. Aquí se entiende que la ciudad fue tomada por sorpresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - Y sucedió
  - Entonces
  lexicon: HALOT
  rationale: La construcción narrativa introduce el siguiente evento en secuencia; en español, 'Al tercer día' preserva la marcación temporal inicial sin añadir fórmulas arcaicas.
- source_word: בִּהְיוֹתָם כֹּאֲבִים
  english_pob_choice: while they were in pain
  chosen_spanish: mientras ellos estaban con dolor
  alternatives_spanish:
  - cuando estaban con dolor
  - mientras sufrían
  lexicon: HALOT
  rationale: El infinitivo con preposición indica simultaneidad. 'Con dolor' conserva el sentido básico de כֹּאֲבִים sin precisar de más la causa, y mantiene claridad natural en español.
- source_word: שְׁנֵי בְנֵי יַעֲקֹב
  english_pob_choice: two of Jacob’s sons
  chosen_spanish: dos de los hijos de Jacob
  alternatives_spanish:
  - los dos hijos de Jacob
  - dos hijos de Jacob
  lexicon: HALOT
  rationale: La relación partitiva se expresa con naturalidad en español mediante 'dos de los hijos de Jacob'.
- source_word: שִׁמְעוֹן וְלֵוִי
  english_pob_choice: Simeon and Levi
  chosen_spanish: Simeón y Leví
  alternatives_spanish:
  - Simón y Leví
  lexicon: Nombres propios bíblicos
  rationale: Se conserva la forma usual de los nombres en español bíblico, con acentuación gráfica conforme a la ortografía del idioma.
- source_word: אֲחֵי דִינָה
  english_pob_choice: Dinah’s brothers
  chosen_spanish: hermanos de Dina
  alternatives_spanish:
  - los hermanos de Dina
  lexicon: HALOT
  rationale: La apposición identifica a Simeón y Leví; 'hermanos de Dina' es una formulación natural y fiel al hebreo.
- source_word: אִישׁ חַרְבּוֹ
  english_pob_choice: each took his sword
  chosen_spanish: cada uno tomó su espada
  alternatives_spanish:
  - cada uno con su espada
  - un hombre con su espada
  lexicon: HALOT
  rationale: El distributivo איש con sufijo se expresa bien en español con 'cada uno'. Mantiene la referencia a la espada propia de cada hombre y el verbo de toma exigido por el contexto.
- source_word: וַיָּבֹאוּ עַל הָעִיר
  english_pob_choice: came upon the city
  chosen_spanish: entraron sobre la ciudad
  alternatives_spanish:
  - vinieron contra la ciudad
  - cayeron sobre la ciudad
  lexicon: HALOT
  rationale: '''Sobre la ciudad'' conserva el valor direccional y ofensivo del hebreo; ''entraron'' comunica el avance hostil sin traducir mecánicamente. Se evita ''contra'' porque el contexto de בוא עַל aquí sigue la imagen de irrupción.'
- source_word: בֶּטַח
  english_pob_choice: unsuspecting
  chosen_spanish: confiados
  alternatives_spanish:
  - sin sospecha
  - seguro[s]
  lexicon: HALOT
  rationale: El adverbio puede describir la condición de seguridad o confianza. En este contexto, 'confiados' expresa bien la idea de que la ciudad no estaba preparada, preservando la ambigüedad reconocida por la POB en la nota inglesa.
- source_word: וַיַּהַרְגוּ כָּל זָכָר
  english_pob_choice: killed every male
  chosen_spanish: mataron a todo varón
  alternatives_spanish:
  - mataron a todo macho
  - mataron a cada varón
  lexicon: HALOT
  rationale: '''Todo varón'' refleja con precisión כָּל זָכָר, manteniendo la referencia al sexo masculino de forma más exacta que ''todos los hombres''.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el expediente inglés más reciente, incluyendo la decisión revisada sobre בֶּטַח como adverbio de inseguridad/sorpresa. Se ajustó el español para que todos los marcadores de nota aparezcan anclados en el texto y para evitar una nota sin referencia.
  spanish_consistency_notes:
  - Se usa 'Simeón' y 'Leví' como formas españolas comunes y estables para los nombres propios.
  - Se conserva 'Dina' como forma usual en español bíblico.
  - '''Varón'' traduce זָכָר con mayor precisión semántica que ''hombre'' en este contexto.'
  - La puntuación sigue el ritmo narrativo del hebreo y del POB inglés, con una sola oración coordinada.
