review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo y las dos notas del rastro de auditoría inglés: el perfecto iterativo de וְאָמְרוּ como presente habitual y la literalidad de בְעֶלְיוֹן como «en el Altísimo». Sin embargo, «¿Cómo puede saber Dios?» introduce una modalización de capacidad que el hebreo no explicita y que el inglés POB evitó en su elección principal.'
  spanish_quality_summary: El español es claro y legible, pero «¿Cómo puede saber Dios?» suaviza y reinterpreta la burla. «¿Cómo sabe Dios?» es más directo, más fiel al interrogativo retórico hebreo, y sigue siendo natural en español. El resto del verso suena digno y claro.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» para אֵל y «el Altísimo» para עֶלְיוֹן están bien. La nota sobre «en el Altísimo» preserva adecuadamente la decisión léxica documentada.
  issues:
  - severity: medium
    issue: La frase «¿Cómo puede saber Dios?» añade matiz modal no presente en el hebreo principal.
    rationale: אֵיכָה יָדַע אֵל corresponde mejor a «¿Cómo sabe Dios?» o, menos literalmente, «¿Cómo es que Dios sabe?». El inglés auditado rechazó añadir «can». «Puede saber» desplaza la pregunta hacia capacidad en vez de conocimiento.
  revised_spanish_text: 'Y dicen[a]: «¿Cómo sabe Dios? ¿Hay conocimiento en el Altísimo[b]?».'
