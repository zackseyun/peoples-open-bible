translation:
  language: es
  text: 'Pero su amo le dijo[a]: «No nos desviaremos a una ciudad extranjera, que no es de los hijos de Israel; más bien, seguiremos hasta Guibeá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de los hijos de Israel». Es la expresión étnica israelita estándar; «israelitas» es una posible redacción más fluida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su amo y señor
  lexicon: HALOT
  rationale: El contexto narrativo indica una relación humana de autoridad, no un título divino. «Señor» mantiene la dignidad del cargo y es natural en español; «amo» sería más duro, aunque posible para resaltar la dependencia social.
- source_word: נָסוּר
  english_pob_choice: we will not turn aside
  chosen_spanish: no nos desviaremos
  alternatives_spanish:
  - no nos apartaremos
  - no nos volveremos aparte
  lexicon: HALOT
  rationale: El verbo expresa apartarse del camino para dirigirse a otro lugar. «Desviarnos» conserva la idea direccional y resulta idiomática en español. «Apartarnos» es alternativa válida, pero un poco más abstracta.
- source_word: עִיר נָכְרִי
  english_pob_choice: a foreign city
  chosen_spanish: una ciudad extranjera
  alternatives_spanish:
  - una ciudad foránea
  - una ciudad de extraños
  lexicon: HALOT
  rationale: נָכְרִי marca lo perteneciente a otros pueblos o forasteros. «Extranjera» es la opción más natural en español y comunica la oposición étnica y territorial del contexto.
- source_word: אֲשֶׁר לֹא מִבְּנֵי יִשְׂרָאֵל הֵנָּה
  english_pob_choice: which is not of the sons of Israel
  chosen_spanish: que no es de los hijos de Israel
  alternatives_spanish:
  - que no pertenece a los hijos de Israel
  - que no es de entre los hijos de Israel
  lexicon: HALOT
  rationale: La frase hebrea describe a la ciudad como ajena al grupo israelita. «No es de los hijos de Israel» refleja con bastante literalidad la construcción y conserva la expresión étnica «hijos de Israel», sin suavizarla a una formulación más interpretativa.
- source_word: וְעָבַרְנוּ
  english_pob_choice: we will go on
  chosen_spanish: seguiremos
  alternatives_spanish:
  - iremos adelante
  - pasaremos
  lexicon: HALOT
  rationale: En el contexto de viaje, עבר expresa continuar más allá de la opción presente. «Seguiremos» comunica bien la continuidad del recorrido en español sin añadir la idea de cruce físico que «pasaremos» podría sugerir de forma menos precisa.
- source_word: עַד גִּבְעָה
  english_pob_choice: as far as Gibeah
  chosen_spanish: hasta Guibeá
  alternatives_spanish:
  - así como Guibeá
  - hasta llegar a Guibeá
  lexicon: HALOT
  rationale: עַד indica límite o alcance. «Hasta Guibeá» es la correspondencia más directa y natural. Se conserva el topónimo en forma castellana establecida, Guibeá.
theological_decisions:
- issue: Mantener la expresión étnica hebrea sin reemplazarla por un término eclesiástico o suavizado
  english_pob_reading: '"sons of Israel" is retained as a standard Israelite ethnic expression; "Israelites" is a possible smoother rendering.'
  chosen_spanish_reading: «hijos de Israel»
  alternative_spanish_readings:
  - «israelitas»
  - «los de Israel»
  rationale: Aunque «israelitas» sería más fluido, «hijos de Israel» conserva mejor la forma del hebreo y evita borrar la marca genealógico-étnica presente en el texto. En este verso no hay razón para nivelar la expresión a un equivalente más genérico.
  doctrine_reference: Fidelidad léxica al ethnonym bíblico; ver el uso hebreo de בני ישראל.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la cláusula relativa para describir directamente a la ciudad («which is not of the sons of Israel») y no a sus habitantes de manera más libre. La versión española conserva ese enfoque y mantiene el tono formal y narrativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda al tetragrámaton; en este versículo no aparece.
  - Se conserva la expresión bíblica «hijos de Israel» por fidelidad al original y por coherencia con el audit trail inglés.
  - El nombre geográfico se normaliza como «Guibeá» para concordar con el uso bíblico en español.
  - La puntuación española adapta la cita directa a normas modernas sin alterar el contenido semántico.
