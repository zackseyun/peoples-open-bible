translation:
  language: es
  text: Entonces tomó a los jefes de cientos, a los carios[a], a los corredores y a todo el pueblo de la tierra; y ellos hicieron bajar al rey desde la casa de Yahvé, y entraron por la puerta de los corredores[b] en la casa del rey, y él se sentó en el trono de los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los quereteos» o «la guardia» para «los carios». El término hebreo es incierto.
    reason: alternative_reading
  - marker: b
    text: «Los corredores» probablemente se refiere a guardias reales o mensajeros; también en «la puerta de los corredores».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then he took
  chosen_spanish: Entonces tomó
  alternatives_spanish:
  - Entonces reunió
  - Entonces tomó consigo
  lexicon: HALOT
  rationale: El verbo hebreo en singular se entiende naturalmente de Joiadá como sujeto implícito, y en español «tomó» conserva esa relación directa sin sobrecargar el sentido.
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: the commanders of hundreds
  chosen_spanish: los jefes de cientos
  alternatives_spanish:
  - los comandantes de cientos
  - los capitanes de cientos
  lexicon: HALOT
  rationale: «Jefes de cientos» mantiene la estructura militar del hebreo con transparencia. «Comandantes» o «capitanes» son posibles, pero la forma más cercana al original es suficiente y clara en español.
- source_word: הַכָּרִי
  english_pob_choice: the Carites
  chosen_spanish: los caritas
  alternatives_spanish:
  - los quereteos
  - la guardia
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transliterada en español para no decidir indebidamente entre una identificación étnica o funcional incierta. «Quereteos» y «guardia» siguen siendo alternativas plausibles, pero el texto principal preserva la incertidumbre.
- source_word: הָרָצִים
  english_pob_choice: the runners
  chosen_spanish: los corredores
  alternatives_spanish:
  - los guardias
  - los mensajeros
  lexicon: HALOT
  rationale: Se retiene la imagen literal de «los corredores» para reflejar el hebreo. Aunque en contexto probablemente designa una función oficial de guardia o mensajería, el término directo evita borrar esa tensión semántica.
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo del país
  - toda la gente de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea se conserva casi literalmente como un modismo bíblico. «La tierra» mantiene el alcance idiomático del hebreo sin restringirlo innecesariamente a una clase social o a un sentido político moderno.
- source_word: וַיֹּרִידוּ אֶת הַמֶּלֶךְ
  english_pob_choice: they brought the king down
  chosen_spanish: hicieron bajar al rey
  alternatives_spanish:
  - llevaron al rey hacia abajo
  - bajaron al rey
  lexicon: HALOT
  rationale: El hebreo usa una forma plural con sentido causativo; «hicieron bajar» comunica bien la acción conjunta y el movimiento descendente desde el recinto sagrado.
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: desde la casa de Yahvé
  alternatives_spanish:
  - desde la casa de Yahweh
  - desde el templo de Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton con «Yahvé». «Casa» conserva el paralelismo con «casa del rey» y evita sustituir el término por «templo» en el texto principal.
- source_word: דֶּרֶךְ שַׁעַר הָרָצִים
  english_pob_choice: by way of the gate of the runners
  chosen_spanish: por el camino de la puerta de los corredores
  alternatives_spanish:
  - por la puerta de los guardias
  - por la puerta de los mensajeros
  lexicon: HALOT
  rationale: Se mantiene la formulación literal y el mismo vocabulario que para הָרָצִים, preservando la referencia espacial concreta y la posible ambigüedad funcional del grupo.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: to the king’s house
  chosen_spanish: a la casa del rey
  alternatives_spanish:
  - al palacio del rey
  - a la residencia del rey
  lexicon: HALOT
  rationale: «Casa del rey» reproduce la simetría con «casa de Yahvé» y se ajusta mejor al paralelismo hebreo que «palacio», aunque esta última sería idiomática.
- source_word: וַיֵּשֶׁב
  english_pob_choice: and he sat
  chosen_spanish: y él se sentó
  alternatives_spanish:
  - y tomó asiento
  - y se sentó
  lexicon: HALOT
  rationale: La forma es directa y conserva el gesto de entronización sin añadir interpretación. El sujeto singular queda claro en el contexto.
- source_word: עַל כִּסֵּא הַמְּלָכִים
  english_pob_choice: on the throne of the kings
  chosen_spanish: en el trono de los reyes
  alternatives_spanish:
  - sobre el trono real
  - en el trono de los reyes de Judá
  lexicon: HALOT
  rationale: Se conserva el plural hebreo «de los reyes» para no neutralizarlo prematuramente en «real». La expresión sugiere la continuidad dinástica del trono, y el español la deja visible.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El contexto fuente y la política del proyecto requieren traducir el Tetragrámaton por el nombre propio divino. «Yahvé» es la forma establecida en español del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Sentido de הָרָצִים en contexto real
  english_pob_reading: runners likely refers to royal guards or couriers
  chosen_spanish_reading: corredores
  alternative_spanish_readings:
  - guardias
  - mensajeros
  - corredores
  rationale: El texto principal conserva el valor literal y la nota permite reconocer que en el contexto puede tratarse de guardias o mensajeros. Así no se elimina la tensión lexical documentada por el POB inglés.
  doctrine_reference: HALOT; English POB footnote b
- issue: Identificación de הַכָּרִי
  english_pob_reading: Carites; uncertain term
  chosen_spanish_reading: caritas
  alternative_spanish_readings:
  - quereteos
  - guardia
  rationale: La transliteración en español preserva la incertidumbre del hebreo y evita imponer una equivalencia demasiado decidida. La nota deja abiertas las alternativas tradicionales.
  doctrine_reference: HALOT; English POB footnote a
translation_notes:
  revision_awareness: El texto español sigue de cerca el estado final del audit trail inglés, sin cambios revisionales posteriores reportados; se preservan las incertidumbres de הַכָּרִי y הָרָצִים y el paralelismo estructural del versículo.
  spanish_consistency_notes:
  - Se mantiene «casa de Yahvé» y «casa del rey» para conservar el paralelismo del hebreo.
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Caritas» y «corredores» reflejan la transliteración/imagen literal elegida por el POB, sin cerrar indebidamente la ambigüedad.
  - El plural «reyes» se conserva en el cierre para respetar la textura hebrea del texto.
