review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la comparación, el cuervo, la casa de dioses, la huida de los sacerdotes y la quema de los ídolos. Sin embargo, la nota a está mal alineada con el rastro inglés: el inglés ofrece como alternativa toda la frase ''a house/temple of wooden or gold-covered or silver-covered gods'', no solo ''un templo de dioses''. Además, en español ''una casa de dioses de madera o recubiertos de oro o recubiertos de plata'' suena sintácticamente ambiguo, como si ''recubiertos'' modificara a ''dioses'' de modo algo trabado; conviene ajustar para claridad sin apartarse del griego.'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita una reparación menor de fluidez y precisión. 'Serán salvados' funciona, aunque 'se pondrán a salvo' o 'se salvarán' sería más natural; no obstante, se puede conservar la distinción verbal con una formulación más idiomática. La frase sobre los dioses gana claridad con 'de madera, recubiertos de oro o recubiertos de plata'. La nota a actual es demasiado breve y no refleja la alternativa documentada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, gracia, etc. Las decisiones léxicas principales ('cuervo', 'casa', 'dioses', 'vigas') están alineadas con el expediente inglés y con el griego. La única desalineación relevante es la nota alternativa de οἰκίαν θεῶν + adjetivos, que debe preservar mejor el alcance completo de la alternativa.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa lexical completa documentada en el POB inglés.
    rationale: El inglés da como alternativa 'a temple of wooden or gold-covered or silver-covered gods'. El borrador reduce esto a 'un templo de dioses', perdiendo los modificadores materiales.
  - severity: medium
    issue: La secuencia 'una casa de dioses de madera o recubiertos de oro o recubiertos de plata' resulta ambigua y poco natural en español.
    rationale: Aunque refleja el griego, en español conviene ordenar mejor los modificadores para que se entienda que describen a los dioses/ídolos sin tropiezo sintáctico.
  - severity: low
    issue: '''Serán salvados'' es comprensible pero algo menos idiomático que una alternativa española más natural.'
    rationale: La distinción entre huir y quedar a salvo puede mantenerse con 'huirán y se pondrán a salvo', que suena más natural en español moderno sin perder el doble verbo.
  revised_spanish_text: Porque así como un cuervo está entre el cielo y la tierra, así también, cuando el fuego cae en una casa de dioses de madera, recubiertos de oro o recubiertos de plata[a], sus sacerdotes huirán y se pondrán a salvo[b], pero ellos mismos serán quemados como vigas en medio.
  revised_footnotes:
  - marker: a
    text: O 'un templo de dioses de madera, recubiertos de oro o recubiertos de plata'.
    reason: lexical_alternative
  - marker: b
    text: La comparación inicial es breve en griego; el sentido es que los ídolos quedan tan indefensos como un cuervo expuesto cuando llega la calamidad.
    reason: cultural_note
  revision_rationale: Se hizo una reparación menor para mejorar la claridad sintáctica en español, alinear la nota alternativa con el expediente inglés y usar una formulación más idiomática para el doble verbo 'huirán y se pondrán a salvo'. No hay cambio de sentido respecto del griego ni del POB inglés.
