translation:
  language: es
  text: Entonces Yahvé habló a Moisés y a Aarón[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; «Entonces» conserva la secuencia en español natural. Se elige «habló» porque el verbo hebreo es דבר, mientras que לֵאמֹר introduce el discurso directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre divino propio «Yahvé», conforme al criterio del proyecto, en lugar de una sustitución titular como «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Preposición direccional estándar; en español, con verbos de habla, «a» es la correspondencia natural y fiel.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  - a
  lexicon: HALOT
  rationale: 'Se conserva la repetición de la preposición para reflejar que el hebreo menciona explícitamente a ambos destinatarios: «a Moisés y a Aarón».'
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aarón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - para decir,
  lexicon: HALOT
  rationale: La fórmula infinitiva que introduce el discurso se expresa de modo convencional y exacto con «diciendo,» para señalar que la cita continúa en el verso siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Para mantener el nombre propio del pacto y seguir la norma del proyecto, se usa «Yahvé» en vez de una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin cambios recientes; se preserva la misma estructura discursiva y la decisión teológica central sobre el nombre divino, adaptándolas a español sin introducir variaciones innecesarias.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa de apertura con valor secuencial.
  - 'Se conserva el paralelismo de destinatarios: Moisés y Aarón.'
  - «Yahvé» se usa de forma consistente para יְהוָה, no como título sustitutivo.
  - «diciendo,» deja abierta la cita directa que comienza en el versículo siguiente.
