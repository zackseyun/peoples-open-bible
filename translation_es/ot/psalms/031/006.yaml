translation:
  language: es
  text: En tu mano encomiendo mi espíritu; tú me has redimido, Yahvé, Dios de verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios fiel». El término hebreo puede implicar verdad, confiabilidad o fidelidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/יָדְ/ךָ
  english_pob_choice: Into your hand
  chosen_spanish: En tu mano
  alternatives_spanish:
  - A tu mano
  - Dentro de tu mano
  lexicon: HALOT
  rationale: El hebreo expresa la entrega de la persona a la custodia y poder de Dios. En español, «en tu mano» comunica de forma natural esa confianza/entrega sin introducir una preposición más forzada como «a» o una imagen poco idiomática como «dentro de».
- source_word: אַפְקִיד
  english_pob_choice: I commit
  chosen_spanish: encomiendo
  alternatives_spanish:
  - confío
  - deposito
  - entrego
  lexicon: HALOT
  rationale: El verbo hiphil de פקד aquí tiene el sentido de poner algo bajo el cuidado de otro. «Encomiendo» conserva el tono solemne y el valor de confiárselo a Dios, sin caer en un calco rígido.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi vida
  lexicon: HALOT
  rationale: En este contexto de oración y entrega, רוּחַ se refiere a la dimensión personal interior de la vida del salmista. «Mi espíritu» es la opción más fiel y teológicamente cargada; «aliento» o «vida» serían posibles en otros contextos, pero aquí reducen la fuerza del texto.
- source_word: פָּדִיתָה
  english_pob_choice: you have redeemed
  chosen_spanish: me has redimido
  alternatives_spanish:
  - me redimiste
  - me has rescatado
  - me has rescatado de la esclavitud
  lexicon: HALOT
  rationale: פּדה suele expresar redimir o rescatar con sentido de liberación comprada/pagada. «Has redimido» conserva la resonancia bíblica y el vínculo con el lenguaje de salvación; «rescatado» es válido, pero pierde parte del peso covenantal del término.
- source_word: אוֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Pronombre objeto directo normal en español.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de verter el Tetragrama como «Yahvé». En la invocación directa, el vocativo se expresa con el nombre propio sin añadir «oh», que suena más marcado y menos natural en español contemporáneo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - Mighty God
  lexicon: HALOT
  rationale: אֵל funciona en aposición con el nombre divino y se traduce simplemente «Dios» para mantener claridad y evitar una sobreexplicación que no aporta al sintagma.
- source_word: אֱמֶת
  english_pob_choice: of truth
  chosen_spanish: de verdad
  alternatives_spanish:
  - fiel
  - de fidelidad
  - verdadero
  lexicon: HALOT
  rationale: El sustantivo אֱמֶת abarca verdad, fidelidad y confiabilidad. En español, «de verdad» mantiene la literalidad del constructo y deja abierta la tensión semántica; «fiel» se reserva como posibilidad interpretativa, pero no se impone en el texto principal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino conforme a la convención textual del proyecto, evitando la sustitución litúrgica «SEÑOR». Esto mantiene la transparencia del texto hebreo y la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Sentido de אֱמֶת en «אֵל אֱמֶת»
  english_pob_reading: God of truth
  chosen_spanish_reading: Dios de verdad
  alternative_spanish_readings:
  - Dios fiel
  - Dios de fidelidad
  - Dios verdadero
  rationale: Se conserva la forma transparente del constructo hebreo y, al mismo tiempo, se deja abierta la amplitud semántica de אֱמֶת. «Dios de verdad» no elimina la posibilidad de «fiel»; esa tensión se mantiene en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Traducción de רוּחַ en contexto de entrega personal
  english_pob_reading: my spirit
  chosen_spanish_reading: mi espíritu
  alternative_spanish_readings:
  - mi aliento
  - mi vida
  rationale: En una oración de confianza final, «espíritu» expresa mejor la totalidad personal confiada a Dios y evita reducir el término a un sentido fisiológico o meramente vital.
  doctrine_reference: DOCTRINE.md lexical guidance on רוּחַ
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en la revisión más reciente (pass latest_revision_pass: unchanged=true), y la concordancia de revisión es alta; por eso no se introducen ajustes textuales adicionales fuera de la adaptación al español y de la preservación de la ambigüedad de אֱמֶת.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular del nombre divino según la política del proyecto.
  - Se usa «mi espíritu» para רוּחִי en coherencia con el peso teológico del versículo.
  - «Redimido» conserva el campo semántico salvífico esperado por פָּדִיתָה.
  - La nota [a] cubre la alternativa semántica de אֱמֶת sin alterar el texto principal.
