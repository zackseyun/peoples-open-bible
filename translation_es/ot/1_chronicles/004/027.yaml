translation:
  language: es
  text: Simeí tuvo dieciséis hijos y seis hijas[a], pero sus hermanos no tuvieron muchos hijos, y ninguno de sus clanes llegó a multiplicarse tanto como los hijos de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘no llegaron a ser tan numerosos como los hijos de Judá’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשִׁמְעִי
  english_pob_choice: Shimei had
  chosen_spanish: Simeí tuvo
  alternatives_spanish:
  - Simeí tenía
  - a Simeí
  lexicon: HALOT
  rationale: En contextos genealógicos, la preposición ל con un sujeto personal puede expresar posesión/existencia. En español, ‘tuvo’ comunica de manera natural la relación posesiva sin añadir ideas ajenas.
- source_word: בָּנִים שִׁשָּׁה עָשָׂר
  english_pob_choice: sixteen sons
  chosen_spanish: dieciséis hijos
  alternatives_spanish:
  - dieciséis varones
  - dieciséis hijos varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘hijos’ con el cardinal. ‘Hijos’ preserva el término genealógico amplio y es el equivalente natural en español; el número se antepone por claridad idiomática.
- source_word: וּבָנוֹת שֵׁשׁ
  english_pob_choice: and six daughters
  chosen_spanish: y seis hijas
  alternatives_spanish:
  - y seis mujeres
  lexicon: HALOT
  rationale: La coordinación es directa. ‘Hijas’ mantiene el paralelismo con ‘hijos’ y evita una formulación menos natural.
- source_word: וּלְאֶחָיו
  english_pob_choice: but his brothers
  chosen_spanish: pero sus hermanos
  alternatives_spanish:
  - y sus hermanos
  lexicon: HALOT
  rationale: Aunque el hebreo usa una conjunción simple, el contraste discursivo con la abundancia de descendencia de Simeí justifica ‘pero’ en español para reflejar la relación adversativa reconocida en el texto fuente y en la POB inglesa.
- source_word: אֵין בָּנִים רַבִּים
  english_pob_choice: did not have many sons
  chosen_spanish: no tuvieron muchos hijos
  alternatives_spanish:
  - no había muchos hijos
  - no tuvieron muchos hijos varones
  lexicon: HALOT
  rationale: El hebreo expresa carencia con אֵין; en español, una negación posesiva/plural natural comunica la falta. ‘Hijos’ funciona aquí como término genealógico equivalente a ‘sons’ sin sobrecargar con ‘varones’.
- source_word: וְכֹל מִשְׁפַּחְתָּם
  english_pob_choice: and all their clans
  chosen_spanish: y todas sus familias
  alternatives_spanish:
  - y todos sus clanes
  - y toda su parentela
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en listas genealógicas puede referirse a una unidad de parentesco amplia. En español, ‘familias’ es claro y suficientemente amplio; ‘clanes’ es posible, pero puede sonar menos natural para lectores generales.
- source_word: לֹא הִרְבּוּ
  english_pob_choice: did not multiply
  chosen_spanish: no se multiplicaron
  alternatives_spanish:
  - no crecieron en número
  - no aumentaron
  lexicon: HALOT
  rationale: El verbo en hifil de רבה conserva la idea de aumentar en número. El reflexivo ‘se multiplicaron’ mantiene la fuerza genealógica bíblica y evita una paráfrasis interpretativa.
- source_word: עַד בְּנֵי יְהוּדָה
  english_pob_choice: as much as the sons of Judah
  chosen_spanish: tanto como los hijos de Judá
  alternatives_spanish:
  - hasta los hijos de Judá
  - como los hijos de Judá
  lexicon: HALOT
  rationale: עַד aquí marca medida/comparación, no dirección espacial. ‘Tanto como’ expresa el grado comparativo con claridad en español y conserva el sentido de la POB inglesa.
theological_decisions:
- issue: Interpretación de la comparación final de cantidad
  english_pob_reading: their clans did not multiply as much as the sons of Judah
  chosen_spanish_reading: todas sus familias no se multiplicaron tanto como los hijos de Judá
  alternative_spanish_readings:
  - no se multiplicaron hasta el nivel de los hijos de Judá
  - no llegaron a ser tan numerosos como los hijos de Judá
  rationale: El hebreo y la POB inglesa presentan una comparación numérica, no una valoración moral o teológica. La traducción debe conservar esa comparación cuantitativa sin insinuar más de lo que el texto dice.
  doctrine_reference: Genealogía israelita; comparación poblacional sin implicación doctrinal específica
translation_notes:
  revision_awareness: Se siguió la lectura estable de la POB inglesa sin cambios sustantivos; la única tensión relevante es la comparación final expresada con עַד, que en español puede leerse de forma espacial si se traduce literalmente, por lo que se optó por una formulación comparativa natural.
  spanish_consistency_notes:
  - Se preservó ‘Yahvé’ donde no aparece el nombre divino en este versículo; no fue necesario usarlo aquí.
  - Se mantuvo el paralelismo genealógico ‘hijos/hijas’ para reflejar el hebreo.
  - Se eligió ‘familias’ como equivalente funcional de מִשְׁפָּחָה en contexto genealógico, sin forzar ‘clanes’ como tecnicismo.
