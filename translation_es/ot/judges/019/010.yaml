translation:
  language: es
  text: Pero el hombre no quiso [a] pasar la noche. Se levantó, fue y llegó frente a Jebús (es decir, Jerusalén), y con él había un par de asnos ensillados y su concubina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rehusó pasar la noche'; el hebreo expresa falta de voluntad o consentimiento, no solo falta de deseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto
  - no quiso pasar la noche
  - rehusó
  lexicon: HALOT
  rationale: El verbo expresa falta de voluntad o consentimiento, no solo ausencia de deseo. En español, 'no quiso' comunica una negativa deliberada de forma natural y fiel.
- source_word: לָלוּן
  english_pob_choice: to spend the night
  chosen_spanish: pasar la noche
  alternatives_spanish:
  - alojarse
  - quedarse a pasar la noche
  lexicon: HALOT
  rationale: El infinitivo indica permanecer durante la noche. 'Pasar la noche' es claro y natural en español contemporáneo.
- source_word: וַיָּקָם וַיֵּלֶךְ וַיָּבֹא
  english_pob_choice: He rose and went and came
  chosen_spanish: Se levantó, fue y llegó
  alternatives_spanish:
  - se levantó y fue y vino
  - se puso de pie, fue y llegó
  - se levantó, caminó y llegó
  lexicon: HALOT
  rationale: La serie de wayyiqtol marca una secuencia narrativa. 'Se levantó, fue y llegó' preserva el encadenamiento verbal sin sonar forzado en español.
- source_word: עַד נֹכַח
  english_pob_choice: opposite Jebus
  chosen_spanish: frente a Jebús
  alternatives_spanish:
  - en oposición a Jebús
  - a la altura de Jebús
  - cerca de Jebús
  lexicon: HALOT
  rationale: La expresión señala una posición enfrente o frente a la ciudad, no necesariamente dentro de ella. 'Frente a' conserva esa relación espacial de modo idiomático.
- source_word: יְב֔וּס הִ֖יא יְרוּשָׁלִָ֑ם
  english_pob_choice: Jebus (that is, Jerusalem)
  chosen_spanish: Jebús (es decir, Jerusalén)
  alternatives_spanish:
  - Jebús (o sea, Jerusalén)
  - Jebús, esto es, Jerusalén
  lexicon: HALOT
  rationale: La apposición identifica el nombre antiguo con el nombre conocido de la ciudad. 'Es decir' reproduce con claridad la aclaración explicativa.
- source_word: צֶמֶד חֲמוֹרִים
  english_pob_choice: a pair of saddled donkeys
  chosen_spanish: un par de asnos ensillados
  alternatives_spanish:
  - una pareja de asnos ensillados
  - un yugo de asnos ensillados
  - un par de burros ensillados
  lexicon: HALOT
  rationale: צֶמֶד con animales indica una pareja. 'Asnos' mantiene el registro más cercano al hebreo y 'ensillados' refleja el estado preparado para el viaje.
- source_word: חֲבוּשִׁים
  english_pob_choice: saddled
  chosen_spanish: ensillados
  alternatives_spanish:
  - aparejados
  - equipados
  lexicon: HALOT
  rationale: El participio describe animales provistos para montar o viajar. 'Ensillados' es conciso y comunica la preparación del transporte.
- source_word: פִּילַגְשׁוֹ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - su mujer secundaria
  - su compañera secundaria
  lexicon: HALOT
  rationale: El término hebreo designa específicamente a una concubina. Conviene conservar el vocablo técnico ya asentado en español bíblico para no perder precisión social y narrativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó 'to a place' por no estar en el hebreo y dejó la relación espacial como 'came opposite Jebus'. Por eso el español evita añadir 'a un lugar' y traduce directamente 'llegó frente a Jebús'.
  spanish_consistency_notes:
  - Se mantuvo 'Jebús' con acento estándar en español y la aclaración entre paréntesis equivalente a la apposición hebrea.
  - '''Asnos'' se prefirió como equivalente neutral y más cercano al registro bíblico; no se sustituyó por ''burros'' para evitar un matiz demasiado coloquial.'
  - No se usó 'SEÑOR' ni terminología teológica no presente en el versículo.
  - La nota al pie está anclada explícitamente en el verbo 'quiso' mediante [a].
