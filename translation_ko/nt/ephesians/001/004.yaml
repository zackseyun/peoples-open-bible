  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καθὼς ἐξελέξατο ἡμᾶς ἐν αὐτῷ πρὸ καταβολῆς κόσμου, εἶναι ἡμᾶς ἁγίους καὶ ἀμώμους κατενώπιον αὐτοῦ ἐν ἀγάπῃ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/004.yaml
  text: just as he chose us in him before the foundation of the world, to be holy and blameless before him in love,
translation:
  language: ko
  text: 곧 창세 전에 그분 안에서 우리를 택하사[a], 사랑 안에서 우리를 그분 앞에 거룩하고 흠 없는 자로 세우셨으니[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἐκλέγομαι는 「택하다」로 옮긴다. 주체는 아버지 하나님이시며, 택하심의 영역은 「그분(메시아) 안에서」이다.
    reason: lexical_alternative
  - marker: b
    text: 「사랑 안에서」(ἐν ἀγάπῃ)는 본 절 끝과 다음 절 시작 어느 쪽으로도 읽을 수 있다. 본 번역은 거룩·흠 없음을 수식하는 본 절 종결로 읽되, 5절의 「미리 정하사」와도 자연스럽게 이어진다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_korean: 택하사
  alternatives_korean:
  - 선택하사
  - 가려 뽑으사
  lexicon: BDAG
  rationale: 글로서리 기본값을 따른다. 송영 흐름 안에서 「택하사」가 가장 자연스럽다.
- source_word: πρὸ καταβολῆς κόσμου
  english_pob_choice: before the foundation of the world
  chosen_korean: 창세 전에
  alternatives_korean:
  - 세상이 창조되기 전에
  - 세상의 기초가 놓이기 전에
  lexicon: BDAG
  rationale: 한국 교회 전통의 「창세 전에」가 간결하면서도 정확하다.
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_korean: 흠 없는
  alternatives_korean:
  - 책망할 것 없는
  lexicon: BDAG
  rationale: 제사 어휘에 뿌리를 둔 「흠 없는」이 본 절의 거룩성·예배적 함의를 살린다.
