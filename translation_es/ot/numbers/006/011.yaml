translation:
  language: es
  text: Y el sacerdote ofrecerá uno como ofrenda por el pecado[a] y otro como holocausto, y hará expiación por él por la falta que cometió por causa del muerto[b], y consagrará su cabeza en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de purificación’. El término hebreo חַטָּאת puede designar la ofrenda por el pecado o, en contextos de impureza ritual, la ofrenda de purificación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘sobre la נֶפֶשׁ’; aquí se refiere, por el contexto, al muerto que causó la impureza.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo amplio ‘hacer’ funciona idiomáticamente como ‘ofrecer’ una víctima. ‘Ofrecerá’ comunica la acción cultual de manera natural en español sin perder el valor ritual del hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: Es el término culto estándar para el oficial ritual. ‘Sacerdote’ es claro y fiel al contexto levítico.
- source_word: אֶחָד לְחַטָּאת
  english_pob_choice: one as a sin offering
  chosen_spanish: uno como ofrenda por el pecado
  alternatives_spanish:
  - uno como ofrenda de purificación
  - uno para la ofrenda por el pecado
  lexicon: HALOT
  rationale: חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con él o con la purificación ritual. En español, ‘ofrenda por el pecado’ conserva la categoría tradicional y permite nota sobre la alternativa de ‘purificación’.
- source_word: וְאֶחָד לְעֹלָה
  english_pob_choice: one as a burnt offering
  chosen_spanish: otro como holocausto
  alternatives_spanish:
  - otro como ofrenda quemada
  - otro como ofrenda totalmente quemada
  lexicon: HALOT
  rationale: ‘Holocausto’ es el equivalente español tradicional de עֹלָה y mantiene la idea de ofrenda íntegramente quemada. Es más natural y estable que perífrasis largas.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: he shall make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará atonamiento por él
  - hará reconciliación por él
  lexicon: HALOT
  rationale: ‘Expiación’ transmite bien el valor sacrificial y cultual de כפר en español bíblico. Mantiene la fuerza ritual sin forzar una explicación doctrinal única.
- source_word: מֵאֲשֶׁר חָטָא
  english_pob_choice: because he sinned
  chosen_spanish: a causa de lo que pecó
  alternatives_spanish:
  - porque pecó
  - por el pecado que cometió
  lexicon: HALOT
  rationale: La forma hebrea introduce la causa de la expiación. ‘A causa de lo que pecó’ sigue de cerca el sentido causal y evita estrechar el matiz a una sola construcción causal en español.
- source_word: עַל הַנָּפֶשׁ
  english_pob_choice: by reason of the dead person
  chosen_spanish: por razón del muerto
  alternatives_spanish:
  - a causa del difunto
  - por causa del cadáver
  - en relación con el muerto
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ se refiere a un muerto/cadáver que produjo impureza. ‘Por razón del muerto’ mantiene la referencia humana y la relación causal sin volverla demasiado áspera o abstracta.
- source_word: וְקִדַּשׁ אֶת רֹאשׁוֹ
  english_pob_choice: and he shall consecrate his head
  chosen_spanish: y consagrará su cabeza
  alternatives_spanish:
  - y santificará su cabeza
  - y volverá a consagrar su cabeza
  lexicon: HALOT
  rationale: En el voto nazareo, ‘cabeza’ funciona como metonimia del cabello y del estado consagrado. ‘Consagrará su cabeza’ conserva la imagen y el lenguaje de dedicación ritual.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese mismo día
  - ese día
  lexicon: HALOT
  rationale: ‘En aquel día’ es una correspondencia natural y formal de la expresión temporal hebrea, sin añadir énfasis interpretativo no requerido por el texto.
theological_decisions:
- issue: Sentido de חַטָּאת en contexto ritual
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  rationale: El contexto de contacto con un muerto da peso a la acepción de purificación ritual, pero en español ‘ofrenda por el pecado’ sigue siendo la designación más conocida y suficientemente fiel. Se preserva la tensión léxica en la nota.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referente de הַנָּפֶשׁ
  english_pob_reading: dead person
  chosen_spanish_reading: el muerto
  alternative_spanish_readings:
  - el cadáver
  - el difunto
  rationale: La expresión hebrea es literal y legal, pero en este contexto alude al muerto que causó impureza. ‘El muerto’ mantiene la referencia directa y evita una paráfrasis excesiva. La nota registra la alternativa semántica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de כפר en lenguaje sacerdotal
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - realizar expiación
  rationale: ‘Hacer expiación’ conserva la terminología cultual sin imponer una teoría doctrinal específica. Es una correspondencia transparente para el lector hispanohablante.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa revisada cambió la expresión de resultado causal de ‘in regard to the dead person’ a ‘by reason of the dead person’ y ajustó ‘that same day’ a ‘on that day’. La redacción española sigue esa revisión con ‘por razón del muerto’ y ‘en aquel día’, manteniendo mayor correspondencia formal con el hebreo y con el último estado auditado del POB.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva ‘holocausto’ para עֹלָה por ser término español establecido y transparente en contexto levítico.
  - Se usa ‘expiación’ para כפר por coherencia con el lenguaje sacerdotal del POB español.
  - Se evita ‘siervo’ o ‘purificación’ en el cuerpo principal para no borrar la terminología ritual específica, pero se documenta la alternativa en nota.
