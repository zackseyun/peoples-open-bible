    issue: Marcador de nota mal ubicado
    rationale: La nota «O «en medio de nosotros»» explica בְּקִרְבֵּנוּ / «entre nosotros», pero el marcador [a] está puesto después de «les habló». Esto rompe la trazabilidad léxica requerida y puede confundir al lector.
  revised_spanish_text: 'Entonces Josué los llamó y les habló, diciendo: «¿Por qué nos engañaron, diciendo: “Estamos muy lejos de ustedes”, cuando ustedes habitan entre nosotros[a]?»'
