translation:
  language: es
  text: Y nombró a Sedecías rey de Judea y Jerusalén; Sedecías tenía veintiún años[a], y reinó once años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «Judea y Jerusalén». El paralelo hebreo relacionado suele decir «Judá y Jerusalén»; aquí se sigue la forma griega de 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέδειξεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - instituyó
  - puso
  lexicon: LSJ
  rationale: En este contexto real, el verbo expresa una investidura formal. «Nombró» comunica con naturalidad la acción de establecer a alguien en el cargo sin introducir una paráfrasis más interpretativa.
- source_word: Σεδεκίαν
  english_pob_choice: Zedekiah
  chosen_spanish: Sedecías
  alternatives_spanish:
  - Zedequías
  lexicon: Uso bíblico tradicional / transliteración castellana
  rationale: Se conserva el nombre propio en forma castellana habitual. «Sedecías» es claro y reconocible en español bíblico, y mantiene la transliteración sin traducir el nombre.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - monarca
  lexicon: LSJ
  rationale: «Rey» es la equivalencia directa y natural del título real. En español no hace falta añadir una preposición o un giro explicativo para este cargo.
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  english_pob_choice: of Judea and Jerusalem
  chosen_spanish: de Judea y Jerusalén
  alternatives_spanish:
  - de Judá y Jerusalén
  - sobre Judea y Jerusalén
  lexicon: LSJ
  rationale: Se sigue la forma griega con «Judea y Jerusalén», tal como el POB inglés siguió «Judea» en vez de armonizar con el paralelo hebreo. «De» reproduce bien la relación genitiva del texto fuente.
- source_word: ὄντα ἐτῶν εἴκοσι ἑνός
  english_pob_choice: was twenty-one years old
  chosen_spanish: tenía veintiún años
  alternatives_spanish:
  - era de veintiún años
  - siendo de veintiún años
  lexicon: LSJ
  rationale: La fórmula griega de edad se expresa de manera idiomática en español con «tenía ... años». Mantiene el sentido sin calco excesivo.
- source_word: βασιλεύει
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - reino
  lexicon: LSJ
  rationale: «Reinó» es el verbo español estándar para la duración del reinado de un monarca y corresponde directamente al griego.
- source_word: ἔτη ἕνδεκα
  english_pob_choice: eleven years
  chosen_spanish: once años
  alternatives_spanish:
  - por once años
  - durante once años
  lexicon: LSJ
  rationale: Se traduce de forma directa la duración temporal. En español, el contexto verbal ya comunica la duración sin necesidad de añadir preposición.
theological_decisions:
- issue: Relación entre la lectura griega «Judea y Jerusalén» y el paralelo hebreo que suele tener «Judá y Jerusalén»
  english_pob_reading: The main text follows the Greek source of 1 Esdras rather than harmonizing to the Hebrew parallel.
  chosen_spanish_reading: El texto principal sigue «Judea y Jerusalén», sin armonizarlo con «Judá».
  alternative_spanish_readings:
  - «Judá y Jerusalén»
  - «la tierra de Judá y Jerusalén»
  rationale: Dado que 1 Esdras se está traduciendo desde el griego y el expediente auditivo señala alta concordancia con la fuente griega, se conserva la geografía de la LXX. La variante hebrea se reconoce solo como trasfondo comparativo, no como base del texto principal.
  doctrine_reference: Principio textual de prioridad de la fuente base y respeto por variantes paralelas
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente que prefirió «king of Judea and Jerusalem» frente a «king over Judea and Jerusalem» por naturalidad. En español se refleja esa misma naturalidad con «rey de Judea y Jerusalén», manteniendo la relación genitiva sin giro explicativo innecesario. También se conservó la decisión del audit trail de seguir la forma griega «Judea» y no armonizar automáticamente con el paralelo hebreo.
  spanish_consistency_notes:
  - Se mantuvo la transliteración bíblica tradicional «Sedecías» para el nombre propio.
  - Se evitó «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - «Tenía veintiún años» es la forma española más natural para la edad y conserva el sentido exacto del griego.
  - La puntuación con punto y coma reproduce bien la estructura de dos proposiciones del original.
