review_pass:
  verdict: revise
  source_alignment_summary: 'La idea principal está bien alineada con el griego: διαθήκην αἰῶνος ἔστησεν μετ᾿ αὐτῶν se refleja adecuadamente como un pacto/covenio establecido con ellos, y ὑπέδειξεν αὐτοῖς τὰ κρίματα αὐτοῦ como dar a conocer/mostrar sus juicios. Sin embargo, las notas al pie están mal ancladas: la nota sobre las alternativas de αἰῶνος aparece junto a «pacto», y la nota sobre κρίματα también aparece junto a «pacto» en vez de junto a «juicios».'
  spanish_quality_summary: El español es claro y digno. «Él» es aceptable pero no necesario; «les dio a conocer» suena natural. Aun así, para reflejar mejor el matiz directo de ὑπέδειξεν y la economía del original, «les mostró» o «les mostró sus juicios» sería ligeramente más ceñido. La corrección indispensable es la colocación de las notas.
  glossary_alignment: No hay conflicto grave con la terminología del proyecto. «Pacto» para διαθήκη es defendible, aunque «alianza» también sería posible. «Eterno» corresponde a una alternativa documentada de αἰῶνος. «Juicios» preserva bien κρίματα. No se requieren cambios de glosario, solo corrección de anclaje y una leve mejora estilística.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en el lugar incorrecto.
    rationale: La nota [a] explica αἰῶνος y debe ir sobre «eterno», no sobre «pacto». La nota [b] explica κρίματα y debe ir sobre «juicios», no sobre «pacto». Tal como está, el lector recibe información léxica engañosa.
  - severity: low
    issue: «dio a conocer» es un poco más interpretativo que el griego directo «mostró».
    rationale: ὑπέδειξεν significa mostrar/indicar. «Les mostró» es más cercano al original y sigue siendo natural en español bíblico moderno.
  revised_spanish_text: Estableció con ellos un pacto eterno[a], y les mostró sus juicios[b].
  revised_footnotes:
  - marker: a
    text: O «un pacto perpetuo» o «un pacto de la era».
    reason: lexical_alternative
  - marker: b
    text: O «sus ordenanzas» o «sus decretos».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras fuente adecuadas y se ajusta «les dio a conocer» a «les mostró» para reflejar más directamente ὑπέδειξεν. También se omite el pronombre inicial por naturalidad en español, sin alterar el sentido.
