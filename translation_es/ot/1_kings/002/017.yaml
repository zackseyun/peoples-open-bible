translation:
  language: es
  text: 'Y dijo[a]: «Por favor, habla al rey Salomón, porque no te rechazará, y dile que me dé a Abisag la sunamita por esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no hará volver tu rostro»; es un modismo hebreo que significa «no te rechazará» o «no negará tu petición».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרִי נָא
  english_pob_choice: Please speak
  chosen_spanish: Por favor, habla
  alternatives_spanish:
  - Por favor, di
  - Te ruego que hables
  lexicon: HALOT
  rationale: El imperativo femenino singular con נָא expresa una súplica cortés. «Por favor, habla» conserva el valor pragmático natural en español sin endurecer el tono.
- source_word: לִשְׁלֹמֹה הַמֶּלֶךְ
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - a Salomón el rey
  - a Salomón, el rey
  lexicon: HALOT
  rationale: En español la colocación más natural es el título antes o como aposición breve. Se conserva el sentido honorífico del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición; «porque» comunica con claridad la relación causal sin perder el valor explicativo.
- source_word: לֹא יָשִׁיב אֶת פָּנָיִךְ
  english_pob_choice: he will not refuse you
  chosen_spanish: no te rechazará
  alternatives_spanish:
  - no te volverá la cara
  - no denegará tu petición
  lexicon: HALOT
  rationale: Se mantiene el sentido idiomático que la POB inglesa ya documenta. En español «rechazar» expresa la negativa prevista por la petición sin forzar un calco literal poco natural.
- source_word: וְיִתֶּן לִי
  english_pob_choice: and let him give me
  chosen_spanish: y que me dé
  alternatives_spanish:
  - y que me conceda
  - y me dé
  lexicon: HALOT
  rationale: La forma jussiva/petitoria se vierte con «que me dé», que en español transmite la petición indirecta de modo idiomático y fiel.
- source_word: אֲבִישַׁג הַשּׁוּנַמִּית
  english_pob_choice: Abishag the Shunammite
  chosen_spanish: a Abisag la sunamita
  alternatives_spanish:
  - a Abisag, la sunamita
  - a Abisag de Sunem
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el gentilicio con la forma usual en español bíblico, «sunamita».
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para esposa
  lexicon: HALOT
  rationale: La construcción indica matrimonio. «Por esposa» es natural en español y preserva la intención de pedirla como mujer/esposa.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español y la nota asociada corresponde al modismo hebreo de «volver el rostro».'
  spanish_consistency_notes:
  - Se usó «rey Salomón» para mantener el orden natural del español sin alterar el sentido.
  - «Sunamita» se emplea como gentilicio bíblico estándar y comprensible.
  - Se conservó el matiz de petición indirecta con «que me dé».
