translation:
  language: es
  text: Entonces el sacerdote volverá el séptimo día y mirará, y he aquí, si la infección se ha extendido[a] en las paredes de la casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mancha se ha extendido en las paredes de la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: Then ... shall return
  chosen_spanish: Entonces ... volverá
  alternatives_spanish:
  - y volverá
  - luego volverá
  lexicon: HALOT
  rationale: En instrucciones legales, el waw + qatal tiene valor secuencial. «Entonces ... volverá» conserva la sucesión de acciones con un español natural y formal.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote examinador
  lexicon: HALOT
  rationale: En Levítico, כֹּהֵן designa al sacerdote encargado del examen ritual. «Sacerdote» es la equivalencia española estándar y suficientemente precisa en este contexto.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: al séptimo día
  alternatives_spanish:
  - en el séptimo día
  - el séptimo día
  lexicon: HALOT
  rationale: «Al séptimo día» expresa con naturalidad el valor temporal de la expresión hebrea dentro del procedimiento ritual.
- source_word: וְרָאָה
  english_pob_choice: and look
  chosen_spanish: y mirará
  alternatives_spanish:
  - y verá
  - y examinará
  lexicon: HALOT
  rationale: «Mirará» conserva el sentido básico de ראה y suena más natural que un calco rígido; el contexto ya implica una inspección oficial.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y behold
  lexicon: HALOT
  rationale: Se conserva la fuerza de observación sorpresiva o constatativa de הִנֵּה. «Y he aquí» es una fórmula tradicional y clara en español bíblico.
- source_word: פָּשָׂה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha avanzado
  - se ha propagado
  lexicon: HALOT
  rationale: En el campo semántico de contaminación o afección en Levítico, פָּשָׂה indica propagación. «Se ha extendido» transmite bien la idea sin forzar una lectura médica moderna.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la afección
  - la plaga
  - la mancha
  lexicon: HALOT
  rationale: La POB inglesa eligió un término moderno para el estado contaminante del pasaje. «Infección» mantiene esa claridad, aunque el hebreo también puede abarcar una mancha o afección ritual.
- source_word: בְּקִירֹת הַבָּיִת
  english_pob_choice: in the walls of the house
  chosen_spanish: en las paredes de la casa
  alternatives_spanish:
  - en los muros de la casa
  - sobre las paredes de la casa
  lexicon: HALOT
  rationale: «Paredes» es el equivalente más natural en español para קִירֹת en este contexto. «En» reproduce bien la localización del avance dentro de la superficie muraria.
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión más reciente de la POB inglesa, que restauró la referencia explícita de וְהִנֵּה mediante «behold». En español se reflejó con «y he aquí», manteniendo la fuerza constatativa sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «sacerdote» para כֹּהֵן, en línea con la terminología bíblica española usual y el contexto ritual.
  - Se evitó «SEÑOR» u otras sustituciones porque no hay aquí el Tetragrámaton ni un caso de cita de κύριος.
  - «Infección» conserva la decisión inglesa de evitar «plaga» por su carga arcaica, pero se deja la alternativa «mancha» en nota por la ambigüedad lexical del hebreo.
  - 'La puntuación sigue la cadencia legal narrativa del hebreo: acción secuencial, observación, y constatación del estado observado.'
