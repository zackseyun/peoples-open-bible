translation:
  language: es
  text: 'Entonces le dijo a Bidcar, su oficial[a]: «Levántalo y arrójalo en la parcela del campo de Nabot el jezreelita, porque recuerda: tú y yo íbamos montados juntos[b] detrás de Ahab, su padre, cuando Yahvé puso sobre él este pronunciamiento[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su tercero», posible designación técnica del rango o función de Bidcar.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cabalgando en parejas»; la expresión probablemente significa que Jehú y Bidcar iban juntos detrás de Ahab.'
    reason: lexical_alternative
  - marker: c
    text: O «oráculo» o «carga». El término hebreo se refiere a una declaración profética de peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּדְקַר
  english_pob_choice: Bidkar
  chosen_spanish: Bidcar
  alternatives_spanish:
  - Bidkar
  lexicon: nombre propio
  rationale: Se translitera el nombre propio con adaptación ortográfica española mínima, manteniendo identificable al personaje y una forma natural para lectura en español.
- source_word: שלשה
  english_pob_choice: his officer
  chosen_spanish: su oficial
  alternatives_spanish:
  - su tercero
  - su ayudante
  - su capitán
  lexicon: HALOT
  rationale: La tradición textual y el contexto apuntan a una designación de cargo o función para Bidcar. «Su oficial» comunica la relación y el rango funcional sin forzar una reconstrucción demasiado técnica.
- source_word: שָׂא
  english_pob_choice: Lift him up
  chosen_spanish: Levántalo
  alternatives_spanish:
  - Tómalo
  - Recógelo
  lexicon: HALOT
  rationale: El imperativo de נשׂא aquí se entiende como tomar el cuerpo para retirarlo del carro antes de arrojarlo. «Levántalo» preserva el impulso directo del mandato en un español natural.
- source_word: הַשְׁלִכֵהוּ
  english_pob_choice: throw him
  chosen_spanish: arrójalo
  alternatives_spanish:
  - lánzalo
  - échalo
  lexicon: HALOT
  rationale: Se mantiene la fuerza del verbo שלך con un equivalente directo y enfático. «Arrójalo» es fiel y solemne en español.
- source_word: בְּחֶלְקַת שְׂדֵה
  english_pob_choice: onto the plot of the field
  chosen_spanish: en la parcela del campo
  alternatives_spanish:
  - sobre la parcela del terreno
  - en el lote del campo
  lexicon: HALOT
  rationale: חלקה + שדה combina la idea de una porción/parcela y de campo. «Parcela del campo» conserva ambos elementos sin sonar torpe en español.
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  english_pob_choice: Naboth the Jezreelite
  chosen_spanish: Nabot el jezreelita
  alternatives_spanish:
  - Nabot el de Jezreel
  lexicon: nombre propio / gentilicio
  rationale: Se mantiene el nombre y el gentilicio con una forma española clara. «Jezreelita» preserva el vínculo étnico/geográfico del hebreo.
- source_word: זְכֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  lexicon: HALOT
  rationale: La exhortación introductoria funciona de modo natural en segunda persona singular con «recuerda», sin perder el valor de llamada a la memoria.
- source_word: רֹכְבִים צְמָדִים
  english_pob_choice: were riding side by side
  chosen_spanish: íbamos montados en parejas
  alternatives_spanish:
  - íbamos cabalgando de dos en dos
  - montábamos en tándem
  lexicon: HALOT
  rationale: La expresión hebrea sugiere cabalgar en pares. «Íbamos montados en parejas» conserva la imagen de pares y evita una paráfrasis excesiva; el matiz de cercanía se entiende por el contexto de acompañamiento.
- source_word: אַחֲרֵי אַחְאָב אָבִיו
  english_pob_choice: behind Ahab his father
  chosen_spanish: detrás de Ahab, su padre
  alternatives_spanish:
  - siguiendo a Ahab, su padre
  lexicon: HALOT
  rationale: «Detrás de» respeta el valor espacial/acompañante de אחרי en el contexto del carro y la marcha. Se mantiene «su padre» como referencia a la paternidad de Joram respecto de Ahab.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino del Tetragrámaton según la política terminológica del proyecto. «Yahvé» evita el ocultamiento del nombre y refleja directamente la fuente hebrea.
- source_word: נָשָׂא עָלָיו אֶת־הַמַּשָּׂא הַזֶּה
  english_pob_choice: laid this pronouncement against him
  chosen_spanish: puso sobre él esta carga
  alternatives_spanish:
  - pronunció contra él este oráculo
  - cargó sobre él este mensaje grave
  lexicon: HALOT
  rationale: מַשָּׂא puede ser «carga», «oráculo» o «pronunciamiento». «Carga» conserva la tensión semántica de algo pesado y adverso, y permite dejar visible el matiz profético sin anularlo con una sola glosa interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: 'La lectura española sigue la directriz del proyecto para el Tetragrámaton: usar el nombre propio divino, no una sustitución litúrgica. Esto mantiene la transparencia respecto del hebreo de base.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de מַשָּׂא en contexto profético
  english_pob_reading: pronouncement / burden
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - oráculo
  - pronunciamiento
  rationale: El término hebreo conserva una tensión entre peso, mensaje profético y juicio. «Carga» deja visible esa ambivalencia, especialmente en una escena de juicio contra la casa de Ahab.
  doctrine_reference: Lexical/theological tension in prophetic מַשָּׂא
- issue: Relación entre רֹכְבִים צְמָדִים y el contexto de carro
  english_pob_reading: riding side by side
  chosen_spanish_reading: íbamos montados en parejas
  alternative_spanish_readings:
  - íbamos cabalgando de dos en dos
  - íbamos montados lado a lado
  rationale: La frase hebrea es idiomática y la traducción debe ser comprensible sin borrar el probable sentido de acompañamiento cercano en el trayecto detrás de Ahab. La opción elegida conserva el plural de pares y la relación de compañía.
  doctrine_reference: Contextual reading of Hebrew idiom
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente del POB en inglés, con acuerdo alto y sin cambios aplicados. La versión española incorpora ese mismo trazado interpretativo: cargo/función de Bidcar, lectura idiomática de רֹכְבִים צְמָדִים, y el valor profético de מַשָּׂא. No se introdujeron variantes textuales nuevas; solo se adaptó la evidencia al español con terminología consistente con el proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se mantuvo «carga» para מַשָּׂא, con nota que preserva la alternativa «oráculo» para no borrar la tensión semántica.
  - «Bidcar» y «Nabot» siguen la transliteración española regular, manteniendo identificabilidad y fluidez.
  - La puntuación y comillas se ajustaron al uso español, conservando la división sintáctica del original.
