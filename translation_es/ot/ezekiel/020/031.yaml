revisions:
- from: Y cuando presentan sus regalos[a], cuando hacen pasar a sus hijos por el fuego, se contaminan con todos sus ídolos hasta el día de hoy. ¿Y he de ser consultado por ustedes, casa de Israel? Vivo yo, declara el Señor Yahvé[b], no seré consultado por ustedes.
  to: Y cuando presentan sus dones[a], cuando hacen pasar a sus hijos por el fuego[b], se contaminan con todos sus ídolos hasta el día de hoy. ¿Y he de ser consultado por ustedes, casa de Israel? Vivo yo, declara el Señor Dios, Yahvé[c], no seré consultado por ustedes.
  rationale: La revisión corrige el anclaje erróneo de la nota cultural, preserva la alternativa léxica auditada para מַתְּנֹתֵיכֶם, y mejora el registro español al cambiar 'regalos' por 'dones'. También ajusta la fórmula 'אֲדֹנָי יְהוִה' a una expresión más clara y natural en español que mantiene 'Yahvé' conforme al proyecto. No se requieren cambios doctrinales complejos ni adjudicación adicional.
