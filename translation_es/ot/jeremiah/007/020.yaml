base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/007/020.yaml
  text: 'Therefore thus says the Lord GOD: Behold[a], my anger and my wrath are being poured out on this place, on man and on beast, on the trees of the field and on the fruit of the ground; it will burn and will not be quenched.'
  footnotes:
