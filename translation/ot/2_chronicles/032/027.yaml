id: 2CH.32.27
reference: 2 Chronicles 32:27
source:
  edition: WLC
  text: וַ/יְהִ֧י לִֽ/יחִזְקִיָּ֛הוּ עֹ֥שֶׁר וְ/כָב֖וֹד הַרְבֵּ֣ה מְאֹ֑ד וְ/אֹֽצָר֣וֹת עָֽשָׂה ל֠/וֹ לְ/כֶ֨סֶף וּ/לְ/זָהָ֜ב וּ/לְ/אֶ֣בֶן יְקָרָ֗ה וְ/לִ/בְשָׂמִים֙ וּ/לְ/מָ֣גִנִּ֔ים וּ/לְ/כֹ֖ל כְּלֵ֥י חֶמְדָּֽה־׃
translation:
  text: And Hezekiah had very great wealth and honor[a], and he made storehouses for silver and gold, precious stones, spices, shields[b], and every desirable article.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasuries' instead of 'storehouses.' The Hebrew term can refer either to storage facilities generally or to royal treasure chambers specifically.
    reason: lexical_alternative
  - marker: b
    text: Or 'every valuable object' / 'all kinds of precious vessels.' The Hebrew expression is broad and may include luxury items of various kinds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִיחִזְקִיָּהוּ
  chosen: And Hezekiah had
  alternatives:
  - And there was for Hezekiah
  - Now Hezekiah had
  lexicon: HALOT
  rationale: The idiom ויהי ל plus a noun of possession is naturally rendered in English as 'had.' 'And' preserves the narrative continuation.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: '''Wealth'' is clear modern English and fits the material prosperity in context.'
- source_word: וְכָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this royal context כבוד refers to social status and splendor; 'honor' communicates esteem without overstating with the more theologically loaded 'glory.'
- source_word: הַרְבֵּה מְאֹד
  chosen: very great
  alternatives:
  - exceedingly much
  - in abundance
  lexicon: HALOT
  rationale: This adverbial intensification modifies the combined wealth and honor. 'Very great' is idiomatic and preserves the emphatic force.
- source_word: וְאֹצָרוֹת עָשָׂה לוֹ
  chosen: and he made storehouses
  alternatives:
  - and he made treasuries for himself
  - and he built treasuries
  lexicon: HALOT
  rationale: אֹצָרוֹת can mean treasuries or storehouses. Because the verse lists stored commodities broadly, 'storehouses' best fits the range, while 'made' reflects עשה without requiring a more specific building verb.
- source_word: לְכֶסֶף וּלְזָהָב
  chosen: for silver and for gold
  alternatives:
  - for silver and gold
  lexicon: HALOT
  rationale: The repeated preposition is retained for a slightly more formal, list-like cadence matching the Hebrew inventory style.
- source_word: וּלְאֶבֶן יְקָרָה
  chosen: and for precious stones
  alternatives:
  - and for precious stone
  - and for costly stones
  lexicon: HALOT
  rationale: Though אבן is singular, English commonly uses the plural collective 'precious stones' in such lists. This better reflects the sense of stored valuables.
- source_word: וְלִבְשָׂמִים
  chosen: and for spices
  alternatives:
  - and for balsam
  - and for perfumes
  lexicon: HALOT
  rationale: בשׂמים denotes aromatic substances; 'spices' is the broadest natural rendering in an inventory context, while 'perfumes' would narrow the sense too much.
- source_word: וּלְמָגִנִּים
  chosen: and for shields
  alternatives:
  - and for armor
  lexicon: HALOT
  rationale: מגנים specifically means shields, not military equipment in general.
- source_word: וּלְכֹל כְּלֵי חֶמְדָּה
  chosen: and for every desirable article
  alternatives:
  - and for all kinds of precious vessels
  - and for every valuable object
  lexicon: HALOT
  rationale: כְּלֵי is a broad term for articles/objects/vessels, and חֶמְדָּה denotes desirability or preciousness. 'Desirable article' preserves the breadth without restricting the referent to containers alone.
