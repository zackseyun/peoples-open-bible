translation:
  language: es
  text: Cada tabla tendrá dos espigas[a] unidas entre sí; así harás todas las tablas del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''dos manos para la tabla una, unidas, mujer a su hermana''. Aquí ''espigas'' refleja el sentido constructivo de las ''manos'' como salientes de ensamble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד֗וֹת
  english_pob_choice: tenons
  chosen_spanish: espigas
  alternatives_spanish:
  - manos
  - proyecciones
  - espigas de ensamble
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'manos', pero en este contexto de carpintería del tabernáculo alude a las partes salientes que encajan en las bases. 'Espigas' comunica de forma natural y clara esa función estructural en español, sin perder el sentido técnico.
- source_word: מְשֻׁלָּבֹ֔ת
  english_pob_choice: joined
  chosen_spanish: unidas entre sí
  alternatives_spanish:
  - juntas
  - enlazadas
  - acopladas
  lexicon: HALOT
  rationale: El participio pasivo expresa que las dos piezas están fijadas o encajadas una con otra. 'Unidas entre sí' mantiene la relación mutua sin sobreespecificar el mecanismo exacto.
- source_word: אִשָּׁ֖ה אֶל אֲחֹתָ֑/הּ
  english_pob_choice: one to another
  chosen_spanish: entre sí
  alternatives_spanish:
  - una a otra
  - una con la otra
  - la una a la otra
  lexicon: HALOT
  rationale: La expresión hebrea usa un giro idiomático ('mujer... a su hermana') para indicar correspondencia entre piezas semejantes. En español, 'entre sí' transmite el valor idiomático con naturalidad y evita una literalidad oscura.
- source_word: קַרְשֵׁ֥י
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - paneles
  - maderos
  lexicon: HALOT
  rationale: En las instrucciones del tabernáculo, קֶרֶשׁ designa la unidad estructural de madera. 'Tablas' es una equivalencia transparente y natural en español para este tipo de pieza.
- source_word: מִּשְׁכָּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - tienda
  - dwelling
  lexicon: HALOT
  rationale: Aunque el término tiene relación con 'morada', en Éxodo funciona ya como nombre establecido del santuario portátil. 'Tabernáculo' preserva ese valor técnico y eclesial sin reinterpretarlo.
- source_word: כֵּן תַּעֲשֶׂה
  english_pob_choice: thus you shall make
  chosen_spanish: así harás
  alternatives_spanish:
  - así lo harás
  - de este modo harás
  - así deberás hacer
  lexicon: HALOT
  rationale: La construcción da una instrucción normativa sobre el patrón que debe seguirse. 'Así harás' conserva la fuerza directiva y suena idiomático en español; el 'así' queda explícito como correspondencia con el modelo dado.
- source_word: שְׁתֵּי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Numeral cardinal directo para modificar 'espigas'.
- source_word: לַקֶּרֶשׁ הָאֶחָד
  english_pob_choice: each board
  chosen_spanish: cada tabla
  alternatives_spanish:
  - para la tabla única
  - para cada tabla
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es literalmente ''para la tabla una'', el sentido es distributivo: la instrucción aplica a cada una. ''Cada tabla'' expresa esa distribución de manera natural y fiel.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto al término al que remite la nota. La redacción sigue el sentido del hebreo y el audit trail inglés: ''two tenons joined to one another; thus you shall make...''.'
  spanish_consistency_notes:
  - Se mantuvo 'tabernáculo' para מִשְׁכָּן conforme al uso técnico en Éxodo.
  - Se prefirió 'espigas' como equivalente funcional de 'tenons', evitando una traducción literal con 'manos' que resultaría opaca en español.
  - '''Entre sí'' preserva la relación recíproca de la expresión hebrea sin calco innecesario.'
  - Se usó 'así harás' para conservar el tono imperativo/instructivo de la cláusula final.
