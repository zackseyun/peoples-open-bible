    issue: Inicio con «Porque» en contexto poético
    rationale: Aunque es gramaticalmente correcto para כִּי, en español bíblico y poético «Pues» suele sonar más natural cuando introduce la razón de la alabanza o petición previa.
  - severity: low
    issue: Nota al pie con formulación poco natural
    rationale: '«O: «tú eres Dios solo».» resulta torpe por la combinación de comillas y por el orden final «Dios solo», menos idiomático en español. Conviene normalizarla como «O bien: “tú eres Dios solamente”» o equivalente fiel.'
  revised_spanish_text: Pues tú eres grande y haces cosas maravillosas[a]; tú solo eres Dios.
