translation:
  language: es
  text: Entonces el demonio percibirá el olor[a] y huirá, y nunca volverá, por los siglos de los siglos. Pero cuando te acerques a ella[b], levántense los dos y clamen al Dios misericordioso, y él los salvará y tendrá misericordia de ustedes. No temas, porque ella había sido preparada para ti desde la eternidad[c]; tú la salvarás, y ella irá contigo, y supongo que tendrás hijos de ella. Y cuando Tobías oyó estas cosas, la besó, y su alma quedó muy fuertemente ligada a ella[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Percibirá el olor'' traduce de manera directa el verbo griego; la imagen concreta es la de captar un olor, no una abstracción.'
    reason: lexical_alternative
  - marker: b
    text: '''Te acerques a ella'' refleja el contexto matrimonial de la frase, equivalente al modismo inglés ''go in to her''.'
    reason: cultural_note
  - marker: c
    text: También puede entenderse como 'desde antiguo' o 'desde hace mucho tiempo'; el griego admite una referencia a gran antigüedad o a un horizonte eterno.
    reason: alternative_reading
  - marker: d
    text: '''Su alma quedó muy fuertemente ligada a ella'' conserva la imagen del texto griego: una unión profunda, no solo afecto momentáneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀσφρανθήσεται
  english_pob_choice: will smell
  chosen_spanish: lo olerá
  alternatives_spanish:
  - percibirá el olor
  - lo captará por el olfato
  lexicon: BDAG
  rationale: El verbo griego expresa percibir por el olfato. En español, 'olerá' conserva la acción concreta y directa sin explicarla de más.
- source_word: τὸ δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el espíritu malo
  - el demonio maligno
  lexicon: BDAG
  rationale: '''Demonio'' reproduce con precisión el término griego y mantiene la misma carga semántica que la elección inglesa.'
- source_word: οὐκ ἐπανελεύσεται τὸν αἰῶνα τοῦ αἰῶνος
  english_pob_choice: it will never return forever
  chosen_spanish: nunca volverá, por los siglos de los siglos
  alternatives_spanish:
  - no volverá jamás
  - no volverá nunca jamás
  lexicon: BDAG
  rationale: La frase griega es enfática e idiomática. En español, 'por los siglos de los siglos' conserva la fuerza intensiva y el sentido de no-retorno permanente sin sonar torpe como calco.
- source_word: προσπορεύῃ αὐτῇ
  english_pob_choice: you go in to her
  chosen_spanish: te acerques a ella
  alternatives_spanish:
  - vayas a ella
  - entres donde ella
  lexicon: BDAG
  rationale: El contexto matrimonial permite una formulación natural en español. 'Te acerques a ella' evita una expresión demasiado literal o brusca, pero preserva la referencia al acercamiento conyugal.
- source_word: ἐγέρθητε ἀμφότεροι
  english_pob_choice: rise, both of you
  chosen_spanish: levántense los dos
  alternatives_spanish:
  - pónganse de pie ambos
  - despiértense ambos
  lexicon: BDAG
  rationale: '''Levántense'' es imperativo natural en español y mantiene el tono solemne. ''Los dos'' expresa de forma clara el plural dual del griego.'
- source_word: βοήσατε πρὸς τὸν ἐλεήμονα θεόν
  english_pob_choice: cry out to the merciful God
  chosen_spanish: clamen al Dios misericordioso
  alternatives_spanish:
  - griten al Dios misericordioso
  - clamen al Dios compasivo
  lexicon: BDAG
  rationale: '''Clamen'' comunica el sentido de invocar con fuerza, y ''Dios misericordioso'' conserva el atributo divino del griego de manera natural en español.'
- source_word: σώσει ὑμᾶς καὶ ἐλεήσει
  english_pob_choice: he will save you and have mercy on you
  chosen_spanish: él los salvará y tendrá misericordia de ustedes
  alternatives_spanish:
  - él los rescatará y tendrá compasión de ustedes
  - él los salvará y se apiadará de ustedes
  lexicon: BDAG
  rationale: Se mantiene la pareja verbal del griego con un español claro. 'Tendrá misericordia de ustedes' conserva el matiz de ἐλεήσει sin reducirlo a una mera emoción.
- source_word: ἡτοίμασμένη ἦν ἀπὸ τοῦ αἰῶνος
  english_pob_choice: had been prepared for you from eternity
  chosen_spanish: había sido preparada para ti desde la eternidad
  alternatives_spanish:
  - había sido preparada para ti desde antiguo
  - había sido dispuesta para ti desde los siglos
  lexicon: BDAG
  rationale: '''Desde la eternidad'' reproduce la fuerte amplitud temporal del griego y coincide con la lectura teológica auditada en inglés.'
- source_word: σὺ αὐτὴν σώσεις
  english_pob_choice: you will save her
  chosen_spanish: tú la salvarás
  alternatives_spanish:
  - tú la rescatarás
  - tú la preservarás
  lexicon: BDAG
  rationale: Se conserva 'salvarás' para reflejar el mismo verbo que en la cláusula anterior y mantener la entrega narrativa de liberación.
- source_word: πορεύσεται μετὰ σοῦ
  english_pob_choice: she will go with you
  chosen_spanish: ella irá contigo
  alternatives_spanish:
  - ella caminará contigo
  - ella viajará contigo
  lexicon: BDAG
  rationale: '''Irá contigo'' es una solución natural y amplia, fiel al futuro simple del griego.'
- source_word: ὑπολαμβάνω
  english_pob_choice: I suppose
  chosen_spanish: supongo
  alternatives_spanish:
  - pienso
  - estimo
  lexicon: BDAG
  rationale: '''Supongo'' refleja la cautela o inferencia personal de Rafael sin sobreinterpretarla como certeza absoluta.'
- source_word: ἐξ αὐτῆς παιδία
  english_pob_choice: children by her
  chosen_spanish: hijos de ella
  alternatives_spanish:
  - hijos con ella
  - descendencia de ella
  lexicon: BDAG
  rationale: '''Hijos de ella'' expresa de forma natural la procedencia filial. En español resulta más claro que una construcción demasiado literal.'
- source_word: ἐφίλησεν αὐτήν
  english_pob_choice: he kissed her
  chosen_spanish: la besó
  alternatives_spanish:
  - le dio un beso
  - la besó con afecto
  lexicon: BDAG
  rationale: El verbo significa simplemente besar. 'La besó' es la forma más directa y fiel.
- source_word: ἡ ψυχὴ αὐτοῦ ἐκολλήθη αὐτῇ σφόδρα
  english_pob_choice: his soul was bound to her very strongly
  chosen_spanish: su alma quedó muy fuertemente ligada a ella
  alternatives_spanish:
  - su alma se apegó muchísimo a ella
  - su alma se unió a ella con gran fuerza
  lexicon: BDAG
  rationale: Se conserva la metáfora de unión/ligadura del griego. 'Ligada' mantiene la imagen textual sin diluirla en un mero comentario psicológico.
theological_decisions:
- issue: Fuerza de ἀπὸ τοῦ αἰῶνος al describir la preparación de Sara
  english_pob_reading: from eternity
  chosen_spanish_reading: desde la eternidad
  alternative_spanish_readings:
  - desde antiguo
  - desde los siglos
  rationale: La frase puede apuntar a una antigüedad remota o a un horizonte eterno. Se mantiene 'desde la eternidad' porque conserva la fuerza teológica que el audit trail inglés decidió no aplanar.
  doctrine_reference: Preservar el peso providencial del texto sin imponer categorías doctrinales ajenas al pasaje.
- issue: Sentido de 'tú la salvarás'
  english_pob_reading: deliverance from the demon's threat within the narrative
  chosen_spanish_reading: liberación narrativa de la amenaza del demonio
  alternative_spanish_readings:
  - salvación espiritual general
  - protección general
  rationale: El contexto inmediato trata de la huida del demonio y la preservación de Sara. La traducción conserva 'salvarás' dentro de ese marco narrativo y no lo amplía indebidamente a una doctrina posterior.
  doctrine_reference: No importar categorías soteriológicas ajenas al contexto inmediato.
translation_notes:
  revision_awareness: El texto sigue el sentido confirmado por el audit trail inglés y la fuente griega, con especial atención a los modismos matrimoniales y a la intensidad temporal de ἀπὸ τοῦ αἰῶνος. No se requirieron revisiones posteriores.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'demonio' para τὸ δαιμόνιον, en coherencia con el audit trail.
  - Se mantiene 'salvar' para σῴζω y 'misericordia' para ἐλεέω/ἐλεήμων, siguiendo la terminología base del proyecto.
  - '''Desde la eternidad'' conserva la decisión teológica auditada en inglés sin convertirla en paráfrasis libre.'
  - La metáfora final de 'ligada' mantiene la tensión lexical entre unión afectiva y unión figurada.
