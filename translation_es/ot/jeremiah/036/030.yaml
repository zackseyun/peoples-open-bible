    issue: «al frío de la noche» atenúa קֶרַח
    rationale: El hebreo קֶרַח denota ‘escarcha/helada/frost’, no solo frío general. «Frío» pierde la imagen concreta preservada en el texto inglés auditado.
  - severity: medium
