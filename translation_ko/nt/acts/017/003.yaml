source:
  edition: SBLGNT
  text: διανοίγων καὶ παρατιθέμενος ὅτι τὸν χριστὸν ἔδει παθεῖν καὶ ἀναστῆναι ἐκ νεκρῶν, καὶ ὅτι οὗτός ἐστιν ⸂ὁ χριστός, ὁ⸃ Ἰησοῦς ὃν ἐγὼ καταγγέλλω ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/003.yaml
  text: explaining and demonstrating that the Messiah had to suffer and rise from the dead[a], and that this Jesus, whom I proclaim to you[b], is the Messiah.
  footnotes:
  - marker: a
    text: Or 'the Christ' in both occurrences of 'the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'be raised from the dead.' The Greek here uses an active infinitive, 'rise,' though elsewhere the New Testament also speaks of Jesus being raised by God.
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아가 고난을 받고 죽은 자들 가운데서 살아나야만 하였음을 풀어 설명하면서 「내가 여러분에게 전하는 이 예수가 곧 메시아입니다」 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν χριστὸν
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 바울의 회당 변증에서 Χριστός는 명백히 칭호로 기능한다(「예수가 곧 그 메시아이다」). 본 번역의 원칙대로 「메시아」.
theological_decisions:
- issue: 회당 변증에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본문 구조 「τὸν χριστὸν…οὗτός ἐστιν ὁ χριστός, ὁ Ἰησοῦς」는 「메시아」가 칭호임을 명시적으로 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός'
