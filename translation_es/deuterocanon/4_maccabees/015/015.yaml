translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió 'around the fire' a 'in the fire' para reflejar mejor περὶ τὸ πῦρ en contexto. También se preservó la decisión del POB de no resolver de forma excesiva la clausula final abrupta del griego, manteniendo la aspereza textual.
  spanish_consistency_notes:
  - Se usó 'carne' para σάρξ, en consonancia con el criterio POB de concreción física.
  - '''Espíritu'' no aparece en este versículo; no se aplicaron mayúsculas teológicas innecesarias.'
  - Se prefirió una puntuación que conserve el encadenamiento acumulativo del original.
  - '''Barbas'' se mantuvo en plural para respetar la forma genitiva griega y evitar una normalización no sustentada.'
