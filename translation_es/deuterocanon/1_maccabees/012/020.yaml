translation:
  language: es
  text: Arius[a], rey de los espartanos, a Onias, el sumo sacerdote, saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Ἄρης puede transliterarse más literalmente como «Ares», pero en este contexto histórico se entiende como el nombre personal del rey espartano, por eso se traduce como «Arius».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρης
  english_pob_choice: Arius
  chosen_spanish: Arius
  alternatives_spanish:
  - Ares
  lexicon: LSJ
  rationale: En este encabezado epistolar, el nombre funciona como nombre propio histórico. Mantengo la forma castellana/latinizada «Arius» siguiendo la decisión auditada del POB inglés, en vez de traducirlo literalmente como «Ares», que podría sugerir indebidamente al dios griego.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: LSJ
  rationale: El título político es directo y en español «rey» comunica con precisión y naturalidad el cargo.
- source_word: Σπαρτιατῶν
  english_pob_choice: of the Spartans
  chosen_spanish: de los espartanos
  alternatives_spanish:
  - de Esparta
  lexicon: LSJ
  rationale: El genitivo plural señala al pueblo/esencia colectiva de los espartanos, no solo la ciudad como lugar. Por eso conservo «de los espartanos».
- source_word: Ὀνείᾳ
  english_pob_choice: to Onias
  chosen_spanish: a Onias
  alternatives_spanish:
  - para Onias
  lexicon: LSJ
  rationale: En un saludo de carta, el dativo se expresa de manera natural con «a» en español. «Para» sería posible, pero menos directo como fórmula epistolar.
- source_word: ἱερεῖ μεγάλῳ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el alto sacerdote
  lexicon: LSJ
  rationale: «Sumo sacerdote» es la equivalencia estable y fiel al oficio judío designado por la expresión griega. «Gran sacerdote» sería más literal, pero menos idiomático y menos claro en español.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - que te vaya bien
  lexicon: LSJ
  rationale: En encabezamientos epistolares, χαίρειν funciona como fórmula convencional de saludo. «Saludos» reproduce bien esa función comunicativa sin forzar el sentido verbal literal de «alegrarse».
translation_notes:
  revision_awareness: El texto griego es breve y el audit trail inglés muestra acuerdo alto sin revisiones aplicadas. Conservo la estructura epistolar directa y la decisión onomástica ya auditada para Ἄρης, sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Mantengo «sumo sacerdote» como término técnico estable para ἱερεῖ μεγάλῳ.
  - Conservo «saludos» como fórmula de carta, no como imperativo devocional.
  - Uso «Arius» con nota para preservar la tensión entre transliteración más literal y nombre histórico convencional.
