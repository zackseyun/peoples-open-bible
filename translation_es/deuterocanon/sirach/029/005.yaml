  yaml_path: translation/deuterocanon/sirach/029/005.yaml
  text: Until he receives it[a], he will kiss his hand, and for his neighbor’s money he will lower his voice; but at the time of repayment he will delay[b], and he will repay with words of indifference and blame the time.
  footnotes:
