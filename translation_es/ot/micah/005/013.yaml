translation:
  language: es
  text: Y desarraigaré tus postes rituales de Aserá[a] de en medio de ti, y destruiré tus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus aserás» o «tus postes sagrados». El término hebreo puede referirse a objetos cultuales asociados con la diosa Aserá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַשְׁתִּי
  english_pob_choice: I will uproot
  chosen_spanish: arrancaré
  alternatives_spanish:
  - desarraigaré
  - arrancaré de raíz
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de sacar de raíz o arrancar lo establecido. «Arrancaré» comunica bien esa imagen en español y mantiene la fuerza de eliminación física sin sonar forzado.
- source_word: אֲשֵׁירֶיךָ
  english_pob_choice: your Asherah poles
  chosen_spanish: tus postes de Aserá
  alternatives_spanish:
  - tus aserás
  - tus postes sagrados
  lexicon: HALOT
  rationale: El contexto habla de objetos cultuales idólatras que serán removidos. «Postes de Aserá» preserva el referente específico sin reducirlo a un genérico como «ídolos»; «Aserá» conserva el trasfondo terminológico bíblico.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de entre ti
  - de tu medio
  lexicon: HALOT
  rationale: La expresión idiomática hebrea señala expulsión desde el interior del pueblo. «De en medio de ti» es natural en español y conserva el tono relacional y judicial.
- source_word: וְהִשְׁמַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - exterminaré
  - haré perecer
  lexicon: HALOT
  rationale: El hifil de שׁמד denota causar destrucción o hacer perecer. «Destruiré» es fuerte, claro y no añade una intensidad que el contexto inmediato no exija.
- source_word: עָרֶיךָ
  english_pob_choice: your cities
  chosen_spanish: tus ciudades
  alternatives_spanish:
  - tus pueblos
  - tus urbes
  lexicon: HALOT
  rationale: El sustantivo עִיר corresponde de forma directa a «ciudad». «Tus ciudades» sigue el sentido normal y más transparente en español.
theological_decisions:
- issue: Referencia de אֲשֵׁירֶיךָ
  english_pob_reading: cultic objects associated with Asherah worship ('Asherah poles')
  chosen_spanish_reading: objetos cultuales concretos asociados con Aserá ('postes de Aserá')
  alternative_spanish_readings:
  - la diosa Aserá misma ('tus Aserás')
  - postes sagrados genéricos
  rationale: La secuencia de acciones enumera la purga de elementos idólatras. En español, «postes de Aserá» conserva la concreción material sugerida por el contexto y evita diluir el término en un genérico. Se mantiene, sin embargo, la posibilidad de leer el término con mayor amplitud en una nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de verificación fue alto y el pasaje quedó sin ajustes necesarios.
  spanish_consistency_notes:
  - Se usa «Aserá» para el referente cultual específico, en armonía con la decisión POB inglesa de mantener el término propio en lugar de un sustituto genérico.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el hebreo; este versículo no contiene el nombre divino.
  - «Destruiré» mantiene la fuerza del hifil de שׁמד sin exageración interpretativa.
  - La nota conserva alternativas relevantes porque el hebreo admite más de un matiz referencial para אֲשֵׁירֶיךָ.
