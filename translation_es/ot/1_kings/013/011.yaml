translation:
  language: es
  text: Ahora bien, un profeta anciano[a] vivía en Betel, y vino su hijo[b] y le contó todo lo que el hombre de Dios había hecho aquel día en Betel, y las palabras que había dicho al rey; se las contaron a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un cierto profeta anciano'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de singular ('vino su hijo y le contó') a plural al final ('se las contaron a su padre'). Esto puede sugerir más de un hijo o reflejar una irregularidad narrativa/textual; la traducción preserva ese cambio en lugar de armonizarlo.
    reason: textual_variant
lexical_decisions:
- source_word: נָבִיא אֶחָד זָקֵן
  english_pob_choice: an old prophet
  chosen_spanish: un profeta[a] anciano
  alternatives_spanish:
  - un cierto profeta anciano
  - un profeta viejo
  lexicon: HALOT
  rationale: נָבִיא אֶחָד introduce a single, indefinite individual; en español, 'un profeta' preserva la indefinición sin forzar 'uno'. 'Anciano' mantiene la referencia a la edad con un tono natural y digno. Se evita 'viejo' por registro, aunque sería posible.
- source_word: יֹשֵׁב בְּבֵית אֵל
  english_pob_choice: was living in Bethel
  chosen_spanish: estaba viviendo en Betel
  alternatives_spanish:
  - habitaba en Betel
  - moraba en Betel
  lexicon: HALOT
  rationale: יֹשֵׁב expresa residencia continua, no solo estar sentado. 'Estaba viviendo' comunica bien el estado durativo en narración española moderna sin perder el valor habitual/residencial.
- source_word: וַיָּבֹא בְנוֹ
  english_pob_choice: his sons came
  chosen_spanish: sus hijos vinieron
  alternatives_spanish:
  - vino su hijo
  - vinieron sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo aquí tiene una forma singular, el flujo inmediato del versículo pasa al plural ('les contaron', 'se los contaron'), de modo que el español puede reflejar esa tensión con 'sus hijos vinieron' sin harmonizarla hacia un singular. 'Vinieron' mantiene la continuidad plural posterior.
- source_word: וַיְסַפֶּר לוֹ
  english_pob_choice: told him
  chosen_spanish: le contaron
  alternatives_spanish:
  - le narraron
  - le relataron
  lexicon: HALOT
  rationale: ספר en piel significa contar o relatar. Dado el contexto narrativo, 'le contaron' es natural y fiel; 'narraron' o 'relataron' son más formales, pero no necesarias.
- source_word: אֶת כָּל הַמַּעֲשֶׂה
  english_pob_choice: all the deed
  chosen_spanish: todo el hecho
  alternatives_spanish:
  - toda la obra
  - todo lo sucedido
  lexicon: HALOT
  rationale: מַעֲשֶׂה está en singular y remite a una acción notable. 'Hecho' preserva ese singular y suena más natural que 'acto' en este contexto. 'Lo sucedido' suavizaría demasiado el valor de acto concreto.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  lexicon: HALOT
  rationale: Se conserva el título profético tradicional 'hombre de Dios', que en español es claro y consistente. 'Varón de Dios' es más arcaizante.
- source_word: הַיּוֹם
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - hoy
  lexicon: HALOT
  rationale: En narrativa pasada, 'aquel día' transmite mejor la deixis retrospectiva de הַיּוֹם que 'hoy'.
- source_word: אֶת הַדְּבָרִים אֲשֶׁר דִּבֶּר אֶל הַמֶּלֶךְ
  english_pob_choice: and the words that he had spoken to the king
  chosen_spanish: y las palabras que había dicho al rey
  alternatives_spanish:
  - y las palabras que le había hablado al rey
  - y lo que había dicho al rey
  lexicon: HALOT
  rationale: דְּבָרִים es literalmente 'palabras', y el texto distingue entre la acción y el discurso. 'Había dicho' mantiene la referencia al habla profética sin introducir un calco incómodo.
- source_word: וַיְסַפְּרוּם לַאֲבִיהֶם
  english_pob_choice: they told them to their father
  chosen_spanish: se las contaron a su padre
  alternatives_spanish:
  - se lo contaron a su padre
  - las contaron a su padre
  lexicon: HALOT
  rationale: El plural hebreo con sufijo de objeto plural se preserva en español con 'se las contaron'. Esto mantiene la tensión textual entre el singular inicial y el plural final, sin resolverla artificialmente.
theological_decisions:
- issue: Título profético 'el hombre de Dios'
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el varón de Dios
  rationale: Se mantiene el título profético como designación funcional del mensajero divino, sin sustituirlo por un equivalente interpretativo. Esto conserva la forma bíblica establecida y su fuerza narrativa.
  doctrine_reference: Profecía y comisión divina en la narrativa del AT
- issue: Tensión singular/plural en los hijos
  english_pob_reading: Hebrew shifts from singular ('his son came and told him') to plural ('they told them to their father'). This may imply more than one son or reflect a textual/narrative irregularity; the translation preserves the shift rather than harmonizing it.
  chosen_spanish_reading: sus hijos vinieron ... se las contaron a su padre
  alternative_spanish_readings:
  - vino su hijo ... se lo contaron a su padre
  - vino su hijo ... le contaron ...
  rationale: Se conserva la incoherencia o tensión del hebreo, ya que el texto transmite un cambio notable de número. El español no la corrige, sino que la deja perceptible con un plural en la primera acción y otro en la final.
  doctrine_reference: Crítica textual y preservación de tensiones del texto fuente
translation_notes:
  revision_awareness: El audio-trail inglés pasó de 'his son came' a 'his sons came' para reflejar el plural posterior. La versión española se alinea con esa revisión y conserva la tensión número singular/plural sin suavizarla, manteniendo además el orden narrativo y la distinción entre el hecho y las palabras. Se eligió 'hecho' para מַעֲשֶׂה y 'aquel día' para הַיּוֹם, conforme al patrón de equivalencia óptima del registro inglés.
  spanish_consistency_notes:
  - 'Betel se conserva sin tilde: ''Betel''.'
  - '''Yahvé'' no aparece en este versículo; no hay necesidad de marcar el nombre divino aquí.'
  - Se mantiene 'hombre de Dios' como término profético estable.
  - El estilo evita arcaísmos excesivos y conserva un registro bíblico sobrio.
