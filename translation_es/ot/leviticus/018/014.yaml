translation:
  language: es
  text: No descubrirás la desnudez del hermano de tu padre; no te acercarás a su mujer[a]. Ella es tu tía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘acercarse’; en este contexto el verbo tiene fuerza sexual dentro de la fórmula legal de incesto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la desnudez sexual de
  - la vergüenza de
  lexicon: HALOT
  rationale: En esta fórmula legal fija de Levítico 18, עֶרְוָה mantiene un sentido concreto de ‘desnudez’ dentro del modismo prohibitivo. En español, ‘la desnudez de’ preserva la imagen legal sin explicitar más de lo que el texto dice.
- source_word: אֲחִי אָבִיךָ
  english_pob_choice: your father's brother
  chosen_spanish: tu hermano de tu padre
  alternatives_spanish:
  - tu tío paterno
  - el hermano de tu padre
  lexicon: HALOT
  rationale: La cadena constructa se refleja de forma transparente como ‘tu hermano de tu padre’. Aunque ‘tu tío paterno’ es idiomático, la formulación elegida sigue más de cerca la relación expresada en hebreo y conserva la claridad genealógica.
- source_word: תְגַלֶּה
  english_pob_choice: you shall ... uncover
  chosen_spanish: descubrirás
  alternatives_spanish:
  - no descubrirás
  - no has de descubrir
  lexicon: HALOT
  rationale: El hebreo usa el verbo idiomático ‘descubrir’ en una prohibición legal. En español, ‘No descubrirás’ conserva ese giro tradicional sin neutralizarlo en una paráfrasis explícita sobre conducta sexual.
- source_word: אֶל אִשְׁתּוֹ לֹא תִקְרָב
  english_pob_choice: you shall not approach his wife
  chosen_spanish: no te acercarás a su mujer
  alternatives_spanish:
  - no te acercarás a su esposa
  - no te acercarás sexualmente a su mujer
  lexicon: HALOT
  rationale: קרב con אֶל conserva una forma de cercanía más sobria que una paráfrasis abierta. ‘No te acercarás a su mujer’ mantiene el eufemismo legal y en español ‘mujer’ reproduce bien el término relacional del texto.
- source_word: דֹּדָתְךָ
  english_pob_choice: your aunt
  chosen_spanish: tu tía
  alternatives_spanish:
  - tu tía paterna
  - la mujer de tu tío
  lexicon: HALOT
  rationale: דּוֹדָה significa ‘tía’. Dado que el verso ya especificó que se trata de la mujer del hermano de tu padre, ‘tu tía’ es la equivalencia natural y concisa en español.
- source_word: הִוא
  english_pob_choice: She is
  chosen_spanish: Ella es
  alternatives_spanish:
  - es ella
  - porque ella es
  lexicon: HALOT
  rationale: El pronombre funciona como identificación predicativa. ‘Ella es tu tía’ reproduce con naturalidad el cierre explicativo del hebreo sin añadir causalidad que el texto no exige.
theological_decisions:
- issue: Conservar el modismo legal de ‘descubrir la desnudez’ sin diluirlo
  english_pob_reading: Retain 'uncover the nakedness' in the main text while allowing the context to signal prohibited sexual relations.
  chosen_spanish_reading: Mantener ‘descubrir la desnudez’ como fórmula legal visible, dejando que el contexto de parentesco marque la prohibición sexual.
  alternative_spanish_readings:
  - parafrasear como ‘tener relaciones sexuales con’
  - explicar el sentido en nota y reemplazar la fórmula en el texto principal
  rationale: El pasaje pertenece a la serie de leyes de incesto y usa una expresión fija. La versión española conserva el lenguaje legal sin borrar la tensión semántica entre la fórmula y su sentido sexual contextual.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Identificación kinship final sin sobrerrepetición
  english_pob_reading: Translate the final identification as 'She is your aunt.'
  chosen_spanish_reading: Traducir el cierre como ‘Ella es tu tía’.
  alternative_spanish_readings:
  - ‘Ella es la mujer de tu tío’
  - ‘Ella es tu tía paterna por matrimonio’
  rationale: El hebreo usa el término de parentesco ordinario para concluir la aclaración. En español, ‘tu tía’ es conciso y fiel, mientras que la cláusula anterior ya deja claro el vínculo exacto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente (sin cambios necesarios) y mantiene acuerdo alto con el control cruzado: conserva la fórmula legal de ‘descubrir la desnudez’, traduce el movimiento relacional con naturalidad en español y no introduce paráfrasis interpretativas no apoyadas por el hebreo.'
  spanish_consistency_notes:
  - Se usa ‘desnudez’ para la fórmula legal fija, en paralelo con el manejo del inglés POB de ‘nakedness’.
  - Se mantiene el tono jurídico con futuras negativas/prohibiciones en segunda persona singular.
  - ‘Tía’ se usa en sentido de parentesco por matrimonio ya explicitado por la cláusula anterior, sin necesidad de expandirlo en el texto principal.
