translation:
  language: es
  text: 'Entonces el rey Sedequías juró en secreto a Jeremías[a], diciendo: «Tan cierto como que Yahvé vive, que hizo esta vida para nosotros, no te mataré, ni te entregaré en manos de estos hombres que buscan tu vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «que nos dio esta vida». El hebreo dice más literalmente: «que hizo para nosotros esta vida/alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - juró con juramento
  lexicon: HALOT
  rationale: El verbo hebreo expresa toma de juramento. En español, «juró» es natural y solemne; mantiene la fuerza del acto sin añadir una expansión innecesaria.
- source_word: בַּסֵּתֶר
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - privadamente
  lexicon: HALOT
  rationale: La expresión indica ocultamiento. «En secreto» es claro y idiomático en español, y conserva el sentido adverbial.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Vive Yahvé, que...
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento hebrea con el nombre divino explícito, conforme al estándar del proyecto. En español, «Vive Yahvé» es breve y reconoce el valor idiomático de la fórmula sin ocultar el nombre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms / HALOT
  rationale: Se sigue el criterio del proyecto de traducir el tetragrámaton como «Yahvé» en el texto principal, manteniendo el nombre del pacto en vez de sustituirlo por una convención de mayúsculas.
- source_word: אֵת אֲשֶׁר עָשָׂה לָנוּ אֶת הַנֶּפֶשׁ הַזֹּאת
  english_pob_choice: who made this life for us
  chosen_spanish: que hizo esta vida para nosotros
  alternatives_spanish:
  - que nos hizo esta vida
  - que nos dio esta vida
  - que hizo para nosotros esta vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se entiende como «vida», no como «alma». «Hizo esta vida para nosotros» conserva el verbo עָשָׂה y la relación idiomática del hebreo, siguiendo de cerca la lectura auditada del inglés sin depender mecánicamente de él.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - persona
  lexicon: HALOT
  rationale: En este contexto de juramento y amenaza de muerte, נֶפֶשׁ funciona como «vida». «Vida» evita importar una noción de «alma» que aquí no corresponde al uso hebreo.
- source_word: אִם אֲמִיתֶךָ
  english_pob_choice: I will not put you to death
  chosen_spanish: no te mataré
  alternatives_spanish:
  - ciertamente no te mataré
  - no te daré muerte
  lexicon: HALOT
  rationale: Tras una fórmula de juramento, אִם tiene fuerza negativa elíptica. En español se debe explicitar la negación. «No te mataré» es natural y comunica el compromiso sin perder el contenido.
- source_word: וְאִם אֶתֶּנְךָ בְּיַד
  english_pob_choice: nor will I give you into the hand of
  chosen_spanish: ni te entregaré en mano de
  alternatives_spanish:
  - ni te pondré en manos de
  - ni te entregaré en poder de
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «mano» para evitar diluir el giro forense/político. «Entregaré en mano de» refleja con fidelidad la idiomática bíblica y sigue siendo entendible en español.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  lexicon: HALOT
  rationale: El plural masculino es específico en hebreo y el contexto se refiere a varones identificables. «Estos hombres» conserva esa precisión.
- source_word: מְבַקְשִׁים אֶת נַפְשֶׁךָ
  english_pob_choice: are seeking your life
  chosen_spanish: buscan tu vida
  alternatives_spanish:
  - están buscando tu vida
  - buscan matarte
  lexicon: HALOT
  rationale: La expresión hebrea «buscar la vida de alguien» puede entenderse como buscar matarlo. «Buscan tu vida» mantiene el modismo bíblico y sigue siendo claro en español.
theological_decisions:
- issue: Nombre divino en una fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo dice explícitamente יְהוָה dentro de una fórmula de juramento. Conforme al criterio del proyecto, el nombre divino se conserva como «Yahvé» en el texto principal, evitando una sustitución litúrgica que borre el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נֶפֶשׁ en el contexto
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - vida/soul en nota
  rationale: Aquí נֶפֶשׁ se usa en relación con la existencia amenazada y con el intento de asesinato en la segunda mitad del versículo. «Vida» refleja mejor el sentido contextual que «alma», sin perder la tensión del hebreo.
  doctrine_reference: Lexical decision consistent with HALOT and POB audit trail
- issue: Fuerza negativa de אִם en contexto de juramento
  english_pob_reading: I will not put you to death, nor will I give you into the hand of these men
  chosen_spanish_reading: no te mataré, ni te entregaré en mano de estos hombres
  alternative_spanish_readings:
  - ciertamente no te mataré, ni te entregaré en manos de estos hombres
  - si te mato...
  rationale: En juramentos bíblicos, אִם introduce una negación enfática elíptica. El español necesita expresar directamente la negación para que el juramento sea comprensible y no suene incompleto.
  doctrine_reference: Hebrew oath usage; context-sensitive syntax
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada auditada en inglés, que quedó sin cambios y con alto acuerdo. El español sigue esa lectura estable, pero ajusta la formulación para sonar natural en español sin perder las tensiones léxicas documentadas, especialmente en נֶפֶשׁ y en la fórmula de juramento con יְהוָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio general del proyecto.
  - «Vida» se usa para נֶפֶשׁ en este contexto, evitando introducir «alma» en el cuerpo del texto.
  - La metáfora «en mano de» se conserva por fidelidad al hebreo y consistencia con el estilo auditado de POB.
  - La nota al pie marca la alternativa lexical documentada entre «hizo» y «dio», sin perder el matiz de עָשָׂה.
