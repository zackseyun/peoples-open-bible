  lexicon: BDAG
  rationale: θριαμβεύω는 로마의 개선식 비유. 정복자가 포로를 이끌고 행진하는 이미지. 「개선 행렬로 이끌다」가 본문의 이미지를 살린다.
- source_word: ὀσμὴν
