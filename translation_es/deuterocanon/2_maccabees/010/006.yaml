translation:
  language: es
  text: Pero cuando los que estaban con Macabeo[a], mientras la estaban sitiando, tomaron posesión de las fortalezas, con lamentos y lágrimas suplicaban, junto con las multitudes[b], al Señor que enviara un buen ángel para la salvación de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Maccabeo'. El griego dice Μακκαβαῖος.
    reason: lexical_alternative
  - marker: b
    text: El pronombre griego en 'mientras la estaban sitiando' es sintácticamente escueto; se entiende mejor que el objeto es el lugar fortificado bajo asedio, no una persona.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ περὶ τὸν Μακκαβαῖον
  english_pob_choice: those around Makkabaios
  chosen_spanish: los de alrededor de Macabeo
  alternatives_spanish:
  - los que estaban con Macabeo
  - los hombres de Macabeo
  - los de Macabeo
  lexicon: LSJ
  rationale: La expresión griega es idiomática y señala al grupo que rodea a Macabeo sin precisar rango ni número. 'Los de alrededor de Macabeo' conserva la rareza sintáctica básica del griego, pero en español sigue siendo claro y natural.
- source_word: μετέλαβον
  english_pob_choice: gained possession of
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - tomaron posesión de
  - ocuparon
  - capturaron
  lexicon: LSJ
  rationale: En contexto militar, μετέλαβον implica tomar control o posesión. 'Se apoderaron de' comunica ese acto con fuerza y sin añadir detalles que el griego no da.
- source_word: τὰ ὀχυρώματα
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - las posiciones fortificadas
  - las fortalezas defensivas
  lexicon: LSJ
  rationale: ὀχυρώματα designa lugares fortificados. 'Fortalezas' es la opción más directa y readable en español; mantiene la referencia militar sin calcar una forma extraña.
- source_word: πολιορκοῦντα αὐτὸν
  english_pob_choice: while he was besieging it
  chosen_spanish: mientras asediaban la plaza
  alternatives_spanish:
  - mientras la estaban sitiando
  - mientras la sitiaban
  - mientras él la asediaba
  lexicon: LSJ
  rationale: El griego es sintácticamente breve y el antecedente de αὐτόν es implícito. Como en el audit trail inglés, el sentido más probable es que se trate del lugar fortificado bajo asedio, no de una persona. 'La plaza' da una referencia comprensible sin forzar demasiado el contexto.
- source_word: μετὰ ὀδυρμῶν καὶ δακρύων
  english_pob_choice: with lamentations and tears
  chosen_spanish: con lamentos y lágrimas
  alternatives_spanish:
  - con lamentaciones y lágrimas
  - con llanto y lágrimas
  - con gemidos y lágrimas
  lexicon: LSJ
  rationale: ὀδυρμός expresa duelo o lamentación. 'Lamentos y lágrimas' conserva la intensidad emocional del pasaje en español moderno y digno.
- source_word: ἱκέτευον
  english_pob_choice: pleaded
  chosen_spanish: suplicaban
  alternatives_spanish:
  - imploraban
  - rogaban
  - pedían con insistencia
  lexicon: LSJ
  rationale: El verbo indica súplica intensa. 'Suplicaban' reproduce mejor esa fuerza que un simple 'pedían'.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Dueño
  - al Soberano
  lexicon: LSJ
  rationale: En este contexto judío escritural, κύριος se refiere reverentemente a Dios. 'Señor' es la forma española estable y fiel, sin necesitar una ampliación innecesaria.
- source_word: ἀγαθὸν ἄγγελον
  english_pob_choice: a good angel
  chosen_spanish: un buen ángel
  alternatives_spanish:
  - un ángel benevolente
  - un ángel favorable
  - un ángel bondadoso
  lexicon: LSJ
  rationale: 'La frase griega es literal: ''buen ángel''. Se conserva esa literalidad para no resolver de antemano si ''bueno'' describe el carácter del ángel o su función benéfica.'
- source_word: ἀποστεῖλαι πρὸς σωτηρίαν τῷ Ἰσραήλ
  english_pob_choice: to send ... for the salvation of Israel
  chosen_spanish: que enviara ... para la salvación de Israel
  alternatives_spanish:
  - que enviara ... para salvar a Israel
  - que enviara ... para la liberación de Israel
  - que lo enviara ... para la salvación de Israel
  lexicon: LSJ
  rationale: ἀποστεῖλαι indica enviar; πρὸς σωτηρίαν τῷ Ἰσραήλ expresa finalidad orientada a la salvación/liberación de Israel. 'Para la salvación de Israel' mantiene el tono bíblico y la amplitud semántica del término.
theological_decisions:
- issue: Sentido de 'un buen ángel'
  english_pob_reading: The phrase is rendered literally as 'a good angel' without identifying the angel or expanding it to a doctrinal category.
  chosen_spanish_reading: Se traduce literalmente como 'un buen ángel', sin identificarlo ni convertirlo en una categoría doctrinal más precisa.
  alternative_spanish_readings:
  - un ángel benevolente
  - un ángel auxiliar
  - un ángel favorable
  rationale: El griego no especifica la identidad del ángel ni explica en qué consiste su bondad más allá de la palabra ἀγαθός. Mantener la literalidad preserva la tensión teológica y evita sobreinterpretar el texto.
  doctrine_reference: Preservar la tensión textual sin resolverla especulativamente.
translation_notes:
  revision_awareness: 'Se revisó el encuadre sintáctico a partir del audit trail inglés: el participio contemporáneo se expresa en español con ''mientras asediaban'', y el complemento implícito se entiende como el lugar fortificado bajo ataque. También se preservó la literalidad de ''un buen ángel'' para no borrar la ambigüedad documentada.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto fuente lo exige explícitamente; en este versículo aparece κύριος y, siguiendo el contexto judío scriptural del POB, se traduce como 'Señor'.
  - Se mantiene 'Macabeo' como forma española natural del nombre/título, evitando una transliteración innecesaria.
  - '''Suplicaban'' se usa para reflejar la intensidad de ἱκέτευον, no como mero ''pedían''.'
  - '''Salvación'' conserva la amplitud de σωτηρία, sin reducirla únicamente a ''liberación''.'
