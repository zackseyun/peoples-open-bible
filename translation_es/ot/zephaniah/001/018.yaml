base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/018.yaml
  text: Neither their silver nor their gold will be able to deliver them on the day of Yahweh’s wrath[a], and in the fire of his jealousy all the earth will be consumed; for he will make a complete, indeed sudden[c][b], end of all the inhabitants of the earth.
  footnotes:
  - marker: a
    text: Or 'all the land' / 'all the inhabitants of the land.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; the broader sense is adopted here because of the verse’s sweeping judgment language.
    reason: alternative_reading
  - marker: b
    text: Or 'by the fire of his zeal.' The Hebrew noun can mean 'jealousy' or 'zeal'; 'jealousy' is retained in the main text to preserve the covenantal nuance.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'a complete, indeed sudden, end' reflects a difficult Hebrew expression. Alternatives include 'a full, terrifying end' or 'a complete end—yes, a dreadful one.'
    reason: lexical_alternative
