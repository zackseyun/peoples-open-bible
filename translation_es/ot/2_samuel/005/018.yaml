translation:
  language: es
  text: Y los filisteos vinieron y se extendieron en el valle de Refaím[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se desplegaron» en el valle de Refaím.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  english_pob_choice: And the Philistines
  chosen_spanish: Y los filisteos
  alternatives_spanish:
  - Ahora los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: Se conserva el ethnónimo tradicional y el valor narrativo simple de la waw con «Y», que mantiene el flujo de la acción sin añadir matiz temporal no explícito.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: En español narrativo, «vinieron» reproduce de forma natural el movimiento de acercamiento del hebreo sin forzar un matiz más técnico que «llegaron».
- source_word: וַ/יִּנָּטְשׁוּ
  english_pob_choice: spread out
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se extendieron
  - se distribuyeron
  - se desplegaron militarmente
  lexicon: HALOT
  rationale: El contexto militar favorece una imagen de formación o ocupación del terreno. «Se desplegaron» conserva la idea de posicionamiento amplio y evita traducir demasiado libremente con «se dispersaron».
- source_word: בְּ/עֵמֶק
  english_pob_choice: in the Valley of
  chosen_spanish: en el valle de
  alternatives_spanish:
  - en el Valle de
  - en el valle
  lexicon: HALOT
  rationale: Se mantiene la referencia locativa con español natural. Se evita capitalizar «valle» en el cuerpo del texto, salvo cuando la tipografía editorial lo requiera, porque aquí funciona como nombre de lugar unido al genitivo siguiente.
- source_word: רְפָאִים
  english_pob_choice: Rephaim
  chosen_spanish: Refaím
  alternatives_spanish:
  - Rephaim
  - de los Refaím
  lexicon: HALOT
  rationale: Se translitera al español como «Refaím» para conservar el nombre propio hebreo sin traducirlo como una entidad colectiva. La acentuación ayuda a la pronunciación en español y mantiene la referencia topográfica tradicional.
translation_notes:
  revision_awareness: El texto inglés POB vigente ya fue revisado y quedó sin cambios; por eso la propuesta española sigue de cerca la solución auditada de «came» + «spread out», pero la expresa con sintaxis española natural.
  spanish_consistency_notes:
  - Se usa «filisteos» como etnónimo estándar.
  - Se conserva la forma topográfica «valle de Refaím» sin explicitar más de lo que el hebreo exige.
  - La nota al pie preserva la alternativa verbal documentada por el POB inglés, adaptándola al español.
