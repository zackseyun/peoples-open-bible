    rationale: 'El hebreo repite el objeto definido: «golpeó al filisteo y lo mató». Aunque el pronombre español es posible, repetir «al filisteo» mantiene mejor el énfasis y la cadencia del original y del English POB.'
  revised_spanish_text: Así David prevaleció sobre el filisteo con una honda y con una piedra; golpeó al filisteo y lo mató[a], aunque no había espada en la mano de David.
