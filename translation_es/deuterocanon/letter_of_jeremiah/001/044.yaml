translation:
  language: es
  text: Todo lo que les sucede es falso; ¿cómo, entonces, se les debe considerar o llamar dioses?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντα τὰ γενόμενα αὐτοῖς
  english_pob_choice: Everything that happens to them
  chosen_spanish: Todo lo que les sucede
  alternatives_spanish:
  - Todo lo que acontece a ellos
  - Todo lo que ocurre con ellos
  - Todo cuanto les sucede
  lexicon: BDAG
  rationale: La frase griega es amplia e idiomática. En español, «todo lo que les sucede» preserva la fuerza totalizante de πάντα y el sentido de hechos que acontecen en relación con los ídolos, sin introducir una agencia no explicitada por el griego.
- source_word: ψευδῆ
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - una mentira
  - engañoso
  - falsos
  lexicon: BDAG
  rationale: El adjetivo predicativo caracteriza en plural neutro a lo dicho antes. «Falso» es la opción más natural y concisa en español para mantener el juicio negativo sin sobrerresolverlo.
- source_word: πῶς οὖν
  english_pob_choice: how then
  chosen_spanish: ¿cómo, entonces,
  alternatives_spanish:
  - ¿cómo, pues,
  - ¿cómo, por tanto,
  lexicon: BDAG
  rationale: Se conserva el valor inferencial de la partícula griega con una formulación española directa y clara.
- source_word: νομιστέον
  english_pob_choice: should one suppose
  chosen_spanish: se les puede considerar
  alternatives_spanish:
  - se debe pensar
  - debe suponerse
  - debería considerarse
  lexicon: LSJ
  rationale: El verbal adjetivo expresa qué es apropiado pensar o considerar. En español, una construcción impersonal con «se» transmite bien esa fuerza deliberativa sin sonar forzada.
- source_word: κλητέον
  english_pob_choice: or call
  chosen_spanish: o llamar
  alternatives_spanish:
  - o nombrar
  - o designar
  lexicon: LSJ
  rationale: «Llamar» reproduce de manera natural el paralelo con νομιστέον y evita un tecnicismo innecesario.
- source_word: ὡς θεοὺς
  english_pob_choice: them gods
  chosen_spanish: dioses
  alternatives_spanish:
  - como dioses
  - por dioses
  - dioses verdaderos
  lexicon: BDAG
  rationale: El griego presenta θεούς de forma directa. En español, después de «considerar o llamar», basta «dioses» para conservar la economía retórica sin añadir matices que el texto no exige.
- source_word: αὐτοὺς ὑπάρχειν
  english_pob_choice: as though they existed
  alternatives_spanish:
  - que existen
  - como existentes
  - que son reales
  lexicon: BDAG
  rationale: La revisión inglesa descartó una glosa explícita de existencia porque no refleja bien la construcción aquí. En español, se preserva esa decisión no añadiendo una frase interpretativa; el valor de ὑπάρχειν queda implícito en la pregunta retórica sobre si deben ser considerados o llamados dioses.
theological_decisions:
- issue: Negación de la divinidad real de los ídolos
  english_pob_reading: The verse denies that idols possess real divine existence, expressed with 'as though they existed.'
  chosen_spanish_reading: El versículo niega que los ídolos merezcan ser tenidos o nombrados como dioses.
  alternative_spanish_readings:
  - El versículo niega que tengan existencia divina real.
  - El versículo niega que sean dioses de verdad.
  rationale: 'La traducción española evita añadir una paráfrasis ontológica no necesaria, pero mantiene con claridad la fuerza antiidolátrica del texto: no deben ser considerados ni llamados dioses.'
  doctrine_reference: Conservar la tensión teológica del original sin resolverla con lenguaje explicativo añadido.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente retiró una glosa explícita sobre la existencia de los ídolos porque no reflejaba con naturalidad el griego. La redacción española sigue esa revisión: no añade un equivalente interpretativo de ''as though they existed'', y deja que la pregunta retórica con «considerar o llamar dioses» cargue el peso de ὑπάρχειν.'
  spanish_consistency_notes:
  - Se usa «dioses» para θεοὺς, sin suavizar el contraste antiidolátrico.
  - Se evita «SEÑOR» o lenguaje de sustitución porque el texto no contiene el nombre divino.
  - La construcción impersonal «se les puede considerar» mantiene un tono bíblico actual y legible en español.
  - La nota al pie ofrece una alternativa plausible para ψευδῆ sin alterar el texto principal.
