  rationale: Se ajustó el orden para un español más natural, se reemplazó la expresión poco idiomática «reciba su oído» por «presten oído» para conservar el modismo de atención, y se refinó la nota de alternativa para reflejar mejor el vocativo femenino presente en el hebreo y en la auditoría inglesa.
