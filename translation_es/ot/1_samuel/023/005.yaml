translation:
  language: es
  text: Así David y sus hombres fueron a Keila y combatieron contra los filisteos, y se llevó su ganado[a] y les asestó un gran golpe[b]. Así David salvó[c] a los habitantes de Keila.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se llevó sus rebaños'; el término hebreo se refiere de manera amplia al ganado o a los animales de cría.
    reason: lexical_alternative
  - marker: b
    text: O 'les causó una gran derrota' o 'les dio una gran matanza'. La frase hebrea es idiomática y puede expresar una derrota severa.
    reason: lexical_alternative
  - marker: c
    text: O 'rescató' o 'libró' a los habitantes de Keila.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fue
  - se dirigió
  lexicon: HALOT
  rationale: El movimiento narrativo con destino explícito a Keila se expresa de manera natural en español plural con el sujeto compuesto 'David y sus hombres'. 'Fueron' conserva la secuencia narrativa sin añadir matices no presentes.
- source_word: וַאֲנָשׁוֹ
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - su gente
  - sus compañeros
  lexicon: HALOT
  rationale: En contexto militar, אֲנָשִׁים se refiere al grupo de combate de David. 'Sus hombres' es la forma más natural y fiel en español.
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Keila
  alternatives_spanish:
  - Queila
  lexicon: transliteración toponímica
  rationale: Se mantiene el nombre propio del lugar en forma transliterada y adaptada al español. 'Keila' conserva la referencia geográfica y evita una grafía demasiado anglicada.
- source_word: וַיִּלָּחֶם בַּפְּלִשְׁתִּים
  english_pob_choice: fought against the Philistines
  chosen_spanish: combatieron contra los filisteos
  alternatives_spanish:
  - lucharon contra los filisteos
  - pelearon contra los filisteos
  lexicon: HALOT
  rationale: El verbo לחם con ב indica combate contra un adversario. 'Combatieron contra' es claro, digno y evita la ambigüedad de expresiones como 'pelear con'.
- source_word: וַיִּנְהַג אֶת־מִקְנֵיהֶם
  english_pob_choice: he drove off their livestock
  chosen_spanish: les arrebató su ganado
  alternatives_spanish:
  - les llevó su ganado
  - les apartó su ganado
  lexicon: HALOT
  rationale: נָהַג en este contexto de incursión puede expresar conducir o llevarse animales. 'Les arrebató su ganado' comunica bien la acción de despojo propia del contexto bélico. Se elige 'ganado' como equivalente comprensible de מִקְנֶה, con el matiz general de animales de cría.
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su ganado y sus reses
  lexicon: HALOT
  rationale: מִקְנֶה designa de manera colectiva el ganado o los animales domésticos de propiedad. 'Ganado' es natural en español y suficientemente amplio, aunque algo menos técnico que 'ganado/livestock'.
- source_word: וַיַּךְ בָּהֶם מַכָּה גְדוֹלָה
  english_pob_choice: struck them with a great blow
  chosen_spanish: los hirió con un gran golpe
  alternatives_spanish:
  - les causó una gran derrota
  - les dio una gran matanza
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede abarcar derrota severa sin especificar el resultado exacto. 'Los hirió con un gran golpe' preserva la imagen de una herida/embestida fuerte sin forzar 'matanza' ni explicar más de lo que el texto dice.
- source_word: וַיֹּשַׁע
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - rescató
  - libró
  lexicon: HALOT
  rationale: ישע en este contexto militar expresa liberar o salvar de peligro. 'Salvó' es directo y publicable en español; mantiene el valor general sin introducir una teología más técnica que el pasaje no exige.
- source_word: יֹשְׁבֵי קְעִילָה
  english_pob_choice: the inhabitants of Keilah
  chosen_spanish: los habitantes de Keila
  alternatives_spanish:
  - los residentes de Keila
  - los que habitaban en Keila
  lexicon: HALOT
  rationale: El participio indica a quienes viven allí. 'Habitantes' es la forma más concisa y natural en español, y mantiene el sentido colectivo del hebreo.
theological_decisions:
- issue: Cómo rendir la acción final de ישע en un contexto militar
  english_pob_reading: saved the inhabitants of Keilah
  chosen_spanish_reading: salvó a los habitantes de Keila
  alternative_spanish_readings:
  - rescató a los habitantes de Keila
  - libró a los habitantes de Keila
  rationale: No hay una carga doctrinal especial aquí; el punto es narrativo y militar. 'Salvó' mantiene la amplitud de ישע sin añadir un matiz devocional o litúrgico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del texto inglés POB revisado: ''drove off their livestock'' se ha reflejado con un verbo de despojo natural en español. Se conserva la secuencia narrativa en tres acciones: ir/combater/arrebatar-herir/salvar. No se introducen ampliaciones interpretativas; se mantiene la ambigüedad del hebreo en מַכָּה גְדוֹלָה mediante una fórmula idiomática equivalente.'
  spanish_consistency_notes:
  - Se translitera el topónimo como 'Keila' para una grafía española más natural y consistente.
  - '''Filisteos'' se escribe en minúscula por tratarse de etnónimo común en español bíblico.'
  - Se usa 'ganado' como equivalente amplio de מִקְנֶה; en este verso no hace falta distinguir especies más específicas.
  - Se evita 'SEÑOR' y cualquier terminología de sustitución, porque el versículo no contiene el nombre divino.
