    text: Or "to the mountain"; the Hebrew can refer either to a specific mountain or to the surrounding hill country.
    reason: lexical_alternative
  - marker: b
    text: Or "meet you" or "come upon you"; the verb can denote encountering someone, here with hostile intent because of the context of pursuit.
    reason: lexical_alternative
