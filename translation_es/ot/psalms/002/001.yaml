translation:
  language: es
  text: ¿Por qué se amotinan[a] las naciones, y los pueblos traman en vano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'están en tumulto', 'murmuran' o 'meditan sobre vaciedad'. El hebreo puede expresar agitación tumultuaria, murmullo o meditación, y en este contexto rebelde favorece la idea de maquinación hostil y agitación colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: Interrogativo natural que conserva la fuerza retórica del hebreo sin volverlo artificial en español.
- source_word: רָגְשׁוּ
  english_pob_choice: rage
  chosen_spanish: se amotinan
  alternatives_spanish:
  - rugen
  - están en tumulto
  - se alborotan
  lexicon: HALOT
  rationale: El verbo expresa agitación tumultuaria y hostil de grupos; 'se amotinan' comunica bien esa turbulencia colectiva en un registro bíblico claro.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: '''Las naciones'' mantiene el referente político-colectivo del salmo y la correspondencia con el paralelo hebreo.'
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las etnias
  - los grupos nacionales
  lexicon: HALOT
  rationale: Conserva el paralelismo hebreo con un equivalente idiomático y suficientemente distinto de 'naciones'.
- source_word: יֶהְגּוּ
  english_pob_choice: plot
  chosen_spanish: traman
  alternatives_spanish:
  - meditan
  - murmuran
  - maquinan
  lexicon: HALOT
  rationale: En este contexto hostil, el verbo apunta a idear o maquinar; 'traman' conserva la intención adversarial que el POB inglés resolvió como 'plot'.
- source_word: רִיק
  english_pob_choice: in vain
  chosen_spanish: lo vano
  alternatives_spanish:
  - en vano
  - vaciedad
  - lo vacío
  lexicon: HALOT
  rationale: El sustantivo hebreo expresa vaciedad, vanidad o futilidad. 'Lo vano' preserva el valor nominal del término y permite una lectura sobria y natural; el inglés POB optó por la fluidez adverbial 'in vain', pero en español aquí se mantiene mejor la concreción del objeto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que pasó de 'plot what is empty' a 'plot in vain' por mayor naturalidad. En español, 'traman lo vano' conserva la fuerza del sustantivo רִיק sin forzar una adverbialidad que perdería el matiz nominal del hebreo.
  spanish_consistency_notes:
  - Se usó 'naciones' y 'pueblos' para reproducir el paralelismo hebreo distinguible, sin introducir 'gentiles'.
  - Se evitó 'SEÑOR' u այլ sustituciones teológicas porque el versículo no contiene el nombre divino.
  - '''Lo vano'' mantiene el sentido de futilidad/vanidad del sustantivo רִיק y deja visible la tensión entre traducción nominal y lectura idiomática.'
