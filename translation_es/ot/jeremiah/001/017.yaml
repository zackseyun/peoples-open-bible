translation:
  language: es
  text: Pero tú[a], cíñete los lomos, levántate y háblales todo lo que yo te mando. No te desalientes delante de ellos, no sea que yo te desaliente delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «cíñete los lomos», es decir, prepárate para actuar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - En cuanto a ti
  lexicon: HALOT
  rationale: La conjunción con el pronombre marca contraste y transición fuerte desde la comisión anterior; en español, «Pero tú» comunica mejor ese giro discursivo que un simple «Y tú».
- source_word: תֶּאְזֹר מָתְנֶיךָ
  english_pob_choice: gird up your loins
  chosen_spanish: cíñete los lomos
  alternatives_spanish:
  - prepárate para actuar
  - recógete la ropa
  lexicon: HALOT
  rationale: Mantiene el modismo corporal hebreo con tono solemne y profético. «Cíñete los lomos» es idiomático en español bíblico y conserva la imagen de preparación para la acción.
- source_word: וְקַמְתָּ
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - ponte en pie
  - alza
  lexicon: HALOT
  rationale: El sentido es ponerse en pie para cumplir la comisión. «Levántate» suena natural y conserva la secuencia imperativa elevada del contexto.
- source_word: וְדִבַּרְתָּ אֲלֵיהֶם
  english_pob_choice: speak to them
  chosen_spanish: habla a ellos
  alternatives_spanish:
  - háblales
  - declara a ellos
  lexicon: HALOT
  rationale: El verbo דבר con אל pide una traducción directa de habla; se prefiere «habla a ellos» para mantener la transparencia de la estructura verbal y el destinatario explícito.
- source_word: אֵת כָּל אֲשֶׁר אָנֹכִי אֲצַוֶּךָּ
  english_pob_choice: all that I command you
  chosen_spanish: todo lo que yo te mande
  alternatives_spanish:
  - todo lo que yo te ordene
  - todo cuanto yo te mande
  lexicon: HALOT
  rationale: En español, la forma futura/subjuntiva «mande» transmite bien la comisión continua y encaja con el mandato divino. «Todo lo que» conserva la exhaustividad del hebreo.
- source_word: אַל תֵּחַת
  english_pob_choice: Do not be dismayed
  chosen_spanish: No te desalientes
  alternatives_spanish:
  - No te desmayes
  - No temas
  - No te intimides
  lexicon: HALOT
  rationale: חתת expresa quebranto, abatimiento o quedar intimidado. «Desalientes» comunica esa pérdida de ánimo en español contemporáneo, aunque «dismayed» del inglés POB queda reflejado como una tensión semántica entre abatimiento e intimidación.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  - por causa de ellos
  lexicon: HALOT
  rationale: La locución conserva el matiz espacial y confrontativo del hebreo («desde delante de ellos»). «Delante de ellos» es natural en español y mantiene el paralelismo del versículo.
- source_word: פֶּן אֲחִתְּךָ
  english_pob_choice: lest I dismay you
  chosen_spanish: no sea que yo te desaliente
  alternatives_spanish:
  - no sea que yo te intimide
  - o yo te desaliente
  - no sea que yo te quebrante
  lexicon: HALOT
  rationale: Se conserva la relación léxica con el verbo anterior mediante «desaliente», procurando reflejar el juego de palabras del hebreo entre el estado del profeta y la acción divina de abatirlo/intimidarlo. Se evita «o yo te...» para respetar la fuerza de amenaza preventiva de «no sea que».
theological_decisions:
- issue: Conservar el juego de palabras entre el temor del profeta y la acción divina de abatir/intimidar
  english_pob_reading: Do not be dismayed before them, lest I dismay you before them.
  chosen_spanish_reading: No te desalientes delante de ellos, no sea que yo te desaliente delante de ellos.
  alternative_spanish_readings:
  - No te intimides delante de ellos, no sea que yo te intimide delante de ellos.
  - No te desmayes delante de ellos, no sea que yo te desmaye delante de ellos.
  rationale: El hebreo repite la misma raíz en forma distinta para crear una advertencia retórica. «Desalientes» en ambos miembros preserva la repetición y la relación entre el temor humano y la acción disciplinaria de Dios, sin suavizar la advertencia.
  doctrine_reference: Lexical-theological fidelity; rhetorical wordplay in prophetic commission.
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje hebreo de Jeremías 1:17 y el archivo de auditoría en inglés POB. Se preserva el imperativo corporal («cíñete los lomos») y la advertencia con repetición verbal, sin normalizarla a una paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando aparece el nombre divino; aquí el versículo no lo contiene.
  - Se evita «Cristo» y otro vocabulario no pertinente al pasaje.
  - Se mantiene la repetición de «desaliente» para reflejar el eco léxico del hebreo.
  - La secuencia verbal se presenta en estilo bíblico natural para español, sin perder la estructura de comisión directa.
