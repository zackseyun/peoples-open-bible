    issue: «fue derribado» para ἐπλήγη
    rationale: Aunque intenta reflejar ‘was struck down’, en español puede sugerir que alguien lo tumbó físicamente o lo depuso. «Fue herido» o «quedó gravemente herido/afligido» preserva mejor la pasiva y la aflicción repentina sin añadir causa.
  - severity: medium
    issue: «su boca fue cerrada» para ἀπεφράγη τὸ στόμα αὐτοῦ
    rationale: El griego expresa una boca ‘bloqueada/tapada’, no solo cerrada. «Fue cerrada» pierde la viveza física que explica la imposibilidad de hablar.
  - severity: low
    issue: «hablar palabra» suena poco natural
    rationale: Es comprensible, pero «pronunciar palabra» o «decir una palabra» es más idiomático en español culto y conserva la fuerza de λαλῆσαι λόγον.
