lexical_decisions:
- source_word: הֵיטִיבָה
  english_pob_choice: do good
  chosen_spanish: haz bien
  alternatives_spanish:
  - haz el bien
  - sé bueno con
  - favorece
  lexicon: HALOT
  rationale: El hebreo expresa una petición de acción benéfica dirigida a Dios. «Haz bien» conserva la fuerza verbal y la naturalidad del ruego en español, sin volverlo una paráfrasis más abstracta.
- source_word: בִּרְצוֹנְךָ
  english_pob_choice: in your good pleasure
  chosen_spanish: en tu buena voluntad
  alternatives_spanish:
  - en tu favor
  - según tu voluntad
  - por tu favor
  lexicon: HALOT
  rationale: 'רָצוֹן puede referirse a favor, benevolencia o voluntad. «Buena voluntad» mantiene esa doble resonancia: disposición favorable y voluntad benevolente, sin reducir el término a una sola idea.'
- source_word: אֶת צִיּוֹן
  english_pob_choice: to Zion
  chosen_spanish: a Sion
  alternatives_spanish:
  - para Sion
  - sobre Sion
  lexicon: HALOT
  rationale: El marcador de objeto directo señala a Sion como beneficiaria de la acción pedida. En español, «hacer bien a» expresa de forma idiomática esa relación.
- source_word: תִּבְנֶה
  english_pob_choice: build up
  chosen_spanish: edifica
  alternatives_spanish:
  - edifica de nuevo
  - reconstruye
  - levanta
  lexicon: HALOT
  rationale: El verbo puede llevar un matiz de construcción o restauración, pero el contexto no obliga a explicitar «reconstruir». «Edifica» conserva el sentido básico y deja abierta la posible implicación restauradora.
- source_word: חוֹמוֹת
  english_pob_choice: walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  - las fortificaciones
  lexicon: HALOT
  rationale: «Muros» es claro y concreto en español. «Murallas» también sería posible, pero «muros» sigue de cerca el referente del término hebreo sin ampliar demasiado el concepto.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio tradicional y plenamente inteligible en español.
theological_decisions:
- issue: Relación entre benevolencia divina y restauración de Sion/Jerusalén
  english_pob_reading: The verse is rendered as a prayer that God's favorable disposition result in tangible blessing for Zion and Jerusalem.
  chosen_spanish_reading: La traducción presenta una súplica en la que la benevolencia de Dios se expresa en el bien hecho a Sion y en la edificación de Jerusalén.
  alternative_spanish_readings:
  - «según tu voluntad» como lectura más volitiva
  - «con tu favor» como lectura más explícita de benevolencia
  rationale: El hebreo רָצוֹן admite tanto favor como voluntad. Se preserva esa tensión con «buena voluntad», evitando resolverla de manera unilateral y manteniendo el carácter orante y covenantal del texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence.'
translation_notes:
  revision_awareness: 'Consulta del pasaje hebreo (WLC) y del rastro de auditoría en inglés: alta concordancia, sin revisiones aplicadas en el registro más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Sion» como transliteración tradicional y «Jerusalén» como nombre propio estándar.
  - Se evita forzar «reconstruye» porque el hebreo permite, pero no exige, un matiz explícito de restauración.
