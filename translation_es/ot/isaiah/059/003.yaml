translation:
  language: es
  text: Porque sus manos están contaminadas[a] con sangre, y sus dedos con iniquidad; sus labios han hablado falsedad, su lengua murmura injusticia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están manchadas de sangre». El hebreo expresa contaminación moral o ritual, no solo una mancha física.
    reason: lexical_alternative
  - marker: b
    text: O «pronuncia injusticia» o «expresa injusticia». El hebreo puede significar «murmurar», «mascullar» o más ampliamente «proferir».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del reproche previo. «Porque» conserva la fuerza causal de כִּי con español natural y solemne.
- source_word: כַפֵּיכֶם
  english_pob_choice: your hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  - sus manos/palmas
  lexicon: HALOT
  rationale: Aunque el hebreo es más específico y puede aludir a las palmas, la revisión inglesa optó por «hands» por naturalidad. En español, «manos» mantiene la imagen corporal y la fluidez; «palmas» sería más literal pero menos idiomático aquí.
- source_word: נְגֹאֲלוּ
  english_pob_choice: are defiled
  chosen_spanish: están manchadas
  alternatives_spanish:
  - están contaminadas
  - están profanadas
  lexicon: HALOT
  rationale: El verbo expresa contaminación moral/ritual más que simple coloración física. «Manchadas» comunica bien la suciedad visible y la carga moral; en nota se deja abierta la alternativa de «defiled» sin imponer un tecnicismo excesivo.
- source_word: בַּדָּם
  english_pob_choice: with blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - con sangre
  - en sangre
  lexicon: HALOT
  rationale: «De sangre» suena natural en español con «manchadas», y conserva la idea de sangre como la materia de la mancha. «Con sangre» también sería posible, pero menos idiomático con esta construcción.
- source_word: וְאֶצְבְּעוֹתֵיכֶם
  english_pob_choice: and your fingers
  chosen_spanish: y sus dedos
  alternatives_spanish:
  - y sus dedos de la mano
  lexicon: HALOT
  rationale: Se conserva la concreción del paralelismo con «manos»; no hay necesidad de generalizar ni de añadir aclaraciones.
- source_word: בֶּעָוֹן
  english_pob_choice: with iniquity
  chosen_spanish: de iniquidad
  alternatives_spanish:
  - de culpa
  - de maldad
  lexicon: HALOT
  rationale: «עָוֹן» puede implicar iniquidad, culpa o la carga de la culpa. «Iniquidad» mantiene el peso ético y coincide con la tradición léxica del texto sin borrar su fuerza forense.
- source_word: שִׂפְתֽוֹתֵיכֶם
  english_pob_choice: your lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - sus labios
  lexicon: HALOT
  rationale: Se retiene el órgano de la palabra para preservar el paralelismo poético y la acusación concreta.
- source_word: דִּבְּרוּ
  english_pob_choice: have spoken
  chosen_spanish: han hablado
  alternatives_spanish:
  - hablaron
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte naturalmente con presente perfecto en español para expresar un acto ya realizado con relevancia presente.
- source_word: שֶׁקֶר
  english_pob_choice: falsehood
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: El término abarca la mentira o falsedad. «Mentira» es claro y directo en español; «falsedad» sería más formal, pero aquí la acusación profética gana fuerza con un término sencillo.
- source_word: לְשׁוֹנְכֶם
  english_pob_choice: your tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  lexicon: HALOT
  rationale: Se conserva la personificación del órgano del habla. La revisión inglesa usó singular «tongue»; el español singular mantiene la imagen y evita una redundancia innecesaria.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - torcedura
  lexicon: HALOT
  rationale: «Injusticia» corresponde bien al campo semántico de עַוְלָה y conserva la dimensión ética y social de la denuncia.
- source_word: תֶהְגֶּה
  english_pob_choice: mutters
  chosen_spanish: murmura
  alternatives_spanish:
  - murmura
  - pronuncia en voz baja
  - medita
  lexicon: HALOT
  rationale: El verbo puede significar murmurar, mascullar o utter en voz baja. «Murmura» preserva el tono sonoro y continuo del hebreo sin adoptar el sentido engañosamente positivo de «medita».
theological_decisions:
- issue: Tensión entre contaminación ritual y culpa moral en «נְגֹאֲלוּ»
  english_pob_reading: are defiled
  chosen_spanish_reading: están manchadas
  alternative_spanish_readings:
  - están contaminadas
  - están profanadas
  rationale: El hebreo permite una mezcla de contaminación ritual y suciedad moral. «Manchadas» deja ver la imagen concreta de sangre y a la vez la implicación ética, sin reducirla a una sola categoría doctrinal.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Conservación del paralelismo de acusación moral en varias palabras distintas
  english_pob_reading: blood / iniquity / falsehood / injustice
  chosen_spanish_reading: sangre / iniquidad / mentira / injusticia
  alternative_spanish_readings:
  - sangre / culpa / falsedad / maldad
  - sangre / pecado / engaño / perversidad
  rationale: La versión debe mantener las distinciones léxicas del hebreo y no fusionarlas en un solo campo moral. Por eso se conservan cuatro términos diferenciados en español, cada uno con su matiz.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «hands» en lugar de «palms» por naturalidad. En español se siguió esa misma decisión subyacente con «manos», aunque el hebreo siga siendo más específico. También se mantuvo la distinción entre los distintos vocablos de pecado/culpa y el valor verbal de תֶהְגֶּה como murmullo o habla baja.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo requiere explícitamente; este verso no lo contiene.
  - Se mantiene el registro profético sobrio y directo, evitando palabras eclesiásticas innecesariamente tradicionales cuando oscurecerían el paralelismo.
  - «Iniquidad» se conserva para עָוֹן por coherencia con el campo semántico moral/forense del contexto.
  - La acusación corporal (manos, dedos, labios, lengua) se preserva sin abstraerla a términos genéricos.
