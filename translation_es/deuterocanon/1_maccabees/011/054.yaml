  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. La decisión de usar «diadema» para διάδημα está bien documentada y es defendible en español. «Llegó a ser rey» refleja adecuadamente la decisión ingresiva del audit trail. La única desalineación real está en la nota b, que debería explicar la alternativa «corona» o la literalidad del griego con mayor precisión, no repetir exactamente el texto principal.
