revisions:
- from: 'Pero como todavía no había vuelto[a], le dijo: «Vuelve a Gedalías hijo de Ahicam, hijo de Safán, a quien el rey de Babilonia ha puesto sobre las ciudades de Judá, y vive con él entre el pueblo; o ve adonde te parezca recto ir». Entonces el capitán de la guardia le dio provisiones[b] y un presente[c], y lo despidió.'
  to: 'Pero como todavía no había vuelto[a], le dijo: «Vuelve a Gedalías hijo de Ahicam, hijo de Safán, a quien el rey de Babilonia ha puesto sobre las ciudades de Judá, y vive con él entre el pueblo; o ve adonde te parezca bien ir». Entonces el capitán de la guardia le dio provisiones[b] y un presente[c], y lo dejó ir.'
  rationale: 'Se conservó la estructura y las decisiones del borrador, pero se repararon dos puntos menores: (1) «te parezca bien ir» expresa de manera natural el modismo hebreo ‘lo recto en tus ojos’ sin sonar forzado; (2) «lo dejó ir» representa mejor ‘lo envió/sent him away’ en contexto de liberación que «lo despidió». No se requieren cambios doctrinales ni una relectura de fondo.'
