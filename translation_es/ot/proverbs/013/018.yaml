  text: רֵ֣ישׁ וְ֭/קָלוֹן פּוֹרֵ֣עַ מוּסָ֑ר וְ/שׁוֹמֵ֖ר תּוֹכַ֣חַת יְכֻבָּֽד׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/013/018.yaml
  text: Poverty and disgrace come to one who ignores discipline[b][a], but whoever heeds reproof will be honored.
  footnotes:
  - marker: a
    text: Or 'Poverty and shame are for one who neglects discipline.' The Hebrew participle can be rendered more formally as 'neglects' or 'casts off.'
    reason: lexical_alternative
  - marker: b
    text: '''Heeds'' is literally ''keeps'' or ''guards,'' meaning to pay careful attention to correction and retain it.'
    reason: lexical_alternative
