    text: O “de la compañía de los profetas” o “de los discípulos de los profetas”. La expresión hebrea dice literalmente “hijos de los profetas”, una fórmula común para un grupo profético.
    reason: lexical_alternative
  - marker: b
    text: O “por palabra de Yahvé” o “por mandato de Yahvé”. La frase hebrea puede expresar autorización o mandato divino.
    reason: lexical_alternative
