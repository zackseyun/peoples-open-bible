    rationale: La nota [a] debe explicar la alternativa léxica de עִלְעִין («costillas» / posible «colmillos»), no «Y mira». La nota [b] debe explicar la alternativa de לִשְׂטַר חַד («de un lado» / «sobre un costado»), no «Levántate».
  - severity: medium
    issue: La nota sobre «Levántate» introduce una alternativa no preservada por el POB inglés.
    rationale: El rastro inglés no documenta una nota para קוּמִי en este versículo; añadirla desplaza una nota importante del texto fuente auditado.
  - severity: low
