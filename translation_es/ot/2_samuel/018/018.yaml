translation:
  language: es
  text: 'Absalón había tomado y levantado para sí, durante su vida, la columna que está en el Valle del Rey, porque dijo: «No tengo hijo para conservar la memoria de mi nombre». Y llamó a la columna por su propio nombre, y hasta hoy se la llama Monumento de Absalón[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la mano de Absalón». Aquí «mano» es una expresión idiomática para un marcador memorial o monumento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַח
  english_pob_choice: had taken
  chosen_spanish: había tomado
  alternatives_spanish:
  - tomó
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja que la acción de tomar la piedra/columna antecede al resto de la secuencia narrativa. Mantiene la relación temporal del hebreo y del inglés POB.
- source_word: וַיַּצֶּב
  english_pob_choice: set up
  chosen_spanish: levantado
  alternatives_spanish:
  - erigido
  - puesto
  - levantó
  lexicon: HALOT
  rationale: Para un objeto con forma de columna o pilar, «levantar»/«erigir» comunica bien el acto de instalar un monumento. «Levantado» encaja con la frase verbal anterior y evita una repetición dura.
- source_word: בְחַיּוֹ
  english_pob_choice: in his lifetime
  chosen_spanish: en vida
  alternatives_spanish:
  - mientras vivía
  - durante su vida
  lexicon: HALOT
  rationale: «En vida» es una forma natural y breve en español para expresar que lo hizo estando aún vivo. Conserva el matiz idiomático sin añadir explicación.
- source_word: מַצֶּבֶת
  english_pob_choice: pillar
  chosen_spanish: la columna
  alternatives_spanish:
  - el pilar
  - la estela
  - el monumento
  lexicon: HALOT
  rationale: El término hebreo denota una piedra erguida, un pilar o estela. «Columna» es natural en español y mantiene la concreción física; el sentido memorial se desarrolla después en el nombre dado al objeto.
- source_word: בְּעֵמֶק הַמֶּלֶךְ
  english_pob_choice: in the Valley of the King
  chosen_spanish: en el Valle del Rey
  alternatives_spanish:
  - en el Valle del Rey
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar con mayúsculas. La traducción sigue de cerca el hebreo y resulta comprensible en español.
- source_word: בַּעֲבוּר הַזְכִּיר שְׁמִי
  english_pob_choice: to keep my name in remembrance
  chosen_spanish: para conservar la memoria de mi nombre
  alternatives_spanish:
  - para que mi nombre sea recordado
  - para mantener mi nombre en memoria
  lexicon: HALOT
  rationale: El infinitivo de זכר con esta construcción expresa finalidad memorial. «Conservar la memoria de mi nombre» preserva el valor de recuerdo/rememoración sin suavizar la fuerza del propósito.
- source_word: וַיִּקְרָא לַמַּצֶּבֶת עַל שְׁמוֹ
  english_pob_choice: he called the pillar by his own name
  chosen_spanish: llamó a la columna por su nombre
  alternatives_spanish:
  - la nombró con su propio nombre
  - la llamó por su nombre
  lexicon: HALOT
  rationale: La frase reproduce el giro idiomático de dar al monumento su propio nombre. «Por su nombre» mantiene la idea sin introducir una paráfrasis excesiva.
- source_word: וַיִּקָּרֵא לָהּ
  english_pob_choice: it is called
  chosen_spanish: se la llama
  alternatives_spanish:
  - se le llama
  - es llamada
  lexicon: HALOT
  rationale: El pasivo/reflexivo español expresa la permanencia del nombre vigente «hasta hoy». «Se la llama» suena natural con referencia a «la columna» y conserva el resultado presente.
- source_word: יַד אַבְשָׁלוֹם
  english_pob_choice: Absalom’s Monument
  chosen_spanish: Monumento de Absalón
  alternatives_spanish:
  - Pilar de Absalón
  - Memorial de Absalón
  - Mano de Absalón
  lexicon: HALOT
  rationale: El hebreo literalmente dice «mano de Absalón», pero en este contexto funciona como designación memorial. «Monumento de Absalón» comunica el sentido reconocido por la tradición de traducción POB; el literalismo se preserva en nota.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Fórmula temporal idiomática muy estable en español bíblico y plenamente inteligible.
translation_notes:
  revision_awareness: El texto base en inglés usa una construcción de pasado perfecto para la acción previa de Absalón, mantiene «Valley of the King» como nombre de lugar y traduce el remate idiomático «Absalom’s hand» por el sentido memorial. La versión española sigue esas decisiones, adaptando la secuencia temporal y la idiomaticidad a un registro natural sin perder el literal hebreo donde es relevante.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general, pero este versículo no lo contiene.
  - Se usa un tono narrativo bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Columna» y «monumento» distinguen el objeto físico de su nombre memorial, como en el audit trail inglés.
