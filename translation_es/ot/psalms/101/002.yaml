review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del POB inglés: atención deliberada al camino íntegro, preservación de la segunda persona ambigua en «¿cuándo vendrás a mí?», y la metáfora ética de «andar». Sin embargo, las notas no siguen fielmente la auditoría inglesa: falta una nota para la ambigüedad del sujeto implícito en «vendrás», y las notas actuales introducen alternativas no documentadas como eje principal mientras omiten la advertencia exegética clave.'
  spanish_quality_summary: El español es claro y natural, de registro digno y legible. «Andaré con integridad de corazón dentro de mi casa» funciona bien. El punto más mejorable es «Quiero prestar atención», que añade un matiz desiderativo más fuerte que el simple futuro volitivo del hebreo; «Prestaré atención» o «Pondré atención» sería más exacto. También conviene alinear las notas con el texto y evitar una nota [a] que comenta «camino intachable» cuando la nota inglesa correspondiente trata la cláusula siguiente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Intachable» para תמים es aceptable, aunque «íntegro»/«de integridad» también sería válido. «Andaré» preserva bien הלך. No aparecen términos sensibles del glosario principal. La principal desalineación está en la estructura de notas respecto del POB auditado, no en la terminología teológica.
  issues:
  - severity: medium
    issue: «Quiero prestar atención» sobretraduce אַשׂכילה
    rationale: El hebreo expresa una decisión/acción futura-volitiva, no necesariamente un deseo explícito. «Prestaré atención» preserva mejor el valor verbal y la cercanía con el POB inglés «I will give attention to».
  - severity: high
    issue: Falta la nota sobre el sujeto implícito de «¿cuándo vendrás a mí?»
    rationale: La auditoría inglesa considera significativa la ambigüedad del sujeto y la posibilidad de entenderlo como una dirección a Dios. Esa tensión textual debe preservarse también en las notas españolas.
  - severity: medium
    issue: Las notas [a] y [b] no corresponden a las mismas funciones exegéticas del POB inglés
    rationale: La nota [a] del borrador trata «camino intachable», pero en el POB inglés [a] comenta «when will you come to me?». La nota sobre alternativas léxicas de אַשׂכילה/דרך תמים debe existir, pero no en sustitución de la nota teológica clave.
  revised_spanish_text: Prestaré atención al camino intachable; ¿cuándo vendrás a mí?[a] Andaré con integridad de corazón dentro de mi casa[b].
  revised_footnotes:
  - marker: a
    text: 'El hebreo dice: «¿cuándo vendrás a mí?». El sujeto no está explícito; muchos entienden esto como una dirección a Dios.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Consideraré el camino de integridad» o «actuaré sabiamente en el camino intachable».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el verbo inicial para reflejar mejor el futuro volitivo hebreo sin añadir un matiz desiderativo innecesario. Se reordenan y corrigen las notas para alinearlas con la auditoría inglesa: una nota para la ambigüedad del sujeto en «vendrás» y otra para las alternativas léxicas de אַשׂכילה + בְּדֶרֶךְ תָּמִים. El resto del texto español es fiel, natural y doctrinalmente prudente.'
