  text: 'Para los hijos de José: para Efraín, Elisama hijo de Amihud; para Manasés, Gamaliel hijo de Pedahzur.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/בְנֵי יוֹסֵף
  english_pob_choice: For the sons of Joseph
  chosen_spanish: Para los hijos de José
  alternatives_spanish:
  - Para los descendientes de José
  - De los hijos de José
  lexicon: HALOT
  rationale: La preposición ל en esta lista censal marca la asignación de cada grupo, y en español se expresa con naturalidad como «para». בְנֵי se mantiene como «hijos» para conservar la forma genealógica del hebreo, mientras que «José» sigue la transliteración española usual del nombre propio.
- source_word: לְ/אֶפְרַיִם
  english_pob_choice: for Ephraim
  chosen_spanish: para Efraín
  alternatives_spanish:
  - para la tribu de Efraín
  - a Efraín
  lexicon: HALOT
  rationale: Se conserva el paralelismo del hebreo con la misma preposición de asignación. «Efraín» funciona como designación tribal en este contexto censal sin necesidad de añadir «tribu de», que sería explicativo más que traducido.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: convención onomástica española
  rationale: Se usa la forma española asentada «Elisama», que corresponde al mismo nombre personal transliterado. La adaptación evita una grafía menos natural en español sin alterar la identidad del nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación constructa se traduce con la fórmula genealógica directa «hijo de», que es natural en español y conserva el valor relacional del hebreo sin añadir artículo innecesario.
- source_word: עַמִּיהוּד
  english_pob_choice: Ammihud
  chosen_spanish: Amihud
  alternatives_spanish:
  - Ammihud
  lexicon: convención onomástica española
  rationale: Se adopta la forma española «Amihud», que reproduce el nombre propio con ortografía más habitual en castellano. No se traduce el significado del nombre, solo se translitera en forma naturalizada.
- source_word: לִ/מְנַשֶּׁה
  english_pob_choice: for Manasseh
  chosen_spanish: para Manasés
  alternatives_spanish:
  - para la tribu de Manasés
  - a Manasés
  lexicon: HALOT
  rationale: Se mantiene la misma preposición de asignación que en Efraín para conservar la estructura del original. «Manasés» se entiende aquí como designación tribal en el marco de la enumeración.
- source_word: גַּמְלִיאֵל
  english_pob_choice: Gamaliel
  chosen_spanish: Gamaliel
  lexicon: convención onomástica española
  rationale: Nombre propio conservado en su forma estándar en español, sin alteración de sentido.
- source_word: פְּדָהצוּר
  english_pob_choice: Pedahzur
  chosen_spanish: Pedasur
  alternatives_spanish:
  - Pedahzur
  lexicon: convención onomástica española
  rationale: Se usa «Pedasur», la forma española más fluida, para un nombre propio transliterado. La adaptación respeta la identidad del nombre sin sobrecargar la lectura con una grafía menos usual.
translation_notes:
  revision_awareness: El texto base en inglés y el control cruzado muestran alto acuerdo y no requieren revisión sustantiva; la única labor aquí es ajustar la expresión al español manteniendo la estructura enumerativa y los nombres propios en forma naturalizada.
  spanish_consistency_notes:
  - Se mantuvo «para» como equivalente de la ל repetida, porque en esta lista administrativa expresa asignación mejor que «de» o «a».
  - Se preservó el patrón «X hijo de Y» para reflejar la genealogía breve del hebreo.
  - Los nombres propios se presentaron en formas españolas habituales cuando existen, para favorecer lectura pública sin perder trazabilidad al original.
