translation:
  language: es
  text: Y en aquel mismo día, Yahvé sacó a los hijos de Israel de la tierra de Egipto según sus divisiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus huestes» o «con sus compañías». El hebreo puede subrayar las agrupaciones ordenadas de Israel al salir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el marco temporal del enunciado. En español, una conjunción simple mantiene la fluidez sin imponer una fórmula arcaica.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on that very day
  chosen_spanish: en aquel mismo día
  alternatives_spanish:
  - en este mismo día
  - en ese mismo día
  lexicon: HALOT
  rationale: La expresión intensifica la precisión temporal. «Aquel» conserva la perspectiva retrospectiva del relato y «mismo» reproduce el énfasis del hebreo.
- source_word: הוֹצִיא
  english_pob_choice: brought ... out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - condujo fuera
  lexicon: HALOT
  rationale: El hifil de יצא es causativo. «Sacó» es natural en español, breve y fiel al movimiento de salida del éxodo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» conforme al criterio del proyecto para יְהוָה, preservando el nombre propio en vez de sustituirlo por un título.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión familiar y corporativa del hebreo. «Hijos de Israel» refleja la forma original sin aplanarla a una etiqueta étnica general.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce אֶרֶץ de manera directa. En español, «de la tierra de Egipto» comunica el origen del éxodo con naturalidad.
- source_word: עַל צִבְאֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: según sus ejércitos
  alternatives_spanish:
  - conforme a sus escuadrones
  - según sus divisiones
  lexicon: HALOT
  rationale: צָבָא puede significar «ejército», «hueste» o una agrupación ordenada. Aquí el contexto del éxodo permite una referencia a sus formaciones/agrupamientos; se mantiene «ejércitos» para conservar la imaginería fuerte del término, con la relación introducida por «según».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton directamente. La traducción conserva el nombre propio revelado a Israel, siguiendo la terminología base del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: גֻּבְה/expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  rationale: Se preserva la filiación corporativa y pactal del hebreo sin reducirla a un etnónimo más genérico. La forma es masculina como en el original, pero funciona colectivamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que ajustó la relación de עַל צִבְאֹתָם a «according to their divisions» por ser más natural y precisa en este contexto. La versión española refleja ese mismo ajuste mediante «según sus ejércitos», manteniendo la noción de ordenamiento grupal sin forzar una lectura militar exclusiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conserva «los hijos de Israel» para alinear la expresión corporativa con el hebreo.
  - «Tierra de Egipto» mantiene explícito אֶרֶץ, evitando una simplificación a «Egipto» sin justificación textual.
  - El final del versículo admite una posible lectura de agrupaciones/huestes; se deja nota para no ocultar la tensión léxica.
