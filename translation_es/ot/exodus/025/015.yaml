translation:
  language: es
  text: Las varas permanecerán en los anillos del arca[a]; no se quitarán de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las varas estarán en los anillos del arca; no se quitarán de ella».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטַבְּעֹת
  english_pob_choice: in the rings
  chosen_spanish: en los anillos
  alternatives_spanish:
  - dentro de los anillos
  - en los aros
  lexicon: HALOT
  rationale: טַבַּעַת designa un anillo o aro. En español, "anillos" comunica con naturalidad la función de los aros de sujeción del arca; "en" conserva la relación espacial del hebreo y del inglés POB.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca sagrada
  - el cofre
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, אָרוֹן se refiere de manera específica al arca del pacto. "Arca" es el término bíblico claro y fiel; "cofre" sería demasiado genérico.
- source_word: יִהְיוּ
  english_pob_choice: shall remain
  chosen_spanish: permanecerán
  alternatives_spanish:
  - estarán
  - habrán de quedar
  lexicon: HALOT
  rationale: Aunque literalmente significa "ser/estar", aquí expresa estado continuo y permanencia de ubicación. "Permanecerán" reproduce bien ese matiz durativo y la idea de que no deben moverse.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los palos
  - los bastones
  - las pértigas
  lexicon: HALOT
  rationale: בַּדִּים son las piezas con que se cargaba el arca. "Varas" es bíblico y claro en español; "pértigas" suena más técnico, "palos" más coloquial. Evito "bastones" por posible asociación incorrecta.
- source_word: לֹא יָסֻרוּ
  english_pob_choice: they shall not be removed
  chosen_spanish: no se quitarán
  alternatives_spanish:
  - no serán retiradas
  - no saldrán
  lexicon: HALOT
  rationale: סוּר puede significar apartarse o ser removido. En español, "no se quitarán" expresa de forma natural la prohibición de retirarlas del arca, manteniendo la fuerza normativa del mandato.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de él
  - del arca
  lexicon: HALOT
  rationale: El sufijo remite al arca, sustantivo femenino en español. "De ella" evita repetición excesiva y preserva la referencia anafórica con concordancia natural.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y coincide con la auditable solución del POB en inglés. Mantiene la permanencia de las varas y la prohibición de retirarlas, sin suavizar el mandato. La única nota refleja la alternativa léxica documentada para יִהְיוּ / יָסֻרוּ.
  spanish_consistency_notes:
  - Se eligió "arca" para אָרוֹן por coherencia con el uso tabernacular bíblico.
  - Se prefirió "varas" sobre "bastones" o "pértigas" para mantener registro bíblico y claridad.
  - '"Permanecerán" conserva la idea de estado continuo mejor que un simple "serán".'
  - La nota [a] marca una alternativa de traducción válida, paralela a la nota inglesa del POB.
