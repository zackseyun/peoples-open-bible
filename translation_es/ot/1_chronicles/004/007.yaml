translation:
  language: es
  text: 'Y los hijos de Helá[a]: Zeret, Izhar[b] y Etnán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «Heleh» para el nombre de la madre, según la convención de transliteración.
    reason: lexical_alternative
  - marker: b
    text: En la fórmula genealógica hebrea, «hijos de» puede significar hijos directos o, más ampliamente, descendientes dentro de una línea familiar.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: Conserva la fórmula genealógica estándar בלי perder la conexión narrativa que aporta la conjunción inicial. «Hijos de» reproduce fielmente el hebreo בְנֵי en un contexto de linaje.
- source_word: חֶלְאָה
  english_pob_choice: Helah
  chosen_spanish: Helá
  alternatives_spanish:
  - Heleá
  - Hela
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se prefiere «Helá» para reflejar de forma natural la vocalización probable y mantener una forma legible en español.
- source_word: צֶרֶת
  english_pob_choice: Zereth
  chosen_spanish: Zeret
  alternatives_spanish:
  - Zéret
  - Zeret
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español no se necesita la terminación inglesa -th; «Zeret» conserva más directamente la forma hebrea.
- source_word: יצחר
  english_pob_choice: Izhar
  chosen_spanish: Izhar
  alternatives_spanish:
  - Jizar
  - Izar
  lexicon: HALOT
  rationale: Se mantiene la transliteración bíblica ya asentada en español y ampliamente reconocible. Aunque la grafía inglesa usa «Izhar», en español esta forma también es natural y fiel al nombre hebreo.
- source_word: וְ/אֶתְנָן
  english_pob_choice: and Ethnan
  chosen_spanish: y Etnán
  alternatives_spanish:
  - y Ethnan
  - y Etnan
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para respetar la acentuación natural de la palabra en español. La conjunción inicial se traduce con «y» de manera directa.
theological_decisions:
- issue: Fórmula genealógica «los hijos de»
  english_pob_reading: 'Hebrew genealogical formula: ''sons of'' may denote direct sons or more broadly descendants within a family line.'
  chosen_spanish_reading: '«Los hijos de» mantiene la ambigüedad genealógica del hebreo: puede referir a hijos directos o a descendientes del linaje.'
  alternative_spanish_readings:
  - «Los descendientes de»
  - «La descendencia de»
  rationale: El hebreo usa una fórmula familiar heredada que no exige especificar el grado exacto de descendencia. En español, «hijos» conserva el paralelismo con el texto fuente y la amplitud semántica del contexto genealógico.
  doctrine_reference: 1 Crónicas 4:7; uso genealógico del hebreo bíblico
translation_notes:
  revision_awareness: No se detectaron revisiones textuales relevantes en el expediente inglés; el texto base y la valoración de alta concordancia se conservaron sin cambios sustanciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente que requiera esa decisión.
  - Los nombres propios se transliteran sin traducir; se prefiere una forma española natural y publicable.
  - La puntuación reproduce el valor enumerativo del hebreo con dos puntos tras el nombre del linaje, como en el inglés auditado.
