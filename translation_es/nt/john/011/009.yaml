translation:
  language: es
  text: 'Jesús respondió[a]: «¿No hay doce horas en el día? Si alguien anda en el día, no tropieza[c][b], porque ve la luz de este mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doce horas del día».
    reason: lexical_alternative
  - marker: b
    text: La expresión «la luz de este mundo» puede tener una resonancia joánica más amplia sobre la iluminación divina, aunque aquí se deja como está.
    reason: cross_reference
  - marker: c
    text: 'El griego usa el singular representativo: «si alguien ... él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» conserva el verbo narrativo normal sin añadir matiz ajeno. «Contestó» es posible, pero «respondió» suena más neutral y directo en el relato.
- source_word: Οὐχὶ
  english_pob_choice: Are there not
  chosen_spanish: ¿No hay…?
  alternatives_spanish:
  - ¿Acaso no hay…?
  - ¿No son…?
  lexicon: BDAG
  rationale: La pregunta retórica queda bien en español con «¿No hay…?», que mantiene la expectativa de respuesta afirmativa y la naturalidad sintáctica.
- source_word: δώδεκα ὧραί εἰσιν τῆς ἡμέρας
  english_pob_choice: twelve hours in the day
  chosen_spanish: doce horas en el día
  alternatives_spanish:
  - doce horas del día
  - doce horas de luz del día
  lexicon: BDAG
  rationale: «En el día» sigue de cerca la construcción y mantiene el paralelismo con la cláusula siguiente. «Del día» también es posible, pero «en el día» resulta más transparente para la imagen de las horas de la luz diurna.
- source_word: ἐάν τις περιπατῇ
  english_pob_choice: If anyone walks
  chosen_spanish: Si alguien anda
  alternatives_spanish:
  - Si alguien camina
  - Si uno anda
  lexicon: BDAG
  rationale: «Anda» es un equivalente natural de περιπατέω en este contexto. «Camina» también sería válido, pero puede sonar más físico; aquí el verbo conserva mejor la idea general de conductarse o desplazarse.
- source_word: οὐ προσκόπτει
  english_pob_choice: he does not stumble
  chosen_spanish: no tropieza
  alternatives_spanish:
  - no se tropieza
  - no cae
  lexicon: BDAG
  rationale: «Tropieza» reproduce bien la imagen básica de προσκόπτω. Es más natural en español que «se tropieza» y evita intensificar el resultado con «cae».
- source_word: τὸ φῶς τοῦ κόσμου τούτου
  english_pob_choice: the light of this world
  chosen_spanish: la luz de este mundo
  alternatives_spanish:
  - la luz de este presente mundo
  - la luz de este mundo actual
  lexicon: BDAG
  rationale: Se conserva literalmente la expresión, porque el POB inglés mantiene la fórmula sin explicitar su alcance joánico. «Este mundo» es el giro más natural y fiel.
- source_word: βλέπει
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ve claramente
  - puede ver
  lexicon: BDAG
  rationale: «Ve» es la forma simple y exacta para βλέπει. No se añade «claramente» ni «puede» para no interpretar el matiz aspectual del griego.
theological_decisions:
- issue: Alcance simbólico de «la luz de este mundo» en Juan
  english_pob_reading: Retain the ordinary image in the main text without making the metaphor explicit
  chosen_spanish_reading: Mantener la imagen ordinaria en el texto principal sin explicitar el sentido metafórico
  alternative_spanish_readings:
  - Interpretar la frase como referencia directa a Jesús o a la guía divina
  - Añadir una glosa explicativa sobre la luz joánica
  rationale: El contexto joánico permite una resonancia teológica más amplia, pero el enunciado inmediato funciona como una comparación proverbial. La traducción preserva la expresión sin resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Referencia genérica singular en τις ... βλέπει
  english_pob_reading: Use 'anyone ... he'
  chosen_spanish_reading: Usar «si alguien ... ve / anda» con singular genérico implícito
  alternative_spanish_readings:
  - Si cualquiera anda en el día, no tropieza, porque él ve la luz de este mundo
  - Si alguien anda en el día, no tropieza, porque ellos ven la luz de este mundo
  rationale: El español natural permite un singular genérico sin repetir un pronombre masculino explícito. Así se conserva la fuerza representativa de τις sin forzar una marca adicional innecesaria.
  doctrine_reference: Precisión gramatical sin neutralización innecesaria.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el aparato auditado en inglés. No se introdujeron cambios respecto del último pase revisado; la redacción mantiene la equivalencia óptima y la reserva interpretativa sobre la luz joánica.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se conserva «la luz de este mundo» sin mayúsculas teológicas ni glosa interpretativa en el cuerpo del texto.
  - Se usa un singular genérico natural en español, con nota para reflejar el griego representativo.
  - La puntuación imita el registro bíblico moderno con comillas latinas y dos puntos narrativos.
