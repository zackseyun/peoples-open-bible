base_translation:
  language: en
  yaml_path: translation/ot/genesis/026/028.yaml
  text: And they said[a], “We have clearly seen that Yahweh has been with you. So we said, ‘Please let there be an oath between us, between you and us[b], and let us make a covenant with you.’”
  footnotes:
  - marker: a
    text: Or possibly “a curse-oath,” since the Hebrew term can denote an oath accompanied by an invoked curse for violation.
    reason: lexical_alternative
  - marker: b
    text: Or 'between us, between us and you'.
    reason: previous_rendering
