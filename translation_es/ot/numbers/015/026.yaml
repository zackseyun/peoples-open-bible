translation:
  language: es
  text: Y se le perdonará[a] a toda la congregación de los hijos de Israel, y también al extranjero residente[b] que reside entre ellos, porque para todo el pueblo se hizo por inadvertencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda la comunidad de los israelitas». El hebreo dice «la congregación de los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: «Extranjero residente» designa a un no israelita que vive entre Israel bajo las leyes y protecciones de la comunidad.
    reason: cultural_note
  - marker: c
    text: 'O: «porque todo el pueblo estuvo en error». La cláusula final en hebreo es breve y admite una formulación más literal de ese modo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִסְלַח
  english_pob_choice: shall be forgiven
  chosen_spanish: será perdonado
  alternatives_spanish:
  - y se le perdonará
  - y será concedido el perdón
  lexicon: HALOT
  rationale: El nifal de סלח expresa aquí perdón concedido de forma pasiva/impersonal. En español, "será perdonado" conserva esa pasividad y el resultado para la comunidad, sin forzar una construcción más explicativa que el hebreo.
- source_word: לְכָל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la comunidad de los israelitas
  - toda la congregación del pueblo de Israel
  lexicon: HALOT
  rationale: עֵדָה conserva su fuerza cultual y legal como "congregación". Se mantiene "hijos de Israel" para seguir el valor del hebreo y la preferencia del proyecto, sin neutralizar el término con un equivalente más general.
- source_word: וְלַגֵּר
  english_pob_choice: along with the sojourner
  chosen_spanish: y también el extranjero residente
  alternatives_spanish:
  - y también el forastero residente
  - y también el sojourner
  lexicon: HALOT
  rationale: גֵּר designa al extranjero residente integrado en la comunidad bajo sus leyes y protección. En español, "extranjero residente" comunica mejor esa categoría que "forastero"; se evita "forastero" por su posible sentido de visitante pasajero.
- source_word: הַגָּר בְּתוֹכָם
  english_pob_choice: who sojourns among them
  chosen_spanish: que reside entre ellos
  alternatives_spanish:
  - que mora entre ellos
  - que habita en medio de ellos
  lexicon: HALOT
  rationale: El participio de גור prolonga la idea del sustantivo גֵּר. La versión inglesa preserva el juego léxico con "sojourns"; en español, "reside entre ellos" expresa con naturalidad la residencia estable dentro de la comunidad, aunque no reproduce tan literalmente el cognado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la absolución. "Porque" es la forma más directa y natural en español para conservar el valor causal.
- source_word: לְכָל הָעָם
  english_pob_choice: for all the people
  chosen_spanish: para todo el pueblo
  alternatives_spanish:
  - por todo el pueblo
  - en todo el pueblo
  lexicon: HALOT
  rationale: La preposición לְ en este contexto se entiende en relación con la extensión corporativa del acto de inadvertencia. "Para todo el pueblo" reproduce la amplitud colectiva sin forzar una explicación excesiva dentro del cuerpo del verso.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: por inadvertencia
  alternatives_spanish:
  - sin intención
  - por error
  lexicon: HALOT
  rationale: שְׁגָגָה es un término legal para falta cometida sin intención. "Por inadvertencia" mantiene el matiz jurídico y distingue este caso de una culpa deliberada.
theological_decisions:
- issue: Alcance corporativo del perdón
  english_pob_reading: The verse states that forgiveness extends to the entire Israelite congregation and also to the resident sojourner when the offense is committed unintentionally.
  chosen_spanish_reading: El perdón se extiende a toda la congregación de Israel y también al extranjero residente que vive entre ellos, en el caso de una falta cometida por inadvertencia.
  alternative_spanish_readings:
  - El perdón se concede a toda la comunidad de Israel y al residente extranjero.
  - Toda la asamblea de Israel y el extranjero residente serán perdonados.
  rationale: El hebreo presenta una inclusión comunitaria amplia, no restringida étnicamente, y la traslada también al גֵּר. La redacción española conserva esa amplitud y el vínculo entre pertenencia comunitaria y provisión sacrificial para faltas no deliberadas.
  doctrine_reference: 'Números 15:26; filosofía de traducción POB: precisión legal y transparencia lexical'
- issue: Naturaleza de la infracción
  english_pob_reading: The final clause could be read more elliptically as 'for all the people were in error' rather than 'it was done unintentionally by all the people.'
  chosen_spanish_reading: porque para todo el pueblo fue hecho por inadvertencia
  alternative_spanish_readings:
  - porque todo el pueblo estuvo en error
  - porque el pueblo entero erró
  rationale: El hebreo es compacto y puede leerse de manera más literal como una referencia colectiva al error. Se conserva la ambigüedad legal principal con una expresión española que sigue siendo natural y no sobreinterpreta el sujeto implícito.
  doctrine_reference: Números 15:26; nota inglesa de lectura alternativa del final del verso
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo (WLC) y el audit trail inglés. Se conservó la estructura legal-cultual del versículo, la inclusión del גֵּר y la ambigüedad compacta de la última cláusula. Se ajustó la expresión del cognado גור a un español natural sin perder la referencia a residencia estable en medio de la comunidad.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma de referencia al nombre divino solo cuando aparezca explícitamente en el texto fuente; este verso no lo contiene.
  - Se mantuvo «hijos de Israel» por fidelidad al hebreo y consistencia con el proyecto.
  - Se evitó «SEÑOR» y «Cristo», no pertinentes en este versículo.
  - «Extranjero residente» se usa de forma consistente para גֵּר cuando el contexto legal requiere precisión comunitaria.
