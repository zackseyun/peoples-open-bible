translation:
  language: es
  text: Si tiene desde la edad de un mes hasta los cinco años, tu valuación[a] para el varón será de cinco siclos de plata, y para la hembra tu valuación será de tres siclos de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Valuación» traduce el término técnico del pasaje: una cantidad fijada por la ley para este tipo de voto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן־חֹדֶשׁ
  english_pob_choice: from a month old
  chosen_spanish: desde un mes de edad
  alternatives_spanish:
  - desde la edad de un mes
  - de un mes de edad
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático de edad, no una indicación de procedencia literal. «Desde un mes de edad» conserva el umbral legal con español natural y preciso.
- source_word: וְעַד בֶּן־חָמֵשׁ שָׁנִים
  english_pob_choice: up to five years old
  chosen_spanish: hasta cinco años
  alternatives_spanish:
  - hasta la edad de cinco años
  - y hasta cinco años de edad
  lexicon: HALOT
  rationale: El hebreo mantiene el mismo marco de edad; en español, «hasta cinco años» es claro y suficiente en un contexto legal, sin añadir información no presente.
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valuación
  alternatives_spanish:
  - tu valoración
  - tu avalúo
  - tu estimación
  lexicon: HALOT
  rationale: 'En Levítico 27 el término es técnico y legal: una valuación fija para un voto. «Valuación» preserva ese uso formal mejor que una palabra más interpretativa como «valoración».'
- source_word: הַזָּכָר
  english_pob_choice: the male
  chosen_spanish: el varón
  alternatives_spanish:
  - el macho
  - el sexo masculino
  - el masculino
  lexicon: HALOT
  rationale: El hebreo señala sexo biológico/clasificatorio. En español bíblico contemporáneo, «varón» comunica la categoría personal sin sonar tan zoológico como «macho».
- source_word: חֲמִשָּׁה שְׁקָלִים כָּסֶף
  english_pob_choice: five shekels of silver
  chosen_spanish: cinco siclos de plata
  alternatives_spanish:
  - cinco shekels de plata
  - cinco siclos de dinero
  lexicon: HALOT
  rationale: «Siclo» es el equivalente castellano asentado para la unidad monetaria; «plata» reproduce כָּסֶף como metal/dinero, no como adorno explicativo.
- source_word: וְלַנְּקֵבָה
  english_pob_choice: for the female
  chosen_spanish: y para la hembra
  alternatives_spanish:
  - y para la mujer
  - y para la femenina
  lexicon: HALOT
  rationale: El paralelo con הַזָּכָר exige una categoría sexual equivalente. «Hembra» mantiene la simetría terminológica del texto legal; «mujer» introduciría una posible edad/adultez no explícita en el hebreo.
- source_word: שְׁלֹשֶׁת שְׁקָלִים כָּסֶף
  english_pob_choice: three shekels of silver
  chosen_spanish: tres siclos de plata
  alternatives_spanish:
  - tres shekels de plata
  - tres siclos de dinero
  lexicon: HALOT
  rationale: Se mantiene la misma unidad y el mismo material monetario que en la cláusula anterior, conservando la precisión y la simetría legal del versículo.
theological_decisions:
- issue: Valor legal fijo en un pasaje de votos/consagración
  english_pob_reading: your valuation
  chosen_spanish_reading: tu valuación
  alternative_spanish_readings:
  - tu valoración
  - tu tasación
  rationale: No se suaviza el carácter normativo del pasaje. «Valuación» deja visible que se trata de una tasación reglada por la ley, no de un valor subjetivo o devocional.
  doctrine_reference: Levítico 27:1-8; 27:2-7 como marco de votos y valuaciones
translation_notes:
  revision_awareness: El texto inglés POB refleja una solución óptima sin notas y sin revisiones aplicadas; el hebreo confirma un rango de edad legal y dos categorías sexuales con montos fijos, por lo que no se requieren variantes textuales ni ajustes de sentido.
  spanish_consistency_notes:
  - Se mantuvo la terminología legal de Levítico 27 con «valuación», «siclos» y «plata».
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el nombre divino en el versículo.
  - «Varón/hembra» se eligieron por paralelismo y precisión clasificatoria en un contexto jurídico.
