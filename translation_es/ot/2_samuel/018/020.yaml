translation:
  language: es
  text: 'Joab le dijo: «Hoy no eres portador de noticias[a]. Llevarás noticias otro día, pero hoy no debes llevar noticias, porque el hijo del rey ha muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “portador de buenas noticias”. El término hebreo puede referirse a noticias o nuevas, a menudo favorables, pero aquí el contexto es la muerte del hijo del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ בְּשֹׂרָה
  english_pob_choice: a bearer of news
  chosen_spanish: portador de noticias
  alternatives_spanish:
  - mensajero de buenas noticias
  - portador de buenas nuevas
  - hombre de noticias
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente significa algo como ‘un hombre de noticia(s)’. El contexto inmediato es la muerte del hijo del rey, así que no conviene fijar ‘buenas noticias’ como si el contenido fuera favorable. ‘Portador de noticias’ conserva la fuerza léxica sin sobreespecificar lo que el contexto desmiente.
- source_word: וּבִשַּׂרְתָּ
  english_pob_choice: You may carry news
  chosen_spanish: podrás traer noticias
  alternatives_spanish:
  - podrás llevar noticias
  - puedes traer noticias
  - te será permitido traer noticias
  lexicon: HALOT
  rationale: El verbo aquí funciona con matiz de permiso o posibilidad en contraste con la prohibición del mismo versículo. ‘Podrás traer noticias’ reproduce esa idea de autorización futura de manera natural en español.
- source_word: תְבַשֵּׂר
  english_pob_choice: you must not carry news
  chosen_spanish: no traerás noticias
  alternatives_spanish:
  - no debes traer noticias
  - no podrás traer noticias
  - no has de traer noticias
  lexicon: HALOT
  rationale: La negación con valor de prohibición se vierte en español de forma directa. ‘No traerás noticias’ conserva el tono imperativo de Joab sin volverlo excesivamente explicativo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la prohibición. ‘Porque’ es claro y fiel al flujo argumental del hebreo.
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo del rey
  - el hijo real
  lexicon: HALOT
  rationale: Se conserva la relación posesiva del constructo hebreo con una forma natural en español. ‘El hijo del rey’ es transparente y evita introducir matices no presentes en el texto.
- source_word: מֵת
  english_pob_choice: is dead
  chosen_spanish: ha muerto
  alternatives_spanish:
  - está muerto
  - murió
  - ha fallecido
  lexicon: HALOT
  rationale: El hebreo presenta el estado resultante; en español, ‘ha muerto’ comunica con sobriedad ese hecho consumado sin añadir eufemismo ni enfriamiento estilístico.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: La repetición temporal del hebreo se mantiene con ‘hoy’, que es el equivalente más natural en español contemporáneo y conserva la inmediatez del contraste.
theological_decisions:
- issue: Valor de בְּשֹׂרָה en un contexto de muerte
  english_pob_reading: The term can denote news or tidings, often favorable, but here the context is the death of the king’s son.
  chosen_spanish_reading: portador de noticias, sin imponer ‘buenas’ al contenido
  alternative_spanish_readings:
  - portador de buenas noticias
  - mensajero de buenas nuevas
  - anunciador
  rationale: 'La tensión léxica debe quedar visible: la palabra puede sugerir noticia grata en otros contextos, pero aquí la noticia es funesta. Por eso la traducción evita normalizarla como ‘buenas noticias’ y deja abierta la ambigüedad contextual.'
  doctrine_reference: No aplica; decisión léxica contextual.
translation_notes:
  revision_awareness: La versión inglesa pasó de ‘a man of news’ a ‘a bearer of news’ para mayor naturalidad. La redacción española sigue esa revisión con ‘portador de noticias’, evitando cargar el sintagma con ‘buenas’ y preservando el contraste contextual del versículo. También se conserva la repetición del verbo de ‘traer noticias’ para reflejar la estructura del hebreo y del inglés auditado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se prefirió un español neutro y publicable, con tono formal sobrio.
  - ‘Noticias’ se usa de manera consistente para el juego de palabras del pasaje; la nota explica la alternativa ‘buenas noticias’ sin imponerla al texto principal.
