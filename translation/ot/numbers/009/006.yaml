theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Render as ritual uncleanness caused by contact with a human corpse, without importing moral defilement.
  alternative_readings:
  - Render more literally as 'unclean for the soul of a man'
  rationale: In Pentateuchal purity law, this phrase denotes ceremonial impurity associated with death, not necessarily personal sin. The translation should make the ritual sense clear and avoid theological overreading.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the text''s plain sense without importing doctrinal claims.'
