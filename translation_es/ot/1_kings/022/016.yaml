translation:
  language: es
  text: 'Entonces el rey le dijo[a]: «¿Cuántas veces debo hacerte jurar que no me digas más que la verdad en nombre de Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuántas veces tengo que ponerte bajo juramento…?». El verbo hebreo significa hacer que alguien jure o ponerlo bajo juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces» conserva esa secuencia en español con fluidez natural.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo definido, no un nombre propio. «El rey» es la correspondencia directa y natural.
- source_word: עַד כַּמֶּה פְעָמִים
  english_pob_choice: How many times
  chosen_spanish: ¿Cuántas veces?
  alternatives_spanish:
  - ¿Hasta cuántas veces?
  - ¿Con qué frecuencia?
  lexicon: HALOT
  rationale: La expresión transmite frustración por repetición; «¿Cuántas veces?» expresa bien la fuerza idiomática sin sonar forzada.
- source_word: מַשְׁבִּעֶךָ
  english_pob_choice: must I make you swear
  chosen_spanish: debo hacerte jurar
  alternatives_spanish:
  - debo ponerte bajo juramento
  - debo adjurarte
  lexicon: HALOT
  rationale: El hiphil de שׁבע implica hacer jurar o poner bajo juramento. «Hacerte jurar» conserva la fuerza legal/oath-setting y suena natural en español.
- source_word: אֲשֶׁר לֹא תְדַבֵּר אֵלַי
  english_pob_choice: that you tell me nothing but
  chosen_spanish: que no me digas nada sino
  alternatives_spanish:
  - que no me hables sino
  - que me digas solamente
  lexicon: HALOT
  rationale: El verbo דִּבֵּר admite «decir» en español en este contexto de comunicar información. «No me digas nada sino» reproduce la restricción del juramento con claridad.
- source_word: רַק אֱמֶת
  english_pob_choice: nothing but the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - solo la verdad
  - nada más que la verdad
  lexicon: HALOT
  rationale: «Nada sino la verdad» ya expresa la exclusividad de רַק; añadir «la verdad» completa de manera idiomática la frase en español.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - invocando el nombre de Yahvé
  lexicon: HALOT
  rationale: בְּשֵׁם indica autoridad/invocación. La directriz del proyecto pide «Yahvé» para יְהוָה, preservando el nombre divino en el texto principal.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto especifica «Yahvé» para יְהוָה en el texto principal, manteniendo visible el nombre pactual en lugar de sustituirlo por una forma de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «speak to me nothing but the truth» a «tell me nothing but the truth» por naturalidad; en español se optó por una solución equivalente y natural («no me digas nada sino la verdad») que conserva la restricción absoluta del hebreo y del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יְהוָה.
  - Se traduce el valor intensivo/oath-setting de מַשְׁבִּעֶךָ con «hacerte jurar», evitando una calca arcaizante.
  - «Nada sino la verdad» preserva la exclusividad de רַק אֱמֶת sin introducir una formulación eclesiástica ajena al hebreo.
  - El pronombre enclítico en «hacerte» y la construcción interrogativa mantienen naturalidad en español neutro latinoamericano.
