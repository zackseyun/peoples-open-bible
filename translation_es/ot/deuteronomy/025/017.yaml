translation:
  language: es
  text: Recuerda lo que Amalec te hizo en el camino, cuando saliste de Egipto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al salir de Egipto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Recuerda bien
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo qal de זכר pide una acción directa de memoria. «Recuerda» preserva el tono exhortativo y es natural en español bíblico contemporáneo sin perder fuerza.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: La combinación del marcador de objeto con el relativo introduce el contenido del recuerdo. «Lo que» es el equivalente español más natural y mantiene la referencia al hecho específico.
- source_word: עָשָׂה לְךָ
  english_pob_choice: did to you
  chosen_spanish: te hizo
  alternatives_spanish:
  - hizo contra ti
  - te hizo a ti
  lexicon: HALOT
  rationale: El verbo עשה con ל indica acción dirigida a Israel; en contexto hostil, «te hizo» reproduce la relación directa sin agregar una paráfrasis más interpretativa como «contra ti».
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: HALOT
  rationale: Se translitera el nombre propio al uso español habitual «Amalec», manteniendo la identificación bíblica reconocible para lectores en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - de camino
  lexicon: HALOT
  rationale: La expresión con ב + דרך señala el contexto del trayecto; «en el camino» es idiomático en español y conserva la referencia narrativa al desplazamiento de Israel.
- source_word: בְּצֵאתְכֶם
  english_pob_choice: when you came out
  chosen_spanish: cuando salían
  alternatives_spanish:
  - cuando ustedes salieron
  - al salir ustedes
  lexicon: HALOT
  rationale: El infinitivo constructo con ב aporta valor temporal. Se opta por una forma progresiva en tercera persona plural porque el sujeto implícito es Israel como colectivo, lo que suena más natural en español dentro del sintagma temporal.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: La preposición מן expresa origen; «de Egipto» sigue el sentido más directo y conciso, acorde con la revisión inglesa que prefirió «of Egypt» por naturalidad.
translation_notes:
  revision_awareness: El inglés POB pasó de «from Egypt» a «of Egypt» por naturalidad. En español se resolvió directamente con «de Egipto», manteniendo el valor de origen sin necesidad de una nota explicativa adicional en el cuerpo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas de ocultamiento porque el versículo no contiene el nombre divino.
  - Se usó la transliteración española estable «Amalec» para el nombre propio.
  - «Recuerda» conserva el imperativo singular y el tono de mandato covenantal.
  - La nota solo afecta la frase temporal de salida, siguiendo la alternativa que el inglés ya documentó.
