lexical_decisions:
- source_word: σκηνή
  english_pob_choice: dwelling place
  chosen_korean: 장막
  alternatives_korean:
  - 처소
  - 거처
  lexicon: BDAG
  rationale: 'σκηνή는 출애굽기의 광야 성막(LXX σκηνή)을 반향하며, 한국어 「장막」이 그 출애굽 신학적 무게를 보존한다.'
- source_word: σκηνώσει
  english_pob_choice: will dwell
  chosen_korean: 장막을 치시리니
  alternatives_korean:
  - 거하시리니
  - 거주하시리니
  lexicon: BDAG
  rationale: 'σκηνή와 동근동사이므로 한국어에서도 「장막을 치다」로 옮겨 어근 연결을 살린다.'
theological_decisions:
- issue: '21:3 σκηνώσει μετ'' αὐτῶν의 출애굽 장막 반향 보존'
  chosen_reading: '「그들과 함께 장막을 치시리니」 (σκηνή ↔ σκηνόω 동근어 보존)'
  alternative_readings:
  - '「그들과 함께 거하시리니」(거주 의미만 살림)'
  rationale: '헬라어 σκηνή(장막)와 σκηνόω(장막을 치다)는 한 어근으로, 본문은 의도적으로 출애굽기 25-40장의 광야 성막(LXX σκηνή) 신학을 종말의 새 예루살렘에 투영한다. 한국어에서 「장막」과 「장막을 치다」를 모두 보존하여 출애굽 반향을 살린다.'
  doctrine_reference: 'DOCTRINE.md: Preserve OT-NT typological echoes'
