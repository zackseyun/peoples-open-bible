translation:
  language: es
  text: Entonces tu luz despuntará como el alba, y tu sanidad[a] brotará pronto; tu rectitud[b] irá delante de ti, y la gloria de Yahvé será tu retaguardia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu recuperación» o «tu restauración» para «tu sanidad».
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia» o «tu vindicación» para «tu rectitud».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «la gloria del SEÑOR será tu retaguardia». El verbo hebreo puede entenderse más literalmente como «te recogerá por detrás» o «te reunirá desde atrás».
    reason: alternative_reading
lexical_decisions:
- source_word: יִבָּקַע
  english_pob_choice: will break forth
  chosen_spanish: despuntará
  alternatives_spanish:
  - brotará
  - irrumpirá
  - se abrirá paso
  lexicon: HALOT
  rationale: El nifal de בקע expresa abrirse, romperse o brotar con fuerza. En español, «despuntará» conserva la imagen de una salida repentina y visible de la luz sin sonar demasiado mecánico.
- source_word: כַּשַּׁחַר
  english_pob_choice: like the dawn
  chosen_spanish: como el alba
  alternatives_spanish:
  - como la aurora
  - como el amanecer
  - como el alba
  lexicon: HALOT
  rationale: שׁחר señala el alba/amanecer. «Como el alba» es natural en español y mantiene la comparación poética de surgimiento.
- source_word: אוֹרֶךָ
  english_pob_choice: your light
  chosen_spanish: tu luz
  alternatives_spanish:
  - tu claridad
  - tu resplandor
  lexicon: HALOT
  rationale: אוֹר es «luz». Se conserva el posesivo y el sustantivo básico sin introducir una paráfrasis más interpretativa.
- source_word: אֲרֻכָתְךָ
  english_pob_choice: your healing
  chosen_spanish: tu sanidad
  alternatives_spanish:
  - tu curación
  - tu recuperación
  - tu restauración
  lexicon: HALOT
  rationale: אֲרֻכָה puede abarcar sanidad, curación, recuperación o restauración. «Sanidad» mantiene amplitud semántica y funciona bien en registro bíblico en español; las alternativas quedan preservadas.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - velozmente
  - de inmediato
  lexicon: HALOT
  rationale: El adverbio indica prontitud. «Pronto» es breve, natural y suficientemente fiel al matiz de rapidez.
- source_word: תִצְמָח
  english_pob_choice: will spring up
  chosen_spanish: brotará
  alternatives_spanish:
  - crecerá
  - saldrá
  - emergerá
  lexicon: HALOT
  rationale: צמח conserva la imagen orgánica de brotar o crecer. «Brotará» reproduce bien esa metáfora vegetal aplicada a la sanidad.
- source_word: וְהָלַךְ לְפָנֶיךָ
  english_pob_choice: will go before you
  chosen_spanish: irá delante de ti
  alternatives_spanish:
  - caminará delante de ti
  - te precederá
  lexicon: HALOT
  rationale: הלך + לפני expresa ir delante, preceder. «Irá delante de ti» es claro, idiomático y conserva la idea de precedencia protectora o guía.
- source_word: צִדְקֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu vindicación
  - tu justicia
  lexicon: HALOT
  rationale: צדק puede ser justicia, rectitud o vindicación. En Isaías 58 el trasfondo social favorece «justicia», y el texto personifica esa cualidad como guía delante del lector.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé
  - la gloria de Yahveh
  lexicon: HALOT
  rationale: כבוד es «gloria» y יְהוָה se vierte como «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: יַאַסְפֶךָ
  english_pob_choice: will be your rear guard
  chosen_spanish: será tu retaguardia
  alternatives_spanish:
  - te recogerá por detrás
  - será tu guardia trasera
  - te cubrirá por la espalda
  lexicon: HALOT
  rationale: אַסף significa reunir/recoger, pero en este contexto la imagen es protectora desde atrás. «Retaguardia» comunica la función del verso en español sin perder la tensión entre el verbo hebreo y la interpretación idiomática.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton con el nombre propio divino «Yahvé», en lugar de ocultarlo con un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Sentido de צִדְקֶךָ en contexto profético-social
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu rectitud
  - tu vindicación
  rationale: Aunque el capítulo enfatiza la justicia social, el hebreo permite una noción más amplia de justicia/rectitud. «Tu justicia» conserva la fuerza ética y comunitaria del pasaje sin estrecharlo a un solo matiz.
  doctrine_reference: 'Isaías 58; Translation philosophy #3 (preservar tensiones semánticas relevantes)'
translation_notes:
  revision_awareness: 'La redacción sigue la lectura final del audit trail inglés para el último hemistiquio: una función protectora posterior expresada como «retaguardia», en vez de una paráfrasis más literal de «reunir por detrás». También se mantuvo la decisión revisada de traducir el Tetragrámaton directamente como nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - 'Se conservó el paralelismo poético: luz / sanidad / justicia / gloria.'
  - «Sanidad» mantiene la amplitud semántica de אֲרֻכָה sin limitarla a curación médica.
  - «Retaguardia» refleja la imagen protectora final y es más idiomática que una traducción demasiado literal del verbo aislado.
