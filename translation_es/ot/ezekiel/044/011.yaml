translation:
  language: es
  text: Pero serán ministros en mi santuario, encargados de la supervisión de las puertas del templo[a] y ministrando en el templo[b]. Ellos degollarán el holocausto y el sacrificio para el pueblo[c], y estarán delante de ellos para ministrarles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''las puertas de la casa''. En esta visión del templo, ''templo'' aclara el referente; o: ''con cargos'' o ''con deberes'' en las puertas del templo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la casa''; en esta visión del templo, ''templo'' aclara el referente.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''en favor del pueblo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתִים
  english_pob_choice: ministers / ministering
  chosen_spanish: ministros / ministrando
  alternatives_spanish:
  - sirvientes / sirviendo
  - siervos / sirviendo
  lexicon: HALOT
  rationale: El participio de שׁרת expresa servicio cultual. 'Ministros' conserva el matiz de servicio oficial en el santuario sin reducirlo al sentido general de 'servir', y 'ministrando' mantiene la coherencia verbal en español.
- source_word: פְּקֻדּוֹת
  english_pob_choice: having oversight
  chosen_spanish: con supervisión
  alternatives_spanish:
  - con cargos
  - con deberes
  - con responsabilidades
  lexicon: HALOT
  rationale: En este contexto, junto a 'las puertas', el término señala una función de vigilancia/encargo. 'Supervisión' comunica esa responsabilidad delegada de manera natural en español.
- source_word: שַׁעֲרֵי הַבַּיִת
  english_pob_choice: the gates of the temple
  chosen_spanish: las puertas de la casa
  alternatives_spanish:
  - las puertas del templo
  lexicon: HALOT
  rationale: Se mantiene 'la casa' para reflejar con más cercanía el hebreo del visionario, donde בַּיִת forma parte del lenguaje técnico del templo. El contexto cultual permite entenderlo sin necesidad de reemplazarlo por 'templo' en el texto principal.
- source_word: הַבָּיִת
  english_pob_choice: the temple
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Aunque la POB inglesa aclara 'temple' por contexto, en español 'la casa' conserva el vínculo con el término hebreo repetido y mantiene la unidad terminológica del verso; el contexto de visión del templo hace inteligible el referente.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio completamente quemado
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente cultual tradicional en español para עֹלָה y comunica la ofrenda completamente consumida por el fuego.'
- source_word: הַזֶּבַח
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la víctima
  - la ofrenda sacrificada
  lexicon: HALOT
  rationale: זבח es un término sacrificial amplio. 'Sacrificio' preserva ese alcance genérico sin restringirlo indebidamente a una especie concreta.
- source_word: לָעָם
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - en favor del pueblo
  - por el pueblo
  lexicon: HALOT
  rationale: La preposición ל expresa beneficio o referencia. 'Para el pueblo' es la opción más directa y natural en español.
- source_word: יַעַמְדוּ לִפְנֵיהֶם
  english_pob_choice: they shall stand before them
  chosen_spanish: estarán delante de ellos
  alternatives_spanish:
  - se presentarán ante ellos
  - permanecerán en su presencia
  lexicon: HALOT
  rationale: La frase hebrea conserva un sentido de presencia/atención. 'Estarán delante de ellos' reproduce el movimiento idiomático sin sobreinterpretar.
- source_word: לְשָׁרְתָם
  english_pob_choice: to minister to them
  chosen_spanish: para ministrarles
  alternatives_spanish:
  - para servirles
  lexicon: HALOT
  rationale: '''Ministrar'' mantiene la coherencia con מְשָׁרְתִים y con el campo léxico cultual, evitando diluir el tono técnico del pasaje.'
theological_decisions:
- issue: Función de los levitas apartados frente al acceso sacerdotal
  english_pob_reading: They are assigned subordinate temple service rather than priestly approach.
  chosen_spanish_reading: Se les asigna un servicio subordinado en la casa/santuario, no el acceso sacerdotal pleno.
  alternative_spanish_readings:
  - Ejercen un ministerio sacerdotal pleno
  - Quedan equiparados a los sacerdotes
  rationale: El contexto inmediato distingue a estos levitas de los sacerdotes que se acercan directamente a Yahvé. Las tareas descritas —supervisión de puertas, matanza de ofrendas y servicio ante el pueblo— son funciones auxiliares, no de acceso sacerdotal pleno.
  doctrine_reference: Ezequiel 44:10-16; distinción levítica-sacerdotal en el culto del templo
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo. No se detectaron revisiones aplicadas recientes; la opción española mantiene la distinción cultual entre servicio levítico y función sacerdotal, y conserva la repetición de בַּיִת como 'la casa' por fidelidad al léxico del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en el resto del proyecto; este versículo no contiene el tetragrámaton en la superficie del texto.
  - '''Ministrar'' y ''ministros'' se usan de forma consistente para שׁרת, siguiendo la preferencia cultual del POB inglés.'
  - '''Holocausto'' se usa para עֹלָה por ser el término sacrificial establecido en español.'
  - '''Sacrificio'' se deja en sentido genérico para זבח, sin estrecharlo a una sola clase de ofrenda.'
