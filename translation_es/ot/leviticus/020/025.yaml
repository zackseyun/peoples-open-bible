translation:
  language: es
  text: Así distinguirán entre el animal limpio y el impuro, y entre el ave impura y la limpia; y no se hagan detestables ustedes mismos[a] por el animal, ni por el ave, ni por todo lo que se arrastra sobre la tierra, que yo he apartado para ustedes como impuro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus almas» o «sus personas»; el modismo significa «ustedes mismos».'
    reason: lexical_alternative
  - marker: b
    text: O «se hagan abominables». El verbo hebreo pertenece al mismo campo semántico de «detestable» o «abominable», no al verbo usual para «hacerse impuro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדַּלְתֶּם
  english_pob_choice: So you shall distinguish
  chosen_spanish: Así distinguirán
  alternatives_spanish:
  - Y distinguirán
  - De modo que distinguirán
  lexicon: HALOT
  rationale: El hitpael/causativo de בדל expresa establecer o hacer una distinción. En español, «distinguir» comunica bien la acción normativa de separar categorías rituales sin añadir interpretación. «Así» refleja el enlace discursivo del contexto con naturalidad.
- source_word: בֵּין ... לַ
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... y no ...
  - entre ... de ...
  lexicon: HALOT
  rationale: La correlación hebrea de contraste se expresa de forma estándar en español con «entre ... y ...».
- source_word: הַבְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: Aquí el término es amplio y no se limita a ganado. «Animal» es la opción más clara y neutral en español contemporáneo.
- source_word: הַטְּהֹרָה / הַטָּמֵא / הַטְּמֵאָה / הַטָּהֹר
  english_pob_choice: clean / unclean
  chosen_spanish: limpio / impuro
  alternatives_spanish:
  - puro / impuro
  - limpio / inmundo
  lexicon: HALOT
  rationale: Para la categorización levítica, «limpio/impuro» conserva la distinción ritual. Se evita «inmundo» por su carga más fuerte en español y porque el par no apunta a suciedad física, sino a estado ritual. «Puro/impuro» es posible, pero menos idiomático en este marco.
- source_word: הָעוֹף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave alada
  lexicon: HALOT
  rationale: «Ave» es más amplio y solemne que «pájaro», y encaja mejor con el registro legal del texto. Mantiene la categoría zoológica sin reducirla innecesariamente.
- source_word: וְלֹא תְשַׁקְּצוּ
  english_pob_choice: you shall not make yourselves detestable
  chosen_spanish: no se volverán detestables
  alternatives_spanish:
  - no se harán abominables
  - no se contaminarán
  lexicon: HALOT
  rationale: El verbo שׁקץ pertenece al campo semántico de lo detestable/abominable. En español, una forma pronominal con «detestables» conserva el sentido reflexivo y evita confundirlo con טמא («impuro»), ya tratado en el verso. Se mantiene la tensión lexical del hebreo sin moralizarla.
- source_word: אֶת נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - sus personas
  - sus almas
  lexicon: HALOT
  rationale: El hebreo usa נפשׁ como referencia al sujeto entero. En español, el clítico refleja de manera natural la acción sobre la propia persona sin imponer una antropología dualista.
- source_word: בַּבְּהֵמָה וּבָעוֹף
  english_pob_choice: by animal or by bird
  chosen_spanish: por el animal, ni por el ave
  alternatives_spanish:
  - con el animal, ni con el ave
  - a través del animal, ni del ave
  lexicon: HALOT
  rationale: La preposición admite valor instrumental o causal; «por» funciona bien para expresar la mediación de aquello que los haría detestables. Se añade artículo definido para una construcción más natural y cercana al patrón del original.
- source_word: וּבְכֹל אֲשֶׁר תִּרְמֹשׂ הָאֲדָמָה
  english_pob_choice: or by anything that creeps on the ground
  chosen_spanish: ni por todo lo que se arrastra sobre la tierra
  alternatives_spanish:
  - ni por todo lo que repta sobre el suelo
  - ni por todo reptil de la tierra
  lexicon: HALOT
  rationale: רמשׂ describe moverse arrastrándose o cerca del suelo. «Se arrastra sobre la tierra» comunica bien la amplitud de la expresión sin restringirla a reptiles únicamente. «Tierra» conserva mejor el alcance del hebreo que «suelo».
- source_word: אֲשֶׁר הִבְדַּלְתִּי לָכֶם
  english_pob_choice: which I have set apart for you
  chosen_spanish: que yo he apartado para ustedes
  alternatives_spanish:
  - que he separado para ustedes
  - que yo he distinguido para ustedes
  lexicon: HALOT
  rationale: Se mantiene el valor de בדל como apartar/separar. «Apartado» es natural en español y conserva la idea de designación divina para Israel.
- source_word: לְטַמֵּא
  english_pob_choice: as unclean
  chosen_spanish: como impuro
  alternatives_spanish:
  - para impuro
  - como impuros
  lexicon: HALOT
  rationale: El infinitivo final expresa resultado o designación. «Como impuro» transmite el estado asignado por Dios con claridad y sin sobrecargar la frase.
theological_decisions:
- issue: Lenguaje ritual de limpio/impuro frente a una moralización del texto
  english_pob_reading: clean/unclean as covenantal purity categories
  chosen_spanish_reading: limpio/impuro como categorías rituales del pacto
  alternative_spanish_readings:
  - puro/impuro
  - limpio/inmundo
  rationale: El versículo trata de distinciones cultuales, no de pureza moral en sentido general. «Limpio/impuro» conserva el marco levítico y evita desplazar el texto hacia un uso moralizante o meramente higiénico.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sentido de נֶפֶשׁ en אֶת נַפְשֹׁתֵיכֶם
  english_pob_reading: refers to the persons themselves ('yourselves')
  chosen_spanish_reading: se refiere a la persona completa, expresada con forma reflexiva
  alternative_spanish_readings:
  - sus almas
  - ustedes mismos
  rationale: El hebreo usa נפשׁ para la persona entera. La forma reflexiva en español evita introducir una lectura dualista y mantiene la idiomaticidad del mandato.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que añadió artículos definidos en la segunda cláusula («the animal», «the bird»). En español se reflejó esa cercanía con artículos explícitos («el animal», «el ave») y se conservó la distinción entre el campo de טמא/טהור («impuro/limpio») y el de שׁקץ («detestables»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde el hebreo del versículo lo requiriera; aquí no aparece el tetragrámaton, así que no se añadió.
  - Se usó «impuro» para טמא y «detestables» para שׁקץ, preservando dos campos léxicos distintos que el verso mantiene separados.
  - «Ave» se prefirió por registro y amplitud semántica frente a «pájaro», que sería más coloquial.
