lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Pero si
  - Si en verdad
  lexicon: HALOT
  rationale: La partícula condicional introduce la invitación de Elihú a que Job responda; «Si» conserva la apertura condicional sin añadir matices no atestiguados.
- source_word: יֵשׁ מִלִּין
  english_pob_choice: you have words
  chosen_spanish: tienes palabras
  alternatives_spanish:
  - hay palabras
  - tienes algo que decir
  lexicon: HALOT
  rationale: El hebreo usa una construcción existencial con el sustantivo plural «palabras/expresiones». «Tienes palabras» reproduce bien el valor idiomático y mantiene la concreción léxica del original.
- source_word: הֲשִׁיבֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - replícame
  lexicon: HALOT
  rationale: El hifil de שוב aquí funciona como «responder, contestar». «Respóndeme» es natural en español y conserva la fuerza directa de la invitación.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - sigue hablando
  lexicon: HALOT
  rationale: El imperativo simple continúa la apelación a que Job exponga su caso. «Habla» suena directo y bíblicamente sobrio en español contemporáneo.
- source_word: חָפַצְתִּי
  english_pob_choice: I desire
  chosen_spanish: deseo
  alternatives_spanish:
  - me complazco en
  - quiero
  lexicon: HALOT
  rationale: Expresa voluntad o deseo deliberado; «deseo» preserva ese matiz mejor que una simple voluntad coloquial y encaja con el tono de Elihú.
- source_word: צַדְּקֶךָ
  english_pob_choice: to justify you
  chosen_spanish: justificártelo
  alternatives_spanish:
  - vindicarte
  - declararte justo
  lexicon: HALOT
  rationale: El verbo de צדק aquí puede entenderse como hacer justicia a Job, mostrarlo en lo correcto o vindicarlo. La forma reflexivo-dativa «justificártelo» intenta conservar la relación verbal con «justificar» y evitar una paráfrasis doctrinal demasiado amplia; se deja abierta la tensión semántica mediante la nota textual.
theological_decisions:
- issue: 'Valor de צַדְּקֶךָ: justificación, vindicación o declaración de rectitud'
  english_pob_reading: to justify you
  chosen_spanish_reading: justificártelo
  alternative_spanish_readings:
  - vindicarte
  - declararte justo
  rationale: El contexto no formula una doctrina paulina de justificación forense, sino la disposición de Elihú a presentar a Job como teniendo razón si pudiera responder. Mantener «justificar» preserva el vínculo léxico con צדק; se conservan alternativas para no borrar la tensión entre declarar justo y vindicar.
  doctrine_reference: Transparencia léxica POB; preservación de tensiones semánticas en términos de justicia/rectitud.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios aplicados; se mantiene la lectura base con una ligera adaptación al español para conservar el paralelismo verbal y la ambigüedad controlada de צַדְּקֶךָ.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones convencionales porque no aparece el tetragrámaton en este versículo.
  - Se prefirió un español directo y sobrio, acorde con el tono exhortativo del hebreo.
  - La nota conserva las alternativas semánticas relevantes para «justificar», «vindicar» y «declarar justo».
