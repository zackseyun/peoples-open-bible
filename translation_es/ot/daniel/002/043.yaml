translation:
  language: es
  text: Como viste el hierro mezclado con arcilla, se mezclarán con la simiente[a] de los hombres, pero no se mantendrán unidos, este con aquel[b], así como el hierro no se mezcla con la cerámica de barro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con semilla humana»; muchos intérpretes entienden esto como «se mezclarán por matrimonio», pero el arameo dice más literalmente «se mezclarán con la simiente del hombre».
    reason: lexical_alternative
  - marker: b
    text: O «uno con otro».
    reason: lexical_alternative
  - marker: c
    text: El término final también puede traducirse «arcilla» o «alfarería».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְזְלָא
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: El término arameo designa de manera directa el hierro; «hierro» conserva la imagen material de la estatua y coincide con la elección auditada del inglés POB.
- source_word: מְעָרַב
  english_pob_choice: mixed
  chosen_spanish: mezclado
  alternatives_spanish:
  - mezclado entre sí
  - mezclado con
  lexicon: HALOT
  rationale: El participio expresa mezcla real de materiales; «mezclado» es natural en español y mantiene la pasividad descriptiva del original.
- source_word: חֲסַף טִינָא
  english_pob_choice: clay
  chosen_spanish: arcilla
  alternatives_spanish:
  - barro
  - arcilla de alfarero
  lexicon: HALOT
  rationale: La expresión remite al material frágil asociado con la estatua. «Arcilla» conserva el valor básico del término y funciona bien en contraste con el hierro; el final del versículo se diferencia con «barro» para reflejar el matiz de חַסְפָּא como material de alfarería.
- source_word: מִתְעָרְבִין לֶהֱוֺן
  english_pob_choice: they will mix
  chosen_spanish: se mezclarán
  alternatives_spanish:
  - se mezclarán entre sí
  - se mezclarán ellos
  lexicon: HALOT
  rationale: El arameo permite una lectura medio-reflexiva; «se mezclarán» es el equivalente natural en español y conserva la fuerza verbal sin añadir una interpretación histórica específica.
- source_word: בִּזְרַע אֲנָשָׁא
  english_pob_choice: with the seed of men
  chosen_spanish: con la simiente de los hombres
  alternatives_spanish:
  - con la descendencia humana
  - con la semilla de los hombres
  lexicon: HALOT
  rationale: Se mantiene la imagen literal y algo oscura del original. «Simiente» preserva el eco bíblico de זֶרַע/זרע y «de los hombres» sigue la revisión auditada del inglés sin convertir la frase en una paráfrasis interpretativa como «intermarriage».
- source_word: דָּבְקִין
  english_pob_choice: hold together
  chosen_spanish: se mantendrán unidos
  alternatives_spanish:
  - se pegarán
  - se adherirán
  lexicon: HALOT
  rationale: El verbo puede denotar adherirse o pegarse; en este contexto estructural, «se mantendrán unidos» comunica la idea de cohesión material sin sonar forzado en español.
- source_word: דְּנָה עִם דְּנָה
  english_pob_choice: this one with that one
  chosen_spanish: este con aquel
  alternatives_spanish:
  - uno con otro
  - uno con el otro
  lexicon: HALOT
  rationale: La doble demostración subraya distinción entre las partes. «Este con aquel» conserva ese contraste y reproduce la tensión del original de modo más literal que una fórmula recíproca más suave.
- source_word: חַסְפָּא
  english_pob_choice: clay pottery
  chosen_spanish: barro
  alternatives_spanish:
  - barro cocido
  - alfarería
  - vajilla de barro
  lexicon: HALOT
  rationale: El término puede aludir a material de alfarería o a fragmento/cerámica. En español, «barro» comunica la fragilidad del contraste y evita introducir un tecnicismo que el contexto no exige; la nota conserva la alternativa más específica.
theological_decisions:
- issue: Ambigüedad de «se mezclarán con la simiente de los hombres»
  english_pob_reading: Retain the ambiguous wording without specifying the referent of 'they' or reducing the phrase to a single historical theory.
  chosen_spanish_reading: Mantener la frase ambigua sin identificar explícitamente a los sujetos ni convertirla en una teoría histórica concreta.
  alternative_spanish_readings:
  - se casarán entre sí
  - se mezclarán con la humanidad
  - se mezclarán por intermarriage
  rationale: El arameo es difícil y ha generado interpretaciones diversas. La traducción española conserva la opacidad del texto en vez de resolverla con una glosa interpretativa, siguiendo la filosofía POB de preservar la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo/arameo de Daniel 2:43 junto con el audit trail inglés POB. Se respetó la revisión más reciente que aclaró el inglés a «the iron mixed with clay», «with the seed of men» y «clay pottery», pero en español se prefirió conservar la tensión del original con una solución idiomática y publicable. No se importó una interpretación concreta de la mezcla ni se suavizó la imagen de «simiente».
  spanish_consistency_notes:
  - Se mantiene Yahvé cuando aparezca el nombre divino; aquí no aplica.
  - «Simiente» se usa de manera intencional para preservar el eco de זֶרַע.
  - «Barro» y «arcilla» se distribuyen para reflejar el contraste entre חֲסַף טִינָא y חַסְפָּא sin forzar una sola equivalencia.
  - El texto evita «se casarán» o «intermarriage» porque eso resolvería una ambigüedad no resuelta por el arameo.
