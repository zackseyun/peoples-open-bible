    issue: «Despáchenme»/«Despáchennme» suena menos natural que una petición explícita de partida
    rationale: Aunque puede representar שַׁלְּחוּנִי, en este contexto «Déjenme partir» o «Envíenme» comunica con más claridad la idea de liberarlo para irse. Conviene una opción natural sin perder formalidad.
