translation:
  language: es
  text: Moisés habló a los hijos[a] de Israel conforme a todo lo que Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hijos de Israel' o 'los israelitas'. El hebreo dice 'los hijos de Israel', una designación pactual estándar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque el hebreo está formalmente en forma de 'decir', en español 'habló a' comunica mejor el acto de comunicar un discurso a un destinatario, como en la decisión inglesa 'spoke to'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional y su forma masculina plural, evitando neutralizarla. 'Hijos de Israel' es claro y más natural que un calco rígido de 'sons' en español.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La partícula prefijada כ expresa conformidad, no solo contenido; 'conforme a todo lo que' reproduce esa relación de ajuste de manera natural en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: El pluscuamperfecto español mantiene la secuencia previa de la orden divina respecto del habla de Moisés, como en la lectura inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se usa la forma española establecida para el nombre divino, preservando el Tetragrámaton como nombre propio y no como sustitución por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: En español, el verbo 'mandar' requiere normalmente la preposición 'a' para introducir la persona mandada; esto refleja la función del objeto directo marcado por אֶת sin perder naturalidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el nombre propio del pacto. En español POB se mantiene como Yahvé, evitando la sustitución por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Designación étnico-covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los israelitas
  rationale: Se conserva la fuerza formal masculina plural del hebreo, pero en una forma idiomática española comprensible y reverente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: no se incluyen notas al pie, por lo que no hay marcadores sin anclaje en el texto. La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo el nombre divino como Yahvé y la secuencia verbal del enunciado.'
  spanish_consistency_notes:
  - '''Moisés habló a'' reproduce bien el acto de comunicación sin añadir matices ausentes.'
  - '''Los hijos de Israel'' conserva la designación covenantal masculina del hebreo.'
  - '''Conforme a todo lo que'' refleja la relación de conformidad de כְּכֹל אֲשֶׁר.'
  - '''Había mandado'' preserva la anterioridad de la orden divina.'
  - '''Yahvé'' sigue el estándar POB en español para יְהוָה.'
