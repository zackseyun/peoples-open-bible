review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: חַנְפֵי לֵב se entiende correctamente como personas impías en su interior; יָשִׂימוּ אָף se transmite como acumulación interna de ira; לֹא יְשַׁוְּעוּ como clamor por auxilio; כִּי se toma temporalmente con alternativa causal en nota; y אֲסָרָם mantiene el sujeto singular implícito como «él». Sin embargo, la colocación de las notas en el texto español no corresponde a sus contenidos: [a] y [b] están ancladas a «ira», aunque una nota explica כִּי/«cuando» y la otra explica «los impíos de corazón».'
  spanish_quality_summary: El español es claro y digno, pero «almacenan ira» suena algo mecánico en registro bíblico; «acumulan ira» es más natural sin perder la imagen. También conviene reubicar las notas junto a las palabras que explican. El resto del verso es legible y fiel.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Impíos» para חנף es aceptable en este contexto de Job. «Él los ata» preserva adecuadamente el pronombre implícito. No intervienen términos sensibles como Yahvé, Mesías, δοῦλος, etc.
  issues:
  - severity: medium
    issue: Los marcadores de nota están anclados al lugar equivocado en el texto.
    rationale: La nota [a] trata la conjunción כִּי y la opción «porque», por lo que debe anclarse en «cuando»; la nota [b] explica «los impíos de corazón», no «ira». Tal como está, el lector español recibe una referencia confusa.
  - severity: low
    issue: «almacenan ira» suena menos natural que otras opciones españolas.
    rationale: Aunque no es incorrecto, «acumulan ira» comunica mejor en español general la idea de ir guardando o amontonando ira, manteniendo la fuerza del hebreo y la decisión inglesa «store up anger».
  - severity: low
    issue: La alternativa de nota «los impíos en el corazón» es poco idiomática.
    rationale: La evidencia inglesa ofrece «in heart», pero en español la alternativa más natural sería «los impíos en su corazón» o mejor mantener «de corazón». Dado que ya existe «los hipócritas de corazón», conviene ajustar la tercera opción para evitar torpeza.
  revised_spanish_text: Pero los impíos de corazón[b] acumulan ira; no claman por ayuda cuando[a] él los ata.
  revised_footnotes:
  - marker: a
    text: O «porque él los ata». El hebreo puede leerse de manera causal más que temporal.
    reason: alternative_reading
  - marker: b
    text: «Los impíos de corazón» también puede verterse «los hipócritas de corazón» o «los impíos en su corazón».
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor: se reubicaron los marcadores de nota para que correspondan a los elementos explicados por las notas, y se mejoró «almacenan ira» a «acumulan ira» por mayor naturalidad en español sin cambiar el sentido fuente. También se suavizó una alternativa de nota a una forma más idiomática.'
