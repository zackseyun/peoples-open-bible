translation:
  language: es
  text: ¿Quién ha quitado el frente de su vestidura? ¿Quién puede entrar dentro de su doble brida?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "¿Quién puede entrar en el pliegue de su brida?" La expresión hebrea es difícil; puede referirse metafóricamente a la boca de Leviatán, a sus mandíbulas o a una doble hilera de dientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גִלָּה
  english_pob_choice: stripped off
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha desnudado
  - ha arrancado
  - ha descubierto
  lexicon: HALOT
  rationale: El hebreo expresa quitar o descubrir con fuerza. En español, "ha quitado" comunica la acción de remover una cobertura externa sin forzar una imagen demasiado técnica o extraña.
- source_word: פְּנֵי לְבוּשׁוֹ
  english_pob_choice: the front of his garment
  chosen_spanish: la parte frontal de su vestidura
  alternatives_spanish:
  - el frente de su vestidura
  - la cara de su vestidura
  - la superficie de su cobertura
  lexicon: HALOT
  rationale: פְּנֵי es literalmente "rostro/cara/superficie de" y לְבוּשׁ es "vestidura/ropa". "Parte frontal" conserva la imagen concreta y evita interpretar prematuramente si se trata de piel, escamas o capa exterior.
- source_word: בְּכֶפֶל
  english_pob_choice: within his double
  chosen_spanish: en el pliegue
  alternatives_spanish:
  - dentro de su doble
  - en el doble de
  - en la doblez
  lexicon: HALOT
  rationale: כפל alude a dobladura, pliegue o duplicación. En español, "pliegue" mantiene la dificultad del hebreo y sugiere una forma doblada sin cerrar el sentido de manera excesiva.
- source_word: רִסְנוֹ
  english_pob_choice: bridle
  chosen_spanish: su brida
  alternatives_spanish:
  - su freno
  - su cabestro
  - su bocado
  lexicon: HALOT
  rationale: רסן normalmente significa "bridle" o "muzzle". "Brida" es un equivalente directo y digno en español, y permite conservar la metáfora animal aplicada a Leviatán.
- source_word: מִי יָבוֹא
  english_pob_choice: Who can come
  chosen_spanish: ¿Quién puede entrar?
  alternatives_spanish:
  - ¿Quién puede venir?
  - ¿Quién puede acercarse?
  - ¿Quién podrá entrar?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad o desafío. "Puede entrar" traduce bien la idea de capacidad, y en este contexto se integra con la imagen espacial del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la lectura auditada del POB inglés, preservando la dificultad de la imagen en lugar de resolverla de manera interpretativa. Se adopta una formulación española natural, pero con suficiente literalidad para mantener el paralelismo y la ambigüedad del original.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se prefiere "brida" como equivalente de רסן por coherencia con el campo semántico señalado en el audit trail.
  - '"Vestidura" mantiene un registro bíblico claro sin recurrir a una paráfrasis explicativa.'
  - La nota al pie conserva la alternativa de lectura porque el hebreo es difícil y el POB inglés también la preserva.
