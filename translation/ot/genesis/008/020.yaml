id: GEN.8.20
reference: Genesis 8:20
source:
  edition: WLC
  text: וַ/יִּ֥בֶן נֹ֛חַ מִזְבֵּ֖חַ לַֽ/יהוָ֑ה וַ/יִּקַּ֞ח מִ/כֹּ֣ל הַ/בְּהֵמָ֣ה הַ/טְּהוֹרָ֗ה וּ/מִ/כֹּל֙ הָ/ע֣וֹף הַ/טָּהֹ֔ר וַ/יַּ֥עַל עֹלֹ֖ת בַּ/מִּזְבֵּֽחַ׀׃
translation:
  text: Then Noah built an altar to Yahweh[a], and took some of every clean animal and of every clean bird[b], and offered burnt offerings on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'took from every clean animal and from every clean bird.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to the LORD'' renders the divine name YHWH; alternatively, ''to Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb בנה straightforwardly means 'build.' 'Built' is the natural English narrative equivalent.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the place of sacrifice. No contextual reason to vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated, preserving the covenant name convention in English Bible style.
- source_word: מִכֹּל
  chosen: some from every
  alternatives:
  - from every
  - out of every
  lexicon: HALOT
  rationale: With לקח ('took') and the following categories, the sense is not that Noah took every individual animal and bird onto the altar, but that he selected specimens from every clean kind/category represented. 'Some from every' makes explicit the partitive force natural in context while remaining faithful to the Hebrew construction.
- source_word: הַבְּהֵמָה
  chosen: animal
  alternatives:
  - livestock
  - beast
  lexicon: HALOT
  rationale: בהמה can denote domestic animals/beasts generally. 'Animal' is clear modern English and fits the broad category here without implying only herd animals.
- source_word: הַטְּהוֹרָה
  chosen: clean
  alternatives:
  - ceremonially clean
  lexicon: HALOT
  rationale: טהור here distinguishes ritually acceptable animals. 'Clean' is the established concise rendering; 'ceremonially clean' would over-specify in the main text.
- source_word: הָעוֹף
  chosen: bird
  alternatives:
  - fowl
  - flying creature
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures/birds; in this sacrificial context 'bird' is the most natural and sufficiently precise English rendering.
- source_word: וַיַּעַל
  chosen: offered
  alternatives:
  - caused to go up
  - brought up
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrificial objects idiomatically means to offer up on the altar. 'Offered' communicates the sacrificial action clearly in English.
- source_word: עֹלֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: עלה/עֹלָה refers to the burnt offering. The plural 'burnt offerings' is standard and clear; 'whole burnt offerings' is possible but less idiomatic in modern English.
- source_word: בַּמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: English idiom prefers 'on the altar' for sacrificial placement. This preserves the locative sense without archaism.
