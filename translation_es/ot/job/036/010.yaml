translation:
  language: es
  text: Él abre sus oídos[a] a la disciplina, y dice que deben apartarse[b] de la maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “su oído”; el hebreo usa el singular con sentido colectivo, que en español se expresa con naturalidad como “sus oídos”.
    reason: lexical_alternative
  - marker: b
    text: O “volverse”. El verbo hebreo expresa volverse atrás o regresar; en este contexto moral, “apartarse” comunica con claridad el sentido de dejar la maldad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֶל
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - descubre
  - desvela
  lexicon: HALOT
  rationale: גלה en este giro con 'oído' expresa la idea de abrir o descubrir para escuchar con receptividad. 'Abre' comunica bien la imagen idiomática en español sin forzar una paráfrasis.
- source_word: אָזְנָם
  english_pob_choice: their ear
  chosen_spanish: su oído
  alternatives_spanish:
  - sus oídos
  - su oreja
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo con sufijo plural. En español, 'su oído' mantiene mejor el carácter idiomático y natural de la expresión que un plural inevitable.
- source_word: לַמּוּסָר
  english_pob_choice: to discipline
  chosen_spanish: para la disciplina
  alternatives_spanish:
  - para la instrucción
  - para la corrección
  - para el castigo disciplinario
  lexicon: HALOT
  rationale: מוּסָר puede abarcar instrucción, corrección y disciplina. 'Disciplina' conserva la tensión entre enseñanza correctiva y formación sin volverlo excesivamente punitivo o meramente pedagógico.
- source_word: וַיֹּאמֶר
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - y declara
  - y les dice
  lexicon: HALOT
  rationale: אָמַר se traduce de forma directa y sobria con 'dice'. El contexto poético permite este presente narrativo sin añadir información no explícita.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido del discurso, no una causa; 'que' es el equivalente más natural en español.
- source_word: יְשֻׁבוּן
  english_pob_choice: they should turn back
  chosen_spanish: deben volver
  alternatives_spanish:
  - deberían volver
  - vuelvan
  - se vuelvan
  lexicon: HALOT
  rationale: שוב expresa volver/retornar. En discurso reportado, 'deben volver' comunica con claridad la llamada exhortativa sin exagerar el modo verbal más allá del hebreo.
- source_word: מֵאָוֶן
  english_pob_choice: from wickedness
  chosen_spanish: de la maldad
  alternatives_spanish:
  - de la iniquidad
  - de la maldad/iniquidad
  - del mal
  lexicon: HALOT
  rationale: אָוֶן puede significar iniquidad, maldad o aflicción/trouble según contexto. Aquí el sentido moral es dominante; 'maldad' resulta natural en español y preserva la fuerza ética del texto.
theological_decisions:
- issue: Alcance de מוּסָר en el marco del discurso de Eliú
  english_pob_reading: discipline as corrective instruction
  chosen_spanish_reading: disciplina como instrucción correctiva
  alternative_spanish_readings:
  - instrucción puramente pedagógica
  - corrección con énfasis más punitivo
  rationale: El versículo presenta a Dios abriendo el oído para escuchar y corregir. 'Disciplina' conserva la ambivalencia entre enseñanza y corrección, sin imponer una teoría concreta del sufrimiento.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor moral de אָוֶן
  english_pob_reading: wickedness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - iniquidad
  - malicia
  - maldad o iniquidad
  rationale: El audit trail inglés revisó 'iniquity' a 'wickedness' por mayor naturalidad. En español, 'maldad' conserva el sentido moral y la fluidez, sin perder el contraste con el llamado a volver.
  doctrine_reference: Revision awareness / lexical equivalence
translation_notes:
  revision_awareness: 'El texto inglés de POB pasó de ''iniquity'' a ''wickedness'' en la revisión más reciente. La versión española sigue esa decisión semántica con ''maldad'', y mantiene la estructura del versículo: abrir el oído para la disciplina y decir que deben volver de la maldad.'
  spanish_consistency_notes:
  - Se mantiene la metáfora corporal 'oído' para reflejar el hebreo singular colectivo.
  - '''Disciplina'' se usa de forma consistente con el valor correctivo/pedagógico de מוּסָר.'
  - '''Maldad'' evita un calco rígido de ''iniquidad'' y concuerda con la revisión inglesa.'
  - El presente 'dice' funciona como presente narrativo en poesía hebrea y es idiomático en español.
