translation:
  language: es
  text: Pero la mayoría de ellos, con ánimo noble, se fortalecieron y no se apartaron de la piedad[a] al cambiar sus posesiones por la vida, sino que, con valentía, se consideraban capaces de librarse de las listas de registro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se apartaron de su piedad al entregar sus bienes para conservar la vida».'
    reason: lexical_alternative
  - marker: b
    text: Las «listas de registro» son los registros oficiales de inscripción mencionados en el contexto, aparentemente usados para identificar a los judíos para las medidas opresivas del rey.
    reason: cultural_note
lexical_decisions:
- source_word: πλεῖστοι
  english_pob_choice: most of them
  chosen_spanish: la mayoría de ellos
  alternatives_spanish:
  - muchos de ellos
  - la mayor parte de ellos
  lexicon: LSJ
  rationale: El superlativo idiomático expresa al grupo mayoritario; en español, «la mayoría de ellos» conserva con naturalidad el contraste implícito con quienes quizá actuaron de otra manera.
- source_word: γενναίᾳ ψυχῇ
  english_pob_choice: with a noble spirit
  chosen_spanish: con ánimo noble
  alternatives_spanish:
  - con noble espíritu
  - con valiente ánimo
  lexicon: LSJ
  rationale: La dativa indica manera. ψυχή aquí apunta al temple interior o valor, no al alma en sentido metafísico; «ánimo noble» mantiene la cualidad moral de γενναίᾳ y suena natural en español.
- source_word: ἐνίσχυσαν
  english_pob_choice: took courage
  chosen_spanish: fortaleciéndose
  alternatives_spanish:
  - tomaron valor
  - se fortalecieron
  lexicon: LSJ
  rationale: En contexto el verbo describe una firmeza moral ante la presión. El participio en español comunica el proceso de afirmarse o fortalecerse interiormente mejor que una forma demasiado literal o rígida.
- source_word: οὐ διέστησαν τῆς εὐσεβείας
  english_pob_choice: did not abandon their piety
  chosen_spanish: no se apartaron de la piedad
  alternatives_spanish:
  - no abandonaron su piedad
  - no se separaron de la piedad
  lexicon: LSJ
  rationale: La construcción significa retirarse o separarse de algo. «No se apartaron de la piedad» conserva la imagen verbal y traduce εὐσέβεια como fidelidad reverente a Dios.
- source_word: τὰ τε χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι
  english_pob_choice: by exchanging their possessions for life
  chosen_spanish: al cambiar sus posesiones por la vida
  alternatives_spanish:
  - al trocar sus bienes para conservar la vida
  - intercambiando sus posesiones para seguir viviendo
  lexicon: LSJ
  rationale: 'El participio expresa el medio por el cual podrían haber cedido: entregar bienes para preservar la vida. «Posesiones» es más amplio que dinero y «por la vida» reproduce el valor final/purposivo del griego.'
- source_word: ἀδέως
  english_pob_choice: boldly
  chosen_spanish: con valentía
  alternatives_spanish:
  - sin temor
  - con audacia
  lexicon: LSJ
  rationale: El adverbio comunica confianza intrépida. «Con valentía» conserva el tono sin forzar un giro poco natural en español.
- source_word: ἐτιμῶντο
  english_pob_choice: counted themselves worthy
  chosen_spanish: se consideraban capaces
  alternatives_spanish:
  - se juzgaban aptos
  - se estimaban capaces
  lexicon: LSJ
  rationale: La voz media expresa su propia valoración. Dado el pasaje revisado del POB en inglés, «se consideraban capaces» sigue la evaluación implícita sin introducir la noción de mérito que el griego no exige.
- source_word: ἑαυτοὺς ῥύσασθαι ἐκ τῶν ἀπογραφῶν
  english_pob_choice: to save themselves from the registration lists
  chosen_spanish: salvarse de los registros de empadronamiento
  alternatives_spanish:
  - librarse de las listas de inscripción
  - escapar de los registros
  lexicon: LSJ
  rationale: ῥύσασθαι tiene el sentido de librar/rescatar/escapar. ἀπογραφαί son registros oficiales de inscripción; en este contexto aluden a listas usadas para identificar a los judíos, por eso «registros de empadronamiento» conserva la referencia administrativa y la función opresiva.
theological_decisions:
- issue: εὐσέβεια en un contexto de persecución y fidelidad judía
  english_pob_reading: piety
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la devoción
  - la reverencia
  rationale: El versículo resalta la fidelidad religiosa bajo coerción, no una simple moralidad. «La piedad» es breve, exacto y mantiene la fuerza de la devoción pactal sin importar terminología eclesiástica posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió lecturas anteriores demasiado libres: se evitó «ser considerados dignos» y se preservó la idea de «no apartarse de la piedad» y de «considerarse capaces de salvarse» en lugar de introducir un mérito no apoyado por el griego.'
  spanish_consistency_notes:
  - Se tradujo εὐσέβεια como «piedad» de forma consistente con el contexto de fidelidad religiosa.
  - Se evitó «Cristo» o terminología litúrgica no presente en el texto.
  - Se mantuvo un registro sobrio y publicable, sin calcos innecesarios del inglés auditado.
