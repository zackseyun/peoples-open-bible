  glossary_alignment: 'Alineación buena con la glosa del proyecto: ''Yahvé'' se usa correctamente; se preserva ''mano derecha'' en vez de abstraer a ''poder''; y ''hace proezas'' transmite aceptablemente עֹשָׂה חָיִל. No hay conflicto teológico ni terminológico mayor.'
