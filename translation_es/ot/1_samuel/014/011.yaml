base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/011.yaml
  text: When the two of them revealed themselves to the Philistine garrison[a], the Philistines said, “Look[b], the Hebrews are coming out of the holes where they had hidden themselves.”
