translation:
  language: es
  text: Pondrá su mano sobre la cabeza de su ofrenda y la degollará a la entrada de la tienda de reunión[a]; y los hijos de Aarón, los sacerdotes, arrojarán la sangre contra el altar, todo alrededor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a la puerta de la tienda de reunión”.
    reason: lexical_alternative
  - marker: b
    text: O “lanzarán la sangre contra el altar, todo alrededor”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrá
  alternatives_spanish:
  - apoyará
  - posará
  - extenderá
  lexicon: HALOT
  rationale: En el rito sacrificial, סמך expresa la acción de colocar la mano sobre la víctima. En español, 'poner la mano sobre' es natural y fiel; 'apoyar' o 'posar' suenan menos directos en este contexto.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  - su propia mano
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva con el posesivo 'su' y el sustantivo concreto 'mano'.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  - el rostro
  lexicon: HALOT
  rationale: רֹאשׁ designa la parte superior/anatómica de la víctima; 'cabeza' es el equivalente natural en español.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para una ofrenda traída a Dios. 'Ofrenda' conserva amplitud semántica mejor que 'sacrificio', que sería más estrecho.
- source_word: וּשְׁחָטוֹ
  english_pob_choice: and slaughter it
  chosen_spanish: y la degollará
  alternatives_spanish:
  - y la sacrificará
  - y la matará
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico para matar por degollación un animal sacrificial. 'Degollar' reproduce con precisión esa acción ritual; 'matar' es demasiado general.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: '''Entrada'' refleja פֶּתַח y ''tienda de reunión'' conserva אֹהֶל מוֹעֵד sin introducir lenguaje posterior de templo. ''Tienda'' es más natural que ''tabernáculo'' para lectores modernos y sigue el referente hebreo.'
- source_word: וְזָרְקוּ
  english_pob_choice: shall throw
  chosen_spanish: rociarán
  alternatives_spanish:
  - arrojarán
  - esparcirán
  - salpicarán
  lexicon: HALOT
  rationale: Aunque el valor básico de זרק es lanzar/arrojar, en español ritual 'rociar' comunica la aplicación de la sangre de manera idiomática y reconocible. Para no perder el matiz de dispersión alrededor del altar, se mantiene 'alrededor'.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: Aaron’s sons, the priests
  chosen_spanish: los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - los hijos de Aarón, que son sacerdotes
  - los sacerdotes, hijos de Aarón
  lexicon: HALOT
  rationale: La apposición hebrea identifica a los hijos de Aarón como sacerdotes. Se conserva la doble referencia familiar y cultual en español.
- source_word: אֶת־הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre
  lexicon: HALOT
  rationale: El marcador de objeto directo no se refleja en español; 'la sangre' es la traducción literal y natural.
- source_word: עַל־הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: alrededor del altar
  alternatives_spanish:
  - sobre el altar
  - contra el altar
  lexicon: HALOT
  rationale: Con זרק y el cierre de סביב, la imagen es la aplicación de la sangre en torno al altar. 'Alrededor del altar' expresa de forma clara el resultado espacial sin forzar 'contra' en español.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - en torno
  lexicon: HALOT
  rationale: סָבִיב indica circunferencia completa. 'Alrededor' es la equivalencia más natural y transparente en español.
theological_decisions:
- issue: Modo de aplicación de la sangre
  english_pob_reading: shall throw the blood against the altar all around
  chosen_spanish_reading: rociarán la sangre alrededor del altar
  alternative_spanish_readings:
  - arrojarán la sangre contra el altar alrededor
  - esparcirán la sangre alrededor del altar
  rationale: El hebreo זרק describe una acción ritual de lanzamiento/aplicación de la sangre, y סביב indica que el acto se realiza en todo el contorno del altar. En español, 'rociarán ... alrededor' conserva la función ritual sin introducir una imagen demasiado violenta o demasiado técnica que no esté exigida por el contexto.
  doctrine_reference: Levítico 3:2; comparación léxica con el uso ritual de זרק en contexto sacrificial
- issue: Designación del santuario
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tienda de encuentro
  - tabernáculo
  rationale: אֹהֶל מוֹעֵד es un nombre técnico del santuario; 'tienda de reunión' reproduce el valor de encuentro/congregación sin desplazarlo por una terminología eclesiástica posterior. 'Tabernáculo' puede ser correcto, pero es menos transparente respecto del hebreo.
  doctrine_reference: Éxodo 27:21; Levítico 1:3; Levítico 3:2
translation_notes:
  revision_awareness: El audit trail inglés mantiene la equivalencia óptima y revisó la frase espacial de 'on all sides' a 'all around' por naturalidad. En español se siguió esa línea con 'alrededor', y se mantuvo la alternativa ritual de 'arrojar' en nota por el matiz técnico de זרק. No se añadió léxico doctrinal ajeno al hebreo.
  spanish_consistency_notes:
  - Se preservó 'tienda de reunión' como traducción estable de אֹהֶל מוֹעֵד, coherente con el proyecto.
  - Se usó 'Yahvé' solo cuando el hebreo lo requiera; este versículo no contiene el tetragrámaton.
  - '''Ofrenda'' se mantuvo para קָרְבָּן, evitando ''sacrificio'' como restricción innecesaria.'
  - '''Sacerdotes'' traduce הַכֹּהֲנִים de modo consistente con el registro del Pentateuco.'
  - La acción ritual de la sangre se expresó con un verbo español natural ('rociar') sin perder la referencia al contorno del altar.
