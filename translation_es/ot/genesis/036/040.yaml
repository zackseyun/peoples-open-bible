    reason: lexical_alternative
  - marker: b
    text: Hebreo «Alva»; compárese la forma relacionada «Alía» en 1 Crónicas 1:51.
    reason: cross_reference
  revision_rationale: 'Se hicieron ajustes menores para mejorar la fidelidad onomástica y la naturalidad del español: ''Alvá'' se corrigió a ''Alva'', se normalizó la alternativa de ''Timna'' en la nota, y se capitalizó ''Jefe'' como título repetido en la lista. El resto del versículo preserva adecuadamente el sentido y la estructura del hebreo y del audit trail inglés.'
