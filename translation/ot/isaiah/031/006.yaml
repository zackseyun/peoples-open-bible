theological_decisions:
- issue: Whether to make the object of return explicit as God/YHWH in the main text
  chosen_reading: 'Keep the relative expression implicit: ''him from whom'''
  alternative_readings:
  - Return to the LORD, against whom...
  - Return to him against whom...
  rationale: The immediate Hebrew does not name YHWH explicitly, though the contextual referent is clearly Israel's God. To avoid importing a title not present in this verse, the translation preserves the relative construction while allowing the context to identify the referent.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve tension rather than resolve it)
