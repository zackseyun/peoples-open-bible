translation:
  language: es
  text: Y el cerdo[a], porque tiene pezuña partida y la pezuña está hendida, pero no rumia[b], es impuro para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el puerco».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no hace subir el bolo alimenticio».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזִיר
  english_pob_choice: the pig
  chosen_spanish: el cerdo
  alternatives_spanish:
  - el puerco
  - el chancho
  - el marrano
  - el puerco
  lexicon: HALOT
  rationale: El hebreo nombra al animal de forma general. «Cerdo» es el término común y digno en español moderno; evita un regionalismo y mantiene la referencia zoológica sin suavizar el sentido.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la clasificación. «Porque» reproduce con claridad la relación causal en español natural.
- source_word: מַפְרִיס פַּרְסָה
  english_pob_choice: has a divided hoof
  chosen_spanish: tiene pezuña partida
  alternatives_spanish:
  - tiene la pezuña dividida
  - parte la pezuña
  - tiene la pezuña hendida
  lexicon: HALOT
  rationale: La imagen hebrea describe el estado de la pezuña. «Pezuña partida» expresa bien el resultado en español y evita una calca poco natural; se conserva la referencia anatómica precisa.
- source_word: וְשֹׁסַע שֶׁסַע פַּרְסָה
  english_pob_choice: and splits the hoof
  chosen_spanish: y hendida la pezuña
  alternatives_spanish:
  - y separa la pezuña
  - y la pezuña está hendida
  - y corta la pezuña en dos
  lexicon: HALOT
  rationale: El hebreo intensifica la descripción de la pezuña. En español, «hendida la pezuña» conserva el énfasis y la imagen de separación sin duplicar mecánicamente la primera cláusula.
- source_word: גֵּרָה לֹא יִגָּר
  english_pob_choice: does not chew the cud
  chosen_spanish: no rumia
  alternatives_spanish:
  - no mastica el bolo
  - no vuelve el rumiar
  - no trae a la boca el bolo
  lexicon: HALOT
  rationale: «Rumia» es el equivalente natural y preciso en español para el idiomático «chew the cud». Mantiene la fuerza zoológica sin expandir innecesariamente el hebreo.
- source_word: טָמֵא הוּא לָכֶם
  english_pob_choice: is unclean to you
  chosen_spanish: es impuro para ustedes
  alternatives_spanish:
  - es inmundo para ustedes
  - es ritualmente impuro para ustedes
  - les es impuro
  lexicon: HALOT
  rationale: En Levítico 11 la categoría es ritual/dietética. «Impuro» comunica bien esa distinción en español contemporáneo; «para ustedes» conserva el destinatario plural del pacto.
theological_decisions:
- issue: Naturaleza de טָמֵא en leyes dietéticas
  english_pob_reading: unclean in the ritual/dietary sense
  chosen_spanish_reading: impuro en sentido ritual/dietético
  alternative_spanish_readings:
  - inmundo
  - manchado
  - defectuoso
  rationale: El contexto de Levítico 11 trata de alimentos permitidos y prohibidos, no de culpa moral. «Impuro» mantiene la categoría cultual sin moralizarla y deja intacta la lógica de santidad del capítulo.
  doctrine_reference: Levítico 11; distinción entre pureza ritual y pecado moral
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se detectaron cambios sustantivos en el sentido base. El principal ajuste en español fue elegir formulaciones naturales («cerdo», «pezuña partida», «rumia», «impuro») que conservan la precisión zoológica y ritual del hebreo y del auditorial inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio por coordinación narrativa, equivalente al hebreo waw consecutivo en estilo de traducción bíblica.
  - Se conservó el plural de cortesía bíblica «ustedes» para לָכֶם.
  - Se evitó «SEÑOR» u այլ masking; el versículo no contiene el nombre divino.
  - No se usó «Cristo/Mesías» ni vocabulario cristológico.
  - La doble descripción de la pezuña se mantuvo en dos miembros coordinados para respetar la intensificación hebrea.
  - «Impuro» se prefirió sobre «inmundo» por claridad contemporánea, sin negar la categoría ritual.
