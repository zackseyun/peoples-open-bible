translation:
  language: es
  text: Y también Ira el jairita[a] era sacerdote de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sumo consejero» o «asesor real»; la palabra hebrea significa literalmente «sacerdote», pero en algunos contextos reales puede designar a un alto funcionario de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: El hebreo suma el dato a una lista administrativa; en español, «también» comunica la adición con naturalidad. El «y» inicial puede resultar redundante en esta estructura breve, pero el sentido conjuntivo queda implícito en la continuidad del enunciado.
- source_word: עִירָא
  english_pob_choice: Ira
  chosen_spanish: Ira
  lexicon: Nombre propio (transliteración estándar)
  rationale: Se conserva el nombre propio sin traducir, como exige el texto fuente.
- source_word: הַיָּאִרִי
  english_pob_choice: the Jairite
  chosen_spanish: el jairita
  alternatives_spanish:
  - el descendiente de Jair
  lexicon: HALOT
  rationale: El gentilicio se vierte como adjetivo étnico/clánico natural en español. «El jairita» mantiene concisión y corresponde al patrón del hebreo, mientras que la expansión genealogizante queda como alternativa posible pero menos directa.
- source_word: הָיָה
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: HALOT
  rationale: En una nota de funcionarios, el imperfecto/copulativo en español se expresa con el pretérito imperfecto «era», que reproduce el estado o cargo en curso mejor que un perfecto puntual.
- source_word: כֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sumo consejero
  - asesor real
  lexicon: HALOT
  rationale: El sentido léxico básico de כֹהֵן es «sacerdote». Aunque el contexto real pueda admitir una función cortesana, el texto fuente mantiene la ambigüedad; por eso el texto principal conserva el valor léxico básico en español.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: para David
  alternatives_spanish:
  - de David
  - al servicio de David
  lexicon: HALOT
  rationale: El ל relacional indica pertenencia, servicio o relación con David. En español, «para David» preserva esa relación sin decidir de antemano entre servicio, dependencia o función cortesana.
theological_decisions:
- issue: Sentido de כֹהֵן en contexto real/cortesano
  english_pob_reading: Retain 'priest' in the main text, with a footnote noting the court-official alternative.
  chosen_spanish_reading: Mantener «sacerdote» en el texto principal, con nota que señale la posible función de alto funcionario de corte.
  alternative_spanish_readings:
  - sumo consejero
  - asesor real
  - alto funcionario de corte
  rationale: La primacía del término hebreo favorece conservar el sentido básico «sacerdote» en el cuerpo del texto. La nota preserva la tensión documentada por el POB inglés sin resolverla de manera interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación exacta expresada por לְדָוִד
  english_pob_reading: '"to David" preserves relation/service ambiguity.'
  chosen_spanish_reading: '"para David" preserva la relación y la posible función de servicio.'
  alternative_spanish_readings:
  - de David
  - al servicio de David
  rationale: '«Para David» evita cerrar prematuramente el matiz del hebreo: puede indicar pertenencia, orientación o servicio. Se mantiene así la ambigüedad útil del original.'
  doctrine_reference: HALOT; philosophy of source transparency
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no se registran cambios posteriores y el acuerdo de revisión es alto, con solo una observación menor sobre el posible valor cortesano de כֹהֵן.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «sacerdote» en el texto principal para conservar el valor léxico básico de כֹהֵן.
  - 'La transliteración de nombres propios sigue la práctica del proyecto: Ira, jairita, David.'
  - La puntuación y mayúsculas siguen la norma estándar del español bíblico moderno, con estilo sobrio y legible.
