revisions:
- from: Y acontecerá en toda la tierra[a], dice Yahvé, que dos tercios en ella serán cortados y perecerán[b], pero un tercio quedará en ella.
  to: Y acontecerá en todo el país[a], declara Yahvé, que dos tercios en él serán cortados y perecerán[b], pero un tercio quedará en él.
  rationale: Se ajusta הָאָרֶץ a «país» para reflejar mejor la decisión contextual documentada por el POB («land», no «earth»), se corrige la nota [a] para que presente una alternativa real, y se pule la nota [b] para que sea más natural en español sin perder la información lexical. También se cambia «dice Yahvé» por «declara Yahvé» para una mejor correspondencia con נְאֻם יְהוָה y el tono auditado.
