translation:
  language: es
  text: El oído que escucha la reprensión que da vida[a][b] permanecerá entre los sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El oído que oye la reprensión de vida permanecerá entre los sabios». El verbo hebreo significa literalmente «alojarse» o «pasar la noche», aquí usado figuradamente para indicar permanencia entre los sabios.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «reprensión que da vida» traduce un hebreo que también puede entenderse como «reprensión de vida» o «reprensión para la vida», es decir, corrección que conduce a la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - oído receptivo
  lexicon: HALOT
  rationale: En español, "oído" funciona de manera natural como parte del proverbio y mantiene la metonimia hebrea del órgano por la persona receptiva. "Oreja" sonaría más físico y menos proverbial.
- source_word: שֹׁמַעַת
  english_pob_choice: that listens
  chosen_spanish: que escucha
  alternatives_spanish:
  - que oye
  - que presta atención
  lexicon: HALOT
  rationale: '"Escucha" preserva la idea de recepción atenta y continua, no solo de percepción auditiva.'
- source_word: תּוֹכַחַת
  english_pob_choice: rebuke
  chosen_spanish: corrección
  alternatives_spanish:
  - reprensión
  - amonestación
  lexicon: HALOT
  rationale: Aunque el inglés POB usa "rebuke", en español "corrección" comunica con más naturalidad la fuerza sapiencial del término sin endurecerlo innecesariamente. Mantiene el sentido de instrucción correctiva.
- source_word: חַיִּים
  english_pob_choice: life-giving
  chosen_spanish: de la vida
  alternatives_spanish:
  - para la vida
  - que da vida
  lexicon: HALOT
  rationale: 'La construcción hebrea permite una relación genitiva ambigua: corrección que pertenece a la vida, conduce a la vida o está orientada a la vida. "De la vida" conserva esa tensión, y la nota explica las alternativas que el inglés POB explicitó.'
- source_word: בְּקֶרֶב
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - dentro de
  lexicon: HALOT
  rationale: '"Entre" es la equivalencia natural en español para la ubicación dentro de un grupo.'
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los prudentes
  - las personas sabias
  lexicon: HALOT
  rationale: '"Los sabios" conserva el valor sustantivado del adjetivo hebreo y coincide con el registro sapiencial bíblico.'
- source_word: תָּלִין
  english_pob_choice: will remain
  chosen_spanish: morará
  alternatives_spanish:
  - permanecerá
  - pasará la noche
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente "alojarse/pasar la noche", pero en este proverbio describe permanencia estable entre los sabios. "Morará" conserva un matiz de habitación más cercano al hebreo que "permanecerá", sin sonar tan arcaico como "pasará la noche".
theological_decisions:
- issue: Sentido de תּוֹכַחַת חַיִּים
  english_pob_reading: '"Life-giving rebuke" renders a Hebrew expression that could also be translated "rebuke of life" or "rebuke for life," meaning correction that leads to life.'
  chosen_spanish_reading: '"la corrección de la vida" conserva la ambigüedad: corrección que proviene de la vida, orientada a la vida o que conduce a la vida.'
  alternative_spanish_readings:
  - '"corrección que da vida"'
  - '"reprensión para la vida"'
  - '"reprensión de vida"'
  rationale: El hebreo admite varias relaciones semánticas en el genitivo. La redacción elegida evita cerrar indebidamente el sentido y mantiene la tensión documentada por el POB inglés, mientras sigue siendo natural en español.
  doctrine_reference: Sabiduría bíblica / formación moral
translation_notes:
  revision_awareness: La versión inglesa más reciente fue marcada como unchanged tras revisión de alta concordancia; el presente borrador sigue esa lectura sin introducir cambios de sentido y traslada al español las mismas alternativas lexicográficas relevantes.
  spanish_consistency_notes:
  - Se mantiene «sabios» para חֲכָמִים, consistente con el registro sapiencial.
  - Se evita «SEÑOR» porque este verso no contiene el nombre divino.
  - Se usa «corrección» en vez de un calco rígido de «rebuke» para una lectura natural en español, pero la nota preserva la alternativa más cercana al inglés POB.
  - «Morará» conserva el valor figurado de residencia permanente del verbo hebreo.
