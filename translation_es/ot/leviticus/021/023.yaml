base_translation:
  language: en
  yaml_path: translation/ot/leviticus/021/023.yaml
  text: However[a], he shall not go in to the veil or come near the altar, because there is a defect in him, so that he may not profane my sanctuaries[c][b]; for I am Yahweh who sanctifies them.
  footnotes:
  - marker: a
    text: Or 'the curtain.' The Hebrew term refers to the sanctuary veil.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has a blemish in him.' The Hebrew speaks of a physical defect that disqualifies from this priestly approach, not a moral fault.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my sanctuaries' (plural); some translations smooth this to 'my sanctuary.'
    reason: lexical_alternative
