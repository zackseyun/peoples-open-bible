translation:
  language: es
  text: Nadab, hijo de Jeroboam, comenzó a reinar sobre Israel en el segundo año de Asa, rey de Judá, y reinó sobre Israel dos años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/נָדָב
  english_pob_choice: Now Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Ahora Nadab
  - Y Nadab
  - Entonces Nadab
  lexicon: HALOT
  rationale: El prefijo conjuntivo marca la continuación del relato regnal; en español, el nombre sin conjunción inicial fluye de manera natural en un encabezado cronístico y evita sobrecargar la frase con un ‘y’ no necesario.
- source_word: בֶּן יָרָבְעָם
  english_pob_choice: son of Jeroboam
  chosen_spanish: hijo de Jeroboam
  alternatives_spanish:
  - el hijo de Jeroboam
  lexicon: HALOT
  rationale: La construcción filiativa se mantiene de forma directa y transparente; se conserva la identificación dinástica sin añadir artículo donde no aporta precisión.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - llegó a ser rey
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: El primer verbo señala la entronización, no la duración del mandato. ‘Comenzó a reinar’ distingue adecuadamente el inicio del reinado del verbo posterior de duración, siguiendo la decisión auditada en inglés.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  lexicon: HALOT
  rationale: Se conserva el idioma de dominio real con ‘sobre’, que es el equivalente más directo y fiel al hebreo.
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en año dos
  - en el año dos
  lexicon: HALOT
  rationale: El hebreo usa un cardinal en una fórmula regnal; en español, ‘segundo año’ expresa con naturalidad la datación cronológica sin perder el valor numérico.
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  - de Asa rey de Judá
  lexicon: HALOT
  rationale: La preposición de referencia en la fórmula regnal se vierte con ‘de’. Se conserva la aposición titulativa con puntuación que aísla claramente el nombre propio del cargo.
- source_word: וַ/יִּמְלֹךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - y reinó
  - y comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: Aquí el verbo va acompañado de la duración; por eso ‘reinó’ expresa la acción continuada del periodo y evita confundirla con la entronización.
- source_word: שְׁנָתָיִם
  english_pob_choice: two years
  chosen_spanish: dos años
  alternatives_spanish:
  - por dos años
  - durante dos años
  lexicon: HALOT
  rationale: La duración se traduce de forma literal y natural en español, manteniendo la brevedad de la fórmula hebrea.
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y no presenta notas ni revisiones aplicadas; se mantiene la misma solución semántica que el registro inglés, con ajuste natural de estilo español para la fórmula regnal.
  spanish_consistency_notes:
  - Se mantiene ‘Judá’ y ‘Israel’ como nombres propios bíblicos estándar.
  - Se evita ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
  - Se distingue con claridad entre el comienzo del reinado (‘comenzó a reinar’) y su duración (‘reinó dos años’).
