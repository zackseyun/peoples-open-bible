review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sucesión dinástica (''En lugar de tus padres...''), instalación regia (''los pondrás como príncipes'') y alcance amplio de הָאָרֶץ con nota alternativa. Sin embargo, dos decisiones no preservan con suficiente precisión el sentido fuente ni el rastro léxico auditado: בָנֶיךָ es específicamente ''tus hijos varones/sons'', no el inclusivo ''tus hijos''; y יִהְיוּ se expresa mejor con ''serán'' que con ''estarán'', ya que se trata de identidad/sucesión, no estado o ubicación.'
  spanish_quality_summary: El texto es legible y digno, pero 'estarán tus hijos' suena menos natural y menos exacto que 'serán tus hijos' en este contexto. 'Tus hijos' también debilita el matiz dinástico masculino. Con un ajuste menor, la línea queda más fiel y más idiomática para lectura eclesial amplia.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Sí conviene alinear mejor la decisión léxica de בָנֶיךָ con el inglés auditado 'your sons' mediante 'tus hijos varones' o preferiblemente 'tus hijos' solo si hubiera razón contextual fuerte, la cual aquí no aparece. Dado el contexto real, 'tus hijos varones' preserva el valor masculino específico sin arcaísmo excesivo. 'Príncipes' y 'tierra' están bien; la nota sobre אָרֶץ también.
  issues:
  - severity: medium
    issue: בָנֶיךָ fue traducido como 'tus hijos' en vez de una forma masculina específica.
    rationale: El hebreo y el POB inglés conservan el sentido de 'sons', importante en un contexto dinástico real. 'Tus hijos' introduce neutralización semántica que el original no tiene.
  - severity: medium
    issue: יִהְיוּ fue vertido como 'estarán' en lugar de 'serán'.
    rationale: Aquí el verbo expresa sucesión/identidad ('en lugar de tus padres serán tus hijos'), no localización ni estado temporal. 'Serán' es más fiel al hebreo y más natural en español bíblico moderno.
  - severity: low
    issue: La nota 'tierra/país' es algo torpe en su formulación.
    rationale: Conviene expresar la alternativa como 'tierra' o 'país'/'land' con redacción más natural en español, manteniendo la ambivalencia semántica de אָרֶץ.
  revised_spanish_text: En lugar de tus padres serán tus hijos varones[a]; tú los pondrás como príncipes en toda la tierra[b].
