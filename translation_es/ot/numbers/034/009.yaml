translation:
  language: es
  text: Entonces el límite se extenderá a Ziprón[a], y su término será Hazar-enán. Este será su límite norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «sus salidas serán Hazar-enán». El hebreo usa una expresión plural para el término del límite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: shall extend
  chosen_spanish: se extenderá
  alternatives_spanish:
  - saldrá
  - irá hasta
  lexicon: HALOT
  rationale: En textos de límites territoriales, יצא describe el trazado o extensión de una frontera. En español, 'se extenderá' comunica ese sentido geográfico de manera natural y fiel.
- source_word: הַגְּבֻל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: '''Límite'' funciona bien en contextos de demarcación territorial y evita una rigidez innecesaria. Mantiene el valor espacial del hebreo en un español claro.'
- source_word: זִפְרֹנָה
  english_pob_choice: to Ziphron
  chosen_spanish: hasta Ziprón
  alternatives_spanish:
  - a Ziprón
  - hacia Ziprón
  lexicon: Transliteration policy
  rationale: Es un nombre propio y se translitera. 'Hasta' reproduce bien la idea direccional dentro de la descripción del recorrido fronterizo.
- source_word: וְהָיוּ תוֹצְאֹתָיו
  english_pob_choice: and its endpoint shall be
  chosen_spanish: y su término será
  alternatives_spanish:
  - y sus salidas serán
  - y su terminación será
  - y sus extremos serán
  lexicon: HALOT
  rationale: El hebreo usa un plural formal ('sus salidas/extremos') para el término de la frontera. En español, 'su término' conserva la función semántica sin perder la referencia al final del trazado.
- source_word: חֲצַר עֵינָן
  english_pob_choice: Hazar-enan
  chosen_spanish: Hazar-enán
  alternatives_spanish:
  - Hazar Enán
  - Hazar-enan
  lexicon: Transliteration policy
  rationale: Nombre propio transliterado al español con acento para lectura natural. Se mantiene la forma compuesta del topónimo.
- source_word: זֶה יִהְיֶה לָכֶם
  english_pob_choice: This shall be your
  chosen_spanish: Este será para ustedes
  alternatives_spanish:
  - Esto será para ustedes
  - Este les corresponderá
  lexicon: HALOT
  rationale: La frase resume e identifica el trazado descrito. 'Será para ustedes' es una equivalencia directa y transparente para el valor asignativo del hebreo.
- source_word: גְּבֻל צָפוֹן
  english_pob_choice: northern border
  chosen_spanish: límite del norte
  alternatives_spanish:
  - frontera del norte
  - límite norte
  lexicon: HALOT
  rationale: La construcción denota el lado norte de la frontera. 'Límite del norte' conserva el orden y la función del hebreo sin sonar forzado en español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alta concordancia con el control cruzado; por ello, este borrador sigue de cerca la solución auditada en inglés, adaptándola al español con la misma lectura geográfica y la misma alternativa léxica documentada para תוֹצְאֹתָיו.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se transliteran los nombres propios Ziphron/Ziprón y Hazar-enan/Hazar-enán de forma consistente con el español bíblico contemporáneo.
  - '''Límite'' se usa para גְּבֻל en coherencia con un contexto de delimitación territorial.'
  - La nota al pie preserva la alternativa formal documentada en inglés para תוֹצְאֹתָיו, sin perder la lectura principal fluida en español.
