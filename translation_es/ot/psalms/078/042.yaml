  rationale: Se corrige 'el día cuando' a 'el día en que' por mayor naturalidad y fidelidad idiomática en español. También se reubica la nota [b] para que ancle directamente 'del enemigo' y siga mejor el patrón de alternativas léxicas del audit trail, manteniendo 'opresor' como alternativa secundaria posible.
