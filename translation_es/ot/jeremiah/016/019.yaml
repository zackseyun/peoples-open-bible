translation:
  language: es
  text: 'Yahvé[a], mi fuerza y mi baluarte, mi refugio en el día de angustia; a ti vendrán las naciones desde los confines de la tierra y dirán: «Ciertamente nuestros padres heredaron solo mentiras[b], cosas sin valor[c], en las que no hay provecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahweh».
    reason: lexical_alternative
  - marker: b
    text: O «falsedad» o «falsedades».
    reason: lexical_alternative
  - marker: c
    text: «Cosas sin valor» traduce el hebreo hebel, a menudo «vanidad», «vaciedad» o, por implicación en algunos contextos, cosas inútiles o ídolos fútiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino del pacto. En español, la pauta del proyecto es transliterarlo como «Yahvé» y no ocultarlo con una forma sustitutiva como «SEÑOR».},{
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio divino del hebreo, de acuerdo con la convención del proyecto en español y con la primacía del original sobre una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de הֶבֶל en la cláusula final
  english_pob_reading: worthless things
  chosen_spanish_reading: cosas sin valor
  alternative_spanish_readings:
  - vanidad
  - vaciedad
  - ídolos
  rationale: El hebreo permite un campo de sentido que incluye vaciedad/futilidad y, por extensión, ídolos, pero el texto no nombra explícitamente «ídolos». «Cosas sin valor» mantiene la amplitud semántica sin estrechar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: mantiene la serie de tres expresiones de protección («fuerza», «baluarte», «refugio»), conserva el movimiento enfático de las naciones que vienen «desde los confines de la tierra», y traduce la afirmación final con una secuencia que refleja las tres piezas del hebreo: mentira/falsedad, vacío o inutilidad, y ausencia de provecho. La nota de hebel permanece abierta porque el audit trail inglés también evitó estrecharlo a «ídolos» en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma principal del nombre divino, conforme al estándar del proyecto.
  - Se eligió «baluarte» para מָעֻזִּי para diferenciarlo de «fuerza» y evitar redundancia excesiva con «refugio».
  - «Naciones» conserva el alcance internacional de גּוֹיִם sin introducir el contraste técnico «gentiles» que el contexto inmediato no exige.
  - «Desde los confines de la tierra» reproduce el modismo de מֵאַפְסֵי אָרֶץ de manera idiomática y fiel.
  - «Cosas sin valor» preserva el juicio de futilidad de הֶבֶל sin convertirlo en una glosa doctrinal más estrecha.
