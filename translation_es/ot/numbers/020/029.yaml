  to: Cuando toda la asamblea vio que Aarón había muerto[a], toda la casa de Israel[b] lloró por Aarón durante treinta días.
  rationale: Se movió la nota cultural al sintagma que realmente explica. También se ajustó 'treinta días' a 'durante treinta días' para mayor naturalidad en español, manteniendo intacto el valor durativo del hebreo. Se conserva 'lloró' como singular colectivo aceptable si va con una frase más fluida; alternativamente 'lloraron' también sería válido, pero la presente revisión ya resuelve el principal problema de anclaje y mejora la legibilidad.
