translation:
  language: es
  text: Con el puro te muestras puro, pero con el retorcido te muestras torcido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el retorcido te muestras retorcido/contrario». El hebreo usa un verbo raro y difícil; la lectura principal conserva «torcido» para reflejar el paralelismo y la revisión final del inglés POB.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto a
  - para con
  lexicon: HALOT
  rationale: 'La preposición expresa correspondencia relacional: el modo en que Yahvé se muestra en relación con cada clase de persona. En español, «con» comunica esa correspondencia de manera natural y directa.'
- source_word: נָבָר
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - sin culpa
  - íntegro
  lexicon: HALOT
  rationale: El adjetivo apunta a pureza/limpieza moral y cultual. «Puro» conserva la brevedad poética y el paralelismo con el verbo de la misma raíz.
- source_word: תִּתָּבָר
  english_pob_choice: you show yourself pure
  chosen_spanish: te muestras puro
  alternatives_spanish:
  - eres puro
  - actúas con pureza
  lexicon: HALOT
  rationale: La forma reflexiva se refleja bien con «te muestras», que preserva el matiz de manifestación en relación con el justo/puro, sin perder el vínculo verbal con נָבָר.
- source_word: עִקֵּשׁ
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - perverso
  - retorcido
  - desviado
  lexicon: HALOT
  rationale: «Torcido» reproduce la imagen moral de lo deforme o de lo desviado y mantiene la repetición sonora y semántica con el verbo siguiente.
- source_word: תִּתַּפָּל
  english_pob_choice: you show yourself twisted
  chosen_spanish: te muestras torcido
  alternatives_spanish:
  - te muestras retorcido
  - te comportas de modo torcido
  - te muestras contrario
  lexicon: HALOT
  rationale: 'El verbo es raro y difícil. La revisión del inglés prefirió una forma que refleje el sentido negativo y la correspondencia poética. En español, «te muestras torcido» conserva esa ambigüedad controlada: expresa respuesta conforme al torcido sin atribuirle a Dios perversidad moral, y mantiene el paralelismo con «te muestras puro».'
theological_decisions:
- issue: Cómo traducir la respuesta de Dios al torcido sin implicar que Dios mismo sea moralmente torcido
  english_pob_reading: you show yourself twisted
  chosen_spanish_reading: te muestras torcido
  alternative_spanish_readings:
  - te muestras retorcido
  - te comportas de modo torcido
  - te muestras contrario
  rationale: La poesía hebrea usa correspondencia antitética. La traducción debe conservar la tensión sin resolverla de forma explicativa. «Te muestras torcido» sigue la lectura final del inglés POB y deja la dificultad visible, sin convertirla en una afirmación doctrinal sobre la moralidad de Dios.
  doctrine_reference: Preservar la tensión textual y la santidad de Dios; equivalencia óptima dentro de la ortodoxia histórica
translation_notes:
  revision_awareness: El inglés POB pasó de una solución interpretativa con «shrewd» a la revisión final «twisted», priorizando el sentido negativo y el paralelismo con «crooked». La versión española sigue esa revisión final y conserva la ambigüedad limitada del verbo raro.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo, por lo que el texto mantiene la referencia implícita del sujeto según el contexto inmediato.
  - Se evita «justo» porque el hebreo usa נָבָר, más cercano a pureza/limpieza que a rectitud judicial.
  - Se mantiene un registro poético sobrio y contemporáneo, sin recurrir a formulaciones eclesiásticas fijas que oscurezcan el juego léxico original.
