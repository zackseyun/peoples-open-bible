translation:
  language: es
  text: Me alegraré y me gozaré en tu amor constante[a], porque has visto mi aflicción; has conocido las angustias de mi alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu misericordia' o 'tu fidelidad amorosa'. El hebreo חסד puede expresar misericordia, amor leal o amor constante, a menudo con matiz de fidelidad de pacto.
    reason: lexical_alternative
  - marker: b
    text: O 'las angustias de mi vida' o 'las angustias de mi ser'. El hebreo nefesh puede significar 'alma', 'vida' o 'ser/yo' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָגִילָה
  english_pob_choice: I will rejoice
  chosen_spanish: me alegraré
  alternatives_spanish:
  - me gozaré
  - me regocijaré
  - me exultaré
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución gozosa. En español, "me alegraré" transmite bien el impulso volitivo y resulta natural; "me gozaré" mantiene el paralelo poético con el verso, aunque es algo más marcado.
- source_word: וְאֶשְׂמְחָה
  english_pob_choice: and be glad
  chosen_spanish: y me gozaré
  alternatives_spanish:
  - y me alegraré
  - y estaré feliz
  - y me regocijaré
  lexicon: HALOT
  rationale: El paralelismo con גיל pide dos verbos cercanos pero no idénticos. "Gozaré" conserva el registro bíblico y evita la repetición exacta de "alegraré", mientras mantiene la intensidad del gozo.
- source_word: בְחַסְדֶּךָ
  english_pob_choice: in your steadfast love
  chosen_spanish: en tu misericordia
  alternatives_spanish:
  - en tu amor constante
  - en tu fiel amor de pacto
  - en tu lealtad amorosa
  lexicon: HALOT
  rationale: חסד abarca amor leal, bondad pactal y misericordia. En español, "misericordia" es claro y digno, aunque algo más amplio; se conserva la tensión semántica del término sin imponer una fórmula eclesiástica fija. Se evita "SEÑOR" porque el hebreo aquí habla directamente de la cualidad divina, no del tetragrámaton.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aunque la partícula es relativa, aquí introduce la causa del gozo. "Porque" comunica de forma natural la relación causal que la POB inglesa ya explícita.
- source_word: רָאִיתָ אֶת עָנְיִי
  english_pob_choice: you have seen my affliction
  chosen_spanish: has visto mi aflicción
  alternatives_spanish:
  - has visto mi miseria
  - has visto mi sufrimiento
  - has mirado mi aflicción
  lexicon: HALOT
  rationale: '"Aflicción" conserva el registro poético y el alcance de עני como sufrimiento/abatimiento. El perfecto español mantiene la acción pasada con vigencia actual, en línea con el inglés auditado.'
- source_word: יָדַעְתָּ
  english_pob_choice: you have known
  chosen_spanish: has conocido
  alternatives_spanish:
  - has sabido
  - has reconocido
  - has tomado nota de
  lexicon: HALOT
  rationale: ידע incluye conocimiento, reconocimiento y atención relacional. "Has conocido" sigue de cerca la elección inglesa y preserva la amplitud del verbo sin estrecharlo a mera información.
- source_word: בְּצָרוֹת נַפְשִׁי
  english_pob_choice: the distresses of my soul
  chosen_spanish: las angustias de mi alma
  alternatives_spanish:
  - las angustias de mi vida
  - los apuros de mi alma
  - las tribulaciones de mi alma
  lexicon: HALOT
  rationale: צָרוֹת son angustias o estrecheces; "angustias" comunica bien la presión intensa del término. Se mantiene "alma" para נֶפֶשׁ porque el hebreo lo dice explícitamente y la POB inglesa preservó esa decisión, aunque en español también sería viable "vida".
theological_decisions:
- issue: Sentido de חסד en un verso de confianza y gozo
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - fidelidad amorosa
  - amor de pacto
  rationale: La POB inglesa opta por una expresión que conserve la densidad pactal de חסד. En español, "misericordia" es una equivalencia tradicional y comprensible; no agota el término, pero permite mantener la ambivalencia entre bondad compasiva y lealtad constante sin forzar una glosa interpretativa en el cuerpo del texto.
  doctrine_reference: Preservar la tensión semántica de חסד; no resolverla de manera reductiva.
- issue: Traducción de נֶפֶשׁ en poesía de lamento
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  - yo
  rationale: Siguiendo la decisión inglesa, se conserva "alma" para no borrar el término explícito ni aplanar la antropología poética del verso. En español, "alma" suena natural y mantiene la profundidad interior del sufrimiento, sin imponer una separación doctrinal rígida entre alma y cuerpo.
  doctrine_reference: Mantener el término marcado y su posible amplitud semántica; no neutralizarlo por completo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura inglesa auditada y conserva sus decisiones principales: el paralelismo de gozo, la causalidad introducida por אשר, el valor de חסד como amor leal, y la decisión de mantener נֶפֶשׁ como "alma". No se detectaron revisiones posteriores en el paquete fuente, y el control cruzado indica alta concordancia sin cambios.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Yahvé reservado para el tetragrámaton; aquí no aparece, por lo que no se usa ningún sustituto reverencial.
  - 'Se preserva el registro poético y la correspondencia de número: "aflicción" singular, "angustias" plural.'
  - La nota a pie de página se ancla en "misericordia" para señalar la alternativa semántica principal de חסד sin saturar el verso con glosa.
  - '"Alma" se conserva de manera consistente con la POB inglesa y con la explicitud del hebreo נֶפֶשׁ.'
