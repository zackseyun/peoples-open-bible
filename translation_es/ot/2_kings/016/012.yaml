translation:
  language: es
  text: Cuando el rey llegó de Damasco, el rey vio el altar; y el rey se acercó al altar y subió a él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se acercó al altar y ofreció sobre él». Algunos entienden «subió a él» como abreviatura del inicio de una acción sacrificial, aunque el hebreo describe más literalmente la subida al altar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El sentido básico del wayyiqtol de בוא es movimiento de llegada. En español, «llegó» comunica con naturalidad la llegada del rey sin añadir matices que el hebreo no exige.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el sustantivo definido repetido tres veces en el hebreo para reflejar el estilo narrativo y la insistencia en la acción personal del rey.
- source_word: מִדַּמֶּשֶׂק
  english_pob_choice: from Damascus
  chosen_spanish: de Damasco
  alternatives_spanish:
  - desde Damasco
  lexicon: HALOT
  rationale: La preposición מִן expresa procedencia. «De Damasco» es la forma más directa y natural en español para indicar origen.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: ראה aquí indica percepción visual simple. «Vio» conserva la secuencia narrativa breve y precisa.
- source_word: אֶת הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - un altar
  lexicon: HALOT
  rationale: El objeto directo definido se traduce con el equivalente claro y estándar «el altar».
- source_word: וַיִּקְרַב
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se acercó a
  lexicon: HALOT
  rationale: קרב en qal expresa acercamiento. «Se acercó» es idiomático en español y mantiene el movimiento hacia el altar sin sobretraducirlo.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: to the altar
  chosen_spanish: al altar
  alternatives_spanish:
  - hacia el altar
  - sobre el altar
  lexicon: HALOT
  rationale: Aunque עַל suele significar «sobre» o «encima de», después de קרב puede funcionar idiomáticamente con valor direccional hacia el objeto. «Al altar» conserva esa orientación sin introducir la imagen de estar ya encima.
- source_word: וַיַּעַל עָלָיו
  english_pob_choice: went up on it
  chosen_spanish: subió sobre él
  alternatives_spanish:
  - subió en él
  - ascendió a él
  - subió al altar
  lexicon: HALOT
  rationale: עלה conserva su valor físico de ascender. Dado que el hebreo añade עָלָיו, la imagen más directa es «subió sobre él». Se evita «ofreció sobre él» porque el acto sacrificial no está explicitado en esta cláusula y aparece desarrollado en el versículo siguiente.
theological_decisions:
- issue: Si וַיַּעַל עָלָיו debe entenderse como ascenso físico o como comienzo de un acto sacrificial
  english_pob_reading: 'physical ascent: ''went up on it'''
  chosen_spanish_reading: 'ascenso físico: «subió sobre él»'
  alternative_spanish_readings:
  - «ofreció sobre él»
  - «subió para ofrecer»
  rationale: La sintaxis hebrea describe de forma más inmediata un movimiento de subida/ascenso al altar. Traducirlo como sacrificio ya interpreta la acción antes de que el texto lo explicite. Mantener el ascenso físico preserva la tensión documental y deja el contenido sacrificial para el contexto inmediato.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y mantiene alta concordancia con el texto hebreo; por eso la redacción española sigue de cerca la secuencia verbal y conserva la misma ambigüedad controlada sobre וַיַּעַל עָלָיו, sin añadir contenido sacrificial no explícito.
  spanish_consistency_notes:
  - Se mantuvo «altar» de manera uniforme para מִזְבֵּחַ.
  - Se conservó la repetición de «el rey» para reflejar la estructura enfática del hebreo.
  - Se usó «subió sobre él» para preservar la lectura física principal y la nota recoge la alternativa sacrificial documentada por el audit trail inglés.
  - Se prefirió «de Damasco» frente a construcciones más interpretativas para expresar origen de manera natural en español.
