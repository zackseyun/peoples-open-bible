translation:
  language: es
  text: Por tanto, no deben ser tenidos por dioses[a] ni ser llamados dioses, pues no tienen capacidad para juzgar un caso ni para hacer bien a la gente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «considerados». El verbo griego puede expresar reconocimiento o estimación pública; se opta por «tenidos por» para reflejar ese matiz.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - De manera que
  lexicon: LSJ
  rationale: Conserva el valor inferencial de conclusión a partir del argumento previo, con una fórmula natural y digna en español.
- source_word: νομιεῖσθαι
  english_pob_choice: to be regarded
  chosen_spanish: ser tenidos por
  alternatives_spanish:
  - ser considerados
  - ser estimados como
  - ser juzgados como
  lexicon: LSJ
  rationale: La pasiva expresa que se los tenga por algo según juicio o convención; 'ser tenidos por' refleja bien ese valor evaluativo sin endurecer el estilo.
- source_word: κλητέον ὑπάρχειν
  english_pob_choice: to be called
  chosen_spanish: ser llamados
  alternatives_spanish:
  - ser nombrados
  - ser designados como
  - ser llamados como
  lexicon: LSJ
  rationale: La construcción expresa aquello que no corresponde llamarles; 'ser llamados' conserva la fuerza nominal sin exceder el texto.
- source_word: θεούς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  - dioses falsos
  lexicon: LSJ
  rationale: La polémica del pasaje recae sobre pretendidos dioses; 'dioses' es directo y mantiene la negación sin introducir aclaraciones no presentes.
- source_word: οὐ δυνατῶν ὄντων αὐτῶν
  english_pob_choice: since they are unable
  chosen_spanish: pues no tienen capacidad
  alternatives_spanish:
  - ya que son incapaces
  - puesto que no pueden
  - porque no son capaces
  lexicon: LSJ
  rationale: El genitivo absoluto da la razón de la conclusión; 'no tienen capacidad' preserva la idea de incapacidad de manera natural en español.
- source_word: κρίσιν κρῖναι
  english_pob_choice: to judge a case
  chosen_spanish: juzgar un caso
  alternatives_spanish:
  - dictar sentencia
  - hacer justicia
  - pronunciar juicio
  lexicon: LSJ
  rationale: La frase cognada apunta al ejercicio de una decisión judicial; 'juzgar un caso' mantiene el matiz jurídico sin sobreinterpretarlo.
- source_word: εὖ ποιεῖν
  english_pob_choice: to do good
  chosen_spanish: hacer bien
  alternatives_spanish:
  - hacer el bien
  - beneficiar
  - hacer lo bueno
  lexicon: LSJ
  rationale: El modismo se vierte con una expresión breve y fiel; 'hacer bien' conserva la paralelía verbal con 'juzgar' y el sentido de beneficiar.
- source_word: ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  - a la gente
  lexicon: LSJ
  rationale: Aunque la política de género suele preferir formas inclusivas, aquí la tradición de la fórmula y el registro bíblico permiten 'los hombres' como equivalente general de 'human beings'.
theological_decisions:
- issue: Negación de la condición divina de los ídolos
  english_pob_reading: they are to be regarded neither as gods nor to be called gods
  chosen_spanish_reading: no deben ser tenidos por dioses ni ser llamados dioses
  alternative_spanish_readings:
  - no deben ser considerados dioses ni llamados dioses
  - no es correcto tenerlos por dioses ni llamarlos dioses
  rationale: 'Se mantiene la doble negación: no poseen estatus divino y tampoco merecen esa designación. La formulación evita suavizar la polémica contra la idolatría y no introduce una explicación metafísica ajena al verso.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la claridad moderna sin domesticar el lenguaje polémico.'
translation_notes:
  revision_awareness: La versión inglesa revisada añadió explícitamente 'to be' antes de 'called gods' para reforzar el paralelismo; en español se refleja con la coordinación 'ni ser llamados dioses'. Se mantuvo la fuerza causal del genitivo absoluto con 'pues'.
  spanish_consistency_notes:
  - Se conserva 'dioses' en minúscula por referirse a pretendidos dioses, no al Dios verdadero.
  - Se evita 'SEÑOR' u otras sustituciones no presentes, pues el verso no contiene el nombre divino.
  - '''Hombres'' se conserva aquí como genérico bíblico equivalente a ''human beings'' dentro del registro del pasaje.'
