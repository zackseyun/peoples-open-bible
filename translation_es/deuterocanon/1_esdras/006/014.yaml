translation:
  language: es
  text: Y porque nuestros padres[a], habiéndole provocado, pecaron contra el Señor de Israel, el celestial[b], él los entregó en manos de Nabucodonosor, rey de Babilonia, rey de los caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice literalmente «nuestros padres», y se mantiene esa formulación familiar-histórica en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «el Dios del cielo». El griego de Swete lee «el celestial», mientras la tradición relacionada de Esdras suele ampliar la expresión a «Dios del cielo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la base causal de la frase. «Porque» es natural en español y conserva la fuerza explicativa del griego sin añadir matiz extra.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres
  lexicon: BDAG
  rationale: Mantiene el lenguaje familiar-histórico del texto. En español, «padres» refleja mejor la formulación tradicional y la cercanía comunitaria del original que «antepasados».
- source_word: παραπικράναντες
  english_pob_choice: having provoked him
  chosen_spanish: habiéndole provocado
  alternatives_spanish:
  - después de haberle irritado
  - habiendo lo provocado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa y causal. «Habiéndole provocado» conserva esa relación participial y evita expandirla a una frase más interpretativa.
- source_word: ἥμαρτον
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - cometieron pecado
  - faltaron
  lexicon: BDAG
  rationale: Verbo estándar para ἁμαρτάνω. «Pecaron» es claro, directo y plenamente fiel al valor moral-religioso del término.
- source_word: εἰς τὸν κύριον τοῦ Ἰσραὴλ
  english_pob_choice: against the Lord of Israel
  chosen_spanish: contra Yahvé, el Señor de Israel
  alternatives_spanish:
  - contra el Señor de Israel
  - contra Yahvé, el Dios de Israel
  lexicon: BDAG
  rationale: La preposición con ἁμαρτάνω se rinde naturalmente con «contra». Se conserva «Señor de Israel» y se explicita «Yahvé» conforme al criterio del proyecto para el nombre divino, evitando la máscara de mayúsculas.
- source_word: τὸν οὐράνιον
  english_pob_choice: the heavenly One
  chosen_spanish: el celestial
  alternatives_spanish:
  - el celestial Uno
  - el de los cielos
  - el Dios del cielo
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado en aposición. «El celestial» preserva esa brevedad y tensión, aunque en español suene menos usual; se evita sustituirlo por «el Dios del cielo» en el texto principal porque el griego de Swete no lo dice así de forma explícita.
- source_word: παρέδωκεν
  english_pob_choice: he gave
  chosen_spanish: él los entregó
  alternatives_spanish:
  - los puso en manos de
  - los entregó
  lexicon: BDAG
  rationale: En contexto de juicio, el verbo implica entrega a poder ajeno. «Entregó» conserva el sentido hostil y bíblico que el propio complemento desarrolla.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: BDAG
  rationale: Expresión idiomática común en español bíblico y moderno. «En manos de» mantiene la imagen de dominio/poder con naturalidad.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nabucodonosor
  lexicon: LSJ
  rationale: Se adopta la transliteración tradicional en español para el rey babilónico, plenamente reconocible y fiel al nombre griego.
- source_word: βασιλέως Βαβυλῶνος, βασιλέως τῶν Χαλδαίων
  english_pob_choice: king of Babylon, king of the Chaldeans
  chosen_spanish: rey de Babilonia, rey de los caldeos
  alternatives_spanish:
  - rey de Babilonia, rey de los caldeos
  - rey de Babilonia y rey de los caldeos
  lexicon: BDAG
  rationale: Se conservan ambos títulos reales, como en el griego, sin fundirlos en una sola denominación. Esto preserva el énfasis y la duplicación appositiva del texto.
theological_decisions:
- issue: Título divino κύριος en la frase «τὸν κύριον τοῦ Ἰσραὴλ»
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor
  - Señor Yahvé
  rationale: El texto griego contiene κύριος, y el audit trail inglés mantiene «Lord». En español se conserva «Señor» dentro del título, mientras «Yahvé» se usa para el nombre divino conforme al estándar del proyecto; así se evita borrar la tensión entre título y nombre.
  doctrine_reference: 'DOCTRINE.md: κύριος; nombre divino YHWH -> Yahvé'
- issue: La expresión τὸν οὐράνιον
  english_pob_reading: the heavenly One
  chosen_spanish_reading: el celestial
  alternative_spanish_readings:
  - el celestial
  - el celestial Uno
  - el Dios del cielo
  rationale: Se preserva la rareza del adjetivo sustantivado del griego. No se sustituye por una formulación más explícita como «Dios del cielo» en el texto principal, porque eso reflejaría una tradición paralela más amplia, no la forma exacta de esta línea griega.
  doctrine_reference: Translation philosophy §1, §3; control con fuente paralela semítica
- issue: Relación causal de la culpa ancestral y el exilio
  english_pob_reading: he gave them into the hands of Nebuchadnezzar...
  chosen_spanish_reading: él los entregó en manos de Nabucodonosor...
  alternative_spanish_readings:
  - él los puso en manos de Nabucodonosor...
  - él los entregó a Nabucodonosor...
  rationale: La entrega es punitiva y judicial. «En manos de» conserva el matiz de poder/posesión implícito en la expresión idiomática y mantiene la conexión con el juicio divino sin explicitar más de lo que el texto dice.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión más reciente del inglés auditado: la construcción participial se reflejó con una forma causal anterior («habiéndole provocado») para reproducir mejor el valor del participio griego, y se mantuvo la decisión de conservar el adjetivo sustantivado «the heavenly One» sin expandirlo al título más pleno de la tradición paralela.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto, y «Señor» para κύριος cuando funciona como título.
  - «Nabucodonosor» sigue la transliteración española tradicional y consistente con el uso bíblico.
  - Se conservan dos títulos reales coordinados por aposición, sin fusionarlos.
  - El registro mantiene un español bíblico claro, evitando arcaísmos innecesarios y sin borrar la rareza de «el celestial».
