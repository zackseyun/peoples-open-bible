base_translation:
  language: en
  yaml_path: translation/ot/ruth/001/016.yaml
  text: But Ruth said[a], “Do not urge me to leave you, to turn back from following you. For where you go, I will go; and where you lodge, I will lodge. Your people will be my people[d][c][b], and your God my God.”
  footnotes:
  - marker: a
    text: Or 'urge me,' 'entreat me,' or 'insist with me' for 'press me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from after you,' an idiom meaning 'from following you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'where you spend the night, I will spend the night.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew clauses 'Your people my people, and your God my God' are verbless; English may also render them 'Your people are my people, and your God is my God' or with future sense.
    reason: alternative_reading
