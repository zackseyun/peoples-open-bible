revisions:
- from: ¡Canten con júbilo[a], cielos, porque Yahvé ha hecho esto; den un grito de alegría, profundidades de la tierra. Estallen en canto, montes, oh bosque y todo árbol[b] que hay en él; porque Yahvé ha redimido a Jacob, y en Israel muestra su gloria.
  to: ¡Canten con júbilo, cielos, porque Yahvé lo ha hecho[a]; den un grito de alegría, profundidades de la tierra[b]. Estallen en canto, montes, oh bosque, y todo árbol que hay en él; porque Yahvé ha redimido a Jacob, y en Israel muestra su gloria[c].
  rationale: Se corrigió la elipsis de עָשָׂה con «lo ha hecho» para reflejar mejor el hebreo y el POB inglés; se movió la nota sobre «profundidades de la tierra» al lugar correcto; y se añadió la nota final sobre יִתְפָּאָר porque el rastro inglés conserva alternativas significativas que también deben preservarse en español. También se pulió la puntuación vocativa para mayor claridad.
