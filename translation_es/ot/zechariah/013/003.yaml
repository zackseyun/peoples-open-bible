revisions:
- from: 'Y sucederá que, si aún profetiza un hombre[a], su padre y su madre, los que lo engendraron, le dirán: «No vivirás, porque has hablado mentira en nombre de Yahvé[b]»; y su padre y su madre, los que lo engendraron, lo atravesarán cuando profetice.'
  to: 'Y sucederá que, si un hombre aún profetiza[a], su padre y su madre, quienes lo trajeron al mundo, le dirán: «No vivirás, porque has dicho mentiras en nombre de Yahvé»; y su padre y su madre, quienes lo trajeron al mundo, lo traspasarán[b] cuando profetice.'
  rationale: Se corrige la expresión poco idiomática «has hablado mentira» por «has dicho mentiras», se reemplaza «los que lo engendraron» por «quienes lo trajeron al mundo» para representar mejor יֹלְדָיו aplicado al padre y a la madre, y se ajusta la nota sobre דקר para no introducir «espada», que no aparece en el hebreo. También se mueve la nota [b] al verbo de perforación, que es donde corresponde léxicamente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: condición futura, identificación de los padres biológicos, sentencia de muerte por hablar falsedad en nombre de Yahvé, y acción violenta posterior. También conserva correctamente Yahvé para יְהוָה y mantiene la severidad del juicio sin suavizarla.'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero tiene dos problemas de naturalidad/fidelidad: «has hablado mentira» suena poco idiomático en español bíblico actual, y «los que lo engendraron» no representa bien a ambos padres, especialmente a la madre, frente al matiz más amplio de «quienes lo trajeron al mundo / lo dieron a luz». Además, la nota [b] introduce «con una espada», detalle no presente en el hebreo.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» está correcto; נבא -> «profetiza/profetice» está bien; דקר se mantiene con fuerza violenta. La principal mejora léxica es ajustar שקר דברת a un español natural como «has dicho mentiras», y revisar יֹלְדָיו a una formulación que incluya adecuadamente al padre y a la madre sin sesgo de género biológico exclusivo.'
  issues:
  - severity: medium
    issue: «has hablado mentira» es poco natural en español
    rationale: Aunque intenta reflejar el singular hebreo שקר, en español suena forzado. «Has dicho mentiras» o «has hablado falsamente» transmite mejor la acusación sin perder fuerza.
  - severity: medium
    issue: «los que lo engendraron» no representa bien a ambos padres en este contexto
    rationale: El participio hebreo identifica a los padres como quienes le dieron origen/nacimiento. «Engendraron» encaja mal con la madre y suena menos natural que «quienes lo trajeron al mundo» o similar.
  - severity: low
    issue: La nota [b] añade «con una espada», detalle no explicitado por el hebreo
    rationale: דקר denota perforar con arma, pero no especifica espada. La nota debe conservar alternativas como «lo apuñalarán» o «lo traspasarán» sin concretar un arma no mencionada.
  revised_spanish_text: 'Y sucederá que, si un hombre aún profetiza[a], su padre y su madre, quienes lo trajeron al mundo, le dirán: «No vivirás, porque has dicho mentiras en nombre de Yahvé»; y su padre y su madre, quienes lo trajeron al mundo, lo traspasarán[b] cuando profetice.'
  revised_footnotes:
  - marker: a
    text: O «si un hombre profetiza de nuevo». El hebreo עוֹד puede señalar acción continuada o renovada.
    reason: lexical_alternative
  - marker: b
    text: O «lo atravesarán» o «lo apuñalarán». El verbo hebreo denota perforar con un arma.
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión poco idiomática «has hablado mentira» por «has dicho mentiras», se reemplaza «los que lo engendraron» por «quienes lo trajeron al mundo» para representar mejor יֹלְדָיו aplicado al padre y a la madre, y se ajusta la nota sobre דקר para no introducir «espada», que no aparece en el hebreo. También se mueve la nota [b] al verbo de perforación, que es donde corresponde léxicamente.
