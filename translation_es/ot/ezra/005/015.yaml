translation:
  language: es
  text: 'Y le dijo: «Toma estos utensilios, ve y ponlos en el templo que está en Jerusalén, y que la casa de Dios sea reconstruida en su sitio[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lugar». La expresión aramea enfatiza la reconstrucción de la casa de Dios en su ubicación apropiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַר לֵהּ
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo a él
  alternatives_spanish:
  - Y le dijo
  - Entonces le dijo
  lexicon: HALOT
  rationale: Mantiene la introducción narrativa y refleja explícitamente el pronombre de 3.ª persona y el complemento indirecto del arameo. En español, "le dijo a él" suena algo marcado pero conserva la referencia sin ambigüedad; se evita omitir el destinatario porque el texto fuente lo expresa.
- source_word: מָאנַיָּא
  english_pob_choice: these vessels
  chosen_spanish: estos utensilios
  alternatives_spanish:
  - estos vasos
  - estos recipientes
  - estos objetos
  lexicon: HALOT
  rationale: En contexto se refiere a los objetos del templo trasladados desde Jerusalén. "Utensilios" conserva el valor de implementos/objetos sagrados sin forzar una imagen demasiado específica de recipientes. Se evita "vasos" por posible restricción semántica en español moderno.
- source_word: שֵׂא
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Lleva
  - Toma y lleva
  lexicon: HALOT
  rationale: El imperativo de נשׂא puede implicar tomar/cargar. "Toma" funciona naturalmente en una cadena de mandatos en español y conserva el sentido de recibir los objetos para transportarlos.
- source_word: אֵזֶל
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - sal
  lexicon: HALOT
  rationale: Imperativo de movimiento directo. "Ve" es la forma más natural y transparente en español para la secuencia de órdenes.
- source_word: אֲחֵת הִמּוֹ
  english_pob_choice: put them
  chosen_spanish: ponlos
  alternatives_spanish:
  - colócalos
  - déjalos
  lexicon: HALOT
  rationale: El verbo indica poner/colocar los objetos. "Ponlos" reproduce la acción simple y directa sin añadir matices ausentes en el original.
- source_word: בְּהֵיכְלָא
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el palacio
  - en el santuario
  lexicon: HALOT
  rationale: Aunque הֵיכָל puede significar palacio, el contexto de los utensilios sagrados y la reconstrucción del edificio de Dios exige "templo".
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se encuentra en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa define el templo. "Que está en Jerusalén" preserva la relación sintáctica del arameo con un español natural.
- source_word: וּבֵית אֱלָהָא
  english_pob_choice: and let the house of God
  chosen_spanish: y que la casa de Dios
  alternatives_spanish:
  - y la casa de Dios
  - y sea reconstruida la casa de Dios
  lexicon: HALOT
  rationale: Conserva la designación literal del templo como "casa de Dios" y mantiene la fuerza exhortativa/prescriptiva del conjunto de mandatos mediante "que".
- source_word: יִתְבְּנֵא
  english_pob_choice: be rebuilt
  chosen_spanish: sea reconstruida
  alternatives_spanish:
  - sea edificada
  - sea construida
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva pide un verbo en voz pasiva o perifrástica. "Reconstruida" explicita el trasfondo restaurativo de Ezra sin perder la idea básica de edificación.
- source_word: עַל אַתְרֵהּ
  english_pob_choice: on its site
  chosen_spanish: en su sitio
  alternatives_spanish:
  - en su lugar
  - sobre su lugar
  - en su emplazamiento
  lexicon: HALOT
  rationale: אַתְרָא es "lugar, sitio". "En su sitio" refleja bien el lugar propio de reconstrucción y suena natural en español. Se evita una literalidad rígida como "sobre su lugar".
translation_notes:
  revision_awareness: La versión española sigue la revisión final del inglés auditado, especialmente la secuencia natural de imperativos "go and put them". No se requiere nota textual adicional porque no se adoptó una alternativa que necesite glosa.
  spanish_consistency_notes:
  - Se mantuvo "Dios" para אֱלָהָא conforme al estándar del proyecto.
  - Se eligió "templo" para הֵיכָל en este contexto por referencia inequívoca al templo de Jerusalén.
  - Se usó "reconstruida" para hacer explícito el valor restaurativo de יִתְבְּנֵא en el contexto de Esdras.
  - No se introdujo una nota al pie porque no quedó ninguna alternativa textual que requiriera marcador en el texto español.
