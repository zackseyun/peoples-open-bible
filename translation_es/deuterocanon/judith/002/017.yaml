translation:
  language: es
  text: Y tomó camellos, asnos y mulos para su equipaje[a], una multitud muy grande, y ovejas, ganado y cabras para sus provisiones[b], de las cuales no había número[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para su bagaje» o «para sus pertrechos»; ἀπαρτία abarca el conjunto de equipo o carga destinada a la marcha.
    reason: lexical_alternative
  - marker: b
    text: O «para sus suministros»; παρασκευή puede significar preparación o abastecimiento, y aquí probablemente apunta a la comida y el aprovisionamiento.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de las cuales no había número», es decir, eran innumerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - adquirió
  lexicon: LSJ
  rationale: El verbo griego expresa la toma o adquisición de los animales y suministros para la expedición; en español, «tomó» es natural, directo y suficientemente amplio sin sugerir violencia.
- source_word: καμήλους
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: LSJ
  rationale: Término zoológico directo y transparente en español.
- source_word: ὄνους
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  lexicon: LSJ
  rationale: «Asnos» conserva mejor el registro bíblico y el valor léxico del griego que «burros», aunque ambos son posibles en español.
- source_word: ἡμιόνους
  english_pob_choice: mules
  chosen_spanish: mulos
  alternatives_spanish:
  - acémilas
  lexicon: LSJ
  rationale: «Mulos» es el equivalente más directo; «acémilas» es más general y menos preciso para el término griego.
- source_word: εἰς τὴν ἀπαρτίαν αὐτῶν
  english_pob_choice: for their baggage
  chosen_spanish: para su equipaje
  alternatives_spanish:
  - para su bagaje
  - para su bagaje y pertrechos
  - para su equipamiento
  lexicon: LSJ
  rationale: La revisión inglesa favorece «baggage» por el contexto logístico; en español, «equipaje» transmite bien el conjunto de cargas transportadas, sin restringirlo solo a objetos personales. Se conserva la nota porque ἀπαρτία también puede abarcar el equipo o pertrechos.
- source_word: πλῆθος πολὺ σφόδρα
  english_pob_choice: a very great multitude
  chosen_spanish: una muchedumbre muy grande
  alternatives_spanish:
  - una multitud muy grande
  - un número inmenso
  lexicon: LSJ
  rationale: La construcción intensificadora queda natural en español con «muchedumbre muy grande», que preserva tanto la idea de multitud como el énfasis acumulativo.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado lanar
  lexicon: LSJ
  rationale: Glosa estándar y clara.
- source_word: βόας
  english_pob_choice: cattle
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado vacuno
  - bueyes
  lexicon: LSJ
  rationale: En una lista de animales para provisiones, «vacas» es la opción más natural en español; «bueyes» estrecharía indebidamente el referente a animales de tiro.
- source_word: αἶγας
  english_pob_choice: goats
  chosen_spanish: cabras
  alternatives_spanish:
  - chivas
  lexicon: LSJ
  rationale: Glosa estándar y transparente.
- source_word: εἰς τὴν παρασκευὴν αὐτῶν
  english_pob_choice: for their provisions
  chosen_spanish: para sus provisiones
  alternatives_spanish:
  - para sus suministros
  - para su preparación
  lexicon: LSJ
  rationale: La revisión inglesa entiende aquí aprovisionamiento, y el contexto de animales para comida refuerza esa lectura; «provisiones» es el equivalente más natural y preciso.
- source_word: ὧν οὐκ ἦν ἀριθμός
  english_pob_choice: of which there was no number
  chosen_spanish: de las cuales no había número
  alternatives_spanish:
  - que eran innumerables
  - de las cuales no se podía contar
  lexicon: LSJ
  rationale: La formulación mantiene la construcción idiomática y el paralelismo del griego, preservando la imagen bíblica de incontabilidad sin suavizarla a una mera paráfrasis.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «baggage» para ἀπαρτία. La versión española adopta «equipaje» para reflejar esa misma decisión logística, sin perder la amplitud semántica del término. También se conservó el sentido de aprovisionamiento en παρασκευή y la fórmula idiomática de incontabilidad en la clausula final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece vocabulario cristológico en el pasaje.
  - «Provisiones» y «equipaje» se usan con sus valores contextuales, no como equivalentes técnicos fijos.
  - La coordinación de la lista de animales sigue de cerca el orden griego para conservar el ritmo enumerativo.
