  glossary_alignment: No hay conflicto con la terminología global del proyecto. Los nombres propios «Eliasaf» y «Deuel» son aceptables en español. «Hijos de Gad» preserva correctamente el modismo tribal del hebreo, con nota alternativa sobre «gaditas».
