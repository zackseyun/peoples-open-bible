translation:
  language: es
  text: Desde el cielo pelearon las estrellas; desde sus cursos[a] pelearon[b] contra Sísara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desde sus caminos’, ‘desde sus trayectorias’ o ‘desde sus sendas’; el término hebreo puede referirse a rutas o cursos, y aquí probablemente a las trayectorias asignadas de las estrellas en el cielo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘con Sísara’; en contextos de combate esta construcción suele significar ‘contra Sísara’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן שָׁמַיִם
  english_pob_choice: From heaven
  chosen_spanish: Desde los cielos
  alternatives_spanish:
  - Desde el cielo
  - Desde el cielo mismo
  lexicon: HALOT
  rationale: מִן + שָׁמַיִם expresa procedencia; en español, el plural 'cielos' conserva mejor la forma hebrea y el tono poético, sin forzar una singularización idiomática.
- source_word: נִלְחָמוּ
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - lucharon
  - combatieron
  lexicon: HALOT
  rationale: El verbo denota participación en batalla. 'Pelearon' es claro, natural y mantiene la repetición poética del verso sin añadir matices técnicos innecesarios.
- source_word: הַכּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: los estrellas
  alternatives_spanish:
  - las estrellas
  - los astros
  lexicon: HALOT
  rationale: El hebreo dice 'las estrellas'; en español la forma normativa es 'las estrellas'. Se conserva la imagen astral de manera directa y transparente.
- source_word: מִמְּסִלּוֹתָם
  english_pob_choice: from their courses
  chosen_spanish: desde sus trayectos
  alternatives_spanish:
  - desde sus caminos
  - desde sus cursos
  - desde sus sendas
  lexicon: HALOT
  rationale: מְסִלּוֹת puede significar caminos, rutas o cursos; en paralelo con 'estrellas', 'trayectos' comunica el movimiento/recorrido celeste sin decidir de forma excesiva entre ruta, órbita o senda. 'Cursos' sería más técnico; 'caminos' puede sonar demasiado terrestre.
- source_word: עִם סִיסְרָא
  english_pob_choice: against Sisera
  chosen_spanish: contra Sísara
  alternatives_spanish:
  - con Sísara
  lexicon: HALOT
  rationale: Aunque עִם literalmente significa 'con', en contextos de guerra con לחם puede marcar al adversario. 'Contra Sísara' sigue el sentido reconocido por el POB inglés y evita una lectura engañosa en español.
theological_decisions:
- issue: Las estrellas como agentes de combate
  english_pob_reading: Retain the poetic statement that the stars fought, without explaining whether this is literal cosmic intervention, angelic imagery, or metaphorical description of divine providence.
  chosen_spanish_reading: Mantener la afirmación poética de que las estrellas pelearon, sin precisar si se trata de intervención cósmica literal, imagen de seres celestiales o metáfora de la providencia divina.
  alternative_spanish_readings:
  - Interpretación literal cósmica
  - Imaginería de hueste celestial/angélica
  - Metáfora poética de fuerzas naturales ordenadas providencialmente
  rationale: El cántico de Débora presenta lenguaje poético elevado y no explica el mecanismo. La versión española conserva esa tensión teológica en vez de resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó sin modificaciones y hubo acuerdo alto con la evaluación de revisión, por lo que la propuesta española mantiene la lectura estable del texto fuente y del POB inglés.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva el tono poético y la repetición verbal del hebreo con dos instancias de 'pelearon'.
  - Se evita introducir 'Mesías', 'SEÑOR' u այլ terminología no presente en el texto.
  - Se normaliza el nombre propio como 'Sísara' con acento gráfico según uso español.
