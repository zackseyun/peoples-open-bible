id: 3MA.2.8
reference: 3 Maccabees 2:8
source:
  edition: lxx-swete-1909
  text: σύ, βασιλεῦ, κτίσας τὴν ἀπέρατον καὶ ἀμέτρητον γῆν, ἐξελέξω τὴν πόλιν ταύτην, καὶ ἡγίασας τὸν τόπον τοῦτον εἰς σὸν ὄνομά σοι τῷ τῶν ἁπάντων ἀπροσδεεῖ, καὶ παρεδόξασας ἐν ἐπιφανείᾳ μεγαλοπρεπεῖ, σύστασιν ποιησάμενος αὐτοῦ πρὸς δόξαν τοῦ μεγάλου καὶ ἐντίμου ὀνόματός σου.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: You[a], O King, having created the boundless and immeasurable earth, chose this city and made this place holy for your name, though you have no need of anything[b], O God of all, and glorified it with majestic manifestation, having established it for the glory of your great and honored name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in majestic appearance' or 'by a splendid appearing'; the Greek phrase may refer to a visible divine epiphany.
    reason: lexical_alternative
  - marker: b
    text: The Greek text in this clause is syntactically difficult; the translation understands it as addressing God as the one who needs nothing and is God of all.
    reason: alternative_reading
lexical_decisions:
- source_word: βασιλεῦ
  chosen: O King
  alternatives:
  - King
  - sovereign
  lexicon: LSJ
  rationale: Vocative address to God in prayer is best preserved directly. 'O King' keeps the elevated prayer tone without archaic excess beyond the natural vocative force.
- source_word: κτίσας
  chosen: having created
  alternatives:
  - creating
  - who created
  lexicon: LSJ
  rationale: Aorist participle preceding the main verbs; 'having created' preserves the participial relation and grounds the following acts in God's prior creative work.
- source_word: ἀπέρατον καὶ ἀμέτρητον γῆν
  chosen: the boundless and immeasurable earth
  alternatives:
  - the limitless and measureless earth
  - the vast and immeasurable land
  lexicon: LSJ
  rationale: Both adjectives intensify the scale of the created world. 'Earth' is preferable to 'land' in this cosmic-creation context.
- source_word: ἐξελέξω
  chosen: chose
  alternatives:
  - selected
  - elected
  lexicon: LSJ
  rationale: Refers to divine choosing of Jerusalem. 'Chose' is the most natural English equivalent and preserves biblical resonance without importing later theological technicality.
- source_word: ἡγίασας
  chosen: made ... holy
  alternatives:
  - sanctified
  - consecrated
  lexicon: LSJ
  rationale: '''Made holy'' is clear modern English and preserves the holiness concept without relying on more ecclesiastical diction.'
- source_word: εἰς σὸν ὄνομά
  chosen: for your name
  alternatives:
  - for your namesake
  - unto your name
  lexicon: LSJ
  rationale: The phrase expresses dedication to God's name. 'For your name' is concise and close to the Greek.
- source_word: ἀπροσδεεῖ
  chosen: who have need of nothing
  alternatives:
  - self-sufficient
  - needing nothing
  lexicon: LSJ
  rationale: The adjective describes God as lacking nothing, and the dative phrase is appositional to the addressee. This fuller rendering communicates the theological sense more transparently than the abstract 'self-sufficient'.
- source_word: τῷ τῶν ἁπάντων
  chosen: the God of all
  alternatives:
  - the one over all
  - the one of all things
  lexicon: LSJ
  rationale: The phrase identifies the addressee as universal sovereign. 'The God of all' makes the implied referent explicit in idiomatic English and fits the prayer context.
- source_word: παρεδόξασας
  chosen: glorified it
  alternatives:
  - honored it greatly
  - made it glorious
  lexicon: LSJ
  rationale: The verb intensifies δοξάζω; 'glorified it' preserves the glory language that recurs later in the verse.
- source_word: ἐν ἐπιφανείᾳ μεγαλοπρεπεῖ
  chosen: with majestic manifestation
  alternatives:
  - in majestic appearance
  - by a splendid appearing
  lexicon: LSJ
  rationale: The phrase likely refers to a conspicuous divine manifestation. 'With majestic manifestation' preserves both the instrumental sense and the epiphanic nuance.
- source_word: σύστασιν ποιησάμενος αὐτοῦ
  chosen: having established it
  alternatives:
  - having founded it
  - having constituted it
  lexicon: LSJ
  rationale: The construction is somewhat compressed in the source, but the sense is that God set up or founded the place/city. 'Established it' is broad enough to cover the institutional/foundational nuance.
- source_word: πρὸς δόξαν τοῦ μεγάλου καὶ ἐντίμου ὀνόματός σου
  chosen: for the glory of your great and honored name
  alternatives:
  - to the glory of your great and precious name
  - for the glory of your great and noble name
  lexicon: LSJ
  rationale: πρὸς here expresses purpose. 'Honored' is a natural rendering of ἐντίμου, and retaining 'glory' and 'name' preserves the theological diction of the Greek.
