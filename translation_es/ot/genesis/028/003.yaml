translation:
  language: es
  text: Y que Dios Todopoderoso[a] te bendiga, te haga fecundo y te multiplique, para que llegues a ser una asamblea de pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «El Shaddai». Tradicionalmente se vierte «Dios Todopoderoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - El Shaddai
  - Dios Shaddai
  - el Dios Todopoderoso
  lexicon: HALOT
  rationale: Se traduce el título divino en vez de transliterarlo. «Dios Todopoderoso» conserva tanto el elemento «Dios» como la fuerza de שַׁדַּי, y es natural en español bíblico sin ocultar el título original, que queda documentado en nota.
- source_word: יְבָרֵךְ
  english_pob_choice: may he bless
  chosen_spanish: te bendiga
  alternatives_spanish:
  - que te bendiga
  - te bendecirá
  - bendígate
  lexicon: HALOT
  rationale: En este contexto de bendición, el imperfecto tiene valor jussivo. En español, «te bendiga» expresa adecuadamente deseo o súplica y evita una traducción mecánica al futuro.
- source_word: וְיַפְרְךָ
  english_pob_choice: make you fruitful
  chosen_spanish: te haga fecundo
  alternatives_spanish:
  - te haga fructífero
  - te haga fructificar
  - te haga fértil
  lexicon: HALOT
  rationale: El hifil es causativo; «te haga fecundo» preserva la causalidad y suena natural en español. Se evita un calco tosco como «frutificarte».
- source_word: וְיַרְבֶּךָ
  english_pob_choice: multiply you
  chosen_spanish: te multiplique
  alternatives_spanish:
  - te haga aumentar
  - te haga muchos
  - te incremente
  lexicon: HALOT
  rationale: «Multiplique» reproduce bien el sentido de aumento numeroso en el marco patriarcal y mantiene un tono bíblico claro sin perder inteligibilidad.
- source_word: וְהָיִיתָ
  english_pob_choice: so that you may become
  chosen_spanish: llegarás a ser
  alternatives_spanish:
  - y serás
  - para que seas
  - de modo que seas
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede leerse con sentido de resultado, el español necesita una relación más fluida con las bendiciones previas. «Llegarás a ser» expresa el resultado prometido sin añadir una paráfrasis innecesaria.
- source_word: לִקְהַל עַמִּים
  english_pob_choice: an assembly of peoples
  chosen_spanish: una asamblea de pueblos
  alternatives_spanish:
  - una congregación de pueblos
  - una reunión de pueblos
  - una multitud de pueblos
  lexicon: HALOT
  rationale: «Qahal» es una asamblea congregada; «asamblea» es transparente y mantiene el carácter colectivo. «Pueblos» conserva el plural de עמים, indicando múltiples pueblos/naciones y no solo mucha gente.
theological_decisions:
- issue: Tratamiento de יהוה en un versículo donde aparece en la construcción de bendición
  english_pob_reading: The English audit trail translates the divine name according to the project default and renders the blessing jussively.
  chosen_spanish_reading: Se mantiene «Yahvé» como forma principal del nombre divino y se conserva el valor desiderativo/jussivo en «te bendiga».
  alternative_spanish_readings:
  - SEÑOR
  - el Señor te bendiga
  rationale: El proyecto pide «Yahvé» para יהוה en el texto principal. No se enmascara el nombre con mayúsculas litúrgicas. La sintaxis española conserva el tono de bendición-súplica del hebreo mediante el subjuntivo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate divine name as Yahvé; preserve lexical transparency)'
- issue: Valor de la secuencia final de resultado en la bendición patriarcal
  english_pob_reading: so that you may become an assembly of peoples
  chosen_spanish_reading: llegarás a ser una asamblea de pueblos
  alternative_spanish_readings:
  - para que seas una asamblea de pueblos
  - de modo que seas una asamblea de pueblos
  rationale: La cláusula final expresa el desenlace de las bendiciones. «Llegarás a ser» comunica ese resultado de manera clara y sin atribuir una finalidad distinta de la que el hebreo sostiene.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Preserve discourse relations where clear)'
- issue: Posible tensión entre singular bendición patriarcal y pluralidad de «pueblos»
  english_pob_reading: an assembly of peoples
  chosen_spanish_reading: una asamblea de pueblos
  alternative_spanish_readings:
  - una asamblea de naciones
  - una congregación de pueblos
  rationale: Se conserva la pluralidad de עמים para no diluir el alcance multiétnico de la promesa. «Pueblos» es suficientemente amplio y bíblicamente reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve lexical and covenantal scope)'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la construcción de bendición a una forma más natural («And may God Almighty bless you»). En español, la misma decisión se refleja con un subjuntivo de bendición («te bendiga») y con una formulación fluida del resultado final. No se adoptó ninguna lectura que enmascare el nombre divino ni se introdujo una equivalencia más fuerte que la del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto, sin sustituirlo por «SEÑOR».
  - Se usa «Dios Todopoderoso» para אֵל שַׁדַּי, con nota que preserva la alternativa transliterada.
  - Se conserva el plural «pueblos» para עמים, evitando singularizar la promesa.
  - La frase verbal principal usa subjuntivo de bendición, coherente con el tono jussivo del hebreo.
