translation:
  language: es
  text: Sea bendita tu fuente[a], y alégrate con la esposa de tu juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu manantial» para «tu fuente». El hebreo conserva la metáfora del agua y puede insinuar tanto el origen de la vida como la fecundidad matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: Let ... be
  chosen_spanish: Sea ...
  alternatives_spanish:
  - Que ... sea
  - Déjese ...
  lexicon: HALOT
  rationale: El jussivo expresa deseo o exhortación. En español, «Sea» mantiene la fuerza volitiva de forma natural y breve.
- source_word: מְקוֹרְךָ
  english_pob_choice: your fountain
  chosen_spanish: tu fuente
  alternatives_spanish:
  - tu manantial
  - tu fuente de vida
  lexicon: HALOT
  rationale: מָקוֹר puede significar manantial, fuente u origen. «Fuente» conserva la metáfora acuática y la posible sugerencia de origen vital o fecundidad marital sin explicitar de más.
- source_word: בָרוּךְ
  english_pob_choice: blessed
  chosen_spanish: bendita
  alternatives_spanish:
  - bendecida
  - prosperada
  lexicon: HALOT
  rationale: En español, «bendita» transmite el estado pasivo de bendición con registro bíblico natural y sin perder el matiz de favor divino o prosperidad implícita.
- source_word: וּשְׂמַח
  english_pob_choice: and rejoice
  chosen_spanish: y regocíjate
  alternatives_spanish:
  - y alégrate
  - y deleítate
  lexicon: HALOT
  rationale: El imperativo exhorta a la alegría activa. «Regocíjate» mantiene intensidad y paralelo exhortativo con un tono digno.
- source_word: מֵאֵשֶׁת
  english_pob_choice: in the wife of
  chosen_spanish: con la esposa de
  alternatives_spanish:
  - en la esposa de
  - por la esposa de
  lexicon: HALOT
  rationale: El hebreo usa מִן/מֵ para indicar el objeto o fuente del gozo. En español, «regocíjate con» comunica mejor la relación afectiva sin imponer una abstracción innecesaria.
- source_word: נְעוּרֶיךָ
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tus años mozos
  - tu juventud temprana
  lexicon: HALOT
  rationale: La expresión fija «esposa de tu juventud» es comprensible y fiel. «Juventud» preserva el sentido temporal y la fórmula proverbial.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene «fountain» y una nota sobre la alternativa «spring», con la observación de que el hebreo conserva la metáfora acuática y puede implicar tanto la fuente de vida como la fecundidad marital. La versión española sigue esa misma decisión con «fuente» y una nota equivalente.
  spanish_consistency_notes:
  - Se mantiene el paralelismo exhortativo de dos miembros.
  - Se conserva la metáfora acuática sin sustituirla por una paráfrasis explicativa.
  - «Esposa de tu juventud» reproduce la fórmula hebrea tradicional sin modernizarla a un giro más interpretativo.
