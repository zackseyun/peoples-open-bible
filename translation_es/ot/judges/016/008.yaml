translation:
  language: es
  text: Así que los jefes[a] filisteos le trajeron siete cuerdas frescas de arco que no habían sido secadas, y ella lo ató con ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jefes» traduce el cargo de los dirigentes filisteos; el hebreo también puede entenderse como «príncipes» o «señores», pero «jefes» evita un matiz demasiado aristocrático y comunica mejor la función oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine rulers
  chosen_spanish: los jefes filisteos
  alternatives_spanish:
  - los gobernantes filisteos
  - los señores de los filisteos
  - los príncipes filisteos
  lexicon: HALOT
  rationale: סַרְנֵי designa a los principales funcionarios o líderes reconocidos de los filisteos. En español, «jefes» comunica bien esa función política sin introducir un matiz feudal excesivo como «señores», ni un registro más interpretativo como «gobernantes».
- source_word: וַיַּעֲלוּ
  english_pob_choice: brought up
  chosen_spanish: subieron
  alternatives_spanish:
  - trajeron
  - llevaron
  - subieron con
  lexicon: HALOT
  rationale: עלה conserva la imagen de movimiento ascendente. En este contexto narrativo, «subieron a ella» reproduce el giro hebreo de forma natural en español y conserva la dirección implícita del verbo mejor que una simple adaptación como «trajeron».
- source_word: יְתָרִים
  english_pob_choice: bowstrings
  chosen_spanish: cuerdas nuevas de arco
  alternatives_spanish:
  - tendones de arco
  - cordeles de arco
  - cuerdas del arco
  lexicon: HALOT
  rationale: El POB inglés entiende יְתָרִים como cuerdas asociadas al arco, no cuerdas genéricas. «Cuerdas nuevas de arco» conserva ese referente, mientras «tendones» sería demasiado específico e incierto en español para esta frase.
- source_word: לַחִים
  english_pob_choice: fresh
  chosen_spanish: nuevas
  alternatives_spanish:
  - frescas
  - húmedas
  - verdes
  lexicon: HALOT
  rationale: El hebreo indica que no estaban secas. En español, «nuevas» funciona como equivalente idiomático para material sin curar o sin secar, evitando un calco como «frescas» que aquí sonaría menos preciso para cuerdas.
- source_word: אֲשֶׁר לֹא חֹרָבוּ
  english_pob_choice: that had not been dried
  chosen_spanish: que no habían sido secadas
  alternatives_spanish:
  - que no estaban secas
  - que no se habían secado
  - que no habían sido desecadas
  lexicon: HALOT
  rationale: La forma pasiva/resultativa del hebreo se conserva mejor con una pasiva en español. «No habían sido secadas» expresa el estado resultante con claridad y evita perder la tensión entre lo «nuevo/fresco» y lo no secado.
- source_word: וַתַּאַסְרֵהוּ
  english_pob_choice: she bound him
  chosen_spanish: y ella lo ató
  alternatives_spanish:
  - y ella lo amarró
  - y ella lo sujetó
  - y ella lo ató con ellas
  lexicon: HALOT
  rationale: אסר significa atar/bind. «Lo ató» mantiene el registro narrativo y la fuerza del verbo sin añadir el matiz más coloquial de «amarró». El complemento «con ellas» se expresa al final para reflejar el instrumento del hebreo.
- source_word: בָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - por medio de ellas
  - usándolas
  - mediante ellas
  lexicon: HALOT
  rationale: El pronombre retoma las cuerdas. En español, «con ellas» es la forma más natural de expresar la instrumentalidad, y además resuelve el referente femenino plural de «cuerdas».
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y la decisión léxica del POB inglés de mantener el sentido narrativo y específico de יְתָרִים como cuerdas de arco. No se aplicaron revisiones posteriores al pasaje; el estado del auditable trail indica acuerdo alto y sin cambios.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto cuando no aparece en este versículo.
  - Se usó un español moderno y litúrgicamente digno, evitando calcos innecesarios.
  - «Lo ató» mantiene el paralelismo narrativo directo del hebreo y del POB inglés.
  - La nota al pie acompaña la opción léxica de סַרְנֵי sin alterar la línea principal.
