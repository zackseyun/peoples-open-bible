translation:
  language: es
  text: Pues Ezequías hizo lo bueno[a], y fue fuerte en los caminos de David, según le mandó Isaías el profeta, el que fue alabado entre los profetas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «hizo lo que agradaba al Señor». El hebreo conservado lee simplemente «hizo lo bueno».'
    reason: alternative_reading
  - marker: b
    text: El griego describe aquí a Isaías como «el gran profeta, fiel en su visión». El hebreo dice «el que fue alabado entre los profetas».
    reason: textual_variant
lexical_decisions:
- source_word: כי / For
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: La partícula introduce una afirmación explicativa y motivadora dentro del elogio de Ezequías. «Porque» conserva bien la conexión lógica en español bíblico sin forzar una causalidad ajena al contexto.
- source_word: עשה ... את הטוב
  english_pob_choice: did what was good
  chosen_spanish: hizo lo bueno
  alternatives_spanish:
  - hizo lo que era bueno
  - hizo lo recto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hizo el bien / lo bueno». «Hizo lo bueno» es breve, fiel y respeta la preferencia del testimonio hebreo sin importar la expansión griega «ante el Señor» en el texto principal.
- source_word: ויחזק
  english_pob_choice: was strong
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - fue fuerte
  - perseveró
  lexicon: HALOT
  rationale: El verbo admite un valor intransitivo/reflexivo en este contexto. «Se fortaleció» comunica el sentido de firmeza y consolidación, y suena natural en español sin suavizar demasiado el matiz de vigor o estabilidad.
- source_word: בדרכי דוד
  english_pob_choice: in the ways of David
  chosen_spanish: en los caminos de David
  alternatives_spanish:
  - en las sendas de David
  - en la conducta de David
  lexicon: HALOT
  rationale: «Caminos» mantiene la imagen bíblica convencional de conducta o andar conforme a un modelo. Es la opción más transparente y conservadora para el lector en español.
- source_word: כאשר צוהו
  english_pob_choice: as ... commanded him
  chosen_spanish: según le mandó
  alternatives_spanish:
  - como le mandó
  - tal como le mandó
  lexicon: HALOT
  rationale: La relación hebrea puede expresarse de forma compacta en español con «según le mandó». Conserva la fuerza de la instrucción sin introducir elementos no explícitos.
- source_word: ישעיה הנביא
  english_pob_choice: Isaiah the prophet
  chosen_spanish: Isaías el profeta
  alternatives_spanish:
  - el profeta Isaías
  lexicon: HALOT
  rationale: Ambas disposiciones son posibles; se eligió la secuencia que sigue más de cerca el orden hebreo y permanece clara en español.
- source_word: המהלל בנביאים
  english_pob_choice: the one praised among the prophets
  chosen_spanish: el que fue alabado entre los profetas
  alternatives_spanish:
  - el alabado entre los profetas
  - celebrado entre los profetas
  lexicon: HALOT
  rationale: La frase hebrea es apposicional y compacta. «El que fue alabado entre los profetas» conserva el pasivo y evita forzar la variante griega al cuerpo principal. Se mantiene la tensión textual documentada entre el hebreo y el griego.
theological_decisions:
- issue: Si incorporar «al Señor» desde el paralelo griego
  english_pob_reading: Omitted from the main text
  chosen_spanish_reading: Omitido del texto principal
  alternative_spanish_readings:
  - hizo lo que agradó al Señor
  - hizo lo bueno ante Yahvé
  rationale: El testimonio hebreo conservado dice simplemente que Ezequías «hizo lo bueno». Como el hebreo está disponible y es el testimonio primario para esta sección, no se importa la aclaración griega al texto principal. La variante griega se documenta en nota.
  doctrine_reference: Primacía del original disponible y preservación de variantes significativas sin armonización forzada.
- issue: Cómo rendir la descripción final de Isaías
  english_pob_reading: 'Followed the Hebrew: ''the one praised among the prophets'''
  chosen_spanish_reading: 'Seguido el hebreo: «el que fue alabado entre los profetas»'
  alternative_spanish_readings:
  - el gran profeta, fiel en su visión
  - el profeta grande y fiel en su visión
  rationale: El hebreo y el griego difieren de forma real en la caracterización final de Isaías. Se preserva el hebreo en el texto principal por ser el testimonio conservado, y se anota la lectura griega como alternativa relevante.
  doctrine_reference: Mantener la tensión textual y no resolverla artificialmente; documentar la variante para auditoría.
translation_notes:
  revision_awareness: 'He seguido el testimonio hebreo conservado para el cuerpo principal, manteniendo en nota las dos variantes destacadas por el audit trail inglés: la expansión griega «al Señor» y la caracterización griega final de Isaías. La redacción española procura ser publicable, sobria y auditable, sin calco mecánico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo el texto principal sigue el hebreo conservado y la nota a documenta la expansión griega con «el Señor» según el audit trail.
  - «Mesías/Cristo» no aparece en este versículo.
  - «Profeta» se conserva en minúscula como título común; la apposición final se rinde de manera natural en español.
  - «Se fortaleció» refleja el valor verbal de חזק sin convertirlo en un simple adjetivo de estado.
