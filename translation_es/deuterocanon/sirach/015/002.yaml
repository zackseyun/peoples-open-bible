review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo primario y la nota conserva adecuadamente la variante griega. Mantiene la personificación femenina de la Sabiduría y refleja la estructura del verso. Sin embargo, la elección principal «se le adelantará» para וְקִדְּמַתְהוּ / ὑπαντήσεται introduce en español un matiz de anticiparse o tomar delantera que no expresa con claridad la idea básica de ir al encuentro. El sentido fuente y la auditoría inglesa favorecen más directamente «irá a su encuentro» o «saldrá a su encuentro».
  spanish_quality_summary: El español es generalmente digno y claro, pero «se le adelantará» suena algo ambiguo y puede entenderse como 'anticiparse' más que 'encontrarse con iniciativa'. El resto de la línea es natural y legible. «La sabiduría» en minúscula es aceptable en español, aunque el pasaje personifica claramente a Sabiduría; no es necesario cambiarlo para fidelidad. La nota está bien redactada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La personificación femenina se conserva correctamente. «Esposa de su juventud» alinea bien con la decisión POB de seguir el hebreo en el texto principal y relegar la resonancia griega de virginidad a una nota.
  issues:
  - severity: medium
    issue: «se le adelantará» no expresa con suficiente precisión la idea de ir al encuentro
    rationale: El hebreo קדם y el griego ὑπαντήσεται apuntan a una acción de salir/ir al encuentro. En español, «adelantarse» suele implicar anticiparse, sobrepasar o tomar la delantera, creando una ambigüedad no presente en la línea fuente.
  revised_spanish_text: La sabiduría irá a su encuentro como una madre[a], y lo recibirá como la esposa de su juventud.
  revised_footnotes:
  - marker: a
    text: 'Griego: "como una mujer de virginidad"; es decir, como una esposa joven o una novia virginal.'
    reason: alternative_reading
  revision_rationale: Se reemplaza «se le adelantará» por «irá a su encuentro» para reflejar con mayor fidelidad y claridad el sentido hebreo y griego de salir al encuentro. Se conserva el resto del verso, incluida la nota sobre la variante griega, porque representa bien la decisión textual documentada por el POB.
