translation:
  language: es
  text: En aquellos días y en aquel tiempo[a], declara Yahvé, vendrán los hijos de Israel[b], ellos y los hijos de Judá juntos. Yendo y llorando, irán[c], y buscarán a Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa una doble fórmula temporal: «en aquellos días» y «en aquel tiempo».'
    reason: lexical_alternative
  - marker: b
    text: O «el pueblo de Israel ... y el pueblo de Judá juntos». El hebreo dice literalmente «los hijos de Israel» y «los hijos de Judá».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite la idea de ir: literalmente, «yendo y llorando, irán», expresando movimiento continuo acompañado de llanto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva de manera natural en español con ‘En aquellos días’. Mantiene el marco escatológico/restaurador sin explicarlo de más.
- source_word: וּבָעֵת הַהִיא
  english_pob_choice: and at that time
  chosen_spanish: y en aquel tiempo
  alternatives_spanish:
  - y en ese tiempo
  - e incluso en aquel tiempo
  lexicon: HALOT
  rationale: Se mantiene la doble indicación temporal del hebreo en coordinación con la frase anterior, en vez de fundirlas en una sola expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre propio divino se vierte como ‘Yahvé’ según el uso fijado del proyecto en español, preservando el tetragrámaton como nombre y no como título.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el idiomatismo filial/corporativo del hebreo. ‘Hijos’ refleja mejor la imagen del original que una generalización a ‘pueblo’.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - éstos
  lexicon: HALOT
  rationale: El pronombre es enfático/resumptivo; ‘ellos’ reproduce esa repetición sin perder naturalidad en español.
- source_word: וּבְנֵי יְהוּדָה
  english_pob_choice: and the children of Judah
  chosen_spanish: y los hijos de Judá
  alternatives_spanish:
  - y el pueblo de Judá
  - y los descendientes de Judá
  lexicon: HALOT
  rationale: Se conserva la simetría con ‘los hijos de Israel’ para no borrar la distinción histórica entre ambos grupos.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - como uno
  lexicon: HALOT
  rationale: ‘Juntos’ expresa de forma clara la reunificación de Israel y Judá y resulta más natural que un calco más rígido.
- source_word: הָל֤וֹךְ וּבָכוֹ֙ יֵלֵ֔כוּ
  english_pob_choice: Going and weeping, they will go
  chosen_spanish: Irán llorando, irán
  alternatives_spanish:
  - Irán, llorando
  - Yendo y llorando, irán
  lexicon: HALOT
  rationale: La repetición verbal hebrea se conserva con ‘irán… irán’, y el aspecto durativo se refleja con ‘llorando’. Se evita sobreexplicar el giro intensivo del original.
- source_word: וְאֶת יְהוָה אֱלֹהֵיהֶם יְבַקֵּשׁוּ
  english_pob_choice: and they will seek Yahweh their God
  chosen_spanish: y buscarán a Yahvé su Dios
  alternatives_spanish:
  - y buscarán a Yahvé, su Dios
  - y buscarán a Yahvé, el Dios de ellos
  lexicon: HALOT
  rationale: בקשׁ en este contexto conserva el sentido religioso de ‘buscar’/‘acudir a’. ‘Buscarán a Yahvé’ mantiene la fuerza cultual y relacional del hebreo.
theological_decisions:
- issue: Preservación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto sin sustituirlo por un título. Esto sigue la línea del POB inglés al distinguir el Tetragrámaton de un simple ‘Señor’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Restauración conjunta de Israel y Judá
  english_pob_reading: Preserved explicitly as 'the children of Israel ... and the children of Judah together'
  chosen_spanish_reading: los hijos de Israel ... y los hijos de Judá juntos
  alternative_spanish_readings:
  - todo Israel
  - el pueblo de Israel ... y el pueblo de Judá juntos
  rationale: Se conserva la mención separada de ambos pueblos y su unión final, sin resolver la tensión histórica-covenantal en una formulación más general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando los marcadores [a] y [b] exactamente en el texto español donde corresponden.
  spanish_consistency_notes:
  - Se mantuvo la repetición verbal del hebreo con «irán ... irán» para reflejar el intensivo/durativo.
  - Se preservó la simetría «los hijos de Israel / los hijos de Judá» sin generalizar a «pueblo».
  - Se usó «Yahvé» de forma consistente con el estándar español del proyecto para יְהוָה.
  - Se prefirió «buscarán» por el valor relacional/cultual de בקשׁ en este contexto.
