translation:
  language: es
  text: 'Entonces invoquen el nombre de su dios[a], y yo invocaré el nombre de Yahvé; y el dios que responda por fuego, ese es Dios». Y todo el pueblo respondió y dijo[b]: «La propuesta es buena».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus dioses», si אֱלֹהֵיכֶם se toma como un plural real y no como una referencia singular al dios representado en el concurso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La cosa es buena» o «El asunto es bueno». דָּבָר puede significar «palabra», «asunto» o «propuesta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְרָאתֶם
  english_pob_choice: call on
  chosen_spanish: invoquen
  alternatives_spanish:
  - clamen a
  - invocar
  lexicon: HALOT
  rationale: קרא con בְּשֵׁם expresa invocación dirigida a una deidad. En español, "invocar" conserva bien ese sentido cultual; se usa aquí la forma exhortativa "invoquen" para reflejar el imperativo plural.
- source_word: בְּשֵׁם
  english_pob_choice: on the name of
  chosen_spanish: el nombre de
  alternatives_spanish:
  - en el nombre de
  - por el nombre de
  lexicon: HALOT
  rationale: Con קרא, la construcción normal en español es "invocar el nombre de". Evita un calco poco natural y conserva el valor de apelación al nombre divino.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your god
  chosen_spanish: su dios
  alternatives_spanish:
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede ser morfológicamente plural, el contexto de contienda entre deidades y el veredicto singular posterior favorecen un referente singular en esta línea. En español, "su dios" comunica bien esa lectura sin perder la alternativa plural, que se anota en la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según el criterio del proyecto para יהוה: "Yahvé". Así se preserva el nombre del pacto en lugar de sustituirlo por un título.'
- source_word: הָאֱלֹהִים אֲשֶׁר יַעֲנֶה בָאֵשׁ
  english_pob_choice: the god who answers by fire
  chosen_spanish: el Dios que responda por fuego
  alternatives_spanish:
  - el dios que responda con fuego
  - el Dios que conteste por fuego
  lexicon: HALOT
  rationale: El hebreo usa primero una referencia genérica al dios que responda, y luego una identificación decisiva con "Dios". En español, "responda por fuego" reproduce el instrumento/señal del juicio sin sobreexplicar; se conserva la tensión entre "dios" y "Dios".
- source_word: הוּא הָאֱלֹהִים
  english_pob_choice: he is God
  chosen_spanish: ese es Dios
  alternatives_spanish:
  - él es Dios
  - ese es el Dios verdadero
  lexicon: HALOT
  rationale: El pronombre hebreo retoma al que responda y lo señala enfáticamente. "Ese es Dios" preserva la demostración y suena natural en español, manteniendo el énfasis identificador del hebreo.
- source_word: וַיַּעַן כָּל הָעָם
  english_pob_choice: And all the people answered
  chosen_spanish: Y todo el pueblo respondió
  alternatives_spanish:
  - Entonces todo el pueblo respondió
  - Y respondió todo el pueblo
  lexicon: HALOT
  rationale: ענה en narración significa responder/reaccionar. "Todo el pueblo" preserva el alcance colectivo del hebreo y la coordinación narrativa de la cláusula.
- source_word: טוֹב הַדָּבָר
  english_pob_choice: The thing is good
  chosen_spanish: La propuesta es buena
  alternatives_spanish:
  - La cosa es buena
  - El asunto es bueno
  - La palabra es buena
  lexicon: HALOT
  rationale: דָּבָר aquí se refiere a la iniciativa o propuesta de Elías, no simplemente a una "palabra". "Propuesta" comunica bien el sentido contextual aprobado por el pueblo, sin perder el valor semántico amplio del término.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragramatón directamente. Conforme al criterio del proyecto, se traduce con el nombre propio "Yahvé", evitando la sustitución por un título y preservando la distinción entre el nombre del pacto y referencias genéricas a Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Singular versus plural sense of אֱלֹהֵיכֶם
  english_pob_reading: your god
  chosen_spanish_reading: su dios
  alternative_spanish_readings:
  - sus dioses
  rationale: Aunque la forma hebrea admite un plural morfológico, la escena de contienda entre representantes de deidades y la respuesta final singular favorecen una lectura singular en esta línea. La alternativa plural se mantiene en nota para no borrar la tensión documentada.
  doctrine_reference: 1 Kings 18:24 lexical note on אֱלֹהֵיכֶם
- issue: Identification clause הוּא הָאֱלֹהִים
  english_pob_reading: he is God
  chosen_spanish_reading: ese es Dios
  alternative_spanish_readings:
  - él es Dios
  - ese es el Dios verdadero
  rationale: La frase culmina el desafío mostrando cuál de los contendientes es el verdadero Dios. "Ese es Dios" conserva el valor demostrativo y evita una formulación demasiado interpretativa, manteniendo la fuerza identitaria del hebreo.
  doctrine_reference: Contextual theology of divine self-vindication in 1 Kings 18
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés revisado: mantiene el nombre divino como Yahvé; conserva la alternancia significativa entre "dios" y "Dios"; y refleja la revisión que favoreció una expresión contextual para דָּבָר (no "palabra" sino la propuesta/idea aprobada).'
  spanish_consistency_notes:
  - Se usa "Yahvé" para יהוה conforme al estándar del proyecto.
  - Se mantiene "Dios" con mayúscula en la cláusula final para reflejar la identificación del verdadero Dios.
  - '"Propuesta" se eligió para דָּבָר en este contexto narrativo y de decisión colectiva.'
  - El estilo es neutral latinoamericano y apto para lectura eclesial sin depender de fórmulas tradicionales de sustitución.
