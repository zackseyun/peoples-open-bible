translation:
  language: es
  text: Y después de estas cosas, en el reinado de Artajerjes, rey de los persas[a], subió Esdras, hijo de Azarías, hijo de Zacarías, hijo de Jelquías[b], hijo de Salum.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «rey de los persas»; el paralelo hebreo en Esdras 7:1 dice «rey de Persia». El texto principal sigue la fuente griega de 1 Esdras.'
    reason: alternative_reading
  - marker: b
    text: «Jelquías» refleja la forma griega; el paralelo hebreo corresponde al nombre más conocido «Hilkías».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταγενέστερος τούτων ἐστίν
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - más tarde que estas cosas
  - posteriormente a estas cosas
  lexicon: LSJ
  rationale: La frase griega funciona como transición temporal narrativa. «Después de estas cosas» es natural en español bíblico y conserva la relación cronológica sin volver el giro demasiado literal o pesado.
- source_word: βασιλεύοντος Ἀρταξέρξου
  english_pob_choice: in the reign of Artaxerxes
  chosen_spanish: en el reinado de Artajerjes
  alternatives_spanish:
  - mientras Artajerjes reinaba
  - cuando reinaba Artajerjes
  lexicon: LSJ
  rationale: El genitivo absoluto expresa el marco temporal. «En el reinado de» es la equivalencia española más clara y fiel al valor contextual.
- source_word: τοῦ βασιλέως Περσῶν
  english_pob_choice: king of the Persians
  chosen_spanish: rey de los persas
  alternatives_spanish:
  - rey de Persia
  lexicon: LSJ
  rationale: Se conserva el plural griego «de los persas», porque la fuente primaria de 1 Esdras lo dice así y el POB inglés también lo retuvo frente al paralelo hebreo singular.
- source_word: προσέβη
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - vino
  - ascendió
  - fue hacia arriba
  lexicon: LSJ
  rationale: En el relato de Esdras, el verbo indica el movimiento hacia Jerusalén. «Subió» conserva esa orientación geográfica y es idiomático en español bíblico.
- source_word: Ἔσρας
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Esdras
  lexicon: nombre propio tradicional
  rationale: En español bíblico, el nombre estándar es «Esdras», que corresponde al personaje conocido y es más natural que la forma inglesa «Ezra».
- source_word: Ἀζαραίου
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: LSJ / paralelo hebreo
  rationale: La forma griega se corresponde con el nombre bíblico hebreo/estándar «Azarías». Se usa la forma usual en español bíblico.
- source_word: Ζεχρίου
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: nombre bíblico estándar
  rationale: Se usa la forma española normalizada del nombre bíblico, que corresponde al griego y al patrón genealógico paralelo.
- source_word: Χελκείου
  english_pob_choice: Chelkiah
  chosen_spanish: Quelquías
  alternatives_spanish:
  - Hilkías
  - Chelcías
  lexicon: LSJ / equivalente bíblico
  rationale: Se opta por una transliteración española que refleje la forma griega del manuscrito («Chelkiah» en el POB inglés) sin perder la identificación bíblica. «Quelquías» preserva mejor el grupo consonántico inicial del griego que una adaptación puramente hebrea, y evita armonizar prematuramente con el paralelo hebreo.
- source_word: Σαλήμου
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Salum
  - Sallún
  lexicon: nombre propio bíblico estándar
  rationale: La forma griega apunta al nombre bíblico conocido como «Salum» en español. Se mantiene una transliteración tradicional y breve.
translation_notes:
  revision_awareness: Se siguió el anclaje principal en el griego de Swete (1909) y se tuvo en cuenta el paralelo hebreo aproximado sólo para identificar nombres propios y matizar alternativas. No hubo revisiones textuales adicionales en el expediente; la redacción española conserva la tensión documentada entre la forma griega primaria y el paralelo hebreo en «rey de los persas / rey de Persia» y en el nombre «Quelquías / Hilkías».
  spanish_consistency_notes:
  - Se prefirió «Esdras» como forma española tradicional del nombre, no «Ezra», por claridad y uso bíblico estándar.
  - Se mantuvo el plural «persas» en armonía con el griego, con nota sobre el paralelo hebreo singular.
  - Se optó por «subió» para conservar el matiz narrativo direccional típico de Esdras.
  - Se transliteró «Χελκείου» como «Quelquías» para reflejar la forma griega sin ocultar la correspondencia con Hilkías.
