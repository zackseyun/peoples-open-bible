    rationale: El original enfatiza la solidaridad fraterna con duplicación semántica y vocativa. «Fraternalmente, hermanos» conserva parte del sentido, pero no reproduce tan claramente el efecto exhortativo que el POB inglés decidió mantener.
  - severity: low
    issue: «Fraternalmente» resulta menos natural que «como hermanos» en este contexto
    rationale: Aunque semánticamente válido, el adverbio suena algo abstracto en una arenga martirial. «Como hermanos» comunica mejor el modo de morir y sigue más de cerca la decisión léxica auditada.
  - severity: low
