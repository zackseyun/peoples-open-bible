review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: la finalidad/resulto de ἵνα, la restricción económica de ἀγοράσαι ἢ πωλῆσαι, «la marca», «el nombre de la bestia» y «el número de su nombre». Sin embargo, εἰ μὴ + ὁ ἔχων se ha vertido como «sino el que tiene», construcción que en español suena elíptica y menos fiel que una cláusula exceptiva verbal completa. El sentido fuente es «a menos que tenga / si no tiene», no una simple contraposición nominal.'
  spanish_quality_summary: 'El texto es claro, pero «sino el que tiene la marca» resulta poco natural tras «nadie pueda comprar ni vender» y deja la frase trabada. Una formulación como «a menos que tenga la marca» conserva mejor el flujo del español y la fuerza exceptiva. También conviene ajustar la nota: si el texto revisado ya no usa «el que tiene», la nota no debe presentarlo como literal anclado a «marca».'
  glossary_alignment: 'La terminología clave está bien alineada: χάραγμα = «marca», θηρίον = «bestia». No hay términos del glosario mayor (Yahvé, Mesías, etc.) implicados aquí. La decisión sobre αὐτοῦ como «su» es adecuada en español, ya que preserva la referencia sin forzar «su/ de él/ de ella».'
  issues:
  - severity: high
    issue: «εἰ μὴ ὁ ἔχων» está traducido como «sino el que tiene»
    rationale: Aunque intenta expresar excepción, en esta sintaxis española después de «nadie pueda comprar ni vender» suena incompleta y menos natural. El griego introduce la única condición bajo la cual alguien puede comprar o vender; en español eso se expresa mejor con «a menos que tenga» o «si no tiene».
  - severity: medium
    issue: La nota [a] queda desalineada con el texto si se mantiene anclada en «marca»
    rationale: La nota explica ὁ ἔχων («el que tiene»), no «la marca». Si se revisa el texto principal, el anclaje y el contenido de la nota deben corresponder exactamente al punto relevante del español revisado.
  revised_spanish_text: de modo que nadie pueda comprar ni vender a menos que tenga la marca, el nombre de la bestia o el número de su nombre.
  revision_rationale: Se reemplaza «sino el que tiene» por «a menos que tenga» para reflejar con mayor fidelidad y naturalidad la cláusula exceptiva εἰ μὴ ὁ ἔχων. Dado que el español revisado ya expresa la excepción de forma verbal e idiomática, no hace falta conservar una nota sobre «el que tiene».
  requires_gpt54_adjudication: false
  model_id: claude-sonnet-4-6
  timestamp: '2026-05-16T00:00:00Z'
  applied_revision: true
