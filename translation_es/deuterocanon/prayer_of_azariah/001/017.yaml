translation:
  language: es
  text: Como en sacrificios completamente quemados de carneros y toros[a], y como en miríadas de corderos cebados, así sea nuestro sacrificio delante de ti hoy y haga expiación delante de ti[b], porque no hay vergüenza para los que han confiado en ti, y sea llevado a su cumplimiento delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego designa ofrendas consumidas enteramente por el fuego. Se traduce de forma descriptiva para conservar la especificidad cultual sin usar «holocaustos», palabra que en español moderno tiene asociaciones históricas ajenas a este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «sea aceptado delante de ti». El verbo griego puede llevar fuerza sacrificial de expiación o el matiz de aceptación del sacrificio.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁλοκαυτώμασι
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - sacrificios completamente consumidos
  lexicon: LSJ
  rationale: El griego designa ofrendas consumidas enteramente por el fuego. En español, «holocaustos» conserva la especificidad cultual y el paralelismo sacrificial del texto. Aunque hoy la palabra tiene una carga histórica distinta, aquí el contexto litúrgico la delimita claramente; por eso es preferible a una paráfrasis más larga.
- source_word: κριῶν
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - carneros machos
  - ovejas machos
  lexicon: LSJ
  rationale: En un catálogo sacrificial, «carneros» es el equivalente natural y preciso en español. Mantiene la imagen cultual sin explicarla de más.
- source_word: ταύρων
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: LSJ
  rationale: El término sacrificial griego apunta a un animal bovino de sacrificio; «toros» conserva la fuerza y el paralelismo con «carneros».
- source_word: μυριάσιν
  english_pob_choice: tens of thousands
  chosen_spanish: miríadas
  alternatives_spanish:
  - decenas de miles
  - innumerables
  lexicon: LSJ
  rationale: «Miríadas» reproduce de manera compacta el valor cuantitativo de μυριάς y preserva el tono elevado del pasaje. «Decenas de miles» sería más explicativo, pero menos solemne.
- source_word: ἀρνῶν πιόνων
  english_pob_choice: fat lambs
  chosen_spanish: corderos cebados
  alternatives_spanish:
  - corderos gordos
  - corderos bien alimentados
  lexicon: LSJ
  rationale: πίων significa gordo, cebado o bien nutrido. «Cebados» transmite mejor la idea de animales engordados para sacrificio que un simple «gordos», y funciona bien en registro bíblico.
- source_word: θυσία
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - sacrificio ritual
  lexicon: LSJ
  rationale: El sustantivo mantiene el sentido cultual general. «Sacrificio» es la correspondencia directa y conserva la solemnidad del texto.
- source_word: ἐξιλάσαι
  english_pob_choice: make atonement
  chosen_spanish: haga expiación
  alternatives_spanish:
  - haga propiciación
  - sea aceptado
  lexicon: LSJ
  rationale: El verbo pertenece al campo de la expiación/reconciliación. En español, «haga expiación» mantiene el peso teológico sin reducirlo a la mera aceptación. Se evita sustituirlo por una formulación más suave que borraría el matiz sacrificial.
- source_word: ὄπισθέν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: LSJ
  rationale: Aunque ὄπισθεν puede significar literalmente «detrás», el inglés POB ya documenta que aquí funciona idiomáticamente como una orientación cultual hacia Dios. En español, «delante de ti» expresa con naturalidad esa relación espacial y ritual; se evita «detrás de ti», que sería engañoso.
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - confusión
  lexicon: LSJ
  rationale: «Vergüenza» es el equivalente más directo y sobrio. En este contexto de confianza en Dios, comunica bien la ausencia de deshonra o fracaso.
- source_word: τοῖς πεποιθόσιν ἐπὶ σοί
  english_pob_choice: those who have put their trust in you
  chosen_spanish: los que han confiado en ti
  alternatives_spanish:
  - los que confían en ti
  - los que se han apoyado en ti
  lexicon: LSJ
  rationale: El participio perfecto sugiere una confianza asentada. «Han confiado» conserva ese matiz de postura estable sin volver el español artificial.
- source_word: τελειῶσαι
  english_pob_choice: be brought to completion
  chosen_spanish: sea llevado a cumplimiento
  alternatives_spanish:
  - sea perfeccionado
  - sea completado
  lexicon: LSJ
  rationale: El verbo expresa llevar algo a su plenitud o término previsto. «Llevado a cumplimiento» preserva esa idea de consumación del acto sacrificial y funciona bien con la pasiva implícita del cierre de la oración.
theological_decisions:
- issue: Lenguaje de expiación en una oración de sacrificio
  english_pob_reading: make atonement before you
  chosen_spanish_reading: haga expiación delante de ti
  alternative_spanish_readings:
  - haga propiciación delante de ti
  - sea aceptado delante de ti
  rationale: El griego ἐξιλάσαι tiene fuerza expiatoria/sacrificial. «Haga expiación» mantiene ese peso doctrinal sin sustituirlo por una expresión meramente devocional. Se conserva así la tensión entre la insuficiencia visible de los oferentes y la petición de que su sacrificio sea eficaz delante de Dios.
  doctrine_reference: 'DOCTRINE.md: preservar peso teológico sin borrar el sentido sacrificial'
- issue: Interpretación idiomática de ὄπισθέν σου
  english_pob_reading: before you
  chosen_spanish_reading: delante de ti
  alternative_spanish_readings:
  - ante ti
  - en tu presencia
  rationale: El audit trail inglés explica que la frase no debe leerse literalmente como «detrás de ti». En español, «delante de ti» conserva la orientación cultual del texto y evita una literalidad engañosa. Se prefiere una equivalencia idiomática clara antes que una traducción opaca.
  doctrine_reference: 'DOCTRINE.md: primacía del original con equivalencia auditable'
- issue: La clausula final de consumación del sacrificio
  english_pob_reading: let it be brought to completion before you
  chosen_spanish_reading: sea llevado a cumplimiento delante de ti
  alternative_spanish_readings:
  - sea perfeccionado delante de ti
  - sea consumado delante de ti
  rationale: La petición final no es solo que el sacrificio exista, sino que alcance su término adecuado ante Dios. «Llevado a cumplimiento» conserva la dimensión de consumación sin introducir una carga doctrinal ajena.
  doctrine_reference: 'DOCTRINE.md: formalidad sobria y precisión cultual'
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión que volvió más literal y consistente la orientación espacial al cambiar «in your presence» por «before you», y ajustó la cláusula final para expresar consumación ante Dios. La versión española sigue esa revisión: usa «delante de ti» de forma uniforme en los tres puntos de orientación cultual, mantiene el valor expiatorio de ἐξιλάσαι y refleja la idea de culminación con «sea llevado a cumplimiento».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico solemne, pero con sintaxis natural para el español contemporáneo.
  - Se preservó la repetición de la orientación «delante de ti» para reflejar la estructura del griego y del audit trail inglés.
  - No se sustituyó «expiación» por una formulación más débil, para no borrar el peso sacrificial del pasaje.
  - «Holocaustos» se usa en su sentido cultual estrictamente bíblico; la nota aclara su valor semántico para evitar ambigüedad moderna.
