translation:
  language: es
  text: Y hubo temblor en el campamento, en el campo y entre todo el pueblo; la guarnición y los saqueadores también temblaron. La tierra tembló, y vino a ser un temblor de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un gran temblor» o «un temblor divino». La expresión hebrea puede entenderse como procedente de Dios o como una intensificación de gran magnitud.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲרָדָה
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - tremor
  - tremor de miedo
  - temblor de miedo
  lexicon: HALOT
  rationale: En español, «temblor» conserva la imagen física del sacudimiento y permite oír la repetición de la raíz de temor/temblor a lo largo del versículo. «Terror» o «pánico» resolverían demasiado el matiz; «temblor de miedo» explicita lo que el hebreo deja implícito.
- source_word: בַמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en el real
  lexicon: HALOT
  rationale: «Campamento» es la opción más natural y directa en español para el valor locativo del hebreo en este contexto militar.
- source_word: בַשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: «Campo» reproduce bien el sentido espacial amplio de שָׂדֶה sin forzar una precisión que el texto no da.
- source_word: וּבְכָל הָעָם
  english_pob_choice: among all the people
  chosen_spanish: entre todo el pueblo
  alternatives_spanish:
  - entre toda la gente
  - entre todos
  lexicon: HALOT
  rationale: «Pueblo» mantiene el término colectivo del hebreo y suena más natural que una repetición técnica de «gente» en este registro narrativo.
- source_word: הַמַּצָּב
  english_pob_choice: the garrison
  chosen_spanish: la guarnición
  alternatives_spanish:
  - el destacamento
  - la tropa apostada
  lexicon: HALOT
  rationale: «Guarnición» es el equivalente español más preciso y estable para la fuerza militar apostada en un lugar.
- source_word: וְהַמַּשְׁחִית
  english_pob_choice: the raiders
  chosen_spanish: los saqueadores
  alternatives_spanish:
  - los destructores
  - los asoladores
  lexicon: HALOT
  rationale: El uso contextual del término apunta a un grupo que hostiga y saquea; «saqueadores» conserva esa función mejor que una traducción demasiado literal como «destructores».
- source_word: חָרְדוּ גַּם הֵמָּה
  english_pob_choice: also trembled
  chosen_spanish: también temblaron
  alternatives_spanish:
  - temblaron también
  - ellos también temblaron
  lexicon: HALOT
  rationale: La construcción enfatiza que incluso esos combatientes quedaron afectados; «también temblaron» transmite bien ese énfasis sin recargar el español.
- source_word: וַתִּרְגַּז הָאָרֶץ
  english_pob_choice: The earth quaked
  chosen_spanish: La tierra tembló
  alternatives_spanish:
  - La tierra se estremeció
  - La tierra se conmovió
  lexicon: HALOT
  rationale: «Tembló» conserva la relación sonora con el primer «temblor» y sigue fielmente el sentido de רגז en esta escena de sacudida cósmica.
- source_word: לְחֶרְדַּת אֱלֹהִים
  english_pob_choice: a trembling from God
  chosen_spanish: un temblor de Dios
  alternatives_spanish:
  - un gran temblor
  - un temblor divino
  - un temblor enviado por Dios
  lexicon: HALOT
  rationale: La frase hebrea admite tanto un genitivo de origen («de Dios / de parte de Dios») como un intensificador. «De Dios» preserva la tensión entre origen e intensidad sin cerrar indebidamente la lectura.
theological_decisions:
- issue: Sentido de לְחֶרְדַּת אֱלֹהִים
  english_pob_reading: a trembling from God
  chosen_spanish_reading: un temblor de Dios
  alternative_spanish_readings:
  - un gran temblor
  - un temblor divino
  - un temblor enviado por Dios
  rationale: 'La forma española «de Dios» deja abierta la misma tensión que el inglés POB: puede leerse como procedencia divina o como una construcción de intensificación. Así no se pierde la ambigüedad teológica del hebreo ni se resuelve prematuramente.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance del temblor inicial y del temblor final
  english_pob_reading: trembling ... the earth quaked ... a trembling from God
  chosen_spanish_reading: temblor ... La tierra tembló ... un temblor de Dios
  alternative_spanish_readings:
  - terror ... la tierra se estremeció ... un terror divino
  rationale: Mantener «temblor» y «tembló» reproduce el encadenamiento del hebreo y evita sustituirlo por un léxico más interpretativo como «terror», que debilitaría el juego verbal del versículo.
  doctrine_reference: Translation philosophy §2 (Preserve lexical correspondences where meaningful)
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, especialmente al conservar «raiders» como «saqueadores» por su naturalidad contextual y al reflejar el valor resultativo de וַתְּהִי לְ como «llegó a ser un temblor de Dios». También se mantuvo la tensión del genitivo final sin resolverla hacia una sola interpretación.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «temblor/tembló» para conservar la repetición léxica del hebreo y la coherencia con la traducción inglesa auditada.
  - «Guarnición» y «saqueadores» siguen el registro militar del contexto sin introducir tecnicismos innecesarios.
  - La nota al pie marcada [a] corresponde al único lugar donde la ambigüedad semántica del hebreo requiere preservación explícita en español.
