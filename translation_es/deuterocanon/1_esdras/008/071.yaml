  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vocativo a Dios, doble predicado de vergüenza, y la expresión concreta «delante de tu rostro». Sin embargo, en ἐντέτραμμαι el rastro auditado en inglés fue revisado a «disgraced», y «humillado» desplaza el matiz hacia abatimiento/humillación más que hacia deshonra o descrédito. El sentido global permanece cercano, pero conviene ajustar ese término para alinearse mejor con la decisión léxica documentada.'
  spanish_quality_summary: 'El español es claro, digno y natural. «Señor» y «delante de tu rostro» funcionan bien en registro bíblico legible. El único punto mejorable es la pareja «avergonzado y humillado»: suena bien, pero repite un campo semántico menos preciso que «avergonzado y deshonrado» o «avergonzado y desgraciado/desacreditado». «Deshonrado» ofrece buena claridad y tono formal en español e intensifica la confesión sin sonar extraño.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. κύριε → «Señor» es adecuado aquí; no corresponde «Yahvé» porque el texto griego solo presenta κύριε en vocativo. La preservación de κατὰ πρόσωπόν σου como «delante de tu rostro» está bien alineada con la filosofía del POB y con la nota explicativa.
  issues:
  - severity: medium
    issue: «humillado» no sigue de cerca la revisión auditada para ἐντέτραμμαι
    rationale: El historial inglés cambió de «humiliated» a «disgraced» precisamente para reflejar mejor ἐντέτραμμαι. En español, «humillado» vuelve al matiz anterior y reduce la alineación con la decisión léxica documentada.
  - severity: low
    issue: La rationale léxica de ἐντέτραμμαι favorece un matiz penitencial sobre uno de deshonra
    rationale: El audit trail final da preferencia a una idea de disgrace/deshonra. En español conviene que la explicación y el texto principal conserven esa fuerza, no solo la de abatimiento interior.
  revised_spanish_text: Señor[a], estoy avergonzado y deshonrado delante de tu rostro.
