translation:
  language: es
  text: y tomarás algunas de sus hijas para tus hijos[a], y sus hijas se prostituirán[b] tras sus dioses, y harán que tus hijos vayan tras sus dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, ellas llevarían a tus hijos a la idolatría al hacer que fueran tras sus dioses.
    reason: cultural_note
  - marker: b
    text: O ‘se harán prostitutas’ / ‘cometerán prostitución’. El hebreo usa lenguaje de infidelidad sexual de manera metafórica para ir tras otros dioses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: and you take
  chosen_spanish: y tomarás
  alternatives_spanish:
  - y tomarás para ti
  - y tomarás en matrimonio
  lexicon: HALOT
  rationale: El verbo básico es ‘tomar’; en este contexto de advertencia matrimonial/familiar, el futuro español natural ‘tomarás’ conserva la forma directa del hebreo sin añadir una interpretación explícita como ‘casarte’.
- source_word: מִבְּנֹתָיו
  english_pob_choice: some of his daughters
  chosen_spanish: algunas de sus hijas
  alternatives_spanish:
  - de sus hijas
  - sus hijas
  lexicon: HALOT
  rationale: El min partitivo se refleja bien con ‘algunas de sus hijas’. Así se evita una traducción demasiado literal (‘de sus hijas’) y se conserva la idea de selección parcial.
- source_word: לְבָנֶיךָ
  english_pob_choice: for your sons
  chosen_spanish: para tus hijos
  alternatives_spanish:
  - para tus hijos varones
  - a tus hijos
  lexicon: HALOT
  rationale: La lamed expresa destino/beneficio en un arreglo matrimonial. ‘Para tus hijos’ es natural en español y mantiene la relación de asignación sin forzar una estructura más dura.
- source_word: וְזָנוּ
  english_pob_choice: and his daughters prostitute themselves
  chosen_spanish: y sus hijas se prostituirán
  alternatives_spanish:
  - y sus hijas cometerán prostitución
  - y sus hijas serán infieles
  lexicon: HALOT
  rationale: Se preserva la metáfora sexual fuerte del hebreo. ‘Se prostituirán’ comunica la carga léxica sin suavizarla a ‘serán infieles’, que perdería el matiz figurado y moral del original.
- source_word: אַחֲרֵי אֱלֹהֵיהֶן
  english_pob_choice: after their gods
  chosen_spanish: tras sus dioses
  alternatives_spanish:
  - siguiendo a sus dioses
  - detrás de sus dioses
  lexicon: HALOT
  rationale: ‘Tras’ reproduce bien el giro hebreo ‘ir tras’ o ‘seguir tras’ otros dioses, manteniendo la imaginería idiomática y el ritmo de la advertencia.
- source_word: וְהִזְנוּ
  english_pob_choice: and make your sons prostitute themselves
  chosen_spanish: y harán que tus hijos se prostituyan
  alternatives_spanish:
  - y llevarán a tus hijos a prostituirse
  - y harán que tus hijos sean infieles
  lexicon: HALOT
  rationale: El Hifil es causativo; ‘harán que’ deja explícita la causación. ‘Se prostituyan’ conserva la misma metáfora cultual del verbo anterior y evita diluirla en una generalidad como ‘serán infieles’.
- source_word: אֶת בָּנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: El hebreo nombra a los hijos de manera directa; en español ‘hijos’ comunica tanto el referente masculino como el uso natural del texto en contexto familiar.
- source_word: אֱלֹהֵיהֶן
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - los dioses de ellas
  - sus deidades
  lexicon: HALOT
  rationale: El plural posesivo femenino se refleja de forma directa con ‘sus dioses’. ‘Deidades’ sería más abstracto y menos fiel al registro concreto del hebreo.
theological_decisions:
- issue: Conservar la metáfora de infidelidad sexual en un contexto de idolatría
  english_pob_reading: Preserve the metaphor with 'prostitute themselves' rather than reduce it to 'commit idolatry.'
  chosen_spanish_reading: Preservar la metáfora con ‘se prostituirán’ y ‘se prostituyan’ en vez de reducirla a ‘cometerán idolatría’.
  alternative_spanish_readings:
  - cometerán idolatría
  - serán infieles
  rationale: El hebreo usa lenguaje sexualizado para describir apostasía/culto ajeno. Mantener la metáfora conserva la fuerza teológica del texto y su advertencia sobre la seducción de otros dioses.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Mantener la correspondencia de género y parentesco del texto
  english_pob_reading: Use 'daughters' and 'sons' rather than gender-neutral terms.
  chosen_spanish_reading: Usar ‘hijas’ y ‘hijos’ en lugar de formas neutras como ‘descendencia’ o ‘familia’.
  alternative_spanish_readings:
  - descendencia
  - familia
  - criaturas
  rationale: El hebreo distingue explícitamente hijas e hijos en un escenario de matrimonio y transmisión familiar. El español debe reflejar esa precisión sin neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: The English POB audit trail shows high agreement and no applied revisions; the Spanish draft follows the established lexical decisions and preserves the same metaphorical and causal structure without introducing new interpretive moves.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ en sentido genérico para la deidad de los pueblos, pero aquí el hebreo está en plural posesivo (‘sus dioses’), por lo que no se requiere nota adicional.
  - Se evitó ‘casarte’ o ‘tomar por esposa’ para no añadir una interpretación no explicitada por el hebreo.
  - Se mantuvo el paralelismo de las dos cláusulas finales con ‘se prostituirán’ / ‘se prostituyan’ para reflejar el hebreo y la progresión causal.
