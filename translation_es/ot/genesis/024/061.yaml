revisions:
- from: Entonces Rebeca y sus jóvenes mujeres[a] se levantaron, montaron en los camellos y fueron tras el hombre. Y el esclavo tomó a Rebeca y se fue.
  to: Entonces Rebeca y sus jóvenes[a] se levantaron, montaron en los camellos y fueron tras el hombre. Y el siervo tomó a Rebeca y se fue.
  rationale: Se reemplaza ‘sus jóvenes mujeres’ por ‘sus jóvenes[a]’ para lograr un español natural sin perder la base léxica de ‘mujeres jóvenes’, respaldada por la nota. Además, se cambia ‘el esclavo’ por ‘el siervo’ para ajustarse a la decisión contextual documentada en el audit trail inglés para עֶבֶד en este versículo. El resto del texto preserva adecuadamente la secuencia y el sentido del hebreo.
