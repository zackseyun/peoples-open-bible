review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: Ἰούδας = «Judas», ὁ καλούμενος = una designación/epíteto, y Μακκαβαῖος = sobrenombre propio. Sin embargo, la nota al pie no preserva fielmente la alternativa del rastro inglés, porque da como variante el mismo término usado en el texto español en vez de señalar la otra forma relevante.'
  spanish_quality_summary: El español es claro y natural. «Que era llamado» es aceptable, aunque «llamado» o «a quien llamaban» también serían posibles. El problema principal está en la nota, no en la línea principal.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Judas» y «Macabeo» son adecuados en español. La nota debe reflejar mejor la relación entre la forma griega Μακκαβαῖος y la variante española «Macabeo/Macabeo» equivalente a la alternativa inglesa «Maccabee».
  issues:
  - severity: medium
    issue: La nota al pie repite «Macabeo» como alternativa aunque el texto principal ya usa «Macabeo».
    rationale: 'La nota pierde valor informativo y no corresponde a la función de la nota inglesa, que preserva una forma alternativa real («Maccabee» frente a «Maccabeus»). En español conviene ofrecer «Macabea»/«Macabeo» no; mejor explicar que el griego tiene «Macabeo/Macabeo»? Dado el uso principal ya es «Macabeo», la mejor reparación es anclar la nota al nombre Judas y aclarar: «O “Macabeo”. El griego tiene Μακκαβαῖος…», manteniendo la alternativa respecto al sobrenombre, no duplicándola como si fuera distinta.'
  - severity: low
    issue: La redacción de la nota puede ser más precisa sobre transliteración.
    rationale: «Transliterado aquí como nombre propio» es comprensible, pero menos exacto que indicar que Μακκαβαῖος es la forma griega transliterada y que «Macabeo» es la adaptación española usual.
  revised_spanish_text: Judas[a], que era llamado Macabeo,
  revised_footnotes:
  - marker: a
    text: O «Macabeo». El griego tiene Μακκαβαῖος, una transliteración griega del sobrenombre.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal, que ya es fiel y legible, y se corrige la nota para que aporte una alternativa/explicación real en vez de repetir sin valor distintivo la misma forma del cuerpo del texto.
