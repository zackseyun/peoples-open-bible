    issue: שָׁמְעוֹ se traduce en el texto principal como «su fama»
    rationale: La auditoría inglesa documenta como elección principal «the report about him» para preservar tanto noticia circulante como renombre, mientras «his fame» queda como alternativa. En español, «su fama» estrecha el sentido más de lo necesario.
  - severity: high
