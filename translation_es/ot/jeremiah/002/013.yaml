translation:
  language: es
  text: 'Porque dos males ha hecho mi pueblo: me han abandonado, la fuente[a] de aguas vivas, para excavarse cisternas, cisternas rotas que no pueden retener el agua.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «manantial de aguas vivas» o «fuente de agua viva».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamentación de la acusación anterior. 'Porque' conserva esa fuerza causal/explanatoria en español natural.
- source_word: שְׁתַּיִם רָעוֹת
  english_pob_choice: two evils
  chosen_spanish: dos males
  alternatives_spanish:
  - dos maldades
  - dos perversidades
  lexicon: HALOT
  rationale: '''Males'' transmite bien el peso moral del hebreo sin sonar artificial en español bíblico actual.'
- source_word: עָשָׂה עַמִּי
  english_pob_choice: my people have done
  chosen_spanish: ha hecho mi pueblo
  alternatives_spanish:
  - mi pueblo ha cometido
  - mi pueblo ha realizado
  lexicon: HALOT
  rationale: El verbo hebreo es 'hacer', y el orden español mantiene cercanía al original. 'Mi pueblo' como sujeto inicial también preserva el énfasis.
- source_word: אֹתִי עָזְבוּ
  english_pob_choice: they have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: '''Abandonado'' expresa bien la ruptura relacional y del pacto en español. ''Forsaken'' puede equivalerse aquí con ''abandonado'' sin perder gravedad.'
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - fuente manante
  lexicon: HALOT
  rationale: En español, 'fuente' mantiene la imagen y funciona con 'aguas vivas'. Aunque 'manantial' es posible, 'fuente' es más natural y amplia en el registro bíblico.
- source_word: מַיִם חַיִּים
  english_pob_choice: living waters
  chosen_spanish: aguas vivas
  alternatives_spanish:
  - agua viva
  - aguas de vida
  lexicon: HALOT
  rationale: Se conserva el plural hebreo con 'aguas' y el adjetivo 'vivas', reflejando el agua fresca, fluyente y dadora de vida.
- source_word: לַחְצֹב
  english_pob_choice: to dig
  chosen_spanish: excavarse
  alternatives_spanish:
  - cavar
  - ahondarse
  lexicon: HALOT
  rationale: Como el objeto es 'cisternas', 'excavarse' reproduce la acción de hacerlas y mantiene un tono más preciso que el simple 'cavar'.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para su propio uso
  lexicon: HALOT
  rationale: '''Para sí'' expresa el valor reflexivo de forma breve y natural en español, equivalente a la intención auto-beneficiaria del hebreo.'
- source_word: בֹּארוֹת
  english_pob_choice: cisterns
  chosen_spanish: cisternas
  alternatives_spanish:
  - pozos
  - reservorios
  lexicon: HALOT
  rationale: '''Cisternas'' conserva el contraste con la fuente natural y es el término técnico apropiado para depósitos hechos por el hombre.'
- source_word: בֹּארֹת נִשְׁבָּרִים
  english_pob_choice: broken cisterns
  chosen_spanish: cisternas rotas
  alternatives_spanish:
  - cisternas agrietadas
  - cisternas quebradas
  lexicon: HALOT
  rationale: '''Rotas'' es una forma clara y sobria en español. Incluye la idea de defectuosas o resquebrajadas sin sobreexplicar.'
- source_word: אֲשֶׁר לֹא יָכִלוּ הַמָּיִם
  english_pob_choice: that cannot hold water
  chosen_spanish: que no pueden retener el agua
  alternatives_spanish:
  - que no contienen agua
  - que no pueden guardar el agua
  lexicon: HALOT
  rationale: '''Retener'' expresa con precisión el resultado: no logran conservar el agua. Mantiene la imagen literal y la ironía del pasaje.'
theological_decisions:
- issue: Metáfora de Dios como fuente de vida
  english_pob_reading: Retain the metaphor 'the fountain of living waters' rather than interpret it explicitly as God being the source of life/blessing.
  chosen_spanish_reading: Conservar la metáfora 'la fuente de aguas vivas' sin explicitarla como una paráfrasis doctrinal.
  alternative_spanish_readings:
  - la fuente de vida
  - el manantial de vida
  rationale: El hebreo presenta una imagen viva y no la desarrolla. El español debe preservar esa densidad metafórica para no suavizar la acusación profética ni perder resonancia teológica.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la decisión inglesa estable de conservar la metáfora de la fuente/manantial de aguas vivas. Se ajustó el español para sonar natural y digno, manteniendo la antítesis entre la fuente viva y las cisternas humanas defectuosas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando el hebreo lo expresa explícitamente; aquí no aparece.
  - '''Aguas vivas'' conserva el plural hebreo y evita la singularización innecesaria.'
  - '''Cisternas'' se mantiene como término técnico para conservar el contraste con la fuente natural.'
  - No se introdujo 'Cristo' ni terminología cristológica, pues el versículo no la contiene.
