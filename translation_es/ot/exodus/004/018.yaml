base_translation:
  language: en
  yaml_path: translation/ot/exodus/004/018.yaml
  text: Then Moses went and returned to Jethro his father-in-law and said to him[a], “Please let me go and return to my brothers who are in Egypt, so that I may see whether they are still alive.” And Jethro said to Moses[b], “Go in peace.”
  footnotes:
  - marker: a
    text: Hebrew has the name form 'Jether' in the first mention and 'Jethro' in the second; the English text uses 'Jethro' for consistency since the same person is clearly intended.
    reason: textual_variant
  - marker: b
    text: Or 'my kinsmen' for 'my brothers.' The Hebrew literally says 'my brothers.'
    reason: lexical_alternative
