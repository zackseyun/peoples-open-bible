translation:
  language: es
  text: 'Los romanos también les enviaron una carta, redactada así: «Quinto Memio y Tito Manio, ancianos[a] de los romanos, al pueblo de los judíos[b]: saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «senadores de los romanos». πρεσβυταί significa literalmente «ancianos», aunque puede aludir a una función política romana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al pueblo judío». El griego dice literalmente «al pueblo de los judíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέμψαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: LSJ
  rationale: Ἐπέμψαν es el aoristo de πέμπω, ‘enviar’. En español, ‘enviaron’ conserva la acción simple y natural sin añadir matiz institucional que el griego no exige.
- source_word: οἱ Ῥωμαῖοι
  english_pob_choice: the Romans
  chosen_spanish: los romanos
  alternatives_spanish:
  - la autoridad romana
  - los romanos
  lexicon: LSJ
  rationale: El griego presenta un colectivo étnico-político, no una institución explícita. ‘Los romanos’ reproduce con transparencia ese sujeto colectivo.
- source_word: ἐπιστολήν
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una carta oficial
  - un escrito
  lexicon: LSJ
  rationale: ἐπιστολή es la palabra ordinaria para ‘carta’. ‘Carta’ es el equivalente natural en español y no introduce formalidad no explicitada por el léxico.
- source_word: ἔχουσαν οὕτως
  english_pob_choice: worded as follows
  chosen_spanish: redactada así
  alternatives_spanish:
  - que decía así
  - formulada así
  lexicon: LSJ
  rationale: La construcción participial introduce el texto citado. ‘Redactada así’ comunica la función formularia de manera idiomática y fiel al valor discursivo.
- source_word: πρεσβυταὶ Ῥωμαίων
  english_pob_choice: elders of the Romans
  chosen_spanish: ancianos de los romanos
  alternatives_spanish:
  - senadores de los romanos
  - ancianos romanos
  lexicon: LSJ
  rationale: πρεσβυταί significa literalmente ‘ancianos, mayores’. Mantener ‘ancianos’ conserva la literalidad del griego; ‘senadores’ sería una especificación interpretativa no exigida por la forma textual.
- source_word: τῷ δήμῳ τῶν Ἰουδαίων
  english_pob_choice: to the people of the Jews
  chosen_spanish: al pueblo de los judíos
  alternatives_spanish:
  - al pueblo judío
  - a la gente de los judíos
  lexicon: LSJ
  rationale: δῆμος denota el cuerpo de pueblo. ‘Al pueblo de los judíos’ sigue de cerca la estructura griega y preserva el genitivo objetivo sin suavizarlo a una fórmula más eclesiástica o etnónima.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - que se alegren
  lexicon: LSJ
  rationale: χαίρειν es la salutación epistolar fija. ‘Saludos’ transmite la función comunicativa en español moderno; ‘salud’ sería posible, pero puede sonar más arcaizante o litúrgico.
theological_decisions:
- issue: Posible especificación política de πρεσβυταὶ Ῥωμαίων
  english_pob_reading: The Greek term itself is simply 'elders,' though a Roman political nuance such as 'senators' may be inferred.
  chosen_spanish_reading: ancianos de los romanos
  alternative_spanish_readings:
  - senadores de los romanos
  - ancianos romanos
  rationale: Se conserva la ambigüedad del griego. Aunque el contexto puede sugerir enviados o senadores, el texto no usa el término técnico; por eso no se traduce con una identificación institucional más fuerte.
  doctrine_reference: Principio de transparencia textual; evitar sobreinterpretación histórica
- issue: Forma del destinatario colectivo en τῷ δήμῳ τῶν Ἰουδαίων
  english_pob_reading: to the people of the Jews / to the Jewish people
  chosen_spanish_reading: al pueblo de los judíos
  alternative_spanish_readings:
  - al pueblo judío
  - a la nación de los judíos
  rationale: Se conserva la estructura genitiva del original, manteniendo la referencia al pueblo como colectivo histórico-político y no sustituyéndola por una paráfrasis más interpretativa.
  doctrine_reference: Transparencia del referente colectivo en textos deuterocanónicos
translation_notes:
  revision_awareness: El inglés auditado coincide sustancialmente con el griego y no presenta cambios sustantivos recientes; se conserva la decisión de traducir el encabezado epistolar con una fórmula española idiomática y transparente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general, pero este versículo no contiene el Tetragrámaton.
  - Se usa «judíos» para reflejar τῶν Ἰουδαίων con estructura cercana al original; no se normaliza a «judío» adjetival.
  - Se preserva el tono de carta diplomática sin añadir términos como «oficial» que el griego no exige.
