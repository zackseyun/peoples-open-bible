lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y después
  lexicon: LSJ
  rationale: Conecta la acción final con la secuencia narrativa previa. En español, ‘Y’ mantiene la continuidad sin añadir matiz interpretativo.
- source_word: ταῦτα εἰπών
  english_pob_choice: after saying this
  chosen_spanish: después de decir esto
  alternatives_spanish:
  - habiendo dicho esto
  - tras decir esto
  lexicon: LSJ
  rationale: El participio aoristo indica anterioridad temporal respecto a la acción principal. ‘Después de decir esto’ es natural en español y conserva la secuencia.
- source_word: ὁ ἱεροπρεπὴς
  english_pob_choice: the devout
  chosen_spanish: el joven devoto
  alternatives_spanish:
  - el joven reverente
  - el joven piadoso
  - el joven santo
  lexicon: LSJ
  rationale: ἱεροπρεπής describe una conducta o porte apto para lo sagrado; en este contexto ‘devoto’ comunica bien la cualidad religiosa sin sugerir oficio sacerdotal ni sobrecargar el término.
- source_word: νεανίας
  english_pob_choice: young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: LSJ
  rationale: ‘Joven’ es la forma más natural en español para νεανίας y conserva el referente masculino sin redundancia.
- source_word: ἀπέρρηξεν τὴν ψυχήν
  english_pob_choice: breathed his last
  chosen_spanish: exhaló su último aliento
  alternatives_spanish:
  - entregó su alma
  - murió
  - expiró
  lexicon: LSJ
  rationale: El griego usa una expresión idiomática para la muerte. ‘Exhaló su último aliento’ refleja la imagen verbal de manera idiomática en español y evita fijar prematuramente un sentido técnico de ψυχή como ‘alma’.
theological_decisions:
- issue: ψυχή en una idiomática de muerte
  english_pob_reading: life / soul as idiomatic death expression
  chosen_spanish_reading: último aliento
  alternative_spanish_readings:
  - alma
  - vida
  rationale: En este pasaje ψυχή forma parte de una locución idiomática para morir. ‘Último aliento’ comunica la muerte sin resolver la tensión antropológica del término hacia ‘alma’ o ‘vida’ de forma demasiado cerrada.
  doctrine_reference: Preservar la tensión lexical sin imponer una antropología técnica donde el griego usa un giro idiomático.
translation_notes:
  revision_awareness: La traducción inglesa pasó de ‘gave up his life’ a ‘breathed his last’ para ajustarse mejor a ἀπέρρηξεν τὴν ψυχήν. La versión española sigue esa revisión con una imagen equivalente en español (‘exhaló su último aliento’) y conserva la nota alternativa literal (‘entregó su alma’) para reflejar el modismo griego.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general, aunque este versículo no contiene el nombre divino.
  - Se evita ‘alma’ en el texto principal porque el griego aquí es idiomático; la alternativa literal queda documentada en la nota.
  - ‘Devoto’ se usa para ἱεροπρεπής por su naturalidad y porque no implica orden sacerdotal.
  - El registro es sobrio y narrativo, adecuado para una sección martirial/deuterocanónica.
