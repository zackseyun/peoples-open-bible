translation:
  language: es
  text: Y cuando ofrezcan un sacrificio de acción de gracias a Yahvé[a], lo ofrecerán para su aceptación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sacrificio de gratitud» o «un sacrificio de agradecimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Cuando
  lexicon: HALOT
  rationale: La construcción introduce una instrucción casuística con valor temporal-condicional. «Y cuando» preserva el avance legal del contexto y suena natural en español.
- source_word: תִזְבְּח֥וּ
  english_pob_choice: you sacrifice
  chosen_spanish: ofrezcan
  alternatives_spanish:
  - sacrifiquen
  - degüellen
  - presenten como sacrificio
  lexicon: HALOT
  rationale: En español culto y bíblico, «ofrecer» comunica adecuadamente la acción sacrificial sin reducirla solo al acto material de matar; «degollar» sería demasiado estrecho y «sacrifiquen» más directo pero menos natural aquí.
- source_word: זֶֽבַח תּוֹדָ֖ה
  english_pob_choice: a thank offering
  chosen_spanish: un sacrificio de acción de gracias
  alternatives_spanish:
  - un sacrificio de gratitud
  - una ofrenda de acción de gracias
  - un sacrificio de agradecimiento
  lexicon: HALOT
  rationale: La expresión hebrea nombra una clase específica de sacrificio caracterizada por la acción de gracias. «Sacrificio de acción de gracias» conserva el carácter cultual y evita una paráfrasis excesiva. Se mantiene la tensión lexical entre «ofrenda» y «sacrificio» en español porque el contexto es sacrificial.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el término de proyecto «Yahvé» para el Tetragrámaton, preservando el nombre divino en vez de ocultarlo con una sustitución genérica. La preposición de dedicación/dirección se expresa naturalmente con «a» en español.
- source_word: לִֽ/רְצֹנְ/כֶם
  english_pob_choice: for your acceptance
  chosen_spanish: para que sea aceptado por ustedes
  alternatives_spanish:
  - para su aceptación
  - para su aceptación ante Dios
  - según su voluntad
  lexicon: HALOT
  rationale: En contexto sacrificial, רָצוֹן apunta a aceptabilidad/aceptación. En español, «para que sea aceptado por ustedes» hace explícita la relación gramatical y cultual sin desplazar el sentido hacia preferencia humana; «según su voluntad» introduciría una lectura inapropiada.
- source_word: תִּזְבָּֽחוּ
  english_pob_choice: you shall sacrifice it
  chosen_spanish: lo ofrecerán
  alternatives_spanish:
  - lo sacrificarán
  - lo presentarán como sacrificio
  - lo ofrecerán en sacrificio
  lexicon: HALOT
  rationale: El verbo repetido refuerza la instrucción. «Lo ofrecerán» permite español fluido y mantiene la referencia al mismo acto sacrificial; el objeto «lo» remite al sacrificio de acción de gracias.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el nombre propio divino. En la línea del proyecto, se conserva en español «Yahvé» para no enmascarar el Tetragrámaton con una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido sacrificial de רָצוֹן
  english_pob_reading: for your acceptance
  chosen_spanish_reading: para que sea aceptado por ustedes
  alternative_spanish_readings:
  - para su aceptación
  - para que les sea aceptado
  rationale: El hebreo no expresa principalmente la voluntad subjetiva de los oferentes, sino la aceptabilidad del sacrificio en el marco del culto. La redacción española conserva esa orientación sin perder claridad.
  doctrine_reference: Levítico 22:19-25; HALOT, רָצוֹן
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que refinó el cierre de una explicación paraprástica a una formulación más directa de aceptabilidad. Por eso el español evita expandir el final a una explicación causal larga y conserva la relación cultual breve de רָצוֹן.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino, conforme al criterio del proyecto.
  - Se prefirió «sacrificio de acción de gracias» para mantener el campo sacrificial sin sustituirlo por un lenguaje meramente devocional.
  - La clausula final mantiene la idea de aceptabilidad cultual y no la de «según la voluntad» humana.
