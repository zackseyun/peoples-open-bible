  text: וְ/כִפֶּ֣ר עַל הַ/קֹּ֗דֶשׁ מִ/טֻּמְאֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וּ/מִ/פִּשְׁעֵי/הֶ֖ם לְ/כָל חַטֹּאתָ֑/ם וְ/כֵ֤ן יַעֲשֶׂה֙ לְ/אֹ֣הֶל מוֹעֵ֔ד הַ/שֹּׁכֵ֣ן אִתָּ֔/ם בְּ/ת֖וֹךְ טֻמְאֹתָֽ/ם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/016/016.yaml
  text: Thus he shall make atonement for the sanctuary because of the uncleannesses of the sons of Israel and because of their transgressions[a], for all their sins[c][b]; and so he shall do for the tent of meeting that dwells with them in the midst of their uncleannesses.
  footnotes:
  - marker: a
    text: Or 'the holy place.' Hebrew הַקֹּדֶשׁ can denote the sanctuary or holy place in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Make atonement'' may also be expressed as ''purge'' or ''cleanse'' in this Day of Atonement context, since the rite addresses both impurity and sin.'
    reason: lexical_alternative
