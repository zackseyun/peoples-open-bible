translation:
  language: es
  text: Porque, si tuvieron poder para conocer tanto que pudieron especular sobre el mundo[a], ¿cómo no encontraron más pronto a su Soberano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el universo»; el griego dice literalmente «el siglo», que aquí puede referirse al orden del mundo inferido a partir de las cosas creadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσοῦτον
  english_pob_choice: so much
  chosen_spanish: tanto
  alternatives_spanish:
  - de tal manera
  - en tal grado
  lexicon: LSJ
  rationale: El acusativo de medida/intensidad con ἴσχυσαν εἰδέναι pide una noción de amplitud del conocimiento. «Tanto» es natural en español y conserva la idea de una capacidad cognitiva considerable.
- source_word: ἴσχυσαν
  english_pob_choice: had power
  chosen_spanish: tuvieron poder
  alternatives_spanish:
  - fueron capaces
  - pudieron
  lexicon: LSJ
  rationale: El verbo expresa fuerza o capacidad. «Tuvieron poder» mantiene el matiz de capacidad efectiva y reproduce bien la fuerza retórica del griego.
- source_word: εἰδέναι
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - entender
  lexicon: LSJ
  rationale: En este contexto, el infinitivo apunta al conocimiento alcanzado por inferencia. «Conocer» permite el enlace natural con el giro siguiente sin perder la referencia al saber intelectual.
- source_word: στοχάσασθαι
  english_pob_choice: speculate about
  chosen_spanish: especular sobre
  alternatives_spanish:
  - inferir acerca de
  - razonar sobre
  - conjeturar acerca de
  lexicon: LSJ
  rationale: El verbo sugiere llegar a una conclusión por conjetura o inferencia, no por visión directa. «Especular sobre» conserva ese proceso intelectual indirecto y coincide con la decisión inglesa documentada.
- source_word: τὸν αἰῶνα
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la edad
  - el universo
  - el orden del mundo
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «el siglo/edad», en este contexto sapiencial remite al orden creado observable. «El mundo» sigue la revisión inglesa final y es más idiomático en español, sin borrar la amplitud cosmológica del término.
- source_word: δεσπότην
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Maestro
  - Señor
  - Soberano
  lexicon: LSJ
  rationale: δεσπότης subraya posesión y autoridad absoluta. En español, «Dueño» reproduce esa fuerza de pertenencia de forma clara y evita confundir el término con el título religioso tradicional de «Señor», que aquí el griego no usa.
- source_word: τάχιον
  english_pob_choice: more quickly
  chosen_spanish: más pronto
  alternatives_spanish:
  - más rápidamente
  - antes
  lexicon: LSJ
  rationale: El comparativo expresa anticipación temporal. «Más pronto» es natural en español y conserva la idea de que la búsqueda debió culminar con mayor rapidez.
- source_word: εὗρον
  english_pob_choice: find
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - descubrieron
  lexicon: LSJ
  rationale: 'Aoristo de εὑρίσκω: «encontraron» es la opción más directa y idiomática en una pregunta retórica, manteniendo el contraste entre su capacidad de inferir y su incapacidad de reconocer al Creador.'
theological_decisions:
- issue: Sentido de τὸν αἰῶνα en el argumento sapiencial
  english_pob_reading: Rendered as 'the world' in the main text, with a footnote preserving broader alternatives from the literal Greek 'the age'.
  chosen_spanish_reading: Traducido como «el mundo» en el texto principal, con nota que preserva el alcance literal del griego y sus posibles matices cosmológicos.
  alternative_spanish_readings:
  - la edad
  - el universo
  - el orden del mundo
  rationale: La expresión griega es comprimida y puede señalar el orden creado inferido por observación o, más ampliamente, el cosmos. En español, «el mundo» comunica con claridad esa realidad creada sin imponer una lectura exclusivamente temporal de «edad».
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Matiz de δεσπότης y su relación con la terminología teológica habitual
  english_pob_reading: Master, preserving the lexical distinction from κύριος.
  chosen_spanish_reading: «Dueño», para conservar la fuerza de posesión y autoridad sin sustituirlo por el título litúrgico «Señor».
  alternative_spanish_readings:
  - Señor
  - Soberano
  - Maestro
  rationale: El término griego destaca propiedad y dominio absoluto. «Dueño» reproduce ese núcleo semántico en español y evita diluir la distinción léxica frente a κύριος, que no aparece aquí.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió la glosa principal de αἰῶνα de «the age» a «the world» por el contexto cosmológico. Tomé esa decisión revisada como guía para el texto principal en español, pero conservé en nota el valor literal de «la edad» y la alternativa «el universo» para no borrar el rango semántico del griego.
  spanish_consistency_notes:
  - Usé «el mundo» para αἰῶνα siguiendo la revisión inglesa final y la naturalidad del español, pero mantuve la nota literal para transparencia.
  - 'Conservé el paralelismo retórico del verso: capacidad de conocer -> especulación sobre el mundo -> incapacidad para hallar al Dueño.'
  - Preferí «Dueño» a «Señor» para δεσπότης, manteniendo la distinción lexical documentada frente a κύριος.
