revisions:
- from: Así que los hirieron[a], a él, a sus hijos y a todo su pueblo, hasta no dejarle ningún sobreviviente[b]; y tomaron posesión de su tierra.
  to: Entonces lo abatieron[a], a él, a sus hijos y a todo su pueblo, hasta no dejarle ningún sobreviviente; y tomaron posesión de su tierra.
  rationale: Se reemplaza «los hirieron» por «lo abatieron» para reflejar mejor el hebreo נכה en contexto de guerra y para mantener coherencia con «a él». Se elimina la nota [b] porque la redacción principal «hasta no dejarle ningún sobreviviente» ya expresa con naturalidad el sentido del hebreo sin necesidad de aclaración adicional. También se cambia «Así que» por «Entonces» para un arranque más natural en español narrativo bíblico.
