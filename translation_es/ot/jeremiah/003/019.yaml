revisions:
- from: 'Y yo dije[a]: «¡Cómo te pondría entre los hijos y te daría una tierra deseable, una herencia hermosa[b] entre las naciones!». Y dije: «Me llamarás: “Padre mío”, y no te apartarás de seguirme».'
  to: 'Y yo dije[a]: «¡Cómo te pondría entre los hijos y te daría una tierra deseable, una hermosa herencia[b] entre las huestes de las naciones!». Y dije: «Me llamarán: “Padre mío”, y no se apartarán de seguirme».'
  rationale: Se corrige el singular por plural en la segunda mitad para reflejar los verbos hebreos en 2ª persona plural. Se ajusta la nota [a] para que realmente explique la alternativa y la literalidad. Se revisa la frase difícil sobre la herencia para conservar mejor el carácter comprimido del hebreo y acercarse más al rastro de auditoría inglés, sin volverla ininteligible en español.
  reviewer_model: gpt-5.4
