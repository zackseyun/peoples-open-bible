translation:
  language: es
  text: En visiones de Dios me llevó a la tierra de Israel y me puso en un monte muy alto[a]; sobre él, al sur[b], había algo semejante a la estructura de una ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en visiones divinas» o «en visiones de parte de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «hacia el sur»; el hebreo puede indicar orientación meridional más que procedencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַרְאֹות אֱלֹהִים
  english_pob_choice: In visions of God
  chosen_spanish: En visiones de Dios
  alternatives_spanish:
  - En visiones divinas
  - En visiones de parte de Dios
  lexicon: HALOT
  rationale: La construcción plural con בְּ se conserva naturalmente como 'En visiones'. אֱלֹהִים se mantiene como 'de Dios' para preservar el enlace léxico del hebreo y la lectura auditada del POB en inglés, sin convertirlo en una paráfrasis más libre.
- source_word: הֱבִיאַנִי
  english_pob_choice: he brought me
  chosen_spanish: me hizo entrar
  alternatives_spanish:
  - me trajo
  - me llevó
  lexicon: HALOT
  rationale: El causativo de בוא puede expresarse en español como 'hacer entrar' cuando el movimiento hacia un lugar es el foco. Aquí evita una calca pesada y conserva la idea de traslado visionario hacia la tierra.
- source_word: אֶל אֶרֶץ יִשְׂרָאֵל
  english_pob_choice: into the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - a la tierra de Israel
  - dentro de la tierra de Israel
  lexicon: HALOT
  rationale: Después de 'me hizo entrar', 'en la tierra de Israel' suena más natural en español y conserva el resultado espacial de la acción. 'Tierra' traduce bien אֶרֶץ en este contexto.
- source_word: וַיְנִיחֵנִי
  english_pob_choice: and set me down
  chosen_spanish: me puso
  alternatives_spanish:
  - me colocó
  - me dejó
  lexicon: HALOT
  rationale: נוח en causativo puede ser 'poner/colocar'. En español, 'me puso' funciona de manera sobria y fiel para el acto de depositar al profeta en un lugar, sin sugerir reposo físico.
- source_word: אֶל הַר גָּבֹהַּ מְאֹד
  english_pob_choice: on a very high mountain
  chosen_spanish: sobre un monte muy alto
  alternatives_spanish:
  - en un monte muy alto
  - sobre una montaña muy alta
  lexicon: HALOT
  rationale: '''Sobre'' refleja la localización encima del monte después del verbo de colocación. ''Monte'' es una opción digna y bíblica para הַר, y ''muy alto'' reproduce מְאֹד sin añadir intensidad ajena al hebreo.'
- source_word: וְעָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - y sobre él
  - encima de él
  lexicon: HALOT
  rationale: El pronombre retoma el monte. En español, 'sobre él' mantiene la referencia espacial clara; el prefijo conjuntivo puede integrarse sin repetir excesivamente la conjunción.
- source_word: כְּמִבְנֵה עִיר
  english_pob_choice: something like the structure of a city
  chosen_spanish: algo semejante a la estructura de una ciudad
  alternatives_spanish:
  - algo como la estructura de una ciudad
  - algo parecido a la construcción de una ciudad
  lexicon: HALOT
  rationale: מִבְנֶה se conserva como 'estructura' para no diluir la imagen de una configuración visible. La comparación con כְּ se expresa con 'algo semejante a' para preservar la cautela descriptiva de la visión.
- source_word: מִנֶּגֶב
  english_pob_choice: to the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - en el sur
  lexicon: HALOT
  rationale: La nota auditada admite orientación meridional. 'Al sur' es breve y natural en español, y conserva la ambigüedad direccional sin decidir excesivamente entre punto cardinal u ओरientación relativa.
theological_decisions:
- issue: Origen y mediación de la visión
  english_pob_reading: In visions of God
  chosen_spanish_reading: En visiones de Dios
  alternative_spanish_readings:
  - En visiones divinas
  - En visiones de parte de Dios
  rationale: Se mantiene la expresión que liga la experiencia con Dios sin explicitar más de lo que el hebreo afirma. La formulación evita resolver la tensión entre genitivo descriptivo y origen de la visión, tal como hace el POB en inglés.
  doctrine_reference: Principio de primacía del texto original; preservar la ambigüedad léxica cuando el hebreo lo permite.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió 'to the south' frente a 'toward the south'. En español se optó por 'al sur', que conserva esa orientación directa sin perder la ambigüedad direccional señalada en la nota auditada.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים conforme al estándar del proyecto.
  - Se prefirió 'monte' por naturalidad bíblica y registro digno, sin alterar el referente de הַר.
  - Se mantuvo el tono visionario y la cautela descriptiva de la cláusula final.
  - No se introdujo 'Yahvé' porque el texto hebreo aquí usa אֱלֹהִים y no el tetragrámaton.
