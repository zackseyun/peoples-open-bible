translation:
  language: es
  text: 'Y ahora te diré la verdad: he aquí[a], todavía se levantarán otros tres reyes en Persia, y el cuarto se hará mucho más rico que todos; y cuando se haga fuerte por medio de sus riquezas[b], incitará a todos contra el reino de Grecia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'otros tres reyes se levantarán para Persia'.
    reason: lexical_alternative
  - marker: b
    text: O 'el cuarto obtendrá gran riqueza por encima de todos'.
    reason: lexical_alternative
  - marker: c
    text: O 'agitará a todos contra el reino de Grecia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el enlace discursivo de וְ y el valor temporal de עַתָּה sin endurecer el español.
- source_word: אֱמֶת
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: HALOT
  rationale: 'Con אַגִּיד, el sentido natural en español es una declaración veraz: ''te diré la verdad''. El artículo explicita el objeto verbal como en la solución inglesa.'
- source_word: אַגִּיד לָךְ
  english_pob_choice: I will tell you
  chosen_spanish: te diré
  alternatives_spanish:
  - te declararé
  - te daré a conocer
  lexicon: HALOT
  rationale: El hiphil de נגד admite 'decir, declarar, hacer saber'. 'Te diré' es claro y fiel, sin sobretraducir.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - observa
  lexicon: HALOT
  rationale: '''He aquí'' preserva la fuerza deíctica y profética que el inglés POB mantuvo con ''behold''.'
- source_word: עוֹד שְׁלֹשָׁה מְלָכִים
  english_pob_choice: three more kings
  chosen_spanish: todavía hay tres reyes
  alternatives_spanish:
  - aún quedan tres reyes
  - otros tres reyes
  lexicon: HALOT
  rationale: La combinación de עוֹד + numeral expresa adición o continuación. En español, 'todavía hay tres reyes' comunica bien la idea de reyes adicionales sin forzar un calco.
- source_word: עֹמְדִים לְפָרַס
  english_pob_choice: will arise in Persia
  chosen_spanish: que se levantarán en Persia
  alternatives_spanish:
  - que surgirán en Persia
  - que se alzarán en Persia
  lexicon: HALOT
  rationale: En contextos de sucesión real, עמד puede equivaler a 'levantarse/surgir'. 'En Persia' sigue la revisión inglesa que prefirió in Persia por naturalidad y exactitud.
- source_word: וְהָרְבִיעִי
  english_pob_choice: and the fourth
  chosen_spanish: y el cuarto
  alternatives_spanish:
  - y luego el cuarto
  lexicon: HALOT
  rationale: Ordinal directo y secuencial, sin añadir matiz no presente.
- source_word: יַעֲשִׁיר עֹשֶׁר גָּדוֹל מִכֹּל
  english_pob_choice: will become far richer than all of them
  chosen_spanish: se hará mucho más rico que todos
  alternatives_spanish:
  - obtendrá gran riqueza por encima de todos
  - se enriquecerá grandemente sobre todos
  lexicon: HALOT
  rationale: El hiphil con el cognado sustantivo intensifica la idea de riqueza. 'Se hará mucho más rico' expresa bien la comparación del hebreo y evita un calco incómodo.
- source_word: וּכְחֶזְקָתוֹ בְעָשְׁרוֹ
  english_pob_choice: and when he becomes strong through his riches
  chosen_spanish: y cuando se haga fuerte por medio de sus riquezas
  alternatives_spanish:
  - y cuando sea fuerte en sus riquezas
  - y al fortalecerse con sus riquezas
  lexicon: HALOT
  rationale: כְ tiene valor circunstancial/instrumental; 'por medio de' conserva esa relación entre fortaleza y riqueza.
- source_word: יָעִיר
  english_pob_choice: he will stir up
  chosen_spanish: despertará
  alternatives_spanish:
  - agitará
  - incitará
  - levantará
  lexicon: HALOT
  rationale: '''Despertará'' traduce היטב la idea básica de עור (''despertar, avivar, poner en movimiento''). En contexto político-militar, mantiene la fuerza de ''stir up'' sin añadir violencia léxica no requerida.'
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - todo
  lexicon: HALOT
  rationale: 'Con el verbo ''despertar'', el objeto natural en español es personal: ''a todos''. El hebreo admite el colectivo total sin precisar si son personas o fuerzas.'
- source_word: אֵת מַלְכוּת יָוָן
  english_pob_choice: against the kingdom of Greece
  chosen_spanish: contra el reino de Grecia
  alternatives_spanish:
  - contra el reino griego
  - frente al reino de Grecia
  lexicon: HALOT
  rationale: El inglés POB leyó את en sentido adversativo con עור; 'contra' reproduce esa lectura contextual. 'Reino' mantiene מַלְכוּת y 'Grecia' traduce יָוָן con el nombre propio usual.
theological_decisions:
- issue: Sentido adversativo del final de la frase
  english_pob_reading: He will stir up all against the kingdom of Greece.
  chosen_spanish_reading: despertará a todos contra el reino de Grecia.
  alternative_spanish_readings:
  - despertará todo, es decir, el reino de Grecia
  - despertará a todos en favor del reino de Grecia
  rationale: La sintaxis hebrea con עור + הכל + את מַלְכוּת יָוָן se entiende mejor como una acción dirigida contra Grecia, no como un objeto interno neutro. La opción elegida preserva la lectura histórica del pasaje y evita suavizar la tensión sintáctica.
  doctrine_reference: Daniel 11:2 histórico-profético; coherencia contextual del relato profético
- issue: Naturaleza de la riqueza y la fortaleza del cuarto rey
  english_pob_reading: the fourth will become far richer than all of them; and when he becomes strong through his riches
  chosen_spanish_reading: el cuarto se hará mucho más rico que todos; y cuando se haga fuerte por medio de sus riquezas
  alternative_spanish_readings:
  - el cuarto obtendrá riqueza muy grande
  - y al hacerse poderoso por sus riquezas
  rationale: No se espiritualiza ni se moraliza la riqueza; se conserva como factor de poder político. 'Por medio de' mantiene el vínculo instrumental entre riqueza y fortaleza que el hebreo expresa.
  doctrine_reference: Daniel 11:2; lenguaje profético-histórico
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'for Persia' por 'in Persia' para mayor naturalidad y precisión, y 'everyone' por 'all' para acercarse más al hebreo. La redacción española sigue esa revisión con 'en Persia' y 'a todos', manteniendo además la lectura adversativa 'contra el reino de Grecia' reflejada en el audit trail.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - '''Mesías/Cristo'' no aparece en este versículo.'
  - Se evita 'SEÑOR' como sustituto del nombre divino porque el versículo no contiene el tetragrámaton.
  - '''He aquí'' conserva el valor deíctico/profético de הִנֵּה sin volver el español arcaizante.'
  - '''Reino'' se mantiene para מַלְכוּת, siguiendo el vocabulario político del contexto profético.'
