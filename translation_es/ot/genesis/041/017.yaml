    issue: Locución locativa algo forzada en ‘estaba yo de pie a la orilla del Nilo’
    rationale: En español bíblico general, ‘estar en la orilla’ suena más natural para una posición fija. ‘A la orilla’ es posible, pero con ‘estaba de pie’ puede sentirse menos fluido en registro neutro latinoamericano.
  - severity: low
    issue: Orden sintáctico ligeramente rígido en ‘he aquí, estaba yo de pie’
    rationale: Aunque fiel al valor presentativo, la combinación suena algo calcada. ‘he aquí, yo estaba de pie’ conserva mejor la función discursiva en español.
  revised_spanish_text: 'Entonces el faraón le dijo a José[a]: «En mi sueño, he aquí, yo estaba de pie en la orilla del Nilo».'
