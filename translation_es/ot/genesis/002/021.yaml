translation:
  language: es
  text: Entonces Yahvé Dios hizo caer sobre el hombre un sueño profundo, y él durmió; luego tomó una de sus costillas[a] y cerró la carne en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de sus costados». El hebreo puede referirse a un lado o a una parte lateral, así como a una costilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - Yahvé, Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino יהוה como «Yahvé», según el criterio español del proyecto, y אֱלֹהִים se vierte como «Dios». Se evita la sustitución por «SEÑOR», porque el sistema editorial pide no ocultar el nombre divino.
- source_word: תַּרְדֵּמָה
  english_pob_choice: a deep sleep
  chosen_spanish: un sueño profundo
  alternatives_spanish:
  - un letargo profundo
  - un sopor profundo
  lexicon: HALOT
  rationale: El sustantivo denota un sueño pesado o sopor inducido por Dios. «Sueño profundo» comunica bien el sentido en español sin sobrerrepresentar la intensidad con un término técnico poco natural.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al individuo masculino de Génesis 2, no a la humanidad en general. «El hombre» mantiene esa referencia específica y respeta la pauta de precisión de género cuando el contexto la requiere.
- source_word: וַיִּישָׁן
  english_pob_choice: and he slept
  chosen_spanish: y él durmió
  alternatives_spanish:
  - y se durmió
  - y durmió
  lexicon: HALOT
  rationale: Se conserva el movimiento narrativo simple del verbo hebreo. «Durmió» es natural en español; se explicita el sujeto para claridad y fluidez, aunque el hebreo ya lo marca verbalmente.
- source_word: אַחַת מִצַּלְעֹתָיו
  english_pob_choice: one of his ribs
  chosen_spanish: una de sus costillas[a]
  alternatives_spanish:
  - una de sus costillas/lados
  - una de sus lados
  lexicon: HALOT
  rationale: En este pasaje, «costilla» es la equivalencia más natural y tradicional en español para la lectura contextual, pero el hebreo puede significar también «lado» o una parte lateral. Se conserva la tensión lexicográfica mediante nota.
- source_word: וַיִּסְגֹּר בָּשָׂר
  english_pob_choice: closed up the flesh
  chosen_spanish: cerró la carne
  alternatives_spanish:
  - cerró la carne encima
  - cubrió con carne
  lexicon: HALOT
  rationale: Se mantiene el verbo de cierre de forma directa. «Carne» traduce בָּשָׂר sin suavizarlo a «piel» u otra palabra más interpretativa, y conserva el carácter corporal del texto.
- source_word: תַּחְתֶּנָּה
  english_pob_choice: in its place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - debajo de ella
  - bajo ella
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «debajo de ella», en este contexto la expresión indica el sitio dejado por la pieza tomada. «En su lugar» reproduce el sentido idiomático con naturalidad en español.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh rendered as the LORD in English POB, with the compound title LORD God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el SEÑOR Dios
  - Yahvé, Dios
  rationale: La política española del proyecto pide usar «Yahvé» en el texto principal. No se adopta la máscara litúrgica «SEÑOR», porque eso borraría la visibilidad del nombre divino en la base hebrea.
  doctrine_reference: 'DOCTRINE.md: Preserve source transparency; do not mask יהוה when the project target language uses Yahvé.'
- issue: Sentido de צֵלָע / מִצַּלְעֹתָיו
  english_pob_reading: one of his ribs, with a footnote for 'one of his sides'
  chosen_spanish_reading: una de sus costillas[a]
  alternative_spanish_readings:
  - una de sus lados
  - una de sus partes laterales
  rationale: Se respeta la lectura contextual de «costilla» por la imaginería quirúrgica del versículo y se preserva la alternativa semántica «lado» en la nota para no eliminar una ambigüedad documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve meaningful lexical alternatives and theological tension in footnotes.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta redacción sigue de cerca el texto hebreo y conserva la alternativa lexicográfica documentada en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה de manera consistente con el estándar del proyecto.
  - Se usa «Dios» para אֱלֹהִים sin alterar su valor singular en este contexto.
  - Se traduce בָּשָׂר por «carne» para preservar la imaginería corporal del pasaje.
  - Se conserva la ambigüedad de צֵלָע mediante nota, sin imponer una sola interpretación.
  - El tono es sobrio y publicable, con sintaxis natural en español latinoamericano.
