translation:
  language: es
  text: La primera suerte[a] salió para Jehoiarib, la segunda para Jedaías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática en español: «La primera suerte cayó en suerte a Jehoiarib, la segunda a Jedaías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - llegó a salir
  - cayó
  lexicon: HALOT
  rationale: El hebreo literalmente significa 'salir/ir afuera'. En el contexto de echar suertes, 'salió' conserva la imagen de la suerte que resulta seleccionada, y suena natural en español sin introducir una paráfrasis innecesaria.
- source_word: הַגּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - sorteo
  - lote
  lexicon: HALOT
  rationale: En español bíblico, 'suerte' expresa bien la pieza o decisión obtenida por sorteo. Evita la posible ambigüedad de 'lote' como porción territorial, y conserva el valor procedimental del hebreo.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - primera
  lexicon: HALOT
  rationale: Se mantiene el valor ordinal con artículo, como en la construcción hebrea, y concordado con 'suerte'.
- source_word: לִיהוֹיָרִיב
  english_pob_choice: for Jehoiarib
  chosen_spanish: para Jehoiarib
  alternatives_spanish:
  - a Jehoiarib
  lexicon: HALOT
  rationale: La preposición ל indica destino o asignación. 'Para' comunica de modo natural que la suerte le correspondió a Jehoiarib.
- source_word: לִידַעְיָה
  english_pob_choice: for Jedaiah
  chosen_spanish: para Jedaía
  alternatives_spanish:
  - a Jedaía
  lexicon: HALOT
  rationale: Se conserva la misma relación de asignación que en el primer miembro del verso. Se adapta el nombre a la grafía española habitual con acento por la secuencia de vocales.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - segunda
  lexicon: HALOT
  rationale: Se conserva el ordinal con artículo para reflejar la estructura paralela del hebreo y mantener la claridad secuencial.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo masorético y concuerda con el audit trail inglés: mantiene la secuencia ordinal, la asignación por sorteo y el paralelismo entre las dos mitades del verso. No hay revisiones aplicadas en el registro base.'
  spanish_consistency_notes:
  - Se usa 'suerte' de manera consistente para גּוֹרָל en un contexto de sorteo.
  - Se mantiene el paralelismo 'la primera... la segunda...' para reflejar el hebreo.
  - Se opta por 'salió' como traducción principal de וַיֵּצֵא, reservando 'cayó' como alternativa idiomática en la nota.
