  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido básico del hebreo: contraste adversativo, negación de que David construya la casa, identificación del hijo como descendiente corporal directa y dedicación de la casa al nombre de Dios. Sin embargo, la distribución de las notas está invertida respecto del texto y del rastro de auditoría inglés: la nota sobre «casa/templo» debe anclarse en «la casa», y la nota sobre «de tus lomos» debe anclarse en la expresión de descendencia corporal. Además, «de tus entrañas» es comprensible, pero se aparta algo del matiz de descendencia corporal masculina de מֵחֲלָצֶיךָ; «de tu propio cuerpo» sigue mejor la decisión documentada del POB inglés y evita una imagen en español que puede sonar más maternal o emocional que genealógica.'
