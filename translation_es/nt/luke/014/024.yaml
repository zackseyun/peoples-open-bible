translation:
  language: es
  text: Porque les digo que ninguno de aquellos hombres que habían sido invitados probará mi cena[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi banquete'.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Pues les digo
  - Porque yo les digo
  lexicon: BDAG
  rationale: λέγω con γάρ introduce una explicación o fundamentación; en español, 'Porque les digo' conserva el valor explicativo y el tono directo de habla. 'Les digo' evita una calca innecesaria de 'a ustedes' y suena natural en discurso directo.
- source_word: οὐδεὶς
  english_pob_choice: none
  chosen_spanish: ninguno
  alternatives_spanish:
  - nadie
  - ninguno de ellos
  lexicon: BDAG
  rationale: οὐδείς expresa negación absoluta. 'Ninguno' encaja bien con el sintagma partitivo siguiente y conserva la fuerza del original.
- source_word: τῶν ἀνδρῶν ἐκείνων
  english_pob_choice: those men
  chosen_spanish: de aquellos hombres
  alternatives_spanish:
  - de esas personas
  - de aquellos varones
  lexicon: BDAG
  rationale: ἀνήρ aquí es masculino plural y no un genérico neutro; por eso se conserva 'hombres'. 'Aquellos' reproduce el valor demostrativo de ἐκείνων y el vínculo con los ya mencionados.
- source_word: τῶν κεκλημένων
  english_pob_choice: who were invited
  chosen_spanish: que habían sido invitados
  alternatives_spanish:
  - invitados
  - que fueron invitados
  - los invitados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de καλέω señala a personas ya llamadas/invitadas. 'Que habían sido invitados' mantiene el aspecto resultativo y evita la posible ambigüedad de 'llamados' en español.
- source_word: γεύσεταί
  english_pob_choice: will taste
  chosen_spanish: probará
  alternatives_spanish:
  - gustará
  - saboreará
  - participará de
  lexicon: BDAG
  rationale: γεύομαι significa literalmente 'gustar/probar'. En contexto de banquete, 'probará' conserva la imagen verbal de la frase y funciona con naturalidad en español. Se evita 'participará de' porque suaviza demasiado la metáfora.
- source_word: μου τοῦ δείπνου
  english_pob_choice: my dinner
  chosen_spanish: mi cena
  alternatives_spanish:
  - mi banquete
  - mi comida
  - mi cena de noche
  lexicon: BDAG
  rationale: δεῖπνον designa la comida principal, a menudo la cena o un banquete. 'Cena' es la equivalencia española más natural y precisa aquí; se mantiene 'mi' para conservar el posesivo del griego sin alegorizarlo.
theological_decisions:
- issue: El anfitrión habla dentro de una parábola sin explicitar la alegoría en la traducción
  english_pob_reading: Retain the first-person possessive 'my dinner' without explicitly allegorizing it in the translation.
  chosen_spanish_reading: 'Mantener la voz del anfitrión: ''mi cena'', sin añadir una interpretación alegórica en el texto principal.'
  alternative_spanish_readings:
  - mi banquete
  - la cena del anfitrión
  rationale: El griego presenta la afirmación en la voz narrativa directa del anfitrión. Traducir de manera sobria preserva la tensión literaria y evita resolver en la traducción lo que el pasaje deja implícito.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide con la decisión auditada en inglés de preservar la imagen de 'taste' y el posesivo 'my'. No se introdujeron revisiones textuales adicionales; la lectura griega y el control cruzado muestran alta concordancia.
  spanish_consistency_notes:
  - Se mantiene el masculino plural 'hombres' por la referencia específica de ἀνδρῶν.
  - Se usa 'invitados' para κεκλημένων, en lugar de 'llamados', por claridad contextual en un banquete.
  - Se conserva 'mi' en 'mi cena' para reflejar el posesivo griego.
  - La nota al pie distingue la alternativa lexical 'banquete' y la forma tradicional 'cena'.
