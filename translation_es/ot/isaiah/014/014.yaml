translation:
  language: es
  text: Subiré por encima de las alturas de las nubes[a]; me haré semejante al Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me haré como el Altísimo». El hebreo puede verterse de manera más simple, pero «me haré semejante» conserva mejor el matiz reflexivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעֱלֶה
  english_pob_choice: I will ascend
  chosen_spanish: Subiré
  alternatives_spanish:
  - Ascenderé
  - Iré subiendo
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente. En español, «subiré» comunica con naturalidad la idea de ascenso y mantiene el tono de elevación del contexto poético sin sonar excesivamente técnico.
- source_word: עַל
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Con la imagen de alturas y nube, «por encima de» expresa mejor la idea de superar o rebasar una altura, no solo de estar sobre algo en contacto.
- source_word: בָּמֳתֵי עָב
  english_pob_choice: the heights of the clouds
  chosen_spanish: las alturas de las nubes
  alternatives_spanish:
  - los altos de las nubes
  - las cimas de las nubes
  lexicon: HALOT
  rationale: La construcción idiomática apunta a las regiones más altas de las nubes. «Alturas de las nubes» conserva la metáfora y resulta natural en español.
- source_word: אֶדַּמֶּה
  english_pob_choice: I will make myself like
  chosen_spanish: me haré semejante
  alternatives_spanish:
  - me haré como
  - me igualaré a
  lexicon: HALOT
  rationale: La forma reflexiva debe percibirse en español. «Me haré semejante» conserva el matiz de autoexaltación y evita aplanar el verbo a un simple «seré como».
- source_word: לְעֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: HALOT
  rationale: «Altísimo» es el título divino natural en español para עֶלְיוֹן. Conserva la función teológica del título sin reducirlo a un adjetivo común.
theological_decisions:
- issue: Título divino עֶלְיוֹן en un dicho de autoexaltación
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Altísimo Dios
  rationale: El contexto es una pretensión de elevarse hasta el nivel divino. «El Altísimo» funciona en español como título reverencial establecido y preserva la fuerza teológica del pasaje.
  doctrine_reference: 'Affirmations; Translation philosophy #1 y #6'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el acuerdo alto del expediente inglés; no se introdujeron cambios de fondo respecto de la lectura auditada. La única decisión destacada es conservar el matiz reflexivo de אֶדַּמֶּה y el valor de título divino de עֶלְיוֹן.
  spanish_consistency_notes:
  - Se usó «Altísimo» como título divino conforme al uso bíblico español y al sentido del contexto.
  - «Subiré» y «por encima de» preservan el paralelismo ascensional del verso.
  - La nota [a] se ancla en «me haré semejante» para señalar la alternativa más simple.
