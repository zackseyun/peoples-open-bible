translation:
  language: es
  text: Irrumpirá en Judá; desbordará y pasará; llegará hasta el cuello. Y la extensión de sus alas llenará la anchura de tu tierra, ¡oh, Emanuel![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Emanuel significa «Dios está con nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָלַף
  english_pob_choice: it will sweep on
  chosen_spanish: se deslizará
  alternatives_spanish:
  - pasará
  - avanzará
  lexicon: HALOT
  rationale: El contexto inmediato mantiene la imagen de una fuerza en movimiento, asociada al desbordamiento. «Se deslizará» conserva la idea de avance continuo sin perder la fuerza del cuadro metafórico.
- source_word: בִּיהוּדָה
  english_pob_choice: into Judah
  chosen_spanish: por Judá
  alternatives_spanish:
  - en Judá
  - hacia Judá
  lexicon: HALOT
  rationale: El español natural en este encuadre de invasión y expansión admite «por Judá» como recorrido a través del territorio, sin forzar una preposición direccional artificial.
- source_word: שָׁטַף
  english_pob_choice: it will overflow
  chosen_spanish: desbordará
  alternatives_spanish:
  - inundará
  - se saldrá de madre
  lexicon: HALOT
  rationale: «Desbordará» conserva el campo semántico del agua que rebasa sus límites y funciona bien con el movimiento progresivo del versículo.
- source_word: וְעָבַר
  english_pob_choice: and pass through
  chosen_spanish: y pasará por él
  alternatives_spanish:
  - y atravesará
  - y cruzará
  lexicon: HALOT
  rationale: La frase continúa la metáfora del avance destructivo. «Pasará por él» mantiene la progresión y evita una repetición demasiado mecánica de «deslizará».
- source_word: עַד צַוָּאר יַגִּיעַ
  english_pob_choice: it will reach up to the neck
  chosen_spanish: llegará hasta el cuello
  alternatives_spanish:
  - llegará hasta el cuello
  - alcanzará el cuello
  lexicon: HALOT
  rationale: «Hasta el cuello» reproduce la imagen idiomática de una amenaza que casi cubre por completo, sin explicitar más de lo que el hebreo dice.
- source_word: מֻטּוֹת כְּנָפָיו
  english_pob_choice: the spread of its wings
  chosen_spanish: la extensión de sus alas
  alternatives_spanish:
  - el despliegue de sus alas
  - el extenderse de sus alas
  lexicon: HALOT
  rationale: «Extensión» refleja bien la idea de algo extendido o desplegado. «Sus alas» conserva la imagen poética de alcance expansivo del agente invasor.
- source_word: מְלֹא רֹחַב אַרְצְךָ
  english_pob_choice: will fill the breadth of your land
  chosen_spanish: llenará la anchura de tu tierra
  alternatives_spanish:
  - llenará el ancho de tu tierra
  - llenará toda la anchura de tu tierra
  lexicon: HALOT
  rationale: «Anchura» traduce con fidelidad רֹחַב y mantiene la medida espacial del original. «Tu tierra» preserva el segundo singular del texto hebreo.
- source_word: עִמָּנוּ אֵל
  english_pob_choice: O Immanuel
  chosen_spanish: ¡oh, Emanuel!
  alternatives_spanish:
  - ¡oh, Immanuel!
  - Emanuel
  lexicon: HALOT
  rationale: En español, la forma bíblica y ampliamente reconocible es «Emanuel». Se mantiene el valor vocativo con «¡oh!» para reflejar el адрес directivo del hebreo, sin transformar el nombre en una cláusula explicativa en el texto principal.
theological_decisions:
- issue: Si עִמָּנוּ אֵל debe leerse como nombre propio o como la frase 'Dios con nosotros'
  english_pob_reading: Render as the proper name/address 'O Immanuel' in the main text
  chosen_spanish_reading: 'Tratarlo como nombre propio en vocativo: «¡oh, Emanuel!»'
  alternative_spanish_readings:
  - Dios con nosotros
  - ¡oh, Dios-con-nosotros!
  rationale: La lectura de POB preserva el enlace literario con Isaías 7:14 y entiende la expresión como apelativo directo. En español, un nombre propio vocativo mantiene mejor esa función que una paráfrasis clausular, que borraría la tensión entre nombre y significado.
  doctrine_reference: 'Principio POB: traducir títulos, transliterar nombres y conservar la tensión literaria-teológica cuando el texto la presenta.'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; este borrador conserva la misma decisión de leer עִמָּנוּ אֵל como nombre propio en vocativo, adaptando solo la forma española al uso bíblico corriente («Emanuel»).
  spanish_consistency_notes:
  - Se mantuvo el registro poético y profético, evitando explicaciones añadidas.
  - Se conservó el singular de la imagen verbal y del posesivo («sus alas»).
  - Se usó «Emanuel» como forma española tradicional del nombre, coherente con el valor onomástico del hebreo.
  - La nota al pie preserva el significado literal sin reemplazar el nombre en el cuerpo principal.
