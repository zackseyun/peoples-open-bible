translation:
  language: es
  text: ¿Qué nación no ha heredado un reino y se ha apoderado de sus despojos?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Despojos» mantiene el valor bélico de σκῦλα; también podría traducirse «botín».
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῖον ἔθνος
  english_pob_choice: What nation
  chosen_spanish: ¿Qué nación
  alternatives_spanish:
  - ¿Cuál nación
  - ¿Qué pueblo
  lexicon: LSJ
  rationale: ἔθνος aquí designa una colectividad política; «nación» comunica mejor ese valor que «pueblo» en español, y mantiene el tono retórico de la pregunta.
- source_word: ἐκληρονόμησεν
  english_pob_choice: has not inherited
  chosen_spanish: no ha heredado
  alternatives_spanish:
  - no ha recibido como herencia
  - no ha tomado posesión de
  lexicon: LSJ
  rationale: «Heredado» conserva la metáfora patrimonial de κληρονομέω y funciona de manera natural en español en una pregunta retórica con valor general.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reino real
  - la realeza
  lexicon: LSJ
  rationale: En este contexto político-concreto, «reino» es el equivalente más directo de βασιλεία y evita abstraerlo hacia «realeza» o «gobierno».
- source_word: ἐκράτησεν
  english_pob_choice: seized
  chosen_spanish: ha saqueado
  alternatives_spanish:
  - ha tomado
  - ha conquistado
  lexicon: LSJ
  rationale: El verbo griego puede implicar tomar por fuerza o dominar; en combinación con σκύλα, el sentido resultante es el de hacerse con los despojos del enemigo. En español, «saqueado» expresa de manera más natural esa acción vinculada al botín que un simple «seized» literal.
- source_word: τῶν σκύλων αὐτῆς
  english_pob_choice: its spoils
  chosen_spanish: sus despojos
  alternatives_spanish:
  - su botín
  - sus despojos de guerra
  lexicon: LSJ
  rationale: σκῦλα refiere a despojos tomados en guerra; «despojos» es una opción digna y precisa en español. «Sus» preserva la referencia al reino/nación antecedente, como en el inglés POB.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «seized» frente a una expresión más débil. En español se optó por una formulación igualmente fuerte y natural, uniendo el valor de ἐκράτησεν con el contexto de σκῦλα mediante «ha saqueado».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica no presente en el texto.
  - Se mantuvo el tono interrogativo retórico y el paralelismo de verbo + complemento del original griego.
  - «Despojos» se eligió como término de guerra más preciso que un equivalente genérico de «posesiones».
