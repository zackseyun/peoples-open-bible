translation:
  language: es
  text: Y trajeron un escudo de oro por valor de cinco mil minas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un escudo de oro de cinco mil minas». La construcción griega también puede leerse de forma más literal; aquí se entiende como indicación del valor del escudo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  english_pob_choice: they brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - presentaron
  lexicon: LSJ
  rationale: El aoristo de φέρω expresa el acto de trasladar o aportar el objeto. En español, «llevaron» mantiene la acción narrativa simple sin imponer de entrada un matiz ceremonial que el griego no explicita.
- source_word: ἀσπίδα
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - adarga
  - buckler
  lexicon: LSJ
  rationale: El sentido normal es «escudo». «Adarga» o «buckler» serían demasiado marcados o arcaizantes para un español moderno y amplio.
- source_word: χρυσῆν
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  - de oro macizo
  lexicon: LSJ
  rationale: El adjetivo atributivo puede referir material o valor. En español, «de oro» es natural y conserva la referencia material sin sobrerinterpretar la forma del objeto.
- source_word: ἀπὸ μνῶν πεντακισχιλίων
  english_pob_choice: worth five thousand minas
  chosen_spanish: por valor de cinco mil minas
  alternatives_spanish:
  - de cinco mil minas
  - valiendo cinco mil minas
  lexicon: LSJ
  rationale: Aunque ἀπό con una suma es literal, en este contexto de ofrenda o presente expresa valoración más que procedencia física. «Por valor de» reproduce bien ese sentido idiomático en español.
- source_word: μνῶν
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - libras
  lexicon: LSJ
  rationale: Se conserva el nombre de la unidad antigua para no perder la especificidad histórica ni convertirla a un equivalente moderno aproximado.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del griego de Swete y con la auditoría inglesa: acción simple de traer/llevar un escudo de oro, con la frase de la moneda entendida idiomáticamente como valor. No se documentan revisiones textuales o variantes relevantes en el paquete recibido.'
  spanish_consistency_notes:
  - Se mantuvo «minas» como transliteración de la unidad antigua, coherente con la decisión inglesa.
  - Se evitó «escudo dorado» para no diluir la referencia material o valorativa de χρυσῆν.
  - La nota al pie preserva la alternativa literal que el inglés POB también documenta.
