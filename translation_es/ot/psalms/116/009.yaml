    rationale: En el POB inglés, la nota alternativa comenta tanto «I will live» como la posibilidad de entender «lands» más generalmente como «land/realm». En español, si se mantiene una sola nota anclada solo en «Andaré», la observación sobre «tierras» queda mal localizada. Deben separarse en [a] y [b], con [b] anclada en «tierras».
  - severity: low
