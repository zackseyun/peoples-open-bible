translation:
  language: es
  text: 'Yitro dijo: «Bendito sea Yahvé[a], que los libró de la mano de los egipcios y de la mano de Faraón[b], que libró al pueblo de debajo de la mano de los egipcios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendito es Yahvé» o «Que Yahvé sea bendito». La fórmula hebrea de bendición puede expresarse de más de una manera natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la mano de los egipcios ... de debajo de la mano de los egipcios», un modismo para la liberación del poder opresivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw narrativo introduce la acción siguiente de forma natural en español; aquí el simple «dijo» comunica la secuencia sin forzar una conjunción redundante en la cita directa.
- source_word: יִתְרוֹ
  english_pob_choice: Yitro
  chosen_spanish: Yitro
  alternatives_spanish:
  - Jetro
  lexicon: HALOT
  rationale: Se conserva la transliteración más cercana a la forma hebrea, conforme al criterio del proyecto para nombres propios.
- source_word: בָּרוּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: Bendito sea Yahvé
  alternatives_spanish:
  - Bendito es Yahvé
  - Que Yahvé sea bendito
  lexicon: HALOT
  rationale: La fórmula de bendición se vierte con un pasivo/deseativo natural en español. «Bendito sea» preserva el valor doxológico sin sonar rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» como nombre divino, no una sustitución con título.'
- source_word: הִצִּיל
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - salvó
  - liberó
  lexicon: HALOT
  rationale: En este contexto de salida del dominio opresivo, «libró» expresa bien la acción de sacar a alguien de un poder hostil y mantiene el peso del verbo sin limitarlo a rescate físico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la «mano» como control o dominio, que en español sigue siendo comprensible y fiel al hebreo.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: El contexto colectivo exige la referencia al pueblo opresor, no solo al territorio. «Los egipcios» refleja mejor el sentido idiomático de la expresión.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Se usa la forma usual y plenamente inteligible en español para el título real.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: El sustantivo colectivo se mantiene en forma natural dentro de la relativa; el referente es Israel en el contexto inmediato.
- source_word: מִתַּחַת יַד
  english_pob_choice: from under the hand of
  chosen_spanish: de debajo de la mano de
  alternatives_spanish:
  - de bajo el poder de
  - de debajo del dominio de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea intensificada de sujeción «debajo de la mano». En español esta construcción sigue siendo comprensible y mantiene la repetición del idioma original.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del POB en inglés distingue el nombre propio del Señor del título. En español, «Yahvé» cumple la misma función y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula de bendición בָּרוּךְ יְהוָה
  english_pob_reading: Blessed be Yahweh
  chosen_spanish_reading: Bendito sea Yahvé
  alternative_spanish_readings:
  - Yahvé sea bendito
  - Bendecido sea Yahvé
  rationale: La forma elegida conserva el tono de proclamación de alabanza sin convertirlo en una simple constatación descriptiva. En español suena natural y transmite la misma doxología.
  doctrine_reference: HALOT; uso bíblico de fórmulas de bendición
- issue: Imagen idiomática de la mano
  english_pob_reading: from the hand of / from under the hand of
  chosen_spanish_reading: de la mano de / de debajo de la mano de
  alternative_spanish_readings:
  - del poder de / de debajo del poder de
  - de la autoridad de
  rationale: Se preserva la metáfora hebrea de dominio y opresión. Esto mantiene la tensión entre la imagen concreta y su sentido figurado, en vez de neutralizarla por completo.
  doctrine_reference: Uso idiomático hebreo de יָד para poder/control
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «Egypt» por «the Egyptians» en ambos lugares para reflejar el sentido colectivo del hebreo. La redacción española adopta ese mismo ajuste con «los egipcios» en ambas ocurrencias y conserva la repetición de «la mano de ...» / «de debajo de la mano de ...» como en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יהוה, conforme al estándar del proyecto.
  - Se mantiene «libró» para הִצִּיל, en coherencia con el campo semántico de liberación del contexto del éxodo.
  - Se conserva «la mano de» para reflejar el hebreo idiomático y evitar una paráfrasis excesiva.
  - Se usa «Faraón» como título propio conocido y natural en español.
  - La cita abre y cierra con comillas angulares, adecuadas para publicación en español.
