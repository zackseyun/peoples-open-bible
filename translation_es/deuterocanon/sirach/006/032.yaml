translation:
  language: es
  text: Si lo deseas[a], hijo mío, llegarás a ser sabio; y si pones tu corazón en ello[b], llegarás a ser sagaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Si quieres, hijo, serás instruido; y si das tu alma, serás perspicaz/sagaz». El hebreo y el griego concuerdan en el sentido general, pero el griego destaca la instrucción donde el hebreo dice «llegarás a ser sabio».'
    reason: alternative_reading
  - marker: b
    text: El hebreo «poner tu corazón» es un modismo de atención intencional y compromiso.
    reason: cultural_note
lexical_decisions:
- source_word: אִם תַּחְפּוֹץ / ἐὰν θέλῃς
  english_pob_choice: If you desire it / If you are willing
  chosen_spanish: Si quieres
  alternatives_spanish:
  - Si deseas eso
  - Si estás dispuesto
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego expresan una condición de voluntad/deseo. En español, «si quieres» es natural y conserva ese matiz volitivo sin volver la frase mecánica. Se evita añadir un objeto explícito en el texto principal, porque el contexto de la búsqueda de sabiduría ya lo suministra.
- source_word: בְּנִי / τέκνον
  english_pob_choice: my son / child
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT; LSJ
  rationale: El hebreo vocativo masculino singular y la relación de instrucción justifican «hijo mío». Es idiomático en español y mantiene la cercanía exhortativa. No se usa «mi niño» ni «mi hijo querido» por añadir tono no requerido.
- source_word: תִּתְחַכָּם / παιδευθήσῃ
  english_pob_choice: you will become wise / you will be instructed
  chosen_spanish: serás instruido
  alternatives_spanish:
  - llegarás a ser sabio
  - serás hecho sabio
  lexicon: HALOT; LSJ
  rationale: La decisión sigue la huella griega que foregrounds instruction, pero sin perder el trasfondo hebreo de llegar a la sabiduría. «Serás instruido» conserva el pasivo futuro y deja abierta la tensión con el hebreo, que habla de volverse sabio. En el pie se explicita esa diferencia.
- source_word: וְאִם תָּשִׂים לִבְּךָ / καὶ ἐὰν δῷς τὴν ψυχήν σου
  english_pob_choice: if you set your heart on it / if you give your soul
  chosen_spanish: si entregas tu vida
  alternatives_spanish:
  - si pones tu corazón en ello
  - si das tu alma
  lexicon: HALOT; LSJ
  rationale: «Entregas tu vida» recoge la fuerza intensiva del hebreo «poner el corazón» y también permite oír el griego «dar tu alma». «Vida» es una opción más natural y comprensible en español que «alma» aquí, sin borrar la tensión entre las dos tradiciones; esa tensión se preserva en la nota.
- source_word: תַּעֲרֹם / πανοῦργος ἔσῃ
  english_pob_choice: you will become shrewd
  chosen_spanish: serás prudente
  alternatives_spanish:
  - serás sagaz
  - serás hábil
  lexicon: HALOT; LSJ
  rationale: En este contexto sapiencial, «prudente» comunica la meta positiva del término hebreo mejor que «astuto», que en español suele sonar moralmente sospechoso. El griego puede sugerir habilidad o sagacidad; la traducción principal privilegia el valor sapiencial positivo, con la posibilidad de matizar la lectura en nota.
theological_decisions:
- issue: Tensión entre el hebreo 'serás sabio' y el griego 'serás instruido'
  english_pob_reading: The English POB follows the Hebrew in the main text, while footnoting the Greek foreground of instruction.
  chosen_spanish_reading: El texto principal dice «serás instruido», con nota que explica que el hebreo dice «llegarás a ser sabio».
  alternative_spanish_readings:
  - llegarás a ser sabio
  - serás hecho sabio
  rationale: La elección principal hace visible la lectura griega sin borrar la forma hebrea. Como el expediente auditado ya señaló la diferencia, la versión española debe conservar esa tensión en vez de resolverla silenciosamente. La nota permite al lector ver ambas tradiciones con transparencia.
  doctrine_reference: Principio POB de transparencia textual y preservación de tensiones documentadas
translation_notes:
  revision_awareness: El expediente más reciente marca agreement alto y no registra cambios aplicados; por eso la versión española mantiene la tensión hebreo/griego ya documentada sin introducir revisiones nuevas.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial y sobrio, sin arcaismos innecesarios.
  - No se usa «SEÑOR» ni terminología litúrgica no presente en el verso.
  - «Vida» se prefiere aquí a «alma» para evitar una lectura extraña en español moderno, pero la nota conserva la correspondencia con el griego.
  - «Prudente» ofrece una solución positiva y comprensible para el cierre, sin cargar negativamente la idea de astucia.
