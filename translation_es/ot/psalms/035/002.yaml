  glossary_alignment: No hay conflicto con la terminología base del proyecto. La imaginería bélica con Yahvé se mantiene. La distinción entre los dos términos de escudo se preserva, aunque 'adarga' es una elección menos común; la nota compensa esa posible opacidad.
