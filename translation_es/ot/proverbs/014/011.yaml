translation:
  language: es
  text: La casa de los malvados será destruida, pero la tienda de los rectos florecerá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brotará» o «echará brotes»; el verbo hebreo evoca la imagen de un crecimiento que brota o florece.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  english_pob_choice: house of
  chosen_spanish: casa de
  alternatives_spanish:
  - casa
  - hogar de
  lexicon: HALOT
  rationale: El constructo hebreo expresa relación genitiva. «Casa de» conserva la imagen concreta y la oposición con «tienda». En español, «hogar de» suavizaría demasiado la metáfora; «casa» solo podría perder la relación explícita con el grupo poseído.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo designa a personas moralmente perversas. «Malvados» comunica bien esa fuerza en español actual y evita un matiz más técnico o eclesiástico que «impíos».
- source_word: יִשָּׁמֵד
  english_pob_choice: will be destroyed
  chosen_spanish: será destruida
  alternatives_spanish:
  - será arrasada
  - será deshecha
  - será aniquilada
  lexicon: HALOT
  rationale: El nifal imperfecto de שׁמד indica quedar destruido o arruinado. «Será destruida» sigue de cerca esa fuerza sin intensificar de más hacia «aniquilada», que podría ir más allá del proverbio.
- source_word: אֹהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - morada
  - vivienda
  lexicon: HALOT
  rationale: «Tienda» conserva la imagen literal del hebreo y el contraste imagético con «casa». «Tienda de campaña» es más explícito pero más pesado; «morada» o «vivienda» borrarían la metáfora.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - los honestos
  lexicon: HALOT
  rationale: יׁשרים apunta a quienes son rectos o moralmente derechamente ordenados. «Rectos» mantiene esa imagen ética y diferencia este término de otros hebreos más jurídicos como «justos».
- source_word: יַפְרִיחַ
  english_pob_choice: will flourish
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - dará flor
  - prosperará
  lexicon: HALOT
  rationale: El hifil de פרח evoca brotar, florecer y desarrollarse con vitalidad. «Florecerá» preserva la imagen vegetal del hebreo y también sugiere prosperidad, como en el audit trail inglés.
translation_notes:
  revision_awareness: Coincide con el pasaje auditado en la revisión más reciente; no se registran cambios aplicados ni tensiones textuales adicionales respecto del inglés POB.
  spanish_consistency_notes:
  - Se mantuvo la oposición imagística hebrea entre «casa» y «tienda».
  - Se prefirió vocabulario bíblico claro pero no arcaizante.
  - La nota al pie conserva la alternativa verbal de crecimiento que el inglés POB documenta para יַפְרִיחַ.
