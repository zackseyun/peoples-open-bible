review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: la adyacencia espacial («junto a ellos»), la acción de reparar, el gentilicio «tecoítas», la referencia a los nobles locales y el plural humano «sus señores». Sin embargo, omite el matiz de negativa/refusal expresado por לֹא הֵבִיאוּ al traducir «no pusieron» en vez de una forma volitiva como «no quisieron poner» o «no se prestaron a poner».'
  spanish_quality_summary: El texto es claro y legible, pero «no pusieron su cuello a la obra» suena algo rígido y puede leerse como simple hecho, no como resistencia deliberada. Además, la nota actual no ayuda mucho porque ofrece «su cuello» frente a un texto que ya dice «su cuello». Conviene ajustar el español para conservar la fuerza idiomática y naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Señores» preserva correctamente אֲדֹנֵיהֶם como plural humano, evitando una lectura divina. «Tecoítas» y «reparaciones» son adecuados. La principal mejora es hacer explícita la negativa implícita en el hebreo con una formulación española más natural.
  issues:
  - severity: medium
    issue: Falta el matiz volitivo de negativa en «no pusieron su cuello»
    rationale: לֹא הֵבִיאוּ צַוָּרָם, en este contexto idiomático, no describe solo ausencia de acción sino negativa deliberada. «No quisieron poner su cuello» comunica mejor la resistencia que el inglés POB marcó con «would not put their necks».
  - severity: medium
    issue: La nota al pie actual es defectuosa y redundante
    rationale: La nota dice «O “su cuello”», pero el texto principal ya contiene «su cuello». No preserva una alternativa real ni explica con precisión la literalidad/idiomaticidad relevante.
  revised_spanish_text: Y junto a ellos hicieron reparaciones los tecoítas, pero sus nobles no quisieron poner su cuello[a] a la obra de sus señores.
  revised_footnotes:
  - marker: a
    text: Literalmente, «no llevaron su cuello a la obra de sus señores», un modismo que expresa negarse a someterse o a asumir la labor.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula negativa para reflejar mejor la idea de rechazo deliberado presente en el hebreo y ya reconocida en el inglés POB. También se reemplaza la nota defectuosa por una que preserve la literalidad hebrea y explique el valor idiomático sin crear redundancia.
