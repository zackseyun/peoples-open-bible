revisions:
- from: Porque mi ángel[a] está con ustedes, y él mismo está buscando sus almas.
  to: Porque mi ángel está con ustedes, y él mismo vela por sus almas[a].
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «almas», que es el término explicado. Además, se sustituye «está buscando» por «vela por» para evitar una formulación poco idiomática y equívoca en español, manteniendo el sentido contextual de cuidado protector señalado en el expediente léxico. No se requiere adjudicación adicional porque es una mejora de estilo y claridad, no una disputa textual o doctrinal difícil.
