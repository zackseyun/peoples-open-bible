review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: כִּי como conector explicativo, la cláusula temporal ''cuando subieron de Egipto'', el tránsito de Israel por el desierto, el alcance ''hasta'' el Mar Rojo, y la llegada a Cades. La nota sobre יַם סוּף preserva la alternativa léxica documentada en el POB inglés. El único desajuste relevante es estilístico-sintáctico: ''Porque cuando...'' puede sonar algo pesado en español bíblico corrido; ''Pues, cuando...'' o ''Porque, cuando...'' fluye mejor. Además, la nota al pie actual tiene redacción poco natural (''lexical'').'
  spanish_quality_summary: El texto es claro y mayormente natural. 'Israel fue por el desierto' es entendible, pero 'Israel fue por el desierto' suena algo menos idiomático que 'Israel anduvo por el desierto' o 'Israel fue por el desierto hasta...'. Aun así, no distorsiona el sentido. El cambio principal recomendado es mejorar el conector inicial y pulir la nota al pie al español natural. El resto —'subieron de Egipto', 'Mar Rojo', 'Cades'— es legible y fiel.
  glossary_alignment: No hay términos del glosario teológico principal implicados salvo el topónimo y la tradición de יַם סוּף. 'Mar Rojo' en texto principal con nota 'mar de Juncos' concuerda con la decisión auditada. No hay conflicto con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Inicio con 'Porque cuando' suena torpe en español corrido.
    rationale: Aunque formalmente posible, la combinación de conector explicativo y temporal queda pesada. 'Pues, cuando...' conserva mejor la función discursiva de כִּי sin perder naturalidad.
  - severity: low
    issue: La nota al pie usa 'Alternativa lexical', formulación poco natural en español.
    rationale: En español eclesial general es preferible 'Otra posibilidad de traducción' o 'También puede traducirse'. Además conviene reflejar el texto inglés auditado con sencillez.
  revised_spanish_text: Pues, cuando subieron de Egipto, Israel fue por el desierto hasta el Mar Rojo[a] y llegó a Cades.
  revised_footnotes:
  - marker: a
    text: Otra posibilidad de traducción para «Mar Rojo» es «Mar de Juncos».
    reason: lexical_alternative
  revision_rationale: Se ajusta el conector inicial para un español más natural sin perder la fuerza explicativa de כִּי, y se reescribe la nota al pie en español idiomático manteniendo la alternativa léxica documentada para יַם סוּף. No se requieren cambios de fondo en la traducción.
