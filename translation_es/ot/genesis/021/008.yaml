translation:
  language: es
  text: El niño creció y fue destetado[a], y Abraham hizo un gran banquete[b] el día en que Isaac fue destetado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el niño creció y fue destetado».
    reason: lexical_alternative
  - marker: b
    text: «Banquete» también puede traducirse como «festín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - creció más
  - se desarrolló
  - creció y maduró
  lexicon: HALOT
  rationale: En el contexto de un niño, גדל expresa crecimiento físico y desarrollo normal; «creció» comunica esa idea de forma natural y precisa en español.
- source_word: הַיֶּלֶד
  english_pob_choice: the boy
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el chico
  - el niño pequeño
  lexicon: HALOT
  rationale: יֶלֶד denota un niño o muchacho. Dado el contexto del destete, «el niño» es la opción más natural y no fuerza una edad más precisa de la que el hebreo da.
- source_word: וַיִּגָּמַל
  english_pob_choice: was weaned
  chosen_spanish: fue destetado
  alternatives_spanish:
  - fue amamantado hasta dejar de serlo
  - quedó destetado
  - dejó de mamar
  lexicon: HALOT
  rationale: גמל en este contexto se refiere al cese de la lactancia. «Fue destetado» es el equivalente directo y digno en español, sin añadir explicación innecesaria.
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - preparó
  - organizó
  - celebró
  lexicon: HALOT
  rationale: עשה es un verbo amplio; con מִשְׁתֶּה como objeto, «hizo» mantiene la cercanía formal al hebreo y funciona bien en español bíblico contemporáneo.
- source_word: מִשְׁתֶּה גָדֹול
  english_pob_choice: a great feast
  chosen_spanish: un gran banquete
  alternatives_spanish:
  - una gran fiesta
  - un gran festín
  - un gran banquete
  lexicon: HALOT
  rationale: מִשְׁתֶּה puede ser «banquete» o «fiesta de celebración». «Gran banquete» conserva el valor ceremonial y festivo, y «banquete» permite reflejar el posible matiz de comida solemne sin reducirlo a mera fiesta social.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día de
  - cuando
  - el día de
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa de manera natural en español con «el día en que», que conserva la referencia al día señalado y evita un calco rígido.
- source_word: הִגָּמֵל אֶת יִצְחָק
  english_pob_choice: Isaac was weaned
  chosen_spanish: fue destetado Isaac
  alternatives_spanish:
  - Isaac fue destetado
  - al ser destetado Isaac
  - cuando Isaac fue destetado
  lexicon: HALOT
  rationale: El infinitivo constructo con אֶת marca el evento del destete de Isaac. La pasiva «fue destetado Isaac» mantiene la dependencia verbal del hebreo y deja claro el sujeto paciente, aunque el español fluye mejor en la cláusula temporal completa.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el testigo hebreo y con la auditoría inglesa: no se detectan revisiones sustantivas pendientes, por lo que la redacción española sigue de cerca la sintaxis y las decisiones léxicas ya validadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se usa «destetado» para גמל en sentido pasivo, coherente con el valor léxico documentado.
  - «Banquete» se elige por su dignidad y cercanía a מִשְׁתֶּה, sin perder la posibilidad de matiz festivo.
  - La estructura temporal «el día en que» conserva el valor de בְּיוֹם sin sobreinterpretar la relación causal o meramente consecutiva.
