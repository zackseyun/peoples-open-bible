    rationale: El inglés POB eligió «your sons» y documentó su importancia lexical y teológica. «Tus hijos» en español puede funcionar, pero neutraliza parcialmente la masculinidad específica del original. Se requiere al menos una nota más precisa y una formulación revisada coherente con esa decisión.
