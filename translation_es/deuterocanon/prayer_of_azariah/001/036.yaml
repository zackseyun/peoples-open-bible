translation:
  language: es
  text: Bendigan al Señor, oh, cielos; cántenle alabanzas y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural exhorta a hablar bien de Dios; «bendecid» conserva el tono litúrgico y la correspondencia directa con el refrán poético mejor que una paráfrasis más general.
- source_word: οὐρανοί
  english_pob_choice: O heavens
  chosen_spanish: oh cielos
  alternatives_spanish:
  - cielos
  - oh, cielos
  lexicon: LSJ
  rationale: Es vocativo plural dirigido a los cielos. «Oh cielos» mantiene la invocación poética y la solemnidad del original griego.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Maestro
  lexicon: BDAG
  rationale: κύριος aquí nombra a Dios en un contexto hímnico; «Señor» sigue el valor del griego sin introducir la convención de mayúsculas reservada para YHWH.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - cantad himnos a él
  - alabadle con canto
  lexicon: BDAG
  rationale: El verbo implica cantar un himno o alabanza. «Cantadle alabanzas» comunica el matiz musical de forma natural en español y preserva el objeto pronominal del griego.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo grandemente
  alternatives_spanish:
  - exaltadlo en gran manera
  - alzadlo muy en alto
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de exaltar. «Grandemente» reproduce esa fuerza enfática en español sin perder el paralelo poético con la línea anterior.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: Es una expresión idiomática de perpetuidad. «Para siempre» es la equivalencia española más clara y natural para este refrán doxológico.
theological_decisions:
- issue: Renderizado de κύριος en una alabanza dirigida a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - el Maestro
  rationale: El testimonio griego tiene κύριον; no aparece el Tetragrámaton en esta forma. Por eso se mantiene «Señor» y no la convención editorial «Yahvé» ni una mayúscula reservada para YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada. La traducción se mantiene sin marcadores porque no se requiere ninguna ambigüedad adicional para esta línea poética.
  spanish_consistency_notes:
  - Se conserva el paralelismo imperativo del griego con tres exhortaciones encadenadas.
  - «Señor» se usa consistentemente para κύριος en este contexto hímnico.
  - La estructura poética breve y solemne respeta el tono doxológico del pasaje.
