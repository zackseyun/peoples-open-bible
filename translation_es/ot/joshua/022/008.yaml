    text: O «despojo» de sus enemigos.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» se refiere aquí a sus compatriotas israelitas de las otras tribus.
    reason: cultural_note
  - marker: c
    text: O «cobre».
    reason: lexical_alternative
  revision_rationale: Se ajustó el español para que suene natural y siga mejor el orden del mandato hebreo, se reemplazó el calco «dijo a ellos» por «les dijo», y se restauró la nota léxica sobre «bronce/cobre» presente en la auditoría inglesa.
