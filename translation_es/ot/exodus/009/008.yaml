translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés y a Aarón: «Tomen para ustedes puñados[a] de hollín[b] de un horno, y que Moisés lo lance hacia el cielo[c], ante los ojos de Faraón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puñados llenos»; literalmente, «la plenitud de sus manos».
    reason: lexical_alternative
  - marker: b
    text: «Hollín» también puede traducirse «hollín fino» o, de manera más general, «cenizas», aunque el hebreo apunta más específicamente al hollín de un horno.
    reason: lexical_alternative
  - marker: c
    text: O «hacia los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: La POB en inglés conserva el nombre divino propio; en español, la forma establecida del mismo principio es «Yahvé», que preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - les dijo
  lexicon: HALOT
  rationale: אָמַר es el verbo estándar de decir; «dijo» es la equivalencia natural y directa en español.
- source_word: קְחוּ לָכֶם
  english_pob_choice: Take for yourselves
  chosen_spanish: Tomen para ustedes
  alternatives_spanish:
  - Tomen
  - Consigan para ustedes
  lexicon: HALOT
  rationale: El plural imperativo con לָכֶם conserva un matiz dativo/reflexivo. «Para ustedes» mantiene esa fuerza sin volver la frase artificiosa.
- source_word: מְלֹא חָפְנֵיכֶם
  english_pob_choice: handfuls
  chosen_spanish: puñados
  alternatives_spanish:
  - puñados llenos
  - la plenitud de sus manos
  lexicon: HALOT
  rationale: La expresión literalmente significa «la plenitud de sus manos/palmas». «Puñados» comunica de manera idiomática la cantidad, y el plural refleja a los dos destinatarios.
- source_word: פִּיחַ
  english_pob_choice: soot
  chosen_spanish: hollín
  alternatives_spanish:
  - hollín fino
  - ceniza
  lexicon: HALOT
  rationale: פִּיחַ denota hollín o residuo negro pulverulento, más específico que «ceniza». «Hollín» reproduce mejor el campo léxico en el contexto de la plaga.
- source_word: כִּבְשָׁן
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - horno de fundición
  - furnace
  lexicon: HALOT
  rationale: El término puede referirse a horno o kilnín. «Horno» es el equivalente natural en español y suficiente para el contexto sin sobreespecificar.
- source_word: וּזְרָקוֹ
  english_pob_choice: and let Moses throw it
  chosen_spanish: y Moisés lo lanzará
  alternatives_spanish:
  - y Moisés lo arrojará
  - y que Moisés lo lance
  lexicon: HALOT
  rationale: Aunque el verbo inicial es plural, aquí pasa a un actor singular con objeto sufijado, señalando a Moisés. «Lo lanzará» mantiene la referencia verbal y suena natural en español.
- source_word: הַשָּׁמַיְמָה
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - hacia arriba
  - hacia los cielos
  lexicon: HALOT
  rationale: La terminación direccional expresa movimiento ascendente. «Hacia el cielo» conserva la imagen sin cargarla innecesariamente de tono teológico o poético.
- source_word: לְעֵינֵי פַרְעֹה
  english_pob_choice: before Pharaoh’s eyes
  chosen_spanish: ante los ojos de Faraón
  alternatives_spanish:
  - en presencia de Faraón
  - a la vista de Faraón
  lexicon: HALOT
  rationale: El modismo literal enfatiza una acción visible y pública. «Ante los ojos de Faraón» preserva la vividez del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En la POB española, la opción transparente y tradicionalmente auditable es «Yahvé», que conserva el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audito inglés mantiene high_agreement y no introduce cambios de revisión; la versión española sigue la misma lectura base, conservando las decisiones clave sobre el nombre divino, la cantidad expresada por מְלֹא חָפְנֵיכֶם, el valor específico de פִּיחַ y el desplazamiento verbal hacia Moisés en וּזְרָקוֹ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustitución oculta del nombre divino.
  - «Hollín» se mantiene frente a «ceniza» para conservar la especificidad léxica.
  - «Ante los ojos de Faraón» reproduce el hebraísmo visible sin naturalizarlo en exceso.
