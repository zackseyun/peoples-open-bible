    text: 'Hebreo: «según el siclo del santuario», es decir, conforme al patrón de peso del santuario.'
    reason: cultural_note
  revision_rationale: Se corrige un error gramatical y léxico importante reemplazando «una aspersorio» por «un tazón», con nota que preserva la naturaleza ritual del término. También se ajusta «ofrenda vegetal» a «ofrenda de cereal» para reflejar mejor מִנְחָה / ‘grain offering’, y se explicita levemente el referente de «ambos» con «ambos recipientes».
