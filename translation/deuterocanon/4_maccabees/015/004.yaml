  confidence: high
  validation: minor_mismatch
translation:
  text: Oh[a], how can I describe the child-loving affections of parents, who imprint the likeness of soul and form in the small, marvelous character of a child[c][b], especially since mothers make fathers more sympathetic toward their children who have been born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portray' or 'set forth' for 'describe'; the Greek verb is rhetorically elevated.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the likeness of soul and form,' expressing resemblance in both inner disposition and outward appearance.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'those who have been born,' referring to the children/offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθολογήσαιμι
  chosen: describe
  alternatives:
  - depict
  - set forth in character
  - portray
  lexicon: LSJ
  rationale: The verb is rhetorically expressive, asking how the speaker could adequately articulate or portray these affections. 'Describe' is natural modern English and preserves the sense without over-literality.
- source_word: φιλότεκνα
  chosen: child-loving
  alternatives:
  - loving their children
  - fond of children
  lexicon: LSJ
  rationale: The adjective specifically denotes affection toward one's children. 'Child-loving' keeps the compact force of the Greek, though somewhat unusual in English; it suits the elevated rhetoric of the passage.
- source_word: πάθη
  chosen: affections
  alternatives:
  - feelings
  - passions
  - emotions
  lexicon: LSJ
  rationale: Here the term refers to deep parental emotional attachments, not disordered passions. 'Affections' best conveys strong but not necessarily negative emotion.
- source_word: ψυχῆς
  chosen: soul
  alternatives:
  - life
  - inner self
  lexicon: LSJ
  rationale: In the phrase 'likeness of soul and form,' the author speaks of resemblance in inward disposition as well as outward appearance. 'Soul' preserves the anthropological weight of the Greek.
- source_word: μορφῆς
  chosen: form
  alternatives:
  - shape
  - appearance
  lexicon: LSJ
  rationale: Paired with ψυχῆς, μορφῆς points to outward form or appearance. 'Form' preserves the parallelism and rhetorical dignity.
- source_word: παιδοχαρακτῆρα
  chosen: stamp of a child
  alternatives:
  - child-image
  - child-impression
  - child-figure
  lexicon: LSJ
  rationale: The compound evokes an engraved or stamped impression embodied in the child. 'Stamp of a child' preserves the metaphor of imprinting more clearly than a flattened paraphrase.
- source_word: ἐναποσφραγίζοντα
  chosen: imprint
  alternatives:
  - stamp into
  - seal in
  lexicon: LSJ
  rationale: The verb carries the idea of impressing a seal or stamp. 'Imprint' is concise and idiomatic while retaining the metaphor.
- source_word: συμπαθεστέρας
  chosen: more sympathetic
  alternatives:
  - more tenderly affected
  - more compassionate
  - more emotionally attached
  lexicon: LSJ
  rationale: The comparative indicates increased fellow-feeling or emotional responsiveness. 'More sympathetic' is the closest concise rendering, though the context suggests tender parental empathy.
- source_word: τοῖς γεννηθεῖσιν
  chosen: toward those who have been born
  alternatives:
  - toward their offspring
  - toward the children who have been born
  lexicon: LSJ
  rationale: The participle literally means 'those who have been born.' The phrase refers to the children just mentioned. The more literal rendering is retained in the draft, though 'offspring' is a viable smoother alternative.
