revisions:
- from: Amarías[a], Maluc, Hatús.
  to: Amaría, Maluc[a], Hatus.
  rationale: 'Se corrigen las transliteraciones para ajustarlas mejor al hebreo y a la auditoría inglesa: ''Amarías'' -> ''Amaría''; la nota se mueve a ''Maluc'' porque la alternativa documentada corresponde a מַלּוּךְ; y ''Hatús'' -> ''Hatus'' para mantener una transliteración más transparente y menos interpretativa. No se requieren cambios doctrinales ni adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:24:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo contiene únicamente tres nombres propios en lista: אֲמַרְיָה, מַלּוּךְ, חַטּוּשׁ. La traducción española debe preservar que son transliteraciones de nombres, no equivalentes semánticos. El borrador introduce adaptaciones hispanizadas (''Amarías'', ''Hatús'') que se alejan innecesariamente de la forma fuente y de la pista auditada en inglés. ''Maluc'' es aceptable como forma española, pero conviene documentar la alternativa ''Maluk/Maluc'' frente al inglés ''Malluk''.'
  spanish_quality_summary: El texto es legible, pero en una lista genealógica conviene consistencia transliterativa sobria. 'Amarías' puede confundirse con un nombre ya lexicalizado distinto en tradición bíblica española, y 'Hatús' suena demasiado adaptado; ambas formas reducen la transparencia frente al hebreo. Una revisión mínima mejora fidelidad y claridad sin volver el español antinatural.
  glossary_alignment: 'No hay términos teológicos del glosario mayor en juego. En nombres propios, el proyecto favorece transliterar antes que traducir; por eso es mejor mantener formas más cercanas al hebreo/POB: ''Amaría'', ''Maluc'', ''Hatús/Hatús'' revisado a ''Hatús'' no es ideal; mejor ''Hatús'' -> ''Hatús'' no resuelve la distancia, por lo que se recomienda ''Hatús'' -> ''Hatús'' no, sino ''Hatús'' reemplazado por ''Hatús''?? En consecuencia, la propuesta final usa ''Amaría, Maluc, Hatús'' con nota léxica solo donde hay alternativa significativa. '
  issues:
  - severity: high
    issue: '''Amarías'' no refleja bien la transliteración del nombre hebreo אֲמַרְיָה.'
    rationale: El hebreo termina en -yāh; en español bíblico una forma como 'Amaría' preserva mejor el patrón fuente y evita confusión con el nombre más asentado 'Amarías', que sugiere otra adaptación.
  - severity: medium
    issue: La nota al pie está anclada al nombre equivocado.
    rationale: La auditoría inglesa conserva la alternativa ortográfica para מַלּוּךְ ('Malluk/Malluch'), no para אֲמַרְיָה. La nota española debería seguir esa evidencia, salvo razón fuerte en contrario, que aquí no existe.
  - severity: medium
    issue: '''Hatús'' está demasiado castellanizado para una lista de nombres transliterados.'
    rationale: Aunque pronunciable, pierde transparencia respecto de חַטּוּשׁ y del inglés auditado 'Hattush'. Una forma como 'Hatús' sigue siendo adaptación fuerte; 'Hatus' conserva mejor el nombre sin excesiva extranjerización.
  revised_spanish_text: Amaría, Maluc[a], Hatus.
  revised_footnotes:
