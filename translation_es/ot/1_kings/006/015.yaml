translation:
  language: es
  text: Construyó las paredes de la casa por dentro con tablas de cedro[a]; desde el piso de la casa hasta las paredes del techo[b], las revistió de madera por dentro, y cubrió el piso de la casa con tablas de ciprés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con tablas de ciprés"; tradicionalmente, "con tablas de abeto". El nombre hebreo del árbol puede referirse a una conífera como el ciprés o el junípero.
    reason: lexical_alternative
  - marker: b
    text: La expresión "hasta las paredes del techo" probablemente significa hasta el cielo raso interior o el revestimiento del techo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Construyó
  alternatives_spanish:
  - Y construyó
  - Él construyó
  lexicon: HALOT
  rationale: El verbo wayyiqtol narra la acción en secuencia. En español, 'Construyó' conserva la progresión narrativa sin añadir una conjunción que el estilo fluido no requiere.
- source_word: קִירוֹת הַבַּיִת
  english_pob_choice: the walls of the house
  chosen_spanish: las paredes de la casa
  alternatives_spanish:
  - los muros de la casa
  - las paredes del templo
  lexicon: HALOT
  rationale: קִירוֹת designa paredes/muros. 'Casa' refleja el hebreo, aunque el referente contextual sea el templo; se evita explicitar 'templo' para no ir más allá del texto.
- source_word: מִבַּיְתָה
  english_pob_choice: on the inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - en el interior
  - desde dentro
  lexicon: HALOT
  rationale: La forma indica ubicación/dirección interior. 'Por dentro' expresa de modo natural que el revestimiento se colocó en la cara interna.
- source_word: בְּצַלְעוֹת אֲרָזִים
  english_pob_choice: with cedar boards
  chosen_spanish: con tablas de cedro
  alternatives_spanish:
  - con tablones de cedro
  - con planchas de cedro
  lexicon: HALOT
  rationale: צַלְעוֹת en este contexto arquitectónico se refiere a piezas de madera para revestimiento. 'Tablas' mantiene el sentido de panelado y evita traducir literalmente con 'costillas' o 'lados'.
- source_word: מִקַּרְקַע הַבַּיִת
  english_pob_choice: from the floor of the house
  chosen_spanish: desde el piso de la casa
  alternatives_spanish:
  - desde el suelo de la casa
  - desde el piso del templo
  lexicon: HALOT
  rationale: קַרְקַע en un interior edificado se entiende como piso/superficie interior. 'Piso' es el término más claro y arquitectónicamente natural en español.
- source_word: עַד קִירוֹת הַסִּפֻּן
  english_pob_choice: to the walls of the ceiling
  chosen_spanish: hasta las paredes del techo
  alternatives_spanish:
  - hasta las paredes del cielo raso
  - hasta las vigas del techo
  - hasta el revestimiento superior
  lexicon: HALOT
  rationale: La expresión hebrea es irregular y parece señalar el límite superior del revestimiento interior. 'Paredes del techo' conserva la extrañeza del giro y su referencia al límite superior, sin resolverla de forma interpretativa excesiva.
- source_word: צִפָּה עֵץ מִבָּיִת
  english_pob_choice: he covered them with wood on the inside
  chosen_spanish: la revistió de madera por dentro
  alternatives_spanish:
  - la cubrió con madera por dentro
  - la forró con madera por dentro
  lexicon: HALOT
  rationale: צפה aquí significa revestir o cubrir. En español, 'revistió de madera' expresa con precisión el panelado interior y evita la repetición pesada de 'cubrió'.
- source_word: וַיְצַף
  english_pob_choice: and he overlaid
  chosen_spanish: cubrió
  alternatives_spanish:
  - revistió
  - forró
  - recubrió
  lexicon: HALOT
  rationale: Con el objeto explícito 'el piso', el verbo transmite una capa aplicada sobre la superficie. 'Cubrió' es claro y compatible con el contexto constructivo; la elección final se mantiene cercana al paralelo anterior sin sonar mecánica.
- source_word: קַרְקַע הַבַּיִת
  english_pob_choice: the floor of the house
  chosen_spanish: el piso de la casa
  alternatives_spanish:
  - el suelo de la casa
  - la base de la casa
  lexicon: HALOT
  rationale: En una estructura interior, קַרְקַע remite al piso. 'Piso' comunica mejor la superficie recubierta que 'suelo', que puede sonar más genérico.
- source_word: בְּצַלְעוֹת בְּרוֹשִׁים
  english_pob_choice: with boards of cypress
  chosen_spanish: con tablas de ciprés
  alternatives_spanish:
  - con tablones de ciprés
  - con tablas de junípero
  - con tablas de abeto
  lexicon: HALOT
  rationale: El término בְּרוֹשִׁים designa una conífera cuyo referente exacto es discutido; el POB inglés prefirió 'cypress'. 'Ciprés' conserva esa decisión y resulta más transparente que el tradicional 'abeto' o 'pino' sin base equivalente aquí.
translation_notes:
  revision_awareness: El contexto de revisión reciente indica que el texto inglés y el dictamen de alta concordancia no requirieron cambios; la presente redacción española sigue ese mismo trazado, manteniendo la solución léxica principal para צַלְעוֹת/בְּרוֹשִׁים y la ambigüedad controlada de עַד קִירוֹת הַסִּפֻּן.
  spanish_consistency_notes:
  - Se mantuvo 'casa' para reflejar el hebreo, aunque el contexto inmediato se refiere al templo.
  - Se usó 'piso' y 'paredes' en sentido arquitectónico moderno y claro para un lector hispanohablante.
  - Se preservó la alternancia verbal 'revistió' / 'cubrió' para reflejar la repetición de צפה sin sonar redundante en español.
