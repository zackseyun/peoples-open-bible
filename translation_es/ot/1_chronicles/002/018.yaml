  - severity: medium
    issue: La nota b cita 'sus hijos', pero el problema textual es precisamente que el hebreo dice 'los hijos de ella'.
    rationale: La nota debe apoyar la decisión principal y no repetir una formulación española ambigua que oscurece la evidencia morfológica del MT.
