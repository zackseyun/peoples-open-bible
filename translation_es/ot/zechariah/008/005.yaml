translation:
  language: es
  text: Y las calles de la ciudad se llenarán de niños y niñas jugando en las calles de la ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las plazas abiertas de la ciudad ... jugando en sus plazas». El término hebreo puede referirse a calles anchas o a plazas públicas abiertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְחֹבוֹת
  english_pob_choice: the streets
  chosen_spanish: las calles
  alternatives_spanish:
  - las plazas abiertas
  - los espacios abiertos
  lexicon: HALOT
  rationale: רְחֹבוֹת puede referirse a calles anchas o espacios públicos abiertos dentro de la ciudad. «Calles» es el equivalente natural en español moderno y mantiene bien el paralelismo con la frase final.
- source_word: הָעִיר
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la villa
  - de la población
  lexicon: HALOT
  rationale: עִיר es el término normal para «ciudad». «Ciudad» es la opción directa y más transparente en español.
- source_word: יִמָּלְאוּ
  english_pob_choice: will be filled
  chosen_spanish: se llenarán
  alternatives_spanish:
  - estarán llenas
  - serán llenadas
  lexicon: HALOT
  rationale: El nifal imperfecto de מלא expresa un sentido futuro/pasivo. «Se llenarán» conserva el valor verbal con naturalidad en español.
- source_word: יְלָדִים
  english_pob_choice: boys
  chosen_spanish: niños
  alternatives_spanish:
  - muchachos
  - varones
  lexicon: HALOT
  rationale: Aunque el inglés POB especifica «boys» para reflejar el contraste con «girls», en español «niños» puede funcionar de manera natural para el masculino plural genérico de este par, sin forzar una especificación menos idiomática. La pareja con «niñas» mantiene la distinción sexuada del hebreo.
- source_word: וִילָדוֹת
  english_pob_choice: and girls
  chosen_spanish: y niñas
  alternatives_spanish:
  - y muchachas
  - y jovencitas
  lexicon: HALOT
  rationale: La forma femenina plural se refleja con «niñas», el equivalente más claro y natural para la pareja masculina/femenina del texto.
- source_word: מְשַׂחֲקִים
  english_pob_choice: playing
  chosen_spanish: jugando
  alternatives_spanish:
  - en juego
  - divirtiéndose
  - retozando
  lexicon: HALOT
  rationale: El participio describe la actividad infantil en la ciudad restaurada. «Jugando» transmite con sencillez el sentido ordinario y gozoso del contexto.
- source_word: בִּרְחֹבֹתֶיהָ
  english_pob_choice: in its streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus plazas
  - en las calles de ella
  lexicon: HALOT
  rationale: La frase repite רְחֹבוֹת con sufijo de 3ª femenina singular referido a la ciudad. «Sus calles» es el equivalente idiomático en español y conserva la repetición enfática del hebreo.
translation_notes:
  revision_awareness: El texto inglés revisado no recibió cambios y la evaluación de comparación indicó alto acuerdo; por eso el borrador español sigue de cerca la evidencia hebrea y el auditable del inglés, manteniendo la alternativa léxica documentada para רְחֹבוֹת.
  spanish_consistency_notes:
  - Se prefirió «calles» frente a «plazas» como forma principal, siguiendo el valor amplio pero natural del término hebreo en español moderno.
  - Se mantuvo la pareja «niños y niñas» para reflejar la distinción masculina/femenina del hebreo, aunque el inglés POB usa «boys and girls».
  - Se conservó la repetición de «calles» en la segunda mitad para reproducir el énfasis del texto fuente.
