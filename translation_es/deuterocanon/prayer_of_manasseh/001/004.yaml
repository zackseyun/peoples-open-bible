lexical_decisions:
- source_word: ὁ κλείσας
  english_pob_choice: who shut up
  chosen_spanish: el que cerró
  alternatives_spanish:
  - el que clausuró
  - el que cerró herméticamente
  - el que encerró
  lexicon: LSJ
  rationale: El participio aoristo funciona como descripción relativa del destinatario. En español, «el que cerró» conserva la acción concreta sin volverla excesivamente literal o antinatural; «cerró» expresa bien la idea de restringir el abismo.
- source_word: τὴν ἄβυσσον
  english_pob_choice: the abyss
  chosen_spanish: el abismo
  alternatives_spanish:
  - el profundo
  - la profundidad sin fondo
  - el fondo abismal
  lexicon: LSJ
  rationale: ἄβυσσος en griego bíblico designa el abismo cósmico o primordial. «El abismo» es la correspondencia más natural en español y preserva el peso teológico y cosmológico mejor que opciones más explicativas.
- source_word: σφραγισάμενος
  english_pob_choice: sealed
  chosen_spanish: lo selló
  alternatives_spanish:
  - puso su sello sobre él
  - lo selló herméticamente
  - lo aseguró con sello
  lexicon: LSJ
  rationale: El participio medio indica una acción de sellar con seguridad. «Lo selló» es idiomático y suficientemente preciso; el pronombre retoma «el abismo» sin repetir el sustantivo.
- source_word: τῷ φοβερῷ καὶ ἐνδόξῳ ὀνόματί σου
  english_pob_choice: with your fearful and glorious name
  chosen_spanish: con tu nombre temible y glorioso
  alternatives_spanish:
  - con tu nombre temible y lleno de gloria
  - con tu nombre asombroso y glorioso
  - con tu nombre reverente y glorioso
  lexicon: LSJ
  rationale: El dativo instrumental se expresa naturalmente con «con». «Temible» conserva la fuerza de φοβερός como algo que inspira temor reverente; «glorioso» traduce ἐνδόξῳ de forma directa y elevada. Se evita «SEÑOR» para respetar el nombre divino tal como aparece en el griego.
theological_decisions:
- issue: Cómo rendir φοβερῷ aplicado al nombre de Dios
  english_pob_reading: fearful
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - temeroso
  - asombroso
  - terrible
  rationale: En español, «temible» comunica mejor la idea de algo que inspira reverencia y sobrecogimiento sin sonar a mero miedo subjetivo. Conserva la tensión teológica del original entre temor y adoración.
  doctrine_reference: 'Translation philosophy: preserve reverent force without flattening the divine name into a neutral epithet.'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de manera alta. La única tensión principal está en φοβερῷ, donde el inglés preserva «fearful» con una nota alternativa «awesome». En español se eligió «temible» como equivalente más natural y reverente, dejando «asombroso y glorioso» como alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «abismo» para ἄβυσσος, en línea con el vocabulario bíblico usual y con la decisión inglesa.
  - Se usa «tu» sin mayúscula porque el paquete fuente no exige una convención reverencial particular.
  - «Nombre temible y glorioso» conserva el paralelismo del original y evita suavizar la carga reverente de φοβερῷ.
  - La nota a pie de página se ancla en «temible» porque ahí reside la principal alternativa semántica en español.
