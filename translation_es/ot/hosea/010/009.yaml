review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y la lectura POB inglesa: acusación continua desde los días de Guibeá/Gibeah, persistencia allí, y la cláusula final como pregunta retórica de juicio. Sin embargo, hay desajustes importantes en detalles: la nota [a] está anclada al topónimo cuando en realidad explica la cláusula difícil final; además, «Gueba» no es la forma española más fiel ni más legible para גבעה, y «se han mantenido» se aparta innecesariamente del ajuste auditado inglés hacia «they have stood».'
  spanish_quality_summary: 'El español es generalmente claro, pero necesita pulido para legibilidad y fidelidad. «oh Israel» debe llevar coma y signos españoles: «oh, Israel». «Gueba» suena impropio y poco reconocible; «Guibeá» es más natural y cercano al hebreo en español. La nota [a] debe moverse a la cláusula problemática final. «Se han mantenido» es interpretable, pero «han permanecido» o «han quedado firmes» sería más natural; dado el ajuste inglés auditado, «han permanecido» conserva mejor la idea de persistencia sin forzar una imagen física rara.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión «hijos de iniquidad» es aceptable en español profético, aunque «hijos de injusticia» también reflejaría bien la revisión inglesa. El problema principal es onomástico: el topónimo debe normalizarse a «Guibeá» en vez de «Gueba».'
  issues:
  - severity: high
    issue: La nota [a] está colocada en el topónimo en vez de la cláusula difícil que comenta.
    rationale: La nota explica lecturas alternativas de לֹא תַשִּׂיגֵם ... y no una variante del nombre propio. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: medium
    issue: «Gueba» es una transliteración deficiente y poco reconocible para גבעה.
    rationale: En español bíblico amplio, «Guibeá» resulta más fiel y legible que «Gueba», y coincide mejor con el referente conocido de Jueces 19–21.
  - severity: medium
    issue: «se han mantenido» no refleja tan bien la decisión auditada ni suena tan natural aquí como otras opciones.
    rationale: El rastro de auditoría inglés fue ajustado hacia «they have stood» por cercanía léxica. En español, «han permanecido» conserva la persistencia sin sonar forzado.
  - severity: low
    issue: Puntuación vocativa mejorable en «oh Israel».
    rationale: En español digno y natural corresponde «oh, Israel».
