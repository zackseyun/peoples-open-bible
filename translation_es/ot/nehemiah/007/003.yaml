review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y del POB inglés: prohibición de abrir las puertas hasta más avanzada la mañana, cierre y aseguramiento de las hojas, y asignación de vigilancia desde los habitantes de Jerusalén. Sin embargo, introduce varios desajustes: reutiliza indebidamente el marcador [a] para dos lugares y dos notas distintas; «Y dije a ellos» suena calcado; «se nombrarán centinelas» cambia innecesariamente la voz y debilita el mandato directo de «appoint»; «centinelas» estrecha el campo de מִשְׁמְרוֹת más que «guardias»; y «las aseguren» no refleja tan bien como «las fijen/sujeten» la nota léxica sobre אחז.'
  spanish_quality_summary: 'La redacción es comprensible, pero hay detalles de naturalidad y estilo que conviene ajustar para un español bíblico claro y digno: «les dije» es natural; «designen guardias» o «pongan guardias» transmite mejor el mandato; «cada uno en su puesto de guardia» es más idiomático que «en su guardia». Además, el sistema de notas está formalmente incorrecto por el doble uso de [a].'
  glossary_alignment: 'No hay términos teológicos principales en juego. El tratamiento léxico debe seguir el rastro auditado: עַד חֹם הַשֶּׁמֶשׁ conviene mantenerlo concreto; וֶאֱחֹזוּ debe expresar fijar/sujetar/asegurar físicamente las puertas; מִשְׁמְרוֹת admite «guardias» con nota sobre «turnos de vigilancia».'
  issues:
  - severity: high
    issue: Marcador de nota [a] reutilizado para dos referencias distintas
    rationale: Las instrucciones exigen marcadores únicos por nota dentro del mismo registro. En el borrador [a] aparece tras «ellos» y tras «las», pero corresponde a contenidos diferentes.
  - severity: medium
    issue: «Y dije a ellos» es calco poco natural
    rationale: El hebreo permite esa estructura, pero en español natural y fiel corresponde «Y les dije».
  - severity: medium
    issue: «se nombrarán centinelas» cambia el mandato directo y la agentividad
    rationale: וְהַעֲמֵיד es un mandato de designar/poner. La forma impersonal futura pasiva/reflexiva en español suena menos directa que el original y que el POB inglés.
  - severity: medium
    issue: «centinelas» es más estrecho que «guardias»
    rationale: מִשְׁמְרוֹת puede ser guardias o turnos de guardia. «Centinelas» sugiere un tipo específico de vigilante y dificulta la correspondencia con la nota alternativa sobre «watches».
  - severity: low
    issue: «cada uno en su guardia» suena poco idiomático
    rationale: Aunque cercano al hebreo, en español se entiende mejor «cada uno en su puesto de guardia» o «en su turno de guardia».
  - severity: low
    issue: «las aseguren» no refleja tan claramente la idea concreta de fijar/sujetar
    rationale: La revisión inglesa final prefirió «fasten them». En español «sujetarlas bien» o «fijarlas» comunica mejor la acción posterior al cierre.
