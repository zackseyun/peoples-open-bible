base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/002.yaml
  text: When you pass through the waters[a], I am with you; and through the rivers, they will not sweep over you. When you walk through fire, you will not be scorched[b], and the flame will not burn you.
  footnotes:
