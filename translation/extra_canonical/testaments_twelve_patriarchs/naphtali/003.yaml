translation:
  text: '1[a]. So then, do not be eager in greed to corrupt your deeds, or by empty words to deceive your souls. For by keeping silent in purity of heart, you will understand how to hold fast the will of God and to cast away the will of Beliar.


    2. The sun and the moon and the stars do not alter their appointed order[a]; so you also must not alter the law of God through the disorder of your deeds.


    3. The nations, having gone astray and having forsaken the Lord, altered their order, and gave heed to wood and stone, to spirits of deceit.


    4. But you, my children, must not be so. Rather, know in the firmament, on the earth, and in the sea, and in all created things, the Lord who made all things, so that you may not become like Sodom, which changed the order of its nature.


    5. In the same way also the Watchers changed the order of their nature, and the Lord cursed them at the time of the flood[b][b]; because of them he made the earth uninhabited and barren.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Firmament" renders the Greek term for the sky or expanse of heaven, echoing creation language.'
    reason: cultural_note
    anchor_ref: '3:4'
  - marker: a
    text: The warning about Sodom says it "changed the order of its nature," preserving the chapter's repeated theme of divinely established order.
    reason: cross_reference
    anchor_ref: '3:4'
  - marker: b
    text: '"Watchers" refers to angelic beings known from Jewish apocalyptic tradition, especially in connection with the flood narrative.'
    reason: cultural_note
    anchor_ref: '3:5'
  - marker: b
    text: Some textual uncertainty surrounds the final clause, but the sense is that because of them the earth was made desolate and unfruitful.
    reason: textual_variant
    anchor_ref: '3:5'
lexical_decisions:
- source_word: πλεονεξίᾳ
  chosen: greed
  alternatives:
  - covetousness
  - avarice
  lexicon: BDAG
  rationale: '"Greed" is clear modern English and preserves the vice-term''s moral force without sounding archaic.'
- source_word: διαφθεῖραι
  chosen: to corrupt
  alternatives:
  - to ruin
  - to destroy
  lexicon: BDAG
  rationale: Fits the ethical context of deeds being morally spoiled rather than physically destroyed.
- source_word: λόγοις κενοῖς
  chosen: empty words
  alternatives:
  - vain words
  - worthless words
  lexicon: BDAG
  rationale: Preserves the rhetorical contrast between hollow speech and pure-hearted silence.
- source_word: καθαρότητι καρδίας
  chosen: purity of heart
  alternatives:
  - cleanness of heart
  - purity in heart
  lexicon: BDAG
  rationale: Natural English that retains the inward moral emphasis of the Greek.
- source_word: συνήσετε
  chosen: you will understand
  alternatives:
  - you will perceive
  - you will come to know
  lexicon: BDAG
  rationale: Best captures moral discernment resulting from disciplined silence.
- source_word: κρατεῖν
  chosen: to hold fast
  alternatives:
  - to keep
  - to grasp
  lexicon: BDAG
  rationale: The infinitive here conveys firm adherence to God's will, stronger than merely "keep."
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: The Greek form in this text is Beliar; retaining the transliteration preserves source-text specificity.
- source_word: τάξιν
  chosen: order
  alternatives:
  - arrangement
  - appointed order
  lexicon: BDAG
  rationale: A key repeated term in the chapter. "Order" preserves the thematic thread of divinely established structure in creation and ethics.
- source_word: ἀλλοιώσητε
  chosen: alter
  alternatives:
  - change
  - distort
  lexicon: BDAG
  rationale: Matches the repeated language of changing divinely given order while remaining readable.
- source_word: ὑπήκουσαν ξύλοις καὶ λίθοις
  chosen: gave heed to wood and stone
  alternatives:
  - obeyed wood and stone
  - listened to wood and stone
  lexicon: BDAG
  rationale: Avoids awkward English while preserving the idolatry polemic against lifeless objects.
- source_word: πνεύμασι πλάνης
  chosen: spirits of deceit
  alternatives:
  - deceiving spirits
  - spirits of error
  lexicon: BDAG
  rationale: '"Spirits of deceit" keeps the genitival force and the moral-religious sense of delusion.'
- source_word: στερεώματι
  chosen: firmament
  alternatives:
  - sky
  - expanse
  lexicon: LEH
  rationale: The elevated register suits testamentary exhortation and echoes biblical creation language.
- source_word: δημιουργήμασι
  chosen: created things
  alternatives:
  - creatures
  - works of creation
  lexicon: BDAG
  rationale: Broad enough to include all things made, not only living beings.
- source_word: ἐνήλλαξε τάξιν φύσεως αὐτῆς
  chosen: changed the order of its nature
  alternatives:
  - exchanged its natural order
  - altered the order of its nature
  lexicon: BDAG
  rationale: Preserves both the repeated "order" motif and the appeal to nature in the warning about Sodom.
- source_word: Ἐγρήγοροι
  chosen: Watchers
  alternatives:
  - the Wakeful Ones
  lexicon: Jewish apocalyptic usage
  rationale: '"Watchers" is the established English rendering for this angelic group in Second Temple literature.'
- source_word: ἄκαρπον
  chosen: without fruit
  alternatives:
  - barren
  - unfruitful
  lexicon: BDAG
  rationale: Keeps the concrete image of the earth's loss of fertility and echoes judgment language.
