translation:
  language: es
  text: Entonces salió[a] del lugar donde había estado, y sus dos nueras con ella; y se pusieron en camino para volver a la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Entonces dejó el lugar donde había estado». El verbo hebreo es literalmente «salió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  english_pob_choice: So she went out
  chosen_spanish: Así que ella salió[a]
  alternatives_spanish:
  - Entonces ella salió
  - Y ella salió
  - Así que ella se fue
  lexicon: HALOT
  rationale: יצא expresa el movimiento concreto de salir; en español, 'salió' conserva mejor esa imagen que 'se fue'. 'Así que' reproduce de manera natural la progresión narrativa del waw-consecutivo, equivalente al 'So' del POB inglés.
- source_word: מִן הַמָּקוֹם
  english_pob_choice: from the place
  chosen_spanish: del lugar
  alternatives_spanish:
  - de aquel lugar
  - del lugar allí
  lexicon: HALOT
  rationale: '''Lugar'' es un equivalente natural y fiel de מָקוֹם. Se mantiene el artículo definido implícito en el contexto con ''del lugar''.'
- source_word: אֲשֶׁר הָיְתָה שָׁמָּה
  english_pob_choice: where she had been
  chosen_spanish: donde había estado
  alternatives_spanish:
  - en el que había estado
  - donde estaba
  lexicon: HALOT
  rationale: La cláusula relativa identifica el sitio por la residencia anterior de Noemí. El pluscuamperfecto 'había estado' conserva el valor anterior y evita el calco 'donde ella había sido allí'.
- source_word: וּשְׁתֵּי כַלֹּתֶיהָ עִמָּהּ
  english_pob_choice: and her two daughters-in-law with her
  chosen_spanish: y sus dos nueras con ella
  alternatives_spanish:
  - y sus dos hijas políticas con ella
  - y con ella sus dos nueras
  lexicon: HALOT
  rationale: כַּלָּה en este contexto significa 'nuera', no 'novia' ni 'esposa'. 'Nueras' es la opción clara y precisa en español.
- source_word: וַתֵּלַכְנָה
  english_pob_choice: and they went
  chosen_spanish: y ellas fueron
  alternatives_spanish:
  - y caminaron
  - y se fueron
  lexicon: HALOT
  rationale: El verbo plural femenino se refiere a Noemí y sus dos nueras. 'Fueron' preserva el sentido general de desplazamiento sin añadir la especificidad de 'caminaron'.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - a lo largo del camino
  lexicon: HALOT
  rationale: '''Por el camino'' expresa bien la idea de ir viajando mientras avanzan; es natural en español y conserva la escena de desplazamiento.'
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: para regresar
  alternatives_spanish:
  - para volver
  - a fin de regresar
  lexicon: HALOT
  rationale: שׁוּב tiene el valor básico de 'volver/retornar'. 'Regresar' es una opción clara y digna en español; 'para' expresa la finalidad del trayecto.
- source_word: אֶל אֶרֶץ יְהוּדָה
  english_pob_choice: to the land of Judah
  chosen_spanish: a la tierra de Judá
  alternatives_spanish:
  - a la tierra de Judá
  - al país de Judá
  lexicon: HALOT
  rationale: Se conserva אֶרֶץ como 'tierra', siguiendo la concreción territorial del hebreo. 'Judá' traduce el topónimo יהוּדָה de forma estándar y transparente.
translation_notes:
  revision_awareness: La base inglesa POB lee 'went out' de forma concreta y mantiene la secuencia narrativa con 'So'; la versión española sigue ese mismo perfil, sin suavizar יצא hacia un simple 'irse'. No se requieren cambios frente al audit trail inglés, y no hay variantes textuales relevantes en el pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en todo el proyecto, pero en este versículo no aparece.
  - Se mantiene 'Judá' como topónimo estándar para יְהוּדָה.
  - '''Nueras'' preserva el valor relacional específico de כַלָּה en este contexto.'
  - El ritmo narrativo español intenta seguir el encadenamiento hebreo sin volverlo rígido.
