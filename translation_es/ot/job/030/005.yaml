translation:
  language: es
  text: Son expulsados de en medio[a]; gritan tras ellos como cuando se persigue a un ladrón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De en medio» refleja aquí el valor contextual de גֵּו como interior o centro del lugar; también podría entenderse como «del barranco», «del valle» o «de la hondonada».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo no expresa un sujeto explícito para «gritan»; por eso la traducción conserva el verbo sin nombrar quiénes gritan. También puede entenderse: «gritan contra ellos como contra un ladrón».'
    reason: source_note
lexical_decisions:
- source_word: מִן
  english_pob_choice: from
  chosen_spanish: del medio
  alternatives_spanish:
  - de
  - desde
  - del centro
  lexicon: HALOT
  rationale: La preposición expresa separación o salida desde un lugar. En este contexto, 'del medio' comunica bien la idea de ser arrojados fuera de su centro o interior, siguiendo la revisión inglesa que prefirió 'from the midst'.
- source_word: גֵּו
  english_pob_choice: midst / ravine
  chosen_spanish: medio
  alternatives_spanish:
  - ravina
  - barranco
  - valle
  - garganta
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una cavidad, hondonada o 'mitad/interior' según el contexto. Dado que la revisión inglesa descartó 'ravine' y el verso enfatiza expulsión de un lugar interior, 'medio' evita fijar indebidamente una topografía más concreta de la que el hebreo exige aquí.
- source_word: יְגֹרָשׁוּ
  english_pob_choice: are driven out
  chosen_spanish: Son expulsados
  alternatives_spanish:
  - Son echados
  - Son arrojados fuera
  - Son desterrados
  lexicon: HALOT
  rationale: El piʿel pasivo expresa expulsión violenta. 'Son expulsados' conserva la fuerza verbal y el valor pasivo del hebreo sin suavizarlo.
- source_word: יָרִיעוּ
  english_pob_choice: people shout
  chosen_spanish: gritan
  alternatives_spanish:
  - prorrumpen en gritos
  - alzán la voz
  - lanzan gritos
  lexicon: HALOT
  rationale: El verbo indica levantar un clamor o grito. En español, 'gritan' es natural y mantiene la hostilidad implícita del contexto, sin introducir un sujeto explícito que el hebreo no da.
- source_word: עָלֵימוֹ
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - contra ellos
  - sobre ellos
  - a sus espaldas
  lexicon: HALOT
  rationale: La preposición con este verbo puede indicar dirección hostil hacia los expulsados. 'Tras ellos' conserva la imagen de persecución y encaja con la comparación siguiente, mientras deja abierta la ambigüedad entre persecución y vociferación dirigida a ellos.
- source_word: כַּגַּנָּב
  english_pob_choice: as after a thief
  chosen_spanish: como tras un ladrón
  alternatives_spanish:
  - como a un ladrón
  - como contra un ladrón
  - como tras un ladrón al que se persigue
  lexicon: HALOT
  rationale: El comparativo introduce la reacción pública ante un ladrón. 'Como tras un ladrón' reproduce la comparación de forma idiomática en español y mantiene el matiz de persecución/alboroto que el inglés explicitó.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la primera mitad del verso de ''ravine'' a ''midst'' y mantuvo implícito el sujeto de ''they shout''. La redacción española sigue esa revisión: evita una localización demasiado específica y no añade sujeto explícito.'
  spanish_consistency_notes:
  - Se mantiene «expulsados» para conservar la pasividad y la violencia del piʿel.
  - «Tras ellos» conserva la ambigüedad direccional de עָלֵימוֹ sin forzar 'contra' o 'a gritos contra'.
  - No se usa 'Señor' ni terminología litúrgica ajena al texto; el verso no contiene nombres divinos.
  - La comparación final se traduce con una construcción natural en español, sin perder la imagen de alarma pública asociada al ladrón.
