translation:
  language: es
  text: 'Y dijo[a]: «Yo saldré y seré un espíritu de mentira en la boca de todos sus profetas». Y dijo: «Tú lo seducirás[b], y también prevalecerás. Sal y haz así».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu de falsedad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo engañarás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵצֵא
  english_pob_choice: I will go out
  chosen_spanish: Yo saldré
  alternatives_spanish:
  - Yo iré
  - Yo saldré afuera
  lexicon: HALOT
  rationale: El hebreo expresa movimiento de salida con la primera persona imperfecta; en español, «saldré» conserva la intención futura y el desplazamiento sin añadir una perífrasis innecesaria.
- source_word: וְהָיִיתִי
  english_pob_choice: and be
  chosen_spanish: y seré
  alternatives_spanish:
  - y estaré
  - y llegaré a ser
  lexicon: HALOT
  rationale: 'El verbo היה aquí funciona de manera predicativa: «seré espíritu de mentira». «Seré» es la equivalencia más directa y mantiene la fuerza de la autodesignación.'
- source_word: לְרוּחַ שֶׁקֶר
  english_pob_choice: a lying spirit
  chosen_spanish: espíritu de mentira
  alternatives_spanish:
  - espíritu mentiroso
  - espíritu de falsedad
  lexicon: HALOT
  rationale: La frase hebrea caracteriza al espíritu por la falsedad. «Espíritu de mentira» conserva el genitivo cualitativo y evita suavizar el lenguaje hacia una paráfrasis más interpretativa.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - por la boca de
  - en labios de
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en la boca de». En español, «en la boca de» mantiene el paralelismo y la imaginería del habla profética.
- source_word: כָּל נְבִיאָיו
  english_pob_choice: all his prophets
  chosen_spanish: todos sus profetas
  alternatives_spanish:
  - todos los profetas de él
  - todos los profetas suyos
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina singular remite al rey del contexto. «Sus profetas» comunica la referencia de modo natural y fiel al alcance total de כָּל.
- source_word: תְּפַתֶּה
  english_pob_choice: You will entice him
  chosen_spanish: Tú lo engañarás
  alternatives_spanish:
  - Tú lo seducirás
  - Tú lo persuadirás
  lexicon: HALOT
  rationale: La raíz פתה puede tener el sentido de seducir, persuadir o engañar según el contexto. Aquí el marco narrativo exige la fuerza deceptiva; por eso «engañarás» preserva la tensión y la lectura de la POB de no suavizar el acto.
- source_word: וְגַם תּוּכָל
  english_pob_choice: and you will also prevail
  chosen_spanish: y también prevalecerás
  alternatives_spanish:
  - y también podrás
  - y además tendrás éxito
  lexicon: HALOT
  rationale: יכל expresa capacidad eficaz, no solo posibilidad abstracta. «Prevalecerás» sigue de cerca la revisión inglesa y comunica que la misión del espíritu tendrá efectividad.
- source_word: צֵא
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve
  - Sal afuera
  lexicon: HALOT
  rationale: El imperativo de יצא vuelve a emplear el verbo de salida. «Sal» es idiomático en español y preserva la repetición verbal sin sonar forzado.
- source_word: וַעֲשֵׂה כֵן
  english_pob_choice: and do so
  chosen_spanish: y haz así
  alternatives_spanish:
  - y hazlo así
  - y actúa de esa manera
  lexicon: HALOT
  rationale: La expresión idiomática pide una fórmula breve. «Haz así» conserva el valor de mandato y la economía del hebreo.
theological_decisions:
- issue: La misión engañosa es autorizada dentro de la visión sin suavizar la tensión teológica
  english_pob_reading: The text is rendered straightforwardly as God authorizing the spirit's deceptive mission within the vision narrative, without softening the language.
  chosen_spanish_reading: El texto se vierte de forma directa, manteniendo que el espíritu recibe permiso para actuar engañosamente dentro de la visión, sin atenuar la afirmación.
  alternative_spanish_readings:
  - Reformular para sugerir solo una prueba permisiva
  - Suavizar 'engaño' por 'persuasión'
  rationale: 'El hebreo presenta una escena dura y la POB inglesa decide no resolverla con eufemismos. En español conviene conservar esa tensión: el pasaje no debe reescribirse para evitar el problema teológico, sino traducirse con fidelidad al modo en que el relato lo expone.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió 'become' por 'be' y 'succeed' por 'prevail'. Por eso se eligieron «seré» y «prevalecerás» para reflejar con mayor cercanía el verbo hebreo y su registro formal, sin perder la decisión de conservar la tensión narrativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto solo cuando corresponda; en este versículo no aparece el tetragrámaton ni κύριος.
  - Se conservó la imagen concreta «en la boca de» para coherencia con el lenguaje profético del pasaje.
  - «Espíritu de mentira» mantiene la cualidad del sustantivo sin convertirlo en una explicación doctrinal.
  - El sujeto del diálogo se deja explícito con «él» como en la narración inglesa, evitando identificarlo más allá del contexto inmediato.
