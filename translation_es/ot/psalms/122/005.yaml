    rationale: Aunque el hebreo usa literalmente «sentarse/sentarse establecidos», en español esta combinación con «tronos» suena antinatural y distrae del sentido. La filosofía del proyecto permite evitar calcos de madera cuando afectan la legibilidad.
  - severity: medium
