translation:
  language: es
  text: Y así, consideren[a], de generación en generación, que todos los que esperan en él no se debilitarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entiendan» o «tómenlo a pecho».
    reason: lexical_alternative
  - marker: b
    text: O «no serán débiles»; el griego también puede entenderse más ampliamente como «no fallarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐννοήθητε
  english_pob_choice: consider
  chosen_spanish: considérenlo
  alternatives_spanish:
  - compréndanlo
  - tómenselo a pecho
  - reflexionen sobre ello
  lexicon: LSJ
  rationale: El imperativo aoristo plural pide una exhortación a reconocer y ponderar lo dicho. «Considérenlo» conserva el tono exhortativo y la idea de atención reflexiva sin forzar un giro más interpretativo que el griego.
- source_word: κατὰ γενεὰν
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - a lo largo de las generaciones
  - por generación
  - de una generación a otra
  lexicon: LSJ
  rationale: La expresión señala una continuidad histórica entre generaciones. «De generación en generación» es idiomática en español y preserva el alcance temporal del original.
- source_word: ἐλπίζοντες
  english_pob_choice: hope
  chosen_spanish: esperan
  alternatives_spanish:
  - ponen su esperanza
  - confían
  - esperan en
  lexicon: LSJ
  rationale: Aunque el sustantivo verbal puede traducirse como «esperan» o «ponen su esperanza», en español bíblico «esperar en» puede sonar más natural. Aquí se mantiene «esperan en él» para conservar la relación sintáctica y la confianza dirigida a Dios.
- source_word: ἐπʼ αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  lexicon: LSJ
  rationale: La preposición con ἐλπίζω se vierte de forma natural como «en». En el contexto inmediato, el referente implícito es Dios; «en él» preserva el pronombre y evita añadir explícitamente el nombre no presente en el griego.
- source_word: ἀσθενήσουσιν
  english_pob_choice: will not grow weak
  chosen_spanish: no se debilitarán
  alternatives_spanish:
  - no serán débiles
  - no fallarán
  - no desfallecerán
  lexicon: LSJ
  rationale: El futuro de ἀσθενέω indica volverse débil o debilitado. «No se debilitarán» conserva el valor verbal y el matiz progresivo mejor que una simple construcción adjetival. También deja abierta la amplitud semántica observada en la nota inglesa, sin imponer «fallar» como equivalente principal.
theological_decisions:
- issue: Referente implícito de «él»
  english_pob_reading: God is the implied referent.
  chosen_spanish_reading: Dios es el referente implícito de «él».
  alternative_spanish_readings:
  - un referente no especificado
  - él como una referencia general
  rationale: El contexto de los versículos vecinos recuerda la fidelidad de Dios a los antepasados; por eso el pronombre se entiende como referido a Dios. Se conserva el pronombre para seguir de cerca el griego, sin explicitarlo dentro del texto principal.
  doctrine_reference: Fidelidad de Dios en la historia de Israel; continuidad de la esperanza en el Dios de los padres.
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios y mantiene el mismo sentido auditado; se siguió la lectura acordada sin necesidad de ajustes textuales.
  spanish_consistency_notes:
  - Se mantiene «Dios» como referente teológico implícito aunque el texto español conserve el pronombre «él».
  - Se evita «SEÑOR» para no sustituir indebidamente el referente explícito/implícito del griego.
  - «Esperan en él» conserva la tensión entre traducción idiomática y cercanía al participio griego.
  - «No se debilitarán» refleja el valor verbal de ἀσθενήσουσιν y deja abierta la alternativa semántica de «no fallarán» indicada en el audit trail.
