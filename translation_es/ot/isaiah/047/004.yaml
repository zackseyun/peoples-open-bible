review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: גֹּאֲלֵנוּ como título sustantivado, יְהוָה correctamente como «Yahvé», צְבָאוֹת como título divino, y «el Santo de Israel» como fórmula isaiana fija. La apposición con rayas también reproduce adecuadamente la relación entre los títulos. Sin embargo, las notas no siguen fielmente el rastro auditado del POB inglés en dos puntos léxicos clave.'
  spanish_quality_summary: El español principal es claro, digno y natural. «Nuestro Redentor—Yahvé de los Ejércitos es su nombre—es el Santo de Israel» se lee bien y conserva el tono elevado. No obstante, la nota b usa «Hostes», que no es español natural ni corresponde al inglés auditado, que tiene «Hosts». Además, la nota a con «más técnicamente» y «Pariente-Redentor» suena algo forzada; conviene alinearla mejor con la nota inglesa y con un español eclesial legible.
  glossary_alignment: 'La terminología principal está bien alineada con el glosario del proyecto: «Yahvé» para יהוה, «Redentor» para גאל, y «Santo de Israel» para קְדוֹשׁ יִשְׂרָאֵל. «de los Ejércitos» es una buena elección española para צְבָאוֹת. La desviación está en la nota alternativa, donde debe ser «de las Huestes» si se quiere preservar la alternativa tradicional en español, no «de los Hostes».'
  issues:
  - severity: medium
    issue: La nota b usa «de los Hostes».
    rationale: «Hostes» no es la forma española eclesial normal; la alternativa tradicional correspondiente a inglés «of Hosts» sería «de las Huestes». Tal como está, la nota introduce una forma extraña e incorrecta para el lector hispano.
  - severity: low
    issue: La nota a no refleja de la manera más natural la alternativa inglesa auditada.
    rationale: El inglés dice que «Redeemer» también podría traducirse «Kinsman-Redeemer», resaltando el matiz pactual/legal. En español, «Pariente-Redentor» puede mantenerse, pero conviene explicarlo sin el giro «más técnicamente», que añade una valoración no presente en el audit trail.
  revised_spanish_text: Nuestro Redentor[a]—Yahvé de los Ejércitos[b] es su nombre—es el Santo de Israel.
  revised_footnotes:
  - marker: a
    text: «Redentor» también podría traducirse «Pariente-Redentor», resaltando el matiz pactual y legal del término hebreo.
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, «Yahvé de las Huestes».
    reason: lexical_alternative
  revision_rationale: 'Se conserva intacto el texto principal porque es fiel al hebreo, al POB inglés y al estilo español del proyecto. Solo se corrigen las notas para alinearlas con el audit trail: la alternativa tradicional de צְבָאוֹת en español debe ser «Huestes», no «Hostes», y la nota sobre «Redentor» debe explicar con más fidelidad y naturalidad la alternativa «Pariente-Redentor».'
