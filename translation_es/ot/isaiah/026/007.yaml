translation:
  language: es
  text: La senda del justo es llana; oh Recto[a], tú allanas el sendero del justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La senda del justo es recta; recto es el sendero del justo que tú allanas». El hebreo permite leer יָשָׁר como adjetivo, no como invocación directa; sin embargo, el verbo en segunda persona favorece la lectura vocativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - ruta
  - senda
  lexicon: HALOT
  rationale: אֹרַח designa una vía o trayecto; en español, «camino» es natural y mantiene la imagen poética sin sonar arcaico. Aunque la POB inglesa eligió «path», en este contexto «camino» conserva bien el paralelo con «sendero» en la segunda cola.
- source_word: לַצַּדִּיק
  english_pob_choice: of the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - de los justos
  - para el justo
  - del recto
  lexicon: HALOT
  rationale: El lamed puede indicar relación o pertenencia. «Del justo» reproduce esa relación en español de manera idiomática y preserva el sentido genérico-singular del hebreo poético.
- source_word: מֵישָׁרִים
  english_pob_choice: level
  chosen_spanish: recto
  alternatives_spanish:
  - nivelado
  - llano
  - derecho
  - plano
  lexicon: HALOT
  rationale: Aunque el sustantivo plural puede describir una superficie nivelada, aquí funciona predicativamente. «Recto» conserva la imagen de un camino sin desniveles y enlaza con el debate sobre יָשָׁר, sin forzar una paráfrasis.
- source_word: יָשָׁר
  english_pob_choice: O Upright One
  chosen_spanish: oh Recto
  alternatives_spanish:
  - oh Upright One
  - recto
  - el Recto
  lexicon: HALOT
  rationale: La POB inglesa opta por lectura vocativa porque el verbo siguiente está en segunda persona masculina singular. En español, «oh Recto» mantiene la apelación directa a Dios sin introducir más contenido que el requerido por la sintaxis poética. Se evita «upright» en inglés o glosas explicativas en el texto principal.
- source_word: מַעְגַּל
  english_pob_choice: way
  chosen_spanish: sendero
  alternatives_spanish:
  - camino
  - ruta
  - huella
  lexicon: HALOT
  rationale: מַעְגַּל es un curso o trayectoria; «sendero» evita repetir «camino» y conserva la metáfora de tránsito.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - de los justos
  - del recto
  - del inocente
  lexicon: HALOT
  rationale: Se mantiene el valor genérico de צַדִּיק como «justo», sin introducir una reinterpretación teológica más específica. La repetición refuerza el paralelismo del verso.
- source_word: תְּפַלֵּס
  english_pob_choice: you make ... smooth
  chosen_spanish: allanas
  alternatives_spanish:
  - nivelas
  - suavizas
  - enderezas
  lexicon: HALOT
  rationale: El piʿel de פלס puede significar nivelar o allanar un camino. «Allanas» captura la idea de hacer un terreno transitable y suena natural en español bíblico moderno.
theological_decisions:
- issue: 'Lectura de יָשָׁר: adjetivo del camino o vocativo dirigido a Dios'
  english_pob_reading: 'Vocative: ''O Upright One'''
  chosen_spanish_reading: 'Vocativo: «oh Recto»'
  alternative_spanish_readings:
  - 'Adjetival: «el camino del justo es recto» y «recto es el sendero del justo que tú allanas»'
  - «oh Upright One» en una glosa mixta
  rationale: Se conserva la tensión documentada por la POB. La forma verbal de segunda persona en la segunda cola favorece la lectura vocativa, pero el hebreo también permite leer יָשָׁר como adjetivo. La traducción principal adopta la vocativa y deja la alternativa reflejada en nota.
  doctrine_reference: Preservar ambigüedad genuina del texto; no resolverla de forma dogmática.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con la auditoría inglesa; por eso se mantiene la decisión vocativa documentada, con una nota que preserve la alternativa adjetival del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponde al nombre divino, pero aquí el verso no contiene el tetragrámaton explícito; la vocativa se traduce por su sentido semántico («Recto»).
  - Se evita «SEÑOR» para no enmascarar el nombre divino, y también se evita introducir «Cristo» o lenguaje cristológico ajeno al verso.
  - «Justo» traduce צַדִּיק de manera consistente con el valor legal/covenantal habitual en la POB.
  - La repetición de la raíz de rectitud/llaneza se conserva mediante «recto» / «allanas» para mantener el paralelismo poético.
