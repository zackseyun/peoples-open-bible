lexical_decisions:
- source_word: לַ/חֲצִי
  english_pob_choice: for the half-tribe of
  chosen_spanish: para la media tribu de
  alternatives_spanish:
  - para la mitad de
  - para la mitad de la tribu de
  lexicon: HALOT
  rationale: El hebreo indica una subdivisión tribal administrativa; en español, «media tribu» conserva la idea de una porción tribal concreta y suena natural en listas censales, mientras que «la mitad de la tribu» explicita más pero es menos idiomático.
- source_word: הַ/מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio tribal/personal; la forma española tradicional y clara es «Manasés».
- source_word: גִּלְעָדָ/ה
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en Gilead
  - hacia Galaad
  lexicon: HALOT
  rationale: El sufijo direccional/paragogico aquí funciona como designación geográfica del territorio transjordano asociado; en español, «en Galaad» comunica bien la localización administrativa del cargo.
- source_word: יִדּוֹ
  english_pob_choice: Iddo
  chosen_spanish: Iddo
  alternatives_spanish:
  - Ido
  lexicon: HALOT
  rationale: Nombre propio; se preserva la transliteración usada en la base inglesa para consistencia audit-able.
- source_word: בֶּן זְכַרְיָהוּ
  english_pob_choice: son of Zechariah
  chosen_spanish: hijo de Zacarías
  alternatives_spanish:
  - hijo de Zacaríahu
  - hijo de Zechariah
  lexicon: HALOT
  rationale: La fórmula genealógica se vierte con «hijo de». Para el antropónimo se adopta la forma española establecida «Zacarías», más natural y reconocible que una transliteración estricta.
- source_word: לְ/בִנְיָמִן
  english_pob_choice: for Benjamin
  chosen_spanish: para Benjamín
  alternatives_spanish:
  - para la tribu de Benjamín
  - para la de Benjamín
  lexicon: HALOT
  rationale: El prefijo ל señala el grupo tribal representado; «para Benjamín» conserva la concisión del registro administrativo, con «Benjamín» como nombre tribal.
- source_word: יַעֲשִׂיאֵל
  english_pob_choice: Jaasiel
  chosen_spanish: Jaasiel
  alternatives_spanish:
  - Jashiel
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la vocalización masorética reflejada en la opción principal inglesa. La variante tradicional se preserva en nota.
- source_word: בֶּן אַבְנֵר
  english_pob_choice: son of Abner
  chosen_spanish: hijo de Abner
  alternatives_spanish:
  - hijo de Abner
  lexicon: HALOT
  rationale: Fórmula genealógica estándar; se traduce literalmente con «hijo de». «Abner» tiene forma española asentada.
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se detectaron cambios textuales adicionales: la nota alternativa de nombre propio se conserva, y la estructura administrativa de la lista se refleja con una equivalencia española sobria.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la lista con dos miembros introducidos por «para».
  - Se conserva la alternativa onomástica en nota, sin alterar el texto principal.
  - «Manasés» y «Benjamín» se presentan como nombres tribales reconocibles para lectura eclesial en español.
  - La puntuación con dos puntos reproduce la función de encabezado de cada asignación tribal.
