translation:
  language: es
  text: ni el aire, ni la oscuridad, ni la tarde, ni la mañana, ni el verano, ni la primavera, ni el calor, ni el invierno, ni la escarcha, ni el frío, ni el granizo,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: aerem
  english_pob_choice: air
  chosen_spanish: aire
  alternatives_spanish:
  - atmósfera
  - viento
  lexicon: aer
  rationale: El latín inicia la lista con 'aerem', que el audit trail inglés corrigió a 'air'. 'Aire' es la correspondencia directa y natural en español; 'atmósfera' añade precisión moderna no pedida, y 'viento' cambiaría el sentido.
- source_word: tenebras
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  lexicon: tenebrae
  rationale: '''Oscuridad'' comunica el contraste cósmico de la lista en español contemporáneo. ''Tinieblas'' también es posible, pero puede sonar más marcadamente bíblico/tradicional; aquí no hay exigencia de mantener ese registro.'
- source_word: sero
  english_pob_choice: evening
  chosen_spanish: la tarde
  alternatives_spanish:
  - la tarde-noche
  - el atardecer
  lexicon: sero
  rationale: El latín 'sero' nombra la tarde o lo tardío del día. En esta enumeración, 'la tarde' es la opción más clara y natural; 'atardecer' sería más descriptivo, pero menos paralelo al resto de sustantivos simples.
- source_word: mane
  english_pob_choice: morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  lexicon: mane
  rationale: '''La mañana'' reproduce el valor básico de ''morning''. ''Amanecer'' desplaza la referencia hacia el inicio del día como evento, no como parte del día, y por eso no es preferible aquí.'
- source_word: gelu
  english_pob_choice: frost
  chosen_spanish: la escarcha
  alternatives_spanish:
  - el hielo
  - la helada
  lexicon: gelu
  rationale: '''Gelu'' apunta a la escarcha o congelación superficial; ''escarcha'' mantiene ese matiz concreto. ''Helada'' puede funcionar, pero en español puede sugerir el fenómeno climático general más que la forma visible del hielo.'
- source_word: frigus
  english_pob_choice: cold
  chosen_spanish: el frío
  alternatives_spanish:
  - el fresco
  - la frialdad
  lexicon: frigus
  rationale: '''El frío'' es la equivalencia directa y idiomática para el estado de baja temperatura. ''Frialdad'' sería abstracta o afectiva, no física.'
- source_word: grandi-
  english_pob_choice: hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - el granizo caído
  lexicon: grandinis
  rationale: La forma latina está cortada en el testimonio, pero el audit trail inglés fija 'hail' y la secuencia apunta a 'grandinem'. 'Granizo' es la traducción natural y conserva la lista meteorológica.
theological_decisions:
- issue: Alcance de la enumeración de fenómenos creados
  english_pob_reading: The verse lists created elements and conditions in a sequence without allegorizing them.
  chosen_spanish_reading: La frase enumera elementos y condiciones creadas sin alegorizarlos.
  alternative_spanish_readings:
  - La frase enumera símbolos cosmológicos.
  - La frase describe fuerzas espirituales.
  rationale: El latín presenta una lista concreta de realidades naturales. En español conviene mantener el inventario literal para no introducir una lectura simbólica sin base textual.
  doctrine_reference: 'Creación y providencia: preservación del sentido literal donde no hay indicio de metáfora.'
translation_notes:
  revision_awareness: 'El audit trail inglés corrigió un desplazamiento de límites de versículo: en 7:41 debe incluir ''air'' y terminar con ''hail''; la variante con ''rain'' y ''dew'' pertenece al versículo siguiente. La versión española sigue ese límite revisado y no traslada términos de 7:42.'
  spanish_consistency_notes:
  - Se prefirió 'aire' para aerem y 'oscuridad' para tenebras, evitando calcos innecesarios.
  - La enumeración mantiene la repetición de 'ni' para reflejar la cadena latina.
  - No se añadió ningún término ausente del latín del versículo, conforme a la revisión del audit trail.
