revisions:
- from: 'Yo dije[a]: «Regaré mi jardín y empaparé mi huerto[b]». Y he aquí, mi canal se convirtió en río[c], y mi río se convirtió en mar.'
  to: 'Yo dije: «Regaré mi jardín y empaparé mi bancal[a]». Y he aquí, mi canal se convirtió en río[b], y mi río se convirtió en mar.'
  rationale: 'La revisión corrige el punto principal de fidelidad léxica: πρασιάν debe representarse como una parte cultivada del jardín, no como otro espacio entero. «Bancal» preserva mejor la metáfora agrícola documentada en el POB inglés y sigue siendo comprensible en español eclesial amplio, con nota aclaratoria «cama de cultivo». Se elimina además una nota redundante para dejar solo las que realmente sirven al lector.'
