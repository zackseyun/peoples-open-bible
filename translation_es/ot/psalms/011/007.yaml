translation:
  language: es
  text: Porque Yahvé es justo; ama las obras justas; los rectos contemplarán su rostro[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probable, «su rostro contempla a los rectos». La sintaxis hebrea del hemistiquio final se ha entendido de más de una manera.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «su rostro». La expresión también puede implicar su presencia o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduces la explicación o fundamento de lo anterior. En español, «Porque» comunica de forma natural la relación causal/expositiva sin forzar un giro más arcaico.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo/righteous
  lexicon: HALOT
  rationale: El adjetivo describe el carácter moral de Yahvé. «Justo» es claro y digno en español; mantiene la misma familia semántica que «justicia» en la línea siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, preservando la forma propia en lugar de ocultarla tras un título.
- source_word: צְדָק֣וֹת
  english_pob_choice: righteous deeds
  chosen_spanish: las obras de justicia
  alternatives_spanish:
  - obras justas
  - justicias
  - actos de justicia
  lexicon: HALOT
  rationale: El plural sugiere actos concretos más que una cualidad abstracta. «Obras de justicia» conserva la conexión léxica con צַדִּיק / justicia y suena natural en español.
- source_word: אָהֵ֑ב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama
  - se deleita en
  - ama profundamente
  lexicon: HALOT
  rationale: «Ama» expresa de manera directa y sobria la disposición habitual de Yahvé; evita añadir matices no requeridos por el hebreo.
- source_word: יָ֝שָׁ֗ר
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - el recto
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. En español, el plural colectivo «los rectos» transmite bien el grupo de personas moralmente íntegras y encaja con el verbo plural siguiente.
- source_word: יֶחֱז֥וּ
  english_pob_choice: will behold
  chosen_spanish: contemplarán
  alternatives_spanish:
  - verán
  - beberán con la mirada
  - verán con atención
  lexicon: HALOT
  rationale: El verbo puede significar ver o contemplar con atención. «Contemplarán» conserva un tono elevado y refleja la idea de visión reverente sin exagerar el matiz.
- source_word: פָנֵי/מוֹ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su faz
  - su presencia
  lexicon: HALOT
  rationale: La expresión es literalmente «su rostro». «Rostro» mantiene la concreción del hebreo y permite, por contexto, la posible implicación de presencia o favor sin resolverla en el texto principal.
theological_decisions:
- issue: 'Sintaxis del último hemistiquio: sujeto de יֶחֱזוּ y relación con פָנֵימוֹ'
  english_pob_reading: the upright will behold his face
  chosen_spanish_reading: los rectos contemplarán su rostro
  alternative_spanish_readings:
  - su rostro contempla a los rectos
  - los rectos verán su presencia
  rationale: Se mantiene la lectura más natural con verbo plural y sujeto colectivo implícito en «los rectos». A la vez, «rostro» deja abierta la resonancia bíblica de presencia/favor sin eliminar la concreción del hebreo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual y las alternativas sintácticas documentadas.'
translation_notes:
  revision_awareness: 'El texto base y el informe de auditoría en inglés muestran acuerdo alto y no requieren revisión sustantiva. Se ha mantenido la estructura del verso y se han reflejado en notas las dos tensiones documentadas: el valor de פָנֵי/מוֹ como «rostro» y la ambigüedad sintáctica del hemistiquio final.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» según la política del proyecto.
  - Se traduce צַדִּיק con «justo» y צְדָק֣וֹת con «obras de justicia» para mantener la raíz léxica en español.
  - «Los rectos» se usa como sustantivo colectivo plural, coherente con el verbo plural «contemplarán».
  - Se evita sustituir «rostro» por «presencia» en el texto principal para no borrar la concreción del hebreo; esa posibilidad queda en nota.
