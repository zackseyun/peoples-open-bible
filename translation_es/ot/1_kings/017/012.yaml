revisions:
- from: 'Y ella dijo[a]: «¡Vive Yahvé, tu Dios! No tengo ningún pan-cake, sino solo un puñado de harina en el jarro y un poco de aceite en la vasija. Y mira, estoy recogiendo dos leños, para entrar, prepararlo para mí y para mi hijo, y comerlo, y morir».'
  to: 'Y ella dijo[a]: «¡Vive Yahvé, tu Dios! No tengo ninguna torta de pan, sino solo un puñado de harina en la tinaja y un poco de aceite en el jarro. Y mira, estoy recogiendo dos palos, para entrar y prepararlo para mí y para mi hijo; lo comeremos y moriremos».'
  rationale: La revisión corrige el anglicismo «pan-cake» por «torta de pan», que preserva la especificidad léxica de מָעוֹג en español natural y digno. Cambia «dos leños» por «dos palos» para reflejar mejor la pequeñez del combustible en el hebreo. También mejora la sintaxis final para que la intención secuencial de la viuda suene idiomática en español sin añadir contenido. Se mantienen «Yahvé» y el resto del sentido fuente.
  reviewer_model: gpt-5.4
