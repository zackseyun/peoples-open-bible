translation:
  language: es
  text: El camino del perezoso es como un seto de espinos, pero la senda de los rectos es una calzada levantada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la senda de los rectos es nivelada» o «lisa». El término hebreo puede destacar una vía construida y, por extensión, un trayecto despejado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - senda
  - ruta
  lexicon: HALOT
  rationale: En español, 'camino' conserva bien el valor proverbial y moral de una trayectoria de vida o conducta, sin sonar tan abstracto como una traducción más literal. Evita la rigidez de 'vía' y funciona de manera natural con la imagen sapiencial.
- source_word: עָצֵל
  english_pob_choice: the lazy
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el haragán
  - el holgazán
  lexicon: HALOT
  rationale: '''El perezoso'' expresa con claridad al tipo humano descrito por el hebreo como una persona habitualmente dada a la pereza. Mantiene el singular genérico y suena más sobrio y bíblico en español moderno que alternativas coloquiales.'
- source_word: כִּמְשֻׂכַת
  english_pob_choice: is like a hedge
  chosen_spanish: es como una cerca
  alternatives_spanish:
  - es como una barrera
  - es como un seto
  lexicon: HALOT
  rationale: El POB en inglés retiene la idea comparativa de una barrera vegetal. En español, 'cerca' comunica mejor la función obstructiva que 'seto' y resulta más transparente para lectores amplios, aunque pierde un poco del matiz botánico del original.
- source_word: חָדֶק
  english_pob_choice: of thorns
  chosen_spanish: de espinos
  alternatives_spanish:
  - de abrojos
  - de zarzas
  lexicon: HALOT
  rationale: '''Espinos'' reproduce de forma natural la imagen de vegetación punzante y dolorosa. ''Abrojos'' sería más específico pero menos común; ''zarzas'' introduce otro matiz vegetal menos directo.'
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: senda
  alternatives_spanish:
  - camino
  - vereda
  lexicon: HALOT
  rationale: Se usa 'senda' para variar con respecto a 'camino' y conservar la cercanía semántica entre los dos miembros del proverbio. Es una equivalencia estilística adecuada dentro del mismo campo léxico.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: '''Los rectos'' conserva la imagen moral de lo derecho/recto sin desplazarla hacia un término más jurídico como ''justos''. En español mantiene bien el contraste con el ''perezoso'' y con el camino obstaculizado.'
- source_word: סְלֻלָה
  english_pob_choice: a raised highway
  chosen_spanish: una calzada levantada
  alternatives_spanish:
  - un camino allanado
  - una carretera elevada
  - una vía construida
  lexicon: HALOT
  rationale: El hebreo apunta no solo a 'liso' o 'llano', sino a un camino levantado o construido/terraceado. 'Calzada levantada' preserva mejor la imagen concreta que 'camino allanado', aunque suene algo más formal.
translation_notes:
  revision_awareness: 'El texto coincide con el patrón estable del POB inglés para este proverbio: contraste entre un camino obstruido por espinos y una vía preparada o levantada para los rectos. No se requiere corrección textual ni ajuste doctrinal.'
  spanish_consistency_notes:
  - Se evitó 'Señor' y otras sustituciones teológicas porque el versículo no contiene el Nombre divino ni títulos cristológicos.
  - '''Rectos'' se mantuvo como equivalente moral directo de יְשָׁרִים, en línea con el valor ético del término en la tradición sapiencial.'
  - La nota al pie conserva la alternativa semántica del inglés POB ('level/smooth') y la explica en español sin reducir la imagen a mera lisura.
