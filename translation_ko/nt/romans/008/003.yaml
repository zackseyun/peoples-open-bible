id: ROM.8.3
reference: Romans 8:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ γὰρ ἀδύνατον τοῦ νόμου, ἐν ᾧ ἠσθένει διὰ τῆς σαρκός, ὁ θεὸς τὸν ἑαυτοῦ υἱὸν πέμψας ἐν ὁμοιώματι σαρκὸς ἁμαρτίας καὶ περὶ ἁμαρτίας κατέκρινε τὴν ἁμαρτίαν ἐν τῇ σαρκί,
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/003.yaml
  text: For what the law could not do[a], in that it was weak through the flesh, God did by sending his own Son in the likeness of sinful flesh and for sin; he condemned sin in the flesh[d][c][b],
translation:
  language: ko
  text: 율법이 육체로 인해 연약하여 할 수 없었던 것을, 하나님께서는 자신의 아들을 죄 된 육체의 모양으로 그리고 죄를 위하여 보내심으로써 행하셨습니다. 곧 그 육체 안에서 죄를 정죄하셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἀδύνατον τοῦ νόμου
  english_pob_choice: what the law could not do
  chosen_korean: 율법이 ... 할 수 없었던 것
  lexicon: BDAG
  rationale: 율법(모세)의 무능. 「율법」 표준.
- source_word: ἠσθένει διὰ τῆς σαρκός
  english_pob_choice: was weak through the flesh
  chosen_korean: 육체로 인해 연약하여
  lexicon: BDAG
  rationale: 율법의 약점이 인간 육체의 무력함이라는 진단.
- source_word: τὸν ἑαυτοῦ υἱὸν
  english_pob_choice: his own Son
  chosen_korean: 자신의 아들
  lexicon: BDAG
  rationale: 강조적 재귀.
- source_word: ἐν ὁμοιώματι σαρκὸς ἁμαρτίας
  english_pob_choice: in the likeness of sinful flesh
  chosen_korean: 죄 된 육체의 모양으로
  lexicon: BDAG
  rationale: '성육신의 정밀한 진술: 진정한 육체이되 죄와 동일시는 아님.'
- source_word: περὶ ἁμαρτίας
  english_pob_choice: for sin
  chosen_korean: 죄를 위하여
  alternatives_korean:
  - 속죄제로
  lexicon: BDAG
  rationale: LXX에서 속죄제 정형구. 본문은 폭넓게 「죄를 위하여」로 옮기되 속죄제 함의 존재.
- source_word: κατέκρινε
  english_pob_choice: condemned
  chosen_korean: 정죄하셨습니다
  lexicon: BDAG
  rationale: 5장 κατάκριμα와 같은 어근.
theological_decisions:
- issue: 8:3 「죄 된 육체의 모양으로」와 메시아의 인성
  chosen_reading: 「죄 된 육체의 모양으로」 — 진정한 육체이되 죄와 동일시는 피함
  alternative_readings:
  - 「죄로 가득한 육신과 같이」
  rationale: '바울이 ὁμοίωμα를 사용한 정밀성을 보존: 메시아는 진정한 육체를 입으셨으나 죄 자체와 동일시되지는 않는다.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
