base_translation:
  language: en
  yaml_path: translation/ot/judges/004/007.yaml
  text: And I will draw Sisera[a], the commander of Jabin’s army, along with his chariots and his multitude, to you at the Wadi Kishon[b], and I will give him into your hand.
  footnotes:
