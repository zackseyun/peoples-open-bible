translation:
  language: es
  text: La espada que lo alcanza no puede sostenerse[a]; tampoco la lanza, el dardo[b] ni el venablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La espada que lo alcanza no prevalece». La expresión hebrea dice literalmente que la espada «no se sostiene».'
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos traducidos «dardo» y «venablo» son raros e inciertos; las alternativas incluyen «misil» o «asta» para el primero, y «cota de malla» o «armadura» para el segundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשִּׂיגֵהוּ
  english_pob_choice: that reaches him
  chosen_spanish: que lo alcanza
  alternatives_spanish:
  - que lo alcanza
  - que lo overtoma
  - que lo atañe
  lexicon: HALOT
  rationale: השיג/נשׂג expresa alcanzar, dar alcance u overtener. En español, «alcanza» comunica bien la imagen verbal sin añadir la idea de herir o penetrar.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la espada
  lexicon: HALOT
  rationale: Es el equivalente normal y claro para el arma mencionada. El artículo definido conserva el valor genérico poético del inglés POB.
- source_word: בְּלִי תָקוּם
  english_pob_choice: cannot stand
  chosen_spanish: no puede mantenerse
  alternatives_spanish:
  - no puede permanecer
  - no puede sostenerse
  - no puede prevalecer
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice que ‘no se levanta/permanece’. En español, «no puede mantenerse» preserva la idea de no poder sostener su eficacia, sin perder naturalidad.
- source_word: חֲנִית
  english_pob_choice: spear
  chosen_spanish: lanza
  alternatives_spanish:
  - spear
  - lanza
  lexicon: HALOT
  rationale: «Lanza» es un equivalente claro y ampliamente entendido para un arma de asta o de arrojadiza según contexto poético.
- source_word: מַסָּע
  english_pob_choice: dart
  chosen_spanish: dardo
  alternatives_spanish:
  - dardo
  - misil
  - saeta
  - asta
  lexicon: HALOT
  rationale: El término es raro e incierto. «Dardo» preserva el sentido probable de proyectil/arma arrojadiza y mantiene la serie de armas sin forzar una identificación demasiado precisa.
- source_word: וְשִׁרְיָה
  english_pob_choice: javelin
  chosen_spanish: venablo
  alternatives_spanish:
  - venablo
  - lanza
  - cota de malla
  - armadura
  lexicon: HALOT
  rationale: En este contexto junto a espada, lanza y dardo, un arma ofensiva es la lectura más probable. «Venablo» conserva el matiz de arma arrojadiza o puntiaguda, mientras que la alternativa de ‘armadura/cota de malla’ queda implícitamente descartada por el contexto.
translation_notes:
  revision_awareness: Coincide sustancialmente con el cierre revisado del inglés POB; no se detectan cambios textuales recientes que alteren la decisión principal. Se mantiene la cautela sobre los dos términos raros del hemistiquio final.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparece el nombre divino aquí.
  - Se conserva la serie de armas con sintaxis paralela, acorde con el hebreo poético.
  - Se evita ‘SEÑOR’ u այլ masking convention porque no aplica a este verso.
  - La nota sobre la incertidumbre léxica se preserva para no borrar la tensión documentada en el original.
