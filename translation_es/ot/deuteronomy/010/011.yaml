review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: Yahvé, el mandato doble «Levántate, ve», la idea de ir delante del pueblo, el propósito con subjuntivo («para que entren»), la toma de posesión de la tierra, y el juramento a sus padres. Sin embargo, «por el camino» no refleja con precisión לְמַסַּע, que aquí denota la marcha/jornada/viaje, no el camino como ruta física. Además, la nota [a] del inglés POB está asociada a לִפְנֵי הָעָם («before/ahead of the people»), no a «me dijo».'
  spanish_quality_summary: El español es claro y publicable, pero requiere un ajuste menor para mayor fidelidad y coherencia de notas. «Ve delante del pueblo para la marcha» o «para el viaje» suena más fiel que «por el camino». La colocación de notas debe alinearse con el punto textual pertinente. El resto del versículo es natural y digno.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; הָאָרֶץ → «la tierra» bien; ירשׁ → «tomen posesión de» bien; אָבוֹת → «padres» mantenido con nota explicativa adecuada. No hay conflicto doctrinal. La principal desviación es léxica en לְמַסַּע, que no debe reducirse a «camino».'
  issues:
  - severity: medium
    issue: «por el camino» para לְמַסַּע
    rationale: מַסַּע se refiere a marcha, jornada o viaje, no específicamente al camino/ruta. «Por el camino» cambia el referente semántico y debilita la imagen de ponerse en marcha.
  - severity: medium
    issue: Anclaje de la nota [a] en «me dijo»
    rationale: La alternativa inglesa «ahead of the people» corresponde a לִפְנֵי הָעָם, no a וַיֹּאמֶר אֵלַי. La nota sobre «me habló» tampoco es necesaria, pues el inglés POB no la preserva y «dijo» es suficiente.
  - severity: low
    issue: Orden de notas y correspondencia con el audit trail
    rationale: 'Conviene que las notas españolas sigan la lógica del expediente: una nota en la frase de liderazgo espacial, y otra en «sus padres». Esto mejora trazabilidad y consistencia editorial.'
  revised_spanish_text: 'Y Yahvé me dijo: «Levántate, ve delante del pueblo[a] para la marcha, para que entren y tomen posesión de la tierra que juré a sus padres[b] darles».

    '
