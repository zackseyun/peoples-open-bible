translation:
  language: es
  text: 'Y le dijo: «Es hijo de un hombre noble y bueno». Y al oír que Tobit había perdido los ojos[a], se entristeció y lloró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «había perdido la vista». El griego dice más literalmente: «había perdido los ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ τοῦ καλοῦ καὶ ἀγαθοῦ ἀνθρώπου
  english_pob_choice: He is the son of a noble and good man
  chosen_spanish: Es hijo de un hombre noble y bueno
  alternatives_spanish:
  - Es de un hombre noble y bueno
  - Es hijo del hombre noble y bueno
  lexicon: LSJ
  rationale: La construcción griega es elíptica y no trae un equivalente explícito de «hijo». Siguiendo la decisión auditada del POB inglés, en español la expansión a «es hijo de» da una identificación natural y fiel al contexto. «Noble» conserva el matiz distintivo de καλός junto con ἀγαθός, sin repetir innecesariamente «bueno» dos veces.
- source_word: καλοῦ
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - bueno
  - honorable
  - excelente
  lexicon: LSJ
  rationale: En este par, καλός parece aportar una nota de calidad moral o honorable distinta de ἀγαθός. «Noble» reproduce bien esa resonancia en español y evita la redundancia.
- source_word: ἀγαθοῦ
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - recto
  - íntegro
  lexicon: LSJ
  rationale: «Bueno» es la correspondencia más directa y natural de ἀγαθός en este contexto de encomio moral general.
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  - al enterarse
  lexicon: LSJ
  rationale: El participio aoristo se expresa bien en español con una construcción temporal breve y fluida. «Al oír» conserva la secuencia narrativa sin añadir explicación.
- source_word: ἀπώλεσεν τοὺς ὀφθαλμοὺς ἑαυτοῦ
  english_pob_choice: had lost his eyes
  chosen_spanish: había perdido los ojos
  alternatives_spanish:
  - había perdido la vista
  - había quedado ciego
  - había perdido la visión
  lexicon: LSJ
  rationale: 'La frase griega es concreta: habla de «los ojos», no de la vista. En español, «había perdido los ojos» preserva esa textura literal y mantiene visible la tensión entre formulación concreta e interpretación idiomática.'
- source_word: ἐλυπήθη
  english_pob_choice: was grieved
  chosen_spanish: se llenó de tristeza
  alternatives_spanish:
  - se afligió
  - se entristeció
  - quedó dolido
  lexicon: LSJ
  rationale: El verbo expresa dolor o pena. «Se llenó de tristeza» comunica bien el impacto emocional en español actual, con un registro digno y narrativo.
- source_word: ἔκλαυσεν
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - lloró amargamente
  - derrama lágrimas
  lexicon: LSJ
  rationale: «Lloró» es la forma más directa y clara en español para ἔκλαυσεν. Mantiene el paralelismo con el lamento del pasaje sin sobrerrepresentarlo.
theological_decisions:
- issue: Expansión de la elipsis griega en la identificación del personaje
  english_pob_reading: Expanded the Greek ellipsis as 'He is the son of a noble and good man'
  chosen_spanish_reading: Se expandió la elipsis como «Es hijo de un hombre noble y bueno»
  alternative_spanish_readings:
  - Es de un hombre noble y bueno
  - '[Es] el de un hombre noble y bueno'
  rationale: La frase griega es abrupta y carece de un equivalente explícito a «hijo». La expansión es necesaria para una lectura española natural y sigue la misma decisión interpretativa del POB inglés, sin alejarse del contexto narrativo de identificación familiar.
  doctrine_reference: Principio de primacía del original con equivalencia óptima; claridad narrativa sin sobreparáfrasis
- issue: Tobit descrito con una pérdida concreta de los ojos
  english_pob_reading: Retained the concrete expression 'had lost his eyes' in the main text
  chosen_spanish_reading: Se mantuvo la expresión concreta «había perdido los ojos»
  alternative_spanish_readings:
  - había perdido la vista
  - se había quedado ciego
  rationale: El griego dice literalmente que perdió «los ojos». Aunque «perder la vista» es una idiomatización posible, conservar la concreción deja visible la textura del source y respeta la decisión auditada del POB inglés.
  doctrine_reference: Fidelidad semántica al texto fuente; preservación de la imaginería concreta
translation_notes:
  revision_awareness: 'La traducción sigue el último pase revisado del POB inglés sin cambios sustanciales: mantiene la expansión de la elipsis inicial y la formulación concreta de la ceguera, pero las adapta a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Tobit» como nombre propio conforme al contexto canónico en español.
  - Se usa un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - La nota de pie conserva la tensión entre literalidad y sentido idiomático, como en el audit trail inglés.
