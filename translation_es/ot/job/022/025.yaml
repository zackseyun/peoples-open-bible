translation:
  language: es
  text: entonces el Todopoderoso será tu oro[a] y plata fina para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entonces el Todopoderoso será tu tesoro, y plata abundante para ti». El hebreo de «oro» y el calificativo de «plata» son difíciles; puede aludir a riqueza provista por Dios más que a Dios mismo como el tesoro.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: then ... will be
  chosen_spanish: entonces ... será
  alternatives_spanish:
  - y ... será
  - entonces ... será así
  lexicon: HALOT
  rationale: La construcción waw + qatal se entiende en contexto como consecuencia futura; «entonces» conserva ese valor consecutivo de manera natural en español.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: En Job, el título divino suele traducirse por su sentido. «El Todopoderoso» mantiene el valor semántico de שַׁדַּי y es natural para lectura eclesial en español.
- source_word: בְּצָרֶיךָ
  english_pob_choice: your gold
  chosen_spanish: tu oro
  alternatives_spanish:
  - tu tesoro
  - tu mineral
  - tu defensa
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de entender el término como riqueza preciosa en paralelo con «plata». «Oro» comunica bien la idea de riqueza; «tesoro» sería más interpretativo y «mineral» demasiado técnico.
- source_word: וְכֶסֶף
  english_pob_choice: and ... silver
  chosen_spanish: y plata
  alternatives_spanish:
  - y plata para ti
  - y plata
  lexicon: HALOT
  rationale: Conservo el segundo miembro coordinado del paralelismo con una traducción directa y sobria.
- source_word: תּוֹעָפוֹת
  english_pob_choice: choice
  chosen_spanish: selecta
  alternatives_spanish:
  - abundante
  - fina
  - excelente
  lexicon: HALOT
  rationale: El término es difícil; «selecta» preserva la cualidad de plata escogida o de alta calidad sin fijar en exceso si la idea principal es excelencia o abundancia.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti misma
  - a ti
  - tuya
  lexicon: HALOT
  rationale: La preposición da un matiz de beneficio/destinación personal. «Para ti» lo expresa con naturalidad en español.
theological_decisions:
- issue: ¿El versículo identifica a Dios como el verdadero tesoro o promete riqueza material dada por Dios?
  english_pob_reading: The verse is rendered as saying that the Almighty himself will be Job's true wealth, while the material-provision reading is preserved as an alternative.
  chosen_spanish_reading: El texto principal permite leer que el Todopoderoso será la verdadera riqueza de Job, pero sin eliminar la posibilidad de que se trate de riqueza material proveída por Dios.
  alternative_spanish_readings:
  - El Todopoderoso te dará oro y plata abundante.
  - El Todopoderoso mismo será tu tesoro.
  rationale: La sintaxis y el paralelismo admiten ambas lecturas. En español, «será tu oro» conserva la metáfora fuerte sin resolver la tensión; la nota recoge la lectura alternativa de provisión material.
  doctrine_reference: Preservar la tensión interpretativa del texto poético.
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no se requieren cambios sustantivos. Se mantiene la decisión de conservar la tensión entre «Dios como tesoro» y «riqueza provista por Dios», reflejando la ambigüedad poética del hebreo.'
  spanish_consistency_notes:
  - Se usó «Todopoderoso» para שַׁדַּי en armonía con el libro de Job.
  - Se evitó «SEÑOR» porque el hebreo no usa el tetragrámaton aquí.
  - «Oro» y «plata» conservan el paralelismo metálico; la nota explica la alternativa de «tesoro» y «plata abundante».
  - «Selecta» intenta reproducir la cualidad ambigua de תּוֹעָפוֹת sin sobreinterpretarla.
