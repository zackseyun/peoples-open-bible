  spanish_consistency_notes:
  - Se mantiene «Jonathan» como forma del nombre propia del contexto histórico y de la auditoría inglesa; no se hispaniza a «Jonatán» para conservar coherencia onomástica con el proyecto y con la fuente auditada.
  - Se evita «SEÑOR», «Cristo» u այլ terminología no presente en el versículo; no hay decisiones teológicas especiales en este caso.
  - El estilo respeta la brevedad del original y la puntuación española con dos puntos para introducir el discurso directo implícito.
