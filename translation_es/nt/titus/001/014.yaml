translation:
  language: es
  text: no prestando atención a mitos judíos y a mandamientos de personas que se apartan de la verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dedicándose a mitos judíos y a mandamientos humanos de quienes se apartan de la verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ προσέχοντες
  english_pob_choice: not paying attention to
  chosen_spanish: no prestando atención a
  alternatives_spanish:
  - no dando oído a
  - no dedicándose a
  lexicon: BDAG
  rationale: El participio presente expresa una acción a evitar en continuidad con la exhortación previa. «Prestar atención a» conserva la idea de orientar la mente hacia algo, en un español natural y contemporáneo.
- source_word: Ἰουδαϊκοῖς μύθοις
  english_pob_choice: Jewish myths
  chosen_spanish: mitos judíos
  alternatives_spanish:
  - fábulas judías
  - mitos judaicos
  lexicon: BDAG
  rationale: μῦθος designa relatos inventados o legendarios; «mitos» es el equivalente directo y comprensible. El adjetivo Ἰουδαϊκοῖς se conserva como identidad/origen judío sin añadir matices ajenos al texto.
- source_word: ἐντολαῖς ἀνθρώπων
  english_pob_choice: commandments of people
  chosen_spanish: mandamientos de personas
  alternatives_spanish:
  - mandamientos humanos
  - mandatos de hombres
  lexicon: BDAG
  rationale: ἐντολαῖς puede rendirse como «mandamientos» o «mandatos»; se eligió «mandamientos» por cercanía formal. ἀνθρώπων se traduce con «personas» para evitar la lectura masculinizante de «hombres» en español moderno, manteniendo el contraste entre mandamientos meramente humanos y la verdad divina.
- source_word: ἀποστρεφομένων
  english_pob_choice: who turn away from
  chosen_spanish: que se apartan de
  alternatives_spanish:
  - que se desvían de
  - que se alejan de
  lexicon: BDAG
  rationale: El participio genitivo plural modifica de manera más natural a «personas». «Apartarse de» conserva la imagen verbal de desvío/abandono, sin volverla demasiado interpretativa.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad del evangelio
  - la verdad
  lexicon: BDAG
  rationale: «La verdad» es la traducción estándar y suficientemente abierta de ἀλήθεια. No se explicita «del evangelio» para no sobreespecificar más allá del texto griego.
theological_decisions:
- issue: Alcance del participio genitivo ἀποστρεφομένων
  english_pob_reading: The participle modifies 'people,' yielding 'commandments of people who turn away from the truth.'
  chosen_spanish_reading: 'El participio modifica a «personas»: «mandamientos de personas que se apartan de la verdad».'
  alternative_spanish_readings:
  - «mitos judíos y mandamientos de personas, que se apartan de la verdad»
  - «mitos judíos y mandamientos de personas apartadas de la verdad»
  rationale: La conexión gramatical más natural en griego es con ἀνθρώπων, no con «mitos» ni con «mandamientos» por separado. La redacción española conserva esa relación sin resolverla de modo artificial ni borrar la tensión del texto.
  doctrine_reference: Mantener la referencia más natural del participio y evitar armonizaciones doctrinales no explicitadas por el versículo.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el aparato auditado en inglés. No hubo revisiones aplicadas en el registro fuente; la versión española mantiene la misma lectura gramatical y teológica principal del texto inglés, especialmente la modificación del participio genitivo por «personas».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece יהוה aquí.
  - Se prefirió «personas» sobre «hombres» para ἀνθρώπων, por claridad inclusiva sin perder el valor genérico.
  - «Mitos» conserva el valor de relatos inventados o no verificados que tiene μῦθος en este contexto.
  - La nota al pie mantiene la alternativa inglesa documentada, adaptada al español sin añadir una nueva interpretación.
