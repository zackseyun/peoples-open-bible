translation:
  language: es
  text: Miren, pues, que Yahvé les ha dado el sábado; por eso, el sexto día les da pan para dos días. Que cada hombre[a] se quede en su lugar; que ningún hombre salga de su lugar el séptimo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'cada hombre' / 'ningún hombre'; la forma masculina se usa distributivamente para cada individuo de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Consideren
  lexicon: HALOT 7200
  rationale: El imperativo plural de ראה puede expresar ver o tomar nota de algo. En español, 'Miren' conserva el llamado directo a percibir/atender y suena natural en este contexto exhortativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT 3068
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' preserva el nombre propio del Dios del pacto sin sustituirlo por un título.'
- source_word: נָתַן לָכֶם הַשַּׁבָּת
  english_pob_choice: has given you the Sabbath
  chosen_spanish: les ha dado el sábado
  alternatives_spanish:
  - les ha dado el descanso sabático
  - les ha concedido el sábado
  lexicon: HALOT 5414; HALOT 7676
  rationale: El perfecto expresa un don ya otorgado. 'Les ha dado el sábado' es natural en español y mantiene la idea de don para el pueblo. 'Sábado' comunica mejor el referente institucional que una paráfrasis más larga.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por consiguiente
  lexicon: HALOT 3651
  rationale: La frase marca consecuencia. 'Por eso' mantiene la relación lógica con claridad y en un español bíblico contemporáneo.
- source_word: נֹתֵן
  english_pob_choice: he gives
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - provee
  lexicon: HALOT 5414
  rationale: El participio expresa una acción habitual o vigente. 'Da' conserva la simplicidad del presente y el sentido de provisión en la instrucción.
- source_word: לֶחֶם יוֹמָיִם
  english_pob_choice: bread for two days
  chosen_spanish: pan para dos días
  alternatives_spanish:
  - alimento para dos días
  - pan de dos días
  lexicon: HALOT 3899; HALOT 3117
  rationale: '''Pan para dos días'' reproduce con naturalidad la construcción hebrea y mantiene el término concreto לֶחֶם sin ampliarlo innecesariamente a ''alimento''.'
- source_word: שְׁב֣וּ אִ֣ישׁ תַּחְתָּ֗י/ו
  english_pob_choice: Let each man stay in his place
  chosen_spanish: Que cada hombre se quede en su lugar
  alternatives_spanish:
  - Que cada uno permanezca en su lugar
  - Que cada hombre permanezca donde está
  lexicon: HALOT 3427; HALOT 8478; HALOT 376
  rationale: שָׁב aquí significa quedarse/ permanecer, no solo sentarse. 'En su lugar' reproduce el modismo de תַּחְתָּיו de forma clara. 'Hombre' conserva la forma masculina distributiva del hebreo.
- source_word: אַל יֵצֵא אִישׁ מִמְּקֹמוֹ
  english_pob_choice: let no man go out from his place
  chosen_spanish: que ningún hombre salga de su lugar
  alternatives_spanish:
  - que nadie salga de su lugar
  - que ningún hombre se vaya de su sitio
  lexicon: HALOT 3318; HALOT 4725; HALOT 376
  rationale: El jussivo negativo da una prohibición. 'Salir de su lugar' refleja bien la repetición de מקום y el movimiento prohibido. Se mantiene 'hombre' por la misma razón distributiva del hebreo.
- source_word: בַּיּ֥וֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - el séptimo día
  - para el séptimo día
  lexicon: HALOT 3117; HALOT 7637
  rationale: La expresión señala el día en secuencia. 'En el séptimo día' es la formulación más natural y fiel al hebreo sin añadir información externa.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el nombre propio del pacto. 'Yahvé' sigue la norma del proyecto y evita la sustitución por un título, preservando la distinción entre nombre y cargo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje masculino distributivo con אִישׁ
  english_pob_reading: each man / no man
  chosen_spanish_reading: cada hombre / ningún hombre
  alternative_spanish_readings:
  - cada persona / nadie
  - cada uno / nadie
  rationale: El hebreo usa אִישׁ de manera distributiva y masculina. Se conserva esa forma para no borrar una decisión léxica documentada y para reflejar el alcance comunitario de la instrucción.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del auditorio inglés en cuanto a la relación causal directa ('for/por eso') entre el sábado dado por Yahvé y la provisión del sexto día. También mantiene la frase repetida de 'su lugar' y la prohibición del séptimo día sin suavizarla, en línea con la lectura revisada.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se mantiene 'sábado' para הַשַּׁבָּת como término institucional, no como paráfrasis.
  - Se preserva el paralelismo 'su lugar' / 'de su lugar' para מקום.
  - Se usan formas masculinas distributivas ('cada hombre', 'ningún hombre') por fidelidad al hebreo.
  - La puntuación con punto y coma separa la concesión del sábado y la consecuencia de la provisión del sexto día, reflejando la relación lógica del original.
