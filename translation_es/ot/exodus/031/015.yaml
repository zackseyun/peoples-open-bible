translation:
  language: es
  text: Seis días se puede trabajar,[a] pero el séptimo día es un sábado de completo reposo, santo para Yahvé. Cualquiera que trabaje en el día de sábado ciertamente será puesto a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se hará trabajo". La forma hebrea puede expresarse de manera pasiva o impersonal; en este contexto legal, el sentido es que el trabajo está permitido durante esos seis días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָשֶׂה מְלָאכָה
  english_pob_choice: Work may be done
  chosen_spanish: se podrá hacer trabajo
  alternatives_spanish:
  - se hará trabajo
  - podrá hacerse trabajo
  - habrá trabajo
  lexicon: HALOT
  rationale: La forma nifal expresa aquí una acción permitida o prevista en un marco legal; en español, “se podrá hacer” conserva bien el matiz modal del inglés POB sin volverlo una orden rígida. מְלָאכָה se rinde por “trabajo” como equivalente amplio y natural en la legislación sobre el sábado.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: but on the seventh day
  chosen_spanish: pero en el séptimo día
  alternatives_spanish:
  - y en el séptimo día
  - mas en el séptimo día
  lexicon: HALOT
  rationale: Aunque la conjunción hebrea puede ser simplemente “y”, en español el contraste con los seis días previos queda más claro con “pero”, sin perder el sentido del original.
- source_word: שַׁבַּת שַׁבָּתוֹן
  english_pob_choice: a Sabbath of complete rest
  chosen_spanish: un sábado de completo reposo
  alternatives_spanish:
  - un sábado, un reposo solemne
  - un sábado de reposo total
  - un sábado de descanso completo
  lexicon: HALOT
  rationale: La expresión intensifica la cesación/reposo. “Reposo” preserva mejor el valor cultual de שַׁבָּתוֹן que un simple “descanso”, y “completo” comunica la intensificación. Se mantiene “sábado” para reflejar el nombre del día en el contexto, sin forzar una terminología eclesiástica posterior.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: santo para Yahvé
  alternatives_spanish:
  - santo a Yahvé
  - consagrado a Yahvé
  - sagrado para Yahvé
  lexicon: HALOT
  rationale: קֹדֶשׁ predica una condición sagrada, y ל marca dedicación/orientación. “Santo para Yahvé” mantiene la dedicación personal del día al nombre divino, conforme al uso del nombre revelado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma establecida por el proyecto en español. No se sustituye por un título impersonal, para mantener la transparencia respecto del Tetragrama.
- source_word: כָּל הָעֹשֶׂה מְלָאכָה
  english_pob_choice: Whoever does work
  chosen_spanish: Cualquiera que haga trabajo
  alternatives_spanish:
  - Todo el que haga trabajo
  - Quien haga trabajo
  - Toda persona que haga trabajo
  lexicon: HALOT
  rationale: El participio con כָּל expresa una categoría legal general. “Cualquiera que haga” es claro, idiomático y conserva la amplitud universal del hebreo.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de sábado
  alternatives_spanish:
  - en el sábado
  - el día de sábado
  lexicon: HALOT
  rationale: Se explicita יוֹם como “día”, pero se evita una formulación demasiado tradicionalizada. “Día de sábado” mantiene la referencia concreta al día señalado en el texto, aunque también puede sonar menos fluido que “en sábado”; se eligió la forma más transparente con el sustantivo explícito.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - será muerto ciertamente
  - ciertamente será ejecutado
  - morirá sin falta
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva con valor penal. En español, “ciertamente morirá” preserva la solemnidad y la fuerza sancionadora del original, sin añadir una perífrasis legal pesada que suene menos natural. Se reconoce, no obstante, que el verbo hebreo puede implicar pena de muerte más que mera muerte natural.
theological_decisions:
- issue: Nombre divino en el mandamiento del sábado
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Dios
  rationale: El texto hebreo emplea el Tetragrama de manera directa, y el proyecto español usa “Yahvé” para hacerlo visible. Esto evita la sustitución litúrgica por un título y conserva la referencia personal y pactal del mandamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Intensificación de שַׁבַּת שַׁבָּתוֹן
  english_pob_reading: a Sabbath of complete rest
  chosen_spanish_reading: un sábado de completo reposo
  alternative_spanish_readings:
  - un sábado de reposo solemne
  - un sábado de descanso completo
  rationale: La frase hebrea intensifica la idea de cese total, no introduce una formulación doctrinal posterior. “Completo reposo” conserva la intensificación y el valor cultual del día apartado para Dios.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
- issue: Valor de la pena final
  english_pob_reading: shall surely be put to death
  chosen_spanish_reading: ciertamente morirá
  alternative_spanish_readings:
  - será muerto ciertamente
  - ciertamente será ejecutado
  rationale: La construcción hebrea es intensiva y legal. El español elegido es sobrio y fiel, aunque deja abierta la fuerza jurídica del pasaje; por eso se documenta la posible lectura penal de la expresión.
  doctrine_reference: HALOT; morphology of מוֹת יוּמָת
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el auditor inglés; el texto base quedó estable en la última pasada y el acuerdo de revisión fue alto. La versión española sigue de cerca esas decisiones auditadas, adaptándolas a un español natural sin perder la transparencia del hebreo.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene “sábado” para שַׁבָּת en este contexto legal-cultual.
  - Se conserva “reposo” para שַׁבָּתוֹן para reflejar la intensificación del hebreo.
  - La sanción final se formula con sobriedad para no sobretraducir ni suavizar la fuerza legal del hebreo.
