review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido global del griego: la madre fomentaba la φιλαδελφία junto con la εὐσέβεια, haciéndola más apreciada por sus hijos. Sin embargo, «para ellos» debilita ligeramente el valor dativo de referencia de αὐτοῖς, que en español suena más directo como «a ellos» o mejor reestructurado sin forzamiento. También conviene pulir el orden para una lectura más natural.'
  spanish_quality_summary: El español es claro y digno, pero «hacía más deseable para ellos el amor fraternal» suena algo calcado. Una formulación más idiomática y fiel es «hacía que el amor fraternal fuera más deseable para ellos». «Piedad» es defendible, pero en este libro «devoción a Dios» o «piedad» podrían funcionar; aquí puede mantenerse «piedad» por concisión y registro bíblico legible.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Piedad» para εὐσέβεια es una excepción contextual aceptable frente al inglés «godliness», y «amor fraternal» para φιλαδελφίαν está bien alineado con la decisión auditada.
  issues:
  - severity: medium
    issue: Construcción algo poco natural en español
    rationale: '«Hacía más deseable para ellos el amor fraternal» reproduce de forma muy literal la estructura griega/inglesa, pero en español suena más natural explicitar la subordinación: «hacía que el amor fraternal fuera más deseable para ellos».'
  - severity: low
    issue: Matiz del dativo αὐτοῖς
    rationale: «Para ellos» es posible, pero puede sonar más benefactivo que de referencia/estimación. En la redacción revisada se conserva sin problema porque queda claro que se trata de su valoración.
  revised_spanish_text: Porque, junto con la piedad, hacía que el amor fraternal fuera más deseable para ellos.
  revision_rationale: Se ajusta la sintaxis para que el español suene natural y siga expresando el imperfecto de acción continua y el comparativo de ποθεινοτέραν sin añadir matices no presentes en el griego. Se conserva «piedad» como equivalente adecuado y legible de εὐσέβεια en este contexto.
