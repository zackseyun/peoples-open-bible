revisions:
- from: 'Él les habló conforme al consejo de los jóvenes[a], diciendo: «Haré más pesado tu yugo, y añadiré a él. Mi padre los disciplinó con látigos, pero yo con escorpiones».'
  to: 'Les habló conforme al consejo de los jóvenes, diciendo: «Haré más pesado su yugo, y le añadiré más. Mi padre los disciplinó con látigos, pero yo con escorpiones[a]».'
  rationale: Se corrige la segunda persona plural del hebreo con «su yugo», se reemplaza el calco poco natural «añadiré a él» por «le añadiré más», y se mueve la nota al término «escorpiones», que es la palabra que la nota explica. También se elimina el «Él» inicial por fluidez sin pérdida de sentido.
