review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: un mandato a Ezequiel de acercar los dos palos entre sí para que sean uno en su mano. Conserva la imaginería concreta del acto simbólico y la nota sobre «serán para unos» está alineada con el modismo hebreo. Sin embargo, la nota [a] no preserva correctamente la alternativa documentada: el texto principal ya dice «como un solo palo», por lo que la alternativa debe ser «en un solo palo», no repetir la lectura principal.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Acércalos uno al otro», «para que lleguen a ser uno» y «en tu mano» suenan bien. «Palo» funciona en contexto para עֵץ, aunque «vara» también sería posible; no es necesario cambiarlo. La única reparación necesaria es la redacción de la nota [a] para que no sea internamente redundante e incoherente.
  glossary_alignment: 'No hay conflicto con la terminología por defecto del proyecto en este versículo. Las decisiones léxicas clave están bien resueltas: וְקָרַב → «acércalos»; אֶחָד אֶל אֶחָד → «uno al otro»; לְעֵץ אֶחָד → «como un solo palo» con alternativa resultativa en nota; לַאֲחָדִים → «uno».'
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en vez de dar la alternativa.
    rationale: El texto principal dice «como un solo palo[a]», pero la nota [a] empieza «O «como un solo palo»». Según el expediente inglés, la alternativa es «en un solo palo» / «como un solo palo». La nota actual no informa una alternativa real y crea confusión editorial.
  revised_spanish_text: Entonces acércalos uno al otro para ti como un solo palo[a], para que lleguen a ser uno[b] en tu mano.
  revised_footnotes:
  - marker: a
    text: O «en un solo palo». La expresión hebrea puede entenderse como resultado («en un solo palo») o como estado («como un solo palo»).
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y serán para unos en tu mano», un giro idiomático que expresa que llegan a ser uno.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota [a] para que refleje correctamente la alternativa lexical documentada en el POB inglés. También se normaliza la puntuación inicial de la nota [b].
