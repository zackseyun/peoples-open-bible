revisions:
- from: Hijas de Israel[a], lloren por Saúl, que las vestía de escarlata, con lujos[b], que ponía ornamentos de oro sobre su ropa.
  to: Hijas de Israel[a], lloren por Saúl, que las vestía de escarlata con lujos[b], que ponía ornamentos de oro sobre sus vestidos.
  rationale: La revisión conserva todas las decisiones léxicas principales del expediente, pero corrige la ambigüedad de ‘su ropa’ usando ‘sus vestidos’, que refleja mejor la referencia al grupo femenino interpelado. También mejora la fluidez poética quitando la coma entre ‘escarlata’ y ‘con lujos’.
