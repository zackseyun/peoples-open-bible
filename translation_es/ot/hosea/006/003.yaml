translation:
  language: es
  text: Así que conozcamos[a]; prosigamos en conocer a Yahvé. Su salida[b] es tan segura como el alba, y vendrá a nosotros como la lluvia[c], como la lluvia tardía[d] que riega la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persigamos» o «esforcémonos por» conocer a Yahvé.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su salida»; posiblemente «su aparición».'
    reason: lexical_alternative
  - marker: c
    text: 'O «que venga a nosotros como la lluvia». El verbo hebreo puede entenderse como un deseo, aunque el contexto también favorece un futuro confiado: «vendrá».'
    reason: alternative_reading
  - marker: d
    text: '«Lluvia tardía» traduce el hebreo «lluvia postrera»: la lluvia de fin de temporada, importante para los cultivos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנֵדְעָה
  english_pob_choice: So let us know
  chosen_spanish: Así que conozcamos
  alternatives_spanish:
  - Y conozcamos
  - Entonces conozcamos
  lexicon: HALOT
  rationale: 'El cohortativo 1cp de ידע expresa exhortación: en español, «conozcamos» mantiene la invitación comunitaria. «Así que» reproduce la progresión exhortativa del contexto sin añadir una conclusión ajena al hebreo.'
- source_word: נִרְדְּפָה
  english_pob_choice: let us press on
  chosen_spanish: esforcémonos por
  alternatives_spanish:
  - persigamos
  - sigamos tras
  lexicon: HALOT
  rationale: רדף tiene el sentido básico de perseguir, pero con לדעת expresa esfuerzo persistente hacia el conocimiento de Yahvé. «Esforcémonos por» conserva la idea de empeño continuo en un español natural; «persigamos» sería más literal pero puede sonar más áspero.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - reconocer
  lexicon: HALOT
  rationale: En este contexto el ידע es relacional y de pacto, no mero dato mental. «Conocer» en español conserva esa amplitud mejor que «saber» o «reconocer».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La pauta del proyecto exige renderizar el Tetragrámaton como «Yahvé». Se evita la sustitución por un título, preservando el nombre personal del pacto.
- source_word: כְּשַׁחַר
  english_pob_choice: as the dawn
  chosen_spanish: como el alba
  alternatives_spanish:
  - como la aurora
  - como el amanecer
  lexicon: HALOT
  rationale: שַׁחַר designa el despuntar del día. «Alba» suena natural y digna en español bíblico contemporáneo; «aurora» también sería posible, pero «alba» conserva mejor la imagen de salida temprana.
- source_word: נָכוֹן
  english_pob_choice: as sure as the dawn
  chosen_spanish: tan segura
  alternatives_spanish:
  - estable
  - firme
  - cierta
  lexicon: HALOT
  rationale: נָכוֹן expresa firmeza/certeza. La comparación con el alba pide en español un valor de seguridad; «tan segura» reproduce la fuerza de la certeza sin perder la metáfora.
- source_word: מֽוֹצָא֑/וֹ
  english_pob_choice: His going forth
  chosen_spanish: Su salida
  alternatives_spanish:
  - su salida al amanecer
  - su manifestación
  - su aparición
  lexicon: HALOT
  rationale: מוֹצָא literalmente es «salida / salida hacia afuera». «Su salida» preserva la imagen hebrea y permite la comparación con el alba; «aparición» explicita el sentido pero reduce la metáfora original.
- source_word: וְיָבֹוא
  english_pob_choice: and he will come
  chosen_spanish: y vendrá
  alternatives_spanish:
  - y que venga
  - y venga
  lexicon: HALOT
  rationale: El imperfecto 3ms se entiende mejor como futuro de confianza, no como súplica. «Vendrá» conserva esa expectativa segura que el contexto de las comparaciones favorece.
- source_word: כַּגֶּשֶׁם
  english_pob_choice: like the rain
  chosen_spanish: como la lluvia
  alternatives_spanish:
  - como el aguacero
  - como la lluvia abundante
  lexicon: HALOT
  rationale: גֶּשֶׁם es el término general para lluvia. «Lluvia» es el equivalente directo y mantiene la imagen de bendición vivificante.
- source_word: לָנוּ
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: HALOT
  rationale: Con «venir» en español, la preposición direccional más natural es «a». «A nosotros» conserva el destinatario del movimiento divino sin forzar la sintaxis.
- source_word: כְּמַלְקוֹשׁ
  english_pob_choice: like the spring rain
  chosen_spanish: como la lluvia tardía
  alternatives_spanish:
  - como la lluvia de primavera
  - como la lluvia final de la temporada
  lexicon: HALOT
  rationale: מַלְקוֹשׁ es la lluvia tardía de la temporada agrícola, tradicionalmente «latter rain». «Lluvia tardía» es más exacta que «lluvia de primavera» y conserva el valor agrícola del término.
- source_word: יוֹרֶה אָרֶץ
  english_pob_choice: that waters the earth
  chosen_spanish: que riega la tierra
  alternatives_spanish:
  - que empapa la tierra
  - que hace fructificar la tierra
  lexicon: HALOT
  rationale: El verbo meteorológico en este uso comunica la acción de hacer caer la lluvia sobre la tierra. «Riega» expresa bien la función benéfica de la lluvia y suena natural en español, manteniendo la referencia a la tierra.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como «Yahvé», no como una sustitución titular. Esto preserva el nombre de pacto revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de וְיָבֹוא
  english_pob_reading: predictive future ('he will come')
  chosen_spanish_reading: futuro confiado ('vendrá')
  alternative_spanish_readings:
  - subjuntivo/jussivo ('venga')
  - deseo ('que venga')
  rationale: Las comparaciones con el alba y la lluvia apuntan a certeza, no a petición. El futuro español mantiene la expectativa segura y conserva la tensión del texto sin convertirlo en súplica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Valor covenantal de ידע
  english_pob_reading: know
  chosen_spanish_reading: conocer
  alternative_spanish_readings:
  - saber
  - reconocer
  rationale: El hebreo expresa conocimiento relacional y de pacto. «Conocer» preserva mejor esa profundidad que «saber», que puede sonar más meramente intelectual en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no hubo cambios aplicados en la última pasada; la versión española sigue la lectura de alta concordancia, preservando la metáfora hebrea de la salida como el alba y la lluvia tardía como bendición vivificante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en todo el texto.
  - Se conserva el paralelismo entre «alba» y «lluvia tardía» sin explicitar en exceso la metáfora.
  - Se eligió «conocer» para ידע por su valor relacional/covenantal en español bíblico.
  - Se usó voz verbal natural en español («conozcamos», «esforcémonos», «vendrá») sin perder la modalidad exhortativa y futura del hebreo.
