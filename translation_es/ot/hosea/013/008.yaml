  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. No aparecen Yahvé, Mesías, etc. La traducción preserva adecuadamente la severidad teológica del juicio divino sin suavizarla. La decisión ‘osa’ puede mantenerse en español por la imagen de una madre privada de sus crías, siempre que la nota explique correctamente que es una decisión contextual de imagen, no de género gramatical hebreo.
