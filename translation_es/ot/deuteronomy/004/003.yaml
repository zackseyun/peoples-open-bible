translation:
  language: es
  text: Tus propios ojos han visto lo que Yahvé hizo en Baal Peor,[a] porque todo hombre que fue tras Baal Peor, Yahvé tu Dios lo destruyó de en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguió a Baal Peor». El hebreo dice literalmente «fue tras Baal Peor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵיכֶם הָרֹאֹת
  english_pob_choice: Your own eyes have seen
  chosen_spanish: Tus propios ojos han visto
  alternatives_spanish:
  - Tus ojos han visto
  - Has visto con tus propios ojos
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza los ojos como testigos directos. «Tus propios ojos han visto» conserva esa fuerza enfática en español natural y fiel.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - ha hecho
  - realizó
  lexicon: HALOT
  rationale: El verbo se refiere a la acción histórica de Yahvé en juicio contra Baal-peor. «Hizo» expresa de manera simple y fiel el evento pasado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para preservar el nombre personal de Dios.
- source_word: בְּבַעַל פְּעוֹר
  english_pob_choice: at Baal-peor
  chosen_spanish: en Baal-peor
  alternatives_spanish:
  - en relación con Baal-peor
  - a causa de Baal-peor
  lexicon: HALOT
  rationale: La preposición ב tiene aquí un valor locativo/situacional vinculado al episodio. «En Baal-peor» suena natural en español y conserva la referencia al acontecimiento.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón explicativa de la afirmación anterior. «Porque» mantiene la conexión causal de forma clara en español.
- source_word: כָּל הָאִישׁ
  english_pob_choice: every man
  chosen_spanish: a todo hombre
  alternatives_spanish:
  - a toda persona
  - a cada hombre
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino distributivo. «Todo hombre» preserva esa forma; el dativo con «a» sigue la exigencia del castellano para el complemento verbal con objeto humano.
- source_word: הָלַךְ אַחֲרֵי
  english_pob_choice: went after
  chosen_spanish: siguió a
  alternatives_spanish:
  - anduvo tras
  - fue tras
  lexicon: HALOT
  rationale: Aunque «ir tras» es literal, en español «seguir a» transmite de manera natural la idea hebrea de adherirse o ponerse del lado de Baal-peor, sin perder la fuerza idiomática.
- source_word: הִשְׁמִידוֹ
  english_pob_choice: destroyed from your midst
  chosen_spanish: lo destruyó de en medio de ti
  alternatives_spanish:
  - lo exterminó de entre ustedes
  - lo arrasó de en medio de ti
  lexicon: HALOT
  rationale: El hifil de שׁמד expresa destrucción severa. Se mantiene «lo destruyó» como equivalente fuerte y claro; se añade «de en medio de ti» para reflejar la remoción del ámbito comunitario.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La fórmula de pacto se expresa de manera directa como «tu Dios», sin añadir títulos ajenos al texto.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de entre ustedes
  - desde tu medio
  lexicon: HALOT
  rationale: La expresión apunta a expulsión o eliminación desde el interior de la comunidad. «De en medio de ti» preserva el valor comunitario con naturalidad en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la política del proyecto de transliterar el nombre divino en vez de ocultarlo con un sustituto. «Yahvé» es la forma establecida en español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura distributiva masculina de כָּל הָאִישׁ
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - todos
  rationale: El hebreo es singular masculino distributivo. Se conserva esa forma para no neutralizar la señal gramatical y semántica del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se observó el ajuste reciente del texto inglés auditado que eliminó un objeto pronombre añadido por estilo. En español, el objeto directo «lo» se conserva porque aquí la estructura verbal lo requiere y refleja bien el acusativo hebreo implícito, sin añadir contenido extra al sentido del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «Baal-peor» como nombre propio compuesto, sin calcar la puntuación inglesa.
  - «De en medio de ti» conserva la imagen comunitaria de מִקִּרְבֶּךָ.
  - La nota textual alternativa se ancla solo en «siguió a Baal-peor», donde el hebreo admite una traducción más literal.
