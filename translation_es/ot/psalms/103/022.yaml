translation:
  language: es
  text: Bendigan a Yahvé[a] todas sus obras, en todos los lugares de su dominio[b]. ¡Alma mía, bendice a Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alaben a Yahvé», porque el plural hebreo puede leerse como un llamado colectivo; el verbo, sin embargo, conserva con más precisión la idea de «bendecir».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en todos los lugares de su dominio»; es decir, en toda parte donde se extiende su gobierno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכ֤וּ
  english_pob_choice: Bless
  chosen_spanish: Bendigan / Bendice
  alternatives_spanish:
  - Alaben / Alaba
  - Bendecid / Bendice
  lexicon: HALOT
  rationale: El hebreo repite el imperativo de ברך en forma plural y luego singular, así que el español debe reflejar esa alternancia. 'Bendecir' conserva mejor la repetición litúrgica del verbo que un verbo más general como 'alabar'.
- source_word: יְהוָ֨ה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el nombre divino y, según el criterio del proyecto, se debe verter como 'Yahvé' en el cuerpo principal. No se sustituye por una convención de máscara litúrgica.
- source_word: כָּֽל מַעֲשָׂ֗י/ו
  english_pob_choice: all his works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todo lo que ha hecho
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede abarcar tanto lo hecho como lo hecho/creado. 'Obras' conserva la amplitud del término y encaja con la invitación a toda la creación a bendecir a Yahvé.
- source_word: בְּ/כָל מְקֹמ֥וֹת מֶמְשַׁלְתּ֑/וֹ
  english_pob_choice: in all the places of his dominion
  chosen_spanish: en todos los lugares de su dominio
  alternatives_spanish:
  - en todos los lugares de su reino
  - en todo lugar donde ejerce su gobierno
  lexicon: HALOT
  rationale: 'La frase hebrea es locativa y abstracta: no solo habla de territorio, sino del alcance del gobierno soberano. ''Dominio'' preserva esa fuerza más que ''reino'' o una paráfrasis explícita.'
- source_word: בָּרֲכִ֥י
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Alaba
  - Bendecid
  lexicon: HALOT
  rationale: Aquí el imperativo es femenino singular y se dirige al alma del salmista. 'Bendice' mantiene la misma raíz verbal que el plural inicial, conservando la inclusio del salmo.
- source_word: נַ֝פְשִׁ֗/י
  english_pob_choice: O my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - oh, alma mía
  - mi alma
  lexicon: HALOT
  rationale: En español, la vocativa poética natural es 'alma mía'; el 'O' inglés no es necesario. 'Mi alma' suena más descriptivo y pierde la fuerza de autoexhortación del hebreo.
- source_word: אֶת יְהוָֽה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé,
  - a Yahvé mismo
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת no se traduce, pero la estructura verbal pide un complemento directo con 'a'. Como el objeto es el nombre divino, 'a Yahvé' resulta idiomático en español y mantiene la relación sintáctica.
theological_decisions:
- issue: Rendición del nombre divino YHWH
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La política del proyecto prioriza su transliteración como 'Yahvé' en lugar de ocultarlo tras una sustitución reverencial. Esto preserva la dimensión pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: ¿'Bendecir' o 'alabar' en el imperativo litúrgico?
  english_pob_reading: Bless
  chosen_spanish_reading: bendecir / bendice
  alternative_spanish_readings:
  - alabar / alaba
  rationale: Aunque 'alabar' sería comprensible, el verbo hebreo ברך es más específico y se repite en paralelo. Mantener 'bendecir' conserva la tensión teológica de una creación que responde a Yahvé con bendición, no solo con elogio.
  doctrine_reference: Uso léxico del verbo ברך en el salterio
- issue: Alcance de 'su dominio'
  english_pob_reading: in all the places of his dominion
  chosen_spanish_reading: en todos los lugares de su dominio
  alternative_spanish_readings:
  - en todo su reino
  - dondequiera que alcance su gobierno
  rationale: La frase no reduce la soberanía divina a un territorio político; expresa el alcance total de su gobierno. 'Dominio' mantiene el matiz abstracto y universal.
  doctrine_reference: Teología bíblica de la realeza de Dios
translation_notes:
  revision_awareness: 'La redacción sigue la última forma revisada del texto fuente en inglés al omitir cualquier pronombre vocativo añadido antes de «sus obras», conservando la lectura más cercana al hebreo: un plural imperativo dirigido directamente a todas sus obras, seguido por el autoexhorto singular del alma del salmista.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' de manera uniforme para el nombre divino, sin alternar con 'SEÑOR'.
  - Se mantiene 'bendecir' en ambos imperativos para reflejar la repetición del hebreo ברך.
  - '''Dominio'' se usa con valor soberano/abstracto, no territorial limitado.'
  - La puntuación separa las dos líneas imperativas del versículo y ayuda a leer la transición del plural al singular.
