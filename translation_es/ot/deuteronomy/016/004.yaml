base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/016/004.yaml
  text: No leaven is to be seen with you within all your territory for seven days[b][a], and none of the flesh that you sacrifice in the evening on the first day shall remain overnight until morning.
  footnotes:
