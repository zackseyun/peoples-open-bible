translation:
  language: es
  text: 'Yahvé traerá sobre ti, sobre tu pueblo y sobre la casa de tu padre días[a] como no han venido desde el día en que Efraín se apartó de Judá: el rey de Asiria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "días que no han venido desde el día en que Efraín se apartó de Judá".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton, siguiendo la práctica POB de no enmascararlo como título. 'Yahvé' es la forma española estable y auditable para יְהוָה.
- source_word: יָבִיא
  english_pob_choice: will bring
  chosen_spanish: hará venir
  alternatives_spanish:
  - traerá
  - hará venir sobre
  lexicon: HALOT
  rationale: El hiphil de בוא expresa causación de venir; en español 'hará venir' mantiene esa fuerza causativa y suena natural con la repetición de 'sobre'.
- source_word: עָלֶיךָ ... וְעַל עַמְּךָ ... וְעַל בֵּית אָבִיךָ
  english_pob_choice: upon you, upon your people, and upon your father's house
  chosen_spanish: sobre ti, sobre tu pueblo y sobre la casa de tu padre
  alternatives_spanish:
  - contra ti, contra tu pueblo y contra la casa de tu padre
  - sobre ti, sobre tu pueblo y sobre tu casa paterna
  lexicon: HALOT
  rationale: Se conserva עַל con 'sobre' para mantener la cadencia solemne y la idea de carga/jucio que recae. 'Casa de tu padre' traduce el modismo sin reducirlo a 'dinastía' en el texto principal.
- source_word: יָמִים
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  lexicon: HALOT
  rationale: '''Días'' reproduce el sustantivo hebreo y conserva el giro profético temporal. En español es plenamente inteligible y más cercano que una generalización como ''tiempos''.'
- source_word: אֲשֶׁר לֹא בָאוּ
  english_pob_choice: days unlike any that have come
  chosen_spanish: días que no han venido
  alternatives_spanish:
  - días como no han venido
  - días como jamás han venido
  lexicon: HALOT
  rationale: La cláusula relativa expresa la idea de días sin precedente. 'Que no han venido' mantiene la relación con el hebreo y evita añadir comparación más allá de lo necesario; la nota recoge la alternativa idiomática.
- source_word: לְמִיּוֹם סוּר אֶפְרַיִם מֵעַל יְהוּדָה
  english_pob_choice: since the day Ephraim turned away from Judah
  chosen_spanish: desde el día en que Efraín se apartó de Judá
  alternatives_spanish:
  - desde el día en que Efraín se separó de Judá
  - desde el día en que Efraín se desvió de Judá
  lexicon: HALOT
  rationale: סוּר significa 'apartarse/volverse aparte'. 'Se apartó' es preciso y natural; conserva el sentido histórico del cisma sin volverlo más interpretativo de lo que permite el texto.
- source_word: אֵת מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - sí, el rey de Asiria
  - el rey asirio
  lexicon: HALOT
  rationale: El acusativo con אֵת funciona aquí como especificación appositiva del desenlace/juicio. El español directo 'el rey de Asiria' transmite mejor esa aposición que una glosa explícita.
theological_decisions:
- issue: Alcance del juicio profético
  english_pob_reading: The verse announces divinely brought days of calamity affecting Ahaz personally, his people, and his royal house, climaxing in the Assyrian king as the instrument.
  chosen_spanish_reading: El versículo anuncia días de calamidad traídos por Yahvé sobre Ajaz, su pueblo y la casa de su padre, culminando en el rey de Asiria como expresión concreta de ese juicio.
  alternative_spanish_readings:
  - El rey de Asiria podría leerse como una cláusula aparte, no como especificación de los días.
  - Podría entenderse 'días' solo como duración, sin énfasis en el instrumento del juicio.
  rationale: La sintaxis hebrea y el audit trail inglés favorecen leer el final como especificación del juicio venidero, no como una idea independiente. En español, la puntuación con dos puntos conserva esa relación sin sobredetallar la teología del castigo.
  doctrine_reference: Isaías 7:17; juicio divino histórico sobre Judá y la casa de David
- issue: Tratamiento del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Siguiendo la política POB, el Tetragrámaton se translitera en vez de sustituirse por un título. Esto preserva la identidad personal del Dios del pacto revelada en el texto hebreo.
  doctrine_reference: Éxodo 3:15; Isaías 7:17
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada del inglés POB que eliminó la doble negación y dejó el cierre como una aposición directa ('the king of Assyria'). Por eso el español evita cualquier formulación con doble negación y mantiene el final sin glosa explicativa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el texto principal, conforme al criterio POB.
  - Se conserva la estructura repetida 'sobre... sobre... sobre...' para reflejar el paralelismo hebreo.
  - '''Casa de tu padre'' se deja sin expandir a ''dinastía'' en el texto principal para no cerrar indebidamente el alcance del hebreo.'
  - La nota de pie de página recoge la alternativa idiomática sin debilitar la traducción principal.
