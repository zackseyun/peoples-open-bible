    issue: «sensatamente» traduce ἀλόγιστον en sentido opuesto
    rationale: El griego ἀλόγιστον significa ‘sin razón’, ‘insensatamente’, ‘irracionalmente’. «Sensatamente» invierte el sentido y altera de forma sustancial la súplica.
  - severity: high
    issue: Error textual «privadose»
    rationale: Es una forma española incorrecta y afecta la claridad básica del versículo. Debe corregirse a «privados» o reestructurarse la oración.
  - severity: medium
    issue: La nota b está anclada y explicada sobre la expresión equivocada
    rationale: El audit trail inglés coloca la nota sobre la imagen literal de «being removed from life», no sobre «have mercy on us». En español la nota debería acompañar «privados de la vida» y explicar la literalidad/remoción de la vida.
  - severity: low
    issue: El español puede sonar más natural con una ligera reordenación del tramo final
    rationale: «somos privados insensatamente de la vida» es aceptable, pero una formulación como «somos privados de la vida sin razón» puede resultar más idiomática. Aun así, no es necesario apartarse mucho del original.
