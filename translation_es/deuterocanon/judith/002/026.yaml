translation:
  language: es
  text: Y rodeó a todos los hijos de Madián[a], e incendió sus campamentos, y saqueó sus rediles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los madianitas». El griego dice más literalmente «todos los hijos de Madián».
    reason: lexical_alternative
  - marker: b
    text: O «corrales» o «encierros» para μάνδρας; el término griego designa un recinto para animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκύκλωσεν
  english_pob_choice: surrounded
  chosen_spanish: rodeó
  alternatives_spanish:
  - lo cercó
  - lo circundó
  - lo rodeó
  lexicon: LSJ
  rationale: El verbo griego implica un movimiento de cercar o envolver militarmente. «Rodeó» comunica bien esa acción en español natural y conserva la imagen de cerco sin volverse demasiado rígido.
- source_word: πάντας τοὺς υἱοὺς Μαδιάμ
  english_pob_choice: all the sons of Midian
  chosen_spanish: todos los hijos de Madián
  alternatives_spanish:
  - todos los madianitas
  - todos los descendientes de Madián
  lexicon: LSJ
  rationale: Se preserva la formulación literal del griego, «hijos de Madián», tal como el POB inglés retuvo «sons of Midian». En español, «madianitas» sería idiomático, pero aquí la forma más literal mantiene mejor el rastro textual y la estructura bíblica.
- source_word: ἐνέπρησεν
  english_pob_choice: burned
  chosen_spanish: incendió
  alternatives_spanish:
  - quemó
  - prendió fuego a
  lexicon: LSJ
  rationale: El verbo significa prender fuego o quemar. «Incendió» expresa con claridad la acción deliberada de destrucción por fuego y resulta natural en registro narrativo formal.
- source_word: τὰ σκηνώματα
  english_pob_choice: camps
  chosen_spanish: campamentos
  alternatives_spanish:
  - campamentos
  - tiendas
  - asentamientos
  lexicon: LSJ
  rationale: El griego puede referirse a complejos de tiendas o asentamientos de campamento. «Campamentos» recoge mejor el sentido colectivo que «tiendas» y mantiene la equivalencia con la revisión inglesa más directa.
- source_word: ἐπρονόμευσεν
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - saqueó
  - despojó
  - tomó como botín
  lexicon: LSJ
  rationale: El verbo expresa tomar botín o despojar. «Saqueó» es el equivalente español más claro y natural en contexto militar, sin añadir matices no presentes en el griego.
- source_word: τὰς μάνδρας
  english_pob_choice: folds
  chosen_spanish: rediles
  alternatives_spanish:
  - rediles
  - corrales
  - encierros
  lexicon: LSJ
  rationale: μάνδρα designa un recinto para animales, especialmente un redil o corral. «Rediles» conserva el carácter pastoral sin especificar indebidamente ovejas, en línea con la cautela del audit trail inglés.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente en el tono más directo para σκηνώματα y μάνδρας, pero conserva la literalidad de «hijos de Madián» para reflejar la forma griega; además, adapta el aspecto verbal al español con una secuencia narrativa fluida.
  spanish_consistency_notes:
  - Se mantiene «Madián» como forma del topónimo bíblico para coherencia interna.
  - Se evita introducir «SEÑOR» u այլ terminología teológica no pertinente, dado que el versículo no contiene referencias explícitas a Dios.
  - «Rediles» se usa sin añadir «ovejas», respetando la amplitud semántica de μάνδρα y la cautela del POB inglés.
