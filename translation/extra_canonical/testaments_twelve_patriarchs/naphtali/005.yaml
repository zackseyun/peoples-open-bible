  text: 3. Καὶ σμικρυνθέντες¹⁸ ἐπιστρέψετε¹⁹ καὶ ἐπιγνώσεσθε Κύριον τὸν Θεὸν ὑμῶν²⁰ καὶ ἐπιστρέψει ὑμᾶς εἰς τὴν γῆν ὑμῶν κατὰ²¹ τὸ πολὺ αὐτοῦ ἔλεος²². 4. Καὶ ἔσται ὅταν²³ *ἐξέλθωσιν εἰς τὴν γῆν τῶν²⁴ πατέρων αὐτῶν, πάλιν ἐπιλήσονται²⁵ τοῦ²⁶ Κυρίου καὶ ἀσεβήσουσιν²⁷. 5. Καὶ διασπερεῖ²⁸ αὐτοὺς Κύριος²⁹ ἐπὶ πρόσωπον³⁰ πάσης τῆς γῆς, *ἄχρις οὗ ἔλθῃ³¹ *τὸ σπλάγχνον Κυρίου³², ἄνθρωπος *ποιῶν δικαιοσύνην καὶ ποιῶν ἔλεος³³ εἰς πάντας τοὺς *μακρὰν καὶ τοὺς ἐγγύς³⁴. V. Ἐν γὰρ *τῷ τεσσαρακοστῷ ἔτει τῆς¹ ζωῆς μου, εἶδον² *⌈ὄραμα⌉³ ἐν τῷ ὄρει τοῦ Ἐλαιῶνος³ κατὰ ἀνατολὰς Ἱερουσαλήμ, ὅτι⁴ ὁ ἥλιος καὶ ἡ σελήνη ἕστηκαν⁵. 2. Καὶ ἰδοὺ Ἰσαὰκ⁶ ὁ πατὴρ *τοῦ πατρός⁷ μου⁸ ἔλεγεν⁹ ἡμῖν· Προσδραμόντες *κρατήσατε ἕκαστος¹⁰ κατὰ δύναμιν¹¹, Γκαὶ *τοῦ πιάσαντος¹² ἔσται ὁ ἥλιος καὶ ἡ σελήνη˥. 3. Καὶ¹³ *ἐδράμομεν πάντες ὁμοῦ¹⁴ Γκαὶ¹⁵ ὁ¹⁶ Λευὶ¹⁷ ἐκράτησε τὸν ἥλιον *καὶ ὁ Ἰούδας φθάσας ἔπιασε τὴν σελήνην¹⁸, καὶ ὑψώθησαν ἀμφότεροι σὺν αὐτοῖς¹⁹. 4. Καὶ ὄντος²⁰ τοῦ Λευὶ *ὡς ὁ ἥλιος²¹, Γἰδοὺ²² νέος²³ *τις ἐπιδίδωσιν²⁴ αὐτῷ βαΐα φοινίκων δώδεκα, καὶ Ἰούδας *ἐγένετο λαμπρὸς²⁵ ὡς *ἡ σελήνη²⁶, καὶ *ἦσαν ὑπὸ τοὺς πόδας αὐτῶν²⁷ δώδεκα ἀκτῖνες²⁸. [5. Καὶ προσδραμόντες *οἱ δύο ὅτε²⁹ Λευὶ³⁰ καὶ Ἰούδας³¹ ἐκράτησαν αὐτούς³²]. 6. Καὶ ἰδοὺ ταῦρος ἐπὶ τῆς γῆς, ἔχων δύο³³ κέρατα μεγάλα, καὶ πτέρυγας³⁴ ἀετοῦ ἐπὶ³⁵ νώτου αὐτοῦ· καὶ θέλοντες ἡμεῖς³⁶ πιάσαι³⁷ αὐτόν, οὐκ ἠδυνήθημεν. 7. *ἐλθὼν δὲ Ἰωσὴφ κατέλαβεν³⁸ αὐτόν, καὶ συνανῆλθεν³⁹ αὐτῷ εἰς τὸ⁴⁰ ὕψος. 8. Καὶ εἶδον *ὅτι ἤμην παρεκεῖ⁴¹, καὶ ἰδοὺ γραφὴ *ἁγία ὤφθη ἡμῖν⁴², λέγουσα⁴³· Ἀσσύριοι⁴⁴, Μῆδοι⁴⁵, Πέρσαι⁴⁶, Χαλδαῖοι⁴⁷, Σύροι⁴⁸, κληρονομήσουσιν αἰχμαλωσίαν⁴⁹ τὰ δώδεκα σκῆπτρα τοῦ Ἰσραήλ.
