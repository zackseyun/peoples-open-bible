- issue: Rendering the naming wordplay between יִלָּוֶה and לֵוִי
  chosen_reading: Use 'attached' in the main text and preserve the more literal 'joined' in a footnote
  alternative_readings:
  - will be joined to me
  rationale: This is not a doctrinal dispute but a translation-philosophy decision. The Hebrew explicitly links Leah's explanation to the name Levi through sound and sense. 'Attached' is more natural modern English, while a footnote preserves 'joined' to make the etymological connection more visible.
  doctrine_reference: Translation philosophy §§3, 6
