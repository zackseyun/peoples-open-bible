    reason: lexical_alternative
  - marker: d
    text: El término final es difícil; probablemente alude a males o penas impuestas que vendrán sobre la casa.
    reason: textual_variant
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota [a] para que refleje con precisión el griego y la alternativa auditada en inglés. La formulación anterior introducía una sintaxis distinta («la azotará un flagelo») que no corresponde al original.
