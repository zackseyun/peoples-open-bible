translation:
  language: es
  text: 'En tres cosas fui embellecido[a], y me levanté hermoso[b] delante de Yahvé y de los hombres:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hice hermoso»; el pasivo griego puede oírse como estado resultante o como una acción hecha al hablante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me puse en pie hermoso»; el griego conserva una imagen concreta de erguirse o alzarse, no solo de «parecer» bello.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τρισὶν
  english_pob_choice: In three things
  chosen_spanish: En tres cosas
  alternatives_spanish:
  - Por tres cosas
  - Entre tres cosas
  lexicon: LSJ
  rationale: Ἐν con dativo aquí introduce el ámbito o esfera en que se describe la belleza del hablante. «En tres cosas» conserva la estructura enumerativa del griego y suena natural en español.
- source_word: ὡραιώθην
  english_pob_choice: I was made beautiful
  chosen_spanish: fui hecho hermoso
  alternatives_spanish:
  - fui embellecido
  - me hice hermoso
  - fui adornado
  lexicon: LSJ
  rationale: El aoristo pasivo de ὡραιόω expresa ser hecho bello/embellecido o quedar en estado de belleza. «Fui hecho hermoso» mantiene el pasivo y la fuerza estética sin convertirlo en mera honra ni en una paráfrasis más libre.
- source_word: ἀνέστην
  english_pob_choice: I stood
  chosen_spanish: me levanté
  alternatives_spanish:
  - me puse en pie
  - me alcé
  - estuve en pie
  lexicon: LSJ
  rationale: ἀνίστημι puede significar levantarse o ponerse en pie. Dado el paralelismo con ὡραία, «me levanté» conserva la imagen concreta de erguirse o aparecer en belleza, sin abstraerla en «aparecí».
- source_word: ὡραία
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - hermoso
  - gracioso
  lexicon: LSJ
  rationale: El adjetivo retoma el campo semántico de la belleza del verbo precedente. «Hermoso» es claro y digno en español; «bello» sería igualmente posible, pero «hermoso» fluye mejor en esta construcción.
- source_word: ἔναντι Κυρίου καὶ ἀνθρώπων
  english_pob_choice: before the Lord and men
  chosen_spanish: delante de Yahvé y de los hombres
  alternatives_spanish:
  - en presencia de Yahvé y de los hombres
  - ante Yahvé y los hombres
  - delante del Señor y de los hombres
  lexicon: LSJ
  rationale: ἔναντι significa «delante de» o «en presencia de». Se usa «Yahvé» conforme al principio del proyecto para el nombre divino en el texto principal. «Hombres» preserva el término genérico ἀνθρώπων, es decir, seres humanos, sin neutralizarlo con «personas».
theological_decisions:
- issue: Renderización de Κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: Aunque el contexto griego dice Κυρίου, en Sirácides se trata de Dios. El proyecto exige «Yahvé» como forma principal para el nombre divino; por eso se abandona la convención de mascarlo como «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
- issue: Renderización de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  - los seres humanos
  rationale: ἀνθρώπων es el plural genérico de humanos. «Los hombres» conserva la fuerza antropológica tradicional del término sin restringirlo a varones concretos; en este contexto incluye a la humanidad en general.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «I became beautiful» a «I was made beautiful» y desde «I stood up beautiful» a «I stood beautiful». La traducción española sigue esa corrección al conservar el pasivo de ὡραιώθην y la imagen concreta de ἀνέστην sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» según la norma general del proyecto para יהוה, aun cuando la fuente griega usa Κυρίου.
  - Se preservó la repetición léxica del campo de la belleza con «hermoso» para reflejar el paralelismo entre ὡραιώθην y ὡραία.
  - «Los hombres» se usa en sentido genérico humano, coherente con el griego ἀνθρώπων y con la política de precisión de género del proyecto.
