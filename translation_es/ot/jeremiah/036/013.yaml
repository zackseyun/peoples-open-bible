translation:
  language: es
  text: Y Micaías les contó todas las palabras que había oído cuando Baruc leía[a] el rollo a oídos del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que había oído cuando Baruc leyó el rollo delante del pueblo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: les contó
  alternatives_spanish:
  - les dijo
  - les informó
  - les relató
  lexicon: HALOT
  rationale: El hifil de נגד expresa hacer saber o comunicar. «Contó» funciona de manera natural en español narrativo y conserva el acto de comunicar información sin elevar indebidamente el registro.
- source_word: מִכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaiahu
  lexicon: HALOT
  rationale: Se sigue una transliteración española estándar del nombre אישי, más natural y reconocible en español bíblico.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo lo que
  - todas estas cosas
  lexicon: HALOT
  rationale: «Palabras» preserva el hebreo דְּבָרִים y el énfasis jeremiano en el contenido verbal pronunciado/leído. «Todo lo que» sería más interpretativo.
- source_word: אֲשֶׁר שָׁמֵעַ
  english_pob_choice: that he had heard
  chosen_spanish: que había oído
  alternatives_spanish:
  - que oyó
  - que estaba oyendo
  lexicon: HALOT
  rationale: El qatal marca una acción completada antes del relato de Micaías; el pluscuamperfecto español comunica bien esa anterioridad.
- source_word: בִּקְרֹא
  english_pob_choice: when Baruch read
  chosen_spanish: cuando Baruc leía
  alternatives_spanish:
  - cuando Baruc leyó
  - mientras Baruc leía
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal. El imperfecto español deja abierta la lectura de acción en desarrollo, muy acorde con la escena de lectura pública.
- source_word: בָרוּךְ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruj
  lexicon: HALOT
  rationale: Transliteración española habitual del nombre propio.
- source_word: בַּסֵּפֶר
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el libro
  - el documento
  lexicon: HALOT
  rationale: En Jeremías 36 el סֵפֶר es el rollo escrito por Baruc; «rollo» es más preciso que «libro» en este contexto.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en presencia del pueblo
  alternatives_spanish:
  - a oídos del pueblo
  - en el oído del pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para una lectura pública. «En presencia del pueblo» comunica la función pública de la escena en español natural, sin perder el sentido de audición comunitaria.
translation_notes:
  revision_awareness: 'La auditoría inglesa mantiene una sola nota alternativa y una revisión menor: se eliminó «from» antes de «the scroll» para hacer más directa la escena. La versión española refleja esa misma decisión con «leyía el rollo»/«el rollo» sin añadir preposición impropia, y conserva la nota alternativa sobre el valor temporal de la construcción hebrea.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo; no aplica aquí.
  - Se conserva el tono narrativo sobrio y la correspondencia directa con el hebreo.
  - «Rollo» se usa de forma consistente para סֵפֶר en este contexto específico de Jeremías 36.
