revisions:
- from: Porque has abandonado[a] a tu pueblo, la casa de Jacob, porque están llenos de prácticas orientales, y practican adivinación como los filisteos[b], y estrechan manos[c] con los hijos de extranjeros.
  to: Porque has abandonado a tu pueblo, la casa de Jacob, porque están llenos de prácticas orientales[a], y practican adivinación como los filisteos[b], y hacen tratos[c] con los hijos de extranjeros.
  rationale: Se corrige el anclaje erróneo de la nota [a] para que corresponda a «prácticas orientales», que es donde recae la alternativa literal «desde el oriente». También se reemplaza «estrechan manos» por «hacen tratos», una expresión más natural en español que comunica mejor el probable sentido de acuerdo o asociación, mientras la nota preserva la imagen literal y la incertidumbre del hebreo raro.
