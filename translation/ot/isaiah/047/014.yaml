theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: The verse is rendered as temporal, destructive judgment on Babylon's counselors/occult practitioners, without importing later doctrinal notions of final punishment.
  alternative_readings:
  - Possible broader theological application to divine judgment generally
  rationale: The imagery is severe, but the immediate context is prophetic taunt and judgment against Babylon. The translation preserves the metaphor's force without over-specifying its theological scope.
  doctrine_reference: Preserve theological tension rather than resolve it.
