translation:
  language: es
  text: Y no lo reconoció[a], porque sus manos eran velludas como las manos de su hermano Esaú; así lo bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y lo bendijo». La forma narrativa hebrea puede traducirse simplemente como secuencia; aquí también sugiere resultado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכִּירוֹ
  english_pob_choice: did not recognize him
  chosen_spanish: no lo reconoció
  alternatives_spanish:
  - no lo identificó
  - no lo conoció
  lexicon: HALOT
  rationale: נכר en hifil expresa reconocer o identificar. En este contexto Isaac no identifica a Jacob por el tacto, así que "no lo reconoció" conserva bien el sentido natural y directo en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de que Isaac no lo reconociera. "Porque" es la conexión causal más clara y natural en español moderno.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de él
  lexicon: HALOT
  rationale: Se trata del plural con sufijo de tercera persona masculina singular, referido a las manos de Jacob percibidas por Isaac. "Sus manos" es la forma más natural y fiel.
- source_word: כִּידֵי
  english_pob_choice: like the hands of
  chosen_spanish: como las manos de
  alternatives_spanish:
  - igual que las manos de
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. "Como las manos de" conserva la comparación de manera clara y sobria en español.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - de su hermano
  lexicon: HALOT
  rationale: Término de parentesco literal con sufijo posesivo. "Su hermano" reproduce el valor relacional sin expandir el texto.
- source_word: שְׂעִרֹת
  english_pob_choice: hairy
  chosen_spanish: velludas
  alternatives_spanish:
  - peludas
  - cubiertas de pelo
  lexicon: HALOT
  rationale: El adjetivo describe una cualidad táctil de las manos. "Velludas" es una opción idiomática en español que conserva la concreción de "hairy" sin sonar demasiado coloquial.
- source_word: וַיְבָרְכֵהוּ
  english_pob_choice: so he blessed him
  chosen_spanish: así lo bendijo
  alternatives_spanish:
  - y lo bendijo
  - entonces lo bendijo
  lexicon: HALOT
  rationale: La forma narrativa con waw puede leerse como secuencia y también como resultado. "Así lo bendijo" conserva ese matiz consecutivo/resultativo que la POB inglesa resaltó con "so he blessed him".
translation_notes:
  revision_awareness: Alineado con la revisión más reciente, sin cambios adicionales respecto al sentido central del hebreo y la decisión inglesa de resaltar la relación causal/resultativa en la clausula final.
  spanish_consistency_notes:
  - Se mantuvo el nombre "Esaú" conforme al uso bíblico en español.
  - Se evitó "SEÑOR" porque el versículo no contiene el nombre divino.
  - '"Bendijo" se conserva en sentido narrativo/performativo sin añadir explicaciones ajenas al texto.'
