    rationale: El texto principal usa 'por medio de ellos[a]', pero la nota dice 'O "por medio de ellos" para "por ellos"'. La alternativa debe diferir del texto anclado; tal como está, la nota repite la lectura principal y confunde al lector.
  revised_spanish_text: para poner a prueba a Israel por medio de ellos[a], si guardarían el camino de Yahvé, andando en él, como lo guardaron sus padres, o no.
