base_translation:
  language: en
  yaml_path: translation/ot/exodus/031/006.yaml
  text: And behold[a], I have appointed with him Oholiab son of Ahisamach, of the tribe of Dan; and in the heart of everyone wise of heart I have put wisdom[b], that they may make all that I have commanded you.
  footnotes:
