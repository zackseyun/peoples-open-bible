lexical_decisions:
- source_word: וֶ/אֱלִישָׁמָע
  english_pob_choice: and Elishama
  chosen_spanish: y Elisama
  alternatives_spanish:
  - y Elishama
  - y Elisama
  lexicon: HALOT
  rationale: Se conserva el nombre propio mediante transliteración al español, evitando traducirlo. La forma 'Elisama' es una adaptación española natural y transparente del hebreo אֱלִישָׁמָע; mantiene la referencia personal sin forzar una calca del inglés.
- source_word: וּ/בְעֶלְיָדָע
  english_pob_choice: and Beeliada
  chosen_spanish: y Beeliada
  alternatives_spanish:
  - y Eliada
  - y Beeliada
  lexicon: HALOT
  rationale: Se mantiene la forma consonántica hebrea recibida בְעֶלְיָדָע, que favorece 'Beeliada'. Se preserva así la lectura del texto hebreo de este versículo, mientras que la variante paralela 'Eliada' queda documentada en la nota.
- source_word: וֶ/אֱלִיפָלֶט
  english_pob_choice: and Eliphelet
  chosen_spanish: y Elifelet
  alternatives_spanish:
  - y Eliphelet
  - y Elifelet
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español. 'Elifelet' sigue de cerca la forma hebrea אֱלִיפָלֶט y resulta más natural en ortografía española que la grafía inglesa 'Eliphelet'.
translation_notes:
  revision_awareness: El texto hebreo base y el audit trail inglés coinciden plenamente; no se requieren revisiones de contenido. La única tensión relevante es la forma del nombre propio en paralelo con 2 Samuel 5:16, que se conserva como nota textual.
  spanish_consistency_notes:
  - Se usa la conjunción simple 'y' para cada nombre, en paralelo al hebreo con waw consecutiva.
  - Se prefieren adaptaciones españolas de los nombres propios ('Elisama', 'Elifelet') en lugar de grafías inglesas, manteniendo 'Beeliada' por fidelidad al texto recibido.
  - La nota conserva la variante textual documentada sin desplazar la lectura base del versículo.
