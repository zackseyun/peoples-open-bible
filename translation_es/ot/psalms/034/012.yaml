translation:
  language: es
  text: Vengan, hijos[a], escúchenme; yo les enseñaré el temor de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijos varones'. El sustantivo hebreo es masculino plural, pero aquí funciona probablemente como un llamado sapiencial a los aprendices en general.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el temor de Yahvé'', una expresión sapiencial que abarca asombro reverente, obediencia y también justa aprensión delante de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Vayan
  lexicon: HALOT
  rationale: En el hebreo, el imperativo de 'ir/caminar' funciona aquí como una invitación directa. En español, 'Vengan' comunica de forma natural ese llamado a acercarse e iniciar la instrucción.
- source_word: בָנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos varones
  lexicon: HALOT
  rationale: El término es masculino plural. En un marco sapiencial puede usarse de forma representativa para los oyentes o discípulos; 'hijos' preserva mejor la forma y el matiz vocativo que 'niños'.
- source_word: שִׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - pónganme atención
  lexicon: HALOT
  rationale: La expresión exige atención obediente, no solo oír sonidos. 'Escúchenme' es un imperativo natural en español y conserva ese sentido de atención activa.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - la reverencia por Yahvé
  - el temor del Señor
  lexicon: HALOT
  rationale: Se mantiene 'temor' para no suavizar la categoría sapiencial ni perder su tensión teológica. 'Yahvé' sigue el término divino proyectado por la serie, en lugar de reemplazarlo por una fórmula de ocultamiento.
- source_word: אֲלַמֶּדְכֶם
  english_pob_choice: I will teach you
  chosen_spanish: les enseñaré
  alternatives_spanish:
  - yo les enseñaré
  - les instruiré
  lexicon: HALOT
  rationale: El verbo piel expresa la acción de instruir. 'Les enseñaré' es la forma más directa y clara en español, manteniendo la promesa del hablante.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: La política del proyecto pide transliterar el Nombre divino en vez de ocultarlo con un sustituto devocional. 'Yahvé' es la forma establecida en español del nombre del pacto y conserva la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conservar la tensión de יִרְאַת יְהוָה
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia por Yahvé
  - el respeto por Yahvé
  rationale: '''Temor'' preserva el rango semántico completo: asombro reverente, obediencia y también santa aprensión. ''Reverencia'' o ''respeto'' estrecharían indebidamente el sentido.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del criterio auditado; se conserva la lectura sapiencial y la transparencia del Nombre divino.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el proyecto para יְהוָה.
  - '''Temor'' se conserva sin suavizar a ''reverencia'', para no perder la tensión teológica.'
  - '''Hijos'' se mantiene como vocativo sapiencial; la nota aclara la alternativa masculina literal.'
  - El tono es exhortativo y natural en español, sin añadir explicaciones que no están en el texto.
