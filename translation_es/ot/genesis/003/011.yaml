translation:
  language: es
  text: 'Y él dijo: «¿Quién te dijo que estabas desnudo? ¿Has comido del árbol del cual te mandé no comer?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se conserva con una secuencia simple en español. Se mantiene el sujeto explícito «él» siguiendo el contexto inmediato, sin nombrar a Yahvé donde este versículo no lo explicita.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién fue el que
  - ¿Quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo natural en español, fiel al valor pronominal del hebreo.
- source_word: הִגִּיד לְךָ
  english_pob_choice: told you
  chosen_spanish: te dijo
  alternatives_spanish:
  - te declaró
  - te hizo saber
  lexicon: HALOT
  rationale: נגד en hifil puede significar «decir, declarar, hacer saber». Aquí «te dijo» es el equivalente más natural y breve en español, sin perder el sentido de comunicación verbal.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que en efecto
  - de que
  lexicon: HALOT
  rationale: Introduce el contenido de lo dicho; «que» refleja directamente la subordinación en español.
- source_word: עֵירֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  - desprovisto
  lexicon: HALOT
  rationale: «Desnudo» es la equivalencia normal y más transparente para la desnudez física del contexto de Génesis 3.
- source_word: הֲמִן הָעֵץ
  english_pob_choice: Have you eaten from the tree
  chosen_spanish: del árbol
  alternatives_spanish:
  - de ese árbol
  - de un árbol
  lexicon: HALOT
  rationale: Se conserva la relación con מן mediante «de». En español, «comer del árbol» resulta más natural que repetir un literal «desde el árbol».
- source_word: אֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: from which I commanded you
  chosen_spanish: de que te mandé
  alternatives_spanish:
  - del que te mandé
  - que te mandé
  lexicon: HALOT
  rationale: El relativo con צוה se expresa de forma fluida con «te mandé». El «de» mantiene la dependencia del objeto prohibido y refleja la conexión con מן del versículo.
- source_word: לְבִלְתִּי אֲכָל
  english_pob_choice: not to eat
  chosen_spanish: que no comieras
  alternatives_spanish:
  - para que no comieras
  - no comer
  lexicon: HALOT
  rationale: La construcción prohibitiva se vierte con una subordinada negativa natural en español. El imperfecto de subjuntivo «comieras» refleja bien la prohibición en discurso indirecto.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de ese árbol
  lexicon: HALOT
  rationale: El sufijo pronominal se mantiene con referencia al árbol. En español, «de él» es breve y comprensible; el antecedente queda claro por contexto.
- source_word: אָכָלְתָּ
  english_pob_choice: have you eaten
  chosen_spanish: has comido
  alternatives_spanish:
  - comiste
  - has tomado
  lexicon: HALOT
  rationale: El perfecto hebreo en esta pregunta puede representarse con presente perfecto en español, preservando el sentido de acción reciente con relevancia actual.
theological_decisions:
- issue: Identificación del sujeto que habla
  english_pob_reading: Rendered simply as 'he' rather than supplying 'the LORD God'.
  chosen_spanish_reading: «Y él dijo» sin añadir «Yahvé Dios»
  alternative_spanish_readings:
  - «Y Yahvé Dios dijo»
  - «Entonces Yahvé Dios dijo»
  rationale: El hebreo no repite explícitamente el sujeto nominal en esta cláusula; sólo aparece la forma verbal de tercera persona masculina singular. Para no introducir más de lo que dice el texto, se conserva el sujeto implícito, dejando que el contexto previo identifique al hablante.
  doctrine_reference: Primacía del texto hebreo en la traducción; evitar explicitar sujetos no expresos cuando el contexto ya los proporciona.
- issue: Valor de la prohibición en לְבִלְתִּי אֲכָל
  english_pob_reading: not to eat
  chosen_spanish_reading: «que no comieras»
  alternative_spanish_readings:
  - «no comer»
  - «para que no comieras»
  rationale: La frase expresa una prohibición vinculada al mandato previo. En español, la subordinada negativa con subjuntivo comunica con claridad el carácter prohibitivo sin debilitarlo ni convertirlo en mera finalidad.
  doctrine_reference: Correspondencia funcional de las prohibiciones bíblicas; mantener el peso normativo del mandato.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta el ajuste de la POB inglesa para el segundo segmento, que en la revisión quedó más natural como «from which I commanded you not to eat». En español se reflejó esa relación con una construcción relativa fluida («de que te mandé que no comieras») sin perder la referencia al árbol ni la fuerza de la prohibición.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal sólo cuando el hebreo lo explicita; en este versículo no se nombra al hablante, por lo que se mantiene «él».
  - Se prefiere «desnudo» para עֵירֹם por ser la equivalencia más clara y estable en español bíblico contemporáneo.
  - Se conserva el tono interrogativo directo con puntuación española («¿…?») y comillas angulares.
  - La forma verbal «has comido» reproduce bien el valor de perfecto en una pregunta con relevancia presente.
