revisions:
- from: El que se refugia en su sombra queda a salvo del calor, y habita en sus refugios.[a]
  to: El que se refugia en su sombra del calor, y habita en sus refugios.[a]
  rationale: Se reemplaza «queda a salvo del calor» por «se refugia en su sombra del calor» para reflejar más literalmente חסה y conservar la imagen de buscar refugio, en vez de enfatizar el resultado. También se ajusta la nota para representar con más precisión el paralelo griego («será resguardado... se alojará...»).
