review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: vino para la ofrenda de libación, cantidad de un cuarto de hin, relación con el holocausto o el sacrificio, y fuerza distributiva para cada cordero. Sin embargo, la elección principal «sobre el holocausto» en el texto español da una impresión espacial demasiado fuerte frente al uso ritual de עַל, mientras que el inglés auditado eligió «with the burnt offering» y relegó la literalidad a nota. Además, el marcador [c] está anclado correctamente, pero su nota contiene comillas y redacción poco pulidas.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Y de vino... la prepararás» suena algo forzado. Una formulación más natural es «Y prepararás una cuarta parte de un hin de vino para la ofrenda de libación». También conviene alinear la nota sobre עַל con la decisión principal en el texto, dejando «sobre» como alternativa literal en nota, no como lectura principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Libación» es aceptable para נֶסֶךְ en este contexto sacrificial. «Holocausto», «sacrificio» y «cordero» están bien. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, etc.
  issues:
  - severity: medium
    issue: La traducción principal «sobre el holocausto» para עַל הָעֹלָה es demasiado literal y menos fiel al sentido ritual probable.
    rationale: El expediente inglés documenta que, aunque עַל puede ser literalmente «sobre», aquí probablemente indica acompañamiento. En español, usar «sobre» en el texto principal sugiere ubicación física y puede desviar el sentido; «con el holocausto» comunica mejor la relación sacrificial, dejando la literalidad en nota.
  - severity: low
    issue: El orden «Y de vino para la ofrenda de libación, una cuarta parte de un hin, la prepararás» resulta poco natural en español.
    rationale: Aunque comprensible, suena calcado. Reordenar a «Y prepararás una cuarta parte de un hin de vino para la ofrenda de libación» preserva el sentido y mejora la legibilidad sin añadir interpretación.
  - severity: low
    issue: La nota [c] tiene una redacción tipográfica y estilísticamente torpe.
    rationale: Empieza con una comilla sobrante y «cordero uno» no es una formulación española ideal. Puede expresarse mejor como «Literalmente, “para el cordero uno”; ...».
  revised_spanish_text: Y prepararás una cuarta parte de un hin de vino para la ofrenda de libación, con el holocausto[a] o el sacrificio, para cada cordero[b].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «sobre el holocausto». La preposición hebrea עַל puede traducirse de forma más formal así, pero aquí probablemente indica acompañamiento dentro del rito sacrificial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para el cordero uno»; la traducción «para cada cordero» hace explícita la fuerza distributiva de la instrucción.
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la fidelidad semántica principal de עַל en contexto ritual y para hacer el español más natural. Se conserva la alternativa literal en nota, en línea con el expediente inglés auditado.
