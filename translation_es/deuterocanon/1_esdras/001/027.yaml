translation:
  language: es
  text: Pero entabló combate con él en la llanura de Meguidó[a]; y los comandantes descendieron adonde estaba el rey Josías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de 2 Crónicas 35:22 dice «se disfrazó para pelear contra él», en lugar del griego, que aquí dice que entabló combate contra él.
    reason: alternative_reading
lexical_decisions:
- source_word: συνεστήσατο πρὸς αὐτὸν πόλεμον
  english_pob_choice: engaged him in battle
  chosen_spanish: entabló combate con él
  alternatives_spanish:
  - se enfrentó en batalla con él
  - hizo guerra contra él
  - preparó guerra contra él
  lexicon: LSJ
  rationale: El griego expresa una acción bélica concertada o entablada contra alguien. En español, «entabló combate con él» conserva el sentido de iniciar/enfrentar la acción militar sin forzar una paráfrasis excesiva ni introducir la imagen más idiomática pero más interpretativa de «hizo guerra».
- source_word: ἐν τῷ πεδίῳ Μετααδδούς
  english_pob_choice: in the plain of Megiddo
  chosen_spanish: en la llanura de Meguidó
  alternatives_spanish:
  - en el llano de Meguidó
  - en la planicie de Meguidó
  - en el valle de Meguidó
  lexicon: LSJ
  rationale: πέδιον corresponde mejor a «llanura» que a «valle». La forma «Meguidó» conserva el nombre propio bíblico en una grafía española clara y reconocible, derivada del paralelo hebreo y del uso tradicional del topónimo.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the commanders
  chosen_spanish: los comandantes
  alternatives_spanish:
  - los jefes
  - los líderes
  - los oficiales
  lexicon: LSJ
  rationale: En este contexto de guerra, ἄρχοντες apunta a autoridades o mandos. «Comandantes» refleja mejor la función militar que «gobernantes» o «líderes» en español corriente.
- source_word: πρὸς βασιλέα Ἰωσίαν
  english_pob_choice: to King Josiah
  chosen_spanish: hacia el rey Josías
  alternatives_spanish:
  - contra el rey Josías
  - a donde estaba el rey Josías
  - hasta el rey Josías
  lexicon: BDAG
  rationale: Aquí πρὸς con acusativo señala movimiento en dirección a una persona. «Hacia el rey Josías» preserva esa orientación sin convertirla en hostilidad explícita, tal como la revisión inglesa más reciente corrigió el matiz de la preposición.
theological_decisions:
- issue: Relación entre el griego de 1 Esdras y el paralelo hebreo de 2 Crónicas 35:22
  english_pob_reading: Follow the Greek main text ('engaged him in battle') while using the Hebrew parallel to normalize the place-name as Megiddo.
  chosen_spanish_reading: Seguir el griego como texto principal y usar el paralelo hebreo solo para confirmar el topónimo Meguidó.
  alternative_spanish_readings:
  - entabló combate con él... en el valle de Meguidó
  - se disfrazó para combatir contra él... en Meguidó
  rationale: Para este libro deuterocanónico, el texto base es el griego de Swete. El paralelo hebreo ayuda a identificar el lugar, pero no debe reemplazar el valor verbal del griego, que aquí describe combate entablado y no el disfraz de 2 Crónicas.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; Translation philosophy #1'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al preferir un español natural para συνεστήσατο ... πόλεμον y al leer πρὸς βασιλέα Ἰωσίαν como dirección («hacia») y no como hostilidad explícita. También conserva el topónimo fijado por el paralelo hebreo sin permitir que éste sustituya la lectura griega principal.
  spanish_consistency_notes:
  - Se mantiene «Meguidó» como forma española del topónimo, coherente con el reconocimiento bíblico del lugar.
  - Se usa «rey Josías» y no «rey de Josías», siguiendo el patrón nominal bíblico usual en español.
  - La estructura con punto y coma refleja con claridad las dos cláusulas coordinadas del griego.
  - No se introduce «SEÑOR» ni terminología litúrgica ajena porque el versículo no contiene referencias divinas directas.
