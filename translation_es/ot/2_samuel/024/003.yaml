    text: 'O: «y que los ojos de mi señor el rey lo vean [a ellos]». El hebreo deja implícito el objeto; el sentido es que Joab desea que el rey viva para presenciar un aumento así.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la expresión numérica para reflejar mejor el plural implícito del hebreo («tantos como ahora son»), se movió el marcador de nota al lugar que realmente comenta la omisión del objeto, y se simplificó la interrogación final eliminando «pues», que no es necesario para representar לָמָּה.
