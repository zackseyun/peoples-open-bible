translation:
  language: es
  text: Canten alabanzas a Dios[a], canten alabanzas; canten alabanzas a nuestro Rey, canten alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hagan música a Dios ... hagan música a nuestro Rey'. El verbo hebreo puede denotar alabanza musical en sentido más amplio, no solo canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ / זַמֵּרוּ
  english_pob_choice: sing praises
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - canten
  - hagan música
  - canten salmos
  lexicon: HALOT
  rationale: El imperativo plural de זמר en este contexto litúrgico pide una expresión de alabanza vocal y musical. 'Canten alabanzas' conserva el valor devocional y la repetición poética mejor que un simple 'canten', y es más natural en español que 'hagan música' sin perder el matiz de alabanza.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios de Israel en una exhortación directa de alabanza; 'Dios' es la equivalencia natural y fiel en español.
- source_word: לְמַלְכֵּנוּ
  english_pob_choice: to our King
  chosen_spanish: a nuestro Rey
  alternatives_spanish:
  - para nuestro Rey
  - a nuestro rey
  lexicon: HALOT
  rationale: El לְ de la construcción se expresa bien con 'a' en una exhortación dirigida al destinatario de la alabanza. Se conserva 'Rey' con mayúscula porque el contexto lo presenta como título divino, no como mero monarca humano.
theological_decisions:
- issue: Título de realeza divina
  english_pob_reading: our King
  chosen_spanish_reading: nuestro Rey
  alternative_spanish_readings:
  - nuestro rey
  rationale: El contexto del salmo celebra el reinado universal de Dios, por lo que el título debe mantenerse con sentido teológico y mayúscula reverencial en español. No se introduce doctrina ajena; se refleja la lectura contextual inmediata.
  doctrine_reference: Salmo 47; realeza de Dios
translation_notes:
  revision_awareness: El texto base en inglés mantiene la repetición cuádruple de 'sing praises' para reflejar la repetición hebrea; la versión española conserva esa misma repetición con 'canten alabanzas'. No se registran revisiones posteriores que alteren la lectura.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'Rey' con mayúscula para el título divino, en coherencia con el contexto del salmo.
  - Se evita 'SEÑOR' como máscara del nombre divino porque aquí el texto hebreo usa אֱלֹהִים y no el Tetragrámaton.
  - La nota al pie conserva la alternativa musical documentada por la POB inglesa y la adapta de forma natural al español.
