translation:
  language: es
  text: Pero no le irá bien al impío, y no prolongará sus días[a] como sombra, porque no teme delante de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no alargará sus días»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la presencia de Dios»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטוֹב
  english_pob_choice: But it will not go well
  chosen_spanish: Pero no le irá bien
  alternatives_spanish:
  - Y no le irá bien
  - Mas no le irá bien
  - Pero no estará bien
  lexicon: WLC; HALOT
  rationale: En esta construcción, טוב con היה comunica bienestar o buen resultado, no solo la idea abstracta de 'bien'. En español, 'le irá bien' transmite mejor el sentido de resultado favorable o desfavorable. Se conserva el contraste del hebreo con 'Pero'.
- source_word: לָרָשָׁע
  english_pob_choice: for the wicked
  chosen_spanish: al impío
  alternatives_spanish:
  - para el impío
  - al malvado
  - para el malvado
  lexicon: WLC; HALOT
  rationale: רָשָׁע en literatura sapiencial designa al impío/culpable moral. 'Impío' es más cercano al registro bíblico y mantiene la categoría moral sin suavizarla.
- source_word: וְלֹא יַאֲרִיךְ יָמִים
  english_pob_choice: and he will not prolong his days
  chosen_spanish: y no prolongará sus días
  alternatives_spanish:
  - y no alargará sus días
  - y no vivirá mucho tiempo
  - y no extenderá sus días
  lexicon: WLC; HALOT
  rationale: El hebreo dice literalmente 'prolongar/alargar días'. 'Prolongará sus días' conserva la imagen temporal y la forma formal del original mejor que una paráfrasis como 'vivirá mucho tiempo'.
- source_word: כַּצֵּל
  english_pob_choice: like a shadow
  chosen_spanish: como sombra
  alternatives_spanish:
  - como una sombra
  - igual que una sombra
  lexicon: WLC; HALOT
  rationale: Se mantiene la imagen de fugacidad. En español, 'como sombra' es natural y sigue la comparación hebrea sin sobreexplicarla.
- source_word: אֵינֶנּוּ יָרֵא
  english_pob_choice: he does not fear
  chosen_spanish: no teme
  alternatives_spanish:
  - no reverencia
  - no muestra temor
  - no tiene temor
  lexicon: WLC; HALOT
  rationale: El verbo ירא puede abarcar temor reverente. 'No teme' conserva esa amplitud; 'reverencia' explicita demasiado el matiz y estrecha el campo semántico.
- source_word: מִלִּפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  - frente a Dios
  lexicon: WLC; HALOT
  rationale: La expresión hebrea literalmente apunta a estar en la presencia de Dios. 'Delante de Dios' es una forma natural en español bíblico y preserva el sentido relacional sin calco rígido.
theological_decisions:
- issue: Alcance de la afirmación sobre el destino del impío
  english_pob_reading: The verse states a general principle that the wicked do not ultimately fare well and do not truly prolong their days, without forcing an absolute mechanistic guarantee for every immediate case.
  chosen_spanish_reading: 'El versículo expresa un principio general sapiencial: al impío no le va bien y su vida no se prolonga de manera plena, sin convertirlo en una garantía mecánica para cada caso inmediato.'
  alternative_spanish_readings:
  - Todo impío muere pronto en todos los casos
  - La frase no afirma ningún orden moral real
  rationale: Eclesiastés sostiene tensiones observables sin resolverlas artificialmente. La redacción española conserva el tono proverbial y evita absolutizar o vaciar la afirmación.
  doctrine_reference: Preservar la tensión teológica de la sabiduría bíblica sin sobreinterpretar.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que prefirió 'prolong' por encima de 'lengthen', manteniendo la metáfora temporal. La versión española conserva esa opción mediante 'prolongará sus días'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para אֱלֹהִים, siguiendo la política del proyecto y el sentido directo del hebreo.
  - '''Impío'' se usó por coherencia con la categoría sapiencial de רָשָׁע y con el registro bíblico en español.'
  - '''Delante de Dios'' mantiene la idea de presencia divina sin calco excesivo.'
  - La imagen de la 'sombra' se conservó para no perder la fugacidad que el hebreo enfatiza.
