translation:
  language: es
  text: Ellos destruirán los muros de Tiro y derribarán sus torres, y yo quitaré[a] su polvo de sobre ella y la convertiré en roca desnuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rasparé». El hebreo también puede sugerir la idea de quitar la capa superficial. «Polvo» traduce עָפָר, que puede denotar polvo, tierra suelta o suelo; la imagen es que la ciudad será despojada hasta quedar reducida a la roca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁחֲתוּ
  english_pob_choice: they will destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - arruinarán
  - devastarán
  - echarán a perder
  lexicon: HALOT
  rationale: En el contexto de asedio y demolición, el verbo expresa acción destructiva contra las defensas de la ciudad. «Destruirán» es natural en español y conserva la fuerza directa del hebreo sin suavizarla.
- source_word: חֹמוֹת
  english_pob_choice: the walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  lexicon: HALOT
  rationale: El sustantivo plural se refiere a las fortificaciones de la ciudad. «Muros» es claro y fiel; «murallas» sería posible, pero «muros» mantiene mejor la imagen concreta del texto.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tir
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico para la ciudad fenicia.
- source_word: וְהָרְסוּ
  english_pob_choice: tear down
  chosen_spanish: derribarán
  alternatives_spanish:
  - demolerán
  - romperán
  lexicon: HALOT
  rationale: El verbo indica abatir o tumbar estructuras. «Derribarán» conserva la imagen física y diferencia este verbo del anterior «destruirán».
- source_word: מִגְדָּלֶיהָ
  english_pob_choice: her towers
  chosen_spanish: sus torres
  alternatives_spanish:
  - sus torres defensivas
  - sus fortalezas
  lexicon: HALOT
  rationale: מִגְדָּל normalmente significa «torre». En contexto de ciudad fortificada, «sus torres» mantiene el sentido concreto y el paralelo poético.
- source_word: וְסִחֵיתִי
  english_pob_choice: I will scrape
  chosen_spanish: barreré
  alternatives_spanish:
  - rasparé
  - limpiaré
  - arrastraré
  lexicon: HALOT
  rationale: El verbo expresa quitar la capa superficial del sitio. «Barreré» comunica bien en español la acción de remover lo que queda, manteniendo el gesto de despojo total sin volverlo técnico o áspero en exceso.
- source_word: עֲפָרָהּ
  english_pob_choice: her dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su tierra
  - su polvo y escombros
  lexicon: HALOT
  rationale: עפר puede significar polvo, tierra suelta o suelo. Aquí el matiz más cercano al texto auditado es «polvo», sin excluir la idea de polvo/tierra removida de la ciudad.
- source_word: מִמֶּנָּה
  english_pob_choice: away from her
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - de su lugar
  lexicon: HALOT
  rationale: La preposición indica remoción desde la ciudad personificada. «De ella» preserva esa personificación y sigue de cerca la construcción hebrea.
- source_word: וְנָתַתִּי אוֹתָהּ
  english_pob_choice: make her
  chosen_spanish: la convertiré
  alternatives_spanish:
  - la haré
  - la pondré
  lexicon: HALOT
  rationale: 'El hebreo usa נתן con valor resultativo: poner o hacer que algo sea de cierto modo. «La convertiré» comunica bien el cambio de estado final en español y evita una construcción demasiado literal.'
- source_word: לִצְחִיחַ סָלַע
  english_pob_choice: a bare rock
  chosen_spanish: roca desnuda
  alternatives_spanish:
  - peña desnuda
  - roca pelada
  - roca lisa
  lexicon: HALOT
  rationale: La expresión describe una superficie rocosa totalmente expuesta y despojada. «Roca desnuda» reproduce la imagen de desolación y deja ver la tensión entre la desnudación del sitio y la roca subyacente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y concuerda con el audit trail inglés: dos verbos distintos de demolición, el matiz de עָפָר como polvo/tierra suelta, y la culminación en una condición de «roca desnuda». Se eligió un español natural sin perder la secuencia retórica del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la personificación de Tiro con pronombres femeninos («ella», «sus»).
  - Se distingue entre destrucción general («destruirán») y demolición física («derribarán»).
  - La nota al pie preserva la alternativa léxica relevante para עָפָר sin multiplicar glosas innecesarias.
