translation:
  language: es
  text: Todos estos habían vivido con mujeres extranjeras[a], y las despidieron con los hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente según el paralelo hebreo, 'se habían casado con mujeres extranjeras' o 'habían tomado esposas extranjeras'.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες οὗτοι
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos estos hombres
  - Todos estos mismos
  lexicon: LSJ
  rationale: πάντες οὗτοι es una expresión demostrativa directa; en español, 'Todos estos' conserva la referencia sin añadir 'hombres', que no está explícito en el griego.
- source_word: συνῴκησαν
  english_pob_choice: had lived with
  chosen_spanish: habían vivido con
  alternatives_spanish:
  - habían habitado con
  - habían cohabitado con
  - se habían unido a
  lexicon: LSJ
  rationale: El verbo griego apunta literalmente a vivir/juntarse bajo el mismo techo; 'habían vivido con' mantiene esa amplitud sin imponer de entrada 'casado', aunque el contexto lo sugiera.
- source_word: γυναῖξιν ἀλλογενέσιν
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres de otro pueblo
  - esposas extranjeras
  lexicon: LSJ
  rationale: ἀλλογενής señala pertenencia a otro pueblo/linaje, por eso 'extranjeras' transmite bien la idea. Se conserva 'mujeres' porque el griego dice γυναῖξιν y no introduce explícitamente 'esposas'.
- source_word: ἀπέλυσαν
  english_pob_choice: sent away
  chosen_spanish: las despidieron
  alternatives_spanish:
  - las enviaron lejos
  - las apartaron
  - las dejaron ir
  lexicon: LSJ
  rationale: En este contexto de separación, 'despidieron' comunica la acción de dejar ir/expulsar con naturalidad en español y sin cargar de manera innecesaria con el tecnicismo de 'divorciaron'.
- source_word: αὐτὰς
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - a ellas
  - a esas mujeres
  lexicon: LSJ
  rationale: El pronombre femenino plural se expresa naturalmente como 'las' en español, referidas a las mujeres extranjeras del contexto.
- source_word: σὺν τέκνοις
  english_pob_choice: with the children
  chosen_spanish: con los niños
  alternatives_spanish:
  - con los hijos
  - junto con los niños
  lexicon: LSJ
  rationale: τέκνα significa 'niños/hijos'. 'Con los niños' evita añadir posesión no explícita en el griego y sigue la revisión auditada que prefirió la forma neutral 'the children'.
theological_decisions:
- issue: Si el texto debe explicitar matrimonio o conservar el lenguaje más amplio del griego
  english_pob_reading: Preserve the Greek wording with 'had lived with foreign women' in the main text
  chosen_spanish_reading: Conservar 'habían vivido con mujeres extranjeras' sin explicitar 'esposas' en el texto principal
  alternative_spanish_readings:
  - habían tomado esposas extranjeras
  - se habían casado con mujeres extranjeras
  rationale: La fuente primaria aquí es el griego, que usa un verbo de convivencia y no el término explícito de 'esposas'. Por eso el texto principal mantiene la amplitud del original, dejando que el contexto marital sea implícito.
  doctrine_reference: Primacía de la fuente original; equivalencia óptima
translation_notes:
  revision_awareness: La revisión auditada en inglés sustituyó 'their children' por 'the children' para evitar una posesión añadida. En español se reflejó esa neutralidad con 'los niños' en lugar de 'sus niños' o 'sus hijos'. También se evitó introducir 'esposas' en el cuerpo principal, porque el griego dice literalmente 'mujeres'.
  spanish_consistency_notes:
  - Se mantuvo el plural demostrativo 'Todos estos' para no añadir información de género inexistente en el griego.
  - '''Mujeres extranjeras'' preserva la diferencia semántica de ἀλλογενής sin forzar el término eclesiástico tradicional ''esposas''.'
  - '''Despidieron'' comunica ἀπέλυσαν de manera natural y respetuosa; no se tradujo como ''divorciaron'' porque esa precisión no está explícita en la forma griega.'
  - '''Los niños'' conserva la neutralidad del griego τέκνα y evita un posesivo añadido.'
