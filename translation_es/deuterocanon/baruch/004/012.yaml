translation:
  language: es
  text: Que nadie se regocije de mi desgracia[a], viuda y abandonada por muchos; he quedado desolada por los pecados de mis hijos, porque se desviaron de la ley de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se alegre por mí». El verbo griego puede expresar alegría ante el infortunio ajeno; por eso la traducción principal hace explícito ese matiz hostil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Nadie debe
  - No permita nadie
  lexicon: LSJ
  rationale: La forma griega tiene fuerza prohibitiva/exhortativa; «Que nadie» conserva el tono directo y suena natural en español.
- source_word: ἐπιχαιρέτω
  english_pob_choice: gloat over
  chosen_spanish: se alegre sobre
  alternatives_spanish:
  - se regocije sobre
  - se gloríe por
  lexicon: LSJ
  rationale: El verbo implica alegrarse del mal ajeno. En español, «se alegre sobre» mantiene el sentido básico y permite que la nota aclare la posible lectura de «regocijarse»; evita un giro demasiado interpretativo como «regodearse» si se prefiere un registro más sobrio.
- source_word: μοι
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - a mí
  - contra mí
  lexicon: LSJ
  rationale: Con ἐπιχαιρέω el dativo señala a la persona afectada; «sobre mí» reproduce la relación idiomática de la frase inglesa y la hostilidad implícita.
- source_word: τῇ χήρᾳ
  english_pob_choice: a widow
  chosen_spanish: viuda
  alternatives_spanish:
  - la viuda
  - mujer viuda
  lexicon: LSJ
  rationale: El griego presenta una apposición de condición. En español, «viuda» funciona con naturalidad en aposición predicativa sin añadir determinación innecesaria.
- source_word: καταλειφθείσῃ
  english_pob_choice: abandoned
  chosen_spanish: abandonada
  alternatives_spanish:
  - desamparada
  - dejada
  lexicon: LSJ
  rationale: El participio pasivo expresa haber sido dejada/forsaken. «Abandonada» es claro, moderno y conserva la carga afectiva.
- source_word: ὑπὸ πολλῶν
  english_pob_choice: by many
  chosen_spanish: por muchos
  alternatives_spanish:
  - por mucha gente
  - por numerosos
  lexicon: LSJ
  rationale: La frase es indefinida; «por muchos» mantiene la amplitud del griego sin especificar sujetos.
- source_word: ἠρημώθην
  english_pob_choice: I have been left desolate
  chosen_spanish: he quedado desolada
  alternatives_spanish:
  - fui dejada desolada
  - me he vuelto desolada
  lexicon: LSJ
  rationale: El pasivo expresa un estado resultante de ruina/abandono. «He quedado desolada» preserva el resultado y suena fluido en español, con el femenino concordando con la voz personificada.
- source_word: διὰ τὰς ἁμαρτίας
  english_pob_choice: because of the sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - a causa de los pecados
  - debido a los pecados
  lexicon: LSJ
  rationale: διά con acusativo es causal; «por» es conciso y fiel en español, y en la cláusula completa la causa queda reforzada por el contexto.
- source_word: τῶν τέκνων μου
  english_pob_choice: of my children
  chosen_spanish: de mis hijos
  alternatives_spanish:
  - de mis hijos e hijas
  - de mis descendientes
  lexicon: LSJ
  rationale: τέκνα abarca hijos en sentido amplio; «hijos» es una equivalencia natural en español y no restringe necesariamente a varones, aunque el campo semántico sea inclusivo.
- source_word: ἐξέκλιναν
  english_pob_choice: they turned aside
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se apartaron
  - se desviaron del camino
  lexicon: LSJ
  rationale: El verbo expresa apartarse de una norma o camino. «Se desviaron» conserva la metáfora sin sobreexplicarla.
- source_word: ἐκ νόμου θεοῦ
  english_pob_choice: from the law of God
  chosen_spanish: de la ley de Dios
  alternatives_spanish:
  - de la ley de Dios
  - del mandato de Dios
  lexicon: LSJ
  rationale: La preposición marca alejamiento/departure; en español, «de la ley de Dios» es la formulación más directa y solemne, coherente con el registro del pasaje.
theological_decisions:
- issue: La voz femenina personificada y el trasfondo de Sion/Jerusalén no se explicitan en el texto inmediato
  english_pob_reading: Retain the first-person feminine self-description without making the metaphor explicit in the main text.
  chosen_spanish_reading: Mantener la auto-descripción en primera persona femenina sin nombrar explícitamente a Jerusalén o Sion en el cuerpo del versículo.
  alternative_spanish_readings:
  - Hacer explícita en el texto la identificación como Jerusalén
  - Añadir Sion como sujeto explícito
  rationale: El griego habla en primera persona y no nombra a la ciudad en este versículo; la identificación contextual pertenece a la exégesis, no al cuerpo textual. Conservar la metáfora respeta la tensión literaria y evita ampliar el texto.
  doctrine_reference: Primacía del texto fuente; evitar resolución interpretativa innecesaria.
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado revisado del contexto en inglés y no introduce expansiones interpretativas. Se conserva la ambigüedad de la voz personificada y la nota léxica para el verbo compuesto ἐπιχαιρέω, en línea con la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se mantiene «ley de Dios» en un registro bíblico sobrio y claro.
  - La concordancia femenina («desolada», «abandonada») sigue la voz personificada del pasaje.
  - La nota al pie conserva la alternativa semántica relevante sin duplicar el matiz en el cuerpo principal.
