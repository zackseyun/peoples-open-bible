  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα ἄρτιος ᾖ ὁ τοῦ θεοῦ ἄνθρωπος, πρὸς πᾶν ἔργον ἀγαθὸν ἐξηρτισμένος.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/017.yaml
  text: so that the man of God may be complete, equipped for every good work.
translation:
  language: ko
  text: 이는 하나님의 사람[a]이 온전하여 모든 선한 일을 행하도록 온전히 갖추어지게 하려 함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「하나님의 사람」. 구약과 신약에서 하나님께 속하여 사역하는 자를 가리키는 정형 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτιος
  english_pob_choice: complete
  chosen_korean: 온전하여
  alternatives_korean:
  - 갖추어져
  - 완전하여
  lexicon: BDAG
  rationale: ἄρτιος는 「잘 갖추어진·온전한」. 「온전하다」가 한국 성서 전통의 익숙한 어휘이며, 다음의 ἐξηρτισμένος(온전히 갖추어진)와 운율적·의미적 짝을 이룬다.
- source_word: ὁ τοῦ θεοῦ ἄνθρωπος
  english_pob_choice: the man of God
  chosen_korean: 하나님의 사람
  alternatives_korean:
  - 하나님의 종
  - 하나님께 속한 사람
  lexicon: BDAG
  rationale: 「하나님의 사람」은 구약·신약 모두에서 사역자에 대한 정형 칭호. 한국 성서 전통에서 익숙하다. 본 표현이 사역자(디모데)를 가리키면서도 성경에 의해 형성되는 모든 신자에게 적용 가능하다는 신학적 폭을 한국어 「사람」이 잘 담는다.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν ἐξηρτισμένος
  english_pob_choice: equipped for every good work
  chosen_korean: 모든 선한 일을 행하도록 온전히 갖추어지게
  alternatives_korean:
  - 모든 선한 일에 충분히 준비되게
  - 모든 선한 일을 위해 갖추어지게
  lexicon: BDAG
  rationale: ἐξαρτίζω(완료 분사)는 「완전히 갖추어진」. 접두사 ἐξ-가 강조하는 「온전히」를 살려 「온전히 갖추어지다」로 옮긴다. 2:21의 「모든 선한 일을 위하여 준비된」(ἡτοιμασμένον)과 비슷한 표현으로, 본문 흐름의 일관성을 살린다.
theological_decisions:
- issue: 3:16과 짝지어 — 성경에 의한 「하나님의 사람」의 온전함 보존
  chosen_reading: 하나님의 사람이 온전하여 모든 선한 일을 행하도록 온전히 갖추어지게 하려 함입니다
  alternative_readings:
  - 하나님의 종이 온전하여 모든 선한 일에 준비되도록 하려 함입니다
  rationale: 본 절은 3:16의 「모든 성경은 하나님의 영감으로 된 것」 선언의 목적을 제시한다. ἄρτιος(온전한)와 ἐξηρτισμένος(온전히 갖추어진)의 어근 동일성(ἄρτιο-/ἀρτίζω)을 한국어로 「온전」 반복으로 살려, 성경에 의한 사람의 「온전함」이 「모든 선한 일을 행하기 위한 온전한 갖추어짐」으로 이어지는 구조를 분명히 드러낸다. 「하나님의 사람」은 사역자 중심의 좁은 해석을 넘어, 성경에 의해 형성되는 모든 신자에게 적용 가능한 신학적 폭을 보존하기 위해 「사람」으로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force and lexical resonance'
