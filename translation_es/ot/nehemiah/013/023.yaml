    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula verbal para expresar con claridad el sentido idiomático matrimonial de הֹשִׁיבוּ נָשִׁים, en línea con la auditoría inglesa y con español natural. Se corrige además la ortografía de 'amonitas' y se preserva la alternativa léxica para 'judíos/judeanos' en una nota, como en la POB inglesa.
