translation:
  language: es
  text: 'Entonces dijo a los mensajeros de Ben-adad: «Digan a mi señor el rey: “Todo lo que enviaste a tu siervo la primera vez, lo haré; pero esto[a] no puedo hacerlo”». Y los mensajeros fueron y le llevaron la respuesta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta cosa»; el hebreo דָּבָר puede significar «cosa», «asunto» o «palabra/mensaje» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאֲכֵי
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En este contexto político y diplomático, el término designa representantes humanos del rey, no seres celestiales. «Mensajeros» mantiene la referencia clara y la neutralidad del hebreo; «enviados» y «embajadores» son posibles, pero menos precisos o más especializados según el caso.
- source_word: בֶן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: Convención onomástica española basada en la vocalización hebrea transmitida en español bíblico
  rationale: Se conserva el nombre propio en transliteración. La forma «Ben-adad» resulta natural en español bíblico y refleja la adaptación ortográfica habitual del nombre.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Decid
  - Díganle
  lexicon: HALOT
  rationale: La forma imperativa plural introduce discurso directo. En español, «Digan» reproduce la fuerza del mandato y se ajusta al registro narrativo; «Decid» sería más arcaizante.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  english_pob_choice: to my lord the king
  chosen_spanish: a mi señor el rey
  alternatives_spanish:
  - a mi señor, el rey
  - a mi amo el rey
  lexicon: HALOT
  rationale: «Señor» conserva el honorífico cortesano sin implicar divinidad, como en el inglés POB. «Mi amo» sería demasiado fuerte y poco idiomático en este registro diplomático.
- source_word: כֹּל אֲשֶׁר שָׁלַחְתָּ
  english_pob_choice: All that you sent
  chosen_spanish: Todo lo que enviaste
  alternatives_spanish:
  - Todo cuanto enviaste
  - Todo lo que mandaste
  lexicon: HALOT
  rationale: El verbo hebreo dice literalmente «enviaste»; se conserva ese dato, como hace el inglés POB, en vez de interpretar de antemano «mandaste». La forma española mantiene el matiz de un mensaje previo ya transmitido.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El hebreo puede designar esclavo, y el proyecto POB privilegia la fuerza léxica cuando el contexto lo permite. Aquí la auto-designación es una fórmula de sumisión; «esclavo» preserva el peso literal del término, mientras que «siervo» suavizaría el valor semántico.
- source_word: בָרִאשֹׁנָה
  english_pob_choice: the first time
  chosen_spanish: la primera vez
  alternatives_spanish:
  - al principio
  - antes
  lexicon: HALOT
  rationale: La frase remite al pedido anterior de Ben-hadad. «La primera vez» es la equivalencia idiomática más clara en español y conserva la referencia temporal puntual.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo cumpliré
  - haré eso
  lexicon: HALOT
  rationale: El verbo עשׂה se traduce con su sentido directo de «hacer». En español, «lo haré» fluye naturalmente y conserva la promesa de cumplimiento sin añadir interpretación.
- source_word: וְהַדָּבָר הַזֶּה
  english_pob_choice: but this thing
  chosen_spanish: pero esto
  alternatives_spanish:
  - pero esta cosa
  - pero este asunto
  lexicon: HALOT
  rationale: דָּבָר puede ser «cosa», «asunto» o «palabra/mensaje». Aquí la referencia es al nuevo requerimiento concreto; «esto» evita decidir prematuramente entre «cosa» y «asunto» y funciona bien en español narrativo. El matiz queda aclarado en la nota.
- source_word: לֹא אוּכַל לַעֲשׂוֹת
  english_pob_choice: I cannot do
  chosen_spanish: no puedo hacerlo
  alternatives_spanish:
  - no puedo cumplirlo
  - no soy capaz de hacerlo
  lexicon: HALOT
  rationale: יָכֹל + infinitivo expresa incapacidad. «No puedo hacerlo» es una reproducción natural y fiel del valor modal sin exagerar el matiz de imposibilidad física.
- source_word: וַיְשִׁבֻהוּ דָּבָר
  english_pob_choice: brought back word to him
  chosen_spanish: le llevaron la respuesta
  alternatives_spanish:
  - le llevaron palabra
  - le devolvieron un mensaje
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: «devolver palabra/mensaje». «Le llevaron la respuesta» comunica el sentido con naturalidad en español y mantiene la dirección del retorno del mensaje sin una formulación extraña.'
theological_decisions:
- issue: Valor del título cortesano «mi señor el rey» sin connotación divina
  english_pob_reading: to my lord the king
  chosen_spanish_reading: a mi señor el rey
  alternative_spanish_readings:
  - a mi señor, el rey
  - a mi amo el rey
  rationale: El hebreo usa un título de respeto cortesano. En español conviene mantener «señor» como honorífico humano y no sustituirlo por un término más duro o por una forma litúrgica. No hay aquí referencia al nombre divino.
  doctrine_reference: Cortesía real en narrativa histórica; no implica lenguaje teológico.
- issue: Fuerza semántica de עבד como esclavo/siervo
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: La escena es diplomática, pero el hebreo conserva la dureza potencial de עבד. Mantener «esclavo» evita atenuar la carga léxica que el texto permite, aun cuando la fórmula funcione como autohumillación cortesana.
  doctrine_reference: Lexicografía bíblica de עבד; distinción entre registro cortés y sentido de pertenencia/subordinación.
- issue: Sentido de דבר en la cláusula final
  english_pob_reading: this thing / word/message
  chosen_spanish_reading: esto
  alternative_spanish_readings:
  - esta cosa
  - este asunto
  - esta palabra
  rationale: El hebreo admite «cosa», «asunto» o «mensaje/palabra». El inglés POB preserva la tensión con una nota. En español, «esto» evita cerrar prematuramente el sentido en la línea principal y permite dejar la alternativa en nota.
  doctrine_reference: Semántica contextual de דבר en hebreo bíblico; no hay implicación doctrinal.
translation_notes:
  revision_awareness: Se incorporó la revisión final del inglés POB en la cláusula del mensaje devuelto, usando una formulación española natural («le llevaron la respuesta») que refleja el valor idiomático de וַיְשִׁבֻהוּ דָּבָר y el orden relacional del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «mensajeros» para מַלְאֲכִים, conforme al contexto diplomático.
  - Se conservó el nombre propio como «Ben-adad», forma española corriente para el rey arameo.
  - Se eligió «tu esclavo» para עבד por la política léxica del proyecto cuando el contexto permite la fuerza semántica.
  - La nota a distingue el rango semántico de דבר sin sobrecargar la línea principal.
  - La puntuación de diálogo sigue el uso español con comillas angulares y oración interna bien delimitada.
