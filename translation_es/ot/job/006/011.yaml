translation:
  language: es
  text: ¿Qué fuerza tengo, para que yo siga esperando? ¿Y cuál es mi fin, para que yo prolongue mi vida[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que yo tenga paciencia». El hebreo literalmente dice: «que yo alargue mi alma»; es un modismo que puede indicar prolongar la vida o continuar con perseverancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué...?, ¿y cuál...?...
  alternatives_spanish:
  - ¿Cuánta...?
  - ¿Qué cosa...?
  lexicon: HALOT
  rationale: La partícula interrogativa introduce dos preguntas retóricas. En español, «qué» y «cuál» mantienen el paralelismo sin sonar forzado.
- source_word: כֹּחִי
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT
  rationale: כֹּחַ expresa capacidad o vigor. «Fuerza» comunica bien el sentido de capacidad vital y de resistencia en este lamento.
- source_word: כִּי אֲיַחֵל
  english_pob_choice: that I should keep hoping
  chosen_spanish: para que yo siga esperando
  alternatives_spanish:
  - para que yo espere
  - para que yo siga confiando
  lexicon: HALOT
  rationale: En este contexto el verbo no es un simple acto puntual de esperar, sino una continuidad de expectativa. «Siga esperando» conserva ese valor progresivo sin sobreinterpretar.
- source_word: וּמַה
  english_pob_choice: And what
  chosen_spanish: ¿Y cuál...?...
  alternatives_spanish:
  - ¿Y qué...?...
  lexicon: HALOT
  rationale: La conjunción enlaza la segunda pregunta con la primera. «Y» conserva el paralelismo retórico del hebreo.
- source_word: קִצִּי
  english_pob_choice: my end
  chosen_spanish: mi fin
  alternatives_spanish:
  - mi término
  - mi final
  lexicon: HALOT
  rationale: קֵץ puede significar fin o límite. «Mi fin» es breve, natural y mantiene la fuerza existencial del texto.
- source_word: כִּי אַאֲרִיךְ נַפְשִׁי
  english_pob_choice: that I should prolong my life
  chosen_spanish: para que yo prolongue mi vida
  alternatives_spanish:
  - para que yo prolongue mi alma
  - para que yo siga viviendo
  - para que yo me mantenga con vida
  lexicon: HALOT
  rationale: Se preserva el sentido idiomático de האריך נפש sin traducir mecánicamente «alma». En español, «prolongue mi vida» expresa el valor de continuar viviendo que el inglés POB ya anotó como sentido idiomático.
theological_decisions:
- issue: El hebreo literal «prolongar mi alma» frente al sentido idiomático de vida/endurecimiento
  english_pob_reading: The Hebrew literally says, 'that I should lengthen my soul,' an idiom that can denote prolonging one's life or continuing in endurance.
  chosen_spanish_reading: «para que yo prolongue mi vida»
  alternative_spanish_readings:
  - «para que yo prolongue mi alma»
  - «para que yo siga con paciencia»
  rationale: Se conserva la tensión documental entre la literalidad hebrea y el sentido idiomático, pero el texto principal adopta una formulación natural y fiel al uso contextual. La nota en inglés legitima leer el idiomaton como prolongación de vida o perseverancia.
  doctrine_reference: Job 6:11; uso idiomático hebreo de נֶפֶשׁ
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustanciales; esta propuesta mantiene el sentido auditado del inglés POB y conserva la alternativa idiomática documentada en una nota de pie.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «fuerza» traduce la capacidad vital de כֹּחַ sin introducir una lectura más abstracta de «poder».
  - «prolongue mi vida» refleja el valor idiomático de נֶפֶשׁ sin borrar la posibilidad literal documentada en la nota.
