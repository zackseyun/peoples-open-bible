translation:
  language: es
  text: La belleza de una mujer ilumina el rostro[a] y supera todo deleite de la vista.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una lectura muy distinta: «En toda obra, confía en tu alma, porque también esto es guardar los mandamientos».'
    reason: alternative_reading
lexical_decisions:
- source_word: תאר
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - forma
  - apariencia
  - figura
  lexicon: HALOT
  rationale: En este contexto poético, el sustantivo apunta al atractivo o hermosura exterior. 'Belleza' es la forma natural en español y conserva el valor evaluativo de la línea, sin reducirlo a mera 'forma' corporal.
- source_word: יחלץ פנים
  english_pob_choice: brightens the face
  chosen_spanish: alumbra el rostro
  alternatives_spanish:
  - refresca el rostro
  - cambia el rostro
  - anima el semblante
  lexicon: HALOT
  rationale: El hebreo expresa un efecto visible sobre el rostro/semblante; el inglés optó por una imagen dinámica. 'Alumbra el rostro' comunica en español ese efecto de vivificación visible sin endurecer el modismo hebreo.
- source_word: מחמד עין
  english_pob_choice: delight of the eye
  chosen_spanish: deleite de la vista
  alternatives_spanish:
  - deseo de los ojos
  - cosa agradable a la vista
  - lo que el ojo desea
  lexicon: HALOT
  rationale: La expresión combina deseo y percepción visual. 'Deleite de la vista' conserva el matiz estético y la referencia ocular en un español natural, cercano al valor del inglés POB pero sin traducir mecánicamente.
- source_word: יגבר
  english_pob_choice: surpasses
  chosen_spanish: supera
  alternatives_spanish:
  - prevalece sobre
  - es más fuerte que
  - excela
  lexicon: HALOT
  rationale: En comparación poética, el verbo indica superioridad. 'Supera' es el equivalente español más claro y fiel para expresar esa preeminencia.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The Hebrew text is primary; the Greek preserves a substantially different reading: ''In every work trust your soul, for this also is the keeping of commandments.'''
  chosen_spanish_reading: Se traduce el hebreo como texto principal y se registra en nota la lectura griega diferente.
  alternative_spanish_readings:
  - En toda obra, confía en tu alma, pues también esto es guardar los mandamientos.
  rationale: La política del proyecto da prioridad al hebreo donde se conserva, y aquí el griego no es una mera variación verbal sino una tradición sustancialmente distinta. Por fidelidad al testimonio disponible, la lectura griega se mantiene como alternativa documentada en nota, sin desplazar el texto hebreo principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está conservado; preservar honestamente la incertidumbre de las fuentes.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambiar nada: se mantiene la prioridad del hebreo conservado, con la divergencia griega documentada como nota de lectura alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'belleza' para תאר, coherente con el valor semántico de hermosura/comeliness del hebreo.
  - '''Rostro'' conserva la imagen del hebreo פנים y evita una paráfrasis más libre como ''semblante'' en el texto principal.'
  - La nota usa 'guarda de los mandamientos' para reflejar el griego τήρησις ἐντολῶν con un registro bíblico claro, sin introducir terminología doctrinal adicional.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes, ya que este versículo principal sigue el hebreo sapiencial y la divergencia griega se restringe a la nota.
