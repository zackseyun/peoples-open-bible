translation:
  language: es
  text: Gritaremos de alegría por tu salvación[a], y en el nombre de nuestro Dios alzaremos nuestras banderas[b]. Que Yahvé[c] cumpla todas tus peticiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por tu victoria» o «por tu liberación». El término hebreo puede abarcar salvación en sentido amplio, incluyendo rescate o triunfo militar.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «izaremos nuestra bandera» o «levantaremos nuestra bandera». El verbo hebreo probablemente evoca el acto de alzar o desplegar un estandarte en celebración.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «Yahvé cumplirá todas tus peticiones». La forma hebrea puede leerse como deseo/oración o como afirmación futura, aunque el contexto favorece la lectura de súplica.'
    reason: alternative_reading
lexical_decisions:
- source_word: נְרַנְּנָה
  english_pob_choice: We will shout for joy
  chosen_spanish: Gritaremos de alegría
  alternatives_spanish:
  - Cantaremos de alegría
  - Exclamaremos de alegría
  lexicon: HALOT
  rationale: La forma cohortativa/imperfecta expresa júbilo proclamado en voz alta. En español, «gritar de alegría» comunica bien la intensidad vocal y celebrativa; «cantar» sería demasiado específico para un verbo que no exige canto.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: in your salvation
  chosen_spanish: por tu salvación
  alternatives_spanish:
  - en tu salvación
  - por tu victoria
  - por tu liberación
  lexicon: HALOT
  rationale: שׁוּעָה puede abarcar salvación, liberación o victoria. Aquí se conserva «salvación» para no estrechar el alcance teológico; la preposición «por» suena natural en español para expresar el motivo del júbilo y evita una literalidad rígida.
- source_word: וּבְשֵׁם אֱלֹהֵינוּ
  english_pob_choice: and in the name of our God
  chosen_spanish: en el nombre de nuestro Dios
  alternatives_spanish:
  - por el nombre de nuestro Dios
  - bajo el nombre de nuestro Dios
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con «nombre», que en este contexto poético se expresa con naturalidad como «en el nombre de». Mantiene la idea de actuar bajo la identidad y autoridad de Dios.
- source_word: נִדְגֹּל
  english_pob_choice: we will raise our banners
  chosen_spanish: alzaremos nuestras banderas
  alternatives_spanish:
  - izaremos nuestras banderas
  - levantaremos nuestra bandera
  - nos alzaremos
  lexicon: HALOT
  rationale: El verbo probablemente evoca levantar o desplegar un estandarte. «Alzaremos nuestras banderas» conserva la imagen concreta y funciona bien en español poético; se mantiene el plural porque el hebreo y el sentido corporativo así lo favorecen.
- source_word: יְמַלֵּא
  english_pob_choice: May Yahweh fulfill
  chosen_spanish: Yahvé cumplirá
  alternatives_spanish:
  - Que Yahvé cumpla
  - Yahvé cumplirá / que Yahvé cumpla
  lexicon: HALOT
  rationale: La forma puede leerse como deseo/oración o como futuro. Se opta por un futuro directo, coherente con una lectura de súplica y con el estilo bíblico en español, sin perder la fuerza de bendición del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión editorial de traducir el Tetragrámaton como «Yahvé» para preservar el nombre propio divino y evitar la sustitución litúrgica por un título.
- source_word: כָּל מִשְׁאֲלוֹתֶיךָ
  english_pob_choice: all your requests
  chosen_spanish: todas tus peticiones
  alternatives_spanish:
  - todos tus pedidos
  - todos tus deseos
  - todas tus súplicas
  lexicon: HALOT
  rationale: מִשְׁאֲלוֹת son cosas pedidas; «peticiones» reproduce con precisión el valor de pedir y suena natural en un contexto de oración. «Deseos» sería demasiado amplio.
theological_decisions:
- issue: Sentido de יְשׁוּעָה en un salmo real y militar
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - victoria
  - liberación
  rationale: Se conserva «salvación» para mantener la amplitud semántica y el peso teológico del término, sin reducirlo únicamente al triunfo bélico inmediato.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological range without narrowing context.'
- issue: Valor discursivo de יְמַלֵּא
  english_pob_reading: jussive/prayer wish ('May the LORD fulfill')
  chosen_spanish_reading: futuro proclamado con tono de bendición
  alternative_spanish_readings:
  - Que Yahvé cumpla
  - Yahvé cumplirá
  rationale: El hebreo admite lectura de deseo/oración o de declaración. En español se deja como futuro para que suene fluido y solemne, a la vez que conserva el carácter de promesa/bendición del verso.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve discourse function and liturgical tone.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y la decisión auditada en inglés. No hubo revisiones aplicadas en el último pase; la concordancia del control cruzado fue alta y estable, por lo que se mantuvieron las decisiones principales: salvación amplia, imagen de estandartes, y el Tetragrámaton como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «salvación» en lugar de «victoria» para no estrechar el hebreo.
  - La imagen de banderas/estandartes se expresa de forma natural en español sin perder concreción.
  - Se usa plural en «nuestras banderas» porque el hebreo es corporativo y poético.
  - La cláusula final se presenta como futuro solemne en el cuerpo del texto y se explica la lectura alternativa en nota.
