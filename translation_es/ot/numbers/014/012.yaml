translation:
  language: es
  text: Yo los heriré con la peste y los desheredaré[a], y haré de ti una nación más grande y más poderosa que ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los despojaré de su herencia» o «los despojaré de su posesión». El verbo hebreo puede expresar quitar la posesión o la herencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכֶּנּוּ
  english_pob_choice: I will strike them
  chosen_spanish: los heriré
  alternatives_spanish:
  - los golpearé
  - los heriré con un golpe
  lexicon: HALOT / נכה
  rationale: El hiphil de נכה expresa herir, golpear o azotar. En español, «heriré» conserva la fuerza de juicio divino sin sonar arcaico como «smitiré» y sin suavizar demasiado el acto.
- source_word: בַדֶּבֶר
  english_pob_choice: with the plague
  chosen_spanish: con la peste
  alternatives_spanish:
  - con la plaga
  - con la pestilencia
  - con la enfermedad
  lexicon: HALOT / דֶּבֶר
  rationale: En contextos de juicio, דֶּבֶר denota peste/pestilencia. «Peste» es natural en español bíblico contemporáneo y conserva el sentido de calamidad epidémica enviada por Dios.
- source_word: וְאוֹרִשֶׁנּוּ
  english_pob_choice: and dispossess them
  chosen_spanish: los desposeeré
  alternatives_spanish:
  - los desheredaré
  - los despojaré de su herencia
  - los quitaré de la posesión
  lexicon: HALOT / ירשׁ
  rationale: ירשׁ en hiphil puede expresar quitar la posesión o la herencia. «Desposeeré» mantiene esa pérdida de posesión/inherencia sin obligar el matiz jurídico más específico de «desheredaré», que se preserva como alternativa.
- source_word: וְאֶעֱשֶׂה אֹתְךָ
  english_pob_choice: and I will make you
  chosen_spanish: y te convertiré
  alternatives_spanish:
  - y te haré
  - y haré de ti
  lexicon: HALOT / עשה
  rationale: La construcción expresa hacer a alguien en algo. «Te convertiré» comunica bien el cambio de estatus hacia una nueva entidad nacional y suena natural en español.
- source_word: לְגוֹי
  english_pob_choice: into a nation
  chosen_spanish: en una nación
  alternatives_spanish:
  - en un pueblo
  - en un país
  lexicon: HALOT / גּוֹי
  rationale: גוֹי se refiere primariamente a una nación. «Nación» es la equivalencia más precisa y clara en español.
- source_word: גָּדוֹל
  english_pob_choice: greater
  chosen_spanish: más grande
  alternatives_spanish:
  - grande
  - mayor
  lexicon: HALOT / גָּדוֹל
  rationale: Aquí el comparativo se integra naturalmente con el conjunto de la frase. «Más grande» reproduce la comparación de manera fluida en español; «mayor» sería posible, pero menos concreto para una nación.
- source_word: וְעָצוּם
  english_pob_choice: mightier
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más poderoso
  - más vigoroso
  - más numeroso
  lexicon: HALOT / עָצוּם
  rationale: עָצוּם puede referirse a fuerza, poder o grandeza numérica. «Más fuerte» mantiene la idea de poder/fortaleza y se coordina bien con «más grande».
- source_word: מִמֶּנּוּ
  english_pob_choice: than they
  chosen_spanish: que ellos
  alternatives_spanish:
  - que él
  - que ese pueblo
  lexicon: HALOT / מן + sufijo
  rationale: El hebreo usa sufijo singular colectivo, pero en español la comparación natural exige plural por el referente colectivo explícito («ellos»). Se evita la forma singular española forzada, sin perder el sentido corporativo.
theological_decisions:
- issue: Referencia colectiva de los sufijos pronominales
  english_pob_reading: The Hebrew uses singular pronominal suffixes for the people as a corporate entity; the English audit trail notes a revision away from singular English pronouns for readability/accuracy.
  chosen_spanish_reading: Se traduce de forma colectiva con pronombres plurales naturales («los», «ellos») porque el español no gana claridad con un singular corporativo forzado en esta cláusula.
  alternative_spanish_readings:
  - los heriré ... y los desposeeré ... y te convertiré en una nación más grande y más fuerte que él
  - los heriré ... y los desposeeré ... y te convertiré en una nación más grande y más fuerte que ellos
  rationale: El hebreo conserva la referencia corporativa en singular gramatical, pero el español estándar suele preferir la concordancia plural cuando el referente es un pueblo. Aquí la prioridad es la legibilidad natural sin alterar el sentido colectivo del juicio.
  doctrine_reference: Translation philosophy §§5–6 (consistencia y español legible)
- issue: Fuerza de ירשׁ en contexto de juicio e herencia
  english_pob_reading: The English POB preserves the ambiguity between dispossess and disinherit, with a footnote.
  chosen_spanish_reading: «Desposeeré» en el texto principal, con «desheredaré» preservado como alternativa en nota.
  alternative_spanish_readings:
  - desheredaré
  - los apartaré de su herencia
  rationale: En español, «desposeer» retiene tanto la pérdida de posesión como el trasfondo de herencia. «Desheredar» enfatiza el aspecto hereditario, pero puede sonar más jurídico de lo que exige la cláusula principal.
  doctrine_reference: Translation philosophy §3 (preservar tensiones léxicas genuinas)
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión importante en los pronombres del objeto y del comparativo: el texto pasó de un singular corporativo en inglés a un plural más natural («them/they»). La versión española adopta desde el inicio una concordancia colectiva plural natural, manteniendo el sentido del hebreo y la claridad idiomática. También conserva la tensión léxica de ירשׁ mediante una nota alternativa.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo, así que no hay decisión terminológica sobre el nombre divino aquí.
  - «Peste» se usa de forma consistente para דֶּבֶר en un contexto de juicio.
  - «Desposeeré» mantiene el registro bíblico moderno y evita un calco excesivamente jurídico.
  - Se prefieren comparativos naturales en español («más grande», «más fuerte») en lugar de una construcción rígida que reproduzca mecánicamente el hebreo.
