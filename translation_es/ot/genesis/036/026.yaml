lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos fueron
  alternatives_spanish:
  - Y estos son
  - Estos son
  lexicon: HALOT
  rationale: En una lista genealógica, el hebreo nominal se vierte naturalmente en pasado narrativo en español para reflejar el recuento retrospectivo del texto. 'Estos fueron' conserva la función introductoria sin sonar forzado.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: Aunque 'sons of' podría rendirse literalmente como 'hijos de', en español genealógico 'hijos de' es la forma más natural y sigue siendo lo suficientemente cercana al hebreo. Se evita 'descendientes' porque amplía más de lo que el contexto inmediato exige.
- source_word: דִישָׁן
  english_pob_choice: Dishan
  chosen_spanish: Disán
  alternatives_spanish:
  - Dishán
  lexicon: HALOT
  rationale: Nombre propio transliterado según una forma castellana transparente. Se conserva la base consonántica del hebreo y se adapta la acentuación al español para lectura pública.
- source_word: חֶמְדָּן
  english_pob_choice: Hemdan
  chosen_spanish: Hemdán
  alternatives_spanish:
  - Hemdan
  - Jemdán
  lexicon: HALOT
  rationale: Nombre propio transliterado. La tilde ayuda a marcar el acento prosódico en español sin alterar la forma base del nombre.
- source_word: וְ/אֶשְׁבָּן
  english_pob_choice: Eshban
  chosen_spanish: Esbán
  alternatives_spanish:
  - Eshbán
  - Esban
  lexicon: HALOT
  rationale: El hebreo presenta el grupo consonántico inicial /ʔešb-/. En español, 'Esbán' comunica mejor la forma del nombre y evita una secuencia gráfica poco natural; se mantiene la proximidad fonética al consonantismo del original.
- source_word: וְ/יִתְרָן
  english_pob_choice: Ithran
  chosen_spanish: Itrán
  alternatives_spanish:
  - Itrán
  - Itrán
  lexicon: HALOT
  rationale: Se translitera el nombre de modo directo y fluido para el español. La forma breve 'Itrán' conserva la estructura del hebreo sin introducir una 'h' etimológica no presente en el texto hebreo.
- source_word: וּ/כְרָן
  english_pob_choice: and Keran
  chosen_spanish: y Querán
  alternatives_spanish:
  - y Kerán
  - y Cherán
  lexicon: HALOT
  rationale: Se elige 'Querán' para reflejar el valor consonántico de kaf en español con una grafía legible y transparente. Esta opción mantiene la advertencia de la POB inglesa sobre la variación transliterativa final, sin imponer una forma tradicional ajena al hebreo.
