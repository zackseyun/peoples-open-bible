translation:
  language: es
  text: Entonces el rey tendió a Ester el cetro de oro[a], y Ester se levantó y se puso de pie ante el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extendió a Ester el cetro de oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֶׁט
  english_pob_choice: held out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  - sostuvo extendido
  lexicon: HALOT
  rationale: El verbo expresa extender o alargar hacia alguien. En español, «extendió» comunica con naturalidad el gesto cortesano del rey hacia Ester sin perder la fuerza direccional del hebreo.
- source_word: שַׁרְבִיט הַזָּהָב
  english_pob_choice: the golden scepter
  chosen_spanish: el cetro de oro
  alternatives_spanish:
  - el cetro dorado
  - el cetro de oro fino
  - el cetro áureo
  lexicon: HALOT
  rationale: La expresión nombra el objeto real de oro. «El cetro de oro» conserva la referencia concreta y la dignidad regia; es más natural en español que un adjetivo poético como «dorado».
- source_word: וַתָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se incorporó
  - se alzó
  lexicon: HALOT
  rationale: El verbo indica que Ester se pone en pie. «Se levantó» es la equivalencia más directa y idiomática; además mantiene la distinción respecto del verbo siguiente.
- source_word: וַתַּעֲמֹד לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: stood before the king
  chosen_spanish: se quedó de pie delante del rey
  alternatives_spanish:
  - estuvo delante del rey
  - permaneció de pie ante el rey
  - se puso de pie ante el rey
  lexicon: HALOT
  rationale: El hebreo usa un verbo de estar de pie en presencia de alguien. «Se quedó de pie delante del rey» conserva el gesto físico y la formalidad del contexto, sin confundirlo con el acto previo de levantarse.
- source_word: לְאֶסְתֵּר
  english_pob_choice: to Esther
  chosen_spanish: a Ester
  alternatives_spanish:
  - hacia Ester
  - para Ester
  lexicon: HALOT
  rationale: La preposición marca el destinatario del gesto del rey. «A Ester» es la forma natural y exacta en español.
translation_notes:
  revision_awareness: 'Se siguió de cerca el hebreo de WLC y el auditorial inglés: el movimiento narrativo inicial, el gesto real del cetro y la secuencia de levantarse y permanecer de pie se conservaron sin añadidos interpretativos.'
  spanish_consistency_notes:
  - Se mantuvo «Ester» como nombre propio estándar.
  - Se usó «cetro de oro» para reflejar el objeto real sin introducir variación doctrinal.
  - La secuencia verbal distingue claramente entre levantarse y quedarse de pie, como en el hebreo y en el inglés auditado.
