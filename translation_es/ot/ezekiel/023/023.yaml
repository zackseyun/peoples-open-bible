    rationale: El uso de dos puntos tras «con ellos» y el punto y coma tras «todos ellos» fragmenta innecesariamente la descripción acumulativa del hebreo. Una raya o comas mantienen mejor el flujo enumerativo y la legibilidad en español.
  - severity: low
