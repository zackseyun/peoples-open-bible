translation:
  language: es
  text: Esto también procede de Yahvé de los ejércitos; él es maravilloso en consejo y grande en sabiduría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sabiduría sólida» o «capacidad eficaz» para תּוּשִׁיָּה.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם זֹאת
  english_pob_choice: This also
  chosen_spanish: Esto también
  alternatives_spanish:
  - Esto también
  - También esto
  - Esto mismo también
  lexicon: HALOT
  rationale: La partícula enfática añade esta sentencia a la comparación agrícola anterior. «Esto también» conserva esa adición de forma natural en español sin sobredeterminar el vínculo.
- source_word: מֵעִם
  english_pob_choice: comes from
  chosen_spanish: procede de
  alternatives_spanish:
  - viene de
  - proviene de
  - sale de
  lexicon: HALOT
  rationale: Con יָצָאָה, la preposición expresa origen o procedencia. «Procede de» suena natural en español y mantiene la idea de origen sin forzar un calco.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto. «De los ejércitos» mantiene la imagen militar/celestial de צְבָאוֹת, mejor que una paráfrasis como «Todopoderoso».
- source_word: יָצָאָה
  english_pob_choice: comes
  chosen_spanish: procede
  alternatives_spanish:
  - viene
  - sale
  - ha salido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la afirmación como algo ya originado en Yahvé. «Procede» comunica la fuente/origen en un registro fluido y fiel.
- source_word: הִפְלִיא
  english_pob_choice: is wonderful
  chosen_spanish: es maravilloso
  alternatives_spanish:
  - obra maravillosamente
  - se muestra maravilloso
  - hace maravillas
  lexicon: HALOT
  rationale: El hifil de פלא expresa actuar de manera extraordinaria. En la línea poética, «es maravilloso» conserva el valor predicativo y la cualidad celebrativa.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - consejo
  - designio
  lexicon: HALOT
  rationale: En contextos de sabiduría y gobierno, עֵצָה denota deliberación, consejo o plan. «Consejo» reproduce bien la correspondencia con «sabiduría» en la cola paralela.
- source_word: הִגְדִּיל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande
  - magnífico
  - excelso
  lexicon: HALOT
  rationale: Aunque el hifil puede leerse literalmente como «ha hecho grande», la construcción poética funciona como elogio de cualidad. «Grande en» es idiomático y paralelo a «maravilloso en».
- source_word: תּוּשִׁיָּה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría sólida
  - prudencia
  - capacidad eficaz
  lexicon: HALOT
  rationale: La palabra puede significar sabiduría práctica, competencia o solidez. «Sabiduría» es la opción más clara; el matiz de «sabiduría sólida» queda implícito y puede desarrollarse en nota.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto en español, se mantiene el nombre pactual como «Yahvé» en vez de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance semántico de תּוּשִׁיָּה
  english_pob_reading: wisdom
  chosen_spanish_reading: sabiduría
  alternative_spanish_readings:
  - sabiduría sólida
  - prudencia
  - capacidad eficaz
  rationale: El término hebreo abarca sabiduría práctica, solvencia y recurso efectivo. «Sabiduría» conserva la amplitud y la fluidez poética; la nota preserva la alternativa de «sabiduría sólida» o «capacidad eficaz».
  doctrine_reference: HALOT / uso sapiencial de תּוּשִׁיָּה
translation_notes:
  revision_awareness: 'El inglés POB revisó el verbo principal de «has come» a «comes» por naturalidad. En español, «procede» mantiene la relación de origen y evita un calco temporal innecesario, a la vez que conserva la fuerza afirmativa de la línea poética. Se preservó la estructura paralela: origen en Yahvé, maravilla en consejo, grandeza en sabiduría.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «de los ejércitos» mantiene צְבָאוֹת sin sustituirlo por un equivalente teológico más interpretativo.
  - Se evitó «SEÑOR» como máscara del nombre divino.
  - «Consejo» y «sabiduría» conservan el paralelismo sapiencial del verso sin amplificación explicativa en el texto principal.
