id: REV.4.11
reference: 'Revelation 4:11'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἄξιος εἶ, ὁ κύριος καὶ ὁ θεὸς ⸀ἡμῶν, λαβεῖν τὴν δόξαν καὶ τὴν τιμὴν καὶ τὴν δύναμιν, ὅτι σὺ ἔκτισας ⸀τὰ πάντα, καὶ διὰ τὸ θέλημά σου ἦσαν καὶ ἐκτίσθησαν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/011.yaml
  text: 'You are worthy[a], our Lord and God, to receive the glory and the honor and the power, because you created all things[b], and by your will they existed and were created.'
  footnotes:
  - marker: a
    text: Or, 'by your will they existed and were created.' The Greek phrase διὰ τὸ θέλημά σου can be understood with a causal nuance ('because of') or, less likely, an instrumental nuance ('by').
    reason: lexical_alternative
  - marker: b
    text: Or, 'Worthy are you, our Lord and God.' The Greek word order places 'worthy' first for emphasis.
    reason: lexical_alternative
translation:
  language: ko
  text: '「우리 주, 우리 하나님이여, 영광과 존귀와 권능을 받으시기에 합당하시니, 이는 주께서 만물을 창조하셨으며, 주의 뜻으로 말미암아 그것들이 있었고 또 창조되었음이니이다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἄξιος εἶ
  english_pob_choice: You are worthy
  chosen_korean: 받으시기에 합당하시니
  alternatives_korean:
  - 합당하시도다
  lexicon: BDAG
  rationale: 보좌 앞 송영의 정형 어구로, 한국어 합쇼체 송영의 운율을 살린다.
theological_decisions:
- issue: '보좌 앞 송영(4:11)의 합당 정형과 직접 경배의 어조 보존'
  chosen_reading: '「우리 주, 우리 하나님이여, 영광과 존귀와 권능을 받으시기에 합당하시니이다」'
  alternative_readings:
  - 우리 주 하나님 합당하시도다
  rationale: 스물네 장로의 송영은 직접 경배의 합당 정형이며, 한국어 합쇼체 송영(-이니이다)의 운율로 옮겨 보좌 앞 예배의 무게를 살린다.
  doctrine_reference: 'DOCTRINE.md: 송영 형식 보존'
