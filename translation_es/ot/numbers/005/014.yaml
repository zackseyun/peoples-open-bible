translation:
  language: es
  text: y viene sobre él un espíritu de celos, y tiene celos de su esposa, y ella se ha mancillado[a]; o si viene sobre él un espíritu de celos, y tiene celos de su esposa, aunque ella no se ha mancillado[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha hecho impura». El hebreo usa lenguaje de impureza que puede denotar impureza ritual, pero aquí se refiere específicamente a la sospecha de mancillamiento sexual.
    reason: lexical_alternative
  - marker: b
    text: O «y ella no se ha mancillado». El hebreo usa simplemente la conjunción «y»; «aunque» en el texto principal hace explícito el contraste legal del caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר עָלָיו
  english_pob_choice: comes over him
  chosen_spanish: viene sobre él
  alternatives_spanish:
  - cae sobre él
  - lo invade
  lexicon: HALOT
  rationale: El hebreo expresa la irrupción de un impulso o disposición que alcanza al hombre. «Viene sobre él» conserva la fuerza idiomática sin sonar forzado en español.
- source_word: רוּחַ קִנְאָה
  english_pob_choice: a spirit of jealousy
  chosen_spanish: un espíritu de celos
  alternatives_spanish:
  - un espíritu de celos/zelos
  - un espíritu celoso
  lexicon: HALOT
  rationale: Se mantiene la imagen de רוּחַ como «espíritu» y se traduce קִנְאָה con «celos», que en este contexto describe la emoción legal-matrimonial del pasaje. «Un espíritu celoso» sería más interpretativo y menos transparente.
- source_word: וְקִנֵּא
  english_pob_choice: he is jealous
  chosen_spanish: está celoso
  alternatives_spanish:
  - se pone celoso
  - es celoso
  lexicon: HALOT
  rationale: El verbo en español requiere una formulación natural. «Está celoso» conserva el estado/reacción del marido sin añadir el matiz progresivo de «se pone celoso».
- source_word: אֶת אִשְׁתּוֹ
  english_pob_choice: of his wife
  chosen_spanish: de su esposa
  alternatives_spanish:
  - respecto de su esposa
  - por su esposa
  lexicon: HALOT
  rationale: Aunque el hebreo usa el marcador de objeto directo, el español idiomático con «celoso» pide «de su esposa». «Esposa» es la opción más clara y digna en este contexto legal.
- source_word: נִטְמָאָה
  english_pob_choice: has defiled herself
  chosen_spanish: se ha contaminado
  alternatives_spanish:
  - se ha mancillado
  - ha quedado impura
  lexicon: HALOT
  rationale: Se conserva el lenguaje de impureza del hebreo. «Se ha contaminado» refleja la ambigüedad entre impureza ritual y contaminación moral sin restringirla solo a una lectura ceremonial.
- source_word: אוֹ
  english_pob_choice: or if
  chosen_spanish: o si
  alternatives_spanish:
  - o
  - o cuando
  lexicon: HALOT
  rationale: La partícula introduce un caso alternativo dentro de la misma fórmula legal. «O si» es la manera natural de marcar esa alternativa en español.
- source_word: וְהִיא לֹא נִטְמָאָה
  english_pob_choice: though she has not defiled herself
  chosen_spanish: aunque ella no se ha contaminado
  alternatives_spanish:
  - y ella no se ha contaminado
  - aunque no se ha contaminado
  lexicon: HALOT
  rationale: «Aunque» refleja el contraste legal sugerido por la estructura del hebreo y coincide con la solución del audit trail en inglés. Se mantiene «contaminado» para preservar la misma raíz léxica en ambas ramas del verso.
theological_decisions:
- issue: Impureza ritual y sospecha de adulterio
  english_pob_reading: Render נִטְמָאָה as 'has defiled herself' rather than a purely ceremonial 'has become unclean.'
  chosen_spanish_reading: Traducir נִטְמָאָה como «se ha contaminado» en ambas ocurrencias, dejando abierta la relación entre impureza ritual y falta moral sospechada.
  alternative_spanish_readings:
  - se ha hecho impura
  - se ha mancillado
  rationale: El contexto de Números 5 no es solo ceremonial; implica una sospecha con peso matrimonial y covenantal. «Se ha contaminado» preserva la categoría de impureza sin cerrar el sentido a una sola esfera, y evita imponer una conclusión doctrinal externa al texto.
  doctrine_reference: Números 5:11–31; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail en inglés, que prefirió una formulación más directa para el verbo de celos (‘he is jealous’). En español se siguió esa decisión con «está celoso», manteniendo además la estructura condicional doble del versículo y la alternancia entre una situación sospechosa y otra inocente.
  spanish_consistency_notes:
  - Se mantiene el campo léxico de impureza con «contaminado» en ambas ramas para conservar coherencia terminológica.
  - Se usa «esposa» de manera consistente para אִשְׁתּוֹ, dado el contexto matrimonial legal.
  - La construcción «o si ... aunque ...» reproduce la alternativa legal del hebreo y la solución interpretativa del audit trail en inglés.
  - Se evita la traducción tradicional de máscara litúrgica; el pasaje no contiene el Tetragrámaton ni términos que requieran equivalencias confesionales fijas.
