translation:
  language: es
  text: Alabado es Yahvé en sus juicios, en la boca de los piadosos[a][b]; y bendito es Israel por Yahvé para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la boca de los fieles».
    reason: lexical_alternative
  - marker: b
    text: El griego ὁσίων puede referirse a personas piadosas/devotas; el proyecto evita tomarlo automáticamente como «santos», que suele corresponder a ἅγιοι.
    reason: theological_note
  - marker: c
    text: O «bendito sea Israel por Yahvé para siempre».
    reason: alternative_reading
lexical_decisions:
- source_word: αἰνετὸς
  english_pob_choice: Praised is
  chosen_spanish: Alabado es
  alternatives_spanish:
  - Alabado sea
  - Digno de alabanza es
  lexicon: LSJ / BDAG / uso bíblico
  rationale: El adjetivo funciona de modo predicativo al inicio de una línea de bendición. «Alabado es» conserva el valor declarativo sin volverlo optativo; «alabado sea» sonaría más exhortativo que el griego.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG / política terminológica del proyecto
  rationale: El proyecto pide representar el nombre divino por «Yahvé» en el texto principal. Aquí Κύριος remite al título divino, y la línea funciona como alabanza a Dios.
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decretos
  - actos de juicio
  lexicon: BDAG / LSJ
  rationale: «Juicios» preserva el rango semántico de κρίματα como decisiones o actos judiciales divinos sin especificar más de lo que permite el griego.
- source_word: ἐν στόματι
  english_pob_choice: on the lips of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  - por la boca de
  lexicon: BDAG / LSJ
  rationale: La imagen griega es literalmente «en la boca de». En español, «en la boca de» mantiene la metáfora verbal; «en los labios de» sería más idiomático, pero suaviza la imagen original.
- source_word: ὁσίων
  english_pob_choice: the holy ones
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los fieles
  - los santos
  lexicon: BDAG / uso especializado en Psalms of Solomon
  rationale: El audit trail revisado indica que ὅσιοι debe distinguirse de ἅγιοι y traducirse con el sentido de personas devotas o piadosas. «Piadosos» conserva la fuerza covenantal y evita la carga eclesiástica de «santos».
- source_word: εὐλογημένος
  english_pob_choice: blessed is
  chosen_spanish: bendito es
  alternatives_spanish:
  - bendito sea
  lexicon: BDAG / uso bíblico
  rationale: Como predicado en una línea paralela, «bendito es» refleja el carácter declarativo del griego mejor que una forma optativa.
- source_word: ὑπὸ Κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el Señor
  - de parte de Yahvé
  lexicon: BDAG / sintaxis griega
  rationale: 'ὑπό con genitivo marca agencia: Yahvé es quien bendice a Israel. «Por Yahvé» conserva esa relación causal/agencial de forma natural en español.'
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: BDAG / uso idiomático
  rationale: «Para siempre» es la equivalencia española más natural para la continuidad duradera expresada por la expresión idiomática griega.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión final que corrigió la segmentación y volvió ὁσίων a una forma más cercana al texto («en la boca de...») sin perder el registro formal. También se evitó la traducción tradicional enmascarada de Κύριος para reflejar la política del proyecto con el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo paralelismo declarativo entre «Alabado es» y «bendito es».
  - Se evitó «santos» para ὁσίων, siguiendo la revisión auditada que favorece «piadosos/fieles».
  - Se usó «Yahvé» de manera consistente para Κύριος conforme a las directrices del proyecto.
  - La puntuación reproduce la estructura bimembre del griego con una pausa fuerte antes de la segunda cláusula.
