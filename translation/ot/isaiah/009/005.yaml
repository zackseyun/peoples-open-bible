id: ISA.9.5
reference: Isaiah 9:5
source:
  edition: WLC
  text: כִּי יֶ֣לֶד יֻלַּד לָ֗/נוּ בֵּ֚ן נִתַּן לָ֔/נוּ וַ/תְּהִ֥י הַ/מִּשְׂרָ֖ה עַל שִׁכְמ֑/וֹ וַ/יִּקְרָ֨א שְׁמ֜/וֹ פֶּ֠לֶא יוֹעֵץ֙ אֵ֣ל גִּבּ֔וֹר אֲבִי עַ֖ד שַׂר שָׁלֽוֹם־־־־־׃
translation:
  text: For a child has been born to us[a], a son has been given to us, and the rule is on his shoulder; and his name is called Wonderful Counselor, Mighty God, Father of Eternity[b], Prince of Peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more traditionally in prophetic context: ''For to us a child is born, to us a son is given, and the government shall be upon his shoulder; and his name shall be called ...'''
    reason: alternative_reading
  - marker: b
    text: '''Father of Eternity'' renders the Hebrew literally; traditional English often has ''Everlasting Father.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding hope; 'For' preserves the causal/explanatory force in natural English.
- source_word: יֶלֶד
  chosen: child
  alternatives:
  - boy
  lexicon: HALOT
  rationale: Refers to a young child in a general sense. 'Child' is idiomatic and fits the prophetic announcement better than the narrower 'boy.'
- source_word: יֻלַּד לָנוּ
  chosen: has been born to us
  alternatives:
  - is born to us
  - was born to us
  lexicon: HALOT
  rationale: The passive perfect can be rendered in English with present relevance. 'Has been born' preserves the completed event while sounding natural in English prophetic discourse.
- source_word: בֵּן
  chosen: son
  alternatives:
  - male child
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine and should be rendered gender-accurately as 'son' per translation philosophy.
- source_word: נִתַּן לָנוּ
  chosen: has been given to us
  alternatives:
  - is given to us
  - was given to us
  lexicon: HALOT
  rationale: Passive perfect parallel to 'has been born to us'; 'given' preserves the sense of divine gift without adding an explicit subject not stated in the Hebrew.
- source_word: הַמִּשְׂרָה
  chosen: the rule
  alternatives:
  - the government
  - dominion
  lexicon: HALOT
  rationale: Denotes ruling authority or dominion. 'The rule' is slightly less institutional than 'government' and fits the image of royal authority resting on his shoulder.
- source_word: וַתְּהִי ... עַל שִׁכְמוֹ
  chosen: has come to rest on his shoulder
  alternatives:
  - shall be upon his shoulder
  - is on his shoulder
  - came to be upon his shoulder
  lexicon: HALOT
  rationale: The clause depicts royal authority borne by him. 'Has come to rest' expresses the resultative sense in readable English while preserving the shoulder imagery. A more traditional future rendering is possible in context and is preserved in a footnote.
- source_word: וַיִּקְרָא שְׁמוֹ
  chosen: his name is called
  alternatives:
  - one calls his name
  - he called his name
  - his name shall be called
  lexicon: HALOT
  rationale: The Hebrew singular verb with unspecified subject functions idiomatically for naming. 'His name is called' preserves the naming formula without forcing a specific subject. The traditional future 'shall be called' is a viable contextual alternative.
- source_word: פֶּלֶא יוֹעֵץ
  chosen: Wonderful Counselor
  alternatives:
  - Wonder-Counselor
  - a wonder of a counselor
  lexicon: HALOT
  rationale: Best taken as a compound royal title. 'Wonderful Counselor' is established, natural English and preserves both the extraordinary and advisory dimensions.
- source_word: אֵל גִּבּוֹר
  chosen: Mighty God
  alternatives:
  - Mighty One
  - God the Warrior
  - Divine Hero
  lexicon: HALOT
  rationale: The phrase elsewhere in Isaiah clearly bears a strong divine sense. 'Mighty God' is the most direct rendering and should not be weakened to avoid christological implications not absent from the text.
- source_word: אֲבִי עַד
  chosen: Father of Eternity
  alternatives:
  - Everlasting Father
  - Father forever
  lexicon: HALOT
  rationale: Literally 'father of perpetuity/eternity.' 'Father of Eternity' is more transparent to the Hebrew construct than the traditional 'Everlasting Father,' while still conveying enduring paternal kingship.
- source_word: שַׂר שָׁלוֹם
  chosen: Prince of Peace
  alternatives:
  - Ruler of Peace
  lexicon: HALOT
  rationale: A standard and accurate rendering of the royal title; 'peace' preserves the rich sense of shalom without overexpansion in the main text.
