translation:
  language: es
  text: Hizo sus cuernos en sus cuatro esquinas; sus cuernos eran de una sola pieza con él[a], y lo recubrió de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cuernos formaban una sola pieza con él»; literalmente, «de él eran sus cuernos», indicando que no fueron hechos aparte y luego fijados.
    reason: lexical_alternative
  - marker: b
    text: El hebreo נְחֹשֶׁת puede referirse a bronce o cobre; en el contexto de los muebles del tabernáculo, «bronce» es la traducción convencional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Él hizo
  - Fabricó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה pide una acción directa y sencilla. En español, «hizo» reproduce bien la secuencia narrativa sin añadir interpretación ni solemnidad innecesaria.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus puntas
  - sus salientes
  lexicon: HALOT
  rationale: קֶרֶן designa literalmente «cuerno». En el contexto del altar, la imagen arquitectónica sigue siendo concreta; «cuernos» conserva el término técnico y la forma cultual del objeto.
- source_word: עַל אַרְבַּע פִּנֹּתָיו
  english_pob_choice: on its four corners
  chosen_spanish: sobre sus cuatro esquinas
  alternatives_spanish:
  - en sus cuatro esquinas
  - en sus cuatro ángulos
  lexicon: HALOT
  rationale: עַל con «cuatro esquinas» se expresa de modo natural con «sobre» en español. «Esquinas» mantiene el paralelismo visual con la forma del altar y evita un calco rígido.
- source_word: מִמֶּנּוּ הָיוּ קַרְנֹתָיו
  english_pob_choice: its horns were of one piece with it
  chosen_spanish: sus cuernos eran de una sola pieza con él
  alternatives_spanish:
  - sus cuernos salían de él
  - sus cuernos eran integrales con él
  lexicon: HALOT
  rationale: La frase hebrea literalmente dice «de él eran sus cuernos». La solución «de una sola pieza con él» comunica la fuerza constructiva del pasaje, preservando la idea de que no fueron añadidos aparte.
- source_word: וַיְצַף אֹתוֹ
  english_pob_choice: and he overlaid it
  chosen_spanish: lo recubrió
  alternatives_spanish:
  - lo cubrió
  - lo revistió
  lexicon: HALOT
  rationale: צפה en este contexto tabernacular indica recubrir con metal. «Recubrió» conserva la idea de cobertura metálica con naturalidad en español; el objeto directo neutro «lo» refiere al altar.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En descripciones del tabernáculo, la tradición inglesa de POB usa «bronze» por convención contextual. En español, «bronce» es la equivalencia más natural y cultualmente clara; «cobre» queda como alternativa léxica posible.
translation_notes:
  revision_awareness: El texto inglés del People's Open Bible no muestra revisiones aplicadas en esta unidad y el dictamen de cotejo es de alta concordancia; la redacción española sigue de cerca el valor hebreo del versículo y conserva la nota sobre la posible lectura alternativa de la construcción «de una sola pieza con él».
  spanish_consistency_notes:
  - Se mantiene «bronce» como término principal para נְחֹשֶׁת, con nota alternativa a «cobre».
  - Se conserva la imagen concreta de «cuernos» para קַרְנֹתָיו, sin sustituirla por un término interpretativo.
  - La sintaxis española evita el calco excesivo pero sigue el orden narrativo del hebreo.
  - El referente de «lo» se entiende como el altar mencionado implícitamente por el contexto inmediato.
