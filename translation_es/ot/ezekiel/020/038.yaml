    rationale: El inglés documenta específicamente «I will sift out from among you». La nota española dice «separaré de entre ustedes», que debilita la imagen de cribado/selección y no refleja tan bien el razonamiento auditado.
  - severity: medium
    issue: La nota [b] contiene anglicismo y formulación poco natural.
