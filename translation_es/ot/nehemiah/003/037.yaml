  yaml_path: translation/ot/nehemiah/003/037.yaml
  text: And do not cover their guilt[a], and do not let their sin be blotted out from before you[b], for they have provoked you to anger before the builders.
  footnotes:
  - marker: a
    text: Or 'do not forgive their iniquity'; the Hebrew image is 'do not cover over their guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for they have angered you before the builders.' The Hebrew does not state the object explicitly, but the sense is that their actions provoked anger publicly in front of those rebuilding.
    reason: lexical_alternative
