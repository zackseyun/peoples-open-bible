lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula narrativa de habla divina. En español, 'habló' conserva el acto de comunicación formal sin forzar una repetición innecesaria de 'dijo'; además mantiene bien la cadencia de apertura del discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino en su forma tradicional en español 'Yahvé', conforme al proyecto, en vez de sustituirlo por un título como 'el SEÑOR'. Así se conserva la distinción entre el nombre del pacto y un apelativo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' es la equivalencia natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La construcción infinitiva introduce el contenido del discurso. 'Diciendo' reproduce la fórmula bíblica de manera natural y fiel, sin expandir el sentido.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. La lectura española adoptada conserva el nombre propio divino y evita la sustitución tradicional por un título, en coherencia con la filosofía del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB mantuvo la fórmula narrativa y no requirió revisión textual; se conserva el mismo sentido y el mismo tratamiento del nombre divino, adaptado a la convención española del proyecto.
  spanish_consistency_notes:
  - Se mantiene el registro formal y bíblico sin arcaísmos innecesarios.
  - Se preserva la fórmula introductoria del discurso con una sintaxis natural en español.
  - La nota del nombre divino se vincula al primer caso de Yahvé en el versículo.
