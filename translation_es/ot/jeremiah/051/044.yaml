translation:
  language: es
  text: Y yo castigaré a Bel en Babilonia, y sacaré de su boca lo que ha tragado; las naciones ya no fluirán hacia él[a]. Incluso el muro de Babilonia ha caído[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones ya no se derramarán hacia él». El verbo hebreo pinta a los pueblos moviéndose como un río.
    reason: lexical_alternative
  - marker: b
    text: O «el muro de Babilonia caerá». El hebreo puede usar aquí el perfecto profético, describiendo como seguro un acontecimiento futuro.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con juicio
  - tomaré cuenta de
  lexicon: HALOT
  rationale: En contextos de juicio, פקד con עַל expresa intervención judicial contra alguien. «Castigaré» conserva la fuerza forense de la acción y es natural en español contemporáneo.
- source_word: בֵּל
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Bēl
  lexicon: HALOT
  rationale: Se conserva el nombre propio del dios babilónico como transliteración, siguiendo la decisión auditada del inglés POB.
- source_word: בְּבָבֶל
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilonia misma
  - en la Babilonia
  lexicon: HALOT
  rationale: La preposición locativa indica el ámbito o lugar de la acción; «en Babilonia» es la forma más natural y fiel en español.
- source_word: וְהוֹצֵאתִי
  english_pob_choice: I will bring out
  chosen_spanish: sacaré
  alternatives_spanish:
  - haré salir
  - extraeré
  lexicon: HALOT
  rationale: El hifil de יצא es causativo. «Sacaré» transmite con claridad la imagen de hacer salir algo de la boca de Bel sin perder el valor verbal idiomático.
- source_word: אֶת בִּלְעוֹ
  english_pob_choice: what he has swallowed
  chosen_spanish: lo que ha tragado
  alternatives_spanish:
  - lo que ha devorado
  - su presa
  lexicon: HALOT
  rationale: בִּלְעוֹ alude a aquello tragado o devorado. «Lo que ha tragado» conserva la metáfora corporal y sigue de cerca la imagen de devolver lo ingerido.
- source_word: מִפִּיו
  english_pob_choice: out of his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - fuera de su boca
  - desde su boca
  lexicon: HALOT
  rationale: La expresión concreta se mantiene en español con «de su boca», que resulta idiomática y preserva la imaginería del texto.
- source_word: וְלֹא יִנְהֲרוּ אֵלָיו עוֹד גּוֹיִם
  english_pob_choice: nations will no longer stream to him
  chosen_spanish: las naciones ya no fluirán hacia él
  alternatives_spanish:
  - las naciones ya no acudirán a él
  - las naciones ya no se abalanzarán hacia él
  lexicon: HALOT
  rationale: נהר en este contexto usa una metáfora de flujo/afluencia. «Fluirán hacia él» conserva la imagen poética y, al mismo tiempo, es inteligible en español; se mantiene «él» para referirlo a Bel, como en el audit trail inglés.
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Hasta
  alternatives_spanish:
  - Incluso
  - También
  lexicon: HALOT
  rationale: Aquí introduce una cláusula final y enfática. «Hasta» comunica bien el carácter climáctico y enfático antes de la caída del muro.
- source_word: חוֹמַת בָּבֶל
  english_pob_choice: the wall of Babylon
  chosen_spanish: el muro de Babilonia
  alternatives_spanish:
  - la muralla de Babilonia
  - el muro babilónico
  lexicon: HALOT
  rationale: חוֹמָה designa muro o muralla. Se eligió «muro» por ser el equivalente más directo y el que mejor sigue la forma singular del hebreo; «muralla» queda como alternativa natural.
- source_word: נָפָלָה
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - ha caído ya
  - caerá
  lexicon: HALOT
  rationale: El perfecto hebreo puede funcionar como perfecto profético. «Ha caído» mantiene esa fuerza de certeza consumada sin convertirla innecesariamente en simple futuro.
theological_decisions:
- issue: Referente de los pronombres en las cláusulas del «tragar» y «fluir»
  english_pob_reading: The pronouns refer to Bel, the Babylonian deity/idol.
  chosen_spanish_reading: Los pronombres se refieren a Bel, el dios/idolo babilónico.
  alternative_spanish_readings:
  - Podrían leerse de manera más amplia como referencia personificada a Babilonia.
  - También podrían entenderse como un desplazamiento retórico hacia el sistema cultual de Babilonia.
  rationale: El antecedente inmediato es Bel, y la imagen de la boca que traga y luego devuelve encaja directamente con la polémica antiídolos. Mantener este referente evita suavizar la crítica del texto.
  doctrine_reference: Polémica veterotestamentaria contra los ídolos; juicio sobre las falsas deidades.
- issue: Valor aspectual de נָפָלָה
  english_pob_reading: 'Rendered as a prophetic perfect: ''has fallen.'''
  chosen_spanish_reading: 'Se conserva como perfecto profético: «ha caído».'
  alternative_spanish_readings:
  - «caerá» como futuro simple
  - «está cayendo» como presente progresivo
  rationale: El hebreo profético usa con frecuencia el perfecto para expresar un acontecimiento futuro como seguro. «Ha caído» preserva esa fuerza retórica y la decisión auditada del inglés POB.
  doctrine_reference: Uso profético del perfecto en el hebreo bíblico.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el juicio textual y lexical del inglés POB, sin cambios sustanciales respecto del pase más reciente; se mantienen las dos notas principales: la metáfora de las naciones que fluyen y la posibilidad del perfecto profético en la caída del muro.'
  spanish_consistency_notes:
  - Se usa «Bel» como nombre propio del dios babilónico, coherente con la transliteración del audito inglés.
  - «Babilonia» se mantiene como topónimo; no se sustituye por un equivalente tradicional que oculte la referencia geográfica.
  - Se preserva la metáfora de flujo en «fluirán hacia él» y la de ingestión en «lo que ha tragado».
  - «Ha caído» refleja el perfecto profético sin forzar el tiempo verbal a una simple lectura futurista.
