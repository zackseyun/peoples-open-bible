lexical_decisions:
- source_word: וְ/אַבְרָהָם
  english_pob_choice: And Abraham
  chosen_spanish: Y Abraham
  alternatives_spanish:
  - Ahora Abraham
  lexicon: HALOT
  rationale: La ו inicial se conserva con una conjunción simple «Y» para mantener la conexión narrativa del hebreo sin sobredeterminar su valor discursivo.
- source_word: בֶּן מְאַת שָׁנָה
  english_pob_choice: was a hundred years old
  chosen_spanish: tenía cien años
  alternatives_spanish:
  - era de cien años
  - era un hijo de cien años
  lexicon: HALOT
  rationale: El hebreo usa el modismo «hijo de cien años» para la edad; en español, «tenía cien años» comunica con naturalidad el mismo sentido idiomático sin perder el valor temporal.
- source_word: בְּ/הִוָּלֶד
  english_pob_choice: when ... was born
  chosen_spanish: cuando nació
  alternatives_spanish:
  - al nacer
  - en el nacimiento de
  lexicon: HALOT
  rationale: El infinitivo pasivo expresa circunstancia temporal. «Cuando nació» mantiene el valor temporal y el sentido pasivo de forma idiomática en español.
- source_word: ל֔/וֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: El pronombre marca a Abraham como el destinatario del nacimiento. En español, «a él» refleja de modo directo la relación del dativo.
- source_word: אֵ֖ת יִצְחָ֥ק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: HALOT
  rationale: אֵת introduce el objeto directo del infinitivo y no se traduce de manera independiente; el nombre propio se mantiene como «Isaac».
- source_word: בְּנֽ/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: La forma sufijada expresa la relación filial con Abraham. «Su hijo» preserva la aposición sin añadir énfasis no explicitado en el hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador de nota [a] directamente en el texto español, anclado a «su hijo» para reflejar la alternativa literal del hebreo.
  spanish_consistency_notes:
  - Se usó «Y» para la conjunción narrativa inicial, en paralelo al hebreo.
  - Se evitó «SEÑOR» y otras referencias teológicas no presentes en el versículo.
  - La nota [a] ofrece la alternativa literal hebrea sin desplazar la traducción principal idiomática.
  - «Nació» y «tenía cien años» conservan el sentido temporal y biográfico del original con español natural.
