translation:
  language: es
  text: 'Porque así dice Yahvé: «Ustedes fueron vendidos por nada, y serán redimidos sin dinero[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sin plata». El hebreo כֶּסֶף puede referirse específicamente a plata, pero en este contexto probablemente significa dinero o pago en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la declaración divina con valor explicativo/assertivo. «Porque» reproduce bien ese arranque discursivo en español sin perder el enlace con la voz profética.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - tal dice
  - de este modo dice
  lexicon: HALOT
  rationale: Mantiene la fórmula profética solemne y directa. «Así dice» es natural en español bíblico y conserva la formalidad del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio del pacto en lugar de ocultarlo con un título.
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - sin pago
  - gratuitamente
  - por nada de precio
  lexicon: HALOT
  rationale: Expresa la idea de ausencia de precio/pago con una forma idiomática y clara en español. Conserva el contraste con «sin dinero».
- source_word: נִמְכַּרְתֶּם
  english_pob_choice: you were sold
  chosen_spanish: Fueron vendidos
  alternatives_spanish:
  - Ustedes fueron vendidos
  - se les vendió
  lexicon: HALOT
  rationale: 'El nifal aquí funciona como pasivo: el pueblo aparece como objeto de la venta. El español plural evita forzar un reflexivo que el hebreo no exige.'
- source_word: בְכֶסֶף
  english_pob_choice: without money
  chosen_spanish: sin dinero
  alternatives_spanish:
  - no por plata
  - sin pago
  - no con dinero
  lexicon: HALOT
  rationale: En este dicho, כֶּסֶף puede referir a plata o a dinero en general. «Sin dinero» comunica la referencia económica de manera amplia y natural, como en el audit trail inglés.
- source_word: תִּגָּאֵלוּ
  english_pob_choice: you will be redeemed
  chosen_spanish: serán redimidos
  alternatives_spanish:
  - serán rescatados
  - serán comprados de vuelta
  - serán rescatados por redención
  lexicon: HALOT
  rationale: «Redimir» preserva la fuerza teológica y de rescate del verbo גאל, mejor que una paráfrasis comercial. En español mantiene la resonancia bíblica sin perder claridad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre del pacto, conforme al criterio auditable del proyecto. No se reemplaza por un título que oculte la forma hebrea original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Contraste económico-teológico de la redención
  english_pob_reading: sold for nothing / redeemed without money
  chosen_spanish_reading: vendidos por nada / redimidos sin dinero
  alternative_spanish_readings:
  - vendidos sin precio / redimidos sin pago
  - vendidos por nada / rescatados sin dinero
  rationale: La traducción conserva la tensión del texto entre venta gratuita y redención gratuita o no monetaria, sin especificar un mecanismo doctrinal no explicitado por el verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que prefirió la fórmula más literal y formal «thus says the LORD»; por eso se usó «así dice Yahvé». También se mantuvo la equivalencia económica del par «por nada / sin dinero» sin resolver la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene «redimidos» para גאל, evitando sustituciones por «comprados de vuelta» que reducirían la resonancia teológica.
  - Se eligió una voz pasiva plural («Fueron vendidos», «serán redimidos») para reflejar el hebreo sin introducir matices reflexivos no señalados por el texto.
  - La nota de pie preserva la alternativa léxica de כסף como «plata» sin imponerla en el cuerpo principal.
