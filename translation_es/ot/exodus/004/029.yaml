review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del hebreo: וַיֵּלֶךְ con sujeto coordinado se vierte naturalmente como «fueron», וַיַּאַסְפוּ como «reunieron», y «todos los ancianos» preserva כָּל זִקְנֵי. También conserva la expresión filial בני ישראל en vez de reducirla a un etnónimo.'
  spanish_quality_summary: 'El español es claro y digno, pero la nota al pie no corresponde a la decisión principal: el texto ya dice «los hijos de Israel», y la nota repite esa misma opción como alternativa tradicional. La nota debe ofrecer alternativas reales al lector español. El resto suena natural y fiel.'
  glossary_alignment: No hay términos del glosario proyectual en juego salvo la conservación de בני ישראל. «Los hijos de Israel» está alineado con la racionalidad documentada del POB. «Ancianos» para זקני y «reunieron» para ויאספו también están bien alineados.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal como si fuera alternativa.
    rationale: 'El texto principal ya usa «los hijos de Israel[a]». La nota actual dice: «O «los israelitas» o, tradicionalmente, «los hijos de Israel»». Eso no informa una alternativa distinta para la segunda opción y desajusta la función de la nota lexical.'
  revised_spanish_text: Entonces Moisés y Aarón fueron y reunieron a todos los ancianos de los hijos de Israel[a].
  revised_footnotes:
  - marker: a
    text: O «los israelitas» o, tradicionalmente, «los hijos de Jacob/Israel».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota para que presente alternativas reales frente a la lectura principal «los hijos de Israel», evitando repetirla como supuesta variante.
