translation:
  language: es
  text: Guárdame como la pupila del ojo[a]; escóndeme a la sombra de tus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «la niña del ojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרֵנִי
  english_pob_choice: Keep me
  chosen_spanish: Guárdame
  alternatives_spanish:
  - Cuídame
  - Protégeme
  - Vigílame
  lexicon: HALOT
  rationale: שׁמר expresa aquí una petición de custodia o protección. «Guardar» comunica bien ese matiz en español bíblico contemporáneo y mantiene la fuerza súplica del verbo sin volverlo demasiado explicativo.
- source_word: כְּאִישׁוֹן בַּת עָיִן
  english_pob_choice: like the pupil of the eye
  chosen_spanish: como la pupila del ojo
  alternatives_spanish:
  - como la niña del ojo
  - como la manzana del ojo
  - como el centro del ojo
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido directo del modismo hebreo, no por la expresión tradicional. «Pupila del ojo» es la forma natural y transparente en español para preservar la imagen de algo delicado y cuidadosamente resguardado.
- source_word: בְּצֵל
  english_pob_choice: in the shadow
  chosen_spanish: a la sombra
  alternatives_spanish:
  - en la sombra
  - bajo la sombra
  lexicon: HALOT
  rationale: En español, la construcción con «a la sombra de» es idiomática y conserva la imagen protectora del hebreo, sin añadir una interpretación que atenúe el paralelismo poético.
- source_word: כְּנָפֶיךָ
  english_pob_choice: your wings
  chosen_spanish: tus alas
  alternatives_spanish:
  - tus wings
  - tus plumas
  lexicon: HALOT
  rationale: «Alas» es el equivalente natural de כָּנָף en este contexto poético. Mantiene la metáfora de protección divina con claridad y dignidad en español.
- source_word: תַּסְתִּירֵנִי
  english_pob_choice: hide me
  chosen_spanish: escóndeme
  alternatives_spanish:
  - ocúltame
  - guárdame
  lexicon: HALOT
  rationale: סתר en hiphil significa esconder o ocultar. «Escóndeme» reproduce la acción protectora de manera directa y poética, y encaja bien con el paralelismo del versículo.
theological_decisions:
- issue: Metáfora del ojo vulnerable
  english_pob_reading: 'Translate the Hebrew idiom by its plain sense: ''the pupil of the eye.'''
  chosen_spanish_reading: 'Traducir el modismo por su sentido llano: «la pupila del ojo».'
  alternative_spanish_readings:
  - «la niña del ojo»
  - «la manzana del ojo»
  rationale: No hay una afirmación doctrinal especial, sino una imagen poética de protección cuidadosa. La opción principal es transparente para el lector moderno y conserva la tensión entre literalidad e idiomatismo sin recurrir a una expresión arcaica o menos clara.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Imágenes de alas como protección divina
  english_pob_reading: Retain 'your wings' as a metaphor for divine protection.
  chosen_spanish_reading: Conservar «tus alas» como metáfora de protección divina.
  alternative_spanish_readings:
  - reinterpretar como «tu protección»
  - reinterpretar como «tu cuidado»
  rationale: El hebreo usa lenguaje imaginal concreto. Mantener la metáfora respeta la textura poética del salmo y evita explicar demasiado el símbolo dentro del texto principal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la decisión inglesa auditada: se conserva la imagen del ojo en sentido idiomático y se mantiene literalmente la metáfora de las alas; no se requieren revisiones adicionales según el informe más reciente.'
  spanish_consistency_notes:
  - Se prefirió «Guárdame» por ser una petición natural en español bíblico y coherente con שׁמר.
  - «Pupila del ojo» sigue el sentido directo del modismo; la nota preserva la alternativa tradicional «la niña del ojo».
  - «A la sombra de tus alas» mantiene el paralelismo poético del hebreo y la elección inglesa de no interpretarlo de forma abstracta.
  - No se usó «SEÑOR» ni otra sustitución teológica, porque el versículo no contiene el Tetragrámaton ni κύριος.
