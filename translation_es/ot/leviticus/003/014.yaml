revisions:
- from: 'Y presentará de él su ofrenda[a], una ofrenda hecha por fuego a Yahvé: la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas,'
  to: 'Y de esta presentará su ofrenda, una ofrenda de alimento[a] a Yahvé: la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas,'
  rationale: Se corrigió la referencia pronominal para evitar que מִמֶּנּוּ suene personal en español, se ajustó el orden de palabras para una lectura más natural, y se restauró en el texto principal la decisión léxica auditada para אִשֶּׁה como equivalente de "food offering", conservando la alternativa tradicional en nota.
