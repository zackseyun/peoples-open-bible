base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/029.yaml
  text: And it happened[a], when noon had passed, that they kept prophesying until the offering up of the grain offering, but there was no voice, no one answering[b], and no one paying attention.
  footnotes:
  - marker: a
    text: Or, 'they raved.' The Hebrew uses the usual verb for prophesying, here describing ecstatic behavior by Baal's prophets.
    reason: lexical_alternative
  - marker: b
    text: '''The offering up of the grain offering'' may also be understood as the time of the regular evening offering.'
    reason: alternative_reading
