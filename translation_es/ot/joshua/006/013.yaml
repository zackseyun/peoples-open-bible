translation:
  language: es
  text: Y los siete sacerdotes, llevando siete trompetas de cuernos de carnero[a] delante del arca de Yahvé, iban caminando y tocando las trompetas; y los hombres armados iban delante de ellos, y la retaguardia iba detrás del arca de Yahvé, mientras seguían tocando las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trompetas de jubileo» o «cuernos de carnero». La expresión hebrea se refiere a shofares hechos de cuernos de carnero o asociados con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹפְרוֹת הַיֹּבְלִים
  english_pob_choice: ram’s-horn trumpets
  chosen_spanish: trompetas de cuerno de carnero
  alternatives_spanish:
  - trompetas de jubileo
  - cuernos de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno usado como instrumento de señal, y הַיֹּבְלִים especifica la asociación con el carnero. En español, «trompetas de cuerno de carnero» conserva la función instrumental y la base animal sin forzar un tecnicismo litúrgico. «Trompetas de jubileo» sería posible, pero oscurece el material del instrumento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español, «Yahvé» mantiene la decisión POB de hacer visible el Tetragrámaton y evita la sustitución por «SEÑOR». «Jehová» es una tradición posterior menos adecuada para este proyecto.
- source_word: הֹלְכִים הָלֹוךְ
  english_pob_choice: were walking on
  chosen_spanish: iban caminando
  alternatives_spanish:
  - seguían andando
  - iban avanzando continuamente
  lexicon: HALOT
  rationale: La combinación verbal hebrea intensifica la acción continua. «Iban caminando» reproduce con naturalidad esa progresividad sin volver el español rígido o redundante.
- source_word: וְתָקְעוּ בַּשּׁוֹפָרוֹת
  english_pob_choice: and blowing the trumpets
  chosen_spanish: y tocando las trompetas
  alternatives_spanish:
  - y soplando las trompetas
  - y haciendo sonar las trompetas
  lexicon: HALOT
  rationale: Con שׁוֹפָר, el verbo תקע se expresa en español de forma más idiomática como «tocar» o «hacer sonar». «Tocando las trompetas» mantiene el valor procesional y evita una traducción mecánica.
- source_word: הֶחָלוּץ
  english_pob_choice: the armed men
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - la vanguardia
  - los combatientes
  lexicon: HALOT
  rationale: El término señala a quienes van equipados para combate y abren la marcha. «Los hombres armados» es claro en español y conserva el matiz militar sin añadir interpretación técnica no explicitada en el hebreo.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - a la cabeza de ellos
  lexicon: HALOT
  rationale: La relación espacial del hebreo se expresa con «delante de ellos», que en español es natural y precisa en una escena de procesión.
- source_word: הַמְאַסֵּף
  english_pob_choice: the rear guard
  chosen_spanish: la retaguardia
  alternatives_spanish:
  - el que cerraba la marcha
  - la guardia de atrás
  lexicon: HALOT
  rationale: En contexto militar-procesional, el participio describe al grupo que cierra la columna. «La retaguardia» es la equivalencia española más estable y fiel.
- source_word: אַחֲרֵי אֲרוֹן יְהוָה
  english_pob_choice: behind the ark of Yahweh
  chosen_spanish: detrás del arca de Yahvé
  alternatives_spanish:
  - tras el arca de Yahvé
  - a espaldas del arca de Yahvé
  lexicon: HALOT
  rationale: El hebreo indica ubicación espacial. «Detrás del arca de Yahvé» es transparente y mantiene la referencia al arca como objeto sagrado sin cambiar el sentido a una mera secuencia temporal.
- source_word: הוֹלֵךְ וְתָקוֹעַ
  english_pob_choice: going on and blowing the trumpets
  chosen_spanish: mientras seguían tocando las trompetas
  alternatives_spanish:
  - y seguían tocando las trompetas
  - mientras iban tocando las trompetas
  lexicon: HALOT
  rationale: La forma hebrea resume una acción reiterada y continua. La solución española evita la repetición artificial y conserva el valor durativo con una subordinación natural.
theological_decisions:
- issue: Cómo nombrar el Tetragrámaton en un texto público en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB documenta la decisión de no ocultar el nombre divino tras un título. En español, «Yahvé» es la forma que mejor preserva esa política editorial y mantiene la audibilidad del nombre propio de Dios en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la marcha repetitiva y procesional
  english_pob_reading: were walking on ... while they went on blowing the trumpets
  chosen_spanish_reading: iban caminando ... mientras seguían tocando las trompetas
  alternative_spanish_readings:
  - seguían avanzando ... y tocaban las trompetas
  - iban andando ... mientras sonaban las trompetas
  rationale: El hebreo enfatiza una acción sostenida y ritualizada. La redacción española mantiene esa continuidad sin convertirla en una enumeración torpe ni perder el carácter ceremonial de la escena.
  doctrine_reference: No doctrinal issue; discourse-level fidelity to Hebrew aspect
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que ajustó el cierre de la frase para reflejar mejor la continuidad del hebreo. En español, esa fluidez se refleja con «mientras seguían tocando las trompetas», evitando una repetición pesada y conservando el valor durativo final. También incorporé la preferencia revisada por una acción continua en la marcha y el soplar de las trompetas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el proyecto para יְהוָה.
  - Se usa «arca» y no una paráfrasis como «cofre sagrado», para respetar el término bíblico estable.
  - Se usa «retaguardia» como equivalente militar natural de הַמְאַסֵּף.
  - La secuencia verbal conserva aspecto progresivo con imperfectos y gerundios donde el español lo permite naturalmente.
