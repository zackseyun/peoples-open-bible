translation:
  language: es
  text: El rey Salomón reclutó trabajo forzoso[b][a] de todo Israel, y el trabajo forzoso fue de treinta mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «levantó una leva laboral de todo Israel».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo מַס se refiere a servicio laboral obligatorio, no principalmente a un impuesto en dinero.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: conscripted
  chosen_spanish: impuso
  alternatives_spanish:
  - reclutó
  - levantó
  lexicon: HALOT
  rationale: En este contexto administrativo, el verbo comunica la acción de imponer un contingente obligatorio. "Imponer" conserva la idea de una carga o exigencia sobre la población sin sonar tan técnico como "reclutó" ni tan literal y menos natural como "levantó".
- source_word: מַס
  english_pob_choice: forced labor
  chosen_spanish: trabajo forzoso
  alternatives_spanish:
  - mano de obra obligatoria
  - corvea
  - tributo
  lexicon: HALOT
  rationale: El término hebreo designa servicio laboral compulsorio, no un impuesto monetario. "Trabajo forzoso" expresa con claridad esa fuerza obligatoria en español moderno. "Corvea" es preciso pero demasiado técnico; "tributo" desviaría el sentido hacia pago y no labor.
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: from all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - de todo Israel
  - entre todo Israel
  lexicon: HALOT
  rationale: La frase indica el alcance total de la población sometida a la obligación. "Sobre todo Israel" refleja bien la imposición de la carga; "de todo Israel" también es posible, pero en español puede sonar menos directo respecto del acto de imponer.
- source_word: וַיְהִי הַמַּס
  english_pob_choice: and the forced labor was
  chosen_spanish: y el trabajo forzoso fue
  alternatives_spanish:
  - y el trabajo forzoso fue de
  - y el contingente de trabajo fue
  lexicon: HALOT
  rationale: La construcción hebrea introduce la cuantía del contingente. En español, "fue de" hace la relación numérica explícita y natural, manteniendo la estructura sencilla del original.
- source_word: שְׁלֹשִׁים אֶלֶף אִישׁ
  english_pob_choice: thirty thousand men
  chosen_spanish: treinta mil hombres
  alternatives_spanish:
  - treinta mil varones
  - treinta mil personas
  lexicon: HALOT
  rationale: אִישׁ aquí cuenta trabajadores varones adultos. "Hombres" es la forma más clara y fiel en español; "personas" borraría la especificidad masculina del hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisó 'numbered' por 'was' para reflejar con más directitud la construcción hebrea; la traducción española sigue esa misma elección con «fue de», manteniendo la cuantificación directa sin añadir una noción narrativa de conteo.
  spanish_consistency_notes:
  - Se mantiene «trabajo forzoso» para מַס, en continuidad con la decisión inglesa de evitar «tributo».
  - Se conserva el masculino plural «hombres» para אִישׁ, siguiendo la especificidad del hebreo.
  - No se introduce un verbo de conteo explícito; la cantidad se presenta por la cópula, como en la revisión final inglesa.
