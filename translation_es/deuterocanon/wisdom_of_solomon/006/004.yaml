translation:
  language: es
  text: porque, aunque ustedes eran ministros[a] de su reino, no juzgaron rectamente[b], ni guardaron la ley, ni caminaron conforme al consejo de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «servidores» o «funcionarios» de su reino. El griego ὑπηρέται designa subordinados que sirven bajo una autoridad superior; aquí probablemente alude a gobernantes como funcionarios bajo el gobierno de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «no juzgaron con justicia».
    reason: lexical_alternative
  - marker: c
    text: O «conforme al propósito de Dios» o «en línea con la voluntad de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπηρέται
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - siervos
  - funcionarios
  - subordinados
  lexicon: BDAG
  rationale: ὑπηρέται designa subordinados o agentes al servicio de una autoridad superior. En este contexto real y judicial, «ministros» comunica mejor la idea de funcionarios al servicio de la realeza de Dios sin reducir el término a servidumbre doméstica. «Siervos» es posible, pero pierde el matiz de cargo o función pública.
- source_word: βασιλείας
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - realeza
  - gobierno
  lexicon: BDAG
  rationale: βασιλεία puede referirse al reino, al reinado o a la soberanía real. «Reino» es la opción más natural en español y conserva tanto el ámbito como la autoridad de la realeza divina. «Reinado» resaltaría más el acto de gobernar, pero aquí el contexto favorece la esfera del reino.
- source_word: ἐκρίνατε ὀρθῶς
  english_pob_choice: did not judge rightly
  chosen_spanish: no juzgaron rectamente
  alternatives_spanish:
  - no juzgaron justamente
  - no juzgaron correctamente
  lexicon: BDAG
  rationale: κρίνω con ὀρθῶς expresa juzgar de manera correcta o recta. «Rectamente» conserva el valor adverbial y suena natural en español bíblico sin desplazar el sentido hacia una fórmula puramente legalista. «Justamente» también es posible, pero puede intensificar el matiz de equidad más allá del griego.
- source_word: ἐφυλάξατε νόμον
  english_pob_choice: keep the law
  chosen_spanish: guardaron la ley
  alternatives_spanish:
  - observaron la ley
  - cumplieron la ley
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, observar o custodiar. «Guardar la ley» preserva bien la fuerza ética y pactal de νόμος y mantiene una formulación fiel y reconocible en español. «Observar» es cercana, pero menos directa; «cumplieron» suaviza demasiado el matiz de fidelidad.
- source_word: κατὰ τὴν βουλὴν τοῦ θεοῦ
  english_pob_choice: according to the counsel of God
  chosen_spanish: conforme al consejo de Dios
  alternatives_spanish:
  - según el propósito de Dios
  - de acuerdo con la voluntad de Dios
  lexicon: BDAG
  rationale: βουλή puede significar consejo, propósito o plan. «Consejo» conserva el carácter deliberativo de la intención divina sin reducirlo a mera preferencia. «Propósito» y «voluntad» son alternativas válidas, pero «consejo» sigue más de cerca la decisión inglesa auditada y el campo semántico del griego.
- source_word: ἐπορεύθητε
  english_pob_choice: walk
  chosen_spanish: caminaron
  alternatives_spanish:
  - anduvieron
  - vivieron
  - se condujeron
  lexicon: BDAG
  rationale: πορεύομαι literalmente significa ir o avanzar, pero en contextos éticos funciona como metáfora de conducta. «Caminaron» conserva esa imagen moral en español y corresponde bien a «walk according to». «Anduvieron» también es posible, aunque «caminaron» resulta más claro y actual.
theological_decisions:
- issue: Autoridad humana bajo la soberanía divina
  english_pob_reading: The verse presents rulers as subordinate functionaries serving under God's kingdom.
  chosen_spanish_reading: El verso presenta a los gobernantes como ministros subordinados al reino de Dios.
  alternative_spanish_readings:
  - El verso puede leerse de forma más general como referida a toda autoridad humana bajo Dios.
  rationale: El contexto inmediato habla a quienes ejercen poder y juicio; por eso «ministros de su reino» mantiene la subordinación de su autoridad a Dios sin ampliar innecesariamente el referente. La traducción conserva la tensión teológica de una autoridad derivada, en vez de resolverla con formulaciones eclesiásticas o políticas posteriores.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión teológica sin armonización indebida.'
translation_notes:
  revision_awareness: 'Se revisó el verso a la luz del texto griego de Swete y del audit trail inglés. No se introdujeron cambios sustantivos respecto del sentido base: se mantuvo la estructura causal, la triple negación y el marco de subordinación real a Dios. La única adaptación principal fue la naturalización al español de los términos de gobierno y conducta ética.'
  spanish_consistency_notes:
  - «Ministros» conserva el matiz de función subordinada en un contexto de realeza divina.
  - «Reino» se usa para βασιλεία por claridad y naturalidad en español.
  - «Ley» traduce νόμος de forma general y reconocible en un contexto moral-jurídico.
  - «Consejo de Dios» mantiene la deliberación divina del término βουλή.
  - Se evitó «SEÑOR» para el nombre divino, siguiendo el estándar POB de «Dios» cuando el griego dice θεοῦ.
