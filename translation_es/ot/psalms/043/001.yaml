    issue: Vocativo «oh Dios» poco natural en español bíblico contemporáneo
    rationale: Aunque comprensible, «oh Dios» suena más calcado del inglés que idiomático en español neutral eclesial. «Dios» tras coma vocativa preserva plenamente el sentido y mejora la fluidez.
  - severity: low
    issue: Nota al pie con alternativa «hazme vindicación» poco idiomática
    rationale: «Vindicación» existe, pero la locución verbal propuesta no suena natural en español común. La nota debe reflejar la alternativa forense sin introducir una formulación extraña.
  revised_spanish_text: Hazme justicia[a], Dios, y defiende mi causa contra una nación infiel; líbrame del hombre engañoso e injusto.
