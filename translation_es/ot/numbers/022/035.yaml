translation:
  language: es
  text: 'Entonces el ángel de Yahvé[a] dijo a Balaam: «Ve con los hombres, pero solo la palabra[b] que yo te diga, esa dirás». Y Balaam fue con los oficiales de Balac[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mensajero de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'la palabra'; también puede significar 'el mensaje' o 'el asunto'.
    reason: lexical_alternative
  - marker: c
    text: O 'los príncipes de Balac'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh / the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ admite 'mensajero' o 'ángel'. En este contexto narrativo, la figura que se presenta a Balaam es un ser celestial personal, por lo que 'ángel' es la opción más natural y fiel. יְהוָה se rinde como 'Yahvé' conforme al estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se translitera como 'Yahvé' en español para preservar el nombre divino propio, no sustituirlo por un título.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - estos hombres
  - los varones
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino definido. 'Los hombres' refleja de manera directa y natural ese referente sin añadir especificaciones que el texto no da.
- source_word: וְאֶפֶס
  english_pob_choice: but
  chosen_spanish: pero solo
  alternatives_spanish:
  - sino
  - únicamente
  - sin embargo
  lexicon: HALOT
  rationale: La partícula introduce una restricción fuerte tras el permiso de ir con ellos. En español, 'pero solo' reproduce bien la fuerza concesiva y restrictiva del hebreo, manteniendo el contraste del mandato.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la cosa
  - el asunto
  lexicon: HALOT
  rationale: En un contexto de habla divina y con el verbo 'hablar' repetido, דָּבָר funciona aquí como 'palabra'/'mensaje'. 'La palabra' conserva la repetición y la relación verbal del pasaje.
- source_word: אֲדַבֵּר אֵלֶיךָ
  english_pob_choice: I speak to you
  chosen_spanish: yo te hable
  alternatives_spanish:
  - yo te diga
  - yo te diga a ti
  - yo te hablaré
  lexicon: HALOT
  rationale: El imperfecto en la cláusula relativa expresa la palabra que el mensajero divino pronunciará; en español, un subjuntivo futuro de sentido relativo ('yo te hable') suena natural y conserva la dependencia del enunciado.
- source_word: אֹתוֹ תְדַבֵּר
  english_pob_choice: that you shall speak
  chosen_spanish: eso hablarás
  alternatives_spanish:
  - eso mismo hablarás
  - solo eso hablarás
  - tú hablarás eso
  lexicon: HALOT
  rationale: 'El objeto adelantado intensifica la exclusividad: Balaam debe repetir exactamente lo recibido. ''Eso hablarás'' mantiene la fuerza enfática y evita introducir modales no presentes en el hebreo.'
- source_word: שָׂרֵי בָלָק
  english_pob_choice: the officials of Balak
  chosen_spanish: los oficiales de Balac
  alternatives_spanish:
  - los príncipes de Balac
  - los jefes de Balac
  lexicon: HALOT
  rationale: שָׂרִים puede significar 'príncipes', 'jefes' u 'oficiales'. 'Oficiales' encaja bien en este contexto de acompañantes enviados por Balac y evita una lectura monárquica demasiado específica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Se mantiene el nombre propio del pacto, evitando la sustitución por un título. Esto conserva la transparencia textual y la coherencia con el proyecto POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Restricción de lo que Balaam debe decir
  english_pob_reading: only the word that I speak to you, that you shall speak
  chosen_spanish_reading: pero solo la palabra que yo te hable, eso hablarás
  alternative_spanish_readings:
  - y solo lo que yo te diga, eso dirás
  - pero únicamente la palabra que yo te diga, esa hablarás
  rationale: 'La redacción española conserva la restricción absoluta del hebreo: Balaam no debe añadir ni omitir nada, sino repetir solo lo recibido. Se evita suavizar el mandato con una paráfrasis más general.'
  doctrine_reference: Numbers 22:35 textual/theological constraint on prophetic speech
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la segunda cola para enfatizar con precisión formal la restricción: ''only the word that I speak to you, that you shall speak''. La versión española conserva esa misma doble fuerza mediante ''pero solo la palabra que yo te hable, eso hablarás'', sin introducir necesidad modal extra ni perder el orden enfático del hebreo.'
  spanish_consistency_notes:
  - YHWH se rinde como 'Yahvé' de forma consistente.
  - Se mantiene 'ángel' para מַלְאַךְ por el contexto narrativo sobrenatural.
  - '''Palabra'' se usa para דָּבָר por la relación con ''hablar'' en el mismo versículo.'
  - '''Oficiales'' evita un falso tono monárquico que ''príncipes'' podría sugerir en español.'
  - La puntuación reproduce un discurso directo fluido y publicable en español bíblico moderno.
