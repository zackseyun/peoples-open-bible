  text: so that they even carried the sick out into the streets and laid them on cots and mats[a], so that as Peter was coming by[c][b], even his shadow might overshadow some of them.
  footnotes:
  - marker: a
    text: Or 'into the public squares.' The Greek πλατείας can refer to broad streets or open public areas.
    reason: lexical_alternative
  - marker: b
    text: Or 'beds and pallets.' The Greek distinguishes two kinds of bedding or sleeping surfaces.
    reason: lexical_alternative
  - marker: c
    text: 'The verse reports the people''s intention: they positioned the sick so that even Peter''s shadow might overshadow them; it does not explicitly say here that the shadow itself healed.'
    reason: cross_reference
translation:
  language: ko
  text: 그래서 사람들은 병든 사람들을 거리로 메어다가 작은 침상이나 자리에 눕히기까지 하였습니다. 그것은 베드로가 지나갈 때, 그의 그림자라도 누구에게든 드리워지게 하기 위함이었습니다.
  philosophy: optimal-equivalence
