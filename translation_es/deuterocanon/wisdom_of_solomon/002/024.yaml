translation:
  language: es
  text: Pero por la envidia del diablo la muerte entró en el mundo, y los que son de su porción[a] la prueban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «los que son de su porción la ponen a prueba / la tientan». El giro griego es difícil: «porción» traduce μερίς con bastante literalidad y puede entenderse como parte, lote, asignación o lado. El sentido probable es que quienes se alinean con el diablo quedan sometidos al poder de la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φθόνῳ
  english_pob_choice: through the devil’s envy
  chosen_spanish: por la envidia
  alternatives_spanish:
  - a causa de la envidia
  - por medio de la envidia
  lexicon: BDAG
  rationale: El dativo expresa causa o medio. En español, «por la envidia» conserva esa relación causal/instrumental con naturalidad y sin añadir más de lo que el griego dice.
- source_word: διαβόλου
  english_pob_choice: the devil’s
  chosen_spanish: del diablo
  alternatives_spanish:
  - del acusador
  - del calumniador
  lexicon: BDAG
  rationale: En este contexto sapiencial judío-griego, διάβολος funciona como figura personal del mal; «diablo» mantiene esa fuerza teológica mejor que un genérico como «acusador» o «calumniador».
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Equivalencia directa y natural. No hay motivo contextual para ampliar o restringir el término.
- source_word: εἰσῆλθεν εἰς τὸν κόσμον
  english_pob_choice: entered into the world
  chosen_spanish: entró en el mundo
  alternatives_spanish:
  - entró al mundo
  - llegó al mundo
  lexicon: BDAG
  rationale: «Entró en el mundo» reproduce la imagen de ingreso del griego con español idiomático y formal.
- source_word: πειράζουσιν
  english_pob_choice: test it
  chosen_spanish: la prueban
  alternatives_spanish:
  - la ponen a prueba
  - la tientan
  lexicon: BDAG
  rationale: El verbo puede significar probar, tentar o poner a prueba. Como el objeto es «la muerte», en español «probar» comunica mejor la idea de entrar en contacto con su realidad o poder sin forzar una personificación indebida.
- source_word: αὐτὸν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: BDAG
  rationale: Aunque el pronombre griego es masculino por concordar con θάνατος, en español «muerte» es femenino; por eso el referente natural es «la».
- source_word: οἱ τῆς ἐκείνου μερίδος ὄντες
  english_pob_choice: those who belong to his portion
  chosen_spanish: los que son de su porción
  alternatives_spanish:
  - los que pertenecen a su parte
  - los de su bando
  lexicon: BDAG
  rationale: «Porción» refleja μερίς de manera bastante literal. En español, «ser de su porción» conserva la rareza del giro y mantiene el matiz de pertenencia/adscripción sin reemplazarlo por una expresión más interpretativa.
theological_decisions:
- issue: Sentido de διάβολος
  english_pob_reading: a personal evil figure, rendered 'the devil'
  chosen_spanish_reading: una figura personal del mal, rendida como «el diablo»
  alternative_spanish_readings:
  - un simple calumniador
  - un acusador genérico
  rationale: La tradición sapiencial de este pasaje apunta a una entidad personal, no solo a un funcionario semántico de «calumniar». «Diablo» preserva mejor el peso teológico que el texto presupone.
  doctrine_reference: 'Translation philosophy: primacy of the original-language sense without diluting established theological force'
- issue: Sentido de πειράζουσιν αὐτόν
  english_pob_reading: those aligned with the devil test it
  chosen_spanish_reading: los que están del lado del diablo prueban la muerte
  alternative_spanish_readings:
  - los que están con él la tientan
  - los que son de su porción la ponen a prueba
  rationale: El griego es idiomático y admite varias lecturas. La POB inglesa optó por «test it» tras revisar la literalidad, pero aquí «la prueban» comunica de forma clara la relación con la muerte sin afirmar más de lo que el texto asegura.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the clause''s ambiguity where the source is difficult'
- issue: Referencia de αὐτόν con θάνατος
  english_pob_reading: it
  chosen_spanish_reading: la muerte como referente femenino en español
  alternative_spanish_readings:
  - lo
  rationale: Se mantiene el referente semántico de θάνατος, pero se adapta al género natural de «muerte» en español. Esto evita una incongruencia gramatical sin cambiar el sentido.
  doctrine_reference: 'Translation philosophy: Spanish grammatical naturalness under source control'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que revirtió «experience it» a «test it» para acercarse más a πειράζουσιν. La propuesta española conserva esa mayor literalidad con «la prueban», pero también reconoce en nota la dificultad idiomática del segundo miembro de la frase.
  spanish_consistency_notes:
  - Se mantiene «diablo» para διάβολος, conforme al valor personal del término en este contexto.
  - Se usa «muerte» de forma directa y natural; el pronombre del segundo hemistiquio se ajusta al género español femenino.
  - «Porción» se conserva por fidelidad formal a μερίς, evitando sustituirlo por un término más interpretativo como «bando» en el texto principal.
  - La nota mantiene la alternativa literal porque el sintagma final sigue siendo semánticamente oscuro y la POB inglesa también preserva esa tensión.
