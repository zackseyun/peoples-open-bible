translation:
  text: And when he pursued him with chariots and a multitude of people[a], you overwhelmed him in the depths of the sea; but those who had put their trust in you, who rule over all creation[b], you brought safely through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The verse alludes to the Exodus: the Egyptian pursuer was overwhelmed in the sea, while God''s people were brought safely through.'
    reason: cross_reference
  - marker: b
    text: Or 'the sovereign over all creation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδιώξαντα
  chosen: pursued
  alternatives:
  - pressed hard after
  - chased down
  lexicon: LSJ
  rationale: The participle denotes active pursuit in a hostile context. 'Pursued' is natural English and preserves the Exodus allusion without over-paraphrasing.
- source_word: σὺν ἅρμασιν καὶ ὄχλων πλήθει
  chosen: with chariots and a multitude of crowds
  alternatives:
  - with chariots and a great throng
  - with chariots and a multitude
  lexicon: LSJ
  rationale: ἅρμασιν is straightforwardly 'chariots.' ὄχλων πλήθει is literally 'a multitude of crowds/host,' emphasizing numerical mass. The phrase is rendered transparently, though slightly smoothed into idiomatic English.
- source_word: ἐπέκλυσας
  chosen: overwhelmed
  alternatives:
  - flooded over
  - submerged
  lexicon: LSJ
  rationale: The verb conveys inundating or overwhelming with water. 'Overwhelmed' fits the sea context and reads naturally in English while preserving the force of divine judgment.
- source_word: βάθει θαλάσσης
  chosen: in the depths of the sea
  alternatives:
  - by the depth of the sea
  - in the deep sea
  lexicon: LSJ
  rationale: The dative is best taken instrumentally/locatively in context. 'In the depths of the sea' captures both the setting and the destructive force, echoing the Exodus tradition.
- source_word: ἐμπιστεύσαντας ἐπὶ σοὶ
  chosen: had put their trust in you
  alternatives:
  - had trusted in you
  - had relied on you
  lexicon: LSJ
  rationale: The construction means to place confidence in someone. 'Put their trust in you' is slightly fuller and preserves the personal, covenantal sense.
- source_word: τῷ τῆς ἁπάσης κτίσεως δυναστεύοντι
  chosen: the one who rules over all creation
  alternatives:
  - the sovereign over all creation
  - the one exercising dominion over all creation
  lexicon: LSJ
  rationale: δυναστεύω denotes ruling or exercising dominion. 'The one who rules over all creation' is clear modern English and preserves the theological claim of universal sovereignty.
- source_word: σώους διεκόμισας
  chosen: you brought safely through
  alternatives:
  - you conveyed safely
  - you carried across unharmed
  lexicon: LSJ
  rationale: The phrase combines safe preservation (σώους) with transport across/through danger (διακομίζω). 'Brought safely through' captures both rescue and passage, fitting the Red Sea context.
