    text: 'O: «para el juicio de Yahvé», es decir, para casos gobernados por la ley de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y regresaron a Jerusalén». Algunos entienden el texto de otro modo, como «y se sentaron» o «y habitaron en Jerusalén», porque la lectura recibida es algo abrupta en el contexto.'
    reason: alternative_reading
  revision_rationale: Se reemplaza «estableció entre» por «nombró de entre» para reflejar mejor el hebreo administrativo y el valor partitivo de מִן/מֵ. Se mueve la nota [a] al sintagma «Yahvé», que es donde realmente comenta «el juicio de Yahvé». Se corrige la nota [b] eliminando el anglicismo «dwelling» y normalizando las alternativas en español.
