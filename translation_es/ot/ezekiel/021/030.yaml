  - severity: low
    issue: La nota de «profanado» puede expresarse con mejor español
    rationale: «Y tú, profanado impío» suena algo trabado. «oh príncipe impío y profanado de Israel» o similar sería más idiomático como alternativa explicativa; no hace falta replicar de forma rígida el orden hebreo dentro de una nota de alternativa.
