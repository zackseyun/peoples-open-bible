translation:
  language: es
  text: Porque ya no habrá ninguna visión falsa ni adivinación halagadora dentro de la casa de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adivinación suave». El adjetivo hebreo significa literalmente «suave/liso»; aquí probablemente se refiere a un hablar halagador o engañosamente tranquilizador.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o razón de lo afirmado antes; en español, 'Porque' conserva bien el valor causal/explanatorio sin sonar forzado.
- source_word: לֹא ... עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no volverá a
  lexicon: HALOT
  rationale: La combinación expresa cese desde este punto; 'ya no' es la forma más natural y fiel en español.
- source_word: חֲזוֹן שָׁוְא
  english_pob_choice: false vision
  chosen_spanish: visión falsa
  alternatives_spanish:
  - visión vana
  - visión vacía
  - visión mentirosa
  lexicon: HALOT
  rationale: שָׁוְא comunica falsedad, vanidad o vaciedad; 'visión falsa' transmite con claridad el sentido profético sin arcaísmo.
- source_word: מִקְסַם
  english_pob_choice: divination
  chosen_spanish: adivinación
  alternatives_spanish:
  - oráculo
  - sortilegio
  lexicon: HALOT
  rationale: Es el término habitual para prácticas mánticas ilícitas; 'adivinación' es el equivalente español más directo y comprensible.
- source_word: חָלָק
  english_pob_choice: flattering
  chosen_spanish: halagadora
  alternatives_spanish:
  - suave
  - lisa
  - de apariencia suave
  lexicon: HALOT
  rationale: El adjetivo significa literalmente 'liso/suave', pero aquí describe palabras o pronunciamientos engañosamente agradables; 'halagadora' conserva la fuerza idiomática moralmente crítica.
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - en
  lexicon: HALOT
  rationale: Indica ubicación o esfera interna; 'dentro de' es natural y preciso con 'la casa de Israel'.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Mantiene el registro profético y la imaginería colectiva del hebreo, en línea con la decisión inglesa de conservar 'house of Israel'.
theological_decisions:
- issue: Alcance de la denuncia profética
  english_pob_reading: The verse condemns both false visionary claims and deceptive divinatory pronouncements among Israel.
  chosen_spanish_reading: El versículo condena tanto las visiones falsas como la adivinación engañosa entre el pueblo de Israel.
  alternative_spanish_readings:
  - El versículo condena solo una forma de engaño profético.
  - El versículo debería leerse como 'adivinación suave' en sentido más literal.
  rationale: La estructura hebrea une dos expresiones de revelación ilegítima. Conviene conservar ambas y no reducir una a la otra; 'halagadora' mantiene la tensión entre literalidad ('suave') y función contextual (lenguaje engañosamente reconfortante).
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el registro auditado en inglés POB; no hubo revisiones posteriores que alteraran la lectura, y la traducción inglesa final coincide sustancialmente con el sentido léxico y profético del hebreo.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo de dos elementos condenados: ''visión falsa'' y ''adivinación halagadora''.'
  - Se mantuvo 'casa de Israel' para respetar la imaginería profética documentada.
  - '''Ya no habrá'' refleja el valor de cese de לֹא ... עוֹד con naturalidad en español.'
  - El adjetivo 'halagadora' evita el calco mecánico de 'suave' sin perder la tensión semántica documentada.
