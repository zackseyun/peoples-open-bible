translation:
  language: es
  text: 'Y los siervos de Saúl le dijeron[a]: «Mira ahora, un espíritu malo de parte de Dios te aterra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu dañino o angustiante de parte de Dios». El hebreo puede describir al espíritu como malo o como causante de daño o angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And ... said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - y dijeron
  - entonces dijeron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «le dijeron» comunica con naturalidad el acto de habla en secuencia sin forzar un calco rígido.
- source_word: עַבְדֵי שָׁאוּל
  english_pob_choice: Saul’s servants
  chosen_spanish: los servidores de Saúl
  alternatives_spanish:
  - los siervos de Saúl
  - los criados de Saúl
  lexicon: HALOT
  rationale: «Servidores» mantiene el contexto cortesano y evita la dureza de «esclavos»; además suena digno y claro en español bíblico moderno.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El clítico dativo español es la forma más natural para expresar el complemento indirecto.
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor,
  - Mira, te rogamos
  lexicon: HALOT
  rationale: La pareja marca atención e inmediatez; «Mira ahora» conserva esa fuerza discursiva en un español moderno y directo.
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: a spirit from God
  chosen_spanish: un espíritu de parte de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - un espíritu divino
  lexicon: HALOT
  rationale: «De parte de Dios» expresa la relación de procedencia/mandato sin identificarlo con el Espíritu Santo; preserva la tensión del hebreo en un castellano natural.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - maligno
  - dañino
  - aflictivo
  lexicon: HALOT
  rationale: En español, «malo» reproduce la ambigüedad de רָעָה entre mal moral y efecto dañino/aflictivo, permitiendo mantener la tensión semántica indicada por el original.
- source_word: מְבַעִתֶּךָ
  english_pob_choice: is terrifying you
  chosen_spanish: te aterra
  alternatives_spanish:
  - te asusta
  - te espanta
  - te infunde terror
  lexicon: HALOT
  rationale: El participio expresa acción continua; «te aterra» conserva la intensidad de terror/dread con una frase breve y idiomática.
theological_decisions:
- issue: Cómo traducir רוּחַ אֱלֹהִים רָעָה sin suavizar la procedencia divina ni confundirla con el Espíritu Santo
  english_pob_reading: an evil spirit from God
  chosen_spanish_reading: un espíritu malo de parte de Dios
  alternative_spanish_readings:
  - un espíritu dañino de parte de Dios
  - un espíritu malo de Dios
  rationale: La formulación mantiene explícita la procedencia divina, pero evita sugerir identidad con el Espíritu de Dios. «De parte de Dios» conserva la relación sin resolver la tensión teológica que el texto presenta.
  doctrine_reference: Preservar la tensión textual sin importar una conclusión doctrinal posterior.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - Se prefirió «Dios» para אֱלֹהִים según el estándar del proyecto.
  - Se evitó «SEÑOR» porque el hebreo aquí nombra explícitamente a אֱלֹהִים, no al Tetragrámaton.
  - Se usó «espíritu» en minúscula porque no se trata del Espíritu Santo por decisión contextual del pasaje.
  - «Servidores» refleja el contexto cortesano y mantiene la dignidad del español bíblico moderno.
