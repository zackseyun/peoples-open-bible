translation:
  language: es
  text: Y acamparé[a] contra ti todo alrededor, y te pondré sitio con obras de asedio[b][c], y levantaré contra ti torres de asedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como un círculo’ o ‘en forma de anillo’ para ‘todo alrededor’.
    reason: lexical_alternative
  - marker: b
    text: O ‘una guarnición’ o ‘un puesto de asedio’ para ‘obras de asedio’.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo puede referirse en sentido más amplio a fortificaciones de asedio; alternativas como ‘baluartes de asedio’ o ‘rampas de asedio’ también son posibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנִיתִי
  english_pob_choice: And I will encamp
  chosen_spanish: Y acamparé
  alternatives_spanish:
  - Y acamparé en campamento
  - Y estableceré mi campamento
  lexicon: HALOT
  rationale: חנה expresa la acción militar de acampar o hacer campamento. ‘Acamparé’ conserva el sentido directo y el tono de amenaza divina sin volverlo más explicativo de lo que el hebreo requiere.
- source_word: כַדּוּר
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - como un círculo
  - en forma de anillo
  lexicon: HALOT
  rationale: El sustantivo transmite una idea de cercamiento circular. En español, ‘todo alrededor’ comunica de manera natural el cerco completo, mientras que las alternativas más literales se conservan como posibilidades de lectura.
- source_word: עָלָיִךְ / עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: En contexto de guerra y juicio, על con sufijo femenino singular tiene valor hostil. ‘Contra ti’ expresa mejor la adversidad que una opción meramente espacial.
- source_word: וְצַרְתִּי
  english_pob_choice: and I will besiege
  chosen_spanish: y te pondré sitio
  alternatives_spanish:
  - y te sitiaré
  - y te asediaré
  lexicon: HALOT
  rationale: צור en este contexto es terminología militar de asedio. ‘Poner sitio’ es una expresión idiomática española clara y fiel; ‘sitiar’ y ‘asediar’ quedan como alternativas válidas.
- source_word: מֻצָּב
  english_pob_choice: with siegeworks
  chosen_spanish: con obras de asedio
  alternatives_spanish:
  - con una guarnición
  - con un puesto de asedio
  - con un emplazamiento fijo
  lexicon: HALOT
  rationale: El término puede referirse a algo establecido o apostado. Dado el paralelismo con el cerco y las torres de asedio, ‘obras de asedio’ mantiene la referencia militar amplia sin fijarla artificialmente en una sola pieza técnica.
- source_word: וַהֲקִימֹתִי
  english_pob_choice: and I will raise up
  chosen_spanish: y levantaré
  alternatives_spanish:
  - y alzaré
  - y erigiré
  lexicon: HALOT
  rationale: El causativo de קום expresa poner en pie o levantar estructuras. ‘Levantaré’ funciona de modo natural en español y mantiene la imagen de construcción militar.
- source_word: מְצֻרוֹת
  english_pob_choice: siege towers
  chosen_spanish: torres de asedio
  alternatives_spanish:
  - fortificaciones de asedio
  - baluartes de asedio
  - rampas de asedio
  lexicon: HALOT
  rationale: El término alude a estructuras de asedio levantadas contra una ciudad. ‘Torres de asedio’ es una equivalencia transparente y tradicional en español; se preservan alternativas porque el hebreo puede abarcar fortificaciones ofensivas en sentido más amplio.
theological_decisions:
- issue: Agencia divina directa en el juicio
  english_pob_reading: The first-person verbs are rendered straightforwardly with God as the direct agent of the siege.
  chosen_spanish_reading: Los verbos en primera persona se conservan de manera directa, presentando a Dios como agente inmediato del asedio.
  alternative_spanish_readings:
  - Dios permite indirectamente un ejército humano
  - Dios ordena el asedio por medio de intermediarios
  rationale: El hebreo usa verbos explícitos en primera persona singular. La traducción mantiene esa agencia divina directa sin diluirla en una formulación permisiva o indirecta, preservando la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el auditable English POB; no se detectaron revisiones posteriores que alteren el sentido. Se mantuvo la equivalencia óptima del original con terminología militar clara en español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del versículo porque aquí el hablante aparece en primera persona sin el tetragrámaton explícito.
  - Se eligió ‘poner sitio’ para conservar el matiz militar de ‘besiege’ sin perder naturalidad en español.
  - Se evitó ‘SEÑOR’ por consistencia con la norma del proyecto de traducir el nombre divino cuando aparece explícitamente, aunque aquí no aparece en el texto hebreo de este versículo.
