translation:
  language: es
  text: 'Entonces le dijo a Abraham[a]: «Expulsa a esta esclava y a su hijo, porque el hijo de esta esclava no heredará con mi hijo Isaac».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Echa fuera a esta esclava y a su hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר לְאַבְרָהָם
  english_pob_choice: So she said to Abraham
  chosen_spanish: Entonces le dijo a Abraham
  alternatives_spanish:
  - Y le dijo a Abraham
  - Así le dijo a Abraham
  lexicon: WLC; HALOT
  rationale: El waw narrativo se expresa naturalmente con «entonces» para mantener la secuencia sin sonar rígido. Se conserva el destinatario explícito, Abraham, como en el hebreo y el inglés auditado.
- source_word: גָּרֵשׁ
  english_pob_choice: Drive out
  chosen_spanish: Expulsa
  alternatives_spanish:
  - Echa fuera
  - Despide
  lexicon: HALOT
  rationale: El imperativo de גרשׁ implica expulsión fuerte. «Expulsa» preserva esa fuerza en español y evita suavizarlo con un simple «despide».
- source_word: הָאָמָה
  english_pob_choice: slave woman
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  lexicon: HALOT
  rationale: אָמָה señala una mujer en condición servil/esclava; en este contexto la servidumbre legal y social es relevante. En español, «esclava» mantiene mejor la fuerza léxica que «sierva».
- source_word: בְּנָהּ
  english_pob_choice: her son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de ella
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español; no requiere expansión.
- source_word: בֶּן הָאָמָה הַזֹּאת
  english_pob_choice: the son of this slave woman
  chosen_spanish: el hijo de esta esclava
  alternatives_spanish:
  - el hijo de esta esclava mujer
  - ese hijo de la esclava
  lexicon: HALOT
  rationale: La repetición del demostrativo tiene tono despectivo o distanciador. «Esta esclava» reproduce esa referencia marcada sin añadir palabras ajenas al hebreo.
- source_word: יִירַשׁ
  english_pob_choice: will not inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - recibirá herencia
  - será heredero
  lexicon: HALOT
  rationale: נָחַל/יָרַשׁ aquí significa entrar en la herencia. «Heredará» conserva el sentido jurídico y bíblico del verbo con buena naturalidad en español.
- source_word: עִם בְּנִי עִם יִצְחָק
  english_pob_choice: with my son Isaac
  chosen_spanish: con mi hijo, con Isaac
  alternatives_spanish:
  - junto con mi hijo Isaac
  - con mi hijo Isaac
  lexicon: HALOT
  rationale: El hebreo repite עִם para enfatizar la exclusión relativa a Isaac. Se conserva esa repetición mediante «con mi hijo, con Isaac», manteniendo la tensión retórica del original.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo base y el audit trail inglés, incluyendo la fuerza del imperativo גרשׁ y la referencia despectiva/reiterada a הָאָמָה הַזֹּאת. Se ajustó la cláusula final para conservar en español la repetición enfática de עִם sin perder fluidez.
  spanish_consistency_notes:
  - Se prefirió «esclava» para הָאָמָה en coherencia con la terminología POB sobre términos de servidumbre con fuerza léxica.
  - Se mantuvo «Isaac» sin transliteración ni título, conforme al uso estándar del proyecto.
  - Se usó puntuación de cita en estilo español, con dos puntos implícitos en la narración y comillas angulares.
  - No se introdujo «SEÑOR» ni otras sustituciones teológicas ajenas al texto.
