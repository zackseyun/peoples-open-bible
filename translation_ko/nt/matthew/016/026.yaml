base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/026.yaml
  text: 'For what will it profit a man if he gains the whole world but forfeits his life? Or what will a man give in exchange for his life?[a]'
translation:
  language: ko
  text: '「사람이 온 세상을 얻고도 자기 생명을 잃는다면 무슨 유익이 있겠느냐? 또는 사람이 자기 생명과 바꿀 무엇을 줄 수 있겠느냐?」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 두 곳 모두 「자기 영혼」. 헬라어 ψυχή는 맥락에 따라 「생명·자아·영혼」을 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζημιωθῇ
  english_pob_choice: forfeits
  chosen_korean: 잃는다면
  alternatives_korean:
  - 손해를 본다면
  lexicon: BDAG
  rationale: ζημιόω는 「손해 보다·박탈당하다」. 「생명을 잃다」가 25절과 호응한다.
- source_word: ἀντάλλαγμα
  english_pob_choice: in exchange
  chosen_korean: 바꿀 무엇
  lexicon: BDAG
  rationale: ἀντάλλαγμα는 「교환물·대가」. 「바꿀 무엇」으로 자연스럽게 옮긴다.
