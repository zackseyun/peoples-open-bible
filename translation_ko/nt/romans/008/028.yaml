id: ROM.8.28
reference: Romans 8:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἴδαμεν δὲ ὅτι τοῖς ἀγαπῶσι τὸν θεὸν πάντα ⸀συνεργεῖ εἰς ἀγαθόν, τοῖς κατὰ πρόθεσιν κλητοῖς οὖσιν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/028.yaml
  text: And we know that for those who love God, all things work together for good—for those who are called according to purpose.
translation:
  language: ko
  text: 우리는 압니다. 하나님을 사랑하는 사람들, 곧 그 뜻을 따라 부르심을 받은 사람들에게는 모든 일이 함께 선을 이루도록 작용한다는 것을[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문의 주어는 결정짓기 어렵다. (1) 「모든 일이」(πάντα가 주격), (2) 「하나님이 모든 일을」(일부 사본은 ὁ θεός를 명시), (3) 「성령이 모든 일을」(8:26-27의 성령이 주어로 연속) 모두 가능하다. 본문은 가장 자연스러운 (1)을 채택하되, 주어 모호성은 의도적으로 보존되어 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα συνεργεῖ
  english_pob_choice: all things work together
  chosen_korean: 모든 일이 함께 ... 작용한다
  alternatives_korean:
  - 하나님이 모든 일을 함께 작용시키신다
  - 성령이 모든 일을 함께 작용시키신다
  lexicon: BDAG
  rationale: 주어 모호성을 본문에 보존. πάντα(중성 복수)를 주격으로 보는 해석이 헬라어상 가장 자연스러움.
- source_word: τοῖς ἀγαπῶσι τὸν θεὸν
  english_pob_choice: for those who love God
  chosen_korean: 하나님을 사랑하는 사람들
  lexicon: BDAG
  rationale: 여격 표준.
- source_word: κατὰ πρόθεσιν
  english_pob_choice: according to purpose
  chosen_korean: 그 뜻을 따라
  lexicon: BDAG
  rationale: 하나님의 작정/계획. 「뜻」으로 평이하게.
- source_word: κλητοῖς
  english_pob_choice: called
  chosen_korean: 부르심을 받은
  lexicon: BDAG
  rationale: 수동적 부르심.
theological_decisions:
- issue: 8:28의 주어 모호성 보존
  chosen_reading: 「모든 일이」를 주어로 채택 — 「하나님이」 또는 「성령이」 주어 가능성은 각주에 보존
  alternative_readings:
  - 사본 차이를 따라 「하나님이 모든 일을 함께 작용시키신다」 채택
  - 8:26-27의 성령을 주어로 연속하여 「성령이 모든 일을 함께 작용시키신다」
  rationale: 바울의 헬라어는 의도적으로 주어 모호성을 띤다. 본문 결정을 최소화하고 본문이 주는 신학적 위로(하나님께서 신자의 선을 위해 만물을 다스리신다)를 약화시키지 않으면서, 단정적 명시는 피한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension where ambiguity is genuine'
