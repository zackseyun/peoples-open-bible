translation:
  language: es
  text: Escucha mi súplica y sé favorable[a] a tu heredad, y convierte nuestro duelo en alegría, para que, viviendo, cantemos alabanzas a tu nombre, oh Señor, y no destruyas la boca de los que te alaban[b]. Y todo Israel clamó con todas sus fuerzas, porque la muerte estaba ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sé favorable» traduce de manera cercana el sentido de ἱλάσθητι; también puede entenderse como «sé misericordioso» o «muéstrate propicio». «Tu heredad» expresa τῷ κλήρῳ σου, literalmente «tu lote/porción», con el sentido de la porción o pueblo que pertenece a Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no destruyas la boca de los que te alaban», una imagen concreta de no silenciar a tus adoradores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κουσον
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Atiende
  lexicon: BDAG
  rationale: En lenguaje de oración, ἀκούω imperativo se expresa con naturalidad como «escucha», que mantiene la apelación directa y solemne sin sonar forzado.
- source_word: δέησις
  english_pob_choice: petition
  chosen_spanish: súplica
  alternatives_spanish:
  - petición
  - ruego
  lexicon: BDAG
  rationale: «Súplica» conserva el matiz de petición urgente y reverente; en español suena más natural en oración que un calco como «petición».
- source_word: ἱλάσθητι
  english_pob_choice: be gracious
  chosen_spanish: sé favorable
  alternatives_spanish:
  - sé misericordioso
  - muéstrate propicio
  lexicon: BDAG
  rationale: La forma verbal expresa favor/propiciación. «Sé favorable» comunica el sentido en español sin cargar de antemano una terminología técnica de expiación.
- source_word: τῷ κλήρῳ σου
  english_pob_choice: to your lot
  chosen_spanish: a tu suerte
  alternatives_spanish:
  - a tu heredad
  - a tu pueblo asignado
  lexicon: BDAG
  rationale: «Suerte» reproduce con cercanía el valor básico de κλῆρος como porción asignada o lote. Se mantiene la ambigüedad del texto griego, que puede aludir a la porción/posesión del pueblo de Dios.
- source_word: στρέψον τὸ πένθος ἡμῶν εἰς εὐφροσύνην
  english_pob_choice: turn our mourning into gladness
  chosen_spanish: vuelve nuestro duelo en alegría
  alternatives_spanish:
  - convierte nuestro luto en gozo
  - cambia nuestro dolor en regocijo
  lexicon: BDAG
  rationale: «Vuelve... en» conserva el giro idiomático de transformación. «Duelo» y «alegría» son equivalentes claros y dignos para πένθος y εὐφροσύνη.
- source_word: ἵνα ζῶντες
  english_pob_choice: so that, living
  chosen_spanish: para que, viviendo
  alternatives_spanish:
  - de modo que, estando vivos
  - para que, al vivir
  lexicon: BDAG
  rationale: La construcción se mantiene compacta y causal-final; «viviendo» enlaza de manera natural con el propósito de la alabanza.
- source_word: ὑμνῶμεν σου τὸ ὄνομα
  english_pob_choice: we may sing praise to your name
  chosen_spanish: cantemos alabanzas a tu nombre
  alternatives_spanish:
  - te cantemos himnos a tu nombre
  - alabemos con cánticos tu nombre
  lexicon: BDAG
  rationale: ὑμνέω implica alabanza cantada. «Cantemos alabanzas» conserva ese matiz sin sonar arcaico.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: BDAG
  rationale: Aquí el texto griego dice Κύριε; en español, la invocación litúrgica natural es «oh Señor». No se sustituye por Yahvé porque la forma fuente es griega y funciona como vocativo de oración.
- source_word: μὴ ἀφανίσῃς στόμα αἰνούντων σου
  english_pob_choice: do not destroy the mouth of those who praise you
  chosen_spanish: no destruyas la boca de los que te alaban
  alternatives_spanish:
  - no silencies la boca de los que te alaban
  - no hagas desaparecer la boca de los que te alaban
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de «boca», que en español es comprensible como metonimia de la alabanza vocal. «Destruyas» sigue de cerca ἀφανίζω.
- source_word: ἐκέκραξαν ἐξ ἰσχύος αὐτῶν
  english_pob_choice: cried out with all their strength
  chosen_spanish: clamó con todas sus fuerzas
  alternatives_spanish:
  - gritó con toda su fuerza
  - exclamó con gran fuerza
  lexicon: BDAG
  rationale: En español, «clamar con todas sus fuerzas» comunica bien el ímpetu colectivo e intenso del grito. Se respeta el plural colectivo del contexto con el sujeto «todo Israel».
- source_word: θάνατος αὐτῶν ἐν ὀφθαλμοῖς αὐτῶν
  english_pob_choice: because death was before their eyes
  chosen_spanish: porque la muerte estaba ante sus ojos
  alternatives_spanish:
  - porque la muerte estaba delante de sus ojos
  - porque veían la muerte de frente
  lexicon: BDAG
  rationale: «Ante sus ojos» refleja el modismo griego de peligro inminente y mantiene la fuerza visual de la expresión.
theological_decisions:
- issue: κύριε / vocativo divino en una adición griega de Ester
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Señor
  alternative_spanish_readings:
  - Señor
  - oh Yahvé
  rationale: El testimonio griego emplea Κύριε como vocativo. En español, «oh Señor» conserva el tono de oración y la convención reverente sin forzar la identificación explícita con el tetragrámaton, que aquí no aparece en la forma fuente.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; deuterocanonical Greek vocative handling'
- issue: τῷ κλήρῳ σου como imagen de la relación pactual de Dios con Israel
  english_pob_reading: your lot
  chosen_spanish_reading: tu suerte
  alternative_spanish_readings:
  - tu heredad
  - tu pueblo asignado
  rationale: La traducción mantiene la ambigüedad lexical de κλῆρος. «Tu suerte» es suficientemente literal y deja abierta la referencia al pueblo/aportación asignada por Dios sin expandir indebidamente el texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
- issue: Imagen de la boca de los que alaban
  english_pob_reading: do not destroy the mouth of those who praise you
  chosen_spanish_reading: no destruyas la boca de los que te alaban
  alternative_spanish_readings:
  - no silencies la boca de los que te alaban
  - no borres la boca de los que te alaban
  rationale: 'Se preserva la metáfora corporal del griego. En español la frase puede sonar extraña, pero la extrañeza es significativa: el pedido no es solo que continúe la vida, sino que no se extinga la alabanza.'
  doctrine_reference: 'DOCTRINE.md: preserve concrete imagery where the source is vivid'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que volvió a acercar τῷ κλήρῳ σου a «your lot» y simplificó el cierre a «because death was before their eyes». La versión española conserva esa cercanía léxica con «tu suerte» y refleja la cláusula final de forma directa.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριε conforme al vocativo griego y al uso reverente en español.
  - Se preserva la imaginería concreta de «boca» para στόμα, evitando una paráfrasis que diluya la metáfora.
  - «Suerte» se usa aquí en el sentido de lote/asignación; no se entiende como azar moderno.
  - La frase «clamó con todas sus fuerzas» corresponde al sujeto colectivo «todo Israel», aunque el verbo griego esté en singular en esta forma transmitida.
