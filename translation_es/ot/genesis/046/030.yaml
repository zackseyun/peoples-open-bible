translation:
  language: es
  text: 'Entonces Israel dijo a José[a]: «Ahora déjame morir, porque he visto tu rostro y que todavía estás vivo».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con un giro más formal: «Entonces Israel dijo a José: “Ahora moriré, después de ver tu rostro, porque todavía estás vivo”». El hebreo es compacto e idiomático; el texto principal expresa su sentido en español natural.'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «porque he visto tu rostro y sé que todavía estás vivo», pero el hebreo no expresa explícitamente «sé».
    reason: clarifies_compact_hebrew_syntax
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia narrativa con español natural y digno.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a Israel; se mantiene el nombre del pacto sin armonizarlo a Jacob.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición direccional se vierte con el español estándar «a».
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma castellana habitual y clara.
- source_word: אָמ֣וּתָה
  english_pob_choice: let me die
  chosen_spanish: déjame morir
  alternatives_spanish:
  - que muera
  - permíteme morir
  - voy a morir
  lexicon: HALOT
  rationale: El cohortativo expresa intención o resolución afectiva; «déjame morir» conserva mejor esa fuerza que una simple futura o modalización más débil.
- source_word: הַפָּעַם
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Esta vez
  - Por fin
  lexicon: HALOT
  rationale: Aunque literalmente es «la vez/esta vez», aquí funciona idiomáticamente como marcador del momento presente tras la angustia; «Ahora» es natural sin añadir énfasis extra.
- source_word: אַחֲרֵי
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - después de
  - ya que
  lexicon: HALOT
  rationale: En esta construcción introduce la circunstancia que hace posible la declaración; «porque» comunica con claridad la relación explicativa en español.
- source_word: רְאוֹתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - después de ver
  - habiendo visto
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo se vierte como verbo finito en español idiomático, preservando el valor de acción cumplida.
- source_word: אֶת פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: Se retiene la imagen corporal concreta del hebreo; «rostro» suena más digno y bíblico en español que «cara», sin perder literalidad.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'La partícula introduce el contenido explicativo de lo visto: que José sigue vivo. En español, «que» mantiene la subordinación directa sin expansión interpretativa.'
- source_word: עוֹדְךָ חָי
  english_pob_choice: you are still alive
  chosen_spanish: todavía estás vivo
  alternatives_spanish:
  - aún vives
  - sigues vivo
  lexicon: HALOT
  rationale: La idea de continuidad se expresa de manera natural con «todavía estás vivo»; conserva el sentido de permanencia sin sobrecargar la frase.
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del audit trail: evita añadir «y sé» o equivalentes no explícitos, y preserva el matiz cohortativo de אָמוּתָה con una formulación imperativa suave («déjame morir»). También mantiene la imagen concreta de «rostro» y la afirmación de vida continuada con «todavía estás vivo».'
  spanish_consistency_notes:
  - Se conserva «Israel» como nombre del patriarca según el hebreo, no se sustituye por «Jacob».
  - Se usa «José» para el nombre propio bíblico en español estándar.
  - Se mantiene el paralelismo compacto de la frase hebrea sin añadir conectores explicativos ajenos al texto.
  - No se introducen notas porque el sentido español principal ya cubre la única tensión léxica relevante del cohortativo.
