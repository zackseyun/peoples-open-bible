translation:
  language: es
  text: Oh Yahvé[a], amo la morada de tu casa, el lugar donde habita tu gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «He amado la morada de tu casa, y el lugar de la morada de tu gloria»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, conforme a la política POB de transliterar el nombre personal de Dios en lugar de sustituirlo por un título. 'Yahvé' es la forma española más reconocible y readable para un público eclesial amplio.
- source_word: אָהַבְתִּי
  english_pob_choice: I love
  chosen_spanish: te amo
  alternatives_spanish:
  - te he amado
  - te amé
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía expresa aquí una confesión de afecto/adhesión estable. En español, el presente 'te amo' reproduce con naturalidad ese valor durativo y devocional, sin forzar un pasado.
- source_word: מְעוֹן
  english_pob_choice: habitation
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - habita
  lexicon: HALOT
  rationale: מְעוֹן designa un lugar de residencia o morada. 'Morada' es natural en español bíblico contemporáneo y preserva el matiz concreto sin sonar técnico.
- source_word: בֵּיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu templo
  - tu hogar
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de 'casa' para no sobreespecificar 'templo' más allá del hebreo, aunque el contexto sea cultual. Así se conserva la metáfora de pertenencia y morada.
- source_word: וּמְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - y el lugar
  - el sitio
  lexicon: HALOT
  rationale: 'מָקוֹם significa ''lugar''. En español, la coordinación implícita del hebreo se vuelve una apposición fluida: ''la morada de tu casa, el lugar...''.'
- source_word: מִשְׁכַּן
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  lexicon: HALOT
  rationale: Aunque מִשְׁכַּן es un sustantivo ('morada/tabernáculo'), la lectura inglesa POB toma la frase como una expresión de lugar de residencia. En español, 'donde habita' conserva la idea verbal de presencia continua y evita una construcción demasiado pesada.
- source_word: כְּבוֹדֶךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: כָּבוֹד, en contexto divino, apunta a la gloria manifestada de Dios. 'Tu gloria' es la opción más directa y teológicamente fiel.
theological_decisions:
- issue: Nombre divino en el salmo
  english_pob_reading: Render the Tetragrammaton as Yahweh rather than LORD.
  chosen_spanish_reading: Renderizar יְהוָה como 'Yahvé' en el texto principal.
  alternative_spanish_readings:
  - SEÑOR
  - el SEÑOR
  rationale: La decisión preserva el nombre personal de Dios revelado a Israel y evita la sustitución tradicional por un título. Esto sigue la política POB de primacía del original y transparencia lexical.
  doctrine_reference: 'POB translation philosophy: original-language primacy and retention of the divine name.'
- issue: Relación entre 'casa' y 'lugar' en contexto cultual
  english_pob_reading: Retain 'your house' and 'the place where your glory dwells' rather than substituting 'temple'.
  chosen_spanish_reading: Conservar 'tu casa' y 'el lugar donde habita tu gloria' sin reemplazarlo por 'tu templo'.
  alternative_spanish_readings:
  - tu templo
  - la morada de tu templo
  rationale: El hebreo conserva una imagen concreta de casa/morada y no exige la explicitación 'templo'. Mantener la literalidad controlada deja visible la textura poética y la posible referencia al santuario sin imponer una equivalencia más interpretativa.
  doctrine_reference: Source-grounded poetic imagery; avoid over-specification beyond the Hebrew.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés: conserva el nombre divino, mantiene la imagen de ''casa/morada/lugar'' y adapta la estructura poética a un español natural. Frente a la alternativa formal del inglés (''I have loved...''), se opta por un presente devocional; frente a la construcción nominal pesada de מִשְׁכַּן, se usa una relativa verbal en español para conservar fluidez sin perder la idea de residencia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה.
  - '''Gloria'' se mantiene en sentido teológico, no como honor humano.'
  - '''Casa'' y ''morada'' se distinguen para reflejar בֵּיתֶךָ y מְעוֹן sin colapsar ambos en un solo término.'
  - La nota formal ofrece la alternativa más literal sin introducir terminología ajena al hebreo.
