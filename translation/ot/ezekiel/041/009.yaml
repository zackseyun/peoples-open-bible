id: EZK.41.9
reference: Ezekiel 41:9
source:
  edition: WLC
  text: רֹ֣חַב הַ/קִּ֧יר אֲֽשֶׁר לַ/צֵּלָ֛ע אֶל הַ/ח֖וּץ חָמֵ֣שׁ אַמּ֑וֹת וַ/אֲשֶׁ֣ר מֻנָּ֔ח בֵּ֥ית צְלָע֖וֹת אֲשֶׁ֥ר לַ/בָּֽיִת־־׃
translation:
  text: The width of the wall that belonged to the side chambers on the outside was five cubits[a], and the open area between the side chambers of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: the final clause may also be understood as ''and what was left free was the side-chamber structure belonging to the house'' or similar. The verse describes the layout around the temple building.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: The noun denotes spatial extent across something. 'Width' is the most natural modern architectural term in English.
- source_word: הַקִּיר
  chosen: the wall
  lexicon: HALOT
  rationale: קִיר refers to a wall, here in a building description. 'Wall' is the straightforward architectural rendering.
- source_word: אֲשֶׁר לַצֵּלָע
  chosen: that belonged to the side chambers
  alternatives:
  - of the side chamber
  - for the side chamber
  lexicon: HALOT
  rationale: צֵלָע in temple-building contexts refers to side structures/chambers rather than a generic 'rib' or 'side.' The singular may function collectively, so English plural 'side chambers' fits the context of the surrounding rooms.
- source_word: אֶל הַחוּץ
  chosen: on the outside
  alternatives:
  - outward
  - toward the outside
  lexicon: HALOT
  rationale: The phrase marks the exterior side/orientation of the wall. 'On the outside' is idiomatic and clear in English.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  lexicon: HALOT
  rationale: A literal measurement should be preserved in this architectural vision text; 'cubits' retains the source unit rather than converting it.
- source_word: וַאֲשֶׁר מֻנָּח
  chosen: and the open area
  alternatives:
  - and what was left free
  - and that which was set apart
  - and what was laid aside
  lexicon: HALOT
  rationale: מֻנָּח literally means 'left/placed/set down,' but in this difficult architectural clause it likely refers to space left open or free. Rendering the implied sense as 'the open area' makes the clause intelligible while staying close to the likely architectural meaning.
- source_word: בֵּית צְלָעוֹת
  chosen: between the side chambers
  alternatives:
  - the structure of the side chambers
  - the side-chamber building
  lexicon: HALOT
  rationale: The Hebrew is difficult. While בֵּית often means 'house/structure,' in this context many understand the phrase to denote the side-chamber complex. Given the participle מֻנָּח and the architectural flow, the sense is best captured as the space associated with or between the side chambers.
- source_word: אֲשֶׁר לַבָּיִת
  chosen: of the house
  alternatives:
  - that belonged to the house
  - of the temple
  lexicon: HALOT
  rationale: בַּיִת here refers to the temple building proper. 'House' preserves the Hebrew term, while the context makes clear it is the temple.
