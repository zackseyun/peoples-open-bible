  text: כִּֽי אַתָּ֤ה אֱלֹהֵ֣י מָֽעוּזִּ/י֮ לָ/מָ֪ה זְנַ֫חְתָּ֥/נִי לָֽ/מָּה קֹדֵ֥ר אֶתְהַלֵּ֗ךְ בְּ/לַ֣חַץ אוֹיֵֽב־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/043/002.yaml
  text: For you are the God of my refuge[b][a]; why have you rejected me? Why do I go about mourning under the oppression of the enemy?
  footnotes:
  - marker: a
    text: Or 'the God of my stronghold' or 'the God of my strength.' The Hebrew noun can denote refuge, stronghold, or strength depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Why do I walk in gloom because of the oppression of the enemy?' The Hebrew literally speaks of going about 'darkened,' an idiom for mourning.
    reason: lexical_alternative
