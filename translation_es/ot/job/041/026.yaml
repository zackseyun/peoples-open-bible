revisions:
- from: Él mira todo lo que es alto[a]; él es rey sobre todos los hijos de la soberbia.
  to: Ve todo lo que es alto[a]; él es rey sobre todos los hijos de la soberbia.
  rationale: 'Se hace una reparación menor de estilo y naturalidad: «Ve» expresa con más fluidez ראה en español, y se elimina el pronombre inicial innecesario mientras se conserva el énfasis de la segunda cláusula con «él es rey». No cambia el sentido ni las decisiones léxicas principales.'
