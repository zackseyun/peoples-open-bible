base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/012.yaml
  text: Then the king commanded Hilkiah the priest[a], Ahikam son of Shaphan, Achbor son of Micaiah, Shaphan the scribe, and Asaiah the king’s servant, saying[c][b],
