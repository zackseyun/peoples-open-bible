  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el remanente en Sion/Jerusalén será llamado santo, definido además como todo el que está escrito/registrado para vida en Jerusalén. Conserva correctamente la tensión teológica entre supervivencia histórica y registro para vida, y mantiene la repetición final de «en Jerusalén».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos puntos mejorables de naturalidad y fidelidad estilística: «sea dejado» suena poco idiomático en español bíblico actual, y la colocación de las notas [a][b] sobre «santo» es incorrecta porque ambas notas explican «registrado para vida», no «santo». «Esté registrado» también es menos directo que el participio simple «esté inscrito/escrito», aunque no llega a ser erróneo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sion», «Jerusalén» y «santo» están bien. La decisión sobre כתב puede expresarse mejor con «inscrito» para conservar la idea de registro escrito con español más natural. No aparecen términos sensibles como Yahvé/Mesías/Cristo.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de las notas al pie
    rationale: Las notas [a] y [b] comentan la expresión «registrado para vida», pero en el borrador están colocadas tras «santo». Esto rompe la correspondencia exigida entre marcador y palabra/frase anotada.
  - severity: medium
    issue: «el que sea dejado» suena forzado en español
    rationale: Aunque intenta reflejar la pasividad de וְהַנּוֹתָר, en español neutral resulta poco natural. «el que quede» o «el que sea dejado con vida» serían opciones más idiomáticas; por concisión y paralelismo, «el que quede» funciona bien.
  - severity: low
    issue: «registrado para vida» es entendible pero algo rígido
    rationale: La idea de inscripción oficial se expresa con más naturalidad en español mediante «inscrito para vida» o «escrito para vida». «Inscrito» preserva tanto el registro como la legibilidad.
  revised_spanish_text: 'Y sucederá que el que quede en Sion y el que quede en Jerusalén será llamado santo: todo el que esté inscrito para vida[a][b] en Jerusalén.'
  revised_footnotes:
