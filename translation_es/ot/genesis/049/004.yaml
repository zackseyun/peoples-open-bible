translation:
  language: es
  text: 'Inestable como el agua[a], no sobresaldrás, porque subiste al lecho de tu padre; entonces lo mancillaste: él subió a mi lecho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más fluidamente: «entonces mancillaste mi lecho; subiste a él». El hebreo cambia bruscamente en la cláusula final a tercera persona, «él subió», lo que puede ser una repetición exclamativa referida a Rubén.'
    reason: alternative_reading
lexical_decisions:
- source_word: פַּחַז
  english_pob_choice: Unstable
  chosen_spanish: Inestable
  alternatives_spanish:
  - Impetuoso
  - Irrefrenable
  - Inconstante
  lexicon: HALOT
  rationale: El término describe inestabilidad o impulso descontrolado. «Inestable» conserva la idea central y funciona de forma natural con la comparación siguiente «como el agua».
- source_word: כַּמַּיִם
  english_pob_choice: as water
  chosen_spanish: como el agua
  alternatives_spanish:
  - igual que el agua
  lexicon: HALOT
  rationale: La comparación es directa y debe conservarse de manera simple y transparente en español.
- source_word: אַל תּוֹתַר
  english_pob_choice: you shall not excel
  chosen_spanish: no sobresaldrás
  alternatives_spanish:
  - no tendrás preeminencia
  - no quedarás por encima
  - no abundarás
  lexicon: HALOT
  rationale: En el contexto de la pérdida del privilegio de primogenitura, «no sobresaldrás» comunica que Reubén no conservará la preeminencia, sin sonar forzado.
- source_word: כִּי עָלִיתָ
  english_pob_choice: because you went up
  chosen_spanish: porque subiste
  alternatives_spanish:
  - pues subiste
  lexicon: HALOT
  rationale: «Subiste» conserva el verbo literal hebreo con su matiz eufemístico, sin explicitar más de lo que el texto dice.
- source_word: מִשְׁכְּבֵי אָבִיךָ
  english_pob_choice: to your father’s bed
  chosen_spanish: al lecho de tu padre
  alternatives_spanish:
  - al lecho matrimonial de tu padre
  - a la cama de tu padre
  - al lecho de tu padre
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, el español natural aquí es singular. «Lecho» mantiene un tono digno y bíblico, y preserva la referencia al lecho matrimonial sin añadir detalles ajenos al verso.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  lexicon: HALOT
  rationale: Marca la consecuencia inmediata de la acción anterior de forma clara y breve.
- source_word: חִלַּלְתָּ
  english_pob_choice: you defiled
  chosen_spanish: lo profanaste
  alternatives_spanish:
  - lo contaminaste
  - lo mancillaste
  lexicon: HALOT
  rationale: El verbo puede significar profanar o contaminar. «Lo profanaste» conserva la gravedad moral y el matiz de deshonra ligado al acto sexual indebido en el contexto familiar.
- source_word: יְצוּעִי
  english_pob_choice: my couch
  chosen_spanish: mi lecho
  alternatives_spanish:
  - mi cama
  - mi diván
  lexicon: HALOT
  rationale: El sustantivo puede referirse a cama o lecho. «Mi lecho» mantiene el registro y evita una repetición demasiado mecánica, además de encajar con la frase anterior.
- source_word: עָלָה
  english_pob_choice: he went up
  chosen_spanish: él subió
  alternatives_spanish:
  - subiste
  - subió
  lexicon: HALOT
  rationale: La forma hebrea es tercera persona masculina singular y produce un cambio abrupto. «Él subió» conserva esa lectura del texto masorético, y el español requiere un sujeto explícito para que la frase sea comprensible.
theological_decisions:
- issue: Eufemismo sexual y evaluación moral en la sentencia sobre Rubén
  english_pob_reading: Render the euphemistic language transparently ('went up to your father’s bed') and the evaluative verb as 'defiled' without softening or expanding the accusation.
  chosen_spanish_reading: Mantener el lenguaje eufemístico de «subiste al lecho de tu padre» y el juicio moral de «lo profanaste», sin ampliar la acusación con detalles que el verso no explicita.
  alternative_spanish_readings:
  - «te acostaste con la concubina de tu padre»
  - «lo contaminaste»
  - «lo mancillaste»
  rationale: El hebreo ya usa una referencia velada pero comprensible. La traducción debe conservar ese registro y la censura moral sin sustituirlo por una paráfrasis más explícita ni por un término más estrechamente cultual que debilite el sentido familiar-sexual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Ambigüedad final de עָלָה
  english_pob_reading: Keep the Masoretic 3ms wording in the main text as 'he went up' and preserve the more interpretively smoothed alternative in a footnote.
  chosen_spanish_reading: Conservar «él subió a mi lecho» en el texto principal y registrar en nota la alternativa más suave que entiende la frase como una repetición exclamativa referida a Rubén.
  alternative_spanish_readings:
  - «subiste a mi lecho»
  - «él subió a mi lecho», entendido como una repetición enfática sobre Rubén
  rationale: La forma hebrea es abrupta y ambigua. Conviene mantener esa tensión en el texto principal y ofrecer en nota la lectura que muchos traductores suavizan, sin resolverla silenciosamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió la lectura masorética y el audit trail en inglés. La versión española conserva el paralelismo, el eufemismo y la ambigüedad final documentada, sin añadir explicaciones interpretativas al cuerpo principal del verso.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplicable en este versículo.
  - Se usó «lecho» para preservar el registro bíblico y el paralelismo con «mi lecho».
  - Se eligió «profanaste» para sostener la gravedad moral del verbo hebreo sin desplazarlo a una paráfrasis cultual o una suavización ética.
