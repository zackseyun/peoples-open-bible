translation:
  language: es
  text: Él quebrará los pilares[a] de Beth-shemesh[b], que está en la tierra de Egipto, y quemará los templos de los dioses de Egipto con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras sagradas» o «estelas». El término hebreo se refiere a pilares de piedra cúlticos.
    reason: lexical_alternative
  - marker: b
    text: Beth-shemesh significa «Casa del Sol» y probablemente se refiere a la ciudad egipcia conocida en griego como Heliópolis.
    reason: cultural_note
lexical_decisions:
- source_word: וְשִׁבַּר
  english_pob_choice: he will shatter
  chosen_spanish: quebrará
  alternatives_spanish:
  - hará pedazos
  - desmenuzará
  - romperá
  lexicon: HALOT
  rationale: El verbo hebreo שׁבר expresa ruptura violenta. En español, «quebrará» conserva la idea de destrucción decisiva en un registro natural y bíblico, sin sonar tan explicativo como «hará pedazos».
- source_word: מַצְּבוֹת
  english_pob_choice: pillars
  chosen_spanish: columnas
  alternatives_spanish:
  - pilares
  - piedras sagradas
  - estelas
  lexicon: HALOT
  rationale: El término puede referirse a pilares/estelas cúlticas. «Columnas» es legible en español y mantiene la forma física; el sentido cultual queda implícito por el contexto de juicio sobre los dioses y templos de Egipto. Se evita imponer «piedras sagradas» en el texto principal, aunque esa opción es posible.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Beth-shemesh
  alternatives_spanish:
  - Casa del Sol
  - Heliópolis
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado para mantenerlo como nombre propio. Aunque su sentido literal es «Casa del Sol» y probablemente alude a Heliópolis, eso se reserva para una nota.
- source_word: אֲשֶׁר בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: that is in the land of Egypt
  chosen_spanish: que está en la tierra de Egipto
  alternatives_spanish:
  - que está en el país de Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La cláusula relativa en español se expresa con naturalidad como «que está en la tierra de Egipto», preservando la referencia geográfica y la relación sintáctica con Beth-shemesh.
- source_word: בָּתֵּי אֱלֹהֵי מִצְרַיִם
  english_pob_choice: the temples of the gods of Egypt
  chosen_spanish: los templos de los dioses de Egipto
  alternatives_spanish:
  - las casas de los dioses de Egipto
  - los santuarios de los dioses de Egipto
  lexicon: HALOT
  rationale: Aunque literalmente dice «casas», en contexto cúltico el español «templos» comunica mejor el referente sin perder fidelidad. «Santuarios» también es posible, pero «templos» es más directo y reconocido.
- source_word: יִשְׂרֹף בָּאֵשׁ
  english_pob_choice: he will burn ... with fire
  chosen_spanish: quemará ... con fuego
  alternatives_spanish:
  - prenderá fuego a ...
  - consumirá ... con fuego
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza tanto el verbo como el medio. «Quemará ... con fuego» reproduce ese énfasis de modo claro y fluido en español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no fueron necesarios cambios sustanciales; por eso se mantiene la línea de traducción óptima con una sola nota cultural y una nota léxica para el término cultual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se evitó traducir mecánicamente «houses» por «casas» en el segundo miembro porque el contexto cúltico pide «templos» en español para reflejar el sentido comunicativo del hebreo.
  - Se preservó el topónimo Beth-shemesh en el cuerpo principal para respetar su uso como nombre propio, con explicación en nota.
  - Se usó «tierra de Egipto» en vez de «país» para mantener la resonancia bíblica y la sintaxis del hebreo sin perder naturalidad.
