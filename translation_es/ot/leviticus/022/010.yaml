translation:
  language: es
  text: Ningún ajeno[a] puede comer lo santo[b]; un residente junto a un sacerdote[c] o un jornalero no puede comer lo santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero», «extraño» o «persona no autorizada». El hebreo זָר aquí no describe principalmente origen étnico, sino a alguien fuera del acceso autorizado a lo santo.
    reason: lexical_alternative
  - marker: b
    text: O «el alimento santo» o «la porción sagrada». El singular hebreo קֹדֶשׁ significa literalmente «lo santo», y aquí se refiere concretamente a porciones de alimento sagrado reservadas para consumo sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: 'También: «un residente de un sacerdote» o «un forastero residente de un sacerdote». El hebreo תּוֹשַׁב כֹּהֵן señala a alguien asociado al hogar del sacerdote, no al sacerdote mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָר
  english_pob_choice: outsider
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - no perteneciente
  - ajeno
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término no señala primariamente nacionalidad, sino alguien fuera del ámbito autorizado para comer de lo santo. 'Extranjero' comunica exclusión, aunque se mantiene una nota porque en español puede sugerir etnia más que estatus cultual.
- source_word: קֹדֶשׁ
  english_pob_choice: the holy thing
  chosen_spanish: la cosa santa
  alternatives_spanish:
  - el alimento santo
  - la porción santa
  - lo santo
  lexicon: HALOT
  rationale: El singular hebreo puede referirse concretamente a alimento u ofrenda reservados. 'La cosa santa' conserva la forma singular y la referencia amplia sin cerrar el sentido únicamente a 'comida' en el texto principal.
- source_word: תּוֹשַׁב כֹּהֵן
  english_pob_choice: a sojourner of a priest
  chosen_spanish: un residente de un sacerdote
  alternatives_spanish:
  - un forastero residente de un sacerdote
  - un residente con un sacerdote
  - un sojourner de un sacerdote
  lexicon: HALOT
  rationale: Se conserva la relación constructiva con 'de un sacerdote' y el matiz de residencia asociada al hogar sacerdotal. 'Residente' es más natural en español que un calco directo de 'sojourner', pero la nota preserva la alternativa más literal.
- source_word: שָׂכִיר
  english_pob_choice: hired worker
  chosen_spanish: un jornalero
  alternatives_spanish:
  - un trabajador contratado
  - un asalariado
  - un trabajador jornalero
  lexicon: HALOT
  rationale: El término designa a una persona empleada por salario. 'Jornalero' es idiomático en español y comunica bien el carácter laboral remunerado, aunque se anota una alternativa más neutra/explicativa.
- source_word: לֹא יֹאכַל
  english_pob_choice: may not eat
  chosen_spanish: no puede comer
  alternatives_spanish:
  - no debe comer
  - no comerá
  - no comerá bajo ninguna circunstancia
  lexicon: HALOT
  rationale: La forma negativa expresa prohibición legal. 'No puede comer' funciona naturalmente en español jurídico-normativo y evita un future/imperative demasiado rígido.
- source_word: וְכָל
  english_pob_choice: 'No'
  chosen_spanish: Ningún
  alternatives_spanish:
  - ninguna
  - todo
  - cada
  lexicon: HALOT
  rationale: La construcción introductoria con prohibición se vuelve más natural en español con 'Ningún...', manteniendo el valor distributivo y la fuerza legal del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Levítico 22:10 y toma en cuenta el auditorio textual inglés: se conserva la distinción entre זָר, תּוֹשַׁב כֹּהֵן y שָׂכִיר, y se refleja la decisión del POB inglés de mantener קֹדֶשׁ en singular como referencia a una porción sagrada concreta. La revisión inglesa que afinó תּוֹשַׁב כֹּהֵן como relación de residencia asociada al sacerdote se refleja en ''residente de un sacerdote''.'
  spanish_consistency_notes:
  - Se mantiene 'santa' para קֹדֶשׁ para respetar la singularidad lexical del hebreo y evitar forzar únicamente 'alimento' en el cuerpo del texto.
  - '''Extranjero'' se usa como opción funcional, no como afirmación étnica; la nota aclara el matiz cultual.'
  - '''Jornalero'' conserva el sentido de trabajador pagado y distingue bien esta categoría de la del residente asociado al sacerdote.'
  - La puntuación con dos cláusulas separadas reproduce la estructura prohibitiva doble del hebreo sin añadir elementos interpretativos.
