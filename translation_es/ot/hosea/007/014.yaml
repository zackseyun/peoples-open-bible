translation:
  language: es
  text: No claman a mí de corazón[a], sino que se lamentan en sus camas; por grano y mosto[b] se reúnen; se apartan de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Heb. «con/en su corazón»; la expresión resalta una disposición interior sincera, no solo un llanto exterior.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil: el verbo puede entenderse como «se reúnen» o, según otra lectura, como un gesto ritual de autolaceración asociado al lamento. La traducción principal sigue la lectura más probable en el contexto auditado.'
    reason: alternative_reading
lexical_decisions:
- source_word: זָעֲקוּ
  english_pob_choice: cry out
  chosen_spanish: claman
  alternatives_spanish:
  - gritan
  - claman a gritos
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso, generalmente de auxilio o angustia. En español, «clamar» conserva ese valor de súplica urgente sin sonar tan pesado como una traducción demasiado literal.
- source_word: אֵלַי בְּלִבָּם
  english_pob_choice: to me from their heart
  chosen_spanish: a mí de corazón
  alternatives_spanish:
  - a mí con su corazón
  - a mí sinceramente
  lexicon: HALOT
  rationale: La frase contrasta una lamentación externa con una intención interna auténtica. «De corazón» mantiene la idea de sinceridad e interioridad sin expandir el sentido más allá del hebreo.
- source_word: יְיֵלִילוּ
  english_pob_choice: they wail
  chosen_spanish: se lamentan
  alternatives_spanish:
  - aúllan
  - gimen
  lexicon: HALOT
  rationale: ילל denota lamento sonoro, incluso aullido. «Se lamentan» es natural en español y conserva el carácter de duelo o queja, evitando un matiz demasiado animalista.
- source_word: עַל מִשְׁכְּבוֹתָם
  english_pob_choice: on their beds
  chosen_spanish: sobre sus camas
  alternatives_spanish:
  - en sus camas
  - encima de sus camas
  lexicon: HALOT
  rationale: La imagen locativa es simple y privada. «Sobre sus camas» reproduce bien la escena de un lamento recluido en lo íntimo del hogar.
- source_word: דָּגָן וְתִירוֹשׁ
  english_pob_choice: grain and new wine
  chosen_spanish: grano y mosto
  alternatives_spanish:
  - grano y vino nuevo
  - grano y vino
  lexicon: HALOT
  rationale: דָּגָן es «grano» y תִּירוֹשׁ suele referir a vino nuevo o mosto. «Mosto» comunica mejor la bebida recién producida en un contexto agrícola, sin perder la referencia de provisión y fertilidad.
- source_word: יִתְגּוֹרָרוּ
  english_pob_choice: they gather themselves
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se juntan
  - se congregan
  - se laceran
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto admite varias lecturas. Siguiendo la revisión del POB inglés, «se reúnen» refleja la lectura más probable sin introducir la idea de automutilación como si fuera segura. La ambigüedad queda disponible para una nota.
- source_word: יָסוּרוּ בִי
  english_pob_choice: they turn away from me
  chosen_spanish: se apartan de mí
  alternatives_spanish:
  - se desvían de mí
  - se alejan de mí
  - se rebelan contra mí
  lexicon: HALOT
  rationale: סור con ב expresa apartarse o desviarse de alguien. «Se apartan de mí» comunica la deslealtad del pacto sin añadir una glosa más fuerte que el hebreo por sí mismo.
theological_decisions:
- issue: Sentido de יִתְגּוֹרָרוּ en contexto de lamento y provisión agrícola
  english_pob_reading: they gather themselves; alternative self-laceration reading preserved in footnote
  chosen_spanish_reading: se reúnen
  alternative_spanish_readings:
  - se laceran
  - se cortan
  - se juntan para lamento
  rationale: El hebreo es notoriamente difícil. Dado el aparato auditado, la revisión inglesa reciente prefirió la lectura de «gather themselves»; en español se sigue esa decisión como la forma principal, sin borrar la tensión interpretativa. La nota conserva la alternativa de lectura cuando el verbo se entiende como gesto ritual extremo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión exegética en lugar de resolverla prematuramente'
- issue: Contraste entre sinceridad interior y lamento externo
  english_pob_reading: from their heart / but they wail
  chosen_spanish_reading: de corazón / se lamentan
  alternative_spanish_readings:
  - sinceramente / claman
  - desde el corazón / aúllan
  rationale: La construcción subraya que no hay clamor genuino dirigido a Dios, sino solo un duelo exterior. La pareja «de corazón» y «se lamentan» conserva ese contraste sin sobreinterpretar la psicología del texto.
  doctrine_reference: Observación literaria-teológica del versículo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó la lectura de «gash themselves» por «gather themselves» para no importar una interpretación demasiado fuerte sin apoyo explícito en el tramo auditado. La versión española sigue esa revisión principal y conserva en nota la ambigüedad del verbo. También se mantuvo el contraste entre clamar sinceramente a Yahvé y el lamento meramente externo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del nombre divino en el proyecto, aunque aquí el verso solo contiene una referencia pronominal («a mí»).
  - Se evitó «SEÑOR» y «Cristo», que no corresponden al hebreo de este versículo.
  - Se mantuvo un registro bíblico sobrio y actual, con sintaxis natural para español latinoamericano sin alejarse del paralelismo hebreo.
