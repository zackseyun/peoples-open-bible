translation:
  language: es
  text: Toda ofrenda de cereal[a] que presenten a Yahvé no se hará con levadura, porque no quemarán de ella ninguna levadura ni ninguna miel[b] como ofrenda hecha por fuego[c] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Ofrenda de cereal'' traduce la מִנְחָה ritual de Levítico 2, una ofrenda de productos vegetales o de grano, no una ofrenda en sentido general.'
    reason: lexical_alternative
  - marker: b
    text: En uso antiguo, דְּבַשׁ puede abarcar no solo miel de abeja, sino también jarabes de fruta.
    reason: cultural_note
  - marker: c
    text: O 'ofrenda por fuego'. El término hebreo אִשֶּׁה se refiere a una ofrenda presentada en el altar mediante fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda
  - ofrenda de grano
  - ofrenda vegetal
  lexicon: HALOT
  rationale: En Levítico 2, מִנְחָה designa la ofrenda ritual de productos vegetales/cereal, no una ofrenda en general. 'Ofrenda de cereal' comunica bien el sentido cultual sin sonar arcaico; se evita 'ofrenda vegetal' por posible ambigüedad moderna.
- source_word: תַּקְרִיבוּ
  english_pob_choice: you present
  chosen_spanish: presenten
  alternatives_spanish:
  - ofrezcan
  - acerquen
  - presenten
  lexicon: HALOT
  rationale: El verbo en contexto sacrificial es 'presentar' ante Dios. 'Presenten' conserva la dirección cultual y evita repetir innecesariamente 'ofrecer'.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: ''Yahvé''. Es una decisión teológica y editorial, no una sustitución reverencial por ''SEÑOR''.'
- source_word: תֵעָשֶׂה חָמֵץ
  english_pob_choice: shall not be made with leaven
  chosen_spanish: no se hará con levadura
  alternatives_spanish:
  - no será hecho leudado
  - no se preparará con levadura
  lexicon: HALOT
  rationale: 'La pasiva refleja reproduce de forma natural el prohibitivo hebreo: la ofrenda no debe quedar/ser preparada con levadura. ''Con levadura'' preserva el término cultual amplio mejor que ''leudado''.'
- source_word: שְׂאֹר
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - masa fermentada
  - fermento
  lexicon: HALOT
  rationale: '''Levadura'' es el equivalente español más transparente para el agente de fermentación; mantiene el paralelismo con חָמֵץ y el tono cultual del pasaje.'
- source_word: דְּבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe
  - miel de dátil
  - sirope dulce
  lexicon: HALOT
  rationale: El sentido básico es 'miel'. Aunque el uso antiguo puede incluir jarabes de fruta, el texto principal debe conservar el término común y claro.
- source_word: לֹא תַקְטִירוּ
  english_pob_choice: you shall not burn
  chosen_spanish: no quemarán
  alternatives_spanish:
  - no harán subir en humo
  - no ofrecerán quemándolo
  lexicon: HALOT
  rationale: En lenguaje sacrificial, קטר expresa hacer subir humo/quemar sobre el altar. 'Quemarán' es la opción española más directa y legible, compatible con el sentido ritual.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de eso
  - de la ofrenda
  lexicon: HALOT
  rationale: El antecedente natural en español es 'la ofrenda', por eso se usa 'de ella' para mantener concordancia y referir claramente al conjunto de la ofrenda.
- source_word: אִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda hecha por fuego
  lexicon: HALOT
  rationale: El término técnico אִשֶּׁה se refiere a una ofrenda consumida por fuego en el altar. 'Ofrenda encendida' preserva la imagen del fuego y suena natural en español; la alternativa tradicional 'ofrenda por fuego' queda implícita en el trasfondo sacrificial.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: rendered as Yahweh in the project audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre pactual divino explícito, conforme al estándar del proyecto para יהוה. 'Yahvé' es la forma española establecida en esta serie y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido cultual de אִשֶּׁה
  english_pob_reading: food offering / offering by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda de alimento
  rationale: Se conserva el carácter sacrificial y la relación con el fuego del altar. 'Ofrenda encendida' equilibra claridad moderna y precisión cultual sin borrar la tensión terminológica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
- issue: Valor de דְּבַשׁ
  english_pob_reading: honey, possibly including fruit syrup
  chosen_spanish_reading: miel
  alternative_spanish_readings:
  - jarabe de fruta
  - miel de dátil
  rationale: La lectura principal permanece como 'miel' por transparencia. La posible extensión antigua a jarabes de fruta se deja registrada en nota para no estrechar indebidamente el término hebreo.
  doctrine_reference: Lexical note on ancient דְּבַשׁ usage
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión inglesa que corrigió תַקְטִירוּ de una formulación más libre a 'burn ... as'. En español se reflejó directamente con 'quemarán ... como ofrenda encendida', manteniendo el sentido de combustión ritual. También se respetó la lectura del nombre divino como forma explícita y la nota cultural sobre דְּבַשׁ.
  spanish_consistency_notes:
  - 'Se mantuvo la terminología cultual de manera consistente: מִנְחָה → ofrenda de cereal; אִשֶּׁה → ofrenda encendida.'
  - Se evitó 'SEÑOR' para יהוה para conservar el nombre pactual en la línea editorial del proyecto.
  - '''Levadura'' y ''miel'' se usan de forma uniforme para שְׂאֹר y דְּבַשׁ, con notas para sus posibles extensiones semánticas.'
  - La sintaxis española reproduce la prohibición y la explicación causal con claridad, sin agregar elementos no presentes en el hebreo.
