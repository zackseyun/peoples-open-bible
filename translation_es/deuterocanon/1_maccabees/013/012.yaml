translation:
  language: es
  text: Y Trifón partió de Ptolemaida con una gran fuerza para entrar en la tierra de Judá, y Jonatán iba con él bajo custodia;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - se puso en camino
  - salió
  lexicon: LSJ
  rationale: El aoristo aquí expresa el inicio de una marcha o desplazamiento desde un lugar. En español, 'partió' comunica ese movimiento de salida de manera natural y solemne sin añadir matices inexistentes.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a large force
  chosen_spanish: con una gran fuerza
  alternatives_spanish:
  - con un gran ejército
  - con mucha fuerza
  lexicon: LSJ
  rationale: En contexto militar, δύναμις se refiere a fuerza armada o tropa. 'Gran fuerza' conserva la amplitud del término y mantiene la referencia militar sin forzar 'ejército' si el griego no lo explicita.
- source_word: εἰσελθεῖν εἰς γῆν Ἰούδα
  english_pob_choice: to enter the land of Judah
  chosen_spanish: para entrar en la tierra de Judá
  alternatives_spanish:
  - para invadir la tierra de Judá
  - para entrar en la tierra de Judea
  lexicon: LSJ
  rationale: El infinitivo expresa propósito. 'Entrar' sigue el sentido básico del griego y evita intensificar a 'invadir', que añade hostilidad no formulada de modo explícito, aunque el contexto sea bélico. 'Tierra de Judá' preserva la expresión geográfica del original.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la tierra de Judea
  - el territorio de Judá
  lexicon: LSJ
  rationale: Se mantiene la formulación geográfica directa del griego. 'Judá' refleja el genitivo del nombre propio y conserva la conexión con el texto fuente mejor que una actualización interpretativa.
- source_word: ἐν φυλακῇ
  english_pob_choice: in custody
  chosen_spanish: en custodia
  alternatives_spanish:
  - bajo custodia
  - en prisión
  - bajo guardia
  lexicon: LSJ
  rationale: El audit trail inglés revisó la frase hacia una forma más directa y formal. 'En custodia' reproduce con precisión el estado de Jonathan como retenido por autoridad, sin introducir la imagen específica de una cárcel física.
translation_notes:
  revision_awareness: El inglés POB pasó de 'under guard' a 'in custody' para ἐν φυλακῇ; la versión española sigue ese ajuste con 'en custodia', manteniendo el matiz formal y evitando concretar indebidamente un edificio carcelario.
  spanish_consistency_notes:
  - Se usó 'Judá' para γῆν Ἰούδα conforme a la expresión geográfica del griego y al criterio del POB inglés de evitar 'Judea' cuando el hebreo/griego conserva 'Judah'.
  - Se evitó 'Mesías/Cristo' y otras terminologías no pertinentes al versículo.
  - No se añadieron notas al pie porque no fue necesario preservar una alternativa textual o lexical con anclaje en el texto español.
