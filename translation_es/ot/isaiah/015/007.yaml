    rationale: El sufijo hebreo en יִשָּׂאֽוּם remite a los bienes mencionados previamente de forma colectiva/plural. «Se lo llevan» puede sonar como si todo fuera una sola cosa; «se los llevaron» refleja mejor el referente.
