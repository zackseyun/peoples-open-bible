source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Et dixit ad me: initium terreni orbis, et antequam starent exitus saeculi et antequam spirarent conuentiones uentorum, Et antequam sonarent uoces tonitruum, et antequam splenderent nitores coruscuum et antequam confirmarentur

    2 et antequam sonarent voces tonitruum, et antequam splenderent nitores coruscuum, et antequam confirmarentur fundamenta paradisi,

    3 fundamenta paradisi, Et antequam uiderentur decores flores, et antequam confirmarentur motus uirtutes, et antequam

    4 colligerentur innumerabiles militiae angelorum, Et antequam extollerentur altitudines aerum, et antequam nominarentur mensurae firmamentorum, et antequam aestimaretur scabellum

    5 Sion, Et antequam inuestigarentur praesentes anni, et antequam abalienarentur eorum qui nunc peccant adinuentiones, et

    6 consignarentur qui fidem thesaurizauerunt: Tunc cogitaui et facta sunt haec per me et non per alium, ut et finis per me et non per alium. Et respondi et dixi : quae erit separatio tem-

    7 porum ? aut quando prioris finis aut sequentis initium ? Et

    8 dixit ad me : ab Abraham usque ad Abraham, quoniam ab eo natus est Iacob et Esau, manus enim Iacob tenebat ab initio calcaneum Esau. Finis enim huius saeculi Esau, et principium

    9 finis enim huius saeculi Esau, et principium sequentis Iacob.

    10 aliud noli querere, Ezra. Et respondi et dixi : O dominator domine, si inueni gratiam

    11 ante oculos tuos, Vt demonstres seruo tuo finem signorum

    12 tuorum, quorum ex parte mihi demonstrasti nocte praeterita. Et respondit et dixit ad me : surge super pedes tuos et audies

    13 uocem plenissimam sonus. Et erit si commotione commoue-

    14 bitur locus, in quo stas super eum, In eo cum loquitur, tu non

    15 expauescas, quoniam de fine uerbum, et fundamenta terrae intellegetur, Quoniam de ipsis sermo, tremescet et commoue-

    16 bitur, scit enim quoniam finem eorum oportet commutari. Et

    17 factum est cum audissem, et surrexi super pedes meos et audiui, et ecce uox loquens, et sonus eius sicut sonus aquarum multarum. Et dixit : ecce dies ueniunt, et erit quando adpro-

    18 pinquare incipio, ut uisitem habitantes in terra. Et quando

    19 inquirere incipiam ab eis qui iniuste nocuerunt iniustitia sua, et

    20 quando suppleta fuerit humilitas Sion, Et cum supersignabitur saeculum quod incipiet pertransire, haec signa faciam: libri aperientur ante faciem firmamenti, et omnes uidebunt simul,

    21 Et anniculi infantes loquentur uocibus suis, et praegnantes immaturos parient infantes trium et quatuor mensium et uiuent

    22 et sciritabuntur, Et subito apparebunt seminata loca non seminata, et plena prumptuaria subito inuenientur uacua, Et tuba canet cum sono, quam cum omnes audierint subito expauescent.

    23 et tuba canet cum sono, quam cum omnes audierint subito expavescent.

    24 Et erit in illo tempore debellabunt amici amicos ut inimici, et expauescet terra cum his qui inhabitant eam, et uenae fontium

    25 stabunt ut non decurrant in horis tribus. Et erit omnis qui derelictus fuerit ex omnibus istis quibus praedixi tibi, ipse saluabitur et uidebit salutare meum et finem saeculi mei. Et uidebunt qui recepti sunt homines, qui mortem non gustauerunt a natiuitate sua, et mutabitur cor inhabitantium et

    26 conuertetur in sensum alium. Delebitur enim malum et extinguetur dolus. Florebit autem fides, et uincetur corruptela,

    27 delebitur enim malum et extinguetur dolus.

    28 et ostendebitur ueritas quae sine fructu fuit tantis temporibus.

    29 Et factum est cum loqueretur mihi, et ecce paulatim mouebatur locus super quem stabam super eum. Et dixit ad me:

    30 et dixit ad me: haec veni tibi ostendere et venturae nocti.

    31 haec ueni tibi ostendere †et uentura† nocte. Si ergo iterum rogaueris et iterum ieiunaueris septem diebus, iterum tibi renuntiabo horum maiora per diem. Quoniam auditu audita est uox tua apud altissimum ; uidit enim fortis directionem tuam et prouidit pudicitiam quam a iuuentute tua habuisti. Et propter hoc misit me demonstrare tibi haec omnia et dicere tibi : confide et noli timere, Et noli festinare in prioribus temporibus cogitare uana, ut non properes in nouissimis temporibus. Et factum est post haec, et fleui iterum et similiter ieiunaui septem diebus, ut supplerem tres ebdomadas quae dictae sunt mihi. Et factum est in octaua nocte et cor meum iterato turbabatur in me, et coepi loqui coram altissimo ; Inflammabatur enim spiritus meus ualde, et anima mea anxiabatur. Et dixi : O domine, loquens locutus es ab initio creaturae, in primo die dicens : fiat caelum et terra, et tuum uerbum opus perfecit. Et erat tunc spiritus uolans, et tenebrae circumferebantur et silentium, sonus uocis hominis nondum erat abs te. Tunc dixisti de thesauris tuis proferri lumen aliquod luminis ut apparerent tunc opera tua. Et die secundo iterum creasti spiritum firmamenti et imperasti ei ut diuidcret et diuisionem faceret inter aquas, ut pars quidem sursum recederet, pars uero deorsum maneret. Et tertio die imperasti aquis congregari in septima parte terrae, sex uero partes siccasti et conseruasti ut ex his sint

    32 quoniam auditu audita est vox tua apud Altissimum. vidit enim Fortis directionem tuam et providit pudicitiam quam a iuventute tua habuisti.

    33 et propter hoc misit me demonstrare tibi: haec omnia et dicere tibi confide et noli timere,

    34 et noli festinare in prioribus temporibus cogitare vana, ut non properes a novissimis temporibus.

    35 et factum est post haec, et flevi iterum et similiter ieiunavi septem diebus, ut suppleam tres ebdomadas quae dictae sunt mihi.

    36 et factum est in octava nocte, et cor meum iterato turbabaturin me et coepi loqui coram Altissimo.

    37 inflammabatur enim spiritus meus valde et anima mea anxiabatur.

    38 et dixi: o Domine, loquens locutus es ab initio creaturae in primo die dicens: fiat caelum et terra, et tuum verbum opus perfecit.

    39 et erat tunc spiritus volans, et tenebrae circumferebantur et silentium, sonus vocis hominis nondum erat abs te.

    40 tunc dixisti de thesauris tuis proferri lumen quod luminis, utapparerent tunc opera tua.

    41 et in die secundo iterum creasti spiritum firmamenti et imperasti ei, ut divideret et divisionem faceret inter aquas, ut pars quidem sursum recederet, pars vero deorsum maneret.

    42 et tertio die imperasti aquis congregari in septima parte terrae, sex vero partes siccasti et conservasti, ut ex his sint coram te ministrantia seminata adeo et culta.

    43 coram te ministrantia seminata adeo et culta. Verbum enim

    44 tuum processit, et opus statim fiebat. Processit enim subito fructus multitudinis inmensus et concupiscentia gustus multiformis et flores colore inimitabiles et odores odoramentis inuestigabiles. die tertio haec facta sunt. Quarto autem die imperasti fieri solis splendorem, lunae lumen, stellarum dispositionem, Et imperasti eis ut deseruirent futuro plasmato

    45 quarta autem die imperasti fieri solis splendorem, lunae lumen stellarum dispositionem,

    46 et imperasti eis, ut deservirent futuro plasmato homini.

    47 homini. Quinto autem die dixisti septimae parti, ubi erat aqua

    48 congregata, ut procrearet animalia, uolatilia et pisces; Et ita fiebat aqua muta et sine anima, quod ei iubebatur, animalia

    49 faciens, ut ex hoc mirabilia tua nationes enarrent. Et tunc conseruasti duo animalia, nomen uni uocasti Behemoth et

    50 nomen secundi uocasti Leuiathan, Et separasti ea ab alterutro, non enim poterat septima pars ubi erat aqua congregata capere

    51 ea. Et dedisti Behemoth unam partem quae siccata est tertio

    52 die, ut inhabitet in ea, ubi sunt montes mille; Leuiathan autem dedisti septimam partem humidam: et seruasti ea ut fiant in

    53 deuorationem quibus uis et quando uis. Sexto autem die imperasti terrae ut crearet coram te iumenta et bestias et reptilia

    54 Et super his Adam quem constituisti ducem super omnibus factis quae fecisti, et ex eo educimur nos omnes quem elegisti populum. Haec autem omnia dixi coram te, domine, quoniam dixisti quia propter nos creasti primogenitum saeculum. Residuas autem gentes ab Adam natas dixisti eas nihil esse et quoniam saliuae adsimilatae sunt et sicut stillicidium de uaso similasti habundantiam eorum. Et nunc, domine, ecce istae gentes quae in nihilum deputatae sunt dominantur nostri et deuorant nos. Nos autem populus tuus quem uocasti primogenitum, unigenitum, aemulatorem, carissimum traditi sumus in manibus eorum. Et si propter nos creatum est saeculum, quare non haereditatem possidemus nostrum saeculum? usquequo haec?

    55 haec autem omnia dixi coram te, Domine, quoniam dixisti quia propter nos creasti primogenitum saeculum.

    56 residuas autem gentes ab Adam natas dixisti eas nihil esse, et quoniam salivae adsimilatae sunt, et sicut stillicidium de vaso similasti abundantiam eorum.

    57 et nunc, Domine, ecce istae gentes quae in nihilum deputatae sunt dominari nostri et devorarenos.

    58 nos autem populus tuus quem vocasti primogenitum, unigenitum, aemulatorem, carissimum, traditi sumus in manibus eorum.

    59 et si propter nos creatum est saeculum, quare non hereditatem possidemus nostrum saeculum? usquequo haec?'
