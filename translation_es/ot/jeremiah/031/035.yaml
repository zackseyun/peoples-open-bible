base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/035.yaml
  text: 'Thus says Yahweh[a], who gives the sun for light by day, the fixed order of the moon and stars for light by night[b], who stirs up the sea so that its waves roar—Yahweh of hosts is his name:'
  footnotes:
  - marker: a
    text: Or 'the ordinances of the moon and stars.' The Hebrew term can denote fixed statutes or established order; here it refers to the regular ordering of the heavenly bodies.
    reason: lexical_alternative
  - marker: b
    text: Or 'who calms the sea.' The Hebrew verb can carry that sense in other contexts, but here the following line, 'its waves roar,' favors 'stirs up.'
    reason: lexical_alternative
