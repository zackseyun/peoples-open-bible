translation:
  language: es
  text: Y el rey hará según su voluntad. Se exaltará y se engrandecerá sobre todo dios, y contra el Dios de los dioses hablará cosas asombrosas[a]. Prosperará hasta que se consuma la indignación[b], porque lo que está decretado se hará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maravillas». El hebreo puede denotar cosas extraordinarias o maravillosas; aquí el contexto sugiere habla impactante y arrogante.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que se complete la ira».
    reason: lexical_alternative
  - marker: c
    text: O «porque lo determinado se hará».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה כִרְצוֹנוֹ
  english_pob_choice: will do as he pleases
  chosen_spanish: hará según su voluntad
  alternatives_spanish:
  - hará como quiera
  - actuará conforme a su deseo
  lexicon: HALOT
  rationale: כִרְצוֹנוֹ expresa la idea de actuar conforme a su propia voluntad o deseo. En español, «hará según su voluntad» conserva esa autonomía autoafirmada sin sonar rígido o mecánico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de manera directa y transparente. «Rey» es la opción natural y fiel al hebreo.
- source_word: וְיִתְרוֹמֵם
  english_pob_choice: will exalt himself
  chosen_spanish: se exaltará
  alternatives_spanish:
  - se alzará
  - se levantará a sí mismo
  lexicon: HALOT
  rationale: El hitpael señala autoexaltación. «Se exaltará» mantiene el valor reflexivo y el tono de soberbia del texto.
- source_word: וְיִתְגַּדֵּל
  english_pob_choice: magnify himself
  chosen_spanish: se engrandecerá
  alternatives_spanish:
  - se hará grande
  - se magnificará
  lexicon: HALOT
  rationale: La pareja verbal intensifica la autoexaltación. «Se engrandecerá» transmite bien la idea de agigantarse o hacerse grande a sí mismo en un español natural y solemne.
- source_word: עַל כָּל אֵל
  english_pob_choice: above every god
  chosen_spanish: sobre todo dios
  alternatives_spanish:
  - por encima de todo dios
  - sobre cada dios
  lexicon: HALOT
  rationale: El hebreo usa עַל con sentido de superioridad. «Sobre todo dios» conserva la imagen de elevación por encima de todas las deidades.
- source_word: וְעַל אֵל אֵלִים
  english_pob_choice: against the God of gods
  chosen_spanish: contra el Dios de los dioses
  alternatives_spanish:
  - contra el dios de los dioses
  lexicon: HALOT
  rationale: La construcción hebrea expresa al Dios supremo. Se conserva la capitalización para distinguir al Dios verdadero del conjunto de los demás dioses, siguiendo la lectura auditada del inglés.
- source_word: יְדַבֵּר נִפְלָאוֹת
  english_pob_choice: he will speak astonishing things
  chosen_spanish: hablará maravillas
  alternatives_spanish:
  - hablará cosas asombrosas
  - dirá cosas portentosas
  lexicon: HALOT
  rationale: נִפְלָאוֹת puede referirse a cosas maravillosas, extraordinarias o asombrosas. En este contexto hostil, «maravillas» mantiene la amplitud léxica y deja abierta la tensión entre lo literal y el matiz de speech arrogante sin sobre-interpretar.
- source_word: וְהִצְלִיחַ
  english_pob_choice: he will prosper
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - saldrá adelante
  lexicon: HALOT
  rationale: El verbo denota prosperar o tener éxito. «Prosperará» encaja con el registro profético y con la idea de éxito temporal bajo permiso divino.
- source_word: עַד כָּלָה זַעַם
  english_pob_choice: until the indignation is finished
  chosen_spanish: hasta que se consuma la indignación
  alternatives_spanish:
  - hasta que termine la indignación
  - hasta que se acabe la ira
  lexicon: HALOT
  rationale: זַעַם, en contexto apocalíptico, se entiende mejor como indignación divina. «Se consuma» refleja bien la idea de llegar a su plenitud y concluirse.
- source_word: כִּי נֶחֱרָצָה נֶעֱשָׂתָה
  english_pob_choice: for what has been decreed will be done
  chosen_spanish: porque lo que está decretado se hará
  alternatives_spanish:
  - porque lo determinado se cumplirá
  - pues lo decretado será hecho
  lexicon: HALOT
  rationale: 'La construcción combina decisión/decreto con su ejecución. «Lo que está decretado se hará» preserva ambas ideas: la resolución ya establecida y su realización efectiva.'
theological_decisions:
- issue: Referente de אֵל אֵלִים
  english_pob_reading: Render as 'the God of gods' with capitalization indicating the true God.
  chosen_spanish_reading: «el Dios de los dioses» con mayúscula para señalar al Dios verdadero.
  alternative_spanish_readings:
  - «el dios de los dioses» en minúscula genérica
  rationale: En el contexto, el rey se ensalza por encima de todo dios y luego habla contra el ser supremo. La mayúscula ayuda a comunicar ese contraste sin añadir palabras ajenas al hebreo.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Sentido de זַעַם
  english_pob_reading: Treat as divine indignation rather than unspecified anger.
  chosen_spanish_reading: Entenderlo como indignación, con probable referencia a la indignación divina.
  alternative_spanish_readings:
  - ira
  - furor
  rationale: El contexto profético y apocalíptico favorece un período de indignación con término fijado por Dios. La traducción principal conserva el término formal «indignación» para no explicitar más de lo que el texto dice.
  doctrine_reference: Translation philosophy §3
- issue: Valor de נִפְלָאוֹת en contexto hostil
  english_pob_reading: Or 'marvelous things.' The Hebrew can denote extraordinary or wondrous things; here the context suggests shocking, arrogant speech.
  chosen_spanish_reading: «maravillas» en el texto principal, con la posibilidad de entenderlo como cosas asombrosas o extraordinarias.
  alternative_spanish_readings:
  - cosas asombrosas
  - cosas portentosas
  - cosas horribles
  rationale: Se preserva la amplitud del hebreo. En español, «maravillas» puede sonar positivo, pero el contexto de blasfemia y soberbia mantiene viva la tensión semántica documentada por el POB inglés.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La revisión auditada indica que no hubo cambios posteriores al texto inglés base y que el acuerdo con la revisión fue alto; por eso la redacción española conserva las tensiones léxicas principales sin resolverlas de forma interpretativa excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Dios» con mayúscula para el referente supremo y minúscula implícita en «todo dios» para las deidades menores.
  - Se prefirió «indignación» frente a «ira» para seguir el tono profético del original y del audit trail inglés.
  - Se evitó introducir «Cristo», «SEÑOR» u այլ terminología no presente en el hebreo ni en la auditoría.
  - La cláusula final se tradujo de forma sintética para reflejar el paralelismo de decreto y cumplimiento sin añadir sujetos implícitos.
