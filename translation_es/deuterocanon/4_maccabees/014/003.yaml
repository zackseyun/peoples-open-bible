review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del griego: una συμφωνία/sentido de unidad de los siete hermanos, calificada como ἱερὰς y ἐναρμόστους, y relacionada con τῆς εὐσεβείας. Sin embargo, la nota alternativa no es fiel léxicamente, porque «concorde» no funciona como sustantivo español para συμφωνίας.'
  spanish_quality_summary: 'El texto principal es claro, natural y de registro digno: «el sagrado y armonioso acuerdo de los siete hermanos acerca de la piedad». No obstante, en español suena más natural el orden «sacuerdo sagrado y armonioso»? No; el orden actual es aceptable. La única reparación necesaria es la nota, cuya redacción actual es poco idiomática.'
  glossary_alignment: No hay conflicto con los términos obligatorios del proyecto. La elección de «piedad» para εὐσέβεια está justificada por el propio expediente y es adecuada en este contexto de 4 Macabeos. «Acuerdo» para συμφωνίας también encaja bien, especialmente porque «armonioso» ya cubre el matiz de armonía/concordia.
  issues:
  - severity: medium
    issue: La nota al pie usa «concorde» como sustantivo.
    rationale: El inglés auditado ofrece «accord / concord» como alternativas para συμφωνίας. En español, «concorde» es normalmente adjetivo, no una traducción sustantiva natural aquí. Debe reemplazarse por «concordia» o «acuerdo»/«concordancia» según el matiz deseado.
  revised_spanish_text: el sagrado y armonioso acuerdo de los siete hermanos acerca de la piedad[a].
  revised_footnotes:
  - marker: a
    text: O «la sagrada y armoniosa concordia de los siete hermanos acerca de la piedad».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Solo se corrige la nota alternativa para que use un sustantivo español idiomático («concordia») que refleje adecuadamente la alternativa inglesa «concord».
