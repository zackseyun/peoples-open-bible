revisions:
- from: Mira[a], Yahvé está golpeando a tu pueblo, a tus hijos, a tus esposas y todas tus posesiones con una gran plaga.
  to: He aquí[a], Yahvé está golpeando a tu pueblo, a tus hijos, a tus esposas y a todas tus posesiones con una gran plaga.
  rationale: Se reemplaza «Mira» por «He aquí» para conservar el tono solemne de הִנֵּה en discurso profético. Se añade «a» antes de «todas tus posesiones» para mantener el paralelismo sintáctico y la naturalidad del español. También se pule la nota al pie para que suene idiomática y editorialmente limpia sin cambiar su contenido sustancial.
