  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם רַב שָׁקֵ֗ה הַ/עַ֨ל אֲדֹנֶ֤י/ךָ וְ/אֵלֶ֨י/ךָ֙ שְׁלָחַ֣/נִי אֲדֹנִ֔/י לְ/דַבֵּ֖ר אֶת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה הֲ/לֹ֣א עַל הָ/אֲנָשִׁ֗ים הַ/יֹּֽשְׁבִים֙ עַל הַ֣/חֹמָ֔ה לֶ/אֱכֹ֣ל אֶת חרי/הם וְ/לִ/שְׁתּ֛וֹת אֶת שיני/הם עִמָּ/כֶֽם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/027.yaml
  text: Then the Rabshakeh said to them[a], “Has my master sent me to speak these words only to your master and to you? Has he not also sent me to the men sitting on the wall, who will eat their own dung and drink their own urine with you?”
  footnotes:
  - marker: a
    text: 'Hebrew literally uses coarse siege imagery: ''eat their dung and drink their urine.'' Some manuscripts/traditions preserve euphemistic wording for the second expression, often rendered ''drink the water of their feet.'''
