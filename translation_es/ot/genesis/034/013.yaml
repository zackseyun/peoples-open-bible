translation:
  language: es
  text: Los hijos de Jacob respondieron a Siquem y a Hamor su padre con engaño[a] y hablaron, porque él había contaminado[b] a Dina, su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'engañosamente'. La frase hebrea usa un sustantivo, 'en/con engaño', con valor adverbial.
    reason: lexical_alternative
  - marker: b
    text: O 'había profanado' o 'había deshonrado'. El hebreo dice 'había contaminado/defilado', preservando el peso moral y ritual del término; también puede entenderse en este contexto como una violación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: HALOT
  rationale: ענה en este contexto narrativo introduce una réplica a una propuesta previa. En español, 'respondieron' conserva el valor de dar respuesta y suena natural y digno.
- source_word: בְנֵי יַעֲקֹב
  english_pob_choice: Jacob’s sons
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos de Yaacov
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se vierte de forma directa y transparente como 'los hijos de Jacob', sin perder la identificación familiar.
- source_word: בְּמִרְמָה
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - engañosamente
  - con fraude
  - con treta
  lexicon: HALOT
  rationale: מִרְמָה es un sustantivo que expresa engaño o fraude. En español, 'con engaño' conserva la fuerza adverbial de la frase preposicional y mantiene el matiz deliberado.
- source_word: וַיְדַבֵּרוּ
  english_pob_choice: and they spoke
  chosen_spanish: y hablaron
  alternatives_spanish:
  - y hablaron
  - y dijeron
  lexicon: HALOT
  rationale: דבר es más amplio que אמר. 'Hablaron' preserva esa distinción verbal y se ajusta al flujo narrativo del versículo.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí el relativo introduce una causa, no una simple relación. 'Porque' reproduce de manera clara la conexión causal del hebreo.
- source_word: טִמֵּא
  english_pob_choice: had defiled
  chosen_spanish: había deshonrado
  alternatives_spanish:
  - había profanado
  - había contaminado
  - había deshonrado
  lexicon: HALOT
  rationale: טמא en este contexto sexual-ritual implica una mancha moral grave. 'Deshonrado' comunica el agravio en un español natural, aunque 'profanado' también es posible si se desea resaltar el lenguaje cultual.
- source_word: אֲחֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - su hermana
  - la hermana de ellos
  lexicon: HALOT
  rationale: El posesivo plural se expresa naturalmente en español como 'su hermana'; el antecedente colectivo ya está claro en el contexto.
- source_word: אֶת שְׁכֶם וְאֶת חֲמוֹר אָבִיו
  english_pob_choice: Shechem and Hamor his father
  chosen_spanish: a Siquem y a Hamor, su padre
  alternatives_spanish:
  - a Siquem y a Hamor, su padre
  - a Siquem y a Hamor, el padre de él
  lexicon: HALOT
  rationale: Se conserva la relación appositiva de אָבִיו con 'su padre', en un orden natural para el español y sin perder la referencia al padre de Siquem.
theological_decisions:
- issue: Lenguaje moral-ritual de טִמֵּא
  english_pob_reading: had defiled Dinah their sister
  chosen_spanish_reading: había deshonrado a Dina, su hermana
  alternative_spanish_readings:
  - había profanado a Dina, su hermana
  - había violado a Dina, su hermana
  rationale: El hebreo usa el campo semántico de 'hacer impuro/contaminar', que el inglés POB conserva con 'defiled'. En español, 'deshonrado' transmite el agravio sexual y moral sin forzar un tecnicismo cultual que podría sonar menos natural; se mantiene la gravedad del acto sin diluirla.
  doctrine_reference: Santidad/impureza ritual y ética en la Torá; cf. Levítico 18–20.
translation_notes:
  revision_awareness: 'El inglés POB revisado eliminó un ''they'' redundante y colocó una coma para aclarar la cláusula causal. La presente versión sigue esa fluidez: mantiene una sola coordinación verbal (''respondieron... y hablaron'') y deja clara la causalidad con ''porque''. También conserva el contraste entre ''con engaño'' y el acto grave expresado por טִמֵּא, sin suavizarlo.'
  spanish_consistency_notes:
  - Se usa 'Dina' y no 'Diná' para mantener consistencia con la forma más difundida en español bíblico editorial, sin afectar la transliteración del texto fuente.
  - Se evita 'Cristo' o terminología cristológica porque el versículo no la contiene.
  - Se preserva 'Yahvé' como norma general del proyecto, pero aquí no aparece el Tetragrámaton.
