translation:
  language: es
  text: y los hivitas[a], y los arquitas, y los sinitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo emplea formas gentilicias singulares con artículo ('el hivita', 'el arquita', 'el sinita'), pero en este contexto genealógico designan pueblos o clanes; por eso se traduce en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y [marcando el objeto directo]
  - y (sin equivalente explícito del marcador de objeto)
  lexicon: HALOT
  rationale: En español no hay un equivalente natural del marcador de objeto directo אֵת; la coordinación de la lista transmite adecuadamente la relación, como en la solución inglesa auditada.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los hivitas
  alternatives_spanish:
  - el hivita
  lexicon: HALOT
  rationale: El hebreo usa una forma gentilicia singular con artículo, pero en este contexto genealógico designa un pueblo o clan. En español, el plural colectivo 'los hivitas' comunica mejor ese sentido, siguiendo la decisión inglesa.
- source_word: הָעַרְקִי
  english_pob_choice: the Arkites
  chosen_spanish: los arquitas
  alternatives_spanish:
  - el arquita
  lexicon: HALOT
  rationale: Nombre gentilicio de un grupo étnico; en una lista de pueblos, el plural español expresa mejor la referencia colectiva que el singular.
- source_word: הַסִּינִי
  english_pob_choice: the Sinites
  chosen_spanish: los sinitas
  alternatives_spanish:
  - el sinita
  lexicon: HALOT
  rationale: Como en los nombres vecinos, el hebreo singular con artículo funciona colectivamente; el plural español preserva el sentido de pueblo o clan.
translation_notes:
  revision_awareness: El texto hebreo presenta una lista breve de etnónimos con el marcador de objeto directo repetido; la versión española sigue la solución auditada en inglés y mantiene el plural colectivo donde el hebreo usa singular gentilicio.
  spanish_consistency_notes:
  - Se conservó el orden de la lista y la repetición de la conjunción para reflejar la estructura del hebreo.
  - Se usó minúscula inicial porque no hay inicio de oración editorial separado en este fragmento; el formato es de línea versicular.
  - Se evitó 'cananeos' u otras generalizaciones que el texto no explicita.
