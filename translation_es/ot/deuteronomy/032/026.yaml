translation:
  language: es
  text: 'Dije: «Yo los dispersaría[a]; haría cesar su memoria de entre la humanidad[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los esparciría». El verbo hebreo es raro y de sentido difícil; también puede entenderse como apartarlos de la vista o arrojarlos a los rincones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de entre los hombres» o «de entre los mortales». El hebreo usa un término colectivo singular para los seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - Yo dije
  - Declaré
  - Pensé
  lexicon: HALOT
  rationale: El perfecto qal de אמר introduce la intención divina expresada en discurso poético. «Dije» reproduce de manera directa y natural el valor en español, sin añadir matices interpretativos no requeridos.
- source_word: אַפְאֵיהֶם
  english_pob_choice: I would scatter them
  chosen_spanish: los dispersaría
  alternatives_spanish:
  - los esparciría
  - los arrojaría por los rincones
  - los haría desaparecer de la vista
  lexicon: HALOT
  rationale: La forma es rara y difícil; el POB en inglés mantiene una solución de juicio por dispersión. «Dispersaría» conserva esa fuerza y funciona bien en español, sin cerrar indebidamente la posible imagen de apartarlos o esparcirlos.
- source_word: אַשְׁבִּיתָה
  english_pob_choice: I would make ... cease
  chosen_spanish: haría cesar
  alternatives_spanish:
  - haría desaparecer
  - pondría fin a
  - destruiría
  lexicon: HALOT
  rationale: El hiphil de שבת expresa causar que algo cese. En español, «haría cesar» preserva la relación verbal con «cesar» y evita sobretraducir a una idea más fuerte como «destruir».
- source_word: מֵאֱנוֹשׁ
  english_pob_choice: from mankind
  chosen_spanish: entre los humanos
  alternatives_spanish:
  - de entre los hombres
  - de la humanidad
  - entre los mortales
  lexicon: HALOT
  rationale: אֱנוֹשׁ puede señalar a la humanidad en su condición mortal. «Entre los humanos» comunica el ámbito colectivo de manera natural en español y preserva el sentido genérico del hebreo.
- source_word: זִכְרָם
  english_pob_choice: their memory
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - la memoria de ellos
  - su nombre
  lexicon: HALOT
  rationale: זכר significa memoria o recuerdo. «Su memoria» es breve, idiomática y mantiene la idea de ser borrados del recuerdo humano.
theological_decisions:
- issue: Discurso divino de juicio en forma poética con intención declarada
  english_pob_reading: Render the verse as a stated divine intention using 'would' language
  chosen_spanish_reading: 'Mantener el condicional de intención: «dispersaría» / «haría cesar»'
  alternative_spanish_readings:
  - 'usar futuro simple: «dispersaré» / «haré cesar»'
  - 'usar pretérito: «dispersé» / «hice cesar»'
  rationale: El hebreo poético expresa una determinación declarada, no necesariamente la ejecución inmediata. El condicional en español conserva esa tensión entre intención y cumplimiento, en línea con la lectura auditada del POB.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla; equivalencia óptima
translation_notes:
  revision_awareness: El borrador sigue el pasaje auditado con acuerdo alto y sin revisiones aplicadas en la última pasada; por ello se conservan la intención condicional, la imagen de dispersión y el alcance colectivo de אֱנוֹשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de sustituciones reverenciales cuando el contexto lo requiera; aquí el versículo está en discurso divino y la formulación española mantiene esa voz sin introducir el nombre por no estar explícito en la línea hebrea.
  - Se evita «Cristo» o terminología cristológica ajena al texto.
  - «Humano(s)» se usa para reproducir el colectivo de אֱנוֹשׁ sin forzar un singular genérico en español.
  - La puntuación reproduce el paralelismo poético y la cita directa del original.
