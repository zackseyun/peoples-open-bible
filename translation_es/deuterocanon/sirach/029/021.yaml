translation:
  language: es
  text: Las necesidades de la vida son agua, pan y ropa, y una casa que cubre la desnudez[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “indecencia”. El término griego puede referirse a la desnudez corporal o, más ampliamente, a lo que debe ser cubierto por pudor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀρχὴ ζωῆς
  english_pob_choice: The necessities of life
  chosen_spanish: Las necesidades de la vida
  alternatives_spanish:
  - El comienzo de la vida
  - El fundamento de la vida
  - Lo principal para la vida
  lexicon: LSJ
  rationale: Aunque ἀρχή puede significar “comienzo” o “principio”, el contexto sapiencial enumera provisiones básicas. En español, “las necesidades de la vida” comunica de forma natural la función del sintagma sin perder la idea de lo básico o fundamental.
- source_word: ὕδωρ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua potable
  lexicon: LSJ
  rationale: Sustantivo concreto y directo; no requiere expansión.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: LSJ
  rationale: “Pan” conserva el sentido literal e idiomático del listado de provisiones básicas mejor que un término más general como “alimento”.
- source_word: ἱμάτιον
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestimenta
  - prenda
  lexicon: LSJ
  rationale: El singular griego funciona de manera colectiva. “Ropa” transmite con naturalidad la provisión general de vestir en español contemporáneo.
- source_word: οἶκος
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un hogar
  - refugio
  - morada
  lexicon: LSJ
  rationale: “Casa” mantiene la imagen concreta del texto. “Hogar” sería más interpretativo y menos literal.
- source_word: καλύπτων
  english_pob_choice: covering
  chosen_spanish: que cubre
  alternatives_spanish:
  - cubriendo
  - cubridor de
  lexicon: LSJ
  rationale: El participio presente modifica a οἶκος. En español, una relativa simple (“que cubre”) expresa mejor la función sin sonar forzada.
- source_word: ἀσχημοσύνην
  english_pob_choice: nakedness
  chosen_spanish: la desnudez
  alternatives_spanish:
  - la vergüenza
  - la indecencia
  - la desnudez/indecencia
  lexicon: LSJ
  rationale: La revisión inglesa prefirió el sentido más concreto de exposición corporal. En español, “desnudez” preserva esa concreción; se evita “vergüenza” porque desplaza demasiado el sentido hacia lo moral-abstrato.
theological_decisions:
- issue: Sentido de ἀρχὴ ζωῆς como proverbio de provisiones básicas
  english_pob_reading: The necessities of life
  chosen_spanish_reading: Las necesidades de la vida
  alternative_spanish_readings:
  - El comienzo de la vida
  - El principio de la vida
  - Lo fundamental para la vida
  rationale: No se trata de una afirmación temporal sobre el inicio biológico, sino de una fórmula sapiencial sobre lo indispensable para vivir. La traducción elegida evita un calco que oscurecería el proverbio.
  doctrine_reference: Sabiduría proverbial / literatura sapiencial
- issue: Sentido de ἀσχημοσύνην como exposición corporal más que vergüenza interior
  english_pob_reading: nakedness
  chosen_spanish_reading: la desnudez
  alternative_spanish_readings:
  - la vergüenza
  - la indecencia
  - lo vergonzoso
  rationale: El contexto de ropa y casa favorece el sentido concreto de cubrir el cuerpo. “Desnudez” mantiene la tensión lexical señalada en el aparato inglés sin moralizar el término.
  doctrine_reference: Lexicografía contextual del término griego
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al entender Ἀρχὴ ζωῆς de manera idiomática como provisiones básicas de la vida, y al reflejar ἀσχημοσύνην con un sentido concreto de desnudez/exposición. También se preserva la estructura enumerativa del griego con un giro español natural.
  spanish_consistency_notes:
  - Se usa “agua”, “pan” y “ropa” como trinomio de necesidades materiales básicas, manteniendo el tono sapiencial.
  - Se evita “SEÑOR” u otras sustituciones irrelevantes, ya que este versículo no contiene lenguaje divino.
  - “Casa” se conserva como imagen concreta, no como “hogar” interpretativo.
  - La nota[a] preserva la alternativa de lectura que el audit trail inglés documenta para καλύπτων ἀσχημοσύνην.
