    text: Or 'an Ephrathite,' though here the sense is most likely 'an Ephraimite.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a woman, a widow'; the translation preserves both elements with 'a widow woman.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''he rebelled against the king.'' Hebrew: ''he raised his hand against the king.'''
    reason: lexical_alternative
