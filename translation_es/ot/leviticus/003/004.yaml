  - severity: low
    issue: La nota [a] sobre «riñones» es innecesaria y poco útil
    rationale: El inglés POB no nota «kidneys», y «los dos órganos renales» no aporta una alternativa natural ni significativa para el lector. Conviene reservar las notas para ambigüedades reales.
  - severity: low
