base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/069.yaml
  text: And some of the heads of the fathers’ houses gave to the work[a]. The governor gave to the treasury one thousand gold darics, fifty basins[c][b], and five hundred thirty-five priests’ tunics.
  footnotes:
