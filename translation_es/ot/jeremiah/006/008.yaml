translation:
  language: es
  text: «Sé amonestada[a], oh Jerusalén, no sea que mi alma se aparte de ti, no sea que te convierta en desolación, una tierra sin habitantes.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Recibe corrección», «Sé instruida» o «Acepta disciplina». El verbo hebreo puede denotar recibir disciplina o corrección, no solo ser advertida.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִוָּסְרִי
  english_pob_choice: Be warned
  chosen_spanish: Recibe corrección
  alternatives_spanish:
  - Sé amonestada
  - Acepta disciplina
  - Recibe instrucción
  lexicon: HALOT
  rationale: El nifal imperativo femenino singular de יסר puede expresar recibir disciplina, corrección o instrucción. En español, «recibe corrección» conserva la fuerza admonitoria y correctiva del hebreo sin reducirlo a mera información; «recibe instrucción» suena más educativo que disciplinario.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: oh Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: nombre propio
  rationale: Se mantiene el vocativo directo del original con la interjección «oh» para reflejar el tono profético solemne en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o bien no
  lexicon: HALOT
  rationale: La construcción española «no sea que» comunica bien la advertencia con resultado negativo y suena natural en el registro profético.
- source_word: תֵּקַע נַפְשִׁי מִמֵּךְ
  english_pob_choice: my soul turn away from you
  chosen_spanish: mi alma se aparte de ti
  alternatives_spanish:
  - mi alma se aleje de ti
  - mi ser se aparte de ti
  - me aparte de ti
  lexicon: HALOT
  rationale: Se preserva la imagen antropopática de נֶפֶשׁ con «alma», como en el inglés POB. «Se aparte de ti» refleja la idea relacional de separación o distanciamiento; evita resolver la tensión a un simple «yo me aparte».
- source_word: אֲשִׂימֵךְ שְׁמָמָה
  english_pob_choice: I make you a desolation
  chosen_spanish: te haga una desolación
  alternatives_spanish:
  - te convierta en desolación
  - te ponga en desolación
  - te haga desolada
  lexicon: HALOT
  rationale: El verbo שׂים con sufijo objeto expresa hacer o dejar en cierto estado. «Te haga una desolación» conserva la nominalidad de שְׁמָמָה y suena más fiel al hebreo que un adjetivo puro.
- source_word: אֶרֶץ לֹא נוֹשָׁבָה
  english_pob_choice: a land not inhabited
  chosen_spanish: una tierra sin habitantes
  alternatives_spanish:
  - una tierra no habitada
  - una tierra deshabitada
  lexicon: HALOT
  rationale: «Sin habitantes» comunica con claridad la cláusula atributiva final y evita la rigidez de «no habitada», aunque esa opción sigue siendo posible. Se conserva el efecto de intensificación del juicio.
theological_decisions:
- issue: Preservar la tensión antropopática de נַפְשִׁי
  english_pob_reading: my soul turn away from you
  chosen_spanish_reading: mi alma se aparte de ti
  alternative_spanish_readings:
  - yo me aparte de ti
  - mi ser se aparte de ti
  rationale: La traducción mantiene «mi alma» para no suavizar la expresión divina del hebreo. Esto conserva la tensión literaria y teológica de un lenguaje humano aplicado a Yahvé, en vez de eliminarla con una paráfrasis más lisa.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se revisó el pasaje conforme al cierre de control más reciente, que indicó alta coincidencia y ningún cambio necesario; por eso se mantuvo la lectura auditada del hebreo con ajustes naturales para el español.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiriera explícitamente; en este versículo el hebreo nombra a Jerusalén y usa lenguaje de primera persona divina, por lo que no es necesario insertar el nombre.
  - Se mantuvo «alma» para נֶפֶשׁ por coherencia con la decisión teológica auditada.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque no aparece el tetragrámaton en este versículo.
