translation:
  language: es
  text: Así que Abram movió su tienda, vino y se estableció junto a los robles[a] de Mamré, que están en Hebrón, y allí edificó un altar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: "terebintos de Mamré". El término hebreo puede referirse a árboles grandes, y la especie exacta es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַל
  english_pob_choice: moved his tent
  chosen_spanish: movió su tienda
  alternatives_spanish:
  - levantó su tienda
  - puso su tienda
  lexicon: HALOT
  rationale: El verbo alude a la acción de instalar o desplazar la tienda. En español, 'movió su tienda' conserva la idea de cambio de campamento sin forzar una traducción demasiado mecánica.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: '''Vino'' mantiene la secuencia narrativa breve del hebreo y encaja bien con el movimiento previo.'
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se quedó
  - vivió
  lexicon: HALOT
  rationale: '''Se estableció'' comunica residencia asentada con naturalidad en español moderno y conserva el sentido de tomar morada.'
- source_word: בְּאֵלֹנֵי מַמְרֵא
  english_pob_choice: by the oaks of Mamre
  chosen_spanish: junto a los encinos de Mamré
  alternatives_spanish:
  - junto a los robles de Mamré
  - entre los terebintos de Mamré
  - junto a los grandes árboles de Mamré
  lexicon: HALOT
  rationale: El término hebreo puede referirse a árboles grandes, no a una especie perfectamente precisa. 'Encinos' es una opción natural en español para conservar la imagen arbórea; se preserva la ambigüedad con nota.
- source_word: אֲשֶׁר בְּחֶבְרוֹן
  english_pob_choice: which are at Hebron
  chosen_spanish: que están en Hebrón
  alternatives_spanish:
  - que estaban en Hebrón
  - que se hallan en Hebrón
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación de los encinos de Mamré. 'Que están en Hebrón' es claro y natural para un referente geográfico fijo.
- source_word: וַיִּבֶן שָׁם מִזְבֵּחַ
  english_pob_choice: there he built an altar
  chosen_spanish: y allí edificó un altar
  alternatives_spanish:
  - y allí construyó un altar
  - y allí levantó un altar
  lexicon: HALOT
  rationale: '''Edificó'' es una equivalencia digna y bíblica para el acto cultual de construir un altar, sin perder claridad.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según el estándar español del proyecto. La preposición 'a' corresponde de forma natural al destino/dedicación del altar en español.
theological_decisions:
- issue: Nombre divino YHWH en el cierre del versículo
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - para Yahvé
  - al Yahvé
  rationale: El hebreo usa directamente el Tetragrámaton. En el texto principal se traduce por 'Yahvé', conforme al estándar del proyecto, en lugar de ocultarlo con una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Ambigüedad del término para árboles en בְּאֵלֹנֵי מַמְרֵא
  english_pob_reading: oaks of Mamre / terebinths of Mamre
  chosen_spanish_reading: encinos de Mamré
  alternative_spanish_readings:
  - robles de Mamré
  - terebintos de Mamré
  - grandes árboles de Mamré
  rationale: El término hebreo permite varias especies grandes de árbol. El texto español conserva esa incertidumbre con una opción natural ('encinos') y la nota explicita la alternativa, sin sobrerresolverla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension/ambiguity where genuine'
translation_notes:
  revision_awareness: El texto fuente y el control de calidad en inglés muestran alto acuerdo y no requieren revisiones adicionales. Se conservó la secuencia narrativa, la ubicación geográfica y la referencia explícita al nombre divino. Se mantuvo la ambigüedad arbórea con nota, en consonancia con el audit trail.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - Se evitó 'Señor' como sustituto del nombre divino.
  - Se eligió 'encinos' en el texto principal y se preservaron las alternativas botánicas en nota para no fijar indebidamente la especie.
  - La sintaxis sigue el orden narrativo del hebreo sin sonar forzada en español.
