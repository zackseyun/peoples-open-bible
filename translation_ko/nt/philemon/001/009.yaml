id: PHM.1.9
reference: Philemon 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τὴν ἀγάπην μᾶλλον παρακαλῶ, τοιοῦτος ὢν ὡς Παῦλος πρεσβύτης νυνὶ δὲ καὶ δέσμιος ⸂Χριστοῦ Ἰησοῦ⸃—
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/009.yaml
  text: because of love I rather appeal[a], being such a one as Paul, an old man[c][b], and now also a prisoner of Messiah Jesus—
  footnotes:
  - marker: a
    text: Or, 'for love's sake I rather appeal.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Paul, an ambassador'; but the Greek word more naturally means 'an old man.'
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ Jesus'; translated 'Messiah Jesus' here because Χριστός functions as a title.
    reason: alternative_reading
translation:
  language: ko
  text: 도리어 사랑으로 인해 호소합니다[a]—나, 곧 노인[b] 바울, 이제는 메시아 예수[c]의 갇힌 자이기도 한 이 사람으로서.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사랑을 위하여 호소한다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「사신(使臣)」; 그러나 헬라어 πρεσβύτης는 본래 「노인」을 더 자연스럽게 가리킨다(사신은 πρεσβευτής).
    reason: alternative_reading
  - marker: c
    text: 헬라어는 「그리스도 예수」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τὴν ἀγάπην
  english_pob_choice: because of love
  chosen_korean: 사랑으로 인해
  alternatives_korean:
  - 사랑을 위하여
  - 사랑 때문에
  lexicon: BDAG
  rationale: διά + 대격은 인과·근거를 표시한다. 「사랑으로 인해」가 합쇼체 산문에 자연스럽다.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_korean: 도리어
  alternatives_korean:
  - 오히려
  - 차라리
  lexicon: BDAG
  rationale: 8절의 가능한 명령과 9절의 호소 사이의 대비를 표현한다. 「도리어」가 그 전환을 가장 분명하게 살린다.
- source_word: παρακαλῶ
  english_pob_choice: appeal
  chosen_korean: 호소합니다
  alternatives_korean:
  - 권면합니다
  - 간청합니다
  lexicon: BDAG
  rationale: 본 절은 명령이 아닌 관계적 호소이다. 「호소합니다」가 그 수사적 무게를 잘 담아내며, 「권면」보다 절박함을, 「간청」보다 격식을 보존한다.
- source_word: τοιοῦτος ὢν
  english_pob_choice: being such a one
  chosen_korean: 이 사람으로서
  alternatives_korean:
  - 이러한 사람인 채로
  - 그러한 자로서
  lexicon: BDAG
  rationale: τοιοῦτος ὢν은 화자 자기지시의 형식 표현. 한국어 「이 사람으로서」가 자기-호명의 무게를 자연스럽게 살린다.
- source_word: ὡς Παῦλος
  english_pob_choice: as Paul
  chosen_korean: 나, 곧 ... 바울
  alternatives_korean:
  - 바울로서
  - 바울 같은 자로서
  lexicon: BDAG
  rationale: ὡς는 화자의 자기 규정을 도입한다. 한국어 어순에서는 「나, 곧 노인 바울」로 동격 강조하는 것이 본문의 엄숙한 자기소개 음조를 가장 잘 살린다.
- source_word: πρεσβύτης
  english_pob_choice: an old man
  chosen_korean: 노인
  alternatives_korean:
  - 장로
  - 사신
  lexicon: BDAG
  rationale: 헬라어 πρεσβύτης는 본래 「나이 든 사람」을 가리킨다. 「사신」으로 읽는 전통(πρεσβευτής와 혼동)은 가능하지만 본 단어의 본뜻은 나이 기준이다. 본문의 평이한 어휘적 의미를 따른다.
- source_word: νυνὶ δὲ καὶ
  english_pob_choice: and now also
  chosen_korean: 이제는 ... 이기도 한
  alternatives_korean:
  - 그리고 지금도
  - 또한 지금
  lexicon: BDAG
  rationale: νυνί의 시간적 강조와 καί의 첨가를 한국어 어순에서 「이제는 ... 이기도 한」으로 합쳐 자연스럽게 옮긴다.
- source_word: δέσμιος
  english_pob_choice: a prisoner
  chosen_korean: 갇힌 자
  alternatives_korean:
  - 죄수
  - 포로
  lexicon: BDAG
  rationale: 1절과 일관되게 「갇힌 자」를 사용한다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: of Messiah Jesus
  chosen_korean: 메시아 예수의
  alternatives_korean:
  - 그리스도 예수의
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός는 「메시아」로 옮긴다.
theological_decisions:
- issue: πρεσβύτης의 의미
  chosen_reading: 노인 — 「사신」이나 「장로」가 아닌 나이를 가리키는 본뜻
  alternative_readings:
  - 사신
  - 장로
  rationale: 헬라어 본문의 평이한 어휘적 의미는 「노인」이다. 「사신」 해석은 πρεσβευτής와의 음운 유사성에 의존하지만 별개의 단어이다. 본 번역은 원어 우선의 원칙을 따른다.
  doctrine_reference: 'Translation philosophy §1 (Original-language primacy over translation tradition)'
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관된 원칙. 칭호의 무게가 살아 있는 자리.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
