revisions:
- from: 'Hazael dijo[a]: «Pero, ¿qué es tu esclavo, este perro, para que haga esta gran cosa?» Y Eliseo dijo: «Yahvé me ha mostrado que tú serás rey sobre Aram».[b]'
  to: 'Hazael dijo: «Pero, ¿qué es tu siervo, este perro, para que haga esta gran cosa?» Y Eliseo dijo: «Yahvé me ha mostrado que tú serás rey sobre Aram[a]».'
  rationale: Se corrige 'tu esclavo' a 'tu siervo' para seguir la decisión léxica documentada y el uso cortesano del hebreo en contexto. Se elimina la nota [a] por redundante y se conserva solo la alternativa pertinente sobre 'rey sobre/de Aram', anclada en el lugar correspondiente. No se requieren cambios en 'Yahvé', 'este perro' ni 'esta gran cosa', que reflejan bien la fuente y el audit trail.
