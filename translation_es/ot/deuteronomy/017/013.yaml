translation:
  language: es
  text: Y todo el pueblo oirá y temerá, y no volverá a actuar presuntuosamente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y ya no presumirá más' o 'y no volverá a actuar con arrogancia'. El verbo hebreo expresa una rebeldía voluntaria e insolente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הָעָם
  english_pob_choice: And all the people
  chosen_spanish: Y todo el pueblo
  alternatives_spanish:
  - Y toda la gente
  - Y todo el pueblo de Israel
  lexicon: HALOT
  rationale: הָעָם significa literalmente 'el pueblo'; el contexto ya identifica a Israel, así que en español basta 'todo el pueblo' sin añadir lo que el hebreo no repite.
- source_word: יִשְׁמְעוּ
  english_pob_choice: shall hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  - sabrá
  lexicon: HALOT
  rationale: En este contexto legal, שׁמע expresa que el pueblo oirá del juicio público. 'Oirá' conserva la fuerza futura y el matiz de conocimiento por audición.
- source_word: וְיִרָאוּ
  english_pob_choice: and fear
  chosen_spanish: y temerá
  alternatives_spanish:
  - y tendrá temor
  - y temerán
  lexicon: HALOT
  rationale: ירא comunica temor producido por la justicia ejecutada. 'Temerá' mantiene la brevedad del hebreo y evita especificar más de lo que el texto dice.
- source_word: וְלֹא יְזִידוּן
  english_pob_choice: and shall not act presumptuously
  chosen_spanish: y no volverá a actuar con presunción
  alternatives_spanish:
  - y no actuará con presunción
  - y no volverá a presumir
  - y no actuará con arrogancia
  lexicon: HALOT
  rationale: El hifil de זיד denota actuar insolente o presuntuosamente. 'Actuar con presunción' conserva ese valor; 'volverá' refleja el עוֹד como cese de conducta repetida.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: volverá
  alternatives_spanish:
  - otra vez
  - ya no
  lexicon: HALOT
  rationale: עוֹד indica continuación o repetición futura. En español, 'volverá' integra naturalmente el sentido de no repetir la acción.
theological_decisions:
- issue: Objeto del temor
  english_pob_reading: fear is left without an explicit object
  chosen_spanish_reading: temerá, sin añadir explícitamente el objeto del temor
  alternative_spanish_readings:
  - temerá al Señor
  - temerá el castigo
  rationale: El hebreo dice simplemente 'y temerán'; la traducción conserva esa amplitud para no resolver si el énfasis recae en Dios, en la pena pública, o en ambos.
  doctrine_reference: Preservar la ambigüedad textual y no cerrar el alcance teológico del temor.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la revisión auditada en inglés: se mantiene la secuencia legal ''oír'' -> ''temer'' -> ''no actuar con presunción'', sin añadir sujeto u objeto que el hebreo no explicita. La única adaptación es volver más natural en español la relación entre עוֹד y la repetición mediante ''volverá''.'
  spanish_consistency_notes:
  - Se usa 'pueblo' para הָעָם, en línea con el contexto nacional de Deuteronomio.
  - '''Temerá'' se conserva sin objeto explícito para reflejar la ambigüedad del hebreo.'
  - '''Actuar con presunción'' mantiene la fuerza jurídica de יזידון y evita suavizarla con ''orgullo'' o ''arrogancia'' como único matiz.'
  - La puntuación en español sigue la cadencia del paralelo hebreo con dos miembros coordinados.
