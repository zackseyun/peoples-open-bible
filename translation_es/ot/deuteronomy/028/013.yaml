translation:
  language: es
  text: Yahvé te pondrá por cabeza y no por cola[a]; estarás solamente arriba y no estarás abajo, si escuchas los mandamientos de Yahvé tu Dios, que yo te estoy mandando hoy, para guardarlos y para hacerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si obedeces los mandamientos de Yahvé tu Dios». El hebreo dice literalmente «escuchas», pero en este contexto de pacto el sentido incluye una escucha obediente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנְךָ יְהוָה
  english_pob_choice: the LORD will make you
  chosen_spanish: Yahvé te pondrá
  alternatives_spanish:
  - Yahvé te hará
  - Yahvé te establecerá
  lexicon: HALOT
  rationale: 'נתן en esta construcción con complemento predicativo comunica acción causativa: Yahvé coloca a Israel en una nueva condición. En español, «poner» expresa bien ese valor sin perder naturalidad; «hacer» también sería posible, pero «poner» se ajusta mejor al giro idiomático con complementos de estado o rango.'
- source_word: לְרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: como cabeza
  alternatives_spanish:
  - cabeza
  - como jefe
  lexicon: HALOT
  rationale: ראשׁ conserva la metáfora de superioridad o primacía. «Como cabeza» mantiene la imagen bíblica y su contraste con «cola»; «jefe» interpretaría más de lo que el hebreo dice.
- source_word: לְזָנָב
  english_pob_choice: the tail
  chosen_spanish: como cola
  alternatives_spanish:
  - cola
  - como extremo
  lexicon: HALOT
  rationale: זנב es literalmente «cola» y aquí funciona como metáfora de baja condición o seguimiento. Se preserva la imagen para sostener el paralelismo con «cabeza».
- source_word: וְהָיִיתָ רַק לְמַעְלָה
  english_pob_choice: you will be only above
  chosen_spanish: estarás solamente arriba
  alternatives_spanish:
  - estarás solo arriba
  - estarás únicamente arriba
  lexicon: HALOT
  rationale: רַק añade exclusividad y למעלה señala una posición elevada. «Solamente arriba» conserva ambas ideas con un español claro y digno, sin convertir la imagen en una mera afirmación abstracta de prosperidad.
- source_word: וְלֹא תִהְיֶה לְמָטָּה
  english_pob_choice: you will not be beneath
  chosen_spanish: y no estarás abajo
  alternatives_spanish:
  - y no estarás debajo
  - y no estarás por debajo
  lexicon: HALOT
  rationale: למטה es el contrapunto de למעלה. «Abajo» forma un par natural con «arriba» en español y preserva la metáfora espacial de estatus.
- source_word: כִּי תִשְׁמַע אֶל
  english_pob_choice: if you listen to
  chosen_spanish: si escuchas
  alternatives_spanish:
  - si oyes
  - si obedeces
  lexicon: HALOT
  rationale: כִּי aquí introduce la condición de la bendición, por lo que se traduce «si». שמע אל significa literalmente «escuchar a», y en contexto de pacto implica obediencia; se deja esa fuerza en el conjunto de la cláusula y se explicita más adelante con «guardar» y «hacer».
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los mandatos
  - las órdenes
  lexicon: HALOT
  rationale: מצוות se refiere a las estipulaciones pactales de Yahvé. «Mandamientos» es el equivalente más natural y solemne en español, y mantiene el peso legal/covenantal del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: La construcción de pacto «Yahvé tu Dios» se vierte de forma directa como «tu Dios», conservando la relación posesiva y reverencial sin añadir títulos ajenos al hebreo.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que yo te estoy mandando hoy
  - que hoy te mando
  lexicon: HALOT
  rationale: El participio מְצַוְּךָ expresa una acción en curso en el discurso de Moisés; «te mando» comunica bien esa inmediatez en español. «Hoy» se conserva porque tiene carga retórica y pactal en Deuteronomio.
- source_word: לִשְׁמֹר וְלַעֲשׂוֹת
  english_pob_choice: to keep and to do them
  chosen_spanish: para guardarlos y para hacerlos
  alternatives_spanish:
  - para guardarlos y hacerlos
  - para observarlos y hacerlos
  lexicon: HALOT
  rationale: El par de infinitivos es una fórmula deuteronómica para observar con cuidado y cumplir en la práctica. «Guardar» y «hacer» reproducen la pareja verbal de manera directa; se antepone «para» para hacer fluida la subordinación final en español.
theological_decisions:
- issue: Valor de כִּי en la cláusula condicional
  english_pob_reading: if you listen to the commandments of Yahweh your God
  chosen_spanish_reading: si escuchas los mandamientos de Yahvé tu Dios
  alternative_spanish_readings:
  - porque escuchas los mandamientos de Yahvé tu Dios
  rationale: En este contexto de bendición pactal, כִּי introduce la condición de la promesa. «Si» preserva esa lógica sin forzar una lectura causal que el versículo no exige.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Preservación de la metáfora cabeza/cola y arriba/abajo
  english_pob_reading: the head and not the tail... only above, and not beneath
  chosen_spanish_reading: como cabeza y no como cola... solamente arriba y no estarás abajo
  alternative_spanish_readings:
  - serás jefe y no cola
  - estarás en lo alto y no en lo bajo
  rationale: Se conserva la imaginería corporal/espacial del hebreo, porque el texto usa metáforas de posición y rango. Las opciones más interpretativas suavizan esa tensión y por eso no se prefieren.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: Se revisó la consistencia con el audit trail inglés y no se detectaron cambios posteriores que alteren la decisión de base; se mantiene la lectura de equivalencia óptima con preservación de metáforas y de la condicionalidad pactal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para el nombre divino.
  - Se conserva la metáfora hebrea «cabeza/cola» y su paralelo «arriba/abajo» sin convertirla en una paráfrasis abstracta.
  - «Escuchas» refleja el hebreo שמע, pero la nota aclara la posible equivalencia contextual con obediencia.
  - «Mandamientos» y «guardar/hacer» reproducen el lenguaje de pacto de Deuteronomio con registro natural en español.
