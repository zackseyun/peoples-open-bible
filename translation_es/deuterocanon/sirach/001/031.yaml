translation:
  language: es
  text: Hijo mío[a], no seas falso en el temor de Yahvé, y no te acerques a él con corazón dividido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo dice: «Hijo mío, no seas falso en el temor de Yahvé, y no te acerques a él con corazón dividido». El paralelo griego, en cambio, lee: «El que devuelve favores recuerda lo que vendrá después, y en tiempo de caída hallará apoyo».'
    reason: textual_variant
  - marker: b
    text: Literalmente, «con corazón y corazón», un modismo hebreo para la duplicidad o la división interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío
  lexicon: HALOT
  rationale: El hebreo בן con sufijo de 1cs es un vocativo paternal típico de literatura sapiencial. «Hijo mío» conserva el tono de instrucción directa y la marca singular masculina del original.
- source_word: אַל תְּכַזֵּב
  english_pob_choice: do not be false
  chosen_spanish: no seas falso
  alternatives_spanish:
  - no mientas
  - no engañes
  - no resultes falso
  lexicon: HALOT
  rationale: כּזב expresa falsedad, no solo mentira verbal. «No seas falso» reproduce mejor la advertencia moral amplia que el hebreo formula en relación con la reverencia a Dios.
- source_word: בְּיִרְאַת יְהֹוָה
  english_pob_choice: in the fear of Yahweh
  chosen_spanish: en el temor de Yahvé
  alternatives_spanish:
  - en la reverencia de Yahvé
  - respecto del temor de Yahvé
  lexicon: HALOT
  rationale: יראה aquí conserva el sentido sapiencial-religioso de temor reverente. Se mantiene «Yahvé» según la norma del proyecto para el Tetragrámaton.
- source_word: וְאַל תִּקְרַב אֵלָיו
  english_pob_choice: and do not draw near to him
  chosen_spanish: y no te acerques a él
  alternatives_spanish:
  - y no te acerques a él
  - y no te aproximes a él
  lexicon: HALOT
  rationale: קרב con אֶל significa acercarse/draw near. En español, «acercarse» comunica bien la cercanía relacional sin forzar un matiz cultual explícito que el hebreo no desarrolla aquí.
- source_word: בְּלֵב וָלֵב
  english_pob_choice: with a divided heart
  chosen_spanish: con corazón dividido
  alternatives_spanish:
  - con doble corazón
  - con corazón doble
  - con corazón duplicado
  lexicon: HALOT
  rationale: La expresión hebrea literal «corazón y corazón» es un modismo de duplicidad interior. «Corazón dividido» conserva la imagen idiomática y la inteligibilidad en español, sin suavizar la tensión ética del original.
theological_decisions:
- issue: Divine name יְהוָה in the Hebrew witness
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto español usa «Yahvé» para el Tetragrámaton. Se evita la sustitución litúrgica «SEÑOR» para mantener la transparencia textual y la correspondencia con el testimonio hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Major Hebrew/Greek mismatch at Sirach 1:31
  english_pob_reading: Translate the extant Hebrew as the primary witness, with the Greek parallel preserved in a note
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, y dejar constancia de que el griego paralelo ofrece una sentencia diferente
  alternative_spanish_readings:
  - armonizar hebreo y griego en una sola redacción
  - traducir únicamente el griego
  rationale: La evidencia hebrea disponible es la base del texto principal, pero la discrepancia con el griego es sustancial. Se preserva honestamente esa tensión en una nota, en lugar de fusionar lecturas no concordantes.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Se revisó el pasaje con atención a la marcada discrepancia entre el hebreo conservado y el paralelo griego; la redacción española sigue el hebreo de manera transparente y conserva la variante griega en nota sin armonización. No se identificaron cambios necesarios respecto del criterio auditado más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar español del proyecto.
  - Se prefirió «corazón dividido» para reproducir el modismo hebreo sin perder naturalidad en español.
  - Se evitó «siervo» u otras sustituciones no motivadas, ya que el hebreo no las exige en este versículo.
  - La nota a conserva la divergencia de contenido entre hebreo y griego para no ocultar la tensión textual.
