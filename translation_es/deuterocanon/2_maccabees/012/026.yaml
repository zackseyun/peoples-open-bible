review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca la auditoría inglesa: movimiento ofensivo contra Carnión y Atargatis, seguido de una matanza de 25.000. Sin embargo, la nota [a] no preserva con precisión la alternativa documentada en inglés, que contrasta el topónimo con un posible santuario de Atargatis y menciona la posibilidad de «Atargation»; además, «lectura alternativa» suena menos exacto que una nota de identificación referencial.'
  spanish_quality_summary: El español es claro y natural. «Avanzó contra», «Carnión» y «veinticinco mil hombres» funcionan bien. «Masacró» es aceptable, pero «slaughtered» queda algo mejor con «mató» o «dio muerte a» en registro bíblico; aun así, no es un error. La mejora necesaria es principalmente en la redacción de la nota, no en el texto principal.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El tratamiento de nombres propios y el valor militar de ἐπὶ están bien. La política del proyecto sobre notas léxicas se cumple en parte, pero conviene ajustar la nota [a] para preservar mejor la alternativa auditada.
  issues:
  - severity: medium
    issue: La nota [a] no reproduce fielmente la alternativa léxica auditada.
    rationale: El inglés conserva la posibilidad de que Ἀτεργάτιον se entienda como «Atargation» o como un santuario de Atargatis, en vez de simplemente otro nombre de ciudad. La nota española actual repite «Atargatis» y pierde parte del contraste formal documentado.
  - severity: low
    issue: La formulación «lectura alternativa» en [a] es menos precisa que una nota lexical/referencial.
    rationale: No se trata tanto de una variante textual como de una posible identificación del referente. Una redacción más directa mejora fidelidad y claridad editorial.
  revised_spanish_text: Entonces avanzó contra Carnión y Atargatis[a][b], y masacró veinticinco mil hombres.
  revised_footnotes:
  - marker: a
    text: O posiblemente, «Atargatión» se refiere a un santuario de Atargatis más que a un segundo nombre de ciudad.
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «dos miríadas de cuerpos y cinco mil», es decir, veinticinco mil muertos.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige la nota [a] para reflejar con mayor precisión la alternativa léxica/referencial preservada en la auditoría inglesa.
