translation:
  language: es
  text: Y escribió a todos los judíos que subían del reino a Judea respecto de su libertad[a], para que ningún oficial, sátrapa, gobernador o administrador viniera contra sus puertas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «respecto de su exención» o «para su libertad». El griego usa el término común para «libertad», pero en este contexto administrativo puede aludir a un privilegio o inmunidad legal.
    reason: lexical_alternative
  - marker: b
    text: Lit. «no viniera contra sus puertas»; probablemente significa que los funcionarios no debían irrumpir en sus casas ni hacer allí reclamaciones contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: he wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - hizo escribir
  - envió por escrito
  lexicon: LSJ
  rationale: El aoristo de γράφω se rinde de forma directa con «escribió». El tono administrativo del contexto lo aporta el contenido del mensaje, no el verbo mismo.
- source_word: τοῖς ἀναβαίνουσιν
  english_pob_choice: who were going up
  chosen_spanish: que subían
  alternatives_spanish:
  - que iban de regreso
  - que ascendían
  lexicon: LSJ
  rationale: ἀναβαίνω significa literalmente «subir». «Que subían» conserva el idiomático movimiento hacia Judea sin convertirlo en una paráfrasis más interpretativa.
- source_word: τῆς βασιλείας
  english_pob_choice: the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - del imperio
  - de la esfera real
  lexicon: LSJ
  rationale: βασιλεία aquí designa el dominio real o imperial. «Reino» es el equivalente más directo y natural en español, aunque el contexto sea persa.
- source_word: ὑπὲρ τῆς ἐλευθερίας
  english_pob_choice: concerning their freedom
  chosen_spanish: respecto de su libertad
  alternatives_spanish:
  - para su libertad
  - respecto de su exención
  lexicon: LSJ
  rationale: ὑπέρ con genitivo puede introducir el tema del escrito. ἐλευθερία es «libertad», pero el contexto administrativo puede implicar una exención legal; por eso se conserva «libertad» y se deja abierta esa posible implicación.
- source_word: πάντα δυνατὸν
  english_pob_choice: official
  chosen_spanish: ningún oficial
  alternatives_spanish:
  - ningún poderoso
  - ninguna autoridad
  lexicon: LSJ
  rationale: La secuencia griega es difícil y, en este listado de cargos, parece apuntar a una persona con poder o autoridad. En español, «oficial» comunica la función administrativa de modo claro y breve.
- source_word: σατράπην
  english_pob_choice: satrap
  chosen_spanish: sátrapa
  alternatives_spanish:
  - satrapa
  - gobernador provincial
  lexicon: LSJ
  rationale: Es un título persa administrativo. «Sátrapa» mantiene la especificidad histórica y coincide con el registro de la lista.
- source_word: τοπάρχην
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - toparca
  - jefe de distrito
  lexicon: LSJ
  rationale: El término denota un gobernante local o de distrito. «Gobernador» es claro para el lector moderno y conserva el sentido funcional.
- source_word: οἰκονόμον
  english_pob_choice: steward
  chosen_spanish: administrador
  alternatives_spanish:
  - mayordomo
  - encargado
  lexicon: LSJ
  rationale: οἰκονόμος puede ser administrador de una casa o hacienda; en una lista administrativa, «administrador» transmite bien la idea sin sonar demasiado doméstico.
- source_word: μὴ ἐπελεύσεσθαι ἐπὶ τὰς θύρας αὐτῶν
  english_pob_choice: should come against their doors
  chosen_spanish: fuera contra sus puertas
  alternatives_spanish:
  - se presentara en sus puertas
  - entrara en sus casas
  lexicon: LSJ
  rationale: Se conserva la imagen literal de θύραι/«puertas» y el valor de ἐπελεύσεσθαι como movimiento hostil o intrusivo. «Fuera contra sus puertas» mantiene la fuerza del giro sin cerrar la ambigüedad administrativa del original.
theological_decisions:
- issue: Naturaleza de la libertad concedida en el decreto
  english_pob_reading: concerning their freedom
  chosen_spanish_reading: respecto de su libertad
  alternative_spanish_readings:
  - respecto de su exención
  - para su libertad
  rationale: El pasaje habla de una disposición real de protección o privilegio, no de libertad espiritual. Se conserva «libertad» para respetar ἐλευθερία, y se evita fijar más de lo que el texto especifica.
  doctrine_reference: Principio de primacía del texto original; mantener la ambigüedad donde el griego no precisa el alcance jurídico exacto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y el trazado auditado en inglés. Se preservó la ambigüedad de ἐλευθερία y la imagen concreta de «sus puertas», sin suavizarla en una paráfrasis más explícita que el original no exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo «libertad» para ἐλευθερία, con nota de posible exención legal.
  - Se conservaron los títulos administrativos persas y griegos con equivalentes españoles claros.
  - La sintaxis intenta ser publicable y natural en español sin perder la estructura del mandato.
