translation:
  language: es
  text: Después de esto, edificó una muralla exterior para la ciudad de David, al oeste de Gihón en el valle, hasta la entrada[a] de la Puerta de los Peces; rodeaba Ofel[b], y la hizo muy alta[c]. También puso comandantes militares en todas las ciudades fortificadas en Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y hasta la entrada de la Puerta de los Peces». El hebreo puede leerse como si la extensión del muro se dirigiera hacia esa puerta.'
    reason: lexical_alternative
  - marker: b
    text: «Ofel» es un nombre de lugar en Jerusalén, probablemente la zona elevada al sur del monte del templo.
    reason: cultural_note
  - marker: c
    text: 'O: «rodeó Ofel». El verbo hebreo puede enfatizar que el muro cercaba o circundaba Ofel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Y después de esto
  lexicon: HALOT
  rationale: Marca secuencia temporal narrativa. «Después de esto» mantiene el flujo y evita un calco excesivo.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo básico es «construir/edificar». «Edificó» es digno y natural en español bíblico sin forzar una idea de reconstrucción que el hebreo no expresa explícitamente.
- source_word: חוֹמָה חִיצוֹנָה
  english_pob_choice: an outer wall
  chosen_spanish: un muro exterior
  alternatives_spanish:
  - una muralla exterior
  - un muro externo
  lexicon: HALOT
  rationale: La combinación indica una pared o muralla externa. «Muro exterior» conserva la relación léxica y es clara en español.
- source_word: לְעִיר דָּוִיד
  english_pob_choice: for the city of David
  chosen_spanish: para la ciudad de David
  alternatives_spanish:
  - de la ciudad de David
  - en favor de la ciudad de David
  lexicon: HALOT
  rationale: La preposición לְ en este contexto expresa finalidad o relación con la ciudad. «Para» refleja bien la función protectora/constructiva sin añadir más de lo que dice el texto.
- source_word: מַעְרָבָה לְגִיחוֹן בַּנַּחַל
  english_pob_choice: west of Gihon in the valley
  chosen_spanish: al oeste de Gihón, en el valle
  alternatives_spanish:
  - hacia el oeste de Gihón, en el valle
  - al occidente de Gihón, en el valle
  lexicon: HALOT
  rationale: מַעְרָבָה indica ubicación al oeste. «Al oeste de» es directo y natural; «valle» mantiene el sentido topográfico de נַחַל.
- source_word: וְלָבוֹא בְשַׁעַר הַדָּגִים
  english_pob_choice: as far as the entrance of the Fish Gate
  chosen_spanish: hasta la entrada de la puerta de los Peces
  alternatives_spanish:
  - hasta la entrada de la Puerta de los Peces
  - hasta el acceso de la puerta de los Peces
  lexicon: HALOT
  rationale: La construcción espacial marca extensión hacia un punto de acceso. «Hasta la entrada de» reproduce bien ese límite. «Puerta de los Peces» conserva el nombre tradicional del lugar sin sustituirlo por una paráfrasis.
- source_word: וְסָבַב לָעֹפֶל
  english_pob_choice: it went around Ophel
  chosen_spanish: rodeó el Ofel
  alternatives_spanish:
  - lo rodeó, el Ofel
  - circundó el Ofel
  lexicon: HALOT
  rationale: El hebreo puede describir el trazado del muro alrededor del lugar. En español, «rodeó el Ofel» conserva la imagen sin ambigüedad sobre el sujeto, dejando el movimiento al muro implícito por el contexto narrativo.
- source_word: וַיַּגְבִּיהֶהָ מְאֹד
  english_pob_choice: made it very high
  chosen_spanish: lo elevó mucho
  alternatives_spanish:
  - lo hizo muy alto
  - lo levantó mucho
  lexicon: HALOT
  rationale: El hifil de גבה expresa hacer alto/elevar. «Lo elevó mucho» es fiel y conciso; mantiene el intensificador מְאֹד sin introducir una idea interpretativa adicional.
- source_word: וַיָּשֶׂם
  english_pob_choice: He also placed
  chosen_spanish: También puso
  alternatives_spanish:
  - Y puso
  - También estableció
  lexicon: HALOT
  rationale: Verbo común de poner/colocar. «También» refleja el valor aditivo del contexto narrativo.
- source_word: שָׂרֵי חַיִל
  english_pob_choice: military commanders
  chosen_spanish: comandantes militares
  alternatives_spanish:
  - jefes militares
  - oficiales militares
  - capitanes del ejército
  lexicon: HALOT
  rationale: La frase denota oficiales con autoridad militar. «Comandantes militares» es claro, sobrio y suficientemente técnico para el registro bíblico.
- source_word: בְּכָל הֶעָרִים הַבְּצֻרוֹת
  english_pob_choice: in all the fortified cities
  chosen_spanish: en todas las ciudades fortificadas
  alternatives_spanish:
  - en todas las ciudades amuralladas
  - en todas las plazas fuertes
  lexicon: HALOT
  rationale: La expresión distributiva abarca todos los centros urbanos fortificados. «Fortificadas» es preciso y amplio; «ciudades» conserva el valor estándar de עָרִים.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - en Judá
  - por Judá
  lexicon: HALOT
  rationale: Aunque la preposición puede ser locativa, en español «de Judá» fluye naturalmente con «ciudades fortificadas» y mantiene la pertenencia territorial.
theological_decisions:
- issue: Referencia topográfica de Ophel y la puerta de los Peces
  english_pob_reading: Ophel is a Jerusalem place-name; the wall goes around it.
  chosen_spanish_reading: Ofel y la puerta de los Peces se mantienen como nombres propios topográficos.
  alternative_spanish_readings:
  - el Ofel
  - la colina Ofel
  - la Puerta de los Peces
  rationale: No hay motivo para reinterpretar los nombres propios ni sustituirlos por términos explicativos en el texto principal. La forma transliterada conserva la geografía del pasaje.
  doctrine_reference: Principio de transparencia textual y fidelidad toponímica
- issue: Extensión del muro y sujeto implícito del rodear
  english_pob_reading: it went around Ophel, and he made it very high
  chosen_spanish_reading: rodeó el Ofel, y lo elevó mucho
  alternative_spanish_readings:
  - el muro rodeó el Ofel
  - y rodeó el Ofel
  rationale: El hebreo permite entender que el muro es el que rodea el Ofel; el español puede mantener esa relación sin explicitar innecesariamente el sujeto si el contexto ya lo proporciona. Se conserva la secuencia verbal y la acción constructiva.
  doctrine_reference: Coherencia sintáctica con el hebreo y control de ambigüedad
- issue: Comandantes militares en las ciudades fortificadas
  english_pob_reading: He also placed military commanders in all the fortified cities in Judah.
  chosen_spanish_reading: También puso comandantes militares en todas las ciudades fortificadas de Judá.
  alternative_spanish_readings:
  - También estableció comandantes militares en todas las ciudades fortificadas de Judá
  - También colocó jefes militares en todas las ciudades fortificadas de Judá
  rationale: No hay tensión doctrinal; se preserva el sentido administrativo y defensivo de la acción real sin convertirlo en un comentario militarista.
  doctrine_reference: Descripción narrativa histórica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que corrigió el sujeto de «went around Ophel» para que sea el muro y no el hombre. En español se reflejó esa relación mediante «rodeó el Ofel» dentro del contexto de la edificación, manteniendo el progreso narrativo y la acción constructiva. También se respetó la decisión de conservar Ophel/Ofel como topónimo y de no suavizar la extensión topográfica del texto.
  spanish_consistency_notes:
  - Se mantiene «Gihón» para el topónimo y «Ofel» para Ophel, con transliteración consistente.
  - Se conserva «puerta de los Peces» como nombre del lugar, no como descripción genérica.
  - «Ciudades fortificadas» refleja de manera uniforme la fuerza de עָרִים הַבְּצֻרוֹת.
  - El texto evita un estilo mecánico, pero sigue de cerca la sintaxis hebrea y la lectura auditada del inglés POB.
