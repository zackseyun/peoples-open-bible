lexical_decisions:
- source_word: መንፈስ
  chosen: spirit
  alternatives:
  - breath
  - life
  rationale: In the idol polemic, the point is that the images have no animating spirit/life. 'Spirit' preserves the theological contrast with living beings and divine agency.
- source_word: ግብረ እደው
  chosen: work of hands
  alternatives:
  - work of human hands
  - handmade thing
  rationale: A deliberately literal rendering preserves the anti-idol formulaic force familiar in biblical polemic without over-paraphrasing.
- source_word: መታክፍቲሆሙ
  chosen: burden
  alternatives:
  - load
  - weight
  rationale: The context is carrying idols on the shoulders; 'burden' captures both physical load and rhetorical irony.
- source_word: ከሕተት ልብ
  chosen: confusion of heart
  alternatives:
  - deception of heart
  - error of heart
  rationale: The phrase denotes inward delusion/shame associated with idolatry. 'Confusion of heart' keeps the affective and cognitive sense.
- source_word: አዮቤልዉ
  chosen: jubilee
  alternatives:
  - jubilees
  rationale: Jubilees uses a technical chronological system. The singular 'jubilee' is preserved as a calendrical term, not generalized.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - heptad
  - week of years
  rationale: In Jubilees chronology this means a week of years. Main text keeps the traditional concise term 'week' while the surrounding chronology makes the sense clear.
- source_word: ቤተ ጣዖታት
  chosen: house of idols
  alternatives:
  - temple of idols
  - idol-house
  rationale: A direct rendering preserves the anti-idol emphasis without importing later temple terminology.
- source_word: በሠርቀ ወርኅ ሳብዕ
  chosen: at the beginning of the seventh month
  alternatives:
  - at the rising of the seventh month
  - at the new moon of the seventh month
  rationale: The phrase marks the opening of the month. 'Beginning' is clear and avoids overcommitting to a technical lunar expression not explicit in the Ge'ez.
- source_word: ተአምረ ከዋክብት
  chosen: signs of the stars
  alternatives:
  - portents of the stars
  - omens of the stars
  rationale: Abram is reflecting on astral indicators for rainfall. 'Signs' preserves the observational sense without endorsing astrology.
- source_word: መናፍስት እኩያን
  chosen: evil spirits
  alternatives:
  - wicked spirits
  rationale: This is the clearest modern English equivalent and preserves Jubilees's demonological worldview.
- source_word: ይስልጡ
  chosen: rule over
  alternatives:
  - have power over
  - dominate
  rationale: The verb indicates exercising mastery/influence over human thoughts; 'rule over' preserves that strong agency.
- source_word: ቃለ እግዚአብሔር
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  rationale: This formula carries revelatory weight. 'Word of the LORD' preserves biblical resonance and the mediated revelation frame.
- source_word: በእዴየ
  chosen: by my hand
  alternatives:
  - through me
  rationale: Jubilees foregrounds angelic mediation. 'By my hand' preserves the idiom and revelatory framing rather than smoothing it away.
- source_word: በዕብራይስጥ በልሳነ ፍጥረታት
  chosen: in Hebrew, in the language of creation
  alternatives:
  - in the Hebrew tongue, the language of creatures
  - in Hebrew, the primal language
  rationale: The text makes a strong claim about Hebrew as primordial. This rendering preserves that theological assertion transparently.
- source_word: ዘናም
  chosen: rainy
  alternatives:
