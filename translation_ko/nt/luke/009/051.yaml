id: LUK.9.51
reference: 'Luke 9:51'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ συμπληροῦσθαι τὰς ἡμέρας τῆς ἀναλήμψεως αὐτοῦ καὶ αὐτὸς τὸ ⸀πρόσωπον ⸀ἐστήρισεν τοῦ πορεύεσθαι εἰς Ἰερουσαλήμ,
base_translation:
  language: en
  yaml_path: translation/nt/luke/009/051.yaml
  text: 'Now it happened[a], when the days of his being taken up were being fulfilled[b], that he set his face to go to Jerusalem.'
  footnotes:
  - marker: a
    text: 'Or ''of his ascension.'' The Greek literally says ''of his being taken up.'''
    reason: alternative_reading
  - marker: b
    text: '''Set his face'' is an idiom expressing firm resolve.'
    reason: lexical_alternative
translation:
  language: ko
  text: '올려지실 날이 차 가매, 예수께서 예루살렘으로 가시려고 「얼굴을 굳히고」[a] 결단하셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 「얼굴을 굳혔다(τὸ πρόσωπον ἐστήρισεν)」는 흔들리지 않는 결의를 나타내는 셈어적 관용어로, 사 50:7의 「부싯돌같이 얼굴을 굳히고」와 공명한다. 일반 한국어 번역의 「예루살렘으로 갈 것을 굳게 결심하시고」는 의미를 풀어내지만, 본 번역은 원문 이미지의 무게를 보존한다.'
    reason: idiom_preservation
theological_decisions:
- issue: '9:51 ἐστήρισεν τὸ πρόσωπον — 셈어 관용구의 보존'
  chosen_reading: 「얼굴을 굳히고」 결단하셨습니다
  alternative_readings:
  - 예루살렘으로 갈 것을 굳게 결심하시고
  - 예루살렘을 향해 단호히 가셨습니다
  rationale: '본문의 「얼굴을 굳혔다」는 사 50:7의 「부싯돌같이 얼굴을 굳히고」를 의도적으로 반향한다. 누가복음 여행 단락(9:51-19:44) 전체의 신학적 닻이며, 메시아적 고난 결단의 무게를 원문 이미지 그대로 전달하기 위해 직역 + 각주 처리한다.'
  doctrine_reference: DOCTRINE.md §1 (Original-language primacy); §5 (Consistency of key terms)
