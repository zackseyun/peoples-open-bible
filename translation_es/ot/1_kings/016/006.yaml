    issue: 'Puntuación poco natural: ‘...Tirsa[a]; y Elá...’'
    rationale: 'En español bíblico moderno, la coordinación simple aquí se lee mejor con coma o sin puntuación fuerte: ‘..., y ...’. El punto y coma antes de ‘y’ resulta innecesario y algo forzado.'
  - severity: medium
    issue: Acentuación de nombres propios (‘Baasá’, ‘Elá’) no sustentada
    rationale: El expediente fuente inglés usa ‘Baasha’ y ‘Elah’; en español, las formas sin tilde (‘Baasa’, ‘Ela’) son suficientemente claras y más neutras si no existe una convención del proyecto que exija esas tildes. Las tildes actuales pueden sonar artificiales.
