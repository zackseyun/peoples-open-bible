translation:
  language: es
  text: 'Estos son los hijos de Efraín por sus clanes: de Shutelah, el clan de los shutelahitas; de Béquer, el clan de los bequeritas; de Tahan, el clan de los tahanitas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  - Éstos son
  lexicon: HALOT
  rationale: La fórmula demostrativa de lista genealógica se expresa de manera natural en español con verbo copulativo explícito, conservando el valor introductorio del hebreo.
- source_word: בְנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - los hijos de Efraim
  lexicon: HALOT
  rationale: '''בְנֵי'' en este registro tribal/genealógico se rinde bien como ''hijos''; mantiene la forma del original y la lectura de linaje dentro de la tribu.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: '''מִשְׁפָּחָה'' en listas censales de Números designa subdivisiones tribales; ''clanes'' preserva esa organización mejor que ''familias''.'
- source_word: לְשׁוּתֶלַח
  english_pob_choice: of Shuthelah
  chosen_spanish: de Shuteláh
  alternatives_spanish:
  - de Shutelah
  - de Sutelej
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula genealógica indica pertenencia/descendencia; 'de' reproduce bien esa relación. Se mantiene el nombre propio en forma transliterada clara para español.
- source_word: מִשְׁפַּחַת הַשֻּׁתַלְחִי
  english_pob_choice: the clan of the Shuthelahites
  chosen_spanish: el clan de los shutelahitas
  alternatives_spanish:
  - la familia de los shutelahitas
  - el clan de los shutelajíes
  lexicon: HALOT
  rationale: El gentilicio colectivo se expresa naturalmente en plural con 'los ...itas', que comunica el grupo derivado de Shuteláh sin forzar una construcción menos idiomática.
- source_word: לְבֶכֶר
  english_pob_choice: of Becher
  chosen_spanish: de Béquer
  alternatives_spanish:
  - de Bequer
  - de Beker
  lexicon: HALOT
  rationale: Se conserva la relación genealógica con 'de' y se adapta el nombre a una transliteración española legible, diferenciándolo del sustantivo común 'bequer' si apareciera.
- source_word: מִשְׁפַּחַת הַבַּכְרִי
  english_pob_choice: the clan of the Becherites
  chosen_spanish: el clan de los bequeritas
  alternatives_spanish:
  - la familia de los bequeritas
  - el clan de los béqueritas
  lexicon: HALOT
  rationale: El gentilicio hebreo se vierte con el sufijo español -itas para un clan plural. 'Bequeritas' mantiene la transparencia con el nombre Béquer.
- source_word: לְתַחַן
  english_pob_choice: of Tahan
  chosen_spanish: de Tahan
  alternatives_spanish:
  - de Tahán
  - de Tajan
  lexicon: HALOT
  rationale: La preposición genealógica se mantiene como 'de'. El nombre se deja en forma simple y reconocible para la lectura pública.
- source_word: מִשְׁפַּחַת הַתַּחֲנִי
  english_pob_choice: the clan of the Tahanites
  chosen_spanish: el clan de los tahanitas
  alternatives_spanish:
  - la familia de los tahanitas
  - el clan de los tahaníes
  lexicon: HALOT
  rationale: Se conserva la estructura repetida del versículo y el valor de grupo derivado del ancestro, con un plural español natural para la designación del clan.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la estructura genealógica del hebreo y coincide con la solución de la POB inglesa: lista demostrativa inicial, genitivo relacional con ''de'', y designaciones de clan con plural gentilicio. No se añadieron notas porque el pasaje no presenta variantes textuales ni tensiones teológicas relevantes en este versículo.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras convenciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se usa 'hijos' para בְנֵי en un registro genealógico, coherente con el contexto de Números.
  - '''clan'' se mantiene de forma consistente para מִשְׁפָּחָה, conforme al uso censal del libro.'
  - Los nombres propios se transliteran de modo uniforme y legible para español.
