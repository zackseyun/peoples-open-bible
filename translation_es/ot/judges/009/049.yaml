translation:
  language: es
  text: Así que todo el pueblo también cortó[b] una rama cada uno[a], y fueron tras Abimélec, y las amontonaron contra la cámara interior, y prendieron fuego a la cámara interior sobre ellos; así murieron también todos los habitantes de la torre de Siquem, unos mil hombres y mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno su rama»; el hebreo es literalmente «un hombre su rama».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene un verbo plural: «cortaron».'
    reason: spanish_grammar_clarification
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  english_pob_choice: cut down
  chosen_spanish: cortó una rama cada uno
  alternatives_spanish:
  - cortaron
  - cortaron ramas
  lexicon: HALOT
  rationale: 'El hebreo expresa una acción distributiva concreta: cada uno toma una rama. En español, ''cortar una rama cada uno'' conserva esa distribución mejor que un plural genérico.'
- source_word: אִישׁ שׂוֹכֹה
  english_pob_choice: each man his branch
  chosen_spanish: una rama cada uno[a]
  alternatives_spanish:
  - cada hombre su rama
  - cada uno su rama
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente muy cercana a 'un hombre, su rama'. En español, 'una rama cada uno' comunica la fuerza distributiva sin forzar una construcción extraña. Se mantiene la nota para preservar la literalidad subyacente.
- source_word: וַיֵּלְכוּ אַחֲרֵי אֲבִימֶלֶךְ
  english_pob_choice: they went after Abimelek
  chosen_spanish: fueron tras Abimélec
  alternatives_spanish:
  - siguieron a Abimélec
  lexicon: HALOT
  rationale: '''Fueron tras'' conserva el movimiento concreto del hebreo y funciona de modo natural en narrativa militar.'
- source_word: הַצְּרִיחַ
  english_pob_choice: the inner chamber
  chosen_spanish: la cámara interior
  alternatives_spanish:
  - la fortaleza interior
  - el recinto interior
  - la cámara
  lexicon: HALOT
  rationale: En este contexto, el término apunta al espacio cerrado dentro de la torre, no a la torre entera. 'Cámara interior' mantiene la distinción con 'torre de Siquem' al final del versículo.
- source_word: וַיָּשִׂימוּ עַל הַצְּרִיחַ
  english_pob_choice: piled them against the inner chamber
  chosen_spanish: las pusieron contra la cámara interior
  alternatives_spanish:
  - las amontonaron contra la cámara interior
  - las colocaron sobre la cámara interior
  lexicon: HALOT
  rationale: '''Pusieron contra'' reproduce con sobriedad la colocación de las ramas contra la estructura para quemarla, sin añadir demasiada interpretación.'
- source_word: וַיַּצִּיתוּ עֲלֵיהֶם אֶת הַצְּרִיחַ בָּאֵשׁ
  english_pob_choice: set the inner chamber on fire over them
  chosen_spanish: prendieron fuego a la cámara interior sobre ellos
  alternatives_spanish:
  - incendiaron la cámara interior sobre ellos
  - encendieron la cámara interior sobre ellos
  lexicon: HALOT
  rationale: '''Prendieron fuego'' expresa de forma natural el acto de incendiar. ''Sobre ellos'' conserva la relación espacial del hebreo sin eliminar la tensión de que el fuego cae/actúa encima de los refugiados.'
- source_word: אַנְשֵׁי מִגְדַּל שְׁכֶם
  english_pob_choice: the people of the tower of Shechem
  chosen_spanish: todos los habitantes de la torre de Siquem
  alternatives_spanish:
  - los hombres de la torre de Siquem
  - la gente de la torre de Siquem
  lexicon: HALOT
  rationale: Aunque אַנְשֵׁי es formalmente masculino plural, el versículo termina con 'hombres y mujeres', lo que favorece un referente inclusivo como 'habitantes'. 'Torre de Siquem' mantiene la referencia topográfica.
- source_word: כְּאֶלֶף
  english_pob_choice: about a thousand
  chosen_spanish: como mil
  alternatives_spanish:
  - aproximadamente mil
  - unos mil
  lexicon: HALOT
  rationale: El prefijo כ marca aproximación; 'como mil' es una opción breve y fiel en español bíblico moderno.
- source_word: אִישׁ וְאִשָּׁה
  english_pob_choice: men and women
  chosen_spanish: hombres y mujeres
  alternatives_spanish:
  - varones y mujeres
  - hombres y esposas
  lexicon: HALOT
  rationale: La expresión cuenta ambos sexos entre los muertos. 'Hombres y mujeres' es natural y transparente en español contemporáneo.
theological_decisions:
- issue: Referente de אַנְשֵׁי מִגְדַּל שְׁכֶם frente a 'hombres y mujeres'
  english_pob_reading: the people of the tower of Shechem also died, about a thousand men and women.
  chosen_spanish_reading: todos los habitantes de la torre de Siquem murieron también, como mil hombres y mujeres.
  alternative_spanish_readings:
  - los hombres de la torre de Siquem murieron también
  - la gente de la torre de Siquem murió también
  rationale: 'No hay contradicción real en el hebreo: el sustantivo masculino plural puede funcionar de modo genérico o colectivo, y el remate ''hombres y mujeres'' aclara que el grupo incluía ambos sexos. ''Habitantes'' evita restringir indebidamente el referente.'
  doctrine_reference: Lectura narrativa y semántica del hebreo bíblico; coherencia intratextual del versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente en cuanto a 'people of the tower of Shechem' y la ortografía de Abimélec. También conserva la observación auditada sobre la literalidad distributiva de 'each man his branch', pero la adapta al español con una forma natural y una nota que preserva la alternativa literal.
  spanish_consistency_notes:
  - Abimélec se escribe con tilde en español para reflejar la acentuación usual.
  - '''cámara interior'' distingue el espacio fortificado interno de la ''torre de Siquem''.'
  - '''como mil'' traduce la aproximación del prefijo כ sin exceso de precisión.'
  - Se usa 'habitantes' para evitar una exclusión de género no requerida por el cierre del versículo.
