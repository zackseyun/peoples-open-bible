    rationale: Aunque compatible, 'lejos de' sobreinterpreta la distancia/resultante. 'De su tierra' es más directo, natural y más alineado con la revisión inglesa final.
  - severity: low
    issue: El nombre 'Amos' debería normalizarse como 'Amós' en español bíblico estándar.
    rationale: La forma española habitual y más legible para lectores eclesiales es 'Amós'.
