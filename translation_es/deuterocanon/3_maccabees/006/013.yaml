translation:
  language: es
  text: Pero que las naciones retrocedan hoy ante tu poder invencible[a], oh Honorable, teniendo poder para la salvación del linaje de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pueblo de Jacob» para «el linaje de Jacob»; γένος puede denotar linaje, familia, descendencia o pueblo procedente de un antepasado común.
    reason: lexical_alternative
lexical_decisions:
- source_word: πτηξάτω
  english_pob_choice: let ... cower
  chosen_spanish: hagan ceder
  alternatives_spanish:
  - hagan retroceder
  - hagan temblar
  - hagan encogerse
  lexicon: LSJ
  rationale: El imperativo aoristo expresa retroceso por temor y sumisión. En español, «hagan ceder» conserva la idea de replegarse ante una fuerza superior sin forzar un giro demasiado coloquial o mecánico.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: En este contexto de oración se refiere al conjunto de pueblos circundantes. «Las naciones» es el equivalente más natural y mantiene la amplitud colectiva del griego.
- source_word: σὴν δύναμιν ἀνίκητον
  english_pob_choice: your invincible power
  chosen_spanish: tu poder invencible
  alternatives_spanish:
  - tu poder inconquistable
  - tu fuerza invencible
  - tu fuerza no vencida
  lexicon: LSJ
  rationale: δύναμις aquí es «poder» más que «fuerza» en sentido físico. «Invencible» conserva ἀνίκητον con buen equilibrio entre fidelidad y fluidez española.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: LSJ
  rationale: Adverbio temporal directo; «hoy» es la forma clara y natural en español contemporáneo.
- source_word: ἔντιμε
  english_pob_choice: O honored one
  chosen_spanish: oh Honrado
  alternatives_spanish:
  - oh Honorable
  - oh Reverenciado
  lexicon: LSJ
  rationale: El vocativo de ἔντιμος es un adjetivo de honor dirigido a Dios. Se conserva esa forma no titulada con «oh Honrado», evitando reemplazarla por títulos más habituales que no están en el griego.
- source_word: δυνάμεις ἔχων
  english_pob_choice: having power
  chosen_spanish: teniendo poder
  alternatives_spanish:
  - habiendo poder
  - poseyendo poder
  lexicon: LSJ
  rationale: El participio presente se refleja mejor con una construcción de simultaneidad/estado, sin añadir causalidad explícita. «Teniendo poder» mantiene la relación verbal sin sobreinterpretarla.
- source_word: ἐπὶ σωτηρίαν
  english_pob_choice: for the salvation of
  chosen_spanish: para la salvación de
  alternatives_spanish:
  - para salvar a
  - en orden a la salvación de
  lexicon: LSJ
  rationale: La preposición con acusativo indica finalidad. «Para la salvación de» conserva el sustantivo σωτηρία y el tono elevado del pasaje.
- source_word: Ἰακὼβ γένους
  english_pob_choice: the race of Jacob
  chosen_spanish: del linaje de Jacob
  alternatives_spanish:
  - del pueblo de Jacob
  - de la descendencia de Jacob
  - de la estirpe de Jacob
  lexicon: LSJ
  rationale: γένος puede significar linaje, descendencia, familia o pueblo procedente de un antepasado. «Linaje» expresa bien la relación genealógica sin forzar la palabra «raza», menos natural en español actual.
theological_decisions:
- issue: Vocativo honorífico dirigido a Dios sin título divino explícito
  english_pob_reading: O honored one
  chosen_spanish_reading: oh Honrado
  alternative_spanish_readings:
  - oh Honorable
  - oh Reverenciado
  - oh estimado
  rationale: El griego usa un adjetivo de honor como apelación directa, no un título como «Señor». La traducción conserva esa tensión y no la normaliza, manteniendo la rareza devocional del original.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance colectivo de γένος en relación con Jacob
  english_pob_reading: the race of Jacob
  chosen_spanish_reading: el linaje de Jacob
  alternative_spanish_readings:
  - el pueblo de Jacob
  - la descendencia de Jacob
  - la estirpe de Jacob
  rationale: La lectura inglesa deja abierta la alternativa entre filiación y pueblo. En español, «linaje» retiene la idea de descendencia común sin perder la referencia colectiva implícita.
  doctrine_reference: Lexical note on γένος
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la auditoría inglesa, especialmente en el participio ἔχων, que se refleja como «teniendo poder» para evitar una causalidad añadida. También conserva el vocativo honorífico ἔντιμε sin sustituirlo por un título eclesiástico no presente en el original.
  spanish_consistency_notes:
  - Se prefiere «Yahvé» para el nombre divino, pero aquí el texto griego no usa el nombre sino un vocativo honorífico; por eso no se introduce «Yahvé».
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Poder» se usa para δύναμις según el contexto, no «fuerza», porque el foco es capacidad/autoridad divina.
  - «Linaje» conserva mejor en español la ambigüedad de γένος que «raza», que en español contemporáneo puede sonar demasiado biológica o culturalmente cargada.
