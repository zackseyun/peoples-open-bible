  yaml_path: translation/ot/psalms/115/017.yaml
  text: The dead do not praise Yah[b][a], nor do any who go down into silence.
  footnotes:
  - marker: a
    text: Or 'nor do all who go down into silence.' The Hebrew uses 'all,' but in English 'any' best conveys the distributive sense in this negative construction.
    reason: lexical_alternative
  - marker: b
    text: '''Silence'' is a poetic expression for the state or realm of death; some understand it more specifically as ''the grave'' or ''Sheol.'''
    reason: alternative_reading
