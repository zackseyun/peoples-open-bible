  text: רַק֩ בְּ/כָל אַוַּ֨ת נַפְשְׁ/ךָ֜ תִּזְבַּ֣ח וְ/אָכַלְתָּ֣ בָשָׂ֗ר כְּ/בִרְכַּ֨ת יְהוָ֧ה אֱלֹהֶ֛י/ךָ אֲשֶׁ֥ר נָֽתַן לְ/ךָ֖ בְּ/כָל שְׁעָרֶ֑י/ךָ הַ/טָּמֵ֤א וְ/הַ/טָּהוֹר֙ יֹאכְלֶ֔/נּוּ כַּ/צְּבִ֖י וְ/כָ/אַיָּֽל־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/012/015.yaml
  text: But in all the desire of your soul[a], you may slaughter and eat meat, according to the blessing of Yahweh your God that he has given you, within all your gates. The unclean and the clean alike may eat it[b], as the gazelle and as the deer.
  footnotes:
  - marker: a
    text: 'Hebrew: ''in all the desire of your soul''; that is, whenever you desire it.'
    reason: lexical_alternative
  - marker: b
    text: '''Within all your gates'' is a Hebrew idiom for within your towns or settlements.'
    reason: cultural_note
