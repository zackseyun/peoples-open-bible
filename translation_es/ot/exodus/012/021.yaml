review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: Moisés convoca a los ancianos, da dos imperativos seguidos, mantiene «para ustedes» y cierra con el sacrificio pascual. Sin embargo, hay dos desalineaciones importantes con la evidencia fuente y con el audit trail inglés: (1) מִשְׁכוּ es plural sin objeto explícito, pero «Sáquenlo» introduce un pronombre singular no presente en el hebreo y además resulta ambiguo; (2) צֹאן es más amplio que «corderos», y aquí el propio expediente inglés quiso evitar estrecharlo indebidamente. Además, la nota [a] sobre «y les dijo» no corresponde a una alternativa significativa ni a una ambigüedad que deba conservarse.'
  spanish_quality_summary: El español es generalmente claro, pero «Sáquenlo y tomen para ustedes corderos» suena forzado por el pronombre singular y por la transición entre un objeto singular implícito y un plural expreso. «Degüellen la Pascua» es comprensible con nota, pero en español suena algo opaco sin un complemento aclaratorio; aun así puede mantenerse si la nota lo explica. Una redacción como «Saquen y tomen para ustedes animales del rebaño según sus familias, y degüellen la Pascua» mejora la naturalidad y evita restringir el sentido.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí hay que respetar la decisión léxica del proyecto sobre צֹאן como término amplio y la documentación inglesa sobre הַפָּסַח como metonimia. Conviene no fijar «corderos» en el texto principal. «Ancianos» y «degüellen» están bien alineados con la fuente.
  issues:
  - severity: high
    issue: «Sáquenlo» añade un objeto singular no explícito en מִשְׁכוּ
    rationale: El hebreo tiene un imperativo plural sin objeto expreso. El pronombre «lo» introduce una especificación no marcada por la fuente y crea una construcción menos natural al combinarse con «corderos» después.
  - severity: high
    issue: «corderos» estrecha indebidamente צֹאן
    rationale: צֹאן designa ganado menor del rebaño, incluyendo ovejas o cabras. El audit trail inglés explícitamente evitó limitarlo a «lamb». La nota no compensa del todo una reducción innecesaria en el texto principal.
  - severity: medium
    issue: La nota [a] sobre «y les dijo» no es necesaria
    rationale: No preserva una alternativa significativa del original ni resuelve una ambigüedad relevante para el lector español. Añade ruido documental innecesario.
  - severity: medium
    issue: «Degüellen la Pascua» necesita apoyo explicativo bien enfocado
    rationale: Aunque puede defenderse por la metonimia hebrea, en español contemporáneo la frase resulta menos transparente que en hebreo. Debe mantenerse solo con una nota breve y precisa que explique que se refiere a la víctima o sacrificio pascual.
  revised_spanish_text: 'Entonces Moisés llamó a todos los ancianos de Israel y les dijo: «Saquen[a] y tomen para ustedes animales del rebaño[b] según sus familias, y degüellen la Pascua[c]».'
  revised_footnotes:
