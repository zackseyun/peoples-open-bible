translation:
  language: es
  text: Levántate[a], porque este asunto recae sobre ti, y nosotros estamos contigo. Sé fuerte y hazlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este asunto está sobre ti» o «esta responsabilidad es tuya». El modismo hebreo indica que a Esdras le corresponde hacerse cargo de este problema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּם
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate de una vez
  - Alzate
  - Ponte en pie
  lexicon: HALOT
  rationale: El imperativo pide acción inmediata y exhorta a ponerse en movimiento. «Levántate» transmite esa urgencia con naturalidad en español moderno, sin sonar tan arcaico como «Arise» podría sonar en inglés.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación. «Porque» expresa de forma clara y directa el valor explicativo del hebreo.
- source_word: עָלֶיךָ הַדָּבָר
  english_pob_choice: this matter is on you
  chosen_spanish: este asunto recae sobre ti
  alternatives_spanish:
  - este asunto está sobre ti
  - la responsabilidad es tuya
  - el asunto te corresponde
  lexicon: HALOT
  rationale: El hebreo usa un modismo de carga o responsabilidad que recae sobre alguien. «Recae sobre ti» conserva la imagen de carga/encargo y su fuerza idiomática, evitando sustituirla por una mera paráfrasis jurídica.
- source_word: וַאֲנַחְנוּ עִמָּךְ
  english_pob_choice: and we are with you
  chosen_spanish: y nosotros estamos contigo
  alternatives_spanish:
  - y estamos contigo
  - y vamos contigo
  - y estamos a tu lado
  lexicon: HALOT
  rationale: La frase expresa apoyo y solidaridad. «Estamos contigo» es la forma más natural y fiel en español; se mantiene el pronombre explícito para reproducir el énfasis del hebreo.
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Ten ánimo
  - Mantente firme
  - Cobrar ánimo
  lexicon: HALOT
  rationale: El imperativo exhorta a la fortaleza o firmeza. «Sé fuerte» mantiene el vínculo léxico con la idea de fuerza, como en la decisión inglesa, sin desplazarlo a un matiz meramente emocional.
- source_word: וַעֲשֵׂה
  english_pob_choice: and do it
  chosen_spanish: y hazlo
  alternatives_spanish:
  - y hazlo así
  - y actúa
  - y cúmplelo
  lexicon: HALOT
  rationale: El verbo final exhorta a ejecutar concretamente lo mandado. «Hazlo» conserva la brevedad y la referencia implícita al asunto ya mencionado, igual que la solución inglesa.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin depender de una traducción mecánica. La revisión más reciente no modificó el contenido; el texto español conserva la estructura exhortativa breve, el modismo de responsabilidad y la fuerza imperativa del final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Señor» o lenguaje eclesiástico no presente en el hebreo.
  - «Asunto/recae sobre ti» preserva el matiz de carga o encargo del hebreo sin borrar la ambigüedad productiva del modismo.
  - Se usó segunda persona singular en toda la exhortación para reflejar la dirección personal del discurso a Esdras.
