translation:
  language: es
  text: Y si está sobre la cama o sobre el objeto[a] sobre el cual ella se sienta, cuando lo toque, será impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Objeto» sigue el sentido amplio de כְּלִי, que también puede significar «utensilio», «recipiente» o «vasija».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: Conserva la relación conjuntiva del hebreo y la apertura condicional del caso legal sin sonar forzado en español.
- source_word: עַל הַמִּשְׁכָּב
  english_pob_choice: on the bed
  chosen_spanish: sobre la cama
  alternatives_spanish:
  - en la cama
  - sobre el lecho
  lexicon: HALOT
  rationale: מִשְׁכָּב designa el lugar de acostarse; en español, 'cama' es la opción más clara y natural en este contexto de pureza ritual.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: está
  alternatives_spanish:
  - es
  lexicon: HALOT
  rationale: El pronombre retoma un objeto o situación del contexto; en español se evita forzar un sujeto explícito y se traduce con una forma verbal natural.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: HALOT
  rationale: Conjunción disyuntiva simple y directa.
- source_word: עַל הַכְּלִי
  english_pob_choice: on the item
  chosen_spanish: sobre el objeto[a]
  alternatives_spanish:
  - sobre el utensilio[a]
  - sobre el recipiente[a]
  - sobre el artículo[a]
  lexicon: HALOT
  rationale: כְּלִי es un término amplio; 'objeto' preserva la amplitud semántica mejor que una opción más estrecha como 'recipiente' o 'utensilio'.
- source_word: אֲשֶׁר הִוא יֹשֶׁבֶת עָלָיו
  english_pob_choice: on which she sits
  chosen_spanish: sobre el cual ella se sienta
  alternatives_spanish:
  - en el cual ella se sienta
  - que ella usa para sentarse
  lexicon: HALOT
  rationale: La relativa con participio se expresa con un español claro y formal. 'Se sienta' conserva el valor de acción habitual/estado del hebreo sin añadir interpretación.
- source_word: בְּנָגְעוֹ בוֹ
  english_pob_choice: when he touches it
  chosen_spanish: al tocarlo él
  alternatives_spanish:
  - cuando lo toca
  - cuando él lo toca
  lexicon: HALOT
  rationale: La construcción temporal hebrea se naturaliza en español con una subordinación de infinitivo. Se mantiene el matiz de contacto directo y el referente singular del verbo.
- source_word: יִטְמָא
  english_pob_choice: he shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  lexicon: HALOT
  rationale: En la ley de pureza, טָמֵא expresa estado ritual. 'Impuro' comunica la categoría legal con buena inteligibilidad en español; se evita 'inmundo' por carga arcaizante.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: '''Tarde'' refleja de manera natural el valor temporal de עֶרֶב en español común, sin perder la fórmula legal recurrente.'
theological_decisions:
- issue: Naturaleza de טָמֵא en la legislación de pureza
  english_pob_reading: ritual impurity, rendered simply as 'unclean'
  chosen_spanish_reading: impureza ritual, expresada como 'impuro'
  alternative_spanish_readings:
  - ceremonialemente impuro
  - contaminado
  rationale: El contexto es legislación de pureza, no culpa moral. 'Impuro' conserva la categoría legal con menos carga doctrinal añadida que formulaciones más explicativas.
  doctrine_reference: Levítico 11–15; distinción entre pureza ritual y pecado moral
- issue: Referente del pronombre singular en 'when he touches it'
  english_pob_reading: gender-accurate singular in the legal scenario
  chosen_spanish_reading: al tocarlo él
  alternative_spanish_readings:
  - al tocarlo una persona
  - al tocarlo
  rationale: Se preserva el valor singular del hebreo sin convertirlo en una generalización impersonal que borre el rastro gramatical del original.
  doctrine_reference: Principios de fidelidad gramatical al texto fuente
translation_notes:
  revision_awareness: Comparé el hebreo consonántico-vocalizado de WLC con la traducción auditada en inglés de POB. La decisión principal fue mantener la amplitud de כְּלִי con «objeto» y conservar el lenguaje legal de impureza con «impuro», sin añadir explicaciones interpretativas no exigidas por el verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene el registro legal sobrio y no se introduce lenguaje moralizante ajeno al pasaje.
  - El anclaje de nota [a] se coloca solo en la primera ocurrencia relevante de כְּלִי para evitar redundancia.
