    text: Or 'with a bull from the herd.' The Hebrew literally says 'a bull, son of the herd,' an idiom for a bull from the cattle.
    reason: lexical_alternative
  - marker: b
    text: Or 'for a purification offering.' The Hebrew term can emphasize ritual purification as well as relation to sin.
    reason: alternative_reading
