  lexicon: BDAG
  rationale: 「하나님의 뜻」이 한국 교회 전통의 정형 어휘.
- source_word: ὁ ἁγιασμὸς ὑμῶν
  english_pob_choice: your sanctification
  chosen_korean: 여러분의 거룩함
