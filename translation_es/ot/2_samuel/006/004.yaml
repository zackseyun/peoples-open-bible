translation:
  language: es
  text: Lo llevaron de la casa de Abinadab[a], que estaba en la colina, con el arca de Dios, y Ahío iba delante del arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaba en Guibeá». El hebreo גִּבְעָה puede leerse como el sustantivo común «colina» o como el nombre propio del lugar «Guibeá».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂאֻהוּ
  english_pob_choice: They carried it
  chosen_spanish: Lo llevaron
  alternatives_spanish:
  - Lo cargaron
  - Lo transportaron
  - Lo llevaron consigo
  lexicon: HALOT
  rationale: El verbo נשׂא aquí expresa traslado del objeto. En español, ‘lo llevaron’ comunica el movimiento del arca de manera natural sin añadir especificación innecesaria sobre el modo físico del transporte.
- source_word: מִבֵּית אֲבִינָדָב
  english_pob_choice: from the house of Abinadab
  chosen_spanish: desde la casa de Abinadab
  alternatives_spanish:
  - de la casa de Abinadab
  - desde el hogar de Abinadab
  lexicon: HALOT
  rationale: La preposición מן indica origen o salida. ‘Desde la casa de Abinadab’ conserva el sentido locativo y de procedencia de forma clara en español.
- source_word: אֲשֶׁר בַּגִּבְעָה
  english_pob_choice: which was on the hill
  chosen_spanish: que estaba en el collado
  alternatives_spanish:
  - que estaba en la colina
  - que estaba en Gueba
  - que estaba en Gibeá
  lexicon: HALOT
  rationale: Se sigue la lectura de sustantivo común para גִּבְעָה, no como nombre propio. ‘Collado’ es un equivalente natural y sobrio en español para un relieve elevado, manteniendo abierta la alternativa geográfica mediante nota.
- source_word: עִם אֲרוֹן הָאֱלֹהִים
  english_pob_choice: with the ark of God
  chosen_spanish: con el arca de Dios
  alternatives_spanish:
  - junto con el arca de Dios
  - con el arca divina
  lexicon: HALOT
  rationale: ‘Arca de Dios’ es la traducción transparente de אֲרוֹן הָאֱלֹהִים. ‘Con’ conserva la idea de acompañamiento sin sobretraducir el matiz conjuntivo.
- source_word: וְאַחְיוֹ
  english_pob_choice: and Ahio
  chosen_spanish: y Ahío
  alternatives_spanish:
  - y Ahio
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma accesible para lectura en español, con acento gráfico para la pronunciación castellana estándar cuando procede.
- source_word: הֹלֵךְ
  english_pob_choice: was walking
  chosen_spanish: iba delante
  alternatives_spanish:
  - iba caminando
  - estaba caminando
  - andaba
  lexicon: HALOT
  rationale: El participio indica acción en curso. En este contexto procesional, ‘iba delante’ reproduce con naturalidad el movimiento continuo y la posición relativa frente al arca, sin reducirlo a un simple pasado puntual.
- source_word: לִפְנֵי הָאָרוֹן
  english_pob_choice: before the ark
  chosen_spanish: delante del arca
  alternatives_spanish:
  - ante el arca
  - en frente del arca
  lexicon: HALOT
  rationale: ‘Delante de’ expresa con naturalidad la relación espacial de לפני en español contemporáneo. Se prefiere aquí ‘delante del arca’ porque el contexto narrativo es procesional.
translation_notes:
  revision_awareness: 'Se siguió la última revisión sin cambios del audit trail inglés: no se requieren ajustes al sentido base. La principal tensión exegética preservada es la ambigüedad de גִּבְעָה, reflejada en el texto principal y en la nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘arca de Dios’ como traducción directa y transparente de אֲרוֹן הָאֱלֹהִים.
  - Se evitó ‘SEÑOR’ o equivalentes, porque el versículo no contiene el nombre divino יהוה sino la expresión ‘Dios’.
  - Se conservó el aspecto progresivo del participio hebreo con una formulación española natural para el contexto narrativo.
  - El nombre propio Ahío se adaptó con ortografía española digna y pronunciable.
