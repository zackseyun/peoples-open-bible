revisions:
- from: ¡Ay de ti, Moab[a]! El pueblo de Quemos ha perecido, porque tus hijos han sido llevados cautivos, y tus hijas en cautiverio.
  to: ¡Ay de ti, Moab! El pueblo de Quemos ha perecido, porque tus hijos varones han sido llevados cautivos[a], y tus hijas, en cautiverio.
  rationale: Se corrige «tus hijos» a «tus hijos varones» para preservar el contraste explícito del hebreo con «tus hijas». Se reubica la nota al pie al segmento de cautiverio, que es donde realmente aplica la alternativa léxica. Se mantiene el resto del borrador, que es fiel, claro y teológicamente adecuado.
