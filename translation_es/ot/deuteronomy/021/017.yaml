base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/021/017.yaml
  text: But he shall acknowledge the firstborn[a], the son of the unloved wife, by giving him a double portion of all that is found to belong to him, for he is the firstfruits of his vigor[c][b]; the right of the firstborn belongs to him.
  footnotes:
  - marker: a
    text: Or 'the son of the hated wife.' The Hebrew term can be rendered more literally as 'hated,' but here likely denotes the less favored or unloved wife in contrast to the loved wife.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a mouth of two,' an idiom meaning a double share or double portion.
    reason: lexical_alternative
  - marker: c
    text: Or 'the first of his strength.' The Hebrew expression refers to the first issue as the first expression of the father's generative power.
    reason: lexical_alternative
