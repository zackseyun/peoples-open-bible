translation:
  language: es
  text: 'Mira[a]: así como los ojos de los siervos están puestos en la mano de sus amos, como los ojos de una sierva están puestos en la mano de su señora, así nuestros ojos están puestos en Yahvé, nuestro Dios, hasta que nos muestre favor[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ve» o «He aquí»; la imagen presenta a servidores atentos a la señal o provisión de un superior.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que sea benigno con nosotros» o «hasta que tenga misericordia de nosotros». El hebreo de חנן admite el matiz de favor/gracia además de misericordia.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce la comparación con un llamado de atención. «Mira» comunica ese deíctico de forma natural y actual en español, sin el tono más arcaico de «He aquí».
- source_word: כְעֵינֵי
  english_pob_choice: as the eyes of
  chosen_spanish: así como los ojos de
  alternatives_spanish:
  - como los ojos de
  - igual que los ojos de
  lexicon: HALOT
  rationale: La forma comparativa del hebreo se reproduce con una estructura paralela y fluida en español, manteniendo el ritmo poético del versículo.
- source_word: עֲבָדִים
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: HALOT
  rationale: El inglés POB dejó abierta la alternativa «slaves» por la fuerza léxica de עֲבָדִים. En español, «esclavos» conserva esa fuerza dependiente y evita suavizar el término; la imagen es de atención subordinada ante un superior.
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - mano
  - brazo
  lexicon: HALOT
  rationale: 'Se mantiene literalmente «mano» por ser la imagen hebrea directa: la mirada espera la señal, provisión o gesto del superior.'
- source_word: אֲדֹנֵיהֶם
  english_pob_choice: their masters
  chosen_spanish: sus amos
  alternatives_spanish:
  - sus señores
  - sus dueños
  lexicon: HALOT
  rationale: «Amo» es el equivalente más natural en español para el superior de esclavos en este contexto doméstico y evita la confusión con el título divino «Señor».
- source_word: שִׁפְחָה
  english_pob_choice: a female servant
  chosen_spanish: una esclava
  alternatives_spanish:
  - una servidora
  - una criada
  lexicon: HALOT
  rationale: El término específico femenino conserva la distinción de género y la misma intensidad léxica que en עֲבָדִים.
- source_word: גְּבִרְתָּהּ
  english_pob_choice: her mistress
  chosen_spanish: su señora
  alternatives_spanish:
  - su ama
  - su señora
  lexicon: HALOT
  rationale: «Señora» es el correlato natural de «amo/esclava» y expresa con claridad la relación de superioridad femenina en el paralelismo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual manera
  - de este modo
  lexicon: HALOT
  rationale: Marca el paso del símil a la aplicación. «Así» es breve, paralela y mantiene el enlace poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Nombre divino. En español, «Yahvé» preserva la convención reverente y la transparencia textual, evitando la sustitución por un título genérico.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Se traduce de forma directa para conservar el matiz de pertenencia pactal y la cercanía de la apelación.
- source_word: חנן
  english_pob_choice: until he shows us favor
  chosen_spanish: hasta que tenga misericordia de nosotros
  alternatives_spanish:
  - hasta que nos muestre favor
  - hasta que sea bondadoso con nosotros
  - hasta que nos haga gracia
  lexicon: HALOT
  rationale: El hebreo admite el matiz de favor/gracia; en español, «tenga misericordia» es idiomático y mantiene la dependencia suplicante del verso. La alternativa de «favor» queda preservada en la nota para no cerrar indebidamente la amplitud semántica.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide preservarlo en español como «Yahvé». Esto evita la sustitución litúrgica por «Señor» y mantiene la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of חנן in the closing petition
  english_pob_reading: until he shows us favor
  chosen_spanish_reading: hasta que tenga misericordia de nosotros
  alternative_spanish_readings:
  - hasta que nos muestre favor
  - hasta que sea gracioso con nosotros
  - hasta que se compadezca de nosotros
  rationale: El verbo חנן puede expresar favor/gracia. En español, «tener misericordia» transmite la actitud dependiente y la espera de una intervención benigna; la nota conserva la alternativa «favor» para no perder la tensión léxica entre gracia y misericordia.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension where ambiguity is genuine
translation_notes:
  revision_awareness: El pasaje coincide en alta medida con el audit trail inglés. La principal decisión interpretativa es conservar la fuerza social de עֲבָדִים con «esclavos» en lugar de suavizar a «sirvientes», y rendir חנן con una forma idiomática de súplica en español sin perder la alternativa de «favor» documentada por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «esclavos» / «amo» / «esclava» / «señora» para conservar el campo semántico doméstico y la tensión léxica del símil.
  - «Ojos» y «mano» se traducen literalmente para preservar la metáfora corporal del texto.
  - La cláusula final conserva en nota la alternativa semántica de favor/gracia para חנן.
  - Se evita «SEÑOR» como máscara del Nombre divino, siguiendo la política del proyecto.
