translation:
  language: es
  text: El temor del hombre[a] tiende un lazo; pero el que confía en Yahvé será puesto en alto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el temor del hombre da un lazo». La expresión significa que temer a las personas se convierte en una trampa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estará seguro» o «será protegido»; el hebreo literalmente dice «será puesto en alto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרְדַּת
  english_pob_choice: fear of
  chosen_spanish: el temor de / el temor del
  alternatives_spanish:
  - el miedo de
  - el pavor de
  - el temor hacia
  lexicon: HALOT
  rationale: En este proverbio, el sustantivo expresa la actitud interna de temor o inquietud. 'Temor' conserva mejor el registro sapiencial y la amplitud semántica que 'miedo'. En combinación con 'del hombre' produce una formulación natural y fiel.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la gente
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico. 'El hombre' mantiene ese valor genérico y la antítesis con 'el que confía en Yahvé'. 'La gente' o 'los seres humanos' explicitan más, pero suavizan la forma proverbial del original.
- source_word: יִתֵּן
  english_pob_choice: lays
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - tiende
  - da
  lexicon: HALOT
  rationale: Literalmente es 'da', pero con 'trampa' la idea es la de poner o tender un lazo. 'Pone' es breve, idiomático y conserva la imagen sin recargar el español.
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  - un cepo
  lexicon: HALOT
  rationale: '''מוֹקֵשׁ'' es un término de caza/atrapamiento. En español, ''trampa'' comunica bien la función metafórica y es más natural para lectores amplios. ''Lazo'' también sería posible, pero puede sonar más específico o más marcado regionalmente.'
- source_word: וּבוֹטֵחַ
  english_pob_choice: but whoever trusts
  chosen_spanish: pero el que confía
  alternatives_spanish:
  - pero quien confía
  - pero el que se confía
  - pero el que pone su confianza
  lexicon: HALOT
  rationale: El participio funciona de modo genérico. 'El que confía' preserva la relación directa con el hebreo y evita la ambigüedad de 'quien' en estilo proverbial, aunque 'quien confía' también sería aceptable.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé', conforme al criterio del proyecto para יהוה. Esto preserva la referencia explícita al nombre del pacto y evita la sustitución por un título.
- source_word: יְשֻׂגָּב
  english_pob_choice: will be set on high
  chosen_spanish: será puesto en alto
  alternatives_spanish:
  - será exaltado
  - será levantado en alto
  - estará seguro
  lexicon: HALOT
  rationale: El verbo conserva la imagen de elevación como lugar de seguridad. 'Será puesto en alto' reproduce esa metáfora de manera bastante literal y, en español, mantiene tanto la idea de protección como la de altura inaccesible.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. El estándar del proyecto en español es 'Yahvé', así que se conserva el nombre propio en lugar de ocultarlo tras un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance genérico de אָדָם y בוֹטֵחַ
  english_pob_reading: Retain 'man' in the first clause and use 'whoever trusts' in the second
  chosen_spanish_reading: Mantener 'el hombre' y 'el que confía'
  alternative_spanish_readings:
  - la persona
  - quien confía
  - el que pone su confianza
  rationale: La frase contrapone el temor a los seres humanos con la confianza en Yahvé. 'El hombre' conserva el singular genérico del hebreo; 'el que confía' mantiene la función proverbial del participio sin introducir una abstracción innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagen de seguridad en יְשֻׂגָּב
  english_pob_reading: will be set on high
  chosen_spanish_reading: será puesto en alto
  alternative_spanish_readings:
  - será protegido
  - estará seguro
  - será exaltado
  rationale: La forma hebrea literalmente expresa ser levantado o puesto en un lugar alto, con el sentido derivado de seguridad. La traducción conserva la imagen sin borrar esa tensión metafórica entre altura y protección.
  doctrine_reference: HALOT; Proverbs wisdom imagery
translation_notes:
  revision_awareness: El texto hebreo y el contexto de auditoría inglesa muestran alta concordancia; no se registran revisiones sustantivas en la última pasada. La versión española conserva la metáfora proverbial principal y la tensión entre la imagen literal de elevación y el sentido de seguridad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יהוה en el texto principal.
  - '''Temor del hombre'' preserva el singular genérico hebreo y la formulación proverbial.'
  - '''Será puesto en alto'' deja visible la imagen metafórica, con nota de seguridad/protección como alternativa.'
  - Se evita 'Cristo' y terminología eclesiástica no presente en el versículo.
  - La puntuación sigue el patrón de contraste del hebreo con punto y coma antes de la segunda cola.
