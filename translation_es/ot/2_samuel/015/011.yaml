- from: Doscientos hombres de Jerusalén fueron con Absalón[a], invitados, y fueron con ingenuidad, sin saber nada.
  to: Doscientos hombres de Jerusalén fueron con Absalón[a], invitados, y fueron en su inocencia, sin saber nada.
  rationale: 'Se reemplaza «con ingenuidad» por «en su inocencia» para reflejar mejor לְתֻמָּם en este contexto: fueron sin sospechar y sin conocimiento del plan de Absalón. La nueva redacción es más idiomática, más digna y evita el matiz peyorativo potencial de «ingenuidad». Se ajusta la nota para preservar la alternativa relevante («con integridad») sin repetir la nueva lectura principal.'
