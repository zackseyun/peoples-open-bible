base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/002/011.yaml
  text: Yahweh will be fearsome against them[a], for he will make all the gods of the earth waste away; and they will bow down to him, each from his own place[b], all the coastlands of the nations.
  footnotes:
