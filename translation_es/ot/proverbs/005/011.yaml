translation:
  language: es
  text: y gimes al final[b][a], cuando tu carne y tu cuerpo se consumen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gimes de dolor»; el verbo hebreo denota un clamor audible de aflicción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en tu postrer fin» o «al final de tu vida»; el hebreo puede referirse tanto al desenlace final como al término de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָהַמְתָּ
  english_pob_choice: and you groan
  chosen_spanish: y gimes
  alternatives_spanish:
  - y gimes de dolor
  - y lamentas
  - y gimes angustiado
  lexicon: HALOT
  rationale: El hebreo נהם expresa un sonido gutural de angustia. En español, «gimes» transmite bien ese quejido audible sin forzar una imagen demasiado interpretativa. Se evita «lamentas» porque pierde el matiz sonoro.
- source_word: בְאַחֲרִיתֶךָ
  english_pob_choice: at your end
  chosen_spanish: en tu fin
  alternatives_spanish:
  - al final de tu vida
  - en tu postrimería
  - en tu último destino
  lexicon: HALOT
  rationale: אַחֲרִית puede referirse al final o al desenlace/resultados finales. «En tu fin» conserva la concisión y la ambigüedad útil del hebreo, manteniendo abierta la referencia al final de la vida y al desenlace de la conducta.
- source_word: בִּכְלוֹת
  english_pob_choice: when ... are consumed
  chosen_spanish: cuando ... se consumen
  alternatives_spanish:
  - cuando ... se acaban
  - cuando ... se agotan
  - al consumirse ...
  lexicon: HALOT
  rationale: El infinitivo de כלה marca circunstancia temporal. «Se consumen» refleja tanto el desgaste físico como la consumación/agotamiento del cuerpo en un español natural.
- source_word: בְּשָׂרְךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tu organismo
  - tu cuerpo físico
  lexicon: HALOT
  rationale: בשר significa literalmente «carne». Se mantiene este término para conservar la imagen concreta del hebreo y su paralelismo con el siguiente miembro.
- source_word: וּשְׁאֵרֶךָ
  english_pob_choice: your body
  chosen_spanish: tu cuerpo
  alternatives_spanish:
  - tu ser
  - tu resto
  - tu organismo
  lexicon: HALOT
  rationale: שְׁאֵר puede designar el cuerpo o la parte restante de una persona, según el contexto. Aquí, en paralelo con «tu carne» y en un contexto de deterioro corporal, «tu cuerpo» comunica con claridad la idea sin introducir asociaciones extrañas como «pariente» o «resto».
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no hay cambios sustantivos respecto del pase final; se conserva la solución óptima acordada para el verbo de angustia y la ambigüedad de אַחֲרִית.'
  spanish_consistency_notes:
  - Se mantiene «carne» para בשר y «cuerpo» para שְׁאֵר para preservar el paralelismo hebreo.
  - Se usa «fin» en singular para reflejar la concisión del original y su posible doble referencia al desenlace y al final de la vida.
  - La puntuación con coma después de «fin» reproduce la estructura condicional temporal del hebreo.
