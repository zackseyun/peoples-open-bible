- from: y a los que estaban en Hebrón[a], y a todos los lugares por donde habían andado David y sus hombres.
  to: y a los de Hebrón[a], y a todos los lugares por donde David y sus hombres habían recorrido.
  rationale: Se elimina la adición innecesaria 'estaban' y se sustituye 'habían andado' por 'habían recorrido' para reflejar mejor el sentido de desplazamiento repetido del hebreo en un español más natural. Se conserva la nota léxica con formato corregido. Aunque el orden 'David y sus hombres habían recorrido' es algo más idiomático en español que el hebreo más literal, preserva el mismo sentido.
