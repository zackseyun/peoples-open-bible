translation:
  language: es
  text: Mira mi aflicción y mi sufrimiento[a], y perdona todos mis pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'y quita todos mis pecados'. El verbo hebreo puede significar 'cargar', 'llevar' o 'quitar'; aquí funciona como un modismo para perdonar el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Look on
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira de cerca
  - Mira con atención
  - Pon tus ojos en
  lexicon: HALOT / uso imperativo de ראה
  rationale: El imperativo dirige la súplica a Dios. En español, 'Mira' conserva el sentido de atención divina y la fuerza petitoria sin sonar forzado; 'ver' sería más plano, y las opciones perifrásticas añaden más de lo que el hebreo exige.
- source_word: עָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi miseria
  - mi pobreza
  - mi sufrimiento
  lexicon: HALOT
  rationale: עֳנִי puede expresar aflicción, miseria o sufrimiento. 'Aflicción' mantiene el tono de lamentación y no restringe indebidamente el sentido a pobreza económica.
- source_word: וַעֲמָלִי
  english_pob_choice: and my trouble
  chosen_spanish: y mi angustia
  alternatives_spanish:
  - y mi trabajo penoso
  - y mi fatiga
  - y mi penar
  lexicon: HALOT
  rationale: עָמָל puede significar trabajo penoso, fatiga, afán o trouble. En paralelo con 'aflicción', 'angustia' comunica bien la carga vivida en español actual; 'trabajo' sería demasiado literal y ambiguo en este contexto.
- source_word: וְשָׂא
  english_pob_choice: forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - quita
  - levanta y aparta
  - lleva lejos
  lexicon: HALOT
  rationale: El verbo נשׂא literalmente es 'levantar/cargar/llevar', pero con pecados como objeto funciona como idiomática de quitar o perdonar. 'Perdona' transmite el sentido teológico con claridad y sin perder la base de remoción implícita.
- source_word: לְכָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: La construcción se expresa naturalmente en español como 'todos mis pecados'. Mantiene la amplitud total del objeto sin introducir una preposición innecesaria.
- source_word: חַטֹּאותָי
  english_pob_choice: my sins
  chosen_spanish: mis pecados
  alternatives_spanish:
  - mis faltas
  - mis ofensas
  lexicon: HALOT
  rationale: El plural de חטאת en sentido moral se vierte de forma directa como 'pecados'. Es la opción más clara y fiel en este contexto penitencial.
theological_decisions:
- issue: Sentido idiomático de נשׂא con el objeto 'pecados'
  english_pob_reading: '''forgive all my sins'''
  chosen_spanish_reading: '''perdona todos mis pecados'''
  alternative_spanish_readings:
  - '''quita todos mis pecados'''
  - '''lleva lejos todos mis pecados'''
  - '''levanta todos mis pecados'''
  rationale: El hebreo expresa la remoción del pecado mediante un verbo de 'levantar/llevar'. En español, 'perdona' comunica esa misma realidad de forma natural y doctrinalmente transparente, sin volver la línea oscura o mecánica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en que no se requiere revisión adicional: la lectura inglesa vigente y el chequeo cruzado muestran acuerdo alto, sin cambios aplicados.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - '''Pecados'' conserva el plural moral del hebreo חטאות.'
  - '''Mira'' evita una traducción demasiado débil (''ve'') y conserva la súplica directa del imperativo.'
  - La nota al pie preserva la tensión lexical entre el valor literal de נשׂא y su sentido idiomático de perdonar.
