    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del griego y la lógica del POB inglés, pero reemplaza varios calcos o expresiones poco naturales por español claro y digno: «este mensaje» por «palabra», «nos distanciemos» por «enajenarnos», «ha pasado mucho tiempo» como forma idiomática principal para καιροί, con la alternativa plural preservada en nota, y «nos enviaron mensaje» para explicitar en español el acto comunicativo implícito.'
