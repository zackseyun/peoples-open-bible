translation:
  language: es
  text: No cambies a un amigo por dinero[a], ni a un hermano[b] por el oro de Ofir[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por pago».'
    reason: lexical_alternative
  - marker: b
    text: «Hermano» puede referirse a un hermano literal o, de manera más amplia, a un pariente cercano o compañero íntimo.
    reason: lexical_alternative
  - marker: c
    text: 'El griego tiene una lectura muy distinta: «Recuerda que la ira no dura mucho». El testimonio hebreo preservado en la Geniza de El Cairo, en cambio, advierte contra cambiar a un amigo o a un hermano por riqueza.'
    reason: textual_variant
lexical_decisions:
- source_word: תָּמִיר
  english_pob_choice: exchange
  chosen_spanish: cambiar
  alternatives_spanish:
  - intercambiar
  - canjear
  - trocar
  lexicon: HALOT
  rationale: El hifil expresa la idea de sustituir una cosa por otra. En español, «cambiar» comunica bien la acción comercial o de sustitución sin volverse artificioso; mantiene la fuerza prohibitiva del dicho sapiencial.
- source_word: אוֹהֵב
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - persona amada
  - amante
  - compañero fiel
  lexicon: HALOT
  rationale: Aunque literalmente es «el que ama», en este contexto sapiencial la relación es la de un amigo o aliado leal. «Amigo» es idiomático y preserva el valor relacional del término.
- source_word: בִּמְחִיר
  english_pob_choice: for money
  chosen_spanish: por dinero
  alternatives_spanish:
  - por pago
  - por un precio
  - por ganancia
  lexicon: HALOT
  rationale: El sustantivo significa «precio» o «pago». «Por dinero» sigue el sentido mercantil del contexto y coincide con la lectura inglesa revisada, sin perder la idea de valoración económica.
- source_word: אָח
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - hermano cercano
  - compañero íntimo
  lexicon: HALOT
  rationale: Se conserva el término concreto «hermano», porque el hebreo es literal y el contexto permite tanto el parentesco biológico como una relación fraterna amplia.
- source_word: תָּלוּי
  english_pob_choice: true brother
  chosen_spanish: hermano verdadero
  alternatives_spanish:
  - hermano fiel
  - hermano leal
  - hermano de verdad
  lexicon: HALOT
  rationale: 'La forma hebrea es difícil y el testimonio inglés optó por una solución interpretativa sobria que evita expandir demasiado el texto. «Hermano verdadero» reproduce esa tensión: sugiere autenticidad o lealtad sin añadir una glosa explicativa extensa.'
- source_word: בִּזְהַב אוֹפִיר
  english_pob_choice: the gold of Ophir
  chosen_spanish: el oro de Ofir
  alternatives_spanish:
  - el oro de Ofir
  - oro finísimo de Ofir
  - el oro precioso de Ofir
  lexicon: HALOT
  rationale: Se conserva «Ofir» como topónimo bíblico asociado al oro de gran valor. «El oro de Ofir» mantiene la resonancia cultural y la comparación de valor supremo.
theological_decisions:
- issue: Variante textual hebreo-griego en Sirácida 7:18
  english_pob_reading: The Hebrew witness warns against exchanging a friend or brother for wealth; the Greek says, 'Remember that anger does not last long.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: una advertencia contra cambiar a un amigo o a un hermano por dinero.'
  alternative_spanish_readings:
  - «Recuerda que la ira no dura mucho»
  - «Acuérdate de que la ira no tarda»
  rationale: Para Sirácida, la práctica del proyecto es traducir desde el hebreo donde se conserva. Aquí el griego ofrece una lectura completamente distinta, señal de una tradición textual divergente. La nota preserva esa variante sin fusionarla con el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que ajustó la decisión inglesa desde una formulación más expansiva hacia una lectura más sobria y cercana al hebreo. Por eso el español evita ampliar el sentido de תָּלוּי y conserva la tensión interpretativa mediante «hermano verdadero», sin resolverla de forma dogmática.
  spanish_consistency_notes:
  - Se mantiene «Ofir» sin adaptar el nombre propio.
  - Se usa «amigo» y «hermano» en registro sapiencial natural, no eclesiástico.
  - Se evita «Señor» o terminología ajena al verso, pues no corresponde en este pasaje.
  - La puntuación sigue el ritmo poético breve del hebreo y del griego paralelo.
