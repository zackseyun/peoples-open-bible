review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y la exclusión hereditaria del hebreo: la esposa de Galaad/Gilead le da hijos, esos hijos crecen, expulsan a Jefté y le niegan herencia por ser hijo de otra mujer. Sin embargo, hay un desajuste significativo en בָּנִים / בְנֵי, que el análisis inglés documenta correctamente como ''sons''; el español ''hijos'' neutraliza el rasgo masculino explícito del hebreo. Además, ''le dio a luz hijos'' es comprensible pero menos natural que ''le dio hijos'' o ''le dio hijos varones'' en este contexto.'
  spanish_quality_summary: 'El texto es legible y digno, pero tiene dos puntos mejorables: (1) ''Gilead'' debe ajustarse a la forma española habitual ''Galaad'' para mejor legibilidad bíblica en español; (2) ''le dio a luz hijos'' suena torpe en español moderno, porque ''dar a luz'' normalmente no toma ese complemento directo de ese modo. También conviene hacer explícito ''hijos varones'' para conservar el valor masculino de בָּנִים sin perder naturalidad.'
  glossary_alignment: 'No hay términos teológicos mayores en conflicto con el glosario del proyecto. El principal problema terminológico es de precisión léxica de género: בָּנִים / בְנֵי debe representarse como ''hijos varones'' o equivalente, no como ''hijos'' genérico. La forma onomástica española preferible es ''Galaad'', coherente con el uso bíblico en español.'
  issues:
  - severity: medium
    issue: Uso de 'hijos' donde el hebreo especifica 'sons'
    rationale: בָּנִים / בְנֵי es masculino plural específico, y el expediente inglés subraya que no debe aplanarse a 'children'. En español, 'hijos' puede funcionar como mixto/genérico; 'hijos varones' preserva mejor el contraste de filiación masculina relevante para la herencia.
  - severity: medium
    issue: Expresión poco natural 'le dio a luz hijos'
    rationale: Aunque intenta reflejar לוֹ, esta construcción no suena idiomática en español bíblico actual. 'Le dio hijos varones' comunica con más naturalidad el sentido de וַתֵּלֶד ... לוֹ בָּנִים.
  - severity: low
    issue: Nombre propio en forma inglesa 'Gilead'
    rationale: En una traducción bíblica al español, 'Galaad' es la forma convencional y más legible para lectores hispanohablantes.
  revised_spanish_text: 'La esposa de Galaad le dio hijos varones. Y cuando los hijos varones de su esposa crecieron[a], expulsaron a Jefté y le dijeron: «No heredarás en la casa de nuestro padre, porque eres hijo de otra mujer».'
  revised_footnotes:
