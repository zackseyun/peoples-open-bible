  text: just as he also says in another place, “You are a priest forever according to the order of Melchizedek,”
translation:
  language: ko
  text: 또 다른 곳에서도 말씀하시기를 「너는 멜기세덱의 반차를[a] 따라 영원한 제사장이다」[b]라고 하신 것과 같습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「계열」. 헬라어 τάξις는 「질서, 부류, 계열」을 가리킨다. 한국 교회 전통의 「반차」를 채택한다.
    reason: lexical_alternative
  - marker: b
    text: 시편 110:4(LXX 109:4)의 인용.
    reason: ot_citation
theological_decisions:
- issue: κατὰ τὴν τάξιν Μελχισέδεκ의 번역
  chosen_reading: 멜기세덱의 반차를 따라
  alternative_readings:
  - 멜기세덱의 계열을 따라
  - 멜기세덱의 질서를 따라
  rationale: 한국 교회 전통에서 「반차」는 시편 110:4과 히브리서의 핵심 어구를 가리키는 자리잡은 번역어다. 「반(班)」(부류)과 「차(次)」(차례)의 결합으로 「순서 있는 부류」를 뜻하며, 멜기세덱의 제사장직이 레위 계통과 구별되는 별도의 제사장 계열임을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: established ecclesial translation traditions where source-faithful'
