  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: relevo urgente de corredores y mensajeros, propósito de informar al rey de Babilonia, y la caída de la ciudad con alcance totalizante. Sin embargo, «a encontrarse con» introduce un matiz reflexivo poco natural y menos fiel al simple movimiento de encuentro expresado por לִקְרַאת. Además, la nota [c] mezcla indebidamente la alternativa de נִלְכְּדָה con la de מִקָּצֶה, cuando el expediente inglés reserva la alternativa principal del tramo final para la frase espacial, no para el verbo.'
