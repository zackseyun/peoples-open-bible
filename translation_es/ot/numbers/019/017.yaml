source:
  edition: WLC
  text: וְ/לָֽקְחוּ֙ לַ/טָּמֵ֔א מֵ/עֲפַ֖ר שְׂרֵפַ֣ת הַֽ/חַטָּ֑את וְ/נָתַ֥ן עָלָ֛י/ו מַ֥יִם חַיִּ֖ים אֶל כֶּֽלִי־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/017.yaml
  text: And for the unclean person they shall take some of the dust from the burning of the purification offering[b][a], and he shall put living water on it in a vessel.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the ashes from the burning of the sin offering.' The Hebrew uses 'dust' and the noun חטאת, which in priestly contexts can mean either 'sin offering' or, functionally, 'purification offering.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'living water'; that is, fresh or flowing water.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
