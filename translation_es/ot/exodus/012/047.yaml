review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido básico del hebreo: cuantificador total («כָּל»), sujeto colectivo («עֲדַת יִשְׂרָאֵל»), verbo amplio «hacer» («יַעֲשׂוּ») y pronombre anafórico «lo» («אֹתוֹ»). También conserva correctamente la lectura corporativa documentada en el POB inglés.'
  spanish_quality_summary: 'La redacción es clara y natural, pero hay un problema de concordancia: el sujeto gramatical explícito es singular colectivo («Toda la congregación»), por lo que «lo hará» suena gramaticalmente correcto en español, aunque puede difuminar el plural verbal hebreo. Para preservar mejor la fuerza colectiva sin producir una discordancia extraña en español, conviene reformular con un plural natural: «Todos en la congregación de Israel lo harán». Sin embargo, eso individualiza más de lo debido. La mejor reparación mínima es mantener el colectivo idiomático en español y ajustar la nota alternativa; el texto actual ya es legible, pero requiere revisión menor por la nota y la justificación lexical del verbo.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Congregación» es aceptable para עֲדָה en este contexto, aunque «asamblea» también sería válido. No hay nombres divinos ni términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: La nota alternativa usa comillas y formato poco natural en español editorial bíblico.
    rationale: '"O: «La asamblea entera de Israel lo observará»." puede simplificarse y alinearse mejor con el estilo del proyecto.'
  - severity: low
    issue: La explicación lexical de «lo hará» no reconoce suficientemente la tensión entre el plural hebreo y el sujeto singular colectivo en español.
    rationale: No obliga a cambiar el texto principal, pero sí justifica una revisión menor para dejar más claro que la forma española prioriza naturalidad idiomática sin negar la fuerza corporativa del original.
  revised_spanish_text: Toda la congregación de Israel lo hará[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Toda la asamblea de Israel lo observará».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque comunica fielmente el sentido del hebreo y la lectura corporativa del POB. Se ajusta la nota alternativa para un español más limpio y más cercano a la alternativa inglesa documentada («The whole assembly of Israel shall observe it»), evitando «entera» innecesario y manteniendo «observará» como alternativa lexical interpretativa.
