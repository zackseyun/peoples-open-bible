id: EZK.20.8
reference: Ezekiel 20:8
source:
  edition: WLC
  text: וַ/יַּמְרוּ בִ֗/י וְ/לֹ֤א אָבוּ֙ לִּ/שְׁמֹ֣עַ אֵלַ֔/י אִ֣ישׁ אֶת שִׁקּוּצֵ֤י עֵֽינֵי/הֶם֙ לֹ֣א הִשְׁלִ֔יכוּ וְ/אֶת גִּלּוּלֵ֥י מִצְרַ֖יִם לֹ֣א עָזָ֑בוּ וָ/אֹמַ֞ר לִ/שְׁפֹּ֧ךְ חֲמָתִ֣/י עֲלֵי/הֶ֗ם לְ/כַלּ֤וֹת אַפִּ/י֙ בָּ/הֶ֔ם בְּ/ת֖וֹךְ אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: But they rebelled against me and were not willing to listen to me[a]. No man threw away the detestable things his eyes were set on, and they did not abandon the idols of Egypt. Then I said I would pour out my wrath on them[b], to spend my anger against them in the midst of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the detestable things of his eyes,' an idiom for the abhorrent objects each person fixed his gaze on or desired.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'idols' here is especially contemptuous; it can carry the sense of something filthy or vile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  chosen: they rebelled against me
  alternatives:
  - they were rebellious against me
  - they defied me
  lexicon: HALOT
  rationale: מרה with ב marks rebellion/defiance against a person. 'Rebelled against me' is idiomatic, direct, and preserves covenantal disobedience better than a softer rendering.
- source_word: וְלֹא אָבוּ לִשְׁמֹעַ אֵלַי
  chosen: and were not willing to listen to me
  alternatives:
  - and would not listen to me
  - and were unwilling to obey me
  lexicon: HALOT
  rationale: אבה emphasizes unwillingness/refusal, not mere failure. שׁמע can mean hear/listen/obey; here 'listen to me' preserves the lexical sense while allowing the obedience implication to remain implicit.
- source_word: אִישׁ
  chosen: No man
  alternatives:
  - not one of them
  - each man
  lexicon: HALOT
  rationale: The singular distributive אִישׁ indicates each individual person. 'No man' preserves the gender-accurate representative force in line with the translation philosophy; the sense is distributive rather than exclusively male.
- source_word: שִׁקּוּצֵי עֵינֵיהֶם
  chosen: the detestable things his eyes were set on
  alternatives:
  - the abominations of their eyes
  - the detestable things before their eyes
  lexicon: HALOT
  rationale: שִׁקּוּצִים denotes detestable/abominable cultic objects. The genitive with 'eyes' is idiomatic, referring to what they looked to with desire or fixation. This rendering communicates the Hebrew idiom in natural English without losing the moral revulsion.
- source_word: הִשְׁלִיכוּ
  chosen: threw away
  alternatives:
  - cast away
  - flung away
  lexicon: HALOT
  rationale: The verb means to throw/cast away. 'Threw away' is contemporary and concrete, fitting the call to renounce idols.
- source_word: גִּלּוּלֵי מִצְרַיִם
  chosen: the idols of Egypt
  alternatives:
  - the dung-idols of Egypt
  - the foul idols of Egypt
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' is the clear main-text rendering; the pejorative force is significant but difficult to preserve naturally in running English, so an alternative is worth noting in a footnote.
- source_word: עָזָבוּ
  chosen: did not abandon
  alternatives:
  - did not forsake
  - did not leave behind
  lexicon: HALOT
  rationale: עזב here means to leave/forsake. 'Abandon' is strong, natural English for renouncing idolatry.
- source_word: וָאֹמַר
  chosen: Then I said I would
  alternatives:
  - So I said I would
  - And I said to myself I would
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said I would' captures the divine resolve without over-interpreting an internal speech nuance.
- source_word: לִשְׁפֹּךְ חֲמָתִי עֲלֵיהֶם
  chosen: pour out my wrath on them
  alternatives:
  - pour out my fury on them
  - spill my wrath upon them
  lexicon: HALOT
  rationale: The idiom 'pour out wrath' is standard and vivid. חֵמָה can be wrath/fury; 'wrath' is weighty and readable.
- source_word: לְכַלּוֹת אַפִּי בָּהֶם
  chosen: to spend my anger against them
  alternatives:
  - to exhaust my anger on them
  - to finish my anger against them
  lexicon: HALOT
  rationale: כלה with אַף expresses bringing anger to its full course or exhausting it in judgment. 'Spend my anger against them' is idiomatic English that preserves the sense of anger fully discharged.
- source_word: בְּתוֹךְ אֶרֶץ מִצְרָיִם
  chosen: in the midst of the land of Egypt
  alternatives:
  - within the land of Egypt
  - in Egypt
  lexicon: HALOT
  rationale: בְּתוֹךְ adds the sense of being within/in the midst of. Retaining 'the land of Egypt' preserves the formal geographical expression and the narrative setting.
