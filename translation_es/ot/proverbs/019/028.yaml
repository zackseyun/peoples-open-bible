base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/028.yaml
  text: A worthless witness mocks justice[c][b][a], and the mouth of the wicked swallows iniquity.
  footnotes:
  - marker: a
    text: Or 'A witness of Belial mocks justice.' Here beliyya'al is taken as a common noun/adjective meaning 'worthlessness' rather than the later proper name 'Belial.'
    reason: lexical_alternative
  - marker: b
    text: Or 'scoffs at judgment' or 'derides justice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the mouth of the wicked gulps down evil' or 'falsehood.'
    reason: lexical_alternative
