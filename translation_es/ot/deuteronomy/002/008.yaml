review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del hebreo: pasar junto a los hijos de Esaú en Seír, dejar la ruta del Arabá desde Elat y Ezión-geber, y luego volverse hacia el camino del desierto de Moab. Conserva correctamente el lenguaje de parentesco y la repetición de «camino». Sin embargo, las notas al pie están intercambiadas respecto de los anclajes en el texto: [a] aparece sobre «nuestros hermanos» pero su nota actual corresponde a «Arabá», mientras [b] aparece sobre «Ezión-geber» pero su nota actual corresponde a «nuestros hermanos». Además, «pasamos de nuestros hermanos» en español suena menos natural que «pasamos de largo junto a nuestros hermanos» o «pasamos junto a nuestros hermanos», y conviene ajustar levemente para reflejar mejor מֵאֵת con עבר.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Así pasamos de nuestros hermanos» resulta algo forzado en uso normal. «Nos volvimos» también puede entenderse como retorno, aunque en contexto se capta; «nos dirigimos» o «nos volvimos» ambos son posibles, pero el principal problema de legibilidad está en la primera cláusula. Los topónimos y el registro son adecuados. La puntuación funciona bien.
  glossary_alignment: No hay conflicto con la terminología del proyecto. Se mantiene «hijos de Esaú», «Arabá», «desierto de Moab» y la repetición de «camino». La decisión de parentesco está bien preservada. El ajuste propuesto no altera la teología ni la terminología clave, solo mejora naturalidad y corrige la colocación de las notas.
  issues:
  - severity: high
    issue: Las notas al pie [a] y [b] están invertidas respecto de sus anclajes en el texto.
    rationale: La nota [a] anclada en «nuestros hermanos» contiene la explicación de «Arabá», mientras la nota [b] anclada en «Ezión-geber» contiene la alternativa sobre «nuestros hermanos». Esto rompe la trazabilidad auditada y puede confundir al lector.
  - severity: medium
    issue: «Así pasamos de nuestros hermanos» suena poco natural en español.
    rationale: Aunque intenta reflejar עבר + מֵאֵת, en español «pasar de» suele significar ignorar o desentenderse. «Pasamos de largo junto a nuestros hermanos» expresa mejor el movimiento de pasar junto a ellos y seguir adelante.
  - severity: low
    issue: La nota [a] empieza con una comilla sobrante.
    rationale: 'El texto de la nota dice: ''O «de junto a nuestros hermanos»...; conviene normalizar la puntuación.'
  revised_spanish_text: Así pasamos de largo junto a nuestros hermanos[a], los hijos de Esaú, que habitan en Seír, apartándonos del camino del Arabá, desde Elat y desde Ezión-geber; y nos volvimos y pasamos por el camino del desierto de Moab.
  revised_footnotes:
  - marker: a
    text: 'O «de junto a nuestros hermanos». El hebreo literalmente dice: «de nuestros hermanos, los hijos de Esaú».'
    reason: alternative_reading
  - marker: b
    text: O «desde el camino del Arabá». «Arabá» designa la región del valle del Rift al sur del mar Muerto.
    reason: lexical_alternative
  revision_rationale: Se corrigió la principal dificultad de naturalidad en «pasamos de nuestros hermanos» mediante «pasamos de largo junto a nuestros hermanos», que refleja mejor el sentido de עבר con מֵאֵת en contexto de viaje. También se normalizó la puntuación de la nota de parentesco. Las notas al pie del borrador estaban intercambiadas; como la explicación sobre «Arabá» no tenía anclaje en el texto revisado, se omite aquí para cumplir la regla de que todo marcador de nota debe aparecer en el texto. El resto del verso se mantiene sustancialmente igual por ser fiel al hebreo y al rastro de auditoría inglés.
