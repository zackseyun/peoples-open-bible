  to: 'Esta es la palabra que Yahvé ha hablado acerca de él[a]: «La virgen hija de Sión[b] te desprecia y se burla de ti; la hija de Jerusalén menea la cabeza detrás de ti».'
  rationale: 'Se corrige ‘Sion’ a ‘Sión’ para español más natural y normativo, y se reubican las notas al lugar semánticamente pertinente: la alternativa lexical en ‘acerca de él’ y la nota cultural en ‘Sión’. El resto del texto puede mantenerse tal como está.'
