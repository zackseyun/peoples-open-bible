base_translation:
  language: en
  yaml_path: translation/nt/john/009/027.yaml
  text: He answered them[a], “I already told you, and you did not listen. Why do you want to hear it again? You do not also want to become his disciples[b], do you?”
  footnotes:
  - marker: a
    text: Or, 'I already told you, and you did not hear.' The Greek verb can mean either 'hear' or 'listen'; here it likely carries the sense of failing to heed what was said.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Surely you do not also want to become his disciples?' The Greek question uses μή, which expects a negative answer.
    reason: lexical_alternative
