    text: Or 'what grows of itself' for 'its volunteer growth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its undressed/unpruned grapes'; the Hebrew refers to vine growth left untended.
    reason: lexical_alternative
  - marker: c
    text: Or 'It shall be a Jubilee for you, the fiftieth year.'.
    reason: previous_rendering
