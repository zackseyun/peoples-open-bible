translation:
  language: es
  text: Cualquiera que haga algo semejante para olerlo[a] será cortado[b] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para disfrutar su aroma» / «para oler su fragancia». El infinitivo hebreo expresa la fabricación de ese incienso para olerlo o disfrutarlo personalmente.'
    reason: lexical_alternative
  - marker: b
    text: «Será cortado de entre su pueblo» es una fórmula legal estándar. Puede implicar muerte, expulsión o remoción divina, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - El que
  - Todo aquel que
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es literalmente «hombre», aquí funciona de modo genérico en una fórmula legal. «Cualquiera que» transmite ese valor inclusivo y condicional en español natural.
- source_word: יַעֲשֶׂה
  english_pob_choice: makes
  chosen_spanish: haga
  alternatives_spanish:
  - hace
  - prepare
  - fabrique
  lexicon: HALOT
  rationale: El verbo עשה es amplio; en este contexto de preparación de incienso, «haga» conserva la fuerza general de «hacer» sin añadir un matiz técnico que el hebreo no exige.
- source_word: כָמֹהָ
  english_pob_choice: any like it
  chosen_spanish: algo igual
  alternatives_spanish:
  - algo semejante
  - algo parecido
  lexicon: HALOT
  rationale: La referencia es al incienso santo del contexto inmediato. «Algo igual» expresa la idea de una composición equivalente sin endurecerla como identidad exacta.
- source_word: לְהָרִיחַ
  english_pob_choice: to smell
  chosen_spanish: para olerlo
  alternatives_spanish:
  - para disfrutar su aroma
  - para percibir su aroma
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad relacionada con oler/aspirar el aroma. «Para olerlo» es breve y fiel; el pronombre retoma naturalmente el incienso.
- source_word: וְנִכְרַת
  english_pob_choice: shall be cut off
  chosen_spanish: será eliminado
  alternatives_spanish:
  - será cortado
  - será separado
  - será excluido
  lexicon: HALOT
  rationale: La fórmula legal כרת en este tipo de contexto puede implicar varias formas de sanción. «Será eliminado» conserva la severidad y deja abierta la tensión interpretativa, en línea con la decisión inglesa de no precisar el mecanismo.
- source_word: מֵעַמָּיו
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus parientes
  - de entre su comunidad
  lexicon: HALOT
  rationale: עם con sufijo designa al pueblo/comunidad del sujeto. «De entre su pueblo» refleja bien la fórmula legal hebrea y su tono comunitario.
theological_decisions:
- issue: Sentido de la pena en la fórmula legal «ser cortado/eliminado de entre su pueblo»
  english_pob_reading: Retain the formal expression without defining whether it means death, expulsion, or divine removal.
  chosen_spanish_reading: Conservar una expresión formal («será eliminado de entre su pueblo») sin decidir en el texto si se trata de muerte, expulsión o juicio divino.
  alternative_spanish_readings:
  - será muerto
  - será expulsado de la comunidad
  - será apartado por Dios
  rationale: El hebreo no precisa el mecanismo exacto de la sanción. La traducción española debe preservar esa tensión legal y teológica en vez de resolverla interpretativamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés presentan alta concordancia y no registran revisiones aplicadas; la versión española sigue esa lectura estable, manteniendo la ambigüedad jurídica de la fórmula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología predeterminada del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y se preservó el tono legal formal del hebreo.
  - «Cualquiera que» mantiene el valor genérico de אִישׁ en contexto jurídico.
  - «Será eliminado» conserva la tensión interpretativa de כרת sin especificar el medio de la sanción.
