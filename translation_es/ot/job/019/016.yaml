review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y conserva el contraste y la humillación personal de Job. Sin embargo, se aparta innecesariamente de la decisión principal del POB inglés en לְעַבְדִּי al poner «esclavo» en el texto principal, cuando la auditoría inglesa prefirió «servant» por suavidad contextual y dejó «slave» como alternativa en nota. También la nota [a] queda mal formulada porque repite la lectura principal como si fuera alternativa.
  spanish_quality_summary: El español es claro y digno, pero «Clamo a mi esclavo» suena algo más duro y menos natural para el registro buscado que «Llamo a mi siervo». «Le suplico con mi propia boca» es comprensible, aunque «le suplico con mi propia boca» mantiene una literalidad algo rígida; aun así, es aceptable y fiel. El cambio principal necesario es terminológico y de nota al pie.
  glossary_alignment: 'No hay términos teológicos sensibles en juego. Para עֶבֶד, el proyecto permite decisiones contextuales; aquí conviene seguir la preferencia documentada del POB inglés: texto principal con «siervo» y alternativa «esclavo» en nota. El resto («responde», «con mi propia boca», «le suplico») alinea bien con la evidencia fuente y la racionalidad documentada.'
  issues:
  - severity: medium
    issue: El texto principal usa «esclavo» para עַבְדִּי en vez de la opción contextual preferida «siervo».
    rationale: La auditoría inglesa documenta que, en este contexto, la subordinación doméstica y la indignidad social son el foco, por lo que la opción principal debe ser ‘servant’, dejando ‘slave’ como alternativa. En español, «siervo» reproduce mejor esa decisión principal que «esclavo».
  - severity: medium
    issue: La nota [a] es incorrecta porque ofrece como alternativa exactamente la misma lectura del texto principal.
    rationale: 'Si el texto principal dice «esclavo», la nota no puede decir «O: a mi esclavo». Debe reflejar una verdadera alternativa. Al corregir el texto principal a «siervo», la nota puede conservar «esclavo» como variante léxica válida.'
  - severity: low
    issue: «Clamo» intensifica algo más la expresión que el simple «llamo».
    rationale: Aunque es defendible en contexto de lamentación, el hebreo קָרָאתִי y el POB inglés priorizan la idea de llamar. «Llamo» es más directo y cercano a la decisión auditada, sin perder naturalidad.
  revised_spanish_text: Llamo a mi siervo[a], pero él no responde[b]; le suplico con mi propia boca.
