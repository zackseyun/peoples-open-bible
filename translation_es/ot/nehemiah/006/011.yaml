translation:
  language: es
  text: 'Pero yo dije[a]: «¿Huiría un hombre como yo? ¿Y quién como yo podría entrar en el templo y vivir? No entraré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario». El punto probablemente no es solo esconderse dentro, sino entrar en un área restringida del templo de una manera impropia para Nehemías; por eso se mantiene el matiz de «y vivir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: But I said
  chosen_spanish: Pero yo dije
  alternatives_spanish:
  - Y dije
  - Entonces dije
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción, pero en este contexto la respuesta de Nehemías rechaza la propuesta anterior; por eso «Pero» comunica bien el giro adversativo. «Yo» explicita el sujeto para fluidez natural en español.
- source_word: הָאִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - el hombre
  - alguien
  lexicon: HALOT
  rationale: Es un uso genérico dentro de una pregunta retórica. «Un hombre» conserva el singular masculino y la fuerza honorable/autorreferencial del hebreo.
- source_word: כָּמוֹנִי
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - tal como yo
  - un hombre como yo
  lexicon: HALOT
  rationale: La comparación es idiomática y directa; «como yo» es natural en español y conserva el paralelismo retórico.
- source_word: יִבְרָח
  english_pob_choice: flee
  chosen_spanish: huiría
  alternatives_spanish:
  - huirá
  - escaparía
  lexicon: HALOT
  rationale: El verbo expresa huida en contexto de cobardía o retirada. El condicional en español transmite bien la pregunta retórica esperada en este tipo de construcción.
- source_word: וּמִי כָמוֹנִי
  english_pob_choice: And who is like me
  chosen_spanish: ¿Y quién como yo?
  alternatives_spanish:
  - ¿Y quién es como yo?
  - ¿Y quién hay como yo?
  lexicon: HALOT
  rationale: Se mantiene el paralelismo enfático con la primera pregunta. La omisión del verbo «es» es natural en español y conserva el tono retórico breve del hebreo.
- source_word: אֲשֶׁר יָבוֹא
  english_pob_choice: who could go
  chosen_spanish: que podría entrar
  alternatives_spanish:
  - que iría
  - que pudiera entrar
  lexicon: HALOT
  rationale: El relativo es elíptico y retórico; «que podría entrar» capta la fuerza de posibilidad/capacidad implícita mejor que una futura simple, y hace natural la pregunta en español.
- source_word: הַהֵיכָל
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto sagrado
  lexicon: HALOT
  rationale: '«Templo» es la equivalencia más clara y accesible. En una nota se preserva la tensión lexical: podría aludir al santuario o a una zona restringida del complejo culto.'
- source_word: וָחָי
  english_pob_choice: and live
  chosen_spanish: y vivir
  alternatives_spanish:
  - y quedar con vida
  - y seguir con vida
  lexicon: HALOT
  rationale: La secuencia hebrea une la entrada indebida con el resultado supuesto. «Y vivir» es formalmente cercano y suficientemente natural en español.
- source_word: לֹא אָבוֹא
  english_pob_choice: I will not go in
  chosen_spanish: No entraré
  alternatives_spanish:
  - No iré
  - No pasaré
  lexicon: HALOT
  rationale: El verbo de entrada se expresa mejor con «entraré» en español, que conserva la imagen espacial del hebreo y evita la ambigüedad de «iré».
theological_decisions:
- issue: Alcance del lugar al que no debe entrar Nehemías
  english_pob_reading: Nehemiah rejects entering the temple as an illegitimate act for him, not merely as a tactical refusal.
  chosen_spanish_reading: Nehemías rechaza entrar en el templo como un acto impropio e ilícito para él, no solo como una negativa táctica.
  alternative_spanish_readings:
  - Nehemías simplemente se niega a esconderse allí sin implicación cultual explícita
  - Nehemías habla solo de una entrada física sin connotación religiosa
  rationale: El contexto inmediato sugiere una trampa destinada a hacerlo pecar y desacreditarse. Mantener «templo» en el cuerpo del texto y no suavizar la frase preserva esa tensión; la nota puede abrir la posibilidad de una zona restringida del santuario sin resolverla por completo.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica); §6 (claridad moderna)
- issue: Fuerza de la pregunta retórica
  english_pob_reading: The line is a rhetorical refusal, not a literal request for information.
  chosen_spanish_reading: La frase funciona como una negativa retórica, no como una búsqueda de información.
  alternative_spanish_readings:
  - Es una pregunta meramente informativa
  - Es una observación neutral
  rationale: El hebreo usa preguntas que subrayan la impropiedad de la sugerencia. El español debe conservar ese valor retórico para que la respuesta de Nehemías suene firme y razonada.
  doctrine_reference: Translation philosophy §3 (preservar el efecto retórico del original)
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de una formulación más literal (''that he should go'') a una más natural (''who could go''); la versión española refleja esa lectura retórica con «que podría entrar», sin perder el paralelo ni la tensión cultual del pasaje. No se siguió mecánicamente el inglés: se consultó el hebreo para conservar la pregunta retórica, el valor genérico de ''un hombre'' y el matiz de entrada al templo/santuario.'
  spanish_consistency_notes:
  - Se usa «templo» como término principal, alineado con la política de traducir הֵיכָל de forma clara y con nota cuando el contexto sugiere una restricción cultual.
  - Se mantiene «Yahvé» fuera del versículo porque no aparece el nombre divino en el hebreo.
  - «No entraré» conserva la primera persona enfática y el cierre tajante del hebreo.
  - La puntuación con comillas y pregunta retórica sigue el registro bíblico moderno en español, evitando arcaísmos innecesarios.
