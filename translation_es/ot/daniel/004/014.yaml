base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/014.yaml
  text: The sentence is by the decree of the watchers[a], and the decision by the word of the holy ones, so that the living may know that the Most High rules in the kingdom of mankind and gives it to whom he wills[c][b], and sets up over it the lowliest of men.
  footnotes:
  - marker: a
    text: Or 'The sentence is by the decree of the watchers, and the decision is a request by the word of the holy ones.' The Aramaic wording is compressed, and שְׁאֵלְתָא can be rendered 'request' or 'petition.'
    reason: lexical_alternative
  - marker: b
    text: '''Watchers'' is a literal rendering of a Danielic term for heavenly beings; many interpreters understand them to be angels.'
    reason: cultural_note
  - marker: c
    text: Or 'over the kingdom of men' or 'over the kingdom of humanity.'
    reason: lexical_alternative
