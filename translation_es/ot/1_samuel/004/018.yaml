  text: וַ/יְהִ֞י כְּ/הַזְכִּיר֣/וֹ אֶת אֲר֣וֹן הָ/אֱלֹהִ֗ים וַ/יִּפֹּ֣ל מֵֽ/עַל הַ֠/כִּסֵּא אֲחֹ֨רַנִּ֜ית בְּעַ֣ד יַ֣ד הַ/שַּׁ֗עַר וַ/תִּשָּׁבֵ֤ר מַפְרַקְתּ/וֹ֙ וַ/יָּמֹ֔ת כִּֽי זָקֵ֥ן הָ/אִ֖ישׁ וְ/כָבֵ֑ד וְ/ה֛וּא שָׁפַ֥ט אֶת יִשְׂרָאֵ֖ל אַרְבָּעִ֥ים שָׁנָֽה׀־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/018.yaml
  text: And it happened[a], when he mentioned the ark of God, that Eli fell backward from the seat by the side of the gate, and his neck was broken and he died, for the man was old and heavy[b]. And he had judged Israel forty years.
  footnotes:
  - marker: a
    text: Or 'by the gate' or 'at the side of the gate.' The Hebrew idiom is literally 'at/by the hand of the gate.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'heavy.' The term may imply that Eli's weight, together with his age, contributed to the fatal fall.
    reason: lexical_alternative
