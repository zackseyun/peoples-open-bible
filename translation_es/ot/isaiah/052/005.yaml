  language: en
  yaml_path: translation/ot/isaiah/052/005.yaml
  text: And now[a], what do I have here? declares Yahweh. For my people have been taken away for nothing; those who rule over them wail, declares Yahweh, and continually, all day long[b], my name is despised.
  footnotes:
