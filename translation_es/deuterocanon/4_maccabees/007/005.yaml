  to: Porque, como un risco escarpado[a], el padre Eleazar, extendiendo su mente[b], quebró a su alrededor las olas enfurecidas de las pasiones.
  rationale: La revisión mantiene el sentido del griego y las decisiones léxicas del POB, pero mejora la naturalidad del español. Se ajusta la imagen inicial a 'risco escarpado', más cercana al campo semántico auditado, y se reemplaza 'alrededor de sí' por 'a su alrededor' para expresar περιέκλασεν de manera idiomática. También se simplifica 'su propia mente' a 'su mente', sin pérdida semántica relevante.
