translation:
  language: es
  text: Y venderé a tus hijos y a tus hijas en poder de los hijos de Judá, y ellos los venderán a los sabeos[a], a una nación lejana[b]; porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a los sabeos», es decir, el pueblo de Seba.'
    reason: cultural_note
  - marker: b
    text: 'O: «a una nación distante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָכַרְתִּי
  english_pob_choice: And I will sell
  chosen_spanish: Y venderé
  alternatives_spanish:
  - Y entregaré para venta
  - Y pondré en venta
  lexicon: HALOT
  rationale: El verbo hebreo מכר en qal conserva el sentido comercial de 'vender'; 'venderé' mantiene la imagen de juicio retributivo sin suavizarla.
- source_word: בְּנֵיכֶם ... בְּנוֹתֵיכֶם
  english_pob_choice: your sons and your daughters
  chosen_spanish: tus hijos y tus hijas
  alternatives_spanish:
  - tus hijos
  - tus descendientes
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente varones y mujeres; en español, 'hijos y hijas' conserva esa precisión mejor que un genérico neutral.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - entregados a
  lexicon: HALOT
  rationale: La locución hebrea expresa transferencia de control. 'En manos de' reproduce la imagen semítica de manera natural en español.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los judeanos
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'hijos de Judá' para preservar el paralelismo con la frase anterior y la forma hebrea transparente del texto.
- source_word: וּמְכָרוּם
  english_pob_choice: and they will sell them
  chosen_spanish: y ellos los venderán
  alternatives_spanish:
  - y los entregarán para venta
  - y los pondrán en venta
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo verbo 'vender' para reflejar la correspondencia retórica del hebreo y la continuidad de la acción.
- source_word: לִשְׁבָאִים
  english_pob_choice: to the Sabeans
  chosen_spanish: a los sabeos
  alternatives_spanish:
  - a los habitantes de Seba
  - a gente de Seba
  lexicon: HALOT
  rationale: La forma hebrea designa al pueblo de Sheba; 'sabeos' es la denominación española tradicional y precisa para ese etnónimo.
- source_word: אֶל גּוֹי רָחוֹק
  english_pob_choice: to a distant nation
  chosen_spanish: a una nación distante
  alternatives_spanish:
  - a una nación lejana
  - a un pueblo remoto
  lexicon: HALOT
  rationale: גּוֹי puede ser 'nación' o 'pueblo'; 'nación distante' conserva el valor amplio del término y el matiz espacial de רָחוֹק.
- source_word: כִּי יְהוָה דִּבֵּר
  english_pob_choice: for Yahweh has spoken
  chosen_spanish: porque Yahvé ha hablado
  alternatives_spanish:
  - pues Yahvé ha dicho
  - porque Yahvé lo ha dicho
  lexicon: HALOT
  rationale: Se traduce el nombre divino como 'Yahvé' según el estándar del proyecto, y דִּבֵּר como 'ha hablado' para mantener el peso declarativo de la fórmula profética.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama; en español se sigue el estándar del proyecto 'Yahvé' para preservar el nombre del pacto sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el contexto de audición en inglés y no hubo cambios aplicados en la última pasada; el texto español sigue el trazado estable con acuerdo alto y solo ajusta la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en vez de 'SEÑOR' conforme al criterio del proyecto.
  - Se conservó la repetición de 'vender' para reflejar el paralelismo del hebreo.
  - '''Sabeos'' se usa como etnónimo tradicional y se aclara en nota cultural.'
  - La colocación 'en manos de' conserva la metáfora hebrea de control o dominio.
