- from: Y ahora[a], hija mía, no temas. Todo lo que digas, lo haré por ti[b], porque todo el portón de mi pueblo sabe que eres una mujer de noble carácter.
  to: Y ahora, hija mía, no temas. Todo lo que digas, lo haré por ti, porque toda la puerta[a] de mi pueblo sabe que eres una mujer de noble carácter[b].
  rationale: Se reemplaza 'portón' por 'puerta' para conservar la imagen bíblica y hacer inteligible la metonimia social/jurídica de שַׁעַר. Se mantiene la literalidad marcada de 'toda la puerta de mi pueblo' en el texto principal, en línea con la auditoría inglesa, pero con nota aclaratoria idiomática. También se corrigen los anclajes de las notas para que recaigan exactamente sobre las expresiones anotadas, conforme a las instrucciones del proyecto.
