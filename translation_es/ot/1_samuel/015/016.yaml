revisions:
- from: 'Entonces Samuel dijo a Saúl[a]: «¡Detente, y te diré lo que Yahvé me habló anoche». Y él le dijo: «Habla».'
  to: 'Entonces Samuel dijo a Saúl[a]: «¡Detente, y te diré lo que Yahvé me dijo anoche!». Y él le dijo: «Habla».'
  rationale: Se corrige «lo que Yahvé me habló anoche» a «lo que Yahvé me dijo anoche» para reflejar el sentido de דִּבֶּר de manera idiomática en español y concordar con la decisión auditada en inglés («what Yahweh said to me»). Se conserva «Yahvé», la nota textual y la estructura general del versículo. También se cierra con signo de exclamación la orden inicial, que en español encaja bien con el tono brusco de «הֶרֶף».
