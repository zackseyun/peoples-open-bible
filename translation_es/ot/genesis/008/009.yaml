  to: Pero la paloma no halló lugar de reposo[a] para la planta de su pie[b], y volvió a él, al arca, porque las aguas estaban sobre la superficie de toda la tierra[c]. Entonces él extendió su mano, la tomó y la trajo hacia sí al arca[d].
  rationale: Se revisa la cláusula final para reflejar mejor el hebreo, conservando tanto el elemento personal ('hacia sí', por אֵלָיו) como el destino espacial ('al arca', por אֶל הַתֵּבָה) sin introducir el matiz causativo de 'hizo entrar'. También se ajustan las notas para que correspondan a alternativas o literalidades realmente significativas en la auditoría, y se eliminan notas innecesarias sobre una simple preferencia estilística.
