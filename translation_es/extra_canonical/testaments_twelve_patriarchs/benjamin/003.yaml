base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003.yaml
  text: 1[a]. Now therefore, my children, you also must love the Lord, the God of heaven and earth, and keep his commandments, imitating the good and holy man Joseph. 2. And let your mind be set on what is good, as you know mine is. For the one who has a right mind sees everything rightly. 3. Fear the Lord and love your neighbor; and if the spirits of Beliar should drive you into every wickedness of affliction, they will certainly not rule over you, just as they did not over Joseph my brother. 4. How many men wanted to kill him, yet God sheltered him[b]. For the one who fears God and loves his neighbor cannot be struck by the spirit of Beliar, being sheltered by the fear of God. 5. And he cannot be mastered by the plots of men or of beasts, since the Lord helps him through the love that he has toward his neighbor. 6. For Joseph also begged our father to pray for his brothers, so that the Lord would not reckon sin to them, because they had done evil against him. 7. And thus Jacob cried out,
    “O good child, you have stirred the inward affection of Jacob your father”; and embracing him, for two hours he kept kissing him, saying, 8. “The heavenly prophecy will be fulfilled upon you.”
  footnotes:
  - marker: a
    text: Some witnesses expand verse 5 with wording about beasts or an 'aerial spirit,' reflecting textual instability in the description of hostile powers.
    reason: textual_variant
  - marker: b
    text: Or 'The prophecy from heaven will be fulfilled concerning you.' The prepositional wording varies slightly in the witnesses.
    reason: alternative_reading
