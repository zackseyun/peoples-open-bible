translation:
  language: es
  text: Así que ahora[a], no fueron ustedes los que me enviaron aquí, sino Dios; y él me ha hecho padre para Faraón, y señor sobre toda su casa, y gobernante sobre toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "como padre para Faraón", es decir, como patrón principal, consejero o benefactor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Captura tanto la conexión discursiva de וְ como la fuerza conclusiva de עַתָּה en un español natural. 'Así que' reproduce el valor inferencial que el inglés POB expresó con 'So now'.
- source_word: לֹא אַתֶּם שְׁלַחְתֶּם אֹתִי הֵנָּה
  english_pob_choice: it was not you who sent me here
  chosen_spanish: no fueron ustedes los que me enviaron acá
  alternatives_spanish:
  - ustedes no me enviaron acá
  - no fueron ustedes quienes me enviaron aquí
  lexicon: HALOT
  rationale: La construcción enfática del hebreo se refleja mejor con una frase escindida en español. 'Acá' conserva el deíctico espacial de הֵנָּה de modo natural; 'ustedes' mantiene el énfasis explícito del pronombre.
- source_word: כִּי הָאֱלֹהִים
  english_pob_choice: but God
  chosen_spanish: sino Dios
  alternatives_spanish:
  - pero Dios
  - más bien Dios
  lexicon: HALOT
  rationale: Después de una negación, כִּי tiene fuerza adversativa. 'Sino' expresa mejor el contraste exclusivo que 'pero' sin añadir explicación interpretativa.
- source_word: וַיְשִׂימֵנִי
  english_pob_choice: he has made me
  chosen_spanish: él me ha puesto
  alternatives_spanish:
  - él me hizo
  - él me ha nombrado
  lexicon: HALOT
  rationale: שׂים aquí comunica establecer o colocar en una función. 'Me ha puesto' preserva la idea de designación/colocación sin reducirla solo a nombramiento formal.
- source_word: לְאָב לְפַרְעֹה
  english_pob_choice: a father to Pharaoh
  chosen_spanish: como padre para Faraón
  alternatives_spanish:
  - padre de Faraón
  - como un padre para Faraón
  lexicon: HALOT
  rationale: Se mantiene la metáfora de אָב tal como la conserva el inglés POB. 'Como padre para Faraón' evita reinterpretarla demasiado pronto, pero en español suena más natural que una construcción calcada.
- source_word: וּלְאָדוֹן לְכָל בֵּיתוֹ
  english_pob_choice: and lord over all his house
  chosen_spanish: y como señor de toda su casa
  alternatives_spanish:
  - y como amo de toda su casa
  - y como dueño de toda su casa
  lexicon: HALOT
  rationale: אָדוֹן expresa autoridad. 'Señor' es el equivalente más amplio y digno en español; 'amo' o 'dueño' sonarían más duros o más posesivos que el uso del texto pide.
- source_word: וּמֹשֵׁל בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: and ruler over all the land of Egypt
  chosen_spanish: y como gobernador de toda la tierra de Egipto
  alternatives_spanish:
  - y como gobernante de toda la tierra de Egipto
  - y como quien gobierna toda la tierra de Egipto
  lexicon: HALOT
  rationale: מֹשֵׁל designa a quien ejerce gobierno. 'Gobernador' comunica bien la función política en español y encaja con la lista de cargos del versículo; 'tierra' conserva אֶרֶץ.
- source_word: אֶרֶץ מִצְרָיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - Egipto
  lexicon: HALOT
  rationale: Se mantiene explícito אֶרֶץ como 'tierra', en continuidad con la amplitud territorial del hebreo y con la opción del POB inglés.
theological_decisions:
- issue: Soberanía divina y agencia humana en la declaración de José
  english_pob_reading: it was not you who sent me here, but God
  chosen_spanish_reading: no fueron ustedes los que me enviaron acá, sino Dios
  alternative_spanish_readings:
  - ustedes no me enviaron acá, sino Dios
  - no fueron ustedes quienes me enviaron acá; Dios lo hizo
  rationale: 'La formulación conserva la tensión del hebreo: los hermanos actuaron realmente, pero José atribuye el desenlace al propósito de Dios. No se suaviza la acción humana ni se explicita un sistema teológico ajeno al versículo.'
  doctrine_reference: Preservar la tensión teológica entre agencia humana y providencia divina.
- issue: Función de 'padre para Faraón'
  english_pob_reading: a father to Pharaoh, that is, a chief patron, counselor, or benefactor
  chosen_spanish_reading: como padre para Faraón
  alternative_spanish_readings:
  - como patrón principal, consejero o benefactor para Faraón
  - como un padre y consejero para Faraón
  rationale: Se conserva la metáfora primaria sin resolverla en una sola equivalencia funcional. La nota de la tradición POB se reconoce como posible trasfondo, pero el texto principal no la sustituye por un término más estrecho.
  doctrine_reference: Mantener la metáfora abierta cuando el texto la mantiene abierta.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés al conservar la coordinación repetida ('y como... y como...') y reflejar la progresión del hebreo con un español completo y paralelo. Se evitó un giro más breve que omitiera una de las coordinaciones o que reordenara indebidamente la serie de cargos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando aparezca explícitamente; aquí el texto menciona 'Dios' (הָאֱלֹהִים), por lo que no aplica.
  - Se mantiene la distinción entre 'tierra' y un equivalente territorial más general, siguiendo אֶרֶץ.
  - La metáfora 'padre para Faraón' se preserva en el texto principal y se aclara solo en nota, conforme al tratamiento del POB en inglés.
