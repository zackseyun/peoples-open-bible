    text: Or, 'And to whom belongs all that is desirable in Israel?' The Hebrew phrase may refer either to what Israel desires or to what is precious/desirable in Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your father's house,' a household/clan expression broader than the immediate nuclear family.
    reason: cultural_note
