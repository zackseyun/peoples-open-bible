revisions:
- from: 'Entonces Sarai dijo a Abram[a]: «La injusticia hecha contra mí recae sobre ti. Yo puse a mi esclava femenina en tu abrazo[b], y cuando vio que había concebido, quedé rebajada en sus ojos. Yahvé juzgue entre tú y yo».'
  to: 'Entonces Sarai dijo a Abram[a]: «La injusticia hecha contra mí recae sobre ti. Yo entregué a mi esclava en tus brazos[b], y cuando vio que había concebido, quedé rebajada a sus ojos. Que Yahvé juzgue entre tú y yo».'
  rationale: La revisión conserva el sentido del POB y del hebreo, pero mejora la naturalidad del español y elimina formulaciones torpes. Se reemplaza «mi esclava femenina» por «mi esclava», se ajusta el modismo íntimo a una expresión más idiomática con «entregué… en tus brazos», y se explicita el jussivo con «Que Yahvé juzgue». También se afina la nota [a] para evitar que la alternativa literal sugiera erróneamente que Sarai habla de una injusticia propia cometida por ella.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:22:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del hebreo y del POB inglés: la queja acusatoria de Sarai, la entrega de la esclava, la concepción, la disminución de estatus ante Agar y la apelación a Yahvé como juez. También preserva correctamente «Yahvé». Sin embargo, hay varios ajustes de fidelidad y naturalidad: «mi esclava femenina» es redundante y poco idiomático; «en tu abrazo» suena algo forzado con «poner»; y «Yahvé juzgue entre tú y yo» queda menos natural que «Que Yahvé juzgue…» en español para un jussivo independiente.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene calcos poco naturales. «La injusticia hecha contra mí» es comprensible, aunque «el agravio» o «la injusticia que se me ha hecho» suenan mejor; aun así no exige cambio si se mantiene el matiz. Los principales problemas son de estilo y precisión idiomática: «esclava femenina» no corresponde al español natural, y «puse… en tu abrazo» no refleja tan bien el modismo íntimo como «entregué… a tu abrazo» o «en tus brazos».'
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé» y en mantener «esclava» para שִׁפְחָה. No obstante, añadir «femenina» va contra la legibilidad sin aportar contenido real, porque «esclava» ya marca género. La nota sobre «en tu seno» está bien como alternativa literal. Conviene mantener el jussivo con «Que Yahvé juzgue».
  issues:
  - severity: medium
    issue: «mi esclava femenina» es redundante y poco natural
    rationale: שִׁפְחָה ya queda bien representado por «esclava». «Femenina» añade una explicitación innecesaria y torpe en español.
  - severity: medium
    issue: «Yo puse a mi esclava femenina en tu abrazo» suena forzado
    rationale: Con בְּחֵיקֶךָ el hebreo usa un modismo íntimo; en español, con el verbo «poner», «en tu abrazo» resulta extraño. «Entregué a mi esclava en tus brazos / a tu abrazo» o similar fluye mejor y conserva el matiz.
  - severity: low
    issue: Falta de partícula exhortativa explícita en «Yahvé juzgue»
    rationale: Es gramatical, pero «Que Yahvé juzgue» expresa de modo más natural en español la fuerza jussiva de יִשְׁפֹּט.
  - severity: low
    issue: La nota a [a] usa «Mi injusticia» como alternativa literal
    rationale: Aunque viene del POB inglés, en español «mi injusticia» puede sonar aún más equívoco. «Mi agravio recaiga sobre ti» o mantener una glosa aclaratoria ayuda a no sugerir culpa de Sarai.
  revised_spanish_text: 'Entonces Sarai dijo a Abram[a]: «La injusticia hecha contra mí recae sobre ti. Yo entregué a mi esclava en tus brazos[b], y cuando vio que había concebido, quedé rebajada a sus ojos. Que Yahvé juzgue entre tú y yo».'
  revised_footnotes:
