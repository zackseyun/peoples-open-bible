    reason: lexical_alternative
  - marker: b
    text: 'O: «no serán recordados». El hebreo probablemente expresa que estos tesoros son insignificantes en comparación con la sabiduría.'
    reason: lexical_alternative
  - marker: c
    text: La palabra hebrea también puede verterse «rubíes», porque no se puede precisar con seguridad la piedra preciosa exacta.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula verbal para reflejar mejor el modismo comparativo hebreo (‘no valen la pena mencionarlos’), se corrige el anclaje de la nota sobre «rubíes» para que recaiga sobre «coral», y se mejora la naturalidad del español con los artículos definidos.
