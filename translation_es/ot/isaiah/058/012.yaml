review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo y la línea del POB en ''ruinas antiguas'', ''cimientos de generación en generación'' y la idea restauradora de los títulos. Sin embargo, introduce dos desviaciones importantes: ''Los que salgan de entre ustedes'' añade la idea de salir, ausente en וּבָנוּ מִמְּךָ, que solo expresa procedencia ''de entre ustedes''; y los títulos finales están en plural (''reparadores'', ''restauradores'') cuando el hebreo y el inglés POB presentan designaciones singulares aplicadas al destinatario colectivo/personificado. Además, los anclajes de notas están mal colocados: la nota [a] corresponde a ''cimientos de generación en generación'', no a ''brecha''; y la nota [b] debe anclarse en la frase final, no solo en ''brecha''.'
  spanish_quality_summary: 'El español es claro y bastante natural, pero ''salgan de entre ustedes'' suena interpretativo e innecesariamente dinámico. También conviene ajustar la concordancia retórica al singular en los títulos: ''se te llamará reparador... restaurador...'' suena más fiel y fluido en español bíblico contemporáneo. ''Para habitar'' es aceptable, aunque ''para que se habite'' sería más explícito; no es necesario cambiarlo si se mantiene la compacidad del POB.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Las decisiones léxicas principales son compatibles con POB. La corrección necesaria es de fidelidad sintáctico-semántica y de formato de notas, no de glosario teológico.
  issues:
  - severity: high
    issue: Se añadió 'salgan' en 'Los que salgan de entre ustedes'
    rationale: וּבָנוּ מִמְּךָ significa 'los de entre ti/ustedes reconstruirán' o 'de entre ustedes reconstruirán'; no contiene un verbo de movimiento. 'Salgan' introduce una acción no presente en el texto fuente.
  - severity: high
    issue: Los títulos finales están en plural
    rationale: 'גֹּדֵר פֶּרֶץ y מְשֹׁבֵב נְתִיבוֹת son participios singulares en aposición al destinatario: ''se te llamará reparador... restaurador...''. El plural debilita la personificación singular del hebreo y del POB inglés.'
  - severity: medium
    issue: Los marcadores de notas están anclados a lugares incorrectos
    rationale: La nota [a] explica 'cimientos de generación en generación' pero fue colocada tras 'brecha'. La nota [b] debe vincularse con la frase final 'restaurador de sendas para habitar', no funcionar como duplicación confusa del mismo segmento.
  - severity: low
    issue: Cambio de persona de 'ustedes' a 'se les llamará'
    rationale: Dado que el versículo alterna entre plural y singular personificado en traducción, 'se te llamará' refleja mejor el לְךָ singular del hebreo en la cláusula de nombramiento.
  revised_spanish_text: Los de entre ustedes reconstruirán las ruinas antiguas; levantarás los cimientos de generación en generación[a], y se te llamará reparador de la brecha, restaurador de sendas para habitar[b].
  revised_footnotes:
