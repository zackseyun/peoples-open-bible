    rationale: La nota [a] sobre la localización alternativa está colocada después de «el sacerdote», y la nota [b] sobre «los hijos de Israel» también está mal ubicada. Las notas deben aparecer en la palabra o frase pertinente dentro de `spanish_text`.
  - severity: medium
    issue: «En Jericó» desorienta la relación geográfica de עַל יַרְדֵּן יְרֵחוֹ
    rationale: El hebreo no sitúa el censo dentro de Jericó, sino en las llanuras de Moab junto al Jordán con referencia a Jericó. «Frente a Jericó» refleja mejor la alternativa documentada y evita una lectura engañosa.
  - severity: low
