  glossary_alignment: Alineado con la terminología del proyecto en «Yahvé». No hay conflicto con otros términos clave. La revisión propuesta mantiene la preferencia documentada por un sustantivo que preserve la amplitud semántica de פקד sin reducirlo a castigo explícito.
