review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en la estructura general: mantiene la construcción genitiva «חַבֻּרוֹת פֶּצַע» como «de una herida», conserva la doble imagen disciplinaria («bruise/blows»), traduce תמריק con un verbo de limpieza en ambos hemistiquios conforme a la revisión inglesa, y preserva «vientre» en lugar de abstraerlo. También conserva adecuadamente la nota cultural sobre «las cámaras del vientre».'
  spanish_quality_summary: 'La principal dificultad es de naturalidad y corrección léxica en español: «Las cardenales» es gramaticalmente incorrecto, porque «cardenal» en este sentido es masculino («los cardenales»), y además suena menos amplio y menos bíblico que «moretones» o «contusiones». El resto del verso es legible, pero «las partes más íntimas del vientre» puede sonar algo anatómico/modernizante; una formulación como «lo más profundo del vientre» preserva mejor la metáfora hebrea con buena fluidez. La nota a también mejora si evita «escoriar», que aquí suena demasiado técnico y no corresponde tan claramente al campo semántico documentado como «frotar» o «restregar».'
  glossary_alignment: No hay conflicto con los términos doctrinales globales del proyecto. Se mantiene «mal» para רָע y «vientre» para בָטֶן, en línea con la decisión inglesa de conservar la metáfora corporal. La revisión propuesta refuerza la fidelidad léxica de חַבֻּרוֹת con «moretones», más natural y ampliamente comprendido en español neutro que «cardenales».
  issues:
  - severity: high
    issue: «Las cardenales» es gramaticalmente incorrecto en español.
    rationale: 'En el sentido de marca o moradura, «cardenal» es sustantivo masculino: «los cardenales». La forma actual afecta la calidad y debe corregirse.'
  - severity: medium
    issue: «Cardenales» no es la mejor opción para español neutro amplio.
    rationale: Aunque válido en varios lugares, es menos universal y más marcado regionalmente que «moretones»; además el inglés POB busca una expresión moderna y natural.
  - severity: low
    issue: «las partes más íntimas del vientre» suena algo anatómico y menos idiomático que la imagen hebrea.
    rationale: El hebreo apunta a las profundidades interiores de la persona mediante la metáfora corporal. «Lo más profundo del vientre» conserva mejor ese registro sapiencial sin sonar clínico.
  - severity: low
    issue: La nota a usa «escoriar», término demasiado técnico.
    rationale: La nota inglesa habla de scouring/purging. En español, «frotar» o «restregar» comunica mejor la idea sin tecnicismo innecesario.
  revised_spanish_text: Los moretones de una herida limpian el mal[a], y los golpes limpian lo más profundo del vientre[b].
  revised_footnotes:
  - marker: a
    text: O «purgan el mal»; el verbo hebreo puede implicar la idea de frotar o purificar hasta quitar algo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cámaras del vientre», una expresión hebrea para lo más profundo del interior de una persona.
    reason: cultural_note
  revision_rationale: 'Se corrige un error gramatical («las cardenales»), se sustituye «cardenales» por «moretones» por mayor naturalidad panhispánica y mejor equivalencia funcional con «bruises», y se ajusta el segundo hemistiquio a una expresión más idiomática y fiel al hebreo antropológico: «lo más profundo del vientre». También se suaviza la nota léxica para evitar un tecnicismo innecesario.'
