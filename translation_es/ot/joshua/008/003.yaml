review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa hebrea: Josué y todo el contingente militar se levantan, suben contra Hai, él escoge treinta mil hombres y los envía de noche. Sin embargo, faltan dos matices del rastro POB en español: (1) la nota alternativa sobre לַעֲלוֹת debe anclarse a «subir contra»/«subir a», y (2) גִּבּוֹרֵי הַחַיִל está algo rebajado en «valientes guerreros» frente a la decisión auditada inglesa «mighty men of valor».'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Todo el pueblo de guerra» suena algo marcado pero es defendible por fidelidad al hebreo y a la decisión POB. «Hai» es una forma tradicional y aceptable en español. La mejora principal es fortalecer la fórmula militar final y completar las notas para reflejar mejor las alternativas significativas del original.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparece Yahvé ni otros términos sensibles del glosario. La principal cuestión léxica es mantener la fórmula militar hebrea con suficiente fuerza en español; «hombres valientes de valor» sería torpe, pero «hombres poderosos de valor» o «hombres valientes, hombres de valor» preserva mejor el peso que «guerreros».
  issues:
  - severity: medium
    issue: Falta la nota alternativa para לַעֲלוֹת
    rationale: El inglés POB preserva explícitamente la alternativa «to go up to Ai» además de la lectura militar «go up against». El borrador español explica «subir contra» en decisiones léxicas, pero no lo conserva como nota visible al lector.
  - severity: medium
    issue: «Valientes guerreros» atenúa la fórmula גִּבּוֹרֵי הַחַיִל
    rationale: Aunque natural en español, se aleja de la revisión auditada inglesa, que volvió deliberadamente a una formulación más formal y literal («mighty men of valor»). Conviene una solución española más cercana al doble énfasis de fuerza y valor.
  - severity: low
    issue: La nota a duplica el texto principal como alternativa
    rationale: Al estar anclada en «Hai», la nota dice «O “todo el pueblo de guerra” / “todo el ejército”», pero la primera opción no funciona realmente como alternativa contextual al topónimo. Debe anclarse al sintagma correspondiente en el texto.
  revised_spanish_text: Entonces Josué y todo el pueblo de guerra[a] se levantaron para subir contra Hai[b], y Josué escogió treinta mil hombres, hombres poderosos de valor[c], y los envió de noche.
  revised_footnotes:
