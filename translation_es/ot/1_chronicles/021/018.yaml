  to: Y el ángel de Yahvé dijo a Gad que le dijera a David que David debía subir y levantar un altar a Yahvé en la era de Ornán el jebuseo[a][b].
  rationale: 'Se hizo una reparación menor de estilo y precisión editorial: se añadió ''le'' en ''que le dijera a David'' para una sintaxis española más natural, y se corrigió la nota b para que presente una alternativa verdadera en lugar de repetir la lectura principal. No se requirió cambio de fondo en el contenido ni en la terminología principal.'
