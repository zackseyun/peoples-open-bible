translation:
  language: es
  text: 'Y llegaron a la tienda de Holofernes, y dijeron al que estaba a cargo de todo lo suyo[a]: «Despierta ahora a nuestro señor, porque los esclavos se han atrevido a descender contra nosotros para la guerra, para que sean destruidos por completo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que estaba encargado de todo lo que era suyo», es decir, el mayordomo o asistente principal de Holofernes.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: LSJ
  rationale: El verbo expresa arribo a un lugar; en español, «llegaron» comunica con naturalidad el movimiento narrativo sin perder el sentido de llegada.
- source_word: σκηνή
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - tienda militar
  lexicon: LSJ
  rationale: En contexto militar, la σκηνή de Holofernes es su tienda. «Tienda» es breve y natural en español; «tienda de campaña» explicita más, pero alarga sin necesidad.
- source_word: τῷ οὔτι ἐπὶ πάντων τῶν αὐτοῦ
  english_pob_choice: the one over all his affairs
  chosen_spanish: el que estaba sobre todo lo suyo
  alternatives_spanish:
  - el encargado de todo lo que era de él
  - el administrador de todos sus bienes
  lexicon: LSJ
  rationale: La frase griega identifica al funcionario encargado de la casa/propiedad de Holofernes. «El que estaba sobre todo lo suyo» conserva la estructura funcional y la ambigüedad del griego sin imponer un título técnico no explícito.
- source_word: Ἔγειρον δὴ
  english_pob_choice: Wake ... at once
  chosen_spanish: Despierta ahora
  alternatives_spanish:
  - Levántalo de inmediato
  - Despiértalo enseguida
  lexicon: LSJ
  rationale: La forma es un imperativo urgente. «Despierta ahora» reproduce la urgencia de δὴ de manera idiomática en español.
- source_word: κύριον
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - señor
  lexicon: LSJ
  rationale: Aquí κύριος se refiere a un superior humano, no al título divino. En español, «señor» es la equivalencia más natural y respetuosa en este contexto.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: LSJ
  rationale: Se mantiene la fuerza despectiva y de estatus servil del término. En este contexto militar e insultante, «esclavos» conserva mejor el valor léxico que «siervos» o «criados».
- source_word: καταβαίνειν ἐφʼ ἡμᾶς
  english_pob_choice: to come down against us
  chosen_spanish: descender contra nosotros
  alternatives_spanish:
  - bajar contra nosotros
  - venir contra nosotros
  lexicon: LSJ
  rationale: La imagen espacial de «bajar/descender» está en el verbo griego; «descender contra nosotros» preserva esa fuerza y el matiz hostil.
- source_word: εἰς πόλεμον
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para combate
  - a la guerra
  lexicon: LSJ
  rationale: πόλεμος es «guerra» en sentido amplio. «Para la guerra» es más cercano al griego que restringirlo a «combate».
- source_word: ἵνα ἐξολοθρευθῶσιν εἰς τέλος
  english_pob_choice: so that they may be utterly destroyed
  chosen_spanish: para que sean destruidos por completo
  alternatives_spanish:
  - para que sean exterminados por completo
  - a fin de que sean totalmente destruidos
  lexicon: LSJ
  rationale: La perífrasis expresa la finalidad y la total destrucción. «Destruidos por completo» comunica bien εἰς τέλος sin sonar excesivamente técnico o violento para el español bíblico moderno.
theological_decisions:
- issue: Título humano κύριος aplicado a Holofernes
  english_pob_reading: lowercase lord for a human superior, not a divine title
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: Se conserva el sentido de superioridad humana sin capitalización ni un término que sugiera divinidad. «Señor» funciona en español como tratamiento respetuoso para una autoridad humana.
  doctrine_reference: POB terminology for κύριος in non-divine contexts; Spanish style policy
- issue: δοῦλοι como insulto de estatus en un contexto militar
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: El griego emplea δοῦλοι de forma despectiva para subalternos/enemigos; en español, «esclavos» conserva la carga de menosprecio y la dureza del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; translation philosophy §1'
- issue: Destino expresado con ἵνα ἐξολοθρευθῶσιν εἰς τέλος
  english_pob_reading: so that they may be utterly destroyed
  chosen_spanish_reading: para que sean destruidos por completo
  alternative_spanish_readings:
  - para que sean exterminados por completo
  - para que sean totalmente aniquilados
  rationale: Se mantiene el valor de finalidad de ἵνα y la intensificación total de εἰς τέλος sin introducir una dinámica interpretativa adicional. «Por completo» es claro y suficientemente fuerte.
  doctrine_reference: LSJ/Greek syntax; POB equivalence policy
translation_notes:
  revision_awareness: 'El inglés POB pasó por una corrección de revisión sobre δοῦλοι: una pasarela intermedia cambió «slaves» por «servants», pero el paso de regresión restauró «slaves» conforme a la política doctrinal. La traducción española sigue esa decisión final y mantiene «esclavos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se mantiene minúscula en «señor» porque se trata de un superior humano.
  - «Esclavos» conserva la aspereza del término griego y evita suavizarlo a «siervos».
  - La frase «sobre todo lo suyo» intenta reproducir la construcción poco idiomática del griego sin explicitarla como cargo técnico.
