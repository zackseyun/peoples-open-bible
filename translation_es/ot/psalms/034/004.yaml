translation:
  language: es
  text: ¡Proclamen la grandeza de Yahvé conmigo[a], y exaltemos su nombre juntos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR» en muchas traducciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּדְּלוּ
  english_pob_choice: Magnify
  chosen_spanish: Engrandeced
  alternatives_spanish:
  - Glorificad
  - Ensalzad
  - Proclamad grande
  lexicon: HALOT
  rationale: El imperativo plural intensivo de גדל pide una exhortación en segunda persona plural. En español, «engrandeced» conserva la idea de atribuir grandeza a Dios sin sugerir aumento literal; «glorificad» y «ensalzad» son posibles, pero «engrandeced» mantiene mejor la fuerza del paralelismo poético.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el criterio del proyecto para יהוה, se traduce «Yahvé» en el texto principal, en lugar de ocultarlo con una sustitución reverencial.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - al lado de mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular expresa participación compartida; «conmigo» es la forma natural y directa en español.
- source_word: וּנְרוֹמְמָה
  english_pob_choice: let us exalt
  chosen_spanish: exaltemos
  alternatives_spanish:
  - levantemos en alto
  - ensalcemos
  - alzemos
  lexicon: HALOT
  rationale: El cohortativo de primera persona plural expresa invitación/exhortación. «Exaltemos» reproduce bien ese matiz volitivo y encaja con el paralelismo del verso.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  - su renombre
  lexicon: HALOT
  rationale: Se conserva «su nombre» de forma literal y natural, porque en el lenguaje bíblico «nombre» expresa identidad y fama, no solo una etiqueta verbal.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - de común acuerdo
  lexicon: HALOT
  rationale: El adverbio indica acción unida o simultánea. «Juntos» es la opción más fluida y precisa en español para la alabanza comunitaria.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo contiene el Tetragrámaton; el proyecto español usa «Yahvé» como forma principal para mantener visible el nombre del pacto. Esto evita la sustitución tradicional y conserva la misma decisión teológica que el POB inglés revisado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente sin cambios y un acuerdo alto entre revisores; por eso no se introducen variantes textuales ni notas adicionales más allá de la explicitación del nombre divino en español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y reverente, sin arcaísmos innecesarios.
  - «Yahvé» se usa coherentemente como equivalente del Tetragrámaton, conforme al criterio del proyecto.
  - El paralelismo poético se conserva con dos imperativos/exhortaciones coordinadas por «y».
