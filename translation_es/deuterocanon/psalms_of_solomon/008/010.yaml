translation:
  language: es
  text: Un hijo con una madre y un padre con una hija se entremezclaban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se mezclaban». La idea es que relaciones familiares cercanas se mezclaban ilícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱὸς
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - un hijo
  lexicon: BDAG
  rationale: El singular funciona de modo representativo, no como narración individualizada. En español, «hijo» conserva el paralelismo con los otros miembros de la frase; el artículo indefinido se deja en el sintagma completo por fluidez.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: BDAG
  rationale: Con genitivo, μετά expresa asociación; «con» es la forma más natural en español y mantiene el emparejamiento de relaciones familiares.
- source_word: μητρὸς
  english_pob_choice: mother
  chosen_spanish: madre
  lexicon: BDAG
  rationale: Término de parentesco directo y transparente; «madre» preserva la fuerza moral de la violación de la relación familiar.
- source_word: πατὴρ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - un padre
  lexicon: BDAG
  rationale: Se traduce de manera directa como «padre». El artículo indefinido queda implícito por el sintagma nominal español en este paralelismo enumerativo.
- source_word: θυγατρὸς
  english_pob_choice: daughter
  chosen_spanish: hija
  lexicon: BDAG
  rationale: Término de parentesco directo; «hija» conserva la simetría con «madre/padre» y el carácter ilícito de las uniones descritas.
- source_word: συνεφύροντο
  english_pob_choice: were commingling
  chosen_spanish: se mezclaban
  alternatives_spanish:
  - se entremezclaban
  - se confundían
  lexicon: LSJ
  rationale: El verbo sugiere mezcla/commingling, y el inglés POB conserva esa imagen en vez de explicitar sexualmente el acto. «Se mezclaban» reproduce la idea básica sin añadir contenido no dicho por el verbo; el contexto hace evidente la impropiedad moral.
theological_decisions:
- issue: Si hacer explícito en el texto principal el sentido incestuoso del verbo
  english_pob_reading: Keep the metaphorically literal wording “were commingling.”
  chosen_spanish_reading: Conservar «se mezclaban» en el texto principal.
  alternative_spanish_readings:
  - tenían relaciones sexuales
  - se unían ilícitamente
  rationale: La combinación de parentescos ya comunica la transgresión grave. El griego emplea un verbo de mezcla, y el POB inglés opta por mantener esa literalidad metafórica. En español, explicitar el acto sexual resolvería demasiado la tensión semántica; por eso se preserva la imagen de mezcla y se deja que el contexto cargue la implicación.
  doctrine_reference: Preservar la tensión léxica y no sobreparafrasear más allá de lo que el texto fuente afirma.
translation_notes:
  revision_awareness: 'El POB inglés pasó de «were mixed together» a «were commingling» y añadió artículos indefinidos para una redacción más natural. La versión española sigue ese mismo impulso: conserva la imagen verbal de mezcla, evita una explicitación sexual no presente en el verbo, y formula la línea con sintaxis natural en español.'
  spanish_consistency_notes:
  - Se mantiene «mezclaban» como equivalente de la imagen de com- mezcla del verbo griego, sin forzar «Cristo», «SEÑOR» ni vocabulario eclesiástico ajeno al contexto.
  - El artículo indefinido aparece de modo natural en la construcción española («un hijo», «un padre»), aunque no se marca de forma rígida en cada sustantivo para no volver pesada la línea.
  - El tono es sobrio y bíblico, pero en español moderno; no se adopta un calco como «con una madre y con una hija» porque el paralelismo ya queda claro sin repetir la preposición.
