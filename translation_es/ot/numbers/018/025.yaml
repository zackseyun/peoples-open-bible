lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - y habló
  - entonces habló
  lexicon: HALOT
  rationale: El waw consecutivo introduce un nuevo paso narrativo. En español, 'habló' da una formulación natural y fiel; el valor conjuntivo queda cubierto por el contexto, y 'y habló' conserva mejor el enlace explícito con la secuencia narrativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en lugar de sustituirlo por un título. ''Yahweh'' sería menos natural en español, y ''el SEÑOR'' ocultaría el nombre propio.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el complemento indirecto del habla; en español, 'a' es la equivalencia directa y natural con el verbo 'hablar'.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y reconocible para lectores de iglesia.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula infinitiva introductoria de habla directa se vierte con 'diciendo', que preserva el marco discursivo recurrente y es idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio divino como 'Yahvé', siguiendo la política del proyecto de no enmascararlo con un título tradicional. 'Yahweh' es comprensible, pero 'Yahvé' es la forma castellana establecida y más natural.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no se requerían cambios; por eso se conserva la estructura breve del original, con la única adaptación necesaria al español y la convención del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - '''Yahvé'' se usa de forma consistente para יְהוָה en el texto principal.'
  - '''Moisés'' y la fórmula ''diciendo'' siguen el español bíblico claro sin introducir arcaísmos innecesarios.'
