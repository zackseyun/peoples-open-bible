lexical_decisions:
- source_word: וְצִוִּיתִי
  english_pob_choice: Then I will command
  chosen_spanish: "Entonces ordenar\0e9"
  alternatives_spanish:
  - "Y ordenar\0e9"
  - "Entonces mandar\0e9"
  lexicon: HALOT
  rationale: "צוה en primera persona expresa emitir una orden o decreto eficaz. \"Ordenar\0e9\" conserva la fuerza de un acto soberano y funciona de manera natural en espa\0f1ol; \"mandar\0e9\" tambi\0e9n es posible, pero puede sonar menos preciso en un registro b\0edblico contempor\0e1neo."
- source_word: בִּרְכָתִי
  english_pob_choice: my blessing
  chosen_spanish: "mi bendici\0f3n"
  alternatives_spanish:
  - "mi bendici\0f3n de fecundidad"
  - "mi bendici\0f3n de prosperidad"
  lexicon: HALOT
  rationale: "ברכה aqu\0ed denota la bendici\0f3n concedida por Yahv\0e9 que produce abundancia agr\0edcola. \"Mi bendici\0f3n\" es suficientemente amplio y deja que la cl\0e1usula siguiente especifique su efecto."
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: "El sentido es benefactivo. \"Para ustedes\" es idiom\0e1tico en espa\0f1ol moderno y transmite bien el destinatario de la bendici\0f3n."
- source_word: בַּשָּׁנָה הַשִּׁשִּׁית
  english_pob_choice: in the sixth year
  chosen_spanish: "en el sexto a\0f1o"
  alternatives_spanish:
  - "durante el sexto a\0f1o"
  lexicon: HALOT
  rationale: "La frase temporal es directa. \"En el sexto a\0f1o\" conserva la referencia cronol\0f3gica al ciclo sab\0e1tico sin a\0f1adir interpretaci\0f3n."
- source_word: וְעָשָׂת
  english_pob_choice: and it will produce
  chosen_spanish: "y producir\0e1"
  alternatives_spanish:
  - "y rendir\0e1"
  - "y har\0e1"
  lexicon: HALOT
  rationale: "El verbo puede expresar producir o dar rendimiento. \"Producir\0e1\" es claro y natural; el sujeto impl\0edcito se entiende por el contexto agr\0edcola y por la cl\0e1usula siguiente."
- source_word: הַתְּבוּאָה
  english_pob_choice: the yield
  chosen_spanish: el rendimiento
  alternatives_spanish:
  - "la producci\0f3n"
  - la cosecha
  lexicon: HALOT
  rationale: "תבואה se refiere al producto agr\0edcola, al rendimiento o a la cosecha. \"Rendimiento\" preserva la idea de producci\0f3n resultante sin limitarla a una sola imagen moderna de \"cosecha\"."
- source_word: לִשְׁלֹשׁ הַשָּׁנִים
  english_pob_choice: for three years
  chosen_spanish: "para tres a\0f1os"
  alternatives_spanish:
  - "por tres a\0f1os"
  - "durante tres a\0f1os"
  lexicon: HALOT
  rationale: "La frase indica duraci\0f3n o suficiencia. \"Para tres a\0f1os\" conserva la extensi\0f3n temporal de manera concisa y fiel al hebreo."
theological_decisions:
- issue: "Car\0e1cter eficaz de la bendici\0f3n divina"
  english_pob_reading: A direct divine act of blessing resulting in extraordinary agricultural provision
  chosen_spanish_reading: "Un acto directo y eficaz de Yahv\0e9 que decreta bendici\0f3n y produce provisi\0f3n agr\0edcola extraordinaria"
  alternative_spanish_readings:
  - "Una expresi\0f3n general de providencia divina"
  rationale: "La primera persona verbal y la construcci\0f3n \"mi bendici\0f3n\" presentan la abundancia como un decreto concreto, no solo como una observaci\0f3n general sobre la providencia."
  doctrine_reference: "Providencia divina; bendici\0f3n eficaz de Yahv\0e9 en el pacto"
translation_notes:
  revision_awareness: "El texto ingl\0e9s fue revisado de \"crop\" a \"yield\" para acercarse m\0e1s al sentido de produce/harvest. La propuesta espa\0f1ola refleja esa decisi\0f3n con \"rendimiento\", manteniendo naturalidad y cercan\0eda al hebreo."
  spanish_consistency_notes:
  - "Se mantiene \"Yahv\0e9\" como nombre divino cuando el pasaje habla en primera persona divina."
  - "\"Bendici\0f3n\" se conserva sin glosa teol\0f3gica a\0f1adida, porque el contexto inmediato ya concreta su efecto agr\0edcola."
  - "La elecci\0f3n de \"rendimiento\" evita restringir indebidamente תבואה a una sola imagen agraria moderna."
