  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo y del POB inglés: una pregunta retórica sobre si el águila se eleva y ubica su nido en lo alto por mandato humano. Sin embargo, la apertura «¿Está a tu mando que...?» no refleja bien el modismo interrogativo español ni la sintaxis del original; suena forzada y menos fiel que una formulación como «¿Acaso... por tu mandato...?».'
  spanish_quality_summary: 'La legibilidad es mixta. «vuele en alto» y «en las alturas» son comprensibles, pero «¿Está a tu mando que...?» es poco natural en español. También conviene alinear la nota b con el anclaje real en el texto: si la nota explica el modismo «sobre tu boca», debe anclarse en la frase que traduce el mandato. Una revisión menor mejora naturalidad, fidelidad y claridad sin cambiar el sentido.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo el tratamiento de נָשֶׁר como «águila», que está bien y correctamente matizado con nota alternativa. La decisión de no usar formulaciones tradicionales rígidas es adecuada. La nota sobre el modismo hebreo debe mantenerse, pero vinculada a «por tu mandato».
  issues:
  - severity: high
    issue: 'Apertura española poco natural y débilmente fiel: «¿Está a tu mando que...?»'
    rationale: Aunque intenta reflejar «Is it at your command that...», en español esa construcción resulta extraña y no expresa con claridad la pregunta retórica del hebreo. «¿Acaso el águila vuela alto por tu mandato...?» comunica mejor el sentido idiomático de עַל־פִּיךָ y la fuerza retórica del pasaje.
  - severity: medium
    issue: Anclaje de nota b mal ubicado
    rationale: La nota b explica el modismo «sobre tu boca» = «a tu orden/según tu palabra», pero en el texto actual está anclada al final de «en las alturas» en vez de a la expresión que traduce el mandato. Debe anclarse en «por tu mandato[b]» o equivalente.
  - severity: low
    issue: «vuele en alto» es entendible, pero «vuele alto» suena más natural
    rationale: El español idiomático prefiere «volar alto». La nota con alternativa «planee» puede mantenerse.
  revised_spanish_text: ¿Acaso el águila vuela alto[a] por tu mandato[b] y pone su nido en las alturas?[c]
