base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/001.yaml
  text: Then Nadab and Abihu[a], Aaron’s sons, each took his firepan, put fire in it, placed incense on it, and presented unauthorized fire before Yahweh, which he had not commanded them.
  footnotes:
  - marker: a
    text: Or 'strange fire' or 'foreign fire.' The Hebrew phrase refers to fire that was not authorized by the LORD, as the next clause explains.
    reason: lexical_alternative
