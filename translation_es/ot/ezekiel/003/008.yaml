review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la imagen concreta de «rostro» y «frente», la causatividad de נָתַתִּי como «he hecho», y el paralelismo entre ambas cláusulas. También conserva adecuadamente la alternativa léxica «duro». Sin embargo, «fuerte frente a» suena algo rígido y menos idiomático en español para una confrontación personal; «firme ante» comunica mejor la idea de firmeza frente a oposición sin perder la imagen corporal ni desplazar el sentido hacia mera fuerza física.'
  spanish_quality_summary: La redacción actual es comprensible y bastante digna, pero «tu frente fuerte frente a sus frentes» produce una repetición áspera y poco natural. Un ajuste menor mejora la fluidez y mantiene el paralelismo. «He aquí» es aceptable en registro bíblico; la principal mejora necesaria es léxica/sintáctica en el predicado y la preposición.
  glossary_alignment: No hay conflicto con la terminología del proyecto. El versículo no contiene nombres divinos ni términos sensibles del glosario principal. La decisión de mantener la imaginería corporal coincide con la rationale auditada en inglés.
  issues:
  - severity: medium
    issue: «fuerte frente a» es poco natural en español en ambas cláusulas
    rationale: Aunque es comprensible, la combinación suena literalista y torpe. El hebreo expresa firmeza en confrontación; en español «firme ante» o «fuerte contra» lo comunica mejor. «Firme ante» preserva mejor el matiz no negativo y la dignidad del registro.
  - severity: low
    issue: Repetición áspera en «tu frente fuerte frente a sus frentes»
    rationale: La secuencia de tres palabras emparentadas dificulta la lectura pública. Un leve ajuste mejora la legibilidad sin apartarse del hebreo ni del POB inglés.
  revised_spanish_text: He aquí[a] que he hecho tu rostro firme ante sus rostros, y tu frente firme ante sus frentes.
