id: 2TI.3.8
reference: 2 Timothy 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃν τρόπον δὲ Ἰάννης καὶ Ἰαμβρῆς ἀντέστησαν Μωϋσεῖ, οὕτως καὶ οὗτοι ἀνθίστανται τῇ ἀληθείᾳ, ἄνθρωποι κατεφθαρμένοι τὸν νοῦν, ἀδόκιμοι περὶ τὴν πίστιν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/008.yaml
  text: Now just as Jannes and Jambres opposed Moses, so also these men oppose the truth—men corrupted in mind, disqualified regarding the faith.
translation:
  language: ko
  text: 얀네와 얌브레가 모세를 거역한 것과 같이, 이 사람들도 진리를 거역합니다. 그들은 마음이 부패한 자들이며, 믿음에 관해서는 검증을 통과하지 못한 자들[a]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음에서 인정받지 못한 자들」. 헬라어 ἀδόκιμος는 시험을 통과하지 못해 자격을 잃은 상태를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰάννης καὶ Ἰαμβρῆς
  english_pob_choice: Jannes and Jambres
  chosen_korean: 얀네와 얌브레
  alternatives_korean:
  - 얀네스와 얌브레스
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 「얀네와 얌브레」로 옮긴다. 한국 성서 전통과 일치한다.
- source_word: ἀντέστησαν ... ἀνθίστανται
  english_pob_choice: opposed ... oppose
  chosen_korean: 거역한 ... 거역합니다
  alternatives_korean:
  - 대적한 ... 대적합니다
  - 맞선 ... 맞섭니다
  lexicon: BDAG
  rationale: ἀνθίστημι는 「맞서 섬·반대함」. 한국 성서 전통의 「거역하다」가 모세·진리에 대한 적대를 자연스럽게 담는다. 같은 어휘의 짝(과거↔현재)을 같은 한국어로 통일한다.
- source_word: ἄνθρωποι κατεφθαρμένοι τὸν νοῦν
  english_pob_choice: men corrupted in mind
  chosen_korean: 마음이 부패한 자들
  alternatives_korean:
  - 정신이 망가진 자들
  - 생각이 썩어 버린 자들
  lexicon: BDAG
  rationale: καταφθείρω는 「완전히 망가뜨림」. 완료 분사로 「부패한 상태」. νοῦς는 본 문맥에서 「사고·판단」을 가리키나, 한국어 「마음」이 도덕적·인격적 차원을 함께 담는다.
- source_word: ἀδόκιμοι περὶ τὴν πίστιν
  english_pob_choice: disqualified regarding the faith
  chosen_korean: 믿음에 관해서는 검증을 통과하지 못한 자들
  alternatives_korean:
  - 믿음에서 버림받은 자들
  - 신앙에 있어 인정받지 못한 자들
  lexicon: BDAG
  rationale: 2:15의 δόκιμος(인정받은 자)의 부정형. 본 절은 짝을 이루므로 「검증」 어휘를 살려 둘 사이의 대조를 분명히 한다.
