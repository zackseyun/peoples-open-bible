translation:
  language: es
  text: 'Para el Parbar[a] al oeste: cuatro en el camino[b], y dos en el Parbar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recinto», «patio», «anexo» o, tradicionalmente, «suburbio» para el raro término hebreo parbar. La referencia arquitectónica exacta es incierta.
