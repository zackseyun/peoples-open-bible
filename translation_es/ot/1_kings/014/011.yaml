translation:
  language: es
  text: A cualquiera de los de Jeroboam que muera[a] en la ciudad, se lo comerán los perros; y a cualquiera que muera en el campo, se lo comerán las aves del cielo[b], porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el muerto de Jeroboam»; es decir, cualquiera que pertenezca a la casa de Jeroboam y muera.'
    reason: lexical_alternative
  - marker: b
    text: O «las aves de los cielos»; tradicionalmente, «las aves del aire».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת לְיָרָבְעָם
  english_pob_choice: Anyone belonging to Jeroboam who dies
  chosen_spanish: El muerto de Jeroboam
  alternatives_spanish:
  - Cualquiera de los de Jeroboam que muera
  - Quien pertenezca a Jeroboam y muera
  - El que muera de Jeroboam
  lexicon: HALOT
  rationale: 'La construcción hebrea es distributiva e idiomática: no se refiere a Jeroboam mismo, sino a cualquiera de los suyos que muera. En español, «el muerto de Jeroboam» conserva la forma breve del hebreo, mientras la nota aclara el sentido distributivo para no perder la tensión lexical.'
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en la urbe
  lexicon: HALOT
  rationale: Es un localizador directo y neutro; «en la ciudad» reproduce bien el contraste con «en el campo».
- source_word: יֹאכְלוּ הַכְּלָבִים
  english_pob_choice: the dogs will eat
  chosen_spanish: lo comerán los perros
  alternatives_spanish:
  - los perros lo comerán
  - los perros lo devorarán
  lexicon: HALOT
  rationale: Se conserva el verbo básico «comer» para mantener la fuerza concreta del hebreo אָכַל, sin intensificarlo artificialmente con «devorar».
- source_word: וְהַמֵּת בַּשָּׂדֶה
  english_pob_choice: and anyone who dies in the field
  chosen_spanish: y el muerto en el campo
  alternatives_spanish:
  - y cualquiera que muera en el campo
  - y el que muera en el campo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera mitad y la misma base nominal «el muerto», que refleja el hebreo y evita suavizar el carácter proverbial/judicial del enunciado.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  - los pájaros del cielo
  lexicon: HALOT
  rationale: «עוֹף» abarca aves en sentido colectivo; «aves del cielo» es una opción natural y fiel. Se prefirió «aves» sobre «pájaros» por registro más bíblico y general, y «cielo» preserva el vínculo con שָׁמַיִם.
- source_word: כִּי יְהוָה דִּבֵּר
  english_pob_choice: for Yahweh has spoken
  chosen_spanish: porque Yahvé ha hablado
  alternatives_spanish:
  - porque Yahvé habló
  - pues Yahvé ha hablado
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el marco editorial de la POB en español. «Ha hablado» refleja el perfecto hebreo y comunica la certeza irrevocable del decreto divino; «porque» expresa la base causal/confirmatoria del juicio.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El auditorio en español recibe el nombre del pacto como «Yahvé», conforme a los lineamientos del proyecto. Se evita la sustitución por «SEÑOR» para no ocultar el nombre divino presente en el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza distributiva de הַמֵּת לְיָרָבְעָם
  english_pob_reading: Anyone belonging to Jeroboam who dies
  chosen_spanish_reading: El muerto de Jeroboam
  alternative_spanish_readings:
  - Cualquiera de los de Jeroboam que muera
  - Quien pertenezca a Jeroboam y muera
  rationale: La frase hebrea es una designación compacta que, en contexto, abarca a cualquier miembro de la casa de Jeroboam. La forma breve en el texto principal conserva esa compacidad; la nota evita que el lector la entienda de manera demasiado literal o restrictiva.
  doctrine_reference: 'DOCTRINE.md Translation principles: lexical force and contextual clarification'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y coincide con el trazado auditado en inglés. Se conservan el paralelismo ciudad/campo, el sujeto distributivo de la primera cola, el colectivo de aves, y el cierre causal con el nombre divino explícito. No se introdujeron expansiones doctrinales ni suavizaciones del juicio.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «aves» en lugar de «pájaros» por registro bíblico y por correspondencia con el colectivo hebreo.
  - Se mantuvo la estructura paralela con «lo comerán» en ambas cláusulas para reflejar el mismo verbo hebreo en ambos miembros.
