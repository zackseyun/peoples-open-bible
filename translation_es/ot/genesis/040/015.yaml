translation:
  language: es
  text: Porque ciertamente fui secuestrado[a] de la tierra de los hebreos, y aun aquí no he hecho nada como para que me pusieran en el pozo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente fui robado» o «fui arrebatado». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: «Pozo» conserva la imagen hebrea de בּוֹר; en este contexto también puede referirse a un calabozo o celda de prisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de José; en español, «Porque» conserva bien el valor causal/explanatorio del hebreo en una declaración motivada por su inocencia.
- source_word: גֻנֹּב גֻּנַּבְתִּי
  english_pob_choice: I was indeed kidnapped
  chosen_spanish: fui, en verdad, secuestrado
  alternatives_spanish:
  - fui ciertamente robado
  - fui arrebatado por la fuerza
  lexicon: HALOT
  rationale: La construcción intensiva hebrea pide énfasis. «Secuestrado» comunica el traslado forzado de una persona con más naturalidad que «robado», sin perder la fuerza de la duplicación verbal.
- source_word: מֵאֶרֶץ הָעִבְרִים
  english_pob_choice: from the land of the Hebrews
  chosen_spanish: de la tierra de los hebreos
  alternatives_spanish:
  - del país de los hebreos
  - de la tierra de los hebreos
  lexicon: HALOT
  rationale: «Tierra» conserva la imagen geográfica y étnica del hebreo sin precisar más de lo que el texto dice. «Hebreos» mantiene el gentilicio del original.
- source_word: וְגַם פֹּה
  english_pob_choice: and even here
  chosen_spanish: y también aquí
  alternatives_spanish:
  - y aun aquí
  - y hasta aquí
  lexicon: HALOT
  rationale: En español, «y también aquí» conserva el valor aditivo con énfasis sin sonar forzado. «Aun» sería posible, pero menos transparente para lectura pública.
- source_word: לֹא עָשִׂיתִי מְאוּמָה
  english_pob_choice: I have done nothing
  chosen_spanish: no he hecho nada
  alternatives_spanish:
  - no he hecho absolutamente nada
  - no he hecho cosa alguna
  lexicon: HALOT
  rationale: La negación absoluta de מְאוּמָה se expresa con una fórmula idiomática clara y natural en español. El presente perfecto mantiene el valor de experiencia hasta el momento del habla.
- source_word: כִּי שָׂמוּ אֹתִי
  english_pob_choice: that they should put me
  chosen_spanish: para que me pusieran
  alternatives_spanish:
  - para que me metieran
  - para ponerme
  lexicon: HALOT
  rationale: La subordinación final refleja la construcción hebrea sin sobrecargar el español. «Pusieran» mantiene el sentido de colocar/encerrar con una forma adecuada al contexto.
- source_word: בַּבּוֹר
  english_pob_choice: in the pit
  chosen_spanish: en el pozo
  alternatives_spanish:
  - en el pozo-prisión
  - en la cisterna
  lexicon: HALOT
  rationale: «Pozo» preserva la imagen básica de בּוֹר y funciona bien en español. Dado el contexto narrativo, puede aludir a una celda o prisión, pero el texto base conserva la imagen original.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del POB inglés que privilegia una subordinación final formal natural («that they should put me»), reflejada en español como «para que me pusieran». Se integra además la intensificación del verbo hebreo y la continuidad del símbolo narrativo de בּוֹר.
  spanish_consistency_notes:
  - Se mantuvo «hebres/hebreos» como gentilicio directo del original, sin sustituirlo por una paráfrasis geográfica más amplia.
  - Se evitó «Señor» u otra terminología ajena porque el versículo no contiene lenguaje divino explícito.
  - El tiempo verbal en español se eligió para sonar natural en discurso directo, sin perder el carácter de testimonio inmediato de José.
