translation:
  language: es
  text: El que tiene ojo generoso[a] será bendecido, porque da de su pan al pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "ojo bueno", un modismo para generosidad o abundancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב עַיִן
  english_pob_choice: a generous eye
  chosen_spanish: ojo generoso
  alternatives_spanish:
  - buen ojo
  - ojo bondadoso
  - el que tiene ojo generoso
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo que comunica generosidad, no visión física. En español, 'ojo generoso' conserva la imagen del original y su valor proverbial; el artículo en la oración principal explicita el sujeto implícito, siguiendo el sentido del POB inglés.
- source_word: יְבֹרָךְ
  english_pob_choice: will be blessed
  chosen_spanish: será bendecido
  alternatives_spanish:
  - es bendecido
  - será dicho bien de él
  - recibirá bendición
  lexicon: HALOT
  rationale: El verbo está en pasivo; 'será bendecido' reproduce ese valor y encaja bien con el tono sapiencial proverbial en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o explicación del dicho anterior. 'Porque' expresa claramente la relación causal en español sin añadir matices no presentes.
- source_word: נָתַן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - ha dado
  - dio
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en el estilo proverbial suele expresar acción habitual. El presente 'da' comunica esa costumbre general de manera natural en español.
- source_word: מִלַּחְמוֹ
  english_pob_choice: some of his bread
  chosen_spanish: de su pan
  alternatives_spanish:
  - de su alimento
  - de su comida
  - parte de su pan
  lexicon: HALOT
  rationale: Se conserva 'pan' para mantener la concreción imagética del hebreo. El valor partitivo de מִן puede quedar implícito en español con 'de su pan' sin forzar una especificación como 'parte de'.
- source_word: לַדָּל
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al menesteroso
  - a los pobres
  lexicon: HALOT
  rationale: דַּל designa al pobre o económicamente débil. 'Al pobre' es la equivalencia más directa e idiomática; el singular genérico funciona de manera proverbial en español.
translation_notes:
  revision_awareness: 'El texto base en inglés pasó de una formulación muy literal (''A generous eye'') a una más natural y explícita (''He who has a generous eye''). La versión española sigue esa misma línea: conserva el modismo hebreo, pero hace explícito el sujeto proverbial para evitar una frase demasiado enigmática en español.'
  spanish_consistency_notes:
  - Se mantiene 'bendecido' para corresponder al pasivo hebreo y al inglés auditado.
  - '''Pan'' se conserva por fidelidad a la imagen concreta del hebreo; no se generaliza a ''alimento'' porque el contexto no lo exige.'
  - '''Pobre'' se usa en singular genérico para reflejar el sentido proverbial y evitar una acumulación innecesaria de pluralidad.'
