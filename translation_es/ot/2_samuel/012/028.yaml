  text: Now gather the rest of the troops[a], camp against the city, and capture it, lest I capture the city and it be called by my name.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'and it be called by my name.' The Hebrew literally says 'my name be called over it,' expressing that the honor for taking the city would be attributed to Joab.
    reason: lexical_alternative
