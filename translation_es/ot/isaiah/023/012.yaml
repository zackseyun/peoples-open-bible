  to: 'Él dijo: «Ya no te regocijarás[a], oh virgen hija de Sidón, oprimida. Levántate, cruza a Kittim[b]; aun allí no tendrás descanso».'
  rationale: Se corrigen los anclajes de las notas para que coincidan con las palabras pertinentes en el texto, se ajusta el verbo a 'regocijarás' para reflejar mejor עלז, y se pule levemente el orden del vocativo para una lectura más natural en español sin perder la personificación ni el tono profético.
