translation:
  language: es
  text: Porque Yahvé ha redimido a Jacob y lo ha rescatado[a] de la mano de uno más fuerte que él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo ha redimido». El verbo hebreo aquí es גאל, término frecuentemente asociado con actuar como redentor en favor de un pariente o con reclamar a alguien de la angustia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque sí
  lexicon: HALOT
  rationale: Introduce la base o explicación de la afirmación anterior; en español, 'Porque' conserva esa relación causal/discursiva de forma natural y digna.
- source_word: פָדָה
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha rescatado de cautiverio
  - ha comprado
  lexicon: HALOT
  rationale: פדה expresa liberar por rescate o redención. 'Ha redimido' conserva el campo semántico de liberación comprada/rescatada y mantiene el paralelo con גאל sin caer en una paráfrasis excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino propio, no un sustituto titulado. 'Yahvé' sigue el estándar del proyecto para יְהוָה y es idiomático en español bíblico contemporáneo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a Jacob; se conserva el nombre propio sin interpretar el referente como 'Israel' en el texto principal.
- source_word: וּגְאָלוֹ
  english_pob_choice: and ransomed him
  chosen_spanish: y lo ha rescatado
  alternatives_spanish:
  - y lo ha redimido
  - y lo ha reclamado como redentor
  lexicon: HALOT
  rationale: גאל tiene un matiz de redención por pariente-rescatador; en español 'rescatar' comunica bien esa acción de sacar a alguien de una situación de dominio o peligro, y evita repetir mecánicamente 'redimir' donde el hebreo ofrece un segundo verbo cercano pero distinto.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de la mano de
  - del poder de
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de 'mano' como imagen de control o poder. 'De mano de' es breve, natural y fiel al sintagma.
- source_word: חָזָק
  english_pob_choice: one stronger than he
  chosen_spanish: del más fuerte que él
  alternatives_spanish:
  - de uno más fuerte que él
  - del fuerte que le supera
  lexicon: HALOT
  rationale: El comparativo singular masculino exige expresar superioridad relativa. 'Del más fuerte que él' refleja esa comparación de modo claro en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: than he
  chosen_spanish: que él
  alternatives_spanish:
  - que lo
  - que él mismo
  lexicon: HALOT
  rationale: El preposición comparativa con sufijo marca la comparación con Jacob. En español, 'más fuerte que él' expresa esa relación de manera natural y precisa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de transliterar el nombre revelado de Dios en lugar de sustituirlo por un título, preservando la referencia personal y pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Paralelismo de redención con פָדָה y גָאַל
  english_pob_reading: 'rendered with two related but distinct English verbs: ''redeemed'' and ''ransomed'''
  chosen_spanish_reading: '''ha redimido'' / ''ha rescatado'''
  alternative_spanish_readings:
  - '''ha redimido'' / ''ha redimido'''
  - '''ha rescatado'' / ''ha rescatado'''
  rationale: El hebreo usa dos verbos cercanos pero no idénticos en paralelo poético. Diferenciarlos en español conserva la textura del original y evita aplanar la repetición significativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo directamente y se integró el criterio auditado del POB inglés: distinguir פָדָה y גָאַל, mantener el nombre divino como Yahvé/Yahweh y conservar la imagen hebrea de la mano como poder/control. No se introdujeron cambios no sustentados por la fuente.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Redimido'' y ''rescatado'' se distribuyen para reflejar el paralelismo hebreo sin perder el sentido de liberación.'
  - '''De mano de'' conserva el hebraísmo del original y es comprensible en español bíblico moderno.'
  - El comparativo 'más fuerte que él' hace explícita la fuerza relacional del hebreo sin añadir interpretación doctrinal.
