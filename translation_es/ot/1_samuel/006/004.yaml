  to: 'Y dijeron: «¿Cuál es la ofrenda por la culpa[a] que debemos devolverle?». Y dijeron: «Según el número de los gobernantes filisteos[b]: cinco tumores[c] de oro y cinco ratones de oro, porque una sola plaga estaba sobre todos ellos y sobre sus gobernantes».'
  rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las unidades léxicas auditadas; se reemplaza «señores filisteos» por «gobernantes filisteos» para seguir mejor la preferencia moderna del POB inglés; y se cambia «vino sobre» por «estaba sobre» para evitar añadir un verbo no explícito en el hebreo y mantener la fidelidad al sentido fuente.
