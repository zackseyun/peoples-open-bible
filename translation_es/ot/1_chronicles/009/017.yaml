translation:
  language: es
  text: Y los guardianes de las puertas eran Salum[a], Acub, Talmón, Ahimán y sus hermanos; Salum era el principal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes»; el hebreo dice literalmente «sus hermanos», expresión que en listas así puede referirse tanto a hermanos biológicos como a miembros del mismo clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de las puertas
  - los guardas de las puertas
  lexicon: HALOT
  rationale: El término designa a quienes custodiaban y atendían las puertas del recinto. En español bíblico, «porteros» sigue siendo claro y natural para esta función, aunque en uso moderno pueda sonar más doméstico; por eso se conserva con apoyo del contexto del templo.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Shallum
  lexicon: transliteración del nombre propio
  rationale: Se vierte como nombre propio en forma española usual. «Salum» evita la secuencia sh- poco natural en español y mantiene la identificación del personaje.
- source_word: עַקּ֔וּב
  english_pob_choice: Akkub
  chosen_spanish: Acub
  alternatives_spanish:
  - Akkub
  lexicon: transliteración del nombre propio
  rationale: Se conserva el nombre propio con adaptación ortográfica al español. La forma con c es más fluida en lectura pública, sin perder la referencia al hebreo.
- source_word: טַלְמֹ֖ן
  english_pob_choice: Talmon
  chosen_spanish: Talmón
  alternatives_spanish:
  - Talmón
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado con acento gráfico para indicar la pronunciación española natural.
- source_word: וַאֲחִימָ֑ן
  english_pob_choice: Ahiman
  chosen_spanish: Ahimán
  alternatives_spanish:
  - Ahiman
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado con acento gráfico para la lectura en español.
- source_word: וַאֲחִיהֶ֥ם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus deudos
  lexicon: HALOT
  rationale: Se mantiene la literalidad de «hermanos», porque el hebreo lo dice así. Como en listas genealógicas puede abarcar también miembros del mismo clan, la nota en pie preserva la alternativa sin reemplazar el término de base.
- source_word: הָרֹֽאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el principal
  - la cabeza
  - el líder
  lexicon: HALOT
  rationale: Aquí el sustantivo indica rango o posición de autoridad. «Jefe» expresa bien esa función en español moderno y conserva la fuerza jerárquica del texto.
- source_word: וְ...וְ...וַ...וַ
  english_pob_choice: and ... and ... and ... and
  chosen_spanish: y ... y ... y ... y
  alternatives_spanish:
  - con enumeración asindética
  lexicon: estructura conjuntiva hebrea
  rationale: Se reproduce la acumulación coordinada de la lista con «y», respetando el ritmo aditivo del hebreo sin forzar una estructura más libre.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente; el estado de revisión más reciente indica acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - 'Se conserva un registro terminológico coherente: nombres propios adaptados al español, pero reconocibles frente al hebreo.'
  - «Porteros» se usa en sentido funcional-templario, no doméstico, conforme al contexto de guardia de puertas.
  - La nota del versículo mantiene la tensión semántica de אֲחִיהֶם sin diluirla en una paráfrasis interpretativa.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni una cita del Tetragrámaton.
