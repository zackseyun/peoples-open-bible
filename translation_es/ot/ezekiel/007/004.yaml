translation:
  language: es
  text: Mi ojo no te perdonará[a], ni tendré compasión; porque haré recaer tus caminos sobre ti, y tus abominaciones estarán dentro de ti[b]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi ojo no te tendrá compasión». El hebreo usa un modismo con «ojo» para expresar perdonar o mirar con compasión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus abominaciones estarán en medio de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָחוֹס עֵינִי
  english_pob_choice: My eye will not spare
  chosen_spanish: Mi ojo no te perdonará
  alternatives_spanish:
  - Mi ojo no te perdonará
  - Mi ojo no te tendrá compasión
  - No ahorraré mi ojo sobre ti
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática con ‘ojo’ para no perdonar / no mirar con compasión. En español, ‘mi ojo no te perdonará’ conserva la imagen corporal y el tono profético, aunque ‘no te tendrá compasión’ también sería posible. Se evita suavizarlo a una formulación más interpretativa.
- source_word: אֶחְמֹל
  english_pob_choice: nor will I have pity
  chosen_spanish: ni tendré compasión
  alternatives_spanish:
  - ni te perdonaré
  - ni tendré piedad
  - ni me apiadaré
  lexicon: HALOT
  rationale: חמל añade la idea de compasión/piedad. ‘Tendré compasión’ distingue este verbo del anterior y preserva la duplicación retórica del hebreo, en línea con la decisión inglesa de no colapsar ambos verbos en una sola expresión.
- source_word: דְרָכַיִךְ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tu conducta
  - tu manera de vivir
  - tus obras
  lexicon: HALOT
  rationale: ‘Caminos’ reproduce el valor metafórico estándar de דרך en contextos de juicio y mantiene la resonancia bíblica sin convertirlo en una paráfrasis ética más abstracta.
- source_word: עָלַיִךְ אֶתֵּן
  english_pob_choice: I will bring ... upon you
  chosen_spanish: pondré ... sobre ti
  alternatives_spanish:
  - traeré ... sobre ti
  - echaré ... sobre ti
  - haré recaer ... sobre ti
  lexicon: HALOT
  rationale: נתן aquí expresa una acción de imponer o colocar la retribución sobre la destinataria. ‘Pondré ... sobre ti’ sigue de cerca la imagen verbal del hebreo y mantiene la fuerza judicial del dicho sin añadir explícitamente ‘castigaré’.
- source_word: וְתוֹעֲבוֹתַיִךְ
  english_pob_choice: and your abominations
  chosen_spanish: y tus abominaciones
  alternatives_spanish:
  - y tus cosas abominables
  - y tus actos abominables
  - y tus detestables prácticas
  lexicon: HALOT
  rationale: ‘Abominaciones’ conserva la fuerza profético-covenantal de תועבות y corresponde bien al registro del texto. Se evita atenuarlo con expresiones descriptivas menos intensas.
- source_word: בְּתוֹכֵךְ תִּהְיֶיןָ
  english_pob_choice: will be within you
  chosen_spanish: estarán dentro de ti
  alternatives_spanish:
  - estarán en medio de ti
  - estarán en tu interior
  - estarán en ti
  lexicon: HALOT
  rationale: La frase es concisa y espacial. ‘Dentro de ti’ preserva la imagen de interioridad con una forma natural en español, mientras deja abierta la ambigüedad entre interioridad literal y presencia en medio de la ciudad.
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrás
  alternatives_spanish:
  - Y sabrás
  - Entonces sabrán
  - Y ustedes sabrán
  lexicon: HALOT
  rationale: El hebreo pasa al plural, aunque el discurso previo ha sido singular femenino; en español se opta por ‘sabrás’ para mantener la coherencia con el destinatario singular del versículo. La tensión gramatical se preserva indirectamente en nota si se requiere, en lugar de forzar una armonización no documentada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa ‘Yahvé’ conforme al criterio de la serie para el Tetragrama, evitando la sustitución por un título y manteniendo el nombre divino revelado.
theological_decisions:
- issue: Formulación singular/plural en el cierre del versículo
  english_pob_reading: Then you will know that I am Yahweh.
  chosen_spanish_reading: Entonces sabrás que yo soy Yahvé.
  alternative_spanish_readings:
  - Entonces sabrán que yo soy Yahvé.
  - Y sabréis que yo soy Yahvé.
  rationale: El hebreo cambia al plural (‘vosotros/ustedes’), pero el versículo dirige la profecía a una ciudad personificada en singular femenino. En español, ‘sabrás’ mantiene la continuidad discursiva y la personificación del destinatario sin resolver artificialmente la oscilación gramatical del original. Esta decisión conserva la tensión textual en vez de homogenizarla.
  doctrine_reference: Principio de primacía del original y preservación de tensiones textuales; ver la práctica profética de personificación de ciudades en Ezequiel.
translation_notes:
  revision_awareness: El texto sigue el testimonio hebreo de WLC y la auditoría inglesa POB sin depender mecánicamente del inglés. Se mantiene la imagen idiomática de ‘ojo’ y la duplicación verbal de juicio/compasión, se conserva ‘abominaciones’ como término técnico profético y se traduce el cierre con el nombre divino ‘Yahvé’. No se introducen expansiones como ‘castigaré’ ni se neutraliza la tensión singular/plural del cierre más allá de una decisión de coherencia discursiva en español.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como forma principal del Tetragrama en toda la serie.
  - ‘Abominaciones’ se mantiene por consistencia con el léxico profético de la obra.
  - La frase idiomática con ‘ojo’ se deja visible en el texto principal para no perder la imaginería hebrea.
  - Se usa puntuación española estándar y se evita una sintaxis excesivamente literal que oscurezca el sentido.
