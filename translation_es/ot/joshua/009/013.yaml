  text: וְ/אֵ֨לֶּה נֹאד֤וֹת הַ/יַּ֨יִן֙ אֲשֶׁ֣ר מִלֵּ֣אנוּ חֲדָשִׁ֔ים וְ/הִנֵּ֖ה הִתְבַּקָּ֑עוּ וְ/אֵ֤לֶּה שַׂלְמוֹתֵ֨י/נוּ֙ וּ/נְעָלֵ֔י/נוּ בָּל֕וּ מֵ/רֹ֥ב הַ/דֶּ֖רֶךְ מְאֹֽד׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/009/013.yaml
  text: And these wineskins[a], which we filled when they were new—look, they have burst[c][b]; and these our garments and our sandals have worn out from the journey being very long.
  footnotes:
  - marker: a
    text: Or 'have split open.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the great amount of the journey, very much,' meaning because the journey was extremely long.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of the journey being very long'.
    reason: previous_rendering
