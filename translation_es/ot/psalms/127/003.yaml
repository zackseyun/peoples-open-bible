lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce la declaración con fuerza exhortativa y de atención. En español, «¡Mira!» conserva mejor ese golpe de apertura que un calco más solemne, sin perder claridad poética.
- source_word: נַחֲלַת יְהוָה
  english_pob_choice: a heritage from Yahweh
  chosen_spanish: herencia de Yahvé
  alternatives_spanish:
  - herencia de Yahvé
  - herencia del Yahvé
  - herencia que viene de Yahvé
  lexicon: HALOT
  rationale: 'El hebreo admite una relación de procedencia o posesión. Aquí, siguiendo la lectura inglesa del POB, se traduce como procedencia: los hijos son una herencia dada por Yahvé. «Herencia» mantiene el matiz de don y posesión valiosa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton como «Yahvé» y evitando la sustitución litúrgica por «SEÑOR».
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  - los hijos e hijas
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino que puede funcionar de manera genérica. En este contexto poético, «los hijos» es fiel, natural y conserva el paralelismo con el resto del verso.
- source_word: שָׂכָר
  english_pob_choice: a reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - pago
  - salario
  lexicon: HALOT
  rationale: La palabra puede significar salario o recompensa. Aquí el paralelo con la primera cola favorece una idea positiva de retribución/don; «recompensa» comunica esa fuerza sin introducir una lectura comercial demasiado fuerte.
- source_word: פְּרִי הַבָּטֶן
  english_pob_choice: the fruit of the womb
  chosen_spanish: el fruto del vientre
  alternatives_spanish:
  - el fruto del seno
  - la descendencia
  - los hijos que nacen
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea tradicional. «El fruto del vientre» refleja el giro idiomático y su valor poético, evitando una paráfrasis que borre la metáfora.
theological_decisions:
- issue: Sentido de נַחֲלַת יְהוָה
  english_pob_reading: children are a heritage from Yahweh
  chosen_spanish_reading: los hijos son herencia de Yahvé
  alternative_spanish_readings:
  - los hijos son la herencia de Yahvé
  - los hijos son herencia de Yahvé y de Yahvé
  rationale: 'El hebreo puede leerse como posesión («herencia de Yahvé») o como procedencia («herencia de Yahvé» en sentido de don recibido). Se mantiene la lectura del POB: los hijos son un regalo procedente de Yahvé, no que simplemente pertenezcan a él como posesión abstracta.'
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Valor poético de la segunda cola
  english_pob_reading: the fruit of the womb a reward
  chosen_spanish_reading: el fruto del vientre, recompensa
  alternative_spanish_readings:
  - el fruto del vientre es recompensa
  - el fruto del vientre, una recompensa
  rationale: La ausencia de verbo en hebreo permite un enunciado nominal breve. En español se conserva la estructura poética condensada con una pausa, para no forzar un verbo que el texto no expresa.
  doctrine_reference: Poetic syntax; Hebrew nominal clause
translation_notes:
  revision_awareness: 'Este borrador sigue el último pase revisado sin cambios sustantivos en el inglés POB (estado: high_agreement). Se conserva la decisión sobre el nombre divino, el valor genérico de «children/בָּנִים» y la metáfora de «fruit of the womb» con estructura poética nominal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Hijos» se mantiene como genérico colectivo en este contexto poético, sin añadir especificación de género no presente en el hebreo.
  - La puntuación reproduce la cadencia de dos hemistiquios con pausa central.
