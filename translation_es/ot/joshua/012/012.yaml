lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: מֶלֶךְ designa al gobernante real; en español, «rey» es el equivalente natural y fiel. En la estructura de lista, el artículo definido se entiende por el sintagma nominal español.
- source_word: עֶגְלוֹן
  english_pob_choice: Eglon
  chosen_spanish: Eglón
  alternatives_spanish:
  - Eglon
  lexicon: nombre propio / transliteración estándar
  rationale: Se mantiene el topónimo propio con adaptación ortográfica española habitual («Eglón»), preservando la referencia geográfica sin explicación añadida.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno rey
  lexicon: HALOT
  rationale: Aquí אֶחָד funciona como conteo en una lista de conquistas; «uno» conserva la concisión repetitiva del hebreo. No se amplía a «un rey» porque el hebreo repite simplemente el numeral.
- source_word: גֶּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Guézer
  lexicon: nombre propio / transliteración estándar
  rationale: Se conserva el nombre propio del lugar. «Gezer» es transparente para lectores bíblicos en español y evita una forma menos establecida.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno rey
  lexicon: HALOT
  rationale: Se repite el mismo valor enumerativo del numeral para mantener la cadencia del registro y no introducir interpretaciones ajenas al texto.
