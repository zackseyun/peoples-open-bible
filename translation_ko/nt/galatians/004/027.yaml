  text: γέγραπται γάρ· Εὐφράνθητι, στεῖρα ἡ οὐ τίκτουσα, ῥῆξον καὶ βόησον, ἡ οὐκ ὠδίνουσα· ὅτι πολλὰ τὰ τέκνα τῆς ἐρήμου μᾶλλον ἢ τῆς ἐχούσης τὸν ἄνδρα.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/027.yaml
  text: 'For it is written: “Rejoice[a], barren woman who is not bearing children; break forth and cry out, you who are not in labor[c][b]; because the children of the desolate woman are more numerous than those of the woman who has a husband.”'
  footnotes:
  - marker: a
    text: Quotation from Isaiah 54:1.
    reason: cross_reference
  - marker: b
    text: Or “Be glad, barren woman who does not give birth … burst out and shout.”
    reason: lexical_alternative
  - marker: c
    text: “Desolate woman” renders a term that can also mean “deserted” or “forsaken” in this figurative context.
    reason: lexical_alternative
translation:
  language: ko
  text: 기록되었듯이, 「기뻐하라, 자식을 낳지 못한 잉태 못 한 여인이여. 환호하며 외치라, 산고를 겪어 본 적 없는 여인이여. 버림받은 여인의 자녀가 남편을 둔 여인의 자녀보다 많을 것이기 때문이다.」[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 54:1의 인용.
    reason: cross_reference
