  to: Él quita el entendimiento[b] de los jefes[a] del pueblo del país, y los hace vagar en un desierto sin camino[c].
  rationale: Se corrigen los anclajes de notas para que cada marcador corresponda a su referente real, se mejora la naturalidad de la frase nominal con «del país» según el contexto sociopolítico de הָאָרֶץ, y se sustituye «andar errantes» por «vagar» para un español más idiomático sin perder el matiz causativo.
