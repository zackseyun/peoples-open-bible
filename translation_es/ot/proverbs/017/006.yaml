translation:
  language: es
  text: Los nietos son la corona de los ancianos[a][b], y la gloria de los hijos son sus padres varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijos de hijos».
    reason: lexical_alternative
  - marker: b
    text: Aquí «ancianos» se refiere a personas de edad avanzada, no necesariamente a dirigentes de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - aderezo
  - honor
  lexicon: HALOT
  rationale: עֲטֶרֶת designa una corona o algo circular puesto como símbolo de honra. «Corona» es el equivalente natural en español y conserva la imagen de distinción y honor del proverbio.
- source_word: זְקֵנִים
  english_pob_choice: the aged
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  - los ancianos de la comunidad
  lexicon: HALOT
  rationale: El hebreo se refiere a personas de edad avanzada, no a un cargo de liderazgo. «Los ancianos» comunica edad y mantiene la concisión proverbial sin imponer la idea de un oficio eclesial o comunitario.
- source_word: בְּנֵי בָנִים
  english_pob_choice: Grandchildren
  chosen_spanish: los nietos
  alternatives_spanish:
  - hijos de hijos
  - los hijos de sus hijos
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente «hijos de hijos», pero en uso idiomático corresponde a «nietos». En español, «nietos» es la equivalencia más natural y conserva el sentido relacional del texto.
- source_word: תִפְאֶרֶת
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - la hermosura
  - el honor
  lexicon: HALOT
  rationale: תִפְאֶרֶת expresa gloria, esplendor u honor. «La gloria» mantiene el paralelismo con «corona» y el tono elevado del proverbio.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los hijos varones
  lexicon: HALOT
  rationale: Aunque el sustantivo es masculino plural, aquí funciona como término familiar general. «Los hijos» preserva el paralelismo con «sus padres» y es idiomático en español bíblico sin necesidad de ampliar a «niños».
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus padres varones
  - sus antepasados
  - sus padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». En español, «sus padres» comunica con naturalidad la relación filial del paralelismo. Se evita «antepasados» porque desplazaría el sentido hacia una referencia más amplia que la del hebreo.
theological_decisions:
- issue: Términos familiares masculinos en un proverbio general
  english_pob_reading: Render בָּנִים as 'children' but retain אֲבוֹתָם as 'their fathers.'
  chosen_spanish_reading: Traducir בָּנִים como «los hijos» y אֲבוֹתָם como «sus padres», manteniendo el vínculo familiar concreto del proverbio.
  alternative_spanish_readings:
  - 'Traducir ambos de forma más masculina: «los hijos» y «sus padres»'
  - Generalizar a «los descendientes» y «los progenitores»
  rationale: El proverbio presenta honor entre generaciones de la familia. En español, «los hijos» funciona como plural familiar general en este contexto, y «sus padres» refleja con claridad la relación del paralelismo. No se debe diluir la especificidad del hebreo con términos más abstractos como «progenitores».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Posible ambigüedad de זְקֵנִים
  english_pob_reading: the aged, not necessarily community elders
  chosen_spanish_reading: «los ancianos» como personas de edad avanzada, no como oficio eclesial o comunitario.
  alternative_spanish_readings:
  - «los viejos»
  - «los mayores»
  - «los ancianos de la comunidad»
  rationale: En español, «ancianos» puede referirse naturalmente a personas mayores. El contexto proverbial excluye la idea técnica de cargo. Esta opción mantiene dignidad y evita una lectura institucional no presente en el hebreo.
  doctrine_reference: DOCTRINE.md §Lexical fidelity and contextual sense
translation_notes:
  revision_awareness: 'Revisión en alta concordancia con el control cruzado: no se reportaron cambios necesarios y la lectura final permanece estable respecto al texto fuente y al audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial con una estructura breve y equilibrada.
  - Se evitó «SEÑOR» u այլ masking convention porque no hay el divino nombre en este versículo.
  - «Corona» y «gloria» conservan la imaginería honorífica del hebreo.
  - «Los hijos» y «sus padres» reflejan el campo familiar concreto sin introducir generalizaciones ajenas al texto.
