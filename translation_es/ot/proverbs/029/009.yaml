base_translation:
  language: en
  yaml_path: translation/ot/proverbs/029/009.yaml
  text: If a wise man has a dispute with a foolish man[a], whether he rages or laughs[b], there is no rest.
  footnotes:
  - marker: a
    text: Or, 'If a wise man contends with a fool, the fool may rage or laugh, but there is no rest.' The Hebrew does not explicitly identify whether the one raging/laughing is the wise man or the fool; context favors the fool for many interpreters.
    reason: alternative_reading
  - marker: b
    text: '''Laughs'' may carry the sense of derisive laughter or scoffing in context.'
    reason: lexical_alternative
