    rationale: El hebreo y el POB inglés apuntan a «excepto los más pobres del pueblo de la tierra». La redacción actual es comprensible, pero menos ceñida a la construcción fuente.
  - severity: low
    issue: La nota [b] no es necesaria si la traducción principal ya expresa bien el sentido.
    rationale: La nota actual sobre la pobreza/vulnerabilidad repite en gran medida lo que puede decirse con claridad en el texto principal. En cambio, la nota realmente necesaria es la de «herreros».
