  - hijo de
  lexicon: HALOT
  rationale: En una genealogía, בֶּן indica descendencia directa. En español, repetir «el hijo de» conserva la estructura genealógica del hebreo y mantiene la claridad en una cadena de nombres propios.
- source_word: ציף
  english_pob_choice: Ziph
  chosen_spanish: Zif
  alternatives_spanish:
  - Ziph
  lexicon: transliteración de nombre propio
  rationale: Es un nombre propio. Se adapta a la ortografía española usual con «Zif», manteniendo la transliteración del hebreo sin traducir el nombre.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elkaná
  - Elcana
  lexicon: transliteración de nombre propio
  rationale: Nombre propio hebreo; se conserva mediante transliteración en forma española naturalizada, con acento gráfico para respetar la pronunciación española.
- source_word: מַחַת
  english_pob_choice: Mahath
  chosen_spanish: Mahat
  alternatives_spanish:
  - Mahath
  lexicon: transliteración de nombre propio
  rationale: Nombre propio; se translitera sin añadir significado que el texto no da. La forma «Mahat» evita una h aspirada ajena al español.
- source_word: עֲמָשָׂי
  english_pob_choice: Amasai
  chosen_spanish: Amasai
  alternatives_spanish:
  - Amasay
  - Amasái
  lexicon: transliteración de nombre propio
  rationale: Nombre propio hebreo transmitido por transliteración. Se conserva la forma más reconocible y estable en español bíblico.
