review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: «lo que quede» para וְהַנּוֹתֶרֶת, la asignación a Aarón y sus hijos, y «una porción santísima» para קֹדֶשׁ קָדָשִׁים. También preserva correctamente «Yahvé» para יְהוָה. Sin embargo, la renderización de מֵאִשֵּׁי יְהוָה como «de las ofrendas encendidas de Yahvé» no refleja con suficiente fidelidad la decisión auditada de POB («food offerings») ni produce un español natural para el término técnico sacrificial.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ofrendas encendidas» suena poco idiomático y ambiguo. Además, el texto principal debería reflejar mejor la categoría cultual con una formulación natural como «ofrendas de alimento», manteniendo en nota la alternativa tradicional relacionada con fuego. El resto del versículo es legible y adecuado.
  glossary_alignment: 'Alinea bien con el glosario en «Yahvé», «Aarón», «hijos» y la categoría de santidad. La principal desviación está en אִשֵּׁי: el inglés POB documentó como elección principal «food offerings», con alternativas de fuego en nota; el español invirtió esa prioridad. Conviene ajustar el texto principal a «ofrendas de alimento» y conservar en nota «ofrendas por fuego / hechas por fuego».'
  issues:
  - severity: medium
    issue: «de las ofrendas encendidas de Yahvé» es una expresión poco natural en español
    rationale: Aunque intenta conservar la relación con el fuego, «encendidas» no funciona bien como término técnico sacrificial y puede sugerir simplemente que algo está prendido o iluminado.
  - severity: medium
    issue: La prioridad léxica de אִשֵּׁי יְהוָה no sigue la decisión principal auditada en inglés
    rationale: La POB inglesa escogió «food offerings» como texto principal y relegó «offerings by fire / fire offerings» a nota. El español debería reflejar esa misma jerarquía salvo razón fuerte, que aquí no se justifica suficientemente.
  - severity: low
    issue: La nota a sobre «oblación» introduce una alternativa menos apoyada por la decisión principal
    rationale: No es incorrecta, pero «oblación» puede sonar más tradicional y menos transparente. Puede conservarse como alternativa secundaria si se desea, sin problema mayor.
  revised_spanish_text: 'Y lo que quede de la ofrenda de cereal[a] será para Aarón y para sus hijos: una porción santísima, de las ofrendas de alimento[b] de Yahvé.'
  revised_footnotes:
  - marker: a
    text: O, «de la ofrenda de grano»; también puede entenderse como «de la oblación».
    reason: lexical_alternative
  - marker: b
    text: O, «de las ofrendas por fuego de Yahvé» o «de las ofrendas hechas por fuego de Yahvé».
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la expresión final para alinear el español con la decisión principal documentada en la POB inglesa para אִשֵּׁי יְהוָה y mejorar la naturalidad en español. «Ofrendas de alimento» comunica mejor la categoría cultual en el texto principal, mientras la nota conserva las alternativas relacionadas con fuego ya auditadas.
