  to: Y Bezalel, Oholiab[a], y todo hombre hábil, en quienes[b] Yahvé ha puesto sabiduría y entendimiento para saber hacer toda la obra del servicio del santuario[c], harán conforme a todo lo que Yahvé ha mandado.
  rationale: Se corrige la concordancia de la relativa a 'en quienes' para que el español sea natural y para reflejar mejor el plural colectivo del hebreo. También se repara la nota c para que presente una alternativa real, en vez de repetir el texto principal. El resto del versículo se mantiene por su buena fidelidad al original y al expediente POB.
