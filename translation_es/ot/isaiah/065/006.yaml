    text: 'O: «queda escrito delante de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en su seno». La imagen hebrea es la de una retribución devuelta directamente a la persona.'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal a «retribuiré» para reflejar mejor la compensación judicial del hebreo sin restringirla a dinero, y se cambia «seno» por «regazo» para conservar de forma más natural y clara la imagen de חֵיק en español contemporáneo. También se ajusta la nota [a] para que ofrezca una alternativa real, en línea con la auditoría inglesa.
