theological_decisions:
- issue: Interpretation of πόθεν ἐστέ in relation to family identity
  chosen_reading: Rendered as 'from whom you come' to stress ancestry rather than geographic origin.
  alternative_readings:
  - '''where you are from'''
  rationale: In the immediate context of martyrdom and appeal to paternal example, the speaker is urging remembrance of lineage and family honor, not hometown or region.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of σφαγιασθῆναι
  chosen_reading: Rendered with the stronger 'to be slaughtered.'
  alternative_readings:
  - '''to be slain'''
  rationale: The Greek verb is stronger than a generic term for death and suits the martyrdom context without importing additional sacrificial theology beyond the lexical force of the word.
  doctrine_reference: Translation philosophy §1, §6
