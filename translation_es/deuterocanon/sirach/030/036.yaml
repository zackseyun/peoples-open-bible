lexical_decisions:
- source_word: ἔμβαλε
  english_pob_choice: Put
  chosen_spanish: Ponlo
  alternatives_spanish:
  - Mételo
  - Colócalo
  - Pónselo a trabajar
  lexicon: LSJ
  rationale: El imperativo aoristo de ἐμβάλλω funciona aquí de manera idiomática como ‘poner’ o ‘meter’ a alguien en una actividad. ‘Ponlo’ conserva el mandato directo sin volverlo áspero en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: LSJ
  rationale: El pronombre griego es masculino singular y objeto directo. En español, ‘lo’ mantiene la referencia personal y la función sintáctica con naturalidad.
- source_word: εἰς ἐργασίαν
  english_pob_choice: to work
  chosen_spanish: a trabajar
  alternatives_spanish:
  - al trabajo
  - en labor
  - a laborar
  lexicon: LSJ
  rationale: La construcción expresa introducir a alguien en una actividad productiva. ‘A trabajar’ es la forma más natural y clara en español para este uso, sin perder el valor de trabajo/labor.
- source_word: ἀργῇ
  english_pob_choice: be idle
  chosen_spanish: esté ocioso
  alternatives_spanish:
  - esté inactivo
  - no sea perezoso
  - permanezca ocioso
  lexicon: LSJ
  rationale: ἀργῇ denota estar ocioso o inactivo. ‘Ocioso’ preserva el sentido básico sin moralizar más de lo que exige el griego; ‘perezoso’ sería más interpretativo.
translation_notes:
  revision_awareness: 'El texto griego es breve y coincide plenamente con la línea general de la POB inglesa: mandato directo seguido de una cláusula de propósito negativa. No se detectan revisiones aplicadas en el audit trail; por eso la redacción española sigue de cerca la estructura del original y conserva la alternativa formal en nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como terminología por defecto del proyecto, pero este versículo no contiene el Tetragrámaton ni una referencia divina.
  - Se prefirió ‘ocioso’ frente a ‘perezoso’ para evitar una carga moral no explicitada por ἀργῇ.
  - La nota conserva una alternativa más formal sin desplazar la lectura principal.
