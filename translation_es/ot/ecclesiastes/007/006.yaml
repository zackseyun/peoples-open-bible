  rationale: Se ajusta la imagen a un español más natural y preciso para el material combustible («espinos»), se usa «necio» como equivalente sapiencial más estándar de כְּסִיל, y se mejora ligeramente el flujo final con «esto también». Se mantiene «vapor» conforme a la decisión léxica auditada.
