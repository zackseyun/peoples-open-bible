    text: El hebreo usa un participio que expresa una acción inminente; puede entenderse como «están cruzando» o «están por cruzar».
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad principal del borrador, pero se corrige «hacia» por «a» para reflejar mejor el destino definido del hebreo en este contexto de cruce hacia entrada en Canaán. Se elimina la nota sobre «el Jordán» por ser innecesaria en español y no corresponder a una ambigüedad relevante preservada por el POB inglés.
