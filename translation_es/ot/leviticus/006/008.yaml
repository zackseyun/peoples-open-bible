base_translation:
  language: en
  yaml_path: translation/ot/leviticus/006/008.yaml
  text: And he shall take up from it a handful of the fine flour of the grain offering and some of its oil[a], with all the frankincense that is on the grain offering[b], and he shall burn its memorial portion on the altar as a pleasing aroma to Yahweh.
