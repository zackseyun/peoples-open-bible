    issue: Falta una nota para el modismo ‘su sangre ... sobre’
    rationale: El English POB conserva una nota explícita para ‘their blood be laid on’ como modismo de culpa/responsabilidad por derramamiento de sangre. En español, esa explicación sigue siendo necesaria para preservar el razonamiento léxico-teológico documentado.
  - severity: low
