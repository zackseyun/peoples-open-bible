translation:
  language: es
  text: Entonces se acercaron y los llevaron en sus túnicas[a] fuera del campamento, tal como había dicho Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En sus túnicas» sigue de cerca el hebreo. La preposición בְּ también puede entenderse de manera instrumental; por eso podría traducirse «por sus túnicas» o «por medio de sus túnicas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  english_pob_choice: they came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se llegaron
  lexicon: HALOT
  rationale: El qal wayyiqtol de קרב expresa movimiento hacia algo. «Se acercaron» conserva el valor direccional y suena natural en español, sin añadir matices rituales no explicitados en el hebreo.
- source_word: וַיִּשָּׂאֻם
  english_pob_choice: carried them
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los cargaron
  - los alzaron
  lexicon: HALOT
  rationale: נשׂא con sufijo pronominal de 3mp indica que transportaron los cuerpos. «Los llevaron» comunica bien la acción de traslado; «cargaron» puede funcionar, pero en español sugiere más el esfuerzo físico que el acto de remoción del lugar.
- source_word: בְּכֻתֳּנֹתָם
  english_pob_choice: in their tunics
  chosen_spanish: en sus túnicas
  alternatives_spanish:
  - por sus túnicas
  - tomándolos por sus túnicas
  lexicon: HALOT
  rationale: כֻּתֹּנֶת se traduce mejor como «túnica» que como «manto» o «ropa» general. La preposición ב puede ser instrumental o circunstancial; «en sus túnicas» mantiene la cercanía al hebreo y deja abierta la posibilidad de que fueran llevados mediante o con sus túnicas.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: to outside the camp
  chosen_spanish: hasta afuera del campamento
  alternatives_spanish:
  - a afuera del campamento
  - fuera del campamento
  lexicon: HALOT
  rationale: El hebreo combina dirección (אֶל) con ubicación exterior (מִחוּץ). «Hasta afuera del campamento» conserva la fuerza de desplazamiento mejor que un simple «fuera del campamento».
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  english_pob_choice: just as Moses had said
  chosen_spanish: tal como había dicho Moisés
  alternatives_spanish:
  - como había hablado Moisés
  - según había dicho Moisés
  lexicon: HALOT
  rationale: La cláusula remite a la instrucción previa de Moisés. «Tal como había dicho Moisés» expresa bien la correspondencia y el orden temporal indicado por el inglés auditado.
translation_notes:
  revision_awareness: La revisión más reciente del pasaje quedó sin cambios y el control cruzado informó alta concordancia; por eso se mantiene una solución muy cercana al audit trail inglés, con ajuste natural de estilo español.
  spanish_consistency_notes:
  - Se conserva «Moisés» como nombre propio, no se requiere término teológico especial en este versículo.
  - «Campamento» traduce מַחֲנֶה de manera uniforme y clara para lectura bíblica contemporánea.
  - No se introducen notas doctrinales porque el versículo es narrativo y no presenta tensión teológica textual relevante.
