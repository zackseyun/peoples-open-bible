translation:
  language: es
  text: Has caído en una trampa[a] por las palabras de tu boca[b]; has sido atrapado por las palabras de tu boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has quedado atrapado». El perfecto hebreo puede expresar aquí un estado resultante presente.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu boca». Se conserva la expresión concreta del hebreo, donde «boca» representa las palabras dichas, para mantener el paralelismo proverbial.
    reason: source_note
lexical_decisions:
- source_word: נוֹקַשְׁתָּ
  english_pob_choice: you have been snared
  chosen_spanish: has sido atrapado
  alternatives_spanish:
  - has sido enredado
  - has sido cazado
  lexicon: HALOT
  rationale: El verbo hebreo en nifal expresa quedar atrapado en una trampa. En español, «atrapado» comunica bien esa idea sin volverla extraña; «enredado» debilita la imagen de trampa y «cazado» suena menos natural en este contexto proverbial.
- source_word: בְאִמְרֵי
  english_pob_choice: by the words of
  chosen_spanish: por las palabras de
  alternatives_spanish:
  - mediante las palabras de
  - con las palabras de
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental/causal. «Por» expresa con naturalidad el medio o la causa en español y conserva el sentido de que las propias palabras son el instrumento del daño.
- source_word: פִיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu habla
  - tu decir
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto «boca», porque el texto dice literalmente «tu boca» y el paralelismo del versículo se apoya en esa expresión física para referirse a las palabras dichas.
- source_word: נִלְכַּדְתָּ
  english_pob_choice: you have been caught
  chosen_spanish: has sido capturado
  alternatives_spanish:
  - has sido apresado
  - has sido tomado
  lexicon: HALOT
  rationale: El nifal de לכד significa quedar capturado o tomado. «Capturado» mantiene el segundo miembro paralelo con un matiz algo más fuerte y complementa bien «atrapado» sin introducir una diferencia ajena al hebreo.
translation_notes:
  revision_awareness: 'El pasaje presenta un paralelismo sinónimo muy estable: dos verbos en perfecto nifal con el mismo complemento instrumental «por las palabras de tu boca». La revisión más reciente indicó que no hacían falta cambios; por eso la redacción española sigue de cerca la imagen hebrea y la lectura óptica ya validada.'
  spanish_consistency_notes:
  - Se mantiene «boca» y no se sustituye por «habla» para respetar la concreción del hebreo.
  - Se usa «atrapado/capturado» en lugar de «snared/caught» calco, pero con el mismo contraste paralelo del original.
  - Se conserva el perfecto compuesto español para reflejar el valor de estado resultante del perfecto hebreo, compatible con lectura de presente-resultativo.
