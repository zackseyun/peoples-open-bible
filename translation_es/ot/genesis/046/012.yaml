revisions:
- from: Y los hijos de Judá fueron Er[a], Onán, Sela, Pérez y Zéraj. Pero Er y Onán murieron en la tierra de Canaán. Y los hijos de Pérez fueron Jesrón y Jamul.
  to: Y los hijos de Judá fueron Er[a], Onán, Sela, Fares y Zéraj. Y Er y Onán murieron en la tierra de Canaán. Y los hijos de Fares fueron Hezrón y Hamul.
  rationale: 'Se conservó el contenido y la nota gramatical del POB, pero se normalizaron los nombres propios a formas españolas más reconocibles y adecuadas para una Biblia de lectura amplia: «Fares», «Hezrón» y «Hamul». También se sustituyó «Pero» por «Y» para reflejar mejor la coordinación simple del hebreo. No se requieren cambios doctrinales ni adjudicación adicional.'
  reviewer_model: gpt-5.4
