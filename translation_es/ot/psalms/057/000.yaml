translation:
  language: es
  text: 'Para el director del coro: «No destruyas»[a]. De David. Mictam[b], cuando huyó de Saúl, en la cueva.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente un nombre de melodía o estribillo: «No destruyas».'
    reason: alternative_reading
  - marker: b
    text: El significado de «mictam» es incierto; por eso se translitera en vez de traducirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el músico principal
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala una dirección musical o litúrgica. «Director del coro» comunica bien la función sin forzar una explicación más específica de la que da el hebreo.
- source_word: אַל־תַּשְׁחֵת
  english_pob_choice: “Do Not Destroy”
  chosen_spanish: «No destruyas»
  alternatives_spanish:
  - «No destruyas»
  - «No destruyas» como posible nombre de melodía
  lexicon: HALOT
  rationale: Como en el inglés POB, conservo la expresión entre comillas para señalar que probablemente funciona como título, lema o nombre de melodía, no como mandato dentro del poema. En español, la forma natural e imperativa es «No destruyas».
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición hebrea permite varias relaciones (autoría, dedicación o asociación). «De David» preserva esa ambigüedad de modo transparente.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Mictam
  alternatives_spanish:
  - Un mictam
  - Un poema
  lexicon: HALOT
  rationale: El significado del término es incierto; por eso se translitera. En español, «Mictam» mantiene la misma transparencia auditiva que el inglés POB y evita inventar un sentido no seguro.
- source_word: בְּבָרְחוֹ
  english_pob_choice: when he fled
  chosen_spanish: cuando huyó
  alternatives_spanish:
  - cuando escapó
  - al huir
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad en español con «cuando huyó». «Escapó» sería posible, pero «huyó» sigue más de cerca el valor básico del verbo.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de delante de
  - de la presencia de
  lexicon: HALOT
  rationale: Aunque literalmente el hebreo sugiere «de delante de», en este contexto la preposición se entiende como origen/separación. «De Saúl» es más claro y evita una calca innecesaria.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del nombre propio.
- source_word: בַּמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - dentro de la cueva
  lexicon: HALOT
  rationale: La locución indica ubicación; «en la cueva» reproduce el sentido de manera natural y fiel.
theological_decisions:
- issue: Naturaleza del versículo como encabezado
  english_pob_reading: Translate the entire verse as a psalm superscription rather than as part of the poetic body.
  chosen_spanish_reading: Tratar todo el versículo como encabezado del salmo, no como parte del cuerpo poético.
  alternative_spanish_readings:
  - Integrar parte del contenido como si fuera verso poético
  - Dejarlo sin formato de encabezado
  rationale: 'El hebreo presenta elementos convencionales de superscripción: indicación musical, posible título de melodía, atribución davídica, término de género y nota histórica. Presentarlo como encabezado respeta su función literaria.'
  doctrine_reference: Principio de forma literaria del texto; preservar la función original del encabezado
- issue: Tratamiento de la expresión incierta מִכְתָּם
  english_pob_reading: Preserve as transliteration 'miktam.'
  chosen_spanish_reading: Preservar como transliteración «Mictam».
  alternative_spanish_readings:
  - Traducirlo como «salmo»
  - Intentar una glosa interpretativa
  rationale: Como el sentido del término es incierto, la transliteración evita imponer una interpretación especulativa. Esto preserva la tensión lexical documentada por la tradición de traducción del POB.
  doctrine_reference: Primacía del idioma original y preservación de la incertidumbre léxica
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente añadió una coma antes de «in the cave» para reflejar con mayor claridad la frase hebrea. En español, la pausa natural queda reflejada con comas: «cuando huyó de Saúl, en la cueva».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se conserva la transliteración «Mictam» por la incertidumbre del término, en línea con el POB inglés.
  - Se usa «Saúl» con la ortografía castellana estándar.
  - El encabezado se puntúa como una superscripción separada del cuerpo del salmo, siguiendo la función literaria del hebreo.
