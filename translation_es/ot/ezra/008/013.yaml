translation:
  language: es
  text: 'Y de los hijos de Adonicam[a], los últimos, y estos eran sus nombres: Elifelet, Jeiel y Semaías, y con ellos, sesenta varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los postreros» o «los últimos». El hebreo probablemente identifica aquí al grupo final de la línea de Adonicam, quizá en distinción de un grupo anterior mencionado en otro lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede funcionar como fórmula de pertenencia a una línea familiar. «Hijos de» preserva la forma hebrea y la estructura del listado, con naturalidad en español bíblico contemporáneo.
- source_word: אֲדֹנִיקָם
  english_pob_choice: Adonikam
  chosen_spanish: Adonicam
  alternatives_spanish:
  - Adonikam
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado. Se ajusta la grafía al español con c/k según uso editorial, sin traducir el nombre.
- source_word: אַחֲרֹנִים
  english_pob_choice: the last ones
  chosen_spanish: los últimos
  alternatives_spanish:
  - los postreros
  - los últimos entre ellos
  - los últimos de la línea
  lexicon: HALOT
  rationale: El adjetivo puede significar «últimos, posteriores, postreros». «Los últimos» conserva la fuerza adjetival y deja abierta la posible referencia a un grupo final de la línea de Adonicam.
- source_word: וְאֵלֶּה שְׁמוֹתָם
  english_pob_choice: and these were their names
  chosen_spanish: y estos fueron sus nombres
  alternatives_spanish:
  - y estos son sus nombres
  - y estos sus nombres
  lexicon: HALOT
  rationale: Fórmula introductoria de lista. En español narrativo, el pretérito «fueron» fluye con naturalidad y reproduce el valor de introducción de la enumeración.
- source_word: אֱלִיפֶלֶט
  english_pob_choice: Eliphelet
  chosen_spanish: Elifelet
  alternatives_spanish:
  - Eliphelet
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado. La forma española usual simplifica la secuencia consonántica sin alterar la identificación del nombre.
- source_word: יְעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Yeiel
  - Jieiel
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado según convención bíblica española establecida.
- source_word: וּשְׁמַעְיָה
  english_pob_choice: and Shemaiah
  chosen_spanish: y Semaías
  alternatives_spanish:
  - y Shemaías
  - y Samaías
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado. Se prefiere la forma española tradicionalmente reconocible «Semaías», inteligible y consistente con el registro bíblico en español.
- source_word: וְעִמָּהֶם
  english_pob_choice: and with them
  chosen_spanish: y con ellos
  alternatives_spanish:
  - con ellos
  - y junto con ellos
  lexicon: HALOT
  rationale: עִם con sufijo pronominal expresa compañía. «Con ellos» es la equivalencia directa; se conserva la coordinación inicial para reflejar el ritmo del hebreo y de la versión inglesa auditada.
- source_word: שִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - '60'
  lexicon: HALOT
  rationale: Número cardinal directo; no requiere adaptación.
- source_word: הַזְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: זְכָרִים señala sexo masculino. En español, «varones» preserva el valor de personas masculinas con un registro bíblico claro y evita la ambigüedad de «hombres» como término genérico.
theological_decisions:
- issue: Sentido de אַחֲרֹנִים en el contexto de una lista genealógica
  english_pob_reading: the last ones, likely the final group from the line of Adonikam, possibly in distinction from an earlier group listed elsewhere
  chosen_spanish_reading: los últimos, probablemente el grupo final de la línea de Adonicam
  alternative_spanish_readings:
  - los postreros
  - los últimos entre ellos
  - el último grupo
  rationale: 'No se suaviza la tensión textual: el hebreo puede señalar tanto posterioridad temporal como una subdivisión final de la familia. «Los últimos» mantiene esa ambigüedad útil, sin imponer una explicación que el verso no explicita.'
  doctrine_reference: Ninguna; decisión de lectura histórica y lexical.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se preserva la estructura listal («y de... los últimos, y estos fueron sus nombres...») y se evita convertir la frase en una paráfrasis explicativa. La decisión de traducir אֲחֲרֹנִים como «los últimos» conserva la tensión lexical documentada por el POB inglés. También se mantuvo la nota alternativa al pie para reflejar la posible lectura comparativa con un grupo anterior.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «varones» para זְכָרִים por precisión de sexo masculino.
  - Los nombres propios se transliteran con formas de uso bíblico en español, evitando traducción o normalización doctrinal.
  - La puntuación sigue el flujo del listado hebreo y el audit trail inglés, con dos puntos evitados después de «los últimos» para no introducir una ruptura no presente en la revisión más reciente.
