translation:
  language: es
  text: y a asentar hijos extranjeros[a] en todos sus territorios, y a repartir su tierra por sorteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «extranjeros» o «hijos de extraños». El griego dice literalmente «hijos extranjeros».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικίσαι
  english_pob_choice: to settle
  chosen_spanish: establecer
  alternatives_spanish:
  - asentar
  - establecer como habitantes
  - hacer residir
  lexicon: LSJ
  rationale: 'El verbo griego expresa una acción causativa: poner a otros a vivir en un lugar conquistado. «Establecer» conserva esa fuerza sin sonar rebuscado; «asentar» también sería posible, pero «establecer» funciona bien en español bíblico contemporáneo.'
- source_word: υἱοὺς ἀλλοτρίους
  english_pob_choice: foreign sons
  chosen_spanish: hijos extranjeros
  alternatives_spanish:
  - forasteros
  - hijos de extraños
  - extranjeros
  lexicon: LSJ
  rationale: El griego dice literalmente «hijos extraños/extranjeros». Mantengo «hijos» para no borrar la forma masculina explícita del texto, y «extranjeros» comunica el sentido idiomático de personas ajenas al pueblo o al país.
- source_word: ἐν πᾶσι τοῖς ὁρίοις αὐτῶν
  english_pob_choice: throughout all their territories
  chosen_spanish: en todos sus territorios
  alternatives_spanish:
  - en todos sus límites
  - dentro de todas sus fronteras
  - a lo largo de todas sus regiones
  lexicon: LSJ
  rationale: Ὅρια puede significar límites, fronteras o territorios. Aquí no se trata solo de la línea fronteriza, sino del ámbito completo del dominio; por eso «territorios» transmite mejor el alcance.
- source_word: κατακληρονομῆσαι
  english_pob_choice: to distribute by lot
  chosen_spanish: repartir ... por sorteo
  alternatives_spanish:
  - distribuir por sorteo
  - repartir por herencia
  - parcelar por sorteo
  lexicon: LSJ
  rationale: El compuesto sugiere asignar como herencia, frecuentemente por sorteo. «Repartir por sorteo» conserva la idea de adjudicación y el elemento del sorteo sin introducir más interpretación de la necesaria.
- source_word: τὴν γῆν αὐτῶν
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  - la tierra de ellos
  lexicon: LSJ
  rationale: Γῆ puede ser tierra, país o territorio. «Su tierra» es directo y mantiene el valor concreto del objeto redistribuido.
theological_decisions:
- issue: Preservar la forma masculina explícita de υἱοὺς ἀλλοτρίους
  english_pob_reading: foreign sons
  chosen_spanish_reading: hijos extranjeros
  alternative_spanish_readings:
  - extranjeros
  - hijos de extraños
  rationale: 'No es un punto doctrinal, pero sí de fidelidad formal: el griego usa un sustantivo masculino plural («hijos»). La traducción mantiene esa marca y, a la vez, deja claro el sentido idiomático con «extranjeros».'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente. La única tensión relevante es la frase υἱοὺς ἀλλοτρίους, donde el inglés reciente opta por «foreigners» por naturalidad, mientras que la política del proyecto valora conservar la forma masculina del original; por eso el español mantiene «hijos extranjeros» y aclara la alternativa idiomática en nota.
  spanish_consistency_notes:
  - He evitado «SEÑOR» u otras sustituciones teológicas porque no aparece el nombre divino en este versículo.
  - «Sorteo» refleja mejor la adjudicación por lotes que un simple «división».
  - La puntuación reproduce dos miembros coordinados como en el griego, con un flujo natural en español.
