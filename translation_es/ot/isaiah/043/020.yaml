revisions:
- from: Las bestias del campo me honrarán[a], los chacales y las crías de avestruz[b], porque doy agua en el desierto, ríos en la tierra árida, para dar de beber a mi pueblo, mis escogidos[c].
  to: Las bestias del campo me honrarán, los chacales[a] y las avestruces[b], porque doy agua en el desierto, ríos en la tierra árida, para dar de beber a mi pueblo, mis escogidos[c].
