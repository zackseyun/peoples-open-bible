theological_decisions:
- issue: Whether the verse asks for the destruction of sins/sinfulness or of sinners themselves
  chosen_reading: The text speaks of sinners and the wicked being removed from the earth, not merely of sin in the abstract ending.
  alternative_readings:
  - May sins be consumed from the earth
  rationale: The Hebrew nouns חַטָּאִים and רְשָׁעִים are personal designations ('sinners,' 'wicked ones'), so the translation should not soften the imprecation into an abstract wish about sin alone. The jussive-like 'may' preserves the prayer/wish form without overstating it as a direct imperative to God.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
