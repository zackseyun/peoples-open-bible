translation:
  language: es
  text: Bendice a Dios, el gran Rey,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλόγει
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Alaba
  - Bendice con tu palabra
  lexicon: BDAG
  rationale: El imperativo singular de εὐλογέω conserva en español el verbo «bendecir» como equivalente bíblico directo. «Alaba» sería posible, pero estrecha el campo semántico y pierde la forma idiomática de hablar bien de Dios.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En español, el objeto directo definido se expresa de manera natural como «Dios»; «el Dios» suena forzado en este contexto y no aporta precisión adicional.
- source_word: τὸν βασιλέα
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: El título real en aposición a Dios se traduce con mayúscula reverencial como «el Rey», conservando su valor titular y su referencia divina en un registro bíblico natural.
- source_word: τὸν μέγαν
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - poderoso
  lexicon: BDAG
  rationale: «μέγας» significa primariamente «grande». En español, ante un sustantivo definido como «Rey», la forma apocopada «gran» es la más natural y solemne; «poderoso» introduciría un matiz no explícito en el griego.
theological_decisions:
- issue: Título regio aplicado a Dios
  english_pob_reading: the great King
  chosen_spanish_reading: el gran Rey
  alternative_spanish_readings:
  - el gran rey
  - el Rey grande
  rationale: El griego presenta a Dios con un título regio en aposición. «El gran Rey» mantiene esa designación exaltada sin añadir contenido doctrinal; la mayúscula en «Rey» señala que el título se aplica a Dios.
  doctrine_reference: 'DOCTRINE.md: Translate titles; readable modern Spanish'
translation_notes:
  revision_awareness: El texto inglés POB es muy breve y no incluye notas; la versión española sigue de cerca el griego y coincide con la decisión auditada de 'Bless God, the great King' sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se conserva el orden breve e imperativo del original.
  - Se usa «Dios» y «Rey» con mayúscula reverencial para reflejar el título divino.
  - No se añaden notas porque el pasaje no presenta variantes ni ambigüedad textual significativa en el paquete fuente.
