translation:
  language: es
  text: Una herencia para Israel, su siervo, porque su amor leal[a] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su misericordia», «su amor constante» o «su bondad». El hebreo חַסְדּוֹ alude con frecuencia al amor leal y pactual de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una posesión
  - un patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה designa una propiedad recibida por derecho de herencia o asignación. En español, «herencia» conserva bien la idea de bien asignado/recibido y suena natural en el registro bíblico.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  lexicon: HALOT
  rationale: El ל marca aquí al destinatario o beneficiario de la herencia. En español, «para Israel» expresa con naturalidad la relación de don sin perder el sentido dativo.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - su servidor
  lexicon: HALOT
  rationale: Aunque עבד puede referirse a esclavo o siervo, en este contexto funciona como designación pactual de Israel respecto de Dios. «Siervo» preserva esa relación reverente sin introducir una dureza que el contexto no enfatiza.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este estribillo, כִּי introduce la razón del agradecimiento. «Porque» comunica esa relación causal de manera clara en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La frase fija del salmo expresa duración perpetua. En español, «para siempre» reproduce de forma idiomática el valor temporal del hebreo.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su amor constante
  - su bondad
  lexicon: HALOT
  rationale: חֶסֶד/חַסְדּוֹ combina lealtad pactual, favor y amor comprometido. Aquí se eligió «misericordia» como término bíblico amplio y reconocible en español, manteniendo la resonancia litúrgica del estribillo; las alternativas muestran la tensión semántica que el término conserva.
theological_decisions:
- issue: Cómo expresar עַבְדּוֹ en relación con Israel y Dios
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  rationale: El hebreo presenta a Israel como perteneciente y al servicio de Dios en un marco pactual. «Siervo» respeta esa relación sin trasladar innecesariamente el matiz de servidumbre forzada que no domina aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento de términos de esclavitud/servicio en vocabulario contendido
- issue: Cómo traducir חַסְדּוֹ en el refrán
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su misericordia
  alternative_spanish_readings:
  - su amor leal
  - su amor constante
  - su bondad
  rationale: El salmo 136 repite una fórmula que celebra el carácter duradero y fiel de Yahvé. «Misericordia» es una opción española tradicional y plenamente bíblica, aunque deja abierta la tensión entre compasión, lealtad y amor pactal que el hebreo contiene; por eso se registran alternativas.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; חסד como término de fidelidad pactual
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «for Israel» a «to Israel» para reflejar mejor el dativo del hebreo. La redacción española sigue ese ajuste con «para Israel», y conserva la estructura del estribillo del Salmo 136 con una traducción idiomática y registrable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado para el nombre divino cuando aparezca; en este versículo no se explicita el tetragrámaton en la superficie del texto, pero la doxología del salmo presupone ese referente.
  - Se usa «siervo» y no «esclavo» en la línea principal por el valor pactual del hebreo עבד en este contexto.
  - El estribillo «para siempre» se conserva para לְעוֹלָם con naturalidad en español bíblico.
  - «Misericordia» se eligió por legibilidad y tradición, dejando constancia de la amplitud semántica de חֶסֶד.
