revisions:
- from: ¿Quién podrá sostenerse delante de su indignación? ¿Y quién podrá levantarse en el ardor de su ira? Su furor se derrama como fuego[a], y las rocas son despedazadas por él[b].
  to: ¿Quién podrá mantenerse en pie delante de su indignación[a]? ¿Y quién podrá levantarse en el ardor de su ira? Su furor se derrama como fuego, y las rocas[b] son despedazadas por él[c].
  rationale: 'Se ajusta «sostenerse» a «mantenerse en pie» para reflejar mejor יַעֲמוֹד y el paralelismo con «levantarse». Se elimina la nota no documentada sobre «la roca» y se reemplaza por notas alineadas con las alternativas auditadas en la POB inglesa: la reformulación alternativa de las preguntas, la posibilidad «peñascos/riscos» para הַצֻּרִים, y la ambigüedad de agencia/fuente en מִמֶּנּוּ.'
  reviewer_model: gpt-5.4
