revisions:
- from: 'Entonces la hija[a] de Faraón le dijo: «Lleva a este niño y críalo para mí, y yo te daré tu salario». Y la mujer tomó al niño y lo crió.'
  to: 'Entonces la hija de Faraón le dijo: «Lleva a este niño y amamántalo[a] para mí, y yo te daré tu salario». Y la mujer tomó al niño y lo amamantó.'
  rationale: Se reemplaza «criar» por «amamantar» en ambas ocurrencias para reflejar con precisión el verbo hebreo de lactancia y conservar la repetición léxica del original. Se reubica la nota al verbo correspondiente y se simplifica la alternativa española a una formulación idiomática y clara.
