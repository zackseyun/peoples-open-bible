  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: correspondencia de las piedras con los nombres de los hijos de Israel, número doce, distribución individual, y referencia a las doce tribus. Sin embargo, פִּתּוּחֵי חֹתָם describe el estilo de grabado de sello/signet, no un ''engaste''. Por eso esa frase no preserva con precisión la imagen artesanal del original ni la decisión léxica auditada en inglés.'
  spanish_quality_summary: El español es claro y legible en general. 'Y las piedras correspondían...' funciona bien, y 'cada una según su nombre' suena natural. La principal dificultad de calidad es 'talladas como engaste de sello', que resulta poco idiomático y semánticamente impreciso, porque 'engaste' remite a la montura de la piedra, no al tipo de grabado. También conviene alinear la nota explicativa con una formulación más natural en español.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Hijos de Israel' conserva bien בְּנֵי יִשְׂרָאֵל. No aparece vocabulario sensible como Yahvé/Mesías. La revisión propuesta solo ajusta la expresión de פִּתּוּחֵי חֹתָם a 'grabadas como sello'.
  issues:
  - severity: medium
    issue: '''engaste de sello'' traduce inadecuadamente פִּתּוּחֵי חֹתָם'
    rationale: El hebreo se refiere al modo de grabado, como inscripciones cortadas al estilo de un sello/signet. 'Engaste' en español suele significar la montura donde va puesta una piedra, no el grabado mismo.
  - severity: low
    issue: La nota [b] reproduce la imprecisión de la frase principal
    rationale: Si el texto principal se corrige a 'grabadas como sello', la nota debe explicar alternativas como 'grabados de sello' o 'inscripciones de sello', no 'engaste de sello'.
  revised_spanish_text: Y las piedras correspondían a los nombres de los hijos de Israel[a], doce según sus nombres, grabadas como sello[b], cada una según su nombre, para las doce tribus.
