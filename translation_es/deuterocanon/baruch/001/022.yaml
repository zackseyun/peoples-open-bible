review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: acción distributiva (''cada uno de nosotros''), salida/desviación (''ᾠχόμεθα''), orientación interior del corazón malo, servicio idolátrico a otros dioses y evaluación divina del mal cometido. Sin embargo, ''en la intención de su corazón malo'' suena poco natural en español y no reproduce con suficiente claridad el valor adverbial de ἐν διανοίᾳ; además, ''ante los ojos de Yahvé'' es comprensible pero menos idiomático que ''a los ojos de Yahvé'' para el modismo de evaluación moral.'
  spanish_quality_summary: El texto es mayormente fiel y digno, pero requiere un ajuste menor de naturalidad y precisión idiomática. 'Cada uno de nosotros se apartó' funciona, pero la secuencia mejora si se expresa 'según la intención de su corazón malo', que suena más natural y conserva el énfasis volitivo. También conviene 'a los ojos de Yahvé nuestro Dios' como español bíblico moderno más fluido que 'ante los ojos de'.
  glossary_alignment: 'La terminología del proyecto está bien respetada: ''Yahvé'' para κύριος en referencia al Dios de Israel, ''dioses'' para θεοῖς ἑτέροις, y no hay conflictos con otros términos doctrinales clave. La decisión de ''servir a otros dioses'' está correctamente alineada con la justificación léxica y teológica auditada.'
  issues:
  - severity: medium
    issue: Giro poco natural en 'en la intención de su corazón malo'
    rationale: Aunque semánticamente cercano, en español suena calcado del inglés/greigo. La frase griega funciona adverbialmente y queda mejor como 'según la intención de su corazón malo' o similar, preservando tanto interioridad como orientación de conducta.
  - severity: low
    issue: Modismo menos idiomático en 'ante los ojos de Yahvé nuestro Dios'
    rationale: El original usa un modismo de evaluación moral. En español bíblico general, 'a los ojos de Yahvé nuestro Dios' suena más natural que 'ante los ojos de', sin pérdida de sentido.
  revised_spanish_text: Y cada uno de nosotros se apartó según la intención de su corazón malo[a], para servir a otros dioses, para hacer el mal a los ojos de Yahvé nuestro Dios.
