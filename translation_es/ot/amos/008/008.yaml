review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura causal, el temblor de la tierra/territorio, el lamento de sus habitantes y la imagen del Nilo que sube y luego desciende. Sin embargo, hay dos desajustes menores pero reales: (1) la nota [a] está mal redactada y no preserva claramente la alternativa léxica ''land/earth''; (2) ''será arrastrada'' es aceptable, pero ''será llevada/impulsada'' se acerca mejor a ''be driven along'' sin sugerir tan fuertemente arrastre por fricción. Además, ''se hundirá'' puede sonar demasiado literal; ''bajará'' o ''descenderá'' reflejan mejor el retroceso del Nilo, aunque ''se hundirá'' sigue dentro del campo semántico.'
  spanish_quality_summary: El español es claro, digno y legible. La sintaxis interrogativa funciona bien y el registro es apropiado. La principal debilidad está en la nota [a], que actualmente repite 'la tierra' de forma confusa y poco útil. También conviene pulir levemente la imagen final para que suene más natural en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. אֶרֶץ como 'tierra' es defendible en el texto principal, siempre que la nota preserve la alternativa 'tierra/territorio' o mejor 'tierra/mundo' según el contraste contextual. 'Nilo' está bien resuelto y sigue la decisión del POB inglés.
  issues:
  - severity: medium
    issue: La nota [a] está defectuosa y confusa.
    rationale: 'Dice: "O ''la tierra'' en lugar de ''la tierra''...", lo cual no comunica ninguna alternativa real. Debe reflejar que אֶרֶץ puede significar ''tierra'', ''territorio'' o, mejor en relación con la nota inglesa, ''la tierra/el mundo'' frente a ''la tierra/el país/territorio''.'
  - severity: low
    issue: '''Será arrastrada'' intensifica un matiz no necesariamente exigido por el hebreo ni por la revisión inglesa ''be driven along''.'
    rationale: Aunque no es incorrecto, 'arrastrada' puede sugerir arrastre áspero o violento. 'Será impulsada' o 'será llevada' conservan mejor la idea de movimiento forzado dentro del símil hidráulico.
  - severity: low
    issue: '''Se hundirá'' puede sonar menos natural que un verbo de descenso o retroceso en esta imagen del Nilo.'
    rationale: La nota cultural explica crecida y descenso anual. 'Descenderá' o 'bajará' armonizan mejor con esa explicación y con el valor contextual de recesión.
  revised_spanish_text: Por causa de esto[a], ¿no temblará la tierra y se lamentará todo el que habita en ella? Toda ella subirá como el Nilo[b]; será impulsada y descenderá como el Nilo de Egipto.
  revised_footnotes:
  - marker: a
    text: O 'la tierra' en sentido más amplio, es decir, 'el mundo'. El hebreo אֶרֶץ puede referirse tanto a la tierra/territorio como a la tierra en sentido general; aquí se prefiere el sentido local porque el versículo se centra en el territorio juzgado y sus habitantes.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''como el Nilo ... como el Nilo de Egipto''. La imagen alude a la crecida y al descenso anual del Nilo, usada aquí como figura de una conmoción que lo invade todo.'
    reason: cultural_note
  revision_rationale: Se propone una revisión menor, no por un fallo grave del texto principal, sino para corregir una nota léxica claramente defectuosa y para afinar dos verbos del símil del Nilo hacia un español más natural y más cercano al razonamiento documentado por el POB inglés.
