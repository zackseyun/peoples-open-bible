translation:
  language: es
  text: Porque tú olvidarás tu miseria[a]; te acordarás de ella como aguas que han pasado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te acordarás de ella solo como aguas que han corrido pasto»; la imagen hebrea compara la miseria anterior con aguas ya pasadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la consecuencia o explicación de lo anterior; en español, «Porque» comunica mejor ese enlace causal-explicativo que «Pues» en registro bíblico moderno.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - vos
  lexicon: HALOT
  rationale: El hebreo enfatiza la segunda persona masculina singular; «tú» conserva la claridad y el énfasis personal sin añadir formalidad ajena al poema.
- source_word: עָמָל
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - aflicción
  - trabajo
  - pena
  lexicon: HALOT
  rationale: El sustantivo puede abarcar aflicción, fatiga o penuria; aquí, por el contraste con el recuerdo de aguas ya pasadas, «miseria» comunica mejor la experiencia de sufrimiento que se deja atrás. Se evita «trabajo» por estrecho y «aflicción» por menos natural en el ritmo español del verso.
- source_word: תִּשְׁכָּח
  english_pob_choice: will forget
  chosen_spanish: olvidarás
  alternatives_spanish:
  - olvidarás por completo
  - dejarás de recordar
  lexicon: HALOT
  rationale: El imperfecto qal en contexto futuro se expresa de manera directa con futuro simple en español.
- source_word: כְּ/מַיִם
  english_pob_choice: as waters
  chosen_spanish: como aguas
  alternatives_spanish:
  - como agua
  - cual aguas
  lexicon: HALOT
  rationale: Se conserva la comparación y el plural hebreo poético. «Aguas» suena natural en español bíblico y mantiene la imagen plural del original.
- source_word: עָבְרוּ
  english_pob_choice: have passed by
  chosen_spanish: han pasado
  alternatives_spanish:
  - han pasado de largo
  - han corrido
  - se han ido
  lexicon: HALOT
  rationale: El perfecto expresa una acción completada; «han pasado» conserva la idea de aguas ya ausentes sin sobreespecificar el movimiento.
- source_word: תִזְכֹּר
  english_pob_choice: will remember it
  chosen_spanish: te acordarás de ella
  alternatives_spanish:
  - lo recordarás
  - la recordarás
  lexicon: HALOT
  rationale: En español, «acordarse de» rinde con naturalidad el valor de recordar y permite retomar el antecedente femenino implícito («tu miseria») sin añadir un pronombre objeto extraño al verso.
theological_decisions:
- issue: El alcance de עָמָל en un contexto de sufrimiento humano
  english_pob_reading: misery
  chosen_spanish_reading: miseria
  alternative_spanish_readings:
  - aflicción
  - pena
  - trabajo
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica importante: el verso habla de la experiencia amarga que será dejada atrás. «Miseria» mantiene ese peso existencial y el contraste con aguas que ya pasaron.'
  doctrine_reference: Sabiduría poética / sufrimiento humano en Job
- issue: Imagen del recuerdo como algo ya ido
  english_pob_reading: you will remember it as waters that have passed by
  chosen_spanish_reading: te acordarás de ella como aguas que han pasado
  alternative_spanish_readings:
  - te acordarás de ella solo como aguas que han pasado
  - te acordarás de ella como aguas que se han ido
  rationale: 'Se conserva la comparación básica del hebreo sin forzar la adición «solo», que es una glosa interpretativa posible pero no obligatoria. La imagen queda abierta: el sufrimiento será recordado como algo ya pasado, no presente.'
  doctrine_reference: Poética hebrea / memoria del sufrimiento
translation_notes:
  revision_awareness: La traducción sigue de cerca el paquete fuente y el audit trail inglés, sin cambios respecto a la lectura aprobada. Se mantiene la imagen poética del agua ya pasada y se ajusta la sintaxis al español natural.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no aplicable aquí; no hay sustitución de términos divinos en este versículo.
  - Se mantiene el registro poético bíblico con vocabulario transparente y sin arcaísmos innecesarios.
  - La comparación con «aguas» respeta el plural hebreo y la imagen literaria del texto.
  - El pronombre implícito de segunda persona se explicita con «tú» para reflejar el énfasis del hebreo.
