base_translation:
  language: en
  yaml_path: translation/ot/genesis/038/014.yaml
  text: So she took off her widow’s garments[a], covered herself with a veil, wrapped herself up, and sat at the entrance of Enaim, which is on the road to Timnah. For she saw that Shelah had grown up[b], yet she had not been given to him as a wife.
  footnotes:
  - marker: a
    text: Enaim may reflect a place-name; the Hebrew form can also be understood more literally as 'eyes' or possibly 'springs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'covered herself with a veil, wrapped herself up'.
    reason: previous_rendering
