translation:
  language: es
  text: 'Cuando yo diga al justo: «Ciertamente vivirá», y él confíe en su justicia y cometa injusticia, ninguno de sus actos justos[a] será recordado, sino que por la injusticia que ha hecho morirá[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas sus justicias no serán recordadas». El plural hebreo puede referirse colectivamente a sus actos justos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en ella morirá» o «por ella morirá», refiriéndose a la injusticia que ha hecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  english_pob_choice: When I say
  chosen_spanish: Cuando yo diga
  alternatives_spanish:
  - Cuando yo declare
  - Al decir yo
  lexicon: HALOT
  rationale: La forma hebrea introduce una cláusula temporal en primera persona divina. «Cuando yo diga» conserva el valor temporal y la voz directa de Yahvé, con un español natural y solemne.
- source_word: לַצַּדִּיק
  english_pob_choice: to the righteous man
  chosen_spanish: al justo
  alternatives_spanish:
  - al justo varón
  - a la persona justa
  lexicon: HALOT
  rationale: צַדִּיק se refiere a una persona justa. En español, «justo» comunica mejor la categoría moral sin cargar innecesariamente el texto con «varón», aunque el masculino singular del hebreo queda representado en el referente genérico del sustantivo.
- source_word: חָיֹה יִחְיֶה
  english_pob_choice: He shall surely live
  chosen_spanish: Ciertamente vivirá
  alternatives_spanish:
  - Sin duda vivirá
  - Vivirá de seguro
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la afirmación. «Ciertamente vivirá» preserva esa fuerza enfática en un español claro y reverente.
- source_word: בָטַח עַל צִדְקָתוֹ
  english_pob_choice: he trusts in his righteousness
  chosen_spanish: confía en su justicia
  alternatives_spanish:
  - se apoya en su justicia
  - pone su confianza en su justicia
  lexicon: HALOT
  rationale: בָטַח עַל expresa depender o confiar en algo. «Confía en su justicia» mantiene la idea de apoyo mal fundado y conserva el eco jurídico-moral de δικαιοσύνη/צדקה como «justicia».
- source_word: וְעָשָׂה עָוֶל
  english_pob_choice: and does injustice
  chosen_spanish: y hace injusticia
  alternatives_spanish:
  - y comete injusticia
  - y obra mal
  lexicon: HALOT
  rationale: עָוֶל se refiere a injusticia, daño o perversidad. Se conserva «injusticia» para mantener la correspondencia con el sustantivo repetido más adelante en el versículo.
- source_word: כָּל צִדְקֹתָו
  english_pob_choice: none of his righteous deeds
  chosen_spanish: ninguno de sus hechos justos
  alternatives_spanish:
  - ninguna de sus justicias
  - ninguna de sus obras justas
  lexicon: HALOT
  rationale: El plural hebreo puede referirse a actos justos concretos. En español, bajo negación, «ninguno de sus hechos justos» preserva el valor colectivo sin forzar un abstracto poco natural; la nota recoge la alternativa literal de «todas sus justicias».
- source_word: לֹא תִזָּכַרְנָה
  english_pob_choice: will be remembered
  chosen_spanish: será recordado
  alternatives_spanish:
  - serán recordados
  - no vendrá a memoria
  lexicon: HALOT
  rationale: 'El nifal de זכר es pasivo/reflexivo: «ser recordado». Aunque el hebreo es plural, el referente español puede expresarse de modo colectivo con «ninguno de sus hechos justos será recordado» para evitar una frase más dura o menos idiomática; la pluralidad queda explicada en la nota.'
- source_word: וּבְעַוְלוֹ אֲשֶׁר עָשָׂה
  english_pob_choice: but by the injustice that he has done
  chosen_spanish: sino que por la injusticia que ha hecho
  alternatives_spanish:
  - sino por la injusticia que ha cometido
  - sino que en la injusticia que ha hecho
  lexicon: HALOT
  rationale: La frase indica la esfera o base de su muerte. «Por la injusticia que ha hecho» mantiene el vínculo léxico con עָוֶל y el valor causal/instrumental que la POB también preserva, sin añadir más interpretación de la necesaria.
- source_word: יָמוּת
  english_pob_choice: he shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - de seguro morirá
  lexicon: HALOT
  rationale: El imperfecto de מות se vierte de manera directa. «Morirá» conserva el tono judicial solemne y corresponde a la primera mitad enfática del versículo.
theological_decisions:
- issue: Si el versículo debe suavizarse para evitar la tensión sobre la perseverancia de los justos
  english_pob_reading: 'The warning is translated straightforwardly as a real judicial warning: the righteous person who trusts in his righteousness and does injustice will not have his prior righteous deeds remembered and will die because of the injustice he has done.'
  chosen_spanish_reading: 'La advertencia se traduce de manera directa como un juicio real: el justo que confía en su justicia y hace injusticia no verá recordados sus hechos justos y morirá por la injusticia cometida.'
  alternative_spanish_readings:
  - Una formulación hipotética que debilite la advertencia
  - Una lectura sistemática que la convierta en pérdida definitiva de salvación
  rationale: El hebreo presenta una advertencia concreta en clave judicial y de pacto. La traducción conserva esa tensión sin resolverla en categorías doctrinales posteriores, siguiendo el principio de no eliminar la ambigüedad teológica que el texto mismo mantiene.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del inglés POB y su revisión: se evitó una duplicación literal final equivalente a «en ello/por ello» y se mantuvo el cierre más natural «por la injusticia que ha hecho morirá», sin perder la relación causal/judicial del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «justicia» para צִדְקָה/צִדְקֹתָיו, en coherencia con la preferencia léxica de la POB por conservar el campo semántico jurídico-moral.
  - Se eligió «injusticia» para עָוֶל para mantener la repetición léxica del versículo y evitar sustituirla por «iniquidad» sin necesidad textual.
  - Se tradujo la advertencia en singular colectivo («ninguno de sus hechos justos será recordado») para que el español sea idiomático; la nota explica el plural hebreo subyacente.
  - Se evitó introducir «Cristo», «SEÑOR» o formulaciones confesionales no presentes en el texto hebreo; el hablante divino queda simplemente como primera persona del discurso.
  - Se conservó el tono solemne con futuros simples, que en español funcionan bien para el paralelismo «vivirá/morirá».
