    issue: «vinieron para despojar» es menos idiomático que una formulación como «fueron a despojar»
    rationale: El hebreo simplemente narra que los filisteos llegaron/entraron con el propósito de despojar a los muertos. En español narrativo, «vinieron para» aquí suena algo calcado y menos natural.
  - severity: medium
    issue: «despojar a los caídos» puede resultar ambiguo sin una formulación o nota más precisa
    rationale: לְפַשֵּׁט אֶת־הַחֲלָלִים se refiere específicamente a quitar ropa o armadura de los muertos en combate. La nota ya ayuda, pero puede formularse con más precisión en español.
