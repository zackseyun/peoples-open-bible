  - marker: b
    text: 'Or "the deep things of God."'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 우리에게는 하나님께서 영을 통하여 이것들을 계시하셨습니다. 이는 영은 모든 것을, 곧 하나님의 깊은 것까지도 살피시기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκάλυψεν
  english_pob_choice: has revealed
  chosen_korean: 계시하셨습니다
  alternatives_korean:
  - 드러내셨습니다
  lexicon: BDAG
  rationale: 7절의 ἀποκεκρυμμένην(감추어진)에 대한 응답으로 「계시」가 적절.
- source_word: διὰ τοῦ πνεύματος
  english_pob_choice: through the Spirit
  chosen_korean: 영을 통하여
  alternatives_korean:
  - 성령을 통하여
  lexicon: BDAG
  rationale: 본문 흐름에서 「하나님의 영」으로 명시되며 4·12절과 일관되게 「영」으로 옮긴다.
- source_word: ἐραυνᾷ
  english_pob_choice: searches
  chosen_korean: 살피시기
  alternatives_korean:
  - 탐색하시기
  lexicon: BDAG
  rationale: ἐραυνάω의 정착된 한국어.
- source_word: τὰ βάθη τοῦ θεοῦ
  english_pob_choice: the depths of God
  chosen_korean: 하나님의 깊은 것
  alternatives_korean:
  - 하나님의 심오한 것
  lexicon: BDAG
  rationale: 종결 어구의 무게를 보존.
