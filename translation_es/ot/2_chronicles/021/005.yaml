  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: '''Reinó'' mantiene el verbo regnal estándar y corresponde al uso técnico del hebreo en fórmulas cronológicas.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDB
  rationale: La preposición locativa y el nombre de lugar se rinden de manera simple y fiel.
