review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: conserva «Cades» sin expandir a «Cades-barnea», usa «acamparon» para חנה y mantiene «monte Hor» con nota sobre el literal hebreo. También refleja adecuadamente בִּקְצֵה como ubicación espacial. La única desalineación relevante es el anclaje de notas: en el inglés, la nota léxica sobre «Hor el monte» se ancla en Mount Hor y la nota sobre «Kadesh» en Kadesh; en español conviene mantener ambas, pero con marcación ordenada y coherente según el texto revisado.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Salieron de Cades y acamparon en el monte Hor, en el borde de la tierra de Edom» se lee bien en español bíblico contemporáneo. Sin embargo, «en el borde de la tierra de Edom» puede sonar ligeramente físico; «en el borde del territorio de Edom» sería posible, pero no es necesario. El ajuste principal recomendado es técnico-editorial: ordenar los marcadores de nota en secuencia de aparición y simplificar levemente la nota de Hor para mayor naturalidad en español.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo topónimos. «Cades» y «monte Hor» son apropiados. No hay conflicto con Yahvé/Mesías/Espíritu ni otras políticas terminológicas.
  issues:
  - severity: medium
    issue: Los marcadores de notas no siguen la secuencia textual más natural para la versión española revisada.
    rationale: El proyecto exige marcadores únicos en orden. Aunque el borrador actual usa a y b una sola vez cada uno, conviene anclar la primera nota al primer topónimo relevante y la segunda al segundo, con orden limpio y consistente en el texto final.
  - severity: low
    issue: La redacción de la nota sobre Hor puede sonar algo calcada.
    rationale: '«Literalmente: “en Hor, el monte”» es fiel, pero «Hebreo literalmente: “en Hor el monte”» suena más natural y sobrio en español de notas.'
  revised_spanish_text: Salieron de Cades[a] y acamparon en el monte Hor[b], en el borde de la tierra de Edom.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Cades»; algunas traducciones amplían este nombre a «Cades-barnea» por el contexto más amplio, pero aquí el texto hebreo usa solo el nombre corto.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «en Hor el monte»; se conserva la forma convencional «monte Hor» por claridad y uso establecido.'
    reason: lexical_alternative
  revision_rationale: El texto principal es esencialmente fiel y natural, por lo que la revisión es menor. Se mantienen las mismas decisiones léxicas, pero se ordenan y pulen las notas para ajustarse mejor a la disciplina editorial del proyecto y a un español más fluido.
