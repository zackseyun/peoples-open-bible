    text: Or 'assigned to them an inheritance with the measuring line'; the Hebrew idiom combines the ideas of allotment and measured land division.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their dwellings'; literally 'in their tents.'
    reason: lexical_alternative
