theological_decisions:
- issue: Gendered martial language in ψυχὰς νέων ἐπανδρῶσαι and εὐανδρείας
  chosen_reading: Retain explicit masculine imagery with 'young men' and 'manly' in the main text.
  alternative_readings:
  - embolden the young
  - give them courage
  rationale: The Greek uses explicitly male-coded language tied to martial courage. Per doctrine, gender-accurate renderings are preferred over neutralization when the source intends masculine imagery. A smoother neutral rendering would lose a significant rhetorical feature of the verse.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Interpretation of μὴ στρατεύεσθαι in contrast with the following infinitives
  chosen_reading: Render as 'not merely to make a campaign' rather than 'not to campaign/fight.'
  alternative_readings:
  - not to march out
  - not to wage war
  rationale: 'A wooden negative reading would contradict the immediate context, since they are clearly resolving to fight bravely. The syntax and contrast indicate ''not merely'' or ''not simply'' as the sense: not just to go on campaign, but to force a decisive engagement.'
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
