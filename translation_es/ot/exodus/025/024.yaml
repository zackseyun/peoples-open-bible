translation:
  language: es
  text: Lo recubrirás de oro puro, y le harás una moldura de oro alrededor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un borde» o «una cenefa»; el término hebreo puede designar un adorno perimetral. Tradicionalmente, algunos lo traducen «corona», pero aquí se refiere a la moldura decorativa alrededor de la mesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ
  english_pob_choice: you shall overlay
  chosen_spanish: lo recubrirás
  alternatives_spanish:
  - lo cubrirás
  - lo chaparás
  lexicon: HALOT
  rationale: El verbo צפה en esta construcción describe cubrir un objeto con una capa metálica. En español, «recubrir» comunica bien la acción artesanal de aplicar una cobertura de oro sin sonar tan técnico o poco natural como «chapar», y mantiene la idea de revestimiento mejor que «cubrir».
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - al mismo
  - a él
  lexicon: Referencia anafórica al arca/mesa del contexto inmediato
  rationale: El pronombre retoma la mesa mencionada en el versículo anterior. En español, el clítico directo «lo» es natural y preciso para conservar la referencia sin redundancia.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La expresión denota oro de alta pureza. «Oro puro» es la equivalencia directa, transparente y habitual en español bíblico moderno.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and you shall make
  chosen_spanish: y le harás
  alternatives_spanish:
  - y harás para él
  - y le fabricarás
  lexicon: HALOT
  rationale: עָשָׂה es el verbo común «hacer». Aquí el objeto resultante es un adorno para la mesa, por eso «harás» conserva la sencillez del mandato; el dativo «le» expresa naturalmente el destinatario de la pieza.
- source_word: לּוֹ
  english_pob_choice: for it
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - sobre él
  lexicon: Función dativa de finalidad/beneficio
  rationale: El ל marca que el adorno se hace para la mesa. En español, el dativo «le» reproduce esa relación de destino o pertenencia de manera más fluida que una construcción pesada con «para».
- source_word: זֵר
  english_pob_choice: molding
  chosen_spanish: moldura
  alternatives_spanish:
  - borde
  - cenefa
  - corona
  lexicon: HALOT
  rationale: Aquí זֵר designa un adorno perimetral ornamental. «Moldura» expresa bien una pieza decorativa de borde en mobiliario sagrado y evita la ambigüedad de «corona», que sería engañosa en español moderno.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro dorado
  - de oro fino
  lexicon: HALOT
  rationale: El material del adorno es oro. En español, «moldura de oro» suena natural y conserva el sustantivo material sin añadir matices no presentes en el hebreo.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: El adverbio indica un contorno completo. «Alrededor» es claro y suficiente en español; mantiene el sentido distributivo de encierro perimetral.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el rastro auditado en inglés: צפה como revestimiento metálico, זֵר como adorno perimetral y סָבִיב como contorno completo. No se introdujeron cambios de sentido respecto del análisis previo; solo se adaptó la formulación al español natural.'
  spanish_consistency_notes:
  - Se mantuvo el estilo bíblico moderno y digno, evitando calcos rígidos.
  - Se preservó la tensión léxica de זֵר con una nota que reconoce alternativas legítimas sin imponer «corona».
  - «Oro puro» y «moldura» siguen la equivalencia directa del audit trail inglés, adaptada a una sintaxis española fluida.
