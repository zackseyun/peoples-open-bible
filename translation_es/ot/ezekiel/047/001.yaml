revisions:
- from: Entonces me hizo volver a la entrada de la casa[a], y vi que aguas salían de debajo del umbral de la casa hacia el oriente, porque la fachada de la casa daba al oriente; y las aguas descendían desde debajo del lado derecho de la casa[b], desde el sur del altar.
  to: Entonces me hizo volver a la entrada de la casa[a], y he aquí, agua salía de debajo del umbral de la casa hacia el oriente, porque el frente de la casa daba al oriente; y el agua descendía de debajo del lado derecho de la casa[b], al sur del altar.
  rationale: 'La revisión conserva todas las decisiones centrales de la POB auditada, pero corrige tres puntos menores: (1) restaura mejor el valor deíctico de וְהִנֵּה con ''y he aquí''; (2) usa ''agua'' en singular no contable, más natural en español para un flujo; y (3) simplifica la última localización a ''al sur del altar'' para español claro y eclesialmente legible, sin introducir una interpretación nueva. También se limpió la puntuación de la nota b.'
  reviewer_model: gpt-5.4
