translation:
  language: es
  text: Si tomara las alas del alba[a], si habitara en la parte más remota del mar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el occidente más remoto»; en la poesía hebrea, «mar» puede sugerir el oeste.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  english_pob_choice: take up
  chosen_spanish: tomara
  alternatives_spanish:
  - alzara
  - llevara
  - tomara en mis manos
  lexicon: HALOT
  rationale: En este contexto poético condicional, «tomara» comunica la acción hipotética de asumir o tomar las «alas» sin sonar tan rígido como una traducción más mecánica; mantiene la fuerza verbal de נשׂא ('levantar, llevar').
- source_word: כַנְפֵי
  english_pob_choice: wings of
  chosen_spanish: alas de
  alternatives_spanish:
  - extremos de
  - bordes de
  lexicon: HALOT
  rationale: «Alas» preserva la metáfora básica del hebreo y funciona naturalmente con «del alba» en español; las opciones de borde/extremo pierden la imagen poética central.
- source_word: שָׁחַר
  english_pob_choice: the dawn
  chosen_spanish: el alba
  alternatives_spanish:
  - la aurora
  - el amanecer
  lexicon: HALOT
  rationale: «Alba» es una equivalencia poética y clara en español para שׁחר, y conserva la personificación implícita en la imagen de las «alas».
- source_word: אֶשְׁכְּנָה
  english_pob_choice: I dwell
  chosen_spanish: habitara
  alternatives_spanish:
  - morara
  - residiera
  - me quedara
  lexicon: HALOT
  rationale: El verbo español en subjuntivo condicional encaja con la estructura hipotética del verso; «habitar» mantiene el registro elevado de שכן ('morar, habitar').
- source_word: בְּאַחֲרִית
  english_pob_choice: in the farthest part of
  chosen_spanish: en la parte más remota de
  alternatives_spanish:
  - en el extremo de
  - en la parte más lejana de
  - en el rincón más remoto de
  lexicon: HALOT
  rationale: «Parte más remota» expresa bien el sentido espacial de אַחֲרִית como extremo lejano, evitando una lectura temporal de «fin».
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar occidental
  - el mar
  lexicon: HALOT
  rationale: «Mar» conserva el sentido literal del sustantivo יָם y es idiomático en español. Se mantiene la imagen concreta, dejando la posible resonancia direccional para nota.
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia y no registró revisiones aplicadas; esta versión sigue la lectura principal con una única nota para la posible resonancia direccional de יָם.
  spanish_consistency_notes:
  - Se preserva el paralelismo condicional con dos oraciones introducidas por «si».
  - Se mantiene el registro poético sin forzar una paráfrasis explicativa.
  - «Alba» y «mar» conservan la imaginería original y permiten la nota sobre la posible acepción occidental de יָם.
