translation:
  language: es
  text: las vestiduras finamente tejidas[a] para ministrar en el santuario[b], las vestiduras santas para Aarón el sacerdote, y las vestiduras de sus hijos para servir como sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las vestiduras de servicio»; el término hebreo puede denotar prendas de servicio especialmente tejidas.
    reason: lexical_alternative
  - marker: b
    text: O «en el lugar santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  - indumentaria
  lexicon: HALOT
  rationale: En español, «vestidos» no se usa aquí como prenda femenina específica, sino en sentido amplio de «atuendos/ropa». Lo elegí porque permite un registro natural y digno sin introducir un tecnicismo eclesiástico ajeno al contexto. «Ropas» también es posible, pero «vestidos» mantiene mejor la idea de conjunto de prendas.
- source_word: הַשְּׂרָד
  english_pob_choice: finely woven
  chosen_spanish: de servicio
  alternatives_spanish:
  - finamente tejidos
  - tejidos con esmero
  - de ministerio
  lexicon: HALOT
  rationale: 'El audit trail inglés dejó abierta la tensión léxica: el término puede referirse a telas especialmente tejidas o a prendas de servicio. Aquí conservo la lectura funcional como POB la documenta en la nota, con «de servicio», porque el versículo inmediato habla de su función cultual. Aun así, el matiz de tejido especial queda preservado en la nota alternativa.'
- source_word: לְשָׁרֵת
  english_pob_choice: for ministering
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para el ministerio
  - para oficiar
  lexicon: HALOT
  rationale: «Ministrar» refleja mejor el uso cultual del verbo que el simple «servir», y en español eclesial sigue siendo inteligible sin perder el sentido de servicio sagrado. Evita además reducir la acción a una noción meramente general de asistencia.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo santo
  - en el recinto santo
  lexicon: HALOT
  rationale: En este contexto tabernacular, el término designa el ámbito sagrado. «Santuario» comunica de forma clara y natural el espacio cultual sin depender de una glosa perifrástica.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: los vestidos santos
  alternatives_spanish:
  - las vestiduras santas
  - las ropas santas
  - los vestidos sagrados
  lexicon: HALOT
  rationale: Mantengo la construcción adjetiva directa con «santos», que sigue de cerca la forma hebrea y evita reemplazarla por un término litúrgico más cargado como «vestiduras» si no es necesario. «Santos» conserva la cualidad consagrada de las prendas.
- source_word: לְאַהֲרֹן הַכֹּהֵן
  english_pob_choice: for Aaron the priest
  chosen_spanish: para Aarón el sacerdote
  alternatives_spanish:
  - para Aarón, el sacerdote
  - para Aarón, el sumo sacerdote
  - para Aarón, sacerdote
  lexicon: HALOT
  rationale: «El sacerdote» reproduce la aposición del hebreo sin añadir jerarquía no expresada aquí. No empleo «sumo sacerdote» porque el texto no lo dice y podría sobreespecificar el cargo.
- source_word: בִּגְדֵי בָנָיו
  english_pob_choice: the garments of his sons
  chosen_spanish: los vestidos de sus hijos
  alternatives_spanish:
  - los vestidos de sus hijos
  - las prendas de sus hijos
  - sus vestidos
  lexicon: HALOT
  rationale: Conservo la estructura posesiva del hebreo para reflejar que se trata de prendas pertenecientes a los hijos de Aarón. «Hijos» mantiene la referencia genealógica literal, sin reformularla como «descendientes».
- source_word: לְכַהֵן
  english_pob_choice: for serving as priests
  chosen_spanish: para servir como sacerdotes
  alternatives_spanish:
  - para ministrar como sacerdotes
  - para ejercer el sacerdocio
  - para oficiar como sacerdotes
  lexicon: HALOT
  rationale: La raíz כהן expresa función sacerdotal; «servir como sacerdotes» conserva la idea de ejercicio del oficio sin introducir una formulación más abstracta. Esta redacción también deja ver que el verbo no es solo «servir» en sentido general, sino desempeñar el sacerdocio.
theological_decisions:
- issue: Distinción entre los dos grupos de prendas cultuales
  english_pob_reading: Treat the first phrase as a distinct class of specially woven garments used for ministry in the sanctuary, followed by the holy garments specifically for Aaron and his sons.
  chosen_spanish_reading: Tomar la primera frase como un grupo distinto de vestidos de servicio usados para ministrar en el santuario, seguido por los vestidos santos destinados a Aarón y luego a sus hijos.
  alternative_spanish_readings:
  - Entender ambas frases como apposiciones que describen el mismo conjunto de prendas sacerdotales.
  - Unificar todo como una sola lista de vestiduras sagradas.
  rationale: 'El hebreo repite el marcador de objeto y enumera prendas de modo que permite distinguir dos conjuntos: las prendas de servicio y las prendas santas. La versión española mantiene esa distinción sin negar que haya superposición funcional entre ambas categorías. Así se preserva la tensión documentada por el POB en vez de resolverla demasiado rápido.'
  doctrine_reference: Éxodo 35:19; nota textual/lexical del POB sobre בִּגְדֵי הַשְּׂרָד y בִּגְדֵי הַקֹּדֶשׁ
translation_notes:
  revision_awareness: La revisión más reciente coincidió en alto grado y no introdujo cambios. Esta versión conserva esa estabilidad, pero ajusta el español para que el contraste entre בִּגְדֵי הַשְּׂרָד y בִּגְדֵי הַקֹּדֶשׁ quede audible en una lectura natural.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Mantuve «sacerdote(s)» para כהן/כהן־, evitando «oficiar» en el texto principal para no volver más abstracta la función.
  - Conservé un orden cercano al hebreo, pero reorganicé mínimamente para que el español sea publicable y fluido.
  - Las notas al pie preservan la alternativa léxica principal del audit trail inglés sin multiplicar glosas innecesarias.
