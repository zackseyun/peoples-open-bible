translation:
  language: es
  text: Si a un hombre se le cae el cabello de su cabeza[a], es calvo; es limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si a un hombre se le queda calva la cabeza». El verbo hebreo puede denotar quedar sin cabello o ser despojado de él; el texto principal preserva la idea verbal de la pérdida de cabello antes de «es calvo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y abre un caso legal con ejemplo corporal. «Un hombre» refleja con precisión la forma y el referente probable, sin neutralizar indebidamente el género gramatical.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: En este contexto jurídico-diagnóstico, כִּי introduce una condición. «Si» es la equivalencia más natural en español y conserva el valor de protasis.
- source_word: יִמָּרֵט
  english_pob_choice: loses the hair
  chosen_spanish: se le cae el cabello
  alternatives_spanish:
  - queda sin cabello
  - se vuelve calvo
  - se le arranca el cabello
  lexicon: HALOT
  rationale: El nifal de מרט puede expresar quedar desnudo o ser despojado; aquí se refiere a la pérdida de cabello de la cabeza. «Se le cae el cabello» conserva la idea verbal de pérdida sin convertirla de antemano en el estado resultante que ya expresa קֵרֵחַ.
- source_word: רֹאשׁוֹ
  english_pob_choice: of his head
  chosen_spanish: de la cabeza
  alternatives_spanish:
  - de su cabeza
  - en la cabeza
  lexicon: HALOT
  rationale: Se explicita la relación posesiva/constructa en español con «de la cabeza», de modo natural y fiel al foco del hebreo.
- source_word: קֵרֵחַ
  english_pob_choice: bald
  chosen_spanish: calvo
  alternatives_spanish:
  - pelado
  - rapado
  lexicon: HALOT
  rationale: El adjetivo describe el estado resultante. «Calvo» es la forma española clara y normal para esta condición.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: HALOT
  rationale: En Levítico 13 el término pertenece al campo ritual de pureza/impureza. «Limpio» conserva esa categoría cultual mejor que «puro», que en español puede sonar más moral o abstracto.
- source_word: הוּא ... הוּא
  english_pob_choice: he is ... he is
  chosen_spanish: es ... es
  alternatives_spanish:
  - él es ... él es
  lexicon: HALOT
  rationale: 'La repetición pronominal hebrea aporta predicación enfática. En español se refleja de forma natural con la repetición del verbo: «es ... es».'
theological_decisions:
- issue: Terminología ritual de pureza/impureza en Levítico
  english_pob_reading: clean
  chosen_spanish_reading: limpio
  alternative_spanish_readings:
  - puro
  rationale: La verse trata del estatus ritual, no de inocencia moral. «Limpio» preserva la categoría cultual sin introducir un matiz ético ajeno al contexto.
  doctrine_reference: Principio de consistencia terminológica en legislación ritual; Levítico 13
translation_notes:
  revision_awareness: Se revisó la equivalencia ya validada en inglés y no se encontraron cambios necesarios; la versión española mantiene la distinción entre el proceso de pérdida del cabello y el estado resultante de calvicie.
  spanish_consistency_notes:
  - Se conservó «limpio» para טָהוֹר por consistencia con el registro ritual de Levítico 13.
  - Se evitó «puro» por su posible carga moral en español.
  - La nota conserva la tensión léxica entre el verbo de despojo/pérdida y el adjetivo final «calvo».
