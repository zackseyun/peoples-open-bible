  to: Porque tú eres quien creó todas las cosas y gobierna sobre todo; tú eres un soberano justo[a], y juzgas a los que actúan con insolencia y arrogancia.
  rationale: 'Se hizo una reparación menor, no doctrinal: se suavizó la redacción principal con «quien creó» y «gobierna sobre todo» para mayor naturalidad y mejor alineación con el verbo griego y el POB inglés. Además, se corrigió la nota al pie para que refleje fielmente la alternativa auditada entre «gobernante» y «soberano» sin presentar de forma inexacta «recto» como la alternativa principal documentada para δίκαιος.'
