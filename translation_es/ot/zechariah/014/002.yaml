base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/002.yaml
  text: And I will gather all the nations against Jerusalem for battle[a], and the city will be captured, and the houses plundered, and the women raped, and half of the city will go out into exile[b]; but the rest of the people will not be cut off from the city.
  footnotes:
