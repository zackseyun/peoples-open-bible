translation:
  language: es
  text: Quien aumenta su riqueza con interés y ganancia, la junta para quien es bondadoso con los pobres[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con usura y aumento». Los términos hebreos se refieren a ganancia obtenida al prestar dinero, a menudo con sentido explotador.
    reason: lexical_alternative
  - marker: b
    text: O «para quien es generoso con los pobres».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבֶּה
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - multiplica
  - hace crecer
  lexicon: HALOT
  rationale: El participio hifil de רבה expresa hacer crecer o aumentar. «Aumenta» comunica bien la acción de acumular riqueza en español moderno sin perder el sentido causal.
- source_word: הוֹנוֹ
  english_pob_choice: his wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus riquezas
  - su hacienda
  lexicon: HALOT
  rationale: הון denota riqueza, bienes o patrimonio. «Riqueza» es claro y natural en español, y conserva el valor económico del término.
- source_word: בְּנֶשֶׁךְ
  english_pob_choice: by interest
  chosen_spanish: con interés
  alternatives_spanish:
  - con usura
  - con interés usurario
  lexicon: HALOT
  rationale: נֶשֶׁךְ puede referirse al interés de un préstamo con matiz explotador. «Con interés» evita un giro demasiado técnico, pero la nota preserva la alternativa más marcada.
- source_word: וּבְתַרְבִּית
  english_pob_choice: and profit
  chosen_spanish: y ganancia
  alternatives_spanish:
  - y aumento
  - y lucro
  lexicon: HALOT
  rationale: תַּרְבִּית expresa aumento, ganancia o provecho adicional. «Ganancia» diferencia este término del anterior y mantiene la idea de beneficio financiero.
- source_word: לְחוֹנֵן
  english_pob_choice: for one who is gracious
  chosen_spanish: para quien se compadece
  alternatives_spanish:
  - para quien es generoso
  - para quien muestra favor
  lexicon: HALOT
  rationale: El participio de חנן significa mostrar favor o ser misericordioso. En este contexto, «se compadece» comunica de forma natural la disposición benévola hacia los pobres, sin borrar la base semántica de favor/gracia.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los débiles
  lexicon: HALOT
  rationale: דלים se refiere a los pobres, menesterosos o débiles. «Los pobres» es la opción más directa e idiomática en el contexto económico del proverbio.
- source_word: יִקְבְּצֶנּוּ
  english_pob_choice: gathers it
  chosen_spanish: la junta
  alternatives_spanish:
  - la reúne
  - la recoge
  lexicon: HALOT
  rationale: קבץ significa juntar, reunir, recoger. Como el sufijo remite a la riqueza acumulada, «la junta» conserva la concisión proverbial y deja la ironía de que termina reuniéndose para otro.
theological_decisions:
- issue: Tensión entre «interest» y el matiz de usura/explotación en נֶשֶׁךְ
  english_pob_reading: by interest; footnote notes the Hebrew terms refer to gain from lending, often with an exploitative sense.
  chosen_spanish_reading: con interés
  alternative_spanish_readings:
  - con usura
  - con interés usurario
  rationale: En español, «interés» es más transparente y reproduce la opción de la POB en inglés, mientras que la nota conserva la alternativa léxica con su matiz ético más fuerte. Así no se pierde la tensión entre un término general y su posible carga explotadora.
  doctrine_reference: Ética bíblica sobre el préstamo y la opresión económica; cf. Éxodo 22:25; Levítico 25:36-37.
- issue: 'Ambigüedad de לְחוֹנֵן דַּלִּים: benevolencia, gracia o generosidad'
  english_pob_reading: for one who is gracious to the poor / one who is generous to the poor
  chosen_spanish_reading: para quien se compadece de los pobres
  alternative_spanish_readings:
  - para quien es generoso con los pobres
  - para quien muestra favor a los pobres
  rationale: La forma hebrea apunta a alguien caracterizado por favor/gracia hacia los pobres. «Se compadece» es una solución española natural que mantiene la orientación misericordiosa y la recompensa irónica del proverbio, sin imponer la idea más específica de «generosidad» como única lectura.
  doctrine_reference: Proverbios sapenciales sobre la retribución moral; cf. Proverbios 19:17; 22:9.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. No hubo revisiones aplicadas en el pasaje inglés; el consenso de revisión fue de alta concordancia y sin cambios. La redacción española busca reproducir esa solución estable sin añadir parafraseo innecesario.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «riqueza» para הוֹן y «ganancia» para תַּרְבִּית para distinguir los dos matices económicos.
  - «La junta» conserva la brevedad proverbial de יִקְבְּצֶנּוּ y permite la lectura de que la riqueza termina reuniéndose para otra persona.
  - Se evitó sustituir automáticamente términos económicos por vocabulario eclesiástico, manteniendo el registro sapiencial y literal del proverbio.
