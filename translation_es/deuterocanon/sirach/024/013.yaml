translation:
  language: es
  text: Como cedro fui elevado en el Líbano, y como ciprés en los montes de Hermón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Ἀερμών corresponde al nombre de lugar comúnmente vertido «Hermón».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - igual que
  lexicon: LSJ
  rationale: Introduce una comparación poética directa; «como» conserva el valor comparativo con naturalidad en español.
- source_word: κέδρος
  english_pob_choice: cedar
  chosen_spanish: cedro
  alternatives_spanish:
  - cedro del Líbano
  lexicon: LSJ
  rationale: «Cedro» es la equivalencia usual y fiel para κέδρος. Se mantiene el árbol sin añadir especificación interpretativa innecesaria.
- source_word: ἀνυψώθην
  english_pob_choice: was raised high
  chosen_spanish: fui levantado
  alternatives_spanish:
  - fui exaltado
  - fui elevado
  lexicon: LSJ
  rationale: El pasivo aoristo expresa ser alzado/levantado. «Fui levantado» preserva la imagen de altura sin cargar el verbo con una lectura honorífica más explícita de la que exige el contexto metafórico.
- source_word: ἐν τῷ Λιβάνῳ
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - sobre el Líbano
  lexicon: LSJ
  rationale: La preposición de localización se rinde de manera directa y idiomática en español.
- source_word: κυπάρισσος
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - ciprés común
  lexicon: LSJ
  rationale: «Ciprés» es la correspondencia estándar y reconocible para κυπάρισσος en español.
- source_word: ἐν ὄρεσιν Ἀερμών
  english_pob_choice: in the mountains of Hermon
  chosen_spanish: en los montes de Hermón
  alternatives_spanish:
  - en las montañas de Hermón
  - en los montes de Aermón
  lexicon: LSJ
  rationale: El plural ὄρεσιν se refleja mejor con «montes». Se adopta «Hermón» por ser la forma normalizada del topónimo, equivalente al Greek Ἀερμών señalado en el aparato en inglés.
theological_decisions:
- issue: Si ἀνυψώθην debe sonar honorífico o solo espacial/metafórico
  english_pob_reading: was raised high
  chosen_spanish_reading: fui levantado
  alternative_spanish_readings:
  - fui exaltado
  - fui elevado
  rationale: El pasaje es una autodescripción poética mediante imágenes arbóreas. «Fui levantado» conserva la elevación física/metafórica sin introducir una teología más explícita de exaltación que el contexto inmediato no exige.
  doctrine_reference: Mantener la tensión poética y no resolverla con una lectura doctrinal más fuerte de la necesaria.
translation_notes:
  revision_awareness: 'El texto inglés auditado ya optó por una equivalencia óptima: simile natural («like»), altura sin sobreteologizar («was raised high») y normalización de Ἀερμών a «Hermon». La versión española conserva esas decisiones, ajustándolas a una sintaxis natural en español y manteniendo la referencia topográfica tradicional «Hermón».'
  spanish_consistency_notes:
  - Se prefirió «Líbano» y «Hermón» como topónimos normalizados y reconocibles en español.
  - Se evitó «exaltado» para no convertir la metáfora de altura en un matiz honorífico no explicitado por el griego.
  - No se añadió artículo o determinación extra que altere el paralelismo poético del versículo.
