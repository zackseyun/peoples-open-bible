translation:
  language: es
  text: Sus camellos serán botín, y la abundancia de su ganado, despojo. Yo los esparciré a todo viento, a los que se cortan los bordes del cabello[a], y desde todos los lados haré venir sobre ellos su calamidad[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que llevan las sienes cortadas». La expresión hebrea alude a una práctica distintiva de arreglo del cabello, probablemente el recorte del borde o las sienes.
    reason: lexical_alternative
  - marker: b
    text: O «desde todas partes» o «de todos lados».
    reason: lexical_alternative
lexical_decisions:
- source_word: גְמַלֵּיהֶם
  english_pob_choice: their camels
  chosen_spanish: sus camellos
  alternatives_spanish:
  - sus dromedarios
  lexicon: HALOT
  rationale: גמלים designa camellos; en español, «camellos» es la equivalencia natural y suficientemente precisa.
- source_word: לָבַז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  lexicon: HALOT
  rationale: El término expresa algo que pasa a manos del enemigo; «botín» comunica bien la idea militar de saqueo sin sonar forzado.
- source_word: הֲמוֹן מִקְנֵיהֶם
  english_pob_choice: their abundance of livestock
  chosen_spanish: la abundancia de su ganado
  alternatives_spanish:
  - la multitud de su ganado
  - sus muchas reses
  lexicon: HALOT
  rationale: הֲמוֹן aporta la idea de abundancia/multitud, y מִקְנֶה aquí es ganado. «La abundancia de su ganado» conserva el valor colectivo y el énfasis de abundancia.
- source_word: לְשָׁלָל
  english_pob_choice: spoil
  chosen_spanish: despojo
  alternatives_spanish:
  - botín
  - presa
  lexicon: HALOT
  rationale: שָׁלָל es un término de despojo bélico; «despojo» mantiene la distinción léxica aproximada frente a לָבַז y suena natural en español bíblico moderno.
- source_word: וְזֵרִתִים
  english_pob_choice: I will scatter
  chosen_spanish: Yo los esparciré
  alternatives_spanish:
  - Yo los dispersaré
  - Yo los aventaré
  lexicon: HALOT
  rationale: El verbo expresa dispersión; «esparcir» conserva la imagen y funciona bien en un oráculo de juicio.
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: a todo viento
  alternatives_spanish:
  - a cada viento
  - en toda dirección
  lexicon: HALOT
  rationale: La imagen literal de «viento» es idiomática en español y preserva el color hebreo de dispersión en todas direcciones.
- source_word: קְצוּצֵי פֵאָה
  english_pob_choice: those who cut the corners of their hair
  chosen_spanish: a los que se cortan las puntas del cabello
  alternatives_spanish:
  - a los de las sienes rapadas
  - a los que se recortan los bordes del cabello
  lexicon: HALOT
  rationale: El hebreo alude a una práctica distintiva de arreglo del cabello; se conserva la imagen general sin sobreespecificar más allá de lo que el texto demuestra.
- source_word: מִכָּל עֲבָרָיו
  english_pob_choice: from all sides of them
  chosen_spanish: desde todos los lados
  alternatives_spanish:
  - de todos lados
  - desde todas partes
  lexicon: HALOT
  rationale: עֲבָרִים señala lados/regiones. En español, «desde todos los lados» transmite la procedencia del juicio de manera natural y cercana al original.
- source_word: אֵידָם
  english_pob_choice: their calamity
  chosen_spanish: su calamidad
  alternatives_spanish:
  - su desastre
  - su ruina
  lexicon: HALOT
  rationale: אֵיד en contextos de juicio es calamidad/desgracia. «Calamidad» conserva el tono solemne del pasaje.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto, y la fórmula profética se vierte con «declara» para mantener solemnidad y fluidez.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - dice Yahvé
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se traduce con «Yahvé» en lugar de ocultarlo tras una convención de mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Expresión de juicio en מִכָּל עֲבָרָיו ... אֵידָם
  english_pob_reading: from all sides I will bring their calamity upon them
  chosen_spanish_reading: desde todos los lados haré venir su calamidad sobre ellos
  alternative_spanish_readings:
  - haré venir sobre ellos su calamidad desde todos los lados
  - desde todas partes traeré sobre ellos su calamidad
  rationale: El hebreo combina la idea de procedencia «desde todos los lados» con el verbo de traer/acontecer la calamidad sobre el pueblo. La redacción española mantiene ambas dimensiones sin borrar la tensión del texto.
  doctrine_reference: 'DOCTRINE.md: Principle of retaining source-based tension in judgment oracles'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afina הֲמוֹן מִקְנֵיהֶם como «abundance of livestock» y formula מִכָּל עֲבָרָיו ... אֶת אֵידָם como una calamidad que viene «upon them». La versión española refleja esa actualización con «la abundancia de su ganado» y «haré venir su calamidad sobre ellos», manteniendo el paralelismo y el movimiento del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en consonancia con la norma del proyecto.
  - «Botín» y «despojo» preservan la distinción entre לָבַז y לְשָׁלָל.
  - «Todo viento» conserva la imagen hebrea de dispersión sin explicarla de forma excesiva.
  - La nota sobre el cabello evita fijar una interpretación más específica que la demostrable por el texto.
  - «Su calamidad sobre ellos» conserva la carga del juicio y la relación gramatical del hebreo.
