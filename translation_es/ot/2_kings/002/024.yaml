translation:
  language: es
  text: Se volvió y los vio, y los maldijo en el nombre de Yahvé. Entonces salieron dos osas del bosque y despedazaron[a] a cuarenta y dos de los muchachos[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: O más literalmente, «abrieron» o «partieron». El verbo hebreo es fuerte y gráfico, y describe un desgarro violento.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «muchachos» o «niños» (יְלָדִים), un término amplio que puede referirse a jóvenes y no especifica por sí mismo niños muy pequeños.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן אַחֲרָיו
  english_pob_choice: He turned around
  chosen_spanish: Él se volvió
  alternatives_spanish:
  - Él dio la vuelta
  - Se volvió
  lexicon: HALOT
  rationale: El hebreo expresa el giro para mirar hacia atrás. «Se volvió» transmite ese movimiento con naturalidad en español sin perder la secuencia narrativa.
- source_word: וַיִּרְאֵם
  english_pob_choice: and saw them
  chosen_spanish: y los vio
  alternatives_spanish:
  - y los miró
  - y los observó
  lexicon: HALOT
  rationale: ראה en este contexto es «ver». «Los vio» conserva la sencillez y el orden del relato.
- source_word: וַיְקַלְלֵם
  english_pob_choice: and he cursed them
  chosen_spanish: y los maldijo
  alternatives_spanish:
  - y pronunció una maldición contra ellos
  - y los increpó
  lexicon: HALOT
  rationale: קלל en piel significa maldecir. «Los maldijo» refleja con fuerza y sin atenuación la acción verbal del texto.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - en nombre de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma propia del proyecto, «Yahvé», y la fórmula instrumental/de autoridad con «en el nombre de».
- source_word: וַתֵּצֶאנָה שְׁתַּיִם דֻּבִּים
  english_pob_choice: Then two she-bears came out
  chosen_spanish: Entonces salieron dos osas del bosque
  alternatives_spanish:
  - Entonces salieron dos osas
  - Luego salieron dos osas
  lexicon: HALOT
  rationale: דֻּבִּים con verbo femenino señala osas. «Salieron» preserva el valor de salida del verbo sin sobrecargar la frase.
- source_word: מִן הַיַּעַר
  english_pob_choice: of the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - del monte
  - desde el bosque
  lexicon: HALOT
  rationale: יער es «bosque». Con el verbo de movimiento, «del bosque» suena natural en español y conserva la procedencia.
- source_word: וַתְּבַקַּעְנָה
  english_pob_choice: tore apart
  chosen_spanish: despedazaron
  alternatives_spanish:
  - destrozaron
  - rasgaron
  lexicon: HALOT
  rationale: בקע tiene la idea de abrir/split/tear open. «Despedazaron» comunica un desgarro violento acorde con la revisión inglesa que prefirió «tore apart».
- source_word: מֵהֶם אַרְבָּעִים וּשְׁנֵי
  english_pob_choice: forty-two of the
  chosen_spanish: a cuarenta y dos de
  alternatives_spanish:
  - a cuarenta y dos entre
  - a cuarenta y dos de entre
  lexicon: HALOT
  rationale: La construcción partitiva con מִן/מֵ indica que el daño recayó sobre cuarenta y dos del grupo. «A cuarenta y dos de» es idiomático en español.
- source_word: יְלָדִים
  english_pob_choice: the boys
  chosen_spanish: los muchachos
  alternatives_spanish:
  - los jóvenes
  - los niños
  lexicon: HALOT
  rationale: ילדים es un término amplio. «Muchachos» mantiene la referencia a varones jóvenes sin imponer la edad exacta ni la imagen de niños pequeños.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Fuerza de וַיְקַלְלֵם
  english_pob_reading: and he cursed them
  chosen_spanish_reading: y los maldijo
  alternative_spanish_readings:
  - y pronunció una maldición contra ellos
  - y los reprendió
  rationale: El hebreo usa un verbo de maldición, no de mera reprensión. Se conserva la severidad del acto sin suavizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «tore apart» frente a «mauled» para reflejar mejor el verbo hebreo de abrir/partir; la traducción española refleja esa decisión con «despedazaron». También se siguió la revisión inglesa que consolidó la escena con «He turned around» como giro idiomático, aquí naturalizado como «se volvió».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar español del proyecto.
  - «Los muchachos» preserva el valor amplio de יְלָדִים sin especificar niños pequeños.
  - 'La estructura narrativa conserva la secuencia verbal hebrea: giro, visión, maldición, salida, desgarro.'
