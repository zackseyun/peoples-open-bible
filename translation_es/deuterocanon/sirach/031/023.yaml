translation:
  language: es
  text: ¿No basta un poco para un hombre inteligente? Y en su cama no se agita[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «no se agita» es algo incierto aquí; el hebreo conservado es difícil, pero el sentido en contexto es que el que come con moderación no sufre malestar en la cama.
    reason: textual_variant
  - marker: b
    text: El paralelo griego proporcionado para este versículo no coincide con la línea hebrea y parece reflejar un versículo distinto; por eso la traducción sigue el hebreo como testimonio principal, aunque con incertidumbre.
    reason: textual_variant
lexical_decisions:
- source_word: הלא
  english_pob_choice: Is not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿No es ...?
  - ¿Acaso no ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento; en español, la inversión interrogativa con «¿No ...?» conserva bien ese valor sin volver la frase pesada.
- source_word: די
  english_pob_choice: enough
  chosen_spanish: basta
  alternatives_spanish:
  - suficiente
  - es suficiente
  lexicon: HALOT
  rationale: די expresa suficiencia; «basta» es natural en español y mantiene la idea de medida suficiente en un proverbio sobre moderación.
- source_word: אנוש
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: El hebreo designa a un ser humano en forma proverbial. «Hombre» conserva la referencia singular y representativa que el POB inglés también mantuvo con «man».
- source_word: נבון
  english_pob_choice: intelligent
  chosen_spanish: entendido
  alternatives_spanish:
  - inteligente
  - prudente
  - discreto
  lexicon: HALOT
  rationale: נבון apunta al discernimiento práctico. «Entendido» comunica bien esa competencia sensata en un contexto de suficiencia y reposo, sin sonar demasiado técnico.
- source_word: מזער
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - una pequeña cantidad
  - muy poco
  lexicon: HALOT
  rationale: El término indica una cantidad pequeña; «un poco» es la equivalencia más natural en español para la estructura proverbial.
- source_word: יצועיו
  english_pob_choice: his bed
  chosen_spanish: en su cama
  alternatives_spanish:
  - en su lecho
  - en su cama de dormir
  lexicon: HALOT
  rationale: El sustantivo se refiere al lugar donde reposa o duerme. «Cama» es la forma clara y actual en español; se conserva el posesivo para reflejar el hebreo.
- source_word: לא ישיק
  english_pob_choice: he does not gasp
  chosen_spanish: no jadea
  alternatives_spanish:
  - no se ahoga
  - no se atraganta
  - no respira con dificultad
  lexicon: HALOT
  rationale: El hebreo es difícil y el testimonio griego paralelo no coincide con la línea hebrea; por eso se sigue la sensación corporal general de ausencia de angustia. «Jadea» expresa un esfuerzo o incomodidad respiratoria sin concretar un sentido más fuerte que el texto no asegura.
theological_decisions:
- issue: Uso del testimonio hebreo difícil frente al paralelo griego no coincidente
  english_pob_reading: The translation follows the Hebrew as the primary witness while noting uncertainty; the Greek parallel appears to reflect a different verse.
  chosen_spanish_reading: Se sigue el hebreo como testimonio principal, con nota de la incertidumbre textual y del desacuerdo con el paralelo griego.
  alternative_spanish_readings:
  - 'Seguir el griego: «El Altísimo no se complace en las ofrendas de los impíos... »'
  - Marcar solo el hebreo sin aludir al griego
  rationale: El expediente de la POB documenta que el hebreo conservado es la base, aunque sea oscuro, y que el griego suministrado no corresponde a esta línea. La traducción española debe reflejar esa prioridad textual y la tensión documental sin resolverla artificialmente.
  doctrine_reference: Principio de prioridad del testimonio base y transparencia textual en la edición POB.
translation_notes:
  revision_awareness: 'La versión inglesa revisó «pant» por «gasp» para hacer más natural y precisa la expresión de distress físico. En español se optó por «jadea», que conserva la misma cautela semántica: una respiración agitada o trabajosa, sin exagerar el sentido.'
  spanish_consistency_notes:
  - Se mantuvo el registro proverbial y sobrio.
  - No se introdujo vocabulario teológico ajeno al verso.
  - «Entendido» se eligió para reflejar discernimiento práctico, no mera inteligencia académica.
  - La nota textual distingue claramente entre la línea hebrea y el paralelo griego sin armonizarlos artificialmente.
