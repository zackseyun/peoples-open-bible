base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/007.yaml
  text: Then the king of Israel called all the elders of the land and said[a], “Please know and see that this man is seeking evil, for he sent to me for my wives, my sons, my silver, and my gold[b], and I did not withhold them from him.”
  footnotes:
  - marker: a
    text: Or “is seeking evil/harm.” The Hebrew רָעָה can denote evil, harm, or trouble; here it refers to hostile intent.
    reason: lexical_alternative
  - marker: b
    text: Literally “I did not withhold from him,” with the object understood from the preceding items.
    reason: lexical_alternative
