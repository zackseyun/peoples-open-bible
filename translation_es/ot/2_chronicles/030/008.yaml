    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «y su ardiente ira se apartará de ustedes».'
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor para completar en español la comparación conductual expresada en el hebreo y reflejada en la auditoría inglesa: «como sus padres hicieron». El resto del texto y las notas pueden mantenerse tal como están.'
