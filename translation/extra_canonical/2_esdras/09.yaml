  from: '1 He answered me and said, “Measure within yourself, and when you see that some part of the signs foretold has passed by,

    2 then you will understand that this is the time when the Most High will begin to visit the world that was made by him.

    3 And when there appears in the world a shaking of places, confusion among peoples, scheming among nations, instability among leaders, turmoil among rulers,

    4 then you will understand that it was of these things that the Most High spoke from the days that were before, from the beginning.

    5 For just as everything that has come to be in the world has a beginning through an ending, and the ending is made manifest,

    6 so also are the times of the Most High: beginnings made manifest in wonders and mighty works, and endings in deeds and signs.

    7 And everyone who is saved, and who is able to escape by his works or by the faith in which he believed,

    8 will be left from the dangers foretold and will see my salvation in my land and within my borders, which I sanctified for myself from of old.

    9 Then those who now have abused my ways will be astonished, and those who cast them aside in contempt will remain in torments.

    10 For all who did not know me while they were alive, though they had received benefits,

    11 and all who despised my law while they still had freedom,

    12 and while a place of repentance was still open to them did not understand but scorned it—for these it is necessary to know after death in torment.

    13 Therefore do not be curious any longer about how the ungodly will be tormented, but inquire how the righteous will be saved, and whose the age is, and for whose sake the age is, and when.”

    14 I answered and said,

    15 “I have spoken before, and now I speak, and I will speak afterward: many more perish than will be saved,

    16 just as waves are greater in number than a drop.”

    17 He answered me and said, “As the field is, so also are the seeds; and as the flowers are, so also are the colors; and as the work is, so also is the creation; and as the farmer is, so also is the threshing floor. For such was the time of the age:

    18 when I was preparing for those who now are, before the age was made for them in which they would dwell, no one contradicted me then, for there was no one.

    19 But now, those created in this prepared world, with an unfailing table and an unsearchable law, have been corrupted in their ways.

    20 And I considered my world, and behold, it was ruined; and my inhabited world, and behold, it was in peril because of the schemes that had come into it.

    21 And I saw, and I spared them with very great difficulty, and I saved for myself one grape out of the cluster, and one planting out of a great tribe.

    22 Let the multitude perish, then, that was born for nothing; but let my grape be preserved, and my planting, because with much labor I perfected these.

    23 “But you, if you will again withdraw for seven more days—though you shall not fast during them—

    24 go into a field of flowers where no house has been built, and eat only the flowers of the field. You shall not taste meat, and you shall not drink wine, but only flowers.

    25 And pray to the Most High without ceasing, and I will come and speak with you.”

    26 So I went, as he told me, into the field that is called Ardat, and I sat there among the flowers. I ate the herbs of the field, and their food became enough to satisfy me.

    27 And it happened after seven days that I was lying on the grass, and my heart was troubled again as before.

    28 And my mouth was opened, and I began to speak before the Most High, and I said,

    29 “O Lord, you showed yourself among us to our fathers in the wilderness, when they were coming out of Egypt and were entering the untrodden and fruitless desert,

    30 and you said, ‘Hear me, O Israel, and give ear to my words, seed of Jacob.

    31 For behold, I sow my law in you, and it will bear fruit in you, and by it you will be glorified forever.’

    32 Yet our fathers, after receiving the law, did not keep it, and did not observe the statutes; and the fruit of the law did not perish, for it could not, because it was yours.

    33 But those who received it perished, because they did not keep what had been sown in them.

    34 And behold, it is the custom that when the earth receives seed, or the sea a ship, or any vessel food or drink,

    35 then, if what was sown or sent or received is destroyed, these are destroyed, but the things that received them remain. Yet with us it has not happened so.

    36 For we who received the law will perish in sin, and also the heart that received it;

    37 but the law does not perish, and remains in its honor.”

    38 While I was speaking these things in my heart, I looked up with my eyes, and I saw a woman on the right side. And behold, she was mourning and weeping with a loud voice, and was deeply grieved in spirit. Her garments were torn, and ashes were on her head.

    39 Then I let go of the thoughts with which I had been occupied, and I turned to her and said,

    40 “Why are you weeping, and why are you grieved in spirit?”

    41 She said to me, “Leave me alone, my lord, so that I may mourn for myself and add to my sorrow, for I am very bitter in spirit and greatly brought low.”

    42 I said to her, “What has happened to you? Tell me.”

    43 She said to me, “I, your servant, was barren and did not bear a child, though I had a husband for thirty years.

    44 For every hour and every day throughout those thirty years I kept praying to the Most High night and day.

    45 And it happened after thirty years that the God of your servant heard me, and saw my humiliation, and paid attention to my distress, and gave me a son. And I rejoiced over him greatly, I and my husband and all my fellow citizens, and we greatly honored the Mighty One.

    46 And I brought him up with much labor.

    47 And it happened, when he had grown up and I had come to take a wife for him, that I made a day of feasting.”'
