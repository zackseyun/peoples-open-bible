translation:
  language: es
  text: También, la flota de Hiram[a], que llevaba oro de Ofir, trajo de Ofir una cantidad muy grande de madera de almug[b] y piedras preciosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la nave de Hiram» o «el barco de Hiram»; el sustantivo hebreo está en singular, pero puede funcionar colectivamente para la empresa marítima de Hiram.
    reason: lexical_alternative
  - marker: b
    text: «Madera de almug» también puede verterse «madera de algum»; la especie exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: El hebreo añade información conectada al relato anterior. «También» conserva la fuerza aditiva de manera natural en español y funciona bien al inicio de la oración.
- source_word: אֳנִי חִירָם
  english_pob_choice: Hiram’s fleet
  chosen_spanish: la flota de Hiram
  alternatives_spanish:
  - el barco de Hiram
  - la nave de Hiram
  - los barcos de Hiram
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo está en singular, el contexto sugiere un conjunto o empresa marítima asociada con Hiram. «Flota» expresa mejor ese valor colectivo en español sin reducirlo a una sola nave.
- source_word: אֲשֶׁר נָשָׂא זָהָב
  english_pob_choice: which carried gold
  chosen_spanish: que llevaba oro
  alternatives_spanish:
  - que cargaba oro
  - que transportaba oro
  - que portaba oro
  lexicon: HALOT
  rationale: נָשָׂא conserva la idea general de llevar/cargar. «Llevaba oro» es idiomático en español y mantiene el sentido de transporte marítimo sin introducir tecnicismos.
- source_word: מֵאוֹפִיר
  english_pob_choice: from Ophir
  chosen_spanish: de Ofir
  alternatives_spanish:
  - desde Ofir
  lexicon: HALOT
  rationale: Se conserva el topónimo con la preposición correspondiente en español. «De Ofir» es la forma más natural y directa.
- source_word: הֵבִיא
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - importó
  lexicon: HALOT
  rationale: El verbo causativo tiene aquí el sentido de traer/transportar hacia el lugar del relato. «Trajo» es claro y fiel al movimiento descrito.
- source_word: עֲצֵי אַלְמֻגִּים
  english_pob_choice: almug wood
  chosen_spanish: madera de almug
  alternatives_spanish:
  - madera de algum
  - almug
  - madera de almugue
  lexicon: HALOT
  rationale: Se conserva el término hebreo transliterado porque la especie exacta es incierta. «Madera de almug» evita una identificación botánica no segura y sigue la cautela de la POB inglesa.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: a very great quantity of
  chosen_spanish: una cantidad muy grande
  alternatives_spanish:
  - una gran cantidad
  - en gran abundancia
  - muchísima
  lexicon: HALOT
  rationale: La expresión intensifica la abundancia. «Una cantidad muy grande» reproduce bien el énfasis y suena natural con un sustantivo de masa como «madera».
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - piedras valiosas
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, en este contexto de cargamento la forma plural colectiva es más natural en español. «Piedras preciosas» comunica adecuadamente el sentido.
theological_decisions:
- issue: Valor colectivo de אֳנִי / singular con sentido de empresa marítima
  english_pob_reading: Hiram’s fleet; the Hebrew noun is singular, but it may function collectively for Hiram’s maritime enterprise.
  chosen_spanish_reading: la flota de Hiram
  alternative_spanish_readings:
  - el barco de Hiram
  - la nave de Hiram
  rationale: No se trata de una afirmación doctrinal, sino de una decisión de alcance semántico. «Flota» preserva el valor colectivo sugerido por el contexto y evita la impresión de una sola embarcación.
  doctrine_reference: N/A
- issue: Identificación del material almug
  english_pob_reading: almug wood; exact species uncertain
  chosen_spanish_reading: madera de almug
  alternative_spanish_readings:
  - madera de algum
  - sándalo
  rationale: La incertidumbre léxica debe mantenerse visible. No se debe sustituir por una especie concreta sin base textual suficiente; por eso se conserva el hebraísmo transliterado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada aumentó «a great quantity» a «a very great quantity» para reflejar mejor el hebreo intensivo הַרְבֵּה מְאֹד. En español se reflejó como «una cantidad muy grande». También se mantuvo la cautela léxica sobre עֲצֵי אַלְמֻגִּים mediante transliteración del término.
  spanish_consistency_notes:
  - Se conservó «Ofir» como topónimo tradicional transliterado al español.
  - Se evitó «SEÑOR» u otra sustitución porque no aparece el nombre divino en este versículo.
  - Se mantuvo la forma plural «piedras preciosas» por naturalidad colectiva en español.
  - «Madera de almug» se usa de manera consistente con la cautela del audit trail en inglés.
