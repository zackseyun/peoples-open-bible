translation:
  language: es
  text: Sus caminos son caminos de placer, y todas sus sendas son paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bienestar» o «plenitud» para «paz» (heb. shalom).
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכֶיהָ
  english_pob_choice: her ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus vías
  - sus sendas
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse a un camino físico o, en la sabiduría, al curso de vida o conducta. «Sus caminos» conserva la imagen y funciona de manera natural en español. Se usa «sus» porque el contexto hebreo personifica a la sabiduría con sufijo femenino.
- source_word: דַרְכֵי
  english_pob_choice: ways of
  chosen_spanish: caminos de
  alternatives_spanish:
  - sendas de
  - vías de
  lexicon: HALOT
  rationale: 'El constructo repetido enfatiza el paralelismo: «sus caminos son caminos de...». «Caminos de» reproduce esa repetición sin sonar forzado en español.'
- source_word: נֹעַם
  english_pob_choice: pleasantness
  chosen_spanish: agradabilidad
  alternatives_spanish:
  - amabilidad
  - dulzura
  - delicia
  lexicon: HALOT
  rationale: נֹעַם expresa agrado, amenidad o dulzura. «Agradabilidad» mantiene el sustantivo abstracto y evita reducirlo a una emoción subjetiva; «amabilidad» o «dulzura» desplazan el matiz hacia trato personal o gusto sensorial.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - y cada una de
  - y todo
  lexicon: HALOT
  rationale: La conjunción con כָּל transmite totalidad. En español, «y todas» preserva bien la fuerza inclusiva y armoniza con «sus sendas» plural.
- source_word: נְתִיבוֹתֶיהָ
  english_pob_choice: her paths
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus veredas
  lexicon: HALOT
  rationale: נְתִיבָה es un sendero o senda poética, paralela a דֶּרֶךְ. «Sendas» suena natural y mantiene el paralelo literario con «caminos» sin perder la imagen de trayecto.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - shalom
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. «Paz» es la equivalencia más directa y reconocible en español, mientras que el sentido más amplio queda disponible en la nota.
theological_decisions:
- issue: Alcance semántico de שָׁלוֹם
  english_pob_reading: '''peace'' with footnoted alternatives ''well-being'' or ''wholeness'''
  chosen_spanish_reading: «paz» con nota sobre «bienestar» o «plenitud»
  alternative_spanish_readings:
  - «bienestar»
  - «plenitud»
  - «shalom»
  rationale: El texto hebreo permite una gama semántica más amplia que el español «paz». Se conserva la traducción principal más natural, pero se documenta la amplitud del término para no borrar la riqueza del hebreo.
  doctrine_reference: Sabiduría bíblica; semántica de שָׁלוֹם en el AT
translation_notes:
  revision_awareness: El texto fuente y la traducción inglesa auditada muestran alta concordancia y no requieren revisión textual. Se mantiene el paralelismo hebreo con una equivalencia española natural, conservando la amplitud semántica de שָׁלוֹם mediante nota.
  spanish_consistency_notes:
  - Se mantiene el femenino singular implícito de la Sabiduría con los posesivos «sus».
  - Se conserva el paralelismo poético entre דֶּרֶךְ y נְתִיבָה mediante «caminos» / «sendas».
  - Se evita introducir lenguaje eclesiástico no atestiguado; «paz» se usa como término principal y la amplitud de shalom queda en nota.
