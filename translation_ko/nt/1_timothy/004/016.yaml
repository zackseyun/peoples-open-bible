id: 1TI.4.16
reference: 1 Timothy 4:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔπεχε σεαυτῷ καὶ τῇ διδασκαλίᾳ· ἐπίμενε αὐτοῖς· τοῦτο γὰρ ποιῶν καὶ σεαυτὸν σώσεις καὶ τοὺς ἀκούοντάς σου.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/016.yaml
  text: Pay close attention to yourself and to the teaching[a]; persist in these things[b]. For by doing this you will save both yourself and those who listen to you.
  footnotes:
  - marker: a
    text: Or 'continue in them' or 'persevere in them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'preserve'; Greek 'save' can denote rescue, preservation, or salvation depending on context.
    reason: lexical_alternative
translation:
  language: ko
  text: 그대 자신과 가르침에 정신을 집중하고, 그것들에 머무르십시오[a]. 이렇게 함으로 그대 자신과 그대의 말을 듣는 자들을 구원하게[b] 될 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그것들에 계속 머물러 있으십시오」 「인내하십시오」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「보존하게」. 헬라어 「구원하다」(σῴζω)는 문맥에 따라 「건짐」 「보존」 「구원」을 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεχε σεαυτῷ καὶ τῇ διδασκαλίᾳ
  english_pob_choice: Pay close attention to yourself and to the teaching
  chosen_korean: 그대 자신과 가르침에 정신을 집중하고
  alternatives_korean:
  - 자기 자신과 가르침을 주목하고
  - 자신과 교훈에 마음을 쏟고
  lexicon: BDAG
  rationale: ἐπέχω의 「주의를 기울이다」를 「정신을 집중하다」로 자연스럽게.
- source_word: ἐπίμενε αὐτοῖς
  english_pob_choice: persist in these things
  chosen_korean: 그것들에 머무르십시오
  alternatives_korean:
  - 그것들에 지속하십시오
  - 그것들에 계속하십시오
  lexicon: BDAG
  rationale: ἐπιμένω의 「지속·머무름」을 「머무르다」로.
- source_word: σώσεις
  english_pob_choice: you will save
  chosen_korean: 구원하게 될 것입니다
  alternatives_korean:
  - 구원받게 할 것입니다
  - 보존하게 될 것입니다
  lexicon: BDAG
  rationale: 본 절의 σῴζω는 종말론적 구원으로 보는 것이 본 번역의 입장. 「보존」 해석은 각주.
