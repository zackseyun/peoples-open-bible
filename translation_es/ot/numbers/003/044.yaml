translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte como «el SEÑOR» en traducciones al español; aquí se translitera «Yahvé» para preservar el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo דבר introduce avance narrativo en la fórmula profética; en español, «habló» conserva ese valor de comunicación oral y distingue mejor este verbo de אמר que «dijo» en un marco de discurso divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera en español como «Yahvé» para preservar el nombre propio del pacto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español, «a» es la correspondencia natural y precisa para este uso.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico en la forma castellana asentada y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el contenido del discurso; «diciendo» reproduce la construcción hebrea de manera natural en español y conserva la función discursiva.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB en inglés translitera el nombre divino para no ocultar el Tetragrámaton. En español, la forma estándar equivalente y reconocible en este proyecto es «Yahvé», que preserva el mismo principio textual y teológico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el testigo hebreo WLC y con la auditoría inglesa: no hay variantes textuales ni revisiones aplicadas; solo se adapta la fórmula narrativa al español manteniendo el nombre divino transliterado.'
  spanish_consistency_notes:
  - 'Se conserva la estructura formulaica del hebreo: sujeto divino + verbo de habla + destinatario + fórmula introductoria.'
  - «Yahvé» se usa de manera consistente para יְהוָה, sin sustitución por título enmascarante.
  - «Moisés» sigue la forma española estándar del nombre propio.
  - «Habló ... diciendo» mantiene la relación entre דבר y la cláusula introductoria sin sobreparáfrasis.
