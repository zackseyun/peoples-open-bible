translation:
  language: es
  text: Todos los días de su voto de nazareo[a], no pasará navaja sobre su cabeza[b]. Hasta que se cumplan los días por los cuales se aparta para Yahvé, será santo; dejará crecer los mechones del cabello de su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su voto de separación». El hebreo detrás de «nazareo» se apoya en la idea de apartamiento o consagración.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no pasará navaja sobre su cabeza», un giro idiomático que significa que no debe rasurarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶדֶר נִזְרוֹ
  english_pob_choice: his Nazirite vow
  chosen_spanish: su voto de nazareo
  alternatives_spanish:
  - su voto de separación
  - el voto de su nazareato
  lexicon: HALOT
  rationale: «Nazareo» conserva el término técnico del pasaje y el vínculo con la raíz de separación/consecración. «Voto de separación» explicita el matiz semántico, pero pierde la forma técnica. «Nazareato» es posible, pero menos transparente para una lectura amplia en español.
- source_word: תַּעַר לֹא יַעֲבֹר עַל רֹאשׁוֹ
  english_pob_choice: no razor shall pass over his head
  chosen_spanish: no pasará navaja sobre su cabeza
  alternatives_spanish:
  - no pasará rastrillo sobre su cabeza
  - no se rasurará la cabeza
  lexicon: HALOT
  rationale: «Navaja» mantiene el instrumento concreto del hebreo תַּעַר. La construcción «pasará sobre» preserva el giro idiomático sin convertirlo de inmediato en una paráfrasis. «No se rasurará» aclara el sentido, pero desplaza la imagen textual que el hebreo conserva.
- source_word: עַד מְלֹאת הַיָּמִים
  english_pob_choice: Until the days are completed
  chosen_spanish: Hasta que se cumplan los días
  alternatives_spanish:
  - Hasta el cumplimiento de los días
  - Hasta que los días estén completos
  lexicon: HALOT
  rationale: «Se cumplan» comunica bien la idea de plenitud/completamiento de מְלֹאת. Las alternativas son más literales, pero menos naturales en español contemporáneo.
- source_word: אֲשֶׁר יַזִּיר לַיהוָה
  english_pob_choice: for which he separates himself to Yahweh
  chosen_spanish: por los cuales se aparta para Yahvé
  alternatives_spanish:
  - en los cuales se consagra a Yahvé
  - por los cuales se separa para Yahvé
  lexicon: HALOT
  rationale: «Se aparta» preserva la idea de separación/consecración ligada al verbo de la raíz nazarea. «Consagra» es teológicamente válido, pero más interpretativo. Se mantiene «para Yahvé» siguiendo la terminología del proyecto para יהוה.
- source_word: קָדֹשׁ יִהְיֶה
  english_pob_choice: he shall be holy
  chosen_spanish: será santo
  alternatives_spanish:
  - será santo/consagrado
  - estará consagrado
  lexicon: HALOT
  rationale: «Santo» conserva el término teológico central de קָדֹשׁ. «Consagrado» explica el efecto del apartamiento, pero no reemplaza con precisión el léxico base.
- source_word: גַּדֵּל פֶּרַע שְׂעַר רֹאשׁוֹ
  english_pob_choice: he shall let the locks of the hair of his head grow long
  chosen_spanish: dejará crecer los mechones largos del cabello de su cabeza
  alternatives_spanish:
  - dejará crecer el cabello suelto de su cabeza
  - dejará crecer los largos mechones de su cabeza
  lexicon: HALOT
  rationale: פֶּרַע sugiere cabello suelto, desordenado o sin recortar; «mechones largos» intenta reflejar el resultado visible sin perder naturalidad. «Cabello de su cabeza» sigue la estructura hebrea, pero en español suena repetitivo; se conserva «de su cabeza» para no borrar el detalle anatómico.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para יהוה, usando «Yahvé» en el texto principal para no ocultar el nombre del pacto. «el SEÑOR» se evita como máscara editorial; «Yahvé» es la forma establecida para el lector español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de קָדֹשׁ en el contexto nazareo
  english_pob_reading: he shall be holy
  chosen_spanish_reading: será santo
  alternative_spanish_readings:
  - será consagrado
  - será apartado
  rationale: La palabra hebrea afirma santidad, no solo separación funcional. «Santo» conserva el peso teológico; «consagrado» o «apartado» describen el marco, pero reducen el término central.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del POB al reflejar con más precisión פֶּרַע mediante una imagen de mechones largos, sin perder la estructura legal del hebreo. También conserva la tensión entre el lenguaje técnico de nazareo/separación y el término teológico «santo».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se mantiene «nazareo» como término técnico y se explica en nota la alternativa semántica.
  - Se conserva la imagen hebrea de la navaja pasando sobre la cabeza, con aclaración idiomática en nota.
  - «Santo» se usa para קָדֹשׁ, no «consagrado», para preservar el peso lexical del original.
  - «Mechones largos» intenta equilibrar פֶּרַע con español natural, evitando una paráfrasis que borre el matiz de cabello sin recortar.
