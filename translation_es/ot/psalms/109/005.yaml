translation:
  language: es
  text: Me devolvieron maldad por bien[a], y odio por mi amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pusieron sobre mí el mal por el bien». El verbo hebreo dice literalmente «pusieron/colocaron», pero aquí probablemente tiene el sentido de retribuir o devolver en pago.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: They repaid
  chosen_spanish: Me devolvieron
  alternatives_spanish:
  - me pusieron
  - me colocaron
  - me dieron en pago
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente 'poner/colocar', pero en esta construcción con עָלַי y los paralelismos de intercambio expresa retribución o correspondencia hostil. En español, 'me devolvieron' conserva esa idea de pago/retribución sin perder fluidez poética.
- source_word: עָלַי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - sobre mí
  - contra mí
  lexicon: HALOT
  rationale: Aunque literalmente es 'sobre mí', la versión inglesa ya integra el complemento en la idea de retribución. En español, 'me devolvieron' comunica naturalmente el objeto afectado; 'sobre mí' sonaría más pesado y menos idiomático aquí.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - malicia
  lexicon: HALOT
  rationale: '''Mal'' preserva la amplitud moral y hostil de רָעָה. ''Daño'' limitaría el sentido a perjuicio físico o material, y ''maldad'' o ''malicia'' serían más abstractos o más específicos que el hebreo en este contexto.'
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  - en retorno por
  lexicon: HALOT
  rationale: La preposición marca intercambio o sustitución. 'Por' reproduce de manera breve y natural el paralelismo hebreo de 'mal por bien' y 'odio por mi amor'.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - lo bueno
  - beneficio
  lexicon: HALOT
  rationale: '''Bien'' es el correlato más natural de ''mal'' en español y mantiene el contraste poético. ''Bondad'' enfatizaría cualidad moral; ''beneficio'' estrecharía el sentido.'
- source_word: וְשִׂנְאָה
  english_pob_choice: and hatred
  chosen_spanish: y odio
  alternatives_spanish:
  - y odio profundo
  - y aversión
  lexicon: HALOT
  rationale: '''Odio'' es el equivalente directo y conserva el sustantivo abstracto del hebreo. ''Odio profundo'' añade énfasis no expresado, y ''aversión'' suaviza demasiado el término.'
- source_word: אַהֲבָתִי
  english_pob_choice: my love
  chosen_spanish: mi amor
  alternatives_spanish:
  - mi cariño
  - el amor que les mostré
  lexicon: HALOT
  rationale: '''Mi amor'' mantiene la correspondencia léxica y poética con ''odio''. Aunque puede entenderse como el amor mostrado por el hablante, el sustantivo posesivo conserva la ambigüedad sin explicitar más de lo que el hebreo dice.'
translation_notes:
  revision_awareness: 'Se revisó el texto inglés de la POB y su nota léxica: se preservó la fuerza de intercambio/retribución implícita en שׂוּם + עָלַי + las dos cláusulas con תַּחַת, pero se optó por una formulación española más natural. No hubo cambios de revisión aplicados en el paquete inglés.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo breve y antitético del verso: mal/bien y odio/amor.'
  - Se prefirió 'bien' y 'mal' por su correspondencia poética y su naturalidad en español.
  - La nota al pie conserva la alternativa literal del verbo hebreo, como en el audit trail inglés.
