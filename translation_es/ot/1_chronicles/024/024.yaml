translation:
  language: es
  text: 'Los hijos de Uziel: Micá; de los hijos de Micá: Shamor[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede representarse «Shemor» como forma alternativa de este nombre final; la grafía hebrea שמור admite ambas transliteraciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, el plural constructo de בן se expresa de manera natural y directa como «hijos de». «Descendientes de» también sería posible, pero es menos preciso para el registro enumerativo del pasaje.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uziel
  alternatives_spanish:
  - Uzziel
  lexicon: Nombre propio (transliteración convencional)
  rationale: Como nombre propio, en español bíblico es más natural «Uziel» que la grafía inglesa con doble z. Mantiene la referencia del nombre sin imponer una transliteración menos idiomática en español.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micaía
  alternatives_spanish:
  - Micah
  - Miqueas
  lexicon: Nombre propio (transliteración convencional)
  rationale: Aquí se trata de un nombre personal en una genealogía, no del profeta. «Micaía» refleja bien la forma hebrea y evita confusión con «Miqueas»; «Micah» sería anglicismo no deseable en el texto español.
- source_word: לִ/בְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - perteneciente a los hijos de
  lexicon: HALOT
  rationale: El prefijo ל en esta construcción genealógica funciona como enlace de lista, no como dativo pleno. En español se conserva con «de los hijos de», que reproduce la relación de pertenencia sin forzar un «para» artificial.
- source_word: שמור
  english_pob_choice: Shamir
  chosen_spanish: Samir
  alternatives_spanish:
  - Shemor
  - Shamir
  lexicon: Nombre propio; transliteración del hebreo שמור
  rationale: El hebreo permite una representación cercana a «Shemor», pero la tradición inglesa del proyecto opta por «Shamir» por convención. En español, «Samir» ofrece una forma legible y cercana al valor consonántico del nombre, evitando la pronunciación inglesa y manteniendo la opción transliterativa abierta.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo breve y el patrón genealógico del contexto, tomando como guía el auditable inglés POB, pero ajustando la transliteración a un español bíblico más natural donde no se pierde la identificación de los nombres propios.
  spanish_consistency_notes:
  - Se mantiene «hijos de» en la fórmula genealógica para conservar el valor constructo del hebreo.
  - Se evita el uso de «Cristo», «SEÑOR» u այլ terminología no pertinente; el verso contiene solo nombres propios y una estructura de parentesco.
  - La nota al pie preserva la alternativa documentada para el nombre final sin forzar una única vocalización.
