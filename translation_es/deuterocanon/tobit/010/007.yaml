translation:
  language: es
  text: 'Y ella le dijo: «Calla; no me engañes. Mi hijo ha perecido[a]». Y cada día salía al camino por donde él había partido; de día no comía pan, y de noche no cesaba de lamentar a Tobías, su hijo, hasta que se cumplieron[b] los catorce días de la fiesta de bodas, que Raguel había jurado hacerle pasar allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi hijo está perdido». El griego ἀπώλετο puede expresar pérdida o muerte presumida; aquí refleja la conclusión temerosa de la madre, no una confirmación del narrador.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los catorce días del matrimonio». La expresión se refiere al período de celebración de la boda.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίγα
  english_pob_choice: Be quiet
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Cállate
  lexicon: LSJ
  rationale: Imperativo breve y abrupto, fiel al tono impaciente de la escena; en español moderno 'Calla' suena natural y mantiene la fuerza del mandato.
- source_word: μὴ πλάνα με
  english_pob_choice: do not mislead me
  chosen_spanish: no me engañes
  alternatives_spanish:
  - no me desvíes
  - no me confundas
  - no me extravíes
  lexicon: LSJ
  rationale: El verbo puede implicar hacer errar o engañar; en este contexto la madre rechaza un consuelo falso. 'Engañes' comunica bien esa desconfianza sin forzar una intención fraudulenta explícita.
- source_word: ἀπώλετο τὸ παιδίον μου
  english_pob_choice: My child has perished
  chosen_spanish: Mi hijo ha perecido
  alternatives_spanish:
  - Mi niño se ha perdido
  - Mi hijo ha muerto
  - Mi hijo está perdido
  lexicon: LSJ
  rationale: '''Perecido'' conserva la carga de pérdida/destrucción sin convertir el lamento en una afirmación narrativa objetiva. ''Mi hijo'' mantiene el referente explícito que en español es más natural que repetir el diminutivo.'
- source_word: καθʼ ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - diariamente
  lexicon: LSJ
  rationale: Equivalente idiomático claro y directo en español.
- source_word: εἰς τὴν ὁδὸν ἔξω οἵας ἀπῆλθεν
  english_pob_choice: go out to the road by which he had departed
  chosen_spanish: salía al camino por donde él había partido
  alternatives_spanish:
  - salía al camino por el que él se había ido
  - salía al camino de donde él había partido
  lexicon: LSJ
  rationale: La frase describe la ruta que Tobias tomó. 'Por donde él había partido' conserva el sentido de trayecto y evita una literalidad poco natural.
- source_word: ἡμέρας τε ἄρτον οὐκ ἤσθιεν
  english_pob_choice: by day she would eat no bread
  chosen_spanish: de día no comía pan
  alternatives_spanish:
  - durante el día no comía alimento
  - de día no comía
  lexicon: LSJ
  rationale: '''Pan'' mantiene la concreción del original y la austeridad del duelo; en español bíblico suena natural sin convertirlo en mero genérico.'
- source_word: οὐ διέλιμπανεν θρηνοῦσα
  english_pob_choice: did not cease mourning
  chosen_spanish: no cesaba de lamentar
  alternatives_spanish:
  - no dejaba de lamentar
  - no paraba de llorar
  - no cesaba de llorar
  lexicon: LSJ
  rationale: 'La perífrasis refleja el imperfecto durativo: un lamento continuo. ''Lamentar'' recoge mejor el valor de θρηνεῖν que un simple ''llorar''.'
- source_word: Τωβείαν τὸν υἱὸν αὐτῆς
  english_pob_choice: Tobias her son
  chosen_spanish: a Tobías, su hijo
  alternatives_spanish:
  - a Tobías, su hijo varón
  - a Tobías, su hijo amado
  lexicon: LSJ
  rationale: Mantiene el nombre propio y la identificación filial explícita, con un orden natural en español.
- source_word: συνετελέσθησαν
  english_pob_choice: were completed
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - se completaron
  - llegaron a su fin
  - se terminaron
  lexicon: LSJ
  rationale: Verbo natural en español para el cumplimiento de un plazo; conserva el cierre del período sin añadir matiz interpretativo.
- source_word: αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου
  english_pob_choice: the fourteen days of the wedding feast
  chosen_spanish: los catorce días de la fiesta de bodas
  alternatives_spanish:
  - las catorce jornadas del matrimonio
  - los catorce días de la celebración nupcial
  lexicon: LSJ
  rationale: '''Fiesta de bodas'' comunica el período celebratorio al que alude el contexto narrativo, sin reducirlo solo al estado legal de matrimonio.'
- source_word: ἃς ὤμοσεν Ῥαγουὴλ ποιῆσαι αὐτὸν ἐκεῖ
  english_pob_choice: which Raguel had sworn that he should spend there
  chosen_spanish: que Raguel había jurado hacerle pasar allí
  alternatives_spanish:
  - que Raguel había jurado hacer que permaneciera allí
  - que Raguel había jurado que pasara allí
  lexicon: LSJ
  rationale: '''Hacerle pasar allí'' expresa la obligación de permanecer durante ese tiempo de forma idiomática y fiel a la construcción comprimida del griego.'
theological_decisions:
- issue: 'El sentido de ἀπώλετο: pérdida, desaparición o muerte presumida'
  english_pob_reading: The Greek can express either loss or presumed death; here it reflects the mother's fearful conclusion, not the narrator's confirmation.
  chosen_spanish_reading: Mi hijo ha perecido.
  alternative_spanish_readings:
  - Mi hijo está perdido.
  - Mi hijo ha muerto.
  rationale: 'Se conserva la tensión del griego: la madre habla desde su angustia, sin convertir su exclamación en un dato narrativo confirmado. ''Perecido'' deja abierta la carga de pérdida y posible muerte.'
  doctrine_reference: Narrative speech vs. narrator affirmation; lexical ambiguity of aorist middle/passive ἀπώλετο.
- issue: La frase del final sobre los catorce días y el juramento de Raguel
  english_pob_reading: the fourteen days of the wedding feast were completed, which Raguel had sworn that he should spend there.
  chosen_spanish_reading: se cumplieron los catorce días de la fiesta de bodas, que Raguel había jurado hacerle pasar allí.
  alternative_spanish_readings:
  - llegaron a su fin los catorce días de la fiesta de bodas
  - que Raguel había jurado que pasara allí
  rationale: La redacción conserva que el tiempo fijado era una obligación de permanencia impuesta por juramento, sin suavizar el compromiso narrativo ni cambiar el sentido a una simple estancia voluntaria.
  doctrine_reference: Narrative constraint by oath; integrity of sworn obligation in Tobit.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audio griego-inglés: se mantuvo el valor durativo de οὐ διέλιμπανεν con una fórmula formal en español (''no cesaba de lamentar'') y se preservó la ambigüedad de ἀπώλετο con ''ha perecido'' para no absolutizar la conclusión materna.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene 'Tobías' para el nombre propio según la tradición española, coherente con el inglés POB.
  - '''Pan'' se conserva por su concreción bíblica y no se sustituye por ''alimento'' salvo necesidad contextual.'
  - Se evita 'señor' u otras formulaciones devocionales no presentes en el texto.
