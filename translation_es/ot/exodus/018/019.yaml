  - marker: c
    text: «Los asuntos» se refiere aquí a los casos o disputas del pueblo llevados para decisión.
    reason: cultural_note
  revision_rationale: La revisión corrige el anclaje erróneo de la nota [a], ordena y ubica las notas donde corresponden según el contenido que explican, mejora la naturalidad de «Sé tú para el pueblo» sin abandonar la transparencia frente al hebreo, y elimina un pronombre redundante para un español más fluido y digno. Se mantiene «Dios», «delante de Dios» y «asuntos» como decisiones fieles al expediente léxico y teológico.
