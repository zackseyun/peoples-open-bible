translation:
  language: es
  text: Y si algunos de ustedes son aptos para ser inscritos entre los nuestros[a], que sean inscritos, y haya paz entre nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «entre los que están alrededor de nosotros»; la expresión probablemente alude a la incorporación al propio pueblo o partido del hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτήδειοι
  english_pob_choice: fit
  chosen_spanish: aptos
  alternatives_spanish:
  - idóneos
  - capaces
  - calificados
  - adecuados
  lexicon: LSJ
  rationale: El adjetivo apunta a idoneidad o aptitud para una incorporación formal. «Aptos» conserva la idea de capacidad/adecuación sin sobrecargar el matiz jurídico.
- source_word: γράφηναι
  english_pob_choice: to be enrolled
  chosen_spanish: ser inscritos
  alternatives_spanish:
  - ser registrados
  - ser enrolados
  - ser apuntados
  lexicon: LSJ
  rationale: La forma expresa inscripción administrativa. «Ser inscritos» mantiene el campo semántico de registro oficial y funciona bien con el mandato siguiente.
- source_word: τοὺς περὶ ἡμᾶς
  english_pob_choice: among our people
  chosen_spanish: entre los nuestros
  alternatives_spanish:
  - entre nuestra gente
  - entre los que están a nuestro lado
  - en nuestro grupo
  lexicon: LSJ
  rationale: La frase literal es «los alrededor de nosotros», pero en contexto político y de afiliación indica incorporación al propio bando o comunidad. «Entre los nuestros» conserva cercanía e inclusión sin falsear el sentido relacional.
- source_word: ἐγγραφέσθωσαν
  english_pob_choice: let them be enrolled
  chosen_spanish: que sean inscritos
  alternatives_spanish:
  - que sean registrados
  - que se los inscriba
  - que entren en los registros
  lexicon: LSJ
  rationale: Se preserva la repetición administrativa del verbo de inscripción. La pasiva exhortativa en español transmite bien el imperativo colectivo griego.
- source_word: γενέσθω ἀνὰ μέσον ἡμῶν εἰρήνη
  english_pob_choice: let there be peace between us
  chosen_spanish: haya paz entre nosotros
  alternatives_spanish:
  - que haya paz entre nosotros
  - sea la paz entre nosotros
  - que exista paz entre nosotros
  lexicon: LSJ
  rationale: Es una fórmula de paz diplomática. «Haya paz entre nosotros» es natural en español y mantiene el sentido recíproco de la relación entre grupos.
theological_decisions:
- issue: Referencia relacional de «los nuestros» frente a una lectura meramente espacial de «los que están alrededor de nosotros»
  english_pob_reading: among our people
  chosen_spanish_reading: entre los nuestros
  alternative_spanish_readings:
  - entre los que están a nuestro alrededor
  - entre nuestra gente
  rationale: El griego permite una lectura literal espacial, pero el contexto de inscripción y pertenencia favorece una incorporación al grupo propio. En español, «entre los nuestros» conserva esa tensión entre literalidad y sentido contextual sin imponer una interpretación demasiado precisa.
  doctrine_reference: N/A (decisión histórica y semántica, no doctrinal)
- issue: Tono de la fórmula de paz final
  english_pob_reading: let there be peace between us
  chosen_spanish_reading: haya paz entre nosotros
  alternative_spanish_readings:
  - que haya paz entre nosotros
  - que reine la paz entre nosotros
  rationale: La frase es una fórmula política/diplomática de reconciliación. «Haya paz entre nosotros» mantiene su valor performativo sin añadir matices devocionales ajenos al texto.
  doctrine_reference: N/A (fórmula epistolar/diplomática)
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su nota sobre τοὺς περὶ ἡμᾶς; la versión española conserva el registro administrativo de inscripción y la fórmula de paz sin añadir contenido doctrinal. No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se mantuvo «inscritos» para ambos verbos de la familia γραφ-/ἐγγραφ-, preservando la repetición administrativa del griego.
  - Se evitó «SEÑOR» o terminología litúrgica ajena, ya que el versículo no contiene vocabulario divino ni cristológico.
  - La construcción «entre los nuestros» busca equilibrio entre literalidad y comprensibilidad, coherente con el principio de equivalencia óptima del POB.
