    rationale: ἐπιμέλεια apunta a atención, cuidado o gestión; «dedicarse» en español puede implicar entrega más fuerte o vocacional. «atiendan los asuntos de los judíos» conserva mejor la amplitud administrativa indicada por la nota inglesa.
  - severity: low
    issue: Cadencia algo pesada en «Porque ... y porque ...»
    rationale: Es comprensible, pero en español formal suena más fluido «Ya que ... y deseando ...» o «Puesto que ... y como deseamos ...», sin alterar el valor causal del participio.
