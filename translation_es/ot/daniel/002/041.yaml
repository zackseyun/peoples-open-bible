translation:
  language: es
  text: Y como viste los pies[a] y los dedos, en parte de barro de alfarero y en parte de hierro, el reino será dividido; pero algo de la firmeza[b] del hierro estará en él, así como viste el hierro mezclado con barro fangoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las piernas y los dedos». El arameo puede referirse a las extremidades inferiores de la estatua; en contexto, «pies» es la lectura más natural.
    reason: lexical_alternative
  - marker: b
    text: O «algo de la fuerza del hierro estará en él». El término arameo puede denotar firmeza, fuerza o estabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלַיָּא וְאֶצְבְּעָתָא
  english_pob_choice: the feet and toes
  chosen_spanish: los pies y los dedos
  alternatives_spanish:
  - las piernas y los dedos
  - los pies y los dedos de los pies
  lexicon: HALOT
  rationale: En este contexto visionario se trata de la parte inferior de la estatua; en español, «pies» comunica mejor la imagen que «piernas». «Dedos» mantiene la referencia a los toes sin forzar una perífrasis pesada.
- source_word: מנ/הון ... ו/מנ/הון
  english_pob_choice: partly ... and partly
  chosen_spanish: en parte ... y en parte
  alternatives_spanish:
  - parcialmente ... y parcialmente
  - unos de ... y otros de ...
  lexicon: HALOT
  rationale: El giro arameo expresa composición mixta. «En parte ... y en parte» reproduce la distribución de materiales de manera natural en español y conserva la idea de procedencia parcial.
- source_word: חֲסַף דִּי פֶחָר
  english_pob_choice: potter’s clay
  chosen_spanish: barro de alfarero
  alternatives_spanish:
  - arcilla de alfarero
  - barro del alfarero
  lexicon: HALOT
  rationale: «חֲסַף» y «פֶחָר» apuntan a material de alfarería. Opté por «barro de alfarero» porque en español conserva la asociación artesanal y suena más natural que un calco rígido; «arcilla» sería posible, pero aquí «barro» dialoga mejor con la segunda mitad del versículo.
- source_word: פַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  - acero
  lexicon: HALOT
  rationale: Término estándar para el metal en la visión. «Hierro» mantiene la correspondencia simbólica sin necesidad de explicación adicional.
- source_word: מַלְכ֤וּ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - un reino
  - el poder real
  lexicon: HALOT
  rationale: El referente es específico en el contexto de la interpretación de la estatua; por eso se traduce con artículo definido.
- source_word: פְלִיגָה
  english_pob_choice: divided
  chosen_spanish: será dividido
  alternatives_spanish:
  - será partido
  - estará dividido
  lexicon: HALOT
  rationale: El participio/estado verbal expresa una condición de división. «Será dividido» conserva la voz pasiva y el carácter interpretativo del anuncio.
- source_word: וּמִן נִצְבְּתָא דִי פַרְזְלָא לֶהֱוֵא בַהּ
  english_pob_choice: some of the firmness of iron will be in it
  chosen_spanish: algo de la firmeza del hierro estará en él
  alternatives_spanish:
  - algo de la fuerza del hierro estará en él
  - parte de la estabilidad del hierro estará en él
  lexicon: HALOT
  rationale: «נִצְבְּתָא» puede denotar firmeza, fuerza o estabilidad. «Firmeza» conserva la imagen concreta sin cerrar la gama semántica; «algo de» refleja el valor partitivo de מן. Usé «estará en él» para mantener la referencia al reino sin sobreexplicarla.
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - del mismo modo que
  - tal como
  lexicon: HALOT
  rationale: La construcción introduce correspondencia explicativa entre lo visto y la interpretación. «Así como» es la forma más natural y clara en español.
- source_word: מְעָרַב
  english_pob_choice: mixed
  chosen_spanish: mezclado
  alternatives_spanish:
  - mezclado entre sí
  - mismo
  lexicon: HALOT
  rationale: El participio describe la mezcla de los materiales. «Mezclado» sigue de cerca la imagen y se integra bien con la frase siguiente.
- source_word: בַּחֲסַף טִינָא
  english_pob_choice: with muddy clay
  chosen_spanish: con barro fangoso
  alternatives_spanish:
  - con barro húmedo
  - con arcilla fangosa
  lexicon: HALOT
  rationale: La duplicación de términos sugiere una materia terrosa y lodosa, no solo «arcilla» seca. «Barro fangoso» preserva ese matiz y mantiene el eco material de la línea anterior.
theological_decisions:
- issue: 'La fuerza de נִצְבְּתָא: firmeza/fortaleza/estabilidad'
  english_pob_reading: some of the firmness of iron will be in it
  chosen_spanish_reading: algo de la firmeza del hierro estará en él
  alternative_spanish_readings:
  - algo de la fuerza del hierro estará en él
  - algo de la estabilidad del hierro estará en él
  rationale: El audit trail inglés retiene «firmness» y nota que el término puede significar firmeza, fuerza o estabilidad. En español, «firmeza» conserva esa ambigüedad sin imponer una interpretación más abstracta que el texto no exige.
  doctrine_reference: Daniel 2:41; léxico arameo נִצְבְּתָא
- issue: 'La última expresión material: חֲסַף טִינָא'
  english_pob_reading: mixed with muddy clay
  chosen_spanish_reading: mezclado con barro fangoso
  alternative_spanish_readings:
  - mezclado con arcilla fangosa
  - mezclado con barro
  rationale: El inglés revisado prefirió «muddy clay» para reflejar mejor la acumulación aramea. En español, «barro fangoso» preserva esa tensión entre material de alfarería y lodo, sin neutralizar la imagen.
  doctrine_reference: Daniel 2:41; construcción aramea de doble sustantivo
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de Daniel 2:41, incluyendo la revisión que cambió la última frase a una expresión más natural de «muddy clay». No se dependió mecánicamente del inglés: se contrastó con el arameo para resolver רַגְלַיָּא/אֶצְבְּעָתָא como «pies y dedos», mantener el valor partitivo de מן, y conservar la tensión semántica de נִצְבְּתָא y de la duplicación material final.'
  spanish_consistency_notes:
  - Se usa «reino» para מַלְכוּ conforme al contexto de la estatua interpretada.
  - Se traduce «hierro» de manera uniforme para פַּרְזֶל.
  - Se mantiene «barro» en ambos miembros de la comparación final para reflejar la relación entre חֲסַף y טִינָא.
  - Se evita «SEÑOR» u otra sustitución teológica no presente en el versículo.
  - La voz pasiva «será dividido» conserva el carácter oracular del anuncio.
