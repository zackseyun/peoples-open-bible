translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: rebuscarán por completo el remanente de Israel como una vid; vuelve a pasar tu mano, como vendimiador, sobre los sarmientos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «zarcillos»; el término hebreo es raro y su referente preciso es debatido. Algunos también lo han entendido como «cestas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé», conforme al estándar del proyecto en español, evitando la máscara litúrgica «SEÑOR» y manteniendo la referencia explícita al nombre del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» comunica de forma natural el título divino y preserva el trasfondo de soberanía militar/cósmica sin volverlo opaco en español.
- source_word: עוֹלֵל יְעוֹלְלוּ
  english_pob_choice: They will thoroughly glean
  chosen_spanish: serán despojados por completo
  alternatives_spanish:
  - serán totalmente rebuscados
  - los rebuscarán por completo
  - serán completamente vendimiados
  lexicon: HALOT
  rationale: La repetición verbal intensiva expresa acción completa y enfática. En español, «serán despojados por completo» mantiene la fuerza de despojo total, aunque pierde la imagen agrícola; por eso se conserva la metáfora en el resto de la frase con «vid» y «vendimiador».
- source_word: כַגֶּפֶן
  english_pob_choice: as a vine
  chosen_spanish: como de una vid
  alternatives_spanish:
  - como una vid
  - como de una parra
  lexicon: HALOT
  rationale: «Vid» es el equivalente más natural y preciso en español bíblico para la planta de la uva; «como de una vid» refleja el valor comparativo del hebreo y encaja con la imagen de recolección.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el resto de Israel
  alternatives_spanish:
  - el remanente de Israel
  - lo que queda de Israel
  lexicon: HALOT
  rationale: «Resto» mantiene la referencia a los sobrevivientes/restantes sin imponer de entrada la carga técnica de «remanente»; en este contexto de juicio y supervivencia, ambas opciones son válidas, pero «resto» resulta más sobrio y transparente en español.
- source_word: הָשֵׁב יָדְךָ
  english_pob_choice: pass your hand over the branches again
  chosen_spanish: pasa otra vez tu mano
  alternatives_spanish:
  - vuelve a pasar tu mano
  - extiende de nuevo tu mano
  lexicon: HALOT
  rationale: La orden imperativa pide repetir la acción de pasar la mano; «pasa otra vez tu mano» sigue de cerca el sentido revisado en inglés y evita la literalidad menos natural de «devuelve tu mano».
- source_word: כְּבוֹצֵר
  english_pob_choice: like a grape-gatherer
  chosen_spanish: como vendimiador
  alternatives_spanish:
  - como cosechador de uvas
  - como recolector de uvas
  lexicon: HALOT
  rationale: «Vendimiador» es el término español más preciso y digno para quien recoge uvas, preservando el campo semántico agrícola del versículo.
- source_word: עַל סַלְסִלּוֹת
  english_pob_choice: over the branches
  chosen_spanish: sobre las sarmientos
  alternatives_spanish:
  - sobre los sarmientos
  - sobre las ramas
  - sobre los pámpanos
  lexicon: HALOT
  rationale: El término hebreo es raro y debatido; la lectura inglesa opta por «branches», pero en español «sarmientos» comunica mejor la imagen vitícola. Se mantiene la ambigüedad dentro del mismo campo de la vid, sin fijar dogmáticamente el referente.
theological_decisions:
- issue: Nombre divino יְהֹוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto para el nombre del pacto, conservándolo de manera explícita y transparente en la traducción española.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: No se atenúa el título con una paráfrasis devocional; se mantiene la idea de autoridad y poder de Yahvé sobre los ejércitos.
  doctrine_reference: 'DOCTRINE.md Contested terms: divine titles'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que suaviza la acción final para hacerla más natural («pass your hand over the branches again») sin perder la repetición intensiva del gesto de vendimia. También conserva la decisión revisada de cerrar la imagen agrícola con una fórmula ordenada y fluida en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהֹוָה en coherencia con el estándar del proyecto.
  - Se conserva un registro bíblico moderno y digno, evitando el calco excesivo.
  - La metáfora agrícola se preserva con «vid» y «vendimiador», mientras que el verbo intensivo se vierte con un pasivo enfático natural en español.
  - La nota sobre «sarmientos» refleja la misma incertidumbre léxica que la nota inglesa sobre el término raro, sin cerrar indebidamente el sentido.
