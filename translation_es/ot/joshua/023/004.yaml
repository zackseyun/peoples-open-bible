revisions:
- from: Mira[a], yo les he repartido estas naciones que quedan como herencia para sus tribus, desde el Jordán, junto con todas las naciones que he exterminado, hasta el Mar Grande, hacia donde se pone el sol.
  to: Miren, yo les he repartido estas naciones que quedan como herencia para sus tribus, desde el Jordán, junto con todas las naciones que he eliminado, hasta el Mar Grande, hacia donde se pone el sol[a].
  rationale: Se corrige el imperativo inicial al plural («Miren») para reflejar רְאוּ. Se cambia «he exterminado» por «he eliminado» para acercarse mejor a הִכְרַתִּי según la decisión auditada «cut off», sin suavizar indebidamente el juicio. Se mueve la nota al lugar correcto, anclándola en la expresión que explica.
