    text: Or, possibly, 'tin,' 'lead,' or 'plummet'; the Hebrew term likely refers to a measuring device or material associated with a plumb line.
    reason: lexical_alternative
  - marker: b
    text: '''I will not again pass by them'' likely means ''I will no longer spare them'' or ''I will no longer overlook their sin.'''
    reason: alternative_reading
