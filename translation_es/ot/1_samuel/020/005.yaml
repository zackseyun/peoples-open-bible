base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/005.yaml
  text: David said to Jonathan[a], “Look, tomorrow is the new moon, and I ought to sit with the king to eat. But let me go[b], that I may hide myself in the field until the third evening.”
  footnotes:
  - marker: a
    text: Or “until the evening of the third day.” The Hebrew phrase is elliptical.
    reason: lexical_alternative
  - marker: b
    text: “New moon” refers to the monthly new moon observance, often marked by a special meal.
    reason: cultural_note
