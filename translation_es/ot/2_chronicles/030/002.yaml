translation:
  language: es
  text: Entonces el rey, sus oficiales y toda la asamblea en Jerusalén decidieron celebrar la Pascua en el segundo mes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hacer la Pascua».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: decided
  chosen_spanish: decidieron
  alternatives_spanish:
  - tomaron consejo
  - consultaron juntos
  - resolvieron
  lexicon: HALOT
  rationale: El nifal de יעץ expresa aquí deliberación colectiva que culmina en una resolución. «Decidieron» comunica el resultado natural en español y conserva el sentido de acuerdo conjunto sin volverlo demasiado arcaico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa del título hebreo. El contexto identifica a Ezequías, pero el texto usa el título, no el nombre.
- source_word: וְשָׂרָיו
  english_pob_choice: and his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus líderes
  - sus jefes
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a autoridades o funcionarios de alto rango. «Oficiales» es claro y evita la posible carga ambigua de «príncipes» en español.
- source_word: וְכָל הַקָּהָל
  english_pob_choice: and all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: «Asamblea» conserva el sentido corporativo de קָהָל sin introducir asociaciones eclesiásticas que «congregación» puede sugerir.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Traslado locativo directo y natural.
- source_word: לַעֲשׂוֹת הַפֶּסַח
  english_pob_choice: to keep the Passover
  chosen_spanish: celebrar la Pascua
  alternatives_spanish:
  - guardar la Pascua
  - observar la Pascua
  - hacer la Pascua
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «hacer la Pascua», es decir, realizar la observancia festiva. En español, «celebrar la Pascua» transmite la acción cultual de manera natural sin perder el valor ritual del pasaje. Se mantiene la tensión entre literalidad e idiomaticidad que el inglés POB resolvió con «keep».
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - durante el segundo mes
  lexicon: HALOT
  rationale: Equivalencia temporal directa; el detalle cobra importancia por el contraste con la fecha habitual de la Pascua, pero el verso solo nombra el momento.
theological_decisions:
- issue: Cómo renderizar el idiomático «hacer la Pascua» sin perder el sentido litúrgico
  english_pob_reading: to keep the Passover
  chosen_spanish_reading: celebrar la Pascua
  alternative_spanish_readings:
  - observar la Pascua
  - guardar la Pascua
  - hacer la Pascua
  rationale: El hebreo no describe simplemente una acción genérica, sino la observancia de una fiesta pactal. «Celebrar» comunica bien la realización ritual en español moderno y evita una literalidad extraña. No añade contenido doctrinal nuevo, solo hace inteligible el idiom en español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del hebreo sobre la tradición de traducción'
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión auditada; no se registran cambios posteriores en el archivo inglés, por lo que la redacción española se mantiene alineada con la solución aprobada.
  spanish_consistency_notes:
  - Se conserva «Pascua» como término festivo estándar en español bíblico.
  - «Asamblea» se usa para קָהָל con el fin de mantener uniformidad y evitar carga eclesiástica innecesaria.
  - Se mantiene el segundo mes sin explicación ampliada para no sobreinterpretar el texto base.
