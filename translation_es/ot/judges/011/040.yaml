    rationale: El historial aplicado del POB inglés cambió explícitamente el texto principal a «commemorate». El español debe seguir esa decisión documentada, salvo razón fuerte en contra, que aquí no existe.
  - severity: medium
    issue: La nota al pie contiene «recountar», forma no idiomática en español.
    rationale: Es un calco defectuoso del inglés «recount». Debe reemplazarse por una expresión española clara, como «hablar de» o «relatar acerca de».
  - severity: low
    issue: La racionalización léxica y teológica del borrador español sigue una etapa anterior del expediente inglés.
    rationale: No impide entender el versículo, pero muestra desalineación con la auditoría final y debe corregirse en la revisión textual.
  revised_spanish_text: De año en año las hijas de Israel solían ir a conmemorar[a] a la hija de Jefté el galaadita cuatro días en el año.
