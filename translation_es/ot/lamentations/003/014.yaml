translation:
  language: es
  text: He llegado a ser un objeto de burla para todo mi pueblo[a], su canción todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «su canción de burla» o «su canción de escarnio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he venido a ser
  alternatives_spanish:
  - llegué a ser
  - he llegado a ser
  - fui
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante y continuo en el lamento; en español, «he venido a ser» conserva la idea de resultado sin forzar un pretérito simple que suene cerrado.
- source_word: שְּׂחֹק
  english_pob_choice: a laughingstock
  chosen_spanish: un objeto de burla
  alternatives_spanish:
  - un hazmerreír
  - un blanco de risa
  - una burla
  lexicon: HALOT
  rationale: El sustantivo denota alguien o algo objeto de risa/derisión. «Objeto de burla» mantiene el valor predicativo y evita un coloquialismo demasiado marcado como «hazmerreír».
- source_word: לְכָל
  english_pob_choice: to all
  chosen_spanish: para todo
  alternatives_spanish:
  - ante todo
  - para todos
  lexicon: HALOT
  rationale: La ל marca la relación hacia quienes se burlan; en español, «para todo mi pueblo» transmite esa direccionalidad y preserva la relación social implicada.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi propio pueblo
  - mi gente
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se expresa de forma directa como «mi pueblo»; «mi gente» sería más libre y menos uniforme con el registro bíblico.
- source_word: נְגִינָתָם
  english_pob_choice: their song
  chosen_spanish: su cantiga
  alternatives_spanish:
  - su canción
  - su canción burlona
  - su canto
  lexicon: HALOT
  rationale: El término puede referirse a canción, canto o pieza de burla. «Cantiga» permite un sustantivo musical-literario comprensible en español bíblico, sin cerrar del todo la posible carga burlona que el contexto sugiere.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: La expresión temporal se vierte de modo idiomático y natural en español con «todo el día».
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo y con la decisión inglesa auditada de mantener una formulación sobria para el campo semántico de נְגִינָה, sin añadir una interpretación más fuerte de la que el verso por sí solo exige.
  spanish_consistency_notes:
  - Se preserva el tono de lamentación con una sintaxis sencilla y directa.
  - Se evitó «SEÑOR» u otro término teológico no pertinente, pues el versículo no contiene el nombre divino.
  - Se prefirió «he venido a ser» para reflejar estado resultante, en línea con la lectura inglesa.
  - El marcador de nota [a] se ancla en «burla» para señalar la alternativa semántica de נְגִינָתָם.
