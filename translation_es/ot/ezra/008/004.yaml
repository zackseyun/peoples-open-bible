translation:
  language: es
  text: 'De los hijos de Pahat-Moab: Eliehoenai hijo de Zeraías, y con él doscientos varones[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “males”. El hebreo dice específicamente “los varones”, enfatizando el sexo más que un término general para personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - De los descendientes de
  - De los hijos de
  lexicon: HALOT
  rationale: En este contexto genealógico/listado, la expresión hebrea funciona como designación de clan. ‘Hijos de’ conserva la forma del hebreo mejor que ‘descendientes’, y ‘de’ refleja la preposición מִן.
- source_word: פַּחַת מוֹאָב
  english_pob_choice: Pahath-moab
  chosen_spanish: Pahat-Moab
  alternatives_spanish:
  - Pahath-Moab
  - Pahat Moab
  lexicon: HALOT
  rationale: Es un nombre propio de familia/clan, por lo que se translitera. Se mantiene como compuesto con guion para reflejar que forma una unidad nominal.
- source_word: אֶלְיְהוֹעֵינַי
  english_pob_choice: Eliehoenai
  chosen_spanish: Eliehoenai
  alternatives_spanish:
  - Eliejoenai
  - Elihoenai
  lexicon: HALOT
  rationale: Los nombres personales se transliteran. ‘Eliehoenai’ sigue la convención de la POB inglesa y preserva la forma reconocible del nombre sin intentar traducir sus elementos teofóricos.
- source_word: בֶּן זְרַחְיָה
  english_pob_choice: son of Zerahiah
  chosen_spanish: hijo de Zeraías
  alternatives_spanish:
  - el hijo de Zeraías
  - hijo de Zerahía
  lexicon: HALOT
  rationale: La relación filial es explícita. ‘Hijo de’ es natural en español y conserva la estructura genealógica; ‘Zeraías’ es la transliteración española habitual del nombre hebreo.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  - y con él
  lexicon: HALOT
  rationale: La coordinación hebrea se mantiene con ‘y’, y el complemento pronominal se vierte naturalmente como ‘con él’.
- source_word: מָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - '200'
  lexicon: HALOT
  rationale: Número cardinal directo; se prefiere la forma escrita por fluidez litúrgica y editorial.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: ‘Varones’ comunica el valor sexado del hebreo sin sonar tan técnico como ‘males’ en español. Conserva la tensión lexical entre un término biológico y uno social, que el POB inglés resolvió con ‘males’.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] en el texto español exactamente donde corresponde. La redacción sigue de cerca la POB inglesa revisada, con ajuste mínimo para el español natural.
  spanish_consistency_notes:
  - Se mantiene el orden de lista genealógica del hebreo y de la POB inglesa.
  - ‘Pahat-Moab’ se conserva como nombre propio compuesto con guion.
  - ‘Eliehoenai’ y ‘Zeraías’ siguen convenciones transliteradas en español.
  - ‘Varones’ evita neutralizar el rasgo de sexo explícito del hebreo.
  - El marcador [a] aparece dos veces porque la nota se aplica tanto a la frase cuantificada como al sustantivo de sexo; ambas ocurrencias remiten a la misma alternativa lexical.
