id: 1TI.5.8
reference: 1 Timothy 5:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δέ τις τῶν ἰδίων καὶ ⸀μάλιστα οἰκείων οὐ ⸀προνοεῖ, τὴν πίστιν ἤρνηται καὶ ἔστιν ἀπίστου χείρων.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/008.yaml
  text: But if anyone does not provide for his own[a], and especially for members of his household[b], he has denied the faith and is worse than an unbeliever.
  footnotes:
  - marker: a
    text: Or 'his own people'; the phrase is broader than only those living under one roof, while 'members of his household' specifies the especially obligated subset.
    reason: lexical_alternative
  - marker: b
    text: Or 'has renounced the faith.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 누구든지 자기 가족[a], 특히 자기 집안 식구를 돌보지 않는다면, 그는 믿음을 부인한 것이며[b] 믿지 않는 자보다 더 악한 자입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기 친족」. 본 어구는 한 지붕 아래 사는 자들만이 아니라 보다 넓은 친족을 가리키며, 「자기 집안 식구」는 특별히 책임이 큰 부분 집합을 명시한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「믿음을 저버린 것이며」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ἰδίων
  english_pob_choice: his own
  chosen_korean: 자기 가족
  alternatives_korean:
  - 자기 친족
  - 자기 사람들
  lexicon: BDAG
  rationale: ἴδιοι의 「자기 사람들·친족」의 폭을 한국어로 자연스럽게.
- source_word: οἰκείων
  english_pob_choice: members of his household
  chosen_korean: 자기 집안 식구
  alternatives_korean:
  - 한 집안 사람들
  - 자기 식솔
  lexicon: BDAG
  rationale: οἰκεῖοι의 「한 집안에 속한 자들」.
- source_word: οὐ προνοεῖ
  english_pob_choice: does not provide for
  chosen_korean: 돌보지 않는다면
  alternatives_korean:
  - 부양하지 않는다면
  - 챙기지 않는다면
  lexicon: BDAG
  rationale: προνοέω의 「미리 돌보다·부양하다」를 「돌보다」로.
- source_word: τὴν πίστιν ἤρνηται
  english_pob_choice: has denied the faith
  chosen_korean: 믿음을 부인한 것이며
  alternatives_korean:
  - 신앙을 저버린 것이며
  - 그 믿음을 부정한 것이며
  lexicon: BDAG
  rationale: ἀρνέομαι의 「부인」.
- source_word: ἀπίστου χείρων
  english_pob_choice: worse than an unbeliever
  chosen_korean: 믿지 않는 자보다 더 악한 자
  alternatives_korean:
  - 불신자보다 더 못한 자
  lexicon: BDAG
  rationale: 「믿지 않는 자」가 일관 사용. χείρων의 「더 악함·더 못함」을 「더 악한」으로(도덕적 판단을 살린다).
