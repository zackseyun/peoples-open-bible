translation:
  language: es
  text: 'Entonces Dios dijo[a]: «Hagamos al hombre[b] a nuestra imagen, conforme a nuestra semejanza[c], y que dominen sobre los peces del mar, sobre las aves de los cielos[d], sobre el ganado, sobre toda la tierra y sobre todo reptil que se arrastra sobre la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y Dios dijo». El hebreo presenta una transición narrativa simple; «Entonces» destaca la secuencia del relato.
    reason: alternative_reading
  - marker: b
    text: O «la humanidad» o «el género humano». Hebreo adam; aquí funciona como singular colectivo, por eso el versículo continúa con el plural «y que dominen».
    reason: lexical_alternative
  - marker: c
    text: 'Las expresiones plurales «Hagamos» y «nuestra imagen» se conservan como en el hebreo. Se han entendido de diversas maneras: como deliberación divina, como una alocución al consejo celestial o —dentro de una lectura cristiana canónica— como un indicio compatible con la revelación trinitaria posterior.'
    reason: alternative_reading
  - marker: d
    text: O «las aves del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» expresa bien la secuencia en español sin perder el tono narrativo del relato de creación.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El verbo singular confirma que se trata del único Dios; en español «Dios» es la forma natural y reverente.
- source_word: נַעֲשֶׂה אָדָם
  english_pob_choice: Let us make man
  chosen_spanish: Hagamos al ser humano
  alternatives_spanish:
  - Hagamos al hombre
  - Hagamos a la humanidad
  - Hagamos al género humano
  lexicon: HALOT
  rationale: אָמָדָם aquí funciona como sustantivo colectivo; «ser humano» comunica bien el sentido inclusivo de la especie sin forzar un masculino genérico en español, y mantiene la tensión entre singular colectivo y plural posterior.
- source_word: בְּצַלְמֵנוּ
  english_pob_choice: in our image
  chosen_spanish: a nuestra imagen
  alternatives_spanish:
  - en nuestra imagen
  - como nuestra imagen
  lexicon: HALOT
  rationale: La preposición בְּ con צֶלֶם en este contexto se expresa con naturalidad en español como «a nuestra imagen», conservando la relación de correspondencia/representación.
- source_word: כִּדְמוּתֵנוּ
  english_pob_choice: according to our likeness
  chosen_spanish: conforme a nuestra semejanza
  alternatives_spanish:
  - según nuestra semejanza
  - a nuestra semejanza
  lexicon: HALOT
  rationale: כִּ con דְּמוּת indica conformidad; «conforme a» mantiene la relación de patrón sin diluir la distinción con «imagen».
- source_word: וְיִרְדּוּ
  english_pob_choice: and let them rule over
  chosen_spanish: y que tenga dominio sobre
  alternatives_spanish:
  - y que gobierne sobre
  - y que dominen sobre
  - y que ejerzan dominio sobre
  lexicon: HALOT
  rationale: El verbo jussivo plural expresa finalidad o resultado para la humanidad. En español, «que tenga dominio» ofrece un equivalente fluido y permite que el sujeto colectivo «ser humano» abarque el plural de sentido del hebreo.
- source_word: בִדְגַת הַיָּם
  english_pob_choice: over the fish of the sea
  chosen_spanish: sobre los peces del mar
  alternatives_spanish:
  - sobre la pesca del mar
  - sobre los peces del océano
  lexicon: HALOT
  rationale: El constructo se vierte de forma idiomática; «peces del mar» conserva el referente sin artificio.
- source_word: וּבְעוֹף הַשָּׁמַיִם
  english_pob_choice: and over the birds of the heavens
  chosen_spanish: sobre las aves de los cielos
  alternatives_spanish:
  - sobre las aves del cielo
  - sobre los pájaros del cielo
  lexicon: HALOT
  rationale: עוֹף designa aves/animales voladores; «aves» es claro y digno. «Los cielos» refleja mejor שָׁמַיִם en un registro bíblico elevado que «el cielo» singular, aunque ambas opciones son posibles.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and over the livestock
  chosen_spanish: sobre el ganado
  alternatives_spanish:
  - sobre los animales domésticos
  - sobre la hacienda
  lexicon: HALOT
  rationale: בהמה aquí apunta a animales domésticos o de cría; «ganado» es la equivalencia bíblica tradicional y comprensible en español.
- source_word: וּבְכָל הָאָרֶץ
  english_pob_choice: and over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra habitada
  - sobre todo el mundo
  lexicon: HALOT
  rationale: En Génesis 1, אֶרֶץ tiene alcance cósmico/terrenal; «toda la tierra» conserva esa amplitud con naturalidad.
- source_word: וּבְכָל הָרֶמֶשׂ הָרֹמֵשׂ עַל הָאָרֶץ
  english_pob_choice: and over every creeping thing that creeps on the earth
  chosen_spanish: sobre todo animal que se arrastra sobre la tierra
  alternatives_spanish:
  - sobre toda criatura que se arrastra sobre la tierra
  - sobre todo lo que se arrastra sobre la tierra
  lexicon: HALOT
  rationale: רֶמֶשׂ y el participio relacionado remiten a criaturas pequeñas que se mueven arrastrándose. «Animal que se arrastra» conserva el referente amplio y evita una traducción demasiado arcaica, aunque se pierde algo del juego verbal hebreo.
theological_decisions:
- issue: Pluralidad en «Hagamos ... a nuestra imagen ... conforme a nuestra semejanza»
  english_pob_reading: Preserve the plural wording without specifying the addressee or theological explanation in the main text.
  chosen_spanish_reading: Conservar la pluralidad explícita sin resolverla en la traducción; las notas pueden señalar las lecturas posibles.
  alternative_spanish_readings:
  - plural deliberativo
  - consejo celestial
  - anticipación compatible con la lectura trinitaria canónica
  rationale: El hebreo usa formas plurales reales; la traducción no debe eliminarlas. Mantener «hagamos» y «nuestra» preserva la tensión interpretativa en vez de cerrarla.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed within orthodox bounds)
- issue: Valor colectivo de אָדָם en un contexto con verbo plural posterior
  english_pob_reading: Use 'man' in the main text as a representative collective term.
  chosen_spanish_reading: Usar «ser humano» como colectivo representativo en el texto principal.
  alternative_spanish_readings:
  - el hombre
  - la humanidad
  - el género humano
  rationale: En español moderno, «ser humano» comunica el sentido colectivo de אָדָם sin cargar el verso con un masculino genérico; además facilita la concordancia posterior con la idea colectiva de la humanidad.
  doctrine_reference: Contested terms table for אָדָם; Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés con agreement score alto y sin cambios recientes sustantivos; la draft sigue la decisión de preservar la pluralidad de las expresiones divinas y la tensión colectiva de אָדָם, pero adapta la formulación a un español bíblico natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים en singular verbal.
  - Se evitó «SEÑOR» porque el texto hebreo dice אֱלֹהִים, no יהוה.
  - Se eligió un registro bíblico moderno y digno, sin calcos innecesarios.
  - Se preservó la referencia colectiva de אָדָם sin introducir una interpretación doctrinal cerrada en el texto principal.
  - 'Se mantuvo la imagen de dominio con un verbo natural en español: «tener dominio sobre».'
