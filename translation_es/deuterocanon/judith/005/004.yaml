revisions:
- from: ¿Y por qué se negaron a venir a reunirse conmigo[a], a diferencia de todos los que habitan en el occidente?
  to: ¿Y por qué se negaron a venir a encontrarme[a], a diferencia de todos los que habitan en el occidente?
  rationale: Se sustituye «reunirse conmigo» por «encontrarme» para reflejar mejor εἰς ἀπάντησίν μοι, que expresa venir al encuentro del hablante más que reunirse mutuamente. Se actualiza la nota para que preserve la misma correspondencia léxica.
