source:
  edition: SBLGNT
  text: Καὶ ἤρξατο αὐτοῖς ἐν παραβολαῖς ⸀λαλεῖν· Ἀμπελῶνα ⸂ἄνθρωπος ἐφύτευσεν⸃, καὶ περιέθηκεν φραγμὸν καὶ ὤρυξεν ὑπολήνιον καὶ ᾠκοδόμησεν πύργον, καὶ ἐξέδετο αὐτὸν γεωργοῖς, καὶ ἀπεδήμησεν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/001.yaml
  text: 'And he began to speak to them in parables: “A man planted a vineyard[a], and put a fence around it, and dug a winepress pit, and built a tower, and leased it to tenant farmers[d][c][b], and went away.”'
  footnotes:
  - marker: a
    text: Or “set a hedge around it.” The Greek φραγμός can denote a fence, hedge, or enclosing barrier.
    reason: lexical_alternative
  - marker: b
    text: Or “dug a pit for the winepress.” The Greek ὑπολήνιον refers specifically to the lower vat or pit of a winepress.
    reason: lexical_alternative
  - marker: c
    text: Or “rented it out to farmers” or “leased it to vinedressers.”
    reason: lexical_alternative
  - marker: d
    text: The imagery echoes Isaiah 5:1–2, where a vineyard is planted, enclosed, and equipped.
    reason: cross_reference
translation:
  language: ko
  text: 그리고 그분께서 그들에게 비유로 말씀하시기 시작하셨습니다. 「한 사람이 포도원을 만들고 울타리를 두르며, 포도즙 짜는 구덩이를 파고 망대를 세운 후, 그것을 소작인들에게 빌려 주고 멀리 떠났습니다.
  philosophy: optimal-equivalence
