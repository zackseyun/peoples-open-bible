translation:
  language: es
  text: Y Jonatán reunió a su nación[a], y llegó a ser su sumo sacerdote, y fue añadido a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue reunido con su pueblo», un modismo bíblico conocido para la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθροισεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: LSJ
  rationale: ἀθροίζω expresa la acción de reunir o juntar en un solo cuerpo. En español, «reunió» es natural y conserva la idea de convocar/poner juntos sin añadir matices no presentes en el griego.
- source_word: τὸ ἔθνος αὐτῶν
  english_pob_choice: their nation
  chosen_spanish: su nación
  alternatives_spanish:
  - su pueblo
  - su grupo étnico
  lexicon: LSJ
  rationale: ἔθνος puede significar nación, pueblo o grupo. Aquí el contexto apunta a una colectividad con tono corporativo-político; «nación» preserva mejor ese valor que «pueblo», que en español puede sonar más general.
- source_word: ἐγενήθη ... ἀρχιερεύς
  english_pob_choice: became their high priest
  chosen_spanish: llegó a ser para ellos sumo sacerdote
  alternatives_spanish:
  - se hizo su sumo sacerdote
  - fue hecho su sumo sacerdote
  lexicon: LSJ
  rationale: 'ἐγενήθη con predicado nominal comunica cambio de estado: «llegó a ser» lo refleja con claridad. ἀρχιερεύς se rinde como «sumo sacerdote», el equivalente bíblico natural en español, y «para ellos» conserva el dativo de beneficio/relación.'
- source_word: προσετέθη πρὸς τὸν λαὸν αὐτοῦ
  english_pob_choice: was added to his people
  chosen_spanish: fue añadido a su pueblo
  alternatives_spanish:
  - fue reunido con su pueblo
  - fue juntado con su pueblo
  lexicon: LSJ
  rationale: La forma griega reproduce un giro idiomático tradicional asociado con la muerte o la reunión con los antepasados. «Fue añadido a su pueblo» mantiene de cerca la imagen del griego y deja visible la tensión idiomática; «su pueblo» traduce λαός con el sentido colectivo estándar.
theological_decisions:
- issue: Giro idiomático en προσετέθη πρὸς τὸν λαὸν αὐτοῦ
  english_pob_reading: was added to his people
  chosen_spanish_reading: fue añadido a su pueblo
  alternative_spanish_readings:
  - fue reunido con su pueblo
  rationale: El texto griego usa un modo de hablar bíblico que suele aludir a la muerte o al retorno al ámbito de los propios. La redacción principal conserva la imagen literal del griego; la alternativa aclara el sentido idiomático sin reemplazarlo en el texto principal.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §6 Readable modern English, not archaic or academic
translation_notes:
  revision_awareness: Coincide con la lectura de alta concordancia del audit trail inglés; no se detectaron revisiones aplicadas en la fuente inglesa reciente, y el único punto sensible es el modismo final, que se preserva con nota alternativa en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no la contiene.
  - «Sumo sacerdote» se usa como término bíblico convencional y preciso para ἀρχιερεύς.
  - Se conserva la ambigüedad idiomática de «fue añadido a su pueblo» para no resolver prematuramente el sentido de la frase final.
