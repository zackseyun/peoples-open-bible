- from: E hizo cincuenta broches[a] de oro, y unió las cortinas una con otra con los broches, de modo que el tabernáculo quedó uno.
  to: E hizo cincuenta corchetes[a] de oro, y unió las cortinas una con otra con los corchetes, de modo que el tabernáculo quedó unido en uno.
