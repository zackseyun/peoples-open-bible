id: PHP.2.30
reference: Philippians 2:30
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι διὰ τὸ ἔργον ⸀Χριστοῦ μέχρι θανάτου ἤγγισεν, ⸀παραβολευσάμενος τῇ ψυχῇ ἵνα ἀναπληρώσῃ τὸ ὑμῶν ὑστέρημα τῆς πρός με λειτουργίας.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/030.yaml
  text: 'because for the work of Messiah he came near to death, risking his life to make up for what was lacking in your service to me.'
translation:
  language: ko
  text: 그는 메시아[a]의 일을 위하여 죽음에 가까이 이르렀고, 자기 목숨을 걸어[b] 여러분이 나를 섬기는 일에서 부족했던 것[c]을 채웠기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 원문은 「메시아/그리스도의 일」.
    reason: alternative_reading
  - marker: b
    text: 또는 「목숨을 위태롭게 무릅쓰며」. 헬라어 ψυχή는 여기서 영혼이 아니라 지상의 생명을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: '「부족했던 것」은 빌립보 성도가 직접 함께 있을 수 없었기에 채우지 못한 섬김을 가리키며, 그들의 무관심을 뜻하지 않는다.'
    reason: cultural_note
lexical_decisions:
- source_word: διὰ τὸ ἔργον Χριστοῦ
  english_pob_choice: for the work of Messiah
  chosen_korean: 메시아의 일을 위하여
  alternatives_korean:
  - 그리스도의 일 때문에
  - 메시아의 사역을 위하여
  lexicon: BDAG
  rationale: διά + 대격은 본 절에서 인과·목적적 의미. 「위하여」가 한국어로 자연스럽다. Χριστοῦ는 본 번역의 원칙에 따라 「메시아」로 옮긴다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 칭호로 기능하므로 「메시아」로 옮긴다.
- source_word: μέχρι θανάτου ἤγγισεν
  english_pob_choice: he came near to death
  chosen_korean: 죽음에 가까이 이르다
  alternatives_korean:
  - 죽음에 임박하다
  - 죽음에 다다르다
  lexicon: BDAG
  rationale: 「죽음에 이를 만큼 가까이 갔다」는 관용적 의미를 한국어로 자연스럽고 직접적으로 옮긴다.
- source_word: παραβολευσάμενος τῇ ψυχῇ
  english_pob_choice: risking his life
  chosen_korean: 자기 목숨을 걸다
  alternatives_korean:
  - 목숨을 무릅쓰다
  - 목숨을 위태롭게 하다
  lexicon: BDAG
  rationale: 위험한 자기 노출을 가리킨다. 한국어 「목숨을 걸다」가 그 무게를 자연스럽게 담는다. ψυχή는 여기서 지상의 생명을 가리키므로 「목숨」으로 옮긴다.
- source_word: ἵνα ἀναπληρώσῃ
  english_pob_choice: to make up for
  chosen_korean: 채우다
  alternatives_korean:
  - 보충하다
  - 완성하다
  lexicon: BDAG
  rationale: ἵνα 절의 목적을 표현. 빠진 것을 채워 넣는 의미가 본 문맥에서 가장 적합하다.
- source_word: τὸ ὑμῶν ὑστέρημα
  english_pob_choice: what was lacking
  chosen_korean: 부족했던 것
  alternatives_korean:
  - 부족한 것
  - 결핍
  lexicon: BDAG
  rationale: 실제로 빠져 있는 것을 가리키며 도덕적 책망의 어조가 아니다. 「부족했던 것」이 자연스럽고 책임 부과를 피한다.
- source_word: τῆς πρός με λειτουργίας
  english_pob_choice: your service to me
  chosen_korean: 나를 섬기는 일
  alternatives_korean:
  - 나를 향한 섬김
  - 나에 대한 봉사
  lexicon: BDAG
  rationale: λειτουργία를 본 문맥의 실제적 도움 의미로 「섬기는 일」로 옮긴다. 빌립보 성도가 에바브로디도를 통해 표현한 사역도 함께 담을 만큼 폭이 있다.
theological_decisions:
- issue: 바울적 구문에서 Χριστοῦ를 옮기는 법
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 원칙은 칭호로 기능하는 Χριστός를 「메시아」로 옮기는 것이다. 「메시아의 일」에서 칭호성이 여전히 들리며 우세하다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
