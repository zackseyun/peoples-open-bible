translation:
  language: es
  text: Yahvé te llevará a ti y al rey que pongas sobre ti[a] a una nación que ni tú ni tus padres han conocido, y allí servirás a otros dioses[b], de madera y de piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey que constituyas sobre ti».'
    reason: alternative_reading
  - marker: b
    text: 'O: «allí adorarás a otros dioses»; el verbo hebreo literalmente significa «servir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹלֵ֨ךְ
  english_pob_choice: will bring
  chosen_spanish: te llevará
  alternatives_spanish:
  - te traerá
  - te conducirá
  - te arrastrará
  lexicon: HALOT
  rationale: 'El hiphil de הלך es causativo: hace que alguien vaya. En español, «llevar» expresa bien esa causalidad sin añadir más de lo que el texto dice. En este contexto de juicio, conserva la idea de traslado/exilio sin explicitarla de forma interpretativa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del hebreo, no un sustituto de título. «Yahvé» sigue el criterio del proyecto para יְהוָה y es transparente para el lector español.
- source_word: מַלְכְּךָ אֲשֶׁר תָּקִים עָלֶיךָ
  english_pob_choice: the king whom you set over yourself
  chosen_spanish: al rey que pongas sobre ti
  alternatives_spanish:
  - al rey que establezcas sobre ti
  - al rey que coloques sobre ti
  - al rey que constituyas sobre ti
  lexicon: HALOT
  rationale: «Pongas sobre ti» reproduce de manera natural la construcción hebrea de poner/levantar un rey sobre alguien. «Constituyas» o «establezcas» son posibles, pero «pongas» mantiene cercanía sintáctica y claridad en español.
- source_word: גּוֹי
  english_pob_choice: a nation
  chosen_spanish: a una nación
  alternatives_spanish:
  - a un pueblo
  - a una gente
  lexicon: HALOT
  rationale: «Nación» es la equivalencia más directa y acorde con el contexto de destierro a un país extranjero. Mantiene el valor de גוי como entidad nacional o pueblo colectivo.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  english_pob_choice: that neither you nor your fathers have known
  chosen_spanish: que ni tú ni tus padres conocieron
  alternatives_spanish:
  - que ni tú ni tus ancestros conocieron
  - que ni tú ni tus padres han conocido
  lexicon: HALOT
  rationale: Se conserva el plural masculino literal «padres» por fidelidad al hebreo y por consistencia con la política de precisión de género del proyecto. El perfecto español «conocieron» refleja el valor retrospectivo del hebreo sin forzar una perífrasis más larga.
- source_word: וְעָבַדְתָּ שָּׁם
  english_pob_choice: and there you will serve
  chosen_spanish: y allí servirás
  alternatives_spanish:
  - y allí adorarás
  - y allí rendirás servicio
  lexicon: HALOT
  rationale: עבד con objeto divino significa servir, y en este contexto puede implicar servicio religioso. Se preserva «servirás» para mantener la ambigüedad lexical del hebreo; la nota explica la posible lectura de adoración sin imponerla en el texto principal.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extranjeros
  lexicon: HALOT
  rationale: La frase covenantal estándar se traduce literalmente como «otros dioses». Esto conserva la oposición teológica del hebreo sin sustituirla por una categoría más interpretativa.
- source_word: עֵץ וָאָבֶן
  english_pob_choice: wood and stone
  chosen_spanish: de madera y de piedra
  alternatives_spanish:
  - madera y piedra
  - hechos de madera y de piedra
  lexicon: HALOT
  rationale: El hebreo funciona como apposición material despectiva. En español, «de madera y de piedra» comunica de forma natural que esos dioses son objetos materiales, sin añadir una formulación más explicativa que el hebreo no exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, conforme al criterio doctrinal del proyecto, en lugar de reemplazarlo por un título. Esto preserva la transparencia respecto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Posible sentido de עָבַד con deidades
  english_pob_reading: and there you will serve other gods
  chosen_spanish_reading: y allí servirás a otros dioses
  alternative_spanish_readings:
  - y allí adorarás a otros dioses
  - y allí rendirás culto a otros dioses
  rationale: El verbo hebreo literalmente significa «servir». Aunque el contexto puede incluir adoración, el texto principal conserva el verbo base para no borrar la tensión léxica documentada por la POB inglesa.
  doctrine_reference: Lexical decision preserved from the audit trail; cf. English footnote b
- issue: Traducción de וַאֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus ancestros
  rationale: Se conserva la forma masculina específica del hebreo, evitando una neutralización que diluiría la correspondencia formal con el original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: 'Se siguió el tramo revisado del audit trail inglés: se evitó añadir una preposición equivalente a «of» antes de «madera y piedra», reflejando la apposición hebrea más directamente. También se mantuvo la opción léxica de «servir» frente a «adorar» en el cuerpo principal, con nota alternativa preservando la tensión documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en conformidad con la política del proyecto.
  - Se mantiene «padres» para וַאֲבֹתֶיךָ por fidelidad formal al hebreo.
  - «Servirás» conserva la ambigüedad de עבד con dioses; la alternativa teológica se deja en nota.
  - La estructura final evita sobreexplicar el material de los ídolos y conserva la apposición «de madera y de piedra».
