translation:
  language: es
  text: Y Josué capturó a Makkedá aquel día y la atacó[a] a filo de espada, y consagró a destrucción a su rey y a toda persona que había en ella; no dejó ningún sobreviviente. E hizo al rey de Makkedá como había hecho al rey de Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hirió»; el hebreo usa un verbo de golpear/abatir que, en este contexto, describe el ataque a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, el verbo expresa tomar una ciudad por la fuerza. «Capturó» es natural en español y conserva ese valor sin suavizarlo.
- source_word: וַיַּכֶּהָ
  english_pob_choice: struck it
  chosen_spanish: la atacó
  alternatives_spanish:
  - la golpeó
  - la hirió
  lexicon: HALOT
  rationale: El verbo נכה aquí se refiere al golpe/ataque contra la ciudad. «La atacó» comunica la acción bélica con claridad en español, aunque pierde algo de la concreción física del hebreo; por eso se complementa con «a filo de espada».
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - con la espada
  lexicon: HALOT
  rationale: La imagen literal es «a la boca/filo de la espada». «A filo de espada» es la expresión española más idiomática que conserva esa metáfora.
- source_word: הֶחֱרִם
  english_pob_choice: devoted to destruction
  chosen_spanish: consagró a destrucción
  alternatives_spanish:
  - devotó a destrucción
  - consagró al anatema
  lexicon: HALOT
  rationale: Se busca preservar el valor de חרם como acto de consagración bajo juicio, no solo destrucción material. «Consagró a destrucción» mantiene la tensión teológica mejor que «destruyó»; se evita «anatema» por su carga eclesial tradicional y menor transparencia para lectores modernos.
- source_word: אוֹתָם
  english_pob_choice: its king and every person in it
  chosen_spanish: a su rey y a toda persona que había en ella
  alternatives_spanish:
  - a su rey y a todos los que estaban en ella
  - a su rey y a cada persona en ella
  lexicon: HALOT
  rationale: El pronombre plural se desglosa para mayor claridad referencial. En español, explicitar «a su rey y a toda persona que había en ella» evita ambigüedad.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person in it
  chosen_spanish: toda persona que había en ella
  alternatives_spanish:
  - toda alma que había en ella
  - todos los habitantes que había en ella
  lexicon: HALOT
  rationale: נפש aquí designa personas/vidas, no el alma inmortal en sentido doctrinal. «Toda persona» conserva el referente humano sin imponer una lectura antropológica ajena al contexto.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  english_pob_choice: he left no survivor
  chosen_spanish: no dejó ningún sobreviviente
  alternatives_spanish:
  - no dejó remanente
  - no perdonó a nadie
  lexicon: HALOT
  rationale: «Sobreviviente» expresa de modo natural שָׂרִיד. «Remanente» es posible, pero en español aquí sería menos directo y podría sugerir un eco teológico no explícito en el versículo.
- source_word: וַיַּעַשׂ לְמֶלֶךְ מַקֵּדָה כַּאֲשֶׁר עָשָׂה לְמֶלֶךְ יְרִיחוֹ
  english_pob_choice: he did to the king of Makkedah just as he had done to the king of Jericho
  chosen_spanish: E hizo al rey de Makkedá como había hecho al rey de Jericó
  alternatives_spanish:
  - Y trató al rey de Makkedá como había tratado al rey de Jericó
  - E hizo con el rey de Makkedá lo mismo que había hecho con el rey de Jericó
  lexicon: HALOT
  rationale: Se conserva la tersura del hebreo con «hizo al rey de… como había hecho al rey de…». Esta fórmula mantiene la comparación narrativa sin ampliar innecesariamente el sentido.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: standard biblical Spanish
  rationale: Nombre bíblico asentado en español. No se translitera como «Yehoshúa» porque el registro público y eclesial estándar reconoce «Josué».
- source_word: מַקֵּדָה / יְרִיחוֹ
  english_pob_choice: Makkedah / Jericho
  chosen_spanish: Makkedá / Jericó
  alternatives_spanish:
  - Makkedah / Jericho
  lexicon: standard biblical Spanish
  rationale: Se usa la transliteración bíblica habitual en español, con adaptación acentual según la pronunciación española moderna.
theological_decisions:
- issue: Sentido de הֶחֱרִם en contexto de guerra santa
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: consagró a destrucción
  alternative_spanish_readings:
  - destruyó por completo
  - lo puso bajo anatema
  rationale: El hebreo no describe solo el resultado físico sino un acto de consagración bajo juicio. La redacción española debe conservar esa tensión entre lo ritual y lo destructivo sin resolverla en una sola noción simplificada.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de נֶפֶשׁ en este versículo
  english_pob_reading: every person in it
  chosen_spanish_reading: toda persona que había en ella
  alternative_spanish_readings:
  - toda alma que había en ella
  - todos los habitantes que había en ella
  rationale: En este contexto נפש se refiere a seres humanos concretos. Traducir «alma» podría introducir una connotación doctrinal no requerida por el texto; «persona» mantiene el alcance humano y evita sobreinterpretación.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El texto base en inglés revisó «devoted its king and every person in it to destruction» a «devoted to destruction its king and every person in it», moviendo la expresión para que modifique con más naturalidad a «devoted». La versión española refleja esa misma relación sintáctica con «consagró a destrucción a su rey y a toda persona que había en ella».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «Josué», «Makkedá» y «Jericó» como formas bíblicas estándar en español.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
  - «Consagró a destrucción» conserva la terminología distintiva del proyecto para חרם sin recurrir a un calco eclesiástico opaco.
