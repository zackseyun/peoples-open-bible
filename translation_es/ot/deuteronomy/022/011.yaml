  timestamp: '2026-05-07T21:33:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la prohibición de no usar una prenda hecha con lana y lino juntos, y conserva la nota léxica sobre שעטנז. Sin embargo, «tela» queda demasiado genérico frente al sentido específico de material/tejido mezclado, y «juntos» suena menos natural al modificar materiales que «juntos» o «mezclados» en una sola prenda; además, la concordancia mejora con una formulación más idiomática.
  spanish_quality_summary: El español es comprensible, pero «No vestirás tela de lana y lino juntos» suena algo tosco y ligeramente antinatural. Una redacción como «No vestirás ropa tejida con lana y lino juntos» o «No vestirás tela tejida de lana y lino juntos» expresa mejor el sentido. «Ropa tejida con...» es más natural y clara para lectores generales.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de no transliterar שעטנז en el texto principal concuerda con la rationale inglesa. Conviene, no obstante, reflejar mejor en español que שעטנז es una tela/tejido hecho de la mezcla específica de lana y lino.
  issues:
  - severity: medium
    issue: «tela» es demasiado genérico para שעטנז
    rationale: El término hebreo raro no significa simplemente cualquier «tela», sino una tela/tejido hecho de la mezcla prohibida. La versión inglesa lo explicita como «cloth made of wool and linen». En español conviene añadir «tejida con» o equivalente.
  - severity: low
    issue: La frase «lana y lino juntos» suena algo rígida en español con «tela»
    rationale: 'Aunque es entendible, la combinación completa resulta menos natural que una formulación que vincule claramente los materiales con la prenda o tejido: «ropa tejida con lana y lino juntos».'
  revised_spanish_text: No vestirás ropa[a] tejida con lana y lino juntos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «shaatnez, lana y lino juntos». El término raro «shaatnez» se refiere a una tela hecha con esta combinación mixta.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «tela» a «ropa ... tejida con» para reflejar mejor el sentido específico de שעטנז como prenda o tejido confeccionado con la mezcla prohibida, y para lograr un español más natural sin perder la precisión del hebreo ni de la auditoría inglesa.
