- from: La verdad[a] de los justos es de Dios, su Salvador; el pecado sobre pecado no se aloja en la casa de un hombre justo.
  to: La verdad[a] del justo es de Dios, su salvador; el pecado sobre pecado no se aloja en la casa de un hombre justo.
  rationale: Se ajusta la primera frase a «del justo» para dar mayor coherencia proverbial con la segunda cláusula singular y evitar una mezcla de plural y singular menos natural en español. Se conserva «verdad» en el texto principal por fidelidad a la decisión auditada del inglés, y se mantiene la nota con alternativas éticas. «Su salvador» en minúscula mejora la fluidez en este contexto genérico sin alterar el sentido.
