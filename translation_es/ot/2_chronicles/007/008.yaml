    rationale: En español bíblico moderno suena más natural 'arroyo de Egipto' con minúscula, salvo que se trate de un nombre propio fijado, cosa que aquí no exige el proyecto.
  revised_spanish_text: En aquel tiempo, Salomón celebró la fiesta durante siete días[a], y con él todo Israel, una asamblea muy grande, desde Lebo-hamat hasta el arroyo de Egipto[b].
  revised_footnotes:
