base_translation:
  language: en
  yaml_path: translation/ot/genesis/018/010.yaml
  text: And he said[a], “I will surely return to you about this time next year, and behold[c][b], Sarah your wife will have a son.” And Sarah was listening at the entrance of the tent behind him.
  footnotes:
  - marker: a
    text: Hebrew 'about the time of life'; idiomatically, 'about this time next year.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'and he was behind him'; the Hebrew pronouns are terse, and the sense is that Sarah was at the tent entrance behind the speaker.
    reason: lexical_alternative
  - marker: c
    text: Or 'at the entrance of the tent, and it was behind him'.
    reason: previous_rendering
