lexical_decisions:
- source_word: εἰς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - para
  - en
  - a modo de
  lexicon: LSJ
  rationale: Aquí εἰς introduce finalidad o resultado dentro de un fragmento dependiente. En español, «como» conserva una relación funcional natural y evita forzar un valor preposicional más rígido que el griego no exige.
- source_word: ἔλεγχον
  english_pob_choice: a rebuke
  chosen_spanish: una reprensión
  alternatives_spanish:
  - una reprueba
  - una corrección
  - una censura
  lexicon: LSJ
  rationale: ἔλεγχος puede expresar refutación, exposición o reprensión. «Reprensión» preserva la idea de censura moral y suena más natural en español bíblico contemporáneo que una calca técnica.
- source_word: νηπιοκτόνου
  english_pob_choice: that killed infants
  chosen_spanish: que mató a los infantes
  alternatives_spanish:
  - infanticida
  - que mató a los niños
  - asesino de infantes
  lexicon: LSJ
  rationale: El adjetivo significa literalmente «que mata infantes». Dado que modifica a «decreto», la subordinada relativa mantiene la fuerza léxica y hace explícita la acción histórica sin suavizarla. «Infantes» conserva mejor νήπιος que «niños».
- source_word: διατάγματος
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - el edicto
  - la orden
  - la disposición
  lexicon: LSJ
  rationale: διατάγματος se refiere a una orden oficial. «Decreto» es claro, natural y suficientemente formal en español para el trasfondo aludido.
theological_decisions:
- issue: Alusión histórica al decreto egipcio contra los niños hebreos
  english_pob_reading: the decree that killed infants
  chosen_spanish_reading: el decreto que mató a los infantes
  alternative_spanish_readings:
  - el decreto infanticida
  - el decreto asesino de infantes
  - el decreto contra los infantes
  rationale: El griego es compacto y adjetival, pero la alusión histórica importa. La redacción elegida conserva la referencia concreta sin añadir detalles que no están en el texto fuente.
  doctrine_reference: Principio de equivalencia óptima; preservar la tensión histórica y moral del pasaje
