translation:
  language: es
  text: Entonces Manoá tomó el cabrito y la ofrenda vegetal[a], y los ofreció sobre la roca a Yahvé; y él hizo algo maravilloso, mientras Manoá y su esposa observaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el ángel de Yahvé hizo algo maravilloso». El hebreo es elíptico y no repite explícitamente el sujeto, aunque el contexto apunta al mensajero de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: גְּדִי הָעִזִּים
  english_pob_choice: the young goat
  chosen_spanish: el cabrito
  alternatives_spanish:
  - el chivo
  - el cabrito de las cabras
  lexicon: HALOT
  rationale: En este contexto sacrificial, גְּדִי הָעִזִּים designa un animal joven para la ofrenda. «Cabrito» es natural en español, claro para lectores eclesiales y suficientemente preciso sin sonar técnico o forzado.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de cereal
  - la ofrenda
  - la oblación
  lexicon: HALOT
  rationale: La POB inglesa precisó «grain offering» para el valor cultual de מִנְחָה. En español, «ofrenda vegetal» mantiene la referencia sacrificial y evita reducirlo a un genérico como «ofrenda»; además conserva una tradición de traducción reconocible sin imponer un término demasiado interpretativo.
- source_word: וַיַּעַל עַל הַצּוּר לַיהוָה
  english_pob_choice: offered them on the rock to Yahweh
  chosen_spanish: los ofreció sobre la roca a Yahvé
  alternatives_spanish:
  - los subió sobre la roca para Yahvé
  - los ofreció en la roca a Yahvé
  lexicon: HALOT
  rationale: En contexto sacrificial, עָלָה puede expresar ofrecer en sacrificio. «Los ofreció sobre la roca» conserva el sentido cultual y el detalle locativo de הַצּוּר sin añadir elementos inexistentes. Se usa «Yahvé» conforme al criterio del proyecto para יהוה.
- source_word: וּמַפְלִא לַעֲשׂוֹת
  english_pob_choice: and he did a wondrous thing
  chosen_spanish: hizo algo maravilloso
  alternatives_spanish:
  - hizo una cosa maravillosa
  - obró maravillosamente
  - hizo algo extraordinario
  lexicon: HALOT
  rationale: La cláusula hebrea es comprimida y deja el sujeto implícito; la POB inglesa conserva la ambigüedad y evita nombrar explícitamente al mensajero. «Hizo algo maravilloso» transmite el valor de פלא־לעשות sin resolver de manera innecesaria quién es el sujeto en el texto mismo.
- source_word: רֹאִים
  english_pob_choice: were watching
  chosen_spanish: observaban
  alternatives_spanish:
  - estaban mirando
  - veían
  - miraban
  lexicon: HALOT
  rationale: El participio indica acción continua. «Observaban» expresa duración y atención visual de manera natural en español, mejor que un pretérito simple.
theological_decisions:
- issue: Sujeto implícito de וּמַפְלִא לַעֲשׂוֹת
  english_pob_reading: The subject is left as 'he,' contextually referring to the messenger of Yahweh, without naming him explicitly in the main text.
  chosen_spanish_reading: Se mantiene un sujeto implícito en español con «él hizo algo maravilloso», sin explicitar en el cuerpo del versículo que se trata del mensajero de Yahvé.
  alternative_spanish_readings:
  - «y el ángel de Yahvé hizo algo maravilloso»
  - «y algo maravilloso sucedió»
  rationale: El hebreo es elíptico y la POB inglesa conserva esa tensión. La traducción española mantiene la misma ambigüedad para no resolver más de lo que el versículo dice, aunque el contexto apunta al mensajero de Yahvé.
  doctrine_reference: Preservar la tensión textual y la inferencia contextual sin convertirla en explicación interpretativa en el texto principal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que ajustó «he acted wondrously» a «he did a wondrous thing» por naturalidad, manteniendo la ambigüedad del sujeto y el sentido de פלא לעשות. La formulación española sigue esa misma dirección: natural, pero sin explicitar de más.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantiene «ofrenda vegetal» como equivalente cultual de מִנְחָה, coherente con la precisión de la POB inglesa.
  - La puntuación separa el final de la acción sacrificial de la cláusula de observación para reflejar el flujo narrativo del hebreo.
  - «Observaban» conserva el aspecto durativo del participio hebreo.
