  text: ἐὰν ὁμολογῶμεν τὰς ἁμαρτίας ἡμῶν, πιστός ἐστιν καὶ δίκαιος ἵνα ἀφῇ ἡμῖν τὰς ἁμαρτίας καὶ καθαρίσῃ ἡμᾶς ἀπὸ πάσης ἀδικίας.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/009.yaml
  text: If we confess our sins[a], he is faithful and righteous to forgive us our sins and to cleanse us from all unrighteousness.
