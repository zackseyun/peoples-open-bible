id: HOS.11.9
reference: Hosea 11:9
source:
  edition: WLC
  text: לֹ֤א אֶֽעֱשֶׂה֙ חֲר֣וֹן אַפִּ֔/י לֹ֥א אָשׁ֖וּב לְ/שַׁחֵ֣ת אֶפְרָ֑יִם כִּ֣י אֵ֤ל אָֽנֹכִי֙ וְ/לֹא אִ֔ישׁ בְּ/קִרְבְּ/ךָ֣ קָד֔וֹשׁ וְ/לֹ֥א אָב֖וֹא בְּ/עִֽיר־׃
translation:
  text: I will not carry out the fierceness of my anger[a]; I will not again destroy Ephraim. For I am God and not a man, the Holy One in your midst[c][b], and I will not come into the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will not come into the city.' The Hebrew of the final clause is difficult, and some take it as a statement that God will not enter as a destroyer.
    reason: alternative_reading
  - marker: b
    text: Or 'my burning anger.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will not return to destroy Ephraim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶֽעֱשֶׂה
  chosen: carry out
  alternatives:
  - do
  - execute
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but with חֲרוֹן אַפִּי it idiomatically means to act out or execute anger. 'Carry out' is natural English that preserves the sense of enacted judgment without over-paraphrasing.
- source_word: חֲרוֹן אַפִּי
  chosen: the fierceness of my anger
  alternatives:
  - my burning anger
  - the heat of my anger
  lexicon: HALOT
  rationale: The construct literally denotes the burning/heat of anger. 'The fierceness of my anger' is established but still clear modern English, preserving intensity while avoiding awkward literalism.
- source_word: אָשׁוּב לְשַׁחֵת
  chosen: again destroy
  alternatives:
  - return to destroy
  - turn back to destroy
  lexicon: HALOT
  rationale: שׁוּב + infinitive can express repetition ('do again') or return. In context, after the prior clause of withheld judgment, the sense is that God will not once more destroy Ephraim. 'Again destroy' communicates this idiom clearly.
- source_word: לְשַׁחֵת
  chosen: destroy
  alternatives:
  - ruin
  - bring to ruin
  lexicon: HALOT
  rationale: The piel of שׁחת commonly means destroy/corrupt. Here judicial devastation is in view, so 'destroy' is the most direct rendering.
- source_word: אֵל
  chosen: God
  alternatives:
  - God-like one
  - mighty God
  lexicon: HALOT
  rationale: In contrast with 'not a man,' אֵל here straightforwardly means 'God,' emphasizing the divine-human contrast.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - man
  - human
  lexicon: HALOT
  rationale: The singular contrasts God's character with that of a human male/person. 'A man' is the most natural English in this antithetical statement and fits the gender-accurate policy.
- source_word: בְּקִרְבְּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase denotes presence among the people/city. 'In your midst' preserves the covenantal and relational sense better than the more individualizing 'within you.'
- source_word: קָדוֹשׁ
  chosen: the Holy One
  alternatives:
  - holy
  - a Holy One
  lexicon: HALOT
  rationale: Used substantivally here, likely as a divine self-designation. 'The Holy One' preserves both the adjective's force and its titular function.
- source_word: וְלֹא אָבֹוא בְּעִיר
  chosen: I will not come in wrath
  alternatives:
  - I will not come into the city
  - I will not enter a city
  - I will not come with hostility
  lexicon: HALOT
  rationale: The phrase is difficult. While בְּעִיר can be read literally as 'into the city,' many understand עיר here in a sense related to hostile incursion/attack, or take the line idiomatically as a denial of destructive visitation. Given the context of relenting from judgment, 'I will not come in wrath' best conveys the sense in readable English while avoiding a misleadingly concrete 'city' reference that is obscure in context.
