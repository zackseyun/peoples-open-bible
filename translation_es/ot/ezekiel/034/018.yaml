translation:
  language: es
  text: ¿No les basta pastar en el buen pasto, que tienen que pisotear con sus pies el resto de su pasto, y beber agua clara[a], que tienen que enturbiar el resto con sus pies[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agua asentada», es decir, agua que ha quedado en reposo y por eso está clara.
    reason: lexical_alternative
  - marker: b
    text: O «foul» o «remover» lo que queda; el verbo hebreo describe volver el agua turbia con los pies.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט מִכֶּם
  english_pob_choice: Is it too little for you
  chosen_spanish: ¿Es tan poco para ustedes
  alternatives_spanish:
  - ¿No les basta
  - ¿Es poca cosa para ustedes
  lexicon: HALOT
  rationale: La pregunta retórica expresa reproche e insuficiencia. «Es tan poco para ustedes» conserva bien el tono acusatorio y suena natural en español.
- source_word: הַמִּרְעֶה הַטּוֹב
  english_pob_choice: the good pasture
  chosen_spanish: el buen pasto
  alternatives_spanish:
  - el buen pastizal
  - la buena pradera
  lexicon: HALOT
  rationale: מִרְעֶה designa el lugar de pastoreo. «Pasto» mantiene la imagen pastoril y es idiomático; se evita una paráfrasis más amplia que debilite la metáfora.
- source_word: תִּרְעוּ
  english_pob_choice: to graze on
  chosen_spanish: pastar en
  alternatives_spanish:
  - apacentarse en
  - alimentarse de
  lexicon: HALOT
  rationale: El verbo implica la acción de las ovejas al comer del pasto. «Pastar en» conserva el sentido literal y la imagen pastoral.
- source_word: וְיֶתֶר מִרְעֵיכֶם
  english_pob_choice: the rest of your pasture
  chosen_spanish: el resto de su pasto
  alternatives_spanish:
  - lo que queda de su pasto
  - el resto de su pastizal
  lexicon: HALOT
  rationale: יֶתֶר comunica lo restante. Aunque el hebreo es plural, en español «su pasto» reproduce con naturalidad el sentido colectivo sin forzar un plural innecesario.
- source_word: תִּרְמְסוּ בְּרַגְלֵיכֶם
  english_pob_choice: you must trample ... with your feet
  chosen_spanish: pisotear con sus pies
  alternatives_spanish:
  - hollar con sus pies
  - tratar a patadas
  lexicon: HALOT
  rationale: «Pisotear» expresa היטב רמס. Se conserva «con sus pies» porque el hebreo repite el instrumento y refuerza la acusación.
- source_word: וּמִשְׁקַע מַיִם
  english_pob_choice: clear water
  chosen_spanish: agua clara[a]
  alternatives_spanish:
  - agua asentada[a]
  - agua quieta[a]
  lexicon: HALOT
  rationale: La frase denota agua asentada y por ello clara. Se usa «agua clara» como equivalente comprensible; se mantiene la posibilidad léxica de «asentada» en la nota.
- source_word: תִּשְׁתּוּ
  english_pob_choice: to drink
  chosen_spanish: beber
  alternatives_spanish:
  - tomar
  - ustedes beban
  lexicon: HALOT
  rationale: Verbo básico de beber, coordinado con el infinitivo implícito del paralelismo hebreo. En español resulta natural con «y beber agua clara».
- source_word: הַנּוֹתָרִים
  english_pob_choice: what remains
  chosen_spanish: el resto
  alternatives_spanish:
  - lo que queda
  - lo que permanece
  lexicon: HALOT
  rationale: El sustantivado de «lo que queda» se traduce de modo breve y claro con «el resto», manteniendo el paralelismo con la primera mitad del verso.
- source_word: תִּרְפֹּשׂוּן
  english_pob_choice: you must foul
  chosen_spanish: enturbiar
  alternatives_spanish:
  - ensuciar
  - remover
  lexicon: HALOT
  rationale: El verbo alude a remover el agua con los pies hasta volverla turbia. «Enturbiar» expresa ese efecto de forma precisa en español.
theological_decisions:
- issue: Imagen pastoral y fuerza acusatoria del reproche
  english_pob_reading: The verse rebukes shepherds who exploit both good pasture and clear water, trampling and fouling what should remain for others.
  chosen_spanish_reading: El verso reprende a quienes, en vez de cuidar el rebaño, se apropian del buen pasto y del agua clara, pisoteando y enturbiando lo restante.
  alternative_spanish_readings:
  - El verso reprende a quienes dañan el pasto y ensucian el agua.
  - El verso denuncia el abuso de los recursos del rebaño.
  rationale: La traducción debe conservar la denuncia moral sin añadir explicaciones no presentes en el hebreo. La imagen concreta de pasto y agua comunica la acusación con suficiente claridad.
  doctrine_reference: Ezequiel 34:18 dentro del oráculo contra los pastores de Israel
translation_notes:
  revision_awareness: 'He alineado el español con la última revisión inglesa: singularicé «pasto» para corresponder mejor al hebreo y preferí un verbo que refleje la acción de volver turbia el agua, no solo «fouling» en sentido general. También anclé ambas notas al texto para evitar notas sueltas.'
  spanish_consistency_notes:
  - Mantuve «Yahvé» fuera del versículo porque no aparece en este texto.
  - Usé «pasto» y no «pastura» para conservar la imagen concreta y natural en español.
  - Conservé el paralelismo hebreo con dos preguntas coordinadas por «que además...», evitando una paráfrasis más libre.
  - Las notas a y b están ancladas explícitamente en el texto para cumplir la validación y preservar la alternativa léxica documentada.
