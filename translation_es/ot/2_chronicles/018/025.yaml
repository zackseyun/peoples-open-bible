translation:
  language: es
  text: 'Entonces el rey de Israel dijo: «Tomen a Micaías y devuélvanlo a Amón, el gobernador[a] de la ciudad, y a Joás, hijo[b] del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el comandante de la ciudad». El título hebreo puede referirse a un funcionario cívico o militar.
    reason: lexical_alternative
  - marker: b
    text: Lit. «el hijo del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / וַי-
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» comunica bien la secuencia en español sin volver el relato pesado. «Dijo» conserva el verbo de habla directo del hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey israelita
  lexicon: HALOT
  rationale: La construcción nominal se mantiene de forma transparente. No se sustituye por una paráfrasis gentilicia porque el hebreo nombra el cargo/título, no el nombre propio.
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Tomen a
  - Agarren
  lexicon: HALOT
  rationale: El imperativo plural se expresa naturalmente con «Tomen». Se conserva la fuerza de la orden sin intensificarla indebidamente con «Aprehendan» o «Agarren».
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaiahu
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del nombre bíblico. «Micaiahu» conservaría más de cerca la vocalización hebrea, pero es menos natural para una lectura pública en español.
- source_word: וַהֲשִׁיבֻהוּ
  english_pob_choice: return him
  chosen_spanish: tráiganlo de vuelta
  alternatives_spanish:
  - devuélvanlo
  - llévenlo de regreso
  lexicon: HALOT
  rationale: El causativo de שוב indica hacer volver a alguien. «Tráiganlo de vuelta» expresa bien la idea en español y evita la posible dureza o rareza de un calco como «retórnenlo».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional se rinde con la preposición simple «a» en ambos destinos, como en el español natural.
- source_word: אָמ֣וֹן
  english_pob_choice: Amon
  chosen_spanish: Amon
  alternatives_spanish:
  - Amón
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio tal como aparece en la tradición inglesa del POB, con adaptación mínima al español.
- source_word: שַׂר הָעִיר
  english_pob_choice: the governor of the city
  chosen_spanish: el gobernador de la ciudad
  alternatives_spanish:
  - el comandante de la ciudad
  - el oficial de la ciudad
  - el jefe de la ciudad
  lexicon: HALOT
  rationale: שַׂר puede designar un funcionario o jefe. En este contexto cívico, «gobernador» comunica una función administrativa clara en español; se evita «comandante» como si fuera necesariamente militar, y «jefe» por ser demasiado vago.
- source_word: וְאֶל יוֹאָשׁ
  english_pob_choice: and to Joash
  chosen_spanish: y a Joás
  alternatives_spanish:
  - y hacia Joás
  lexicon: HALOT
  rationale: Se conserva la segunda preposición para marcar que Joás es un segundo destinatario de la orden. El nombre se adapta a la forma usual en español, «Joás».
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo del monarca
  - el príncipe
  lexicon: HALOT
  rationale: Se mantiene la expresión relacional explícita del hebreo. «El príncipe» sería una equivalencia interpretativa válida en algunos contextos, pero no reproduce tan directamente el sintagma original.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantiene sin cambios la solución «governor of the city» y «the king’s son», con consenso alto; la versión española sigue esa línea, conservando la ambigüedad funcional de שַׂר y la relación explícita de בן.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este registro por norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa la transliteración castellana «Micaías» y «Joás» para lectura pública uniforme.
  - Se conserva el paralelismo de destinatarios con dos complementos introducidos por «a» para reflejar el hebreo אֶל.
  - La puntuación con comillas españolas y mayúscula inicial tras los dos puntos sigue las convenciones del español bíblico moderno.
