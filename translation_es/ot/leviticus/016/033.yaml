  text: וְ/כִפֶּר֙ אֶת מִקְדַּ֣שׁ הַ/קֹּ֔דֶשׁ וְ/אֶת אֹ֧הֶל מוֹעֵ֛ד וְ/אֶת הַ/מִּזְבֵּ֖חַ יְכַפֵּ֑ר וְ/עַ֧ל הַ/כֹּהֲנִ֛ים וְ/עַל כָּל עַ֥ם הַ/קָּהָ֖ל יְכַפֵּֽר־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/016/033.yaml
  text: Thus he shall make atonement for the Holy Sanctuary[a], and for the Tent of Meeting, and for the altar[b]; and he shall make atonement for the priests and for all the people of the assembly.
  footnotes:
