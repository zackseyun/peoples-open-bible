review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: Yahvé ama la justicia, no abandona a sus fieles, ellos son preservados para siempre, y la descendencia de los impíos recibe juicio. Sin embargo, dos decisiones no preservan con suficiente fidelidad la fuerza del texto fuente y del rastro POB en inglés: נִשְׁמָרוּ es mejor como presente pasivo (''son guardados'' / ''son preservados'') o, al menos, como afirmación gnómica, no futuro; y נִכְרָת debe mantenerse con el modismo judicial-bíblico ''será cortada'' / ''será eliminada'', no ''será exterminada'', que intensifica y desplaza el matiz de ''cut off''.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. 'Yahvé ama la justicia' y 'no abandona a sus fieles' suenan naturales. No obstante, 'serán guardados' introduce una proyección futura no marcada en el hebreo, y 'será exterminada' suena más duro y menos idiomáticamente bíblico que 'será cortada' o 'será eliminada'. La nota b ya usa 'son preservados', lo que además deja inconsistencia con el texto principal.
  glossary_alignment: 'Buena alineación con los términos del proyecto: יהוה > ''Yahvé'', מִשְׁפָּט > ''justicia'', חֲסִידָיו > ''sus fieles'', זֶרַע > ''descendencia''. La principal desviación es נִכְרָת, donde el inglés POB documenta ''will be cut off'' y el español debe conservar ese valor idiomático judicial; ''exterminada'' va más allá del fundamento léxico documentado. También conviene alinear נִשְׁמָרוּ con la decisión inglesa ''they are kept'' y con la alternativa de nota.'
  issues:
  - severity: medium
    issue: '''serán guardados'' para נִשְׁמָרוּ'
    rationale: 'El hebreo Niphal perfecto aquí funciona naturalmente como afirmación presente/gnómica dentro de la secuencia proverbial: ''son guardados'' o ''son preservados''. El inglés POB eligió ''they are kept'', y la nota alternativa habla de ''are preserved forever''. El futuro español debilita esa alineación y puede sugerir solo promesa futura.'
  - severity: high
    issue: '''será exterminada'' para נִכְרָת'
    rationale: '''Exterminada'' intensifica el sentido y no preserva bien el modismo bíblico/judicial de כרת ''ser cortado'' / ''ser eliminado''. El inglés auditado mantuvo deliberadamente ''will be cut off'' por su resonancia pactual/judicial; el español debe reflejarlo más de cerca.'
  - severity: low
    issue: Ligera inconsistencia entre texto principal y nota b
    rationale: El texto dice 'serán guardados', mientras la nota b dice 'sus fieles son preservados para siempre'. Uniformar el tiempo/aspecto mejora coherencia con la ambigüedad documentada.
  revised_spanish_text: Porque Yahvé ama la justicia y no abandona a sus fieles[a]; son guardados para siempre[b], pero la descendencia de los impíos será cortada.
  revised_footnotes:
  - marker: a
    text: O 'sus santos', 'sus piadosos' o 'sus leales' para 'sus fieles'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo también puede entenderse de manera más estrecha como 'sus fieles son preservados para siempre'.
    reason: alternative_reading
  revision_rationale: Se ajustó נִשְׁמָרוּ a 'son guardados' para reflejar mejor el pasivo gnómico/presente del hebreo y alinearlo con la decisión inglesa 'they are kept'. Se reemplazó 'será exterminada' por 'será cortada' para conservar el modismo bíblico de נִכְרָת ('be cut off') y su resonancia judicial/pactual, evitando una intensificación no justificada por la evidencia fuente.
