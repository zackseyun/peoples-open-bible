revisions:
- from: Efraín[a], como lo he visto, está plantado en un lugar agradable, como Tiro[b]; pero Efraín debe sacar a sus hijos[c] para entregarlos al matador.
  to: Efraín[a], como lo he visto, está plantado en un lugar agradable, como Tiro; pero Efraín debe sacar a sus hijos al que mata[b].
  rationale: Se eliminó «para entregarlos» porque añade una idea no expresada en el hebreo. Se recolocó la nota léxica de הֹרֵג en la cláusula correcta y se suprimió la nota innecesaria sobre «hijos», ya que el español principal puede conservar la forma literal sin crear ambigüedad relevante. También se quitó la coma antes de «como Tiro» para una lectura más fluida.
