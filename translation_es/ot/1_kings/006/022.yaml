translation:
  language: es
  text: Él recubrió toda la casa con oro, hasta que toda la casa quedó terminada; y recubrió con oro el altar entero que pertenecía al santuario interior[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el altar entero del santuario interior»; la frase hebrea puede denotar la relación del altar con el santuario interior, o su ubicación respecto de él.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo debir, el santuario interior; tradicionalmente «el Lugar Santísimo» o, en español más antiguo, «el oráculo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente “casa”. En este contexto se refiere al edificio del templo, pero “la casa” conserva el eco hebreo de la casa de Yahvé y sigue la decisión auditada del POB en inglés.
- source_word: צִפָּה
  english_pob_choice: overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - cubrió
  - plaqueó
  lexicon: HALOT
  rationale: El verbo expresa recubrir una superficie con un material, aquí oro. “Recubrió” comunica esa operación con naturalidad en español y evita el más vago “cubrió”.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Es el término material directo. “Oro” es la equivalencia normal y suficiente; no hay base para añadir cualificación que el texto no da.
- source_word: עַד תֹּם
  english_pob_choice: until ... was finished
  chosen_spanish: hasta que ... quedó terminada
  alternatives_spanish:
  - hasta la terminación de
  - hasta que se completó
  lexicon: HALOT
  rationale: La frase marca culminación del trabajo. “Quedó terminada” mantiene el sentido de finalización del edificio de manera idiomática en español.
- source_word: כָּל
  english_pob_choice: whole
  chosen_spanish: toda / entero
  alternatives_spanish:
  - todo
  - completo
  lexicon: HALOT
  rationale: כָּל expresa totalidad. En español conviene alternar “toda” con “entero” según el sustantivo para sonar natural y mantener el énfasis en la totalidad.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT
  rationale: “Altar” es la equivalencia estándar y clara; “ara” sería más litúrgico pero menos transparente.
- source_word: לַדְּבִיר
  english_pob_choice: the inner sanctuary
  chosen_spanish: al santuario interior
  alternatives_spanish:
  - al lugar santísimo
  - al lugar más santo
  lexicon: HALOT
  rationale: דְּבִיר designa el recinto interior del templo. “Santuario interior” preserva la relación espacial y evita imponer de entrada la terminología tradicional más cerrada de “Lugar Santísimo”.
theological_decisions:
- issue: Identificación de דְּבִיר
  english_pob_reading: inner sanctuary; footnote notes traditional 'Most Holy Place' or 'oracle'
  chosen_spanish_reading: santuario interior
  alternative_spanish_readings:
  - Lugar Santísimo
  - oráculo
  rationale: El inglés POB preserva la ambigüedad/alcance lexical de דְּבִיר y no fuerza una equivalencia tradicional única. “Santuario interior” mantiene esa cautela y sigue siendo comprensible para lectores actuales.
  doctrine_reference: No aplica; decisión lexical-templaria
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el estado de concordancia con la fuente es alto; por ello se conserva la lectura base del POB en inglés, adaptada al español con la misma cautela lexical.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - “Casa” se conserva frente a “templo” para reflejar el hebreo בַּיִת y el audit trail en inglés.
  - “Santuario interior” evita sobrertraducir דְּבִיר como “Lugar Santísimo” cuando el propio POB documenta alternativas.
  - La referencia al altar se mantiene ambigua en español como en el inglés, sin resolver indebidamente entre pertenencia y ubicación.
