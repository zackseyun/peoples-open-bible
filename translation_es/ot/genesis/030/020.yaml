translation:
  language: es
  text: 'Y Lea dijo: «Dios me ha dado un buen don. Esta vez mi marido me honrará[a], porque le he dado seis hijos». Y le puso por nombre Zabulón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitará conmigo». El verbo hebreo es raro y se vincula mediante juego de palabras con el nombre Zabulón; el sentido puede incluir tanto honra como habitación o permanencia con Lea.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבָדַנִי
  english_pob_choice: has endowed me
  chosen_spanish: me ha favorecido
  alternatives_spanish:
  - me ha endosado
  - me ha dado como don
  lexicon: HALOT
  rationale: El verbo expresa idea de otorgar un don o favor. En español, «favorecido» comunica bien la acción de conceder un beneficio sin sonar mecánico. «Endosado» sería demasiado técnico o ajeno al registro bíblico; «me ha dado como don» sería más explicativo que el hebreo.
- source_word: זֵבֶד טוֹב
  english_pob_choice: a good endowment
  chosen_spanish: con un buen favor
  alternatives_spanish:
  - con un buen don
  - con una buena dádiva
  - con una buena dotación
  lexicon: HALOT
  rationale: La POB en inglés optó por «endowment» para preservar el campo semántico de don/otorgamiento y el juego de palabras con el verbo. En español, «favor» mantiene la idea de beneficio recibido y suena natural; «don» y «dádiva» son posibles, pero «favor» encaja mejor con la secuencia y el registro.
- source_word: הַפַּעַם
  english_pob_choice: This time
  chosen_spanish: Esta vez
  alternatives_spanish:
  - Ahora
  - En esta ocasión
  lexicon: HALOT
  rationale: Es la equivalencia idiomática normal en fórmulas de expectativa o cambio de situación.
- source_word: יִזְבְּלֵנִי
  english_pob_choice: will honor me
  chosen_spanish: me honrará
  alternatives_spanish:
  - habitará conmigo
  - dwellará conmigo
  - me exaltará
  lexicon: HALOT
  rationale: 'La POB reconoce la tensión lexical: el verbo es raro y puede implicar tanto «honrar» como «habitar con/permanece con». En el contexto inmediato, Lea espera mejor trato por parte de Jacob; por eso «me honrará» comunica la lectura principal. Se preserva el matiz alternativo en nota.'
- source_word: אִישִׁי
  english_pob_choice: my husband
  chosen_spanish: mi marido
  alternatives_spanish:
  - mi esposo
  - mi hombre
  lexicon: HALOT
  rationale: En contexto matrimonial, «mi marido» es natural, claro y mantiene el tono del relato. «Esposo» también sería posible, pero «marido» refleja mejor el uso narrativo bíblico en español.
- source_word: יָלַדְתִּי לוֹ שִׁשָּׁה בָנִים
  english_pob_choice: I have borne him six sons
  chosen_spanish: le he dado a luz seis hijos
  alternatives_spanish:
  - le he parido seis hijos
  - he alumbrado para él seis hijos
  - le he dado seis hijos
  lexicon: HALOT
  rationale: La construcción hebrea conserva tanto el acto de engendrar/dar a luz como el beneficiario indirecto. «Le he dado a luz seis hijos» mantiene esa relación y es idiomático en español; «parido» sería demasiado crudo y «alumbrado» más arcaico. «Hijos» refleja el término bíblico general para los descendientes masculinos.
- source_word: וַתִּקְרָא אֶת שְׁמוֹ זְבֻלוּן
  english_pob_choice: So she called his name Zebulun
  chosen_spanish: Y llamó su nombre Zabulón
  alternatives_spanish:
  - Y le puso por nombre Zabulón
  - Entonces lo llamó Zabulón
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal transparente con el nombre transliterado según uso español. «Llamó su nombre» sigue de cerca el hebreo y mantiene el enlace con la explicación del nombre.
- source_word: זְבֻלוּן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: HALOT
  rationale: Se adopta la forma tradicional española ampliamente reconocible. La variante «Zebulón» reflejaría más de cerca la vocalización inglesa, pero «Zabulón» es la forma usual y más inteligible en español bíblico.
theological_decisions:
- issue: Tensión semántica entre «honrar» y «habitar/dwelling» en יִזְבְּלֵנִי
  english_pob_reading: 'The main text reads «will honor me,» with a footnoted alternative: «will dwell with me.»'
  chosen_spanish_reading: El texto principal dice «me honrará», con nota de que el verbo raro también puede sugerir «habitará conmigo» o «permanecerá conmigo».
  alternative_spanish_readings:
  - habitará conmigo
  - permanecerá conmigo
  - me dará honra
  rationale: La escena expresa la esperanza de Lea de un trato mejorado de parte de Jacob después de haberle dado seis hijos. Esa lectura social-relacional es la que domina el contexto. A la vez, el hebreo permite un juego de palabras con el nombre Zabulón y conserva un posible matiz de permanencia/dwelling que no debe borrarse.
  doctrine_reference: No doctrinal issue; lexical/theological nuance in naming wordplay and marital relation.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa al preferir una expresión que refleje mejor el juego verbal entre el verbo de «favorecer/endow» y el sustantivo «favor/don», sin perder naturalidad en español. También conserva la tensión lexical de יִזְבְּלֵנִי en una nota, según el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo original trae el Tetragrámaton; aquí el texto usa אֱלֹהִים, por lo que corresponde «Dios».
  - 'Se mantiene la fórmula narrativa de nombramiento con nombre propio transliterado de forma española tradicional: «Zabulón».'
  - «Mi marido» se usa por claridad contextual y coherencia con el relato matrimonial de Génesis 30.
  - Se evita traducir mecánicamente «has endowed me» por un calco rígido; la frase española busca ser natural y a la vez conservar el campo semántico de don/favor.
