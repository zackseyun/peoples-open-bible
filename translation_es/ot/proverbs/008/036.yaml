translation:
  language: es
  text: Pero el que peca contra mí hace violencia a su alma[a]; todos los que me aborrecen aman la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a su vida». Literalmente, «hace violencia a su alma/vida». El hebreo también puede expresar daño contra la propia persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֹטְאִי
  english_pob_choice: the one who sins against me
  chosen_spanish: el que peca contra mí
  alternatives_spanish:
  - el que comete pecado contra mí
  - el que yerra contra mí
  lexicon: HALOT
  rationale: חטא puede expresar tanto la idea de “errar/miss” como la de “pecar”. En este proverbio, con el objeto directo implícito y el marco sapiencial, “peca contra mí” conserva la fuerza moral del texto y sigue la lectura final de la POB en inglés, sin ocultar la relación personal con la sabiduría que habla.
- source_word: חֹמֵס
  english_pob_choice: wrongs
  chosen_spanish: hace violencia a
  alternatives_spanish:
  - agravia
  - perjudica
  - hace daño a
  lexicon: HALOT
  rationale: חמס denota violencia, agravio o daño injusto. “Hace violencia a” reproduce con más cercanía el alcance lexical y mantiene la tensión del hebreo, sin suavizarlo a una simple idea de daño general.
- source_word: נַפְשׁוֹ
  english_pob_choice: his own soul
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o persona. En esta construcción, “su vida” comunica bien la idea de autodaño y evita imponer una distinción antropológica que el proverbio no exige. Se preserva, no obstante, la ambigüedad entre vida y yo personal en la nota.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los que
  alternatives_spanish:
  - todo el que
  - cada uno de los que
  lexicon: HALOT
  rationale: 'El cuantificador universal se adapta naturalmente al español con una relativa plural: “todos los que”, que encaja con el paralelismo proverbial y su tono sentencioso.'
- source_word: מְשַׂנְאַי
  english_pob_choice: who hate me
  chosen_spanish: me aborrecen
  alternatives_spanish:
  - me odian
  - me detestan
  lexicon: HALOT
  rationale: 'El participio con sufijo de primera persona expresa una caracterización continua: los que se mantienen como enemigos de la sabiduría. “Aborrecen” conserva un registro bíblico claro y fuerte, sin aplanar el matiz afectivo del hebreo.'
- source_word: אָהֲבוּ
  english_pob_choice: love
  chosen_spanish: aman
  alternatives_spanish:
  - aman con amor
  - han amado
  lexicon: HALOT
  rationale: Aunque el verbo está en perfecto, en este proverbio tiene valor gnómico. “Aman” expresa la verdad general en español de manera natural y mantiene el paralelismo antitético con “aborrecen”.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - el morir
  lexicon: HALOT
  rationale: “La muerte” es la forma más natural y fiel en español. Conserva la oposición sapiencial entre vida y muerte como consecuencia última del rechazo de la sabiduría.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en una frase de autodaño
  english_pob_reading: Literally, 'does violence to his soul/life.'
  chosen_spanish_reading: hace violencia a su vida
  alternative_spanish_readings:
  - hace violencia a su alma
  - hace violencia a sí mismo
  rationale: La expresión hebrea no obliga a una antropología técnica de “alma” separada del cuerpo. En español, “vida” comunica la autodestrucción implícita y deja abierta la amplitud semántica de נפש; la nota preserva las alternativas literales para no resolver indebidamente la tensión.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final de la POB en inglés: se prefirió el valor moral explícito de חֹטְאִי (“peca contra mí”) y la fuerza formal de חֹמֵס נַפְשׁוֹ (“hace violencia a su vida”), en lugar de una traducción más libre o solo idiomática.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino en la tradición general del proyecto, pero este versículo no lo contiene.
  - Se prefirió el verbo fuerte “hace violencia” para reflejar חמס sin suavizar el tono sapiencial.
  - El paralelismo antitético se conserva con dos miembros equilibrados y una clausula final breve.
  - La nota al pie preserva la ambigüedad de נפש entre alma, vida y persona sin sobreinterpretarla.
