translation:
  language: es
  text: Pero cuando el otro se dio cuenta de que el hombre lo había burlado hábilmente, llegó al templo más grande y santo[a], mientras los sacerdotes ofrecían los sacrificios prescritos, y ordenó que le entregaran al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al gran templo santo». El griego usa un superlativo («más grande»), que puede funcionar como una descripción exaltada del templo, no necesariamente como una comparación literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συγνοὺς
  english_pob_choice: when ... realized
  chosen_spanish: se dio cuenta de que
  alternatives_spanish:
  - cuando comprendió que
  - al advertir que
  lexicon: LSJ
  rationale: El participio aoristo expresa percepción repentina o comprensión; en español, «se dio cuenta de que» reproduce bien esa entrada narrativa sin perder naturalidad.
- source_word: ὁ ἕτερος
  english_pob_choice: the other man
  chosen_spanish: el otro
  alternatives_spanish:
  - el otro hombre
  - el otro individuo
  lexicon: LSJ
  rationale: El contexto inmediato ya identifica a la persona; en español, omitir «hombre» evita repetición pesada y conserva la referencia contrastiva del griego.
- source_word: γενναίως
  english_pob_choice: skillfully
  chosen_spanish: con habilidad
  alternatives_spanish:
  - valerosamente
  - con audacia
  - noblemente
  lexicon: LSJ
  rationale: El adverbio puede abarcar valor o nobleza, pero el audit trail inglés lo resuelve hacia la idea de maniobra eficaz. «Con habilidad» expresa esa eficacia estratégica sin añadir una interpretación moral no exigida por el texto.
- source_word: ἐστρατήγηται
  english_pob_choice: had been outmaneuvered
  chosen_spanish: lo había superado con habilidad
  alternatives_spanish:
  - lo había vencido con estrategia
  - lo había derrotado mediante astucia
  - lo había sobrepasado estratégicamente
  lexicon: LSJ
  rationale: El perfecto pasivo de στρατηγέω apunta a una derrota mediante estrategia. En español, «superado con habilidad» mantiene el matiz táctico y evita un calco poco natural.
- source_word: παραγενόμενος
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - se presentó
  - vino
  lexicon: LSJ
  rationale: El participio narrativo indica llegada al lugar; «llegó» es la equivalencia más limpia y natural en español.
- source_word: ἐπὶ τὸ μέγιστον καὶ ἅγιον ἱερόν
  english_pob_choice: to the greatest and holy temple
  chosen_spanish: al templo más grande y santo[a]
  alternatives_spanish:
  - al gran templo santo
  - al templo grandísimo y santo
  - al santuario más grande y santo
  lexicon: LSJ
  rationale: Se conserva el superlativo μέγιστον con «más grande», y ἅγιον con «santo». «Templo» corresponde al ἱερόν del contexto. Se marca una nota porque el griego puede funcionar como descripción exaltada del templo, no necesariamente una comparación literal de tamaño.
- source_word: τῶν ἱερέων
  english_pob_choice: while the priests
  chosen_spanish: mientras los sacerdotes
  alternatives_spanish:
  - cuando los sacerdotes
  - al tiempo que los sacerdotes
  lexicon: LSJ
  rationale: El genitivo absoluto se vierte temporalmente para dar fluidez en español.
- source_word: τὰς καθηκούσας θυσίας
  english_pob_choice: the customary sacrifices
  chosen_spanish: los sacrificios prescritos
  alternatives_spanish:
  - los sacrificios debidos
  - los sacrificios acostumbrados
  - las ofrendas prescritas
  lexicon: LSJ
  rationale: καθηκούσας expresa lo debido o lo prescrito. «Prescritos» conserva el sentido normativo con mayor precisión que «acostumbrados».
- source_word: προσαγόντων
  english_pob_choice: were offering
  chosen_spanish: ofrecían
  alternatives_spanish:
  - presentaban
  - traían
  lexicon: LSJ
  rationale: En contexto sacrificial, «ofrecer» es el equivalente español natural y fiel.
- source_word: ἐκέλευσεν παραδοῦναι
  english_pob_choice: ordered them to hand over
  chosen_spanish: ordenó que le entregaran
  alternatives_spanish:
  - mandó que se lo entregaran
  - ordenó entregarlo
  lexicon: LSJ
  rationale: La construcción expresa mandato coercitivo; «ordenó que le entregaran» mantiene la fuerza imperativa y el objeto directo en español claro.
- source_word: τὸν ἄνδρα
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: LSJ
  rationale: La repetición griega se conserva con «al hombre», manteniendo el foco narrativo en la persona buscada.
theological_decisions:
- issue: ἱερόν referido al santuario de Jerusalén
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - santuario
  - recinto del templo
  rationale: No hay necesidad doctrinal de introducir perífrasis; «templo» es el equivalente natural y conserva el referente del complejo sagrado de Jerusalén. La nota sobre el superlativo deja abierta la amplitud semántica del término.
  doctrine_reference: Consistencia terminológica del recinto sagrado; lectura histórica del relato.
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail: γενναίως no se vinculó a una idea de «valor» como sustantivo (“boldness”), sino al modo eficaz de la acción («con habilidad»). También se mantuvo la fuerza superlativa de μέγιστον y el mandato coercitivo de ἐκέλευσεν παραδοῦναι.'
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν, coherente con el paquete inglés y con el uso bíblico en español.
  - Se evita «SEÑOR» u otras sustituciones teológicas no pertinentes; no hay nombres divinos en este versículo.
  - «Sacrificios prescritos» preserva el matiz normativo de καθηκούσας sin volverlo arcaico.
  - La secuencia narrativa respeta los participios griegos con verbos finitos fluidos en español.
