translation:
  language: es
  text: y Maaseías, Shemaías, Eleazar, Uzzi, Jehohanán, Malquías, Elam y Ezer. Y los cantores hicieron oír sus voces[a], con Izrajías el supervisor[b].
  philosophy: optimal-equivalence
  footnotes:
