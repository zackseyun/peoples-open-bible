review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la fórmula narrativa hebrea: וַיְדַבֵּר = «habló», יְהוָה = «Yahvé», los dos destinatarios con preposición repetida «a Moisés y a Aarón», y לֵאמֹר = «diciendo». No hay pérdida semántica relevante respecto del hebreo ni de la auditoría inglesa.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Yahvé habló a Moisés y a Aarón, diciendo,». La única objeción es la nota al pie: presenta «Yahvé» como transliteración alternativa de «YHWH», pero «Yahvé» ya es la forma principal en español; la nota, copiada mecánicamente del inglés, resulta poco útil y circular en español.'
  glossary_alignment: 'La terminología del proyecto está bien alineada: יְהוָה se traduce correctamente como «Yahvé», no «SEÑOR»; los nombres propios y la fórmula verbal siguen el estándar POB. La excepción necesaria es ajustar la nota para que la alternativa española real sea «Jehová», no repetir «Yahvé».'
  issues:
  - severity: medium
    issue: La nota al pie es circular y no adapta correctamente la alternativa al español.
    rationale: 'El inglés anota «Hebrew: ''YHWH''; alternatively rendered ''Yahweh''». En español, como el texto principal ya usa «Yahvé», decir «también puede transliterarse ‘Yahvé’» no aporta información. La alternativa española documentable es «Jehová», manteniendo la referencia al hebreo YHWH.'
  revised_spanish_text: Yahvé habló a Moisés y a Aarón[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transliterarse «Jehová».'
    reason: alternative_reading
  revision_rationale: Se conserva íntegro el texto principal porque es fiel al hebreo y al estilo del proyecto. Solo se corrige la nota para que refleje una alternativa real en español y no repita de forma redundante la misma forma ya usada en el texto principal.
