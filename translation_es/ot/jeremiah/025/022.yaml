translation:
  language: es
  text: y a todos los reyes de Tiro, y a todos los reyes de Sidón, y a los reyes de la tierra costera[a] que está al otro lado del mar;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Tierra costera’ traduce aquí el hebreo אִי de manera amplia. Aunque puede significar ‘isla’, en lenguaje profético suele referirse también a regiones marítimas o costeras.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos / a todos
  alternatives_spanish:
  - cada uno
  - todos los
  lexicon: HALOT
  rationale: En esta lista distributiva, ‘todos’ reproduce bien el alcance total del juicio. El dativo repetido ‘a todos’ conserva la coordinación del hebreo con sentido natural en español.
- source_word: מַלְכֵי
  english_pob_choice: kings of
  chosen_spanish: los reyes de / a los reyes de
  alternatives_spanish:
  - los gobernantes de
  - los monarcas de
  lexicon: HALOT
  rationale: ‘Reyes de’ sigue de cerca el constructo hebreo מַלְכֵי y evita una paráfrasis interpretativa como ‘gobernantes’.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tir
  - Tyre
  lexicon: HALOT
  rationale: ‘Tiro’ es la forma española usual del nombre propio y comunica el lugar de manera clara y reverente.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: HALOT
  rationale: ‘Sidón’ es la forma española establecida del topónimo y mantiene la referencia geográfica directa.
- source_word: הָאִי
  english_pob_choice: the coastland
  chosen_spanish: la tierra costera
  alternatives_spanish:
  - la isla
  - la costa
  - la región marítima
  lexicon: HALOT
  rationale: El hebreo אִי puede significar ‘isla’, pero en uso profético también puede abarcar una región costera o marítima. ‘Tierra costera’ preserva esa amplitud sin restringir indebidamente el sentido a una isla literal.
- source_word: אֲשֶׁר בְּעֵבֶר הַיָּם
  english_pob_choice: that is across the sea
  chosen_spanish: que está al otro lado del mar
  alternatives_spanish:
  - que está más allá del mar
  - que queda del otro lado del mar
  lexicon: HALOT
  rationale: La cláusula relativa se expresa de modo natural en español con ‘que está al otro lado del mar’, manteniendo el valor espacial de ‘más allá / al otro lado’ de בְּעֵבֶר sin perder claridad.
- source_word: וְאֵת ... וְאֵת ... וְאֵת
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - también ... también ... también
  lexicon: HALOT
  rationale: La repetición coordinante reproduce la cadena enumerativa hebrea. El marcador de objeto no se vierte directamente, pero la coordinación simple en español conserva el ritmo del texto.
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del POB inglés al reflejar explícitamente la cláusula relativa de אֲשֶׁר con ‘que está al otro lado del mar’. También conserva la lectura ampliada de הָאִי como región costera, no como ‘isla’ en sentido estrecho.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ no porque aparezca el Tetragrámaton en este versículo, sino para mantener coherencia terminológica del proyecto cuando corresponda.
  - Se ha preferido ‘Tiro’ y ‘Sidón’ como topónimos españoles estándar, en línea con el registro bíblico publicado en español.
  - La puntuación con punto y coma al final mantiene la continuidad sintáctica del listado, como en el hebreo y la versión inglesa auditada.
