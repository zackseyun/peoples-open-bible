revisions:
- from: Mañana bajen contra ellos. Miren[a], vienen subiendo por la subida de Ziz, y los encontrarán al final del wadi, frente al desierto de Jeruel.
  to: Mañana bajen contra ellos. Miren[a], vienen subiendo por la subida de Ziz, y los encontrarán al final del wadi, frente al yermo de Jeruel.
  rationale: Se corrige «desierto» a «yermo» para respetar mejor el valor de מִדְבָּר según la justificación léxica auditada («wilderness», no necesariamente desierto arenoso). Se mantiene «wadi» en el texto principal por coherencia con la decisión topográfica del POB, pero la nota se adapta completamente al español con alternativas comprensibles para el lector.
