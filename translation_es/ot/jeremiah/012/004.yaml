translation:
  language: es
  text: '¿Hasta cuándo se lamentará[a] la tierra, y se secará la hierba de cada campo? A causa de la maldad de los que habitan en ella, las bestias y las aves son arrebatadas, porque dicen: «No verá nuestro desenlace»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «estará de luto»; el hebreo personifica la tierra como alguien que lamenta.
    reason: lexical_alternative
  - marker: b
    text: O, «nuestro fin», «nuestro futuro» o «lo que será de nosotros». El hebreo deja implícito el sujeto de «ver».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאֱבַ֣ל
  english_pob_choice: will ... mourn
  chosen_spanish: se lamentará
  alternatives_spanish:
  - estará de luto
  - llorará
  lexicon: HALOT
  rationale: El verbo hebreo אבל expresa lamento o duelo. Con «la tierra» como sujeto, el español personificado «se lamentará» conserva el sentido sin forzar una imagen funeraria más pesada de lo que el contexto exige.
- source_word: הָ/אָ֔רֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: HALOT
  rationale: En Jeremías, el término suele referirse al territorio afectado por juicio, no al globo entero. «La tierra» es natural en español y mantiene la amplitud poética del hebreo.
- source_word: וְ/עֵ֥שֶׂב כָּל הַ/שָּׂדֶ֖ה
  english_pob_choice: the grass of every field
  chosen_spanish: la hierba de todo campo
  alternatives_spanish:
  - la vegetación de todo campo
  - la hierba de cada campo
  lexicon: HALOT
  rationale: עֵשֶׂב abarca hierba o vegetación baja. «La hierba de todo campo» reproduce la imagen agrícola de modo claro y idiomático en español.
- source_word: יִיבָ֑שׁ
  english_pob_choice: dry up
  chosen_spanish: se secará
  alternatives_spanish:
  - se marchitará
  - se pondrá seca
  lexicon: HALOT
  rationale: El verbo יבש señala secarse o quedar seco. «Se secará» es una equivalencia directa y natural para la vegetación.
- source_word: מֵ/רָעַ֣ת יֹֽשְׁבֵי בָ֗/הּ
  english_pob_choice: Because of the evil of those who dwell in it
  chosen_spanish: A causa de la maldad de los que habitan en ella
  alternatives_spanish:
  - Por la maldad de los que viven en ella
  - A causa de la maldad de sus habitantes
  lexicon: HALOT
  rationale: La preposición causal y רָעָה permiten «a causa de la maldad». «Los que habitan en ella» refleja el participio sin reducirlo solo a una categoría abstracta como «habitantes», y mantiene la relación con la tierra.
- source_word: סָפְתָ֤ה
  english_pob_choice: are swept away
  chosen_spanish: son arrebatadas
  alternatives_spanish:
  - son barridas
  - perecen
  - son consumidas
  lexicon: HALOT
  rationale: El verbo ספה puede implicar ser llevado/apartado, consumido o barrido. «Son arrebatadas» conserva la fuerza de remoción por juicio y suena natural con «bestias y aves».
- source_word: בְהֵמוֹת֙ וָ/ע֔וֹף
  english_pob_choice: beasts and birds
  chosen_spanish: las bestias y las aves
  alternatives_spanish:
  - los animales y las aves
  - las fieras y las aves
  lexicon: HALOT
  rationale: בְהֵמוֹת aquí funciona de manera amplia para animales del campo, no solo ganado. «Bestias y aves» preserva el paralelismo hebreo y la sobriedad poética del texto.
- source_word: כִּ֣י אָמְר֔וּ
  english_pob_choice: for they say
  chosen_spanish: porque dicen
  alternatives_spanish:
  - pues dicen
  - porque decían
  lexicon: HALOT
  rationale: כִּי introduce la causa o explicación. El español presente «dicen» expresa la actitud verbal citada en forma directa y actual, como en la lectura inglesa auditada.
- source_word: לֹ֥א יִרְאֶ֖ה
  english_pob_choice: He will not see
  chosen_spanish: No verá
  alternatives_spanish:
  - No ve
  - No mirará
  lexicon: HALOT
  rationale: El hebreo deja implícito el sujeto; el contexto sugiere referencia divina, pero el original no nombra a Dios. En español, «No verá» mantiene esa ambigüedad sintáctica y evita añadir un sujeto no explícito.
- source_word: אַחֲרִיתֵֽ/נוּ
  english_pob_choice: our latter end
  chosen_spanish: nuestro fin
  alternatives_spanish:
  - nuestro futuro
  - nuestro desenlace
  - nuestra postrimería
  lexicon: HALOT
  rationale: אַחֲרִית puede significar fin, resultado o destino final. «Nuestro fin» es la opción más directa y conserva la amplitud de sentido que la nota inglesa señala; en este contexto puede incluir el desenlace o resultado de la situación.
theological_decisions:
- issue: Sujeto implícito de «יִרְאֶה»
  english_pob_reading: 'The pronoun refers to God: ''He will not see our latter end.'''
  chosen_spanish_reading: 'El sujeto queda implícito en el texto: «No verá nuestro fin».'
  alternative_spanish_readings:
  - «Él no verá nuestro fin»
  - «Dios no verá nuestro fin»
  - «No verá nuestro futuro»
  rationale: La lectura inglesa marca la probabilidad de una referencia divina, pero el hebreo no la explicita. En español, dejar el sujeto implícito preserva la tensión textual y evita convertir una inferencia interpretativa en una afirmación explícita.
  doctrine_reference: Divine omniscience / judgment implied by context, without over-specifying the subject
- issue: Sentido de אַחֲרִיתֵנוּ
  english_pob_reading: our latter end / our end / what becomes of us
  chosen_spanish_reading: nuestro fin
  alternative_spanish_readings:
  - nuestro futuro
  - lo que será de nosotros
  - nuestro desenlace
  rationale: La palabra hebrea abarca fin, resultado y destino. «Nuestro fin» mantiene la concisión del hebreo y deja abierta la gama semántica reconocida por la nota auditada.
  doctrine_reference: Lexical ambiguity preserved; outcome/future sense retained
translation_notes:
  revision_awareness: La revisión auditada en inglés ajustó «our end» a «our latter end» para acercarse más a אַחֲרִיתֵנוּ sin cambiar el enfoque formal. En español se optó por «nuestro fin», porque comunica con naturalidad la misma gama semántica y permite preservar la ambigüedad destacada por el aparato crítico. No se introdujo ninguna expansión doctrinal no presente en el hebreo.
  spanish_consistency_notes:
  - Se usa «la tierra» para הָאָרֶץ, coherente con el valor territorial/contextual de Jeremías.
  - Se evita «SEÑOR»; no aparece el tetragrámaton ni un sustituto en este versículo.
  - Se traduce רָעָה como «maldad», manteniendo la evaluación moral fuerte del texto.
  - «Bestias y aves» conserva el paralelismo poético del hebreo y el tono de juicio cósmico.
  - La ausencia de sujeto explícito en «No verá» se preserva deliberadamente para no sobretraducir la inferencia teológica.
