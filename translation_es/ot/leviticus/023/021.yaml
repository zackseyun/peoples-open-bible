translation:
  language: es
  text: Y en ese mismo día proclamarán una convocación santa[a]; no harán ningún trabajo laborioso[b]. Es un estatuto perpetuo[c] en todos sus lugares donde habiten, por sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "una asamblea santa" o "una asamblea sagrada".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "ningún trabajo de labor/servicio"; es decir, ningún trabajo ordinario o servil.'
    reason: lexical_alternative
  - marker: c
    text: O "un estatuto permanente" o "un estatuto eterno".
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/קְרָאתֶם
  english_pob_choice: you shall proclaim
  chosen_spanish: proclamarán
  alternatives_spanish:
  - llamarán
  - anunciarán
  lexicon: HALOT
  rationale: En este contexto cultual, קרא no es solo “llamar” en sentido general, sino declarar formalmente una asamblea o convocatoria. “Proclamarán” conserva ese acto público y oficial en español.
- source_word: בְּ/עֶצֶם הַ/יּוֹם הַ/זֶּה
  english_pob_choice: on that very day
  chosen_spanish: en ese mismo día
  alternatives_spanish:
  - en ese mismo día preciso
  - en aquel mismo día
  lexicon: HALOT
  rationale: La expresión intensifica la referencia temporal. “En ese mismo día” mantiene el énfasis de inmediatez y precisión sin sonar forzado.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una convocación santa
  alternatives_spanish:
  - una asamblea santa
  - una convocación sagrada
  lexicon: HALOT
  rationale: Se conserva el valor técnico de מִקְרָא como reunión convocada. “Convocación” evita reducirlo a una reunión cualquiera; “santa” refleja קֹדֶשׁ con un registro bíblico claro en español.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: no laborious work
  chosen_spanish: ningún trabajo de labor
  alternatives_spanish:
  - ninguna obra laboriosa
  - ningún trabajo servil
  - ninguna labor ordinaria
  lexicon: HALOT
  rationale: La frase hebrea distingue el trabajo ordinario/de servicio del descanso total. “Trabajo de labor” intenta preservar esa tensión y evitar que el mandato suene como una prohibición absoluta de toda actividad.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán
  alternatives_spanish:
  - no harán ustedes
  - no harán ningún
  lexicon: HALOT
  rationale: La negación legal se expresa de manera directa y natural en español. Se integra con el objeto para mantener el tono normativo del texto.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - un estatuto permanente
  - una ordenanza perpetua
  - una disposición perpetua
  lexicon: HALOT
  rationale: עוֹלָם en fórmulas legales suele indicar duración continua dentro del marco pactual, no necesariamente una abstracción metafísica. “Perpetuo” conserva la fuerza durativa; “estatuto” sigue la terminología legal bíblica.
- source_word: בְּ/כָל מוֹשְׁבֹתֵיכֶם
  english_pob_choice: throughout your dwellings
  chosen_spanish: en todas sus moradas
  alternatives_spanish:
  - en todos sus lugares de habitación
  - en todas sus residencias
  lexicon: HALOT
  rationale: מוֹשָׁבוֹת apunta a los lugares donde el pueblo habita. “Moradas” es una opción bíblica natural en español y mantiene el sentido distributivo de “en todas”. Se usa “sus” por concordancia con el sujeto plural implícito del mandato.
- source_word: לְ/דֹרֹתֵיכֶם
  english_pob_choice: for your generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - para sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La fórmula indica continuidad a lo largo de las generaciones sucesivas. “Por sus generaciones” suena natural en español bíblico contemporáneo y conserva el sentido de transmisión generacional.
theological_decisions:
- issue: Alcance de la prohibición de trabajo
  english_pob_reading: Render כָּל מְלֶאכֶת עֲבֹדָה as 'no laborious work' rather than the broader 'no work.'
  chosen_spanish_reading: traducirla como “ningún trabajo de labor” en vez de “ningún trabajo”
  alternative_spanish_readings:
  - ningún trabajo
  - ningún trabajo regular
  - ningún trabajo ordinario
  rationale: El hebreo legal aquí no prohíbe necesariamente toda actividad posible, sino el trabajo ordinario/de servicio. La formulación española procura evitar una ampliación indebida del mandato, manteniendo la tensión lexical documentada en el texto fuente y en el POB inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje inglés revisado quedó sin cambios tras la última pasada, con acuerdo alto y solo observaciones menores. La redacción española sigue el mismo perfil de equivalencia óptima, conservando la decisión técnica sobre מִקְרָא קֹדֶשׁ y la restricción de כָּל מְלֶאכֶת עֲבֹדָה sin suavizarla ni ampliarla.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” porque no aparece el tetragrámaton en este versículo.
  - 'Se mantuvo una terminología legal bíblica estable: “convocación”, “estatuto”, “moradas”, “generaciones”.'
  - Se eligió “santa” para קֹדֶשׁ en lugar de “sagrada” en el texto principal por su mayor continuidad con el registro bíblico en español, dejando la alternativa en nota.
  - La nota de trabajo refleja la tensión lexical del hebreo sin convertirla en una prohibición más absoluta que la indicada por el POB inglés.
