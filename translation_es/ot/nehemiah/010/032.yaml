review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca las decisiones del POB inglés: mantiene «los pueblos de la tierra», distingue «mercancías» y «grano», expresa correctamente la prohibición de comprar en sábado o día santo, y conserva la interpretación probable de מַשָּׂא כָל־יָד como «toda deuda» con nota alternativa. Sin embargo, hay varios puntos de español y de fidelidad estilística que conviene ajustar: «en el día de sábado» suena poco natural; «no compraremos de ellos» es gramaticalmente débil frente a «no les compraremos»; y la nota [a] está anclada en «vender», aunque su contenido explica la cláusula final «toda deuda/reclamación», no el infinitivo «vender».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero contiene giros poco idiomáticos para un español bíblico natural. «Día de sábado» y «compraremos de ellos» suenan forzados. «Dejaremos pasar el séptimo año» es comprensible, pero algo débil; «prescindiremos del séptimo año» sería peor, así que conviene una formulación más directa que conserve la amplitud del hebreo. «Renunciaremos al séptimo año» no funciona. La mejor reparación mínima es mejorar los giros principales y reubicar la nota al sintagma final.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, espíritu, carne, justicia, gracia, etc. Las decisiones léxicas principales están alineadas con el POB: «pueblos de la tierra», «mercancías», «grano», «día santo», «toda deuda».'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica מַשָּׂא כָל־יָד («toda deuda / reclamación / exacción»), pero en el borrador aparece después de «vender». Esto desorienta al lector y no cumple la disciplina de anclar la nota en la palabra o frase pertinente.
  - severity: medium
    issue: «No compraremos de ellos» es poco idiomático
    rationale: Aunque calca la estructura hebrea, en español natural y claro la forma correcta es «no les compraremos» o «no compraremos nada de ellos». La opción actual suena defectuosa.
  - severity: low
    issue: «En el día de sábado» / «en sábado» es mejorable
    rationale: «En el día de sábado» resulta torpe en español contemporáneo. «En día de sábado» o simplemente «en sábado» fluye mejor, pero dado el énfasis del hebreo, «en día de sábado» conserva algo de la forma sin volverse extraño.
  - severity: low
    issue: «Dejaremos pasar el séptimo año» es algo impreciso
    rationale: Comunica una idea general de dejarlo transcurrir, pero no expresa tan bien la renuncia/observancia sabática. Aun así, no es un error grave; con una mejora de estilo puede mantenerse la amplitud semántica sin sobreinterpretar.
  revised_spanish_text: En cuanto a los pueblos de la tierra que traen mercancías y todo grano en día de sábado para vender, no les compraremos en sábado ni en día santo; y dejaremos el séptimo año y toda deuda[a].
  revised_footnotes:
  - marker: a
    text: O «toda reclamación» o «toda exacción»; la frase hebrea dice literalmente «la carga/exacción de toda mano».
    reason: lexical_alternative
  revision_rationale: 'Se hace una corrección mínima pero necesaria: se reubica la nota al sintagma final que realmente comenta; se reemplaza «no compraremos de ellos» por el español idiomático «no les compraremos»; y se suaviza «en el día de sábado» a «en día de sábado». Además, «dejaremos el séptimo año» refleja mejor la tersura del hebreo que «dejaremos pasar», sin imponer una interpretación más específica que la del POB inglés.'
