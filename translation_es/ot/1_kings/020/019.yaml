base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/019.yaml
  text: 'These went out from the city: the young men of the commanders of the provinces[a], and the army that was behind them.'
  footnotes:
  - marker: a
    text: Or 'the servants/attendants of the provincial commanders.' The Hebrew נַעֲרֵי can refer either to young men or to personal attendants, and the context may include both ideas.
