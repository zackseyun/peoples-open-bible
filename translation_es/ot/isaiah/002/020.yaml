translation:
  language: es
  text: En aquel día el hombre arrojará sus ídolos de plata y sus ídolos de oro, que hicieron para él para postrarse ante ellos[a], a los topos[b] y a los murciélagos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «postrarse»; es decir, adorarlos.'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea probablemente se refiere a topos u otros animales que cavan; el animal exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva en español con el giro idiomático y solemne «En aquel día», que mantiene el tono escatológico sin perder naturalidad.
- source_word: יַשְׁלִיךְ
  english_pob_choice: will throw away
  chosen_spanish: arrojará
  alternatives_spanish:
  - tirará
  - desechará
  - lanzará
  lexicon: HALOT
  rationale: «Arrojar» reproduce bien la fuerza de desechar violentamente o repudiar los ídolos; en español suena más elevado que «tirar» y más preciso que una simple equivalencia mecánica.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  - el ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular genérico masculino del hebreo, como en la decisión inglesa. En español «el hombre» conserva la forma representativa sin convertir el sujeto en plural ni suavizar la referencia.
- source_word: אֱלִילֵי
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos despreciables
  - nada más que ídolos
  lexicon: HALOT
  rationale: «Ídolos» es la equivalencia directa y clara. El matiz pejorativo del hebreo queda en el contexto, sin añadir glosas al texto principal.
- source_word: כַסְפּוֹ ... זְהָבוֹ
  english_pob_choice: his idols of silver and his idols of gold
  chosen_spanish: sus ídolos de plata y sus ídolos de oro
  alternatives_spanish:
  - sus ídolos plateados y sus ídolos dorados
  - sus ídolos de plata y de oro
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de «ídolos de…» para reflejar el paralelismo y el tono enfático de la condena.
- source_word: אֲשֶׁר עָשׂוּ לוֹ
  english_pob_choice: which they made for him
  chosen_spanish: que hicieron para él
  alternatives_spanish:
  - que fueron hechos para él
  - que ellos le hicieron
  lexicon: HALOT
  rationale: El plural «hicieron» sigue el hebreo y evita convertir innecesariamente la frase en pasiva. «Para él» conserva el dativo objetivo de לוֹ.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to bow down to
  chosen_spanish: para postrarse
  alternatives_spanish:
  - para adorar
  - para inclinarse ante
  lexicon: HALOT
  rationale: «Postrarse» mantiene el gesto físico del verbo hebreo y deja que el sentido de culto se entienda por el contexto, tal como en la lectura inglesa.
- source_word: לַחְפֹּר פֵּרוֹת
  english_pob_choice: to the moles
  chosen_spanish: a los topos
  alternatives_spanish:
  - a los animales que cavarían
  - a las criaturas que cavan
  lexicon: HALOT
  rationale: Se adopta la solución convencional «topos», que refleja la opción inglesa y preserva la imagen de abandono a animales de madriguera, aunque el hebreo exacto sea incierto.
- source_word: וְלָעֲטַלֵּפִים
  english_pob_choice: and to the bats
  chosen_spanish: y a los murciélagos
  alternatives_spanish:
  - y a los murciélagos nocturnos
  lexicon: HALOT
  rationale: Equivalencia directa y natural en español; mantiene el contraste con los topos y el ambiente de lugares oscuros y deshabitados.
theological_decisions:
- issue: Valor genérico de הָאָדָם
  english_pob_reading: generic singular 'man' referring to humanity representatively
  chosen_spanish_reading: «el hombre» como singular genérico representativo
  alternative_spanish_readings:
  - «la humanidad»
  - «la gente»
  - «el ser humano»
  rationale: Se conserva el singular del hebreo y la decisión inglesa, evitando diluir la forma textual en una abstracción colectiva. En este contexto profético, el singular genérico funciona de manera natural en español.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם *adam*'
- issue: Sentido de לְהִשְׁתַּחֲוֹת
  english_pob_reading: to bow down to; that is, to worship them
  chosen_spanish_reading: «para postrarse» con valor de culto implícito
  alternative_spanish_readings:
  - «para adorar»
  - «para inclinarse ante»
  rationale: Se mantiene el gesto corporal del hebreo sin perder la implicación religiosa. En español «postrarse» permite conservar la tensión entre acto físico y adoración, como hace la nota inglesa.
  doctrine_reference: HALOT; note on לְהִשְׁתַּחֲוֹת in the source packet
- issue: Identificación de פֵּרוֹת
  english_pob_reading: likely refers to moles or other burrowing creatures; the exact animal is uncertain
  chosen_spanish_reading: «topos» en el texto principal, con cautela sobre la exactitud zoológica
  alternative_spanish_readings:
  - «animales que cavan»
  - «criaturas de madriguera»
  rationale: Se sigue la lectura convencional adoptada por la POB inglesa, pero sin absolutizarla. La incertidumbre zoológica permanece como tensión documentada, no como decisión cerrada.
  doctrine_reference: HALOT; source note on the uncertain animal term
translation_notes:
  revision_awareness: El pasaje no recibió revisiones textuales en el último pase; la presente versión sigue la lectura estable del audit trail inglés y conserva las decisiones ya aprobadas, con adaptación idiomática al español sin alterar el perfil lexical o teológico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el singular genérico «el hombre» en lugar de pluralizarlo.
  - Se evita traducir לְהִשְׁתַּחֲוֹת únicamente como «adorar» para no borrar el gesto corporal.
  - La incertidumbre de פֵּרוֹת queda reflejada en la nota, sin sobreespecificar el animal.
  - Se conserva la repetición paralela «sus ídolos de… y sus ídolos de…» para reflejar la forma hebrea.
