translation:
  language: es
  text: Entonces Jacob sirvió siete años por Raquel[a], y le parecieron como unos pocos días, a causa de su amor por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y fueron a sus ojos como unos pocos días».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - trabajó
  - laboró
  lexicon: HALOT
  rationale: El hebreo עבד puede significar 'servir' o 'trabajar'. Aquí se trata del trabajo de Jacob como servicio de compromiso por Raquel; 'sirvió' conserva mejor el matiz relacional y contractual que 'trabajó'.
- source_word: בְּרָחֵל
  english_pob_choice: for Rachel
  chosen_spanish: por Raquel
  alternatives_spanish:
  - para Raquel
  - en intercambio por Raquel
  lexicon: HALOT
  rationale: La preposición ב en este contexto idiomático expresa la finalidad o condición de la labor de Jacob respecto de Raquel. 'Por Raquel' es natural en español y mantiene la idea de servicio realizado con miras a obtenerla como esposa.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: seven years
  chosen_spanish: siete años
  lexicon: HALOT
  rationale: Expresión numérica directa; 'años' es la equivalencia normal de שנים en este contexto.
- source_word: וַיִּהְי֤וּ בְעֵינָיו
  english_pob_choice: they seemed to him
  chosen_spanish: le parecieron
  alternatives_spanish:
  - le parecían
  - fueron en sus ojos
  lexicon: HALOT
  rationale: La expresión idiomática 'en sus ojos' comunica percepción subjetiva. 'Le parecieron' transmite con claridad el sentido idiomático y el punto de vista de Jacob en español moderno.
- source_word: כְּיָמִים אֲחָדִים
  english_pob_choice: like only a few days
  chosen_spanish: como unos pocos días
  alternatives_spanish:
  - como unos días
  - como pocos días
  lexicon: HALOT
  rationale: Literalmente expresa 'como días, unos pocos'. 'Como unos pocos días' conserva la imagen y el sentido idiomático de duración breve percibida.
- source_word: בְּאַהֲבָתוֹ אֹתָהּ
  english_pob_choice: because of his love for her
  chosen_spanish: por su amor hacia ella
  alternatives_spanish:
  - a causa de su amor por ella
  - debido a su amor hacia ella
  lexicon: HALOT
  rationale: 'El sustantivo אהבה con la preposición ב expresa la circunstancia o causa: los años le parecieron cortos por el amor que sentía. ''Por su amor hacia ella'' preserva ese valor causal sin sobreexplicar.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la línea interpretativa del POB en inglés: servicio de Jacob, percepción subjetiva y causalidad por amor, sin añadir elementos ajenos al pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'Raquel' y no 'Rachel' para la naturalidad del español bíblico.
  - Se usa 'sirvió' en lugar de 'trabajó' para conservar el matiz de servicio matrimonial/contractual del hebreo.
  - La nota al pie recoge la alternativa más literal del hebreo sobre 'en sus ojos'.
