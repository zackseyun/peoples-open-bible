review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB en la mayoría de los puntos: Heber como ceneo, separación del grupo, ''hijos de Hobab'', ''suegro de Moisés'' con nota alternativa, y proximidad a Quedes. Sin embargo, ''había plantado su tienda'' no refleja tan bien el modismo וַיֵּט אָהֳלוֹ como ''había tendido/instalado su tienda'', y ''de Zaanaim'' debería ser ''en Zaanaim'' para representar correctamente ב־ locativo y el inglés auditado ''in Zaannannim''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos de naturalidad/fidelidad mejorables: ''plantado su tienda'' suena menos idiomático en registro bíblico que ''tendido su tienda'', y ''la encina de Zaanaim'' combinado con la nota ''en Zaanaim'' crea inconsistencia preposicional. La revisión propuesta mejora fluidez y precisión sin apartarse del texto fuente.'
  glossary_alignment: No hay conflictos con la terminología central del proyecto. 'Ceneo/ceneos', 'Moisés' y el tratamiento de חֹתֵן con nota alternativa están alineados con el POB. No aparecen términos de glosario mayor como Yahvé/Mesías. La nota botánica se conserva adecuadamente.
  issues:
  - severity: medium
    issue: Modismo de וַיֵּט אָהֳלוֹ
    rationale: '''Había plantado su tienda'' es comprensible, pero para נטה אהל el español más fiel y natural en este contexto es ''había tendido su tienda'' o ''había instalado su tienda''. Preserva mejor la imagen de extender/establecer la tienda.'
  - severity: medium
    issue: Preposición del topónimo בצענים
    rationale: El hebreo usa ב locativo, y el POB inglés auditado traduce 'in Zaannannim'. Por eso debe decir 'en Zaanaim', no 'de Zaanaim'.
  - severity: low
    issue: Consistencia entre texto y nota sobre אֵלוֹן
    rationale: 'Si el texto principal dice ''la encina en Zaanaim'', la nota alternativa debe mantener la misma relación locativa: ''el terebinto en Zaanaim'', no una formulación discrepante.'
  revised_spanish_text: Ahora bien, Heber el ceneo se había separado de los ceneos[a], de los hijos de Hobab, suegro de Moisés, y había tendido su tienda hasta la encina[b] en Zaanaim, que está cerca de Quedes.
  revised_footnotes:
  - marker: a
    text: O 'pariente por matrimonio de Moisés'; el término hebreo puede ser más amplio que 'suegro'.
    reason: alternative_reading
  - marker: b
    text: O 'el terebinto' en Zaanaim.
    reason: lexical_alternative
  revision_rationale: Se corrige el modismo verbal para reflejar mejor נטה אהל ('tender la tienda') y se ajusta la preposición del topónimo a un locativo ('en Zaanaim'), en conformidad con el hebreo y el POB inglés. También se armoniza la nota botánica con la sintaxis revisada.
