base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/020/010.yaml
  text: 'For I have heard the whispering of many: “Terror on every side!” “Report[a], and let us report it!” All the men at peace with me are watching for my stumbling: “Perhaps he will be deceived, and we will prevail against him[b], and we will take our vengeance on him.”'
  footnotes:
  - marker: a
    text: Or “Denounce him, and we will denounce him.” The Hebrew verb means “tell, report, declare,” but in this hostile context it can carry the sense of denunciation.
    reason: lexical_alternative
  - marker: b
    text: Literally “watching my limp” or “watching my side.” The expression likely means watching for a weakness, misstep, or downfall.
    reason: lexical_alternative
