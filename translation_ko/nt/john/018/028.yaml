source:
  edition: SBLGNT
  text: Ἄγουσιν οὖν τὸν Ἰησοῦν ἀπὸ τοῦ Καϊάφα εἰς τὸ πραιτώριον· ἦν δὲ πρωΐ· καὶ αὐτοὶ οὐκ εἰσῆλθον εἰς τὸ πραιτώριον, ἵνα μὴ μιανθῶσιν ⸀ἀλλὰ φάγωσιν τὸ πάσχα.
base_translation:
  language: en
  yaml_path: translation/nt/john/018/028.yaml
  text: So they led Jesus from Caiaphas into the governor’s headquarters[a]. Now it was early morning. They themselves did not enter the headquarters, so that they would not be defiled[c][b], but could eat the Passover.
  footnotes:
  - marker: a
    text: Or 'the Praetorium,' the Roman governor’s official residence and judicial headquarters.
    reason: lexical_alternative
  - marker: b
    text: '''Be defiled'' refers to becoming ceremonially unclean.'
    reason: cultural_note
  - marker: c
    text: '''Eat the Passover'' may refer specifically to the Passover meal or more broadly to festival meals/observances during Passover.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러고 나서 그들은 예수를 가야바에게서 총독 관저로 끌고 갔습니다. 이른 아침이었습니다. 그들은 부정해지지 않고 유월절 음식을 먹기 위해 관저 안으로 들어가지 않았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「프라이토리온」, 곧 로마 총독의 공식 관저이자 재판 본부.
    reason: lexical_alternative
  - marker: b
    text: 「부정해지다」는 의식적으로 부정해짐을 가리킨다.
    reason: theological_clarification
  - marker: c
    text: 「유월절 음식을 먹다」는 유월절 만찬을 특정해 가리킬 수도, 더 넓게 유월절 절기 동안의 식사·예식을 가리킬 수도 있다.
    reason: lexical_alternative
