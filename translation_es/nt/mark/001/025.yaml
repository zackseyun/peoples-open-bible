translation:
  language: es
  text: 'Y Jesús lo reprendió[a], diciendo: «Calla, y sal de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Sé amordazado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprendió severamente
  - reprendió con autoridad
  - censuró
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa reprensión o amonestación fuerte. «Reprendió» conserva la fuerza verbal y es natural en español bíblico moderno sin suavizar demasiado la escena.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino singular se refiere al espíritu inmundo, pero en español la referencia directa al complemento funciona mejor como objeto directo pronominal en esta construcción. «Lo» mantiene la dirección personal de la reprensión sin desplazar el referente al hombre de modo innecesario.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio introductorio se vierte de forma natural con «diciendo», preservando la relación de encuadre del discurso sin añadir una coordinación que no está explícita en el griego.
- source_word: Φιμώθητι
  english_pob_choice: Be silent
  chosen_spanish: Calla
  alternatives_spanish:
  - Calla en seguida
  - Sé silenciado
  - Enmudece
  lexicon: BDAG
  rationale: El verbo puede tener el sentido literal de «amordazar/muzlar», pero en el mandato imperativo comunica la acción de acallar con brusquedad. «Calla» es idiomático y directo; preserva la orden tajante. La alternativa literal se documenta en la nota.
- source_word: ἔξελθε
  english_pob_choice: come out
  chosen_spanish: sal
  alternatives_spanish:
  - sal fuera
  - sal de dentro
  - sal de aquí
  lexicon: BDAG
  rationale: En el contexto de exorcismo, ἐξέρχομαι indica salir de dentro de alguien. «Sal» mantiene la orden breve y enérgica; el complemento siguiente explicita la dirección de salida.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: out of him
  chosen_spanish: de él
  alternatives_spanish:
  - de dentro de él
  - fuera de él
  lexicon: BDAG
  rationale: La preposición ἐκ/ἐξ señala salida desde el interior. «De él» es conciso y natural en español; el contexto ya hace explícita la expulsión. «De dentro de él» sería más explícito, pero menos fluido.
theological_decisions:
- issue: Referente de la reprensión de Jesús
  english_pob_reading: Jesús se dirige directamente al espíritu inmundo, no al hombre en sí.
  chosen_spanish_reading: Jesús se dirige al espíritu inmundo; el pronombre se entiende como referido al poseído en la escena, pero el mandato apunta a la presencia impura dentro de él.
  alternative_spanish_readings:
  - Jesús reprende al hombre como referente inmediato del pronombre
  - Jesús habla sólo al demonio de forma explícita en la traducción
  rationale: El contexto narrativo distingue al hombre del espíritu que lo afecta, y la orden «sal de él» confirma que el destinatario funcional es la entidad inmunda. La traducción conserva esa tensión sin resolverla artificialmente ni despersonalizar el pasaje.
  doctrine_reference: Preservar la distinción narrativa entre el hombre y el espíritu inmundo; primacía del texto fuente sobre una simplificación interpretativa.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el patrón auditado de la POB inglesa: reprensión fuerte, imperativo breve y el valor espacial de ἐξ αὐτοῦ. Se adoptó un español más natural que «sé silenciado» o «sé muzlado» en el cuerpo del texto, dejando la literalidad en nota.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y no se introduce «Cristo», acorde con el pasaje.
  - Se preserva la fuerza imperativa breve de los dos mandatos coordinados.
  - La referencia al destinatario no se suaviza a una mera enfermedad; la escena sigue siendo de expulsión de un espíritu inmundo.
  - El tratamiento de ἐξ αὐτοῦ como «de él» evita una perífrasis excesiva y mantiene claridad narrativa.
