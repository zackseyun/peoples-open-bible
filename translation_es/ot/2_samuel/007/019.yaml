revisions:
- from: Y aun esto era poco[a] ante tus ojos, Señor Yahvé; también has hablado de la casa de tu siervo para largo tiempo[b], y esta es la instrucción[c] del hombre, Señor Yahvé.
  to: Y aun esto era poca cosa ante tus ojos, Señor Yahvé; también has hablado de la casa[a] de tu siervo para mucho tiempo en adelante[b], y esta es la ley[c] del hombre, Señor Yahvé.
  rationale: Se ajusta el texto principal a la decisión auditada «law of man» mediante «ley del hombre»; se reubican y completan las notas para reflejar correctamente las alternativas preservadas por el POB («casa» y el futuro distante); y se mejora la naturalidad de la frase temporal en español sin alejarse del hebreo.
