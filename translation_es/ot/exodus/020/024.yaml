translation:
  language: es
  text: Harás para mí un altar de tierra, y sobre él sacrificarás tus holocaustos y tus ofrendas de paz, tu rebaño y tu ganado. En todo lugar donde yo haga que se recuerde mi nombre[a], vendré a ti y te bendeciré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "donde yo proclame mi nombre" o "donde yo haga mención de mi nombre". El verbo hebreo está en causativo y puede incluir proclamación, memorialización o invocación del nombre de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח אֲדָמָה
  english_pob_choice: an altar of earth
  chosen_spanish: un altar de tierra
  alternatives_spanish:
  - un altar de suelo
  - un altar terrenal
  lexicon: HALOT
  rationale: La construcción hebrea indica un altar hecho de tierra/suelo. 'De tierra' conserva la imagen concreta y suena natural en español. 'Terral' o 'de suelo' son posibles, pero menos transparentes o menos idiomáticos.
- source_word: תַּעֲשֶׂה לִּי
  english_pob_choice: You shall make for me
  chosen_spanish: Harás para mí
  alternatives_spanish:
  - Harás para mí
  - Debes hacer para mí
  lexicon: HALOT
  rationale: En un contexto legal/instructivo, el imperfecto se expresa bien con futuro exhortativo en español. 'Para mí' conserva el matiz de dedicación y destinatario.
- source_word: וְזָבַחְתָּ עָלָיו
  english_pob_choice: and on it you shall sacrifice
  chosen_spanish: y sobre él sacrificarás
  alternatives_spanish:
  - y sacrificarás sobre él
  - y lo sacrificarás
  lexicon: HALOT
  rationale: זבח en contexto cultual se traduce mejor 'sacrificar' que 'degollar'. 'Sobre él' refleja la relación con el altar y mantiene la referencia inmediata al altar.
- source_word: עֹלֹתֶיךָ
  english_pob_choice: your burnt offerings
  chosen_spanish: tus holocaustos
  alternatives_spanish:
  - tus ofrendas quemadas
  - tus sacrificios quemados
  lexicon: HALOT
  rationale: '''Holocaustos'' es el término cultual establecido en español para las ofrendas totalmente quemadas, y es más preciso que una paráfrasis descriptiva.'
- source_word: שְׁלָמֶיךָ
  english_pob_choice: your peace offerings
  chosen_spanish: tus ofrendas de paz
  alternatives_spanish:
  - tus sacrificios de comunión
  - tus ofrendas de bienestar
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' conserva la forma tradicional y el sentido amplio de bienestar/wholeness. ''Sacrificios de comunión'' explicita un aspecto válido, pero estrecha el rango semántico.'
- source_word: אֶת צֹאנְךָ וְאֶת בְּקָרֶךָ
  english_pob_choice: your flock and your herd
  chosen_spanish: tu rebaño y tu ganado
  alternatives_spanish:
  - tu rebaño y tu manada
  - tus ovejas y tu ganado vacuno
  lexicon: HALOT
  rationale: 'Los términos hebreos nombran categorías amplias de animales: pequeño ganado y ganado mayor. ''Rebaño y ganado'' comunica esa amplitud mejor que especies concretas, y evita restringir el texto.'
- source_word: בְּכָל הַמָּקוֹם
  english_pob_choice: In every place
  chosen_spanish: En todo lugar
  alternatives_spanish:
  - En cada lugar
  - En cualquier lugar
  lexicon: HALOT
  rationale: La frase es distributiva; 'en todo lugar' es natural y conserva la amplitud del mandato.
- source_word: אֲשֶׁר אַזְכִּיר אֶת שְׁמִי
  english_pob_choice: where I cause my name to be remembered
  chosen_spanish: donde yo haga recordar mi nombre
  alternatives_spanish:
  - donde yo proclame mi nombre
  - donde yo haga mención de mi nombre
  lexicon: HALOT
  rationale: El verbo en causativo expresa que Dios hace que su nombre sea recordado/mencionado; 'haga recordar' mantiene la agencia divina sin reducirla sólo a proclamación o inscripción.
- source_word: אָבֹא אֵלֶיךָ
  english_pob_choice: I will come to you
  chosen_spanish: vendré a ti
  alternatives_spanish:
  - iré hacia ti
  - me acercaré a ti
  lexicon: HALOT
  rationale: La forma simple futura con אֶל expresa aproximación/presencia divina. 'Vendré a ti' es la equivalencia natural en español.
- source_word: וּבֵרַכְתִּיךָ
  english_pob_choice: and bless you
  chosen_spanish: y te bendeciré
  alternatives_spanish:
  - y te daré bendición
  - y te favoreceré
  lexicon: HALOT
  rationale: El verbo incluye claramente el sujeto divino y el objeto humano; el futuro directo en español transmite la promesa con claridad y sin añadir matices ajenos.
theological_decisions:
- issue: El sentido de 'donde yo haga recordar mi nombre'
  english_pob_reading: where I cause my name to be remembered
  chosen_spanish_reading: donde yo haga recordar mi nombre
  alternative_spanish_readings:
  - donde yo proclame mi nombre
  - donde yo haga mención de mi nombre
  rationale: Se preserva el causativo hebreo y la tensión teológica sobre cómo se hace presente el nombre de Dios, sin resolverlo de antemano como mera proclamación o inscripción.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con acuerdo alto con el texto fuente y con la revisión más reciente del POB inglés: se conserva la imagen concreta de un altar de tierra, se amplía correctamente צֹאן/בָּקָר como ''rebaño y ganado'', y se mantiene la lectura causativa de אַזְכִּיר אֶת שְׁמִי. No se adopta una paráfrasis que reduzca el rango semántico del nombre divino ni se sustituye la terminología cultual sin base textual.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' donde corresponda en el proyecto, pero este versículo no contiene el tetragrámaton explícito.
  - '''Holocaustos'' y ''ofrendas de paz'' conservan terminología cultual estándar y auditable.'
  - '''Rebaño y ganado'' refleja la distinción entre pequeño ganado y ganado mayor sin forzar especies concretas.'
  - Se mantiene un registro formal, bíblico y claro, sin calcos innecesarios.
