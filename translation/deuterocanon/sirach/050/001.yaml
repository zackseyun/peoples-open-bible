  edition: sefaria-ben-sira-kahana
  text: גְּדוֹל אֶחָיו וְתִפְאֶרֶת עַמּוֹ, שִׁמְעוֹן בֶּן יוֹחָנָן הַכֹּהֵן.<br><small>(א)</small> אֲשֶׁר בְּדוֹרוֹ נִפְקַד הַבָּיִת, וּבְיָמָיו חֻזַּק הֵיכָל.
  language: Hebrew
  pages:
