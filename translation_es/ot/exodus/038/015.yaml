translation:
  language: es
  text: Y para el otro lado[a], de este lado y de aquel lado de la puerta del atrio, había tapices de quince codos, sus columnas tres, y sus bases tres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de uno y otro lado de la puerta del atrio».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus zócalos tres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכָּתֵף ... הַשֵּׁנִית
  english_pob_choice: for the other side
  chosen_spanish: para el otro lado
  alternatives_spanish:
  - para el segundo lado
  - para el otro costado
  lexicon: HALOT
  rationale: כָּתֵף puede significar literalmente ‘hombro’ o, por extensión, ‘lado’. En este contexto de la estructura del atrio, ‘lado’ comunica con naturalidad la sección lateral del acceso; ‘otro’ mantiene el valor de contraste espacial que el inglés POB resolvió como ‘other side’.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de este lado y de aquel lado
  alternatives_spanish:
  - a ambos lados
  - de acá y de allá
  lexicon: HALOT
  rationale: La expresión distributiva marca los dos lados que flanquean la puerta. ‘De este lado y de aquel lado’ conserva el paralelismo espacial sin perder claridad en español.
- source_word: לְשַׁעַר הֶחָצֵר
  english_pob_choice: of the gate of the courtyard
  chosen_spanish: de la puerta del atrio
  alternatives_spanish:
  - de la puerta del patio
  - del portal del atrio
  lexicon: HALOT
  rationale: Para el recinto del tabernáculo, ‘atrio’ es la opción más estable y respetuosa del contexto arquitectónico. Aunque שַׁעַר puede ser ‘puerta’ o ‘portal’, ‘puerta del atrio’ resulta claro y fiel al referente de la abertura de entrada.
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos colgantes
  - hangas
  lexicon: HALOT
  rationale: En español bíblico, ‘cortinas’ comunica bien el elemento textil del cerramiento del atrio. ‘Cortinas’ no añade interioridad indebida y es comprensible para lectores eclesiales modernos; ‘hangings’ literal sería poco natural.
- source_word: חֲמֵשׁ עֶשְׂרֵה אַמָּה
  english_pob_choice: fifteen cubits
  chosen_spanish: quince codos
  alternatives_spanish:
  - quince codos de largo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua ‘codos’ sin convertirla, como hace el texto base. La longitud se sobreentiende por el contexto de la medida.
- source_word: עַמֻּדֵיהֶם שְׁלֹשָׁה
  english_pob_choice: their pillars three
  chosen_spanish: sus columnas tres
  alternatives_spanish:
  - sus pilares tres
  - tres columnas
  lexicon: HALOT
  rationale: עַמּוּד designa aquí los soportes verticales del atrio. ‘Columnas’ es un equivalente natural y digno; se conserva el estilo inventarial del hebreo con una construcción breve.
- source_word: וְאַדְנֵיהֶם שְׁלֹשָׁה
  english_pob_choice: and their bases three
  chosen_spanish: y sus bases tres
  alternatives_spanish:
  - y sus zócalos tres
  - y sus bocas tres
  lexicon: HALOT
  rationale: אֲדָנִים en el tabernáculo alude a las piezas de apoyo inferiores. ‘Bases’ es amplio y comprensible en español moderno; ‘zócalos’ sería más técnico, pero menos transparente para el lector general.
translation_notes:
  revision_awareness: Se siguió el trazado léxico del inglés POB y su nota alternativa sobre la lectura distributiva del espacio junto a la puerta del atrio. No se adoptaron revisiones posteriores que alteraran el sentido básico del versículo; el resultado mantiene la forma inventarial del hebreo y la equivalencia óptima del POB en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino.
  - ‘Atrio’ se usa como término fijo para el recinto exterior del tabernáculo, en coherencia con la serie de Éxodo 38.
  - 'Se preserva el estilo enumerativo: sujeto implícito/verbo copulativo en pasado, seguido de cantidades y elementos estructurales.'
  - Se evita ‘siempre’ la traducción por ‘postes’ o ‘soportes’ porque ‘columnas’ conserva mejor la convención de tabernáculo en español sin perder claridad.
