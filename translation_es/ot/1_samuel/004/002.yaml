revisions:
- from: Los filisteos se desplegaron para enfrentar a Israel, y la batalla se extendió; e Israel fue derrotado[a] delante de los filisteos, y ellos mataron a unos cuatro mil hombres en la línea de batalla en el campo.
  to: Los filisteos se alinearon para salir al encuentro de Israel, y la batalla se extendió[a]; e Israel fue derrotado ante los filisteos, y ellos abatieron a unos cuatro mil hombres en la línea de batalla en el campo.
  rationale: 'Se corrige el anclaje de la nota para que corresponda a וַתִּטֹּשׁ הַמִּלְחָמָה, se ajusta ‘mataron’ a ‘abatieron’ para respetar mejor el matiz de וַיַּכּוּ según la auditoría POB, y se pulen dos giros para mayor fidelidad y naturalidad: ‘salir al encuentro de’ por לִקְרַאת y ‘ante’ por לִפְנֵי.'
