  text: Καὶ ἐπάξει Κύριος ὑμῖν αἰχμα-
  language: Greek
translation:
  text: And the Lord will bring captivity upon you, and there you will serve your
    enemies and the land will be laid waste and your holy places will be desolate.
    And you will be scattered to the four corners of the earth, and you will be as
    something despised among the nations, a curse and a dispersion, until the Most
    High visits the earth. He himself will come, saving Israel and all the nations,
    God speaking in the person of man. And after he has entered, unrighteousness will
    again increase upon the earth, and all the nations will be gathered against him.
    But whoever believes in him shall not be condemned in his name. And you, my children,
    shall rise up from your tribes with Levi and Judah; and there shall be war among
    you. And the Lord will be seen among men, and he will save Israel and all the
    nations. Therefore do not be divided into two heads, because every division among
    brothers is evil in the sight of the Lord. For the Lord loves singleness of purpose.
    And if you also walk in singleness of purpose according to his law[b], my children,
    no evil spirit will have power over you. For he knows that the God of heaven is
    one, and he will not accept a divided mind. Love the Lord through all your life[c],
    and one another with a true heart.
  philosophy: optimal-equivalence
