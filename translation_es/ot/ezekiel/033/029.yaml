revisions:
- from: Entonces sabrán que yo soy Yahvé[a], cuando haga de la tierra una desolación y una ruina, por todas las abominaciones que han cometido.
  to: Entonces sabrán que yo soy Yahvé, cuando convierta la tierra en desolación y ruina[a], por todas las abominaciones que han cometido.
  rationale: Se elimina la nota innecesaria sobre «Yahweh» para ajustarse al estándar del proyecto y se restaura la nota léxica realmente respaldada por la auditoría inglesa. También se mejora la naturalidad y precisión del español cambiando «haga de la tierra» por «convierta la tierra en».
