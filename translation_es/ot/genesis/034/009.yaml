revisions:
- from: 'Hacer alianzas matrimoniales con nosotros: den sus hijas a nosotros[b][a], y tomen nuestras hijas para ustedes.'
  to: 'Emparéntense con nosotros[a]: dennos a sus hijas[b], y tomen a nuestras hijas para ustedes[b].'
  rationale: 'La revisión corrige dos problemas principales: convierte la apertura en un imperativo español natural y reemplaza la construcción no idiomática ''a nosotros'' por ''dennos''. También conserva el paralelismo recíproco del hebreo y la justificación del POB inglés mediante las mismas dos notas, ahora ancladas en lugares más naturales del texto español.'
