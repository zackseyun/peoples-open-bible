translation:
  language: es
  text: La sabiduría es demasiado elevada para el necio[a]; en la puerta[b] él no abre su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las sabidurías son exaltadas para un necio»; el hebreo usa una forma plural de «sabiduría», probablemente con valor abstracto o intensivo.'
    reason: lexical_alternative
  - marker: b
    text: La «puerta» era el lugar de deliberación pública, decisiones legales y liderazgo cívico en una ciudad de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: רָאמוֹת
  english_pob_choice: too high
  chosen_spanish: está demasiado alta
  alternatives_spanish:
  - está muy alta
  - es demasiado alta
  - está en alturas inaccesibles
  lexicon: HALOT
  rationale: El hebreo expresa elevación excesiva e inaccesibilidad para el necio. «Está demasiado alta» conserva la metáfora de altura y la idea de que rebasa su alcance, con español natural.
- source_word: לֶאֱוִיל
  english_pob_choice: for a fool
  chosen_spanish: para un necio
  alternatives_spanish:
  - para un tonto
  - para un insensato
  - al necio
  lexicon: HALOT
  rationale: «Necio» mantiene el término sapiencial estable en Proverbios para אֱוִיל y su carga moral, sin suavizarlo a una simple falta de inteligencia.
- source_word: חָכְמ֑וֹת
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - las sabidurías
  - las cosas sabias
  - la prudencia
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, funciona aquí como plural abstracto o de intensidad. El singular «la sabiduría» transmite mejor el valor colectivo/abstracto en español sin perder la observación textual.
- source_word: בַּשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el portal
  - en la plaza de la puerta
  lexicon: HALOT
  rationale: «Puerta» comunica el lugar público de deliberación y juicio en la ciudad antigua. En español, «en la puerta» conserva el hebraísmo con claridad; la nota explica su función cívica.
- source_word: לֹא יִפְתַּח פִּיהוּ
  english_pob_choice: he does not open his mouth
  chosen_spanish: no abre su boca
  alternatives_spanish:
  - no abre su boca para hablar
  - no abrirá su boca
  - no tiene qué decir
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se puede verter literalmente. «No abre su boca» preserva la imagen y la reserva pública del necio sin añadir causa que el texto no explicita.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior eliminando el problema de anclaje: cada nota al pie ahora aparece exactamente en el texto español con su marcador correspondiente, sin marcadores huérfanos. También se mantuvo la lectura literal del hebreo en «en la puerta».'
  spanish_consistency_notes:
  - Se conservó «necio» para אֱוִיל por coherencia sapiencial.
  - Se mantuvo el singular «sabiduría» para reflejar el plural hebreo como abstracto/intensivo.
  - «Puerta» se traduce de forma literal y se aclara su función social en la nota.
  - 'La puntuación sigue el uso estándar del español: coma antes de la segunda cláusula y punto final.'
