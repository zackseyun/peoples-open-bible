review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del hebreo: los líderes decretan que los gabaonitas sigan vivos, luego pasan a un estado de servicio asignado para toda la congregación, conforme a lo dicho por los líderes. Sin embargo, «Vivan» suena más exhortativo que permisivo/decretivo en este contexto; «Que vivan» reproduce mejor el valor yusivo de יִחְיוּ. Además, «sacadores de agua» es comprensible pero poco natural en español bíblico legible; conviene una formulación más idiomática que preserve la imagen concreta.'
  spanish_quality_summary: 'El texto es claro, pero tiene dos puntos de mejora de estilo y fidelidad: 1) «Que vivan» suena más natural y más cercano a una decisión oficial que «Vivan»; 2) «sacadores de agua» resulta torpe en español general. «Los que sacan agua» mantiene la acción concreta y mejora la legibilidad. También «cortadores de leña» puede conservarse como equivalente formal y natural.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Los líderes» y «la congregación» están bien alineados con las decisiones del POB. La revisión propuesta mantiene el matiz participial de חֹטְבֵי עֵצִים / שֹׁאֲבֵי מַיִם con un español más natural.
  issues:
  - severity: medium
    issue: «Vivan» para יִחְיוּ
    rationale: Aunque posible, en español suena más como mandato dirigido a ellos que como resolución permisiva/decretiva sobre ellos. «Que vivan» refleja mejor «Let them live» y el valor yusivo del hebreo.
  - severity: medium
    issue: «sacadores de agua» suena poco idiomático
    rationale: Preserva la imagen verbal, pero resulta forzado en español neutral. «Los que sacan agua» mantiene el sentido concreto y mejora la naturalidad sin paráfrasis excesiva.
  revised_spanish_text: 'Los líderes les dijeron: «Que vivan». Así se convirtieron en cortadores de leña y en los que sacan agua para toda la congregación, tal como los líderes les habían dicho.'
  revision_rationale: Se ajustó el valor yusivo/decretivo de יִחְיוּ con «Que vivan» y se reemplazó la expresión poco natural «sacadores de agua» por «los que sacan agua», que conserva la imagen concreta del hebreo y la intención formal del POB inglés, pero con mejor legibilidad en español.
