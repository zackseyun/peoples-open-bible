review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Dios es interpelado directamente, sus obras de sabiduría no quedan inactivas, los seres humanos arriesgan sus vidas en un medio frágil de madera, y atraviesan el mar con preservación. Sin embargo, hay dos puntos mejorables para ajustarse mejor al matiz fuente y al rastro POB: «quieres» queda algo menos teleológico que «intentas/propones», y la nota [a] está anclada en «ociosas» aunque el contenido de la nota corresponde a ψυχάς = «vidas/almas».'
  spanish_quality_summary: El español es claro y digno, pero «obras ... ociosas» suena algo rígido en contexto; «queden inactivas» o similar fluye mejor sin perder formalidad. «Confían sus vidas» es comprensible, pero «encomiendan sus vidas» expresa mejor el valor transitivo de πιστεύουσιν con objeto directo. La sintaxis general es natural y apta para lectura eclesial amplia.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. «Sabiduría» está bien preservado con su fuerza teológica. «Balsa» para σχεδία y «vidas» para ψυχάς concuerdan con las decisiones auditadas. La revisión propuesta mantiene estas elecciones y corrige el anclaje de nota.
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre «ociosas» pero explica «vidas/almas».
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. Tal como está, la nota induce una asociación equivocada con μὴ ἀργὰ εἶναι en vez de ψυχάς.
  - severity: medium
    issue: «tú quieres» debilita ligeramente el matiz de propósito deliberado de θέλεις en este contexto.
    rationale: El rastro inglés justificó un valor de intención/purpose («you intend»). En español, «te propones» comunica mejor ese propósito que un simple «quieres».
  - severity: low
    issue: «no estén ociosas» resulta algo poco idiomático aplicado a «obras».
    rationale: Aunque léxicamente defendible, en español bíblico actual suena más natural «no queden inactivas» o «no sean inútiles», sin alejarse del sentido de ἀργός.
  - severity: low
    issue: «confían sus vidas» es menos preciso que una formulación de encomienda.
    rationale: Con ψυχάς como objeto directo, el verbo expresa poner la vida en manos de un medio frágil. «Encomiendan sus vidas» o «confían sus vidas a» lo refleja con más nitidez.
