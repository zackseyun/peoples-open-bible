translation:
  language: es
  text: los hijos de Uzza[a], los hijos de Paseah, los hijos de Besai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de» puede referirse aquí a una línea familiar o clan de descendientes, no necesariamente a hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia
  lexicon: HALOT
  rationale: En una lista genealógica como la de Esdras, el plural constructo de בן funciona como fórmula de linaje o clan. En español, «los hijos de» conserva la estructura breve del hebreo y su valor de grupo familiar/descendiente, sin imponer una lectura de hijos inmediatos.
- source_word: עֻזָּא
  english_pob_choice: Uzza
  chosen_spanish: Uzza
  alternatives_spanish:
  - Uza
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Uzza» sigue la forma inglesa auditada y es plenamente reconocible en español bíblico, sin añadir interpretación.
- source_word: פָסֵחַ
  english_pob_choice: Paseah
  chosen_spanish: Paseah
  alternatives_spanish:
  - Pasea
  - Phaseah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma tradicional de transliteración bíblica «Paseah», que resulta legible en español y respeta la lista hebrea.
- source_word: בֵסָי
  english_pob_choice: Besai
  chosen_spanish: Besai
  alternatives_spanish:
  - Besay
  lexicon: HALOT
  rationale: Nombre propio transliterado con la grafía habitual «Besai». La -i final refleja adecuadamente la convención bíblica y evita forzar una castellanización no sustentada por el hebreo.
translation_notes:
  revision_awareness: El contexto auditado muestra plena coincidencia entre el hebreo, la traducción inglesa POB y la revisión más reciente; no hay cambios textuales pendientes. La única decisión relevante en español es conservar la fórmula genealógica breve con una nota que preserve la amplitud semántica de בְּנֵי.
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo del hebreo: tres grupos separados por comas.'
  - Se preservan los nombres propios sin traducirlos.
  - La nota a pie de página solo se ancla en «hijos de» porque allí está la única ambigüedad lexical relevante para el español.
