translation:
  language: es
  text: Porque ni la invención perversamente ingeniada por los hombres nos desvió[a], ni el trabajo infructuoso de un pintor de sombras[b]—una imagen manchada con colores diversos—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos engañó». El verbo griego puede expresar tanto engañar como hacer que alguien se desvíe del camino recto.
    reason: lexical_alternative
  - marker: b
    text: «Pintor de sombras» alude a un artista que trabaja con contornos o sombreado; la expresión critica al fabricante de imágenes idolátricas pintadas.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπλάνησεν
  english_pob_choice: lead us astray
  chosen_spanish: nos desvió
  alternatives_spanish:
  - nos hizo errar
  - nos engañó
  - nos apartó del camino
  lexicon: BDAG
  rationale: El griego expresa tanto el engaño como el hacer que alguien se desvíe o vague. En español, «desvió» conserva la imagen de apartarse del camino sin endurecer innecesariamente el sentido.
- source_word: κακότεχνος ἐπίνοια
  english_pob_choice: evil-crafted invention
  chosen_spanish: invención malamente ideada
  alternatives_spanish:
  - ardid perversamente concebido
  - diseño maligno
  - invento perverso
  lexicon: LSJ
  rationale: La expresión une habilidad artesanal con juicio moral. «Invención malamente ideada» intenta retener la idea de una concepción artificiosa y moralmente torcida, sin perder naturalidad en español.
- source_word: σκιαγράφων
  english_pob_choice: painter of shadows
  chosen_spanish: pintor de sombras
  alternatives_spanish:
  - pintor de siluetas
  - pintor de contornos
  - sombreador
  lexicon: LSJ
  rationale: La forma refiere a quien pinta en contorno o sombreado. «Pintor de sombras» conserva la imagen concreta y sigue siendo comprensible en español, como traducción del valor artesanal del término.
- source_word: πόνος ἄκαρπος
  english_pob_choice: fruitless labor
  chosen_spanish: trabajo infructuoso
  alternatives_spanish:
  - esfuerzo estéril
  - fatiga sin fruto
  - trabajo estéril
  lexicon: BDAG
  rationale: La frase destaca una labor que no produce resultado verdadero. «Trabajo infructuoso» es idiomático y mantiene el juicio de inutilidad.
- source_word: εἶδος
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - figura
  - forma
  - representación
  lexicon: LSJ
  rationale: En el contexto de imágenes fabricadas, «imagen» comunica mejor el objeto visible y elaborado que «forma» o «apariencia».
- source_word: σπιλωθὲν
  english_pob_choice: stained
  chosen_spanish: manchada
  alternatives_spanish:
  - tiznada
  - ensuciada
  - manchada
  lexicon: LSJ
  rationale: El participio puede sugerir estar marcado o cubierto con pigmentos. «Manchada» mantiene la referencia visual de los colores aplicados, y en español suena natural.
- source_word: χρώμασιν διηλλαγμένοις
  english_pob_choice: with varied colors
  chosen_spanish: con colores diversos
  alternatives_spanish:
  - con colores variados
  - con tintes distintos
  - con muchos colores
  lexicon: LSJ
  rationale: La expresión indica colores diferentes entre sí. «Colores diversos» es fiel, claro y conserva la pluralidad del griego.
theological_decisions:
- issue: Mantener la crítica a la fabricación idolátrica sin suavizarla
  english_pob_reading: The verse condemns human artistic contrivance and painted idol-images as morally vain and misleading.
  chosen_spanish_reading: El verso condena la invención humana y la imagen pintada como producción vana y desviadora.
  alternative_spanish_readings:
  - Una lectura más neutral podría presentar solo una descripción estética de una obra de arte.
  - También podría suavizarse como una simple referencia a la habilidad técnica del pintor.
  rationale: El griego combina juicio moral con vocabulario artístico. La traducción conserva ambos elementos para no diluir la polémica contra la idolatría.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que prefirió «painter of shadows» frente a «shadow-painter» por naturalidad. En español se optó por mantener esa imagen literal pero idiomática con «pintor de sombras», y se conservó el paralelo entre el engaño/desvío y la crítica a la imagen pintada. No se introdujeron términos eclesiásticos tradicionales donde el griego y el audit trail favorecen una referencia concreta a la fabricación de ídolos.
  spanish_consistency_notes:
  - Se usa «colores diversos» para reflejar la pluralidad de χρώμασιν διηλλαγμένοις sin añadir matices no atestiguados.
  - Se evita «Cristo» o vocabulario cristológico porque el pasaje no lo contiene.
  - «Imagen» se mantiene en sentido de objeto fabricado, no como mera apariencia abstracta.
  - La nota a pie preserva la alternativa verbal documentada en el POB inglés para ἐπλάνησεν.
