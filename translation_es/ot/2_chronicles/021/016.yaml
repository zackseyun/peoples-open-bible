translation:
  language: es
  text: Y Yahvé suscitó contra Joram el espíritu de los filisteos y de los árabes, que estaban cerca de los cusitas[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incitó» o «despertó». El verbo hebreo expresa que Yahvé hizo surgir una hostilidad activa contra Joram.
    reason: lexical_alternative
  - marker: b
    text: O «que estaban junto a los cusitas». La frase puede indicar proximidad geográfica de los árabes respecto de los cusitas.
    reason: lexical_alternative
  - marker: c
    text: O «el espíritu de los filisteos y de los árabes». Esta es una variante de formulación en español para la misma referencia al impulso hostil de ambos pueblos.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּעַר / stirred up
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - suscitó
  - levantó
  lexicon: HALOT
  rationale: El verbo hebreo expresa el provocar o poner en movimiento una hostilidad activa. En español, «despertó» conserva bien la imagen de hacer surgir esa disposición sin añadir más explicación de la que da el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el nombre divino como «Yahvé», preservando el tetragrámaton como nombre propio y no sustituyéndolo por un título.
- source_word: עַל יְהוֹרָם
  english_pob_choice: against Jehoram
  chosen_spanish: contra Joram
  alternatives_spanish:
  - sobre Joram
  - contra Jehoram
  lexicon: HALOT
  rationale: Con un verbo de hostilidad, עַל se traduce naturalmente como «contra». Se usa la forma hispana habitual del nombre, «Joram», para lectura más natural en español.
- source_word: רוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - la disposición
  - la hostilidad
  lexicon: HALOT
  rationale: Se conserva «espíritu» para mantener la imagen hebrea y no reducir el término a una simple actitud o emoción. El contexto muestra un impulso hostil colectivo, pero el texto lo expresa con רוּחַ.
- source_word: הַפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  lexicon: HALOT
  rationale: Correspondencia étnica estándar en español bíblico contemporáneo.
- source_word: וְהָעַרְבִים
  english_pob_choice: and of the Arabians
  chosen_spanish: y de los árabes
  alternatives_spanish:
  - y de los arabios
  - y los árabes
  lexicon: HALOT
  rationale: «Árabes» es natural y claro en español; se mantiene la referencia a un pueblo antiguo sin forzar una forma menos usual como «arabios».
- source_word: אֲשֶׁר עַל יַד כּוּשִׁים
  english_pob_choice: who were near the Cushites
  chosen_spanish: que estaban junto a los cusitas
  alternatives_spanish:
  - que estaban cerca de los cusitas
  - que estaban al lado de los cusitas
  lexicon: HALOT
  rationale: La expresión עַל יַד es locativa y aquí señala proximidad geográfica. «Junto a» reproduce bien esa cercanía con español natural y conciso. «Cusitas» sigue la transliteración habitual del etnónimo.
theological_decisions:
- issue: Causación divina de hostilidad entre pueblos contra Joram
  english_pob_reading: The verse states that the LORD actively stirred up the hostile spirit of these peoples against Jehoram.
  chosen_spanish_reading: El texto dice que Yahvé despertó ese espíritu hostil contra Joram.
  alternative_spanish_readings:
  - Yahvé permitió que surgiera esa hostilidad contra Joram
  - Yahvé incitó a esos pueblos contra Joram
  rationale: Se mantiene la atribución directa a Yahvé sin suavizarla a mera permisividad, porque el verbo hebreo atribuye la acción a Dios. Al mismo tiempo, «despertó» evita sobreexplicar el mecanismo interno de esa hostilidad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que hizo más natural la coordinación entre «filisteos» y «árabes» y la que prefirió una expresión más fluida para la proximidad a los cusitas; por eso en español se coordinan ambos grupos con claridad y se usa «junto a» para la relación locativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la convención del proyecto para יְהוָה.
  - Se usa «espíritu» para רוּחַ, conservando la imagen del hebreo sin reducirla a «disposición».
  - Se prefiere «contra» con verbo hostil para עַל.
  - «Cusitas» reproduce el etnónimo y evita una paráfrasis culturalmente más moderna.
  - La puntuación y el orden buscan una lectura natural en español sin perder la sintaxis del original.
