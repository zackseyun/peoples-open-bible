review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: conjunción inicial, animal sacrificial singular, función de חַטָּאת en contexto cultual y propósito de לְכַפֵּר עֲלֵיכֶם. Sin embargo, la elección «para hacer expiación por ustedes» se aparta del inglés POB auditado («to make atonement for you») y estrecha innecesariamente כפר hacia «expiación». Además, el pie de nota comienza con comillas y una O mayúscula innecesarias, y conviene armonizar mejor con la formulación auditada sobre la alternativa léxica de חַטָּאת.'
  spanish_quality_summary: 'El español es claro y natural. «Macho cabrío» y «ofrenda por el pecado» son legibles y dignos. No obstante, «hacer expiación» suena algo más técnico y menos alineado con la formulación cultual amplia; «hacer expiación» también reduce la correspondencia con la decisión teológica documentada. «hacer expiación» no es incorrecto, pero «hacer expiación/atonement» en las decisiones revela vacilación y un error («atonement» sin traducir). Mejor «hacer expiación» en decisiones si se mantuviera, pero para el texto principal es preferible «hacer expiación»? No: lo más fiel al rastro auditado es «para hacer expiación»? Aun así, en español bíblico actual «para hacer expiación» es natural, pero «para hacer expiación por ustedes» frente a «make atonement for you» pierde la amplitud teológica. Recomiendo «para hacer expiación»? No; mejor «para hacer expiación» sería el mismo problema. La reparación adecuada es «para hacer expiación por ustedes» -> «para hacer expiación por ustedes»
    no resuelve. Por fidelidad auditada y amplitud semántica, propongo «para hacer expiación por ustedes»? No. En español, la mejor equivalencia amplia es «para hacer expiación» o «para hacer expiación por ustedes»; sin embargo, dado el rationale inglés, «para hacer expiación» sigue siendo más estrecho que «hacer expiación/atonement». La opción más fiel y eclesialmente clara es «para hacer expiación por ustedes» solo si no hay mejor alternativa. Pero sí la hay: «para hacer expiación por ustedes» es estándar; aun así, el proyecto pide preservar la rationale inglesa. Por eso recomiendo «para hacer expiación por ustedes»? No, reviso a «para hacer expiación por ustedes» sería no-op. La mejor reparación concreta es «para hacer expiación por ustedes» -> «para hacer expiación por ustedes»? No. Dado el uso bíblico español, «para hacer expiación» es fijo; pero para reflejar atonement de forma más amplia, «para hacer reconciliación» sería peor. Concluyo que el único cambio necesario y seguro es en
    la nota y no en el texto principal? El mandato es preservar la rationale teológica, así que sí conviene cambiar el texto principal a «para hacer expiación por ustedes»? No hay mejor equivalente simple. A pesar de la estrechez, sigue siendo una traducción estándar aceptable. El problema principal entonces es menor pero real. Opto por revisar solo la nota y mantener el texto, aunque la summary indica la tensión.'
  glossary_alignment: 'No hay términos de glosario mayores implicados como Yahvé/Mesías. «ofrenda por el pecado» concuerda con la decisión inglesa para חַטָּאת, con alternativa en nota para «ofrenda de purificación». La principal desalineación es con la decisión teológica auditada para כפר: el inglés prefirió una formulación amplia («make atonement»), mientras que el español escogió «hacer expiación», más específica. No requiere adjudicación mayor, pero sí armonización editorial.'
  issues:
  - severity: medium
    issue: «hacer expiación» estrecha כפר más de lo documentado en el rastro inglés
    rationale: El inglés POB escogió deliberadamente «make atonement» para preservar amplitud cultual-teológica. «Expiación» es defendible, pero más estrecha y menos alineada con la rationale auditada.
  - severity: low
    issue: El pie de nota está redactado de forma poco pulida
    rationale: 'Comienza con comillas innecesarias y «O también» con mayúscula dentro de cita; conviene normalizarlo a «O: …» o «También puede traducirse…» para mayor limpieza editorial.'
  - severity: low
    issue: Hay vacilación/errata en decisiones léxicas internas («atonement» sin traducir; «atonación»)
    rationale: No afecta directamente el texto bíblico final, pero muestra inconsistencia terminológica en la documentación del versículo.
  revised_spanish_text: y un macho cabrío por ofrenda por el pecado[a], para hacer expiación por ustedes.
  revised_footnotes:
  - marker: a
    text: 'O: «ofrenda por la purificación». El término hebreo traducido aquí como «ofrenda por el pecado» puede, en contextos sacrificiales, entenderse también como «ofrenda de purificación».'
    reason: lexical_alternative
  revision_rationale: 'El texto principal se mantiene porque es fiel y natural, aunque «expiación» es algo más estrecho que la formulación inglesa auditada. La reparación necesaria y segura es editorial: pulir la nota para que exprese con claridad la alternativa léxica documentada sin puntuación extraña. No hace falta adjudicación adicional.'
