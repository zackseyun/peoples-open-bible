  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Señal', 'casa de Israel' y el resto de las elecciones están alineadas. La principal mejora lexical es preferir 'plancha de hierro' en el texto principal para reflejar mejor מַחֲבַת como utensilio plano, dejando 'sartén' y 'comal' como alternativas en nota.
