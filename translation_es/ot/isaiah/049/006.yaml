    reason: lexical_alternative
  - marker: c
    text: O «hasta los confines de la tierra».
    reason: lexical_alternative
  revision_rationale: Se corrige «esclavo» a «siervo» para respetar la decisión lexical documentada del POB en los cantos del Siervo de Isaías. Se mejora la idiomaticidad de la apertura con «Es demasiado poco...». Se ajusta la cláusula de luz a «te haré luz para las naciones» para mayor naturalidad. Se rehacen las notas para que correspondan realmente al texto revisado y para preservar las alternativas auditadas del inglés.
