lexical_decisions:
- source_word: פַּשְׁחוּר
  english_pob_choice: Pashhur
  chosen_spanish: Pashhur
  alternatives_spanish:
  - Pashur
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). En un verso de lista nominal, la opción más transparente es transliterar el nombre sin traducirlo. Conservo la forma más cercana a la usada comúnmente en español bíblico y al hebreo consonántico.
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amariah
  alternatives_spanish:
  - Amaría
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). Mantengo la transliteración estándar del nombre hebreo, incluyendo el elemento teofórico final representado en la tradición bíblica en '-iah'.
- source_word: מַלְכִּיָּה
