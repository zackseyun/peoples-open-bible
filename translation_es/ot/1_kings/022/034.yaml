review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hilo del hebreo: un hombre dispara sin apuntar específicamente, alcanza al rey de Israel en una abertura de la armadura, y el rey pide ser sacado del campamento porque está herido. Sin embargo, hay dos desalineaciones importantes con la evidencia y el rastro POB: (1) el anclaje de notas está mal colocado, pues la nota sobre לְתֻמּוֹ debe ir en «al azar», no en «arco»; y las notas sobre «Vuelve tu mano» y «estoy herido» están intercambiadas. (2) «carretero» no corresponde bien a לְרַכָּבוֹ, que aquí es el conductor del carro de guerra, es decir, «auriga» o «conductor de su carro».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «carretero» suena impropio en contexto bélico, pues en uso común refiere a quien conduce una carreta, no un carro de guerra. «Auriga» es más preciso y sigue siendo comprensible en registro bíblico; alternativamente, «conductor de su carro» sería más transparente. También conviene corregir la distribución de notas para que el lector no reciba información equivocada en cada punto del texto.
  glossary_alignment: No hay términos teológicos de proyecto comprometidos aquí. Las decisiones «al azar», «coraza», «campamento» y «estoy herido» son compatibles con el rastro inglés. «Hirió» para וַיַּכֶּה es aceptable en español por el contexto inmediato, aunque «golpeó» sería más estrictamente secuencial. La principal desviación léxica es «carretero», que no refleja bien «charioteer».
  issues:
  - severity: high
    issue: Marcadores de notas mal anclados e intercambiados
    rationale: La nota sobre לְתֻמּוֹ aparece en «arco» en vez de «al azar»; la nota sobre el modismo «Vuelve tu mano» está puesta en «carretero»; y la nota sobre «estar herido/enfermo» está en «Vuelve tu mano» en vez de «herido». Esto induce al lector a asociar explicaciones equivocadas con palabras incorrectas.
  - severity: medium
    issue: «Carretero» no es la mejor traducción de לְרַכָּבוֹ
    rationale: En español común, «carretero» suele referirse al conductor de una carreta, no al conductor de un carro de guerra. El hebreo apunta al auriga/charioteer. «Auriga» o «conductor de su carro» es más fiel y natural en contexto bíblico.
  - severity: low
    issue: La nota adicional e sobre «herido» duplica en parte la nota d del rastro inglés
    rationale: La explicación de que el hebreo no añade «gravemente» es válida como observación editorial, pero no es necesaria para preservar el contenido del original. Puede simplificarse manteniendo solo la nota léxica pertinente al verbo.
