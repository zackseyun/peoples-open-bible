translation:
  language: es
  text: 'Entonces respondió y me dijo: «Esta es la palabra de Yahvé a Zorobabel: “No por fuerza[a], ni por poder, sino por mi Espíritu”, dice Yahvé de los ejércitos[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No por ejército», porque חַיִל puede referirse también a fuerza militar.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Yahvé de las huestes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: Then he answered
  chosen_spanish: Entonces respondió
  alternatives_spanish:
  - Y respondió
  - Luego respondió
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo; «entonces» conserva la secuencia natural en español sin perder el valor de transición.
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  - y dijo a mí
  lexicon: HALOT
  rationale: La introducción del discurso en español es más natural con «me dijo»; mantiene el destinatario explícito del hebreo.
- source_word: זֶה דְּבַר יְהוָה
  english_pob_choice: This is the word of Yahweh
  chosen_spanish: Esta es la palabra de Yahvé
  alternatives_spanish:
  - Este es el mensaje de Yahvé
  - Esta es la palabra del SEÑOR
  lexicon: HALOT
  rationale: דָּבָר se conserva como «palabra» por la fórmula profética y su resonancia bíblica; «mensaje» es posible, pero debilita esa fórmula. Se usa «Yahvé» por la convención del proyecto para el Tetragrámaton.
- source_word: אֶל זְרֻבָּבֶל
  english_pob_choice: to Zerubbabel
  chosen_spanish: a Zorobabel
  alternatives_spanish:
  - para Zorobabel
  lexicon: HALOT
  rationale: אֶל introduce aquí al destinatario del oráculo; en español, «a» es la correspondencia más directa y natural.
- source_word: לֹא בְחַיִל
  english_pob_choice: Not by might
  chosen_spanish: No por fuerza
  alternatives_spanish:
  - No por poderío
  - No por ejército
  lexicon: HALOT
  rationale: חַיִל puede abarcar fuerza, poderío o fuerza militar. En este paralelo con כֹּחַ, «fuerza» preserva amplitud y resulta claro en español; «ejército» sería una alternativa interpretativa más específica.
- source_word: וְלֹא בְכֹחַ
  english_pob_choice: nor by power
  chosen_spanish: ni por poder
  alternatives_spanish:
  - ni por energía
  - ni por fuerza
  lexicon: HALOT
  rationale: כֹּחַ denota fuerza/capacidad/poder. «Poder» mantiene el paralelismo con «fuerza» y la negación correlativa del hebreo.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - excepto que
  lexicon: HALOT
  rationale: La construcción exceptiva-adversativa exige en español «sino» para reproducir con claridad el contraste del hebreo.
- source_word: בְּרוּחִי
  english_pob_choice: by my Spirit
  chosen_spanish: por mi Espíritu
  alternatives_spanish:
  - con mi Espíritu
  - mediante mi Espíritu
  lexicon: HALOT
  rationale: רוּחַ en este contexto es el Espíritu divino; el valor instrumental se expresa naturalmente con «por». Se capitaliza «Espíritu» por referencia al Espíritu de Yahvé.
- source_word: אָמַר יְהוָה צְבָאוֹת
  english_pob_choice: says Yahweh of Armies
  chosen_spanish: —dice Yahvé de los ejércitos—
  alternatives_spanish:
  - —dice Yahvé de las huestes—
  - —declara Yahvé de los ejércitos—
  lexicon: HALOT
  rationale: אָמַר en fórmula profética se vierte mejor como «dice». צְבָאוֹת se traduce literalmente como «los ejércitos» para mantener la transparencia semántica del título divino.
theological_decisions:
- issue: Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. Conforme al criterio del proyecto, se mantiene la transliteración «Yahvé» para preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: «Ejércitos» traduce צְבָאוֹת de manera transparente y conserva la imaginería militar/celestial del título sin recurrir a la formulación tradicional opaca «de los ejércitos»? Actually this is the chosen wording; alternatives included to note possible nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate names)
- issue: Valor de כִּי אִם
  english_pob_reading: but
  chosen_spanish_reading: sino
  alternative_spanish_readings:
  - pero
  - más bien
  rationale: La fuerza del hebreo es exceptiva-adversativa, no meramente coordinante; «sino» expresa mejor la corrección de la primera negación por la segunda cláusula.
  doctrine_reference: HALOT / Hebrew syntax of contrastive exceptive construction
translation_notes:
  revision_awareness: El contexto inglés fue revisado una vez para ajustar la coordinación a «nor by power»; la versión española refleja ese mismo paralelismo con «ni por poder» y conserva la estructura exceptiva del hebreo con «sino». No se adoptó una traducción tradicionalizante del Tetragrámaton; se siguió la política del proyecto de usar «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se tradujo צְבָאוֹת como «los ejércitos» para transparencia semántica y coherencia con el inglés auditado.
  - Se capitalizó «Espíritu» por referencia al Espíritu de Yahvé, no por un cambio léxico del hebreo.
  - Se preservó el paralelismo negativo hebreo con «No por fuerza, ni por poder, sino por mi Espíritu».
