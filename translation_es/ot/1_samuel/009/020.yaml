base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/020.yaml
  text: And as for the donkeys that were lost to you three days ago[a], do not set your heart on them, for they have been found[b]. And for whom is all the desire of Israel? Is it not for you and for all your father's house?
  footnotes:
