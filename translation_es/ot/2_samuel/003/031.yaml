base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/031.yaml
  text: Then David said to Joab and to all the people who were with him[a], “Tear your clothes, gird yourselves with sackcloth, and mourn before Abner.” And King David was walking behind the bier.
  footnotes:
