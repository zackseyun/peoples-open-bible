theological_decisions:
- issue: Base textual mismatch between Hebrew witness and Greek parallel
  english_pob_reading: The Greek parallel reads 'Good and evil, life and death, poverty and wealth are from the Lord,' but the Hebrew witness is treated as the stable source for this verse after revision.
  chosen_spanish_reading: Se traduce el hebreo de la fuente principal, no el paralelo griego.
  alternative_spanish_readings:
  - Bueno y malo, vida y muerte, pobreza y riqueza vienen del Señor.
  - Lo bueno y lo malo, la vida y la muerte, la pobreza y la riqueza son del Señor.
  rationale: La nota auditada indica que el pasaje hebreo disponible es la base estable tras la revisión, aunque el paralelo griego conserva una tradición distinta. La traducción española sigue esa decisión y no mezcla ambas lecturas en el cuerpo del texto.
  doctrine_reference: Textual criticism / source priority
translation_notes:
  revision_awareness: La revisión más reciente sustituyó una traducción que seguía el paralelo griego por una que refleja el hebreo conservado en la fuente principal. Esta versión española sigue esa decisión revisada y mantiene la frase proverbial del hebreo, sin introducir la lectura griega en el texto principal.
  spanish_consistency_notes:
  - Se preserva el tono proverbial y compacto del hebreo.
  - '''Pobre'' y ''careciendo de todo'' mantienen el campo semántico de carencia material.'
  - La nota al pie marca claramente la variante griega sin desplazar el texto principal.
  - No se usa 'SEÑOR' como máscara; el término aparece solo en la nota para la lectura paralela, no en el versículo traducido.
