translation:
  language: es
  text: 'Porque he aquí[a]: los reyes se reunieron[b]; pasaron juntos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» conserva el valor deíctico y el tono solemne de הִנֵּה; «mirad» o «ved» serían posibles, pero aquí sonarían más exhortativos que descriptivos.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «se reunieron por cita» o «se reunieron de común acuerdo»; el hebreo permite la idea de una reunión concertada, no solo casual.
    reason: lexical_alternative
  - marker: c
    text: O «avanzaron juntos» o «pasaron de largo juntos». El verbo hebreo admite la noción de pasar por, junto a, o a través de; el contexto decide el matiz exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce una explicación o confirmación del enunciado anterior. «Porque» conserva bien la relación causal/explicativa en español y suena natural en registro bíblico contemporáneo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre lo que sigue. «He aquí» mantiene la vividez y el tono elevado que el POB revisó al pasar de «look» a «behold».
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  - los reyes aquellos
  lexicon: HALOT
  rationale: El artículo hebreo se conserva. «Reyes» es el equivalente directo y más natural para un público lector de Biblia; «monarcas» sería más marcado y menos textual.
- source_word: נוֹעֲדוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  - se reunieron por cita
  lexicon: HALOT
  rationale: El nifal de יעד puede sugerir juntarse en un punto acordado o por cita. «Se reunieron» comunica la acción conjunta sin forzar en la línea principal una glosa demasiado técnica; la nota preserva la alternativa de cita/apuntamiento.
- source_word: עָבְרוּ
  english_pob_choice: passed by
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron de largo
  - avanzaron
  - atravesaron
  lexicon: HALOT
  rationale: El verbo básico עבר tiene el campo semántico de pasar por/by/through. «Pasaron» conserva el núcleo léxico sin decidir demasiado en el texto principal si el movimiento es avance, paso o retirada; el adverbio «juntos» mantiene la idea de acción coordinada.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - todos juntos
  - como uno
  lexicon: HALOT
  rationale: Adverbio de acción conjunta. «Juntos» es natural y directo en español; evita la rigidez de un calco como «together» y conserva la simultaneidad/coalición implícita.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «look» por «behold» para un registro más formal y más cercano a הִנֵּה. La presente redacción refleja esa preferencia con «he aquí» y mantiene el resto del contenido semántico del texto auditado, sin añadir interpretaciones no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo/Mesías» porque no corresponde al léxico de este versículo.
  - «Se reunieron» equilibra fidelidad y naturalidad; la posible lectura de reunión concertada queda documentada en nota sin sobredeterminar el texto principal.
  - «Pasaron juntos» conserva la brevedad del hebreo y la ambigüedad controlada del verbo עבר.
