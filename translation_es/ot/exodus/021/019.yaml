  text: אִם יָק֞וּם וְ/הִתְהַלֵּ֥ךְ בַּ/ח֛וּץ עַל מִשְׁעַנְתּ֖/וֹ וְ/נִקָּ֣ה הַ/מַּכֶּ֑ה רַ֥ק שִׁבְתּ֛/וֹ יִתֵּ֖ן וְ/רַפֹּ֥א יְרַפֵּֽא־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/019.yaml
  text: If he gets up and walks about outside on his staff[a], then the one who struck him shall be cleared[c][b]; he must only pay for his lost time and have him thoroughly healed.
  footnotes:
  - marker: a
    text: Or 'leaning on his staff.' The Hebrew phrase literally reads 'on his staff,' indicating supported walking as evidence of partial recovery.
    reason: lexical_alternative
  - marker: b
    text: '''His lost time'' refers to compensation for the injured man''s period of incapacity, that is, time away from normal work.'
    reason: cultural_note
  - marker: c
    text: The Hebrew emphatic expression literally reads 'healing he shall heal,' meaning he must ensure complete recovery, likely by covering medical treatment.
    reason: lexical_alternative
