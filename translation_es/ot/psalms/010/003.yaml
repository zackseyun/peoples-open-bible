  text: כִּֽי הִלֵּ֣ל רָ֭שָׁע עַל תַּאֲוַ֣ת נַפְשׁ֑/וֹ וּ/בֹצֵ֥עַ בֵּ֝רֵ֗ךְ נִ֘אֵ֥ץ יְהוָֽה־־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/010/003.yaml
  text: For the wicked boasts of his soul's desire[c][b][a], and the greedy blesses but despises Yahweh.
  footnotes:
