translation:
  language: es
  text: Tú, oh, Yahvé, no me negarás tu compasión[a]; tu amor constante y tu fidelidad[b] siempre me preservarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me niegues tu compasión», tomando el verbo como una súplica de tipo yusivo más que como una afirmación de confianza.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu verdad». אמת puede significar «verdad» o «fidelidad»; aquí se prefirió «fidelidad» por su paralelismo con חסד y su sentido relacional de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como «Yahvé» siguiendo el criterio del proyecto para español. Evita el sustituto litúrgico «el SEÑOR» y mantiene visible el nombre de pacto.
- source_word: תִכְלָא
  english_pob_choice: will not withhold
  chosen_spanish: no retendrás
  alternatives_spanish:
  - no contendrás
  - no impedirás
  - no apartarás
  lexicon: HALOT
  rationale: El verbo expresa la idea de contener o retener. «Retendrás» comunica con naturalidad la fuerza del yiqtol en un enunciado de confianza/petición, sin perder el matiz de no poner freno a la compasión.
- source_word: רַחֲמֶיךָ
  english_pob_choice: your compassion
  chosen_spanish: tu compasión
  alternatives_spanish:
  - tus misericordias
  - tu misericordia entrañable
  lexicon: HALOT
  rationale: El plural hebreo de רחם comunica compasión entrañable. «Compasión» es claro en español contemporáneo y preserva el sentido afectivo mejor que opciones más arcaicas.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu misericordia fiel
  - tu amor leal
  - tu bondad constante
  lexicon: HALOT
  rationale: חסד es un término de pacto difícil de reducir a una sola palabra. «Amor constante» intenta mantener la fidelidad y la persistencia relacional que la POB inglesa expresó con «steadfast love».
- source_word: אֲמִתְּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu lealtad
  lexicon: HALOT
  rationale: En paralelo con חסד, אמת describe la confiabilidad activa de Dios. «Fidelidad» transmite bien ese sentido relacional y de pacto; «verdad» se deja como alternativa porque el término hebreo también puede llevar ese matiz.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - sin cesar
  lexicon: HALOT
  rationale: El adverbio marca continuidad durativa. «Siempre» suena más natural en español en esta construcción, aunque «continuamente» conserva más explícitamente el valor aspectual.
- source_word: יִצְּרוּנִי
  english_pob_choice: will continually preserve me
  chosen_spanish: me preservarán
  alternatives_spanish:
  - me guardarán
  - me protegerán
  - me conservarán
  lexicon: HALOT
  rationale: El verbo נצר puede significar guardar, preservar o proteger. «Preservarán» sigue de cerca la revisión inglesa más reciente («preserve me») y mantiene el tono formal; el sujeto plural se conserva en español.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del original usa explícitamente el Tetragrámaton. En español se adopta «Yahvé» para reflejar el nombre del pacto sin enmascararlo, en continuidad con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אמת en el paralelismo de atributos divinos
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - veracidad
  rationale: En paralelo con חסד, אמת no describe solo exactitud proposicional sino confiabilidad de pacto. «Fidelidad» expresa mejor ese valor activo y relacional, aunque «verdad» sigue siendo una alternativa lexical válida.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «preserve me» sobre «guard me», por eso se eligió «me preservarán» para נצר. También se mantuvo la posibilidad de leer el verbo inicial como declaración de confianza o como plegaria, reflejada en la nota textual.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé», coherente con la política del proyecto para YHWH.
  - 'Se preservó el contraste de dos atributos de pacto: «amor constante» para חסד y «fidelidad» para אמת.'
  - Se respetó el plural verbal hebreo («preservarán») concordando con el sujeto compuesto.
  - El orden español busca claridad natural sin borrar la estructura paralela del hebreo.
