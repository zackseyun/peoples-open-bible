revisions:
- from: 'Entonces Jezabel, su esposa, fue a él y le dijo[a]: «¿Por qué está así de decaído tu espíritu, que no estás comiendo pan?»'
  to: 'Entonces Jezabel, su esposa, vino a él y le dijo[a]: «¿Por qué está tan abatido tu espíritu, que no estás comiendo pan?»'
  rationale: Se ajusta el verbo de movimiento a una forma más fiel y natural en español («vino a él») y se mejora סָרָה con «abatido», que comunica mejor el estado interior descrito sin perder claridad. Se conserva «tu espíritu» y «comiendo pan» para mantener la imaginería y el modismo del hebreo. La nota literal se actualiza para corresponder al texto revisado.
