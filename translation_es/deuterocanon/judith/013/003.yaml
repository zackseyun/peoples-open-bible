translation:
  language: es
  text: Pero Judith quedó sola en la tienda, y Holofernes había caído de bruces[a] sobre su cama, pues estaba empapado de vino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había caído hacia adelante sobre su cama». El participio griego puede verterse de manera más literal, pero el contexto sugiere una caída por embriaguez.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «pues el vino había sido derramado alrededor de él» o algo semejante; la expresión es idiomática para indicar que el vino lo había vencido completamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπελείφθη
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejada
  - permaneció
  - quedó sola
  lexicon: LSJ
  rationale: El aoristo pasivo expresa que Judith fue la que quedó al final, tras irse los demás. En español, «quedó» conserva la idea narrativa de quedar como la única presente y suena natural en este contexto.
- source_word: μόνη
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - por sí sola
  - solamente
  lexicon: LSJ
  rationale: «Sola» reproduce el énfasis de la palabra griega sobre la presencia solitaria de Judith dentro de la tienda.
- source_word: σκηνῇ
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - carpa
  - pabellón
  lexicon: LSJ
  rationale: En un contexto militar, σκηνή significa «tienda»; es la opción más directa y comprensible en español bíblico contemporáneo.
- source_word: προπεπτωκώς
  english_pob_choice: had fallen face down
  chosen_spanish: había caído de bruces
  alternatives_spanish:
  - había caído hacia adelante
  - yacía postrado
  - había caído boca abajo
  lexicon: LSJ
  rationale: El participio perfecto describe a Holofernes como ya caído y en ese estado. «Había caído de bruces» comunica bien la postura y mantiene la fuerza del verbo sin exagerar más allá del griego.
- source_word: κλίνην
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - diván
  lexicon: LSJ
  rationale: κλίνη puede ser «cama» o «lecho». «Cama» es natural en español moderno y suficiente para la escena.
- source_word: περικεχυμένος
  english_pob_choice: was drenched with wine
  chosen_spanish: estaba empapado de vino
  alternatives_spanish:
  - estaba derramado de vino
  - estaba bañado en vino
  - el vino lo había cubierto
  lexicon: LSJ
  rationale: La expresión es idiomática y apunta a estar completamente dominado por el vino. «Empapado de vino» conserva la imagen literal de estar cubierto/rociado y sugiere a la vez la embriaguez sin añadir una paráfrasis excesiva.
- source_word: οἶνος
  english_pob_choice: the wine
  chosen_spanish: vino
  alternatives_spanish:
  - el vino
  lexicon: LSJ
  rationale: En español, el sustantivo sin artículo en esta cláusula causal suena más fluido; el sentido sigue siendo el de vino ya mencionado e implícitamente determinado.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: se prefirió una imagen corporal concreta para προπεπτωκώς y una formulación más literal pero natural para περικεχυμένος, evitando traducir mecánicamente desde el inglés previo y atendiendo primero al griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la distinción entre la postura corporal de Holofernes y el estado causado por el vino, reflejando ambas imágenes del griego.
  - Se eligió «tienda» para σκηνή por su adecuación contextual y por ser el término bíblico más transparente en español actual.
