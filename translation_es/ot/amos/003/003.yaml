translation:
  language: es
  text: ¿Caminan dos juntos, a menos que se hayan puesto de acuerdo?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a menos que se hayan concertado» o «a menos que hayan fijado una cita». El verbo hebreo puede incluir la idea de disponer de antemano un encuentro o un acuerdo previo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יֵלְכוּ
  english_pob_choice: Do ... walk
  chosen_spanish: ¿Caminan ...?
  alternatives_spanish:
  - ¿Andan ...?
  - ¿Van caminando ...?
  lexicon: HALOT
  rationale: El imperfecto con הֲ en una pregunta retórica expresa una verdad proverbial. «Caminan» transmite el valor gnómico en un español natural, sin forzar futuro ni simple posibilidad.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos personas
  lexicon: HALOT
  rationale: El numeral cardinal se refiere simplemente a dos; en español no hace falta añadir «personas» porque el contexto lo sugiere.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - a la vez
  lexicon: HALOT
  rationale: «Juntos» es la equivalencia natural y concisa de יַחְדָּו en este proverbio.
- source_word: בִּלְתִּי אִם
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - salvo que
  - excepto si
  lexicon: HALOT
  rationale: La construcción funciona como condicional exceptiva; «a menos que» conserva el sentido idiomático sin endurecer la frase en español.
- source_word: נוֹעָדוּ
  english_pob_choice: have agreed
  chosen_spanish: se hayan puesto de acuerdo
  alternatives_spanish:
  - hayan acordado
  - se hayan convenido
  lexicon: HALOT
  rationale: El nifal de יעד expresa un acuerdo previo o una cita concertada. «Se hayan puesto de acuerdo» comunica la reciprocidad y el matiz de arreglo previo sin añadir explícitamente «reunirse», que no está en el texto hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa POB pasó de «have agreed to meet» a «have agreed» para no añadir «to meet» de forma explícita. La presente versión española sigue esa misma cautela: conserva el acuerdo previo implícito en נוֹעָדוּ, pero evita introducir «reunirse» en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y claro, evitando el calco rígido.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
  - La nota a pie preserva la alternativa léxica que el audit trail inglés consideró relevante.
