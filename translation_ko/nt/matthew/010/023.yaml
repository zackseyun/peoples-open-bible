  text: ὅταν δὲ διώκωσιν ὑμᾶς ἐν τῇ πόλει ταύτῃ, φεύγετε εἰς τὴν ⸀ἑτέραν· ἀμὴν γὰρ λέγω ὑμῖν, οὐ μὴ τελέσητε τὰς πόλεις ⸀τοῦ Ἰσραὴλ ἕως ⸀ἂν ἔλθῃ ὁ υἱὸς τοῦ ἀνθρώπου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/023.yaml
  text: 'But whenever they persecute you in this city[a], flee to the next one. For truly I say to you[c][b], you will certainly not finish going through the cities of Israel until the Son of Man comes.'
  footnotes:
  - marker: a
    text: Or 'flee to another city.' The Greek literally says 'to the other/another [one],' with 'city' understood from the previous clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will certainly not finish the cities of Israel.' The translation 'finish going through' makes explicit the implied missionary traversal.
    reason: lexical_alternative
  - marker: c
    text: '''Until the Son of Man comes'' is left intentionally open. Interpreters differ whether it refers to Jesus'' vindication, a coming in judgment, or his final return.'
    reason: alternative_reading
translation:
  language: ko
  text: '이 성읍에서 사람들이 너희를 박해하면, 다른 성읍으로 피하라. 진실로 너희에게 말한다. 너희가 이스라엘의 성읍들을 다 돌기 전에 인자가 올 것이다.'
  philosophy: optimal-equivalence
