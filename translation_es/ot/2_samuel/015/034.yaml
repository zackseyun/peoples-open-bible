translation:
  language: es
  text: 'Pero si vuelves a la ciudad y dices a Absalón[a]: «Yo seré tu siervo, oh rey; fui siervo de tu padre en el pasado[b], y ahora seré tu siervo», entonces frustrarás para mí el consejo de Ahitofel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo soy tu siervo, oh rey; fui siervo de tu padre antes, y ahora soy tu siervo». El hebreo presenta una secuencia comprimida que también puede entenderse con declaraciones en presente más literales.'
    reason: alternative_reading
  - marker: b
    text: «Siervo» aquí refleja lealtad cortesana y política. «Esclavo» es una alternativa léxica posible para עֶבֶד, pero en este contexto no se destaca la idea de esclavitud en sentido fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula introduce una alternativa condicional con contraste respecto al contexto previo; en español, «Pero si» conserva mejor ese matiz adversativo que un simple «y si».
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la población
  lexicon: HALOT
  rationale: La referencia inmediata es Jerusalén en la narración; «la ciudad» es natural y fiel.
- source_word: תָּשׁוּב
  english_pob_choice: you return
  chosen_spanish: vuelves
  alternatives_spanish:
  - regresas
  - das vuelta
  lexicon: HALOT
  rationale: שׁוּב indica retorno; en segunda persona singular, «vuelves» comunica con claridad la acción de regresar a la ciudad.
- source_word: וְאָמַרְתָּ לְאַבְשָׁלוֹם
  english_pob_choice: and say to Absalom
  chosen_spanish: y dices a Absalón
  alternatives_spanish:
  - y le dices a Absalón
  - y hablarás a Absalón
  lexicon: HALOT
  rationale: Se mantiene la introducción directa del discurso. Se usa «Absalón» con acento gráfico normalizado en español.
- source_word: עַבְדְּךָ אֲנִי
  english_pob_choice: I will be your servant
  chosen_spanish: yo seré tu esclavo
  alternatives_spanish:
  - yo soy tu esclavo
  - yo seré tu siervo
  lexicon: HALOT
  rationale: Aunque el inglés POB escogió «servant» por el matiz cortesano, el hebreo עֶבֶד / עַבְדְּךָ conserva fuerza de sujeción y dependencia; aquí «esclavo» preserva mejor esa tensión léxica. Se formula con futuro para reflejar אֶהְיֶה.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - mi rey
  lexicon: HALOT
  rationale: Es un vocativo; «oh rey» reproduce el tono de apelación directa sin imponer un tratamiento más devocional o litúrgico.
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  - soy
  lexicon: HALOT
  rationale: El imperfecto expresa compromiso futuro; «seré» comunica con naturalidad esa declaración de lealtad.
- source_word: עֶבֶד אָבִיךָ
  english_pob_choice: your father’s servant
  chosen_spanish: esclavo de tu padre
  alternatives_spanish:
  - siervo de tu padre
  - servidor de tu padre
  lexicon: HALOT
  rationale: Se conserva el mismo campo léxico de עֶבֶד con «esclavo», y el posesivo se expresa como relación de pertenencia y servicio a tu padre.
- source_word: מֵאָז
  english_pob_choice: in the past
  chosen_spanish: desde antes
  alternatives_spanish:
  - antes
  - desde entonces
  lexicon: HALOT
  rationale: La expresión marca tiempo anterior; «desde antes» mantiene la idea de anterioridad sin sobrecargar la frase.
- source_word: וְעַתָּה
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - pero ahora
  lexicon: HALOT
  rationale: Se conserva el contraste temporal explícito con la forma más directa y natural en español.
- source_word: וַאֲנִי עַבְדֶּךָ
  english_pob_choice: I will be your servant
  chosen_spanish: y ahora soy tu esclavo
  alternatives_spanish:
  - y ahora seré tu esclavo
  - y ahora soy tu siervo
  lexicon: HALOT
  rationale: La secuencia hebrea repite la fórmula de lealtad; en español se mantiene la repetición y el matiz presente/futuro según la lectura más directa del enunciado comprimido.
- source_word: וְהֵפַרְתָּה
  english_pob_choice: you will frustrate
  chosen_spanish: entonces frustrarás
  alternatives_spanish:
  - quebrarás
  - anularás
  - harás fracasar
  lexicon: HALOT
  rationale: הפר en este contexto significa quebrantar o frustrar un plan; «frustrarás» recoge bien la idea de impedir la eficacia del consejo.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en favor de mí
  - por mí
  lexicon: HALOT
  rationale: La preposición expresa beneficio/interés de David; «para mí» es idiomático y claro.
- source_word: עֲצַת אֲחִיתֹפֶל
  english_pob_choice: Ahithophel’s counsel
  chosen_spanish: el consejo de Ahitofel
  alternatives_spanish:
  - el plan de Ahitofel
  - la decisión de Ahitofel
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo o plan; «consejo» preserva la ambigüedad entre asesoramiento y estrategia.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión reciente del inglés POB: mantiene la secuencia temporal «fui ... desde antes, y ahora ...» sin introducir un «así». También refleja la nota de lectura alternativa para la frase hebrea comprimida, ahora anclada explícitamente en el texto español con [a] y [b].'
  spanish_consistency_notes:
  - Se usa «Absalón» con acentuación española y «Ahitofel» sin h en la forma castellana habitual del nombre propio.
  - Se mantiene «consejo» para עֲצָה por su amplitud semántica entre consejo y plan.
  - Se conserva «esclavo» para עֶבֶד, siguiendo la decisión léxica de no suavizar innecesariamente el término.
