  text: Καὶ εἶπεν Ἰουδεὶθ μακρόθεν τοῖς φυλάσσουσιν ἐπὶ τῶν πυλῶν Ἀνοίξατε, ἀνοίξατε δὴ τὴν πύλην· μεθʼ ἡμῶν ὁ θεὸς ὁ θεὸς ἡμῶν ποιῆσαι ἔτι ἰσχὺν ἐν Ἰσραὴλ καὶ κράτος κατὰ τῶν ἐχθρῶν ἡμῶν, καθὰ καὶ σήμερον ἐποίησεν.
