lexical_decisions:
- source_word: ἀγαθῶν
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - buenos y nobles
  - buenos/beneficiosos
  lexicon: LSJ
  rationale: El adjetivo modifica a πόνων y expresa cualidad positiva general. En español, 'buenos' conserva esa amplitud sin volver la frase pesada ni moralizarla de más.
- source_word: πόνων
  english_pob_choice: labors
  chosen_spanish: trabajos
  alternatives_spanish:
  - labores
  - esfuerzos
  - fatigas
  lexicon: LSJ
  rationale: πόνος puede referirse a labor, esfuerzo o trabajo penoso. 'Trabajos' funciona naturalmente en español y mantiene la idea de esfuerzo sostenido en un tono proverbial. 'Labores' sonaría más formal; 'fatigas' enfatizaría demasiado el sufrimiento.
- source_word: καρπός
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruto
  - resultado
  - rendimiento
  lexicon: LSJ
  rationale: Se conserva la metáfora agrícola. 'Fruto' es el equivalente natural en español y mantiene el paralelismo con 'raíz' en la segunda mitad del verso.
- source_word: εὐκλεής
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - célebre
  - de buena fama
  - honroso
  lexicon: LSJ
  rationale: El término expresa buena reputación o honor público. 'Glorioso' sigue de cerca la decisión inglesa y es suficientemente elevado en español sin perder la nota de honor reconocible.
- source_word: ἀδιάπτωτος
  english_pob_choice: does not fail
  chosen_spanish: no falla
  alternatives_spanish:
  - es infalible
  - no desfallece
  - es inquebrantable
  lexicon: LSJ
  rationale: El adjetivo comunica la idea de no caer, no fallar o no ceder. La forma verbal 'no falla' suena natural en español y preserva la fuerza de permanencia activa.
- source_word: ῥίζα
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - raíz
  lexicon: LSJ
  rationale: Se conserva la imagen botánica sin explicación interpretativa adicional, porque el paralelismo con 'fruto' forma parte de la estructura poética del texto.
- source_word: φρονήσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - sabiduría
  - buen juicio
  lexicon: LSJ
  rationale: φρόνησις suele referirse a sabiduría práctica, prudencia o entendimiento. 'Entendimiento' ofrece una opción amplia y clara en español, y evita confundir este término con σοφία, que podría sugerir 'sabiduría' en sentido más amplio.
theological_decisions:
- issue: Distinguir φρόνησις de σοφία en un libro sapiencial
  english_pob_reading: understanding
  chosen_spanish_reading: entendimiento
  alternative_spanish_readings:
  - prudencia
  - sabiduría
  rationale: Como el texto usa φρόνησις y no σοφία, conviene no aplanar la distinción conceptual. 'Entendimiento' conserva la dimensión intelectual y práctica sin borrar la diferencia léxica que el POB inglés también quiso mantener.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Conservar la doble imagen agrícola de la sentencia
  english_pob_reading: Preserve both metaphors explicitly
  chosen_spanish_reading: Preservar 'fruto' y 'raíz' de forma explícita
  alternative_spanish_readings:
  - paráfrasis como 'el resultado de... permanece firme'
  rationale: La construcción griega presenta un paralelismo poético balanceado. Mantener las imágenes de 'fruto' y 'raíz' evita una paráfrasis que borre el carácter proverbial del verso.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'renowned' a 'glorious' para εὐκλεής; esta decisión se siguió con 'glorioso'. También se preservó la solución inglesa de verter φρόνησις como 'understanding', trasladándola a 'entendimiento' para mantener la distinción frente a 'sabiduría'.
  spanish_consistency_notes:
  - Se usó 'fruto' y 'raíz' para conservar la metáfora agrícola del original.
  - '''Entendimiento'' se eligió para φρόνησις, evitando sustituirlo por ''sabiduría'' salvo en la nota alternativa.'
  - '''No falla'' traduce el valor de permanencia de ἀδιάπτωτος con un español natural y no arcaizante.'
