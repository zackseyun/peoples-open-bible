revisions:
- from: Y los herimos[a]; Hesbón ha perecido hasta Dibón, y hemos devastado hasta Nofá[b], que se extiende hasta Mebá.
  to: Y les disparamos[a]; Hesbón ha perecido hasta Dibón, y devastamos hasta Nofá[b], que se extiende hasta Medebá.
  rationale: Se revisa «los herimos» a «les disparamos» para reflejar mejor la decisión léxica principal documentada en el POB inglés, manteniendo la incertidumbre textual en nota. Se cambia «hemos devastado» a «devastamos» por mayor naturalidad en español narrativo-poético. Se restituye el topónimo a «Medebá» para preservar fielmente el nombre propio de מֵידְבָא / Medeba. Se conservan la estructura, el tono y las notas de incertidumbre del original auditado.
