translation:
  language: es
  text: ¿No te enseñarán ellos y te dirán[a], y harán brotar palabras de su corazón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De su corazón» también puede entenderse como «de su mente» o «de su interior», porque en hebreo «corazón» suele incluir pensamiento, reflexión y voluntad, no solo emoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Will ... not
  chosen_spanish: ¿No serán ... ?
  alternatives_spanish:
  - ¿Acaso no ... ?
  - ¿No ... ?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y espera respuesta afirmativa. En español, «¿No serán ellos...?» conserva bien esa fuerza interrogativa sin sonar forzado.
- source_word: הֵם
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - estos
  - aquellos
  lexicon: HALOT
  rationale: El referente son los antepasados o generación anterior del contexto. «Ellos» es natural en español y mantiene la referencia sin añadir distancia innecesaria.
- source_word: יוֹרוּךָ
  english_pob_choice: teach you
  chosen_spanish: te enseñen
  alternatives_spanish:
  - te instruyan
  - te guíen
  lexicon: HALOT
  rationale: El verbo causativo de ירה tiene el sentido de instruir/enseñar. «Te enseñen» comunica con claridad esa función didáctica en español.
- source_word: יֹאמְרוּ לָךְ
  english_pob_choice: tell you
  chosen_spanish: te digan
  alternatives_spanish:
  - te hablen
  - te cuenten
  lexicon: HALOT
  rationale: אמר aquí complementa el verbo anterior con el acto de decir. «Te digan» conserva la pareja verbal sin sobretraducir ni suavizar el valor de hablar directamente a alguien.
- source_word: וּמִלִּבָּם
  english_pob_choice: from their heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de su mente
  - de su interior
  lexicon: HALOT
  rationale: לֵב designa el centro interior de pensamiento y voluntad, además de sentimiento. «Corazón» mantiene la imagen hebrea y, en español bíblico contemporáneo, sigue siendo comprensible; se deja constancia de la alternativa cognitiva en la nota.
- source_word: יוֹצִיאוּ
  english_pob_choice: bring forth
  chosen_spanish: saquen
  alternatives_spanish:
  - sacan
  - hagan salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir. «Saquen» comunica bien la acción de hacer salir palabras desde dentro, con una imagen dinámica cercana al hebreo.
- source_word: מִלִּים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: «Palabras» es la equivalencia directa y más natural en español, adecuada al contexto sapiencial.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alto acuerdo; por eso la redacción española sigue de cerca el valor semántico del hebreo sin introducir una interpretación nueva.
  spanish_consistency_notes:
  - Se mantiene «te» en singular porque el sufijo hebreo es de segunda persona singular masculina y el contexto directo es personal.
  - Se preserva la imagen antropológica de «corazón» con nota, en vez de reemplazarla por una abstracción como «mente» en el texto principal.
  - «Te enseñen y te digan» reproduce la pareja verbal del hebreo sin fusionar los dos verbos en uno solo.
