translation:
  language: es
  text: Tú sabes que David, mi padre, no pudo edificar una casa para el nombre de Yahvé, su Dios, por causa de la guerra que lo rodeaba[a], hasta que Yahvé los había puesto debajo de las plantas de sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo sus pies». El hebreo dice más plenamente «debajo de las plantas de sus pies», una imagen de sometimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú conoces
  - Tú mismo sabes
  lexicon: HALOT
  rationale: La forma de segunda persona con valor discursivo directo en español se expresa naturalmente con «Tú sabes». Conserva el énfasis del hebreo sin volverlo pesado.
- source_word: אֶת דָּוִד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - a David, mi padre
  - a mi padre David
  lexicon: HALOT
  rationale: El hebreo presenta el objeto directo con nombre propio y aposición; en español la coma reproduce bien la aposición explicativa y mantiene el referente claro.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  - la casa
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «casa» para seguir de cerca la expresión hebrea y no adelantar una interpretación más técnica como «templo».
- source_word: לְשֵׁם יְהוָה אֱלֹהָיו
  english_pob_choice: for the name of Yahweh his God
  chosen_spanish: para el nombre de Yahvé, su Dios
  alternatives_spanish:
  - para el nombre de Yahvé, Dios de él
  - para la honra de Yahvé, su Dios
  lexicon: HALOT
  rationale: Se mantiene el modismo «para el nombre de» porque el texto habla del propósito dedicado al nombre divino, no solo a la honra en sentido interpretativo. «Yahvé» preserva el nombre propio del Tetragrámaton.
- source_word: מִפְּנֵי הַמִּלְחָמָה אֲשֶׁר סְבָבֻהוּ
  english_pob_choice: because of the warfare that surrounded him
  chosen_spanish: por causa de la guerra que lo rodeaba
  alternatives_spanish:
  - a causa de la guerra que lo cercaba
  - por las guerras que lo rodeaban
  lexicon: HALOT
  rationale: «Guerra» es más natural en español que «guerra/conflicto bélico» y conserva el estado de presión militar. «Lo rodeaba» refleja bien la imagen verbal de cercar sin añadir un matiz no sustentado.
- source_word: עַד תֵּת יְהוָה אֹתָם
  english_pob_choice: until Yahweh put them
  chosen_spanish: hasta que Yahvé los puso
  alternatives_spanish:
  - hasta que Yahvé los entregó
  - hasta que Yahvé los colocó
  lexicon: HALOT
  rationale: El verbo hebreo con el complemento idiomático de sometimiento se expresa con un «poner» que sigue la fuerza narrativa del inglés POB y resulta idiomático en español.
- source_word: תַּחַת כַּפּוֹת רַגְלוֹ
  english_pob_choice: under the soles of his feet
  chosen_spanish: debajo de las plantas de sus pies
  alternatives_spanish:
  - bajo las suelas de sus pies
  - debajo de sus pies
  lexicon: HALOT
  rationale: «Plantas» es un equivalente natural y fiel de כפות en este contexto, conservando la imagen corporal completa. Se prefiere «debajo de» para reflejar el valor espacial de subordinación.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el criterio doctrinal del proyecto para transliterar el nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma establecida en el español del POB para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen de sometimiento en «debajo de las plantas de sus pies»
  english_pob_reading: an image of subjugation
  chosen_spanish_reading: imagen de sometimiento mantenida literalmente
  alternative_spanish_readings:
  - bajo sus pies
  - completamente sometidos
  rationale: Se conserva la imagen concreta porque el POB inglés explícitamente la retiene y la anota como metáfora de subyugación. En español, «debajo de las plantas de sus pies» deja visible la fuerza idiomática.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin traducir mecánicamente: se mantuvo la imagen hebrea de la guerra que rodea, el modismo de sometimiento y el nombre divino como Yahvé. No se detectaron revisiones aplicadas en el contexto inglés; por eso la redacción española refleja el estado final estable del pasaje.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera coherente con la política del proyecto para יְהוָה.
  - Se mantuvo «casa» y no «templo» para preservar el léxico del hebreo.
  - «Plantas de sus pies» sigue el tono imagístico del original y evita una paráfrasis excesiva.
  - La aposición «David, mi padre» reproduce el vínculo posesivo sin alterar el sentido referencial.
