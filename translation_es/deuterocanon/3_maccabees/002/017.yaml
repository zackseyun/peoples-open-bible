review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: mantiene el paralelo verbal de καταπατέω con ‘hollar’, conserva ‘casa’ para οἶκος y traduce correctamente τῶν προσολυμίων como los habitantes de Jerusalén. Sin embargo, hay dos desajustes importantes: el tiempo verbal ‘hemos hollado’ no refleja naturalmente el aoristo griego en este contexto narrativo, y ‘se hollen’ es incorrecto; debe ser ‘son holladas’ o ‘se hollan’. Además, el English POB auditado revisó la elección principal de ἁγιασμοῦ a ‘holiness’, por lo que en español conviene usar ‘santidad’ como texto principal, dejando ‘santificación/consagración’ en nota.'
  spanish_quality_summary: El borrador tiene dignidad de registro, pero suena algo forzado en español moderno. ‘Nosotros hemos hollado’ resulta menos natural que ‘Hemos hollado’ o ‘Nosotros hollamos’; y ‘así como se hollen’ es un error morfosintáctico. ‘Casa de la santificación’ es auditable, pero poco idiomática; ‘casa de la santidad’ preserva el genitivo y mejora la legibilidad sin alejarse del expediente inglés revisado.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La decisión principal relevante es ἁγιασμός: el expediente inglés actualizado prefiere ‘holiness’; por eso la mejor alineación es ‘santidad’ en el texto y ‘santificación/consagración’ en nota. El uso de ‘hollar’ es aceptable por registro bíblico, aunque ‘pisotear’ sería más transparente.'
  issues:
  - severity: medium
    issue: 'Tiempo verbal principal poco natural: ‘Nosotros hemos hollado’'
    rationale: 'El aoristo κατεπατήσαμεν aquí se expresa mejor en español con pretérito simple: ‘hollamos’. El perfecto compuesto introduce un matiz aspectual no exigido por el griego y menos natural en este registro narrativo latinoamericano.'
  - severity: high
    issue: 'Forma verbal incorrecta: ‘se hollen’'
    rationale: Tras ‘así como’, la forma correcta no es ‘hollen’. Para la pasiva del griego καταπατοῦνται, el español natural es ‘son holladas’ o ‘se hollan’. El error afecta la corrección gramatical del texto.
  - severity: medium
    issue: ‘Casa de la santificación’ es demasiado rígido como texto principal
    rationale: Aunque es defendible léxicamente, el English POB auditado cambió la lectura principal a ‘house of holiness’. En español, ‘casa de la santidad’ mantiene la estructura y mejora notablemente la claridad.
  - severity: low
    issue: Sujeto explícito ‘Nosotros’ no es necesario
    rationale: Ἡμεῖς puede reflejarse con la flexión verbal española ‘hollamos’ sin pérdida sustancial. Puede mantenerse si se desea énfasis, pero en este versículo recarga la frase.
  revised_spanish_text: Hollamos la casa de la santidad[a], así como son holladas las casas de los habitantes de Jerusalén[b].
  revised_footnotes:
  - marker: a
    text: O ‘casa de la santificación’ o ‘casa de la consagración’. El griego dice literalmente ‘casa de la santificación’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las casas de los habitantes de Jerusalén.
    reason: lexical_alternative
