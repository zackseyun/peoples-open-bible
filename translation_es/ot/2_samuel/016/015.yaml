translation:
  language: es
  text: Entonces Absalón y todo el pueblo[a], los hombres de Israel, llegaron a Jerusalén, y Ahitofel estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todo el pueblo, cada hombre de Israel» o «todo el pueblo, los hombres de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁל֗וֹם
  english_pob_choice: Now Absalom
  chosen_spanish: Entonces Absalón
  alternatives_spanish:
  - Y Absalón
  lexicon: HALOT
  rationale: La conjunción ו en narrativa puede marcar continuidad o avance de escena. «Entonces» comunica bien ese valor secuencial en español sin sonar tan abrupto como «y» al inicio. El nombre propio se translitera como Absalón.
- source_word: וְ/כָל הָ/עָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la multitud
  lexicon: HALOT
  rationale: עָם se rinde naturalmente como «pueblo» en español bíblico actual, manteniendo el sentido colectivo. «Todo» conserva el alcance total de כָל.
- source_word: אִ֣ישׁ יִשְׂרָאֵ֔ל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hombre de Israel» en función colectiva/distributiva. «Los hombres de Israel» conserva el valor representativo masculino que el inglés POB también preserva, sin volverlo innecesariamente rígido.
- source_word: בָּ֖אוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: בוא expresa llegada o venida. Como Jerusalén es el destino, «llegaron» suena natural en español y mantiene el movimiento narrativo.
- source_word: יְרוּשָׁלִָ֑ם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - a la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El nombre propio se conserva como «Jerusalén». La preposición «a» expresa la dirección del verbo de movimiento en español.
- source_word: וַ/אֲחִיתֹ֖פֶל אִתּֽ/וֹ
  english_pob_choice: and Ahithophel was with him
  chosen_spanish: y Ahitofel estaba con él
  alternatives_spanish:
  - y Ahitofel iba con él
  - y Ahitofel estaba junto a él
  lexicon: HALOT
  rationale: El hebreo es prácticamente verbless en esta segunda cola; en español hace falta un verbo copulativo para fluidez y claridad. «Estaba con él» reproduce la relación de compañía sin añadir matices no dados por el texto. El nombre se translitera como Ahitofel.
translation_notes:
  revision_awareness: El texto coincide con el sentido y la organización del audit trail en inglés. No se detectaron revisiones aplicadas en la fuente inglesa; se mantuvo la misma opción básica, ajustando únicamente la naturalidad del español y preservando la ambigüedad colectiva de אִישׁ יִשְׂרָאֵל en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - 'Se conservaron transliteraciones coherentes de nombres propios bíblicos: Absalón, Ahitofel y Jerusalén.'
  - «Pueblo» se eligió para עָם, evitando «gente» por registro más bíblico y más neutro en este contexto.
  - La nota a pie de página preserva la alternativa colectiva/distributiva documentada por el POB en inglés.
