translation:
  language: es
  text: Mujeres en Sion fueron violadas[a], vírgenes en las ciudades de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron violadas sexualmente». El verbo hebreo puede denotar humillación o aflicción en sentido más amplio, pero en este contexto de mujeres y vírgenes probablemente se refiere a violencia sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁים
  english_pob_choice: Women
  chosen_spanish: Mujeres
  alternatives_spanish:
  - esposas
  lexicon: HALOT
  rationale: El hebreo plural puede significar «mujeres» o «esposas» según el contexto. Aquí el paralelismo con «vírgenes» favorece una categoría amplia de víctimas femeninas, no específicamente esposas; por eso «Mujeres» es la equivalencia más fiel y natural.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. «En Sion» conserva el sentido locativo y usa la forma española establecida del topónimo bíblico.
- source_word: עִנּוּ
  english_pob_choice: were violated
  chosen_spanish: fueron violadas
  alternatives_spanish:
  - fueron rapeadas
  - fueron humilladas
  - fueron afligidas
  lexicon: HALOT
  rationale: El verbo ענה en piel puede abarcar humillación o aflicción, pero en un contexto de mujeres y vírgenes la referencia probable es a una violencia sexual. «Fueron violadas» transmite ese sentido con gravedad y de modo claro en español, sin forzar más allá de lo que el verbo y el contexto sostienen.
- source_word: בְּתֻלֹת
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas
  - jóvenes
  lexicon: HALOT
  rationale: El sustantivo denota vírgenes o doncellas. «Vírgenes» es la correspondencia más directa y conserva el matiz social y sexual del hebreo.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en los pueblos de Judá
  lexicon: HALOT
  rationale: La frase constructa significa literalmente «en las ciudades de Judá». Esta opción es clara, natural y mantiene el paralelismo geográfico con «en Sion».
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis léxico del original hebreo y el audit trail inglés: mantiene el paralelismo entre Sion y las ciudades de Judá, conserva el sentido grave de ענה en contexto sexual y no añade interpretaciones doctrinales ajenas al versículo. No hubo revisiones posteriores que cambiaran el consenso de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Sion» como forma española estándar del topónimo bíblico.
  - Se mantiene el plural femenino genérico «Mujeres» para נָשִׁים, en paralelo con «vírgenes».
  - La nota explica la alternativa posible sin diluir la lectura principal.
  - Se preserva la estructura breve y poética del verso sin expansión interpretativa.
