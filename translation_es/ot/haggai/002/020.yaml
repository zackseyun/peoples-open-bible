translation:
  language: es
  text: Y la palabra de Yahvé vino por segunda vez a Hageo, el día veinticuatro del mes, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y vino
  - Y llegó
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי דְבַר־יְהוָה, el español natural y digno es 'Y aconteció' para conservar el giro narrativo de introducción de revelación sin volverlo mecánico. Mantiene la fuerza de evento/ocurrencia que el hebreo aporta aquí.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahweh
  lexicon: HALOT
  rationale: '''Palabra'' preserva la fórmula profética estable y el sentido de דָּבָר. Se usa ''Yahvé'' siguiendo el criterio doctrinal del proyecto para יְהוָה, sin sustituirlo por un título.'
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: '''Por segunda vez'' expresa con precisión el valor adverbial de שֵׁנִית y evita la vaguedad de ''de nuevo'' u ''otra vez''.'
- source_word: אֶל חַגַּי
  english_pob_choice: to Haggai
  chosen_spanish: a Hageo
  alternatives_spanish:
  - para Hageo
  lexicon: HALOT
  rationale: Con verbos de hablar/revelar, אֶל se vierte naturalmente como 'a'. El nombre profético se adapta a la forma española usual 'Hageo'.
- source_word: בְּעֶשְׂרִים וְאַרְבָּעָה לַחֹדֶשׁ
  english_pob_choice: on the twenty-fourth day of the month
  chosen_spanish: el día veinticuatro del mes
  alternatives_spanish:
  - el veinticuatro del mes
  - el día veinticuatro del mes lunar
  lexicon: HALOT
  rationale: La expresión de fecha se traduce de modo idiomático y claro en español. 'Día' ayuda a explicitar lo que el hebreo deja implícito en la fórmula dataria.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - para decir,
  lexicon: HALOT
  rationale: Es la forma estándar de introducir el discurso directo y en español conserva bien la continuidad hacia el versículo siguiente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se adopta 'Yahvé' como equivalente principal del nombre divino, coherente con el criterio del proyecto y sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca la fórmula profética hebrea y conserva la decisión doctrinal de traducir el nombre divino con 'Yahvé'. No se registran revisiones adicionales en el paquete de referencia.
  spanish_consistency_notes:
  - Se mantiene la transliteración bíblica española 'Hageo' para el nombre del profeta, por inteligibilidad en español.
  - Se preserva la puntuación con coma final tras 'diciendo,' para dejar abierta la continuación directa en el versículo siguiente.
  - Se evita 'SEÑOR' para יהוה conforme al estándar del proyecto.
