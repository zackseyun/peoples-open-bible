base_translation:
  language: en
  yaml_path: translation/ot/isaiah/024/013.yaml
  text: 'For so it will be in the midst of the earth[a], among the peoples: like the beating of an olive tree[b], like gleanings when the grape harvest is finished.'
  footnotes:
  - marker: a
    text: Or 'like the shaking of an olive tree.' The Hebrew image is of striking or shaking the tree so that only a few olives remain.
    reason: lexical_alternative
  - marker: b
    text: Or 'like gleanings after the vintage is ended.'
    reason: lexical_alternative
