translation:
  language: es
  text: Hijas de reyes están entre tus mujeres honradas[a]; a tu derecha está de pie la reina, en oro de Ofir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «entre tus preciosas» o «entre tus nobles damas», para la expresión difícil «entre tus mujeres honradas».'
    reason: lexical_alternative
  - marker: b
    text: «Oro de Ofir» alude al oro fino asociado con Ofir, lugar conocido en el Antiguo Testamento por su riqueza y su oro.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנוֹת מְלָכִים
  english_pob_choice: Daughters of kings
  chosen_spanish: Hijas de reyes
  alternatives_spanish:
  - Hijas de los reyes
  - Princessas
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea del constructo y su paralelo poético sin introducir una equivalencia más interpretativa como 'princesas'.
- source_word: בְּיִקְּרוֹתֶיךָ
  english_pob_choice: among your honored women
  chosen_spanish: entre tus mujeres honradas
  alternatives_spanish:
  - entre tus mujeres preciosas
  - entre tus nobles damas
  - en tus esplendores
  lexicon: HALOT
  rationale: La frase es difícil; 'precioso/honrado' conserva el valor de יקר y el contexto cortesano femenino favorece una referencia a mujeres distinguidas más que a una abstracción.
- source_word: נִצְּבָה
  english_pob_choice: stands
  chosen_spanish: está
  alternatives_spanish:
  - se yergue
  - se mantiene de pie
  - ha tomado su lugar
  lexicon: HALOT
  rationale: En español, 'está' comunica el estado posicional presente de forma natural; el matiz de 'de pie' ya queda implícito en el cuadro poético.
- source_word: שֵׁגַל
  english_pob_choice: the queen
  chosen_spanish: la reina
  alternatives_spanish:
  - la consorte real
  - la reina consorte
  lexicon: HALOT
  rationale: '''Reina'' es la equivalencia moderna más natural y fiel al papel de consorte real en este contexto nupcial.'
- source_word: לִימִינְךָ
  english_pob_choice: at your right hand
  chosen_spanish: a tu derecha
  alternatives_spanish:
  - a tu mano derecha
  - junto a tu derecha
  lexicon: HALOT
  rationale: '''A tu derecha'' es la manera idiomática clara en español para expresar posición de honor y proximidad.'
- source_word: בְּכֶתֶם אוֹפִיר
  english_pob_choice: in gold of Ophir
  chosen_spanish: en oro de Ofir
  alternatives_spanish:
  - en oro fino de Ofir
  - con oro de Ofir
  - vestida de oro de Ofir
  lexicon: HALOT
  rationale: '''Oro de Ofir'' conserva la asociación cultural del metal precioso ligado a Ofir sin expandir el texto más allá de lo atestiguado.'
translation_notes:
  revision_awareness: 'Coincide con el tramo auditado: no hay revisiones aplicadas y el control cruzado indicó alto acuerdo; se conservan la imagen real y la ambigüedad léxica de בְּיִקְּרוֹתֶיךָ.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo lo exige explícitamente; aquí no aparece.
  - Se mantiene 'reina' en lugar de 'consorte' por naturalidad y fidelidad contextual al poema real.
  - El giro 'oro de Ofir' se conserva sin normalizarlo a una glosa explicativa en el texto principal.
