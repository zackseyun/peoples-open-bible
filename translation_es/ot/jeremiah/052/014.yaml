translation:
  language: es
  text: Y todas las murallas alrededor de Jerusalén fueron derribadas por todo el ejército de los caldeos[a], que estaba con el capitán de la guardia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "babilonios" para "caldeos".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el jefe de los ejecutores"; el título probablemente se refiere al comandante de la guardia real o del cuerpo de escolta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹמוֹת
  english_pob_choice: walls
  chosen_spanish: murallas
  alternatives_spanish:
  - paredes
  - muros
  lexicon: HALOT
  rationale: En este contexto militar y urbano, 'murallas' expresa mejor el sentido defensivo de חֹמוֹת que 'paredes'. 'Muros' es posible, pero 'murallas' comunica con mayor claridad la fortificación de Jerusalén.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: El adverbio indica extensión envolvente. 'Alrededor' mantiene la idea de circundación de forma natural en español sin añadir matices extra.
- source_word: נָתְצוּ
  english_pob_choice: were broken down
  chosen_spanish: fueron derribadas
  alternatives_spanish:
  - fueron destruidas
  - fueron demolidas
  lexicon: HALOT
  rationale: נתץ describe derribar o demoler una estructura. 'Fueron derribadas' conserva la pasiva del inglés POB y el foco en las murallas como objeto afectado.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza militar
  - tropas
  lexicon: HALOT
  rationale: Aquí חֵיל designa la fuerza militar. 'Ejército' es la equivalencia más clara y natural en español.
- source_word: כַּשְׂדִּים
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo como 'caldeos', siguiendo el texto fuente. 'Babilonios' es una alternativa contextual, pero el POB inglés optó por 'Chaldeans' y no hay razón para ocultar el término aquí.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los ejecutores
  - el comandante de la guardia
  lexicon: HALOT
  rationale: Se mantiene el título tradicional 'capitán de la guardia' para esta dignidad cortesana, que el propio POB documenta como equivalente contextual del hebreo literal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene el orden enfático del objeto al inicio, conserva la pasiva natural en español, y preserva el título oficial con una nota para la alternativa literal documentada.'
  spanish_consistency_notes:
  - Se usó 'murallas' para evitar la ambigüedad de 'paredes' en un contexto de fortificación.
  - Se mantuvo 'caldeos' como etnónimo principal, con la alternativa histórica 'babilonios' en nota.
  - La pasiva 'fueron derribadas' reproduce adecuadamente el énfasis del hebreo y del POB inglés.
  - '''Capitán de la guardia'' conserva la terminología POB ya auditada para רַב טַבָּחִים.'
