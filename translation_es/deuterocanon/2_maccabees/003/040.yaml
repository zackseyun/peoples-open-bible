review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: resume lo relativo a Heliodoro y la guarda del tesoro, y cierra el episodio con οὕτως ἐχώρησεν. Sin embargo, «siguió así» suena algo menos natural y preciso en español para este cierre narrativo que una formulación como «sucedió de esta manera».'
  spanish_quality_summary: El texto es claro y digno, pero «respecto de» y especialmente «siguió así» resultan algo rígidos o poco idiomáticos en este contexto. «Acerca de» o «sobre» y «sucedió de esta manera» leen mejor en español general eclesial sin perder fidelidad.
  glossary_alignment: No hay términos del glosario principal en juego. «Heliodoro», «tesoro» y «custodia» son aceptables. La nota alternativa con «protección» preserva bien la opción léxica documentada en el POB inglés.
  issues:
  - severity: medium
    issue: «siguió así» para ἐχώρησεν
    rationale: Aunque posible, en español suena algo forzado para resumir cómo se desarrolló o resultó el asunto. El griego aquí cierra el relato con la idea de que el asunto ocurrió o se desenvolvió de esa manera; «sucedió de esta manera» o «resultó de esta manera» comunica mejor ese valor.
  - severity: low
    issue: «respecto de» suena más rígido que necesario
    rationale: No es incorrecto, pero «acerca de» o «sobre» suele sonar más natural en español contemporáneo neutral. Dado que el griego idiomático τὰ ... καθʼ Ἡλιόδωρον apunta al asunto o hechos relacionados con Heliodoro, una formulación ligeramente más natural mejora la legibilidad.
  revised_spanish_text: Y el asunto acerca de Heliodoro y la custodia del tesoro sucedió de esta manera[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Y el asunto acerca de Heliodoro y la protección del tesoro resultó de esta manera».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el cierre verbal para reflejar mejor el valor narrativo de ἐχώρησεν en español natural y se suaviza «respecto de» a «acerca de» sin alterar el sentido. Se conserva «custodia del tesoro» y la alternativa documentada con «protección».
