translation:
  language: es
  text: Todos estos viven y permanecen para siempre; en toda necesidad, todos obedecen.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de la edición impresa de la Geniza de El Cairo aquí lee una línea distinta, aproximadamente: «¿Y quién puede saciarse de mirar el esplendor de la altura del cielo en su pureza?». La evidencia más antigua de Masada y la tradición griega apoyan el sentido reflejado en el texto principal; la línea hebrea parece estar desplazada del contexto cercano.'
    reason: textual_variant
  - marker: b
    text: O «para todo propósito» o «en todas las necesidades» para «en toda necesidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ומי ישבע / ישמע
  english_pob_choice: And who can have enough of looking at...?
  chosen_spanish: ¿Y quién puede saciarse de mirar...?
  alternatives_spanish:
  - ¿Y quién puede satisfacerse contemplando...?
  - ¿Y quién puede tener bastante de mirar...?
  lexicon: HALOT; BDAG; Spanish lexical equivalence for rhetorical satisfaction expressions
  rationale: El hebreo conservado en este testimonio presenta una línea distinta y probablemente desplazada; siguiendo el hilo auditado de la tradición griega y la solución de POB en inglés, el español mantiene la pregunta retórica sobre la imposibilidad de saturarse de la contemplación. 'Saciarse' comunica bien la idea de quedar plenamente satisfecho con la visión.
- source_word: splendor
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - resplandor
  - brillo
  - magnificencia
  lexicon: BDAG; uso común del español bíblico
  rationale: '''Esplendor'' es el equivalente más directo y digno para la cualidad visual intensamente luminosa, sin bajar el registro ni forzar una paráfrasis.'
- source_word: height of heaven
  english_pob_choice: the height of heaven
  chosen_spanish: la altura del cielo
  alternatives_spanish:
  - la altura de los cielos
  - la altura del firmamento
  - la cumbre del cielo
  lexicon: BDAG; léxico poético del español
  rationale: '''Altura del cielo'' conserva con naturalidad la imagen espacial del original y evita introducir una cosmología más específica de lo que el texto requiere.'
- source_word: in its purity
  english_pob_choice: in its purity
  chosen_spanish: en su pureza
  alternatives_spanish:
  - en su limpieza
  - en su pureza intacta
  - en su limpidez
  lexicon: BDAG; español contemporáneo
  rationale: '''Pureza'' reproduce el sustantivo abstracto con precisión y mantiene el valor visual/moral del término sin interpretar más allá del testimonio fuente.'
theological_decisions:
- issue: Conflicto entre el hebreo conservado en Kahana y el paralelo griego para el sentido del verso
  english_pob_reading: Use the coherent sense attested by the Greek parallel as the main text, while footnoting the divergent/dislocated Hebrew wording.
  chosen_spanish_reading: Se traduce la línea coherente de la tradición griega, dejando constancia en nota de la lectura hebrea divergente y probablemente desplazada.
  alternative_spanish_readings:
  - 'Traducir literalmente el hebreo impreso: ''¿Y quién puede saciarse de mirar? La forma, la forma de la altura del cielo en pureza.'''
  - Suprimir la nota y armonizar silenciosamente el verso con el contexto inmediato.
  rationale: La tarea pide una traducción fuente-fundada con trazabilidad, no una armonización silenciosa. Dado que el hebreo aquí está desalineado con el contexto y la tradición griega ofrece un verso coherente, la decisión española sigue el sentido griego en el texto principal y preserva la tensión textual mediante nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, usando el paralelo griego como insumo real cuando el hebreo está desplazado o incierto; conservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: El borrador se ajusta a la revisión final que sustituyó una traducción desalineada por una línea que refleja el hebreo transmitido, pero en este registro español se sigue la decisión auditada del texto fuente coherente con la tradición griega, manteniendo la discrepancia textual en nota para transparencia.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando calcos duros como 'tener bastante de' salvo que resultara más idiomático; 'saciarse de mirar' conserva la fuerza retórica.
  - '''Pureza'' se usa de modo abstracto y neutro, sin convertirlo en una pureza ritual específica que el texto no explicita.'
  - Las notas preservan la ambigüedad textual en vez de resolverla de forma silenciosa, conforme al criterio POB de trazabilidad.
