translation:
  language: es
  text: Y Babilonia se convertirá en montones[a], en guarida de chacales, en horror y en silbido[c][b], sin habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «montones de ruinas»; el hebreo está en plural.
    reason: lexical_alternative
  - marker: b
    text: O «dragones» en traducciones antiguas; aquí el término hebreo probablemente se refiere a chacales en un contexto de desolación.
    reason: lexical_alternative
  - marker: c
    text: O «silbido burlón», es decir, un objeto de escarnio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: En discurso profético, la forma verbal expresa un cambio de estado futuro. «Se convertirá» comunica con naturalidad en español ese paso a la desolación mejor que un simple «será».
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  lexicon: HALOT
  rationale: Nombre propio estándar en español para el lugar.
- source_word: לְגַלִּים
  english_pob_choice: heaps
  chosen_spanish: montones
  alternatives_spanish:
  - montones de ruinas
  - montículos
  lexicon: HALOT
  rationale: El plural hebreo conserva la idea de acumulaciones o montículos. «Montones» refleja mejor el plural que una singularización explicativa, sin añadir más interpretación que el contexto exige.
- source_word: מְעוֹן
  english_pob_choice: a haunt
  chosen_spanish: morada
  alternatives_spanish:
  - guarida
  - habitación
  - morada desolada
  lexicon: HALOT
  rationale: En español, «morada» mantiene la idea de un lugar habitado; el contexto de animales salvajes deja implícita la carga ominosa que en inglés se expresa con «haunt». Evita una sobretraducción que no está directamente en el sustantivo.
- source_word: תַּנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - perros salvajes
  lexicon: HALOT
  rationale: En contextos proféticos de desolación, el término se entiende comúnmente como animales del desierto; «chacales» es la equivalencia zoológica clara en español moderno. Se evita «dragones» por corresponder a una tradición antigua menos probable aquí.
- source_word: שַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: horror
  alternatives_spanish:
  - desolación
  - espanto
  - objeto de horror
  lexicon: HALOT
  rationale: El sustantivo expresa devastación que provoca consternación. «Horror» conserva la fuerza breve y paralela del hebreo y funciona bien en la serie de predicados.
- source_word: וּשְׁרֵקָה
  english_pob_choice: and a hissing
  chosen_spanish: y en silbido
  alternatives_spanish:
  - y en silbidos
  - y en silbo
  - y en silbido burlón
  lexicon: HALOT
  rationale: El término denota un silbido o silbar de burla ante una ruina. «Silbido» es una forma natural en español y permite conservar la ambigüedad entre sonido literal y gesto de escarnio que el hebreo puede abarcar.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: with no inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite allí
  - sin moradores
  - sin ocupante
  lexicon: HALOT
  rationale: La construcción expresa ausencia total de residentes. «Sin habitante» reproduce la brevedad del hebreo y la elección inglesa, manteniendo el tono sentencioso.
translation_notes:
  revision_awareness: La revisión inglesa más reciente pasó de «a heap of ruins» a «heaps» para reflejar mejor el plural hebreo; por eso el español usa también un plural («montones») y no singulariza la imagen. Se mantuvo el resto de la línea con una equivalencia sobria y natural.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» para el topónimo, conforme al uso bíblico estándar en español.
  - Se conserva la imagen plural de ruina mediante «montones» para reflejar לְגַלִּים.
  - «Chacales» sigue la decisión léxica inglesa y evita la tradición de «dragones», que hoy sería opaca.
  - «Silbido» procura preservar la posible ambivalencia entre sonido y burla sin forzar una explicación en el texto principal.
