  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la teología del hebreo: mantiene «Yahvé», conserva «la Pascua» como objeto de «sacrificar», y preserva la cláusula del lugar que Yahvé escogerá para hacer habitar su nombre allí. La nota también conserva correctamente la amplitud interpretativa de «flock and herd». Sin embargo, «de la oveja y del ganado» no representa con fidelidad natural צֹאן וּבָקָר, porque צֹאן es un colectivo («rebaño», pequeño ganado), no el singular «oveja».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «de la oveja y del ganado» suena extraño e impreciso en español bíblico natural. «Del rebaño y del ganado» o «de las ovejas y del ganado» sería mucho más legible. El resto fluye bien; «hacer habitar allí su nombre» es aceptable y fiel.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> «Yahvé» correctamente; פֶּסַח -> «la Pascua» con nota explicativa adecuada; el lenguaje de «hacer habitar ... su nombre» preserva la idiomática teológica del hebreo. La única desalineación léxica significativa es צֹאן, que debe mantenerse como colectivo («rebaño») en vez de «oveja».'
  issues:
