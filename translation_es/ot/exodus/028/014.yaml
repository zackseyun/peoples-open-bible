translation:
  language: es
  text: Y harás dos cadenas de oro puro[a], de trabajo trenzado, como cordones; y pondrás las cadenas trenzadas sobre los engastes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dos cadenas de oro puro, trenzadas como cordones; las harás de trabajo de cordón». El hebreo usa dos expresiones afines para una hechura torcida o cordada.'
    reason: lexical_alternative
  - marker: b
    text: «Engastes» también puede verterse «monturas» o «engastes de filigrana», en referencia al armazón de oro unido a la prenda sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambas
  lexicon: HALOT
  rationale: Número cardinal simple y directo; en español 'dos' reproduce con naturalidad la referencia a las cadenas.
- source_word: שַׁרְשְׁרֹת
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - cordones
  lexicon: HALOT
  rationale: El contexto de ornamento sagrado y metal precioso favorece 'cadenas' como equivalente natural; 'cordones' sería posible, pero en español pierde la referencia material y ornamental que el pasaje sugiere.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  lexicon: HALOT
  rationale: La fórmula material se expresa de manera estándar y clara en español como 'oro puro'.
- source_word: מִגְבָּלֹת
  english_pob_choice: braided work like cords
  chosen_spanish: trabajo trenzado como de cordones
  alternatives_spanish:
  - trenzado
  - entrelazado como cordones
  - de cordaje
  lexicon: HALOT
  rationale: El término es difícil y parece describir una hechura torcida o trenzada. 'Trabajo trenzado como de cordones' conserva el valor de manufactura y la comparación con cordones sin aplanar la ambigüedad del hebreo.
- source_word: תַּעֲשֶׂה אֹתָם
  english_pob_choice: make
  chosen_spanish: harás
  alternatives_spanish:
  - harás para ellos
  - los harás
  lexicon: HALOT
  rationale: 'En el contexto de instrucciones divinas a Moisés, el futuro exhortativo/imperativo español comunica bien la orden: ''harás''.'
- source_word: מַעֲשֵׂה עֲבֹת
  english_pob_choice: braided work like cords
  chosen_spanish: trabajo de cordones
  alternatives_spanish:
  - obra de cordones
  - obra trenzada
  - trabajo de cuerda
  lexicon: HALOT
  rationale: La expresión resalta la hechura cordada o trenzada; 'trabajo de cordones' preserva la idea de manufactura y mantiene la relación semántica con la frase anterior.
- source_word: שַׁרְשְׁרֹת הָעֲבֹתֹת
  english_pob_choice: the corded chains
  chosen_spanish: las cadenas cordadas
  alternatives_spanish:
  - las cadenas trenzadas
  - las cadenas de cordones
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo 'cadenas' con el matiz de cordado/trenzado de הָעֲבֹתֹת. 'Cordadas' intenta mantener la tensión lexical del hebreo sin sustituirla por un término más tradicional pero menos preciso.
- source_word: הַמִּשְׁבְּצֹת
  english_pob_choice: the settings
  chosen_spanish: los engastes
  alternatives_spanish:
  - los montajes
  - los engastes de filigrana
  - las monturas
  lexicon: HALOT
  rationale: En un contexto de trabajo en oro, 'engastes' es un equivalente técnico y comprensible para las piezas donde se fijan las cadenas; 'engastes de filigrana' sería más explicativo pero más interpretativo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión más reciente del POB en inglés, que reforzó la relación entre מַעֲשֵׂה עֲבֹת y הָעֲבֹתֹת. Por eso se conservan dos formulaciones paralelas en español: ''trabajo trenzado como de cordones'' y ''cadenas cordadas'', sin borrar la repetición lexical del original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene un registro bíblico claro pero moderno, evitando arcaísmos innecesarios.
  - '''Cordadas'' y ''trenzado'' se dejan en tensión para reflejar la doble caracterización hebrea del trabajo.'
