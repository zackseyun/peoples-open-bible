translation:
  language: es
  text: el que da alimento a toda carne[a], porque su amor constante perdura para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan a toda carne». «Toda carne» es un modismo hebreo para todos los seres vivos, y «pan» puede representar alimento en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹתֵן
  english_pob_choice: who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - que da
  - el que provee
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí como descripción relativa continua. En español, «el que da» conserva bien ese valor durativo y el tono litánico del salmo.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El hebreo literalmente dice «pan», y en esta construcción puede representar alimento en general. En español, «pan» conserva la imagen concreta y deja abierta la amplitud metonímica del término.
- source_word: לְכָל
  english_pob_choice: to all
  chosen_spanish: a toda
  alternatives_spanish:
  - a todo
  - para toda
  lexicon: HALOT
  rationale: La preposición marca destinatario. «A toda» reproduce de manera natural la relación de distribución en español.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - seres vivos
  - humanidad
  - personas
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico «carne», que en hebreo puede abarcar a todos los seres vivientes. Esto mantiene la amplitud del original sin estrecharlo a «personas».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» expresa de forma clara la base del motivo de alabanza introducido por la fórmula del refrán.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y requiere complemento verbal implícito en español. «Para siempre» expresa con naturalidad la duración ilimitada que el inglés POB desarrolla como «endures forever».
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su misericordia
  - su amor leal
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד combina amor, lealtad y fidelidad pactal. «Amor constante» comunica esa idea con dignidad y fluidez en español, sin reducirla a «misericordia» ni volverla demasiado técnica.
theological_decisions:
- issue: Alcance de «all flesh»
  english_pob_reading: universal divine provision to all living creatures, expressed with the preserved idiom 'all flesh'
  chosen_spanish_reading: provisión divina universal a toda carne, preservando el modismo bíblico
  alternative_spanish_readings:
  - a todos los seres vivos
  - a toda la humanidad
  - a todas las personas
  rationale: Se conserva la tensión interpretativa del hebreo. «Toda carne» mantiene el eco bíblico y no restringe indebidamente el alcance a humanos solamente, como permite el contexto del salmo.
  doctrine_reference: Primacía del idioma original y preservación de la amplitud semántica del texto fuente.
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo con el audit trail inglés; no se requieren revisiones sustantivas respecto al sentido ni al alcance semántico. La principal decisión fue mantener el modismo hebreo «toda carne» en nota, con una redacción principal más natural en español.
  spanish_consistency_notes:
  - Se conserva el ritmo breve y proverbial del refrán.
  - «Carne» mantiene la tensión semántica del hebreo sin explicitarla en el cuerpo del texto.
  - «Amor constante» evita la sobreinterpretación doctrinal y sigue siendo fiel a חֶסֶד en este contexto litúrgico.
