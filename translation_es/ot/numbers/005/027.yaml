base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/027.yaml
  text: When he makes her drink the water[a], then if she has defiled herself and has acted unfaithfully against her husband, the water that brings the curse will enter into her for bitterness, and her belly will swell and her thigh will fall away[b], and the woman will become a curse among her people.
  footnotes:
  - marker: a
    text: Or 'the curse-bringing water will enter her as bitter water.' The Hebrew phrase 'for bitterness' is difficult and may describe the water's effect or quality.
    reason: lexical_alternative
  - marker: b
    text: Literally 'her thigh will fall.' The expression is likely a euphemism for a severe bodily affliction affecting her reproductive organs, but the exact sense is uncertain.
    reason: lexical_alternative
