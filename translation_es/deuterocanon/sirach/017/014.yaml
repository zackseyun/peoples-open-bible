  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ‘sus caminos’ para αἱ ὁδοὶ, ‘siempre delante de él’ para ἐναντίον αὐτοῦ διὰ παντός, y mantiene la imaginería antropomórfica de los ‘ojos’. Sin embargo, ‘no serán ocultados de sus ojos’ no es español natural y no representa bien la construcción griega; el sentido es ‘no se ocultarán / no quedarán ocultos de sus ojos’.'
  spanish_quality_summary: 'La primera mitad es clara y fiel. La segunda mitad suena forzada por una pasiva impropia en español (‘serán ocultados’) y por la combinación ‘de sus ojos’, que en esta estructura resulta poco idiomática. Conviene conservar la imagen visual pero con sintaxis española natural: ‘no se ocultarán de sus ojos’.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. ‘Caminos’ preserva adecuadamente la metáfora sapiencial, con nota alternativa sobre ‘conducta’. La decisión teológica de mantener el lenguaje visual personal está bien aplicada.
  issues:
  - severity: medium
    issue: ‘No serán ocultados de sus ojos’ es una construcción poco natural en español.
    rationale: Aunque busca reflejar el futuro pasivo griego, en español esta formulación suena torpe y menos fiel al sentido idiomático. ‘No se ocultarán de sus ojos’ conserva mejor la imagen y la legibilidad.
  - severity: low
    issue: La nota al pie está bien orientada, pero puede mantenerse sin cambios solo si se conserva el anclaje en ‘caminos’.
    rationale: La nota explica correctamente la extensión semántica de ὁδοί en literatura sapiencial y sigue siendo pertinente en la revisión propuesta.
  revised_spanish_text: Sus caminos están siempre delante de él[a]; no se ocultarán de sus ojos.
