review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en lo esencial: mantiene el plural de «rebeliones» y «guerras», la referencia interna «en ella», el retrato de reyes «fuertes y severos», y la expansión propia de 1 Esdras sobre tributo de Celesiria y Fenicia. Sin embargo, «la gente» debilita el valor más concreto de οἱ ἄνθρωποι como «sus habitantes»/«sus hombres», y «estaban en Jerusalén» suena menos natural que «había en Jerusalén» para ἦσαν ἐν Ἰερουσαλήμ. Además, «cobrando tributo de» comunica el sentido general, pero «exigiendo tributo a» refleja mejor la fuerza de φορολογοῦντες y la decisión inglesa «exacting tribute from».'
  spanish_quality_summary: El español es generalmente claro y digno, pero tiene pequeños ajustes de naturalidad y precisión. «Perpetrando» no es incorrecto, pero suena algo más penal que político; «llevando a cabo» encaja mejor en registro bíblico legible sin perder agencia deliberada. «La gente» es demasiado coloquial e imprecisa aquí. «Había en Jerusalén» mejora la sintaxis española.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, etc.). Los topónimos «Celesiria» y «Fenicia» son apropiados. La nota al pie preserva correctamente la relación entre el griego de 1 Esdras y el paralelo hebreo de Esdras 4:20.
  issues:
  - severity: medium
    issue: «la gente» para οἱ ἄνθρωποι
    rationale: Aunque posible, «la gente» es menos preciso y más coloquial; en este contexto político-histórico «sus habitantes» representa mejor el referente de la ciudad.
  - severity: low
    issue: «perpetrando» suena demasiado penal
    rationale: El griego συντελοῦντες indica realizar/producir activamente; «perpetrando» no es infiel, pero «llevando a cabo» o similar suena más natural y menos marcado en español bíblico.
  - severity: medium
    issue: «cobrando tributo de» atenúa la fuerza de exacción
    rationale: φορολογοῦντες describe imposición/exacción tributaria; «exigiendo tributo a» refleja mejor el matiz imperial documentado en el POB inglés.
  - severity: low
    issue: «estaban en Jerusalén» es menos idiomático que «había en Jerusalén»
    rationale: Para la existencia de reyes en un lugar, el español natural prefiere «había»; mantiene fielmente ἦσαν ἐν Ἰερουσαλήμ sin rigidez.
  revised_spanish_text: y sus habitantes llevaban a cabo rebeliones y guerras en ella[a], y había en Jerusalén reyes fuertes y severos, que gobernaban y exigían tributo a Celesiria y Fenicia.
  revised_footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 4:20 describe a Jerusalén como una ciudad rebelde que dañaba a reyes y provincias, con rebelión en ella desde tiempos antiguos. 1 Esdras aquí amplía la descripción con «rebeliones y guerras» y con el tributo de Celesiria y Fenicia.
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar precisión semántica y naturalidad del español sin apartarse del griego ni de las decisiones del POB inglés: «sus habitantes» por «la gente», «llevaban a cabo» por «perpetrando», «había en Jerusalén» por «estaban en Jerusalén», y «exigían tributo a» por «cobrando tributo de».'
