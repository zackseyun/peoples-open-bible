lexical_decisions:
- source_word: ἀντέστησαν
  english_pob_choice: stood against
  chosen_spanish: se opusieron a
  alternatives_spanish:
  - se mantuvieron firmes frente a
  - resistieron a
  - se enfrentaron a
  lexicon: BDAG
  rationale: El aoristo de ἀνθίστημι expresa ponerse en contra o resistir. En español, «se opusieron a» conserva la idea de resistencia/adversidad de forma natural y digna, sin añadir matices bélicos que el griego no exige necesariamente.
- source_word: πολεμίοις
  english_pob_choice: enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los adversarios
  - los contrarios
  - los que les hacían guerra
  lexicon: LSJ
  rationale: πολέμιος designa a un enemigo en sentido hostil o militar. «Enemigos» es la equivalencia más directa y clara en español contemporáneo.
- source_word: ἠμύναντο
  english_pob_choice: defended against
  chosen_spanish: se defendieron de
  alternatives_spanish:
  - rechazaron a
  - repelieron a
  - se defendieron contra
  lexicon: LSJ
  rationale: El medio aoristo de ἀμύνω puede expresar defenderse, rechazar o repeler. «Se defendieron de» conserva el matiz reflexivo implícito en la forma media y refleja bien la acción defensiva sin sobrecargarla con un tono demasiado técnico.
- source_word: ἐχθρούς
  english_pob_choice: foes
  chosen_spanish: adversarios
  alternatives_spanish:
  - enemigos
  - enemistados
  - oponentes
  lexicon: BDAG
  rationale: 'ἐχθρός también significa «enemigo». Aquí se evita repetir «enemigos» inmediatamente después de πολεμίοις y se preserva el paralelismo semántico con una variación natural en español: «adversarios».'
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del texto inglés, que sustituyó «defended themselves from» por «defended against» para reflejar con mayor precisión el verbo griego sin añadir un sujeto reflexivo explícito. En español se reproduce esa cautela con «se defendieron de».
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico, con español moderno y claro.
  - Se evita traducir mecánicamente desde el inglés; la decisión central proviene de los dos verbos griegos paralelos y de su valor semántico cercano.
  - La variación «enemigos/adversarios» reproduce en español la evitación de repetición del inglés POB («enemies/foes») sin perder la equivalencia de sentido.
