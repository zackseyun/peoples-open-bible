translation:
  language: es
  text: 'Todo el pueblo quedó sobremanera asombrado y, inclinándose, adoró a Dios y dijo unánimemente: «Bendito eres tú, nuestro Dios, que hoy has reducido a nada[a] a los enemigos de tu pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has reducido a la nada». El verbo griego puede expresar hacer a alguien de ningún valor o reducirlo a ruina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέστη
  english_pob_choice: were greatly astonished
  chosen_spanish: quedó sobremanera asombrado
  alternatives_spanish:
  - quedó muy asombrado
  - quedó fuera de sí
  - se maravilló grandemente
  lexicon: BDAG / LSJ
  rationale: ἐξίστημι aquí expresa un asombro intenso; «quedó sobremanera asombrado» conserva la fuerza del aoristo y el énfasis de σφόδρα sin sonar forzado en español.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - mucho
  - en gran manera
  - grandemente
  lexicon: LSJ
  rationale: σφόδρα intensifica el verbo precedente. «Sobremanera» transmite bien el superlativo con estilo natural y digno.
- source_word: κύψαντες
  english_pob_choice: bowing down
  chosen_spanish: inclinándose
  alternatives_spanish:
  - doblándose
  - agachándose
  - postrándose
  lexicon: LSJ
  rationale: El participio indica una acción corporal de inclinarse. «Inclinándose» mantiene la literalidad básica y enlaza bien con el acto de adoración.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - rindieron adoración
  - se postraron ante
  - rindieron homenaje
  lexicon: BDAG
  rationale: Como el objeto es Dios, «adoraron» expresa con claridad el acto de culto. «Adoraron a Dios» es más natural en español que una perífrasis más literal.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: unánimemente
  alternatives_spanish:
  - con un solo sentir
  - de común acuerdo
  - a una
  lexicon: BDAG
  rationale: ὁμοθυμαδόν comunica unanimidad y concordia del grupo. «Unánimemente» preserva esa idea de voz y propósito compartidos.
- source_word: Εὐλογητὸς εἶ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Tú eres bendito
  - Bendito eres
  lexicon: BDAG
  rationale: Es una aclamación directa a Dios. «Bendito eres tú» conserva el tono doxológico sin volverlo una simple petición.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - nuestro Señor Dios
  lexicon: BDAG
  rationale: «Nuestro Dios» refleja el posesivo del griego y mantiene el carácter comunitario de la alabanza.
- source_word: ὁ ἐξουδενώσας
  english_pob_choice: have brought ... to nothing
  chosen_spanish: has reducido a nada
  alternatives_spanish:
  - has hecho de poco valor
  - has anulado
  - has tratado como nada
  lexicon: LSJ
  rationale: El verbo puede significar hacer de nadie o de ningún valor. «Has reducido a nada» conserva la fuerza de nulificación que el contexto de victoria exige.
- source_word: ἐν τῇ ἡμέρᾳ τῇ σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - en este mismo día
  - este día
  lexicon: BDAG
  rationale: La expresión es temporal e idiomática. «Hoy» es la forma más clara y natural en español, sin perder el énfasis del presente de la victoria.
- source_word: τοὺς ἐχθροὺς
  english_pob_choice: the enemies
  chosen_spanish: a los enemigos
  alternatives_spanish:
  - a los adversarios
  - a los foes
  - a los hostiles
  lexicon: BDAG
  rationale: «Enemigos» es la equivalencia directa y comunica bien la oposición concreta contra el pueblo de Dios.
- source_word: τοῦ λαοῦ σου
  english_pob_choice: your people
  chosen_spanish: de tu pueblo
  alternatives_spanish:
  - de tu nación
  - de tu gente
  lexicon: BDAG
  rationale: «Tu pueblo» reproduce el sentido covenantal de λαός y mantiene la referencia relacional a Dios.
theological_decisions:
- issue: Forma de la alabanza congregacional dirigida a Dios
  english_pob_reading: 'A direct doxology addressed to God: ''Blessed are you, our God'''
  chosen_spanish_reading: 'Una doxología directa dirigida a Dios: «Bendito eres tú, nuestro Dios»'
  alternative_spanish_readings:
  - «Nuestro Dios es bendito»
  - «Bendito sea nuestro Dios»
  rationale: La segunda persona del griego y la estructura de la frase muestran que el pueblo habla directamente a Dios. La traducción preserva esa dirección personal y el tono litúrgico de la alabanza.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
- issue: Fuerza del participio ἐξουδενώσας en el contexto de derrota enemiga
  english_pob_reading: have brought the enemies of your people to nothing
  chosen_spanish_reading: has reducido a nada a los enemigos de tu pueblo
  alternative_spanish_readings:
  - has hecho de nada a los enemigos de tu pueblo
  - has anulado a los enemigos de tu pueblo
  - has hecho de ningún valor a los enemigos de tu pueblo
  rationale: El griego puede expresar tanto desprecio como nulificación efectiva. En este contexto bélico, «reducido a nada» conserva la tensión lexical sin suavizar la derrota ni forzar una interpretación más débil.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tension; do not flatten strong verbs when the source allows both contempt and ruin.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español en el lugar correspondiente a la alternativa lexical.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεῷ y «nuestro Dios» para ὁ θεὸς ἡμῶν, evitando sustituciones eclesiásticas no exigidas por el texto.
  - Se tradujo προσεκύνησαν como «adoraron» porque el complemento es Dios; no se usó «postraron» como forma principal para no oscurecer el acto de culto.
  - Se conservó la intensidad de σφόδρα con «sobremanera» para mantener el tono enfático del pasaje.
  - Se eligió «unánimemente» para ὁμοθυμαδόν por su claridad, aunque «con un solo sentir» seguiría siendo una alternativa válida en español.
