translation:
  language: es
  text: 'Entonces el Rabsaqué[a] les dijo: «Por favor, digan a Ezequías: “Así dice el gran rey, el rey de Asiria: ¿Qué es esta confianza[b] en la que confías?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Rabsaqué" conserva la transliteración del título oficial/funcional asirio, como hace la POB inglesa. Probablemente no sea un nombre personal, sino un cargo de corte o militar.'
    reason: cultural_note
  - marker: b
    text: La palabra "confianza" traduce el sustantivo hebreo relacionado con el verbo final "confías"; así se conserva el vínculo léxico y la ironía del desafío.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el jefe de los coperos
  - el comandante de campo
  lexicon: HALOT
  rationale: Sigo la decisión de la POB inglesa de transliterar el título en vez de sustituirlo por una función interpretativa. "Rabsaqué" mantiene el color histórico y evita decidir prematuramente entre posibles equivalentes funcionales. En español conviene adaptar la forma al uso nominal articularizado.
- source_word: אִמְרוּ נָא
  english_pob_choice: Please say
  chosen_spanish: Por favor, digan
  alternatives_spanish:
  - Digan, por favor
  - Les ruego que digan
  lexicon: HALOT
  rationale: La partícula נָא expresa ruego o cortesía, no mera orden. "Por favor" comunica bien ese matiz en español sin perder el tono imperativo dirigido a varios.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jizquías
  lexicon: HALOT
  rationale: Uso la forma española establecida del nombre propio bíblico, comprensible para lectores de iglesia y fiel a la identificación del referente.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula mensajera hebrea conserva tono formal y solemne. "Así dice" reproduce adecuadamente el presente proclamativo elegido por la POB inglesa.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el rey poderoso
  - el rey العظيم
  lexicon: HALOT
  rationale: '"Gran rey" es la equivalencia directa y convencional del título real asirio, con la misma fuerza titulary y sin exagerar el sentido más allá del hebreo.'
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Mantengo la construcción posesiva/relacional explícita del hebreo. "De Asiria" preserva la identificación formal del monarca sin convertirla en adjetivo.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué es
  alternatives_spanish:
  - ¿Cuál es
  - ¿Qué
  lexicon: HALOT
  rationale: 'El hebreo introduce una pregunta retórica que en español suena natural como copulativa: "¿Qué es...". Esto evita una calca rígida y mantiene el golpe retórico.'
- source_word: הַבִּטָּחוֹן
  english_pob_choice: confidence
  chosen_spanish: esta confianza
  alternatives_spanish:
  - esta seguridad
  - esta confianza puesta en algo
  lexicon: HALOT
  rationale: '"Confianza" expresa bien el sustantivo abstracto de la raíz בטח y permite conservar la relación léxica con el verbo del cierre. No lo convierto en "seguridad" para no desplazar el foco al estado objetivo.'
- source_word: בָּטָחְתָּ
  english_pob_choice: in which you trust
  chosen_spanish: en la que confías
  alternatives_spanish:
  - en la que has confiado
  - en quien te apoyas
  lexicon: HALOT
  rationale: La forma española presente "confías" refleja bien el valor general del hebreo y reproduce la correlación con "confianza". Evita una aspectualización excesiva en castellano que resultaría menos natural aquí.
theological_decisions:
- issue: Título real asirio y tono de autoridad
  english_pob_reading: the great king, the king of Assyria
  chosen_spanish_reading: el gran rey, el rey de Asiria
  alternative_spanish_readings:
  - el rey poderoso, el rey de Asiria
  - el gran soberano, rey de Asiria
  rationale: No hay doctrina directa en este verso, pero sí una fórmula política solemne que debe conservar su carga retórica. Mantener "gran rey" preserva la pretensión imperial del hablante sin suavizarla.
  doctrine_reference: No aplica; decisión de titulatura histórica y retórica.
translation_notes:
  revision_awareness: La versión inglesa revisada afinó la cláusula final de "that you have trusted in" a "in which you trust" para reflejar mejor la construcción hebrea y el aspecto. Por eso el español usa "en la que confías", que sigue esa lectura más natural sin perder la relación entre sustantivo y verbo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa "Asiria" y no una forma adjetivada para preservar la estructura del constructo hebreo.
  - La transliteración "Rabsaqué" sigue la línea POB de no resolver el título con una traducción funcional cerrada.
