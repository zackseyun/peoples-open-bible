translation:
  language: es
  text: ¿Quién les ha permitido practicar el odio y la maldad? Y la condenación alcanzará a ustedes pecadores.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: መኑ
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué persona
  - ¿Quién es el que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogativo directo para conservar el tono de reprensión retórica sin añadir explicación innecesaria.
- source_word: ወሀበክሙ
  english_pob_choice: has allowed you
  chosen_spanish: os ha permitido
  alternatives_spanish:
  - os ha dado
  - os ha concedido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de autorización implícita para obrar mal, 'permitido' expresa mejor la idea de dar licencia que un simple 'dar'.
- source_word: ከመ ትግበሩ
  english_pob_choice: that you should do
  chosen_spanish: hacer
  alternatives_spanish:
  - que hagáis
  - para que hagáis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción de propósito o resultado se vierte de modo natural en español con infinitivo dependiente de 'permitir'.
- source_word: ጽልአ
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio u hostilidad
  - enemistad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Odio'' es el equivalente más directo y natural en español para el sustantivo moralmente fuerte del texto.'
- source_word: ወእኩየ
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - malvadez
  - malicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Maldad'' conserva el registro ético y acusatorio del pasaje sin sonar excesivamente abstracto.'
- source_word: ይረከበክሙ
  english_pob_choice: will overtake you
  chosen_spanish: os alcanzará
  alternatives_spanish:
  - os sobrevendrá
  - os tomará por sorpresa
  - os perseguirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alcanzará'' comunica bien el valor de alcanzar/sobrevenir en un anuncio de juicio, con un español fluido y solemne.'
- source_word: ለኃጥኣን
  english_pob_choice: you sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - vosotros, pecadores
  - pecadores vosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopiae
  rationale: El marcador ge'ez funciona en apposición al objeto pronominal; por eso se incorpora como vocativo/aposición en español, no como 'para'.
- source_word: ኵነኔ
  english_pob_choice: condemnation
  chosen_spanish: la condenación
  alternatives_spanish:
  - condena
  - sentencia condenatoria
  - juicio condenatorio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término judicial adverso; 'condenación' mantiene con precisión el peso forense y punitivo del contexto.
theological_decisions:
- issue: Valor de ይረከበክሙ en un anuncio de juicio
  english_pob_reading: will overtake you
  chosen_spanish_reading: os alcanzará
  alternative_spanish_readings:
  - os sobrevendrá
  - os encontrará
  rationale: Se mantiene la idea de juicio inminente que llega y alcanza a los culpables, sin atenuar la amenaza del texto.
  doctrine_reference: Juicio retributivo apocalíptico.
- issue: Tratamiento de ለኃጥኣን con el sufijo de segunda persona plural
  english_pob_reading: you sinners
  chosen_spanish_reading: pecadores
  alternative_spanish_readings:
  - vosotros, pecadores
  - a vosotros, pecadores
  rationale: 'La gramática ge''ez favorece la lectura en aposición: el sustantivo nombra a los mismos destinatarios, en vez de introducir una preposición de finalidad o referencia.'
  doctrine_reference: Conservar la tensión sintáctica del original cuando el enlace gramatical es discutido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión gramatical que rechazó leer ለ- como «for» y favoreció la lectura en aposición («you sinners»). También se atendió al ajuste del inglés desde «granted» a «has allowed», por lo que el español usa «ha permitido» para reflejar autorización implícita.
  spanish_consistency_notes:
  - Se mantiene «condenación» para el término judicial adverso, coherente con el registro de juicio apocalíptico.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el pasaje.
  - El vocativo/aposición «pecadores» queda marcado con nota para preservar la ambigüedad sintáctica del ge'ez.
