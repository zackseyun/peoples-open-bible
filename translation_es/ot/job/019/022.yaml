revisions:
- from: ¿Por qué me persiguen como a Dios[a], y no se sacian de mi carne[b]?
  to: ¿Por qué me persiguen como Dios[a], y no se sacian de mi carne[b]?
  rationale: Se corrige «como a Dios» a «como Dios» para reflejar con fidelidad la comparación hebrea sin introducir un objeto directo inexistente. También se corrige la nota [b] para eliminar el anglicismo/error «preyendo» y usar español natural. El resto del borrador puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:18:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB inglés en casi todo: לָמָּה = «¿Por qué?», תִּרְדְּפֻנִי = «me persiguen», כְמוֹ אֵל = «como a Dios / como Dios» con nota alternativa, y לֹא תִשְׂבָּעוּ = «no se sacian». La imagen de וּמִבְּשָׂרִי se preserva correctamente como «de mi carne», con nota que explica el modismo.'
  spanish_quality_summary: La frase principal es clara y digna, pero «me persiguen como a Dios» en español sugiere que Job es perseguido del mismo modo que alguien persigue a Dios, lo cual distorsiona la comparación. El sentido comparativo del hebreo es «como Dios» o «como un dios», es decir, con severidad divina. Además, la nota b contiene un anglicismo/error («preyendo») que debe corregirse.
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Dios» para אֵל concuerda con la decisión inglesa, y la nota preserva «un dios». «Carne» mantiene bien בשר y evita debilitar la imagen con «cuerpo».
  issues:
  - severity: high
    issue: La construcción «como a Dios» altera el sentido comparativo de כְמוֹ אֵל.
    rationale: El hebreo compara la manera de perseguir («como Dios» / «como un dios»), no presenta a Dios como objeto directo de la persecución. En español, la preposición «a» después de «como» cambia el referente y crea una lectura engañosa.
  - severity: medium
    issue: 'La nota [b] contiene un error léxico no español: «preyendo».'
    rationale: Parece calco/contaminación del inglés «preying». Debe reemplazarse por una formulación natural como «cebándose en» o «ensañándose contra».
  - severity: low
    issue: La nota [a] puede sonar más natural sin comillas iniciales redundantes.
    rationale: No afecta fidelidad, pero conviene una redacción española más limpia.
  revised_spanish_text: ¿Por qué me persiguen como Dios[a], y no se sacian de mi carne[b]?
