- from: En aquellos días, Jonatán reunió a los que eran de Judea, para guerrear contra la ciudadela[a] que estaba en Jerusalén; y levantaron contra ella muchas máquinas de asedio.
  to: En aquellos días, Jonatán reunió a los de Judea para hacer guerra contra la ciudadela[a] que estaba en Jerusalén; y construyeron contra ella muchas máquinas de asedio.
