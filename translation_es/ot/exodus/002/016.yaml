translation:
  language: es
  text: Ahora bien, el sacerdote de Madián[a] tenía siete hijas, y ellas vinieron, sacaron agua[b] y llenaron los abrevaderos para dar de beber al rebaño de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sacerdote de Madián». El hebreo puede identificarlo como un sacerdote conocido y específico, o simplemente como uno de Madián.'
    reason: lexical_alternative
  - marker: b
    text: «Sacaron agua» traduce un verbo que significa sacar agua de un pozo.
    reason: cultural_note
lexical_decisions:
- source_word: וּלְכֹהֵן מִדְיָן
  english_pob_choice: Now the priest of Midian
  chosen_spanish: Ahora bien, el sacerdote de Madián
  alternatives_spanish:
  - Y el sacerdote de Madián
  - Ahora, el sacerdote de Madián
  - Y un sacerdote de Madián
  lexicon: HALOT
  rationale: כֹהֵן se traduce naturalmente como 'sacerdote'. El prefijo conjuntivo waw se expresa como 'Ahora bien' para conservar el giro narrativo de introducción de personaje sin sonar rígido en español. Se mantiene 'de Madián' para reflejar la relación constructa y la identificación regional.
- source_word: שֶׁבַע בָּנוֹת
  english_pob_choice: had seven daughters
  chosen_spanish: tenía siete hijas
  alternatives_spanish:
  - había siete hijas
  - poseía siete hijas
  - tenía siete niñas
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se vuelve posesiva en español con 'tenía', que reproduce con naturalidad la posesión implícita. 'Hijas' es el equivalente normal de בָּנוֹת en este contexto familiar.
- source_word: וַתָּבֹאנָה
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron allí
  - llegaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de בוא se vierte con el pasado simple 'vinieron', que mantiene el avance de la acción sin añadir matices no presentes en el hebreo.
- source_word: וַתִּדְלֶנָה
  english_pob_choice: drew water
  chosen_spanish: sacaron agua
  alternatives_spanish:
  - trajeron agua
  - la sacaron
  lexicon: HALOT
  rationale: דלה aquí denota extraer agua de una fuente o pozo. 'Sacaron agua' es una forma natural en español que conserva el sentido de extracción y evita un calco poco idiomático.
- source_word: וַתְּמַלֶּאנָה
  english_pob_choice: filled
  chosen_spanish: llenaron
  alternatives_spanish:
  - llenaron de agua
  - colmataron
  lexicon: HALOT
  rationale: מלא en la secuencia narrativa se traduce de manera directa como 'llenaron', conservando la acción sucesiva y simple del texto.
- source_word: הָרְהָטִים
  english_pob_choice: the troughs
  chosen_spanish: los abrevaderos
  alternatives_spanish:
  - los pesebres
  - las pilas
  - los troughs
  lexicon: HALOT
  rationale: רְהָטִים se refiere a receptáculos o canales para dar agua al ganado. 'Abrevaderos' comunica bien esa función en español y evita una imagen demasiado estrecha o técnica.
- source_word: לְהַשְׁקֹות
  english_pob_choice: to water
  chosen_spanish: para dar de beber
  alternatives_spanish:
  - para abrevar
  - para dar agua
  lexicon: HALOT
  rationale: El infinitivo causativo de שקה expresa dar de beber o abrevar. 'Para dar de beber' mantiene el valor causativo y suena natural con animales.
- source_word: צֹאן
  english_pob_choice: flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas y las cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor, especialmente ovejas y cabras. 'Rebaño' conserva el carácter colectivo y es el equivalente pastoral más fluido en español.
- source_word: אֲבִיהֶן
  english_pob_choice: their father's
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su padre ellas
  - de su padre propio
  lexicon: HALOT
  rationale: El sufijo pronominal se vierte con el posesivo natural español 'su padre'. Aunque el español no distingue de manera explícita el plural en el posesivo, el contexto deja claro que pertenece a las hijas.
theological_decisions:
- issue: 'Identificación del personaje: un sacerdote concreto o uno entre varios sacerdotes de Madián'
  english_pob_reading: The Hebrew can identify him either as a specific known priest or simply as one priest associated with Midian.
  chosen_spanish_reading: un sacerdote de Madián / el sacerdote de Madián
  alternative_spanish_readings:
  - el sacerdote de Madián
  - un sacerdote de Madián
  rationale: El hebreo permite ambigüedad en la relación nominal. Aunque el texto principal opta por la forma más natural en español, la nota preserva que puede leerse como un sacerdote definido o simplemente como uno perteneciente a Madián, sin resolver artificialmente la ambigüedad.
  doctrine_reference: No aplica; es una decisión lexical/textual, no doctrinal.
translation_notes:
  revision_awareness: 'Se revisó el pasaje conforme al audit trail inglés y al hebreo: se mantuvo la introducción narrativa del personaje, la posesión implícita de las hijas, el sentido de extraer agua y el término funcional para los recipientes de agua. No hubo revisiones aplicadas en la fuente inglesa reciente; el borrador español sigue esa lectura estable.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como estándar del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usó «sacerdote» en lugar de «sacerdocio» o «cura», porque כֹהֵן designa un oficio y el contexto no requiere una paráfrasis.
  - «Abrevaderos» preserva la función del objeto sin sobrecargar el español con tecnicismos.
  - El registro es narrativo y sobrio, adecuado para una traducción pública y auditada.
