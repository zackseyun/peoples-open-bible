base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/035.yaml
  text: Even in their kingdom[a], and amid your great goodness that you gave them, and in the broad and fertile land that you set before them[d][c][b], they did not serve you and did not turn from their evil deeds.
  footnotes:
  - marker: a
    text: Or 'in your abundant goodness' or 'with your great bounty.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the broad and fat land,' an idiom for a spacious and fertile land.
    reason: cultural_note
  - marker: c
    text: Or 'they did not worship you'; the Hebrew verb can include both worship and service.
    reason: lexical_alternative
  - marker: d
    text: Or 'did not repent of their evil deeds'; literally, 'did not turn from their evil deeds.'
    reason: lexical_alternative
