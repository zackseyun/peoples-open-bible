translation:
  language: es
  text: ¿Por qué quedaría disminuido el nombre de nuestro padre de entre su clan porque no tiene hijo? Danos una posesión[a][b] entre los hermanos de nuestro padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sería disminuido» o «se quitaría». El hebreo pregunta por la pérdida del «nombre» del padre dentro de su clan.
    reason: lexical_alternative
  - marker: b
    text: «Posesión» aquí se refiere a una propiedad territorial o lote de herencia asignado dentro del clan.
    reason: cultural_note
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué se...
  alternatives_spanish:
  - ¿Por qué debería...
  - ¿Con qué motivo se...
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con tono de protesta; en español, «¿Por qué se...» conserva ese matiz sin volverla artificialmente exclamativa.
- source_word: יִגָּרַע
  english_pob_choice: be diminished
  chosen_spanish: se disminuiría
  alternatives_spanish:
  - se quitaría
  - se removería
  - se vería disminuido
  lexicon: HALOT
  rationale: «Disminuir» refleja con fidelidad el sentido de גרע que la POB auditó como una merma del nombre/estatus del padre. El futuro de subjuntivo en español ayuda a reproducir la pregunta irreal o retórica.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - fama
  - memoria
  - linaje
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «nombre» para preservar la imagen hebrea de la continuidad representativa del padre dentro del clan, sin reinterpretarlo como mera reputación.
- source_word: מִתּוֹךְ מִשְׁפַּחְתּוֹ
  english_pob_choice: from among his clan
  chosen_spanish: de entre su clan
  alternatives_spanish:
  - de entre su familia
  - del medio de su clan
  lexicon: HALOT
  rationale: «Clan» es preferible a «familia» en este contexto legal de repartición tribal; «de entre» reproduce el valor de מִתּוֹךְ con naturalidad en español.
- source_word: כִּי אֵין לוֹ בֵּן
  english_pob_choice: because he had no son
  chosen_spanish: porque no tiene hijo
  alternatives_spanish:
  - porque no tiene un hijo
  - porque no había tenido hijo
  - ya que no tiene descendencia
  lexicon: HALOT
  rationale: Se conserva el término filial masculino porque el problema jurídico gira precisamente en torno a la ausencia de varón. «Tiene» sigue el hebreo no perfecto y es más cercano al presente descriptivo del texto.
- source_word: תְּנָה לָּנוּ
  english_pob_choice: Give to us
  chosen_spanish: Danos
  alternatives_spanish:
  - Concédenos
  - Danos tú
  lexicon: HALOT
  rationale: La forma imperativa pide una petición directa. «Danos» es natural en español y mantiene el tono suplicante del hebreo.
- source_word: אֲחֻזָּה
  english_pob_choice: a possession
  chosen_spanish: una herencia
  alternatives_spanish:
  - una posesión
  - un lote heredado
  - una porción
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa «possession» para el sentido de lote heredable, en español «herencia» comunica mejor el campo semántico de una porción territorial asignada, sin perder el carácter jurídico y patrimonial.
- source_word: בְּתוֹךְ אֲחֵי אָבִינוּ
  english_pob_choice: among our father's brothers
  chosen_spanish: entre los hermanos de nuestro padre
  alternatives_spanish:
  - entre los hermanos de nuestro padre
  - entre los parientes de nuestro padre
  - entre nuestros tíos
  lexicon: HALOT
  rationale: Se conserva la referencia masculina concreta a los hermanos del padre, que en español natural se expresa como «los hermanos de nuestro padre». Se evita neutralizarla con términos más amplios.
theological_decisions:
- issue: Lenguaje de herencia con referencia masculina específica
  english_pob_reading: son / brothers
  chosen_spanish_reading: hijo / hermanos
  alternative_spanish_readings:
  - hijo o hija / parientes
  - descendencia / familia
  rationale: El texto legal de Números 27 trata la herencia en términos masculinos específicos. Mantener «hijo» y «hermanos» preserva la fuerza jurídica del pasaje y no borra la tensión histórica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se mantuvo el matiz de pérdida o disminución de «nombre», se preservó el presente de la cláusula por fidelidad al hebreo, y se respetó el tono formal de la petición con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «clan» por coherencia con la decisión inglesa y para reflejar מִשְׁפָּחָה en contexto tribal.
  - Se evitó traducir el pasaje con lenguaje inclusivo que diluya la referencia masculina legal del hebreo.
  - La estructura interrogativa y petitoria conserva el orden argumental del original sin calco rígido.
