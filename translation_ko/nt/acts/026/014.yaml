  text: 우리 모두 땅에 엎드러졌을 때, 저는 히브리 말로 저에게 말씀하시는 음성을 들었습니다. 〈사울아, 사울아, 어찌하여 나를 박해하느냐? 막대기를 발로 차기는 너에게 어려운 일이다.〉[a]
