base_translation:
  language: en
  yaml_path: translation/ot/isaiah/041/025.yaml
  text: I have stirred up one from the north[a], and he has come; from the rising of the sun he calls on my name. He will come upon rulers as upon clay[c][b], and like a potter he treads mud.
  footnotes:
  - marker: a
    text: Or, 'from the east' (literally, 'from the rising of the sun').
    reason: lexical_alternative
  - marker: b
    text: '''Calls on my name'' may also be rendered ''invokes my name'' or ''proclaims my name.'''
    reason: lexical_alternative
  - marker: c
    text: The figure stirred up by God is often understood to be Cyrus; the Hebrew text here does not name him.
    reason: cross_reference
