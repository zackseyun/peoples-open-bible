translation:
  language: es
  text: 'Entonces Yahvé me dijo: «Hijo de hombre, ¿juzgarás a Oholá y a Oholibá? Declárales[a] sus abominaciones[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Declárales» mantiene el valor de anuncio/proclamación del imperativo hebreo, expresado en español con pronombre enclítico natural para «a ellas».
