translation:
  text: |-
    1. And after these things Abraham and Isaac and Jacob will rise to life, and I and my brothers will be chiefs of the tribes in Israel: Levi first, I second, Joseph third, Benjamin fourth, Simeon fifth, Issachar sixth, and so all the rest in order.
    
    2. And the Lord blessed Levi, but the angel of the presence blessed me; the powers of glory, Simeon; heaven, Reuben; the earth, Issachar; the sea, Zebulun; the mountains, Joseph; the tent, Benjamin; the lights, Dan; delight, Naphtali; the sun, Gad; the moon, Asher.
    
    3. And you will be the Lord’s people, with one language, and there will not be there a spirit of Belial’s deceit, because it will be thrown into the fire forever.
    
    4. And those who died in sorrow will rise in joy, and the poor for the Lord’s sake will be made rich, and those dying for the Lord’s sake will awake to life.
    
    5. And the deer of Joseph will run in exultation, and the eagles of Israel will fly in joy, and all the peoples will glorify the Lord forever.
