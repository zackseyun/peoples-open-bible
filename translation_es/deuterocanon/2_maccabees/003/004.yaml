translation:
  language: es
  text: Pero cierto Simón, de la tribu de Benjamín, habiendo sido nombrado supervisor del templo, estaba en conflicto con el sumo sacerdote acerca de la administración del mercado de la ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la supervisión del mercado» o «la regulación del mercado». El término griego se refiere a la supervisión cívica relacionada con el mercado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων τις
  english_pob_choice: a certain Simon
  chosen_spanish: cierto Simón
  alternatives_spanish:
  - un tal Simón
  - un cierto Simón
  lexicon: uso narrativo común; no corresponde a un lema técnico
  rationale: El griego introduce a Simón como una persona determinada pero no previamente identificada en el relato. «Cierto Simón» conserva ese valor narrativo sin sobrecargarlo.
- source_word: ἐκ τῆς Βενιαμεὶν φυλῆς
  english_pob_choice: of the tribe of Benjamin
  chosen_spanish: de la tribu de Benjamín
  alternatives_spanish:
  - de la tribu de Benjamín
  - procedente de la tribu de Benjamín
  lexicon: equivalencia contextual normal
  rationale: La referencia tribal es directa y se expresa de forma natural en español con «de la tribu de Benjamín».
- source_word: προστάτης
  english_pob_choice: overseer
  chosen_spanish: supervisor
  alternatives_spanish:
  - encargado
  - inspector
  - protector
  lexicon: LSJ
  rationale: El término señala una función de dirección o supervisión. «Supervisor» conserva el sentido administrativo mejor que «protector», que sonaría menos preciso aquí.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  lexicon: LSJ
  rationale: En este contexto ἱερόν designa el complejo del templo; «templo» es la opción más clara y fiel en español.
- source_word: καθεσταμένος
  english_pob_choice: having been appointed
  chosen_spanish: habiendo sido nombrado
  alternatives_spanish:
  - habiendo sido नियुक्तado
  - habiendo sido puesto
  - estando establecido
  lexicon: LSJ
  rationale: El participio indica instalación oficial en un cargo. «Habiendo sido nombrado» comunica bien ese carácter formal en español actual.
- source_word: διηχθῆναι
  english_pob_choice: was in conflict
  chosen_spanish: estaba en conflicto
  alternatives_spanish:
  - estaba en disputa
  - tenía un conflicto
  - estaba enfrentado
  lexicon: LSJ
  rationale: La forma verbal expresa una situación de desacuerdo o conflicto con el sumo sacerdote. «Estaba en conflicto» sigue de cerca la decisión inglesa sin intensificarla indebidamente.
- source_word: ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: LSJ
  rationale: «Sumo sacerdote» es el equivalente español establecido y preciso para el cargo judío.
- source_word: ἀγορανομίας
  english_pob_choice: the administration of the city market
  chosen_spanish: la administración del mercado de la ciudad
  alternatives_spanish:
  - la regulación del mercado de la ciudad
  - la supervisión del mercado de la ciudad
  lexicon: LSJ
  rationale: ἀγορανομία se refiere a la regulación/supervisión cívica del mercado. «Administración del mercado de la ciudad» mantiene la idea de función municipal y sigue la solución inglesa auditada.
- source_word: κατὰ τὴν πόλιν
  english_pob_choice: in the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - en la ciudad
  - por la ciudad
  lexicon: LSJ
  rationale: En la combinación con ἀγορανομία, la frase delimita el ámbito municipal de esa función; «de la ciudad» encaja naturalmente con «mercado» y conserva el matiz cívico.
theological_decisions:
- issue: Naturaleza del cargo de Simón en relación con el templo
  english_pob_reading: Simon is an officially appointed temple overseer, not a priestly title.
  chosen_spanish_reading: Simón aparece como un supervisor nombrado del templo, no como alguien descrito aquí con un título sacerdotal.
  alternative_spanish_readings:
  - Simón como protector del templo en un sentido amplio
  - Simón como encargado del templo
  rationale: El griego destaca la función de supervisión y el nombramiento, no un oficio sacerdotal. La redacción española evita añadir un estatus que el versículo no afirma.
  doctrine_reference: Principio de primacía del idioma original; no importar afirmaciones doctrinales que el texto no hace.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una formulación más formal para el conflicto y una expresión natural del sintagma relativo al mercado urbano, sin perder el valor de ἀγορανομία como supervisión/regulación cívica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo»/«Mesías» porque el texto no contiene Χριστός/מָשִׁיחַ.
  - Se eligió «sumo sacerdote» como término español establecido para ἀρχιερεύς.
  - «Supervisor» y «administración del mercado de la ciudad» preservan la dimensión cívico-administrativa documentada en el audit trail.
