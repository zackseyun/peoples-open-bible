  text: 믿음으로 노아는 아직 보이지 않는 것들에 대하여 신적 경고를 받고, 경외하는 두려움으로 자기 집의 구원을 위하여 방주를 지었습니다. 그것을 통하여 그는 세상을 정죄하였고, 믿음을 따라 오는 의의 상속자가 되었습니다.
