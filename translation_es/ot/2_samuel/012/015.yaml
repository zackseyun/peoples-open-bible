    text: O «golpeó» o «afligió» al niño.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mujer de Urías», preservando la negativa narrativa deliberada de nombrar directamente a Batseba aquí.'
    reason: cultural_note
  - marker: c
    text: O «y se enfermó» o «y cayó enfermo». El hebreo se refiere a que el niño llegó a estar enfermo.
    reason: lexical_alternative
  revision_rationale: Se corrigió la sobretraducción «gravemente» a «enfermó», se reubicaron las notas para que coincidan con los lugares pertinentes del texto y con el audit trail inglés, y se cambió «golpeó» por «hirió» para un español más natural sin perder la fuerza del hebreo. Se mantuvo «Yahvé» y «la mujer de Urías» conforme a la terminología y a la motivación narrativa documentada.
