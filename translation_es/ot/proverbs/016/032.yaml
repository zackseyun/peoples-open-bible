review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura comparativa del hebreo y conserva adecuadamente el contraste entre autocontrol y conquista militar. Sin embargo, «el lento para la ira» suena poco natural en español y no expresa tan bien el modismo אֶרֶךְ אַפַּיִם como «el que tarda en airarse».
  spanish_quality_summary: La redacción es mayormente clara y fiel, pero requiere un ajuste de naturalidad y dignidad eclesial en la primera cola. «El que domina su espíritu» y «el que toma una ciudad» son buenas soluciones en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» para רוּחַ sigue la decisión POB. Las notas léxicas están bien orientadas, aunque la nota del modismo mejora con una formulación más idiomática en español.
  issues:
  - severity: medium
    issue: «el lento para la ira» es una construcción poco natural en español bíblico contemporáneo
    rationale: Aunque intenta seguir de cerca el inglés auditado, en español neutro resulta forzada. «el que tarda en airarse» o «el que es lento para airarse» comunica mejor el sentido de אֶרֶךְ אַפַּיִם sin perder fidelidad.
  - severity: low
    issue: La nota «largo de narices» puede sonar demasiado literalista y menos transparente que «largo de nariz»
    rationale: 'El hebreo es dual/plural idiomático, pero en español explicativo conviene una formulación literal más comprensible y estable: «largo de nariz», manteniendo que es un modismo hebreo para tardar en enojarse.'
  revised_spanish_text: Mejor es el que tarda en airarse[a] que el poderoso, y el que domina su espíritu[b] que el que toma una ciudad.
