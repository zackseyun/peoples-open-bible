translation:
  language: es
  text: Entonces lo llevará al sacerdote, y el sacerdote tomará de él un puñado como su porción memorial y lo quemará sobre el altar, además de las ofrendas de alimento de Yahvé. Es una ofrenda por el pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Es una ofrenda de purificación». El término hebreo puede denotar la ofrenda que trata con el pecado por medio de purificación.'
    reason: alternative_reading
lexical_decisions:
- source_word: וֶהֱבִיאָהּ
  english_pob_choice: Then he shall bring it
  chosen_spanish: Entonces lo llevará
  alternatives_spanish:
  - Y lo llevará
  - Entonces lo traerá
  lexicon: HALOT
  rationale: El hebreo indica una acción secuencial de llevar/presentar la ofrenda al sacerdote. En español, "lo llevará" comunica bien el movimiento de la ofrenda; "Entonces" conserva la sucesión del waw sin volver mecánico el texto.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: En este contexto cultual, "sacerdote" es el equivalente natural y claro de כהן. "Presbítero" sería eclesiástico y no corresponde al marco levítico.
- source_word: וְקָמַץ
  english_pob_choice: shall take ... a handful
  chosen_spanish: tomará ... un puñado
  alternatives_spanish:
  - tomará ... un puñado con la mano
  - tomará ... un puñado
  lexicon: HALOT
  rationale: La acción técnica de קמץ se expresa de manera idiomática en español con "tomar un puñado". Mantiene el valor ritual sin sobreexplicarlo.
- source_word: מְלֹא קֻמְצוֹ
  english_pob_choice: a handful
  chosen_spanish: un puñado
  alternatives_spanish:
  - la plenitud de su puño
  - lo que cabe en su mano
  lexicon: HALOT
  rationale: La expresión hebrea designa la medida completa de la mano del sacerdote. "Un puñado" es la equivalencia natural y suficientemente precisa en español.
- source_word: אֶת אַזְכָּרָתָהּ
  english_pob_choice: as its memorial portion
  chosen_spanish: como su porción memorial
  alternatives_spanish:
  - como su porción de memorial
  - como su porción recordatoria
  lexicon: HALOT
  rationale: אַזְכָּרָה es un término técnico del rito que señala la porción que se quema como memorial ante Dios. "Porción memorial" conserva la función cultual sin convertirla en paráfrasis explicativa.
- source_word: וְהִקְטִיר
  english_pob_choice: and burn it
  chosen_spanish: y lo quemará
  alternatives_spanish:
  - y lo hará arder
  - y lo ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר se refiere a quemar sobre el altar. "Lo quemará" es claro en español y conserva la acción ritual.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: El verbo de quemar con el sufijo direccional apunta a la ubicación ritual sobre el altar. "Sobre" es la preposición más natural aquí.
- source_word: עַל אִשֵּׁי יְהוָה
  english_pob_choice: in addition to the food offerings of Yahweh
  chosen_spanish: en adición a las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - junto con las ofrendas encendidas de Yahvé
  - además de las ofrendas encendidas de Yahvé
  lexicon: HALOT
  rationale: La expresión אִשֵּׁי יְהוָה se refiere a las ofrendas consumidas por fuego. Se mantiene el carácter sacrificial con "ofrendas encendidas"; "en adición a" refleja היטב el valor de עַל según la revisión inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino como transliteración en español conforme al criterio del proyecto. "Yahvé" evita la sustitución por un título y mantiene el paralelo con la decisión inglesa.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda por el pecado
  - sacrificio por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: En Levítico, חַטָּאת puede referirse tanto al pecado como a la ofrenda que trata el pecado. Se prefiere "ofrenda por el pecado" por ser transparente en español y concordar con el uso cultual del pasaje.
theological_decisions:
- issue: Valor de חַטָּאת en la fórmula final
  english_pob_reading: It is a sin offering
  chosen_spanish_reading: Es una ofrenda por el pecado.
  alternative_spanish_readings:
  - Es una ofrenda de purificación.
  - Es un sacrificio por el pecado.
  rationale: Se conserva la designación cultual tradicional sin eliminar la tensión interpretativa documentada. "Ofrenda por el pecado" sigue de cerca la lectura inglesa principal, mientras que la alternativa de "purificación" se reserva como opción significativa sin imponerla en el texto principal.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que cambió la relación de עַל de «on top of» a «in addition to». Por eso el español usa «en adición a» y no una locución espacial como «sobre/encima de» para esa frase, aunque se mantiene «sobre el altar» para la ubicación del quemado. También se conserva el valor técnico de «memorial portion» mediante «porción memorial».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se eligió «ofrenda por el pecado» para חַטָּאת, dejando abierta la alternativa interpretativa de «purificación» en la nota.
  - «Ofertas encendidas» se evitó en favor de «ofrendas encendidas», que suena más natural en español y conserva el sentido sacrificial.
  - El marcador [a] se adjunta a «sacerdote» porque el inglés audit trail conservó una nota sobre el acceso/lectura alternativa del destinatario inmediato.
  - El marcador [b] se adjunta a la frase cultual porque el hebreo literal dice «ofrendas hechas por fuego de Yahvé» y la nota explica la equivalencia terminológica.
