  rationale: Se ajusta συνέδραμεν para conservar la idea de convergencia rápida y colectiva, y se mejora la naturalidad de ἐξ αὐτῶν con “de entre ellas mismas”, sin cambiar el contenido ni las decisiones léxicas centrales del POB.
