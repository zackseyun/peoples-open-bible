translation:
  language: es
  text: Crucen a Tarsis; giman[a], habitantes de la costa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aúllen»; el hebreo puede expresar un grito de duelo intenso.
    reason: lexical_alternative
  - marker: b
    text: O «isla»; el hebreo אִי puede referirse a una isla o a una región o costa marítima.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרוּ
  english_pob_choice: Cross over
  chosen_spanish: Atravesad
  alternatives_spanish:
  - Pasad
  - Cruzad
  lexicon: HALOT
  rationale: El imperativo plural pide un movimiento de paso o cruce. «Atravesad» comunica el desplazamiento exigido sin añadir de más una ruta específica y conserva la fuerza directa del mandato.
- source_word: תַּרְשִׁישָׁה
  english_pob_choice: to Tarshish
  chosen_spanish: hasta Tarsis
  alternatives_spanish:
  - a Tarsis
  - hacia Tarsis
  lexicon: HALOT
  rationale: El he local indica dirección hacia el lugar. «Hasta Tarsis» mantiene la orientación espacial y suena natural en español bíblico moderno, sin volverlo mecánico.
- source_word: הֵילִילוּ
  english_pob_choice: wail
  chosen_spanish: lamentaos
  alternatives_spanish:
  - aullad
  - plañid
  lexicon: HALOT
  rationale: El verbo expresa un clamor de dolor o duelo. «Lamentaos» conserva el valor de duelo profético con dignidad en español; «aullad» sería más fuerte pero más áspero/arcaizante.
- source_word: יֹשְׁבֵי
  english_pob_choice: inhabitants of
  chosen_spanish: moradores de
  alternatives_spanish:
  - habitantes de
  - los que moran en
  lexicon: HALOT
  rationale: El participio sustantivado señala a quienes viven allí. «Moradores de» es claro, formal y bíblicamente natural, sin perder el sentido de residencia.
- source_word: אִי
  english_pob_choice: the coastland
  chosen_spanish: la costa
  alternatives_spanish:
  - la isla
  - la tierra costera
  lexicon: HALOT
  rationale: El término puede designar isla o región/costa marítima. Siguiendo la lectura de «coastland» del POB inglés y el contexto marítimo, «la costa» comunica bien el campo semántico en español, aunque deja abierta la ambigüedad geográfica.
translation_notes:
  revision_awareness: El texto inglés auditado no mostró revisiones aplicadas y fue verificado con alta concordancia; por eso la traducción española sigue de cerca la lectura estable, conservando la ambigüedad de אִי mediante nota y sin introducir explicaciones interpretativas ajenas al verso.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no aparece el nombre divino en este verso.
  - «Tarsis» se mantuvo como topónimo propio, sin transliteración engorrosa.
  - La forma imperativa plural en español se mantiene con tratamiento plural directo.
  - Se prefirió «lamentaos» por registro bíblico sobrio, no por arcaísmo innecesario.
