base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/013/009.yaml
  text: Let us die as brothers[a], brothers, for the sake of the law; let us imitate the three young men in Syria[b], who despised the furnace of equal torment.
  footnotes:
  - marker: a
    text: That is, the three Jewish youths known from Daniel 3. The Greek here says 'in Syria,' which reflects the wording of this text rather than the more familiar 'Babylon' from Daniel.
    reason: cross_reference
  - marker: b
    text: The adjective behind 'equal in fierceness to theirs' is rare and difficult; it may mean that the furnace was comparable to the one faced by the three youths.
    reason: lexical_alternative
