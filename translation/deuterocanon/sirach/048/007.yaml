id: SIR.48.7
reference: Sirach 48:7
source:
  edition: sefaria-ben-sira-kahana
  text: המושח מלא תשלומות, ונביא תחליף תחתיך.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἀκούων ἐν Σινὰ ἐλεγμὸν καὶ ἐν Χωρὴβ κρίματα ἐκδικήσεως·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:7
translation:
  text: who anointed one for acts of retribution[b][a], and a prophet as your successor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''hearing at Sinai reproof, and at Horeb judgments of vengeance.'' The surviving Hebrew here differs notably from the Greek tradition.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording around 'one for acts of retribution' is somewhat difficult in this composite Geniza text; the translation follows the apparent sense in context.
    reason: textual_variant
lexical_decisions:
- source_word: המושח
  chosen: who anointed
  alternatives:
  - the one who anoints
  - anointing
  lexicon: HALOT
  rationale: 'Taken as a relative/participial form from משח, continuing the description of Elijah from the prior verse: he is the one who anointed. English supplies ''who'' for natural syntax.'
- source_word: מלא
  chosen: one
  alternatives:
  - fullness
  - that which is full
  lexicon: HALOT
  rationale: The Hebrew is difficult in this composite Geniza text. In light of the Greek parallel's singular object and the narrative context of Elijah commissioning Hazael/Jehu/Elisha, this is best understood as referring to a person, hence 'one.' The wording remains somewhat uncertain.
- source_word: תשלומות
  chosen: acts of retribution
  alternatives:
  - repayments
  - requitals
  - vengeance
  lexicon: HALOT
  rationale: From שלם in the sense of repayment/requital. 'Acts of retribution' fits the context of anointing an agent for judgment and aligns with the Greek parallel's punitive sense without over-specifying.
- source_word: ונביא
  chosen: and a prophet
  alternatives:
  - and the prophet
  lexicon: HALOT
  rationale: Indefinite in English is most natural here; the referent is Elisha as prophet, but the Hebrew lacks the article in this form.
- source_word: תחליף
  chosen: as your successor
  alternatives:
  - in your place
  - as a replacement for you
  lexicon: HALOT
  rationale: From חלף, 'to replace/succeed.' 'As your successor' is idiomatic English and captures the sense of appointment to continue Elijah's role.
- source_word: תחתיך
  chosen: your successor
  alternatives:
  - in your place
  lexicon: HALOT
  rationale: Combined with תחליף, the phrase denotes succession in office or role, not merely spatial substitution.
- source_word: ἐλεγμὸν
  chosen: acts of retribution
  alternatives:
  - rebuke
  - conviction
  lexicon: BDAG
  rationale: The Greek parallel reads 'rebuke' at Sinai, but the Hebrew line points to anointing for punitive action. Because the project prioritizes the surviving Hebrew for Sirach where extant, the main text follows the Hebrew while allowing the Greek to signal the judgment/reproof semantic field.
- source_word: κρίματα ἐκδικήσεως
  chosen: acts of retribution
  alternatives:
  - judgments of vengeance
  - avenging judgments
  lexicon: BDAG
  rationale: The Greek parallel confirms a judicial-punitive idea, supporting the Hebrew rendering 'acts of retribution' rather than a softer term.
