translation:
  language: es
  text: los que arrancan hierba salina[a] entre los arbustos, y la raíz de retama es su alimento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «malva»; el nombre hebreo de la planta es incierto, aunque probablemente se refiere a una planta silvestre tolerante a la sal.
    reason: lexical_alternative
  - marker: b
    text: O «pan», en el sentido amplio de «alimento» o «sustento».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֹּטְפִים
  english_pob_choice: who pluck
  chosen_spanish: los que arrancan
  alternatives_spanish:
  - los que recogen
  - los que arrancan de
  lexicon: HALOT
  rationale: El participio describe una acción concreta y algo desesperada de tomar vegetación silvestre. «Arrancan» conserva mejor esa fuerza física que «recogen» y resulta natural en español.
- source_word: מַלּוּחַ
  english_pob_choice: saltwort
  chosen_spanish: salicornia
  alternatives_spanish:
  - malva
  - hierba salina
  lexicon: HALOT
  rationale: El hebreo nombra una planta silvestre incierta, probablemente halófita. «Salicornia» comunica bien una planta tolerante a la sal sin sugerir una planta de huerto como «malva».
- source_word: עֲלֵי שִׂיחַ
  english_pob_choice: among the bushes
  chosen_spanish: entre los arbustos
  alternatives_spanish:
  - junto a los arbustos
  - sobre los arbustos
  lexicon: HALOT
  rationale: La preposición expresa ubicación en medio del matorral. «Entre los arbustos» mantiene la imagen de forrajeo en vegetación rala y suena natural en español.
- source_word: וְשֹׁרֶשׁ רְתָמִים
  english_pob_choice: and the root of broom shrubs
  chosen_spanish: y la raíz de los retamos
  alternatives_spanish:
  - y la raíz de retamas
  - y la raíz de los arbustos de retama
  lexicon: HALOT
  rationale: «Retamo»/«retama» designa el arbusto desértico correspondiente; elegí «retamos» para preservar el valor colectivo del plural hebreo y la referencia al arbusto de desierto.
- source_word: לַחְמָם
  english_pob_choice: is their food
  chosen_spanish: es su comida
  alternatives_spanish:
  - es su alimento
  - es su pan
  lexicon: HALOT
  rationale: Aunque el término puede significar «pan», aquí el contexto exige alimento de subsistencia, no pan horneado. «Comida» comunica el sentido idiomático con sencillez y sin perder la nota de precariedad.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que eliminó «from» antes de «among the bushes» por naturalidad. En español se reflejó directamente con «entre los arbustos», sin añadir preposición equivalente innecesaria. También se preservó la incertidumbre botánica con una nota alternativa, como en el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico sin recurrir a equivalentes eclesiásticos tradicionales que oscurezcan el referente botánico.
  - «Salicornia» y «retamos» se eligieron por claridad contextual y para evitar imágenes domésticas ajenas al desierto de Job.
  - La nota sobre «su comida» conserva la posibilidad semántica de «pan» sin imponerla en el texto principal.
