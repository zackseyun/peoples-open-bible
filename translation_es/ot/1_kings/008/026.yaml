translation:
  language: es
  text: Y ahora[a], Dios de Israel[b], te ruego que sea confirmada tu palabra que dijiste a tu siervo David, mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sea establecida», «se compruebe como verdadera» o, de manera más dinámica, «llegue a cumplirse».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tus palabras». El singular «tu palabra» refleja de manera natural el sentido colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene la conjunción inicial y el adverbio temporal, conservando el paso discursivo de la oración sin sonar forzado en español.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - Oh Dios de Israel
  lexicon: HALOT
  rationale: La construcción funciona naturalmente como vocativo en español sin necesidad de añadir «Oh». Se conserva el nombre relacional del Dios del pacto con Israel.
- source_word: יֵאָמֶן
  english_pob_choice: be confirmed
  chosen_spanish: sea confirmada
  alternatives_spanish:
  - sea establecida
  - se compruebe como verdadera
  - llegue a cumplirse
  lexicon: HALOT
  rationale: El nifal de אמן conserva la idea de quedar firme/ratificado. «Sea confirmada» reproduce bien la petición sin perder el matiz de solidez y validación del dicho divino.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - te suplico
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «te ruego» expresa con dignidad la súplica de la oración y equivale adecuadamente al partícula de entreaty.
- source_word: דברי/ך
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tus palabras
  - tu promesa
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente plural/colectivo, en español singular «tu palabra» comunica de manera natural la unidad de la declaración o promesa divina, como en la POB inglesa.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: that you spoke
  chosen_spanish: que hablaste
  alternatives_spanish:
  - que pronunciaste
  - que prometiste
  lexicon: HALOT
  rationale: Se conserva el verbo básico «hablar» sin adelantar interpretación. «Prometiste» sería posible por el contexto, pero desplaza el énfasis del texto hebreo.
- source_word: לְעַבְדְּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - a tu esclavo
  lexicon: HALOT
  rationale: Aquí el contexto de oración real y la referencia a David favorecen «siervo» en español por su valor relacional y honorífico; «esclavo» preservaría fuerza léxica pero no encaja tan bien en el registro del ruego.
- source_word: דָּוִד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  lexicon: HALOT
  rationale: 'El orden español con coma refleja de forma clara la aposición hebrea y su sentido: David es el padre del orante.'
theological_decisions:
- issue: Cómo entender la petición respecto a la palabra previa de Dios a David
  english_pob_reading: Rendered as a prayer that God's spoken word be confirmed
  chosen_spanish_reading: Se traduce como una súplica para que la palabra divina quede confirmada
  alternative_spanish_readings:
  - para que se cumpla la promesa divina
  - para que la palabra de Dios se establezca
  rationale: La petición no añade contenido doctrinal extra; pide la ratificación/eficacia de lo dicho por Dios. «Confirmada» conserva la firmeza implícita en el hebreo y deja abierta la idea de cumplimiento sin reducirla solo a una promesa en formulación moderna.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No hubo revisiones pendientes en el expediente inglés; el acuerdo de revisor fue alto y la traducción inglesa final se mantuvo sin cambios. La versión española sigue de cerca las decisiones léxicas auditadas, especialmente en el valor de יֵאָמֶן, la partícula נָא y el sentido colectivo de דבריך.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהֵי יִשְׂרָאֵל en vocativo reverente, sin introducir fórmulas eclesiásticas ajenas al hebreo.
  - Se evita «Señor» porque el hebreo aquí dice «Dios de Israel», no un sustituto del nombre divino.
  - «Siervo» se conserva para עבד en el contexto de oración y pacto, según la pauta proyectual.
  - «Tu palabra» conserva la singularidad natural del español sin borrar el plural colectivo hebreo subyacente.
