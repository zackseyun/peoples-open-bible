review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene el plural implícito de חֲדָשִׁים desde 3:22, expresa adecuadamente לַבְּקָרִים como iteración temporal, y traduce אֱמוּנָה como fidelidad. Sin embargo, la nota al pie necesita reparación formal y estilística para sonar natural en español y evitar comillas/citas torpes.'
  spanish_quality_summary: 'El texto principal es fiel y legible, pero ''Nuevas son cada mañana'' suena algo invertido y menos natural en español actual que una formulación con sujeto explícito. Dado que la filosofía POB permite suplir el sujeto implícito cuando el español lo requiere, conviene hacerlo para mayor claridad: ''Son nuevas cada mañana''. La nota actual empieza con una comilla innecesaria y ''de la línea anterior'' suena calcado; ''del versículo anterior'' o ''de la línea anterior'' sin comillas sería mejor.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'fidelidad' para אֱמוּנָתֶךָ está bien documentado. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος en este versículo.
  issues:
  - severity: medium
    issue: Orden marcado en 'Nuevas son cada mañana'
    rationale: Aunque no es incorrecto, el orden predicativo inicial suena más literario y menos natural que 'Son nuevas cada mañana' en español eclesial general. El español puede y suele suplir el sujeto implícito sin sacrificar fidelidad.
  - severity: low
    issue: Nota al pie con redacción poco natural
    rationale: 'La nota comienza con una comilla sobrante (''O: «...'') y la frase ''se toma más colectivamente de la línea anterior'' es algo pesada. Debe pulirse para claridad y español natural, manteniendo la alternativa exegética del audit trail.'
  revised_spanish_text: Son nuevas cada mañana[a]; grande es tu fidelidad.
