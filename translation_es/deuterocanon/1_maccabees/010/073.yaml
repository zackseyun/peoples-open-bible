translation:
  language: es
  text: Y ahora no podrás resistir la caballería[a] ni una fuerza tan grande en la llanura, donde no hay piedra ni guijarro ni lugar para huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa ἵππον, singular colectivo: literalmente «el caballo», pero con sentido militar de caballería o tropas montadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δυνήσῃ
  english_pob_choice: you will not be able
  chosen_spanish: no podrás
  alternatives_spanish:
  - no serás capaz de
  - no podrás ser capaz de
  lexicon: BDAG
  rationale: El futuro de δυνατόμαι expresa incapacidad futura; «no podrás» suena natural en español y conserva el valor prospectivo del griego sin endurecer el estilo.
- source_word: ὑποστῆναι
  english_pob_choice: to withstand
  chosen_spanish: resistir
  alternatives_spanish:
  - hacer frente a
  - sostenerte contra
  - oponerte a
  lexicon: BDAG
  rationale: En contexto militar, el infinitivo indica la acción de mantenerse frente a un ataque. «Resistir» comunica esa oposición activa de forma clara y sobria en español.
- source_word: τὴν ἵππον
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los jinetes
  - el caballo
  - la fuerza montada
  lexicon: LSJ
  rationale: Como en el audit trail inglés, el singular colectivo designa una fuerza montada. «Caballería» es el equivalente militar idiomático en español y evita tomarlo literalmente como un solo caballo.
- source_word: δύναμιν τοσαύτην
  english_pob_choice: so great a force
  chosen_spanish: una fuerza tan grande
  alternatives_spanish:
  - un ejército tan grande
  - un poder tan grande
  - una fuerza tan numerosa
  lexicon: BDAG
  rationale: δύναμις aquí apunta a fuerza militar. «Una fuerza tan grande» preserva el énfasis de τοσαύτην y mantiene amplitud semántica sin reducirlo necesariamente a «ejército».
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el llano
  - en el campo abierto
  - en la planicie
  lexicon: LSJ
  rationale: πέδιον denota terreno llano; «llanura» es el sustantivo más natural en español y conserva la contraposición con el terreno pedregoso del verso.
- source_word: λίθος
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - roca
  - piedra grande
  lexicon: LSJ
  rationale: El término básico apunta a una piedra de tamaño utilizable para cobertura o defensa. «Piedra» mantiene la oposición con κόχλας y resulta más natural que «roca».
- source_word: κόχλας
  english_pob_choice: pebble
  chosen_spanish: guijarro
  alternatives_spanish:
  - piedrita
  - canto rodado pequeño
  - grava
  lexicon: LSJ
  rationale: El griego distingue aquí una piedra pequeña en contraste con λίθος. «Guijarro» preserva esa diferencia léxica mejor que repetir «piedra» y suena más idiomático que una perífrasis.
- source_word: τόπος τοῦ φυγεῖν
  english_pob_choice: a place to flee
  chosen_spanish: lugar para huir
  alternatives_spanish:
  - lugar de escape
  - sitio para refugiarse y huir
  - espacio para retirarse
  lexicon: BDAG
  rationale: La construcción final expresa posibilidad de escape. «Lugar para huir» sigue de cerca la estructura griega y mantiene la sencillez del cierre.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura aprobada del texto griego y conserva la distinción entre λίθος y κόχλας; no se registraron revisiones textuales relevantes en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Y ahora» para corresponder a καὶ νῦν y conservar el arranque discursivo.
  - Se eligió «llanura» por naturalidad en español y coherencia con el contraste topográfico del versículo.
  - Se preservó la diferencia entre «piedra» y «guijarro» para reflejar la duplicación léxica del griego.
  - No se usó «SEÑOR» ni terminología religiosa ajena al pasaje, ya que no interviene el Tetragrámaton ni vocabulario teológico directo.
