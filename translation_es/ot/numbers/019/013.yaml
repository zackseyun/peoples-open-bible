    text: 'O: «el agua de purificación». El hebreo dice literalmente «agua de impureza», refiriéndose al agua usada para quitar la impureza causada por un cadáver.'
    reason: lexical_alternative
  revision_rationale: La revisión preserva mejor la fórmula pactual de כרת sin interpretarla de más, restaura la nota léxica documentada para מֵי נִדָּה, mejora la naturalidad sintáctica del español en la cláusula de aspersión, y ajusta «ha contaminado» para reflejar más de cerca el valor ritual de טִמֵּא.
