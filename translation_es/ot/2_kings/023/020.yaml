translation:
  language: es
  text: Degolló en los altares[a] a todos los sacerdotes de los lugares altos que estaban allí, y quemó huesos humanos sobre ellos. Luego volvió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sacrificó». El verbo hebreo puede tener matiz sacrificial, pero aquí probablemente enfatiza una matanza violenta en el contexto de la purga del culto ilícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: he slaughtered
  chosen_spanish: Mató
  alternatives_spanish:
  - degolló
  - sacrificó
  lexicon: HALOT
  rationale: El hebreo זבח puede tener matiz sacrificial o de degüello/masacre. En este contexto de purga de culto ilícito, el español 'mató' comunica con naturalidad la acción violenta sin convertirla en un sacrificio legítimo. 'Degolló' preservaría más el matiz físico, pero suena más marcado; 'sacrificó' podría sugerir un acto cultual aprobado, lo cual el contexto no respalda.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  lexicon: HALOT
  rationale: Es un cuantificador totalizador directo; 'todos' transmite la totalidad sin suavizarla.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  english_pob_choice: the priests of the high places
  chosen_spanish: los sacerdotes de los lugares altos
  alternatives_spanish:
  - los sacerdotes de los santuarios
  - los sacerdotes de las colinas
  lexicon: HALOT
  rationale: '''Lugares altos'' es la equivalencia establecida para בָּמוֹת en este contexto histórico-religioso. ''Lugares altos'' mantiene la referencia a los centros locales de culto ilícito mejor que una paráfrasis genérica.'
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: who were there
  chosen_spanish: que estaban allí
  alternatives_spanish:
  - que estaban en ese lugar
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los sacerdotes presentes en el sitio. 'Que estaban allí' suena natural en español y conserva la fuerza locativa.
- source_word: עַל הַמִּזְבְּחוֹת
  english_pob_choice: on the altars
  chosen_spanish: sobre los altares
  alternatives_spanish:
  - encima de los altares
  - en los altares
  lexicon: HALOT
  rationale: '''Sobre'' reproduce bien עַל y encaja con la escena de profanación. También deja visible que la acción se desarrolla en relación espacial con los altares.'
- source_word: וַיִּשְׂרֹף
  english_pob_choice: he burned
  chosen_spanish: quemó
  alternatives_spanish:
  - incineró
  - abrasó
  lexicon: HALOT
  rationale: Verbo simple y directo para שׂרף. 'Quemó' conserva el orden narrativo y no añade registro innecesariamente técnico.
- source_word: עַצְמוֹת אָדָם
  english_pob_choice: human bones
  chosen_spanish: huesos humanos
  alternatives_spanish:
  - huesos de hombre
  - huesos de una persona
  lexicon: HALOT
  rationale: אָדָם aquí es genérico, no masculino específico; 'humanos' evita una lectura sexista y es idiomático en español. Mantiene el sentido colectivo y despectivo de la profanación.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre los altares
  lexicon: HALOT
  rationale: El pronombre retoma naturalmente a 'los altares'. 'Sobre ellos' conserva la cohesión pronominal del hebreo; el antecedente queda claro por el contexto inmediato.
- source_word: וַיָּשָׁב יְרוּשָׁלָם
  english_pob_choice: Then he returned to Jerusalem
  chosen_spanish: Luego volvió a Jerusalén
  alternatives_spanish:
  - Y volvió a Jerusalén
  - Entonces regresó a Jerusalén
  lexicon: HALOT
  rationale: '''Volvió'' expresa bien וַיָּשָׁב y ''Luego'' reproduce la secuencia narrativa sin excesiva rigidez. ''Regresó'' sería válido, pero ''volvió'' es más natural y breve.'
theological_decisions:
- issue: Matiz sacrificial de וַיִּזְבַּח al describir la muerte de los sacerdotes idólatras
  english_pob_reading: Render as 'slaughtered' rather than 'sacrificed'
  chosen_spanish_reading: Traducir con 'mató' en vez de 'sacrificó'
  alternative_spanish_readings:
  - los sacrificó
  - los degolló
  rationale: Aunque זבח puede tener connotación sacrificial, 'sacrificó' podría sugerir una ofrenda válida a Yahvé, cosa que el pasaje no afirma. 'Mató' conserva el carácter violento del juicio de Josías y evita legitimar la acción como sacrificio. 'Degolló' preserva más crueldad física, pero 'mató' es suficientemente fiel y menos interpretativo.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica sin resolverla artificialmente
- issue: Profanación cultual mediante huesos humanos sobre los altares
  english_pob_reading: he burned human bones on them
  chosen_spanish_reading: quemó huesos humanos sobre ellos
  alternative_spanish_readings:
  - quemó sobre ellos huesos de personas
  - quemó huesos humanos encima de ellos
  rationale: La frase conserva la idea de contaminación deliberada del culto falso. Mantener 'sobre ellos' como referencia a los altares preserva la conexión con el acto de deshonra y desactivación cultual.
  doctrine_reference: Lectura histórica-literal del juicio contra lugares de culto ilícito
- issue: Nombre divino no presente en el versículo pero implicado en el marco narrativo de Reyes
  english_pob_reading: none explicit in verse
  chosen_spanish_reading: No introducir ningún sustituto divino
  alternative_spanish_readings:
  - no aplica
  rationale: El versículo no contiene el Tetragrámaton ni una cita directa; por tanto, no se introduce 'Yahvé' ni 'Señor' en el texto español. Esto evita añadir información no presente en el hebreo del versículo.
  doctrine_reference: Respeto estricto del alcance del verso y del texto fuente
- issue: Referencia espacial final a Jerusalén
  english_pob_reading: Then he returned to Jerusalem
  chosen_spanish_reading: Luego volvió a Jerusalén
  alternative_spanish_readings:
  - Entonces regresó a Jerusalén
  rationale: La clausura narrativa debe sonar natural en español sin perder el simple encadenamiento de acciones. 'Volvió' es directo y no agrega matiz no sustentado.
  doctrine_reference: Equivalencia óptima en narrativa histórica
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del audit trail inglés. No hubo cambios sustantivos respecto del análisis previo: se conservó la ambigüedad de זבח sin resolverla hacia ''sacrificó'', se mantuvo la progresión narrativa simple y se reflejó el objeto colectivo ''huesos humanos'' con un español natural y fiel.'
  spanish_consistency_notes:
  - Se usó 'lugares altos' para בָּמוֹת, siguiendo la terminología bíblica estable en español.
  - Se evitó 'SEÑOR' o 'Yahvé' porque el versículo no contiene el nombre divino.
  - '''Sobre ellos'' queda ligado a ''los altares'', como en el hebreo, sin introducir un antecedente nuevo.'
  - El registro es sobrio y narrativo, adecuado para historia deuteronomista.
