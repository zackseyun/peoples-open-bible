translation:
  language: es
  text: Por falta de consejo, los planes fracasan[a]; pero con muchos consejeros, se establecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: Los planes son frustrados por falta de deliberación; pero con muchos consejeros quedan establecidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפֵר
  english_pob_choice: fail
  chosen_spanish: fracasan
  alternatives_spanish:
  - son frustrados
  - se quebrantan
  - llegan a nada
  lexicon: HALOT
  rationale: El hifil de פרר expresa la idea de quebrantar o frustrar algo. En español, con «los planes» como sujeto, «fracasan» comunica de manera natural el resultado sin forzar una construcción demasiado literal.
- source_word: מַחֲשָׁבוֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - propósitos
  - intenciones
  lexicon: HALOT
  rationale: En contexto sapiencial, el término apunta a planes o propósitos deliberados, no solo a pensamientos internos. «Planes» conserva bien esa orientación práctica.
- source_word: בְּאֵין
  english_pob_choice: for lack of
  chosen_spanish: sin
  alternatives_spanish:
  - por falta de
  - sin que haya
  - cuando no hay
  lexicon: HALOT
  rationale: La expresión hebrea indica ausencia con valor causal. «Sin» funciona de forma natural en español dentro del proverbio; «por falta de» también sería posible, pero resulta más explícito y menos compacto.
- source_word: סוֹד
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - deliberación
  - consejo confidencial
  - secreto
  lexicon: HALOT
  rationale: Aquí el contraste con los muchos consejeros muestra que el sentido principal es consejo o deliberación, no secreto en sí. «Consejo» mantiene la fuerza sapiencial del dicho.
- source_word: יוֹעֲצִים
  english_pob_choice: advisers
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - counselors
  - los que aconsejan
  lexicon: HALOT
  rationale: Es un participio activo referido a personas que dan consejo. «Consejeros» es claro y natural en español bíblico contemporáneo.
- source_word: תָּקֽוּם
  english_pob_choice: they stand
  chosen_spanish: se establecen
  alternatives_spanish:
  - se sostienen
  - permanecen firmes
  - quedan establecidos
  lexicon: HALOT
  rationale: El verbo קום tiene la idea de levantarse o quedar firme/establecido. En español, «se establecen» expresa bien el resultado de firmeza y correspondencia con los «planes» del primer hemistiquio.
translation_notes:
  revision_awareness: 'The English audit trail shows no applied revisions and high agreement across checks. The Spanish draft follows the same sense decisions: the proverb contrasts plans that fail from lack of counsel with plans that are established by many advisers, preserving the wisdom-literature parallelism without adding interpretive theology.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo antitético del hebreo con una primera cláusula negativa y una segunda afirmativa.
  - «Consejo / consejeros» reproduce la relación semántica entre סוֹד y יוֹעֲצִים sin importar un lenguaje eclesiástico más tradicional.
  - El verbo final se vertió como «se establecen» para reflejar el valor de firmeza/estabilidad de קום en este contexto.
  - La nota a pie conserva la alternativa mencionada en el audit trail entre una lectura más idiomática y otra más explícita.
