review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura básica del hebreo: destinatario (''los hijos de Aarón''), tres prendas (''túnicas'', ''fajines'', ''gorros'') y la finalidad (''para gloria y para hermosura''). Sin embargo, hay un desajuste importante en las notas: la nota [a] está anclada en ''túnicas'', pero su contenido trata de las alternativas para מִגְבָּעוֹת, es decir, el tocado sacerdotal (''gorros'').'
  spanish_quality_summary: 'El español es claro y legible, con tono digno y natural. ''Harás'', ''túnicas'' y ''fajines'' funcionan bien. ''Gorros'' es comprensible aunque algo cotidiano; aun así, es aceptable dado el audit trail inglés que terminó en ''caps''. ''Hermosura'' suena bíblico y natural en este contexto. La principal falla es formal y de legibilidad editorial: la nota al pie está colocada en la palabra equivocada.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. Las decisiones léxicas principales concuerdan razonablemente con el expediente inglés: כֻתֳּנֹת -> ''túnicas'', אַבְנֵטִים -> ''fajines'', מִגְבָּעוֹת -> ''gorros'', לְכָבוֹד וּלְתִפְאָרֶת -> ''para gloria y para hermosura''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'túnicas' pero explica alternativas para el tocado sacerdotal ('gorros').
    rationale: 'Esto distorsiona la relación entre texto y nota, y puede hacer pensar erróneamente que las alternativas léxicas corresponden a כֻתֳּנֹת en lugar de מִגְבָּעוֹת. La corrección es sencilla: mover el marcador al término ''gorros''.'
  - severity: low
    issue: '''Gorros'' puede sonar algo cotidiano para un contexto sacerdotal.'
    rationale: No obliga a cambiar el texto porque el expediente inglés revisado eligió 'caps' y el español mantiene una correspondencia funcional. La nota con alternativas ('tocas', 'coberturas para la cabeza') compensa la amplitud del término.
  revised_spanish_text: Para los hijos de Aarón harás túnicas, les harás fajines y les harás gorros[a] para gloria y para hermosura.
  revised_footnotes:
  - marker: a
    text: O «tocas» o «coberturas para la cabeza» para el tocado sacerdotal.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base porque refleja fielmente el hebreo y el audit trail inglés. Solo se corrige la ubicación de la nota al pie para que quede anclada en 'gorros', que es el término al que pertenecen las alternativas léxicas de מִגְבָּעוֹת. También se depura la nota para evitar repetir el mismo término principal como alternativa.
