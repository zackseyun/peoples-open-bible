translation:
  language: es
  text: 'Y todo el pueblo debatía[a] en todas las tribus de Israel, diciendo: «El rey nos libró de la mano de nuestros enemigos, y él nos rescató de la mano de los filisteos; pero ahora ha huido de la tierra a causa de Absalón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba en disputa» o «estaba en contienda». El hebreo sugiere una disputa extendida entre las tribus, no una conversación casual.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָדוֹן
  english_pob_choice: were disputing
  chosen_spanish: estaba en disputa
  alternatives_spanish:
  - estaban disputando
  - estaban en disputa
  - estaban discutiendo
  lexicon: HALOT
  rationale: El participio nifal de דין expresa una situación de contienda o debate público. «Estaba en disputa» conserva la idea de conflicto generalizado sin sonar demasiado coloquial; evita suavizarlo a simple conversación.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: throughout all the tribes of Israel
  chosen_spanish: por todas las tribus de Israel
  alternatives_spanish:
  - entre todas las tribus de Israel
  - en todas las tribus de Israel
  lexicon: HALOT
  rationale: La frase señala la extensión de la disputa a lo largo de Israel. «Por todas» mantiene bien la distribución geográfica y tribal, y suena natural en español.
- source_word: הִצִּילָנוּ
  english_pob_choice: delivered us
  chosen_spanish: nos libró
  alternatives_spanish:
  - nos salvó
  - nos rescató
  lexicon: HALOT
  rationale: נצל en contexto militar-político expresa librar o sacar de peligro. «Nos libró» conserva ese matiz de liberación con buena fluidez; además evita repetir exactamente el mismo verbo de la segunda cláusula.
- source_word: מִכַּף אֹיְבֵינוּ
  english_pob_choice: from the hand of our enemies
  chosen_spanish: de la mano de nuestros enemigos
  alternatives_spanish:
  - del poder de nuestros enemigos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «de la mano» porque es transparente en español y refleja la imagen de poder o control.
- source_word: מִלְּטָנוּ
  english_pob_choice: rescued us
  chosen_spanish: nos rescató
  alternatives_spanish:
  - nos libró
  - nos sacó a salvo
  lexicon: HALOT
  rationale: Este verbo refuerza la idea de salvación efectiva, distinta del primer verbo. «Nos rescató» mantiene esa distinción y refleja bien el acto de sacar de peligro.
- source_word: מִכַּף פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de la mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  lexicon: HALOT
  rationale: Se repite el mismo modismo para conservar el paralelismo hebreo y la consistencia semántica.
- source_word: וְעַתָּה
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - ahora bien
  lexicon: HALOT
  rationale: El contexto contrapone la liberación pasada con la situación presente. «Pero ahora» expresa mejor ese contraste que un simple «y ahora».
- source_word: בָּרַח
  english_pob_choice: has fled
  chosen_spanish: ha huido
  alternatives_spanish:
  - ha escapado
  - ha fugado
  lexicon: HALOT
  rationale: El perfecto hebreo indica un estado resultante todavía vigente. «Ha huido» es natural y fiel al hecho de abandonar el territorio.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  lexicon: HALOT
  rationale: Aunque «tierra» puede sonar más amplio, aquí reproduce con fidelidad אֶרֶץ y es aceptable en español bíblico contemporáneo. Se evita estrecharlo demasiado a «país».
- source_word: מֵעַל אַבְשָׁלוֹם
  english_pob_choice: because of Absalom
  chosen_spanish: a causa de Absalón
  alternatives_spanish:
  - por Absalón
  - por causa de Absalón
  - a raíz de Absalón
  lexicon: HALOT
  rationale: La expresión es idiomática y apunta a la presión o motivo de la huida. «A causa de» comunica bien el sentido sin forzar un literalismo extraño como «de delante de Absalón».
translation_notes:
  revision_awareness: La revisión inglesa elevó «arguing» a «disputing» para un registro más formal; por eso el español evita un coloquialismo fuerte y opta por «estaba en disputa», manteniendo la idea de contienda pública generalizada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en este libro, pero este versículo no lo contiene.
  - Se conserva la imagen hebrea «de la mano» como modismo de poder/control, en paralelo con la traducción inglesa auditada.
  - «Absalón» sigue la forma española estándar del nombre propio, sin añadir interpretación al final de la cláusula.
