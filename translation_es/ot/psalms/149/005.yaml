  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura exhortativa del hebreo, la elección de חֲסִידִים como «los fieles», y el sentido básico de «sobre sus lechos». También preserva las alternativas léxicas documentadas para «en gloria/en honor» y «canten/griten de gozo».
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: «exultar» en español es menos natural que «regocijarse» en registro bíblico legible, y «canten de gozo» suena algo calcado; «canten con gozo» o «canten de alegría» sería más idiomático. Además, el orden de notas [a][c][b] sigue el inglés auditado pero es poco natural en español; conviene ordenarlas según su aparición relevante en el texto.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Los fieles» concuerda con la decisión teológica documentada para חֲסִידִים. No aparece el nombre divino en este versículo, por lo que no hay ajuste de «Yahvé».
  issues:
  - severity: medium
    issue: «Exulten» es comprensible pero poco natural en español bíblico general.
    rationale: Aunque refleja bien el inglés «exult», en español actual eclesial amplio «regocíjense» o «alégrense» suele leerse con mayor naturalidad sin perder dignidad. Conviene evitar un calco innecesario cuando el hebreo exige júbilo, no una forma cognada específica.
  - severity: low
    issue: «Canten de gozo» suena menos idiomático que alternativas naturales.
    rationale: La construcción existe, pero «canten con gozo» o «canten de alegría» fluye mejor en español neutral. Dado el paralelo poético, una formulación más natural mejora legibilidad sin perder fuerza.
  - severity: low
    issue: El orden de marcadores de nota en el texto es poco natural.
    rationale: En español conviene anclar y ordenar las notas junto a la expresión correspondiente en secuencia normal de lectura, evitando la cadena [a][c][b] heredada mecánicamente del inglés.
