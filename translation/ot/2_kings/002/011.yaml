theological_decisions:
- issue: Whether the fiery chariot itself carried Elijah or whether the whirlwind was the means of ascent
  chosen_reading: The main text states only that the chariot and horses of fire separated the two men, and that Elijah went up by the whirlwind into heaven.
  alternative_readings:
  - Elijah was taken up in the chariot of fire
  - The chariot and horses accompanied the ascent without being the vehicle
  rationale: The Hebrew distinguishes the appearance of the chariot and horses of fire from Elijah's ascent, which is explicitly linked to the whirlwind. The translation avoids importing the common but not explicit claim that Elijah rode in the chariot.
  doctrine_reference: Preserve theological tension rather than resolve it.
