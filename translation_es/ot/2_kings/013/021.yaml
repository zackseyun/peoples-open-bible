revisions:
- from: Y sucedió[a] que, mientras ellos enterraban a un hombre, he aquí vieron la banda de asalto; entonces arrojaron al hombre en la sepultura de Elías. Y cuando el hombre tocó los huesos de Elías[c][b], revivió y se puso de pie.
  to: Y sucedió[a] que, mientras ellos enterraban a un hombre, he aquí vieron la banda de salteadores; entonces arrojaron al hombre en la sepultura de Eliseo. Y cuando el hombre tocó los huesos de Eliseo[c][b], revivió y se puso de pie.
  rationale: Se corrige el error grave de nombre propio ('Elías' → 'Eliseo') para alinearlo con אֱלִישָׁע y con el POB inglés. También se mejora הַגְּדוּד a 'banda de salteadores' por mayor naturalidad y precisión contextual en español. Se conservan la estructura narrativa, la nota sobre 'tumba/sepultura' y la afirmación clara del milagro.
  reviewer_model: gpt-5.4
