    rationale: Aunque intenta preservar vaguedad, en español «artefactos» suena técnico y poco literario. El contexto paralelo con «barcos de Tarsis» favorece una referencia marítima o a embarcaciones finamente hechas, tal como indica la auditoría inglesa.
  - severity: medium
    issue: La nota al pie introduce «ídolos hermosos»
    rationale: La alternativa inglesa documentada es «beautiful images», no «ídolos». «Ídolos» añade una carga interpretativa no explícita en la evidencia fuente ni en la auditoría.
