translation:
  language: es
  text: 'La mitad de ello la quema en el fuego; sobre la otra mitad come carne: asa un asado[a] y se sacia. También se calienta y dice: «¡Ah! Ya tengo calor; he visto el fuego[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asa carne»; el hebreo usa literalmente una expresión cognada, «asa un asado».
    reason: lexical_alternative
  - marker: b
    text: O «he visto la llama». El sustantivo hebreo puede denotar fuego, llama o luz resplandeciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶצְיוֹ
  english_pob_choice: half of it
  chosen_spanish: la mitad de ello
  alternatives_spanish:
  - su mitad
  - la mitad
  lexicon: HALOT
  rationale: El sustantivo expresa la idea de 'mitad' con sufijo posesivo de 3ms. En español, 'de ello' conserva la referencia al material leñoso/ídolo sin forzar una posesión más concreta de la que el contexto exige.
- source_word: שָׂרַף
  english_pob_choice: he burns
  chosen_spanish: la quema
  alternatives_spanish:
  - la quemó
  - la incendia
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, la secuencia descriptiva funciona naturalmente en presente en español, como en el inglés auditado, para mantener el tono vivo y satírico.
- source_word: בְּמוֹ אֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - por el fuego
  lexicon: HALOT
  rationale: La preposición indica medio o ámbito. 'En el fuego' es la equivalencia más natural en español para el acto de quemar combustible.
- source_word: עַל חֶצְיוֹ
  english_pob_choice: over the other half
  chosen_spanish: sobre la otra mitad
  alternatives_spanish:
  - en la otra mitad
  - de la otra mitad
  lexicon: HALOT
  rationale: '''Sobre'' reproduce bien el valor direccional/topográfico del hebreo y, con ''la otra mitad'', explicita el contraste contextual.'
- source_word: בָּשָׂר יֹאכֵל
  english_pob_choice: he eats meat
  chosen_spanish: come carne
  alternatives_spanish:
  - come carne de animal
  - come carne para comer
  lexicon: HALOT
  rationale: בָּשָׂר aquí designa carne como alimento. 'Carne' es el equivalente directo y natural en español; evita sobreexplicar con 'carne de animal'.
- source_word: יִצְלֶה צָלִי
  english_pob_choice: he roasts a roast
  chosen_spanish: asa un asado
  alternatives_spanish:
  - tuesta un tueste
  - rostiza un rostizo
  - asa carne
  lexicon: HALOT
  rationale: La construcción verbo-sustantivo cognada se preserva con un giro idiomático que mantiene la repetición enfática sin sonar forzada. 'Asa un asado' conserva la figura y la concreción del original.
- source_word: וְיִשְׂבָּע
  english_pob_choice: and is satisfied
  chosen_spanish: y se sacia
  alternatives_spanish:
  - y queda satisfecho
  - y queda saciado
  lexicon: HALOT
  rationale: El verbo expresa quedar harto o satisfecho después de comer. 'Se sacia' es breve, natural y preserva el resultado consumado.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: La partícula añade otra acción en la secuencia; 'también' comunica bien el añadido acumulativo.
- source_word: יָחֹם
  english_pob_choice: he warms himself
  chosen_spanish: se calienta
  alternatives_spanish:
  - se caldea
  - se entibia
  lexicon: HALOT
  rationale: El contexto muestra que usa el fuego para ganar calor. 'Se calienta' es idiomático y conserva el sentido reflexivo sin añadir vocabulario innecesario.
- source_word: הֶאָח
  english_pob_choice: Aha!
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Aha!
  - ¡Ja!
  lexicon: HALOT
  rationale: Es una interjección de satisfacción. En español, '¡Ah!' comunica el tono de complacencia sin sonar artificial; '¡Aha!' queda como alternativa posible pero menos natural.
- source_word: חַמּוֹתִי
  english_pob_choice: I am warm
  chosen_spanish: estoy caliente
  alternatives_spanish:
  - estoy cálido
  - me he calentado
  - estoy tibio
  lexicon: HALOT
  rationale: El perfecto expresa un estado alcanzado. 'Estoy caliente' transmite ese estado de manera directa en español moderno; se mantiene la tensión del habla coloquial sin suavizarla.
- source_word: רָאִיתִי אוּר
  english_pob_choice: I have seen the fire
  chosen_spanish: he visto el fuego
  alternatives_spanish:
  - he visto la llama
  - he visto la luz
  - he visto el resplandor
  lexicon: HALOT
  rationale: אוּר puede significar fuego, llama o resplandor. 'Fuego' encaja mejor con el contexto inmediato y mantiene la ironía del mismo material convertido en combustible.
theological_decisions:
- issue: Conservar la sátira anti-idolátrica sin añadir explicación interpretativa
  english_pob_reading: A straightforward description of the craftsman's actions and self-satisfied speech
  chosen_spanish_reading: Una descripción directa de las acciones del artesano y de su discurso complacido
  alternative_spanish_readings:
  - Una versión más interpretativa que explicite la idolatría dentro del versículo
  - Una traducción con glosa explicativa sobre el absurdo del ídolo
  rationale: El contexto mayor es una denuncia de la idolatría, pero el versículo en sí narra el uso de la madera para combustible, comida y calor. La redacción española conserva la ironía sin introducir una explicación que el hebreo no da aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que aclaró la relación entre «come carne» y «asa un asado» con dos puntos; por eso la versión española también usa dos puntos para reflejar la especificación y no una mera acumulación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - Se conserva el paralelismo y el tono satírico mediante presente narrativo y una interjección breve.
  - Se evita «SEÑOR» porque no corresponde a este versículo y el proyecto pide no enmascarar el nombre divino sin base textual.
