translation:
  language: es
  text: 'Entonces Booz dijo a Rut: «¿No has oído, hija mía?[a] No vayas a espigar en otro campo, y tampoco te apartes de aquí[b], sino quédate cerca de mis jóvenes mujeres[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La pregunta hebrea es idiomática: funciona como una llamada de atención antes de dar una instrucción, no necesariamente como una duda sobre si Rut ha oído algo concreto.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «y tampoco salgas de este lugar».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo permite la idea de «mantenerse cerca» o «pegarse a»; se eligió «quédate cerca de» por naturalidad en español. «Mis jóvenes mujeres» hace explícito que se trata del grupo femenino de trabajo de Booz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica bien la secuencia en español sin forzar el texto.
- source_word: הֲלוֹא שָׁמַעַתְּ
  english_pob_choice: Have you not heard?
  chosen_spanish: ¿No has escuchado?
  alternatives_spanish:
  - ¿No has oído?
  - Escucha
  lexicon: HALOT
  rationale: La pregunta introductoria conserva el valor idiomático de llamar la atención de Rut antes de dar una instrucción, como reflejó la revisión inglesa.
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - hija
  lexicon: HALOT
  rationale: Mantiene el término afectivo y de asimetría relacional; en español «hija mía» suena natural y fiel al vocativo.
- source_word: אַל תֵּלְכִי לִלְקֹט
  english_pob_choice: do not go to glean
  chosen_spanish: No vayas a recoger
  alternatives_spanish:
  - No vayas a espigar
  - No vayas a recoger espigas
  lexicon: HALOT
  rationale: «Recoger» conserva la acción sin sonar arcaico; «espigar» sería más técnico, pero menos transparente para lectura amplia. Aquí el contexto agrícola permite «recoger» sin perder el sentido.
- source_word: בְּשָׂדֶה אַחֵר
  english_pob_choice: in another field
  chosen_spanish: en otro campo
  alternatives_spanish:
  - en otro terreno
  - en un campo distinto
  lexicon: HALOT
  rationale: «Campo» es el equivalente más natural y bíblicamente claro en español para el lugar de trabajo agrícola.
- source_word: וְגַם לֹא תַעֲבוּרִי מִזֶּה
  english_pob_choice: and also do not go away from here
  chosen_spanish: y tampoco te apartes de aquí
  alternatives_spanish:
  - y no te vayas de aquí tampoco
  - y no pases de aquí
  lexicon: HALOT
  rationale: La forma verbal expresa moverse/pasarse de este lugar; «te apartes de aquí» mantiene la restricción espacial y suena natural en español.
- source_word: וְכֹה תִדְבָּקִין עִם נַעֲרֹתָי
  english_pob_choice: but stay close to my young women
  chosen_spanish: sino quédate junto a mis jóvenes
  alternatives_spanish:
  - sino permanece cerca de mis jóvenes
  - sino quédate pegada a mis muchachas
  lexicon: HALOT
  rationale: «דבק» connota apego cercano; «quédate junto a» preserva la cercanía sin usar un calco demasiado duro. «Jóvenes» refleja el grupo femenino de trabajo de forma amplia y readable; «muchachas» podría sonar más coloquial o juvenil.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: sustituyó la paráfrasis tipo «Listen» por una pregunta idiomática equivalente a הֲלֹא שָׁמַעַתְּ, y mantiene la cercanía de תִדְבָּקִין עִם con una expresión española natural. No se trasladó mecánicamente el inglés; se trabajó desde el hebreo con la auditoría inglesa como control de sentido.'
  spanish_consistency_notes:
  - Se usa «Booz» para el nombre propio según ortografía española habitual.
  - Se prefirió «campo» por claridad pastoral y lectura fluida.
  - No se usó «SEÑOR» ni terminología doctrinal ajena al versículo.
  - Se evitó «espigar» para no imponer un tecnicismo innecesario, aunque se registra como alternativa válida.
