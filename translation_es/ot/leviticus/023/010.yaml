translation:
  language: es
  text: 'Habla a los hijos de Israel[a] y diles: «Cuando entren en la tierra que yo les doy, y sieguen la cosecha de la tierra, entonces traerán la gavilla[b] de las primicias de su cosecha al sacerdote».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O, «el omer de las primicias de su cosecha». El término hebreo puede designar aquí una gavilla y también funciona como término técnico «omer».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conservo el idiomático hebreo filial en español con «los hijos de Israel», que refleja el plural masculino del original y mantiene transparencia respecto de la fuente. «Los israelitas» es más natural, pero reduce la visibilidad de la fórmula hebrea.
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Si/cuando
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal en la que aplica el mandato; «Cuando» expresa mejor la relación condicional-temporal sin añadir un matiz causal ajeno.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este contexto pactal y geográfico, «la tierra» es la equivalencia natural de «the land» y preserva el sentido bíblico habitual.
- source_word: נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: yo les doy
  alternatives_spanish:
  - yo les estoy dando
  - yo daré
  lexicon: HALOT
  rationale: El participio comunica acción divina en curso o ya en marcha; en español, «les doy» mantiene esa inmediatez de forma natural sin forzar perífrasis.
- source_word: וּקְצַרְתֶּם אֶת־קְצִירָהּ
  english_pob_choice: and reap its harvest
  chosen_spanish: y sieguen su cosecha
  alternatives_spanish:
  - y cosechen su cosecha
  - y recojan su cosecha
  lexicon: HALOT
  rationale: «Sieguen» conserva el verbo agrícola de cortar/recolectar con un registro sobrio; «cosecha» refleja el sustantivo sin perder claridad. El posesivo femenino «su» remite a la tierra.
- source_word: וַהֲבֵאתֶם
  english_pob_choice: then you shall bring
  chosen_spanish: entonces traerán
  alternatives_spanish:
  - y traerán
  - y llevarán
  lexicon: HALOT
  rationale: La forma narrativa secuencial se vierte como consecuencia procedimental en español con «entonces traerán». El futuro mantiene el valor de obligación/resultante del contexto legal.
- source_word: עֹמֶר
  english_pob_choice: the sheaf
  chosen_spanish: la gavilla
  alternatives_spanish:
  - el omer
  - la gavilla/omer
  lexicon: HALOT
  rationale: En el contexto ritual agrícola, «gavilla» es el equivalente concreto y comprensible de la unidad/porción de grano cortado. Se evita «omer» en el texto principal porque aquí el referente inmediato es una ofrenda llevada físicamente.
- source_word: רֵאשִׁית
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primera parte
  - el primer fruto
  lexicon: HALOT
  rationale: «Primicias» es el término culto-agropecuario más fiel y reconocible para la primera porción ofrecida a Dios.
- source_word: קְצִירְכֶם
  english_pob_choice: your harvest
  chosen_spanish: de su cosecha
  alternatives_spanish:
  - de su siega
  - de su recolección
  lexicon: HALOT
  rationale: «Cosecha» es la forma más natural en español moderno para el campo semántico de קָצִיר. El posesivo concuerda con el referente colectivo de Israel.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-כהן
  - el ministro cultual
  lexicon: HALOT
  rationale: «Sacerdote» es la equivalencia estándar y clara en español para כֹּהֵן en legislación cultual.
theological_decisions:
- issue: Address to Israel as a masculine plural covenant people
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo usa una designación masculina plural explícita. Mantener «los hijos de Israel» conserva la forma de pacto sin neutralizarla, en coherencia con la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ritual crop term עֹמֶר
  english_pob_reading: the sheaf
  chosen_spanish_reading: la gavilla
  alternative_spanish_readings:
  - el omer
  rationale: El contexto inmediato describe un elemento agrícola que se presenta al sacerdote; por eso la lectura concreta «gavilla» expresa mejor el referente. La opción técnica «omer» se reserva como posible alternativa, pero no como texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'Se revisó la observación de validación previa y se corrigió la anclaje de notas: ahora los marcadores [a] y [b] aparecen exactamente en el texto español al final de la cláusula correspondiente. Se mantuvo la equivalencia óptima con transparencia al original, sin añadir glosas innecesarias en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «sacerdote» sobre alternativas más eclesiales para mantener el léxico cultual de la Torá.
  - «Primicias» y «gavilla» conservan el campo agrícola-ritual sin introducir tecnicismos ajenos.
