revisions:
- from: ¿Por qué se disminuiría el nombre de nuestro padre de entre su clan, porque no tiene hijo? Danos una herencia[a][b] entre los hermanos de nuestro padre.
  to: ¿Por qué quedaría disminuido el nombre de nuestro padre de entre su clan porque no tiene hijo? Danos una posesión[a][b] entre los hermanos de nuestro padre.
  rationale: Se ajustó el verbo principal para un español más natural y fiel al matiz de merma de יִגָּרַע, se eliminó una coma innecesaria, y se cambió «herencia» por «posesión» para reflejar mejor אֲחֻזָּה según la auditoría inglesa y el contexto legal-territorial.
