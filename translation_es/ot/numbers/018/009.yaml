    reason: lexical_alternative
  - marker: b
    text: '''Sin offering'' may also be rendered ''purification offering.'''
    reason: lexical_alternative
  - marker: c
    text: '''Guilt offering'' may also be rendered ''reparation offering.'''
    reason: lexical_alternative
