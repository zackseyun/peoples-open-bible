translation:
  language: es
  text: 'Los discípulos dijeron a Jesús: «Dinos cómo será nuestro fin». Él dijo: «¿Han encontrado el comienzo, entonces[a], para que busquen el fin? Porque en el lugar donde está el comienzo, allí estará el fin[b]. Bienaventurado[c] el que se pondrá de pie en el comienzo; él conocerá el fin y no gustará la muerte[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia copta de la pregunta funciona retóricamente; «entonces» conserva el tono sin sobretraducir el valor de la partícula.
    reason: lexical_alternative
  - marker: b
    text: El copto expresa de forma explícita «en el lugar donde está el comienzo, allí estará el fin»; la traducción conserva esa estructura locativa.
    reason: cultural_note
  - marker: c
    text: Literalmente, la construcción copta puede entenderse como «el que se pondrá de pie antes de él/en su presencia en el comienzo». Se conserva una formulación más transparente y menos especulativa.
    reason: source_note
  - marker: d
    text: «Gustará la muerte» reproduce el giro idiomático copto para «experimentar la muerte».
    reason: cultural_note
lexical_decisions:
- source_word: ϫⲟⲟⲥ / ϫⲱⲛⲧⲟⲥ ⲉⲣⲟⲛ
  english_pob_choice: tell us
  chosen_spanish: Dinos
  alternatives_spanish:
  - Háblanos
  - Dinos a nosotros
  lexicon: Crum; Layton
  rationale: La fórmula es una petición directa dirigida a Jesús. «Dinos» conserva el valor imperativo y la naturalidad en español, sin suavizarlo a una simple narración indirecta.
- source_word: ⲡϩⲁⲏ
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - final
  - terminación
  - consumación
  lexicon: Crum
  rationale: En español «fin» mantiene el contraste inmediato con «comienzo» y suena natural en una pregunta sobre la consumación o cierre de algo.
- source_word: ⲡⲁⲣⲭⲏ
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - origen
  lexicon: Crum
  rationale: «Comienzo» conserva el contraste semántico con «fin» y evita la posible ambigüedad filosófica de «principio» en español.
- source_word: ϭⲱⲗⲡ
  english_pob_choice: found
  chosen_spanish: han encontrado
  alternatives_spanish:
  - han hallado
  - han descubierto
  lexicon: Crum
  rationale: «Encontrado» reproduce el sentido básico de hallar/descubrir sin volverlo más interpretativo de lo que permite el texto.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁ ⲡϩⲁⲏ
  english_pob_choice: seek the end
  chosen_spanish: buscan el fin
  alternatives_spanish:
  - buscan tras el fin
  - buscan el final
  lexicon: Crum
  rationale: El giro copto es literalmente «buscar tras». En español, «buscan el fin» comunica de forma clara y directa la idea de perseguir el término final, manteniendo la fuerza retórica de la pregunta.
- source_word: ϩⲛ ⲡⲙⲁ ⲉⲧⲉⲣⲉ … ⲙⲙⲁⲩ
  english_pob_choice: in the place where … there …
  chosen_spanish: en el lugar donde … allí …
  alternatives_spanish:
  - donde … allí …
  - en el sitio donde … allí …
  lexicon: Layton
  rationale: Se preserva la estructura locativa explícita del copto con «en el lugar donde … allí …», que refleja mejor la forma del dicho que una simple traducción con «donde».
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Bendito
  - Feliz
  lexicon: Crum
  rationale: «Bienaventurado» conserva el registro bíblico tradicional para μακάριος/ⲙⲁⲕⲁⲣⲓⲟⲥ y funciona bien en un dicho sapiencial.
- source_word: ⲁⲱϩⲉ / ϩⲱϩⲉ
  english_pob_choice: stand
  chosen_spanish: se pondrá de pie
  alternatives_spanish:
  - estará de pie
  - se mantendrá firme
  - tomará su lugar
  lexicon: Crum; Layton
  rationale: El copto expresa la acción de ponerse/estar de pie; «se pondrá de pie» es una forma natural en español que conserva el gesto físico y simbólico sin forzar una equivalencia más interpretativa.
- source_word: ⲉⲣⲁⲧϥ (normalized ⲉⲣⲁⲧⲛⲧⲟϥ) ϩⲛ ⲡⲁⲣⲭⲏ
  english_pob_choice: in the beginning
  chosen_spanish: en el comienzo
  alternatives_spanish:
  - ante el comienzo
  - en presencia del comienzo
  lexicon: Crum; Layton
  rationale: 'La construcción es ambigua respecto al matiz exacto de «before it/in his presence». En español se mantiene la forma más transparente y menos especulativa: «en el comienzo», que preserva la referencia local/posicional.'
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocerá
  alternatives_spanish:
  - sabrá
  - reconocerá
  lexicon: Crum
  rationale: «Conocerá» es la opción más amplia y digna para el copto ⲥⲟⲟⲩⲛ, permitiendo el matiz de conocimiento pleno sin reducirlo a mero dato intelectual.
- source_word: ϫⲓϯⲡⲉ ⲛⲙⲟⲩ
  english_pob_choice: taste death
  chosen_spanish: gustará la muerte
  alternatives_spanish:
  - probará la muerte
  - experimentará la muerte
  lexicon: Crum; Layton
  rationale: Se conserva el giro idiomático de «gustar/probar» muerte para reflejar el valor fijo de la expresión copta y mantener el paralelismo con la tradición semítica del dicho.
- source_word: ⲁⲛⲧⲱⲧⲛ … ⲅⲁⲣ
  english_pob_choice: then (rhetorical)
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - de hecho
  lexicon: Layton
  rationale: «Entonces» transmite el carácter retórico de la pregunta sin cargar el texto con una explicación excesiva de la partícula.
theological_decisions:
- issue: Alcance de «fin/comienzo» en un dicho sapiencial de tipo gnóstico
  english_pob_reading: The line contrasts beginning and end as a rhetorical inversion, not a doctrinal definition.
  chosen_spanish_reading: El texto conserva el contraste retórico entre «comienzo» y «fin» sin convertirlo en una tesis doctrinal explícita.
  alternative_spanish_readings:
  - El texto enseña una doctrina sobre el origen y la consumación
  - El texto afirma una cosmología del principio y del final
  rationale: La evidencia del dicho apunta a una inversión sapiencial/retórica. La traducción evita introducir una interpretación doctrinal que el copto no formula directamente.
  doctrine_reference: Lectura literaria del dicho; evitar sobre-interpretación doctrinal.
- issue: «Bienaventurado» como valoración de quien permanece al comienzo
  english_pob_reading: Blessed is the one who will stand in the beginning; he will know the end, and he will not taste death.
  chosen_spanish_reading: Se mantiene «Bienaventurado» para preservar el valor de sentencia de felicidad/bendición sobre la persona que permanece o se coloca en el comienzo.
  alternative_spanish_readings:
  - Feliz el que...
  - Dichoso el que...
  rationale: No hay indicación de que el término deba rebajarse a mera suerte o emoción; la forma tradicional española comunica adecuadamente la valoración positiva del dicho.
  doctrine_reference: Uso bíblico de μακάριος / ⲙⲁⲕⲁⲣⲓⲟⲥ.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto copto normativo y el audit trail inglés sin depender mecánicamente de él. Se ha mantenido el paralelismo comienzo/fin, la estructura locativa explícita y el idiomatismo final, con una solución española más natural que la literalidad extrema.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio, en línea con la convención del proyecto.
  - Se mantiene «comienzo/fin» para preservar el paralelismo léxico central.
  - Se evita «Cristo» porque el dicho no lo emplea y no hay razón textual para introducirlo.
  - «Bienaventurado» conserva el registro sentencioso tradicional sin alterar el sentido.
  - La traducción procura ser publicable en español latinoamericano sin perder la estructura del original.
