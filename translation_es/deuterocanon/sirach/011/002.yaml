translation:
  language: es
  text: No alabes a un hombre por su apariencia[a], ni desprecies a un hombre que es feo de aspecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La primera cláusula sigue el hebreo, que dice literalmente «apariencia»; el griego paralelo usa «belleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תְּהַלֵּלו / αἰνέσῃς
  english_pob_choice: Do not praise
  chosen_spanish: No alabes
  alternatives_spanish:
  - No praises
  - No elogies
  - No exaltes
  lexicon: HALOT; LXX αἰνέω
  rationale: El hebreo en piel y el griego apoyan la idea de elogiar o alabar. «Alabes» conserva la fuerza exhortativa y suena natural en español bíblico sin volverlo arcaico.
- source_word: אָדָם / ἄνδρα
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: HALOT; BDAG
  rationale: El referente es un individuo humano concreto en masculino singular, no la humanidad en general. «Hombre» refleja la forma gramatical y el paralelo griego.
- source_word: בְּתָאֳרוֹ / ἐν κάλλει αὐτοῦ
  english_pob_choice: for his appearance
  chosen_spanish: por su apariencia
  alternatives_spanish:
  - por su belleza
  - por su forma
  lexicon: HALOT; LXX κάλλος
  rationale: El hebreo תֹּאַר apunta a la apariencia externa, mientras que el griego intensifica hacia «belleza». «Apariencia» preserva mejor la amplitud del hebreo y sigue siendo compatible con el paralelo griego.
- source_word: וְאַל תְּתַעֵב / μὴ βδέλυξῃ
  english_pob_choice: do not despise
  chosen_spanish: ni desprecies
  alternatives_spanish:
  - ni aborrezcas
  - ni te repugnes de
  lexicon: HALOT; LXX βδελύσσω
  rationale: «Despreciar» comunica rechazo fuerte sin añadir matices no presentes. Mantiene la correspondencia con el verbo hebreo de aversión y con el griego.
- source_word: מְכוֹעָר
  english_pob_choice: ugly
  chosen_spanish: feo
  alternatives_spanish:
  - de aspecto desagradable
  - antiestético
  lexicon: HALOT
  rationale: El adjetivo significa feo o poco agraciado; «feo» es la equivalencia más directa y clara en español actual.
- source_word: בְּמַרְאֵהוּ / ἐν ὁράσει αὐτοῦ
  english_pob_choice: in appearance
  chosen_spanish: en su apariencia
  alternatives_spanish:
  - en su aspecto
  - en lo que se ve de él
  lexicon: HALOT; LXX ὅρασις
  rationale: «Apariencia» reproduce el campo semántico de מַרְאֶה y del griego ὁράσις. Repetir «apariencia» en ambas mitades mantiene el paralelismo y la tensión del proverbio.
translation_notes:
  revision_awareness: El inglés POB corrigió una formulación más literal de 'in his looks' a 'in appearance' por mayor naturalidad y coherencia léxica. La versión española adopta esa misma decisión de manera más directa, manteniendo la distinción entre el hebreo más amplio y el griego más específico.
  spanish_consistency_notes:
  - Se mantiene el paralelismo con dos cláusulas negativas coordinadas por «ni».
  - «Apariencia» se usa en ambas mitades para conservar la repetición y reflejar el hebreo/griego.
  - No se suaviza «feo» a un eufemismo, porque el texto fuente conserva una valoración directa que forma parte del contraste sapiencial.
