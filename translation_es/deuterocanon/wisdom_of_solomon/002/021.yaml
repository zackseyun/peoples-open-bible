lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: LSJ
  rationale: El demostrativo está en plural y remite al razonamiento previo; «estas cosas» conserva la referencia discursiva y el número, igual que la elección inglesa.
- source_word: ἐλογίσαντο
  english_pob_choice: reasoned
  chosen_spanish: razonaron
  alternatives_spanish:
  - pensaron
  - consideraron
  - sopesaron
  lexicon: LSJ
  rationale: El verbo implica deliberación o cálculo mental; «razonaron» mantiene la fuerza cognitiva y resulta natural en español bíblico actual.
- source_word: ἐπλανήθησαν
  english_pob_choice: were led astray
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se extraviaron
  - fueron extraviados
  - anduvieron errados
  lexicon: LSJ
  rationale: El pasivo expresa entrar en error o desviación. «Se desviaron» conserva la idea de apartarse del camino correcto sin forzar una construcción demasiado mecánica en español.
- source_word: ἀπετύφλωσεν
  english_pob_choice: blinded
  chosen_spanish: los cegó
  alternatives_spanish:
  - los hizo ciegos
  - los dejó ciegos
  - los oscureció
  lexicon: LSJ
  rationale: «Cegar» reproduce la metáfora perceptiva y moral del verbo griego con la misma concisión que el inglés POB.
- source_word: ἡ κακία
  english_pob_choice: their own wickedness
  chosen_spanish: su propia maldad
  alternatives_spanish:
  - su propia perversidad
  - su maldad
  - su propia malicia
  lexicon: LSJ
  rationale: En Sabiduría, κακία designa corrupción moral; «maldad» es claro y amplio en español. Se conserva el énfasis reflexivo con «su propia».
- source_word: αὐτῶν
  english_pob_choice: their own
  chosen_spanish: su propia
  alternatives_spanish:
  - su
  - la de ellos
  lexicon: LSJ
  rationale: El posesivo enfatiza que la causa de su ceguera pertenece a ellos mismos. «Su propia» preserva ese matiz causal y reflexivo.
theological_decisions:
- issue: Causa moral de la ceguera
  english_pob_reading: their own wickedness blinded them
  chosen_spanish_reading: su propia maldad los cegó
  alternative_spanish_readings:
  - la maldad los cegó
  - su malicia los cegó
  rationale: La frase mantiene la atribución directa del efecto a la corrupción moral de los sujetos. No se introduce una causa externa ni una doctrina de endurecimiento divino, porque el griego no lo menciona aquí.
  doctrine_reference: Preservar la causalidad moral explícita del texto sin ampliar la afirmación más allá de la fuente.
