theological_decisions:
- issue: Interpretive force of שְּׁבִי in a restoration oracle
  chosen_reading: Rendered contextually as 'sit enthroned' rather than the bare literal 'sit.'
  alternative_readings:
  - sit
  - be seated
  rationale: The verse contrasts abasement in dust with restored status in Jerusalem/Zion. The broader context of Zion's vindication supports an honorific nuance. This is a contextual lexical decision, not an imported doctrinal claim, and the literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Irregular imperative/form התפתחו
  chosen_reading: Translated according to sense as a command to remove neck-bonds without overcommitting to a textual emendation.
  alternative_readings:
  - Untie yourself
  - Be loosed from the bonds of your neck
  rationale: The consonantal form is difficult, and translations vary in how explicitly they resolve it. To preserve transparency and avoid overstating certainty, the main text gives the likely sense while a footnote notes the literal/formal difficulty.
  doctrine_reference: Translation philosophy §1, §3, §5
