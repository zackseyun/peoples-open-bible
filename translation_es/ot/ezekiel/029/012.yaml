  to: Y haré la tierra de Egipto una desolación en medio de tierras desoladas[a], y sus ciudades serán una desolación en medio de ciudades arruinadas durante cuarenta años[b]; y esparciré a los egipcios entre las naciones y los dispersaré por las tierras.
  rationale: Se cambió 'estarán una desolación' por 'serán una desolación' para lograr un español natural y fiel. También se ajustó la nota b para que corresponda al hecho de que el texto español explicita 'a los egipcios', mientras el hebreo usa primero el nombre territorial y luego un plural para sus habitantes. Se prefirió 'durante cuarenta años' por fluidez natural sin alterar el sentido.
