    issue: Se omite en el texto principal el imperativo אִמְרִי
    rationale: 'Aunque el inglés POB integró «say» dentro de la pregunta citada por razones de estilo inglés, el hebreo sí contiene un segundo mandato explícito. En español, «pregunta … y diles: “¿Qué ha sucedido?”» suena natural y preserva mejor la secuencia imperativa del original.'
  revised_spanish_text: 'Párate junto al camino y vigila[a], habitante de Aroer; pregunta al que huye y a la que escapa, y diles: «¿Qué ha sucedido?»'
  revised_footnotes:
