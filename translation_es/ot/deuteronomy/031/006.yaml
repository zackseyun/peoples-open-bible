revisions:
- from: Sé fuerte[a] y valiente. No temas ni te aterrorices por causa de ellos, porque Yahvé tu Dios es el que va contigo[b]; no te faltará ni te abandonará.
  to: Sean fuertes y valientes. No teman ni se aterroricen[a] por causa de ellos, porque Yahvé su Dios es el que va con ustedes; no les fallará[b] ni los abandonará.
  rationale: 'Se corrige la 2ª persona plural para ajustarse al hebreo y al contexto colectivo. Se reubican y reescriben las notas para que correspondan a las decisiones léxicas auditadas: [a] sobre la intensificación del temor y [b] sobre יַרְפְּךָ. Se mantiene ''Yahvé'' según la norma del proyecto y se mejora la precisión de la promesa con ''no les fallará'', respaldada por nota literal.'
  reviewer_model: gpt-5.4
