review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básicos del hebreo: doble negación de tránsito humano y animal por la tierra, seguida por la deshabitación durante cuarenta años. «Pasará por ella» y «no será habitada» representan bien תַעֲבָר בָּהּ y לֹא תֵשֵׁב en contexto. Sin embargo, «pie de hombre» no preserva bien la decisión auditada de אָדָם como genérico humano en español actual, donde suena innecesariamente masculino.'
  spanish_quality_summary: 'El texto es claro y legible, pero «pie de hombre» resulta menos natural y menos fiel al valor inclusivo que «pie humano». La nota al pie también necesita ajuste idiomático en español: «No pie de hombre» es una literalidad demasiado torpe; conviene formularla como «No pasará pie de hombre ... ni pie de animal».'
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La cuestión principal es אָדָם: el expediente inglés documenta explícitamente sentido genérico de humanidad, por lo que en español conviene «humano» antes que «hombre» en el texto principal. «Animal» para בְּהֵמָה y «habitada» para לֹא תֵשֵׁב están bien alineados.'
  issues:
  - severity: medium
    issue: «pie de hombre» en el texto principal
    rationale: Aunque formalmente posible, en español contemporáneo tiende a oírse masculino-específico. El expediente inglés fundamenta que אָדָם aquí es genérico ('human foot'). «Pie humano» preserva mejor ese valor sin perder la imagen singular colectiva.
  - severity: low
    issue: Redacción de la nota literal
    rationale: «No pie de hombre ... ni pie de animal» no suena como español natural ni refleja bien que el verbo está implícito por elipsis en la glosa. Una nota más clara debe conservar la literalidad sin producir una frase agramatical.
  revised_spanish_text: No pasará por ella pie humano[a], ni pie de animal pasará por ella; y no será habitada por cuarenta años.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «No pasará pie de hombre ... ni pie de animal».'
