translation:
  language: es
  text: Porque aun si me ofrecen holocaustos y sus ofrendas de grano, no las aceptaré; y no miraré las ofrendas de paz[a] de sus animales cebados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «ofrendas de comunión»; el término hebreo designa una categoría sacrificial asociada con bienestar y comunión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For even if
  chosen_spanish: Porque aun si
  alternatives_spanish:
  - Aun si
  - Porque aunque
  lexicon: HALOT
  rationale: La combinación introduce un matiz concesivo. «Porque aun si» conserva el enlace con el contexto inmediato y la concesión, sin sonar demasiado literal en español.
- source_word: תַּעֲלוּ לִי
  english_pob_choice: you offer up to me
  chosen_spanish: me ofrecéis
  alternatives_spanish:
  - me presentáis
  - me lleváis como ofrenda
  lexicon: HALOT
  rationale: El verbo en contexto sacrificial expresa ofrecer una víctima o sacrificio. En español, «ofrecéis» comunica bien la acción cultual; se evita una perífrasis más pesada que obscurecería la lectura.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: «Holocaustos» es el término tradicional y exacto para el sacrificio totalmente consumido por el fuego. Mantiene la categoría cultual específica mejor que una generalización.
- source_word: וּמִנְחֹתֵיכֶם
  english_pob_choice: and your grain offerings
  chosen_spanish: y vuestras ofrendas de grano
  alternatives_spanish:
  - y vuestras ofrendas
  - y vuestras ofrendas de cereal
  lexicon: HALOT
  rationale: מִנְחָה en este contexto es una ofrenda vegetal/granaria. «Ofrendas de grano» es claro y fiel en español moderno.
- source_word: לֹא אֶרְצֶה
  english_pob_choice: I will not accept them
  chosen_spanish: no las aceptaré
  alternatives_spanish:
  - no me complaceré en ellas
  - no las recibiré favorablemente
  lexicon: HALOT
  rationale: El verbo indica aceptación favorable de una ofrenda. «No las aceptaré» comunica el sentido sacrificial de forma natural en español; el objeto directo femenino plural se entiende por las ofrendas mencionadas.
- source_word: וְשֶׁלֶם
  english_pob_choice: the peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - los sacrificios de paz
  lexicon: HALOT
  rationale: Se preserva la categoría sacrificial con un equivalente claro. «Ofrendas de paz» mantiene continuidad con la tradición léxica bíblica y evita ampliar el sentido más allá del texto.
- source_word: מְרִיאֵיכֶם
  english_pob_choice: of your fattened animals
  chosen_spanish: de vuestros animales cebados
  alternatives_spanish:
  - de vuestros animales engordados
  - de vuestros becerros cebados
  lexicon: HALOT
  rationale: El término designa animales engordados para sacrificio. «Cebados» es preciso y natural en español, y conserva la referencia concreta a animales preparados para la ofrenda.
- source_word: לֹא אַבִּיט
  english_pob_choice: I will not look upon
  chosen_spanish: ni miraré
  alternatives_spanish:
  - ni los consideraré
  - ni los atenderé
  lexicon: HALOT
  rationale: El verbo incluye la idea de mirar con atención o favor. «Ni miraré» preserva la imagen verbal y la negativa de prestar consideración.
theological_decisions:
- issue: Conservación de las categorías sacrificiales específicas sin convertir la denuncia en una negación genérica del culto
  english_pob_reading: 'Specific sacrificial categories are retained: ''burnt offerings,'' ''grain offerings,'' and ''peace offerings.'''
  chosen_spanish_reading: 'Se conservan categorías concretas: «holocaustos», «ofrendas de grano» y «ofrendas de paz».'
  alternative_spanish_readings:
  - «sacrificios» de forma general
  - «ofrendas» sin especificación
  rationale: El profeta no rechaza la noción de ofrenda en abstracto, sino ofertas cultuales específicas presentadas sin obediencia. Mantener las categorías evita aplanar la reprensión profética.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Este borrador sigue de cerca la lectura auditada en inglés, pero ajusta la idiomaticidad al español. No se detectaron revisiones posteriores que alteren el sentido base; se mantiene la misma estructura concesiva y las tres categorías sacrificiales. El matiz de «I will not look upon» se conserva como negativa de atención/favor.
  spanish_consistency_notes:
  - Se usa «Yahvé» en textos donde aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene el registro cultual con términos específicos, evitando generalizaciones como «sacrificios» o «ofrendas» sin calificativo.
  - «Holocaustos» se usa en su sentido bíblico de sacrificio totalmente quemado, no en su acepción moderna no religiosa.
