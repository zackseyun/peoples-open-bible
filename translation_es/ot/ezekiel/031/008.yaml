translation:
  language: es
  text: Cedros no lo eclipsaron en el jardín de Dios[a]; cipreses no se compararon con sus ramas, y plátanos[b] no fueron como sus frondas. Ningún árbol en el jardín de Dios se le comparó en su hermosura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el jardín de Dios». El hebreo dice literalmente «en el jardín de Dios», expresión que evoca Edén.
    reason: lexical_alternative
  - marker: b
    text: «Plátanos» es el sentido probable; las traducciones tradicionales suelen leer «castaños».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרָזִים
  english_pob_choice: Cedars
  chosen_spanish: Cedros
  alternatives_spanish:
  - árboles de cedro
  - cedros
  lexicon: HALOT
  rationale: El plural hebreo de אֶרֶז designa cedros; en español, «cedros» es natural, poético y fiel al paralelo arbóreo del verso.
- source_word: עֲמָמֻהוּ
  english_pob_choice: did not overshadow it
  chosen_spanish: no lo eclipsaron
  alternatives_spanish:
  - no lo cubrieron
  - no lo ocultaron
  - no lo ensombrecieron
  lexicon: HALOT
  rationale: La imagen básica es de oscurecer u obstruir visualmente. «Eclipsaron» conserva la fuerza metafórica de una sombra que no logra imponerse, sin perder la idea concreta del contraste entre árboles.
- source_word: בְּגַן אֱלֹהִים
  english_pob_choice: in the garden of God
  chosen_spanish: en el jardín de Dios
  alternatives_spanish:
  - en el jardín de Dios
  - en el huerto de Dios
  lexicon: HALOT
  rationale: Se mantiene la forma literal del hebreo. «Jardín» es claro y conserva la evocación elevada/edénica sin resolverla por adelantado en «Edén».
- source_word: בְּרוֹשִׁים
  english_pob_choice: cypresses
  chosen_spanish: cipreses
  alternatives_spanish:
  - cipreses
  - abetos
  - enebros
  lexicon: HALOT
  rationale: «Cipreses» es un equivalente moderno y digno para esta clase de árbol en listas poéticas. La incertidumbre botánica no exige una paráfrasis más general.
- source_word: דָמוּ
  english_pob_choice: did not compare with
  chosen_spanish: no se compararon con
  alternatives_spanish:
  - no fueron como
  - no se asemejaron a
  lexicon: HALOT
  rationale: El verbo expresa comparación o semejanza. En español, «no se compararon con» reproduce bien la relación de inferioridad frente al cedro principal.
- source_word: סְעַפֹּתָיו
  english_pob_choice: its boughs
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus gajos
  - sus boughs
  - sus ramas gruesas
  lexicon: HALOT
  rationale: El término alude a ramaje grande. «Ramas» es claro y digno en español; se evita un tecnicismo poco natural.
- source_word: וְעַרְמֹנִים
  english_pob_choice: plane trees
  chosen_spanish: plátanos
  alternatives_spanish:
  - plátanos de sombra
  - árboles plátano
  - castaños
  lexicon: HALOT
  rationale: La lectura moderna preferida para עַרְמֹנִים suele ser «plane trees», que en español puede expresarse con «plátanos» o «plátanos de sombra». Se evita la traducción tradicional «castaños» por no corresponder al sentido léxico preferido.
- source_word: הָי֖וּ כְּפֹארֹתָיו
  english_pob_choice: were not like its branches
  chosen_spanish: no fueron como sus ramas nuevas
  alternatives_spanish:
  - no fueron como sus frondas
  - no fueron como sus ramas
  - no fueron como su follaje
  lexicon: HALOT
  rationale: פֹארֹת puede referirse a ramaje/ramas con desarrollo frondoso. «Ramas nuevas» intenta distinguir este término de «ramas» en סְעַפֹּתָיו y conservar la idea de crecimiento y belleza vegetal.
- source_word: כָּל עֵץ
  english_pob_choice: No tree
  chosen_spanish: Ningún árbol
  alternatives_spanish:
  - No árbol alguno
  - Ningún árbol
  lexicon: HALOT
  rationale: La negación universal hebrea se vuelve idiomáticamente natural en español con «Ningún árbol».
- source_word: דָמָה אֵלָיו
  english_pob_choice: compared with it
  chosen_spanish: se le comparó
  alternatives_spanish:
  - se asemejó a él
  - fue como él
  lexicon: HALOT
  rationale: Se conserva el valor comparativo de דמה con una construcción española fluida y fiel.
- source_word: בְּיָפְיוֹ
  english_pob_choice: in its beauty
  chosen_spanish: en su hermosura
  alternatives_spanish:
  - en su belleza
  - por su hermosura
  lexicon: HALOT
  rationale: «Hermosura» mantiene el registro poético y comunica bien el ámbito de comparación del hebreo, sin debilitar el sentido estético del verso.
theological_decisions:
- issue: Alcance de «el jardín de Dios»
  english_pob_reading: Rendered literally as 'the garden of God' without specifying Eden in the main text.
  chosen_spanish_reading: Se conserva «el jardín de Dios» en el texto principal.
  alternative_spanish_readings:
  - «el jardín de Dios» entendido como Edén
  - «el paraíso de Dios»
  rationale: El hebreo dice literalmente «jardín de Dios». Mantener esa forma preserva la imagen profética y la tensión evocadora hacia Edén sin cerrarla interpretativamente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directo y coincide sustancialmente con la evaluación inglesa revisada como sin cambios necesarios; se preserva la imagen comparativa de los árboles y la literalidad de «jardín de Dios», mientras se adapta el léxico arbóreo a español natural.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, coherente con el estándar del proyecto.
  - Se mantiene la diferencia entre verbos de comparación («compararon», «se le comparó») para reflejar דמה.
  - Se evita «SEÑOR» porque aquí el texto fuente no usa el Tetragrámaton, sino אֱלֹהִים.
  - «Cedros», «cipreses» y «plátanos» conservan la serie poética de especies arbóreas del hebreo.
