translation:
  language: es
  text: Y ningún forastero[a] ni extranjero habitará como forastero entre ellos nunca más; juzgará a pueblos y naciones con la sabiduría de su rectitud[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjero residente»; el griego πάροικος se refiere a alguien que vive entre un pueblo sin pertenecer plenamente a él.
    reason: lexical_alternative
  - marker: b
    text: O «justicia».
    reason: lexical_alternative
  - marker: c
    text: «Selah» probablemente señala una pausa litúrgica o musical; su fuerza precisa es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: πάροικος
  english_pob_choice: sojourner
  chosen_spanish: sojourner
  alternatives_spanish:
  - extranjero residente
  - forastero
  lexicon: LSJ
  rationale: El griego designa a alguien que habita entre otros sin pertenencia nativa plena. En español, «sojourner» conserva mejor el matiz poético y de residencia temporal que una paráfrasis administrativa.
- source_word: ἀλλογενής
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - de otra nación
  lexicon: LSJ
  rationale: Ἀλλογενής destaca el origen ajeno o no perteneciente al grupo. «Extranjero» es la equivalencia más clara y natural en español y mantiene la distinción con πάροικος.
- source_word: παροικήσει
  english_pob_choice: shall sojourn among them
  chosen_spanish: sojournará entre ellos
  alternatives_spanish:
  - habitará entre ellos
  - residirá entre ellos
  lexicon: LSJ
  rationale: El verbo comparte la raíz con πάροικος y conviene conservar esa relación semántica en la traducción. «Sojournará» reproduce la idea de residir como no nativo.
- source_word: λαοὺς
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - los pueblos
  lexicon: LSJ
  rationale: «Pueblos» preserva el sentido colectivo plural y permite diferenciarlo de ἔθνη en la cláusula paralela.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - las gentiles
  - los pueblos
  lexicon: LSJ
  rationale: «Naciones» es el equivalente español más natural aquí y mantiene la pareja «pueblos y naciones» sin borrar la distinción semántica.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - discernimiento
  lexicon: LSJ
  rationale: El término se refiere a juicio sapiente o discernimiento. «Sabiduría» es la opción más natural y fiel en este contexto real-judicial.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: LSJ
  rationale: Aunque el POB inglés privilegia «righteousness», en español «justicia» expresa mejor el matiz judicial del contexto y evita una formulación rígida. Se conserva la conexión entre sabiduría y justicia como cualidad del juicio.
- source_word: διάψαλμα
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: LSJ
  rationale: Se conserva el marcador tradicional sin explicitar su función exacta, que sigue siendo incierta; así se respeta su valor litúrgico o musical.
theological_decisions:
- issue: δικαιοσύνη en contexto de juicio real
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su justicia
  rationale: El contexto habla de juzgar a pueblos y naciones, por lo que «justicia» comunica de forma más directa la dimensión judicial del texto. No se pierde el trasfondo moral, pero en español este valor se percibe con naturalidad en la frase.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness'
- issue: Preservación del par conceptual πάροικος / παροικήσει
  english_pob_reading: sojourner / shall sojourn
  chosen_spanish_reading: sojourner / sojournará
  alternative_spanish_readings:
  - extranjero residente / residirá
  - forastero / habitará
  rationale: Mantener la misma raíz verbal en español ayuda a transparentar la relación léxica del griego y reproduce el efecto retórico de exclusión de los no nativos.
  doctrine_reference: LSJ semantic correspondence; POB revision notes
translation_notes:
  revision_awareness: La revisión más reciente corrigió la duplicación accidental de la cláusula final y confirmó la lectura completa y única del versículo. También avala la preferencia por «sojourner» sobre una equivalencia burocrática más pesada, para conservar el registro poético y la relación cognada con παροικήσει.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con sintaxis natural en español.
  - Se preservó la distinción entre «pueblos» y «naciones».
  - Se optó por «justicia» en el verso principal por fluidez contextual, aunque el inglés POB documenta «righteousness» como lectura principal; la nota teológica deja constancia de la alternativa.
  - 'Los marcadores de nota aparecen exactamente en el texto: [a], [b] y [c].'
