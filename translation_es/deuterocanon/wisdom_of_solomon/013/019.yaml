base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/013/019.yaml
  text: But concerning provision and work and success of his hands[b][a], he asks strength from that thing most inactive with his hands.
  footnotes:
  - marker: a
    text: Or 'the most lifeless thing' or 'what is utterly inert.' The Greek superlative stresses the idol's complete inability to act.
    reason: lexical_alternative
  - marker: b
    text: Literally 'success of hands,' meaning success in what one does or makes.
    reason: lexical_alternative
