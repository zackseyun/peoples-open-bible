review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo breve y respeta la revisión inglesa final al no incluir la expansión griega sobre nacimiento y sepultura en el texto principal. Sin embargo, se aparta del sentido auditado en un punto importante: el inglés POB eligió ''heavy burden'' a partir del hebreo elíptico, dejando ''heavy yoke'' como alternativa en nota. El español principal puso ''yugo pesado'', invirtiendo esa decisión y trasladando al texto principal una precisión metafórica que el audit trail reservó para nota.'
  spanish_quality_summary: La redacción es clara y legible, pero 'Gran fatiga ha sido asignada' suena algo rígido; 'se le ha asignado' no encaja por concordancia, así que conviene mantener una formulación impersonal sencilla. 'Gran fatiga es asignada' sería menos natural; 'Gran fatiga ha sido asignada' es aceptable. El ajuste clave es reemplazar 'yugo pesado' por 'carga pesada', que suena natural y sigue mejor la decisión documentada. 'Hijos de Adán' es comprensible y preserva la resonancia antropológica del original.
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos aquí. La elección ''hijos de Adán'' está bien justificada para בני אדם / υἱοὶ Ἀδάμ. El problema principal es de alineación con la decisión léxica auditada: ''heavy burden'' debe reflejarse como ''carga pesada'' en el texto principal, dejando ''yugo pesado'' en nota como alternativa del griego.'
  issues:
  - severity: high
    issue: El texto principal usa 'yugo pesado' en vez de 'carga pesada'.
    rationale: La auditoría inglesa decidió explícitamente 'heavy burden' para el texto principal y reservó 'heavy yoke' al pie de nota, porque el hebreo es más breve/elíptico y no obliga a imponer la metáfora exacta del griego en la línea principal. El borrador español revierte esa decisión.
  - severity: medium
    issue: La nota [b] justifica la elección incorrecta del texto principal.
    rationale: La nota actual dice que se eligió 'yugo' por mayor correspondencia con el paralelo griego. Pero el estado auditado final escogió precisamente no llevar esa correspondencia al texto principal. La nota debe presentar 'yugo' como alternativa griega, no como elección principal.
  - severity: low
    issue: 'La nota [a] contiene un calco extraño: ''allotada''.'
    rationale: Aunque aparece entre comillas explicativas, 'allotada' no es español natural. Conviene reformular la explicación usando solo 'asignada' o 'adjudicada'.
  revised_spanish_text: Gran fatiga ha sido asignada[a], y una carga pesada[b] está sobre los hijos de Adán.
  revised_footnotes:
  - marker: a
    text: «Ha sido asignada» refleja el sentido del hebreo חלק אל como una porción o suerte adjudicada. El griego paralelo dice literalmente «ha sido creada para todo ser humano», pero la versión española sigue la formulación más sobria del hebreo y deja abierta la fuente de esa asignación.
    reason: lexical_alternative
  - marker: b
    text: El griego paralelo dice literalmente «un yugo pesado» (ζυγὸς βαρύς). El hebreo aquí es más breve; por eso se traduce en el texto principal como «carga pesada», preservando el sentido sin imponer la metáfora exacta del paralelo griego.
    reason: lexical_alternative
