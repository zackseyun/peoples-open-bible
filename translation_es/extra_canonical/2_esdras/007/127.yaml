    unchanged: false
    changes_summary: Replaced 'meaning' with 'thought' to reflect cogitamentum more literally; rendered certavit as 'has fought' rather than 'must fight' to match the past tense; added 'the' before 'man' and 'on the earth' for closer correspondence to the Latin.
translation:
  language: es
  text: 'Y respondió y dijo: «Este es el pensamiento de la lucha que el ser humano nacido sobre la tierra ha librado:'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: hoc est cogitamentum
  english_pob_choice: This is the thought
  chosen_spanish: Este es el pensamiento
  alternatives_spanish:
  - Esta es la idea
  - Esta es la reflexión
  lexicon: cogitamentum
  rationale: cogitamentum apunta aquí a una noción mental concreta; «pensamiento» conserva mejor la literalidad que «sentido» o «significado», y evita suavizar el término más de lo que el latín permite.
- source_word: certaminis
  english_pob_choice: of the struggle
  chosen_spanish: de la lucha
  alternatives_spanish:
  - del combate
  - de la contienda
  lexicon: certamen
  rationale: «Lucha» comunica bien el conflicto activo y mantiene el tono apocalíptico; «combate» o «contienda» serían posibles, pero suenan más marcados o menos naturales en este contexto.
- source_word: qui super terram natus est homo
  english_pob_choice: the man born on the earth
  chosen_spanish: el hombre nacido sobre la tierra
  alternatives_spanish:
  - la persona nacida sobre la tierra
  - el ser humano nacido sobre la tierra
  lexicon: homo
  rationale: Se conserva el valor genérico de homo, según la revisión auditada, con «el hombre» como sustantivo inclusivo de la humanidad en español bíblico; «la persona» o «ser humano» explicitan más, pero alteran el tono y la cadencia del original.
theological_decisions:
- issue: Alcance genérico de homo
  english_pob_reading: the man born on the earth
  chosen_spanish_reading: el hombre nacido sobre la tierra
  alternative_spanish_readings:
  - la persona nacida sobre la tierra
  - el ser humano nacido sobre la tierra
  rationale: La revisión textual indica que homo es genérico, no un individuo específico. Por eso el español evita una lectura particularizante y conserva una formulación general sobre la condición humana.
  doctrine_reference: Antropología bíblica; universalidad de la condición humana en el sufrimiento y la lucha.
translation_notes:
  revision_awareness: La versión revisada cambió el valor de certavit de futuro/obligación a pasado perfecto, y también aclaró que homo es genérico; el español sigue esa revisión con «ha librado» y mantiene una nota alternativa para la lectura obligativa anterior.
  spanish_consistency_notes:
  - Se mantiene la sintaxis narrativa con «Y respondió y dijo» para reflejar el giro introductorio del latín.
  - «Sobre la tierra» reproduce super terram sin convertirlo en una glosa teológica.
  - La nota [a] está anclada en el verbo de la lucha para permitir la lectura alternativa documentada sin introducir una nueva ambigüedad textual.
