translation:
  language: es
  text: 'Habla a Roboam, hijo de Salomón[a], rey de Judá, y a todo Israel en Judá y en Benjamín, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Di a Roboam, hijo de Salomón, rey de Judá, y a todo Israel en Judá y en Benjamín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  lexicon: HALOT
  rationale: El imperativo introduce una orden profética/directiva. «Habla» conserva el tono de mandato dirigido a un mensajero y suena natural en español bíblico contemporáneo; «Di» también es posible, pero enfatiza más el acto de decir que el de hablar como comisión.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del mensaje. En español, «a» reproduce de manera directa la relación de адресación.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: HALOT
  rationale: Se usa la forma española bíblica asentada «Roboam», más natural y reconocible en español que la transliteración inglesa «Rehoboam».
- source_word: בֶּן שְׁלֹמֹה
  english_pob_choice: son of Solomon
  chosen_spanish: hijo de Salomón
  alternatives_spanish:
  - el hijo de Salomón
  lexicon: HALOT
  rationale: La construcción de parentesco se vierte de forma directa y fiel. Se omite el artículo por ser innecesario en español y porque el hebreo también funciona como identificación en constructo.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: Título real en aposición con el nombre. En español, la forma sin artículo es idiomática y conserva la función identificadora del hebreo.
- source_word: וְאֶל כָּל יִשְׂרָאֵל
  english_pob_choice: and to all Israel
  chosen_spanish: y a todo Israel
  alternatives_spanish:
  - y a todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene «Israel» como designación nacional/covenantal, tal como en la POB inglesa, en vez de sustituirlo por «israelitas», que suavizaría la categoría colectiva del texto.
- source_word: בִּיהוּדָה וּבִנְיָמִן
  english_pob_choice: in Judah and Benjamin
  chosen_spanish: en Judá y en Benjamín
  alternatives_spanish:
  - de Judá y Benjamín
  lexicon: HALOT
  rationale: 'El ב locativo indica ubicación: los destinatarios están dentro de esos territorios. «En» preserva mejor la sintaxis hebrea y evita leer la frase como mera pertenencia tribal.'
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y diciendo:'
  lexicon: HALOT
  rationale: El infinitivo introduce la continuación del discurso. «Diciendo:» mantiene la conexión con la cita siguiente y la puntuación natural del español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el hebreo masorético y la línea de decisión de la POB inglesa, que prefirió una traducción natural pero auditada. No se detectaron revisiones textuales ni variantes que alteren el sentido; el único margen relevante es el valor estilístico de אֱמֹר («Habla»/«Di»).
  spanish_consistency_notes:
  - Se mantiene «Judá» y «Benjamín» como nombres territoriales propios, no como gentilicios.
  - Se conserva «Israel» como nombre colectivo, coherente con la decisión inglesa y con el contexto de los destinatarios.
  - El marcador de nota [a] está anclado en el nombre «Salomón» para señalar la alternativa verbal del incipit, siguiendo el patrón del audit trail inglés.
