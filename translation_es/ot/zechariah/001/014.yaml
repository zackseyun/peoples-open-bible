translation:
  language: es
  text: 'Entonces el ángel que hablaba conmigo me dijo[a]: «Proclama, diciendo: “Así dice Yahvé de los ejércitos: Estoy muy celoso por Jerusalén y por Sion”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estoy lleno de celo por Jerusalén y por Sion con gran celo». El hebreo usa la misma raíz dos veces para intensificar la afirmación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ הַדֹּבֵר בִּי
  english_pob_choice: the angel who was speaking with me
  chosen_spanish: el ángel que hablaba conmigo
  alternatives_spanish:
  - el ángel que hablaba en mí
  - el ángel que me hablaba
  lexicon: HALOT
  rationale: En este contexto zacariano, la expresión indica interlocución continua con el profeta, no habla interior literal. «Hablaba conmigo» conserva el valor relacional del participio y suena natural en español.
- source_word: קְרָא לֵאמֹר
  english_pob_choice: Proclaim, saying
  chosen_spanish: Proclama, diciendo
  alternatives_spanish:
  - Clama, diciendo
  - Anuncia, diciendo
  lexicon: HALOT
  rationale: El imperativo profético pide una proclamación pública. «Proclama» conserva mejor la fuerza heraldica que una traducción meramente literal como «clama».
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» mantiene el tono formal y directo del hebreo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se sigue el uso del proyecto para יהוה como «Yahvé». «De los ejércitos» preserva la imagen militar/cósmica de צְבָאוֹת sin sustituirla por una equivalencia interpretativa.
- source_word: קִנֵּאתִי
  english_pob_choice: I am exceedingly jealous
  chosen_spanish: Estoy muy celoso
  alternatives_spanish:
  - Estoy ardientemente celoso
  - Siento gran celo
  lexicon: HALOT
  rationale: «Celoso» conserva la tensión lexical y teológica del hebreo. Se mantiene en presente declarativo, como en el inglés POB, para reflejar la proclamación profética, evitando suavizarlo únicamente como «celo».
- source_word: לִירוּשָׁלִַם וּלְצִיּוֹן
  english_pob_choice: for Jerusalem and for Zion
  chosen_spanish: por Jerusalén y por Sion
  alternatives_spanish:
  - para Jerusalén y para Sion
  - contra Jerusalén y contra Sion
  lexicon: HALOT
  rationale: El hebreo expresa el objeto del celo/jelousía divina. En español «por» comunica adecuadamente esa relación afectiva y covenantal; se conserva la repetición para reflejar la doble preposición.
- source_word: קִנְאָה גְדוֹלָה
  english_pob_choice: exceedingly
  chosen_spanish: muy
  alternatives_spanish:
  - con gran celo
  - ardientemente
  lexicon: HALOT
  rationale: El sustantivo cognado intensifica el verbo anterior. «Muy» permite un español fluido sin perder el énfasis; la alternativa literal se reserva para nota por su posible valor interpretativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrama. «Yahvé» preserva la distinción del nombre divino sin ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje de קנא / קנאה aplicado a Dios
  english_pob_reading: jealous / exceedingly jealous
  chosen_spanish_reading: celoso / muy celoso
  alternative_spanish_readings:
  - celoso con gran celo
  - ardiente de celo
  rationale: 'Se conserva la tensión teológica del texto: el hebreo habla de celo/celos divinos de manera explícita. «Celoso» evita diluir el término y mantiene la correspondencia con el sustantivo cognado.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; este borrador mantiene la estructura, el registro profético y la decisión lexical principal sobre קנא/קנאה, preservando la tensión del original hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se prefiere «Sion» sin tilde en el cuerpo bíblico como forma consagrada en uso hispano bíblico; la ortografía moderna permite «Sion» en contexto bíblico.
  - Se evita «SEÑOR» para no ocultar el nombre divino en esta traducción base.
  - «Celoso» se usa de modo teológico, no con sentido humano peyorativo, para reflejar el lenguaje del texto fuente.
