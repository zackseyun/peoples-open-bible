translation:
  language: es
  text: Tomará[a] a sus esclavos varones, a sus esclavas, a sus mejores hombres jóvenes y a sus asnos, y los usará para su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''se llevará a sus esclavos varones''. El hebreo también puede significar ''siervos'', pero el contexto de exacción real favorece ''esclavos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵיכֶם
  english_pob_choice: your male slaves
  chosen_spanish: sus esclavos varones
  alternatives_spanish:
  - sus siervos
  - sus servidores varones
  lexicon: HALOT
  rationale: En este contexto de exacción real coercitiva, עֶבֶד conserva la fuerza de esclavitud más que la de simple servicio. 'Esclavos varones' mantiene el contraste de género con las esclavas y evita suavizar el término.
- source_word: שִׁפְחוֹתֵיכֶם
  english_pob_choice: your female slaves
  chosen_spanish: sus esclavas
  alternatives_spanish:
  - sus criadas
  - sus sirvientas
  lexicon: HALOT
  rationale: שִׁפְחָה designa a una esclava o sierva dependiente; aquí el paralelo con עַבְדֵיכֶם favorece 'esclavas'. 'Criadas' o 'sirvientas' debilitarían la carga coercitiva del pasaje.
- source_word: בַּחוּרֵיכֶם הַטּוֹבִים
  english_pob_choice: your best young men
  chosen_spanish: sus mejores jóvenes
  alternatives_spanish:
  - sus mejores muchachos
  - sus jóvenes más selectos
  - sus mejores hombres jóvenes
  lexicon: HALOT
  rationale: בָּחוּר alude a un joven en la fuerza de su vida, y הַטּוֹבִים añade la idea de los mejores o más valiosos. 'Mejores jóvenes' conserva edad y calidad sin cargar el español con una estructura demasiado pesada.
- source_word: חֲמוֹרֵיכֶם
  english_pob_choice: your donkeys
  chosen_spanish: sus asnos
  alternatives_spanish:
  - sus burros
  - sus mulas
  lexicon: HALOT
  rationale: '''Asnos'' es un equivalente natural en español bíblico y cubre el sentido de חֲמוֹרִים sin introducir una especie distinta. Es más digno y preciso que opciones coloquiales.'
- source_word: יִקָּח
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - se llevará
  - agarrará
  lexicon: HALOT
  rationale: El imperfecto profético expresa la acción futura del rey. 'Tomará' reproduce bien el valor verbal general de לָקַח sin añadir matices no presentes en el hebreo.
- source_word: וְעָשָׂה לִמְלַאכְתּוֹ
  english_pob_choice: and use them for his work
  chosen_spanish: y los empleará para su obra
  alternatives_spanish:
  - y los pondrá a su obra
  - y los usará para su trabajo
  - y los hará trabajar para él
  lexicon: HALOT
  rationale: La frase hebrea significa que el rey los destinará a su labor o servicio. 'Empleará' conserva la apropiación de personas y animales para tareas reales, y 'obra' permite una formulación digna y bíblica en español.
theological_decisions:
- issue: La fuerza coercitiva del verbo de toma en una advertencia sobre la monarquía
  english_pob_reading: He will take ... and use them for his work.
  chosen_spanish_reading: Tomará ... y los empleará para su obra.
  alternative_spanish_readings:
  - Se llevará ... y los usará para su trabajo
  - Tomará ... y los pondrá a su servicio
  rationale: El contexto describe la apropiación real de personas y bienes; no es una simple contratación. 'Tomará' y 'empleará' preservan la coerción sin exagerar más allá del hebreo.
  doctrine_reference: 1 Samuel 8:11-18; la advertencia sobre la demanda de un rey
- issue: ¿Traducir עבד/שפחה como 'siervo/sierva' o como 'esclavo/esclava'?
  english_pob_reading: your male slaves ... your female slaves
  chosen_spanish_reading: sus esclavos varones ... sus esclavas
  alternative_spanish_readings:
  - sus siervos varones ... sus siervas
  - sus servidores ... sus criadas
  rationale: La POB inglesa optó por 'slaves' por la fuerza lexical y el contexto de saqueo laboral. En español, 'esclavos' conserva mejor esa tensión y evita una eufemización devocional.
  doctrine_reference: Uso léxico contextual en pasajes de servidumbre forzada
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió 'use them for his work' por naturalidad. En español se optó por una equivalencia igualmente natural, 'los empleará para su obra', manteniendo la idea de asignación laboral coercitiva sin calco duro.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' y 'Mesías' según las normas del proyecto; este versículo no requiere esas decisiones.
  - Se preserva el contraste de género en 'esclavos varones' y 'esclavas', siguiendo la distinción léxica del hebreo.
  - '''Asnos'' se eligió como término bíblico claro y moderno en español, sin recurrir a ''burros'' por registro.'
  - '''Obra'' funciona aquí como equivalente digno de ''work'' en una frase de servicio impuesto; no se entiende como ''obra'' en sentido meramente abstracto.'
