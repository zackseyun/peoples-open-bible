translation:
  language: es
  text: Porque no fue por mi propio favor[a], sino por la voluntad del Dios de ustedes. Por tanto, bendíganlo para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gracia'. El griego χάρις puede significar 'gracia' o 'favor'; aquí probablemente alude a la iniciativa o beneficencia propia de Rafael.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - bondad
  lexicon: BDAG
  rationale: El griego χάρις puede significar 'gracia' o 'favor'. En español, 'gracia' conserva mejor la amplitud semántica y permite reflejar la tensión lexical documentada sin cerrar el sentido a una idea meramente devocional. El contexto narrativo sugiere que Rafael niega mérito o iniciativa propia, pero no conviene borrar la posibilidad de 'gracia' atestiguada por el original.
- source_word: θελήσει
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - querer
  - propósito
  lexicon: BDAG
  rationale: θέλημα / θέλησις expresa voluntad o intención. 'Voluntad' es la correspondencia más natural y fiel en español en la construcción causal 'por la voluntad de...'.
- source_word: τοῦ θεοῦ ὑμῶν
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ustedes
  - su Dios
  lexicon: BDAG
  rationale: El griego usa posesivo de segunda persona plural. En español, dentro de un registro bíblico reverente, 'su Dios' puede comunicar el mismo vínculo sin forzar una forma demasiado coloquial; la referencia queda clara por el contexto y por la dirección al destinatario.
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: La partícula introduce conclusión lógica. 'Por tanto' preserva el valor inferencial y mantiene un tono bíblico sobrio.
- source_word: εὐλογεῖτε
  english_pob_choice: bless
  chosen_spanish: bendíganlo
  alternatives_spanish:
  - alábenlo
  - bendigan a él
  lexicon: BDAG
  rationale: El imperativo se dirige a la alabanza dirigida a Dios. 'Bendíganlo' conserva el verbo bíblico tradicional y la fuerza exhortativa del plural.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: BDAG
  rationale: La expresión idiomática indica duración indefinida y continua. 'Para siempre' es la equivalencia idiomática más natural y fiel en español moderno.
- source_word: ἐμαυτοῦ
  english_pob_choice: my own
  chosen_spanish: mi propia
  alternatives_spanish:
  - de mí mismo
  - por mí mismo
  lexicon: BDAG
  rationale: El reflexivo intensifica la negación de agencia o mérito personal. 'Mi propia' reproduce esa intensificación de modo natural en español.
theological_decisions:
- issue: Sentido de χάρις en la negativa de Rafael
  english_pob_reading: Raphael says his appearance/help was not due to his own favor or initiative, but to God's will.
  chosen_spanish_reading: Rafael dice que no actuó por su propia gracia, sino por la voluntad de Dios.
  alternative_spanish_readings:
  - no fue por su propio favor, sino por la voluntad de Dios
  - no fue por su propia gracia, sino por el querer de Dios
  rationale: La escena es narrativa y de agencia delegada; el énfasis recae en que Rafael no se atribuye la acción a sí mismo. 'Gracia' mantiene abierta la polisemia del griego y evita reducir el término a una sola matización interpretativa. A la vez, la formulación no borra la tensión entre 'gracia' y 'favor' que el original permite.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alta concordancia y no muestran revisiones aplicadas. La versión española sigue esa estabilidad: conserva la estructura causal y exhortativa del original, y mantiene abierta la polisemia de χάρις sin resolverla artificialmente.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'voluntad' para θέλησις, de acuerdo con el paquete fuente.
  - Se evita 'SEÑOR' porque aquí no aparece el tetragrámaton ni una cita explícita de κύριος que lo exija.
  - Se conserva el imperativo plural 'bendíganlo' para reflejar εὐλογεῖτε.
  - La nota [a] se ancla solo en 'gracia', donde existe la alternativa lexical documentada.
