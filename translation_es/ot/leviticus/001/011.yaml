review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia ritual del hebreo: degüello del animal, ubicación al lado norte del altar, fórmula cultual delante de Yahvé, y acción sacerdotal de arrojar la sangre alrededor del altar. También mantiene correctamente יְהוָה como Yahvé. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece tras «Yahvé», pero la nota explica וְזָרְקוּ / la acción de arrojar la sangre. Además, «sobre el lado norte del altar» suena menos natural que «en el lado norte del altar» o «en el costado norte del altar», y «contra el altar, alrededor» puede pulirse a «contra el altar por todos sus lados» para reflejar mejor סָבִיב.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay pequeños problemas de naturalidad y de puntuación/flujo. «Lo degollará» es fiel al valor sacrificial de שׁחט, aunque algo más gráfico que necesario; sigue siendo aceptable. El principal problema de calidad es la colocación incorrecta de la nota y una leve rigidez en «sobre el lado norte del altar». La frase final mejora en fluidez con «por todos sus lados».
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con otros términos clave. La elección «degollará» para שׁחט es defendible y más específica que «matará». «Arrojarán» refleja bien זרק y evita el debilitamiento de «rociarán».'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «Yahvé», pero su contenido explica «arrojarán su sangre».
    rationale: Esto crea una falsa asociación exegética y rompe la disciplina requerida de anclar cada nota exactamente en la palabra o frase pertinente del texto.
  - severity: medium
    issue: «sobre el lado norte del altar» suena poco natural en español.
    rationale: El hebreo expresa ubicación en el costado/lado norte del altar; en español idiomático culto, «en el lado norte del altar» o «en el costado norte del altar» comunican mejor la localización.
  - severity: low
    issue: «contra el altar, alrededor» es comprensible pero algo forzado.
    rationale: «Alrededor» queda algo suelto; «por todos sus lados» o «todo alrededor» refleja mejor סָבִיב y suena más natural.
  revised_spanish_text: Y lo degollará en el lado norte del altar, delante de Yahvé; y los hijos de Aarón, los sacerdotes, arrojarán[a] su sangre contra el altar por todos sus lados.
  revised_footnotes:
  - marker: a
    text: O «la arrojarán con fuerza contra el altar por todos sus lados». El verbo hebreo sugiere una acción enérgica de lanzar la sangre, no un rociado leve.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al verbo «arrojarán» para que coincida con la decisión léxica documentada sobre וְזָרְקוּ. Se mejora la naturalidad de la frase locativa con «en el lado norte del altar» y se ajusta «alrededor» a «por todos sus lados» para expresar mejor סָבִיב en español claro y culto, sin alterar el sentido ritual del original.
