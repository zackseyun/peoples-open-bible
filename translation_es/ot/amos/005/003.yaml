translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: La ciudad que sale con mil tendrá[a] cien restantes, y la que sale con cien tendrá diez restantes, para la casa de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que sale mil fuerte... que sale cien fuerte». El hebreo dice literalmente «sale»; probablemente se refiere a salir para batalla, por lo que también puede entenderse «marcha» o «sale a combate».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For thus says
  chosen_spanish: Porque así dice
  alternatives_spanish:
  - Porque así ha dicho
  - Pues así dice
  lexicon: HALOT
  rationale: La fórmula profética introductoria se conserva con valor discursivo y causal. «Porque así dice» suena natural en español y mantiene el presente profético del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se preservan ambos elementos del título: el nombre divino יְהוָה se vierte como «Yahvé», y אֲדֹנָי como «el Señor». Se evita «SEÑOR» como máscara tipográfica para no borrar el nombre propio revelado.'
- source_word: הָעִיר
  english_pob_choice: The city
  chosen_spanish: La ciudad
  alternatives_spanish:
  - Una ciudad
  - La urbe
  lexicon: HALOT
  rationale: El artículo hebreo hace al sustantivo definido. «Ciudad» es la equivalencia directa y clara en el contexto militar/profético.
- source_word: הַיֹּצֵאת
  english_pob_choice: that goes out / marches out
  chosen_spanish: que sale
  alternatives_spanish:
  - que marcha
  - que sale a combate
  lexicon: HALOT
  rationale: El participio femenino singular concuerda con «la ciudad». En español, «sale» conserva el verbo básico sin forzar una paráfrasis; el matiz militar queda disponible por el contexto de contingente numerado.
- source_word: אֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: con mil
  alternatives_spanish:
  - mil
  - que va con mil
  lexicon: HALOT
  rationale: «Con mil» expresa con naturalidad que la ciudad sale acompañada por un contingente de mil. Mantiene el sentido de tamaño de fuerza sin añadir elementos ajenos.
- source_word: תַּשְׁאִיר
  english_pob_choice: will have ... left
  chosen_spanish: dejará
  alternatives_spanish:
  - dejará como resto
  - hará quedar
  lexicon: HALOT
  rationale: El hiphil de שׁאר implica dejar/quedar. En español, «dejará» permite una construcción fluida con el objeto explícito («cien», «diez») y conserva la idea de remanente.
- source_word: מֵאָה
  english_pob_choice: a hundred
  chosen_spanish: cien
  alternatives_spanish:
  - ciento
  lexicon: HALOT
  rationale: Número cardinal estándar; en esta posición, «cien» es la forma natural en español.
- source_word: וְהַיֹּצֵאת מֵאָה
  english_pob_choice: and the one that goes out a hundred
  chosen_spanish: y la que sale con cien
  alternatives_spanish:
  - y la ciudad que sale con cien
  - y la que va con cien
  lexicon: HALOT
  rationale: El hebreo omite repetir «ciudad»; se suplió con «la que» para mantener la referencia femenina sin recargar la frase. «Con cien» conserva el paralelismo numérico.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez hombres
  - diez personas
  lexicon: HALOT
  rationale: Número cardinal estándar; se mantiene la sobriedad del hebreo sin explicitar el tipo de remanente.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - en relación con la casa de Israel
  lexicon: HALOT
  rationale: La preposición ל permite relación o referencia. «Para» comunica el alcance/resultado sobre Israel como entidad pactual nacional, sin sustituir «casa de Israel» por un término más genérico.
theological_decisions:
- issue: Forma de traducir el nombre divino יהוה en combinación con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: 'El proyecto pide traducir יהוה como «Yahvé» en el texto principal. Aquí, al estar unido a אֲדֹנָי, se conserva la doble referencia con una aposición natural en español: «Yahvé, el Señor». Así se mantiene el nombre propio y el título soberano sin ocultar ninguno de los dos.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Sentido del verbo hebreo de salida en un contexto militar
  english_pob_reading: goes out / marches out a thousand strong
  chosen_spanish_reading: sale con mil / sale con cien
  alternative_spanish_readings:
  - sale a combate con mil
  - marcha con mil
  rationale: El hebreo usa el participio de יצא en un marco de reducción numérica y probable despliegue militar. El español «sale con» preserva la literalidad básica y deja que el contexto active el matiz bélico, evitando sobreespecificar más de lo que el verso exige.
  doctrine_reference: Principio de equivalencia óptima y control de sobrerrepresentación semántica
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una forma más natural para expresar el número del contingente sin perder el sentido militar. En español, «sale con mil / sale con cien» refleja esa misma decisión con sintaxis fluida y fiel al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se conserva «el Señor» para אֲדֹנָי, de modo que la combinación divina no se aplana en una sola fórmula.
  - Se mantiene «casa de Israel» como designación pactual, no solo étnica o política.
  - No se introdujo lenguaje explicativo como «soldados» o «combatientes» porque el hebreo no lo dice explícitamente; el matiz militar queda implícito en el contexto y en la nota.
