translation:
  language: es
  text: 'Y así será la plaga sobre el caballo, el mulo, el camello, el asno y todo animal que esté en aquellos campamentos: como esta plaga[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la misma plaga». El hebreo compara el juicio sobre los animales con la plaga recién descrita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y asimismo
  - Y de esa manera
  lexicon: HALOT
  rationale: Expresa la continuidad y correspondencia con el juicio anterior de forma natural en español, sin perder el valor correlativo del hebreo.
- source_word: תִּהְיֶה
  english_pob_choice: will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - vendrá
  lexicon: HALOT
  rationale: En este contexto español, 'habrá' comunica mejor la ocurrencia/manifestación del castigo que un copulativo simple, manteniendo el sentido futuro del verbo hebreo.
- source_word: מַגֵּפַת
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el azote
  - la aflicción
  lexicon: HALOT
  rationale: '''Plaga'' conserva la fuerza de juicio divino y coincide con el uso inmediato del pasaje. ''Azote'' suaviza menos el impacto, pero es menos directo.'
- source_word: הַסּוּס
  english_pob_choice: the horse
  chosen_spanish: el caballo
  alternatives_spanish:
  - el equino
  lexicon: HALOT
  rationale: '''Caballo'' es el equivalente natural y claro en español actual para el animal mencionado.'
- source_word: הַפֶּרֶד
  english_pob_choice: the mule
  chosen_spanish: el mulo
  alternatives_spanish:
  - la mula
  lexicon: HALOT
  rationale: '''Mulo'' es un equivalente válido en español general y mantiene el término masculino que corresponde al hebreo lexicalmente sin forzar la concordancia natural del listado.'
- source_word: הַגָּמָל
  english_pob_choice: the camel
  chosen_spanish: el camello
  alternatives_spanish:
  - el dromedario
  lexicon: HALOT
  rationale: '''Camello'' es la forma usual y transparente en español para el animal del texto.'
- source_word: וְהַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el borrico
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'donkey' por claridad moderna, en español 'asno' conserva bien el tono bíblico y es plenamente inteligible. 'Burro' sería más coloquial.
- source_word: וְכָל הַבְּהֵמָה
  english_pob_choice: and every animal
  chosen_spanish: y todo animal
  alternatives_spanish:
  - y todo ganado
  - y toda bestia
  lexicon: HALOT
  rationale: '''Todo animal'' preserva la amplitud semántica de בְּהֵמָה sin restringirla a ganado ni cargar el texto con un matiz arcaico como ''bestia''.'
- source_word: אֲשֶׁר יִהְיֶה בַּמַּחֲנוֹת הָהֵמָּה
  english_pob_choice: that is in those camps
  chosen_spanish: que esté en aquellos campamentos
  alternatives_spanish:
  - que esté en aquellos campamentos militares
  - que se halle en aquellos campamentos
  lexicon: HALOT
  rationale: '''Campamentos'' reproduce el sentido básico de מַחֲנוֹת sin interpretar de antemano como ''ejércitos''. El subjuntivo ''esté'' funciona naturalmente dentro de la relativa especificativa.'
- source_word: כַּמַּגֵּפָה הַזֹּאת
  english_pob_choice: the same plague as this
  chosen_spanish: la misma plaga que esta
  alternatives_spanish:
  - como esta plaga
  - igual que esta plaga
  lexicon: HALOT
  rationale: La comparación hebrea se expresa de manera más natural en español con 'la misma... que esta', manteniendo la referencia a la plaga ya descrita.
theological_decisions:
- issue: Extensión del juicio a los animales de los campamentos enemigos
  english_pob_reading: Render as a literal plague/judgment extending to animals associated with the hostile camps
  chosen_spanish_reading: Mantener una plaga concreta que alcanza también a los animales de aquellos campamentos
  alternative_spanish_readings:
  - Expresar solo una aflicción general
  - Suavizar la imagen como castigo indirecto
  rationale: El hebreo repite מַגֵּפָה y el contexto inmediato habla de juicio; por eso conviene conservar la concreción de una plaga, no diluirla en un sentido general. La traducción española debe reflejar que el mismo juicio alcanza al ámbito entero del campamento hostil.
  doctrine_reference: Juicio divino; coherencia contextual de la perícopa (Zac 14:12-15)
- issue: Valor comparativo de כַּמַּגֵּפָה הַזֹּאת
  english_pob_reading: The same plague as this / like this plague
  chosen_spanish_reading: La misma plaga que esta
  alternative_spanish_readings:
  - Como esta plaga
  - Plaga semejante a esta
  rationale: La partícula comparativa debe quedar visible en español. 'La misma... que esta' preserva la relación de correspondencia con la plaga previa sin borrar la comparación implícita.
  doctrine_reference: Principio de correspondencia textual; lectura comparativa del hebreo
translation_notes:
  revision_awareness: Se revisó el punto de mayor tensión interpretativa en el cierre hebreo כַּמַּגֵּפָה הַזֹּאת. La redacción inglesa base opta por explicitar la comparación como 'the same plague as this'; en español se mantuvo la comparación con una fórmula natural ('la misma plaga que esta') y se conservó una nota alternativa que hace visible la lectura más literal 'como esta plaga'. No se introdujeron cambios respecto del sentido del juicio ni se atenuó la referencia a los animales en los campamentos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Campamentos'' conserva el valor militar/hostil sin adelantar una interpretación más específica que el hebreo no exige.'
  - '''Plaga'' se usa consistentemente para מַגֵּפָה, preservando la imagen de juicio divino del contexto inmediato.'
  - No se emplea 'Cristo' ni terminología cristológica; no aplica al pasaje.
