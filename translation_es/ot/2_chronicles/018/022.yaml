    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ha hablado mal contra ti»; aquí «mal» se refiere a desastre o calamidad, no a maldad moral.'
    reason: lexical_alternative
  revision_rationale: Se corrigió una construcción poco idiomática en español («ha hablado desastre») por «ha anunciado desastre», que conserva el sentido profético-judicial del hebreo y la decisión teológica del POB sobre רָעָה. También se reubicó la nota [a] para que ancle correctamente en «espíritu de mentira».
