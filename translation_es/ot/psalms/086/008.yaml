translation:
  language: es
  text: No hay nadie como tú entre los dioses[a], Señor, y no hay obras[b] como las tuyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los seres celestiales». El hebreo dice literalmente «entre los dioses», una expresión bíblica común que afirma la incomparabilidad de Yahvé frente a toda pretensión divina.
    reason: alternative_reading
  - marker: b
    text: O «hechos» o «acciones» como las tuyas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is none
  chosen_spanish: No hay nadie
  alternatives_spanish:
  - No existe nadie
  - No hay ninguno
  lexicon: HALOT
  rationale: La partícula existencial negativa se expresa naturalmente en español con «No hay». En este contexto poético, «No hay nadie» comunica con claridad la negación absoluta sin perder el paralelismo.
- source_word: כָמוֹךָ
  english_pob_choice: like you
  chosen_spanish: como tú
  alternatives_spanish:
  - comparable a ti
  lexicon: HALOT
  rationale: El comparativo con sufijo de segunda persona masculina singular se vierte de manera directa como «como tú», conservando la sencillez y la fuerza de la comparación.
- source_word: בָאֱלֹהִים
  english_pob_choice: among the gods
  chosen_spanish: entre los dioses
  alternatives_spanish:
  - entre los seres celestiales
  - entre los seres divinos
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo con el valor comparativo de «entre los dioses», porque el texto afirma la incomparabilidad de Yahvé frente a toda pretensión divina. «Entre los seres celestiales» es posible como glosa interpretativa, pero suaviza la forma explícita del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - mi Señor
  - oh mi Señor
  lexicon: HALOT
  rationale: En este vocativo dirigido a Dios, «Señor» es el equivalente natural en español. Se añade «oh» para reproducir el tono de invocación poética sin convertir el título en una paráfrasis.
- source_word: כְמַעֲשֶׂיךָ
  english_pob_choice: works like yours
  chosen_spanish: obras como las tuyas
  alternatives_spanish:
  - hechos como los tuyos
  - acciones como las tuyas
  - deeds like yours
  lexicon: HALOT
  rationale: «מַעֲשֶׂה» abarca obra, hecho o acción. «Obras» funciona bien en español bíblico y conserva amplitud semántica sin estrechar el término a un solo matiz.
theological_decisions:
- issue: Mantener el plural «dioses» sin neutralizarlo
  english_pob_reading: Retain the plural expression 'among the gods' as a poetic statement of the Lord's incomparability over all other claimed divine powers.
  chosen_spanish_reading: Conservar «entre los dioses» como afirmación poética de que Yahvé es incomparable frente a toda pretensión divina.
  alternative_spanish_readings:
  - entre los seres celestiales
  - no hay dios como tú
  rationale: El hebreo usa explícitamente אֱלֹהִים en plural con valor comparativo. Traducirlo como singular borraría una tensión documentada por el texto y suavizaría el paralelismo más de lo que la evidencia permite. En español, la frase conserva la fuerza bíblica sin implicar politeísmo.
  doctrine_reference: Translation philosophy §3; primacía del texto original sobre la tradición de traducción
- issue: El vocativo divino אֲדֹנָי en oración poética
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  - Maestro
  rationale: «Señor» preserva el tono de oración y la convención bíblica de dirigirse a Dios con un título de señorío. «Mi Señor» sobretraduciría la forma fija y «Maestro» suena menos natural en este contexto de alabanza.
  doctrine_reference: Uso bíblico de títulos divinos; registro litúrgico en español
translation_notes:
  revision_awareness: No se requirieron revisiones respecto del último pase auditado; la solución mantiene el acuerdo alto con el control cruzado y conserva la fuerza del plural hebreo en la comparación.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino según la política del proyecto; aquí el vocativo del texto es «Señor», por lo que se tradujo el título y no se sustituyó el original por una máscara tipográfica.
  - Se preservó el plural «dioses» porque el hebreo y el audit trail inglés lo sostienen explícitamente; no se lo redujo a un singular devocional.
  - «Obras» se eligió como equivalente amplio de מַעֲשֶׂה, manteniendo la posibilidad semántica de «hechos» o «acciones» sin perder la cadencia poética.
