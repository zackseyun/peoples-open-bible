    text: Hebreo חֵרֶם (cherem), algo consagrado a Dios para destrucción bajo prohibición. Las versiones tradicionales a menudo lo traducen «anatema» o «cosa maldita». Aquí se mantiene la conexión léxica entre esta cláusula y «la cosa consagrada para destrucción» al final del versículo.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera ocurrencia de חֵרֶם para evitar el español poco natural «cosa» con sujeto plural humano, conservando a la vez la relación léxica con la segunda ocurrencia concreta. También se reemplaza «No volveré a estar» por «Ya no estaré» para expresar con más claridad el cese de la presencia divina continuada. Se simplifica la nota al pie y se ancla en la primera ocurrencia de חֵרֶם, donde realmente se explica el término.
