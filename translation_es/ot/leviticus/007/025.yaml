translation:
  language: es
  text: Porque cualquiera que coma grasa de un animal del cual se presenta una ofrenda hecha por fuego[a] a Yahvé, la persona[b] que la coma será cortada de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ofrenda de alimento» para «una ofrenda hecha por fuego». El término hebreo se refiere a una ofrenda consumida por fuego sobre el altar.
    reason: lexical_alternative
  - marker: b
    text: «Será cortada» preserva la fórmula legal hebrea. El castigo exacto es debatido; puede implicar expulsión, muerte o juicio divino.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición anterior; «Porque» conserva bien la relación discursiva causal en español.
- source_word: כָּל אֹכֵל
  english_pob_choice: anyone who eats
  chosen_spanish: cualquiera que coma
  alternatives_spanish:
  - todo el que coma
  - quien coma
  lexicon: HALOT
  rationale: Expresa el valor indefinido y general del hebreo sin volverlo rígido o excesivamente literal.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - grasa sacrificial
  lexicon: HALOT
  rationale: En contexto sacrificial, «grasa» comunica el referente básico de forma clara; «sebo» sería más técnico y menos natural para un público amplio.
- source_word: מִן הַבְּהֵמָה
  english_pob_choice: from an animal
  chosen_spanish: de un animal
  alternatives_spanish:
  - del ganado
  - de una bestia
  lexicon: HALOT
  rationale: «Animal» es el equivalente directo y comprensible; evita arcaísmos y mantiene la amplitud del término en este contexto sacrificial.
- source_word: אֲשֶׁר יַקְרִיב מִמֶּנָּה
  english_pob_choice: from which ... is presented
  chosen_spanish: de aquel del cual se presenta
  alternatives_spanish:
  - de aquel de quien se ofrece
  - del que se ofrece
  lexicon: HALOT
  rationale: Se preserva la idea de una víctima de la cual se presenta una ofrenda. La pasiva impersonal suena natural en español y refleja el sujeto indefinido del hebreo.
- source_word: אִשֶּׁה
  english_pob_choice: an offering made by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda consumida por fuego
  lexicon: HALOT
  rationale: «Ofrenda encendida» conserva el valor sacrificial tradicional del término sin convertirlo en una paráfrasis explicativa excesiva; deja visible la relación con el fuego/altar.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como indica el marco del proyecto; «a Yahvé» expresa adecuadamente la dedicación de la ofrenda.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será extirpada
  - será eliminada
  lexicon: HALOT
  rationale: «Ser cortada» conserva la fórmula legal hebrea sin resolver su alcance punitivo. Se evita interpretar el mecanismo de la sanción más allá del texto.
- source_word: הַנֶּפֶשׁ הָאֹכֶלֶת
  english_pob_choice: the person who eats it
  chosen_spanish: esa persona que la come
  alternatives_spanish:
  - el alma que la come
  - quien la come
  lexicon: HALOT
  rationale: נֶפֶשׁ en este contexto legal apunta a la persona concreta. «Esa persona» mantiene el referente jurídico y evita «alma», que sonaría impropio en español.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus parientes
  lexicon: HALOT
  rationale: La expresión idiomática en español reproduce bien el matiz de exclusión del grupo. «Su» se usa como genérico, aunque la terminación hebrea sea femenina por concordancia gramatical con נֶפֶשׁ.
theological_decisions:
- issue: Fórmula penal וְנִכְרְתָה ... מֵעַמֶּיהָ
  english_pob_reading: shall be cut off from his people
  chosen_spanish_reading: será cortada de entre su pueblo
  alternative_spanish_readings:
  - será excluida de su pueblo
  - será eliminada de su pueblo
  rationale: Se preserva la tensión interpretativa de la fórmula legal hebrea. «Cortada» mantiene el idioma bíblico y no decide entre expulsión, muerte o juicio divino.
  doctrine_reference: Preservar la tensión interpretativa del texto legal.
- issue: Género gramatical del ofensor en lenguaje legal genérico
  english_pob_reading: his people
  chosen_spanish_reading: su pueblo
  alternative_spanish_readings:
  - su gente
  - de entre ellos
  rationale: Aunque el sufijo hebreo es femenino por concordar con נֶפֶשׁ, el referente es genérico. En español se usa un posesivo singular representativo sin forzar una ofrenda femenina específica.
  doctrine_reference: Precisión gramatical con referencia genérica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo masorético y el audit trail inglés, manteniendo la fórmula legal de «ser cortada» y el nombre divino «Yahvé». Se adoptó un español natural para la construcción indefinida y para נֶפֶשׁ como «persona». No se introdujeron cambios sustantivos respecto del razonamiento auditado, solo ajustes de fluidez en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evitó «Cristo» y otros términos no pertinentes.
  - «Grasa» traduce חֵלֶב de manera clara; en este contexto no se recurrió a «sebo» para no sobrecargar el registro.
  - La fórmula «será cortada» conserva la ambigüedad jurídica del hebreo.
  - El pronombre «su» en «su pueblo» es genérico y no pretende marcar género femenino del sujeto legal.
