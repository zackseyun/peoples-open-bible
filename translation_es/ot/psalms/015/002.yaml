  to: El que anda con integridad[a], y hace lo recto[b], y habla verdad en su corazón.
  rationale: Se aplica una reparación mínima para mejorar la naturalidad del español en תמים sin apartarse del sentido hebreo ni del rastro auditado en inglés. «Con integridad» es más idiomático que «en integridad», preserva la idea de conducta íntegra y evita implicar perfección absoluta. Se conserva el resto del versículo porque es fiel al original y suficientemente claro.
