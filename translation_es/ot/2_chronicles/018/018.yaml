translation:
  language: es
  text: 'Y dijo: «Por tanto, oigan la palabra de Yahvé: Yo vi a Yahvé sentado en su trono, y todo el ejército del cielo[a] estaba de pie a su derecha y a su izquierda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo el ejército del cielo»; también puede entenderse «todo el ejército celestial» o «toda la hueste del cielo». «Ejército» conserva el matiz de צָבָא, que puede referirse a una hueste o fuerza organizada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la relación inferencial o consecuencial del discurso profético con un conector natural en español. 'Por tanto' conserva el tono formal y exhortativo de 'Therefore' sin sonar pesado.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - presten atención a
  lexicon: HALOT
  rationale: Imperativo plural dirigido a la audiencia. 'Oigan' es natural en español bíblico moderno y mantiene el llamado a atender la palabra profética.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' conserva la fórmula profética y su peso canónico. Se usa ''Yahvé'' por la convención del proyecto para יְהוָה, evitando la sustitución por un título.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se traslada el nombre divino con la forma española establecida por el proyecto. 'Yahvé' preserva el nombre personal del texto hebreo, en vez de reemplazarlo por 'el SEÑOR'.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: Yo vi
  alternatives_spanish:
  - vi
  - he visto
  lexicon: HALOT
  rationale: El pasado simple reproduce el relato visionario directo. Se mantiene el sujeto explícito para claridad y solemnidad narrativa.
- source_word: יוֹשֵׁב
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sentándose
  - sentado en su trono
  lexicon: HALOT
  rationale: El participio describe la postura entronizada de Yahvé. 'Sentado' es la opción natural en español y conserva la imagen de entronización.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su silla real
  - su trono real
  lexicon: HALOT
  rationale: '''Trono'' transmite la imagen regia del texto. El posesivo mantiene la relación del rey entronizado sin añadir matices no presentes.'
- source_word: כָל צְבָא הַשָּׁמַיִם
  english_pob_choice: all the host of heaven
  chosen_spanish: todo el ejército del cielo
  alternatives_spanish:
  - todo el ejército celestial
  - toda la hueste del cielo
  lexicon: HALOT
  rationale: Se conserva el valor colectivo y militar de צָבָא con 'ejército'. 'Del cielo' reproduce el genitivo hebreo de manera directa; 'hueste' sería posible, pero menos transparente para lectores modernos.
- source_word: עֹמְדִים
  english_pob_choice: standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaban de pie
  - permanecía de pie
  lexicon: HALOT
  rationale: 'En español se ajusta el plural del sujeto colectivo con un singular concordante en el predicado para mayor naturalidad: ''todo el ejército... estaba de pie''. La imagen de postura y disponibilidad queda preservada.'
- source_word: עַל יְמִינוֹ וּשְׂמֹאלוֹ
  english_pob_choice: at his right hand and at his left
  chosen_spanish: a su derecha y a su izquierda
  alternatives_spanish:
  - a su diestra y a su siniestra
  - a su mano derecha y a su mano izquierda
  lexicon: HALOT
  rationale: '''A su derecha y a su izquierda'' comunica la disposición espacial con claridad moderna. Se evita ''diestra/siniestra'' por sonar más arcaico y menos transparente, aunque sería una alternativa tradicional.'
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה cuando el profeta dice haber visto a Yahvé sentado en su trono
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. La política del proyecto pide preservar el nombre divino en forma transliterada, no ocultarlo tras un título. 'Yahvé' es la forma española adoptada aquí y mantiene la referencia personal y covenantal del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con la auditoría inglesa. No se detectaron revisiones recientes que alteren la decisión principal; se mantuvo el nombre divino como Yahvé y la imagen del consejo celestial con una formulación española clara y pública.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de manera uniforme para יְהוָה.
  - Se eligió 'todo el ejército del cielo' por transparencia semántica, con nota que preserva la alternativa 'hueste celestial'.
  - La concordancia verbal en 'estaba de pie' se adaptó al sujeto colectivo para evitar una construcción torpe en español, sin alterar el sentido.
