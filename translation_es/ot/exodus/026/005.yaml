translation:
  language: es
  text: Harás cincuenta presillas en la cortina una, y harás cincuenta presillas en el borde de la cortina que está en el segundo conjunto; las presillas estarán enfrentadas una a otra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'las presillas ... una mujer a su hermana', un giro hebreo que expresa correspondencia o alineación entre sus respectivas contrapartes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  english_pob_choice: loops
  chosen_spanish: presillas
  alternatives_spanish:
  - lazos
  - bucles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa piezas de tejido preparadas para unir cortinas. 'Presillas' comunica bien en español la idea de un enganche textil y evita confundirlas con piezas metálicas; 'lazos' sería posible, pero menos específico.
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - panel
  - lona
  lexicon: HALOT
  rationale: La referencia al santuario pide un término claro para una gran pieza de tela colgante. 'Cortina' es natural en español moderno y conserva la imagen de una pieza textil delimitada.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: la primera
  alternatives_spanish:
  - la una
  - la una sola
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'la una', el contraste con la cortina del segundo conjunto hace que en español 'la primera' exprese con naturalidad la relación entre las dos unidades sin añadir más contenido que el requerido por el contexto.
- source_word: קְצֵה
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - extremo
  - orilla
  lexicon: HALOT
  rationale: '''Borde'' transmite bien la zona limítrofe de la cortina donde van las presillas. En español suena más natural que ''extremo'' en este contexto de costura y ensamblaje.'
- source_word: מַחְבֶּרֶת
  english_pob_choice: set
  chosen_spanish: conjunto
  alternatives_spanish:
  - unión
  - ensamble
  lexicon: HALOT
  rationale: El término se refiere al grupo ya unido de cortinas. 'Conjunto' comunica el resultado de la unión sin forzar una terminología técnica poco transparente en español.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - la otra
  - la segunda
  lexicon: HALOT
  rationale: El adjetivo ordinal conserva la distinción entre las dos unidades de cortinas. Se traduce en masculino por concordancia con 'conjunto'.
- source_word: מַקְבִּילֹת
  english_pob_choice: shall be opposite
  chosen_spanish: estarán enfrentadas
  alternatives_spanish:
  - estarán opuestas
  - quedarán alineadas
  lexicon: HALOT
  rationale: La idea central es de correspondencia enfrentada entre las presillas. 'Enfrentadas' reproduce la relación espacial de manera clara y idiomática en español.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  english_pob_choice: one another
  chosen_spanish: una a otra
  alternatives_spanish:
  - cada una con su contraparte
  - una frente a la otra
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal ('una mujer a su hermana') para expresar correspondencia entre pares. 'Una a otra' conserva el sentido recíproco sin introducir una interpretación más libre.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés, conservando la imagen técnica de las presillas y el modismo hebreo de correspondencia. Se optó por 'presillas' y 'conjunto' para lograr claridad pública en español sin perder la precisión del pasaje.
  spanish_consistency_notes:
  - Se mantuvo 'cortina' para יְרִיעָה, en línea con la terminología POB para el tabernáculo.
  - Se preservó la idea de correspondencia recíproca con una construcción española natural, sin diluir el modismo hebreo.
  - No hay decisiones teológicas adicionales en este versículo; el foco es léxico y sintáctico.
