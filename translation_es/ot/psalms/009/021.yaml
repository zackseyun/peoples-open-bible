translation:
  language: es
  text: Ponlos en temor[a], Yahvé; haz que las naciones sepan que no son más que hombres[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ponles terror' o, menos probablemente, 'nómbrales un maestro'. El sustantivo hebreo morah puede significar 'temor/terror' y en algunos contextos puede relacionarse con 'maestro'; aquí el contexto favorece 'temor'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'hombre' (enosh), con énfasis en la fragilidad o mortalidad humanas; alternativamente, 'meros mortales'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתָה
  english_pob_choice: Put
  chosen_spanish: Ponlos
  alternatives_spanish:
  - Pón
  - Coloca
  - Pon
  lexicon: HALOT
  rationale: El imperativo de שׁית expresa 'poner/colocar/hacer que caiga'. En español, con el complemento pronominal, 'ponlos' comunica de forma natural la acción dirigida a ellos y conserva el tono de súplica.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, siguiendo la pauta del proyecto de usar 'Yahvé' en el cuerpo principal y no una sustitución por título.
- source_word: מוֹרָה
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - terror
  - miedo
  - castigo terrorífico
  lexicon: HALOT
  rationale: En este contexto מוֹרָה se entiende mejor como un estado de temor/terror provocado por Dios. 'Temor' suena bíblico y natural en español, sin imponer una interpretación más fuerte de la necesaria.
- source_word: לָהֶם
  english_pob_choice: in them
  chosen_spanish: los
  alternatives_spanish:
  - en ellos
  - sobre ellos
  - para ellos
  lexicon: HALOT
  rationale: El hebreo permite una relación dativa/objetiva; en español, con 'poner en temor', la construcción más idiomática es 'ponerlos en temor', que mantiene la fuerza del acto divino sobre ellos.
- source_word: יֵדְעוּ
  english_pob_choice: let ... know
  chosen_spanish: haz que ... sepan
  alternatives_spanish:
  - que ... conozcan
  - permite que ... sepan
  - haz que ... conozcan
  lexicon: HALOT
  rationale: 'La forma imperfecta funciona como jussivo en la oración. ''Haz que ... sepan'' transmite bien el valor de petición: se ruega que las naciones lleguen al reconocimiento deseado.'
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: '''Las naciones'' es la equivalencia estándar y contextual en los Salmos para los pueblos en contraste con Israel.'
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: hombres
  alternatives_spanish:
  - seres humanos
  - mortales
  - mera humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ subraya la fragilidad humana. En español, 'hombres' mantiene la fuerza colectiva y la concisión del hebreo; la nota aclara la idea de mortalidad/fraqueza.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: no son más que
  alternatives_spanish:
  - son solo
  - son únicamente
  - ellos son
  lexicon: HALOT
  rationale: El pronombre enfático queda absorbido por la construcción 'no son más que', que comunica la restricción retórica del hebreo sin sonar repetitivo.
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: Se translitera el término litúrgico/musical porque su sentido exacto sigue siendo incierto y la transliteración preserva la transparencia textual.
theological_decisions:
- issue: El alcance de מוֹרָה en la petición
  english_pob_reading: Put them in fear
  chosen_spanish_reading: Ponlos en temor
  alternative_spanish_readings:
  - Pon sobre ellos terror
  - Haz que los invada el miedo
  rationale: La lectura principal mantiene el valor de amenaza/temor sin convertirlo en una paráfrasis más intensa de lo que el hebreo exige. En contexto, la súplica busca que las naciones reconozcan su pequeñez ante Yahvé.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (preserve lexical tension where the source is ambiguous)
- issue: La fuerza de אֱנוֹשׁ como humanidad frágil
  english_pob_reading: they are only man
  chosen_spanish_reading: no son más que hombres
  alternative_spanish_readings:
  - son solo mortales
  - son meros seres humanos
  rationale: La expresión conserva el contraste teológico entre las naciones y Yahvé. 'No son más que hombres' mantiene la humillación retórica y deja visible la fragilidad humana implícita en אֱנוֹשׁ.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que afinó la frase para hacerla más idiomática: de una construcción más literal a una expresión más natural de ''ponerlos en temor''. También conserva la decisión estable de traducir el Tetragrama como ''Yahvé'' y de mantener ''Selah'' transliterado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se mantiene 'Selah' sin traducir por tratarse de un término litúrgico incierto.
  - '''hombres'' se usa aquí en sentido genérico y colectivo, conforme a la tensión semántica de אֱנוֹשׁ.'
  - La puntuación y el orden buscan sonar naturales en español sin perder la estructura imperativa y final de la línea hebrea.
