translation:
  language: es
  text: Entonces Yahvé levantó jueces, y ellos los salvaron[a] de la mano de los que los saqueaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los libraron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - hizo surgir
  - designó
  - levantó en medio de
  lexicon: HALOT
  rationale: El valor causativo de קום en este contexto expresa iniciativa divina al suscitar líderes para Israel. «Levantó» conserva bien esa acción histórica y es natural en español, sin perder la idea de que Yahvé los hizo aparecer para su tarea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme a la norma del proyecto. «Yahvé» mantiene la referencia personal del nombre revelado, en lugar de sustituirlo por un título.
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - gobernantes
  - líderes
  - libertadores
  lexicon: HALOT
  rationale: El sustantivo se traduce directamente como «jueces» para conservar la terminología del libro y no reducir su campo semántico a una sola función, aunque en el contexto también actúan como libertadores.
- source_word: וַיּוֹשִׁיעוּם
  english_pob_choice: they saved them
  chosen_spanish: ellos los libraron
  alternatives_spanish:
  - ellos los salvaron
  - ellos los liberaron
  - ellos los rescataron
  lexicon: HALOT
  rationale: El verbo ישׁע puede expresarse como rescatar, salvar o librar. «Libraron» funciona con naturalidad en español bíblico y comunica la liberación efectiva sin imponer de inmediato un matiz más específicamente soteriológico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del dominio de
  - de las manos de
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo «de la mano de», que en español sigue siendo comprensible y mantiene la metáfora de control o poder.
- source_word: שֹׁסֵיהֶם
  english_pob_choice: those who plundered them
  chosen_spanish: los que los saqueaban
  alternatives_spanish:
  - los que los despojaban
  - sus saqueadores
  - los que los desolaban
  lexicon: HALOT
  rationale: El participio derivado de שׁסה/שׁסס apunta a despojo violento y saqueo. «Los que los saqueaban» preserva esa violencia concreta mejor que «oprimían», que sería demasiado general.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre propio del pacto; por eso se traslada como «Yahvé» en la línea principal, sin convertirlo en un título anónimo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre el oficio de los jueces y su función de rescate
  english_pob_reading: Retain 'judges' in the main text while expressing their rescuing action through the following verb 'they saved them.'
  chosen_spanish_reading: Mantener «jueces» y expresar su acción liberadora con «los libraron».
  alternative_spanish_readings:
  - usar «libertadores» en lugar de «jueces»
  - usar «caudillos» para enfatizar su liderazgo
  rationale: 'La oración hebrea conserva ambos aspectos: el cargo y la acción. Traducir «jueces» preserva la terminología del libro, mientras que «los libraron» comunica su intervención salvadora sin reemplazar el título por una interpretación.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo y con el control de revisión más reciente: no se registraron cambios aplicados, y el consenso de cotejo fue alto. La redacción española conserva el paralelismo del hebreo: Yahvé como sujeto, «jueces» como designación formal y una cláusula verbal de rescate seguida del complemento idiomático «de la mano de».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יְהוָה.
  - Se conserva «jueces» para reflejar la terminología canónica del libro, sin sustituirla por una glosa interpretativa.
  - «Libraron» preserva la idea de rescate/entrega y encaja bien con el registro bíblico en español.
  - «De la mano de» reproduce el idiomático hebreo מִיַּד y evita neutralizar la imagen de poder o control.
