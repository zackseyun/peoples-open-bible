translation:
  language: es
  text: 'Han visto falsedad y adivinación mentirosa[a], los que dicen: «Declaración de Yahvé», cuando Yahvé no los ha enviado; pero esperan que se confirme la palabra[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adivinación falsa» o «adivinación engañosa».
    reason: lexical_alternative
  - marker: b
    text: O «esperan que la palabra se cumpla» o «aguardan que la palabra sea confirmada».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוּ
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - han contemplado
  lexicon: HALOT
  rationale: El perfecto hebreo de חזה expresa visión profética; en español, «han visto» conserva el valor resultativo con naturalidad y evita una traducción demasiado libre.
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - vanidad
  - vacío
  - mentira
  lexicon: HALOT
  rationale: En este contexto profético, el término señala algo falso y engañoso. «Falsedad» comunica bien ese valor sin cargarlo innecesariamente hacia «vanidad» o «vacío».
- source_word: קֶסֶם כָּזָב
  english_pob_choice: lying divination
  chosen_spanish: adivinación mentirosa
  alternatives_spanish:
  - adivinación falsa
  - presagio engañoso
  lexicon: HALOT
  rationale: קֶסֶם es «adivinación»; כָּזָב le añade la idea de falsedad/engaño. «Adivinación mentirosa» mantiene el golpe retórico y la carga moral del hebreo, aunque suene poco usual.
- source_word: הָאֹמְרִים
  english_pob_choice: those who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - los que afirman
  - los que están diciendo
  lexicon: HALOT
  rationale: El participio sustantivado describe a los falsos profetas como una clase caracterizada por esa acción. «Los que dicen» es natural en español y conserva el rasgo descriptivo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: Declaration of Yahweh
  chosen_spanish: Declaración de Yahvé
  alternatives_spanish:
  - Oráculo de Yahvé
  - Dicho de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne sin sustituirla por una paráfrasis. «Declaración de Yahvé» sigue de cerca la opción auditada en inglés y mantiene la ironía del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el nombre divino según la convención del proyecto, en lugar de reemplazarlo por un título. Esto preserva el nombre propio del pacto en el español de destino.
- source_word: לֹא שְׁלָחָם
  english_pob_choice: has not sent them
  chosen_spanish: no los ha enviado
  alternatives_spanish:
  - no los envió
  - no los mandó
  lexicon: HALOT
  rationale: El perfecto negado expresa que carecen de comisión divina vigente. «No los ha enviado» es claro en español y conserva el sentido de falta de envío por parte de Yahvé.
- source_word: וְיִחֲל֖וּ
  english_pob_choice: yet they hope
  chosen_spanish: y esperan
  alternatives_spanish:
  - pero esperan
  - y aguardan
  lexicon: HALOT
  rationale: El verbo יחל puede significar esperar/aguardar con componente de expectativa. Aquí se opta por «esperan»; el matiz adversativo queda sugerido por el contraste del contexto más que por añadir una conjunción no presente en el hebreo.
- source_word: לְקַיֵּם דָּבָר
  english_pob_choice: for the fulfillment of the word
  chosen_spanish: que se confirme la palabra
  alternatives_spanish:
  - para que se cumpla la palabra
  - para el cumplimiento de la palabra
  lexicon: HALOT
  rationale: קיים expresa hacer que una palabra «se mantenga en pie», es decir, que se confirme o se cumpla. «Que se confirme la palabra» preserva la posibilidad de cumplimiento/confirmación señalada en la nota inglesa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, evitando la sustitución por un título y manteniendo la referencia directa al nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética נְאֻם יְהוָה puesta en boca de falsos profetas
  english_pob_reading: Declaration of Yahweh
  chosen_spanish_reading: Declaración de Yahvé
  alternative_spanish_readings:
  - Oráculo de Yahvé
  - Utterance of Yahvé
  rationale: 'Se mantiene la fórmula como expresión técnica y solemne para que sea visible la ironía del pasaje: los falsos profetas emplean lenguaje profético auténtico sin autorización divina.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Revisión final sin cambios sustanciales respecto al último pase auditado; se conservan la lectura de Yahvé, la fórmula profética solemne y el matiz de expectativa/confirmación para לְקַיֵּם דָּבָר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «Declaración de Yahvé» como fórmula profética técnica, no como paráfrasis.
  - «Adivinación mentirosa» traduce con fuerza retórica el binomio קֶסֶם כָּזָב y evita suavizar el juicio del verso.
  - La segunda cláusula se vierte con expectativa de confirmación de la palabra, preservando la tensión entre falsos envíos y falsa esperanza.
