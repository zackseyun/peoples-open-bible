  glossary_alignment: 'No hay términos teológicos del glosario principal implicados. La revisión se centra en precisión léxica: distinguir mejor ἔρις de μάχη y conservar el matiz de κατασπευδομένη/κατασπεύδουσα como conflicto precipitado o empujado con demasiada rapidez.'
