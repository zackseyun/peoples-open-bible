  rationale: La revisión corrige la expresión «todo el pueblo que se hallaba» para reflejar mejor el sentido plural distributivo de הַנִּמְצְאִים y mejorar la naturalidad del español. Se conserva el resto del texto y las notas porque están bien alineados con la evidencia fuente y el expediente POB.
