translation:
  language: es
  text: 'Pero su siervo[a] dijo: «¿Cómo he de poner esto delante de cien hombres?». Y él dijo: «Dáselo al pueblo, y que coman[b], porque así dice Yahvé: “Comerán y quedará de sobra”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo puedo dar esto a cien hombres?». El hebreo literalmente dice: «¿Qué daré esto delante de cien hombres?».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «comer y dejar sobrante», un giro idiomático que indica que quedará comida después de que coman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su sirviente
  - su asistente
  lexicon: HALOT
  rationale: מְשָׁרֵת designa a una persona que sirve en una relación de subordinación personal. En español, «siervo» conserva mejor esa relación que «sirviente» o «asistente», y además mantiene el registro bíblico sin volverlo arcaico de más.
- source_word: מָה אֶתֵּן זֶה לִפְנֵי מֵאָה אִישׁ
  english_pob_choice: How am I to set this before a hundred men?
  chosen_spanish: ¿Cómo he de poner esto delante de cien hombres?
  alternatives_spanish:
  - ¿Cómo he de dar esto delante de cien hombres?
  - ¿Cómo puedo poner esto delante de cien hombres?
  lexicon: HALOT
  rationale: La pregunta hebrea es literalmente «¿Qué daré esto delante de cien hombres?», pero el sentido idiomático es presentar la comida para comer. «Poner esto delante de» conserva la imagen concreta de la mesa o distribución, y «¿Cómo he de…?» comunica bien la incredulidad del siervo.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: El singular distributivo hebreo tras «cien» apunta a varones/hombres en forma gramatical. «Hombres» refleja esa forma sin neutralizar el dato textual.
- source_word: תֵּן לָעָם
  english_pob_choice: Give it to the people
  chosen_spanish: Dáselo al pueblo
  alternatives_spanish:
  - Dáselo a la gente
  - Dáselo a la multitud
  lexicon: HALOT
  rationale: עָם funciona aquí como colectivo. «Pueblo» es natural en español bíblico y conserva el valor colectivo sin restringir innecesariamente el grupo.
- source_word: וְיֹאכֵלוּ
  english_pob_choice: and let them eat
  chosen_spanish: y que coman
  alternatives_spanish:
  - y coman
  - y déjenlos comer
  lexicon: HALOT
  rationale: La forma prefijada sigue al imperativo con valor de continuación jussiva/resultativa. «Que coman» expresa esa fuerza con naturalidad en español y evita una simple paráfrasis futura.
- source_word: כִּי כֹה אָמַר יְהוָה
  english_pob_choice: for thus says Yahweh
  chosen_spanish: porque así ha dicho Yahvé
  alternatives_spanish:
  - porque así dice Yahvé
  - porque así dice el Señor
  lexicon: HALOT
  rationale: Se mantiene el formulario profético con el nombre divino en la forma de proyecto, «Yahvé», según el criterio editorial indicado. El pretérito perfecto compuesto («ha dicho») suena solemne y fiel al valor declarativo del hebreo.
- source_word: אָכֹל וְהוֹתֵר
  english_pob_choice: They shall eat and have some left over
  chosen_spanish: Comerán y sobrará
  alternatives_spanish:
  - Comerán y dejarán sobrante
  - Comerán y quedará de sobra
  lexicon: HALOT
  rationale: 'El hebreo expresa certeza del resultado: comer y dejar resto. En español, «sobrará» comunica de forma breve y natural que quedará excedente después de comer.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete fuente y la política del proyecto establecen que יְהוָה se traduzca como «Yahvé» en el texto principal. Se evita el reemplazo tradicional por «SEÑOR» porque ocultaría el nombre propio presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final del POB inglés: se conserva la forma solemne del anuncio profético («porque así ha dicho Yahvé») y la certeza del desenlace («Comerán y sobrará»), evitando suavizar la tensión entre la objeción del siervo y la orden de Eliseo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - «Siervo» se usa para מְשָׁרֵת por fidelidad al rango subordinado del personaje.
  - «Pueblo» traduce עָם como colectivo; «hombres» traduce אִישׁ en el primer miembro por su forma distributiva masculina.
  - La sintaxis conserva la oposición entre la incredulidad del siervo y la respuesta imperativa de Eliseo sin añadir explicación interpretativa.
