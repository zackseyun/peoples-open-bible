- from: Entonces haré a la casa que lleva mi nombre[a], en la que ustedes confían, y al lugar que di a ustedes y a sus padres[b], tal como hice con Silo.
  to: Entonces haré con la casa que es llamada por mi nombre[a], en la que ustedes confían, y con el lugar que les di a ustedes y a sus padres[b], tal como hice con Silo.
  rationale: Se ajusta la construcción verbal para que el español exprese con naturalidad el hebreo עשה + ל sin perder la elipsis ominosa del juicio; se acerca además el modismo del nombre a la formulación fuente y auditada. Se mantiene la distinción «casa/lugar», la referencia a «sus padres» y el precedente histórico de Silo.
