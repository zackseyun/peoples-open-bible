review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: חֶסֶד como amor leal/covenantal, גָּדוֹל como ''grande'', וְהִצַּלְתָּ como liberación ya realizada, נַפְשִׁי como ''mi alma'', y שְׁאוֹל preservado como ''Sheol'' con nota aclaratoria. Sin embargo, dos puntos necesitan ajuste para reflejar mejor tanto el hebreo como el rastro de auditoría inglés: (1) כִּי puede traducirse como «Porque», pero en esta línea poética «Pues» suena más natural y menos prosaico; (2) «del Sheol más bajo» es comprensible pero poco idiomático en español, y además el artículo masculino choca con el uso más natural «el Seol» o simplemente «Seol».'
  spanish_quality_summary: La frase es mayormente legible, pero «para conmigo» suena algo rígido y «del Sheol más bajo» resulta poco natural en español eclesial general. «hacia mí» y «del Seol más profundo» producen una línea más clara y digna. También conviene adaptar la transliteración a la grafía española «Seol», ampliamente reconocida y más natural que «Sheol» dentro de un texto bíblico en español, manteniendo la nota explicativa.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías u otros términos de glosario. La decisión clave es שְׁאוֹל: aunque el inglés auditado usa ''Sheol'', en español la forma asentada y ampliamente inteligible es «Seol», que preserva el mismo concepto fuente sin anglicismo ortográfico. «Mi alma» y «amor leal» están alineados con la racionalidad léxica del proyecto. Se ajusta «más bajo» a «más profundo» por naturalidad española, aunque se reconoce que el inglés revisado endureció hacia ''lowest Sheol''; en español una reproducción hiperformal como «el Seol más bajo» suena torpe.'
  issues:
  - severity: medium
    issue: «Sheol» debería adaptarse a «Seol» en el texto español.
    rationale: La transliteración del concepto debe preservarse, pero la forma ortográfica española establecida es «Seol». «Sheol» introduce una grafía ajena al español sin ventaja semántica.
  - severity: medium
    issue: «del Sheol más bajo» es poco idiomático en español.
    rationale: Aunque intenta reflejar שְׁאוֹל תַּחְתִּיָּה de forma formal, la construcción suena forzada. «del Seol más profundo» conserva la imagen descendente con mejor legibilidad.
  - severity: low
    issue: «para conmigo» suena rígido y algo arcaizante.
    rationale: No es incorrecto, pero «hacia mí» expresa bien el valor benefactivo de עָלַי con mayor naturalidad en español contemporáneo de registro bíblico.
  revised_spanish_text: Pues grande es tu amor leal hacia mí, y has librado mi alma del Seol[a] más profundo.
  revised_footnotes:
  - marker: a
    text: O «de la morada de los muertos» o «de la tumba». «Seol» es el término hebreo para el ámbito de los muertos.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar fidelidad estilística y naturalidad en español: «Pues» encaja mejor en la conexión poética; «hacia mí» evita rigidez innecesaria; «Seol» adapta correctamente la transliteración al español; y «más profundo» expresa la imaginería descendente de תַּחְתִּיָּה de forma clara y natural, sin borrar la nota lexical sobre Seol. No requiere adjudicación adicional porque la intención fuente y la solución española son suficientemente claras.'
