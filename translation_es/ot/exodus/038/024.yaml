    issue: Marcador de nota [a] colocado en «oro» en vez de la frase final
    rationale: La nota dice «O, “según el siclo del santuario”», que corresponde al sintagma בְּשֶׁקֶל הַקֹּדֶשׁ al final del versículo, no a «oro». Debe anclarse donde aparece la alternativa.
  - severity: medium
    issue: Marcador de nota [b] colocado en «santuario» en vez de «ofrenda mecida»
    rationale: La nota cultural explica «ofrenda mecida», no «santuario». El anclaje actual puede confundir al lector sobre qué término se comenta.
  - severity: low
    issue: Espaciado de rayas mejorable
    rationale: 'En español es más natural presentar el inciso con rayas pegadas al texto del inciso: «santuario—el oro...—fue», evitando el espaciado calcado del inglés.'
