review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: Yahvé restaura la condición de Job, vinculado temporalmente con su oración por sus amigos, y le da una restauración duplicada. Sin embargo, la nota [c] introduce una alternativa española inadecuada (''dos veces más''), que normalmente sugiere triple cantidad y no simple duplicación; además ''dos tanto como tenía antes'' es poco natural. Conviene ajustar esa nota para reflejar fielmente לְמִשְׁנֶה.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español general. 'Yahvé restauró la suerte de Job' y 'cuando oró por sus amigos' leen bien. 'Le dio a Job el doble de todo lo que había tenido antes' es comprensible, aunque ligeramente más fluido sin repetir 'a Job'. No obstante, la redacción actual es aceptable; el problema principal está en la calidad y precisión de la nota [c].
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; el modismo שָׁב אֶת שבית se maneja como restauración de condición/suerte, no cautiverio literal; la relación temporal de בְּהִתְפַּלְּלוֹ se conserva con ''cuando''; בְּעַד se vierte bien con ''por''; לְמִשְׁנֶה se expresa en el texto como ''el doble'', que sí coincide con la decisión auditada.'
  issues:
  - severity: medium
    issue: La nota [c] ofrece 'dos veces más' como alternativa.
    rationale: En español común, 'dos veces más' suele entenderse como tres veces el total original, mientras que לְמִשְׁנֶה y el inglés auditado apuntan a duplicación ('el doble', 'dos veces tanto'). La nota debe evitar ambigüedad matemática y semántica.
  - severity: low
    issue: La nota [c] incluye 'dos tanto como tenía antes', formulación poco natural.
    rationale: La expresión no suena idiomática en español general. Puede reemplazarse por 'dos veces tanto como antes' o simplemente 'duplicado', aunque 'el doble' ya funciona mejor en el texto principal.
  revised_spanish_text: Yahvé restauró[a] la suerte de Job cuando[b] oró por sus amigos, y Yahvé le dio a Job el doble[c] de todo lo que había tenido antes.
  revised_footnotes:
  - marker: a
    text: 'O: ''le devolvió la suerte'' / ''le restauró la condición''. El hebreo es un modismo que describe el reverso de la situación de Job, no necesariamente una cautividad literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''mientras''. La construcción hebrea admite una lectura circunstancial o temporal cercana.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''cantidad doble'' / ''dos veces tanto como antes''. El sentido es de duplicación.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel y natural en español. Se corrige únicamente la nota [c] para eliminar una alternativa ambigua o engañosa ('dos veces más') y una formulación poco idiomática, alineándola mejor con el hebreo לְמִשְׁנֶה y con la auditoría inglesa.
