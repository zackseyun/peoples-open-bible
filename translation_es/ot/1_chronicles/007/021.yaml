translation:
  language: es
  text: Zabad su hijo, y Shutelaj su hijo, y Ézer y Elead; los hombres de Gat que habían nacido en el país[a] los mataron, porque ellos habían bajado[b] para tomar su ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hombres nativos de Gat». El hebreo dice literalmente: «los hombres de Gat, los que habían nacido en la tierra».'
    reason: lexical_alternative
  - marker: b
    text: El sujeto de «habían bajado» se entiende por el contexto como Ézer y Elead, los antecedentes plurales más cercanos.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se expresa naturalmente en español con 'su hijo'. Mantiene el patrón genealógico breve del hebreo sin calco innecesario.
- source_word: וְשׁוּתֶלַח
  english_pob_choice: Shuthelah
  chosen_spanish: Shutelaj
  alternatives_spanish:
  - Sutela
  - Sutelaj
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma cercana al hebreo, con adaptación gráfica al español para una lectura eclesial clara.
- source_word: וְעֵזֶר וְאֶלְעָד
  english_pob_choice: and Ezer and Elead
  chosen_spanish: y Ézer y Elead
  alternatives_spanish:
  - y Ezer y Elead
  lexicon: HALOT
  rationale: Se conservan los nombres propios y la coordinación repetida para reflejar la lista hebrea. Se añade tilde en Ézer por acentuación española.
- source_word: וַהֲרָגוּם
  english_pob_choice: killed them
  chosen_spanish: los mataron
  alternatives_spanish:
  - los hirieron de muerte
  - los dieron muerte
  lexicon: HALOT
  rationale: El qal wayyiqtol con sufijo pronominal tiene sentido directo de matar. 'Los mataron' es la forma natural y fiel en español.
- source_word: אַנְשֵׁי גַת
  english_pob_choice: the men of Gath
  chosen_spanish: los hombres de Gat
  alternatives_spanish:
  - los varones de Gat
  - la gente de Gat
  lexicon: HALOT
  rationale: '''Hombres de Gat'' preserva el idiomatismo genitivo del hebreo y el matiz de varones/guerreros sin generalizar indebidamente a ''gente''.'
- source_word: הַנּוֹלָדִים בָּאָרֶץ
  english_pob_choice: who were born in the land
  chosen_spanish: que habían nacido en la tierra
  alternatives_spanish:
  - que nacieron en la tierra
  - que eran nativos de la tierra
  lexicon: HALOT
  rationale: El participio pasivo se vierte con una relativa natural en español. 'Habían nacido' conserva la referencia de anterioridad y evita perder el matiz descriptivo de 'nacidos en la tierra'.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' expresa claramente la causa del hecho, como en la lectura inglesa auditada.'
- source_word: יָרְדוּ
  english_pob_choice: had gone down
  chosen_spanish: habían descendido
  alternatives_spanish:
  - habían bajado
  - habían ido
  lexicon: HALOT
  rationale: Se conserva la metáfora direccional de ירד. 'Habían descendido' es fiel al movimiento indicado por el hebreo, sin suavizarlo demasiado.
- source_word: לָקַחַת
  english_pob_choice: to take
  chosen_spanish: para tomar
  alternatives_spanish:
  - para llevarse
  - para apoderarse de
  lexicon: HALOT
  rationale: '''Tomar'' reproduce el valor básico de לקח, evitando introducir de antemano una interpretación más fuerte como ''apoderarse''.'
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - sus reses
  lexicon: HALOT
  rationale: מִקְנֶה suele referir ganado/livestock. En español 'ganado' es un equivalente compacto y leído eclesialmente; el singular colectivo refleja el uso genérico del sustantivo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que sustituyó el guion largo por punto y coma y eliminó la coma antes de la cláusula restrictiva; por eso la versión española usa punto y coma y una relativa sin coma. También se preservó la ambigüedad documentada de הַנּוֹלָדִים בָּאָרֶץ con una nota alternativa en lugar de fijar una glosa interpretativa única.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se traduce el listado genealógico con coordinación repetida para seguir el hebreo.
  - 'Se conserva el orden narrativo causa-resultado: descendieron primero, luego mataron.'
  - Los nombres propios se adaptan sólo en la medida necesaria para la lectura española, sin castellaniarlos excesivamente.
