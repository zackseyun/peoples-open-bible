    text: 'O: «He aquí». La partícula hebrea introduce una llamada enfática de atención; «¡Mira!» conserva mejor el tono natural del español contemporáneo.'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor de estilo y fidelidad idiomática en la última cláusula, cambiando «frente a él» por «delante del cual sentarse», que refleja mejor la imagen de sentarse ante un fuego de hogar. También se normalizó la puntuación inicial de la nota al pie. No se requieren cambios doctrinales ni léxicos de fondo.
