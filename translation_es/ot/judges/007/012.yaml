    text: 'Hebreo: "hijos de oriente".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "yacían" / "estaban caídos". El participio hebreo literalmente significa "caer/estar caído" y aquí describe tropas desplegadas o acampadas en el valle.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: "no hay número". Expresa una multitud incontable.'
    reason: lexical_alternative
  revision_rationale: Se ajusta בְּנֵי קֶדֶם a una expresión colectiva natural y alineada con la decisión POB ('la gente de oriente'), conservando la alternativa literal en nota. Se corrige la ubicación de la nota sobre נֹפְלִים para anclarla al verbo correspondiente. También se suaviza el símil de las langostas a una formulación más idiomática en español sin cambiar el sentido.
