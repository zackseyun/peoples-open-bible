review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: sujetos coordinados («Moisés y los ancianos de Israel»), objeto («al pueblo»), fórmula de cita («diciendo»), imperativo de שׁמר y el singular colectivo de הַמִּצְוָה. Sin embargo, introduce varias notas no respaldadas por el rastro inglés y una de ellas altera el sentido de הָעָם al sugerir «el pueblo entero», que no es la alternativa documentada ni una mejor lectura del hebreo.'
  spanish_quality_summary: El español es claro y natural, pero «Guarden todo el mandamiento» dirigido al pueblo tras «mandaron al pueblo» suena menos congruente en registro que el singular «Guarda», que además refleja el imperativo singular hebreo שָׁמֹר. La redacción revisada mantiene la naturalidad y mejora la precisión formal.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión clave correctamente preservada es מִצְוָה en singular colectivo como «mandamiento». Conviene limitar las notas a las alternativas significativas del expediente inglés; las notas sobre «Guarden» y «les estoy mandando» no son necesarias aquí.
  issues:
  - severity: medium
    issue: El imperativo hebreo שָׁמֹר es singular, pero el borrador usa «Guarden» en plural.
    rationale: Aunque el español puede a veces concordar con «pueblo» por sentido, el hebreo usa imperativo singular dirigido colectivamente al pueblo. «Guarda» preserva mejor la forma y sigue siendo inteligible en español bíblico moderno.
  - severity: medium
    issue: La nota [a] ofrece «el pueblo entero», alternativa no sustentada por הָעָם ni por el POB inglés.
    rationale: הָעָם significa «el pueblo»; la alternativa auditada en inglés es «the whole commandment», no una expansión de «the people». «El pueblo entero» puede sugerir totalidad enfática inexistente en el término fuente.
  - severity: low
    issue: Hay exceso de notas léxicas no requeridas por el expediente inglés.
    rationale: Las notas [b] y [d] explican opciones posibles pero no preservan una alternativa significativa ya documentada ni resuelven una nueva ambigüedad en español. Reducir notas mejora legibilidad y disciplina editorial.
  revised_spanish_text: 'Entonces Moisés y los ancianos de Israel mandaron al pueblo, diciendo: «Guarda toda[a] el mandamiento que hoy te estoy mandando».[b]'
  revised_footnotes:
  - marker: a
    text: O «todo el mandamiento»; el hebreo tiene singular colectivo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa segunda persona singular para dirigirse colectivamente al pueblo.
    reason: translation_note
  revision_rationale: Se ajusta el imperativo y los pronombres a la segunda persona singular colectiva para reflejar mejor שָׁמֹר y la forma del discurso hebreo. Se eliminan notas no sustentadas por el expediente inglés y se corrige la nota sobre הָעָם. Se conserva el singular colectivo de «mandamiento», con nota breve útil para el lector español.
