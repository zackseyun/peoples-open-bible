  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Las decisiones sobre nombres y términos teológicos no presentan problemas en este versículo. La principal cuestión léxica es mantener para סַר un equivalente español que refleje malhumor/disgusto interior más que tristeza.
