translation:
  language: es
  text: 'Y me dijo: «Para construirle una casa en la tierra de Sinar[a], y cuando esté preparado, ella será puesta allí sobre su base[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sinar es el nombre antiguo asociado con Babilonia en el Antiguo Testamento.
    reason: cross_reference
  - marker: b
    text: O «será puesta allí sobre su pedestal», o «será puesto allí sobre su base/pedestal». Las formas femeninas del hebreo pueden entenderse con referencia a la mujer llamada Maldad, o de manera más abstracta al efa y su contenido.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  lexicon: WLC; HALOT
  rationale: La secuencia narrativa hebrea se expresa con un pasado simple natural en español. Se conserva la dirección del discurso con «me dijo», explícita en el texto.
- source_word: לִבְנוֹת לָהּ בַיִת
  english_pob_choice: To build a house for her
  chosen_spanish: Para construirle una casa
  alternatives_spanish:
  - Para construir una casa para ella
  - Para edificarle una casa
  lexicon: WLC; HALOT
  rationale: El infinitivo con ל expresa propósito. En español, «construirle» conserva mejor el dativo beneficiario que la base hebrea sugiere, sin perder naturalidad.
- source_word: בְּאֶרֶץ שִׁנְעָר
  english_pob_choice: in the land of Shinar
  chosen_spanish: en la tierra de Sinar
  alternatives_spanish:
  - en la tierra de Shinar
  - en Sinar
  lexicon: WLC; HALOT
  rationale: Se mantiene el nombre propio como topónimo bíblico reconocido. «Tierra de Sinar» refleja el sustantivo הארץ/אֶרֶץ sin interpretar el lugar como Babylonia.
- source_word: וְהוּכַן
  english_pob_choice: when it is prepared
  chosen_spanish: cuando esté preparada
  alternatives_spanish:
  - cuando sea preparada
  - y cuando esté establecido
  lexicon: WLC; HALOT
  rationale: El sentido de ser puesto en condición lista o dispuesta se transmite con una temporal natural. Se eligió femenino porque el contexto inmediato mantiene la figura femenina de la visión.
- source_word: וְהֻנִּיחָה
  english_pob_choice: she will be set there
  chosen_spanish: ella será puesta allí
  alternatives_spanish:
  - ella será colocada allí
  - será puesta allí
  lexicon: WLC; HALOT
  rationale: La forma femenina singular favorece la referencia a la mujer personificada en la visión. «Puesta» reproduce el valor pasivo sin sobrecargar el español.
- source_word: עַל מְכֻנָתָהּ
  english_pob_choice: on her base
  chosen_spanish: sobre su base
  alternatives_spanish:
  - sobre su pedestal
  - sobre su soporte
  - sobre su asiento
  lexicon: WLC; HALOT
  rationale: מְכֻנָה designa una base fija, soporte o fundamento. «Base» sigue de cerca la revisión inglesa más reciente y es más directo y formal que «pedestal» en este contexto.
theological_decisions:
- issue: Referente de los femeninos finales
  english_pob_reading: The feminine forms refer to the woman/personified wickedness seen earlier in the vision, though an abstract reading tied to the ephah is possible.
  chosen_spanish_reading: Se conserva la referencia femenina («ella») a la mujer llamada Maldad, sin cerrar por completo la posibilidad más abstracta de que el objeto de instalación se entienda como la visión misma del efa y su contenido.
  alternative_spanish_readings:
  - «eso será puesto allí sobre su base»
  - «ello será puesto allí sobre su base»
  rationale: El hebreo usa formas femeninas coherentes con la figura ya identificada en la visión. Mantener «ella» preserva la imaginería y la tensión interpretativa; la nota aclara la alternativa impersonal sin eliminarla.
  doctrine_reference: Mantener la ambigüedad literaria del pasaje; no resolver indebidamente la personificación de la Maldad.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «pedestal» por «base» para מְכֻנָה; esta versión española sigue esa revisión y, a la vez, conserva la referencia femenina del texto hebreo en la cláusula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Sinar» se translitera de forma consistente como topónimo bíblico.
  - Se mantiene la puntuación con comillas angulares para estilo bíblico en español.
  - La elección de «base» evita elevar artificialmente el objeto a un término más interpretativo como «pedestal».
