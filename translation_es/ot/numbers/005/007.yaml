    reason: theological_note
  - marker: b
    text: O, más idiomáticamente, «a la persona que perjudicó». El hebreo literalmente identifica al destinatario como aquel respecto de quien él incurrió en culpa o responsabilidad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la línea principal para expresar en español natural el sentido jurídico de וְהֵשִׁיב אֶת אֲשָׁמוֹ בְּרֹאשׁוֹ: no se restituye la culpa misma, sino la restitución íntegra correspondiente a ella. También se reemplaza la expresión poco idiomática «fue objeto de su culpa» por una formulación más clara que todavía conserva el matiz de deuda/responsabilidad frente a la persona agraviada. Se reubican las notas para alinearlas con las ambigüedades léxicas y teológicas más relevantes del expediente inglés.'
