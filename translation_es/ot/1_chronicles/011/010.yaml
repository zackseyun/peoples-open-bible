translation:
  language: es
  text: Estos eran los jefes de los valientes[a] que pertenecían a David, los que se mantuvieron firmes con él en su reino, junto con todo Israel, para hacerlo rey[b], conforme a la palabra de Yahvé acerca de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Valientes’ traduce el grupo militar-heroico de הַגִּבּוֹרִים; también puede entenderse como ‘guerreros’ o ‘hombres valientes’, pero el primer término es el más natural y reconocible en español bíblico.
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘conforme a la palabra de Yahvé sobre Israel’. El hebreo dice literalmente ‘sobre Israel’, pero en este giro la idea probable es ‘acerca de / concerniente a Israel’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי
  english_pob_choice: chiefs of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: En este contexto constructo, רָאשֵׁי denota figuras principales o dirigentes. ‘Jefes de’ comunica bien esa función jerárquica en español sin volverlo literal de forma extraña.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the mighty men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los hombres valientes
  - los guerreros
  - los valientes guerreros
  lexicon: HALOT
  rationale: La expresión en Crónicas designa al grupo heroico-militar de David. ‘Valientes’ mantiene el valor asentado del término y suena natural en español bíblico, sin diluir el matiz militar.
- source_word: אֲשֶׁר לְדָוִיד
  english_pob_choice: who belonged to David
  chosen_spanish: que pertenecían a David
  alternatives_spanish:
  - que eran de David
  - que estaban con David
  lexicon: HALOT
  rationale: El לְ con David expresa asociación/pertenencia. ‘Pertenecían a David’ conserva la relación de adscripción y evita reducirla solo a compañía circunstancial.
- source_word: הַמִּתְחַזְּקִים עִמּוֹ
  english_pob_choice: who strengthened themselves with him
  chosen_spanish: los que se fortalecieron con él
  alternatives_spanish:
  - los que se fortalecían con él
  - los que se afirmaron con él
  - los que le dieron fuerte apoyo
  lexicon: HALOT
  rationale: Se conserva el sentido reflexivo del hitpael y la preposición עִם, sin abandonar la transparencia española. En este contexto, la idea es unirse a David con firmeza en apoyo de su causa y de su entronización.
- source_word: בְמַלְכוּתוֹ
  english_pob_choice: in his kingdom
  chosen_spanish: en su reino
  alternatives_spanish:
  - en su realeza
  - en su reinado
  lexicon: HALOT
  rationale: מַלְכוּת puede abarcar reino, reinado o realeza. Aquí ‘reino’ resulta natural y suficientemente amplio para el establecimiento de la autoridad real de David.
- source_word: עִם כָּל יִשְׂרָאֵל
  english_pob_choice: together with all Israel
  chosen_spanish: junto con todo Israel
  alternatives_spanish:
  - con todo Israel
  - al lado de todo Israel
  lexicon: HALOT
  rationale: ‘Junto con’ expresa bien la idea de acompañamiento y acción concertada. ‘Todo Israel’ conserva el alcance colectivo del hebreo.
- source_word: לְהַמְלִיכוֹ
  english_pob_choice: to make him king
  chosen_spanish: para hacerlo rey
  alternatives_spanish:
  - para coronarlo rey
  - para hacerle rey
  lexicon: HALOT
  rationale: El hiphil de מלך significa hacer rey a alguien. ‘Hacerlo rey’ es directo, claro y fiel; ‘coronarlo’ añadiría una imagen que el hebreo no exige.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: דבר se conserva como ‘palabra’, manteniendo el vínculo formal con la declaración divina. Se usa ‘Yahvé’ para el Tetragrámaton, conforme al criterio del proyecto.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: concerning Israel
  chosen_spanish: acerca de Israel
  alternatives_spanish:
  - sobre Israel
  - respecto de Israel
  lexicon: HALOT
  rationale: Con דבר, עַל puede significar ‘acerca de’ o ‘concerniente a’. ‘Acerca de Israel’ evita la posible lectura espacial o de dominio y sigue la lectura contextual del POB en inglés.
theological_decisions:
- issue: Modo de describir el apoyo de los ‘valientes’ a David
  english_pob_reading: political-military support for David's accession
  chosen_spanish_reading: apoyo político-militar a la entronización de David
  alternative_spanish_readings:
  - fortalecimiento mutuo con David
  - acompañamiento de David
  rationale: El contexto inmediato habla de hacer rey a David. Por eso la frase se traduce como adhesión firme a su causa real, manteniendo el matiz reflexivo del verbo sin ocultar la dimensión histórica y política del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance de בְמַלְכוּתוֹ
  english_pob_reading: during/in relation to David's royal rule
  chosen_spanish_reading: en su reino
  alternative_spanish_readings:
  - en su reinado
  - en su realeza
  rationale: ‘Reino’ permite abarcar tanto el ámbito como el ejercicio de la realeza sin forzar una decisión más estrecha de lo que el hebreo exige en este contexto de establecimiento del gobierno davídico.
  doctrine_reference: Translation philosophy §5, §6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en español, evitando la sustitución por un título. Esto mantiene la transparencia respecto del Tetragrámaton y coincide con la política terminológica del proyecto.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que recuperó una formulación más cercana al reflexivo hebreo הַמִּתְחַזְּקִים עִמּוֹ. La versión española conserva ese carácter reflexivo (‘se fortalecieron con él’) y, al mismo tiempo, mantiene una lectura natural en español. También se respetó la decisión auditada de traducir יְהוָה por Yahvé en el texto principal, con la relación semántica de עַל יִשְׂרָאֵל como ‘acerca de Israel’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, en consonancia con los defaults del proyecto.
  - Se usa ‘valientes’ para הַגִּבּוֹרִים, evitando ‘mighty men’ como calco y conservando el grupo técnico de David.
  - ‘Hacerlo rey’ conserva la fuerza del hiphil de לְהַמְלִיכוֹ sin introducir coronación explícita.
  - Se optó por ‘acerca de Israel’ en la nota, pero en el texto principal se integró ‘conforme a la palabra de Yahvé acerca de Israel’ para fluidez y claridad.
  - La puntuación y el registro buscan ser bíblicos y contemporáneos sin recurrir a arcaísmos innecesarios.
