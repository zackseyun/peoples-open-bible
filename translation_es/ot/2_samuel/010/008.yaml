translation:
  language: es
  text: Entonces los hijos de Amón salieron y se dispusieron para la batalla a la entrada de la puerta, mientras Aram de Sobá y Rejob y los hombres de Tob[a] y Maacá estaban aparte en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ish-tob». El hebreo אִישׁ טוֹב puede traducirse «los hombres de Tob» o entenderse como el nombre de lugar «Ish-tob».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - vinieron
  lexicon: HALOT
  rationale: יצא en narración militar expresa salir hacia el lugar del combate. «Salieron» es natural en español y conserva la dirección del movimiento sin añadir matices innecesarios.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Ammón
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea «hijos de Amón», que mantiene la transparencia del etnónimo. «Amonitas» sería más idiomático, pero menos cercano a la forma del texto.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  english_pob_choice: drew up for battle
  chosen_spanish: se ordenaron para la batalla
  alternatives_spanish:
  - se alinearon para la batalla
  - se dispusieron para la guerra
  lexicon: HALOT
  rationale: ערך con מלחמה describe formar líneas u organizarse militarmente. «Se ordenaron para la batalla» comunica esa disposición táctica de manera clara y sobria.
- source_word: פֶּתַח הַשָּׁעַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - a la entrada de la puerta de la ciudad
  - en la entrada de la puerta
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» o «umbral», y שַׁעַר puede referirse a la puerta/portón de la ciudad. «Puerta» conserva el término general sin sobreexplicar más de lo que el hebreo dice.
- source_word: וַאֲרַם צוֹבָא
  english_pob_choice: Aram of Zobah
  chosen_spanish: Aram de Sobá
  alternatives_spanish:
  - Aram de Zobá
  - los arameos de Sobá
  lexicon: HALOT
  rationale: Se translitera אֲרַם como «Aram», siguiendo la convención del proyecto. «Sobá» refleja la vocalización española de צֹבָא y evita la forma tradicionalizante «Siria».
- source_word: וּרְחוֹב
  english_pob_choice: and Rehob
  chosen_spanish: y Rejob
  alternatives_spanish:
  - y Rehob
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Rejob» adapta la grafía a la pronunciación española más probable, sin cambiar el referente.
- source_word: וְאִישׁ טוֹב
  english_pob_choice: and the men of Tob
  chosen_spanish: y los hombres de Tob
  alternatives_spanish:
  - y Ish-tob
  - y los de Ish-tob
  lexicon: HALOT
  rationale: La secuencia hebrea permite entender un contingente procedente de Tob. Se sigue la lectura que traduce el grupo como procedencia geográfica, coherente con la nota textual del POB en inglés.
- source_word: וּמַעֲכָה
  english_pob_choice: and Maacah
  chosen_spanish: y Maacá
  alternatives_spanish:
  - y Maaca
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible en español.
- source_word: לְבַדָּם
  english_pob_choice: were by themselves
  chosen_spanish: estaban aparte
  alternatives_spanish:
  - estaban solos
  - estaban separados
  lexicon: HALOT
  rationale: La expresión indica separación respecto del otro bloque militar. «Estaban aparte» es breve y transmite la independencia posicional sin agregar interpretación.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: שָׂדֶה es «campo» o «campo abierto». Se eligió «en el campo» por ser más fiel y menos interpretativo que «campo abierto».
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB en inglés, que prefirió «in the field» sobre una expansión interpretativa. Aquí se refleja esa misma sobriedad con «en el campo», y se mantiene la tensión textual de אִישׁ טוֹב como posible lectura de procedencia («los hombres de Tob») sin imponer la forma alternativa Ish-tob en el texto principal.
  spanish_consistency_notes:
  - Se usó «Aram» y no «Siria» para mantener la transliteración del etnónimo.
  - Se prefirió «hijos de Amón» conforme a la forma hebrea, no «amonitas» en el texto principal.
  - 'Se mantuvieron los nombres propios con grafía española consistente: Sobá, Rejob, Tob, Maacá.'
  - «En el campo» preserva la concisión del hebreo y coincide con la revisión inglesa final.
  - La nota al pie marca solo una alternativa real del sintagma locativo; no se añadió nota para la lectura alternativa de אִישׁ טוֹב porque el texto español ya opta por la lectura de «los hombres de Tob» y la decisión queda explicada en la matriz lexical.
