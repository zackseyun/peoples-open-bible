translation:
  language: es
  text: Y ustedes, llenen[a] la medida de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «completen la plena medida de los pecados de sus padres». El griego dice literalmente: «llenen la medida de sus padres», usando una metáfora de culpa acumulada que llega a su límite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: La conjunción se conserva de forma directa para mantener la continuidad retórica con el contexto inmediato y reflejar la coordinación del griego.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. En español, 'ustedes' comunica de manera natural la apelación directa a los oyentes; la fuerza enfática queda sugerida por la colocación inicial y el contexto.
- source_word: πληρώσατε
  english_pob_choice: fill up
  chosen_spanish: llenen
  alternatives_spanish:
  - llenen por completo
  - completen
  - colm(en)
  lexicon: BDAG
  rationale: El aoristo imperativo plural exige una forma exhortativa. 'Llenen' conserva la imagen de llevar algo hasta su medida plena y permite mantener la tensión irónica/judicial del mandato sin convertirlo en mera predicción.
- source_word: τὸ μέτρον
  english_pob_choice: the measure
  chosen_spanish: la medida
  alternatives_spanish:
  - la medida completa
  - la medida plena
  lexicon: BDAG
  rationale: Se mantiene el sustantivo literal para preservar la metáfora cuantificada del texto. No se expande a 'plena' en el cuerpo principal para no interpretar de más el sintagma.
- source_word: τῶν πατέρων ὑμῶν
  english_pob_choice: of your fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  - de sus padres ancestrales
  lexicon: BDAG
  rationale: '''Padres'' reproduce la literalidad de πατέρων y conserva la continuidad retórica con la acusación sobre la línea de sus predecesores. En español, ''sus'' puede referirse naturalmente al grupo interpelado y evita repetir innecesariamente el pronombre.'
theological_decisions:
- issue: Imperativo versus lectura predictiva/irónica
  english_pob_reading: 'Imperative command with ironic/judicial force: ''fill up the measure of your fathers.'''
  chosen_spanish_reading: 'Imperativo con fuerza irónica/judicial: ''llenen la medida de sus padres.'''
  alternative_spanish_readings:
  - están llenando la medida de sus padres
  - llenarán la medida de sus padres
  rationale: La morfología griega es un aoristo imperativo plural, por lo que la traducción principal debe conservar la forma de mandato. En contexto, el mandato funciona como denuncia y juicio, no como simple instrucción neutral; la redacción española mantiene esa tensión sin suavizarla.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el guion largo para una puntuación más fluida, pero mantuvo el imperativo y la metáfora literal. La presente propuesta sigue esa línea y la adapta al español con una forma imperativa natural y una metáfora igualmente transparente.
  spanish_consistency_notes:
  - Se usa 'Y' para καὶ, siguiendo la coordinación simple del griego.
  - Se conserva 'medida' para μέτρον y no se sustituye por una paráfrasis interpretativa en el texto principal.
  - '''Padres'' traduce πατέρων de manera literal; ''antepasados'' queda solo como alternativa en nota por ser más interpretativo.'
  - La nota [a] se ancla en 'llenen' para registrar la alternativa lexical sin sobrecargar el texto principal.
