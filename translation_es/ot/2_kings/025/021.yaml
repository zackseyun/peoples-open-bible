translation:
  language: es
  text: El rey de Babilonia los golpeó y les dio muerte en Ribla, en la tierra de Hamat[a]. Así, Judá fue llevado al exilio[b] de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los mató». El hebreo usa dos verbos en secuencia: primero «golpeó» y luego «dio muerte».'
    reason: lexical_alternative
  - marker: b
    text: O «Judá fue deportado de su tierra» o «Judá fue al exilio de su tierra». El verbo hebreo puede traducirse de forma activa o pasiva según el contexto; la pasiva destaca el traslado forzado al exilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck them down
  chosen_spanish: los golpeó
  alternatives_spanish:
  - los hirió
  - los derribó
  - los golpeó hasta dejarlos caídos
  lexicon: HALOT
  rationale: נכה expresa el acto de golpear o herir; en este contexto va seguido de otro verbo que explicita la muerte, así que en español conviene no absorber ambas acciones en un solo verbo. «Los golpeó» conserva la violencia del primer verbo y deja la muerte para el segundo.
- source_word: וַיְמִיתֵם
  english_pob_choice: put them to death
  chosen_spanish: los hizo morir
  alternatives_spanish:
  - los mató
  - los ejecutó
  - los hizo ejecutar
  lexicon: HALOT
  rationale: 'El hifil de מות tiene fuerza causativa: ‘hacer morir / causar la muerte’. «Los hizo morir» conserva esa causalidad sin añadir una especificación judicial que el hebreo no exige.'
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey de Babilón
  - el soberano de Babilonia
  lexicon: HALOT
  rationale: Construcción nominal directa y natural en español; «Babilonia» mantiene el nombre geográfico-político sin alterar el referente.
- source_word: בְּרִבְלָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblá
  - en Riblat
  lexicon: HALOT
  rationale: 'Como topónimo, la forma breve «Ribla» es clara y idiomática en español bíblico. La preposición «en» funciona bien para el lugar del hecho y evita una calca menos natural con «a». '
- source_word: בְּאֶרֶץ חֲמָת
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Hamat
  alternatives_spanish:
  - en el territorio de Hamat
  - en la región de Hamat
  lexicon: HALOT
  rationale: «Tierra de Hamat» reproduce de manera directa la frase geográfica y conserva el matiz territorial del hebreo; «Hamat» es la transliteración estándar del topónimo.
- source_word: וַיִּגֶל
  english_pob_choice: was taken into exile
  chosen_spanish: fue llevado al exilio
  alternatives_spanish:
  - fue desterrado
  - fue deportado
  - entró en el exilio
  lexicon: HALOT
  rationale: En contexto de deportación nacional, la pasiva refleja correctamente el sentido forzado del verbo גלה. «Fue llevado al exilio» conserva la idea de traslado coercitivo sin convertirla en una interpretación demasiado libre.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - el pueblo de Judá
  - el reino de Judá
  lexicon: HALOT
  rationale: El nombre propio puede funcionar metonímicamente para el pueblo o el reino; mantener «Judá» preserva la compacidad del hebreo y su ambigüedad referencial.
- source_word: מֵעַל אַדְמָתוֹ
  english_pob_choice: from its land
  chosen_spanish: fuera de su tierra
  alternatives_spanish:
  - de su tierra
  - de sobre su suelo
  - fuera de su suelo
  lexicon: HALOT
  rationale: אדמה puede significar suelo, terreno o tierra; aquí el contexto exílico favorece «tierra». La preposición compuesta «fuera de» comunica la expulsión y el alejamiento territorial implícitos en el hebreo.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo masorético de 2 Reyes 25:21 y mantiene la distinción verbal que el audit trail inglés destacó entre «golpear» y «hacer morir». También conserva el valor pasivo/deportativo de וַיִּגֶל y la ambigüedad metonímica de «Judá».
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se mantuvo la duplicación verbal como rasgo estilístico y semántico del hebreo, sin fusionar ambas acciones en un solo verbo.
  - «Judá» se conserva como nombre colectivo/metonímico, conforme al contexto exílico.
  - «Tierra de Hamat» y «Ribla» siguen una transliteración bíblica estable y legible en español.
