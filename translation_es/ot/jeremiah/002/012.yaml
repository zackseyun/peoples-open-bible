translation:
  language: es
  text: ¡Espántense[a], cielos, ante esto; tiemblen, queden completamente desolados, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Asómbrense ante esto, cielos; estremézcanse, queden muy devastados». Los verbos hebreos son vívidos y parcialmente superpuestos, y expresan sobresalto, horror y desolación.'
