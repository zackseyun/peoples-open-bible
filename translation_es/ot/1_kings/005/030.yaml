    text: 'Hebreo: «el pueblo», aquí referido a la mano de obra empleada en el proyecto.'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige tres puntos principales: reemplaza una expresión española poco natural («los jefes de los supervisores») por «los principales delegados», que refleja mejor el inglés auditado ''chief deputies'' y el sentido administrativo hebreo; sustituye el calco «estaban sobre la obra» por «estaban a cargo de la obra»; y cambia «gobernaban sobre» por «tenían autoridad sobre», que preserva la fuerza de רדה sin sonar indebidamente político. Se mantienen las notas léxicas necesarias y el orden de marcadores presente en el texto inglés auditado.'
