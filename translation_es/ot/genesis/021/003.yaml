translation:
  language: es
  text: Y Abraham llamó el nombre de su hijo[a] que le nació, que Sara dio a luz para él[b], Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Y Abraham nombró a su hijo que le nació, que Sara dio a luz para él, Isaac».'
    reason: lexical_alternative
  - marker: b
