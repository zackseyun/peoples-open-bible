translation:
  language: es
  text: ¿Y qué haría yo cuando Dios se levante? ¿Y cuando me llame a cuentas[a], qué le respondería?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me visite» / «me examine». El verbo hebreo puede significar visitar, inspeccionar o llamar a cuentas; el contexto favorece la idea de responsabilidad judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה
  english_pob_choice: And what
  chosen_spanish: ¿Y qué
  alternatives_spanish:
  - ¿Qué entonces
  - ¿Y qué entonces
  lexicon: HALOT
  rationale: La conjunción inicial mantiene el hilo retórico del hebreo y el tono de auto-pregunta abrupta; en español, ‘¿Y qué…?’ suena natural y conserva la fuerza conectiva.
- source_word: אֶעֱשֶׂה
  english_pob_choice: would I do
  chosen_spanish: haría yo
  alternatives_spanish:
  - haré yo
  - debería hacer yo
  lexicon: HALOT
  rationale: En la pregunta retórica, el imperfecto expresa una acción hipotética o potencial; ‘haría yo’ reproduce bien esa modalidad en español.
- source_word: כִּי יָקוּם אֵל
  english_pob_choice: when God rises up
  chosen_spanish: cuando Dios se levante
  alternatives_spanish:
  - cuando Dios se ponga en pie
  - cuando Dios se alce
  lexicon: HALOT
  rationale: יָקוּם conserva la imagen corporal de levantarse/alzarse. ‘Se levante’ es natural en español y no elimina el matiz de acción judicial insinuado por el contexto.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֵל es aquí el título divino común; ‘Dios’ es la equivalencia directa y plenamente adecuada.
- source_word: וְכִי יִפְקֹד
  english_pob_choice: And when he calls me to account
  chosen_spanish: Y cuando me llame a cuentas
  alternatives_spanish:
  - Y cuando me visite
  - Y cuando me examine
  lexicon: HALOT
  rationale: פקד puede significar visitar, inspeccionar o llamar a rendir cuentas. El contexto paralelo con la respuesta esperada favorece el sentido judicial; ‘llame a cuentas’ comunica esa idea de modo natural en español.
- source_word: מָה אֲשִׁיבֶנּוּ
  english_pob_choice: what would I answer him
  chosen_spanish: qué le respondería
  alternatives_spanish:
  - qué le contestaría
  - qué podría responderle
  lexicon: HALOT
  rationale: La forma causativa de שוב aquí funciona idiomáticamente como ‘responder’. ‘Le respondería’ mantiene el paralelismo y el matiz hipotético.
theological_decisions:
- issue: Imagen judicial de Dios y sentido de פקד
  english_pob_reading: Render the verse as Job imagining God's arising and calling him to account in judgment, without specifying final judgment only.
  chosen_spanish_reading: Traducir el versículo como la reflexión de Job ante la posibilidad de que Dios se levante y le pida cuentas, sin concretarlo como juicio final escatológico.
  alternative_spanish_readings:
  - cuando me visite
  - cuando me examine
  - cuando Dios venga a juzgarme
  rationale: El hebreo permite varios matices para פקד. El contexto inmediato favorece la responsabilidad forense, pero no obliga a una precisión doctrinal adicional; ‘llame a cuentas’ preserva esa tensión.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincido con el apunte del POB en inglés: no conviene debilitar פקד a un simple ‘visitar’ ni cerrarlo de más en un juicio final. La versión española conserva la ambigüedad controlada mediante ‘llame a cuentas’, con nota alternativa para ‘me visite’ / ‘me examine’.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֵל, conforme al valor del título divino en este versículo.
  - Se mantiene el estilo de pregunta retórica con ‘¿Y qué…?’ y el condicional ‘haría / respondería’ para reproducir el carácter hipotético del hebreo.
  - El marcador de nota [a] se ancla en ‘me’ dentro de ‘me llame a cuentas’ para asociarla con la alternativa verbal principal.
