translation:
  language: es
  text: porque me han abandonado y se han postrado ante Astarté[a], el dios de los sidonios, ante Quemos, el dios de Moab, y ante Milcom[b], el dios de los amonitas, y no han andado en mis caminos, para hacer lo recto ante mis ojos y mis estatutos y mis juicios, como David, su padre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la diosa de los sidonios'. El hebreo dice literalmente 'el dios de los sidonios', aunque Astarté es una deidad femenina.
    reason: lexical_alternative
  - marker: b
    text: Milcom es la lectura del texto hebreo aquí; algunos asocian este nombre con Moloc.
    reason: alternative_reading
  - marker: c
    text: '''Su padre'' aquí se refiere a David como antepasado dinástico, no al padre biológico inmediato de Salomón.'
    reason: cultural_note
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces la razón de la acción divina con una causalidad natural y clara en español, sin endurecer el tono con un giro arcaico.
- source_word: עֲזָבוּנִי
  english_pob_choice: they have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: עָזַב en contexto de pacto expresa abandono infiel; en español, 'abandonado' conserva la gravedad sin sonar forzado.
- source_word: וַיִּשְׁתַּחֲווּ
  english_pob_choice: and bowed down
  chosen_spanish: y se han postrado
  alternatives_spanish:
  - y se han inclinado
  - y han adorado
  lexicon: HALOT
  rationale: El verbo denota postración física en acto de culto; 'postrarse' preserva el gesto y la carga idolátrica mejor que una simple 'adoración' interpretativa.
- source_word: לְעַשְׁתֹּרֶת
  english_pob_choice: to Ashtoreth
  chosen_spanish: ante Astarté
  alternatives_spanish:
  - ante Ashtoret
  - ante Astarte
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del nombre de la deidad, sin perder el carácter propio del nombre. 'Ante' funciona bien con el verbo de postración.
- source_word: אֱלֹהֵי צִדֹנִין
  english_pob_choice: the god of the Sidonians
  chosen_spanish: la diosa de los sidonios
  alternatives_spanish:
  - el dios de los sidonios
  - la diosa de Sidón
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'el dios de los sidonios', el contexto de Astarté exige explicitar el referente femenino en español para no oscurecer el sentido; la tensión léxica se mantiene en nota.
- source_word: לִכְמוֹשׁ
  english_pob_choice: to Chemosh
  chosen_spanish: ante Quemos
  alternatives_spanish:
  - ante Quemós
  lexicon: HALOT
  rationale: Nombre propio transliterado en una forma española comprensible y estable.
- source_word: אֱלֹהֵי מוֹאָב
  english_pob_choice: the god of Moab
  chosen_spanish: la diosa de Moab
  alternatives_spanish:
  - el dios de Moab
  lexicon: HALOT
  rationale: Mantiene la coherencia con el género implícito del nombre de la deidad en el contexto inmediato, aunque el constructo hebreo sea gramaticalmente masculino.
- source_word: וּלְמִלְכֹּם
  english_pob_choice: and to Milcom
  chosen_spanish: y ante Milcom
  alternatives_spanish:
  - y ante Moloc
  lexicon: HALOT
  rationale: Se conserva la lectura hebrea Milcom en el texto principal; la alternativa tradicional se reserva para la nota, como en el audit trail.
- source_word: אֱלֹהֵי בְנֵי עַמּוֹן
  english_pob_choice: the god of the Ammonites
  chosen_spanish: la diosa de los hijos de Amón
  alternatives_spanish:
  - el dios de los hijos de Amón
  - la diosa de los ammonitas
  lexicon: HALOT
  rationale: Se vierte de modo coherente con la explicitación del referente cultual en español, manteniendo la designación étnica de la fuente.
- source_word: וְלֹא הָלְכוּ בִדְרָכַי
  english_pob_choice: and have not walked in my ways
  chosen_spanish: y no han andado en mis caminos
  alternatives_spanish:
  - y no han caminado en mis caminos
  - y no han vivido conforme a mis caminos
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico 'andar en mis caminos', natural y bien asentado en español bíblico, sin hacerlo más explicativo de lo que el hebreo requiere.
- source_word: לַעֲשׂוֹת הַיָּשָׁר בְּעֵינַי
  english_pob_choice: to do what is right in my eyes
  chosen_spanish: para hacer lo recto ante mis ojos
  alternatives_spanish:
  - para hacer lo que es recto a mis ojos
  - para hacer lo justo ante mis ojos
  lexicon: HALOT
  rationale: '''Lo recto'' preserva la categoría evaluativa del hebreo y suena natural en español; ''ante mis ojos'' refleja el modismo sin suavizarlo.'
- source_word: וְחֻקֹּתַי
  english_pob_choice: and my statutes
  chosen_spanish: y mis estatutos
  alternatives_spanish:
  - y mis decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es la correspondencia usual para חֻקִּים y mantiene consistencia jurídica con el resto del versículo.'
- source_word: וּמִשְׁפָּטַי
  english_pob_choice: and my judgments
  chosen_spanish: y mis juicios
  alternatives_spanish:
  - y mis sentencias
  - y mis ordenanzas
  lexicon: HALOT
  rationale: '''Juicios'' conserva la fuerza judicial/legal de מִשְׁפָּטִים y distingue este término de ''estatutos'' sin forzar una paráfrasis.'
- source_word: כְּדָוִד אָבִיו
  english_pob_choice: like David his father
  chosen_spanish: como David, su padre
  alternatives_spanish:
  - como David, su antepasado
  - como hizo David, su padre
  lexicon: HALOT
  rationale: El hebreo usa lenguaje de filiación dinástica; 'su padre' funciona en español con la misma amplitud semítica y evita restringirlo a paternidad biológica inmediata.
theological_decisions:
- issue: ¿Cómo verter el nombre de la deidad sidonia Ashtoreth junto con el constructo hebreo 'el dios de los sidonios'?
  english_pob_reading: the god of the Sidonians
  chosen_spanish_reading: la diosa de los sidonios
  alternative_spanish_readings:
  - el dios de los sidonios
  - la diosa de Sidón
  rationale: El hebreo conserva una forma masculina en constructo, pero el referente es la deidad femenina Ashtoreth. En español, 'la diosa de los sidonios' comunica el sentido sin ocultar el problema textual; la tensión del original se documenta en la nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identidad de Milcom
  english_pob_reading: Milcom is the reading of the Hebrew text here; some associate this name with Molech.
  chosen_spanish_reading: Milcom en el texto principal, con nota sobre Moloc
  alternative_spanish_readings:
  - Moloc
  - Molec
  rationale: Se respeta la lectura masorética y se preserva la asociación tradicional en nota, evitando resolverla por sustitución en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Lectura de 'andar en mis caminos' y el tricolon legal final
  english_pob_reading: have not walked in my ways, to do what is right in my eyes and my statutes and my judgments
  chosen_spanish_reading: no han andado en mis caminos, para hacer lo recto ante mis ojos y mis estatutos y mis juicios
  alternative_spanish_readings:
  - no han andado en mis caminos, para hacer lo recto a mis ojos y guardar mis estatutos y mis juicios
  - no han andado en mis caminos, haciendo lo recto ante mis ojos
  rationale: El hebreo une un solo infinitivo con tres complementos; el español puede sostener esa estructura con 'para hacer', sin introducir verbos ausentes ni perder la secuencia legal del original.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene el infinitivo final como ''para hacer'' sin añadir ''guardar'' ni otro verbo no explicitado, y conserva la lectura hebrea de Milcom con su alternativa tradicional en nota. También atiende la tensión textual sobre Ashtoreth/Astarté y el constructo hebreo de ''el dios de los sidonios'' mediante una nota explícita.'
  spanish_consistency_notes:
  - 'Se mantiene un registro bíblico moderno y digno, con vocabulario legal coherente: ''caminos'', ''estatutos'', ''juicios''.'
  - Se evita la sustitución automática de nombres divinos por formas de reverencia no requeridas por el hebreo.
  - La puntuación reproduce una sola frase causal larga, conforme al flujo del hebreo y del audit trail en inglés.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente en el texto principal.
