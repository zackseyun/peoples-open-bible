  text: By the abundance of your trade[a], your midst was filled with violence, and you sinned; so I cast you as profane from the mountain of God, and I destroyed you, O guardian cherub[c][b], from the midst of the stones of fire.
  footnotes:
  - marker: a
    text: Or 'your trading' or 'your commerce'; the Hebrew term can also carry the sense of 'trafficking.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I cast you out as defiled.' The Hebrew verb means 'to profane' or 'treat as unholy,' likely with the sense of expulsion from a sacred place.
    reason: lexical_alternative
  - marker: c
    text: Or 'covering cherub.' The Hebrew participle literally means 'covering/overshadowing,' here rendered 'guardian' to express its protective sense.
    reason: lexical_alternative
