id: GEN.31.54
reference: Genesis 31:54
source:
  edition: WLC
  text: וַ/יִּזְבַּ֨ח יַעֲקֹ֥ב זֶ֨בַח֙ בָּ/הָ֔ר וַ/יִּקְרָ֥א לְ/אֶחָ֖י/ו לֶ/אֱכָל לָ֑חֶם וַ/יֹּ֣אכְלוּ לֶ֔חֶם וַ/יָּלִ֖ינוּ בָּ/הָֽר־׃
translation:
  text: Then Jacob offered a sacrifice on the mountain and called his brothers to eat bread[a]. They ate bread and spent the night on the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsmen' or 'his relatives'; the Hebrew 'brothers' can refer more broadly to male kin or associates in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - offered a sacrifice
  - slaughtered for sacrifice
  lexicon: HALOT
  rationale: The verb זבח in sacrificial context means to offer/slaughter as a sacrifice. 'Sacrificed' is concise and natural in English while preserving the cultic sense.
- source_word: זֶבַח
  chosen: a sacrifice
  alternatives:
  - sacrifice
  - sacrificial meal
  lexicon: HALOT
  rationale: The noun repeats and reinforces the sacrificial act. Rendering it explicitly as 'a sacrifice' preserves the Hebrew cognate construction, though smoothed slightly in English. 'Sacrificial meal' is possible by implication but too interpretive for the main text.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - in the hill country
  - on the hill
  lexicon: HALOT
  rationale: הַר normally means 'mountain/hill country.' In this narrative setting, 'on the mountain' best matches the definite form and the repeated location reference.
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - invited
  - summoned
  lexicon: HALOT
  rationale: קרא literally means 'called.' In context it functions as an invitation, but 'called' preserves the source wording while remaining clear.
- source_word: לְאֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his relatives
  lexicon: HALOT
  rationale: אָח can mean literal brothers or broader kin/group associates. Here it likely refers to Jacob's male kin/companions present in the covenant scene. Per translation philosophy, 'brothers' preserves the gendered and source-near wording; broader alternatives are possible but less direct.
- source_word: לֶאֱכָל לָחֶם
  chosen: to eat bread
  alternatives:
  - to eat
  - to share a meal
  lexicon: HALOT
  rationale: The infinitive plus לֶחֶם is literally 'to eat bread,' a common idiom for taking a meal. Keeping 'eat bread' preserves the Hebrew expression; the broader sense of meal-sharing is evident from context.
- source_word: וַיֹּאכְלוּ לֶחֶם
  chosen: They ate bread
  alternatives:
  - They ate
  - They shared a meal
  lexicon: HALOT
  rationale: Again the Hebrew literally says 'they ate bread.' Retaining the phrase preserves the repetition and covenant-meal flavor of the scene.
- source_word: וַיָּלִינוּ
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: לון means to lodge or remain overnight. 'Spent the night' is natural modern English and accurately conveys the action.
