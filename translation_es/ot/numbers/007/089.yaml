translation:
  language: es
  text: Cuando Moisés entró en la tienda de reunión para hablar con él[a], oyó la voz que le hablaba desde encima del propiciatorio[b], que estaba sobre el arca del testimonio, de entre los dos querubines; y le habló[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la voz siendo hablada a él"; el participio hebreo puede entenderse con un matiz ligeramente distinto, aunque "la voz que le hablaba" es la lectura más directa.
    reason: lexical_alternative
  - marker: b
    text: '"Propiciatorio" se refiere a la cubierta del arca, el lugar desde el cual Yahvé hablaba entre los querubines.'
    reason: cultural_note
  - marker: c
    text: 'La cláusula final también podría traducirse de manera más explícita: "y Yahvé le habló"; o más formalmente: "y ella le habló", tomando "la voz" como sujeto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְבֹא
  english_pob_choice: When Moses went into
  chosen_spanish: Cuando Moisés entraba en
  alternatives_spanish:
  - Cuando Moisés iba a entrar en
  - Y cuando Moisés entró en
  lexicon: HALOT
  rationale: El infinitivo con ב introduce una cláusula temporal. En español, el imperfecto "entraba" conserva bien la acción habitual o recurrente en este marco narrativo, sin volver la frase forzada ni perder la fuerza temporal.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la Tienda de Reunión
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: '"Tienda de reunión" reproduce el nombre funcional del santuario sin imponer un término más tradicional que el hebreo aquí no exige. Se evita "tabernáculo" porque añade una capa interpretativa menos inmediata para este verso.'
- source_word: לְדַבֵּר אִתּוֹ
  english_pob_choice: to speak with him
  chosen_spanish: para hablar con él
  alternatives_spanish:
  - para hablarle
  - para conversar con él
  lexicon: HALOT
  rationale: '"Hablar con él" conserva la relación dialogal del hebreo. Se prefirió "con" sobre "a" porque el contexto presenta una conversación, no solo un mensaje unidireccional, aunque el destinatario siga implícito como en el original.'
- source_word: הַקּוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - la voz que hablaba
  lexicon: HALOT
  rationale: En este contexto cultual y con el participio siguiente, "voz" es más preciso que "sonido" y conserva la personificación auditiva del texto. No se reduce a una mera acústica.
- source_word: מִדַּבֵּר
  english_pob_choice: speaking
  chosen_spanish: que le hablaba
  alternatives_spanish:
  - que hablaba
  - siendo hablada
  lexicon: HALOT
  rationale: El participio se entiende de forma activa y modifica a "la voz". En español, "que le hablaba" es natural y mantiene la imagen de una voz activa; la alternativa pasiva se conserva en la nota textual, como en el audit trail inglés.
- source_word: מֵעַל הַכַּפֹּרֶת
  english_pob_choice: from above the mercy seat
  chosen_spanish: desde encima del propiciatorio[b]
  alternatives_spanish:
  - desde arriba del propiciatorio
  - desde sobre la cubierta expiatoria
  lexicon: HALOT
  rationale: '"Propiciatorio" es el equivalente español tradicional del objeto cultual del arca y evita una paráfrasis explicativa. Se añade una nota para aclarar su función como cubierta del arca en este contexto.'
- source_word: אֲרֹן הָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: '"Arca del testimonio" reproduce de cerca el sustantivo hebreo y su sentido legal-covenantal. Se mantiene "testimonio" para no sustituirlo por "pacto", que sería interpretativo.'
- source_word: מִבֵּין שְׁנֵי הַכְּרֻבִים
  english_pob_choice: from between the two cherubim
  chosen_spanish: de entre los dos querubines
  alternatives_spanish:
  - desde entre los dos querubines
  - entre los dos querubines
  lexicon: HALOT
  rationale: '"De entre" conserva mejor el punto de origen espacial del hebreo que un simple "entre". "Querubines" sigue la transliteración estándar para la figura celestial específica, no "querubes".'
- source_word: וַיְדַבֵּר אֵלָיו
  english_pob_choice: and he spoke to him
  chosen_spanish: y le hablaba
  alternatives_spanish:
  - y le habló
  - y él le hablaba
  lexicon: HALOT
  rationale: Se conserva la ambigüedad funcional del sujeto implícito y el flujo narrativo. El imperfecto "hablaba" en español puede reflejar la repetición o continuidad de la comunicación divina, sin cerrar en exceso la identificación del sujeto. La lectura más natural sigue siendo que la voz/Yahvé es el hablante.
theological_decisions:
- issue: Referente de la voz y del último verbo
  english_pob_reading: The pronouns refer to the LORD speaking with/to Moses from above the mercy seat.
  chosen_spanish_reading: La voz que se oye es la del hablante divino; el último "le hablaba" conserva la referencia implícita sin explicitar "Yahvé" en el cuerpo del verso.
  alternative_spanish_readings:
  - y Yahvé le hablaba
  - y la voz le hablaba
  rationale: El texto sitúa el origen de la voz sobre el propiciatorio, entre los querubines, lo que identifica el hablante con la presencia divina. En español conviene mantener la economía del hebreo y no resolver demasiado pronto la referencia, aunque la lectura natural sea divina.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Función cultual de כַּפֹּרֶת
  english_pob_reading: Mercy seat refers to the cover of the ark, the place from which the LORD spoke between the cherubim.
  chosen_spanish_reading: '"Propiciatorio" nombra la cubierta cultual del arca, lugar desde donde Dios se revela entre los querubines.'
  alternative_spanish_readings:
  - cubierta expiatoria
  - asiento de misericordia
  rationale: En español bíblico, "propiciatorio" es el término heredado que mejor preserva la referencia cultual. No se reemplaza por una explicación más larga en el texto principal para no debilitar la precisión ritual del término.
  doctrine_reference: Cultic terminology and sanctuary theology
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el pasaje fuente; la versión inglesa más reciente quedó sin cambios y el cotejo externo informó una concordancia alta con observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" en la nota explicativa, pero el cuerpo del verso deja explícita la voz sin añadir el nombre divino, siguiendo la economía del hebreo y la lectura auditada.
  - '"Querubines" se conserva como transliteración estable; no se castellanizó a una forma popular que podría perder precisión técnica.'
  - '"Propiciatorio" se eligió como término cultual ya establecido en español bíblico para כַּפֹּרֶת, evitando una paráfrasis que diluya el objeto sagrado.'
  - El imperfecto "hablaba" busca reflejar la continuidad de la comunicación y la ambigüedad del hebreo, sin forzar una decisión sintáctica innecesaria.
