translation:
  language: es
  text: Y según la ordenanza de David su padre[a], designó las divisiones de los sacerdotes para su servicio, y a los levitas para sus funciones, para alabar y ministrar delante de los sacerdotes, conforme a lo requerido de cada día[b]; y a los porteros en sus divisiones, para cada puerta; porque así fue el mandamiento de David, el hombre de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘David su antepasado’; ‘padre’ aquí refleja el uso genealógico real de un antecesor.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘según la cosa de un día en su día’, es decir, según lo prescrito o requerido para cada día.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: he appointed
  chosen_spanish: puso
  alternatives_spanish:
  - estableció
  - designó
  - nombró
  lexicon: HALOT
  rationale: El causativo de עמד aquí expresa organizar y colocar personas en funciones. En español, ‘puso’ comunica bien la acción de establecerlos en sus cargos; ‘designó’ o ‘nombró’ también serían posibles, pero ‘puso’ mantiene la simplicidad administrativa del contexto.
- source_word: כְּמִשְׁפַּט
  english_pob_choice: according to the ordinance
  chosen_spanish: según la ordenanza
  alternatives_spanish:
  - conforme al estatuto
  - según la norma
  - de acuerdo con el precepto
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser juicio, regla o disposición prescrita. En este contexto cultico-administrativo, ‘ordenanza’ conserva la idea de un arreglo establecido y autorizado, sin diluir su fuerza normativa.
- source_word: דָּוִיד אָבִיו
  english_pob_choice: David his father
  chosen_spanish: David su padre
  alternatives_spanish:
  - David su antepasado
  - David su ancestro
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘su padre’. En español se puede conservar el giro sin perder claridad. ‘Antepasado’ explicita el sentido genealógico, pero borra la forma del original; por eso se mantiene ‘padre’.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - turnos
  - grupos
  - cursos
  lexicon: HALOT
  rationale: El término designa secciones organizadas de sacerdotes y levitas. ‘Divisiones’ es transparente y refleja bien la distribución institucional del servicio.
- source_word: עַל עֲבֹדָתָם
  english_pob_choice: for their service
  chosen_spanish: para su servicio
  alternatives_spanish:
  - sobre su servicio
  - para su labor
  lexicon: HALOT
  rationale: La preposición con el sustantivo indica asignación dentro de una esfera de servicio. ‘Para su servicio’ expresa con naturalidad esa función cultual.
- source_word: מִשְׁמְרוֹתָם
  english_pob_choice: their duties
  chosen_spanish: sus funciones
  alternatives_spanish:
  - sus responsabilidades
  - sus guardias
  - sus encargos
  lexicon: HALOT
  rationale: El término puede significar encargos, guardias o responsabilidades. ‘Funciones’ comunica el sentido organizativo y evita un tecnicismo que en español sonaría más oscuro aquí.
- source_word: לְהַלֵּל
  english_pob_choice: to praise
  chosen_spanish: para alabar
  alternatives_spanish:
  - para dar alabanza
  - para glorificar
  lexicon: HALOT
  rationale: 'הלל es ‘alabar’. El infinitivo final en español queda bien como finalidad: ‘para alabar’.'
- source_word: וּלְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: ministrar
  alternatives_spanish:
  - servir
  - asistir en el ministerio
  - prestar servicio
  lexicon: HALOT
  rationale: En contexto sacerdotal/levítico, שרת no es mero ‘servir’ genérico sino atención ministerial en el santuario. ‘Ministrar’ preserva esa carga cultual, aunque ‘servir’ sería una alternativa más llana.
- source_word: נֶגֶד הַכֹּהֲנִים
  english_pob_choice: before the priests
  chosen_spanish: delante de los sacerdotes
  alternatives_spanish:
  - en presencia de los sacerdotes
  - ante los sacerdotes
  lexicon: HALOT
  rationale: נֶגֶד significa delante, frente a, en presencia de. ‘Delante de los sacerdotes’ conserva la relación espacial y funcional sin sobrerinterpretar el rol de los levitas.
- source_word: לִדְבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: as each day required
  chosen_spanish: conforme a la exigencia de cada día
  alternatives_spanish:
  - según lo requerido de cada día
  - día por día, según correspondía
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente sería ‘para la cosa de un día en su día’. En español, ‘conforme a la exigencia de cada día’ conserva la idea de requerimiento prescrito sin sonar mecánico.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardianes del acceso
  lexicon: HALOT
  rationale: El cargo templario puede verterse como porteros o porteros/guardianes de puerta. ‘Porteros’ es el equivalente bíblico tradicional en español y resulta claro en este marco institucional.
- source_word: לְשַׁעַר וָשָׁעַר
  english_pob_choice: for each gate
  chosen_spanish: para cada puerta
  alternatives_spanish:
  - puerta por puerta
  - para cada portón
  lexicon: HALOT
  rationale: La expresión distributiva indica cada una individualmente. ‘Puerta’ es más natural en español que una repetición literal de ‘puerta y puerta’, y mantiene el sentido distributivo.
- source_word: מִצְוַת
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - la orden
  - el precepto
  - la instrucción
  lexicon: HALOT
  rationale: En español bíblico, ‘mandamiento’ preserva la autoridad formal del término sin perder inteligibilidad. ‘Orden’ o ‘instrucción’ serían posibles, pero menos marcadas.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el hombre perteneciente a Dios
  lexicon: HALOT
  rationale: Es un título bíblico consolidado para alguien comisionado por Dios. ‘El hombre de Dios’ es la forma más transparente y fiel en español.
theological_decisions:
- issue: Retención de la forma genealógica 'su padre'
  english_pob_reading: Retain 'father' rather than interpretively expanding to 'ancestor.'
  chosen_spanish_reading: Conservar ‘su padre’ sin expandirlo a ‘antepasado’.
  alternative_spanish_readings:
  - su antepasado
  - su ancestro
  - su progenitor
  rationale: No hay una presión doctrinal o contextual que obligue a resolver el hebraísmo. Mantener ‘su padre’ conserva la forma del original y deja visible el uso genealógico-royal del término.
  doctrine_reference: Principio de primacía del texto original y preservación del giro fuente cuando sigue siendo inteligible en español.
translation_notes:
  revision_awareness: Se ha mantenido alta concordancia con el audit trail en inglés. La única tensión relevante es la elección española entre ‘porteros’ y ‘guardianes de la puerta’; se optó por ‘porteros’ por su transparencia bíblica tradicional. También se conservó la ambigüedad genealógica de ‘su padre’ con nota explicativa, y se mantuvo ‘ministrar’ para preservar el matiz cultual de שרת.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefirió ‘hombre de Dios’ como título fijo bíblico coherente con el proyecto.
  - ‘Divisiones’ se usa de forma consistente para מַחְלְקוֹת en contextos de organización levítica/sacerdotal.
  - ‘Mandamiento’ conserva la formalidad de מִצְוַת y armoniza con el tono bíblico del pasaje.
