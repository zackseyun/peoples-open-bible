base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/012/004.yaml
  text: And Judith said to him[a], “As your life lives, my lord[c][b], your slave will not use up what is with me until he has accomplished by my hand what he has planned.”
  footnotes:
  - marker: a
    text: Or more idiomatically, 'As surely as you live, my lord.' The Greek literally says, 'Your life lives.'
    reason: lexical_alternative
  - marker: b
    text: '''The things with me'' likely refers to Judith''s own provisions or food supplies.'
    reason: lexical_alternative
  - marker: c
    text: The subject of 'has accomplished' / 'has planned' is implicit in Greek; in context it is most naturally understood as God acting through Judith.
    reason: alternative_reading
