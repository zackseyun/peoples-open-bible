translation:
  language: es
  text: Pero cuando Lisias vio la derrota de sus propias fuerzas[a], y el valor que había surgido en los hombres de Judas, y cómo estaban listos para vivir o morir noblemente, partió para Antioquía y reclutó tropas extranjeras[b], con la intención de volver a Judea después de hacerse de nuevo más fuerte en número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «la derrota de su propia formación»; en este contexto militar, el sentido natural es la derrota de sus propias fuerzas.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «mercenarios»; el verbo griego subraya ante todo que reclutó extranjeros, sin precisar aquí si eran mercenarios en sentido estricto.
    reason: alternative_reading
lexical_decisions:
- source_word: τροπή
  english_pob_choice: rout
  chosen_spanish: derrota
  alternatives_spanish:
  - desbandada
  - desbaratamiento
  lexicon: LSJ
  rationale: En contexto militar, con σύνταξις/‘force’, el sentido es una derrota decisiva de la formación o ejército. ‘Derrota’ comunica bien el resultado bélico en español sin añadir una imagen demasiado idiomática.
- source_word: σύνταξις
  english_pob_choice: force
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - formación
  - hueste
  lexicon: LSJ
  rationale: El audit trail inglés revisó ‘formation’ a ‘force’ por naturalidad contextual. En español, ‘ejército’ expresa de forma natural el conjunto militar de Lisias y evita la rigidez de ‘formación’.
- source_word: θάρσος
  english_pob_choice: boldness
  chosen_spanish: valor
  alternatives_spanish:
  - audacia
  - courage
  - denuedo
  lexicon: LSJ
  rationale: El griego puede ser ‘valor’, ‘coraje’ o ‘audacia’. ‘Valor’ es claro y digno en español; mantiene la fuerza moral del pasaje sin sonar excesivamente coloquial.
- source_word: τῆς δὲ Ἰούδα τὸ γεγενημένον θάρσος
  english_pob_choice: the boldness that had arisen in Judas’s men
  chosen_spanish: el valor que había surgido en los hombres de Judas
  alternatives_spanish:
  - el valor de Judas
  - el valor que había surgido en Judas y los suyos
  lexicon: LSJ
  rationale: 'Sigo la aclaración del POB inglés: el plural posterior muestra que el valor pertenece al grupo de Judas, no solo al individuo Judas. ‘Los hombres de Judas’ hace explícito el referente sin sobreinterpretar.'
- source_word: ἕτοιμοι εἶεν ἢ ζῆν ἢ τεθνάναι γενναίως
  english_pob_choice: they were ready either to live or to die nobly
  chosen_spanish: estaban listos para vivir o morir noblemente
  alternatives_spanish:
  - estaban dispuestos a vivir o a morir con nobleza
  - estaban preparados para vivir o morir valerosamente
  lexicon: LSJ
  rationale: Conservo el paralelismo ‘vivir o morir’ y el adverbio γενναίως con ‘noblemente’, que refleja el tono honorífico del griego y del POB inglés.
- source_word: ἀπῆρεν
  english_pob_choice: he departed
  chosen_spanish: partió
  alternatives_spanish:
  - se marchó
  - se retiró
  lexicon: LSJ
  rationale: Verbo narrativo simple de salida. ‘Partió’ es natural y sobrio en español bíblico contemporáneo.
- source_word: ἐξενολόγει
  english_pob_choice: recruited foreign troops
  chosen_spanish: reclutó tropas extranjeras
  alternatives_spanish:
  - reclutó mercenarios
  - alistó extranjeros
  lexicon: LSJ
  rationale: El griego enfatiza la incorporación de extranjeros; ‘tropas extranjeras’ mantiene esa fuerza sin convertir la opción interpretativa en certeza absoluta sobre mercenarios.
- source_word: πλεοναστὸν πάλιν γενηθέντα
  english_pob_choice: after becoming stronger in number
  chosen_spanish: después de hacerse más numeroso en fuerza
  alternatives_spanish:
  - después de aumentar de nuevo en número
  - después de fortalecerse en número
  lexicon: LSJ
  rationale: La frase apunta a aumento numérico previo al regreso. ‘Hacerse más numeroso en fuerza’ intenta conservar tanto el incremento como la dimensión militar, aunque suena algo más formal que una paráfrasis libre.
- source_word: παραγίνεσθαι εἰς τὴν Ἰουδαίαν
  english_pob_choice: to come again into Judea
  chosen_spanish: volver otra vez a Judea
  alternatives_spanish:
  - ir de nuevo a Judea
  - regresar a Judea
  lexicon: LSJ
  rationale: ‘Volver otra vez’ reproduce el valor de ‘again’ y la idea de reanudar la campaña hacia Judea.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de ‘formation’ a ‘force’ para una expresión más natural en contexto. La versión española toma en cuenta esa revisión y evita ‘formación’ como calco principal, pero mantiene la distinción militar del pasaje. No se registran cambios doctrinales.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Mantuve ‘Judea’ como topónimo estándar coherente con la serie de 1 Macabeos.
  - Conservé el tono narrativo sobrio y bélico, sin añadir explicaciones devocionales.
  - No empleé ‘Cristo’ ni terminología teológica ajena al pasaje.
