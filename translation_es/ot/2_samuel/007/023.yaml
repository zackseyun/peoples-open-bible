base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/023.yaml
  text: And who is like your people[a], like Israel, the one nation on the earth whom God went to redeem for himself as a people, to make a name for himself, and to do great and fearsome things for your land before your people, whom you redeemed for yourself from Egypt[b], from nations and their gods?
  footnotes:
  - marker: a
    text: Or 'great and awesome things.' The Hebrew term can denote deeds that inspire awe, dread, or fear.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in Hebrew; alternatively, 'from Egypt, the nations and its god' or 'from Egypt, nations and gods.'
    reason: alternative_reading
