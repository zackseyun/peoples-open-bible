translation:
  language: es
  text: Pero los hijos de Israel caminaron sobre tierra seca en medio del mar, y las aguas eran un muro[a] para ellos a su derecha y a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las aguas eran un muro para ellos»; algunos entienden esto como «como un muro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  english_pob_choice: But the sons of Israel
  chosen_spanish: Pero los hijos de Israel
  alternatives_spanish:
  - Y los hijos de Israel
  - Pero los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión familiar y nacional literal בני ישראל con «hijos de Israel», que en español resulta natural y fiel. «Pero» refleja bien el giro contrastivo del contexto narrativo, como en el inglés POB.
- source_word: הָלְכ֥וּ
  english_pob_choice: walked
  chosen_spanish: caminaron
  alternatives_spanish:
  - fueron
  - anduvieron
  lexicon: HALOT
  rationale: הלך aquí describe el avance a pie; «caminaron» comunica el movimiento humano y mantiene la imagen narrativa sin introducir matices innecesarios.
- source_word: בַ/יַּבָּשָׁ֖ה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - sobre tierra firme
  - sobre suelo seco
  lexicon: HALOT
  rationale: יבשה se refiere a tierra seca o seca firme. «Sobre tierra seca» es claro en español y conserva el contraste milagroso con el mar.
- source_word: בְּ/ת֣וֹךְ הַ/יָּ֑ם
  english_pob_choice: through the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - a través del mar
  - por en medio del mar
  lexicon: HALOT
  rationale: בתוך expresa la idea de estar en medio/por el centro. «En medio del mar» es una formulación natural en español y mantiene la escena sin sobrecargarla con una calca.
- source_word: וְ/הַ/מַּ֤יִם
  english_pob_choice: and the waters
  chosen_spanish: y las aguas
  alternatives_spanish:
  - y el agua
  lexicon: HALOT
  rationale: El hebreo usa plural; «las aguas» preserva el número y la imaginería dramática mejor que el singular colectivo.
- source_word: לָ/הֶם֙
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: La preposición ל indica relación o referencia; en español, el dativo «les» expresa con naturalidad que el muro de aguas estaba en relación con ellos.
- source_word: חֹמָ֔ה
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una pared
  - como un muro
  lexicon: HALOT
  rationale: חומה designa un muro o pared defensiva. «Muro» funciona bien en español bíblico y comunica la fuerza visual de la barrera acuática.
- source_word: מִֽ/ימִינָ֖/ם
  english_pob_choice: on their right
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a la derecha de ellos
  - por su derecha
  lexicon: HALOT
  rationale: מן con ימין indica posición lateral. «A su derecha» es la forma más natural y equilibrada en español.
- source_word: וּ/מִ/שְּׂמֹאלָֽ/ם
  english_pob_choice: and on their left
  chosen_spanish: y a su izquierda
  alternatives_spanish:
  - y a la izquierda de ellos
  - y por su izquierda
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la cláusula anterior mediante «y a su izquierda», una expresión clara y simétrica en español.
theological_decisions:
- issue: Preservación de la imagen milagrosa de las aguas como barrera
  english_pob_reading: the waters were a wall to them
  chosen_spanish_reading: las aguas les fueron un muro
  alternative_spanish_readings:
  - las aguas fueron como un muro para ellos
  - las aguas les sirvieron de muro
  rationale: El hebreo afirma directamente que las aguas eran muro para ellos, sin comparativo explícito. «Les fueron un muro» conserva la fuerza del enunciado y evita debilitarlo con un «como» no presente en el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Mantenimiento del valor étnico-familiar de בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: Se retiene la formulación literal y relacional del hebreo, en línea con la decisión del POB inglés de conservar «sons of Israel» frente a una etnia más plana. En español, «hijos de Israel» es inteligible y respeta la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios en la última pasada de revisión; por eso se adopta una solución española estable, directa y publicada, sin introducir lecturas nuevas no apoyadas por el hebreo ni por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para conservar la expresión hebrea בני ישראל.
  - «Muro» se usa para חומה, respetando la imagen literal sin añadir un comparativo en el texto principal.
  - «Mar» se prefiere aquí como equivalente natural de הים; el contexto bíblico en español admite esta forma sin perder precisión.
  - La sintaxis española conserva el paralelismo de derecha/izquierda y la estructura narrativa del versículo.
