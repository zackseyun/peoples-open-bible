translation:
  language: es
  text: Y el tirano Antíoco también ha sido castigado en la tierra[a], y es castigado eternamente; porque no pudo en absoluto obligar a los habitantes de Jerusalén a adoptar costumbres extranjeras y a apartarse de las costumbres de sus padres,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es castigado eternamente» o «es castigado con castigos eternos». El griego tiene una expresión elíptica con «eternas» y no explicita el sustantivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τύραννος
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - rey
  - gobernante
  lexicon: LSJ
  rationale: τύραννος tiene una carga evaluativa negativa en el contexto; 'tirano' conserva mejor esa fuerza que 'rey' o 'gobernante', que sonarían más neutrales.
- source_word: τετιμώρηται
  english_pob_choice: has been punished
  chosen_spanish: ha sido castigado
  alternatives_spanish:
  - ha pagado la pena
  - ha sido vengado
  lexicon: LSJ
  rationale: El perfecto expresa una acción punitiva ya cumplida con relevancia presente. 'Ha sido castigado' es natural en español y mantiene el sentido pasivo.
- source_word: ἀϊδίων
  english_pob_choice: eternally
  chosen_spanish: eternamente
  alternatives_spanish:
  - con castigos eternos
  - con cosas eternas
  lexicon: LSJ
  rationale: El adjetivo aparece de forma elíptica. 'Eternamente' comunica el valor adverbial que la revisión inglesa finalmente adoptó, sin añadir un sustantivo no explícito.
- source_word: κολάζεται
  english_pob_choice: is punished
  chosen_spanish: es castigado
  alternatives_spanish:
  - es atormentado
  - es afligido
  lexicon: LSJ
  rationale: El presente pasivo indica castigo continuado. 'Es castigado' es amplio y no especifica indebidamente el modo del castigo.
- source_word: οὐδὲν οὐδαμῶς ἴσχυσεν
  english_pob_choice: was utterly unable
  chosen_spanish: no pudo en absoluto
  alternatives_spanish:
  - no tuvo poder alguno
  - de ningún modo prevaleció
  lexicon: LSJ
  rationale: La doble negación intensifica la imposibilidad. 'No pudo en absoluto' reproduce bien esa fuerza en español.
- source_word: ἀναγκάσαι
  english_pob_choice: to compel
  chosen_spanish: obligar
  alternatives_spanish:
  - forzar
  - coaccionar
  lexicon: LSJ
  rationale: El infinitivo denota hacer que otros actúen por presión. 'Obligar' resulta claro y suficientemente formal en español.
- source_word: τοὺς Ἱεροσολυμείτας
  english_pob_choice: the people of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los jerusalemitas
  - la gente de Jerusalén
  lexicon: LSJ
  rationale: '''Habitantes de Jerusalén'' es transparente y fiel. ''Jerusalemitas'' existe, pero suena menos natural en español contemporáneo.'
- source_word: ἀλλοφυλῆσαι
  english_pob_choice: to adopt foreign ways
  chosen_spanish: a adoptar costumbres extranjeras
  alternatives_spanish:
  - a hacerse de otra nación
  - a vivir como extranjeros
  lexicon: LSJ
  rationale: El verbo apunta a asimilarse a prácticas ajenas, no solo a mudarse. 'Costumbres extranjeras' expresa la dimensión cultural y religiosa del contexto.
- source_word: τῶν πατρίων ἐθνῶν
  english_pob_choice: their fathers' customs
  chosen_spanish: las costumbres de sus padres
  alternatives_spanish:
  - las costumbres ancestrales
  - las prácticas de sus padres
  lexicon: LSJ
  rationale: La expresión es comprimida en griego; la revisión inglesa dejó explícitas las costumbres. En español, 'las costumbres de sus padres' conserva la referencia ancestral sin sobrecargar con 'nación'.
- source_word: ἐκδιαιτηθῆναι
  english_pob_choice: to depart from the customs of
  chosen_spanish: apartarse de
  alternatives_spanish:
  - abandonar las costumbres de
  - separarse de
  lexicon: LSJ
  rationale: El verbo implica separarse o desentenderse de un modo de vida. 'Apartarse de' es idiomático y mantiene la idea de alejamiento.
theological_decisions:
- issue: Alcance del castigo de Antíoco más allá de la tierra
  english_pob_reading: The verse affirms ongoing punishment beyond earthly punishment, without over-defining its mechanism.
  chosen_spanish_reading: El versículo afirma un castigo continuo más allá del castigo en la tierra, sin precisar su mecanismo.
  alternative_spanish_readings:
  - es castigado con castigos eternos
  - es castigado eternamente en sentido pleno
  rationale: El griego yuxtapone el castigo terrenal con un castigo continuo usando una expresión elíptica. La traducción española conserva esa tensión sin suplir un sustantivo que no está explícito.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del contexto inglés: se prefirió un adverbio equivalente a ἀϊδίων («eternamente») en vez de una construcción nominal más literal, y se mantuvo una formulación sobria para ἐκδιαιτηθῆναι («apartarse de»). También se respetó la continuidad sintáctica de la frase con coma final, como en el griego.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero no aparece en este versículo.
  - Se usó 'tirano' para τύραννος por su carga moral negativa; no se suavizó a 'rey' ni 'gobernante'.
  - Se evitó 'Cristo' y otros términos no pertinentes al pasaje.
  - La nota al pie se ancló solo en 'eternamente' porque ahí está la elipsis relevante del griego.
