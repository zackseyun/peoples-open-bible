base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/022.yaml
  text: Then Araunah said to David[a], “Let my lord the king take and offer up what is good in his eyes. Look, the oxen are for the burnt offering[b], and the threshing sledges and the implements of the oxen are for the wood.”
  footnotes:
  - marker: a
    text: Or 'whatever seems good to him.' The Hebrew idiom is literally 'the good in his eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the equipment of the oxen.' The Hebrew phrase is broad and may refer generally to the oxen’s wooden gear used as fuel.
    reason: lexical_alternative
