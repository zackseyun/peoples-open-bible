translation:
  language: es
  text: Entonces las naciones que queden alrededor de ustedes sabrán que yo, Yahvé, he reconstruido los lugares arruinados y he plantado lo desolado. Yo, Yahvé, he hablado, y lo haré.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then ... will know
  chosen_spanish: Entonces ... sabrán
  alternatives_spanish:
  - Y ... sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: El waw en este contexto introduce consecuencia y avance discursivo tras las promesas de restauración; «Entonces» conserva ese desarrollo natural, y «sabrán» expresa bien el futuro de conocimiento resultante.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel, el término designa a las naciones vecinas. «Las naciones» es la opción más directa y no carga un contraste religioso posterior que el hebreo aquí no exige.
- source_word: אֲשֶׁר יִשָּׁאֲרוּ סְבִיבוֹתֵיכֶם
  english_pob_choice: that remain around you
  chosen_spanish: que queden alrededor de ustedes
  alternatives_spanish:
  - que permanezcan alrededor de ustedes
  - que hayan quedado a su alrededor
  lexicon: HALOT
  rationale: El nifal de נשׁאר expresa quedar o permanecer como remanente. «Que queden alrededor de ustedes» conserva la idea de supervivencia/resto y su entorno circundante con buen español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto para el Tetragrámaton, se usa «Yahvé» como nombre propio divino, no una sustitución por título.
- source_word: בָּנִיתִי הַנֶּהֱרָסוֹת
  english_pob_choice: have rebuilt the ruined places
  chosen_spanish: he reconstruido las ruinas
  alternatives_spanish:
  - he edificado las ruinas
  - he levantado las ruinas
  lexicon: HALOT
  rationale: El verbo en contexto de restauración puede expresarse naturalmente como «reconstruido». «Las ruinas» conserva la idea de lugares derruidos sin añadir «lugares» de forma innecesaria en español.
- source_word: נָטַעְתִּי הַנְּשַׁמָּה
  english_pob_choice: have planted what was desolate
  chosen_spanish: he plantado lo desolado
  alternatives_spanish:
  - he plantado lo que estaba desolado
  - he plantado la tierra desolada
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/participio sustantivado colectivo. «Lo desolado» mantiene la amplitud del original sin especificar «tierra» más allá de lo que exige el texto.
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  english_pob_choice: have spoken, and I will do it
  chosen_spanish: he hablado, y lo haré
  alternatives_spanish:
  - he hablado, y lo hago
  - he hablado y lo he hecho
  lexicon: HALOT
  rationale: La fórmula profética une la palabra ya pronunciada con la certeza de su cumplimiento. En español, «lo haré» comunica con claridad esa fuerza futura/segura sin perder el contraste con «he hablado».
theological_decisions:
- issue: Nombre divino יְהוָה en un oráculo de restauración
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo presenta el nombre propio del pacto, no un título genérico. Mantener «Yahvé» preserva la referencia directa al Nombre divino que habla y actúa en la profecía.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de certeza en דִּבַּרְתִּי וְעָשִׂיתִי
  english_pob_reading: have spoken, and I will do it
  chosen_spanish_reading: he hablado, y lo haré
  alternative_spanish_readings:
  - he hablado y lo he hecho
  - he hablado y lo haré ciertamente
  rationale: Aunque el verbo final es morfológicamente perfecto, en este tipo de fórmula profética comunica la certeza de cumplimiento. «Lo haré» mantiene esa promesa segura sin sugerir que la acción ya estaba consumada.
  doctrine_reference: POB audit trail on prophetic perfect / certainty of fulfillment
translation_notes:
  revision_awareness: Se siguió el sentido revisado del audit trail inglés, que prefirió «planted»/«plantado» en lugar de una idea más fuerte como «replanted». La versión española refleja ese ajuste con «he plantado». También se mantuvo la lectura de cierre profético como promesa segura, equivalente al inglés final «I will do it».
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Las naciones» se conserva como plural geográfico/político, no como «gentiles».
  - El cierre «he hablado, y lo haré» mantiene en español la tensión entre palabra dicha y acción futura segura.
  - Se evitó añadir elementos interpretativos como «re-» en «plantado» para no ir más allá del hebreo.
