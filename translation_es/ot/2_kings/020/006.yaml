translation:
  language: es
  text: Y añadiré quince años a tu vida[a], y te libraré a ti y a esta ciudad de la mano del rey de Asiria, y defenderé[b] esta ciudad por amor de mí mismo y por amor de David, mi siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «sobre tus días». El hebreo conserva la imagen temporal; el español la expresa de forma idiomática como «a tu vida».
    reason: lexical_alternative
  - marker: b
    text: O «protegeré esta ciudad». El verbo hebreo admite la idea de cubrir, proteger o defender.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֹסַפְתִּי
  english_pob_choice: I will add
  chosen_spanish: añadiré
  alternatives_spanish:
  - incrementaré
  - agregaré
  lexicon: HALOT
  rationale: El hebreo יסף en esta forma expresa añadir o aumentar. «Añadiré» conserva la relación directa con la idea de sumar años y suena natural en español bíblico contemporáneo.
- source_word: עַל יָמֶיךָ
  english_pob_choice: to your life
  chosen_spanish: a tu vida
  alternatives_spanish:
  - a tus días
  - a tu duración de vida
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «sobre tus días», pero el contexto pide una formulación clara en español. «A tu vida» comunica el sentido sin perder el valor temporal de la expresión.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: fifteen years
  chosen_spanish: quince años
  lexicon: HALOT
  rationale: Construcción numeral directa y sin tensión semántica.
- source_word: וּמִכַּף מֶלֶךְ אַשּׁוּר
  english_pob_choice: from the hand of the king of Assyria
  chosen_spanish: de la mano del rey de Asiria
  alternatives_spanish:
  - del poder del rey de Asiria
  - del dominio del rey de Asiria
  lexicon: HALOT
  rationale: «Mano» preserva el modismo hebreo de poder o control. Se mantiene la imagen por fidelidad al texto fuente y porque es transparente en español bíblico.
- source_word: אַצִּילְךָ
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  lexicon: HALOT
  rationale: נצל en este contexto político-militar comunica liberación o rescate. «Libraré» reproduce bien la fuerza de salir de un peligro o dominio, sin sobrecargarlo con connotaciones soteriológicas.
- source_word: וְאֵת הָעִיר הַזֹּאת
  english_pob_choice: and this city
  chosen_spanish: y a esta ciudad
  alternatives_spanish:
  - y esta ciudad
  lexicon: HALOT
  rationale: El objeto directo con אֵת queda bien reflejado con la a personal en español. La repetición de «esta ciudad» se conserva porque el hebreo la repite y eso refuerza el énfasis.
- source_word: וְגַנּוֹתִי עַל הָעִיר הַזֹּאת
  english_pob_choice: and I will defend this city
  chosen_spanish: y defenderé esta ciudad
  alternatives_spanish:
  - y protegeré esta ciudad
  - y ampararé esta ciudad
  lexicon: HALOT
  rationale: גנן expresa cubrir/proteger/defender. «Defenderé» encaja bien con el contexto de asedio y preserva el matiz de protección activa.
- source_word: לְמַעֲנִי
  english_pob_choice: for my own sake
  chosen_spanish: por amor de mí mismo
  alternatives_spanish:
  - por mi propia causa
  - por mi propio bien
  lexicon: HALOT
  rationale: La frase expresa motivo centrado en Dios mismo. «Por amor de mí mismo» reproduce la fuerza enfática del posesivo y mantiene un registro bíblico natural en español.
- source_word: וּלְמַעַן דָּוִד עַבְדִּי
  english_pob_choice: and for the sake of my servant David
  chosen_spanish: y por amor de David, mi siervo
  alternatives_spanish:
  - y por causa de David, mi siervo
  - y por el bien de David, mi siervo
  lexicon: HALOT
  rationale: Se conserva el fundamento pactal y la referencia honorífica a David como «mi siervo». «Por amor de» transmite adecuadamente la motivación causal sin desdibujar el paralelo con la primera cláusula.
theological_decisions:
- issue: Motivo divino para la liberación de Ezequías y Jerusalén
  english_pob_reading: for my own sake and for the sake of my servant David
  chosen_spanish_reading: por amor de mí mismo y por amor de David, mi siervo
  alternative_spanish_readings:
  - por mi propia causa y por la causa de David, mi siervo
  - por mi propio bien y por el bien de David, mi siervo
  rationale: El hebreo fundamenta la acción divina en Dios mismo y en David su siervo. La traducción conserva esa doble motivación sin resolverla en una formulación doctrinal posterior ni suavizar la tensión teológica.
  doctrine_reference: Preservar la motivación teocéntrica y pactal del texto.
translation_notes:
  revision_awareness: La base inglesa pasó de «to your days» a «to your life» en una revisión posterior por mayor naturalidad. En español se adoptó directamente una formulación idiomática equivalente («a tu vida») sin abandonar la transparencia con respecto al hebreo subyacente ni las demás decisiones del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos, pero en este versículo el hablante es Dios en primera persona; por ello no se introduce un nombre divino explícito en la cláusula.
  - Se conserva «Asiria» como topónimo histórico estándar en español.
  - «David, mi siervo» mantiene el orden natural español y el valor relacional del hebreo.
  - Se evita «siervo» para el rey asirio, porque aquí no aparece δοῦλος/עבד aplicado a él; el término se reserva para David como en el original.
