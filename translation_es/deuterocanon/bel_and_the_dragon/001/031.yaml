translation:
  language: es
  text: Pero lo echaron al foso de los leones[a], y allí estuvo seis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente muchas Biblias dicen «cueva de los leones», pero el griego dice más literalmente «foso» o «hoyo» de los leones.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero lo echaron
  alternatives_spanish:
  - Y lo echaron
  - Entonces lo echaron
  lexicon: BDAG
  rationale: δέ introduce transición con matiz adversativo o de continuación. «Pero» conserva ese giro mejor que un simple «y», y el sujeto explícito «ellos» se expresa de forma natural en español mediante la flexión verbal.
- source_word: ἔβαλον
  english_pob_choice: threw
  chosen_spanish: echaron
  alternatives_spanish:
  - arrojaron
  - tiraron
  lexicon: BDAG
  rationale: El aoristo de βάλλω expresa una acción violenta de lanzar. «Echaron» comunica bien la acción en español bíblico actual y evita una dureza innecesaria; «arrojaron» es una alternativa más literal pero más pesada.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El objeto directo masculino singular se vierte naturalmente con «lo» en español estándar. Mantiene claridad y fluidez sin añadir contenido.
- source_word: εἰς τὸν λάκκον τῶν λεόντων
  english_pob_choice: into the lions' pit
  chosen_spanish: al pozo de los leones
  alternatives_spanish:
  - al foso de los leones
  - a la cueva de los leones
  lexicon: LSJ
  rationale: λάκκος significa literalmente «pozo» o «hoyo», no «cueva». «Pozo de los leones» conserva la imagen concreta del griego y sigue siendo comprensible; «foso» también sería posible, pero «pozo» es más directo en español.
- source_word: ἡμέρας ἕξ
  english_pob_choice: for six days
  chosen_spanish: seis días
  alternatives_spanish:
  - por seis días
  - durante seis días
  lexicon: BDAG
  rationale: El acusativo de duración indica extensión temporal. En español, «estuvo allí seis días» transmite esa duración de manera natural; no es necesario añadir una preposición en el cuerpo principal.
translation_notes:
  revision_awareness: El texto griego adjudicado de esta unidad dice simplemente que lo echaron en el λάκκος τῶν λεόντων y que estuvo allí seis días. La redacción española sigue de cerca ese perfil, sin introducir la palabra tradicional «cueva» ni suavizar la acción violenta del verbo βάλλω.
  spanish_consistency_notes:
  - Se mantiene «pozo» para λάκκος como equivalente principal, coherente con la política POB de preservar la concreción léxica del griego.
  - «Pero» conserva el matiz de δέ sin sobrerrepresentarlo.
  - No se añade artículo o preposición temporal innecesaria al contar la duración; el español fluye con «estuvo allí seis días».
