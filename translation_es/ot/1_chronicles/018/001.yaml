revisions:
- from: Después de esto[a], David hirió a los filisteos y los sometió, y tomó Gat y sus ciudades dependientes de la mano de los filisteos.
  to: Después de esto[a], David golpeó a los filisteos y los sometió, y tomó Gat y sus ciudades dependientes de manos de los filisteos.
  rationale: Se ajusta «hirió» a «golpeó» para reflejar mejor נכה en un contexto militar colectivo con un español más natural, y se cambia «de la mano de» por «de manos de» para mayor fluidez idiomática sin perder el valor de מִיַּד. Se conserva la nota del modismo «sus hijas».
