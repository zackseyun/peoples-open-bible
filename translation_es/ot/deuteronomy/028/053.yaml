translation:
  language: es
  text: Y comerás el fruto de tu vientre[a], la carne de tus hijos e hijas, que Yahvé tu Dios te dio, en el sitio y en la angustia[b] con que tu enemigo te oprimirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la descendencia de tu cuerpo». Hebreo, literalmente: «el fruto de tu vientre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y en la aflicción» o «y en la angustia extrema».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  english_pob_choice: And you will eat
  chosen_spanish: Y comerás
  alternatives_spanish:
  - Y comerás
  - Y comerás, pues
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto de maldición expresa valor predictivo; en español, el futuro simple comunica bien esa advertencia sin perder la fuerza de certeza.
- source_word: פְרִי בִטְנְךָ
  english_pob_choice: the fruit of your womb
  chosen_spanish: el fruto de tu vientre
  alternatives_spanish:
  - el fruto de tu seno
  - la descendencia de tu cuerpo
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'fruto' y la referencia corporal al 'vientre'. 'Vientre' es una forma natural en español bíblico y mantiene la metáfora sin explicarla de más.
- source_word: בְּשַׂר
  english_pob_choice: the flesh of
  chosen_spanish: la carne de
  alternatives_spanish:
  - la carne humana de
  - el cuerpo de
  lexicon: HALOT
  rationale: En este contexto de canibalismo, 'carne' reproduce bien la dureza literal de בשר. 'Cuerpo' suavizaría demasiado el impacto; 'carne humana' añade una explicitación no presente en el hebreo.
- source_word: בָּנֶיךָ וּבְנֹתֶיךָ
  english_pob_choice: your sons and daughters
  chosen_spanish: tus hijos y de tus hijas
  alternatives_spanish:
  - tus hijos e hijas
  - tus hijos y tus hijas
  lexicon: HALOT
  rationale: El hebreo menciona ambos sexos; en español, 'hijos y de tus hijas' mantiene esa precisión. Se evita generalizar a 'hijos' como término inclusivo único si el texto conserva la duplicación.
- source_word: אֲשֶׁר נָתַן לְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: whom Yahweh your God has given you
  chosen_spanish: que Yahvé tu Dios te habrá dado
  alternatives_spanish:
  - que Yahvé tu Dios te dio
  - que Yahvé, tu Dios, te habrá dado
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio POB. El pluscuamperfecto/futuro compuesto en español refleja adecuadamente el marco profético y la idea de don ya destinado/otorgado en la situación anunciada.
- source_word: בְּמָצוֹר
  english_pob_choice: in the siege
  chosen_spanish: en el sitio de la siega
  alternatives_spanish:
  - en el sitio
  - durante el sitio
  lexicon: HALOT
  rationale: 'Aquí hay una corrección necesaria del texto español: el hebreo indica ''sitio'' o ''asedio'', no ''siega''. Se elige ''sitio'' para seguir el valor semántico de מָצוֹר y evitar una lectura errónea.'
- source_word: וּבְמָצֹוק
  english_pob_choice: and in the distress
  chosen_spanish: y en la angustia
  alternatives_spanish:
  - y en la aflicción
  - y en la estrechez
  lexicon: HALOT
  rationale: '''Angustia'' transmite bien la presión extrema del término, y empareja con ''sitio'' como segundo miembro de la expresión. ''Aflicción'' o ''estrechez'' serían posibles, pero menos idiomáticas aquí.'
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיְבֶךָ
  english_pob_choice: with which your enemy will oppress you
  chosen_spanish: con que tu enemigo te oprimirá
  alternatives_spanish:
  - con que tu enemigo te apretará
  - con que tu enemigo te afligirá
  lexicon: HALOT
  rationale: El hiphil de יציק comunica presión/opresión hostil. 'Oprimirá' recoge bien esa fuerza y mantiene el vínculo causal introducido por la relativa 'con que'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se sigue el default del proyecto para YHWH: ''Yahvé''. Esto preserva el nombre del pacto sin sustituirlo por una máscara devocional como ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Tono profético del verbo 'comerás' y la relación causal de la amenaza
  english_pob_reading: And you will eat ... in the siege and in the distress with which your enemy will oppress you
  chosen_spanish_reading: Y comerás ... en el sitio ... y en la angustia con que tu enemigo te oprimirá
  alternative_spanish_readings:
  - Y comerás ... durante el sitio ...
  - Y comerás ... en el asedio ...
  rationale: Se mantiene el carácter de anuncio de juicio, no de exhortación. 'Sitio' y 'angustia' conservan la doble dimensión física y circunstancial del hebreo.
  doctrine_reference: 'POB translation philosophy: optimal-equivalence'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas aplicadas; la única corrección necesaria en el borrador español es evitar la lectura errónea 'siega' para בְּמָצוֹר, que debe rendirse como 'sitio/asedio'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del Tetragrama.
  - '''Carne'' conserva la crudeza del contexto de canibalismo sin eufemismo.'
  - '''Sitio'' se usa para מָצוֹר; ''angustia'' para מָצוֹק, distinguiendo ambos matices.'
  - Las notas al pie reflejan alternativas legítimas sin duplicar marcadores.
