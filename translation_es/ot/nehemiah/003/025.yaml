revisions:
- from: Palal hijo de Uzai reparó frente al ángulo y la torre que salía de la casa alta del rey[a], que está junto al patio de la guardia[c][b]. Después de él, Pedaías hijo de Parosh reparó.
  to: Palal hijo de Uzai reparó frente al ángulo y la torre sobresaliente de la casa superior del rey[a], que está junto al patio de la guardia[c][b]. Después de él, Pedaías hijo de Parosh reparó.
  rationale: Se ajusta la redacción para que el español suene más natural y arquitectónicamente preciso, sin apartarse del hebreo ni de las decisiones documentadas del English POB. «Torre sobresaliente» comunica mejor la idea de una torre que se proyecta, y «casa superior del rey» mejora la legibilidad frente a «casa alta del rey» manteniendo la alternativa más interpretativa en nota.
