  language: en
  yaml_path: translation/ot/ezekiel/002/006.yaml
  text: But you[a], son of man, do not fear them, and do not fear their words, though briers and thorns are with you and you sit among scorpions. Do not fear their words, and do not be dismayed by their faces[b], for they are a rebellious house.
  footnotes:
  - marker: a
    text: Or possibly, 'though rebels and thorns are with you.' The Hebrew word rendered 'briers' is difficult and has been understood in more than one way, but the surrounding imagery favors a thorny-hazard metaphor.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by their faces'; that is, by their intimidating appearance or presence.
    reason: lexical_alternative
