translation:
  language: es
  text: 'Y David anheló y dijo[a]: «¿Quién me dará agua de beber del pozo de Belén, que está junto a la puerta?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más dinámicamente: «¡Si tan solo alguien me diera agua de beber del pozo de Belén, junto a la puerta!». El hebreo usa «¿Quién...?» como expresión de anhelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַוֶּה
  english_pob_choice: longed
  chosen_spanish: anheló
  alternatives_spanish:
  - deseó
  - sintió gran deseo
  lexicon: HALOT
  rationale: El hitpael de אוה expresa un deseo intenso o anhelo. «Anheló» reproduce bien esa fuerza afectiva en español moderno sin volver la frase demasiado explicativa.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - exclamó
  - dijo para sí
  lexicon: HALOT
  rationale: El verbo básico es el normal «decir». Aunque el contexto comunica un impulso de deseo, el hebreo no añade un marcador reflexivo o enfático; por eso «dijo» conserva el valor llano del texto.
- source_word: מִי
  english_pob_choice: Who will
  chosen_spanish: ¿Quién me dará...?
  alternatives_spanish:
  - ¿Quién podría darme...?
  - ¡Ojalá alguien me diera...!
  lexicon: HALOT
  rationale: La pregunta funciona como expresión de anhelo. En español, una interrogativa con futuro simple resulta natural y mantiene la forma hebrea sin alejarse demasiado del sentido desiderativo.
- source_word: יַשְׁקֵנִי
  english_pob_choice: give me water to drink
  chosen_spanish: me dará a beber
  alternatives_spanish:
  - me dejará beber
  - me dará de beber
  lexicon: HALOT
  rationale: 'El hiphil de שׁקה es causativo: hacer beber / dar de beber. «Me dará a beber» comunica bien la acción causativa y permite que el objeto «agua» complete la expresión de manera natural en español.'
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Correspondencia directa y normal en español. Se mantiene el singular colectivo «agua», como exige el uso idiomático.
- source_word: מִבֹּאר
  english_pob_choice: from the well
  chosen_spanish: del pozo
  alternatives_spanish:
  - de la fuente
  - de la cisterna
  lexicon: HALOT
  rationale: בְּאֵר es propiamente «pozo» o «manantial/pozo cavado» según contexto; aquí «pozo» es la opción más clara y estándar para el lugar de Bethlehem. «Cisterna» sería menos probable por el léxico y el contexto.
- source_word: בֵּית לֶחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: HALOT
  rationale: En español bíblico y eclesial, el topónimo está firmemente establecido como «Belén». Mantiene inteligibilidad y reconoce la forma tradicional del nombre propio en español.
- source_word: אֲשֶׁר בַּשָּׁעַר
  english_pob_choice: that is by the gate
  chosen_spanish: el que está junto a la puerta
  alternatives_spanish:
  - que está junto a la puerta
  - que está a la puerta
  lexicon: HALOT
  rationale: La relación del pozo con la puerta de la ciudad se expresa naturalmente con «junto a la puerta». Se prefiere «puerta» a «portón» para evitar una concreción innecesaria y mantener la claridad del referente urbano.
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail en inglés concuerdan de manera alta; no se detectaron cambios revisionales relevantes en la versión más reciente. La principal decisión en español fue conservar la forma interrogativa del hebreo, con una nota para la lectura más dinámica que expresa el anhelo implícito.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio bíblico «Belén» por uso estable en español.
  - Se usó «pozo» como equivalente principal de בֹּאר, coherente con el contexto y con la decisión inglesa.
  - Se tradujo el valor desiderativo de מִי mediante una pregunta retórica, sin convertirlo directamente en paráfrasis.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el Tetragrámaton en este versículo.
