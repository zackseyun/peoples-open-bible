base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/018.yaml
  text: And Yahweh sent you on a mission and said[a], ‘Go and devote the sinners, the Amalekites, to destruction[b], and fight against them until they are consumed.’
  footnotes:
