    issue: La nota al pie usa 'integridad' en lugar de reflejar más de cerca 'wholeness'.
    rationale: El rastro inglés preserva 'well-being' y 'wholeness'. En español, 'integridad' puede sugerir rectitud moral, creando una ambigüedad nueva. 'Plenitud' ya transmite mejor el sentido de totalidad/bienestar integral.
  revised_spanish_text: No hay paz,[a] dice Yahvé, para los malvados.
  revised_footnotes:
  - marker: a
    text: O “bienestar” o “plenitud”. El hebreo שָׁלוֹם puede abarcar paz, bienestar y plenitud.
