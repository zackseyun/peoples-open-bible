    text: Or 'treacherous Judah, her sister.' The Hebrew adjective can emphasize betrayal or unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'but in falsehood' / 'but falsely,' indicating that Judah's return was insincere rather than wholehearted.
    reason: lexical_alternative
