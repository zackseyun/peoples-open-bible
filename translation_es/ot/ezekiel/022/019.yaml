revisions:
- from: 'Por tanto, así dice el Señor Yahvé: Porque todos ustedes se han convertido en escoria[a], por eso, he aquí, los voy a reunir en medio de Jerusalén.'
  to: 'Por tanto, así dice el Señor, Yahvé: Puesto que todos ustedes se han convertido en escoria[a], por eso he aquí que yo los reuniré en medio de Jerusalén.'
  rationale: Se ajusta el título divino para reflejar mejor אֲדֹנָי יְהוִה en español sin ocultar 'Yahvé'; se mejora la fluidez causal entre יַעַן y לָכֵן; se eleva el registro de la cláusula verbal para conservar la solemnidad profética de הִנְנִי + participio; y se corrige la nota para que quede enteramente en español y mantenga la explicación metalúrgica documentada.
