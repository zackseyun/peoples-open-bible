revisions:
- from: Y escribirás sobre ellas todas las palabras de esta ley cuando cruces[a], para que entres en la tierra que Yahvé tu Dios te da, tierra que fluye leche y miel, tal como Yahvé, el Dios de tus padres[b], te habló.
  to: Y escribirás sobre ellas todas las palabras de esta ley[a] cuando cruces al otro lado, para que entres en la tierra que Yahvé tu Dios te da, una tierra que mana leche y miel, tal como Yahvé, el Dios de tus padres[b], te habló.
  rationale: Se corrige una frase poco natural en español ('fluye leche y miel' -> 'mana leche y miel'), se explicita 'al otro lado' para reflejar mejor el cruce contextualizado por בְּעָבְרֶךָ, y se realinea la nota [a] con la alternativa léxica documentada por el POB para torá. El resto del texto se conserva por ser fiel al hebreo y consistente con la terminología del proyecto.
