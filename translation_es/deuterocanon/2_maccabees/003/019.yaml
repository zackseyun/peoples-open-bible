translation:
  language: es
  text: Y las mujeres, con cilicio[a] ceñido debajo del pecho, llenaban las calles; y las vírgenes que estaban encerradas, unas corrían a las puertas, otras a las murallas, y algunas se asomaban por las ventanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, una vestidura áspera de luto o penitencia; el griego describe que la llevaban ceñida debajo del pecho.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπεζωσμέναι
  english_pob_choice: with ... bound under
  chosen_spanish: ceñido bajo
  alternatives_spanish:
  - atado bajo
  - ajustado bajo
  - ceñido debajo de
  lexicon: LSJ
  rationale: El participio indica estar sujetas o ceñidas por debajo; en español, 'ceñido bajo los pechos' comunica con naturalidad la posición del saco sin perder la imagen corporal del griego.
- source_word: σάκκους
  english_pob_choice: sackcloth
  chosen_spanish: el saco
  alternatives_spanish:
  - saco de cilicio
  - tela de luto
  - saco
  lexicon: LSJ
  rationale: El texto griego nombra el paño áspero de duelo. En español, 'saco' mantiene el valor material y ritual; el contexto de duelo permite entenderlo como vestidura de penitencia sin añadir una glosa excesiva en el texto principal.
- source_word: κατὰ τὰς ὁδοὺς ἐπλήθυνον
  english_pob_choice: were filling the streets
  chosen_spanish: llenaban las calles
  alternatives_spanish:
  - se multiplicaban por las calles
  - colmaban las calles
  - iban llenando las calles
  lexicon: LSJ
  rationale: '''Llenaban las calles'' refleja de forma directa ἐπλήθυνον y conserva la idea de abundancia visible en el espacio público.'
- source_word: κατάκλειστοι
  english_pob_choice: who were shut in
  chosen_spanish: que estaban encerradas
  alternatives_spanish:
  - que estaban recluidas
  - que estaban cerradas dentro
  - que estaban confinadas
  lexicon: LSJ
  rationale: '''Encerradas'' es una equivalencia clara y natural para el estado de estar mantenidas dentro; evita sonar demasiado técnico y conserva la condición social implicada.'
- source_word: παρθένων
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas
  - jóvenes
  - solteras
  lexicon: LSJ
  rationale: '''Vírgenes'' corresponde de manera precisa al término griego y preserva la especificidad social que el texto enfatiza.'
- source_word: συνέτρεχον
  english_pob_choice: were running to
  chosen_spanish: corrían a
  alternatives_spanish:
  - se apresuraban a
  - acudían corriendo a
  - iban corriendo a
  lexicon: LSJ
  rationale: El compuesto describe un movimiento rápido hacia un mismo punto. 'Corrían a' es ágil y fiel, sin sobrecargar el texto con una explicitación que el griego no exige aquí.
- source_word: πυλῶνας
  english_pob_choice: gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - los portones
  - las entradas
  - las puertas monumentales
  lexicon: LSJ
  rationale: '''Puertas'' funciona bien en español para el acceso urbano y mantiene el tono narrativo. Es una opción más natural que ''portones'' en este contexto.'
- source_word: τὰ τείχη
  english_pob_choice: the walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  - las paredes
  - los muros de la ciudad
  lexicon: LSJ
  rationale: '''Muros'' mantiene la referencia defensiva sin imponer un matiz demasiado específico. En español, ''murallas'' también sería posible, pero ''muros'' sigue de cerca el griego general.'
- source_word: διεκύπτον
  english_pob_choice: were peering out
  chosen_spanish: miraban
  alternatives_spanish:
  - asomaban
  - se asomaban
  - miraban hacia fuera
  lexicon: LSJ
  rationale: El verbo describe sacar la vista hacia afuera con curiosidad o ansiedad; 'miraban' requiere el complemento 'por las ventanas' y evita una repetición torpe, aunque la idea de asomarse queda suficientemente sugerida por el contexto.
- source_word: θυρίδων
  english_pob_choice: windows
  chosen_spanish: las ventanas
  alternatives_spanish:
  - los ventanillos
  - las aberturas
  - las celosías
  lexicon: LSJ
  rationale: '''Ventanas'' es la correspondencia más clara y natural para el lector hispanohablante. El griego puede referirse a pequeñas aberturas, pero el sentido básico queda bien comunicado.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'crowding the streets' a 'filling the streets' por mayor correspondencia con ἐπλήθυνον y eliminó 'together' de συνέτρεχον. La versión española sigue esa línea con 'llenaban las calles' y 'corrían a', evitando añadir una idea de 'juntas' que el griego no exige explícitamente.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para reflejar la continuidad narrativa del griego.
  - '''Vírgenes'' conserva la especificidad de παρθένων, en línea con la política del proyecto.'
  - '''Muros'' y ''puertas'' se usan de manera sobria y amplia, sin precisar más allá de lo que exige el contexto.'
  - Las notas a pie de página están ancladas en el texto con los marcadores [a], [b] y [c] exactamente donde corresponden.
