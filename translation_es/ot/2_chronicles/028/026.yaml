translation:
  language: es
  text: Y el resto de sus hechos y todos sus caminos, los primeros y los últimos, he aquí, están escritos en el Libro de los reyes de Judá e Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: En cuanto al resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora bien, el resto de
  lexicon: HALOT
  rationale: יֶׁתֶר introduce el material restante sobre el rey. En español, una apertura como «En cuanto al resto de» conserva la función de transición sin forzar un calco de «Now», que en castellano resultaría menos natural en este encabezamiento regnal.
- source_word: דְּבָרָיו
  english_pob_choice: his acts
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus palabras
  - sus asuntos
  - sus actos
  lexicon: HALOT
  rationale: Aunque דָּבָר puede significar «palabra» o «asunto», en la fórmula historiográfica real alude al conjunto de hechos o gestas del rey. «Hechos» mantiene ese valor amplio y evita la ambigüedad de una traducción demasiado literal como «palabras».
- source_word: וְכָל דְּרָכָיו
  english_pob_choice: and all his ways
  chosen_spanish: y a todos sus caminos
  alternatives_spanish:
  - y a toda su conducta
  - y a todos sus actos
  lexicon: HALOT
  rationale: דֶּרֶךְ literalmente es «camino» y, en este contexto, se refiere al curso de la conducta del rey. «Caminos» conserva la metáfora hebrea; el añadido de la preposición «a» da una construcción natural en español junto con «el resto de sus hechos».
- source_word: הָרִאשֹׁנִים וְהָאַחֲרוֹנִים
  english_pob_choice: the first and the last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - los anteriores y los posteriores
  - de principio a fin
  lexicon: HALOT
  rationale: Se trata de un merismo cronológico convencional. «Los primeros y los últimos» conserva la forma hebrea de manera transparente y suena natural en español, más directamente que una paráfrasis como «de principio a fin».
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - ciertamente están
  - están
  lexicon: HALOT
  rationale: הִנֵּה con sufijo pronominal aporta énfasis deíctico. «He aquí» preserva ese énfasis en un registro bíblico digno, y «están» mantiene el valor verbal sin añadir elementos ajenos al texto.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo significa «escritos». «Escritos» es la correspondencia más directa y funciona bien con la fórmula de referencia documental.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre / en», en la fórmula bibliográfica española lo natural es «en el Libro». «Libro» mantiene la convención de una obra consultada como fuente histórica, sin perder la referencia al documento citado.
- source_word: מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  english_pob_choice: of the Kings of Judah and Israel
  chosen_spanish: de los reyes de Judá e Israel
  alternatives_spanish:
  - de los reyes de Judá y de Israel
  lexicon: HALOT
  rationale: Se trata del título de la fuente citada por Crónicas. Mantener el genitivo con «de los reyes» preserva la estructura del hebreo; «e» ante «Israel» sigue la regla fonética del español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue de cerca la lectura auditada sin necesidad de ajustes por variantes.
  spanish_consistency_notes:
  - Se mantiene la terminología documental de Crónicas con «Libro» como título de fuente.
  - Se evita traducir דְּבָרִים como «palabras» para no perder el sentido historiográfico de hechos/gesta.
  - La fórmula hebrea de cierre se conserva en un castellano natural y publicable, sin suavizar el merismo temporal.
