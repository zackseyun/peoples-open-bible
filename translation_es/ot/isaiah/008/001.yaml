    reason: lexical_alternative
  revision_rationale: Se corrige la transliteración para ajustarla al nombre hebreo auditado y a la decisión del POB. Se reubican las notas en sus anclas semánticas correctas. Además, se mejora levemente la naturalidad y precisión del español con «tablilla» y «estilete», sin apartarse del sentido fuente ni de la filosofía del proyecto.
