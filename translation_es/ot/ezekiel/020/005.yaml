translation:
  language: es
  text: 'Y les dirás[a]: «Así dice el Señor Yahvé: El día en que escogí a Israel, levanté mi mano ante la descendencia de la casa de Jacob y me di a conocer a ellos en la tierra de Egipto; levanté mi mano ante ellos, diciendo: “Yo soy Yahvé, el Dios de ustedes”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levanté mi mano», un modismo que suele usarse para jurar un juramento o hacer una promesa solemne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: And say to them
  chosen_spanish: Y dirás a ellos
  alternatives_spanish:
  - Y les dirás
  - Y dirás a ellos
  lexicon: BDB/HALOT
  rationale: Conservo la forma directiva y el destinatario explícito. «A ellos» mantiene la transparencia del hebreo, aunque «les» sería más idiomático; aquí priorizo la huella del original en un estilo aún natural.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: En español, «Señor» preserva אֲדֹנָי y «Yahvé» preserva el Tetragrámaton sin ocultarlo. Evito «SEÑOR» como máscara tipográfica y también evito «Señor Dios» porque mezclaría la percepción de dos títulos con menor claridad auditiva.
- source_word: בְּיוֹם בָּחֳרִי בְיִשְׂרָאֵל
  english_pob_choice: On the day when I chose Israel
  chosen_spanish: En el día en que escogí a Israel
  alternatives_spanish:
  - El día en que escogí a Israel
  - Cuando escogí a Israel
  lexicon: HALOT
  rationale: «Escogí» conserva la elección/covenantal del verbo בחר. «En el día en que» refleja la expresión temporal del hebreo sin volverla excesivamente solemne o arcaica.
- source_word: וָאֶשָּׂא יָדִי
  english_pob_choice: I lifted up my hand
  chosen_spanish: levanté mi mano
  alternatives_spanish:
  - alzé mi mano
  - levanté mi mano
  - juré
  lexicon: HALOT
  rationale: La imagen hebrea es un gesto de juramento o compromiso solemne. En español, «levanté mi mano» preserva la metáfora de manera clara; «juré» explicaría el sentido pero borraría la forma del original.
- source_word: לְזֶרַע בֵּית יַעֲקֹב
  english_pob_choice: to the offspring of the house of Jacob
  chosen_spanish: a la descendencia de la casa de Jacob
  alternatives_spanish:
  - a la simiente de la casa de Jacob
  - a los descendientes de la casa de Jacob
  lexicon: HALOT
  rationale: «Descendencia» reproduce bien זֶרַע en español bíblico contemporáneo y evita el calco literal «simiente», menos natural. Mantengo «casa de Jacob» por fidelidad a la construcción hebrea.
- source_word: וָאִוָּדַע לָהֶם
  english_pob_choice: and made myself known to them
  chosen_spanish: y me di a conocer a ellos
  alternatives_spanish:
  - y me hice conocer de ellos
  - y me di a conocer a ellos
  - y me revelé a ellos
  lexicon: HALOT
  rationale: «Me di a conocer» comunica la idea de auto-revelación sin forzar el verbo a una formulación más interpretativa como «me revelé». Mantengo el dativo explícito con «a ellos» por transparencia textual.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» conserva אֶרֶץ y el tono narrativo del texto hebreo; «Egipto» a secas sería correcto, pero menos cercano al sintagma original.
- source_word: וָאֶשָּׂא יָדִי לָהֶם לֵאמֹר
  english_pob_choice: I lifted up my hand to them, saying
  chosen_spanish: levanté mi mano a ellos, diciendo
  alternatives_spanish:
  - levanté mi mano hacia ellos, diciendo
  - juré a ellos, diciendo
  lexicon: HALOT
  rationale: Repito la misma imagen para mantener la coherencia del hebreo. «Diciendo» enlaza con la fórmula de juramento/declara­ción sin añadir contenido no explicitado.
- source_word: אֲנִי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: I am Yahweh your God
  chosen_spanish: Yo soy Yahvé, su Dios
  alternatives_spanish:
  - Yo soy Yahvé, vuestro Dios
  - Yo soy Yahvé, su Dios
  lexicon: HALOT
  rationale: «Yo soy Yahvé» conserva la fórmula de autoidentificación divina. Opto por «su Dios» para un español bíblico neutral de tercera persona plural, coherente con el destinatario del discurso indirecto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política española del proyecto exige transliterar el Nombre divino como «Yahvé» en el texto principal. Esto preserva la identidad del Tetragrámaton y evita ocultarlo detrás de una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: 'Traducir ambos elementos ayuda a que el lector perciba la doble referencia del título compuesto: soberanía («Señor») y el Nombre propio («Yahvé»).'
  doctrine_reference: 'DOCTRINE.md: divine title compounds; preservation of auditable distinctions'
- issue: Idiomatic oath gesture וָאֶשָּׂא יָדִי
  english_pob_reading: lifted up my hand
  chosen_spanish_reading: levanté mi mano
  alternative_spanish_readings:
  - juré
  - alzé mi mano
  rationale: El hebreo expresa un gesto idiomático de juramento o compromiso. Mantener la imagen respeta la transparencia del texto y deja el sentido de juramento documentado en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la traducción inglesa preservó la imagen de «lifted up my hand» con nota sobre el sentido de juramento, y la versión española sigue esa misma estrategia de transparencia. No se introdujeron cambios sustanciales frente al análisis recibido, salvo la adaptación al sistema español del proyecto con «Yahvé» y la formulación natural de los títulos divinos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - Se usa «Señor» para אֲדֹנָי, preservando la distinción entre título y Nombre propio.
  - «Levanté mi mano» se repite de manera consistente para el doble hebraísmo de juramento.
  - «Descendencia» se eligió para זֶרַע por naturalidad y fidelidad semántica.
  - El discurso se mantiene en segunda persona singular («dirás») porque así se dirige la comisión profética, con destinatario plural («a ellos»).
