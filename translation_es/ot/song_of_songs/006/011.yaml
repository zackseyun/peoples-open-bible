translation:
  language: es
  text: Bajé al huerto de nogales[a], para ver los brotes en el valle[b], para ver si la vid había retoñado[c], si los granados habían florecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el jardín de nueces” o “el huerto de nueces”. El hebreo probablemente se refiere a una arboleda cultivada de nogales o árboles de nuez.
    reason: lexical_alternative
  - marker: b
    text: “Valle” traduce un término hebreo que también puede referirse a un wadi o lecho de arroyo.
    reason: lexical_alternative
  - marker: c
    text: O “si la vid había florecido”. El verbo hebreo puede abarcar tanto el brotar como el florecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּנַּת אֱגוֹז
  english_pob_choice: the walnut grove
  chosen_spanish: el huerto de nogales
  alternatives_spanish:
  - el jardín de nueces
  - el nogalal
  - el huerto de nueces
  lexicon: HALOT
  rationale: גִּנָּה apunta a un espacio cultivado; en español, 'huerto' comunica mejor que 'jardín' la idea de plantación útil. אֱגוֹז puede referir al nogal o a fruto de nogal; 'nogales' mantiene la imagen de arboleda cultivada y evita la extrañeza de 'nueces' en una expresión espacial.
- source_word: יָרַדְתִּי
  english_pob_choice: I went down
  chosen_spanish: Bajé
  alternatives_spanish:
  - descendí
  - fui hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד conserva el movimiento de descenso. 'Bajé' es la forma natural en español y preserva el sentido direccional sin rigidez.
- source_word: לִרְאוֹת
  english_pob_choice: to look / to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para observar
  - para mirar
  lexicon: HALOT
  rationale: Las dos infinitivas se integran bien en español con 'para ver'. En un verso poético, esta elección conserva la finalidad de la acción sin sobreexplicarla.
- source_word: בְּאִבֵּי הַנָּחַל
  english_pob_choice: the shoots in the valley
  chosen_spanish: los brotes en el valle
  alternatives_spanish:
  - los brotes junto al torrente
  - la vegetación nueva en el cauce
  - los brotes en el wadi
  lexicon: HALOT
  rationale: אִבִּים son brotes o crecimiento tierno. נַחַל puede ser valle, torrente o lecho de arroyo; 'valle' es la solución más natural y sigue la decisión inglesa, aunque 'torrente' o 'wadi' también serían posibles según el contexto poético.
- source_word: הֲפָרְחָה הַגֶּפֶן
  english_pob_choice: whether the vine had budded
  chosen_spanish: si la vid había retoñado
  alternatives_spanish:
  - si la vid había brotado
  - si la vid había florecido
  lexicon: HALOT
  rationale: פָּרַח puede cubrir brotar, retoñar o florecer. 'Retoñado' conserva la idea de aparición temprana de vida vegetal y diferencia esta línea de la siguiente, donde el hebreo usa otro verbo.
- source_word: הֵנֵצוּ הָרִמֹּנִים
  english_pob_choice: whether the pomegranates had blossomed
  chosen_spanish: si los granados habían florecido
  alternatives_spanish:
  - si las granadas habían florecido
  - si los granados habían dado flor
  lexicon: HALOT
  rationale: נוץ refiere a echar flor. En español, 'granados' mantiene el arbusto/árbol como sujeto, como en el hebreo metonímico, y 'habían florecido' comunica bien la imagen poética.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso auditado del POB en inglés y conserva las mismas tres tensiones léxicas principales: גִּנַּת אֱגוֹז, נַחַל y el contraste verbal entre פָּרַח y נוץ. No se detectaron revisiones aplicadas en el registro inglés más reciente.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético de tres propósitos con "para ver".
  - Se evita "SEÑOR" u otra terminología no pertinente; no hay vocabulario teológico explícito en el verso.
  - '"Nogales" y "granados" conservan el sujeto vegetal metonímico del hebreo mejor que una paráfrasis genérica.'
