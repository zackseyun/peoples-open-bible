translation:
  language: es
  text: ¡Lamenta, ciprés[a], porque cayó el cedro, porque los majestuosos[b] han sido destruidos! ¡Lamenten, robles de Basán, porque el bosque denso[c] ha venido abajo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abeto» por «ciprés».
    reason: lexical_alternative
  - marker: b
    text: O «los poderosos» o «los nobles».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea final también puede entenderse como «el bosque inaccesible» o «el bosque fortificado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילֵל / הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Lamenta! / ¡Lamentad!
  alternatives_spanish:
  - ¡Aúlla! / ¡Aullad!
  - ¡Llora! / ¡Llorad!
  - ¡Clama de duelo! / ¡Clamad de duelo!
  lexicon: HALOT
  rationale: El hebreo pide un lamento imperativo de duelo o alarma. En español, «lamentar» en imperativo transmite un tono profético y elegíaco natural, sin la aspereza de «aullar» y sin perder el llamado a duelo.
- source_word: בְּרוֹשׁ
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - abeto
  - enebro
  lexicon: HALOT
  rationale: Siguiendo la decisión léxica inglesa de «cypress», «ciprés» es el equivalente español claro y corriente, apto para la serie arbórea del versículo.
- source_word: נָפַל
  english_pob_choice: has fallen
  chosen_spanish: cayó
  alternatives_spanish:
  - ha caído
  - fue derribado
  lexicon: HALOT
  rationale: El verbo básico expresa caída. En español poético, «cayó» mantiene la brevedad y la imagen sin añadir causalidad que el hebreo no dice explícitamente.
- source_word: אֶרֶז
  english_pob_choice: cedar
  chosen_spanish: cedro
  alternatives_spanish:
  - cedro del Líbano
  lexicon: HALOT
  rationale: «Cedro» es la forma española estándar para אֶרֶז. El contexto poético de grandeza y fortaleza se conserva sin sobreespecificar más allá del texto.
- source_word: אַדִּרִים
  english_pob_choice: the majestic ones
  chosen_spanish: los majestuosos
  alternatives_spanish:
  - los poderosos
  - los nobles
  lexicon: HALOT
  rationale: El sustantivo/adjetivo apunta a lo noble, imponente o majestuoso. «Los majestuosos» conserva el tono elevado y permite mantener la metáfora arbórea sin interpretarla de forma explícita.
- source_word: שֻׁדָּדוּ
  english_pob_choice: have been destroyed
  chosen_spanish: han sido destruidos
  alternatives_spanish:
  - han sido devastados
  - han sido arruinados
  lexicon: HALOT
  rationale: La pasiva comunica ruina violenta. «Destruidos» es amplio y natural en español, y preserva la fuerza del juicio sin concretar más de lo que el texto exige.
- source_word: אַלּוֹנֵי בָשָׁן
  english_pob_choice: oaks of Bashan
  chosen_spanish: encinos de Basán
  alternatives_spanish:
  - robles de Basán
  - terebintos de Basán
  lexicon: HALOT
  rationale: En español latinoamericano, «encino» es una opción natural para el árbol fuerte de la expresión. Se conserva la referencia geográfica y la imagen de árboles prestigiosos de Basán.
- source_word: יָרַד
  english_pob_choice: has come down
  chosen_spanish: ha descendido
  alternatives_spanish:
  - ha bajado
  - ha caído
  lexicon: HALOT
  rationale: «Descender» reproduce mejor el matiz de ir hacia abajo que el inglés POB conserva con «has come down», y encaja con el movimiento de abatimiento en la imagen del bosque.
- source_word: יַעַר
  english_pob_choice: forest
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - maleza
  - arboleda
  lexicon: HALOT
  rationale: «Bosque» es el equivalente directo y sobrio en español. Mantiene la imaginería de una masa arbórea sin introducir una noción más específica que el hebreo no exige.
- source_word: ה/בצור
  english_pob_choice: the thick / inaccessible / fortified
  chosen_spanish: denso
  alternatives_spanish:
  - inaccesible
  - fortificado
  - espeso
  lexicon: HALOT
  rationale: La expresión final es difícil; el inglés POB opta por «thick forest» para expresar densidad e inaccessibilidad. En español, «denso» da una solución idiomática y preserva esa ambigüedad productiva.
theological_decisions:
- issue: Si el lenguaje arbóreo debe explicitarse como referencia a líderes o poderes humanos
  english_pob_reading: Retain the arboreal imagery in the translation without making the metaphor explicit
  chosen_spanish_reading: Conservar la imaginería arbórea sin explicitar que se trata de gobernantes o poderes
  alternative_spanish_readings:
  - Traducir interpretativamente con referencia a gobernantes o nobles
  - Reescribir la imagen en términos humanos
  rationale: El hebreo presenta árboles de manera directa y poética. La traducción mantiene esa tensión interpretativa, dejando que la metáfora funcione sin resolverla en el texto principal.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó confirmado como de alta concordancia y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo la metáfora de árboles y bosque sin añadir una interpretación explícita sobre líderes humanos.
  - Se prefirió un registro profético-poético claro y moderno, sin calcos innecesarios.
