translation:
  language: es
  text: El sonido del martillo golpea su oído[a], y sus ojos están puestos en la forma de la vasija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «resuena en su oído». El verbo griego es difícil en este contexto y puede sugerir el impacto repetido del ruido del martillo sobre el oído del artesano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: LSJ
  rationale: En el contexto de σφύρης ('martillo'), φωνή se refiere al sonido audible producido por el trabajo del herrero o artesano. 'Sonido' conserva el foco sensorial sin forzar un valor de 'voz' que aquí sería impropio.
- source_word: σφύρης
  english_pob_choice: hammer
  chosen_spanish: martillo
  alternatives_spanish:
  - mazo
  lexicon: LSJ
  rationale: El genitivo nombra la herramienta de la que procede el sonido. 'Martillo' es el término natural y directo en español para esta imagen artesanal.
- source_word: καινεῖ
  english_pob_choice: strikes
  chosen_spanish: golpea
  alternatives_spanish:
  - sigue golpeando
  - resuena en
  lexicon: LSJ
  rationale: El verbo es difícil en este contexto; la revisión inglesa optó por una forma más directa ('strikes') para reflejar el impacto del sonido en el oído. 'Golpea' mantiene esa fuerza percutiva sin añadir interpretaciones excesivas. La nota textual preserva la alternativa de 'resuena en' como posibilidad semántica.
- source_word: τὸ οὖς αὐτοῦ
  english_pob_choice: his ear
  chosen_spanish: su oído
  alternatives_spanish:
  - su oreja
  - su audición
  lexicon: LSJ
  rationale: El griego usa el singular concreto; 'oído' conserva la referencia corporal y funciona bien con el impacto del sonido. 'Oreja' sería más coloquial y 'audición' más abstracta.
- source_word: κατέναντι
  english_pob_choice: 'on'
  chosen_spanish: puestos en
  alternatives_spanish:
  - frente a
  - ante
  lexicon: LSJ
  rationale: La imagen no es meramente espacial; expresa atención fija. 'Están puestos en' comunica que los ojos están concentrados sobre el objeto, siguiendo la intención de la lectura inglesa revisada ('on the form of the vessel').
- source_word: ὁμοιώματος
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - modelo
  - semejanza
  lexicon: LSJ
  rationale: ὁμοίωμα aquí designa la forma o configuración del objeto que se está haciendo. 'Forma' es fiel y no introduce la expansión interpretativa que tendría 'modelo'.
- source_word: σκεύους
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: LSJ
  rationale: En español, 'vaso' puede sonar limitado a un vaso para beber, pero también puede designar un recipiente hecho por un artesano. Mantiene la brevedad del original y el tono de objeto fabricado; 'vasija' sería una alternativa más explícita, aunque algo más específica.
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus miradas
  lexicon: LSJ
  rationale: Se conserva literalmente la imagen corporal del texto griego para mantener el paralelismo con 'su oído' y la concentración del artesano.
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó 'keeps striking' a 'strikes' y sustituyó 'pattern' por 'form' para acercarse más al griego. Esta versión española sigue esa revisión, pero conserva una nota para el valor alternativo del verbo difícil y traduce ὁμοίωμα con 'forma' en vez de una palabra más interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera del versículo porque no aparece vocabulario divino en el texto.
  - Se evita 'señor' o lenguaje eclesiástico no motivado por el griego.
  - Se conserva un registro sobrio y artesanal, acorde con la imagen del trabajador manual.
