    issue: Ambigüedad en la cláusula relativa final
    rationale: En 'las torturas de tu coerción[b], que también venció el anciano instructor', el relativo 'que' no deja claro en español que el antecedente son las torturas. El griego ἃς retoma inequívocamente τὰς βασάνους.
  - severity: low
    issue: Participio algo pesado en español
    rationale: '''Habiendo despreciado'' es correcto, pero suena más calco que español natural en este contexto exhortativo. ''Despreciando'' o ''tras despreciar'' conserva bien la relación participial con mejor fluidez.'
