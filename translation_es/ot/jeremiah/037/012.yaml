translation:
  language: es
  text: Jeremías salió de Jerusalén para ir a la tierra de Benjamín[a], para recibir allí su parte entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reclamar su parte allí entre el pueblo». El infinitivo hebreo לַחֲלִק es difícil, y los intérpretes discrepan entre la idea de recibir una porción asignada, dividir bienes o reclamar una parte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El hebreo expresa salida desde un lugar; «salió» conserva el movimiento direccional desde Jerusalén sin añadir matices no requeridos.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición marca separación del lugar de origen; «de Jerusalén» es natural en español y fiel al valor locativo.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para viajar
  lexicon: HALOT
  rationale: El infinitivo indica propósito. «Para ir» es simple, directo y suficientemente formal.
- source_word: אֶרֶץ בִּנְיָמִן
  english_pob_choice: the land of Benjamin
  chosen_spanish: la tierra de Benjamín
  alternatives_spanish:
  - el territorio de Benjamín
  - la región de Benjamín
  lexicon: HALOT
  rationale: «Tierra» conserva bien el sentido regional o tribal de אֶרֶץ y suena idiomático en español bíblico sin forzar tecnicismos.
- source_word: לַחֲלִק
  english_pob_choice: to receive his portion
  chosen_spanish: recibir su parte
  alternatives_spanish:
  - recibir su porción
  - reclamar su parte
  - tomar su parte
  lexicon: HALOT
  rationale: La forma es difícil y el contexto admite una idea de obtener una porción o parte. «Recibir su parte» es prudente y mantiene abierta la tensión lexical sin sobreespecificar.
- source_word: מִשָּׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - de allí
  lexicon: HALOT
  rationale: El adverbio señala el lugar donde se recibe la parte. En español, «allí» funciona con naturalidad en la frase «recibir allí su parte».
- source_word: בְּתוֹךְ הָעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en medio del pueblo
  - entre la gente
  lexicon: HALOT
  rationale: La expresión literal es «en medio de». «Entre el pueblo» conserva el sentido relacional y suena más fluido en español; «pueblo» mantiene el colectivo humano del hebreo.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español junto a la palabra o frase pertinente. Se mantuvo la prudencia lexical para לַחֲלִק, reflejando la dificultad reconocida en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Benjamín» como nombre tribal/regional, coherente con el hebreo.
  - Se prefirió «tierra» para אֶרֶץ en vez de «territorio» para mantener un registro bíblico natural en español.
  - «Pueblo» traduce הָעָם de forma colectiva y no militar, en línea con el contexto y el juicio del audit trail inglés.
  - La nota [a] queda anclada al segmento problemático y no introduce terminología ajena al texto.
