translation:
  language: es
  text: El temor de Yahvé lleva a la vida[a], y quien lo tiene descansará satisfecho[b]; no será visitado por ningún daño[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "es para vida"; el hebreo es muy conciso y puede traducirse de manera más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "pasará la noche satisfecho" o "dormirá satisfecho".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "no lo visitará el mal" o "no le sobrevendrá desgracia". Aquí "mal" se refiere a calamidad o daño, no a mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  - temor reverente
  lexicon: HALOT
  rationale: El constructo יִרְאַת con יהוה expresa temor reverente y piedad de pacto. En español, 'temor' conserva mejor el peso semántico de 'fear' que 'reverencia', que puede sonar más débil, y evita la reducción a miedo servil.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado conforme al criterio del proyecto para יהוה, evitando la sustitución por un título. 'Yahvé' es la forma española estable y readable para el Tetragrámaton.
- source_word: לְחַיִּים
  english_pob_choice: leads to life
  chosen_spanish: lleva a la vida
  alternatives_spanish:
  - es para vida
  - conduce a la vida
  - lleva a vivir
  lexicon: HALOT
  rationale: La preposición ל con חַיִּים puede expresar dirección o resultado. 'Lleva a la vida' conserva la fuerza resultativa en español sin forzar una paráfrasis demasiado amplia.
- source_word: וְשָׂבֵעַ
  english_pob_choice: satisfied
  chosen_spanish: satisfecho
  alternatives_spanish:
  - lleno
  - saciado
  - contento
  lexicon: HALOT
  rationale: El predicado adjetival expresa plenitud/satisfacción. 'Satisfecho' comunica bien la idea de estar lleno y en paz en un contexto de reposo, más natural que 'lleno'.
- source_word: יָלִין
  english_pob_choice: will rest
  chosen_spanish: descansará
  alternatives_spanish:
  - pasará la noche
  - dormirá
  - morará
  lexicon: HALOT
  rationale: El verbo literalmente alude a pasar la noche o alojarse. En el proverbio el sentido es reposo seguro; 'descansará' transmite la idea sin limitarla al sueño físico.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Partícula negativa poética; 'no' es el equivalente directo y más natural en español.
- source_word: יִפָּקֶד
  english_pob_choice: be visited
  chosen_spanish: será visitado
  alternatives_spanish:
  - le sobrevendrá
  - será alcanzado
  - le acontecerá
  lexicon: HALOT
  rationale: El nifal de פקד conserva la metáfora de 'visita' en sentido adverso. 'Será visitado' mantiene el giro verbal y permite que el complemento exprese el daño.
- source_word: רָע
  english_pob_choice: harm
  chosen_spanish: el mal
  alternatives_spanish:
  - daño
  - desgracia
  - calamidad
  - mal
  lexicon: HALOT
  rationale: Aquí רָע apunta a adversidad o desgracia, no a mal moral. 'El mal' es la forma más compacta y fiel al hebreo; el contexto proverbial evita la lectura ética absoluta, aunque en español la frase puede sonar más general.
theological_decisions:
- issue: Alcance de 'vida' en el proverbio
  english_pob_reading: Render 'life' straightforwardly and preserve the concrete security imagery in the second line without narrowing the proverb to either eternal life or mere longevity.
  chosen_spanish_reading: Traducir 'vida' de manera directa, preservando su amplitud sapiencial de vida, bienestar y florecimiento bajo el orden de Dios.
  alternative_spanish_readings:
  - vida eterna
  - larga vida
  - prosperidad
  rationale: En Proverbios, 'vida' no debe estrecharse a una sola categoría doctrinal o material. La formulación española conserva la amplitud del refrán y su valor sapiencial general.
  doctrine_reference: Sabiduría bíblica / literatura sapiencial
- issue: Valor proverbial de la cláusula final
  english_pob_reading: Use 'he will not be visited by harm' to preserve proverbial generalization and the idiom of adverse visitation without making an overly absolute modern claim.
  chosen_spanish_reading: Mantener la pasiva verbal y el complemento de adversidad para no convertir el proverbio en una promesa absoluta de ausencia total de sufrimiento.
  alternative_spanish_readings:
  - no le vendrá mal
  - ningún mal le ocurrirá
  - no le sobrevendrá desgracia
  rationale: La poesía sapiencial formula generalizaciones condensadas. 'Será visitado por el mal' conserva el giro hebreo y evita que el lector entienda una inmunidad absoluta a toda aflicción.
  doctrine_reference: Sabiduría bíblica / literatura sapiencial
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del expediente inglés y refleja la revisión más reciente: se conserva el sentido de resultado en la primera línea, el reposo satisfecho en la segunda y la pasiva de adversidad en la cláusula final, con puntuación española natural.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - Se mantiene 'vida' sin especificarla como eterna ni como mera longevidad.
  - '''Mal'' se usa en sentido de calamidad/adversidad, no de mal moral.'
  - Se preserva la imagen hebrea de 'ser visitado' para reflejar el nifal de פקד.
