translation:
  language: es
  text: Toma de entre los exiliados[a] —de Heldai, de Tobías[d] y de Jedaías—, e irás tú aquel mismo día y entrarás en la casa de Josías, hijo de Sofonías[c][b], adonde ellos han venido desde Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la comunidad exiliada»; el hebreo puede nombrar al conjunto de los desterrados, no solo la condición abstracta de destierro.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa el mismo verbo de movimiento, que puede significar «venir» o «ir» según el punto de vista; aquí se traduce naturalmente como «irás».
    reason: lexical_alternative
  - marker: c
    text: La cláusula final está en plural y se refiere más naturalmente a Heldai, Tobías y Jedaías que a Josías solo.
    reason: alternative_reading
  - marker: d
    text: «Tobías» es la forma española habitual del nombre; otras tradiciones de transliteración reflejan de manera distinta la terminación hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָק֨וֹחַ
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Toma como ofrenda
  lexicon: HALOT
  rationale: El infinitivo absoluto con fuerza imperativa se traduce naturalmente en español como mandato directo. «Toma» conserva la brevedad y la instrucción profética sin añadir una glosa interpretativa excesiva.
- source_word: מֵאֵת הַגּוֹלָה
  english_pob_choice: from the exiles
  chosen_spanish: de entre los cautivos
  alternatives_spanish:
  - de entre los exiliados
  - de la comunidad de los exiliados
  lexicon: HALOT
  rationale: La expresión hebrea puede designar a las personas desterradas como grupo. «De entre los cautivos» mantiene el sentido personal/colectivo del origen y evita una abstracción excesiva.
- source_word: חֶלְדַּי
  english_pob_choice: Heldai
  chosen_spanish: Heldai
  alternatives_spanish:
  - Heledai
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio, siguiendo el valor auditivo del hebreo y el patrón de la traducción inglesa auditada.
- source_word: טוֹבִיָּה
  english_pob_choice: Tobijah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  - Tobiya
  lexicon: HALOT
  rationale: En español bíblico, «Tobías» es la forma más inteligible y establecida. Aunque la terminación hebrea -yāh puede transparentarse como «Tobiya», el uso común y la legibilidad favorecen «Tobías».
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Jedaia
  lexicon: HALOT
  rationale: Se adapta el nombre propio a la grafía española habitual, preservando la forma bíblica reconocible y la terminación hebrea.
- source_word: וּבָאתָ אַתָּה
  english_pob_choice: and you shall go / and you yourself shall go
  chosen_spanish: y tú irás
  alternatives_spanish:
  - y tú mismo irás
  - y entrarás
  lexicon: HALOT
  rationale: בוא puede rendirse como «ir» o «venir» según la perspectiva. Aquí, por tratarse del movimiento de Zacarías hacia otro lugar, «irás» es natural en español y conserva el tono imperativo. El pronombre explícito «tú» refleja el énfasis del hebreo אַתָּה.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that same day
  chosen_spanish: aquel mismo día
  alternatives_spanish:
  - ese mismo día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal señala inmediatez. «Aquel mismo día» reproduce bien la fuerza de proximidad y urgencia del contexto.
- source_word: וּבָאתָ בֵּית
  english_pob_choice: and enter the house of
  chosen_spanish: y entrarás en la casa de
  alternatives_spanish:
  - y irás a la casa de
  - y llegarás a la casa de
  lexicon: HALOT
  rationale: El segundo בוא se entiende como movimiento hacia el destino. «Entrarás en la casa de» sigue la lectura natural del pasaje y evita la ambigüedad de repetir «irás» sin matiz.
- source_word: יֹאשִׁיָּה בֶן צְפַנְיָה
  english_pob_choice: Josiah the son of Zephaniah
  chosen_spanish: Josías, hijo de Sofonías
  alternatives_spanish:
  - Josías hijo de Sofonías
  - Josías el hijo de Sofonías
  lexicon: HALOT
  rationale: Se traduce el patronímico de forma clara y idiomática en español. «Sofonías» es la forma española establecida del nombre.
- source_word: אֲשֶׁר בָּאוּ מִבָּבֶל
  english_pob_choice: where they have come from Babylon
  chosen_spanish: donde han venido desde Babilonia
  alternatives_spanish:
  - que han venido desde Babilonia
  - donde vinieron de Babilonia
  lexicon: HALOT
  rationale: La cláusula relativa plural puede referirse naturalmente a los hombres mencionados y, por extensión, al ámbito de la casa. «Han venido» preserva el valor resultativo/presente del hebreo; «desde Babilonia» mantiene el origen geográfico explícito.
theological_decisions:
- issue: Destino de la cláusula final plural y su relación con la casa de Josías
  english_pob_reading: The final clause is plural, 'who have come from Babylon,' most naturally referring to Heldai, Tobijah, and Jedaiah rather than to Josiah alone.
  chosen_spanish_reading: 'La frase final se conserva como una cláusula relativa plural y se integra con la casa de Josías: «donde han venido desde Babilonia».'
  alternative_spanish_readings:
  - que han venido desde Babilonia
  - los cuales han venido desde Babilonia
  rationale: El hebreo permite que el plural se relacione con los tres hombres nombrados. En español, vincular la relativa con «la casa de Josías» ayuda a evitar una referencia errónea a Josías solo, sin borrar el plural ni la ambigüedad documentada.
  doctrine_reference: Sintaxis y referencia pronominal del texto hebreo; cf. lectura auditada del inglés POB.
- issue: Valor de הַגּוֹלָה
  english_pob_reading: '''from the exiles'' ... ''the body of exiles rather than exile as an abstract condition'''
  chosen_spanish_reading: «de entre los cautivos»
  alternative_spanish_readings:
  - de entre los exiliados
  - de la comunidad de los cautivos
  rationale: Se evita reducir el término a un estado abstracto. La traducción elegida conserva el carácter colectivo y humano del grupo retornado, que es el punto semántico relevante aquí.
  doctrine_reference: Semántica léxica de הַגּוֹלָה; no implica una doctrina específica.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una formulación más literal («come to the house of Josiah... who have come from Babylon») a una redacción más natural («enter the house of Josiah... where they have come from Babylon»). La presente propuesta española sigue esa sensibilidad, pero conserva el plural final y lo ancla de modo más claro en la casa de Josías para evitar ambigüedad referencial. También se mantiene el doble movimiento del hebreo con dos verbos distintos: «irás» y «entrarás».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se mantiene «Babilonia» como topónimo tradicional y claro en español.
  - 'Los nombres propios se adaptan a formas bíblicas españolas reconocibles: Heldai, Tobías, Jedaías, Josías, Sofonías.'
  - La elección de «cautivos» conserva mejor el matiz colectivo-personal de הַגּוֹלָה que una abstracción como «cautividad».
