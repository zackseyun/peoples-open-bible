revisions:
- from: Este fue Benaías[a], un hombre poderoso entre los Treinta y sobre los Treinta; y su división estaba bajo Ammizabad, su hijo.
  to: Este fue Benaías[a], un hombre valiente de los Treinta y sobre los Treinta; y su división estaba a cargo de Ammizabad, su hijo.
  rationale: Se ajusta «entre» a «de» para seguir mejor el texto principal auditado y la identificación del cuerpo élite. Se mejora גִּבּוֹר con «hombre valiente», más natural en español y suficientemente amplio. También se afina la última cláusula para expresar con claridad el sentido administrativo de la división en el contexto del capítulo.
