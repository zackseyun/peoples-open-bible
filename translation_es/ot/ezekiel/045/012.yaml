base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/012.yaml
  text: And the shekel shall be twenty gerahs[a]; twenty shekels, twenty-five shekels[b], and fifteen shekels shall be your mina.
  footnotes:
  - marker: a
    text: The Hebrew lists the mina as 'twenty shekels, twenty-five shekels, and fifteen shekels'—that is, a total of sixty shekels. This differs from other ancient reckonings of the mina and likely reflects a specific standard in Ezekiel's temple legislation.
    reason: cultural_note
  - marker: b
    text: Or 'maneh.' The Hebrew term refers to a larger unit of weight or money.
    reason: lexical_alternative
