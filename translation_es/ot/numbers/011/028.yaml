- from: 'Entonces Josué hijo de Nun[a], servidor de Moisés desde su juventud, respondió y dijo: «Mi señor Moisés, refrena[b]los».'
  to: 'Entonces Josué hijo de Nun[a], servidor de Moisés, uno de sus jóvenes, respondió y dijo: «Mi señor Moisés, refrénalos[b]».'
  rationale: Se ajusta el texto principal para reflejar mejor la ambigüedad de מִבְּחֻרָיו sin imponer la lectura «desde su juventud» como única; esa posibilidad se conserva en nota. También se corrige la forma española del imperativo enclítico a «refrénalos». El resto del versículo se mantiene por ser fiel, natural y terminológicamente adecuado.
