translation:
  language: es
  text: Y las cámaras laterales se ensancharon[a] al subir, porque la estructura alrededor del templo subía y subía, por todos lados alrededor del templo[b]. Por tanto, el templo tenía mayor anchura hacia arriba, y así se subía desde el piso inferior hasta el superior, pasando por el piso intermedio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se hicieron más anchas». El hebreo expresa un cambio de anchura en las cámaras laterales.
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea traducida «la estructura alrededor del templo» es arquitectónicamente difícil; algunos la entienden como una cornisa, galería o saliente envolvente en el muro.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «desde la inferior a la superior, a la intermedia». La cláusula es condensada; el sentido es que se subía del nivel inferior al superior pasando por el nivel intermedio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲבָה
  english_pob_choice: became wider
  chosen_spanish: se ensancharon
  alternatives_spanish:
  - se hicieron más anchas
  - se agrandaron en anchura
  lexicon: HALOT
  rationale: El verbo expresa un aumento de anchura en contexto arquitectónico. «Se ensancharon» conserva el cambio de estado sin volverlo mecánico ni introducir una explicación ajena al texto.
- source_word: וְנָסְבָה
  english_pob_choice: as they went around
  chosen_spanish: al subir
  alternatives_spanish:
  - al rodear
  - al girar
  lexicon: HALOT
  rationale: En este pasaje, la idea no es simplemente «girar», sino la disposición escalonada asociada al ascenso. El español lo expresa mejor vinculándolo al movimiento ascendente que domina la cláusula.
- source_word: לְמַעְלָה לְמַעְלָה
  english_pob_choice: upward and upward
  chosen_spanish: subía y subía
  alternatives_spanish:
  - hacia arriba, cada vez más alto
  - más y más arriba
  lexicon: HALOT
  rationale: La repetición hebrea intensifica el ascenso progresivo. «Subía y subía» preserva esa fuerza repetitiva de manera natural en español.
- source_word: לַצְּלָעוֹת
  english_pob_choice: the side chambers
  chosen_spanish: las cámaras laterales
  alternatives_spanish:
  - los cuartos laterales
  - las habitaciones laterales
  lexicon: HALOT
  rationale: En el contexto del templo, el término designa estructuras arquitectónicas anexas; «cámaras laterales» comunica bien ese sentido y mantiene el registro técnico sin recurrir a «costillas» o a una paráfrasis excesiva.
- source_word: כִּי מוּסַב הַבַּיִת
  english_pob_choice: because the structure around the temple went upward
  chosen_spanish: porque la estructura alrededor del templo subía
  alternatives_spanish:
  - porque había una construcción en torno al templo
  - porque el templo estaba rodeado por una estructura
  lexicon: HALOT
  rationale: מֻסָב es un término arquitectónico difícil. El español mantiene la idea de una construcción envolvente sin decidir dogmáticamente por «cornisa», «saliente» o «galería», opciones que el hebreo no obliga a fijar aquí.
- source_word: סָבִיב סָבִיב לַבַּיִת
  english_pob_choice: all around the temple
  chosen_spanish: por todos lados en torno al templo
  alternatives_spanish:
  - todo alrededor del templo
  - en torno al templo por todos lados
  lexicon: HALOT
  rationale: La duplicación de סביב intensifica el rodeo o cercamiento. «Por todos lados en torno al templo» reproduce esa insistencia con una formulación clara en español.
- source_word: עַל כֵּן רֹחַב לַבַּיִת לְמָעְלָה
  english_pob_choice: Therefore the temple had greater width upward
  chosen_spanish: Por tanto, el templo tenía mayor anchura hacia arriba
  alternatives_spanish:
  - Por tanto, había mayor anchura para el templo hacia arriba
  - Por tanto, el templo era más ancho arriba
  lexicon: HALOT
  rationale: La frase hebrea es elíptica. «Tenía mayor anchura hacia arriba» conserva el sentido sin añadir una lectura demasiado específica ni perder el efecto de incremento arquitectónico.
- source_word: וְכֵן הַתַּחְתּוֹנָה יַעֲלֶה עַל הָעֶלְיוֹנָה לַתִּיכוֹנָה
  english_pob_choice: and so one went up from the lowest story to the highest by way of the middle story
  chosen_spanish: y así se subía desde el piso inferior hasta el superior por medio del piso intermedio
  alternatives_spanish:
  - y así se ascendía desde el piso inferior hasta el superior pasando por el intermedio
  - y así se iba subiendo del nivel inferior al superior por el nivel medio
  lexicon: HALOT
  rationale: La cláusula final es sintácticamente comprimida. «Se subía» evita introducir un sujeto inexistente en el hebreo, y «por medio del piso intermedio» refleja el papel mediador del nivel medio en el ascenso.
- source_word: הַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - la casa
  lexicon: HALOT
  rationale: En esta visión de Ezequiel, בַּיִת se refiere claramente al edificio del templo. «Templo» es la equivalencia contextual más natural en español y evita ambigüedad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que suaviza la repetición de «went around upward and upward» y aclara la estructura envolvente como «structure around the temple». La redacción española procura conservar esa naturalidad sin perder la repetición intensiva ni la dificultad arquitectónica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «templo» para בַּיִת en este contexto visionario y arquitectónico.
  - Se eligió «cámaras laterales» para לַצְּלָעוֹת por ser la equivalencia técnica más clara en español.
  - Se preservó la repetición enfática del ascenso con «subía y subía», en línea con el paralelismo hebreo.
  - No se introdujo terminología litúrgica o tradicional que oscureciera el sentido arquitectónico del pasaje.
