    text: 'O: «Todo hombre»; el hebreo usa un masculino distributivo aplicado a la aptitud sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será santo». El hebreo puede denotar que algo llega a ser santo por contacto; algunos lo entienden más restrictivamente, como que solo lo santo puede tocarlos.'
    reason: theological_note
  revision_rationale: Se corrigió la sintaxis española («los toque»), se alineó אִשֵּׁי con la decisión contextual del POB mediante «ofrendas de alimento», y se hizo explícito el matiz resultativo de יִקְדָּשׁ con «quedará santificado», preservando la lectura alternativa en nota. También se neutralizó ligeramente el registro con «sus generaciones».
