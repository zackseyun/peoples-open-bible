    text: O «ante los ojos de toda la casa de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «a lo largo de todas sus jornadas» o «en todas sus jornadas».
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que corresponda a לְעֵינֵי, en línea con la auditoría inglesa y la fuente hebrea. También se suavizó la sintaxis de «fuego estaba en él» a «en él había fuego», que suena más natural en español sin perder la ambigüedad y localización de בּוֹ. Finalmente, se ajustó «viajes» a «jornadas» para reflejar mejor מַסְעֵיהֶם en el contexto de las marchas de Israel.
