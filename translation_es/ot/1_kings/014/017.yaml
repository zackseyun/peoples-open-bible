translation:
  language: es
  text: Entonces la esposa de Jeroboam se levantó y fue y llegó a Tirsa. Al llegar al umbral de la casa[a], el muchacho murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando llegó al umbral de la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de קום describe la acción siguiente en secuencia. En español, «se levantó» mantiene la naturalidad narrativa sin perder la fuerza dinámica del verbo hebreo.
- source_word: אֵשֶׁת יָרָבְעָם
  english_pob_choice: Jeroboam’s wife
  chosen_spanish: la esposa de Jeroboam
  alternatives_spanish:
  - Jeroboam’s wife
  - la mujer de Jeroboam
  lexicon: HALOT
  rationale: La construcción de relación posesiva se vierte con un genitivo natural en español. «Esposa» conserva el vínculo marital de manera clara y digna.
- source_word: וַתֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: HALOT
  rationale: הלך en secuencia narrativa simple se traduce de forma directa. «Fue» es breve y natural en español, sin añadir matices de viaje que el contexto no exige.
- source_word: וַתָּבֹא תִרְצָתָה
  english_pob_choice: came to Tirzah
  chosen_spanish: llegó a Tirsa
  alternatives_spanish:
  - vino a Tirsa
  - arribó a Tirsa
  lexicon: HALOT
  rationale: בוא con he direccional expresa llegada al destino. «Llegó a Tirsa» reproduce bien el punto de llegada sin sugerir entrada específica a otro lugar.
- source_word: הִיא בָּאָה
  english_pob_choice: As she came
  chosen_spanish: Al llegar
  alternatives_spanish:
  - mientras llegaba
  - cuando llegó
  lexicon: HALOT
  rationale: El pronombre independiente con participio aporta valor circunstancial/temporal. «Al llegar» conserva ese momento de llegada como el marco inmediato del hecho decisivo.
- source_word: בְסַף הַבַּיִת
  english_pob_choice: to the threshold of the house
  chosen_spanish: al umbral de la casa
  alternatives_spanish:
  - al dintel de la casa
  - a la puerta de la casa
  lexicon: HALOT
  rationale: סַף denota umbral o alfeizar/sillar de la entrada. «Umbral» es el equivalente más preciso y readable en español moderno.
- source_word: וְהַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar muchacho, joven o criado según el contexto. Aquí, en la narrativa familiar inmediata, «el muchacho» resulta claro y no introduce una edad demasiado precisa.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - estaba muerto
  - falleció
  lexicon: HALOT
  rationale: El qatal de מות aquí es eventivo y marca el desenlace súbito. «Murió» comunica la acción cumplida con naturalidad y sin suavizar el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés: se conserva la secuencia narrativa, la llegada a Tirsa y el momento exacto del desenlace al cruzar el umbral. No hay revisiones aplicadas en el pase más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene «Jeroboam» como forma estable del nombre propio.
  - «Tirsa» sigue la transliteración usual del topónimo ya asentada en español bíblico, sin añadir notas adicionales.
  - No se introduce lenguaje eclesiástico tradicional que altere el sentido narrativo simple del versículo.
