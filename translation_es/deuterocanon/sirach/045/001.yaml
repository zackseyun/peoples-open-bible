  - marker: b
    text: The Greek parallel for this verse is longer, adding that God 'brought forth from him a man of mercy, finding favor in the eyes of all flesh' before naming Moses. Those words are not present in the supplied Hebrew witness.
    reason: textual_variant
  - marker: c
    text: Hebrew 'men'; Greek has a broader term meaning 'people' or 'human beings.'
    reason: alternative_reading
