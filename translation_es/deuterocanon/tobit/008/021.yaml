translation:
  language: es
  text: y entonces, después de tomar la mitad de sus bienes, irte con buena salud a tu padre[a]; y el resto, cuando mi esposa y yo muramos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «al padre»; el contexto de habla directa favorece «a tu padre».
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final está comprimida en griego: literalmente, «y el resto cuando yo muera y mi esposa». El sentido es que lo restante se entregue después de que ambos esposos hayan muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντα
  english_pob_choice: after taking
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - tras tomar
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa al infinitivo siguiente; «después de tomar» conserva esa secuencia de manera natural en español.
- source_word: τὸ ἥμισυ
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - la mitad exacta
  - medio
  lexicon: LSJ
  rationale: La expresión cuantitativa se vierte de forma directa e idiomática como «la mitad».
- source_word: τῶν ὑπαρχόντων αὐτοῦ
  english_pob_choice: of his possessions
  chosen_spanish: de sus bienes
  alternatives_spanish:
  - de sus posesiones
  - de lo que le pertenecía
  lexicon: LSJ
  rationale: «ὑπάρχοντα» designa bienes o pertenencias; «bienes» es un equivalente natural y suficientemente concreto en español.
- source_word: πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - partir
  - dirigirse
  lexicon: BDAG
  rationale: Como infinitivo de movimiento, «ir» es la opción más general y fiel al valor básico del verbo.
- source_word: μετὰ ὑγείας
  english_pob_choice: in good health
  chosen_spanish: en buena salud
  alternatives_spanish:
  - sano y salvo
  - con salud
  lexicon: LSJ
  rationale: La frase se refiere a salud/bienestar. «En buena salud» mantiene el sentido léxico sin añadir una connotación distinta como «sano y salvo».
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - al padre
  - a su padre
  lexicon: BDAG
  rationale: Aunque el griego no explicita posesivo, el contexto de habla directa favorece la segunda persona; «a tu padre» conserva ese matiz de dirección interpersonal.
- source_word: τὰ λοιπά
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - lo restante
  - lo demás
  lexicon: LSJ
  rationale: «τὰ λοιπά» se refiere a la parte restante de los bienes; «el resto» es idiomático y preciso.
- source_word: ὅταν ἀποθάνω καὶ ἡ γυνή μου
  english_pob_choice: when I and my wife die
  chosen_spanish: cuando yo y mi esposa muramos
  alternatives_spanish:
  - cuando yo y mi mujer muramos
  - cuando muramos mi esposa y yo
  lexicon: BDAG
  rationale: El griego es comprimido y presupone que la entrega final ocurre después de la muerte de ambos cónyuges. Se conserva esa compresión mientras se vuelve comprensible en español.
translation_notes:
  revision_awareness: Se mantiene el sentido del texto griego con la misma solución auditada en inglés para el participio previo, la dirección al padre y la cláusula final comprimida; no se detectaron cambios textuales ni revisiones aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no hay ocurrencia.
  - Se emplea «bienes» para ὑπάρχοντα en coherencia con el valor patrimonial del pasaje y con el uso habitual del proyecto.
  - Se evita «seguro» o «sano y salvo» para no desplazar el valor léxico de ὑγεία, que aquí apunta ante todo a salud/bienestar.
