review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: un hombre toma su espada, sale, y realiza una serie de infinitivos coordinados. Conserva adecuadamente ἐκπορεύεται como «sale», λῃστεύειν como «saquear» y la nota léxica sobre ἐξοδεύειν. Sin embargo, κλέπτειν se distingue mejor de λῃστεύειν con «hurtar» o «robar furtivamente»; «robar» puede solaparse demasiado con «saquear».'
  spanish_quality_summary: El texto es legible y natural, pero «hacer campaña» en español general puede sonar político si aparece sin contexto militar. «Ir de campaña» expresa mejor el sentido expedicionario/militar y sigue siendo natural. Además, conviene evitar la repetición excesiva de «para» ante cada infinitivo, y «ríos» sin artículo fluye mejor tras «el mar».
  glossary_alignment: No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales están mayormente alineadas con la auditoría inglesa, salvo que κλέπτειν merece una distinción más nítida frente a λῃστεύειν en español.
  issues:
  - severity: medium
    issue: «hacer campaña» puede sonar ambiguo en español contemporáneo
    rationale: Aunque busca reflejar «to campaign», en español neutral suele asociarse primero con campañas políticas o publicitarias. En este contexto bélico, «ir de campaña» o «hacer una expedición» comunica mejor ἐξοδεύειν.
  - severity: medium
    issue: «robar» debilita la distinción entre λῃστεύειν y κλέπτειν
    rationale: El griego contrasta saqueo/rapiña violenta con hurto. Como ya se usa «saquear» para λῃστεύειν, «hurtar» preserva mejor el contraste semántico.
  - severity: low
    issue: «los ríos» suena menos idiomático que «ríos» en esta coordinación
    rationale: Después de «navegar por el mar», la forma sin artículo suena más ligera y cercana al griego coordinado, sin pérdida de sentido.
  revised_spanish_text: Y un hombre toma su espada y sale para ir de campaña[a], saquear y hurtar, y para navegar por el mar y ríos,
  revised_footnotes:
