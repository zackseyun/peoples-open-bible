translation:
  language: es
  text: Y Asa tenía un ejército de trescientos mil de Judá, que portaban grandes escudos y lanzas, y de Benjamín, doscientos ochenta mil que portaban escudos y tensaban arcos. Todos ellos eran hombres valientes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guerreros valientes» o «hombres de valor». La expresión hebrea גִּבּוֹרֵי חָיִל es una fórmula militar fija para hombres de combate fuertes y valerosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - hueste
  lexicon: HALOT
  rationale: En este contexto militar y censal, el sustantivo hebreo designa la fuerza armada disponible para Asa. «Ejército» comunica de manera natural esa idea colectiva en español, sin perder el valor militar del término.
- source_word: נֹשֵׂא צִנָּה וָרֹמַח
  english_pob_choice: bearing large shields and spears
  chosen_spanish: que portaban grandes escudos y lanzas
  alternatives_spanish:
  - que llevaban grandes escudos y lanzas
  - portadores de grandes escudos y lanzas
  lexicon: HALOT
  rationale: El participio expresa a soldados equipados con armas. «Portaban» mantiene el matiz de portar/equiparse con un registro digno y claro. «Grandes escudos» distingue צִנָּה del מָגֵן posterior, conservando la diferencia lexical del hebreo.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - procedentes de Judá
  - de la tribu de Judá
  lexicon: HALOT
  rationale: La preposición indica procedencia tribal. «De Judá» es la forma más breve y natural en español, y preserva la división por tribus del versículo.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף
  english_pob_choice: three hundred thousand
  chosen_spanish: trescientos mil
  alternatives_spanish:
  - trescientos mil hombres
  lexicon: HALOT
  rationale: La cifra se traduce de manera directa y estándar. El hebreo no exige añadir «hombres» aquí, porque el contexto militar ya lo sugiere.
- source_word: נֹשְׂאֵי מָגֵן
  english_pob_choice: bearing shields
  chosen_spanish: que portaban escudos
  alternatives_spanish:
  - que llevaban escudos
  - portadores de escudos
  lexicon: HALOT
  rationale: Se conserva el mismo patrón verbal para mantener la paralela militar con la primera mitad del versículo. «Escudos» sin adjetivo evita sobreinterpretar el tamaño del מָגֵן, que el hebreo distingue de צִנָּה por el término, no por un calificativo explícito.
- source_word: וְדֹרְכֵי קֶשֶׁת
  english_pob_choice: drawing bows
  chosen_spanish: que tensaban arcos
  alternatives_spanish:
  - que templaban arcos
  - arqueros
  lexicon: HALOT
  rationale: El hebreo idiomáticamente describe el acto de tensar o preparar el arco. «Tensaban arcos» conserva esa imagen física y resulta más transparente en español que una calca menos natural. «Arqueros» sería una interpretación válida pero menos cercana a la forma verbal.
- source_word: מָאתַיִם וּשְׁמוֹנִים אָלֶף
  english_pob_choice: two hundred eighty thousand
  chosen_spanish: doscientos ochenta mil
  alternatives_spanish:
  - doscientos ochenta mil hombres
  lexicon: HALOT
  rationale: La cifra se traduce literalmente y con el orden natural del español contemporáneo.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  lexicon: HALOT
  rationale: La frase resumidora se vierte de forma directa. «Estos» mantiene el enlace deíctico con los grupos de soldados mencionados.
- source_word: גִּבּוֹרֵי חָיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros valientes
  - hombres de valor
  - mighty men of valor
  lexicon: HALOT
  rationale: La expresión es un giro militar fijo que describe a hombres de combate fuertes y valerosos. En español, «hombres valientes» comunica el sentido básico sin forzar una frase demasiado idiomática o arcaizante. Se preserva la referencia masculina propia del hebreo.
theological_decisions:
- issue: Expresión militar masculina en גִּבּוֹרֵי חָיִל
  english_pob_reading: mighty men of valor
  chosen_spanish_reading: hombres valientes
  alternative_spanish_readings:
  - guerreros valientes
  - hombres de valor
  rationale: El hebreo usa una fórmula masculina para soldados varones. En español, mantener «hombres» evita neutralizar el referente y respeta la precisión histórica y gramatical del texto. «Valientes» transmite el rasgo valorativo del sintagma sin introducir una expansión doctrinal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto español sigue de cerca el análisis léxico del inglés POB y confirma la distinción entre צִנָּה y מָגֵן mediante «grandes escudos» frente a «escudos». No se detectaron revisiones aplicadas en el registro inglés; por tanto, se mantiene una solución estable y auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al nombre divino explícito; este versículo no lo contiene.
  - 'Se mantiene la distinción entre armas y funciones: «portaban» para equipos militares, «tensaban arcos» para la acción de uso del arma.'
  - Se evita «SEÑOR» y se conserva el registro histórico del censo militar.
  - La forma «hombres valientes» conserva el matiz masculino del hebreo y la cohesión con la política de precisión de género del POB.
