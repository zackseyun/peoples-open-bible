  to: Pues el rey tenía naves que iban a Tarsis con los siervos de Huram; una vez cada tres años solían llegar las naves de Tarsis, trayendo oro y plata, marfil, monos y pavos reales[a].
  rationale: Se ajusta el conector inicial a 'Pues' para reflejar mejor la función explicativa de כִּי en este contexto narrativo, y se cambia 'llegaban' por 'solían llegar' para hacer más explícito el valor habitual del imperfecto hebreo. El resto del borrador preserva fielmente el sentido y la terminología pertinentes.
