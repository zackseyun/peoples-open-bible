translation:
  language: es
  text: Él me ha molido los dientes con grava[a]; me ha hundido[b] en las cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha quebrado los dientes con guijarros». El hebreo admite también la idea de romper o aplastar, no sólo moler.
    reason: lexical_alternative
  - marker: b
    text: O «me ha hecho encoger», «me ha humillado» o «me ha abatido hasta las cenizas». El verbo es raro y puede entenderse como hacer bajar, rebajar o llevar a una condición de humillación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגְרֵס
  english_pob_choice: has ground
  chosen_spanish: me ha molido
  alternatives_spanish:
  - me ha quebrado
  - me ha triturado
  lexicon: HALOT
  rationale: El hebreo expresa la acción de triturar o moler con violencia. «Molido» conserva la imagen corporal y el golpe físico del verbo mejor que una solución más general como «quebrado». En español, con el objeto «los dientes», «me ha molido» suena natural y mantiene la crudeza del original.
- source_word: בֶּחָצָץ
  english_pob_choice: with gravel
  chosen_spanish: con grava
  alternatives_spanish:
  - con guijarros
  - con piedrecillas
  lexicon: HALOT
  rationale: חָצָץ denota piedras pequeñas o grava. «Grava» comunica bien la aspereza abrasiva y es más idiomático en español que una expresión más larga. «Guijarros» y «piedrecillas» son posibles, pero «grava» enfatiza mejor la fricción violenta.
- source_word: שִׁנַּי
  english_pob_choice: my teeth
  chosen_spanish: los dientes
  alternatives_spanish:
  - mis dientes
  lexicon: HALOT
  rationale: El hebreo lleva sufijo de primera persona singular. En español, el posesivo puede omitirse cuando el clíticodativo/acusativo ya marca la referencia personal; aquí «me ha molido los dientes» suena natural y conserva el sentido posesivo implícito sin forzar una construcción menos fluida.
- source_word: הִכְפִּישַׁנִי
  english_pob_choice: has pressed me down
  chosen_spanish: me ha hundido
  alternatives_spanish:
  - me ha abatido
  - me ha aplastado
  - me ha humillado
  lexicon: HALOT
  rationale: Este verbo raro admite un campo semántico de abatir, hacer bajar o humillar. «Me ha hundido» preserva la idea de ser rebajado o bajado hasta un nivel inferior y funciona bien con la imagen siguiente de «las cenizas». Se mantiene la tensión entre lo físico y lo humillante sin fijar una sola interpretación excesiva.
- source_word: בָּאֵפֶר
  english_pob_choice: into the ashes
  chosen_spanish: en las cenizas
  alternatives_spanish:
  - hasta las cenizas
  - dentro de las cenizas
  lexicon: HALOT
  rationale: אֵפֶר significa «cenizas». Aunque el inglés POB usa «into», en español «me ha hundido en las cenizas» transmite adecuadamente la inmersión o descenso implicados por el verbo. «Cenizas» mantiene el valor concreto del sustantivo.
theological_decisions:
- issue: Intensidad metafórica de humillación corporal
  english_pob_reading: 'The verse uses a vivid bodily image of affliction: grinding teeth with gravel and pressing down into ashes.'
  chosen_spanish_reading: 'El verso conserva la imagen corporal extrema de aflicción sin suavizarla: muelas los dientes con grava y me hunde en las cenizas.'
  alternative_spanish_readings:
  - El verso podría leerse más literalmente como una simple descripción física de dolor dental.
  - También podría explicarse sólo como humillación moral.
  rationale: La imagen en hebreo y en el POB inglés combina dolor físico y abatimiento. La traducción española debe preservar ambos niveles, porque el texto no obliga a elegir entre una lectura puramente literal o puramente figurada.
  doctrine_reference: Lamentations 3:16; lexical field of affliction and humiliation in the lament genre
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se mantiene la violencia de וַיַּגְרֵס con una imagen natural en español, y se conserva la ambigüedad del verbo raro הִכְפִּישַׁנִי sin reducirlo a una sola glosa interpretativa. No se introducen cambios doctrinales ni ampliaciones explicativas fuera de la evidencia del versículo.
  spanish_consistency_notes:
  - Se usó «grava» para חָצָץ por ser la opción más natural y abrasiva en español.
  - Se omitió el posesivo explícito en «los dientes» porque el clítico «me» ya establece la primera persona y la frase resulta más idiomática.
  - «Cenizas» se mantuvo literal para אֵפֶר; la preposición «en» conserva bien el abatimiento implícito del hebreo.
  - Se preservó la tensión semántica del verbo raro con notas alternativas, en vez de fijarlo sólo como humillación espiritual.
