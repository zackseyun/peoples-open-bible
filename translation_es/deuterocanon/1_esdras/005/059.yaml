translation:
  language: es
  text: Y todo el pueblo tocó[a] las trompetas y gritaron con voz fuerte, alabando al Señor por la reedificación de la casa del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «por la reconstrucción de la casa del Señor». El griego dice literalmente «por la elevación/levantamiento», que puede referirse más ampliamente a la edificación o restauración del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - todo el pueblo de Dios
  lexicon: LSJ
  rationale: La expresión griega es colectiva y total. 'Todo el pueblo' conserva esa totalidad de manera natural en español y evita añadir matices no presentes en el texto.
- source_word: ἐσάλπισαν
  english_pob_choice: sounded trumpets
  chosen_spanish: tocó las trompetas
  alternatives_spanish:
  - sonó las trompetas
  - tocaron las trompetas
  lexicon: LSJ
  rationale: El verbo se refiere a hacer sonar trompetas. En español, 'tocó las trompetas' refleja bien el acto instrumental con un sujeto colectivo, y mantiene un registro bíblico claro sin calco rígido.
- source_word: ἐβόησαν φωνῇ μεγάλῃ
  english_pob_choice: shouted with a loud voice
  chosen_spanish: gritó con voz fuerte
  alternatives_spanish:
  - clamó con voz fuerte
  - alzaron un gran clamor
  lexicon: LSJ
  rationale: La combinación verbal e instrumental/dativa se expresa de forma natural como 'gritó con voz fuerte'. Aunque el griego es plural, en español el sujeto colectivo 'todo el pueblo' permite una concordancia natural en singular o plural; aquí se opta por singular colectivo para fluidez, sin perder el sentido de acción coral.
- source_word: ὑμνοῦντες
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - cantando alabanzas
  - ensalzando
  lexicon: LSJ
  rationale: El participio indica acción de alabar a Dios. 'Alabando' es fiel, claro y suficientemente amplio para no imponer necesariamente una forma cantada que el griego no exige explícitamente.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Dios
  lexicon: LSJ
  rationale: En el texto griego aparece κύριος, no el tetragrámaton hebreo. Siguiendo el criterio del POB para textos griegos, se conserva 'el Señor'. En español, el dativo se expresa naturalmente con 'al Señor'.
- source_word: ἐπὶ τῇ ἐγέρσει
  english_pob_choice: for the rebuilding of
  chosen_spanish: por la reedificación de
  alternatives_spanish:
  - por la reconstrucción de
  - por el levantamiento de
  lexicon: LSJ
  rationale: La revisión inglesa reciente resolvió la frase de modo más natural como 'for the rebuilding of'. En español, 'reedificación' preserva el campo semántico de levantar/volver a erigir un edificio y encaja bien en contexto templario, sin borrar la imagen de ἐγέρσις.
- source_word: τοῦ οἴκου Κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa del Señor
  alternatives_spanish:
  - la casa de Yahvé
  - el templo del Señor
  lexicon: LSJ
  rationale: '''Casa del Señor'' reproduce la fórmula bíblica habitual y corresponde bien al griego. ''Templo'' sería más interpretativo; ''casa'' mantiene mejor el enlace verbal con οἶκος.'
theological_decisions:
- issue: Renderización de κύριος en contexto de culto a Dios de Israel
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto griego usa κύριος en un contexto litúrgico y templeario. Siguiendo la pauta del POB para griego, se traduce 'el Señor', manteniendo el referente divino sin sustituirlo por una máscara tipográfica del nombre hebreo.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord en textos griegos, con identificación contextual del Dios de Israel'
- issue: Sentido de ἐγέρσει aplicado a la casa del Señor
  english_pob_reading: for the rebuilding of
  chosen_spanish_reading: por la reedificación de
  alternative_spanish_readings:
  - por la reconstrucción de
  - por el levantamiento de
  rationale: La palabra griega puede abarcar la elevación, erección o restauración de la casa. La versión principal sigue la decisión revisada del POB en inglés y usa 'reedificación' para comunicar el resultado constructivo sin reducir indebidamente la tensión semántica del término.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; documented lexical alternative'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que sustituyó una formulación más literal de ἐπὶ τῇ ἐγέρσει por 'for the rebuilding of' para expresar con más naturalidad el contexto del templo. Se conserva, sin embargo, la amplitud semántica de ἐγέρσις mediante 'reedificación' y una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, conforme al criterio del POB para griego, y no se sustituye por 'Yahvé' en el texto principal.
  - '''Casa del Señor'' se conserva como fórmula bíblica estable y más cercana al griego que ''templo''.'
  - '''Reedificación'' se prefiere a ''reconstrucción'' por resonancia bíblica y por reflejar la idea de levantar de nuevo una casa.'
  - La puntuación y la concordancia se han adaptado al español para que la frase coral sea fluida y readable sin perder el sujeto colectivo.
