translation:
  language: es
  text: Entonces José introdujo a Jacob, su padre, y lo presentó ante Faraón[a], y Jacob bendijo a Faraón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hizo estar delante de Faraón».
    reason: lexical_alternative
  - marker: b
    text: «Bendijo» puede incluir una bendición formal hablada, no solo un saludo cortés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: brought in
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - hizo entrar
  lexicon: HALOT
  rationale: 'El verbo hifil expresa acción causativa: José hizo que Jacob llegara a la presencia real. En español, «llevó» comunica bien el movimiento conducido por José; «hizo entrar» sería más literal pero menos natural, y «trajo» puede sonar menos marcado en el contexto de la corte.'
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su propio padre
  - a su padre
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms remite claramente a José. «Su padre» es la forma natural y fiel en español; «su propio padre» sería más enfático de lo necesario.
- source_word: וַיַּעֲמִדֵהוּ לִפְנֵי
  english_pob_choice: presented him before
  chosen_spanish: lo presentó
  alternatives_spanish:
  - lo puso delante de
  - lo hizo estar delante de
  - lo hizo comparecer ante
  lexicon: HALOT
  rationale: El hifil de עמד es literalmente causativo («hacer estar de pie»), pero en español jurídico/cortesano «lo presentó» transmite adecuadamente la acción formal ante Faraón. Se mantiene la posibilidad literal en nota porque el hebreo permite también «hacerlo estar delante de».
- source_word: לִפְנֵי פַרְעֹה
  english_pob_choice: before Pharaoh
  chosen_spanish: delante de Faraón
  alternatives_spanish:
  - en presencia de Faraón
  - ante Faraón
  lexicon: HALOT
  rationale: «Delante de» conserva bien la localización relacional del hebreo. «Ante Faraón» también sería correcto y solemne; se opta por una expresión clara y natural en español bíblico contemporáneo.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - lo bendijo
  - pronunció una bendición sobre Faraón
  - lo saludó con una bendición
  lexicon: HALOT
  rationale: ברך conserva su sentido básico de bendecir. En español, «bendijo» mantiene la fuerza lexical y la tensión teológica del texto, sin reducirlo a un simple saludo cortesano.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: «Faraón» es el término estándar en español bíblico y corresponde al título/nombre del rey egipcio.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: Gramática hebrea
  rationale: La waw consecutiva introduce progreso narrativo. «Entonces» refleja bien la secuencia del relato en español sin sobrecargar la frase con repeticiones de «y».
theological_decisions:
- issue: Naturaleza de la bendición de Jacob a Faraón
  english_pob_reading: Jacob actually blessed Pharaoh
  chosen_spanish_reading: Jacob bendijo realmente a Faraón
  alternative_spanish_readings:
  - Jacob simplemente saludó cortésmente a Faraón
  - Jacob pronunció una bendición formal sobre Faraón
  rationale: Se conserva el sentido ordinario de ברך como «bendecir». La escena presenta al patriarca pronunciando bendición sobre el rey, y no debe diluirse en un mero saludo por razones de cortesía interpretativa.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de la tensión lexical-teológica'
translation_notes:
  revision_awareness: Revisado a la luz del paquete fuente hebreo y del audit trail en inglés; se mantuvieron las decisiones clave de causatividad, presentación cortesana y la fuerza plena de ברך, sin suavizar la bendición a un simple saludo.
  spanish_consistency_notes:
  - Se usa «Faraón» de forma consistente para el título egipcio.
  - Se preserva la secuencia narrativa con «Entonces».
  - El registro es reverente y publicable, evitando calcos pesados pero manteniendo la cercanía al hebreo.
  - La nota textual sobre «presentó» conserva la alternativa causal del hifil sin duplicar el sentido en el cuerpo principal.
