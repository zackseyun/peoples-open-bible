translation:
  language: es
  text: La reprensión penetra[a] más hondo en el hombre entendido que cien golpes en el necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La reprensión se hunde más hondo en quien entiende que golpear al necio cien veces»'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּחַת
  english_pob_choice: goes deeper into
  chosen_spanish: penetra
  alternatives_spanish:
  - se hunde en
  - entra más hondo en
  - cae más hondo en
  lexicon: HALOT
  rationale: 'La forma expresa una comparación de impacto o penetración: la reprensión afecta más profundamente al entendido. «Penetra» conserva la idea de llegar más adentro sin volver la frase pesada en español.'
- source_word: גְּעָרָה
  english_pob_choice: a rebuke
  chosen_spanish: la reprensión
  alternatives_spanish:
  - el reproche
  - la reprensión severa
  - la amonestación
  lexicon: HALOT
  rationale: El sustantivo denota una corrección verbal fuerte. «Reprensión» comunica bien la fuerza de la corrección sin añadir matices ajenos; «reproche» también sería posible, pero suena algo menos directo en este proverbio.
- source_word: בְמֵבִין
  english_pob_choice: into a man of understanding
  chosen_spanish: en el hombre entendido
  alternatives_spanish:
  - en uno que entiende
  - en un hombre de entendimiento
  - en el entendido
  lexicon: HALOT
  rationale: El participio masculino singular se refleja con «el hombre entendido», preservando la fuerza proverbial y la referencia masculina singular del hebreo. «Entendido» mantiene la idea de discernimiento activo.
- source_word: מֵהַכּוֹת
  english_pob_choice: than ... blows into
  chosen_spanish: que cien golpes en
  alternatives_spanish:
  - que golpear cien veces a
  - que cien azotes en
  - que cien golpes contra
  lexicon: HALOT
  rationale: El prefijo comparativo se expresa naturalmente con «que». «Golpes» conserva el valor de הַכּוֹת como golpes/azotes, sin forzar el verbo español a una construcción menos idiomática.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - el estúpido
  lexicon: HALOT
  rationale: En Proverbios, כְּסִיל es un término sapiencial fijo para la persona moralmente obtusa. «Necio» es el equivalente más tradicional y fiel en español; además mantiene el contraste sapiencial con «hombre entendido».
- source_word: מֵאָה
  english_pob_choice: a hundred
  chosen_spanish: cien
  alternatives_spanish:
  - cien veces
  - cien golpes
  lexicon: HALOT
  rationale: El número se conserva como hipérbole proverbial. «Cien» suena natural en español y preserva el contraste intensificador del hebreo.
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo y con el sentido auditado en la POB inglesa; se mantiene la comparación proverbial y la hipérbole de «cien». No se introducen cambios textuales ni decisiones doctrinales.
  spanish_consistency_notes:
  - 'Se mantuvo una terminología sapiencial consistente: «reprensión», «hombre entendido», «necio».'
  - Se evitó una paráfrasis explicativa excesiva para conservar la concisión proverbial del hebreo.
  - La nota alternativa reproduce la ambigüedad comparativa ya reconocida en la POB inglesa.
