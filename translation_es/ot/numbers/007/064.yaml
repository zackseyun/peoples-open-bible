lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabra macho
  - cabro
  - chivo
  lexicon: HALOT
  rationale: La expresión hebrea designa un macho de la especie caprina en contexto sacrificial. 'Macho cabrío' es claro, natural en español bíblico y conserva la especificidad sexual del animal, equivalente al 'male goat' del texto inglés auditado.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - una sola
  lexicon: HALOT
  rationale: El numeral está explícito en el hebreo y en una lista de ofrendas se expresa naturalmente como 'un' delante de un sustantivo masculino.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para sacrificio por el pecado
  alternatives_spanish:
  - como sacrificio por el pecado
  - para ofrenda por el pecado
  - por el pecado
  lexicon: HALOT
  rationale: En español, 'sacrificio por el pecado' comunica el sentido cultual de חַטָּאת en este inventario ritual. Se evita reducirlo a 'pecado' sin más, y 'para' refleja bien la función de ל en la lista de ofrendas.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo breve y con la traducción inglesa auditada; no se detectan revisiones aplicadas ni tensiones textuales adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y litúrgicamente inteligible, acorde con una lista de ofrendas.
  - No se usa 'SEÑOR' ni terminología ajena al verso; la decisión principal es léxica en el animal sacrificial y en חַטָּאת.
  - La nota conserva una alternativa legítima ('he-goat') sin desplazar la forma principal más natural para el español.
