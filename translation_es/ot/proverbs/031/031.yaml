base_translation:
  language: en
  yaml_path: translation/ot/proverbs/031/031.yaml
  text: Give her of the fruit of her hands[b][a], and let her works praise her in the gates.
  footnotes:
  - marker: a
    text: Or 'at the city gates'—the gates were the public place of recognition, judgment, and honor in ancient Israelite society.
    reason: cultural_note
  - marker: b
    text: Or 'let her deeds praise her'; the Hebrew personifies her works as bearing public witness to her worth.
    reason: lexical_alternative
