translation:
  language: es
  text: Y cargó con audacia hacia el medio de la falange[a], y seguía matando a derecha y a izquierda, y se abrían ante él a uno y otro lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Falange» conserva el término militar específico del griego; también podría decirse «formación» o «línea de batalla», pero se perdería parte de la imagen técnica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέδραμεν
  english_pob_choice: charged
  chosen_spanish: cargó
  alternatives_spanish:
  - arremetió
  - atacó
  - corrió contra
  lexicon: LSJ
  rationale: El verbo griego expresa un acometimiento militar enérgico; «cargó» comunica con naturalidad esa embestida rápida y agresiva en español.
- source_word: θράσει
  english_pob_choice: boldly
  chosen_spanish: con audacia
  alternatives_spanish:
  - con valentía
  - audazmente
  lexicon: LSJ
  rationale: El dativo indica modo; «con audacia» conserva el matiz de osadía del texto griego sin volver la frase pesada.
- source_word: εἰς μέσον τῆς φάλαγγος
  english_pob_choice: into the middle of the phalanx
  chosen_spanish: en medio de la falange
  alternatives_spanish:
  - en medio de la formación
  - en el centro de la falange
  lexicon: LSJ
  rationale: «Falange» mantiene la imagen militar específica del griego; «en medio de» reproduce el movimiento hacia el centro de la formación.
- source_word: ἐθανάτου
  english_pob_choice: kept killing
  chosen_spanish: seguía matando
  alternatives_spanish:
  - iba matando
  - continuaba matando
  - mataba
  lexicon: LSJ
  rationale: El imperfecto sugiere acción շարունակada; «seguía matando» preserva esa duración mejor que un pretérito puntual.
- source_word: δεξιὰ καὶ εὐώνυμα
  english_pob_choice: right and left
  chosen_spanish: a derecha y a izquierda
  alternatives_spanish:
  - a la derecha y a la izquierda
  - a diestra y siniestra
  lexicon: LSJ
  rationale: La expresión idiomática describe ambos lados; «a derecha y a izquierda» es una equivalencia natural y sobria en español contemporáneo.
- source_word: ἐσχίζοντο
  english_pob_choice: were split apart
  chosen_spanish: se abrían
  alternatives_spanish:
  - eran partidas
  - se dividían
  - se apartaban
  lexicon: LSJ
  rationale: En contexto militar la pasiva imperfecta describe la apertura de la línea ante él; «se abrían» expresa el efecto sin sobrecargar el mecanismo físico.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: ante él
  alternatives_spanish:
  - delante de él
  - frente a él
  lexicon: LSJ
  rationale: La idea es que la línea se abre en su avance; «ante él» conserva la relación espacial directa y funciona bien con la pasiva española.
- source_word: ἔνθα καὶ ἔνθα
  english_pob_choice: on both sides
  chosen_spanish: por ambos lados
  alternatives_spanish:
  - de un lado y del otro
  - a uno y otro lado
  - a ambos lados
  lexicon: LSJ
  rationale: La locución puede entenderse como división hacia uno y otro lado; «por ambos lados» refleja ese resultado y evita una traducción demasiado literal y oscura.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y el auditor inglés: mantiene el avance agresivo, el aspecto imperfectivo de «seguía matando», y la imagen de la línea que se abre a ambos lados. Se evita traducir mecánicamente «phalanx» como un término genérico, porque el contexto militar favorece conservar la referencia específica.'
  spanish_consistency_notes:
  - Se mantiene «falange» como término militar técnico, consistente con el valor dado por el audit trail inglés.
  - Se usa una estructura verbal continua («seguía matando») para reflejar el imperfecto griego ἐθανάτου.
  - La preposición espacial («ante él», «por ambos lados») expresa el efecto visual del griego sin introducir interpretaciones adicionales.
  - El registro es sobrio y bíblico, pero con español actual y fluido.
