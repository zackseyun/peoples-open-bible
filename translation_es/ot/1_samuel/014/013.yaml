translation:
  language: es
  text: Entonces Jonatán subió apoyándose en sus manos y sus pies[a], y su escudero iba detrás de él. Cayeron delante de Jonatán, y su escudero los mataba detrás de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a cuatro patas». El hebreo describe literalmente la postura de avanzar con las manos y los pies; la opción del texto conserva esa imagen de manera más natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: climbed up
  chosen_spanish: subió
  alternatives_spanish:
  - escaló
  - subió a
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en español, «subió» mantiene la literalidad y la naturalidad. «Escaló» sería más pictórico, pero añade una imagen más marcada que la del hebreo y no es necesaria para el sentido.
- source_word: עַל יָדָיו וְעַל רַגְלָיו
  english_pob_choice: on his hands and feet
  chosen_spanish: sobre sus manos y sus pies
  alternatives_spanish:
  - con las manos y los pies
  - a cuatro patas
  lexicon: HALOT
  rationale: La frase hebrea describe de modo vívido la postura corporal. «Sobre sus manos y sus pies» conserva el paralelismo y el valor concreto sin volverlo idiomático de forma excesiva. «A cuatro patas» es más natural, pero demasiado interpretativo para este contexto narrativo.
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - su portador de armas
  - su portador de armadura
  lexicon: HALOT
  rationale: En narrativa militar, el cargo equivalente en español bíblico y moderno es «escudero». La expresión comunica la función del servidor que lleva el equipo del guerrero, sin perder el matiz histórico del término.
- source_word: אַחֲרָיו
  english_pob_choice: behind him / after him
  chosen_spanish: detrás de él / tras él
  alternatives_spanish:
  - después de él
  - siguiéndolo
  lexicon: HALOT
  rationale: El primer אַחֲרָיו es espacial y se traduce naturalmente «detrás de él». El segundo conserva el encadenamiento verbal con «tras él», que en español permite reflejar el mismo término hebreo sin sonar redundante. «Después de él» sería más temporal y menos preciso aquí.
- source_word: וַיִּפְּלוּ לִפְנֵי יוֹנָתָן
  english_pob_choice: They fell before Jonathan
  chosen_spanish: Ellos cayeron delante de Jonatán
  alternatives_spanish:
  - cayeron ante Jonatán
  - cayeron frente a Jonatán
  lexicon: HALOT
  rationale: נפל לפני puede describir caída física o derrota ante alguien. «Delante de» conserva la imagen espacial y la ambigüedad del hebreo, sin decidir por una derrota explícita más allá de lo que el texto afirma.
- source_word: מְמוֹתֵת
  english_pob_choice: killed them after him
  chosen_spanish: los mató tras él
  alternatives_spanish:
  - los iba matando tras él
  - los seguía matando tras él
  - los mataba tras él
  lexicon: HALOT
  rationale: El participio hebreo puede tener fuerza iterativa o continua. El texto inglés revisado optó por una forma más literal y formal; en español, «los mató tras él» conserva la relación verbal y el orden del hebreo, mientras que alternativas progresivas como «los iba matando» expresarían más claramente la iteración pero añadirían interpretación.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que prefirió una forma más literal y formal: «killed them after him» en lugar de una progresiva interpretativa. Por ello, el español evita «iba matando» o «seguía matando» y conserva una formulación más directa. También se mantuvo la duplicación semítica de אַחֲרָיו mediante dos soluciones próximas («detrás de él» / «tras él») para reflejar el patrón del hebreo sin forzar una repetición artificial exacta.'
  spanish_consistency_notes:
  - Se mantuvo «Jonatán» como forma estable del nombre propio.
  - Se evitó «SEÑOR» o terminología de sustitución porque no aparece el Tetragrámaton en este versículo.
  - «Escudero» se usa de modo consistente con la función militar del נֹשֵׂא כֵלִים.
  - «Delante de» y «tras él» preservan la dirección espacial sin añadir explicaciones narrativas.
  - La nota al pie se ancla en «sus manos y sus pies» para documentar la alternativa idiomática española.
