translation:
  language: es
  text: ¿Qué, diriges tu espíritu contra Dios, y sacas palabras de tu boca?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacia Dios'. El hebreo dice literalmente 'a/hacia Dios'; 'contra Dios' se elige en el texto principal porque el contexto es acusatorio y sugiere oposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: En este contexto introduce el contenido de la acusación, de modo que en español natural funciona mejor como 'que'. 'Porque' o 'pues' sonarían más explicativos que citativos.
- source_word: תָשִׁיב
  english_pob_choice: you turn
  chosen_spanish: tú vuelcas
  alternatives_spanish:
  - tú giras
  - tú diriges
  - tú vuelves
  lexicon: HALOT
  rationale: El verbo en hifil expresa aquí dirigir/inclinar la disposición interior. 'Vuelcas' transmite una orientación intensa y evita la lectura meramente física de 'volver'.
- source_word: אֶל אֵל
  english_pob_choice: against God
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - hacia Dios
  - a Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hacia Dios', pero la lectura del contexto es acusatoria y de oposición. En español se preserva esa tensión con 'contra Yahvé', siguiendo la decisión POB de no suavizar el matiz hostil implícito.
- source_word: רוּחֶךָ
  english_pob_choice: your spirit
  chosen_spanish: tu espíritu
  alternatives_spanish:
  - tu aliento
  - tu viento
  - tu temperamento
  lexicon: HALOT
  rationale: '''Espíritu'' conserva el sentido antropológico interior del hebreo mejor que ''aliento'' o ''viento''. ''Temperamento'' sería demasiado interpretativo.'
- source_word: וְהֹצֵאתָ
  english_pob_choice: and bring
  chosen_spanish: y sacas
  alternatives_spanish:
  - y haces salir
  - y sacas fuera
  - y produces
  lexicon: HALOT
  rationale: El hifil de יצא conserva la imagen concreta de hacer salir algo. 'Sacas' es la forma más natural en español para palabras que salen de la boca.
- source_word: מִפִּיךָ
  english_pob_choice: out of your mouth
  chosen_spanish: de tu boca
  alternatives_spanish:
  - de tu boca hacia afuera
  - desde tu boca
  lexicon: HALOT
  rationale: La preposición marca procedencia; 'de tu boca' suena natural en español y mantiene la imagen fuente.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - habla
  lexicon: HALOT
  rationale: El plural arameizante significa 'palabras' o 'dichos'. 'Palabras' es la opción más directa y clara en español contemporáneo.
theological_decisions:
- issue: Direccionalidad de אֶל אֵל en un discurso acusatorio
  english_pob_reading: against God
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - hacia Dios
  - a Dios
  rationale: Aunque אֶל normalmente significa 'hacia/a', la escena es de reproche y el sentido pragmático es oposición. Mantener 'contra' preserva la fuerza acusatoria que el POB documenta en inglés, sin borrar el valor literal subyacente.
  doctrine_reference: Lectura contextual del discurso de Elifaz; semántica direccional figurada del hebreo
- issue: Uso de Yahvé en vez de un sustituto reverencial
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  rationale: El proyecto POB pide reflejar el nombre divino explícitamente cuando el hebreo usa אֵל en un contexto que nombra a Dios sin máscara litúrgica. Aquí 'Yahvé' hace visible la referencia divina con el término project-level establecido.
  doctrine_reference: Convención terminológica POB sobre יהוה / YHWH
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se registraron cambios recientes en la revisión más nueva; la propuesta española sigue la decisión óptima de equivalencia sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al criterio terminológico del proyecto.
  - Se eligió un español directo y publicable, evitando calcos como 'haces salir' donde 'sacas' preserva mejor la imagen sin perder naturalidad.
  - La nota conserva la alternativa literal 'hacia Yahvé' para no borrar la tensión semántica de אֶל.
