translation:
  language: es
  text: Con dos naciones mi alma siente repugnancia[a], y la tercera no es un pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y la tercera no es una nación». El hebreo dice «pueblo» aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנֵי גוֹיִם
  english_pob_choice: with two nations
  chosen_spanish: con dos naciones
  alternatives_spanish:
  - ante dos naciones
  - por causa de dos naciones
  lexicon: HALOT
  rationale: El hebreo usa ב con el numeral de forma idiomática, y el inglés POB mantuvo una preposición simple sin expandir la relación. En español, «con dos naciones» conserva esa relación breve y natural, sin interpretar de más.
- source_word: קָצָה נַפְשִׁי
  english_pob_choice: my soul is disgusted
  chosen_spanish: mi alma se disgusta
  alternatives_spanish:
  - mi alma aborrece
  - mi alma siente repugnancia
  - estoy disgustado
  lexicon: HALOT
  rationale: El hebreo expresa una aversión fuerte o rechazo sentido por el alma. «Se disgusta» conserva la imagen antropológica de נַפְשִׁי y comunica el matiz de disgusto/repulsión en un español natural.
- source_word: וְהַשְּׁלִישִׁית
  english_pob_choice: and the third
  chosen_spanish: y la tercera
  alternatives_spanish:
  - y la tercera [nación]
  - y la tercera [gente]
  - y la tercera una
  lexicon: HALOT
  rationale: La forma ordinal femenina presupone un sustantivo implícito femenino en contexto. En español, «la tercera» preserva la elipsis sin introducir una especificación no explícita en el hebreo.
- source_word: אִינֶנּוּ עָם
  english_pob_choice: is not a people
  chosen_spanish: no es un pueblo
  alternatives_spanish:
  - no es una nación
  - no es gente
  lexicon: HALOT
  rationale: El hebreo עָם significa aquí «pueblo» en sentido colectivo. Aunque el paralelo griego tiene ἔθνος («nación»), el texto hebreo es la base principal; por eso se mantiene «pueblo» en el cuerpo principal y se deja la alternativa griega en nota.
theological_decisions:
- issue: Tensión entre el hebreo «pueblo» y el paralelo griego «nación» en la cláusula final
  english_pob_reading: Use 'people' in the main text, with 'nation' preserved as an alternative
  chosen_spanish_reading: Usar «pueblo» en el texto principal, con «nación» preservado como alternativa textual
  alternative_spanish_readings:
  - no es una nación
  rationale: La prioridad textual recae en el hebreo conservado con alta confianza. Aun así, el griego paralelo es relevante y debe quedar visible como alternativa auditable, sin borrar la diferencia léxica.
  doctrine_reference: PHILOSOPHY.md 'What we are translating'; DOCTRINE.md §Translation philosophy 1, 5
- issue: Si normalizar o no la expresión antropológica «mi alma»
  english_pob_reading: Retain 'my soul' in the main text
  chosen_spanish_reading: Retener «mi alma» en el texto principal
  alternative_spanish_readings:
  - yo estoy disgustado
  rationale: El hebreo explícitamente dice נַפְשִׁי, y el verso es poético. Mantener «mi alma» preserva el tejido del original y evita reducir el enunciado a una mera primera persona.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios sustantivos; el acuerdo entre testigos es alto y la única tensión principal es la equivalencia léxica entre el hebreo עָם y el griego ἔθνος, ya preservada en la nota.
  spanish_consistency_notes:
  - Se mantuvo «mi alma» para conservar la antropología del hebreo y la textura poética.
  - Se eligió «pueblo» como base principal por la prioridad del hebreo, evitando sustituirlo por terminología eclesiástica o por una harmonización automática con el griego.
  - La nota a[ ] marca explícitamente la alternativa griega sin duplicar información en el texto principal.
