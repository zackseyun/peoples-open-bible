base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/024.yaml
  text: 'Therefore[a], O king, let my counsel be acceptable to you: break off your sins by righteousness, and your iniquities by showing mercy to the poor[b], that there may perhaps be a prolonging of your prosperity.'
  footnotes:
  - marker: a
    text: Or 'redeem your sins by righteousness, and your iniquities by mercy to the poor.' The Aramaic verb can be understood more literally as 'break off' or, in some contexts, 'redeem/deliver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a prolonging of your tranquility' or 'peace.'
    reason: lexical_alternative
