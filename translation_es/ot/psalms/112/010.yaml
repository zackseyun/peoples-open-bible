- from: El impío lo verá y se enojará[a]; crujirá sus dientes y se derretirá; el deseo de los impíos perecerá.
  to: El impío verá y se enojará[a]; rechinará los dientes y se derretirá; el deseo de los impíos perecerá.
  rationale: Se elimina el pronombre añadido «lo» para ajustarse más estrechamente al hebreo y al texto inglés auditado, manteniendo la concisión poética. Se sustituye «crujirá sus dientes» por «rechinará los dientes» por ser la expresión española más natural e idiomática para la locución hebrea. La nota se conserva, con redacción española más natural, para reflejar la alternativa colectiva documentada en el POB inglés.
