  rationale: 'Se ajusta פשע a «transgresión» para alinearlo con la decisión léxica auditada y preservar mejor su fuerza. También se suavizan pequeños puntos de estilo en español: «ciertamente hará» mejora la fluidez, «libra las batallas» eleva el registro, y «todos tus días» expresa el modismo de manera más natural.'
