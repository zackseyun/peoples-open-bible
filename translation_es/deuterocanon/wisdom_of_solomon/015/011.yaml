translation:
  language: es
  text: porque no conoció al que lo formó[a], y al que le insufló un alma activa[b] y le insufló un espíritu que da vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘no reconoció’ al que lo formó.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘un alma animante’ o, más interpretativamente, ‘un alma viva’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγνόησεν
  english_pob_choice: did not know
  chosen_spanish: no conoció
  alternatives_spanish:
  - no supo de
  - ignoró
  - no reconoció
  lexicon: BDAG
  rationale: ‘No conoció’ conserva la fuerza relacional y cognitiva del aoristo de ἀγνοέω sin decidir de antemano si la ignorancia es meramente factual o también culpable. ‘No reconoció’ sería posible, pero estrecha más el sentido hacia reconocimiento visual o identificativo.
- source_word: πλάσαντα
  english_pob_choice: formed
  chosen_spanish: lo formó
  alternatives_spanish:
  - lo hizo
  - lo modeló
  - lo moldeó
  lexicon: LSJ
  rationale: ‘Formó’ es la correspondencia natural y fiel para πλάσσω en lenguaje de creación. Mantiene la imagen del Creador modelando al ser humano sin introducir una materialidad explícita que el griego no exige.
- source_word: ἐμπνεύσαντα
  english_pob_choice: breathed into
  chosen_spanish: le sopló
  alternatives_spanish:
  - le respiró
  - sopló en él
  - le infundió
  lexicon: LSJ
  rationale: El verbo apunta a la impartición de aliento. En español, ‘le sopló’ conserva bien la imagen concreta y la relación directa con el sujeto humano; ‘le infundió’ sería más interpretativo y menos imagético. Se mantiene además el paralelismo de acción divina en la cláusula.
- source_word: ψυχὴν ἐνεργοῦσαν
  english_pob_choice: an active soul
  chosen_spanish: un alma activa
  alternatives_spanish:
  - un alma animante
  - un alma viva
  - un alma operante
  lexicon: LSJ
  rationale: ‘Alma activa’ reproduce con cercanía la combinación de ψυχή con ἐνεργοῦσαν (‘activa, operante’). Se evita ‘alma viva’ porque desplaza el énfasis desde la actividad hacia la mera vida, y ‘alma animante’ resulta más interpretativa.
- source_word: ἐμφυσήσαντα
  english_pob_choice: breathed in / breathed into him
  chosen_spanish: le infundió
  alternatives_spanish:
  - le sopló
  - le respiró
  - le insufló
  lexicon: LSJ
  rationale: 'Aquí se elige ‘infundió’ para distinguir este segundo acto del primer verbo de soplar y para preservar el paralelismo de dos dones distintos: alma activa y espíritu que da vida. En español, ‘insufló’ sería muy cercano, pero ‘infundió’ suena más claro y digno para una lectura eclesial contemporánea.'
- source_word: πνεῦμα ζωτικόν
  english_pob_choice: a life-giving spirit
  chosen_spanish: un espíritu que da vida
  alternatives_spanish:
  - un espíritu vivificante
  - un aliento de vida
  - un espíritu vital
  lexicon: BDAG
  rationale: ‘Espíritu que da vida’ conserva tanto πνεῦμα como ζωτικόν sin reducir la frase a ‘aliento’ ni convertirla en una equivalencia demasiado estrecha con otra formulación bíblica. ‘Vivificante’ sería válido, pero ‘que da vida’ resulta más directo y transparente en español.
theological_decisions:
- issue: Distinción antropológica entre ψυχή y πνεῦμα
  english_pob_reading: Render both distinctly as 'soul' and 'spirit'
  chosen_spanish_reading: Distinguir ‘alma’ y ‘espíritu’
  alternative_spanish_readings:
  - Reformular ambos como ‘vida’ o ‘aliento’
  - Unificar las dos expresiones para simplificar la antropología
  rationale: El griego usa dos términos distintos en paralelo deliberado. Mantener ‘alma’ y ‘espíritu’ preserva la tensión antropológica y poética del texto, sin resolverla prematuramente por medio de una síntesis doctrinal posterior. También permite que la lectura española conserve la diferencia entre el don interior de vida y el aliento espiritual recibido.
  doctrine_reference: Preservar la tensión teológica y la distinción léxica; no armonizar indebidamente los términos antropológicos.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del auditorio inglés, que reforzó el paralelismo de los dos participios con ‘breathed into him’ en ambas cláusulas. En español se conserva ese paralelismo mediante dos acciones divinas coordinadas: ‘le sopló’ y ‘le infundió’. También se mantiene la distinción entre ψυχή y πνεῦμα, sin suavizarla hacia una sola noción de vida.'
  spanish_consistency_notes:
  - Se usa ‘alma’ para ψυχή y ‘espíritu’ para πνεῦμα, conforme a la decisión antropológica del proyecto.
  - Se evita ‘SEÑOR’ porque aquí no aparece el tetragrámaton; el texto se mueve en lenguaje creador sin referencia directa al nombre divino.
  - Se prefiere un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - La nota a conserva la alternativa verbal de reconocimiento, y la nota b conserva la alternativa interpretativa sobre ψυχὴν ἐνεργοῦσαν.
