    text: Or 'were in anguish,' 'twisted,' or 'trembled' for 'writhed.' The Hebrew verb can denote convulsive shaking or labor-like writhing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deeps.' The Hebrew refers to the deep waters or ocean depths.
    reason: lexical_alternative
