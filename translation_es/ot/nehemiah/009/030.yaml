translation:
  language: es
  text: Porque por muchos años fuiste paciente con ellos y testificaste contra ellos por tu Espíritu mediante tus profetas[a], pero no escucharon. Entonces los entregaste en mano de los pueblos de las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y testificaste contra ellos por tu Espíritu mediante tus profetas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמְשֹׁךְ
  english_pob_choice: you were patient
  chosen_spanish: fuiste paciente
  alternatives_spanish:
  - los prolongaste
  - los soportaste
  - extendiste tu paciencia hacia ellos
  lexicon: HALOT
  rationale: El verbo en esta construcción expresa prolongar el trato con alguien durante un tiempo largo, con matiz de paciencia o tolerancia. En español, «fuiste paciente» comunica con naturalidad el sentido contextual de forbearancia sin perder la idea de duración.
- source_word: עֲלֵיהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  lexicon: HALOT
  rationale: La preposición y el idiomático משׁך con עַל apoyan un sentido relacional. «Con ellos» refleja de forma natural la paciencia ejercida hacia esas personas.
- source_word: שָׁנִים רַבּוֹת
  english_pob_choice: for many years
  chosen_spanish: por muchos años
  alternatives_spanish:
  - durante muchos años
  - muchos años
  lexicon: HALOT
  rationale: Es una expresión temporal directa; «por muchos años» conserva bien la duración extensa y suena natural en español bíblico contemporáneo.
- source_word: וַתָּעַד בָּם
  english_pob_choice: testified against them
  chosen_spanish: testificaste contra ellos
  alternatives_spanish:
  - les diste testimonio contra ellos
  - amonestaste contra ellos
  lexicon: HALOT
  rationale: El verbo hifil de עוד puede significar dar testimonio, advertir o testificar. Aquí el paralelismo con profetas y Espíritu favorece la idea forense de testimonio contra su conducta, más fuerte que «advertiste».
- source_word: בְּרוּחֲךָ
  english_pob_choice: by your Spirit
  chosen_spanish: por tu Espíritu
  alternatives_spanish:
  - mediante tu espíritu
  - por tu aliento/espíritu
  lexicon: HALOT
  rationale: En el contexto profético, רוּחַ se refiere al Espíritu de Dios como agente de la reprensión profética. La mayúscula en «Espíritu» refleja ese referente divino.
- source_word: בְּיַד נְבִיאֶיךָ
  english_pob_choice: through your prophets
  chosen_spanish: mediante tus profetas
  alternatives_spanish:
  - por medio de tus profetas
  - por la mano de tus profetas
  lexicon: HALOT
  rationale: La locución «por la mano de» expresa agencia; en español «mediante tus profetas» conserva la instrumentación sin sonar literalista.
- source_word: וְלֹא הֶאֱזִינוּ
  english_pob_choice: but they would not listen
  chosen_spanish: pero no escucharon
  alternatives_spanish:
  - pero no quisieron escuchar
  - pero no dieron oído
  lexicon: HALOT
  rationale: El verbo implica prestar oído con atención. «No escucharon» es claro y fiel; aunque el inglés POB hace explícita la negativa voluntaria, el contexto ya comunica resistencia persistente.
- source_word: וַֽתִּתְּנֵם
  english_pob_choice: So you gave them
  chosen_spanish: Entonces los entregaste
  alternatives_spanish:
  - y los entregaste
  - así que los entregaste
  lexicon: HALOT
  rationale: El waw consecutivo introduce consecuencia. En español, «entregar» capta mejor la idea bíblica de poner a alguien bajo poder ajeno que un simple «dar».
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» expresa dominio o poder. «En mano de» mantiene la metáfora bíblica con buena legibilidad en español.
- source_word: עַמֵּי הָאֲרָצוֹת
  english_pob_choice: the peoples of the lands
  chosen_spanish: los pueblos de las tierras
  alternatives_spanish:
  - las naciones de las tierras
  - los pueblos de los países
  lexicon: HALOT
  rationale: El plural apunta a pueblos/territorios circundantes. «Los pueblos de las tierras» conserva tanto el plural como la referencia regional-política sin universalizarlo.
theological_decisions:
- issue: Sentido de «tu Espíritu» en contexto profético
  english_pob_reading: A reference to God's Spirit as the agent of prophetic warning/testimony
  chosen_spanish_reading: Una referencia al Espíritu de Dios como agente del testimonio profético
  alternative_spanish_readings:
  - tu espíritu como disposición o aliento
  - tu espíritu en sentido general
  rationale: La secuencia «por tu Espíritu mediante tus profetas» hace más coherente entender una acción divina personal en el ministerio profético. La traducción conserva el referente sin añadir formulaciones doctrinales ajenas al verso.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés, pero ajusta la metáfora hebrea a una sintaxis española natural: «fuiste paciente con ellos», «por tu Espíritu mediante tus profetas» y «los entregaste en mano de». Se preserva la tensión lexical entre advertencia y testimonio con la nota alternativa, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene «Espíritu» con mayúscula por el contexto de agencia divina.
  - «Entregaste en mano de» conserva la metáfora bíblica de dominio sin sustituirla por una paráfrasis más abstracta.
  - «Pueblos de las tierras» reproduce el plural regional de עַמֵּי הָאֲרָצוֹת sin convertirlo en una universalización innecesaria.
