    reason: lexical_alternative
  - marker: b
    text: Lit. «la altura de su fuerza»; la expresión puede referirse a su fortaleza elevada o a la altura de su poder defensivo.
    reason: lexical_alternative
  - marker: c
    text: O «saqueadores»; el término hebreo puede denotar a quienes devastan saqueando, además de destruir.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sobreinterpretación de לָהּ como «contra ella», se mejora la naturalidad de la frase final, y se reordenan/ajustan las notas para reflejar mejor las alternativas léxicas documentadas: plural «cielos», expresión literal «la altura de su fuerza», y la alternativa «saqueadores» para שֹׁדְדִים. Se mantiene «Yahvé» conforme a la política del proyecto.'
