translation:
  language: es
  text: El sacerdote los hará arder sobre el altar como una ofrenda hecha por fuego[a] para Yahvé; es una ofrenda por la culpa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «una ofrenda encendida». El hebreo usa un término técnico para una ofrenda presentada mediante fuego.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «ofrenda de reparación» o, tradicionalmente, «ofrenda por el delito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: lo hará arder
  alternatives_spanish:
  - lo quemará
  - lo hará subir en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el causativo de קטר indica hacer que la porción ascienda en humo sobre el altar. En español, «lo hará arder» comunica bien la acción cultual sin sonar forzado; conserva la idea de combustión ritual implícita en el verbo.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  lexicon: Pronombre de objeto directo
  rationale: Aunque el hebreo dice «los», el antecedente inmediato son las porciones sacrificiales ya tratadas como un conjunto en español; aquí un singular colectivo («lo») fluye mejor y sigue refiriendo a las partes ofrecidas.
- source_word: הַכֹּהֵן
  english_pob_choice: The priest
  chosen_spanish: El sacerdote
  alternatives_spanish:
  - El sacerdote oficiará
  - El sacerdote
  lexicon: HALOT
  rationale: קֹהֵן en legislación cultual se traduce naturalmente por «sacerdote». Es la forma más clara y fiel para el lector moderno, sin alterar el referente técnico.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: El sufijo direccional permite la imagen de ubicación sobre el altar. «Sobre el altar» expresa de manera natural el acto de quemar allí las porciones sacrificiales.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda por fuego
  lexicon: HALOT
  rationale: El término técnico alude a una ofrenda presentada mediante fuego. En español, «ofrenda encendida» mantiene el rasgo de fuego sin recurrir a una expresión demasiado literal o arcaica; además evita confundir «food offering» con una ofrenda de alimento común.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de parte de Yahvé
  lexicon: DOCTRINE.md contested terms
  rationale: Se preserva el nombre divino en la forma de proyecto «Yahvé», no la convención de ocultarlo tras «SEÑOR». La preposición «para» comunica bien la dedicación cultual de la ofrenda.
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda por la culpa y la reparación
  - ofrenda de culpabilidad
  lexicon: HALOT
  rationale: En Levítico, אָשָׁם es el nombre técnico de la ofrenda. «Ofrenda por la culpa» conserva la categoría cultual y resulta transparente en español; «ofrenda por la culpa» también permite oír la dimensión de reparación sin forzarla como única acepción.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - eso es
  - se trata de
  lexicon: Pronombre nominal
  rationale: 'El hebreo concluye con una cláusula nominal simple. En español, «es» mantiene la identificación categórica: no describe otra cosa, sino que clasifica la ofrenda.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto exige preservar el Tetragrámaton como nombre propio en español. «Yahvé» refleja la decisión doctrinal y mantiene visible el nombre del pacto, sin depender de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por la culpa o la reparación
  rationale: El término hebreo designa una categoría sacrificial técnica. «Ofrenda por la culpa» conserva el valor jurídico-ritual y evita reducir el término a una sola implicación moral o a una sola función reparadora.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo directamente y concuerda con el audit trail inglés: verbo causativo sacrificial, nombre divino explícito y terminología técnica de אָשָׁם. No se introdujeron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una sustitución reverencial.
  - Se traduce el lenguaje sacrificial con un registro culto, pero claro y natural para español moderno.
  - «Ofrenda por la culpa» conserva la categoría técnica sin desplazar innecesariamente el matiz de reparación.
  - La cláusula final se deja breve y categórica, como en el hebreo.
