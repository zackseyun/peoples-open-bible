    reason: lexical_alternative
  - marker: b
    text: El hebreo usa אֲדֹנָי יְהוִה, combinando el título «Señor» con el nombre divino YHWH.
    reason: cultural_note
  revision_rationale: Se ajusta la fórmula profética a 'Así dice', más natural y precisa para כֹּה אָמַר; se mejora la fluidez de la última cláusula con 'aparten su rostro de'; y se corrige el anclaje de la nota [b] para que corresponda al título divino que explica.
