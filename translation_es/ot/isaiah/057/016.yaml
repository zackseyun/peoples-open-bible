    reason: lexical_alternative
  revision_rationale: Se reemplaza «respiraciones» por «alientos» para mantener la imagen concreta del hebreo נְשָׁמוֹת con un español natural y eclesialmente legible. Se añade una nota para documentar las alternativas interpretativas preservadas en el rastro de auditoría inglés. También se ajusta «delante de mí» a «ante mí» por fluidez poética, sin cambiar el sentido.
