translation:
  language: es
  text: Y Yahvé los entregará delante de ustedes[a], y ustedes harán con ellos conforme a todo el mandamiento[b] que yo les he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los entregará a ustedes»; literalmente, «los dará delante de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene «el mandamiento» en singular, probablemente con valor colectivo para la instrucción ya dada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם / יְהוָה
  english_pob_choice: will give them over / Yahweh
  chosen_spanish: los entregará / Yahvé
  alternatives_spanish:
  - los dará
  - los pondrá en sus manos
  lexicon: HALOT
  rationale: נתן con objeto pronominal en contexto militar expresa entregar a alguien en poder de otro; en español, «entregar» conserva mejor ese valor que un simple «dar». יְהוָה se rinde como «Yahvé» según la terminología del proyecto para el nombre divino.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - frente a ustedes
  lexicon: HALOT
  rationale: La expresión es literalmente «delante de ustedes». En este contexto bélico, «delante de ustedes» mantiene la imagen espacial y evita una simplificación que borre el matiz del hebreo.
- source_word: וַעֲשִׂיתֶם לָהֶם
  english_pob_choice: you shall do to them
  chosen_spanish: ustedes actuarán contra ellos
  alternatives_spanish:
  - ustedes les harán
  - ustedes tratarán con ellos
  lexicon: HALOT
  rationale: עשה con ל puede ser muy general; aquí el contexto de conquista permite entender una acción hostil. «Actuar contra ellos» comunica el sentido sin forzar un objeto demasiado específico en español.
- source_word: כְּכָל הַמִּצְוָה
  english_pob_choice: according to all the commandment
  chosen_spanish: conforme a toda la ordenanza
  alternatives_spanish:
  - conforme a todo el mandamiento
  - según toda la ordenanza
  lexicon: HALOT
  rationale: El hebreo tiene singular con sentido colectivo. «Ordenanza» en español puede abarcar la instrucción normativa dada, y evita perder el valor colectivo de הַמִּצְוָה que el inglés POB señaló con la nota sobre el singular.
- source_word: אֲשֶׁר צִוִּיתִי אֶתְכֶם
  english_pob_choice: that I have commanded you
  chosen_spanish: que yo les he mandado
  alternatives_spanish:
  - que yo les he ordenado
  - que les he mandado
  lexicon: HALOT
  rationale: צוה se expresa de forma natural con «mandar» en español. El presente perfecto («he mandado») refleja una orden previa con vigencia continua, como en la lectura del inglés POB.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para reproducir el nombre propio divino en forma transliterada, no como título sustitutivo. «Yahvé» preserva la decisión auditada del POB inglés y mantiene la referencia al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance colectivo de הַמִּצְוָה
  english_pob_reading: the commandment is singular, likely used collectively
  chosen_spanish_reading: toda la ordenanza
  alternative_spanish_readings:
  - todo el mandamiento
  - todas las mandamientos
  rationale: La forma singular hebrea puede abarcar la instrucción total ya dada. En español, «toda la ordenanza» conserva ese valor colectivo sin imponer una pluralidad inexistente en el texto.
  doctrine_reference: English POB footnote b on singular collective force
translation_notes:
  revision_awareness: El inglés POB revisó «to you» por «before you» para reflejar mejor לִפְנֵיכֶם; por eso la versión española usa «delante de ustedes» y no una formulación dativa. También se mantuvo la observación sobre el singular colectivo de הַמִּצְוָה en una nota española equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa el pronombre de segunda persona plural de trato neutro latinoamericano («ustedes») para concordar con «כם».
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - La nota sobre el singular colectivo preserva la tensión lexical documentada en el audit trail inglés.
