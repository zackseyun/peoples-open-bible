translation:
  language: es
  text: 'Hijo de hombre[a], profetiza y di: «Así dice el Señor Yahvé: ¡Laméntense[b]! ¡Ay del día[c]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: el giro «hijo de hombre» es la forma idiomática tradicional del vocativo en Ezequiel; aquí no significa una descripción genealógica, sino un modo de dirigirse al profeta.'
    reason: source_note
  - marker: b
    text: También puede traducirse «¡Aúllen!». El verbo hebreo expresa un clamor intenso de dolor o terror; se eligió «¡Laméntense!» por ser más natural en español actual dentro del registro profético.
    reason: lexical_alternative
  - marker: c
    text: O «¡Ah por el día!». La interjección hebrea expresa dolor o terror ante el día de juicio venidero.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hombre mortal
  - Ser humano
  lexicon: HALOT
  rationale: Se conserva el giro idiomático fijo de Ezequiel para mantener la dirección profética repetida en el libro. 'Hijo de hombre' es la equivalencia española más estable y auditables del hebreo, sin suavizar el valor representativo de אָדָם.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla proféticamente
  - pronuncia profecía
  lexicon: HALOT
  rationale: Imperativo directo de נבא. 'Profetiza' conserva el registro formal y el mandato profético sin perífrasis innecesaria.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dirás
  - y hablarás
  lexicon: HALOT
  rationale: La secuencia imperativa se expresa con un español natural y breve. 'Y di' mantiene el paralelismo con el mandato anterior.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética estándar. 'Así dice' reproduce bien la solemnidad del mensajero sin volverla arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para יְהוָה → 'Yahvé'. En la combinación אֲדֹנָי יְהוִה, 'el Señor Yahvé' preserva ambos elementos del título sin recurrir a la convención inglesa 'Lord GOD' ni ocultar el nombre divino.
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Giman
  alternatives_spanish:
  - ¡Lamenten
  - ¡Aúllen
  lexicon: HALOT
  rationale: El imperativo plural expresa lamento fuerte, duelo o gemido. 'Giman' comunica con naturalidad el clamor de dolor y mantiene fuerza emotiva sin llevarlo al registro animalizante de 'aúllen'.
- source_word: הָהּ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay
  alternatives_spanish:
  - Ah
  - ¡Ay de
  lexicon: HALOT
  rationale: Interjección de dolor y presentimiento. '¡Ay' es la exclamación española más directa y natural para el lamento del texto.
- source_word: לַיּוֹם
  english_pob_choice: for the day
  chosen_spanish: del día
  alternatives_spanish:
  - para el día
  - por el día
  lexicon: HALOT
  rationale: En español, la exclamación se vuelve idiomática como '¡Ay del día!'. Mantiene la tersura y el foco ominoso del hebreo sin añadir contenido extra.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Aunque el audit trail inglés conserva 'Lord GOD' por convención, la norma del proyecto exige Yahvé para יְהוָה. La traducción española preserva el valor del nombre propio divino junto con el título אֲדֹנָי, sin disfrazarlo con mayúsculas convencionales.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés y no requiere revisión sustantiva: se conserva la estructura en dos mandatos, la fórmula profética y el lamento breve final. La única decisión teológicamente sensible es el tratamiento de יְהוִה, resuelto conforme a la norma española del proyecto con Yahvé.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en vez de 'SEÑOR' o 'Dios'.
  - Se conserva el vocativo fijo 'Hijo de hombre' por coherencia interna con Ezequiel.
  - La exclamación final se formula como lamento breve y no como advertencia formal ('¡Ay del día!').
