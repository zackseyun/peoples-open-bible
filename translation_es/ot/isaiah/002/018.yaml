translation:
  language: es
  text: Y los ídolos desaparecerán[a] por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasarán por completo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֱלִילִים
  english_pob_choice: And the idols
  chosen_spanish: Y los ídolos
  alternatives_spanish:
  - Pero los ídolos
  - Y los ídolos inútiles
  lexicon: HALOT
  rationale: El hebreo usa una conjunción simple seguida del artículo definido; por eso «Y» y «los ídolos» reproducen de manera natural la referencia definida. Se conserva «ídolos» como equivalente directo, dejando que el matiz despectivo de אֱלִילִים quede implícito por el término y el contexto, sin añadir una glosa interpretativa en el texto principal.
- source_word: כָּלִיל
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - completamente
  - totalmente
  - entera/enteramente
  lexicon: HALOT
  rationale: Aquí כָּלִיל funciona adverbialmente con valor de totalidad. «Por completo» transmite con claridad la intensidad total sin sonar forzado en español, y mantiene la fuerza enfática del hebreo.
- source_word: יַחֲלֹף
  english_pob_choice: will vanish
  chosen_spanish: desaparecerán
  alternatives_spanish:
  - pasarán
  - se desvanecerán
  - desaparecerán por completo
  lexicon: HALOT
  rationale: חלף puede significar pasar, desaparecer o pasar away según el contexto. Con «ídolos» como sujeto y כָּלִיל como intensificador, el sentido es de desaparición total; «desaparecerán» expresa bien esa fuerza profética en español sin perder naturalidad.
translation_notes:
  revision_awareness: El texto fuente y el aparato en inglés muestran alta concordancia y ninguna revisión aplicada; por eso la versión española sigue de cerca el sentido establecido sin introducir variaciones interpretativas adicionales.
  spanish_consistency_notes:
  - Se conserva el nombre divino y la terminología teológica general del proyecto cuando corresponde, pero este versículo no contiene referencias que requieran decisiones sobre Yahvé, Mesías o Espíritu.
  - La construcción verbal en futuro plural concuerda con el sujeto plural «los ídolos».
  - La nota al pie mantiene la alternativa lexical documentada por el POB en inglés, adaptada de forma idiomática al español.
