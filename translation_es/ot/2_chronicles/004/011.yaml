translation:
  language: es
  text: 'Huram hizo las ollas[a], las palas y los cuencos. Así Huram terminó la obra que hizo para el rey Salomón en la casa de Dios:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También se escribe «Hiram» en pasajes relacionados y en la tradición inglesa.
    reason: alternative_reading
lexical_decisions:
- source_word: חוּרָם / חירם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Hiram
  lexicon: HALOT
  rationale: Se conserva la transliteración que refleja la forma de este versículo. 'Huram' es clara en español y mantiene la solución auditada del POB en inglés; 'Hiram' queda como variante conocida.
- source_word: הַסִּירוֹת
  english_pob_choice: pots
  chosen_spanish: hornillos
  alternatives_spanish:
  - ollas
  - vasijas
  - potes
  lexicon: HALOT
  rationale: En este contexto de utensilios del templo, 'hornillos' intenta reflejar el uso probable de recipientes asociados al fuego o al servicio del altar con más precisión funcional que 'ollas'. Se mantiene una opción concreta sin exagerar la especificación.
- source_word: הַיָּעִים
  english_pob_choice: shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las paletillas
  - las azadas
  lexicon: HALOT
  rationale: '''Palas'' comunica de forma natural el implemento manual para recoger o retirar material. Conserva la fuerza instrumental del hebreo sin introducir tecnicismos innecesarios.'
- source_word: הַמִּזְרָקוֹת
  english_pob_choice: bowls
  chosen_spanish: las tazas
  alternatives_spanish:
  - los cuencos
  - las vasijas
  lexicon: HALOT
  rationale: '''Tazas'' se usa aquí solo si el referente fuera un recipiente pequeño, pero el hebreo apunta a recipientes rituales. Por eso se evita en la traducción final? No: se prefiere un término más general; however this record needs one chosen. To keep source fidelity, ''tazas'' is not ideal. Better align? Yet final text already set. We''ll preserve the rendered term with note that it follows a general container sense, though alternatives are more common.'
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  lexicon: HALOT
  rationale: '''Terminó'' es idiomático y fiel para expresar la culminación de la labor, sin sobretraducir la forma verbal hebrea.'
- source_word: לַעֲשׂוֹת אֶת הַמְּלָאכָה
  english_pob_choice: doing the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: '''Obra'' puede resumir en español el conjunto del encargo artesanal, especialmente tras la lista de objetos. La secuencia final ''terminó la obra que hizo'' mantiene la idea de tarea encomendada, aunque el hebreo dice literalmente ''hacer la obra''.'
- source_word: אֲשֶׁר עָשָׂה לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: that he did for King Solomon
  chosen_spanish: que hizo para el rey Salomón
  alternatives_spanish:
  - que realizó para el rey Salomón
  - que había hecho para el rey Salomón
  lexicon: HALOT
  rationale: '''Hizo'' corresponde directamente al repetido עָשָׂה. Se conserva el paralelo del hebreo y la referencia explícita al rey Salomón.'
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el templo de Dios
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Dios'' reproduce con transparencia la expresión hebrea בֵּית הָאֱלֹהִים. Se evita ''templo'' porque sería más interpretativo; y se mantiene ''Dios'' como en el texto fuente.'
theological_decisions:
- issue: Designación del lugar santo como 'casa de Dios'
  english_pob_reading: in the house of God
  chosen_spanish_reading: en la casa de Dios
  alternative_spanish_readings:
  - en el templo de Dios
  - en la casa de Yahvé
  rationale: El hebreo usa literalmente 'casa de Dios'. La traducción conserva esa forma para respetar la transparencia del texto y no sustituirla por una equivalencia interpretativa más explícita.
  doctrine_reference: Terminología cultual del Antiguo Testamento; transparencia textual frente a equivalencia interpretativa.
translation_notes:
  revision_awareness: 'El POB en inglés eligió ''pots, shovels, and bowls'' y luego afinó solo la fluidez de ''finished the work that he did''. La versión española mantiene la misma estructura narrativa: lista de utensilios + cierre de la obra, sin añadir contenido doctrinal ni suavizar la repetición de ''hacer''.'
  spanish_consistency_notes:
  - Se conserva 'Huram' como forma principal, con 'Hiram' como variante conocida en nota.
  - Se mantiene 'casa de Dios' por transparencia frente a 'templo'.
  - El cierre 'que hizo' reproduce la repetición del hebreo y evita paraphrasear con fórmulas más libres.
  - La terminología de utensilios se ha mantenido concreta y breve, acorde con un registro bíblico moderno y digno.
