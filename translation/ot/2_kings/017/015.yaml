id: 2KI.17.15
reference: 2 Kings 17:15
source:
  edition: WLC
  text: וַ/יִּמְאֲס֣וּ אֶת חֻקָּ֗י/ו וְ/אֶת בְּרִית/וֹ֙ אֲשֶׁ֣ר כָּרַ֣ת אֶת אֲבוֹתָ֔/ם וְ/אֵת֙ עֵֽדְוֺתָ֔י/ו אֲשֶׁ֥ר הֵעִ֖יד בָּ֑/ם וַ/יֵּ֨לְכ֜וּ אַחֲרֵ֤י הַ/הֶ֨בֶל֙ וַ/יֶּהְבָּ֔לוּ וְ/אַחֲרֵ֤י הַ/גּוֹיִם֙ אֲשֶׁ֣ר סְבִֽיבֹתָ֔/ם אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֹתָ֔/ם לְ/בִלְתִּ֖י עֲשׂ֥וֹת כָּ/הֶֽם־־־׃
translation:
  text: They rejected his statutes and his covenant that he had made with their fathers[a], and his testimonies with which he had warned them. They went after vanity and became vain, and after the nations that were around them[c][b], concerning whom Yahweh had commanded them not to do like them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'vanity' can also mean 'emptiness,' 'worthlessness,' or, by implication in this context, 'idols.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew plays on related words: they ''went after vanity'' and ''became vain''—that is, empty or worthless like what they pursued.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his testimonies that he had testified against them with' / 'his warnings with which he had warned them.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְאֲסוּ
  chosen: They rejected
  alternatives:
  - They despised
  - They rejected utterly
  lexicon: HALOT
  rationale: מָאַס commonly denotes rejecting or spurning. 'Rejected' is clear modern English and fits covenantal refusal without adding emotional coloring beyond the Hebrew.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקִּים often refers to prescribed statutes. 'Statutes' preserves the legal-covenantal sense and pairs naturally with 'covenant' and 'testimonies' in the verse.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית is standardly 'covenant' in Israel's relationship with God; alternatives are less theologically and biblically appropriate in English.
- source_word: כָּרַת
  chosen: had made
  alternatives:
  - had cut
  - had established
  lexicon: HALOT
  rationale: The idiom 'cut a covenant' is literal, but 'made a covenant' is the most natural optimal-equivalence rendering in contemporary English while preserving the covenantal act.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural 'fathers.' Per gender-accurate policy, 'their fathers' is retained rather than generalized to 'ancestors,' since the covenantal formula regularly uses this expression.
- source_word: עֵדְוֹתָיו
  chosen: his testimonies
  alternatives:
  - his warnings
  - his covenant stipulations
  - his witness-statements
  lexicon: HALOT
  rationale: עֵדוֹת can denote covenantal testimonies/witnesses. 'Testimonies' preserves the lexical connection, while the following verb 'warned' clarifies their function.
- source_word: הֵעִיד בָּם
  chosen: he had warned them with
  alternatives:
  - he had testified against them
  - he had solemnly warned them
  - he had borne witness to them
  lexicon: HALOT
  rationale: The Hiphil of עוּד here carries the sense of solemn warning/testifying. 'Warned them with' preserves both the warning force and the instrumental relation to the testimonies, though somewhat woodenly; this best reflects the Hebrew structure.
- source_word: הַהֶבֶל
  chosen: vanity
  alternatives:
  - worthlessness
  - what is empty
  - idols
  lexicon: HALOT
  rationale: הֶבֶל literally denotes vapor/emptiness and often metaphorically what is futile or worthless, especially idols. 'Vanity' preserves the wordplay with the next verb and echoes established biblical diction without being archaic in this context.
- source_word: וַיֶּהְבָּלוּ
  chosen: became vain
  alternatives:
  - became empty
  - became worthless
  - became futile
  lexicon: HALOT
  rationale: 'The verb is a deliberate paronomasia with הֶבֶל: they pursued emptiness and became empty. ''Became vain'' preserves the wordplay most directly with ''vanity,'' even if ''vain'' here means empty/futile rather than proud.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גּוֹיִם refers to surrounding nations/peoples. 'The nations' is the most natural and contextually precise rendering.
- source_word: סְבִיבֹתָם
  chosen: that were around them
  alternatives:
  - around them
  - surrounding them
  lexicon: HALOT
  rationale: The noun with suffix denotes those around them. The relative clause 'that were around them' reads naturally in English and preserves the descriptive force.
- source_word: צִוָּה יְהוָה
  chosen: the LORD had commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. The pluperfect 'had commanded' fits the narrative sequence, referring to prior divine instruction.
- source_word: לְבִלְתִּי עֲשׂוֹת כָּהֶם
  chosen: not to do like them
  alternatives:
  - not to act as they did
  - not to do according to their ways
  - not to become like them
  lexicon: HALOT
  rationale: The construction expresses prohibition of imitating the surrounding nations' practices. 'Not to do like them' is close to the Hebrew wording and understandable in modern English.
