revisions:
- from: No nos pases por alto, nuestro Dios[a], para que las naciones no nos devoren, como si no hubiera nadie que redima[b].
  to: No nos desatiendas[a], nuestro Dios, no sea que las naciones nos traguen, como si no hubiera nadie que redima[b].
  rationale: Se revisa para reflejar mejor el matiz de ἵνα μὴ como resultado temido mediante «no sea que», recuperar la imagen más concreta de καταπίωσιν con «nos traguen», y elevar el registro de la súplica con «No nos desatiendas» sin perder el sentido de μὴ ὑπερίδῃς. Se conserva el giro verbal «nadie que redima» para λυτρουμένου, en línea con la decisión lexical y teológica documentada.
