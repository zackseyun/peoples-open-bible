translation:
  language: es
  text: Pero cuando los judíos vieron a los elefantes salir a la puerta, y el polvo de la fuerza armada que avanzaba y del movimiento de la multitud, y oyeron un gran estruendo[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un gran clamor' o 'un tumulto profundo'. La expresión griega enfatiza el peso o la resonancia del sonido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: LSJ
  rationale: Expresa la transición narrativa y el matiz temporal del giro griego sin sobrecargar el español.
- source_word: τῶν ἐλεφάντων ἐξιόντων
  english_pob_choice: the elephants coming out
  chosen_spanish: salir a los elefantes
  alternatives_spanish:
  - los elefantes saliendo
  - los elefantes que salían
  lexicon: LSJ
  rationale: Reproduce la acción del genitivo absoluto con una construcción natural en español que mantiene el movimiento concreto.
- source_word: ἐπὶ πύλην
  english_pob_choice: to the gate
  chosen_spanish: hacia la puerta
  alternatives_spanish:
  - a la puerta
  - contra la puerta
  lexicon: LSJ
  rationale: ἐπί con acusativo indica dirección; 'hacia' preserva el movimiento sin implicar llegada o contacto hostil.
- source_word: τῆς ἑπομένης ἐνόπλου δυνάμεως
  english_pob_choice: the advancing armed force
  chosen_spanish: la fuerza armada que avanzaba
  alternatives_spanish:
  - la fuerza armada que seguía
  - la fuerza armada que venía detrás
  lexicon: LSJ
  rationale: Mantiene la idea de seguimiento/avance y el sentido militar, con una sintaxis natural en español.
- source_word: τῆς τε τοῦ πλήθους πορείας
  english_pob_choice: the movement of the crowd
  chosen_spanish: del movimiento de la multitud
  alternatives_spanish:
  - de la marcha de la multitud
  - del avance de la multitud
  lexicon: LSJ
  rationale: πορεία abarca marcha o desplazamiento; 'movimiento' conserva amplitud y claridad. πλήθος aquí se rinde como 'multitud'.
- source_word: κονιορτόν
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - una nube de polvo
  - polvo levantado
  lexicon: LSJ
  rationale: El sustantivo básico es 'dust'; 'polvo' conserva la literalidad sin añadir una imagen interpretativa no explícita en el griego.
- source_word: βαρυχῆ θόρυβον
  english_pob_choice: a loud tumult
  chosen_spanish: un tumulto fuerte
  alternatives_spanish:
  - un tumulto sonoro
  - un ruido profundo
  lexicon: LSJ
  rationale: θόρυβος puede ser tumulto/ruido; βαρυχής añade peso o resonancia. 'Tumulto fuerte' intenta retener ambas ideas sin reducirlo a simple ruido.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: LSJ
  rationale: En 3 Macabeos el término designa al pueblo judío como colectivo étnico-religioso; 'los judíos' es la equivalencia más directa y reconocible.
translation_notes:
  revision_awareness: La versión sigue de cerca el griego y el audit trail inglés, pero ajusta la dirección de ἐπὶ πύλην con 'hacia la puerta' para una lectura natural en español, y traduce βαρυχῆ θόρυβον como 'un tumulto fuerte' para preservar tanto el peso sonoro como el carácter tumultuoso del original. Se evitaron notas al pie porque no hay marcadores anclados en el texto final.
  spanish_consistency_notes:
  - Se mantuvo 'los judíos' conforme al uso étnico-colectivo del pasaje.
  - '''Puerta'' traduce πύλη con el valor concreto del contexto narrativo.'
  - '''Multitud'' representa πλήθος con un registro bíblico claro y contemporáneo.'
  - No se introdujo lenguaje tradicional eclesiástico ajeno al pasaje.
  - 'El orden de los miembros sigue el flujo del griego: visión de los elefantes, polvo levantado, y sonido tumultuoso.'
