review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: Débora envía y hace llamar a Barac, identifica a Yahvé como el Dios de Israel, y transmite el mandato de ir al monte Tabor con diez mil hombres de Neftalí y Zabulón. Sin embargo, hay dos problemas de fidelidad documental: falta en español la nota equivalente a la inglesa sobre «de entre los hijos de Neftalí y de entre los hijos de Zabulón», y la puntuación tras «ha mandado» debe introducir correctamente la cita directa, no con dos puntos tras la pregunta retórica.'
  spanish_quality_summary: El español es claro y ampliamente legible, con tono bíblico moderno y digno. «Mandó llamar», «Yahvé», «marcha al monte Tabor» y «lleva contigo» funcionan bien. La principal mejora es de puntuación y de preservación de las notas de traducción; también conviene mantener coherencia exacta entre notas y anclajes.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel», and בני retained as «hijos» en el texto principal. No hay conflicto doctrinal. Se añade la nota faltante para preservar la alternativa/documentación inglesa sobre el sentido tribal de «hijos».'
  issues:
  - severity: medium
    issue: Falta una nota equivalente a la nota inglesa sobre «from the sons of Naphtali and from the sons of Zebulun».
    rationale: El rastro de auditoría inglés preserva explícitamente que la expresión hebrea significa hombres de esas tribus. En español debe conservarse esa aclaración, especialmente porque «hijos de» puede sonar más literal o genealógico.
  - severity: medium
    issue: 'Puntuación incorrecta en «¿No ha mandado Yahvé, el Dios de Israel: ...?»'
    rationale: En español, al introducir una cita dentro de una pregunta retórica, aquí corresponde coma antes de la cita, paralela al inglés auditado y más natural que dos puntos dentro de la interrogación.
  - severity: low
    issue: La nota b repite como alternativa la misma lectura principal.
    rationale: «O “marcha al monte Tabor”» no aporta contraste real si esa ya es la redacción principal. Conviene conservar alternativas genuinas documentadas, como «avanza al monte Tabor» o «reúne tus tropas en el monte Tabor».
