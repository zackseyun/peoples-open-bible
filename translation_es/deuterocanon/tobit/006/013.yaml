  yaml_path: translation/deuterocanon/tobit/006/013.yaml
  text: And now listen to me[a], and I will speak to her father; and when we return from Rages, we will arrange the marriage. For I know that Raguel will certainly not give her to another man contrary to the law of Moses, or he will incur death[b], because it is fitting for you to receive the inheritance rather than any other man.
  footnotes:
