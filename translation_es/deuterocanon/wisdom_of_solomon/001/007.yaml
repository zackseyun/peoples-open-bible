translation:
  language: es
  text: Porque el Espíritu del Señor ha llenado el mundo habitado, y lo que sostiene todas las cosas[a] tiene conocimiento de toda palabra pronunciada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que contiene todas las cosas» o «el que sostiene todas las cosas». El participio griego es neutro y puede enfatizar contener, sostener o mantener unidas todas las cosas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tiene conocimiento de voz». El sentido aquí es que el Espíritu omnipresente de Dios percibe toda palabra pronunciada.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: LEH/BDAG
  rationale: En este contexto sapiencial, el término apunta a la presencia activa y omnipresente de Dios; «Espíritu» con mayúscula comunica mejor ese peso teológico en español que un «espíritu» genérico o «aliento».
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: LEH
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el texto griego dice Κυρίου y el audit trail inglés mantiene «the Lord»; por eso en español conviene conservar «Señor» como forma fiel al griego y natural en el registro bíblico.
- source_word: πεπλήρωκεν
  english_pob_choice: has filled
  chosen_spanish: ha llenado
  alternatives_spanish:
  - ha llenado
  - ha colmado
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con efecto presente. «Ha llenado» refleja bien esa permanencia; «ha colmado» sería posible pero menos directo.
- source_word: οἰκουμένην
  english_pob_choice: the inhabited world
  chosen_spanish: el mundo habitado
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  - el mundo habitado
  lexicon: LEH
  rationale: «Mundo habitado» preserva el sentido técnico de οἰκουμένη y evita reducirlo a un «mundo» más vago.
- source_word: τὸ συνέχον
  english_pob_choice: that which holds all things together
  chosen_spanish: lo que sostiene todas las cosas
  alternatives_spanish:
  - lo que mantiene unidas todas las cosas
  - el que sostiene todas las cosas juntas
  - lo que contiene todas las cosas
  lexicon: BDAG
  rationale: El participio neutro sustantivado pide una formulación impersonal en español. «Lo que sostiene todas las cosas» conserva la amplitud del griego y deja abierta la tensión entre sostener, contener y mantener unido sin forzar una identificación personal.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: BDAG
  rationale: «Todas las cosas» mantiene el tono cósmico y exhaustivo del griego mejor que un simple «todo».
- source_word: γνῶσιν ἔχει
  english_pob_choice: has knowledge
  chosen_spanish: tiene conocimiento
  alternatives_spanish:
  - conoce
  - posee conocimiento
  lexicon: BDAG
  rationale: La estructura literal «tiene conocimiento» se conserva en español para mantener la forma idiomática del original y evitar una paráfrasis excesiva.
- source_word: φωνῆς
  english_pob_choice: of every utterance
  chosen_spanish: de toda declaración
  alternatives_spanish:
  - de toda voz
  - de toda palabra pronunciada
  - de toda declaración
  lexicon: BDAG
  rationale: «φωνῆς» puede referirse a voz, sonido o lo dicho. Siguiendo la revisión inglesa hacia «utterance», «de toda declaración» comunica con claridad el sentido de lo pronunciado, sin limitarlo solo a sonido físico.
theological_decisions:
- issue: Cómo representar πνεῦμα Κυρίου en un texto sapiencial sin resolver de más su referencialidad
  english_pob_reading: Spirit of the Lord
  chosen_spanish_reading: Espíritu del Señor
  alternative_spanish_readings:
  - espíritu del Señor
  rationale: La mayúscula en «Espíritu» ayuda a señalar la carga teológica del pasaje. A la vez, «del Señor» sigue de cerca el griego Κυρίου sin sustituirlo por una forma de ocultamiento del nombre divino.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica sin resolverla excesivamente'
- issue: Cómo traducir τὸ συνέχον τὰ πάντα sin imponer una identificación personal más explícita que la del neutro griego
  english_pob_reading: that which holds all things together
  chosen_spanish_reading: lo que sostiene todas las cosas
  alternative_spanish_readings:
  - el que sostiene todas las cosas
  - lo que contiene todas las cosas
  - lo que mantiene unidas todas las cosas
  rationale: 'El griego usa un participio neutro sustantivado, por lo que una fórmula impersonal en español preserva mejor la ambigüedad: puede aludir a una realidad divina activa sin convertirla directamente en un sujeto personal explícito.'
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica y gramatical'
- issue: Cómo verter φωνῆς en un contexto de conocimiento divino de la comunicación humana
  english_pob_reading: of every utterance
  chosen_spanish_reading: de toda declaración
  alternative_spanish_readings:
  - de toda voz
  - de toda palabra
  rationale: «Declaración» refleja el sentido de lo dicho o pronunciado que el audit trail inglés quiso captar con «utterance». Así se evita reducir el término a mero sonido y se mantiene su alcance comunicativo.
  doctrine_reference: 'DOCTRINE.md: precisión semántica sin sobreinterpretación'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que afinó φωνῆς de «every voice» a «every utterance». Por eso la versión española evita «voz» como opción principal y usa una formulación que expresa lo pronunciado o declarado, manteniendo a la vez la amplitud semántica del griego.
  spanish_consistency_notes:
  - Se conservó «Señor» para Κυρίου, coherente con el griego y con el audit trail inglés, sin introducir «Yahvé» donde el texto base no lo exige explícitamente.
  - Se usó «Espíritu» con mayúscula por la carga teológica del contexto, pero sin convertir el neutro συνέχον en una identificación personal explícita.
  - La frase «tiene conocimiento» sigue la estructura del audit trail inglés y evita una simplificación excesiva a «conoce».
  - «Mundo habitado» preserva el matiz de οἰκουμένη mejor que «mundo» a secas.
