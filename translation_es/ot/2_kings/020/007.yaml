translation:
  language: es
  text: 'E Isaías dijo: «Tomen una torta de higos». La tomaron y la pusieron sobre el forúnculo[a], y él se recuperó[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llaga inflamada» o «la úlcera».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y vivió»; en este contexto, significa que se recuperó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / And ... said
  english_pob_choice: And Isaiah said
  chosen_spanish: E Isaías dijo
  alternatives_spanish:
  - Entonces Isaías dijo
  - Y Isaías dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, 'E' mantiene la continuidad sonora antes de 'Isaías' y evita una repetición incómoda de 'y'. 'Dijo' conserva el valor narrativo simple sin añadir matices no presentes.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaias
  lexicon: Transliteración estándar bíblica en español
  rationale: Es el nombre propio del profeta en forma española establecida y plenamente reconocible.
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Tomen ustedes
  - Tomen eso
  lexicon: HALOT
  rationale: El imperativo plural de לקח se expresa naturalmente con 'Tomen'. No se añade dirección ('traigan', 'lleven') que el hebreo no explicita.
- source_word: דְּבֶלֶת תְּאֵנִים
  english_pob_choice: a cake of figs
  chosen_spanish: una torta de higos
  alternatives_spanish:
  - un pan de higos
  - una masa prensada de higos
  lexicon: HALOT
  rationale: דְּבֶלֶת designa una masa o torta prensada; 'torta de higos' comunica bien la forma concreta y evita la rigidez de un calco. 'Pan' podría sugerir panificado, por eso se prefiere 'torta'.
- source_word: וַיִּקְחוּ
  english_pob_choice: So they took it
  chosen_spanish: Ellos la tomaron
  alternatives_spanish:
  - Y la tomaron
  - Entonces la tomaron
  lexicon: HALOT
  rationale: El plural retoma el objeto implícito del mandato anterior. 'Ellos' hace explícito el sujeto tácito del español y 'la' recupera la torta de higos sin añadir información.
- source_word: וַיָּשִׂימוּ
  english_pob_choice: and laid it
  chosen_spanish: la pusieron
  alternatives_spanish:
  - la colocaron
  - la echaron
  lexicon: HALOT
  rationale: שׂים es un verbo amplio de colocación. 'Pusieron' es natural y suficientemente preciso; 'la colocaron' es más formal, pero menos fluido en este contexto de acción médica.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' comunica mejor la ubicación de la torta aplicada a la llaga y suena más natural que ''encima de''.'
- source_word: הַשְּׁחִין
  english_pob_choice: the boil
  chosen_spanish: la llaga
  alternatives_spanish:
  - el forúnculo
  - la ulcera
  - la hinchazón
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'boil' y reconoció alternativas como 'inflamed sore' y 'ulcer', en español 'llaga' mantiene la referencia a una lesión cutánea abierta o inflamada sin obligar al lector a un término demasiado técnico o menos natural. Se preserva así la tensión léxica sin sobreespecificar.
- source_word: וַיֶּחִי
  english_pob_choice: and he recovered
  chosen_spanish: y él se recuperó
  alternatives_spanish:
  - y vivió
  - y revivió
  - y sanó
  lexicon: HALOT
  rationale: חיה significa literalmente 'vivir', pero el contexto de curación exige una equivalencia idiomática. 'Se recuperó' comunica la restauración a la salud sin sugerir resurrección. Se mantiene el sentido contextual que el POB inglés ya identificó.
theological_decisions:
- issue: Sentido de וַיֶּחִי en contexto de curación
  english_pob_reading: physical recovery from illness
  chosen_spanish_reading: recuperación física de la enfermedad
  alternative_spanish_readings:
  - vivió
  - revivió
  - sanó
  rationale: El relato describe el tratamiento de una afección cutánea, no una resurrección. 'Se recuperó' preserva el sentido narrativo y evita una carga doctrinal indebida, siguiendo la lectura contextual del POB inglés.
  doctrine_reference: Translación por sentido contextual; evitar importar lenguaje de resurrección donde el pasaje narra sanidad.
translation_notes:
  revision_awareness: 'Se refleja el estado final sin cambios del testimonio en inglés: la redacción inglesa fue revisada y marcada como sin modificaciones necesarias. La presente propuesta sigue esa lectura estable y conserva sus decisiones léxicas y contextuales en español.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio 'Isaías' como transliteración española estable.
  - Se evitó 'SEÑOR' o formas de sustitución porque no aparece el nombre divino en este versículo.
  - '''Torta de higos'' conserva la imagen concreta del objeto prensado sin tecnicismo excesivo.'
  - '''Se recuperó'' armoniza con el contexto médico y con la nota sobre el valor literal de ''vivió''.'
