revisions:
- from: 'Así que se apartó hacia ella, junto al camino, y dijo[a]: «Por favor, déjame entrar a ti», pues no sabía que ella era su nuera. Y ella dijo: «¿Qué me darás[b], para que entres a mí?»'
  to: 'Entonces se apartó hacia ella, junto al camino, y dijo[a]: «Por favor, déjame llegarme a ti», pues no sabía que ella era su nuera. Y ella dijo: «¿Qué me darás[b], para que te llegues a mí?»'
  rationale: Se revisa la expresión eufemística para que el español sea más natural sin perder el matiz del hebreo. «Llegarme a ti / a mí» preserva mejor el tono insinuado del original que «entrar a ti / a mí». También se ajusta el arranque narrativo a «Entonces» para mayor fluidez.
