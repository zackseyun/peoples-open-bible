translation:
  language: es
  text: Y aconteció[a] que, tan pronto como el reino estuvo firmemente en su mano, dio muerte a sus siervos[b] que habían dado muerte al rey, su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuando el reino estuvo establecido en su mano». El hebreo expresa la consolidación segura del gobierno de Amazías.
    reason: alternative_reading
  - marker: b
    text: 'El mismo verbo hebreo se usa para la acción de Amazías y para la de quienes mataron a su padre; por eso aquí se conserva el mismo giro en español: «dio muerte» / «habían dado muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa introduce la siguiente acción en secuencia. «Aconteció» conserva el tono bíblico sin caer en un arcaísmo excesivo y corresponde bien al hebreo wayyiqtol.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as soon as
  chosen_spanish: tan pronto como
  alternatives_spanish:
  - cuando
  - después que
  lexicon: HALOT
  rationale: Aquí la conjunción marca el momento inmediato en que ocurrió la acción. «Tan pronto como» reproduce mejor la inmediatez temporal que «cuando».
- source_word: חָזְקָה
  english_pob_choice: was firmly
  chosen_spanish: estuvo firmemente
  alternatives_spanish:
  - se estableció
  - se afirmó
  - se fortaleció
  lexicon: HALOT
  rationale: El verbo expresa la consolidación del poder del reino, no fuerza física. «Estuvo firmemente» conserva la idea de estabilidad/seguridad del dominio y prepara el modismo siguiente.
- source_word: הַמַּמְלָכָה בְּיָדוֹ
  english_pob_choice: the kingdom was firmly in his hand
  chosen_spanish: el reino estuvo firmemente en su mano
  alternatives_spanish:
  - el reino quedó establecido en su mano
  - el poder real quedó seguro en su mano
  - el reino estuvo establecido en su mano
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «en su mano», que expresa control y posesión. En español, «en su mano» sigue siendo transparente y mantiene el modismo sin explicitarlo en exceso.
- source_word: וַיַּךְ
  english_pob_choice: he struck down
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - mató
  - derribó
  lexicon: HALOT
  rationale: El hebreo נכה permite «golpear» y, por el contexto, la acción resulta letal. En español, «golpeó» mantiene el paralelismo verbal con el participio siguiente; el sentido de ejecución queda implícito por el contexto, aunque el lector entiende que fue una acción mortal.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus criados
  lexicon: HALOT
  rationale: «Siervos» es la opción más cercana a עבד y mantiene el campo semántico de servicio subordinado. «Funcionarios» sería más interpretativo; «siervos» preserva mejor la amplitud del término en un contexto cortesano.
- source_word: הַמַּכִּים
  english_pob_choice: who had struck down
  chosen_spanish: que habían golpeado
  alternatives_spanish:
  - que habían matado
  - los que habían golpeado
  - los que habían herido
  lexicon: HALOT
  rationale: Se mantiene la repetición verbal del hebreo entre la acción de Amazías y la de los asesinos. «Habían golpeado» reproduce ese vínculo léxico, aunque en español el resultado letal sigue dependiendo del contexto narrativo.
- source_word: אֶת הַמֶּלֶךְ אָבִיו
  english_pob_choice: the king his father
  chosen_spanish: al rey, su padre
  alternatives_spanish:
  - al rey, su padre
  - al rey, el padre de él
  - al rey, padre suyo
  lexicon: HALOT
  rationale: La aposición hebrea se expresa naturalmente en español con coma. «Al rey, su padre» preserva la relación filial y la dignidad real sin perder claridad sintáctica.
translation_notes:
  revision_awareness: Coincide con el contexto auditado en que el hebreo usa el mismo verbo para la acción de Amazías y la de los asesinos, y que el modismo «en su mano» expresa el afianzamiento del reino. Se mantuvo el paralelismo léxico y la lectura temporal inmediata de כַּאֲשֶׁר.
  spanish_consistency_notes:
  - Se conservó «Y aconteció» como fórmula narrativa equivalente a la del POB inglés.
  - Se mantuvo la imagen idiomática «en su mano» en vez de sustituirla por una paráfrasis explicativa.
  - Se prefirió «siervos» para עֲבָדָיו por cercanía léxica al hebreo y coherencia con el registro bíblico.
  - Se preservó la repetición de «golpeó» para reflejar el juego verbal del texto fuente.
