translation:
  language: es
  text: por todos los pecados de Baasá y los pecados de Elá, su hijo, que cometieron y por los cuales hicieron pecar a Israel, provocando a Yahvé, el Dios de Israel, con sus ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con sus vanidades» o «con sus cosas sin valor», una expresión polémica común para los ídolos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: En esta fórmula de juicio, la preposición introduce la base causal de la acción divina; en español, 'por' comunica naturalmente esa relación sin añadir paráfrasis.
- source_word: כָּל חַטֹּאות
  english_pob_choice: all the sins
  chosen_spanish: todos los pecados
  alternatives_spanish:
  - todas las faltas
  - todas las ofensas
  - todos los actos pecaminosos
  lexicon: HALOT
  rationale: חַטֹּאות es el plural de 'pecados'. 'Pecados' conserva el valor léxico directo y 'todos' mantiene el alcance total de la acusación.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  lexicon: N/A (nombre propio)
  rationale: Se translitera el nombre propio al español de forma natural y reconocible, manteniendo la identificación histórica.
- source_word: וְחַטֹּאות אֵלָה בְנוֹ
  english_pob_choice: and the sins of Elah his son
  chosen_spanish: y los pecados de Elá, su hijo
  alternatives_spanish:
  - y los pecados de su hijo Elá
  - y los pecados de Elah, hijo suyo
  lexicon: HALOT
  rationale: La cadena constructa señala a Elá como hijo de Baasá; en español, 'Elá, su hijo' conserva claridad y el orden hebreo sin perder naturalidad.
- source_word: אֲשֶׁר חָטְאוּ
  english_pob_choice: which they committed
  chosen_spanish: que cometieron
  alternatives_spanish:
  - que pecaron
  - los cuales cometieron
  lexicon: HALOT
  rationale: En español, 'cometer pecados' expresa con naturalidad la acción de 'pecar' en este contexto enumerativo, evitando una construcción poco idiomática.
- source_word: וַאֲשֶׁר הֶחֱטִיאוּ אֶת יִשְׂרָאֵל
  english_pob_choice: and by which they caused Israel to sin
  chosen_spanish: y por los cuales hicieron pecar a Israel
  alternatives_spanish:
  - y con los cuales hicieron pecar a Israel
  - y por los cuales llevaron a Israel a pecar
  - y por los cuales hicieron que Israel pecara
  lexicon: HALOT
  rationale: El hifil de חטא es causativo. 'Hicieron pecar a Israel' comunica con precisión la causalidad sin perder la fuerza de la acusación.
- source_word: לְהַכְעִיס
  english_pob_choice: provoking
  chosen_spanish: provocando
  alternatives_spanish:
  - para provocar
  - con lo cual provocaban
  lexicon: HALOT
  rationale: El infinitivo con ל expresa el efecto/propósito de sus actos; 'provocando' enlaza de forma fluida con el resto de la frase y conserva el matiz de incitar a ira.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: ''Yahvé'' en el texto principal, preservando el nombre divino propio en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción genitiva se traduce de manera directa y sobria, identificando al Dios del pacto con Israel.
- source_word: בְּהַבְלֵיהֶם
  english_pob_choice: with their idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - con sus vanidades
  - con sus cosas vanas
  - con sus cosas sin valor
  lexicon: HALOT
  rationale: Aunque הבל puede referirse a 'vanidad' o 'cosas vanas', en un contexto de idolatría el sentido polémico apunta a los ídolos mismos. 'Ídolos' hace explícito el referente en español y preserva la fuerza condenatoria.
theological_decisions:
- issue: Renderización del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre divino. En español se adopta 'Yahvé' como forma principal del proyecto para evitar la sustitución por un título y conservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH'
- issue: Sentido polémico de בְּהַבְלֵיהֶם
  english_pob_reading: with their idols
  chosen_spanish_reading: con sus ídolos
  alternative_spanish_readings:
  - con sus vanidades
  - con sus cosas vanas
  - con sus cosas sin valor
  rationale: La expresión hebrea puede leerse literalmente como 'con sus vanidades' o 'con sus cosas sin valor', pero en este contexto histórico-religioso alude a prácticas e imágenes idólatras. 'Ídolos' mantiene el contenido denunciatorio sin oscurecer al lector español.
  doctrine_reference: HALOT, uso polémico de הבל en contextos de idolatría
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustantivos; se conserva la lectura de alta concordancia del texto base y se respeta el tratamiento del nombre divino y de הבל en contexto idolátrico.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Yahvé para יְהוָה, Dios para אֱלֹהִים y ídolos para el valor polémico de הבל en este contexto.'
  - Se usa un español neutro y publicable, evitando calcos rígidos pero sin expandir el sentido más allá del hebreo.
  - La nota al pie conserva la alternativa lexical documentada en la tradición de auditoría inglesa, ahora formulada para lectores en español.
