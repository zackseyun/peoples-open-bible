translation:
  language: es
  text: Y guardaréis este asunto como estatuto para vosotros y para vuestros hijos para siempre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta cosa» o «esta palabra». El término hebreo puede referirse ampliamente a un asunto, cosa o palabra hablada.
    reason: lexical_alternative
  - marker: b
    text: O «para vosotros y para vuestros descendientes» o «para vosotros y para vuestra descendencia». El hebreo dice «vuestros hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: And you shall keep
  chosen_spanish: Y guardaréis
  alternatives_spanish:
  - Y observaréis
  - Y guardaréis con cuidado
  - Y guardaréis y cumpliréis
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. En un contexto legal-covenantal, «guardaréis» conserva la idea de obediencia continua sin volver la frase demasiado explicativa.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta palabra
  - este mandamiento
  lexicon: HALOT
  rationale: 'דָּבָר tiene un rango amplio: palabra, asunto, cosa o hecho. Aquí el contexto apunta a la disposición pascual recién dada; «esta cosa» sigue de cerca la amplitud del hebreo sin estrechar indebidamente el sentido.'
- source_word: לְחָק
  english_pob_choice: as a statute
  chosen_spanish: como estatuto
  alternatives_spanish:
  - como ordenanza
  - como decreto
  - como disposición
  lexicon: HALOT
  rationale: חֹק designa algo fijado o prescrito. «Estatuto» conserva el valor jurídico-covenantal y suena natural en español bíblico contemporáneo.
- source_word: לְךָ וּלְבָנֶיךָ
  english_pob_choice: for you and for your sons
  chosen_spanish: para vosotros y para vuestros hijos
  alternatives_spanish:
  - para ti y para tus hijos
  - para vosotros y para vuestros descendientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para ti» y «para tus hijos»; en español, la segunda persona plural da mejor continuidad al mandato colectivo. «Hijos» mantiene el dato léxico de בָנֶיךָ sin neutralizarlo; en este contexto puede incluir la sucesión del hogar.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  - por toda la era
  lexicon: HALOT
  rationale: עַד עוֹלָם expresa duración indefinida o permanente. «Para siempre» es la equivalencia más natural y suficientemente fuerte en español.
theological_decisions:
- issue: Alcance representativo de «vuestros hijos»
  english_pob_reading: Retain the literal 'your sons' in the main text
  chosen_spanish_reading: Retener «vuestros hijos» como forma literal-equivalente en el texto principal
  alternative_spanish_readings:
  - vuestros niños
  - vuestra descendencia
  - vuestros descendientes
  rationale: El hebreo usa un plural masculino explícito. Aunque puede funcionar representativamente para la continuidad del hogar, la traducción principal no debe borrar esa forma; «hijos» conserva la señal lexical y permite la lectura de sucesión familiar sin sobreinterpretación.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «thing» sobre «matter» para reflejar con más inmediatez הַדָּבָר; en español se eligió una forma igualmente directa («esta cosa») sin perder el rango semántico amplio del hebreo. También se mantuvo la decisión auditada de conservar el plural masculino literal en la cláusula de descendencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en este proyecto, aunque este versículo no lo contiene explícitamente.
  - «Estatuto» se usa de manera consistente para חֹק cuando el contexto es legal-covenantal.
  - Se conserva el paralelismo «para vosotros y para vuestros hijos» como mandato generacional literal y legible.
  - La formulación «para siempre» sigue el valor durativo fuerte de עַד עוֹלָם sin arcaísmo innecesario.
