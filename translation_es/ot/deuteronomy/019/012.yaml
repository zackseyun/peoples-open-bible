revisions:
- from: Entonces los ancianos de su ciudad lo enviarán, lo tomarán de allí y lo entregarán en manos del vengador de la sangre[a], y morirá.
  to: Entonces los ancianos de su ciudad mandarán por él, lo tomarán de allí y lo entregarán en manos del vengador de la sangre[a], y morirá.
  rationale: Se corrige únicamente el primer verbo para reflejar mejor el hebreo sin objeto expreso y evitar el sentido erróneo de que el homicida es enviado. "Mandarán por él" transmite de manera natural que los ancianos disponen su captura/traslado desde allí. Se conservan las demás elecciones, incluida la nota técnica sobre גֹּאֵל הַדָּם, porque son fieles y claras.
  reviewer_model: gpt-5.4
