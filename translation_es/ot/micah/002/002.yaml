translation:
  language: es
  text: Codician campos y se apoderan de ellos[a], y casas y se las llevan[b]; oprimen a un hombre y a su casa, a un hombre y su heredad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘roban’ / ‘toman por la fuerza’ para ‘se apoderan de’.
    reason: lexical_alternative
  - marker: b
    text: O ‘se las llevan’ / ‘se las llevan consigo’ / ‘se las cargan consigo’ para ‘se las llevan’.
    reason: lexical_alternative
  - marker: c
    text: ‘Heredad’ puede referirse especialmente a tierra heredada o patrimonio familiar, no solo a posesiones en general.
    reason: cultural_note
lexical_decisions:
- source_word: חָמְדוּ
  english_pob_choice: covet
  chosen_spanish: codician
  alternatives_spanish:
  - desean
  - ansían
  - codician con avidez
  lexicon: HALOT
  rationale: ‘Codiciar’ conserva en español la fuerza moral de desear indebidamente lo ajeno, en paralelo con la primera cláusula del verso.
- source_word: שָׂדוֹת
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos de cultivo
  - tierras
  - terrenos
  lexicon: HALOT
  rationale: ‘Campos’ es natural y mantiene la concreción agrícola del hebreo plural.
- source_word: גָזָלוּ
  english_pob_choice: seize
  chosen_spanish: se apoderan de
  alternatives_spanish:
  - roban
  - despojan
  - toman por la fuerza
  lexicon: HALOT
  rationale: La imagen española ‘se apoderan de’ comunica apropiación violenta o injusta sin especificar más de lo que exige el contexto.
- source_word: בָתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  lexicon: HALOT
  rationale: ‘Casas’ conserva el valor concreto de propiedad inmobiliaria que el verso acumula junto con ‘campos’.
- source_word: נָשָׂאוּ
  english_pob_choice: take them away
  chosen_spanish: se las llevan
  alternatives_spanish:
  - se las cargan
  - las arrastran
  - las llevan consigo
  lexicon: HALOT
  rationale: ‘Se las llevan’ es un equivalente idiomático que expresa el traslado forzoso de lo usurpado.
- source_word: עָשְׁקוּ
  english_pob_choice: oppress
  chosen_spanish: oprimen
  alternatives_spanish:
  - defraudan
  - extorsionan a
  - explotan
  lexicon: HALOT
  rationale: ‘Oprimen’ reproduce la amplitud del abuso social y económico del verbo en este contexto.
- source_word: גֶּבֶר
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a un varón
  lexicon: HALOT
  rationale: Mantiene la forma masculina singular del hebreo sin neutralizarla, y encaja con el paralelismo del verso.
- source_word: בֵיתוֹ
  english_pob_choice: his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su familia
  - a su casa-hogar
  lexicon: HALOT
  rationale: ‘Su casa’ preserva el doble trasfondo de vivienda y esfera doméstica/patrimonial sin añadir interpretación excesiva.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - cada hombre
  lexicon: HALOT
  rationale: Repite el singular masculino del hebreo para conservar la paralela acusación representativa.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su patrimonio
  - su lote heredado
  lexicon: HALOT
  rationale: ‘Heredad’ es un término bíblico español que comunica el sentido de tierra o patrimonio recibido por herencia, no solo bienes en general.
theological_decisions:
- issue: Paralelismo masculino singular en גֶּבֶר / אִישׁ
  english_pob_reading: a man ... a man
  chosen_spanish_reading: a un hombre ... a un hombre
  alternative_spanish_readings:
  - a una persona ... a una persona
  - gente ... su herencia
  rationale: El hebreo usa sustantivos masculinos singulares en paralelismo representativo; la versión española conserva esa referencia sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Miqueas 2:2 y refleja el mismo conjunto de decisiones léxicas del POB en inglés, sin necesidad de revisión adicional según el registro auditado más reciente.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo un registro bíblico claro pero no arcaizante; ‘heredad’ se conserva por su carga semántica patrimonial y territorial.
  - La estructura conserva el encadenamiento verbal y la acumulación de víctimas/posesiones del hebreo.
