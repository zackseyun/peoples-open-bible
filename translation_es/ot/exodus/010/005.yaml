base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/005.yaml
  text: And it will cover the surface of the land[a], so that one will not be able to see the land; and it will eat the rest of what has escaped, which remains to you from the hail[b], and it will eat every tree growing for you out of the field.
  footnotes:
