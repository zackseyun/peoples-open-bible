translation:
  language: es
  text: Él mismo es rey sobre los cielos[a], y juzga a reyes y gobernantes;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juzgando a reyes y príncipes».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - mismo
  lexicon: BDAG
  rationale: Conservo el énfasis del pronombre intensivo griego sin volver la frase innecesariamente pesada. 'Él mismo' expresa la exclusividad de su realeza con naturalidad en español.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  - gobernante
  lexicon: BDAG
  rationale: Como predicado nominal, 'rey' reproduce mejor la afirmación de realeza que una perífrasis más general como 'gobernante'.
- source_word: ἐπὶ τῶν οὐρανῶν
  english_pob_choice: over the heavens
  chosen_spanish: sobre los cielos
  alternatives_spanish:
  - en los cielos
  - sobre el cielo
  lexicon: BDAG
  rationale: '''Sobre'' conserva la idea de dominio, no solo ubicación. Mantengo el plural de ''οὐρανοί'' con ''los cielos'' para reflejar la forma griega, tal como lo hizo la versión inglesa.'
- source_word: κρίνων
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - está juzgando
  - juzgando
  lexicon: BDAG
  rationale: La traducción verbal finita en español comunica con claridad la acción continua o característica del participio sin sonar forzada. Mantiene el vínculo con la lectura inglesa revisada.
- source_word: ἀρχάς
  english_pob_choice: rulers
  chosen_spanish: soberanos
  alternatives_spanish:
  - reyes y príncipes
  - autoridades
  - gobernantes
  lexicon: BDAG
  rationale: En paralelo con 'reyes', 'soberanos' evita una redundancia demasiado literal y conserva la referencia a poderes gobernantes. 'Autoridades' sería posible, pero suena más técnico y menos paralelo al nivel real-político del contexto.
theological_decisions:
- issue: Alcance de la realeza divina sobre los cielos
  english_pob_reading: The line asserts God's kingship over the heavens and his judgment of earthly political powers.
  chosen_spanish_reading: La línea afirma la realeza de Dios sobre los cielos y su juicio sobre los poderes políticos terrenales.
  alternative_spanish_readings:
  - La línea afirma su realeza en los cielos.
  - La línea presenta a Dios como rey celestial sin matizar el juicio sobre poderes humanos.
  rationale: 'Mantengo la fuerza doble del griego: soberanía trascendente (''sobre los cielos'') y ejercicio activo de juicio sobre reyes y poderes. No suavizo la referencia a poderes gobernantes, porque el texto los menciona explícitamente.'
  doctrine_reference: Soberanía divina y juicio escatológico de Dios sobre las potestades humanas.
translation_notes:
  revision_awareness: Seguí la lectura inglesa revisada que eliminó el segundo pronombre explícito y conservó la puntuación final con punto y coma, reflejando el participio griego con un verbo finito en español sin repetir innecesariamente el sujeto.
  spanish_consistency_notes:
  - Uso 'cielos' en plural para reflejar el griego τῶν οὐρανῶν, siguiendo la decisión inglesa de conservar el plural.
  - Mantengo 'rey' como predicado y 'juzga' como verbo finito para una lectura natural en español.
  - '''Soberanos'' traduce ἀρχάς en un registro comprensible y suficientemente amplio, sin introducir un tecnicismo ajeno al contexto.'
