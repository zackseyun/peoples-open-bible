translation:
  language: es
  text: 'Y les dijeron[a]: «No podemos hacer esto, dar a nuestra hermana a un hombre que tiene prepucio, porque eso es una vergüenza para nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «a un hombre incircunciso». Literalmente: «a un hombre que tiene prepucio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֲלֵיהֶם
  english_pob_choice: And they said to them
  chosen_spanish: Y les dijeron
  alternatives_spanish:
  - Y les hablaron
  - Y les dijeron a ellos
  lexicon: HALOT
  rationale: La narración hebrea introduce directamente el discurso con אמר; en español, «dijeron» conserva ese valor básico y el dativo «les» mantiene el complemento plural de manera natural.
- source_word: לֹא נוּכַל
  english_pob_choice: We cannot
  chosen_spanish: No podemos
  alternatives_spanish:
  - No somos capaces de
  - No nos es posible
  lexicon: HALOT
  rationale: יַכול expresa capacidad; «no podemos» comunica de forma idiomática la incapacidad sin añadir matices innecesarios.
- source_word: לַעֲשׂוֹת הַדָּבָר הַזֶּה
  english_pob_choice: do this thing
  chosen_spanish: hacer esta cosa
  alternatives_spanish:
  - hacer esto
  - hacer este asunto
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «cosa» para reflejar דבר + הזה, aunque en español también sería posible omitirlo. Aquí la formulación mantiene la concreción del hebreo.
- source_word: לָתֵת אֶת אֲחֹתֵנוּ
  english_pob_choice: to give our sister
  chosen_spanish: dar a nuestra hermana
  alternatives_spanish:
  - entregar a nuestra hermana
  - dar nuestra hermana en matrimonio
  lexicon: HALOT
  rationale: נתן significa literalmente «dar». Se preserva el verbo simple; el contexto matrimonial ya está claro en la escena, así que no se añade una glosa interpretativa.
- source_word: לְאִישׁ
  english_pob_choice: to a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un varón
  - a un esposo
  lexicon: HALOT
  rationale: איש es el término ordinario para «hombre». «Hombre» reproduce mejor el léxico fuente que «esposo», que introduciría una interpretación no explícita aquí.
- source_word: אֲשֶׁר ל֣וֹ עָרְלָה
  english_pob_choice: who has a foreskin
  chosen_spanish: que tiene prepucio
  alternatives_spanish:
  - que es incircunciso
  - a un hombre incircunciso
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que el hombre «tiene prepucio». Se conserva esa formulación para no reemplazar la imagen concreta por el adjetivo más interpretativo «incircunciso».
- source_word: כִּי חֶרְפָּה הִוא לָנוּ
  english_pob_choice: for that is a disgrace to us
  chosen_spanish: porque eso es una vergüenza para nosotros
  alternatives_spanish:
  - porque eso es una deshonra para nosotros
  - porque eso es un oprobio para nosotros
  lexicon: HALOT
  rationale: חרפה abarca vergüenza, deshonra o reproche. «Vergüenza» transmite bien el peso social y honorífico del término en un español claro y natural.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético y el audio de la POB en inglés. No se detectaron variantes textuales que alteren el sentido; la única decisión sensible fue preservar la imagen concreta de עָרְלָה («prepucio») en el texto principal, como hace el inglés POB, dejando «incircunciso» para la nota.
  spanish_consistency_notes:
  - Se mantuvo el discurso directo con puntuación española natural.
  - Se evitó «SEÑOR» y otras convenciones no pertinentes al versículo.
  - «vergüenza» se usó por su naturalidad en español y por abarcar el campo semántico de חרפה.
  - La nota al pie conserva la alternativa semántica importante sin duplicar el cuerpo del texto.
