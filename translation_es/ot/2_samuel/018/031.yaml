    text: 'O: «el etíope». Hebreo: «el cusita».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé ha juzgado por ti hoy» o «te ha dado justicia hoy».'
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza «cuxita» por «cusita» para ajustar el etnónimo a un español más estándar y fiel a Cus/Cush. Se corrige la nota [a] para que refleje la alternativa documentada en la auditoría inglesa («el etíope») y el hebreo base («el cusita»). Se elimina «librándote» para evitar una expansión interpretativa y se mantiene la construcción más cercana al hebreo: «te ha hecho justicia hoy de la mano de…».'
