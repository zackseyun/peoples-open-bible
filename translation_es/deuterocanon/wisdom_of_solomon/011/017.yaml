translation:
  language: es
  text: Porque tu mano todopoderosa[a], que creó el mundo de materia informe, no carecía de poder para enviar sobre ellos una multitud de osos o leones fieros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de materia sin forma». La expresión griega refleja un giro cosmológico helenístico y no debe forzarse aquí para resolver debates doctrinales posteriores sobre el modo de la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπόρει
  english_pob_choice: was not powerless
  chosen_spanish: no fue impotente
  alternatives_spanish:
  - no careció de poder
  - no estuvo a la falta de recursos
  - no fue incapaz
  lexicon: LSJ
  rationale: La litotes griega expresa que la mano divina no carecía de capacidad. «No fue impotente» conserva esa negación doble con un español natural y sin suavizarla demasiado.
- source_word: παντοδύναμός
  english_pob_choice: almighty
  chosen_spanish: todopoderosa
  alternatives_spanish:
  - omnipotente
  - omnipotente y todopoderosa
  lexicon: LSJ
  rationale: «Todopoderosa» es el equivalente español más directo y digno para παντοδύναμος, manteniendo el sentido de poder sin restricciones.
- source_word: χείρ
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - brazo
  lexicon: LSJ
  rationale: Se conserva la imagen corporal de «mano», que en el texto funciona metafóricamente para la agencia divina y no solo como simple sinónimo de poder.
- source_word: κτίσασα
  english_pob_choice: which created
  chosen_spanish: que creó
  alternatives_spanish:
  - que formó
  - habiendo creado
  lexicon: LSJ
  rationale: El participio atributivo se vierte con una relativa breve y natural en español, preservando que la mano creadora fundamenta el argumento.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el universo
  - el orden del mundo
  lexicon: LSJ
  rationale: «El mundo» reproduce de modo idiomático κόσμος en este contexto de la creación, sin sobreespecificar con «universo».
- source_word: ἐξ ἀμόρφου ὕλης
  english_pob_choice: out of formless matter
  chosen_spanish: de materia informe
  alternatives_spanish:
  - de materia sin forma
  - de materia no formada
  lexicon: LSJ
  rationale: Se conserva el trasfondo cosmológico helenístico con una frase transparente en español. «De materia informe» comunica la idea de materia sin forma sin convertirla en una paráfrasis doctrinal.
- source_word: ἐπιπέμψαι
  english_pob_choice: to send upon them
  chosen_spanish: enviar sobre ellos
  alternatives_spanish:
  - mandar contra ellos
  - soltar sobre ellos
  lexicon: LSJ
  rationale: «Enviar sobre ellos» mantiene la dirección del ataque/jucio sugerida por el verbo compuesto sin añadir una intensidad que el griego no exige.
- source_word: πλῆθος
  english_pob_choice: a multitude of
  chosen_spanish: una multitud de
  alternatives_spanish:
  - muchos
  - una gran cantidad de
  lexicon: LSJ
  rationale: Se conserva el sustantivo de cantidad para mantener el énfasis retórico del pasaje.
- source_word: θρασεῖς
  english_pob_choice: fierce
  chosen_spanish: fieros
  alternatives_spanish:
  - feroces
  - audaces
  lexicon: LSJ
  rationale: Aunque θρασύς puede significar «audaz», aquí el contexto de animales depredadores enviados en juicio favorece «fieros», que expresa mejor la amenaza.
theological_decisions:
- issue: La litotes sobre la capacidad divina
  english_pob_reading: was not powerless
  chosen_spanish_reading: no fue impotente
  alternative_spanish_readings:
  - no careció de poder
  - pudo haber
  rationale: 'La redacción española conserva la negación enfática sin resolverla en una afirmación más libre. Así se mantiene la tensión retórica: el poder creador de Dios implica plena capacidad para juzgar por otros medios.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la textura del original; no aplanar la litotes.'
- issue: La frase cosmológica ἐξ ἀμόρφου ὕλης
  english_pob_reading: out of formless matter
  chosen_spanish_reading: de materia informe
  alternative_spanish_readings:
  - de materia sin forma
  - de materia no formada
  rationale: La expresión se mantiene como lenguaje cosmológico helenístico. No se introduce una afirmación doctrinal más amplia sobre el modo de la creación que el verso no desarrolla explícitamente.
  doctrine_reference: 'DOCTRINE.md: primacía del original; no importar doctrinas que el texto no afirma.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una formulación más natural sin perder la negación litótica. En español se adoptó un equivalente igualmente natural («no fue impotente») y se mantuvo la referencia a la materia informe con una nota que preserva la alternativa semántica documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto cuando corresponde; aquí el texto griego no contiene el nombre divino explícito, por lo que se conserva «tu» sin sustitución.
  - Se prefirió «todopoderosa» para παντοδύναμος, en coherencia con el default del proyecto y con naturalidad en español.
  - Se mantuvo el orden retórico de la cláusula para respetar la relación entre la mano creadora y su capacidad de juicio.
