translation:
  language: es
  text: un toro[a], un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un toro joven del ganado, un carnero, un cordero macho en su primer año, para holocausto". La expresión hebrea "hijo del ganado" es un modismo para un bovino del ganado, y "hijo de su año" es un modismo para un animal en su primer año.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: becerro
  alternatives_spanish:
  - toro
  - novillo
  - buey
  lexicon: HALOT
  rationale: En este contexto sacrificial, el hebreo designa un animal bovino específico ofrecido en culto. 'Becerro' comunica bien un bovino joven y evita una resonancia demasiado adulta o técnica; además, conserva cercanía con el matiz de la nota inglesa que admite 'young bull'.
- source_word: בֶּן־בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la manada
  alternatives_spanish:
  - de ganado
  - de la hacienda
  - de la vacada
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente ''hijo del ganado'', es decir, un bovino del rebaño/manada. En español, ''de la manada'' mantiene la idea de procedencia del ganado sin una traducción servil.'
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ovejo
  lexicon: HALOT
  rationale: '''Carnero'' es el equivalente natural y preciso en español para el macho adulto de la oveja en contexto sacrificial.'
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: '''Cordero macho'' preserva la distinción de sexo que la POB inglesa explicita con ''male lamb'', sin perder claridad natural en español.'
- source_word: בֶּן־שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - de su primer año
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de edad. 'De un año' es la forma española más clara y fiel para expresar que el animal tiene esa edad.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un sacrificio quemado
  lexicon: HALOT
  rationale: En español bíblico, 'holocausto' es el término tradicional y técnico para עֹלָה, el sacrificio totalmente quemado. Se conserva por precisión cultual y porque no introduce una paráfrasis.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un / un / un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral se reproduce con artículos indefinidos para mantener el inventario sacrificial y la cadencia de la lista en español.
theological_decisions:
- issue: Conservación del término cultual עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - como holocausto
  - para un sacrificio totalmente quemado
  rationale: '''Holocausto'' es el término técnico tradicional en español para la ofrenda totalmente quemada. Aunque podría explicitarse como ''sacrificio totalmente quemado'', esa expansión no es necesaria aquí y debilitaría la precisión litúrgica del término.'
  doctrine_reference: Levítico 1; Números 28–29
- issue: Distinción entre tipos de animales sacrificiales
  english_pob_reading: bull from the herd, ram, male lamb a year old
  chosen_spanish_reading: un becerro, un carnero, un cordero macho de un año
  alternative_spanish_readings:
  - un toro de la manada, un carnero, un cordero macho de un año
  - un novillo, un carnero, un cordero macho de un año
  rationale: La lista distingue tres animales distintos y no debe nivelarse. 'Becerro' mantiene el matiz de bovino joven que la nota inglesa permite, sin convertirlo en una identificación más pesada que el hebreo no exige en este versículo aislado.
  doctrine_reference: Ley sacrificial de Números 7
translation_notes:
  revision_awareness: El inglés POB mantiene alta transparencia y ofrece una nota léxica para פַּר/בֶּן־בָּקָר y בֶּן־שְׁנָתוֹ. La versión española conserva esa tensión idiomática mediante una nota alternativa, pero prefiere una línea principal más natural para el lector hispanohablante. No se detectan revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa 'holocausto' para עֹלָה de manera consistente con el vocabulario cultual bíblico en español.
  - Se evita 'SEÑOR' u otra sustitución para el nombre divino porque este versículo no lo contiene.
  - Se mantiene el orden enumerativo del hebreo con comas y punto y coma final, adecuado para una lista sacrificial.
