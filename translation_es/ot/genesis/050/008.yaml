    reason: lexical_alternative
  - marker: b
    text: '''Niños pequeños'' se refiere a los de corta edad.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'sus vacas' a 'su ganado' para reflejar fielmente בָּקָר como ganado mayor/colectivo, sin especificar sexo. Se cambia 'sus pequeños' por 'sus niños pequeños' para mayor claridad en español y para preservar la fuerza de טַף. También se reemplaza la nota estilística sobre 'solo' por una nota léxica alineada con la auditoría inglesa. Se mantiene 'casa' en el texto principal con nota, ya que el proyecto documenta esa opción como alternativa auditada y sigue siendo comprensible en español bíblico.
