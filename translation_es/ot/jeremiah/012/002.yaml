translation:
  language: es
  text: Tú los plantaste; también echaron raíces. Crecen; también dan fruto. Tú estás cerca en su boca[a], pero lejos de su ser más íntimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lejos de sus riñones», expresión hebrea para el ser interior o los motivos ocultos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַעְתָּם
  english_pob_choice: You planted them
  chosen_spanish: Tú los plantaste
  alternatives_spanish:
  - Los plantaste
  - Tú los has plantado
  lexicon: HALOT
  rationale: El verbo נטע en qal con sufijo de 3mp expresa acción directa de Dios sobre ellos. El pretérito simple es natural en español poético y conserva la afirmación directa de agencia divina sin añadir matiz aspectual no atestiguado.
- source_word: שֹׁרָשׁוּ
  english_pob_choice: have even taken root
  chosen_spanish: también echaron raíces
  alternatives_spanish:
  - también han echado raíces
  - también arraigaron
  lexicon: HALOT
  rationale: שורש expresa echar raíz. En español, 'echar raíces' es la metáfora natural y transparente. 'También' reproduce el énfasis de גַּם, y el pretérito simple mantiene el paralelismo poético.
- source_word: יֵלְכוּ
  english_pob_choice: They grow
  chosen_spanish: Crecen
  alternatives_spanish:
  - Prosperan
  - Siguen creciendo
  lexicon: HALOT
  rationale: Aquí הלך no se toma meramente como 'ir', sino como avance/desarrollo dentro de la imagen agrícola. 'Crecen' recoge mejor el sentido revisado en el audit trail inglés y funciona con naturalidad en español sin sobreinterpretar como prosperidad material explícita.
- source_word: עָשׂוּ פֶרִי
  english_pob_choice: they even produce fruit
  chosen_spanish: también dan fruto
  alternatives_spanish:
  - también producen fruto
  - también llevan fruto
  lexicon: HALOT
  rationale: La construcción literal 'hacer fruto' se expresa de forma idiomática en español con 'dar fruto'. Se conserva la fuerza de גַּם con 'también' y la imagen agrícola sin calco áspero.
- source_word: קָרוֹב אַתָּה בְּפִיהֶם
  english_pob_choice: You are near in their mouth
  chosen_spanish: Tú estás cerca en su boca
  alternatives_spanish:
  - Tú estás cerca en sus labios
  - Tú estás cerca en su hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen de proximidad verbal. 'Boca' reproduce con mayor literalidad בְּפִי y evita sustituirla por una imagen distinta ('labios') sin necesidad. El plural posesivo se adapta al español como 'su' por el antecedente colectivo.
- source_word: רָחוֹק מִכִּלְיוֹתֵיהֶם
  english_pob_choice: far from their innermost being
  chosen_spanish: lejos de sus entrañas
  alternatives_spanish:
  - lejos de su interior
  - lejos de sus riñones
  - lejos de su ser más íntimo
  lexicon: HALOT
  rationale: כִּלְיוֹת literales son 'riñones', pero en antropología hebrea designan el interior oculto, los motivos más profundos. 'Entrañas' es una solución española digna y bíblica para el interior afectivo y moral, más cercana al peso expresivo del hebreo que una explicación abstracta.
theological_decisions:
- issue: Metáfora antropológica de כִּלְיוֹתֵיהֶם
  english_pob_reading: far from their innermost being
  chosen_spanish_reading: lejos de sus entrañas
  alternative_spanish_readings:
  - lejos de su interior
  - lejos de sus riñones
  - lejos de su ser más íntimo
  rationale: El versículo contrapone profesión externa e interior oculto delante de Dios. Se conserva la tensión entre lo dicho con la boca y lo no alineado en lo íntimo. 'Entrañas' comunica en español la profundidad interior sin perder por completo la imagen corporal implícita en el hebreo.
  doctrine_reference: Translation philosophy §6; §1 original-language primacy; §5 consistency with documented exception
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió 'grow' sobre 'go on' para יֵלְכוּ. En español, eso se reflejó con 'crecen' para mantener precisión léxica y fluidez poética.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo agrícola: plantar, echar raíces, crecer, dar fruto.'
  - Se evita 'SEÑOR' o 'Cristo' porque el pasaje no los contiene.
  - Se mantiene 'Yahvé' implícito no por sustitución textual, sino porque aquí el hablante se dirige a Dios con 'Tú'.
  - '''Entrañas'' se usa como equivalente bíblico de interior profundo, no como anatomía literal.'
