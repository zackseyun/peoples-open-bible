  text: צִדְקַ֣ת תָּ֭מִים תְּיַשֵּׁ֣ר דַּרְכּ֑/וֹ וּ֝/בְ/רִשְׁעָת֗/וֹ יִפֹּ֥ל רָשָֽׁע׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/011/005.yaml
  text: The righteousness of the blameless makes his way straight[b][a], but the wicked falls by his wickedness.
  footnotes:
  - marker: a
    text: Or 'directs his path' or 'smooths his way.' The Hebrew verb carries the image of making a path straight.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his wickedness.' The phrase can denote either the sphere of the wicked man's conduct or the means by which he comes to ruin.
    reason: lexical_alternative
