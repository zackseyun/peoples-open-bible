revisions:
- from: Y Amasá yacía revolcándose en la sangre, en medio de la calzada. Cuando el hombre vio que todo el pueblo se detenía, apartó a Amasá de la calzada al campo, y echó sobre él un vestido, porque vio que todos los que pasaban junto a él se detenían.
  to: Y Amasá yacía revolcándose en la sangre, en medio de la calzada. Cuando el hombre vio que todo el pueblo se detenía, apartó a Amasá de la calzada al campo, y echó sobre él una prenda, porque vio que todo el que llegaba hasta él se detenía.
  rationale: 'Se ajustan dos puntos léxicos para mayor fidelidad y naturalidad en español actual: «una prenda» refleja mejor el sentido general de בֶּגֶד, y «todo el que llegaba hasta él» expresa mejor el encuentro con Amasá en el camino que el original hebreo describe. El resto del borrador se conserva por ser fiel, claro y estilísticamente adecuado.'
