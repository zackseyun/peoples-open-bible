  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones 'leoncillos', 'cabrito', 'osos' son adecuadas. La principal desviación es no seguir la revisión auditada del inglés para כבני בשן, donde corresponde algo como 'terneros de Basán' en vez de la genérica 'crías de Basán'.
