base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/003.yaml
  text: And they stood in their place[a], and they read from the Book of the Law of Yahweh their God for a fourth of the day[b]; and for another fourth they were confessing and bowing down to Yahweh their God.
  footnotes:
  - marker: a
    text: Or 'at their standing place' or possibly 'on their platform.' The Hebrew expression is somewhat compressed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a fourth of the day' ... 'and a fourth'; that is, one quarter of the day was spent reading, and another quarter in confession and bowing down.
    reason: lexical_alternative
