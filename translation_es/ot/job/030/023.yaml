translation:
  language: es
  text: Porque sé que me llevarás a la muerte[a], y a la casa señalada para todo viviente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me harás volver a la muerte». El verbo puede expresar la idea de hacer volver o retornar a alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la casa señalada para todos los vivientes»; posible referencia poética al sepulcro o al Seol como destino común de todos.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en verdad
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. 'Porque' conserva bien la fuerza causal o explicativa del hebreo sin sobrecargar el tono.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - sabía
  - conozco
  lexicon: HALOT
  rationale: El perfecto hebreo expresa certeza asentada; en español, el presente 'sé' comunica mejor esa convicción estable y actual.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  - el estado de muerte
  - el reino de la muerte
  lexicon: HALOT
  rationale: '''Muerte'' es la traducción directa y más sobria del sustantivo. Se evita introducir ''Seol'' o una paráfrasis más interpretativa que el hebreo no nombra.'
- source_word: תְּשִׁיבֵנִי
  english_pob_choice: you will bring me to death
  chosen_spanish: me llevarás a la muerte
  alternatives_spanish:
  - me harás volver a la muerte
  - me devolverás a la muerte
  - me traerás a la muerte
  lexicon: HALOT
  rationale: El hifil de שוב comunica una acción causativa de retorno. En español, 'me llevarás a la muerte' conserva el destino y suena natural; la idea de 'retorno' queda señalada en la nota, porque 'volver' puede sonar más explícito de lo que aquí exige el texto.
- source_word: וּבֵית
  english_pob_choice: and to the house
  chosen_spanish: y a la casa
  alternatives_spanish:
  - y la casa
  - y hacia la casa
  - y a la morada
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de 'casa' y la dirección marcada por la construcción hebrea. 'Morada' sería posible, pero diluye la metáfora doméstica original.
- source_word: מוֹעֵד
  english_pob_choice: appointed
  chosen_spanish: señalada
  alternatives_spanish:
  - apuntada
  - apropiada
  - destinada
  - fijada
  lexicon: HALOT
  rationale: En constructo con 'casa', el término apunta a algo establecido o destinado. 'Señalada' expresa bien la idea de una casa designada/establecida sin sonar demasiado técnica o abstracta.
- source_word: לְכָל חָי
  english_pob_choice: for every living one
  chosen_spanish: para todo viviente
  alternatives_spanish:
  - para cada ser viviente
  - para todos los vivos
  - para todo ser viviente
  lexicon: HALOT
  rationale: La frase hebrea es universal y colectiva. 'Todo viviente' preserva la amplitud y la concisión del original, con un español natural y solemne.
theological_decisions:
- issue: Imagen de la muerte como destino universal
  english_pob_reading: The verse refers to death as the universal human destination, described metaphorically as an appointed house.
  chosen_spanish_reading: El versículo presenta la muerte como destino universal del ser humano, figurado como una casa señalada para todo viviente.
  alternative_spanish_readings:
  - El versículo alude específicamente al sepulcro o al Seol como la casa señalada para los vivos.
  - El versículo describe una reunión de todos los vivos en un lugar destinado.
  rationale: El hebreo habla de 'muerte' y de una 'casa' designada para todo viviente, sin nombrar explícitamente el Seol. La redacción española conserva la metáfora y evita ampliar la doctrina más allá de lo que el texto afirma.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión revisa la solución inglesa más reciente, que pasó de 'bring me back to death' a 'bring me to death' por precisión léxica. La traducción española evita 'volver' en el cuerpo principal para no imponer más retorno del que exige el hebreo, pero lo conserva como alternativa anotada por la ambigüedad verbal de שוב en hifil.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo trae el nombre divino; aquí no aparece.
  - Se mantiene 'muerte' en sentido directo, sin sustituirlo por un eufemismo interpretativo.
  - '''Casa'' conserva la imagen metafórica del hebreo; ''morada'' fue descartada por ser menos transparente con la figura original.'
  - '''Todo viviente'' refleja el valor universal de כל חי sin pluralizar innecesariamente.'
