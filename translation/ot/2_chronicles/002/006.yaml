id: 2CH.2.6
reference: 2 Chronicles 2:6
source:
  edition: WLC
  text: וְ/עַתָּ֡ה שְֽׁלַֽח לִ֣/י אִישׁ חָכָ֡ם לַ/עֲשׂוֹת֩ בַּ/זָּהָ֨ב וּ/בַ/כֶּ֜סֶף וּ/בַ/נְּחֹ֣שֶׁת וּ/בַ/בַּרְזֶ֗ל וּ/בָֽ/אַרְגְּוָן֙ וְ/כַרְמִ֣יל וּ/תְכֵ֔לֶת וְ/יֹדֵ֖עַ לְ/פַתֵּ֣חַ פִּתּוּחִ֑ים עִם הַֽ/חֲכָמִ֗ים אֲשֶׁ֤ר עִמִּ/י֙ בִּֽ/יהוּדָ֣ה וּ/בִֽ/ירוּשָׁלִַ֔ם אֲשֶׁ֥ר הֵכִ֖ין דָּוִ֥יד אָבִֽ/י־־־׃
translation:
  text: Now send me a skilled man to work in gold[a], silver, bronze, iron, purple, crimson, and blue, and who knows how to engrave engravings, to be with the skilled men who are with me in Judah and Jerusalem[c][b], whom my father David prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scarlet' for 'crimson.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'to engrave engravings,' a cognate expression for skilled engraved work.
    reason: lexical_alternative
  - marker: c
    text: Or 'whom my father David appointed' / 'made ready'; the Hebrew verb can cover preparation or appointment depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁלַח
  chosen: send
  alternatives:
  - dispatch
  lexicon: HALOT
  rationale: Imperative request to Huram; 'send' is the natural modern English equivalent without adding formality beyond the Hebrew.
- source_word: אִישׁ חָכָם
  chosen: a skilled man
  alternatives:
  - a wise man
  - an expert man
  lexicon: HALOT
  rationale: In craft contexts חכם commonly denotes technical skill rather than abstract wisdom. 'Man' preserves the gendered singular form per the source.
- source_word: לַעֲשׂוֹת
  chosen: to work
  alternatives:
  - to make
  - to do work in
  lexicon: HALOT
  rationale: Here the infinitive introduces craftsmanship in various materials. 'To work' is idiomatic in English for artisan labor across metals and textiles.
- source_word: בַּזָּהָב וּבַכֶּסֶף וּבַנְּחֹשֶׁת וּבַבַּרְזֶל
  chosen: in gold, silver, bronze, iron
  alternatives:
  - with gold, silver, bronze, iron
  lexicon: HALOT
  rationale: The preposition ב marks the materials in which the artisan works. 'In' fits English craft idiom. נְחֹשֶׁת is rendered 'bronze' in this historical/material context rather than the broader 'copper'.
- source_word: אַרְגְּוָן
  chosen: purple
  alternatives:
  - purple cloth
  - purple yarn
  lexicon: HALOT
  rationale: Refers to costly purple-dyed material/color. Since the noun itself does not specify the textile unit, the simple color term is retained in the list.
- source_word: כַרְמִיל
  chosen: crimson
  alternatives:
  - scarlet
  lexicon: HALOT
  rationale: A red dyed material/color. 'Crimson' is a clear modern equivalent; 'scarlet' is also possible and worth preserving in a footnote.
- source_word: תְכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - violet-blue
  lexicon: HALOT
  rationale: The term denotes blue/purple dyed material used in tabernacle/temple textiles. 'Blue yarn' makes the craft context explicit in natural English, though the Hebrew names the dyed material more compactly.
- source_word: יֹדֵעַ לְפַתֵּחַ פִּתּוּחִים
  chosen: who knows how to engrave engravings
  alternatives:
  - who knows how to make engravings
  - who is skilled in engraving
  lexicon: HALOT
  rationale: The Hebrew uses a cognate construction emphasizing engraved work. The somewhat literal 'engrave engravings' preserves that emphasis while remaining intelligible.
- source_word: עִם הַחֲכָמִים
  chosen: to be with the skilled men
  alternatives:
  - alongside the craftsmen
  - with the wise men
  lexicon: HALOT
  rationale: Context is collaborative temple craftsmanship. 'Skilled men' keeps the lexical link with חכם earlier in the verse and preserves the masculine plural form.
- source_word: אֲשֶׁר עִמִּי
  chosen: who are with me
  alternatives:
  - who are under me
  - who are in my service
  lexicon: HALOT
  rationale: The phrase is relational and locative, not explicitly hierarchical; 'with me' is the plain sense.
- source_word: אֲשֶׁר הֵכִין דָּוִיד אָבִי
  chosen: whom my father David prepared
  alternatives:
  - whom my father David appointed
  - which my father David made ready
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the skilled men just mentioned. הֵכִין means 'prepared/made ready'; 'prepared' preserves the broader sense without over-specifying formal appointment.
