translation:
  language: es
  text: Y Abram siguió avanzando hacia el Neguev.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el sur». El hebreo puede referirse a la región llamada el Neguev o a la dirección sur, aunque aquí probablemente se trata del sentido regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: journeyed on
  chosen_spanish: siguió su viaje
  alternatives_spanish:
  - viajó
  - prosiguió su camino
  - se puso en marcha
  lexicon: HALOT
  rationale: El verbo נסע en este contexto narra el avance de una caravana o traslado, con matiz de reemprender el camino. «Siguió su viaje» conserva la idea de continuidad sin añadir una imagen demasiado mecánica en español.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: Transliteración del nombre propio
  rationale: Se mantiene la forma tradicional de transliteración usada por el POB en inglés para el nombre del patriarca.
- source_word: הָלוֹךְ וְנָסוֹעַ
  english_pob_choice: going
  chosen_spanish: yendo
  alternatives_spanish:
  - continuando
  - en continuo avance
  - viajando
  lexicon: HALOT
  rationale: La construcción infinitiva expresa movimiento progresivo o repetido. «Yendo» mantiene esa cualidad de manera natural en español, enlazándola con el verbo principal sin sobreinterpretar el ritmo del viaje.
- source_word: הַנֶּגְבָּה
  english_pob_choice: toward the Negev
  chosen_spanish: hacia el Neguev
  alternatives_spanish:
  - hacia el sur
  - hacia la región del Neguev
  - al Negev
  lexicon: HALOT
  rationale: En este pasaje prevalece el sentido regional/geográfico de נֶגֶב, no solo la dirección cardinal. «Neguev» preserva el topónimo bíblico; se usa la preposición de dirección «hacia» para reflejar el valor direccional del hebreo.
translation_notes:
  revision_awareness: 'El texto inglés más reciente eliminó la expansión «by stages» y volvió a una formulación más directa («journeyed on, going toward the Negev»). La presente versión española sigue esa línea: evita introducir una paráfrasis interpretativa como «por etapas» y conserva el movimiento progresivo con una expresión natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Abram» por consistencia onomástica con la tradición POB y el texto fuente.
  - Se eligió «Neguev» como transliteración castellana del topónimo, evitando traducirlo de manera obligatoria como «sur» porque el contexto favorece el referente geográfico.
  - No se capitaliza «viaje» en medio de la oración, siguiendo la ortografía española estándar.
