translation:
  language: es
  text: Por tanto, todas las manos se debilitarán, y todo corazón humano[a] se derretirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo corazón mortal» o «todo corazón del hombre». El hebreo אֱנוֹשׁ se refiere genéricamente al ser humano, a menudo con un matiz de fragilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión resultante del anuncio previo de juicio. «Por tanto» conserva bien la fuerza inferencial en un español bíblico moderno y natural.
- source_word: כָּל יָדַיִם
  english_pob_choice: all hands
  chosen_spanish: todas las manos
  alternatives_spanish:
  - cada mano
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal colectiva de las manos como símbolo de fuerza y acción. El plural «las manos» refleja mejor el hebreo que una abstracción como «las fuerzas».
- source_word: תִּרְפֶּינָה
  english_pob_choice: will grow weak
  chosen_spanish: desfallecerán
  alternatives_spanish:
  - se debilitarán
  - se volverán flácidas
  lexicon: HALOT
  rationale: La raíz רפה expresa debilidad, aflojamiento o flaqueza. «Desfallecerán» transmite esa pérdida de vigor en un español idiomático sin borrar la imagen física del hebreo.
- source_word: וְכָל לְבַב אֱנוֹשׁ
  english_pob_choice: and every human heart
  chosen_spanish: y todo corazón humano
  alternatives_spanish:
  - y todo corazón de hombre
  - y todo corazón mortal
  lexicon: HALOT
  rationale: Se conserva el sentido genérico de אֱנוֹשׁ como ser humano, con su matiz de fragilidad. «Humano» evita una lectura masculina exclusiva y suena natural en español.
- source_word: יִמָּס
  english_pob_choice: will melt
  chosen_spanish: se derretirá
  alternatives_spanish:
  - se fundirá
  - se deshará
  lexicon: HALOT
  rationale: El verbo conserva la metáfora literal de derretirse, usada aquí figuradamente para el derrumbe del valor o la resolución. «Se derretirá» es claro y mantiene la imagen del hebreo.
theological_decisions:
- issue: אֱנוֹשׁ como referencia humana genérica con tono de fragilidad
  english_pob_reading: human
  chosen_spanish_reading: humano
  alternative_spanish_readings:
  - hombre
  - mortal
  rationale: El hebreo no señala varón en particular, sino humanidad en general, con un matiz de debilidad propia del ser humano. «Humano» conserva esa referencia inclusiva y el trasfondo de fragilidad sin añadir interpretación doctrinal extra.
  doctrine_reference: DOCTRINE.md §Translation philosophy; principio de lenguaje genérico y precisión léxica
translation_notes:
  revision_awareness: 'El contexto inglés presenta acuerdo alto y no requirió revisiones. La versión española sigue la lectura auditada: conclusión causal, imagen corporal de las manos, metáfora de debilidad y sentido genérico de אֱנוֹשׁ.'
  spanish_consistency_notes:
  - Se usa «Por tanto» para mantener el valor conclusivo de עַל כֵּן.
  - Se conserva la imagen concreta «manos» en lugar de una abstracción.
  - «Humano» refleja el alcance genérico de אֱנוֹשׁ sin masculinizar el texto.
  - La metáfora de derretirse se mantiene literal para preservar el recurso poético del hebreo.
