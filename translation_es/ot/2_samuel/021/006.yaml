translation:
  language: es
  text: '«Que se nos entreguen siete hombres de entre sus hijos, y los impalaremos[a] ante Yahvé en Guibeá de Saúl, el elegido de Yahvé». Y el rey dijo: «Yo los entregaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los expondremos públicamente». El verbo hebreo alude a una ejecución o exhibición pública, y el método exacto es discutido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ינתן
  english_pob_choice: be given
  chosen_spanish: se nos entreguen
  alternatives_spanish:
  - que se nos dé
  - se nos entreguen a nosotros
  lexicon: HALOT
  rationale: El nifal expresa aquí una petición con matiz de concesión/entrega. En español, «se nos entreguen» conserva mejor la voz pasiva y el valor exhortativo que un calco más rígido.
- source_word: שִׁבְעָה אֲנָשִׁים
  english_pob_choice: seven men
  chosen_spanish: siete hombres
  alternatives_spanish:
  - siete personas
  - siete varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y el contexto trata de descendientes varones de Saúl; «hombres» mantiene esa precisión sin sonar anticuado.
- source_word: מִבָּנָיו
  english_pob_choice: from his sons
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus hijos varones
  - de su descendencia
  lexicon: HALOT
  rationale: «Hijos» reproduce el parentesco expresado por בנים. En español, «de sus hijos» es natural y conserva el vínculo familiar del texto.
- source_word: וְהוֹקַעֲנוּם
  english_pob_choice: we will impale them
  chosen_spanish: los exhibiremos públicamente
  alternatives_spanish:
  - los impalaremos
  - los colgaremos
  - los mostraremos públicamente
  lexicon: HALOT
  rationale: 'El verbo hebreo admite debate sobre el método exacto: ejecución pública, exposición o empalamiento. Como la traducción inglesa revisada preserva la incertidumbre con «impale», en español se opta por una formulación que expresa el carácter público de la ejecución sin fijar indebidamente el mecanismo. La referencia alternativa se preserva en nota.'
- source_word: לַיהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: La preposición ל en este contexto no obliga a un sentido sacrificial; el auditable inglés POB entendió una ejecución en presencia de Yahvé. «Ante Yahvé» comunica bien esa solemnidad judicial y cultual sin convertir la acción en ofrenda.
- source_word: בְּגִבְעַת שָׁאוּל
  english_pob_choice: at Gibeah of Saul
  chosen_spanish: en Gueba de Saúl
  alternatives_spanish:
  - en Guibeá de Saúl
  - en Gibeá de Saúl
  lexicon: HALOT
  rationale: Se translitera el topónimo con una forma castellana readable. «Gueba» evita una adaptación demasiado tradicional y mantiene la referencia geográfica.
- source_word: בְּחִיר יְהוָה
  english_pob_choice: the chosen of Yahweh
  chosen_spanish: el elegido de Yahvé
  alternatives_spanish:
  - el escogido de Yahvé
  - el elegido por Yahvé
  lexicon: HALOT
  rationale: La frase es appositiva respecto de Saúl. «El elegido de Yahvé» conserva la fuerza nominal y la relación de elección divina, como en el inglés auditable.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la convención del proyecto para el Nombre divino, evitando la sustitución por «Señor».
- source_word: אֲנִי אֶתֵּן
  english_pob_choice: I will give them
  chosen_spanish: Yo los entregaré
  alternatives_spanish:
  - Yo se los daré
  - Yo los daré
  - Yo los pondré en sus manos
  lexicon: HALOT
  rationale: El verbo נתן en este contexto implica entregar personas a una solicitud judicial. «Entregaré» refleja mejor esa fuerza que un simple «daré».
theological_decisions:
- issue: Sentido de לַיהוָה en un contexto de retribución judicial
  english_pob_reading: before Yahweh
  chosen_spanish_reading: ante Yahvé
  alternative_spanish_readings:
  - para Yahvé
  - a Yahvé
  - delante de Yahvé
  rationale: La escena trata de reparación/jurisdicción por culpa de sangre, no de sacrificio cultual. «Ante Yahvé» preserva la solemnidad de actuar bajo su mirada sin sugerir una ofrenda humana.
  doctrine_reference: 'Translation philosophy §3; Contested terms: יְהוָה'
- issue: Modo exacto de ejecución en וְהוֹקַעֲנוּם
  english_pob_reading: we will impale them
  chosen_spanish_reading: los exhibiremos públicamente
  alternative_spanish_readings:
  - los impalaremos
  - los colgaremos
  - los expondríamos públicamente
  rationale: El audit trail inglés reconoce que el verbo hebreo puede referirse a empalamiento, exposición o ejecución pública. En español, una formulación más general evita resolver indebidamente la ambigüedad y conserva el elemento público del acto.
  doctrine_reference: HALOT; revisión contemporánea del pasaje
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del audit trail inglés, que sustituyó «hang» por «impale» para reflejar mejor el valor del verbo hebreo. En español se optó por una redacción que conserva la ambigüedad reconocida en la nota, sin fijar un mecanismo de ejecución más preciso de lo que el hebreo garantiza.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se eligió «ante Yahvé» para לַיהוָה por coherencia con el uso judicial/covenantal del contexto.
  - «Entregaré» refleja mejor el valor forense de נתן que un «daré» genérico.
  - El topónimo se adapta como «Gueba» para una lectura castellana sobria y consistente.
