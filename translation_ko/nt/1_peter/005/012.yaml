id: 1PE.5.12
reference: 1 Peter 5:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὰ Σιλουανοῦ ὑμῖν τοῦ πιστοῦ ἀδελφοῦ, ὡς λογίζομαι, δι’ ὀλίγων ἔγραψα, παρακαλῶν καὶ ἐπιμαρτυρῶν ταύτην εἶναι ἀληθῆ χάριν τοῦ θεοῦ· εἰς ἣν στῆτε.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/012.yaml
  text: 'Through Silvanus, the faithful brother, as I regard him, I have written to you briefly, exhorting and testifying that this is the true grace of God. Stand firm in it.'
translation:
  language: ko
  text: '내가 신실한 형제로 여기는 실루아노를 통하여 짧게 여러분에게 써 보냈습니다. 이로써 권면하며 또한 이것이 하나님의 참된 은혜임을 증언합니다. 그 안에 굳게 서십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σιλουανοῦ
  english_pob_choice: Silvanus
  chosen_korean: 실루아노
  alternatives_korean:
  - 실라
  lexicon: BDAG
  rationale: Σιλουανός를 라틴식 음역 「실루아노」로 옮긴다. 바울 서신의 「실라」(Σιλᾶς)와 동일 인물로 보이지만 형태가 다르므로 베드로전서는 라틴식 음역 사용.
- source_word: τοῦ πιστοῦ ἀδελφοῦ
  english_pob_choice: the faithful brother
  chosen_korean: 신실한 형제
  alternatives_korean:
  - 미쁜 형제
  - 충성된 형제
  lexicon: BDAG
  rationale: πιστός의 「신실함」을 「신실한」으로 평이하게.
- source_word: δι’ ὀλίγων ἔγραψα
  english_pob_choice: I have written to you briefly
  chosen_korean: 짧게 여러분에게 써 보냈습니다
  alternatives_korean:
  - 적은 말로 너희에게 적었습니다
  lexicon: BDAG
  rationale: δι' ὀλίγων은 「적은 말로·간략히」. 「짧게」로 옮긴다.
- source_word: ἐπιμαρτυρῶν
  english_pob_choice: testifying
  chosen_korean: 증언합니다
  alternatives_korean:
  - 강조하여 증거합니다
  lexicon: BDAG
  rationale: ἐπι- 접두사의 「강조」를 한국어로 자연스러운 「증언」으로 옮긴다.
- source_word: εἰς ἣν στῆτε
  english_pob_choice: Stand firm in it
  chosen_korean: 그 안에 굳게 서십시오
  alternatives_korean:
  - 그것에 굳건하게 서십시오
  lexicon: BDAG
  rationale: 일부 사본은 ἐν ᾗ ἑστήκατε(너희가 그 안에 서 있다, 직설법)로 읽으나, εἰς ἣν στῆτε(그 안에 서라, 명령) 본문이 더 잘 입증됨.
