id: REV.2.13
reference: 'Revelation 2:13'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Οἶδα ποῦ κατοικεῖς, ὅπου ὁ θρόνος τοῦ Σατανᾶ, καὶ κρατεῖς τὸ ὄνομά μου, καὶ οὐκ ἠρνήσω τὴν πίστιν μου ⸀καὶ ἐν ταῖς ⸀ἡμέραις Ἀντιπᾶς, ὁ μάρτυς μου, ὁ πιστός ⸀μου, ὃς ἀπεκτάνθη παρ’ ὑμῖν, ὅπου ὁ Σατανᾶς κατοικεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/013.yaml
  text: 'I know where you live—where Satan’s throne is[a]. Yet you hold fast my name, and you did not deny faith in me, even in the days of Antipas, my witness, my faithful one, who was killed among you[b], where Satan lives.'
  footnotes:
  - marker: a
    text: Or 'faith in me' or 'my faithfulness.' The Greek phrase 'my faith' is compact and may be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Or 'my martyr.' The Greek word can mean 'witness,' and in contexts of suffering or death it can also carry the sense 'martyr.'
    reason: lexical_alternative
translation:
  language: ko
  text: '내가 네가 사는 곳—사탄의 보좌가 있는 곳—을 안다. 그러나 너는 내 이름을 굳게 붙들었고, 나에 대한 믿음[a]을 부인하지 아니하였다. 사탄이 사는 그곳에서 내 충성된 증인[b] 안디바가 너희 가운데 죽임을 당하던 그 날들에도 부인하지 아니하였다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「내 신실함」. 헬라어 「내 믿음」은 압축된 표현으로 두 가지로 모두 읽힐 수 있다.'
    reason: alternative_reading
  - marker: b
    text: '또는 「내 순교자」. 헬라어 μάρτυς는 「증인」을 의미하며, 고난·죽음의 문맥에서는 「순교자」의 의미도 함께 지닐 수 있다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μάρτυς μου ὁ πιστός
  english_pob_choice: my witness, my faithful one
  chosen_korean: 내 충성된 증인
  alternatives_korean:
  - 내 신실한 증인
  lexicon: BDAG
  rationale: '안디바를 가리키는 호칭으로 「충성된 증인」을 채택. 후대의 「순교자」 의미는 각주에 보존.'
