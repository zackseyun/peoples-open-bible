theological_decisions:
- issue: Nature of repentance as divine gift
  chosen_reading: Rendered ἔδωκεν with 'has also granted' and kept repentance as something God gives to the Gentiles.
  alternative_readings:
  - '''gave'' with less emphasis on gift nuance'
  rationale: The Greek explicitly presents repentance as granted by God. The translation preserves that statement without importing a broader doctrinal system about monergism or human response beyond what the verse says.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
