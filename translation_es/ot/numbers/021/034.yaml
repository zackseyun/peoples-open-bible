translation:
  language: es
  text: 'Y Yahvé dijo a Moisés[a]: «No le temas, porque lo he entregado en tu mano[b], junto con todo su pueblo y su tierra. Harás con él como hiciste con Sehón, rey de los amorreos, que habitaba en Hesbón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengas miedo de él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo he dado en tu mano», un modismo que significa «lo he entregado en tu poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: rendimiento del nombre divino según el convenio del proyecto
  rationale: El hebreo usa el Tetragrámaton directamente, y el POB inglés lo conserva como nombre propio. En español, el equivalente proyectual es "Yahvé", no una sustitución por "SEÑOR".
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear him
  chosen_spanish: No temas por él
  alternatives_spanish:
  - No le temas
  - No tengas miedo de él
  lexicon: ירא (prohibición de temor)
  rationale: La frase admite tanto el matiz de temor como el de temor dirigido hacia alguien. "No temas por él" conserva la advertencia y la referencia al objeto sin sonar forzado en español.
- source_word: בְיָדְךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu control
  lexicon: יד como idiomático de poder/posesión
  rationale: Se preserva la imagen hebrea de la mano. En español, "en tu mano" es natural y mantiene la tensión idiomática que el POB inglés dejó visible.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: lo he entregado
  alternatives_spanish:
  - lo he dado
  - lo he puesto
  lexicon: נתן en contexto de entrega/disposición
  rationale: En este contexto, el verbo expresa entrega efectiva a disposición de Moisés. "He entregado" comunica mejor la fuerza de dar en poder de otro que el simple "he dado".
- source_word: וְאֶת כָּל עַמּוֹ וְאֶת אַרְצוֹ
  english_pob_choice: along with all his people and his land
  chosen_spanish: junto con todo su pueblo y su tierra
  alternatives_spanish:
  - y todo su pueblo y su tierra
  - con todo su pueblo y su tierra
  lexicon: coordinación de objetos directos
  rationale: La coordinación hebrea enumera al rey, su pueblo y su tierra. "Junto con" suena natural en español y conserva la suma de los objetos sin borrar ninguno.
- source_word: וְעָשִׂיתָ לּוֹ
  english_pob_choice: You shall do to him
  chosen_spanish: Le harás
  alternatives_spanish:
  - Harás con él
  - Le tratarás
  lexicon: עשה con ל en sentido de tratar/deal with
  rationale: El hebreo dice literalmente "harás a/para él". En español, "Le harás" es breve y mantiene la relación directa con la comparación siguiente.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  english_pob_choice: as you did
  chosen_spanish: como le hiciste
  alternatives_spanish:
  - tal como hiciste
  - como has hecho
  lexicon: comparación retrospectiva
  rationale: Se mantiene la comparación explícita y el objeto implícito del verbo en español, que aquí necesita ser recuperado por claridad.
- source_word: לְסִיחֹן מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: to Sihon king of the Amorites
  chosen_spanish: a Sehón, rey de los amorreos
  alternatives_spanish:
  - a Sihón, rey de los amorreos
  - al rey Sehón de los amorreos
  lexicon: nombre propio y gentilicio
  rationale: Se usa la forma castellana habitual "Sehón" y "amorreos". Se conserva la estructura titular del hebreo, ahora con puntuación española para lectura fluida.
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  english_pob_choice: who lived in Heshbon
  chosen_spanish: que habitaba en Hesbón
  alternatives_spanish:
  - que vivía en Hesbón
  - que moraba en Hesbón
  lexicon: ישב como residir/habitar
  rationale: El participio puede expresar residencia continua. "Habitaba" conserva ese valor y suena dignificado en español bíblico moderno.
theological_decisions:
- issue: Cómo traducir el Tetragrámaton en un texto público español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El POB inglés preserva el nombre del pacto. En español, la forma del proyecto es "Yahvé", que evita la sustitución reverencial por un título y mantiene el nombre divino como nombre propio.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de 'give into your hand'
  english_pob_reading: I have given him into your hand
  chosen_spanish_reading: lo he entregado, en tu mano
  alternative_spanish_readings:
  - lo he dado en tus manos
  - lo he puesto en tu poder
  rationale: La imagen de la mano se conserva, pero el sentido teológico principal es de entrega soberana a la victoria de Moisés. "Entregado" expresa esa finalidad sin borrar el idiomatismo hebreo.
  doctrine_reference: Uso idiomático hebreo reconocido en la nota inglesa; no implica una doctrina adicional
- issue: Referencia comparativa a la victoria previa sobre Sehón
  english_pob_reading: as you did to Sihon king of the Amorites
  chosen_spanish_reading: como le hiciste a Sehón, rey de los amorreos
  alternative_spanish_readings:
  - como hiciste con Sehón, rey de los amorreos
  - tal como le hiciste a Sehón
  rationale: La comparación recuerda una acción histórica concreta y no un principio abstracto. Por eso se mantiene la referencia personal y titulada, con el objeto implícito recuperado en español.
  doctrine_reference: Contexto narrativo de Números 21
- issue: Objetivo del temor prohibido
  english_pob_reading: Do not fear him
  chosen_spanish_reading: No temas por él
  alternative_spanish_readings:
  - No le temas
  - No tengas miedo de él
  rationale: El mandato apunta al rey enemigo como objeto del temor. La formulación elegida conserva el imperativo y su tono pastoral sin volverlo excesivamente coloquial.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Este borrador sigue el análisis concordante del POB inglés y no introduce cambios de revisión adicionales; conserva el nombre divino, el modismo de la mano y la comparación histórica con Sehón, ajustándolos a español natural y transparente.
  spanish_consistency_notes:
  - Se usa "Yahvé" como nombre divino, coherente con el estándar del proyecto.
  - Se mantiene "amorreos" en minúscula por tratarse de un gentilicio plural en español.
  - '"Hesbón" sigue la forma castellana usual del topónimo bíblico.'
  - La puntuación y la apertura/cierre de comillas se adaptan a norma española.
  - La nota sobre "No temas por él" se vincula al matiz alternativo de "No le temas" sin duplicar contenido innecesariamente.
