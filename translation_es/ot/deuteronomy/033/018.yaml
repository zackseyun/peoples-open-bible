translation:
  language: es
  text: 'Y de Zabulón dijo[a]: «¡Alégrate, Zabulón, en tus salidas, e Isacar, en tus tiendas!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando salgas». La expresión hebrea puede denotar el ámbito de la actividad o de la prosperidad de Zabulón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/זְבוּלֻן
  english_pob_choice: And of Zebulun
  chosen_spanish: Y de Zabulón
  alternatives_spanish:
  - Y a Zabulón
  - Y acerca de Zabulón
  lexicon: HALOT
  rationale: La construcción introductoria presenta la bendición pronunciada respecto de la tribu; en español, «de Zabulón» comunica de modo natural ese marco sin forzar una preposición menos idiomática.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - afirmó
  lexicon: HALOT
  rationale: Verbo narrativo estándar para introducir la palabra profética o de bendición; «dijo» mantiene sencillez y fidelidad.
- source_word: שְׂמַח
  english_pob_choice: Rejoice
  chosen_spanish: ¡Alégrate!
  alternatives_spanish:
  - ¡Regocíjate!
  - ¡Goza!
  lexicon: HALOT
  rationale: Imperativo dirigido a la tribu; «alégrate» conserva el tono exhortativo y funciona con naturalidad en español bíblico contemporáneo.
- source_word: בְּ/צֵאתֶךָ
  english_pob_choice: in your going out
  chosen_spanish: en tu salir
  alternatives_spanish:
  - cuando salgas
  - en tus salidas
  lexicon: HALOT
  rationale: Se conserva la imagen verbal y la posible amplitud semántica de la expresión hebrea. «En tu salir» refleja mejor la forma nominal del original que una paráfrasis más interpretativa.
- source_word: וְ/יִשָּׂשכָר
  english_pob_choice: and Issachar
  chosen_spanish: y tú, Isacar
  alternatives_spanish:
  - e Isacar
  - y Isacar
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con Zabulón y se explicita el segundo destinatario con el pronombre «tú» para que el español reproduzca la dirección del imperativo sin ambigüedad.
- source_word: בְּ/אֹהָלֶיךָ
  english_pob_choice: in your tents
  chosen_spanish: en tus tiendas
  alternatives_spanish:
  - en tus tiendas de campaña
  - en tus moradas
  lexicon: HALOT
  rationale: «Tiendas» conserva la imagen concreta del plural hebreo y el paralelismo con la salida de Zabulón; «moradas» o «hogar» suavizarían en exceso la imaginería.
theological_decisions:
- issue: 'Alcance de בְּ/צֵאתֶךָ: circunstancia de actividad o de salida literal'
  english_pob_reading: The Hebrew expression may denote the sphere of Zebulun’s activity or prosperity.
  chosen_spanish_reading: La expresión puede entenderse como el ámbito de tu salir o de tus actividades.
  alternative_spanish_readings:
  - cuando salgas
  - en tu actividad
  rationale: Se conserva la tensión documentada entre una salida literal y un sentido de esfera/actividad, sin cerrarla en una sola opción interpretativa.
  doctrine_reference: Hermenéutica lexical y semántica del texto poético
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con la revisión más reciente: no se documentan cambios sustantivos en la tradición auditada, por lo que la redacción española sigue de cerca la solución del POB en inglés, preservando la ambigüedad indicada en la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene «Zabulón» e «Isacar» con transliteración estándar en español bíblico.
  - Se conserva el paralelismo semántico entre «salir» y «tiendas» sin convertirlo en una paráfrasis explicativa.
  - La nota al pie refleja la alternativa textual/lexical ya documentada en el audit trail inglés.
