base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/013.yaml
  text: Son of man[a], if a land sins against me by acting unfaithfully, and I stretch out my hand against it and break its supply of bread, and send famine upon it, and cut off from it man and beast[b],
  footnotes:
