id: 2TH.1.12
reference: 2 Thessalonians 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅπως ἐνδοξασθῇ τὸ ὄνομα τοῦ κυρίου ἡμῶν Ἰησοῦ ἐν ὑμῖν, καὶ ὑμεῖς ἐν αὐτῷ, κατὰ τὴν χάριν τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/012.yaml
  text: so that the name of our Lord Jesus may be glorified in you[a], and you in him[c][b], according to the grace of our God and the Lord Jesus Messiah.
translation:
  language: ko
  text: 그리하여 우리 주 예수의 이름이 여러분 안에서 영광 받으시고, 여러분도 그분 안에서 영광 받기를[a] 빕니다. 이는 우리 하나님과 주 예수 메시아[b]의 은혜를 따른 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분 가운데서」. 헬라어 전치사 ἐν은 두 의미를 모두 가질 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως ἐνδοξασθῇ
  english_pob_choice: so that ... may be glorified
  chosen_korean: 그리하여 ~ 영광 받으시고
  alternatives_korean:
  - 그래서 ~ 영광스럽게 되시고
  lexicon: BDAG
  rationale: 목적/결과 절을 자연스럽게 「그리하여」로 옮기며, 수동의 신적 영광 수용을 「영광 받으시고」로 표현한다.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_korean: 이름
  alternatives_korean:
  - 명칭
  lexicon: BDAG
  rationale: 성경적 의미의 인격적 정체성·명성을 가리키는 「이름」을 직역으로 보존한다.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_korean: 여러분 안에서
  alternatives_korean:
  - 여러분 가운데서
  lexicon: BDAG
  rationale: ἐν의 「~안에」 의미를 그리스도-신자 연합의 정형 표현으로 보존하며, 공동체적 「가운데서」는 각주.
- source_word: καὶ ὑμεῖς ἐν αὐτῷ
  english_pob_choice: and you in him
  chosen_korean: 여러분도 그분 안에서 영광 받기를
  alternatives_korean:
  - 여러분도 그분 안에서
  lexicon: BDAG
  rationale: 평행 구조에서 동사가 생략되어 있으나 한국어 흐름상 「영광 받기를」을 보충해야 자연스럽다. 「그분」은 「이름」이 아닌 주 예수를 가리킨다.
- source_word: κατὰ τὴν χάριν
  english_pob_choice: according to the grace
  chosen_korean: 은혜를 따른
  alternatives_korean:
  - 은혜에 따른
  - 은혜로 말미암은
  lexicon: BDAG
  rationale: κατά + 대격의 「표준/근거」 의미를 자연스러운 「~을 따른」으로 표현한다.
- source_word: τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ
  english_pob_choice: of our God and the Lord Jesus Messiah
  chosen_korean: 우리 하나님과 주 예수 메시아의
  alternatives_korean:
  - 우리 하나님과 주 예수 그리스도의
  lexicon: BDAG
  rationale: 단일 관사 + καί 구조의 신학적 무게를 본문에서 강제 해석하지 않고, 「우리 하나님과 주 예수 메시아」로 묶음을 그대로 보존한다.
theological_decisions:
- issue: αὐτῷ의 지시 대상
  chosen_reading: 그분(주 예수)
  alternative_readings:
  - 그것(이름)
  rationale: 남성 대명사와 상호 영광의 패턴은 주 예수를 가리키며, 바울의 「그리스도 안에」 정형과도 부합한다.
  doctrine_reference: 'Preserve theological tension; ambiguity documented'
- issue: 단일 관사 + 두 명사의 신학적 의미(그랜빌 샤프 유형)
  chosen_reading: 두 인격을 가까이 묶은 표현으로 보존하되, 단일/이중 지시를 본문에서 강제하지 않음
  alternative_readings:
  - 두 인격을 분명히 구분한 표현
  rationale: 헬라어 구조의 압축성을 보존하기 위해 해석적 단어를 더하지 않는다.
  doctrine_reference: 'Affirmations: Nicene Creed; Preserve theological tension'
- issue: Χριστοῦ 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관된 원칙에 따라 칭호를 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός'
