    text: O «para su obra». El sufijo hebreo puede referirse al arma producida o al artesano.
    reason: alternative_reading
  revision_rationale: 'Se corrige la redacción para mejorar la naturalidad del español («sobre el fuego» y «para su trabajo») y, sobre todo, para restaurar una decisión importante del POB auditado: la ambigüedad de לְמַעֲשֵׂהוּ, que debe preservarse mediante nota. Los cambios no alteran la teología ni la estructura del versículo, solo afinan fidelidad y legibilidad.'
