translation:
  language: es
  text: 'Entonces tomé a los jefes de sus tribus[a], hombres sabios y entendidos, y los nombré jefes sobre ustedes: comandantes de miles, comandantes de cientos, comandantes de cincuenta, comandantes de diez, y oficiales para sus tribus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien conocidos» para «entendidos»; el hebreo puede referirse a hombres conocidos o reconocidos, aunque en este contexto probablemente alude a hombres caracterizados por conocimiento o discernimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: So I took
  chosen_spanish: Así que tomé
  alternatives_spanish:
  - Y tomé
  - Entonces tomé
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la secuencia; «Así que» transmite bien la continuidad lógica y narrativa en español sin perder la primera persona ni la acción de tomar.
- source_word: רָאשֵׁי שִׁבְטֵיכֶם
  english_pob_choice: the heads of your tribes
  chosen_spanish: los jefes de sus tribus
  alternatives_spanish:
  - los cabezas de sus tribus
  - los líderes de sus tribus
  lexicon: HALOT
  rationale: En este contexto administrativo, רֹאשׁ designa a quienes están al frente de un grupo. «Jefes» es natural en español y preserva la metáfora de encabezamiento que el texto repite con רָאשִׁים más adelante.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  lexicon: HALOT
  rationale: El hebreo es masculino y concreto; «hombres» mantiene esa fuerza y evita neutralizar indebidamente el término.
- source_word: חֲכָמִים
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - inteligentes
  lexicon: HALOT
  rationale: «Sabios» refleja la cualidad de prudencia práctica requerida para el liderazgo, y corresponde bien al uso habitual de חכם en este tipo de listas administrativas.
- source_word: וִידֻעִים
  english_pob_choice: knowledgeable
  chosen_spanish: entendidos
  alternatives_spanish:
  - conocidos
  - conocedores
  - bien conocidos
  lexicon: HALOT
  rationale: El término puede apuntar a personas con conocimiento o reconocidas por su capacidad. «Entendidos» preserva el matiz de discernimiento y competencia sin reducirlo a mera notoriedad social.
- source_word: וָאֶתֵּן אֹתָם רָאשִׁים עֲלֵיכֶם
  english_pob_choice: and appointed them as heads over you
  chosen_spanish: y los puse como jefes sobre ustedes
  alternatives_spanish:
  - y los nombré jefes sobre ustedes
  - y los establecí como jefes sobre ustedes
  lexicon: HALOT
  rationale: וָאֶתֵּן con objeto y complemento expresa designación/nombramiento. «Los puse como jefes» suena natural en español y conserva la idea de establecimiento en cargo.
- source_word: שָׂרֵי
  english_pob_choice: commanders of
  chosen_spanish: jefes de
  alternatives_spanish:
  - comandantes de
  - capitanes de
  - encargados de
  lexicon: HALOT
  rationale: Aunque «comandantes» podría reflejar el valor militar de שַׂר, en español bíblico de registro general «jefes de» comunica autoridad organizada sin forzar una lectura exclusivamente militar para todas las unidades enumeradas.
- source_word: אֲלָפִים ... מֵאוֹת ... חֲמִשִּׁים ... עֲשָׂרֹת
  english_pob_choice: thousands ... hundreds ... fifties ... tens
  chosen_spanish: millares ... centenas ... cincuenta ... decenas
  alternatives_spanish:
  - miles ... centenas ... cincuenta ... decenas
  - mil ... cientos ... cincuenta ... decenas
  lexicon: HALOT
  rationale: Se mantiene la estructura graduada del hebreo. «Millares» y «centenas» reflejan bien las unidades organizativas; «cincuenta» y «decenas» conservan el paralelismo numérico del texto.
- source_word: וְשֹׁטְרִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - oficiales administrativos
  - encargados
  - inspectores
  lexicon: HALOT
  rationale: שֹׁטֵר suele referirse a funcionarios subordinados, a veces de carácter administrativo o de registro. «Oficiales» es breve y suficientemente amplio para esa función.
- source_word: לְשִׁבְטֵיכֶם
  english_pob_choice: for your tribes
  chosen_spanish: para sus tribus
  alternatives_spanish:
  - según sus tribus
  - entre sus tribus
  lexicon: HALOT
  rationale: El ל de asignación se expresa con naturalidad en español como «para». Dado que el discurso está dirigido a Israel como conjunto, el posesivo de tercera plural en el registro español resulta fluido y coherente.
theological_decisions:
- issue: Conservación de la estructura administrativa y de autoridad del texto
  english_pob_reading: The verse describes a divinely ordered appointment of tribal leadership and subordinate officers.
  chosen_spanish_reading: El versículo describe una designación ordenada de jefes tribales y oficiales subordinados.
  alternative_spanish_readings:
  - El versículo describe una organización militar estricta.
  - El versículo describe solo una estructura civil sin matiz de autoridad.
  rationale: El hebreo enumera cargos y niveles de autoridad; la traducción evita exagerar el matiz militar y también evita diluir la jerarquía. «Jefes» y «oficiales» conservan el orden institucional sin imponer un esquema ajeno al texto.
  doctrine_reference: Éxodo 18; Deuteronomio 1:13-16
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de base y se tomó en cuenta el aparato inglés de la POB, especialmente la nota léxica sobre וִידֻעִים. No se detectaron revisiones aplicadas en el pasaje fuente; el borrador conserva la estructura y el paralelismo del original.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin calcos excesivamente rígidos.
  - Se preservó la repetición de cargos («jefes... jefes... oficiales») para reflejar el paralelismo del hebreo.
  - Se evitó sustituir términos de autoridad por equivalentes más eclesiásticos o más militares de lo que el contexto exige.
