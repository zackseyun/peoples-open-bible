revisions:
- from: Al tiempo señalado volverá y vendrá al sur[a]; pero no será como la primera ni como la postrera.
  to: Al tiempo señalado volverá y vendrá al sur[a]; pero no será como la anterior o como la posterior.
  rationale: Se ajusta la cláusula final para seguir más de cerca la coordinación comparativa del hebreo y del expediente POB, evitando la reestructuración con «ni... ni...». Se sustituye «postrera» por «posterior» para mejorar claridad y naturalidad en español neutro contemporáneo. También se normaliza la nota al pie para reflejar mejor la alternativa documentada y limpiar la puntuación.
