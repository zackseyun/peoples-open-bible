translation:
  language: es
  text: Estos son los nombres de los hijos de Aarón, los sacerdotes ungidos[a], cuyas manos fueron llenas para servir como sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "cuyas manos fueron llenas", un modismo que significa "a quienes se ordenó" o "instaló" para el servicio sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  - Estas
  lexicon: HALOT
  rationale: La fórmula demostrativa introductoria se vierte de manera natural con copula explícita en español.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: las listas de
  alternatives_spanish:
  - los nombres de
  lexicon: HALOT
  rationale: En este contexto, el hebreo introduce una enumeración identificadora; sin embargo, para lectura fluida en español, 'listas' evita una estructura demasiado pesada, aunque 'nombres' sigue siendo la equivalencia más directa del sustantivo.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos varones de Aarón
  - los descendientes varones de Aarón
  lexicon: HALOT
  rationale: Se mantiene el genitivo explícito y el matiz masculino de בְּנֵי con 'hijos'.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: En español bíblico, 'sacerdotes' comunica naturalmente el oficio sin perder el carácter funcional del término.
- source_word: הַמְּשֻׁחִים
  english_pob_choice: the anointed
  chosen_spanish: ungidos
  alternatives_spanish:
  - consagrados
  - los que fueron ungidos
  lexicon: HALOT
  rationale: El participio pasivo de משׁח se conserva con 'ungidos', que mantiene el acto ritual visible mejor que la paráfrasis 'consagrados'.
- source_word: מִלֵּא יָדָם
  english_pob_choice: whose hands were filled
  chosen_spanish: cuyas manos fueron llenadas
  alternatives_spanish:
  - a quienes se les llenaron las manos
  - cuyas manos fueron llenadas en su instalación
  lexicon: HALOT
  rationale: Se preserva la idiomática hebrea de manera auditable sin introducir un sujeto explícito ajeno al texto, siguiendo la revisión inglesa.
- source_word: לְכַהֵן
  english_pob_choice: to serve as priests
  chosen_spanish: para servir como sacerdotes
  alternatives_spanish:
  - para ministrar como sacerdotes
  - para ejercer como sacerdotes
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito/resultado; 'servir como sacerdotes' comunica la función ministerial con claridad moderna.
theological_decisions:
- issue: Mantener visible el idiomático de ordenación מִלֵּא יָדָם
  english_pob_reading: Preserve the literal idiom in the main text while clarifying its priestly function.
  chosen_spanish_reading: Conservar la imagen literal 'cuyas manos fueron llenadas' y explicitar el propósito con 'para servir como sacerdotes'.
  alternative_spanish_readings:
  - '''a quienes se les ordenó para servir como sacerdotes'''
  - '''que fueron instalados para servir como sacerdotes'''
  rationale: La frase hebrea es técnica y merece permanecer recognoscible; la traducción mantiene la tensión entre imagen e ինտención funcional sin borrar el rasgo lexical.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'whose hands he filled' por 'whose hands were filled' para reflejar el modismo hebreo sin introducir un sujeto no expresado. La redacción española sigue esa decisión y evita añadir un agente explícito.
  spanish_consistency_notes:
  - Se prefiere 'sacerdotes' para כֹּהֲנִים por ser el equivalente bíblico natural en español.
  - Se conserva 'ungidos' para מְשֻׁחִים, manteniendo la conexión ritual con la unción.
  - La nota a pie de página debe estar anclada en 'ungidos[a]' para que el marcador aparezca exactamente en el texto.
  - Se evita 'SEÑOR' y no hay vocabulario de YHWH en este versículo.
  - No se usa 'Cristo' ni 'siervo'; el término funcional es 'sacerdotes'.
