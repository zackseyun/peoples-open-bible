base_translation:
  language: en
  yaml_path: translation/ot/numbers/021/028.yaml
  text: For fire has gone out from Heshbon[a], a flame from the city of Sihon; it has consumed Ar of Moab[b], the lords of the high places of the Arnon.
  footnotes:
