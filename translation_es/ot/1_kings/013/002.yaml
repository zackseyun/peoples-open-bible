    text: Or, 'at the word of the LORD' or 'according to the word of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he will slaughter on you.' The Hebrew verb is sacrificial in tone, which may intentionally underscore the desecration of the altar.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'bones of אדם'; here אדם is used generically, hence 'human bones.'
    reason: lexical_alternative
