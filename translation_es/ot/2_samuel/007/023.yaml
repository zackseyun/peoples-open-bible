revisions:
- from: ¿Y quién como tu pueblo, como Israel, la única nación en la tierra a quien Dios fue[a] para redimirla para sí como pueblo, para hacerse un nombre, y para hacer cosas grandes y temibles para tu tierra delante de tu pueblo, al cual redimiste para ti desde Egipto, desde las naciones y sus dioses[b]?
  to: ¿Y quién como tu pueblo, como Israel, la única nación en la tierra por quien Dios fue a redimir para sí como pueblo, para hacerse un nombre, y para hacer cosas grandes y temibles para tu tierra delante de tu pueblo, al cual redimiste para ti de Egipto, de las naciones y sus dioses[a]?
  rationale: Se hizo una reparación mínima para evitar un calco poco idiomático («Dios fue») y conservar a la vez la fuerza concreta del verbo hebreo con «Dios fue a redimir». Se ajustó «desde Egipto» a «de Egipto» por naturalidad española en contexto de liberación. Se eliminó la nota [a] original por innecesaria y se mantuvo solo la nota sobre la cláusula final difícil, en línea con el audit trail inglés.
