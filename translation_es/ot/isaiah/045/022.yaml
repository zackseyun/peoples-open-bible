translation:
  language: es
  text: Vuelvan a mí y sean salvados[a], todos los confines de la tierra; porque yo soy Dios, y no hay otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mírenme y sean salvados». El verbo hebreo puede significar volverse hacia alguien y, en este contexto, también puede incluir la idea de dirigir la mirada a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ
  english_pob_choice: Turn
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Vuelvan a mí
  - Diríjanse a mí
  - Vuélvanse hacia mí
  lexicon: HALOT
  rationale: El imperativo de פנה puede expresar volverse o dirigirse hacia alguien. En español, «vuélvanse a mí» comunica bien el movimiento de orientación sin sonar mecánico. «Diríjanse a mí» es posible, pero menos natural en este llamado profético.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona señala orientación hacia el hablante. «A mí» preserva la directividad del llamado en un español idiomático.
- source_word: וְהִוָּשְׁעוּ
  english_pob_choice: and be saved
  chosen_spanish: y sean salvados
  alternatives_spanish:
  - y sean librados
  - y alcancen salvación
  - y sean rescatados
  lexicon: HALOT
  rationale: El nifal imperativo expresa recibir salvación/liberación. «Sean salvados» mantiene el pasivo/receptivo del hebreo; «sean librados» también sería posible, pero «salvados» refleja mejor la elección de la POB inglesa.
- source_word: כָּל אַפְסֵי אָרֶץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todos los extremos de la tierra
  - las partes más remotas de la tierra
  - todos los rincones de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para las regiones más lejanas del mundo. «Confin es de la tierra» es natural y fiel; «extremos» es preciso, pero menos idiomático en español bíblico moderno.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base del llamamiento. «Porque» conserva con claridad la relación causal/explanatoria del hebreo.
- source_word: אֲנִי אֵל
  english_pob_choice: I am God
  chosen_spanish: yo soy Dios
  alternatives_spanish:
  - yo soy El
  - yo soy Dios solo
  - yo soy el Dios
  lexicon: HALOT
  rationale: Aquí אֵל funciona como apelativo común/título de divinidad, no como nombre propio. «Yo soy Dios» conserva la autoidentificación absoluta sin introducir una glosa innecesaria.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no existe otro
  - y no hay ninguno más
  - y no hay otro fuera de mí
  lexicon: HALOT
  rationale: El hebreo afirma exclusividad divina. «No hay otro» es la forma breve y natural en español, y conserva el peso monoteísta de la cláusula sin añadir explícitamente «deidades» o «fuera de mí».
theological_decisions:
- issue: Llamado universal a la salvación
  english_pob_reading: '''Turn to me and be saved... all the ends of the earth'' is rendered as a universal summons grounded in God''s unique deity.'
  chosen_spanish_reading: «Vuélvanse a mí y sean salvados, todos los confines de la tierra» mantiene el alcance universal del imperativo y el fundamento teológico del versículo.
  alternative_spanish_readings:
  - «Vuelvan a mí y sean salvos»
  - «Vuélvanse a mí para ser salvados»
  rationale: La forma plural mantiene el llamado dirigido a los habitantes de toda la tierra. «Sean salvados» conserva el matiz de recibir salvación, sin convertirlo en una autoacción humana.
  doctrine_reference: Affirmations; traducción de llamado/salvación
- issue: Exclusividad divina
  english_pob_reading: '''there is no other'' is treated as an absolute statement of God''s uniqueness.'
  chosen_spanish_reading: «y no hay otro» deja intacta la afirmación absoluta de unicidad divina.
  alternative_spanish_readings:
  - «y no hay nadie más»
  - «y no existe otro Dios»
  rationale: El hebreo no añade una repetición de «Dios» al final. La traducción española conserva esa sobriedad y el alcance exclusivo del enunciado.
  doctrine_reference: Monoteísmo bíblico; Affirmations
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de POB de mantener el llamado como ‘turn to me’ y la cláusula final como una afirmación absoluta de unicidad divina, sin añadir glosas doctrinales no presentes en el hebreo. No se detectan revisiones posteriores en el paquete de auditoría.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל según la convención del proyecto cuando el contexto es un título común y no un nombre propio.
  - Se usa «salvados» para preservar el valor pasivo/receptivo de וְהִוָּשְׁעוּ.
  - Se emplea «confines de la tierra» como equivalente natural de אַפְסֵי אָרֶץ.
  - Se conserva la singularidad de «no hay otro» sin ampliar el texto con adiciones inferenciales.
