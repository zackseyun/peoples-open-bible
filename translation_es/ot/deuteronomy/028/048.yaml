    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan al contenido documentado en el audit trail inglés. También se ajusta la cláusula final a ‘hasta que te haya destruido’ para preservar mejor la referencia al sujeto y reflejar con más claridad la estructura verbal del hebreo y la decisión teológica documentada.
