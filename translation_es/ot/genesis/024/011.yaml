revisions:
- from: E hizo que los camellos se arrodillaran fuera de la ciudad, junto al pozo de agua, a la hora de la tarde[a], a la hora en que salen las mujeres a sacar agua.
  to: E hizo que los camellos se echaran fuera de la ciudad, junto al pozo de agua, a la hora de la tarde, a la hora en que salen las mujeres[a] a sacar agua.
  rationale: Se corrigió el lugar del marcador de nota para que ancle la explicación del participio femenino plural en la frase correspondiente. También se ajustó 'se arrodillaran' a 'se echaran', que en español describe de manera más natural la acción de hacer bajar o recostar a los camellos, manteniendo el sentido causativo del hebreo en este contexto narrativo. No se requiere adjudicación adicional.
