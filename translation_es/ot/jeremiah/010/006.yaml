translation:
  language: es
  text: No hay nadie como tú[a], oh Yahvé; tú eres grande, y grande es tu nombre en fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH», el nombre divino; tradicionalmente se vierte «el SEÑOR», pero aquí se conserva como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֵין
  english_pob_choice: There is none
  chosen_spanish: No hay nadie
  alternatives_spanish:
  - No existe nadie
  - No hay ninguno
  lexicon: HALOT
  rationale: El hebreo usa una expresión existencial de inexistencia comparativa. En español, «No hay nadie» comunica con naturalidad que no existe nadie comparable, sin perder la fuerza absoluta del enunciado.
- source_word: כָּמוֹךָ
  english_pob_choice: like you
  chosen_spanish: como tú
  alternatives_spanish:
  - semejante a ti
  - comparable a ti
  lexicon: HALOT
  rationale: La comparación directa se mantiene de forma natural en español con «como tú», preservando el trato personal del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como nombre divino en el texto principal, en lugar de una sustitución por título.'
- source_word: גָּד֥וֹל אַתָּ֛ה
  english_pob_choice: you are great
  chosen_spanish: grande eres tú
  alternatives_spanish:
  - tú eres grande
  - eres grande
  lexicon: HALOT
  rationale: El predicado nominal puede conservarse en español con un orden marcado y natural en estilo poético. «Grande eres tú» refleja bien la solemnidad del hebreo.
- source_word: וְגָד֥וֹל שִׁמְךָ
  english_pob_choice: and your name is great
  chosen_spanish: y grande es tu nombre
  alternatives_spanish:
  - y tu nombre es grande
  - y grande tu nombre
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la cláusula anterior y el sustantivo «nombre», que en hebreo incluye fama, renombre y reputación.
- source_word: בִּגְבוּרָה
  english_pob_choice: in might
  chosen_spanish: en poder
  alternatives_spanish:
  - en fuerza
  - en might
  lexicon: HALOT
  rationale: «גבורה» puede expresar poder, valentía o fuerza efectiva. «En poder» es una equivalencia española clara y digna, adecuada al contexto de la grandeza del nombre divino.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión del POB en inglés preserva el nombre propio divino. En español, «Yahvé» es la forma establecida en este proyecto para mantener esa misma transparencia y evitar la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en la revisión más reciente: se conserva la estructura breve y paralela, el nombre divino se traduce de manera transparente y el cierre con בִּגְבוּרָה se mantiene como esfera/ámbito de poder sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene la segunda persona singular para todo el versículo, coherente con el hebreo.
  - «Nombre» conserva la dimensión de renombre/reputación implícita en שֵׁם.
  - No se introduce terminología eclesiástica adicional; el versículo queda en registro bíblico, claro y publicable.
