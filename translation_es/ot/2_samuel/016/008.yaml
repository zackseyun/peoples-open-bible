translation:
  language: es
  text: Yahvé ha traído sobre ti toda la sangre de la casa de Saúl[a], en cuyo lugar reinaste, y Yahvé ha entregado el reino en manos de Absalón, tu hijo. Y mira, estás en tu mal[b], porque eres un hombre de sangre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la sangre derramada de la casa de Saúl» o «toda la culpa de sangre de la casa de Saúl». El hebreo dice literalmente «todas las sangres de la casa de Saúl».
    reason: lexical_alternative
  - marker: b
    text: O «en tu calamidad». El término hebreo puede referirse tanto a mal moral como a desastre sobrevenido; aquí probablemente señala la ruina que ha caído sobre David.
    reason: lexical_alternative
  - marker: c
    text: O «un hombre de derramamiento de sangre» o «un hombre sanguinario». Es una expresión idiomática para alguien marcado por culpa de sangre o violencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  english_pob_choice: has brought upon you
  chosen_spanish: ha traído sobre ti
  alternatives_spanish:
  - ha devuelto sobre ti
  - ha hecho recaer sobre ti
  - ha traído de vuelta sobre ti
  lexicon: HALOT
  rationale: El hiphil de שוב puede expresar la idea de hacer volver o hacer recaer algo sobre alguien. En español, «ha traído sobre ti» conserva el movimiento judicial del hebreo sin forzar un giro poco natural.
- source_word: עָלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: «Sobre ti» mantiene la imagen de algo que cae o recae sobre David y conserva el peso acusatorio del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La norma del proyecto pide «Yahvé» para el Tetragrámaton. Se preserva el nombre divino propio, no una sustitución como «el SEÑOR».
- source_word: כָּל דְּמֵי בֵית שָׁאוּל
  english_pob_choice: all the blood of the house of Saul
  chosen_spanish: toda la sangre de la casa de Saúl
  alternatives_spanish:
  - todo el derramamiento de sangre de la casa de Saúl
  - toda la sangre derramada de la casa de Saúl
  - toda la sangre/culpa de sangre de la casa de Saúl
  lexicon: HALOT
  rationale: «דָּמִים» en plural puede implicar sangre derramada o culpa de sangre. «Toda la sangre de la casa de Saúl» sigue de cerca la forma hebrea y deja oír la tensión entre sangre literal, sangre derramada y culpa de sangre, que se explicita en la nota.
- source_word: אֲשֶׁר מָלַכְתָּ תַּחְתָּיו
  english_pob_choice: in whose place you reigned
  chosen_spanish: en cuyo lugar reinaste
  alternatives_spanish:
  - en lugar de quien reinaste
  - como rey en lugar de él
  - en su lugar reinaste
  lexicon: HALOT
  rationale: «תַּחְתָּיו» aquí significa «en su lugar» o «en vez de él». «En cuyo lugar reinaste» es natural en español y preserva la sucesión entre Saúl y David.
- source_word: וַיִּתֵּן ... אֶת־הַמְּלוּכָה בְּיַד
  english_pob_choice: has given the kingdom into the hand of
  chosen_spanish: ha entregado el reino en mano de
  alternatives_spanish:
  - ha puesto el reino en manos de
  - ha dado el reino en mano de
  - ha puesto el reino en la mano de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para transferir poder. «En mano de» reproduce bien la imagen semítica sin perder claridad en español.
- source_word: אַבְשָׁלוֹם בְּנֶךָ
  english_pob_choice: Absalom your son
  chosen_spanish: Absalón, tu hijo
  alternatives_spanish:
  - Absalón tu hijo
  - tu hijo Absalón
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con la relación filial explícita. La coma ayuda a la fluidez en español y conserva el valor appositivo.
- source_word: וְהִנְּךָ
  english_pob_choice: And behold
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y behold
  - Y observa
  lexicon: HALOT
  rationale: הנה funciona como partícula de atención. «Y mira» es contemporáneo y digno; evita un calco arcaizante innecesario, aunque se conserva la función de señalar la escena.
- source_word: בְּרָעָתֶךָ
  english_pob_choice: in your evil
  chosen_spanish: en tu mal
  alternatives_spanish:
  - en tu maldad
  - en tu calamidad
  - en tu desastre
  lexicon: HALOT
  rationale: Aquí se preserva la ambigüedad semántica de רעה entre mal moral y calamidad, tal como la POB inglesa dejó la tensión abierta en su revisión más reciente. «En tu mal» es breve y fiel; la nota explica la posible lectura de desastre.
- source_word: אִישׁ דָּמִים
  english_pob_choice: a man of bloodshed
  chosen_spanish: un hombre de sangre
  alternatives_spanish:
  - un hombre de derramamiento de sangre
  - un hombre sanguinario
  - un hombre de sangre derramada
  lexicon: HALOT
  rationale: La expresión idiomática hebrea describe a alguien marcado por sangre o violencia. «Un hombre de sangre» preserva la dureza del hebreo y la posible carga de culpabilidad, sin suavizarla con una paráfrasis.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la convención del proyecto: el nombre propio del pacto se translitera como «Yahvé». No se sustituye por un título litúrgico.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בְּרָעָתֶךָ
  english_pob_reading: in your evil
  chosen_spanish_reading: en tu mal
  alternative_spanish_readings:
  - en tu calamidad
  - en tu desgracia
  - en tu maldad
  rationale: El contexto inmediato puede referir tanto a culpa moral como a ruina sobrevenida. Se conserva esa tensión en el texto principal y se aclara en nota que la referencia probablemente es a la desgracia presente de David.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #3'
- issue: Caracterización de David como אִישׁ דָּמִים
  english_pob_reading: a man of bloodshed
  chosen_spanish_reading: un hombre de sangre
  alternative_spanish_readings:
  - un hombre de derramamiento de sangre
  - un hombre sanguinario
  rationale: La frase hebrea es una acusación idiomática de violencia o culpa de sangre. «Un hombre de sangre» conserva esa fuerza sin imponer una expansión interpretativa.
  doctrine_reference: HALOT / uso idiomático de אִישׁ דָּמִים
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «brought upon you», «behold» y «in your evil» para acercarse más al hebreo. La versión española sigue esa preferencia de cercanía lexical, pero mantiene una fluidez natural en español con «ha traído sobre ti», «Y mira» y «en tu mal», conservando en nota la ambigüedad de רעה.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «Saúl» y «Absalón» con acentuación española estándar.
  - Se mantiene el tono acusatorio del pasaje sin suavizar el idiomatismo hebreo.
  - Se evita «SEÑOR» para no ocultar el nombre divino en la superficie del texto.
  - Las notas dejan explícita la tensión entre sangre derramada, culpa de sangre y mal/calidad de desastre cuando el hebreo lo requiere.
