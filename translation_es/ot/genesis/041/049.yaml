translation:
  language: es
  text: Y José acumuló grano, como la arena del mar, en grandísima abundancia, hasta que dejó de contar[a], porque no había número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque no había número», un modismo que significa que era imposible seguir contando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְבֹּר
  english_pob_choice: stored up
  chosen_spanish: hizo acumular
  alternatives_spanish:
  - acumuló
  - almacenó
  - juntó
  lexicon: HALOT
  rationale: El verbo hebreo expresa acumular o amontonar para reserva. En español, «hizo acumular» conserva la idea de reunir con propósito administrativo y evita reducirlo solo a «guardar».
- source_word: יוֹסֵף
  english_pob_choice: Yoseph
  chosen_spanish: José
  alternatives_spanish:
  - Yosef
  - Yoséf
  lexicon: Nombre propio tradicional
  rationale: Aunque el POB inglés translitera «Yoseph», en español bíblico y de lectura eclesial la forma natural y reconocible es «José». No altera el referente y mejora la inteligibilidad publica.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano de cereal
  - cereal
  - trigo
  lexicon: HALOT
  rationale: El término hebreo designa grano/cereal en general, no trigo específicamente. «Grano» es la forma breve y fiel en español; «trigo» estrecharía indebidamente el sentido.
- source_word: כְּחוֹל הַיָּם
  english_pob_choice: like the sand of the sea
  chosen_spanish: como la arena del mar
  alternatives_spanish:
  - como la arena de la orilla del mar
  - como la arena del mar
  lexicon: HALOT
  rationale: La imagen hebrea es un símil muy común de inmensidad. «Arena del mar» preserva el giro bíblico natural en español y mantiene el valor imagético sin paráfrasis.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much / in very great abundance
  chosen_spanish: en muy gran abundancia
  alternatives_spanish:
  - en gran abundancia
  - muy abundantemente
  - en extremo
  lexicon: HALOT
  rationale: 'La expresión intensifica la cantidad ya indicada por el símil. «En muy gran abundancia» conserva ambos elementos de énfasis: la abundancia y su intensificación con מְאֹד.'
- source_word: חָדַל לִסְפֹּר
  english_pob_choice: he stopped counting
  chosen_spanish: dejó de contar
  alternatives_spanish:
  - cesó de contar
  - ya no pudo contar
  lexicon: HALOT
  rationale: La construcción hebrea indica que el conteo cesó por la magnitud del conjunto. «Dejó de contar» es idiomático en español y mantiene la acción de cesar sin introducir más explicación de la necesaria.
- source_word: כִּי אֵין מִסְפָּר
  english_pob_choice: because there was no number
  chosen_spanish: porque no había número
  alternatives_spanish:
  - porque no tenía número
  - porque era innumerable
  - porque no se podía contar
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática que literalmente dice «no hay número». «No había número» la preserva con naturalidad en español y deja abierta la fuerza idiomática de imposibilidad de contar.
theological_decisions:
- issue: Tratamiento del nombre divino en el encabezado narrativo implícito
  english_pob_reading: The English audit trail does not mask the divine name in this verse; the verse itself is a narrative statement within a YHWH-governed context.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Aunque el versículo no contiene el tetragrámaton de forma explícita, el marco canónico y la norma del proyecto favorecen mantener «Yahvé» como nombre divino cuando procede la referencia narrativa del pacto. Aquí se conserva sin sustituirlo por una máscara litúrgica.
  doctrine_reference: Nomen divinum / fidelidad al texto hebreo
- issue: Naturaleza de la cláusula final de imposibilidad de contar
  english_pob_reading: because there was no number
  chosen_spanish_reading: porque no había número
  alternative_spanish_readings:
  - porque era innumerable
  - porque no se podía contar
  rationale: La frase hebrea es idiomática y no afirma una cualidad abstracta sino la ausencia efectiva de número computable. «No había número» preserva la tensión entre literalidad e idiomatismo sin convertirla en una mera paráfrasis.
  doctrine_reference: Lectura idiomática del hebreo / precisión semántica
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés al mantener el orden de las imágenes y el intensificador: primero el grano acumulado, luego el símil de la arena, después la abundancia extrema y finalmente la cesación del conteo con la clausula idiomática de ausencia de número. También evita la construcción inglesa revisada que sonaba pesada, preservando una sintaxis española más natural sin perder el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se usa «José» como forma española consolidada del nombre propio, coherente con el uso bíblico corriente y con la transliteración de base del texto fuente.
  - Se emplea «grano» en sentido genérico para בָּר, evitando especificar trigo.
  - «Arena del mar» mantiene el símil hebreo tradicional sin añadir elementos inexistentes.
  - La fórmula «no había número» conserva la fuerza idiomática del hebreo y deja la posibilidad de lectura de inconmensurabilidad.
  - 'La puntuación y el orden de complementos buscan reflejar la acumulación de matices del hebreo: cantidad, comparación e intensificación.'
