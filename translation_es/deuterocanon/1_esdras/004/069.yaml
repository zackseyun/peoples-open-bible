revisions:
- from: Entonces el rey Darío se levantó y lo besó[a], y le escribió cartas para todos los administradores[b], los gobernantes locales, los generales y los sátrapas, para que lo enviaran en su camino, junto con todos los que estaban con él y subían a construir Jerusalén.
  to: Entonces el rey Darío se levantó y lo besó, y escribió cartas en favor de él a todos los administradores[a], los gobernantes locales, los generales y los sátrapas, para que lo encaminaran[b], junto con todos los que estaban con él y subían a construir Jerusalén.
  rationale: Se corrigió la colocación de la nota léxica para que explique el verbo correspondiente a προπέμψωσιν, no «lo besó». También se mejoró la naturalidad y precisión de «escribió cartas en favor de él a...» y se sustituyó «lo enviaran en su camino» por «lo encaminaran», que preserva mejor el sentido en español con apoyo de la nota.
