review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: quema total del carnero, identificación como holocausto, dedicación a Yahvé, fórmula de aceptación y categoría sacrificial final. Sin embargo, la nota [a] está anclada al lugar equivocado: la alternativa «harás subir en humo todo el carnero» corresponde al verbo וְהִקְטַרְתָּ, no a «sobre el altar». Además, para אִשֶּׁה el español del texto principal puede alinearse mejor con la decisión auditada del POB («food offering») sin perder naturalidad.'
  spanish_quality_summary: El español es claro y digno. «Y harás arder todo el carnero sobre el altar» y «un aroma agradable» son naturales. La expresión «una ofrenda que se quema» es comprensible, pero suena algo perifrástica y menos categorial que el hebreo; «una ofrenda de alimento» suena más formulística y enlaza mejor con el audit trail. También conviene corregir la colocación de la nota para evitar confusión del lector.
  glossary_alignment: 'Se mantiene correctamente «Yahvé» para יהוה y «holocausto» para עֹלָה. «Carnero», «altar» y «aroma agradable» están bien alineados. La principal desviación está en אִשֶּׁה: el inglés auditado eligió «food offering», y el español puede preservarlo mejor como «ofrenda de alimento», dejando «ofrenda hecha por fuego» como alternativa en nota.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre «altar», pero explica el verbo sacrificial וְהִקְטַרְתָּ.
    rationale: El anclaje actual induce a pensar que la alternativa afecta a הַמִּזְבֵּחָה en vez de al verbo principal. Debe marcarse junto a «harás arder» o la cláusula verbal.
  - severity: medium
    issue: «Una ofrenda que se quema» no preserva tan bien la decisión léxica auditada para אִשֶּׁה.
    rationale: Aunque es defendible, la auditoría inglesa prefirió «food offering» por su fuerza categorial. «Ofrenda de alimento» mantiene mejor la relación con la decisión documentada y evita una perífrasis menos precisa.
  - severity: low
    issue: Las notas del English POB parecen estar invertidas respecto de sus razones léxicas, y el español heredó parcialmente esa confusión.
    rationale: 'Sin necesidad de adjudicación mayor, la revisión debe producir notas internamente coherentes en español: una para el verbo sacrificial y otra para אִשֶּׁה.'
  revised_spanish_text: Y harás arder[a] todo el carnero sobre el altar. Es un holocausto para Yahvé, un aroma agradable, una ofrenda de alimento[b] para Yahvé.
