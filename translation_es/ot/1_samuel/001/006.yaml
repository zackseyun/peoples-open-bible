revisions:
- from: Y su rival la irritaba[a] amargamente, para irritarla, porque Yahvé había cerrado su vientre.
  to: Y su rival la provocaba[a] amargamente, para irritarla, porque Yahvé había cerrado su vientre.
  rationale: Se cambia 'la irritaba' por 'la provocaba' para preservar la distinción entre el primer verbo hebreo (provocar/vexar) y el segundo (irritar/perturbar), siguiendo mejor la justificación léxica documentada y mejorando la fluidez del español sin alterar el sentido.
