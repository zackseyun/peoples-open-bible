translation:
  text: |-
    1 And there again I saw a vision like the former one, after we had remained there seventy days. 2 And I saw seven men in white clothing, saying to me, “Rise, put on the robe of the priesthood, and the crown of righteousness, and the oracle of understanding, and the full-length robe of truth, and the plate of faith, and the turban of the head, and the ephod of prophecy.” 3 And each one of them was carrying these things, and they put them on me and said to me, “From now on, become a priest—you and all your seed.”
    
    4 And the first anointed me with holy oil and gave me a priestly staff. 5 And the second washed me with pure water of the Lord, and fed me holy bread and wine, and put around me a holy and glorious robe. 6 And the third put on me a linen garment, like an ephod. 7 And the fourth wrapped around me a girdle, like purple. 8 And the fifth gave me a branch of rich olive. 9 And the sixth placed a crown on my head. 10 And the seventh put on me a diadem of priesthood and filled my hands with incense, so that I might serve as priest before the Lord God.
    
    11 And they say to me, “Levi, your seed will be divided into three offices, for a sign of the glory of the Lord who is coming. 12 And the first lot will be great; none will arise greater than it. 13 And the second will be in priesthood. 14 And the third will be called by a new name, because a king will arise from Judah and will establish a new priesthood, after the pattern of the nations, for all the nations. 15 And his presence is beloved, like a prophet of the Most High, from the seed of Abraham our father. 16 Therefore every desirable thing in Israel will be for you and for your seed, and your seed will eat every beautiful thing, and will apportion the table of the Lord. 17 And from among them there will be priests and judges and scribes, and by their mouth the holy thing will be received.”
    
    18 So when I awoke, I understood that this was like the first vision.
