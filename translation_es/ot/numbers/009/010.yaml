translation:
  language: es
  text: 'Habla a los hijos de Israel[a], diciendo: «Si alguien[b] está impuro por causa de un cadáver[c], o está en un viaje lejano, ya sea entre ustedes o durante sus generaciones[d], celebrará la Pascua para Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel»; la expresión se refiere a la comunidad israelita en su conjunto.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit. «si un hombre». El hebreo usa una forma masculina singular con valor distributivo: se refiere a cualquier individuo en el caso planteado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «impuro por un muerto». El hebreo dice literalmente algo como «impuro por una persona/alma»; en este contexto legal se refiere a impureza causada por un cadáver.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «por todas sus generaciones». La frase hebrea extiende la norma a las generaciones posteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige estas palabras a
  lexicon: HALOT
  rationale: El imperativo introduce una instrucción divina dirigida a Moisés. «Habla» conserva el tono directo y formal sin volverse artificial en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva el valor literal de la expresión hebrea. En español «hijos de Israel» es claro y mantiene la marca masculina/representativa del original, sin borrar el alcance comunitario.
- source_word: אִישׁ אִישׁ
  english_pob_choice: If any man
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si un hombre
  - Si cualquiera
  lexicon: HALOT
  rationale: La repetición tiene valor distributivo e individualizador. «Si alguien» comunica bien la idea de caso individual en español, aunque la referencia gramatical masculina del hebreo queda explicada en nota.
- source_word: טָמֵא לָנֶפֶשׁ
  english_pob_choice: unclean because of a dead body
  chosen_spanish: está impuro por causa de un cadáver
  alternatives_spanish:
  - está impuro por causa de un muerto
  - está impuro por un cadáver
  - está impuro a causa de una persona muerta
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ apunta idiomáticamente a un muerto/cadáver que produce impureza ritual. «Por causa de un cadáver» evita calco duro y preserva el sentido ritual preciso.
- source_word: בְדֶרֶךְ רְחֹקָה
  english_pob_choice: on a distant journey
  chosen_spanish: en un camino lejano
  alternatives_spanish:
  - en un viaje lejano
  - a gran distancia
  - en un camino distante
  lexicon: HALOT
  rationale: El hebreo usa literalmente «en un camino lejano». Se mantiene la imagen espacial del texto, sin forzar «viaje» si el original habla de la condición de estar lejos del lugar debido.
- source_word: לָכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - para ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: Aquí el complemento delimita el ámbito comunitario de la norma. «Entre ustedes» expresa bien la pertenencia al grupo presente en español contemporáneo.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: a través de sus generaciones
  alternatives_spanish:
  - por todas sus generaciones
  - a lo largo de sus generaciones
  - durante sus generaciones
  lexicon: HALOT
  rationale: La expresión extiende la disposición a la posteridad. «A través de sus generaciones» conserva la imagen de continuidad intergeneracional y evita suavizar demasiado la formulación hebrea.
- source_word: וְעָשָׂה פֶסַח
  english_pob_choice: he shall keep the Passover
  chosen_spanish: celebrará la Pascua
  alternatives_spanish:
  - hará la Pascua
  - guardará la Pascua
  - observará la Pascua
  lexicon: HALOT
  rationale: עָשָׂה con פֶסַח es una locución ritual. En español, «celebrará la Pascua» es natural y fiel al acto litúrgico exigido; se evita «hará» por sonar demasiado literal.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé» en el texto principal. La preposición «para» refleja la dirección/consagración del rito al Señor de Israel.'
theological_decisions:
- issue: Representación de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El paquete de proyecto fija «Yahvé» como forma principal para el Nombre divino. Se evita la convención de máscara litúrgica «SEÑOR» para preservar la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Alcance corporativo con formas masculinas
  english_pob_reading: the sons of Israel / any man
  chosen_spanish_reading: los hijos de Israel / Si alguien
  alternative_spanish_readings:
  - los israelitas / cualquiera
  - los hombres de Israel / si un hombre
  rationale: El hebreo usa formas masculinas con valor representativo y legal. Se conserva «los hijos de Israel» en la apertura, mientras que «Si alguien» resuelve el caso distributivo con naturalidad, sin perder la base masculina del original, que queda documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del auditorio inglés: se mantuvo el valor legal de לָנֶפֶשׁ como impureza por cadáver, se respetó el alcance temporal de לְדֹרֹתֵיכֶם con una fórmula idiomática de continuidad generacional, y se omitió cualquier añadido como «todavía» que no está explícito en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto.
  - Se conserva el tono legal-instruccional con imperativos y futuro modal.
  - La palabra «Pascua» se usa como término establecido y transparente en español bíblico.
  - No se tradujo mecánicamente «דרך» como «camino» sin contexto; aquí se eligió una forma literal moderada por fidelidad al hebreo.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
