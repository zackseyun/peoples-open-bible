translation:
  language: es
  text: No te harás una imagen tallada[a], ni ninguna semejanza[b] de lo que está en los cielos arriba, ni de lo que está en la tierra abajo, ni de lo que está en las aguas debajo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ídolo” por “imagen tallada”; el hebreo suele referirse a una imagen usada en idolatría, pero aquí se conserva la expresión más concreta.
    reason: lexical_alternative
  - marker: b
    text: O “cualquier forma” por “ninguna semejanza”.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶסֶל
  english_pob_choice: a carved image
  chosen_spanish: imagen tallada
  alternatives_spanish:
  - ídolo
  - imagen esculpida
  - imagen grabada
  lexicon: HALOT
  rationale: פֶסֶל nombra una imagen hecha por tallado o labrado; “imagen tallada” conserva la concreción material sin convertir de inmediato el término en una interpretación cultual más amplia como “ídolo”.
- source_word: תְּמוּנָה
  english_pob_choice: likeness
  chosen_spanish: semejanza
  alternatives_spanish:
  - forma
  - representación
  - imagen
  lexicon: HALOT
  rationale: תְּמוּנָה refiere a una forma o semejanza. “Semejanza” mantiene el alcance amplio del sustantivo y funciona bien en español bíblico actual.
- source_word: לֹא תַעֲשֶׂה לְךָ
  english_pob_choice: You shall not make for yourself
  chosen_spanish: No te harás
  alternatives_spanish:
  - No harás para ti
  - No debes hacerte
  - No te fabricarás
  lexicon: HALOT
  rationale: La prohibición se expresa naturalmente en español con futuro negativo. “Te” conserva לְךָ como acción dirigida o apropiada para uno mismo, no solo fabricación abstracta.
- source_word: כָּל תְּמוּנָה
  english_pob_choice: any likeness
  chosen_spanish: ninguna semejanza
  alternatives_spanish:
  - cualquier semejanza
  - toda semejanza
  - ninguna forma
  lexicon: HALOT
  rationale: Aunque כָּל es literalmente “todo”, en una prohibición negativa el español fluye mejor con “ninguna”, que expresa la amplitud total de la exclusión.
- source_word: אֲשֶׁר בַּשָּׁמַיִם מִמַּעַל
  english_pob_choice: of what is in the heavens above
  chosen_spanish: de lo que está en los cielos arriba
  alternatives_spanish:
  - de lo que hay en los cielos arriba
  - de lo que está en el cielo arriba
  lexicon: HALOT
  rationale: Se mantiene la referencia al plural hebreo שָׁמַיִם con “cielos”. “Lo que está” evita forzar la frase a seres personales o a cosas solamente.
- source_word: בָּאָרֶץ מִתָּחַת
  english_pob_choice: on the earth beneath
  chosen_spanish: en la tierra abajo
  alternatives_spanish:
  - sobre la tierra debajo
  - en la tierra debajo
  lexicon: HALOT
  rationale: El hebreo contrasta verticalmente los ámbitos cosmológicos. “En la tierra abajo” es claro y conserva el paralelismo con “arriba” sin sobrecargar la frase.
- source_word: בַּמַּיִם מִתַּחַת לָאָרֶץ
  english_pob_choice: in the waters under the earth
  chosen_spanish: en las aguas debajo de la tierra
  alternatives_spanish:
  - en las aguas bajo la tierra
  - en las aguas debajo del suelo
  lexicon: HALOT
  rationale: Se conserva la imaginería cosmológica del texto hebreo con una formulación directa y natural en español.
theological_decisions:
- issue: Alcance de la prohibición de imágenes
  english_pob_reading: Render the verse as a prohibition against making carved images or likenesses, without adding explanatory language about worship that belongs explicitly to the following verse.
  chosen_spanish_reading: El versículo prohíbe hacer una imagen tallada o cualquier semejanza, sin añadir en esta línea la mención explícita de adoración o servicio.
  alternative_spanish_readings:
  - Prohibición general de ídolos para adoración
  - Prohibición de toda representación religiosa
  rationale: El hebreo del v. 8 prohíbe hacer la imagen; el v. 9 agrega inclinarse o servirles. Mantener la restricción textual evita introducir una explicación no dicha aquí y respeta la progresión del pasaje.
  doctrine_reference: Deuteronomio 5:8–9; principios de progresión textual
translation_notes:
  revision_awareness: El borrador sigue de cerca la formulación aprobada en inglés y no requiere revisión adicional según el informe de concordancia alta y el pasaje revisado sin cambios.
  spanish_consistency_notes:
  - Se mantiene “cielos” para reflejar el plural hebreo שָׁמַיִם.
  - Se evita “SEÑOR” porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - 'Se conserva el orden acumulativo del hebreo: imagen tallada / semejanza / cielos / tierra / aguas.'
  - El tono es normativo y sobrio, apto para lectura pública e iglesia amplia.
