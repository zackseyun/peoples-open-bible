lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_korean: 의로운
  alternatives_korean:
  - 옳은
  - 공의로운
  lexicon: BDAG
  rationale: 요셉의 의로움은 단순한 도덕적 옳음이 아니라 율법에 충실하면서도 자비를 택한 무게를 갖는다. 한국어 「의로운」이 이 결을 가장 잘 살린다.
- source_word: δειγματίσαι
  english_pob_choice: expose her to public disgrace
  chosen_korean: 공개적으로 망신 주고
