  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La nota que preserva «amor maternal» como alternativa contextual está bien. La decisión clave es léxica y estilística: preferir «compasión» sobre «simpatía» para συμπάθειαν en este contexto.'
