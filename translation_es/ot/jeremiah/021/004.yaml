  to: 'Así dice Yahvé, Dios de Israel: He aquí, yo hago volver atrás las armas de guerra que están en sus manos, con las cuales ustedes combaten contra el rey de Babilonia y contra los caldeos que los sitian fuera de la muralla; y las reuniré[a] en medio de esta ciudad.'
