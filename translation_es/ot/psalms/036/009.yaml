translation:
  language: es
  text: Se sacian[a] de la riqueza de tu casa, y les das a beber del río de tus delicias[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Beben hasta saciarse de la abundancia de tu casa».'
    reason: lexical_alternative
  - marker: b
    text: «Tus delicias» también puede traducirse «tus placeres»; el hebreo quizá también evoca Edén.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְוְיוּן
  english_pob_choice: They are filled
  chosen_spanish: Se sacian
  alternatives_spanish:
  - Se llenan
  - Beben hasta saciarse
  - Quedan satisfechos
  lexicon: HALOT
  rationale: El hebreo comunica el resultado de quedar plenamente satisfechos. «Se sacian» conserva la idea de plenitud sin sonar tan mecánico como una pasiva literal en español.
- source_word: מִדֶּשֶׁן
  english_pob_choice: from the richness
  chosen_spanish: de la riqueza
  alternatives_spanish:
  - de la abundancia
  - de la gordura
  - de la riqueza abundante
  lexicon: HALOT
  rationale: דֶּשֶׁן expresa riqueza, abundancia y exuberancia. «Riqueza» mantiene la metáfora en español moderno y evita «gordura», que sería demasiado áspero o confuso.
- source_word: בֵּיתֶךָ
  english_pob_choice: of your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu casa
  - de tu morada
  - de tu templo
  lexicon: HALOT
  rationale: «Casa» sigue de cerca el sustantivo hebreo y preserva la imagen poética sin decidir indebidamente si se trata del templo o del lugar de morada divina.
- source_word: וְנַחַל
  english_pob_choice: and ... from the river
  chosen_spanish: del río
  alternatives_spanish:
  - del arroyo
  - del torrente
  - de la corriente
  lexicon: HALOT
  rationale: En este contexto poético de abundancia, «río» transmite mejor la fuerza de flujo vivificante que «arroyo» o «torrente».
- source_word: עֲדָנֶיךָ
  english_pob_choice: your delights
  chosen_spanish: tus delicias
  alternatives_spanish:
  - tus placeres
  - tus deleites
  - las delicias tuyas
  lexicon: HALOT
  rationale: «Delicias» conserva el campo semántico de deleite/placer y permite oír, aunque sin imponerlo, el posible eco de Edén señalado por el audit trail en inglés.
- source_word: תַשְׁקֵם
  english_pob_choice: you give them drink
  chosen_spanish: les das a beber
  alternatives_spanish:
  - los haces beber
  - les haces beber
  - los riegas
  lexicon: HALOT
  rationale: El hifil de שׁקה expresa causar que beban. «Les das a beber» es natural en español y mantiene la agencia divina de forma clara.
theological_decisions:
- issue: La imagen de la 'casa' de Dios
  english_pob_reading: Retain 'your house' without specifying temple or heavenly dwelling
  chosen_spanish_reading: Conservar «tu casa» sin precisar templo ni morada celestial
  alternative_spanish_readings:
  - tu templo
  - tu morada
  - tu casa celestial
  rationale: El hebreo poético no obliga a una identificación institucional única; mantener «tu casa» preserva la tensión literaria y teológica sobre la cercanía y provisión de Dios.
  doctrine_reference: Preservar la ambigüedad poética y no resolverla indebidamente.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportaron cambios y el consenso fue alto, con solo observaciones menores. Mantengo la decisión de traducir el versículo con equivalencia óptima y sin resolver la imagen poética de la casa de Dios.'
  spanish_consistency_notes:
  - Conservo «Yahvé» no requerido aquí porque el versículo usa sufijos posesivos, no el nombre divino explícito.
  - Uso un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Mantengo la distinción entre abundancia material/metafórica («riqueza») y la acción de saciar/beber para reflejar las dos cláusulas del hebreo.
