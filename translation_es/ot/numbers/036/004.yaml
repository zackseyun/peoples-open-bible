revisions:
- from: Y si hubiera el jubileo para los hijos de Israel, se añadiría su herencia a la herencia de la tribu a la que pertenezcan, y su herencia se quitaría de la herencia de la tribu de nuestros padres.
  to: Y cuando llegue el jubileo para los hijos de Israel, su herencia se añadirá a la herencia de la tribu a la que pertenezcan, y su herencia se quitará de la herencia de la tribu de nuestros padres.
  rationale: Se ajusta la apertura para reflejar mejor la eventualidad legal anticipada del hebreo en contexto ('cuando llegue el jubileo') y se reemplazan formulaciones poco naturales o menos directas ('hubiera', condicionales) por español más claro y fiel al sentido jurídico del pasaje, sin cambiar el contenido semántico principal.
