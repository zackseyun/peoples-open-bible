translation:
  language: es
  text: Se golpean el pecho en duelo[a], por los campos agradables, por la vid fructífera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lamentando por los pechos»; el hebreo es muy condensado, y muchos lo entienden como un modismo que alude a golpearse el pecho en dolor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁדַיִם
  english_pob_choice: their breasts
  chosen_spanish: sus pechos
  alternatives_spanish:
  - los pechos
  - sus senos
  lexicon: HALOT
  rationale: El hebreo nombra literalmente los pechos; en este contexto de lamento, el español natural también puede conservar la imagen corporal sin explicitar más de lo que el texto da. 'Sus pechos' mantiene la referencia y permite la lectura idiomática de golpearse el pecho en duelo.
- source_word: סֹפְדִים
  english_pob_choice: beat their breasts in mourning
  chosen_spanish: Golpean ... en duelo
  alternatives_spanish:
  - se lamentan
  - hacen duelo
  - lloran
  lexicon: HALOT
  rationale: El participio comunica acción de lamentar/duelo. Como el hebreo es comprimido y el contexto sugiere el gesto de golpearse el pecho, 'Golpean ... en duelo' deja la acción implícita y conserva el valor gestual sin sobreparafrasear.
- source_word: שְׂדֵי חֶמֶד
  english_pob_choice: the delightful fields
  chosen_spanish: los campos deleitosos
  alternatives_spanish:
  - los campos agradables
  - los campos deseables
  lexicon: HALOT
  rationale: חֶמֶד expresa deleite, agrado o lo deseable. 'Deleitosos' es un equivalente digno y natural en español bíblico moderno, y 'campos' comunica bien la idea de tierras cultivadas o de labranza.
- source_word: גֶּפֶן פֹּרִיָּה
  english_pob_choice: the fruitful vine
  chosen_spanish: la vid fructífera
  alternatives_spanish:
  - la vid fecunda
  - la vid que da fruto
  lexicon: HALOT
  rationale: גֶּפֶן es 'vid', y פֹּרִיָּה significa fructífera/fértil. 'Vid fructífera' conserva la metáfora agrícola de forma clara y fiel, con un registro adecuado para publicación.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - a causa de
  lexicon: HALOT
  rationale: La repetición de עַל introduce el objeto de lamentación. En español, 'por' es la preposición más natural para indicar causa u ocasión de duelo, y su repetición mantiene el paralelismo del hebreo.
translation_notes:
  revision_awareness: El inglés POB pasó de un gerundio inicial a una indicación en presente para reflejar mejor el participio hebreo. En español se optó por el presente 'Golpean' para mantener esa vivacidad aspectual. También se conservó la compresión hebrea mediante una construcción breve y una nota que reconoce la posible lectura idiomática.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Campos'' traduce bien שְׂדֵי en este contexto poético; no se eligió ''tierras'' para no perder la imagen agrícola.'
  - '''Vid fructífera'' preserva la metáfora sin añadir explicaciones ajenas al verso.'
  - La puntuación reproduce la estructura enumerativa del hebreo con paralelismo preposicional.
