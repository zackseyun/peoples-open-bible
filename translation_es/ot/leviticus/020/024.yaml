translation:
  language: es
  text: 'Pero yo les dije: «Ustedes poseerán[a] su tierra, y yo mismo se la daré para poseerla: una tierra que mana[b] leche y miel. Yo soy Yahvé[c], su Dios, que los he separado[d] de los pueblos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «heredarán su tierra ... para heredarla». El verbo hebreo יָרַשׁ puede abarcar tanto heredar como tomar posesión.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «una tierra que mana leche y miel», un modismo de abundancia y fertilidad.'
    reason: cultural_note
  - marker: c
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
  - marker: d
    text: 'O: «que los ha apartado de los pueblos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: But I said
  chosen_spanish: Pero yo les dije
  alternatives_spanish:
  - Y les dije
  - Y yo dije
  lexicon: HALOT
  rationale: La forma waw-consecutiva de אמר avanza el discurso; en español, «Pero» conserva el contraste implícito con el contexto de mandatos y distinciones, y el pronombre explícito «yo» refleja el énfasis del hebreo.
- source_word: לָכֶם / אַתֶּם
  english_pob_choice: to you / you
  chosen_spanish: les / ustedes
  alternatives_spanish:
  - a ustedes / ustedes
  - a vosotros / vosotros
  lexicon: HALOT
  rationale: El hebreo marca destinatario plural con énfasis. «Les» y «ustedes» son naturales en español moderno y sostienen el plural explícito sin arcaísmo.
- source_word: תִּירְשׁוּ
  english_pob_choice: you shall possess
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: ירשׁ puede expresar tanto heredar como tomar posesión. Aquí «heredarán» conserva esa amplitud y permite enlazar bien con el paralelo infinitivo de finalidad; se mantiene en nota la alternativa de posesión.
- source_word: אַדְמָתָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su suelo
  lexicon: HALOT
  rationale: En contexto territorial, אדמה funciona como tierra/territorio. «Su tierra» es la forma española más natural y fiel al sentido de posesión territorial.
- source_word: וַאֲנִי
  english_pob_choice: and I myself
  chosen_spanish: y yo mismo
  alternatives_spanish:
  - pero yo
  - y yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «yo mismo» lo reproduce de manera directa y idiomática.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: will give it
  chosen_spanish: se la daré
  alternatives_spanish:
  - la daré
  - la entregaré
  lexicon: HALOT
  rationale: נתן con sufijo pronominal expresa la entrega divina de la tierra. «Se la daré» mantiene naturalidad en español y conserva el objeto directo e indirecto implícitos.
- source_word: לָרֶשֶׁת אֹתָהּ
  english_pob_choice: to possess it
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  lexicon: HALOT
  rationale: El infinitivo de ירשׁ expresa finalidad; «para poseerla» sigue de cerca la elección inglesa y mantiene el paralelismo verbal con el primer miembro.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra de abundancia y fertilidad
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo. «Que fluye leche y miel» reproduce la imagen tradicional de abundancia y fertilidad sin explicitarla en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino. «Yahvé» preserva el nombre propio del pacto sin sustitución por título.'
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «Dios de ustedes». «Su Dios» es la forma más fluida en español y mantiene la relación de pacto implícita.
- source_word: הִבְדַּלְתִּי
  english_pob_choice: has separated
  chosen_spanish: he separado
  alternatives_spanish:
  - he apartado
  - he distinguido
  lexicon: HALOT
  rationale: בדל denota separar/distanciar o poner aparte. «He separado» es directo y conserva la tensión teológica de una distinción divina sin ampliar el término.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: עמים se refiere de manera amplia a grupos humanos. «Los pueblos» es literal y evita introducir una tonalidad política ajena al hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La lectura española sigue la política del proyecto de preservar el nombre divino en transliteración, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / transliteración del nombre divino'
- issue: Sentido de יָרַשׁ en contexto de la tierra prometida
  english_pob_reading: you shall possess ... to possess
  chosen_spanish_reading: heredarán ... para poseerla
  alternative_spanish_readings:
  - poseerán ... para poseerla
  - heredarán ... para heredarla
  rationale: El verbo puede abarcar heredar y tomar posesión. Mantener «heredarán» y «para poseerla» conserva ambas facetas sin borrar la tensión lexical documentada en la fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Separación de Israel de otros pueblos
  english_pob_reading: who has separated you from the peoples
  chosen_spanish_reading: que los he separado de los pueblos
  alternative_spanish_readings:
  - que los he apartado de los pueblos
  - que los he distinguido de los pueblos
  rationale: «Separado» sigue el paralelismo del hebreo בדל y preserva la idea de distinción/categoría sin convertirla en una explicación doctrinal más amplia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado de la POB en inglés: se evita una repetición innecesaria en el segundo miembro de finalidad y se conserva el paralelismo semántico entre la posesión prometida y la entrega divina. También se mantiene la traducción del nombre divino como Yahvé, conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el estándar español del proyecto.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Los pueblos» mantiene el plural amplio de עמים sin forzar «naciones».
  - «Heredarán» y «para poseerla» preservan la amplitud semántica de ירשׁ.
  - La construcción «yo mismo» refleja el pronombre enfático וַאֲנִי.
  - El modismo «una tierra que fluye leche y miel» se conserva sin explicitar su sentido en el texto principal.
