    text: O “ternera”, “vaquilla”. El hebreo עֶגְלָה designa una hembra bovina joven; se eligió “novilla” por corresponder mejor al sentido de “heifer” en este contexto legal y ritual.
    reason: lexical_alternative
  - marker: b
    text: O “a un wadi perenne”, “a un barranco con cauce duradero”. El hebreo נַחַל אֵיתָן probablemente se refiere a un cauce o arroyo de carácter permanente o duradero, no simplemente a un terreno escabroso.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la fidelidad léxica y la naturalidad del español: ''novilla'' representa mejor עגלה que ''ternera''; ''arroyo perenne'' ofrece una opción más legible que ''wadi'' en el texto principal, preservando la precisión mediante nota; y ''que no es labrado ni sembrado'' evita introducir un matiz aspectual no exigido por el hebreo.'
