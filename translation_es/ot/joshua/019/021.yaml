lexical_decisions:
- source_word: רֶמֶת
  english_pob_choice: Remeth
  chosen_spanish: Remet
  alternatives_spanish:
  - Remeth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista de fronteras/ciudades; se translitera en español para conservar su función toponímica. Se adapta la ortografía al uso español con una terminación más natural, sin traducir el significado.
- source_word: עֵין גַּנִּים
  english_pob_choice: En-gannim
  chosen_spanish: En-gannim
  alternatives_spanish:
  - Fuente de jardines
  - Manantial de jardines
  lexicon: HALOT
  rationale: Aquí funciona como topónimo establecido. Se mantiene la transliteración para no perder que el texto enumera nombres de poblaciones, no descripciones comunes; la nota aclara el posible sentido literal de los elementos hebreos.
- source_word: עֵין חַדָּה
  english_pob_choice: En-haddah
  chosen_spanish: En-hadá
  alternatives_spanish:
  - En-haddah
  - Fuente de Hadá
  - Manantial de agudeza
  lexicon: HALOT
  rationale: También es nombre de lugar y comienza con עֵין, por lo que se preserva la forma toponímica. La vocalización y el valor semántico del segundo elemento son inciertos; por eso se evita una traducción interpretativa y se ajusta la transliteración al español.
- source_word: בֵית פַּצֵּץ
  english_pob_choice: Beth-pazzez
  chosen_spanish: Bet-pazez
  alternatives_spanish:
  - Beth-pazzez
  - Casa de Pazez
  lexicon: HALOT
  rationale: Es un topónimo con בֵית ('casa de') como primer elemento, pero en la lista funciona como nombre propio. Se translitera en español y se adapta 'Beth' a 'Bet' para concordar con la ortografía habitual en español de nombres hebreos.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción simplemente coordina los nombres de la lista. En español la forma base 'y' es la más natural; no se usa 'e' porque los nombres que siguen no comienzan con sonido /i/.
translation_notes:
  revision_awareness: 'El texto inglés de referencia no requirió revisión según el registro más reciente (''unchanged: true''). La versión española conserva esa decisión: translitera los topónimos como nombres propios y solo adapta la ortografía a un español legible.'
  spanish_consistency_notes:
  - Se mantiene la práctica POB de transliterar nombres geográficos hebreos cuando funcionan como topónimos en listas de ciudades.
  - Se usa 'Bet-' en lugar de 'Beth-' para una ortografía española más fluida, sin alterar la identificación del nombre.
  - Se conserva la puntuación de lista breve con coma y 'y' final, acorde con el patrón del versículo.
