translation:
  language: es
  text: Yahvé te herirá con enfermedad consumidora[a], con fiebre, con inflamación, con calor abrasador, con la espada, con tizón y con añublo; y te perseguirán hasta que perezcas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consunción» para la idea de «enfermedad consumidora»; el hebreo denota una dolencia debilitante que va consumiendo a la persona.
    reason: lexical_alternative
  - marker: b
    text: O «y estas te perseguirán»; el verbo hebreo está en plural y se refiere a las calamidades enumeradas antes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה
  english_pob_choice: will strike you
  chosen_spanish: te herirá
  alternatives_spanish:
  - te golpeará
  - te herirá con violencia
  lexicon: HALOT
  rationale: El hiphil de נכה expresa herir/golpear con fuerza punitiva. «Herirá» conserva el acto de castigo directo y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español del proyecto, la forma establecida es «Yahvé», que preserva el nombre divino en vez de sustituirlo.
- source_word: שַׁחֶפֶת
  english_pob_choice: wasting disease
  chosen_spanish: enfermedad consumidora
  alternatives_spanish:
  - consunción
  - consumo
  - enfermedad de desgaste
  lexicon: HALOT
  rationale: El término denota una dolencia debilitante y consumidora. «Enfermedad consumidora» comunica ese desgaste sin precisar indebidamente una patología moderna.
- source_word: קַּדַּחַת
  english_pob_choice: fever
  chosen_spanish: fiebre
  alternatives_spanish:
  - fiebre ardiente
  lexicon: HALOT
  rationale: Es la equivalencia más natural y clara para la enfermedad febril mencionada en la serie.
- source_word: דַּלֶּקֶת
  english_pob_choice: inflammation
  chosen_spanish: inflamación
  alternatives_spanish:
  - infección inflamatoria
  - ardor inflamatorio
  lexicon: HALOT
  rationale: La raíz remite a inflamación o ardor interno. «Inflamación» distingue bien este término del de fiebre y del de ardor.
- source_word: חַרְחֻר
  english_pob_choice: burning heat
  chosen_spanish: ardor
  alternatives_spanish:
  - calor abrasador
  - quemazón
  lexicon: HALOT
  rationale: Es un término raro relacionado con calor quemante o febril. «Ardor» mantiene la idea de calor intenso sin sobrecargar la frase con redundancia.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - espada
  lexicon: HALOT
  rationale: La forma con artículo en español refleja el hebreo y conserva la referencia bélica literal.
- source_word: שִׁדָּפֹון
  english_pob_choice: blight
  chosen_spanish: tizón
  alternatives_spanish:
  - blight
  - plaga de tizón
  - quemazón de los cultivos
  lexicon: HALOT
  rationale: En contexto agrícola, el término alude a una destrucción por sequedad o quemadura de las cosechas. «Tizón» es un equivalente agrícola tradicional y comprensible; la serie ya incluye «añublo» para el otro daño vegetal.
- source_word: יֵרָקוֹן
  english_pob_choice: mildew
  chosen_spanish: añublo
  alternatives_spanish:
  - mildiu
  - decoloración
  - palidez
  lexicon: HALOT
  rationale: El término designa una afección vegetal asociada con palidez/amarilleamiento. «Añublo» funciona en español bíblico y agrícola como el complemento natural de «tizón».
- source_word: וּרְדָפוּךָ
  english_pob_choice: and they will pursue you
  chosen_spanish: y te perseguirán
  alternatives_spanish:
  - y te perseguirán estas cosas
  - y te perseguirán ellas
  lexicon: HALOT
  rationale: El verbo está en plural y se refiere colectivamente a las calamidades precedentes. «Te perseguirán» conserva ese plural, aunque el sujeto quede implícito en español como ocurre en el hebreo.
- source_word: עַד אָבְדֶךָ
  english_pob_choice: until you perish
  chosen_spanish: hasta que perezcas
  alternatives_spanish:
  - hasta que seas destruido
  - hasta tu ruina
  lexicon: HALOT
  rationale: El verbo expresa llegar a la ruina o morir. «Perezcas» mantiene la segunda persona y la fuerza personal del cierre.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: Se preserva el nombre propio del pacto, conforme a la práctica del proyecto para el Tetragrámaton, en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustanciales respecto del audit trail inglés; se mantuvo la pluralidad de וּרְדָפוּךָ y el valor general de la serie de aflicciones, con ajustes de idiomaticidad española.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para el Tetragrámaton en todo el proyecto.
  - 'Se conserva la serie de males con términos diferenciados y de registro bíblico comprensible: enfermedad consumidora, fiebre, inflamación, ardor, espada, tizón y añublo.'
  - Se eligió una sintaxis directa y de tono solemne, sin suavizar el carácter punitivo del verso.
