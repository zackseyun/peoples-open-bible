lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca temporal discursiva que enlaza con el contexto anterior; «Entonces» conserva la secuencia narrativa con naturalidad en español.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  - les estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere un marco discursivo o repetición, pero en español bíblico fluido «les decía» mantiene el valor aspectual sin sonar forzado. Se omite el sujeto expreso porque el verbo español ya lo recupera por contexto.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural con el pronombre átono «les» en español.
- source_word: Ἐγερθήσεται
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - será levantada
  lexicon: BDAG
  rationale: En esta fórmula de conflicto, el futuro pasivo/medio de ἐγείρω se entiende idiomáticamente como «se levantará» o «surgirá». «Se levantará» conserva la imagen verbal y la idea de irrupción o alzamiento sin introducir una pasiva demasiado mecánica.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gentil
  lexicon: BDAG
  rationale: En este contexto geopolítico, ἔθνος designa una entidad colectiva/política. «Nación» encaja con el paralelismo con «reino» y con la fórmula de conflicto.
- source_word: ἐπ’ ἔθνος
  english_pob_choice: against nation
  chosen_spanish: contra nación
  alternatives_spanish:
  - sobre nación
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa oposición hostil en esta construcción. «Contra» reproduce de modo claro el valor adversativo en español.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio
  - realeza
  lexicon: BDAG
  rationale: Aquí βασιλεία alude a un reino o dominio político concreto. «Reino» preserva el paralelismo y la fuerza geopolítica del pasaje.
- source_word: ἐπὶ βασιλείαν
  english_pob_choice: against kingdom
  chosen_spanish: contra reino
  alternatives_spanish:
  - sobre reino
  lexicon: BDAG
  rationale: Como en la primera cláusula, ἐπί con acusativo es adversativo. «Contra reino» mantiene la repetición formularia y la claridad del conflicto.
theological_decisions:
- issue: Fórmula apocalíptica de conflicto
  english_pob_reading: Render the saying as a straightforward prediction of geopolitical upheaval without importing a specific end-times system.
  chosen_spanish_reading: Traducir la sentencia como anuncio directo de convulsión geopolítica, sin fijarla en un esquema escatológico particular.
  alternative_spanish_readings:
  - Interpretarla exclusivamente como la caída de Jerusalén
  - Convertirla en un cronograma detallado del fin
  rationale: El versículo, por sí mismo, describe un patrón general de enfrentamiento entre naciones y reinos. La traducción debe conservar esa amplitud y no resolver debates escatológicos que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El inglés POB mantiene «will rise» y anota como alternativa «will arise». La versión española conserva esa misma tensión léxica con «se levantará» y la nota «O «se levantarán»» para reflejar que el verbo puede oírse también como un plural impersonal o como una imagen de surgimiento, sin forzar la lectura.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefieren «nación» y «reino» para conservar el paralelismo político del griego.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - La nota al pie marca una alternativa verbal legítima en español, equivalente a la alternativa inglesa documentada.
