source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 de signis autem: ecce dies venient, et adprehendentur qui inhabitant super terram in excessu multo, et abscondetur veritatis via, et sterilis erit a fide regio.

    2 et multiplicabitur iniustitia super hanc quam ipse tu vides et super quam audisti olim.

    3 et erit inconposita vestigio quam nunc vides regnare regionem, et videbunt eam desertam.

    4 si autem tibi dederit Altissimus vivere, et videbis post tertiam turbatam, et relucescet subito sol noctu et luna interdie.

    5 et de ligno sanguis stillabit, et lapis dabit vocem suam; et populi commovebuntur, et gressus commutabuntur.

    6 et regnabit quem non sperant qui inhabitant super terram; et volatilia conmigrationem facient.

    7 nem facient. Et mare Sodomiticum pisces reiciet, et dabit uocem noctu, quam non nouerunt multi, omnes autem audient

    8 uocem eius. Et chaos fiet per loca multa, et ignis frequenter emittetur et bestiae agrestes transmigrabunt regionem suam,

    9 et mulieres parient menstruata monstra. Et in dulcibus aquis salsae inuenientur, et amici omnes semetipsos expugnabunt, et abscondetur tunc sensus, et intellectus separabitur in promptuarium suum, Et queretur a multis et non inuenietur, et

    10 et quaeretur a multis et non invenietur, et multiplicabitur iniustitia et incontinentia super terram.

    11 multiplicabitur iniustitia et incontinentia super terram. Et interrogabit regio proximam suam et dicet: numquid per te

    12 pertransiit iustitia, iustum faciens ? et haec negabit. Et erit in illo tempore, et sperabunt homines et non impetrabunt,

    13 laborabunt et non dirigentur uiae eorum. Haec signa dicere tibi permissum est mihi, et si oraueris iterum et ploraueris sicut et nunc et ieiunaueris septem diebus, audies iterato horum maiora.

    14 Et euigilaui, et corpus meum horruit ualde, et anima mea

    15 laborauit, ut deficeret. Et tenuit me qui uenit angelus, qui loquebatur in me, et confortauit me et statuit me super pedes.

    16 Et factum est in nocte secunda et uenit ad me Phalthiel dux populi et dixit mihi: ubi eras et quare uultus tuus tristis ?

    17 Aut nescis quoniam tibi creditus est Israel in regione trans migrationis eorum? Exsurge ergo et gusta panem alicuius ut non derelinquas nos, sicut pastor gregem suum in manibus luporum malignorum. Et dixi ei: uade a me et non ad me accedas usque ad dies septem et tunc uenies ad me. et audiuit ut dixi et recessit a me. Et ego ieiunaui diebus septem ululans et plorans sicut mihi mandauit Vriel angelus. Et factum est post dies septem et iterum cogitationes cordis mei molestiae erant mihi ualde. Et resumpsit anima mea spiritum intellectus et iterum coepi loqui coram altissimo sermones, Et dixi: dominator domine, ex omni silua terrae et ex omnium arborum eius elegisti uineam unam, Et ex omnium terrarum orbis elegisti tibi foueam unam, et ex omnibus floribus orbis elegisti tibi lilium unum, Et ex omnibus abyssis maris replesti tibi riuum unum, et ex omnibus aedificatis ciuitatibus sanctificasti tibimetipsi Sion, Et ex omnibus creatis uolatilibus nominasti tibi columbam unam, et ex omnibus plasmatis pecoribus prouidisti tibi ouem unam, Et ex omnibus multiplicatis populis adquisisti tibi populum unum et ab omnibus probatam legem donasti huic quem desiderasti populo. Et nunc, domine, utquid dedisti unum pluribus et praeparasti unam radicem super alias et disparsisti unicum tuum in multis? Et conculcauerunt qui contradicebant sponsionibus tuis eos qui tuis testamentis credebant. Et si odiens odisti populum tuum, tuis manibus debet castigari.

    18 exsurge ergo et gusta panem alicuius, etnon derelinquas nos sicut pastor gregem suum in manibus luporum malignorum.

    19 et dixi ei: vade a me et non ad me accedas usque diebus septem, et tunc venies ad me. et audivit ut dixi et recessit a me.

    20 et ego ieiunavi diebus septem ululans et plorans, sicut mihi mandavit Urihel angelus.

    21 et factum est post dies septem, et iterum cogitationes cordis mei molestae erant mihi valde.

    22 et resumpsit anima mea spiritum intellectus, et iterum coepi loqui coram Altissimo sermones

    23 et dixi: Dominator Domine, ex omni silva terrae et ex omnium arborumeius elegisti vineam unam,

    24 et ex omnium terrarum orbis elegisti tibi foveam unam, et ex omnibus floribus orbis elegisti tibi lilium unum,

    25 et ex omnibus abyssis maris replesti tibi rivum unum, et ex omnibus aedificatis civitatibus sanctificasti tibimet ipsi Sion,

    26 et ex omnibus creatis volatilibus nominasti tibi columbam unam, et ex omnibus plasmatis pecoribus providisti tibi ovem unam,

    27 et ex omnibus multiplicatis populis adquisisti tibi populum unum, et ab omnibus probatam legem donasti huic quem desiderasti populo.

    28 et nunc Domine, ut quid tradidisti unum plurimiset praeparasti unam radicem super alias et dispersisti unicum tuum in multis?

    29 et conculcaverunt qui contradicebant sponsionibus tuis quique tuis testamentis credebant.

    30 et si odiens odisti populum tuum tuis manibus debet castigari.

    31 Et factum est, cum locutus essem sermones istos, et missus

    32 est angelus ad me qui ante uenerat ad me praeterita nocte, Et dixit mihi: audi me et instruam te, et intende mihi et adiciam

    33 coram te. Et dixi: loquere, dominus meus. et dixit ad me: ualde in excessu mentis factus es in Israel; aut plus dilexisti

    34 illum super eum qui fecit illum? Et dixi: non, domine, sed dolens locutus sum, torquent enim me renes mei per omnem horam querentem adprehendere semitam altissimi et inuestigare partem iudicii eius. Et dixit ad me: non potes. et dixi: quare, domine? aut quid nascebar? aut quare non fiebat matrix matris meae mihi sepulchrum, ut non uiderem laborem Iacob

    35 et dixit ad me: non potes. et dixi: quare, domine, aut quidnascebar, aut quare non fiebat matrix matris meae mihi sepulchrum, ut non viderem laborem Iacob et defatigationem generis Israhel?

    36 et defatigationem generis Israel? Et dixit ad me: numera mihi qui necdum uenerunt, et collige mihi dispersas guttas, et

    37 reuirida mihi aridos flores, Et aperi mihi clausa prumptuaria et produc mihi inclusos in eis flatos, aut monstra mihi uocis imaginem, et tunc ostendam tibi eum laborem quem rogas

    38 uidere. Et dixi: dominator domine, quis enim est qui potest haec scire, nisi qui cum hominibus habitationem non habet?

    39 Ego autem insipiens, et quomodo potero dicere de his quibus

    40 me interrogasti? Et dixit ad me: quomodo non potes facere unum de his quae dicta sunt, sic non poteris inuenire iudicium

    41 meum aut finem caritatis quam populo meo promisi. Et dixi: sed ecce, domine, tu praees his qui in fine sunt, et quid facient qui ante nos sunt aut nos aut hi qui post nos ? Et dixit ad

    42 me : coronae adsimilabo iudicium meum ; sicut non nouissimorum tarditas, sic nec priorum uelocitas. Et respondi et dixi :

    43 nec enim poteras facere qui facti sunt et qui sunt et qui futuri sunt in unum, ut celerius iudicium tuum ostendas ? Et re-

    44 spondit ad me et dixit : non potest festinare creatura super creatorem, nec sustinere saeculum qui in eo creati sunt in unum. Et dixi : quomodo dixisti seruo tuo, quoniam uiuificans uiuifi-

    45 cabis a te creatam creaturam in unum ? si ergo uiuentes uiuent in unum et sustinebit creatura, poterit et nunc portare praesentes in unum. Et dixit ad me : interroga matricem mulieris et

    46 dices ad eam : decem si paris, quare per tempus ? roga ergo eam ut det decem in unum. Et dixi : non utique poterit, sed

    47 secundum tempus. Et dixit ad me : et ego dedi matricem

    48 terrae his qui seminati sunt super eam per tempus. Quem-

    49 admodum enim infans non parit nec ea quae senuit adhuc, sic ego disposui a me creatum saeculum. Et interrogaui et dixi : cum iam dederis mihi uiam, loquar

    50 coram te ; nam mater nostra de qua dixisti mihi, adhuc iuuenis est, [an] iam senectuti adpropinquat ? Et respondit ad me et

    51 dixit : interroga quae parit, et dicet tibi. Dices enim ei : quare

    52 quos peperisti nunc non sunt similes his qui ante sed minores statu ? Et dicet tibi et ipsa : alii sunt qui in iuuentute uirtutis

    53 nati sunt, et alii qui sub tempus senectutis deficiente matrice

    54 nati. Considera ergo et tu, quoniam minores statu estis prae

    55 his qui ante uos, Et qui post uos quam et uos, quasi iam senescentis creaturae et fortitudinem iuuentutis praeterientis.'
