translation:
  language: es
  text: Porque soy pobre y necesitado[a], y mi corazón está herido dentro de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi corazón está traspasado dentro de mí». El verbo hebreo puede comunicar estar herido, traspasado o golpeado de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón del clamor; «Porque» conserva la función explicativa de כִּי en un español natural y formal.
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - humilde
  lexicon: HALOT
  rationale: «Pobre» reproduce bien el paralelismo con אֶבְיוֹן y mantiene el matiz de indigencia o aflicción material/situacional.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: necesitado
  alternatives_spanish:
  - menesteroso
  - desvalido
  lexicon: HALOT
  rationale: «Necesitado» distingue este término de עָנִי sin perder la idea de carencia y dependencia.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - yo soy
  - estoy
  lexicon: HALOT
  rationale: El pronombre independiente es enfático en hebreo; en español la fuerza queda bien con la forma verbal simple «soy».
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: «Corazón» es la equivalencia estándar y fiel para לֵב/לֵבָב, preservando el sentido del interior personal.
- source_word: חָלַל
  english_pob_choice: is wounded
  chosen_spanish: está herido
  alternatives_spanish:
  - está traspasado
  - está atravesado
  - está wounded
  lexicon: HALOT
  rationale: El audit trail inglés mantiene «wounded» tras revisar «pierced»; en español «está herido» comunica el daño interno sin forzar una imagen demasiado específica, pero conserva la tensión semántica de lesión/punción implícita en el verbo.
- source_word: בְּקִרְבִּי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en medio de mí
  lexicon: HALOT
  rationale: «Dentro de mí» expresa con claridad la localización interna y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El contexto inglés revisó la opción desde «pierced» a «wounded» para reflejar el sentido más amplio del verbo hebreo; la versión española sigue esa revisión con «está herido», manteniendo la posibilidad de una imagen más intensa en la nota.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de los dos adjetivos con un orden directo: «pobre y necesitado».'
  - Se evita «SEÑOR» u otra convención no presente, porque este versículo no contiene el nombre divino.
  - La nota reproduce la alternativa semántica documentada en el audit trail inglés sin sobreextender el verbo hebreo.
