  to: Por tanto, un león del bosque los derriba; un lobo de las soledades[a] los devasta; un leopardo vigila sus ciudades. Todo el que salga de ellas será despedazado, porque sus rebeliones son muchas; sus apostasías[b] se han fortalecido.
  rationale: Se corrige la ubicación de la nota [a] para que ancle en el sintagma que realmente comenta, se fortalece הִכָּם con «los derriba» para reflejar mejor el juicio violento, y se ancla también la nota [b] en «apostasías», donde corresponde la alternativa léxica preservada por el expediente inglés. Se mantiene el resto del texto porque es fiel y natural en español.
