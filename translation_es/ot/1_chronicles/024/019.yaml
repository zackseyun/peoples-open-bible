  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: asignaciones sacerdotales, servicio cultual, entrada en la casa de Yahvé, conformidad con una norma prescrita, relación con Aarón y referencia al mandato de Yahvé. Sin embargo, hay un problema de colocación de la nota: la nota [a] está anclada a ''funciones asignadas'' pero su contenido explica כְּמִשְׁפָּטָם (''conforme a su ordenanza/orden prescrito''), no פְקֻדָּתָם. Además, ''conforme a su orden'' es comprensible pero algo débil para el matiz normativo de מִשְׁפָּטָם; ''conforme a su ordenanza'' o ''según su orden prescrito'' refleja mejor el valor prescriptivo documentado.'
