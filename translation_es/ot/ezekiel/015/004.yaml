    text: 'O: «para ser consumido»; literalmente, «para comer», con el fuego personificado como consumidor de la madera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «útil para el trabajo» o «apto para la manufactura».'
    reason: lexical_alternative
  revision_rationale: Se corrige la sobreespecificación de género ('de ella'), se mejora la precisión de לִמְלָאכָה con 'trabajo', y se reubica la nota lexical [b] al lugar correspondiente en la cláusula final. También se ajusta el pasivo inicial para reflejar mejor נִתַּן y mantener un tono más cercano al hebreo.
