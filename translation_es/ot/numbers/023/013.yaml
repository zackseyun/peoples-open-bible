review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: petición cortés, traslado a otro lugar, visión parcial de Israel como singular colectivo y mandato de maldecir desde allí. Sin embargo, la frase «Solo verás sus alrededores» altera levemente el sentido porque desplaza el objeto desde Israel mismo hacia lo que rodea a Israel; el hebreo dice que verá solo el borde/extremo de él, no sus alrededores. También conviene reflejar mejor la secuencia de וְ con «y/entonces» antes del mandato final.'
  spanish_quality_summary: El español es generalmente claro y natural, pero «sus alrededores» suena algo impreciso y semánticamente desviado. «Maldícemelo» es comprensible, aunque más cargado y menos transparente que «maldícelo por mí», especialmente en lectura eclesial amplia. Una pequeña revisión mejora fidelidad y legibilidad sin perder dignidad.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el tratamiento del singular colectivo, que el borrador preserva correctamente con «lo». La decisión de traducir קבב con «maldecir» está alineada con la justificación del POB. No se detectan conflictos con Yahvé/Mesías/Cristo u otros términos programáticos.
  issues:
  - severity: medium
    issue: «sus alrededores» para קָצֵהוּ
    rationale: El hebreo habla del borde/extremo de Israel visto parcialmente, no de los alrededores que lo circundan. «Sus alrededores» puede sugerir el terreno vecino más que una parte periférica del pueblo.
  - severity: low
    issue: Falta de nota sobre el singular colectivo
    rationale: El English POB conserva una nota explicando que «him/all of him» puede entenderse colectivamente como «them». En español, como se mantiene «lo», conviene conservar esa aclaración para documentar la decisión y evitar ambigüedad interpretativa.
  - severity: low
    issue: «Maldícemelo» es menos transparente que una forma analítica
    rationale: Aunque gramaticalmente válido, el doble clítico concentrado puede sonar más marcado y menos claro para lectura pública. «Maldícelo por mí» o «entonces maldícelo por mí» comunica mejor el beneficiario/intención sin pérdida de fuerza.
  revised_spanish_text: 'Entonces Balac le dijo: «Por favor, ven conmigo a otro lugar, desde donde lo puedas ver. Solo verás[a] el extremo de él, y no lo verás todo[b]; entonces maldícelo por mí desde allí».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «solo su borde» o «solo la parte más extrema de él», aludiendo a que se vería únicamente una porción de Israel.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa pronombres singulares («él», «todo de él») para Israel como pueblo colectivo; en español también podría expresarse como «ellos».
    reason: alternative_reading
  revision_rationale: 'Se reemplaza «sus alrededores» por «el extremo de él» para mantener el referente correcto: una parte periférica de Israel, no lo que está alrededor de Israel. Se añade la nota sobre el singular colectivo porque forma parte de la justificación documentada del POB. También se ajusta el mandato final a «entonces maldícelo por mí desde allí» para reflejar con mayor claridad la secuencia y la sintaxis del hebreo en español natural.'
