base_translation:
  language: en
  yaml_path: translation/ot/job/042/003.yaml
  text: ‘Who is this who hides counsel without knowledge?’ Therefore I have declared what I did not understand—things too wonderful for me[b][a], which I did not know.
  footnotes:
