translation:
  language: es
  text: para que tu limosna[a] sea en secreto; y tu Padre que ve en secreto te recompensará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dar a los pobres». El término griego se refiere específicamente a dar a los pobres.
    reason: lexical_alternative
  - marker: b
    text: O «te retribuirá».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Expresa con naturalidad la finalidad del griego ὅπως con subjuntivo, manteniendo el vínculo con la instrucción anterior.
- source_word: ᾖ
  english_pob_choice: may be
  chosen_spanish: sea
  alternatives_spanish:
  - esté
  lexicon: BDAG
  rationale: El subjuntivo español después de 'para que' conserva la fuerza de propósito sin sonar forzado.
- source_word: ἐλεημοσύνη
  english_pob_choice: giving to the poor
  chosen_spanish: limosna
  alternatives_spanish:
  - dar a los pobres
  - ayuda a los pobres
  lexicon: BDAG
  rationale: El término griego se refiere de manera específica a la ayuda dada a los pobres. 'Limosna' es breve y tradicional; aunque tiene matiz clásico, comunica bien el acto concreto de dar a los necesitados. La alternativa explicativa queda implícita en la nota lexical.
- source_word: ἐν τῷ κρυπτῷ
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - en lo oculto
  lexicon: BDAG
  rationale: La locución idiomática se vierte con la expresión natural 'en secreto', preservando el contraste con lo público y repitiéndose en ambas cláusulas.
- source_word: ὁ πατήρ σου
  english_pob_choice: your Father
  chosen_spanish: tu Padre
  alternatives_spanish:
  - tu Padre celestial
  lexicon: BDAG
  rationale: El griego dice simplemente 'tu Padre'; no se importa 'celestial' desde pasajes paralelos que aquí no aparecen.
- source_word: ὁ βλέπων
  english_pob_choice: who sees
  chosen_spanish: que ve
  alternatives_spanish:
  - que está viendo
  - el que ve
  lexicon: BDAG
  rationale: El participio sustantivado se expresa naturalmente con una relativa en español. 'Que ve' conserva el valor de observación continua sin sobrecargar el estilo.
- source_word: ἀποδώσει
  english_pob_choice: will reward
  chosen_spanish: te recompensará
  alternatives_spanish:
  - te pagará
  - te retribuirá
  - te recompensará
  lexicon: BDAG
  rationale: '''Recompensará'' mantiene el sentido positivo de la respuesta divina. ''Pagará'' o ''retribuirá'' podrían sonar más literales, pero también más duros; se conserva la tensión teológica entre recompensa y retribución sin fijar su forma.'
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El dativo enclítico se integra de forma natural con el verbo en español.
theological_decisions:
- issue: Naturaleza de la respuesta divina en ἀποδώσει
  english_pob_reading: will reward you
  chosen_spanish_reading: te recompensará
  alternative_spanish_readings:
  - te retribuirá
  - te pagará
  rationale: La forma española conserva la promesa positiva de Dios sin determinar si la recompensa será temporal, eterna, material o espiritual. Así se preserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica; no sobreespecificar la forma de la recompensa.
translation_notes:
  revision_awareness: 'Alineado con la última revisión inglesa: no se introdujeron cambios de contenido; se mantuvo la lectura de propósito, la referencia específica a la ayuda a los pobres y la recompensa divina sin precisar su modalidad.'
  spanish_consistency_notes:
  - Se conservó el paralelismo de dos cláusulas con 'en secreto'.
  - Se evitó introducir 'celestial' en 'tu Padre' porque no está en el texto griego de este versículo.
  - Se prefirió 'recompensará' frente a opciones más literales que endurecen indebidamente el sentido.
  - La nota lexical sobre 'limosna' mantiene la alternativa relevante sin romper la fluidez del texto principal.
