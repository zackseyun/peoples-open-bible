translation:
  language: es
  text: He aquí, vienen días —declara Yahvé— en que sembraré la casa de Israel y la casa de Judá con semilla de hombre[a] y semilla de ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «semilla de hombre», es decir, descendencia humana o humanidad; la frase va en paralelo con «semilla de ganado» para describir una repoblación con personas y ganado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira[a]
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: El hebreo introduce una llamada de atención profética. «Mira» comunica bien esa función en español moderno y mantiene el tono directo sin volverse arcaico. Se ancla con nota porque el inglés POB preservó la marcación enfática con «Behold».
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - están viniendo días
  - se acercan días
  lexicon: HALOT
  rationale: La fórmula profética expresa un futuro inminente. «Vienen días» es natural en español y conserva el movimiento verbal sin añadir un artículo que no está en el hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de discurso profético. «Declara Yahvé» reproduce el valor formal de נְאֻם sin ocultar el nombre divino, siguiendo el criterio del proyecto.
- source_word: וְזָרַעְתִּי
  english_pob_choice: I will sow
  chosen_spanish: sembraré
  alternatives_spanish:
  - plantaré
  - sembraré
  lexicon: HALOT
  rationale: El verbo זרע literalmente significa «sembrar». En español, «sembraré» preserva la metáfora agrícola de restauración mejor que una paráfrasis como «repatriaré» o «poblaré».
- source_word: בֵּית יִשְׂרָאֵל ... בֵּית יְהוּדָה
  english_pob_choice: the house of Israel and the house of Judah
  chosen_spanish: la casa de Israel y la casa de Judá
  alternatives_spanish:
  - Israel y Judá
  - la casa de Israel y la casa de Judá
  lexicon: HALOT
  rationale: «Casa de» conserva el sentido corporativo/covenantal del hebreo y evita reducir la expresión a simples topónimos o gentilicios.
- source_word: זֶרַע אָדָם
  english_pob_choice: the seed of man
  chosen_spanish: semilla de hombre
  alternatives_spanish:
  - semilla humana
  - descendencia humana
  lexicon: HALOT
  rationale: Se mantiene el paralelismo lexical con «semilla de animal» y la imagen agrícola. «Hombre» aquí tiene valor genérico, no masculino exclusivo, como en el hebreo אָדָם.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humano
  - humanidad
  lexicon: HALOT
  rationale: אָדָם funciona de modo genérico como humanidad. «Hombre» preserva la collocación tradicional «semilla de hombre» y el contraste con «animal», con sentido inclusivo por contexto.
- source_word: וְזֶרַע בְּהֵמָה
  english_pob_choice: and the seed of beast
  chosen_spanish: y semilla de animal
  alternatives_spanish:
  - y semilla de bestia
  - y descendencia de animal
  lexicon: HALOT
  rationale: «Animal» comunica con más claridad en español contemporáneo el referente colectivo de בְּהֵמָה. Se conserva la simetría con «semilla de hombre» y la idea de repoblación con ganado/animales.
theological_decisions:
- issue: Preservación de la metáfora de siembra/restauración
  english_pob_reading: 'Maintain the literal sowing metaphor: ''I will sow the house of Israel and the house of Judah with the seed of man and the seed of beast.'''
  chosen_spanish_reading: 'Mantener la metáfora literal de sembrar: «sembraré la casa de Israel y la casa de Judá con semilla de hombre y semilla de animal».'
  alternative_spanish_readings:
  - repondré a Israel y Judá con personas y animales
  - poblaré a Israel y Judá con descendencia humana y animal
  rationale: El texto hebreo usa una metáfora agrícola intencional para describir restauración y repoblación. La traducción elegida preserva la imagen y evita explicar de más o suavizar la fuerza poética del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor genérico de אָדָם
  english_pob_reading: Render אדם as 'man' in the phrase 'seed of man' while preserving its generic sense in a footnote.
  chosen_spanish_reading: Renderizar אָדָם como «hombre» en «semilla de hombre», con su sentido genérico implícito en contexto.
  alternative_spanish_readings:
  - humano
  - humanidad
  rationale: En español, «hombre» conserva la pareja formal con «animal» y refleja la expresión hebrea compacta. El contexto muestra que no se trata de un varón particular, sino de la humanidad en general.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: No hay cambios aplicados en la última revisión; el pasaje quedó marcado como sin cambios necesarios, con alto acuerdo entre revisores. La redacción española sigue de cerca el texto hebreo y la decisión inglesa auditada, especialmente en la metáfora de siembra y en el valor genérico de אָדָם.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «casa de Israel / casa de Judá» por su valor corporativo-covenantal.
  - «Semilla de hombre» mantiene la metáfora y requiere nota aclaratoria por el posible matiz genérico de «hombre».
  - Se eligió «animal» en lugar de «bestia» para mayor claridad en español, sin perder el paralelismo hebreo.
