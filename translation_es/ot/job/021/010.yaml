    rationale: Aunque posible, enfoca el acto sexual más que el éxito reproductivo. El audit trail inglés justifica «breeds» como reproducción eficaz; en español «fecunda» o «engendra» lo reflejan mejor.
  - severity: medium
    issue: «parió y no abortó»
    rationale: En español, después de «parió», «no abortó» resulta extraña porque abortar normalmente ocurre antes del parto. El hebreo busca expresar que la vaca lleva a término y no pierde la cría.
