lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas posexílicas, בְּנֵי introduce con frecuencia un linaje o clan. En español, «los hijos de» preserva de manera formal y transparente la estructura de filiación del hebreo, con un registro natural y reconocible. «Descendientes de» explicita la función colectiva, pero suaviza la forma literal del texto.
- source_word: יַעְלָא
  english_pob_choice: Jaala
  chosen_spanish: Yaalá
  alternatives_spanish:
  - Jaala
  - Yaaláh
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. Se usa «Yaalá» para reflejar de forma directa la forma consonántica hebrea y mantener la coherencia fonológica en español. La grafía inglesa «Jaala» recoge una tradición ortográfica, pero en español «Y» inicial es más fiel a la transliteración simple del hebreo consonántico.
- source_word: דַרְקוֹן
  english_pob_choice: Darkon
  chosen_spanish: Darkón
  alternatives_spanish:
  - Darkon
  - Darcón
  lexicon: HALOT
  rationale: Nombre propio transliterado sin traducir. Se acentúa «Darkón» para adaptarlo a la prosodia del español y señalar la sílaba tónica sin alterar el nombre.
- source_word: גִדֵּל
  english_pob_choice: Giddel
  chosen_spanish: Giddel
  alternatives_spanish:
  - Gidél
  - Giddel
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente del hebreo. Se conserva «Giddel» para mantener la correspondencia inmediata con la tradición POB en inglés y la forma consonántica del nombre.
translation_notes:
  revision_awareness: El texto hebreo y el seguimiento de revisión de la POB inglesa muestran plena concordancia y ausencia de cambios recientes; por eso la versión española se limita a una transliteración cuidadosa de los nombres propios y a la fórmula genealógica estándar.
  spanish_consistency_notes:
  - Se mantuvo la fórmula genealógica «los hijos de» para conservar la estructura del hebreo.
  - Se preservó la distinción entre nombre hebreo y adaptación española, evitando sustituir los nombres por equivalentes libres.
  - Se usó acentuación gráfica en nombres transliterados cuando ayuda a la lectura en español sin alterar la base consonántica.
