  rationale: Se quita una nota innecesaria que no aportaba una alternativa real del texto fuente y se mejora «eso es una bondad» por «es un acto de bondad», una formulación más idiomática en español que conserva el sentido de חֶסֶד como acto concreto de benevolencia. El resto del versículo se mantiene por su buena fidelidad al hebreo y al expediente POB.
