review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura del hebreo y mantiene la distinción entre צֶדֶק y מִשְׁפָּט mediante dos términos españoles distintos. También refleja correctamente מְכוֹן כִּסְאֶךָ como 'el fundamento de tu trono' y adopta con acierto la solución idiomática para יקדמו פניך. Sin embargo, la inversión a 'La justicia y la rectitud' debilita la correspondencia con el orden fuente, donde primero aparece צֶדֶק, mejor representado por 'rectitud', y luego מִשְׁפָּט, 'justicia'. Además, 'misericordia leal' para חֶסֶד es menos natural y menos alineado con la decisión POB 'steadfast love' que 'amor leal'.
  spanish_quality_summary: El español es claro y digno, pero 'misericordia leal' suena algo forzado en registro bíblico natural. 'Amor leal y fidelidad' lee mejor, conserva la densidad pactual y evita una combinación poco idiomática. El resto del verso fluye bien. La nota al pie está correctamente formulada y anclada.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. La principal mejora es alinear mejor חֶסֶד con una expresión española más natural y cercana a ''steadfast love'': ''amor leal''. También conviene reordenar ''rectitud y justicia'' para seguir la secuencia fuente y la lógica documentada de distinguir cualidad moral y dimensión judicial.'
  issues:
  - severity: medium
    issue: Orden invertido de צֶדֶק y מִשְׁפָּט en el texto español
    rationale: El borrador dice 'La justicia y la rectitud', pero las decisiones léxicas mismas identifican צֶדֶק = rectitud y מִשְׁפָּט = justicia. Mantener el orden fuente mejora fidelidad y coherencia interna.
  - severity: medium
    issue: '''misericordia leal'' es poco idiomático para חֶסֶד'
    rationale: Aunque busca preservar la lealtad pactual, la combinación suena menos natural en español general e introduce un matiz de compasión que no es el centro de 'steadfast love' en este contexto. 'Amor leal' comunica mejor la relación con אֱמֶת = fidelidad.
  revised_spanish_text: La rectitud y la justicia son el fundamento de tu trono[a]; el amor leal y la fidelidad van delante de ti.
  revised_footnotes:
  - marker: a
    text: O 'tu presencia'. El hebreo dice literalmente 'tu rostro'.
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden a 'rectitud y justicia' para reflejar fielmente צֶדֶק וּמִשְׁפָּט y la distinción documentada en el expediente inglés. Se reemplaza 'misericordia leal' por 'amor leal' porque es más natural en español y transmite mejor la fuerza relacional/pactual de חֶסֶד junto con 'fidelidad' para אֱמֶת. Se conserva la solución idiomática 'van delante de ti' y la nota sobre 'tu rostro/tu presencia'.
