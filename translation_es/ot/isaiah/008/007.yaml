translation:
  language: es
  text: Por tanto, he aquí, el Señor hace subir contra ellos las aguas del Río[a], poderosas y muchas[b]—el rey de Asiria y toda su gloria. Y subirá sobre todos sus cauces y pasará sobre todas sus orillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice 'el Río'; probablemente se refiere al Éufrates, el gran río asociado con Asiria.
    reason: cultural_note
  - marker: b
    text: O 'fuertes y abundantes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la consecuencia inferida del contexto previo con un registro natural y formal en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: Mantiene la fuerza de llamada de atención del hebreo con una forma breve y viva en español, sin arcaísmo excesivo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: HALOT
  rationale: Reproduce el título divino como equivalente natural de אֲדֹנָי en español, sin usar el nombre del pacto reservado para YHWH.
- source_word: מַעֲלֶה עֲלֵיהֶם
  english_pob_choice: is bringing up against them
  chosen_spanish: está haciendo subir contra ellos
  alternatives_spanish:
  - está trayendo contra ellos
  - hace subir contra ellos
  lexicon: HALOT
  rationale: Conserva la imagen de elevación/subida del verbo causativo y el sentido de hostilidad implícito en עֲלֵיהֶם.
- source_word: מֵי הַנָּהָר
  english_pob_choice: the waters of the River
  chosen_spanish: las aguas del río
  alternatives_spanish:
  - las aguas del Río
  - las aguas del gran río
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el río' con artículo; en español, 'río' mantiene la referencia sin forzar una identificación geográfica en el texto principal.
- source_word: הָעֲצוּמִים וְהָרַבִּים
  english_pob_choice: mighty and many
  chosen_spanish: poderosas y muchas
  alternatives_spanish:
  - fuertes y abundantes
  - poderosas y numerosas
  lexicon: HALOT
  rationale: Respeta ambos adjetivos y la fuerza del cuadro de inundación; 'poderosas' conserva el valor de intensidad, y 'muchas' el de abundancia.
- source_word: אֶת מֶלֶךְ אַשּׁוּר וְאֶת כָּל כְּבוֹדוֹ
  english_pob_choice: the king of Assyria and all his glory
  chosen_spanish: el rey de Asiria y toda su gloria
  alternatives_spanish:
  - el rey de Asiria y todo su esplendor
  - el rey de Asiria y toda su pompa
  lexicon: HALOT
  rationale: Mantiene la apposición metafórica entre las aguas y el poder asirio; 'gloria' es un equivalente amplio de כָּבוֹד que puede abarcar esplendor y majestad.
- source_word: וְעָלָה
  english_pob_choice: It will rise
  chosen_spanish: Y subirá
  alternatives_spanish:
  - Y se elevará
  - Y ascenderá
  lexicon: HALOT
  rationale: Continúa la imagen de la inundación como sujeto singular en español, reflejando el hebreo con una forma verbal simple y directa.
- source_word: אֲפִיקָיו
  english_pob_choice: its channels
  chosen_spanish: sus cauces
  alternatives_spanish:
  - sus canales
  - sus lechos
  lexicon: HALOT
  rationale: '''Cauces'' comunica bien la idea de lechos o canales de agua en español corriente y encaja con la metáfora de crecida.'
- source_word: וְהָלַךְ עַל כָּל גְּדוֹתָיו
  english_pob_choice: go over all its banks
  chosen_spanish: pasará sobre todas sus orillas
  alternatives_spanish:
  - desbordará todas sus orillas
  - pasará por encima de todas sus orillas
  lexicon: HALOT
  rationale: El hebreo describe el desborde de las aguas sobre los límites del río; 'pasará sobre' conserva la imagen sin perder claridad en español.
theological_decisions:
- issue: Metaphorical identification of the floodwaters
  english_pob_reading: The waters of the River metaphorically represent the king of Assyria and the full force of his imperial power as an instrument brought by the Lord in judgment.
  chosen_spanish_reading: Las aguas del río representan figuradamente al rey de Asiria y toda su fuerza imperial como instrumento de juicio bajo la acción del Señor.
  alternative_spanish_readings:
  - Una imagen más literal del río sin explicitar la metáfora
  - Las aguas como simple amenaza natural
  rationale: El hebreo hace explícita la apposición entre las aguas y el rey de Asiria; la traducción mantiene esa equivalencia simbólica sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Isaías 8:7; cf. la lectura profética del juicio mediante naciones instrumentales
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como contexto auditado la decisión inglesa de conservar la imagen del río como metáfora del poder asirio. Se ajustó el registro para un español publicable y se anclaron las notas en palabras presentes en el texto para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Se usó 'Señor' para אֲדֹנָי, reservando 'Yahvé' para יהוה según la convención del proyecto.
  - Se prefirió 'Asiria' para אַשּׁוּר, conforme al uso histórico-geográfico estándar en español.
  - '''Gloria'' conserva la amplitud semántica de כָּבוֹד y evita estrechar el sentido a solo ''esplendor''.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto principal y corresponden a notas con anclaje real.
