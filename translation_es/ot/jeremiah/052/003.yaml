translation:
  language: es
  text: Porque a causa de la ira de Yahvé sucedió esto en Jerusalén y en Judá,[a] hasta que los expulsó de delante de su rostro;[b] y Sedequías se rebeló contra el rey de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Porque por la ira de Yahvé ocurrió esto en Jerusalén y en Judá'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'de delante de su rostro'; es decir, de su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce una cláusula explicativa que enlaza con el contexto anterior. "Porque" conserva la función causal/discursiva sin forzar un giro más interpretativo.
- source_word: עַל אַף יְהוָה
  english_pob_choice: because of the anger of Yahweh
  chosen_spanish: a causa de la ira de Yahvé
  alternatives_spanish:
  - a causa del enojo de Yahvé
  - por la ira de Yahvé
  - a causa de la indignación de Yahvé
  lexicon: HALOT
  rationale: El hebreo expresa causa fundada en la ira divina. "Ira" preserva la fuerza del término; "a causa de" mantiene el matiz causal del idiomático עַל אַף sin suavizarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, manteniendo la forma auditada y transparente.
- source_word: הָיְתָה
  english_pob_choice: it came to pass
  chosen_spanish: aconteció
  alternatives_spanish:
  - sucedió
  - tuvo lugar
  - pasó
  lexicon: HALOT
  rationale: La forma verbal hebrea requiere una solución idiomática en español. "Aconteció" mantiene el registro formal y el valor resultativo/narrativo sin añadir contenido ajeno.
- source_word: בִּירוּשָׁלִַם וִיהוּדָה
  english_pob_choice: in Jerusalem and Judah
  chosen_spanish: en Jerusalén y en Judá
  alternatives_spanish:
  - en Jerusalén y Judá
  - en Jerusalén y en Judea
  lexicon: HALOT
  rationale: Se conservan ambos ámbitos geográficos de manera directa y clara, con la preposición repetida para evitar ambigüedad en español.
- source_word: עַד הִשְׁלִיכוֹ אֹתָם
  english_pob_choice: until he cast them out
  chosen_spanish: hasta que los echó
  alternatives_spanish:
  - hasta que los arrojó
  - hasta que los expulsó
  - hasta que los arrojó fuera
  lexicon: HALOT
  rationale: '"Echó" reproduce el gesto de expulsión con naturalidad en español y preserva la severidad del verbo de expulsar. Se evita un término más técnico que podría desplazar el matiz narrativo.'
- source_word: מֵעַל פָּנָיו
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - de delante de su presencia
  - de ante su rostro
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de alejamiento "de delante de" sin neutralizarla en una abstracción. "Rostro" refleja mejor la concreción del hebreo que "presencia".
- source_word: וַיִּמְרֹד
  english_pob_choice: and ... rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se alzó en rebelión
  - se levantó contra
  - se rebeló en contra
  lexicon: HALOT
  rationale: Término estándar y preciso para מרד en contexto político-covenantal; en español comunica claramente ruptura de lealtad.
- source_word: בְּמֶלֶךְ בָּבֶל
  english_pob_choice: against the king of Babylon
  chosen_spanish: contra el rey de Babilonia
  alternatives_spanish:
  - frente al rey de Babilonia
  - en contra del rey de Babilonia
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es ב, con מרד la lectura idiomática en español es "contra". Se sigue la decisión auditada de la POB inglesa.
theological_decisions:
- issue: Causa divina de la ruina de Judá y Jerusalén
  english_pob_reading: The verse states that Jerusalem and Judah's fate occurred because of the LORD's anger, culminating in expulsion from his presence.
  chosen_spanish_reading: El versículo afirma que el desastre sobre Jerusalén y Judá ocurrió a causa de la ira de Yahvé, culminando en expulsión de delante de su rostro.
  alternative_spanish_readings:
  - El versículo sólo narra hechos históricos sin causalidad teológica explícita
  - El versículo debería suavizarse a 'desagrado' en lugar de 'ira'
  rationale: El hebreo dice explícitamente עַל אַף יְהוָה y describe la expulsión como alejamiento de delante de su rostro. La traducción conserva esa afirmación teológica sin ampliarla ni rebajarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo suplir el sujeto implícito de הָיְתָה
  english_pob_reading: it came to pass
  chosen_spanish_reading: aconteció
  alternative_spanish_readings:
  - pasó
  - fue
  rationale: El hebreo omite un sujeto explícito. En español, "aconteció" mantiene la fluidez narrativa y el tono formal sin introducir un referente adicional.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El audit trail inglés revisó 'this came about' a 'it came to pass' para reflejar más naturalmente הָיְתָה. En español se optó por 'aconteció', equivalente formal y narrativo que preserva la misma solución sin introducir perífrasis innecesarias. También se mantuvo la causalidad explícita de la ira divina y la imagen concreta de expulsión 'de delante de su rostro'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el tetragrámaton.
  - '''Ira'' se conservó por fidelidad al idiomático עַל אַף, sin sustituirlo por un término más débil.'
  - '''Rebeló contra'' sigue la lectura auditada para מרד con בְּמֶלֶךְ.'
  - Se evitó 'SEÑOR' porque el proyecto pide transparencia nominal en español.
  - La repetición de 'en' en 'en Jerusalén y en Judá' favorece claridad y evita que el segundo complemento quede subordinado de forma ambigua.
