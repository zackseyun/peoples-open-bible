base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/022.yaml
  text: But God’s anger burned because he was going[a], and the angel of Yahweh took his stand in the road as an adversary to him. He was riding on his donkey[b], and his two young men were with him.
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן (satan) here means 'adversary' or 'opponent,' not necessarily the proper name Satan.
    reason: lexical_alternative
  - marker: b
    text: Or 'his she-donkey'; the Hebrew term specifically refers to a female donkey.
    reason: lexical_alternative
