translation:
  language: es
  text: porque tú hiciste el cielo y la tierra y todo lo admirable bajo el cielo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda maravilla bajo el cielo» o «todo lo admirable bajo el cielo». El participio griego θαυμαζόμενον denota lo admirable o digno de admiración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: BDAG
  rationale: En este contexto oracional, ὅτι introduce la razón o fundamento de lo dicho antes. «Porque» expresa con naturalidad en español esa relación causal sin añadir matices ajenos.
- source_word: ἐποίησας
  english_pob_choice: you made
  chosen_spanish: hiciste
  alternatives_spanish:
  - hiciste
  - creaste
  - realizaste
  lexicon: BDAG
  rationale: ποιέω aquí se refiere a la acción divina de hacer/crear. «Hiciste» sigue de cerca el verbo griego y suena natural en español; «creaste» es posible, pero formula más explícitamente la idea de creación que el verbo por sí solo exige.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  - el firmamento y la tierra
  lexicon: BDAG
  rationale: La expresión es el merismo habitual para la totalidad de la creación. En español, «el cielo y la tierra» comunica mejor esa totalidad que un calco más literal con «heaven» como «cielo» y mantiene la idiomaticidad.
- source_word: πᾶν θαυμαζόμενον
  english_pob_choice: everything marvelous
  chosen_spanish: todo lo admirable
  alternatives_spanish:
  - todo lo maravilloso
  - toda maravilla
  - todo lo que asombra
  lexicon: LSJ
  rationale: El participio θαυμαζόμενον denota algo que causa admiración o es objeto de maravilla. «Todo lo admirable» conserva el valor colectivo y adjetival de la revisión inglesa («everything marvelous») sin forzar una estructura extraña en español.
- source_word: ἐν τῇ ὑπʼ οὐρανόν
  english_pob_choice: under heaven
  chosen_spanish: bajo el cielo
  alternatives_spanish:
  - bajo el cielo
  - debajo del cielo
  - en lo que está bajo el cielo
  lexicon: LSJ
  rationale: El giro idiomático griego se refiere al ámbito creado bajo el cielo. «Bajo el cielo» es la correspondencia española más natural y fiel.
theological_decisions:
- issue: Alcance de la afirmación creadora
  english_pob_reading: The verse is rendered as a comprehensive statement about God's making of the cosmos and all marvelous things within the world order.
  chosen_spanish_reading: El versículo presenta una afirmación amplia sobre la acción creadora de Dios respecto del cosmos y de todo lo admirable en el orden del mundo.
  alternative_spanish_readings:
  - '...y de toda maravilla bajo el cielo.'
  - '...y de toda creación bajo el cielo.'
  rationale: El griego nombra explícitamente «el cielo y la tierra» y añade «todo lo admirable bajo el cielo». La traducción conserva ese alcance sin convertirlo en una formulación doctrinal más técnica que el texto mismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que prefirió una formulación colectiva y más natural para πᾶν θαυμαζόμενον («everything marvelous») en lugar de una expresión más analítica. Aquí se reflejó esa misma decisión con «todo lo admirable».
  spanish_consistency_notes:
  - Se mantuvo «el cielo y la tierra» como merismo de creación, coherente con el uso bíblico usual y con el inglés auditado.
  - Se evitó «SEÑOR» o cualquier sustitución reverencial, porque el texto no contiene el Tetragrámaton ni κύριος.
  - Se preservó el matiz de maravilla/admiración para θαυμαζόμενον, sin reducirlo a una mera lista de cosas creadas.
