translation:
  language: es
  text: Si sacas una espada contra un amigo[a], no desesperes[b], porque todavía puede haber un regreso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si desenvainas una espada contra un amigo». El verbo griego literalmente significa «sacar» o «tirar de»; aquí puede entenderse como desenvainar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque hay retorno» o «porque hay posibilidad de restauración». El griego dice literalmente: «porque hay retorno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ φίλον
  english_pob_choice: against a friend
  chosen_spanish: contra un amigo
  alternatives_spanish:
  - sobre un amigo
  - a un amigo
  lexicon: LSJ
  rationale: Con un acto hostil implícito, ἐπί con acusativo tiene sentido adversativo. En español, «contra» comunica con naturalidad la agresión dirigida al amigo sin perder la relación personal del término φίλον.
- source_word: ἐὰν σπάσῃς
  english_pob_choice: if you draw
  chosen_spanish: si sacas
  alternatives_spanish:
  - si desenvainas
  - si desenvainas una espada
  lexicon: LSJ
  rationale: σπάω significa ‘sacar/extraer’ o ‘desenvainar’ según contexto. Con ῥομφαίαν, el sentido es blandir o sacar la espada; «sacas» evita un calco rígido y sigue la imagen bélica.
- source_word: ῥομφαίαν
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - una hoja
  - una gran espada
  lexicon: LSJ
  rationale: ῥομφαία es una espada, a veces ancha o grande. «Espada» basta en español y no sobreespecifica el tipo de arma más allá de lo que exige el verso.
- source_word: μὴ ἀπελπίσῃς
  english_pob_choice: do not despair
  chosen_spanish: no desesperes
  alternatives_spanish:
  - no pierdas la esperanza
  - no te des por vencido
  lexicon: LSJ
  rationale: ἀπελπίζω expresa desesperar o perder la esperanza. «No desesperes» conserva la fuerza imperativa y la brevedad del griego.
- source_word: ἔστιν γὰρ ἐπάνοδος
  english_pob_choice: for there can be a return
  chosen_spanish: porque todavía puede haber retorno
  alternatives_spanish:
  - porque hay un regreso
  - porque hay posibilidad de volver
  - porque puede haber restauración
  lexicon: LSJ
  rationale: ἐπάνοδος significa ‘retorno’ o ‘regreso’. «Todavía puede haber retorno» mantiene la metáfora del volver y deja abierta la extensión exacta hacia restauración relacional, como en el análisis inglés.
theological_decisions:
- issue: Alcance de la posible restauración tras una agresión contra un amigo
  english_pob_reading: The verse states that restoration remains possible even after a severe breach symbolized by drawing a sword.
  chosen_spanish_reading: El verso afirma que, aun tras una ruptura grave simbolizada por sacar una espada contra un amigo, todavía puede haber regreso/restablecimiento.
  alternative_spanish_readings:
  - El verso solo dice que existe un regreso, sin precisar si es reconciliación.
  - La imagen podría ser hiperbólica para una ofensa grave más que una violencia literal.
  rationale: 'El griego presenta una imagen concreta de hostilidad y luego una afirmación abstracta de ‘retorno’. En español conviene preservar la imagen y no cerrar demasiado el alcance: «retorno» deja abierta la dimensión relacional sin imponer una interpretación más fuerte de la que exige el texto.'
  doctrine_reference: Sabiduría y reconciliación relacional en la literatura sapiencial; cf. principios generales de restauración y arrepentimiento en la Escritura.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la versión inglesa auditada; no se requieren cambios de fondo. Se conserva la imagen marcial, se evita sobreinterpretar ἐπάνοδος como reconciliación completa en el texto principal y se dejan las alternativas en nota, siguiendo el pasaje inglés revisado sin cambios.
  spanish_consistency_notes:
  - Se usa «amigo» para φίλον en consonancia con el sentido relacional del contexto.
  - «Espada» mantiene la referencia concreta de ῥομφαία sin añadir matices innecesarios.
  - «Retorno» evita reemplazar el término por una glosa doctrinal más extensa en el texto principal.
  - La puntuación y el ritmo buscan una frase publicable, breve y fiel al griego.
