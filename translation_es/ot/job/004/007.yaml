  - Se preservó el paralelismo retórico del hebreo con dos preguntas sucesivas.
  - Se eligió un registro bíblico sobrio pero natural en español latinoamericano.
  - Los marcadores de nota [a][b] aparecen en el texto exactamente donde corresponden.
