- from: Así, todo Israel fue inscrito por genealogía[a], y, miren, ellos están escritos en el Libro de los reyes de Israel[b]; y Judá fue llevado al exilio a Babilonia por su infidelidad.
  to: Así, todo Israel fue inscrito por genealogía[a], y he aquí, están escritos en el Libro de los reyes de Israel; y Judá fue llevado al exilio a Babilonia por su infidelidad[b].
