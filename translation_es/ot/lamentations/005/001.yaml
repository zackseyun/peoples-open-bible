translation:
  language: es
  text: Recuerda, Yahvé, lo que nos ha sucedido; mira y ve nuestro oprobio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «nuestro reproche»; también «nuestra vergüenza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo dirigido a Yahvé pide que atienda al padecimiento del pueblo. «Acuérdate» conserva el valor apelativo y orante del hebreo mejor que un simple «recuerda», y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma española establecida por el proyecto, «Yahvé», en lugar de sustituirlo por un título.
- source_word: מֶה הָיָה לָנוּ
  english_pob_choice: what has happened to us
  chosen_spanish: de lo que nos ha sucedido
  alternatives_spanish:
  - de lo que nos ha acontecido
  - de lo que nos ha pasado
  - qué nos ha sucedido
  lexicon: HALOT
  rationale: La pregunta hebrea se refiere a lo que sobrevino al pueblo. «Nos ha sucedido» conserva el sentido de acontecimiento sufrido y funciona con naturalidad dentro de la oración implícita de la lamentación.
- source_word: הביט
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - atiende
  - fija la mirada
  lexicon: HALOT
  rationale: El verbo pide una atención visual urgente. «Mira» es el equivalente más directo y mantiene el paralelismo con el siguiente imperativo.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y contempla
  - y mira
  lexicon: HALOT
  rationale: 'Se conserva la doble exhortación del hebreo con dos verbos sencillos en español: «mira, y ve». Esto reproduce la intensificación sin añadir explicación.'
- source_word: חֶרְפָּתֵנוּ
  english_pob_choice: our disgrace
  chosen_spanish: nuestro oprobio
  alternatives_spanish:
  - nuestra deshonra
  - nuestra vergüenza
  - nuestro reproche
  lexicon: HALOT
  rationale: חֶרְפָּה puede expresar reproche, deshonra o vergüenza pública. «Oprobio» mantiene el peso de humillación pública y conserva una tonalidad bíblica sin perder inteligibilidad.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español del proyecto se preserva como «Yahvé», evitando una sustitución titulary y manteniendo el nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto hebreo y la traducción inglesa POB; no se requirieron revisiones adicionales. Se preservó la triple petición del versículo y la nota léxica sobre חֶרְפָּה.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene la alternancia de imperativos breves («acuérdate / mira / ve») para conservar el paralelismo hebreo.
  - «Oprobio» comunica la carga pública de חֶרְפָּה mejor que una simple interiorización de «vergüenza».
