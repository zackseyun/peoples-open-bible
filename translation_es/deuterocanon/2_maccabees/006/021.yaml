translation:
  language: es
  text: Pero los que habían sido designados para el sacrificio ilícito[a], porque conocían al hombre desde hacía mucho tiempo, lo tomaban aparte en privado y lo instaban a traer carne que le era lícito usar, preparada por él mismo, y a fingir que estaba comiendo la carne del sacrificio que el rey había ordenado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «movidos por compasión, porque lo conocían desde hacía mucho tiempo». El griego incluye explícitamente la idea de compasión o piedad (σπλαγχνισμοῦ).
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la carne del sacrificio»; es decir, carne procedente de sacrificios paganos que el rey le había ordenado comer.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ ... τεταγμένοι
  english_pob_choice: those who had been appointed
  chosen_spanish: los que estaban encargados
  alternatives_spanish:
  - los que habían sido नियुक्तados
  - los que habían sido designados
  - los que habían sido puestos a cargo
  lexicon: LSJ
  rationale: τεταγμένοι indica personas asignadas a una función. En español, «estaban encargados» comunica bien la idea de responsabilidad oficial y suena natural en el relato.
- source_word: πρὸς τὰ παράνομα
  english_pob_choice: over the unlawful sacrifice
  chosen_spanish: de la ofrenda ilícita
  alternatives_spanish:
  - de las cosas ilícitas
  - del rito ilícito
  - de la ofrenda ilegal
  lexicon: LSJ
  rationale: El contexto inmediato trata de carne sacrificial prohibida; «ofrenda ilícita» concreta el referente sin alejarse del trasfondo cultual. «Ilícita» preserva el matiz legal/moral de παράνομα.
- source_word: σπλαγχνισμοῦ
  english_pob_choice: because of their long-standing acquaintance with the man
  chosen_spanish: por su antiguo conocimiento del hombre
  alternatives_spanish:
  - por compasión
  - por su antigua amistad con el hombre
  - movidos por compasión
  lexicon: LSJ
  rationale: El griego incluye compasión/piedad, pero la frase también está ligada al conocimiento previo del hombre. En español, «antiguo conocimiento» mantiene esa base relacional y evita sobreexplicar una emoción que el sintagma no aisla claramente.
- source_word: διὰ τὴν ἐκ τῶν παλαιῶν χρόνων πρὸς τὸν ἄνδρα γνῶσιν
  english_pob_choice: because of their long-standing acquaintance with the man
  chosen_spanish: por su antiguo conocimiento del hombre
  alternatives_spanish:
  - por el conocimiento que tenían del hombre desde tiempo antiguo
  - porque lo conocían desde hacía mucho
  - por su larga familiaridad con el hombre
  lexicon: LSJ
  rationale: γνῶσις aquí es conocimiento relacional. «Antiguo conocimiento» conserva la antigüedad de la relación y evita un giro demasiado explicativo.
- source_word: ἀπολαμβάνοντες αὐτὸν κατʼ ἰδίαν ἐκάλουν
  english_pob_choice: took him aside privately and urged him
  chosen_spanish: lo llamaban aparte en privado y lo exhortaban
  alternatives_spanish:
  - lo apartaban en privado y lo llamaban
  - lo llamaban aparte y lo instaban
  - lo retiraban aparte privadamente y lo llamaban
  lexicon: LSJ
  rationale: ἀπολαμβάνω aquí sugiere apartar/separar; ἐκάλουν introduce su petición. «Lo llamaban aparte en privado» conserva ambas acciones sin forzar una sola verbolización.
- source_word: ἐνέγκοντα κρέα
  english_pob_choice: to bring meat
  chosen_spanish: traer carne
  alternatives_spanish:
  - traer carne
  - llevar carne
  - presentar carne
  lexicon: LSJ
  rationale: «Carne» es el equivalente natural de κρέα en español bíblico y mantiene la concreción alimentaria del pasaje.
- source_word: οἷς καθῆκον αὐτῷ χρᾶσθαι
  english_pob_choice: that was proper for him to use
  chosen_spanish: que fuera conveniente para que él la usara
  alternatives_spanish:
  - que fuera apropiada para que él la comiera
  - que le fuera lícito usarla
  - que le correspondiera usar
  lexicon: LSJ
  rationale: καθῆκον expresa lo conveniente o debido; χρᾶσθαι es más amplio que «comer». «Usara» conserva la amplitud, mientras «conveniente» transmite el juicio de adecuación.
- source_word: διʼ αὐτοῦ παρασκευασθέντα
  english_pob_choice: prepared by himself
  chosen_spanish: preparada por él mismo
  alternatives_spanish:
  - preparada por él
  - hecha por él mismo
  - preparada bajo su propio control
  lexicon: LSJ
  rationale: La expresión marca contraste con la carne sacrificial. «Por él mismo» mantiene esa oposición y suena natural en español.
- source_word: ὑποκρῖναι
  english_pob_choice: to pretend
  chosen_spanish: a fingir
  alternatives_spanish:
  - a fingir
  - a simular
  - a aparentar
  lexicon: LSJ
  rationale: ὑποκρίνομαι aquí significa claramente fingir/simular. «A fingir» es breve, claro y fiel al sentido.
- source_word: τὰ ὑπὸ τοῦ βασιλέως τεταγμένα
  english_pob_choice: that had been ordered by the king
  chosen_spanish: que había sido ordenada por el rey
  alternatives_spanish:
  - que el rey había ordenado
  - que había sido prescrita por el rey
  - que había sido dispuesta por el rey
  lexicon: LSJ
  rationale: El participio perfecto pasivo subraya una disposición ya establecida. «Había sido ordenada» refleja bien la decisión real y enlaza con el contexto de coerción.
- source_word: τῶν ἀπὸ τῆς θυσίας κρεῶν
  english_pob_choice: the meat from the sacrifice
  chosen_spanish: la carne de la ofrenda
  alternatives_spanish:
  - la carne del sacrificio
  - la carne de la ofrenda sacrificial
  - la carne procedente del sacrificio
  lexicon: LSJ
  rationale: El genitivo especifica el origen sacrificial. «De la ofrenda» mantiene la referencia cultual de modo natural en español, sin perder el sentido de carne proveniente del sacrificio.
theological_decisions:
- issue: Traducción de τὰ παράνομα en contexto sacrificial
  english_pob_reading: Rendered concretely as 'the unlawful sacrifice' rather than abstract 'unlawful things.'
  chosen_spanish_reading: «la ofrenda ilícita»
  alternative_spanish_readings:
  - las cosas ilícitas
  - el rito ilícito
  - el sacrificio ilícito
  rationale: El contexto inmediato no es abstracto, sino la presión para participar de carne sacrificial prohibida. «Ofrenda ilícita» concreta el asunto cultual y conserva el juicio moral/legal sin volverlo genérico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Matiz de σπλαγχνισμοῦ
  english_pob_reading: Compassion is conveyed through the whole clause rather than by a separate explicit noun gloss.
  chosen_spanish_reading: Se mantiene unido al antecedente relacional («por su antiguo conocimiento del hombre») sin añadir una glosa emocional separada.
  alternative_spanish_readings:
  - por compasión
  - movidos por compasión
  rationale: 'El griego permite oír compasión, pero la sintaxis del pasaje no la destaca sola. La redacción española conserva esa tensión: conocimiento previo y trato considerado, sin aislar una emoción como si fuera el único motor.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste del audit trail inglés que precisó el referente sacrificial y mantuvo la idea de carne concreta. También conserva la tensión interpretativa de σπλαγχνισμοῦ: no se borra la compasión, pero tampoco se sobreimpone como único matiz.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la convención del proyecto cuando no aparece el Tetragrámaton en este versículo.
  - «Carne» se emplea para κρέα en sentido alimentario/sacrificial, en línea con el contexto narrativo.
  - «Ofrenda ilícita» busca ser comprensible y fiel al marco cultual sin recurrir a un calco duro.
