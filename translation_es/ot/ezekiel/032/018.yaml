base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/018.yaml
  text: Son of man[a], wail over the multitude of Egypt, and bring her down, her and the daughters of mighty nations, to the land beneath[c][b], with those who go down to the pit.
  footnotes:
  - marker: a
    text: Or 'lament over the hordes of Egypt.' The Hebrew word can denote a multitude or throng.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the daughters of mighty nations,' a figurative expression for nations or peoples associated with Egypt.
    reason: cultural_note
  - marker: c
    text: Or 'the lower earth' or 'the netherworld.' The Hebrew speaks of the realm beneath, associated with the dead.
    reason: alternative_reading
