translation:
  language: es
  text: Tu arco está descubierto; las varas están juradas por mandato[a]. Selah[b]. Con ríos partes la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de «las varas están juradas por mandato» es difícil y también puede entenderse como «se pronunciaron juramentos a las tribus» o de manera semejante, conservando las ideas de juramentos, varas/tribus y palabra hablada.
    reason: alternative_reading
  - marker: b
    text: O «tribus» para «varas»; el hebreo מַטּוֹת puede entenderse de cualquiera de las dos maneras en este contexto poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְיָה
  english_pob_choice: laid bare
  chosen_spanish: desnudo
  alternatives_spanish:
  - descubierto
  - desnudo/a la vista
  lexicon: HALOT
  rationale: El hebreo expresa desnudez o exposición. Para el arco, «desnudo» comunica la imagen bélica de algo expuesto o sin cobertura, sin añadir más de lo que el texto permite.
- source_word: תֵעוֹר
  english_pob_choice: is laid bare
  chosen_spanish: está
  alternatives_spanish:
  - es descubierto
  - es desenvainado
  lexicon: HALOT
  rationale: El verbo en nifal aquí probablemente desarrolla la idea de quedar expuesto o despojado; en español, junto con «desnudo» ya comunica esa apertura del arco sin sobrecargar el verso.
- source_word: קַשְׁתֶּךָ
  english_pob_choice: your bow
  chosen_spanish: tu arco
  alternatives_spanish:
  - tu arco de guerra
  - tu arco
  lexicon: HALOT
  rationale: Renderiza de forma directa el sustantivo y el sufijo de 2 ms. «Tu arco» conserva la dirección a Dios y la imaginería militar.
- source_word: שְׁבֻעוֹת
  english_pob_choice: sworn
  chosen_spanish: fueron jurados
  alternatives_spanish:
  - juramentos
  - juradas
  lexicon: HALOT
  rationale: El sustantivo plural apunta a juramentos, pero la cláusula es elíptica. «Fueron jurados» mantiene la referencia al acto juramentado sin resolver indebidamente la construcción ambigua.
- source_word: מַטּוֹת
  english_pob_choice: the rods
  chosen_spanish: los bastones
  alternatives_spanish:
  - las tribus
  - las varas
  lexicon: HALOT
  rationale: El término puede significar bastones/varas y también tribus. Dado el contexto poético y la decisión inglesa de no neutralizar la tensión, «bastones» preserva la imagen concreta, dejando abierta la alternativa interpretativa en nota.
- source_word: אֹמֶר
  english_pob_choice: by command
  chosen_spanish: por mandato
  alternatives_spanish:
  - por palabra
  - por decreto
  lexicon: HALOT
  rationale: «Omer» es literalmente palabra/expresión; en español, «por mandato» recoge la fuerza de un dicho autoritativo sin imponer una lectura más específica de la que permite el hebreo comprimido.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional porque su función exacta es incierta y traducirla fingiría una certeza que el texto no ofrece.
- source_word: נְהָרֹות
  english_pob_choice: with rivers
  chosen_spanish: Con ríos
  alternatives_spanish:
  - con los ríos
  - por ríos
  lexicon: HALOT
  rationale: El plural se conserva. La relación instrumental o acompañante se expresa de manera natural en español con «con ríos».
- source_word: תְּבַקַּע
  english_pob_choice: you split
  chosen_spanish: partes
  alternatives_spanish:
  - quiebras
  - abres paso
  lexicon: HALOT
  rationale: El piel 2 ms de בקע expresa cortar o dividir. «Partes» es idiomático en español y preserva la acción dirigida a la tierra.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En el contexto de una teofanía cósmica, el hebreo puede referirse a la tierra o al mundo. «La tierra» mantiene naturalidad en español y no reduce indebidamente la escala del pasaje.
theological_decisions:
- issue: Cláusula difícil שְׁבֻעוֹת מַטּוֹת אֹמֶר
  english_pob_reading: the rods are sworn by command
  chosen_spanish_reading: los bastones fueron jurados por mandato
  alternative_spanish_readings:
  - juramentos de las tribus fueron dichos
  - jurados están los bastones de la palabra
  - tus flechas fueron juradas conforme a la palabra
  rationale: La sintaxis hebrea es muy condensada y debatida. La versión española conserva los elementos semánticos principales —juramento, bastones/tribus y mandato/palabra— sin decidir indebidamente entre lecturas alternativas. Así se mantiene la tensión textual documentada por la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente del expediente permaneció sin cambios; esta versión española sigue el mismo estado textual y conserva la ambigüedad documentada en la cláusula central sin intentar resolverla más allá de lo que el hebreo y la POB inglesa permiten.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado del proyecto cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se traduce la imaginería de forma sobria y poética, evitando explicaciones en el cuerpo del verso.
  - Se conserva «Selah» transliterado por la incertidumbre funcional del término.
  - «Bastones» se usa por fuerza léxica; la alternativa «tribus» queda preservada en nota para no borrar la tensión interpretativa.
