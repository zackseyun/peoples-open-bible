translation:
  language: es
  text: 'Y Gorgias llegó al campamento de Judas de noche, y no encontró a nadie; y los buscaba en las montañas, porque decía: «Estos hombres están huyendo de nosotros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campa
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή se refiere al lugar donde está acampado un ejército. «Campamento» es natural en español, mantiene el sentido militar y evita una forma demasiado técnica o arcaica.
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: LSJ
  rationale: El genitivo adverbial indica tiempo. «De noche» es breve, idiomático y conserva el tono narrativo conciso del griego.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: LSJ
  rationale: Como objeto directo de «encontró», «a nadie» es la opción más natural en español y expresa bien la negación total del objeto buscado.
- source_word: ἐζήτει
  english_pob_choice: was seeking
  chosen_spanish: los buscaba
  alternatives_spanish:
  - los buscaba con insistencia
  - los andaba buscando
  lexicon: LSJ
  rationale: El imperfecto expresa acción en curso. En español, «los buscaba» comunica esa duración de manera clara y más natural que un calco más solemne; conserva la idea de búsqueda continua.
- source_word: ἐν τοῖς ὄρεσιν
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en los montes
  - en la región montañosa
  lexicon: LSJ
  rationale: ὄρη puede renderizarse como «montañas» o «montes». «Montañas» es directo y transparente para el lector moderno, sin introducir una interpretación adicional como «región montañosa».
- source_word: Φεύγουσιν
  english_pob_choice: are fleeing
  chosen_spanish: están huyendo
  alternatives_spanish:
  - huyen
  - van huyendo
  lexicon: LSJ
  rationale: El presente en discurso directo expresa una acción en curso tal como la percibe Gorgias. «Están huyendo» preserva ese aspecto progresivo mejor que un presente simple.
- source_word: οὗτοι
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estos
  - estas gentes
  lexicon: LSJ
  rationale: El demostrativo apunta al grupo de Judas. «Estos hombres» explicita el referente de forma natural en el contexto militar, sin añadir contenido extra.
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de entre nosotros
  - lejos de nosotros
  lexicon: LSJ
  rationale: La preposición ἀπό marca separación. «De nosotros» reproduce de forma directa la idea de movimiento/alejamiento desde el punto de referencia de Gorgias.
theological_decisions:
- issue: La frase de Gorgias presupone una interpretación estratégica sobre la retirada de Judas, no una afirmación doctrinal explícita.
  english_pob_reading: These men are fleeing from us.
  chosen_spanish_reading: Estos hombres están huyendo de nosotros.
  alternative_spanish_readings:
  - Estos hombres huyen de nosotros.
  - Estos hombres están escapando de nosotros.
  rationale: No hay tensión doctrinal principal en este versículo; la decisión afecta sobre todo el valor aspectual del presente. Se conserva el juicio inmediato de Gorgias sin intensificarlo más allá de lo que dice el griego.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que prefirió «was seeking» sobre «was looking for» por un matiz más formal y directo. En español se refleja ese mismo nivel con «los buscaba», manteniendo el imperfecto durativo sin sobrecargar el estilo.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Gorgias» sin adaptación.
  - Se usa «campamento» para el contexto militar, coherente con el griego παρεμβολή.
  - No se introduce terminología eclesiástica ajena al pasaje.
  - La negación y el objeto directo se expresan de forma natural en español con «no encontró a nadie».
  - El discurso directo conserva el sentido de percepción inmediata y movimiento en curso con «están huyendo».
