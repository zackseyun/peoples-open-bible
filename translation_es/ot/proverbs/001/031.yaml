review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: consecuencia moral, imagen de comer del fruto de su propio camino, y saciarse con el resultado de sus propias deliberaciones. «camino» para דַרְכָּם y «consejos» para מֹעֲצֹתֵיהֶם siguen razonablemente el rastro del POB inglés. Sin embargo, el anclaje y contenido de las notas alternativas están invertidos respecto de las expresiones relevantes del texto, y una alternativa española dice «tendrán harta su propia decisión», que no es español natural ni representa bien el plural מֹעֲצוֹתֵיהֶם.'
  spanish_quality_summary: 'La frase principal es clara y digna. «Así que comerán del fruto de su camino, y se saciarán con sus propios consejos» es legible y fiel. El problema principal es editorial: las notas [a]/[b] no corresponden a los segmentos correctos, y la nota con «tendrán harta su propia decisión» suena antinatural y además cambia plural por singular. Conviene reparar las notas y pulir la alternativa a una formulación idiomática.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. «camino» para דַרְכָּם y «consejos» para מֹעֲצוֹתֵיהֶם son compatibles con las decisiones auditadas. «se saciarán» comunica bien יִשְׂבָּעוּ. No se detectan choques con Yahvé/Mesías/Espíritu/etc.
  issues:
  - severity: medium
    issue: Las notas [a] y [b] están ancladas al segmento equivocado.
    rationale: La nota sobre «y comerán...» corresponde a וְיֹאכְלוּ / «Así que comerán», mientras que la nota sobre «se saciarán...» corresponde a יִשְׂבָּעוּ / «se saciarán con sus propios consejos». En el texto actual aparecen como [b][a] tras «camino», lo que desordena la referencia y no sigue correctamente el rastro del POB inglés.
  - severity: medium
    issue: La nota alternativa «tendrán harta su propia decisión» es español no idiomático y semánticamente impreciso.
    rationale: «Tendrán harta» no es una formulación natural aquí, «decisión» cambia el plural de מֹעֲצוֹתֵיהֶם a singular, y además estrecha indebidamente el campo semántico de ‘counsels/plans’. Una alternativa mejor sería «quedarán satisfechos con sus propios consejos» o «tendrán bastante de sus propios planes».
  - severity: low
    issue: La puntuación con coma antes de «y» es opcionalmente mejorable.
    rationale: 'En español puede omitirse la coma en una coordinación simple: «..., y ...» no es incorrecto, pero «... y ...» fluye de manera más natural en este contexto breve.'
  revised_spanish_text: Así que[a] comerán del fruto de su camino, y se saciarán[b] con sus propios consejos.
