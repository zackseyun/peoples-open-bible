translation:
  language: es
  text: Yahvé es justo en todos sus caminos, y fiel en todas sus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bondadoso' o 'amable'; algunas traducciones leen 'santo' aquí, reflejando una tradición textual distinta de la idea masorética de 'fiel' o 'constante'.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: —
  rationale: Se preserva el nombre divino del Tetragrámaton como transliteración reverente y transparente, en línea con la política del POB y el antecedente inglés 'Yahweh'.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: '''Justo'' comunica bien la rectitud moral y judicial de Yahvé en español bíblico contemporáneo; ''recto'' es posible, pero menos natural en esta construcción elogiosa.'
- source_word: בְּכָל
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - en todo
  - a lo largo de
  lexicon: HALOT
  rationale: 'La preposición expresa ámbito o esfera: ''en todos'' conserva la idea de totalidad en sus caminos y en sus obras sin forzar una paráfrasis.'
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su conducta
  lexicon: HALOT
  rationale: '''Caminos'' mantiene la metáfora bíblica habitual para el modo de obrar de Dios y preserva el paralelismo con ''obras''.'
- source_word: חָסִיד
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - bondadoso
  - amable
  - santo
  - misericordioso
  lexicon: HALOT
  rationale: En este paralelismo con 'justo' y referido a las acciones divinas, 'fiel' transmite mejor la idea de lealtad/covenantal reliability que subyace al término. Se evita 'santo' porque responde a otra tradición textual, no al hebreo masorético aquí.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - todo lo que hace
  lexicon: HALOT
  rationale: '''Obras'' conserva la forma elevada y el paralelismo formal con ''caminos'', además de representar bien las acciones de Dios.'
theological_decisions:
- issue: Renderización de חָסִיד en referencia al carácter de Yahvé
  english_pob_reading: faithful
  chosen_spanish_reading: fiel
  alternative_spanish_readings:
  - bondadoso
  - amable
  - santo
  - misericordioso
  rationale: Se sigue el texto masorético y se traduce el término por su fuerza de lealtad confiable. 'Santo' se mantiene como alternativa documentada en nota, no como texto principal, porque refleja otra tradición textual distinta.
  doctrine_reference: Primacía del texto original y preservación de la tensión textual/documental sin harmonizarla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y el audit trail inglés, manteniendo el paralelo 'justo... fiel' y conservando en nota la alternativa textual 'santo' documentada por la POB en inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - '''justo'' y ''fiel'' preservan el paralelismo y la carga moral/covenantal del verso.'
  - '''obras'' se eligió por naturalidad y por mantener el paralelismo con ''caminos''.'
