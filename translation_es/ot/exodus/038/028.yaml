revisions:
- from: Y con el mil setecientos setenta y cinco hizo ganchos para las columnas, cubrió sus partes superiores y les hizo bandas[a].
  to: Y con mil setecientos setenta y cinco hizo ganchos para las columnas, recubrió sus cabezas y les hizo bandas[a].
  rationale: Se corrige la cifra a una forma idiomática en español, se afina רָאשֵׁיהֶם con «cabezas» en vez de la vaga «partes superiores», y se pule la nota al pie para mayor naturalidad manteniendo la alternativa léxica documentada.
