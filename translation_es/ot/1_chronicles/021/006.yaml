revisions:
- from: Pero no contó a Leví y Benjamín entre ellos[a], porque la palabra del rey le resultó detestable a Joab.
  to: Pero no contó a Leví y Benjamín entre ellos, porque la orden[a] del rey era detestable para Joab.
  rationale: Se cambia «la palabra del rey» por «la orden del rey» para reflejar mejor el sentido contextual de דְּבַר הַמֶּלֶךְ en una orden de censo, en línea con la decisión principal del POB inglés. Se reubica la nota al sintagma correcto y se conserva «palabra» como alternativa léxica documentada. La redacción se alisa en español sin apartarse del hebreo.
