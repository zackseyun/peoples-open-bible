translation:
  language: es
  text: Dejen en paz la obra de esta casa de Dios[a]; que el gobernador de los judíos y los ancianos de los judíos reedifiquen esta casa de Dios en su sitio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» en lugar de «los judíos». El término arameo puede designar al pueblo de Judá en sentido étnico o regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֻקוּ
  english_pob_choice: Leave ... alone
  chosen_spanish: Dejen en paz
  alternatives_spanish:
  - Dejen
  - Dejen sola
  lexicon: HALOT
  rationale: El imperativo plural en arameo imperial expresa una orden de desistir de interferir. En español, «dejen en paz» comunica con naturalidad la fuerza prohibitiva de «leave ... alone» sin suavizarla ni volverla excesivamente literal.
- source_word: לַעֲבִידַת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: En este contexto de reconstrucción del templo, «obra» comunica mejor la actividad de edificación que un término más general o más técnico como «servicio».
- source_word: בֵּית אֱלָהָא דֵךְ
  english_pob_choice: this house of God
  chosen_spanish: esta casa de Dios
  alternatives_spanish:
  - esa casa de Dios
  - aquella casa de Dios
  lexicon: HALOT
  rationale: El deíctico arameo señala el templo específico del que se está hablando. «Esta casa de Dios» refleja esa inmediatez con naturalidad en español.
- source_word: פַּחַת
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el sátrapa
  - el gobernador provincial
  lexicon: HALOT
  rationale: פַּחַת designa un funcionario gobernante. «Gobernador» es la equivalencia más clara y menos engañosa para el lector español.
- source_word: יְהוּדָיֵא
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - de Judá
  lexicon: HALOT
  rationale: Siguiendo el criterio del POB en inglés, «judíos» conserva la referencia habitual y comprensible, aunque el término también pueda abarcar un sentido etnogeográfico vinculado a Judá.
- source_word: וּלְשָׂבֵי יְהוּדָיֵא
  english_pob_choice: and the elders of the Jews
  chosen_spanish: y los ancianos de los judíos
  alternatives_spanish:
  - y los ancianos de Judá
  - y los dirigentes de los judíos
  lexicon: HALOT
  rationale: שָׂבֵי es «ancianos» en sentido de líderes comunitarios. Conservé el paralelismo del inglés POB y el valor administrativo del término.
- source_word: יִבְנוֹן
  english_pob_choice: let ... rebuild
  chosen_spanish: reedifiquen
  alternatives_spanish:
  - construyan de nuevo
  - edifiquen
  lexicon: HALOT
  rationale: La forma imperfecta plural funciona aquí como jussivo en contexto de decreto. «Reedifiquen» expresa con concisión la acción de reconstruir el templo, manteniendo el matiz de restauración.
- source_word: עַל אַתְרֵהּ
  english_pob_choice: on its site
  chosen_spanish: en su lugar
  alternatives_spanish:
  - sobre su sitio
  - en su sitio
  lexicon: HALOT
  rationale: אַתַר es «lugar» o «sitio». «En su lugar» es una fórmula natural en español para indicar reconstrucción en la ubicación original.
theological_decisions:
- issue: Referencia al pueblo de Judá/Judíos
  english_pob_reading: Or 'the Judeans' instead of 'the Jews.' The Aramaic term can denote the people of Judah in either an ethnic or regional sense.
  chosen_spanish_reading: O «los judeanos» en lugar de «los judíos». El término arameo puede designar al pueblo de Judá en sentido étnico o regional.
  alternative_spanish_readings:
  - los judeanos
  - el pueblo de Judá
  rationale: Mantengo «judíos» en el texto principal por continuidad con el POB inglés y por claridad lectoral, pero preservo la tensión lexical en la nota porque el término puede abarcar una designación étnica o regional más precisa.
  doctrine_reference: Lexical ambiguity / historical ethnography
translation_notes:
  revision_awareness: El contexto de revisión muestra acuerdo alto y sin cambios sustantivos en la última pasada; la redacción española sigue de cerca el sentido del texto fuente y el trazado auditado del POB inglés, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Conservo «casa de Dios» de manera uniforme para בֵּית אֱלָהָא.
  - Uso «gobernador» para פַּחַת, evitando términos más técnicos que podrían oscurecer el cargo.
  - Mantengo el orden de mandato + permiso en una sola frase, como en el inglés POB, para reflejar la fuerza administrativa del decreto.
  - «Reedifiquen» preserva el componente de restauración implícito en el contexto de reconstrucción del templo.
