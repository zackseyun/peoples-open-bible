    text: A schoenus was an ancient unit of distance; its exact length varied by context and region.
    reason: cultural_note
  - marker: b
    text: Or 'was besieging it.' The Greek verb literally means 'was pressing' or 'was afflicting,' and here likely refers to military pressure against Beth-zur.
