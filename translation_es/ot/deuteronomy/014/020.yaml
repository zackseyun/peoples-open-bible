lexical_decisions:
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - toda
  - toda clase de
  lexicon: HALOT
  rationale: El cuantificador abarca libremente la categoría indicada; en español, con un verbo permisivo, «cualquier» comunica mejor la idea de permiso dentro de la clase de aves limpias sin sonar forzado.
- source_word: עוֹף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave alada
  - fowl
  lexicon: HALOT
  rationale: En este contexto dietético, el término se refiere a aves como categoría alimentaria. «Ave» es más amplio y natural que «pájaro», y refleja bien el campo semántico del hebreo.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpia
  alternatives_spanish:
  - pura
  - ritualmente limpia
  lexicon: HALOT
  rationale: Aquí se trata de la categoría ritual de alimentos permitidos. «Limpia» es la equivalencia habitual y comprensible en español para ese contraste legal, sin reducirlo a pureza moral.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you may eat
  chosen_spanish: pueden comer
  alternatives_spanish:
  - comerán
  - deben comer
  - podrán comer
  lexicon: HALOT
  rationale: El imperfecto plural en ley expresa permiso o autorización en contexto. «Pueden comer» transmite esa fuerza permisiva de manera natural en español.
translation_notes:
