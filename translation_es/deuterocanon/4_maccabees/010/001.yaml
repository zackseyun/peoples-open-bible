translation:
  language: es
  text: Y después de haber soportado esta muerte[a], digna de ser cantada, el tercero fue hecho pasar[b], siendo muy instado por muchos a salvarse al probarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''su muerte célebre'' o ''su muerte renombrada''. El adjetivo griego sugiere literalmente una muerte ''cantada'' o celebrada en alabanza.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, al probar el alimento prohibido y así conservar la vida.
    reason: cultural_note
lexical_decisions:
- source_word: ἀοίδιμον
  english_pob_choice: worthy to be sung of
  chosen_spanish: digna de ser cantada
  alternatives_spanish:
  - renombrada
  - célebre
  - gloriosa
  - digna de ser recordada en canto
  lexicon: LSJ
  rationale: El adjetivo tiene un matiz de algo que merece ser cantado o celebrado. 'Digna de ser cantada' conserva el tono elevado y el valor etimológico sin volverlo artificial en español.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - morir
  - fallecimiento
  lexicon: LSJ
  rationale: El sustantivo nombra directamente la muerte; 'muerte' mantiene el énfasis en el final del mártir, como en el griego y en la auditoría inglesa.
- source_word: καρτερήσαντος
  english_pob_choice: had endured
  chosen_spanish: haber soportado
  alternatives_spanish:
  - haber sufrido
  - haber perseverado en
  - haber resistido
  lexicon: LSJ
  rationale: El participio expresa resistencia firme bajo sufrimiento. 'Soportado' comunica bien la idea de aguante perseverante en español sin añadir interpretación excesiva.
- source_word: ὁ τρίτος ἤγετο
  english_pob_choice: the third was led in
  chosen_spanish: el tercero fue llevado
  alternatives_spanish:
  - el tercero fue conducido
  - el tercero fue traído
  - el tercero fue introducido
  lexicon: LSJ
  rationale: La voz pasiva indica que el tercero es traído hacia la escena. 'Fue llevado' es natural y amplio; evita especificar más de lo que el griego dice.
- source_word: παρακαλούμενος πολλὰ ὑπὸ πολλῶν
  english_pob_choice: being urged much by many
  chosen_spanish: mientras muchos lo exhortaban insistentemente
  alternatives_spanish:
  - mientras muchos le rogaban con insistencia
  - siendo exhortado mucho por muchos
  - mientras muchos lo animaban repetidas veces
  lexicon: LSJ
  rationale: La frase intensifica tanto la cantidad de exhortaciones como el número de quienes hablan. 'Exhortaban insistentemente' reproduce bien el doble énfasis sin sonar forzado.
- source_word: ὅπως ἀπογευσάμενος σώζοιτο
  english_pob_choice: to save himself by tasting it
  chosen_spanish: para que se salvara con solo probarla
  alternatives_spanish:
  - para salvarse al probarla
  - para preservar su vida con solo probarla
  - para escapar con solo probarla
  lexicon: LSJ
  rationale: ἀπογευσάμενος significa 'habiendo probado' o 'al probar'. El objeto se entiende por contexto como el alimento prohibido; 'probarla' mantiene esa referencia implícita y el resultado de conservar la vida.
theological_decisions:
- issue: Tono honorífico de ἀοίδιμον θάνατον
  english_pob_reading: Render with elevated language ('death, worthy to be sung of')
  chosen_spanish_reading: 'Mantener un lenguaje honorífico: ''muerte, digna de ser cantada'''
  alternative_spanish_readings:
  - muerte célebre
  - muerte gloriosa
  - muerte memorable
  rationale: El texto exalta la muerte martirial con una fórmula laudatoria. 'Digna de ser cantada' conserva esa elevación sin introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Objeto implícito de ἀπογευσάμενος
  english_pob_reading: Supply 'it' in English
  chosen_spanish_reading: Mantener un objeto implícito por el contexto, reflejado en 'probarla'
  alternative_spanish_readings:
  - nombrar explícitamente 'el alimento prohibido'
  - dejar el verbo sin complemento
  rationale: El griego no expresa el objeto, pero el contexto lo hace evidente. En español, el clítico 'la' evita sobreexplicar y conserva la economía del original.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Seguí la revisión más reciente del texto inglés al reflejar la estructura del participio genitivo absoluto con 'Y después de haber soportado...'. También conservé el matiz laudatorio de ἀοίδιμον con una formulación española natural y mantuve la compresión del griego en la frase final, donde el objeto de 'probar' queda implícito por contexto.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Mantuve 'muerte' para θάνατον y no lo suavicé a 'morir' para conservar el sustantivo del original.
  - Elegí 'fue llevado' como equivalente amplio de ἤγετο sin sobreespecificar la escena.
  - La referencia implícita del alimento se dejó en 'probarla', con resolución contextual en la nota, para no añadir palabras ajenas al griego.
