    issue: ‘para cortar de ella a hombre y bestia’ es un calco poco natural
    rationale: Aunque intenta conservar ‘cut off’, en español la construcción no funciona bien. Debe reformularse para expresar la eliminación de la tierra sin perder la resonancia de juicio.
  - severity: low
    issue: ‘aquella tierra’ suena algo más distante y rígido de lo necesario
    rationale: ‘Esa tierra’ es más natural en español general y sigue representando bien הָאָרֶץ הַהִיא en este contexto.
  revised_spanish_text: O si envío una plaga contra esa tierra y derramo mi ira sobre ella con sangre[a], para eliminar de ella a hombre y bestia,
  revised_footnotes:
