    issue: «eran invencibles» puede sobreafirmar ἀνικήτους en español
    rationale: Aunque es una opción posible, «invencibles» en español puede sonar más rotundo y absoluto. En este contexto narrativo, «no podían ser vencidos» conserva mejor la fuerza de unconquerable sin imponer una cualidad casi técnica o heroica.
  - severity: low
    issue: Punto final al final del versículo
    rationale: El griego queda sintácticamente abierto con προαποστείλας y el inglés auditado también deja la frase en continuidad hacia el siguiente versículo. En español conviene no cerrarla con punto si la edición por unidades permite mantener esa continuidad.
