translation:
  language: es
  text: Acab también hizo la Aserá[a], y Acab siguió haciendo más para provocar a Yahvé, el Dios de Israel, que todos los reyes de Israel que fueron antes de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el poste de Aserá’. El hebreo אֲשֵׁרָה puede referirse a la diosa Aserá o al objeto cultual asociado con ella.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo para sí
  - levantó
  - fabricó
  lexicon: HALOT
  rationale: עָשָׂה tiene el sentido básico de ‘hacer’. En español, ‘hizo’ es la forma más directa y natural para conservar la amplitud del verbo sin imponer una especificación interpretativa que el hebreo no exige.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Asherá
  alternatives_spanish:
  - el poste de Aserá
  - Asherá
  lexicon: HALOT
  rationale: 'Se conserva el término hebreo transliterado para mantener la ambigüedad documentada: puede referirse a la diosa Asherah o al objeto de culto asociado. En español se prefiere ‘Asherá’ como forma más transparente del término, sin resolver su referente en el texto principal.'
- source_word: וַיּוֹסֶף
  english_pob_choice: went on
  chosen_spanish: siguió
  alternatives_spanish:
  - continuó
  - prosiguió
  - añadió
  lexicon: HALOT
  rationale: יסף con infinitivo expresa continuación o incremento. ‘Siguió’ comunica bien esa continuidad en español y permite que la cláusula posterior conserve la idea de intensificación.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do more
  chosen_spanish: haciendo más
  alternatives_spanish:
  - a hacer más
  - para hacer más
  - a obrar más
  lexicon: HALOT
  rationale: En combinación con יסף y la comparación final, la construcción apunta a una intensificación de la acción. ‘Haciendo más’ refleja ese aumento de manera idiomática en español.
- source_word: לְהַכְעִיס
  english_pob_choice: to provoke
  chosen_spanish: para provocar
  alternatives_spanish:
  - para irritar
  - para enojar
  - para provocar a ira
  lexicon: HALOT
  rationale: El causativo de כעס significa ‘provocar a ira’. ‘Provocar’ es breve y natural en español; el objeto, Yahvé, queda explícito para preservar la dirección de la ofensa.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como ‘Yahvé’, conservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y reverente como ‘el Dios de Israel’, que mantiene la identificación relacional sin añadir matices ajenos al hebreo.
- source_word: מִכֹּל מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: than all the kings of Israel
  chosen_spanish: que todos los reyes de Israel
  alternatives_spanish:
  - más que todos los reyes de Israel
  - por encima de todos los reyes de Israel
  lexicon: HALOT
  rationale: 'El מן comparativo se expresa naturalmente en español con ‘que’. Así se conserva la comparación: Acab provocó más que todos los reyes anteriores de Israel.'
- source_word: אֲשֶׁר הָיוּ לְפָנָיו
  english_pob_choice: who were before him
  chosen_spanish: que habían sido antes que él
  alternatives_spanish:
  - que estaban antes que él
  - que lo precedieron
  lexicon: HALOT
  rationale: La idiomática hebrea ‘estar antes de él’ se vierte de modo claro y natural como ‘habían sido antes que él’, manteniendo la referencia a los reyes anteriores sin forzar un giro arcaico.
theological_decisions:
- issue: Referente de הָאֲשֵׁרָה
  english_pob_reading: Retain the term as 'the Asherah' without deciding between the goddess and the cultic symbol in the main text.
  chosen_spanish_reading: Mantener ‘la Asherá’ sin decidir entre la diosa y el objeto cultual en el texto principal.
  alternative_spanish_readings:
  - el poste de Aserá
  - Aserá (la diosa)
  rationale: El hebreo admite más de una referencia plausible. Como la POB inglesa preserva esa tensión, el español también la conserva en vez de cerrar el sentido con una explicación interpretativa en la línea principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada, sin cambios sustanciales respecto del último pase de revisión. Se preserva la ambigüedad de הָאֲשֵׁרָה y la comparación intensiva del cierre, con ajustes naturales de español para la secuencia verbal y la cláusula comparativa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se conserva ‘Asherá’ transliterado para no resolver prematuramente la ambigüedad léxica.
  - La comparación final usa ‘que’ para reflejar el מן comparativo del hebreo de forma idiomática en español.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni ‘poste’ en el texto principal para evitar neutralizar o decidir la tensión del original.
