translation:
  language: es
  text: Pero el pueblo tuvo muchísima sed, y nos obligaron a hacer como les habíamos dicho, y a ligarnos con un juramento[a] que no quebrantaremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a traer sobre nosotros un juramento». El griego dice literalmente: «a traer sobre nosotros un juramento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: LSJ
  rationale: Introduce una fuerte contraposición narrativa de manera natural en español.
- source_word: ὁ λαὸς ἐδίψησεν σφόδρα
  english_pob_choice: became very thirsty
  chosen_spanish: tuvo muchísima sed
  alternatives_spanish:
  - se quedó muy sediento
  - estuvo extremadamente sediento
  lexicon: LSJ
  rationale: ἐδίψησεν expresa la experiencia de sed, y σφόδρα intensifica con fuerza; en español, 'tuvo muchísima sed' suena natural y conserva la intensidad.
- source_word: ἠνάγκασαν
  english_pob_choice: compelled
  chosen_spanish: nos obligaron
  alternatives_spanish:
  - nos forzaron
  - nos constriñeron
  lexicon: LSJ
  rationale: El verbo denota coerción fuerte. 'Obligaron' comunica bien la presión sin sonar afectado.
- source_word: ποιῆσαι ἡμᾶς καθὰ ἐλάλησαν αὐτοῖς
  english_pob_choice: to do as we had said to them
  chosen_spanish: a hacer como les habíamos dicho
  alternatives_spanish:
  - a hacer conforme a lo que les habíamos dicho
  - a actuar como les habíamos hablado
  lexicon: LSJ
  rationale: Sigo la lectura auditada que entiende la referencia como lo que 'nosotros' habíamos dicho a ellos; 'les habíamos dicho' preserva la relación discursiva sin calcar la sintaxis griega.
- source_word: ἐπαγαγεῖν ἐφʼ ἡμᾶς ὅρκον
  english_pob_choice: to bring upon ourselves an oath
  chosen_spanish: a traer sobre nosotros un juramento
  alternatives_spanish:
  - a imponernos un juramento
  - a cargar sobre nosotros un juramento
  lexicon: LSJ
  rationale: Mantengo la metáfora literal de 'traer sobre nosotros' que el inglés POB decidió conservar, porque el griego habla de introducir un juramento sobre uno mismo.
- source_word: ὃν οὐ παραβησόμεθα
  english_pob_choice: that we will not break
  chosen_spanish: que no quebrantaremos
  alternatives_spanish:
  - que no violaremos
  - que no transgrediremos
  lexicon: LSJ
  rationale: Con juramentos, παραβαίνω equivale a quebrantar/violar. 'Quebrantaremos' es idiomático en español y conserva la fuerza legal del acto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió solo 'spoken' por 'said' para mayor naturalidad; la traducción española sigue directamente el sentido del griego y conserva la misma lectura auditada del sintagma, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o terminología doctrinal ajena porque este versículo no contiene el Nombre divino ni vocabulario cristológico.
  - Se mantiene 'juramento' y no 'voto', porque el griego ὅρκος designa específicamente un juramento.
  - '''Obligaron'' conserva la coerción de ἠνάγκασαν sin exagerar ni suavizar el tono.'
