translation:
  language: es
  text: Por eso[a], como a niños insensatos, enviaste el juicio para escarnio;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como a niños insensatos, enviaste el juicio para burla / en burla». El griego permite expresar la comparación y el valor de εἰς con matices ligeramente distintos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Conserva el valor inferencial del griego y suena natural en español bíblico contemporáneo sin volverlo demasiado explicativo.
- source_word: ὡς
  english_pob_choice: as to
  chosen_spanish: como a
  alternatives_spanish:
  - como
  - cual
  lexicon: LSJ
  rationale: El griego introduce una comparación de trato, no identidad literal; 'como a' preserva la fuerza comparativa y evita leer que fuesen literalmente niños.
- source_word: παισὶν
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - hijos
  - muchachos
  - siervos
  lexicon: LSJ
  rationale: En este contexto la comparación apunta a inmadurez e incapacidad de juicio; 'niños' comunica mejor esa idea que 'hijos' o 'siervos'.
- source_word: ἀλογίστοις
  english_pob_choice: senseless
  chosen_spanish: insensatos
  alternatives_spanish:
  - sin entendimiento
  - irracionales
  - necios
  lexicon: LSJ
  rationale: '''Insensatos'' preserva el juicio moral e intelectual del adjetivo y es una palabra digna y comprensible en español bíblico; ''sin entendimiento'' sería más explicativo, pero menos compacto.'
- source_word: τὴν κρίσιν
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la sentencia
  - el castigo
  - la decisión
  lexicon: LSJ
  rationale: '''Juicio'' mantiene el campo judicial del sustantivo κρίσις sin restringirlo indebidamente a castigo o sentencia penal.'
- source_word: εἰς ἐμπαιγμόν
  english_pob_choice: for mockery
  chosen_spanish: para burla
  alternatives_spanish:
  - para escarnio
  - en burla
  - para ridículo
  lexicon: LSJ
  rationale: '''Para burla'' refleja de manera directa el valor de finalidad/resultado de εἰς y conserva el tono de menosprecio de ἐμπαιγμός con español natural.'
- source_word: ἔπεμψας
  english_pob_choice: you sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - diste
  - despachaste
  lexicon: LSJ
  rationale: '''Enviaste'' reproduce con claridad el verbo de envío del griego sin reinterpretarlo como ''infligiste''.'
theological_decisions:
- issue: Si ὡς debe sonar como identidad literal o como comparación de trato
  english_pob_reading: The verse describes God as treating them like senseless children, not asserting they were literally children.
  chosen_spanish_reading: El versículo describe a Dios tratándolos como a niños insensatos, no afirmando que fueran literalmente niños.
  alternative_spanish_readings:
  - como niños insensatos
  - cual niños insensatos
  rationale: La expresión 'como a' conserva la comparación y evita una lectura ontológica indebida; mantiene la reprensión retórica del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Si κρίσις conviene traducirlo por un término más estrecho que 'juicio'
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - sentencia
  - castigo
  rationale: '''Juicio'' preserva la amplitud judicial del texto y no introduce una precisión punitiva que el griego no exige por sí mismo.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar εἰς ἐμπαιγμόν sin atenuar el desprecio implícito
  english_pob_reading: for mockery
  chosen_spanish_reading: para burla
  alternative_spanish_readings:
  - para escarnio
  - en burla
  rationale: '''Burla'' comunica el desprecio y mantiene la relación preposicional de finalidad/resultado que el griego expresa.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir una formulación que refleje εἰς ἐμπαιγμόν de modo directo mediante 'para burla', manteniendo la comparación de ὡς sin literalizarla. Se tomó en cuenta que el inglés POB ajustó la frase desde 'as a mockery' a 'for mockery' para dar mayor cercanía al griego.
  spanish_consistency_notes:
  - Se usa 'juicio' para κρίσις, consistente con el valor judicial del término en el texto.
  - Se evita 'Señor' o 'Cristo' porque el versículo no contiene esos términos.
  - Se mantiene un registro sobrio y bíblico, pero en español actual, sin calco innecesario del inglés.
