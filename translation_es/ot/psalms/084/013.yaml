translation:
  language: es
  text: ¡Yahvé de los ejércitos[a], bienaventurado[b] el hombre que confía en ti!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “de los ejércitos”; título tradicional de Yahvé que conserva la imagen de fuerzas armadas o celestiales.'
    reason: lexical_alternative
  - marker: b
    text: O “feliz” o “dichoso”. El hebreo dice “el hombre”; el singular es representativo de cualquier ser humano que confía en Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma española estándar del proyecto, en línea con el auditable 'Yahweh' del POB inglés y evitando la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - Todopoderoso
  lexicon: HALOT
  rationale: El hebreo alude al título tradicional unido a YHWH. En español, 'de los ejércitos' preserva la imagen militar/cósmica sin reinterpretarla como un atributo abstracto.
- source_word: אַשְׁרֵי
  english_pob_choice: blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: La fórmula sapiencial puede verterse como 'bienaventurado' para mantener su tono de declaración de felicidad/ventaja bajo favor divino. Se evita 'feliz' por sonar más emocional y menos enfático en español bíblico.
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo representativo y genérico. 'El hombre' conserva esa forma sin neutralizarla, coherente con la decisión auditable del POB inglés.
- source_word: בֹּטֵחַ
  english_pob_choice: who trusts
  chosen_spanish: que confía
  alternatives_spanish:
  - que se refugia
  - confiando
  lexicon: HALOT
  rationale: El participio expresa una acción característica. 'Que confía' es el equivalente directo y natural en español; 'se refugia' sería posible en otros contextos, pero aquí no es necesario forzar el matiz.
- source_word: בָּךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - en vos
  - en usted
  lexicon: HALOT
  rationale: Se mantiene la segunda persona singular directa en español moderno. 'En ti' es la forma neutral y reverente más ampliamente inteligible.
theological_decisions:
- issue: Vocativo del nombre divino con el título 'of hosts'
  english_pob_reading: O Yahweh of hosts
  chosen_spanish_reading: ¡Yahvé de los ejércitos!
  alternative_spanish_readings:
  - ¡Oh Yahvé de los ejércitos!
  - Yahvé de los ejércitos
  rationale: El hebreo es una invocación directa. En español, la exclamación inicial marca el vocativo sin añadir más explicación de la que el texto requiere. Se conserva el título divino sin ocultar el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Beatitud sapiencial en אַשְׁרֵי
  english_pob_reading: blessed is the man
  chosen_spanish_reading: Bienaventurado el hombre
  alternative_spanish_readings:
  - Feliz el hombre
  - Dichoso el hombre
  rationale: '''Bienaventurado'' transmite mejor el valor de estado favorecido por Dios que una mera emoción. Mantiene la tensión entre felicidad y favor divino presente en el hebreo y reflejada en el inglés POB.'
  doctrine_reference: Uso bíblico sapiencial de אַשְׁרֵי / beatitud
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión inglesa revisada y no requiere cambios posteriores: se mantiene la invocación directa, el nombre divino transliterado, el título ''de los ejércitos'' y la beatitud representativa del singular.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino en todo el registro.
  - Se evita 'SEÑOR' para no ocultar el Tetragrámaton.
  - '''El hombre'' conserva el singular representativo sin convertirlo en plural ni en un genérico abstracto.'
  - La exclamación inicial funciona como vocativo y respeta la sintaxis del hebreo en español natural.
