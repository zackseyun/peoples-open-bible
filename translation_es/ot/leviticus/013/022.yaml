translation:
  language: es
  text: Pero si se sigue extendiendo en la piel[a], el sacerdote lo declarará impuro; es una infección[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se extiende». El hebreo usa una construcción enfática que intensifica la idea de propagación.
    reason: lexical_alternative
  - marker: b
    text: O «una enfermedad», «una plaga» o «una mancha infectada». El término hebreo es amplio y no corresponde con precisión a una categoría médica moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La combinación hebrea introduce una condición con matiz de contraste respecto del caso anterior; en español, «Pero si» conserva mejor esa fuerza adversativa que un simple «si».
- source_word: פָּשֹׂה תִפְשֶׂה
  english_pob_choice: it does spread
  chosen_spanish: se sigue extendiendo
  alternatives_spanish:
  - se extiende
  - se ha extendido mucho
  - sigue extendiéndose
  lexicon: HALOT
  rationale: La construcción intensiva hebrea expresa propagación marcada. «Se sigue extendiendo» comunica esa idea con naturalidad en español sin exagerar el alcance.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - en la piel
  - sobre la piel
  - en la carne
  lexicon: HALOT
  rationale: «Piel» es el equivalente más natural y claro en español para עוֹר en este contexto diagnóstico. «En la piel» conserva el valor local de la preposición.
- source_word: וְטִמֵּא
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo declarará inmundo
  - lo hará impuro
  lexicon: HALOT
  rationale: En contexto sacerdotal-legal, el verbo no indica que el sacerdote cause la impureza, sino que emite un dictamen formal. «Declarará impuro» conserva ese valor jurídico; «impuro» mantiene la categoría ritual sin imponer un lenguaje eclesiástico más tradicional que el hebreo no exige.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el presbítero
  lexicon: HALOT
  rationale: «Sacerdote» es la correspondencia directa y ampliamente inteligible para כֹּהֵן en Levítico. «Presbítero» sería anacrónico en este contexto.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo
  lexicon: HALOT
  rationale: El objeto directo se refiere a la persona examinada. En español, el clítico «lo» resulta más natural y mantiene la referencia personal del hebreo.
- source_word: נֶגַע
  english_pob_choice: infection
  chosen_spanish: infección
  alternatives_spanish:
  - aflicción
  - plaga
  - llaga infectada
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa más reciente, «infección» comunica bien la idea de un estado extendido y patológico en este contexto, aunque el término hebreo sigue siendo más amplio que una categoría médica moderna estricta.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es
  - eso es
  lexicon: HALOT
  rationale: 'La cláusula nominal final se expresa de forma breve y natural en español: «es una infección». El pronombre implícito se recupera por el contexto.'
theological_decisions:
- issue: Pronunciamiento sacerdotal de impureza ritual
  english_pob_reading: The priest formally pronounces the person unclean rather than causing uncleanness by the act itself.
  chosen_spanish_reading: el sacerdote lo declarará impuro
  alternative_spanish_readings:
  - el sacerdote lo hará impuro
  - el sacerdote lo pronunciará impuro
  rationale: La forma elegida preserva la función diagnóstica y judicial del sacerdote en el marco levítico, evitando sugerir que su palabra produce mágicamente la impureza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió la última revisión del inglés POB, que cambió la glosa de נֶגַע de «affliction» a «infection». Por eso se optó por «infección» en español, manteniendo la lectura reciente y el resto de la frase estable. También se preservó la decisión auditada de entender וְטִמֵּא como un pronunciamiento sacerdotal formal, no como una causación de impureza.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן, coherente con Levítico.
  - Se usa «impuro» para טמא en sentido ritual, no médico.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Piel» se eligió como término natural para עוֹר en el contexto dermatológico-legal.
  - La puntuación reproduce una cadencia reverente y clara, apta para lectura pública.
