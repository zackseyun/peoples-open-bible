translation:
  language: es
  text: Construyó la estructura lateral adosada a toda la casa[a], de cinco codos de altura, y quedó unida a la casa con maderas de cedro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cámaras laterales»; el término hebreo probablemente se refiere a la construcción lateral adosada que corría a lo largo del templo.
    reason: lexical_alternative
  - marker: b
    text: O «fue unida a la casa con vigas de cedro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Construyó
  alternatives_spanish:
  - Y construyó
  - Él construyó
  lexicon: HALOT
  rationale: El wayyiqtol de בנה expresa acción narrativa pasada; en español, «construyó» comunica de manera natural la secuencia sin sobrecargar con la conjunción inicial. Se mantiene el sentido de edificación arquitectónica.
- source_word: היצוע
  english_pob_choice: the side structure
  chosen_spanish: la estructura lateral
  alternatives_spanish:
  - las cámaras laterales
  - el anexo
  - la plataforma lateral
  lexicon: HALOT
  rationale: El término hebreo parece designar la construcción lateral adosada al templo. «Estructura lateral» conserva amplitud semántica y evita decidir prematuramente entre cámaras, plataforma o anexo.
- source_word: עַל כָּל הַבַּיִת
  english_pob_choice: against the whole house
  chosen_spanish: contra toda la casa
  alternatives_spanish:
  - a lo largo de toda la casa
  - alrededor de toda la casa
  - junto a toda la casa
  lexicon: HALOT
  rationale: עַל aquí es espacial y de adosamiento. «Contra» refleja la proximidad/adhesión sin expandir el texto a una interpretación más específica que el hebreo no exige.
- source_word: חָמֵשׁ אַמּוֹת קֹמָתוֹ
  english_pob_choice: five cubits high
  chosen_spanish: de cinco codos de altura
  alternatives_spanish:
  - cinco codos de alto
  - su altura era de cinco codos
  lexicon: HALOT
  rationale: La frase de medida se vierte de forma idiomática en español. «Codos» preserva la unidad antigua y «de altura» mantiene la referencia a קֹמָתוֹ sin alterar el valor dimensional.
- source_word: וַיֶּאֱחֹז
  english_pob_choice: it was fastened
  chosen_spanish: la aseguró
  alternatives_spanish:
  - la unió
  - la fijó
  - quedó unida
  lexicon: HALOT
  rationale: En contexto constructivo, אחז describe sujeción o fijación estructural. «La aseguró» transmite la idea de quedar firmemente adherida sin introducir una pasiva poco natural en español.
- source_word: בַּעֲצֵי אֲרָזִים
  english_pob_choice: with cedar timbers
  chosen_spanish: con maderas de cedro
  alternatives_spanish:
  - con vigas de cedro
  - con madera de cedro
  - con tablones de cedro
  lexicon: HALOT
  rationale: עֲצֵי literalmente alude a maderas/timbers de cedro. «Maderas de cedro» es suficientemente amplio para el elemento estructural y evita precisar indebidamente la forma exacta de la pieza.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y el hebreo: se mantuvo la ambigüedad arquitectónica de היצוע, el valor espacial de עַל כָּל הַבַּיִת y la lectura constructiva de אחז. No se introdujeron cambios textuales ni se requirieron revisiones del pasaje base.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «codos» para la unidad de medida, en coherencia con el registro bíblico español.
  - Se evitó «SEÑOR» como sustituto del nombre divino, ya que no aplica aquí.
  - La sintaxis intenta ser publicable y natural sin perder la estructura secuencial del hebreo narrativo.
