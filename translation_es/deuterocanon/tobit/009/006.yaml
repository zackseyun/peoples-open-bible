translation:
  language: es
  text: Y madrugaron juntos y fueron a la boda[a], y Tobías bendijo a su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la celebración de bodas». El griego γάμος puede referirse tanto al matrimonio como a la celebración nupcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤρθρευσαν
  english_pob_choice: rose early
  chosen_spanish: madrugaron
  alternatives_spanish:
  - se levantaron temprano
  - se alzaron al alba
  lexicon: LSJ
  rationale: El verbo griego señala levantarse al amanecer o muy temprano. En español, «madrugaron» reproduce bien esa tempraneidad con naturalidad; «se levantaron temprano» es también posible, pero menos conciso.
- source_word: κοινῶς
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en compañía
  - de común acuerdo
  lexicon: LSJ
  rationale: El adverbio indica acción compartida. «Juntos» conserva el valor de simultaneidad y compañía de forma idiomática en español.
- source_word: ἦλθοσαν
  english_pob_choice: came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «vinieron/came», en español el movimiento narrativo hacia el lugar de la boda se expresa con naturalidad como «fueron». Mantiene la dirección implícita sin endurecer el estilo.
- source_word: γάμον
  english_pob_choice: the wedding
  chosen_spanish: la boda
  alternatives_spanish:
  - el matrimonio
  - la celebración nupcial
  lexicon: LSJ
  rationale: γάμος puede referirse al matrimonio o a la celebración de bodas. «La boda» es la opción más natural y abarca la celebración sin añadir «banquete» que el griego no explicita aquí.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - dio su bendición a
  lexicon: LSJ
  rationale: El verbo denota acción de bendecir. «Bendijo» mantiene la forma verbal directa y evita precisar indebidamente el contenido o la fórmula de la bendición.
- source_word: Τωβείας
  english_pob_choice: Tobias
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  - Tobías
  lexicon: Greek proper name tradition
  rationale: La forma española habitual del nombre griego es «Tobías».
- source_word: γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: LSJ
  rationale: En contexto matrimonial, γυνή significa «esposa». «Su esposa» es claro y digno en español; «su mujer» sería posible pero menos preciso en registro bíblico contemporáneo.
theological_decisions:
- issue: 'Alcance de γάμος: boda vs. matrimonio vs. banquete nupcial'
  english_pob_reading: the wedding
  chosen_spanish_reading: la boda
  alternative_spanish_readings:
  - el matrimonio
  - la celebración nupcial
  - el banquete de bodas
  rationale: El contexto narrativo favorece la celebración de boda, pero el griego no obliga a especificar banquete. «La boda» preserva la amplitud semántica sin introducir un elemento no explicitado.
  doctrine_reference: Preservar la tensión lexical sin resolverla de forma dogmática.
- issue: Forma de la bendición de Tobías
  english_pob_reading: Tobias blessed his wife
  chosen_spanish_reading: Tobías bendijo a su esposa
  alternative_spanish_readings:
  - Tobías pronunció una bendición sobre su esposa
  rationale: El texto informa el acto de bendecir, pero no describe su contenido ni su rito. La traducción conserva esa sobriedad y no importa una fórmula litúrgica posterior.
  doctrine_reference: Evitar añadir una práctica ritual no atestiguada en el versículo.
translation_notes:
  revision_awareness: Concordancia alta con el texto griego de Swete 1909 y con el audit trail inglés; no se requieren revisiones adicionales. Se mantuvo la ambigüedad de γάμος en una nota, como en el POB inglés, y se evitó expandir el acto de bendecir más allá de lo que el griego afirma.
  spanish_consistency_notes:
  - Se usó «Tobías» como forma española estable del nombre griego Τωβείας.
  - Se prefirió «esposa» para γυναῖκα αὐτοῦ por precisión matrimonial.
  - Se evitó el calco «vinieron» en favor de «fueron» para un español narrativo más natural, sin cambiar el sentido direccional.
