translation:
  language: es
  text: Ese día apartó los machos cabríos[a] rayados y moteados, y todas las cabras salpicadas y moteadas, cada una que tenía blanco en ella, y todo animal de color oscuro entre los corderos[b]; y los puso al cuidado[c] de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estriados» o «listados» para el término hebreo הָעֲקֻדִּים; la referencia es a marcas en franjas o bandas sobre los animales.
    reason: lexical_alternative
  - marker: b
    text: O «marrón» en vez de «de color oscuro» para חוּם; el término puede indicar una tonalidad parda oscura.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en la mano de sus hijos», un modismo hebreo para poner algo bajo su control o cuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: he removed
  chosen_spanish: apartó
  alternatives_spanish:
  - separó
  - retiró
  lexicon: HALOT
  rationale: El verbo expresa la acción de sacar o separar del resto del rebaño. «Apartó» comunica bien la separación práctica y suena natural en español, sin perder el valor narrativo del acto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: That day
  chosen_spanish: Ese día
  alternatives_spanish:
  - aquel día
  - en ese día
  lexicon: HALOT
  rationale: «Ese día» conserva la inmediatez del hebreo y es idiomático en español actual.
- source_word: הַתְּיָשִׁים
  english_pob_choice: the male goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - los chivos machos
  - los cabrones
  lexicon: HALOT
  rationale: El término designa machos de cabra. «Machos cabríos» es claro y bíblicamente reconocible en español, sin depender de una traducción eufemística.
- source_word: הָעֲקֻדִּים
  english_pob_choice: streaked
  chosen_spanish: rayados
  alternatives_spanish:
  - estriados
  - listados
  lexicon: HALOT
  rationale: El hebreo alude a marcas en bandas o rayas sobre los animales. «Rayados» refleja esa idea de forma breve; en nota se preserva la alternativa lexical de ‘estriados’/‘bandados’ implícita en el término.
- source_word: הַטְּלֻאִים
  english_pob_choice: spotted
  chosen_spanish: moteados
  alternatives_spanish:
  - manchados
  - pintados
  lexicon: HALOT
  rationale: Este adjetivo describe manchas o parches sobre el pelaje. «Moteados» distingue este término del anterior y mantiene la diferenciación lexical del hebreo.
- source_word: הַנְּקֻדּוֹת
  english_pob_choice: speckled
  chosen_spanish: moteadas
  alternatives_spanish:
  - punteadas
  - salpicadas
  lexicon: HALOT
  rationale: El hebreo sugiere pequeños puntos o motas. Como el español ya usa «moteados/moteadas» para dos marcadores cercanos, aquí se podría perder la distinción; sin embargo, el conjunto del versículo pide una redacción fluida. Por eso se reserva «salpicadas» para otra correspondencia y se mantiene la lectura de coloración irregular.
- source_word: הַטְּלֻאֹת
  english_pob_choice: spotted
  chosen_spanish: salpicadas
  alternatives_spanish:
  - manchadas
  - moteadas
  lexicon: HALOT
  rationale: La repetición del campo semántico de manchas es real en el hebreo. «Salpicadas» comunica una coloración irregular y ayuda a distinguir este segundo término de otros adjetivos cercanos sin borrar la tensión lexical del original.
- source_word: כֹּל אֲשֶׁר לָבָן בּוֹ
  english_pob_choice: every one that had white on it
  chosen_spanish: todo lo que tenía blanco en sí
  alternatives_spanish:
  - todo lo que tenía blanco en él
  - todo lo que estaba blanco
  lexicon: HALOT
  rationale: La cláusula es distributiva y describe cualquier animal con presencia de blanco en el pelaje. «Tenía blanco en sí» reproduce la idea sin forzar una perífrasis demasiado larga; la frase mantiene la referencia a una marca blanca visible.
- source_word: וְכָל חוּם בַּכְּשָׂבִים
  english_pob_choice: and every dark-colored one among the lambs
  chosen_spanish: y todo animal de color oscuro entre los corderos
  alternatives_spanish:
  - y todo cordero oscuro
  - y todo de color marrón entre los corderos
  lexicon: HALOT
  rationale: חוּם puede designar un color oscuro/marrón. «De color oscuro» preserva la amplitud semántica que el inglés POB también dejó abierta. Se usa «corderos» para כְּשָׂבִים por la referencia a ovejas jóvenes, aunque el contexto puede abarcar animales lanígeros juveniles.
- source_word: וַיִּתֵּן בְּיַד בָּנָיו
  english_pob_choice: and he put them into the care of his sons
  chosen_spanish: y los puso en manos de sus hijos
  alternatives_spanish:
  - y los entregó a sus hijos
  - y los puso al cuidado de sus hijos
  lexicon: HALOT
  rationale: El idiomatismo hebreo de ‘poner en la mano de’ implica entrega o custodia. «En manos de» conserva la imagen semítica y es perfectamente comprensible en español; el sentido de custodia queda implícito sin sobreexplicación.
theological_decisions:
- issue: Valor de la designación cromática en el rebaño y preservación de la precisión textual
  english_pob_reading: The verse lists distinct color-pattern terms for the goats and lambs, preserving the Hebrew distinctions rather than flattening them into a generic description.
  chosen_spanish_reading: Se conservan términos distintos para las marcas y colores de los animales, aun cuando en español algunas opciones se acerquen entre sí.
  alternative_spanish_readings:
  - unificar varios términos como ‘manchados’ o ‘moteados’
  - explicitar todos los colores con perífrasis más largas
  rationale: El texto presenta una serie de distinciones léxicas reales. La traducción española intenta mantenerlas sin volver la frase artificial; por eso se combinan equivalentes próximos pero no idénticos, y se evita borrar la variedad del original.
  doctrine_reference: Principio de precisión textual en traducción bíblica; no aplica una doctrina específica.
translation_notes:
  revision_awareness: 'Coincide con el inglés POB auditado en sentido general y en las decisiones clave: separación de los animales marcados, distinción entre distintos términos de coloración, y conservación del modismo final de entrega/custodia. No se registran revisiones posteriores que cambien la lectura base.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé ausente porque este versículo no contiene el nombre divino.
  - Se evitó ‘Cristo/Mesías’ por no ser pertinente al pasaje.
  - Se conservó una estructura narrativa simple y directa, acorde con el hebreo secuencial.
  - La alternancia entre ‘moteados’, ‘salpicadas’ y ‘rayados’ busca reflejar diferencias léxicas del hebreo sin sobrecargar el español.
  - La nota de ‘en manos de’ preserva el modismo hebreo documentado por el POB inglés.
