translation:
  language: es
  text: Joás hizo lo recto[a] a los ojos de Yahvé todos sus días, porque Joiadá el sacerdote lo instruía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo correcto». La expresión hebrea funciona sustantivada y también puede entenderse como «lo bueno/recto» en sentido moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo lo que era correcto
  - actuó
  lexicon: HALOT
  rationale: En la fórmula narrativa hebrea, עשה introduce la conducta evaluada; en español, «hizo» conserva la naturalidad y la brevedad del giro sin perder el valor de acción concreta.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo correcto
  - lo justo
  - lo derecho
  lexicon: HALOT
  rationale: Con עשה, el adjetivo funciona sustantivado. «Lo recto» mantiene el valor moral del hebreo y suena idiomático en español bíblico contemporáneo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: La metáfora evaluativa se conserva de forma transparente. «Ante los ojos de Yahvé» refleja la imagen del original y sigue el criterio del proyecto para el Nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino según el criterio del proyecto, evitando la sustitución por un título y preservando la referencia personal del hebreo.
- source_word: כָּל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - a lo largo de todos sus días
  - durante toda su vida
  lexicon: HALOT
  rationale: Es una correspondencia formal y natural para la duración expresada por el hebreo, sin añadir una limitación temporal explícita que no esté en la frase misma.
- source_word: הוֹרָהוּ
  english_pob_choice: instructed him
  chosen_spanish: lo instruía
  alternatives_spanish:
  - lo enseñaba
  - lo dirigía
  - le instruía
  lexicon: HALOT
  rationale: El hifil de ירה admite la idea de enseñar o instruir. «Lo instruía» preserva el matiz de guía formativa del sacerdote Joiadá y la relación continua sugerida por el imperfecto español.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Joiadá
  alternatives_spanish:
  - Jehoiadá
  lexicon: Standard transliteration adapted to Spanish phonology
  rationale: Se adapta el nombre al uso castellano-bíblico con acento gráfico para su pronunciación natural, sin alterar la identidad del nombre hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  lexicon: HALOT
  rationale: «Sacerdote» es la equivalencia directa y clara para el título hebreo, manteniendo el apposición al nombre tal como en el original.
theological_decisions:
- issue: Relación entre la rectitud de Joás y la instrucción de Joiadá
  english_pob_reading: Jehoash did what was right in the eyes of Yahweh all his days, because Jehoiada the priest instructed him.
  chosen_spanish_reading: Joás hizo lo recto ante los ojos de Yahvé todos sus días, porque el sacerdote Joiadá lo instruía.
  alternative_spanish_readings:
  - Joás hizo lo recto ante los ojos de Yahvé todos sus días, mientras el sacerdote Joiadá lo instruía.
  - Joás hizo lo recto ante los ojos de Yahvé todos sus días, ya que el sacerdote Joiadá lo instruía.
  rationale: El hebreo presenta la cláusula relativa de modo que la acción de Joiadá funciona como explicación del estado descrito. «Porque» reproduce esa relación causal/explicativa sin imponer una limitación temporal que el texto hebreo no expresa de forma explícita en la superficie del verso, aunque la conexión narrativa con el contexto la sugiera.
  doctrine_reference: Preservar la relación explicativa sin sobrecargar la limitación temporal implícita
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audio crítico en inglés, que prefirió «because» frente a una formulación temporal para reflejar con más directamente la cláusula relativa hebrea y evitar importar una restricción que el verso no formula de modo explícito. La propuesta española sigue esa orientación con «porque», manteniendo la explicación del comportamiento de Joás por la instrucción de Joiadá.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el proyecto.
  - «Lo recto» se usa para la fórmula moral de evaluación en Reyes, evitando traducciones eclesiásticas más interpretativas.
  - «Sacerdote» se conserva como título directo y no se sustituye por una forma más litúrgica.
  - La puntuación y el orden de la oración buscan claridad en español sin alterar la relación sintáctica del hebreo.
