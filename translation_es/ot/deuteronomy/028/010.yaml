review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: consecuencia futura («Entonces… verán»), alcance universal («todos los pueblos de la tierra»), cláusula completiva con «que», nombre divino visible como «Yahvé», y cierre natural «te temerán». El punto a reparar es la formulación española de נִקְרָא עָלֶיךָ: «es llamado sobre ti» suena poco idiomático y, además, en español «llamar sobre» puede sugerir invocación más que designación/identificación. Conviene mantener la imagen hebrea pero con una forma española más natural.'
  spanish_quality_summary: La redacción es clara y digna, pero «el nombre de Yahvé es llamado sobre ti» resulta forzada en español. Una mejora menor a «ha sido puesto sobre ti» o una paráfrasis equivalente sería más natural; sin embargo, para conservar mejor el vínculo con el audit trail inglés y la nota lexical, la opción más equilibrada es «ha sido proclamado sobre ti», acompañada de nota que preserve la alternativa más literal y la lectura interpretativa tradicional. El resto del versículo está bien logrado.
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflicto con otros términos programáticos. La nota mantiene la alternativa «eres llamado por el nombre de Yahvé», útil para el modismo hebreo. Se recomienda ajustar solo la expresión principal del modismo para evitar un calco español demasiado rígido.'
  issues:
  - severity: medium
    issue: «es llamado sobre ti» es un calco poco natural del hebreo נִקְרָא עָלֶיךָ
    rationale: Aunque intenta conservar el modismo, en español suena extraño y puede inducir a una lectura de invocación. El hebreo expresa que el nombre de Yahvé reposa/se proclama sobre Israel como marca de pertenencia. Hace falta una formulación más legible sin perder esa imagen.
  - severity: low
    issue: La nota puede explicitar mejor la literalidad y la alternativa idiomática
    rationale: La nota actual es básicamente correcta, pero puede pulirse para conectar mejor la formulación principal revisada con la alternativa «tú eres llamado por el nombre de Yahvé» y la explicación de identificación/pertenencia pactual.
  revised_spanish_text: Entonces todos los pueblos de la tierra verán que el nombre de Yahvé[a] ha sido proclamado sobre ti, y te temerán.
