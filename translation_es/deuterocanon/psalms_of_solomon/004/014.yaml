lexical_decisions:
- source_word: παρελογίσατο
  english_pob_choice: reasoned falsely
  chosen_spanish: Razonó falsamente
  alternatives_spanish:
  - se engañó
  - razonó de manera engañosa
  - calculó mal
  lexicon: LEH, LSJ
  rationale: El verbo griego expresa un razonamiento defectuoso o engañoso. «Razonó falsamente» conserva el carácter cognitivo y el matiz de falsedad sin especificar más de lo que el griego permite.
- source_word: ἐν λόγοις
  english_pob_choice: in words
  chosen_spanish: en palabras
  alternatives_spanish:
  - con palabras
  - en discurso
  - en habla
  lexicon: LSJ
  rationale: La construcción preposicional se mantiene de forma transparente en español. «En palabras» es más literal y conserva el énfasis en una formulación verbal o dicha.
- source_word: ὁρῶν
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - está viendo
  - mira
  - observa
  lexicon: LEH, LSJ
  rationale: El participio funciona sustantivamente y en español se expresa con una forma personal natural. «Ve» conserva el valor presente y el contraste con «juzgue».
- source_word: κρίνων
  english_pob_choice: judges
  chosen_spanish: juzgue
  alternatives_spanish:
  - juzga
  - discierna
  - dicta juicio
  lexicon: LEH, LSJ
  rationale: El participio apunta a una evaluación judicial o moral. En la negación impersonal, el subjuntivo «juzgue» reproduce bien la idea de «no hay quien…» y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Sujeto implícito de ὁρῶν y κρίνων
  english_pob_reading: There is no one who sees and judges
  chosen_spanish_reading: No hay quien vea ni juzgue
  alternative_spanish_readings:
  - No hay uno que vea y juzgue
  - No hay quien esté viendo ni juzgando
  - Él no ve ni juzga
  rationale: El griego niega la existencia de un observador-juez sin nombrar explícitamente a Dios. La formulación española impersonal preserva esa negación general y evita introducir un sujeto no presente en la línea.
  doctrine_reference: Texto poético-sapiencial; no se introduce sujeto divino explícito donde el griego no lo hace.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete (1909) y el auditorial inglés de POB. No hubo revisiones posteriores; la decisión inglesa clave fue mantener el valor cognitivo de παρελογίσατο sin forzar si el engaño es interno o externo, y el español conserva esa misma ambigüedad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no hay vocabulario mesiánico en el texto.
  - Se preservó la negación impersonal «No hay quien…» para reflejar el griego sin añadir sujeto explícito.
