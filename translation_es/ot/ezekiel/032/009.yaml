translation:
  language: es
  text: Y yo turbaré[a] el corazón de muchos pueblos cuando traiga tu ruina[b] entre las naciones[c], a tierras que no has conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «enfureceré el corazón de muchos pueblos» o «entristeceré el corazón de muchos pueblos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu destrucción». El término hebreo puede significar quebranto, fractura o ruina.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a tierras que no has conocido». La frase se refiere a territorios extranjeros que te eran desconocidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְעַסְתִּי
  english_pob_choice: I will trouble
  chosen_spanish: inquietaré
  alternatives_spanish:
  - turbaré
  - trastornaré
  - irritaré
  lexicon: HALOT
  rationale: El hiphil de כעס puede expresar provocar enojo, causar turbación o aflicción. En español, «inquietaré» comunica agitación interior sin reducir el sentido a mera ira.
- source_word: לֵב
  english_pob_choice: the hearts of
  chosen_spanish: el corazón de
  alternatives_spanish:
  - los corazones de
  - el centro de
  lexicon: HALOT
  rationale: En español, «corazón» conserva el sentido de sede interior de los afectos y pensamientos. Aunque el hebreo usa un singular colectivo, el singular español funciona de manera natural con «de muchos pueblos».
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos y naciones
  lexicon: HALOT
  rationale: «Pueblos» distingue este término de גּוֹיִם, que se traduce después como «naciones», y mantiene el matiz étnico amplio del hebreo.
- source_word: בַּהֲבִיאִי
  english_pob_choice: when I bring
  chosen_spanish: cuando traiga
  alternatives_spanish:
  - al traer
  - cuando yo traiga
  lexicon: HALOT
  rationale: La construcción temporal con ב expresa circunstancia de tiempo; «cuando traiga» es natural en español y conserva la relación temporal/causal.
- source_word: שִׁבְרְךָ
  english_pob_choice: your ruin
  chosen_spanish: tu ruina
  alternatives_spanish:
  - tu destrucción
  - tu quebranto
  - tu quebradura
  lexicon: HALOT
  rationale: שֶׁבֶר puede denotar quebranto, fractura o ruina. «Ruina» comunica bien el resultado del juicio en español bíblico actual sin perder la fuerza del término.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: HALOT
  rationale: El contexto de exposición pública del desastre favorece «entre las naciones». «Entre» preserva la idea de difusión/exhibición en el ámbito internacional.
- source_word: עַל אֲרָצוֹת
  english_pob_choice: into lands
  chosen_spanish: a tierras
  alternatives_spanish:
  - sobre tierras
  - en tierras
  - hacia tierras
  lexicon: HALOT
  rationale: Aunque עַל suele ser «sobre/encima de», aquí el movimiento del juicio hacia territorios extranjeros se expresa con naturalidad mediante «a tierras».
- source_word: אֲשֶׁר לֹא יְדַעְתָּם
  english_pob_choice: that you have not known
  chosen_spanish: que no has conocido
  alternatives_spanish:
  - que no conociste
  - que nunca has conocido
  lexicon: HALOT
  rationale: «Conocer» refleja en español el sentido experiencial de יָדַע. El perfecto negativo se puede verter en presente perfecto para conservar el valor resultativo.
theological_decisions:
- issue: Efecto emocional del juicio sobre los pueblos
  english_pob_reading: God will trouble the hearts of many peoples, not merely make them angry.
  chosen_spanish_reading: Dios inquietará el corazón de muchos pueblos, resaltando turbación interior más que una sola emoción específica.
  alternative_spanish_readings:
  - Dios enfurecerá el corazón de muchos pueblos
  - Dios entristecerá el corazón de muchos pueblos
  rationale: El hebreo permite un campo semántico que incluye provocar ira, agitación o aflicción. «Inquietará» preserva esa amplitud y evita cerrar el texto a una sola reacción emocional.
  doctrine_reference: Preservar la tensión léxica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica acuerdo alto y sin cambios necesarios; por ello no se aplicaron revisiones adicionales respecto del sentido base de la POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «pueblos» y «naciones» para reflejar עַמִּים y גּוֹיִם respectivamente.
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; este versículo no lo contiene explícitamente.
  - Se conservó el matiz de juicio público e internacional con «entre las naciones» y «a tierras».
  - Se evitó traducir mecánicamente «heart(s)» como plural en español, porque el singular colectivo resulta natural y fiel al hebreo.
