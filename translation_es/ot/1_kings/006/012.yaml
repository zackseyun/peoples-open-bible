translation:
  language: es
  text: En cuanto a esta casa que estás edificando, si andas en mis estatutos, cumples mis juicios y guardas todos mis mandamientos andando en ellos, entonces estableceré mi palabra contigo[a], que hablé a David tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confirmaré mi palabra contigo» o «cumpliré mi promesa contigo». El modismo hebreo «establecer mi palabra» se refiere a confirmar lo que ya había sido dicho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: Casa conserva la forma hebrea בַּיִת sin imponer de entrada “templo”; el sentido del edificio sagrado surge por el contexto.
- source_word: אֲשֶׁר אַתָּה בֹנֶה
  english_pob_choice: that you are building
  chosen_spanish: que estás edificando
  alternatives_spanish:
  - que estás construyendo
  - que edificas
  lexicon: HALOT
  rationale: El participio expresa acción en curso; “estás edificando” suena natural en español y mantiene la progresividad.
- source_word: אִם תֵּלֵךְ בְּחֻקֹּתַי
  english_pob_choice: if you walk in my statutes
  chosen_spanish: si andas en mis estatutos
  alternatives_spanish:
  - si vives conforme a mis estatutos
  - si sigues mis estatutos
  lexicon: HALOT
  rationale: “Andar en” preserva el hebraísmo covenantal de conducta de vida; “estatutos” corresponde bien a חֻקִּים.
- source_word: מִשְׁפָּטַי תַּעֲשֶׂה
  english_pob_choice: carry out my judgments
  chosen_spanish: cumples mis juicios
  alternatives_spanish:
  - haces mis juicios
  - practicas mis ordenanzas
  - cumples mis ordenanzas
  lexicon: HALOT
  rationale: “Juicios” conserva el campo legal de מִשְׁפָּטִים. “Cumplir” evita la dureza de un simple “hacer” en español y mantiene el valor de observancia.
- source_word: וְשָׁמַרְתָּ אֶת כָּל מִצְוֺתַי
  english_pob_choice: and keep all my commandments
  chosen_spanish: y guardas todos mis mandamientos
  alternatives_spanish:
  - y observas todos mis mandamientos
  lexicon: HALOT
  rationale: “Guardar” es la forma natural y fiel de שׁמר con mandamientos; “mandamientos” mantiene la referencia a mitzvot sin cambiar el registro.
- source_word: לָלֶכֶת בָּהֶם
  english_pob_choice: by walking in them
  chosen_spanish: para andar en ellos
  alternatives_spanish:
  - al andar en ellos
  - andando en ellos
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad/modo de la observancia; “para andar en ellos” comunica con claridad la relación entre guardar y caminar en los mandamientos.
- source_word: וַהֲקִמֹתִי אֶת דְּבָרִי אִתָּךְ
  english_pob_choice: then I will establish my word with you
  chosen_spanish: entonces estableceré mi palabra contigo
  alternatives_spanish:
  - entonces confirmaré mi palabra contigo
  - entonces cumpliré mi palabra contigo
  lexicon: HALOT
  rationale: “Estableceré mi palabra” sigue de cerca el idiomatismo hebreo הקים דבר. “Contigo” reproduce אִתָּךְ de manera directa; “palabra” conserva el vínculo con lo dicho en la cláusula final.
- source_word: דְּבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi promesa
  lexicon: HALOT
  rationale: “Palabra” retiene la conexión léxica con “hablé” y deja que el sentido promisorios se infiera del contexto, como en el texto base.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֶל דָּוִד אָבִיךָ
  english_pob_choice: which I spoke to David your father
  chosen_spanish: la que hablé a David, tu padre
  alternatives_spanish:
  - que prometí a David, tu padre
  lexicon: HALOT
  rationale: “Hablé” respeta el verbo literal דִּבַּרְתִּי y evita reemplazarlo por “prometí”, que interpretaría de más el hebreo en el texto principal.
theological_decisions:
- issue: Relación condicional entre obediencia de Salomón y la palabra dada a David
  english_pob_reading: The verse presents God's establishment of his word to Solomon as conditioned on covenant obedience, without resolving broader theological questions about unconditional and conditional aspects of the Davidic covenant.
  chosen_spanish_reading: El versículo presenta la establecimiento de la palabra de Dios contigo como condicionado por la obediencia del pacto, sin resolver la relación más amplia entre los aspectos condicionales e incondicionales de la promesa davídica.
  alternative_spanish_readings:
  - La promesa aquí es solo una reafirmación de un pacto incondicional
  - La promesa aquí es totalmente condicional y reemplaza cualquier elemento previo incondicional
  rationale: La sintaxis hebrea es claramente de tipo si-entonces. La traducción conserva esa tensión sin imponer una síntesis doctrinal que el versículo no desarrolla por sí mismo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se revisó el texto final contra el último pase auditado; no hubo cambios sustanciales respecto del sentido base. Se mantuvo la estructura condicional, el paralelismo de los mandamientos y la distinción entre “mi palabra” y “la que hablé” para conservar el enlace léxico del hebreo.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí el versículo no contiene el nombre divino en forma explícita.
  - Se mantuvo «estatutos», «juicios» y «mandamientos» como trío técnico del pacto.
  - Se conservó «andar en» para reproducir el modismo hebreo de conducta.
  - «Mi palabra» se dejó en singular para respetar דְּבָרִי y su posible sentido promisorios sin forzarlo en la traducción principal.
