    text: Or, 'they will certainly not continue to pay tribute.' The Greek phrase literally says they 'will certainly not endure to pay,' which may emphasize refusal to remain under imperial tribute rather than mere inability.
    reason: lexical_alternative
  - marker: b
    text: The Greek source for this verse is the primary witness. Its wording here does not closely match the supplied MT-parallel material, so the translation follows the Greek directly while reflecting the broader restoration context signaled by the parallel tradition.
    reason: textual_variant
