lexical_decisions:
- source_word: נָכוֹן
  english_pob_choice: is established
  chosen_spanish: está establecido
  alternatives_spanish:
  - es firme
  - permanece firme
  - ha sido establecido
  lexicon: HALOT
  rationale: El hebreo expresa un estado asentado o firme. En español, «está establecido» conserva ese valor estativo sin forzar una lectura temporal más fuerte que el hebreo. Se evita «ha sido establecido» porque introduce una perfectividad menos directa que la revisión inglesa descartó.
- source_word: כִּסְאֲךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - el trono tuyo
  - tu trono real
  lexicon: HALOT
  rationale: «כִּסֵּא» denota «trono» en sentido literal y regio; el sufijo de segunda persona se refleja naturalmente con «tu».
- source_word: מֵאָז
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde entonces
  - desde tiempos antiguos
  - desde antaño
  lexicon: HALOT
  rationale: El adverbio apunta a una antigüedad remota. «Desde antiguo» comunica bien la idea poética y mantiene el tono elevado sin sonar demasiado arcaico.
- source_word: מֵעוֹלָם
  english_pob_choice: from everlasting
  chosen_spanish: desde la eternidad
  alternatives_spanish:
  - desde siempre
  - desde la eternidad pasada
  - eternamente
  lexicon: HALOT
  rationale: Aquí עוֹלָם señala duración sin límites aplicada a Dios. «Desde la eternidad» conserva la fuerza teológica y el paralelismo con «desde antiguo».
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - tú has sido
  lexicon: HALOT
  rationale: El pronombre independiente funciona predicativamente con la frase temporal anterior. En español, «tú eres» expresa de modo natural la afirmación de existencia eterna sin añadir un matiz aspectual no requerido.
theological_decisions:
- issue: Cómo expresar la eternidad de Dios sin suavizarla ni convertirla en una fórmula abstracta
  english_pob_reading: you are from everlasting
  chosen_spanish_reading: tú eres desde la eternidad
  alternative_spanish_readings:
  - tú has sido desde la eternidad
  - tú eres eterno
  rationale: 'El hebreo afirma la existencia sin límites de Yahvé mediante un paralelismo poético: el trono está firme desde antigüedad remota y la persona divina existe desde la eternidad. «Desde la eternidad» conserva la afirmación relacional y poética del texto, mientras «tú eres eterno» resolvería demasiado la construcción hacia un adjetivo sistemático.'
  doctrine_reference: Psalm 93:2; la eternidad de Dios en el testimonio poético del AT
translation_notes:
  revision_awareness: La versión inglesa revisó «has been established» a «is established» para reflejar mejor el valor estativo del hebreo. La redacción española sigue esa decisión con «está establecido» y mantiene el paralelismo temporal de «desde antiguo» / «desde la eternidad» sin introducir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la referencia a la realeza divina del salmo, sin añadirlo al texto porque el verso habla directamente de «tu trono» y «tú eres».
  - Se evita «SEÑOR» porque el verso no contiene יהוה en la forma citada y no requiere máscara nominal.
  - «Desde antiguo» y «desde la eternidad» conservan la tensión entre antigüedad remota y eternidad absoluta que el paralelismo hebreo presenta.
