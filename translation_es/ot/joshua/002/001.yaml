review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el audit trail inglés en los puntos principales: «envió», «dos hombres», «como espías», «la tierra y Jericó», «prostituta» y la literalidad de «se acostaron allí». También conserva adecuadamente las alternativas relevantes en notas. Sin embargo, hay pequeños problemas de naturalidad y de ajuste fino: «desde Sitim» suena menos natural que «de Sitim» en este contexto narrativo, «mujer prostituta» es redundante y poco idiomático, y la nota b está anclada en «Rahab» aunque la alternativa afecta a toda la cláusula «cuyo nombre era Rahab».'
  spanish_quality_summary: El texto es legible y digno, pero necesita una reparación menor para sonar más natural en español e integrar mejor las notas. «Entonces Josué hijo de Nun envió de Sitim a dos hombres como espías, secretamente» fluye mejor sin comas innecesarias. «La casa de una prostituta» es más idiomático que «la casa de una mujer prostituta». Conviene mover la nota b a la cláusula completa para reflejar correctamente la alternativa «y su nombre era Rahab».
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino. «Jericó», «Josué», «Rahab» y «prostituta» están bien alineados. El mantenimiento de «se acostaron allí» respeta la decisión documentada de no sobreinterpretar שכב como hospedaje formal ni como actividad sexual.
  issues:
  - severity: medium
    issue: «mujer prostituta» es redundante y poco natural
    rationale: Aunque no es incorrecto, el hebreo זוֹנָה se vierte con naturalidad y precisión como «prostituta». La formulación actual suena pesada y menos idiomática para un español bíblico moderno.
  - severity: low
    issue: «desde Sitim» es menos natural que «de Sitim»
    rationale: Con verbos de envío en narrativa, «envió ... de Sitim» suena más natural y directo en español que «envió desde Sitim», sin pérdida semántica.
  - severity: low
    issue: La nota b está anclada solo en «Rahab» aunque la alternativa afecta a toda la cláusula
    rationale: La alternativa «y su nombre era Rahab» contrasta con «cuyo nombre era Rahab», por lo que el marcador debe colocarse en la frase relevante, no solo en el nombre propio.
