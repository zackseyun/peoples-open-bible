review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura temporal del hebreo («cuando clamo… cuando alzo…») y mantiene la imaginería cultual de levantar las manos hacia el santuario. Sin embargo, «mis ruegos» atenúa un poco la fuerza de תַּחֲנוּנַי (‘ruegos/súplicas por misericordia’), y sobre todo «tu santuario interior santo» suena poco natural en español y no representa bien la relación de דְּבִיר con קָדְשֶׁךָ. Una formulación como «tu santo santuario interior» o mejor «tu santuario interior santo» intenta ser literal, pero sigue siendo torpe; «tu santuario interior» con nota, o «tu santo santuario interior», preserva mejor el sentido. Dado que el inglés POB mantiene la especificidad de ‘inner sanctuary’ y una nota alternativa para ‘sanctuary’, conviene reparar la formulación española.
  spanish_quality_summary: El texto es mayormente claro y digno, pero «tu santuario interior santo» es sintácticamente duro y poco idiomático en español eclesial general. «Escucha la voz de mis súplicas» fluye mejor que «mis ruegos» en este contexto de oración bíblica, y conserva mejor el registro. El resto del verso es natural y legible.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión clave es cultual: para דְּבִיר קָדְשֶׁךָ conviene conservar «santuario interior» y explicitar en nota la alternativa «santuario» y el valor más específico de recinto interior. Para תַּחֲנוּנַי, «súplicas» alinea mejor con el matiz de petición de misericordia documentado en la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «mis ruegos» debilita el matiz de תַּחֲנוּנַי
    rationale: Aunque no es incorrecto, «ruegos» suena más general. El hebreo denota súplicas intensas pidiendo favor o misericordia; «mis súplicas» preserva mejor ese peso semántico y además coincide con la alternativa documentada.
  - severity: high
    issue: «tu santuario interior santo» es poco natural y estilísticamente deficiente
    rationale: La secuencia adjetival suena forzada en español y dificulta la lectura. El hebreo apunta al recinto interior sagrado; en español conviene una formulación idiomática que mantenga tanto la especificidad espacial como la santidad del lugar.
  revised_spanish_text: Escucha la voz de mis súplicas[a][b], cuando clamo a ti, cuando alzo mis manos hacia tu santo santuario interior[c].
