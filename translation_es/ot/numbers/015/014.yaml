source:
  edition: WLC
  text: וְ/כִֽי יָגוּר֩ אִתְּ/כֶ֨ם גֵּ֜ר א֤וֹ אֲשֶֽׁר בְּ/תֽוֹכְ/כֶם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם וְ/עָשָׂ֛ה אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ לַ/יהוָ֑ה כַּ/אֲשֶׁ֥ר תַּעֲשׂ֖וּ כֵּ֥ן יַעֲשֶֽׂה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/014.yaml
  text: And if a sojourner is staying with you[a], or anyone who is among you throughout your generations, and he offers a food offering, a pleasing aroma to Yahweh, just as you do, so he shall do.
  footnotes:
