  from: So then, [ask]
  to: Beseech then
  rationale: 'The Coptic word ⲥⲟⲡⲥ is not a discourse particle meaning ''so then'';
    it is the verb ⲥⲱⲡⲥ (Crum 351a), meaning ''to entreat, beseech, pray.'' The text
    is not elliptical; ⲥⲟⲡⲥ is the explicit verb of asking, and ⲙ̄ⲡϫⲟⲉⲓⲥ is its direct
    object (marked by ⲙ̄). | Azure: The rationale is source-grounded and correct:
    Coptic ⲥⲟⲡⲥ / ⲥⲱⲡⲥ is a verbal form meaning ''entreat, beseech, pray,'' not a
    connective like ''so then.'' The current English wrongly treats the clause as
    el'
