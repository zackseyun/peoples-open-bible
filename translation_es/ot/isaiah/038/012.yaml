translation:
  language: es
  text: Mi morada ha sido levantada y llevada lejos de mí, como la tienda de un pastor[a]; he enrollado mi vida como un tejedor[b]; desde el telar[c] él me corta. De día hasta la noche tú me llevas al fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mi generación ha partido y ha sido removida de mí como la tienda de un pastor». El hebreo puede significar «generación» o, en este contexto, «morada/habitación».
    reason: lexical_alternative
  - marker: b
    text: O «he cortado mi vida como un tejedor». El verbo hebreo es difícil; la traducción sigue la imagen del tejido al rendirlo como «he enrollado».
    reason: lexical_alternative
  - marker: c
    text: O «desde la urdimbre él me corta». El término hebreo se refiere más específicamente a los hilos colgantes del telar.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹרִי
  english_pob_choice: my dwelling
  chosen_spanish: mi morada
  alternatives_spanish:
  - mi generación
  - mi vida
  - mi habitación
  lexicon: HALOT
  rationale: En este lamento poético, el paralelismo con la imagen de la tienda favorece la idea de un lugar de habitación. «Morada» comunica bien el sentido de residencia/domicilio sin forzar la acepción de «generación», aunque la ambigüedad se mantiene en la nota.
- source_word: נִסַּע וְנִגְלָה
  english_pob_choice: is pulled up and carried away
  chosen_spanish: ha sido levantada y llevada lejos de mí
  alternatives_spanish:
  - ha sido arrancada y retirada de mí
  - ha sido alzada y apartada de mí
  lexicon: HALOT
  rationale: La pareja verbal describe una tienda desmontada y retirada. «Levantada y llevada lejos de mí» conserva la imagen concreta y el movimiento de separación, con un español natural.
- source_word: כְּאֹהֶל רֹעִי
  english_pob_choice: like a shepherd’s tent
  chosen_spanish: como tienda de pastor
  alternatives_spanish:
  - como la tienda de un pastor
  lexicon: HALOT
  rationale: La construcción evoca una tienda provisional y transportable. «Tienda de pastor» es idiomático en español y preserva el carácter pastoral y móvil de la metáfora.
- source_word: קִפַּדְתִּי
  english_pob_choice: I have rolled up
  chosen_spanish: he enrollado
  alternatives_spanish:
  - he recogido
  - he doblado
  lexicon: HALOT
  rationale: El verbo es difícil, pero el contexto de tejido apoya la idea de recoger o enrollar una pieza terminada. «He enrollado» mantiene la imaginería textil y evita adelantar el sentido de «cortar».
- source_word: כָאֹרֵג חַיַּי
  english_pob_choice: my life like a weaver
  chosen_spanish: mi vida como tejedor
  alternatives_spanish:
  - mi vida, como un tejedor
  - mi vida, como la obra de un tejedor
  lexicon: HALOT
  rationale: El hebreo es comprimido y poético. «Mi vida como tejedor» reproduce la construcción breve y conserva la comparación con la labor del tejedor sin sobreexplicarla.
- source_word: מִדַּלָּה
  english_pob_choice: from the loom
  chosen_spanish: desde el telar
  alternatives_spanish:
  - desde la urdimbre
  - desde los hilos colgantes
  lexicon: HALOT
  rationale: El término apunta a elementos del telar o sus hilos colgantes. «Desde el telar» es más claro para el lector moderno y mantiene el campo semántico del tejido.
- source_word: יְבַצְּעֵנִי
  english_pob_choice: he cuts me off
  chosen_spanish: él me corta
  alternatives_spanish:
  - él me corta de allí
  - él me secciona
  - él me desprende
  lexicon: HALOT
  rationale: El verbo expresa cortar o separar. «Él me corta» preserva la fuerza breve y directa del hebreo y armoniza con la imagen textil sin suavizarla.
- source_word: מִיּוֹם עַד לַיְלָה
  english_pob_choice: From day to night
  chosen_spanish: De día hasta la noche
  alternatives_spanish:
  - Desde el día hasta la noche
  - De mañana a noche
  lexicon: HALOT
  rationale: La frase marca un lapso completo y la rapidez del desenlace. «De día hasta la noche» es natural en español y conserva el contraste temporal.
- source_word: תַּשְׁלִימֵנִי
  english_pob_choice: you bring me to an end
  chosen_spanish: tú me llevas a su fin
  alternatives_spanish:
  - tú me terminas
  - tú me llevas al fin
  lexicon: HALOT
  rationale: El hifil de שׁלם tiene el sentido de completar o poner fin. Se conserva el cambio a segunda persona con «tú», y «me llevas a su fin» mantiene un tono solemne sin sonar coloquial.
theological_decisions:
- issue: Cambio de sujeto gramatical de tercera a segunda persona
  english_pob_reading: 'Retain the likely poetic shift: ''he cuts me off ... you bring me to an end'''
  chosen_spanish_reading: 'Mantener el desplazamiento poético: «él me corta ... tú me llevas a su fin»'
  alternative_spanish_readings:
  - 'armonizar todo en segunda persona: «tú me cortas ... tú me llevas a su fin»'
  - armonizar impersonalmente sin sujeto explícito
  rationale: El hebreo pasa de una imagen verbal en tercera persona a una apelación directa a Dios. Conservar ese cambio respeta la textura del lamento y evita alisar la intensidad emocional del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se revisó el borrador a la luz del paquete fuente original (WLC + morfología) y del rastro auditado en inglés. No se aplicaron cambios posteriores: la revisión más reciente indica concordancia alta y sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se preserva la oscilación de sujeto entre «él» y «tú», siguiendo el hebreo y la lectura auditada.
  - Se mantiene el campo semántico textil con «enrollado», «tejedor» y «telar» para no diluir la metáfora.
  - Se usa «Yahvé» no requerido en este versículo; no aparece el tetragrámaton en el texto base.
  - Se eligió un español publicable y solemne, evitando arcaísmos innecesarios y sin suavizar la dureza del verbo final.
