translation:
  language: es
  text: 'Y después de poner por escrito lo que habían dicho en los registros públicos[b], así: «Numenio, hijo de Antíoco, y Antípatro, hijo de Jasón, embajadores de los judíos[a], vinieron a nosotros renovando su amistad[c] con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La traducción sigue el sentido claro del texto transmitido; la alfa aislada antes de «Ἰουδαίων» parece un artefacto escribal o editorial, no una palabra con valor propio.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «en los consejos/decretos del pueblo»; aquí se refleja el valor documental oficial del contexto.
    reason: lexical_alternative
  - marker: c
    text: «Amistad» aquí tiene fuerza diplomática y puede implicar relaciones formales o alianza.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναγραψάμενοι
  english_pob_choice: after recording
  chosen_spanish: después de poner por escrito
  alternatives_spanish:
  - después de registrar
  - habiendo consignado por escrito
  lexicon: LSJ
  rationale: El participio expresa acción previa de dejar algo asentado por escrito. «Poner por escrito» conserva la secuencia y suena natural en español jurídico-administrativo.
- source_word: τὰ ὑπ' αὐτῶν εἰρημένα
  english_pob_choice: what had been said by them
  chosen_spanish: lo que habían dicho
  alternatives_spanish:
  - las cosas dichas por ellos
  - lo que ellos habían dicho
  lexicon: LSJ
  rationale: La frase apunta al contenido verbal previo de los enviados. En español, «lo que habían dicho» transmite bien el sentido sin pesadez innecesaria.
- source_word: ἐν ταῖς βουλαῖς τοῦ δήμου
  english_pob_choice: in the public records
  chosen_spanish: en los registros públicos
  alternatives_spanish:
  - en los decretos del pueblo
  - en las decisiones de la asamblea
  lexicon: LSJ
  rationale: En este contexto documental, βουλαῖς τοῦ δήμου se entiende mejor como documentación oficial del cuerpo cívico. «Registros públicos» conserva el matiz administrativo señalado por la POB en inglés.
- source_word: πρεσβευταὶ
  english_pob_choice: ambassadors
  chosen_spanish: enviados
  alternatives_spanish:
  - embajadores
  - delegados
  lexicon: LSJ
  rationale: Aunque el inglés POB usó «ambassadors» por el contexto diplomático, en español «enviados» comunica la función oficial sin sonar demasiado moderno o protocolario para el contexto histórico.
- source_word: Α Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de parte de los judíos
  - procedentes de los judíos
  lexicon: LSJ
  rationale: La lectura significativa es «Ἰουδαίων»; la alfa aislada parece un artefacto textual, como señala la auditoría inglesa. En español se mantiene el sentido claro, «de los judíos».
- source_word: ἀνανεούμενοι
  english_pob_choice: renewing
  chosen_spanish: renovando
  alternatives_spanish:
  - renovando de nuevo
  - reafirmando
  lexicon: LSJ
  rationale: El participio medio indica la renovación de una relación ya existente. «Renovando» reproduce esa fuerza sin cargar el texto con una paráfrasis más interpretativa.
- source_word: τὴν πρὸς ἡμᾶς φιλίαν
  english_pob_choice: their friendship with us
  chosen_spanish: su amistad con nosotros
  alternatives_spanish:
  - su amistad hacia nosotros
  - su alianza con nosotros
  lexicon: LSJ
  rationale: φιλία puede tener fuerza diplomática de amistad o alianza. Se conserva «amistad» como la opción más directa, dejando el posible trasfondo político sin imponer «alianza».
theological_decisions:
- issue: Sentido diplomático de φιλία
  english_pob_reading: friendship here carries diplomatic force and may imply formal friendly relations or alliance
  chosen_spanish_reading: amistad, con posible trasfondo de relación diplomática formal
  alternative_spanish_readings:
  - alianza
  - amistad formal
  rationale: No se borra la posible fuerza política del término, pero tampoco se sustituye por «alianza» como si fuera inequívoco. El español «amistad» mantiene la tensión documentada por la POB.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada está estable y sin cambios recientes; se siguió su juicio textual principal, respetando la nota sobre la alfa aislada, la expresión documental de βουλαῖς τοῦ δήμου y la posible carga diplomática de φιλία.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el Tetragrámaton.
  - «Judíos» traduce Ἰουδαίων conforme al contexto étnico-político de 1 Macabeos.
  - Se evita «embajadores» para no sobrecargar el español con un término demasiado moderno; «enviados» conserva la función diplomática.
  - La puntuación en estilo de cita se ajusta al español moderno y al tono documental del pasaje.
