translation:
  language: es
  text: Y se reunieron las naciones de Galaad contra los israelitas que estaban dentro de sus fronteras[a], para exterminarlos; y huyeron a la fortaleza de Datema.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para destruirlos» o «para arrancarlos de raíz». La expresión griega indica intención de eliminarlos por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: LSJ
  rationale: El compuesto griego expresa una reunión colectiva con intención hostil. «Se reunieron» conserva la acción grupal de manera natural en español sin sobrecargar el estilo.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: En 1 Macabeos designa a los pueblos no israelitas vecinos. «Las naciones» sigue de cerca el valor contextual del griego y evita introducir un matiz eclesiástico posterior de «gentiles».
- source_word: Γαλααδίτιδι
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - la región de Galaad
  - Gilead
  lexicon: LSJ
  rationale: El topónimo griego refiere a la región de Galaad. «De Galaad» funciona bien en español y mantiene la referencia geográfica.
- source_word: ἐπὶ τὸν Ἰσραὴλ
  english_pob_choice: against the Israelites
  chosen_spanish: contra los israelitas
  alternatives_spanish:
  - contra Israel
  - contra los hijos de Israel
  lexicon: LSJ
  rationale: Aunque el griego dice «Israel» en singular, el contexto identifica al pueblo. «Los israelitas» explicita el referente en español idiomático sin alterar el sentido.
- source_word: τοὺς ὄντας ἐπὶ τοῖς ὁρίοις αὐτῶν
  english_pob_choice: who were within their borders
  chosen_spanish: que estaban dentro de sus fronteras
  alternatives_spanish:
  - que estaban en sus fronteras
  - que habitaban en su territorio
  lexicon: LSJ
  rationale: La revisión inglesa aclaró que el sentido es ubicación dentro del territorio, no sobre el límite. «Dentro de sus fronteras» refleja esa precisión y el tono territorial del pasaje.
- source_word: τοῦ ἐξᾶραι αὐτούς
  english_pob_choice: to wipe them out
  chosen_spanish: para exterminarlos
  alternatives_spanish:
  - para destruirlos
  - para arrancarlos de raíz
  lexicon: LSJ
  rationale: El infinitivo expresa intención de eliminación total. «Exterminarlos» comunica con fuerza ese valor; «destruirlos» es posible, pero menos enfático; «arrancarlos de raíz» conserva la idea, aunque suena más figurado.
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se refugiaron huyendo
  lexicon: LSJ
  rationale: Verbo narrativo directo. «Huyeron» es la forma más natural y precisa en español.
- source_word: Δάθεμα
  english_pob_choice: Dathema
  chosen_spanish: Datema
  alternatives_spanish:
  - Dathema
  lexicon: LSJ
  rationale: Se translitera el topónimo para una lectura de nombre propio en español. «Datema» simplifica la secuencia consonántica sin perder identificación; «Dathema» es una alternativa más cercana a la grafía griega.
- source_word: τὸ ὀχύρωμα
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el baluarte
  - la ciudadela
  lexicon: LSJ
  rationale: El sustantivo denota un lugar fortificado. «La fortaleza» es transparente y natural para el lector hispanohablante; «baluarte» o «ciudadela» son posibles, pero más marcados.
translation_notes:
  revision_awareness: La redacción sigue la auditoría inglesa más reciente, que precisó «within their borders» para reflejar con mayor naturalidad que los israelitas estaban dentro del territorio de esas naciones. Se conserva también la fuerza de ἐξᾶραι con un verbo español de eliminación total.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa «las naciones» para τὰ ἔθνη, coherente con el uso de 1 Macabeos en contextos de pueblos no israelitas.
  - Los topónimos se transliteran de forma funcional para lectura pública en español.
  - «Dentro de sus fronteras» refleja la precisión revisada del contexto territorial y evita ambigüedad espacial.
