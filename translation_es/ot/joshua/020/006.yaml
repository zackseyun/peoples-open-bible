  language: en
  yaml_path: translation/ot/joshua/020/006.yaml
  text: And he shall live in that city until he stands before the congregation for judgment[a], until the death of the high priest who is in office in those days. Then the manslayer may return and come to his city and to his house[b], to the city from which he fled.
  footnotes:
  - marker: a
    text: Or 'assembly' for 'congregation.' The Hebrew refers to the gathered community acting in legal judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the killer' or 'the slayer.' 'Manslayer' is used here to preserve the legal distinction from a convicted murderer in the city-of-refuge laws.
    reason: lexical_alternative
