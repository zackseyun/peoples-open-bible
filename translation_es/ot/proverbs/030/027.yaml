translation:
  language: es
  text: Las langostas no tienen rey[a], pero todas salen en filas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y salen divididas», es decir, dispuestas en bandas o divisiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: HALOT
  rationale: El sustantivo designa de manera directa a un rey. En español, "rey" es la equivalencia más natural y precisa para conservar la imagen proverbial.
- source_word: אֵין
  english_pob_choice: have no
  chosen_spanish: no tienen
  alternatives_spanish:
  - no hay
  - les falta
  lexicon: HALOT
  rationale: La construcción expresa ausencia en relación con la langosta. "No tienen" comunica de forma natural en español la idea relacional del hebreo y sigue la lectura idiomática del inglés POB.
- source_word: אַרְבֶּה
  english_pob_choice: the locusts
  chosen_spanish: las langostas
  alternatives_spanish:
  - la langosta
  - los saltamontes
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona como colectivo. En español, el plural mantiene el valor colectivo y fluye de manera natural para una descripción genérica de la especie.
- source_word: וַיֵּצֵא
  english_pob_choice: yet all of them march out
  chosen_spanish: pero todas salen
  alternatives_spanish:
  - y salen
  - pero salen
  lexicon: HALOT
  rationale: 'El verbo singular hebreo se entiende colectivamente. "Salen" preserva el movimiento del grupo; añadí "pero" para reflejar el contraste implícito: aun sin rey, avanzan ordenadamente. No introduzco "marchan" porque en español podría sugerir una metáfora militar más fuerte que la evidencia.'
- source_word: חֹצֵץ
  english_pob_choice: in ranks
  chosen_spanish: en orden
  alternatives_spanish:
  - en filas
  - en divisiones
  - en bandas
  lexicon: HALOT
  rationale: El participio indica división/ordenamiento. "En orden" conserva la idea central sin exagerar la precisión militar de "ranks" y resulta más natural en español bíblico contemporáneo.
- source_word: כֻּלּוֹ
  english_pob_choice: all of them
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - todas ellas en conjunto
  lexicon: HALOT
  rationale: El sufijo pronominal expresa totalidad colectiva. Dado que "langostas" es femenino plural en español, "todas" comunica la totalidad del enjambre de manera concisa y coherente con el sujeto colectivo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; la versión española sigue la lectura colectiva y ordenada del enjambre sin añadir matices no sustentados. Se mantuvo la alternativa léxica sobre חֹצֵץ porque el español puede expresarla como "en orden", "en filas" o "divididas" según el énfasis deseado.
  spanish_consistency_notes:
  - Se mantuvo "rey" para מֶלֶךְ, en línea con el valor léxico básico y sin recurrir a perífrasis.
  - Se tradujo el colectivo singular אַרְבֶּה al plural español por naturalidad y por el sufijo totalizador כֻּלּוֹ.
  - No se usó "SEÑOR" ni terminología teológica no pertinente al versículo.
  - La nota al pie conserva la alternativa semántica principal de חֹצֵץ presente en el POB inglés.
