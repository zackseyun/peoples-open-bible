translation:
  language: es
  text: 'Porque antes que el muchacho[a] sepa decir[b]: «Mi padre» y «Mi madre», la riqueza de Damasco y el botín[c] de Samaria serán llevados delante del rey de Asiria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «el muchacho»; en el contexto, esto probablemente se refiere al hijo nombrado en el pasaje circundante. O «el niño».
    reason: cross_reference
  - marker: b
    text: 'O «llamar: “Mi padre” y “Mi madre”».'
    reason: lexical_alternative
  - marker: c
    text: O «el despojo de Samaria».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la explicación del anuncio precedente; «Porque» conserva la fuerza causal/explanatoria sin volver el español artificial.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - antes de que
  - antes de
  lexicon: HALOT
  rationale: El hebreo marca anterioridad temporal respecto del hito del niño; «antes que» suena natural en español y mantiene la relación temporal.
- source_word: יֵדַע
  english_pob_choice: knows how
  chosen_spanish: sepa
  alternatives_spanish:
  - conozca
  - sepa cómo
  lexicon: HALOT
  rationale: Con el infinitivo siguiente, el sentido es capacidad adquirida. «Sepa» expresa esa capacidad de modo natural en español sin agregar explicación innecesaria.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño o joven; por el contexto inmediato de la escena infantil, «muchacho» conserva el referente masculino sin sonar demasiado adulto.
- source_word: קְרֹא
  english_pob_choice: to cry
  chosen_spanish: gritar
  alternatives_spanish:
  - llamar
  - decir
  lexicon: HALOT
  rationale: El POB inglés entendió el verbo como el acto de vocalizar la fórmula filial. En español, «gritar» comunica la emisión de voz; no implica necesariamente volumen fuerte en sentido moderno rígido, sino el hecho de pronunciar.
- source_word: אָבִי וְאִמִּי
  english_pob_choice: ‘My father’ and ‘My mother,’
  chosen_spanish: «Mi padre» y «Mi madre»
  alternatives_spanish:
  - «Padre» y «Madre»
  - «Papá» y «Mamá»
  lexicon: HALOT
  rationale: El hebreo es posesivo explícito, así que se conserva «mi». Se evita «papá/mamá» por introducir color coloquial no exigido por el texto.
- source_word: יִשָּׂא
  english_pob_choice: will be carried away
  chosen_spanish: serán llevados
  alternatives_spanish:
  - serán arrebatados
  - serán transportados
  lexicon: HALOT
  rationale: Aunque la forma verbal es activa, el contexto impersonal favorece una pasiva natural en español. «Serán llevados» reproduce el efecto sin inventar un agente explícito.
- source_word: חֵיל
  english_pob_choice: the wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - los bienes
  - los recursos
  - el caudal
  lexicon: HALOT
  rationale: En este contexto, junto a «botín», la referencia apunta a bienes/recursos saqueables más que al ejército. «Riqueza» mantiene amplitud semántica y una lectura clara.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damascо
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: שְׁלַל
  english_pob_choice: the spoil
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  lexicon: HALOT
  rationale: «Botín» es el equivalente bíblico-histórico más natural en español para bienes tomados en guerra.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Nombre propio estándar. Se conserva la forma más habitual y reconocible en español bíblico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En este contexto indica presentación/traslado en la esfera del rey asirio. «Delante de» conserva la imagen espacial del hebreo sin sobreinterpretar.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Construcción posesiva clara en español; «Asiria» mantiene el referente histórico-político del original.
theological_decisions:
- issue: Referente implícito de «el muchacho»
  english_pob_reading: Rendered generically as 'the boy' without identifying him in the translation.
  chosen_spanish_reading: Se deja «el muchacho» sin nombrarlo dentro del versículo.
  alternative_spanish_readings:
  - el muchacho, es decir, Maher-salal-has-baz
  - el niño
  rationale: El verso hebreo solo dice «el muchacho». Aunque el contexto inmediato apunta con fuerza al hijo de Isaías, la traducción no debe incorporar esa identificación al texto mismo; se conserva la referencia abierta y se permite que la nota o el contexto hagan la identificación.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa; no resolver en traducción lo que el versículo no explicita.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el juicio auditado del POB en inglés: mantiene el valor temporal de בְּטֶרֶם, la capacidad implícita de יֵדַע + infinitivo, la pasiva natural para יִשָּׂא, y conserva la tensión interpretativa sobre el referente de «el muchacho» sin resolverla en el texto principal. No se reportan revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni una alusión directa a él.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos duros como «llamar, Mi padre» que sonarían poco naturales en español.
  - Se conserva la alternancia riqueza/botín para reflejar dos sustantivos hebreos distintos, no como simple duplicación estilística.
