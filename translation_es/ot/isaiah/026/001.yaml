translation:
  language: es
  text: 'En aquel día se cantará este canto en la tierra de Judá: «Tenemos una ciudad fuerte[a]; él pone la salvación como muros y baluarte[c]».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ciudad fortificada».
    reason: lexical_alternative
  - marker: b
    text: O «él designa la salvación como muros y baluarte». El hebreo deja implícito el sujeto de «pone/designa»; en contexto suele entenderse que es Dios.
    reason: alternative_reading
  - marker: c
    text: «Baluarte» traduce un término hebreo para una fortificación defensiva exterior; versiones tradicionales suelen usar «bastión» o «muralla exterior».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Es la fórmula profética habitual. «En aquel día» conserva el valor idiomático y la carga escatológica sin volver la frase forzada en español.
- source_word: יוּשַׁר
  english_pob_choice: will be sung
  chosen_spanish: se cantará
  alternatives_spanish:
  - será cantado
  - será entonado
  lexicon: HALOT
  rationale: El pasivo de שׁיר expresa que el canto será ejecutado. «Se cantará» es natural y mantiene la pasiva sin agregar sujeto.
- source_word: הַשִּׁיר הַזֶּה
  english_pob_choice: this song
  chosen_spanish: este canto
  alternatives_spanish:
  - esta canción
  - este canto de alabanza
  lexicon: HALOT
  rationale: El hebreo dice simplemente «este canto». «Canto» suena digno y evita añadir «de alabanza», que no está explícito.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en Judá
  - en el país de Judá
  lexicon: HALOT
  rationale: Se conserva explícitamente אֶרֶץ como «tierra», reflejando el matiz geográfico-nacional del hebreo.
- source_word: עִיר עָז
  english_pob_choice: a strong city
  chosen_spanish: una ciudad fuerte
  alternatives_spanish:
  - una ciudad fortificada
  - una ciudad de fuerza
  lexicon: HALOT
  rationale: La construcción atributiva se vierte de forma natural en español. «Fuerte» preserva la idea de seguridad y resistencia sin sobreexplicar.
- source_word: לָנוּ
  english_pob_choice: We have
  chosen_spanish: Tenemos
  alternatives_spanish:
  - Para nosotros hay
  - Nos pertenece
  lexicon: HALOT
  rationale: El dativo posesivo se expresa idiomáticamente con posesión directa en español. «Tenemos» comunica mejor la frase nominal hebrea.
- source_word: יְשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - la victoria
  lexicon: HALOT
  rationale: «Salvación» es la equivalencia más directa y teológicamente cargada en Isaías, y corresponde al uso del POB en inglés.
- source_word: יָשִׁית
  english_pob_choice: he sets
  chosen_spanish: él pone
  alternatives_spanish:
  - él coloca
  - él establece
  - él dispone
  lexicon: HALOT
  rationale: El verbo שׂים admite la idea de poner/colocar/establecer. «Pone» es directo y reproduce bien el acto de asignar o disponer defensas.
- source_word: חוֹמוֹת
  english_pob_choice: walls
  chosen_spanish: muros
  alternatives_spanish:
  - murallas
  - paredes
  lexicon: HALOT
  rationale: «Muros» es fiel al plural hebreo y funciona bien con el paralelismo defensivo del verso.
- source_word: וָחֵל
  english_pob_choice: rampart
  chosen_spanish: baluarte
  alternatives_spanish:
  - rampa de defensa
  - muralla exterior
  - bastión
  lexicon: HALOT
  rationale: חֵל designa una fortificación defensiva exterior. «Baluarte» es un equivalente español tradicional y comprensible; mantiene el valor militar sin reducirlo a un simple «muro».
theological_decisions:
- issue: Sujeto implícito de יָשִׁית
  english_pob_reading: The Hebrew leaves the subject of 'he sets up/appoints' implicit, though in context it is commonly understood to refer to God.
  chosen_spanish_reading: Se mantiene el sujeto implícito con «él», sin nombrar explícitamente a Yahvé en la cláusula.
  alternative_spanish_readings:
  - Yahvé pone la salvación por muros y baluarte
  - Dios pone la salvación por muros y baluarte
  - se pone la salvación por muros y baluarte
  rationale: El hebreo no expresa el sujeto. Aunque el contexto apunta a Dios, la traducción conserva la ambigüedad gramatical con un pronombre, evitando resolverla interpretativamente.
  doctrine_reference: Principio de primacía del texto original; conservar tensiones teológicas donde el hebreo no explicita un referente.
- issue: Valor de יְהוּדָה como territorio
  english_pob_reading: in the land of Judah
  chosen_spanish_reading: en la tierra de Judá
  alternative_spanish_readings:
  - en Judá
  - en la provincia de Judá
  rationale: Se mantiene el referente territorial y nacional sin convertirlo en un nombre puramente administrativo o eclesiástico.
  doctrine_reference: Fidelidad geográfica e histórica del texto profético.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó 'sets up salvation' a 'sets salvation' por mayor naturalidad. En español, «pone la salvación» sigue esa línea directa y evita añadir un elemento no explícito. También se preservó la triple nota de apertura (ciudad fuerte / acción implícita / fortificación exterior) para reflejar el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exigiera; aquí no aparece el nombre divino explícito.
  - Se prefirió «salvación» en lugar de «liberación» para mantener la coherencia con el vocabulario de Isaías y con el POB en inglés.
  - Se distinguieron «muros» y «baluarte» para preservar el paralelismo de dos defensas diferentes.
  - La puntuación con comillas angulares es propia del español editorial y conserva el discurso citado.
