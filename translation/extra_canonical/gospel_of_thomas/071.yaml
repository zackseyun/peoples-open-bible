translation:
  text: Jesus said[a], I will cast down this house[c][b], and no one will be able
    to build it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The object after ‘cast down’ is restored: the manuscript shows ⲡⲉϫⲉⲓ︤ⲥ︥
      ϫⲉϯⲛⲁϣⲟⲣ[ϣⲣ ⲙⲡⲉⲉ]ⲓ̣ⲏ̣ⲉⲓ; Dilley normalizes to ⲛⲡⲉⲓⲏⲓ (‘this house’).'
    reason: lacuna_or_restoration
  - marker: b
    text: The verb ϣⲕⲱⲧ is ‘be able’ (Crum); the action (‘build’) is inferred from
      the object ‘house’ and context. Some translations supply ‘rebuild,’ but ‘again’
      is not explicit in the Coptic.
    reason: lexical_alternative
  - marker: c
    text: ⲙⲛ̄ⲗⲁⲁⲩ is the negative + indefinite ‘no one’; ⲗⲁⲁⲩ is common across Sahidic/Lycopolitan.
    reason: dialect_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said
  lexicon: Crum; Layton Grammar
  rationale: Formulaic ⲡⲉϫⲉ + speaker; expanded nomina sacra ⲓ︤ⲥ︥ to ⲓⲏⲥⲟⲩⲥ per normalized
    Sahidic. Rendering “Jesus said” preserves the set speech-introduction.
- source_word: ⲁⲛⲟⲕ
  chosen: I
  alternatives:
  - I myself
  - It is I who
  lexicon: Layton Grammar
  rationale: Independent pronoun for emphasis in first person. English “I” is sufficient;
    adding “myself” would over-mark emphasis.
- source_word: ϣⲟⲣϣⲣ
  chosen: cast down
  alternatives:
  - demolish
  - throw down
  - tear down
  lexicon: Crum
  rationale: Crum glosses ϣⲟⲣϣⲣ as ‘pull/tear down, demolish.’ “Cast down” keeps Thomas’s
    blunt diction; “demolish” is a close alternative.
- source_word: ⲡⲉⲓⲏⲓ
  chosen: this house
  alternatives:
  - this building
  - this dwelling
  lexicon: Crum
  rationale: 'Crum: ⲉⲓⲏⲓ ‘house, dwelling.’ Demonstrative ⲡⲉ- marks ‘this’; “house”
    is the most straightforward choice.'
- source_word: ⲙⲛ̄ⲗⲁⲁⲩ
  chosen: no one
  alternatives:
  - none
  - nobody
  lexicon: Layton Grammar; Crum
  rationale: Negative ⲙⲛ̄ with ⲗⲁⲁⲩ (indefinite ‘someone’) yields ‘no one/nobody.’
- source_word: ϣⲕⲱⲧ
  chosen: be able
  alternatives:
  - have power
  - prevail
  lexicon: Crum
  rationale: 'Crum: ϣⲕⲱⲧ ‘to be able.’ Here complemented by ⲛⲧⲟϥ (object ‘it’), yielding
    ‘be able [to do it],’ with the action understood from context as building.'
- source_word: ⲛⲧⲟϥ
  chosen: it (obj. clitic)
  alternatives:
  - to it
  - regarding it
  lexicon: Layton Grammar
  rationale: Prepositional ⲛ + object clitic ⲧⲟϥ “to/for it.” In idiom with ϣⲕⲱⲧ,
    it functions as the object of the ability (‘be able to [do] it’).
textual_note: 'Dialect: Sahidic with Lycopolitan features; ⲙⲛ̄ⲗⲁⲁⲩ ‘no one’ is typical.
  Orthography: The manuscript has nomina sacra ⲓ︤ⲥ︥ (Jesus), expanded in normalization
  to ⲓⲏⲥⲟⲩⲥ. The printed line shows a lacuna/restoration in the object of ϣⲟⲣϣⲣ: ⲡⲉϫⲉⲓ︤ⲥ︥
  ϫⲉϯⲛⲁϣⲟⲣ[ϣⲣ ⲙⲡⲉⲉ]ⲓ̣ⲏ̣ⲉⲓ; Dilley normalizes as ⲁⲛⲟⲕ ⲛⲁϣⲟⲣϣⲣ ⲛⲡⲉⲓⲏⲓ (‘I will cast
  down this house’). The second clause in the printed form reads ⲛⲁϣⲕⲟⲧϥ, while the
  normalization gives ⲛⲁϣⲕⲱⲧⲛⲧⲟϥ—an editorial decision reading ϣⲕⲱⲧ ‘be able’ with
  preposition ⲛ + object clitic ⲧⲟϥ (‘be able to [do] it’). The codex page ends with
  a lacuna ([........]); Dilley marks the remainder as UNKNOWN. No Greek POxy overlap
  is known for Saying 71.'
