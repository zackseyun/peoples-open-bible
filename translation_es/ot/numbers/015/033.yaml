review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: los que lo hallaron mientras recogía material de madera lo llevaron a Moisés, a Aarón y a toda la congregación. También conserva adecuadamente הַמֹּצְאִים como sujeto sustantivado, מְקֹשֵׁשׁ como acción en curso, y עֵדָה como ''congregación''.'
  spanish_quality_summary: 'La redacción es natural y clara en español eclesial contemporáneo. Sin embargo, el anclaje y contenido de la nota léxica no están del todo bien ajustados: el texto principal eligió ''leña'', pero la nota presenta ''madera'' como alternativa, cuando el inglés auditado hace lo contrario: texto principal ''wood'' con alternativa ''sticks''. En español, ''leña'' comunica bien el contexto, pero la nota debe reflejar mejor la alternativa más cercana a ''palos'' o ''ramas''.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Congregación' para עֵדָה está bien. No aparece Yahvé, Mesías/Cristo ni otros términos controlados. La decisión 'leña' es aceptable contextualmente, pero la nota debe alinearse mejor con la justificación léxica documentada para עֵצִים.
  issues:
  - severity: medium
    issue: La nota léxica invierte la relación principal/alternativa respecto del expediente inglés.
    rationale: El POB inglés usa 'gathering wood' con nota 'Or gathering sticks'. El español usa 'recogiendo leña', lo cual es defendible, pero su nota 'O “madera”' no preserva la alternativa destacada de piezas de madera como palos/ramas; además 'madera' suena menos natural que 'palos' como alternativa a 'leña' en este contexto.
  - severity: low
    issue: La nota está anclada en 'leña' pero no explicita con suficiente precisión la ambivalencia entre madera en general y trozos de madera.
    rationale: Conviene formular la nota de manera que el lector entienda que עֵצִים puede significar tanto madera en sentido general como piezas sueltas de madera, sin desajustar el español principal.
  revised_spanish_text: Y los que lo encontraron recogiendo leña[a] lo llevaron a Moisés, a Aarón y a toda la congregación.
  revised_footnotes:
  - marker: a
    text: O ‘palos’. El hebreo עֵצִים puede referirse a madera en general o a piezas de madera, como palos o leña.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, porque es fiel y natural. Solo se corrige la nota para alinearla mejor con la evidencia léxica y con la alternativa preservada en el expediente inglés: la variación relevante no es principalmente ''leña'' frente a ''madera'', sino material de madera en general frente a piezas de madera como ''palos''.'
