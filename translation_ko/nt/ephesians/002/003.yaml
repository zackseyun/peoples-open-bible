  text: among whom we all also once lived in the desires of our flesh, fulfilling the desires of the flesh and of the mind, and we were by nature children of wrath, just as the rest were.
translation:
  language: ko
  text: 그들 가운데서 우리 모두도 한때 우리 육신의 욕망 가운데 살아, 육신과 생각의 뜻대로 행하였으며, 본성상 진노의 자녀였습니다[a]—나머지 사람들과 마찬가지로—
  philosophy: optimal-equivalence
  footnotes:
