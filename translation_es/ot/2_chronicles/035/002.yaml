revisions:
- from: Puso a los sacerdotes en sus turnos[a] y los fortaleció[b] para el servicio de la casa de Yahvé.
  to: Asignó a los sacerdotes a sus turnos[a] y los fortaleció[b] para el servicio de la casa de Yahvé.
