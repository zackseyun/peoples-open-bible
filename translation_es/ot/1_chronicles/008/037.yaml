translation:
  language: es
  text: Y Moza engendró a Binea[a]; Refa[b], su hijo, Eleasá[c], su hijo, Azel, su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bina». El nombre hebreo בִּנְעָא puede representarse en español con transliteraciones ligeramente distintas.
    reason: lexical_alternative
  - marker: b
    text: O «Rafa». El nombre hebreo רָפָה admite transliteraciones españolas ligeramente distintas.
    reason: lexical_alternative
  - marker: c
    text: O «Elasá». El nombre hebreo אֶלְעָשָׂה admite transliteraciones españolas ligeramente distintas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מוֹצָ֖א
  english_pob_choice: And Moza
  chosen_spanish: Y Moza
  alternatives_spanish:
  - Ahora Moza
  - Moza
  lexicon: HALOT
  rationale: Conservo la conjunción narrativa para mantener la cadena genealógica; en español, «Y» es la forma natural y sobria de enlazar esta secuencia.
- source_word: הוֹלִ֣יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En contextos genealógicos, el causativo de ילד expresa paternidad generativa. «Engendró» conserva ese valor genealógico con dignidad y sin añadir paráfrasis.
- source_word: בִּנְעָ֑א
  english_pob_choice: Binea
  chosen_spanish: Binea
  alternatives_spanish:
  - Bina
  lexicon: HALOT
  rationale: Se translitera directamente el nombre propio. «Binea» refleja mejor la forma hebrea con apoyo vocálico final que una simplificación como «Bina».
- source_word: רָפָ֥ה
  english_pob_choice: Rephah
  chosen_spanish: Refa
  alternatives_spanish:
  - Rafa
  - Refa
  lexicon: HALOT
  rationale: El nombre se translitera en español con adaptación mínima fonética y ortográfica. «Refa» preserva la consonancia hebrea y evita una forma demasiado hispanizada que borre el vínculo con el original.
- source_word: בְנ֛/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo suyo
  - era su hijo
  lexicon: HALOT
  rationale: La relación genealógica se expresa de manera directa y natural en español con «su hijo», sin introducir un verbo copulativo que el hebreo no exige en la cadena sucesiva.
- source_word: אֶלְעָשָׂ֥ה
  english_pob_choice: Eleasah
  chosen_spanish: Eleasá
  alternatives_spanish:
  - Elesá
  - Elasá
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una terminación aguda que refleja la vocalización hebrea y resulta legible en español.
- source_word: אָצֵ֥ל
  english_pob_choice: Azel
  chosen_spanish: Azel
  alternatives_spanish:
  - Azel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar. Se mantiene «Azel» por continuidad con la tradición de transliteración y claridad textual.
translation_notes:
  revision_awareness: 'El audit trail en inglés mantiene la estructura genealógica breve y evita añadir un verbo copulativo extra antes de «his son». La redacción española sigue esa misma economía: conserva la sucesión nominal y usa una sola marca verbal para el primer nexo genealógico.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reproducir la continuidad genealógica del hebreo.
  - Los nombres propios se transliteran de forma consistente y no se sustituyen por equivalentes tradicionales no atestiguados aquí.
  - «Engendró» se usa como solución genealógica formal, en línea con el valor causativo del verbo hebreo.
