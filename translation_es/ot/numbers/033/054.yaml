review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura global del hebreo: reparto de la tierra por suerte, proporcionalidad según el tamaño del grupo, asignación determinada por el sorteo y recepción de las heredades por tribus ancestrales. Sin embargo, la cláusula אֶל אֲשֶׁר יֵצֵא לוֹ שָׁמָּה הַגּוֹרָל está mal resuelta en español con ''A quien le salga allí el sorteo'', porque desplaza el sentido locativo/direccional hacia una persona y suena poco natural. El hebreo apunta al lugar/área donde cae o sale el lote, no principalmente a la persona como objeto de ''salir''.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta varios giros poco naturales en español: ''le aumentarán su heredad'' y ''le disminuirán su heredad'' suenan redundantes; ''al menos numeroso'' requiere artículo o sustantivo expreso; y ''A quien le salga allí el sorteo'' es torpe y ambiguo. También conviene suavizar la repetición de ''Ustedes'' para un estilo bíblico natural en español.'
  glossary_alignment: 'La terminología principal está bien alineada: ''tierra'', ''clanes'', ''heredad/heredades'', ''tribus''. ''Por sorteo'' es aceptable para בְּגוֹרָל, aunque ''por sorteo'' / ''por suerte'' / ''por lotes'' son opciones contextuales; no hay conflicto teológico. La elección de ''heredad'' preserva bien נַחֲלָה. Se debe ajustar la cláusula del sorteo para reflejar mejor el valor idiomático documentado en el English POB.'
  issues:
  - severity: high
    issue: La cláusula 'A quien le salga allí el sorteo' no representa fiel ni naturalmente אֶל אֲשֶׁר יֵצֵא לוֹ שָׁמָּה הַגּוֹרָל.
    rationale: 'El original y la nota inglesa enfocan el lugar al que sale o cae la suerte: ''Wherever the lot falls for anyone''. En español actual, ''Donde le caiga el sorteo'' o ''Donde le salga la suerte'' comunica mejor el sentido.'
  - severity: medium
    issue: '''le aumentarán su heredad'' y ''le disminuirán su heredad'' son construcciones poco naturales.'
    rationale: En español estándar resulta más limpio 'aumentarán su heredad' y 'disminuirán su heredad', o bien 'harán mayor/menor su heredad'. El dativo es innecesario y entorpece la lectura.
  - severity: medium
    issue: '''al menos numeroso'' es gramaticalmente áspero e incompleto.'
    rationale: 'El paralelismo pide ''al menos numeroso'' solo si se sobreentiende ''grupo'', pero en español natural conviene repetirlo: ''al grupo menos numeroso''.'
  - severity: low
    issue: La repetición de 'Ustedes' al inicio y al final no es necesaria.
    rationale: El español bíblico fluye mejor sin explicitar el pronombre sujeto en ambos casos, salvo para énfasis.
  revised_spanish_text: Repartirán la tierra por sorteo, según sus clanes. Al grupo más numeroso le aumentarán su heredad, y al grupo menos numeroso le disminuirán su heredad. Donde le caiga el sorteo[a], esa será su porción. Recibirán sus heredades según las tribus de sus padres.
  revised_footnotes:
