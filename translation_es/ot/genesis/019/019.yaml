    reason: lexical_alternative
  - marker: c
    text: Hebreo «el mal»; aquí el sentido es la calamidad o el desastre que podría alcanzar a Lot.
    reason: lexical_alternative
  revision_rationale: Se corrigió «misericordia» a «amor leal» para reflejar mejor חֶסֶד según el expediente del POB y se añadió una nota con alternativas legítimas. Se reemplazó «que has mostrado conmigo» por «que me has mostrado» por fidelidad idiomática al sentido de עָשִׂיתָ עִמָּדִי. Se movió la nota lexical al sintagma correcto («desastre») para conservar la observación sobre הָרָעָה. También se ajustó «a la montaña» a «al monte» por naturalidad sin perder el singular direccional.
