  text: וַ/אדֹנָ֞/י הִשְׁמִ֣יעַ אֶת מַחֲנֵ֣ה אֲרָ֗ם ק֥וֹל רֶ֨כֶב֙ ק֣וֹל ס֔וּס ק֖וֹל חַ֣יִל גָּד֑וֹל וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל אָחִ֗י/ו הִנֵּ֣ה שָֽׂכַר עָלֵי/נוּ֩ מֶ֨לֶךְ יִשְׂרָאֵ֜ל אֶת מַלְכֵ֧י הַ/חִתִּ֛ים וְ/אֶת מַלְכֵ֥י מִצְרַ֖יִם לָ/ב֥וֹא עָלֵֽי/נוּ׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/006.yaml
  text: For the Lord had caused the camp of Aram to hear the sound of chariots[a], the sound of horses, the sound of a great army, and they said to one another, “Look, the king of Israel has hired the kings of the Hittites and the kings of Egypt against us[c][b], to come against us.”
