translation:
  language: es
  text: 'Y dije al rey[a]: «¡Que el rey viva para siempre! ¿Por qué no ha de estar triste mi rostro, cuando la ciudad, el lugar de las tumbas de mis padres, está en ruinas y sus puertas han sido consumidas por el fuego?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ‘la casa de las tumbas de mis padres’, un giro idiomático que se refiere al lugar asociado con el entierro de sus antepasados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Dije
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte de forma natural en pasado simple; el ‘y’ conserva la conexión discursiva sin volverlo rígido.
- source_word: לַמֶּלֶךְ / הַמֶּלֶךְ
  english_pob_choice: to the king / the king
  chosen_spanish: al rey / el rey
  alternatives_spanish:
  - al rey / rey
  - al rey / el rey
  lexicon: HALOT
  rationale: La primera mención funciona como objeto indirecto; la repetición posterior mantiene el tono reverente de la fórmula cortesana.
- source_word: לְעוֹלָם יִחְיֶה
  english_pob_choice: May the king live forever!
  chosen_spanish: ¡Que el rey viva para siempre!
  alternatives_spanish:
  - ¡Viva el rey para siempre!
  - ¡Que viva el rey por siempre!
  lexicon: HALOT
  rationale: La aclamación real se expresa con un deseo en español que conserva la cortesía y el sentido de larga vida, sin forzar un giro idiomático ajeno.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español para introducir la explicación de Nehemías.
- source_word: לֹא יֵרְעוּ פָנַי
  english_pob_choice: should my face not be sad
  chosen_spanish: no ha de estar triste mi rostro
  alternatives_spanish:
  - no ha de verse afligido mi rostro
  - no ha de estar mi rostro abatido
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea de ‘rostro’ como manifestación visible del estado interior, evitando una paráfrasis que borre la imagen facial.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia que explica la tristeza; ‘cuando’ preserva la relación circunstancial sin añadir causalidad explícita.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Se mantiene el referente indefinido del hebreo, que no nombra Jerusalén en este versículo.
- source_word: בֵּית קִבְרוֹת אֲבֹתַי
  english_pob_choice: the place of my fathers’ tombs
  chosen_spanish: el lugar de las tumbas de mis padres
  alternatives_spanish:
  - la casa de las tumbas de mis padres
  - el sitio de las tumbas de mis padres
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático del hebreo como lugar vinculado al entierro ancestral, usando una expresión natural en español sin perder la referencia a las tumbas.
- source_word: חֲרֵבָה
  english_pob_choice: lies in ruins
  chosen_spanish: está en ruinas
  alternatives_spanish:
  - yace en ruinas
  - está devastada
  lexicon: HALOT
  rationale: La forma predicativa se traduce de manera clara y fiel; ‘en ruinas’ reproduce bien el estado de devastación.
- source_word: וּשְׁעָרֶיהָ
  english_pob_choice: and its gates
  chosen_spanish: y sus puertas
  alternatives_spanish:
  - y sus portones
  - y sus accesos
  lexicon: HALOT
  rationale: ‘Puertas’ comunica el elemento urbano fortificado sin introducir un término demasiado técnico o más interpretativo.
- source_word: אֻכְּלוּ בָאֵשׁ
  english_pob_choice: have been consumed by fire
  chosen_spanish: han sido consumidas por el fuego
  alternatives_spanish:
  - han sido quemadas por el fuego
  - han sido devoradas por el fuego
  lexicon: HALOT
  rationale: Se mantiene la pasiva y la imagen de destrucción total; ‘consumidas por el fuego’ es natural en español y conserva la fuerza del hebreo.
translation_notes:
  revision_awareness: Coincido con el pasaje auditado en que no se requieren cambios respecto a la lectura inglesa base; la versión española sigue la misma solución óptima y conserva la tensión idiomática de ‘casa/lugar de las tumbas’ sin sobrerreformularla.
  spanish_consistency_notes:
  - Se mantiene el respeto cortesano con ‘el rey’ y la aclamación real en forma de deseo.
  - ‘Rostro’ se conserva como imagen semítica de la aflicción visible, evitando neutralizarla.
  - La nota al pie reproduce la aclaración lexical sobre בית קברות, con una formulación española fiel y compacta.
  - Se evita nombrar Jerusalén, ya que el hebreo dice simplemente ‘la ciudad’.
