translation:
  language: es
  text: Pero si ustedes se apartan y abandonan mis estatutos y mis mandamientos que he puesto ante ustedes[a], y van y sirven a otros dioses y se postran ante ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuelven atrás» o «se desvían». El verbo hebreo puede significar ampliamente «volver/retornar»; aquí el contexto favorece la idea de apartarse de la fidelidad al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula condicional aquí introduce contraste con las promesas anteriores; «pero» refleja mejor esa fuerza adversativa que un simple «y».
- source_word: תְּשׁוּבוּן
  english_pob_choice: turn away
  chosen_spanish: se apartan
  alternatives_spanish:
  - vuelven atrás
  - se desvían
  lexicon: HALOT
  rationale: שוב puede significar volver/volver atrás, pero en este contexto de advertencia el sentido es desviarse de la fidelidad al pacto; «se apartan» expresa bien esa idea sin sonar mecánico.
- source_word: וַעֲזַבְתֶּם
  english_pob_choice: forsake
  chosen_spanish: abandonan
  alternatives_spanish:
  - desamparan
  - dejan
  lexicon: HALOT
  rationale: עזב con frecuencia tiene el peso de abandonar o forsake; «abandonan» comunica con claridad la ruptura de lealtad covenantal y mantiene el registro formal.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: En contexto legal/pactual, חֻקִּים suele rendirse como «estatutos»; conserva la distinción con «mandamientos».
- source_word: וּמִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: מצות designa mandamientos; «mandamientos» preserva el paralelismo formal con «estatutos» y el tono bíblico.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  english_pob_choice: that I have set before you
  chosen_spanish: que yo he puesto delante de ustedes
  alternatives_spanish:
  - que yo les he dado delante de ustedes
  - que yo les he presentado
  lexicon: HALOT
  rationale: La idiomática hebrea de poner algo delante de alguien para su observancia se refleja bien con «he puesto delante de ustedes», conservando la imagen sin traducirla de modo plano.
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: go
  chosen_spanish: y van
  alternatives_spanish:
  - y caminan
  - y se van
  lexicon: HALOT
  rationale: En secuencia con la idolatría, הלך funciona como movimiento hacia otra lealtad; «van» es natural en español y mantiene el enlace narrativo con el verbo siguiente.
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - adoran
  - rinden servicio a
  lexicon: HALOT
  rationale: עבד al hablar de dioses suele referirse a servicio cultual; «sirven» conserva ese sentido amplio mejor que «adoran», que podría duplicar el verbo de postración.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: La expresión denota deidades distintas del Dios de Israel; «otros dioses» es directo y estándar en español bíblico.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  english_pob_choice: bow down to them
  chosen_spanish: se postran ante ellos
  alternatives_spanish:
  - se inclinan ante ellos
  - los adoran
  lexicon: HALOT
  rationale: השתחוה indica prosternación o inclinación física de homenaje; «se postran ante ellos» preserva la concreción del gesto, mientras «ante» comunica bien el dativo hebreo.
theological_decisions:
- issue: Lenguaje de apostasía dentro de una advertencia de pacto
  english_pob_reading: 'Render the sequence as turning away from the LORD''s covenant obligations into idolatrous service: ''turn away ... forsake ... go and serve other gods and bow down to them.'''
  chosen_spanish_reading: 'Traducir la secuencia como apartarse de la fidelidad al pacto y pasar a la idolatría: «se apartan ... abandonan ... van y sirven a otros dioses, y se postran ante ellos».'
  alternative_spanish_readings:
  - «vuelven atrás»
  - «se desvían»
  rationale: El pasaje contrasta obediencia con infidelidad; el español debe conservar esa carga teológica sin suavizarla ni introducir categorías ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «abandon» a «forsake» por registro más formal; en español se optó por «abandonan» para mantener claridad y fuerza covenantal, con el resto de la línea conservando estrecha correspondencia con el texto hebreo y la revisión final inglesa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el tetragrámaton aparece explícitamente; en este versículo no aparece.
  - «Estatutos» y «mandamientos» se conservaron como par de términos legales diferenciados, siguiendo la distinción del hebreo.
  - «Se postran» preserva el gesto físico de השתחוה, evitando diluirlo en un mero «adoran» que duplicaría «sirven».
