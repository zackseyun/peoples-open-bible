translation:
  language: es
  text: Y que me hagan un santuario para mí, para que yo habite entre ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en medio de ellos». El hebreo dice «entre ellos», destacando la presencia de Dios con el pueblo y no solo dentro de la estructura del santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  english_pob_choice: let them make
  chosen_spanish: me harán
  alternatives_spanish:
  - que me hagan
  - y harán
  lexicon: HALOT
  rationale: El hebreo perfecto con waw en contexto exhortativo expresa aquí un mandato/instrucción. En español, "me harán" transmite de manera natural esa fuerza directiva sin perder la tercera persona plural ni el sentido de acción requerida.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mi uso
  lexicon: HALOT
  rationale: 'La preposición ל con sufijo de primera persona señala destino/beneficio: el santuario debe estar destinado a Yahvé. "Para mí" conserva ese valor final y suena natural en español bíblico actual.'
- source_word: מִקְדָּשׁ
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - lugar santo
  - santuario sagrado
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un lugar apartado para la presencia divina. "Santuario" es el equivalente español más claro y estable, y evita una paráfrasis innecesaria.
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: so that I may dwell
  chosen_spanish: y habitaré
  alternatives_spanish:
  - y moraré
  - para habitar
  lexicon: HALOT
  rationale: La raíz שׁכן expresa habitar/establecerse. Aunque el inglés POB explicita la relación de propósito, en español la coordinación simple "y habitaré" conserva la promesa divina y permite que el contexto exprese el vínculo con la construcción del santuario.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: El hebreo significa literalmente "en su medio". "Entre ellos" reproduce de forma natural el énfasis teológico de presencia divina en medio del pueblo, no solo dentro de la estructura del santuario.
theological_decisions:
- issue: Lugar de la morada divina
  english_pob_reading: among them
  chosen_spanish_reading: entre ellos
  alternative_spanish_readings:
  - en él
  - en medio de ellos
  rationale: El sufijo plural hebreo exige referir la morada a la comunidad. "Entre ellos" mantiene la presencia de Dios con Israel como pueblo, sin reducir la frase a una localización exclusiva en el edificio.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El análisis previo del texto inglés mostró alta concordancia y no requirió revisiones sustanciales. Se mantuvo la distinción entre el santuario como objeto de construcción y la presencia divina como acción dirigida hacia el pueblo.
  spanish_consistency_notes:
  - Se conservó "santuario" como término técnico estable para מִקְדָּשׁ.
  - Se eligió "entre ellos" para reflejar el plural hebreo de בְּתוֹכָם y evitar una lectura restrictiva al edificio.
  - La coordinación simple "y habitaré" preserva la promesa sin sobreexplicar el matiz de propósito, que queda implícito en el contexto inmediato.
