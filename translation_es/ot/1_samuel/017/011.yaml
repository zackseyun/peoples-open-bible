translation:
  language: es
  text: Cuando Saúl y todo Israel oyeron estas palabras del filisteo[a], quedaron consternados y tuvieron mucho miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedaron consternados y muy asustados». El verbo hebreo traducido «quedaron consternados» también puede rendirse «quedaron dismayed/abatidos», y expresa más que simple miedo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: HALOT
  rationale: שׁמע en esta secuencia narrativa expresa oír al recibir noticia; «oyeron» conserva la naturalidad del español y el valor directo del verbo.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  lexicon: N/A
  rationale: Nombre propio en forma española estándar.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «todo Israel»; se mantiene la formulación colectiva sin explicitar «los israelitas».
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - declaraciones
  lexicon: HALOT
  rationale: El plural constructo se refiere a lo dicho por el filisteo; «palabras» es la opción más directa y natural en español.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: del filisteo
  alternatives_spanish:
  - del filisteo aquel
  lexicon: HALOT
  rationale: Se conserva el singular con artículo como referencia al campeón filisteo ya identificado en el contexto.
- source_word: וַיֵּחַתּוּ
  english_pob_choice: were dismayed
  chosen_spanish: quedaron consternados
  alternatives_spanish:
  - quedaron desmayados
  - quedaron abatidos
  lexicon: HALOT
  rationale: חתת puede expresar quedar quebrantado/abatido o consternado; «quedaron consternados» refleja bien el impacto emocional sin perder la fuerza del término ni confundirlo con miedo simple.
- source_word: וַיִּרְאוּ מְאֹד
  english_pob_choice: were greatly afraid
  chosen_spanish: tuvieron mucho miedo
  alternatives_spanish:
  - temieron mucho
  - tuvieron gran temor
  lexicon: HALOT
  rationale: ירא expresa temor; «tuvieron mucho miedo» es claro y fiel al énfasis de מְאֹד, evitando un giro excesivamente formal.
theological_decisions:
- issue: 'Matiz de dos verbos de respuesta emocional: וַיֵּחַתּוּ y וַיִּרְאוּ מְאֹד'
  english_pob_reading: they were dismayed and greatly afraid
  chosen_spanish_reading: quedaron consternados y tuvieron mucho miedo
  alternative_spanish_readings:
  - quedaron dismayed y muy atemorizados
  - quedaron abatidos y tuvieron mucho miedo
  rationale: Se preserva la tensión entre un primer verbo de quebranto/consternación y un segundo verbo explícito de temor. La traducción no los fusiona en un solo sentimiento, manteniendo la progresión del hebreo y el criterio revisado de la POB en inglés.
  doctrine_reference: Lexical nuance in narrative Hebrew; no doctrinal issue
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió «were shattered» por «were dismayed» para reflejar mejor וַיֵּחַתּוּ. En español se siguió esa revisión, evitando «quebrados» o «destrozados» y preservando además la distinción entre consternación y miedo en el segundo miembro.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en toda la serie, aunque este versículo no lo contiene.
  - Se usa «filisteo» en minúscula como etnónimo/adjetivo sustantivado según el contexto narrativo.
  - Se evita «Señor» o «Cristo», que no aplican aquí.
  - La puntuación y el orden sintáctico buscan una lectura fluida en español sin suavizar la secuencia verbal del hebreo.
