    rationale: 'הֶאֱמִין está en perfecto/construcción narrativa causal y en este contexto se entiende mejor como falta de credibilidad en ese momento: «no les creyó» o «no les podía creer». El imperfecto español puede sugerir hábito continuo.'
  - severity: low
    issue: «él es gobernante» suena algo tieso en español bíblico natural
    rationale: Aunque fiel, «gobernante» como predicado nominal con «él es» resulta menos fluido que «él gobierna» o «él es el gobernante». Conviene mantener el matiz de autoridad sin rigidez innecesaria.
  - severity: low
    issue: «Le informaron» es correcto, pero «Le dijeron» encaja mejor con el discurso directo inmediato
    rationale: וַיַּגִּדוּ puede ser ‘informar’, pero con לֵאמֹר y cita directa, «le dijeron» suena más natural y cercano al flujo narrativo.
