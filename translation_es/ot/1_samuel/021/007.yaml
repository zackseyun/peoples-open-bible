revisions:
- from: Así que el sacerdote le dio pan santo[a], porque allí no había pan, sino solo el pan de la Presencia, que había sido retirado de delante de Yahvé, para poner allí pan caliente el día en que se lo quitaban.
  to: Así que el sacerdote le dio pan santo[a], porque allí no había pan, sino solo el pan de la Presencia, que había sido retirado de delante de Yahvé, para poner allí pan caliente el día en que fue retirado.
  rationale: Se conserva la traducción base y su terminología, pero se reemplaza ‘el día en que se lo quitaban’ por ‘el día en que fue retirado’ para reflejar con mayor precisión el pasivo del hebreo, evitar ambigüedad pronominal y alinearse mejor con el audit trail inglés.
