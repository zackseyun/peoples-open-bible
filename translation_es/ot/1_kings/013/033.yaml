  yaml_path: translation/ot/1_kings/013/033.yaml
  text: After this event[a], Jeroboam did not turn from his evil way, but again made priests of the high places from among all the people. Whoever desired it, he ordained him, and he became one of the priests of the high places.
  footnotes:
