    text: Or 'a spirit clothed Amasai' or 'the spirit came upon Amasai.' The Hebrew literally says 'spirit clothed Amasai.'
    reason: alternative_reading
  - marker: b
    text: Or 'and peace to your helper'; the Hebrew singular may be understood collectively as 'your helpers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for your God has helped you.'
    reason: lexical_alternative
