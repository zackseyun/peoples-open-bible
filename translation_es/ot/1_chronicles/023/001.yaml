translation:
  language: es
  text: Ahora bien, David era anciano y lleno de días[a], e hizo rey a su hijo Salomón sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «avanzado en años»; literalmente, «anciano y lleno de días».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָוִ֥יד
  english_pob_choice: Now David
  chosen_spanish: Ahora bien, David
  alternatives_spanish:
  - Y David
  - Entonces David
  lexicon: HALOT
  rationale: El hebreo abre la escena con una conjunción narrativa. «Ahora bien» conserva la transición discursiva de manera natural en español sin añadir contenido nuevo.
- source_word: זָקֵ֖ן
  english_pob_choice: was old
  chosen_spanish: era viejo
  alternatives_spanish:
  - estaba viejo
  - era anciano
  lexicon: HALOT
  rationale: El qatal con David como sujeto describe su edad avanzada. «Era viejo» es directo y fiel; «anciano» sería más interpretativo y más solemne de lo que exige el hebreo.
- source_word: וְ/שָׂבַ֣ע יָמִ֑ים
  english_pob_choice: and full of days
  chosen_spanish: y lleno de días
  alternatives_spanish:
  - y satisfecho de días
  - y con muchos días
  - y avanzado en años
  lexicon: HALOT
  rationale: Se conserva el giro idiomático «lleno de días», que refleja la imagen hebrea de una vida colmada sin reducirla a una paráfrasis cronológica. «Avanzado en años» explica el sentido, pero pierde la resonancia literaria.
- source_word: וַ/יַּמְלֵ֛ךְ
  english_pob_choice: he made ... king
  chosen_spanish: hizo rey a
  alternatives_spanish:
  - constituyó rey a
  - coronó a
  - hizo que ... reinara
  lexicon: HALOT
  rationale: El verbo en forma causativa expresa que David instaló a Salomón en la realeza. «Hizo rey a» preserva esa fuerza causativa sin introducir una ceremonia que el texto no menciona.
- source_word: אֶת שְׁלֹמֹ֥ה בְנ֖/וֹ
  english_pob_choice: his son Solomon
  chosen_spanish: a su hijo Salomón
  alternatives_spanish:
  - a Salomón su hijo
  - a su hijo, Salomón
  lexicon: HALOT
  rationale: 'El español natural coloca primero el vínculo filial: «a su hijo Salomón». Mantiene explícita la relación del hebreo sin forzar el orden.'
- source_word: עַל יִשְׂרָאֵֽל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre todo Israel
  - para Israel
  lexicon: HALOT
  rationale: La preposición de entronización se vierte con «sobre», que expresa dominio o gobierno. No se añade «todo» porque no aparece en este versículo.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y al hebreo, manteniendo el valor idiomático de «lleno de días» y la causatividad de וַיַּמְלֵךְ sin introducir ceremonia ni ampliaciones interpretativas. No hubo revisiones posteriores sustantivas en el registro inglés, por lo que la redacción española sigue de cerca la solución auditada.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según los lineamientos generales del proyecto; este versículo no los contiene.
  - Se mantuvo un registro bíblico sobrio y legible, sin calcos innecesarios.
  - La nota al pie conserva la alternativa semántica documentada en el POB inglés.
