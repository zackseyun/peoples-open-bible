translation:
  language: es
  text: y una décima parte por cada cordero[a], para los catorce corderos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite literalmente «un décimo, un décimo»; la repetición expresa la porción asignada a cada cordero individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עִשָּׂרׄוֹן֙ עִשָּׂר֔וֹן
  english_pob_choice: one-tenth
  chosen_spanish: una décima parte
  alternatives_spanish:
  - un décimo
  - una medida de un décimo
  - un décimo de un efa
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo de medida con valor distributivo. En español, «una décima parte» conserva con claridad la idea de fracción y evita una formulación demasiado técnica; la repetición queda reflejada en la nota, no en una duplicación forzada del sustantivo.
- source_word: לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד
  english_pob_choice: for each lamb
  chosen_spanish: por cada cordero
  alternatives_spanish:
  - para el cordero único
  - para un cordero
  - por el cordero uno
  lexicon: HALOT
  rationale: La construcción hebrea es distributiva («para el único cordero» en sentido literal), pero el español natural exige expresar esa distribución con «por cada». «Cordero» es el equivalente léxico normal de כֶּבֶשׂ en contexto sacrificial.
- source_word: לְ/אַרְבָּעָ֥ה עָשָׂ֖ר כְּבָשִֽׂים
  english_pob_choice: for the fourteen lambs
  chosen_spanish: para los catorce corderos
  alternatives_spanish:
  - para catorce corderos
  lexicon: HALOT
  rationale: El plural definido del hebreo señala el grupo total de corderos ya especificado en el contexto ritual. En español, «los catorce corderos» mantiene esa referencia determinada y suena más natural que una simple enumeración indefinida.
translation_notes:
  revision_awareness: El texto en inglés POB ya refleja una decisión distributiva estable («one-tenth for each lamb») y la revisión más reciente no introdujo cambios. La versión española conserva esa lectura, pero la formula con una construcción natural en español y mantiene la repetición hebrea en nota.
  spanish_consistency_notes:
  - Se usa «cordero» para כֶּבֶשׂ en coherencia con el lenguaje sacrificial.
  - Se evita «SEÑOR» o terminología tradicional no pertinente porque el versículo no contiene el nombre divino ni títulos cristológicos.
  - Se conserva el valor distributivo del hebreo sin añadir elementos interpretativos ajenos al texto.
