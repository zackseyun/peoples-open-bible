  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὑποτάγητε πάσῃ ἀνθρωπίνῃ κτίσει διὰ τὸν κύριον· εἴτε βασιλεῖ ὡς ὑπερέχοντι,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/013.yaml
  text: "Submit yourselves to every human institution for the Lord's sake, whether to a king as one in authority,"
translation:
  language: ko
  text: '주를 위하여 모든 사람이 세운 제도에 복종하십시오. 위에 있는 자로서의 왕에게든지,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑποτάγητε
  english_pob_choice: Submit yourselves
  chosen_korean: 복종하십시오
  alternatives_korean:
  - 순복하십시오
  - 자신을 굴복시키십시오
  lexicon: BDAG
  rationale: 2:13·3:1·3:22·5:5 등 ὑποτάσσω 계열의 일관 번역을 위해 「복종하다」로 통일.
- source_word: πάσῃ ἀνθρωπίνῃ κτίσει
  english_pob_choice: every human institution
  chosen_korean: 모든 사람이 세운 제도
  alternatives_korean:
  - 모든 인간 제도
  - 모든 사람의 권위
  lexicon: BDAG
  rationale: ἀνθρώπινος κτίσις는 「인간이 만든 기관·권위」를 가리킨다. 「사람이 세운 제도」로 자연스럽게 풀어 옮긴다.
- source_word: διὰ τὸν κύριον
  english_pob_choice: for the Lord's sake
  chosen_korean: 주를 위하여
  alternatives_korean:
  - 주님을 위하여
  - 주님 때문에
  lexicon: BDAG
  rationale: 예수께 적용된 κύριος는 「주」.
- source_word: βασιλεῖ ὡς ὑπερέχοντι
  english_pob_choice: a king as one in authority
  chosen_korean: 위에 있는 자로서의 왕
  alternatives_korean:
  - 최고 권위자인 왕
  - 으뜸 되는 자로서의 왕
  lexicon: BDAG
  rationale: ὑπερέχοντι의 「위에 있음」을 「위에 있는 자」로 옮긴다. 절대 권력이 아니라 「상대적 우위」를 가리킨다.
