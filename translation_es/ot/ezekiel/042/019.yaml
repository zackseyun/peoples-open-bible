    reason: cultural_note
  - marker: b
    text: Algunas interpretaciones y versiones leen «codos» en este contexto de medición, pero el hebreo aquí dice «cañas».
    reason: alternative_reading
  revision_rationale: Se ajusta una expresión poco idiomática («el lado del oeste») a una formulación española más natural («el lado occidental») sin alterar el sentido direccional del hebreo ni las decisiones léxicas del POB.
