lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal futura; «cuando» suena natural en español y conserva el valor prospectivo sin añadir repetición que el griego no exige.
- source_word: ἐξέλθῃ
  english_pob_choice: it goes out
  chosen_spanish: salga
  alternatives_spanish:
  - salga fuera
  - vaya contra
  lexicon: BDAG
  rationale: El griego deja el sujeto implícito; el subjuntivo en español encaja con «cuando» y mantiene la idea de salida/movimiento sin especificar indebidamente el agente.
- source_word: ἐφʼ ἁμαρτωλοὺς
  english_pob_choice: against sinners
  chosen_spanish: contra los pecadores
  alternatives_spanish:
  - sobre los pecadores
  - contra los culpables
  lexicon: BDAG
  rationale: Con verbo de movimiento, la preposición expresa dirección hostil. «Contra» comunica claramente el sentido de juicio que el contexto demanda.
- source_word: ἀπὸ προσώπου Κυρίου
  english_pob_choice: from the presence of the Lord
  chosen_spanish: desde la presencia de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - de delante de Yahvé
  lexicon: LSJ
  rationale: «προσώπου» conserva la imagen de presencia/faz; en este proyecto κύριος referido al nombre divino se vierte como «Yahvé». «Desde» preserva mejor el valor de procedencia del juicio que «de delante de» en español actual.
- source_word: ὀλεθρεύσαι
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para exterminar
  lexicon: LSJ
  rationale: El infinitivo expresa propósito o resultado. «Destruir» es fuerte y directo, sin intensificar más allá de lo que el griego exige.
- source_word: πᾶσαν ὑπόστασιν ἁμαρτωλῶν
  english_pob_choice: every possession of sinners
  chosen_spanish: toda posesión de los pecadores
  alternatives_spanish:
  - toda sustancia de los pecadores
  - todo lo que sostiene a los pecadores
  - toda hacienda de los pecadores
  lexicon: LSJ
  rationale: En griego judío helenístico, ὑπόστασις puede referirse a bienes, patrimonio o lo que constituye la posesión/subsistencia de alguien. «Posesión» mantiene esa amplitud patrimonial de forma natural en español, y evita tanto un calco metafísico como una paráfrasis excesiva.
theological_decisions:
- issue: Nombre divino en κύριος
  english_pob_reading: from the presence of the Lord
  chosen_spanish_reading: desde la presencia de Yahvé
  alternative_spanish_readings:
  - desde la presencia del Señor
  rationale: El proyecto pide traducir el nombre divino como «Yahvé» en el texto principal. Aquí κύριος funciona como referencia al nombre divino, no como un título genérico, por lo que se sigue esa convención.
  doctrine_reference: YHWH name rendering default
translation_notes:
  revision_awareness: La revisión inglesa desplazó ὑπόστασις desde «support» hacia «substance/possessions», y la última pasarela prefirió «every possession». La versión española sigue esa decisión y opta por «posesión», que comunica mejor el valor patrimonial/posesivo del término en este contexto que un calco de «sustancia» o «apoyo»; la nota conserva la alternativa más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para κύριος conforme al criterio del proyecto.
  - «Pecadores» traduce ἁμαρτωλοὺς de manera directa y estable.
  - Se evita «SEÑOR» para no ocultar el nombre divino en un contexto donde el audit trail lo identifica como referencia a κύριος divino.
  - La estructura verbal «cuando salga... para destruir...» refleja el griego con naturalidad en español y conserva la relación de propósito/resultadо.
