  rationale: The Ge'ez preposition 'ba-'enta' typically means 'for,' 'concerning,'
    or 'on behalf of.' While a testimony can function 'against' someone, translating
    it as 'against' here is interpretive and breaks the parallel with the following
    phrase 'and for their generations' (wa-ba-tewleddomu).
