translation:
  language: es
  text: Porque su lengua ha sido raspada por un artesano[a], y están recubiertos de oro y plata, pero son falsos[b] y no pueden hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ha sido tallada' o 'ha sido pulida' por un artesano. El verbo griego destaca el trabajo de raspado o alisado hecho por el artesano sobre el ídolo.
    reason: lexical_alternative
  - marker: b
    text: O 'son mentira' o 'son falsedad'. El griego puede describir a los ídolos como cosas falsas o como encarnaciones de falsedad.
    reason: alternative_reading
lexical_decisions:
- source_word: Γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua física
  - lengua corporal
  - idioma
  lexicon: LSJ
  rationale: En español, 'lengua' conserva el sentido corporal directo del griego, adecuado porque el contexto contrasta la capacidad de hablar con la mudez de los ídolos. 'Idioma' sería demasiado abstracto y debilitaría la imagen física.
- source_word: κατεξυσμένη
  english_pob_choice: has been scraped
  chosen_spanish: ha sido raspada
  alternatives_spanish:
  - ha sido esculpida
  - ha sido pulida
  - ha sido tallada
  lexicon: LSJ
  rationale: '''Raspada'' sigue de cerca la idea de un trabajo de raspado o desbaste con herramienta. ''Pulida'' añadiría una suavidad no explicitada; ''tallada'' o ''esculpida'' son posibles, pero menos precisas respecto del matiz del verbo.'
- source_word: ὑπὸ τέκτονος
  english_pob_choice: by a craftsman
  chosen_spanish: por un artesano
  alternatives_spanish:
  - por un carpintero
  - por un artífice
  - por un constructor
  lexicon: LSJ
  rationale: τέκτων puede abarcar a un trabajador artesanal o constructor, no solo a un carpintero. 'Artesano' expresa mejor el sentido general y evita restringir indebidamente la figura.
- source_word: περίχρυσα
  english_pob_choice: overlaid with gold
  chosen_spanish: recubiertos de oro
  alternatives_spanish:
  - dorados
  - cubiertos de oro
  - chapados en oro
  lexicon: LSJ
  rationale: La construcción describe una capa exterior de oro. 'Recubiertos de oro' mantiene la imagen material y la paridad con el miembro siguiente sobre plata.
- source_word: περιάργυρα
  english_pob_choice: overlaid with silver
  chosen_spanish: recubiertos de plata
  alternatives_spanish:
  - plateados
  - cubiertos de plata
  - chapados en plata
  lexicon: LSJ
  rationale: Paralelo a 'recubiertos de oro', conserva la simetría retórica del griego y el carácter material de la descripción.
- source_word: ψευδῆ
  english_pob_choice: 'false'
  chosen_spanish: falsos
  alternatives_spanish:
  - mentirosos
  - falsedad
  - engañosos
  lexicon: LSJ
  rationale: El griego permite entender a los ídolos como cosas falsas o como encarnaciones de falsedad. 'Falsos' es la opción más breve y fiel al valor predicativo sin forzar una personificación adicional.
- source_word: οὐ δύνανται λαλεῖν
  english_pob_choice: cannot speak
  chosen_spanish: no pueden hablar
  alternatives_spanish:
  - no pueden hablar
  - no son capaces de hablar
  - no pueden decir nada
  lexicon: LSJ
  rationale: '''Hablar'' reproduce de forma natural la incapacidad verbal de los ídolos. ''Decir nada'' sería una ampliación interpretativa; ''no son capaces de hablar'' es correcto, pero más pesado.'
theological_decisions:
- issue: Valor de ψευδῆ aplicado a los ídolos
  english_pob_reading: they are false
  chosen_spanish_reading: son falsos
  alternative_spanish_readings:
  - son mentira
  - son una mentira
  - son falsedad
  rationale: Se preserva la denuncia ontológica/polemista del texto sin resolverla hacia una sola lectura filosófica. 'Son falsos' mantiene abierta la tensión entre falsedad, irrealidad e idolatría, como en el audit trail inglés.
  doctrine_reference: Mantener la tensión textual; primacía del original sobre una paráfrasis doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita añadir ''suave/pulida'' a κατεξυσμένη; se mantiene la coordinación simple ''pero'' para reflejar el contraste directo del griego; y se conserva la afirmación breve y polemista de que los ídolos son falsos y mudos.'
  spanish_consistency_notes:
  - Se emplea 'lengua' en lugar de 'idioma' para respetar la imagen corporal del original.
  - '''Artesano'' se usa como equivalente amplio de τέκτων, sin restringirlo a ''carpintero''.'
  - '''Recubiertos'' mantiene el paralelismo oro/plata y la idea de una capa externa.'
  - '''Falsos'' conserva la ambigüedad teológica del predicado griego sin exceder el texto.'
  - La puntuación y el orden de miembros siguen un estilo bíblico moderno y natural en español.
