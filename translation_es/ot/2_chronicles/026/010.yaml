translation:
  language: es
  text: Construyó torres[a] en el desierto y excavó muchos aljibes, porque tenía mucho ganado; y en la llanura baja[b] y en la llanura tenía agricultores y viñadores, en los montes y en la tierra fértil[c], porque amaba el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «torres de vigilancia» para «torres».
    reason: lexical_alternative
  - marker: b
    text: O «la Sefela», la región de las colinas bajas de Judá.
    reason: cultural_note
  - marker: c
    text: O «en el Carmelo» si se toma como nombre propio, en vez de «en la tierra fértil».
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְדָּלִים
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - torres de vigilancia
  - atalayas
  lexicon: HALOT
  rationale: מִגְדָּלִים designa torres; como en el inglés POB, la función vigilante es posible pero no está explícita en el hebreo. «Torres» mantiene la restricción textual y es natural en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: El hebreo puede abarcar desierto, zona agreste o estepa. «Desierto» comunica bien el contraste con las construcciones y el agua, sin especificar más de lo que el texto dice.
- source_word: וַיַּחְצֹב
  english_pob_choice: cut out
  chosen_spanish: excavó
  alternatives_spanish:
  - labró
  - cavó
  lexicon: HALOT
  rationale: Con «aljibes» como objeto, el verbo implica excavar o labrar en piedra. «Excavó» preserva la acción material sin sonar forzado en español.
- source_word: בֹּרוֹת
  english_pob_choice: cisterns
  chosen_spanish: aljibes
  alternatives_spanish:
  - cisternas
  - pozos
  lexicon: HALOT
  rationale: En este contexto de almacenamiento de agua para ganado, el sentido es de depósitos excavados. «Aljibes» es un equivalente español preciso y bíblicamente reconocido; se prefiere a «pozos», que sugiere agua de manantial.
- source_word: מִקְנֶה רַב
  english_pob_choice: much livestock
  chosen_spanish: mucho ganado
  alternatives_spanish:
  - muchos rebaños
  - gran cantidad de ganado
  lexicon: HALOT
  rationale: מִקְנֶה es un colectivo de ganado/livestock. «Mucho ganado» es claro y conserva el valor colectivo sin estrecharlo a una sola especie.
- source_word: שְׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefela
  alternatives_spanish:
  - la llanura baja
  - la región baja
  lexicon: HALOT
  rationale: Aquí el término señala la región geográfica judeana. Siguiendo la nota cultural del inglés POB, se mantiene el topónimo regional «Sefela» en el texto principal para conservar la referencia histórica precisa.
- source_word: מִישׁוֹר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - la meseta
  lexicon: HALOT
  rationale: El término denota tierra nivelada. «Llanura» es la equivalencia más directa y clara en español; «meseta» sería más específica de elevación y no está exigida por el contexto.
- source_word: אִכָּרִים
  english_pob_choice: farmers
  chosen_spanish: campesinos
  alternatives_spanish:
  - agricultores
  - labradores
  lexicon: HALOT
  rationale: La palabra refiere a trabajadores de la tierra, sobre todo labradores. «Campesinos» comunica bien el vínculo con el campo en español sin sonar arcaico; se conserva el perfil agrícola del término.
- source_word: כֹרְמִים
  english_pob_choice: vinedressers
  chosen_spanish: viñadores
  alternatives_spanish:
  - viticultores
  - podadores de viñas
  lexicon: HALOT
  rationale: El término designa a quienes cultivan viñas. «Viñadores» mantiene esa especificidad y es un equivalente tradicional y comprensible en español bíblico.
- source_word: בֶּהָרִים
  english_pob_choice: in the hills
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las colinas
  - en las montañas
  lexicon: HALOT
  rationale: Aunque puede significar montañas, el plural en este contexto agrícola funciona bien como relieve alto. «Montes» conserva amplitud geográfica y una resonancia bíblica natural en español.
- source_word: בַּכַּרְמֶל
  english_pob_choice: in the fertile land
  chosen_spanish: en la tierra fértil
  alternatives_spanish:
  - en el Carmelo
  - en el terreno fértil
  lexicon: HALOT
  rationale: Siguiendo la lectura principal del POB, aquí כַּרְמֶל se entiende como sustantivo común, no como nombre propio. «Tierra fértil» expresa el sentido agrícola y evita forzar el topónimo «Carmelo».
- source_word: אֹהֵב אֲדָמָה
  english_pob_choice: he loved the soil
  chosen_spanish: amaba la tierra
  alternatives_spanish:
  - amaba el suelo
  - amaba la labranza
  lexicon: HALOT
  rationale: אֲדָמָה significa tierra/suelo/terreno. «Amaba la tierra» mantiene la imagen concreta y la motivación agrícola del versículo; «suelo» sería más literal pero menos idiomático al final de la frase.
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente sin cambios sustantivos. Se ha conservado la lectura principal del POB para מִגְדָּלִים, בֹּרוֹת, שְׁפֵלָה y בַּכַּרְמֶל, y se ha ajustado la formulación al español para mantener claridad, precisión agrícola y referencia geográfica auditable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí porque el versículo no contiene el tetragrámaton.
  - Se prefirió «aljibes» por la precisión del objeto excavado para almacenar agua.
  - Se conservó la distinción entre «campesinos» y «viñadores» para reflejar dos tipos de trabajo agrícola distintos.
  - «Sefela» se dejó sin traducir en el texto principal para respetar la nota geográfica del POB; la alternativa aclaratoria queda en nota.
  - No se usó «Cristo» ni otra terminología cristológica porque no aparece en el versículo.
