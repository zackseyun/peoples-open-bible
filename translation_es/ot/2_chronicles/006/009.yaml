    rationale: En el texto español, [a] aparece en «la casa», pero su nota explica «casa/templo» y en el expediente inglés esa alternativa corresponde a «the house/temple», mientras [b] aparece en la frase de descendencia. Actualmente el contenido de las notas quedó invertido respecto de sus anclajes y debe corregirse.
