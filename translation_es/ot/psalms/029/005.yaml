translation:
  language: es
  text: La voz de Yahvé rompe cedros[a][b]; Yahvé destroza los cedros del Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''El sonido de Yahvé''. El hebreo qol puede significar ''voz'' o ''sonido''; aquí se prefiere ''voz'' para conservar el carácter personal y teofánico del versículo.'
    reason: lexical_alternative
  - marker: b
    text: La segunda cláusula repite la misma raíz hebrea que la primera; 'destroza' en español refleja la intensificación poética que en inglés se marcó con 'shatters'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל יְהוָה
  english_pob_choice: The voice of Yahweh
  chosen_spanish: La voz de Yahvé
  alternatives_spanish:
  - El sonido de Yahvé
  lexicon: HALOT
  rationale: קוֹל puede significar 'voz' o 'sonido'. En este salmo, 'voz' conserva mejor el efecto personal y teofánico del trueno divino, en línea con la decisión auditada del POB en inglés. Se mantiene Yahvé como nombre propio del tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como 'Yahvé' según la guía doctrinal del proyecto, preservando el nombre personal del pacto y no sustituyéndolo por un título.
- source_word: שֹׁבֵר
  english_pob_choice: breaks
  chosen_spanish: rompe
  alternatives_spanish:
  - quiebra
  - parte
  lexicon: HALOT
  rationale: El participio qal funciona verbalmente en la línea poética y expresa acción vívida y presente; 'rompe' es natural en español y conserva la fuerza del original.
- source_word: אֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: cedros
  alternatives_spanish:
  - árboles de cedro
  lexicon: HALOT
  rationale: El sustantivo plural refiere a cedros en general; 'cedros' es conciso, idiomático y fiel al registro poético.
- source_word: וַיְשַׁבֵּר
  english_pob_choice: shatters
  chosen_spanish: destroza
  alternatives_spanish:
  - rompe
  - quiebra
  lexicon: HALOT
  rationale: El hebreo repite la misma raíz שבר en la segunda cláusula. En español, 'destroza' conserva la intensificación poética que el POB señaló con 'shatters', evitando una repetición plana de 'rompe'.
- source_word: אֶת אַרְזֵי הַלְּבָנוֹן
  english_pob_choice: the cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros del Líbano
  lexicon: HALOT
  rationale: La construcción posesiva/local identifica los famosos cedros vinculados con el Líbano. 'Del Líbano' preserva el giro bíblico elevado y la referencia geográfica tradicional.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: 'La versión española debe reflejar el mismo principio doctrinal que el POB en inglés: transliterar el nombre divino en lugar de ocultarlo bajo un título. ''Yahvé'' es la forma adoptada por el proyecto para el tetragrámaton.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensificación poética entre las dos cláusulas
  english_pob_reading: breaks ... shatters
  chosen_spanish_reading: rompe ... destroza
  alternative_spanish_readings:
  - rompe ... rompe
  - quiebra ... quiebra
  rationale: El hebreo repite la misma raíz verbal, pero el POB en inglés ya documenta una intensificación deliberada en la segunda cláusula. 'Destroza' preserva esa tensión sin perder la equivalencia semántica.
  doctrine_reference: 'Poética hebrea: repetición intensificadora de שבר'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando ambos marcadores de nota [a] y [b] directamente en el texto español. La redacción sigue el mismo dictamen de alta concordancia del audit trail inglés, sin introducir cambios sustantivos respecto de la lectura fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para el tetragrámaton, conforme al estándar del proyecto.
  - Se conserva la repetición semántica de שבר con intensificación en la segunda mitad del versículo.
  - El orden de los miembros sigue la estructura poética hebrea con español natural y publicación-readable.
