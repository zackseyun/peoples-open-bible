translation:
  language: es
  text: Y Onías recibió con honor[a] al hombre que había sido enviado, y recibió las cartas[b], en las cuales se exponían alianza y amistad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «acogió al enviado con honor». El griego dice más literalmente: «recibió al hombre que había sido enviado con honor».'
    reason: lexical_alternative
  - marker: b
    text: O «en las cuales se aclaraban alianza y amistad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδέξατο
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - acogió
  - dio recibimiento a
  lexicon: LSJ
  rationale: El verbo expresa recibir o dar acogida. «Recibió» conserva la secuencia narrativa y no fuerza un matiz más afectivo del que el griego exige por sí mismo.
- source_word: ἐνδόξως
  english_pob_choice: honorably
  chosen_spanish: con honra
  alternatives_spanish:
  - honorablemente
  - con honor
  lexicon: LSJ
  rationale: El adverbio indica una recepción digna y honorífica. «Con honra» comunica bien la dignidad social de la recepción en español natural y mantiene el matiz de honor.
- source_word: τὸν ἄνδρα τὸν ἀπεσταλμένον
  english_pob_choice: the man who had been sent
  chosen_spanish: al hombre que había sido enviado
  alternatives_spanish:
  - al enviado
  - al mensajero que había sido enviado
  lexicon: LSJ
  rationale: La construcción griega es descriptiva («el hombre, el enviado»), no un título técnico. La versión escogida sigue de cerca la forma griega y evita sobreinterpretar con «enviado» como cargo.
- source_word: ἔλαβε τὰς ἐπιστολάς
  english_pob_choice: he received the letters
  chosen_spanish: recibió las cartas
  alternatives_spanish:
  - tomó las cartas
  lexicon: LSJ
  rationale: En este contexto diplomático, «recibió» es más preciso que «tomó» y reproduce la acción formal de aceptar el documento.
- source_word: διεσάφειτο
  english_pob_choice: were set forth
  chosen_spanish: se exponían
  alternatives_spanish:
  - se aclaraban
  - se daban a conocer
  lexicon: LSJ
  rationale: El imperfecto pasivo indica que el contenido de las cartas quedaba expuesto o aclarado. «Se exponían» preserva la pasividad y el tono formal mejor que una paráfrasis más libre.
- source_word: συμμαχίας
  english_pob_choice: an alliance
  chosen_spanish: una alianza
  alternatives_spanish:
  - alianza
  - pacto de alianza
  lexicon: LSJ
  rationale: El sustantivo denota una alianza, frecuentemente política o militar. Se conserva el artículo porque el español lo pide al introducir el contenido específico de las cartas.
- source_word: φιλίας
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - amistad recíproca
  - buenas relaciones
  lexicon: LSJ
  rationale: En contexto diplomático, el término refiere amistad o relaciones amistosas. «Amistad» es la traducción directa y mantiene el paralelismo con «alianza».
translation_notes:
  revision_awareness: He seguido el texto griego de Swete y el hilo de decisión del POB inglés, especialmente en ἐπεδέξατο / ἐνδόξως / διεσάφειτο. Mantengo la literalidad descriptiva de «el hombre que había sido enviado» y el tono diplomático formal de las cartas, sin convertir la frase en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrama; aquí no aparece.
  - «Honra» se eligió para reflejar el matiz de dignidad sin introducir una lectura devocional ajena al contexto diplomático.
  - «Cartas» traduce ἐπιστολάς en sentido documental/diplomático, no epistolar privado.
