translation:
  language: es
  text: Y ella, con amargura de alma[a], oró a Yahvé y lloró amargamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''amarga de alma'', un modismo que expresa profunda angustia interior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''lloró intensamente'' o ''siguió llorando''. La construcción hebrea usa un infinitivo absoluto con verbo finito para intensificar la acción: literalmente, ''llorando lloró''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָרַת נָפֶשׁ
  english_pob_choice: bitter in soul
  chosen_spanish: amargada en su alma
  alternatives_spanish:
  - profundamente angustiada
  - amargada de alma
  - en amargura de alma
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice 'amarga de alma'. 'Amargada en su alma' conserva la imagen y la intensidad emocional sin volverla artificial en español. 'Profundamente angustiada' suaviza la metáfora; 'amargada de alma' suena menos natural.
- source_word: וַתִּתְפַּלֵּל
  english_pob_choice: she prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rogó
  - oró con fervor
  lexicon: HALOT
  rationale: El hitpael de פלל aquí significa sencillamente 'orar'. En español, 'oró' es claro y fiel; no es necesario introducir 'con fervor', porque el contexto de lágrimas ya comunica la intensidad.
- source_word: עַל יְהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Aunque עַל con התפלל puede funcionar idiomáticamente como dirección de la oración, en español la preposición más directa y natural es 'a'. Se mantiene 'Yahvé' por la convención del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte 'Yahvé' según el estándar del proyecto en español. Preserva el nombre divino personal en vez de sustituirlo por un título.
- source_word: וּבָכֹה תִבְכֶּה
  english_pob_choice: wept bitterly
  chosen_spanish: lloró amargamente
  alternatives_spanish:
  - lloró con amargura
  - siguió llorando
  - lloró mucho
  lexicon: HALOT
  rationale: 'La construcción de infinitivo absoluto más verbo finito intensifica la acción: ''llorando lloró''. ''Lloró amargamente'' transmite bien la fuerza enfática y además armoniza con la amargura del inicio sin perder el valor intensivo. ''Siguió llorando'' capta la duración, pero no tanto la intensificación.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre divino del texto hebreo y se sigue la convención editorial del proyecto en español, evitando la sustitución por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La decisión inglesa más reciente prefirió 'wept bitterly' sobre 'wept greatly' para reflejar mejor la intensidad del hebreo. En español se optó por 'lloró amargamente', que mantiene tanto la fuerza intensiva como la resonancia con 'amargada en su alma'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se evitó 'Señor' como sustituto del nombre divino.
  - Se conservó el paralelismo emocional entre 'amargada' y 'amargamente'.
  - '''Oró'' se usa en sentido directo, sin añadir un adverbio de intensidad que el verbo hebreo no exige por sí mismo.'
