translation:
  language: es
  text: Entonces David dio a Salomón, su hijo, el plano del pórtico, sus casas, sus tesorerías, sus habitaciones superiores, sus cámaras interiores y la casa del propiciatorio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cubierta de expiación» para «el propiciatorio». El hebreo כַּפֹּרֶת designa la cubierta del arca en el Lugar Santísimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: Then David gave
  chosen_spanish: Entonces David dio
  alternatives_spanish:
  - Y David dio
  lexicon: BHS/WLC
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» comunica esa secuencia de modo natural en español sin perder el valor discursivo del verbo.
- source_word: תַּבְנִית
  english_pob_choice: plan
  chosen_spanish: plano
  alternatives_spanish:
  - patrón
  - diseño
  lexicon: HALOT
  rationale: En contexto arquitectónico, תַּבְנִית designa una forma o esquema dado para construir. «Plano» es un equivalente moderno y claro para un documento o modelo constructivo.
- source_word: הָאוּלָם
  english_pob_choice: the portico
  chosen_spanish: el pórtico
  alternatives_spanish:
  - el vestíbulo
  - el portal
  lexicon: HALOT
  rationale: El término se refiere al espacio de entrada del edificio sagrado. «Pórtico» conserva el carácter arquitectónico sin volverlo demasiado técnico ni demasiado doméstico.
- source_word: בָּתָּיו
  english_pob_choice: its houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus edificios
  - sus habitaciones
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «houses» para acercarse al sustantivo básico בית, en español «casas» mantiene mejor la correspondencia léxica directa. Se conserva la ambigüedad arquitectónica del plural sin forzar una explicación interpretativa.
- source_word: גַנְזַכָּיו
  english_pob_choice: its treasuries
  chosen_spanish: sus tesorerías
  alternatives_spanish:
  - sus almacenes
  - sus depósitos de tesoro
  lexicon: HALOT
  rationale: El término denota lugares de custodia de bienes valiosos. «Tesorerías» reproduce el valor institucional/arquitectónico y es suficientemente transparente en español bíblico moderno.
- source_word: עֲלִיֹּתָיו
  english_pob_choice: its upper rooms
  chosen_spanish: sus habitaciones superiores
  alternatives_spanish:
  - sus aposentos altos
  - sus cuartos altos
  lexicon: HALOT
  rationale: עֲלִיָּה refiere a un espacio elevado o superior. «Habitaciones superiores» es claro, sobrio y mantiene la referencia espacial sin exagerar con una lectura más específica de lo que el hebreo exige.
- source_word: חֲדָרָיו הַפְּנִימִים
  english_pob_choice: its inner chambers
  chosen_spanish: sus cámaras interiores
  alternatives_spanish:
  - sus habitaciones interiores
  - sus cámaras internas
  lexicon: HALOT
  rationale: «Cámaras interiores» preserva la relación arquitectónica y el matiz de interioridad. «Cámaras» es un término más formal que «habitaciones» y encaja con el registro del templo.
- source_word: בֵית הַכַּפֹּרֶת
  english_pob_choice: the house of the mercy seat
  chosen_spanish: la casa del propiciatorio
  alternatives_spanish:
  - la casa de la cubierta de expiación
  - la casa del asiento de misericordia
  lexicon: HALOT
  rationale: כַּפֹּרֶת se refiere al objeto/cubierta del arca en el Lugar Santísimo. En español, «propiciatorio» es el equivalente cultual tradicional y preciso; evita el giro más largo «casa del propiciatorio de misericordia» y conserva la tensión entre objeto sagrado y recinto.
theological_decisions:
- issue: Cómo renderizar כַּפֹּרֶת sin perder la referencia cultual ni imponer una paráfrasis explicativa
  english_pob_reading: the house of the mercy seat
  chosen_spanish_reading: la casa del propiciatorio
  alternative_spanish_readings:
  - la casa de la misericordia
  - la casa de la cubierta de expiación
  rationale: El hebreo apunta al término técnico del arca y, por extensión, al espacio santísimo relacionado con él. «Propiciatorio» conserva el valor cultual y evita reemplazar el referente con una explicación devocional que el texto no explicita. La nota da cuenta de la alternativa semántica sin borrar el término técnico.
  doctrine_reference: Éxodo 25:17-22; Levítico 16; Romanos 3:25
translation_notes:
  revision_awareness: Se siguió el audit trail inglés en la estructura general de la lista arquitectónica y en el tratamiento técnico de כַּפֹּרֶת. Se adoptó «casas» para בָּתָּיו en consonancia con la revisión más reciente del inglés POB, pero se ajustó a una correspondencia española más directa. Se preservó la secuencia de elementos del hebreo sin ampliar ni reducir el inventario.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió el término cultual «propiciatorio» para כַּפֹּרֶת, coherente con el uso bíblico-ecclesial en español y con la nota de transparencia.
  - La lista conserva la coordinación acumulativa del hebreo con «sus... sus... y...», sin convertirla en una explicación del edificio.
