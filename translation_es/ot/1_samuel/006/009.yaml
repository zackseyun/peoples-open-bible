translation:
  language: es
  text: 'Y observen: si sube por el camino de su territorio[a] hacia Bet-semes, él es quien nos ha hecho este gran daño; pero si no, entonces sabremos que no fue su mano la que nos hirió; nos ocurrió por casualidad[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el camino de su frontera». El hebreo דֶּרֶךְ גְּבוּלוֹ puede referirse al camino que conduce a su propio ámbito o frontera.
    reason: lexical_alternative
  - marker: b
    text: O «fue una ocurrencia fortuita para nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  english_pob_choice: And watch
  chosen_spanish: Y observen
  alternatives_spanish:
  - Y miren
  - Y vean
  lexicon: HALOT
  rationale: El imperativo plural introduce una prueba que deben verificar. «Observen» comunica la idea de seguir el resultado con atención, sin alejarse del valor exhortativo del hebreo.
- source_word: דֶּרֶךְ גְּבוּלוֹ
  english_pob_choice: by the way of its territory
  chosen_spanish: por el camino de su territorio
  alternatives_spanish:
  - por el camino de su frontera
  - por la vía de su territorio
  lexicon: HALOT
  rationale: דֶּרֶךְ es «camino» y גְּבוּל puede ser «frontera» o «territorio». «Su territorio» sigue la lectura contextual de destino/ámbito propio, y «por el camino» suena natural en español sin perder el sentido espacial.
- source_word: יַעֲלֶה
  english_pob_choice: it goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - va hacia arriba
  lexicon: HALOT
  rationale: El verbo עלה expresa movimiento ascendente o de subida. «Sube» es breve, natural y mantiene la imagen del movimiento geográfico.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Bet Shemesh
  - Bet-semesh
  lexicon: transliteración propia del proyecto
  rationale: Se conserva el nombre propio transliterado en una forma castellana legible. «Bet-semes» evita anglicismos y sigue la práctica del proyecto para topónimos bíblicos.
- source_word: הוּא עָשָׂה לָנוּ אֶת הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: he is the one who has done this great harm to us
  chosen_spanish: él es quien nos ha hecho este gran daño
  alternatives_spanish:
  - él fue quien nos hizo este gran daño
  - él nos ha hecho esta gran calamidad
  lexicon: HALOT
  rationale: El pronombre enfático הוּא se refleja con «él es quien». «Daño» comunica la severidad de רָעָה en este contexto de aflicción sin cargar el término con «mal» moral, que podría sonar inapropiado aplicado a la acción judicial de Dios.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: this great harm
  chosen_spanish: este gran daño
  alternatives_spanish:
  - este gran mal
  - esta gran calamidad
  - esta gran desgracia
  lexicon: HALOT
  rationale: La palabra hebrea puede significar mal, daño, desastre o calamidad. Aquí «daño» expresa sufrimiento severo y evita una traducción que sugiera maldad moral en Dios.
- source_word: וְאִם לֹא
  english_pob_choice: but if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - y si no
  - de lo contrario
  lexicon: HALOT
  rationale: La conjunción introduce el contraste del segundo resultado del examen. «Pero si no» conserva el giro adversativo de manera natural en español.
- source_word: וְיָדַעְנוּ
  english_pob_choice: then we will know
  chosen_spanish: entonces sabremos
  alternatives_spanish:
  - y sabremos
  - así sabremos
  lexicon: HALOT
  rationale: El perfecto con waw expresa la conclusión resultante de la prueba. «Entonces sabremos» hace explícita esa inferencia en español.
- source_word: יָדוֹ נָגְעָה בָּנוּ
  english_pob_choice: his hand struck us
  chosen_spanish: su mano nos hirió
  alternatives_spanish:
  - su mano nos tocó
  - su mano nos golpeó
  - su mano nos afligió
  lexicon: HALOT
  rationale: La expresión «mano» es una forma idiomática de poder o acción de juicio. «Hirió» comunica mejor el impacto punitivo que «tocó», demasiado débil en este contexto.
- source_word: מִקְרֶה
  english_pob_choice: by chance
  chosen_spanish: un accidente
  alternatives_spanish:
  - por casualidad
  - un acontecimiento fortuito
  lexicon: HALOT
  rationale: מִקְרֶה denota una ocurrencia fortuita. «Un accidente» es claro y transmite que el hecho no fue una intervención intencional en el sentido que están probando.
- source_word: הוּא הָיָה לָנוּ
  english_pob_choice: it happened to us
  chosen_spanish: fue para nosotros
  alternatives_spanish:
  - nos ocurrió
  - nos aconteció
  lexicon: HALOT
  rationale: La construcción hebrea presenta el evento como una ocurrencia fortuita para ellos. Se expresó con una formulación breve y natural, manteniendo la idea de que no tuvo causa deliberada discernible.
theological_decisions:
- issue: Cómo rendir רָעָה cuando el texto atribuye la aflicción a Dios si la señal se confirma
  english_pob_reading: this great harm
  chosen_spanish_reading: este gran daño
  alternative_spanish_readings:
  - este gran mal
  - esta gran calamidad
  - esta gran desgracia
  rationale: La versión española conserva la realidad de una acción judicial severa sin llamar «mal» moral a la acción de Dios. «Daño» mantiene la fuerza de la aflicción y la claridad teológica del contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si la frase final debe sonar como causalidad o como casualidad
  english_pob_reading: it happened to us by chance
  chosen_spanish_reading: fue un accidente para nosotros
  alternative_spanish_readings:
  - nos ocurrió por casualidad
  - fue algo fortuito para nosotros
  rationale: El hebreo concluye que el hecho fue fortuito, no causado por la mano de Dios. «Accidente» conserva esa lectura de evento casual, aunque en español moderno también puede sonar a suceso no intencional.
  doctrine_reference: HALOT מִקְרֶה; Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue el último texto inglés revisado, que simplificó «its own territory» a «its territory» sin cambiar el sentido. La versión española conserva ese valor contextual y mantiene la distinción entre la señal confirmatoria y la explicación de casualidad en la segunda mitad del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se translitera el topónimo como «Bet-semes» para consistencia con el proyecto.
  - Se eligió «daño» para רָעָה siguiendo el manejo del inglés POB, evitando un «mal» moralizante en un contexto de juicio.
  - «Hirió» traduce la imagen de la mano con un matiz de aflicción más fuerte que «tocó», en coherencia con la señal del versículo.
