translation:
  language: es
  text: 'Dije a los jactanciosos: «No se jacten», y a los impíos: «No alcen su cuerno[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No alcen su fuerza» o «No alcen su orgullo». «Cuerno» es una metáfora hebrea de poder o autoexaltación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַ֣רְתִּי
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - He dicho
  - Decía
  lexicon: HALOT
  rationale: El perfecto qal 1cs se expresa naturalmente en español como pasado simple en este contexto poético, conservando la acción puntual sin sobrecargarla con aspecto perfecto.
- source_word: הוֹלְלִים
  english_pob_choice: the boastful
  chosen_spanish: los jactanciosos
  alternatives_spanish:
  - los arrogantes
  - los presuntuosos
  - los fanfarrones
  lexicon: HALOT
  rationale: La forma está ligada por juego verbal con el imperativo siguiente, por lo que conviene mantener un adjetivo de autoexaltación o jactancia. 'Jactanciosos' comunica bien esa fuerza en español y conserva el paralelismo con 'se jacten'.
- source_word: אַל תָּהֹ֑לּוּ
  english_pob_choice: Do not boast
  chosen_spanish: No se jacten
  alternatives_spanish:
  - No se jacten ustedes
  - No sean arrogantes
  - No hagan alarde
  lexicon: HALOT
  rationale: El jussivo negativo plural se vierte de modo natural con prohibición directa. 'Jactarse' mantiene la relación léxica con הוֹלְלִים mejor que una paráfrasis como 'ser arrogantes'.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: En español bíblico 'impíos' transmite la categoría moral de רשעים con dignidad y amplitud, sin reducirla a un matiz meramente criminal.
- source_word: אַל תָּרִימוּ
  english_pob_choice: Do not lift up
  chosen_spanish: No alcen
  alternatives_spanish:
  - No levanten
  - No eleven
  - No exalten
  lexicon: HALOT
  rationale: El hiphil imperfecto/jussivo 2mp de רום pide una acción de elevar o alzar. 'Alcen' es breve, idiomático y deja visible el enlace con el sustantivo siguiente.
- source_word: קָרֶן
  english_pob_choice: your horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su fuerza
  - su poder
  - su orgullo
  lexicon: HALOT
  rationale: Se conserva la imagen metafórica de 'cuerno' para respetar la metáfora hebrea de fuerza, estatus o autoexaltación. En español, el posesivo implícito se expresa naturalmente con 'su' para referirse a los impíos.
theological_decisions:
- issue: Metáfora de 'cuerno' como fuerza/autoexaltación
  english_pob_reading: Retain the metaphor as 'your horn' in the main text, with a footnote explaining strength/pride/self-exaltation
  chosen_spanish_reading: Retener la metáfora como 'su cuerno' en el texto principal, con nota explicativa sobre fuerza, poder o orgullo
  alternative_spanish_readings:
  - No exalten su fuerza
  - No levanten su orgullo
  - No eleven su poder
  rationale: La imagen del cuerno es parte del tejido poético del salmo y no conviene deshacerla en el texto base. La nota permite aclarar el sentido sin borrar la tensión entre la imagen literal y su valor figurado.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente al mantener el posesivo implícito en la metáfora ('su cuerno') y conservar el paralelismo entre la autojactancia y la elevación del cuerno. También refleja la preferencia editorial por un lenguaje conciso, poético y auditable, sin sustituir la imagen hebrea por una explicación interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el tetragrámaton aparece; en este versículo no aparece.
  - '''Jactanciosos'' y ''se jacten'' conservan la relación léxica del hebreo entre sustantivo y verbo.'
  - '''Impíos'' respeta el registro bíblico de רשעים sin introducir un matiz jurídico ajeno al contexto.'
  - '''Cuerno'' se preserva como metáfora porque el POB inglés también la retuvo en el texto principal.'
