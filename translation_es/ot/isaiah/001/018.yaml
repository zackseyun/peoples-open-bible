revisions:
- from: 'Vengan ahora[a], y razonemos juntos, dice Yahvé: aunque sus pecados sean como escarlata, se volverán blancos como la nieve; aunque sean rojos como el gusano escarlata[b], serán como la lana.'
  to: 'Vengan ahora[a], y razonemos juntos, dice Yahvé: aunque sus pecados sean como escarlata, se volverán blancos como la nieve; aunque sean rojos como el carmesí[b], serán como la lana.'
  rationale: 'Se ajusta la segunda imagen cromática al sentido principal del hebreo en contexto poético y a la decisión auditada del POB: el texto principal debe expresar el color («carmesí»), mientras la referencia más literal al insecto/tinte se conserva en nota. El resto del versículo puede permanecer como fiel y legible.'
