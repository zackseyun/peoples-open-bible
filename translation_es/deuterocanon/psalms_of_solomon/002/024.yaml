    reason: lexical_alternative
  - marker: b
    text: 'O: «Basta ya, Yahvé», o «Sea suficiente, Yahvé». El imperativo griego Ἱκάνωσον puede entenderse más literalmente como una petición de suficiencia o cese.'
    reason: alternative_reading
  - marker: c
    text: Literalmente, «de que tu mano pese sobre Israel», conservando la imagen bíblica de presión o juicio divino.
    reason: cultural_note
  - marker: d
    text: 'O: «por la invasión de las naciones». El sustantivo ἐπαγωγή puede sugerir tanto el traer sobre alguien como el asalto de pueblos enemigos.'
    reason: alternative_reading
