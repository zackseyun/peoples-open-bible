translation:
  language: es
  text: 'Y Josué dijo a todo el pueblo: «Así dice Yahvé, el Dios de Israel: Hace mucho tiempo sus padres[a] vivían al otro lado del Río[b] —Taré, el padre de Abraham y el padre de Nacor— y servían a otros dioses».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus padres»; es decir, sus antepasados.'
    reason: lexical_alternative
  - marker: b
    text: O «más allá del Río», probablemente en referencia al Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se refleja con una conjunción simple que conserva la sucesión del relato sin cargar de interpretación temporal adicional. «Y ... dijo» es natural en español y mantiene el movimiento narrativo del hebreo.
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a toda la nación
  lexicon: HALOT
  rationale: «עָם» aquí designa a la comunidad reunida del pacto; «pueblo» es la equivalencia española más natural y reverente. «Gente» suena más coloquial, y «nación» introduce un matiz más político que el contexto inmediato no exige.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así dijo
  lexicon: HALOT
  rationale: La fórmula profética/mensajera se expresa en español con presente para la cita directa solemne. «Así dice» conserva el tono formal y la cadencia tradicional sin depender de una calcificación del inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el equivalente español establecido para el Nombre divino, manteniendo la distinción frente a «SEÑOR» y preservando el nombre de pacto revelado en el texto.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Israel, su Dios
  lexicon: HALOT
  rationale: La construcción en genitivo se traduce de manera directa y transparente. «El Dios de Israel» es idiomático en español y mantiene la identificación pactual del nombre divino.
- source_word: בְּעֵבֶר הַנָּהָר
  english_pob_choice: beyond the River
  chosen_spanish: al otro lado del Río
  alternatives_spanish:
  - más allá del Río
  - del otro lado del Río
  lexicon: HALOT
  rationale: La expresión hebrea señala el lado opuesto del río, y en el contexto histórico se entiende convencionalmente del Éufrates. En español, «al otro lado del Río» comunica bien la orientación geográfica y conserva la mayúscula de referencia convencional.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el río Éufrates
  - el río
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común con artículo, no el nombre propio. «Río» con mayúscula refleja la referencia conocida sin sobretraducir en el cuerpo principal.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - moraban
  - se asentaban
  lexicon: HALOT
  rationale: «Yashav» expresa residencia estable; «habitaban» mantiene ese valor con un registro bíblico sobrio y natural en español. Es preferible a «moraban» si se busca dignidad sin arcaísmo fuerte.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: vuestros padres
  alternatives_spanish:
  - vuestros antepasados
  - vuestros padres/ancestros
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural explícita del hebreo, en línea con la decisión POB de no neutralizar el género cuando el original es masculino. «Padres» reproduce el vínculo genealógico directo del texto.
- source_word: מֵעוֹלָם
  english_pob_choice: Long ago
  chosen_spanish: Hace mucho tiempo
  alternatives_spanish:
  - desde antiguo
  - desde tiempos antiguos
  lexicon: HALOT
  rationale: Aquí עוֹלָם marca antigüedad remota, no eternidad metafísica. «Hace mucho tiempo» comunica esa referencia temporal con claridad en español actual.
- source_word: תֶּרַח אֲבִי אַבְרָהָם וַאֲבִי נָחוֹר
  english_pob_choice: Terah, the father of Abraham and the father of Nahor
  chosen_spanish: Taré, el padre de Abraham y el padre de Nacor
  alternatives_spanish:
  - Taré, padre de Abraham y padre de Nacor
  - Taré, el padre de Abraham y de Nacor
  lexicon: HALOT
  rationale: Se mantiene la repetición hebrea «el padre de... y el padre de...» para reflejar con precisión la estructura del original. «Taré» y «Nacor» siguen las formas castellanas usuales de estos nombres bíblicos.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: and they served
  chosen_spanish: y servían
  alternatives_spanish:
  - y sirvieron
  - y adoraban
  lexicon: HALOT
  rationale: «עבד» con objeto divino conserva su fuerza cultual mejor con «servían» que con «adoraban», porque no reduce el verbo a un sinónimo devocional más interpretativo. El imperfecto español fluye bien en este resumen histórico de costumbre pasada.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - otros dioses
  - dioses ajenos
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia directa y no añade la connotación de extranjería que el hebreo no expresa explícitamente. El complemento con «a» responde a la construcción verbal española con «servir».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto contiene el Tetragrama de manera explícita, y la política del proyecto exige su restitución con el nombre divino en lugar de una máscara reverencial. «Yahvé» es la forma española establecida en el proyecto y transparente para el lector.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tratamiento de אֲבוֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: vuestros padres
  alternative_spanish_readings:
  - vuestros antepasados
  - vuestros ancestros
  rationale: Se conserva el masculino plural explícito del hebreo, porque el texto habla de los antepasados varones concretos en la línea genealógica mencionada. No se neutraliza a una forma inclusiva si eso borra el rasgo léxico presente en el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto en inglés del POB se mantuvo sin cambios en la revisión más reciente, y la concordancia de control fue alta. La redacción española sigue de cerca las decisiones léxicas auditadas del inglés, pero ajusta la sintaxis a un español bíblico natural y transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva «vuestros padres» para reflejar el masculino plural del hebreo.
  - «Río» se escribe con mayúscula por tratarse de una referencia convencional y conocida en el contexto bíblico.
  - La puntuación y la cita directa siguen el estilo español con raya y comillas angulares solo cuando conviene a la legibilidad.
