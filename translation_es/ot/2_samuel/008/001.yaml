translation:
  language: es
  text: Y después de esto, David hirió a los filisteos y los sometió, y David tomó Meteg-ama[a] de la mano de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «el freno de la ciudad madre», una frase difícil. Puede referirse idiomáticamente al control de la ciudad principal; compárese 1 Crónicas 18:1, que dice «Gat y sus aldeas». La POB conserva aquí la transliteración «Meteg-ama» para no imponer una interpretación incierta en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיְהִי אַֽחֲרֵי כֵן
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y aconteció después de esto
  - Después de esto
  lexicon: HALOT
  rationale: La secuencia narrativa pide una transición temporal sencilla. «Y después de esto» conserva el valor consecutivo de la forma verbal sin caer en un calco pesado, y suena natural en español bíblico moderno.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - derribó
  - atacó
  lexicon: HALOT
  rationale: נכה tiene el sentido concreto de golpear/hendir y, en contexto militar, puede implicar derrota. «Golpeó» preserva la fuerza verbal básica sin anticipar más de lo que el texto dice por sí mismo.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: a los filisteos
  alternatives_spanish:
  - a los filisteos
  lexicon: HALOT
  rationale: Se mantiene el nombre étnico tradicional en español, con artículo definido implícito en el objeto directo personal introducido por «a».
- source_word: וַיַּכְנִיעֵם
  english_pob_choice: subdued them
  chosen_spanish: los sometió
  alternatives_spanish:
  - los subyugó
  - los puso en sujeción
  lexicon: HALOT
  rationale: La forma causativa de כנע expresa someter o poner bajo dominio. «Los sometió» es claro, militar y no excesivamente interpretativo; preserva la relación de dominio que el verbo comunica.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: לקח es el verbo ordinario «tomar». «Tomó» deja que el objeto difícil cargue la ambigüedad del sintagma hebreo, como en el flujo de la POB inglesa.
- source_word: מֶתֶג הָאַמָּה
  english_pob_choice: Metheg-ammah
  chosen_spanish: Meteg-ama
  alternatives_spanish:
  - Meteg-amma
  - el freno de la ciudad madre
  - la ciudad principal
  lexicon: HALOT
  rationale: El hebreo presenta una expresión difícil. Siguiendo la revisión inglesa que prefirió la transliteración para evitar una interpretación demasiado resuelta, se conserva como nombre/transliteración en español, con adaptación ortográfica mínima para lectura natural. Así no se borra la tensión lexical ni se impone «ciudad madre» en el texto principal.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de manos de
  alternatives_spanish:
  - de la mano de
  - del poder de
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» como control o posesión se conserva en una fórmula española idiomática y clara. «De manos de» comunica procedencia/recuperación sin sonar artificial.
theological_decisions:
- issue: Intensidad militar de וַיַּךְ / וַיַּכְנִיעֵם
  english_pob_reading: David struck the Philistines and subdued them
  chosen_spanish_reading: David golpeó a los filisteos y los sometió
  alternative_spanish_readings:
  - David venció a los filisteos y los sujetó
  - David derrotó a los filisteos y los subyugó
  rationale: 'No se suaviza la escena a un mero «venció», porque el hebreo conserva una doble acción: el golpe concreto y el sometimiento resultante. La traducción mantiene esa progresión sin añadir contenido doctrinal o histórico no expresado.'
  doctrine_reference: Narrativa histórica; semántica verbal en contexto bélico
- issue: Tratamiento del sintagma difícil מֶתֶג הָאַמָּה
  english_pob_reading: Metheg-ammah
  chosen_spanish_reading: Meteg-ama
  alternative_spanish_readings:
  - el freno de la ciudad madre
  - la ciudad principal
  rationale: Se evita fijar en el texto principal una explicación interpretativa que el hebreo no despeja por completo. La transliteración respeta la cautela del antecedente inglés revisado y preserva la tensión lexical/documental.
  doctrine_reference: Principio de no sobreinterpretar un pasaje textual difícil
translation_notes:
  revision_awareness: La base inglesa revisó una traducción demasiado literal de מֶתֶג הָאַמָּה y prefirió la transliteración «Metheg-ammah» para no imponer una interpretación incierta. Esta versión española sigue esa revisión, pero adapta la transliteración a una forma legible en español («Meteg-ama») y conserva la nota explicativa para mantener la tensión lexical abierta.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se mantiene «filisteos» como etnónimo tradicional en español.
  - «Sometió» conserva la fuerza de dominio del verbo hebreo sin convertirlo en una paráfrasis interpretativa.
  - La transliteración «Meteg-ama» busca ser reconocible y pronunciable en español, en paralelo con la decisión revisada del texto inglés.
