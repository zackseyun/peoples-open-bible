revisions:
- from: Hizo diez lavabos[a] de bronce. Cada lavabo tenía capacidad para cuarenta[b] baños, y cada lavabo medía cuatro codos[c]. Un lavabo estaba sobre cada uno de los diez soportes.
  to: Hizo diez pilas[a] de bronce. Cada pila tenía capacidad para cuarenta batos[b], y cada pila medía cuatro codos[c]. Una pila estaba sobre cada uno de los diez soportes.
  rationale: Se reemplaza 'lavabos' por 'pilas' para evitar una connotación doméstica moderna y reflejar mejor grandes recipientes cultuales. Se cambia 'baños' por 'batos' para conservar la unidad hebrea sin ambigüedad moderna, y se mueve la nota cultural al término de medida. El resto del versículo se mantiene por ser fiel al hebreo y a la auditoría inglesa.
