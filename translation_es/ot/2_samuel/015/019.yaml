translation:
  language: es
  text: 'Entonces el rey dijo a Ittai el geteo: «¿Por qué también tú vas[a] con nosotros? Vuelve y quédate con el rey[b], porque eres extranjero y también un exiliado de tu propio lugar[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué también irás con nosotros?»'
    reason: lexical_alternative
  - marker: b
    text: La frase «quédate con el rey» puede referirse a permanecer bajo la autoridad real reinante en Jerusalén; el hebreo no identifica explícitamente al referente.
    reason: alternative_reading
  - marker: c
    text: 'O: «y también un exiliado a tu propio lugar». La redacción hebrea es comprimida y puede enfatizar tanto la condición de desplazado de Ittai como su vínculo con su propio lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo pide avance secuencial; «Entonces» mantiene ese valor discursivo en español sin sonar rígido.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el soberano
  lexicon: HALOT
  rationale: Título directo y natural; el hebreo usa el título y no el nombre propio.
- source_word: אִתַּי הַגִּתִּי
  english_pob_choice: Ittai the Gittite
  chosen_spanish: Ittai el gattita
  alternatives_spanish:
  - Ittai el geteo
  - Ittai de Gat
  lexicon: HALOT
  rationale: Se translitera el nombre y se traduce el gentilicio con forma castellana transparente; «gattita» conserva la relación con Gat sin imponer una denominación eclesial fija.
- source_word: לָמָּה תֵלֵךְ גַּם אַתָּה אִתָּנוּ
  english_pob_choice: Why are you also going with us?
  chosen_spanish: ¿Por qué también tú vas con nosotros?
  alternatives_spanish:
  - ¿Por qué también irás con nosotros?
  - ¿Por qué has de ir también con nosotros?
  lexicon: HALOT
  rationale: El imperfecto hebreo en discurso directo admite fuerza presente/progresiva; «vas» suena natural y mantiene la inmediatez interrogativa. «También» preserva גַּם.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Retorna
  lexicon: HALOT
  rationale: Imperativo breve y natural en español; «vuelve» conserva el valor de retorno sin alargarse.
- source_word: וְשֵׁב
  english_pob_choice: stay
  chosen_spanish: quédate
  alternatives_spanish:
  - permanece
  - reside
  lexicon: HALOT
  rationale: Desde ישׁב, aquí implica permanecer/continuar con alguien; «quédate» es la forma más clara y idiomática en el mandato directo.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - junto al rey
  - con el monarca
  lexicon: HALOT
  rationale: 'Se conserva la repetición titulada del hebreo y la ambigüedad referencial: el texto no nombra al rey, así que no se resuelve en la traducción.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden; «porque» es claro y plenamente natural en español bíblico moderno.
- source_word: נָכְרִי
  english_pob_choice: a foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - foráneo
  lexicon: HALOT
  rationale: Captura el sentido de no pertenencia nacional o cívica; «extranjero» es más preciso que «extraño» para este contexto.
- source_word: וְגַם גֹּלֶה
  english_pob_choice: and also an exile
  chosen_spanish: y también un exiliado
  alternatives_spanish:
  - y también uno desterrado
  - y también un desterrado
  lexicon: HALOT
  rationale: גֹּלֶה nombra a una persona en condición de exilio/desplazamiento; «exiliado» preserva esa fuerza nominal en español.
- source_word: לִמְקוֹמֶךָ
  english_pob_choice: to your own place
  chosen_spanish: de tu propio lugar
  alternatives_spanish:
  - a tu lugar propio
  - de tu tierra
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y la tradición auditada en inglés optó por expresar el vínculo con el lugar propio. En español, «de tu propio lugar» comunica mejor la relación posesiva y la procedencia implícita del estado de exilio.
theological_decisions:
- issue: Ambigüedad del referente de «el rey» en «quédate con el rey»
  english_pob_reading: Retain the literal phrase 'with the king' without identifying the referent in the main text.
  chosen_spanish_reading: Mantener «con el rey» sin identificar en el cuerpo del texto a qué rey se refiere.
  alternative_spanish_readings:
  - con el rey Absalón
  - con el rey en Jerusalén
  - conmigo, el rey
  rationale: El hebreo conserva el título sin resolver el referente; traducirlo así preserva la tensión documental y evita añadir una interpretación no explícita en el texto.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «Return» sobre «Go back» por registro más formal y ajustó la última cláusula a «from your own place» por claridad. La versión española sigue esa dirección con un mandato natural («Vuelve») y con una frase posesiva/procedencia («de tu propio lugar») que evita resolver de más el hebreo comprimido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se traduce נָכְרִי con «extranjero» por su valor social/nacional, no con «extraño», que en español podría sonar interpersonal.
  - Se conserva la ambigüedad de «el rey» para no introducir un nombre propio que el hebreo no da.
  - «Exiliado» se usa para גֹּלֶה por precisión semántica; no se suaviza a «desterrado» salvo como alternativa de nota.
