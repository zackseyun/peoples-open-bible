translation:
  language: es
  text: 'Y quitó las ruedas de sus carros, y los hizo avanzar con dificultad. Y Egipto[a] dijo: «Huyamos[b] de delante de Israel, porque Yahvé pelea por ellos contra Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Egipto» es singular y funciona de manera colectiva; alternativamente, «los egipcios dijeron».
    reason: lexical_alternative
  - marker: b
    text: O «Huyamos de delante de Israel»; el hebreo tiene un cohortativo singular, probablemente con fuerza colectiva.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - quitó de
  - hizo desaparecer
  lexicon: HALOT
  rationale: El verbo hiphil de סור expresa causativamente la acción de apartar o quitar. En español, «quitó» comunica con naturalidad la idea de sacar la rueda de su lugar sin sobrecargar el texto.
- source_word: אֹפַן מַרְכְּבֹתָיו
  english_pob_choice: the wheels from their chariots
  chosen_spanish: la rueda de sus carros
  alternatives_spanish:
  - las ruedas de sus carros
  - la rueda de sus carros de guerra
  - las ruedas de sus carretas
  lexicon: HALOT
  rationale: El hebreo usa singular nominal con sentido colectivo. Conservar «la rueda» mantiene mejor la forma singular del original, mientras que «de sus carros» refleja el referente plural colectivo de la frase y su relación con los carros.
- source_word: וַיְנַהֲגֵהוּ
  english_pob_choice: drove them
  chosen_spanish: los hizo avanzar
  alternatives_spanish:
  - los condujo
  - los llevó
  - los impulsó
  lexicon: HALOT
  rationale: נהג puede significar conducir o hacer avanzar. Como el contexto describe carros descontrolados por la falta de ruedas, «los hizo avanzar» expresa el movimiento forzado y la dificultad sin introducir un matiz excesivo de dirección.
- source_word: בִּכְבֵדֻת
  english_pob_choice: with difficulty
  chosen_spanish: con dificultad
  alternatives_spanish:
  - pesadamente
  - con pesadez
  - laboriosamente
  lexicon: HALOT
  rationale: La expresión denota pesadez o dificultad. «Con dificultad» es la equivalencia española más clara y directa, y conserva el valor adverbial.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: El hebreo presenta el nombre singular como sujeto colectivo. «Egipto» conserva la forma del original y, en español, puede funcionar naturalmente como entidad nacional representativa.
- source_word: אָנֻסָה
  english_pob_choice: Let us flee
  chosen_spanish: Huyamos
  alternatives_spanish:
  - Huyamos nosotros
  - Debemos huir
  - Voy a huir
  lexicon: HALOT
  rationale: La forma cohortativa singular tiene fuerza exhortativa o resolutiva, pero el sujeto colectivo exige una expresión inclusiva en español. «Huyamos» preserva el valor exhortativo y la referencia colectiva documentada en el audit trail.
- source_word: מִפְּנֵי יִשְׂרָאֵל
  english_pob_choice: from before Israel
  chosen_spanish: de delante de Israel
  alternatives_spanish:
  - de la presencia de Israel
  - ante Israel
  - frente a Israel
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y literalmente espacial. «De delante de» conserva la imagen de presencia/frente sin perder claridad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es renderizar יְהוָה como «Yahvé». Se conserva el nombre divino propio y se evita la sustitución por un título.
- source_word: נִלְחָם
  english_pob_choice: is fighting
  chosen_spanish: pelea
  alternatives_spanish:
  - está peleando
  - está combatiendo
  - se está peleando
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «pelea» mantiene la duratividad en un presente verbal natural y digno.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a favor de ellos
  - en favor de ellos
  - para ellos
  lexicon: HALOT
  rationale: El dativo benefactivo se expresa con naturalidad en español mediante «por ellos», que comunica defensa o apoyo sin añadir precisión doctrinal no presente en el hebreo.
- source_word: בְּמִצְרָיִם
  english_pob_choice: against Egypt
  chosen_spanish: contra Egipto
  alternatives_spanish:
  - en Egipto
  - con Egipto
  lexicon: HALOT
  rationale: Aunque la preposición básica es ב, el contexto con el verbo de lucha marca al oponente. «Contra Egipto» es la equivalencia española natural y fiel al valor adversativo.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la convención del proyecto para preservar el nombre personal de Dios revelado a Israel. «Yahvé» es la forma establecida en la base española del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujeto colectivo singular «Egipto»
  english_pob_reading: Egypt said
  chosen_spanish_reading: Egipto dijo
  alternative_spanish_readings:
  - los egipcios dijeron
  rationale: El hebreo usa un singular nacional colectivo. Mantener «Egipto» conserva la correspondencia formal y la lectura representativa del sujeto en el pasaje.
  doctrine_reference: Audit trail lexical note on מִצְרַיִם as collective singular
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que corrigió el referente plural de los carros y ajustó la cohortativa a una lectura colectiva («Let us flee»). También preserva la observación del original hebreo sobre el sujeto singular colectivo «Egipto».
  spanish_consistency_notes:
  - Se ha usado «Yahvé» de acuerdo con la terminología del proyecto para el Tetragrámaton.
  - Se ha conservado el sujeto colectivo singular «Egipto» para reflejar la forma hebrea.
  - Se ha preferido una solución española natural para la cohorte exhortativa («Huyamos») sin perder la tensión gramatical señalada en la nota.
  - «Carros» se usa como equivalente normal de מַרְכְּבוֹת, manteniendo el plural colectivo implícito en el referente.
