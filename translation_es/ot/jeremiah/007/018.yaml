review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: acciones paralelas de hijos, padres y mujeres; preparación de tortas para una deidad femenina; libaciones a otros dioses; y la finalidad de provocar la ira divina. La nota sobre מְלֶכֶת הַשָּׁמַיִם preserva correctamente la alternativa discutida. Sin embargo, el ancla de nota está colocada erróneamente en «leña» en vez de «Reina del Cielo», y conviene una pequeña mejora de naturalidad/fidelidad en «provocarme a ira».'
  spanish_quality_summary: El español es claro y digno. «Leña», «amasan masa», «tortas», «otros dioses» funcionan bien. «Avivan el fuego» es aceptable, aunque «encienden el fuego» sería más directo; no es necesario cambiarlo. «Derramar libaciones» es idiomático en registro bíblico. La principal falla formal es la ubicación de la nota; además, «provocarme a ira» suena algo calcado, y «provocar mi ira» o «provocarme a ira» puede mejorarse hacia una formulación más natural sin perder fuerza.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. El verso no contiene Yahvé, Mesías/Cristo, Espíritu, etc. La decisión «Reina del Cielo» sigue la documentación inglesa y la nota mantiene la alternativa «la obra del cielo».
  issues:
  - severity: high
    issue: La nota [a] está anclada en «leña» en lugar de «Reina del Cielo».
    rationale: La nota explica מְלֶכֶת הַשָּׁמַיִם / «la Reina del Cielo», no עֵצִים / «leña». Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente del texto.
  - severity: medium
    issue: «Para provocarme a ira» es menos natural en español contemporáneo.
    rationale: Aunque comprensible y de tono bíblico, suena más calcado que «para provocar mi ira» o «para provocarme». El hebreo expresa provocar a Dios a ira; «provocar mi ira» conserva mejor el sentido y fluye mejor en español.
  revised_spanish_text: Los hijos recogen leña, los padres avivan el fuego, y las mujeres amasan masa para hacer tortas para la Reina del Cielo[a] y para derramar libaciones a otros dioses, para provocar mi ira.
  revised_footnotes:
  - marker: a
    text: La expresión hebrea מְלֶכֶת הַשָּׁמַיִם se entiende tradicionalmente como «la Reina del Cielo», probablemente un título para una diosa adorada por Judá. Algunos han propuesto «la obra del cielo», pero el contexto aquí favorece una deidad personal que recibe ofrendas.
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación del marcador de nota para que corresponda a «Reina del Cielo», que es el término discutido en la nota. Además, se ajusta la cláusula final a «para provocar mi ira», una formulación más natural y fiel al sentido causativo del hebreo sin perder el tono solemne.
