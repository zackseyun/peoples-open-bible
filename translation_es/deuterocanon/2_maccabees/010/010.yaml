revisions:
- from: Como antes[a], estando en formación de combate y teniendo el aliado del cielo[b], porque el Señor les había mostrado misericordia.
  to: Como antes[a], estando en formación de combate y teniendo al aliado venido del cielo[b], porque el Señor les había mostrado misericordia.
