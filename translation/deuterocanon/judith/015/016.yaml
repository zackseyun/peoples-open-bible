theological_decisions:
- issue: Whether to harmonize ἐξομολόγησις with αἴνεσις as two near-synonyms for praise
  chosen_reading: 'Maintain a distinction: ''confession'' ... ''praise'''
  alternative_readings:
  - Render both as praise/thanksgiving terms for smoother English
  rationale: The Greek uses two different nouns in adjacent clauses. Preserving the distinction supports transparency and avoids flattening the rhetoric. In this context 'confession' is best understood as public acknowledgment of God rather than admission of sin.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception; Preserve theological tension rather than resolve it'
