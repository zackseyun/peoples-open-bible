translation:
  language: es
  text: Y vino la palabra de Yahvé a mí, diciendo
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - aconteció
  - fue
  lexicon: HALOT
  rationale: En esta fórmula profética, el hebreo idiomático expresa la llegada de la palabra divina al profeta. En español, «vino» reproduce de manera natural esa irrupción reveladora sin perder el valor formular del hebreo.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la comunicación
  - el dicho
  lexicon: HALOT
  rationale: «דבר» aquí designa la comunicación divina misma. «La palabra» conserva el paralelismo formal y el peso teológico del hebreo, más que una paráfrasis interpretativa como «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יהוה. En la serie española se adopta «Yahvé» como equivalente directo y legible, evitando la sustitución por un título como «el SEÑOR».
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta. «A mí» es la forma natural y exacta en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - 'así:'
  - 'diciendo: '
  lexicon: HALOT
  rationale: La partícula infinitiva introduce el contenido del discurso. En español bíblico contemporáneo, «diciendo» mantiene la función introductoria de manera clara y sobria.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrama directamente. La decisión española sigue la política de la serie de representar el nombre divino con una forma audible y no con una sustitución titular, preservando así el nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa más reciente no aplicó cambios y fue evaluada con acuerdo alto; la presente redacción española sigue la misma lectura del hebreo y evita anotar variantes innecesarias porque no hay marcadores anclados en el texto.
  spanish_consistency_notes:
  - 'Se mantiene el orden formular de la frase profética: introducción divina + sujeto («la palabra») + movimiento hacia el profeta + partícula introductoria del discurso.'
  - Se usa «Yahvé» de forma consistente con la política española del proyecto para el nombre divino.
  - Se prefiere el pretérito narrativo «vino» como equivalente idiomático de la fórmula hebrea, sin añadir contenido interpretativo.
