base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/030.yaml
  text: But as for me[a], this mystery has been revealed to me not because of wisdom that is in me more than in all the living, but in order that the interpretation may be made known to the king[b], and that you may know the thoughts of your heart.
  footnotes:
  - marker: a
    text: Or 'this secret.' The Aramaic term can mean a hidden matter, but in Daniel it often carries the sense of a mystery disclosed by God.
    reason: lexical_alternative
  - marker: b
    text: Or 'the thoughts of your mind.' Literally, 'the thoughts of your heart.'
    reason: lexical_alternative
