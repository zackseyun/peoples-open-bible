review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura de finalidad, los pares léxicos sapienciales y el valor positivo de עָרְמָה y מְזִמָּה. Sin embargo, la nota al pie no preserva fielmente la alternativa principal del audit trail inglés: el texto inglés ofrece como alternativas ''to the youth'' y ''to a young person'', mientras que la nota española actual pone ''al joven'', que no es alternativa sino repetición del texto principal.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: ''para dar prudencia a los simples, conocimiento y discreción al joven''. La única reparación necesaria es en la nota al pie, para que realmente ofrezca alternativas útiles y no repita el texto base.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'prudencia', 'conocimiento' y 'discreción' están bien elegidos. 'al joven' preserva adecuadamente el masculino singular representativo de נַעַר en español.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en lugar de dar una alternativa real
    rationale: 'El marcador [a] en inglés documenta alternativas a ''young man'': ''youth'' o ''a young person''. En español, ''al joven'' es el texto principal, por lo que no puede figurar como alternativa. La nota debe ofrecer opciones como ''a la juventud'' o ''a una persona joven'', o mejor una opción singular más natural como ''a un joven'' junto con ''a una persona joven''.'
  revised_spanish_text: para dar prudencia a los simples[a], conocimiento y discreción al joven.
  revised_footnotes:
  - marker: a
    text: O 'a un joven' o 'a una persona joven'. El hebreo es masculino singular ('joven') y puede funcionar de modo representativo en la instrucción sapiencial.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota para que preserve de manera útil las alternativas documentadas en el audit trail inglés y no repita la lectura principal.
