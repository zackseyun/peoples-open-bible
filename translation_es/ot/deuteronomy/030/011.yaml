translation:
  language: es
  text: Pues este mandamiento que te ordeno hoy no es demasiado difícil para ti[a], ni está lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no está más allá de ti» o «no está oculto para ti». El verbo hebreo puede expresar algo extraordinario, inaccesible o fuera del alcance de uno.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la explicación del encargo previo; en español, «Porque» mantiene la relación explicativa de forma natural y directa.
- source_word: הַמִּצְוָה הַזֹּאת
  english_pob_choice: this commandment
  chosen_spanish: este mandamiento
  alternatives_spanish:
  - este mandato
  - esta instrucción
  lexicon: HALOT
  rationale: «Mandamiento» conserva el registro legal y pactual que la POB documenta para מִצְוָה en este contexto deuteronómico.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que hoy te estoy mandando
  alternatives_spanish:
  - que hoy te mando
  - que te estoy mandando hoy
  lexicon: HALOT
  rationale: El progresivo español «te estoy mandando» refleja la acción en curso del participio hebreo, y «hoy» mantiene la inmediatez del discurso. Se eligió «mandando» como equivalente funcional de מְצַוְּךָ sin forzar una forma más rígida.
- source_word: לֹא נִפְלֵאת הִוא מִמְּךָ
  english_pob_choice: is not too difficult for you
  chosen_spanish: no es demasiado difícil para ti
  alternatives_spanish:
  - no está más allá de ti
  - no te es inaccesible
  - no está oculto para ti
  lexicon: HALOT
  rationale: La POB prioriza la accesibilidad práctica que el contexto desarrolla en los vv. 12–14. «Demasiado difícil» comunica esa idea en español sin resolver la tensión léxica de פלא hacia un solo matiz de «oculto» o «extraordinario».
- source_word: וְלֹא רְחֹקָה הִוא
  english_pob_choice: nor is it far away
  chosen_spanish: ni está lejos
  alternatives_spanish:
  - ni está distante
  - ni está remota
  - ni queda lejos
  lexicon: HALOT
  rationale: «Está lejos» preserva la metáfora espacial de רָחוֹק con una formulación idiomática y sobria en español. La abreviación de «está» en la segunda cláusula evita redundancia sin alterar el sentido.
theological_decisions:
- issue: Sentido de נִפְלֵאת en relación con la obediencia humana y la cercanía del mandamiento
  english_pob_reading: Rendered as 'not too difficult for you' to express accessibility of the command without making a broader doctrinal claim about unaided human moral ability.
  chosen_spanish_reading: «No es demasiado difícil para ti» expresa accesibilidad del mandamiento en su contexto pactal, sin convertir el verso en una afirmación general sobre la capacidad moral humana autónoma.
  alternative_spanish_readings:
  - no está oculto para ti
  - no está más allá de ti
  - no te es imposible
  rationale: 'La traducción conserva la tensión documentada por la POB: el texto subraya cercanía y practicabilidad del mandamiento, pero no agota el debate teológico sobre la capacidad humana fuera de este pasaje. «Demasiado difícil» evita absolutizar el matiz de ocultamiento o imposibilidad.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla más allá de su propio alcance contextual.
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditable de la POB en inglés, sin cambios de sentido relevantes: se mantuvo la lectura de accesibilidad práctica para נִפְלֵאת, y se prefirió una formulación española natural («no es demasiado difícil para ti») en lugar de un calco como «no está oculto». No hubo revisiones aplicadas en el pasaje fuente; la versión española conserva esa estabilidad interpretativa.'
  spanish_consistency_notes:
  - Se usa «mandamiento» para מִצְוָה, conforme al registro pactal del Deuteronomio.
  - Se evita «SEÑOR» o sustituciones reverenciales, porque aquí no aparece el Tetragrámaton.
  - Se conserva la relación espacial de רְחֹקָה con «lejos», manteniendo la paridad con la idea de accesibilidad del contexto inmediato.
  - La nota al pie recoge alternativas léxicas reales del audit trail inglés y no introduce opciones no documentadas.
