translation:
  language: es
  text: Llamarán a pueblos al monte[a]; allí ofrecerán sacrificios de justicia, porque sacarán[b] de la abundancia de los mares y de los tesoros escondidos de la arena[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Convocarán a pueblos a un monte». El hebreo no especifica la identidad del monte.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «chuparán de la abundancia de los mares», una imagen metafórica de obtener sustento o riqueza del mar.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de las cosas escondidas de la arena». La frase probablemente alude a recursos asociados con la costa o regiones arenosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - naciones
  - pueblos/tribus
  lexicon: HALOT
  rationale: El plural hebreo עַמִּים se refiere a grupos colectivos de gente, no solo a individuos. 'Pueblos' conserva bien ese sentido colectivo y funciona de forma natural en español bíblico moderno.
- source_word: הַר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  - un monte
  - el monte santo
  lexicon: HALOT
  rationale: El hebreo no identifica el monte. 'El monte' mantiene la referencia genérica y el valor direccional/cultual del texto sin precisar indebidamente el lugar.
- source_word: יִקְרָאוּ
  english_pob_choice: will call
  chosen_spanish: Llamarán
  alternatives_spanish:
  - Convocarán
  - Invitarán
  - Proclamarán
  lexicon: HALOT
  rationale: קרא admite llamar, convocar o invitar. 'Llamarán' conserva la amplitud semántica y evita decidir en exceso entre invitación y convocatoria.
- source_word: יִזְבְּחוּ
  english_pob_choice: will sacrifice
  chosen_spanish: ofrecerán sacrificios
  alternatives_spanish:
  - sacrificarán
  - presentarán sacrificios
  lexicon: HALOT
  rationale: El verbo זבח implica acto sacrificial. En español, 'ofrecerán sacrificios' suena más natural y mantiene la especificidad cultual sin perder fuerza.
- source_word: זִבְחֵי צֶדֶק
  english_pob_choice: righteous sacrifices
  chosen_spanish: sacrificios de justicia
  alternatives_spanish:
  - sacrificios justos
  - sacrificios rectos
  - sacrificios de rectitud
  lexicon: HALOT
  rationale: La construcción puede ser 'sacrificios de justicia' o 'sacrificios justos'. Se conserva la forma sustantiva para no borrar la relación con צֶדֶק y mantener la tensión entre lo moral, lo correcto y lo cultual.
- source_word: שֶׁפַע יַמִּים
  english_pob_choice: the abundance of the seas
  chosen_spanish: la abundancia de los mares
  alternatives_spanish:
  - la riqueza de los mares
  - el caudal de los mares
  - la abundancia del mar
  lexicon: HALOT
  rationale: שֶׁפַע expresa abundancia/plenitud. 'Abundancia' reproduce bien la imagen; 'mares' preserva el plural del hebreo y la amplitud geográfica/poética del término.
- source_word: יִינָקוּ
  english_pob_choice: will draw from
  chosen_spanish: sacarán
  alternatives_spanish:
  - sacarán provecho de
  - chuparán
  - mamarán
  lexicon: HALOT
  rationale: El verbo literalmente es 'chupar/mamar', pero en este contexto poético la imagen es la de extraer recursos o sustento. 'Sacarán' comunica el sentido sin forzar una imagen extraña al español.
- source_word: וּשְׂפוּנֵי
  english_pob_choice: and from the hidden
  chosen_spanish: y de los tesoros escondidos
  alternatives_spanish:
  - y de lo escondido
  - y de las cosas ocultas
  - y de los bienes guardados
  lexicon: HALOT
  rationale: 'La forma sugiere algo oculto o reservado. En español, integrarlo con el complemento siguiente permite una expresión fluida y fiel: ''tesoros escondidos''.'
- source_word: טְמֻנֵי חוֹל
  english_pob_choice: treasures of the sand
  chosen_spanish: de la arena
  alternatives_spanish:
  - de la arena
  - de la costa
  - del polvo
  lexicon: HALOT
  rationale: טמן indica cosas escondidas o enterradas; חוֹל es arena. La combinación se vierte como 'tesoros escondidos de la arena' para conservar la imagen poética sin precisar más de lo que el texto dice.
theological_decisions:
- issue: Naturaleza de los 'sacrificios de justicia'
  english_pob_reading: Cultically acceptable/right sacrifices, without importing later doctrinal categories.
  chosen_spanish_reading: Sacrificios conformes a la justicia, es decir, correctos/aceptables en el culto, sin añadir categorías doctrinales posteriores.
  alternative_spanish_readings:
  - sacrificios justos
  - sacrificios ofrecidos con rectitud
  - sacrificios de rectitud
  rationale: El hebreo צֶדֶק puede expresar rectitud, justicia o conformidad adecuada. La traducción mantiene esa amplitud y evita resolverla en una sola fórmula teológica cerrada.
  doctrine_reference: Preservar la tensión lexical-teológica del original.
- issue: Referencia del monte
  english_pob_reading: Left generic as 'the mountain' rather than identifying it explicitly as Zion, Sinai, or a tribal high place.
  chosen_spanish_reading: Se deja genérico como 'el monte', sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - el monte Sión
  - un santuario en el monte
  - su monte
  rationale: El hebreo no nombra el monte. Identificarlo en la línea principal iría más allá del dato textual y reduciría la ambigüedad original.
  doctrine_reference: Primacía del texto fuente; mantener ambigüedad donde el original la mantiene.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo masorético y mantiene las decisiones del audit trail inglés sin introducir revisiones adicionales; se conserva la ambigüedad del monte y la imagen poética de extraer abundancia del mar y tesoros de la arena.
  spanish_consistency_notes:
  - Se usa 'monte' y no 'montaña' por fluidez bíblica y porque el hebreo no determina más.
  - '''Sacrificios de justicia'' conserva la construcción sustantiva del hebreo y no la reduce a ''sacrificios justos''.'
  - '''Mares'' en plural sigue el hebreo יַמִּים y mantiene el tono poético amplio.'
  - Las notas usan marcadores únicos y están ancladas en el texto donde corresponde.
