translation:
  language: es
  text: Un corazón torcido causa aflicción,[b] y un hombre experimentado le devolverá lo mismo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El final del verso es difícil. El hebreo, literalmente, dice algo como: «y un hombre experimentado le devolverá/contestará eso en/con él». Los sentidos posibles incluyen «le devolverá lo mismo» o «le pagará en la misma medida».'
    reason: alternative_reading
  - marker: b
    text: 'El paralelo griego de Swete dice: «No confíes en un camino sin tropiezo», lo cual no coincide de cerca con el hebreo conservado aquí y sugiere una variante textual o una Vorlage distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: לב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En la literatura sapiencial, לב suele abarcar la persona interior, con pensamiento e intención. «Corazón» conserva ese valor idiomático y moral sin reducirlo solo a la inteligencia.
- source_word: עקוב
  english_pob_choice: devious
  chosen_spanish: torcido
  alternatives_spanish:
  - retorcido
  - perverso
  - depravado
  lexicon: HALOT
  rationale: El adjetivo expresa una cualidad moral torcida o desviada. «Torcido» es breve, natural y suficientemente fiel en español; evita intensificar innecesariamente el matiz moral más allá del texto.
- source_word: יתן
  english_pob_choice: causes
  chosen_spanish: causa
  alternatives_spanish:
  - produce
  - trae
  - da
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «dar», pero aquí funciona de modo causativo. «Causa» transmite con claridad la relación de producción sin alejarse del valor verbal del original.
- source_word: עצבת
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  - pena
  lexicon: HALOT
  rationale: El sustantivo denota pena, aflicción o tristeza. «Tristeza» es idiomático y comprensible en español contemporáneo; «aflicción» sería más solemne, pero algo más abstracto.
- source_word: ואיש
  english_pob_choice: and a man
  chosen_spanish: y un hombre
  alternatives_spanish:
  - y una persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino explícito. Se conserva esa forma para mantener la precisión gramatical y el tono sapiencial del proverbio.
- source_word: ותיק
  english_pob_choice: experienced
  chosen_spanish: experimentado
  alternatives_spanish:
  - experto
  - maduro
  - avezado
  lexicon: HALOT
  rationale: La palabra designa a alguien probado o con experiencia. «Experimentado» mantiene un registro digno y claro en español, sin sugerir necesariamente pericia técnica.
- source_word: ישיבנה
  english_pob_choice: will repay him in kind
  chosen_spanish: le devolverá lo mismo
  alternatives_spanish:
  - le pagará en la misma medida
  - le responderá en reciprocidad
  - se lo devolverá
  lexicon: HALOT
  rationale: La forma hebrea es compacta y ambigua, con sentido de devolver/responder. «Le devolverá lo mismo» conserva la reciprocidad sin forzar una interpretación demasiado específica como «pagar».
- source_word: בו
  english_pob_choice: in kind
  chosen_spanish: lo mismo
  alternatives_spanish:
  - en reciprocidad
  - de la misma manera
  - con él
  lexicon: HALOT
  rationale: El complemento preposicional es difícil y probablemente marca correspondencia recíproca. «Lo mismo» comunica esa equivalencia de respuesta de manera natural en español.
theological_decisions:
- issue: Conservar el masculino singular de איש
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  rationale: El hebreo es explícitamente masculino; no hay base para neutralizarlo en la traducción principal. Se mantiene la forma masculina como rasgo del texto sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Clausula final difícil y textualmente inestable
  english_pob_reading: will answer it in kind / will repay him accordingly
  chosen_spanish_reading: le devolverá lo mismo
  alternative_spanish_readings:
  - le pagará en la misma medida
  - le responderá en reciprocidad
  rationale: La sintaxis hebrea final es breve y ambigua, y el paralelo griego difiere de manera notable. La traducción principal se mantiene cerca del hebreo preservando la idea de reciprocidad, sin imponer más precisión de la que el texto garantiza.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Divergencia textual con el paralelo griego
  english_pob_reading: Greek parallel in Swete reads, 'Do not trust in a road without stumbling,' which does not closely match the surviving Hebrew here.
  chosen_spanish_reading: Se refleja en nota textual, no en el cuerpo principal
  alternative_spanish_readings:
  - 'Seguir el griego: «No confíes en un camino sin tropiezo»'
  - Fusionar ambas tradiciones en una paráfrasis
  rationale: El griego de Swete parece corresponder a una tradición distinta o a un Vorlage diferente. Por fidelidad auditiva, la línea principal sigue el hebreo conservado y deja constancia de la variante en nota.
  doctrine_reference: DOCTRINE.md §Textual criticism and source transparency
translation_notes:
  revision_awareness: 'La traducción anterior en inglés osciló entre «brings», «causes» y «repay him in kind», además de «seasoned/experienced». Para esta versión española se eligió un registro más natural pero todavía cercano al hebreo: «causa tristeza» para el valor causativo de יתן, «hombre experimentado» para ותיק, y «le devolverá lo mismo» para mantener la reciprocidad del final sin sobreinterpretarla. Se conservaron las dos tensiones documentadas: la ambigüedad hebrea de la última cláusula y la gran divergencia del griego.'
  spanish_consistency_notes:
  - Se usa «corazón» para לב, siguiendo el valor sapiencial habitual.
  - Se conserva el masculino singular «hombre» para איש.
  - «Tristeza» se eligió por claridad; «aflicción» queda como alternativa válida si se buscara un tono más solemne.
  - La nota [a] asume la dificultad del hebreo; la nota [b] registra la discrepancia con el paralelo griego.
  - No se introdujo terminología eclesiástica tradicional innecesaria; la línea sigue el hebreo con una formulación natural en español.
