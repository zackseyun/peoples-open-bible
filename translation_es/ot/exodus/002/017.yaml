translation:
  language: es
  text: Entonces llegaron los pastores y las ahuyentaron[a]; pero Moisés se levantó y las salvó, y dio de beber a su rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescató». El verbo hebreo puede denotar salvación o liberación; aquí se refiere a Moisés rescatando a las mujeres del hostigamiento de los pastores.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los pastores de ovejas
  - los ganaderos
  lexicon: HALOT
  rationale: El participio sustantivado de רעה designa aquí a quienes cuidan el rebaño. «Pastores» es el equivalente español más natural y conserva la imagen del contexto inmediato de dar de beber al ganado.
- source_word: וַיְגָרְשׁוּם
  english_pob_choice: drove them away
  chosen_spanish: las ahuyentaron
  alternatives_spanish:
  - las echaron
  - las expulsaron
  lexicon: HALOT
  rationale: גרש expresa acción hostil de echar o expulsar. En español, «ahuyentar» comunica bien la fuerza del gesto y su efecto sobre las mujeres, sin volverlo más técnico de lo que exige el hebreo.
- source_word: וַיָּקָם
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: קום marca la respuesta decisiva de Moisés. «Se levantó» conserva la idea de ponerse en acción de manera natural en español y sigue de cerca el valor narrativo del verbo.
- source_word: וַיּוֹשִׁעָן
  english_pob_choice: saved them
  chosen_spanish: las salvó
  alternatives_spanish:
  - las libró
  - las rescató
  - las liberó
  lexicon: HALOT
  rationale: El hifil de ישׁע puede significar salvar o rescatar. «Salvó» mantiene la fuerza lexical fuerte que la POB inglesa preservó, sin reducirlo a mera ayuda; el contexto inmediato sugiere rescate frente al hostigamiento de los pastores.
- source_word: וַיַּשְׁקְ
  english_pob_choice: watered
  chosen_spanish: dio de beber
  alternatives_spanish:
  - abrevó
  - las hizo beber
  lexicon: HALOT
  rationale: שקה significa dar de beber o abrevar. En español, «dio de beber» resulta claro y digno, y evita un verbo demasiado técnico o agrícola si el lector no lo entiende de inmediato.
- source_word: צֹאנָם
  english_pob_choice: their flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su ganado menor
  - sus ovejas
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor, especialmente ovejas y cabras. «Su rebaño» preserva el sentido colectivo y evita especificar una especie que el hebreo no concreta.
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then ... came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Luego llegaron
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la secuencia narrativa. «Entonces» expresa bien la sucesión y suena natural en español sin perder el hilo narrativo.
theological_decisions:
- issue: 'El alcance de וַיּוֹשִׁעָן: salvar, rescatar o ayudar'
  english_pob_reading: The Hebrew verb can denote rescue or deliverance; here it refers to Moses rescuing the women from the shepherds' harassment.
  chosen_spanish_reading: Moisés las salvó de los pastores que las ahuyentaban.
  alternative_spanish_readings:
  - Moisés las rescató
  - Moisés las libró
  rationale: La POB inglesa deja abierta la alternativa léxica entre salvar y librar, pero aclara que se trata de rescate frente al hostigamiento. «Las salvó» conserva la amplitud del verbo hebreo y no atenúa la acción a simple ayuda.
  doctrine_reference: Salvación/liberación en sentido verbal amplio, sin implicar aquí una categoría soteriológica completa.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó en alta concordancia con la fuente hebrea y con la POB inglesa. Esta versión española mantiene esa misma lectura, especialmente en el valor de גרשׁ, קום, ישׁע y שקה, sin suavizar la acción ni introducir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio sin artículo.
  - Se traduce el colectivo צאן como «rebaño» para conservar la referencia general al ganado menor.
  - Se usa pasado narrativo simple para reflejar la secuencia del wayyiqtol hebreo.
  - La nota al pie se ancla solo en «salvó» porque ahí existe la alternativa lexical documentada.
