    rationale: 'Esto invierte la decisión principal documentada: el inglés POB eligió ''the hidden things of wisdom'' y preservó ''the secrets of wisdom'' como alternativa.'
  - severity: medium
    issue: '''La sabiduría es de dos aspectos'' es una formulación poco natural y demasiado interpretativa.'
    rationale: El hebreo כִפְלַיִם y la revisión inglesa aprobada prefieren una formulación más literal/formal ('is twofold'). En español 'es doble' o 'es doble[a]' con nota explica mejor el modismo sin forzar una frase rara.
  - severity: low
