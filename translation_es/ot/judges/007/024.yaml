translation:
  language: es
  text: 'Y Gedeón envió mensajeros por toda la región montañosa de Efraín, diciendo: «Bajen contra Madián y apodérense de las aguas[a] hasta Bet-bará y el Jordán». Entonces todo hombre de Efraín[b] fue llamado[c], y se apoderaron de las aguas hasta Bet-bará y el Jordán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las aguas» puede referirse contextualmente a cursos de agua o vados estratégicos; se conserva la expresión literal del hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo hombre de Efraín». El singular colectivo puede referirse al conjunto de los guerreros de Efraín convocados como grupo.'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo es difícil; algunos lo entienden más literalmente como «clamó» o «gritó», pero el contexto favorece el sentido de ser convocados o movilizados.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de agentes humanos enviados con un mensaje; “mensajeros” conserva ese valor sin introducir connotaciones angélicas.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: HALOT
  rationale: Es el equivalente narrativo natural para el qal de שלח y mantiene claridad en español.
- source_word: בְּכָל הַר אֶפְרַיִם
  english_pob_choice: throughout all the hill country of Ephraim
  chosen_spanish: por todo el monte de Efraín
  alternatives_spanish:
  - por toda la serranía de Efraín
  - por toda la región montañosa de Efraín
  lexicon: HALOT
  rationale: הַר aquí funciona como designación geográfica amplia; “monte de Efraín” es breve, bíblico y comprensible en español, aunque no pretende sugerir un solo cerro.
- source_word: רְדוּ
  english_pob_choice: Come down
  chosen_spanish: Bajen
  alternatives_spanish:
  - Desciendan
  - Bajen ustedes
  lexicon: HALOT
  rationale: La orden es direccional desde la zona alta hacia abajo; “Bajen” es idiomático y conserva la fuerza imperativa.
- source_word: לִקְרַאת מִדְיָן
  english_pob_choice: against Midian
  chosen_spanish: contra Madián
  alternatives_spanish:
  - al encuentro de Madián
  - para enfrentar a Madián
  lexicon: HALOT
  rationale: La revisión inglesa favorece el sentido militar de interceptar o salir al encuentro en actitud hostil; “contra” comunica bien esa dirección en español.
- source_word: וְלִכְדוּ לָהֶם
  english_pob_choice: and seize
  chosen_spanish: apodérense de
  alternatives_spanish:
  - capturen
  - tomen
  lexicon: HALOT
  rationale: El hebreo exige una acción enérgica sobre puntos estratégicos; “apodérense de” refleja bien la idea de tomar posesión/capturar con fuerza, y el clítico pronominal da la naturalidad del mandato plural.
- source_word: אֶת הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - los cursos de agua
  - los vados
  lexicon: HALOT
  rationale: Se conserva la literalidad de “las aguas” como en el inglés POB, dejando abierta la referencia contextual a pasos o cruces estratégicos.
- source_word: עַד בֵּית בָּרָה
  english_pob_choice: as far as Beth-barah
  chosen_spanish: hasta Bet-bará
  alternatives_spanish:
  - hasta Bet-Bará
  lexicon: HALOT
  rationale: Se translitera el topónimo según la política del proyecto; “hasta” expresa el límite de extensión.
- source_word: וְאֶת הַיַּרְדֵּן
  english_pob_choice: and the Jordan
  chosen_spanish: y del Jordán
  alternatives_spanish:
  - y el Jordán
  - y el río Jordán
  lexicon: HALOT
  rationale: El nombre propio queda breve y natural en español; “del” enlaza con la segunda parte de la extensión sin añadir “río” innecesariamente.
- source_word: וַיִּצָּעֵק כָּל אִישׁ אֶפְרַיִם
  english_pob_choice: every man of Ephraim was called out
  chosen_spanish: fue llamado todo hombre de Efraín
  alternatives_spanish:
  - fue convocado todo hombre de Efraín
  - se alzó todo hombre de Efraín
  lexicon: HALOT
  rationale: El hebreo es difícil y el inglés POB lo entiende como convocatoria/movilización. En español, “fue llamado” mantiene la pasiva y la ambigüedad sin forzar una interpretación más fuerte que el texto.
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: they seized
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - capturaron
  - tomaron
  lexicon: HALOT
  rationale: Se mantiene coherencia léxica con el mandato anterior y se preserva el matiz de tomar control de puntos estratégicos.
theological_decisions:
- issue: Sentido de la convocatoria de Efraín
  english_pob_reading: every man of Ephraim was called out
  chosen_spanish_reading: fue llamado todo hombre de Efraín
  alternative_spanish_readings:
  - fue convocado todo hombre de Efraín
  - todo hombre de Efraín fue llamado a filas
  rationale: No hay una decisión doctrinal en sí, pero sí una tensión de traducción entre una pasiva literal y una lectura de movilización militar. El español mantiene la ambigüedad para no sobreinterpretar el mecanismo exacto del llamado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió “against Midian” por claridad militar. También respeta la solución previa de conservar “the waters” como expresión literal, con nota de alternativa contextual. La dificultad de וַיִּצָּעֵק se mantiene ambigua en español para reflejar el estado auditado del texto.
  spanish_consistency_notes:
  - Se conserva “Efraín” y “Madián” como nombres propios sin adaptar teológicamente el sentido.
  - Se usa “Bet-bará” como transliteración del topónimo, consistente con la política de nombres del proyecto.
  - Se mantiene la literalidad de “las aguas” en el cuerpo principal, con nota explicativa sobre la posible referencia a vados o cursos de agua.
  - No se introduce “SEÑOR” ni lenguaje de sustitución divina, ya que el versículo no contiene el Tetragrámaton.
