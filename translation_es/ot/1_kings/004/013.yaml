translation:
  language: es
  text: 'Ben-geber[a], en Ramot de Galaad; a él le pertenecían las aldeas de Jair, hijo de Manasés, que están en Galaad; a él le pertenecían la región de Argob[b], que está en Basán: sesenta ciudades grandes con murallas y barras de bronce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los asentamientos de Jair’, o por transliteración, ‘Havvot-jair’.
    reason: lexical_alternative
  - marker: b
    text: O ‘el distrito’ o ‘el territorio de Argob’.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן גֶּבֶר
  english_pob_choice: Ben-geber
  chosen_spanish: Ben-geber
  alternatives_spanish:
  - hijo de Geber
  lexicon: HALOT
  rationale: En este inventario administrativo funciona como nombre propio del funcionario, no como una filiación descriptiva ordinaria. Mantener la transliteración conserva ese valor onomástico y evita perder la estructura del listado.
- source_word: בְּרָמֹת גִּלְעָד
  english_pob_choice: in Ramoth-gilead
  chosen_spanish: en Ramot de Galaad
  alternatives_spanish:
  - en Ramot-galaad
  - en Ramot de Gilead
  lexicon: HALOT
  rationale: El prefijo בּ indica ubicación. En español, ‘en’ reproduce la función locativa; ‘Ramot de Galaad’ es una forma clara y ampliamente reconocible del topónimo.
- source_word: לֹו
  english_pob_choice: to him belonged
  chosen_spanish: a él pertenecían / a él pertenecía
  alternatives_spanish:
  - él tenía
  - su jurisdicción incluía
  lexicon: HALOT
  rationale: La partícula repetida expresa pertenencia o asignación dentro de una lista administrativa. ‘Pertenecían’/‘pertenecía’ preserva mejor ese matiz que un simple ‘tenía’.
- source_word: חַוֺּת יָאִיר
  english_pob_choice: the villages of Jair
  chosen_spanish: las aldeas de Jair
  alternatives_spanish:
  - los asentamientos de Jair
  - las cabañas de Jair
  lexicon: HALOT
  rationale: En este contexto, el término designa asentamientos de Jair. ‘Aldeas’ es natural en español y suficientemente amplio para reflejar el valor geográfico sin forzar una imagen más específica que el texto no exige.
- source_word: אֲשֶׁר בַּגִּלְעָד
  english_pob_choice: which are in Gilead
  chosen_spanish: que están en Galaad
  alternatives_spanish:
  - que estaban en Galaad
  lexicon: HALOT
  rationale: La relativa identifica la ubicación de esas aldeas. ‘Están’ funciona bien en una descripción geográfica; ‘Galaad’ sigue la forma usual en español bíblico.
- source_word: חֶבֶל אַרְגֹּב
  english_pob_choice: the region of Argob
  chosen_spanish: la región de Argob
  alternatives_spanish:
  - el distrito de Argob
  - el territorio de Argob
  lexicon: HALOT
  rationale: חֶבֶל puede denotar un distrito o región. ‘Región’ es la opción más natural en español moderno y mantiene el sentido administrativo-territorial.
- source_word: אֲשֶׁר בַּבָּשָׁן
  english_pob_choice: which is in Bashan
  chosen_spanish: que está en Basán
  alternatives_spanish:
  - que estaba en Basán
  lexicon: HALOT
  rationale: La cláusula sitúa a Argob geográficamente. ‘Está en Basán’ conserva la localización con un español fluido; ‘Basán’ mantiene el nombre bíblico tradicional en forma castellana.
- source_word: שִׁשִּׁים עָרִים גְּדֹלוֹת
  english_pob_choice: sixty large cities
  chosen_spanish: sesenta ciudades grandes
  alternatives_spanish:
  - sesenta ciudades importantes
  lexicon: HALOT
  rationale: גְּדֹלוֹת puede significar ‘grandes’ o ‘importantes’. Aquí el rasgo físico/tangible de tamaño es el más directo; por eso ‘grandes’ comunica bien el dato sin añadir una interpretación no explícita.
- source_word: חוֹמָה
  english_pob_choice: with walls
  chosen_spanish: con muralla
  alternatives_spanish:
  - con muros
  - amuralladas
  lexicon: HALOT
  rationale: El sustantivo singular funciona de modo colectivo para describir las ciudades fortificadas. En español, ‘con muralla’ es más idiomático y directo que pluralizar; la idea es de fortificación defensiva.
- source_word: וּבְרִיחַ נְחֹשֶׁת
  english_pob_choice: and bronze bars
  chosen_spanish: y barras de bronce
  alternatives_spanish:
  - y cerrojos de bronce
  - y travesaños de bronce
  lexicon: HALOT
  rationale: בְרִיחַ designa una barra/cerrojo, no una puerta. ‘Barras de bronce’ conserva la imagen concreta de los elementos defensivos y coincide con el valor lexical subrayado en el audit trail.
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis léxico del POB en inglés y la concordancia hebrea, manteniendo la estructura administrativa del versículo y los dos marcadores de alternativa donde el original y el audit trail reconocen opciones válidas. No se incorporaron revisiones posteriores porque el expediente indica alta concordancia y sin cambios.
  spanish_consistency_notes:
  - Se conserva ‘Ben-geber’ como transliteración por tratarse de un nombre propio funcional dentro de una lista administrativa.
  - Se usa ‘Galaad’ y ‘Basán’ como formas bíblicas establecidas en español, consistentes con un registro reverente y legible.
  - ‘Muralla’ se eligió en singular colectivo para mantener naturalidad en español sin perder el sentido de fortificación.
  - Se mantiene la secuencia sintáctica repetitiva ‘a él pertenecían / a él pertenecía’ para reflejar el hebreo y el valor de posesión/adscripción administrativa.
