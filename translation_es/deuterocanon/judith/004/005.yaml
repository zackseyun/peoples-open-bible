translation:
  language: es
  text: Y ocuparon todas las cimas de los montes altos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego puede sugerir tomar estas alturas por adelantado como medida defensiva; por eso también serían posibles «se apoderaron anticipadamente de» o «ocuparon de antemano».
    reason: lexical_alternative
lexical_decisions:
- source_word: προκατελάβοντο
  english_pob_choice: occupied
  chosen_spanish: ocuparon
  alternatives_spanish:
  - se apoderaron anticipadamente de
  - tomaron posesión de
  - ocuparon de antemano
  lexicon: LSJ
  rationale: El verbo compuesto expresa tomar y asegurar un lugar con antelación, con valor estratégico. En español, «ocuparon» conserva la idea de control efectivo del terreno sin forzar una perífrasis demasiado pesada; la nota preserva la posibilidad de un matiz de anticipación o prevención.
- source_word: πάσας
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de
  lexicon: LSJ
  rationale: El plural femenino concuerda con «cimas» y expresa alcance total. «Todas» es la equivalencia natural y clara en español.
- source_word: κορυφὰς
  english_pob_choice: summits
  chosen_spanish: cimas
  alternatives_spanish:
  - cumbres
  - picos
  - coronas
  lexicon: LSJ
  rationale: κορυφή designa la parte más alta de una montaña. «Cimas» es idiomático en español y mantiene la imagen geográfica sin cambiar el registro.
- source_word: ὀρέων
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - sierras
  lexicon: LSJ
  rationale: Aunque «montañas» sería la opción más directa, «montes» suena más natural en una formulación bíblica breve y sigue siendo fiel al sentido de ὄρος/ὀρέων. No debilita el referente geográfico.
- source_word: ὑψηλῶν
  english_pob_choice: high
  chosen_spanish: altos
  alternatives_spanish:
  - elevados
  - altísimos
  - encumbrados
  lexicon: LSJ
  rationale: El adjetivo describe la altura de los montes. «Altos» es la opción más simple y fiel, sin introducir matices poéticos ajenos al griego.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés concuerdan bien: el único punto sensible es el matiz militar del verbo compuesto προκατελάβοντο. La redacción española mantiene la claridad y deja constancia de la posible lectura preemptiva en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar el comienzo narrativo del griego.
  - Se prefirió «cimas»/«montes altos» para conservar una imagen bíblica natural en español sin perder precisión.
  - No se añadió ninguna carga interpretativa más allá del valor militar implícito del verbo.
