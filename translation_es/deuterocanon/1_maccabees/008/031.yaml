  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: trata de los daños/injusticias que Demetrio inflige a los judíos, mantiene el aoristo narrativo en «le escribimos», conserva la metáfora de «tu yugo» y la aposición «nuestros amigos y aliados, los judíos». Sin embargo, «¿por qué has pesado tu yugo sobre…?» no representa bien ἐβάρυνας. En español «pesar un yugo» suena incorrecto o ambiguo; el griego expresa hacer pesado o cargar el yugo sobre alguien.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «has pesado tu yugo» es poco natural y puede confundir al lector, porque en español «pesar» normalmente significa medir el peso, no volver pesado algo. Una formulación como «has hecho pesado tu yugo sobre…» preserva mejor la imagen y el valor verbal del original, aunque sigue siendo algo rígida; «has cargado pesadamente tu yugo sobre…» añade interpretación. Conviene una reparación mínima.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «los males[a]» es defendible con nota, aunque el contexto favorece más «injusticias» o «daños» como alternativas explicativas. «judíos» está bien. No hay términos teológicos sensibles en juego.
  issues:
