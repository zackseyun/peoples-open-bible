review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en casi todos los puntos: conserva la imaginería concreta, mantiene el singular final «él/le», y refleja la distinción entre cuerdas/lazos. Sin embargo, la nota [b] introduce un problema de fidelidad al afirmar «aquí se conserva la singularidad textual» respecto de «sus quijadas», cuando el singular relevante en el hebreo auditado está en אֵלָיו / «a él», no en «sus quijadas», que es plural en la fuente. Además, «fui para ellos» es comprensible pero menos natural que «fui para ellos como…» con leve ajuste estilístico o «era para ellos como…»; no es error grave, pero conviene pulirlo.'
  spanish_quality_summary: El español es generalmente claro y digno, con buen registro bíblico moderno. «Los atraje», «lazos de amor», «me incliné hacia él» y «le di de comer» leen bien. El punto más débil es la nota [b], que resulta confusa y parcialmente incorrecta. En el texto principal, «de sobre sus quijadas» es fiel pero algo áspero; «de sus quijadas» o «de encima de sus quijadas» serían más naturales, aunque la forma actual todavía es aceptable. Propongo una reparación mínima centrada en la nota.
  glossary_alignment: 'No hay conflicto con los términos por defecto del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones léxicas respetan bien el razonamiento documentado: «cuerdas de un hombre» con alternativa «cuerdas humanas», distinción «cuerdas/lazos», «quijadas» por contexto ganadero, y mantenimiento del singular final.'
  issues:
  - severity: medium
    issue: La nota [b] atribuye la «singularidad textual» a la frase equivocada.
    rationale: El hebreo auditado tiene plural en «sus quijadas» (לְחֵיהֶם) y singular en «a él» (אֵלָיו) / «lo alimenté». La nota actual mezcla ambos temas y puede desinformar al lector.
  - severity: low
    issue: La nota [b] mezcla dos alternativas distintas sin suficiente claridad.
    rationale: Combina la opción léxica «mejillas» con la cuestión de número singular/plural del cierre del verso. Conviene separar mejor el dato principal para que la nota sea precisa.
  revised_spanish_text: Yo los atraje con cuerdas de un hombre[a], con lazos de amor; y fui para ellos como los que alzan un yugo de sobre sus quijadas[b]; y me incliné hacia él y le di de comer.
  revised_footnotes:
  - marker: a
    text: O «con cuerdas humanas». El hebreo puede subrayar una conducción humana y suave, en contraste con una sujeción brusca o animal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de sobre sus quijadas». «Quijadas» también puede entenderse como «mejillas». Más adelante el hebreo cambia al singular: «hacia él … le di de comer», donde muchas traducciones armonizan al plural.'
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal, que es sustancialmente fiel, y se corrige la nota [b] para reflejar con precisión la evidencia fuente y el rastro inglés: el plural pertenece a «sus quijadas», mientras que el singular textual aparece al final del verso en «hacia él … le di de comer».'
