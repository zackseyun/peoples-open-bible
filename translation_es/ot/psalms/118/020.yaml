translation:
  language: es
  text: Esta es la puerta de Yahvé[a]; los justos entrarán por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Esta es la puerta para Yahvé» o «Esta es la puerta hacia Yahvé». La preposición hebrea puede expresar pertenencia, relación o dirección; «de Yahvé» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Ésta es
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo introduce e identifica la puerta señalada. En español, «ésta es» reproduce naturalmente la función identificadora del hebreo sin añadir material interpretativo.
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de acceso
  - el portal
  lexicon: HALOT
  rationale: «שער» puede ser «gate/puerta». En español, «puerta» es claro y natural para una entrada por la que se pasa; conserva la imagen concreta mejor que una paráfrasis más abstracta.
- source_word: לַיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: La preposición ל puede expresar pertenencia, relación o dirección. Aquí, con «puerta», la relación posesiva/afiliativa se expresa mejor con «de», manteniendo el nombre divino «Yahvé» según la terminología POB.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa a las personas caracterizadas por justicia. «Los justos» es el equivalente más natural y fiel en español.
- source_word: יָבֹאוּ
  english_pob_choice: will enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - entrarán adentro
  lexicon: HALOT
  rationale: El verbo expresar entrada futura o cierta. En español, «entrarán» conserva el movimiento hacia el interior y encaja con la imagen de la puerta.
- source_word: בֽוֹ
  english_pob_choice: through it
  chosen_spanish: por ella
  alternatives_spanish:
  - a través de ella
  - dentro de ella
  lexicon: HALOT
  rationale: Con una puerta, el hebreo ב indica el paso a través de ella. «Por ella» es la forma española más natural y breve para expresar ese tránsito.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política española del POB exige usar «Yahvé» en el texto principal para el Tetragrámaton. Aquí no se sigue el ocultamiento con mayúsculas ni una sustitución tradicional, porque el hebreo nombra directamente a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión auditada del inglés concluyó sin cambios necesarios (status: high_agreement; verdict: agree). Por eso el español sigue de cerca las decisiones léxicas ya justificadas, adaptándolas al uso natural del español sin perder la tensión semántica de ל en la frase nominal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español POB, en contraste con la convención inglesa auditada que usa «Yahweh».
  - «Los justos» conserva el sustantivo colectivo y evita una expansión interpretativa.
  - «Por ella» refleja el valor de paso a través de la puerta, no mera ubicación estática.
