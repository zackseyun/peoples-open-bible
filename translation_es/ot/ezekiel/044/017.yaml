translation:
  language: es
  text: Y cuando entren por las puertas del atrio interior, vestirán prendas de lino; ninguna lana vendrá sobre ellos[a] mientras ministren en las puertas del atrio interior y en la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no llevarán lana». El hebreo dice más literalmente: «ninguna lana vendrá sobre ellos».'
    reason: lexical_alternative
  - marker: b
    text: «La casa» aquí se refiere al edificio del templo.
    reason: cultural_note
lexical_decisions:
- source_word: בְּבוֹאָם
  english_pob_choice: when they enter
  chosen_spanish: cuando entren
  alternatives_spanish:
  - al entrar
  - cuando ingresen
  lexicon: HALOT
  rationale: La construcción temporal se expresa de forma natural en español con una subordinada temporal. «Entren» conserva el valor circunstancial sin volverse rígido.
- source_word: שַׁעֲרֵי הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the gates of the inner court
  chosen_spanish: las puertas del atrio interior
  alternatives_spanish:
  - los portones del atrio interior
  - las entradas del atrio interior
  lexicon: HALOT
  rationale: «שערים» puede ser «puertas» o «portones»; «puertas» es claro y bíblicamente natural en español. «Atrio interior» mantiene la referencia cultual del texto.
- source_word: בִּגְדֵי פִשְׁתִּים
  english_pob_choice: linen garments
  chosen_spanish: prendas de lino
  alternatives_spanish:
  - vestiduras de lino
  - ropas de lino
  lexicon: HALOT
  rationale: «פשתים» designa lino/flax. «Prendas de lino» preserva el material requerido y suena natural en español moderno sin perder el registro culto.
- source_word: יִלְבָּשׁוּ
  english_pob_choice: they shall wear
  chosen_spanish: vestirán
  alternatives_spanish:
  - llevarán
  - se vestirán con
  lexicon: HALOT
  rationale: El verbo indica portar/vestir una prenda prescrita. «Vestirán» conserva la obligación regulativa en un español sobrio.
- source_word: וְלֹא יַעֲלֶה עֲלֵיהֶם צֶמֶר
  english_pob_choice: no wool shall come upon them
  chosen_spanish: no subirá sobre ellos lana
  alternatives_spanish:
  - no se pondrá sobre ellos lana
  - no llevarán lana
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de que la lana «sube» sobre ellos, en vez de convertirla directamente en una prohibición genérica de vestir lana. Esto mantiene la tensión lexical documentada por la POB.
- source_word: בְּשָׁרְתָם
  english_pob_choice: while they minister
  chosen_spanish: mientras ministren
  alternatives_spanish:
  - cuando sirvan
  - mientras oficien
  lexicon: HALOT
  rationale: «שרת» es servicio cultual. «Ministren» mantiene el matiz litúrgico/sacerdotal sin sustituirlo por un «servir» demasiado general.
- source_word: וָבָיְתָה
  english_pob_choice: in the house
  chosen_spanish: y en la casa
  alternatives_spanish:
  - y en el templo
  - y en la morada
  lexicon: HALOT
  rationale: La POB mantiene «the house» para el edificio del templo. En español, «la casa» conserva la literalidad; el contexto de Ezequiel la identifica como el templo.
theological_decisions:
- issue: Terminología cultual para el servicio sacerdotal
  english_pob_reading: minister
  chosen_spanish_reading: ministren
  alternative_spanish_readings:
  - sirvan
  - oficien
  rationale: El pasaje regula el servicio de los sacerdotes en el templo. «Ministren» retiene el campo cultual sin imponer una terminología denominacional posterior.
  doctrine_reference: Ezequiel 44:17; traducción cultual literal
- issue: Referencia de «la casa»
  english_pob_reading: in the house
  chosen_spanish_reading: en la casa
  alternative_spanish_readings:
  - en el templo
  - dentro de la casa
  rationale: La POB aclara que «the house» se refiere al edificio del templo. En español se conserva «la casa» por fidelidad al texto, confiando en el contexto visionario para su identificación.
  doctrine_reference: Ezequiel 40–48; nota cultural de la POB
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés auditado, que prefirió «in the house» frente a «inside the house» para mayor literalidad formal. En español se conservó «y en la casa» por esa misma razón, manteniendo la oposición espacial con «las puertas del atrio interior».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantuvo «atrio» para el espacio del templo, coherente con el registro bíblico y la traducción auditada de «court».
  - No se sustituyó la imagen hebrea de la lana «subiendo sobre ellos» por una reformulación más plana en la línea principal.
  - «Ministrar» se eligió por su uso cultual en español eclesial amplio, sin recurrir a «servir» que sería más genérico.
