translation:
  text: '1[a]. For in the fortieth year of my life I saw a vision on the Mount of Olives, east of Jerusalem, that the sun and the moon were standing still.


    2. And behold, Isaac, the father of my father, said to us, “Run up and let each of you seize them according to his strength; and the one who takes hold of them, his shall be the sun and the moon.”


    3. And we all ran together, and Levi seized the sun, and Judah, arriving first, took hold of the moon; and both of them were lifted up with them.


    4. And while Levi was like the sun, behold, a certain young man was giving him twelve palm branches[b]; and Judah became bright like the moon, and beneath their feet were twelve rays.


    5. And the two, Levi and Judah, ran up and held them fast.


    6. And behold, there was a bull on the earth, having two great horns and eagle’s wings on its back; and though we wanted to seize it, we were not able.


    7. But Joseph came and seized it, and went up with it to the height.


    8. And I saw that I was there, and behold, a holy writing appeared to us, saying: “Assyrians, Medes, Persians,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This sentence is textually awkward in the transmitted Greek and may be a resumptive or secondary line repeating the prominence of Levi and Judah.
    reason: textual_variant
    anchor_ref: '5:5'
  - marker: b
    text: The chapter breaks off after the words 'Assyrians, Medes, Persians,' in the supplied Greek witness; the translation reflects the extant text provided here.
    reason: textual_variant
    anchor_ref: '5:8'
lexical_decisions:
- source_word: ὄραμα
  chosen: vision
  alternatives:
  - appearance
  - sight
  lexicon: LSJ
  rationale: Standard rendering for a revelatory sight; fits the testamentary-apocalyptic setting better than a more generic 'sight'.
- source_word: ἕστηκαν
  chosen: were standing still
  alternatives:
  - stood
  - were standing
  lexicon: LSJ
  rationale: The perfect form suggests a fixed or stationary posture in the vision, not merely that the sun and moon 'stood' momentarily.
- source_word: Προσδραμόντες
  chosen: Run up
  alternatives:
  - run forward
  - hurry to
  lexicon: LSJ
  rationale: Keeps the vivid imperative force of the command in the scene.
- source_word: κρατήσατε
  chosen: seize
  alternatives:
  - take hold of
  - grasp
  lexicon: LSJ
  rationale: A strong verb of grasping; 'seize' preserves the competitive, forceful tone of the vision.
- source_word: κατὰ δύναμιν
  chosen: according to his strength
  alternatives:
  - as he is able
  - with his strength
  lexicon: LSJ
  rationale: Preserves the distributive sense and the emphasis on each brother's capacity.
- source_word: τοῦ πιάσαντος
  chosen: the one who takes hold of
  alternatives:
  - the one who catches
  - the one who seizes
  lexicon: LSJ
  rationale: Pairs naturally with the preceding command while preserving the participial construction.
- source_word: ἐδράμομεν πάντες ὁμοῦ
  chosen: we all ran together
  alternatives:
  - we all ran at once
  - we all ran as one
  lexicon: LSJ
  rationale: Retains the collective movement of the brothers in simple, readable English.
- source_word: φθάσας
  chosen: coming first
  alternatives:
  - arriving first
  - getting there first
  lexicon: LSJ
  rationale: Conveys Judah's precedence in taking the moon without over-interpreting the sequence.
- source_word: ὑψώθησαν
  chosen: were lifted up
  alternatives:
  - were exalted
  - were raised
  lexicon: LSJ
  rationale: The visionary image is spatial first; 'lifted up' preserves that while allowing symbolic overtones.
- source_word: βαΐα φοινίκων
  chosen: palm branches
  alternatives:
  - palm fronds
  lexicon: LSJ
  rationale: The standard concrete rendering; clear and natural in English.
- source_word: λαμπρός
  chosen: bright
  alternatives:
  - radiant
  - shining
  lexicon: LSJ
  rationale: A straightforward rendering that matches the moon imagery without becoming overly interpretive.
- source_word: ἀκτῖνες
  chosen: rays
  alternatives:
  - beams
  lexicon: LSJ
  rationale: Best fits the solar-lunar symbolism under Levi and Judah.
- source_word: ταῦρος
  chosen: bull
  alternatives:
  - ox
  lexicon: LSJ
  rationale: The imagery is forceful and regal; 'bull' better preserves that symbolic strength.
- source_word: κατέλαβεν
  chosen: took hold of
  alternatives:
  - seized
  - caught
  lexicon: LSJ
  rationale: A firm but slightly less violent rendering than 'seized,' suitable for Joseph's successful mastery of the beast.
- source_word: συνανῆλθεν αὐτῷ εἰς τὸ ὕψος
  chosen: went up with it into the height
  alternatives:
  - ascended with it to the height
  - went up with it on high
  lexicon: LSJ
  rationale: Preserves the upward visionary movement and the somewhat elevated diction of the testament.
- source_word: γραφὴ ἁγία
  chosen: a holy writing
  alternatives:
  - a sacred writing
  - holy scripture
  lexicon: LSJ
  rationale: The phrase is indefinite in the Greek as transmitted; 'a holy writing' preserves that form without importing later canonical assumptions.
