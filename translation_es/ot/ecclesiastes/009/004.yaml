translation:
  language: es
  text: Porque quien está unido a todos los vivientes[a] tiene esperanza[b]; pues más vale un perro vivo que un león muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «quien es escogido entre todos los vivientes». La forma hebrea del miembro inicial es difícil, y algunos la entienden de otro modo.'
    reason: alternative_reading
  - marker: b
    text: 'También puede traducirse: «confianza» o «seguridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁ בִּטָּחוֹן / בִּטָּחוֹן
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - seguridad
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sustantivo expresa la posibilidad abierta que sigue teniendo quien vive. «Esperanza» comunica mejor esa idea en español que «confianza» o «seguridad», sin volver rígido el proverbio.
- source_word: יְבַחֵר אֶל כָּל הַחַיִּים
  english_pob_choice: is joined to all the living
  chosen_spanish: está unido a todos los vivientes
  alternatives_spanish:
  - es escogido entre todos los vivientes
  - está unido con todos los vivientes
  - pertenece a todos los vivientes
  lexicon: HALOT
  rationale: La POB inglesa sigue la lectura difícil de la forma verbal como relación/adhesión a la esfera de los vivos, no como simple elección. «Está unido a» conserva esa fuerza relacional en un español natural y mantiene abierta la tensión exegética.
- source_word: לְכֶלֶב חַי
  english_pob_choice: a living dog
  chosen_spanish: un perro vivo
  alternatives_spanish:
  - un perro viviente
  - un perro de vida
  lexicon: HALOT
  rationale: La imagen proverbial es directa y no requiere elevación estilística. «Perro vivo» preserva la contundencia del contraste con el león muerto.
- source_word: הָאַרְיֵה הַמֵּת
  english_pob_choice: a dead lion
  chosen_spanish: un león muerto
  alternatives_spanish:
  - el león muerto
  lexicon: HALOT
  rationale: Se mantiene el paralelo proverbial con el indefinido, como en la POB inglesa, porque la comparación apunta a la cualidad relativa de vida frente a muerte.
- source_word: מִן
  english_pob_choice: is better than
  chosen_spanish: más vale ... que
  alternatives_spanish:
  - es mejor que
  - es preferible a
  lexicon: HALOT
  rationale: «Más vale ... que» suena proverbial y fiel al contraste sapiencial del hebreo, sin perder naturalidad en español.
theological_decisions:
- issue: Lectura de la cláusula inicial con יבחר
  english_pob_reading: whoever is joined to all the living
  chosen_spanish_reading: quien está unido a todos los vivientes
  alternative_spanish_readings:
  - quien es escogido entre todos los vivientes
  - quien pertenece a todos los vivientes
  - quien está con todos los vivientes
  rationale: La forma consonántica permite una lectura difícil, y la tradición de versiones antiguas favorece un sentido de adhesión o pertenencia a la esfera de los vivos. En español se conserva esa decisión sin convertirla en una afirmación doctrinal ajena al contexto.
  doctrine_reference: Eclesiastés 9:4; nota exegética sobre el verbo inicial y el contraste vida/muerte
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del audit trail en cuanto al sentido general y las notas: no se requieren cambios sustantivos. Se mantuvo la solución exegética que entiende la cláusula inicial como pertenencia/adhesión a los vivos, con nota alternativa preservada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se preservó el tono proverbial sapiencial con sintaxis breve y comparativa.
  - Se evitó «Cristo» y terminología eclesial no pertinente.
  - «Vivientes» se eligió para mantener el registro más general y colectivo de הַחַיִּים, mientras que «perro vivo» conserva el paralelismo directo del proverbio.
