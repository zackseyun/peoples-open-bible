translation:
  language: es
  text: 'Y dijo[a]: «¿Están intactos los sellos, Daniel?». Y él dijo: «Están intactos, oh, rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «¿Están seguros/sanos los sellos, Daniel?... Seguros/sanos, oh, rey». Se traduce «intactos» porque el contexto pregunta si los sellos han permanecido sin alteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σῶοι
  english_pob_choice: intact
  chosen_spanish: intactos
  alternatives_spanish:
  - seguros
  - sanos
  - íntegros
  lexicon: LSJ
  rationale: El adjetivo griego σημαίνει ‘seguros/sanos’; aquí describe el estado de los sellos, es decir, que no han sido alterados. ‘Intactos’ comunica con naturalidad ese valor forense y preserva la fuerza de la verificación.
- source_word: αἱ σφραγῖδες
  english_pob_choice: the seals
  chosen_spanish: los sellos
  alternatives_spanish:
  - las marcas del sello
  - los precintos
  lexicon: LSJ
  rationale: σφραγῖδες se refiere a los sellos colocados para asegurar una entrada. ‘Los sellos’ es la correspondencia directa y normal en español.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - señor rey
  lexicon: LSJ
  rationale: El vocativo griego expresa una dirección directa. ‘Oh rey’ conserva esa función sin añadir posesión ni otro matiz no presente en el original.
- source_word: καὶ εἶπεν ... ὁ δὲ εἶπεν
  english_pob_choice: And he said ... And he said
  chosen_spanish: Y dijo ... Y él dijo
  alternatives_spanish:
  - Y preguntó ... y respondió
  - Entonces dijo ... y dijo
  lexicon: LSJ
  rationale: El griego repite λέγω. En español, variar levemente con ‘él’ mejora la fluidez sin introducir una interpretación de ‘preguntó/respondió’ que el texto no explicita.
translation_notes:
  revision_awareness: La versión inglesa POB ya había optado por ‘intact’ como equivalente óptimo de Σῶοι, y no requería cambios tras la revisión más reciente; la presente redacción mantiene esa decisión con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo del griego.
  - ‘Oh rey’ conserva el vocativo formal sin añadir reverencia litúrgica extra.
  - La nota al pie está anclada correctamente en la palabra ‘intactos’ mediante [a].
