translation:
  language: es
  text: Todos estos eran los hijos de Hemán, el vidente del rey en las palabras de Dios[a], para exaltar el cuerno[b]. Y Dios dio a Hemán catorce hijos y tres hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vidente del rey en asuntos de Dios» o «el vidente del rey por las palabras de Dios». La expresión hebrea es compacta y puede referirse al papel de Hemán con respecto a la revelación divina.
    reason: alternative_reading
  - marker: b
    text: O «para levantar el cuerno». El «cuerno» es una imagen figurada de fuerza, honor o posición exaltada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Todos estos mismos
  lexicon: HALOT
  rationale: La frase demostrativa introduce un resumen de la lista anterior; «Todos estos» conserva la deíxis y suena natural en español.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo distingue el sexo, en español «hijos» funciona bien en un encabezado genealógico y evita una repetición pesada; el contexto inmediato aclara luego el contraste con «hijas».
- source_word: חֹזֵה
  english_pob_choice: seer
  chosen_spanish: vidente
  alternatives_spanish:
  - vidente
  - profeta
  lexicon: HALOT
  rationale: «Vidente» preserva el matiz de función revelatoria/cortesana que «seer» tiene en el contexto de Crónicas. «Profeta» sería más amplio y menos preciso para este cargo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey
  - real
  lexicon: HALOT
  rationale: La relación posesiva se expresa de manera directa y natural con «del rey».
- source_word: בְּדִבְרֵי הָאֱלֹהִים
  english_pob_choice: in the words of God
  chosen_spanish: en las palabras de Dios
  alternatives_spanish:
  - en los asuntos de Dios
  - por las palabras de Dios
  - con respecto a las palabras de Dios
  lexicon: HALOT
  rationale: 'Se mantiene la compresión hebrea con una traducción literal y transparente. «En las palabras de Dios» conserva la ambigüedad: puede referirse al ámbito de revelación divina sin resolverla de más.'
- source_word: לְהָרִים קָרֶן
  english_pob_choice: to exalt the horn
  chosen_spanish: para enaltecer el cuerno
  alternatives_spanish:
  - para levantar el cuerno
  - para exaltar el cuerno
  lexicon: HALOT
  rationale: Se conserva la metáfora de la «cornamenta»/«cuerno» como imagen bíblica de fuerza, honor o elevación. «Enaltecer» comunica el sentido de exaltación sin borrar la imagen original.
- source_word: קָרֶן
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - cuerno
  - fuerza
  - poder
  lexicon: HALOT
  rationale: Se retiene el símbolo literal para no interpretar prematuramente la metáfora. En notas se puede aclarar su valor figurado.
- source_word: וַיִּתֵּן הָאֱלֹהִים לְהֵימָן
  english_pob_choice: And God gave Heman
  chosen_spanish: Y Dios dio a Heman
  alternatives_spanish:
  - Y Dios le dio a Heman
  - Y Dios concedió a Heman
  lexicon: HALOT
  rationale: La construcción es simple y directa; «dio a Heman» reproduce bien la idea de donación divina de descendencia.
- source_word: בָנִים ... וּבָנוֹת
  english_pob_choice: sons ... daughters
  chosen_spanish: catorce hijos y tres hijas
  alternatives_spanish:
  - catorce hijos varones y tres hijas
  - catorce hijos e hijas
  lexicon: HALOT
  rationale: El hebreo especifica el número de varones y mujeres. En español, «hijos» y «hijas» es la forma más natural y fiel para el conteo total, manteniendo la distinción por sexo en la última cláusula.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - catorce
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de ajuste idiomático.
theological_decisions:
- issue: Sentido de «el vidente del rey en las palabras de Dios»
  english_pob_reading: Heman is described as the king’s seer with respect to divine revelation.
  chosen_spanish_reading: Heman es presentado como el vidente del rey en relación con las palabras de Dios, sin precisar más la función.
  alternative_spanish_readings:
  - Heman era el vidente del rey en asuntos de Dios
  - Heman era el vidente del rey por medio de las palabras de Dios
  rationale: La frase hebrea es compacta y deja abierta la relación exacta entre el cargo de Heman y las palabras de Dios. La traducción conserva esa ambigüedad en vez de resolverla.
  doctrine_reference: Preservar la tensión lexical y sintáctica del original; no sobreinterpretar el oficio profético/cortesano.
- issue: Sentido de «para enaltecer el cuerno»
  english_pob_reading: The phrase is retained as a biblical metaphor for exaltation of strength, honor, or status.
  chosen_spanish_reading: Se mantiene la metáfora del cuerno como imagen de exaltación, fuerza o honor.
  alternative_spanish_readings:
  - para levantar el cuerno
  - para aumentar el poder
  rationale: El texto no identifica explícitamente el referente del «cuerno» ni lo reduce a un solo valor abstracto. Mantener la metáfora preserva la imagen bíblica y su tensión interpretativa.
  doctrine_reference: Primacía del texto original; conservar la metáfora bíblica sin aplanarla.
- issue: Traducción de בָנִים / וּבָנוֹת
  english_pob_reading: sons ... daughters
  chosen_spanish_reading: hijos ... hijas
  alternative_spanish_readings:
  - hijos varones ... hijas
  - descendientes ... hijas
  rationale: En español, «hijos» permite un encabezado genealógico natural; la mención explícita de «hijas» recupera la distinción sexual del hebreo en la clausura del versículo.
  doctrine_reference: Fidelidad semántica con naturalidad en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantuvo la estructura principal del versículo y solo afinó la cláusula final de «And God gave Heman...». La versión española sigue esa lectura final sin añadir elementos ausentes y conserva la ambigüedad controlada en «en las palabras de Dios» y «cuerno».
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva «cuerno» en la metáfora para no desactivar la imagen bíblica.
  - Se eligió «vidente» en vez de «profeta» para reflejar el cargo específico de Crónicas.
  - La cláusula final distingue «hijos» e «hijas» para respetar el conteo y el sexo de los descendientes.
