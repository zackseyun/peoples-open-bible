revisions:
- from: ¿Fue demasiado poca para nosotros la iniquidad de Peor[a], de la cual no nos hemos purificado[b] hasta hoy[c], y hubo una plaga sobre la congregación de Yahvé[d]?
  to: ¿Fue demasiado poca para nosotros la iniquidad de Peor[a], de la cual no nos hemos purificado hasta hoy, y vino una plaga sobre la congregación de Yahvé?
  rationale: Se corrigió el problema principal reubicando la información sobre «Peor/Baal-peor» a una nota anclada correctamente en «Peor», en vez de anclarla erróneamente en «Yahvé». También se mejoró «hubo una plaga» a «vino una plaga» para reflejar mejor el sentido del hebreo y sonar más natural en español. Se simplificaron las notas para alinearse mejor con el rastro POB sin perder información relevante.
