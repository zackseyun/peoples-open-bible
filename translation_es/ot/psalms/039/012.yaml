translation:
  language: es
  text: Con reprensiones por la iniquidad tú disciplinas a un hombre, y como una polilla consumes lo que le es precioso[a]; ciertamente todo hombre es vapor[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "haces que sus cosas preciosas se desgasten como una polilla"; el hebreo de חֲמוּדוֹ también puede entenderse más específicamente como "su belleza" o, más ampliamente, como "sus cosas preciosas".'
    reason: lexical_alternative
  - marker: b
    text: '"Vapor" traduce hebel, palabra hebrea de transitoriedad o insustancialidad semejante al aliento; tradicionalmente, "vanidad".'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתוֹכָחוֹת
  english_pob_choice: with rebukes
  chosen_spanish: con reprensiones
  alternatives_spanish:
  - con rebukos
  - con correcciones
  - con reprensiones disciplinarias
  lexicon: HALOT
  rationale: תוֹכָחוֹת denota reprensión, reproche o amonestación correctiva. 'Con reprensiones' conserva el sentido instrumental de ב y la fuerza disciplinaria sin caer en un calco rígido.
- source_word: עַל עָוֺן
  english_pob_choice: for iniquity
  chosen_spanish: por la iniquidad
  alternatives_spanish:
  - a causa del pecado
  - por culpa
  - por el mal
  lexicon: HALOT
  rationale: עָוֺן puede expresar iniquidad, culpa o la consecuencia por la culpa. 'Por la iniquidad' mantiene la idea causal y el tono moral fuerte del hebreo.
- source_word: יִסַּרְתָּ
  english_pob_choice: you discipline
  chosen_spanish: tú disciplinas
  alternatives_spanish:
  - tú castigas
  - tú corriges
  - tú amonestas
  lexicon: HALOT
  rationale: La forma verbal comunica acción correctiva y formativa. 'Disciplinas' conserva ese sentido mejor que un simple 'castigas', y suena natural en español contemporáneo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino singular con valor representativo. Se mantiene 'hombre' para respetar la forma y el alcance genérico del original, siguiendo la decisión de precisión de género del POB.
- source_word: וַתֶּמֶס
  english_pob_choice: you consume
  chosen_spanish: consumes
  alternatives_spanish:
  - desgastas
  - haces desvanecer
  - derrites
  lexicon: HALOT
  rationale: מָסַס expresa derretirse, deshacerse o consumirse. 'Consumes' comunica el efecto destructivo de manera idiomática en español y encaja con la imagen de la polilla.
- source_word: כָּעָשׁ
  english_pob_choice: like a moth
  chosen_spanish: como una polilla
  alternatives_spanish:
  - como un gusano
  - como la polilla
  lexicon: HALOT
  rationale: La comparación pide una imagen natural y reconocible. 'Polilla' reproduce bien el cuadro de algo que consume lentamente.
- source_word: חֲמוּדוֹ
  english_pob_choice: what is precious to him
  chosen_spanish: lo que le es precioso
  alternatives_spanish:
  - sus cosas preciosas
  - su tesoro
  - lo que ama
  lexicon: HALOT
  rationale: חֲמוּדוֹ puede abarcar lo deseable, precioso o apreciado; también puede entenderse más específicamente como 'su belleza'. 'Lo que le es precioso' conserva esa amplitud sin decidir indebidamente por una sola posibilidad.
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - sin duda
  - solo
  - verdaderamente
  lexicon: HALOT
  rationale: אַךְ funciona aquí como afirmación enfática. 'Ciertamente' transmite ese cierre solemne con buena naturalidad en español.
- source_word: הֶבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - vacío
  lexicon: HALOT
  rationale: הֶבֶל alude a algo breve, tenue e insustancial, como el aliento o el vapor. 'Vapor' conserva la imagen concreta y evita cargar el texto con la tradición interpretativa de 'vanidad'.
- source_word: כָּל אָדָם
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - todo ser humano
  - toda la humanidad
  lexicon: HALOT
  rationale: אָדָם aquí tiene valor genérico. 'Todo hombre' mantiene el singular representativo y la precisión formal del hebreo, sin neutralizar innecesariamente el sustantivo.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El término litúrgico se translitera porque su función exacta no es segura y traducirlo implicaría exceso de certeza.
theological_decisions:
- issue: Masc. genérico representativo en אִישׁ y אָדָם
  english_pob_reading: Render both אִישׁ and אָדָם with masculine English forms ('a man,' 'every man')
  chosen_spanish_reading: 'Mantener formas masculinas representativas: ''a un hombre'' y ''todo hombre'''
  alternative_spanish_readings:
  - a una persona / toda persona
  - alguien / toda la humanidad
  rationale: El hebreo emplea sustantivos masculinos singulares con alcance representativo. En español, conservar 'hombre' preserva esa forma y evita diluir la estructura del verso; el sentido colectivo sigue siendo claro en contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Sentido de הֶבֶל
  english_pob_reading: '''Vapor'' renders Hebrew hebel, a word used for breath-like transience or insubstantiality; traditionally, ''vanity.'''
  chosen_spanish_reading: '''Vapor'' como imagen de transitoriedad o insustancialidad'
  alternative_spanish_readings:
  - vanidad
  - aliento
  - brevedad
  rationale: '''Vapor'' conserva la metáfora física del hebreo y evita importar de inmediato la lectura tradicional de ''vanidad'', que puede oscurecer la imagen de fugacidad.'
  doctrine_reference: Lexical note on hebel in the English POB audit trail
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece estable: no hubo revisiones aplicadas y el último pase marcó ''unchanged''. La versión española sigue de cerca esa lectura estable, incorporando las alternativas léxicas preservadas por el POB para חֲמוּדוֹ y הֶבֶל.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se preservó el valor representativo de los masculinos hebreos 'אִישׁ' y 'אָדָם' con 'hombre'.
  - '''Selah'' se translitera por ser un término litúrgico de función incierta.'
  - La puntuación refleja una sola secuencia de juicio y conclusión enfática, conforme al paralelismo del hebreo.
