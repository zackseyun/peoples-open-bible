review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura temporal del hebreo y preserva correctamente la variante textual en nota. Sin embargo, no mantiene con suficiente precisión el material de בַּשִּׂיד, que en el contexto y en la auditoría inglesa se resolvió como ''cal/lime'', no ''yeso''. Además, hay una discordancia de persona/número en español: el texto empieza con plural (''crucen'', ''levantarán'') y termina con singular (''recubrirás''), mientras el hebreo aquí se vierte naturalmente en plural en toda la secuencia en la POB inglesa.'
  spanish_quality_summary: El español es claro y legible, pero presenta un problema gramatical importante por mezclar segunda persona plural con singular. También 'recubrirás con yeso' suena menos fiel y menos idiomático para este contexto que 'las recubrirán con cal' o 'las revocarán con cal'.
  glossary_alignment: 'No hay conflictos con términos troncales del proyecto como Yahvé/Mesías. Sí hay desalineación léxica con la decisión auditada para שׂיד: debe reflejar ''cal'' más que ''yeso''. ''Levantarán estas piedras'' y ''el Jordán'' están bien.'
  issues:
  - severity: high
    issue: 'Material incorrecto: ''yeso'' por בַּשִּׂיד'
    rationale: La auditoría inglesa y el uso léxico de שׂיד favorecen 'cal'/'lime'. 'Yeso' cambia el referente material y debilita la precisión del original.
  - severity: high
    issue: Discordancia de persona y número en el verbo final
    rationale: El texto dice 'Y cuando crucen... levantarán...' pero luego 'las recubrirás'. Esta mezcla es gramaticalmente defectuosa en español y entorpece la fidelidad formal del mandato.
  - severity: low
    issue: '''Recubrir'' es aceptable pero menos específico que el campo de ''revocar/enlucir/recubrir con cal'''
    rationale: No exige rechazo por sí solo, pero conviene una formulación que conserve mejor la idea de aplicar una capa de cal a las piedras.
  revised_spanish_text: Y cuando crucen el Jordán[a], levantarán estas piedras, que yo les ordeno hoy, en el monte Ebal, y las recubrirán con cal.
  revised_footnotes:
  - marker: a
    text: Algunas tradiciones textuales, notablemente el Pentateuco samaritano, leen «monte Gerizim» en lugar de «monte Ebal».
    reason: textual_variant
  revision_rationale: Se corrige la discordancia verbal pasando todo el versículo a plural, en línea con el resto del borrador y con una lectura natural del mandato dirigido al pueblo. También se sustituye 'yeso' por 'cal' para reflejar con mayor fidelidad בַּשִּׂיד y la decisión léxica auditada en inglés ('lime'). Se mantiene la nota textual sobre Gerizim/Ebal sin cambios sustanciales.
