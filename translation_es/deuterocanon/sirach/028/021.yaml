review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura paralela del griego: θάνατος… ὁ θάνατος αὐτῆς / ὁ ᾅδης αὐτῆς, mantiene la repetición enfática de «muerte», y preserva ᾅδης como «Hades», en línea con la decisión auditada. También refleja λυσιτελής μᾶλλον con una expresión comparativa adecuada. Sin embargo, «muerte malvada» atribuye en español un matiz demasiado moral a la muerte misma; en este contexto πονηρός describe una muerte ruinosa, funesta, terrible. Además, la nota a dice «O: “su muerte es una muerte malvada”», pero esa es exactamente la redacción del texto y no una alternativa real. La nota b también se desvía del matiz auditado al usar «ella» y no «eso/esta», lo que sobrepersonaliza el referente.'
  spanish_quality_summary: El texto es legible, pero «muerte malvada» suena poco natural y algo teológicamente extraña en español bíblico; «muerte funesta» o «muerte mala» comunica mejor el sentido. «Más ventajoso» es aceptable, aunque algo mecánico; aquí puede mantenerse por cercanía léxica al inglés auditado y al griego. La frase resultante fluye bien con un ajuste menor en πονηρός y en las notas.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Hades» se conserva correctamente en vez de «infierno» o «sepulcro». No hay términos del glosario principal en conflicto. La principal cuestión léxica es πονηρός, donde el español preferible para este contexto es «funesta» antes que «malvada».'
  issues:
  - severity: medium
    issue: «malvada» para πονηρός
    rationale: En español, «muerte malvada» suena como si la muerte ejerciera malicia moral. El griego aquí describe una muerte dañina, ruinosa o espantosa. «Funesta» preserva mejor el valor contextual sin aplanarlo demasiado.
  - severity: medium
    issue: La nota [a] no presenta una alternativa real
    rationale: 'La nota dice «O: “su muerte es una muerte malvada”», que repite exactamente el texto principal. Debe reflejar la alternativa auditada entre referencia no personal y personal: «su» / «de ella».'
  - severity: low
    issue: La nota [b] sobrepersonaliza el antecedente con «ella»
    rationale: El rastro auditado inglés da como alternativa «better than it» y explica que el pronombre puede entenderse como «its/her». En español conviene evitar imponer excesiva personificación en esta nota alternativa; «eso/esta» o una formulación neutral es más fiel al análisis.
  revised_spanish_text: Su muerte es una muerte funesta[a], y su Hades[b] es más ventajoso.
  revised_footnotes:
  - marker: a
    text: 'O: «la muerte de ella es una muerte funesta»; el pronombre femenino remite al antecedente femenino del contexto previo, probablemente la lengua o el habla calumniosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Hades es mejor que eso» o «la región de los muertos es preferible a eso».'
    reason: alternative_reading
