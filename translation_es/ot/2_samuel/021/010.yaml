    text: 'O «hasta que llovió sobre ellos desde el cielo». El hebreo dice más literalmente: «hasta que agua fue derramada sobre ellos desde los cielos».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige la ubicación del marcador de nota para que corresponda a la cláusula que realmente comenta y elimina una nota innecesaria sobre «la roca». Se preserva el contenido del versículo, la literalidad principal del hebreo y la legibilidad natural del español.
