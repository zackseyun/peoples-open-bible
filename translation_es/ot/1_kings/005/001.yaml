base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/001.yaml
  text: And Solomon was ruling over all the kingdoms from the River to the land of the Philistines and as far as the border of Egypt[b][a]. They were bringing tribute and serving Solomon all the days of his life.
  footnotes:
  - marker: a
    text: That is, the Euphrates River.
    reason: cross_reference
  - marker: b
    text: Or 'bringing gifts.' The Hebrew minḥah can denote a gift, offering, or tribute; here the political context favors 'tribute.'
    reason: lexical_alternative
