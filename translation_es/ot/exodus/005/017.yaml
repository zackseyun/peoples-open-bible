  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: adversativo inicial, repetición enfática de נרפים, causal עַל־כֵּן, y el nombre divino «Yahvé». Sin embargo, la secuencia volitiva final no está bien preservada en español: נֵלְכָה נִזְבְּחָה expresa dos cohortativos coordinados («vayamos y sacrifiquemos» / «vamos a ir y a sacrificar»), no un futuro indicativo («sacrificaremos»).'
  spanish_quality_summary: El español es claro y legible, pero «Vamos y sacrificaremos» suena menos natural y mezcla exhortación con futuro de manera innecesaria. Además, «Vamos» por sí solo puede leerse más como indicativo coloquial que como exhortación litúrgica; «Vayamos y sacrifiquemos» refleja mejor el valor volitivo y mantiene un tono digno y natural en contexto bíblico.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; la acusación repetida se mantiene con «ociosos, ociosos». No hay conflicto doctrinal relevante. La única desviación significativa es verbal/aspectual en los cohortativos.'
  issues:
  - severity: medium
    issue: Renderización inadecuada del segundo cohortativo
    rationale: נִזְבְּחָה es cohortativo de primera persona plural, paralelo a נֵלְכָה. «Sacrificaremos» convierte una propuesta/volición en futuro indicativo y altera el matiz del original.
  - severity: low
    issue: Primer cohortativo algo débil en español
    rationale: «Vamos» puede funcionar, pero en cita formal bíblica «Vayamos» expresa con más claridad la exhortación inclusiva del hebreo y armoniza mejor con el segundo verbo volitivo.
  revised_spanish_text: 'Pero él dijo[a]: «¡Ustedes son ociosos, ociosos! Por eso dicen: “Vayamos y sacrifiquemos a Yahvé”»'
  revised_footnotes:
