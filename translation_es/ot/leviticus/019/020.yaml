revisions:
- from: Si un hombre se acuesta con una mujer y tiene emisión de semen, y ella es una esclava mujer[a] destinada para un hombre, pero no ha sido redimida ni se le ha dado libertad, habrá una averiguación[b]; no serán condenados a muerte, porque ella no había sido liberada.
  to: Si un hombre se acuesta con una mujer y tiene emisión de semen, y ella es una mujer esclava[a] asignada a un hombre, pero no ha sido redimida ni se le ha dado libertad, habrá una averiguación[b]; no serán condenados a muerte, porque ella no había sido liberada.
  rationale: Se corrige un calco poco natural ('esclava mujer' → 'mujer esclava'), se mejora la naturalidad de la relación jurídica ('destinada para' → 'asignada a'), y se ajusta la nota [a] para no sobredefinir נֶחֱרֶפֶת לְאִישׁ como desposorio formal, en línea con el expediente del POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en general la estructura legal del hebreo y sigue bien las decisiones del POB inglés: varón singular, acto sexual con matiz de semen, condición servil de la mujer, falta de redención/libertad, rareza de בִּקֹּרֶת, y razón final de la no ejecución. Sin embargo, hay dos desajustes importantes de fidelidad y naturalidad: ''esclava mujer'' calca torpemente el inglés y no es español idiomático; y la nota [a] introduce ''desposada'', que sobreafirma el estado legal precisamente donde el expediente inglés lo evita. Además, ''destinada para un hombre'' suena menos natural que ''asignada a un hombre'' o ''destinada a un hombre''.'
  spanish_quality_summary: La redacción es comprensible, pero presenta calcos innecesarios y una formulación poco natural en español eclesial general. 'Una mujer esclava' es claro y digno; 'esclava mujer' no. 'Habrá una averiguación' funciona, aunque 'se hará una investigación' sería más natural; no obstante, puede mantenerse para reflejar la ambigüedad. 'No serán condenados a muerte' es aceptable, pero 'no serán ejecutados' o 'no se les dará muerte' sería más directo; aun así no exige cambio. La coherencia entre 'libertad' y 'liberada' está bien.
  glossary_alignment: 'No hay conflicto con los términos teológicos principales del proyecto. La decisión de mantener ''esclava'' frente a ''sierva'' está correctamente alineada con el principio sobre estado servil. El problema principal es estilístico-lexical: debe evitarse el compuesto no idiomático ''esclava mujer'' y la nota debe preservar la cautela del POB sobre נֶחֱרֶפֶת לְאִישׁ sin elevarlo a desposorio pleno.'
  issues:
  - severity: high
    issue: '''esclava mujer'' es un calco no idiomático'
    rationale: El hebreo שִׁפְחָה significa 'esclava' / 'mujer esclava'; el inglés 'slave woman' no debe trasladarse mecánicamente. 'Esclava mujer' suena antinatural en español y perjudica la legibilidad sin añadir precisión.
  - severity: medium
    issue: La nota [a] usa 'desposada con un hombre'
    rationale: El expediente inglés advierte justamente contra una lectura de compromiso matrimonial pleno. 'Desposada' en español sugiere más fuertemente un estatus formal que el hebreo aquí probablemente no exige.
  - severity: low
    issue: '''destinada para un hombre'' puede mejorarse a español más natural'
    rationale: '''Designated for a man'' se refleja mejor como ''asignada a un hombre'' o ''destinada a un hombre''. La preposición ''para'' aquí suena menos idiomática.'
