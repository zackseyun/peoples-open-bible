translation:
  language: es
  text: «Quemaré esta casa[a]». Y salió con ira. Y entraron los sacerdotes y se pusieron delante del altar y del santuario, y lloraron y dijeron[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este templo». El griego dice literalmente «esta casa», una manera común de referirse al templo.
    reason: lexical_alternative
  - marker: b
    text: El versículo termina con «dijeron», introduciendo la oración o discurso que continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ἐμπυριῶ
  english_pob_choice: I will burn
  chosen_spanish: Arderé
  alternatives_spanish:
  - La quemaré
  - La incendiaré
  - La pondré en fuego
  lexicon: LSJ
  rationale: El futuro primero expresa la amenaza directa del griego. «Arderé» mantiene la fuerza verbal sin añadir un matiz resultativo excesivo; «la quemaré» también sería posible, pero «arderé» conserva mejor el registro solemne del anuncio.
- source_word: τὸν οἶκον τοῦτον
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: LSJ
  rationale: Se conserva «casa» porque el griego dice literalmente οἶκον y la POB inglesa preserva esa elección por su resonancia bíblica. El contexto del altar y del santuario aclara que se trata del templo.
- source_word: μετὰ θυμοῦ
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - airadamente
  - con enojo
  lexicon: BDAG
  rationale: La frase denota un estado de enojo; «con ira» es natural en español bíblico y mantiene la carga emocional del relato sin suavizarla.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los ministros del templo
  lexicon: LSJ
  rationale: «Sacerdotes» es el equivalente directo y claro para οἱ ἱερεῖς en el contexto del templo.
- source_word: ἔστησαν κατὰ πρόσωπον
  english_pob_choice: stood before
  chosen_spanish: se pusieron delante de
  alternatives_spanish:
  - se mantuvieron ante
  - se colocaron frente a
  lexicon: LSJ
  rationale: La locución idiomática se traduce de forma natural como «se pusieron delante de», que conserva la idea de estar en presencia de algo sagrado. «Ante» sería correcto, pero un poco más formal y menos inmediato.
- source_word: τοῦ θυσιαστηρίου
  english_pob_choice: the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del sacrificio
  - del ara
  lexicon: LSJ
  rationale: «Altar» es el término cultual estándar y coincide con la elección inglesa.
- source_word: τοῦ ναοῦ
  english_pob_choice: the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del templo
  - del recinto sagrado
  lexicon: LSJ
  rationale: 'Se mantiene la distinción entre οἶκος y ναός: aquí ναός señala el santuario/templo propiamente dicho. «Santuario» reproduce mejor esa diferencia que repetir «templo».'
- source_word: ἔκλαυσαν
  english_pob_choice: they wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - se lamentaron
  - sollozaron
  lexicon: BDAG
  rationale: En español, «llorar» comunica con naturalidad el acto de derramar lágrimas; «se lamentaron» introduce más interpretación que el verbo simple griego.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - expresaron
  lexicon: BDAG
  rationale: Es la fórmula narrativa estándar para introducir el discurso que continúa en el versículo siguiente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y el audit trail inglés. Se conservó la distinción lexical entre οἶκος («casa») y ναός («santuario»), y se mantuvo el cierre abierto del versículo con una coma final para señalar la continuación inmediata del discurso.
  spanish_consistency_notes:
  - Se evitó sustituir «santuario» por «templo» para no borrar la distinción presente en el griego y en la decisión auditada en inglés.
  - Se prefirió «con ira» / «lloraron» como equivalentes sobrios y naturales, sin intensificar ni suavizar el tono narrativo.
  - Se mantuvo el registro bíblico estándar de «sacerdotes», «altar» y «santuario» por claridad litúrgica y fidelidad léxica.
