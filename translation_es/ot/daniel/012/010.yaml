base_translation:
  language: en
  yaml_path: translation/ot/daniel/012/010.yaml
  text: Many will purify themselves and make themselves white and be refined[a], but the wicked will act wickedly; and none of the wicked will understand[b], but those who have insight will understand.
  footnotes:
