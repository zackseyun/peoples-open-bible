revisions:
- from: Por favor, haz que termine[a] el mal de los impíos, y establece al justo; oh Dios justo, que examinas los corazones y los riñones[b].
  to: Te ruego que el mal de los impíos llegue a su fin, pero establece al justo; oh, Dios justo, que examinas los corazones y las mentes[a].
  rationale: Se ajusta el registro de súplica con «Te ruego» en lugar de «Por favor»; se usa «llegue a su fin» para reflejar con naturalidad el jussivo de גמר; y se reemplaza «riñones» por «mentes» en el texto principal para seguir la decisión final auditada del POB en inglés y mantener la legibilidad en español, conservando la literalidad hebrea en una nota cultural. No se requiere adjudicación adicional porque el cambio es claro, menor y bien sustentado por la auditoría existente.
