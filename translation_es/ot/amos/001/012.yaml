translation:
  language: es
  text: Así que enviaré fuego sobre Temán, y consumirá las ciudadelas[a] de Bosra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los palacios de Bosra'. El término hebreo puede referirse a residencias palaciegas o a fortalezas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así que enviaré
  alternatives_spanish:
  - Y enviaré
  - Enviaré
  lexicon: HALOT
  rationale: El valor básico de שׁלח en la forma causativa es 'enviar'. El hebreo con וְ puede ser simplemente coordinativo, pero en este oráculo profético el matiz consecutivo está bien representado por 'Así que', que mantiene la conexión discursiva sin volverla rígidamente literal.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego ardiente
  - llama
  lexicon: HALOT
  rationale: La forma hebrea denota literalmente 'fuego'; en español 'fuego' es la opción natural y fiel para el juicio profético anunciado aquí.
- source_word: בְּ/תֵימָן
  english_pob_choice: upon Teman
  chosen_spanish: sobre Temán
  alternatives_spanish:
  - contra Temán
  - en Temán
  lexicon: HALOT
  rationale: Temán es nombre propio y se translitera. La preposición בְּ se vierte aquí con 'sobre' para expresar el blanco del juicio, siguiendo el sentido del inglés POB 'upon' y la fuerza direccional del contexto.
- source_word: וְ/אָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y comerá
  lexicon: HALOT
  rationale: Con el fuego como sujeto, אכל funciona idiomáticamente como 'consumir'. 'Consumirá' conserva la fuerza destructiva y suena natural en español moderno.
- source_word: אַרְמְנ֥וֹת
  english_pob_choice: the citadels
  chosen_spanish: las ciudadelas
  alternatives_spanish:
  - los palacios
  - las fortalezas
  lexicon: HALOT
  rationale: 'אַרְמְנוֹת puede referirse a residencias palaciegas fortificadas o a fortalezas de élite. ''Ciudadelas'' mantiene ambos rasgos: la idea de recinto fortificado y la de sede de poder, sin estrechar el término a ''palacios''.'
- source_word: בָּצְרָה
  english_pob_choice: of Bozrah
  chosen_spanish: de Bosra
  alternatives_spanish:
  - de Bosrá
  - en Bosra
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso castellano bíblico. 'De Bosra' reproduce la construcción del hebreo en relación con 'las ciudadelas'.
theological_decisions:
- issue: Lenguaje de juicio profético directo
  english_pob_reading: Render the verse as a direct divine judgment announcement without softening the imagery.
  chosen_spanish_reading: 'Conservar la proclamación directa del juicio divino: fuego enviado por Yahvé que consume centros fortificados.'
  alternative_spanish_readings:
  - Dios enviará destrucción sobre Temán
  - Arderán los palacios de Bosra
  rationale: El hebreo presenta un anuncio concreto de juicio. La traducción mantiene la imagen de fuego y consumo sin espiritualizarla ni volverla genérica.
  doctrine_reference: Principio de primacía del texto original y preservación del peso retórico-teológico del oráculo.
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin cambios de revisión; no se detectan revisiones que obliguen a ajustar el sentido. La presente redacción sigue la lectura auditada del hebreo y conserva la alternativa léxica principal en nota.
  spanish_consistency_notes:
  - Se usa 'Temán' y 'Bosra' como transliteraciones estables de nombres propios.
  - '''Ciudadelas'' se eligió para no perder la ambigüedad entre palacio y fortaleza documentada en el audit trail.'
  - 'La sintaxis conserva el paralelismo del hebreo: envío de fuego + consumo de las estructuras de Bosra.'
