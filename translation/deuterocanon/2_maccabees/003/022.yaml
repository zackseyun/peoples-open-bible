id: 2MA.3.22
reference: 2 Maccabees 3:22
source:
  edition: lxx-swete-1909
  text: κίαν. Οἱ μὲν οὖν ἐπεκαλοῦντο τὸν παγκρατῆ κύριον τὰ πεπιστευμένα τοῖς πεπιστευκόσιν σῶα διαφυλάσσειν μετὰ πάσης ἀσφαλείας.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: minor_mismatch
translation:
  text: So then they were calling on the all-powerful Lord to keep what had been entrusted to those who had made the deposit safe with all security[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who had entrusted them'; the Greek refers to the people who had placed property in trust for safekeeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκαλοῦντο
  chosen: were calling on
  alternatives:
  - were invoking
  - were appealing to
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing/repeated appeal in prayer. 'Calling on' is natural English and preserves the religious sense without overformalizing.
- source_word: παγκρατῆ
  chosen: all-powerful
  alternatives:
  - almighty
  - all-sovereign
  lexicon: LSJ
  rationale: The adjective denotes one who has power over all. 'All-powerful' is transparent modern English; 'almighty' is possible but can sound more traditional than the Greek requires.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord' as the default title. Here it refers reverentially to God.
- source_word: τὰ πεπιστευμένα
  chosen: what had been entrusted
  alternatives:
  - the things entrusted
  - the deposits entrusted
  lexicon: BDAG
  rationale: Perfect participle used substantivally refers to property placed in trust. 'What had been entrusted' is idiomatic and preserves the passive sense.
- source_word: τοῖς πεπιστευκόσιν
  chosen: to those who had made the deposit
  alternatives:
  - to those who had entrusted it
  - to the depositors
  lexicon: LSJ
  rationale: The perfect active participle refers to the persons who entrusted their goods for safekeeping. Because English lacks a simple participial equivalent, this rendering makes the relationship explicit. 'Depositors' is concise but more technical.
- source_word: σῶα
  chosen: safe
  alternatives:
  - unharmed
  - intact
  lexicon: BDAG
  rationale: Accusative predicate with διαφυλάσσειν expresses preservation in sound condition. 'Safe' is concise and fits the context of entrusted valuables.
- source_word: διαφυλάσσειν
  chosen: to keep
  alternatives:
  - to guard carefully
  - to preserve
  lexicon: BDAG
  rationale: The verb means to guard or preserve securely. 'Keep' is chosen in the main text for readability, with the surrounding phrase 'safe with all security' carrying the protective nuance.
- source_word: μετὰ πάσης ἀσφαλείας
  chosen: with all security
  alternatives:
  - in complete safety
  - with every safeguard
  lexicon: LSJ
  rationale: The phrase intensifies the manner of preservation. 'With all security' is slightly formal but closely reflects the Greek emphasis; alternatives are smoother but a bit more interpretive.
