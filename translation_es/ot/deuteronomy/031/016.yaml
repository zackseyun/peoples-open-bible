base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/016.yaml
  text: And Yahweh said to Moses[a], “Behold, you are about to lie down with your fathers. Then this people will rise up and prostitute themselves after the foreign gods of the land into whose midst they are entering[b]. They will forsake me and break my covenant that I made with them.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''play the prostitute after the foreign gods.'' The expression uses sexual infidelity as a metaphor for covenant unfaithfulness through idolatry.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular forms in 'he is entering' and 'with him,' using a collective singular for Israel/the people; English renders the sense with plurals for clarity.
    reason: lexical_alternative
