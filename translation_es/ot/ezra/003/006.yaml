translation:
  language: es
  text: Desde el primer día del séptimo mes comenzaron a ofrecer holocaustos a Yahvé[a], aunque todavía no se habían echado los cimientos del templo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero todavía no se habían echado los cimientos del templo de Yahvé». La conjunción hebrea también puede traducirse más simplemente como «y» o adversativamente como «pero»; el sentido es que los sacrificios comenzaron antes de que se echaran los cimientos del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיּוֹם אֶחָד
  english_pob_choice: From the first day
  chosen_spanish: Desde el primer día
  alternatives_spanish:
  - En el primer día
  - A partir del primer día
  lexicon: HALOT
  rationale: La preposición מִן indica punto de inicio temporal; en español, «desde» conserva mejor ese valor de comienzo que un simple «en».
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: of the seventh month
  chosen_spanish: del séptimo mes
  alternatives_spanish:
  - del mes séptimo
  - del séptimo período lunar
  lexicon: HALOT
  rationale: Es una construcción genitiva simple que identifica el mes correspondiente; «séptimo mes» es la forma natural y fiel en español.
- source_word: הֵחֵלוּ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa inicio de una acción. «Comenzaron» mantiene ese valor con registro claro y digno.
- source_word: לְהַעֲלוֹת עֹלוֹת
  english_pob_choice: to offer burnt offerings
  chosen_spanish: a ofrecer holocaustos
  alternatives_spanish:
  - a presentar holocaustos
  - a sacrificar holocaustos
  lexicon: HALOT
  rationale: En contexto sacrificial, el hebreo literal «hacer subir» se expresa naturalmente como «ofrecer». «Holocaustos» conserva la correspondencia cultual de עֹלוֹת.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino revelado, conforme al criterio doctrinal del proyecto. La preposición ל se expresa con «a» en español para marcar destino/dirigido a la ofrenda.
- source_word: וְהֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - la casa de Yahvé
  - el santuario de Yahvé
  - el palacio de Yahvé
  lexicon: HALOT
  rationale: En el contexto de restauración de Esdras, הֵיכָל se entiende mejor como «templo». Se conserva el nombre divino uniforme como Yahvé.
- source_word: לֹא יֻסָּד
  english_pob_choice: had not been laid
  chosen_spanish: no había sido aún cimentado
  alternatives_spanish:
  - no había sido aún puesto el cimiento
  - todavía no había sido fundada
  lexicon: HALOT
  rationale: El pasivo de יסד alude a la colocación de cimientos. En español, «cimentado» comunica esa idea de forma más natural que un calco demasiado rígido.
- source_word: וְ
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - y
  - pero
  - sin embargo
  lexicon: HALOT
  rationale: 'El valor contextual es concesivo: comenzaron los sacrificios pese a que el templo no estaba cimentado. «Aunque» expresa esa relación sin forzarla.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto español adopta «Yahvé» como equivalente principal de יְהוָה, en línea con la política terminológica del POB en español. Se evita el sustituto litúrgico «SEÑOR» para no ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Concesive force of וְ in context
  english_pob_reading: though
  chosen_spanish_reading: aunque
  alternative_spanish_readings:
  - y
  - pero
  - sin embargo
  rationale: 'La relación lógica del verso es concesiva: las ofrendas comenzaron antes de que se cimentara el templo. «Aunque» preserva esa tensión mejor que una simple coordinación.'
  doctrine_reference: Ezra 3:6 contextual reading; English audit trail footnote a
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: comienzo temporal explícito, acción sacrificial idiomática, nombre divino preservado como Yahvé y cláusula final traducida con sentido concesivo para reflejar la relación entre el inicio de los holocaustos y la falta de cimentación del templo. No se detectaron revisiones posteriores que alteren el verso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - «Holocaustos» se mantiene por fidelidad al término sacrificial de עֹלוֹת.
  - 'La cláusula final conserva la tensión histórica: los sacrificios empezaron antes de la cimentación del templo.'
