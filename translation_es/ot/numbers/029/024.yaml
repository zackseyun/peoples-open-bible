translation:
  language: es
  text: y sus ofrendas de cereal y sus ofrendas de libación, para los toros, para los carneros y para los corderos, según su número, según la ordenanza[a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la norma» o «según el rito prescrito». El hebreo alude al procedimiento legal establecido para estas ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offerings
  chosen_spanish: sus ofrendas de cereal
  alternatives_spanish:
  - sus ofrendas
  - sus ofrendas de harina
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa la ofrenda vegetal o de cereal que acompaña al sacrificio animal. «Cereal» comunica mejor esa clase de ofrenda en español moderno que un genérico «ofrenda», y evita la confusión con una simple dádiva.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus ofrendas de libación
  alternatives_spanish:
  - y sus libaciones
  - y sus ofrendas derramadas
  lexicon: HALOT
  rationale: נֶסֶךְ se refiere a una ofrenda derramada; «ofrendas de libación» conserva el sentido cultual y el registro bíblico sin perder claridad.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los bueyes
  - para los novillos
  lexicon: HALOT
  rationale: El término hebreo apunta a los animales de sacrificio; «toros» es una opción natural en español bíblico y mantiene la referencia sacrificial amplia que el inglés POB traduce como «bulls».
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los machos de oveja
  lexicon: HALOT
  rationale: אֵילִים son carneros; «carneros» es claro, exacto y estándar en español.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los ovejos
  lexicon: HALOT
  rationale: כְּבָשִׂים en este contexto cultual se entiende naturalmente como corderos; el español «corderos» transmite bien la categoría sacrificial.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - conforme a su número
  lexicon: HALOT
  rationale: La expresión indica distribución proporcional al número de animales. «Según su número» es breve, natural y fiel al hebreo.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según la ordenanza
  - según el rito prescrito
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí no significa solo «juicio», sino la disposición normativa del rito. «Estatuto» conserva el valor legal-cultual de una regla establecida.
theological_decisions:
- issue: Valor ritual de מִשְׁפָּט en legislación sacrificial
  english_pob_reading: according to the ordinance
  chosen_spanish_reading: conforme al estatuto
  alternative_spanish_readings:
  - según la ordenanza
  - según el rito prescrito
  rationale: No se trata de una mera costumbre, sino de un procedimiento prescrito por la ley cultual. «Estatuto» mantiene el carácter normativo y evita diluir la fuerza legal del término.
  doctrine_reference: Ley/ordenanza cultual en el Pentateuco; cf. el uso técnico de מִשְׁפָּט en legislación ritual.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «grain offering» a plural («grain offerings») para concordar con «drink offerings». En español se reflejó naturalmente con el plural «ofrendas de cereal» y con la coordinación plural de «sus ofrendas de libación».
  spanish_consistency_notes:
  - Se mantuvo el orden acumulativo de la lista sacrificial para reflejar el hebreo.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, pues el versículo no contiene el nombre divino.
  - «Conforme al estatuto» preserva el matiz jurídico-cultual de la cláusula final.
  - La puntuación usa comas para marcar la enumeración y el cierre con punto y coma, acorde con el tono normativo del texto.
