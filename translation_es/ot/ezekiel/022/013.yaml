translation:
  language: es
  text: Mira, yo golpeo mi mano contra tu ganancia injusta[a] que has hecho, y contra la sangre derramada[b] que ha estado en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu lucro injusto', 'tu ganancia deshonesta' o 'tu avaricia'. El término hebreo puede referirse a ganancia obtenida por injusticia o violencia.
    reason: lexical_alternative
  - marker: b
    text: O 'tu culpa de sangre'. El hebreo 'sangres' puede referirse colectivamente a actos de derramamiento de sangre y a la culpa asociada con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: Conserva el marcador profético de atención y la vivacidad del original, con una formulación natural y reverente en español.
- source_word: הִכֵּיתִי
  english_pob_choice: I strike
  chosen_spanish: yo golpeo
  alternatives_spanish:
  - yo golpeo mi mano
  - yo doy un golpe
  lexicon: HALOT
  rationale: El hebreo describe un gesto concreto de juicio. 'Golpeo' transmite la acción sin convertirla en una paráfrasis abstracta; el complemento 'mi mano' queda explicitado por el siguiente sintagma.
- source_word: כַפִּי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi palma
  - mi palma de la mano
  lexicon: HALOT
  rationale: כף puede significar 'palma' o 'mano'. En español, 'mano' comunica con naturalidad el gesto judicial sin perder el sentido corporal.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: La fuerza adversativa/judicial del preposición se expresa mejor con 'contra' en este contexto de denuncia.
- source_word: בִּצְעֵךְ
  english_pob_choice: your unjust gain
  chosen_spanish: tu ganancia injusta
  alternatives_spanish:
  - tu ganancia deshonesta
  - tu lucro injusto
  - tu avaricia
  lexicon: HALOT
  rationale: '''Ganancia injusta'' conserva el campo semántico de beneficio obtenido por injusticia o violencia sin estrecharlo demasiado ni moralizarlo más allá del hebreo.'
- source_word: אֲשֶׁר עָשִׂית
  english_pob_choice: that you have made
  chosen_spanish: que has hecho
  alternatives_spanish:
  - que has adquirido
  - que has obtenido
  lexicon: HALOT
  rationale: Se mantiene cerca del verbo hebreo 'hacer', que el POB inglés también preserva con 'made'. En español, 'hecho' es la forma más natural y fiel en este sintagma.
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - y acerca de
  lexicon: HALOT
  rationale: Se mantiene el paralelismo retórico con la primera frase y el tono de acusación judicial.
- source_word: דָּמֵךְ
  english_pob_choice: the bloodshed
  chosen_spanish: la sangre derramada
  alternatives_spanish:
  - el derramamiento de sangre
  - tu sangre derramada
  - la culpa de sangre
  lexicon: HALOT
  rationale: '''Sangre derramada'' conserva la imaginería bíblica y permite oír la acumulación de violencia denunciada por el profeta; evita reducir el término a una sola noción técnica.'
- source_word: אֲשֶׁר הָיוּ בְּתוֹכֵךְ
  english_pob_choice: that has been in your midst
  chosen_spanish: que ha estado en medio de ti
  alternatives_spanish:
  - que ha estado dentro de ti
  - que ha estado en tu interior
  lexicon: HALOT
  rationale: '''En medio de ti'' reproduce bien el valor corporativo/cívico de בתוך aplicado a Jerusalén como ciudad-persona.'
theological_decisions:
- issue: Gesto corporal divino de juicio
  english_pob_reading: Rendered as 'I strike my hand against' to preserve a concrete gesture of divine indignation/judgment without over-interpreting it as applause or mere metaphor.
  chosen_spanish_reading: '''yo golpeo mi mano contra'' preserva un gesto corporal concreto de juicio divino sin convertirlo en simple metáfora ni en una explicación abstracta.'
  alternative_spanish_readings:
  - '''yo aplaudo contra'''
  - '''yo alzo mi mano contra'''
  - '''yo doy un golpe con mi mano contra'''
  rationale: El hebreo presenta una imagen antropomórfica de indignación judicial. En español, 'golpear la mano' mantiene la concreción del gesto y evita sugerir aplauso, que sería engañoso en este contexto.
  doctrine_reference: Anthropomorphism in prophetic judgment language; divine holiness and judicial response
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y sin cambios sustanciales; se mantiene la lectura óptima del gesto de juicio y la equivalencia funcional de los términos de ganancia y sangre.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' según la pauta del proyecto cuando el contexto lo requiera explícitamente; aquí el versículo no lo nombra.
  - '''Ganancia injusta'' sigue la terminología POB documentada para בצע sin sustituirla por vocabulario eclesiástico tradicional.'
  - '''Sangre derramada'' mantiene la fuerza colectiva de דמים en un marco de denuncia profética.'
  - Se usa puntuación española y tratamiento natural de la segunda persona singular femenina para la ciudad personificada.
