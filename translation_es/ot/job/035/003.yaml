translation:
  language: es
  text: 'Pues dices[a]: «¿Qué ventaja hay para ti? ¿Qué ganancia tengo yo de mi pecado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué ventaja tienes? ¿Qué ganancia tengo yo más que de mi pecado?». El hebreo es breve y puede insinuar una comparación entre ser justo y pecar.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la cita de manera causal y discursiva, en línea con el flujo argumentativo de Eliú. «Porque» conserva la relación lógica sin sonar forzado en español.
- source_word: תֹאמַר
  english_pob_choice: you say
  chosen_spanish: tú dices
  alternatives_spanish:
  - dices
  - estás diciendo
  lexicon: HALOT
  rationale: El verbo en segunda persona singular se vierte con presente directo para una cita reportada natural en español. Se explicita «tú» para mantener la dirección del reproche.
- source_word: מַה יִּסְכָּן לָךְ
  english_pob_choice: What advantage is it to you?
  chosen_spanish: ¿Qué provecho hay para ti?
  alternatives_spanish:
  - ¿Qué ventaja hay para ti?
  - ¿De qué te sirve?
  lexicon: HALOT
  rationale: סכן en este contexto expresa utilidad o beneficio. «Provecho» comunica bien la idea de ventaja práctica y mantiene el paralelismo con el segundo hemistiquio sin sonar mecánico.
- source_word: מָה אֹעִיל
  english_pob_choice: What profit do I have
  chosen_spanish: ¿Qué ganancia tengo yo?
  alternatives_spanish:
  - ¿Qué provecho tengo yo?
  - ¿Qué gano yo?
  lexicon: HALOT
  rationale: אֹעִיל, hifil de יעל, tiene el sentido de aprovechar o sacar beneficio. «Ganancia» conserva el matiz de beneficio personal y encaja naturalmente con la pregunta retórica.
- source_word: מֵחַטָּאתִי
  english_pob_choice: from my sin
  chosen_spanish: de mi pecado
  alternatives_spanish:
  - por mi pecado
  - a causa de mi pecado
  lexicon: HALOT
  rationale: La preposición מן puede indicar procedencia o comparación. En español, «de mi pecado» es una versión sobria y fiel que no fuerza una comparación explícita que el hebreo no desarrolla con claridad.
theological_decisions:
- issue: Ambigüedad del objeto de «para ti»
  english_pob_reading: Eliú cita a Job como preguntando qué ventaja personal hay.
  chosen_spanish_reading: Eliú cita a Job preguntando qué provecho hay para ti.
  alternative_spanish_readings:
  - Eliú cita a Job preguntando qué provecho tiene Dios de tu justicia.
  - Eliú cita a Job preguntando qué provecho tendrías tú más allá de tu pecado.
  rationale: El hebreo es breve y el pronombre de segunda persona puede resultar ambiguo en cuanto a su referente. La traducción conserva esa ambigüedad sin añadir un sujeto teológico no explicitado, y deja la lectura abierta como en el análisis POB.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla de manera dogmática.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no propuso cambios textuales, pero se atendió el aviso de revisión cruzada sobre posibles problemas mayores manteniendo la ambigüedad del hebreo y la paralela forma retórica.
  spanish_consistency_notes:
  - Se usa «pecado» para חטא, coherente con el valor moral estándar del término en este contexto.
  - Se evita sustituir el lenguaje de beneficio por fórmulas eclesiásticas tradicionales que oscurecerían el paralelismo hebreo.
  - La cita se presenta con puntuación española y comillas angulares para legibilidad pública.
