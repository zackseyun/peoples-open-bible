translation:
  language: es
  text: A su mandato se alegran[b], y en su orden señalado no se rebelan contra su palabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «su boca».'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego amplía la línea: «y en la tierra serán preparados para necesidades, y en sus tiempos no transgredirán una palabra». Esto refuerza la idea de un orden asignado y oportuno.'
    reason: alternative_reading
lexical_decisions:
- source_word: בצותו / ἐν τῇ ἐντολῇ αὐτοῦ
  english_pob_choice: At his command
  chosen_spanish: Al mandato de él
  alternatives_spanish:
  - Cuando él manda
  - Por su mandato
  - Ante su mandato
  lexicon: HALOT; LXX ἐν τῇ ἐντολῇ αὐτοῦ
  rationale: El hebreo y el paralelo griego apuntan a la esfera de la orden/mandato divino. En español, «al mandato de él» conserva la relación sintáctica con la acción y evita suavizar el tono autoritativo. No se usa «SEÑOR» porque el texto de base habla de la orden de Dios, no de una fórmula litúrgica.
- source_word: ישישו
  english_pob_choice: they rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - exultan
  - se gozan
  lexicon: HALOT
  rationale: El verbo expresa gozo o júbilo. «Se alegran» es natural y fiel en español actual; «se regocijan» también sería posible, pero suena más marcado y menos directo.
- source_word: ובחקם
  english_pob_choice: in their appointed order
  chosen_spanish: en su orden señalado
  alternatives_spanish:
  - en su estatuto
  - en su orden establecido
  - según su decreto
  lexicon: HALOT
  rationale: חֹק puede significar estatuto, límite fijo u orden prescrito. Aquí, con la imagen de criaturas/realidades que actúan según su función, «orden señalado» conserva la idea de disposición fija sin reducirla a un término jurídico estrecho.
- source_word: לא ימרו פיו / οὐ παραβήσονται λόγον
  english_pob_choice: they do not rebel against his word
  chosen_spanish: no se rebelan contra su palabra
  alternatives_spanish:
  - no desobedecen su boca
  - no transgreden su palabra
  - no se apartan de su mandato
  lexicon: HALOT; LXX οὐ παραβήσονται λόγον
  rationale: מרה comunica rebeldía o desobediencia. El hebreo dice literalmente «su boca», pero el sentido es lo que Dios dice; por eso «su palabra» mantiene el significado con naturalidad. «Se rebelan contra» preserva el matiz de resistencia, no solo incumplimiento.
theological_decisions:
- issue: Anthropomorphism in Hebrew 'his mouth'
  english_pob_reading: his word
  chosen_spanish_reading: su palabra
  alternative_spanish_readings:
  - su boca
  rationale: El hebreo literal usa una imagen corporal para hablar del decir divino. En español, «su palabra» transmite la fuerza de la orden sin perder la referencia a la comunicación de Dios. Se conserva la lectura literal en una nota para auditar la decisión.
  doctrine_reference: Translation philosophy §6; preserve source sense in readable modern Spanish
- issue: Created things obeying assigned order
  english_pob_reading: in their appointed order they do not rebel
  chosen_spanish_reading: en su orden señalado no se rebelan
  alternative_spanish_readings:
  - según su orden no desobedecen
  - en su estatuto no se apartan
  rationale: El contexto del hebreo y del griego describe realidades creadas que actúan conforme a una disposición dada por Dios. «Orden señalado» comunica esa función asignada sin imponer un lenguaje legalista que no sea necesario.
  doctrine_reference: Sirach 39:31; Greek parallel supports ordered created functioning
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo base de Kahana y se tuvo en cuenta el paralelo griego de Swete. La versión inglesa auditada ya había resuelto 'mouth' como 'word' y 'appointed order' como sentido global; la presente redacción española mantiene esas decisiones con equivalentes naturales y auditables.
  spanish_consistency_notes:
  - Se conserva 'palabra' para el hebreo antropomórfico 'boca', siguiendo el criterio POB de no dejar una imagen literal que oscurezca el sentido.
  - '''Orden señalado'' evita ''estatuto'' por su posible tono jurídico; en este contexto la idea dominante es de disposición/función asignada.'
  - '''Se rebelan contra'' reproduce mejor la fuerza de מרה que una simple desobediencia.'
