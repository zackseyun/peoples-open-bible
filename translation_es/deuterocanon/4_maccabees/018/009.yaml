revisions:
- from: Pero cuando estos hijos llegaron a la adultez[a], murió su padre. Bienaventurado fue aquel hombre, porque, después de ver la vida de tener hijos[b], no sufrió el tiempo de la ausencia de hijos.
  to: Pero cuando estos hijos llegaron a la edad adulta[a], murió su padre. Bienaventurado fue aquel hombre, porque, después de conocer lo que era tener buenos hijos[b], no sufrió el tiempo de quedar sin hijos.
  rationale: Se revisó el verso para mejorar la naturalidad del español sin perder el sentido del griego ni la lógica del POB inglés. «Edad adulta» suena más idiomático que «adultez». «Después de conocer lo que era tener buenos hijos» expresa mejor βίον ἐπιστήσας y preserva el matiz positivo de εὐτεκνία. «Quedar sin hijos» refleja mejor la lectura narrativa documentada para ἀτεκνία en este contexto que la expresión más estática «ausencia de hijos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:52:50Z'
