translation:
  language: es
  text: 'Y a los hijos de Aarón les dieron las ciudades de refugio: Hebrón, y Libna con sus tierras de pasto[a], y Jattir, y Estemoa con sus tierras de pasto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tierras comunes' para 'tierras de pasto'; el hebreo se refiere al terreno abierto que pertenece a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי אַהֲרֹן
  english_pob_choice: And to the sons of Aaron
  chosen_spanish: Y a los hijos de Aarón
  alternatives_spanish:
  - Y para los hijos de Aarón
  - Y a los descendientes de Aarón
  lexicon: HALOT
  rationale: La preposición ל indica destinatario; 'a' conserva bien la dirección del don. 'Hijos' sigue el paralelismo genealógico del hebreo y suena natural en español bíblico. 'Descendientes' sería más explicativo pero menos cercano a la forma del hebreo.
- source_word: נָתְנוּ
  english_pob_choice: they gave
  chosen_spanish: les dieron
  alternatives_spanish:
  - les asignaron
  - les concedieron
  lexicon: HALOT
  rationale: El verbo básico es 'dar'. En este contexto de reparto territorial, 'les dieron' mantiene la simplicidad del hebreo sin introducir una lectura más administrativa de la que el texto exige.
- source_word: עָרֵי הַמִּקְלָט
  english_pob_choice: the cities of refuge
  chosen_spanish: las ciudades de refugio
  alternatives_spanish:
  - las ciudades de asilo
  - las ciudades refugio
  lexicon: HALOT
  rationale: Es el término técnico reconocido para las ciudades designadas como lugares de amparo legal. 'Refugio' conserva la fuerza jurídica del término sin oscurecerlo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: with its pasturelands
  chosen_spanish: con sus tierras de pasto
  alternatives_spanish:
  - con sus pastizales
  - con sus tierras comunes
  lexicon: HALOT
  rationale: מִגְרָשׁ alude al terreno abierto que pertenece a la ciudad. 'Tierras de pasto' comunica con claridad esa zona abierta y utilizable; evita 'suburbios', que sería engañoso, y también 'tierras comunes', que en español puede sonar menos preciso aquí.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: HALOT
  rationale: Nombre propio de lugar con transliteración española estándar.
- source_word: לִבְנָה
  english_pob_choice: Libnah
  chosen_spanish: Libna
  alternatives_spanish:
  - Libna
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso español común, adaptando la terminación a la forma más natural en español.
- source_word: יַתִּר
  english_pob_choice: Jattir
  chosen_spanish: Jattir
  alternatives_spanish:
  - Jatir
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración habitual para este topónimo.
- source_word: אֶשְׁתְּמֹעַ
  english_pob_choice: Eshtemoa
  chosen_spanish: Estemoa
  alternatives_spanish:
  - Eshtemoa
  - Estemoa
  lexicon: HALOT
  rationale: Nombre propio de lugar. 'Estemoa' es una forma española más fluida y comprensible, manteniendo la referencia al topónimo hebreo.
theological_decisions:
- issue: Terminología jurídica de las ciudades de refugio
  english_pob_reading: the cities of refuge
  chosen_spanish_reading: las ciudades de refugio
  alternative_spanish_readings:
  - las ciudades de asilo
  - las ciudades refugio
  rationale: Se conserva la denominación técnica tradicional del conjunto legal sin suavizarla. 'Refugio' reproduce bien la función jurídica y cultual del término hebreo.
  doctrine_reference: Números 35; Josué 20
- issue: Valor de מִגְרָשׁ como terreno adjunto a la ciudad
  english_pob_reading: with its pasturelands
  chosen_spanish_reading: con sus tierras de pasto
  alternative_spanish_readings:
  - con sus terrenos abiertos
  - con sus tierras comunes
  rationale: El texto no habla de simples 'suburbios', sino del terreno abierto anexo a la ciudad. 'Tierras de pasto' mantiene esa realidad espacial y económica sin imponer una interpretación más estrecha que la del hebreo.
  doctrine_reference: Levítico 25:34; Josué 21
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que separa Hebrón de Libna con coma y mantiene la repetición de 'with its pasturelands' para cada ciudad correspondiente. También conserva la estructura enumerativa del hebreo, con Hebrón primero y Libna, Jattir y Estemoa cada una enlazada por 'y'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se ha mantenido 'hijos de Aarón' por fidelidad genealógica y estilo bíblico natural.
  - La nota de pie marca la ambigüedad de מִגְרָשׁ sin sobretraducirlo.
