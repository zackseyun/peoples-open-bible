translation:
  language: es
  text: Y huyeron a las torres en los campos de Azoto[a], y las quemó con fuego[b]; y cayeron de entre ellos[c] unos mil hombres, y regresó a Judea en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azoto es el nombre griego de Asdod.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «la quemó con fuego»; el singular «la» puede referirse colectivamente a la zona fortificada, más que a las «torres» tomadas individualmente.
    reason: lexical_alternative
  - marker: c
    text: O «mil hombres»; la expresión griega puede indicar un total aproximado.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - tomaron la fuga
  lexicon: LSJ
  rationale: «Huyeron» reproduce con naturalidad el movimiento de retirada militar sin añadir matices ajenos al griego.
- source_word: πύργους
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - fortalezas
  - torres defensivas
  lexicon: LSJ
  rationale: «Torres» conserva la imagen concreta del griego. En español bíblico funciona bien y evita interpretar en exceso como «fortalezas».
- source_word: ἀγροῖς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos rurales
  - countrysides
  lexicon: LSJ
  rationale: «Campos» comunica de manera natural el sentido de área rural/campestre del griego y es idiomático en español.
- source_word: Ἀζώτου
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Asdod
  lexicon: LSJ
  rationale: Se mantiene la forma griega latinizada en la línea principal, siguiendo la preferencia del proyecto por transliterar nombres; se conserva la correspondencia conocida con Asdod en nota.
- source_word: ἐνεπύρισεν αὐτὴν ἐν πυρί
  english_pob_choice: he burned them with fire
  chosen_spanish: las quemó con fuego
  alternatives_spanish:
  - las incendió
  - las quemó
  lexicon: LSJ
  rationale: El plural «las» sigue la revisión inglesa que armoniza con «las torres». «Con fuego» reproduce de cerca ἐν πυρί y mantiene el énfasis enfático del original.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - perecieron
  - fueron muertos
  lexicon: LSJ
  rationale: En contexto de combate, «cayeron» es un equivalente bíblico natural que conserva la fuerza narrativa sin explicitar más de lo que dice el griego.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - de entre ellos
  - de ellos
  lexicon: LSJ
  rationale: «Entre ellos» expresa bien la idea partitiva en español y sigue la simplificación adoptada en la revisión inglesa, manteniendo el sentido de que murieron dentro de aquel grupo.
- source_word: εἰς ἄνδρας χιλίους
  english_pob_choice: about a thousand men
  chosen_spanish: unos mil hombres
  alternatives_spanish:
  - como mil hombres
  - aproximadamente mil hombres
  lexicon: LSJ
  rationale: «Unos mil hombres» comunica de forma natural el valor aproximado que la construcción griega permite, sin forzar una exactitud matemática.
- source_word: ἀπέστρεψεν
  english_pob_choice: he returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: LSJ
  rationale: «Regresó» es claro y natural en español contemporáneo y preserva el movimiento de vuelta del verbo griego.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: LSJ
  rationale: «En paz» es la equivalencia más directa y mantiene la resonancia narrativa bíblica del cierre.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió el referente de «it» a «them» para concordar con el plural «towers» y simplificó la frase de las bajas a una formulación más natural. La versión española sigue esa concordancia plural y adopta una redacción igualmente natural sin perder el matiz aproximativo del número.
  spanish_consistency_notes:
  - Se mantiene el nombre geográfico en forma griega/latinizada «Azoto» en el texto principal, con la equivalencia conocida «Asdod» en nota.
  - Se conserva el lenguaje narrativo militar breve y directo, evitando expandir «cayeron» a una glosa interpretativa.
  - «En paz» se mantiene como fórmula bíblica transparente y fiel al griego.
  - No se introduce terminología eclesiástica ajena al pasaje; el registro es histórico-narrativo.
