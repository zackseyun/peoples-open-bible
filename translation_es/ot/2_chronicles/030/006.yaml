  text: וַ/יֵּלְכוּ֩ הָ/רָצִ֨ים בָּֽ/אִגְּר֜וֹת מִ/יַּ֧ד הַ/מֶּ֣לֶךְ וְ/שָׂרָ֗י/ו בְּ/כָל יִשְׂרָאֵל֙ וִֽ/יהוּדָ֔ה וּ/כְ/מִצְוַ֥ת הַ/מֶּ֖לֶךְ לֵ/אמֹ֑ר בְּנֵ֣י יִשְׂרָאֵ֗ל שׁ֚וּבוּ אֶל יְהוָ֗ה אֱלֹהֵי֙ אַבְרָהָם֙ יִצְחָ֣ק וְ/יִשְׂרָאֵ֔ל וְ/יָשֹׁב֙ אֶל הַ/פְּלֵיטָ֔ה הַ/נִּשְׁאֶ֣רֶת לָ/כֶ֔ם מִ/כַּ֖ף מַלְכֵ֥י אַשּֽׁוּר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/006.yaml
  text: So the couriers went with the letters from the hand of the king and his officials throughout all Israel and Judah[a], according to the command of the king, saying, “Sons of Israel, return to Yahweh, the God of Abraham, Isaac, and Israel[b], that he may return to the remnant that has escaped and remains to you from the hand of the kings of Assyria.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''Israel,'' not the more familiar ''Jacob.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the remnant that has escaped, that remains for you'.
    reason: previous_rendering
