translation:
  language: es
  text: Entonces Judá subió, y Yahvé entregó a los cananeos y a los perizitas en manos de ellos[a], y abatieron en Bezec a diez mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al cananeo y al perizita», con las formas singulares usadas colectivamente para esos pueblos; hebreo «en la mano de ellos», un modismo que significa «en su poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue arriba
  lexicon: HALOT
  rationale: עלה conserva el movimiento ascendente o de avance; en español bíblico actual, «subió» comunica de manera natural la salida/avance de Judá sin añadir una interpretación militar que el hebreo no explicita.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio tribal; en español bíblico la forma asentada y transparente es «Judá».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como «Yahvé» según el criterio del proyecto. Mantiene el nombre divino en vez de sustituirlo por un título.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sentido colectivo, el plural español expresa con naturalidad el valor colectivo étnico y coincide con el paralelo de la frase.
- source_word: וְהַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los perizitas
  alternatives_spanish:
  - el perizita
  lexicon: HALOT
  rationale: Como con «cananeos», el gentilicio funciona colectivamente; el plural español evita una forma extraña y refleja el sentido grupal.
- source_word: בְּיָדָם
  english_pob_choice: into their hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - en su poder
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de ״dar en la mano״ sin desfigurarla. «En su mano» mantiene la tensión entre imagen concreta y sentido de dominio/poder.
- source_word: וַיַּכּוּם
  english_pob_choice: they struck down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los abatieron
  - los golpearon
  lexicon: HALOT
  rationale: נכה puede abarcar golpear, herir o abatir. «Los hirieron» conserva la fuerza violenta sin especificar más de lo que el verbo exige; evita traducir directamente como «mataron» cuando el hebreo no lo dice explícitamente.
- source_word: בְּבֶזֶק
  english_pob_choice: at Bezek
  chosen_spanish: en Bezec
  alternatives_spanish:
  - en Bezek
  - en Bezec
  lexicon: HALOT
  rationale: Topónimo transliterado al español con la forma «Bezec», más acorde a la fonética y al uso bíblico en español, manteniendo el valor locativo de ב como «en/at».
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ
  english_pob_choice: ten thousand men
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil varones
  - diez mil personas
  lexicon: HALOT
  rationale: La construcción hebrea denota literalmente «diez mil hombres». «Hombres» conserva el sentido militar y el valor de conteo masculino implícito en el texto.
theological_decisions:
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh gave
  chosen_spanish_reading: Yahvé entregó
  alternative_spanish_readings:
  - Yahvé dio
  - Yahvé puso en su mano
  rationale: Se preserva el nombre divino revelado en el hebreo. «Entregó» mantiene el acto soberano de conceder la victoria y enlaza con la expresión idiomática de poner al enemigo en la mano de alguien.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Agencia divina y humana en la victoria
  english_pob_reading: Yahweh gave... and they struck down
  chosen_spanish_reading: Yahvé entregó... y los hirieron
  alternative_spanish_readings:
  - Yahvé los derrotó...
  - fueron derrotados por ellos
  rationale: 'La cláusula conserva la doble agencia: Dios concede la victoria y el pueblo la ejecuta. No se suaviza a una pasiva impersonal ni se absorbe la acción humana en la divina.'
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Sentido de בְּיָדָם
  english_pob_reading: into their hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en su poder
  - en sus manos
  rationale: Se mantiene la metáfora bíblica de dominio sin explicarla por completo. En español, «en su mano» conserva la imagen y deja abierta la fuerza idiomática de poder/posesión.
  doctrine_reference: Lexical transparency and idiom preservation
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo consonante y la estructura del inglés POB auditado, con dos ajustes principales para el español: el topónimo se normaliza como «Bezec» y el verbo final se rinde como «los hirieron» para preservar la amplitud de נכה sin intensificarlo más allá del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en todo el texto.
  - Se conserva la imagen idiomática «en su mano» para בְּיָדָם, coherente con el registro bíblico del proyecto.
  - 'Los etnónimos se pluralizan en español por claridad colectiva: «cananeos» y «perizitas».'
  - 'El final mantiene una medida masculina explícita: «diez mil hombres».'
