translation:
  language: es
  text: Así que el pueblo descansó el séptimo día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cesó»; el verbo está relacionado con el descanso sabático, así que «guardó el sábado» sería una expansión interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבְּתוּ
  english_pob_choice: rested
  chosen_spanish: descansó
  alternatives_spanish:
  - cesó
  - se detuvo
  - guardó el sábado
  lexicon: HALOT
  rationale: El verbo שׁבת expresa la idea básica de cesar o descansar. En español, «descansó» comunica con naturalidad la acción aquí sin sobreinterpretarla como fórmula litúrgica. «Guardó el sábado» sería una expansión interpretativa; «cesó» es más literal pero menos natural.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עָם designa al colectivo del relato. «El pueblo» es el equivalente más natural y fiel en español para este contexto del desierto.
- source_word: בַּיּוֹם
  english_pob_choice: on the day
  chosen_spanish: en el
  alternatives_spanish:
  - en el día
  - sobre el
  lexicon: HALOT
  rationale: La preposición ב con un sustantivo temporal suele expresarse de forma idiomática en español con «en el».
- source_word: הַשְּׁבִיעִי
  english_pob_choice: the seventh day
  chosen_spanish: séptimo día
  alternatives_spanish:
  - día séptimo
  - el séptimo
  lexicon: HALOT
  rationale: El ordinal modifica a «día»; en español se expresa naturalmente como «séptimo día», manteniendo el sentido completo del hebreo.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: gramática hebrea waw-consecutiva
  rationale: La waw narrativa avanza la acción. «Así» reproduce con fluidez en español el valor consecutivo/resultativo de la frase inicial sin sonar rígido.
theological_decisions:
- issue: Referencia al sábado sin ampliación interpretativa en el verbo
  english_pob_reading: Render the verb as 'rested' rather than 'kept the Sabbath' or another expanded form.
  chosen_spanish_reading: Traducir el verbo como «descansó» y dejar que «el séptimo día» y el contexto indiquen la relación con el sábado.
  alternative_spanish_readings:
  - guardó el sábado
  - cesó
  rationale: El hebreo solo afirma que el pueblo cesó/descansó; la dimensión sabática ya está sugerida por el contexto narrativo. «Descansó» preserva el dato textual sin importar una formulación más doctrinal o litúrgica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what the source text says without paraphrase beyond warrant.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La traducción se mantiene sin marcadores porque no se requieren notas para este versículo.
  spanish_consistency_notes:
  - Se prefirió «pueblo» para עָם por consistencia con el registro narrativo del Éxodo.
  - Se mantuvo un español natural y sobrio, sin introducir «guardó el sábado» ni otra expansión no explícita en el hebreo.
  - «Séptimo día» conserva la estructura semántica del ordinal hebreo sin sobrecargar la frase.
