id: 1PE.1.3
reference: 1 Peter 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ κατὰ τὸ πολὺ αὐτοῦ ἔλεος ἀναγεννήσας ἡμᾶς εἰς ἐλπίδα ζῶσαν δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ ἐκ νεκρῶν,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/003.yaml
  text: 'Blessed be the God and Father of our Lord Jesus Messiah, who according to his great mercy has caused us to be born again to a living hope through the resurrection of Jesus Messiah from the dead,'
translation:
  language: ko
  text: '우리 주 메시아 예수의 하나님 곧 아버지께 찬송을 드립니다. 그분은 자신의 크신 자비를 따라 메시아 예수께서 죽은 자들 가운데서 부활하심으로 말미암아 우리를 거듭나게 하사 산 소망에 이르게 하셨고,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_korean: 찬송을 드립니다
  alternatives_korean:
  - 찬양받으실
  - 송축하리로다
  lexicon: BDAG
  rationale: 송영적 형용 술어를 합쇼체 예배 어조로 옮기되, 본문 첫머리의 찬송 정형을 살린다. 개역의 「찬송하리로다」는 고풍이므로 현대 합쇼체로 「찬송을 드립니다」를 택한다.
- source_word: ὁ θεὸς καὶ πατὴρ
  english_pob_choice: the God and Father
  chosen_korean: 하나님 곧 아버지
  alternatives_korean:
  - 하나님이시며 아버지이신 분
  lexicon: BDAG
  rationale: 단일 관사로 묶인 한 분에 대한 두 칭호이므로 동격으로 「곧」을 사용하여 한 분임을 분명히 한다.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 예수께 적용된 κύριος의 기본값은 「주」다.
- source_word: ἀναγεννήσας
  english_pob_choice: has caused us to be born again
  chosen_korean: 거듭나게 하사
  alternatives_korean:
  - 새로 태어나게 하사
  - 다시 낳으사
  lexicon: BDAG
  rationale: ἀναγέννησις는 신적 행위에 의한 「거듭남」을 가리키는 베드로전서 핵심 어휘이며, 1:23과 일관성을 위해 「거듭나게 하사」로 옮긴다.
- source_word: εἰς ἐλπίδα ζῶσαν
  english_pob_choice: to a living hope
  chosen_korean: 산 소망에 이르게
  alternatives_korean:
  - 살아 있는 소망으로
  - 생명의 소망에
  lexicon: BDAG
  rationale: ζῶσαν의 능동적 「살아 있음」을 「산」으로 보존하며, 「소망」 앞에 와서 한국어 어순을 자연스럽게 만든다.
- source_word: δι’ ἀναστάσεως
  english_pob_choice: through the resurrection
  chosen_korean: 부활하심으로 말미암아
  alternatives_korean:
  - 부활을 통하여
  lexicon: BDAG
  rationale: διά + 속격의 수단·매개 의미를 한국어 「말미암아」로 자연스럽게 살린다.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_korean: 죽은 자들 가운데서
  alternatives_korean:
  - 죽은 자들로부터
  lexicon: BDAG
  rationale: 신약의 부활 정형(ἐκ νεκρῶν)을 한국 성서 전통의 「죽은 자들 가운데서」로 옮긴다.
theological_decisions:
- issue: 1:3-12의 찬송 구조 보존
  chosen_reading: '한 문장의 찬송 정형을 유지하되, 한국어 가독성을 위해 종속절로 풀어 「~하셨고」로 마무리한다 (1:4-5로 흐름 연결).'
  alternative_readings:
  - 각 절을 독립 문장으로 분해
  rationale: 헬라어는 1:3-12가 한 호흡의 찬송이다. 한국어로 그대로 한 문장 처리하면 가독성이 떨어지므로 종속 어미로 연결을 유지한다.
  doctrine_reference: 'DOCTRINE.md: 본문의 수사 구조 보존'
- issue: ἀναγεννήσας의 행위주
  chosen_reading: 하나님이 거듭나게 하시는 행위로 명시
  alternative_readings:
  - 추상적 「새 출생을 주심」
  rationale: 헬라어는 하나님을 명시적 행위주로 설정한다. 번역도 그 행위성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
