base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/032.yaml
  text: That image—its head was of fine gold[a], its chest and its arms of silver[c][b], its belly and its thighs of bronze.
  footnotes:
  - marker: a
    text: Or 'statue.' The Aramaic צַלְמָא can denote an image or a statue.
    reason: lexical_alternative
  - marker: b
    text: Or 'pure gold.' Literally 'good gold,' an idiom for high-quality gold.
    reason: lexical_alternative
  - marker: c
    text: Or 'copper.' The Aramaic נְחָשׁ often refers to bronze in context, though ancient metal terminology may overlap.
    reason: lexical_alternative
