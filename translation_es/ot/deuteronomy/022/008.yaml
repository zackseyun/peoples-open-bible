translation:
  language: es
  text: Cuando construyas una casa nueva[a], harás un parapeto para tu techo, para que no incurras en culpa de sangre sobre tu casa, si alguien cae del techo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «baranda» o «guardarraíl». El hebreo se refiere a una barrera protectora construida alrededor de un techo plano.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Porque
  lexicon: HALOT
  rationale: En este contexto legal, כִּי introduce un caso concreto de ley. «Cuando» expresa mejor la situación normativa en español que una causal («porque») o una condicional menos natural aquí («si»).
- source_word: תִבְנֶה בַּיִת חָדָשׁ
  english_pob_choice: you build a new house
  chosen_spanish: construyas una casa nueva
  alternatives_spanish:
  - edifiques una casa nueva
  - construyas una casa nueva de nuevo
  lexicon: HALOT
  rationale: «Casa nueva» conserva el objeto concreto y el adjetivo; «construyas» es natural en español y mantiene el valor legal del verbo sin forzar un calco.
- source_word: וְעָשִׂיתָ
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - y harás
  lexicon: HALOT
  rationale: En mandatos legales, el perfecto con waw funciona como injuntivo. «Harás» transmite la obligación de manera directa y digna en español bíblico contemporáneo.
- source_word: מַעֲקֶה
  english_pob_choice: parapet
  chosen_spanish: un parapeto
  alternatives_spanish:
  - una baranda
  - un guardacuerpo
  lexicon: HALOT
  rationale: «Parapeto» es preciso para una barrera protectora en el borde de un techo plano y coincide con la decisión auditada en inglés. Se preserva el matiz técnico sin volverlo arcaico.
- source_word: לְגַגֶּךָ
  english_pob_choice: for your roof
  chosen_spanish: para tu techo
  alternatives_spanish:
  - alrededor de tu techo
  - en torno a tu techo
  lexicon: HALOT
  rationale: En español, «techo» comunica con mayor naturalidad la superficie superior de la casa. «Para» conserva el valor de finalidad/protección del hebreo y su relación con la estructura cubierta.
- source_word: וְלֹא תָשִׂים דָּמִים
  english_pob_choice: so that you do not bring bloodguilt
  chosen_spanish: para que no pongas culpa de sangre
  alternatives_spanish:
  - para que no incurras en culpa de sangre
  - para que no causes derramamiento de sangre
  lexicon: HALOT
  rationale: Se evita suavizar el hebreo idiomático. «Culpa de sangre» conserva la fuerza jurídico-moral de דָּמִים, aunque suene menos fluido que una paráfrasis; por eso se mantiene el vínculo con la responsabilidad por muerte evitable.
- source_word: בְּבֵיתֶךָ
  english_pob_choice: on your house
  chosen_spanish: sobre tu casa
  alternatives_spanish:
  - en tu casa
  - en tu hogar
  lexicon: HALOT
  rationale: «Sobre tu casa» refleja la responsabilidad que recae sobre la construcción o la propiedad, no simplemente el interior del hogar. Mantiene la imagen legal de imputación.
- source_word: כִּי יִפֹּל הַנֹּפֵל
  english_pob_choice: if someone falls
  chosen_spanish: si alguien cae
  alternatives_spanish:
  - si cae alguno
  - si el que cae cae
  lexicon: HALOT
  rationale: El hebreo usa una construcción genérica para una víctima potencial. «Si alguien cae» evita la repetición incómoda del hebreo y expresa bien la contingencia indefinida.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - de la casa
  lexicon: HALOT
  rationale: El antecedente más cercano es el techo; en español, «de él» resulta natural y mantiene la referencia estructural sin añadir interpretación. Aunque «de la casa» también es posible, aquí se preserva la proximidad del antecedente.
theological_decisions:
- issue: דָּמִים como responsabilidad legal por muerte evitable
  english_pob_reading: bloodguilt
  chosen_spanish_reading: culpa de sangre
  alternative_spanish_readings:
  - culpa por sangre
  - responsabilidad por sangre
  - derramamiento de sangre
  rationale: La frase no habla solo de sangre física, sino de la culpa legal y moral derivada de no prevenir una muerte. «Culpa de sangre» retiene esa carga covenantal/jurídica sin introducir una explicación doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor legal de la cláusula introducida por כִּי
  english_pob_reading: When
  chosen_spanish_reading: Cuando
  alternative_spanish_readings:
  - Si
  - Porque
  rationale: La lectura jurídica del caso impide tratar la cláusula como mera causa. «Cuando» conserva el carácter normativo del mandamiento en un marco de casuística.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustantivos; el acuerdo de alta concordancia confirma mantener la solución léxica y legal ya establecida. La versión española sigue esa decisión auditada, adaptándola a una sintaxis natural en español sin perder la terminología técnica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «parapeto» como término técnico principal y se ofrece «baranda/guardarraíl» solo como alternativa explicativa en nota.
  - Se traduce דָּמִים con una expresión de culpa legal, no con un mero «sangre», para evitar perder el valor jurídico del hebreo.
  - Se prefiere «techo» frente a «techo/azotea» porque el pasaje describe la superficie superior de la casa en un contexto de seguridad doméstica.
