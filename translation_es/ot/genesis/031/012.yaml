review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la invitación idiomática a mirar, los machos cabríos en contexto reproductivo, la cláusula causal «porque he visto», y la acción continua de Labán contra Jacob. Sin embargo, hay dos problemas de alineación: el anclaje de notas está invertido respecto de su contenido, y «pintados» para וּבְרֻדִּים no preserva con suficiente precisión el sentido de animales manchados/variegados.'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para sonar más natural y preciso en registro bíblico moderno. «Alza tus ojos» es aceptable; «machos cabríos» y «se aparean con el rebaño» funcionan bien. En cambio, «pintados» suena demasiado amplio e incluso artificial para pelaje animal; «manchados» comunica mejor el patrón visible. También deben corregirse las notas para que el marcador junto al texto corresponda realmente a la palabra o frase comentada.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión zoológica «machos cabríos» concuerda con el análisis léxico. La distinción triple de patrones debe mantenerse; «listados, punteados y manchados» lo hace mejor que «... y pintados».
  issues:
  - severity: high
    issue: Los marcadores de notas no corresponden a las palabras o frases que explican.
    rationale: En el texto, [a] está colocado tras «le dijo», pero la nota a explica «están montando al rebaño»; y [b] está tras «el rebaño», pero la nota b trata עֲקֻדִּים («listados/rayados»). Esto incumple el requisito de anclar cada nota exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: «Pintados» para וּבְרֻדִּים es semánticamente débil.
    rationale: 'El hebreo describe un patrón del pelaje: spotted/variegated. «Pintados» puede sugerir algo aplicado externamente, no un rasgo natural del animal. «Manchados» o «moteados» preserva mejor el sentido y sigue distinguiéndose de «punteados».'
  - severity: low
    issue: La nota sobre עֲקֻדִּים puede ajustarse a la decisión final en español.
    rationale: Si el texto revisado mantiene «listados», la nota debe presentar la alternativa tradicional de forma clara y breve, sin extenderse innecesariamente.
  revised_spanish_text: 'Y le dijo: «Por favor, alza tus ojos y mira: todos los machos cabríos que se aparean con el rebaño[a] son listados[b], punteados y manchados, porque he visto todo lo que Labán te está haciendo».'
  revised_footnotes:
  - marker: a
    text: O «están montando al rebaño». El hebreo usa un modismo de reproducción animal.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, עֲקֻדִּים suele verterse «rayados» o «anillados».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las frases comentadas. Además, se cambió «pintados» por «manchados» para reflejar mejor וּבְרֻדִּים como rasgo natural del pelaje y mantener la serie distintiva «listados, punteados y manchados» en español claro y fiel.
