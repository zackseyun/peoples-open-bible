translation:
  language: es
  text: Desde allí partieron hacia Gudgodá[a], y desde Gudgodá hacia Jotbatá, una tierra de corrientes de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tierra con cauces de agua» o «una tierra de wadis de agua». La frase hebrea נַחֲלֵי מָיִם se refiere a canales o corrientes de agua que fluyen.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: HALOT
  rationale: La expresión marca salida desde un punto previo del recorrido. «Desde allí» conserva la referencia espacial y suena natural en español actual.
- source_word: נָסְעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - emprendieron el camino
  lexicon: HALOT
  rationale: En contexto de viaje por etapas, el verbo indica la acción de dejar el lugar anterior y ponerse en marcha. «Partieron» comunica bien ese matiz de salida.
- source_word: הַגֻּדְגֹּדָה
  english_pob_choice: Gudgodah
  chosen_spanish: Gudgodá
  alternatives_spanish:
  - Gudgodah
  - Gudgodá
  lexicon: HALOT
  rationale: Es un nombre de lugar y debe transliterarse. Se adapta la acentuación al español para una lectura fluida sin alterar el referente.
- source_word: וּמִן
  english_pob_choice: and from
  chosen_spanish: y de
  alternatives_spanish:
  - y desde
  - entonces de
  lexicon: HALOT
  rationale: La unión simple del itinerario queda bien expresada con «y de», que mantiene la continuidad narrativa sin añadir más interpretación de la necesaria.
- source_word: יָטְבָתָה
  english_pob_choice: Jotbathah
  chosen_spanish: Jotbata
  alternatives_spanish:
  - Jotbata
  - Jotbatah
  lexicon: HALOT
  rationale: También es un topónimo, por lo que se translitera. «Jotbata» sigue la forma castellana más natural y reconocible.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - una región
  - un país
  lexicon: HALOT
  rationale: Aquí funciona en aposición descriptiva del lugar. «Una tierra» conserva el valor amplio y no politizado de אֶרֶץ.
- source_word: נַחֲלֵי מָיִם
  english_pob_choice: of streams of water
  chosen_spanish: de corrientes de agua
  alternatives_spanish:
  - de arroyos de agua
  - de canales de agua
  - de cauces de agua
  lexicon: HALOT
  rationale: La construcción hebrea describe cursos de agua corrientes. «Corrientes de agua» mantiene la imagen de flujos o cauces y es idiomática en español; no se fuerza una equivalencia técnica única.
translation_notes:
  revision_awareness: El inglés POB mantiene la secuencia de viaje y translitera los topónimos; también añade una nota lexical sobre נַחֲלֵי מָיִם. El español sigue la misma línea, conservando la imagen de abundancia de agua y evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los nombres de lugar para respetar el texto fuente.
  - «Desde allí» y «partieron» reproducen el movimiento narrativo sin sobrerinterpretar.
  - La nota de pie preserva la alternativa lexical principal para נַחֲלֵי מָיִם.
  - Se usó puntuación española y una sintaxis clara, apta para lectura pública.
