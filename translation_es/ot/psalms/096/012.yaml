translation:
  language: es
  text: Que exulte[a] el campo, y todo lo que hay en él; entonces cantarán con júbilo todos los árboles del bosque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grite de alegría». El verbo hebreo puede denotar un clamor jubiloso; se eligió «exulte» por su tono poético y porque encaja bien con la personificación de la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲלֹז
  english_pob_choice: Let ... exult
  chosen_spanish: Que exulte
  alternatives_spanish:
  - Que se alegre
  - Que rebose de júbilo
  lexicon: HALOT
  rationale: El hebreo expresa un llamado/jussivo poético, no simplemente un futuro. «Que exulte» conserva bien el tono elevado y la fuerza volitiva, y en español suena natural en un contexto de personificación poética.
- source_word: שָׂדַי
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la campiña
  - el campo abierto
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona de manera colectiva en la poesía. «El campo» es la opción más natural y mantiene la personificación de la creación.
- source_word: וְכָל אֲשֶׁר בּוֹ
  english_pob_choice: all that is in it
  chosen_spanish: todo lo que hay en él
  alternatives_spanish:
  - y todo lo que está en él
  - y cuanto hay en él
  lexicon: HALOT
  rationale: La frase amplía el campo a todo su contenido. «Todo lo que hay en él» conserva el sentido totalizador y suena idiomático en español contemporáneo.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: HALOT
  rationale: Marca la progresión poética o la respuesta que sigue. «Entonces» reproduce bien ese avance discursivo en español.
- source_word: יְרַנְּנוּ
  english_pob_choice: will sing for joy
  chosen_spanish: cantarán de júbilo
  alternatives_spanish:
  - gritarán de alegría
  - cantarán con gozo
  lexicon: HALOT
  rationale: El verbo puede denotar gritos jubilosos; el POB inglés eligió una solución poética que encaja con los árboles como sujeto. «Cantarán de júbilo» mantiene esa imagen y el tono celebrativo sin volverlo mecánico.
- source_word: כָּל עֲצֵי יָעַר
  english_pob_choice: all the trees of the forest
  chosen_spanish: todos los árboles del bosque
  alternatives_spanish:
  - todos los árboles del monte
  - cada árbol del bosque
  lexicon: HALOT
  rationale: La construcción expresa la totalidad de los árboles pertenecientes al bosque. «Del bosque» es la manera más clara y natural de reflejar el constructo hebreo sin perder la plenitud del cuadro poético.
theological_decisions:
- issue: Personificación de la creación en alabanza
  english_pob_reading: Retain the poetic personification directly rather than paraphrasing it into human praise.
  chosen_spanish_reading: Conservar directamente la personificación poética de la creación.
  alternative_spanish_readings:
  - Reformular como una descripción metafórica de la belleza de la naturaleza
  - Explicitar que es una imagen literaria y no un mandato literal
  rationale: El versículo presenta al campo y a los árboles como participantes en la alegría. Mantener esa personificación respeta el alcance teológico del texto sobre la creación sin suavizarlo ni explicarlo de más.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa más reciente, especialmente al mantener la correspondencia explícita con «all that is in it» mediante «todo lo que hay en él», en vez de una paráfrasis más general.
  spanish_consistency_notes:
  - Se conservó un registro poético y sobrio, apto para lectura eclesial.
  - Se prefirió «campo» y «bosque» como equivalentes naturales y consistentes con la imaginería del salmo.
  - La nota de alternativa se colocó solo en el verbo de júbilo, donde la ambigüedad léxica del hebreo es relevante.
