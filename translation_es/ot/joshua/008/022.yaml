    text: 'Hebreo: ‘estas de este lado y aquellas de aquel lado’, un modismo que indica que Israel los cercó por ambos lados.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: ‘hasta no dejarles ni sobreviviente ni fugitivo’, es decir, que no quedó nadie con vida ni nadie que pudiera escapar.'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota del modismo de cerco al segmento correcto del texto. Se simplificó ‘para salir al encuentro de ellos’ a ‘al encuentro de ellos’ para evitar redundancia. Se cambió ‘golpearon’ por ‘abatieron’ para reflejar mejor el valor bélico de נכה en este contexto, manteniendo la fuerza del hebreo y la naturalidad del español.
