revisions:
- from: Allí está Edom, sus reyes y todos sus príncipes, que fueron puestos entre los muertos a espada, a pesar de su poder[a]. Ellos yacen con los incircuncisos y con los que descienden al pozo[b].
  to: Allí está Edom, sus reyes y todos sus príncipes, que fueron puestos entre los muertos por la espada, a pesar de su poder[a]. Yacen con los incircuncisos y con los que descienden al pozo[b].
  rationale: 'Se hicieron ajustes menores de precisión y estilo: «muertos por la espada» refleja mejor חַלְלֵי חָרֶב en español; se omitió «Ellos» por redundante; y se mantuvieron las notas con anclajes coherentes al texto revisado. El resto del borrador es fiel al hebreo y a las decisiones del POB inglés.'
