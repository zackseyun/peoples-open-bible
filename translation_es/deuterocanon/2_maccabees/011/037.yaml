translation:
  language: es
  text: Por tanto, apresúrense[a] y envíen a algunos[b], para que también nosotros sepamos cuál es su opinión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dense prisa». El verbo griego expresa urgencia en el mandato.
    reason: lexical_alternative
  - marker: b
    text: O «envíen a algunos hombres» o «envíen a ciertos representantes»; el indefinido τινας no especifica con más precisión a quiénes se envía.
    reason: lexical_alternative
  - marker: c
    text: Lit. «de qué clase de opinión son»; es un giro idiomático para preguntar cuál es su parecer o postura.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: La conjunción inferencial introduce una consecuencia directa; «Por tanto» mantiene el enlace lógico con el contexto anterior en un español digno y natural.
- source_word: σπεύσατε
  english_pob_choice: hurry
  chosen_spanish: apresuraos
  alternatives_spanish:
  - daos prisa
  - hacedlo con rapidez
  lexicon: LSJ
  rationale: Imperativo aoristo con urgencia; «apresuraos» conserva la prisa del mandato sin sonar excesivamente coloquial.
- source_word: πέμψατέ τινας
  english_pob_choice: send some men
  chosen_spanish: enviad a algunos
  alternatives_spanish:
  - enviad a algunos hombres
  - enviad a ciertos representantes
  lexicon: LSJ
  rationale: τινας es indefinido y no precisa el grupo. En español, «a algunos» deja abierta la referencia, como hace el griego, sin imponer «hombres» si el contexto no lo exige explícitamente.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: LSJ
  rationale: Introduce una cláusula de propósito; «para que» es la forma más natural y clara en español.
- source_word: καὶ ἡμεῖς
  english_pob_choice: we too
  chosen_spanish: también nosotros
  alternatives_spanish:
  - nosotros también
  lexicon: LSJ
  rationale: La partícula καί añade inclusión; «también nosotros» reproduce ese matiz con fluidez.
- source_word: ἐπιγνῶμεν
  english_pob_choice: may know
  chosen_spanish: sepamos
  alternatives_spanish:
  - conozcamos
  - lleguemos a saber
  lexicon: LSJ
  rationale: El subjuntivo de propósito pide una forma natural en español. «Sepamos» mantiene el valor de llegar a conocer/constatar en este contexto diplomático.
- source_word: ὁποῖοί ἐστε γνώμης
  english_pob_choice: what your opinion is
  chosen_spanish: cuál es vuestra opinión
  alternatives_spanish:
  - de qué opinión sois
  - cuál es vuestro parecer
  lexicon: LSJ
  rationale: El giro griego pregunta por el parecer o postura de ellos. «Cuál es vuestra opinión» expresa la idea central con claridad; se evita una literalidad torpe sin perder el contenido del original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y toma como contexto el audit trail inglés de POB. Se adopta la revisión reciente que prefiere «opinion» frente a una lectura más voluntativa, y se mantiene la ambigüedad de τινας sin masculinizarla innecesariamente.
  spanish_consistency_notes:
  - Se usa «Por tanto» para el nexo inferencial del διό.
  - «Apresuraos» conserva la urgencia del imperativo plural.
  - «Enviad a algunos» respeta la indefinición de τινας sin sobreespecificar el grupo.
  - «Opinión» refleja γνώμης como parecer o postura, en línea con la revisión auditada del inglés POB.
  - El registro es formal y bíblico, pero sin arcaísmos innecesarios.
