revisions:
- from: 'Y de José dijo[a]: «Bendita por Yahvé sea su tierra, con las cosas más escogidas del cielo, con rocío[b], y con el abismo que yace debajo»'
  to: 'Y de José dijo[a]: «Bendita por Yahvé sea su tierra, con lo más escogido del cielo, con rocío[b], y desde la profundidad que está debajo»'
  rationale: Se ajusta 'con el abismo' a 'desde la profundidad' para reflejar mejor וּמִתְּהוֹם y el paralelismo de procedencia en la bendición. Se mejora la naturalidad de מִמֶּגֶד con 'lo más escogido del cielo'. Se mantiene 'Yahvé' según la política del proyecto y se conservan las notas con formulación más clara en español.
