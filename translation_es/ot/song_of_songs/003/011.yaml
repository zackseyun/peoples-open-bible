translation:
  language: es
  text: Salgan y miren al rey Salomón, hijas de Sion, con la corona[a] con que su madre lo coronó el día de su boda, el día del gozo de su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guirnalda»; el hebreo עֲטָרָה puede denotar una corona festiva o una guirnalda, lo cual encaja con el contexto de boda.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאֶינָה
  english_pob_choice: Go out
  chosen_spanish: Salid
  alternatives_spanish:
  - Id fuera
  - Salid afuera
  lexicon: HALOT
  rationale: Imperativo femenino plural de יצא. «Salid» conserva la fuerza de la llamada directa y suena natural en español bíblico sin perder el matiz de movimiento hacia afuera.
- source_word: וּרְאֶינָה
  english_pob_choice: and look
  chosen_spanish: y mirad
  alternatives_spanish:
  - y ved
  - y contemplad
  lexicon: HALOT
  rationale: Imperativo femenino plural de ראה. «Mirad» mantiene el valor exhortativo y visual de «look», con un registro digno y claro en español.
- source_word: בְּנוֹת צִיּוֹן
  english_pob_choice: O daughters of Zion
  chosen_spanish: hijas de Sion
  alternatives_spanish:
  - oh hijas de Sion
  - hijas de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el vocativo poético sin añadir una partícula exclamativa obligatoria. «Sion» sigue la forma castellana usual para el topónimo bíblico.
- source_word: בַּמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: at King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - a rey Salomón
  - ante el rey Salomón
  lexicon: HALOT
  rationale: La preposición ב con verbo de ver marca el objeto observado; en español la construcción natural es «mirad al rey Salomón». Se conserva el título «rey» por su valor referencial.
- source_word: בָּעֲטָרָה
  english_pob_choice: with the crown
  chosen_spanish: con la corona
  alternatives_spanish:
  - con una corona
  - con la diadema
  lexicon: HALOT
  rationale: Se traduce instrumentalmente como en el inglés auditado. «Corona» es el equivalente más amplio y transparente; evita estrechar indebidamente el posible matiz festivo de עֲטָרָה.
- source_word: עֲטָרָה
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - diadema
  lexicon: HALOT
  rationale: «Corona» cubre tanto la corona real como un adorno festivo en contexto nupcial. Es suficientemente amplio para no borrar la tensión semántica documentada por el inglés («crown» / «wreath/garland»).
- source_word: שֶׁעִטְּרָה לּוֹ אִמּוֹ
  english_pob_choice: with which his mother crowned him
  chosen_spanish: con que su madre lo coronó
  alternatives_spanish:
  - que su madre le puso
  - con la que su madre lo adornó
  lexicon: HALOT
  rationale: Se conserva el verbo de la misma familia léxica que עֲטָרָה mediante «coronó», manteniendo el juego de palabras. «Lo» refleja el objeto directo masculino singular y la relación causal/instrumental del relativo.
- source_word: בְּיוֹם חֲתֻנָּתוֹ
  english_pob_choice: on the day of his wedding
  chosen_spanish: en el día de su boda
  alternatives_spanish:
  - en el día de su matrimonio
  - el día de su boda
  lexicon: HALOT
  rationale: חֲתֻנָּה se refiere al evento nupcial; «boda» es natural y claro en español, y preserva el marco festivo del texto.
- source_word: וּבְיוֹם שִׂמְחַת לִבּוֹ
  english_pob_choice: on the day of the joy of his heart
  chosen_spanish: en el día del gozo de su corazón
  alternatives_spanish:
  - y en el día del gozo de su corazón
  - en el día en que su corazón se alegró
  lexicon: HALOT
  rationale: Se mantiene la estructura genitiva poética con «gozo de su corazón», siguiendo de cerca el hebreo y el audit trail inglés. «Gozo» preserva el registro elevado mejor que una paraphrasis más interpretativa.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés; no se detectan revisiones aplicadas ni tensiones textuales adicionales que requieran nota doctrinal. Se preservó la única alternativa léxica relevante del inglés para עֲטָרָה mediante una nota sobre el alcance semántico de «corona» frente a posibles matices festivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Sion» como topónimo bíblico estándar en español.
  - Se preserva el paralelismo temporal con dos frases introducidas por «en el día».
  - Se conserva la referencia nupcial con «boda» para mayor naturalidad sin perder fidelidad.
