translation:
  language: es
  text: Entonces saqué a sus padres de Egipto, y ustedes llegaron al mar; y los egipcios persiguieron a sus padres con carros y jinetes hasta el mar Rojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «el mar de los Juncos». Hebreo: yam suf.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹוצִיא
  english_pob_choice: Then I brought ... out
  chosen_spanish: Entonces saqué ... de
  alternatives_spanish:
  - Y saqué ... de
  - Saqué ... de
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir / sacar. «Entonces» conserva la secuencia narrativa del waw consecutivo y suena natural en español; «saqué ... de Egipto» comunica la acción de éxodo sin calco duro.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres» en referencia ancestral y de pacto. Mantener «padres» conserva la forma representativa del texto; se evita neutralizar a «antepasados» porque la POB inglesa retuvo la fuerza familiar/ancestral del término.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con «saqué» en español, «de Egipto» expresa de manera natural el origen del movimiento. No hace falta duplicar la idea con «fuera de» salvo en estilo más enfático.
- source_word: וַתָּבֹאוּ הַיָּמָּה
  english_pob_choice: and you came to the sea
  chosen_spanish: y ustedes llegaron al mar
  alternatives_spanish:
  - y ustedes vinieron al mar
  - y llegaron al mar
  lexicon: HALOT
  rationale: Se mantiene el segundo plural del hebreo, que dirige la historia a la audiencia presente del discurso. «Llegaron al mar» comunica היטב el movimiento hacia el mar; se prefiere «ustedes» para reflejar el apego retórico del texto y evitar una tercera persona que debilite ese efecto.
- source_word: וַיִּרְדְּפוּ מִצְרַיִם
  english_pob_choice: the Egyptians pursued
  chosen_spanish: los egipcios persiguieron
  alternatives_spanish:
  - Egipto persiguió
  - los de Egipto persiguieron
  lexicon: HALOT
  rationale: El sujeto plural del hebreo se refleja con «los egipcios». Se evita el metónimo singular «Egipto» porque en español puede sonar menos natural y oscurecer la pluralidad de los perseguidores.
- source_word: בְּרֶכֶב
  english_pob_choice: with chariots
  chosen_spanish: con carros
  alternatives_spanish:
  - con carros de guerra
  - en carros
  lexicon: HALOT
  rationale: רכב aquí designa el armamento/movilidad militar. «Carros» es un equivalente claro y bíblicamente reconocible en español; «de guerra» podría explicitar de más lo que el hebreo deja implícito.
- source_word: וּבְפָרָשִׁים
  english_pob_choice: and horsemen
  chosen_spanish: y jinetes
  alternatives_spanish:
  - y caballería
  - y hombres a caballo
  lexicon: HALOT
  rationale: פָּרָשִׁים son montados / jinetes. «Jinetes» es la forma directa y natural en español; «caballería» desplaza el énfasis a la tropa como arma colectiva.
- source_word: יַם סוּף
  english_pob_choice: the Red Sea
  chosen_spanish: el mar de Suf
  alternatives_spanish:
  - el mar Rojo
  - el mar de los Juncos
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo transliterado «Suf» en la línea principal para no tapar la tensión lexical que la POB inglesa documenta con la nota «Sea of Reeds». En español, «mar de Suf» mantiene la auditabilidad y evita escoger sin más una tradición interpretativa; el lector puede cotejar la nota para la alternativa más conocida.
theological_decisions:
- issue: 'Dirección retórica: segunda persona dirigida a la audiencia actual a partir del éxodo de sus padres'
  english_pob_reading: 'Retain the second-person address: ''you came to the sea'''
  chosen_spanish_reading: 'Conservar la segunda persona: «ustedes llegaron al mar»'
  alternative_spanish_readings:
  - «ellos llegaron al mar»
  - «ustedes fueron al mar»
  rationale: El hebreo interpela a la generación presente identificándola con sus padres en la historia del pacto. La segunda persona en español preserva ese recurso discursivo y evita diluirlo en una narración impersonal.
  doctrine_reference: Translation philosophy §3, §4
- issue: יַם סוּף como término geográfico con tensión entre tradición y literalidad
  english_pob_reading: Use 'the Red Sea' in the main text; footnote the more literal 'Sea of Reeds'
  chosen_spanish_reading: Usar «mar de Suf» en el texto principal y documentar la alternativa literal en nota
  alternative_spanish_readings:
  - el mar Rojo
  - el mar de los Juncos
  rationale: La POB inglesa marca la tensión lexical sin cerrarla. En español, transliterar «Suf» evita imponer una equivalencia interpretativa donde el dato hebreo sigue discutido. La nota mantiene visible la alternativa literal tradicionalmente entendida como «mar de los Juncos».
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La base inglesa revisó «Egypt pursued» a «the Egyptians pursued» por fidelidad al plural hebreo. En español se reflejó esa corrección con «los egipcios persiguieron». También se decidió no seguir la tradición inglesa de «Red Sea» en el cuerpo del texto, sino conservar el nombre hebreo «Suf» y explicarlo en nota para mantener la transparencia textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino en todo el proyecto, aunque este versículo no la contiene.
  - Se usó «sus padres» para conservar el paralelismo ancestral del hebreo; no se neutralizó a «antepasados» porque la forma familiar es parte de la fuerza del texto.
  - Se evitó «mar Rojo» en el cuerpo principal para no resolver sin más la tensión de יַם סוּף; la nota la deja auditada.
  - La puntuación sigue el orden narrativo hebreo con dos cláusulas coordinadas y una última frase localizadora.
