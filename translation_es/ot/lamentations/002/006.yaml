  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; שבת -> ''sábado'' correctamente; מוֹעֵד en la segunda cláusula se refleja bien como tiempo/fiesta señalada. La principal falla de alineación léxica es שֻׂכּוֹ, que debe conservarse distinto de מוֹעֲדוֹ; ''refugio'' en el texto y nota con ''choza/tabernáculo'' preserva mejor el audit trail.'
