  glossary_alignment: 'No hay términos del glosario maestro especialmente en juego. Las decisiones léxicas principales concuerdan en general con el POB inglés. La excepción importante es la ubicación de la nota textual: debe acompañar a la palabra que traduce בָאְשָׁה, no a «trigo».'
