translation:
  language: es
  text: La salvación pertenece a Yahvé; tu bendición[a] sobre tu pueblo. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «Tu bendición está sobre tu pueblo». La cláusula hebrea no tiene verbo explícito y puede leerse como declaración o como expresión de deseo/oración.
    reason: alternative_reading
  - marker: b
    text: «Selah» probablemente es una indicación litúrgica o musical; su sentido preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh / the LORD
  chosen_spanish: pertenece a Yahvé
  alternatives_spanish:
  - es de Yahvé
  - a Yahvé pertenece
  lexicon: HALOT
  rationale: La preposición ל en esta cláusula nominal expresa pertenencia o relación; en español, «pertenece a» comunica con naturalidad esa idea sin añadir un verbo interpretativo. Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
- source_word: הַיְשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - el rescate
  - la liberación
  lexicon: HALOT
  rationale: El sustantivo admite rescate o liberación, pero «salvación» es la equivalencia más directa y amplia en este contexto de alabanza y petición, conservando también la resonancia teológica del hebreo.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: עַם designa al pueblo en sentido comunitario y pactual. «Tu pueblo» es la forma más natural y fiel en español, sin perder la relación de pertenencia a Dios.
- source_word: בִרְכָתֶךָ
  english_pob_choice: your blessing
  chosen_spanish: tu bendición
  alternatives_spanish:
  - tu favor
  - tu bendición sobre
  lexicon: HALOT
  rationale: בְּרָכָה significa «bendición» de manera directa. Se evita «favor» porque estrecha innecesariamente el campo semántico y puede sonar más interpretativo que el hebreo.
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - (sin traducir)
  - interludio
  lexicon: HALOT
  rationale: Como el sentido exacto es incierto y probablemente musical o litúrgico, se conserva la transliteración estándar sin intentar resolver su significado.
theological_decisions:
- issue: Cómo reflejar la cláusula hebrea sin verbo explícito
  english_pob_reading: Your blessing be on your people. / Your blessing is on your people.
  chosen_spanish_reading: sobre tu pueblo, tu bendición
  alternative_spanish_readings:
  - tu bendición está sobre tu pueblo
  - que tu bendición esté sobre tu pueblo
  rationale: El hebreo es nominal/verbless y admite más de una lectura. El español principal conserva esa concisión con una yuxtaposición natural, sin introducir un optativo inexistente en el texto. La relación de la bendición con el pueblo queda implícita por el orden y la preposición.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve genuine ambiguity where the source is verbless and avoid adding mood not explicit in Hebrew'
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para יהוה en español: «Yahvé». Se evita «SEÑOR» porque oscurece el nombre propio y no refleja la decisión doctrinal documentada del POB.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador inglés revisado eliminó «may» para no añadir un matiz optativo no explícito en el hebreo y mantuvo la segunda cláusula en forma verbalmente implícita. El español sigue esa decisión: conserva la estructura nominal del hebreo, evita introducir un subjuntivo exhortativo y mantiene la ambigüedad legítima entre declaración y relación posesiva.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con las normas del proyecto.
  - «Salvación» se mantiene para הַיְשׁוּעָה, sin alternar con «liberación» en el texto principal.
  - «Tu pueblo» conserva el valor comunitario/pactual de עַם.
  - Se conserva «Selah» como transliteración, no como traducción especulativa.
  - La puntuación separa claramente la cláusula nominal y el marcador litúrgico final.
