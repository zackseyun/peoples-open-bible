translation:
  language: es
  text: 'Porque así dice Yahvé de los Ejércitos: Así como me propuse hacerles mal[a] cuando sus padres me provocaron a ira, dice Yahvé de los Ejércitos, y no desistí[b][c],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "traerles calamidad". El hebreo dice literalmente "hacerles mal".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "no me arrepentí".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "no cambié de parecer".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma ya adoptada por el proyecto en español. 'Yahvé' mantiene la referencia directa al nombre personal de Dios sin sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos Celestiales
  - de los Ejércitos del cielo
  - de los Ejércitos/Hosts
  lexicon: HALOT
  rationale: El término designa ejércitos/huestes. 'De los Ejércitos' es una equivalencia natural en español y conserva el sentido militar y de soberanía divina que el inglés POB buscó con 'of Armies'.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For thus says
  chosen_spanish: Porque así ha dicho
  alternatives_spanish:
  - Pues así dice
  - Porque así dice
  lexicon: HALOT
  rationale: La fórmula profética se reproduce con un giro natural en español que mantiene el tono solemne del hebreo y del inglés POB. El perfecto 'ha dicho' es idiomático y mantiene la fuerza declarativa.
- source_word: זָמַמְתִּי
  english_pob_choice: I purposed
  chosen_spanish: me propuse
  alternatives_spanish:
  - planeé
  - intenté
  - determiné
  lexicon: HALOT
  rationale: El verbo expresa intención deliberada. 'Me propuse' comunica resolución consciente y evita una lectura demasiado técnica o mecánica en español.
- source_word: לְהָרַע לָכֶם
  english_pob_choice: to do harm to you
  chosen_spanish: hacerles mal
  alternatives_spanish:
  - traerles calamidad
  - hacerles daño
  - causarles desastre
  lexicon: HALOT
  rationale: El verbo aquí apunta a juicio/calamidad, no a mal moral. 'Hacerles mal' conserva la fuerza del hebreo y resulta natural en español; 'calamidad' o 'desastre' son alternativas interpretativas posibles pero más explicativas.
- source_word: בְּהַקְצִיף
  english_pob_choice: when your fathers provoked me to wrath
  chosen_spanish: cuando sus padres me provocaron a ira
  alternatives_spanish:
  - cuando sus padres me irritaron
  - al provocarme a ira
  - cuando sus antepasados me provocaron a ira
  lexicon: HALOT
  rationale: Se mantiene la relación causal del verbo con un giro bíblico claro en español. 'Provocaron a ira' expresa el carácter intenso del desencadenante sin suavizar la escena.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus/ vuestros padres'. En español, según el contexto, 'sus padres' conserva el referente generacional y la fluidez. 'Antepasados' es una alternativa contextual válida, pero menos literal.
- source_word: וְלֹא נִחָמְתִּי
  english_pob_choice: and I did not relent
  chosen_spanish: y no me retracté
  alternatives_spanish:
  - y no me arrepentí
  - y no cambié de parecer
  - y no desistí
  lexicon: HALOT
  rationale: נחם aquí expresa no ceder/retractarse del juicio anunciado. 'No me retracté' comunica la idea de no revocar la decisión sin introducir el sentido moral de 'arrepentirse' que podría sonar teológicamente desalineado en español.
theological_decisions:
- issue: Lenguaje de juicio en לְהָרַע
  english_pob_reading: to do harm to you
  chosen_spanish_reading: hacerles mal
  alternative_spanish_readings:
  - traerles calamidad
  - hacerles daño
  rationale: El hebreo presenta un daño/jucio infligido por Dios en el marco del pacto, no mal moral. 'Hacerles mal' preserva la dureza del texto sin sugerir injusticia divina; las alternativas aclaran más el sentido de calamidad pero añaden interpretación.
  doctrine_reference: 'Teología de la traducción: juicio divino y lenguaje de acomodación; no suavizar el texto ni introducir una noción de mal moral atribuida a Dios.'
- issue: אֲבֹתֵיכֶם como referencia generacional
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: La lectura inglesa conserva 'fathers' por fidelidad al hebreo. En español, 'padres' mantiene esa literalidad; 'antepasados' evita una posible lectura restringida al padre inmediato, pero borra la forma del original.
  doctrine_reference: 'Política de fidelidad léxica: mantener la forma del hebreo cuando no produce confusión grave.'
- issue: וְלֹא נִחָמְתִּי como antropopatismo
  english_pob_reading: I did not relent
  chosen_spanish_reading: no me retracté
  alternative_spanish_readings:
  - no me arrepentí
  - no cambié de parecer
  rationale: La frase describe el modo humano de hablar del firme propósito divino. 'No me retracté' preserva el sentido de no revocar la sentencia sin cargar la expresión con connotaciones de arrepentimiento moral.
  doctrine_reference: Lenguaje antropopático en la Escritura; evitar que el español sugiera que Dios comete error o pecado al 'arrepentirse' en sentido moral.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. La redacción española conserva la fórmula profética, el nombre divino Yahvé, el título 'de los Ejércitos', la referencia literal a 'sus padres' y el valor de juicio/relentimiento de los verbos, evitando tanto una paráfrasis expansiva como una traducción mecánica.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se usó 'de los Ejércitos' para צְבָאוֹת siguiendo la decisión inglesa de transparencia léxica.
  - '''No me retracté'' se escogió como equivalente natural de נִחָמְתִּי en este contexto judicial; se preservan alternativas en nota.'
  - La puntuación reproduce el tono oracular con dos puntos y cláusula final coordinada.
