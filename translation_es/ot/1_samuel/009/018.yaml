translation:
  language: es
  text: 'Entonces Saúl se acercó a Samuel en medio de la entrada y dijo: «Por favor, dígame dónde está la casa del vidente[a][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vidente» es un título antiguo para uno que después se llamó más comúnmente profeta; el propio relato lo aclara en 1 Samuel 9:9.
    reason: cross_reference
  - marker: b
    text: 'O, más formalmente: «la casa del vidente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: approached
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se llegó
  lexicon: HALOT
  rationale: נגשׁ expresa acercarse o poner-se cerca de alguien; «se acercó» es natural en español moderno y conserva el movimiento interpersonal hacia Samuel.
- source_word: בְּתוֹךְ הַשָּׁעַר
  english_pob_choice: in the midst of the gate
  chosen_spanish: en medio de la puerta
  alternatives_spanish:
  - en medio de la entrada
  - dentro de la puerta
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en el medio del portal/puerta». En español, «puerta» puede sonar más natural que «portal» sin perder la idea del espacio de acceso; «en medio de» preserva la concreción espacial.
- source_word: הַגִּידָה נָּא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dígame
  alternatives_spanish:
  - Por favor, cuénteme
  - Dígame, por favor
  lexicon: HALOT
  rationale: El imperativo de נגד con נָא expresa una petición cortés. «Por favor, dígame» comunica bien la súplica respetuosa en español. Se mantiene el registro formal de trato como forma de cortesía narrativa.
- source_word: אֵי זֶה
  english_pob_choice: where ... is
  chosen_spanish: dónde está
  alternatives_spanish:
  - cuál es
  - en qué lugar está
  lexicon: HALOT
  rationale: La pregunta busca localización; en español la forma idiomática es «dónde está».
- source_word: בֵּית הָרֹאֶה
  english_pob_choice: the seer’s house
  chosen_spanish: la casa del vidente
  alternatives_spanish:
  - la casa del vidente/vidente
  - la casa del que ve
  lexicon: HALOT
  rationale: רֹאֶה se refiere al antiguo título de un profeta, «vidente». Se conserva ese matiz histórico para reflejar el término arcaico del pasaje y la explicación contextual ya presente en la tradición POB.
theological_decisions:
- issue: 'Título profético antiguo: רֹאֶה'
  english_pob_reading: “seer” is an older term for one later more commonly called a prophet; the narrative itself explains this in 1 Samuel 9:9.
  chosen_spanish_reading: «vidente» conserva el título antiguo, con su matiz narrativo previo a la terminología más común de «profeta».
  alternative_spanish_readings:
  - profeta
  - el que ve
  rationale: No se nivela el término a «profeta» porque el pasaje preserva una designación antigua y concreta; «vidente» mantiene la tensión léxica y la referencia histórica del relato.
  doctrine_reference: 1 Samuel 9:9; cf. 1 Samuel 9:18
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y toma como guía la audacia de la revisión inglesa, que prefirió una forma más formal de «in the midst of the gate». En español se optó por «en medio de la puerta», por ser más natural y todavía fiel al valor espacial de בְּתוֹךְ הַשָּׁעַר. El resto conserva la estructura del original sin añadir elementos no requeridos.
  spanish_consistency_notes:
  - Se mantiene «vidente» para רֹאֶה, conforme al uso POB de preservar el título antiguo y no sustituirlo por «profeta» sin necesidad contextual.
  - Se usa trato formal («dígame») por la cortesía implícita del ruego y por coherencia con la petición respetuosa del hebreo.
  - «En medio de la puerta» intenta reproducir la imagen espacial de la frase hebrea sin caer en un calco opaco.
