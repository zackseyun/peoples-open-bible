review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo apoyado por el griego: una subida arenosa/inestable para los pies de un anciano en paralelo con una esposa caracterizada por su lengua frente a un hombre de temperamento suave. Sin embargo, se aparta del rastro auditado del POB en dos puntos de matiz importantes: ''charlatana'' suaviza y desplaza el valor más negativo de אֵשֶׁת לָשׁוֹן / γυνὴ γλωσσώδης que el POB fijó como ''sharp-tongued'', y ''tranquilo'' no refleja tan bien la decisión inglesa documentada de preferir ''gentle'' sobre ''quiet''.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para sonar más preciso y más proverbial. 'Esposa charlatana' suena algo coloquial y enfoca locuacidad más que habla hiriente; 'de lengua áspera' o similar preserva mejor el matiz. 'Hombre tranquilo' es comprensible, pero 'hombre apacible' o 'hombre manso' expresa mejor el contraste de carácter sin sugerir solo silencio o calma circunstancial. El resto de la frase fluye bien.
  glossary_alignment: 'No hay términos de glosario mayor implicados aquí. Sí conviene alinear mejor con las decisiones léxicas auditadas del POB: mantener el contraste wife/man con ''esposa ... hombre'' está bien; pero para אֵשֶׁת לָשׁוֹן debe reflejarse el matiz negativo documentado, y para רַךְ / ἡσύχῳ debe preferirse en español una opción cercana a ''gentle'' más que a ''quiet''.'
  issues:
  - severity: medium
    issue: '''esposa charlatana'' debilita el matiz de habla hiriente'
    rationale: El inglés auditado eligió 'sharp-tongued wife' precisamente para evitar la neutralidad de 'talkative'. 'Charlatana' en español apunta a que habla mucho, no necesariamente a que hiere con la lengua.
  - severity: medium
    issue: '''hombre tranquilo'' se inclina hacia ''quieto/tranquilo'' más que hacia ''gentle'''
    rationale: La nota inglesa reconoce 'quiet' como alternativa, pero fija 'gentle' como lectura principal por el contraste de carácter. En español, 'apacible' reproduce mejor esa decisión que 'tranquilo'.
  - severity: low
    issue: Nota b puede explicitar mejor la alternativa sin introducir frase poco idiomática
    rationale: La nota actual 'mujer dada a la lengua' es entendible, pero puede formularse más naturalmente en español manteniendo la referencia literal y el paralelo griego.
  revised_spanish_text: Como una subida arenosa bajo los pies de un anciano[c][b][a], así es una esposa de lengua áspera para un hombre apacible.
