translation:
  language: es
  text: 'Pues así dice el Señor Yahvé: Por cuanto aplaudiste con las manos y pisoteaste con los pies, y te alegraste con todo el desprecio en tu alma[a] contra la tierra de Israel,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con todo tu desprecio» o «con toda tu malicia en tu alma» contra la tierra de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El título compuesto se conserva en español con la distinción entre אֲדֹנָי y el nombre divino. Se evita el enmascaramiento con mayúsculas y se usa 'Yahvé' conforme a la norma del proyecto para יְהוִה.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce de forma natural la causa de la sentencia sin perder el valor causal del hebreo.
- source_word: מַחְאֲךָ יָד
  english_pob_choice: you clapped your hands
  chosen_spanish: aplaudiste con las manos
  alternatives_spanish:
  - golpeaste las manos
  - daste palmadas
  lexicon: HALOT
  rationale: El gesto físico se expresa de modo idiomático en español. 'Aplaudiste' conserva la acción de golpear la mano contra la otra, en un contexto de burla o regocijo hostil.
- source_word: וְרַקְעֲךָ בְּרָגֶל
  english_pob_choice: and stamped your feet
  chosen_spanish: y golpeaste con los pies
  alternatives_spanish:
  - y pateaste el suelo
  - y estampaste los pies
  lexicon: HALOT
  rationale: Se conserva el gesto corporal de énfasis y desprecio. 'Golpeaste con los pies' es claro y no introduce un plural idiomático innecesario si el español puede sostener el singular colectivo.
- source_word: וַתִּשְׂמַח
  english_pob_choice: and rejoiced
  chosen_spanish: y te alegraste
  alternatives_spanish:
  - y te regocijaste
  - y te gozaste
  lexicon: HALOT
  rationale: Mantiene el matiz de alegría narrativa sin elevar artificialmente el registro.
- source_word: בְּכָל שָׁאטְךָ
  english_pob_choice: with all the contempt
  chosen_spanish: con todo el desprecio
  alternatives_spanish:
  - con todo tu desdén
  - con toda tu burla
  lexicon: HALOT
  rationale: שָׁאט denota desdén, desprecio hostil. 'Desprecio' es el equivalente más directo y natural en español.
- source_word: בְּנֶפֶשׁ
  english_pob_choice: in your soul
  chosen_spanish: de tu alma
  alternatives_spanish:
  - en tu alma
  - con toda tu alma
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse al ser interior. 'De tu alma' enlaza de manera natural con 'desprecio' en español y preserva la profundidad interior del mal sentimiento.
- source_word: אֶל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: against the land of Israel
  chosen_spanish: contra la tierra de Israel
  alternatives_spanish:
  - contra el país de Israel
  - hacia la tierra de Israel
  lexicon: HALOT
  rationale: El valor hostil de אֶל en este contexto se expresa mejor con 'contra'. 'Tierra' traduce bien אַדְמָה sin sonar técnico o arcaizante.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvéh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme a la política del proyecto, se usa 'Yahvé' en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés de auditoría fue revisado sin cambios en la última pasada; se mantiene la lectura óptima equivalente y la decisión doctrinal de usar 'Yahvé' para יְהוִה. No se reportaron cambios aplicados en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Señor Yahvé' para el título compuesto אֲדֹנָי יְהוִה, coherente con la terminología del proyecto.
  - '''Tierra de Israel'' conserva el paralelismo territorial y el valor hostil de la preposición.'
  - La nota al pie preserva las alternativas léxicas relevantes para שָׁאט y para la intensidad interior de la frase.
