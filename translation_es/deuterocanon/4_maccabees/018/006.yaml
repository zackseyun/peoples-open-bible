translation:
  language: es
  text: 'Entonces sí, habiendo salido de Jerusalén, acampó contra los persas. Y la madre de los siete muchachos también le decía estas cosas a cada uno de sus niños:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τότε δὴ
  english_pob_choice: Then indeed
  chosen_spanish: Entonces, en efecto
  alternatives_spanish:
  - Entonces
  - A esa altura, en efecto
  lexicon: LSJ
  rationale: Entonces expresa la secuencia temporal; en efecto conserva el matiz enfático de δὴ sin volver la frase forzada en español.
- source_word: ὑπάρας
  english_pob_choice: having set out
  chosen_spanish: habiendo salido
  alternatives_spanish:
  - habiendo partido
  - habiendo emprendido camino
  lexicon: LSJ
  rationale: El participio antecede a la acción principal y pide una traducción que marque anterioridad. 'Habiendo salido' comunica la partida desde Jerusalén con naturalidad.
- source_word: ἐστρατοπέδευσεν
  english_pob_choice: he encamped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - hizo campamento contra
  - acampó frente a
  lexicon: LSJ
  rationale: El verbo es militar; 'acampó contra' mantiene el sentido hostil y bélico del contexto.
- source_word: ἐπὶ Πέρσας
  english_pob_choice: against the Persians
  chosen_spanish: contra los persas
  alternatives_spanish:
  - hacia los persas
  - frente a los persas
  lexicon: LSJ
  rationale: Con acusativo en contexto militar, ἐπί indica orientación hostil; 'contra' es la forma más clara en español.
- source_word: ἡ μήτηρ τῶν ἑπτὰ παίδων
  english_pob_choice: the mother of the seven boys
  chosen_spanish: la madre de los siete muchachos
  alternatives_spanish:
  - la madre de los siete niños
  - la madre de los siete hijos
  lexicon: LSJ
  rationale: παῖδες puede ser niños, muchachos o hijos. 'Muchachos' preserva el registro natural y la referencia a varones jóvenes, sin imponer 'hijos' donde el griego usa un término más amplio.
- source_word: Ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - estaba diciendo
  - seguía diciéndoles
  lexicon: LSJ
  rationale: El imperfecto sugiere habla en desarrollo o repetida; en español, 'les decía' transmite ese valor aspectual con fluidez.
- source_word: καὶ ταῦτα
  english_pob_choice: these things also
  chosen_spanish: también estas cosas
  alternatives_spanish:
  - estas cosas también
  - y estas cosas
  lexicon: LSJ
  rationale: Conserva el añadido de καί y el contenido demostrativo de ταῦτα sin desordenar el orden natural del español.
- source_word: ἑνὶ ἑκάστῳ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada uno en particular
  - a cada uno de ellos
  lexicon: LSJ
  rationale: La expresión distributiva se resume naturalmente en español con 'a cada uno', manteniendo la individualización del discurso.
- source_word: τοῖς τέκνοις
  english_pob_choice: her children
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus niños
  - de sus descendientes
  lexicon: LSJ
  rationale: τέκνα es más amplio que 'hijos' en sentido estrictamente biológico, pero en este contexto materno y narrativo 'hijos' resulta claro y fiel; el posesivo 'sus' mantiene la relación implícita.
theological_decisions:
- issue: Diferencia entre παῖδες y τέκνα en el mismo versículo
  english_pob_reading: Use 'boys' for παῖδες and 'children' for τέκνοις in the same verse
  chosen_spanish_reading: Usar 'muchachos' para παῖδες y 'hijos' para τέκνοις
  alternative_spanish_readings:
  - usar 'niños' y 'niños'
  - usar 'hijos' y 'hijos'
  rationale: El griego alterna dos términos de parentesco/delimitación distinta. 'Muchachos' refleja παῖδες como varones jóvenes; 'hijos' recoge τέκνα en un marco familiar más preciso y natural en español, sin borrar la variación léxica del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran consenso alto y no requieren correcciones sustantivas; se ha mantenido el valor secuencial del inicio, el matiz militar de ἐστρατοπέδευσεν y la variación lexical entre παῖδες y τέκνα.
  spanish_consistency_notes:
  - Se conservó una sintaxis sobria y pública, apta para lectura eclesial.
  - Se evitó 'Señor' o fórmulas tradicionales no presentes en el texto fuente.
  - La referencia a los persas se mantuvo en minúscula como etnónimo común en español.
  - No se añadieron notas al pie porque no hay variante textual ni ambigüedad decisiva que el texto español requiera marcar.
