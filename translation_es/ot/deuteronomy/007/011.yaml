translation:
  language: es
  text: Por tanto, guardarás el mandamiento y los estatutos y los juicios[a][b] que yo te mando hoy, para hacerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Por tanto» refleja una lectura inferencial posible de la conjunción hebrea; también puede entenderse simplemente como «y» o «entonces».
    reason: lexical_alternative
  - marker: b
    text: «Juicios» puede también verterse «ordenanzas», «reglas» o «decisiones legales»; el hebreo se refiere a determinaciones o sentencias jurídicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: So you shall keep
  chosen_spanish: Así que guardarás
  alternatives_spanish:
  - Y guardarás
  - Entonces guardarás
  - Guardarás
  lexicon: HALOT
  rationale: שׁמר en contexto pactual/legal expresa guardar o observar. «Guardarás» conserva el mandato directo; «Así que» refleja la fuerza inferencial que el inglés POB marcó con «So», sin convertirlo en mera coordinación.
- source_word: הַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  - el comando
  lexicon: HALOT
  rationale: El singular hebreo se mantiene como singular. «Mandamiento» es natural en español bíblico y conserva el registro legal-pactual del término.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  - las disposiciones
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente tradicional y claro para חֻקִּים en material legal, manteniendo la distinción con los otros términos jurídicos.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las sentencias
  - las ordenanzas
  - las decisiones
  lexicon: HALOT
  rationale: «Juicios» conserva la fuerza formal de מִשְׁפָּטִים como decisiones o determinaciones legales. Aunque puede sonar menos corriente que «ordenanzas», mantiene mejor la cercanía léxica con el hebreo y la distinción interna de la triada.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te ordeno hoy
  alternatives_spanish:
  - que yo te mando hoy
  - que hoy te estoy ordenando
  - que yo hoy te ordeno
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inmediata; «ordeno» comunica el mandato presente de manera natural en español. «Hoy» conserva el énfasis deuteronómico del momento del pacto.
- source_word: לַעֲשׂוֹתָם
  english_pob_choice: to do them
  chosen_spanish: para ponerlos por obra
  alternatives_spanish:
  - para hacerlos
  - para cumplirlos
  - para ejecutarlos
  lexicon: HALOT
  rationale: «Ponerlos por obra» comunica obediencia concreta con un español bíblico claro y no mecánico. Aunque el hebreo dice literalmente «hacerlos», la expresión española preserva la fuerza práctica del mandato sin perder naturalidad.
theological_decisions:
- issue: Mantener la triada legal sin colapsarla
  english_pob_reading: the commandment and the statutes and the judgments
  chosen_spanish_reading: el mandamiento y los estatutos y los juicios
  alternative_spanish_readings:
  - el mandamiento, los estatutos y las ordenanzas
  - el mandato, los decretos y las reglas
  rationale: La acumulación de tres términos legales es retórica y covenantal; conviene conservar la distinción en español en vez de resumirla en una sola categoría. «Juicios» puede sonar menos idiomático, pero preserva mejor la textura legal del hebreo.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Decidir el matiz inferencial de la conjunción inicial
  english_pob_reading: So you shall keep
  chosen_spanish_reading: Así que guardarás
  alternative_spanish_readings:
  - Y guardarás
  - Entonces guardarás
  - Guardarás
  rationale: El waw inicial puede ser simple coordinación o inferencia desde el contexto. «Así que» deja visible esa posibilidad sin imponerla como única lectura.
  doctrine_reference: Translation philosophy §2 (Inferential conjunctions rendered when warranted by context)
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del audit trail inglés y corrige la validación anterior anclando explícitamente las notas [a] y [b] en el texto. Se conserva la estructura legal de tres términos, la fuerza inmediata de «hoy» y el valor obediencial de «para ponerlos por obra».
  spanish_consistency_notes:
  - Se mantiene «mandamiento» en singular para מִצְוָה y «estatutos»/«juicios» en plural para los otros dos términos.
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evita «SEÑOR» y también se evita suavizar «juicios» en una equivalencia más genérica que borraría la distinción léxica.
  - La puntuación evita comas innecesarias para una cadencia más natural en español formal.
