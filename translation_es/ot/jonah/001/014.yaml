base_translation:
  language: en
  yaml_path: translation/ot/jonah/001/014.yaml
  text: Then they cried out to Yahweh and said[a], “Please, Yahweh, do not let us perish on account of this man's life, and do not put innocent blood on us, for you, Yahweh[b], have done as you pleased.”
  footnotes:
