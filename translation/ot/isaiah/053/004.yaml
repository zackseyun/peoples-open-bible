id: ISA.53.4
reference: Isaiah 53:4
source:
  edition: WLC
  text: אָכֵ֤ן חֳלָיֵ֨/נוּ֙ ה֣וּא נָשָׂ֔א וּ/מַכְאֹבֵ֖י/נוּ סְבָלָ֑/ם וַ/אֲנַ֣חְנוּ חֲשַׁבְנֻ֔/הוּ נָג֛וּעַ מֻכֵּ֥ה אֱלֹהִ֖ים וּ/מְעֻנֶּֽה׃
translation:
  text: Surely he has borne our sicknesses and carried our pains[a]; yet we considered him stricken, struck by God[b], and afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''our griefs'' and ''our sorrows.'' The Hebrew more literally refers to sicknesses and pains.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''smitten by God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Surely then
  lexicon: HALOT
  rationale: Marks emphatic assertion or correction of prior perception; 'Surely' preserves the force and fits the contrast with the following clause.
- source_word: חֳלָיֵנוּ
  chosen: our sicknesses
  alternatives:
  - our griefs
  - our diseases
  lexicon: HALOT
  rationale: The noun normally denotes sickness/illness rather than emotional grief. Although 'griefs' is traditional in English, the Hebrew sense is more concretely physical, and the parallel with 'pains' supports that rendering.
- source_word: נָשָׂא
  chosen: has borne
  alternatives:
  - carried
  - took up
  lexicon: HALOT
  rationale: In this context the verb conveys taking up and bearing a burden. 'Has borne' preserves both the burden-bearing sense and the solemn register of the servant song.
- source_word: וּמַכְאֹבֵינוּ
  chosen: our pains
  alternatives:
  - our sorrows
  - our sufferings
  lexicon: HALOT
  rationale: The noun refers to pain, often physical pain. 'Pains' is the most direct lexical equivalent; 'sorrows' is traditional but less precise to the Hebrew.
- source_word: סְבָלָם
  chosen: carried
  alternatives:
  - bore
  - endured
  lexicon: HALOT
  rationale: This verb emphasizes carrying a load. Using 'carried' alongside 'has borne' reflects the paired but distinct burden-bearing verbs in Hebrew.
- source_word: וַאֲנַחְנוּ
  chosen: yet we
  alternatives:
  - but we
  - and we
  lexicon: HALOT
  rationale: The conjunction plus pronoun introduces a contrast between what he actually did and how he was regarded. 'Yet we' brings out that adversative force naturally in English.
- source_word: חֲשַׁבְנֻהוּ
  chosen: considered him
  alternatives:
  - esteemed him
  - thought him
  lexicon: HALOT
  rationale: The verb means to reckon, account, or consider. 'Considered him' is clear modern English; the traditional 'esteemed' is possible but less natural today.
- source_word: נָגוּעַ
  chosen: stricken
  alternatives:
  - plagued
  - afflicted
  lexicon: HALOT
  rationale: The passive participle denotes one struck with a blow or plague. 'Stricken' preserves the ambiguity of suffering under a severe stroke without over-specifying the nature of the affliction.
- source_word: מֻכֵּה אֱלֹהִים
  chosen: struck down by God
  alternatives:
  - smitten by God
  - struck by God
  lexicon: HALOT
  rationale: The phrase indicates being struck by God. 'Struck down by God' communicates divine agency in idiomatic modern English; 'smitten by God' is traditional and worth preserving in a footnote.
- source_word: וּמְעֻנֶּה
  chosen: and afflicted
  alternatives:
  - and humbled
  - and oppressed
  lexicon: HALOT
  rationale: The participle denotes being afflicted or humbled through suffering. 'Afflicted' best fits the immediate context of perceived divine punishment.
