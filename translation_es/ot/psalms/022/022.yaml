translation:
  language: es
  text: Sálvame de la boca del león[b], y de los cuernos de los toros salvajes[a]—me has respondido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bueyes salvajes» o «uros». El hebreo alude a un bovino salvaje poderoso.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final puede entenderse como una declaración súbita de oración contestada: «me has respondido», marcando un giro de la súplica a la confianza.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: Save me
  chosen_spanish: Sálvame
  alternatives_spanish:
  - Líbrame
  - Rescátame
  lexicon: HALOT
  rationale: El piel/hiphil imperativo con sufijo de 1.ª persona expresa una petición directa de salvación o liberación. «Sálvame» es la equivalencia española más natural y fiel, conservando urgencia y amplitud semántica.
- source_word: מִפִּי
  english_pob_choice: from the mouth of
  chosen_spanish: de la boca de
  alternatives_spanish:
  - de las fauces de
  - de la boca del
  lexicon: HALOT
  rationale: La imagen hebrea usa literalmente «boca». En español, «de la boca de» preserva la metáfora sin forzar un giro más zoológico que el texto no exige.
- source_word: אַרְיֵה
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - un león
  lexicon: HALOT
  rationale: El sustantivo aparece en singular y funciona como imagen poética de un depredador concreto. En español, el artículo definido mantiene la vividez idiomática sin perder el valor genérico de la figura.
- source_word: וּמִקַּרְנֵי
  english_pob_choice: and from the horns of
  chosen_spanish: y de los cuernos de
  alternatives_spanish:
  - y aun de los cuernos de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «cuernos», que en el poema intensifica el peligro. El hebreo coordina una segunda amenaza; el español puede reproducirla con naturalidad.
- source_word: רֵמִים
  english_pob_choice: the wild oxen
  chosen_spanish: los bueyes salvajes
  alternatives_spanish:
  - los toros salvajes
  - los bóvidos salvajes
  - los uros
  lexicon: HALOT
  rationale: רֵמִים designa un bovino salvaje poderoso. «Bueyes salvajes» mantiene la referencia general y la fuerza imagística en un español claro; «uros» sería más preciso zoológicamente, pero menos accesible para lectura eclesial.
- source_word: עֲנִיתָנִי
  english_pob_choice: you have answered me
  chosen_spanish: me has respondido
  alternatives_spanish:
  - me has contestado
  - me has oído
  lexicon: HALOT
  rationale: El perfecto 2ms con sufijo de 1cs permite leer una declaración súbita de respuesta recibida. «Me has respondido» conserva ese giro de confianza sin convertir la cláusula en una nueva petición.
theological_decisions:
- issue: Si la última cláusula debe leerse como continuación de la súplica o como declaración de oración contestada
  english_pob_reading: 'A declaration: ''you have answered me'''
  chosen_spanish_reading: 'Una declaración: «me has respondido»'
  alternative_spanish_readings:
  - 'Una súplica continuada: «sálvame... y respóndeme»'
  rationale: La forma verbal hebrea es perfecta, no imperativa. La traducción española conserva el cambio abrupto de tono, que marca un giro literario y devocional dentro del salmo, en vez de suavizarlo en una sola línea de petición.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo masorético y el audit trail inglés. No se detectaron revisiones textuales que alteren el sentido básico; la única tensión relevante es la lectura de la cláusula final como declaración súbita de respuesta, y esa tensión se conserva en español.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparece en el texto.
  - 'Se conserva el paralelo poético con dos imágenes concretas de amenaza: león y cuernos de bovino salvaje.'
  - Se evitó «SEÑOR» y se prefirió un español transparente acorde con el término hebreo real.
  - La puntuación con raya reproduce el quiebre de tono del hebreo y del audit trail inglés.
