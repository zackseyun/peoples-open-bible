review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: «No abandones» corresponde correctamente a אַל תִּטֹּשׁ; «los sabios» a חֲכָמִים; y «ocúpate» transmite adecuadamente el sentido exhortativo de הִתְרַפֵּשׂ. Sin embargo, falta la nota de variante textual griega preservada en el POB inglés, y la preposición en «de sus enigmas» debilita la relación instrumental/asociativa de וּבְחִידֹתֵיהֶם, mejor expresada con «en» o «con».'
  spanish_quality_summary: 'El español es claro y digno, pero «el discurso de los sabios» suena algo rígido; aun así sigue siendo aceptable por fidelidad al registro sapiencial. El ajuste principal es mejorar la naturalidad y precisión de la segunda cola: «dedícate a sus enigmas» o «ocúpate en sus enigmas» suena más idiomático que «ocúpate de sus enigmas» en este contexto de estudio/reflexión. También debe añadirse la nota sobre la tradición griega divergente.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «sabios» y «enigmas» respetan bien las decisiones léxicas documentadas. La revisión propuesta mantiene esos términos y solo corrige la sintaxis/preposición y restaura la nota de variante textual omitida.
  issues:
  - severity: medium
    issue: Falta la nota de variante textual griega presente en el POB inglés.
    rationale: El audit trail inglés conserva una variante textual importante de la LXX para este versículo. Omitirla pierde información textual significativa que el proyecto decidió preservar.
  - severity: medium
    issue: «ocúpate de sus enigmas» no refleja tan bien la construcción hebrea como una formulación de implicación en/para sus enigmas.
    rationale: וּבְחִידֹתֵיהֶם הִתְרַפֵּשׂ comunica involucramiento activo con los dichos difíciles. En español, «dedícate a sus enigmas» expresa mejor esa exhortación que «ocúpate de», que puede sonar más laxo o administrativo.
  revised_spanish_text: No abandones el discurso de los sabios[a][b], y dedícate a sus enigmas.
  revised_footnotes:
  - marker: a
    text: O «aplícate a sus enigmas». El hebreo usa aquí un verbo poco común; el sentido es una implicación activa en los dichos difíciles de los sabios.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo dice en cambio: «No avives las brasas de un pecador, no sea que te quemes en el fuego de su llama». Esto refleja una tradición textual sustancialmente diferente del hebreo conservado.'
    reason: textual_variant
