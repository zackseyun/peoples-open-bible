translation:
  language: es
  text: Alabaré a Yahvé[a] toda mi vida; cantaré alabanzas a mi Dios mientras aún viva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘en mi vida’ y ‘en mi continuancia/existencia’; la traducción vierte el modismo como duración: ‘toda mi vida’ / ‘mientras aún viva’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהַלְלָה
  english_pob_choice: I will praise
  chosen_spanish: Alabaré
  alternatives_spanish:
  - Seguiré alabando
  - Quiero alabar
  lexicon: HALOT
  rationale: La forma cohortativa/imperfecta expresa resolución o intención futura; en español, el futuro simple comunica bien ese compromiso voluntario sin forzar un matiz exhortativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como ‘Yahvé’, conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: בְּחַיָּי
  english_pob_choice: all my life
  chosen_spanish: mientras viva
  alternatives_spanish:
  - en mi vida
  - a lo largo de mi vida
  - durante toda mi vida
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente ‘en mi vida’, pero aquí funciona idiomáticamente como duración de la vida del hablante. ‘Mientras viva’ comunica esa duración de modo natural y breve; se conserva la nota de alternativa en una nota al pie.
- source_word: אֲזַמְּרָה
  english_pob_choice: I will sing praises
  chosen_spanish: cantaré salmos
  alternatives_spanish:
  - cantaré alabanzas
  - haré música de alabanza
  lexicon: HALOT
  rationale: El verbo זמר se usa frecuentemente para canto musical de alabanza. ‘Cantaré salmos’ preserva el componente musical y el paralelo poético con ‘alabaré’.
- source_word: לֵאלֹהַי
  english_pob_choice: to my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - para mi Dios
  lexicon: HALOT
  rationale: Con verbos de canto/alabanza, la preposición ל se expresa de forma natural en español como ‘a’.
- source_word: בְּעוֹדִי
  english_pob_choice: as long as I live
  chosen_spanish: mientras tenga ser
  alternatives_spanish:
  - mientras exista
  - mientras aún viva
  - mientras tenga vida
  lexicon: HALOT
  rationale: עוֹד con sufijo posesivo expresa continuidad de existencia. ‘Mientras tenga ser’ mantiene con más cercanía la fuerza semántica de ‘continuar existiendo’, aunque suene algo más formal; la primera cola ya dio una solución más idiomática, por lo que aquí se conserva la equivalencia semántica sin perder el paralelo poético.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio doctrinal y al audit trail en inglés, se conserva el nombre personal de Dios como ‘Yahvé’, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje quedó en alta concordancia con el audit trail inglés: se mantuvo la resolución futura del hablante, el nombre divino YHWH como Yahvé, y la pareja poética de duración de vida/existencia. No se registraron revisiones previas aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando ‘SEÑOR’ para el Tetragrámaton.
  - ‘mientras viva’ y ‘mientras tenga ser’ forman un paralelismo que preserva la variación del hebreo entre vida y existencia continuada.
  - ‘cantaré salmos’ se usó para sostener el matiz musical de זמר sin caer en una simple repetición de ‘cantar’.
