  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario y el paralelo griego: יִרְאֵי יְהֹוָה = «los que temen a Yahvé», לֹא יַמְרוּ = «no se rebelarán», בִּדְרָכָיו = «contra sus caminos», וְאוֹהֲבָיו = «los que lo aman», יִצְרוּ = «guardarán», אָרְחוֹתָיו = «sus senderos». La variación poética entre «caminos» y «senderos» está bien preservada, y la nota refleja correctamente la lectura griega alternativa.'
  spanish_quality_summary: 'El español es claro, natural y digno. Sin embargo, la nota al pie introduce «Qumrán/Cairo», mientras que la evidencia y el rastro de auditoría hablan del testigo hebreo de Cairo Geniza, no de «Qumrán». Esa expansión es inexacta y debe corregirse. También conviene alinear la redacción de la nota con la documentación inglesa: «el hebreo de la Geniza de El Cairo» o similar.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה, «temen» para יִרְאֵי, y mantenimiento de la fuerza de «rebelarse» frente a la opción griega más suave «desobedecer». No hay conflicto con términos doctrinales principales. La única desviación relevante está en la nota textual, no en el texto bíblico principal.'
  issues:
  - severity: medium
    issue: La nota al pie menciona «Qumrán/Cairo»
    rationale: El expediente fuente identifica como primario el testigo hebreo de la Cairo Geniza; añadir «Qumrán» no está respaldado aquí y puede confundir sobre la base textual concreta.
  revised_spanish_text: Los que temen a Yahvé no se rebelarán contra sus caminos[a], y los que lo aman guardarán sus senderos.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «no desobedecerán sus palabras» en vez de «no se rebelarán contra sus caminos». El testigo hebreo de la Geniza de El Cairo es primario aquí, pero el griego confirma el mismo sentido general de obediencia fiel.'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota para eliminar la referencia inexacta a Qumrán y ajustarla a la evidencia documentada del testigo hebreo primario.
