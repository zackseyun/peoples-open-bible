translation:
  language: es
  text: 'Entonces David dijo a Abisai y a todos sus siervos[a]: «Miren, mi hijo, el que salió de mis entrañas está buscando mi vida; ¡cuánto más ahora este benjamita! Déjenlo; y que maldiga, porque Yahvé le ha dicho que lo haga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque Yahvé le ha dicho». El hebreo no expresa explícitamente el contenido de lo dicho; el contexto sugiere la maldición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Fíjense
  lexicon: HALOT
  rationale: La partícula introduce énfasis y llama la atención sobre la comparación de David. «Mira» conserva esa fuerza deíctica en un español natural y directo.
- source_word: בְנִי אֲשֶׁר יָצָא מִמֵּעַי
  english_pob_choice: my son, who came out from my own body
  chosen_spanish: mi hijo, el que salió de mis entrañas
  alternatives_spanish:
  - mi hijo, el que salió de mi cuerpo
  - mi hijo, el que salió de mis partes íntimas
  lexicon: HALOT
  rationale: «Mis entrañas» reproduce el hebreo corporal e idiomático con dignidad y naturalidad en español. Evita una paráfrasis demasiado explicativa y mantiene la fuerza afectiva del contraste.
- source_word: מְבַקֵּשׁ אֶת נַפְשִׁי
  english_pob_choice: is seeking my life
  chosen_spanish: está buscando mi vida
  alternatives_spanish:
  - busca mi vida
  - quiere quitarme la vida
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para amenaza mortal. «Está buscando mi vida» conserva la imagen verbal y el sentido, sin convertirla en una explicación más amplia.
- source_word: וְאַף כִּי עַתָּה
  english_pob_choice: how much more now
  chosen_spanish: ¡cuánto más ahora
  alternatives_spanish:
  - y más aún ahora
  - y con mayor razón ahora
  lexicon: HALOT
  rationale: La construcción refuerza un argumento de menor a mayor. «¡Cuánto más ahora!» refleja bien la fuerza retórica comparativa del hebreo.
- source_word: בֶּן הַיְמִינִי
  english_pob_choice: this Benjaminite
  chosen_spanish: este benjamita
  alternatives_spanish:
  - este hombre de Benjamín
  - este hijo de Benjamín
  lexicon: HALOT
  rationale: «Benjamita» es el equivalente conciso y claro para miembro de la tribu de Benjamín, conservando el contraste con el propio hijo de David.
- source_word: הַנִּחוּ לוֹ
  english_pob_choice: Leave him alone
  chosen_spanish: Déjenlo
  alternatives_spanish:
  - Déjenlo solo
  - Déjenlo en paz
  lexicon: HALOT
  rationale: El imperativo plural pide no intervenir. «Déjenlo» es breve, natural y suficientemente fuerte en contexto; el complemento «solo» sería posible, pero no es necesario.
- source_word: וִיקַלֵּל
  english_pob_choice: and let him curse
  chosen_spanish: y que maldiga
  alternatives_spanish:
  - y maldiga
  - y déjelo maldecir
  lexicon: HALOT
  rationale: La forma jussiva expresa permiso para continuar la acción. «Y que maldiga» reproduce bien el valor permisivo y el paralelo con el imperativo anterior.
- source_word: כִּי אָמַר לוֹ יְהוָה
  english_pob_choice: for Yahweh has told him to
  chosen_spanish: porque Yahvé le ha dicho que lo haga
  alternatives_spanish:
  - porque Yahvé le ha dicho
  - porque Yahvé se lo ha mandado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «porque Yahvé le ha dicho». En español, para que el contenido implícito no quede oscuro, se explicita con «que lo haga», sin introducir una nueva idea ajena al contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según la norma del proyecto, en vez de sustituirlo por un título o una convención litúrgica.
theological_decisions:
- issue: Si la frase final debe suavizarse como permiso/providencia o conservar la atribución directa a Yahvé
  english_pob_reading: The LORD has told him to, preserving David's own stated attribution without softening it.
  chosen_spanish_reading: Yahvé le ha dicho que lo haga
  alternative_spanish_readings:
  - Yahvé se lo ha permitido
  - 'Yahvé le ha dicho: «Maldice a David»'
  rationale: 'Se preserva la tensión teológica del texto: David atribuye la acción a Yahvé de manera directa. No se reemplaza por una explicación interpretativa más explícita, aunque el contexto deja claro que la maldición es la acción en vista.'
  doctrine_reference: Preservar la tensión teológica; no resolverla indebidamente; YHWH -> Yahvé
- issue: Cómo reflejar el matiz corporal de «mis entrañas» sin perder legibilidad
  english_pob_reading: my own body
  chosen_spanish_reading: mis entrañas
  alternative_spanish_readings:
  - mi cuerpo
  - mi propio cuerpo
  rationale: El hebreo es vívido y corporal. «Mis entrañas» conserva ese registro idiomático y afectivo, y es comprensible en español bíblico contemporáneo.
  doctrine_reference: Fidelidad semántica y retención del valor idiomático corporal
translation_notes:
  revision_awareness: 'Coincide con el análisis auditado de la POB en inglés: se mantiene la fuerza deíctica de הִנֵּה, el idiomático corporal de בְנִי אֲשֶׁר יָצָא מִמֵּעַי, el valor de permiso en la secuencia imperativo-jusiva, y la tensión teológica de כִּי אָמַר לוֹ יְהוָה sin resolverla más allá de lo que el contexto permite. No se requieren revisiones adicionales respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se conserva el paralelismo verbal entre «Déjenlo» y «que maldiga».
  - «Benjamita» mantiene la referencia tribal de forma natural en español.
  - La nota de pie de página marca la alternativa literal sin desplazar el sentido principal del texto.
