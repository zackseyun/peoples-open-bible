translation:
  language: es
  text: Pero Dios les dispara una flecha[a]; de repente quedan heridos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Pero Dios les disparó una flecha; de repente sus heridas aparecieron».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרֵם
  english_pob_choice: shoots an arrow at them
  chosen_spanish: les lanza una flecha
  alternatives_spanish:
  - les dispara una flecha
  - les arroja una flecha
  lexicon: HALOT / uso poético de ירה en hifil
  rationale: El verbo hifil de ירה expresa acción de lanzar o disparar un proyectil. En español, «lanza» conserva bien la imagen y evita una construcción pesada. «Les» mantiene el complemento pronominal del sufijo plural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים funciona con sentido singular y se refiere al Dios de Israel. «Dios» es la equivalencia directa y natural en español.
- source_word: חֵץ
  english_pob_choice: an arrow
  chosen_spanish: una flecha
  alternatives_spanish:
  - un dardo
  - una saeta
  lexicon: HALOT
  rationale: El sustantivo básico significa «flecha». «Flecha» es claro y transparente en español contemporáneo.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - de pronto
  lexicon: HALOT
  rationale: El adverbio señala abruptamente la acción. «De repente» comunica con naturalidad el valor de inmediatez e inesperado que tiene el hebreo.
- source_word: הָיוּ מַכּוֹתָם
  english_pob_choice: they are wounded
  chosen_spanish: quedan heridos
  alternatives_spanish:
  - se vuelven heridos
  - son heridos
  lexicon: HALOT
  rationale: 'La combinación del perfecto de היה con מַכָּה tiene un valor resultativo: el efecto es que los atacados terminan heridos. «Quedan heridos» preserva ese resultado sin forzar una paráfrasis demasiado interpretativa. Se mantiene la tensión entre la forma más literal «sus heridas fueron» y la lectura resultativa que siguió la POB inglesa.'
theological_decisions:
- issue: Agencia divina en juicio poético
  english_pob_reading: Render the verse straightforwardly as God actively striking the wicked with an arrow.
  chosen_spanish_reading: Dios aparece como sujeto agente que hiere a los impíos con una flecha.
  alternative_spanish_readings:
  - Dios permite que caigan heridos
  - Dios los castiga providencialmente
  rationale: El hebreo presenta a Dios como quien actúa directamente. La versión española conserva esa agencia y la imagen bélica sin suavizarla ni convertirla en mera reversión providencial.
  doctrine_reference: Salmos 64:8; filosofía de traducción del POB
translation_notes:
  revision_awareness: La POB inglesa revisó la colocación de la frase preposicional para acercarse más al hebreo sin perder naturalidad. En español, «les lanza una flecha» mantiene esa cercanía sintáctica y la fluidez poética, mientras que la nota conserva una alternativa más formal y más literal del resultado.
  spanish_consistency_notes:
  - Se usa «Dios» como equivalente de אֱלֹהִים por tratarse del singular divino.
  - «Flecha» se mantiene como término básico y no se introduce vocabulario eclesiástico ajeno al texto.
  - «Quedan heridos» refleja el resultado del hebreo sin convertirlo en explicación teológica.
