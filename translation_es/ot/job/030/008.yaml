translation:
  language: es
  text: Hijos de necios, sí, hijos sin nombre[b], fueron azotados[a][c] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron golpeados/expulsados de la tierra». El verbo hebreo es raro y puede implicar tanto azote violento como expulsión; el contexto admite ambas posibilidades.
    reason: lexical_alternative
  - marker: b
    text: «Sin nombre» es un hebraísmo que expresa falta de honra, prestigio o reconocimiento social.
    reason: cultural_note
  - marker: c
    text: O «fueron echados». La frase final puede leerse como expulsión del territorio además de golpe o azote.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos de varones
  - descendientes de
  lexicon: HALOT
  rationale: El constructo plural de בן se refleja naturalmente como «hijos de». En español suena más idiomático que un calco rígido y conserva la relación de pertenencia/clase del hebreo.
- source_word: נָבָל
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fools
  - insensatos
  - viles
  lexicon: HALOT
  rationale: נָבָל no describe solo falta de inteligencia, sino torpeza moral y social. «Necios» comunica bien esa carga en español bíblico moderno sin volverlo excesivamente arcaico.
- source_word: גַּם
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - incluso
  - verdaderamente
  lexicon: HALOT
  rationale: Aquí גַּם intensifica y añade la segunda apposición. «Sí» funciona como reforzador discursivo breve en español y evita perder la fuerza enfática del hebreo.
- source_word: בְּנֵי בְלִי שֵׁם
  english_pob_choice: sons without a name
  chosen_spanish: hijos sin nombre
  alternatives_spanish:
  - hijos de sin nombre
  - hijos innombrados
  - hijos de ningún nombre
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y alude a falta de honor o prestigio. «Hijos sin nombre» conserva la imagen y la transparencia del giro, manteniendo visible la tensión idiomática.
- source_word: נִכְּאוּ
  english_pob_choice: were scourged
  chosen_spanish: fueron azotados
  alternatives_spanish:
  - fueron golpeados
  - fueron apaleados
  - fueron expulsados
  lexicon: HALOT
  rationale: El verbo es raro y puede implicar golpe/azote o expulsión. Dado el ajuste más reciente del POB inglés hacia la idea de azote, «fueron azotados» preserva la fuerza verbal sin forzar una lectura meramente expulsiva.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra/país
  - fuera de la tierra
  - del país
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país/territorio». En este contexto, la salida o expulsión del ámbito habitado puede expresarse con «de la tierra»; es una opción cercana al hebreo y suficientemente natural en español.
theological_decisions:
- issue: Sentido social de "hijos sin nombre"
  english_pob_reading: '''Sons without a name'' is a Hebrew idiom for people of no standing or honor.'
  chosen_spanish_reading: «Hijos sin nombre» se entiende como un hebraísmo de deshonra y falta de prestigio social, no como ausencia literal de nombre propio.
  alternative_spanish_readings:
  - hijos innombrados
  - hijos sin reputación
  - hijos de ningún renombre
  rationale: La frase debe conservar el valor idiomático social del hebreo. Traducirla de modo demasiado explicativo borraría la concisión y la tensión del original.
  doctrine_reference: Uso bíblico del honor/deshonor en la poesía sapiencial; cf. el valor social de «nombre» en la Escritura.
- issue: Valor de נִכְּאוּ entre golpe y expulsión
  english_pob_reading: The Hebrew verb is rare, and the exact nuance may be either violent striking or expulsion; the context favors the sense of being driven out.
  chosen_spanish_reading: «Fueron azotados» mantiene abierta la posibilidad de violencia corporal; la frase «de la tierra» deja espacio para un matiz de expulsión sin imponerlo como único sentido.
  alternative_spanish_readings:
  - fueron expulsados
  - fueron golpeados
  - fueron echados
  rationale: El hebreo permite una tensión semántica que no conviene eliminar. La opción elegida respeta la revisión inglesa más reciente y deja ver que el resultado fue una violencia que los apartó del territorio.
  doctrine_reference: Principio de preservación de ambigüedad legítima en poesía hebrea; cf. métodos de traducción semántica conservadora.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de una lectura de expulsión («were driven out») a una de violencia/azote («were scourged») para reflejar mejor נִכְּאוּ. La draft española sigue esa decisión reciente con «fueron azotados», pero conserva en nota la posibilidad contextual de expulsión, ya que la preposición final y la rareza del verbo mantienen la tensión interpretativa.
  spanish_consistency_notes:
  - Se emplea «hijos» para reflejar el paralelo hebreo בְּנֵי y mantener la forma del constructo.
  - Se evita «SEÑOR» o terminología no presente en el verso.
  - Se mantiene un registro sobrio y poético, con puntuación que refleja el paralelismo y la apposición del hebreo.
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
