translation:
  language: es
  text: Aunque parezca ridículo, demuestro no solo que la razón[a] ha obtenido dominio sobre los dolores, sino también que gobierna sobre los placeres y no cede ante ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Razón» traduce λογισμός como término programático de 4 Macabeos: la facultad racional que gobierna las pasiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ καὶ γελοῖον
  english_pob_choice: Even if it is ridiculous
  chosen_spanish: Aunque parezca ridículo
  alternatives_spanish:
  - Aunque sea risible
  - Aun si parece absurdo
  lexicon: LSJ
  rationale: El griego expresa una concesión elíptica; en español, «aunque parezca ridículo» conserva el matiz concesivo sin sonar demasiado áspero o coloquial. «Ridículo» sigue de cerca la opción inglesa elegida y mantiene la modestia retórica del hablante.
- source_word: ἀλγηδόνων
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - penas
  - sufrimientos
  - tormentos
  lexicon: LSJ
  rationale: «Dolores» es el equivalente más directo y natural en español para el plural de experiencias dolorosas. Se evita «tormentos» porque intensifica más allá del valor básico del sustantivo, aunque el contexto sea de martirio.
- source_word: ἐπιδείκνυμι
  english_pob_choice: I demonstrate
  chosen_spanish: demuestro
  alternatives_spanish:
  - muestro
  - pruebo
  lexicon: LSJ
  rationale: El verbo implica exhibir o mostrar de manera pública y persuasiva; «demuestro» comunica bien el acto retórico de poner algo en evidencia. Mantiene la fuerza argumentativa del griego y del audit trail inglés.
- source_word: κεκρατηκέναι τὸν λογισμόν
  english_pob_choice: reason has gained mastery
  chosen_spanish: la razón ha obtenido dominio
  alternatives_spanish:
  - la razón ha prevalecido
  - la razón ha dominado
  lexicon: LSJ
  rationale: La construcción perfecta expresa un estado ya logrado; «ha obtenido dominio» conserva la idea de una victoria asentada. «Razón» es la forma más idiomática y fiel para λογισμός en 4 Macabeos, donde funciona como término programático de la facultad racional.
- source_word: τὸν λογισμόν
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - la mente racional
  lexicon: LSJ
  rationale: En este libro λογισμός no es mero cálculo, sino la razón que gobierna las pasiones. «La razón» conserva la claridad conceptual sin introducir tecnicismos filosóficos ajenos al registro bíblico-literario del pasaje.
- source_word: τῶν ἡδονῶν κρατεῖν
  english_pob_choice: it rules over pleasures
  chosen_spanish: gobierna sobre los placeres
  alternatives_spanish:
  - domina los placeres
  - los controla
  lexicon: LSJ
  rationale: Se mantiene la idea de dominio de κρατέω con un verbo natural en español. «Gobierna sobre» reproduce el sentido de autoridad sobre algo y evita una repetición excesiva de «domina» en la frase.
- source_word: μηδὲ αὐταῖς ὑπείκειν
  english_pob_choice: and does not yield to them
  chosen_spanish: y no cede ante ellos
  alternatives_spanish:
  - y no se somete a ellos
  - y no les da lugar
  lexicon: LSJ
  rationale: ὑπείκω significa ceder, aflojar o dar paso. «No cede ante ellos» es una expresión natural en español que preserva la imagen de resistencia moral frente a los placeres.
theological_decisions:
- issue: Renderización de λογισμός en un contexto filosófico-martirial
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el juicio racional
  - la mente racional
  rationale: La obra articula el triunfo de la razón piadosa sobre las pasiones. «La razón» transmite el núcleo conceptual sin desplazar el sentido hacia una terminología técnica posterior ni debilitar el argumento ascético del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Intensidad de ἀλγηδόνων en el contexto de tortura
  english_pob_reading: pains
  chosen_spanish_reading: dolores
  alternative_spanish_readings:
  - sufrimientos
  - tormentos
  rationale: El contexto inmediato es severo, pero el lexema base denota dolores. «Dolores» respeta la amplitud semántica del original y evita sobrecargar el texto con una intensidad no exigida por la palabra misma.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
