review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: «estas cosas» por Ταῦτα, perfecto resultativo «he hablado», destinatario plural explícito y cláusula de propósito «para que no…». La elección principal «tropiecen» preserva adecuadamente σκανδαλισθῆτε según la revisión inglesa final y mantiene la tensión semántica del verbo.'
  spanish_quality_summary: 'El español principal es claro, natural y digno. La única reparación necesaria está en la nota: «se hagan tropezar» suena poco natural y además no representa bien la pasiva/causativa implícita del griego; conviene «sean hechos tropezar» o similar. También puede pulirse «caigan» hacia «caigan en el tropiezo» o mantener una alternativa más cercana al campo semántico. El texto base no necesita cambio.'
  glossary_alignment: No hay términos del glosario mayor en juego. «Tropiecen» concuerda con la decisión POB de volver de «fall away» a una opción más léxicamente directa. La nota debe conservar alternativas significativas sin introducir una formulación española torpe o engañosa.
  issues:
  - severity: medium
    issue: La nota usa «se hagan tropezar»
    rationale: Esa formulación no es idiomática en español y puede sugerir reflexividad ('que ellos mismos se hagan tropezar') en vez de la idea léxica de ser hechos tropezar o tropezar.
  - severity: low
    issue: La nota mezcla alternativas con distinto grado de precisión sin afinarlas
    rationale: «Caigan» sola es más interpretativa y menos anclada en la imagen de σκανδαλίζω; conviene una formulación que preserve mejor el campo semántico y la explicación del tropiezo espiritual.
  revised_spanish_text: He hablado estas cosas a ustedes para que no tropiecen[a].
  revised_footnotes:
  - marker: a
    text: O «se escandalicen», «sean hechos tropezar» o «caigan». El verbo griego puede indicar ser derribados en la fe o apartarse por tropiezo.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y al audit trail inglés. Solo se corrige la nota para usar un español natural y para reflejar mejor las alternativas semánticas de σκανδαλισθῆτε sin introducir una construcción reflexiva impropia.
