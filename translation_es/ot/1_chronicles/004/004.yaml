translation:
  language: es
  text: Penuel[a][b], padre de Gedor, y Ezer, padre de Hushah; estos fueron los hijos de Hur, el primogénito de Efrata, padre de Belén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En este contexto genealógico, 'padre de' también puede significar 'fundador de' o 'antepasado de', especialmente cuando se asocia a poblaciones o clanes.
    reason: lexical_alternative
  - marker: b
    text: '''Penuel'' aparece escrito ''Peniel'' en otros pasajes; aquí se conserva la forma que refleja la grafía hebrea de este versículo.'
    reason: lexical_alternative
