translation:
  language: es
  text: Cuando los hombres de Israel que estaban al otro lado del valle[a], y los que estaban al otro lado del Jordán[a], vieron que los hombres de Israel habían huido y que Saúl y sus hijos habían muerto, abandonaron las ciudades y huyeron; y los filisteos vinieron y habitaron en ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'más allá del valle' / 'más allá del Jordán'. La expresión hebrea indica el lado opuesto de un punto de referencia.
    reason: alternative_reading
  - marker: b
    text: O 'se establecieron en ellas'. El verbo hebreo puede indicar habitar o asentarse; el contexto permite ambas ideas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - advirtieron
  - percibieron
  lexicon: HALOT
  rationale: ראיה se traduce de manera directa como ver. 'Vieron' conserva la concreción narrativa sin añadir una inferencia como 'advirtieron'.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - la gente de Israel
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'hombres de Israel'. En este contexto militar, 'los hombres de Israel' preserva mejor la forma y el tono del original.
- source_word: בְּעֵבֶר הָעֵמֶק
  english_pob_choice: on the other side of the valley
  chosen_spanish: del otro lado del valle
  alternatives_spanish:
  - al otro lado del valle
  - más allá del valle
  lexicon: HALOT
  rationale: עֵבֶר expresa el lado opuesto o la región al otro lado de un punto de referencia. 'Del otro lado del valle' comunica bien el sentido espacial en español.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: on the other side of the Jordan
  chosen_spanish: del otro lado del Jordán
  alternatives_spanish:
  - al otro lado del Jordán
  - más allá del Jordán
  lexicon: HALOT
  rationale: Se mantiene la repetición del hebreo y el mismo valor espacial de עֵבֶר.
- source_word: כִּי נָסוּ
  english_pob_choice: that ... had fled
  chosen_spanish: que ... habían huido
  alternatives_spanish:
  - que ... huyeron
  - que ... estaban huyendo
  lexicon: HALOT
  rationale: El contenido de lo visto se expresa con pluscuamperfecto para reflejar la secuencia narrativa desde el punto de vista de los observadores, como en el POB inglés.
- source_word: מֵתוּ
  english_pob_choice: were dead
  chosen_spanish: habían muerto
  alternatives_spanish:
  - estaban muertos
  - habían fallecido
  lexicon: HALOT
  rationale: מות comunica el estado de haber muerto, sin especificar el modo. 'Habían muerto' preserva ese valor resultativo y la relación temporal.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y los hijos de él
  - y sus vástagos
  lexicon: HALOT
  rationale: La referencia es a los hijos de Saúl; 'sus hijos' es natural en español y mantiene la coordinación simple del hebreo.
- source_word: וַיַּעַזְבוּ אֶת־הֶעָרִים
  english_pob_choice: they abandoned the cities
  chosen_spanish: abandonaron las ciudades
  alternatives_spanish:
  - dejaron las ciudades
  - desampararon las ciudades
  lexicon: HALOT
  rationale: עזב aquí implica dejar atrás con pérdida de control del territorio. 'Abandonaron' conserva mejor esa fuerza que 'dejaron'.
- source_word: וַיָּנֻסוּ
  english_pob_choice: and fled
  chosen_spanish: y huyeron
  alternatives_spanish:
  - y escaparon
  - y corrieron
  lexicon: HALOT
  rationale: נוס se traduce de forma directa como huir. 'Huyeron' mantiene el tono narrativo y la urgencia del contexto bélico.
- source_word: וַיָּבֹאוּ פְלִשְׁתִּים
  english_pob_choice: and the Philistines came
  chosen_spanish: y los filisteos vinieron
  alternatives_spanish:
  - y los filisteos llegaron
  - y los filisteos entraron
  lexicon: HALOT
  rationale: בוא es amplio; 'vinieron' conserva la sencillez del hebreo. El contexto siguiente aclara que su llegada culmina en ocupación.
- source_word: וַיֵּשְׁבוּ בָּהֶן
  english_pob_choice: and lived in them
  chosen_spanish: y habitaron en ellas
  alternatives_spanish:
  - y vivieron en ellas
  - y se establecieron en ellas
  lexicon: HALOT
  rationale: ישב puede significar habitar o establecerse. 'Habitaron' es fiel, sobrio y apto para indicar ocupación de las ciudades sin introducir más especificación que el hebreo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de WLC y concuerda con el audit trail inglés: conserva la repetición de ''del otro lado de'', el pluscuamperfecto para el contenido percibido, y la ambigüedad de ישב mediante una nota alternativa. No se registran revisiones aplicadas en el paquete fuente, y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se usa 'Jordán' con mayúscula por el nombre geográfico.
  - Se mantiene 'los hombres de Israel' para reflejar la forma constructa hebrea.
  - '''Habitaron'' se eligió para ישב, con nota alternativa sobre ''se establecieron''.'
  - Se conserva la secuencia narrativa con 'vieron' / 'habían huido' / 'habían muerto' / 'abandonaron' / 'huyeron' / 'vinieron' / 'habitaron'.
