translation:
  language: es
  text: Ella le hace bien[a], y no mal, todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le retribuye con bien y no con mal». El verbo hebreo también puede expresar trato o recompensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּמָלַתְהוּ
  english_pob_choice: does him
  chosen_spanish: le hace bien
  alternatives_spanish:
  - lo trata con bien
  - le retribuye con bien
  - le corresponde con bien
  lexicon: HALOT
  rationale: El verbo גמל puede significar tratar con alguien, recompensar o corresponder. En este contexto doméstico, la combinación con 'bien' y 'mal' pide en español una expresión natural que conserve la relación personal sin forzar una idea técnica de paga; 'le hace bien' reproduce el sentido de trato beneficioso de modo idiomático.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - lo bueno
  - beneficio
  - bondad
  lexicon: HALOT
  rationale: Aquí טוֹב funciona como sustantivo en contraste con רָע. En español, 'bien' conserva mejor la oposición directa con 'mal' y suena natural en la construcción verbal 'hacer bien'.
- source_word: וְלֹא רָע
  english_pob_choice: and not harm
  chosen_spanish: y no mal
  alternatives_spanish:
  - y no daño
  - y no maldad
  - y no perjuicio
  lexicon: HALOT
  rationale: רָע puede abarcar mal moral o daño/daño sufrido. Dado el paralelismo con 'bien' y el contexto relacional, 'mal' mantiene la antítesis hebrea sin limitarla demasiado a una sola noción; 'daño' sería posible, pero atenúa la simetría con el primer cola.
- source_word: כֹּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de
  - en todos los días de
  lexicon: HALOT
  rationale: La expresión temporal hebrea se conserva de forma directa en español con una cadencia natural y plenamente inteligible.
- source_word: חַיֶּיהָ
  english_pob_choice: her life
  chosen_spanish: su vida
  alternatives_spanish:
  - su existencia
  - su vida entera
  - su tiempo de vida
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente plural, el sentido idiomático es el período de vida de una persona. 'Su vida' es la correspondencia más natural y fiel en español.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre el texto fuente y la revisión auditada; no se requieren cambios de fondo respecto del sentido básico. La nota conserva la alternativa léxica documentada en el audit trail inglés para גמל.
  spanish_consistency_notes:
  - Se mantuvo un registro neutral y bíblico en español, evitando una paráfrasis expansiva.
  - '''Bien'' y ''mal'' conservan la antítesis breve del hebreo y encajan con el paralelo poético.'
  - La nota al pie está anclada en el texto mediante [a], conforme al requisito de validación.
