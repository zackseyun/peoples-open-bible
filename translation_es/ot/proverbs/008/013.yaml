  text: יִֽרְאַ֣ת יְהוָה֮ שְֽׂנֹ֫את רָ֥ע גֵּ֘אָ֤ה וְ/גָא֨וֹן וְ/דֶ֣רֶךְ רָ֭ע וּ/פִ֨י תַהְפֻּכ֬וֹת שָׂנֵֽאתִי׀׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/008/013.yaml
  text: The fear of Yahweh is hatred of evil[a]; pride and arrogance and the evil way and the mouth of perversions I hate.
  footnotes:
