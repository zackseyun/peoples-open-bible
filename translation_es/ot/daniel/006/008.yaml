translation:
  language: es
  text: 'Todos los altos funcionarios del reino, los prefectos y los sátrapas, los consejeros y los gobernadores, se pusieron de acuerdo[b] para establecer un estatuto real[c] y para hacer vinculante una prohibición: que cualquiera que hiciera una petición a cualquier dios o a cualquier hombre[a] durante treinta días, excepto a ti, oh rey, será arrojado al foso de los leones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La preposición aramea es literalmente 'de/desde' ('de cualquier dios o hombre'), pero en español con 'hacer una petición' se expresa naturalmente con 'a'.
    reason: lexical_alternative
  - marker: b
    text: También puede significar 'consultaron juntos' o 'tomaron consejo juntos'. La versión española conserva la idea de deliberación conjunta y acuerdo resultante.
    reason: lexical_alternative
  - marker: c
    text: O 'decreto real'. Los términos legales arameos aquí se superponen en el campo de decreto, estatuto y prohibición vinculante.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִתְיָעַטוּ
  english_pob_choice: have agreed together
  chosen_spanish: se pusieron de acuerdo
  alternatives_spanish:
  - consultaron juntos
  - tomaron consejo juntos
  lexicon: HALOT
  rationale: El verbo arameo puede expresar deliberación conjunta y también consenso resultante. En español, 'se pusieron de acuerdo' comunica ambas ideas de manera natural sin reducir el matiz de concertación política.
- source_word: סָרְכֵי מַלְכוּתָא
  english_pob_choice: the high officials of the kingdom
  chosen_spanish: los altos funcionarios del reino
  alternatives_spanish:
  - los administradores del reino
  - los príncipes del reino
  lexicon: HALOT
  rationale: Es un término amplio para autoridades superiores de la corte. 'Altos funcionarios' preserva el alcance colectivo y se ajusta al listado de cargos que sigue.
- source_word: סִגְנַיָּא
  english_pob_choice: the prefects
  chosen_spanish: los prefectos
  alternatives_spanish:
  - los delegados
  - los oficiales
  lexicon: HALOT
  rationale: Es un título administrativo preciso; 'prefectos' mantiene el rango oficial sin volverlo demasiado genérico.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: los sátrapas
  alternatives_spanish:
  - los gobernadores de provincia
  lexicon: HALOT
  rationale: Se trata del título persa tradicionalmente conocido en español como 'sátrapas', que conserva bien el trasfondo histórico.
- source_word: הַדָּבְרַיָּא
  english_pob_choice: the counselors
  chosen_spanish: los consejeros
  alternatives_spanish:
  - los asesores
  lexicon: HALOT
  rationale: Refiere a asesores reales; 'consejeros' es claro y fiel al papel consultivo.
- source_word: פַחֲוָתָא
  english_pob_choice: governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los gobernadores provinciales
  - los oficiales
  lexicon: HALOT
  rationale: Es un cargo de gobierno; 'gobernadores' conserva la función administrativa de forma natural en español.
- source_word: לְקַיָּמָה קְיָם מַלְכָּא
  english_pob_choice: to establish a royal statute
  chosen_spanish: para establecer un decreto real
  alternatives_spanish:
  - para promulgar un decreto real
  - para fijar un estatuto real
  lexicon: HALOT
  rationale: El arameo combina un verbo de dar firmeza con un sustantivo legal. 'Decreto real' recoge el campo semántico jurídico y resulta más transparente para el lector español que 'estatuto'.
- source_word: וּלְתַקָּפָה אֱסָר
  english_pob_choice: and to enforce an injunction
  chosen_spanish: y para imponer una prohibición
  alternatives_spanish:
  - y para hacer vinculante una prohibición
  - y para reforzar un interdicto
  lexicon: HALOT
  rationale: La frase expresa hacer legalmente vinculante una restricción. 'Imponer una prohibición' comunica la fuerza normativa con claridad, sin añadir tecnicismos innecesarios.
- source_word: יִבְעֵה בָעוּ
  english_pob_choice: makes a petition
  chosen_spanish: hiciera una petición
  alternatives_spanish:
  - presentara una súplica
  - hiciera una solicitud
  lexicon: HALOT
  rationale: El giro idiomático se refiere a una petición formal. 'Hiciera una petición' conserva el matiz jurídico-administrativo y evita limitarlo a plegaria religiosa.
- source_word: מִן כָּל אֱלָהּ וֶאֱנָשׁ
  english_pob_choice: to any god or man
  chosen_spanish: a cualquier dios o a hombre
  alternatives_spanish:
  - a cualquier dios o a cualquier hombre
  - de cualquier dios o hombre
  lexicon: HALOT
  rationale: Aunque la preposición aramea literalmente es 'de/desde', en español la construcción natural con 'petición' exige destino indirecto ('a'). Mantengo el paralelo 'dios o hombre' y el contraste universal del hebreo/arameo.
- source_word: עַד יוֹמִין תְּלָתִין
  english_pob_choice: for thirty days
  chosen_spanish: durante treinta días
  alternatives_spanish:
  - por treinta días
  - hasta treinta días
  lexicon: HALOT
  rationale: La expresión marca duración de la prohibición; 'durante treinta días' es la forma más idiomática y precisa en español.
- source_word: לָהֵן מִנָּךְ
  english_pob_choice: except to you
  chosen_spanish: excepto a ti
  alternatives_spanish:
  - salvo a ti
  - a no ser a ti
  lexicon: HALOT
  rationale: Expresa la excepción exclusiva al decreto. 'Excepto a ti' es breve, claro y mantiene el contraste del original.
- source_word: יִתְרְמֵא
  english_pob_choice: shall be thrown
  chosen_spanish: sería echado
  alternatives_spanish:
  - será arrojado
  - sería arrojado
  lexicon: HALOT
  rationale: El contexto legal formula la consecuencia como sanción establecida. 'Sería echado' reproduce el valor de castigo decretado y suena natural en español bíblico contemporáneo.
- source_word: לְגֹב אַרְיָוָתָא
  english_pob_choice: into the lions’ den
  chosen_spanish: al foso de los leones
  alternatives_spanish:
  - al cubil de los leones
  - al hoyo de los leones
  lexicon: HALOT
  rationale: '''Foso'' comunica bien la idea de un pozo/recinto de castigo y es idiomático en español; conserva el carácter de ejecución por medio de fieras.'
theological_decisions:
- issue: 'Naturaleza de la prohibición: petición religiosa y política a la vez'
  english_pob_reading: to any god or man
  chosen_spanish_reading: a cualquier dios o a hombre
  alternative_spanish_readings:
  - a cualquier dios o a cualquier hombre
  - de cualquier dios o hombre
  rationale: El texto presenta una prohibición que abarca tanto la esfera cultual como la humana. La formulación española mantiene esa amplitud sin suavizarla hacia solo 'orar', porque el arameo habla de 'hacer una petición' a cualquier dios o persona.
  doctrine_reference: Daniel 6:8; nota lexical del POB en inglés sobre מִן כָּל אֱלָהּ וֶאֱנָשׁ
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios pendientes y el cotejo externo marcó alta concordancia. La redacción española sigue la decisión inglesa de mantener la lista administrativa, traducir el lenguaje legal con un registro claro y conservar la amplitud de ''any god or man'' sin reinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'sátrapas' por ser el título histórico ya asentado en español y coherente con el registro de cargos persas.
  - '''Decreto real'' e ''imponer una prohibición'' reflejan el campo jurídico de קְיָם / אֱסָר sin forzar equivalencias tradicionales más oscuras.'
  - '''Foso de los leones'' sigue el valor de castigo del original y la convención bíblica en español.'
