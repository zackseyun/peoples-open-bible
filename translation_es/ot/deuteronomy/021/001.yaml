    issue: «un muerto» no expresa claramente el sentido de חָלָל
    rationale: חָלָל en este contexto legal denota una persona muerta violentamente, presumiblemente víctima de homicidio. «Un muerto» puede referirse a cualquier cadáver y debilita el contexto jurídico del pasaje.
  - severity: medium
    issue: La nota al pie «un hombre muerto» tampoco preserva bien el matiz léxico
    rationale: La alternativa debería conservar tanto el masculino singular como la idea de muerte violenta; «un hombre muerto» sigue siendo demasiado general.
  - severity: low
    issue: «para que la poses» resulta menos natural que «para poseerla»
    rationale: Ambas son fieles, pero «para poseerla» suena más natural en español general y mantiene bien el infinitivo final hebreo.
  - severity: low
    issue: «caído» es menos idiomático que «tendido» en esta escena forense
    rationale: El hebreo literalmente permite «caído», pero en español «tendido en el campo» describe mejor el estado del cuerpo sin sugerir el acto de caer.
  revised_spanish_text: Si se encuentra un hombre asesinado[a] en la tierra que Yahvé tu Dios te da para poseerla, tendido en el campo abierto, y no se sabe quién lo hirió,
