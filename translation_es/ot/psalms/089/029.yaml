revisions:
- from: Para siempre guardaré para él mi amor leal[a], y mi pacto le permanecerá fiel.
  to: Para siempre guardaré para él mi amor leal,[a] y mi alianza le será fiel.
  rationale: Se reemplaza «pacto» por «alianza» para una expresión bíblica más natural en español y se corrige la segunda cláusula a «le será fiel», que preserva el valor relacional de נֶאֱמֶנֶת sin la torpeza idiomática de «le permanecerá fiel». La nota conserva las alternativas de permanencia y seguridad documentadas en el expediente inglés.
