revisions:
- from: La salvación de Yahvé está sobre la casa de Israel para alegría eterna[a][b].
  to: La salvación de Yahvé está sobre la casa de Israel para dominio propio eterno[a][b].
  rationale: Se reemplaza 'alegría eterna' por 'dominio propio eterno' para ajustarse al griego transmitido (σωφροσύνην) y al estado final del audit trail inglés. Se elimina la nota textual que defendía una corrección a 'alegría' porque ya no representa la decisión vigente. Se conserva la nota sobre la fuerza optativa/bendicional de la cláusula sin verbo y se añade una nota léxica con alternativas españolas documentadas por el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:19:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue fielmente la evidencia fuente/audit trail vigente. El griego provisto dice σωφροσύνην ('dominio propio/mesura/cordura'), y la última revisión auditada en inglés restauró precisamente 'self-control' frente a una corrección previa a 'gladness'. Por tanto, traducir 'alegría eterna' contradice tanto la fuente entregada como el estado final del expediente inglés. El resto de la cláusula se conserva razonablemente bien.
  spanish_quality_summary: El español es legible y digno, pero 'está sobre la casa de Israel' suena algo calcado; aun así es aceptable y cercano al original. El problema principal es semántico, no estilístico. Además, la nota textual b introduce una corrección contra el texto base que el expediente ya no sostiene, por lo que debe eliminarse. Conviene añadir una nota léxica por la gama semántica de σωφροσύνην.
  glossary_alignment: 'Buena alineación en ''Yahvé'', ''salvación'' y ''casa de Israel''. Mala alineación en σωφροσύνην: el proyecto inglés final eligió ''self-control'', por lo que en español debe reflejarse como ''dominio propio'' o equivalente contextual, no ''alegría''.'
  issues:
  - severity: high
    issue: Mistraducción de σωφροσύνην como 'alegría'.
    rationale: La fuente griega proporcionada lee σωφροσύνην, y la revisión final del audit trail en inglés volvió de 'gladness' a 'self-control'. 'Alegría' invierte el sentido léxico documentado.
  - severity: high
    issue: Nota textual b preserva una corrección descartada por el expediente final.
    rationale: La nota afirma que la lectura esperada es 'alegría' en lugar de la lección transmitida, pero el estado final auditado no adopta esa corrección. Mantenerla desinforma al lector.
  - severity: medium
    issue: Falta una nota léxica para las alternativas de σωφροσύνην conservadas en el inglés POB.
    rationale: El inglés documenta alternativas como 'prudence', 'sound-mindedness' y 'sobriety'. En español conviene reflejar opciones como 'mesura', 'cordura' o 'sobriedad' para preservar el razonamiento léxico.
  revised_spanish_text: La salvación de Yahvé está sobre la casa de Israel para dominio propio eterno[a][b].
  revised_footnotes:
  - marker: a
    text: 'O: «La salvación de Yahvé sea sobre la casa de Israel», tomando la cláusula sin verbo con fuerza de bendición.'
    reason: alternative_reading
  - marker: b
    text: 'O: «mesura», «cordura» o «sobriedad» por «dominio propio».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'alegría eterna' por 'dominio propio eterno' para ajustarse al griego transmitido (σωφροσύνην) y al estado final del audit trail inglés. Se elimina la nota textual que defendía una corrección a 'alegría' porque ya no representa la decisión vigente. Se conserva la nota sobre la fuerza optativa/bendicional de la cláusula sin verbo y se añade una nota léxica con alternativas españolas documentadas por el expediente inglés.
