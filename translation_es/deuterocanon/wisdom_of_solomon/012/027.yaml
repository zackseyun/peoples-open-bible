translation:
  language: es
  text: Porque, por las mismas cosas por las que ellos mismos padecían y se indignaban —las que pensaban que eran dioses—, por esas mismas, mientras eran castigados, vieron y reconocieron como el Dios verdadero[a] al que antes se habían negado a conocer. Por tanto, también el fin definitivo de la condena vino sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conocieron verdaderamente al Dios al que antes se habían negado a conocer». El griego puede construirse con ἀληθῆ como adverbio («verdaderamente») más que como adjetivo («verdadero»).'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφʼ οἷς
  english_pob_choice: by the very things through which
  chosen_spanish: en las mismas cosas por las cuales
  alternatives_spanish:
  - por las mismas cosas por las que
  - a causa de las cosas por las cuales
  - en aquello mismo por lo cual
  lexicon: LSJ
  rationale: La preposición ἐπί con relativo aquí expresa la esfera o instrumento del padecimiento; en español, "en las mismas cosas por las cuales" conserva el enlace retórico con lo que sigue y mantiene la repetición enfática.
- source_word: πάσχοντες
  english_pob_choice: suffered
  chosen_spanish: padecían
  alternatives_spanish:
  - sufrían
  - experimentaban aflicción
  lexicon: LSJ
  rationale: '"Padecían" comunica sufrimiento real sin sobreespecificar la clase de mal, y encaja bien con el contexto de juicio.'
- source_word: ἠγανάκτουν
  english_pob_choice: were indignant
  chosen_spanish: se indignaban
  alternatives_spanish:
  - se irritaban
  - se resentían
  - se enojaban
  lexicon: LSJ
  rationale: El verbo expresa molestia fuerte o resentimiento; "se indignaban" preserva ese tono moral-emocional en un español natural y digno.
- source_word: ἐδόκουν θεούς
  english_pob_choice: they thought to be gods
  chosen_spanish: pensaban que eran dioses
  alternatives_spanish:
  - los consideraban dioses
  - suponían que eran dioses
  lexicon: LSJ
  rationale: La construcción transmite una estimación subjetiva e irónica sobre la idolatría; "pensaban que eran dioses" conserva esa fuerza sin perder claridad.
- source_word: ἐν αὐτοῖς κολαζόμενοι
  english_pob_choice: by these, while being punished
  chosen_spanish: por esas mismas, mientras eran castigados
  alternatives_spanish:
  - en ellas, mientras eran castigados
  - por medio de ellas, mientras sufrían castigo
  - siendo castigados en ellas
  lexicon: LSJ
  rationale: La frase probablemente alude al castigo mediante las mismas cosas asociadas con su error; "por esas mismas" mantiene el valor instrumental y el paralelismo con la primera cláusula.
- source_word: ἰδόντες
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - habiendo visto
  - cuando vieron
  lexicon: LSJ
  rationale: Se vierte como verbo finito para una lectura fluida en español, conservando la progresión experiencial del texto.
- source_word: ὧν πάλαι ἠρνοῦντο εἰδέναι θεὸν
  english_pob_choice: the one whom they had formerly refused to know
  chosen_spanish: al que antes se habían negado a conocer
  alternatives_spanish:
  - al Dios que antes habían negado conocer
  - al que anteriormente habían rehusado conocer como Dios
  lexicon: LSJ
  rationale: La construcción griega combina temporalidad (πάλαι) y rechazo voluntario (ἠρνοῦντο); "se habían negado a conocer" conserva ambos matices sin forzar la sintaxis.
- source_word: ἐπέγνωσαν ἀληθῆ
  english_pob_choice: recognized as the true God
  chosen_spanish: reconocieron como el Dios verdadero
  alternatives_spanish:
  - conocieron verdaderamente al Dios
  - reconocieron verdaderamente a Dios
  lexicon: LSJ
  rationale: El griego puede entenderse adjetivalmente o adverbialmente; la opción principal refleja la lectura del POB inglés y mantiene la contraposición con los falsos dioses.
- source_word: τὸ τέρμα τῆς καταδίκης
  english_pob_choice: the final end of condemnation
  chosen_spanish: el fin definitivo de la condena
  alternatives_spanish:
  - el final de la condena
  - el término de la condenación
  - el desenlace de la condena
  lexicon: LSJ
  rationale: '"τέρμα" puede ser final, límite u desenlace; "fin definitivo" conserva la idea climática de cierre judicial sin volverlo demasiado técnico.'
- source_word: ἐπʼ αὐτοὺς ἐπῆλθεν
  english_pob_choice: came upon them
  chosen_spanish: vino sobre ellos
  alternatives_spanish:
  - recayó sobre ellos
  - les sobrevino
  - cayó sobre ellos
  lexicon: LSJ
  rationale: '"Vino sobre ellos" es una forma natural en español para la llegada de juicio o condena, y conserva la imagen de irrupción del castigo.'
theological_decisions:
- issue: Lectura de ἐπέγνωσαν ἀληθῆ respecto de θεὸν
  english_pob_reading: They recognized as the true God the one whom they had formerly refused to know.
  chosen_spanish_reading: reconocieron como el Dios verdadero al que antes se habían negado a conocer
  alternative_spanish_readings:
  - conocieron verdaderamente al Dios al que antes se habían negado a conocer
  - reconocieron verdaderamente a Dios, al que antes habían negado conocer
  rationale: El griego admite que ἀληθῆ funcione adjetivalmente con θεόν o adverbialmente con ἐπέγνωσαν. Se conserva la lectura adjetival en el texto principal porque el contexto inmediato contrasta al Dios verdadero con los dioses falsos.
  doctrine_reference: Preservar la ambigüedad documentada sin resolverla de forma excesiva; cf. nota de alternativa lectora.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada más reciente, pero vuelve al griego para reflejar con naturalidad en español la repetición de ἐφʼ οἷς / ἐπὶ τούτοις / ἐν αὐτοῖς y para preservar la ambigüedad de ἐπέγνωσαν ἀληθῆ mediante nota.
  spanish_consistency_notes:
  - Se usa «Dios verdadero» para la lectura adjetival, en paralelo con el contraste implícito entre dioses falsos y el Dios real.
  - Se mantiene «condena» para καταδίκη, evitando un giro más técnico como «sentencia» que estrecharía el alcance del pasaje.
  - «Padecían», «se indignaban» y «eran castigados» conservan el ritmo de participios y verbos del griego sin sonar forzados en español.
