review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: וַיֹּאמֶר אֵלַי = «me dijo», בֶּן אָדָם = «Hijo de hombre», עֲמֹד עַל רַגְלֶיךָ = «ponte de pie», וַאֲדַבֵּר אֹתָךְ = «te hablaré». Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el POB inglés: la alternancia relevante no es entre «te hablaré» y «hablarte», sino entre «te hablaré» y «hablaré contigo».'
  spanish_quality_summary: El español es claro, natural y digno. «Y me dijo» y «ponte de pie» suenan idiomáticos y fieles. «Hijo de hombre» es una formulación algo marcada en español, pero aquí está justificada por la recurrencia literaria de Ezequiel y por la decisión teológica documentada. El único problema real es la redacción de la nota, que actualmente repite prácticamente el mismo sentido en una de sus opciones y no explica con precisión la ambigüedad.
  glossary_alignment: 'El borrador concuerda con la terminología del proyecto: mantiene «Hijo de hombre» para בֶּן אָדָם y no introduce desviaciones teológicas ni léxicas indebidas. No hay términos del glosario mayor en conflicto. La revisión requerida es solo en la nota textual/lexical.'
  issues:
  - severity: medium
    issue: La nota al pie no reproduce correctamente la alternativa léxica documentada para אֹתָךְ con דבר.
    rationale: 'El POB inglés registra la alternativa «to you / with you». La nota española dice «hablarte» o «hablar contigo», pero «hablarte» no es una alternativa semántica distinta de «te hablaré»; solo cambia la forma verbal. Debe explicarse la opción real: «te hablaré» o «hablaré contigo».'
  revised_spanish_text: 'Y me dijo[a]: «Hijo de hombre, ponte de pie y te hablaré».'
  revised_footnotes:
  - marker: a
    text: O «hablaré contigo». Con este verbo, el hebreo puede entenderse como «hablarte» o «hablar contigo».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota al pie para reflejar con precisión la alternativa léxica documentada en el POB inglés y en el hebreo.
