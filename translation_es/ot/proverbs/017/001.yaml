  to: Mejor es un trozo de pan seco con paz que una casa llena de banquetes sacrificiales[a] con discordia.
  rationale: Se ajusta זִבְחֵי a «banquetes sacrificiales» para preservar la decisión léxica auditada y la imagen de abundancia festiva del proverbio, manteniendo en nota la alternativa «sacrificios». También se sustituye «pleito» por «discordia» para un registro sapiencial más natural y ampliamente legible en español.
