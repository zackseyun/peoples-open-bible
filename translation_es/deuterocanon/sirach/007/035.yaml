translation:
  language: es
  text: No tardes[a] con los que lloran, y duélete con los que están de duelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «No vaciles en visitar al enfermo, porque por tales cosas serás amado». Es una lectura sustancialmente diferente del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּתְאַחֵר
  english_pob_choice: Do not delay
  chosen_spanish: No te retrases
  alternatives_spanish:
  - No demores
  - No te tardes
  - No tardes
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de demorarse o quedarse atrás; en español, «no te retrases» comunica bien la prohibición y conserva el matiz de urgencia sin sonar arcaico.
- source_word: מִבּוֹכִים
  english_pob_choice: with those who weep
  chosen_spanish: con los que lloran
  alternatives_spanish:
  - entre los que lloran
  - con los que están llorando
  - con los que se lamentan
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede sugerir separación o procedencia, el paralelismo exige solidaridad con personas en llanto. «Con los que lloran» mantiene esa cercanía y evita invertir el sentido.
- source_word: אֲבֵלִים
  english_pob_choice: those who mourn
  chosen_spanish: los que están de duelo
  alternatives_spanish:
  - los dolientes
  - los que lloran
  - los que se lamentan
  lexicon: HALOT
  rationale: El sustantivo designa a personas en duelo. «Los que están de duelo» es claro en español y conserva el campo semántico del luto sin caer en un tecnicismo eclesiástico.
- source_word: תִּתְאַבָּל
  english_pob_choice: mourn
  chosen_spanish: haz duelo
  alternatives_spanish:
  - mueras con ellos en duelo
  - llora con ellos
  - lamenta
  lexicon: HALOT
  rationale: El hitpael apunta a entrar en duelo con otros. «Haz duelo» conserva el valor verbal y el vínculo léxico con «de duelo», mientras que «mourn» en inglés se tradujo de forma más idiomática.
theological_decisions:
- issue: Base textual hebrea frente al testimonio griego distinto
  english_pob_reading: The main text follows the extant Hebrew; the Greek witness is preserved in a footnote as a substantially different reading.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega se preserva en una nota como variante sustancial.
  alternative_spanish_readings:
  - Seguir la lectura griega en el texto principal
  - fusionar ambas lecturas en una sola paráfrasis
  rationale: La política de POB para Sirácida da primacía al hebreo donde existe. Aquí el griego no es una simple variante lexical, sino una formulación diferente, por lo que debe quedar honestamente documentada sin desplazar el testimonio hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo donde se conserva; usar el paralelo griego como testimonio real y señalar la incertidumbre de manera transparente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta que el repaso más reciente no introdujo cambios y que la revisión cruzada señaló cuestiones mayores; por eso se mantiene con claridad la prioridad del hebreo y se documenta la variante griega en nota.
  spanish_consistency_notes:
  - Se mantuvo «duelo» para reflejar el campo semántico de אֲבֵלִים / תִּתְאַבָּל.
  - Se evitó «SEÑOR» u otra terminología no presente en este versículo.
  - La nota al pie marca explícitamente la lectura griega alternativa para preservar la transparencia textual.
