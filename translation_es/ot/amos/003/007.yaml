  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la construcción exceptiva לֹא ... כִּי אִם está bien captada, גָּלָה se vierte fielmente como ''revela'', y סוֹד queda adecuadamente amplio como ''secreto''. También preserva correctamente la relación entre ''sus siervos'' y ''los profetas''.'
  spanish_quality_summary: El español es claro y digno, pero 'Porque nada hace el Señor Yahvé, sino que...' suena algo forzado y menos natural que una formulación con 'no hace nada ... sin antes'. Además, la coma antes de 'los profetas' puede sugerir un matiz explicativo innecesario; el hebreo simplemente dice 'sus siervos los profetas'.
  glossary_alignment: La decisión 'Yahvé' para YHWH está alineada con la norma del proyecto. 'Siervos' es una excepción contextual razonable frente al valor por defecto 'esclavos', y está bien sustentada por el contexto profético. 'Su secreto' concuerda con la revisión auditada del inglés y con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: La construcción española 'Porque nada hace ... sino que revela' suena poco idiomática en este contexto.
    rationale: Aunque reproduce la excepción hebrea, en español bíblico-natural resulta más fluido y preciso 'no hace nada sin antes revelar' o 'no hace nada a menos que revele'. Esto mantiene el sentido proverbial sin rigidez sintáctica.
  - severity: low
    issue: La coma en 'sus siervos, los profetas' puede introducir una aposición explicativa más marcada de lo necesario.
    rationale: El hebreo une directamente 'sus siervos' y 'los profetas'. En español, sin coma se conserva mejor la relación restrictiva/especificativa y se evita una pausa innecesaria.
  - severity: low
    issue: La nota [a] es innecesariamente metalingüística para el texto principal.
    rationale: El texto ya dice 'Yahvé'; la nota explica una política de traducción más que una ambigüedad del versículo. No hace falta conservarla si no aclara el sentido del pasaje.
  revised_spanish_text: Porque el Señor Yahvé no hace nada sin antes revelar su secreto[a] a sus siervos los profetas.
  revised_footnotes:
