review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la sintaxis principal del griego: ἐν τῷ μνημονεύειν se entiende bien como temporal («Cuando…»), αὐτὸν como sujeto lógico del infinitivo («él»), y σωθήσεται como futuro pasivo de σῴζω. También preserva adecuadamente el peso teológico de «el nombre de…». Sin embargo, la nota está anclada de forma imprecisa: la alternativa «será librado» corresponde específicamente a σωθήσεται, no a toda la oración, por lo que el marcador debe ir junto al verbo relevante.'
  spanish_quality_summary: 'El español es claro y legible, pero «será salvado» suena algo menos natural y digno que «será salvo» en registro bíblico eclesial. Además, el pronombre explícito «él» es gramaticalmente posible, pero en español no hace falta para expresar el sujeto y recarga levemente la frase. Una redacción más natural y fiel es: «Cuando recuerde el nombre de Yahvé, será salvo[a].»'
  glossary_alignment: Buen ajuste al glosario del proyecto al usar «Yahvé» en vez de «Señor» como convención de máscara. No hay conflicto con Mesías/Cristo ni otros términos clave. La decisión sobre σωθήσεται conviene alinearla con el inglés POB mediante «será salvo» y mantener la alternativa «será librado» en nota.
  issues:
  - severity: medium
    issue: El marcador de nota está colocado al final de toda la oración en vez de anclarse al verbo «será salvado».
    rationale: La nota lexical alternativa («será librado») explica σωθήσεται, no la cláusula completa. Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: low
    issue: «será salvado» es correcto pero menos idiomático que «será salvo» en español bíblico moderno.
    rationale: «Será salvo» conserva mejor la resonancia soteriológica y suena más natural y digno en español eclesial amplio.
  - severity: low
    issue: El pronombre «él» es innecesario en español.
    rationale: El griego requiere resolver αὐτόν como sujeto del infinitivo, pero en español esto no obliga a expresar el pronombre. Omitirlo mejora la fluidez sin perder sentido.
  revised_spanish_text: Cuando recuerde el nombre de Yahvé, será salvo[a].
  revised_footnotes:
  - marker: a
    text: 'O: «será librado».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el anclaje de la nota para que corresponda exactamente a σωθήσεται, se mejora la naturalidad y dignidad del español con «será salvo», y se elimina el pronombre explícito innecesario sin alterar la decisión exegética sobre αὐτὸν como sujeto lógico.
