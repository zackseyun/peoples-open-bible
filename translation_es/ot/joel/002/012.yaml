revisions:
- from: «Y aun ahora», declara Yahvé[a], «vuélvanse a mí con todo su corazón, y con ayuno, y con llanto, y con lamento».
  to: «Pero aun ahora», declara Yahvé[a], «vuélvanse a mí con todo su corazón, y con ayuno, y con llanto, y con duelo».
  rationale: Se ajustó el conector inicial para reflejar mejor la fuerza concesiva del hebreo en español natural, se corrigió la nota al pie para que presente una alternativa léxica real en vez de repetir la lectura principal, y se cambió «lamento» por «duelo» para representar con más precisión מִסְפֵּד como expresión de mourning penitencial.
