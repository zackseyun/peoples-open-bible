  rationale: Se corrige el anclaje de la nota para que recaiga sobre el sustantivo relevante, se mejora la idiomaticidad de la nota, se ajusta 'se fue' a 'fue' para reflejar mejor el verbo hebreo simple, y se prefiere 'asna' por registro y claridad léxica.
