translation:
  language: es
  text: Y todo lo que mis ojos desearon no se lo negué[a]; no privé a mi corazón de ningún placer[b], porque mi corazón se alegró con todo mi trabajo[c], y esto fue mi porción de todo mi trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que mis ojos pidieron, no se lo negué».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no contuve mi corazón de ningún gozo» o «no restringí mi corazón de ninguna alegría».'
    reason: lexical_alternative
  - marker: c
    text: «Trabajo» puede también traducirse como «labor» o «fatiga» en ambas apariciones del término hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאֲלוּ / עֵינַי
  english_pob_choice: my eyes desired
  chosen_spanish: mis ojos pidieron
  alternatives_spanish:
  - mis ojos desearon
  - mis ojos solicitaron
  lexicon: HALOT
  rationale: En español, 'pedir' conserva bien la imagen idiomática de los ojos como sede del deseo, sin volverlo mecánico. 'Desearon' también es posible, pero 'pidieron' refleja mejor el matiz del hebreo שָׁאֲלוּ cuando el sujeto son los ojos.
- source_word: אָצַלְתִּי מֵהֶם
  english_pob_choice: I did not withhold from them
  chosen_spanish: no se lo negué
  alternatives_spanish:
  - no lo retuve de ellos
  - no me lo guardé
  lexicon: HALOT
  rationale: El hebreo expresa no haber retenido nada de lo que los ojos pedían. En español, 'no se lo negué' comunica de forma natural la idea de no negar nada a esos deseos, aunque la alternativa más literal 'no lo retuve de ellos' también es viable.
- source_word: מָנַעְתִּי אֶת לִבִּי
  english_pob_choice: I did not keep my heart from
  chosen_spanish: no contuve mi corazón
  alternatives_spanish:
  - no restringí mi corazón
  - no aparté mi corazón
  lexicon: HALOT
  rationale: '''Contener'' reproduce bien la idea de frenar o restringir el impulso interior. Se mantiene el sujeto ''mi corazón'' para conservar el antropomorfismo y la sede interna del deseo.'
- source_word: שִׂמְחָה
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - gozo
  - alegría
  lexicon: HALOT
  rationale: En este contexto de disfrute deliberado, 'placer' es más preciso que 'gozo', que en español suele sonar más espiritual o abstracto. Mantiene la amplitud del término sin suavizar el tono de indulgencia.
- source_word: לִבִּי שָׂמֵחַ
  english_pob_choice: my heart rejoiced
  chosen_spanish: mi corazón se alegró
  alternatives_spanish:
  - mi corazón se regocijó
  - mi corazón estuvo alegre
  lexicon: HALOT
  rationale: '''Se alegró'' conserva el sentido de regocijo con un registro natural y digno en español. Evita exagerar el matiz emocional y mantiene el foco en el corazón como centro de la satisfacción.'
- source_word: עֲמָלִי
  english_pob_choice: my labor
  chosen_spanish: mi trabajo
  alternatives_spanish:
  - mi labor
  - mi toil
  lexicon: HALOT
  rationale: '''Trabajo'' es claro y fluido para el lector hispanohablante y abarca el campo semántico de esfuerzo/ocupación de עמל. En este contexto, evita que ''toil'' o ''labor'' suenen demasiado marcados o arcaicos.'
- source_word: חֶלְקִי
  english_pob_choice: my portion
  chosen_spanish: mi porción
  alternatives_spanish:
  - mi parte
  - mi herencia
  lexicon: HALOT
  rationale: '''Porción'' es una equivalencia estable en español bíblico para lo que le toca a alguien como asignación o resultado. Conserva la resonancia sapiencial del término sin añadir interpretaciones.'
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran alta concordancia en el sentido general: no hubo retención de lo deseado por los ojos, ni restricción interna del corazón frente a toda clase de disfrute, y la reflexión final sobre la porción recibida permanece intacta. La versión española sigue esa línea sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'corazón' de forma consistente como sede interior del querer y del gozo.
  - '''Porción'' se conserva al final para reflejar el cierre sapiencial de la frase.'
  - Se evita 'SEÑOR' o terminología de sustitución porque no aparece en este versículo.
  - El paralelismo entre la negación externa y la contención interna queda reflejado con verbos distintos pero equivalentes.
