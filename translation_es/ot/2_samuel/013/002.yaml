base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/002.yaml
  text: Amnon was so distressed that he made himself sick because of Tamar his sister[a], for she was a virgin[b], and it seemed impossible in Amnon’s eyes to do anything to her.
  footnotes:
  - marker: a
    text: Or, 'Amnon was distressed to the point of becoming sick because of Tamar his sister.' The Hebrew expression can be understood either as reflexive ('made himself sick') or as describing the result ('became sick').
    reason: lexical_alternative
  - marker: b
    text: The phrase 'it seemed impossible in Amnon’s eyes' is a Hebrew idiom meaning that Amnon saw no feasible way to act.
    reason: cultural_note
