translation:
  language: es
  text: Entonces tomará la madera de cedro, el hisopo, el hilo escarlata[a] y el ave viva, y los mojará en la sangre del ave degollada y en el agua fresca[b], y rociará la casa siete veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''escarlata del gusano''; tradicionalmente se entiende como hilo o lana teñidos de escarlata.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''agua viva'', es decir, agua fresca o corriente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then he shall take
  chosen_spanish: Entonces tomará
  alternatives_spanish:
  - y tomará
  - luego tomará
  lexicon: HALOT
  rationale: En instrucciones rituales hebreas, el perfecto con waw puede expresar secuencia normativa. En español, el futuro simple comunica bien esa fuerza prescriptiva sin sonar mecánico.
- source_word: עֵץ הָאֶרֶז
  english_pob_choice: the cedar wood
  chosen_spanish: la madera de cedro
  alternatives_spanish:
  - el cedro
  - la madera de cedro
  lexicon: HALOT
  rationale: La construcción apunta al material ritual, no solo al árbol. 'Madera de cedro' preserva esa precisión y resulta natural en español.
- source_word: הָאֵזֹב
  english_pob_choice: the hyssop
  chosen_spanish: el hisopo
  alternatives_spanish:
  - el hisopo de planta
  - el hyssopo
  lexicon: HALOT
  rationale: '''Hisopo'' es el equivalente estable en español para אֵזֹב y mantiene el término ritual reconocido.'
- source_word: שְׁנִי הַתּוֹלַעַת
  english_pob_choice: the scarlet yarn
  chosen_spanish: el hilo escarlata
  alternatives_spanish:
  - el hilo carmesí
  - la lana escarlata
  - el hilo teñido de escarlata
  lexicon: HALOT
  rationale: El hebreo designa material teñido de escarlata. 'Hilo escarlata' conserva la imagen ritual con buena claridad en español; 'hilo' preserva la textura concreta del objeto mejor que una expresión más general.
- source_word: הַצִּפֹּר הַחַיָּה
  english_pob_choice: the living bird
  chosen_spanish: el ave viva
  alternatives_spanish:
  - el ave viva
  - el pájaro vivo
  lexicon: HALOT
  rationale: '''Ave'' funciona bien en español bíblico para este contexto ritual y evita la percepción demasiado coloquial de ''pájaro''.'
- source_word: וְטָבַל אֹתָם
  english_pob_choice: and dip them
  chosen_spanish: y los sumergirá
  alternatives_spanish:
  - y los mojará
  - y los introducirá
  lexicon: HALOT
  rationale: טבל puede ser 'mojar' o 'sumergir'. Dado el conjunto de objetos y el medio líquido, 'sumergirá' comunica mejor el acto ritual completo sin añadir interpretación.
- source_word: בְּדַם הַצִּפֹּר הַשְּׁחוּטָה
  english_pob_choice: in the blood of the slaughtered bird
  chosen_spanish: en la sangre del ave degollada
  alternatives_spanish:
  - en la sangre del ave sacrificada
  - en la sangre del pájaro degollado
  lexicon: HALOT
  rationale: '''Degollada'' refleja היטב el sacrificio ritual de שׁחט con un verbo natural en español. ''Ave'' mantiene el registro bíblico y evita una lectura excesivamente doméstica.'
- source_word: וּבַמַּיִם הַחַיִּים
  english_pob_choice: and in the fresh water
  chosen_spanish: y en el agua fresca[b]
  alternatives_spanish:
  - y en el agua viva
  - y en el agua corriente
  - y en el agua fresca
  lexicon: HALOT
  rationale: Siguiendo el audit trail inglés, 'agua fresca' comunica el sentido de מַיִם חַיִּים como agua fresca o corriente, sin cargar la frase con asociaciones teológicas posteriores; la lectura literal se preserva en nota.
- source_word: וְהִזָּה אֶל הַבַּיִת
  english_pob_choice: and sprinkle the house
  chosen_spanish: y rociará la casa
  alternatives_spanish:
  - y asperjará la casa
  - y la rociará
  lexicon: HALOT
  rationale: '''Rociar'' es la forma más natural en español para el verbo ritual de aspersión. ''Asperjar'' sería más técnico, pero menos transparente para lectores amplios.'
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces
  lexicon: HALOT
  rationale: La equivalencia es directa y no requiere expansión.
theological_decisions:
- issue: מַיִם חַיִּים en un contexto ritual-legislativo
  english_pob_reading: fresh water
  chosen_spanish_reading: agua fresca
  alternative_spanish_readings:
  - agua viva
  - agua corriente
  rationale: En esta sección legal, el hebreo describe agua de fuente fresca o en movimiento. 'Agua fresca' conserva el sentido práctico del rito en español y evita anticipar resonancias posteriores de 'agua viva' que el contexto inmediato no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el análisis revisado del inglés POB: se conservan las decisiones clave sobre el material de cedro, el hilo escarlata, el ave viva y el sentido de מַיִם חַיִּים como agua fresca, sin cambios posteriores en la trayectoria de revisión.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto solo cuando aparece el Tetragrámaton; aquí no aparece.
  - '''Ave'' y no ''pájaro'' preserva un registro más bíblico sin abandonar claridad.'
  - '''Rociará'' expresa la aspersión ritual de modo natural en español y evita un tecnicismo innecesario.'
