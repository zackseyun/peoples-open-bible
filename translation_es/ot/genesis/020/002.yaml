translation:
  language: es
  text: 'Y Abraham dijo acerca de Sara su esposa[a]: «Ella es mi hermana». Entonces Abimelec, rey de Gerar, envió y tomó a Sara[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Sara, su esposa». La preposición hebrea puede leerse más literalmente así, pero el contexto favorece el sentido de que Abraham habló acerca de Sara, ya que la declaración citada es «Ella es mi hermana».
    reason: lexical_alternative
  - marker: b
    text: Es decir, Abimelec hizo traer a Sara; el hebreo simplemente dice «envió y tomó a Sara».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa naturalmente en español con «dijo». Mantiene el tono narrativo simple y directo del hebreo.
- source_word: אֶל שָׂרָה אִשְׁתּוֹ
  english_pob_choice: of Sarah his wife
  chosen_spanish: acerca de Sara, su esposa
  alternatives_spanish:
  - a Sara, su esposa
  - sobre Sara, su esposa
  lexicon: HALOT
  rationale: Como en el audit trail en inglés, el hebreo puede leerse literalmente como «a», pero el contexto favorece que Abraham habló respecto de Sara, no necesariamente dirigiéndose a ella. «Acerca de» preserva esa relación sin forzar la dirección del habla.
- source_word: אֲחֹתִי הִוא
  english_pob_choice: She is my sister
  chosen_spanish: Ella es mi hermana
  alternatives_spanish:
  - Es mi hermana
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se traduce de forma directa y idiomática. Se conserva el valor de la primera persona en «mi hermana».
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  lexicon: HALOT
  rationale: שׁלח se rinde con el verbo básico «enviar». En español «envió» es claro y neutral; no añade todavía el complemento implícito.
- source_word: מֶלֶךְ גְּרָר
  english_pob_choice: king of Gerar
  chosen_spanish: rey de Gerar
  alternatives_spanish:
  - el rey de Gerar
  lexicon: HALOT
  rationale: La cadena constructa se expresa de manera directa como «rey de Gerar», fórmula natural y fiel al hebreo.
- source_word: וַיִּקַּח אֶת שָׂרָה
  english_pob_choice: took Sarah
  chosen_spanish: tomó a Sara
  alternatives_spanish:
  - llevó a Sara
  - tomó a Sara para sí
  lexicon: HALOT
  rationale: לקח aquí se conserva con el verbo sencillo «tomó», sin expandir el sentido a una formulación interpretativa como «la llevó a su casa» o «la tomó por esposa». Así se mantiene la restricción del hebreo, como en el inglés POB.
theological_decisions:
- issue: Cómo rendir la acción de Abimelec sin sobreinterpretarla
  english_pob_reading: took Sarah
  chosen_spanish_reading: tomó a Sara
  alternative_spanish_readings:
  - la llevó a su casa
  - la tomó por esposa
  rationale: El contexto narrativo sugiere intención de apropiarse de Sara, pero este versículo no lo explica explícitamente. Se preserva esa tensión dejando solo «tomó a Sara», como hace el POB en inglés, en vez de resolverla con una expansión interpretativa.
  doctrine_reference: 'Principio de fidelidad textual: no paraprasear más allá de lo que el hebreo afirma de manera explícita.'
- issue: Valor de אֶל en la frase con אמר
  english_pob_reading: of Sarah his wife
  chosen_spanish_reading: acerca de Sara, su esposa
  alternative_spanish_readings:
  - a Sara, su esposa
  - con Sara, su esposa
  rationale: La preposición אֶל con אמר admite lectura literal como dirección del habla, pero el contenido citado («Ella es mi hermana») favorece la lectura de que Abraham habló sobre Sara. En español, «acerca de» conserva esa ambigüedad resuelta por el contexto sin ignorar la posibilidad literal.
  doctrine_reference: 'Principio lexical: mantener la tensión semántica documentada por el texto y el audit trail.'
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés y no hubo revisiones aplicadas en la última pasada; el español conserva la misma decisión de fondo: lectura contextual de אֶל con אמר, y verbo sobrio para לקח sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Sara» y «Abimelec» con grafía castellana común y lectura bíblica reconocible.
  - Se prefirió «tomó» frente a alternativas más explicativas para no resolver el sentido narrativo más allá del hebreo.
  - La puntuación con comillas angulares y el uso de mayúsculas siguen un estilo bíblico publicable en español neutro.
