translation:
  language: es
  text: Puso a los porteros en las puertas de la casa de Yahvé, para que no entrara ningún impuro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ningún impuro por ninguna cosa entrará», un modismo que significa que no debía entrar nadie impuro en ningún sentido o por ninguna causa de impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: He stationed
  chosen_spanish: Puso
  alternatives_spanish:
  - Estacionó
  - Colocó
  - Puso en posición
  lexicon: HALOT
  rationale: El hebreo causativo expresa que se colocó a los porteros en su puesto. En español, «puso» transmite de forma natural esa acción de instalar o dejar a alguien en guardia, sin volverlo mecánico.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardas de la puerta
  - los guardianes de la puerta
  - los guardas
  lexicon: HALOT
  rationale: En el contexto del templo, el término designa a quienes custodian las entradas. «Porteros» es una equivalencia natural en español bíblico para esa función específica, aunque «guardas de la puerta» también sería posible.
- source_word: עַל שַׁעֲרֵי
  english_pob_choice: at the gates of
  chosen_spanish: a la entrada de las puertas de
  alternatives_spanish:
  - junto a las puertas de
  - en las puertas de
  - sobre las puertas de
  lexicon: HALOT
  rationale: La preposición indica posición de vigilancia en relación con las puertas. «A la entrada de» evita la rigidez de «en/ sobre» y conserva la idea de estar apostados en el acceso.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la fórmula del hebreo «casa de». Siguiendo el estándar del proyecto, el nombre divino se rinde como «Yahvé» en el texto principal, no como «SEÑOR».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino propio del proyecto. «Yahvé» mantiene la referencia explícita al nombre del pacto y la coherencia terminológica.
- source_word: וְלֹא יָבֹא
  english_pob_choice: so that no one ... might enter
  chosen_spanish: para que no entrara
  alternatives_spanish:
  - y no entrara
  - a fin de que no entrara
  - para que nadie entrara
  lexicon: HALOT
  rationale: El hebreo tiene valor final/resultativo. «Para que no entrara» reproduce ese matiz mejor que una simple coordinación negativa.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - contaminado ritualmente
  - inmundo ceremonial
  lexicon: HALOT
  rationale: En este contexto de acceso al santuario, el rasgo es ritual. «Impuro» comunica la categoría de pureza/impureza de forma clara y moderna; «inmundo» sería más tradicional pero menos natural.
- source_word: לְכָל דָּבָר
  english_pob_choice: in any respect
  chosen_spanish: en manera alguna
  alternatives_spanish:
  - en ningún respecto
  - por cualquier causa
  - de ningún modo
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y amplia. «En manera alguna» preserva la fuerza totalizante: ninguna forma de impureza permitida, sin restringirla a un solo tipo.'
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. Mantener el nombre propio evita la sustitución por un título y conserva la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el sentido general del texto hebreo y con la solución de la versión inglesa auditada: instalación de los porteros en las entradas para impedir el acceso de personas ritualmente impuras. No se requieren cambios por revisión reciente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto.
  - Se eligió «porteros» por su valor funcional en contexto del templo, aunque «guardas de la puerta» sería una glosa posible.
  - La cláusula final se vertió con finalidad («para que») para reflejar היטב el valor de וְלֹא יָבֹא en este contexto.
