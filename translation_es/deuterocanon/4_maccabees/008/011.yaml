translation:
  language: es
  text: 'Y me compadezco de su belleza. ¿No considerarán esto: que nada les aguarda[a], si desobedecen, sino morir entre torturas?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «excepto morir con torturas»; en español se expresa con naturalidad como «morir entre torturas» o «morir acompañado de torturas».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐμορφίας
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - buen porte
  - buen parecer
  lexicon: LSJ
  rationale: El sustantivo se refiere a la belleza o comeliness física. «Hermosura» conserva ese campo semántico en español y suena natural en un contexto de jóvenes de apariencia atractiva; evita la abstracción de «belleza» si se quiere resaltar el rasgo visible.
- source_word: οἰκτείρομαι
  english_pob_choice: I pity
  chosen_spanish: me compadezco de
  alternatives_spanish:
  - siento compasión por
  - tengo lástima de
  - me apiado de
  lexicon: BDAG
  rationale: El verbo expresa compasión/piedad. «Me compadezco de» preserva el tono afectivo y puede reflejar mejor el matiz de pena que «piedad» en español contemporáneo, sin perder la concisión del griego.
- source_word: διαλογιεῖσθε
  english_pob_choice: will you not consider
  chosen_spanish: consideraréis
  alternatives_spanish:
  - razonaréis
  - reflexionaréis
  - pensaréis
  lexicon: BDAG
  rationale: En la pregunta retórica, el verbo pide examinar o ponderar la situación. «Consideraréis» comunica esa evaluación mental de manera idiomática; el negativo interrogativo español mantiene el carácter exhortativo del original.
- source_word: ἀπειθήσασιν
  english_pob_choice: if you disobey
  chosen_spanish: si desobedecéis
  alternatives_spanish:
  - si no obedecéis
  - si os negáis a obedecer
  - si sois desobedientes
  lexicon: BDAG
  rationale: El participio expresa desobediencia o rechazo de obediencia. En español, el condicional directo «si desobedecéis» conserva la fuerza de la amenaza y evita añadir una referencia explícita al hablante que no está en el griego.
- source_word: ἀπόκειται
  english_pob_choice: lies before you
  chosen_spanish: os aguarda
  alternatives_spanish:
  - os espera
  - está reservado para vosotros
  - queda delante de vosotros
  lexicon: BDAG
  rationale: El verbo significa literalmente «estar depositado/reservado». «Os aguarda» transmite un desenlace ya fijado y próximo, con naturalidad en español, sin volver demasiado literal la imagen espacial.
- source_word: στρεβλῶν
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  - instrumentos de tortura
  lexicon: LSJ
  rationale: El plural alude a torturas, originariamente asociadas con el retorcimiento en el potro. «Torturas» es la opción más clara y fiel en español; «suplicios» sería posible, pero menos directo.
- source_word: μετὰ στρεβλῶν
  english_pob_choice: amid tortures
  chosen_spanish: entre torturas
  alternatives_spanish:
  - en medio de torturas
  - bajo torturas
  - acompañado de torturas
  lexicon: LSJ
  rationale: La preposición con genitivo indica compañía o acompañamiento, no solo una circunstancia abstracta. «Entre torturas» reproduce bien la idea de una muerte acompañada por torturas, en continuidad con la nota inglesa sobre el matiz del griego.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - ser ejecutados
  - ser muertos
  - perecer
  lexicon: BDAG
  rationale: El infinitivo significa simplemente «morir». Dado que el contexto ya especifica las torturas, «morir» evita expansión innecesaria y conserva la economía del griego.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail inglés que eliminó cualquier pronombre objeto no explícito en el griego. También se conservó el valor de μετὰ στρεβλῶν como muerte acompañada de torturas, no como una simple referencia abstracta al castigo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió vocabulario sobrio y moderno, evitando calcos innecesarios como «razonad» o «lástimas».
  - Se mantuvo la fuerza retórica de la pregunta con una estructura natural en español.
  - «Torturas» se conservó por su claridad y por corresponder al valor reconocido en el audit trail.
