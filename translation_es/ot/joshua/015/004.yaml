translation:
  language: es
  text: Entonces pasó a Azmón, y salió al torrente de Egipto[a]; y el límite terminaba en el mar. Esta será su frontera sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi de Egipto». Hebreo naḥal suele referirse a un cauce estacional o wadi; «río de Egipto» es otra traducción tradicional, pero puede sugerir demasiado el Nilo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: Then it passed on
  chosen_spanish: Entonces pasó
  alternatives_spanish:
  - y pasó
  - entonces avanzó
  lexicon: HALOT
  rationale: En descripciones de fronteras, עבר expresa la continuación del recorrido del límite. «Pasó» conserva la imagen verbal sin introducir un matiz de cruce innecesario; «entonces» refleja bien la secuencia narrativa del contexto.
- source_word: עַצְמֹנָה
  english_pob_choice: Azmon
  chosen_spanish: Azmón
  alternatives_spanish:
  - Atzmón
  - Azmon
  lexicon: Nombre propio según el contexto
  rationale: Es un topónimo; se translitera al español como nombre de lugar. Se usa acentuación española natural para facilitar la lectura pública, sin alterar la identidad del nombre.
- source_word: וְיָצָא
  english_pob_choice: and went out
  chosen_spanish: y salió
  alternatives_spanish:
  - y llegó a
  - y se extendió hasta
  lexicon: HALOT
  rationale: Literalmente significa salir; en contextos territoriales describe el punto al que llega o emerge el límite. «Salió» preserva la imagen del hebreo y sigue siendo natural en español.
- source_word: נַחַל מִצְרַיִם
  english_pob_choice: the Brook of Egypt
  chosen_spanish: el torrente de Egipto
  alternatives_spanish:
  - el torrente de Egipto
  - el wadi de Egipto
  - el arroyo de Egipto
  lexicon: HALOT
  rationale: נחל puede designar un cauce estacional, wadi o torrente, no necesariamente un río permanente. «Torrente de Egipto» comunica esa realidad geográfica sin sugerir de forma indebida el Nilo; «arroyo» puede sonar demasiado pequeño en español.
- source_word: וְהָיוּ תֹּצְאוֹת הַגְּבוּל יָמָּה
  english_pob_choice: and the boundary ended at the sea
  chosen_spanish: y los extremos del límite estaban hacia el mar
  alternatives_spanish:
  - y el límite terminaba en el mar
  - y las salidas del límite eran hacia el mar
  lexicon: HALOT
  rationale: תוצאות הגבול se refiere a los puntos extremos o terminaciones del límite. «Extremos del límite» mantiene ese plural y evita borrar la idea de varios puntos terminales; «hacia el mar» refleja la dirección de ימה sin forzar una precisión geográfica que el hebreo no explicita aquí.
- source_word: זֶה יִהְיֶה לָכֶם גְּבוּל נֶגֶב
  english_pob_choice: This shall be your southern boundary
  chosen_spanish: Este será para ustedes su límite del sur
  alternatives_spanish:
  - Este será su límite meridional
  - Este será para ustedes el límite del sur
  lexicon: HALOT
  rationale: נֶגֶב aquí es direccional, «sur/southern», no el nombre propio Negev. «Límite del sur» es claro y fiel; «para ustedes» reproduce el dativo de beneficio/posesión y mantiene el tono de delimitación territorial.
theological_decisions:
- issue: Valor direccional de נֶגֶב
  english_pob_reading: This shall be your southern boundary
  chosen_spanish_reading: Este será para ustedes su límite del sur
  alternative_spanish_readings:
  - Este será su límite meridional
  - Este será el límite del Negev
  rationale: La decisión evita convertir נֶגֶב en el nombre geográfico «Negev» cuando aquí funciona como dirección. En español, «del sur» conserva el sentido de frontera meridional sin introducir una identificación territorial más fuerte que la del texto.
  doctrine_reference: Geografía bíblica y sentido contextual del hebreo
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del texto base, con alta concordancia y sin cambios posteriores indicados en el audit trail. La versión española conserva las decisiones léxicas clave del POB inglés: עבר como progreso del límite, נחל como cauce estacional, תוצאות הגבול como extremos/terminaciones, y נגב como dirección meridional.'
  spanish_consistency_notes:
  - Se mantiene el topónimo como Azmón, acorde con transliteración española y lectura pública.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Torrente de Egipto» preserva la ambigüedad geográfica del hebreo mejor que «río de Egipto».
  - «Límite del sur» expresa נֶגֶב como dirección, no como nombre propio.
