translation:
  language: es
  text: La corona de los ancianos es mucha experiencia[a], y su motivo de gloria es el temor del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran experiencia» o «amplia experiencia». El griego πολυπειρία subraya una experiencia extensa adquirida con el tiempo.
    reason: lexical_alternative
lexical_decisions:
- source_word: στέφανος
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - coroza
  lexicon: LSJ
  rationale: στέφανος nombra una corona o guirnalda honorífica. En español, «corona» comunica con naturalidad la imagen de honor sin perder la metáfora sapiencial.
- source_word: γερόντων
  english_pob_choice: the aged
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  - los envejecidos
  lexicon: LSJ
  rationale: El genitivo plural se refiere a personas de edad avanzada. «Los ancianos» mantiene el sentido etario y resulta más natural que una versión más literal o despectiva.
- source_word: πολυπειρία
  english_pob_choice: much experience
  chosen_spanish: mucha experiencia
  alternatives_spanish:
  - gran experiencia
  - amplia experiencia
  - larga experiencia
  lexicon: LSJ
  rationale: πολυπειρία enfatiza experiencia acumulada a lo largo del tiempo. «Mucha experiencia» conserva el valor cuantitativo de πολυ- y suena idiomático en español.
- source_word: καύχημα
  english_pob_choice: boast
  chosen_spanish: gloria
  alternatives_spanish:
  - orgullo
  - motivo de jactancia
  - jactancia
  lexicon: LSJ
  rationale: Aquí el término expresa aquello de lo que uno se gloria o en lo que se jacta. En español, «gloria» funciona como el sustantivo resultante más natural y publicable, sin borrar el matiz de autoexaltación porque el paralelismo con el temor del Señor lo delimita.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: El texto griego dice Κυρίου; siguiendo el criterio POB para κύριος, se vierte «el Señor». Aquí no se usa «Yahvé» porque el testimonio inmediato es griego y no un reemplazo directo de יהוה en el texto base.
theological_decisions:
- issue: φόβος Κυρίου como fórmula sapiencial
  english_pob_reading: the fear of the Lord
  chosen_spanish_reading: el temor del Señor
  alternative_spanish_readings:
  - la reverencia al Señor
  - el temor de Yahvé
  rationale: Se mantiene «temor» para conservar la tensión teológica de la fórmula sapiencial y no suavizarla a «reverencia». «Señor» refleja el griego Κυρίου según la norma del proyecto para κύριος.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; φόβος θεοῦ/κυρίου se mantiene como temor reverente sin neutralizar la noción de temor'
- issue: καύχημα como motivo de honra o jactancia
  english_pob_reading: boast
  chosen_spanish_reading: su gloria
  alternative_spanish_readings:
  - su jactancia
  - su motivo de gloria
  - aquello en que se glorían
  rationale: El versículo pone en paralelo la corona y el καύχημα. En español, «gloria» comunica el valor honorífico sin introducir un giro demasiado coloquial; la relación con el temor del Señor deja visible que no se trata de gloria autónoma sino de honor bien fundado.
  doctrine_reference: 'DOCTRINE.md: preservar el valor relacional y moral de los términos de honra sin borrar su posible tensión con la jactancia'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Sirácides 25:7 y el auditor inglés sin cambios sustanciales; la versión inglesa mantiene la equivalencia óptima con la nota léxica sobre πολυπειρία. En español se decidió conservar la metáfora honorífica con «corona» y el paralelismo sapiencial con «temor del Señor», evitando una paráfrasis que debilitara el texto.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κυρίου, en coherencia con el griego y con la norma del proyecto para κύριος.
  - Se conserva «temor» en la fórmula sapiencial para no neutralizar el peso teológico del giro.
  - «Ancianos» se usa en sentido etario, no como título eclesial.
  - La nota sobre πολυπειρία preserva la alternativa de experiencia extensa, tal como en el audit trail inglés.
