translation:
  language: es
  text: Pero Sísara huyó[a] a pie[b] a la tienda de Jael, esposa de Heber el ceneo, porque había paz entre Jabín, rey de Hazor, y la casa de Heber el ceneo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y Sísara huyó». La conjunción hebrea puede traducirse simplemente «y»; «pero» refleja el contraste narrativo del contexto.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «por sus pies». En español, «a pie» expresa de forma idiomática que huyó por sus propios medios.
    reason: lexical_alternative
  - marker: c
    text: «La casa de Heber» puede entenderse como la casa-hogar de Heber o su clan/familia.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/סִֽיסְרָא֙
  english_pob_choice: But Sisera
  chosen_spanish: Pero Sísara
  alternatives_spanish:
  - Y Sísara
  lexicon: HALOT
  rationale: La conjunción ו puede ser simplemente coordinante, pero aquí el contexto narrativo marca contraste con la escena anterior; en español, «Pero» comunica mejor ese giro discursivo sin añadir contenido ajeno al hebreo.
- source_word: נָ֣ס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: El verbo qal נס expresa la idea básica de huir. «Huyó» es la forma natural y directa en español bíblico contemporáneo y conserva la fuerza narrativa.
- source_word: בְּ/רַגְלָ֔י/ו
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - con sus pies
  - de pie
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «por/con sus pies», con sentido idiomático de desplazamiento sin montura ni vehículo. «A pie» es el equivalente natural en español.
- source_word: אֶל אֹ֣הֶל יָעֵ֔ל
  english_pob_choice: to the tent of Jael
  chosen_spanish: a la tienda de Jael
  alternatives_spanish:
  - a la tienda de Yael
  lexicon: HALOT
  rationale: El hebreo conserva la relación posesiva mediante constructo; en español, «a la tienda de Jael» mantiene esa relación de forma clara y natural. Se prefiere «Jael» como forma usual en español bíblico.
- source_word: אֵ֖שֶּׁת חֶ֣בֶר הַ/קֵּינִ֑י
  english_pob_choice: the wife of Heber the Kenite
  chosen_spanish: esposa de Heber el ceneo
  alternatives_spanish:
  - la mujer de Heber el ceneo
  - la esposa de Heber el ceneo
  lexicon: HALOT
  rationale: «אֵשֶׁת» marca una identificación appositiva. «Esposa» es plenamente fiel y comprensible en español; «ceneo» traduce el gentilicio הַקֵּינִי de manera estable y natural.
- source_word: כִּ֣י
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la huida de Sísara. «Porque» es la correspondencia más clara y directa en español.
- source_word: שָׁל֗וֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - relaciones pacíficas
  - amistad
  lexicon: HALOT
  rationale: En este contexto שָׁלוֹם señala una relación pacífica entre partes. «Paz» preserva el término básico y no sobredetermina la clase de acuerdo.
- source_word: בֵּ֚ין יָבִ֣ין מֶֽלֶךְ חָצ֔וֹר וּ/בֵ֕ין
  english_pob_choice: between Jabin king of Hazor and
  chosen_spanish: entre Jabín, rey de Hazor, y
  alternatives_spanish:
  - entre Jabín, el rey de Hazor, y
  lexicon: HALOT
  rationale: La estructura relacional se conserva con la misma secuencia lógica del hebreo. El orden «Jabín, rey de Hazor» reproduce la aposición sin sobrecargar la frase.
- source_word: בֵּ֖ית חֶ֥בֶר הַ/קֵּינִֽי
  english_pob_choice: the house of Heber the Kenite
  chosen_spanish: la casa de Heber el ceneo
  alternatives_spanish:
  - el hogar de Heber el ceneo
  - la familia de Heber el ceneo
  lexicon: HALOT
  rationale: «Casa» mantiene el valor social del hebreo בֵּית, que puede designar casa, casa-hogar o clan. Se conserva la expresión formal y su amplitud semántica.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de WLC y el audit trail inglés: mantiene el contraste narrativo de וְ, el valor idiomático de בְּרַגְלָיו, la identificación appositiva de Jael y Heber, y el sentido relacional de שָׁלוֹם sin especificarlo como tratado formal. No hay revisiones aplicadas en el expediente inglés, y el texto se alinea con ese estado estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefiere «ceneo» para הַקֵּינִי y «casa» para בֵּית, manteniendo la amplitud social del hebreo.
  - Se mantiene una puntuación natural en español, con comas para aislar aposiciones y marcar el giro causal.
