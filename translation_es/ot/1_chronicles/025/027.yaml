  text: para el vigésimo[a], Eliatá; sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «para el vigésimo lote: Eliatá, sus hijos y sus hermanos, doce». La palabra «lote» está implícita por la estructura recurrente del capítulo.'
