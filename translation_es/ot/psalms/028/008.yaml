translation:
  language: es
  text: Yahvé es fuerza para ellos, y es una fortaleza de salvación para su ungido[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Salvación» traduce aquí la idea central del hebreo, aunque el sustantivo hebreo está en plural. El plural puede sugerir múltiples actos de liberación o una plenitud de rescates.
    reason: lexical_alternative
  - marker: b
    text: «Su ungido» puede entenderse también como «su Mesías». En el contexto del salmo, la referencia inmediata probablemente es el rey ungido de Yahvé, sin excluir un sentido mesiánico más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo el criterio del proyecto de no ocultarlo con un título. «Yahvé» es el equivalente español directo y ampliamente reconocible en registro bíblico.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - fuerza
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza, vigor o poder. Aquí funciona predicativamente con Yahvé, por lo que «fuerza» comunica con naturalidad la afirmación sin confundirlo con el término distinto «מָעוֹז» del segundo hemistiquio.
- source_word: לָמוֹ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para él
  - para su pueblo
  lexicon: HALOT
  rationale: La forma pronominal es plural de tercera persona, así que se preserva el plural explícito en español. «Para ellos» evita suavizar el dato morfológico del hebreo.
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - refugio
  - baluarte
  - castillo fuerte
  lexicon: HALOT
  rationale: El término denota un lugar o fuente de protección. «Fortaleza» conserva la imagen defensiva y resulta natural en español; también mantiene cierta distancia semántica respecto de «fuerza» en la primera cláusula.
- source_word: יְשׁוּעוֹת
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - victorias
  - actos de salvación
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el audit trail inglés decidió no forzar un plural literal en la traducción principal. En español se mantiene «salvación» como sustantivo natural, sin perder el valor colectivo/manifold que queda implícito en el hebreo.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed one
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su ungido
  - su escogido
  lexicon: HALOT
  rationale: Se traduce de manera directa el participio/adjetivo nominal con sufijo pronominal. «Su ungido» conserva la referencia al rey consagrado por Yahvé sin resolver de antemano la resonancia mesiánica más amplia.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  - él
  lexicon: HALOT
  rationale: El pronombre independiente hebreo aporta énfasis; en español se refleja de forma natural con la cópula explícita «es», suficiente para una lectura fluida y reverente.
theological_decisions:
- issue: Si מְשִׁיחוֹ debe quedar como título mesiánico explícito o como referencia inmediata al rey ungido
  english_pob_reading: his anointed one
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su Mesías / su ungido
  rationale: El contexto inmediato favorece la referencia al rey ungido del Señor, mientras que la resonancia mesiánica posterior no se elimina. La forma principal mantiene la tensión textual sin convertirla prematuramente en un título doctrinal cerrado.
  doctrine_reference: Translate titles; preserve lexical/theological tension.
translation_notes:
  revision_awareness: 'El texto sigue el criterio revisado del audit trail inglés: se evita un plural literal como «salvaciones» en la línea principal, pero se preserva en nota la tensión del plural hebreo יְשׁוּעוֹת. También se mantiene la decisión de no sustituir el nombre divino por un título y de no resolver dogmáticamente מְשִׁיחוֹ en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como máscara del nombre divino.
  - «Fuerza» y «fortaleza» distinguen los dos sustantivos hebreos עֹז y מָעוֹז.
  - La formulación es sobria y bíblica, sin calcos innecesarios.
  - La sintaxis conserva la estructura paralela del hebreo y resulta publicable en español.
