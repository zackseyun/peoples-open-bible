translation:
  language: es
  text: Porque es insensato no disfrutar de las cosas agradables que no traen reproche[a], e injusto apartarse de los dones de la naturaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los placeres sin reproche».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόητον
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - falto de juicio
  lexicon: LSJ
  rationale: ἀνόητον expresa falta de entendimiento o sensatez. «Insensato» conserva el juicio moral e intelectual del término en español, sin endurecerlo más de lo que permite el griego.
- source_word: ἀπολαύειν
  english_pob_choice: to enjoy
  chosen_spanish: disfrutar
  alternatives_spanish:
  - gozar de
  - participar de
  lexicon: LSJ
  rationale: El infinitivo aquí se refiere a tomar placer en algo. «Disfrutar» es natural en español y mantiene la idea de experimentar agrado, no solo de obtener beneficio.
- source_word: τῶν χωρὶς ὀνείδους ἡδέων
  english_pob_choice: the pleasant things that are without reproach
  chosen_spanish: las cosas agradables que están sin reproche
  alternatives_spanish:
  - los placeres sin reproche
  - las placenteras cosas libres de reproche
  lexicon: LSJ
  rationale: ἡδέων indica cosas agradables o placenteras; χωρὶς ὀνείδους las califica como libres de reproche. Se conserva esa doble fuerza en una frase española clara, sin reducirla de forma excesiva a una sola palabra abstracta.
- source_word: ἄδικον
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - incorrecto
  - indebido
  lexicon: LSJ
  rationale: ἄδικον tiene peso ético y judicial. «Injusto» preserva ese registro moral con mayor fidelidad que un simple «incorrecto».
- source_word: ἀποστρέφεσθαι
  english_pob_choice: to turn away from
  chosen_spanish: apartarse de
  alternatives_spanish:
  - volver la espalda a
  - rechazar
  lexicon: LSJ
  rationale: El infinitivo medio sugiere dirigirse uno mismo lejos de algo. «Apartarse de» comunica bien esa imagen en español sin volverla demasiado interpretativa.
- source_word: τὰς τῆς φύσεως χάριτας
  english_pob_choice: the gifts of nature
  chosen_spanish: los dones de la naturaleza
  alternatives_spanish:
  - las gracias de la naturaleza
  - los favores de la naturaleza
  lexicon: LSJ
  rationale: χάριτας aquí apunta a beneficios o dones graciosamente dados, y φύσεως los vincula con la naturaleza. «Dones de la naturaleza» expresa ese sentido de manera idiomática en español y evita importar un matiz teológico posterior de «gracia».
theological_decisions:
- issue: Caracterización moral de los placeres naturales
  english_pob_reading: The verse affirms that some pleasurable things are morally permissible ('that are without reproach') and should not be refused.
  chosen_spanish_reading: El versículo afirma que ciertas cosas agradables son moralmente permitidas por estar sin reproche, y por eso no deben rechazarse.
  alternative_spanish_readings:
  - Los placeres sin reproche no deben ser evitados.
  - Es insensato no gozar de los placeres blameless.
  rationale: El griego explicita la limitación moral con χωρὶς ὀνείδους. La traducción conserva tanto el llamado a disfrutar como la restricción ética, sin convertirlo en una aprobación general e indiscriminada del placer.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla; español moderno, legible y fiel.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió «that are without reproach»; en español se reflejó con «que están sin reproche» para mantener la cercanía al χωρὶς ὀνείδους, aunque la forma nominal «los placeres sin reproche» sigue siendo una alternativa válida.
  spanish_consistency_notes:
  - Se usó «Dios/espíritu/carne/gracia» según los defaults del proyecto, pero este versículo no requiere esos términos.
  - Se evitó «Cristo» o terminología litúrgica ajena al pasaje.
  - «Insensato» y «injusto» conservan el tono ético del argumento sin arcaísmo excesivo.
  - La nota al pie acompaña la alternativa lexical que el propio audit trail inglés preserva para ἡδέων.
