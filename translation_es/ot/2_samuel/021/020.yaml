revisions:
- from: Y hubo otra vez guerra en Gat[a], y hubo un hombre de gran tamaño cuyoas dedos de las manos y dedos de los pies eran seis y seis, veinticuatro en total[b]; también él nació del Rapha[c].
  to: Y hubo otra vez guerra en Gat[a], y hubo un hombre de gran tamaño cuyos dedos de las manos y de los pies eran seis y seis, veinticuatro en número[b]; también él nació de Rapha[c].
  rationale: Se corrige un error gramatical evidente, se mejora la fluidez de la frase anatómica sin apartarse del hebreo, se acerca más la suma final al matiz de «en número», y se repara la nota de alternativa para expresar descendencia en lugar de movimiento. Se mantiene «Rapha» en el texto principal por fidelidad al análisis lexical y teológico documentado.
