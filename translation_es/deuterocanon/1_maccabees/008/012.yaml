translation:
  language: es
  text: Pero con sus aliados[a] y con los que confiaban en ellos mantuvieron amistad, y dominaron los reinos cercanos y lejanos[b]; y todos los que oyeron su nombre les temieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aliados» traduce φίλοι en su sentido político; el griego también puede significar «amigos», pero el contexto diplomático favorece la relación de alianza.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «los que oyeron su nombre», expresión que puede implicar oír hablar de su fama o renombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ
  english_pob_choice: But with
  chosen_spanish: Pero con
  alternatives_spanish:
  - Y con
  - Ahora bien, con
  lexicon: LSJ
  rationale: δέ expresa continuación con matiz leve de contraste o transición. En español, «Pero con» conserva ese giro discursivo sin volverlo demasiado enfático.
- source_word: τῶν φίλων αὐτῶν
  english_pob_choice: their allies
  chosen_spanish: sus aliados
  alternatives_spanish:
  - sus amigos
  lexicon: LSJ
  rationale: En este contexto diplomático y militar, φίλοι puede designar aliados o socios políticos. «Aliados» comunica mejor la relación formal de apoyo que «amigos» en español.
- source_word: τῶν ἐπαναπαυομένων αὐτοῖς
  english_pob_choice: those who relied on them
  chosen_spanish: los que confiaban en ellos
  alternatives_spanish:
  - los que dependían de ellos
  - los que se apoyaban en ellos
  lexicon: LSJ
  rationale: El participio medio/pasivo expresa dependencia o confianza puesta en alguien. «Confiaban en ellos» es natural en español y mantiene la idea de apoyo/dependencia sin endurecerla innecesariamente.
- source_word: συνετήρησαν αὐτοῖς φιλίαν
  english_pob_choice: they maintained friendship
  chosen_spanish: mantuvieron amistad
  alternatives_spanish:
  - conservaron amistad
  - sostuvieron amistad
  lexicon: LSJ
  rationale: συντηρέω aquí significa mantener o conservar. φιλία, en este marco, es amistad diplomática o relación amistosa; «mantuvieron amistad» suena natural y fiel.
- source_word: κατεκράτησαν
  english_pob_choice: they gained control over
  chosen_spanish: dominaron
  alternatives_spanish:
  - tomaron control de
  - prevalecieron sobre
  - sojuzgaron
  lexicon: LSJ
  rationale: κατακρατέω puede denotar ejercer dominio o superioridad política. «Dominaron» es breve y suficientemente fuerte; no introduce un matiz técnico ajeno al texto.
- source_word: τῶν βασιλειῶν
  english_pob_choice: the kingdoms
  chosen_spanish: los reinos
  alternatives_spanish:
  - los reinos soberanos
  - los territorios reales
  lexicon: LSJ
  rationale: El plural genitivo se refiere naturalmente a reinos o dominios territoriales. «Reinos» mantiene la amplitud política del griego.
- source_word: τῶν ἐγγὺς καὶ τῶν μακρῶν
  english_pob_choice: near and far
  chosen_spanish: cercanos y lejanos
  alternatives_spanish:
  - próximos y distantes
  - cerca y lejos
  lexicon: LSJ
  rationale: La pareja funciona como merismo de alcance geográfico. «Cercanos y lejanos» preserva el paralelismo y es plenamente idiomático en español.
- source_word: ὅσοι ἤκουσαν τὸ ὄνομα αὐτῶν
  english_pob_choice: all who heard their name
  chosen_spanish: todos los que oyeron su nombre
  alternatives_spanish:
  - todos los que oyeron de ellos
  - todos los que oyeron hablar de su fama
  lexicon: LSJ
  rationale: La expresión literal «oyeron su nombre» conserva el giro del griego y permite la implicación de reputación sin explicarla de más.
- source_word: ἐφοβοῦντο αὐτούς
  english_pob_choice: feared them
  chosen_spanish: les temieron
  alternatives_spanish:
  - les tuvieron miedo
  - los temieron
  lexicon: LSJ
  rationale: φοβέομαι aquí denota temor ante poder o prestigio. «Les temieron» mantiene la fuerza verbal y el régimen natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete y armoniza con el expediente auditado en inglés, manteniendo las mismas decisiones de fondo: φίλοι como «aliados», ἐπαναπαυομένων como dependencia/confianza, φιλία como amistad diplomática, y la expresión idiomática sobre oír el nombre como referencia a fama o reputación.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una sustitución teológica equivalente en este versículo.
  - «Reinos» y no «reinados» conserva el sentido territorial-político del plural griego.
  - «Temieron» se mantiene sin amplificación interpretativa para respetar la concisión del original.
