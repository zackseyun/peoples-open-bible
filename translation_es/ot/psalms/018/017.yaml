translation:
  language: es
  text: Se extendió desde lo alto; me tomó; me sacó de muchas aguas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de grandes aguas». El hebreo dice literalmente «de muchas aguas», imagen habitual de peligro abrumador.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַ֣ח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - extendió
  lexicon: HALOT
  rationale: El hebreo puede significar 'enviar' o 'extender'. Como el audit trail en inglés volvió a 'sent' para ajustarse más al verbo básico, 'envió' conserva el valor verbal directo sin añadir 'hacia abajo' ni forzar una paráfrasis. En español, 'envió desde lo alto' mantiene la imagen de iniciativa divina.
- source_word: מִ֭/מָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde las alturas
  - desde el cielo
  lexicon: HALOT
  rationale: '''מָרוֹם'' designa altura o lugar elevado. ''Desde lo alto'' reproduce la elevación sin especificar ''cielo'', coherente con la decisión inglesa de no explicitarlo.'
- source_word: יִקָּחֵ֑/נִי
  english_pob_choice: he took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me agarró
  - me recogió
  lexicon: HALOT
  rationale: El verbo común 'tomar' es el equivalente más directo y sobrio. Mantiene la idea de rescate mediante acción divina sin cargar el texto con una imagen más intensa de la que exige el hebreo.
- source_word: יַֽ֝מְשֵׁ֗/נִי
  english_pob_choice: he drew me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me extrajo
  - me rescató
  lexicon: HALOT
  rationale: El hifil de משה expresa sacar/draw out, especialmente de aguas. 'Me sacó' es natural en español y conserva la imagen sin sonar técnico; 'me extrajo' sería demasiado frío y 'me rescató' agrega interpretación.
- source_word: מִ/מַּ֥יִם רַבִּֽים
  english_pob_choice: out of many waters
  chosen_spanish: de muchas aguas
  alternatives_spanish:
  - de grandes aguas
  - de aguas abundantes
  lexicon: HALOT
  rationale: Se conserva la literalidad de 'muchas aguas', que el audit trail inglés preserva como imagen de peligro abrumador. En español, 'de muchas aguas' suena bíblico y claro; puede entenderse como metáfora de amenaza extrema.
theological_decisions:
- issue: Si 'desde lo alto' debe especificarse como 'del cielo'
  english_pob_reading: Retain 'from on high' without specifying 'heaven.'
  chosen_spanish_reading: Mantener 'desde lo alto' sin añadir 'del cielo'.
  alternative_spanish_readings:
  - desde el cielo
  rationale: El hebreo habla de altura, no nombra explícitamente el cielo. Evitar la especificación conserva la tensión entre imagen espacial y referencia divina, tal como el POB inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail inglés, que prefirió 'sent' sobre 'reached down' para reflejar mejor el verbo hebreo sin añadir 'down'. En español, esto se reflejó con 'envió' y se evitó introducir 'abajo'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito no por aparecer en este versículo, sino porque la frase es una acción divina general sin un nombre explícito.
  - Se preservó la imagen plural 'muchas aguas' para no diluir la metáfora de peligro.
  - Se evitó 'cielos' o 'cielo' para no mover el texto más allá de 'lo alto'.
