revisions:
- from: Beltsasar[a], jefe de los magos, de quien sé que tiene en ti el espíritu de los dioses santos, y que ningún misterio te resulta difícil, declárame las visiones de mi sueño que he visto y su interpretación.
  to: Beltsasar[a], jefe de los magos, de quien sé que el espíritu de los dioses santos está en ti, y que ningún misterio te resulta difícil, declárame las visiones de mi sueño que vi y su interpretación.
  rationale: Se corrige la sintaxis para reflejar con claridad que el espíritu está en Beltsasar/Daniel, se ajusta «que he visto» a «que vi» por naturalidad y cercanía al original, y se normaliza la puntuación de la nota sin cambiar la decisión teológica documentada.
