translation:
  language: es
  text: Pero sobre los poderosos[a] viene una severa investigación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “una severa indagación” o “un examen riguroso se avecina”.
    reason: lexical_alternative
lexical_decisions:
- source_word: κραταιοῖς
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los poderosos
  lexicon: LSJ
  rationale: κραταιός expresa fuerza o poder; en este contexto de sujetos con peso social y responsabilidad, 'los poderosos' comunica mejor la idea que solo fuerza física. 'Los fuertes' sería posible, pero en español suena más general y menos acorde al matiz de autoridad implícito.
- source_word: ἰσχυρὰ
  english_pob_choice: severe
  chosen_spanish: severa
  alternatives_spanish:
  - fuerte
  - grave
  - intensa
  lexicon: LSJ
  rationale: Aquí ἰσχυρά modifica la indagación venidera y expresa intensidad, no fuerza física. 'Severa' conserva el tono de advertencia y la severidad del examen sin introducir matices ajenos.
- source_word: ἐφίσταται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - se acerca
  - está por venir
  - se avecina
  lexicon: LSJ
  rationale: ἐφίσταται puede significar venir sobre alguien, acercarse o hacerse inminente. 'Viene' es natural en español y mantiene la idea de inminencia sin sobrerrepresentar el giro.
- source_word: ἔραυνα
  english_pob_choice: inquiry
  chosen_spanish: indagación
  alternatives_spanish:
  - investigación
  - examen
  - búsqueda
  lexicon: LSJ
  rationale: ἔραυνα denota una pesquisa o examen atento. 'Indagación' preserva el sentido de búsqueda evaluativa y suena más sobrio y amplio que 'investigación', que puede sonar demasiado técnico o burocrático.
theological_decisions:
- issue: Naturaleza del juicio o escrutinio
  english_pob_reading: The verse warns that those who are powerful will face especially severe scrutiny.
  chosen_spanish_reading: El versículo advierte que los poderosos afrontarán una indagación especialmente severa.
  alternative_spanish_readings:
  - '...una severa investigación...'
  - '...un severo examen...'
  rationale: La fuente griega presenta una advertencia de escrutinio dirigido a los poderosos. 'Indagación' mantiene el campo semántico de pesquisa/averiguación sin convertirlo en un término doctrinal posterior ni borrar la fuerza judicial del enunciado.
  doctrine_reference: Preservar la tensión del texto sapiencial y su tono de juicio sin resolverla mediante vocabulario eclesiástico tradicional.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Sabiduría 6:8 y toma como guía la auditoría inglesa: κραταιοῖς → ''los poderosos'', ἰσχυρά → ''severa'', ἐφίσταται → ''viene'', ἔραυνα → ''indagación''. Se conserva la advertencia de escrutinio severo para quienes tienen poder, sin añadir elementos ausentes en el original.'
  spanish_consistency_notes:
  - Se usa 'poderosos' para κραταιοῖς por su valor sociopolítico en contexto.
  - '''Severa indagación'' conserva la fuerza de ἰσχυρά sin calcar ''strong''.'
  - '''Viene'' refleja la inminencia de ἐφίσταται con español natural.'
  - Se prefiere 'indagación' como equivalente amplio de ἔραυνα, con nota alternativa para 'investigación' y 'examen'.
