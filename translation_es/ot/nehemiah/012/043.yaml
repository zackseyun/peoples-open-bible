base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/043.yaml
  text: On that day they offered great sacrifices and rejoiced[a], because God had made them rejoice with great joy. Also the women and the children rejoiced[d][c][b], and the joy of Jerusalem was heard from far away.
  footnotes:
