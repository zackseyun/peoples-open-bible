translation:
  language: es
  text: 'Y Yahvé dijo a Ahijá: «Mira, la esposa de Jeroboam viene a consultarte acerca de su hijo, porque está enfermo. Así y así[a] le dirás. Y cuando ella llegue, se estará disfrazando[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea equivalente a «así y así» señala un contenido concreto aún no citado; no significa simplemente repetición vacía.
    reason: lexical_alternative
  - marker: b
    text: 'O: «se hará pasar por otra mujer». El verbo hebreo puede implicar hacerse irreconocible o llevar un disfraz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: uso consagrado en el proyecto para el nombre divino
  rationale: 'Se sigue el criterio del proyecto para יהוה: no se enmascara el nombre; ''Yahvé'' conserva la identificación directa del Tetragrámaton y es idiomático en español bíblico actual.'
- source_word: אָמַר אֶל
  english_pob_choice: said to
  chosen_spanish: dijo a
  alternatives_spanish:
  - habló a
  - le dijo
  lexicon: uso narrativo estándar
  rationale: '''Dijo a'' reproduce de manera natural el discurso narrativo hebreo sin añadir matices no presentes en el texto.'
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira,
  - He aquí
  lexicon: deixis/discurso
  rationale: '''Mira'' preserva la fuerza de atención e inmediatez de הִנֵּה en un registro moderno y reverente; ''He aquí'' sería más tradicional pero menos natural.'
- source_word: אֵשֶׁת יָרָבְעָם
  english_pob_choice: Jeroboam’s wife
  chosen_spanish: la esposa de Jeroboam
  alternatives_spanish:
  - la mujer de Jeroboam
  lexicon: cadena constructa
  rationale: Se opta por una construcción explícita y clara en español, manteniendo la relación posesiva sin forzar un calco poco natural.
- source_word: לִדְרֹשׁ דָּבָר מֵעִמְּךָ
  english_pob_choice: to inquire of you concerning
  chosen_spanish: a consultar una palabra de parte tuya
  alternatives_spanish:
  - a pedirte una palabra
  - a inquirir de ti
  lexicon: דרש דבר
  rationale: Se conserva la consulta profética/oracular de דָּרַשׁ דָּבָר. 'Consultar una palabra' mantiene el sentido de buscar respuesta o mensaje sin reducirlo a una simple pregunta coloquial.
- source_word: אֶל בְּנָהּ
  english_pob_choice: concerning her son
  chosen_spanish: acerca de su hijo
  alternatives_spanish:
  - con respecto a su hijo
  - sobre su hijo
  lexicon: preposición de complemento
  rationale: '''Acerca de'' expresa claramente el tema de la consulta en español formal y fluido.'
- source_word: כִּי חֹלֶה הוּא
  english_pob_choice: for he is sick
  chosen_spanish: porque está enfermo
  alternatives_spanish:
  - pues está enfermo
  - ya que está enfermo
  lexicon: causalidad/enfermedad
  rationale: '''Está enfermo'' es la forma natural y clara para חֹלֶה en este contexto; conserva el valor causal del hebreo.'
- source_word: כָּזֹה וְכָזֶה
  english_pob_choice: Thus and thus
  chosen_spanish: Así y así
  alternatives_spanish:
  - De tal manera y de tal manera
  - Tal y tal
  lexicon: idioma de contenido no explicitado
  rationale: Se retiene la fórmula idiomática que señala un mensaje específico todavía no revelado. 'Así y así' conserva la indeterminación deliberada del hebreo y la versión inglesa auditada.
- source_word: תְּדַבֵּר אֵלֶיהָ
  english_pob_choice: you shall say to her
  chosen_spanish: le hablarás
  alternatives_spanish:
  - le dirás
  - hablarás con ella
  lexicon: hablar/decir
  rationale: '''Hablarás'' preserva el mandato directo y suena natural en español; evita sobrecargar con un futuro perifrástico que no aporta sentido adicional.'
- source_word: וִיהִי כְבֹאָהּ
  english_pob_choice: And when she comes
  chosen_spanish: Y cuando ella llegue
  alternatives_spanish:
  - Y cuando venga
  - Y al llegar ella
  lexicon: temporalidad narrativa
  rationale: '''Llegue'' expresa el momento de arribo de forma clara en español y conserva el valor temporal de la construcción hebrea.'
- source_word: וְהִיא מִתְנַכֵּרָה
  english_pob_choice: she will be disguising herself
  chosen_spanish: se estará disfrazando
  alternatives_spanish:
  - se disfrazará
  - irá disfrazada
  - pretenderá ser otra
  lexicon: hitpael de נכר
  rationale: '''Se estará disfrazando'' preserva la progresividad predictiva y la idea de hacerse no reconocible. Mantiene la tensión semántica entre disfraz exterior e identidad oculta sin exagerar con una paráfrasis.'
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto para el nombre divino y se evita el sustituto reverencial en mayúsculas. 'Yahvé' es consistente con la transliteración recomendada y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido oracular de דָּבָר en la consulta
  english_pob_reading: inquire of you concerning
  chosen_spanish_reading: consultar una palabra de parte tuya
  alternative_spanish_readings:
  - pedirte una respuesta
  - consultarte
  rationale: No se reduce la expresión a una pregunta genérica; el contexto profético requiere conservar el matiz de búsqueda de un mensaje/ oráculo.
  doctrine_reference: Uso profético de דָּרַשׁ דָּבָר en narrativas de consulta
- issue: Traducción de מִתְנַכֵּרָה
  english_pob_reading: she will be disguising herself
  chosen_spanish_reading: se estará disfrazando
  alternative_spanish_readings:
  - se disfrazará
  - se hará irreconocible
  rationale: La acción apunta a hacerse no reconocible al llegar. 'Se estará disfrazando' mantiene el valor reflexivo y la progresión en contexto narrativo sin eliminar la ambigüedad de identidad ocultada.
  doctrine_reference: Matiz semántico del hitpael de נכר
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste auditado del inglés en cuanto a formalidad y precisión: ''inquire of you concerning'', ''Thus and thus'', y el matiz de apariencia/disfraz en el verbo final. En español se preserva la misma progresión: consulta oracular, mensaje aún no revelado y llegada con disfraz.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה, coherente con el estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - Se mantiene la fórmula idiomática 'Así y así' para כָּזֹה וְכָזֶה.
  - '''Consultar una palabra'' conserva el valor oracular de la escena.'
  - '''Se estará disfrazando'' intenta reproducir la progresividad del inglés auditado y el sentido reflexivo del hebreo.'
