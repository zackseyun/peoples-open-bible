    rationale: Aunque comprensible, «desde los treinta años y más» suena poco idiomático. «Desde los treinta años en adelante» preserva mejor la idea ascendente del hebreo y coincide con la alternativa ya documentada.
  - severity: medium
    issue: «tabernáculo de reunión» para אֹהֶל מוֹעֵד
    rationale: El hebreo dice literalmente «tienda de reunión», y el inglés POB auditado usa «tent of meeting». «Tabernáculo» introduce una formulación más tradicional que la auditada y menos transparente al original.
