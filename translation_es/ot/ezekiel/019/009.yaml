translation:
  language: es
  text: Lo pusieron en una jaula[a] con ganchos, y lo llevaron al rey de Babilonia; lo llevaron a fortalezas, para que su voz[b] ya no se oyera en los montes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en fortalezas», «en una prisión» o quizá «en obras de asedio»; el término hebreo puede designar fortalezas o lugares asociados con captura o encierro.
    reason: lexical_alternative
  - marker: b
    text: O «su rugido ya no se oyera». El hebreo dice literalmente «su voz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֻהוּ
  english_pob_choice: They put him
  chosen_spanish: Lo pusieron
  alternatives_spanish:
  - Lo colocaron
  - Lo metieron
  lexicon: HALOT
  rationale: El hebreo נתן en secuencia narrativa puede rendirse de forma natural con «poner». Mantiene el acto de introducirlo en cautiverio sin sobrecargar el español.
- source_word: בַסּוּגַר
  english_pob_choice: in a cage
  chosen_spanish: en una jaula
  alternatives_spanish:
  - en un encierro
  - en una prisión
  lexicon: HALOT
  rationale: סּוּגַר designa un recinto de captura; «jaula» preserva mejor la imagen de animal capturado que un término más abstracto como «prisión».
- source_word: בַּחַחִים
  english_pob_choice: with hooks
  chosen_spanish: con ganchos
  alternatives_spanish:
  - con garfios
  - con anillos
  lexicon: HALOT
  rationale: חַחִים puede referirse a ganchos o anillos usados para controlar cautivos o animales. «Ganchos» es conciso y conserva el sentido literal sin precisar más de lo que el hebreo explicita.
- source_word: וַיְבִאֻהוּ אֶל מֶלֶךְ בָּבֶל
  english_pob_choice: and brought him to the king of Babylon
  chosen_spanish: y lo llevaron ante el rey de Babilonia
  alternatives_spanish:
  - y lo condujeron al rey de Babilonia
  - y lo llevaron al rey de Babilonia
  lexicon: HALOT
  rationale: בוא en hifil suele significar «traer/llevar». «Ante el rey de Babilonia» fluye con naturalidad en español y conserva la idea de comparecencia.
- source_word: יְבִאֻהוּ בַּמְּצֹדוֹת
  english_pob_choice: they brought him into strongholds
  chosen_spanish: lo llevaron a fortalezas
  alternatives_spanish:
  - lo llevaron a fortalezas de captura
  - lo llevaron a un encierro
  - lo llevaron a una fortaleza
  lexicon: HALOT
  rationale: מְצֹדוֹת puede denotar fortalezas o lugares de captura/confinamiento. «Fortalezas» mantiene la amplitud léxica y deja abierta la connotación de encierro que el contexto sugiere.
- source_word: לְמַעַן לֹא יִשָּׁמַע קוֹל֛וֹ עוֹד
  english_pob_choice: so that his voice might no longer be heard
  chosen_spanish: para que su voz ya no se oyera
  alternatives_spanish:
  - para que ya no se oyera su voz
  - para que ya no se escuchara su voz
  - para que su rugido ya no se oyera
  lexicon: HALOT
  rationale: קוֹל significa literalmente «voz» o «sonido». Se mantiene «voz» para no estrechar la metáfora a «rugido»; «oírse» es un verbo natural en español para la pasiva impersonal.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  english_pob_choice: on the mountains of Israel
  chosen_spanish: en los montes de Israel
  alternatives_spanish:
  - sobre los montes de Israel
  - en la región montañosa de Israel
  lexicon: HALOT
  rationale: «Montes de Israel» reproduce la expresión profética habitual y conserva el paralelismo geográfico y literario del hebreo.
theological_decisions:
- issue: Registro metafórico del león cautivo
  english_pob_reading: Retain imagery of capture and suppression without explicitly identifying the historical king in the translation.
  chosen_spanish_reading: Conservar la imagen de captura y silenciamiento sin identificar en la traducción a un rey histórico concreto.
  alternative_spanish_readings:
  - Identificar en el texto principal a Joacim o a Joaquín
  - Explicitar la referencia histórica en una nota principal
  rationale: El hebreo mantiene la metáfora sin nombrar al rey. La traducción debe sostener ese registro imagístico y no introducir una identificación histórica que el versículo no expresa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; esta versión sigue el texto hebreo y el rastro auditado en coincidencia alta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece en el versículo.
  - «voz» conserva la literalidad hebrea y deja abierta la lectura metafórica del león.
  - «montes de Israel» sigue la fórmula profética estándar del libro de Ezequiel.
