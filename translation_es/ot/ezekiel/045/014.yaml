base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/014.yaml
  text: And the fixed due of oil shall be one bath of oil from each cor[a], from ten baths, that is, one homer[c][b], for ten baths are one homer.
  footnotes:
  - marker: a
    text: 'Hebrew: ''a tenth of the bath from the cor.'' The verse expresses the oil tribute as one-tenth of a cor/homer, with the following clause explaining that a homer equals ten baths.'
    reason: lexical_alternative
  - marker: b
    text: A bath, cor, and homer are ancient Israelite units of measure; the text itself notes that ten baths equal one homer.
    reason: cultural_note
  - marker: c
    text: Or 'shall be one bath of oil from each cor'.
    reason: previous_rendering
