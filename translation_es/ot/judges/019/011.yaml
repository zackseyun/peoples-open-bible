translation:
  language: es
  text: 'Cuando estaban cerca de Jebús[a], y el día estaba ya muy avanzado[b], el joven[c] dijo a su amo: «Por favor, ven, apartémonos a esta ciudad de los jebuseos y pasemos la noche en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jebús es el nombre antiguo de Jerusalén.
    reason: cross_reference
  - marker: b
    text: 'O: «el día estaba muy avanzado»; «ya era muy tarde».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el joven»; el término también puede designar a un sirviente o asistente según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם עִם יְבוּס
  english_pob_choice: they were near Jebus
  chosen_spanish: estaban cerca de Jebús
  alternatives_spanish:
  - estaban junto a Jebús
  - estaban con Jebús
  lexicon: HALOT
  rationale: En este contexto de viaje, עִם con un topónimo expresa proximidad. «Cerca de» comunica el sentido idiomático con naturalidad en español, sin borrar el nombre antiguo «Jebús» que corresponde al hebreo.
- source_word: יְבוּס
  english_pob_choice: Jebus
  chosen_spanish: Jebús
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: El hebreo conserva el nombre antiguo יְבוּס, no el nombre posterior «Jerusalén». La transliteración «Jebús» preserva la referencia histórica del texto.
- source_word: וְהַיּוֹם רַד מְאֹד
  english_pob_choice: and the day was far spent
  chosen_spanish: y el día estaba ya muy avanzado
  alternatives_spanish:
  - y el día estaba muy gastado
  - y el día estaba muy lejos de terminar
  - y el día estaba ya muy declinado
  lexicon: HALOT
  rationale: רַד expresa el descenso o declive del día hacia la tarde. «Muy avanzado» comunica bien en español la idea temporal de que el día estaba llegando a su fin, sin sonar forzado.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el sirviente
  - el asistente
  lexicon: HALOT
  rationale: נַעַר puede referirse a edad o a condición de servicio. Dado que el texto lo presenta como interlocutor del superior, «el joven» mantiene la forma léxica y deja visible, por el contexto, su papel subordinado.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  lexicon: HALOT
  rationale: En español bíblico «señor» puede reflejar una relación de superioridad sin introducir la connotación posesiva más dura de «amo». Aquí mantiene la relación jerárquica del contexto de viaje.
- source_word: לְכָה נָּא
  english_pob_choice: Please come
  chosen_spanish: Por favor, ven
  alternatives_spanish:
  - Ven, por favor
  - Te ruego que vengas
  lexicon: HALOT
  rationale: El imperativo con נָא expresa ruego cortés. «Por favor, ven» lo reproduce de forma breve y clara en español.
- source_word: וְנָסוּרָה
  english_pob_choice: let us turn aside
  chosen_spanish: apartémonos
  alternatives_spanish:
  - desviémonos
  - vayamos aparte
  - hagamos un desvío
  lexicon: HALOT
  rationale: סוּר en cohortativo indica apartarse de la ruta para entrar en otro lugar. «Apartémonos» conserva la fuerza exhortativa e incluye la idea de desviarse del camino.
- source_word: עִיר הַיְבוּסִי הַזֹּאת
  english_pob_choice: this city of the Jebusites
  chosen_spanish: esta ciudad de los jebuseos
  alternatives_spanish:
  - esta ciudad jebusea
  - esta ciudad de este jebuseo
  lexicon: HALOT
  rationale: El gentilicio colectivo הַיְבוּסִי se refiere al pueblo, no a un individuo. «De los jebuseos» preserva esa lectura colectiva y suena natural en español.
- source_word: וְנָלִין בָּהּ
  english_pob_choice: and spend the night in it
  chosen_spanish: y pasemos la noche en ella
  alternatives_spanish:
  - y pernoctemos en ella
  - y nos alojemos en ella
  lexicon: HALOT
  rationale: לוּן significa alojarse durante la noche. «Pasemos la noche en ella» es una equivalencia natural y directa en español, fiel al matiz de pasar allí la noche.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado de revisión más reciente del POB en inglés, que no introdujo cambios adicionales y mantiene alta concordancia con el texto fuente. Se conservan las mismas tres decisiones léxicas/nota: topónimo antiguo Jebús, idiomática temporal del día, y la ambigüedad de נַעַר.'
  spanish_consistency_notes:
  - Se usa «Jebús» para el topónimo antiguo y no «Jerusalén» en el texto principal.
  - Se mantiene «el joven» para נַעַר, dejando la posible lectura de sirviente en la nota.
  - «Su señor» refleja la relación jerárquica sin cargar el texto con terminología más rígida.
  - La frase verbal final usa un equivalente natural de alojarse por la noche, sin añadir un sentido no presente en el hebreo.
