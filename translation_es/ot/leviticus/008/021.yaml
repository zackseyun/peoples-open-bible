review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: lavado de las partes internas y las patas, quema de todo el carnero sobre el altar, identificación como holocausto, aroma agradable, ofrenda por fuego para Yahvé, y fórmula final de conformidad al mandato divino. Sin embargo, hay un desajuste léxico importante en הַקֶּרֶב: ''intestino'' singular es demasiado estrecho para ''entrails/inner parts'' y no refleja adecuadamente el conjunto de partes internas. También la nota [a] está mal colocada y rompe la fluidez.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'el [a] intestino' suena anatómicamente demasiado específico y poco natural en contexto sacrificial. 'Ofrenda encendida' no es la mejor solución para אִשֶּׁה; en español bíblico y natural resulta más fiel y claro 'ofrenda hecha por fuego'. También conviene mejorar 'para aroma agradable' a 'de aroma agradable' o 'como aroma agradable'; la primera opción suena más idiomática en una cadena nominal sacrificial.
  glossary_alignment: Se preserva correctamente 'Yahvé' para יְהוָה y 'holocausto' para עֹלָה, ambos alineados con el proyecto. La principal excepción es אִשֶּׁה, donde 'ofrenda encendida' no corresponde bien al valor documentado ('food offering' con alternativa 'offering by fire'); en español debe reflejarse mejor como 'ofrenda hecha por fuego'. Para קֶּרֶב, el proyecto inglés eligió 'entrails'; en español 'entrañas' encaja mejor como término principal que 'intestino'.
  issues:
  - severity: high
    issue: '''intestino'' para הַקֶּרֶב es demasiado específico y en singular'
    rationale: El hebreo se refiere a las partes internas/entrañas del animal, no solo a un intestino concreto. La elección reduce el sentido ritual y anatómico del original.
  - severity: medium
    issue: La nota [a] está insertada antes de 'intestino'
    rationale: La colocación 'el [a] intestino' es tipográficamente torpe. El marcador debe anclarse al término correspondiente, p. ej. 'entrañas[a]'.
  - severity: medium
    issue: '''ofrenda encendida'' no expresa bien אִשֶּׁה'
    rationale: La expresión suena poco idiomática y no comunica claramente 'ofrenda hecha por fuego / ofrenda por fuego', que es la alternativa documentada en el rastro inglés.
  - severity: low
    issue: '''para aroma agradable'' es menos natural en español en esta construcción'
    rationale: Aunque comprensible, 'de aroma agradable' suena más idiomático al predicar del holocausto dentro de la serie nominal.
  revised_spanish_text: Lavó las entrañas[a] y las patas con agua, y Moisés quemó todo el carnero sobre el altar. Era un holocausto de aroma agradable, una ofrenda hecha por fuego para Yahvé, tal como Yahvé había mandado a Moisés.
  revised_footnotes:
  - marker: a
    text: O “partes internas” o “vísceras”.
    reason: lexical_alternative
  revision_rationale: Se corrige הַקֶּרֶב a 'entrañas' para reflejar fielmente las partes internas del animal; se recoloca correctamente la nota; se mejora אִשֶּׁה a 'ofrenda hecha por fuego' por fidelidad léxica y naturalidad; y se pule la sintaxis sacrificial a 'holocausto de aroma agradable' y 'tal como' para mejor español sin apartarse del hebreo. No requiere adjudicación adicional porque son ajustes claros de fidelidad y estilo.
