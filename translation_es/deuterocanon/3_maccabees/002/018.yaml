translation:
  language: es
  text: borra nuestros pecados[a], y dispersa nuestros errores[b], y haz resplandecer tu misericordia[c] a esta hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tacha nuestros pecados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «faltas» o «necedades» para ἀμβλακίας.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «haz aparecer tu misericordia» o «muestra tu misericordia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάλειψον
  english_pob_choice: wipe away
  chosen_spanish: borra
  alternatives_spanish:
  - límpianos de
  - borra de un plumazo
  - bórralos
  lexicon: LSJ
  rationale: ἀπαλείφω expresa la acción de borrar o borrar mediante frotamiento/limpieza. En español, «borra» comunica bien la eliminación de la culpa sin sonar forzado; conserva la imagen de quitar lo escrito o manchado.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: LSJ
  rationale: ἁμαρτία se traduce de manera estándar como «pecado». En este contexto de súplica penitencial, «pecados» mantiene con claridad la carga moral y religiosa del término.
- source_word: διασκέδασον
  english_pob_choice: scatter
  chosen_spanish: dispersa
  alternatives_spanish:
  - esparce
  - aleja
  - desvanece
  lexicon: LSJ
  rationale: El verbo conlleva la idea de esparcir o dispersar. «Dispersa» conserva la imagen verbal de separación y desintegración, cercana a «scatter» sin perder naturalidad en español.
- source_word: ἀμβλακίας
  english_pob_choice: errors
  chosen_spanish: errores
  alternatives_spanish:
  - faltas
  - desaciertos
  - necedades
  lexicon: LSJ
  rationale: ἀμβλακία puede abarcar error, fallo o torpeza culpable. «Errores» sigue de cerca la revisión inglesa más reciente y mantiene la diferencia respecto de «pecados», aunque en español también admite una lectura moral, no solo intelectual.
- source_word: ἐπίφανον
  english_pob_choice: let your mercy shine forth
  chosen_spanish: haz resplandecer
  alternatives_spanish:
  - muestra
  - haz aparecer
  - deja brillar
  lexicon: LSJ
  rationale: ἐπιφαίνω tiene un matiz de aparecer y brillar sobre algo. «Haz resplandecer» preserva mejor la imagen epifánica que un simple «muestra», y resulta idiomático en español litúrgico.
- source_word: ἔλεός
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia
  - piedad
  - compasión
  lexicon: LSJ
  rationale: ἔλεος se traduce naturalmente como «misericordia». Esta opción es clara, bíblica y adecuada para una oración de petición divina.
- source_word: κατὰ τὴν ὥραν ταύτην
  english_pob_choice: at this hour
  chosen_spanish: en esta hora
  alternatives_spanish:
  - ahora mismo
  - en este momento
  - a esta hora
  lexicon: LSJ
  rationale: La expresión temporal es directa. «En esta hora» conserva la solemnidad y urgencia del original, con un español natural y culto.
theological_decisions:
- issue: 'Doble terminología para el mal moral: ἁμαρτίας y ἀμβλακίας'
  english_pob_reading: Distinguish 'sins' from 'errors' rather than flattening both into one term.
  chosen_spanish_reading: Distinguir «pecados» de «errores» en vez de repetir solo «pecados».
  alternative_spanish_readings:
  - «pecados» y «faltas»
  - «pecados» y «follías/necedades»
  - unificar ambas expresiones como «pecados»
  rationale: El griego usa dos vocablos distintos, y la traducción española debe conservar esa acumulación retórica. «Errores» mantiene la diferencia sin introducir un tono demasiado coloquial o de mera equivocación intelectual.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Imagen de manifestación de la misericordia
  english_pob_reading: '''let your mercy shine forth'' rather than a flat ''show your mercy''.'
  chosen_spanish_reading: «haz resplandecer tu misericordia» en vez de una formulación plana como «muestra tu misericordia».
  alternative_spanish_readings:
  - «manifiesta tu misericordia»
  - «haz aparecer tu misericordia»
  - «muestra tu misericordia»
  rationale: El verbo griego añade una imagen de aparición luminosa o epifánica. «Haz resplandecer» conserva mejor esa fuerza y evita reducir la petición a una mera exhibición verbal.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
translation_notes:
  revision_awareness: La versión inglesa más reciente afinó ἀμβλακίας de “failings” a “errors” para acercarse más al léxico griego; la propuesta española refleja esa decisión con «errores» y mantiene separada la primera petición con «pecados». También conserva la imagen epifánica de ἐπίφανον mediante «haz resplandecer».
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἔλεος, conforme al uso bíblico común y al registro de plegaria.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino ni κύριος; la oración se dirige implícitamente a Dios.
  - Se conserva el paralelismo imperativo del griego con tres peticiones coordinadas.
  - La puntuación con comas reproduce la acumulación solemne de la súplica.
