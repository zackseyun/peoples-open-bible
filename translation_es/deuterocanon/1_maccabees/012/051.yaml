translation:
  language: es
  text: Y cuando los que los perseguían vieron que era un asunto de vida y muerte para ellos[a], volvieron atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «que era acerca de la vida para ellos»; es un modismo que significa que sus vidas estaban en peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vieron
  alternatives_spanish:
  - habiendo visto
  - viendo
  lexicon: LSJ
  rationale: El participio aoristo se entiende temporalmente. En español, «cuando vieron» expresa con naturalidad el cambio de situación sin sobrecargar la frase con una construcción participial poco idiomática.
- source_word: οἱ διώκοντες
  english_pob_choice: the pursuers
  chosen_spanish: los perseguidores
  alternatives_spanish:
  - los que perseguían
  - los que iban persiguiendo
  lexicon: LSJ
  rationale: El participio articular nombra al grupo en acción. «Los perseguidores» conserva el sentido narrativo y militar, y es más directo que una perífrasis.
- source_word: ὅτι περὶ ψυχῆς ἐστιν αὐτοῖς
  english_pob_choice: that it was a matter of life and death for them
  chosen_spanish: que era un asunto de vida y muerte para ellos
  alternatives_spanish:
  - que sus vidas estaban en peligro
  - que se trataba de su vida
  lexicon: LSJ
  rationale: La expresión περὶ ψυχῆς indica peligro mortal o que la vida está en juego. «Un asunto de vida y muerte» comunica bien la fuerza idiomática en español, sin borrar el matiz literal de ψυχή como «vida» en este contexto.
- source_word: ψυχῆς
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: LSJ
  rationale: Aquí ψυχή no significa «alma» en sentido inmortal, sino la vida física puesta en peligro. «Vida» es la equivalencia adecuada y evita introducir una lectura no sostenida por el contexto.
- source_word: ἐπέστρεψαν
  english_pob_choice: they turned back
  chosen_spanish: dieron media vuelta
  alternatives_spanish:
  - volvieron atrás
  - se volvieron
  lexicon: LSJ
  rationale: En el contexto de una persecución, el verbo indica invertir la dirección del avance. «Dieron media vuelta» es una forma natural en español y conserva la imagen de interrupción de la persecución.
translation_notes:
  revision_awareness: La redacción sigue el sentido del griego y el cauce auditado del inglés POB, pero adapta la última cláusula a un español más natural («dieron media vuelta») para el contexto de persecución, manteniendo intacto el idiomatismo de peligro mortal en la nota.
  spanish_consistency_notes:
  - Se usa «vida» para ψυχή en este modismo, no «alma», porque el contexto es militar y de peligro inmediato.
  - Se evita traducir mecánicamente el participio griego con un gerundio; en español bíblico y narrativo, «cuando vieron» es más claro y fiel al valor temporal.
  - «Perseguidores» conserva el tono narrativo del pasaje y armoniza con el estilo público y readable del POB.
