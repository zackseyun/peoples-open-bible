translation:
  language: es
  text: a los ancianos y a los jueces de cada lugar[a], hasta que la ira de Yahvé sobre este asunto[b] se aparte de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego presenta aquí un fragmento de oración dependiente del versículo anterior; en español se completa de manera fluida el sentido implícito.
    reason: cultural_note
  - marker: b
    text: O “la ira de Yahvé por este asunto”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστου τόπου
  english_pob_choice: of each place
  chosen_spanish: de cada lugar
  alternatives_spanish:
  - de cada localidad
  - de cada pueblo
  - de cada sitio
  lexicon: LSJ
  rationale: La expresión distributiva se conserva de forma natural en español con 'de cada lugar', sin precisar indebidamente si se trata de ciudad, aldea o distrito.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes
  - mayores
  lexicon: LSJ
  rationale: En este contexto administrativo y judicial, 'ancianos' comunica el grupo de autoridad local reconocido. 'Elders' se refleja de manera transparente y entendible en español bíblico actual.
- source_word: κριτάς
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - funcionarios
  lexicon: LSJ
  rationale: El contexto legal favorece 'jueces', que es directo y claro en español. 'Magistrados' sería más interpretativo.
- source_word: ἕως τοῦ λῦσαι
  english_pob_choice: until ... is turned away
  chosen_spanish: hasta que ... se aparte
  alternatives_spanish:
  - hasta que ... sea quitada
  - hasta que ... sea alejada
  - hasta que ... se retire
  lexicon: LSJ
  rationale: Con 'ira' como objeto, 'se aparte' expresa bien el cese o alejamiento del enojo divino en español natural, manteniendo la idea de fin del juicio sin sobretraducir 'λύω' de forma mecánica.
- source_word: ὀργὴν Κυρίου
  english_pob_choice: the anger of the Lord
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - la ira del Señor
  - el enojo de Yahvé
  lexicon: LSJ
  rationale: 'Se sigue el estándar del proyecto para יהוה/YHWH: ''Yahvé'' en el texto principal. ''Ira'' conserva la fuerza de ὀργή y es una equivalencia tradicional y precisa en este contexto de juicio divino.'
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - alejada de nosotros
  - apartada de nosotros
  lexicon: LSJ
  rationale: La preposición expresa separación desde la comunidad; 'de nosotros' es la forma española más directa en esta construcción con 'se aparte'.
- source_word: τοῦ πράγματος τούτου
  english_pob_choice: over this matter
  chosen_spanish: por este asunto
  alternatives_spanish:
  - sobre este asunto
  - a causa de este asunto
  - con respecto a este asunto
  lexicon: LSJ
  rationale: La frase griega señala la ocasión o causa del enojo divino. 'Por este asunto' comunica de manera natural esa relación causal en español, sin fijar una interpretación más estrecha de la que el texto requiere.
theological_decisions:
- issue: Traducción del nombre divino κύριος en un contexto griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el audit trail inglés usa 'Lord' por convención, el estándar del proyecto pide 'Yahvé' para יהוה / YHWH en el texto español principal. En este versículo, 'κύριος' remite al Dios de Israel, por lo que la traducción transparente es 'Yahvé'.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / project default for YHWH → Yahvé'
- issue: Valor semántico de ὀργή aplicado a Dios
  english_pob_reading: anger
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - enojo
  - furor
  rationale: '''Ira'' mantiene el peso judicial y teológico de ὀργή en un contexto de corrección divina. ''Enojo'' sería más suave; ''furor'' más intenso. ''Ira'' equilibra fidelidad semántica y claridad.'
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó como ancla primaria el griego de Swete; el audit trail inglés confirma el sentido distributivo de 'each place', el cierre por alejamiento de la ira divina, y la dependencia sintáctica respecto del versículo previo. Se evitó seguir mecánicamente el inglés cuando la redacción española podía expresar con más naturalidad la relación causal de τοῦ πράγματος τούτου.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según el estándar del proyecto para YHWH.
  - '''Ancianos'' y ''jueces'' conservan el registro administrativo/judicial del original.'
  - '''Ira'' traduce ὀργή sin diluir el matiz de juicio divino.'
  - La frase se redactó como una cláusula fluida en español, aunque el griego sea un fragmento dependiente del contexto previo.
