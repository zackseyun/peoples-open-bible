    rationale: El hebreo en contexto funerario apunta a expresar condolencia/simpatía; 'consolar' es posible como alternativa, pero el POB inglés escogió un sentido más amplio. En español, 'mostrarles simpatía' no es ideal idiomáticamente; 'mostrarles condolencia' o 'compadecerte de ellos' serían mejores, pero la construcción más natural en la secuencia es 'ni mostrarles condolencia'.
  - severity: medium
