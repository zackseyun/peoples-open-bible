revisions:
- from: ¿Se ha olvidado Dios de ser misericordioso? ¿Ha encerrado en su enojo[a] su compasión? Selah[b]
  to: ¿Se ha olvidado Dios de mostrar su gracia? ¿Ha cerrado en su enojo su compasión? Selah[a][b]
  rationale: Se ajusta חַנּוֹת a «mostrar su gracia» para reflejar el matiz documentado de gracia/favor, se mejora la naturalidad de קָפַץ con «ha cerrado», y se reemplaza la nota léxica por una que sí preserve las alternativas significativas del POB inglés. No se requiere adjudicación adicional porque la corrección es directa y bien sustentada por la evidencia fuente y el audit trail.
