translation:
  language: es
  text: Pero Menelao retenía el cargo[a], y no tomó ninguna medida en absoluto con respecto al dinero que había prometido al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «no pagó nada del dinero que había prometido al rey». El griego dice literalmente que «no puso en orden» o «no dispuso nada» con respecto al dinero prometido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μενέλαος
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  alternatives_spanish:
  - Menelao
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma castellana estándar, sin introducir variantes innecesarias.
- source_word: τῆς μὲν ἀρχῆς
  english_pob_choice: the office
  chosen_spanish: el cargo
  alternatives_spanish:
  - el oficio
  - la autoridad
  - la posición
  lexicon: LSJ
  rationale: En este contexto se trata de una función o cargo que Menelao conserva; «cargo» comunica bien la idea de un puesto oficial sin sonar demasiado técnico en español. «Oficio» es posible, pero puede sonar más eclesiástico o arcaizante.
- source_word: ἐκράτει
  english_pob_choice: held on to
  chosen_spanish: seguía reteniendo
  alternatives_spanish:
  - retenía
  - mantenía
  - seguía poseyendo
  lexicon: LSJ
  rationale: El imperfecto sugiere continuidad; «seguía reteniendo» refleja que no solo lo tuvo, sino que continuaba en posesión de ese cargo. Mantiene además la tensión adversativa del contexto.
- source_word: ἐπηγγελμένων
  english_pob_choice: had promised
  chosen_spanish: había prometido
  alternatives_spanish:
  - había ofrecido
  - había comprometido
  lexicon: LSJ
  rationale: El participio remite a una promesa previa hecha al rey. «Había prometido» es la forma más natural y fiel en español.
- source_word: χρημάτων
  english_pob_choice: money
  chosen_spanish: el dinero
  alternatives_spanish:
  - los fondos
  - las sumas de dinero
  lexicon: LSJ
  rationale: El término se refiere aquí a una cantidad monetaria concreta debida al rey; «el dinero» es claro y suficientemente preciso en español.
- source_word: οὐδὲν εὐτάκτει
  english_pob_choice: made no provision at all
  chosen_spanish: no hizo ninguna provisión en absoluto
  alternatives_spanish:
  - no dispuso nada en absoluto
  - no tomó ninguna medida en absoluto
  - no puso nada por orden
  lexicon: LSJ
  rationale: El verbo literalmente apunta a poner en orden o disponer; en este contexto significa que no preparó nada para cumplir con el pago prometido. «No hizo ninguna provisión en absoluto» conserva la idea de preparación/disposición sin exagerar hacia el acto explícito de pagar.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «made no provision» sobre «made no arrangement» para reflejar mejor οὐδὲν εὐτάκτει; por eso el español usa «no hizo ninguna provisión en absoluto», manteniendo el sentido de preparación o disposición y no solo de pago directo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otros términos no pertinentes; el verso no contiene léxico divino.
  - «Cargo» se eligió por naturalidad en español; «oficio» queda recogido en la nota como alternativa posible si se quisiera resaltar más el matiz institucional.
  - La partícula adversativa inicial se traduce con «Pero» para reflejar ὁ δὲ.
  - La nota conserva la tensión lexical entre preparación/disposición y pago efectivo, siguiendo la cautela del audit trail inglés.
