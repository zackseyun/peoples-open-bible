translation:
  language: es
  text: Porque los desenlaces de una generación injusta son graves[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la descendencia de los injustos» o «un linaje malvado». El griego γενεᾶς puede denotar generación, línea familiar o grupo de descendientes.
    reason: alternative_reading
lexical_decisions:
- source_word: γενεᾶς
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - descendencia
  - linaje
  - prole
  lexicon: LSJ
  rationale: γενεά puede referirse a una generación, una línea familiar o un grupo de descendientes. En español, 'generación' conserva el sentido colectivo y moral del texto sin fijar de más una lectura biológica.
- source_word: ἀδίκου
  english_pob_choice: unrighteous
  chosen_spanish: injusta
  alternatives_spanish:
  - impía
  - malvada
  - injusta
  lexicon: LSJ
  rationale: ἀδίκου abarca 'injusto' y 'inmoral'. En español, 'injusta' mantiene la fuerza ética del adjetivo y evita hacerla sonar solo forense o solo devocional.
- source_word: χαλεπὰ
  english_pob_choice: grievous
  chosen_spanish: graves
  alternatives_spanish:
  - duros
  - dolorosos
  - severos
  - terribles
  lexicon: LSJ
  rationale: χαλεπὰ expresa dureza, severidad o carácter penoso. 'Graves' reproduce la seriedad del resultado con naturalidad en español y sin añadir matices no presentes.
- source_word: τὰ τέλη
  english_pob_choice: the ends
  chosen_spanish: los fines
  alternatives_spanish:
  - los finales
  - los desenlaces
  - los resultados
  lexicon: LSJ
  rationale: El plural τέλη conviene conservarlo como plural en español. 'Los fines' mantiene la forma plural y puede abarcar el sentido de desenlaces o destinos finales.
theological_decisions:
- issue: Posible sentido de γενεᾶς como 'generación' frente a 'descendencia/linaje'
  english_pob_reading: an unrighteous generation
  chosen_spanish_reading: una generación injusta
  alternative_spanish_readings:
  - la descendencia de los injustos
  - un linaje impío
  rationale: El griego permite un matiz genealógico, pero la formulación transmitida es compacta y colectiva. 'Una generación injusta' conserva la ambigüedad útil del texto y no fuerza una doctrina hereditaria que el verso no explicita.
  doctrine_reference: Preservar la tensión lexical sin resolverla de antemano; mantener abiertas las opciones semánticas documentadas.
translation_notes:
  revision_awareness: La traducción sigue de cerca el griego de Swete (γενεᾶς γὰρ ἀδίκου χαλεπὰ τὰ τέλη) y coincide sustancialmente con el rastro auditado en inglés. Se conserva el plural de τέλη y la ambigüedad de γενεᾶς, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa 'generación' para γενεά/γενεᾶς cuando el contexto es colectivo y moral.
  - Se evita 'SEÑOR' u otra sustitución de nombre divino porque este verso no contiene el nombre divino.
  - '''Injusta'' se prefiere aquí a ''impía'' para reflejar con sobriedad el campo semántico de ἀδίκου.'
  - El plural 'los fines' conserva el número del griego y la posibilidad de leer 'desenlaces' sin explicitarlo en el texto principal.
