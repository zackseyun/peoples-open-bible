translation:
  language: es
  text: 'Entonces la mujer dijo[a]: «¿Por qué has ideado tal cosa contra el pueblo de Dios? Pues al decir esta palabra, el rey es como uno culpable[b], ya que el rey no ha hecho volver a su desterrado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué has pensado/ideado tal cosa contra el pueblo de Dios?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el rey es como uno culpable»; es decir, su propio juicio implica culpa por no hacer volver al desterrado.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָשַׁבְתָּה
  english_pob_choice: have you devised
  chosen_spanish: has ideado
  alternatives_spanish:
  - has pensado
  - has planeado
  lexicon: HALOT
  rationale: חשב puede significar pensar, planear o idear. En este reproche directo, «has ideado» conserva la intención deliberada y la fuerza acusatoria sin sonar mecánico en español.
- source_word: כָּזֹאת
  english_pob_choice: such a thing
  chosen_spanish: tal cosa
  alternatives_spanish:
  - así
  - de este modo
  lexicon: HALOT
  rationale: El demostrativo apunta a la acción insinuada por la lógica de la parábola. «Tal cosa» es natural en español y mantiene el tono de reprensión.
- source_word: עַל עַם אֱלֹהִים
  english_pob_choice: against the people of God
  chosen_spanish: contra el pueblo de Dios
  alternatives_spanish:
  - respecto del pueblo de Dios
  - sobre el pueblo de Dios
  lexicon: HALOT
  rationale: Con חשב y על, el contexto es adversativo. «Contra» refleja mejor la acusación que «respecto de» o «sobre».
- source_word: וּמִדַּבֵּר הַמֶּלֶךְ הַדָּבָר הַזֶּה
  english_pob_choice: For by speaking this word, the king
  chosen_spanish: Pues al hablar esta palabra, el rey
  alternatives_spanish:
  - Y al hablar esta palabra, el rey
  - Porque al hablar esta palabra, el rey
  lexicon: HALOT
  rationale: La preposición con el infinitivo introduce la circunstancia o causa. «Pues al hablar esta palabra» suena natural en español y conserva la relación causal/circunstancial.
- source_word: כְּאָשֵׁם
  english_pob_choice: is as one who is guilty
  chosen_spanish: queda como uno culpable
  alternatives_spanish:
  - es como uno culpable
  - queda como culpable
  lexicon: HALOT
  rationale: El כ comparativo no exige una declaración jurídica absoluta. «Queda como uno culpable» conserva la comparación y la implicación de culpa sin borrarla.
- source_word: לְבִלְתִּי הָשִׁיב
  english_pob_choice: has not brought back
  chosen_spanish: no ha hecho volver
  alternatives_spanish:
  - no ha traído de vuelta
  - no ha restaurado
  lexicon: HALOT
  rationale: שוב en Hiphil significa «hacer volver» o «traer de vuelta». «No ha hecho volver» respeta la concreción del verbo y funciona bien con una persona desterrada.
- source_word: נִדְּחוֹ
  english_pob_choice: his banished one
  chosen_spanish: su desterrado
  alternatives_spanish:
  - su expulsado
  - el que fue desterrado
  lexicon: HALOT
  rationale: El participio pasivo de נדח denota a alguien arrojado fuera o desterrado. «Su desterrado» mantiene el singular y la referencia implícita a Absalón sin explicitarla en exceso.
theological_decisions:
- issue: Alcance de la expresión «pueblo de Dios»
  english_pob_reading: Retain the covenantal phrase 'the people of God' without narrowing it to Absalom alone or broadening it into an abstract theological claim.
  chosen_spanish_reading: Conservar «el pueblo de Dios» como expresión de pacto, sin reducirla a Absalón ni convertirla en una generalización abstracta.
  alternative_spanish_readings:
  - contra Israel
  - contra la casa real y Absalón
  rationale: El hebreo dice explícitamente 'pueblo de Dios'. En contexto apunta a la comunidad del pacto afectada por la situación del hijo desterrado; la traducción debe preservar esa amplitud.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente afinó el valor de חשב hacia una forma más cercana a «idear» y prefirió una lectura causal/circunstancial de la construcción con מִדַּבֵּר; la presente versión refleja ese ajuste con un español natural y formal. También conserva el matiz comparativo de כְּאָשֵׁם y el valor concreto de הָשִׁיב como «hacer volver».
  spanish_consistency_notes:
  - Se mantiene «pueblo de Dios» para עַם אֱלֹהִים, conforme al texto hebreo y al audit trail.
  - Se evita «Cristo» u otra terminología no presente; el pasaje no la requiere.
  - Se conserva el matiz de comparación en כְּאָשֵׁם mediante «como uno culpable», sin convertirlo en una declaración absoluta.
  - «Su desterrado» traduce el singular de נִדְּחוֹ y deja abierta la referencia implícita al hijo de David.
