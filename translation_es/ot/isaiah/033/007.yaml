translation:
  language: es
  text: ¡Miren, sus héroes[a] claman afuera[b]! Los mensajeros de paz lloran amargamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֶרְאֶלָּם es incierto; puede significar 'sus valientes' o 'sus héroes', o más literalmente algo como 'sus hombres Ariel' o 'sus leones de Dios'.
    reason: lexical_alternative
  - marker: b
    text: O 'embajadores de paz' / 'enviados de paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La partícula introduce una observación enfática. '¡Miren!' conserva el tono exhortativo y de llamada de atención en un español natural y solemne.
- source_word: אֶרְאֶלָּם
  english_pob_choice: their heroes
  chosen_spanish: sus héroes
  alternatives_spanish:
  - sus valientes
  - sus campeones
  - sus guerreros
  lexicon: HALOT
  rationale: El término es incierto y debatido. En el contexto de lamento nacional y derrumbe público, 'héroes' comunica bien la idea de figuras fuertes o notables sin forzar una glosa demasiado técnica.
- source_word: צָעֲקוּ
  english_pob_choice: cry out
  chosen_spanish: claman
  alternatives_spanish:
  - gritan
  - dan voces
  - claman de angustia
  lexicon: HALOT
  rationale: El verbo expresa un grito de angustia. 'Claman' mantiene dignidad literaria y transmite tanto intensidad como aflicción.
- source_word: חֻצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en el exterior
  lexicon: HALOT
  rationale: La revisión inglesa evitó especificar 'streets' y volvió a la noción más directa de exterioridad. 'Afuera' refleja bien esa fuerza sin añadir una localización no explícita.
- source_word: מַלְאֲכֵי שָׁלוֹם
  english_pob_choice: the messengers of peace
  chosen_spanish: los mensajeros de paz
  alternatives_spanish:
  - los embajadores de paz
  - los enviados de paz
  lexicon: HALOT
  rationale: '''Mensajeros'' preserva el rango amplio de מַלְאָך como enviado/mensajero, y ''paz'' conserva el sustantivo abstracto sin convertirlo en una fórmula diplomática más estrecha de lo que exige el hebreo.'
- source_word: מַר
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - con amargura
  - amargamente
  lexicon: HALOT
  rationale: El adverbio intensifica el llanto. 'Amargamente' es natural en español y reproduce la cualidad emocional del original.
- source_word: יִבְכָּיוּן
  english_pob_choice: weep
  chosen_spanish: lloran
  alternatives_spanish:
  - llorarán
  - están llorando
  lexicon: HALOT
  rationale: El imperfecto profético/poético puede sonar presente vívido en español. 'Lloran' mantiene la inmediatez poética de la escena sin endurecerla como futuro obligatorio.
theological_decisions:
- issue: Sentido incierto de אֶרְאֶלָּם
  english_pob_reading: human heroes/valiant men rather than a title for angels or a place-name
  chosen_spanish_reading: héroes humanos o campeones, no un título angélico ni un nombre de lugar
  alternative_spanish_readings:
  - sus Arieles
  - sus leones de Dios
  - sus valientes
  rationale: La línea siguiente habla de mensajeros de paz y el contexto describe derrumbe político y llanto público. Por eso se mantiene la lectura humana y bélica, dejando la ambigüedad lexical abierta sin convertirla en una explicación doctrinal.
  doctrine_reference: Isaías 33:7; nota lexical sin implicación doctrinal directa
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió 'outside' en vez de una localización más específica como 'in the streets'. Se conservó además la lectura contextual de 'heroes' y 'messengers of peace', manteniendo auditable la incertidumbre de אֶרְאֶלָּם mediante nota.
  spanish_consistency_notes:
  - Se usó 'mensajeros de paz' de forma consistente con el POB inglés, evitando sustituirlo por un equivalente eclesiástico más estrecho sin necesidad contextual.
  - Se prefirió 'afuera' para reflejar חוצה con la misma amplitud que la revisión inglesa.
  - Se mantuvo un registro poético y moderno, sin recurrir a 'he aquí' como fórmula obligatoria.
  - La puntuación conserva el paralelismo hebreo con dos miembros y punto y coma.
