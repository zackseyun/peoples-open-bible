translation:
  text: 'For what was most astonishing was this: in the water that extinguishes everything[a], the fire had even greater power, for the world fights on behalf of the righteous.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the universe is a champion of the righteous' or 'creation is the defender of the righteous.'
