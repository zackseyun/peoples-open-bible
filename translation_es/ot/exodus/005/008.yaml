review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: mantiene la idea de una cuota prescrita de ladrillos, la prohibición de reducirla, la acusación de Faraón de que el pueblo está ocioso, y el clamor: «Vayamos a sacrificar a nuestro Dios». También conserva adecuadamente la alternativa idiomática para תְּמוֹל שִׁלְשֹׁם mediante nota. Sin embargo, hay dos ajustes de fidelidad/idiomaticidad: (1) «la impondréis sobre ellos» suena calcado; el hebreo idiomático תָּשִׂימוּ עֲלֵיהֶם se expresa mejor en español como «se la impondréis» o «les impondréis». (2) La nota [a] está mal anclada: debe ir junto a «ayer y antes de ayer», no al final de la cita directa, porque comenta esa expresión temporal.'
  spanish_quality_summary: 'El español es claro y digno, pero «la impondréis sobre ellos» resulta poco natural en español bíblico actual y puede mejorarse sin perder fuerza. El resto fluye bien: «cuota», «no la disminuiréis en nada», «ociosos» y «claman» son legibles y fieles. También conviene mover la nota al lugar pertinente para una presentación editorial limpia.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para אֱלֹהֵינוּ es correcto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas principales concuerdan con el expediente inglés, salvo la formulación española de תָּשִׂימוּ עֲלֵיהֶם, que debe ajustarse a un español más natural manteniendo el valor de «imponer».
  issues:
  - severity: medium
    issue: Calco poco natural en «la impondréis sobre ellos»
    rationale: Aunque reproduce literalmente la preposición hebrea, en español suena forzado. «Se la impondréis» comunica mejor la carga administrativa/coercitiva reconocida en el expediente inglés.
  - severity: medium
    issue: Ubicación incorrecta de la nota [a]
    rationale: La nota explica «ayer y antes de ayer», pero el marcador aparece al final de «a nuestro Dios». Debe anclarse en la expresión temporal para cumplir la disciplina editorial del proyecto.
  revised_spanish_text: 'Y la cuota de ladrillos que ellos hacían ayer y antes de ayer[a], se la impondréis; no la disminuiréis en nada, porque están ociosos. Por eso claman, diciendo: «Vayamos a sacrificar a nuestro Dios».'
  revised_footnotes:
