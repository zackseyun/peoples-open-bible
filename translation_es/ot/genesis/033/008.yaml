translation:
  language: es
  text: 'Y dijo: «¿Qué quieres decir con[a] todo este campamento que encontré?» Y dijo: «Para hallar favor[b] a los ojos de mi señor.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué significa todo este campamento?». La frase hebrea es idiomática y pregunta por el propósito o sentido de la comitiva.'
    reason: alternative_reading
  - marker: b
    text: Heb. «para hallar favor en los ojos de mi señor», un modismo para obtener una disposición favorable o benevolencia.
    reason: cultural_note
lexical_decisions:
- source_word: מִי לְךָ
  english_pob_choice: What do you mean by
  chosen_spanish: ¿Qué significa
  alternatives_spanish:
  - ¿Qué quieres decir con
  - ¿Qué es esto para ti
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pregunta por el propósito o sentido de la acción, no por identidad. En español, «¿Qué significa...?» comunica bien esa intención interrogativa sin sonar forzado.
- source_word: כָּל הַמַּחֲנֶה הַזֶּה
  english_pob_choice: all this camp
  chosen_spanish: todo este campamento
  alternatives_spanish:
  - toda esta compañía
  - todo este grupo
  lexicon: HALOT
  rationale: מַחֲנֶה significa literalmente «campamento» y el contexto puede abarcar la procesión o el conjunto de animales y personas que Jacob envió delante. «Campamento» conserva la metáfora básica y es natural en español.
- source_word: אֲשֶׁר פָּגָשְׁתִּי
  english_pob_choice: that I met
  chosen_spanish: que encontré
  alternatives_spanish:
  - que me topé con
  - que encontré al pasar
  lexicon: HALOT
  rationale: פָּגַשׁ expresa «encontrar/encounter». «Encontré» es breve y fiel, y funciona bien dentro de la pregunta sobre el grupo que Esau vio.
- source_word: לִמְצֹא חֵן
  english_pob_choice: To find favor
  chosen_spanish: Para hallar favor
  alternatives_spanish:
  - Para ganar favor
  - Para encontrar gracia
  lexicon: HALOT
  rationale: La construcción infinitiva expresa propósito. «Hallar favor» mantiene el valor idiomático de la frase y evita un calco excesivamente duro.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la estima de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de evaluación o valoración personal. «Ante los ojos de» es idiomático en español y preserva el giro del texto.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor amo
  - señor
  lexicon: HALOT
  rationale: Es un tratamiento deferente dirigido a Esaú, no un título divino. «Mi señor» mantiene la relación social y el tono respetuoso del original.
theological_decisions:
- issue: Tratamiento deferente "אֲדֹנִי" como forma social, no título divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - Señor
  - mi amo
  rationale: El contexto muestra una fórmula de cortesía entre Jacob y Esaú. Traducirlo como «mi señor» conserva la deferencia sin introducir connotación divina.
  doctrine_reference: Uso contextual de títulos honoríficos; distinción entre lenguaje humano de respeto y el nombre divino.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefería una pregunta más directa sobre el propósito. En español se optó por una formulación natural equivalente («¿Qué significa...?») sin perder el valor idiomático de מִי לְךָ. También se conservó la tensión entre «campamento» y la posible referencia a una comitiva, reflejada en la nota.
  spanish_consistency_notes:
  - Se usa «mi señor» para אֲדֹנִי, en línea con el tratamiento deferente contextual y no como título divino.
  - «Hallar favor» conserva la expresión idiomática de לִמְצֹא חֵן.
  - Se mantiene «campamento» para מַחֲנֶה, con nota para la posible referencia ampliada a la comitiva o grupo.
