revisions:
- from: No los expulsaré de delante de ti en un solo año[a], no sea que la tierra quede desolada y las fieras del campo se multipliquen contra ti[b].
  to: No los expulsaré de delante de ti en un solo año[a], no sea que la tierra quede desolada y los animales salvajes del campo[b] se multipliquen contra ti.
  rationale: Se conserva la estructura y el sentido del borrador, pero se corrige la nota temporal para que sea una alternativa real y no repita la lectura principal. También se reemplaza «las fieras del campo» por «los animales salvajes del campo» para reflejar mejor חית השדה y la decisión léxica inglesa, dejando en nota las alternativas españolas más tradicionales o estilísticamente marcadas.
