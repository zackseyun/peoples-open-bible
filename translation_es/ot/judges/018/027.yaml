revisions:
- from: Así que tomaron lo que había hecho Micaías[a], junto con el sacerdote que le pertenecía, y llegaron contra Lais, contra un pueblo tranquilo y seguro. Los hirieron con el filo de la espada, y la ciudad la incendiaron con fuego.
  to: Así que tomaron lo que había hecho Micaías, junto con el sacerdote que le pertenecía, y vinieron contra Lais, contra un pueblo tranquilo y seguro. Los atacaron con el filo de la espada[a], e incendiaron la ciudad con fuego.
  rationale: Se corrigió el anclaje de la nota al pie para que coincida con la expresión que explica. Se sustituyó «los hirieron» por «los atacaron» para mantener la fuerza narrativa sin afirmar más de lo que el hebreo exige. También se mejoró la fluidez idiomática con «vinieron contra Lais» y «e incendiaron la ciudad con fuego», preservando el sentido y la estructura del original.
