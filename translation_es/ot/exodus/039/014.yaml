    reason: lexical_alternative
  - marker: b
    text: O 'grabados de sello' / 'inscripciones de sello'. La expresión se refiere al modo de grabado, como inscripciones hechas al estilo de un sello.
    reason: lexical_alternative
  revision_rationale: Se corrigió 'talladas como engaste de sello' a 'grabadas como sello' para reflejar con precisión que el hebreo describe el tipo de grabado, no la montura de la piedra. También se ajustó la nota correspondiente para conservar las alternativas léxicas de forma idiomática en español.
