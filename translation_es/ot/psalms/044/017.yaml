translation:
  language: es
  text: a causa de la voz[a] de quien reprocha y blasfema, a causa[b] del enemigo y del vengador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el sonido de»; la expresión hebrea puede conservar una imagen acústica más literal.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la presencia del enemigo y del vengador»; es un modismo que aquí significa «a causa de» o «por culpa de».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: because of the voice of
  chosen_spanish: a causa de la voz de
  alternatives_spanish:
  - por la voz de
  - desde el sonido de
  lexicon: HALOT
  rationale: El hebreo usa מִן con קוֹל para expresar causa u ocasión, no mera separación espacial. «A causa de la voz de» conserva la imagen concreta de la voz y hace explícito el valor causal en español.
- source_word: מְחָרֵף
  english_pob_choice: the one who reproaches
  chosen_spanish: quien reprocha
  alternatives_spanish:
  - el que reprocha
  - el injuriador
  lexicon: HALOT
  rationale: El participio comunica una acción característica. «Quien reprocha» es natural en español y mantiene el valor participial sin endurecerlo innecesariamente.
- source_word: וּמְגַדֵּף
  english_pob_choice: and blasphemes
  chosen_spanish: y blasfema
  alternatives_spanish:
  - y ultraja
  - y maldice
  lexicon: HALOT
  rationale: גדף puede ir más allá del mero insulto y adquirir una fuerza religiosa de desprecio impío. «Blasfema» preserva esa carga en el contexto de un salmo hostil.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - ante
  lexicon: HALOT
  rationale: Aunque literalmente es «de la presencia de», aquí funciona idiomáticamente como causa u ocasión. «A causa de» reproduce bien el sentido ya aclarado por el audit trail inglés.
- source_word: אֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo representativo o colectivo. «El enemigo» es la equivalencia más directa y natural en español.
- source_word: וּמִתְנַקֵּם
  english_pob_choice: and the avenger
  chosen_spanish: y el vengador
  alternatives_spanish:
  - y el que se venga
  - y el que toma venganza
  lexicon: HALOT
  rationale: El hitpael participial de נקם describe a quien ejerce venganza. «El vengador» es conciso, idiomático y conserva la fuerza personal del participio.
theological_decisions:
- issue: La fuerza de גדף entre insulto y blasfemia
  english_pob_reading: blasphemes
  chosen_spanish_reading: blasfema
  alternative_spanish_readings:
  - ultraja
  - revilece
  rationale: En este salmo el habla hostil tiene peso teológico, no solo social. «Blasfema» mantiene la posibilidad de una ofensa contra Dios, en línea con la lectura inglesa.
  doctrine_reference: Translation philosophy §1, §3
- issue: El valor idiomático de מִפְּנֵי como causalidad
  english_pob_reading: because of
  chosen_spanish_reading: a causa de
  alternative_spanish_readings:
  - por
  - debido a
  rationale: El hebreo literalmente dice «de la presencia de», pero el sentido en contexto es causal. La traducción española debe decirlo con claridad sin perder la base hebrea.
  doctrine_reference: Principio de equivalencia óptima y transparencia textual
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente, que simplificó «one who» a una forma más natural sin perder la referencia participial. También conserva la resolución causal de מִן / מִפְּנֵי y mantiene la carga fuerte de גדף con «blasfema».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar del proyecto, pero este versículo no lo contiene explícitamente.
  - Se prefirió «blasfema» frente a opciones más débiles para no diluir la tensión teológica documentada en el audit trail.
  - Las notas a y b corresponden a alternativas lexicales del hebreo y están ancladas en el texto con marcadores únicos en orden.
