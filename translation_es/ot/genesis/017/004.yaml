translation:
  language: es
  text: En cuanto a mí[a], he aquí, mi alianza es contigo, y llegarás a ser padre de una multitud de naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo—he aquí, mi alianza es contigo». El pronombre inicial y la partícula son enfáticos en hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serás padre de una multitud de naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo
  - Por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. En español, «En cuanto a mí» reproduce bien ese contraste discursivo sin volver la frase rígida o antinatural.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí, mira
  - he aquí
  lexicon: HALOT
  rationale: La partícula señala y destaca lo que sigue. «He aquí» conserva el tono solemne y deíctico del hebreo en un registro bíblico natural para español.
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: Aunque «covenant» suele corresponder a «pacto» o «alianza», «pacto» es una equivalencia fiel y comprensible; además conserva el peso jurídico-teológico del término en Génesis.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - conmigo y contigo
  lexicon: HALOT
  rationale: El valor básico es relacional y directo. «Contigo» es más natural en español que una expansión como «entre mí y tú», que el hebreo no expresa explícitamente.
- source_word: וְהָיִיתָ
  english_pob_choice: and you will become
  chosen_spanish: y llegarás a ser
  alternatives_spanish:
  - y serás
  - y te convertirás en
  lexicon: HALOT
  rationale: La forma verbal expresa futuro con resultado/transformación. «Llegarás a ser» transmite bien el matiz de entrada en un nuevo rol, sin exagerar el cambio como conversión metafórica.
- source_word: לְאָב
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - el padre de
  - un padre de
  lexicon: HALOT
  rationale: En español, el artículo no es necesario; el contexto ya define la función prometida. «Padre de» mantiene la relación nominal y evita añadir precisión inexistente en el hebreo.
- source_word: הֲמוֹן
  english_pob_choice: a multitude of
  chosen_spanish: una multitud de
  alternatives_spanish:
  - un gran número de
  - una muchedumbre de
  lexicon: HALOT
  rationale: El sustantivo denota gran cantidad o masa. «Una multitud de» preserva la fuerza cuantitativa y la conexión lexical con el versículo siguiente.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: Aquí designa pueblos/naciones en sentido amplio. «Naciones» es la opción más precisa y evita introducir el sentido técnico posterior de «gentiles».
theological_decisions:
- issue: Forma enfática de la apertura divina
  english_pob_reading: Render the opening as an emphatic declaration without over-expanding the Hebrew.
  chosen_spanish_reading: «En cuanto a mí, he aquí» conserva la insistencia del pronombre y la partícula de atención.
  alternative_spanish_readings:
  - «Yo, he aquí»
  - «Por mi parte, he aquí»
  rationale: El hebreo pone énfasis en la primera persona y llama la atención sobre la afirmación que sigue. La redacción elegida mantiene esa tensión retórica en un español fluido.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación pactual y promesa sobre Abraham
  english_pob_reading: '''my covenant is with you, and you will become the father of a multitude of nations.'''
  chosen_spanish_reading: «mi pacto es contigo, y llegarás a ser padre de una multitud de naciones».
  alternative_spanish_readings:
  - «estoy haciendo mi pacto contigo, y serás padre de una multitud de naciones»
  - «mi pacto está contigo, y serás progenitor de muchas naciones»
  rationale: El hebreo presenta una declaración pactual y una consecuencia prometida. La traducción evita ampliar a categorías teológicas no explícitas, pero conserva el valor covenantal y la vocación de Abraham como figura originaria de muchas naciones.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se incorporaron revisiones textuales adicionales; el texto hebreo base y el audit trail inglés muestran alto acuerdo y ninguna variante textual relevante para este versículo.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְרִית, en línea con la terminología bíblica estándar y con el peso técnico del contexto abrahámico.
  - Se usa «naciones» para גּוֹיִם y no «gentiles», porque aquí el referente es amplio y aún no técnico.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton; el texto habla en primera persona divina.
  - El registro es solemne pero natural para español bíblico contemporáneo.
