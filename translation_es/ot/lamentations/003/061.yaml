translation:
  language: es
  text: Has oído su afrenta[a], oh Yahvé, todos sus planes contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «todos sus pensamientos acerca de mí». El sustantivo hebreo puede significar «pensamientos» o «planes»; en este contexto probablemente se refiere a maquinaciones hostiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ
  english_pob_choice: You have heard
  chosen_spanish: Tú has oído
  alternatives_spanish:
  - Tú oíste
  - Has escuchado
  lexicon: HALOT
  rationale: El perfecto qal 2ms de שׁמע expresa una acción ya cumplida con vigencia presente en la súplica; en español, el pretérito perfecto compuesto («has oído») conserva bien ese valor. Se antepone el pronombre para mantener el tono directo de oración.
- source_word: חֶרְפָּתָם
  english_pob_choice: their reproach
  chosen_spanish: su afrenta
  alternatives_spanish:
  - su reproche
  - su oprobio
  - su insulto
  lexicon: HALOT
  rationale: חֶרְפָּה abarca vergüenza, escarnio y agravio verbal. «Afrenta» comunica el daño de honor y la ofensa pública de modo natural en español, sin limitarlo solo a un insulto puntual. Se conserva el singular colectivo como en el hebreo y en la lectura inglesa.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto, y se añade la interjección vocativa «oh» para reflejar el apóstrofe del hebreo y del inglés «O Yahweh».
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: כָּל modifica un sustantivo plural; en español, el plural «todos» reproduce con naturalidad el valor distributivo/colectivo del original.
- source_word: מַחְשְׁבֹתָם
  english_pob_choice: their schemes
  chosen_spanish: sus planes
  alternatives_spanish:
  - sus pensamientos
  - sus designios
  - sus proyectos
  lexicon: HALOT
  rationale: El sustantivo puede significar «pensamientos», «planes» o «artificios». En contexto hostil («contra mí»), «planes» preserva la fuerza de la intención adversaria sin sonar demasiado interpretativo como «artificios» ni demasiado neutral como «pensamientos».
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - acerca de mí
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: El valor adversativo de עַל en este contexto se expresa con claridad mediante «contra mí», que reproduce de forma directa la oposición implícita en el hebreo y en la lectura inglesa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Se conserva la transliteración del nombre propio divino «Yahvé», evitando la sustitución tradicional por un título. La interjección vocativa mantiene el sentido de invocación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el paso de revisión más reciente: no se requirieron cambios adicionales según el informe de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en el texto principal.
  - Se traduce el vocativo con «oh» para conservar el apóstrofe del original.
  - «Afrenta» y «planes» preservan la tensión semántica entre vergüenza pública e intención hostil.
  - No se usa «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
