revisions:
- from: Él y sus siervos se dividieron contra ellos[a] de noche, los derrotó y los persiguió hasta Joba[b], que está al norte de Damasco.
  to: Él y sus siervos se dividieron contra ellos[a] de noche, los abatieron y los persiguieron hasta Hobá[b], que está al norte de Damasco.
  rationale: Se corrigió la discordancia verbal para reflejar el sujeto compuesto del hebreo («Él y sus siervos … los abatieron … los persiguieron»). Se sustituyó «los derrotó» por «los abatieron» para preservar mejor la fuerza concreta de וַיַּכֵּם, en línea con la decisión inglesa «struck them down». Se reemplazó «Joba» por «Hobá» para mantener de forma más fiel el topónimo חוֹבָה/Hobah sin una adaptación ortográfica innecesaria. Se conservaron las notas existentes porque siguen siendo pertinentes y están correctamente ancladas.
