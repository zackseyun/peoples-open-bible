base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/005.yaml
  text: And Ahab said to Obadiah[a], “Go through the land to all the springs of water and to all the wadis. Perhaps we may find grass and keep horse and mule alive[b], so that we do not have to destroy any of the livestock.”
  footnotes:
  - marker: a
    text: Or “the streams.” The Hebrew word can denote a wadi, torrent-bed, or stream; in this drought setting, “wadis” best reflects the likely sense of seasonal watercourses.
    reason: lexical_alternative
  - marker: b
    text: Literally “cut off from the livestock.” The expression likely means reducing the number of animals, probably because there is not enough fodder to keep them alive.
    reason: lexical_alternative
