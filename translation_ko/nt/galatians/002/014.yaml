    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 그들이 복음의 진리를 따라 바르게 걷지 않는 것을 내가 보았을 때, 나는 모든 사람 앞에서 게바에게 말했습니다. 「당신이 유대인이면서 이방인처럼 살고 유대인처럼 살지 않으면서, 어떻게 이방인들에게 유대인처럼 살도록 강요합니까?」
  philosophy: optimal-equivalence
