translation:
  language: es
  text: Aram comerciaba contigo a causa de la abundancia de tus productos, dando turquesa[a], púrpura, telas bordadas, lino fino, coral[b] y rubíes[c] por tus mercancías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esmeralda' o 'carbunclo'; la identificación de la piedra preciosa hebrea es incierta.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente otro material de lujo, como 'madreperla'; el sentido exacto del término hebreo es incierto.
    reason: lexical_alternative
  - marker: c
    text: O 'ágata', 'granate' u otra piedra preciosa; la identificación exacta del término hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo sin imponer una etiqueta geopolítica moderna. En este contexto comercial, puede aludir al territorio o a sus mercaderes, pero 'Aram' mantiene la designación original.
- source_word: סֹחַרְתֵּךְ
  english_pob_choice: traded with you
  chosen_spanish: traficaba contigo
  alternatives_spanish:
  - comerciaba contigo
  - hacía negocios contigo
  lexicon: HALOT
  rationale: El participio comercial expresa actividad de intercambio. 'Traficaba contigo' conserva la idea de comercio en una forma natural en español, sin perder el vínculo con la relación mercantil.
- source_word: מֵרֹב מַעֲשָׂיִךְ
  english_pob_choice: because of your many products
  chosen_spanish: a causa de la abundancia de tus productos
  alternatives_spanish:
  - por la abundancia de tus obras
  - a causa de tus muchas mercancías
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'de la abundancia de tus obras'. En el contexto de Tiro como centro comercial, 'productos' comunica bien la producción/mercancía sin volver el texto demasiado literal o oscuro.
- source_word: נֹפֶךְ
  english_pob_choice: turquoise
  chosen_spanish: turquesa
  alternatives_spanish:
  - esmeralda
  - carbunclo
  lexicon: HALOT
  rationale: Se mantiene la identificación propuesta en el texto inglés, pero en español 'turquesa' es el término más natural. La incertidumbre léxica se conserva en la nota.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tinte púrpura
  lexicon: HALOT
  rationale: El término alude al material/color de lujo asociado al comercio. 'Púrpura' es la forma breve y fiel en una lista de bienes.
- source_word: רִקְמָה
  english_pob_choice: embroidered cloth
  chosen_spanish: telas bordadas
  alternatives_spanish:
  - bordados
  - obra bordada
  lexicon: HALOT
  rationale: El sustantivo refiere trabajo textil bordado; 'telas bordadas' hace explícito que se trata de mercancía y suena natural en español.
- source_word: בּוּץ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - byssus
  lexicon: HALOT
  rationale: Se conserva la referencia a un tejido fino y comercialmente valioso. 'Lino fino' es claro y idiomático.
- source_word: רָאמֹת
  english_pob_choice: coral
  chosen_spanish: coral
  alternatives_spanish:
  - madreperla
  - otro material de lujo
  lexicon: HALOT
  rationale: El término es raro y de identificación incierta. Se sigue la lectura inglesa principal y se marca la incertidumbre con nota.
- source_word: כַדְכֹּד
  english_pob_choice: rubies
  chosen_spanish: rubíes
  alternatives_spanish:
  - ágata
  - granate
  - berilo
  lexicon: HALOT
  rationale: Se adopta la gema preciosa propuesta en el texto inglés para la lista de mercancías de lujo. La identificación exacta sigue siendo incierta, por lo que se documenta en la nota.
- source_word: נָתְנ֖וּ
  english_pob_choice: giving
  chosen_spanish: dando
  alternatives_spanish:
  - dieron
  - entregando
  lexicon: HALOT
  rationale: El verbo פשוט 'dieron' funciona bien en español, pero el gerundio 'dando' enlaza con la lista de bienes y refleja el valor de intercambio continuado en la frase.
- source_word: בְּעִזְבוֹנָיִךְ
  english_pob_choice: for your wares
  chosen_spanish: por tus mercancías
  alternatives_spanish:
  - por tus bienes
  - en intercambio por tus mercancías
  lexicon: HALOT
  rationale: El término designa bienes/mercancía de intercambio. 'Mercancías' es preciso y natural en el registro comercial del pasaje.
