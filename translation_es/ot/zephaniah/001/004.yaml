translation:
  language: es
  text: Y extenderé mi mano contra Judá y contra todos los habitantes de Jerusalén, y cortaré de este lugar el remanente de Baal, el nombre[a] de los sacerdotes idólatras[b] junto con los sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la memoria de los sacerdotes idólatras». La expresión hebrea «el nombre de los sacerdotes idólatras» es un modismo para eliminar incluso su recuerdo.
    reason: lexical_alternative
  - marker: b
    text: «Sacerdotes idólatras» traduce כְּמָרִים, un término para sacerdotes paganos o sincréticos, distinguido aquí de los sacerdotes ordinarios.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָטִיתִי יָדִי
  english_pob_choice: I will stretch out my hand
  chosen_spanish: extenderé mi mano
  alternatives_spanish:
  - alzaré mi mano
  - extenderé la mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de acción judicial decisiva. En español, «extenderé mi mano» conserva la imagen corporal sin sonar forzado, y comunica adecuadamente el acto de juicio anunciado.
- source_word: עַל יְהוּדָה וְעַל כָּל יוֹשְׁבֵי יְרוּשָׁלָם
  english_pob_choice: against Judah and against all the inhabitants of Jerusalem
  chosen_spanish: contra Judá y contra todos los habitantes de Jerusalén
  alternatives_spanish:
  - sobre Judá y sobre todos los que habitan en Jerusalén
  lexicon: HALOT
  rationale: El valor adversativo de עַל en este contexto se expresa naturalmente con «contra». «Habitantes» reproduce bien יוֹשְׁבֵי en un contexto cívico.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - destruiré
  - arrasaré
  lexicon: HALOT
  rationale: «Cortaré» preserva la fuerza verbal de כרת y su tono judicial/covenantal. En español suena más cercano al hebreo que una paráfrasis como «destruiré».
- source_word: מִן הַמָּקוֹם הַזֶּה
  english_pob_choice: from this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - de aquí
  lexicon: HALOT
  rationale: «De este lugar» mantiene la referencia deíctica sin restringir indebidamente el alcance. En el contexto puede aludir a Jerusalén o a la tierra inmediata.
- source_word: שְׁאָר הַבַּעַל
  english_pob_choice: the remnant of Baal
  chosen_spanish: el resto de Baal
  alternatives_spanish:
  - el remanente de Baal
  - lo que queda de Baal
  lexicon: HALOT
  rationale: שְׁאָר denota resto o remanente. «El resto de Baal» es una forma sobria y comprensible en español, y conserva la compresión del hebreo.
- source_word: שֵׁם הַכְּמָרִים
  english_pob_choice: the name of the idolatrous priests
  chosen_spanish: el nombre de los sacerdotes idólatras
  alternatives_spanish:
  - el nombre de los kemarim
  - la memoria de los sacerdotes idólatras
  lexicon: HALOT
  rationale: La POB en inglés conserva «the name of» como idiomático para borrar hasta el recuerdo. En español, «el nombre de» mantiene esa imagen. «Sacerdotes idólatras» expone el valor semántico de כְּמָרִים sin transliteración innecesaria.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los sacerdotes comunes
  lexicon: HALOT
  rationale: כֹּהֲנִים es el término ordinario para sacerdotes. «Los sacerdotes» mantiene la distinción con los כְּמָרִים, que aquí se entienden como sacerdotes idólatras o sincréticos.
theological_decisions:
- issue: Distinción entre כְּמָרִים y כֹּהֲנִים
  english_pob_reading: Render כְּמָרִים as 'idolatrous priests' and כֹּהֲנִים as 'priests' to preserve the contrast between pagan/syncretistic clergy and the ordinary priestly class.
  chosen_spanish_reading: Traducir כְּמָרִים como «sacerdotes idólatras» y כֹּהֲנִים como «sacerdotes» para mantener el contraste entre un grupo cultual corrupto y el sacerdocio ordinario.
  alternative_spanish_readings:
  - Traducir ambos como «sacerdotes»
  - Transliterar כְּמָרִים como «kemarim»
  rationale: El versículo distingue deliberadamente dos grupos. Mantener la diferencia evita aplanar la denuncia profética. La transliteración sería menos clara para la lectura pública en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Fuerza de שֵׁם הַכְּמָרִים
  english_pob_reading: Retain 'the name of' in the main text rather than paraphrasing to 'memory of' or 'mention of'.
  chosen_spanish_reading: Conservar «el nombre de» en el texto principal como eco del idioma hebreo de borrado total de memoria.
  alternative_spanish_readings:
  - la memoria de los sacerdotes idólatras
  - toda mención de los sacerdotes idólatras
  rationale: En español, «el nombre de» es entendible y conserva la imagen de eliminación completa, no solo de las personas sino de su reputación y recuerdo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente del texto fuente en inglés: no hay cambios posteriores aplicados y la evaluación cruzada informó alta concordancia con observaciones menores בלבד.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto inmediato; aquí no ocurre.
  - Se usa «sacerdotes» para כֹּהֲנִים y «sacerdotes idólatras» para כְּמָרִים, preservando la distinción léxica.
  - «El nombre de» se conserva literalmente como idioma de juicio total, con nota explicativa para lectores hispanohablantes.
  - El tono es formal y apto para lectura pública, sin recurrir a calcos innecesarios ni a terminología eclesiástica tradicional no sustentada por el hebreo.
