translation:
  language: es
  text: y vigila al león[a], y anda en tinieblas; y siempre que hurta y arrebata e irrumpe para robar[b], lo lleva a su amada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira al león» u «observa al león». El verbo griego puede indicar mirar atentamente u observar; el contexto favorece un sentido más intencional de vigilancia.
    reason: lexical_alternative
  - marker: b
    text: El verbo final (κλωποδυτήσῃ) se refiere de manera específica al robo furtivo, especialmente mediante allanamiento; por eso se traduce «irrumpe para robar».
    reason: lexical_alternative
  - marker: c
    text: O «su amante» o «la mujer que ama». τῇ ἐρωμένῃ denota una mujer amada en sentido romántico.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  english_pob_choice: watches for
  chosen_spanish: mira
  alternatives_spanish:
  - observa
  - vigila
  - mira atentamente
  lexicon: LSJ
  rationale: El verbo puede significar mirar con atención u observar. En español, «mira» con el contexto de conducta furtiva conserva la idea básica y deja que el complemento y la secuencia verbal aporten la intención vigilante, sin forzar una paráfrasis demasiado interpretativa.
- source_word: λέοντα
  english_pob_choice: the lion
  chosen_spanish: al león
  alternatives_spanish:
  - a un león
  lexicon: LSJ
  rationale: El griego lleva artículo definido. «Al león» conserva esa marcación y suena natural en español dentro de la serie narrativa.
- source_word: ἐν σκότει βαδίζει
  english_pob_choice: walks in darkness
  chosen_spanish: anda en tinieblas
  alternatives_spanish:
  - camina en tinieblas
  - anda en la oscuridad
  - camina en la oscuridad
  lexicon: LSJ
  rationale: «Tinieblas» mantiene el tono bíblico y la fuerza semántica de σκότος mejor que «oscuridad», sin perder inteligibilidad. «Anda» es natural y menos rígido que «camina» en este contexto.
- source_word: κλέψῃ
  english_pob_choice: steals
  chosen_spanish: hurta
  alternatives_spanish:
  - roba
  - comete hurto
  - toma secretamente
  lexicon: LSJ
  rationale: La forma subordinada general pide un verbo simple y corriente. «Hurta» conserva el matiz de sustracción clandestina con un registro sobrio y claro.
- source_word: ἁρπάσῃ
  english_pob_choice: snatches
  chosen_spanish: arrebata
  alternatives_spanish:
  - despoja
  - se apodera de
  - rapta
  lexicon: LSJ
  rationale: «Arrebata» transmite la fuerza y rapidez del verbo griego mejor que opciones más jurídicas o más específicas.
- source_word: κλωποδυτήσῃ
  english_pob_choice: breaks in
  chosen_spanish: entra a hurtadillas
  alternatives_spanish:
  - irrumpe para robar
  - se mete por la fuerza
  - comete robo con allanamiento
  lexicon: LSJ
  rationale: El verbo raro alude a robo furtivo, especialmente con allanamiento. «Entra a hurtadillas» mantiene la idea de acceso sigiloso y delictivo sin usar un tecnicismo legal que endurecería el ritmo del versículo.
- source_word: τῇ ἐρωμένῃ
  english_pob_choice: his beloved
  chosen_spanish: su amada
  alternatives_spanish:
  - su amante
  - la mujer amada
  - su querida
  lexicon: LSJ
  rationale: La expresión griega denota una mujer amada en sentido romántico. «Su amada» conserva esa relación afectiva con dignidad y sin añadir una connotación sexual no exigida por el contexto.
- source_word: ἀποφέρει
  english_pob_choice: he brings it to
  chosen_spanish: lo lleva a
  alternatives_spanish:
  - lo trae a
  - se lo lleva a
  - lo conduce a
  lexicon: LSJ
  rationale: El verbo significa llevar o traer algo hacia alguien. Dado el paralelo con los actos previos de sustracción, «lo lleva a» comunica bien el traslado del botín a la persona amada.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el audit trail inglés. No se adoptaron cambios revisados posteriores porque el pass más reciente indica que el texto quedó sin cambios. Se mantuvo la tensión léxica entre mirar/observar, el matiz de robo furtivo de κλωποδυτήσῃ y la referencia afectiva-romántica de τῇ ἐρωμένῃ.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Tinieblas» se emplea por su fuerza semítica y por coherencia con registros bíblicos en español.
  - Se mantuvo un nivel de literalidad moderada para respetar la secuencia verbal del griego y la nota lexical del audit trail.
