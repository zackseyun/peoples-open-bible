base_translation:
  language: en
  yaml_path: translation/ot/jonah/004/008.yaml
  text: When the sun rose[a], God appointed a scorching east wind, and the sun beat down on Jonah’s head so that he grew faint. And he asked that he might die, and said[b], “My death is better than my life.”
  footnotes:
