review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura disyuntiva del griego y conserva los cuatro cargos principales: locura en medio del festejo, profecía falsa, vida injusta y perjurio. Sin embargo, hay dos puntos a reparar para reflejar mejor la evidencia y la audit trail inglesa: (1) la puntuación y sintaxis iniciales (''Pues, ya sea que...'') resultan torpes e incompletas en español para ἢ γὰρ ... ἢ ... ἢ ...; (2) ''juran falsos juramentos rápidamente'' es poco idiomático y suena calcado, cuando el griego ἐπιορκοῦσιν ταχέως expresa mejor ''perjuran/juran en falso rápidamente o sin vacilar''.'
  spanish_quality_summary: La legibilidad es aceptable, pero el inicio es pesado y la frase final suena antinatural. 'Mientras hacen fiesta' funciona, aunque 'mientras festejan' fluye mejor. 'Profetizan mentiras' y 'viven injustamente' son buenos. El verso necesita una redacción más natural y digna en español e incorporar las alternativas que el inglés preservó en notas.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La decisión de ἀδίκως como ''injustamente'' está bien alineada. La principal cuestión léxica es estilística: ἐπιορκοῦσιν debe mantenerse con lenguaje de juramento/perjurio, pero en español conviene evitar ''falsos juramentos'' como objeto redundante si la frase queda rígida.'
  issues:
  - severity: medium
    issue: 'Apertura sintáctica poco natural: ''Pues, ya sea que...'''
    rationale: El griego usa una serie de 'o bien... o...' explicativos con γὰρ; en español, 'Pues, o bien...' o 'Porque o bien...' refleja mejor la coordinación que 'ya sea que', que pide una construcción distinta.
  - severity: medium
    issue: '''Juran falsos juramentos rápidamente'' suena calcado y poco idiomático'
    rationale: Aunque intenta preservar la explicitud del juramento, la combinación es redundante en español. ἐπιορκοῦσιν se expresa mejor como 'juran en falso' o 'perjuran'; el matiz de ταχέως puede conservarse con 'rápidamente' o mejor 'sin vacilar/prontamente'.
  - severity: low
    issue: Faltan notas para alternativas léxicas preservadas en el inglés
    rationale: El English POB conserva alternativas para la primera y última cláusulas. Dado que el español también tiene opciones legítimas ('mientras festejan' / 'enloquecen' y 'juran en falso' / 'perjuran'), conviene reflejarlas en notas para mantener la trazabilidad auditada.
  revised_spanish_text: Pues o bien, mientras festejan[a], enloquecen; o profetizan mentiras; o viven injustamente; o juran en falso[b] rápidamente.
