  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y el sentido general del hebreo: contraste entre el impío derribado por su propio mal y el justo que halla refugio en su muerte. También preserva correctamente la ambigüedad teológica de בְּמוֹתוֹ con ''en su muerte''. Sin embargo, las notas están desalineadas con los anclajes y una nota introduce una lectura incorrecta.'
  spanish_quality_summary: El español principal es natural, digno y legible. 'Por su maldad', 'el impío' y 'el justo' funcionan bien en registro sapiencial. 'Es arrojado' es posible, aunque algo más brusco que 'es expulsado' o 'es derribado'; no es necesario cambiarlo. El problema principal es editorial y de fidelidad en las notas, no de fluidez del texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impío' y 'justo' son elecciones contextualmente adecuadas para רָשָׁע / צַדִּיק. Se conserva la tensión de 'en su muerte' sin añadir 'esperanza', en línea con la decisión teológica auditada.
  issues:
  - severity: high
    issue: La nota [c] está anclada a 'es arrojado' pero explica erróneamente 'literalmente, es arrojado en su muerte'.
    rationale: En el expediente inglés, la nota c corresponde a בְּמוֹתוֹ ('en su muerte'), no a יִדָּחֶה. Tal como está, mezcla dos segmentos distintos y atribuye al verbo una frase que pertenece al complemento final.
  - severity: medium
    issue: Falta una nota para la alternativa de וְחֹסֶה ('halla refugio' / 'se refugia').
    rationale: El English POB conserva explícitamente la alternativa 'takes refuge'. La revisión española debe preservarla también, especialmente porque el proyecto pide mantener alternativas significativas documentadas.
  - severity: low
    issue: La nota [b] sobre 'impío' no refleja una alternativa preservada por el POB inglés y no es necesaria como nota al lector.
    rationale: Aunque 'malvado' es una alternativa léxica válida, el expediente inglés no la elevó a nota. Mantenerla no sería grave, pero en un sistema de notas limitado conviene reservarlas para alternativas documentadas o ambigüedades relevantes.
  revised_spanish_text: Por su maldad[a], el impío es arrojado, pero el justo halla[b] refugio en su muerte[c].
