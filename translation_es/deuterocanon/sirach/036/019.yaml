translation:
  language: es
  text: Según la bendición de Aarón sobre tu pueblo[a], todos los que están en la tierra sabrán que tú eres el Señor[b], el Dios de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «para tu pueblo» o «acerca de tu pueblo». La frase griega puede entenderse en relación con la bendición que Aarón pronuncia sobre Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «el Dios eterno». El griego dice más literalmente: «el Dios de los siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - conforme a
  lexicon: LSJ
  rationale: La preposición con acusativo expresa conformidad o correspondencia; 'según' comunica naturalmente esa relación en español sin añadir interpretación.
- source_word: εὐλογίαν
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición sacerdotal
  - benedicción
  lexicon: LSJ
  rationale: En contexto de oración y pronunciamiento litúrgico, 'bendición' es la equivalencia más natural y fiel; 'benedicción' suena más técnica y menos común.
- source_word: Ἀαρὼν
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: transliteración tradicional
  rationale: Se usa la forma hispana establecida del nombre propio bíblico.
- source_word: περὶ τοῦ λαοῦ σου
  english_pob_choice: over your people
  chosen_spanish: sobre tu pueblo
  alternatives_spanish:
  - por tu pueblo
  - acerca de tu pueblo
  lexicon: LSJ
  rationale: '''Sobre'' conserva la imagen de la bendición pronunciada sobre el pueblo, que es la intención señalada en el audit trail inglés; también mantiene la ambigüedad benigna del griego sin reducirla a un solo matiz.'
- source_word: γνώσονται
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: LSJ
  rationale: El futuro simple expresa bien el conocimiento resultante y es idiomático en español; 'sabrán' transmite el hecho de reconocer o llegar a saber.
- source_word: πάντες οἱ ἐπὶ τῆς γῆς
  english_pob_choice: all those on the earth
  chosen_spanish: todos los que están sobre la tierra
  alternatives_spanish:
  - todos los habitantes de la tierra
  - todos los de la tierra
  lexicon: LSJ
  rationale: La forma elegida preserva la amplitud del griego sin estrecharlo indebidamente a una fórmula técnica; además reproduce con claridad la relación espacial de ἐπὶ τῆς γῆς.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: LSJ
  rationale: Aunque el proyecto prefiere 'Yahvé' para el nombre divino cuando corresponde, aquí el audit trail griego y el uso de κύριος como título divino justifican 'el Señor' para mantener la correspondencia directa con el texto fuente y la fluidez litúrgica del pasaje.
- source_word: ὁ θεὸς τῶν αἰώνων
  english_pob_choice: the God of the ages
  chosen_spanish: el Dios de los siglos
  alternatives_spanish:
  - el Dios de las edades
  - el Dios eterno
  lexicon: LSJ
  rationale: '''Siglos'' conserva la imagen temporal plural de αἰώνων sin convertirla de inmediato en una paráfrasis doctrinal como ''eterno''; mantiene la amplitud del texto griego.'
theological_decisions:
- issue: Cómo verter Κύριος en un contexto que alude al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: En este versículo el inglés POB ya decidió 'Lord' para κύριος. Dado que el texto griego no contiene יהוה explícito sino κύριος, y dado el contexto litúrgico de una proclamación universal, 'el Señor' conserva la lectura del audit trail sin introducir una decisión de nombre divino no atestiguada directamente por el griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: La expresión ὁ θεὸς τῶν αἰώνων
  english_pob_reading: the God of the ages
  chosen_spanish_reading: el Dios de los siglos
  alternative_spanish_readings:
  - el Dios eterno
  - el Dios de la eternidad
  rationale: Se preserva la metáfora temporal plural del griego. 'El Dios de los siglos' es más transparente que una paráfrasis como 'eterno' y evita borrar la tensión poética del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el pasaje se mantiene sin cambios respecto del audit trail inglés, y no se identifican revisiones aplicadas en el expediente fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Aarón' como forma bíblica estable en español.
  - Se conserva 'el Señor' para κύριος en coherencia con el audit trail inglés y con la lectura titulada del texto griego.
  - '''Dios'' se usa para θεός, y ''siglos'' preserva la pluralidad temporal de αἰώνων sin añadir una paráfrasis doctrinal.'
  - Las notas al pie reflejan las alternativas semánticas documentadas en el expediente inglés y añaden solo el mínimo necesario para el español.
