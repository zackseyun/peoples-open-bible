translation:
  language: es
  text: Ella se apresuró, vació su cántaro en el bebedero[a], y corrió otra vez al pozo para sacar agua, y sacó para todos sus camellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vertió su cántaro en el bebedero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  english_pob_choice: She quickly
  chosen_spanish: apresuró el paso
  alternatives_spanish:
  - se apresuró
  - fue rápida
  lexicon: HALOT
  rationale: El hebreo expresa prontitud en la acción. En español, 'apresuró el paso' comunica esa rapidez de manera natural y narrativa, sin volverlo demasiado interpretativo.
- source_word: וַתְּעַר
  english_pob_choice: emptied
  chosen_spanish: vació
  alternatives_spanish:
  - derrמó
  - vertió
  lexicon: HALOT
  rationale: El verbo aquí indica vaciar el contenido del cántaro. 'Vació' conserva la idea de verter sin añadir matices innecesarios.
- source_word: כַּדָּהּ
  english_pob_choice: her jar
  chosen_spanish: su cántaro
  alternatives_spanish:
  - su jarro
  - su vasija
  lexicon: HALOT
  rationale: כַּד designa un recipiente para agua; 'cántaro' es un equivalente natural en español bíblico y moderno, más preciso que 'jarra' en este contexto.
- source_word: הַשֹּׁקֶת
  english_pob_choice: the trough
  chosen_spanish: el bebedero
  alternatives_spanish:
  - el abrevadero
  - el trough
  lexicon: HALOT
  rationale: El recipiente recibe agua para los camellos. 'Bebedero' comunica bien la función en español; 'abrevadero' también sería posible, pero 'bebedero' resulta más general y claro para lectores amplios.
- source_word: וַתָּרָץ עוֹד
  english_pob_choice: ran again
  chosen_spanish: corrió otra vez
  alternatives_spanish:
  - volvió a correr
  - corrió de nuevo
  lexicon: HALOT
  rationale: עוֹד añade repetición. 'Corrió otra vez' reproduce con naturalidad esa reiteración de acción.
- source_word: הַבְּאֵר
  english_pob_choice: the well
  chosen_spanish: el pozo
  alternatives_spanish:
  - el manantial
  lexicon: HALOT
  rationale: Aunque בְּאֵר puede traducirse 'pozo' o 'cisterna/pozo excavado', en este relato 'pozo' es el equivalente más directo y claro en español.
- source_word: לִשְׁאֹב
  english_pob_choice: to draw water
  chosen_spanish: para sacar agua
  alternatives_spanish:
  - para extraer agua
  - para sacar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de sacar agua del pozo. 'Sacar agua' es idiomático y conserva el sentido sin forzar un giro técnico.
- source_word: וַתִּשְׁאַב
  english_pob_choice: drew
  chosen_spanish: sacó
  alternatives_spanish:
  - siguió sacando
  - extrajo
  lexicon: HALOT
  rationale: El verbo repite la acción de sacar agua. En español, 'sacó' mantiene la secuencia narrativa y evita una repetición excesiva del mismo verbo.
- source_word: לְכָל גְּמַלָּיו
  english_pob_choice: for all his camels
  chosen_spanish: para todos sus camellos
  alternatives_spanish:
  - para cada uno de sus camellos
  lexicon: HALOT
  rationale: כָּל expresa totalidad. 'Para todos sus camellos' conserva esa amplitud de manera directa y fiel al contexto.
translation_notes:
  revision_awareness: El texto inglés auditado eliminó el sujeto repetido antes de 'drew' para mayor fluidez; el español sigue esa misma economía narrativa con 'y sacó para todos sus camellos', manteniendo el sujeto implícito sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo del hebreo.
  - '''Yahvé'' no aparece en este versículo; no se aplica la convención del nombre divino aquí.'
  - '''Camellos'' se conserva literalmente por el contexto inmediato del relato.'
  - El par 'pozo / sacar agua' preserva la dinámica de ida y vuelta del versículo.
