translation:
  language: es
  text: Al segundo día dieron una vuelta a la ciudad y regresaron al campamento[a][b]. Así hicieron durante seis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rodearon la ciudad una vez».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Así hicieron seis días», es decir, este patrón se repitió durante seis días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  english_pob_choice: they went around
  chosen_spanish: dieron una vuelta alrededor
  alternatives_spanish:
  - rodearon
  - fueron alrededor
  lexicon: HALOT
  rationale: סבב expresa ir alrededor o rodear. «Dieron una vuelta alrededor» comunica el movimiento de forma natural en español y conserva la idea de circunvalar sin añadir un matiz militar que el hebreo no exige.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el pueblo
  lexicon: HALOT
  rationale: עִיר normalmente significa «ciudad». En el contexto de Jericó, «la ciudad» es el equivalente directo y claro.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: On the second day
  chosen_spanish: Al segundo día
  alternatives_spanish:
  - En el segundo día
  - Al día segundo
  lexicon: HALOT
  rationale: La frase temporal es directa. «Al segundo día» es natural en español y mantiene la secuencia narrativa.
- source_word: פַּעַם אַחַת
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una sola vez
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «una vez». «Una vez» es el equivalente idiomático y conciso en español.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: and returned
  chosen_spanish: y regresaron
  alternatives_spanish:
  - y volvieron
  lexicon: HALOT
  rationale: שוב significa regresar/volver. «Regresaron» mantiene el flujo narrativo y resulta ligeramente más formal que «volvieron».
- source_word: הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al campamento militar
  - al campamento
  lexicon: HALOT
  rationale: מַחֲנֶה es «campamento». En español la preposición queda expresada naturalmente con «al campamento».
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: כֹּה introduce una conclusión resumida o una repetición del patrón. «Así» conserva ese valor resumitivo con naturalidad en español.
- source_word: עָשׂוּ
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - procedieron
  lexicon: HALOT
  rationale: עשה es el verbo general «hacer/haber hecho». Aquí la referencia es al patrón de acción repetido; «hicieron» es la forma más directa y natural.
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: for six days
  chosen_spanish: durante seis días
  alternatives_spanish:
  - por seis días
  - seis días
  lexicon: HALOT
  rationale: El hebreo expresa duración en un marco de repetición. «Durante seis días» comunica mejor la duración del patrón que un mero «seis días».
translation_notes:
  revision_awareness: 'La redacción sigue el hebreo de manera cercana, pero adopta una equivalencia óptima para la fluidez del español. Se conserva la estructura narrativa de dos acciones principales: circunvalar la ciudad, volver al campamento, y luego resumir el patrón repetido durante seis días. Se refleja la revisión inglesa que reemplazó una formulación más explicativa por «Thus they did», mediante «Así hicieron».'
  spanish_consistency_notes:
  - Se mantiene «campamento» para מַחֲנֶה, coherente con el sentido militar/narrativo del pasaje.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - No se introduce terminología teológica adicional porque el versículo es narrativo y no doctrinal.
  - Se preserva la ambigüedad leve de פַּעַם אַחַת con «una vez», sin sobreexplicar en el texto principal.
