translation:
  language: es
  text: 'Al presentar[a] alimento contaminado sobre mi altar. Pero ustedes dicen: «¿Cómo te hemos contaminado?» Al decir[c][b]: «La mesa de Yahvé es despreciada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «pan», pero en contexto sacrificial se refiere más ampliamente al alimento presentado sobre el altar.
    reason: lexical_alternative
  - marker: b
    text: O «¿Cómo te hemos profanado?». El hebreo dirige la acusación a Dios con «te», expresando que el desprecio de su altar es un agravio contra él mismo.
    reason: alternative_reading
  - marker: c
    text: «La mesa de Yahvé» es una metáfora del altar y de su servicio sacrificial.
    reason: cultural_note
lexical_decisions:
- source_word: מַגִּישִׁים
  english_pob_choice: By presenting
  chosen_spanish: Al presentar
  alternatives_spanish:
  - Ustedes presentan
  - Presentando
  lexicon: HALOT
  rationale: El participio hifil funciona aquí de manera adverbial y explicativa, enlazando la acusación con el contexto anterior. «Al presentar» conserva esa fuerza causal/explanatoria en un español natural.
- source_word: עַל מִזְבְּחִי
  english_pob_choice: on my altar
  chosen_spanish: sobre mi altar
  alternatives_spanish:
  - en mi altar
  - encima de mi altar
  lexicon: HALOT
  rationale: La preposición expresa ubicación sobre la superficie del altar. «Sobre mi altar» es fiel y idiomático.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque en contexto sacrificial puede abarcar más que pan horneado, el hebreo dice literalmente «pan». En español, «pan» mantiene el vínculo léxico con el texto fuente sin oscurecer que se trata de una ofrenda cultual.
- source_word: מְגֹאָל
  english_pob_choice: defiled
  chosen_spanish: contaminado
  alternatives_spanish:
  - profanado
  - impuro
  lexicon: HALOT
  rationale: El término expresa contaminación ritual/moral. «Contaminado» comunica bien esa idea en español moderno y conserva la gravedad del reproche.
- source_word: בַּמֶּה גֵאַלְנוּךָ
  english_pob_choice: How have we defiled you?
  chosen_spanish: ¿Cómo te hemos contaminado?
  alternatives_spanish:
  - ¿Cómo te hemos profanado?
  - ¿Cómo te hemos manchado?
  lexicon: HALOT
  rationale: Se conserva el objeto directo de segunda persona singular, como en el hebreo y en la lectura auditada inglesa. «Contaminado» mantiene la tensión retórica de que el ultraje a la mesa/altar alcanza a Dios mismo.
- source_word: בֶּאֱמָרְכֶם
  english_pob_choice: By saying
  chosen_spanish: Al decir
  alternatives_spanish:
  - Diciendo
  - Porque dicen
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo comunica medio o explicación. «Al decir» reproduce esa relación de manera clara y natural.
- source_word: שֻׁלְחַן יְהוָה
  english_pob_choice: the table of Yahweh
  chosen_spanish: La mesa de Yahvé
  alternatives_spanish:
  - La mesa de Yahvé Dios
  - La mesa del Yahvé
  lexicon: HALOT
  rationale: Se preserva la metáfora cultual en vez de interpretarla como «altar», tal como lo hace el audit trail inglés. «Mesa» mantiene el término figurado con claridad española.
- source_word: נִבְזֶה הוּא
  english_pob_choice: is despised
  chosen_spanish: es despreciada
  alternatives_spanish:
  - es tenida en poco
  - es aborrecida
  lexicon: HALOT
  rationale: «Despreciada» conserva la valoración negativa directa del predicado hebreo y encaja con el sustantivo femenino «mesa».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», evitando el sustituto tradicional «SEÑOR».'
theological_decisions:
- issue: Si conservar la dirección a Dios en «¿Cómo te hemos contaminado?»
  english_pob_reading: 'Retain the direct address to God: ''How have we defiled you?'''
  chosen_spanish_reading: 'Conservar la segunda persona: «¿Cómo te hemos contaminado?»'
  alternative_spanish_readings:
  - ¿Cómo hemos contaminado eso?
  - ¿Cómo hemos contaminado tu altar?
  rationale: 'El sufijo hebreo es segunda persona masculina singular. Mantener «te» preserva la tensión teológica: profanar la mesa/altar equivale a afrentar al propio Dios.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Cómo traducir לֶחֶם en contexto sacrificial
  english_pob_reading: Translate as 'food' rather than the more literal 'bread'
  chosen_spanish_reading: Traducir como «pan», manteniendo el término literal del hebreo
  alternative_spanish_readings:
  - alimento
  - comida
  rationale: Aunque el contexto sacrificial amplía el sentido, el hebreo usa «pan». En español, «pan» preserva mejor la imagen verbal del texto, mientras que la nota puede aclarar el alcance cultual.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
- issue: Mantener la metáfora cultual de la «mesa» de Yahvé
  english_pob_reading: The table of the LORD is a metaphor for the altar and its sacrificial service.
  chosen_spanish_reading: 'Conservar la metáfora: «La mesa de Yahvé»'
  alternative_spanish_readings:
  - El altar de Yahvé
  - La mesa del Señor
  rationale: La metáfora forma parte del reproche profético y no debe resolverse prematuramente. «Mesa» deja visible la figura cultual y el matiz de desprecio.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y la alta concordancia del repaso final; no se requirieron cambios de revisión respecto del sentido básico. La principal decisión fue mantener la tensión retórica del hebreo en la segunda persona y conservar la metáfora de la mesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «mesa» en vez de interpretar directamente como «altar» para respetar la metáfora bíblica.
  - La concordancia femenina de «despreciada» sigue a «mesa».
  - Se conserva la segunda persona singular en la reprensión divina, como en el hebreo.
