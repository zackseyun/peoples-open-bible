    text: 'O: «con el aroma de carneros»; el término hebreo puede referirse al humo o al olor producido por la quema del sacrificio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toros»; el hebreo puede entenderse más específicamente como bovinos o reses.'
    reason: lexical_alternative
  - marker: c
    text: Término tradicionalmente dejado sin traducir porque su sentido exacto es incierto, quizá una indicación musical o litúrgica.
    reason: cultural_note
  revision_rationale: Se corrige la sintaxis española a «te ofreceré», se reubica correctamente la nota textual sobre «humo», y se sustituye «ganado» por «reses» para una expresión más natural y precisa del colectivo bovino en contexto sacrificial, manteniendo las alternativas relevantes en notas.
