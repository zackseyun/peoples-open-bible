base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/021.yaml
  text: Now the Hebrews who had previously been with the Philistines[a], who had gone up with them into the camp all around—even they also came to be with Israel[c][b], who were with Saul and Jonathan.
  footnotes:
  - marker: a
    text: Hebrew literally, 'like yesterday, three days ago,' an idiom meaning 'formerly' or 'previously.'
    reason: lexical_alternative
  - marker: b
    text: Or 'came to be with Israel'; the Hebrew says 'to be with Israel,' implying a shift of allegiance.
    reason: alternative_reading
  - marker: c
    text: The phrase 'into the camp all around' is difficult; it likely refers to those Hebrews who had accompanied the Philistines in their encampment in the surrounding area.
    reason: lexical_alternative
