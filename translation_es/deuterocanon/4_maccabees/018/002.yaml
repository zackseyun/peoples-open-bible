translation:
  language: es
  text: sabiendo que la razón piadosa[a] es dueña de las pasiones[b], y no solo de lo interior, sino también de los dolores externos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la razón devota». La frase griega es una expresión clave en 4 Macabeos para la razón moldeada por la reverencia a Dios.
    reason: lexical_alternative
  - marker: b
    text: El griego distingue πάθη («pasiones») de πόνοι («dolores» o «sufrimientos»).
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκοντες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - sabiendo que
  lexicon: BDAG
  rationale: El participio introduce la base de la afirmación; «sabiendo» conserva la relación participial y su valor de conocimiento previo sin forzar una subordinación más pesada.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los sufrimientos
  - los deseos
  - las emociones
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es un término técnico para impulsos o pasiones internas sujetas al dominio de la razón. «Las pasiones» preserva esa distinción conceptual frente a los dolores externos del final del versículo.
- source_word: δεσπότης
  english_pob_choice: master
  chosen_spanish: dueña
  alternatives_spanish:
  - señor
  - amo
  - gobernante
  lexicon: LSJ
  rationale: En español, «dueña» comunica autoridad de dominio sobre las pasiones de modo natural y evita cargar el texto con resonancias eclesiales o titulareas de «Señor». Mantiene la idea de control gobernante en este contexto ético-filosófico.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: godly reason
  chosen_spanish: la razón piadosa
  alternatives_spanish:
  - la razón devota
  - el razonamiento piadoso
  - la razón reverente
  lexicon: LSJ
  rationale: La expresión central combina racionalidad con reverencia hacia Dios. «Razón piadosa» conserva el enlace entre pensamiento y piedad, y responde de forma más directa a εὐσεβής que una paráfrasis más larga.
- source_word: τῶν ἔνδοθεν
  english_pob_choice: inward
  chosen_spanish: internos
  alternatives_spanish:
  - interiores
  - de dentro
  lexicon: LSJ
  rationale: La oposición con ἔξωθεν pide una antítesis clara en español. «Internos» expresa el contraste con «externos» y evita ambigüedad.
- source_word: πόνων
  english_pob_choice: sufferings / pains
  chosen_spanish: dolores
  alternatives_spanish:
  - sufrimientos
  - penas
  - padecimientos
  lexicon: LSJ
  rationale: πόνοι puede abarcar dolor físico y aflicción. «Dolores» funciona bien en contraste con «pasiones» y mantiene el paralelo con los «externos»; el plural conserva el valor de experiencias concretas de dolor.
- source_word: τῶν ἔξωθεν πόνων
  english_pob_choice: outward pains
  chosen_spanish: los externos
  alternatives_spanish:
  - los dolores externos
  - los sufrimientos externos
  - los de fuera
  lexicon: LSJ
  rationale: En español, el adjetivo sustantivado «los externos» resulta oscuro sin apoyo. Para evitar una elipsis poco natural, el texto completo dice «los dolores externos», manteniendo la antítesis con «los dolores internos».
theological_decisions:
- issue: Cómo rendir ὁ εὐσεβὴς λογισμός sin diluir su carga religiosa-filosófica
  english_pob_reading: godly reason
  chosen_spanish_reading: la razón piadosa
  alternative_spanish_readings:
  - la razón devota
  - el razonamiento piadoso
  - la razón reverente
  rationale: La frase afirma que la razón, cuando está orientada por la piedad hacia Dios, domina tanto las pasiones internas como los dolores externos. «Piadosa» conserva la cualidad religiosa explícita de εὐσεβής y evita reducir el pasaje a mera racionalidad secular.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
- issue: Relación entre πάθη y πόνοι en la antítesis del versículo
  english_pob_reading: inner passions ... outward pains/sufferings
  chosen_spanish_reading: pasiones ... dolores internos ... dolores externos
  alternative_spanish_readings:
  - pasiones ... sufrimientos internos ... sufrimientos externos
  - impulsos ... dolores internos ... dolores externos
  rationale: El griego distingue las pasiones internas de los dolores externos. La versión española mantiene esa tensión con vocablos paralelos y conserva el contraste ético del texto sin fusionar los dos campos semánticos.
  doctrine_reference: 4 Maccabees 18:2 lexical-theological contrast
translation_notes:
  revision_awareness: El cierre griego contrasta con claridad πάθη y πόνοι; la redacción española conserva esa distinción y evita fusionar las dos series semánticas. La decisión de usar «razón piadosa» sigue de cerca el juicio auditado del POB en inglés («godly reason») sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene el contraste interno/externo con adjetivos paralelos («internos» / «externos»).
  - Se evita «Señor» para δεσπότης, porque el contexto es de dominio racional, no de título divino o eclesial.
  - «Piadosa» preserva el matiz religioso de εὐσεβής sin añadir contenido doctrinal ajeno al pasaje.
  - La traducción usa español neutro y publicable, con sintaxis directa y digna.
