  to: En todas sus moradas, las ciudades serán asoladas y los lugares altos serán desolados, para que sus altares sean asolados y desolados, y sus ídolos[a] sean quebrados y lleguen a su fin, y sus altares de incienso[b] sean derribados, y sus obras sean borradas.
  rationale: Se corrige la nota para preservar la decisión léxica del POB sobre גִּלּוּלִים, se reemplaza 'lugares de habitación' por 'moradas' para mejorar naturalidad sin perder sentido, se repara la construcción incorrecta 'puestos fin' con 'lleguen a su fin', y se regulariza la serie verbal con 'sean borradas'.
