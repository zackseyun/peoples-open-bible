translation:
  language: es
  text: Y Mizraim engendró a los Ludim[a], a los Anamim, a los Lehabim[b] y a los Naftuhim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue padre de'; el verbo hebreo es el término genealógico estándar para producir descendencia.
    reason: lexical_alternative
  - marker: b
    text: Estos nombres se conservan como nombres transliterados de grupos étnicos, no como topónimos traducidos ni como identificaciones históricas posteriores.
    reason: cultural_note
lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Mizraim
  chosen_spanish: Mizraim
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: En este contexto genealógico de la Tabla de las Naciones, el nombre funciona como antepasado epónimo; por eso se translitera como nombre propio y no se traduce como 'Egipto'.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  - engendró/tuvo
  lexicon: HALOT
  rationale: En listas genealógicas, el verbo expresa procreación/descendencia. 'Engendró' conserva ese valor genealógico con naturalidad en español y evita una paráfrasis más amplia.
- source_word: לוּדִים
  english_pob_choice: the Ludim
  chosen_spanish: los ludim
  alternatives_spanish:
  - los luditas
  - el pueblo ludim
  lexicon: HALOT
  rationale: Se mantiene como etnónimo transliterado, porque el inglés POB lo trata como nombre de grupo humano y no como topónimo traducido.
- source_word: עֲנָמִים
  english_pob_choice: the Anamim
  chosen_spanish: los anamim
  alternatives_spanish:
  - los anamitas
  - el pueblo anamim
  lexicon: HALOT
  rationale: Se conserva la forma transliterada del etnónimo para reflejar el carácter de lista genealógica y no imponer una identificación histórica no segura.
- source_word: לְהָבִים
  english_pob_choice: the Lehabim
  chosen_spanish: los lehabim
  alternatives_spanish:
  - los lehabitas
  - los lubim
  lexicon: HALOT
  rationale: Se mantiene la transliteración cercana al hebreo; la identificación tradicional con otros pueblos no es lo bastante segura como para reemplazar el nombre en el texto principal.
- source_word: נַפְתֻּחִים
  english_pob_choice: the Naphtuhim
  chosen_spanish: los naphtuhim
  alternatives_spanish:
  - los naptuhim
  - los naphtujim
  lexicon: HALOT
  rationale: Se conserva el etnónimo transliterado para respetar la forma propia de la enumeración genealógica y la decisión del POB inglés de no traducirlo.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Hebrew grammar
  rationale: Conjunción coordinante normal en español para enlazar la última serie de miembros de la genealogía.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios (estado: sin cambios; alta concordancia). La redacción española sigue la misma decisión auditada del POB inglés: transliterar los etnónimos y usar un verbo genealógico directo.'
  spanish_consistency_notes:
  - Se mantiene la convención POB de transliterar nombres de pueblos en listas genealógicas.
  - '''Mizraim'' se conserva como nombre propio epónimo en vez de ''Egipto''.'
  - '''engendró'' reproduce el valor genealógico sin sobreexplicar.'
  - Se usa minúscula en los etnónimos por fluidez tipográfica española, con artículo plural cuando corresponde.
