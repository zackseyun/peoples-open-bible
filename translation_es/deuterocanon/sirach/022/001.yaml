translation:
  language: es
  text: Al perezoso se le compara con una piedra inmunda[a], y todo el mundo le silbará[b] ante su deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sucia», «manchada» o «mancillada». El participio griego es raro y describe la piedra como ensuciada o contaminada, con sentido claramente negativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «le siseará» o «lo abucheará»; el verbo griego puede indicar un silbido o siseo de burla, no solo un silbido neutro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λίθῳ
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - roca
  lexicon: LSJ
  rationale: λίθος designa una piedra; en español, «piedra» es el equivalente natural y más transparente para esta comparación proverbial.
- source_word: ἠρδαλωμένῳ
  english_pob_choice: filthy
  chosen_spanish: inmunda
  alternatives_spanish:
  - sucia
  - manchada
  - mancillada
  lexicon: LSJ
  rationale: El participio raro describe la condición de la piedra como sucia, contaminada o ensuciada. «Inmunda» comunica con fuerza esa condición negativa sin depender de un calco duro; se preserva la ambigüedad del término raro al no especificar más de lo que el griego exige.
- source_word: συνεβλήθη
  english_pob_choice: is compared to
  chosen_spanish: se le compara con
  alternatives_spanish:
  - ha sido comparado con
  - se asemeja a
  lexicon: LSJ
  rationale: En este proverbio el verbo expresa comparación, no un acto literal de arrojar o juntar objetos. «Se le compara con» reproduce bien el valor relacional del griego en un español natural.
- source_word: ὀκνηρός
  english_pob_choice: lazy man
  chosen_spanish: el perezoso
  alternatives_spanish:
  - hombre perezoso
  - holgazán
  lexicon: LSJ
  rationale: El griego usa un adjetivo sustantivado masculino singular. En español, «el perezoso» conserva esa función proverbial y fluye mejor que una perífrasis más pesada; mantiene también la fuerza caracterizadora del original.
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todo el mundo
  lexicon: LSJ
  rationale: El valor genérico universal se expresa de forma idiomática con «todos», que mantiene la amplitud del rechazo social descrito.
- source_word: ἐκσυριεῖ
  english_pob_choice: will whistle at
  chosen_spanish: silbarán
  alternatives_spanish:
  - sisearán
  - abuchearán
  - chiflarán
  lexicon: LSJ
  rationale: El verbo puede implicar un silbido despectivo o un siseo de burla. «Silbarán» conserva la imagen concreta elegida en el audit trail inglés, mientras deja abierta la posibilidad de matiz peyorativo.
- source_word: ἀτιμίᾳ
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - desprestigio
  - ignominia
  lexicon: LSJ
  rationale: ἀτιμία apunta a deshonor público, vergüenza o ignominia. «Deshonra» captura bien el ámbito social y moral del término y resulta natural en español bíblico moderno.
theological_decisions:
- issue: Valor proverbial y masculino sustantivado de ὀκνηρός
  english_pob_reading: lazy man
  chosen_spanish_reading: el perezoso
  alternative_spanish_readings:
  - la persona perezosa
  - el holgazán
  rationale: Se conserva la referencia masculina singular del griego sin forzar una neutralización que borre la forma del original. Al mismo tiempo, en español proverbial «el perezoso» es claro, natural y suficientemente fiel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Matiz despectivo de ἐκσυριεῖ
  english_pob_reading: will whistle at
  chosen_spanish_reading: silbarán
  alternative_spanish_readings:
  - sisearán
  - abuchearán
  - chiflarán
  rationale: El griego puede referirse a una burla expresada con silbido o siseo. Se mantiene el gesto sonoro concreto sin reducirlo a una mera abstracción como «ridiculizarán», y sin perder la posibilidad de desprecio público.
  doctrine_reference: LSJ; English POB lexical note for ἐκσυριεῖ
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; se mantiene su lectura principal, con conservación de las dos notas léxicas por la rareza del participio de la piedra y por el matiz del verbo de burla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece terminología cristológica en el pasaje.
  - Se usa un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Los corchetes de nota se colocan en el punto léxico relevante para conservar la trazabilidad auditable.
