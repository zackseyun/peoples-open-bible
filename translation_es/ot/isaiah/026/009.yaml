  spanish_quality_summary: 'El español es claro y digno, pero ‘te busca temprano’ suena algo menos idiomático en registro bíblico que ‘te busca desde temprano’ o ‘te busca al alba’; aun así es aceptable por fidelidad léxica. El problema principal es terminológico: ‘aprenden justicia’ en español puede sonar más social-jurídico que moral-ético en este contexto. ‘Aprenden rectitud’ comunica mejor el valor de צֶדֶק aquí, con ‘justicia’ en nota como alternativa.'
  glossary_alignment: No hay conflicto con los términos base del proyecto salvo la decisión de צֶדֶק. Dado que el expediente inglés documenta como lectura principal ‘righteousness’ y preserva ‘justice’ solo como alternativa, el español debe reflejar esa jerarquía con ‘rectitud’ en texto principal y ‘justicia’ en nota.
