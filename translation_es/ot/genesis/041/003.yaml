translation:
  language: es
  text: Y he aquí, otras siete vacas subían detrás de ellas desde el Nilo[a], feas de aspecto y delgadas de carne[b], y se pararon junto a las vacas a la orilla del Nilo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el río'' (יְאֹר), aquí referido específicamente al Nilo en el contexto egipcio.'
    reason: lexical_alternative
  - marker: b
    text: O 'de mal aspecto y delgadas de carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y entonces he aquí
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y la sorpresa narrativa del hebreo. 'He aquí' mantiene un tono elevado pero claro en español y refleja bien el arranque repentino de la escena.
- source_word: פָּרוֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado
  - novillas
  lexicon: HALOT
  rationale: El plural femenino del hebreo se refiere específicamente a vacas; 'vacas' es preciso y natural en español. 'Ganado' sería más general y 'novillas' añadiría una edad no indicada.
- source_word: אֲחֵרוֹת
  english_pob_choice: other
  chosen_spanish: otras
  alternatives_spanish:
  - más
  - distintas
  lexicon: HALOT
  rationale: Como adjetivo plural que distingue un segundo grupo del primero, 'otras' reproduce con naturalidad la relación de alteridad.
- source_word: עֹלוֹת
  english_pob_choice: came up
  chosen_spanish: subían
  alternatives_spanish:
  - subieron
  - venían subiendo
  lexicon: HALOT
  rationale: En el marco de un sueño, el participio puede expresar la acción en desarrollo; 'subían' comunica el ascenso desde el río con fluidez en español, sin perder la imagen.
- source_word: אַחֲרֵיהֶן
  english_pob_choice: after them
  chosen_spanish: después de ellas
  alternatives_spanish:
  - tras ellas
  - detrás de ellas
  lexicon: HALOT
  rationale: Expresa la secuencia temporal/narrativa del relato. 'Después de ellas' suena natural en español y mantiene el orden de aparición de los dos grupos de vacas.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En el contexto egipcio, יְאֹר designa específicamente el Nilo. Traducirlo como 'el Nilo' comunica directamente el referente sin ocultarlo tras un genérico.
- source_word: רָעוֹת מַרְאֶה
  english_pob_choice: ugly in appearance
  chosen_spanish: de aspecto feo
  alternatives_spanish:
  - de mal aspecto
  - feas de aspecto
  lexicon: HALOT
  rationale: La frase describe apariencia visual, no maldad moral. 'De aspecto feo' conserva la evaluación estética del original con español natural; 'de mal aspecto' también es posible pero menos directo.
- source_word: דַקּוֹת בָּשָׂר
  english_pob_choice: thin in flesh
  chosen_spanish: de carne delgada
  alternatives_spanish:
  - de carne flaca
  - delgadas de carne
  - macilentas
  lexicon: HALOT
  rationale: Mantiene la imagen corporal del hebreo 'carne' sin suavizarla a una abstracción. 'De carne delgada' es fiel y comprensible; 'macilentas' sería más literario pero menos transparente.
- source_word: וַתַּעֲמֹדְנָה
  english_pob_choice: and they stood
  chosen_spanish: y se detuvieron
  alternatives_spanish:
  - y estuvieron de pie
  - y permanecieron de pie
  lexicon: HALOT
  rationale: En español, 'se detuvieron' expresa la quietud resultante de la acción de ponerse junto a las otras vacas. El hebreo narra que quedaron fijas allí; la opción evita una repetición torpe de 'estar de pie'.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: Indica proximidad inmediata de modo natural en español. 'Junto a' es claro y directo.
- source_word: שְׂפַת
  english_pob_choice: bank
  chosen_spanish: a la orilla
  alternatives_spanish:
  - en la ribera
  - al borde
  lexicon: HALOT
  rationale: Para un río, 'orilla' reproduce bien el valor espacial de שְׂפַת. 'A la orilla' encaja con el movimiento y la ubicación en la escena.
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado sin cambios del testimonio auditado: la traducción inglesa aprobada permanece estable y no hubo correcciones aplicadas en la última pasada. Se conserva el valor referencial de יְאֹר como Nilo, y la descripción física se mantiene cercana al hebreo sin moralizarla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conserva 'vacas' para פָּרוֹת por precisión zoológica y coherencia con el texto fuente.
  - '''He aquí'' reproduce la fuerza discursiva de וְהִנֵּה sin añadir contenido interpretativo.'
  - '''De carne delgada'' preserva la imagen corporal del hebreo y evita una paráfrasis abstracta.'
