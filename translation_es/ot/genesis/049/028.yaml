translation:
  language: es
  text: Todos estos son las doce tribus de Israel[a], y esto es lo que su padre les dijo, y los bendijo; cada uno según su bendición los bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «los bendijo, cada uno según su bendición los bendijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos de estos
  - Todos ellos
  lexicon: HALOT
  rationale: La frase demostrativa resume el conjunto completo de los hijos/tribus; «Todos estos» es natural en español y conserva el valor colectivo.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: tribes of Israel
  chosen_spanish: tribus de Israel
  alternatives_spanish:
  - tribus pertenecientes a Israel
  lexicon: HALOT
  rationale: Se mantiene la construcción posesiva simple y la terminología bíblica habitual sin añadir glosa innecesaria.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - los doce
  lexicon: HALOT
  rationale: El cardinal se vierte de forma directa y normal en español; el valor apposicional ya queda claro por el contexto.
- source_word: וְזֹאת אֲשֶׁר דִּבֶּר לָהֶם אֲבִיהֶם
  english_pob_choice: and this is what their father spoke to them
  chosen_spanish: y esto es lo que su padre les dijo
  alternatives_spanish:
  - y esto es lo que su padre les habló
  - y esto es lo que su padre habló con ellos
  lexicon: HALOT
  rationale: «Dijo» expresa con naturalidad el verbo de habla hebreo en un resumen narrativo; «les dijo» conserva el objeto indirecto implícito.
- source_word: וַיְבָרֶךְ אֹתָם
  english_pob_choice: and he blessed them
  chosen_spanish: y los bendijo
  alternatives_spanish:
  - y él los bendijo
  lexicon: HALOT
  rationale: Se conserva el verbo de bendición como verbo principal de la cláusula; el español puede coordinarlo sin forzar una subordinación interpretativa.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada uno de ellos
  lexicon: HALOT
  rationale: Aunque literalmente significa «hombre», aquí funciona distributivamente; «cada uno» expresa ese valor sin introducir una redundancia extraña en español.
- source_word: כְּבִרְכָתוֹ
  english_pob_choice: according to his blessing
  chosen_spanish: según su bendición
  alternatives_spanish:
  - conforme a su bendición
  - de acuerdo con su bendición
  lexicon: HALOT
  rationale: 'La frase preposicional reproduce el sentido distributivo de la construcción hebrea. «Según» mantiene la relación sin sobreinterpretar «apropiada». '
- source_word: בֵּרַךְ אֹתָם
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - los había bendecido
  - los bendijo a ellos
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del verbo hebreo al final de la línea, tal como hace la fuente inglesa, para reflejar el énfasis resumitivo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para sonar más natural y para acercarse más al hebreo final: se eliminó una subordinación interpretativa («when») y se restituyó la repetición enfática del verbo bendecir. La propuesta española sigue esa decisión, preservando el paralelismo final «cada uno según su bendición los bendijo».'
  spanish_consistency_notes:
  - Se mantiene «bendijo» para ברך en toda la cláusula, preservando la repetición del hebreo.
  - Se usa el poseedor implícito «su padre» para אֲבִיהֶם, de modo natural en español.
  - La nota al pie acompaña la repetición final, porque en español también podría leerse como una formulación algo redundante; el pie conserva la literalidad.
  - No se introduce «Cristo», «SEÑOR» ni vocabulario teológico ajeno al hebreo de este versículo.
