translation:
  language: es
  text: En cuanto a las cosas que Lisias[a], el pariente del rey, les concedió, nosotros también aprobamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con respecto a lo que Lisias, el pariente del rey, les concedió, nosotros también estamos de acuerdo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ὧν
  english_pob_choice: Concerning the matters that
  chosen_spanish: En cuanto a las cosas que
  alternatives_spanish:
  - Con respecto a lo que
  - Acerca de las cosas que
  lexicon: LSJ
  rationale: La construcción introduce el tema del que se habla, no una relación espacial ni sustitutiva. «En cuanto a» expresa bien el valor discursivo de ὑπὲρ ὧν y conserva el plural de ὧν con «las cosas».
- source_word: Λυσίας
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: Convención de transliteración al español
  rationale: Se adapta el nombre propio a la forma usual en español bíblico, manteniendo la identificación del personaje sin perder la correspondencia con el griego.
- source_word: ὁ συγγενὴς τοῦ βασιλέως
  english_pob_choice: the king’s kinsman
  chosen_spanish: el pariente del rey
  alternatives_spanish:
  - el familiar del rey
  - el consanguíneo del rey
  lexicon: LSJ
  rationale: συγγενής indica vínculo de parentesco. «Pariente» es natural en español y conserva la relación familiar-política; «kinsman» no tiene un equivalente idiomático único más preciso aquí.
- source_word: συνεχώρησεν
  english_pob_choice: has granted
  chosen_spanish: les concedió
  alternatives_spanish:
  - les otorgó
  - les permitió
  - les concedió ya
  lexicon: LSJ
  rationale: En este contexto diplomático, συγχωρέω expresa concesión o permiso. «Concedió» reproduce bien esa idea sin sobrecargar el tiempo verbal en español; el aoristo se entiende como acción puntual ya realizada.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: Gramática del dativo de interés/objeto indirecto
  rationale: El dativo se vierte como objeto indirecto en español. Dado el tono epistolar y la referencia plural, «les» mantiene naturalidad y referencia clara.
- source_word: καὶ ἡμεῖς συνευδοκοῦμεν
  english_pob_choice: we also approve
  chosen_spanish: nosotros también aprobamos
  alternatives_spanish:
  - también estamos de acuerdo
  - nosotros también damos nuestra aprobación
  - también consentimos
  lexicon: LSJ
  rationale: συνευδοκέω significa aprobar juntamente, consentir o asentir. «Aprobamos» comunica de forma directa la adhesión de la autoridad que habla; «también» conserva el matiz de coincidencia con lo ya concedido por Lisias.
translation_notes:
  revision_awareness: La versión española sigue el texto griego de Swete y la decisión inglesa de leer ὑπὲρ ὧν como introducción temática. Se mantuvo la fuerza diplomática de συνεχώρησεν y συνευδοκοῦμεν, con un ajuste natural al español para evitar un calco rígido.
  spanish_consistency_notes:
  - Se usa «Lisias» para el nombre propio, conforme a uso bíblico en español.
  - Se evita «Señor» o terminología eclesiástica no presente en el griego.
  - «Aprobamos» conserva el sentido de consentimiento conjunto sin añadir intensidad doctrinal.
  - La estructura «En cuanto a...» mantiene el encuadre retórico de la frase griega.
