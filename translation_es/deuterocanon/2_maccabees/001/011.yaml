  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» corresponde bien a θεοῦ. No hay términos teológicos clave adicionales que requieran ajuste. La nota alternativa está bien orientada y preserva la compresión militar del griego.
  issues:
  - severity: medium
    issue: La frase «están a punto de alinearse» sobreexplicita el participio
    rationale: El griego παρατασσόμενοι con ὡς ἂν expresa una comparación comprimida; la traducción actual añade una perífrasis verbal finita que no es necesaria y puede sentirse más interpretativa de lo debido.
  - severity: low
    issue: «Alinearse» es comprensible pero no es la opción militar más natural en registro bíblico-literario
    rationale: «Ponerse en formación» o «formarse» comunica mejor la imagen de tropas ordenadas sin sonar tan moderno o técnico en exceso.
