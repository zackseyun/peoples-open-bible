translation:
  language: es
  text: entonces yo daré a su tierra la lluvia en su tiempo[a], la lluvia temprana y la tardía, y recogerán su grano, su vino nuevo[b][c] y su aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en su estación’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, vino recién producido; o simplemente ‘vino’.
    reason: lexical_alternative
  - marker: c
    text: Es decir, aceite de oliva.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: then I will give
  chosen_spanish: entonces yo daré
  alternatives_spanish:
  - y yo daré
  lexicon: HALOT
  rationale: La secuencia conserva el valor consecutivo/resultativo que el inglés POB marcó con 'then'. En español, 'entonces' comunica bien esa relación con el contexto anterior sin volver mecánico el enlace.
- source_word: מְטַר
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - lluvia
  lexicon: HALOT
  rationale: '''Lluvia'' expresa con naturalidad el sustantivo de fenómeno meteorológico en este contexto agrícola. Se evita una construcción más pesada que no aporta matiz adicional en español.'
- source_word: אַרְצְכֶם
  english_pob_choice: your land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente más natural para אֶרֶץ en contexto de pacto y agricultura. Se prefirió la tercera persona plural de cortesía/lectura bíblica implícita ''su'' para mantener la referencia colectiva del pueblo.'
- source_word: בְּעִתּוֹ
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en su estación
  lexicon: HALOT
  rationale: '''En su tiempo'' preserva la idea de tiempo señalado o apropiado. ''En su estación'' sería posible, pero en español puede sonar más interpretativo y menos directo que la frase hebrea.'
- source_word: יוֹרֶה
  english_pob_choice: the early rain
  chosen_spanish: la lluvia temprana
  alternatives_spanish:
  - la lluvia de otoño
  - la lluvia anterior
  lexicon: HALOT
  rationale: Se traduce de forma clara el primer periodo de lluvias. 'Temprana' mantiene la relación temporal con la segunda expresión sin imponer una estación concreta en el texto principal.
- source_word: וּמַלְקוֹשׁ
  english_pob_choice: the late rain
  chosen_spanish: la lluvia tardía
  alternatives_spanish:
  - la lluvia de primavera
  - la lluvia postrera
  lexicon: HALOT
  rationale: '''Tardía'' conserva el contraste temporal con ''temprana'' y refleja bien el paralelismo del hebreo. No se especifica ''primavera'' en el texto principal para no cerrar demasiado el alcance del término.'
- source_word: וְאָסַפְתָּ
  english_pob_choice: and you will gather in
  chosen_spanish: y tú recogerás
  alternatives_spanish:
  - y reunirás
  - y cosecharás
  lexicon: HALOT
  rationale: '''Recogerás'' comunica la acción de juntar los productos desde el campo de modo natural en español. Se conserva el sujeto explícito ''tú'' para reflejar la segunda persona singular del hebreo.'
- source_word: דְגָנֶךָ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu cereal
  - tu trigo
  lexicon: HALOT
  rationale: '''Grano'' reproduce el sentido amplio de דָּגָן sin restringirlo a una sola especie. Es el equivalente más directo y transparente en español.'
- source_word: וְתִירֹשְׁךָ
  english_pob_choice: your new wine
  chosen_spanish: tu vino nuevo
  alternatives_spanish:
  - tu mosto
  - tu vino fresco
  lexicon: HALOT
  rationale: '''Vino nuevo'' conserva la distinción agrícola de תִּירוֹשׁ. ''Mosto'' sería una posibilidad más técnica, pero puede ser menos accesible; ''vino nuevo'' sigue de cerca la decisión del inglés POB.'
- source_word: וְיִצְהָרֶךָ
  english_pob_choice: your oil
  chosen_spanish: tu aceite
  alternatives_spanish:
  - tu aceite de oliva
  - tu aceite de oliva virgen
  lexicon: HALOT
  rationale: En español, 'aceite' es claro y natural; el referente a aceite de oliva se entiende por el collocation bíblico y el contexto agrícola. Se evita sobreespecificar en el texto principal lo que el hebreo no explicita aquí.
theological_decisions:
- issue: Promesa agrícola del pacto, no lectura alegórica
  english_pob_reading: Render the verse as a concrete promise of seasonal rain and produce, without importing sacramental, eschatological, or prosperity-theology overtones.
  chosen_spanish_reading: La versículo se presenta como promesa concreta de lluvia estacional y cosecha, sin cargarla con sentidos sacramentales, escatológicos ni de prosperidad.
  alternative_spanish_readings:
  - Leer la lluvia sobre todo como símbolo espiritual
  - Interpretar la cosecha como bendición exclusivamente materializada en clave de prosperidad
  rationale: El hebreo describe bendición agrícola concreta vinculada al pacto en la tierra. La traducción española debe preservar ese sentido literal y dejar abiertas las resonancias teológicas sin resolverlas en el texto principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios adicionales: el inglés POB y la auditoría léxica muestran alto acuerdo, y no hubo revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' reservado para el tetragrámaton cuando aparece explícitamente; este versículo no lo contiene.
  - 'Se conserva la triada agrícola con paralelismo claro: grano, vino nuevo y aceite.'
  - Se usa 'vino nuevo' en lugar de 'Cristo' o cualquier lectura litúrgica, porque el término es claramente agrícola.
  - La puntuación y el orden de los miembros siguen el paralelismo hebreo y la cadencia del inglés POB, adaptados a sintaxis natural en español.
