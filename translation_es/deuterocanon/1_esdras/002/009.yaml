    rationale: Ambas opciones son fieles, pero «vasos sagrados» suena más natural en español bíblico actual y mantiene el matiz cultual de τὰ ἅγια σκεύη.
  revised_spanish_text: Y el rey Ciro sacó los vasos sagrados del Señor, los cuales Nabucodonosor había llevado de Jerusalén y depositado en la casa de su dios[a].
