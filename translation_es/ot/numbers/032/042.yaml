translation:
  language: es
  text: 'Y Nobáh fue y capturó Quenat y sus aldeas[a], y le puso su propio nombre: Nobáh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sus hijas», un modismo que se refiere a asentamientos menores dependientes de Quenat.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹבַח
  english_pob_choice: Nobah
  chosen_spanish: Nobáh
  alternatives_spanish:
  - Nobah
  lexicon: HALOT
  rationale: Es nombre propio; se translitera para conservar la identidad del personaje y del topónimo. Se mantiene una forma cercana a la tradición de transliteración, adaptada a la ortografía española con acento para marcar la pronunciación.
- source_word: הָלַךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue y
  - anduvo
  lexicon: HALOT
  rationale: En narrativa de acción, הָלַךְ funciona como verbo simple de movimiento. 'Fue' es natural en español y conserva el avance narrativo sin sobreinterpretar.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, לכד significa capturar o tomar por la fuerza. 'Capturó' reproduce bien esa fuerza verbal y es claro en español actual.
- source_word: קְנָת
  english_pob_choice: Kenath
  chosen_spanish: Quenat
  alternatives_spanish:
  - Kenat
  lexicon: HALOT
  rationale: Es nombre de lugar; se translitera en vez de traducirse. Se prefiere 'Qu' inicial para una adaptación más natural a la ortografía española sin alterar el nombre.
- source_word: בְּנֹתֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus hijas
  - sus poblados dependientes
  lexicon: HALOT
  rationale: Literalmente 'sus hijas', pero el hebreo usa un modismo para asentamientos menores dependientes de una ciudad principal. 'Sus aldeas' comunica el sentido idiomático sin borrar la metáfora original; se conserva la alternativa literal en nota.
- source_word: וַיִּקְרָא לָהּ
  english_pob_choice: he called it
  chosen_spanish: la llamó
  alternatives_spanish:
  - la nombró
  - le puso por nombre
  lexicon: HALOT
  rationale: קרא + ל expresa acto de nombrar. 'La llamó' es breve, natural y conserva el estilo narrativo.
- source_word: נֹבַח
  english_pob_choice: Nobah
  chosen_spanish: Nobáh
  alternatives_spanish:
  - Nobah
  lexicon: HALOT
  rationale: El lugar recibe el mismo nombre que el hombre; se mantiene la repetición nominal en español para reflejar el juego onomástico del texto.
- source_word: בִּשְׁמוֹ
  english_pob_choice: after his own name
  chosen_spanish: con su propio nombre
  alternatives_spanish:
  - por su propio nombre
  - según su propio nombre
  lexicon: HALOT
  rationale: La expresión indica que la ciudad fue nombrada a partir del nombre del conquistador. 'Con su propio nombre' expresa la relación de forma natural en español, preservando la referencia posesiva de -וֹ.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que eliminó el sujeto repetido innecesario antes de ‘called’ para mayor naturalidad. Aquí se refleja esa misma economía sintáctica en español con «y la llamó».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió la transliteración de nombres propios para mantener la trazabilidad al texto hebreo.
  - Se preserva el modismo semítico de «sus aldeas» mediante nota, evitando una paráfrasis excesiva en el cuerpo principal.
