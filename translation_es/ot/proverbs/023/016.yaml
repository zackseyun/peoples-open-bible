  glossary_alignment: No hay términos del glosario mayor en disputa aquí. El manejo de la antropología hebrea («mis riñones» > «mi ser más íntimo») concuerda con la filosofía del proyecto, y «lo recto» preserva bien la imaginería de rectitud del hebreo.
