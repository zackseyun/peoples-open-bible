  - severity: low
    issue: «nuestro pueblo» es posible, pero «nuestra nación» refleja mejor γένος en este contexto y alinea mejor con el English POB.
    rationale: Dado el paralelismo con χώρα y el tono de petición pública, «nación» conserva mejor el matiz colectivo-político.
