review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contraste discursivo (''Pero''), promesa futura de pacto, entrada al arca y enumeración de Noé con su familia. También preserva correctamente la nota léxica sobre הֲקִמֹתִי como ''establecer/confirmar''. Sin embargo, no sigue la preferencia documentada del POB inglés para בְּרִית como ''covenant'', que en español del proyecto se expresa mejor como ''pacto'' o ''alianza'' según consistencia canónica; aquí el mayor problema no es el texto principal sino la incoherencia interna, porque la decisión léxica registrada para וּבָנֶיךָ dice ''tus hijos varones'' pero el texto principal solo pone ''tus hijos''.'
  spanish_quality_summary: 'El español es claro y natural, pero puede pulirse levemente. ''Tu esposa'' funciona, aunque ''tu mujer'' sería más literal; no es necesario cambiarlo. La puntuación con dos puntos es aceptable, pero una raya reproduce mejor la aposición enfática del hebreo y del POB inglés. Además, conviene mantener coherencia entre el texto y las decisiones léxicas documentadas: si el texto dice ''tus hijos'', la nota léxica no debe afirmar ''tus hijos varones'' como elección realizada. Para el texto bíblico, ''tus hijos'' es suficientemente natural; ''tus hijos varones'' sonaría pesado.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto salvo la necesidad de conservar con claridad el valor teológico de בְּרִית. ''Pacto'' es aceptable y fiel aquí. El resto de los términos clave están bien: ''arca'', ''contigo'', ''esposa(s)''. La revisión propuesta alinea mejor el texto con el énfasis hebreo y con la documentación léxica del POB.'
  issues:
  - severity: medium
    issue: Incoherencia entre el texto principal y la decisión léxica sobre וּבָנֶיךָ
    rationale: El borrador registra como elección 'tus hijos varones', pero el texto traducido dice 'tus hijos'. Debe armonizarse; en español bíblico natural, 'tus hijos' comunica adecuadamente el referente masculino en este contexto genealógico sin la pesadez de 'varones'.
  - severity: low
    issue: La puntuación puede reflejar mejor la aposición enfática de אַתָּה
    rationale: El hebreo añade 'tú' de forma enfática antes de enumerar a la familia. Una raya emula bien ese inciso en español y sigue de cerca el POB inglés ('the ark—you...').
  - severity: low
    issue: La documentación léxica debería evitar afirmar como 'chosen_spanish' una forma no usada en el texto
    rationale: Aunque esto no afecta directamente la fidelidad del versículo, sí afecta la trazabilidad auditada del registro de decisiones.
  revised_spanish_text: Pero yo estableceré mi pacto contigo[a], y entrarás en el arca—tú, tus hijos, tu esposa y las esposas de tus hijos contigo.
  revised_footnotes:
