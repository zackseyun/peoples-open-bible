translation:
  language: es
  text: Se vistió con justicia como una coraza[a], y se puso un casco de salvación[b] sobre su cabeza; se vistió con vestiduras de venganza como vestidura, y se envolvió en celo como en un manto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pectoral»; el hebreo se refiere a una armadura para el torso.
    reason: lexical_alternative
  - marker: b
    text: O «victoria» o «liberación» para «salvación».
    reason: lexical_alternative
  - marker: c
    text: O «celos», en el sentido de ardor intensamente comprometido o pasión de alianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: HALOT
  rationale: En este contexto de armamento divino, el sustantivo puede expresar tanto rectitud moral como justicia activa. En español, «justicia» conserva mejor la fuerza pública y judicial del cuadro, sin perder la idea de rectitud implícita.
- source_word: שִׁרְיָן
  english_pob_choice: a breastplate
  chosen_spanish: coraza
  alternatives_spanish:
  - peto
  - coraza de cuerpo
  lexicon: HALOT
  rationale: El término hebreo designa una armadura para el torso. «Coraza» es natural en español bíblico contemporáneo y evita restringir demasiado la imagen, manteniendo la referencia al armamento del torso.
- source_word: כּוֹבַע
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  lexicon: HALOT
  rationale: El contexto militar exige un término claro para protección de la cabeza. «Casco» es más transparente para el lector moderno; «yelmo» sería más tradicional pero menos inmediato.
- source_word: יְשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - victoria
  - liberación
  lexicon: HALOT
  rationale: Aquí conserva su sentido teológico habitual de salvación, aunque el contexto bélico permite también «victoria» o «liberación». «Salvación» mantiene la resonancia isaiana y la lectura cristiana habitual sin borrar la imagen militar.
- source_word: בִּגְדֵי נָקָם
  english_pob_choice: garments of vengeance
  chosen_spanish: vestiduras de venganza
  alternatives_spanish:
  - vestidos de venganza
  - ropas de venganza
  lexicon: HALOT
  rationale: «Vestiduras» preserva el tono elevado del hebreo y la construcción de pertenencia/caracterización. «Venganza» mantiene la fuerza retributiva del texto sin suavizarla.
- source_word: תִּלְבֹּשֶׁת
  english_pob_choice: for clothing
  chosen_spanish: para vestirse
  alternatives_spanish:
  - como vestido
  - como vestidura
  lexicon: HALOT
  rationale: La forma funciona en aposición o como complemento explicativo de la prenda anterior. «Para vestirse» expresa con naturalidad que esas vestiduras son lo que lleva puesto, sin sobreinterpretar la sintaxis.
- source_word: וַיַּעַט
  english_pob_choice: wrapped himself in
  chosen_spanish: se envolvió en
  alternatives_spanish:
  - se cubrió con
  - se ciñó de
  lexicon: HALOT
  rationale: El verbo transmite la acción de envolver/ceñir con una prenda exterior. «Se envolvió en» reproduce bien la imagen y armoniza con «como en un manto».
- source_word: מְעִיל
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - manto exterior
  lexicon: HALOT
  rationale: El sustantivo apunta a una prenda exterior. «Manto» es formal y bíblicamente apto en español, y conserva mejor el tono elevado del verso.
- source_word: קִנְאָה
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - celos
  lexicon: HALOT
  rationale: En referencia a Dios, el término expresa ardor comprometido y no simple celosía humana. «Celo» comunica bien esa intensidad covenantal y evita una carga psicológica inadecuada.
theological_decisions:
- issue: Imagen del guerrero divino y el lenguaje corporal de vestirse
  english_pob_reading: Retain the martial clothing imagery literally, presenting God as arming himself with righteousness, salvation, vengeance, and zeal.
  chosen_spanish_reading: Conservar de manera literal la imaginería bélica y de vestidura, mostrando a Dios como quien se arma de justicia, salvación, venganza y celo.
  alternative_spanish_readings:
  - Suavizar la imagen con expresiones abstractas como "se mostró justo" o "actuó con poder"
  - Parafrasear la escena para reducir el antropomorfismo
  rationale: El hebreo presenta una figura de acción divina concreta. Mantener la imagen de vestirse y envolverse preserva la tensión teológica y literaria del texto, en vez de disolverla en abstracciones.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audio-trazado inglés revisó una opción más amplia tipo «body armor» para fijarla en «breastplate» por mayor precisión léxica. En español se optó por «coraza», que mantiene la precisión del torso armor y sigue siendo natural y formal en registro bíblico.
  spanish_consistency_notes:
  - 'Se conservó la progresión del hebreo: vestir justicia, poner casco de salvación, vestir vestiduras de venganza y envolverse en celo.'
  - Se evitó «SEÑOR» porque en este versículo no aparece el tetragrámaton, y la referencia es a Dios implícito en la acción del guerrero divino.
  - «Celo» se eligió para קִנְאָה por coherencia con el uso positivo aplicado a Dios; se dejó abierta la alternativa de «celos» en nota por la tensión semántica.
  - «Coraza» funciona mejor que «pectoral» en español general, aunque la nota preserva la alternativa más técnica.
