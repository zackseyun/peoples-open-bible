translation:
  language: es
  text: 'Por tanto, así dice Señor Yahvé: Porque han sido más turbulentos[a] que las naciones que están alrededor de ustedes, no han andado en mis estatutos, no han cumplido mis juicios; y ni siquiera han actuado según los juicios de las naciones que están alrededor de ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Más turbulentos’ conserva la ambigüedad del hebreo, que también puede sugerir ‘han rugido más’, ‘más rebeldes’ o, posiblemente, ‘más numerosos’ que las naciones alrededor de ustedes. El texto principal elige un sentido de desorden excesivo que encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: Conserva el título compuesto del hebreo sin ocultar el nombre divino. En español, 'Señor Yahvé' comunica mejor la fuerza de אֲדֹנָי יְהוִה que una sustitución por 'SEÑOR'. 'Dios' sería posible, pero atenúa la combinación titular específica.
- source_word: לָכֵן כֹּה אָמַר
  english_pob_choice: Therefore thus says
  chosen_spanish: Por tanto, así dice
  alternatives_spanish:
  - Por eso, así dice
  - Por consiguiente, así dice
  lexicon: HALOT
  rationale: '''Por tanto'' reproduce bien la conclusión profética. ''Así dice'' mantiene la fórmula oracular del hebreo de manera natural en español.'
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues que
  - Debido a que
  lexicon: HALOT
  rationale: Introduce con claridad la base causal del juicio. 'Porque' es la equivalencia más directa y natural en español contemporáneo.
- source_word: הֲמָנְכֶם
  english_pob_choice: you have been more turbulent
  chosen_spanish: han sido más turbulentos
  alternatives_spanish:
  - han sido más rebeldes
  - han sido más agitados
  - han sido más numerosos
  lexicon: HALOT
  rationale: El término es difícil y admite varios sentidos. 'Más turbulentos' conserva el valor de exceso de desorden/agitación que el POB inglés eligió, sin cerrar indebidamente la ambigüedad del hebreo. En español mantiene la comparación y la tensión lexical.
- source_word: מִן הַגּוֹיִם אֲשֶׁר סְבִיבוֹתֵיכֶם
  english_pob_choice: than the nations that are around you
  chosen_spanish: que las naciones que están alrededor de ustedes
  alternatives_spanish:
  - que las naciones alrededor de ustedes
  - que las naciones que los rodean
  lexicon: HALOT
  rationale: La comparación con מִן se expresa naturalmente con 'que'. 'Están alrededor de ustedes' conserva la relación espacial y el paralelismo del hebreo.
- source_word: בְּחֻקּוֹתַי לֹא הֲלַכְתֶּם
  english_pob_choice: you have not walked in my statutes
  chosen_spanish: no han andado en mis estatutos
  alternatives_spanish:
  - no han caminado en mis estatutos
  - no han seguido mis estatutos
  lexicon: HALOT
  rationale: '''Andar en'' reproduce la metáfora hebrea con buena inteligibilidad en español. ''Estatutos'' mantiene el término técnico legal/covenantal sin reemplazarlo por un equivalente más genérico.'
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  - mis sentencias
  lexicon: HALOT
  rationale: Se conserva la raíz de justicia/decisión judicial con 'juicios', que en español enlaza mejor con el contraste del verso con los 'juicios de las naciones'. 'Ordenanzas' o 'decretos' suavizarían la conexión lexical.
- source_word: לֹא עֲשִׂיתֶם
  english_pob_choice: you have not carried out
  chosen_spanish: no han cumplido
  alternatives_spanish:
  - no han hecho
  - no han practicado
  - no han llevado a cabo
  lexicon: HALOT
  rationale: '''Cumplir'' expresa obediencia efectiva a mandatos o decisiones y suena natural en español bíblico contemporáneo. Evita la dureza de ''hecho'' y la posible pesadez de ''llevado a cabo''.'
- source_word: וּכְמִשְׁפְּטֵי הַגּוֹיִם ... לֹא עֲשִׂיתֶם
  english_pob_choice: and you have not even acted according to the judgments of the nations that are around you
  chosen_spanish: y ni siquiera han actuado según los juicios de las naciones que están alrededor de ustedes
  alternatives_spanish:
  - y no han actuado ni siquiera conforme a los juicios de las naciones que están alrededor de ustedes
  - y no han hecho según los juicios de las naciones que están alrededor de ustedes
  lexicon: HALOT
  rationale: '''Según'' comunica היטב la preposición כ de conformidad. ''Ni siquiera'' reproduce la fuerza retórica que el inglés POB explicitó: no sólo faltaron a la ley de Yahvé, sino que ni aun alcanzaron el patrón de las naciones vecinas.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El proyecto pide traducir יְהוָה como 'Yahvé' y no ocultarlo tras 'SEÑOR'. En este título profético compuesto, 'Señor Yahvé' conserva tanto la autoridad soberana de אֲדֹנָי como el nombre propio del pacto, sin caer en la tautología 'Señor SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Sentido del participio קשה/raíz difícil הֲמָנְכֶם
  english_pob_reading: you have been more turbulent / possibly rebellious or numerous
  chosen_spanish_reading: han sido más turbulentos
  alternative_spanish_readings:
  - han sido más rebeldes
  - han sido más numerosos
  - han sido más agitados
  rationale: La oración exige preservar la ambigüedad documentada. 'Turbulentos' refleja el campo semántico de desorden, agitación y exceso comparativo sin convertir la dificultad en una sola interpretación dogmática. Esto respeta la tensión del texto fuente.
  doctrine_reference: Lexical ambiguity documented in HALOT and retained by the English POB
- issue: Valor retórico de la comparación con las naciones vecinas
  english_pob_reading: not even acted according to the judgments of the nations
  chosen_spanish_reading: ni siquiera han actuado según los juicios de las naciones
  alternative_spanish_readings:
  - ni aun han actuado conforme a los juicios de las naciones
  - ni siquiera han obrado según las normas de las naciones
  rationale: 'La frase mantiene el juicio profético: el pueblo no sólo falló en obedecer a Yahvé, sino que tampoco alcanzó la conducta esperable de las naciones vecinas. ''Ni siquiera'' preserva esa degradación comparativa.'
  doctrine_reference: Prophetic covenantal indictment in Ezekiel 5:7
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado y se conservó la decisión principal de mantener la dificultad lexical de הֲמָנְכֶם. No se aplicaron revisiones adicionales al contenido de referencia; la redacción española sigue el mismo marco interpretativo, ajustado al mandato terminológico de renderizar יְהוָה como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo 'estatutos' para חֻקּוֹתַי y 'juicios' para מִשְׁפָּטַי כדי preservar el paralelismo interno del versículo.
  - Se evitó 'SEÑOR' como máscara del nombre divino y se usó 'Yahvé' de forma consistente con el proyecto.
  - '''Andado en'' se conservó como metáfora bíblica natural en español; ''cumplido'' se usó para עשה en el campo jurídico-obediencial.'
  - La comparación con las naciones se expresó con 'que' para reflejar la estructura comparativa del hebreo y del inglés POB.
