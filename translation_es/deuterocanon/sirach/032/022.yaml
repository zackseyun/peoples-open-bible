translation:
  language: es
  text: No confíes en el camino de los impíos[a], y ten cuidado en tus sendas. En todos tus caminos cuídate, pues todo el que hace estas cosas guarda el mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo de Kahana para este versículo incluye antes del número de versículo: «No confíes en el camino de los impíos, y en tus sendas ten cuidado». Como esta cláusula aparece antes del marcador de versículo y no coincide con el paralelo griego de Sir 32:22, es probable que sea material adyacente y no parte original de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: אל תבטח בדרך רשעים, ובארחותיך הזהר
  english_pob_choice: Do not trust in the way of the wicked, and be careful in your paths
  chosen_spanish: No confíes en el camino de los impíos, y sé prudente en tus sendas
  alternatives_spanish:
  - No pongas tu confianza en el camino de los malvados, y cuida tus sendas
  - No te fíes del camino de los impíos, y anda con cautela en tus caminos
  lexicon: HALOT
  rationale: Se sigue la línea textual hebrea indicada por la revisión más reciente y por el ajuste del POB inglés. 'Confiar' refleja בטח con naturalidad en español; 'impíos' conserva el matiz religioso-ético de רשעים. 'Ser prudente' y 'sendas' mantienen el paralelismo con un español sobrio y publicable.
- source_word: בכל דרכיך
  english_pob_choice: In all your ways
  chosen_spanish: En todos tus caminos
  alternatives_spanish:
  - En todas tus sendas
  - En toda tu conducta
  lexicon: HALOT
  rationale: '''Caminos'' preserva la metáfora hebrea de דרכים y funciona bien en español bíblico contemporáneo. ''En toda tu conducta'' explicitaría el sentido, pero debilita la imagen original.'
- source_word: שמור נפשך
  english_pob_choice: guard yourself
  chosen_spanish: cuídate
  alternatives_spanish:
  - guárdate
  - guarda tu vida
  - vela por ti mismo
  lexicon: HALOT
  rationale: נפש aquí apunta a la propia persona/vida, no a una abstracción doctrinal. 'Cuídate' expresa bien el imperativo reflexivo en español natural; 'guárdate' sería más literal pero menos fluido.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: '''Pues'' mantiene la relación explicativa proverbial sin sonar pesada. En español bíblico moderno funciona como equivalente breve de כי.'
- source_word: כל עושה אלה
  english_pob_choice: everyone who does these things
  chosen_spanish: todo el que hace estas cosas
  alternatives_spanish:
  - quienquiera que haga estas cosas
  - todos los que hacen estas cosas
  lexicon: HALOT
  rationale: La construcción distributiva preserva el valor genérico del participio hebreo. 'Todo el que' es idiomático y claro en español.
- source_word: שומר מצוה
  english_pob_choice: keeps the commandment
  chosen_spanish: guarda el mandamiento
  alternatives_spanish:
  - cumple el mandamiento
  - obedece el mandamiento
  - guarda el precepto
  lexicon: HALOT
  rationale: '''Guardar'' reproduce el hebreo שומר con su fuerza ética y relacional. ''Mandamiento'' conserva el singular del texto y evita introducir ''la Ley'' donde el hebreo no la nombra explícitamente.'
theological_decisions:
- issue: Valor del singular מצוה
  english_pob_reading: keeps the commandment
  chosen_spanish_reading: guarda el mandamiento
  alternative_spanish_readings:
  - cumple un mandamiento
  - guarda la Ley
  rationale: Se mantiene el singular como en el hebreo y se evita precisar indebidamente una referencia legal más estrecha. La formulación puede abarcar el sentido sapiencial de fidelidad a la instrucción de Dios sin sobretraducirla.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
- issue: Tratamiento de נפשך
  english_pob_reading: guard yourself
  chosen_spanish_reading: cuídate
  alternative_spanish_readings:
  - guarda tu alma
  - guarda tu vida
  rationale: '''Alma'' sería una carga teológica no exigida por el contexto; ''vida'' es posible, pero ''cuídate'' conserva la referencia a la persona entera y suena más natural en español.'
  doctrine_reference: Hebrew anthropology in wisdom literature; avoid flattening נפש into 'soul' when the context is practical and ethical.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que restituye la cláusula inicial hebrea ('No confíes en el camino de los impíos, y sé prudente en tus sendas') y conserva el cierre exhortativo sobre guardar el mandamiento. La versión española integra ambas líneas como una sola unidad textual, sin depender mecánicamente de una sola fuente.
  spanish_consistency_notes:
  - Se usa 'impíos' para רשעים, en línea con el registro bíblico y sin suavizar el juicio moral.
  - '''Caminos/sendas'' conserva la metáfora hebrea y evita una paráfrasis abstracta.'
  - '''Mandamiento'' se mantiene en singular, tal como en el hebreo, sin añadir ''Ley''.'
  - No se emplea 'SEÑOR' ni 'Cristo', porque este versículo no los contiene en el texto seguido aquí.
