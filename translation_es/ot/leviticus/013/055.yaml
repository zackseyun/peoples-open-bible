base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/055.yaml
  text: Then the priest shall examine it after the diseased area has been washed[a], and if the diseased area has not changed its appearance and the diseased area has not spread, it is unclean. You shall burn it in the fire; it is a corrosive spot[c][b], whether on its worn side or on its bare side.
  footnotes:
  - marker: a
    text: Or 'has not changed its color.' The Hebrew idiom literally says 'has not changed its eye,' referring to visible appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'a corroding infection' or traditional 'a fret.' The Hebrew term refers to a destructive deterioration in the material.
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. Literally, 'in its baldness or in its forehead/bare front.' In context this likely refers to one side or surface of the affected material versus the other.
    reason: lexical_alternative
