revisions:
- from: Quien desvía a los rectos por un camino malo caerá en su propia fosa[a], pero los intachables heredarán el bien.
  to: Quien desvía a los rectos por un mal camino él mismo caerá en su propia fosa[a], pero los íntegros heredarán el bien.
  rationale: Se ajusta el texto para reflejar mejor el énfasis del pronombre hebreo הוּא con «él mismo caerá», y se sustituye «intachables» por «íntegros» para expresar con mayor naturalidad y precisión sapiencial el sentido de תְמִימִים. También se mejora levemente la fluidez de «por un camino malo» a «por un mal camino» sin alterar el sentido.
