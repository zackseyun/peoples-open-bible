  chosen_reading: Main text follows the Hebrew clause structure but incorporates the Greek's explicit identification of the rebels as an appositional expansion.
  alternative_readings:
  - 'Translate only the Hebrew: ''Strangers grew angry with him, and in the wilderness they were jealous of him.'''
