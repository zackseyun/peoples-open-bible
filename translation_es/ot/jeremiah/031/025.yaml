translation:
  language: es
  text: Porque he saciado el alma cansada[a], y toda alma desfallecida[b] he llenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «refrescado»; el verbo hebreo literalmente comunica dar de beber en abundancia.
    reason: lexical_alternative
  - marker: b
    text: O «toda alma afligida» o «toda alma apenada».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la promesa inmediata; «porque» conserva bien la fuerza conectiva causal en español sin sonar forzado.
- source_word: הִרְוֵיתִי
  english_pob_choice: I have satisfied
  chosen_spanish: he saciado
  alternatives_spanish:
  - he refrescado
  - he satisfecho
  - he dado de beber en abundancia
  lexicon: HALOT
  rationale: El verbo hebreo expresa literalmente dar de beber abundantemente; «saciar» transmite la plenitud resultante con naturalidad, y la nota permite ver la imagen de abundancia hídrica.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - persona
  - vida
  - yo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa la vida interior o la persona en su necesidad; «alma» mantiene el registro poético y antropológico del pasaje en español bíblico sin reducirlo a una mera «persona».
- source_word: עֲיֵפָה
  english_pob_choice: weary
  chosen_spanish: cansada
  alternatives_spanish:
  - fatigada
  - agotada
  - débil
  lexicon: HALOT
  rationale: Describe a quien está rendido o exhausto; «cansada» es natural en español y refleja adecuadamente el campo semántico de desgaste.
- source_word: וְכָל
  english_pob_choice: and every
  chosen_spanish: y toda
  alternatives_spanish:
  - y cada
  - y toda una
  - e incluso toda
  lexicon: HALOT
  rationale: El hebreo une el paralelismo con una cuantificación distributiva; «y toda» conserva el valor de totalidad sobre cada caso del paralelismo poético.
- source_word: דָּאֲבָה
  english_pob_choice: faint
  chosen_spanish: desfallecida
  alternatives_spanish:
  - lánguida
  - dolorida
  - triste
  lexicon: HALOT
  rationale: El hebreo puede abarcar languidez, dolor o abatimiento; «desfallecida» recoge la idea de debilidad y desgaste emocional/físico sin estrechar el sentido solo a tristeza.
- source_word: מִלֵּאתִי
  english_pob_choice: I have filled
  chosen_spanish: he llenado
  alternatives_spanish:
  - he colmado
  - he rebosado
  - he completado
  lexicon: HALOT
  rationale: «Llenar» conserva la metáfora concreta de plenitud. En español, «he llenado» funciona bien con el paralelismo del primer hemistiquio y no exige una interpretación más libre.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: Rendered as 'soul' in both occurrences
  chosen_spanish_reading: Traducido como «alma» en ambos casos
  alternative_spanish_readings:
  - persona
  - vida
  - yo
  rationale: El verso es poético y habla de la restauración divina de la persona interior en su totalidad. «Alma» preserva el peso antropológico y la resonancia litúrgica sin imponer una antropología técnica ajena al texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de los perfectos hebreos
  english_pob_reading: Rendered with English present perfect ('I have satisfied ... I have filled')
  chosen_spanish_reading: Usado con perfecto compuesto ('he saciado ... he llenado')
  alternative_spanish_readings:
  - sacié ... llené
  - satisfaré ... llenaré
  rationale: Los perfectos hebreos pueden expresar acción completada o acción segura en contexto profético. El perfecto compuesto español conserva bien la forma verbal y el tono de promesa ya garantizada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de דָּאֲבָה
  english_pob_reading: Revised to 'faint' to more directly reflect דָּאֲבָה
  chosen_spanish_reading: «desfallecida»
  alternative_spanish_readings:
  - «débil»
  - «lánguida»
  - «dolorida»
  rationale: En español, «desfallecida» refleja la debilidad y el abatimiento implícitos en el término, manteniendo el paralelismo con «cansada» y evitando restringir el sentido a una sola emoción.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: la elección inglesa pasó de «languishing» a «faint» para reflejar mejor דָּאֲבָה. La versión española adopta esa misma dirección semántica con «desfallecida», manteniendo además la imagen de saciar/llenar y el paralelismo del verso.'
  spanish_consistency_notes:
  - Se usa «alma» para נֶפֶשׁ de forma consistente con el registro poético del POB.
  - Se evita «SEÑOR» como sustituto de Yahvé, pero este versículo no contiene el nombre divino.
  - El perfecto compuesto «he saciado / he llenado» sigue el patrón auditado del inglés POB y su lectura de acción ya realizada o garantizada.
  - 'Las notas se anclan exactamente en los dos elementos que presentan alternativas léxicas: «saciado» y «llenado».'
