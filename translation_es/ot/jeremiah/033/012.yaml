base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/012.yaml
  text: 'Thus says Yahweh of hosts: Yet again there will be in this place[a], which is desolate, without man or beast, and in all its cities, a pasture of shepherds[c][b], where they make flocks lie down.'
  footnotes:
  - marker: a
    text: Or 'again' or 'once more' for 'Yet again.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'without man or beast,' a stock expression for total desolation.
    reason: cultural_note
  - marker: c
    text: Or 'a habitation of shepherds' or 'a fold for shepherds.'
    reason: lexical_alternative
