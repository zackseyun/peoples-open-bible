translation:
  language: es
  text: 'Jesús dijo[a]: «Había un hombre rico que tenía mucho dinero. Dijo: “Usaré mi dinero, para que siembre, siegue y plante, y llene mis depósitos[b] de cosecha[c], para no carecer de nada[d].” Estas eran las cosas que pensaba en su corazón. Y en aquella noche murió. Quien tiene oídos, que oiga[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲭⲣⲏⲙⲁ puede significar ‘dinero’, ‘riqueza’ o ‘bienes’ (griego χρῆμα). Se elige ‘dinero’ por su concreción; ‘riqueza’ también sería posible.
    reason: lexical_alternative
  - marker: b
    text: ⲁϩⲟ puede referirse a depósitos, graneros o almacenes. Se elige ‘depósitos’ para evitar una especificación excesiva.
    reason: lexical_alternative
  - marker: c
    text: ⲕⲁⲣⲡⲟⲥ puede significar ‘fruto’, ‘cosecha’ o ‘producto’. Aquí se elige ‘cosecha’ por el contexto de almacenamiento agrícola.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, la expresión indica ‘no estar en necesidad de nada’.
    reason: cultural_note
  - marker: e
    text: 'Literalmente: ‘Quien tiene oídos, que oiga’. El copto no añade ‘para oír’.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲗⲟⲩⲥⲓⲟⲥ
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - adinerado
  - acaudalado
  lexicon: Crum; Greek loan from πλούσιος
  rationale: ‘Rico’ es el equivalente natural en español y conserva el matiz socioeconómico sin añadir interpretación.
- source_word: ⲭⲣⲏⲙⲁ
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - riqueza
  - bienes
  - posesiones
  lexicon: Crum s.v. ⲭⲣⲏⲙⲁ; Greek χρῆμα
  rationale: ‘Dinero’ mantiene la concreción elegida por la POB inglesa y evita volver abstracto el contraste entre tener y usar.
- source_word: ⲣⲭⲣⲱ
  english_pob_choice: use
  chosen_spanish: usar
  alternatives_spanish:
  - emplear
  - hacer uso de
  lexicon: Crum s.v. ⲭⲣⲱ (use) with causative ⲣ-
  rationale: ‘Usar’ reproduce la sencillez y el carácter directo de la frase, sin elevar el registro innecesariamente.
- source_word: ϫⲉⲕⲁⲁⲥ
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: Crum s.v. ⲕⲁⲁⲥ
  rationale: La partícula introduce finalidad; ‘para que’ expresa con naturalidad esa relación teleológica en español.
- source_word: ϫⲟ
  english_pob_choice: sow
  chosen_spanish: siembre
  alternatives_spanish:
  - sembre
  - plante semillas
  lexicon: Crum s.v. ϫⲟ
  rationale: ‘Sembrar’ es el verbo agrícola estándar; el subjuntivo en la subordinada de finalidad corresponde a la estructura española.
- source_word: ⲱϩⲥ
  english_pob_choice: reap
  chosen_spanish: siegue
  alternatives_spanish:
  - coseche
  - recoja
  lexicon: Crum s.v. ⲱϩⲥ
  rationale: ‘Siegue’ conserva el paralelismo agrícola con ‘siembre’ y ‘plante’, aunque ‘coseche’ sería una alternativa más común.
- source_word: ⲧⲱⲱϭⲉ
  english_pob_choice: plant
  chosen_spanish: plante
  alternatives_spanish:
  - cultive
  - siembre
  lexicon: Crum s.v. ⲧⲱⲱϭⲉ
  rationale: ‘Plante’ sigue la lectura agrícola documentada y evita la harmonización con el ‘edificar’ de Lucas.
- source_word: ⲁϩⲟ
  english_pob_choice: storehouses
  chosen_spanish: graneros
  alternatives_spanish:
  - almacenes
  - graneros o depósitos
  lexicon: Crum s.v. ⲁϩⲟ
  rationale: ‘Graneros’ es un equivalente español natural y tradicional para el contexto agrícola; la POB inglesa prefería un término genérico para no restringir, pero en español ‘graneros’ comunica bien la imagen.
- source_word: ⲕⲁⲣⲡⲟⲥ
  english_pob_choice: produce
  chosen_spanish: produce
  alternatives_spanish:
  - fruto
  - cosecha
  - producto
  lexicon: Crum s.v. ⲕⲁⲣⲡⲟⲥ; Greek καρπός
  rationale: Se conserva ‘produce’ como préstamo léxico transparente porque el contexto de almacenamiento agrícola admite ese término en español y evita estrechar el sentido a ‘fruto’.
- source_word: ⲣϭⲣⲱϩ
  english_pob_choice: lack
  chosen_spanish: carecer
  alternatives_spanish:
  - faltar
  - estar falto de
  lexicon: Crum s.v. ϭⲣⲱϩ
  rationale: La negativa ‘no carecer de nada’ expresa el sentido idiomático de ‘no estar en necesidad de nada’ con buena naturalidad en español.
- source_word: ⲟⲩⲛ ⲙⲁϫⲉ
  english_pob_choice: has ears
  chosen_spanish: tiene oídos
  alternatives_spanish:
  - tiene orejas
  - tiene un oído
  lexicon: Crum s.v. ⲙⲁϫⲉ
  rationale: La fórmula se mantiene sin añadir ‘para oír’, porque el coptico no lo incluye; ‘oídos’ conserva el plural del original.
- source_word: ⲙⲁⲣⲉ…ⲥⲱⲧⲙ
  english_pob_choice: let … hear
  chosen_spanish: que oiga
  alternatives_spanish:
  - que escuche
  - que preste atención
  lexicon: Layton, Grammar §177; common jussive formula
  rationale: El jussivo se expresa de forma natural con ‘que oiga’, preservando el cierre exhortativo de Tomás.
theological_decisions:
- issue: Fórmula final sin ‘para oír’
  english_pob_reading: Whoever has ears, let that one hear.
  chosen_spanish_reading: Quien tiene oídos, que oiga.
  alternative_spanish_readings:
  - Quien tenga oídos, que oiga.
  - El que tenga oídos, oiga.
  rationale: El coptico no añade ‘para oír’; por eso se evita armonizar con los paralelos sinópticos. La traducción conserva la concisión de Tomás.
  doctrine_reference: 'Comparación sinóptica: Mt 11:15; Mc 4:9; Lc 8:8'
- issue: Cláusula de propósito en ϫⲉⲕⲁⲁⲥ
  english_pob_reading: so that I will sow...
  chosen_spanish_reading: para que yo siembre...
  alternative_spanish_readings:
  - a fin de que yo siembre...
  - de modo que yo siembre...
  rationale: La partícula expresa finalidad, no simple causalidad. ‘Para que’ preserva el valor teleológico señalado por la revisión del texto base.
  doctrine_reference: Gramática coptica del propósito; sin implicación doctrinal específica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la relación de ϫⲉⲕⲁⲁⲥ como cláusula final (‘para que’) y la fórmula final como ‘quien tiene oídos’, sin el añadido sinóptico ‘para oír’. También se respetó la observación de que la secuencia verbal es agrícola (‘siembre’, ‘siegue’, ‘plante’) y no arquitectónica.
  spanish_consistency_notes:
  - Se mantuvo ‘Jesús’ para ⲓ︤ⲥ︥, conforme al estándar POB.
  - Se evitó ‘SEÑOR’ y otras sustituciones no presentes en el original.
  - ‘Dinero’ se eligió por concreción, coherente con la POB inglesa.
  - Se conservó el orden retórico breve y proverbial del dicho, sin expandirlo explicativamente.
