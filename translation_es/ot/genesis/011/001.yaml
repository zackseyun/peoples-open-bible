translation:
  language: es
  text: Ahora toda la tierra tenía una sola lengua y las mismas palabras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y unas mismas palabras» / «y una misma habla». El hebreo dice literalmente «y palabras, las mismas/una».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... had
  chosen_spanish: Ahora ... tenía
  alternatives_spanish:
  - Y ocurrió que ...
  - Y ... era
  lexicon: HALOT
  rationale: El waw consecutivo introduce la situación narrativa; en español, «Ahora» expresa bien el giro discursivo y «tenía» comunica el valor estativo sin arcaísmo.
- source_word: כָל הָאָרֶץ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país»; en este contexto el alcance es universal, y «toda la tierra» mantiene esa amplitud con español natural.
- source_word: שָׂפָה אֶחָת
  english_pob_choice: one language
  chosen_spanish: una sola lengua
  alternatives_spanish:
  - un solo idioma
  - una sola habla
  lexicon: HALOT
  rationale: שָׂפָה literalmente es «labio», pero en este giro significa idioma/lengua. «Lengua» conserva la idiomaticidad bíblica y el singular enfático de אֶחָת.
- source_word: וּדְבָרִים אֲחָדִים
  english_pob_choice: and the same words
  chosen_spanish: y las mismas palabras
  alternatives_spanish:
  - y unas mismas palabras
  - y un mismo vocabulario
  - y las mismas expresiones
  lexicon: HALOT
  rationale: דְּבָרִים significa normalmente «palabras» o «cosas». Aquí, junto a «una sola lengua», señala uniformidad de expresión; «las mismas palabras» preserva el sentido léxico y la fuerza de אֲחָדִים sin duplicar simplemente «lengua».
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto en inglés no requirió cambios y que hay alto acuerdo entre los controles; la forma española sigue de cerca ese sentido sin añadir material.
  spanish_consistency_notes:
  - Se usó «lengua» para שָׂפָה por ser el equivalente bíblico más natural en español y no «labio», que sería demasiado literal.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se mantuvo la duplicación semántica entre «una sola lengua» y «las mismas palabras» para reflejar la distinción del hebreo.
