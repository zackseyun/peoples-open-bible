base_translation:
  language: en
  yaml_path: translation/nt/acts/017/028.yaml
  text: For in him we live and move and exist, as even some of your own poets have said, ‘For we also are his offspring.’
translation:
  language: ko
  text: 「우리가 그 안에서 살고 움직이며 존재합니다.」 또한 여러분의 시인들 가운데 어떤 이들이 말한 바와 같이, 「우리가 그의 자손입니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ γὰρ καὶ γένος ἐσμέν
  english_pob_choice: For we also are his offspring
  chosen_korean: 우리가 그의 자손입니다
  alternatives_korean:
  - 우리도 그의 후손입니다
  lexicon: BDAG
  rationale: 아라토스(Aratus)의 「파이노메나」 5행 인용. 「자손/후손」 둘 다 가능하나 「자손」이 한국어 시 어조에 자연스럽다.
theological_decisions:
- issue: 17:28 헬라 시인 인용 처리
  chosen_reading: 아라토스의 「파이노메나」 인용을 그대로 옮김
  alternative_readings:
  - 시 출처를 본문에 명시
  rationale: 바울은 출처를 「여러분의 시인들」로 흐리며 청중의 공통 문헌으로 사용한다. 본 번역은 본문에 추가 설명을 넣지 않고 인용의 흐름을 보존한다. 첫 구 「우리가 그 안에서 살고 움직이며 존재한다」는 에피메니데스(Epimenides)의 시구로 흔히 인식되며, 바울이 이중 인용을 한 것으로 보인다.
  doctrine_reference: 'Methodology: classical citations'
