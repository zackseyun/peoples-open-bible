translation:
  language: es
  text: 'Y Yahvé[a] dijo: «Judá subirá. He aquí[b], he dado la tierra en su mano[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa directamente el nombre divino יְהוָה; aquí se traduce «Yahvé» en lugar de sustituirlo por un título como «el Señor».
    reason: source_note
  - marker: b
    text: Partícula hebrea de llamada de atención solemne; también puede entenderse como «mira» o «he aquí».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «en su mano», un modismo que significa bajo el poder o control de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa directamente el nombre divino del pacto, no un título. En español, el equivalente de uso litúrgico y académico dentro del proyecto es «Yahvé», que conserva el valor nominal de יְהוָה sin sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La waw narrativa introduce avance secuencial; «Y ... dijo» mantiene el flujo hebreo de manera natural en español sin añadir matices no presentes en el texto.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: El nombre propio tribal se adapta a la forma española establecida «Judá», que es la forma usual y reconocible en español bíblico.
- source_word: יַעֲלֶה
  english_pob_choice: shall go up
  chosen_spanish: subirá
  alternatives_spanish:
  - irá arriba
  - subirá a combatir
  lexicon: HALOT
  rationale: עלה significa literalmente «subir/ascender». En este contexto militar y narrativo, «subirá» conserva la imagen hebrea y comunica la orden/divina dirección sin sobreexplicar.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La partícula deíctica pide atención solemne. «He aquí» mantiene la fuerza formal del hebreo y corresponde mejor al registro de la lectura bíblica que una forma coloquial.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: yo he dado
  alternatives_spanish:
  - yo doy
  - yo he entregado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como ya cumplida desde la perspectiva del hablante. «Yo he dado» preserva esa fuerza completiva y la seguridad divina previa al combate.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al territorio prometido o asignado en contexto. «La tierra» es la opción natural en español bíblico y evita una lectura global de «tierra» como planeta.
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en poder de Judá
  - en sus manos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de «mano» como poder o control. En español, «en su mano» mantiene el giro sin perder inteligibilidad; el referente es Judá.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo emplea el Tetragrama; el proyecto evita la sustitución por un título. «Yahvé» preserva el nombre propio divino y la decisión teológica de traducirlo de manera auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Valor de הִנֵּה en un contexto de promesa divina
  english_pob_reading: Behold
  chosen_spanish_reading: He aquí
  alternative_spanish_readings:
  - Mira
  - Ve
  rationale: La partícula no solo llama la atención; introduce solemnidad y énfasis en la declaración divina. «He aquí» conserva mejor esa función que una forma demasiado coloquial.
  doctrine_reference: HALOT / discurso deíctico hebreo
- issue: Imagen idiomática de בְּיָדוֹ
  english_pob_reading: into his hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - bajo su poder
  - en poder de Judá
  rationale: La expresión hebrea comunica dominio concedido por Dios. Mantener «mano» preserva la metáfora bíblica sin desactivarla, y deja visible la tensión entre imagen literal y sentido idiomático.
  doctrine_reference: Uso idiomático hebreo de mano = poder/control
translation_notes:
  revision_awareness: La auditoría inglesa pasó de «Look» a «Behold» para הִנֵּה, priorizando un registro más formal. Esta versión española sigue esa revisión con «He aquí», manteniendo la solemnidad sin perder claridad. También conserva el valor idiomático de «into his hand» mediante «en su mano», en línea con la decisión inglesa de no parafrasear el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה en todo el record, conforme al estándar del proyecto.
  - Se usa Judá, forma española establecida para el nombre tribal.
  - Se preserva la metáfora de «mano» en vez de sustituirla por una abstracción interpretativa.
  - El registro es bíblico-formal, pero con sintaxis natural en español contemporáneo.
