translation:
  language: es
  text: Él va tras ella de inmediato, como un buey al degolladero, y como un grillete[a] a la disciplina de un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y como un grillete a la disciplina de un necio». El hemistiquio final es difícil. Algunos entienden la palabra traducida aquí como «grillete» de otra manera y vierten el pasaje en líneas como «como un venado que entra en la trampa» o «como grilletes para la corrección de un necio».'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - sigue
  lexicon: HALOT
  rationale: El participio qal describe acción en curso; en español, 'va' transmite movimiento inmediato y narrativo sin sonar forzado. 'Sigue' podría enfatizar seguimiento, pero 'va tras ella' mantiene mejor el dinamismo del contexto.
- source_word: אַחֲרֶיהָ
  english_pob_choice: after her
  chosen_spanish: tras ella
  alternatives_spanish:
  - detrás de ella
  - después de ella
  lexicon: HALOT
  rationale: '''Tras ella'' conserva la relación espacial y la idea de seguimiento implicada por el hebreo, con un registro natural en español bíblico contemporáneo.'
- source_word: פִּתְאֹם
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - repentinamente
  - enseguida
  lexicon: HALOT
  rationale: La idea es de prontitud impulsiva, no solo sorpresa temporal. 'De inmediato' expresa la falta de demora y la precipitación del acto. En el texto se integra naturalmente con 'va tras ella'.
- source_word: כְּשׁוֹר
  english_pob_choice: like an ox
  chosen_spanish: como un buey
  alternatives_spanish:
  - como un toro
  - como un buey de labor
  lexicon: HALOT
  rationale: Aunque el inglés eligió 'ox', en español 'buey' es la correspondencia más natural para el animal conducido sin comprender su destino. 'Toro' suena menos ajustado al cuadro doméstico y de arrastre.
- source_word: אֶל טָבַח יָבֹא
  english_pob_choice: going to the slaughter
  chosen_spanish: al degolladero
  alternatives_spanish:
  - a la matanza
  - a ser sacrificado
  lexicon: HALOT
  rationale: La imagen hebrea apunta al lugar de matanza. 'Degolladero' comunica con fuerza el destino mortal y la metáfora proverbial. 'A la matanza' es posible, pero menos idiomático en este contexto.
- source_word: וּכְעֶכֶס
  english_pob_choice: and like a fetter
  chosen_spanish: y como un grillete
  alternatives_spanish:
  - y como un cepo
  - y como un fetter
  lexicon: HALOT
  rationale: El término es difícil y debatido; el inglés opta por 'fetter' para una lectura de sujeción. 'Grillete' comunica en español la idea de restricción física sin comprometerse con un objeto específico, manteniendo la cautela textual.
- source_word: אֶל מוּסַר
  english_pob_choice: to the discipline
  chosen_spanish: a la disciplina
  alternatives_spanish:
  - al castigo
  - a la corrección
  - a la instrucción
  lexicon: HALOT
  rationale: מוּסָר en Proverbios puede abarcar disciplina correctiva e instrucción. Aquí, por el paralelo con la ruina, 'disciplina' preserva esa amplitud mejor que 'castigo', que estrecha demasiado el sentido.
- source_word: אֱוִיל
  english_pob_choice: of a fool
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un insensato
  - del necio
  lexicon: HALOT
  rationale: El hebreo final es difícil sintácticamente; 'de un necio' reproduce de manera cauta el sustantivo singular sin resolver en exceso la relación gramatical exacta. 'Necio' mantiene el valor proverbial de אֱוִיל.
theological_decisions:
- issue: Lectura del hemistiquio final (עֶכֶס / מוּסַר אֱוִיל)
  english_pob_reading: The line is difficult. Some understand the word rendered 'fetter' differently and translate the clause along the lines of 'like a deer stepping into a snare' or 'like shackles for the correction of a fool.'
  chosen_spanish_reading: 'Se conserva la lectura cauta: ''como un grillete a la disciplina de un necio'', sin resolver el término oscuro como si la variante estuviera cerrada.'
  alternative_spanish_readings:
  - como un venado que cae en la trampa
  - como grilletes para la corrección de un necio
  - como un collar/brazalete
  rationale: El hebreo presenta una dificultad léxica real en עֶכֶס y una relación sintáctica ambigua con el complemento final. La traducción española debe reflejar esa tensión en vez de normalizarla. Por eso se mantiene una imagen de restricción ('grillete') y se conserva la estructura poco resuelta del final.
  doctrine_reference: Proverbs / literatura sapiencial; principio de cautela textual
- issue: Valor aspectual del participio inicial
  english_pob_reading: He goes after her at once
  chosen_spanish_reading: Él va tras ella de inmediato
  alternative_spanish_readings:
  - Él camina tras ella de inmediato
  - Él sigue tras ella de inmediato
  rationale: El participio hebreo sugiere acción vividament presente y decisiva. En español, 'va tras ella de inmediato' conserva ese carácter narrativo sin convertirlo en una descripción genérica o demasiado estática.
  doctrine_reference: No aplica; decisión de aspecto/discurso
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto al estado auditado; se mantiene la cautela en el hemistiquio final y la equivalencia óptima para el adverbio y el participio inicial.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el nombre divino.
  - Se conserva 'necio' para אֱוִיל, coherente con el registro sapiencial en español.
  - '''Grillete'' se eligió como equivalente prudente de ''fetter''/''עֶכֶס'' sin cerrar la discusión textual.'
  - La nota al pie está anclada en el lugar problemático del versículo y no introduce marcadores innecesarios.
