translation:
  language: es
  text: Y proclamaron en Judá y en Jerusalén que llevaran a Yahvé el tributo[a] de Moisés, siervo de Dios, para Israel en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la contribución» o «el impuesto» de Moisés, siervo de Dios. El término hebreo se refiere a un aporte tasado o exigido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ קוֹל
  english_pob_choice: they made a proclamation
  chosen_spanish: proclamaron
  alternatives_spanish:
  - dieron un pregón
  - hicieron una proclamación
  lexicon: HALOT
  rationale: El hebreo expresa una convocatoria pública y audible. En español, «proclamaron» comunica bien el acto oficial sin volverlo mecánico; «dieron un pregón» suena más regional y «hicieron una proclamación» es más pesado.
- source_word: בִּיהוּדָה וּבִירוּשָׁלַם
  english_pob_choice: in Judah and Jerusalem
  chosen_spanish: en Judá y en Jerusalén
  alternatives_spanish:
  - en Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conserva el alcance geográfico de la proclamación. Repetir «en» ante ambos lugares mantiene claridad natural en español.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: que trajeran
  alternatives_spanish:
  - para traer
  - a fin de traer
  lexicon: HALOT
  rationale: Tras la proclamación, el infinitivo de propósito se vuelve natural en español como una subordinada final. «Que trajeran» comunica bien la finalidad y el contenido de la orden pública.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: DOCTRINE.md contested terms / YHWH
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, preservando el nombre del pacto sin sustituirlo por una máscara litúrgica.'
- source_word: מַשְׂאַת
  english_pob_choice: the levy
  chosen_spanish: la contribución
  alternatives_spanish:
  - el tributo
  - la carga
  lexicon: HALOT
  rationale: El término hebreo designa una obligación evaluada o aportación exigida. En español, «contribución» es claro y amplio; «tributo» podría sonar demasiado político, y «carga» no expresa tan bien la ofrenda/entrega requerida.
- source_word: מֹשֶׁה עֶבֶד הָאֱלֹהִים
  english_pob_choice: of Moses the servant of God
  chosen_spanish: de Moisés, el siervo de Dios
  alternatives_spanish:
  - de Moisés, el esclavo de Dios
  - de Moisés, siervo de Dios
  lexicon: HALOT
  rationale: Se mantiene el título tradicional del contexto bíblico como «siervo de Dios», que en español es idiomático y fiel. «Esclavo» reflejaría más directamente δοῦλος, pero aquí el hebreo עֶבֶד en esta fórmula fija funciona como designación honorífica.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - sobre Israel
  - a Israel
  lexicon: HALOT
  rationale: El inglés auditado ya resolvió la idea en sentido final/beneficiario; en español, «para Israel» expresa con naturalidad la referencia al encargo asociado a Israel. Evita forzar un «sobre» que sonaría demasiado literal sin aclarar mejor el sentido.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  lexicon: HALOT
  rationale: «Desierto» es una equivalencia válida y más natural para lectores en español. Aunque «wilderness» suele corresponder a «desierto» o «desierto/soledad», aquí el contexto del éxodo permite esa opción sin pérdida sustancial.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se adopta la política textual del proyecto para el Tetragrama: transliteración reverente y auditable en lugar de una sustitución litúrgica. «Yahvé» conserva la referencia explícita al nombre propio de Dios.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Función de מַשְׂאַת en este contexto
  english_pob_reading: the levy / the contribution / the tax
  chosen_spanish_reading: la contribución
  alternative_spanish_readings:
  - el tributo
  - el impuesto
  rationale: La tensión entre una obligación tasada y una ofrenda queda mejor resuelta en español con «contribución», que no fuerza una lectura moderna de fiscalidad estatal ni borra el carácter requerido del acto.
  doctrine_reference: HALOT; audit trail lexical note
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del audit trail inglés: evita introducir una idea explícita de ‘impuesta sobre’ que el texto no formula de manera directa en la revisión final, pero conserva el matiz de obligación mediante «contribución» y el encargo dirigido a Israel. También mantiene el nombre divino como Yahvé, conforme al criterio doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה, sin alternar con «SEÑOR».
  - Se conserva «siervo de Dios» como fórmula estable para עֶבֶד הָאֱלֹהִים.
  - «Contribución» se emplea en sentido técnico bíblico y no como simple donativo voluntario.
  - La sintaxis española evita calcar la construcción hebrea pero mantiene el contenido proposicional completo.
