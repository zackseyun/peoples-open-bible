translation:
  language: es
  text: Y lo sepultaron en la ciudad de David, entre los reyes[a], porque había hecho bien en Israel, y para con Dios y su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los reyes».
    reason: lexical_alternative
  - marker: b
    text: Es decir, para con Dios y para con su casa, el templo.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: And they buried him
  chosen_spanish: Y lo sepultaron
  alternatives_spanish:
  - Y lo enterraron
  - Y lo pusieron en sepultura
  lexicon: HALOT
  rationale: El hebreo es una forma activa plural con objeto de tercera persona singular; por eso se conserva el sujeto indefinido plural con un verbo activo. «Sepultar» mantiene el registro digno del contexto funerario y traduce bien el acto formal del entierro.
- source_word: בְעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad davídica
  lexicon: HALOT
  rationale: Se conserva la expresión toponímica estable y reconocible, sin reordenarla ni volverla más libre. En español, la forma natural y fiel es «la ciudad de David».
- source_word: עִם הַמְּלָכִים
  english_pob_choice: among the kings
  chosen_spanish: entre los reyes
  alternatives_spanish:
  - con los reyes
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede ser «con», el contexto funerario favorece una idea de colocación o compañía entre reyes. «Entre los reyes» reproduce mejor ese efecto en español que «con los reyes».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón del honor funerario. «Porque» es la equivalencia más clara y natural en español contemporáneo.
- source_word: עָשָׂה טוֹבָה
  english_pob_choice: he had done good
  chosen_spanish: había hecho bien
  alternatives_spanish:
  - había hecho lo bueno
  - había hecho bondad
  lexicon: HALOT
  rationale: La expresión hebrea denota haber realizado bien/beneficio; «había hecho bien» conserva la sencillez y el sentido valorativo sin introducir una paráfrasis más amplia que el texto no exige.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: 'El matiz locativo es el más directo aquí: el bien fue realizado dentro de la esfera de Israel. Se evita «para» porque introduce una finalidad no explícita en el hebreo.'
- source_word: וְעִם הָאֱלֹהִים
  english_pob_choice: and toward God
  chosen_spanish: y para con Dios
  alternatives_spanish:
  - y con Dios
  - y hacia Dios
  lexicon: HALOT
  rationale: Se evita «con Dios» como traducción principal porque en español puede sonar a mera compañía. «Para con Dios» comunica mejor la orientación relacional y devocional que el audit trail inglés ya identifica.
- source_word: וּבֵיתוֹ
  english_pob_choice: and his house
  chosen_spanish: y su casa
  alternatives_spanish:
  - y la casa de Dios
  - y su templo
  lexicon: HALOT
  rationale: El sufijo puede leerse como referencia a la casa de Dios, pero el hebreo mantiene la forma pronominal. En español, «su casa» preserva esa tensión y deja que el contexto identifique la referencia al templo sin resolverla demasiado pronto.
theological_decisions:
- issue: Referente de «su casa»
  english_pob_reading: '''his house'' refers to God''s house, the temple'
  chosen_spanish_reading: «su casa» se entiende como la casa de Dios, es decir, el templo
  alternative_spanish_readings:
  - «su casa» podría leerse como su propia casa o familia
  - «su casa» podría explicitarse como «la casa de Dios» en el texto principal
  rationale: El contexto inmediato y la lectura auditada del inglés favorecen entender el pronombre como referido a Dios. Sin embargo, el español puede hacer visible la misma tensión sin borrar el pronombre del hebreo; por eso se deja en el texto principal y se explica en la nota.
  doctrine_reference: 2 Crónicas 24:16; referencia contextual al templo en el relato de Joás y Joiada
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del audit trail inglés: sujeto plural indefinido para el sepulcro, «entre los reyes» como solución idiomática y la tensión referencial de «su casa» sin diluirla en el texto principal. No se aplicaron revisiones adicionales.'
  spanish_consistency_notes:
  - «Y» abre la cláusula narrativa como en español bíblico natural, sin recargar el verso.
  - «para con Dios» conserva la orientación relacional sin convertirla en una mera asociación espacial.
  - Se mantiene «su casa» para respetar la forma pronominal del hebreo y permitir la explicación contextual en nota.
  - El registro es sobrio y publicable, con terminología consistente con «Dios» y «templo».
