translation:
  language: es
  text: Y traeremos la primera porción de nuestra masa[a], nuestras contribuciones, el fruto de todo árbol, el vino nuevo, y el aceite a los sacerdotes, a las habitaciones[b] de la casa de nuestro Dios, y el diezmo de nuestra tierra a los levitas; porque ellos, los levitas, son los que recaudan los diezmos en todas las ciudades donde trabajamos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la primicia de nuestra masa’. El hebreo puede referirse a la porción inicial apartada para Dios.
    reason: lexical_alternative
  - marker: b
    text: O ‘depósitos’. El hebreo se refiere a cuartos del recinto del templo, a menudo usados para almacenar provisiones.
    reason: lexical_alternative
  - marker: c
    text: O ‘en todas las ciudades de nuestro servicio/trabajo’. La expresión hebrea es condensada y puede referirse a las ciudades vinculadas con la labor agrícola del pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: רֵאשִׁית עֲרִיסֹתֵינוּ
  english_pob_choice: the first of our dough
  chosen_spanish: la primicia de nuestra masa
  alternatives_spanish:
  - la primera porción de nuestra masa
  - la primicia de nuestra masa amasada
  lexicon: HALOT
  rationale: רֵאשִׁית expresa la primera porción, y עֲרִיסָה remite a masa/dough amasada. "Primicia" comunica la porción primera apartada para Dios sin perder naturalidad en español, y "masa" preserva la concreción del término hebreo mejor que una generalización como "ofrenda".
- source_word: תְּרוּמֹתֵינוּ
  english_pob_choice: our contributions
  chosen_spanish: nuestras ofrendas
  alternatives_spanish:
  - nuestras contribuciones
  - nuestras ofrendas elevadas
  lexicon: HALOT
  rationale: תְּרוּמָה es una ofrenda/contribución apartada. "Ofrendas" es claro y reverente en español; "contribuciones" sería correcto pero menos culto-litúrgico, y "ofrendas elevadas" sería demasiado técnico.
- source_word: פְּרִי כָל עֵץ
  english_pob_choice: the fruit of every tree
  chosen_spanish: el fruto de todo árbol
  alternatives_spanish:
  - el fruto de cada árbol
  - los frutos de todos los árboles
  lexicon: HALOT
  rationale: La construcción distributiva se conserva con "todo árbol". El singular "fruto" sigue de cerca el hebreo colectivo y suena natural en español bíblico contemporáneo.
- source_word: תִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: el mosto
  alternatives_spanish:
  - el vino nuevo
  - el vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ se refiere al producto reciente de la uva, a menudo "mosto" o "vino nuevo". Se eligió "mosto" porque en español nombra con precisión el líquido recién expresado y evita la posible ambigüedad de "vino".
- source_word: יִצְהָר
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  - el aceite
  lexicon: HALOT
  rationale: En listas agrícolas, יִצְהָר designa el aceite, normalmente de oliva. "Aceite" es fiel y suficientemente natural; "aceite de oliva" explicita lo implícito, pero añade un matiz interpretativo no exigido por el hebreo.
- source_word: נָבִיא
  english_pob_choice: we will bring
  chosen_spanish: traeremos
  alternatives_spanish:
  - llevaremos
  - presentaremos
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es hiphil de בוא, en este contexto de pacto expresa una promesa comunitaria. "Traeremos" reproduce de manera natural la acción de llevar los bienes al santuario y evita sonar demasiado literal con una forma española forzada.
- source_word: לִשְׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las habitaciones
  - los aposentos
  - las despensas
  lexicon: HALOT
  rationale: לִשְׁכוֹת son cuartos del complejo del templo, a menudo usados como almacenes. "Cámaras" conserva el sentido arquitectónico tradicional sin reducirlo solo a almacenamiento.
- source_word: מַעְשַׂר אַדְמָתֵנוּ
  english_pob_choice: the tithe of our land
  chosen_spanish: el diezmo de nuestra tierra
  alternatives_spanish:
  - la décima parte de nuestra tierra
  - el diezmo de nuestra tierra
  lexicon: HALOT
  rationale: La frase apunta al diezmo debido de los productos de la tierra. "Diezmo de nuestra tierra" es compacto y reproduce bien la relación genitiva sin explicitar de más.
- source_word: הַמְעַשְּׂרִים
  english_pob_choice: collect the tithes
  chosen_spanish: recaudan los diezmos
  alternatives_spanish:
  - reciben los diezmos
  - cobran los diezmos
  lexicon: HALOT
  rationale: El participio describe la función administrativa de los levitas en las ciudades. "Recaudan" comunica recogida/recepción organizada de manera adecuada para el español actual; "cobran" sonaría fiscal, y "reciben" sería demasiado pasivo.
- source_word: בְּכָל עָרֵי עֲבֹדָתֵנוּ
  english_pob_choice: in all the cities where we labor
  chosen_spanish: en todas las ciudades de nuestro trabajo
  alternatives_spanish:
  - en todas las ciudades de nuestro servicio
  - en todas las ciudades donde trabajamos
  lexicon: HALOT
  rationale: עֲבֹדָה puede significar trabajo, servicio o labor. Se eligió "trabajo" para conservar la ambigüedad productiva del hebreo y mantener la conexión con el contexto agrícola, sin forzar "servicio" eclesiástico.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el razonamiento auditado de la POB inglesa, conservando la estructura enumerativa, la referencia a los sacerdotes y levitas, y la función de recolección de diezmos. No se detectaron revisiones aplicadas en el tramo inglés, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general en el proyecto, pero este versículo usa la expresión fija "casa de nuestro Dios" en consonancia con el hebreo.
  - Se usa "levitas" y "sacerdotes" con terminología bíblica estándar y sin introducir equivalentes eclesiásticos ajenos al contexto.
  - Se conserva "cámaras" para לִשְׁכוֹת, evitando reemplazarlo por un término exclusivamente de almacenamiento.
  - '"Mosto" se eligió para תִּירוֹשׁ por su valor agrícola concreto; no se generaliza a "vino".'
  - La forma verbal "traeremos" refleja adecuadamente el compromiso comunitario del contexto de pacto.
