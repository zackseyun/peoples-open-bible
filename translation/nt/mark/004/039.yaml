id: MRK.4.39
reference: Mark 4:39
source:
  edition: SBLGNT
  text: καὶ διεγερθεὶς ἐπετίμησεν τῷ ἀνέμῳ καὶ εἶπεν τῇ θαλάσσῃ· Σιώπα, πεφίμωσο. καὶ ἐκόπασεν ὁ ἄνεμος, καὶ ἐγένετο γαλήνη μεγάλη.
translation:
  text: And having awakened[a], he rebuked the wind and said to the sea, “Be silent! Be still!” And the wind ceased[b], and there was a great calm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more traditionally, “Peace! Be still!” The Greek more literally has two imperatives: “Be silent! Be muzzled!”'
    reason: lexical_alternative
  - marker: b
    text: 'That is, the Sea of Galilee; Greek: “the sea.”'
    reason: cultural_note
lexical_decisions:
- source_word: διεγερθεὶς
  lemma: διεγείρω
  chosen: after waking up
  alternatives:
  - having awakened
  - being awakened
  - after being awakened
  lexicon: BDAG
  rationale: Aorist passive participle from διεγείρω in context refers to Jesus rising from sleep after the disciples woke him (cf. previous verse). 'After waking up' is natural English and preserves the temporal participial force without over-specifying agency in the main text.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned
  - commanded sternly
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means 'rebuke' in Mark, including in contexts of authoritative command over hostile or chaotic forces. 'Rebuked' preserves the force and Markan consistency better than a softer term.
- source_word: ἀνέμῳ
  chosen: the wind
  alternatives:
  - the storm wind
  lexicon: BDAG
  rationale: The noun is simply 'wind.' Although the broader scene is a storm, the direct object of Jesus' rebuke is specifically the wind, so the simpler rendering is preferred.
- source_word: θαλάσσῃ
  chosen: the sea
  alternatives:
  - the lake
  lexicon: BDAG
  rationale: θάλασσα normally means 'sea.' Although geographically this is the Sea of Galilee, rendering it 'sea' follows the Greek wording and preserves the narrative's cosmic resonance.
- source_word: Σιώπα
  chosen: Be silent!
  alternatives:
  - Silence!
  - Be quiet!
  - Hush!
  lexicon: BDAG
  rationale: Present active imperative of σιωπάω calls for immediate silence. 'Be silent!' is direct, idiomatic, and suitably forceful.
- source_word: πεφίμωσο
  chosen: Be muzzled!
  alternatives:
  - Be still!
  - Be gagged!
  - Be quiet!
  lexicon: BDAG
  rationale: Perfect passive imperative of φιμόω literally evokes muzzling. 'Be muzzled!' preserves the vivid metaphor and the strong authoritative tone, rather than flattening it to the more interpretive 'Be still!'.
- source_word: ἐκόπασεν
  chosen: ceased
  alternatives:
  - died down
  - grew calm
  - stopped
  lexicon: BDAG
  rationale: κοπάζω means to abate or cease, especially of wind or storm. 'Ceased' is concise and matches the subject 'the wind' directly.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - it became
  - there came to be
  lexicon: BDAG
  rationale: γίνομαι here introduces the resulting state. English idiom prefers existential 'there was' with the predicate noun phrase.
- source_word: γαλήνη μεγάλη
  chosen: a great calm
  alternatives:
  - a great stillness
  - complete calm
  lexicon: BDAG
  rationale: The phrase is literally 'a great calm.' Retaining 'great' mirrors Mark's style and links with the preceding 'great windstorm' in the context.
