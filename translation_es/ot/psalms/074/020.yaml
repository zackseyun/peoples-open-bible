translation:
  language: es
  text: Mira la alianza[a], porque los lugares oscuros de la tierra[b] están llenos de guaridas de violencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu alianza». El hebreo dice literalmente «la alianza», pero el contexto se refiere claramente a la alianza de Dios con su pueblo.
    reason: alternative_reading
  - marker: b
    text: O «los lugares oscuros de la tierra» en el sentido de «del mundo». El sustantivo hebreo puede significar «tierra», «país» o «mundo», según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «moradas de violencia» o «habitaciones de violencia». El hebreo apunta a lugares caracterizados por la violencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  english_pob_choice: Look to
  chosen_spanish: Mira hacia
  alternatives_spanish:
  - Considera
  - Mira
  - Mira a
  lexicon: HALOT
  rationale: El imperativo exige una apelación directa y orante. «Mira hacia» conserva el sentido de dirigir la atención favorablemente y suena natural en español bíblico contemporáneo.
- source_word: לַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - el pacto de alianza
  - tu pacto
  lexicon: HALOT
  rationale: Aunque la tradición bíblica suele decir «pacto» o «alianza», aquí «pacto» mantiene la referencia al término hebreo בְּרִית sin añadir un posesivo que el hebreo no explicita. Se evita «tu pacto» en el texto principal para conservar la redacción fuente.
- source_word: מָלְאוּ
  english_pob_choice: are full of
  chosen_spanish: están llenos de
  alternatives_spanish:
  - han sido llenos de
  - se han llenado de
  lexicon: HALOT
  rationale: El perfecto qal describe un estado presente resultante; en español, «están llenos de» expresa mejor ese estado que una forma más literal pero menos natural.
- source_word: מַחֲשַׁכֵּי אֶרֶץ
  english_pob_choice: the dark places of the land
  chosen_spanish: los lugares oscuros de la tierra
  alternatives_spanish:
  - los lugares oscuros de la tierra
  - los rincones oscuros de la tierra
  - las regiones oscuras de la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de lugares sin luz. «Tierra» mantiene la flexibilidad de אֶרֶץ entre «tierra» y «país/territorio»; aquí el contexto lamenta la devastación del ámbito habitado, por lo que «tierra» es suficientemente fiel y claro.
- source_word: נְא֣וֹת
  english_pob_choice: haunts
  chosen_spanish: guaridas
  alternatives_spanish:
  - moradas
  - habitáculos
  - lugares
  lexicon: HALOT
  rationale: La revisión inglesa pasó de «dwellings» a «haunts» para subrayar lugares caracterizados por violencia. «Guaridas» transmite en español esa idea de sitios ocupados por violencia con un matiz más vivo que «moradas», sin perder el valor locativo.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  - violencia injusta
  lexicon: HALOT
  rationale: «Violencia» es la equivalencia directa y establecida para חָמָס. Se evita suavizar el término con «opresión» o «injusticia» porque el texto resalta la brutalidad presente en esos lugares.
theological_decisions:
- issue: Si hacer explícito que el pacto pertenece a Dios
  english_pob_reading: the covenant
  chosen_spanish_reading: el pacto
  alternative_spanish_readings:
  - tu pacto
  - el pacto de Dios
  rationale: El hebreo tiene artículo definido, no sufijo posesivo. El contexto deja claro que se trata del pacto de Yahvé con su pueblo, pero la traducción principal preserva la forma fuente sin añadir posesividad. La referencia divina puede inferirse del contexto orante, y cualquier explicitación se deja para nota.
  doctrine_reference: Covenant theology / pacto de Yahvé con su pueblo
- issue: Cómo reflejar ארץ en una lamentación sobre devastación
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: En este contexto de lamentación, «la tierra» mantiene la amplitud semántica de אֶרֶץ y evita restringir indebidamente a «país». La elección permite leer la escena como devastación del territorio sin perder la referencia concreta al ámbito humano afectado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «dwellings of violence» por «haunts of violence» para reflejar mejor un lugar caracterizado por la violencia. La redacción española sigue esa revisión con «guaridas de violencia», manteniendo tono formal y fuerza locativa.
  spanish_consistency_notes:
  - Se usa «pacto» de manera consistente para בְּרִית en el texto principal, reservando «tu pacto» para la nota por la falta de posesivo explícito en hebreo.
  - «Tierra» se mantiene como opción amplia y neutral para אֶרֶץ, con nota sobre la alternativa «territorio»/«país».
  - «Violencia» conserva el valor semántico central de חָמָס sin reinterpretaciones moralizantes.
