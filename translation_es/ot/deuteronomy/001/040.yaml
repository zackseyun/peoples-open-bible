- from: Pero ustedes[a], vuelvan y salgan hacia el desierto, por el camino del Mar Rojo.
  to: Pero en cuanto a ustedes, vuelvan y partan hacia el desierto, por el camino del Mar Rojo[a].
  rationale: Se ajusta la apertura para reflejar con más naturalidad el contraste enfático del hebreo y se sustituye «salgan» por «partan» para preservar mejor el valor de נסע como ponerse en marcha. Se mantiene «Mar Rojo» con la alternativa literal en nota, conforme al expediente léxico del POB.
