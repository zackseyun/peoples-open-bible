  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Cuerno» respeta bien שופר mejor que «trompeta» en el texto principal, dejando «shofar» y «trompeta» en nota. «Jehú es rey» refleja adecuadamente la proclamación final auditada.
