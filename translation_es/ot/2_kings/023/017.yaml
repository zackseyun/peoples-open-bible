base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/017.yaml
  text: Then he said[a], “What is this monument that I see?” And the men of the city said to him[b], “It is the tomb of the man of God who came from Judah and proclaimed these things that you have done against the altar at Bethel.”
  footnotes:
  - marker: a
    text: Or “marker,” “memorial stone,” or “grave marker” for “monument.”
    reason: lexical_alternative
  - marker: b
    text: Or “called out” or “cried out”; the verb refers to the man of God's prophetic declaration concerning the altar (cf. 1 Kgs 13:1–2).
    reason: alternative_reading
