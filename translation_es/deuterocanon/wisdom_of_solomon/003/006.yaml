translation:
  language: es
  text: Como al oro en un crisol[a], los puso a prueba, y como un holocausto[b], los aceptó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un horno»; el término griego puede referirse al recipiente o al lugar usado para refinar metales.
    reason: lexical_alternative
  - marker: b
    text: O «como una ofrenda quemada totalmente»; el griego describe una ofrenda consumida por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: Like
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: LSJ
  rationale: Introduce la comparación de manera natural en español y conserva el valor de símil de la frase griega.
- source_word: χρυσὸν
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro refinado
  - metal precioso
  lexicon: LSJ
  rationale: El objeto comparado es el metal precioso; en español 'oro' comunica con claridad la imagen de refinamiento sin añadir interpretación.
- source_word: ἐν χωνευτηρίῳ
  english_pob_choice: in a furnace
  chosen_spanish: en un crisol
  alternatives_spanish:
  - en un horno
  - en un horno de fundición
  lexicon: LSJ
  rationale: χωνευτήριον puede referirse al recipiente o lugar de refinación del metal. 'Crisol' preserva ese matiz de recipiente/refinación con buena naturalidad en español y evita reducir la imagen solo a un horno.
- source_word: ἐδοκίμασεν
  english_pob_choice: he tested
  chosen_spanish: los probó
  alternatives_spanish:
  - los examinó
  - los puso a prueba
  lexicon: BDAG
  rationale: δοκιμάζω aquí expresa probar para verificar autenticidad o calidad. 'Los probó' mantiene la imagen de evaluación/refinación y es idiomático en español.
- source_word: ὁλοκάρπωμα
  english_pob_choice: whole burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - un holocausto completo
  - un sacrificio totalmente consumido
  lexicon: LSJ
  rationale: ὁλοκάρπωμα designa una ofrenda totalmente consumida por el fuego. 'Holocausto' es el término español más compacto y reconocido para esa idea cultual; se conserva la fuerza sacrificial del término sin perder inteligibilidad.
- source_word: προσεδέξατο
  english_pob_choice: he accepted
  chosen_spanish: los aceptó
  alternatives_spanish:
  - los recibió favorablemente
  - los acogió
  lexicon: BDAG
  rationale: El verbo comunica recepción favorable, especialmente en contexto sacrificial. 'Aceptó' mantiene la valoración positiva sin sobreexplicar.
theological_decisions:
- issue: Imagen cultual aplicada a los justos probados
  english_pob_reading: The verse compares God's favorable reception of the righteous after testing to a whole burnt offering.
  chosen_spanish_reading: El verso compara la prueba de los justos con el refinamiento del oro y su recepción por Dios con un holocausto.
  alternative_spanish_readings:
  - El verso presenta solo una metáfora de purificación
  - El verso enfatiza únicamente el sacrificio
  rationale: La imagen combina refinamiento metalúrgico y aceptación cultual. La traducción conserva ambos campos semánticos sin reducir uno al otro, siguiendo el equilibrio del griego y del POB inglés.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en la imagen doble: prueba/refinación como el oro y aceptación cultual como un holocausto. Sigo la revisión más reciente del inglés al omitir el añadido ''de sacrificio'', porque ὁλοκάρπωμα ya expresa la ofrenda totalmente consumida y en español ''holocausto'' comunica esa especificidad con naturalidad.'
  spanish_consistency_notes:
  - Mantengo 'Yahvé' solo cuando el texto fuente lo exija; aquí no aparece el nombre divino explícito en el versículo.
  - Uso 'holocausto' como equivalente cultual de ὁλοκάρπωμα, coherente con el valor específico documentado en el audit trail.
  - Conservo el paralelismo de dos miembros unidos por 'y' para reflejar la estructura griega.
  - Evito 'furnace' traducido mecánicamente como 'horno' porque en español 'crisol' expresa mejor la función refinadora del término griego.
