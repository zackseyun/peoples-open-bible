translation:
  language: es
  text: Y esa riqueza se perdió[a] en un mal negocio, y engendró un hijo, y no tenía nada en su mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea puede significar literalmente «en un asunto malo», pero también «en una empresa funesta» o «en un caso desgraciado».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y no hay nada en su mano», un modismo que indica que no posee nada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבַד
  english_pob_choice: was lost
  chosen_spanish: se perdió
  alternatives_spanish:
  - se destruyó
  - pereció
  - se desvaneció
  lexicon: HALOT
  rationale: El hebreo qal perfecto de אבד presenta la pérdida del sujeto ‘riqueza’; en español, ‘se perdió’ conserva el resultado pasivo sin introducir más agencia de la que el texto da.
- source_word: הָעֹשֶׁר הַהוּא
  english_pob_choice: that wealth
  chosen_spanish: esa riqueza
  alternatives_spanish:
  - esas riquezas
  - aquella riqueza
  lexicon: HALOT
  rationale: עֹשֶׁר apunta a riqueza/bienes, y el demostrativo-artículo se refleja naturalmente con ‘esa’. ‘Riqueza’ mantiene el sustantivo singular colectivo más natural en español.
- source_word: בְּעִנְיַן רָע
  english_pob_choice: in a bad venture
  chosen_spanish: en un mal negocio
  alternatives_spanish:
  - en un asunto funesto
  - en una empresa desgraciada
  - en un negocio funesto
  lexicon: HALOT
  rationale: עִנְיָן puede ser asunto/empresa; con רָע, el contexto económico favorece una expresión comercial comprensible. ‘Negocio’ comunica el ámbito económico sin perder la idea de empresa o asunto dañino.
- source_word: וְהוֹלִיד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró un hijo
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: La forma hiphil de ילד puede expresarse como engendrar/fathered. ‘Engendró’ es más directo y fiel al registro bíblico que una paráfrasis más explicativa.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘hijo varón/son’, en español ‘un hijo’ mantiene la referencia filial de modo natural; la masculinidad queda ya implícita por el contexto y por ‘engendró’.},{
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva la pérdida de la riqueza, la ambigüedad del ‘mal negocio’ y el modismo final sobre ‘su mano’.'
  spanish_consistency_notes:
  - Se mantuvo ‘riqueza’ para עֹשֶׁר como sustantivo colectivo natural en español.
  - Se evitó ‘SEÑOR’ o términos litúrgicos no presentes; aquí no hay nombre divino ni título cristológico.
  - La nota de pie sobre בְּעִנְיַן רָע conserva la tensión semántica entre negocio, asunto y circunstancia.
  - ‘Engendró’ preserva el valor verbal del hebreo sin recargar el estilo.
  - El modismo final se traduce con imagen corporal y nota explicativa para transparencia auditiva.
