base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/028.yaml
  text: 'So we said[a], ‘If they should say to us or to our generations in time to come, then we will say: “Look at the pattern of the altar of Yahweh, which our fathers made—not for burnt offering or for sacrifice, but as a witness between us and you.”’'
  footnotes:
  - marker: a
    text: Or 'copy,' 'model,' or 'representation' of the altar of the LORD.' The Hebrew term refers to a form or pattern, indicating this altar was a replica serving as testimony rather than the authorized sacrificial altar itself.
    reason: lexical_alternative
