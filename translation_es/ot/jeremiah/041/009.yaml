revisions:
- from: Ahora bien, la cisterna en la que Ismael había arrojado todos los cadáveres de los hombres a quienes había matado[a] por causa de Guedalías[b] era la que el rey Asa había hecho por causa de Baasa, rey de Israel. Ismael hijo de Natanías la llenó con los caídos.
  to: Ahora bien, la cisterna en la que Ismael había arrojado todos los cadáveres de los hombres a quienes había matado por causa de Guedalías[a] era la que el rey Asa había hecho por causa de Baasa, rey de Israel[b]. Ismael hijo de Natanías la llenó con los muertos.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las frases correctas del texto. También se ajustó ‘con los caídos’ a ‘con los muertos’ para representar mejor חֲלָלִים en español claro y natural, manteniendo la fuerza violenta del contexto. La nota [a] se simplificó para conservar solo alternativas reales al texto principal.
