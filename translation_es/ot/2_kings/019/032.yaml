revisions:
- from: 'Por tanto, así dice Yahvé acerca del rey de Asiria: no entrará en esta ciudad, ni disparará allí una flecha, ni se le acercará con un escudo[a], ni levantará contra ella un terraplén[b].'
  to: 'Por tanto, así dice Yahvé acerca del rey de Asiria: no entrará en esta ciudad, ni disparará allí una flecha, ni vendrá ante ella con un escudo[a], ni levantará contra ella una rampa de asedio[b].'
  rationale: Se ajusta la tercera cláusula para reflejar mejor el hebreo y la distinción del POB entre texto principal y alternativa léxica. Se cambia 'terraplén' al texto principal por 'rampa de asedio', que se alinea mejor con la decisión léxica auditada para סֹלְלָה, dejando 'terraplén' como alternativa válida en nota.
