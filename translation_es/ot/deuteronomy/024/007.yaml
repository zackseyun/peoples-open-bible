  language: en
  yaml_path: translation/ot/deuteronomy/024/007.yaml
  text: If a man is found kidnapping one of his brothers from the sons of Israel[a], and he enslaves him and sells him, then that kidnapper shall die[c][b]. So you shall purge the evil from your midst.
  footnotes:
