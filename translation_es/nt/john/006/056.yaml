review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el griego: mantiene los participios sustantivados con «El que... y bebe...», conserva «carne» y «sangre» de forma literal, y respeta la elipsis en «y yo en él». También preserva bien el sentido joánico de μένει con «permanece».'
  spanish_quality_summary: 'El español principal es claro, natural y digno. Sin embargo, hay un problema editorial en las notas: la nota [b] marcada como «Tradicional» repite exactamente el texto principal («permanece en mí, y yo en él») y por tanto no preserva la alternativa inglesa documentada, que era «abides in me, and I in him». En español, la alternativa tradicional adecuada es «permanece en mí, y yo en él» solo si el texto principal fuera distinto; aquí debe ajustarse a una formulación realmente alternativa, como «habita en mí, y yo en él» o suprimirse. Dado que el expediente inglés sí conserva una nota de alternativa tradicional, conviene mantener una alternativa española real.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: σάρξ -> «carne», αἷμα -> «sangre», μένω -> «permanece». No hay conflicto con Yahvé/Mesías u otros términos de glosario. La decisión de no parafrasear sacramentalmente es correcta.'
  issues:
  - severity: medium
    issue: La nota [b] no ofrece una alternativa real al texto principal.
    rationale: El inglés documenta una alternativa tradicional para μένω («abides»), pero en español la nota actual repite exactamente «permanece en mí, y yo en él», que ya está en el texto. Eso hace inútil la nota y no refleja bien el rastro de auditoría.
  - severity: low
    issue: En decisiones léxicas aparece «abide en me», que no es español.
    rationale: Es un detalle en la documentación interna, no en el texto bíblico. No requiere adjudicación compleja, pero confirma que la alternativa tradicional debe expresarse correctamente en español.
  revised_spanish_text: El que come mi carne y bebe mi sangre permanece en mí[a][b], y yo en él.
  revised_footnotes:
  - marker: a
    text: O «se alimenta de» / «mastica»; el verbo griego es más vívido que un verbo genérico de comer.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: «habita en mí, y yo en él».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota [b] para que sea una alternativa española real y útil, en vez de repetir el texto principal. «Habita» funciona como opción más tradicional/literaria para μένω en este contexto joánico.
