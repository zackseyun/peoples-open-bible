review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: la soberbia es objeto de rechazo por parte de Dios y de los hombres, y la segunda cláusula presenta la opresión como una falta/injusticia respecto de ambos. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro de auditoría: (1) el hebreo לְאָדוֹן, confirmado por el griego Κυρίου, se refiere a ''el Señor'', no al nombre divino Yahvé; la política de ''Yahvé'' aplica a יהוה, no debe imponerse aquí; (2) la nota [a] introduce un matiz de ''presencia/juzgamiento'' que no refleja la decisión inglesa final, que privilegia ''to the Lord and to men'' y deja ''before'' como alternativa griega, no como sentido principal del hebreo. La segunda cláusula en español es aceptable, aunque ''es una injusticia'' suena más natural que ''es injusticia''.'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes para mayor naturalidad y fidelidad. 'Es aborrecida' funciona, aunque 'es odiosa' o 'es aborrecible' serían opciones; no es necesario cambiarlo. La construcción 'ante Yahvé y ante los hombres' suena algo interpretativa; 'para el Señor y para los hombres' o mejor 'al Señor y a los hombres' sería menos natural en predicado adjetival. En español bíblico moderno, 'La soberbia es aborrecida por el Señor y por los hombres' resulta más idiomático y conserva el sentido. En la segunda mitad, 'la opresión es una injusticia para ambos' mejora la fluidez.
  glossary_alignment: Alineación parcial. 'Soberbia' para גַּאֲוָה está bien. 'Hombres' preserva la decisión de género-precisión del inglés. 'Opresión' e 'injusticia' son defendibles para עֹשֶׁק / מַעַל. Pero 'Yahvé' no corresponde aquí porque la fuente no contiene יהוה sino אֲדוֹן / Κυρίου; por tanto debe usarse 'el Señor'.
  issues:
  - severity: high
    issue: Uso de 'Yahvé' donde la fuente dice אֲדוֹן / Κυρίου
    rationale: La política del proyecto reserva 'Yahvé' para יהוה/YHWH. Aquí el hebreo tiene לְאָדוֹן y el griego Κυρίου; el rastro inglés decidió 'the Lord', no el nombre divino propio. Cambiar a 'Yahvé' sobretraduce la fuente.
  - severity: medium
    issue: La nota [a] afirma un matiz principal de 'presencia/juzgamiento' no sostenido por la decisión auditada
    rationale: La nota inglesa conserva 'before the Lord and men' solo como lectura griega alternativa; además explica que el hebreo da más naturalmente otro sentido en la segunda cláusula. La nota española desplaza indebidamente el foco al valor de 'ante'.
  - severity: low
    issue: '''es injusticia'' suena menos natural en español que ''es una injusticia'''
    rationale: No es un error semántico grave, pero el artículo indefinido mejora la idiomaticidad sin alterar el sentido identificativo de la cláusula.
  revised_spanish_text: La soberbia es aborrecida por el Señor y por los hombres[a], y la opresión[b] es una injusticia para ambos.
