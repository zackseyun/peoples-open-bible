review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: advertencia imperativa, prohibición de volverse hacia אָוֶן en sentido moral, y razón explicativa de haberlo escogido por encima de la aflicción. Sin embargo, la cláusula final en español suena forzada y poco idiomática, y falta la nota que el inglés conserva para la comparación מֵעֹנִי (‘en vez de aflicción / que miseria’).'
  spanish_quality_summary: «Ten cuidado» y «iniquidad» son fieles y legibles. «No te inclines hacia la iniquidad» es aceptable, aunque «no te vuelvas a» sería algo más directo; no exige cambio. El problema principal es «porque esto has escogido más bien que la aflicción», que en español suena calcado y difícil. Una formulación como «porque has escogido esto en vez de la aflicción» conserva el sentido y mejora claramente la naturalidad.
  glossary_alignment: No hay términos del glosario mayor en juego. «Iniquidad» concuerda con la decisión POB para אָוֶן en este contexto moral. «Aflicción» también alinea bien con עֹנִי. Conviene preservar en nota las alternativas de עֹנִי/comparativo, como hace el rastro inglés.
  issues:
  - severity: medium
    issue: La frase final «porque esto has escogido más bien que la aflicción» es poco idiomática en español.
    rationale: Aunque reproduce la sintaxis de forma cercana, suena calcada y puede entorpecer la comprensión. «Has escogido esto en vez de la aflicción» transmite el mismo sentido con español natural.
  - severity: medium
    issue: Falta una nota para la expresión comparativa מֵעֹנִי.
    rationale: El English POB documenta la alternativa «instead of affliction / than misery» y la explicación semántica. El español debería conservar esa información, especialmente porque la construcción puede sonar ambigua.
  revised_spanish_text: Ten cuidado[a]; no te inclines hacia la iniquidad[b], porque has escogido esto en vez de la aflicción[c].
