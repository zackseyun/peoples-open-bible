revisions:
- from: 'Hermón y todos sus amigos estaban mostrando las bestias y las fuerzas: «Están preparadas, oh rey, conforme a esa intención tuya».'
  to: 'Hermón y todos los amigos[a] estaban mostrando las fieras y las fuerzas: «Están preparadas, oh rey, conforme a esa intención tuya».'
  rationale: Se corrige «sus amigos» a «los amigos» para no añadir un posesivo ausente del griego y se conserva la posible nuance cortesana en nota. Se cambia «bestias» por «fieras» para un español más natural y preciso en este contexto, sin apartarse del sentido fuente. El resto del versículo refleja bien el imperfecto progresivo, el estado resultante de Ἡτοίμασται y el matiz retrospectivo de «esa intención tuya».
