    rationale: El hebreo combina la idea de grosor/masa (בַּעֲבִי) con las protuberancias del escudo (גַּבֵּי). En español, «salientes» ya implica relieve; añadir «abultados» produce una expresión forzada. «Protuberancias gruesas» mantiene ambos rasgos semánticos con mejor fluidez.
  - severity: low
