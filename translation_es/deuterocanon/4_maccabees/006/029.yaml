translation:
  language: es
  text: Haz que mi sangre sea su purificación[a], y toma mi vida a cambio de la de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpieza»; el griego καθαρσόν puede denotar purificación o limpieza en sentido cultual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «toma mi vida como intercambio por la de ellos»; la frase expresa sustitución de vida por vida. «Como rescate por la de ellos» es posible, pero más interpretativo.
    reason: alternative_reading
lexical_decisions:
- source_word: καθαρσὸν
  english_pob_choice: purification
  chosen_spanish: purificación
  alternatives_spanish:
  - limpieza
  - expiación
  lexicon: LSJ
  rationale: En el contexto cultual y martirial, «purificación» conserva la fuerza ritual del término sin cerrar el sentido en una categoría doctrinal posterior. «Limpieza» suena más débil en español; «expiación» ya interpreta más de lo que el griego explícitamente dice.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - vida
  - sangrado
  lexicon: LSJ
  rationale: El texto griego dice literalmente «sangre» y mantiene el marco sacrificial/substitutivo del pasaje. «Vida» borraría esa materialidad retórica.
- source_word: ἀντίψυχον
  english_pob_choice: in exchange for
  chosen_spanish: en intercambio por
  alternatives_spanish:
  - como rescate por
  - como sustituto de
  lexicon: LSJ
  rationale: La idea central es de intercambio o sustitución de vida por vida. «En intercambio por» preserva esa relación sin añadir la carga más interpretativa de «rescate».
- source_word: ψυχήν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: LSJ
  rationale: Aquí ψυχή se refiere a la vida ofrecida, no primariamente al alma inmaterial. «Vida» es más claro en español y corresponde al paralelismo con sangre.
- source_word: λάβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  lexicon: LSJ
  rationale: «Toma» reproduce bien el imperativo directo. «Recibe» sería posible, pero suena menos natural en esta súplica dirigida a Dios.
theological_decisions:
- issue: Lenguaje cultual y sustitutorio de la oración del mártir
  english_pob_reading: Retain explicit purification and exchange language without softening it
  chosen_spanish_reading: Conservar explícitamente el lenguaje de purificación e intercambio sin suavizarlo
  alternative_spanish_readings:
  - Haz que mi sangre sea su limpieza y toma mi vida como sustituto de la de ellos
  - Haz que mi sangre les sirva de expiación y toma mi vida como rescate por la de ellos
  rationale: El griego presenta con claridad una petición cultual y una sustitución de vida por vida. La versión española debe conservar esa tensión sin resolverla en fórmulas doctrinales posteriores ni diluirla en paráfrasis más generales.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla; español moderno y legible, no arcaico ni técnico.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el cotejo final mostró alta concordancia con el texto fuente y la lectura inglesa auditada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque no aparece el tetragrámaton ni κύριος en este versículo.
  - Se eligió «vida» para ψυχή en coherencia con el contexto martirial y con el paralelismo sangre/vida.
  - Se preservó la relación de intercambio de ἀντίψυχον sin introducir «rescate» en el texto principal, dejando esa opción en nota.
