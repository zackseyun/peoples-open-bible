translation:
  language: es
  text: Y sucedió que, mientras entraban, cuando David volvió de derrotar al filisteo, las mujeres salieron de todas las ciudades de Israel, cantando y danzando, para recibir al rey Saúl, con panderos, con alegría y con instrumentos de tres cuerdas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo שָׁלִשִׁים es incierto. Puede referirse a instrumentos de tres cuerdas, laúdes u otro acompañamiento musical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una nueva escena; «Y sucedió» conserva el valor discursivo sin sonar arcaico en español.
- source_word: בְּבוֹאָם
  english_pob_choice: as they were coming in
  chosen_spanish: al ir ellos entrando
  alternatives_spanish:
  - cuando ellos entraban
  - mientras ellos entraban
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal pide una cláusula temporal. «Al ir ellos entrando» mantiene el matiz de proceso y el plural implícito del sufijo.
- source_word: בְּשׁוּב דָּוִד
  english_pob_choice: when David returned
  chosen_spanish: cuando David volvió
  alternatives_spanish:
  - al volver David
  - mientras David volvía
  lexicon: HALOT
  rationale: שוב expresa retorno; «volvió» es natural y fiel al valor verbal en este contexto narrativo.
- source_word: מֵהַכּוֹת אֶת־הַפְּלִשְׁתִּי
  english_pob_choice: from striking down the Philistine
  chosen_spanish: de derrotar al filisteo
  alternatives_spanish:
  - de golpear al filisteo
  - de matar al filisteo
  lexicon: HALOT
  rationale: נכה con objeto directo puede significar golpear, vencer o matar. «Derrotar» preserva la fuerza del triunfo sin precisar más allá del hebreo; «filisteo» conserva el singular del texto.
- source_word: וַתֵּצֶאנָה הַנָּשִׁים
  english_pob_choice: the women came out
  chosen_spanish: las mujeres salieron
  alternatives_spanish:
  - las mujeres fueron
  - las mujeres salieron afuera
  lexicon: HALOT
  rationale: יצא en este escenario describe salir de las ciudades para recibir al rey; «salieron» es claro y natural en español.
- source_word: מִכָּל עָרֵי יִשְׂרָאֵל
  english_pob_choice: from all the cities of Israel
  chosen_spanish: de todas las ciudades de Israel
  alternatives_spanish:
  - de cada ciudad de Israel
  - desde todas las ciudades de Israel
  lexicon: HALOT
  rationale: La frase es distributiva; la preposición «de» reproduce bien el punto de partida colectivo.
- source_word: לָשׁוּר
  english_pob_choice: singing
  chosen_spanish: cantando
  alternatives_spanish:
  - para cantar
  - entonando
  lexicon: HALOT
  rationale: El infinitivo con valor de propósito o acción concomitante se expresa de forma idiomática con el gerundio «cantando».
- source_word: וְהַמְּחֹלוֹת
  english_pob_choice: and dancing
  chosen_spanish: y danzando
  alternatives_spanish:
  - y bailando
  - y con danzas
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo plural, en español el paralelo con el verbo anterior queda mejor como «danzando»; así se conserva la coordinación rítmica sin perder el sentido.
- source_word: לִקְרַאת שָׁאוּל הַמֶּלֶךְ
  english_pob_choice: to meet King Saul
  chosen_spanish: para recibir al rey Saúl
  alternatives_spanish:
  - para encontrarse con el rey Saúl
  - para salir al encuentro del rey Saúl
  lexicon: HALOT
  rationale: לקראת indica salir al encuentro. «Para recibir» comunica la función social de la escena con naturalidad; el orden «el rey Saúl» sigue el patrón español usual.
- source_word: בְּתֻפִּים
  english_pob_choice: with tambourines
  chosen_spanish: con panderos
  alternatives_spanish:
  - con tamboriles
  - con panderetas
  lexicon: HALOT
  rationale: תֹּף designa un instrumento de percusión de marco; «panderos» es una equivalencia reconocible y más sobria que una modernización excesiva.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  lexicon: HALOT
  rationale: El sustantivo expresa regocijo; «con alegría» conserva el valor nominal y la coordinación con los instrumentos.
- source_word: וּבְשָׁלִשִׁים
  english_pob_choice: with three-stringed instruments
  chosen_spanish: con instrumentos de tres cuerdas
  alternatives_spanish:
  - con laúdes
  - con instrumentos de cuerda
  lexicon: HALOT
  rationale: El término es incierto. La traducción mantiene la cautela del POB inglés, preservando la referencia musical sin fingir seguridad donde el hebreo no la ofrece.
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo con equivalencia óptima, manteniendo la secuencia narrativa y la incertidumbre léxica de שָׁלִשִׁים tal como la auditoría inglesa la documenta. No se registraron revisiones aplicadas en el expediente inglés; por ello no se introducen divergencias interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usa «filisteo» en singular como en el hebreo, sin ampliar indebidamente a un plural o a Goliat por inferencia.
  - Se conserva una construcción verbal natural en español para reproducir la acción simultánea de cantar y danzar.
  - La nota al pie marca la incertidumbre léxica de שָׁלִשִׁים y evita cerrar la opción semántica.
