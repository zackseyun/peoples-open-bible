base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/014.yaml
  text: The wrath of a king is messengers of death[b][a], but a wise man will appease it.
  footnotes:
  - marker: a
    text: Hebrew 'messengers of death'; the term for 'messengers' can also mean 'angels,' but here it most likely refers to agents sent out by the king.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb is from the same root often rendered 'make atonement.' In this context it means to appease or turn away the king's wrath.
    reason: lexical_alternative
