translation:
  language: es
  text: Sin embargo, del dinero traído a la casa de Yahvé no se hicieron para la casa de Yahvé tazones[a] de plata, apagadores[b], cuencos de aspersión[c], trompetas, ni ningún utensilio de oro o utensilio de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuencos» para «tazones».
    reason: lexical_alternative
  - marker: b
    text: O «recortadores». El hebreo probablemente se refiere a un utensilio usado para atender las lámparas.
    reason: lexical_alternative
  - marker: c
    text: O simplemente «cuencos». La traducción más plena hace explícita la función ritual probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce contraste con el verso anterior; «Sin embargo» conserva el matiz adversativo en español moderno sin endurecer el flujo.
- source_word: יֵעָשֶׂה
  english_pob_choice: there were not made
  chosen_spanish: no se hicieron
  alternatives_spanish:
  - no fue hecho
  - no se fabricaron
  lexicon: HALOT
  rationale: El nifal pasivo impersonal se expresa de forma natural en español con «no se hicieron», manteniendo la construcción administrativa del inventario.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la designación cultual «casa de Yahvé» y el nombre divino según el estándar del proyecto; «templo» sería interpretativo.
- source_word: סִפּוֹת כֶּסֶף
  english_pob_choice: silver basins
  chosen_spanish: tazones de plata
  alternatives_spanish:
  - basas de plata
  - cuencos de plata
  lexicon: HALOT
  rationale: El sustantivo permite un recipiente de tipo tazón/cuenco; «tazones» comunica bien la forma sin forzar una terminología demasiado técnica. Se mantiene la materia «de plata».
- source_word: מְזַמְּרוֹת
  english_pob_choice: snuffers
  chosen_spanish: apagadores
  alternatives_spanish:
  - pinzas
  - trimmers
  lexicon: HALOT
  rationale: En contexto de utensilios del santuario, el término probablemente alude a un implemento para atender lámparas. «Apagadores» comunica la función de apagar/atender la mecha con naturalidad en español; se evita «podaderas» o una traducción agrícola.
- source_word: מִזְרָקוֹת
  english_pob_choice: sprinkling bowls
  chosen_spanish: tazones para rociar
  alternatives_spanish:
  - cuencos para rociar
  - tazones de aspersión
  - cuencos
  lexicon: HALOT
  rationale: Se explicita la función ritual sugerida por el término; «rociar» conserva la idea de aspersión sin recurrir a una voz demasiado litúrgica. Se preserva la diferencia con los tazones de plata iniciales.
- source_word: חֲצֹצְרוֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - trompetas cultuales
  lexicon: HALOT
  rationale: Es el equivalente más directo y ampliamente inteligible para los instrumentos cultuales de metal.
- source_word: כָּל כְּלִי זָהָב וּכְלִי כָסֶף
  english_pob_choice: any vessel of gold or vessel of silver
  chosen_spanish: ningún utensilio de oro o utensilio de plata
  alternatives_spanish:
  - ninguna vasija de oro ni vasija de plata
  - ningún objeto de oro o de plata
  lexicon: HALOT
  rationale: «Utensilio» conserva el rango semántico amplio de כְּלִי y suena apropiado en un inventario de objetos del santuario; la negación distributiva se expresa de manera idiomática con «ningún... o...».
- source_word: מִן הַכֶּסֶף הַמּוּבָא
  english_pob_choice: from the money brought in
  chosen_spanish: del dinero traído
  alternatives_spanish:
  - de la plata traída
  - del dinero que era traído
  lexicon: HALOT
  rationale: Aquí כֶּסֶף apunta al fondo monetario recaudado; «dinero traído» refleja el sentido administrativo mejor que una traducción exclusivamente material de «plata».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la norma del proyecto de transliterar el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se ha seguido el auditorial inglés sin copiarlo mecánicamente: se mantuvieron las distinciones entre recipientes, se hizo explícita la función ritual de מִזְרָקוֹת, y se adoptó la forma del nombre divino exigida por el proyecto. No se detectaron revisiones posteriores que obligaran a cambios adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Yahvé» para בֵּית יְהוָה en lugar de «templo» para preservar la formulación del hebreo.
  - Se distinguió entre los recipientes iniciales («tazones de plata») y los de aspersión («tazones para rociar») para no nivelar dos términos distintos.
  - «Utensilio» se usó para כְּלִי por ser suficientemente amplio y más natural que «vasija» en la lista final.
  - El orden de los objetos sigue el hebreo y el flujo del inglés auditado, con una negación general final que conserva el sentido distributivo.
