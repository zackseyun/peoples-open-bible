translation:
  language: es
  text: Y sucederá que cualquiera de entre las familias de la tierra que no suba a Jerusalén para adorar al Rey[a], Yahvé de los Ejércitos[b], sobre ellos no habrá lluvia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para postrarse’.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: ‘Yahvé de los Ejércitos’; en muchas versiones clásicas, ‘el SEÑOR de los Ejércitos’ o ‘el SEÑOR de los ejércitos’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אֲשֶׁר
  english_pob_choice: And it will be that whichever
  chosen_spanish: Y sucederá que cualquiera de
  alternatives_spanish:
  - Y será que cualquiera de
  - Y acontecerá que cualquiera de
  lexicon: HALOT
  rationale: La fórmula hebrea introduce aquí una cláusula general-condicional. En español, 'Y sucederá que' conserva el valor introductorio de וְהָיָה sin sonar forzado, y 'cualquiera de' expresa bien אֲשֶׁר con sentido distributivo/condicional.
- source_word: לֹא יַעֲלֶה
  english_pob_choice: does not go up
  chosen_spanish: no suba
  alternatives_spanish:
  - no vaya a Jerusalén
  - no ascienda
  lexicon: HALOT
  rationale: עלה con Jerusalén mantiene el matiz idiomático de 'subir' por la geografía y el lenguaje de peregrinación. En español, el subjuntivo en la relativa general 'cualquiera de ... que no suba' resulta natural y preserva la condición futura.
- source_word: מֵאֵת מִשְׁפְּחוֹת הָאָרֶץ
  english_pob_choice: of the families of the earth
  chosen_spanish: de las familias de la tierra
  alternatives_spanish:
  - de las familias del mundo
  - de los clanes de la tierra
  - de las familias del país
  lexicon: HALOT
  rationale: '''Familias'' reproduce מִשְׁפְּחוֹת de manera transparente y natural. ''Tierra'' conserva el alcance amplio del contexto escatológico, sin restringirlo indebidamente a la tierra de Israel.'
- source_word: אֶל יְרוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: HALOT
  rationale: Es un complemento direccional sencillo; 'a Jerusalén' es la forma más natural y directa en español.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para postrarse
  - para rendir culto
  lexicon: HALOT
  rationale: El verbo hebreo incluye la idea de postrarse; en este contexto cultual, 'adorar' comunica bien la acción religiosa sin perder la solemnidad. Se preserva la alternativa literal en nota.
- source_word: לְמֶלֶךְ
  english_pob_choice: the King
  chosen_spanish: al Rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: El artículo y la mayúscula señalan que no se trata de un rey cualquiera, sino del título real aplicado a Yahvé en la frase siguiente.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los Ejércitos Celestiales
  - Yahvé de los Hosts
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' según el criterio del proyecto para el Tetragrámaton. 'Ejércitos' traduce צְבָאוֹת de forma transparente y con la fuerza militar/cósmica del término; la mayúscula en 'Ejércitos' conserva el valor titulado.
- source_word: וְלֹא עֲלֵיהֶם יִהְיֶה הַגָּשֶׁם
  english_pob_choice: on them there will be no rain
  chosen_spanish: sobre ellos no habrá lluvia
  alternatives_spanish:
  - no habrá lluvia sobre ellos
  - sobre ellos no vendrá lluvia
  - no tendrán lluvia
  lexicon: HALOT
  rationale: La preposición עַל se refleja naturalmente con 'sobre'. La construcción negativa mantiene el sentido de juicio/retención de lluvia sin sonar rígidamente literal en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce como 'Yahvé' para preservar el nombre propio divino y no sustituirlo por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - el país
  rationale: En este contexto profético universal, 'la tierra' conserva el alcance amplio sin limitarlo a una región específica. En español bíblico, también mantiene bien la resonancia de 'las familias de la tierra'.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
- issue: Meaning of לְהִשְׁתַּחֲוֺת
  english_pob_reading: to worship
  chosen_spanish_reading: adorar
  alternative_spanish_readings:
  - postrarse
  - inclinarse
  rationale: Aunque el verbo incluye la idea física de postración, en este contexto de reconocimiento cultual ante el Rey divino 'adorar' comunica el sentido religioso completo. La alternativa más literal queda preservada en la nota.
  doctrine_reference: HALOT on שׁחה; cultic context in Zechariah 14
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje revisado del audit trail inglés: conserva la fórmula introductoria equivalente a וְהָיָה, el valor distributivo de אֲשֶׁר, el verbo direccional ''suba'', el objeto cultual ''adorar'', el título divino con ''Yahvé'', y el cierre judicial sobre la ausencia de lluvia.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino 'Yahvé' según la convención del proyecto.
  - '''Ejércitos'' se conserva con mayúscula para reflejar el valor titular de צְבָאוֹת en esta fórmula fija.'
  - '''la tierra'' conserva el alcance universal del contexto profético.'
  - La nota a aclara la alternativa más literal de לְהִשְׁתַּחֲוֺת sin desplazar la traducción principal.
  - No se usa 'SEÑOR' como máscara para el nombre divino.
