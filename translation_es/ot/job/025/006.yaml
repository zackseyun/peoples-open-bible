    issue: «lombriz» para רִמָּה no refleja bien el sentido de ‘maggot’
    rationale: La auditoría inglesa distingue explícitamente רִמָּה (‘maggot’) de תּוֹלֵעָה (‘worm’). «Lombriz» suele evocar una lombriz de tierra, no un gusano de putrefacción, y por tanto debilita la imagen y la precisión léxica.
  - severity: low
    issue: La puntuación exclamativa inicial es opcional, no exigida por el hebreo
    rationale: No es un error, pero añade una fuerza retórica interpretativa. Puede mantenerse porque el tono poético lo tolera y no altera el sentido.
