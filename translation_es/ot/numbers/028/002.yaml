translation:
  language: es
  text: 'Manda a los hijos de Israel y diles: «Mi ofrenda, mi comida para mis ofrendas por fuego[a], mi aroma agradable, tengan cuidado de presentármela en su tiempo señalado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para mis ofrendas alimenticias». El hebreo se refiere a ofrendas sacrificiales consumidas en el altar, tradicionalmente «ofrendas por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Manda
  alternatives_spanish:
  - Ordena
  - Da la orden a
  lexicon: HALOT
  rationale: El imperativo exige una orden fuerte; «manda» conserva bien ese tono en español natural y digno.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo para mantener la transparencia formal del texto base.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y diles a ellos
  lexicon: HALOT
  rationale: «Diles» reproduce de manera natural la secuencia verbal y el destinatario indirecto.
- source_word: קָרְבָּנִי
  english_pob_choice: My offering
  chosen_spanish: Mi ofrenda
  alternatives_spanish:
  - Mi sacrificio
  - Mi oblación
  lexicon: HALOT
  rationale: «Ofrenda» es el equivalente más claro y sobrio para קָרְבָּן sin perder el sentido cultual de algo presentado a Dios.
- source_word: לַחְמִי
  english_pob_choice: my food
  chosen_spanish: mi comida
  alternatives_spanish:
  - mi pan
  - mi alimento
  lexicon: HALOT
  rationale: En contexto sacrificial, «comida» conserva el valor idiomático sin restringirlo indebidamente a pan.
- source_word: לְאִשַּׁי
  english_pob_choice: for my food offerings
  chosen_spanish: para mis ofrendas encendidas
  alternatives_spanish:
  - para mis ofrendas por fuego
  - para mis ofrendas quemadas
  lexicon: HALOT
  rationale: La imagen de lo consumido por fuego debe mantenerse en español; «ofrendas encendidas» comunica el rasgo sacrificial sin sonar arcaico.
- source_word: רֵיחַ נִיחֹחִי
  english_pob_choice: my pleasing aroma
  chosen_spanish: mi aroma agradable
  alternatives_spanish:
  - mi grato olor
  - mi olor placentero
  lexicon: HALOT
  rationale: «Aroma agradable» reproduce la expresión sacrificial estereotipada y evita una lectura meramente sensorial o antropomórfica.
- source_word: תִּשְׁמְר֕וּ
  english_pob_choice: you shall be careful
  chosen_spanish: cuídense
  alternatives_spanish:
  - tengan cuidado
  - observen cuidadosamente
  lexicon: HALOT
  rationale: El verbo comunica vigilancia cuidadosa respecto a la obligación cultual; «cuídense» transmite esa atención exigida en español vigente.
- source_word: לְהַקְרִיב לִי
  english_pob_choice: to present to me
  chosen_spanish: de presentarla a mí
  alternatives_spanish:
  - de ofrecerla a mí
  - de acercarla a mí
  lexicon: HALOT
  rationale: «Presentar» mantiene el matiz cultual de הקריב y evita repetir «ofrenda»; el pronombre femenino retoma «mi ofrenda».
- source_word: בְּמוֹעֲדוֹ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - a su tiempo señalado
  - en el tiempo fijado
  lexicon: HALOT
  rationale: «Tiempo señalado» expresa el carácter determinado de מועד y su ajuste al calendario cultual.
theological_decisions:
- issue: 'Lenguaje sacrificial antropomórfico: «mi comida», «mi aroma agradable»'
  english_pob_reading: Retain the covenantal sacrificial idiom without flattening it into abstraction
  chosen_spanish_reading: Conservar el idioma sacrificial del pacto sin convertirlo en una paráfrasis abstracta
  alternative_spanish_readings:
  - las ofrendas aceptables para mí
  - las ofrendas que me agradan
  rationale: El hebreo usa expresiones concretas y cultuales; la traducción las conserva para no perder la fuerza ritual ni suavizar el texto más allá de lo debido.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Designación corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma masculina y corporativa del hebreo, conforme a la transparencia formal del proyecto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que ajustó solo la puntuación del discurso directo y no cambió las decisiones léxicas principales. La redacción española conserva ese equilibrio entre literalidad auditable y fluidez publicable.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton explícito.
  - «Ofrenda» se usa para קָרְבָּן y «ofrendas encendidas» para לְאִשַּׁי, distinguiendo el término general del carácter ígneo del sacrificio.
  - Se mantiene el registro cultual con «aroma agradable» como expresión fija, no como descripción olfativa literal.
  - La forma de segunda persona plural se traduce con imperativo directo y mandato general, en línea con el hebreo.
