translation:
  language: es
  text: No quedó ninguno de ellos, excepto Matatías, hijo de Absalón, y Judas, hijo de Chalfi, comandantes de las fuerzas[a] del ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'comandantes de las tropas del ejército'. El griego combina dos términos militares (στρατιά, δυνάμεις), y el matiz exacto de la expresión puede traducirse de más de una manera natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ εἷς
  english_pob_choice: Not one
  chosen_spanish: No quedó ninguno
  alternatives_spanish:
  - No quedó ni uno
  - No quedó uno solo
  lexicon: LSJ
  rationale: La expresión griega enfatiza ausencia total. En español, 'No quedó ninguno' comunica con naturalidad la misma totalidad negativa sin endurecer el orden de palabras.
- source_word: κατελείφθη
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejado
  - permaneció
  lexicon: LSJ
  rationale: El pasivo aoristo aquí expresa que nadie sobrevivió o permaneció del grupo. 'Quedó' es la forma española más natural y fiel al valor resultativo del verbo en contexto.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - de su número
  lexicon: LSJ
  rationale: El partitivo se refiere al grupo mencionado. 'De ellos' conserva esa referencia sin añadir matices ajenos.
- source_word: πλὴν
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - pero
  lexicon: LSJ
  rationale: '''Excepto'' es la equivalencia española más clara y estándar para el valor exceptivo.'
- source_word: Ματταθίας ὁ τοῦ Ἀψαλώμου
  english_pob_choice: Mattathias son of Absalom
  chosen_spanish: Matatías, hijo de Absalón
  alternatives_spanish:
  - Matatías, el hijo de Absalón
  - Matatías hijo de Absalón
  lexicon: LSJ
  rationale: La construcción con genitivo identifica filiación. 'Hijo de' mantiene el patrón identificador usual en genealogías y nombres propios.
- source_word: Ἰούδας ὁ τοῦ Χαλφεί
  english_pob_choice: Judas son of Chalphi
  chosen_spanish: Judas, hijo de Chalfi
  alternatives_spanish:
  - Judas, el hijo de Chalfi
  - Judas hijo de Chalfi
  lexicon: LSJ
  rationale: Se conserva la misma construcción filiativa que en el nombre anterior. 'Chalfi' sigue la transliteración ya atestiguada en el expediente inglés.
- source_word: ἄρχοντες
  english_pob_choice: commanders
  chosen_spanish: jefes
  alternatives_spanish:
  - comandantes
  - líderes
  - oficiales
  lexicon: LSJ
  rationale: En contexto militar, ἄρχοντες designa a quienes mandan. 'Jefes' es un español natural y suficientemente amplio; 'comandantes' también sería posible, pero 'jefes' evita sobredeterminar un rango técnico no especificado.
- source_word: τῆς στρατιᾶς τῶν δυνάμεων
  english_pob_choice: of the forces of the army
  chosen_spanish: de las fuerzas del ejército
  alternatives_spanish:
  - del ejército de las fuerzas
  - de la hueste de las fuerzas
  lexicon: LSJ
  rationale: 'La doble expresión militar griega se mantiene con dos sustantivos: ''ejército'' para στρατιά y ''fuerzas'' para δυνάμεις. El orden español ''fuerzas del ejército'' es más natural que una repetición calca, y conserva la relación genitiva entre ambos términos.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete LXX 1909 y el criterio auditado del POB en inglés, especialmente la negación enfática ('Not one') y la doble terminología militar ('στρατιά' + 'δυνάμεις'), pero adapta la sintaxis a un español publicable y fluido sin añadir elementos no presentes en el texto.
  spanish_consistency_notes:
  - Se usa 'Matatías' y 'Judas' como formas españolas estables de los nombres propios.
  - Se conserva 'Chalfi' conforme al expediente inglés, sin intentar normalizar la transliteración.
  - '''Jefes'' se emplea como término militar amplio; si en pasajes cercanos se requiere un rango más técnico, podrá ajustarse caso por caso.'
  - La doblete militar se mantiene como 'fuerzas del ejército' para reflejar ambos sustantivos griegos sin redundancia pesada.
