base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/011.yaml
  text: And Jehoshaphat said[a], “Is there no prophet of Yahweh here, that we may inquire of Yahweh by him?” Then one of the servants of the king of Israel answered and said, “Elisha son of Shaphat is here[b], who poured water on the hands of Elijah.”
  footnotes:
  - marker: a
    text: Or, more formally, “that we may seek the LORD from him.” The sense is to inquire of the LORD by means of the prophet.
    reason: lexical_alternative
  - marker: b
    text: This expression likely refers to Elisha’s personal service to Elijah, preserving the Hebrew image of pouring water for handwashing.
    reason: cultural_note
