translation:
  language: es
  text: Por tanto,[a] nada se opone por el hecho de que algunos parezcan estar dominados por las pasiones debido a una razón débil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nada se opone por el hecho de que algunos parezcan estar dominados por las pasiones debido a un razonamiento débil»
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: LSJ
  rationale: El neutro indefinido funciona aquí como sujeto impersonal; «nada» es la forma más natural y fiel en español.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por consiguiente
  - así que
  lexicon: LSJ
  rationale: Conserva claramente el valor inferencial del término griego y suena natural en registro bíblico moderno.
- source_word: ἐναντιοῦται
  english_pob_choice: is opposed
  chosen_spanish: se opone
  alternatives_spanish:
  - está en contra
  - se contradice
  lexicon: LSJ
  rationale: El verbo expresa oposición o conflicto; en español, «se opone» comunica bien esa relación sin forzar una construcción pasiva artificial.
- source_word: τὸ φαίνεσθαί
  english_pob_choice: the fact that ... appear
  chosen_spanish: que ... parezcan
  alternatives_spanish:
  - el hecho de que ... parezcan
  - el parecer de que ...
  lexicon: LSJ
  rationale: El infinitivo articular exige una solución nominalizada; en español, una subordinada con «que» mantiene la idea de apariencia frente a realidad con buena fluidez.
- source_word: τινας
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: LSJ
  rationale: Designa personas indefinidas; «algunos» es breve y idiomático.
- source_word: παθοκρατεῖσθαι
  english_pob_choice: to be ruled by passions
  chosen_spanish: estar dominados por las pasiones
  alternatives_spanish:
  - estar sometidos a las pasiones
  - ser dominados por las pasiones
  lexicon: LSJ
  rationale: Mantiene la imagen de dominio/control y conserva el vocabulario filosófico de 4 Macabeos sobre pasiones y razón.
- source_word: πάθος
  english_pob_choice: passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - los deseos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθος nombra las pasiones que la razón debe gobernar; «pasiones» preserva ese campo conceptual.
- source_word: διὰ τὸν ἀσθενῆ λογισμόν
  english_pob_choice: because of weak reason
  chosen_spanish: debido a un razonamiento débil
  alternatives_spanish:
  - por una razón débil
  - a causa de un juicio débil
  lexicon: LSJ
  rationale: λoγισμός aquí denota el ejercicio del razonamiento/juicio; «razonamiento» comunica mejor la función activa que «razón» sola en español, y «débil» traduce ἀσθενῆ con precisión.
theological_decisions:
- issue: Contraste antropológico entre razón y pasiones
  english_pob_reading: Render λογισμός as 'reason' and παθοκρατεῖσθαι as 'ruled by passions'
  chosen_spanish_reading: Traducir λογισμός como «razonamiento» y παθοκρατεῖσθαι como «estar dominados por las pasiones»
  alternative_spanish_readings:
  - «razón» / «ser dominados por las pasiones»
  - «juicio racional» / «estar sometidos a las pasiones»
  rationale: El pasaje forma parte del argumento de 4 Macabeos sobre el gobierno de la razón sobre las pasiones. «Razonamiento» conserva el matiz de actividad mental/judicial del término sin perder la oposición conceptual del texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB, que prefirió «is opposed» sobre «is contradicted» y «appear» sobre «seem». En español, eso se refleja con «se opone» y «parezcan», manteniendo el valor inferencial de οὖν y la tensión conceptual entre apariencia, pasiones y razonamiento débil.
  spanish_consistency_notes:
  - Se mantuvo «pasiones» para πάθος conforme al vocabulario filosófico de 4 Macabeos.
  - Se evitó «SEÑOR» u otra terminología no pertinente; el texto no contiene términos divinos.
  - «Razonamiento» se eligió por claridad en español, aunque «razón» sigue siendo una alternativa válida y más cercana al contraste clásico del libro.
