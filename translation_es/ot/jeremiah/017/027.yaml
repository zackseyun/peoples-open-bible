base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/017/027.yaml
  text: But if you do not listen to me[a], to keep the Sabbath day holy, and not to carry a load and bring it in through the gates of Jerusalem on the Sabbath day, then I will kindle a fire in its gates, and it will consume the palaces of Jerusalem[b], and it will not be quenched.
  footnotes:
