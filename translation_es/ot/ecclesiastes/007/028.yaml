- from: 'lo que mi alma aún buscaba[a], pero no hallé: un hombre entre mil hallé[b], pero una mujer entre todas estas no hallé.'
  to: 'lo que mi alma aún buscaba, pero no hallé: un hombre entre mil[a] hallé, pero una mujer entre todos estos[b] no hallé.'
  rationale: Se corrige «entre todas estas» a «entre todos estos» para evitar una restricción indebida del referente y reflejar mejor el hebreo y la explicación documentada en el POB. También se reubica la nota léxica al segmento «entre mil», donde realmente aplica la alternativa «uno de mil». El resto del versículo puede mantenerse, pues transmite fielmente el sentido y conserva un español natural y digno.
