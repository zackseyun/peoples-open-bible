  - descendiente de Talmai, rey de Guesur
  rationale: El texto hebreo lee de manera más directa 'hija de', pero en contextos genealógicos el sustantivo puede abarcar una descendencia más remota. Se conserva la lectura directa en el texto principal y se documenta la alternativa sin borrarla.
  doctrine_reference: Genealogical usage in biblical Hebrew; no doctrinal dispute intended.
