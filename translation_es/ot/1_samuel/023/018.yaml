translation:
  language: es
  text: Y los dos hicieron un pacto delante de Yahvé[a]. Después David permaneció en la zona boscosa[b], y Jonatán fue a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "cortaron un pacto".'
    reason: lexical_alternative
  - marker: b
    text: O "en Horesh"; el hebreo puede entenderse como un nombre de lugar o como "la zona boscosa" / "el bosque".
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - sellaron
  - cortaron
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática כרת ברית, literalmente 'cortar un pacto'. En español, 'hicieron un pacto' transmite con naturalidad el acto solemne, mientras que 'cortaron' conserva la fuerza literal como alternativa marcada.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos juntos
  lexicon: HALOT
  rationale: La forma dual se conserva de manera clara y breve con 'los dos', manteniendo el énfasis en David y Jonatán como participantes conjuntos.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: En español bíblico, 'pacto' comunica mejor la solemnidad relacional de בְּרִית que 'acuerdo'. Se evita 'alianza' por posible matiz político o menos solemne.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva la referencia espacial y ritual de la fórmula hebrea con 'delante de', y el nombre divino se traduce según el estándar del proyecto como 'Yahvé'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el término directivo del proyecto para el Tetragrámaton, manteniendo el nombre propio del pacto y evitando el reemplazo litúrgico por 'el SEÑOR'.
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  lexicon: HALOT
  rationale: El verbo indica permanecer o seguir en un lugar; 'permaneció' es fiel, idiomático y evita la literalidad de 'sentó'.
- source_word: בַּחֹרְשָׁה
  english_pob_choice: in the wooded area
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en Horesh
  - en la zona boscosa
  lexicon: HALOT
  rationale: La POB inglesa preserva la ambigüedad entre topónimo y sustantivo común. En español, 'bosque' mantiene esa lectura natural; la nota conserva la alternativa 'Horesh'.
- source_word: וִיהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: HALOT
  rationale: Se adopta la forma bíblica usual en español, con adaptación ortográfica estándar.
- source_word: הָלַךְ לְבֵיתוֹ
  english_pob_choice: went to his house
  chosen_spanish: fue a su casa
  alternatives_spanish:
  - volvió a su casa
  - regresó a su casa
  lexicon: HALOT
  rationale: '''Fue a su casa'' reproduce con naturalidad el movimiento expresado por el hebreo sin añadir inferencias sobre retorno que el texto no explicita.'
theological_decisions:
- issue: Nombre divino יְהוָה en fórmula de pacto
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: El texto ubica el pacto bajo la presencia y autoridad del Dios del pacto; se conserva el nombre propio 'Yahvé' conforme al estándar del proyecto y la solemnidad de la escena.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בְּרִית en contexto davídico-jonatánico
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - acuerdo
  rationale: '''Pacto'' preserva la carga relacional, juramentada y teológica del término, evitando debilitarlo como simple acuerdo.'
  doctrine_reference: 'DOCTRINE.md: Covenant terminology / ברית'
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente hebreo y el audit trail inglés. No hubo revisiones aplicadas en el paquete inglés; la traducción española conserva la ambigüedad de בַּחֹרְשָׁה con nota, y mantiene el nombre divino conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, en lugar de 'SEÑOR'.
  - Se prefirió 'pacto' por su peso bíblico, no 'acuerdo'.
  - '''Jonatán'' sigue la forma española estándar del nombre propio.'
  - La ambigüedad de 'Horesh' / 'bosque' queda explicitada en nota.
  - El estilo general es formal y publicable, sin calcos innecesarios.
