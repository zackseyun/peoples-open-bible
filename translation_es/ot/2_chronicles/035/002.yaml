translation:
  language: es
  text: Asignó a los sacerdotes a sus turnos[a] y los fortaleció[b] para el servicio de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «a sus divisiones», «en sus puestos» o, más literalmente, «sobre sus guardias».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los animó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: He appointed
  chosen_spanish: Puso en
  alternatives_spanish:
  - nombró
  - estableció
  - colocó
  lexicon: HALOT
  rationale: El causativo de עמד expresa poner o colocar a alguien en una función asignada. En español, «puso ... en» comunica con naturalidad la idea administrativa de asignación sin perder el matiz de instalación en un cargo o turno.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los presbíteros
  lexicon: HALOT
  rationale: כהנים designa a los sacerdotes del culto; «sacerdotes» es el equivalente directo y claramente entendido en español bíblico.
- source_word: עַל מִשְׁמְרוֹתָם
  english_pob_choice: to their duties
  chosen_spanish: en sus turnos
  alternatives_spanish:
  - en sus puestos
  - sobre sus guardias
  - en sus divisiones
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת puede referirse a guardias, turnos o divisiones asignadas. En este contexto de servicio del templo, «turnos» comunica bien la organización del ministerio sin sobrerrepresentar la imagen de vigilancia militar.
- source_word: וַיְחַזְּקֵם
  english_pob_choice: and strengthened them
  chosen_spanish: los fortaleció
  alternatives_spanish:
  - los animó
  - los exhortó
  - los alentó
  lexicon: HALOT
  rationale: חזק en piel puede significar fortalecer o animar. «Los fortaleció» conserva el núcleo léxico y permite abarcar el apoyo práctico y moral que el contexto sugiere.
- source_word: לַעֲבוֹדַת
  english_pob_choice: for the service
  chosen_spanish: para el servicio
  alternatives_spanish:
  - para la obra
  - para el ministerio
  lexicon: HALOT
  rationale: עֲבוֹדָה es servicio u obra, especialmente servicio cultual. «Servicio» mantiene esa amplitud y suena natural en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino según la terminología del proyecto: יְהוָה → «Yahvé». «Casa» traduce literalmente בית y conserva la expresión hebrea tradicional.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La política del proyecto pide transliterarlo como «Yahvé» en el texto principal, preservando el nombre de pacto en vez de ocultarlo tras una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of וַיְחַזְּקֵם in temple context
  english_pob_reading: and strengthened them
  chosen_spanish_reading: y los fortaleció
  alternative_spanish_readings:
  - y los animó
  - y los exhortó
  rationale: La forma יכולה abarcar tanto fortaleza como ánimo. Mantener «fortaleció» deja abierta la tensión léxica entre apoyo moral y reforzamiento para el servicio, sin reducir el verbo a mera motivación.
  doctrine_reference: 'HALOT: חזק; contexto cultual de organización del templo'
translation_notes:
  revision_awareness: 'El texto base en inglés ya refleja una solución óptima y estable, con dos notas léxicas. La versión española conserva esa misma estructura interpretativa: asignación de oficios/turnos, refuerzo para el servicio del templo y el nombre divino como Yahvé. No se detectan revisiones posteriores que obliguen a ajustar el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Sacerdotes» conserva el término cultual estándar y evita un calco innecesario.
  - «Turnos» traduce de manera idiomática el sentido funcional de מִשְׁמְרוֹת sin perder la opción alternativa de divisiones o vigilias.
  - La sintaxis evita introducir sujeto explícito innecesario; el referente implícito sigue siendo Josías, como en el contexto inmediato.
