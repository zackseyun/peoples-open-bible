base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/025.yaml
  text: So you shall distinguish between the clean animal and the unclean[a], and between the unclean bird and the clean; and you shall not make yourselves detestable by the animal or by the bird or by anything that creeps on the ground[b], which I have set apart for you as unclean.
  footnotes:
  - marker: a
    text: Or 'make yourselves abominable.' The Hebrew verb is from the same semantic field as 'detestable' or 'abhorrent,' not the usual term for 'become unclean.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your souls' or 'your persons'; the idiom means 'yourselves.'
    reason: lexical_alternative
