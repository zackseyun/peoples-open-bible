id: LUK.22.71
reference: Luke 22:71
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Τί ἔτι ⸂ἔχομεν μαρτυρίας χρείαν⸃; αὐτοὶ γὰρ ἠκούσαμεν ἀπὸ τοῦ στόματος αὐτοῦ.
translation:
  text: Then they said[a], “Why do we still need testimony? For we ourselves have heard it from his own mouth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What further need do we have for testimony?'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  chosen: Then they said
  alternatives:
  - And they said
  - But they said
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then' gives natural English flow while preserving sequence without overstating contrast.
- source_word: Τί ἔτι
  chosen: Why do we still
  alternatives:
  - What further
  - Why still do we
  lexicon: BDAG
  rationale: The idiom τί ἔτι with the following expression is naturally rendered as a rhetorical 'Why do we still...?' rather than a more wooden 'What further...?' in English.
- source_word: ἔχομεν μαρτυρίας χρείαν
  chosen: need testimony
  alternatives:
  - have need of testimony
  - need witness
  - need further testimony
  lexicon: BDAG
  rationale: χρείαν ἔχειν means 'to need.' μαρτυρίας is a genitive complement, 'testimony/witness.' 'Need testimony' is clear modern English. 'Further' is implied by ἔτι but not repeated here in the main text to avoid redundancy after 'still.'
- source_word: μαρτυρίας
  chosen: testimony
  alternatives:
  - witness
  - evidence
  lexicon: BDAG
  rationale: In this judicial setting, μαρτυρία refers to testimony or witness. 'Testimony' best fits the legal context and English idiom with 'need.'
- source_word: αὐτοὶ γὰρ
  chosen: For we ourselves
  alternatives:
  - For we ourselves indeed
  - For we ourselves have
  lexicon: BDAG
  rationale: αὐτοὶ is emphatic, highlighting that they personally heard Jesus. 'We ourselves' preserves the emphasis.
- source_word: ἠκούσαμεν
  chosen: have heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: 'Although the Greek aorist is formally past, English present perfect fits the immediate-result force in this courtroom-like declaration: they have now heard what they consider sufficient.'
- source_word: ἀπὸ τοῦ στόματος αὐτοῦ
  chosen: from his own mouth
  alternatives:
  - from his mouth
  - from his lips
  lexicon: BDAG
  rationale: This is an idiomatic expression for direct personal speech. 'His own mouth' brings out the directness and corresponds well to the emphatic context, though 'own' is not a separate Greek word.
