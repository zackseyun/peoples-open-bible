translation:
  language: es
  text: Sin duda, ustedes son el pueblo[a], y con ustedes morirá la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente ustedes son el pueblo, y con ustedes morirá la sabiduría». La línea suele entenderse como ironía dirigida a los amigos de Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְנָם כִּי
  english_pob_choice: No doubt
  chosen_spanish: Sin duda
  alternatives_spanish:
  - Ciertamente
  - Sin lugar a dudas
  - Desde luego
  lexicon: HALOT
  rationale: La combinación introduce una afirmación con matiz irónico; «Sin duda» comunica la concesión aparente y su tono natural en español, sin volverla demasiado solemne ni mecánica.
- source_word: אַתֶּם עָם
  english_pob_choice: you are the people
  chosen_spanish: ustedes son el pueblo
  alternatives_spanish:
  - ustedes son la gente
  - ustedes son el pueblo verdadero
  - ustedes son el pueblo único
  lexicon: HALOT
  rationale: «עָם» puede ser «pueblo» o «gente», pero el artículo y el paralelismo hacen que «el pueblo» suene más idiomático y conserve el filo sarcástico del hebreo y del inglés POB.
- source_word: וְעִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - a su lado
  lexicon: HALOT
  rationale: La preposición expresa acompañamiento de manera directa; «con ustedes» mantiene la relación verbal con la frase siguiente y evita añadir énfasis no presente en el texto.
- source_word: תָּמוּת חָכְמָה
  english_pob_choice: wisdom will die
  chosen_spanish: morirá la sabiduría
  alternatives_spanish:
  - la sabiduría perecerá
  - la sabiduría acabará
  lexicon: HALOT
  rationale: El verbo מות en tercera persona femenina singular concuerda con «sabiduría». «Morirá» conserva la imagen fuerte y el tono mordaz de la línea.
theological_decisions:
- issue: Tono irónico dirigido a los amigos de Job
  english_pob_reading: The line is commonly understood as irony directed at Job's friends.
  chosen_spanish_reading: La línea se entiende como ironía dirigida a los amigos de Job.
  alternative_spanish_readings:
  - La línea puede entenderse literalmente como elogio.
  - La línea puede leerse sin ironía, como simple afirmación.
  rationale: El hebreo y el contexto discursivo favorecen una lectura irónica; la traducción debe dejarla abierta pero reconocible. «Sin duda» y «ustedes son el pueblo» permiten mantener esa tensión sin explicitarla en el cuerpo del texto.
  doctrine_reference: Sabiduría bíblica y discurso sapiencial en Job 12; lectura contextual del sarcasmo retórico.
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con el texto fuente y con la traducción inglesa auditada; no se registraron cambios necesarios en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para חָכְמָה por su correspondencia estándar y porque el contexto no exige otra especificación.
  - Se usa «pueblo» en singular colectivo para reflejar el hebreo y la ironía del enunciado.
  - Se conserva el tiempo futuro en «morirá» para reproducir la fuerza del imperfecto hebreo en este contexto.
  - El tratamiento de segunda persona plural con «ustedes» es coherente con el plural masculino del hebreo.
