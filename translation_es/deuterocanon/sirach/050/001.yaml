    rationale: Esto es un error manifiesto de idioma/edición y rompe la legibilidad. Debe corregirse a 'fue fortalecido' o equivalente documentado.
  - severity: low
    issue: El orden 'fue reparada la casa' suena menos natural que 'la casa fue reparada'.
    rationale: No altera el sentido, pero la sintaxis revisada mejora la fluidez en español neutral sin apartarse del original.
