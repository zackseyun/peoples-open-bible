translation:
  language: es
  text: Cuando el rey de Moab vio que la batalla era demasiado fuerte para él, tomó consigo setecientos hombres que blandían la espada para abrirse paso hasta el rey de Edom[a], pero no pudieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra el rey de Edom». La preposición hebrea puede entenderse como direccional («a/hacia») o hostil («contra») en este contexto militar.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזַק מִמֶּנּוּ הַמִּלְחָמָה
  english_pob_choice: the battle was too strong for him
  chosen_spanish: la batalla era demasiado fuerte para él
  alternatives_spanish:
  - la batalla prevalecía contra él
  - el combate era más fuerte que él
  lexicon: HALOT
  rationale: La expresión hebrea usa חזק con מן + pronombre para indicar que la guerra se imponía al rey de Moab. «Era demasiado fuerte para él» conserva el sentido idiomático y la relación de superioridad militar sin endurecer el español.
- source_word: וַיִּקַּח אֹתוֹ
  english_pob_choice: he took with him
  chosen_spanish: tomó consigo
  alternatives_spanish:
  - lo tomó
  - lo llevó con él
  lexicon: HALOT
  rationale: El marcador de objeto con sufijo no debe leerse aquí como un objeto personal directo aislado. En contexto militar, la frase expresa que reunió o llevó un grupo con él; «tomó consigo» comunica esa asociación de manera natural en español.
- source_word: שְׁבַע מֵאוֹת אִישׁ
  english_pob_choice: seven hundred men
  chosen_spanish: setecientos hombres
  alternatives_spanish:
  - setecientos soldados
  lexicon: HALOT
  rationale: אִישׁ funciona como sustantivo de conteo en contexto bélico. «Hombres» sigue de cerca el valor léxico y evita introducir una especificación interpretativa como «soldados».
- source_word: שֹׁלֵף חֶרֶב
  english_pob_choice: who drew the sword
  chosen_spanish: que blandían la espada
  alternatives_spanish:
  - que sacaban la espada
  - espada en mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desenvainando espada» / «que desenfundan espada». En español, «blandían la espada» conserva la imagen de guerreros preparados para combatir sin sonar forzado como participio técnico.
- source_word: לְהַבְקִיעַ
  english_pob_choice: to break through
  chosen_spanish: para abrirse paso
  alternatives_spanish:
  - para romper la línea
  - para hacer brecha
  lexicon: HALOT
  rationale: El verbo en hifil expresa forzar una apertura o brecha entre fuerzas enemigas. «Abrirse paso» es la forma más natural en español para este avance militar, y mantiene la idea de penetrar líneas hostiles.
- source_word: אֶל מֶלֶךְ אֱדוֹם
  english_pob_choice: to the king of Edom
  chosen_spanish: hasta el rey de Edom
  alternatives_spanish:
  - contra el rey de Edom
  - al rey de Edom
  lexicon: HALOT
  rationale: La preposición אֶל puede leerse como direccional («hacia») o hostil («contra») en este contexto. «Hasta el rey de Edom» conserva la dirección del movimiento y deja implícita la hostilidad del intento de ruptura, sin fijar una sola lectura más allá de lo necesario.
- source_word: וְלֹא יָכֹלוּ
  english_pob_choice: but they could not
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - pero no fueron capaces
  - pero no tuvieron éxito
  lexicon: HALOT
  rationale: El plural verbal presenta el fracaso del intento conjunto. «No pudieron» es breve, natural y suficientemente preciso para el cierre narrativo.
theological_decisions:
- issue: Dirección o hostilidad de אֶל en la frase final
  english_pob_reading: to the king of Edom
  chosen_spanish_reading: hasta el rey de Edom
  alternative_spanish_readings:
  - contra el rey de Edom
  - al rey de Edom
  rationale: La frase describe un avance de ruptura militar. El hebreo permite leer la preposición como direccional o hostil; el español «hasta» preserva el movimiento sin resolver de antemano si el matiz principal es «hacia» o «contra».
  doctrine_reference: Ninguna; decisión semántico-sintáctica del texto narrativo.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del pasaje: no se registran cambios aplicados en la revisión auditada y el consenso de control fue de alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió «rey de Edom» en lugar de una forma litúrgica tradicional para conservar la referencia política y geográfica exacta.
  - «Tomó consigo» evita una lectura errónea de objeto directo literal y refleja mejor la relación asociativa del hebreo.
  - Se preserva el paralelismo narrativo simple del hebreo con una sola cláusula principal y cierre adversativo breve.
