translation:
  language: es
  text: Así pues, él dijo estas cosas; pero ellos, habiendo sido liberados en un momento, bendecían a su santo Dios salvador[a], habiendo apenas escapado de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su santo Dios y Salvador». La frase griega puede entenderse como una cadena compacta de títulos para Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν οὖν ταῦτα ἐξέλεξεν
  english_pob_choice: So he said these things
  chosen_spanish: Así pues, él dijo estas cosas
  alternatives_spanish:
  - Así pues, él habló estas cosas
  - Entonces dijo estas cosas
  lexicon: LSJ
  rationale: ἐξέλεξεν aquí funciona narrativamente como introducir el discurso previo. En español, «dijo estas cosas» conserva el valor de habla sin sonar forzado. Se evita una paráfrasis más libre y se mantiene la relación con el discurso inmediato.
- source_word: ἐν ἀμερεῖ χρόνῳ
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - sin demora
  - en un instante
  - en muy poco tiempo
  lexicon: LSJ
  rationale: La idiomática griega expresa un intervalo muy breve. «En un momento» refleja la inmediatez con naturalidad en español y corresponde al ajuste revisado del POB en inglés.
- source_word: λυθέντες
  english_pob_choice: having been released
  chosen_spanish: habiendo sido liberados
  alternatives_spanish:
  - habiendo sido soltados
  - habiendo sido libres
  - liberados
  lexicon: LSJ
  rationale: El participio pasivo indica que fueron puestos en libertad o desatados. «Habiendo sido liberados» conserva el pasivo y el sentido de rescate del contexto.
- source_word: τὸν ἅγιον σωτῆρα θεὸν αὐτῶν
  english_pob_choice: their holy Savior God
  chosen_spanish: a su santo Dios Salvador
  alternatives_spanish:
  - a su santo Dios y Salvador
  - a su santo Dios salvador
  - a su santo Dios liberador
  lexicon: LSJ
  rationale: La cadena griega concentra varios títulos en una sola expresión. En español, «Dios Salvador» preserva la unidad tituladora sin dividirla innecesariamente. Se conserva «santo» como cualidad de Dios y «Salvador» como título divino.
- source_word: ηὐλόγουν
  english_pob_choice: blessed
  chosen_spanish: bendecían
  alternatives_spanish:
  - bendijeron
  - alababan
  - daban bendición
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continuada o repetida. «Bendecían» respeta ese aspecto y mantiene el registro bíblico de «bendecir» sin reducirlo a mera alabanza.
- source_word: ἄρτι τὸν θάνατον ἐκπεφυγότες
  english_pob_choice: having just escaped death
  chosen_spanish: apenas escapados de la muerte
  alternatives_spanish:
  - habiendo apenas escapado de la muerte
  - recién escapados de la muerte
  - recién liberados de la muerte
  lexicon: LSJ
  rationale: ἄρτι marca recentísima inmediatez y el participio perfecto indica escape ya cumplido con resultado presente. «Apenas escapados de la muerte» expresa ambos matices de forma breve y fiel.
theological_decisions:
- issue: Agrupación de títulos divinos en τὸν ἅγιον σωτῆρα θεὸν αὐτῶν
  english_pob_reading: their holy Savior God, or their holy God and savior
  chosen_spanish_reading: a su santo Dios Salvador
  alternative_spanish_readings:
  - a su santo Dios y Salvador
  - a su santo Salvador Dios
  rationale: El griego admite una cadena compacta de títulos sin exigir que se separen en dos funciones distintas. «Dios Salvador» conserva la densidad tituladora y evita imponer una distinción no explicitada por la sintaxis.
  doctrine_reference: Trinitarian and divine-title wording should remain source-driven; preserve appositional title strings without doctrinal expansion.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefería «in a moment» para ἐν ἀμερεῖ χρόνῳ y mantuve esa inmediatez en español. También respeté la observación de que el griego concentra en una sola cadena los títulos divinos, evitando dividir innecesariamente «Dios» y «Salvador».
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí el referente es θεός, por eso corresponde «Dios».
  - Mantengo «Salvador» con mayúscula en el título divino para reflejar la fuerza tituladora del original y la auditoría inglesa.
  - Conservé un orden de frase español natural sin debilitar el participio perfecto ni la inmediatez de ἄρτι.
