translation:
  language: es
  text: Y no volveré a hacer que los pies de Israel vaguen[a] de la tierra que di a sus padres[b], con tal que se cuiden de hacer conforme a todo lo que les mandé, y conforme a toda la ley[c] que mi siervo Moisés les mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “hacer que Israel se mueva” o “remover a Israel de la tierra”. El hebreo dice literalmente “hacer vagar el pie de Israel”, preservando la imagen de desplazamiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “a sus antepasados”. “Sus padres” es una expresión pactual para los antepasados de Israel.'
    reason: lexical_alternative
  - marker: c
    text: “Ley” también puede verterse “instrucción”; aquí se refiere a la Torá mosaica dada por medio de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹסִיף
  english_pob_choice: I will not again make
  chosen_spanish: no volveré a hacer
  alternatives_spanish:
  - ya no haré
  - no seguiré haciendo
  lexicon: HALOT
  rationale: 'Con לֹא + הִפְעִיל de יסף, la idea es cesar una acción repetida: no hacerla de nuevo. En español, “no volveré a hacer” conserva el valor de repetición sin forzar un calco de “añadir”. Se mantiene el matiz de acción futura negada y repetida.'
- source_word: לְהָנִיד רֶגֶל
  english_pob_choice: make Israel’s feet wander
  chosen_spanish: hacer que Israel ande errante
  alternatives_spanish:
  - hacer errar los pies de Israel
  - hacer que Israel se mueva
  lexicon: HALOT
  rationale: El giro hebreo usa una imagen corporal concreta para expresar desplazamiento forzado o expulsión. “Ande errante” conserva la metáfora de vagar/desplazarse con naturalidad en español, sin reducirla demasiado a “moverse” ni volverse demasiado cruda en una formulación literal.
- source_word: רֶגֶל יִשְׂרָאֵל
  english_pob_choice: Israel’s feet
  chosen_spanish: Israel
  alternatives_spanish:
  - los pies de Israel
  - el pie de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente “el pie de Israel”, en español la metáfora se integra mejor con el sujeto colectivo “Israel” dentro de la expresión verbal “andar errante”. Esto preserva el sentido idiomático y la referencia corporativa sin perder la imagen subyacente, que queda reflejada en la nota textual.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el territorio
  lexicon: HALOT
  rationale: En contexto de pacto y heredad, אֲדָמָה se refiere a la tierra dada a los antepasados, no solo al suelo físico. “La tierra” es la equivalencia española más natural y fiel al marco territorial del pasaje.
- source_word: נָתַתִּי לַאֲבוֹתָם
  english_pob_choice: that I gave to their fathers
  chosen_spanish: que di a sus padres
  alternatives_spanish:
  - que di a sus antepasados
  - que di a sus progenitores
  lexicon: HALOT
  rationale: Se conserva “padres” porque el hebreo usa una expresión pactual tradicional para los antepasados de Israel. En español, “sus padres” mantiene la formulación directa del texto y el eco de herencia pactal.
- source_word: רַק אִם
  english_pob_choice: if only
  chosen_spanish: con tal que
  alternatives_spanish:
  - si tan solo
  - solo si
  lexicon: HALOT
  rationale: La frase introduce una condición restrictiva real. “Con tal que” expresa bien la dependencia condicional del beneficio prometido, con un registro natural y formal en español.
- source_word: יִשְׁמְר֣וּ לַעֲשׂוֹת
  english_pob_choice: they are careful to do
  chosen_spanish: guarden para hacer
  alternatives_spanish:
  - se cuiden de hacer
  - sean diligentes en hacer
  lexicon: HALOT
  rationale: El hebreo combina “guardar/observar” con el infinitivo “hacer”, es decir, atender cuidadosamente para obedecer. “Guarden para hacer” conserva ambos elementos de vigilancia y acción, y el verbo “guardar” refleja mejor el peso de שׁמר en este contexto que una paráfrasis más libre.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִי/ם
  english_pob_choice: according to all that I commanded them
  chosen_spanish: conforme a todo lo que les mandé
  alternatives_spanish:
  - según todo lo que les mandé
  - de acuerdo con todo lo que les mandé
  lexicon: HALOT
  rationale: El prefijo כ indica conformidad. “Conforme a” preserva ese valor de correspondencia de manera sobria y bíblica en español. “Mandé” representa צוה con una equivalencia directa y clara.
- source_word: וּלְכָל הַתּוֹרָה
  english_pob_choice: and according to all the law
  chosen_spanish: y conforme a toda la ley
  alternatives_spanish:
  - y según toda la instrucción
  - y conforme a toda la instrucción
  lexicon: HALOT
  rationale: En contexto mosaico, תּוֹרָה puede significar “ley” o “instrucción”. Se eligió “ley” porque es la equivalencia más estable y reconocible en este marco, mientras que la nota preserva la posibilidad de “instrucción” como alternativa lexical.
- source_word: עַבְדִּי מֹשֶׁה
  english_pob_choice: my servant Moses
  chosen_spanish: mi siervo Moisés
  alternatives_spanish:
  - Moisés mi siervo
  lexicon: HALOT
  rationale: Se mantiene la designación honorífica “mi siervo” para עַבְדִּי, que es la formulación directa del hebreo. “Siervo” evita diluir la fuerza lexical con “servidor” o “ministro” y conserva el título bíblico aplicado a Moisés.
theological_decisions:
- issue: Condicionalidad de la permanencia de Israel en la tierra
  english_pob_reading: 'The verse states a real condition for Israel''s remaining undisturbed in the land: obedience to God’s commands through Moses.'
  chosen_spanish_reading: 'El versículo presenta una condición real para que Israel permanezca en la tierra sin ser desplazado: obediencia a los mandamientos dados por Dios por medio de Moisés.'
  alternative_spanish_readings:
  - La frase es solo retórica y no expresa una condición real
  - La condición debe suavizarse para no chocar con promesas de posesión permanente
  rationale: רַק אִם introduce una condición genuina, y el contexto de la frase mantiene la tensión del pacto. La traducción conserva esa condicionalidad sin resolverla hacia una lectura más absoluta ni diluirla por armonización doctrinal.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la imagen colectiva de “Israel’s feet” para reflejar mejor el plural implícito del sujeto nacional. En español, la metáfora se integró idiomáticamente en “hacer que Israel ande errante”, manteniendo la fuerza del hebreo sin necesidad de pluralizar el sustantivo corporal.
  spanish_consistency_notes:
  - Se usó “Yahvé” como nombre divino proyectado por convención POB, aunque en este versículo no aparece explícitamente.
  - Se mantuvo el contraste entre la imagen concreta de desplazamiento y su sentido idiomático, evitando una traducción plana como “remover” o “quitar”.
  - “Ley” y “siervo” siguen la terminología POB cuando el contexto mosaico y honorífico lo justifican.
