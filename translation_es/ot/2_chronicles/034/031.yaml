  to: Entonces el rey se puso de pie en su lugar e hizo el pacto delante de Yahvé, para andar tras Yahvé y guardar sus mandamientos, sus testimonios y sus estatutos, con todo su corazón y con toda su alma, para cumplir las palabras del pacto que estaban escritas en este libro[a].
  rationale: Se elimina la nota [a] defectuosa porque no daba una alternativa real; se conserva solo la nota histórica sobre «libro/rollo», que sí está sustentada por el expediente inglés. Además, se ajusta «se puso en su lugar» a «se puso de pie en su lugar» para reflejar mejor ויעמד y se simplifica la relativa final para mejorar la naturalidad del español.
