    issue: Falta el verbo implícito en «como sus padres».
    rationale: כַּאֲבוֹתֵיכֶם compara el comportamiento presente con el de los padres; la auditoría inglesa lo explicitó como «as your fathers did». En español, «como sus padres» se entiende, pero «como sus padres hicieron» comunica con más precisión la comparación de conducta y mejora la naturalidad.
  revised_spanish_text: Ahora, no endurezcan su cerviz como sus padres hicieron. Den la mano a Yahvé[a], y entren en su santuario, que él ha consagrado para siempre, y sirvan a Yahvé su Dios, para que su ardiente ira se aparte de ustedes[b].
