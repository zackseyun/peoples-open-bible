translation:
  language: es
  text: 'los hijos de Tobeis, en total ciento treinta y nueve; los esclavos del templo[a]: los hijos de Esaú, los hijos de Taseipha, los hijos de Tabaot, los hijos de Keras, los hijos de Soua, los hijos de Falaiou, los hijos de Labana[c][b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἱερόδουλοι también puede traducirse «siervos del templo»; aquí se conserva «esclavos del templo» para no atenuar el matiz de servidumbre.
    reason: lexical_alternative
  - marker: b
    text: El texto fuente aquí es un fragmento de lista que termina con coma; el siguiente versículo continúa el registro de los esclavos del templo.
    reason: cross_reference
  - marker: c
    text: El paralelo hebreo en Nehemías 7:43 no es verbalmente paralelo aquí; 1 Esdras presenta en este punto una sección distinta de la lista de los retornados.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - miembros de la familia de
  lexicon: LSJ
  rationale: En esta lista censal/genealógica, υἱοὶ funciona como fórmula de linaje. «Los hijos de» conserva la estructura formal del registro y corresponde de manera directa al griego sin interpretarlo de más.
- source_word: Τωβείς
  english_pob_choice: Tobeis
  chosen_spanish: Tobeis
  alternatives_spanish:
  - Tobías
  - Tobies
  lexicon: LSJ
  rationale: Es un nombre propio transliterado. Se mantiene la forma cercana al griego de Swete para máxima transparencia textual.
- source_word: πάντες
  english_pob_choice: altogether
  chosen_spanish: en total
  alternatives_spanish:
  - todos
  - sumando
  lexicon: LSJ
  rationale: «En total» expresa naturalmente la fuerza sumativa de πάντες en una lista censal, sin perder el valor de recuento.
- source_word: ἑκατὸν τριάκοντα ἐννέα
  english_pob_choice: one hundred thirty-nine
  chosen_spanish: ciento treinta y nueve
  alternatives_spanish:
  - ciento treinta y nueve
  - ciento treinta y nueve en total
  lexicon: LSJ
  rationale: Se conserva exactamente la cifra del original con el orden numérico natural del español.
- source_word: οἱ ἱερόδουλοι
  english_pob_choice: the temple slaves
  chosen_spanish: los esclavos del templo
  alternatives_spanish:
  - los siervos del templo
  - los esclavos sagrados
  lexicon: LSJ
  rationale: ἱερόδουλοι denota personas vinculadas al servicio del templo en condición de servidumbre. «Esclavos del templo» preserva el sentido de dependencia social que el proyecto busca no suavizar.
- source_word: Ἠσαύ
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esav
  lexicon: LSJ
  rationale: Nombre propio bíblico estándar en español, directamente reconocible y fiel al griego.
- source_word: Τασειφά
  english_pob_choice: Taseipha
  chosen_spanish: Taseipha
  alternatives_spanish:
  - Tasefa
  - Tasefá
  lexicon: LSJ
  rationale: Se conserva una transliteración cercana a la grafía griega, dado que se trata de un nombre raro y no seguro.
- source_word: Ταβαώθ
  english_pob_choice: Tabaoth
  chosen_spanish: Tabaot
  alternatives_spanish:
  - Tabaoth
  - Tabaot
  lexicon: LSJ
  rationale: Se vierte el nombre propio con transliteración transparente al español, adaptando la terminación al uso gráfico español.
- source_word: Κηράς
  english_pob_choice: Keras
  chosen_spanish: Keras
  alternatives_spanish:
  - Ceras
  - Keras
  lexicon: LSJ
  rationale: Se conserva la inicial K para reflejar el kappa griego de forma auditable.
- source_word: Σουά
  english_pob_choice: Soua
  chosen_spanish: Soua
  alternatives_spanish:
  - Sua
  - Shua
  lexicon: LSJ
  rationale: La forma griega se representa directamente, sin reconstrucción semítica no explicitada por el testimonio griego.
- source_word: Φαλαίου
  english_pob_choice: Phalaiou
  chosen_spanish: Phalaiou
  alternatives_spanish:
  - Phaleiou
  - Phalaiou
  lexicon: LSJ
  rationale: Nombre raro y de forma incierta; se mantiene una transliteración muy cercana al griego para no introducir conjeturas.
- source_word: Λαβανά
  english_pob_choice: Labana
  chosen_spanish: Labana
  alternatives_spanish:
  - Labaná
  - Laban
  lexicon: LSJ
  rationale: La forma griega termina en -ά; «Labana» refleja mejor esa terminación que reducirla a «Laban».
theological_decisions:
- issue: ἱερόδουλοι en una lista de personal del templo
  english_pob_reading: the temple slaves
  chosen_spanish_reading: los esclavos del templo
  alternative_spanish_readings:
  - los siervos del templo
  - los servidores del templo
  rationale: Aunque el pasaje es catalográfico, el término sí marca una condición servil. En línea con la preferencia del proyecto por no suavizar δοῦλος cuando el rasgo social es relevante, se mantiene «esclavos» en vez de «siervos» o «servidores».
  doctrine_reference: 'DOCTRINE.md: contested terms table on δοῦλος; Translation philosophy §1, §5'
- issue: Lista griega primaria frente al paralelo hebreo aproximado
  english_pob_reading: Translate the Greek census list as given
  chosen_spanish_reading: Traducir la lista griega tal como está
  alternative_spanish_readings:
  - Sustituir por el paralelo masorético aproximado
  - Hibridar con el hebreo paralelo
  rationale: El paralelo hebreo es solo una comprobación auxiliar y no coincide verbalmente aquí. Por eso se sigue el griego como texto fuente principal de 1 Esdras.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; WLC MT parallels for 1 Esdras'
translation_notes:
  revision_awareness: La edición inglesa más reciente había movido el punto y coma para reflejar la continuidad de la lista; en español se imita esa continuidad con punto y coma tras la cifra. También se corrige la oscilación de «servants/slaves» volviendo a un término de servidumbre explícita, coherente con la política léxica del proyecto. No se incorporan notas ancladas no usadas, para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene un estilo de lista censal con sintaxis breve y puntuación que refleja la continuación del enumerado.
  - Los nombres propios se transliteran de forma consistente con el griego, sin sustituirlos por formas hebraizantes no atestiguadas por el texto base.
  - Se preserva «esclavos» para ἱερόδουλοι por consistencia con la terminología POB sobre δοῦλος y derivados.
