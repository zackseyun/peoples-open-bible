review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: encabezado, cadena de títulos divinos, acción verbal y alcance universal ‘desde la salida del sol hasta su ocaso’. Sin embargo, la nota al pie no preserva con precisión el audit trail inglés: presenta como alternativa principal exactamente la misma lectura del texto (‘Dios, Dios, Yahvé’) en lugar de marcar la alternativa real ‘Dios, Dios, el SEÑOR / Yahvé’ o la lectura expansiva ‘El Dios de dioses, Yahvé’.'
  spanish_quality_summary: El español es natural, claro y digno. ‘Un salmo de Asaf’ y ‘habló y llamó a la tierra’ funcionan bien. ‘Desde la salida del sol hasta su ocaso’ es poético y legible. La única reparación necesaria es de coherencia y utilidad en la nota, para que no repita inútilmente el texto principal y exprese correctamente las alternativas.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> ‘Yahvé’, אֵל / אֱלֹהִים -> ‘Dios’, y no introduce ‘SEÑOR’ en el texto principal. Mantiene ‘Asaf’ y ‘la tierra’ adecuadamente. No hay conflicto terminológico mayor; la observación se limita a la formulación de la nota textual.'
  issues:
  - severity: medium
    issue: La nota al pie reproduce como alternativa una lectura idéntica al texto principal.
    rationale: 'El texto principal ya dice ‘Dios[a], Dios, Yahvé’. La nota ‘O: «Dios, Dios, Yahvé»’ no aporta una variante real y no refleja fielmente la nota inglesa, que ofrece ‘God, God, the LORD’ y además menciona la interpretación ‘The God of gods, the LORD.’ En español debe preservarse esa distinción de forma útil y exacta.'
  revised_spanish_text: Un salmo de Asaf. Dios[a], Dios, Yahvé, habló y llamó a la tierra desde la salida del sol hasta su ocaso.
  revised_footnotes:
  - marker: a
    text: 'O: «Dios, Dios, el SEÑOR»; algunos entienden de otro modo los títulos divinos iniciales, incluso: «El Dios de dioses, Yahvé».'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel, claro y alineado con la terminología del proyecto. Solo se corrige la nota para que preserve una alternativa real documentada por el audit trail inglés y no repita innecesariamente la misma lectura del texto principal.
