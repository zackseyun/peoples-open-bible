translation:
  language: es
  text: 'Entonces David dijo a Ittai: «Ve y cruza». Así, Ittai el geteo cruzó, junto con todos sus hombres y todos los pequeños[a] que estaban con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los niños que estaban con él».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve adelante
  lexicon: HALOT
  rationale: El imperativo breve de הלך se expresa de manera natural en español con «Ve». Mantiene la concisión y la fuerza directiva del hebreo sin añadir matices ajenos.
- source_word: וַעֲבֹר / וַיַּעֲבֹר
  english_pob_choice: cross over / crossed over
  chosen_spanish: cruza / cruzó
  alternatives_spanish:
  - pasa / pasó
  - atraviesa / atravesó
  lexicon: HALOT
  rationale: «Cruzar» conserva el movimiento de pasar de un lado a otro y reproduce bien la repetición verbal del mandato y su cumplimiento. «Atravesar» sería posible, pero suena menos directo aquí.
- source_word: אִתַּי הַגִּתִּי
  english_pob_choice: Ittai the Gittite
  chosen_spanish: Ittai el geteo
  alternatives_spanish:
  - Ittai el gitita
  - Ittai el de Gat
  lexicon: nombre propio + gentilicio
  rationale: Se translitera el nombre propio y se traduce el gentilicio con la forma española más transparente. «Geteo» conserva la referencia geográfica/étnica de manera estándar y publicable.
- source_word: אֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: todos sus hombres
  alternatives_spanish:
  - sus hombres
  - su gente
  lexicon: HALOT
  rationale: «Hombres» preserva el valor léxico concreto de אֲנָשִׁים; se añade «todos» porque el hebreo antecede el grupo con וְכָל, y eso debe reflejarse en español.
- source_word: הַטַּף
  english_pob_choice: the little ones
  chosen_spanish: los pequeñitos
  alternatives_spanish:
  - los niños pequeños
  - los niños
  - los pequeños
  lexicon: HALOT
  rationale: POB distingue aquí el matiz de vulnerabilidad y pequeñez. «Pequeñitos» comunica esa fuerza afectiva y concreta mejor que un genérico como «niños» o «dependientes».
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que iban con él
  - que estaban junto a él
  lexicon: HALOT
  rationale: La relativa describe acompañamiento; «que estaban con él» es natural en español y preserva el vínculo inclusivo del grupo sin sobreinterpretar la situación.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then David said
  chosen_spanish: Entonces David dijo
  alternatives_spanish:
  - Y David dijo
  - Luego David dijo
  lexicon: HALOT
  rationale: «Entonces» refleja bien la progresión narrativa del waw-consecutivo y mantiene la lectura fluida en español moderno.
translation_notes:
  revision_awareness: "La redacción sigue de cerca el hebreo masorético y toma como contexto el audit trail inglés, especialmente la repetición de «go/cross over» y la opción lexical «the little ones». Se evitó la mecanicidad del inglés al elegir un español natural, pero sin diluir la duplicación verbal ni el matiz de \x05d7ַטַּף."
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se preserva la distinción entre el nombre propio Ittai y su gentilicio traducido.
  - «Pequeñitos» se eligió para conservar el tono concreto y vulnerable de הַטַּף; no se sustituyó por una palabra más abstracta.
  - La puntuación sigue la sintaxis discursiva del hebreo con comillas españolas y separación clara de la narración respecto del discurso directo.
