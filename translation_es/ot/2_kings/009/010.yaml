translation:
  language: es
  text: Y los perros comerán a Jezabel en el territorio[a] de Jezreel, y no habrá quien la sepulte. Entonces abrió la puerta y huyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porción» o «parcela» de Jezreel. El hebreo חֵלֶק puede referirse a una extensión o porción de tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאכְלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - devorarán
  - comerán de
  lexicon: HALOT
  rationale: אכל expresa aquí comer en sentido de juicio profético. En español, 'comerán' conserva la fuerza directa y el futuro de la predicción sin intensificar indebidamente a 'devorarán'.
- source_word: הַכְּלָבִים
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - perros
  lexicon: HALOT
  rationale: El artículo definido está en el hebreo y se conserva con 'los perros' para mantener la especificidad del juicio anunciado.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  english_pob_choice: in the territory of Jezreel
  chosen_spanish: en el territorio[a] de Jezreel
  alternatives_spanish:
  - en la porción de Jezreel
  - en el terreno de Jezreel
  - en el lote de Jezreel
  lexicon: HALOT
  rationale: חֵלֶק puede referirse a porción, parcela o porción de tierra. 'Territorio' comunica de modo natural una extensión de tierra sin restringirla a una parcela pequeña; se mantiene la nota para preservar la alternativa léxica.
- source_word: וְאֵין קֹבֵר
  english_pob_choice: and there will be no one to bury her
  chosen_spanish: y no habrá quien la sepulte
  alternatives_spanish:
  - y nadie la sepultará
  - y no habrá sepulturero para ella
  - y no habrá quien la entierre
  lexicon: HALOT
  rationale: El hebreo es literalmente 'y no hay sepultador'. En español, 'no habrá quien la sepulte' conserva el sentido impersonal y el futuro profético, con un verbo más digno y preciso que 'entierre' en este contexto.
- source_word: וַיִּפְתַּח הַדֶּלֶת
  english_pob_choice: Then he opened the door
  chosen_spanish: Entonces él abrió la puerta
  alternatives_spanish:
  - Y él abrió la puerta
  - Entonces abrió la puerta
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; 'Entonces' reproduce la secuencia. Se explicita 'él' para claridad natural en español, ya que el referente es inmediato en el contexto.
- source_word: וַיָּנֹס
  english_pob_choice: and fled
  chosen_spanish: y huyó
  alternatives_spanish:
  - y escapó
  - y corrió a huir
  lexicon: HALOT
  rationale: נוס significa huir/fugarse. 'Huyó' mantiene la tersura y urgencia del hebreo sin añadir matiz coloquial.
- source_word: אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  alternatives_spanish:
  - Jezebel
  lexicon: transliteration policy
  rationale: El nombre propio se adapta a la forma habitual en español bíblico, 'Jezabel', que es transparente y reconocible para lectores en español.
theological_decisions:
- issue: La frase de juicio contra Jezabel incluye un lugar de sepultura implícitamente negado por el oráculo.
  english_pob_reading: and there will be no one to bury her
  chosen_spanish_reading: y no habrá quien la sepulte
  alternative_spanish_readings:
  - y nadie la sepultará
  - y no habrá quien la entierre
  rationale: No se suaviza la negación del entierro; se conserva el carácter de juicio y deshonra pública. 'Sepulte' respeta mejor el registro bíblico y funerario del pasaje que una formulación más coloquial.
  doctrine_reference: Juicio divino y deshonra del enemigo en el lenguaje profético del AT
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el antecedente inglés auditado; la única tensión principal es חֵלֶק, donde el inglés eligió 'territory' y la nota admite 'plot/portion.' En español se optó por 'territorio' para fluidez natural, conservando la ambigüedad léxica en nota. No se detectan revisiones sustantivas pendientes respecto del texto fuente WLC y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene la transliteración española estándar 'Jezabel' y 'Jezreel'.
  - Se conserva el futuro profético con 'comerán' y 'habrá' para reflejar el anuncio.
  - '''Sepulte'' se usa por registro bíblico y funerario, sin introducir términos eclesiásticos ajenos al hebreo.'
  - La nota al pie se ancla en 'territorio' para reflejar la alternativa de חֵלֶק sin duplicar sentidos en el cuerpo del texto.
