translation:
  language: es
  text: Y al frente de la compañía[a] de la tribu de los hijos de Zebulón estaba Eliab hijo de Helón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hueste» o «división» para «compañía»; צְבָא designa aquí un contingente tribal organizado en orden de marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Sobre
  - Y encima de
  lexicon: HALOT
  rationale: El hebreo introduce otra entrada del orden de marcha con sentido de supervisión/posición. «Y sobre» conserva la coordinación del listado y la idea de autoridad o encabezamiento sin volver la frase pesada en español.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - hueste
  - host
  - división
  lexicon: HALOT
  rationale: En este contexto de marcha tribal organizada, צְבָא no es simplemente un ejército abstracto. «Compañía» comunica un contingente ordenado de manera natural en español y mantiene la decisión del inglés de no exagerar el matiz militar.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: Aquí מַטֵּה designa la unidad tribal, no el objeto físico. «Tribu» es el equivalente directo y claro en español.
- source_word: בְּנֵי זְבוּלֻן
  english_pob_choice: the sons of Zebulun
  chosen_spanish: los hijos de Zebulón
  alternatives_spanish:
  - los descendientes de Zebulón
  - la gente de Zebulón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Zebulón». Se conserva la filiación masculina explícita del texto, que en las fórmulas tribales refiere a los miembros/descendientes de esa tribu.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  lexicon: conventional transliteration
  rationale: Nombre propio transliterado de manera estándar, sin adaptación innecesaria.
- source_word: בֶּן חֵלֹן
  english_pob_choice: son of Helon
  chosen_spanish: hijo de Helón
  alternatives_spanish:
  - descendiente de Helón
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se reproduce de forma directa. «Hijo de Helón» es natural en español y mantiene la relación genealógica precisa.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; no se detectaron cambios textuales adicionales en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Zebulón» con la forma española estándar del nombre propio.
  - Se evitó «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el Tetragrámaton ni un título divino.
  - La puntuación reproduce una sola cláusula nominativa fluida y publicable en español.
  - La nota al pie marca la ambigüedad léxica principal de צְבָא, como en el audit trail inglés.
