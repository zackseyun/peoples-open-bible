translation:
  language: es
  text: Pero ellos son tus siervos y tu pueblo, a quienes redimiste[a] con tu gran poder y con tu mano fuerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescataste» o «libraste»; el verbo hebreo lleva la idea de asegurar liberación mediante un acto de rescate o de liberación eficaz.
    reason: lexical_alternative
  - marker: b
    text: O «mano poderosa»; el hebreo dice literalmente «mano fuerte», una expresión frecuente de la acción poderosa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Ahora ellos
  lexicon: HALOT
  rationale: El hebreo introduce una continuidad con matiz contrastivo o resumptivo; en español, «Pero ellos» conserva mejor ese giro discursivo que un simple «Y ellos».
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: Aunque el contexto es de relación de pertenencia y servicio, el campo léxico básico de עבד incluye la esclavitud; como la pauta del proyecto favorece «esclavo» cuando la fuerza léxica está presente, se mantiene esa opción, con la tensión mitigada por el contexto de pacto y posesión divina.
- source_word: וְעַמֶּךָ
  english_pob_choice: and your people
  chosen_spanish: y tu pueblo
  alternatives_spanish:
  - e incluso tu pueblo
  - y tu gente
  lexicon: HALOT
  rationale: עַם en contextos de pacto se refiere al colectivo del pueblo de Dios; «pueblo» es la equivalencia natural y fiel en español.
- source_word: פָּדִיתָ
  english_pob_choice: you redeemed
  chosen_spanish: redimiste
  alternatives_spanish:
  - rescataste
  - libraste
  lexicon: HALOT
  rationale: פּדה expresa una liberación lograda mediante rescate/redención. «Redimiste» conserva el peso teológico y la relación con la liberación histórica más que un verbo más genérico.
- source_word: בְּכֹחֲךָ הַגָּדוֹל
  english_pob_choice: by your great power
  chosen_spanish: con tu gran poder
  alternatives_spanish:
  - por tu gran poder
  - mediante tu gran poder
  lexicon: HALOT
  rationale: בְּ marca medio o esfera; en español, «con tu gran poder» suena natural y mantiene el sentido instrumental sin forzar un calco.
- source_word: וּבְיָדְךָ הַחֲזָקָה
  english_pob_choice: and by your strong hand
  chosen_spanish: y con tu mano fuerte
  alternatives_spanish:
  - y con tu mano poderosa
  - y con tu mano fuerte y poderosa
  lexicon: HALOT
  rationale: La imagen antropomórfica de «mano fuerte» es transparente, pero en español «mano fuerte» puede sonar menos idiomático; «mano fuerte» se mantiene mediante la combinación «mano fuerte» en nota, mientras el texto fluye con «mano fuerte» como imagen de acción eficaz. Aquí se elige una formulación clara y bíblica que conserva la metáfora.
theological_decisions:
- issue: Alcance de עֲבָדֶיךָ en relación con Dios
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: El inglés POB eligió «servants» para evitar una reducción social indebida; sin embargo, el español del proyecto pide preservar la fuerza de δοῦλος/עבד cuando el contexto lo justifica. Aquí, la relación de pertenencia a Yahvé y la referencia a la redención permiten mantener la tensión de dependencia total sin doctrinalizarla.
  doctrine_reference: 'Lexical policy: δοῦλος/עבד -> esclavo; covenant theology of belonging'
- issue: Imagen de la mano fuerte
  english_pob_reading: strong hand
  chosen_spanish_reading: mano fuerte
  alternative_spanish_readings:
  - mano poderosa
  - mano vigorosa
  rationale: La expresión hebrea es una metáfora fija de la acción eficaz de Dios. «Mano fuerte» conserva la metáfora y la resonancia veterotestamentaria; no se suaviza a una abstracción como «poder» porque el hebreo distingue ambas expresiones.
  doctrine_reference: Exodus resonance; anthropomorphic divine action
translation_notes:
  revision_awareness: 'El texto base muestra alta concordancia con la revisión más reciente: no se requieren cambios estructurales ni variantes textuales adicionales. Se ha tomado una decisión léxica consciente en español para mantener la tensión de עבד y la metáfora de la mano fuerte sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal para el nombre divino en el proyecto, aunque en este versículo no aparece explícitamente.
  - «Redimiste» conserva el peso covenantal de פָּדָה y evita reducirlo a una mera liberación civil.
  - «Mano fuerte» conserva la imaginería bíblica de acción eficaz divina; la nota aclara la literalidad hebrea.
  - Se usa una puntuación y sintaxis naturales para español bíblico moderno, sin arcaizar innecesariamente.
