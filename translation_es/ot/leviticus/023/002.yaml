revisions:
- from: 'Habla a los hijos de Israel y diles: Las fiestas señaladas[a] de Yahvé[b], las cuales proclamaréis como convocaciones santas[c]—estas son mis fiestas señaladas.'
  to: 'Habla a los hijos de Israel y diles: Los tiempos señalados[a] de Yahvé, que proclamaréis como convocaciones santas[b]—estos son mis tiempos señalados.'
  rationale: Se reemplazó «fiestas señaladas» por «tiempos señalados» en ambas ocurrencias para reflejar con mayor precisión מוֹעֵד como categoría amplia de ocasiones designadas, en línea con la evidencia contextual y el expediente inglés. Se eliminó la nota redundante sobre «Yahvé». Se mantuvo «los hijos de Israel» y la estructura final enfática. También se simplificó «las cuales» a «que» para un español más natural sin pérdida de sentido.
  reviewer_model: gpt-5.4
