translation:
  language: ko
  text: 보십시오, 나 바울은 여러분에게 말합니다. 여러분이 할례를 받는다면, 메시아는 여러분에게 아무런 유익도 주지 못할 것입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 바울의 강한 단언적 책망. 「유익이 없을 것이다」를 약화시키지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν ὠφελήσει
  english_pob_choice: will benefit you nothing
  chosen_korean: 아무런 유익도 주지 못할 것이다
  alternatives_korean:
  - 아무런 도움도 되지 않을 것이다
  lexicon: BDAG
  rationale: 북극성 원칙에 따라 바울의 단호한 책망을 약화시키지 않는다. 「유익이 없을 것이다」의 부정적 단언을 보존.
theological_decisions:
- issue: Χριστὸς … οὐδὲν ὠφελήσει의 단호함 보존
  chosen_reading: 아무런 유익도 주지 못할 것이다
  alternative_readings:
  - 메시아가 여러분에게 별로 유익이 없을 것이다
  - 메시아의 효력이 없게 될 것이다
  rationale: 바울이 할례를 통한 의(義) 추구가 메시아 사역 전체를 무화시킨다는 강한 주장을 펼치는 곳이다. 한국 전통의 부드러운 옮김은 그 충격을 약화시킨다.
  doctrine_reference: KOREAN_PIPELINE.md north-star
