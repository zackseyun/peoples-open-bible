translation:
  language: es
  text: Mejor es un trozo de pan seco con paz que una casa llena de banquetes sacrificiales[a] con discordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios»; el hebreo puede referirse tanto a sacrificios como a comidas sacrificiales o, más generalmente, a abundante comida asociada con el sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: La fórmula proverbial comparativa se expresa de manera natural en español con «Mejor es… que…», conservando la estructura sentenciosa del hebreo y el valor evaluativo del original.
- source_word: פַּת
  english_pob_choice: crust
  chosen_spanish: trozo de pan
  alternatives_spanish:
  - miga de pan
  - pedazo de pan
  - costra de pan
  lexicon: HALOT
  rationale: פַּת denota una porción pequeña de pan; «trozo de pan» mantiene la idea de alimento mínimo sin forzar una imagen demasiado idiomática en español. Se evita «costra» por sonar más específico que el hebreo y menos natural en este proverbio.
- source_word: חֲרֵבָה
  english_pob_choice: dry
  chosen_spanish: seco
  alternatives_spanish:
  - reseco
  - árido
  - tostado
  lexicon: HALOT
  rationale: La cualidad física del pan es sequedad. «Seco» es la correspondencia directa y clara en español, sin añadir matices de deterioro que el hebreo no exige.
- source_word: וְשַׁלְוָה בָהּ
  english_pob_choice: with peace
  chosen_spanish: con paz
  alternatives_spanish:
  - y tranquilidad
  - con quietud
  - con serenidad
  lexicon: HALOT
  rationale: שַׁלְוָה expresa quietud, bienestar y ausencia de conflicto. «Con paz» comunica bien el contraste con «pleito» en el segundo colon y funciona de forma natural como acompañamiento del pan. Se omite un pronombre explícito porque el español no lo necesita para preservar el sentido.
- source_word: מִבַּיִת
  english_pob_choice: than a house
  chosen_spanish: que una casa
  alternatives_spanish:
  - que un hogar
  - que una familia
  - que una casa de
  lexicon: HALOT
  rationale: El comparativo hebreo se rinde con «que»; «casa» conserva la imagen concreta del hogar físico. No se abstrae a «hogar» para mantener el contraste material del proverbio.
- source_word: מָלֵא
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - repleta de
  - colmada de
  lexicon: HALOT
  rationale: «Llena de» reproduce el predicado de plenitud con sencillez y fidelidad al paralelismo.
- source_word: זִבְחֵי
  english_pob_choice: sacrificial feasts
  chosen_spanish: sacrificios
  alternatives_spanish:
  - banquetes sacrificiales
  - fiestas de sacrificio
  - ofrendas
  lexicon: HALOT
  rationale: El hebreo puede referirse tanto a sacrificios como al alimento/banquete asociado. En español, «sacrificios» conserva el campo cultual sin introducir una expresión demasiado interpretativa; la nota registra la alternativa de sentido que el texto permite.
- source_word: רִיב
  english_pob_choice: strife
  chosen_spanish: pleito
  alternatives_spanish:
  - contienda
  - discordia
  - riña
  lexicon: HALOT
  rationale: רִיב expresa disputa, contienda o conflicto verbal/legal. «Pleito» es un equivalente vivo en español que mantiene la fuerza de conflicto interpersonal y contrasta bien con «paz».
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al omitir cualquier equivalente explícito de «en ello»/«en it», porque el hebreo solo contrapone un pan seco acompañado de paz con una casa llena de sacrificios acompañados de pleito. También se reflejó la nota auditada sobre זִבְחֵי, preservando en español la ambigüedad entre sacrificios y banquetes sacrificiales mediante una nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se prefirió un registro proverbial, breve y publicable, sin añadir elementos no presentes en el hebreo.
  - «Paz» se usó como equivalente de שַׁלְוָה por el contraste semántico con «pleito», sin perder la idea de quietud/bienestar.
  - La nota de sacrificios conserva la tensión lexical documentada en el audit trail en lugar de resolverla de forma interpretativa.
