  text: But if they confess their iniquity and the iniquity of their fathers[a], in the unfaithfulness by which they were unfaithful to me, and also that they walked contrary to me[b],
  footnotes:
  - marker: a
    text: 'Or ''their trespass'' / ''their treachery'' for ''the unfaithfulness.'' The Hebrew uses cognate forms to stress covenant breach: ''in their unfaithfulness by which they were unfaithful to me.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'walked in hostility toward me.' The Hebrew phrase 'walked with me in qeri' uses a difficult term repeated in this chapter for oppositional or hostile conduct.
    reason: lexical_alternative
