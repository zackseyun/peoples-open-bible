base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/027.yaml
  text: And Joshua said to all the people[a], “Look, this stone will be a witness against us, for it has heard all the words of Yahweh that he spoke with us. And it will be a witness against you[c][b], lest you deny your God.”
  footnotes:
  - marker: a
    text: Or 'a witness for us' / 'to us'; the Hebrew preposition can be taken more neutrally, but in context the sense is that the stone stands as testimony against covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has heard'—the stone is personified as a witness to the covenant words.
    reason: cultural_note
  - marker: c
    text: Or 'deal falsely with your God' or 'prove false to your God.'
    reason: lexical_alternative
