- from: Después de la muerte de Hezrón en Caleb-efrata[a], la esposa de Hezrón, Abías, le dio a luz a Ashhur[b], padre de Tecoa.
  to: Después de que murió Hezrón en Caleb-Efrata[b], la esposa de Hezrón, Abías, le dio un hijo, Ashhur, padre[a] de Tecoa.
  rationale: Se corrigieron los marcadores de nota para que correspondan al lugar correcto en el texto. Se mejoró la naturalidad de וַתֵּלֶד לוֹ con 'le dio un hijo' sin perder la relación dativa. También se ajustó la formulación temporal a una forma más directa y se normalizó 'Caleb-Efrata' como nombre propio compuesto.
