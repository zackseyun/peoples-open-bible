id: COL.1.29
reference: Colossians 1:29
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς ὃ καὶ κοπιῶ ἀγωνιζόμενος κατὰ τὴν ἐνέργειαν αὐτοῦ τὴν ἐνεργουμένην ἐν ἐμοὶ ἐν δυνάμει.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/029.yaml
  text: For this I also labor, striving according to his working, which is working in me in power.
translation:
  language: ko
  text: 이를 위하여 나도 그분의 역사하심[a]을 따라 수고하며 싸우고 있으니, 그 역사하심이 내 안에서 능력으로 일하고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「그분의」는 본문에서 지시 대상(하나님 또는 메시아)을 명시하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: For this
  chosen_korean: 이를 위하여
  alternatives_korean:
  - 이것을 위해서
  - 이 일을 위하여
  lexicon: BDAG
  rationale: 앞 절의 사역 목적을 받는 관계 구문. 「이를 위하여」가 한국어에서 자연스럽다.
- source_word: καὶ κοπιῶ
  english_pob_choice: I also labor
  chosen_korean: 나도 ... 수고하며
  alternatives_korean:
  - 나 또한 ... 수고하고
  - 나도 ... 애쓰고
  lexicon: BDAG
  rationale: κοπιάω의 「지치도록 일함」을 「수고하며」로 옮긴다.
- source_word: ἀγωνιζόμενος
  english_pob_choice: striving
  chosen_korean: 싸우고 있으니
  alternatives_korean:
  - 분투하며
  - 힘써 다투며
  lexicon: BDAG
  rationale: 경기·전쟁의 어감을 가진 ἀγωνίζομαι를 「싸우고 있으니」로 옮긴다.
- source_word: κατὰ τὴν ἐνέργειαν αὐτοῦ
  english_pob_choice: according to his working
  chosen_korean: 그분의 역사하심을 따라
  alternatives_korean:
  - 그분의 일하심을 따라
  - 그분의 작용을 따라
  lexicon: BDAG
  rationale: ἐνέργεια는 「작용·역사」를 가리킨다. 한국 교회의 정립된 「역사하심」을 사용한다.
- source_word: τὴν ἐνεργουμένην ἐν ἐμοὶ
  english_pob_choice: which is working in me
  chosen_korean: 그 역사하심이 내 안에서 ... 일하고 있습니다
  alternatives_korean:
  - 내 안에서 작용하는
  lexicon: BDAG
  rationale: 현재 중간/수동 분사. 한국어 자연성을 위해 별도 절로 풀어 「~이 ... 일하고 있습니다」로 옮긴다.
- source_word: ἐν δυνάμει
  english_pob_choice: in power
  chosen_korean: 능력으로
  alternatives_korean:
  - 권능으로
  - 강력하게
  lexicon: BDAG
  rationale: 방식·수단의 ἐν을 「~로」로 옮긴다. δύναμις의 명사적 무게를 보존한다.
