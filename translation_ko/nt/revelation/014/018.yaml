  yaml_path: translation/nt/revelation/014/018.yaml
  text: And another angel came out from the altar[a], the one who has authority over the fire, and he called out with a loud voice to the one who had the sharp sickle, saying, “Send out your sharp sickle and gather the clusters of the vine of the earth[b], because its grapes are ripe.”
  footnotes:
  - marker: a
    text: Or 'Put in your sharp sickle.' The Greek verb is literally 'send,' but in harvest imagery some render it idiomatically as 'put in.'
    reason: lexical_alternative
  - marker: b
    text: '''The vine of the earth'' is an apocalyptic image; the text does not explicitly identify the referent here, though the surrounding context is one of judgment.'
    reason: cross_reference
