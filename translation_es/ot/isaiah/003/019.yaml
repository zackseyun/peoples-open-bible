translation:
  language: es
  text: los colgantes[a], los brazaletes y los velos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aretes» o «pendientes»; el tipo exacto de adorno indicado por el término hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּטִיפוֹת
  english_pob_choice: the pendants
  chosen_spanish: los colgantes
  alternatives_spanish:
  - los pendientes
  - las gotas
  lexicon: HALOT
  rationale: El hebreo apunta a un adorno colgante, probablemente una pieza de joyería colgante o en forma de gota. «Colgantes» conserva el rasgo concreto de ornamento suspendido sin concretar indebidamente si eran aretes, piezas colgadas o aderezos similares. «Pendientes» sería posible, pero puede sugerir específicamente aretes; «gotas» resulta menos natural en español.
- source_word: הַשֵּׁירוֹת
  english_pob_choice: the armlets
  chosen_spanish: los brazaletes
  alternatives_spanish:
  - los brazaletes del brazo
  - los aros del brazo
  - los anillos
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «armlets» para precisar que se trata de adorno del brazo. En español, «brazaletes» comunica de forma natural un adorno de brazo y mantiene la función ornamental sin forzar una equivalencia demasiado técnica. Otras opciones son más pesadas o menos idiomáticas.
- source_word: הָרְעָלוֹת
  english_pob_choice: the veils
  chosen_spanish: los velos
  alternatives_spanish:
  - los pañuelos
  - los mantos
  lexicon: HALOT
  rationale: El término designa una cobertura o velo. «Velos» es la traducción más directa y reconocible en este catálogo de adornos femeninos. «Pañuelos» y «mantos» son posibles, pero no son tan precisos en este contexto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «bracelets» a «armlets» para mayor precisión léxica; la versión española refleja esa intención mediante «brazaletes», que mantiene el rasgo de adorno del brazo sin introducir una especificación no sustentada por el hebreo. Se conservó la enumeración simple de tres objetos de adorno, acorde con el texto fuente y la alta coincidencia del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo el artículo definido plural en la lista, como en el inglés POB, para reflejar una enumeración concreta de objetos.
  - No se añadió ningún matiz interpretativo sobre la función moral del pasaje, ya que este versículo es una lista nominal de adornos.
  - «Colgantes» se eligió para respetar la ambigüedad del hebreo sin reducirlo a una única clase de joya.
  - La nota al pie preserva la incertidumbre léxica documentada en el inglés auditado.
