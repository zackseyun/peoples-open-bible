lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula introduce un giro temporal y contrastivo; «Y ahora» conserva el flujo y el contraste sin añadir una oposición más fuerte de la que exige el hebreo.
- source_word: נְגִינָתָם
  english_pob_choice: their song
  chosen_spanish: su canto
  alternatives_spanish:
  - su canción burlona
  - su canto burlón
  - su música
  lexicon: HALOT
  rationale: El hebreo designa un canto o pieza musical, pero en contexto Job habla de su humillación pública. «Su canto» mantiene la literalidad básica y deja que la nota explique el matiz despectivo posible.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - he sido
  - llegué a ser
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado presente resultante de un cambio previo. «He llegado a ser» comunica bien ese resultado sin perder el matiz de transformación.
- source_word: וָאֱהִי
  english_pob_choice: and I am
  chosen_spanish: soy
  alternatives_spanish:
  - y he llegado a ser
  - y era
  lexicon: HALOT
  rationale: La forma con waw continúa la descripción del estado actual de Job. En español, el presente copulativo resulta natural y fiel al efecto discursivo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - en su opinión
  lexicon: HALOT
  rationale: La relación dativa en este contexto expresa la consideración que ellos tienen de Job; «para ellos» funciona con naturalidad con la expresión siguiente.
- source_word: לְמִלָּה
  english_pob_choice: a byword
  chosen_spanish: un refrán
  alternatives_spanish:
  - un proverbio
  - un dicho
  - un objeto de conversación
  lexicon: HALOT
  rationale: La palabra hebrea apunta a algo dicho sobre alguien, con fuerza proverbial o de comentario humillante. «Refrán» conserva la idea de dicho circulante; la nota preserva las alternativas «proverbio» y «objeto de conversación» con el matiz de desprecio.
translation_notes:
  revision_awareness: 'El pasaje coincide altamente con el audit trail inglés: se conserva la secuencia temporal «Y ahora», el paralelo de humillación pública y el valor proverbial de לְמִלָּה. Se evitó traducir mecánicamente «byword» por un calco poco natural; en español se optó por «refrán» con nota de alternativas para mantener la amplitud semántica del hebreo y la tensión despectiva documentada.'
  spanish_consistency_notes:
  - Se mantuvo «Y ahora» para reflejar el giro adversativo-temporal sin sobretraducirlo como «Pero ahora».
  - Se evitó «Cristo»/terminología teológica no pertinente; el versículo no presenta decisiones doctrinales.
  - «Su canto» y «un refrán» conservan la literalidad básica, mientras que las notas permiten recuperar el matiz burlón/proverbial del contexto.
  - Se eligió el presente en la segunda cola («soy») para reproducir el estado actual descrito por el hebreo y por la traducción inglesa auditada.
