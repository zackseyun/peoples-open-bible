translation:
  language: es
  text: 'Y del sacrificio de las ofrendas de paz[a] presentará una ofrenda quemada por fuego a Yahvé: su grasa, toda la cola grasa[b], la quitará junto a la espina dorsal[c], y la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «sacrificio de ofrendas de comunión» o «sacrificio de ofrendas de bienestar».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda la cola grasa»; se refiere a la cola grasa de una oveja ofrecida en sacrificio.'
    reason: cultural_note
  - marker: c
    text: O «frente a la espina dorsal» o «en la base de la columna».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: sacrifice of peace offerings
  chosen_spanish: sacrificio de las ofrendas de paz
  alternatives_spanish:
  - sacrificio de ofrendas de comunión
  - sacrificio de ofrendas de bienestar
  lexicon: HALOT
  rationale: שְׁלָמִים es el término sacrificial estándar. En español, «ofrendas de paz» conserva la tradición terminológica bíblica y refleja la opción inglesa sin perder la referencia al sistema sacrificial.
- source_word: אִשֶּׁה
  english_pob_choice: an offering made by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda para el fuego
  lexicon: HALOT
  rationale: El término designa una ofrenda presentada sobre el altar mediante fuego. «Ofrenda encendida» comunica el sentido ritual de forma natural en español y evita una expresión demasiado mecánica.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por una forma de ocultamiento como «SEÑOR».
- source_word: חֶלְבּוֹ
  english_pob_choice: its fat
  chosen_spanish: su grasa
  alternatives_spanish:
  - su sebo
  - su gordura
  lexicon: HALOT
  rationale: En este contexto sacrificial, חֵלֶב se refiere a la grasa destinada a la ofrenda. «Grasa» es claro y natural en español.
- source_word: הָאַלְיָה תְמִימָה
  english_pob_choice: the whole fat tail
  chosen_spanish: la cola gorda entera
  alternatives_spanish:
  - la cola grasa entera
  - la entera cola grasa
  lexicon: HALOT
  rationale: אַלְיָה es la cola grasa de la oveja. «Cola gorda entera» intenta conservar la concreción zoológica del hebreo; «gorda» refleja el carácter adiposo del término y «entera» traduce תְמִימָה como intacta/completa.
- source_word: לְעֻמַּת הֶעָצֶה
  english_pob_choice: close to the backbone
  chosen_spanish: junto a la espina dorsal
  alternatives_spanish:
  - frente a la espina dorsal
  - al lado de la espina dorsal
  - cerca de la espina dorsal
  lexicon: HALOT
  rationale: La frase indica el punto de extracción en relación con la columna/espina. «Junto a la espina dorsal» comunica bien el valor anatómico práctico en español.
- source_word: יְסִירֶנָּה
  english_pob_choice: which he shall remove
  chosen_spanish: la quitará
  alternatives_spanish:
  - la removerá
  - la apartará
  - la eliminará
  lexicon: HALOT
  rationale: El verbo en este contexto significa retirar/quitar. En español, «la quitará» es natural y mantiene la acción concreta sin añadir matices no presentes.
- source_word: הַחֵלֶב הַמְכַסֶּה אֶת הַקֶּרֶב
  english_pob_choice: the fat that covers the entrails
  chosen_spanish: la grasa que cubre las entrañas
  alternatives_spanish:
  - la grasa que cubre los intestinos
  - la grasa que cubre el interior
  lexicon: HALOT
  rationale: קֶרֶב en este contexto anatómico se refiere a las vísceras/entrañas. «Entrañas» es una equivalencia bíblica natural y suficientemente concreta en español.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: all the fat that is on the entrails
  chosen_spanish: toda la grasa que está sobre las entrañas
  alternatives_spanish:
  - toda la grasa que hay sobre las entrañas
  - toda la grasa que está encima de las entrañas
  lexicon: HALOT
  rationale: Se preserva la distinción entre la grasa que cubre las entrañas y la grasa que está sobre ellas. «Sobre las entrañas» reproduce bien la relación espacial del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre divino en español como «Yahvé» para mantener la transparencia textual y la continuidad con la decisión confesional del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sacrificial terminology for שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se suaviza el término sacrificial. «Ofrendas de paz» preserva la tradición bíblica y deja visible la categoría cultual sin reemplazarla por una paráfrasis explicativa.
  doctrine_reference: Terminología sacrificial del Pentateuco
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado inglés con acuerdo alto y no introduce cambios sustantivos respecto del audit trail. Se conserva la estructura del versículo, la distinción entre la grasa que cubre las entrañas y la grasa sobre las entrañas, y la referencia anatómica de לְעֻמַּת הֶעָצֶה con una solución española clara.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «ofrendas de paz» como término sacrificial estable.
  - Se traduce חֵלֶב de forma consistente como «grasa».
  - Se usa «entrañas» para קֶרֶב por coherencia con el registro bíblico y la anatomía sacrificial.
  - La cola grasa de la oveja se explica en nota para evitar pérdida cultural o zoológica.
