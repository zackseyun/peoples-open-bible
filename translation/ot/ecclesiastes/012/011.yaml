theological_decisions:
- issue: Identity of 'one shepherd'
  chosen_reading: left ambiguous in the main text as 'one shepherd'
  alternative_readings:
  - God as the ultimate source of wisdom
  - Solomon/Koheleth as a singular teacher
  - a generalized metaphor for a unified source of wise instruction
  rationale: The phrase can be read theologically as referring to God, but the verse itself does not explicitly identify the shepherd. To preserve theological tension and avoid importing a doctrinal claim beyond the text, the translation keeps the expression literal and uncapitalized.
  doctrine_reference: Preserve theological tension rather than resolve it.
