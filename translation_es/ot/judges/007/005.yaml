translation:
  language: es
  text: 'Entonces hizo bajar al pueblo al agua, y Yahvé dijo a Gedeón: «Todo el que lama del agua con su lengua, como lame un perro, lo colocarás aparte[a]; igualmente, todo el que se arrodille para beber».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «lo pondrás aparte»; el verbo puede significar colocar o disponer a alguien separadamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹרֶד
  english_pob_choice: brought ... down
  chosen_spanish: hizo bajar
  alternatives_spanish:
  - bajó
  - condujo hacia abajo
  lexicon: HALOT
  rationale: El hifil de ירד es causativo; en español, «hizo bajar» conserva esa causación de manera natural y fiel.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: HALOT
  rationale: עם puede referirse al colectivo del pueblo; «el pueblo» mantiene ese valor general sin restringirlo innecesariamente a una unidad militar.
- source_word: הַמָּיִם
  english_pob_choice: the water
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - el agua del arroyo
  lexicon: HALOT
  rationale: Aunque מים suele funcionar como sustantivo colectivo, en español «las aguas» conserva mejor la forma plural del hebreo y el escenario concreto del relato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del Nombre divino con la transliteración tradicional del proyecto en español, sin sustituirlo por un título.
- source_word: כֹּל אֲשֶׁר יָלֹק
  english_pob_choice: Everyone who laps
  chosen_spanish: Todo el que lama
  alternatives_spanish:
  - Cada uno que lama
  - Todo el que lape
  lexicon: HALOT
  rationale: La construcción distributiva se refleja bien con «Todo el que». El verbo «lamer» conserva la imagen concreta del original.
- source_word: בִּלְשׁוֹנוֹ
  english_pob_choice: with his tongue
  chosen_spanish: con su lengua
  alternatives_spanish:
  - con la lengua
  lexicon: HALOT
  rationale: El sufijo masculino singular se expresa naturalmente en español con «su lengua», manteniendo la concreción física.
- source_word: מִן הַמַּיִם
  english_pob_choice: the water
  chosen_spanish: del agua
  alternatives_spanish:
  - de las aguas
  - desde el agua
  lexicon: HALOT
  rationale: La partícula מן con verbo de beber admite un sentido partitivo; «del agua» es la forma más natural en español y evita agregar contenido no explicitado.
- source_word: כַּאֲשֶׁר יָלֹק הַכֶּלֶב
  english_pob_choice: as a dog laps
  chosen_spanish: como lame el perro
  alternatives_spanish:
  - como lame un perro
  - tal como lame el perro
  lexicon: HALOT
  rationale: El símil se conserva de forma directa. El artículo definido refleja bien la construcción comparativa del hebreo, aunque en español «un perro» también sería posible.
- source_word: תַּצִּיג אוֹת/וֹ לְבָד
  english_pob_choice: you shall set apart by himself
  chosen_spanish: lo colocarás aparte
  alternatives_spanish:
  - lo pondrás aparte
  - lo separarás
  lexicon: HALOT
  rationale: יצג puede significar colocar o poner en posición; aquí el contexto exige separación. «Colocarlo aparte» preserva la acción de apartar sin exagerar con una paráfrasis más interpretativa.
- source_word: וְכֹל אֲשֶׁר יִכְרַע עַל בִּרְכָּיו לִשְׁתּוֹת
  english_pob_choice: likewise everyone who kneels on his knees to drink
  chosen_spanish: y todo el que se incline sobre sus rodillas para beber
  alternatives_spanish:
  - y todo el que arrodille para beber
  - y todo el que se arrodille para beber
  lexicon: HALOT
  rationale: כרע expresa doblar o inclinar las rodillas; «se incline sobre sus rodillas» mantiene el gesto corporal sin introducir el reflexivo pleno «se arrodille», que puede sonar más idiomático pero menos pegado a la imagen hebrea.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino conforme al estándar del proyecto en español y se evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés. Se integró la decisión revisionada de no añadir ninguna partícula equivalente a «some of»; por eso la frase quedó como «del agua». También se mantuvo la separación marcada por el verbo final sin sobreinterpretar el alcance del comando.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el valor del Tetragrama en el proyecto.
  - Se optó por «el pueblo» para העם y «las aguas» para mantener el registro bíblico sin arcaísmo excesivo.
  - La nota[a] está anclada en el verbo «colocarás aparte» para reflejar la alternativa lexical documentada.
  - Se preserva el paralelismo de las dos clases descritas en el verso mediante «Todo el que... y todo el que...».
