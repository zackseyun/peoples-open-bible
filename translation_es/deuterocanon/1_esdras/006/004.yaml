translation:
  language: es
  text: ¿Por mandato de quién están edificando esta casa[a] y terminando este techo y todo lo demás? ¿Y quiénes son los constructores que realizan estas cosas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Casa'' aquí se refiere al templo; la traducción conserva el término ordinario del griego en lugar de sustituirlo por la glosa interpretativa ''templo''.'
    reason: cultural_note
lexical_decisions:
- source_word: Τίνος
  english_pob_choice: At whose command
  chosen_spanish: ¿Por mandato de quién... ?
  alternatives_spanish:
  - ¿De quién... ?
  - ¿Bajo la orden de quién... ?
  lexicon: LSJ
  rationale: El genitivo interrogativo con el participio siguiente pregunta por la persona que autorizó la obra. En español, '¿por mandato de quién?' conserva la idea de autoridad/directriz con naturalidad y evita una mera pregunta posesiva.
- source_word: συντάξαντος
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - disposición
  - autorización
  lexicon: LSJ
  rationale: El participio aoristo de συντάσσω aquí expresa la instrucción u orden que está detrás de la acción. 'Mandato' refleja mejor el matiz de orden oficial que 'autorización' y suena más natural en español bíblico contemporáneo.
- source_word: οἰκοδομεῖτε
  english_pob_choice: are you building
  chosen_spanish: están edificando
  alternatives_spanish:
  - están construyendo
  - están levantando
  lexicon: LSJ
  rationale: El presente indica acción en curso; en español, el progresivo transmite bien el contexto de inspección. 'Edificar' conserva un registro digno y apto para una obra sagrada sin introducir 'reconstruir' que no está explícito en el griego.
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - edificio
  - templo
  lexicon: LSJ
  rationale: El griego dice literalmente 'casa'. Se mantiene el término ordinario para no sustituirlo por la glosa interpretativa 'templo', aunque el referente sea el templo.
- source_word: στέγην
  english_pob_choice: roof
  chosen_spanish: techo
  alternatives_spanish:
  - cubierta
  - techumbre
  lexicon: LSJ
  rationale: El sustantivo designa la cubierta o techo de una construcción. 'Techo' es la equivalencia más clara y natural en español.
- source_word: τἄλλα πάντα
  english_pob_choice: all the rest
  chosen_spanish: todo lo demás
  alternatives_spanish:
  - todo lo restante
  - las demás cosas
  lexicon: LSJ
  rationale: La frase compacta abarca el resto de los elementos de la obra. 'Todo lo demás' conserva amplitud y naturalidad sin precisar indebidamente.
- source_word: ἐπιτελεῖτε
  english_pob_choice: completing
  chosen_spanish: terminando
  alternatives_spanish:
  - completando
  - llevando a cabo
  - acabando
  lexicon: LSJ
  rationale: El verbo indica llevar algo a su culminación. 'Terminando' funciona bien en español para la obra en curso y mantiene el aspecto progresivo del contexto.
- source_word: οἰκοδόμοι
  english_pob_choice: builders
  chosen_spanish: los albañiles
  alternatives_spanish:
  - los constructores
  - los obreros de la obra
  - los edificadores
  lexicon: LSJ
  rationale: El término general para quienes trabajan en la construcción puede verterse como 'albañiles' para una obra edilicia concreta. En español, este vocablo resulta más preciso y natural que 'constructores' en un contexto de edificación material.
- source_word: τελοῦντες
  english_pob_choice: carrying out
  chosen_spanish: realizan
  alternatives_spanish:
  - llevan a cabo
  - ejecutan
  - cumplen
  lexicon: LSJ
  rationale: El participio señala a quienes están ejecutando el trabajo. 'Realizan' comunica acción efectiva y evita una repetición excesiva con 'terminando'.
theological_decisions:
- issue: οἶκον como 'casa' sin glosa interpretativa
  english_pob_reading: The translation keeps the ordinary Greek term rather than substituting the interpretive gloss 'temple.'
  chosen_spanish_reading: Se mantiene 'casa' en el texto principal, sin reemplazarlo por 'templo'.
  alternative_spanish_readings:
  - '''templo'''
  - '''casa del templo'''
  rationale: La evidencia griega emplea el término común οἶκον; el sentido contextual es el templo, pero la POB inglesa preserva el término ordinario para respetar la forma del original. En español conviene seguir esa misma estrategia y dejar la identificación contextual al lector.
  doctrine_reference: Fidelidad al léxico del texto fuente; principio de no sobreinterpretar el sustantivo ordinario.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada que prefería expresar συντάξαντος como una pregunta por el 'mandato' u orden detrás de la obra. La redacción española evita una glosa excesiva y mantiene la referencia al edificio como 'casa' según el griego, no como 'templo' en el cuerpo del texto.
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y digno, con preferencia por equivalencias directas del griego.
  - No se introduce 'templo' en el texto principal para respetar la decisión auditada de mantener οἶκον como 'house/casa'.
  - '''Techo'' traduce στέγην de forma natural y específica.'
  - La segunda pregunta usa 'albañiles' como equivalente funcional de οἰκοδόμοι en un contexto de obra concreta.
