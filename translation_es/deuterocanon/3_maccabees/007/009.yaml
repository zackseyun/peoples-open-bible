review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general de advertencia, la oposición entre hombre y Dios Altísimo, y la idea de retribución inevitable. Sin embargo, falla en varios puntos léxicos importantes: γινώσκετε es imperativo (''sepan/conozcan''), no indicativo ''saben''; κακοτεχνήσωμεν pide un matiz de tramar/maquinar mal, más fuerte que ''intentamos''; τὸ σύνολον está mal resuelto en ''en absoluto'', que en español suena antinatural y puede invertir el sentido; y las notas al pie están desancladas respecto a los marcadores en el texto.'
  spanish_quality_summary: 'El español es mayormente comprensible, pero presenta giros poco naturales o impropios para un registro bíblico claro: ''les causamos tristeza en absoluto'' no funciona idiomáticamente; ''Dios Altísimo'' es aceptable, aunque ''Dios, el Altísimo'' o ''el Dios Altísimo'' serían opciones más fluidas, pero no necesarias; ''¡Adiós!'' suena demasiado coloquial para una despedida epistolar solemne. Conviene reparar la sintaxis y elevar ligeramente el registro manteniendo naturalidad.'
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. 'Dios' y 'Altísimo' están bien. La decisión sobre δεσπόζοντα como 'gobierna/domina' es admisible; prefiero 'gobierna sobre todo poder' por claridad. Debe respetarse la nota inglesa sobre la despedida epistolar y la alternativa idiomática de τὸ σύνολον.
  issues:
  - severity: high
    issue: γινώσκετε fue traducido como indicativo ('saben') en vez de imperativo
    rationale: El griego es un imperativo plural que introduce una advertencia solemne. En español debe ser 'sepan' o 'entiendan', no 'saben'.
  - severity: high
    issue: τὸ σύνολον se tradujo como 'en absoluto'
    rationale: 'Esa expresión es antinatural aquí y puede sugerir negación en español. El sentido documentado es intensificador: ''de ningún modo'', ''en lo más mínimo'', ''de cualquier manera'' o ''en modo alguno'' según la construcción.'
  - severity: medium
    issue: κακοτεχνήσωμεν πονηρόν quedó debilitado en 'intentamos cualquier maldad'
    rationale: El verbo implica tramar, maquinar o urdir mal, no solo intentar. Conviene preservar el matiz deliberativo.
  - severity: medium
    issue: La nota [a] está anclada tras 'Dios Altísimo' pero explica 'el que domina/gobierna todo poder'
    rationale: Los marcadores y las notas no corresponden al lugar correcto. Toda nota debe anclarse exactamente en la frase que explica.
  - severity: medium
    issue: Falta nota para el intensificador idiomático tras 'causarles tristeza'
    rationale: El inglés preserva la alternativa léxica de la frase idiomática; en español también conviene mantenerla, dado que el giro requiere resolución interpretativa.
  - severity: low
    issue: '''¡Adiós!'' es demasiado coloquial'
    rationale: Aunque semánticamente posible, para una fórmula epistolar solemne es mejor 'Que estén bien' en texto con nota alternativa, o 'Saludos'/'Adiós' solo si se prioriza máxima idiomaticidad. Aquí conviene un cierre más digno.
