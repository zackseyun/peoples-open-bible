translation:
  language: es
  text: 'Así dice Yahvé, el Dios de Israel: Así dirán al rey de Judá, que los envió a mí para consultarme[a]: «He aquí, el ejército de Faraón, que salió para ayudarlos[b], ha regresado a su propia tierra, Egipto[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para buscarme» / «para inquirirme». El verbo hebreo puede denotar buscar o inquirir; aquí se refiere a pedir una respuesta divina por medio de Jeremías.
    reason: lexical_alternative
  - marker: b
    text: O «que sale para ayudarlos». El hebreo usa un participio; en español se vierte en pasado por la situación narrativa.
    reason: lexical_alternative
  - marker: c
    text: O «ha vuelto atrás a la tierra de Egipto» / «ha regresado a la tierra de Egipto». El hebreo puede expresar regreso o repliegue, y la frase final identifica esa tierra como Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en transliteración, conforme a la línea POB de no sustituirlo por un título. 'Yahvé' es la forma habitual en español académico y eclesial amplio para el Tetragrámaton.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene en un castellano natural y solemne. 'Así dice' reproduce bien el valor formular y el presente profético del original.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel mismo
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y transparente; 'Israel' funciona como complemento identificador del Dios nombrado.
- source_word: כֹּה תֹאמְרוּ
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirán
  alternatives_spanish:
  - Así diréis
  - Esto dirán
  lexicon: HALOT
  rationale: Se conserva la fuerza de instrucción profética dirigida a los mensajeros. 'Dirán' es natural en español y refleja la orden reportada.
- source_word: הַשֹּׁלֵחַ אֶתְכֶם אֵלַי
  english_pob_choice: who sent you to me
  chosen_spanish: que los envió a mí
  alternatives_spanish:
  - que los manda a mí
  - el que los envió a mí
  lexicon: HALOT
  rationale: El participio hebreo se vierte de manera idiomática en pasado por el contexto narrativo, siguiendo la decisión inglesa. 'Los' mantiene la referencia plural de 'ustedes' en español de trato formal.
- source_word: לְדָרְשֵׁנִי
  english_pob_choice: to inquire of me
  chosen_spanish: para que me consultaran
  alternatives_spanish:
  - para preguntarme
  - para buscarme
  lexicon: HALOT
  rationale: En este contexto profético, דָּרַשׁ denota buscar respuesta oracular. 'Consultar' comunica mejor ese sentido que un simple 'preguntar' o 'buscar'.
- source_word: חֵיל פַּרְעֹה
  english_pob_choice: Pharaoh’s army
  chosen_spanish: el ejército de Faraón
  alternatives_spanish:
  - las tropas de Faraón
  - la fuerza de Faraón
  lexicon: HALOT
  rationale: חֵיל aquí tiene sentido militar colectivo. 'Ejército' es la equivalencia más natural y precisa en español.
- source_word: הַיֹּצֵא לָכֶם לְעֶזְרָה
  english_pob_choice: which came out to help you
  chosen_spanish: que salió para ayudarlos
  alternatives_spanish:
  - que salía para ayudarlos
  - que salió en su ayuda
  lexicon: HALOT
  rationale: Se integra el valor participial en una cláusula fluida. 'Ayudarlos' mantiene el destinatario plural y evita una formulación excesivamente literal.
- source_word: שָׁב
  english_pob_choice: has returned
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha regresado
  - ha vuelto
  lexicon: HALOT
  rationale: '''Se ha vuelto'' conserva la idea de retorno/repliegue y permite enlazar con la opción inglesa de ''has turned back'' como lectura alternativa documentada en la nota. En español sugiere adecuadamente el movimiento de retirada.'
- source_word: לְאַרְצוֹ מִצְרָיִם
  english_pob_choice: to its own land, Egypt
  chosen_spanish: a su propia tierra, Egipto
  alternatives_spanish:
  - a la tierra de Egipto
  - a su tierra, Egipto
  lexicon: HALOT
  rationale: Se preserva el pronombre posesivo del hebreo y la aposición final 'Egipto'. 'Tierra' funciona bien para לְאַרְצוֹ y mantiene el paralelo con el original.
theological_decisions:
- issue: Uso del nombre divino en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La traducción sigue la política POB de transparentar el Tetragrámaton. No se oculta tras una sustitución litúrgica, preservando la identidad personal del Dios que habla por medio de Jeremías.
  doctrine_reference: Tetragrámaton / nombre divino revelado (Éxodo 3:15; Jeremías 37:7)
- issue: Sentido de לְדָרְשֵׁנִי en contexto profético
  english_pob_reading: to inquire of me
  chosen_spanish_reading: para que me consultaran
  alternative_spanish_readings:
  - para buscarme
  - para preguntarme
  rationale: Aquí el verbo no expresa mera curiosidad religiosa, sino la búsqueda de una respuesta divina mediante el profeta. 'Consultar' preserva la dimensión oracular sin introducir una explicación extra que no está en el texto.
  doctrine_reference: Consulta profética / búsqueda de dirección divina (cf. 1 Samuel 9:9; Jeremías 21:2)
- issue: Valor de la cláusula sobre el regreso del ejército egipcio
  english_pob_reading: has returned / has turned back
  chosen_spanish_reading: se ha vuelto
  alternative_spanish_readings:
  - ha regresado
  - ha vuelto
  rationale: El hebreo presenta una afirmación de retirada consumada. 'Se ha vuelto' conserva la idea de cambio de rumbo o repliegue que el inglés auditado documenta como alternativa significativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés; no hay revisiones aplicadas en el expediente fuente, y la traducción española sigue la misma resolución principal, conservando las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה en coherencia con el estándar POB.
  - '''Dios de Israel'' y ''ejército de Faraón'' siguen el sentido léxico del hebreo sin sobreinterpretación.'
  - Se conserva la fuerza oracular de דָּרַשׁ con 'consultar', evitando reducirlo a una búsqueda general.
  - La final aposición 'Egipto' queda explícita para reflejar לְאַרְצוֹ מִצְרָיִם sin ambigüedad.
