  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: prohíbe cobrar interés al ''hermano'' y mantiene la lista dinero/comida/cualquier cosa sujeta a interés. Sin embargo, ''impondrás interés'' suena menos idiomático en español jurídico-bíblico que ''cobrarás interés'', y la construcción ''interés sobre dinero'' es menos natural que ''interés por dinero''.'
  spanish_quality_summary: La redacción es generalmente clara y fiel, pero necesita un pulido menor para mayor naturalidad y legibilidad en español neutral. 'Comida' puede funcionar, pero 'alimentos' encaja mejor en una enumeración legal de bienes prestables. También conviene conservar la nota explicativa sobre 'plata' y añadir la nota sobre 'usura' preservada en el inglés POB.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Tu hermano' preserva adecuadamente לְאָחִיךָ; 'interés' es correcto para נֶשֶׁךְ frente a 'usura'; 'dinero' con nota de 'plata' sigue la decisión documentada. Se debe añadir en español la alternativa explicativa sobre 'usura' porque el inglés POB la preservó en nota.
  issues:
  - severity: medium
    issue: '''Impondrás interés'' es poco idiomático aquí'
    rationale: Aunque semánticamente posible, para una prohibición legal sobre préstamos el español natural y claro prefiere 'cobrarás interés' o 'exigirás interés'. Esto representa mejor el hiphil de נשׁך según la decisión inglesa auditada.
  - severity: low
    issue: La preposición 'sobre' en 'interés sobre dinero/comida' suena forzada
    rationale: En español bíblico y jurídico moderno es más natural 'interés por dinero' / 'interés por alimentos' o una estructura equivalente.
  - severity: medium
    issue: Falta la nota sobre 'usura' presente en el English POB
    rationale: La instrucción requiere preservar alternativas significativas cuando el inglés POB las conserva. Aquí la nota aclara una posible traducción tradicional engañosa.
