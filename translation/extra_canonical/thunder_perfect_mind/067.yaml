    be concerned’); Nag Hammadi pattern favors ‘members’ in similar lines
  rationale: In context with “you who know … my …,” a noun ‘members/limbs’ fits the
    pattern better than a verbal ‘practice/care’.
- source_word: (OCR) ⲧⲱⲃ︤ⲡ︥ ≈ ⲧⲱⲃⲥ/ⲧⲟⲃⲥ
  chosen: establish
  alternatives:
  - set up
  - make firm
  lexicon: Crum ⲧⲟⲃⲥ ‘set upright, establish’
  rationale: Imperative aligns with an exhortation to arrange or set in order; ‘establish’
    keeps weight and cadence.
- source_word: ⲛⲥⲁⲛⲁⲓ
  chosen: the small (ones)
  alternatives:
  - the little ones
  - the lesser
  lexicon: Crum ⲥⲁⲛⲁⲓ ‘small, little’
  rationale: Nominal collective suits the antithetical pairing with ‘great ones’.
- source_word: ⲟⲩⲛ ⲁⲛⲟⲕ ⲛⲛⲉⲧⲛⲉⲣⲙⲛⲥⲁⲛⲁⲓ
  chosen: for I am among those who are among the small
  alternatives:
  - for I am with those who are of the small
  lexicon: Crum ⲟⲩⲛ ‘there is/exists’; ⲁⲛⲟⲕ ‘I’; ⲛⲉⲣⲙⲛ ‘among, in the midst of’; ⲥⲁⲛⲁⲓ
    ‘small’
  rationale: Keeps the self-locating ‘I am’ and the inclusive “among” that grounds
    the paradox.
- source_word: ⲥⲉⲥⲱ
  chosen: they will be lifted up
  alternatives:
  - they are first
  - they will be saved
  lexicon: Ambiguous OCR; ⲥⲱ may underlie a verb ‘raise/exalt’ (cf. ⲥⲟⲩ/ⲥⲱ variants)
    or be read with πρωτο‑ ‘first’; editors differ
  rationale: Given the paradoxical motif, ‘lifted up’ fits the small being elevated;
    marked as uncertain.
parallelism_check: The line preserves the double vocative parallelism (“you who know
  me / you who know my limbs”) and follows with a matching imperative (“establish
  …”), then grounds the paradox with a self-referential clause (“for I am among …”).
  Repetition and cadence are maintained without collapsing contrasts.
voice_check: Imperative address and the self-asserting ‘I am’ voice of Thunder are
  retained. The diction keeps the sharp, commanding tone and paradoxical reversal
  (great among small; the small being elevated).
