translation:
  text: Jesus said[a], “Blessed are the poor[f][e][d][c][b], for yours is the kingdom
    of the heavens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Blessed’ could also be rendered ‘Happy’ or ‘How fortunate,’ but the beatitude
      formula and evaluative tone favor ‘Blessed.’
    reason: lexical_alternative
  - marker: b
    text: Coptic ⲡϩⲏⲕⲉ is singular (‘the poor person’) used generically; English ‘the
      poor’ reflects the collective sense.
    reason: dialect_note
  - marker: c
    text: ⲡⲙⲛⲧⲣⲣⲟ may also be translated ‘kingdom’ or ‘reign.’ ‘Kingship’ emphasizes
      sovereignty rather than a place.
    reason: lexical_alternative
  - marker: d
    text: Compare Luke 6:20 (‘Blessed are you poor, for yours is the kingdom of God’)
      and Matthew 5:3 (‘Blessed are the poor in spirit, for theirs is the kingdom
      of heaven’). Thomas’s wording differs in address and attribute.
    reason: cross_reference
  - marker: e
    text: ‘Of the heavens’ reproduces the explicit plural in Coptic (ⲛⲡⲡⲉ), a Thomasine
      phrasing not to be conflated with ‘of God.’
    reason: dialect_note
  - marker: f
    text: Or 'Jesus said, “Blessed are the poor, for yours is the kingship of the
      heavens.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said, Jesus said
  lexicon: Layton, Coptic Grammar (speech-introduction ϫⲉ with peje-), Crum (ⲡⲉϫⲉ)
  rationale: Standard rendering of the speech-introducer; the following ϫⲉ marks the
    content clause, rendered by quotation in English.
- source_word: ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: Blessed
  alternatives:
  - Happy
  - How fortunate
  lexicon: Crum s.v. ⲙⲁⲕⲁⲣⲓⲟⲥ (Gk loan ‘blessed, happy’); Lambdin §137 (predicate
    with ϩⲉⲛ- plural indef.)
  rationale: Beatitude formula; ‘Blessed’ preserves evaluative and traditional force
    while reflecting the plural-indefinite predicate used predicatively.
- source_word: ⲡϩⲏⲕⲉ
  chosen: the poor
  alternatives:
  - the poor person
  - the beggar
  - the destitute
  lexicon: Crum s.v. ⲡϩⲏⲕⲉ ‘poor person’
  rationale: Singular generic in Coptic functions collectively; English ‘the poor’
    conveys the class without forcing an awkward singular.
- source_word: ϫⲉ (second clause)
  chosen: for
  alternatives:
  - because
  lexicon: Lambdin §176 (ϫⲉ as causal complementizer)
  rationale: Here the second ϫⲉ introduces the rationale of the beatitude; ‘for’ matches
    the concise causal force.
- source_word: ⲧⲱⲧⲛ
  chosen: yours
  alternatives:
  - of you
  - belonging to you
  lexicon: Layton, Grammar (independent pronouns)
  rationale: Second plural pronoun; ‘yours’ is concise and idiomatic in the copular
    clause.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: the kingship
  alternatives:
  - the reign
  - the kingdom
  lexicon: Layton NHS; Crum s.v. ⲙⲛⲧⲣⲣⲟ ‘kingship, royal rule’
  rationale: Term denotes rule/sovereignty rather than territory; ‘kingship’ preserves
    that nuance while an alternative ‘kingdom’ is noted.
- source_word: ⲛⲡⲡⲉ
  chosen: of the heavens
  alternatives:
  - of heaven
  - of the sky
  lexicon: Crum s.v. ⲡⲉ ‘sky, heaven’; plural usage in Thomas noted by Layton
  rationale: The construction is explicitly plural; ‘of the heavens’ keeps the plural
    form and Thomasine diction.
textual_note: No lacunae or restorations are indicated by Dilley for this saying.
  The line break in NHAM02.42 splits ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ across lines; normalized as ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ
  ⲡⲉ ⲡϩⲏⲕⲉ. Predication uses plural-indefinite ϩⲉⲛ- with a singular generic subject
  (ⲡϩⲏⲕⲉ), a common Coptic structure. The genitive phrase ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲡⲉ shows Thomas’s
  characteristic plural ‘heavens.’ No Greek Oxyrhynchus witness overlaps this logion.
