translation:
  language: es
  text: Cuando te sientes a comer con un gobernante[a], considera bien lo que tienes delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «lo que está puesto delante de ti». El hebreo puede referirse específicamente a la comida servida en la mesa, aunque también puede implicar la situación más amplia que tienes delante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Pues
  lexicon: HALOT
  rationale: Introduces a situational, instructional setting rather than a causal clause. En español, 'cuando' conserva el valor práctico de la advertencia y suena natural en un proverbio.
- source_word: תֵשֵׁב
  english_pob_choice: you sit down
  chosen_spanish: te sientes
  alternatives_spanish:
  - te sientas
  - tomes asiento
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de ocupar el lugar a la mesa. 'Te sientes' es natural en español y comunica el mismo gesto de sentarse para la comida.
- source_word: לִלְחוֹם
  english_pob_choice: to dine
  chosen_spanish: a comer
  alternatives_spanish:
  - a cenar
  - a participar de una comida
  lexicon: HALOT
  rationale: El hebreo apunta a comer una comida, no solo al acto genérico de ingerir. 'A comer' es más directo y menos marcado socialmente que 'cenar' o 'dine' en español.
- source_word: מוֹשֵׁל
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un ruler
  - un príncipe
  - un mandatario
  lexicon: HALOT
  rationale: El término designa a quien ejerce autoridad. 'Gobernante' conserva la amplitud del hebreo sin restringirlo a una figura política específica ni usar un calco del inglés.
- source_word: בִּין תָּבִין
  english_pob_choice: carefully consider
  chosen_spanish: considera bien
  alternatives_spanish:
  - discierne cuidadosamente
  - reflexiona con cuidado
  - presta mucha atención
  lexicon: HALOT
  rationale: La forma intensificada pide una atención deliberada. 'Considera bien' transmite esa fuerza exhortativa de modo claro y sobrio, sin volverlo demasiado explicativo.
- source_word: אֶת אֲשֶׁר לְפָנֶיךָ
  english_pob_choice: what is before you
  chosen_spanish: lo que está delante de ti
  alternatives_spanish:
  - lo que te han servido
  - lo que está puesto ante ti
  - lo que tienes enfrente
  lexicon: HALOT
  rationale: La frase puede referirse al alimento sobre la mesa y, en un sentido más amplio, a la situación inmediata. 'Lo que está delante de ti' preserva esa amplitud mejor que una versión más específica.
translation_notes:
  revision_awareness: La versión española sigue de cerca el hebreo y conserva la ambigüedad útil del final del verso, en paralelo con la nota auditada de la POB en inglés. No se introdujeron cambios textuales de revisión respecto del testimonio fuente provisto.
  spanish_consistency_notes:
  - Se prefirió 'gobernante' para מוֹשֵׁל por ser natural y abarcar la noción de autoridad.
  - Se evitó 'SEÑOR' o equivalentes litúrgicos porque el texto no usa el nombre divino ni un título teológico.
  - '''Lo que está delante de ti'' mantiene la posible referencia al plato servido sin cerrarla a una sola interpretación.'
  - La puntuación y el registro buscan un proverbio readable en español latinoamericano, manteniendo un tono sobrio y bíblico.
