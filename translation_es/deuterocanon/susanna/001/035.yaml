translation:
  language: es
  text: Pero ella, llorando, alzó la vista al cielo, porque su corazón había confiado en el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κλαίουσα
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - mientras lloraba
  - en medio de su llanto
  lexicon: BDAG
  rationale: El participio presente describe una acción concomitante y continua; «llorando» conserva bien ese matiz sin sonar forzado en español.
- source_word: ἀνέβλεψεν
  english_pob_choice: looked up
  chosen_spanish: alzó la vista
  alternatives_spanish:
  - miró hacia arriba
  - levantó los ojos
  lexicon: BDAG
  rationale: En español, «alzó la vista» comunica de forma natural el gesto de mirar hacia arriba y mantiene el movimiento dirigido al cielo.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - hacia el cielo
  lexicon: BDAG
  rationale: En este contexto de oración y confianza religiosa, «cielo» expresa mejor el ámbito divino que «cielo» como mero espacio físico; se evita «cielo de Dios» por ser explicativo más allá del griego.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - ser
  lexicon: BDAG
  rationale: «Corazón» es el equivalente normal en español para el centro interior de la persona, incluyendo confianza, voluntad y afecto, sin perder el sentido antropológico del término.
- source_word: πεποιθυῖα
  english_pob_choice: had trusted
  chosen_spanish: había confiado
  alternatives_spanish:
  - estaba confiada
  - tenía confianza
  lexicon: BDAG
  rationale: El perfecto participial expresa un estado resultante de confianza previa; «había confiado» preserva el valor perfecto y su resultado presente mejor que una forma meramente progresiva.
- source_word: ἐπὶ Κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - sobre el Señor
  - en Yahvé
  lexicon: BDAG
  rationale: La preposición con πεποιθυῖα pide en español la construcción natural «confiar en». Se conserva «Señor» porque el testimonio griego usa κύριος y, en este contexto, la referencia devocional al Señor es la lectura directa del texto.
theological_decisions:
- issue: Tratamiento de κύριος en una narración griega de confianza religiosa
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé
  rationale: El testimonio griego presenta Κυρίῳ y no el nombre hebreo explícito; por eso se traduce con el título devocional «Señor», manteniendo la relación de confianza expresada por ἐπὶ Κυρίῳ sin introducir un nombre que el texto griego no da aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'La versión coincide sustancialmente con la línea inglesa auditada: «But she, weeping, looked up to heaven, because her heart had trusted in the Lord.» No se registraron revisiones aplicadas en el audit trail más reciente; se conservan el aspecto continuo del participio, el gesto ascendente y el valor perfecto de la confianza.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al contexto griego y a la práctica terminológica del proyecto cuando no hay un nombre divino hebreo explícito en el testimonio inmediato.
  - Se usa «cielo» en sentido teológico y no meteorológico.
  - No se añade nota textual porque el contexto disponible no registra variantes relevantes ni tensiones lexicológicas adicionales.
