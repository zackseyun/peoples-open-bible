revisions:
- from: No vacilen en reconocerlo[a]. Es bueno ocultar un secreto de rey, pero revelar las obras de Dios gloriosamente[b]. Hagan lo que es bueno, y el mal no los encontrará.
  to: No vacilen en alabarlo abiertamente[a]. Es bueno ocultar un secreto de rey, pero dar a conocer las obras de Dios gloriosamente[b]. Hagan lo que es bueno, y el mal no los encontrará.
  rationale: Se propone una revisión menor para mejorar la fidelidad contextual y la naturalidad del español. ‘Alabarlo abiertamente’ expresa mejor el valor público y doxológico de ἐξομολογεῖσθαι en este contexto, mientras que la nota conserva la amplitud semántica documentada por el POB inglés. ‘Dar a conocer’ fluye mejor que ‘revelar’ con el adverbio ‘gloriosamente’ en español, sin perder el contraste con ‘ocultar’. No se requiere adjudicación adicional, porque el sentido base del versículo es claro y la reparación es estilístico-lexical, no doctrinal.
