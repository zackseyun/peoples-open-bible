translation:
  language: es
  text: 'Se levantaron temprano por la mañana y subieron a la cumbre de la montaña[a], diciendo: «Aquí estamos, y subiremos al lugar del que Yahvé ha hablado, porque hemos pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la cima de la montaña». El hebreo dice literalmente «a la cabeza del monte», una expresión idiomática que se refiere a la parte más alta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּ֣מוּ
  english_pob_choice: They rose early
  chosen_spanish: Se levantaron temprano
  alternatives_spanish:
  - Se levantaron de madrugada
  - Se pusieron en camino temprano
  lexicon: HALOT
  rationale: El verbo qal/hiphil de שׁכם expresa levantarse o salir temprano. «Se levantaron temprano» comunica el valor temporal de forma natural en español sin añadir interpretaciones.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - de mañana
  lexicon: HALOT
  rationale: בוקר significa «mañana». Con «se levantaron temprano», «por la mañana» mantiene la referencia temporal sin redundancia pesada.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia arriba
  lexicon: HALOT
  rationale: עלה es el verbo básico «subir». «Subieron» es el equivalente más natural y fiel en español.
- source_word: אֶל רֹאשׁ הָהָר
  english_pob_choice: to the top of the mountain
  chosen_spanish: a la cumbre de la montaña
  alternatives_spanish:
  - al top de la montaña
  - a la cima de la montaña
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «la cabeza del monte». «Cumbre» o «cima» transmiten bien la imagen idiomática; «cumbre» suena más sobria y bíblica en español moderno.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula introductoria del discurso directo. «Diciendo» conserva la relación sintáctica de manera clara y formal.
- source_word: הִנֶּנּוּ
  english_pob_choice: Here we are
  chosen_spanish: Aquí estamos
  alternatives_spanish:
  - He aquí que estamos
  - Aquí nos tienes
  lexicon: HALOT
  rationale: Es una fórmula de auto-presentación. «Aquí estamos» reproduce con naturalidad el valor de presencia inmediata sin sobrecargarlo con matices no explícitos.
- source_word: וְעָלִינוּ
  english_pob_choice: we will go up
  chosen_spanish: y subiremos
  alternatives_spanish:
  - y vayamos
  - y vamos a subir
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse como perfecto con valor volitivo, en este contexto expresa intención futura. «Subiremos» refleja bien esa fuerza volitiva en español.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  - a ese lugar
  lexicon: HALOT
  rationale: מקום es el término común para «lugar». «Al lugar» conserva la sencillez del hebreo.
- source_word: אֲשֶׁר אָמַר יְהוָה
  english_pob_choice: that Yahweh has spoken of
  chosen_spanish: que Yahvé ha dicho
  alternatives_spanish:
  - que Yahvé habló
  - que Yahvé ha hablado de
  lexicon: HALOT
  rationale: אָמַר significa «decir» o «hablar». En español, «ha dicho» evita la paráfrasis excesiva y mantiene la referencia directa a lo que Yahvé expresó; no se añade «prometió» ni «habló de» porque el hebreo aquí solo dice «dijo».},{
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención doctrinal del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de su acción. «Porque» es la equivalencia más clara y natural en español.
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  - hemos errado
  lexicon: HALOT
  rationale: חטא expresa pecado/culpa moral. «Hemos pecado» conserva el peso teológico de la confesión y suena natural en español contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la línea del proyecto, se traslada como «Yahvé» para preservar el nombre personal de Dios, no un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de וְעָלִינוּ en contexto
  english_pob_reading: we will go up
  chosen_spanish_reading: subiremos
  alternative_spanish_readings:
  - subamos
  - vamos a subir
  rationale: La forma verbal no debe forzarse a un simple pasado ni a un mandato. En el contexto de una declaración de intención tras «Aquí estamos», el futuro español expresa adecuadamente el compromiso volitivo.
  doctrine_reference: Hebrew verbal aspect in context; POB audit trail for volitional future
- issue: Relación entre אָמַר y la nota de «spoken of» del POB inglés
  english_pob_reading: has spoken of
  chosen_spanish_reading: ha dicho
  alternative_spanish_readings:
  - ha hablado de
  - ha hablado
  rationale: El inglés POB suaviza el inglés idiomático con «spoken of» por naturalidad; en español, la forma más fiel y menos interpretativa es «ha dicho». No se añade la idea de promesa, pues el hebreo solo afirma que Yahvé habló/dijo.
  doctrine_reference: 'Lexical alternative: אָמַר = decir/hablar; avoid over-interpretation'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la decisión revisada de mantener un equivalente natural sin perder la literalidad del hebreo. No se introdujeron cambios doctrinales nuevos; la principal adaptación al español fue resolver la idiomática hebrea רֹאשׁ הָהָר con una expresión natural («cumbre de la montaña») y conservar el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y público de POB en español.
  - No se usa «SEÑOR» para יְהוָה, conforme al criterio del proyecto.
  - Se evita añadir «prometió» o un matiz más fuerte que el hebreo no expresa.
  - La puntuación del discurso directo sigue normas españolas con comillas angulares.
