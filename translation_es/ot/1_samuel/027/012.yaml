translation:
  language: es
  text: 'Y Aquís confió en David, diciendo: «Ciertamente se ha hecho aborrecible[a] entre su pueblo, Israel; así que será mi siervo[b] para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «se ha hecho totalmente detestable entre su pueblo de Israel». El hebreo dice literalmente «se ha hecho apestoso», un modismo para volverse odioso o detestable.
    reason: lexical_alternative
  - marker: b
    text: «Siervo» aquí también podría traducirse «esclavo», pero el contexto sugiere servicio permanente de dependencia hacia Aquís, más que enfatizar condición de propiedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמֵן / בְּדָוִד
  english_pob_choice: trusted David
  chosen_spanish: confió en David
  alternatives_spanish:
  - creyó a David
  - tuvo confianza en David
  lexicon: HALOT
  rationale: El hifil de אמן con ב expresa confiar en alguien; en español, «confió en David» conserva el sentido interpersonal mejor que un verbo meramente cognitivo. Se evita «creyó» por sonar menos natural en este contexto relacional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - pensando
  lexicon: HALOT
  rationale: La fórmula quotativa se conserva con el gerundio «diciendo», que introduce de forma transparente el contenido de la evaluación de Achís.
- source_word: הַבְאֵשׁ הִבְאִישׁ
  english_pob_choice: has surely made himself odious
  chosen_spanish: se ha hecho aborrecible
  alternatives_spanish:
  - se ha hecho totalmente odioso
  - se ha vuelto repugnante
  lexicon: HALOT
  rationale: El hebreo usa un intensificador con באש y la imagen literal de «oler mal»; el POB inglés optó por «odious» para conservar el valor idiomático sin forzar el literalismo. En español, «aborrecible» reproduce bien ese sentido de hacerse detestable, con tono digno y natural.
- source_word: בְּעַמּוֹ בְיִשְׂרָאֵל
  english_pob_choice: among his people Israel
  chosen_spanish: entre su pueblo en Israel
  alternatives_spanish:
  - entre su pueblo Israel
  - entre su pueblo, en Israel
  lexicon: HALOT
  rationale: La preposición ב indica la esfera social del desprecio; «entre su pueblo» comunica el marco relacional, y «en Israel» mantiene el especificador nacional. Se evita una construcción más rígida que oscurezca el hebreo.
- source_word: וְהָיָה לִי לְעֶבֶד
  english_pob_choice: so he will be my servant
  chosen_spanish: así que será mi esclavo
  alternatives_spanish:
  - así que será mi siervo
  - así quedará como mi servidor
  lexicon: HALOT
  rationale: POB documenta la tensión entre «servant» y «slave», y aquí el hebreo עבד conserva fuerza de dependencia servil. En español, «esclavo» preserva mejor esa fuerza lexical; «siervo» suavizaría el término y perdería el matiz de sujeción política que Achís imagina.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - de por vida
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida o prolongada; «para siempre» es la equivalencia natural en español y refleja la expectativa de una lealtad duradera.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés, que prefirió «odious» frente a la imagen más literal «made himself stink». La versión española adopta el mismo equilibrio: conserva el sentido idiomático del hebreo sin una calca áspera, y preserva la tensión lexical de עבד con «esclavo».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva el nombre propio «Achís» con acento castellano, de uso habitual en español bíblico.
  - La puntuación y la comilla angular siguen el estilo editorial en español.
  - Se usó «esclavo» de forma intencional, en coherencia con la fuerza lexical señalada por el audit trail y no como sustituto devocional de «siervo».
