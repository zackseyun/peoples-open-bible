lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa la edad alcanzada antes del siguiente acontecimiento. «Vivió» es natural en español y conserva el valor temporal del hebreo sin volverlo mecánico.
- source_word: פֶלֶג
  english_pob_choice: Peleg
  chosen_spanish: Peleg
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran por convención. Se conserva la forma usual en español bíblico.
- source_word: שְׁלֹשִׁים שָׁנָה
  english_pob_choice: thirty years
  chosen_spanish: treinta años
  alternatives_spanish:
  - treinta años de edad
  lexicon: HALOT
  rationale: La construcción hebrea expresa edad de manera adverbial. «Treinta años» es idiomático en español y evita añadir una glosa innecesaria.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: En genealogías, ילד señala la generación del descendiente. «Engendró» conserva con precisión el sentido genealógico y el tono bíblico, sin debilitar la relación paternal.
- source_word: רְעוּ
  english_pob_choice: Reu
  chosen_spanish: Reú
  alternatives_spanish:
  - Reu
  lexicon: convención onomástica
  rationale: Se mantiene el nombre propio en su forma española más usada, con acento gráfico para reflejar la pronunciación castellana/latina habitual en lectura bíblica.
