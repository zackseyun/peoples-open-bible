    rationale: 'El inglés auditado dice: «Or ''papyrus boats'' or ''boats of reed.''» Como el texto principal ya usa «barcos de papiro», la nota española no debe ofrecer nuevamente «barcos de papiro» como variante; debe registrar una alternativa genuina como «barcos de junco» o «embarcaciones de junco».'
  revised_spanish_text: Pasan como barcos de papiro[a], como un águila que se abalanza sobre la presa[b].
