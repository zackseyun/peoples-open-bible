translation:
  language: es
  text: Y todo el pueblo volvió al campamento, a Josué en Maquedá, en paz. Nadie movió su lengua[a] contra los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Nadie dijo una palabra contra los hijos de Israel». El hebreo dice literalmente: «Nadie afiló su lengua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: שׁוּב en este contexto narrativo expresa el regreso físico tras la persecución. «Volvió» es natural en español y conserva bien el valor de retorno sin añadir énfasis innecesario.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el ejército
  lexicon: HALOT
  rationale: עָם significa literalmente «pueblo» y no un término técnico para «ejército». «Todo el pueblo» mantiene la forma del hebreo y suena digno en español bíblico.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la tienda
  lexicon: HALOT
  rationale: El sentido militar es claro; «campamento» es el equivalente natural en español y corresponde al uso de la POB en inglés.
- source_word: אֶל יְהוֹשֻׁעַ מַקֵּדָה
  english_pob_choice: to Joshua at Makkedah
  chosen_spanish: a Josué en Makkedá
  alternatives_spanish:
  - a Josué, en Makkedá
  - hacia Josué en Makkedá
  lexicon: HALOT
  rationale: El hebreo es compacto y une destino y localización. «A Josué en Makkedá» refleja que el pueblo volvió adonde estaba Josué, sin forzar una expansión interpretativa.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sanos y salvos
  - sin daño
  lexicon: HALOT
  rationale: שָׁלוֹם aquí indica retorno seguro e indemne. «En paz» preserva el giro bíblico y resulta transparente en español; las alternativas son más explicativas pero menos textuales.
- source_word: לֹא חָרַץ
  english_pob_choice: No one moved
  chosen_spanish: Nadie movió
  alternatives_spanish:
  - Nadie afiló
  - Nadie pronunció
  lexicon: HALOT
  rationale: La POB en inglés optó por una equivalencia idiomática para חָרַץ en la expresión sobre la lengua. «Nadie movió» conserva el sentido de que nadie habló contra Israel sin perder naturalidad en español.
- source_word: לְבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: contra los hijos de Israel
  alternatives_spanish:
  - contra los israelitas
  - contra los hijos de Israel
  lexicon: HALOT
  rationale: La construcción hebrea con la lengua es hostil y en español requiere explicitar la dirección con «contra». Se conserva «hijos de Israel» para mantener la forma masculina explícita del original y su resonancia bíblica.
- source_word: לְשֹׁנוֹ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - su palabra
  lexicon: HALOT
  rationale: «Lengua» reproduce el hebreo literal y la imagen corporal del hablar; es preferible a suavizarlo con «palabra», que borra la metáfora.
theological_decisions:
- issue: Forma masculina de בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos e hijas de Israel
  rationale: El hebreo usa una designación nacional masculina explícita. En español, «hijos de Israel» preserva esa forma sin neutralizarla; no hay indicio textual para expandirla a una formulación inclusiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El draft sigue el cierre revisado del audit trail inglés: se evita una traducción demasiado literal de חָרַץ como «afilar» en el texto principal, pero se conserva la imagen en la nota como alternativa lexical. También se mantiene la localización compacta «a Josué en Makkedá», coherente con la revisión inglesa que aclaró la relación sintáctica sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el pasaje lo requiera explícitamente; aquí no aparece.
  - «Josué» se mantiene como forma española estándar del nombre propio.
  - «Makkedá» conserva la transliteración del topónimo.
  - Se preserva la imagen corporal de «lengua» para no borrar la metáfora hebrea.
  - El tono busca ser bíblico y actual, sin calcos innecesarios ni arcaísmos fuertes.
