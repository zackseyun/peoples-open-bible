  text: וְ֠/הָיָה אֲשֶׁ֨ר לֹֽא יַעֲלֶ֜ה מֵ/אֵ֨ת מִשְׁפְּח֤וֹת הָ/אָ֨רֶץ֙ אֶל יְר֣וּשָׁלִַ֔ם לְ/הִֽשְׁתַּחֲוֺ֔ת לְ/מֶ֖לֶךְ יְהוָ֣ה צְבָא֑וֹת וְ/לֹ֥א עֲלֵי/הֶ֖ם יִהְיֶ֥ה הַ/גָּֽשֶׁם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/017.yaml
  text: And it will be that whichever of the families of the earth does not go up to Jerusalem to worship the King[a], Yahweh of Armies[b], on them there will be no rain.
