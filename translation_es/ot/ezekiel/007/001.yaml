lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... llegó
  - Y sucedió
  lexicon: HALOT
  rationale: El waw-consecutivo introduce una nueva unidad narrativa/profética. En español, 'vino' comunica con naturalidad la irrupción de la palabra profética sin volver la fórmula demasiado mecánica.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר־יְהוָה, 'la palabra' preserva el vínculo formal con la revelación repetida. 'Mensaje' sería posible, pero menos anclado al giro bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en forma directa según la norma del proyecto: ''Yahvé''. No se sustituye por un título como ''el SEÑOR''.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: 'El preposición + sufijo de primera persona expresa destinatario directo: ''a mí''. Es la opción más natural y fiel en español.'
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - así diciendo,
  lexicon: HALOT
  rationale: Funciona como introductor estándar del discurso. 'Diciendo,' reproduce la estructura hebrea y prepara el contenido que sigue.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura inglesa auditada usa 'Yahweh' para el Tetragrámaton. En español, la forma editorial equivalente y estable del proyecto es 'Yahvé', manteniendo el nombre personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto (''a mí[a]''), y la formulación mantiene la fórmula profética breve y literal con español natural.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la fórmula profética 'la palabra ... vino a mí, diciendo,' sin ampliar el contenido.
  - No se introduce puntuación o sintaxis que altere el arranque de una nueva unidad profética.
