review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: las crías prosperan, crecen en terreno abierto, salen y no vuelven. Sin embargo, hay un problema de alineación referencial en «no regresan a ellas»: el hebreo לָמוֹ es común plural y el inglés auditado lo entiende como referencia a los progenitores animales, no específicamente femenina. Además, la nota al pie está mal anclada: la alternativa corresponde a «en el campo abierto», no a «se fortalecen».'
  spanish_quality_summary: El español es claro y natural en conjunto. «Sus crías se fortalecen; crecen en el campo abierto; salen...» fluye bien. Pero «a ellas» introduce ambigüedad innecesaria y probable desalineación, porque el antecedente no es femenino en español. Conviene usar «a ellos» para reflejar los progenitores animales de manera más fiel y legible. También debe moverse la marca de nota al sintagma correcto.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son adecuadas: «crías» para בְנֵיהֶם, «se fortalecen» para יַחְלְמוּ, «crecen» para יִרְבּוּ, y «campo abierto» para בַּבָּר. La nota alternativa debe conservar «en la vida silvestre» / «en campo abierto» ligada al lugar, no al verbo.'
  issues:
  - severity: high
    issue: Pronombre final «a ellas» desalineado con el referente del hebreo
    rationale: וְלֹא שָׁבוּ לָמוֹ significa «y no vuelven a ellos/a ellas» con pronombre común plural. Según el POB inglés, el referente son los animales parentales. En español, «a ellas» fuerza un referente femenino no presente en el texto y puede hacer pensar en las crías o en las madres específicamente.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La alternativa «en la vida silvestre / en el campo abierto» corresponde a בַּבָּר («en el campo abierto»), no a יַחְלְמוּ («se fortalecen»). El marcador debe aparecer junto al sintagma locativo.
  revised_spanish_text: Sus crías se fortalecen; crecen en el campo abierto[a]; salen y no regresan a ellos.
  revised_footnotes:
  - marker: a
    text: O «en la vida silvestre» o «en campo abierto».
    reason: lexical_alternative
