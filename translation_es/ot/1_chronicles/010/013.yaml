    text: Or 'for the breach of faith in which he broke faith against the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''A medium'' refers to a person who seeks information from the dead or from spirits; compare 1 Samuel 28:7.'
    reason: cultural_note
