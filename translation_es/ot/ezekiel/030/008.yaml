review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: resultado de juicio (''Entonces sabrán''), contenido (''que yo soy Yahvé''), circunstancia temporal (''cuando...''), juicio sobre Egipto y colapso de sus apoyos. Sin embargo, hay dos puntos mejorables frente a la evidencia fuente y la pauta inglesa: (1) ''ayudadores'' suena poco natural en español eclesial general; puede preservarse la transparencia léxica mejor con ''los que la ayudan'' y mantener ''aliados'' en nota. (2) ''sean quebrantados'' es comprensible, pero en este contexto de derrota de apoyos humanos ''queden destrozados'' o ''sean quebrados'' sería más directo; aun así, la necesidad principal es la naturalidad del sintagma final.'
  spanish_quality_summary: El texto es mayormente claro, pero 'todos sus ayudadores' resulta forzado y poco idiomático en español moderno neutral. 'Cuando ponga fuego en Egipto' es aceptable y fiel al locativo hebreo. La lectura mejora en dignidad y naturalidad con 'todos los que la ayudan'.
  glossary_alignment: 'Alinea correctamente YHWH -> ''Yahvé''. No hay conflicto terminológico mayor. La excepción principal es estilística-lexical: para עֹזְרֶיהָ conviene evitar el calco ''ayudadores'' sin perder la literalidad; ''los que la ayudan'' refleja mejor el hebreo que ''aliados'' en el texto principal, dejando este último en nota.'
  issues:
  - severity: medium
    issue: Uso de 'ayudadores'
    rationale: Aunque busca reflejar literalmente עֹזְרֶיהָ, 'ayudadores' no es natural ni ampliamente legible en español bíblico moderno neutral. 'Los que la ayudan' conserva el sentido léxico con mejor español.
  - severity: low
    issue: Redacción algo rígida en la cláusula final
    rationale: '''Sean quebrantados'' es posible, pero junto con ''ayudadores'' produce una frase pesada. Ajustar el sujeto principal ya resuelve casi todo; puede mantenerse el verbo pasivo si se desea conservar cercanía formal.'
  revised_spanish_text: Entonces sabrán que yo soy Yahvé[a], cuando ponga fuego en Egipto y todos los que la ayudan[b] sean quebrantados.
  revised_footnotes:
  - marker: a
    text: O «Yahveh». El hebreo usa el nombre divino YHWH, preservado aquí como Yahvé para no sustituirlo por un título.
    reason: source_note
  - marker: b
    text: O «todos sus aliados». El hebreo literalmente dice «todos sus ayudantes/helpers», refiriéndose probablemente a las naciones o fuerzas que apoyan a Egipto.
    reason: lexical_alternative
