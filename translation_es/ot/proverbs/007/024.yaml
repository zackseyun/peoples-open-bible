translation:
  language: es
  text: Y ahora[a], hijos, escúchenme y presten atención a las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niños». El hebreo tiene «hijos», una forma masculina plural usada en la instrucción sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal marcan transición y renovado llamamiento. «Y ahora» conserva ese flujo discursivo de forma natural en español.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos míos
  - muchachos
  - niños
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino que en la instrucción sapiencial funciona como vocativo representativo. En español, «hijos» comunica el llamado directo sin sonar artificial; «hijos míos» sería más interpretativo y añade un pronombre que el hebreo no tiene.
- source_word: שִׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen
  lexicon: HALOT
  rationale: שׁמע con ל expresa escucha atenta dirigida al hablante. «Escúchenme» transmite bien la imperatividad y es idiomático en español actual.
- source_word: וְהַקְשִׁיבוּ
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - atiendan
  - escuchen con atención
  lexicon: HALOT
  rationale: El hifil de קשׁב intensifica la exhortación a escuchar con cuidado. «Presten atención» conserva esa fuerza exhortativa en un registro claro y digno.
- source_word: לְאִמְרֵי
  english_pob_choice: to the words
  chosen_spanish: a las palabras
  alternatives_spanish:
  - a los dichos
  - a los dichos de
  lexicon: HALOT
  rationale: El constructo plural de אִמְרֵי puede ser «palabras» o «dichos». En este contexto poético, «palabras» es la combinación más natural con la línea siguiente y mantiene el paralelismo.
- source_word: פִי
  english_pob_choice: of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - que salen de mi boca
  - de mi hablar
  lexicon: HALOT
  rationale: Se conserva el modismo literal «las palabras de mi boca» para respetar la textura poética y la referencia directa a la voz del hablante.
theological_decisions:
- issue: Vocativo masculino plural en instrucción sapiencial
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos míos
  - hijos e hijas
  - personas
  rationale: El hebreo emplea una forma masculina plural. En español, «hijos» mantiene esa forma sin neutralizarla, pero sigue pudiendo funcionar como llamado representativo dentro de la enseñanza sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones problemáticas; la redacción española sigue de cerca el paralelismo y conserva la fuerza exhortativa sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se usa un registro moderno y digno, con imperativos naturales en español.
  - 'Se conserva el paralelismo de dos mandatos: escuchar y prestar atención.'
