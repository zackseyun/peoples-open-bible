  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mujeres con cuerdas alrededor de sí, sentadas en las calles, quemando salvado. También conserva correctamente la cautela interpretativa sobre el posible significado ritual. Sin embargo, «ceñidas alrededor de sí» suena algo forzado y menos natural que una formulación reflexiva más clara; además, la nota [b] en español desplaza un poco el énfasis del inglés, que aclara específicamente que se trata de salvado usado para producir humo, no de una ofrenda definida.'
  spanish_quality_summary: El texto es comprensible, pero «con cuerdas ceñidas alrededor de sí» resulta rígido y algo poco idiomático en español. Una redacción como «con cuerdas puestas alrededor de sí» o «habiéndose puesto cuerdas alrededor de sí» comunica mejor el gesto descrito por περιθέμεναι sin perder precisión. El resto del verso fluye bien y es adecuado para un español eclesial moderno y claro.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cuerdas», «calles», «quemando» y «salvado» son elecciones apropiadas y alineadas con las decisiones léxicas documentadas. La revisión propuesta solo mejora naturalidad y precisión explicativa en la nota cultural.
  issues:
