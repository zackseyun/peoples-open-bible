translation:
  language: es
  text: Él hizo los pilares, y dos hileras todo alrededor sobre la celosía de uno de ellos, para cubrir los capiteles que estaban encima de las granadas[a][b]; y así hizo para el segundo capitel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las decoraciones de granada». El hebreo dice literalmente «las granadas», probablemente refiriéndose a elementos ornamentales con forma de granada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de este versículo es difícil; algunos intérpretes entienden que las hileras pertenecen a la decoración de granadas alrededor de la celosía de cada capitel.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Él fabricó
  - Él construyó
  lexicon: HALOT
  rationale: El verbo עשה en narrativa suele ser un hacer general. «Hizo» sigue de cerca el valor básico sin forzar un matiz técnico que el contexto no exige.
- source_word: הָעַמּוּדִים
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las columnas
  lexicon: HALOT
  rationale: En contexto arquitectónico, «pilares» es claro y natural en español. Mantiene la imagen estructural sin cambiar a un término más ornamental como «columnas».
- source_word: שְׁנֵי טוּרִים
  english_pob_choice: two rows
  chosen_spanish: dos hileras
  alternatives_spanish:
  - dos filas
  - dos series
  lexicon: HALOT
  rationale: טוּר denota una disposición en línea o serie. «Hileras» funciona bien para una descripción ornamental y suena más natural que «filas» en español arquitectónico.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: Expresa el sentido circundante de forma idiomática en español y conserva la distribución envolvente del ornamento.
- source_word: הַשְּׂבָכָה
  english_pob_choice: the latticework
  chosen_spanish: la malla
  alternatives_spanish:
  - la celosía
  - el entramado
  lexicon: HALOT
  rationale: El término apunta a un trabajo calado o reticulado. «Malla» es breve y comprensible; «celosía» también sería posible, pero puede sugerir otro tipo de diseño más específico.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: la una
  alternatives_spanish:
  - la primera
  - la única
  lexicon: HALOT
  rationale: Con artículo y numeral, el hebreo refiere a una de las dos estructuras sin imponer ordinalidad. «La una» preserva esa precisión algo extraña del original.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - para tapar
  - para recubrir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Cubrir» es la correspondencia directa y suficientemente amplia para el sentido ornamental.
- source_word: הַכֹּתָרֹת
  english_pob_choice: the capitals
  chosen_spanish: los capiteles
  alternatives_spanish:
  - los remates
  - las coronas
  lexicon: HALOT
  rationale: En arquitectura, כותרת corresponde al capitel de una columna o pilar. «Capiteles» es el término técnico adecuado en español.
- source_word: אֲשֶׁר עַל רֹאשׁ
  english_pob_choice: that were on top of
  chosen_spanish: que estaban sobre la parte superior de
  alternatives_spanish:
  - que estaban encima de
  - que estaban en la cima de
  lexicon: HALOT
  rationale: La frase hebrea localiza los capiteles en la parte superior. «Parte superior de» evita ambigüedad y conserva el carácter descriptivo de la construcción.
- source_word: הָרִמֹּנִים
  english_pob_choice: the pomegranates
  chosen_spanish: las granadas
  alternatives_spanish:
  - los granados
  - las granadas ornamentales
  lexicon: HALOT
  rationale: El hebreo dice literalmente «granadas». Se conserva el término literal; el posible sentido ornamental queda implícito y puede aclararse en nota.
- source_word: וְכֵן עָשָׂה
  english_pob_choice: and so he did
  chosen_spanish: y así hizo
  alternatives_spanish:
  - e hizo lo mismo
  - y de igual manera hizo
  lexicon: HALOT
  rationale: Formula de repetición de la acción en la pieza correspondiente. «Y así hizo» reproduce bien el paralelismo y la brevedad del hebreo.
- source_word: לַכֹּתֶרֶת הַשֵּׁנִית
  english_pob_choice: for the second capital
  chosen_spanish: con el segundo capitel
  alternatives_spanish:
  - para el segundo capitel
  - con el otro capitel
  lexicon: HALOT
  rationale: La estructura hebrea alude al capitel correspondiente del segundo pilar. «Con el segundo capitel» expresa la repetición de manera fluida en español, sin añadir información ajena.
translation_notes:
  revision_awareness: La base inglesa revisada añadió solo una coma de lectura después de «latticework»; en español se reflejó la misma relación sintáctica con una pausa natural equivalente, sin cambios de contenido. La traducción sigue de cerca la disposición del hebreo y mantiene la ambigüedad interpretativa señalada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantuvo «capiteles» para כֹתָרֹת en todo el versículo por coherencia arquitectónica.
  - Se conservó «granadas» en el texto principal y se explicó en nota la posible referencia ornamental.
  - «La una» reproduce el valor específico de הָאֶחָת sin convertirlo en ordinal interpretativo.
