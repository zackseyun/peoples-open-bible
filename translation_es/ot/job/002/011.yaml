translation:
  language: es
  text: 'Al oír los tres amigos de Job toda esta desgracia[a] que le había sobrevenido, cada uno vino de su lugar: Elifaz el temanita, Bildad el suhita y Zofar el naamatita[b]. Se pusieron de acuerdo para venir[c] a condolerse con él y a consolarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «calamidad», «adversidad». El hebreo רָעָה aquí designa la desgracia que le sobrevino a Job, no el mal moral que él hubiera cometido.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «de Naama». Los tres gentilicios se han conservado como formas bíblicas transliteradas.'
    reason: lexical_alternative
  - marker: c
    text: O «ir». El hebreo לָבוֹא dice literalmente «venir»; se conserva aquí para reflejar con mayor precisión el verbo fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ / heard
  english_pob_choice: heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - y oyeron
  lexicon: HALOT
  rationale: La cláusula con waw consecutiva introduce la acción temporal de manera narrativa. «Al oír» suena natural en español y preserva el avance temporal sin sobrecargar la frase.
- source_word: שְׁלֹשֶׁת רֵעֵי אִיּוֹב / Job’s three friends
  english_pob_choice: Job’s three friends
  chosen_spanish: los tres amigos de Job
  alternatives_spanish:
  - los tres compañeros de Job
  - los tres amigos que tenía Job
  lexicon: HALOT
  rationale: רֵעַ aquí significa «amigo» en sentido simple; la construcción posesiva se expresa de forma natural en español con «de Job».
- source_word: כָּל הָרָעָה הַזֹּאת / all this trouble
  english_pob_choice: all this trouble
  chosen_spanish: todo este mal[a]
  alternatives_spanish:
  - toda esta calamidad
  - toda esta desgracia
  - toda esta adversidad
  lexicon: HALOT
  rationale: El hebreo רָעָה puede referirse a mal moral o a desgracia/calamidad. Aquí se trata de la desgracia que recayó sobre Job, no de culpa moral en él. «Mal» conserva la amplitud semántica con una nota que aclara el sentido contextual.
- source_word: הַבָּאָה עָלָיו / that had come upon him
  english_pob_choice: that had come upon him
  chosen_spanish: que le había sobrevenido
  alternatives_spanish:
  - que le había venido encima
  - que le había acontecido
  lexicon: HALOT
  rationale: «Sobrevenir» reproduce bien la imagen de algo que cae o llega inesperadamente sobre alguien y mantiene la relación semántica de עַל.
- source_word: וַיָּבֹאוּ אִישׁ מִמְּקֹמוֹ / they came each from his own place
  english_pob_choice: they came each from his own place
  chosen_spanish: cada uno vino de su lugar
  alternatives_spanish:
  - vinieron, cada uno de su lugar
  - cada uno llegó de su lugar
  lexicon: HALOT
  rationale: El distributivo אִישׁ se expresa con «cada uno». «Vino de su lugar» mantiene la referencia espacial sin sonar forzado en español.
- source_word: הַתֵּימָנִי / the Temanite
  english_pob_choice: the Temanite
  chosen_spanish: el temanita
  alternatives_spanish:
  - el de Temán
  lexicon: HALOT
  rationale: Se conserva el gentilicio transliterado de uso bíblico, coherente con el tratamiento de nombres propios y etnónimos.
- source_word: הַשּׁוּחִי / the Shuhite
  english_pob_choice: the Shuhite
  chosen_spanish: el suhita
  alternatives_spanish:
  - el de Suaj
  - el shujita
  lexicon: HALOT
  rationale: Se mantiene la forma gentilicia tradicionalmente reconocible en español bíblico, sin añadir identificación geográfica no explicitada en el texto.
- source_word: הַנַּעֲמָתִי / the Naamathite
  english_pob_choice: the Naamathite
  chosen_spanish: el naamatita
  alternatives_spanish:
  - el de Naama
  lexicon: HALOT
  rationale: Se conserva el etnónimo como gentilicio transliterado, siguiendo el patrón de los otros dos nombres.
- source_word: וַיִּוָּעֲדוּ יַחְדָּו / They agreed together
  english_pob_choice: They agreed together
  chosen_spanish: se pusieron de acuerdo
  alternatives_spanish:
  - se reunieron de común acuerdo
  - convocaron juntos
  - se concertaron
  lexicon: HALOT
  rationale: El niphal de יעד implica concertación deliberada o acuerdo previo. «Se pusieron de acuerdo» comunica esa coordinación sin perder naturalidad.
- source_word: לָבוֹא / to come
  english_pob_choice: to come
  chosen_spanish: para ir
  alternatives_spanish:
  - para venir
  - para llegar
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «venir», en español el movimiento deliberado hacia Job se expresa de modo más natural con «ir» en el infinitivo de finalidad. La elección evita una repetición poco clara tras «vino» y sigue la revisión auditada del inglés, donde se reconoció el problema de fluidez con dos «come» cercanos.
- source_word: לָנוּד לוֹ / to sympathize with him
  english_pob_choice: to sympathize with him
  chosen_spanish: a condolerse con él
  alternatives_spanish:
  - a compadecerse de él
  - a mostrarle simpatía
  - a lamentarse con él
  lexicon: HALOT
  rationale: נוּד aquí expresa duelo, condolencia o simpatía ante el sufrimiento. «Condolerse con él» conserva ese matiz de acompañamiento en el dolor y diferencia bien este verbo de «consolar».
- source_word: וּלְנַחֲמוֹ / and to comfort him
  english_pob_choice: and to comfort him
  chosen_spanish: y a consolarlo
  alternatives_spanish:
  - y a consolarle
  - y a confortarlo
  lexicon: HALOT
  rationale: נחם en este contexto es «consolar». «Consolarlo» es la opción más natural y fiel en español contemporáneo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el inglés auditado osciló entre «to come» y «to go» para לָבוֹא, pero el último pase volvió a «to come» por fidelidad al verbo y a la perspectiva narrativa. En español se resolvió con «para ir» por naturalidad estilística, sin perder el sentido de desplazamiento intencional. También se mantuvo la distinción entre לָנוּד y לְנַחֲמוֹ mediante «condolerse» y «consolar».'
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene la distinción entre «condolerse» y «consolar» para reflejar dos verbos hebreos distintos.
  - 'Los etnónimos se transliteran de forma consistente: temanita, suhita, naamatita.'
  - «Mal» se usa con una nota aclaratoria para no borrar la ambigüedad semántica de רָעָה.
