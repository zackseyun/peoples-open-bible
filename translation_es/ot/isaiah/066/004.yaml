base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/004.yaml
  text: So I also will choose harsh treatment for them[a], and I will bring their fears upon them, because I called and no one answered, I spoke and they did not listen; they did what was evil in my eyes[b], and chose what I did not delight in.
  footnotes:
  - marker: a
    text: Or 'mockeries,' 'delusions,' or 'abusive dealings' for 'harsh treatment' (Heb. תַעֲלֻלֵיהֶם). The Hebrew term is difficult and may denote severe or mocking treatment as judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'what they dread' for 'their fears.'
    reason: lexical_alternative
