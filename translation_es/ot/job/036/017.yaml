base_translation:
  language: en
  yaml_path: translation/ot/job/036/017.yaml
  text: But you are full of the judgment of the wicked[b][a]; judgment and justice seize you.
  footnotes:
  - marker: a
    text: Or 'And you are full of the wicked man's judgment'; the Hebrew is compressed and may refer either to sharing the wicked person's judgment or to being occupied with the kind of judgment associated with the wicked.
    reason: alternative_reading
  - marker: b
    text: Or 'judgment and justice uphold you' or 'seize you'; the Hebrew verb can carry the sense of supporting, sustaining, or taking hold.
    reason: lexical_alternative
