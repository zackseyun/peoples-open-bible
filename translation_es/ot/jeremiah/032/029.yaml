translation:
  language: es
  text: Y los caldeos, que están combatiendo contra esta ciudad, vendrán y prenderán fuego a esta ciudad y la quemarán[a], junto con las casas en cuyos techos quemaron incienso a Baal y derramaron libaciones a otros dioses, para provocar mi ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'los babilonios'. El hebreo dice 'los caldeos', término usado con frecuencia para las fuerzas neobabilónicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: כשדים designa a los caldeos y, por extensión, a las fuerzas neobabilónicas. En español, 'caldeos' conserva la correspondencia más directa con el hebreo; 'babilonios' queda como alternativa contextual.
- source_word: הַנִּלְחָמִים עַל
  english_pob_choice: who are fighting against
  chosen_spanish: que están combatiendo contra
  alternatives_spanish:
  - que están atacando
  - que guerrean contra
  lexicon: HALOT
  rationale: El participio de לחם con על expresa acción hostil en curso. 'Están combatiendo contra' mantiene el aspecto progresivo y el sentido militar sin precisar más de lo que dice el hebreo.
- source_word: וְהִצִּיתוּ ... בָּאֵשׁ
  english_pob_choice: set ... on fire
  chosen_spanish: prenderán fuego a
  alternatives_spanish:
  - encenderán fuego a
  - incendiarán
  lexicon: HALOT
  rationale: El hifil de יצת con באש significa idiomáticamente poner algo en fuego. 'Prenderán fuego a' es natural en español y fiel al valor verbal.
- source_word: וּשְׂרָפוּהָ
  english_pob_choice: and burn it
  chosen_spanish: y la quemarán
  alternatives_spanish:
  - y la consumirán por fuego
  - y la abrasarán
  lexicon: HALOT
  rationale: El sufijo retoma 'la ciudad' (femenino). 'La quemarán' reproduce la acción directa con español claro y sin perder la referencia pronominal.
- source_word: וְאֵת הַבָּתִּים
  english_pob_choice: along with the houses
  chosen_spanish: junto con las casas
  alternatives_spanish:
  - y las casas
  - incluidas las casas
  lexicon: HALOT
  rationale: El marcador de objeto con un segundo objeto amplía el alcance del fuego más allá de la ciudad. 'Junto con las casas' hace visible esa coordinación en español idiomático.
- source_word: אֲשֶׁר קִטְּרוּ עַל גַּגּוֹתֵיהֶם
  english_pob_choice: on whose rooftops they burned incense
  chosen_spanish: en cuyos techos quemaron incienso
  alternatives_spanish:
  - sobre cuyos techos ofrecieron incienso
  - donde en sus techos hicieron humear incienso
  lexicon: HALOT
  rationale: קטר en piel suele significar quemar incienso / hacer humear una ofrenda. 'En cuyos techos quemaron incienso' conserva el lugar del culto y la forma verbal más transparente para el lector hispanohablante.
- source_word: לַבַּעַל
  english_pob_choice: to Baal
  chosen_spanish: a Baal
  alternatives_spanish:
  - para Baal
  lexicon: HALOT
  rationale: La preposición introduce el destinatario/deidad del acto cultual. 'A Baal' es la forma más directa y natural en español.
- source_word: וְהִסִּכוּ נְסָכִים
  english_pob_choice: and poured out drink offerings
  chosen_spanish: y derramaron libaciones
  alternatives_spanish:
  - y derramaron ofrendas de bebida
  - y vertieron libaciones
  lexicon: HALOT
  rationale: נסך con נסכים es la expresión sacrificial estándar para verter ofrendas líquidas. 'Libaciones' preserva el registro cultual; 'derramaeron' mantiene la acción concreta del hebreo.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extranjeros
  lexicon: HALOT
  rationale: אחרים significa 'otros'. 'Otros dioses' es la equivalencia más directa; 'ajenos' o 'extranjeros' añadirían matices no explícitos en el texto.
- source_word: לְמַעַן הַכְעִסֵנִי
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - con el fin de enojarme
  - para irritarme
  lexicon: HALOT
  rationale: 'El infinitivo con למען expresa propósito o resultado, y el hifil de כעס conserva el valor causativo: provocar a alguien a ira. ''Provocarme a ira'' retiene el tono bíblico sin suavizar la reacción divina.'
theological_decisions:
- issue: La reacción divina ante la idolatría
  english_pob_reading: to provoke me to anger
  chosen_spanish_reading: para provocarme a ira
  alternative_spanish_readings:
  - para enojarme
  - para irritarme
  rationale: El hebreo presenta explícitamente que la idolatría busca/provoca la ira de Yahvé. Se conserva esa relación personal y judicial sin atenuarla ni ampliarla.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue de cerca la decisión léxica auditada en inglés para כשדים, participios de acción hostil, el hifil de יצת, שרף, קטר, נסך y כעס. Se reintrodujo el anclaje [a] en 'quemarán[a]' para que la nota alternativa sobre 'caldeos/babilonios' quede correctamente vinculada al término correspondiente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito en primera persona sin sustituir el pronombre divino por una forma de ocultamiento.
  - Se prefirió 'libaciones' por tratarse de un tecnicismo cultual claro en español, coherente con la traducción auditada.
  - '''Otros dioses'' conserva la fuerza directa de אחרים sin introducir un matiz geográfico o cultural no expresado.'
