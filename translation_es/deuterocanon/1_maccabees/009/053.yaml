translation:
  language: es
  text: Y tomaron como rehenes a los hijos de los dirigentes de la tierra, y los colocaron bajo custodia en la ciudadela[a] de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la Acra», la ciudadela fortificada de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se apoderaron de
  - capturaron
  lexicon: BDAG
  rationale: El verbo griego expresa una acción narrativa simple de tomar personas bajo control. «Tomaron» es natural en español y conserva la sobriedad del relato sin añadir matices más fuertes de violencia que el contexto no exige por sí mismo.
- source_word: τοὺς υἱοὺς
  english_pob_choice: the sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los hijos de varones
  lexicon: BDAG
  rationale: El griego dice literalmente «los hijos». En español, «los hijos» reproduce de manera directa el término familiar masculino sin introducir explicaciones innecesarias.
- source_word: τῶν ἡγουμένων
  english_pob_choice: of the leaders
  chosen_spanish: de los dirigentes
  alternatives_spanish:
  - de los líderes
  - de los gobernantes
  lexicon: BDAG
  rationale: ἡγούμενοι nombra a quienes encabezan o dirigen. «Dirigentes» expresa bien esa función y evita cargar el texto con una especificidad política mayor que la del griego.
- source_word: τῆς χώρας
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  lexicon: BDAG
  rationale: χώρα puede abarcar tierra, territorio o región. En español, «de la tierra» mantiene amplitud semántica y suena natural en un contexto histórico.
- source_word: ὁμήρα
  english_pob_choice: as hostages
  chosen_spanish: como rehenes
  alternatives_spanish:
  - como hostajes
  lexicon: LSJ
  rationale: ὁμήρα significa rehenes. «Como rehenes» expresa con claridad la función de las personas tomadas, sin requerir una nota explicativa en el cuerpo principal.
- source_word: ἔθεντο
  english_pob_choice: placed
  chosen_spanish: colocaron
  alternatives_spanish:
  - pusieron
  - depositaron
  lexicon: BDAG
  rationale: El verbo describe ubicación o instalación en una posición determinada. «Colocaron» preserva el valor direccional y suena más formal que «pusieron».
- source_word: ἐν τῇ ἄκρᾳ
  english_pob_choice: in the citadel
  chosen_spanish: en la acrópolis[a]
  alternatives_spanish:
  - en la ciudadela
  - en la fortaleza
  lexicon: LSJ
  rationale: En 1 Macabeos, ἄκρα suele referir la fortaleza/citadel de Jerusalén conocida como la Acra. «Acrópolis» puede funcionar como equivalente histórico-topográfico, pero el término principal para el lugar es la Acra; por eso se ancla una nota con la alternativa más técnica.
- source_word: ἐν φυλακῇ
  english_pob_choice: under guard
  chosen_spanish: bajo custodia
  alternatives_spanish:
  - bajo vigilancia
  - encarcelados
  lexicon: BDAG
  rationale: φυλακή puede significar custodia, guardia o prisión. «Bajo custodia» conserva el sentido de detención vigilada sin implicar necesariamente una prisión física distinta.
translation_notes:
  revision_awareness: El inglés POB revisó la frase final de «put them under guard in the citadel at Jerusalem» a «placed them under guard in the citadel in Jerusalem», afinando el registro y la preposición. La versión española sigue esa lectura, manteniendo el sentido de custodia vigilada y el lugar fortificado dentro de Jerusalén.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la coordinación narrativa del griego.
  - «Como rehenes» preserva el valor lexical de ὁμήρα sin suavizarlo.
  - «Bajo custodia» traduce la idea de φυλακή de forma sobria y precisa.
  - La nota aclara la posible identificación técnica de ἄκρα/Acra sin desplazar el texto principal.
  - Se usa puntuación española y un registro bíblico moderno, digno y legible.
