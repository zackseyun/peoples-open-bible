translation:
  language: es
  text: Entonces Salum hijo de Jabés conspiró contra él, lo hirió delante del pueblo[a], lo mató y reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en público» / «delante de la asamblea» para la expresión difícil קָבָל־עָם.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  english_pob_choice: conspired against him
  chosen_spanish: conspiró contra él
  alternatives_spanish:
  - tramaó contra él
  - fraguó una conspiración contra él
  lexicon: HALOT
  rationale: En el contexto de un cambio de rey, קשר expresa intriga política o traición; «conspiró contra él» comunica bien ese sentido hostil y es natural en español.
- source_word: שַׁלֻּם בֶּן יָבֵשׁ
  english_pob_choice: Shallum son of Jabesh
  chosen_spanish: Salum hijo de Jabés
  alternatives_spanish:
  - Shallum hijo de Jabés
  lexicon: convención de nombres propios
  rationale: Se translitera el nombre propio de forma consistente en español bíblico, y בן se vierte como «hijo de» según la fórmula genealógica normal.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derribó
  lexicon: HALOT
  rationale: נכה puede significar herir o golpear. Dado que el verbo siguiente ya dice explícitamente que murió, «lo hirió» preserva la secuencia sin convertir este verbo en una segunda afirmación de muerte.
- source_word: קָבָל־עָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - en público
  - delante de la asamblea
  lexicon: HALOT
  rationale: La frase es difícil; en este contexto probablemente indica un acto público. «Delante del pueblo» mantiene la ambigüedad de la expresión hebrea y la vuelve comprensible en español.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hizo morir
  - lo puso a muerte
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. «Lo mató» es el equivalente más directo y claro en español, y mantiene la distinción respecto del verbo anterior.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en vez de él
  - llegó a reinar en su lugar
  lexicon: HALOT
  rationale: מלך con תחתיו indica sucesión. «Reinó en su lugar» es natural en español y conserva la idea de sustitución real.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y conserva la secuencia verbal: conspiró, hirió, mató y reinó. Se tuvo en cuenta el ajuste editorial del inglés POB que eliminó el sujeto repetido antes de «put him to death», reflejando en español una coordinación fluida sin añadir sujetos innecesarios.'
  spanish_consistency_notes:
  - Se usa «Dios» / «Yahvé» según corresponda en otros textos; aquí no aparece el nombre divino.
  - Se mantiene la traducción de nombres propios bíblicos en forma española estable (Salum, Jabés).
  - Se conserva la diferencia aspectual entre «hirió» y «mató» para no colapsar los dos verbos hebreos en uno solo.
