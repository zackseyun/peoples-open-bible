translation:
  language: es
  text: Entonces hice subir a los dirigentes de Judá sobre el muro, y dispuse dos grandes coros[a] de acción de gracias en procesión, uno fue hacia la derecha sobre el muro hacia[b] la Puerta del Estiércol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente ‘dos grandes acciones de gracias’; la expresión probablemente se refiere a grupos organizados de acción de gracias, o coros, en procesión, más que a actos abstractos de gratitud.
    reason: lexical_alternative
  - marker: b
    text: O ‘a la Puerta del Estiércol’. La preposición puede traducirse ‘hacia’ o ‘a’ en este contexto direccional.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאַעֲלֶה
  english_pob_choice: Then I brought ... up
  chosen_spanish: hice subir
  alternatives_spanish:
  - llevé hacia arriba
  - hice subir...
  lexicon: HALOT
  rationale: El verbo hebreo en causativo expresa ‘hacer subir/traer arriba’. En español, ‘hice subir’ preserva la causalidad sin añadir información ajena.
- source_word: שָׂרֵי יְהוּדָה
  english_pob_choice: the leaders of Judah
  chosen_spanish: los dirigentes de Judá
  alternatives_spanish:
  - los príncipes de Judá
  - los oficiales de Judá
  lexicon: HALOT
  rationale: שָׂרִים puede significar príncipes, oficiales o líderes. En este contexto cívico y ceremonial, ‘dirigentes’ es claro y no sugiere necesariamente realeza.
- source_word: מֵעַל לַחוֹמָה
  english_pob_choice: onto the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - encima del muro
  - sobre la muralla
  lexicon: HALOT
  rationale: La expresión indica movimiento hasta la parte superior de la estructura. ‘Sobre el muro’ es natural en español y conserva la orientación espacial.
- source_word: וָאַעֲמִידָה
  english_pob_choice: I appointed
  chosen_spanish: dispuse
  alternatives_spanish:
  - apunté
  - establecí
  - puse en posición
  lexicon: HALOT
  rationale: El verbo en causativo puede significar poner, establecer o disponer. ‘Dispuse’ comunica la organización ceremonial que hace Nehemías sin sonar mecánico.
- source_word: תוֹדֹת גְּדוֹלֹת
  english_pob_choice: two great thanksgiving choirs
  chosen_spanish: dos grandes grupos de acción de gracias
  alternatives_spanish:
  - dos grandes coros de acción de gracias
  - dos grandes acciones de gracias
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘acciones de gracias’, pero el contexto sugiere grupos organizados que las realizan. ‘Grupos de acción de gracias’ conserva esa tensión sin imponer ‘coros’ como si fuera explícito en el texto.
- source_word: וְתַהֲלֻכֹת
  english_pob_choice: and processions
  chosen_spanish: y procesiones
  alternatives_spanish:
  - y marchas
  - y recorridos
  lexicon: HALOT
  rationale: El sustantivo derivado de הלך expresa un ir/andar en movimiento organizado. ‘Procesiones’ es la equivalencia española más natural en este contexto ceremonial.
- source_word: לַיָּמִין
  english_pob_choice: to the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - hacia la derecha
  - del lado derecho
  lexicon: HALOT
  rationale: La dirección literal es ‘a la derecha’. ‘A la derecha’ mantiene la sencillez del hebreo y se entiende bien en español.
- source_word: לְשַׁעַר הָאַשְׁפֹּת
  english_pob_choice: toward the Dung Gate
  chosen_spanish: hacia la Puerta del Estiércol
  alternatives_spanish:
  - hacia la Puerta de la Basura
  - hacia la Puerta del Refugo
  lexicon: HALOT
  rationale: אַשְׁפֹּת nombra el portal asociado con desechos/estiércol. ‘Puerta del Estiércol’ mantiene la transparencia léxica del nombre tradicional y evita suavizarlo.
theological_decisions:
- issue: ¿Traducir el grupo de תוֹדֹת como actos abstractos de gratitud o como agrupaciones litúrgicas?
  english_pob_reading: Hebrew 'two great thanksgivings'; the phrase likely refers to organized thanksgiving groups or choirs in procession rather than abstract acts of thanks.
  chosen_spanish_reading: dos grandes grupos de acción de gracias
  alternative_spanish_readings:
  - dos grandes coros de acción de gracias
  - dos grandes acciones de gracias
  rationale: La evidencia contextual favorece que no se trate de dos actos abstractos, sino de dos agrupaciones en marcha. La traducción conserva la ambigüedad útil entre la acción y el grupo que la ejecuta.
  doctrine_reference: Neh 12:31; lexical context of public worship and procession
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: mantuve un registro formal y natural, sin ‘estacioné’, usando un verbo español más idiomático para וָאַעֲמִידָה, y conservé la lectura direccional hacia la Puerta del Estiércol.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - ‘Judá’ se mantiene como topónimo/entidad colectiva, no como ‘Judea’.
  - ‘Puerta del Estiércol’ conserva el nombre transparente del portal sin eufemismo.
  - Se prefirió ‘acción de gracias’ por la carga litúrgica del hebreo תוֹדֹת, pero sin perder la noción de grupos organizados en la procesión.
