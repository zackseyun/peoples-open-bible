base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/018.yaml
  text: Come down from your glory and sit in thirst[a], O inhabitant, daughter of Dibon, for the destroyer of Moab has come up against you[b]; he has destroyed your fortresses.
  footnotes:
  - marker: a
    text: Or 'sit in a thirsty place' / 'dwell in parched ground.' The Hebrew phrase may describe either thirst itself or the dry condition/location to which Dibon is reduced.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter of Dibon,' a common prophetic personification of a city and its population as a woman.
    reason: cultural_note
