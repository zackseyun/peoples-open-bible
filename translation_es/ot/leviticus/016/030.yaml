review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: causalidad («Porque»), referencia temporal («en este día»), término cultual de כפר, propósito de purificación, pecados, presencia de Yahvé y resultado final de limpieza. Sin embargo, «expiación» estrecha algo más que el inglés auditado «atonement» y la cláusula final «serán limpios» suena menos natural que una formulación resultativa más idiomática en español. También conviene preservar la alternativa documentada sobre el sujeto implícito de יְכַפֵּר.'
  spanish_quality_summary: El español es claro y digno, pero «se hará expiación» + «serán limpios» resulta algo rígido. «Se hará expiación por ustedes para purificarlos; de todos sus pecados delante de Yahvé quedarán limpios» mejora la fluidez y mantiene la distinción entre el acto de purificar y el estado resultante. Se elimina la coma innecesaria tras «pecados» para seguir mejor el flujo del hebreo y del POB inglés revisado.
  glossary_alignment: Se alinea bien con el proyecto en «Yahvé». No hay otros términos del glosario en disputa. Para כפר, «expiación» es aceptable en español, aunque requiere nota porque el rastro inglés conservó explícitamente la alternativa «él hará expiación por ustedes» debido al verbo singular sin sujeto expreso.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre el sujeto implícito de יְכַפֵּר
    rationale: El POB inglés preserva como alternativa importante «he will make atonement for you». Dado que el español también opta por una construcción impersonal, debe conservarse esa alternativa en nota para reflejar el dato fuente y la decisión documentada.
  - severity: low
    issue: «Serán limpios» es correcto pero menos natural que «quedarán limpios»
    rationale: El hebreo final expresa el estado resultante después de la purificación. «Quedarán limpios» comunica con más naturalidad en español ese resultado sin confundirlo con la acción anterior de «purificarlos».
  - severity: low
    issue: La coma en «de todos sus pecados, delante de Yahvé» interrumpe innecesariamente la frase
    rationale: El hebreo y la revisión inglesa fluyen sin esa pausa. En español, quitar la coma mejora la lectura y evita segmentar artificialmente «de todos sus pecados delante de Yahvé».
  revised_spanish_text: Porque en este día se hará expiación[a] por ustedes para purificarlos; de todos sus pecados delante de Yahvé quedarán limpios.
  revised_footnotes:
  - marker: a
    text: 'O: «él hará expiación por ustedes». El verbo hebreo es singular y en esta cláusula no expresa el sujeto explícitamente.'
    reason: lexical_alternative
  revision_rationale: Se añadió la nota necesaria para preservar la alternativa documentada del verbo singular sin sujeto explícito; se ajustó «serán limpios» a «quedarán limpios» para un español más natural que conserve el estado resultante; y se quitó la coma antes de «delante de Yahvé» para reflejar mejor el flujo del original y de la auditoría inglesa.
