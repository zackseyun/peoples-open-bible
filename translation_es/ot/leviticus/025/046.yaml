translation:
  language: es
  text: Podrán dejarlos en herencia a sus hijos después de ustedes[a], para heredarlos como posesión hereditaria permanente; de ellos podrán exigir trabajo. Pero sobre sus hermanos, los hijos de Israel[b], ningún hombre dominará a su hermano con dureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «podrán legarlos a sus hijos después de ustedes como propiedad hereditaria».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» y «hijos de Israel» reproducen directamente los términos de parentesco masculinos del hebreo; el mandato se dirige a los israelitas como parientes del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְנַחֲלְתֶּם
  english_pob_choice: you may pass them on as an inheritance
  chosen_spanish: Podrán entregarlos como herencia
  alternatives_spanish:
  - podrán bequeatharlos
  - podrán hacerlos una posesión heredada
  lexicon: HALOT
  rationale: El hebreo expresa la transmisión hereditaria de estas personas como propiedad legal. «Entregarlos como herencia» conserva el valor jurídico-hereditario sin volverlo demasiado técnico en español.
- source_word: לִבְנֵיכֶם אַחֲרֵיכֶם
  english_pob_choice: to your sons after you
  chosen_spanish: a sus hijos después de ustedes
  alternatives_spanish:
  - a sus hijos varones después de ustedes
  - a sus descendientes después de ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos»; en español, «hijos» mantiene el término filial masculino genérico del texto legal y evita neutralizar una forma marcada en el original.
- source_word: לָרֶשֶׁת אֲחֻזָּה
  english_pob_choice: to inherit as a possession
  chosen_spanish: para poseerlos como heredad perpetua
  alternatives_spanish:
  - para heredarlos como posesión
  - como propiedad hereditaria
  lexicon: HALOT
  rationale: La expresión combina herencia y posesión hereditaria. «Heredad perpetua» transmite el carácter de posesión hereditaria duradera, y «poseerlos» mantiene el matiz de propiedad.
- source_word: לְעֹלָם
  english_pob_choice: permanently
  chosen_spanish: perpetua
  alternatives_spanish:
  - permanente
  - para siempre
  lexicon: HALOT
  rationale: En lenguaje legal, עוֹלָם señala duración indefinida o permanente dentro del marco de la norma. «Perpetua» comunica esa vigencia legal sin exagerar hacia una eternidad abstracta.
- source_word: בָּהֶם תַּעֲבֹדוּ
  english_pob_choice: from them you may exact labor
  chosen_spanish: de ellos podrán exigir trabajo
  alternatives_spanish:
  - de ellos podrán sacar trabajo
  - podrán hacerlos trabajar
  lexicon: HALOT
  rationale: עבד aquí implica trabajo forzado o exigido. «Exigir trabajo» preserva la coerción y evita suavizar la dureza social del texto.
- source_word: וּבְאַחֵיכֶם בְּנֵי יִשְׂרָאֵל
  english_pob_choice: But over your brothers, the sons of Israel
  chosen_spanish: Pero sobre sus hermanos, los hijos de Israel
  alternatives_spanish:
  - Pero respecto de sus hermanos, los israelitas
  - Pero entre sus hermanos, los hijos de Israel
  lexicon: HALOT
  rationale: La frase contrasta con la cláusula anterior y conserva la kinship language. «Hermanos» y «hijos de Israel» mantienen la estructura appositiva del hebreo.
- source_word: אִישׁ בְּאָחִיו
  english_pob_choice: no man shall rule over his brother
  chosen_spanish: ningún hombre dominará a su hermano
  alternatives_spanish:
  - nadie dominará a su hermano
  - ningún hombre gobernará a su hermano
  lexicon: HALOT
  rationale: El distributivo hebreo exige una prohibición general para cada israelita frente a su par. «Dominará» refleja bien la relación de poder implícita en el contexto esclavista.
- source_word: לֹא תִרְדֶּה בוֹ
  english_pob_choice: shall rule over
  chosen_spanish: dominará
  alternatives_spanish:
  - reinará sobre
  - gobernará sobre
  lexicon: HALOT
  rationale: רדה significa ejercer dominio o gobernar sobre. En este contexto, «dominar» es más natural en español y conserva la fuerza de la prohibición.
- source_word: בְּפָרֶךְ
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - duramente
  - con brutalidad
  lexicon: HALOT
  rationale: פרך denota dureza opresiva o trabajo impuesto con severidad. «Con dureza» mantiene el adverbio de modo sin añadir más interpretación de la necesaria.
theological_decisions:
- issue: Kinship language in Israelite legal obligation
  english_pob_reading: Retain 'brothers' and 'sons of Israel' rather than gender-neutral substitutes.
  chosen_spanish_reading: Mantener «hermanos» y «hijos de Israel» en vez de sustituirlos por expresiones neutras.
  alternative_spanish_readings:
  - fellow Israelites
  - compatriotas
  rationale: El hebreo usa términos masculinos explícitos para expresar la solidaridad del pacto y la obligación legal. En español, conservar esa forma evita borrar una marca semántica del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Directness of slavery/labor language
  english_pob_reading: Use inheritance/property and compelled-labor language without softening the social reality.
  chosen_spanish_reading: Conservar el lenguaje de herencia y de trabajo exigido, sin suavizar la realidad social del pasaje.
  alternative_spanish_readings:
  - servicio
  - empleo
  rationale: El hebreo habla de posesión hereditaria y de labor exigida sobre personas. La traducción debe preservar esa dureza textual y no transformarla en un lenguaje más benigno.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto sigue la última pasada revisada, que no introdujo cambios; se mantiene la decisión de conservar el peso jurídico de la herencia y la dureza del trabajo exigido, con la formulación española ajustada para publicación y sin suavizar la relación de dominio prohibida entre israelitas.
  spanish_consistency_notes:
  - Se mantiene «hijos» para reflejar el hebreo masculino y la terminología hereditaria legal.
  - «Heredad perpetua» y «con dureza» conservan el marco jurídico y opresivo del versículo.
  - «Dominará» se usa para רדה en coherencia con el contexto de poder y coerción.
