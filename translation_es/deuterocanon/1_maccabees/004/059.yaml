revisions:
- from: Y Judas, sus hermanos y toda la asamblea de Israel decretaron que los días de la dedicación del altar se celebraran[a] en sus tiempos señalados, año tras año, durante ocho días, desde el vigésimo quinto día del mes de Quisleu, con alegría y gozo.
  to: Y Judas, sus hermanos y toda la asamblea de Israel decretaron que los días de la dedicación del altar se observaran en sus tiempos señalados, año tras año, durante ocho días, desde el vigésimo quinto día del mes de Quisleu[a], con alegría y gozo.
  rationale: Se ajusta «se celebraran» a «se observaran» para reflejar mejor la fuerza de observancia festiva recurrente de ἵνα ἄγωνται en este contexto. También se reubica la nota textual al nombre del mes, que es donde corresponde la explicación de la transliteración Χασελεύ/Quisleu.
  reviewer_model: gpt-5.4
