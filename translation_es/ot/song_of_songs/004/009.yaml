base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/009.yaml
  text: You have captured my heart[a], my sister, my bride; you have captured my heart with one glance of your eyes[c][b], with one jewel of your necklace.
  footnotes:
  - marker: a
    text: Or 'You have ravished my heart' (traditional); the Hebrew verb is rare and conveys that the beloved has powerfully moved or overwhelmed the speaker's heart.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with one from your eyes.' The sense is likely 'with a single glance.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew may also be understood as 'with one chain/ornament from your neck' or 'with one of the ornaments on your neck.'
    reason: lexical_alternative
