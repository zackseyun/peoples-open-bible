base_translation:
  language: en
  yaml_path: translation/ot/isaiah/024/023.yaml
  text: Then the moon will be abashed[a], and the sun ashamed, for Yahweh of hosts reigns on Mount Zion and in Jerusalem[b], and before his elders will be glory.
  footnotes:
  - marker: a
    text: Or 'before its elders, glory,' if the suffix is taken to refer to Zion/Jerusalem rather than to the LORD.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'glory' is a terse final noun; the clause may also be understood as 'and before his elders is his glory' or simply 'and before his elders, glory.'
    reason: lexical_alternative
