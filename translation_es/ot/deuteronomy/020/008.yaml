    text: «Hermanos» aquí se refiere a sus compatriotas israelitas o a sus compañeros de armas.
    reason: cultural_note
  revision_rationale: 'La revisión conserva el sentido del borrador pero mejora la fidelidad al hebreo y al audit trail inglés en tres puntos: (1) reemplaza «para que no haga desfallecer» por «no sea que derrita», que refleja mejor la advertencia preventiva y la metáfora de מסס; (2) restaura la repetición explícita de «corazón» al final para corresponder a כִּלְבָבוֹ; y (3) mueve la literalidad más dura de «blando/tierno de corazón» a una nota, dejando en el texto principal una formulación más natural en español: «de corazón débil».'
