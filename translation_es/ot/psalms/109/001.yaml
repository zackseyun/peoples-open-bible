translation:
  language: es
  text: Para el director del coro[a]. De David. Un salmo. Dios de mi alabanza, no calles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al director musical» o «Para el maestro de coro»; el término hebreo del encabezado puede referirse al responsable musical.
    reason: alternative_reading
  - marker: b
    text: O «no guardes silencio».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director musical
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala al responsable musical. 'Director del coro' comunica bien la función en español moderno sin perder el valor superscriptivo.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición admite ambigüedad de autoría, dedicación o asociación. 'De David' preserva esa apertura sin resolverla indebidamente.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto
  lexicon: HALOT
  rationale: Es el rótulo de género estándar y claro en español eclesial.
- source_word: אֱלֹהֵי
  english_pob_choice: O God of
  chosen_spanish: Dios de
  alternatives_spanish:
  - ¡Oh Dios de!
  - Dios mío, de
  lexicon: HALOT
  rationale: La forma hebrea está en vocativo en la construcción; en español, 'Dios de' conserva la relación genitiva y el valor de apelación queda apoyado por el contexto oracional.
- source_word: תְהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi gloria
  - mi canto de alabanza
  lexicon: HALOT
  rationale: '''Alabanza'' es el equivalente directo y natural de la raíz תהלּה. Mantiene la expresión compacta ''Dios de mi alabanza'' sin convertirla en una paráfrasis explicativa.'
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no te
  - no seas
  lexicon: HALOT
  rationale: Introduce una prohibición/súplica negativa de forma natural en español.
- source_word: תֶּחֱרַשׁ
  english_pob_choice: be silent
  chosen_spanish: ccalles
  alternatives_spanish:
  - guardes silencio
  - te calles
  - permanezcas callado
  lexicon: HALOT
  rationale: En contexto de ruego a Dios, 'calles' reproduce de manera breve y natural la idea de no permanecer sin responder; se mantiene la fuerza del verbo sin añadir matices ajenos.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezado
  english_pob_reading: Retain the ambiguous 'Of David' in the main text
  chosen_spanish_reading: Conservar 'De David' como fórmula ambigua
  alternative_spanish_readings:
  - Para David
  - Por David
  - Con David
  rationale: La frase hebrea no obliga a una sola relación. 'De David' permite lectura de autoría, dedicación o asociación, respetando la tensión documentada por el POB inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de la súplica final dirigida a Dios
  english_pob_reading: do not be silent
  chosen_spanish_reading: no calles
  alternative_spanish_readings:
  - no te calles
  - no guardes silencio
  - no permanezcas callado
  rationale: El español debe expresar la petición urgente sin suavizarla. 'No calles' es idiomático, breve y mantiene el peso del ruego del salmista.
  doctrine_reference: Psalmic lament / divine responsiveness
- issue: Construcción 'Dios de mi alabanza'
  english_pob_reading: O God of my praise
  chosen_spanish_reading: Dios de mi alabanza
  alternative_spanish_readings:
  - Dios de mi gloria
  - Dios, mi alabanza
  rationale: Se conserva la formulación compacta y potencialmente polisémica del hebreo. 'Alabanza' mantiene el vínculo léxico con תהלּה sin reexplicar el sintagma.
  doctrine_reference: Lexical transparency / poetic construct
translation_notes:
  revision_awareness: 'El texto base coincide con la revisión más reciente: no se registraron cambios aplicados y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda en el cuerpo principal; aquí el texto hebreo dice אֱלֹהֵי, por eso se traduce 'Dios'.
  - Se mantuvo la ambigüedad de לְדָוִד con 'De David', siguiendo la práctica POB de no sobreprecisar encabezados.
  - '''Alabanza'' se eligió por fidelidad semántica a תהלּה y por la naturalidad de la construcción nominal en español.'
  - La orden negativa se formuló con un español breve y litúrgicamente claro, sin cambiar el tono de súplica del verso.
