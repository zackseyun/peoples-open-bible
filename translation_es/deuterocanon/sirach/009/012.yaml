  yaml_path: translation/deuterocanon/sirach/009/012.yaml
  text: Lest your heart turn aside to her[c][b][a], and in blood you be brought down to the Pit.
  footnotes:
  - marker: a
    text: Hebrew has 'to her' (feminine singular); the sense may depend on the preceding context. The Greek parallel instead refers to 'the ungodly,' which supports the more general 'to them' here.
    reason: alternative_reading
  - marker: b
    text: Or 'through bloodshed' or 'with bloodguilt'; Hebrew 'in bloods' often carries the sense of violent bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: c
    text: '''The Pit'' may also be rendered ''the grave'' or ''destruction.'' The Greek parallel has ''Hades,'' pointing to death/the underworld as the outcome in view.'
    reason: lexical_alternative
