translation:
  language: es
  text: ¿A quién[a], entonces, haréis semejante a Dios, y qué semejanza pondréis en comparación con él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y a quién compararéis a Dios, y qué forma pondréis a su lado?»'
    reason: Preserva la alternativa léxica documentada en el POB inglés para el inicio con וְ y para דְּמוּת/תַּעַרְכוּ, de manera natural en español.
lexical_decisions:
- source_word: וְ/אֶל מִי
  english_pob_choice: To whom, then,
  chosen_spanish: ¿A quién, entonces,
  alternatives_spanish:
  - ¿Y a quién
  - ¿A quién
  lexicon: HALOT
  rationale: אֶל con מִי introduce el objeto de comparación; en español, «¿A quién?» expresa con naturalidad esa relación. El וְ se conserva como transición discursiva con «entonces», que mantiene el tono retórico sin añadir contenido nuevo.
- source_word: תְּדַמְּי֣וּ/ן
  english_pob_choice: will you liken
  chosen_spanish: le haréis semejante
  alternatives_spanish:
  - compararéis
  - haréis comparable
  lexicon: HALOT
  rationale: דמה aquí tiene fuerza de comparar o hacer semejante. «Haréis semejante» conserva la idea de asemejar/poner en relación, y evita un calco pesado en español.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - el Dios
  lexicon: HALOT
  rationale: En este contexto de Isaías 40, אֵל se refiere al Dios verdadero en contraste con los ídolos. «Dios» preserva esa referencia sin convertirla en un indefinido «un dios».
- source_word: דְּמ֖וּת
  english_pob_choice: likeness
  chosen_spanish: semejanza
  alternatives_spanish:
  - imagen
  - forma
  - parecido
  lexicon: HALOT
  rationale: דְּמוּת denota semejanza o correspondencia. «Semejanza» es el equivalente más directo y fluido en español para esta pregunta retórica.
- source_word: תַּ֥עַרְכוּ
  english_pob_choice: will you compare
  chosen_spanish: compararéis
  alternatives_spanish:
  - pondréis al lado
  - colocaréis junto a
  lexicon: HALOT
  rationale: ערך, con el objeto y el pronombre final, apunta a poner algo en paralelo para comparar. «Compararéis» comunica esa función retórica de manera clara y fiel.
- source_word: לֽ/וֹ
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: Aunque el hebreo marca relación direccional con ל, en español la comparación se expresa más naturalmente con «con él». Esto conserva el sentido de poner una semejanza junto a Dios para compararla, sin perder la referencia personal a Dios.
theological_decisions:
- issue: Referencia de אֵל en un contexto de polémica contra los ídolos
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - el Dios
  rationale: El contexto inmediato afirma la incomparable grandeza del único Dios frente a toda representación fabricada. «Dios» preserva esa fuerza teológica sin introducir una formulación doctrinal distinta.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada. La traducción mantiene el valor interrogativo-retórico del hebreo y usa una sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל en coherencia con el contexto de Isaías 40.
  - Se evitó «SEÑOR» porque el texto hebreo aquí no contiene יהוה.
  - Se prefirió «semejanza» para דְּמוּת y «compararéis» para ערך para conservar el paralelismo retórico.
  - La preposición final se vertió como «con él» por naturalidad española, sin perder la referencia al objeto de comparación.
