translation:
  language: es
  text: 'Y dijo: «Por favor, déjame ir, porque tenemos un sacrificio familiar en la ciudad, y mi hermano me ha ordenado. Ahora, si he hallado favor en tus ojos, por favor, déjame escapar[a] y ver a mis hermanos[b]». Por eso no ha venido a la mesa del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «déjame escabullirme» o «permíteme escapar». El verbo hebreo puede expresar escape o salida discreta.'
    reason: lexical_alternative
  - marker: b
    text: «Mis hermanos» puede referirse a los hermanos literales de David o, más ampliamente, a sus parientes varones dentro del grupo familiar.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁלְּחֵנִי נָא
  english_pob_choice: Please let me go
  chosen_spanish: Por favor, déjame ir
  alternatives_spanish:
  - Por favor, despídeme
  - Por favor, déjame salir
  lexicon: HALOT
  rationale: El imperativo de enviar/soltar con el sufijo de primera persona pide permiso para partir. «Déjame ir» es natural en español y conserva la cortesía de נָא.
- source_word: זֶבַח מִשְׁפָּחָה
  english_pob_choice: a family sacrifice
  chosen_spanish: un sacrificio familiar
  alternatives_spanish:
  - un sacrificio de familia
  - un sacrificio de clan
  lexicon: HALOT
  rationale: זֶבַח conserva el sentido cultual de sacrificio, y מִשְׁפָּחָה marca el carácter familiar o de linaje. «Sacrificio familiar» mantiene ambos matices sin expandir el texto.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La locución locativa es directa; «en la ciudad» es la forma más natural y fiel en español.
- source_word: וְהוּא צִוָּה לִי אָחִי
  english_pob_choice: and my brother has commanded me
  chosen_spanish: y mi hermano me lo ha ordenado
  alternatives_spanish:
  - y mi hermano me ha mandado esto
  - y mi hermano me ha dado esta orden
  lexicon: HALOT
  rationale: Se conserva el sujeto «mi hermano» y el valor fuerte de צוה con «ha ordenado». El objeto implícito se hace explícito con «lo» para que el español sea claro sin añadir contenido nuevo.
- source_word: אִם מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: if I have found favor in your eyes
  chosen_spanish: si he hallado favor en tus ojos
  alternatives_spanish:
  - si he hallado gracia ante ti
  - si he hallado favor ante tus ojos
  lexicon: HALOT
  rationale: Es una fórmula de cortesía hebrea. «En tus ojos» preserva la imagen literal y el registro reverente; «favor» mantiene la equivalencia tradicional sin sustituirla por una paráfrasis.
- source_word: אִמָּלְטָה נָּא
  english_pob_choice: please let me escape
  chosen_spanish: escápame[a], por favor
  alternatives_spanish:
  - déjame escapar, por favor
  - permíteme escapar, por favor
  lexicon: HALOT
  rationale: El verbo מלט puede significar escapar o librarse con rapidez y discreción. «Escápame» conserva esa fuerza verbal y la opción de salida sigilosa que el contexto exige. Se invierte el orden en español para sonar natural.
- source_word: וְאֶרְאֶה אֶת אֶחָי
  english_pob_choice: and see my brothers
  chosen_spanish: y veré a mis hermanos
  alternatives_spanish:
  - y veré a mis hermanos de familia
  - y visitaré a mis hermanos
  lexicon: HALOT
  rationale: ראה significa literalmente «ver». Se mantiene «mis hermanos» para conservar la referencia masculina o de parentela cercana que el texto hebreo expresa.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La frase introduce la explicación de la ausencia. «Por eso» es idiomática y clara en español, con un tono algo más directo que «Por tanto».
- source_word: לֹא בָא
  english_pob_choice: he has not come
  chosen_spanish: no ha venido
  alternatives_spanish:
  - no vino
  - no ha llegado
  lexicon: HALOT
  rationale: El perfecto explica el estado actual de ausencia en la mesa. «No ha venido» suena natural y mantiene el valor resultativo.
- source_word: אֶל שֻׁלְחַן הַמֶּלֶךְ
  english_pob_choice: to the king’s table
  chosen_spanish: a la mesa del rey
  alternatives_spanish:
  - a la mesa real
  - ante la mesa del rey
  lexicon: HALOT
  rationale: La construcción constructa se vierte de modo natural como «la mesa del rey», conservando el marco de banquete real.
theological_decisions:
- issue: Tratamiento del nombre divino implícito no presente en el versículo
  english_pob_reading: No explicit divine-name issue in this verse
  chosen_spanish_reading: No se introduce ningún equivalente devocional adicional
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El versículo no contiene ni cita ni alusión necesaria al Nombre divino; por tanto, no corresponde introducirlo. Se respeta el texto tal como está.
  doctrine_reference: Sola Scriptura / fidelidad textual
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la revisión más reciente: se prefirió «escápame» en lugar de «déjame escabullirme/escapar» para acercarse más a אִמָּלְטָה, y se evitó añadir énfasis no explicitado como «mismo». También se mantuvo una equivalencia formal-optativa en la clausula final con «Por eso».'
  spanish_consistency_notes:
  - Se usa «favor» para חֵן, manteniendo el giro bíblico estable.
  - Se conserva «mis hermanos» para אֶחָי, sin neutralizar el plural masculino o de parentela.
  - Se eligió «mesa del rey» como expresión natural y fiel al constructo hebreo.
  - La puntuación de diálogo sigue un estilo bíblico claro y publicable en español.
