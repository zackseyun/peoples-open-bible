translation:
  language: es
  text: Así pues, nos pareció bien escribir a los reyes y a los países[a], para que no procuren hacerles daño, ni les hagan la guerra a ellos ni a sus ciudades y sus países[b], y para que no se unan en alianza con los que les hacen la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: χώρα puede significar «país», «tierra» o «territorio». En el contexto diplomático, «países» conserva el paralelo político con «reyes» y también puede entenderse como «territorios».
    reason: lexical_alternative
  - marker: b
    text: El texto griego de Swete tiene aquí una forma problemática («τὰς Α πόλεις»), pero el sentido en contexto es claramente «sus ciudades».
    reason: textual_variant
lexical_decisions:
- source_word: ἤρεσεν
  english_pob_choice: it seemed good
  chosen_spanish: nos pareció bien
  alternatives_spanish:
  - nos agradó
  - se decidió
  lexicon: LSJ
  rationale: La fórmula epistolar oficial no expresa solo agrado subjetivo, sino aprobación/decisión; «nos pareció bien» conserva ese tono formal sin volverla rígida.
- source_word: γράφψαι / γράψαι
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - enviar una carta
  - redactar
  lexicon: LSJ
  rationale: El infinitivo griego es simplemente «escribir»; el contexto administrativo sugiere carta oficial, pero el verbo base debe mantenerse.
- source_word: τοῖς βασιλεῦσιν
  english_pob_choice: to the kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - a los monarcas
  - a los soberanos
  lexicon: LSJ
  rationale: El destinatario son gobernantes concretos; «reyes» reproduce la referencia política con naturalidad en español.
- source_word: ταῖς χώραις
  english_pob_choice: to the countries
  chosen_spanish: a los países
  alternatives_spanish:
  - a las tierras
  - a los territorios
  - a las regiones
  lexicon: LSJ
  rationale: χώρα puede ser tierra, territorio o país. En paralelo con «reyes», «países» comunica mejor entidades políticas receptoras de una carta, aunque mantiene la ambigüedad territorial del griego.
- source_word: μὴ ἐκζητήσωσιν αὐτοῖς κακά
  english_pob_choice: that they should not seek harm against them
  chosen_spanish: para que no busquen el mal contra ellos
  alternatives_spanish:
  - para que no procuren daño contra ellos
  - para que no tramen el mal contra ellos
  lexicon: LSJ
  rationale: ἐκζητέω con κακά expresa buscar activamente daño; «buscar el mal» preserva la fuerza verbal sin añadir una conjetura como «tramen».
- source_word: μὴ πολεμήσωσιν αὐτοὺς
  english_pob_choice: should not make war against them
  chosen_spanish: ni hagan guerra contra ellos
  alternatives_spanish:
  - ni peleen contra ellos
  - ni les hagan la guerra
  lexicon: LSJ
  rationale: «Hagan guerra» refleja el valor formal-militar de πολεμέω mejor que un simple «pelear».
- source_word: τὰς πόλεις αὐτῶν
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblaciones
  - sus villas
  lexicon: LSJ
  rationale: πόλις aquí es el sentido estándar de ciudades/cabeceras urbanas; «ciudades» es transparente y fiel.
- source_word: καὶ τὰς χώρας αὐτῶν
  english_pob_choice: their countries
  chosen_spanish: sus países
  alternatives_spanish:
  - sus tierras
  - sus territorios
  lexicon: LSJ
  rationale: Se mantiene la misma elección para χώρα en todo el versículo por consistencia. En español «países» es algo menos literal que «tierras», pero corresponde al campo político del pasaje.
- source_word: συμμαχώσιν
  english_pob_choice: join in alliance with
  chosen_spanish: se unan en alianza con
  alternatives_spanish:
  - se alíen con
  - se asocien militarmente con
  lexicon: LSJ
  rationale: El verbo expresa cooperación aliada, no solo amistad política. «Unirse en alianza con» conserva la relación formal y sugiere apoyo militar.
- source_word: τοῖς πολεμοῦσιν αὐτούς
  english_pob_choice: those who are making war against them
  chosen_spanish: los que les hacen la guerra
  alternatives_spanish:
  - los que guerrean contra ellos
  - los que están guerreando contra ellos
  lexicon: LSJ
  rationale: El participio presente indica una hostilidad en curso. «Les hacen la guerra» comunica bien esa acción continua en español natural.
translation_notes:
  revision_awareness: 'Coincide con el sentido del griego de Swete y con el audit trail inglés: la única tensión notable es χώρα, donde se mantiene una equivalencia política con «países» y se documenta la alternativa territorial. También se conserva la lectura contextual de «sus ciudades» frente a la variante textual de Swete.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre «países» para χώρα y «ciudades» para πόλεις.
  - 'La secuencia negativa reproduce las tres cláusulas del griego: no buscar el mal, no hacer guerra, no unirse en alianza.'
  - Se conserva un tono administrativo-formal adecuado para una carta oficial antigua, sin arcaísmos innecesarios.
