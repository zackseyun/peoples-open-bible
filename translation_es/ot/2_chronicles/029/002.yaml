  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה se vierte correctamente como «Yahvé» y no como «SEÑOR». No hay conflictos con otros términos doctrinales. La conservación de «padre» en el cuerpo principal concuerda con la racionalidad auditada, siempre que la nota explicativa se coloque sobre ese término.'
