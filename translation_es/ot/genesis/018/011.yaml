- from: Ahora bien, Abraham y Sara eran viejos[a], avanzados en días; ya había cesado en Sara la costumbre de las mujeres.
  to: Ahora bien, Abraham y Sara eran ancianos, avanzados en días; había cesado para Sara el camino[a] de las mujeres.
  rationale: Se ajusta el registro de «viejos» a «ancianos» para un español bíblico más digno y natural. Se restituye el modismo más cercano al hebreo y al POB inglés («el camino de las mujeres»), manteniendo la explicación explícita en nota. «Para Sara» representa bien לְשָׂרָה en español idiomático dentro de esta construcción.
