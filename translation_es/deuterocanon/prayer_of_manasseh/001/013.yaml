translation:
  language: es
  text: 'Te suplico[a], implorándote: perdóname, Señor, perdóname, y no me destruyas junto con mis actos inicuos, ni, airado para siempre, tengas en cuenta mis maldades en mi contra, ni me condenes en las partes más bajas de la tierra; porque tú, Señor, eres el Dios de los que se arrepienten.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «te ruego» o «te pido»; el griego expresa una súplica intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτοῦμαι
  english_pob_choice: I beg
  chosen_spanish: Te suplico
  alternatives_spanish:
  - Te ruego
  - Te pido
  lexicon: BDAG
  rationale: En una oración penitencial, el verbo expresa una petición intensa. «Te suplico» transmite mejor la urgencia que «te pido» y es más natural en español que una calca demasiado rígida.
- source_word: δεόμενός σου
  english_pob_choice: pleading with you
  chosen_spanish: implorándote
  alternatives_spanish:
  - suplicándote
  - besechándote
  lexicon: BDAG
  rationale: El participio refuerza la postura de humildad y ruego. «Implorándote» conserva ese matiz intensivo y funciona bien con el flujo de la frase.
- source_word: ἄνες μοι
  english_pob_choice: forgive
  chosen_spanish: perdóname
  alternatives_spanish:
  - absuélveme
  - perdona mis pecados
  lexicon: BDAG
  rationale: En este contexto penitencial, el imperativo pide remisión del pecado/culpa. «Perdóname» es claro, fiel y de uso amplio en español bíblico contemporáneo.
- source_word: συναπολέσῃς
  english_pob_choice: destroy me along with
  chosen_spanish: me destruyas junto con
  alternatives_spanish:
  - me destruyas con
  - me aniquiles junto con
  lexicon: BDAG
  rationale: La preposición συν- añade la idea de destrucción conjunta. «Junto con» preserva esa fuerza sin sonar forzado en español.
- source_word: ταῖς ἀνομίαις μου
  english_pob_choice: my lawless deeds
  chosen_spanish: mis actos de iniquidad
  alternatives_spanish:
  - mis actos de impiedad
  - mis obras de maldad
  - mis actos de lawlessness
  lexicon: BDAG
  rationale: «ἀνομία» tiene un peso más fuerte que «pecados» y apunta a iniquidad/lawlessness. «Actos de iniquidad» mantiene la gravedad moral y evita aplanar el término.
- source_word: μηδὲ εἰς τὸν αἰῶνα μηνίσας τηρήσῃς τὰ κακά μοι
  english_pob_choice: nor, being angry forever, keep my evils against me
  chosen_spanish: ni, airado para siempre, guardes mis maldades contra mí
  alternatives_spanish:
  - ni, enojado para siempre, retengas mis males contra mí
  - ni, airado para siempre, conserves mis maldades contra mí
  lexicon: LSJ
  rationale: La construcción expresa ira duradera y el acto de conservar el mal en contra del suplicante. «Guardes mis maldades contra mí» comunica bien esa idea en español sin perder la relación adversativa.
- source_word: ἐν τοῖς κατωτάτοις τῆς γῆς
  english_pob_choice: in the lowest parts of the earth
  chosen_spanish: en las partes más bajas de la tierra
  alternatives_spanish:
  - en los lugares más bajos de la tierra
  - en las profundidades de la tierra
  lexicon: LSJ
  rationale: El superlativo κατωτάτοις indica lo más bajo. «Partes más bajas» sigue de cerca el griego y conserva la imagen espacial, mientras que «profundidades» sería más interpretativo.
- source_word: τῶν μετανοούντων
  english_pob_choice: those who repent
  chosen_spanish: de los que se arrepienten
  alternatives_spanish:
  - de los arrepentidos
  - de los que vuelven en sí
  lexicon: BDAG
  rationale: El participio presente describe a los caracterizados por arrepentirse. «Los que se arrepienten» preserva la fuerza verbal y suena natural en español.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: BDAG
  rationale: En el lenguaje bíblico de invocación, κύριος funciona como título divino. «Señor» es la forma establecida y reverente en español, y mantiene la dirección de la oración.
theological_decisions:
- issue: Título divino κύριος en una súplica penitencial
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Soberano
  - Maestro
  rationale: El texto se dirige a Dios en una confesión de arrepentimiento; «Señor» conserva el valor de invocación divina y la solemnidad del registro orante.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord (en español, Señor)'
- issue: ἀνομία como término moral más fuerte que «pecado»
  english_pob_reading: lawless deeds
  chosen_spanish_reading: actos de iniquidad
  alternative_spanish_readings:
  - pecados
  - obras de maldad
  rationale: La fuente no usa un término genérico para pecado, sino una noción de transgresión/iniquidad. Mantener «iniquidad» evita suavizar la carga moral del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: τὰ κακά μοι como algo retenido contra el suplicante
  english_pob_reading: keep my evils against me
  chosen_spanish_reading: guardes mis maldades contra mí
  alternative_spanish_readings:
  - retengas mis males contra mí
  - mantengas mis males en mi contra
  rationale: La petición no solo pide olvido, sino que no se conserven esas maldades como cargo acusatorio. «Contra mí» preserva esa relación adversativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del inglés auditado en los puntos clave: apertura como súplica intensa, conservación de la idea de ira duradera, y referencia a las partes más bajas de la tierra. Se evitó trasladar mecánicamente el inglés cuando el español podía expresar mejor la relación entre el ruego y el participio, pero sin perder la tensión penitencial del original griego.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος según la norma doctrinal del proyecto y la práctica bíblica en español.
  - Se optó por «iniquidad» para ἀνομία a fin de preservar la fuerza moral del término.
  - Se conservó la imagen espacial de ἐν τοῖς κατωτάτοις τῆς γῆς con «las partes más bajas de la tierra», sin explicitar más de lo que el texto dice.
  - El estilo busca ser publicable y reverente, sin arcaísmos innecesarios ni suavización del lamento penitencial.
