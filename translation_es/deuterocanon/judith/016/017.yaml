translation:
  language: es
  text: ¡Ay de las naciones que se levantan contra mi pueblo[a]! Yahvé, el Todopoderoso, se vengará de ellos en el día del juicio, para poner fuego y gusanos en su carne, y llorarán con dolor[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi linaje» o «mi nación». El griego génos puede referirse al pueblo al que pertenece Judit.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «en sensación/percepción». Aquí se traduce «con dolor» porque el contexto es de castigo corporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Dichoso no
  lexicon: BDAG
  rationale: En este contexto profético y de juicio, la interjección expresa lamento y denuncia. «¡Ay de!» conserva bien el tono exhortativo/judicial en español sin suavizarlo.
- source_word: ἔθνεσιν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: Aquí designa pueblos extranjeros hostiles a Israel. «Las naciones» es natural en español y evita importar una oposición técnica judíos/gentiles que no es la del contexto.
- source_word: ἐπανισταμένοις
  english_pob_choice: rising up against
  chosen_spanish: que se levantan contra
  alternatives_spanish:
  - que se rebelan contra
  - que atacan
  lexicon: BDAG
  rationale: El participio comunica alzamiento hostil. «Se levantan contra» conserva la imagen verbal y el sentido adversarial sin especificar más de lo que dice el griego.
- source_word: τῷ γένει μου
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi raza
  - mi linaje
  - mi nación
  lexicon: BDAG
  rationale: γένος puede significar linaje, estirpe o pueblo. En el marco de Judit, «mi pueblo» comunica con claridad la identidad colectiva de forma natural en español.
- source_word: Κύριος Παντοκράτωρ
  english_pob_choice: the Lord Almighty
  chosen_spanish: Yahvé Todopoderoso
  alternatives_spanish:
  - el Señor Todopoderoso
  - Yahvé, el Todopoderoso
  lexicon: BDAG
  rationale: El proyecto POB usa «Yahvé» para el nombre divino. Παντοκράτωρ se traduce con el equivalente establecido «Todopoderoso», preservando el título divino con fuerza y legibilidad.
- source_word: ἐκδικήσει
  english_pob_choice: will take vengeance on
  chosen_spanish: se vengará de
  alternatives_spanish:
  - tomará venganza de
  - hará justicia contra
  lexicon: BDAG
  rationale: El verbo expresa retribución judicial. «Se vengará de» reproduce directamente el valor retributivo del texto y su tono severo.
- source_word: ἐν ἡμέρᾳ κρίσεως
  english_pob_choice: in the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - el día del juicio
  - en el día de la sentencia
  lexicon: BDAG
  rationale: La expresión es claramente judicial y escatológica. «El día del juicio» es idiomático en español y conserva el carácter formal del griego.
- source_word: δοῦναι πῦρ καὶ σκώληκας εἰς σάρκας αὐτῶν
  english_pob_choice: to put fire and worms in their flesh
  chosen_spanish: para poner fuego y gusanos en su carne
  alternatives_spanish:
  - para echar fuego y gusanos en su carne
  - para poner fuego y gusanos en su cuerpo
  lexicon: BDAG
  rationale: La construcción final expresa el contenido del castigo divino. «Poner» funciona de manera natural en español, y «carne» mantiene el paralelismo literal con σάρξ sin diluir la imagen.
- source_word: κλαύσονται
  english_pob_choice: they will weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - gemirán
  - se lamentarán
  lexicon: BDAG
  rationale: El futuro comunica llanto/lamento. «Llorarán» es breve, claro y fiel al peso emocional del verbo.
- source_word: ἐν αἰσθήσει
  english_pob_choice: in pain
  chosen_spanish: con dolor
  alternatives_spanish:
  - en dolor
  - con sensación consciente
  - en tormento
  lexicon: LSJ
  rationale: αἴσθησις puede referirse a sensación o percepción. En este contexto de castigo corporal, «con dolor» transmite la experiencia sufrida sin imponer una terminología doctrinal más desarrollada que el propio versículo.
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - hasta la eternidad
  lexicon: BDAG
  rationale: La frase expresa duración perpetua. «Para siempre» es la forma más natural y contundente en español para reflejar esa permanencia.
theological_decisions:
- issue: Nombre divino y título soberano
  english_pob_reading: The Lord Almighty
  chosen_spanish_reading: Yahvé Todopoderoso
  alternative_spanish_readings:
  - el Señor Todopoderoso
  - Yahvé, el Todopoderoso
  rationale: Siguiendo el estándar del proyecto, el nombre divino se expresa como «Yahvé» en lugar de ocultarlo bajo una sustitución devocional. El título Παντοκράτωρ se mantiene con «Todopoderoso» para conservar la fuerza soberana del texto.
  doctrine_reference: POB project terminology default for יהוה / YHWH.
- issue: Castigo retributivo y duración
  english_pob_reading: they will weep in pain forever
  chosen_spanish_reading: llorarán con dolor para siempre
  alternative_spanish_readings:
  - llorarán en dolor para siempre
  - llorarán en tormento para siempre
  rationale: La traducción conserva la dureza del juicio sin suavizarla. «Con dolor» refleja el sentido contextual de αἴσθησις como experiencia sufrida, pero evita añadir una sistematización doctrinal que el texto no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «into their flesh» a «in their flesh» para naturalidad. La versión española sigue esa decisión con «en su carne», manteniendo la literalidad y la naturalidad española. También se conserva la tensión del griego en αἴσθησις, traducido aquí por su sentido contextual de dolor.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene «Todopoderoso» para Παντοκράτωρ, evitando una sustitución litúrgica más libre.
  - «Las naciones» conserva el contraste colectivo del griego sin introducir categorías neotestamentarias.
  - «Carne» se mantiene por fidelidad al paralelismo de σάρξ.
  - La expresión «para siempre» reproduce la duración absoluta de ἕως αἰῶνος en español natural.
