  glossary_alignment: Alinea correctamente «Yahvé» para יְהוָה. Mantiene el topónimo transliterado y explica el juego semántico en nota. La principal mejora de glosario es adaptar «Uzza / Perez-uzza» a «Uza / Pérez-uza» en español para consistencia ortográfica y legibilidad, sin perder la explicación léxica.
