    issue: La frase «de ninguna carne» es poco idiomática en español.
    rationale: Aunque reproduce literalmente σάρξ, en español suena extraña y menos comprensible que en inglés «any flesh». Puede distraer al lector o sugerir un objeto material en vez de un ser humano mortal.
  - severity: low
    issue: La nota al pie dice «a cualquier carne», pero el texto español usa «ninguna carne».
    rationale: No es un error de sentido, porque la negación cambia la polaridad, pero la formulación de la nota puede armonizarse mejor con el anclaje del texto revisado para evitar fricción estilística.
  revised_spanish_text: Mientras aún vivas y haya aliento en ti, no te pongas en poder de nadie de carne[a].
