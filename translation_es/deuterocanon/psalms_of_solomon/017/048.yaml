translation:
  language: es
  text: Sus palabras han sido refinadas[a] más que el oro fino más precioso; en las asambleas juzgará al pueblo[b], a las tribus de los santificados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «purificadas» o «probadas por fuego». El griego evoca metales llevados al fuego.
    reason: lexical_alternative
  - marker: b
    text: O «distinguirá» o «separará» al pueblo.
    reason: alternative_reading
  - marker: c
    text: La construcción griega es breve y algo comprimida; aquí se entiende colectivamente, como «los santificados».
    reason: source_note
lexical_decisions:
- source_word: τὰ ῥήματα αὐτοῦ
  english_pob_choice: His words
  chosen_spanish: Sus palabras
  alternatives_spanish:
  - Sus dichos
  - Sus declaraciones
  lexicon: BDAG
  rationale: ῥήματα se refiere a palabras/expresiones pronunciadas. «Palabras» conserva la concisión y naturalidad del inglés POB sin perder el plural del griego.
- source_word: πεπυρωμένα
  english_pob_choice: refined
  chosen_spanish: refinadas
  alternatives_spanish:
  - purificadas
  - probadas por fuego
  lexicon: BDAG
  rationale: El participio evoca metal llevado al fuego. «Refinadas» mantiene la imagen metalúrgica y funciona bien en español; las alternativas explicitan más el proceso, pero suenan más explicativas que el griego.
- source_word: ὑπὲρ χρυσίον τὸ πρῶτον τίμιον
  english_pob_choice: beyond the finest precious gold
  chosen_spanish: más que el oro más fino y precioso
  alternatives_spanish:
  - más que el oro de primera calidad y precioso
  - por encima del oro escogido y precioso
  lexicon: BDAG
  rationale: La frase intensifica la comparación de valor. «Más que» comunica la superioridad y «el oro más fino y precioso» conserva la fuerza superlativa de τὸ πρῶτον τίμιον sin calco rígido.
- source_word: ἐν συναγωγαῖς
  english_pob_choice: in the assemblies
  chosen_spanish: en las asambleas
  alternatives_spanish:
  - en las congregaciones
  - en las reuniones
  lexicon: BDAG
  rationale: Aquí el término designa reuniones comunitarias, no una institución posterior. «Asambleas» es amplio, sobrio y fiel al contexto.
- source_word: διακρινεῖ
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - distinguirá
  - separará
  lexicon: BDAG
  rationale: En este contexto real y judicial, el verbo puede tener sentido de juzgar/discernir. «Juzgará» recoge bien ese matiz, mientras que las alternativas preservan la posibilidad de distinguir o separar.
- source_word: φυλὰς ἡγιασμένου
  english_pob_choice: the tribes of the sanctified
  chosen_spanish: las tribus de los santificados
  alternatives_spanish:
  - las tribus del santificado
  - las tribus de los consagrados
  lexicon: BDAG
  rationale: La revisión auditada corrige la tendencia a singularizar ἡγιασμένου. En español, el plural sustantivado «los santificados» preserva mejor el valor colectivo subyacente y evita imponer una lectura individualista.
theological_decisions:
- issue: Referente colectivo de ἡγιασμένου
  english_pob_reading: the sanctified one / the sanctified
  chosen_spanish_reading: los santificados
  alternative_spanish_readings:
  - el santificado
  - el santo
  - los consagrados
  rationale: El audit trail indica que el participio genitivo funciona sustantivamente y apunta colectivamente al pueblo santificado. Traducir en singular sugeriría erróneamente una persona única; el plural conserva el referente corporativo.
  doctrine_reference: No doctrinal claim; referential decision based on syntax and context.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige la interpretación singular de ἡγιασμένου. La redacción española evita esa singularización y conserva el paralelismo con la comparación metalúrgica y el contexto judicial/comunitario.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo porque no aparece un término divino explícito en el texto griego.
  - Se usa «asambleas» para συναγωγαῖς en sentido comunitario amplio, en línea con la decisión inglesa auditada.
  - Se conserva el registro bíblico sobrio y directo sin recurrir a fórmulas eclesiásticas no requeridas por el griego.
