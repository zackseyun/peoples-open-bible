translation:
  language: es
  text: Como quien agarra[a] a un perro por las orejas, así es el que pasa y se mete[b] en una disputa que no es suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «agarra» refleja la fuerza del verbo hebreo; también puede entenderse como «toma firmemente» o «sujeta».
    reason: lexical_alternative
  - marker: b
    text: O «se entromete». El verbo hebreo también puede dar la idea de involucrarse en la disputa de otra persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲזִיק
  english_pob_choice: one who grabs
  chosen_spanish: agarr[a]
  alternatives_spanish:
  - toma por
  - se apodera de
  - sujeta fuertemente
  lexicon: HALOT
  rationale: El participio causativo expresa una acción firme de tomar o sujetar; en español, «agarrar» comunica con naturalidad la violencia e imprudencia de la imagen proverbial sin diluirla.
- source_word: בְּאָזְנֵי
  english_pob_choice: by the ears
  chosen_spanish: por las orejas
  alternatives_spanish:
  - de las orejas
  - en las orejas
  lexicon: HALOT
  rationale: «Por las orejas» reproduce bien la idea de tomar al animal en el punto de agarre y suena natural en español, conservando la imagen concreta.
- source_word: כָלֶב
  english_pob_choice: a dog
  chosen_spanish: un perro
  alternatives_spanish:
  - un can
  - un perro callejero
  lexicon: HALOT
  rationale: El sustantivo común «perro» es el equivalente directo y mantiene el carácter proverbial e ilustrativo del símil.
- source_word: עֹבֵר
  english_pob_choice: a passerby
  chosen_spanish: el que pasa
  alternatives_spanish:
  - un transeúnte
  - un paseante
  - uno que va pasando
  lexicon: HALOT
  rationale: El participio funciona sustantivamente; «el que pasa» es una solución natural y fiel, sin añadir matices no presentes en el hebreo.
- source_word: מִתְעַבֵּר
  english_pob_choice: gets involved
  chosen_spanish: se mete
  alternatives_spanish:
  - se involucra
  - interfiere
  - se entromete
  lexicon: HALOT
  rationale: El hitpael aquí puede expresar involucrarse o entrometerse en un conflicto ajeno. «Se mete» conserva la idea de entrar impropiamente en una disputa y corresponde al matiz amplio recogido en la nota inglesa.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - acerca de
  - contra
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente más amplia, en español la combinación natural es «meterse en una pelea». Mantiene la relación con el conflicto sin forzar la sintaxis.
- source_word: רִיב
  english_pob_choice: a quarrel
  chosen_spanish: una pelea
  alternatives_spanish:
  - una disputa
  - una contienda
  - una querella
  lexicon: HALOT
  rationale: «Pelea» expresa bien el conflicto interpersonal cotidiano del proverbio. Se evita un término más jurídico o eclesiástico que debilitaría la imagen.
- source_word: לֹא לוֹ
  english_pob_choice: not his own
  chosen_spanish: que no es suya
  alternatives_spanish:
  - que no le pertenece
  - que no es propia de él
  - ajena
  lexicon: HALOT
  rationale: El hebreo niega posesión/pertinencia del pleito. «Que no es suya» conserva la referencia implícita a la pelea y su pertenencia ajena en un español natural.
translation_notes:
  revision_awareness: El texto inglés y el control cruzado muestran acuerdo alto y sin revisiones aplicadas; por eso la versión española sigue de cerca la imagen proverbial, sin ampliar el sentido más allá del hebreo ni introducir interpretaciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - 'Se preserva la imagen concreta del símil: una acción imprudente y peligrosa con un perro.'
  - No se introduce terminología eclesiástica para רִיב; se prefiere un término cotidiano que encaja con el proverbio.
  - La nota sobre el matiz de «meterse» recoge la alternativa del inglés POB «meddles» sin imponerla como única lectura.
