translation:
  language: es
  text: Mira[a], como un león subirá desde la espesura del Jordán hacia una pastura segura; porque, en un instante, lo haré huir de allí, y pondré sobre ella al que sea escogido. Porque ¿quién es como yo[b]? ¿Y quién me convocará? ¿Y quién es el pastor que podrá mantenerse delante de mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la majestad del Jordán», una expresión hebrea que probablemente alude a la vegetación densa junto al Jordán.
    reason: lexical_alternative
  - marker: b
    text: 'O «¿quién me fijará una cita?», con posible sentido legal: «¿quién me convocará o me llamará a juicio?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce la escena con inmediatez. 'Mira' conserva la vivacidad del original en un español actual y natural, sin perder la función de llamada de atención.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - cual león
  lexicon: HALOT
  rationale: Similitud directa y transparente; 'como un león' es la forma más clara y fiel en español.
- source_word: יַעֲלֶה
  english_pob_choice: he will come up
  chosen_spanish: subirá
  alternatives_spanish:
  - subirá hacia arriba
  - ascenderá
  - vendrá
  lexicon: HALOT
  rationale: עלה expresa ascenso o movimiento hacia arriba. 'Subirá' conserva el sentido direccional y la imagen del avance desde el valle o la maleza del Jordán.
- source_word: מִגְּאוֹן הַיַּרְדֵּן
  english_pob_choice: from the thicket of the Jordan
  chosen_spanish: desde la espesura del Jordán
  alternatives_spanish:
  - desde el orgullo del Jordán
  - desde la majestad del Jordán
  - desde el matorral del Jordán
  lexicon: HALOT
  rationale: El POB inglés optó por el sentido idiomático de vegetación densa en el entorno del Jordán. 'Espesura' preserva esa concreción en español. Se mantiene la alternativa más literal en la nota por la tensión léxica de גאון.
- source_word: נְוֵה אֵיתָן
  english_pob_choice: a secure pasture
  chosen_spanish: un pastizal seguro
  alternatives_spanish:
  - un pasto seguro
  - una morada firme
  - un pastizal permanente
  lexicon: HALOT
  rationale: נוה puede ser pastizal/pastura o morada; איתן aporta firmeza/seguridad. 'Pastizal seguro' conserva el cuadro pastoril y la idea de lugar seguro sin volverlo demasiado abstracto.
- source_word: כִּי אַרְגִּיעָה
  english_pob_choice: for in an instant
  chosen_spanish: porque, en un instante
  alternatives_spanish:
  - porque, de repente
  - porque, en un momento
  lexicon: HALOT
  rationale: El valor adverbial de רגע en este contexto comunica rapidez súbita. 'En un instante' es natural y fiel a la abrupta intervención divina.
- source_word: אֲרִיצֶנּוּ מֵעָלֶיהָ
  english_pob_choice: I will make him run from it
  chosen_spanish: lo haré correr lejos de allí
  alternatives_spanish:
  - lo haré huir de allí
  - lo expulsaré de allí
  - lo haré correr lejos de ella
  lexicon: HALOT
  rationale: El causativo de רוץ expresa hacer correr/huir. 'Lejos de allí' evita una referencia pronominal excesivamente técnica en español y mantiene la salida forzada del lugar; la referencia del femenino queda implícita por el contexto.
- source_word: וּמִי בָחוּר אֵלֶיהָ אֶפְקֹד
  english_pob_choice: and I will appoint over it whomever is chosen
  chosen_spanish: y pondré sobre él al que esté escogido
  alternatives_spanish:
  - y asignaré sobre él al escogido
  - y estableceré sobre él al elegido
  - y pondré sobre ella al que esté escogido
  lexicon: HALOT
  rationale: פקד aquí tiene el valor de nombrar/poner sobre. בָחוּר indica 'escogido'. Se conserva la ambigüedad gramatical del referente con 'él' siguiendo el POB inglés, aunque el antecedente inmediato puede ser el lugar/pastizal. 'Al que esté escogido' reproduce el valor de elección sin añadir interpretación extra.
- source_word: מִי כָמוֹנִי
  english_pob_choice: who is like me
  chosen_spanish: ¿quién es como yo?
  alternatives_spanish:
  - ¿quién me iguala?
  - ¿quién es semejante a mí?
  lexicon: HALOT
  rationale: Fórmula de incomparabilidad divina; la traducción directa en español resulta clara y solemne.
- source_word: וּמִי יוֹעִידֶנִּי
  english_pob_choice: who will summon me
  chosen_spanish: ¿Y quién me citará?
  alternatives_spanish:
  - ¿y quién me convocará?
  - ¿y quién me citará a juicio?
  - ¿y quién me arraigará?
  lexicon: HALOT
  rationale: יעד en hiphil puede significar citar, convocar o señalar una fecha/comparecencia; en contexto judicial, 'citar' conserva la fuerza de comparecencia y deja abierta la posible resonancia legal que el POB inglés anotó.
- source_word: רֹעֶה
  english_pob_choice: the shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - el pastor que guía
  - el pastor/régulo
  - el gobernante
  lexicon: HALOT
  rationale: Aunque literalmente es 'pastor', en español 'pastor' es el equivalente más inmediato; 'régulo' o 'gobernante' serían interpretativos. Se preserva la metáfora pastoral.
- source_word: יַעֲמֹד לְפָנַי
  english_pob_choice: can stand before me
  chosen_spanish: podrá estar delante de mí
  alternatives_spanish:
  - puede estar delante de mí
  - podrá presentarse ante mí
  - se mantendrá delante de mí
  lexicon: HALOT
  rationale: La pregunta retórica implica capacidad de resistir/presentarse. 'Podrá estar delante de mí' comunica adecuadamente la idea de comparecer y resistir ante la presencia divina.
theological_decisions:
- issue: Voz divina en primera persona sin añadir el nombre divino
  english_pob_reading: The first-person 'I/me' is rendered as God speaking without adding 'the LORD' in the verse.
  chosen_spanish_reading: La primera persona se mantiene como habla divina implícita, sin insertar 'Yahvé' en el versículo.
  alternative_spanish_readings:
  - 'Yahvé dice: ...'
  - 'dice el Señor: ...'
  rationale: El hebreo presenta un discurso en primera persona dentro del contexto profético, pero este versículo no nombra explícitamente al sujeto. La traducción conserva esa forma retórica y evita introducir un encabezado ausente en el texto base.
  doctrine_reference: 'Principio de primacía del texto original: no añadir sujeto explícito donde el hebreo no lo da.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB en lo esencial: se mantiene la imagen del león, la lectura idiomática de גאון como espesura/vegetación densa del Jordán, la intervención súbita de Dios, y la alternativa legal de יוֹעִידֶנִּי. Se respetó la decisión de no explicitar el nombre divino en la línea.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término estándar del proyecto cuando el texto lo exige, pero aquí no se inserta porque el hebreo no lo nombra explícitamente en el versículo.
  - Se mantiene 'pastor' para רֹעֶה por consistencia con la metáfora bíblica y con la práctica POB de no sustituirla por un término eclesiástico más abstracto.
  - '''Escogido'' refleja בָחוּר sin cargarlo innecesariamente de teología adicional.'
  - '''Citará'' deja abierta la posible resonancia forense de יוֹעִידֶנִּי sin forzarla en el texto principal.'
