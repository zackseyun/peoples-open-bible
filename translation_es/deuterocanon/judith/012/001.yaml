translation:
  language: es
  text: Y mandó que la hicieran entrar donde se guardaba su plata[a], y dispuso que le sirvieran comida de sus propias provisiones y que bebiera de su vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vasijas de plata». El término griego puede referirse en general a artículos de plata; en este contexto de banquete, probablemente alude a utensilios o vasijas de mesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden de
  lexicon: BDAG
  rationale: κέλευω expresa una orden o mandato con fuerza autoritativa. En español, «mandó» suena natural y conserva ese valor sin cargar el estilo.
- source_word: εἰσαγαγεῖν αὐτὴν
  english_pob_choice: that she be brought in
  chosen_spanish: que la trajeran adentro
  alternatives_spanish:
  - que la hicieran entrar
  - que la introdujeran
  lexicon: BDAG
  rationale: El infinitivo dependiente de «mandó» se expresa con una subordinada natural en español. «La trajeran adentro» comunica el movimiento de entrada sin forzar un calco.
- source_word: οὗ ἔτιθετο
  english_pob_choice: where ... was kept
  chosen_spanish: donde estaban
  alternatives_spanish:
  - donde se guardaban
  - donde se hallaban
  lexicon: BDAG
  rationale: 'El imperfecto tiene sentido estativo: el lugar donde esos objetos se mantenían. «Estaban» evita una literalidad pesada y preserva la idea de almacenamiento.'
- source_word: τὰ ἀργυρώματα
  english_pob_choice: his silver
  chosen_spanish: sus objetos de plata
  alternatives_spanish:
  - su plata
  - sus vasos de plata
  - sus piezas de plata
  lexicon: LSJ
  rationale: El término puede abarcar objetos/artículos de plata; en este contexto de banquete, no conviene restringirlo a «plata» como metal sin más, ni a utensilios específicamente. «Objetos de plata» mantiene la amplitud semántica.
- source_word: συνέταξεν
  english_pob_choice: he directed
  chosen_spanish: ordenó
  alternatives_spanish:
  - dispuso
  - mandó
  lexicon: BDAG
  rationale: συντάσσω introduce instrucciones concretas. Aquí «ordenó» es el equivalente natural que conserva la continuidad de la autoridad sin exigir una distinción demasiado fina en español.
- source_word: καταστρῶσαι αὐτῇ
  english_pob_choice: that food be set before her
  chosen_spanish: que le pusieran delante comida
  alternatives_spanish:
  - que le prepararan la mesa
  - que se le sirviera comida
  lexicon: LSJ
  rationale: El verbo puede referirse a disponer la comida o una mesa para alguien. «Le pusieran delante comida» reproduce la idea de servir/presentar alimentos de modo claro en español.
- source_word: ἀπὸ τῶν ὀψοποιημάτων αὐτοῦ
  english_pob_choice: from his own provisions
  chosen_spanish: de sus propios manjares
  alternatives_spanish:
  - de sus propias viandas
  - de sus propios preparados
  lexicon: LSJ
  rationale: ὀψοποιήματα denota alimentos preparados, platos o manjares. «Manjares» preserva el matiz de comida preparada y encaja con el registro de banquete.
- source_word: τοῦ οἴνου αὐτοῦ πινεῖν
  english_pob_choice: that she drink from his wine
  chosen_spanish: que bebiera de su vino
  alternatives_spanish:
  - que bebiera de su vino propio
  - que tomara de su vino
  lexicon: BDAG
  rationale: El infinitivo final expresa la orden de beber su vino. «De su vino» es suficientemente idiomático en español y conserva el sentido de participar de su provisión.
translation_notes:
  revision_awareness: The Spanish draft follows the final audited English revision in sense, while returning more closely to the Greek's broad semantic range in τὰ ἀργυρώματα and ὀψοποιήματα. It avoids the earlier narrowed English renderings ('silverware,' 'dishes') and keeps the banquet-setting force of the scene with idiomatic Spanish.
  spanish_consistency_notes:
  - Mantuve un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - Elegí «mandó/ordenó» para reflejar la fuerza imperativa de los dos verbos griegos sin sobrecargar la repetición.
  - «Objetos de plata» deja abierta la referencia del griego a artículos de plata, no solo a cubertería.
  - «Manjares» comunica alimentos preparados con un tono natural en español bíblico contemporáneo.
