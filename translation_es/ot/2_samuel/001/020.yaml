base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/001/020.yaml
  text: Do not tell it in Gath[a]; do not proclaim the news in the streets of Ashkelon, lest the daughters of the Philistines rejoice[b], lest the daughters of the uncircumcised exult.
  footnotes:
  - marker: a
    text: Or 'announce it' / 'bring the news' for 'proclaim the news.'
    reason: lexical_alternative
  - marker: b
    text: '''The daughters of the uncircumcised'' is a literal rendering of a covenantal term of reproach for the Philistines; alternatively, ''the daughters of the uncircumcised ones.'''
    reason: lexical_alternative
