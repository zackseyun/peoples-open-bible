base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/023.yaml
  text: Naaman said[a], “Please, take two talents.” And he urged him, and tied up two talents of silver in two bags, with two changes of clothes, and gave them to two of his servants[c][b], and they carried them before him.
  footnotes:
  - marker: a
    text: Or “he pressed him” / “he insisted with him.”
    reason: lexical_alternative
  - marker: b
    text: That is, two bags or purses containing the silver.
    reason: cultural_note
  - marker: c
    text: Or “ahead of him.” The sense is that Naaman’s servants carried the gifts in front of Gehazi.
    reason: lexical_alternative
