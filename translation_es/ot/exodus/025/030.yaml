translation:
  language: es
  text: Y pondrás sobre la mesa el pan de la Presencia[a] delante de mí continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pan de la Presencia»; tradicionalmente, «pan de la proposición» o «showbread».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתָּ
  english_pob_choice: And you shall set
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás en su lugar
  lexicon: HALOT
  rationale: נתן abarca 'dar/poner/colocar'. En este contexto cultual, 'pondrás' comunica la acción de disponer algo en el lugar señalado sin sonar mecánico.
- source_word: עַל הַשֻּׁלְחָן
  english_pob_choice: on the table
  chosen_spanish: sobre la mesa
  alternatives_spanish:
  - sobre la mesa
  - encima de la mesa
  lexicon: HALOT
  rationale: עַל expresa colocación física sobre una superficie. 'Mesa' es la forma más natural en español para הַשֻּׁלְחָן, y evita un calco rígido.
- source_word: לֶחֶם פָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la presencia
  - el pan de la faz
  - el pan de presentación
  lexicon: HALOT
  rationale: Se conserva la construcción cultual hebrea de manera transparente. 'Presencia' comunica el sentido reverente de פני/pānîm sin recurrir a 'showbread', que es tradicional pero menos explícito.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: לְפָנַי literalmente es 'ante/delante de mí'. 'Delante de mí' mantiene la relación espacial y cultual, y evita redundancia excesiva con 'Presencia'.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  - de manera continua
  lexicon: HALOT
  rationale: En el marco sacerdotal, תמיד indica continuidad regular y permanente. 'Continuamente' conserva ese valor litúrgico sin sobreinterpretarlo como mera frecuencia.
theological_decisions:
- issue: Renderización de לֶחֶם פָּנִים
  english_pob_reading: the bread of the Presence
  chosen_spanish_reading: el pan de la Presencia
  alternative_spanish_readings:
  - el pan de presentación
  - el pan de la presencia
  - panes de la proposición
  rationale: La opción elegida preserva el término cultual hebreo con transparencia y sin imponer un tecnicismo eclesiástico posterior. Además, mantiene la relación con 'delante de mí' en la misma cláusula.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con el texto hebreo y con la auditoría inglesa. La única decisión lexical destacable es mantener la expresión cultual transparente 'pan de la Presencia' en lugar de la forma tradicional 'pan de la proposición'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí el verso es una instrucción directa sin el Tetragrámaton explícito en el texto base.
  - '''Mesa'' se usa como equivalente natural de הַשֻּׁלְחָן en contexto tabernacular.'
  - '''Continuamente'' conserva la idea de vigencia regular/permanente propia de תמיד en textos rituales.'
