base_translation:
  language: en
  yaml_path: translation/ot/2_kings/011/007.yaml
  text: And the two divisions among you[a], all who go off duty on the Sabbath[c][b], shall keep watch over the house of Yahweh for the king.
  footnotes:
  - marker: a
    text: Hebrew literally, 'the two hands among you'; here likely meaning 'the two divisions' or 'the two companies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all who go out on the Sabbath'; in context this likely refers to those going off duty at the Sabbath shift change.
    reason: alternative_reading
  - marker: c
    text: Or 'shall keep the watch of the house of the LORD toward/for the king.' The Hebrew preposition is difficult; the sense is guarding the LORD's house in order to protect the king.
    reason: alternative_reading
