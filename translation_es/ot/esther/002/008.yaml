review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: mantiene la doble cláusula temporal, distingue «orden» y «decreto», conserva la pasividad de Ester y refleja correctamente אֶל יַד con una expresión de custodia. Sin embargo, hay dos desajustes con la auditoría inglesa: la nota al pie [a] está anclada al segundo «Hegai» aunque la alternativa documentada pertenece al primer אֶל־יַד הֵגָי, y la segunda nota inglesa sobre «the king’s house / the king’s palace» no fue preservada aunque la decisión léxica española mantiene «la casa del rey» y la alternativa «el palacio del rey» sigue siendo pertinente.'
  spanish_quality_summary: El español es claro y digno, pero «Susa la ciudadela» quedó alterado a «Susa la ciudadela» en las decisiones léxicas mientras el texto dice «en Susa la ciudadela»; conviene mantener esa forma appositiva en el texto. Además, «guardián de las mujeres» suena algo más benevolente que el hebreo y que la rationale auditada; «cuidador» no sirve, pero «custodio» o «encargado» serían más administrativos. Aun así, para una reparación mínima basta conservar «guardián» o mejorar a «custodio». También es más natural anclar la nota [a] tras «custodia de Hegai».
  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. Las decisiones «orden», «decreto», «jóvenes», «la casa del rey» y «bajo la custodia de» están alineadas con la filosofía del proyecto. Falta preservar la alternativa para בֵּית הַמֶּלֶךְ como nota léxica, y la ubicación de la nota de אֶל יַד debe corregirse.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el segundo «Hegai» en vez de en la primera ocurrencia de «bajo la custodia de Hegai».
    rationale: La nota inglesa documenta la alternativa para el primer אֶל יַד הֵגָי después de «many young women were gathered ... into the custody of Hegai». El anclaje actual induce a pensar que comenta la segunda frase.
  - severity: medium
    issue: Falta la nota léxica correspondiente a «la casa del rey» / «el palacio del rey».
    rationale: El POB inglés preservó la alternativa para בֵּית הַמֶּלֶךְ. Dado que el español mantiene la traducción más literal «la casa del rey», también debe conservar la alternativa interpretativa «el palacio del rey».
  - severity: low
    issue: La nota actual dice «O “a la mano de Hegai”; literalmente, “a la mano de Hegai”», repitiendo casi la misma idea dos veces.
    rationale: La formulación es redundante. Conviene distinguir alternativa idiomática y literal, por ejemplo «O “al cargo de Hegai”; literalmente, “a la mano de Hegai”».
  revised_spanish_text: Y aconteció que, cuando se oyó la orden del rey y su decreto, y cuando muchas jóvenes fueron reunidas en Susa la ciudadela, bajo la custodia de Hegai[a], Ester también fue llevada a la casa del rey[b], bajo la custodia de Hegai, guardián de las mujeres.
  revised_footnotes:
