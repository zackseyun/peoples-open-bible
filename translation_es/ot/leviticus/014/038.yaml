review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia legal del hebreo: el sacerdote sale de la casa, va a la entrada, y deja la casa cerrada por siete días. Sin embargo, «hacia la entrada de la casa» es menos exacto que «a la entrada» para אֶל פֶּתַח הַבָּיִת, y la nota al pie no preserva bien la alternativa del inglés POB, ya que repite prácticamente el texto principal en vez de ofrecer una variante real como «dejará cerrada» o «cerrará/aislará».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad procedimental. «De la casa, hacia la entrada de la casa» suena algo torpe; «saldrá de la casa a la entrada de la casa» o mejor «hasta la entrada» fluye más naturalmente. «Cerrará la casa» es aceptable, aunque en este contexto conviene explicitar en nota el matiz de dejarla cerrada/aislada para inspección.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La terminología principal está bien: «sacerdote», «casa». La decisión sobre וְהִסְגִּיר como «cerrará» es defendible, pero la nota debe reflejar mejor la alternativa léxica documentada en el POB inglés.'
  issues:
  - severity: medium
    issue: «hacia la entrada de la casa» debilita la relación espacial de אֶל פֶּתַח הַבָּיִת
    rationale: El hebreo indica movimiento hasta/al punto de acceso de la casa, no solo dirección general. En español procedimental, «a la entrada» o «hasta la entrada» es más fiel y natural que «hacia la entrada».
  - severity: medium
    issue: La nota al pie no ofrece una alternativa léxica real
    rationale: 'El inglés POB registra una alternativa verdadera: «close up the house». La nota española actual («O “cerrará la casa…”») repite casi el texto principal y no añade el matiz de dejarla cerrada durante la inspección.'
  - severity: low
    issue: La puntuación con dos comas hace la frase más pesada de lo necesario
    rationale: «saldrá de la casa, hacia la entrada de la casa, y...» introduce pausas innecesarias en una instrucción legal breve; una redacción más directa mejora la legibilidad.
  revised_spanish_text: Entonces el sacerdote saldrá de la casa hasta la entrada de la casa y cerrará la casa por siete días[a].
  revised_footnotes:
