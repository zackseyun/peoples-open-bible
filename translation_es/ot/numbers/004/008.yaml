translation:
  language: es
  text: Extenderán sobre ellos un paño escarlata, y lo cubrirán con una cubierta de piel de tahash[a], y pondrán sus varas en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tahash; el animal o material exacto es incierto. Las traducciones tradicionales incluyen «piel de tejón», «piel de marsopa» o, de modo más general, «cuero fino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָרְשׂוּ
  english_pob_choice: they shall spread
  chosen_spanish: Extenderán
  alternatives_spanish:
  - lo extenderán
  - lo desplegarán
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de desplegar un paño sobre los objetos sagrados. «Extenderán» conserva la imagen física sin sonar rígido en español.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre estas cosas
  lexicon: HALOT
  rationale: La preposición indica colocación por encima de los objetos mencionados. «Sobre ellos» sigue de cerca el hebreo y es natural en español.
- source_word: בֶּגֶד
  english_pob_choice: a cloth
  chosen_spanish: un paño
  alternatives_spanish:
  - una tela
  - un lienzo
  - una cubierta
  lexicon: HALOT
  rationale: En este contexto no se trata de una prenda, sino de una pieza textil para cubrir. «Paño» comunica mejor ese uso cultual.
- source_word: תּוֹלַעַת שָׁנִי
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - de escarlata
  - rojo escarlata
  - escarlata teñido
  lexicon: HALOT
  rationale: El hebreo nombra un material/textil de color escarlata. Dado el ajuste de la revisión inglesa, se evita añadir «hilo» o «lana» y se mantiene el valor de color/material con «escarlata».
- source_word: וְכִסּוּ אֹתוֹ
  english_pob_choice: and cover it
  chosen_spanish: y lo cubrirán
  alternatives_spanish:
  - y lo cubrirán por encima
  - y lo taparán
  lexicon: HALOT
  rationale: El pronombre singular retoma el arca o el objeto principal mencionado en el contexto inmediato. «Lo cubrirán» preserva el cambio de número del hebreo.
- source_word: בְּמִכְסֵה
  english_pob_choice: with a covering
  chosen_spanish: con una cubierta
  alternatives_spanish:
  - con una cobertura
  - con un recubrimiento
  lexicon: HALOT
  rationale: El sustantivo señala una capa de cobertura. «Cubierta» mantiene el sentido material y es idiomática en español.
- source_word: עוֹר תָּחַשׁ
  english_pob_choice: tahash skin
  chosen_spanish: piel de tahash
  alternatives_spanish:
  - cuero de tahash
  - piel de tejón
  - piel de marsopa
  - cuero fino
  lexicon: HALOT
  rationale: El término תחשׁ es incierto; por fidelidad auditable se conserva la transliteración «tahash» en lugar de elegir una identificación especulativa. «Piel de tahash» refleja la ambigüedad del original.
- source_word: וְשָׂמ֖וּ
  english_pob_choice: and put
  chosen_spanish: y pondrán
  alternatives_spanish:
  - y colocarán
  - y acomodarán
  lexicon: HALOT
  rationale: Verbo común de colocar/poner. «Pondrán» es claro y directo en español.
- source_word: בַּדָּיו
  english_pob_choice: its poles in place
  chosen_spanish: sus varas en su lugar
  alternatives_spanish:
  - sus varas
  - los varales
  - las varas para llevarlo
  lexicon: HALOT
  rationale: בדים son las varas de transporte del mueble sagrado. «Varas» comunica bien el instrumento y «en su lugar» explicita que deben quedar colocadas para el traslado, siguiendo la intención del contexto.
theological_decisions:
- issue: Tratamiento del término incierto תחשׁ
  english_pob_reading: tahash skin
  chosen_spanish_reading: piel de tahash
  alternative_spanish_readings:
  - piel de tejón
  - piel de marsopa
  - cuero fino
  rationale: No hay suficiente base para identificar con certeza el animal o material. La transliteración conserva la tensión documental y evita fijar una equivalencia tradicional sin respaldo sólido.
  doctrine_reference: Principio de transparencia textual y cautela exegética
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «yarn» y dejó simplemente «scarlet». Por eso el español evita añadir una especificación textil no explícita. También se mantiene la transliteración de «tahash» para reflejar la incertidumbre léxica preservada en el texto fuente y en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no lo contiene.
  - «Escarlata» se usa como sustantivo/adjetivo de color-materia sin añadir «hilo» ni «lana».
  - «Piel de tahash» conserva la ambigüedad del término hebreo.
  - «Varas» se prefiere por ser el término más natural para los bastones de transporte del santuario.
