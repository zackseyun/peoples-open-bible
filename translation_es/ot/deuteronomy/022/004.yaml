translation:
  language: es
  text: No verás el asno de tu hermano o su buey caídos en el camino y harás caso omiso de ellos; ciertamente los levantarás con él.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con él», subrayando que la acción debe hacerse junto al dueño y no dejarlo sin ayuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִיךָ
  english_pob_choice: your brother’s
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu compatriota
  - de tu pariente
  lexicon: HALOT
  rationale: ‘Hermano’ conserva el parentesco literal del hebreo y, en el contexto de la ley pactal, mantiene la fuerza comunitaria sin sustituirla por una glosa interpretativa.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - mula
  lexicon: HALOT
  rationale: ‘Asno’ es un equivalente fiel y totalmente comprensible en español bíblico; evita la posible coloquialidad de ‘burro’ y corresponde bien al animal de carga del texto.
- source_word: שׁוֹרוֹ
  english_pob_choice: his ox
  chosen_spanish: su buey
  alternatives_spanish:
  - su toro
  - su ganado
  lexicon: HALOT
  rationale: ‘Buey’ refleja el valor contextual de שׁוֹר en material legal sobre animal de trabajo. ‘Toro’ y ‘ganado’ serían menos precisos en este contexto.
- source_word: נֹפְלִים
  english_pob_choice: fallen
  chosen_spanish: caídos
  alternatives_spanish:
  - derribados
  - caídos al suelo
  lexicon: HALOT
  rationale: El participio indica animales que han caído o están tendidos; ‘caídos’ es natural en español y no añade matices no garantizados por el hebreo.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - por el camino
  lexicon: HALOT
  rationale: ‘En el camino’ es la formulación española más natural y fiel para el lugar de encuentro. ‘Camino’ evita el tono más moderno o administrativo de ‘carretera’.
- source_word: וְהִתְעַלַּמְתָּ מֵהֶם
  english_pob_choice: and ignore them
  chosen_spanish: y les harás caso omiso
  alternatives_spanish:
  - y los pasarás por alto
  - y te desentenderás de ellos
  lexicon: HALOT
  rationale: El hitpael de עלם expresa el acto de pasar por alto deliberadamente. ‘Les harás caso omiso’ comunica con naturalidad esa omisión intencional sin volverla demasiado explicativa.
- source_word: הָקֵם תָּקִים
  english_pob_choice: you must surely lift them up with him
  chosen_spanish: ciertamente los levantarás
  alternatives_spanish:
  - sin duda los alzarás
  - seguramente los pondrás en pie
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito intensifica el mandato; ‘ciertamente’ reproduce esa fuerza. ‘Levantarás’ conserva el gesto físico de alzar lo caído.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - asistiéndole
  lexicon: HALOT
  rationale: ‘Con él’ refleja de forma directa la cooperación exigida por el hebreo. Se mantiene la relación entre el auxilio y el dueño de los animales.
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió a una formulación más literal de עִמּוֹ («with him»). La redacción española conserva esa literalidad en «con él» y refleja la intensificación del mandato con «ciertamente», sin añadir contenido interpretativo sobre la manera exacta de levantar a los animales.
  spanish_consistency_notes:
  - Se mantuvo ‘hermano’ para אָחִיךָ, en línea con el valor comunitario del término en la ley deuteronómica.
  - Se prefirió ‘asno’ y ‘buey’ por ser equivalentes claros, dignos y precisos en español bíblico.
  - La nota al pie conserva la idea de acción cooperativa de עִמּוֹ, tal como el audit trail inglés la destacó.
