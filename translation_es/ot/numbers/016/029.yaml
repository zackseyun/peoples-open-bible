  - severity: medium
    issue: «cae sobre ellos» debilita el eco de פקד / פקדה
    rationale: El texto fuente repite la raíz פקד y el inglés POB documenta esa repetición con nota. «Cae sobre ellos» es idiomático, pero se aleja más del campo semántico de visitación/lo que sobreviene y hace menos transparente la nota lexical.
  - severity: low
    issue: «mueren la muerte de» suena algo calcado en español
    rationale: La construcción intenta preservar el énfasis hebreo, pero en español resulta menos natural. Una solución como «mueren como muere...» conserva el sentido sin paraprasear en exceso.
