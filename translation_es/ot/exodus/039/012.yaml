translation:
  language: es
  text: 'y la tercera fila: jacinto[a], ágata[b], y amatista.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varias piedras preciosas antiguas del pectoral del sumo sacerdote es incierta; aquí «jacinto» se refiere a una gema, no a la flor, y también puede traducirse como «ámbar» o, en la tradición inglesa antigua, «ligurio».
    reason: lexical_alternative
  - marker: b
    text: O «ónice» para la segunda piedra de esta fila.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  english_pob_choice: and the ... row
  chosen_spanish: y la ... fila
  alternatives_spanish:
  - y la ... hilera
  - y la ... fila de piedras
  lexicon: HALOT
  rationale: En el contexto del pectoral del sumo sacerdote, טּוּר designa una fila de piedras preciosas; «fila» comunica bien el orden lineal sin cargar el texto con una explicación adicional.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - tercer
  lexicon: HALOT
  rationale: El adjetivo ordinal se ajusta al sustantivo femenino implícito «fila», por lo que en español corresponde «tercera».
- source_word: לֶשֶׁם
  english_pob_choice: jacinth
  chosen_spanish: jacinto
  alternatives_spanish:
  - ámbar
  - ligurio
  lexicon: HALOT
  rationale: Se conserva una identificación tradicional y comprensible en español para esta gema, manteniendo en nota la incertidumbre sobre la equivalencia exacta.
- source_word: שְׁבוֹ
  english_pob_choice: agate
  chosen_spanish: ágata
  alternatives_spanish:
  - ónice
  lexicon: HALOT
  rationale: «Ágata» es la equivalencia más común y natural en español para esta piedra en la lista del pectoral; la alternativa tradicional se conserva como posibilidad.
- source_word: וְאַחְלָמָה
  english_pob_choice: and amethyst
  chosen_spanish: y amatista
  alternatives_spanish:
  - y amatista
  lexicon: HALOT
  rationale: «Amatista» es la identificación habitual y clara en español; el valor del conjunto se mantiene como enumeración directa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés de POB: conserva la estructura de lista, la ordinalidad de la fila y las dos notas léxicas sobre la incertidumbre de identificación de las piedras, sin introducir ampliaciones interpretativas adicionales. No hubo cambios en la última revisión del inglés.'
  spanish_consistency_notes:
  - Se usa «fila» para טּוּר por ser el equivalente más natural en español en una enumeración de piedras del pectoral.
  - Se emplea el femenino «tercera» en concordancia con «fila».
  - Se preserva la incertidumbre lexical mediante notas, tal como en el texto inglés de POB.
  - Se evita «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un término doctrinal sensible.
