theological_decisions:
- issue: Divine justice and intergenerational punishment formula
  chosen_reading: 'Retain the traditional tension: God forgives, yet does not clear the guilty, visiting fathers'' iniquity on children to the third and fourth generation.'
  alternative_readings:
  - Interpret as merely natural consequences rather than divine judgment
  - Soften to avoid apparent tension with later texts on individual responsibility
  rationale: The translation preserves the wording and theological tension present in the Hebrew rather than resolving it. This follows the stated philosophy to preserve tension where the source text itself presents it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
