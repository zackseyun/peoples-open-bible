    issue: «miren» para הִנָּם
    rationale: הִנָּם añade fuerza deíctica/enfática (‘he aquí’, ‘ciertamente’), no un mandato a los lectores. «Miren» cambia la función gramatical y baja el registro.
  - severity: low
