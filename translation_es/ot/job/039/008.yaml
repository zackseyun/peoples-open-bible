review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: el asno salvaje recorre las montañas como lugar de pastoreo y busca toda vegetación verde. Sin embargo, «como su pasto» no refleja bien מִרְעֵהוּ, que aquí apunta a su pastura/lugar de pastoreo, no a una comparación con «como». Además, la nota alternativa a) no preserva con suficiente precisión la alternativa inglesa «ranges over the mountains for his grazing place».'
  spanish_quality_summary: El español es claro, pero «como su pasto» suena poco natural y semánticamente impreciso. «Toda cosa verde» es entendible, aunque algo rígido; puede mantenerse si la nota aclara que se refiere a vegetación fresca. La frase mejora mucho con una construcción final más natural y fiel.
  glossary_alignment: 'No hay términos del glosario doctrinal mayor implicados. Las decisiones léxicas principales son adecuadas en general: «explora» para יְתוּר y «las montañas» para הָרִים funcionan bien. La mejora clave es representar מִרְעֵהוּ como «su pastura» o equivalente locativo, y mantener la nota sobre «cosa verde» como vegetación fresca.'
  issues:
  - severity: high
    issue: «como su pasto» introduce una comparación no presente en el hebreo
    rationale: מִרְעֵהוּ significa «su pastura / su lugar de pastoreo», no «como su pasto». La preposición/comparación «como» altera la relación sintáctica y el sentido.
  - severity: medium
    issue: La nota a) no refleja bien la alternativa documentada en inglés
    rationale: La alternativa inglesa es «ranges over the mountains for his grazing place», no simplemente «explora las montañas para hallar su pasto». Conviene preservar mejor el matiz de recorrer/rondar por las montañas como lugar de pastoreo.
  - severity: low
    issue: «Toda cosa verde» es algo tieso en español
    rationale: Aunque es bastante literal y aceptable con nota, la frase suena menos natural que «todo lo verde» o «toda vegetación verde». Si se conserva, la nota debe dejar claro que se refiere a vegetación fresca.
  revised_spanish_text: Explora las montañas como su pastura[a], y anda en busca de toda cosa verde[b].
  revised_footnotes:
  - marker: a
    text: 'O: «recorre las montañas como su lugar de pastoreo».'
    reason: lexical_alternative
  - marker: b
    text: «Toda cosa verde» se refiere a vegetación fresca o brotes verdes.
    reason: lexical_alternative
