translation:
  language: es
  text: La sabiduría para un necio es como una casa en ruinas[a], y el conocimiento del que carece de entendimiento es palabras inescrutables[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «una casa destruida»; el participio griego puede sugerir algo borrado, hecho desaparecer o arruinado.'
    reason: lexical_alternative
  - marker: b
    text: O «palabras que no se pueden examinar»; ἀδιεξέταστοι puede enfatizar tanto la imposibilidad de examinarlas como su incomprensibilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς οἶκος ἠφανισμένος
  english_pob_choice: a ruined house
  chosen_spanish: una casa en ruinas
  alternatives_spanish:
  - una casa destruida
  - una casa arruinada
  lexicon: LSJ
  rationale: ἠφανισμένος puede sugerir algo hecho invisible, borrado o arruinado. En español, 'una casa en ruinas' transmite la imagen de derrumbe e inutilidad práctica con naturalidad y sin perder el valor figurado del símil.
- source_word: μωρῷ
  english_pob_choice: to a fool
  chosen_spanish: para el necio
  alternatives_spanish:
  - al necio
  - para un necio
  lexicon: LSJ
  rationale: 'El dativo expresa relación: la sabiduría, en relación con el necio, resulta como una casa arruinada. ''Para el necio'' conserva esa referencia relacional en un español fluido.'
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  lexicon: LSJ
  rationale: '''Sabiduría'' es el equivalente normal y mantiene el paralelismo con ''conocimiento'' en la segunda cola.'
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  lexicon: LSJ
  rationale: 'Se conserva la distinción entre σοφία y γνῶσις: ''sabiduría'' / ''conocimiento''. ''Conocimiento'' es claro y formal en español bíblico contemporáneo.'
- source_word: ἀσυνέτου
  english_pob_choice: one without understanding
  chosen_spanish: del que carece de entendimiento
  alternatives_spanish:
  - del insensato
  - del que no entiende
  - del falto de entendimiento
  lexicon: LSJ
  rationale: '''Carece de entendimiento'' refleja con precisión la falta de discernimiento sin colapsarlo de inmediato con μωρός, que ya aparece en el primer colon. Preserva la diferencia semántica del griego.'
- source_word: ἀδιεξέταστοι λόγοι
  english_pob_choice: unsearchable words
  chosen_spanish: palabras que no se pueden examinar
  alternatives_spanish:
  - palabras inescrutables
  - palabras que no pueden investigarse
  lexicon: LSJ
  rationale: El griego sugiere palabras que no pueden ser investigadas o examinadas. 'Palabras que no se pueden examinar' mantiene de cerca la idea de no ser sometidas a escrutinio, aunque la revisión inglesa prefirió una forma más concisa ('unsearchable words').
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'words that cannot be examined' a 'unsearchable words' por concisión y naturalidad. En español se optó por una fórmula igualmente transparente y cercana al griego ('palabras que no se pueden examinar'), manteniendo abierta la alternativa de 'palabras inescrutables' en nota.
  spanish_consistency_notes:
  - Se mantiene la distinción sabiduría/conocimiento para reproducir el paralelismo del griego.
  - '''Necio'' y ''falto de entendimiento'' se distinguen para no aplanar μωρός y ἀσύνετος en un solo término.'
  - No se introduce terminología eclesiástica tradicional donde el griego y el audit trail no la requieren.
