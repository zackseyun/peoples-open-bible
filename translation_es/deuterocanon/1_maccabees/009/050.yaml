translation:
  language: es
  text: 'Y volvieron a Jerusalén y edificaron ciudades fortificadas en Judea: la fortaleza de Jericó, y Emaús, y Bet-horón, y Betel, y Tamnata-Pharathón[a], y Tefón[b], con muros altos, puertas y barras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tamnata-Pharathón también puede aparecer como «Timnat-Pharathón», una forma más familiar en otras tradiciones textuales.
    reason: lexical_alternative
  - marker: b
    text: Tefón es una transliteración de la forma griega; algunas tradiciones reflejan una ortografía diferente, como «Tafón».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - volvieron de vuelta
  lexicon: BDAG
  rationale: El verbo griego expresa retorno a un lugar previo. «Volvieron» es natural en español y conserva ese movimiento sin añadir matices innecesarios.
- source_word: ᾠκοδόμησαν
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: BDAG
  rationale: El verbo significa construir/edificar. «Edificaron» mantiene un registro digno y claro; no se especifica en el griego que se tratara de una reconstrucción, por eso no se impone «reedificaron».
- source_word: πόλεις ὀχυράς
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades fuertes
  - ciudades amuralladas
  lexicon: LSJ
  rationale: «Fortificadas» transmite la idea de defensa y fortificación urbana de manera idiomática en español.
- source_word: τὸ ὀχύρωμα
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el fuerte
  - la fortificación
  lexicon: LSJ
  rationale: El sustantivo singular designa una instalación fortificada. En español, «fortaleza» comunica bien la fuerza defensiva y es natural para lectores bíblicos contemporáneos.
- source_word: Ἰερειχὼ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: transliteración estándar
  rationale: Forma castellana establecida del topónimo.
- source_word: Ἐμμαοὺμ
  english_pob_choice: Emmaus
  chosen_spanish: Emaús
  alternatives_spanish:
  - Emaús
  lexicon: transliteración estándar
  rationale: Forma castellana usual del topónimo.
- source_word: Βεθωρὼν
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Bet Horón
  lexicon: transliteración estándar
  rationale: Se conserva el compuesto semítico con guion para claridad lectora.
- source_word: Βαιθὴλ
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: transliteración estándar
  rationale: Forma castellana convencional del topónimo.
- source_word: Θεμανάθα Φαραθὼν
  english_pob_choice: Thamnatha-pharathon
  chosen_spanish: Tamnata-Pharathón
  alternatives_spanish:
  - Timnat-Pharathón
  - Tamnatha-Pharathon
  lexicon: transliteración del griego
  rationale: Se sigue de cerca la forma griega transmitida en el texto fuente, conservando la oscilación tradicional del nombre con una forma castellana legible. Se evita imponer una normalización no atestiguada en este versículo.
- source_word: Τεφών
  english_pob_choice: Tephon
  chosen_spanish: Tefón
  alternatives_spanish:
  - Tafón
  - Tefón
  lexicon: transliteración del griego
  rationale: Se translitera directamente la forma griega del testimonio base, manteniendo la simplicidad del nombre propio.
- source_word: ἐν τείχεσιν ὑψηλοῖς
  english_pob_choice: with high walls
  chosen_spanish: con muros altos
  alternatives_spanish:
  - con murallas altas
  - en muros altos
  lexicon: LSJ
  rationale: La idea es acompañar la descripción de fortificación. «Con muros altos» resulta natural y fiel; «murallas» sería posible, pero el griego usa el término general para muros.
- source_word: πύλαις
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - gates
  lexicon: BDAG
  rationale: Aunque «puertas» es más general, en español bíblico comunica bien las aberturas de una ciudad fortificada; se evita una traducción demasiado técnica o arcaizante.
- source_word: μοχλοῖς
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - cerrojos
  - trancas
  lexicon: LSJ
  rationale: El término se refiere a piezas para asegurar puertas. «Barras» mantiene la amplitud semántica del griego y la coordinación natural con «puertas».
translation_notes:
  revision_awareness: El texto griego base y el audit trail inglés están en alta concordancia. La versión española sigue la lectura transmitida por el Swete LXX 1909 y conserva la lista topográfica y la descripción de fortificación sin introducir reconstrucciones no marcadas. Se mantuvieron las alternativas tradicionales en notas para los nombres con variación textual/ortográfica.
  spanish_consistency_notes:
  - Se usa «Y» al inicio como equivalente de la partícula coordinante inicial.
  - Se conserva «Yahvé» como terminología general del proyecto, pero este versículo no contiene el nombre divino.
  - Los topónimos se castellanizan cuando existe forma estable en español y se transliteran cuando el testimonio griego exige mayor proximidad.
  - «Fortaleza»/«fortificado» se reservan para el campo semántico militar del pasaje; no se usa terminología eclesial tradicional sin base en la fuente.
