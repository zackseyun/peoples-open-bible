base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/007.yaml
  text: He shall sprinkle it on the one being cleansed from the skin disease seven times[a], and he shall pronounce him clean[b], and he shall let the living bird go free over the open field.
  footnotes:
  - marker: a
    text: Traditionally 'leprosy.' The Hebrew term refers more broadly to a range of skin-related conditions in Leviticus, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
