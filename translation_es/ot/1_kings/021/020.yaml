    rationale: El hebreo לַעֲשׂוֹת הָרַע permite ambas aproximaciones, pero en español bíblico natural «hacer el mal» expresa mejor la categoría moral y evita una formulación algo torpe. La nota alternativa deja ver que incluso el borrador reconoce esta opción como válida y quizá preferible.
  - severity: low
