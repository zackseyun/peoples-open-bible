translation:
  language: es
  text: 'Entonces David dijo a Joab y a todo el pueblo que estaba con él: «Rasguen sus vestidos, cíñanse con saco y hagan duelo delante de Abner». Y el rey David iba caminando detrás de la camilla funeraria[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «litera funeraria» o «cama funeraria»; el hebreo suele significar «cama», pero aquí se refiere al soporte o plataforma sobre la que se llevaba el cuerpo de Abner.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְעוּ / Tear
  english_pob_choice: Tear
  chosen_spanish: Rasguen
  alternatives_spanish:
  - Rómpan
  - Despárran
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de rasgar la ropa en señal de luto. «Rasguen» conserva la fuerza concreta y ritual del mandato mejor que una paráfrasis más general.
- source_word: בִגְדֵיכֶם / your clothes
  english_pob_choice: your clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» es claro en español bíblico y conserva el referente a la ropa exterior. «Ropas» sería posible, pero aquí «vestidos» suena más natural en el registro solemne.
- source_word: וְחִגְרוּ שַׂקִּים / gird yourselves with sackcloth
  english_pob_choice: gird yourselves with sackcloth
  chosen_spanish: ciñan de saco
  alternatives_spanish:
  - ciñan saco
  - se ciñan de saco
  - vístanse de cilicio
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente la de ceñirse o envolver un saco de duelo. «Ciñan de saco» preserva esa acción corporal. Se evita «cilicio» porque introduce una equivalencia eclesiástica más tardía y puede desplazar el término concreto de duelo.
- source_word: וְסִפְדוּ / and mourn
  english_pob_choice: and mourn
  chosen_spanish: hagan duelo
  alternatives_spanish:
  - lamenten
  - lloren
  lexicon: HALOT
  rationale: ספד denota lamento formal por un muerto. «Hagan duelo» comunica bien el acto funerario sin reducirlo a emoción privada. «Lamenten» también es posible, pero «duelo» mantiene mejor el marco ritual.
- source_word: לִפְנֵי אַבְנֵר / before Abner
  english_pob_choice: before Abner
  chosen_spanish: delante de Abner
  alternatives_spanish:
  - ante Abner
  - en presencia de Abner
  lexicon: HALOT
  rationale: En este contexto procesional, la expresión apunta a la posición frente al féretro o al cuerpo. «Delante de Abner» sigue de cerca el hebreo y permite esa referencia contextual sin explicitarla demasiado.
- source_word: הֹלֵךְ / was walking
  english_pob_choice: was walking
  chosen_spanish: iba caminando
  alternatives_spanish:
  - caminaba
  - andaba
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Iba caminando» conserva la imperfectividad narrativa y suena natural en español.
- source_word: אַחֲרֵי / behind
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - después de
  lexicon: HALOT
  rationale: En una procesión funeraria, el sentido es espacial. «Detrás de» es la opción más clara y natural.
- source_word: הַמִּטָּה / the bier
  english_pob_choice: the bier
  chosen_spanish: el féretro
  alternatives_spanish:
  - la camilla funeraria
  - la parihuela
  - la litera funeraria
  lexicon: HALOT
  rationale: El hebreo puede referirse al soporte o plataforma que lleva el cuerpo. En español, «féretro» es la opción más reconocible en registro solemne para el elemento funerario, aunque no reproduce con exactitud la idea de plataforma. Se evita «cama» por ser engañoso en este contexto.
- source_word: וְהַמֶּלֶךְ דָּוִד / And King David
  english_pob_choice: And King David
  chosen_spanish: Y el rey David
  alternatives_spanish:
  - Y el rey, David
  - Y David, el rey
  lexicon: HALOT
  rationale: Se conserva la aposición real de David con el orden natural del español. «El rey David» mantiene la identificación regia sin añadir comas innecesarias.
theological_decisions:
- issue: Representación del duelo público y el honor debido al muerto
  english_pob_reading: David orders public mourning actions before Abner while walking behind the bier.
  chosen_spanish_reading: David manda gestos públicos de duelo delante de Abner y luego aparece caminando detrás del féretro.
  alternative_spanish_readings:
  - David ordena un luto público ante Abner
  - David marcha detrás de la camilla funeraria
  rationale: El versículo describe una respuesta pública y ceremonial ante la muerte de Abner. La traducción conserva esa dimensión comunitaria y ritual sin suavizarla a una mera tristeza interior.
  doctrine_reference: Luto y honra funeraria en el relato histórico
- issue: Tensión semántica de הַמִּטָּה
  english_pob_reading: the bier, with note that it can mean bed, funeral couch, or stretcher.
  chosen_spanish_reading: el féretro[c]
  alternative_spanish_readings:
  - la camilla funeraria
  - la litera funeraria
  - la cama
  rationale: Se mantiene la tensión de que el término hebreo no es estrictamente «féretro» en sentido moderno, sino un soporte funerario. La nota conserva la alternativa semántica sin borrar el valor contextual de procesión fúnebre.
  doctrine_reference: Precisión léxica y contexto narrativo
- issue: Forma del mandato de vestirse de saco
  english_pob_reading: gird yourselves with sackcloth.
  chosen_spanish_reading: ciñan de saco
  alternative_spanish_readings:
  - vístanse de cilicio
  - pónganse saco
  rationale: Se preserva el gesto corporal del duelo, evitando una equivalencia que sustituya el acto por un término eclesiástico más abstracto. Esto respeta el contenido ritual del hebreo.
  doctrine_reference: Lamento y signos externos de aflicción
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente al reflejar la idea de «gird yourselves with sackcloth» mediante «ciñan de saco», en vez de una paráfrasis más general como «vístanse». También conserva la solución final de la POB para el flujo narrativo: mandato de duelo público seguido de la imagen procesional del rey detrás del soporte funerario.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Abner» de forma consistente como nombre propio sin artículo.
  - Se evita «SEÑOR» y «Cristo» porque no corresponden al texto.
  - El registro es solemne pero moderno, sin arcaísmos innecesarios.
  - La nota del término funerario preserva la ambigüedad léxica relevante sin sobrecargar el texto principal.
