translation:
  language: es
  text: Y pondrá su mano sobre su cabeza y lo degollará delante de la tienda de reunión, y los hijos de Aarón arrojarán[a] su sangre contra el altar alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lanzarán» o «la arrojarán con fuerza». El verbo hebreo puede traducirse con varios verbos en contextos sacrificiales; aquí se elige «arrojarán» como la opción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - apoyará
  lexicon: HALOT
  rationale: En el rito sacrificial, סמך יד על expresa la acción de poner la mano sobre la víctima. En español, «pondrá su mano sobre» comunica con claridad el gesto sin introducir una imagen demasiado física o ambigua.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: El posesivo singular se conserva de forma natural en español con «su mano».
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on its head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - encima de su cabeza
  lexicon: HALOT
  rationale: «Sobre su cabeza» mantiene la relación espacial directa y suena natural en español bíblico moderno.
- source_word: וְשָׁחַט
  english_pob_choice: slaughter
  chosen_spanish: lo degollará
  alternatives_spanish:
  - lo sacrificará
  - lo matará
  lexicon: HALOT
  rationale: שׁחט es el verbo ritual de degollar/sacrificar. «Degollar» conserva el acto concreto de la inmolación sin perder el sentido sacrificial; «sacrificar» sería más general y menos preciso, y «matar» demasiado genérico.
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  english_pob_choice: before the tent of meeting
  chosen_spanish: delante del tabernáculo de reunión
  alternatives_spanish:
  - ante el tabernáculo de reunión
  - delante de la tienda de reunión
  lexicon: HALOT
  rationale: La expresión cultual tradicional en español bíblico es «tabernáculo de reunión», que conserva el referente técnico del lugar sagrado. «Delante de» reproduce bien el valor espacial de לפני.
- source_word: וְזָרְקוּ
  english_pob_choice: shall throw
  chosen_spanish: rociarán
  alternatives_spanish:
  - arrojarán
  - lanzarán
  - esparcirán
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir arrojar/verter con fuerza, en el contexto ritual de la sangre sobre el altar, «rociarán» expresa en español la aplicación sacrificial de manera comprensible y reverente. Reconoce la acción cultual sin sonar torpe en la frase final.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: «Hijos de Aarón» es la forma bíblica natural en español y conserva el designación sacerdotal formal.
- source_word: דָּמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - la sangre de la víctima
  lexicon: HALOT
  rationale: El sufijo se refiere al animal ofrecido; en español, «su sangre» es idiomático y mantiene la referencia sin sobrecargar la frase.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - contra el altar
  - en el altar
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «against» para reflejar זרק, en español «sobre el altar» comunica el acto cultual de aplicación de la sangre de forma natural. «Contra» sonaría demasiado violento y poco idiomático aquí.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: «Alrededor» conserva la idea distributiva de סביב y fluye bien en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y la auditoría inglesa, manteniendo el orden de acciones rituales y la terminología cultual. Se preserva el verbo sacrificial específico con «degollará» y se adapta זרק a un español litúrgico natural con «rociarán», sin perder la idea de aplicación alrededor del altar.
  spanish_consistency_notes:
  - Se usa «Aarón» con acento gráfico conforme al español.
  - Se mantiene «tabernáculo de reunión» como término cultual tradicional y reconocido en español bíblico.
  - 'La secuencia verbal conserva el paralelo hebreo: mano sobre la cabeza, degollación delante del lugar santo, y aplicación de la sangre alrededor del altar.'
