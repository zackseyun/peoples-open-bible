revisions:
- from: Y serán llevados a su fin[a], si no eres tú, Señor[b], quien los reprenda en tu ira.
  to: Y serán llevados a su fin[a], a menos que tú, Señor[b], los reprendas en tu ira.
  rationale: Se conserva la base léxica del borrador, pero se reemplaza la perífrasis enfática «si no eres tú... quien...» por «a menos que tú...», que representa con más fidelidad y naturalidad el griego ἐὰν μὴ σύ... ἐπιτιμήσεις. También se ajusta la nota b para que coincida con la sintaxis corregida.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:43:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en su estructura básica: καὶ = «Y», συντελεσθήσονται conserva la pasiva, ἐὰν μὴ expresa excepción condicional, Κύριε es vocativo directo, ἐπιτιμήσεις = «reprender», y ἐν ὀργῇ σου = «en tu ira». Sin embargo, «si no eres tú, Señor, quien los reprenda» introduce una perífrasis enfática que no corresponde al griego y complica innecesariamente la sintaxis. La excepción condicional se expresa mejor con «a menos que tú, Señor, los reprendas...» o «si no, tú, Señor, los reprendes...», siendo la primera la más natural y fiel.'
  spanish_quality_summary: «Serán llevados a su fin» es comprensible, pero algo calcado e idiomáticamente débil en español bíblico moderno. «Serán llevados a su fin» también suena más mecánico que natural. «Serán reducidos a su fin» no ayuda; la mejor reparación mínima es mantener la opción existente pero mejorar la cláusula condicional. El resto del verso es legible y digno. El uso de «Señor» aquí es correcto porque el griego tiene κύριε, no יהוה.
  glossary_alignment: 'Alinea bien con las pautas del proyecto: «Señor» para κύριε en vocativo, «ira» para ὀργή, y «reprendas» para ἐπιτιμήσεις. No hay conflicto con Yahvé/Mesías/Cristo u otras entradas del glosario. La única desviación relevante es estilística-sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: La construcción «si no eres tú, Señor, quien los reprenda» es demasiado enfática y perifrástica.
    rationale: El griego ἐὰν μὴ σύ, Κύριε, ἐπιτιμήσεις αὐτοῖς significa simplemente «a menos que tú, Señor, los reprendas». La formulación actual añade una estructura de foco («eres tú... quien») no exigida por el original y menos natural en español bíblico fluido.
  - severity: low
    issue: La nota b refleja la misma sintaxis forzada del texto principal.
    rationale: Si se revisa la cláusula principal, la nota alternativa debe armonizarse con la redacción corregida para no perpetuar la misma dificultad estilística.
  revised_spanish_text: Y serán llevados a su fin[a], a menos que tú, Señor[b], los reprendas en tu ira.
  revised_footnotes:
  - marker: a
    text: 'O: «serán consumados» o «serán destruidos» para «serán llevados a su fin» (συντελεσθήσονται).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y serán llevados a su fin, a menos que tú, Señor, los reprendas».'
    reason: alternative_reading
  revision_rationale: Se conserva la base léxica del borrador, pero se reemplaza la perífrasis enfática «si no eres tú... quien...» por «a menos que tú...», que representa con más fidelidad y naturalidad el griego ἐὰν μὴ σύ... ἐπιτιμήσεις. También se ajusta la nota b para que coincida con la sintaxis corregida.
