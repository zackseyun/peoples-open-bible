review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativos plurales, uso de «Yahvé», «la gloria de su nombre», «traigan una ofrenda» y referencia a los atrios/cortes del santuario. Sin embargo, «entren en sus atrios» intensifica ligeramente וּבֹאוּ («y vengan/venid») a «entren», y «en sus atrios» suena menos preciso con ese verbo. Una pequeña reparación puede acercar mejor el español al hebreo y al rastro POB inglés sin perder naturalidad.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Atribuyan a Yahvé la gloria de su nombre» funciona bien en registro litúrgico. La única mejora importante es la secuencia final: «vengan a sus atrios» o «vengan a sus patios/atrios» preserva mejor el verbo hebreo y la dirección del movimiento. También conviene suavizar la nota «regalo/ofrenda», que suena poco idiomática en español; «ofrenda de regalo» o «presente» sería mejor.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה → «Yahvé» correctamente; כבוד → «gloria»; מנחה → «ofrenda» con alternativas conservadas en nota. No hay conflicto teológico relevante. La revisión propuesta mantiene todo esto y solo ajusta el verbo de movimiento y la formulación de la nota léxica.'
  issues:
  - severity: medium
    issue: «entren en sus atrios» traduce וּבֹאוּ con más fuerza de la que pide el hebreo
    rationale: El verbo hebreo בוא significa «venir/ir/llegar/entrar» según contexto, pero aquí el texto fuente y el POB inglés prefieren «come». En español, «vengan a sus atrios» conserva mejor la simplicidad del imperativo y evita sobreespecificar la acción.
  - severity: low
    issue: La nota al pie usa «regalo/ofrenda», formulación poco natural
    rationale: Aunque intenta reflejar «gift offering», en español eclesial suena más natural «presente», «tributo» u «ofrenda de regalo». Conviene pulir la nota para mejor legibilidad sin alterar la razón léxica.
  revised_spanish_text: Atribuyan a Yahvé la gloria de su nombre; traigan una ofrenda[a] y vengan a sus atrios.
