lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - les habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa de forma natural en español con el pretérito simple «dijo», manteniendo la progresión narrativa sin añadir matices no presentes en el hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellas
  lexicon: HALOT
  rationale: El dativo pronominal español «les» reproduce la dirección del habla hacia el grupo y evita una repetición innecesaria de «a ellos» en estilo narrativo fluido.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Standard onomastics
  rationale: Nombre propio bíblico en su forma española estable y ampliamente reconocida.
- source_word: הַחִיִּיתֶם
  english_pob_choice: have you kept alive
  chosen_spanish: han mantenido con vida
  alternatives_spanish:
  - han dejado con vida
  - han hecho vivir
  - han preservado con vida
  lexicon: HALOT
  rationale: El causativo de חיה pide una traducción que conserve la idea de permitir o causar que sigan viviendo. «Han mantenido con vida» suena natural en español y preserva mejor la fuerza causativa que una simple paráfrasis como «han salvado».
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todas
  alternatives_spanish:
  - cada una
  - todas y cada una
  lexicon: HALOT
  rationale: Con el sustantivo femenino plural implícito en el contexto, «todas» comunica la totalidad del grupo de manera idiomática en español, manteniendo la exhaustividad del hebreo.
- source_word: נְקֵבָה
  english_pob_choice: female
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las hembras
  - cada femenina
  - cada mujer
  lexicon: HALOT
  rationale: En español, «females» como sustantivo sería antinatural y demasiado técnico. Dado el contexto humano del pasaje, «las mujeres» ofrece una lectura publicable y comprensible, aunque reconoce una leve pérdida del matiz biológico más amplio del hebreo. La alternativa más literal «las hembras» sería inaceptable en registro bíblico español.
theological_decisions:
- issue: Alcance de נְקֵבָה en contexto de guerra
  english_pob_reading: female
  chosen_spanish_reading: las mujeres
  alternative_spanish_readings:
  - las hembras
  - cada mujer
  rationale: El hebreo usa un término amplio y clínico para sexo femenino, pero en español una traducción literal como «hembras» deshumanizaría innecesariamente el texto y sonarían extraña. Dado que el contexto inmediato de guerra ya señala que se trata de personas, «las mujeres» preserva la inteligibilidad sin introducir una categoría zoológica.
  doctrine_reference: Translation philosophy §§1, 4, 6
translation_notes:
  revision_awareness: El contexto auditado muestra que la versión inglesa se mantuvo sin cambios en la última revisión y que hubo alto acuerdo en la revisión cruzada; por eso esta propuesta conserva la misma decisión central sobre el causativo de חיה y la generalidad de נְקֵבָה, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene el trato reverente del nombre propio «Moisés» y la puntuación de cita directa estándar en español.
  - Se evita «SEÑOR» u այլ sustitución no pertinente; este versículo no contiene el Tetragrámaton ni un título divino.
  - Se preserva el valor causativo de חיה con una construcción española de resultado continuado («mantener con vida»).
  - La nota alternativa conserva la tensión lexical entre «mantener con vida» y «dejar con vida» sin forzar una paráfrasis teológica.
