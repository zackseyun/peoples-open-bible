translation:
  language: es
  text: Los árboles de loto lo cubren con su sombra[a]; los sauces del arroyo lo rodean[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «árboles de sombra» para צֶאֱלִים; la identificación botánica precisa es incierta, aunque «árboles de loto» es la traducción tradicional.
    reason: lexical_alternative
  - marker: b
    text: O «los álamos del wadi» para עַרְבֵי נָחַל.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְסֻכֻּהוּ
  english_pob_choice: cover him
  chosen_spanish: lo cubren
  alternatives_spanish:
  - lo cubren por encima
  - lo resguardan
  lexicon: HALOT
  rationale: El hebreo expresa la acción de cubrir o resguardar; «lo cubren» reproduce con naturalidad el sentido básico y mantiene la imagen poética de protección por sombra sin añadir interpretación.
- source_word: צֶאֱלִים
  english_pob_choice: lotus trees
  chosen_spanish: árboles de loto
  alternatives_spanish:
  - árboles de sombra
  - plantas de loto
  lexicon: HALOT
  rationale: POB conserva la identificación botánica tradicional «lotus trees». En español, «árboles de loto» mantiene esa equivalencia tradicional y evita sustituirla por una explicación más genérica que borre la tensión lexical sobre la identificación precisa.
- source_word: צִלּוֹ
  english_pob_choice: with their shade
  chosen_spanish: con su sombra
  alternatives_spanish:
  - con su sombra fresca
  - con su sombra protectora
  lexicon: HALOT
  rationale: צֵל significa sombra/sombra protectora; «con su sombra» es fiel y comprensible. Se evita «sombra» en sentido meramente negativo y se conserva el valor imagístico de protección y frescor.
- source_word: יְסֻבּוּהוּ
  english_pob_choice: surround him
  chosen_spanish: lo rodean
  alternatives_spanish:
  - lo cercan
  - lo encirclean
  lexicon: HALOT
  rationale: El verbo סבב indica rodear o cercar; «lo rodean» es el equivalente español más natural y directo, manteniendo el paralelismo con el primer hemistiquio.
- source_word: עַרְבֵי נָחַל
  english_pob_choice: the willows of the brook
  chosen_spanish: los sauces del arroyo
  alternatives_spanish:
  - los álamos del wadi
  - los sauces del torrente
  lexicon: HALOT
  rationale: POB ofrece «willows of the brook» y nota la alternativa «poplars of the wadi». En español, «sauces» comunica mejor la imagen ribereña y es un equivalente poético natural para עַרְבֵי, mientras «arroyo» conserva la idea de curso de agua sin exigir el tecnicismo «wadi».
translation_notes:
  revision_awareness: El texto inglés POB vigente lee «The lotus trees cover him with their shade; the willows of the brook surround him», con nota alternativa para צֶאֱלִים y para עַרְבֵי נָחַל. La versión española conserva esas dos alternativas en notas y mantiene la misma resolución poética principal, sin cambios respecto del sentido auditado.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo verbal: cubrir/rodear.'
  - «Sombra» traduce צֵל sin imponer una glosa adicional.
  - Se conserva la identificación tradicional «árboles de loto» y la alternativa botánica en nota.
  - «Arroyo» funciona como equivalente natural de נָחַל en este contexto poético, sin perder la imagen de ribera.
