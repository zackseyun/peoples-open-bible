translation:
  language: es
  text: 'y miel, cuajada[a], ovejas[b] y queso de vacuno[c] trajeron para David y para el pueblo que estaba con él, para comer, porque dijeron: «El pueblo tiene hambre, está cansado y tiene sed en el yermo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantequilla» para חֶמְאָה; el hebreo puede designar en general un producto lácteo, pero aquí probablemente se refiere a cuajada.
    reason: lexical_alternative
  - marker: b
    text: O «ganado menor»; el hebreo צֹאן puede referirse colectivamente a ovejas y cabras.
    reason: lexical_alternative
  - marker: c
    text: La expresión «queso de vacuno» traduce שְׁפוֹת בָּקָר, un producto lácteo procedente del ganado vacuno; algunas traducciones lo expresan de forma más general.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe
  lexicon: HALOT
  rationale: La voz hebrea normalmente designa miel; en este contexto de provisiones alimenticias, «miel» es la equivalencia natural y fiel en español.
- source_word: חֶמְאָה
  english_pob_choice: curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - mantequilla
  - crema
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada del POB inglés, el término hebreo aquí apunta mejor a un producto lácteo cuajado, no a mantequilla moderna; «cuajada» comunica bien esa realidad en español.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - animales del rebaño
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar ovejas y cabras como conjunto, en una lista breve de provisiones «ovejas» es claro y natural, y mantiene el sentido concreto elegido por el POB inglés.
- source_word: שְׁפוֹת בָּקָר
  english_pob_choice: cheese from the herd
  chosen_spanish: queso de vacuno
  alternatives_spanish:
  - queso de la vacada
  - queso de res
  lexicon: HALOT
  rationale: La frase hebrea indica un producto lácteo asociado con el ganado vacuno. «Queso de vacuno» preserva el vínculo con בָּקָר sin convertirlo en una paráfrasis demasiado general.
- source_word: הִגִּישׁוּ
  english_pob_choice: they brought near
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - acercaron
  lexicon: HALOT
  rationale: El verbo significa literalmente «acercar/presentar». En español, «trajeron» comunica con naturalidad la acción de llevar las provisiones a David y al pueblo, sin perder el valor de suministro.
- source_word: לְדָוִד וְלָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: for David and for the people who were with him
  chosen_spanish: para David y para el pueblo que estaba con él
  alternatives_spanish:
  - a David y al pueblo que estaba con él
  lexicon: HALOT
  rationale: Se conserva la distribución del hebreo con «para ... y para ...», reflejando el destino de los alimentos. «Que estaba con él» reproduce de forma directa la cláusula relativa.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para comer» es el modo más natural en español y mantiene la función teleológica del hebreo.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: porque dijeron
  alternatives_spanish:
  - pues dijeron
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la acción. «Porque dijeron» conserva la relación explicativa de manera clara en español.
- source_word: רָעֵב וְעָיֵף וְצָמֵא
  english_pob_choice: hungry and weary and thirsty
  chosen_spanish: tiene hambre, está cansado y tiene sed
  alternatives_spanish:
  - está hambriento, fatigado y sediento
  lexicon: HALOT
  rationale: Se preserva la triple caracterización del pueblo. Opté por expresiones idiomáticas en español que mantengan el paralelo semántico sin sobrerreformular la secuencia hebrea.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en el yermo
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar «wilderness», en español «desierto» es plenamente comprensible y conserva el trasfondo de lugar árido y deshabitado de la escena.
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés indica que no hubo cambios; por eso se mantiene la lectura básica del inglés auditado y se ajusta solo la formulación española para naturalidad y fidelidad al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa «cuajada» para reflejar la decisión léxica auditada sobre חֶמְאָה, sin imponer «mantequilla» como equivalente moderno.
  - Se conserva el paralelismo de provisiones y la finalidad «para comer», evitando una paráfrasis más libre.
  - «Desierto» se usa aquí como término español amplio y natural para מִדְבָּר, compatible con el trasfondo narrativo.
