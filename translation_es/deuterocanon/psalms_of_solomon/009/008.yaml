lexical_decisions:
- source_word: ἐπεσκέπτῃ
  english_pob_choice: visit
  chosen_spanish: visitas
  alternatives_spanish:
  - examinas
  - inspeccionas
  - retienes tu mirada sobre
  lexicon: BDAG
  rationale: El verbo griego admite la idea de visitar, atender o intervenir. Dado el contexto inmediato de juicio y rendición de cuentas en este salmo, mantengo el valor formal de 'visitar' en español, que deja abierta tanto la idea de intervención divina como la de visita con propósito judicial, sin introducir una paráfrasis más interpretativa.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia rectora
  lexicon: BDAG
  rationale: En este contexto, δικαιοσύνη describe el modo justo de actuar de Dios. En español, 'justicia' comunica mejor ese matiz que 'rectitud' y conserva la fuerza jurídica y moral del pasaje.
- source_word: υἱοὺς ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  - los hijos de la humanidad
  lexicon: BDAG
  rationale: Conservo la expresión semítica masculina representativa porque el texto fuente la usa como fórmula idiomática para la humanidad. 'Los hijos de los hombres' es comprensible en español bíblico y preserva la forma marcada del original, mientras que una neutralización perdería ese rasgo lexical.
theological_decisions:
- issue: Force judicial de ἐπισκέπτομαι en el contexto de Psalms of Solomon 9
  english_pob_reading: The English audit trail moved from 'watch over' to 'examine' and then back to 'visit' to preserve the formal sense of divine visitation without interpretive expansion.
  chosen_spanish_reading: Conservo 'visitas' como traducción formal, con la lectura de una visita divina con alcance judicial, no meramente pastoral.
  alternative_spanish_readings:
  - examinas
  - inspeccionas
  - cuidas
  rationale: El contexto inmediato presenta a Dios como juez justo y subraya la responsabilidad humana. 'Visitas' respeta la polisemia del verbo y evita borrar la tensión entre visita divina y escrutinio judicial; las alternativas 'examinas' o 'inspeccionas' captan más explícitamente el juicio, pero añaden interpretación.
  doctrine_reference: Divine judgment and accountability; gender-accurate representation
translation_notes:
  revision_awareness: El rastro de revisión en inglés pasó de 'watch over' a 'examine' y luego volvió a 'visit'. La versión española sigue el último estado revisado ('visit'), pero conserva en nota la posibilidad de una lectura judicial más explícita, porque el contexto del capítulo favorece esa fuerza sin obligar a fijarla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa 'justicia' para δικαιοσύνη, conforme al contexto moral-jurídico y al estándar del proyecto, sin convertirla en 'rectitud' salvo que el contexto lo exigiera claramente.
  - Se conserva el giro masculino 'los hijos de los hombres' en el texto principal para mantener la forma idiomática semítica y la política de precisión de género del proyecto.
  - '''Visitas'' mantiene la ambigüedad productiva de ἐπισκέπτομαι entre visita, intervención y escrutinio, que el historial auditado en inglés trató de equilibrar.'
