    issue: «Nuestros atormentadores» es poco idiomático en español bíblico natural.
    rationale: Aunque semánticamente cercano a «tormentors», suena forzado. Se puede expresar mejor la hostilidad opresiva con «nuestros opresores[a]», manteniendo la alternativa «burladores» en nota para preservar la incertidumbre léxica.
  - severity: low
    issue: «Palabras de canto» es una reproducción demasiado calcada del hebreo.
    rationale: Preserva la forma fuente, pero en español suena rígida. «Palabras de una canción» mejora la naturalidad sin borrar del todo la transparencia de דִּבְרֵי שִׁיר.
  revised_spanish_text: 'Porque allí nuestros captores nos pedían palabras de una canción, y nuestros opresores[a], alegría: «Cántennos uno de los cantos de Sion».'
