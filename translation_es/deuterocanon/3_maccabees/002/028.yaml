    text: '''Inscripción'' puede referirse más específicamente al enrolamiento para control estatal o tributación.'
    reason: cultural_note
  - marker: c
    text: Literalmente, 'remover de la vida'; es decir, darles muerte.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para alinear mejor el español con la evidencia griega y la auditoría POB: se movió la nota de τὰ ἱερά al lugar correcto, se mejoró λαογραφίαν con ''inscripción'', se precisó οἰκετικὴν διάθεσιν como ''estado de esclavitud'', y se aclaró la pena capital en el texto principal conservando el modismo en nota.'
