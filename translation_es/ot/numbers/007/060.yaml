translation:
  language: es
  text: El noveno día[a], el líder de los hijos de Benjamín fue Abidán, hijo de Gideoní.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder para los hijos de Benjamín». El hebreo en esta frase puede expresar representación o relación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/יּוֹם
  english_pob_choice: On the ... day
  chosen_spanish: Al ... día
  alternatives_spanish:
  - En el ... día
  lexicon: HALOT
  rationale: El ב temporal se expresa de forma natural en español con «al» cuando introduce el día señalado. «En el día» sería más literal, pero menos idiomático en este contexto cronológico.
- source_word: הַ/תְּשִׁיעִי
  english_pob_choice: ninth
  chosen_spanish: noveno
  alternatives_spanish:
  - novena
  lexicon: HALOT
  rationale: Es un ordinal que modifica a «día». En español concuerda en masculino con «día», por lo que «noveno» comunica con precisión la referencia temporal.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números 7 este término designa al representante tribal que presenta la ofrenda. «Líder» conserva la función social sin introducir matices monárquicos que «príncipe» podría sugerir.
- source_word: לִ/בְנֵ֣י בִנְיָמִ֑ן
  english_pob_choice: of the sons of Benjamin
  chosen_spanish: de los hijos de Benjamín
  alternatives_spanish:
  - para los hijos de Benjamín
  - de los benjaminitas
  - del pueblo de Benjamín
  lexicon: HALOT
  rationale: Se preserva la construcción relacional del hebreo y el lenguaje genealógico masculino del texto. «Hijos de Benjamín» refleja mejor la forma hebrea que una neutralización interpretativa.
- source_word: אֲבִידָ֖ן
  english_pob_choice: Abidan
  chosen_spanish: Abidán
  alternatives_spanish:
  - Abidán
  lexicon: Transliteration
  rationale: Se translitera el nombre propio en forma española con acento gráfico para ajustarse a la pronunciación y a la ortografía del español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Es la forma patronímica natural y exacta en español para reproducir la relación de filiación.
- source_word: גִּדְעֹנִי
  english_pob_choice: Gideoni
  chosen_spanish: Gedeoní
  alternatives_spanish:
  - Gideoní
  lexicon: Transliteration
  rationale: Se translitera el nombre propio con adaptación gráfica al español. «Gedeoní» mantiene la sonoridad esperable en español y evita la grafía inglesa.
theological_decisions:
- issue: Valor representativo de לִבְנֵי בִנְיָמִן
  english_pob_reading: The Hebrew preposition can express representation or relation in this phrase.
  chosen_spanish_reading: la preposición puede expresar relación o representación en esta frase
  alternative_spanish_readings:
  - para los hijos de Benjamín
  - de los hijos de Benjamín
  rationale: 'Se conserva la ambigüedad funcional del hebreo: el líder pertenece a la tribu y también la representa. No se fija una sola lectura que elimine esa tensión documental.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Designación tribal masculina בְנֵי
  english_pob_reading: sons of Benjamin
  chosen_spanish_reading: hijos de Benjamín
  alternative_spanish_readings:
  - benjaminitas
  - pueblo de Benjamín
  rationale: Se mantiene la forma filial masculina del hebreo en un contexto administrativo-genealógico, evitando una neutralización que borre la precisión del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue el patrón semántico del texto hebreo y concuerda con la auditoría inglesa: mantiene el día ordinal, el cargo tribal y la relación patronímica sin sobretraducir ni suavizar la terminología.'
  spanish_consistency_notes:
  - Se usó «hijos de Benjamín» para conservar la construcción genealógica masculina del hebreo.
  - Se eligió «líder» como equivalente funcional de נָשִׂיא, coherente con el uso administrativo de Números 7.
  - Los nombres propios se transliteraron de forma estable y legible para el español.
  - La nota al pie conserva la ambigüedad de לִבְנֵי sin imponer una sola relación semántica.
