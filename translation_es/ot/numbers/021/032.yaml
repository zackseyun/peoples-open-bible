translation:
  language: es
  text: Entonces Moisés envió hombres a explorar Jazer, y capturaron sus aldeas[a] y desposeyeron a los amorreos que estaban allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus hijas», un hebraísmo para los asentamientos dependientes o aldeas de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de שׁלח en narrativa expresa envío; «envió» es natural en español y conserva el valor narrativo básico sin sobrecargar el tono.
- source_word: לְרַגֵּל
  english_pob_choice: to spy out
  chosen_spanish: a reconocer
  alternatives_spanish:
  - a espiar
  - a explorar
  - a reconnoiter
  lexicon: HALOT
  rationale: Aquí el verbo tiene sentido militar de reconocimiento del terreno. En español, «reconocer» comunica bien la exploración previa sin introducir la connotación negativa de espionaje, aunque esa opción queda detrás en el inglés auditado.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Jaazer
  lexicon: standard transliteration
  rationale: Se conserva la transliteración estándar del topónimo bíblico, acorde con el uso del POB inglés y la inteligibilidad en español.
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: they captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - tomaron
  - se apoderaron de
  - aprisionaron
  lexicon: HALOT
  rationale: En contexto militar, לכד indica captura o toma de una plaza; «capturaron» reproduce bien la acción y el progreso de la narración.
- source_word: בְּנֹתֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus hijas
  - sus poblados dependientes
  - sus villas
  lexicon: HALOT
  rationale: El idioma hebreo literalmente dice «sus hijas», pero la expresión designa asentamientos dependientes de una ciudad. En español, «aldeas» transmite la idea sin perder el trasfondo idiomático; la nota preserva la alternativa literal.
- source_word: וַיִּירַשׁ
  english_pob_choice: dispossessed
  chosen_spanish: desposeyeron
  alternatives_spanish:
  - tomaron posesión de
  - expulsaron a
  - heredaron
  lexicon: HALOT
  rationale: En contextos de conquista, ירש combina posesión con desplazamiento de los ocupantes previos. «Desposeyeron» mantiene esa fuerza mejor que «poseyeron» o «heredaron».
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - a los amorreos (el amorreo colectivo)
  - al amorreo
  lexicon: HALOT
  rationale: El singular colectivo hebreo se vierte naturalmente con el plural étnico español «amorreos», manteniendo la referencia a ese pueblo.
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: who were there
  chosen_spanish: que estaban allí
  alternatives_spanish:
  - que vivían allí
  - que se hallaban allí
  lexicon: HALOT
  rationale: La frase refiere a la presencia local de los amorreos; «estaban allí» es idiomático y fiel al sentido de ubicación.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente; esta propuesta sigue el mismo sentido global y conserva la nota idiomática sobre «sus hijas».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Reconocer» se usa en sentido militar/topográfico, no como mero conocimiento previo.
  - «Desposeyeron» mantiene el matiz de conquista y desplazamiento documentado en el inglés auditado.
  - La nota de «sus hijas» preserva la tensión entre literalidad hebrea e idiomatismo geográfico en español.
