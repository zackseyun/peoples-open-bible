base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/006.yaml
  text: The land of Egypt is before you[a]. Settle your father and your brothers in the best of the land; let them live in the land of Goshen. And if you know that there are capable men among them[b], then appoint them as overseers of the livestock that belongs to me.
  footnotes:
  - marker: a
    text: Or 'able men,' 'competent men,' or more literally 'men of strength/ability.' The phrase does not necessarily imply military valor here.
    reason: lexical_alternative
  - marker: b
    text: '''Is before you'' is a Hebrew idiom that can imply availability or freedom to choose within Egypt.'
    reason: cultural_note
