translation:
  language: es
  text: Porque es un tropiezo para un necio[a], y todo ingenuo queda atrapado por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque los sueños extraviaron a muchos, y los que esperaban en ellos cayeron». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: תקלה
  english_pob_choice: stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - obstáculo
  - causa de ruina
  lexicon: HALOT
  rationale: El sustantivo expresa algo que hace caer o llevar a ruina. «Tropiezo» conserva la imagen concreta y su fuerza proverbial en español, sin sonar tan largo como «piedra de tropiezo».
- source_word: אויל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - tonto
  - falto de juicio
  lexicon: HALOT
  rationale: En literatura sapiencial, el término designa a una persona moral e intelectualmente torpe. «Necio» es un equivalente bíblico natural en español y mantiene el registro sapiencial.
- source_word: פותה
  english_pob_choice: simpleton
  chosen_spanish: simple[ton]
  alternatives_spanish:
  - persona ingenua
  - ingenuo
  - simple
  lexicon: HALOT
  rationale: El hebreo apunta a alguien fácilmente engañable. «Simpleton» no es natural en español; por eso se usa una forma equivalente de credulidad, «simple», y se marca la decisión con nota para explicar la pérdida de un matiz idiomático del inglés POB.
- source_word: יוקש
  english_pob_choice: is ensnared
  chosen_spanish: queda atrapado
  alternatives_spanish:
  - es enredado
  - es prendido
  - es cazado
  lexicon: HALOT
  rationale: La forma pasiva evoca caer en una trampa. «Queda atrapado» comunica bien la imagen de ser preso por algo engañoso y suena natural en español.
- source_word: בו
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - en él
  - a causa de él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al objeto anterior, de género masculino en español por concordancia con «tropiezo». «Por él» funciona de modo natural con la pasiva y conserva la referencia anafórica.
theological_decisions:
- issue: Divergencia sustancial entre el hebreo y el paralelo griego
  english_pob_reading: 'Main text follows the Hebrew: ''For it is a stumbling block to a fool, and every simpleton is ensnared by it.'' Greek footnote preserves the alternate line about dreams misleading many.'
  chosen_spanish_reading: El texto principal sigue el hebreo; la nota conserva el paralelo griego como lectura alternativa sustancial.
  alternative_spanish_readings:
  - Porque muchos sueños extraviaron a muchos, y los que esperaban en ellos cayeron.
  rationale: En Sirácida, el hebreo conservado se toma como texto principal cuando está disponible. Aquí el griego no es una mera variante léxica, sino una línea distinta; por eso el cuerpo sigue el hebreo y la nota registra honestamente la divergencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobreviva; usar el paralelo griego como testimonio real y preservar con honestidad la incertidumbre textual.'
translation_notes:
  revision_awareness: Revisión ya confirmada como sin cambios en el último pase; no se incorporaron ajustes posteriores adicionales.
  spanish_consistency_notes:
  - Se prefirió «necio» para אויל por coherencia con el léxico sapiencial bíblico en español.
  - Se evitó «SEÑOR» y cualquier terminología de ocultamiento porque este versículo no contiene el Tetragrámaton.
  - La nota mantiene la divergencia textual fuerte entre hebreo y griego, siguiendo el audit trail inglés.
  - Se eligió una solución idiomática para פותה, aunque el inglés POB usa «simpleton»; en español se explica la pérdida de ese matiz con la nota y la decisión lexical.
