translation:
  language: es
  text: Porque no nos probó con fuego[a], como a aquellos, para poner a prueba sus corazones; ni se vengó de nosotros. Más bien[b], el Señor azota a los que se acercan a él para amonestación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no nos quemó como a aquellos, para poner a prueba sus corazones''. El griego conserva la imagen del fuego mientras la usa con sentido de prueba.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''el Señor disciplina/castiga a los que se acercan a él''. El verbo griego es literalmente ''azota'', y conserva la severidad de la imagen correctiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπύρωσεν
  english_pob_choice: tested ... by fire
  chosen_spanish: probó con fuego
  alternatives_spanish:
  - nos quemó
  - nos refinó con fuego
  - nos puso a prueba con fuego
  lexicon: LSJ
  rationale: El griego conserva la imagen de fuego, pero en contexto expresa una prueba con propósito evaluativo. 'Probó con fuego' mantiene la imaginería y el sentido de prueba sin reducirlo a mera combustión.
- source_word: εἰς ἔτασμόν
  english_pob_choice: for the examination of
  chosen_spanish: para la examinación de
  alternatives_spanish:
  - para la prueba de
  - para examinar
  - con miras a examinar
  lexicon: LSJ
  rationale: La frase indica finalidad respecto del proceso de prueba. 'Examinación' conserva el matiz formal y objetivo de evaluación, alineado con el inglés auditado.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazón
  alternatives_spanish:
  - corazones
  - mente
  - interior
  lexicon: LSJ
  rationale: En español bíblico singular puede funcionar colectivamente y mantiene el sentido antropológico del centro interior. Aquí se traduce de manera natural sin perder el valor de interioridad.
- source_word: ἐξεδίκησεν
  english_pob_choice: has he taken vengeance on
  chosen_spanish: se vengó de
  alternatives_spanish:
  - lo castigó
  - hizo justicia contra
  - tomó venganza de
  lexicon: LSJ
  rationale: El verbo expresa retribución o venganza. 'Se vengó de nosotros' conserva la fuerza del contraste con la acción correctiva posterior, sin suavizarla a un castigo genérico.
- source_word: νουθέτησιν
  english_pob_choice: for admonition
  chosen_spanish: para amonestación
  alternatives_spanish:
  - para admonición
  - para instrucción
  - como advertencia
  lexicon: LSJ
  rationale: '''Amonestación'' reproduce el matiz de corrección exhortativa y funciona bien en registro bíblico. Se evita ''disciplina'' porque podría diluir la distinción con el verbo siguiente.'
- source_word: μαστιγοῖ
  english_pob_choice: scourges
  chosen_spanish: azota
  alternatives_spanish:
  - flagela
  - castiga con azotes
  - disciplina
  lexicon: LSJ
  rationale: El verbo es literalmente de azotar/flagelar. 'Azota' preserva la severidad de la imagen y evita suavizar el carácter corporal y punitivo del término.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el texto griego dice Κύριος y la forma tradicional 'el Señor' refleja mejor la capa griega citada por el pasaje. La referencia reverente queda clara en español sin forzar una retrotraducción al hebreo.
- source_word: τοὺς ἐγγίζοντας αὐτῷ
  english_pob_choice: those who draw near to him
  chosen_spanish: los que se acercan a él
  alternatives_spanish:
  - los que se aproximan a él
  - los que se allegan a él
  - los que se acercan ante él
  lexicon: LSJ
  rationale: '''Se acercan a él'' es idiomático y conserva la relación de proximidad religiosa/covenantal. Se evita una formulación demasiado técnica o arcaica.'
theological_decisions:
- issue: Si el final debe atenuar la imagen severa de castigo corporal o conservarla
  english_pob_reading: 'Retain the concrete metaphor: ''the Lord scourges those who draw near to him for admonition.'''
  chosen_spanish_reading: 'Conservar la imagen concreta: ''el Señor azota a los que se acercan a él para amonestación.'''
  alternative_spanish_readings:
  - el Señor disciplina a los que se acercan a él para amonestarlos
  - el Señor corrige a los que se acercan a él
  rationale: El griego usa μαστιγοῖ, verbo fuerte de azotar. Traducirlo por 'disciplina' o 'corrige' suavizaría la tensión del pasaje entre venganza y corrección dolorosa. 'Azota' mantiene la severidad sin negar su finalidad formativa.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
- issue: Cómo expresar la relación entre ausencia de venganza y propósito correctivo
  english_pob_reading: Translate ἀλλʼ εἰς νουθέτησιν as 'Rather ... for admonition' to show that God's action is corrective, not retaliatory.
  chosen_spanish_reading: Traducir ἀλλʼ εἰς νουθέτησιν como 'Antes ... para amonestación' para mostrar que la acción divina es correctiva, no vengativa.
  alternative_spanish_readings:
  - sino ... para disciplina
  - más bien ... como advertencia
  rationale: '''Antes'' comunica bien el contraste adversativo del griego y suena natural en español bíblico. ''Amonestación'' preserva el carácter pedagógico/correctivo del propósito sin ampliar el sentido más allá del texto.'
  doctrine_reference: DOCTRINE.md §3
translation_notes:
  revision_awareness: El audit trail inglés revisó 'to examine their hearts' a 'for the examination of their hearts' para acercarse más a εἰς ἔτασμόν τῆς καρδίας αὐτῶν; la versión española refleja esa misma finalidad con 'para la examinación de su corazón'. Se mantuvo la severidad de μαστιγοῖ con 'azota' y el contraste entre venganza y corrección con 'amonestación'.
  spanish_consistency_notes:
  - Se conservó 'el Señor' para Κύριος por corresponder al estrato griego citado, sin introducir 'Yahvé' donde no aparece en el texto fuente.
  - '''Amonestación'' se usó de manera consistente para νουθέτησις, evitando ''disciplina'' para no diluir la distinción con μαστιγοῖ.'
  - El singular 'su corazón' funciona aquí de manera colectiva y mantiene el sentido bíblico del centro interior de prueba.
