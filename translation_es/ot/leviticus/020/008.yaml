revisions:
- from: Guardarán mis estatutos y los cumplirán. Yo soy Yahvé[a], que los santifico.
  to: Guardarán mis estatutos y los pondrán por obra. Yo soy Yahvé[a], que los santifica a ustedes.
  rationale: Se corrige el error de persona en el complemento de «santifica», para reflejar fielmente el sufijo hebreo de segunda persona plural. También se ajusta «cumplirán» a «los pondrán por obra» para preservar mejor el matiz de עשה sin caer en una literalidad torpe. Se mantiene «Yahvé» y «estatutos» conforme a la terminología del proyecto.
