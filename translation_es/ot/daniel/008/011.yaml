  text: וְ/עַ֥ד שַֽׂר הַ/צָּבָ֖א הִגְדִּ֑יל וּ/מִמֶּ֨/נּוּ֙ הרים הַ/תָּמִ֔יד וְ/הֻשְׁלַ֖ךְ מְכ֥וֹן מִקְדָּשֽׁ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/011.yaml
  text: It even magnified itself up to the Prince of the host[a], and from him the regular offering was taken away[c][b], and the place of his sanctuary was cast down.
  footnotes:
  - marker: a
    text: Or 'the continual offering' or 'the daily offering'; in temple context הַתָּמִיד refers to the regular ongoing sacrificial service, traditionally understood as the regular burnt offering.
    reason: lexical_alternative
  - marker: b
    text: '''From him'' follows the Hebrew pronoun literally; the antecedent is debated.'
    reason: alternative_reading
  - marker: c
    text: Or 'the foundation of his sanctuary was cast down.' The Hebrew word may denote 'place/site' or 'foundation.'
    reason: lexical_alternative
