translation:
  language: es
  text: En su cuello mora la fuerza, y delante de él salta la consternación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terror salta delante de él». El sustantivo hebreo דְּאָבָה es raro, y en este contexto poético puede abarcar desde dismayo o abatimiento hasta terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצַוָּארוֹ
  english_pob_choice: In his neck
  chosen_spanish: En su cuello
  alternatives_spanish:
  - Sobre su cuello
  - En el cuello de él
  lexicon: HALOT
  rationale: La preposición ב con צַוָּאר y sufijo 3ms funciona aquí de modo locativo. En español, «en su cuello» mantiene la imagen poética sin sonar forzado.
- source_word: יָלִין
  english_pob_choice: lodges
  chosen_spanish: mora
  alternatives_spanish:
  - se alberga
  - habita
  - pasa la noche
  lexicon: HALOT
  rationale: El verbo לין alude literalmente a alojarse o pasar la noche, pero aquí es metafórico. «Mora» conserva la idea de una presencia estable y encaja bien en el registro poético.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la fortaleza
  - la valentía
  lexicon: HALOT
  rationale: עֹז designa fuerza, vigor o poder. «La fuerza» es la correspondencia más directa y natural en español.
- source_word: וּלְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  - en su presencia
  lexicon: HALOT
  rationale: La expresión con פָּנִים es idiomática y significa «antes/delante de». «Delante de él» preserva la referencia espacial y el tono poético.
- source_word: תָּדוּץ
  english_pob_choice: leaps
  chosen_spanish: salta
  alternatives_spanish:
  - brinca
  - se lanza
  - da un salto
  lexicon: HALOT
  rationale: El verbo raro דוץ expresa un movimiento de salto o impulso. «Salta» reproduce con naturalidad la imagen verbal de movimiento repentino.
- source_word: דְּאָבָה
  english_pob_choice: dismay
  chosen_spanish: el pavor
  alternatives_spanish:
  - la consternación
  - el desaliento
  - el terror
  lexicon: HALOT
  rationale: El sustantivo es raro y su campo semántico puede ir de abatimiento a terror. En este contexto poético, «pavor» comunica bien la impresión de miedo intenso sin cerrar de manera excesiva la ambigüedad lexicográfica.
translation_notes:
  revision_awareness: El texto inglés POB reciente no muestra revisiones aplicadas y fue confirmado como sin cambios; la versión española conserva esa línea interpretativa, manteniendo la imagen poética de una fuerza asentada en el cuello y el movimiento de un temor que salta delante de la figura descrita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular del nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se evita «Cristo» y cualquier terminología cristológica porque no corresponde al pasaje.
  - Se conserva el paralelismo poético hebreo con dos miembros breves y concretos.
  - «Pavor» en el texto principal se alinea con la nota alternativa para respetar la ambigüedad de דְּאָבָה.
