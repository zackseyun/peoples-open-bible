translation:
  language: es
  text: 'Entonces la mujer dijo a Elías: «Ahora sé que tú eres un hombre de Dios, y que la palabra de Yahvé en tu boca es verdad[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra de Yahvé en tu boca es verdadera». El sustantivo hebreo puede enfatizar verdad, veracidad o fiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia discursiva de forma natural en español.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la viuda
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la mujer». «La viuda» explicita el contexto, pero aquí no está en el sintagma hebreo y la elección inglesa también preservó el término general.
- source_word: אֶל אֵלִיָּהוּ
  english_pob_choice: to Elijah
  chosen_spanish: a Elías
  alternatives_spanish:
  - hacia Elías
  - para Elías
  lexicon: HALOT
  rationale: La preposición de dirección o destinatario se expresa naturalmente con «a» en español.
- source_word: עַתָּה זֶה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: La combinación funciona como marcador discursivo enfático de reconocimiento presente; «Ahora» conserva esa fuerza sin forzar el calco «ahora esto».
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - he sabido
  lexicon: HALOT
  rationale: Aunque la forma es perfectiva, aquí expresa conocimiento asentado y actual; «sé» suena idiomático y transmite esa constatación presente.
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un varón de Dios
  - un hombre perteneciente a Dios
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea reconocida sin sustituirla por un equivalente eclesiástico más interpretativo.
- source_word: וּדְבַר יְהוָה
  english_pob_choice: and ... the word of Yahweh
  chosen_spanish: y que la palabra de Yahvé
  alternatives_spanish:
  - y que el mensaje de Yahvé
  - y la palabra de Yahvé
  lexicon: HALOT
  rationale: דבר se traduce por «palabra» para mantener la fórmula profética estable; YHWH se rinde como «Yahvé» conforme al estándar del proyecto.
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  - de tu boca
  lexicon: HALOT
  rationale: La imagen hebrea se mantiene literalmente y es natural en español; «en tu boca» preserva el valor profético del habla transmitida.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdadero
  - fiel
  - fiable
  lexicon: HALOT
  rationale: Como predicado nominal, אֱמֶת nombra la cualidad de verdad/veracidad/fiabilidad. «Es verdad» conserva el sustantivo y la fuerza de la afirmación, tal como en la lectura inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la convención del proyecto, se usa «Yahvé» y no una sustitución litúrgica en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: אֱמֶת como predicado final
  english_pob_reading: is truth
  chosen_spanish_reading: es verdad
  alternative_spanish_readings:
  - es verdadero
  - es fiel
  - es fiable
  rationale: La palabra puede cargar verdad, veracidad o fiabilidad. «Es verdad» mantiene la tensión del sustantivo, sin reducirlo a un adjetivo, y deja abierta la amplitud semántica reconocida por la nota inglesa.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and preserved ambiguity'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: no se introducen cambios de sentido ni notas adicionales porque el hebreo y la decisión inglesa ya fijan una lectura transparente y estable. No hubo revisiones posteriores que alteraran el veredicto de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en concordancia con la política del proyecto.
  - Se conserva «palabra» y no «mensaje», porque el hebreo דבר y la auditoría inglesa favorecen la fórmula profética estándar.
  - La estructura «Ahora sé que tú eres...» reproduce la constatación presente sin sobrecargar el perfecto hebreo.
  - No se añade «viuda» en el texto principal para no ir más allá del sintagma hebreo, aunque el contexto narrativo la identifique.
