    changes_summary: Changed 'from the herd' to 'of the herd' for a more literal rendering of עֶגְלַת בָּקָר; removed 'with' after 'worked' as unnecessary; changed 'in a yoke' to 'in the yoke' to reflect the Hebrew more naturally and formally.
translation:
  language: es
  text: Y será que la ciudad más cercana al hombre muerto[a], los ancianos de aquella ciudad tomarán una novilla[b] del ganado que no ha sido trabajada y que no ha tirado del yugo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al cadáver» o «al asesinado». El hebreo se refiere a una persona que ha sido muerta.
    reason: lexical_alternative
  - marker: b
    text: O simplemente «una novilla». La expresión especifica con más detalle una hembra joven del ganado bovino.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no ha tirado en el yugo», es decir, no ha sido usada antes para trabajo de tiro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y será que
  alternatives_spanish:
  - Y sucederá que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula legal hebrea introduce una disposición nueva; en español, «Y será que» conserva el giro formal sin sonar excesivamente arcaico.
- source_word: הָעִיר הַקְּרֹבָה
  english_pob_choice: the city nearest
  chosen_spanish: la ciudad más cercana
  alternatives_spanish:
  - la ciudad más próxima
  - la ciudad que esté más cerca
  lexicon: HALOT
  rationale: «Más cercana» expresa naturalmente el comparativo superlativo contextual del hebreo y mantiene la referencia a la localidad geográficamente más próxima.
- source_word: אֶל הֶחָלָל
  english_pob_choice: to the slain man
  chosen_spanish: al muerto
  alternatives_spanish:
  - al cadáver
  - al hombre muerto
  - al asesinado
  lexicon: HALOT
  rationale: El hebreo חָלָל designa a una persona muerta por violencia; «al muerto» preserva la referencia personal sin forzar una precisión interpretativa adicional en el cuerpo del texto. La tensión entre persona y cadáver queda señalada en la nota.
- source_word: וְלָקְחוּ זִקְנֵי הָעִיר הַהִוא
  english_pob_choice: the elders of that city shall take
  chosen_spanish: los ancianos de aquella ciudad tomarán
  alternatives_spanish:
  - los ancianos de esa ciudad tomarán
  - los ancianos de aquella ciudad habrán de tomar
  lexicon: HALOT
  rationale: «Ancianos» reproduce זִקְנֵי como el cuerpo de autoridad local. «Tomarán» mantiene la instrucción legal directa y evita sobrecargar la frase con perífrasis.
- source_word: עֶגְלַת בָּקָר
  english_pob_choice: a heifer of the herd
  chosen_spanish: una novilla del ganado
  alternatives_spanish:
  - una becerra del ganado
  - una novilla de las reses
  - una hembra joven del ganado
  lexicon: HALOT
  rationale: עֶגְלָה es una hembra joven bovina; «novilla» comunica bien esa idea en español. «Del ganado» refleja בָּקָר como ganado bovino sin restringir indebidamente a un matiz técnico local.
- source_word: אֲשֶׁר לֹא עֻבַּד בָּהּ
  english_pob_choice: that has not been worked
  chosen_spanish: que no ha sido trabajada
  alternatives_spanish:
  - que no ha sido usada para labor
  - con la cual no se ha trabajado
  lexicon: HALOT
  rationale: El pasivo de עבד aquí indica labor agrícola o de tiro realizada con el animal. «No ha sido trabajada» es natural en español y conserva el sentido de uso previo para trabajo.
- source_word: אֲשֶׁר לֹא מָשְׁכָה בְּעֹל
  english_pob_choice: and has not pulled in the yoke
  chosen_spanish: y que no ha tirado del yugo
  alternatives_spanish:
  - y que no ha jalado del yugo
  - y que no ha llevado yugo
  - y que no ha tirado bajo el yugo
  lexicon: HALOT
  rationale: מָשַׁךְ expresa ‘tirar/draw’. «No ha tirado del yugo» conserva la imagen de un animal aún no usado para tiro, en una construcción clara para el lector hispanohablante.
theological_decisions:
- issue: Referencia de חָלָל (persona muerta violentamente)
  english_pob_reading: the slain man
  chosen_spanish_reading: el muerto
  alternative_spanish_readings:
  - el cadáver
  - el hombre asesinado
  - el caído
  rationale: El término hebreo apunta a alguien muerto en un homicidio no resuelto. En español, «el muerto» mantiene la referencia humana y deja abierta la precisión semántica que la nota explicativa aclara.
  doctrine_reference: Lexical semantics of חָלָל; legal narrative context of Deuteronomy 21:1–9
- issue: Descripción del animal apto para el rito
  english_pob_reading: a heifer of the herd that has not been worked and has not pulled in the yoke
  chosen_spanish_reading: una novilla del ganado que no ha sido trabajada y que no ha tirado del yugo
  alternative_spanish_readings:
  - una novilla del ganado que no ha sido usada para labor ni para tiro
  - una becerra del ganado no domada para trabajo
  rationale: El texto requiere un animal sin uso previo de trabajo; mantener ambas negaciones evita suavizar el requisito ritual y conserva el paralelismo del hebreo.
  doctrine_reference: Ritual purity and symbolic unserviceability in Deuteronomy 21:3
translation_notes:
  revision_awareness: 'Seguí el pasaje hebreo directamente y tomé el audit trail inglés como control: mantuve la secuencia legal, preservé la distinción entre חָלָל como persona muerta violentamente y el simple ‘cadáver’, y reflejé la doble cualificación del animal (no trabajado / no usado para tiro). También atendí la revisión inglesa que precisó la literalidad de ‘of the herd’ y ‘in the yoke’, conservando en español la claridad formal equivalente.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparece el tetragrámaton; aquí no aplica.
  - Elegí «novilla» para עֶגְלָה por su vigencia en español general; no usé «ternera» para evitar la asociación alimentaria.
  - Mantuve la repetición de «que no ha… y que no ha…» para reproducir el paralelismo hebreo y no fusionar dos restricciones distintas.
  - No introduje vocabulario eclesiástico tradicional ajeno al contexto legal del pasaje.
