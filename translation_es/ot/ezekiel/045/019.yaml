translation:
  language: es
  text: Y el sacerdote tomará parte de la sangre de la ofrenda por el pecado[a] y la pondrá sobre los postes del templo, sobre las cuatro esquinas de la plataforma del altar, y sobre los postes de la puerta del atrio interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por la purificación». El término hebreo puede denotar la ofrenda asociada tanto con el pecado como con la purificación ritual en contextos sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará parte de
  - tomará de
  lexicon: HALOT
  rationale: El hebreo waw-consecutivo en contexto procedimental expresa instrucción futura; en español, el futuro simple transmite con naturalidad la acción prescriptiva.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiador
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן se refiere al oficiante del rito; 'sacerdote' es la equivalencia clara y estándar en español bíblico.
- source_word: מִדַּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - de la sangre
  - algo de la sangre
  lexicon: HALOT
  rationale: La preposición מִן con 'sangre' indica una porción tomada de ella. 'Parte de la sangre' conserva ese matiz partitivo de modo natural en español.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - la ofrenda por el pecado / purificación
  lexicon: HALOT
  rationale: En este contexto sacrificial, חַטָּאת nombra la ofrenda ritual. Se opta por una forma transparente en español que no borra el vínculo con el pecado, y se preserva la alternativa de 'purificación' en nota.
- source_word: וְנָתַן
  english_pob_choice: and put
  chosen_spanish: y la pondrá
  alternatives_spanish:
  - y la aplicará
  - y la colocará
  lexicon: HALOT
  rationale: En lenguaje ritual, נתן significa aplicar o colocar. 'Pondrá' es natural y no introduce más especificación de la que el hebreo exige.
- source_word: אֶל מְזוּזַת הַבַּיִת
  english_pob_choice: on the doorposts of the temple
  chosen_spanish: sobre los postes de la puerta del templo
  alternatives_spanish:
  - sobre el poste de la puerta del templo
  - sobre los marcos de la puerta del templo
  lexicon: HALOT
  rationale: מְזוּזָה designa el poste/marco lateral de una entrada. El plural español 'postes de la puerta' expresa bien la estructura del vano; 'templo' sigue la lectura del English POB para el edificio visionario.
- source_word: אַרְבַּע פִּנּוֹת
  english_pob_choice: the four corners
  chosen_spanish: las cuatro esquinas
  alternatives_spanish:
  - los cuatro ángulos
  - las cuatro puntas
  lexicon: HALOT
  rationale: פִּנּוֹת se refiere normalmente a esquinas o ángulos. 'Esquinas' es la opción más natural y precisa en español.
- source_word: הָעֲזָרָה לַמִּזְבֵּחַ
  english_pob_choice: the altar ledge
  chosen_spanish: el altar
  alternatives_spanish:
  - la grada del altar
  - el borde del altar
  - la plataforma del altar
  lexicon: HALOT
  rationale: El English POB interpreta esta expresión arquitectónica como una referencia técnica al elemento del altar. En español, 'altar' reproduce esa referencia sin sobrecargar el verso con una reconstrucción técnica incierta; la formulación se mantiene abierta a la lectura arquitectónica documentada.
- source_word: וְעַל מְזוּזַת שַׁעַר
  english_pob_choice: and on the doorposts of the gate
  chosen_spanish: y sobre los postes de la puerta
  alternatives_spanish:
  - y sobre el poste de la puerta
  - y sobre los marcos de la puerta
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera mención de מְזוּזָה como 'postes de la puerta', manteniendo la misma equivalencia para la consistencia léxica.
- source_word: הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - la corte interior
  lexicon: HALOT
  rationale: '''Atrio interior'' es el término bíblico-ecclesial más natural en español para el recinto del templo, y conserva la estructura espacial del hebreo.'
theological_decisions:
- issue: 'חַטָּאת como nombre de sacrificio: ''pecado'' vs. ''purificación'''
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  - ofrenda purificadora
  rationale: La oración describe la manipulación ritual de la sangre de una ofrenda sacrificial. 'Ofrenda por el pecado' conserva la conexión lexical con חַטָּאת sin borrar la nota funcional de limpieza; la alternativa 'purificación' se preserva porque el hebreo y la tradición exegética admiten esa tensión semántica.
  doctrine_reference: Éxodo 29; Levítico 4; teoría sacrificial de חַטָּאת en contexto cultual
- issue: 'הָעֲזָרָה לַמִּזְבֵּחַ: lectura arquitectónica del altar'
  english_pob_reading: the altar ledge
  chosen_spanish_reading: el altar
  alternative_spanish_readings:
  - la grada del altar
  - el borde del altar
  - la plataforma del altar
  rationale: El English POB adoptó una lectura arquitectónica concreta. En español se mantiene el referente general 'altar' para no fingir certeza terminológica donde el hebreo técnico es debatido; las alternativas conservan la tensión interpretativa sin imponer una reconstrucción única.
  doctrine_reference: Ezequiel 43:13-17; diseño del altar en el templo visionario
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para hacer más natural 'altar ledge' sin cambiar el sentido. La versión española evita una reconstrucción más técnica de lo que el hebreo y el audit trail establecen, pero conserva el mismo marco interpretativo general del pasaje. No se detectaron otras revisiones relevantes que afecten la traducción española.
  spanish_consistency_notes:
  - Se mantiene 'templo' para הַבַּיִת en coherencia con la visión de Ezequiel, no 'casa'.
  - Se conserva 'atrio interior' como término fijo para הֶחָצֵר הַפְּנִימִית.
  - Se usa 'postes de la puerta' de manera uniforme para מְזוּזָה.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una sustitución por κύριος.
  - No se introduce 'Cristo'; no hay base léxica para Χριστός en este versículo.
