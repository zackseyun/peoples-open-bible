translation:
  language: es
  text: El hombre fiel abunda en bendiciones[a], pero el que se apresura a enriquecerse no quedará impune.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «bendiciones» conserva el plural del hebreo, que subraya abundancia más que una sola bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - uno
  lexicon: HALOT
  rationale: Se conserva el singular representativo masculino del hebreo. En español, "hombre" es natural en proverbios y transmite mejor el paralelo proverbial que "persona" o "uno".
- source_word: אֱמוּנוֹת
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidelidad
  - confiable
  - leal
  lexicon: HALOT
  rationale: 'El plural abstracto funciona aquí con valor adjetival: una persona caracterizada por fidelidad/confianza. "Fiel" es la forma más natural y concisa en español.'
- source_word: רַב
  english_pob_choice: will abound
  chosen_spanish: abunda
  alternatives_spanish:
  - será abundante en
  - tendrá muchas
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal que expresa abundancia. En español, "abunda" comunica bien el sentido proverbial de plenitud sin forzar una paráfrasis más larga.
- source_word: בְּרָכוֹת
  english_pob_choice: blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendición
  - beneficios
  lexicon: HALOT
  rationale: Se mantiene el plural del hebreo para reflejar la abundancia. "Bendiciones" conserva el sentido de favor divino y resultados favorables.
- source_word: וְאָץ
  english_pob_choice: but one who hastens
  chosen_spanish: pero el que se apresura
  alternatives_spanish:
  - pero el que corre presuroso
  - pero el impaciente
  lexicon: HALOT
  rationale: אָץ expresa prisa o apresuramiento. "Se apresura" conserva esa fuerza y permite una construcción natural en español.
- source_word: לְהַעֲשִׁיר
  english_pob_choice: to become rich
  chosen_spanish: a enriquecerse
  alternatives_spanish:
  - para hacerse rico
  - para ganar riquezas
  lexicon: HALOT
  rationale: El infinitivo hifil indica procurar o llegar a ser rico. "Enriquecerse" refleja bien el movimiento hacia la riqueza sin añadir matices ajenos.
- source_word: לֹא יִנָּקֶה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará impune
  alternatives_spanish:
  - no será tenido por inocente
  - no será absuelto
  lexicon: HALOT
  rationale: El nifal puede significar no quedar limpio, inocente o sin castigo. "No quedará impune" recoge con naturalidad el sentido jurídico-moral que el POB inglés expresó como "will not go unpunished".
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético con apoyo del expediente auditado en inglés; no hubo revisiones textuales aplicadas en el registro base, y la propuesta mantiene el paralelismo proverbial y el contraste moral del verso.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se prefirió "fiel" en lugar de "confiable" o "leal" por ser la opción más idiomática y breve en un proverbio.
  - '"No quedará impune" preserva la tensión entre inocencia/acusación/castigo sin resolverla de forma excesivamente interpretativa.'
