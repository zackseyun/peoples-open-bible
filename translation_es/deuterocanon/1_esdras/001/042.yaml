- from: Reinó tres meses y diez días en Jerusalén[a], e hizo lo malo delante del Señor.
  to: Reinó tres meses y diez días en Jerusalén[a], e hizo lo que era malo delante del Señor.
  rationale: Se ajusta únicamente el giro «hizo lo malo» a «hizo lo que era malo» para lograr un español más natural sin perder el sentido idiomático del griego ni la línea del POB inglés. Se conserva la nota sobre «delante del Señor».
  reviewer_model: gpt-5.4
