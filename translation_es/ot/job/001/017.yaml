    rationale: הִכּוּ לְפִי חָרֶב en este contexto de desastre y en paralelo con el inglés «struck down ... with the edge of the sword» indica que los mataron, no solo que los hirieron. «Hirieron» puede sugerir supervivencia y por eso no preserva plenamente el sentido fuente.
