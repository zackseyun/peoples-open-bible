translation:
  language: es
  text: 'Por tanto, así dice Yahvé acerca del rey de Asiria: no entrará en esta ciudad, ni disparará allí una flecha, ni vendrá ante ella con un escudo[a], ni levantará contra ella una rampa de asedio[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'avanzará contra ella con un escudo'. El hebreo probablemente alude a aproximarse a la ciudad bajo protección de escudo en guerra de sitio.
    reason: lexical_alternative
  - marker: b
    text: O 'alzará contra ella un terraplén'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así pues
  lexicon: HALOT
  rationale: Conserva el valor inferencial/conclusivo de la partícula hebrea y suena natural en español bíblico contemporáneo sin sobrecargar el tono.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene en presente, como en el inglés auditado, y en español resulta idiomática y solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Sigue el default proyectual para el Tetragrámaton. 'Yahvé' es la forma española estable y legible para preservar el nombre del pacto sin sustituirlo por una máscara.
- source_word: אֶל מֶלֶךְ אַשּׁוּר
  english_pob_choice: concerning the king of Assyria
  chosen_spanish: acerca del rey de Asiria
  alternatives_spanish:
  - respecto del rey de Asiria
  - contra el rey de Asiria
  lexicon: HALOT
  rationale: En el marco del oráculo, אֶל introduce el objeto del dicho. 'Acerca de' refleja bien el valor de contenido profético sin forzar 'a' o 'contra'.
- source_word: לֹא יָבֹא אֶל הָעִיר הַזֹּאת
  english_pob_choice: He shall not come into this city
  chosen_spanish: no entrará en esta ciudad
  alternatives_spanish:
  - no vendrá a esta ciudad
  - no llegará a esta ciudad
  lexicon: HALOT
  rationale: '''Entrar'' expresa con precisión el movimiento hacia el interior de la ciudad; es más fiel que un simple ''venir'' y mantiene la negación profética.'
- source_word: יוֹרֶה שָׁם חֵץ
  english_pob_choice: shoot an arrow there
  chosen_spanish: disparará allí una flecha
  alternatives_spanish:
  - lanzará allí una flecha
  - tirará allí una flecha
  lexicon: HALOT
  rationale: '''Disparar'' comunica naturalmente el acto de arrojar/proyectar un arma a distancia en español moderno; ''flecha'' preserva el objeto concreto del texto.'
- source_word: יְקַדְּמֶנָּה מָגֵן
  english_pob_choice: come before it with a shield
  chosen_spanish: se le acercará con un escudo
  alternatives_spanish:
  - se pondrá delante de ella con un escudo
  - avanzará contra ella con un escudo
  lexicon: HALOT
  rationale: El hebreo sugiere aproximación/protección en contexto de asedio. 'Se le acercará con un escudo' conserva la imagen sin introducir una táctica más específica de la que el texto exige.
- source_word: יִשְׁפֹּךְ עָלֶיהָ סֹלְלָה
  english_pob_choice: cast up a siege ramp against it
  chosen_spanish: levantará contra ella un terraplén
  alternatives_spanish:
  - alzará contra ella una rampa de asedio
  - construirá contra ella un terraplén de asedio
  lexicon: HALOT
  rationale: El binomio verbal-sustantivo describe una obra de asedio levantada contra la ciudad. 'Terraplén' comunica la masa de tierra levantada; se evita 'cast up' literal y se mantiene la imagen militar.
- source_word: סֹלְלָה
  english_pob_choice: siege ramp
  chosen_spanish: terraplén
  alternatives_spanish:
  - rampa de asedio
  - muro de tierra
  lexicon: HALOT
  rationale: סֹלְלָה designa una obra de tierra levantada para el asalto. 'Terraplén' es comprensible y transmite el sentido de estructura elevada, aunque en nota se puede reconocer la alternativa técnica 'rampa de asedio'.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Nombre divino. Se evita 'SEÑOR' para no ocultarlo, y se adopta la forma española 'Yahvé' como equivalente reverente y transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: conserva la estructura conclusiva de לָכֵן, la fórmula profética de כֹּה אָמַר, el Nombre divino como Yahvé, y las cuatro negaciones con imágenes militares distintas. Se optó por ''acerca de'' para אֶל en contexto oracular, y por un español fluido que evita calcos innecesarios sin borrar la imaginería de asedio.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'terraplén' para סֹלְלָה por claridad pública, con nota alternativa técnica.
  - '''Disparará'' se usa para יוֹרֶה en sentido militar de proyectar una flecha.'
  - La negación y la secuencia de acciones se preservan con paralelismo claro en español.
