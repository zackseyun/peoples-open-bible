  to: Pero a los que temen al Señor se les mostrará misericordia en ella[a], y vivirán por la misericordia de su Dios; pero los pecadores perecerán para siempre.
  rationale: Se corrige la construcción pasiva no idiomática por «se les mostrará misericordia», que preserva con fidelidad ἐλεηθήσονται y mejora claramente la legibilidad en español. Se elimina la nota sobre «Señor» por innecesaria; se conserva la nota sobre «en ella» porque mantiene la ambigüedad textual documentada en el expediente inglés.
