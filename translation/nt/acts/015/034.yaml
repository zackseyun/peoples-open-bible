id: ACT.15.34
reference: Acts 15:34
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἔδοξε δὲ τῷ Σίλᾳ ἐπιμεῖναι αὐτοῦ.
  language: Greek
translation:
  text: But[a] it seemed good to Silas to remain there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      3rd-century Papyrus 74, and the 4th-century Sinaiticus and Vaticanus) and early
      Coptic translations. It is present in the Byzantine majority tradition, some
      later Alexandrian and Western manuscripts, and the Latin and Syriac traditions.
      It was likely added by a later scribe to explain how Silas was still in Antioch
      to join Paul in verse 40, despite verse 33 stating that he and Judas had departed.
    reason: textual_critical
lexical_decisions:
- source_word: δοκέω
  chosen: it seemed good
  alternatives:
  - he decided
  - it pleased
  - he resolved
  lexicon: BDAG
  rationale: The impersonal use of δοκέω with the dative (τῷ Σίλᾳ) idiomatically means
    'it seemed good to [someone]' or 'someone resolved.' 'It seemed good' maintains
    the exact syntactic structure of the Greek.
- source_word: ἐπιμένω
  chosen: to remain
  alternatives:
  - to stay
  - to tarry
  - to continue
  lexicon: BDAG
  rationale: A compound of μένω (to remain), ἐπιμένω accurately captures the sense
    of continuing or staying in a specific location, fitting the context of Silas
    choosing not to depart with the others.
- source_word: αὐτοῦ
  chosen: there
  alternatives:
  - in that place
  - here
  lexicon: BDAG
  rationale: Used here as an adverb of place, referring back to Antioch where the
    believers currently were.
