  - marker: a
    text: 'O: «Por un breve tiempo te desamparé».'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo, al POB inglés y al español natural. Solo se corrige la nota alternativa para mejorar naturalidad, capitalización y presentación, sin alterar el sentido documentado.
