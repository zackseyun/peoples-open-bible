translation:
  language: es
  text: Ustedes que temen a Yahvé, esperen el bien[a], y el gozo eterno y la misericordia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice ‘cosas buenas’, con el sustantivo en plural.
    reason: alternative_reading
  - marker: b
    text: ‘Misericordia’ también puede entenderse como ‘bondad amorosa’ o ‘fidelidad constante’; el griego paralelo igualmente tiene ‘misericordia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה / οἱ φοβούμενοι Κύριον
  english_pob_choice: You who fear Yahweh
  chosen_spanish: Ustedes que temen a Yahvé
  alternatives_spanish:
  - Los que temen a Yahvé
  - Ustedes, temerosos de Yahvé
  lexicon: HALOT; LXX φοβέομαι
  rationale: El hebreo y el griego usan una expresión participial dirigida directamente al grupo. En español, ‘Ustedes que temen…’ conserva el valor vocativo exhortativo mejor que una formulación meramente descriptiva. ‘Yahvé’ sigue el criterio del proyecto para יְהוָה.
- source_word: קַוּוּ / ἐλπίσατε
  english_pob_choice: hope
  chosen_spanish: esperen
  alternatives_spanish:
  - tengan esperanza
  - esperen con confianza
  - pongan su esperanza
  lexicon: HALOT; LSJ
  rationale: El imperativo expresa expectativa confiada. ‘Esperen’ transmite la fuerza exhortativa y funciona con el objeto ‘el bien’; evita el matiz demasiado estático de ‘esperar’ y el desplazamiento semántico de ‘confiar’.
- source_word: לְטוֹב / εἰς ἀγαθά
  english_pob_choice: for good
  chosen_spanish: el bien
  alternatives_spanish:
  - bienes
  - cosas buenas
  - lo bueno
  lexicon: HALOT; LSJ
  rationale: El hebreo singular y el griego plural coinciden en un campo semántico de beneficio/bien. ‘El bien’ conserva amplitud y evita decidir innecesariamente entre ‘bienes’ concretos y una abstracción ética.
- source_word: וּלְשִׁמְחַת עוֹלָם / εἰς εὐφροσύνην αἰῶνος
  english_pob_choice: everlasting joy
  chosen_spanish: el gozo eterno
  alternatives_spanish:
  - la alegría eterna
  - el gozo para siempre
  - la alegría perenne
  lexicon: HALOT; LSJ
  rationale: ‘Gozo’ es un registro bíblico claro para שִׂמְחָה / εὐφροσύνη y suena natural en español eclesial sin ser arcaizante. ‘Eterno’ expresa la duración de עוֹלָם y αἰῶνος.
- source_word: וָחֶסֶד / καὶ ἐλέους
  english_pob_choice: and mercy
  chosen_spanish: y la misericordia
  alternatives_spanish:
  - y misericordia
  - y la clemencia
  - y la bondad amorosa
  lexicon: HALOT; LSJ
  rationale: חֶסֶד admite varias equivalencias, pero el paralelo griego tiene ἐλέους, por lo que ‘misericordia’ es la opción más directa y auditable. Se usa el artículo para naturalidad en español dentro de una serie nominal.
theological_decisions:
- issue: Nombre divino יְהוָה / Κύριον
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: Se mantiene la política del proyecto de no enmascarar el Tetragrámaton con ‘Señor’. Aunque el griego tiene Κύριον, aquí refleja el nombre divino del hebreo subyacente; ‘Yahvé’ hace visible esa decisión en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación hebreo-griego en ‘good’ / ἀγαθά
  english_pob_reading: for good
  chosen_spanish_reading: el bien
  alternative_spanish_readings:
  - bienes
  - cosas buenas
  rationale: El hebreo es la base principal, pero el griego confirma que no se trata solo de un bien abstracto sino de expectativas positivas de beneficio. ‘El bien’ mantiene la tensión entre lo general y lo concreto sin forzar una decisión que el testimonio doble no exige.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek alongside it'
- issue: Serie de bendiciones futuras
  english_pob_reading: good, everlasting joy and mercy
  chosen_spanish_reading: el bien, el gozo eterno y la misericordia
  alternative_spanish_readings:
  - bienes, gozo eterno y misericordia
  - el bien, alegría eterna y misericordia
  rationale: 'La línea enumera tres expectativas: bien, gozo duradero y misericordia. La traducción conserva la serie sin añadir explicaciones teológicas extrañas al verso.'
  doctrine_reference: 'PHILOSOPHY.md: preserve source-level parallelism where possible'
translation_notes:
  revision_awareness: Base hebrea con comprobación del paralelo griego; el hebreo y el griego concuerdan sustancialmente, aunque el griego usa plural en ‘bienes/cosas buenas’. La redacción española conserva esa amplitud con ‘el bien’ y mantiene las tres bendiciones en serie.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al estándar del proyecto para יְהוָה.
  - Se prefiere ‘gozo’ como término bíblico natural para שִׂמְחָה / εὐφροσύνη.
  - ‘Misericordia’ se mantiene por la correspondencia con ἐλέους y por su naturalidad en español eclesial.
  - La estructura vocativa ‘Ustedes que…’ conserva la apelación directa del hebreo y del griego.
