translation:
  language: es
  text: Para el director musical[a]. De David, el siervo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director de música». El hebreo se refiere al responsable musical del ámbito del templo o de la liturgia.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder de la música
  lexicon: HALOT
  rationale: La fórmula de encabezado señala al responsable musical/litúrgico. En español, «director musical» comunica bien la función sin forzar una imagen coral moderna demasiado estrecha; conserva el valor funcional del término hebreo.
- source_word: לְעֶבֶד
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - esclavo
  lexicon: HALOT
  rationale: En este superscrito, עֶבֶד funciona como título honorífico de relación pactal con Dios. «Siervo» es más natural en español eclesial que «esclavo», sin perder la idea de pertenencia y servicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del texto hebreo. «Yahvé» es la forma establecida en el proyecto para יְהוָה y evita la sustitución por un título.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: En los encabezados de Salmos, la preposición permite atribución amplia. «De David» refleja esa relación sin decidir en exceso entre autoría, dedicación o asociación.
theological_decisions:
- issue: Tratamiento del nombre divino en el encabezado
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. Mantener «Yahvé» preserva el nombre propio del pacto y sigue la convención doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עֶבֶד en una superscripción
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  - servidor
  rationale: Aquí no se enfatiza la condición social de esclavitud, sino la identidad reverente de David respecto de Yahvé. «Siervo» expresa mejor ese registro litúrgico y honorífico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1; Contested terms: δοῦλος servant/slave (context-dependent)'
translation_notes:
  revision_awareness: La redacción sigue el marco de encabezado breve del hebreo y adopta la decisión auditada de mantener la atribución amplia de לְדָוִד como «De David». También conserva el nombre divino como Yahvé, conforme a la política del proyecto, y evita una calca rígida del inglés mediante una formulación española natural.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» de manera uniforme, conforme al estándar del proyecto.
  - Se usó «siervo» en un sentido honorífico de encabezado, no como equivalencia social de esclavitud.
  - «Director musical» funciona como equivalente natural de la función litúrgica del hebreo sin introducir una interpretación extra.
  - La frase «De David» conserva la ambigüedad amplia del hebreo para no sobreespecificar autoría.
