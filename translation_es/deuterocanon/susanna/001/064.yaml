translation:
  language: es
  text: Y Daniel llegó a ser grande a los ojos del pueblo desde aquel día y en adelante.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniele
  lexicon: Greek proper name tradition
  rationale: Se conserva el nombre propio en su forma castellana estándar, que es la correspondencia natural y reconocible en español bíblico.
- source_word: ἐγένετο μέγας
  english_pob_choice: became great
  chosen_spanish: llegó a ser grande
  alternatives_spanish:
  - se hizo grande
  - se volvió grande
  - creció en grandeza
  lexicon: BDAG
  rationale: La construcción griega expresa un cambio de estado o de reconocimiento. En español, 'llegó a ser grande' mantiene ese valor inceptivo y evita una lectura demasiado material o política de 'grande'.
- source_word: ἐνώπιον τοῦ λαοῦ
  english_pob_choice: in the sight of the people
  chosen_spanish: a los ojos del pueblo
  alternatives_spanish:
  - ante el pueblo
  - en presencia del pueblo
  - a la vista del pueblo
  lexicon: BDAG
  rationale: '''A los ojos del pueblo'' conserva la imagen de evaluación pública que hay en ἐνώπιον, sin perder la idea de estima o reconocimiento social.'
- source_word: ἀπὸ τῆς ἡμέρας ἐκείνης
  english_pob_choice: from that day
  chosen_spanish: desde aquel día
  alternatives_spanish:
  - desde ese día
  - a partir de aquel día
  lexicon: BDAG
  rationale: '''Desde aquel día'' expresa con naturalidad el punto de inicio temporal marcado por el griego.'
- source_word: καὶ ἐπέκεινα
  english_pob_choice: onward
  chosen_spanish: y en adelante
  alternatives_spanish:
  - y más allá
  - y después
  - y desde entonces
  lexicon: LSJ
  rationale: '''Y en adelante'' reproduce el sentido continuativo del adverbio y funciona como cierre idiomático en español, equivalente a ''onward''.'
translation_notes:
  revision_awareness: El pasaje presenta una sola cláusula narrativa breve; no se registran revisiones textuales o auditivas que alteren el sentido base. La redacción española sigue de cerca el griego y coincide con la lectura auditada en inglés sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Daniel' como forma estándar en español.
  - Se preserva la referencia temporal continua con 'desde aquel día y en adelante'.
  - La elección de 'a los ojos del pueblo' conserva la dimensión pública de estimación del original griego.
