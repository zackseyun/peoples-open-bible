translation:
  language: es
  text: Y Judas vio que su campamento[a] se estaba desmoronando, porque la batalla lo oprimía; y quedó quebrantado de corazón, porque no tenía tiempo para reunirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego es muy breve y elíptico después de «vio». El sentido probable es que Judas percibió que su propio contingente se estaba desmoronando bajo la presión del combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo
  - ejército
  - fuerza
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή puede referirse al campamento o al contingente acampado. ‘Campamento’ conserva la imagen concreta del grupo militar de Judas sin volverlo demasiado abstracto.
- source_word: ὅτι ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: that his camp was broken
  chosen_spanish: que su campamento estaba quebrantado
  alternatives_spanish:
  - que su campamento estaba roto
  - que su fuerza estaba cediendo
  - que su campamento estaba deshecho
  lexicon: LSJ
  rationale: El griego es breve y elíptico. ‘Quedrantado’ comunica una fuerza militar que cede o se desmorona, y mantiene mejor el tono formal que ‘roto’.
- source_word: ὁ πόλεμος ἔθλιβεν αὐτόν
  english_pob_choice: the battle was pressing hard on him
  chosen_spanish: la guerra lo oprimía
  alternatives_spanish:
  - la batalla lo oprimía
  - la guerra lo presionaba con fuerza
  - el combate lo aplastaba
  lexicon: LSJ
  rationale: ἔθλιβεν expresa presión/opresión continua. ‘Oprimía’ reproduce esa fuerza verbal en español sin perder el sentido bélico del pasaje; ‘guerra’ refleja el término griego más amplio, aunque el contexto inmediato sea de batalla.
- source_word: συνετρίβη τῇ καρδίᾳ
  english_pob_choice: he was crushed in heart
  chosen_spanish: fue quebrantado de corazón
  alternatives_spanish:
  - su corazón fue quebrantado
  - fue aplastado de corazón
  - quedó deshecho de corazón
  lexicon: LSJ
  rationale: La imagen de ser ‘quebrantado’ preserva la metáfora del pasivo griego y su fuerza afectiva. En español suena más natural y bíblico que un calco como ‘crushed in heart’.
- source_word: καιρὸν
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - oportunidad
  - momento
  - ocasión
  lexicon: LSJ
  rationale: En esta situación urgente, ‘tiempo’ es la opción más directa y natural. El matiz de oportunidad queda implícito por el contexto.
- source_word: συναγαγεῖν αὐτούς
  english_pob_choice: to gather them together
  chosen_spanish: reunirlos
  alternatives_spanish:
  - juntarlos
  - congregarlos
  - reagruparlos
  lexicon: LSJ
  rationale: El verbo significa reunir o juntar. ‘Reunirlos’ es claro y cercano al griego, y evita una reinterpretación militar demasiado específica como ‘reagruparlos’.
translation_notes:
  revision_awareness: El español sigue la última revisión inglesa, que prefirió ‘broken’ sobre ‘failing’ para acercarse más al griego, pero conserva una formulación natural en español con ‘quebrantado’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene el lenguaje militar concreto (‘campamento’, ‘guerra’) sin suavizarlo a términos más generales.
  - Se conserva la metáfora de quebranto del corazón para reflejar συνετρίβη τῇ καρδίᾳ.
