base_translation:
  language: en
  yaml_path: translation/ot/exodus/019/005.yaml
  text: And now[a], if you will indeed listen to my voice and keep my covenant, then you will be my treasured possession out of all the peoples[c][b], for all the earth is mine.
  footnotes:
  - marker: a
    text: Or 'if you truly obey my voice.' The Hebrew expression literally says 'if listening you will listen,' an emphatic form meaning to listen attentively or obediently.
    reason: lexical_alternative
  - marker: b
    text: Or 'my special possession' or 'my own possession.'
    reason: lexical_alternative
  - marker: c
    text: That is, from among all the nations/peoples; the next clause clarifies that the whole earth still belongs to God.
    reason: cross_reference
