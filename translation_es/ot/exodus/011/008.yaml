translation:
  language: es
  text: 'Entonces todos estos siervos tuyos[b] bajarán a mí y se postrarán ante mí, diciendo: “Sal tú y todo el pueblo que está a tus pies[a]; y después de eso saldré yo”. Y salió de la presencia de Faraón con ardiente ira.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ‘todo el pueblo que está a tus pies’, un modismo para los que te acompañan o están bajo tu autoridad.'
    reason: lexical_alternative
  - marker: b
    text: O ‘tus oficiales’ para ‘siervos tuyos’; el término hebreo puede referirse a acompañantes cortesanos en un contexto real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  english_pob_choice: will come down
  chosen_spanish: bajarán
  alternatives_spanish:
  - descenderán
  - vendrán abajo
  lexicon: HALOT
  rationale: ירד tiene el sentido básico de ‘bajar/descender’. En el contexto de una conversación en palacio, ‘bajarán’ conserva la imagen direccional de forma natural en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: servants of yours
  chosen_spanish: siervos tuyos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  - tus oficiales
  lexicon: HALOT
  rationale: עבד puede abarcar siervo, esclavo o funcionario cortesano según el contexto. Aquí se refiere a los acompañantes/cortesanos de Faraón; ‘siervos tuyos’ mantiene la cercanía del hebreo y evita fijar ‘oficiales’ sin necesidad textual.
- source_word: וְהִשְׁתַּחֲוּוּ לִי
  english_pob_choice: bow down to me
  chosen_spanish: se postrarán ante mí
  alternatives_spanish:
  - se inclinarán ante mí
  - se postrarán delante de mí
  - se inclinarán y me rendirán homenaje
  lexicon: HALOT
  rationale: La forma de שחה expresa postración física. ‘Se postrarán ante mí’ preserva la fuerza del gesto sin introducir de más lenguaje de culto en este marco cortesano.
- source_word: צֵא אַתָּה
  english_pob_choice: Go out, you
  chosen_spanish: Sal tú
  alternatives_spanish:
  - Vete tú
  - Sal, tú
  - Sal de aquí tú
  lexicon: HALOT
  rationale: יצא se traduce con ‘salir’; ‘Sal tú’ conserva el imperativo y el énfasis de אַתָּה sin volverlo artificial.
- source_word: וְכָל הָעָם אֲשֶׁר בְּרַגְלֶיךָ
  english_pob_choice: and all the people who are at your feet
  chosen_spanish: y todo el pueblo que está a tus pies
  alternatives_spanish:
  - y todo el pueblo que te sigue
  - y todo el pueblo bajo tu mando
  - y todo el pueblo que va contigo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a los que están bajo la autoridad o en el séquito de alguien. Se mantiene la literalidad auditada ‘a tus pies’ porque la POB inglesa decidió conservar la imagen y porque en español sigue siendo inteligible.
- source_word: וְאַחֲרֵי כֵן אֵצֵא
  english_pob_choice: and after that I will go out
  chosen_spanish: y después de eso saldré yo
  alternatives_spanish:
  - y después de eso saldré
  - y luego saldré yo
  lexicon: HALOT
  rationale: Se conserva la secuencia temporal y el paralelismo con el verbo יצא. ‘Saldré yo’ refleja el pronombre enfático hebreo y mantiene el contraste con el mandato previo.
- source_word: וַיֵּצֵא מֵעִם פַּרְעֹה
  english_pob_choice: And he went out from Pharaoh
  chosen_spanish: Y salió de la presencia de Faraón
  alternatives_spanish:
  - Y salió de Faraón
  - Y se fue de la presencia de Faraón
  lexicon: HALOT
  rationale: מֵעִם con persona suele equivaler a ‘de la presencia de’. Esta opción preserva el matiz relacional y el registro formal del relato.
- source_word: בָּחֳרִי אָף
  english_pob_choice: in burning anger
  chosen_spanish: con ardiente ira
  alternatives_spanish:
  - con ira encendida
  - con ira ardiente
  - en ardiente furor
  lexicon: HALOT
  rationale: La frase evoca la intensidad ‘ardiente’ de la ira. ‘Con ardiente ira’ conserva la metáfora y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Naturaleza del gesto de 'bow down' / 'postrarse' en un contexto cortesano
  english_pob_reading: bow down to me
  chosen_spanish_reading: se postrarán ante mí
  alternative_spanish_readings:
  - se inclinarán ante mí
  - me rendirán homenaje
  rationale: El hebreo describe una acción corporal de humillación o homenaje. ‘Se postrarán’ mantiene la concreción del gesto sin cargarlo innecesariamente con el sentido litúrgico de adoración.
  doctrine_reference: Lexical-semantic decision; no doctrinal alteration.
- issue: La expresión idiomática 'at your feet'
  english_pob_reading: the people who are at your feet
  chosen_spanish_reading: el pueblo que está a tus pies
  alternative_spanish_readings:
  - el pueblo que te sigue
  - el pueblo bajo tu mando
  rationale: Se conserva la imagen hebrea porque la traducción inglesa auditada también la retuvo por literalidad. La nota puede aclarar que es un modismo para los que están bajo tu autoridad o acompañamiento.
  doctrine_reference: Lexical-semantic decision; no doctrinal alteration.
- issue: '''Servants'' as court attendants/officials'
  english_pob_reading: servants of yours
  chosen_spanish_reading: siervos tuyos
  alternative_spanish_readings:
  - tus servidores
  - tus oficiales
  rationale: El término hebreo admite el campo de personal doméstico y cortesano. ‘Siervos tuyos’ es suficientemente amplio y no fuerza el texto hacia una interpretación administrativa específica.
  doctrine_reference: Lexical-semantic decision; no doctrinal alteration.
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una paráfrasis más interpretativa de ברגליך (‘who follow you’) a una forma más literal (‘who are at your feet’). La presente versión española sigue esa revisión y conserva la imagen idiomática, manteniendo a la vez claridad natural. También preserva la secuencia verbal del hebreo: bajarán / se postrarán / saldré / salió.'
  spanish_consistency_notes:
  - Se usa ‘Faraón’ en lugar de ‘Pharaoh’ por consistencia bíblica en español.
  - Se usa ‘Yahvé’ para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - ‘Salir’ se mantiene para יצא en sus dos apariciones a fin de conservar el enlace léxico del pasaje.
  - ‘Se postrarán’ se reserva para gestos de reverencia/prostración; no se traduce como ‘adorarán’ porque el contexto es cortesano.
