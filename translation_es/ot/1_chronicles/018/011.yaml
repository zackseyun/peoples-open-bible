  language: en
  yaml_path: translation/ot/1_chronicles/018/011.yaml
  text: 'King David also dedicated these to Yahweh[a], along with the silver and the gold that he had taken from all the nations: from Edom, Moab, the Ammonites, the Philistines[c][b], and Amalek.'
  footnotes:
