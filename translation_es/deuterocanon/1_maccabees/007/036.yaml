    issue: «Arderé esta casa» traduce mal ἐμπυριῶ
    rationale: 'El verbo griego es transitivo: «quemaré/incendiaré». En español, «arderé» es intransitivo o reflexivo semánticamente y hace que el sujeto sea quien arde, alterando el sentido de amenaza contra la casa/templo.'
  - severity: medium
    issue: La nota [a] no aborda la alternativa principal documentada para οἶκος
    rationale: La auditoría inglesa conserva «house» y da nota «this temple». En español conviene mantener la misma alternativa contextual, además de explicar el verbo elegido si se revisa el texto.
  - severity: low
    issue: «Entonces» añade un matiz discursivo no necesario
    rationale: El griego enlaza con simple καὶ. «Y entraron los sacerdotes» es más ceñido al ritmo narrativo original, aunque «Entonces» no distorsiona de forma seria.
  revised_spanish_text: «Quemaré esta casa[a]». Y salió con ira. Y entraron los sacerdotes y se pusieron delante del altar y del santuario, y lloraron y dijeron[b],
