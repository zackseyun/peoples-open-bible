review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del hebreo: Isaac siembra, obtiene un rendimiento extraordinario en ese año, y Yahvé lo bendice. Sin embargo, «e hizo una cosecha centuplicada» se aleja demasiado de וַיִּמְצָא («halló/obtuvo») y añade una formulación más libre que la del POB inglés revisado, que volvió de «reaped» a «found» para acercarse al verbo fuente. También conviene expresar más naturalmente «a hundredfold» en español como «cien veces más» o equivalente, en vez de «centuplicada», que suena algo técnica.'
  spanish_quality_summary: El español es claro, pero «e hizo una cosecha centuplicada» resulta poco natural y algo explicativo. «Isaac sembró en aquella tierra[a], y en aquel año obtuvo cien veces más, y Yahvé lo bendijo» es más fiel, más fluido y mantiene el tono digno. La nota al pie necesita ajustarse para corresponder exactamente al texto revisado.
  glossary_alignment: 'Alineación buena en términos clave: יְהוָה → «Yahvé» está conforme al proyecto; וַיִּזְרַע → «sembró» es correcto; וַיְבָרֲכֵהוּ → «lo bendijo» preserva bien el lenguaje teológico. El principal ajuste léxico es וַיִּמְצָא, donde conviene «obtuvo» en vez de la paráfrasis «hizo una cosecha», y מֵאָה שְׁעָרִים, donde «cien veces más» refleja mejor el rendimiento que «centuplicada».'
  issues:
  - severity: medium
    issue: La expresión «hizo una cosecha centuplicada» para וַיִּמְצָא מֵאָה שְׁעָרִים es demasiado libre.
    rationale: El hebreo usa literalmente «halló» en un modismo agrícola. El POB inglés documenta la importancia de mantenerse cerca de «found», y la formulación española actual introduce un giro no presente en el texto fuente.
  - severity: low
    issue: «Centuplicada» suena técnica y menos natural que otras opciones en español bíblico moderno.
    rationale: Aunque transmite la idea de multiplicación por cien, «cien veces más» o una construcción equivalente comunica mejor el rendimiento abundante a lectores generales.
  - severity: low
    issue: La nota al pie debe corresponder de forma más exacta al texto principal revisado.
    rationale: Si el texto usa «obtuvo cien veces más», la nota debe presentar claramente la alternativa literal «halló cien medidas» y explicar el idiomatismo sin desajuste con la redacción principal.
  revised_spanish_text: Isaac sembró en aquella tierra[a], y en aquel año obtuvo cien veces más, y Yahvé lo bendijo.
  revised_footnotes:
  - marker: a
    text: O «obtuvo cien medidas»; el hebreo dice literalmente «halló cien שְׁעָרִים», una expresión idiomática para un rendimiento extraordinariamente abundante.
    reason: lexical_alternative
