    issue: 'Expresión poco idiomática: ''llevan a los pobres de la tierra a su fin'''
    rationale: Aunque intenta reflejar 'bring ... to an end', en español suena calco del inglés y poco natural. 'Hacen desaparecer' o 'hacen cesar' comunica mejor el causativo de וְלַשְׁבִּית con buena legibilidad.
  - severity: low
    issue: Anclaje de nota en 'esto' en vez del participio debatido
    rationale: La nota explica alternativas para הַשֹּׁאֲפִים ('pisotean / anhelan / devoran'), por lo que debe anclarse en esa frase, no en 'esto'.
  - severity: low
    issue: Puntuación enfática innecesaria
    rationale: Los signos de exclamación no están motivados por el hebreo y un imperativo profético en español puede expresarse con sobriedad sin perder fuerza.
