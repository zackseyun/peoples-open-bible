translation:
  language: es
  text: Y pondrás los dos extremos de los dos cordones[a] sobre los dos engastes, y los pondrás sobre las hombreras del efod, en su parte frontal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos extremos de las dos cadenas». El hebreo puede referirse a cordones entrelazados o a trabajo de cadena; el contexto de la orfebrería favorece una construcción tipo cadena.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצוֹת
  english_pob_choice: ends
  chosen_spanish: extremos
  alternatives_spanish:
  - puntas
  - extremidades
  lexicon: HALOT
  rationale: El hebreo indica los puntos terminales de las cadenas/cordones. «Extremos» conserva esa idea de terminalidad con un español natural y preciso.
- source_word: הָעֲבֹתֹת
  english_pob_choice: cords
  chosen_spanish: cadenas
  alternatives_spanish:
  - cordones
  - cadenas trenzadas
  lexicon: HALOT
  rationale: El POB inglés retiene la ambigüedad léxica y nota que el contexto favorece una construcción tipo cadena. En español, «cadenas» comunica mejor ese posible trabajo entrelazado que «cordones», sin perder la tensión lexical documentada.
- source_word: הַמִּשְׁבְּצֹת
  english_pob_choice: settings
  chosen_spanish: engastes
  alternatives_spanish:
  - monturas
  - soportes
  lexicon: HALOT
  rationale: El término señala las piezas de oro donde se fijan los extremos. «Engastes» es más técnico que «soportes» y mantiene la imagen ornamental del contexto del efod.
- source_word: כִּתְפֹת
  english_pob_choice: shoulder pieces
  chosen_spanish: hombreras
  alternatives_spanish:
  - piezas de hombro
  - hombros
  lexicon: HALOT
  rationale: Aquí no son los hombros anatómicos de Aarón sino las partes del vestido. «Hombreras» expresa bien la función vestimentaria en español, de forma clara y compacta.
- source_word: אֵפֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - efod sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado, como en el POB inglés, porque no tiene equivalente exacto en español y forma parte del vocabulario cultual especializado.
- source_word: אֶל מוּל פָּנָיו
  english_pob_choice: at its front
  chosen_spanish: en su parte frontal
  alternatives_spanish:
  - frente a su cara
  - hacia su frente
  lexicon: HALOT
  rationale: La expresión señala la ubicación en el lado delantero del efod. «En su parte frontal» suena natural en español y evita la ambigüedad de «cara» aplicada a una prenda.
- source_word: וְנָתַתָּה
  english_pob_choice: you shall place them
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - y pondrás
  lexicon: HALOT
  rationale: El verbo נתן se repite con la idea de colocar. «Pondrás» es idiomático y, con el sujeto implícito, mantiene la fuerza imperativa/prescriptiva del hebreo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el trazado auditado del POB inglés, conservando la repetición verbal y la estructura de instrucciones. Se ajustó el léxico para que el español resulte natural sin perder la ambigüedad documentada entre «cordones» y «cadenas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se conserva «efod» como tecnicismo estable.
  - Se traduce la parte frontal de manera no anatómica para la prenda, evitando un literalismo confuso.
