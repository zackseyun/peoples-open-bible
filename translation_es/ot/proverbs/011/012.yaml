    issue: Redacción poco natural de la nota [a]
    rationale: '«''También: «a su amigo» o «a su compañero».»'' introduce comillas innecesarias y suena torpe en español. La nota debe expresar con naturalidad la alternativa léxica.'
  - severity: low
    issue: Redacción mejorable de la nota [b]
    rationale: «un modismo hebreo para falta de sensatez o entendimiento» es menos idiomático que «un modismo hebreo para referirse a la falta de sensatez o entendimiento».
  - severity: low
    issue: Conviene ajustar el orden de marcadores en el texto
    rationale: 'El inglés auditado lleva tres notas sobre «lacks sense»: primero la de género representativo, luego la de la expresión idiomática, y luego la alternativa de «neighbor». En español no es obligatorio copiar el orden conceptual exacto, pero sí mantener marcadores únicos y una presentación más ordenada; aquí conviene ordenar [a][b] y dejar [c] en «hombre».'
  revised_spanish_text: Quien desprecia a su prójimo[a] carece de sensatez[b], pero un hombre[c] de entendimiento guarda silencio.
