theological_decisions:
- issue: Referent of the participle κειράμενος ('having shaved/cut')
  chosen_reading: The participle refers to Paul, the nearest and grammatically controlling masculine singular subject.
  alternative_readings:
  - The action refers to Aquila in some interpretations because of the proximity of Aquila's name and historical discussions of vow practice.
  rationale: The participle κειράμενος is masculine singular and most naturally agrees with Παῦλος, the main subject of the sentence, not with Πρίσκιλλα (feminine) and only secondarily with Ἀκύλας. The translation therefore attributes the haircut to Paul in the main text while preserving the alternative in a footnote because the ambiguity is discussed in interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity is genuine; here the grammar strongly favors Paul, but the alternative is worth preserving for auditability.
- issue: Nature of εὐχή
  chosen_reading: Rendered generically as 'a vow' without specifying a Nazirite vow.
  alternative_readings:
  - a Nazirite vow
  rationale: The text states only that he had a vow. While many connect this with Nazirite practice, the verse itself does not explicitly identify it as such. The translation avoids importing a more specific ritual category into the main text.
  doctrine_reference: Do not import doctrinal claims the text does not make; original-language primacy over tradition.
