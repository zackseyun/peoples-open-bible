    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hombres oscuros», es decir, personas sin prominencia ni distinción.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «se pondrá» por «estará» para reflejar mejor el valor de יִתְיַצָּב en paralelo y sonar más natural en español. Se cambia «hombres oscuros» en el texto principal a «hombres sin distinción» para comunicar el sentido metafórico correcto del hebreo, mientras la nota conserva el literal y explica la imagen.
