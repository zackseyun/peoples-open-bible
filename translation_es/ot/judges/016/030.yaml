translation:
  language: es
  text: 'Y Sansón dijo[a]: «Que yo muera con los filisteos». Entonces se apoyó con toda su fuerza, y la casa cayó sobre los gobernantes y sobre todo el pueblo que estaba en ella[c][b]. Así, los muertos que mató al morir fueron más que los que había matado durante su vida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Que muera mi alma con los filisteos». Aquí «mi alma» es una manera idiomática de referirse a Sansón mismo.'
    reason: lexical_alternative
  - marker: b
    text: O, «los señores» de los filisteos.
    reason: lexical_alternative
  - marker: c
    text: O, «la construcción»; el hebreo usa la palabra ordinaria para «casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמוֹת נַפְשִׁי
  english_pob_choice: Let me die
  chosen_spanish: Que yo muera
  alternatives_spanish:
  - Que muera mi alma
  - Permita que yo muera
  lexicon: HALOT
  rationale: El hebreo usa נֶפֶשׁ de manera idiomática para la persona misma. En español, «Que yo muera» conserva el valor optativo/jusivo sin introducir una antropología separada de «alma» que el contexto no exige. La alternativa literal «Que muera mi alma» sería más pesada y podría sugerir una distinción doctrinal ajena al pasaje.
- source_word: עִם פְּלִשְׁתִּים
  english_pob_choice: with the Philistines
  chosen_spanish: con los filisteos
  alternatives_spanish:
  - junto con los filisteos
  lexicon: HALOT
  rationale: עִם significa de forma directa «con». «Con los filisteos» reproduce la disposición conjunta de morir con sus enemigos. «Junto con» es posible, pero añade un matiz explicativo innecesario.
- source_word: וַיֵּט בְּכֹחַ
  english_pob_choice: he bent with all his strength
  chosen_spanish: se inclinó con toda su fuerza
  alternatives_spanish:
  - se dobló con toda su fuerza
  - empujó con todas sus fuerzas
  lexicon: HALOT
  rationale: נטה puede significar «inclinarse, doblarse». En este contexto de esfuerzo físico contra la estructura, «se inclinó con toda su fuerza» conserva la imagen corporal y el énfasis de בְּכֹחַ. «Se dobló» también es posible, pero en español puede sonar más pasivo o accidental.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el edificio
  - el templo
  lexicon: HALOT
  rationale: El hebreo usa el término ordinario para «casa». Dado el contexto narrativo, «la casa» es fiel y natural en español. «El edificio» aclara la función estructural, pero pierde la correspondencia directa; «el templo» sería interpretativo y no está requerido por el hebreo.
- source_word: הַסְּרָנִים
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los señores
  - los jefes
  lexicon: HALOT
  rationale: סְרָנִים designa a los líderes filisteos. «Gobernantes» comunica su condición de autoridades de manera clara y moderna. «Señores» es tradicional pero puede sonar más feudal; «jefes» es posible, aunque menos preciso para una función política.
- source_word: כָּל הָעָם אֲשֶׁר בּוֹ
  english_pob_choice: all the people who were in it
  chosen_spanish: todo el pueblo que estaba en ella
  alternatives_spanish:
  - todo el pueblo que estaba dentro de ella
  - toda la gente que estaba en ella
  lexicon: HALOT
  rationale: La construcción expresa totalidad y ubicación interior. «Todo el pueblo que estaba en ella» conserva ambos elementos de modo natural. Se eligió «ella» porque concuerda con «la casa» en español. «La gente» es viable, pero «pueblo» reproduce mejor el valor colectivo del hebreo.
- source_word: הַמֵּתִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los que murieron
  - los difuntos
  lexicon: HALOT
  rationale: El participio sustantivado se refiere a los que murieron en el derrumbe. «Los muertos» es un equivalente breve y natural en español. «Los que murieron» es más explicativo; «difuntos» suena más eufemístico y menos directo.
- source_word: אֲשֶׁר הֵמִית בְּמוֹתוֹ
  english_pob_choice: whom he killed at his death
  chosen_spanish: que mató en su muerte
  alternatives_spanish:
  - que mató cuando murió
  - que mató al morir
  lexicon: HALOT
  rationale: La frase hebrea vincula temporalmente las muertes causadas por Sansón con el evento de su propia muerte. «En su muerte» mantiene ese nexo de forma concisa y fiel. «Al morir» es posible, pero desplaza el énfasis temporal hacia un gerundio menos paralelo al hebreo.
- source_word: רַבִּים מֵאֲשֶׁר
  english_pob_choice: were more than those whom
  chosen_spanish: fueron más que los que
  alternatives_spanish:
  - fueron muchos más que los que
  - superaron en número a los que
  lexicon: HALOT
  rationale: La comparación hebrea indica superioridad numérica. «Fueron más que los que» reproduce la relación sin añadir énfasis extra. «Muchos más» intensifica innecesariamente; «superaron en número» es correcto, pero más explicativo que el hebreo.
- source_word: בְּחַיָּיו
  english_pob_choice: during his life
  chosen_spanish: durante su vida
  alternatives_spanish:
  - en su vida
  - mientras vivió
  lexicon: HALOT
  rationale: La expresión contrasta con «en su muerte». «Durante su vida» es la forma más clara y natural para preservar ese contraste temporal. «Mientras vivió» sería aceptable, pero cambia ligeramente la sintaxis comparativa del versículo.
theological_decisions:
- issue: Si traducir נֶפֶשׁ como «alma» puede sugerir una doctrina no explícita aquí
  english_pob_reading: Let me die with the Philistines
  chosen_spanish_reading: Que yo muera con los filisteos
  alternative_spanish_readings:
  - Que muera mi alma con los filisteos
  rationale: El audit trail inglés ya explica que נֶפֶשׁ funciona idiomáticamente para la persona misma. En español, «Que yo muera» evita una carga doctrinal ajena al pasaje y mantiene el sentido volitivo de la súplica de Sansón.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar הַסְּרָנִים sin imponer una equivalencia eclesiástica o feudal
  english_pob_reading: the rulers
  chosen_spanish_reading: los gobernantes
  alternative_spanish_readings:
  - los señores
  - los lords
  rationale: «Gobernantes» expresa autoridad política sin introducir un término tradicional que en español pueda sonar anacrónico o demasiado cargado. Mantiene la tensión histórica del texto filisteo y evita domesticar el título.
  doctrine_reference: Lexical transparency and historical referential fidelity
translation_notes:
  revision_awareness: El contexto de revisión más reciente indica que no hubo cambios necesarios y que la evaluación comparativa mostró alta concordancia; por eso esta propuesta sigue de cerca el audit trail inglés y solo adapta lo necesario para un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «filisteos» en minúscula como gentilicio común en español.
  - Se conserva la repetición temporal «en su muerte / durante su vida» para reflejar el contraste hebreo.
  - Se evita «alma» en el texto principal para no forzar una lectura antropológica que el hebreo no exige aquí.
