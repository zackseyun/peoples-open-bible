revisions:
- from: Y el rey entró en el monte Sión[a], y al ver la fortificación[b] del lugar, quebrantó el juramento que había jurado y dio órdenes de derribar el muro todo alrededor.
  to: Y el rey entró en el monte Sión, y al ver la fortificación[a] del lugar, quebrantó el juramento que había hecho y dio órdenes de derribar la muralla de alrededor.
  rationale: Se quita la nota innecesaria en «monte Sión», se sustituye el calco rígido «había jurado» por el español natural «había hecho», y se mejora «el muro todo alrededor» a «la muralla de alrededor» para reflejar mejor τεῖχος κυκλόθεν con buena legibilidad.
