    rationale: La nota [a] está puesta sobre «contribución», pero explica «los hijos de Israel». La nota [c] repite prácticamente la misma información. Esto incumple la disciplina requerida de anclar cada nota al término pertinente y no duplicar marcadores/contenidos innecesarios.
