- from: ¿Tomará un hombre fuego en su seno, y no se quemarán sus vestidos?[a]
  to: ¿Llevará un hombre fuego en su seno, y su ropa no se quemará?[a]
  rationale: Se ajusta «tomará» a «llevará» para reflejar mejor el matiz contextual de tomar fuego y sostenerlo/llevarlo cerca del cuerpo. Se cambia «sus vestidos» por «su ropa» para mayor naturalidad en español moderno, en línea con la decisión inglesa «his clothes». También se suaviza levemente la nota para que suene más natural en español.
