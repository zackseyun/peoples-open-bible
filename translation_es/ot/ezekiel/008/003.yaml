  to: Entonces extendió lo que parecía una mano[a] y me tomó por un mechón de mi cabello, y el Espíritu[b] me alzó entre la tierra y los cielos y me llevó a Jerusalén en visiones de Dios, a la entrada de la puerta interior que mira al norte, donde estaba el asiento de la imagen de los celos que provoca celos.
  rationale: Se ajusta la primera expresión para reflejar mejor la cautela visionaria de תַּבְנִית, se mejora la preposición direccional con «a la entrada», y se suaviza la formulación corporal con «mi cabello». Se conservan las decisiones léxicas y teológicas del POB, manteniendo «el Espíritu» con nota alternativa. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por el hebreo y la auditoría inglesa.
