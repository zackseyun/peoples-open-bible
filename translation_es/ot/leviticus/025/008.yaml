translation:
  language: es
  text: Contarás para ti siete sábados[a] de años, siete años siete veces, y los días de los siete sábados[a] de años serán para ti cuarenta y nueve años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siete semanas de años». El hebreo dice literalmente «siete sábados de años», refiriéndose a siete ciclos de siete años.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפַרְתָּ
  english_pob_choice: You shall count
  chosen_spanish: Contarás
  alternatives_spanish:
  - Contarás para ti
  - Harás el conteo
  lexicon: HALOT
  rationale: El verbo ספר aquí expresa contar o enumerar una serie establecida de periodos. «Contarás» conserva el mandato directo y solemne sin añadir una paráfrasis innecesaria. La frase «para ti» se mantiene aparte como reflejo del dativo explícito.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para ti, de tu parte
  lexicon: HALOT
  rationale: El pronombre dativo marca la referencia personal del cálculo. «Para ti» reproduce la función del hebreo de manera natural en español y conserva el matiz de conteo dirigido al destinatario.
- source_word: שֶׁבַע שַׁבְּתֹת שָׁנִים
  english_pob_choice: seven sabbaths of years
  chosen_spanish: siete sábados de años
  alternatives_spanish:
  - siete semanas de años
  - siete ciclos sabáticos de años
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de שַׁבְּתֹת como «sábados» para reflejar el vínculo lexical con la legislación sabática. Aunque «semanas de años» es una alternativa posible, la forma elegida preserva mejor la tensión literal/documentada del original.
- source_word: שֶׁבַע שָׁנִים שֶׁבַע פְּעָמִים
  english_pob_choice: seven years seven times
  chosen_spanish: siete años siete veces
  alternatives_spanish:
  - siete años, siete veces
  - siete veces siete años
  lexicon: HALOT
  rationale: La secuencia repetitiva del hebreo se mantiene de forma cercana para conservar el paralelismo y la insistencia numérica. «Siete años siete veces» reproduce el orden y la redundancia del original sin forzar una reorganización excesiva.
- source_word: וְהָיוּ לְךָ
  english_pob_choice: shall be for you
  chosen_spanish: serán para ti
  alternatives_spanish:
  - te serán
  - resultarán para ti
  lexicon: HALOT
  rationale: El hebreo introduce el total resultante con una expresión simple de estado/resultado. «Serán para ti» mantiene esa construcción sin explicitar más de lo que el texto dice.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - el tiempo de
  - el período de
  lexicon: HALOT
  rationale: Se conserva «días» para respetar la expresión hebrea de duración contada. En español suena natural y mantiene el detalle del original.
- source_word: שֶׁבַע שַׁבְּתֹת הַשָּׁנִים
  english_pob_choice: the seven sabbaths of years
  chosen_spanish: los siete sábados de los años
  alternatives_spanish:
  - los siete ciclos sabáticos de los años
  - las siete semanas de años
  lexicon: HALOT
  rationale: La repetición de la frase anterior se traduce con la misma imagen léxica para conservar coherencia y transparencia. Se evita sustituirla por una formulación interpretativa que borre el enlace con el hebreo.
- source_word: תֵּשַׁע וְאַרְבָּעִים שָׁנָה
  english_pob_choice: forty-nine years
  chosen_spanish: cuarenta y nueve años
  alternatives_spanish:
  - nueve y cuarenta años
  lexicon: HALOT
  rationale: Se adopta el orden numérico natural del español, manteniendo el valor exacto del hebreo. La equivalencia es directa y no requiere nota adicional.
theological_decisions:
- issue: 'Expresión sabática: ‘sábados de años’ frente a una equivalencia más explicativa'
  english_pob_reading: The Hebrew literally says 'seven sabbaths of years,' referring to seven seven-year cycles.
  chosen_spanish_reading: «siete sábados de años» conserva la imagen literal del hebreo y deja visible la relación con los ciclos sabáticos.
  alternative_spanish_readings:
  - siete semanas de años
  - siete ciclos sabáticos de años
  rationale: No se neutraliza la tensión lexical del hebreo con una paráfrasis interpretativa. La forma literal sigue siendo comprensible en contexto y permite que la legislación sobre el año sabático y el jubileo quede transparentemente conectada al texto fuente.
  doctrine_reference: Levítico 25:1-10; 25:4
- issue: Cómputo total de los periodos
  english_pob_reading: the days of the seven sabbaths of years shall be for you forty-nine years
  chosen_spanish_reading: los días de los siete sábados de los años serán para ti cuarenta y nueve años
  alternative_spanish_readings:
  - ascenderán para ti a cuarenta y nueve años
  - te darán cuarenta y nueve años
  rationale: Se preserva la construcción de resultado del hebreo sin introducir una formulación aritmética más interpretativa. Esto mantiene el registro legal del mandato y la claridad del total.
  doctrine_reference: Levítico 25:8
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión final del texto inglés, que prefirió una forma más formal y cercana a la sintaxis hebrea («count», sin «amount to»). Por eso el español evita expansiones explicativas y conserva una estructura sobria y lineal, con «Contarás para ti... serán para ti...» y el valor total expresado de forma directa.
  spanish_consistency_notes:
  - Se mantiene «sábados de años» de forma consistente para preservar la imagen hebrea, en lugar de alternar con «semanas de años» en el cuerpo principal.
  - Se usa «para ti» de manera constante para reflejar el dativo explícito לְךָ.
  - El total numérico se expresa como «cuarenta y nueve años», siguiendo el uso normal del español y sin alterar el sentido del hebreo.
  - La puntuación separa los miembros paralelos del versículo sin añadir conectores interpretativos innecesarios.
