review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura y el sentido del griego y preserva correctamente la distinción entre αἱ ἄγνοιαι y αἱ ἁμαρτίαι como 'ignorancias' y 'pecados'. También mantiene adecuadamente el cambio de plural ('adversarios') a singular ('enemigo'). Sin embargo, introduce negaciones adicionales en las dos últimas cláusulas ('no caiga', 'no se alegre') que no están expresadas en el griego ni en el POB en inglés; la negación depende de ὅπως μὴ y no debe repetirse como 'no' en cada verbo coordinado. Eso altera levemente la forma y puede oscurecer la sintaxis del original.
  spanish_quality_summary: El español es generalmente claro y digno. 'Mis ignorancias' es poco usual, pero está justificado por la política léxica y por la necesidad de distinguirlo de 'pecados'. La mayor necesidad de corrección está en la sintaxis negativa de la oración. Además, la nota b puede afinarse para reflejar mejor la alternativa inglesa 'gloat over me' sin proponer una opción menos natural como 'se gloríe sobre mí'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La distinción léxica clave entre 'ignorancias' y 'pecados' está bien conservada. 'Adversarios' y 'enemigo' también concuerdan con la evidencia fuente.
  issues:
  - severity: high
    issue: Negación añadida en 'y yo no caiga'
    rationale: El griego tiene una sola negación gobernando la secuencia dependiente de ὅπως μὴ. En español natural, tras 'para que ... no ... y ...', la tercera cláusula debe quedar como 'y yo caiga...' dentro del alcance de la negación inicial, no con un segundo 'no' explícito si se quiere seguir de cerca la estructura fuente y el POB inglés.
  - severity: high
    issue: Negación añadida en 'y mi enemigo no se alegre de mí'
    rationale: Igual que en la cláusula anterior, el texto fuente no repite una partícula negativa aquí. La repetición con 'no' sobretraduce la sintaxis y aparta el español del patrón auditado en inglés.
  - severity: medium
    issue: Nota b usa una alternativa poco idiomática ('se gloríe sobre mí')
    rationale: La alternativa documentada en el POB es 'may gloat over me'. En español, 'se regocije por mi desgracia' o 'se goce de mi caída' reflejan mejor ese matiz hostil que 'se gloríe sobre mí', que suena menos natural y menos preciso.
  revised_spanish_text: para que mis ignorancias no se multipliquen[a], y mis pecados no aumenten, y yo caiga delante de mis adversarios, y mi enemigo se alegre de mí[b].
