translation:
  language: es
  text: Así que guarden todos mis estatutos y todos mis juicios[a], y háganlos, para que la tierra a la cual yo los estoy llevando para habitar en ella no los vomite[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mis decretos y mis ordenanzas». El hebreo usa dos términos legales distintos: חֻקּוֹת y מִשְׁפָּטִים.'
    reason: lexical_alternative
  - marker: b
    text: O «los expulse». El verbo hebreo es literalmente «vomitar», una metáfora vívida para la expulsión de habitantes contaminados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: So you shall keep
  chosen_spanish: Así que guardarán
  alternatives_spanish:
  - Y guardarán
  - De modo que guardarán
  lexicon: HALOT
  rationale: שׁמר en contexto legal-covenantal expresa guardar/observar. «Guardar» conserva la fuerza normativa y es natural en español bíblico contemporáneo. «Así que» refleja la conexión inferencial del hebreo y del inglés POB sin perder el mandato.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֻקָּה designa disposiciones prescritas. «Estatutos» mantiene la categoría legal distinguible de מִשְׁפָּטִים y es claro para lector eclesial hispanohablante.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis leyes
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a juicios, decisiones legales o normas. «Juicios» preserva la distinción léxica respecto de חֻקֹּת y mantiene la textura judicial del hebreo, aunque suene menos idiomático que «leyes».
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los harán
  alternatives_spanish:
  - y los cumplirán
  - y los practicarán
  lexicon: HALOT
  rationale: עָשָׂה con objetos legales significa hacer/cumplir. «Los harán» es directo y cercano al hebreo; evita paraphrasear con explicaciones no presentes en el texto.
- source_word: וְלֹא תָקִיא
  english_pob_choice: may not vomit ... out
  chosen_spanish: no los vomite
  alternatives_spanish:
  - no los expulse
  - no los eche fuera
  lexicon: HALOT
  rationale: קיא es literalmente «vomitar». Se conserva la metáfora corporal fuerte en español para no suavizar la advertencia de impureza y expulsión. El sujeto implícito se mantiene como «la tierra».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aunque «tierra» puede sonar más general, aquí corresponde al territorio prometido. En español funciona bien como equivalente de אֶרֶץ y conserva la personificación del versículo.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  english_pob_choice: to which I am bringing you
  chosen_spanish: a la cual yo los llevo
  alternatives_spanish:
  - a la cual yo los estoy llevando
  - a donde yo los llevo
  lexicon: HALOT
  rationale: מֵבִיא presenta la acción divina de llevar/conducir. «Llevo» es natural y comunica la iniciativa de Dios; «a la cual» conserva la relación con el antecedente «la tierra».
- source_word: לָשֶׁבֶת בָּהּ
  english_pob_choice: to dwell in it
  chosen_spanish: para habitar en ella
  alternatives_spanish:
  - para morar en ella
  - para vivir en ella
  lexicon: HALOT
  rationale: ישׁב aquí expresa habitar/residir. «Habitar» es formal, bíblicamente apto y cercano al registro del original; «en ella» mantiene la referencia a la tierra.
theological_decisions:
- issue: Metáfora de expulsión por parte de la tierra
  english_pob_reading: The land is personified as capable of vomiting out its inhabitants.
  chosen_spanish_reading: La tierra es personificada como capaz de vomitarlos fuera.
  alternative_spanish_readings:
  - La tierra los rechazará
  - La tierra los expulsará
  rationale: El hebreo usa una imagen vívida de repulsión física. Mantener «vomite» preserva la fuerza teológica de la santidad territorial y la gravedad del pecado sin domesticar la imagen.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Distinción entre חֻקֹּת y מִשְׁפָּטִים
  english_pob_reading: 'Render with two distinct English legal terms: ''statutes'' and ''judgments''.'
  chosen_spanish_reading: «estatutos» y «juicios» como dos términos legales distintos.
  alternative_spanish_readings:
  - «decretos» y «ordenanzas»
  - «estatutos» y «leyes»
  rationale: La fuente distingue dos categorías jurídicas. Conservar dos términos diferentes evita colapsar el vocabulario legal hebreo y hace auditable la decisión de traducción.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La POB inglesa revisó «live in it» por «dwell in it» para un registro más formal; la versión española adopta «habitar» por la misma razón de dignidad y cercanía al hebreo. También se mantiene la distinción léxica entre dos términos legales, evitando fusionarlos en una sola palabra castellana.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «tierra» como equivalente de אֶרֶץ por el contexto territorial y la personificación del versículo.
  - Se conserva el verbo fuerte «vomite» para reflejar la metáfora original sin atenuarla.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura causal final del hebreo.
