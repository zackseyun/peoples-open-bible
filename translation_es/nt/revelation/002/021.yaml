translation:
  language: es
  text: Y le di tiempo para que se arrepintiera[a], pero no quiere arrepentirse de su inmoralidad sexual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «arrepentirse de entre su inmoralidad sexual».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκα
  english_pob_choice: I gave
  chosen_spanish: le di
  alternatives_spanish:
  - he dado
  - le he dado
  lexicon: BDAG
  rationale: El aoristo indicativo expresa una acción puntual y completa; en español, el pretérito simple "di" comunica mejor esa concesión ya realizada que un perfecto compuesto.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - la
  lexicon: BDAG
  rationale: El dativo femenino singular funciona como complemento indirecto; "le" es la forma más natural y fluida en español para esta referencia femenina ya identificada en el contexto inmediato.
- source_word: χρόνον
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - un plazo
  - una oportunidad
  lexicon: BDAG
  rationale: χρόνος denota tiempo o lapso. "Tiempo" conserva la amplitud del término y permite que el contexto especifique que se trata de una oportunidad concedida para responder.
- source_word: ἵνα μετανοήσῃ
  english_pob_choice: to repent
  chosen_spanish: para que se arrepintiera
  alternatives_spanish:
  - para arrepentirse
  - a fin de que se arrepintiera
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. En español, "para que se arrepintiera" preserva la relación final con una sintaxis natural y mantiene el valor de cambio de rumbo moral de μετανοέω.
- source_word: οὐ θέλει
  english_pob_choice: she is not willing
  chosen_spanish: no quiere
  alternatives_spanish:
  - no está dispuesta
  - no está dispuesta a
  lexicon: BDAG
  rationale: θέλω expresa volición; "no quiere" transmite con claridad esa falta de disposición sin intensificar innecesariamente a "se niega".
- source_word: μετανοῆσαι
  english_pob_choice: to repent
  chosen_spanish: arrepentirse
  alternatives_spanish:
  - hacer arrepentimiento
  - cambiar de mente
  lexicon: BDAG
  rationale: El infinitivo repite el verbo de la primera cláusula. "Arrepentirse" es la forma española más idiomática y fiel al llamado al cambio de conducta/voluntad que expresa μετανοέω en este contexto.
- source_word: ἐκ τῆς πορνείας αὐτῆς
  english_pob_choice: of her sexual immorality
  chosen_spanish: de su inmoralidad sexual
  alternatives_spanish:
  - de su fornicación
  - de su prostitución
  - de su inmoralidad
  lexicon: BDAG
  rationale: πορνεία tiene un campo semántico de inmoralidad sexual; "inmoralidad sexual" preserva la concreción lexical sin reducir el término a una sola práctica específica ni cargarlo con una traducción eclesiástica tradicional no requerida por el griego. Se eligió "de" para reflejar el complemento idiomático español, aunque el griego usa ἐκ ('fuera de/from').
theological_decisions:
- issue: Sentido de πορνεία en un reproche apocalíptico
  english_pob_reading: Render concretely as 'sexual immorality' while allowing the immediate context to carry any metaphorical/idolatrous overtones.
  chosen_spanish_reading: Traducir concretamente como "inmoralidad sexual", dejando al contexto inmediato cualquier posible trasfondo metafórico o idolátrico.
  alternative_spanish_readings:
  - fornicación
  - prostitución
  - inmoralidad
  rationale: El término puede funcionar literalmente o con resonancias simbólicas en Apocalipsis. La traducción elegida conserva la fuerza moral y la especificidad sexual del léxico sin resolver por adelantado la tensión interpretativa del pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: Valor de θέλω en la negación
  english_pob_reading: she is not willing
  chosen_spanish_reading: no quiere
  alternative_spanish_readings:
  - no está dispuesta
  - se niega
  rationale: La cláusula indica falta de voluntad, no simplemente ausencia de acción futura. "No quiere" expresa esa volición negada de modo directo y sobrio, sin forzar un matiz de obstinación absoluta.
  doctrine_reference: Lexical distinction between volition and mere non-action in NT Greek
translation_notes:
  revision_awareness: Se siguió el aval de alta concordancia del repaso más reciente y no se introdujeron revisiones adicionales respecto del consenso del inglés POB; la decisión principal fue adaptar el matiz de ἐκ con una preposición natural en español sin perder la relación semántica con el verbo de arrepentimiento.
  spanish_consistency_notes:
  - Se mantiene "arrepentirse" para μετανοέω de manera coherente con el valor verbal de cambio de rumbo moral.
  - Se evita "SEÑOR" u otras sustituciones litúrgicas no pertinentes; no hay nombres divinos en este versículo.
  - '"Inmoralidad sexual" conserva un registro sobrio y publicable en español latinoamericano.'
  - La nota alternativa preserva la tensión entre el español idiomático "de" y la relación más literal del griego con ἐκ.
