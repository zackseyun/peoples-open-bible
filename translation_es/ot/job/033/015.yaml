translation:
  language: es
  text: En un sueño[a], una visión de la noche, cuando cae un sueño profundo sobre los hombres, en sopores sobre el lecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre las personas»; el hebreo dice «hombres» como referencia genérica a los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹם
  english_pob_choice: In a dream
  chosen_spanish: En un sueño
  alternatives_spanish:
  - En el sueño
  - Por medio de un sueño
  lexicon: HALOT
  rationale: La preposición ב con חֲלוֹם funciona aquí como marco locativo/instrumental del modo en que Dios habla. «En un sueño» conserva la naturalidad del español y la imagen del texto sin introducir una paráfrasis.
- source_word: חֶזְיוֹן לַיְלָה
  english_pob_choice: a vision of the night
  chosen_spanish: una visión de la noche
  alternatives_spanish:
  - una visión nocturna
  - una visión de noche
  lexicon: HALOT
  rationale: 'La construcción nominal se rinde mejor manteniendo el orden y la imaginería del hebreo: una visión que pertenece a la noche. «Una visión de la noche» preserva el paralelo con «sueño» y evita reducirla a un adjetivo más libre.'
- source_word: תַּרְדֵּמָה
  english_pob_choice: deep sleep
  chosen_spanish: un sueño profundo
  alternatives_spanish:
  - un profundo sueño
  - un sopor profundo
  - un letargo
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir un sueño muy hondo y a veces asociado a la acción divina, en español «sueño profundo» comunica con claridad el valor semántico sin cargarlo innecesariamente hacia «trance» o «letargo».
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  - los seres humanos
  lexicon: HALOT
  rationale: Se conserva el plural masculino genérico del hebreo, como hace la POB inglesa con «men». En español «los hombres» mantiene la correspondencia formal y el alcance humano genérico; una nota puede aclarar el sentido inclusivo.
- source_word: בִּתְנוּמוֹת
  english_pob_choice: in slumbers
  chosen_spanish: en adormecimientos
  alternatives_spanish:
  - en sopores
  - en dormitares
  - en somnolencias
  lexicon: HALOT
  rationale: El plural hebreo sugiere estados repetidos o escalonados de adormecimiento. «Adormecimientos» intenta conservar esa pluralidad mejor que un singular liso como «sueño» o «dormir»; aunque es menos idiomático, refleja con mayor precisión la textura poética del original.
- source_word: עֲלֵי מִשְׁכָּב
  english_pob_choice: on the bed
  chosen_spanish: sobre el lecho
  alternatives_spanish:
  - en el lecho
  - sobre la cama
  - encima del lecho
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre lecho». «Lecho» preserva el tono poético y algo más elevado del verso, mientras que «sobre» mantiene la preposición de superficie sin forzar una lectura posesiva no presente en el texto.
theological_decisions:
- issue: Alcance genérico de אֲנָשִׁים
  english_pob_reading: 'men (with a footnote noting the generic sense: people / human beings)'
  chosen_spanish_reading: los hombres (con nota sobre su valor genérico humano)
  alternative_spanish_readings:
  - las personas
  - la gente
  - los seres humanos
  rationale: El hebreo usa un masculino plural genérico. La POB inglesa preserva esa forma y añade una nota inclusiva. En español se conserva «los hombres» por fidelidad formal, y la nota explica que el referente abarca a la humanidad en general.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la auditoría inglesa más reciente: no se reportan revisiones aplicadas, y la versión española sigue la misma lectura optimal-equivalence, conservando las imágenes paralelas de sueño, visión, sueño profundo y adormecimientos sin introducir ampliaciones doctrinales o interpretativas nuevas.'
  spanish_consistency_notes:
  - Mantengo el paralelismo de cuatro miembros del verso, con cadencia breve y poética.
  - Uso «lecho» para sostener el registro bíblico-literario, coherente con la imaginería del sueño nocturno.
  - La nota sobre «los hombres» preserva la tensión entre fidelidad al masculino genérico y legibilidad inclusiva en español.
