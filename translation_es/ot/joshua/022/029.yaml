translation:
  language: es
  text: ¡Lejos esté de nosotros que nos rebelemos contra Yahvé y que hoy nos apartemos de seguir a Yahvé al edificar un altar para holocausto, ofrenda de cereal o sacrificio, aparte del altar de Yahvé nuestro Dios, que está delante de su tabernáculo[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volver hoy de detrás de Yahvé». El hebreo, literalmente, habla de volverse de detrás de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לָּנוּ מִמֶּנּוּ
  english_pob_choice: Far be it from us
  chosen_spanish: ¡Lejos de nosotros!
  alternatives_spanish:
  - ¡Ni pensarlo!
  - ¡Que esté muy lejos de nosotros!
  lexicon: HALOT
  rationale: La exclamación hebrea expresa rechazo fuerte y aborrecimiento de la idea. «Lejos de nosotros» preserva bien la fuerza idiomática en español sin volverse artificial.
- source_word: לִמְרֹד בַּיהוָה
  english_pob_choice: that we should rebel against Yahweh
  chosen_spanish: rebelarnos contra Yahvé
  alternatives_spanish:
  - rebelarnos ante Yahvé
  - alzarnos contra Yahvé
  lexicon: HALOT
  rationale: Con מרד y la preposición adversativa, la relación es de rebelión contra Yahvé. «Rebelarnos contra» comunica la fuerza pactual y conflictiva del verbo.
- source_word: וְלָשׁוּב הַיּוֹם מֵאַחֲרֵי יְהוָה
  english_pob_choice: and turn away today from following Yahweh
  chosen_spanish: y apartarnos hoy de seguir a Yahvé
  alternatives_spanish:
  - y volver hoy de detrás de Yahvé
  - y dar hoy la espalda a Yahvé
  lexicon: HALOT
  rationale: El hebreo idiomático dice literalmente «volver de detrás de Yahvé». En español, «apartarnos de seguir a Yahvé» conserva el sentido relacional y de discipulado sin perder claridad.
- source_word: לִבְנוֹת מִזְבֵּחַ
  english_pob_choice: by building an altar
  chosen_spanish: edificando un altar
  alternatives_spanish:
  - para edificar un altar
  - al edificar un altar
  lexicon: HALOT
  rationale: El infinitivo explica la acción mediante la cual ocurriría esa rebelión. «Edificando» mantiene la idea instrumental/explicativa y suena natural en la frase.
- source_word: לְעֹלָה
  english_pob_choice: for burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para ofrenda quemada
  - para sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el equivalente técnico asentado para עֹלָה. Aunque puede tener asociaciones modernas, aquí es la designación sacrificial precisa.
- source_word: לְמִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda vegetal
  - oblación
  lexicon: HALOT
  rationale: «מִנְחָה» en contexto sacrificial corresponde a la ofrenda de cereal/grano. «Ofrenda de cereal» es clara y evita la vaguedad de solo «ofrenda».
- source_word: וּלְזָבַח
  english_pob_choice: or sacrifice
  chosen_spanish: o sacrificio
  alternatives_spanish:
  - o víctima
  - o ofrenda de sacrificio
  lexicon: HALOT
  rationale: זֶבַח es un término amplio para sacrificio. «Sacrificio» preserva la amplitud sin introducir un subtipo no explícito.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - fuera de
  lexicon: HALOT
  rationale: La preposición marca exclusión con respecto al altar legítimo. «Aparte de» comunica con naturalidad la contraposición y la excepción.
- source_word: מִזְבַּח יְהוָה אֱלֹהֵינוּ
  english_pob_choice: the altar of Yahweh our God
  chosen_spanish: el altar de Yahvé nuestro Dios
  alternatives_spanish:
  - el altar de Yahvé, nuestro Dios
  - el altar de Yahvé, el Dios nuestro
  lexicon: HALOT
  rationale: Se conserva la cadena posesiva simple del hebreo y el nombre divino Yahvé, con «nuestro Dios» para mantener la confesión pactual.
- source_word: אֲשֶׁר לִפְנֵי מִשְׁכָּנוֹ
  english_pob_choice: that is before his tabernacle
  chosen_spanish: que está delante de su tabernáculo
  alternatives_spanish:
  - que está delante de su morada
  - que está ante su tabernáculo
  lexicon: HALOT
  rationale: «מִשְׁכָּן» puede ser tabernáculo o morada. «Tabernáculo» es el término más claro y tradicional en español bíblico, y «delante de» expresa la relación espacial del altar autorizado con el santuario.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. En esta edición en español se adopta «Yahvé» como forma estable para el nombre propio divino, conforme a la política del proyecto, en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación semántica de שׁוּב מֵאַחֲרֵי יְהוָה
  english_pob_reading: turn away today from following Yahweh
  chosen_spanish_reading: apartarnos hoy de seguir a Yahvé
  alternative_spanish_readings:
  - volver hoy de detrás de Yahvé
  - apartarnos hoy de Yahvé
  rationale: La expresión hebrea es idiomática y literalmente habla de ‘volver de detrás de’. La redacción española conserva el sentido de abandono del seguimiento, sin borrar la imagen relacional del original.
  doctrine_reference: POB lexical audit trail; Hebrew idiom in Josh 22:29
- issue: Naturaleza del altar prohibido
  english_pob_reading: building an altar for burnt offering, grain offering, or sacrifice
  chosen_spanish_reading: edificando un altar para holocausto, ofrenda de cereal o sacrificio
  alternative_spanish_readings:
  - edificando un altar para ofrenda quemada, ofrenda de cereal o sacrificio
  - edificando un altar para sacrificio
  rationale: La lista preserva la progresión sacrificial del hebreo. «Holocausto» conserva el valor técnico de עֹלָה; «ofrenda de cereal» mantiene la especificidad de מִנְחָה; «sacrificio» traduce el término general זֶבַח.
  doctrine_reference: Lexical distinctions in sacrificial terminology
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y concuerda con la revisión final indicada en el audit trail inglés: no se requieren cambios adicionales; se mantiene el acuerdo alto del control cruzado. La única nota de alternativa preserva el giro idiomático literal de מֵאַחֲרֵי.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יהוה.
  - Se mantiene «tabernáculo» para מִשְׁכָּן en coherencia con el registro POB.
  - Se conserva la distinción sacrificial entre «holocausto», «ofrenda de cereal» y «sacrificio».
  - La exclamación inicial en español reproduce el tono enfático de rechazo del hebreo.
