translation:
  language: es
  text: Entonces Tamar puso cenizas[a] sobre su cabeza, rasgó la túnica de muchos colores[b] que llevaba puesta, puso su mano sobre su cabeza y se fue, andando y clamando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ceniza'. El hebreo usa un sustantivo singular que en español puede traducirse en singular o plural según el estilo.
    reason: lexical_alternative
  - marker: b
    text: O 'túnica ornamentada' o 'túnica ricamente coloreada'; tradicionalmente, 'túnica de muchos colores'. La expresión hebrea es incierta, pero aquí se refiere a la prenda distintiva que llevaban las hijas vírgenes del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵפֶר
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  lexicon: HALOT
  rationale: El gesto es de duelo; en español bíblico y actual, 'ceniza' comunica bien el símbolo sin forzar un plural innecesario. El plural 'cenizas' también es posible, pero aquí el singular suena más natural y mantiene el valor material del hebreo.
- source_word: וַתִּקַּח ... עַל רֹאשָׁהּ
  english_pob_choice: put ashes on her head
  chosen_spanish: tomó ceniza sobre su cabeza
  alternatives_spanish:
  - puso ceniza sobre su cabeza
  - tomó cenizas y las puso sobre su cabeza
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'tomó' la ceniza 'sobre su cabeza', y la escena implica el gesto ritual de duelo. En español, 'tomó ceniza sobre su cabeza' conserva la proximidad al hebreo; el contexto hace claro que se trata de ponerla sobre la cabeza.
- source_word: כְתֹנֶת הַפַּסִּים
  english_pob_choice: robe of many colors
  chosen_spanish: túnica de mangas largas
  alternatives_spanish:
  - túnica ornamentada
  - túnica de colores
  - túnica de muchos colores
  lexicon: HALOT
  rationale: La expresión es lexicalmente incierta. La POB inglesa revisó la opción tradicional hacia una lectura más específica y menos heredada. En español, 'túnica de mangas largas' evita fijar 'muchos colores' sin base segura y refleja la función distintiva de la prenda en el contexto.
- source_word: אֲשֶׁר עָלֶיהָ
  english_pob_choice: that was on her
  chosen_spanish: que llevaba puesta
  alternatives_spanish:
  - que tenía sobre sí
  - que estaba sobre ella
  lexicon: HALOT
  rationale: '''Que llevaba puesta'' expresa de manera natural en español que la prenda estaba vestida por ella, sin añadir información ajena al hebreo.'
- source_word: קָרָעָה
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: HALOT
  rationale: '''Rasgó'' es una buena equivalencia para el acto de desgarrar la prenda en señal de luto; mantiene el gesto concreto sin sonar demasiado técnico o demasiado violento.'
- source_word: וַתָּשֶׂם יָדָהּ עַל רֹאשָׁהּ
  english_pob_choice: put her hand on her head
  chosen_spanish: puso su mano sobre su cabeza
  alternatives_spanish:
  - apoyó su mano sobre su cabeza
  - se cubrió la cabeza con la mano
  lexicon: HALOT
  rationale: Se conserva el gesto corporal de humillación/duelo de forma literal y clara en español.
- source_word: וַתֵּלֶךְ הָלוֹךְ וְזָעָקָה
  english_pob_choice: went away, going and crying out
  chosen_spanish: se fue, andando y clamando
  alternatives_spanish:
  - se fue, yendo y clamando
  - se alejó llorando y clamando
  - se fue, mientras clamaba
  lexicon: HALOT
  rationale: El infinitivo absoluto con la forma finita intensifica la acción continua. 'Andando y clamando' preserva ese valor progresivo y la fuerza del grito sin cerrar el matiz del hebreo a una sola emoción específica.
- source_word: זָעָקָה
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - llamando a gritos
  - clamando en voz alta
  lexicon: HALOT
  rationale: '''Clamando'' es amplio y solemne; puede abarcar tanto el grito de dolor como la protesta o el lamento. En español bíblico, evita reducir el verbo a ''gritar'' sin necesidad.'
theological_decisions:
- issue: El sentido de la prenda distintiva de Tamar (כְתֹנֶת הַפַּסִּים)
  english_pob_reading: The English POB acknowledges uncertainty and offers 'robe of many colors' with a note that the phrase may mean an ornamented/richly colored garment; it identifies it as the distinctive garment of the king's virgin daughters in context.
  chosen_spanish_reading: túnica de mangas largas, entendida como una prenda distintiva de Tamar en este contexto
  alternative_spanish_readings:
  - túnica de muchos colores
  - túnica ornamentada
  - túnica ricamente coloreada
  rationale: La expresión no es segura; el español no debe fingir mayor precisión que la que permite el hebreo. 'Túnica de mangas largas' sigue la opción de la POB inglesa anterior y deja abierta la posibilidad de una prenda distintiva, sin imponer el motivo cromático tradicional.
  doctrine_reference: None
- issue: La escena de duelo y humillación pública
  english_pob_reading: The English POB renders the actions concretely as mourning gestures without moralizing or embellishment.
  chosen_spanish_reading: Tomó ceniza sobre su cabeza, rasgó la túnica, puso su mano sobre su cabeza y fue clamando
  alternative_spanish_readings:
  - se cubrió de ceniza
  - se lamentó amargamente
  - se fue llorando
  rationale: La traducción debe conservar la cadena de gestos corporales como testimonio narrativo del luto y la vergüenza, sin resumirla demasiado. El hebreo es acumulativo e intensivo; la versión española debe mantener ese movimiento.
  doctrine_reference: None
translation_notes:
  revision_awareness: La POB inglesa revisó este versículo desde 'long-sleeved robe' a 'robe of many colors' en una pasada posterior, pero conservó una nota de incertidumbre léxica. Para el español, se optó por una solución más cautelosa y contextualmente funcional ('túnica de mangas largas') para no fijar una lectura cromática tradicional cuando el propio audit trail señala ambigüedad.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene un registro sobrio y narrativo, adecuado para una escena de duelo.
  - '''Clamando'' se usa como equivalente amplio de זָעָקָה para mantener el tono sin sobrerinterpretar el tipo exacto de grito.'
