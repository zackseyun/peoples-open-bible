revisions:
- from: Entonces Jacob tuvo mucho miedo y se angustió, y dividió al pueblo que estaba con él, y las ovejas, y las vacas, y los camellos, en dos campamentos[a].
  to: Entonces Jacob tuvo mucho miedo y se angustió, y dividió a la gente que estaba con él, y los rebaños, y el ganado, y los camellos, en dos campamentos[a].
  rationale: 'Se corrigen tres puntos léxicos para reflejar mejor el hebreo y la auditoría inglesa: ''pueblo'' -> ''gente'' para evitar sentido étnico; ''ovejas'' -> ''rebaños'' para conservar el valor colectivo de צֹאן; ''vacas'' -> ''ganado'' para reflejar el sentido colectivo de בָּקָר. Se mantiene ''campamentos'' con nota alternativa, ya que la ambigüedad lexical de מַחֲנוֹת está bien documentada y debe preservarse.'
