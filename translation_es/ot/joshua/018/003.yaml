  to: 'Y Josué dijo a los hijos de Israel[a]: «¿Hasta cuándo seguirán siendo remisos en entrar a tomar posesión de la tierra que Yahvé, el Dios de sus padres, les ha dado?»'
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y reflejar mejor el matiz de reprensión prolongada del hebreo. Se conserva todo lo demás: el nombre divino «Yahvé», la transparencia de «hijos de Israel», y la fórmula pactal «el Dios de sus padres».'
