revisions:
- from: 'Y dijo la primogénita a la menor[a]: «Nuestro padre está viejo[b], y no hay hombre en la tierra para entrar a nosotras conforme al modo de toda la tierra».'
  to: 'Y la primogénita dijo a la menor: «Nuestro padre ya es viejo, y no hay hombre en la tierra para unirse a nosotras[a] según la costumbre de toda la tierra[b]».'
  rationale: Se corrige el anclaje de la nota cultural, se mejora el registro de «está viejo» a «ya es viejo», y se reemplaza «entrar a nosotras» por «unirse a nosotras» para conservar el eufemismo con español más natural. También se suaviza la frase final a una formulación más idiomática sin perder cercanía al hebreo ni al análisis del POB inglés.
