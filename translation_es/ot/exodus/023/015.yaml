review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la mayor parte del sentido del hebreo: mandato de guardar la Fiesta de los Panes sin Levadura, duración de siete días, referencia al tiempo señalado en el mes de Abib y motivo del éxodo. También maneja bien el giro idiomático de comparecer delante de Dios. Sin embargo, la cláusula final no preserva adecuadamente רֵיקָם, que en este contexto significa ''vacío / con las manos vacías'', no ''en vano''. Además, las notas están mal orientadas: la nota [a] no refleja una alternativa significativa preservada por el audit trail inglés, y la nota [b] está anclada en una frase que no presenta una alternativa, cuando la observación relevante afecta al cambio de persona en la cláusula final.'
  spanish_quality_summary: El español es generalmente claro y digno, con buen registro bíblico moderno. 'Guardarás', 'Durante siete días' y 'tiempo señalado' funcionan bien. No obstante, 'en vano' introduce una lectura semánticamente equívoca y menos natural para el contexto cultual específico que 'con las manos vacías'. También conviene ajustar las notas para que sirvan a una verdadera ambigüedad o decisión traductora y no repitan innecesariamente el texto principal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Abib'' se conserva correctamente como mes calendárico. La principal desviación no es glosarial sino léxica-contextual: רֵיקָם debe reflejar carencia material/cultual (''con las manos vacías'', ''vacío''), en línea con el audit trail inglés ''empty-handed''.'
  issues:
  - severity: high
    issue: '''en vano'' para רֵיקָם en la cláusula final'
    rationale: רֵיקָם significa 'vacío, con las manos vacías'. En este contexto legal-cultual alude a presentarse sin dádiva/ofrenda. 'En vano' cambia el sentido hacia inutilidad o futilidad y no preserva la imagen ni la implicación cultual del hebreo.
  - severity: medium
    issue: La nota [b] está anclada en 'porque en él saliste de Egipto' pero describe un cambio de persona que ocurre en la cláusula final
    rationale: El audit trail inglés documenta que el hebreo pasa de segunda persona singular a verbo plural/indefinido en la cláusula 'y no aparecerán...'. Esa observación debe ir anclada allí, no en la referencia al éxodo.
  - severity: low
    issue: La nota [a] no aporta una alternativa real necesaria
    rationale: El nombre cultual 'Fiesta de los Panes sin levadura' ya está en el texto principal y la nota repite la decisión. Si se conserva una nota, conviene usarla para una alternativa o aclaración con valor real para el lector; de lo contrario, debe omitirse.
  revised_spanish_text: Guardarás la Fiesta de los Panes sin levadura. Durante siete días comerás panes sin levadura, como te mandé, en el tiempo señalado del mes de Abib, porque en él saliste de Egipto. Y nadie se presentará delante de mí con las manos vacías[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Y no aparecerán delante de mí con las manos vacías». El hebreo cambia de la segunda persona singular en los mandatos anteriores a un verbo en tercera persona plural en esta cláusula.'
    reason: alternative_reading
  revision_rationale: Se corrige la cláusula final para reflejar fielmente רֵיקָם como carencia material/cultual ('con las manos vacías'), en vez de 'en vano'. También se simplifica 'como te lo he mandado' a 'como te mandé' para seguir mejor el perfecto hebreo en estilo natural español. Se eliminan notas innecesarias y se reubica la nota pertinente al cambio de persona en la cláusula final, donde realmente ocurre.
