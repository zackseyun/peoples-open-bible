    text: Los términos animales de la lista siguiente son imágenes sacrificiales y metafóricas para los gobernantes y guerreros muertos.
    reason: cultural_note
  - marker: b
    text: O «engordados de Basán». Basán era conocido por sus pastos abundantes y su ganado bien alimentado.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta únicamente la cola final para un español más natural y fiel al hebreo: ''cebados de Basán'' comunica mejor la idea de animales bien alimentados/fattened ones. También se elimina la coma innecesaria antes del descriptor final. El resto del verso se conserva porque representa bien el sentido y la imaginería del original.'
