translation:
  language: es
  text: ¿Y ahora quiénes son ustedes, los que han puesto a Dios a prueba en este día, y se han puesto por encima de Dios[a] entre los hijos de los hombres?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y hablan por Dios entre los seres humanos». El giro griego es comprimido y la preposición puede sugerir también actuar en nombre de Dios.'
    reason: alternative_reading
  - marker: b
    text: Lit. «entre los hijos de los hombres», una expresión de estilo hebreo para la humanidad mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνες ἐστὲ ὑμεῖς
  english_pob_choice: who are you
  chosen_spanish: ¿quiénes son ustedes?
  alternatives_spanish:
  - ¿quiénes son vosotros?
  - ¿qué clase de personas son ustedes?
  lexicon: BDAG
  rationale: La pregunta es un reproche retórico directo. «¿Quiénes son ustedes?» mantiene la fuerza del desafío sin añadir interpretación innecesaria. Se evita un calco más rígido y se usa «ustedes» por registro bíblico-neutral latinoamericano.
- source_word: ἐπειράσατε
  english_pob_choice: have put ... to the test
  chosen_spanish: han puesto a Dios a prueba
  alternatives_spanish:
  - han probado a Dios
  - han tentado a Dios
  lexicon: BDAG
  rationale: En este contexto no se trata de una tentación al mal, sino de un desafío presuntuoso a Dios. «Poner a prueba» expresa bien la fuerza del griego y conserva la tensión teológica documentada por la POB inglesa.
- source_word: ἐν τῇ ἡμέρᾳ τῇ σήμερον
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - en este mismo día
  lexicon: BDAG
  rationale: La expresión duplicada en griego tiene tono enfático. «En este día» conserva el énfasis solemne mejor que un simple «hoy» y suena natural en español.
- source_word: ὑπεῖρ τοῦ θεοῦ
  english_pob_choice: in place of God
  chosen_spanish: se han puesto por encima de Dios
  alternatives_spanish:
  - han actuado en lugar de Dios
  - han hablado por Dios
  - se han puesto en lugar de Dios
  lexicon: LSJ
  rationale: La POB inglesa revisó esta cláusula para reflejar más directamente ὑπέρ y evitar una expansión interpretativa. En español, «se han puesto por encima de Dios» preserva el matiz de autoexaltación y el reproche sin convertirlo en una paráfrasis doctrinal excesiva.
- source_word: ἐν μέσῳ υἱῶν ἀνθρώπων
  english_pob_choice: among the sons of men
  chosen_spanish: entre los hijos de los hombres
  alternatives_spanish:
  - entre los seres humanos
  - entre la humanidad
  lexicon: LSJ
  rationale: Se mantiene la fórmula semítica «hijos de los hombres» para conservar el color retórico del original, tal como hace la POB inglesa. En nota se ofrece la alternativa inclusiva porque el giro puede entenderse como humanidad mortal.
theological_decisions:
- issue: Relación entre hablar por Dios y usurpar su prerrogativa
  english_pob_reading: Judith accuses the hearers of presumptuously assuming a role that belongs to God alone.
  chosen_spanish_reading: Judith los reprende por actuar como si ocuparan el lugar de Dios entre los mortales, no simplemente por hablar en nombre de Dios.
  alternative_spanish_readings:
  - Judith les reprocha que solo hablen por Dios.
  - Judith les reprocha que se exalten por encima de Dios.
  rationale: 'El griego es compacto y permite más de una lectura. La POB inglesa documenta la posibilidad de «hablar por Dios» pero privilegia la idea de asumir una prerrogativa divina. La redacción española conserva esa tensión: no cierra del todo la ambigüedad, pero expresa con claridad el carácter de usurpación implícito en el contexto.'
  doctrine_reference: Preservar la tensión textual donde el griego es comprimido; no resolver de más la ambigüedad.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada de la POB inglesa en la cláusula final, que prefirió una formulación más directa para ὑπεῖρ τοῦ θεοῦ y dejó abierta la posibilidad alternativa de «hablar por Dios». El español adopta esa decisión y la documenta en nota.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene «hijos de los hombres» por fidelidad al giro semítico, con nota explicativa de sentido.
  - Se prefiere «han puesto a Dios a prueba» para πειράζω en contexto de reproche, no «tentado».
  - Se evita «SEÑOR» porque aquí el texto griego dice θεός y no κύριος.
  - El registro es solemne pero moderno, apto para lectura pública.
