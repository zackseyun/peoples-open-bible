translation:
  language: es
  text: Entonces los diez hermanos de José descendieron para comprar grano de Egipto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Egipto». El hebreo dice más literalmente «de Egipto», expresando el origen del grano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron
  lexicon: HALOT
  rationale: El hebreo ירד conserva la imagen espacial de descenso, habitual en el viaje hacia Egipto. En español, «descendieron» refleja con fidelidad esa dirección sin perder inteligibilidad; «bajaron» sería más coloquial, y «fueron» neutralizaría la imagen.
- source_word: אֲחֵי יוֹסֵף
  english_pob_choice: Joseph’s brothers
  chosen_spanish: los hermanos de José
  alternatives_spanish:
  - los hermanos de José
  - los hermanos José
  lexicon: HALOT
  rationale: La construcción posesiva natural en español es «los hermanos de José». Mantiene el sentido del constructo hebreo sin forzar una posesión ajena al español.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - los diez
  - diez
  lexicon: HALOT
  rationale: 'El cardinal modifica a «hermanos» y en español se expresa naturalmente antes del sustantivo: «los diez hermanos».'
- source_word: לִשְׁבֹּר
  english_pob_choice: to buy
  chosen_spanish: comprar
  alternatives_spanish:
  - adquirir
  - comprar grano
  lexicon: HALOT
  rationale: En narrativas de hambre, שׁבר funciona como idiomático para procurar alimento/grano. «Comprar» transmite bien la acción comercial que el contexto exige y sigue la decisión auditada del POB inglés.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - alimento
  lexicon: HALOT
  rationale: בָּר se refiere aquí al grano cereal. «Grano» es la equivalencia moderna más clara y natural en español; «cereal» puede sonar técnico, y «alimento» sería demasiado general.
- source_word: מִמִּצְרָיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - en Egipto
  lexicon: HALOT
  rationale: El מן hebreo indica fuente/origen. En español, «de Egipto» conserva esa procedencia con naturalidad. «Desde Egipto» enfatizaría punto de partida, mientras que «en Egipto» suaviza la relación de origen que el audit trail inglés preservó.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; este borrador sigue de cerca el texto hebreo y mantiene la decisión auditada del POB inglés de conservar la fuente/origen expresado por מן en «de Egipto».
  spanish_consistency_notes:
  - Se mantiene «José» para יוֹסֵף y «grano» para בָּר, en línea con la terminología bíblica estándar y el audit trail del POB.
  - Se evita «SEÑOR» u այլ terminología teológica no pertinente; el versículo no contiene léxico divino.
  - La frase verbal «descendieron» conserva el hebraísmo narrativo sin volverlo artificial en español.
