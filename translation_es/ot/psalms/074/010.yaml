translation:
  language: es
  text: ¿Hasta cuándo[a], oh Dios, reprochará el adversario? ¿Despreciará el enemigo tu nombre para siempre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Blasfemará el enemigo tu nombre para siempre?»'
