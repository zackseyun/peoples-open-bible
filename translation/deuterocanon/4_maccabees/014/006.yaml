id: 4MA.14.6
reference: 4 Maccabees 14:6
source:
  edition: lxx-swete-1909
  text: καθάπερ γὰρ χεῖρες καὶ πόδες συμφώνως τοῖς τῆς ψυχῆς ἀφηγήμασιν κινοῦνται οὕτως οἱ ἱεροὶ μειρᾶκες ἐκεῖνοι ὡς ὑπὸ ψυχῆς ἀθανάτου τῆς εὐσεβείας πρὸς τὸν ὑπὲρ αὐτῆς συνεφώνησαν θάνατον.
  language: Greek
