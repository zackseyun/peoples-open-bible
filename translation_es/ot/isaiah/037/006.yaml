  rationale: Se hicieron ajustes menores de estilo y léxico para mejorar la naturalidad del español y representar mejor el contexto cortesano del hebreo, sin alterar el sentido ni las decisiones teológicas principales. Se mantuvieron Yahvé, el mandato singular a Ezequías y la gravedad de «blasfemado».
