  language: en
  yaml_path: translation/ot/esther/009/019.yaml
  text: Therefore the Jews of the villages[a], who live in the rural towns, make the fourteenth day of the month of Adar a day of gladness and feasting and a holiday, and of sending portions[b], each man to his neighbor.
