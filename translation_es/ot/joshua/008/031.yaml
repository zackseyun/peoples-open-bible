    text: O «piedras sin labrar». El hebreo dice «piedras enteras», subrayando que quedaron intactas y no fueron trabajadas con hierro.
    reason: lexical_alternative
  - marker: b
    text: O «sacrificios de comunión» u «ofrendas de bienestar» para «sacrificios de paz».
    reason: lexical_alternative
  revision_rationale: Se corrige «esclavo» a «siervo» por tratarse del título honorífico establecido de Moisés, conforme a la decisión lexical auditada del POB. Se reemplaza la construcción rígida «había sido alzado hierro» por «se había usado hierro», que comunica fielmente la prohibición contextual en español natural. Se mejora la fluidez con «como está escrito», se elimina el doblete poco idiomático «sacrificaron sacrificios», y se ajusta la puntuación para una sintaxis más clara. Se conservan «Yahvé», «los hijos de Israel», «holocaustos» y la nota alternativa sobre «piedras sin labrar» y «sacrificios de paz».
