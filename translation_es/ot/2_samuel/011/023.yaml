translation:
  language: es
  text: 'El mensajero dijo a David: «Los hombres prevalecieron contra nosotros y salieron a nuestro encuentro en el campo abierto[a], pero nosotros estuvimos contra ellos[b] hasta la entrada del portón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el campo»; el añadido «abierto» explicita el valor militar del hebreo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «estuvimos sobre ellos», una expresión idiomática de presión o dominio en combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el enviado
  - el ángel
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un mensajero humano, no de un ser celestial. «Mensajero» conserva la cercanía léxica al hebreo y es natural en español.
- source_word: גָבְרוּ עָלֵינוּ
  english_pob_choice: prevailed against us
  chosen_spanish: prevalecieron contra nosotros
  alternatives_spanish:
  - fueron más fuertes que nosotros
  - nos vencieron
  lexicon: HALOT
  rationale: גבר con עַל expresa dominar, imponerse o prevalecer sobre alguien. «Prevalecieron contra nosotros» mantiene esa fuerza comparativa sin volverlo demasiado interpretativo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los soldados
  - los guerreros
  lexicon: HALOT
  rationale: El hebreo dice simplemente «los hombres». Aunque el referente son combatientes, «los hombres» preserva la forma del original y funciona en el contexto militar.
- source_word: וַיֵּצְאוּ אֵלֵינוּ הַשָּׂדֶה
  english_pob_choice: came out to us in the open field
  chosen_spanish: salieron a nosotros en el campo abierto
  alternatives_spanish:
  - salieron contra nosotros en el campo
  - salieron a nuestro encuentro en el campo abierto
  lexicon: HALOT
  rationale: La construcción es literalmente de salida hacia el grupo que habla. «A nosotros» refleja אֵלֵינוּ, y «campo abierto» aclara el ámbito de combate con un español natural.
- source_word: וַנִּהְיֶה עֲלֵיהֶם
  english_pob_choice: we were against them
  chosen_spanish: nosotros estuvimos contra ellos
  alternatives_spanish:
  - nos mantuvimos sobre ellos
  - estuvimos encima de ellos
  lexicon: HALOT
  rationale: Literalmente el hebreo dice «estuvimos sobre ellos», un modismo militar de presión/ofensiva. «Estuvimos contra ellos» conserva la relación adversativa sin perder inteligibilidad en español.
- source_word: עַד פֶּתַח הַשָּׁעַר
  english_pob_choice: the entrance of the gate
  chosen_spanish: hasta la entrada de la puerta
  alternatives_spanish:
  - hasta la entrada de la puerta de la ciudad
  - hasta el umbral de la puerta
  lexicon: HALOT
  rationale: פֶּתַח es «entrada/apertura» y שַׁעַר es «puerta»; aquí la imagen delimita el alcance de la persecución. «Entrada de la puerta» sigue de cerca el hebreo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una formulación más literal para גָבְרוּ עָלֵינוּ y וַנִּהְיֶה עֲלֵיהֶם, sin perder claridad idiomática en español. También conserva la distinción espacial del cierre del versículo con una expresión cercana al hebreo.
  spanish_consistency_notes:
  - Se mantiene «mensajero» para הַמַּלְאָךְ, evitando «ángel» por el contexto bélico humano.
  - Se conserva «los hombres» en vez de «los soldados» para no añadir información no explícita en el texto hebreo.
  - «Campo abierto» traduce el sentido contextual de הַשָּׂדֶה sin introducir una interpretación excesiva.
  - 'La secuencia verbal procura reflejar el paralelismo del hebreo: prevalecer/salir/estar contra hasta el límite de la puerta.'
