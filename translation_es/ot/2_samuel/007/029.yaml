translation:
  language: es
  text: Y ahora, te ruego que te complazcas en bendecir la casa[a] de tu siervo, para que esté delante de ti para siempre. Porque tú, Señor Yahvé[b], has hablado, y por tu bendición será bendita la casa de tu siervo para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa» puede implicar también casa real, familia o linaje en este contexto davídico.
    reason: lexical_alternative
  - marker: b
    text: «Señor Yahvé» refleja el compuesto hebreo אֲדֹנָי יְהוִה; el texto no usa aquí la sustitución reverencial «SEÑOR».
    reason: source_note
lexical_decisions:
- source_word: הוֹאֵל
  english_pob_choice: please be pleased
  chosen_spanish: te ruego que te complazcas
  alternatives_spanish:
  - te ruego que quieras
  - te ruego que accedas
  - te ruego que seas propicio
  lexicon: HALOT
  rationale: El verbo expresa una petición de consentimiento benévolo; en español, «te ruego que te complazcas» conserva el tono suplicante y la idea de disposición favorable sin endurecerlo en un mandato.
- source_word: וּבָרֵךְ
  english_pob_choice: and bless
  chosen_spanish: bendecir
  alternatives_spanish:
  - y bendice
  - y bendiga
  lexicon: HALOT
  rationale: La forma hebrea es una imperativa dirigida a Dios en la oración. En español, el infinitivo dependiente de «te ruego» transmite la misma función oracional con naturalidad y sin perder el valor léxico de ברך.
- source_word: בֵּית עַבְדְּךָ
  english_pob_choice: the house of your servant
  chosen_spanish: la casa de tu siervo
  alternatives_spanish:
  - el hogar de tu siervo
  - la casa/linaje de tu siervo
  - la casa de tu esclavo
  lexicon: HALOT
  rationale: «Casa» preserva la imagen deliberadamente ambigua del hebreo, que puede abarcar casa, casa real, descendencia o linaje. «Siervo» aquí sigue el uso reverente y contextualizado de David ante Dios.
- source_word: לִהְיוֹת לְעוֹלָם לְפָנֶיךָ
  english_pob_choice: that it may be before you forever
  chosen_spanish: para que esté delante de ti para siempre
  alternatives_spanish:
  - para estar delante de ti para siempre
  - para que permanezca delante de ti para siempre
  lexicon: HALOT
  rationale: «Esté delante de ti» refleja de forma directa la expresión espacial/relacional del hebreo, sin convertirla en una explicación interpretativa como «sea establecido». «Para siempre» traduce adecuadamente עוֹלָם en contexto de pacto.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahveh
  - Señor Dios
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de representar יְהוָה como «Yahvé». En el compuesto אֲדֹנָי יְהוִה, «Señor Yahvé» preserva la combinación título-nombre sin sustituirla por un equivalente eclesiástico tradicional que ocultaría el nombre propio divino.
- source_word: דִּבַּרְתָּ
  english_pob_choice: have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - hablaste
  - has dicho
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con vigencia presente; en español, «has hablado» mantiene esa relevancia actual de la palabra divina en el fundamento de la petición.
- source_word: וּמִבִּרְכָתְךָ
  english_pob_choice: and by your blessing
  chosen_spanish: y con tu bendición
  alternatives_spanish:
  - y por tu bendición
  - y desde tu bendición
  lexicon: HALOT
  rationale: El מן puede tener fuerza de fuente o medio. «Con tu bendición» es una manera natural en español de expresar el resultado derivado de la bendición divina sin sonar forzado, y mantiene la relación causal de la frase.
- source_word: יְבֹרַךְ
  english_pob_choice: will be blessed
  chosen_spanish: será bendita
  alternatives_spanish:
  - será bendecido
  - quedará bendita
  lexicon: HALOT
  rationale: La voz pasiva imperfecta se vierte como futuro pasivo. Se eligió «bendita» para concordar con «la casa» y conservar el carácter declarativo de la línea.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia más natural y estable en español para el valor de permanencia de עוֹלָם en un marco de promesa pactal.
theological_decisions:
- issue: Cómo representar el nombre divino en el compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahveh
  rationale: La directriz del proyecto exige traducir יְהוָה como «Yahvé». En este compuesto, «Señor Yahvé» conserva tanto el título como el nombre propio divino, evitando la sustitución reverencial por «SEÑOR» y manteniendo visible el texto hebreo subyacente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si traducir explícitamente בֵּית como ‘dinastía’ o conservar ‘casa’
  english_pob_reading: the house of your servant
  chosen_spanish_reading: la casa de tu siervo
  alternative_spanish_readings:
  - la dinastía de tu siervo
  - la casa real de tu siervo
  - la familia de tu siervo
  rationale: El contexto davídico permite una lectura dinástica, pero el hebreo conserva la palabra ‘casa’. Mantenerla en español preserva la tensión literaria entre casa física, casa real y linaje, sin resolverla en una sola glosa interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del POB inglés, que prefirió «be pleased» sobre «be willing», y una formulación más literal de «be before you». En español, eso se reflejó con «te ruego que te complazcas» y «esté delante de ti», conservando el tono peticional y la cercanía semántica al hebreo sin añadir interpretación dinámica innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוִה conforme a la terminología base del proyecto.
  - Se usó «Señor» para אֲדֹנָי como título, evitando mezclarlo con el nombre divino.
  - «Casa» se conservó de forma consistente para בֵּית, con nota sobre su posible alcance dinástico.
  - «Siervo» mantiene el registro reverente coherente con el contexto de oración de David.
  - «Para siempre» se usó de manera uniforme para לְעוֹלָם.
