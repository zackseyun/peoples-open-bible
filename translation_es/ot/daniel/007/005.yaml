translation:
  language: es
  text: 'Y mira, otra bestia, la segunda, semejante a un oso; estaba levantada sobre un lado[b], y tres costillas[a] estaban en su boca, entre sus dientes. Y esto es lo que le estaban diciendo: «Levántate, come mucha carne».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «tres colmillos» en vez de «tres costillas», aunque «costillas» encaja mejor con la frase «entre sus dientes».
    reason: lexical_alternative
  - marker: b
    text: La frase «levantada sobre un lado» también puede entenderse como «levantada sobre un costado», lo que enfatiza la postura desigual de la bestia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרוּ
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y mira, pues
  - Y observa
  lexicon: HALOT
  rationale: El marcador arameo introduce una nueva escena de visión. «Mira» conserva el golpe deíctico y la viveza del original sin caer en un arcaísmo innecesario como «he aquí».
- source_word: חֵיוָה
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - criatura viviente
  lexicon: HALOT
  rationale: En Daniel 7 la figura es simbólica y ominosa; «bestia» comunica mejor ese valor visionario que una designación neutral como «animal».
- source_word: אָחֳרִי תִנְיָנָה
  english_pob_choice: another beast, a second one
  chosen_spanish: otra bestia, la segunda
  alternatives_spanish:
  - una segunda bestia
  - otra, segunda bestia
  lexicon: HALOT
  rationale: 'Se conservan ambos matices: sucesión («otra») y orden numeral («la segunda»).'
- source_word: דָּמְיָה לְדֹב
  english_pob_choice: resembling a bear
  chosen_spanish: semejante a un oso
  alternatives_spanish:
  - como un oso
  - parecida a un oso
  lexicon: HALOT
  rationale: El participio expresa semejanza. «Semejante a» es natural en español y mantiene el valor comparativo sin exagerarlo.
- source_word: וְלִשְׂטַר חַד הֳקִמַת
  english_pob_choice: it was raised up on one side
  chosen_spanish: estaba levantada de un lado
  alternatives_spanish:
  - estaba erguida de un lado
  - estaba levantada sobre un costado
  - estaba alzada de un lado
  lexicon: HALOT
  rationale: La expresión aramea apunta a una postura desigual/asimétrica. «De un lado» conserva la ambigüedad útil de «one side» sin fijar más de lo que el texto exige.
- source_word: וּתְלָת עִלְעִין
  english_pob_choice: three ribs
  chosen_spanish: tres costillas
  alternatives_spanish:
  - tres costillas de costado
  - tres huesos de costilla
  - tres costillas (o colmillos)
  lexicon: HALOT
  rationale: Se prefiere «costillas» por ser la opción más probable en este contexto, pero se evita cerrar el debate léxico más allá de la evidencia. La imagen de restos en la boca encaja bien con la escena.
- source_word: בְּפֻמַּהּ בֵּין שניּה
  english_pob_choice: were in its mouth between its teeth
  chosen_spanish: estaban en su boca, entre sus dientes
  alternatives_spanish:
  - estaban en su boca, entre los dientes
  - estaban en su boca, en medio de sus dientes
  lexicon: HALOT
  rationale: 'Se mantienen ambos complementos locativos: en la boca y entre los dientes. «Su boca» es el referente natural en español para la bestia.'
- source_word: וְכֵן אָמְרִין לַהּ
  english_pob_choice: And this is what they were saying to it
  chosen_spanish: Y esto es lo que le estaban diciendo
  alternatives_spanish:
  - Y así le decían
  - Y de esta manera le decían
  lexicon: HALOT
  rationale: El sujeto plural e indefinido se conserva con «le estaban diciendo», sin identificar indebidamente a los hablantes. «Esto es lo que» reproduce bien la función resumidora de וְכֵן en contexto.
- source_word: קוּמִי
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levantate
  - Alzate
  - Ponte de pie
  lexicon: HALOT
  rationale: Imperativo femenino dirigido a la bestia. «Levántate» es claro, solemne y fiel al mandato.
- source_word: אֲכֻלִי בְּשַׂר שַׂגִּיא
  english_pob_choice: eat much flesh
  chosen_spanish: come mucha carne
  alternatives_spanish:
  - devora mucha carne
  - come carne en gran cantidad
  - come abundante carne
  lexicon: HALOT
  rationale: «Carne» conserva el léxico concreto del hebreo/arameo y «mucha» refleja שַׂגִּיא sin intensificar más allá del verbo del texto; se evita añadir «devora» como interpretación no explícita.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo de Daniel 7:5 y el audit trail inglés POB. Se preservan la doble caracterización de la bestia («otra» / «la segunda»), la postura asimétrica («de un lado») y la imagen concreta de las costillas en la boca. No se introdujeron revisiones adicionales; el pasaje permanece en alto acuerdo con la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «bestia» para la figura simbólica de Daniel 7, en continuidad con la tradición de la serie y con la carga ominosa del contexto.
  - Se prefirió «mucha carne» en lugar de «gran cantidad de carne» para conservar la concisión y la fuerza imagética del arameo.
  - Se mantuvo un registro bíblico sobrio y actual, evitando arcaísmos innecesarios pero sin rebajar la solemnidad visionaria.
