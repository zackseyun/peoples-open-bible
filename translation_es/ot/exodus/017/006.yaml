review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y sigue de cerca las decisiones del POB inglés: la auto-presentación solemne, el valor futuro del participio עֹמֵד, la repetición de הַצּוּר, la secuencia mandato-resultado y el testimonio público ante los ancianos. Sin embargo, hay dos desviaciones léxicas relevantes frente al expediente auditado: «aguas» en vez de «agua» introduce un matiz no elegido por el POB inglés, y «lo hizo así» es menos idiomático que «hizo así» o «hizo tal como se le dijo». Además, «estaré de pie» suena algo pesado donde «estaré» preserva mejor la naturalidad española sin perder el sentido.'
  spanish_quality_summary: El español es comprensible y digno, pero mezcla cierta rigidez calca con elecciones menos naturales para una lectura bíblica fluida. «He aquí» es aceptable por solemnidad, aunque algo tradicional; «peña» es posible pero en este contexto «roca» resulta más claro y ampliamente legible. «En presencia de» funciona bien para לְעֵינֵי. La frase mejoraría notablemente con un ajuste a «agua» y con una formulación más natural de la primera cláusula.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La revisión propuesta mantiene el expediente inglés: participio con fuerza futura, «roca» como equivalente más transparente de צוּר, «agua» como equivalente directo de מַיִם según la decisión inglesa, y testimonio público «a la vista de / en presencia de» los ancianos. No se requieren notas teológicas adicionales.'
  issues:
  - severity: medium
    issue: «aguas» para מַיִם
    rationale: El expediente inglés eligió singular contable no marcado, «water». En español bíblico moderno «agua» es la opción más natural aquí; «aguas» añade un matiz de abundancia o estilo elevado que no es necesario y se aparta de la decisión auditada.
  - severity: medium
    issue: «estaré de pie» suena más pesado de lo necesario
    rationale: Aunque semánticamente correcto, «estaré» comunica mejor la presencia/posición en español en este contexto y se alinea más naturalmente con el valor futuro del participio documentado por el POB inglés. La nota conserva la alternativa presente.
  - severity: low
    issue: «peña» reduce legibilidad respecto de «roca»
    rationale: «Peña» es válido, pero «roca» es más transparente y ampliamente entendido en español neutro. Dado que el inglés auditado usa «rock» sin matiz especializado, «roca» sirve mejor a la claridad sin pérdida de sentido.
  - severity: low
    issue: «lo hizo así» es menos idiomático para וַיַּעַשׂ כֵּן
    rationale: En español suena algo forzado. «Moisés hizo así» preserva mejor la fórmula narrativa de cumplimiento y resulta más natural.
  revised_spanish_text: He aquí[a], yo estaré delante de ti allí, sobre la roca en Horeb; y golpearás la roca, y de ella saldrá agua, y el pueblo beberá. Y Moisés hizo así, en presencia de los ancianos de Israel.
  revised_footnotes:
