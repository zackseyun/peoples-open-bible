translation:
  language: es
  text: 'Baana hijo de Ahilud: Taanac y Meguidó, y toda Bet-seán, que está junto a Zaretán, debajo de Jezreel, desde Bet-seán hasta Abel-meholá, hasta más allá de Jocmeam[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta la región más allá de Jocmeam». La expresión hebrea del límite es breve y algo difícil, por lo que también admite una formulación geográfica más fluida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּֽעֲנָא֙ בֶּן אֲחִיל֔וּד
  english_pob_choice: Baana son of Ahilud
  chosen_spanish: Baana hijo de Ahilud
  alternatives_spanish:
  - Baaná hijo de Ahilud
  lexicon: nombres propios transliterados
  rationale: Se conserva el nombre propio en forma española sencilla y reconocible. 'hijo de' reproduce el parentesco sin añadir interpretación.
- source_word: תַּעְנַ֖ךְ
  english_pob_choice: Taanach
  chosen_spanish: Taanac
  alternatives_spanish:
  - Taanáq
  - Ta'anac
  lexicon: topónimo transliterado
  rationale: El hebreo refiere un lugar; en español bíblico es adecuado transliterarlo. 'Taanac' sigue una forma transparente y legible para lectores hispanos.
- source_word: וּ/מְגִדּ֑וֹ
  english_pob_choice: and Megiddo
  chosen_spanish: Meguidó
  alternatives_spanish:
  - Meguido
  - Megiddo
  lexicon: topónimo transliterado
  rationale: Se prefiere una forma española natural de transliteración. 'Meguidó' mantiene la identidad del lugar sin calcar la ortografía inglesa.
- source_word: וְ/כָל בֵּ֣ית שְׁאָ֡ן
  english_pob_choice: and all Beth-shean
  chosen_spanish: y toda Bet-seán
  alternatives_spanish:
  - y toda la región de Bet-seán
  - y todo Bet-seán
  lexicon: HALOT
  rationale: La expresión con 'todo' delante de un topónimo puede señalar el territorio o distrito asociado, no solo la ciudad. 'Toda Bet-seán' conserva ese alcance territorial sin expandir demasiado el texto.
- source_word: אֲשֶׁר֩ אֵ֨צֶל צָרְתַ֜נָ/ה
  english_pob_choice: which is beside Zarethan
  chosen_spanish: que está junto a Zaretán
  alternatives_spanish:
  - que está al lado de Zaretán
  - que está cerca de Zaretán
  lexicon: HALOT
  rationale: אֵצֶל indica proximidad espacial. 'Junto a' es una equivalencia natural en español y conserva la relación topográfica.
- source_word: מִ/תַּ֣חַת לְ/יִזְרְעֶ֗אל
  english_pob_choice: below Jezreel
  chosen_spanish: debajo de Jezreel
  alternatives_spanish:
  - bajo Jezreel
  - al sur de Jezreel
  lexicon: HALOT
  rationale: La imagen hebrea es topográfica; 'debajo de' reproduce mejor la relación espacial que una interpretación direccional más explícita.
- source_word: מִ/בֵּ֤ית שְׁאָן֙ עַ֚ד אָבֵ֣ל מְחוֹלָ֔ה
  english_pob_choice: from Beth-shean to Abel-meholah
  chosen_spanish: desde Bet-seán hasta Abel-meholá
  alternatives_spanish:
  - de Bet-seán hasta Abel-meholá
  - desde Bet-seán a Abel-meholá
  lexicon: topónimos transliterados
  rationale: La secuencia marca extensión territorial. 'Desde... hasta...' reproduce bien el límite geográfico y evita sobreparáfrasis.
- source_word: עַ֖ד מֵ/עֵ֥בֶר לְ/יָקְמֳעָֽם
  english_pob_choice: as far as beyond Jokmeam
  chosen_spanish: hasta más allá de Jocmeam
  alternatives_spanish:
  - hasta el otro lado de Jocmeam
  - hasta la región más allá de Jocmeam
  lexicon: HALOT
  rationale: מֵעֵבֶר expresa el lado opuesto o más allá de un punto de referencia. 'Más allá de' conserva la tersura en español y la dificultad sintáctica del hebreo sin resolverla interpretativamente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y coincide con la lectura auditada en inglés. Se preserva la dificultad de la fórmula final de límite territorial, reflejándola en español sin expandirla indebidamente; por eso se mantiene una nota alternativa. No se detectaron cambios editoriales posteriores en el pass más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable en este versículo, pues no aparece el Tetragrámaton.
  - Se usa 'hijo de' para el patronímico, un equivalente claro y no interpretativo.
  - Los topónimos se transliteran de forma consistente en español bíblico moderno.
  - '''Toda Bet-seán'' conserva el posible sentido administrativo/territorial de כָל con nombre de lugar.'
