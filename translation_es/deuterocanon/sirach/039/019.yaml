review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo y del paralelo griego: las obras/acciones de ''toda carne'' están ante Dios y nada queda oculto a su vista. Sin embargo, la segunda cláusula se aparta del valor léxico elegido en el English POB para אין נסתר (''nada está oculto'') al convertirlo en una construcción personal (''no hay quien pueda ocultarse''), que estrecha el referente desde ''nada'' hacia personas y desplaza el foco desde los hechos/realidad visible hacia agentes personales. Dado que el versículo habla de las obras de toda carne, conviene conservar la formulación impersonal y más amplia.'
  spanish_quality_summary: El español es claro y natural, y 'toda carne' está bien conservado como modismo bíblico. No obstante, 'de sus ojos' suena algo menos idiomático que 'de delante de sus ojos' o 'de su vista'. Además, la combinación 'no hay quien pueda ocultarse de sus ojos' introduce un giro correcto pero menos fiel al texto base y menos cohesionado con 'Las obras...'. Una leve revisión mejora la fidelidad y mantiene buena legibilidad.
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'toda carne' y no presenta conflictos con términos teológicos principales. La principal desalineación es no seguir la decisión auditada para אין נסתר como formulación impersonal amplia ('nada está oculto'), pese a que la nota puede conservar la explicitación griega de imposibilidad.
  issues:
  - severity: medium
    issue: La frase 'no hay quien pueda ocultarse' personaliza indebidamente אין נסתר.
    rationale: El hebreo dice literalmente que nada está oculto, y el English POB preserva esa amplitud. La redacción española actual cambia el sujeto implícito a personas ('quien'), lo que reduce el alcance semántico.
  - severity: low
    issue: '''de sus ojos'' es algo menos preciso que la imagen fuente.'
    rationale: El hebreo מנגד עיניו y el griego ἀπὸ τῶν ὀφθαλμῶν αὐτοῦ enfatizan la idea de estar fuera/delante de sus ojos. 'de su vista' o 'de delante de sus ojos' transmite mejor la imagen en español.
  revised_spanish_text: Las obras de toda carne están delante de él[a], y nada está oculto de su vista[b].
  revised_footnotes:
  - marker: a
    text: O "toda la humanidad" o "todo ser viviente" para "toda carne"; el modismo hebreo es amplio, y el paralelo griego también dice "toda carne".
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice: «y no es posible ocultarse de sus ojos», haciendo más explícita la imposibilidad que el hebreo.'
    reason: alternative_reading
  revision_rationale: Se revisa la segunda cláusula para conservar la amplitud impersonal de אין נסתר ('nada está oculto') y evitar una restricción innecesaria a personas. 'de su vista' ofrece un español más natural que mantiene el sentido de la imagen hebrea/griega sin sobrecargar la línea. Se conservan las notas esenciales del English POB.
