base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/019.yaml
  text: And all the vessels that King Ahaz cast aside during his reign in his unfaithfulness[a], we have prepared and consecrated; and behold[b], they are before the altar of Yahweh.
  footnotes:
