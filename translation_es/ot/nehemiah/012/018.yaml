lexical_decisions:
- source_word: לְ/בִלְגָּה
  english_pob_choice: for Bilgah
  chosen_spanish: para Bilgá
  alternatives_spanish:
  - de Bilgá
  - para Bilga
  lexicon: HALOT
  rationale: En esta lista genealógica o representativa, el לְ inicial señala pertenencia, asignación o relación dentro del grupo. En español, «para» reproduce mejor esa función relacional sin sonar demasiado poseída como «de». Se mantiene la transliteración del nombre propio con acento gráfico adaptado al español.
- source_word: שַׁמּוּעַ
  english_pob_choice: Shammua
  chosen_spanish: Shammúa
  alternatives_spanish:
  - Shammuá
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera en forma clara y natural para el español. Se usa acentuación gráfica para reflejar la pronunciación final abierta sin alterar la forma del nombre.
- source_word: לִֽ/שְׁמַעְיָה
  english_pob_choice: for Shemaiah
  chosen_spanish: para Semaías
  alternatives_spanish:
  - de Semaías
  - para Shemaia
  lexicon: HALOT
  rationale: Se conserva la función relacional del לְ mediante «para», como en la primera mitad del verso. «Semaías» es la transliteración española habitual y transparente de שְׁמַעְיָה.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jehonathan
  chosen_spanish: Jehonatán
  alternatives_spanish:
  - Jonathan
  lexicon: HALOT
  rationale: Se refleja la forma hebrea מלאה/fuller del nombre mediante «Jehonatán», en vez de reducirla a «Jonathan». La acentuación ayuda a la lectura en español y mantiene la cercanía al original.
translation_notes:
  revision_awareness: El testimonio de revisión indica que el texto base no requirió cambios y que hay alto acuerdo con el pasaje fuente. Por eso la propuesta se mantiene muy pegada al hebreo y a la solución auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «para» de manera consistente para el לְ relacional en ambas parejas de nombres.
  - Se transliteran todos los nombres propios en forma española, sin sustituirlos por equivalentes tradicionales no atestiguados por el auditor inglés.
  - No se introduce puntuación interpretativa adicional; la estructura reproduce el paralelismo breve del original.
