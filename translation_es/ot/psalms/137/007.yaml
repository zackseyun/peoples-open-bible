translation:
  language: es
  text: 'Recuerda[a], Yahvé, contra los hijos de Edom el día de Jerusalén, los que decían: «Déjala al descubierto, déjala al descubierto[b], hasta sus cimientos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acuérdate». El hebreo usa un imperativo dirigido a Yahvé en un contexto de lamento e imprecación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Déjenla al desnudo, déjenla al desnudo»; «Arrásenla, arrásenla»; «Rásenla, rásenla». El hebreo expresa la idea de dejar la ciudad completamente expuesta, con el sentido contextual de destruirla por completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo dirigido a Yahvé en un lamento/imprecación suena natural en español como «Acuérdate», que conserva el valor exhortativo sin volverlo demasiado formal o mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: לִבְנֵי אֱדוֹם
  english_pob_choice: against the sons of Edom
  chosen_spanish: de los hijos de Edom
  alternatives_spanish:
  - contra los hijos de Edom
  - de los edomitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a/para los hijos de Edom», y el contexto hostil permite el matiz adversativo en la lógica del versículo; en español se mantiene la expresión genealógico-étnica «hijos de Edom» por transparencia.
- source_word: אֵת יוֹם יְרוּשָׁלִָם
  english_pob_choice: the day of Jerusalem
  chosen_spanish: del día de Jerusalén
  alternatives_spanish:
  - del día en que Jerusalén cayó
  - del día de la calamidad de Jerusalén
  lexicon: HALOT
  rationale: Se conserva la forma breve del hebreo, que literalmente habla del «día de Jerusalén»; el sentido de calamidad queda implícito por el contexto sin añadir una explicación en el texto principal.
- source_word: הָאֹמְרִים
  english_pob_choice: those who were saying
  chosen_spanish: de los que decían
  alternatives_spanish:
  - los que decían
  - quienes decían
  lexicon: HALOT
  rationale: El participio se traduce como descripción en curso o habitual de los que hablaban así, sin convertirlo en un simple pasado puntual.
- source_word: עָרוּ עָרוּ
  english_pob_choice: Lay it bare, lay it bare
  chosen_spanish: Arrasadla, arrasadla
  alternatives_spanish:
  - Desnudadla, desnudadla
  - Rasadla, rasadla
  lexicon: HALOT
  rationale: La repetición imperativa expresa destrucción total. «Arrasar» comunica bien el efecto de devastación exigido por el contexto; se mantiene la repetición enfática.
- source_word: עַד הַיְסוֹד בָּהּ
  english_pob_choice: down to its foundation
  chosen_spanish: hasta sus cimientos
  alternatives_spanish:
  - hasta su fundamento
  - hasta la base de ella
  lexicon: HALOT
  rationale: «Hasta sus cimientos» es idiomático en español y conserva la idea de demolición completa hasta la base estructural.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios según la política del proyecto y la lectura auditada en inglés, evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Fuerza hostil de לִבְנֵי אֱדוֹם en contexto de imprecación
  english_pob_reading: against the sons of Edom
  chosen_spanish_reading: de los hijos de Edom
  alternative_spanish_readings:
  - contra los hijos de Edom
  - sobre los hijos de Edom
  rationale: Aunque la preposición puede tener valor adversativo en este contexto, en español la hostilidad queda suficientemente marcada por la estructura del versículo y por el contenido de la cita; se evita forzar una preposición que altere la simetría del sintagma.
  doctrine_reference: Contexto de imprecación en Salmos 137:7
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que prefirió un verbo más natural para עָרוּ («Lay it bare») frente a una opción más literal. En español se adoptó una solución igualmente natural y enfática («Arrasadla»), manteniendo la repetición y el valor devastador del hebreo. También se conservó la forma breve «el día de Jerusalén» sin expandirla en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva la estructura «hijos de Edom» para reflejar la expresión hebrea.
  - Se mantiene el paralelismo repetitivo del mandato enemigo con dos imperativos idénticos.
  - «Cimientos» comunica el nivel de destrucción total sin introducir una paráfrasis explicativa en el cuerpo del versículo.
