    issue: Calco poco natural en «Si haces por mí esta cosa»
    rationale: Aunque refleja formalmente הַדָּבָר הַזֶּה, en español bíblico-natural suena torpe. «Si haces esto por mí» preserva el demostrativo y el valor condicional sin añadir ni quitar sentido.
  - severity: medium
