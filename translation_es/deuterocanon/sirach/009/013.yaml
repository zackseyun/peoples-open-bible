translation:
  language: es
  text: Mantente lejos de un hombre que tiene autoridad para matar, y no tendrás que temer la muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado para este versículo dice una sentencia distinta: «No abandones a un amigo antiguo, porque uno nuevo no se comparará con él». La tradición griega es la que se sigue en el texto principal.'
