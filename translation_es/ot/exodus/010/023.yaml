    text: 'Hebreo literalmente: «un hombre no veía a su hermano». La expresión es recíproca: «no se veían unos a otros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los israelitas tenían luz en sus moradas».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final a «tenían luz» para reflejar mejor הָיָה אוֹר y el contraste contextual, y se mejora la naturalidad temporal con «durante tres días». Como se movió la nota alternativa sobre Israel a la cláusula final, se reancla como [b] sobre «luz» para mantener correspondencia exacta entre texto y notas.
