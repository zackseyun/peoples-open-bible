translation:
  language: es
  text: 'Y Judas envió hombres para reconocer el campamento, y le informaron, diciendo: «Todas las naciones que están alrededor de ustedes se han reunido contra ellos[a]: una fuerza muy grande».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «contra ellos». Se conserva esa redacción transmitida, aunque el contexto hace esperar una armonización como «contra ustedes» o una formulación equivalente.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: ἀποστέλλω en narrativa expresa el envío de personas para una misión concreta; «envió» es natural, formal y fiel al valor básico del verbo.
- source_word: κατασκοπῆσαι
  english_pob_choice: to spy out
  chosen_spanish: para reconocer
  alternatives_spanish:
  - para espiar
  - para explorar
  - para hacer reconocimiento
  lexicon: LSJ
  rationale: El infinitivo tiene sentido de reconocimiento militar. En español, «reconocer» comunica la acción de inspeccionar la posición enemiga sin la carga moderna de espionaje clandestino que «espiar» puede sugerir.
- source_word: τὴν παρεμβολήν
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - el real
  - el campamento del ejército
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa el campamento/encampment. «Campamento» es idiomático en español y conserva la referencia concreta.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: le informaron
  alternatives_spanish:
  - le reportaron
  - le dieron aviso
  - le anunciaron
  lexicon: BDAG
  rationale: El verbo indica llevar de vuelta un informe. «Le informaron» transmite bien el acto de comunicar noticias de reconocimiento en español actual.
- source_word: Ἐπισυνηγμένοι εἰσὶν
  english_pob_choice: have gathered together
  chosen_spanish: se han reunido
  alternatives_spanish:
  - están reunidas
  - han sido reunidas
  - se han congregado
  lexicon: BDAG
  rationale: La construcción perifrástica perfecta expresa un estado presente resultante de reunirse. «Se han reunido» conserva ese valor sin forzar un tecnicismo.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - hacia ellos
  - junto a ellos
  lexicon: BDAG
  rationale: En este marco militar, πρὸς con personas puede indicar hostilidad. Se mantiene el pronombre transmitido «ellos», siguiendo el texto griego sin armonizarlo con otra lectura.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: BDAG
  rationale: ἔθνη puede significar naciones, pueblos o gentiles. Aquí el sentido geopolítico es el más natural, por lo que «naciones» resulta la opción menos interpretativamente cargada.
- source_word: τὰ κύκλῳ ὑμῶν
  english_pob_choice: around you
  chosen_spanish: de alrededor de ustedes
  alternatives_spanish:
  - que están alrededor de ustedes
  - alrededor de ustedes
  - cerca de ustedes
  lexicon: LSJ
  rationale: La frase describe los pueblos circundantes. Se conserva el segundo plural del griego transmitido con «ustedes» y se expresa la relación espacial con «de alrededor».
- source_word: δύναμις πολλὴ σφόδρα
  english_pob_choice: a very great force
  chosen_spanish: una fuerza muy grande
  alternatives_spanish:
  - un ejército muy grande
  - una gran fuerza
  - una tropa numerosísima
  lexicon: BDAG
  rationale: En contexto militar, δύναμις apunta a fuerza efectiva o capacidad armada. «Una fuerza muy grande» es claro y mantiene el énfasis intensificado por σφόδρα.
theological_decisions:
- issue: Pronombre inesperado en el informe («contra ellos» con «alrededor de ustedes»)
  english_pob_reading: The translation preserves the transmitted wording rather than smoothing it to 'against you' or 'around us.'
  chosen_spanish_reading: 'Se conserva el contraste transmitido: «de alrededor de ustedes» / «contra ellos».'
  alternative_spanish_readings:
  - armonizar a «contra ustedes»
  - regularizar a «alrededor de nosotros»
  rationale: El griego presenta una combinación pronominal extraña en el contexto. La versión española mantiene esa tensión textual en lugar de normalizarla, para respetar el testimonio transmitido.
  doctrine_reference: Crítica textual y fidelidad al texto transmitido
translation_notes:
  revision_awareness: El pasaje inglés auditado mantiene sin cambios la lectura transmitida y anota la tensión pronominal del griego; la propuesta española sigue esa decisión, sin suavizarla, y adapta la frase militar a un español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ustedes» para reflejar el plural del griego transmitido en τὰ κύκλῳ ὑμῶν.
  - Se prefiere «campamento» y «fuerza» por su valor militar concreto en este contexto narrativo.
