lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros del clan de
  lexicon: HALOT
  rationale: En esta lista genealógica, el hebreo בְּנֵי puede señalar un grupo de descendientes o una unidad familiar/clánica, no solo hijos inmediatos. En español, «los hijos de» conserva la forma formal del listado y sigue siendo transparente para la lectura pública, sin cerrar el sentido a descendencia amplia.
- source_word: בַקְבּוּק
  english_pob_choice: Bakbuk
  chosen_spanish: Bakbuc
  alternatives_spanish:
  - Bakbuk
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta la consonante final a la ortografía española para una pronunciación más natural, manteniendo la referencia al mismo nombre hebreo.
- source_word: חֲקוּפָא
  english_pob_choice: Hakupha
  chosen_spanish: Hakufa
  alternatives_spanish:
  - Hakupha
  - Haqufa
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma «Hakufa» evita una secuencia gráfica poco natural en español y conserva de modo razonable el valor fonético del hebreo en una ortografía legible.
- source_word: חַרְחוּר
  english_pob_choice: Harhur
  chosen_spanish: Harhur
  alternatives_spanish:
  - Jarjur
  lexicon: HALOT
  rationale: Nombre propio transliterado sin intentar verter un supuesto significado léxico, porque el sentido del nombre no es pertinente en este contexto y no está asegurado por el pasaje.
