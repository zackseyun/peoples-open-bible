translation:
  language: es
  text: Di que me libres de la tierra[a], y que ya no escuche reproche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me dejes ir de la tierra» o «me quites de la tierra». La expresión griega es una súplica indirecta de ser apartado de la vida terrenal.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰπὸν
  english_pob_choice: Tell me
  chosen_spanish: Di que
  alternatives_spanish:
  - Dime que
  - Ordena que
  lexicon: LSJ
  rationale: El imperativo aoristo de λέγω aquí introduce la petición. En español, «Di que» conserva la fuerza imperativa sin volverla más dura de lo que exige el contexto; «Dime que» suena menos natural ante una subordinada de contenido, y «Ordena que» sobreinterpreta el matiz.
- source_word: ἀπολῦσαί
  english_pob_choice: to release
  chosen_spanish: me dejes ir
  alternatives_spanish:
  - me liberes
  - me pongas en libertad
  - me dejes libre
  lexicon: BDAG
  rationale: La infinitiva expresa el contenido de la súplica. «Me dejes ir» comunica la idea de soltura/liberación sin fijarla excesivamente como fórmula jurídica; «me liberes» y «me pongas en libertad» son posibles, pero en español resultan más marcadas o más abstractas.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del mundo
  - de la tierra esta vida
  lexicon: LSJ
  rationale: Se mantiene el sustantivo concreto «tierra» para preservar la cercanía al griego y la posible alusión indirecta a la vida terrena. «Del mundo» interpreta más de lo que dice el texto; «de la tierra esta vida» añade explicación no requerida.
- source_word: καὶ μὴ ἀκοῦσαί
  english_pob_choice: so that I may no longer hear
  chosen_spanish: y que ya no escuche
  alternatives_spanish:
  - y no escuche
  - para no escuchar más
  lexicon: BDAG
  rationale: El segundo infinitivo coordina la finalidad o resultado deseado. «Y que ya no escuche» conserva la fluidez y permite completar el objeto implícito en el siguiente término; «para no escuchar más» también es viable, pero la construcción con «que» refleja mejor la petición dependiente del primer imperativo.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: BDAG
  rationale: «Ya no» expresa con naturalidad la cesación desde este punto en adelante. «No más» suena menos solemne; «nunca más» intensifica indebidamente la negación temporal.
- source_word: ὀνειδισμόν
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - insulto
  - afrenta
  - deshonra
  lexicon: BDAG
  rationale: «Reproche» conserva el sentido de censura o vituperio verbal, que encaja con el contexto de lamento. «Insulto» estrecha el sentido a la ofensa directa; «afrenta» y «deshonra» desplazan el foco hacia la vergüenza como estado.
theological_decisions:
- issue: Petición indirecta de muerte / liberación de la vida terrena
  english_pob_reading: release me from the earth
  chosen_spanish_reading: me dejes ir de la tierra
  alternative_spanish_readings:
  - me libres de la tierra
  - me saques de la tierra
  - me quites de la tierra
  rationale: La frase griega ἀπολῦσαί με ἀπὸ τῆς γῆς funciona como una solicitud reverente e indirecta de ser soltado de la existencia terrenal. La versión española conserva esa ambigüedad sin explicitar «muerte», para no resolver lo que el texto mantiene velado.
  doctrine_reference: Preservar la tensión léxica y la ambigüedad reverente del original.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, incluyendo la nota que reconoce una expresión indirecta para pedir liberación de la vida terrenal. No se requirieron revisiones adicionales respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para γῆ, en consonancia con el texto griego y con la nota de ambigüedad.
  - Se prefirió «reproche» para ὀνειδισμός por ser más amplio y más cercano al lamento que «insulto».
  - La construcción «Di que me dejes ir» conserva el tono de súplica y la subordinación implícita del griego.
