translation:
  language: es
  text: 'Pero él respondió en la lengua de sus padres[a] y dijo: «No». Por tanto, también este recibió la siguiente tortura, como el primero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lengua ancestral» o «en su lengua materna». El griego alude literalmente al habla o lenguaje paterno/ancestral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona aquí como verbo de respuesta. «Respondió» es natural en español y conserva el valor de contestación directa sin cargar el registro.
- source_word: τῇ πατρίῳ φωνῇ
  english_pob_choice: in the language of his fathers
  chosen_spanish: en la lengua de sus padres
  alternatives_spanish:
  - en su lengua ancestral
  - en su lengua materna
  lexicon: LSJ
  rationale: La expresión griega alude a una lengua heredada/ancestral, no solo a la voz como sonido. «Lengua de sus padres» conserva el matiz familiar y de identidad transmitido por la POB en inglés.
- source_word: προσεῖπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - contestó
  - declaró
  lexicon: BDAG
  rationale: Introduce discurso directo de manera sencilla. «Dijo» es la equivalencia más idiomática y fiel en español.
- source_word: Οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - ¡No!
  - De ningún modo
  lexicon: BDAG
  rationale: Es una negativa breve y tajante. «No» reproduce la fuerza inmediata del diálogo sin añadir énfasis no explicitado.
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Marca consecuencia lógica de su negativa. «Por tanto» mantiene el valor inferencial con tono formal y claro.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: éste
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: El demostrativo apunta al hermano recién mencionado. «Éste» conserva la referencia demostrativa y la secuencia narrativa.
- source_word: τὴν ἑξῆς βάσανον
  english_pob_choice: the next torture
  chosen_spanish: el siguiente tormento
  alternatives_spanish:
  - la siguiente tortura
  - el próximo suplicio
  lexicon: BDAG
  rationale: βάσανος aquí se refiere al tormento/suplicio infligido bajo persecución. «Tormento» suena más natural y sobrio en español que una repetición excesivamente técnica de «tortura», sin perder la dureza del contexto.
- source_word: ὡς ὁ πρῶτος
  english_pob_choice: like the first
  chosen_spanish: como el primero
  alternatives_spanish:
  - igual que el primero
  - tal como el primero
  lexicon: BDAG
  rationale: La comparación remite al hermano anterior y a lo que sufrió. «Como el primero» es breve, fiel y claro en español.
theological_decisions:
- issue: τῇ πατρίῳ φωνῇ como marcador de identidad bajo persecución
  english_pob_reading: in the language of his fathers
  chosen_spanish_reading: en la lengua de sus padres
  alternative_spanish_readings:
  - en su lengua ancestral
  - en su lengua materna
  rationale: El texto no describe solo el medio lingüístico, sino una lealtad identitaria transmitida por los antepasados. La formulación elegida preserva ese peso histórico-familiar sin precisar indebidamente qué idioma concreto habló.
  doctrine_reference: Principio de primacía del texto original y de equivalencia óptima; identidad del pueblo en contexto de martirio
- issue: βάσανον en contexto de martirio
  english_pob_reading: the next torture
  chosen_spanish_reading: el siguiente tormento
  alternative_spanish_readings:
  - la siguiente tortura
  - el siguiente suplicio
  rationale: En este pasaje el término se refiere al castigo físico y al sufrimiento coercitivo. «Tormento» comunica la violencia del acto y evita un tecnicismo moderno que podría sonar menos bíblico o menos natural en español.
  doctrine_reference: Lectura contextual del léxico de sufrimiento en literatura de martirio
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se detectaron revisiones sustantivas posteriores. La versión española sigue de cerca la estructura del original, preservando la demostración («éste») y el valor inferencial de διόπερ.
  spanish_consistency_notes:
  - Se mantuvo «lengua de sus padres» para reflejar la dimensión ancestral señalada en el audit trail.
  - Se prefirió «tormento» por naturalidad en español, manteniendo el sentido de βάσανος en un contexto de martirio.
  - La puntuación de diálogo y la secuencia narrativa siguen el tono sobrio del texto fuente.
