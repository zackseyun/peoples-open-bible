  to: 'En aquel día se levantará contra ustedes una burla[a], y se lamentará una lamentación[b], diciendo: «¡Estamos totalmente arruinados! Él cambia la porción de mi pueblo. ¡Cómo me la quita! Al que se aparta[c] le reparte nuestros campos».'
  rationale: Se reemplaza 'parábola' por 'burla' para reflejar el valor contextual de מָשָׁל en un oráculo de juicio; se añade una nota en 'al que se aparta' para preservar la ambigüedad documentada de לְשׁוֹבֵב; y se mantiene el resto con ajustes mínimos para conservar fidelidad al hebreo y al audit trail inglés.
