    rationale: El inglés preserva una nota sobre la ambigüedad/idioma de וַיִּרְעוּ הָרֹעִים אוֹתָם («the shepherds pastured themselves»). En español, ese es el punto que más necesita nota por claridad exegética. La nota actual sobre «buscaron» introduce una ampliación interpretativa que no es la alternativa más importante del registro auditado.
