base_translation:
  language: en
  yaml_path: translation/ot/proverbs/017/009.yaml
  text: Whoever covers over an offense seeks love[c][b][a], but he who repeats a matter separates close friends.
  footnotes:
  - marker: a
    text: Or 'covers a transgression.' The Hebrew keeps the metaphor of covering rather than stating forgiveness explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or 'he who brings up a matter again' or 'he who repeats a matter.' The sense is revisiting an offense rather than letting it rest.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'separates an intimate friend' (singular); the English plural 'close friends' expresses the proverb's generic force more naturally.
    reason: lexical_alternative
