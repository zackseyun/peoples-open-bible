review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: κρίματα = «juicios», ἐν δικαιοσύνῃ mantiene la cadena nominal con «en justicia», y κατʼ ἄνδρα καὶ οἶκον se conserva formalmente con valor distributivo. También respeta la preferencia del proyecto por «Yahvé» para Κυρίου en referencia al Dios de Israel. Sin embargo, la redacción española presenta una frase poco natural y algo ambigua en «según cada hombre y casa», donde el segundo miembro queda sin el distributivo explícito que sí exige el sentido. Además, la nota c describe de forma confusa la alternativa.'
  spanish_quality_summary: 'El español es comprensible, pero «están en justicia» suena rígido; aun así puede mantenerse por fidelidad a la cadena léxica documentada. La mejora principal es hacer más claro y legible el tramo final: «según cada hombre y cada casa». También conviene corregir la nota a, donde «casa o casa-hogar» es torpe, y la nota c, que actualmente propone una alternativa mal formulada.'
  glossary_alignment: 'La terminología está mayormente alineada: «Yahvé», «juicios», «justicia», «hombre», «casa». No hay conflicto doctrinal relevante. La excepción es de estilo y claridad, no de glosario.'
  issues:
  - severity: medium
    issue: Falta de paralelismo distributivo explícito en «según cada hombre y casa».
    rationale: El griego κατʼ ἄνδρα καὶ οἶκον tiene sentido distributivo para ambos miembros, como reconoce la auditoría inglesa. En español, repetir «cada» en ambos términos evita ambigüedad y mejora la naturalidad sin apartarse del original.
  - severity: low
    issue: 'Nota a con redacción poco natural: «casa o casa-hogar».'
    rationale: «Casa-hogar» no es idiomático en español neutral. Es mejor explicar que «casa» puede extenderse a «hogar» o «familia/household» según el contexto.
  - severity: low
    issue: Nota c formula incorrectamente la alternativa.
    rationale: 'Dice «Otra posibilidad sería: “son en justicia”», pero esa no es una alternativa natural ni corresponde bien a la historia de revisión. La alternativa relevante es «son justos», que precisamente se rechazó para preservar el sustantivo δικαιοσύνη.'
  revised_spanish_text: Porque los juicios de Yahvé están en justicia, según cada hombre y cada casa[a][b][c].
  revised_footnotes:
