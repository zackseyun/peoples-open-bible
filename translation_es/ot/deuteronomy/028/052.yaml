translation:
  language: es
  text: Y te asediará[a] en todas tus puertas[b] hasta que caigan tus murallas altas y fortificadas, en las cuales confías, por toda tu tierra; y te asediará en todas tus puertas por toda la tierra que Yahvé tu Dios te ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Asediará” traduce el verbo en su fuerza militar: cercar, bloquear y poner bajo sitio, no solo ‘afligir’.'
    reason: lexical_alternative
  - marker: b
    text: “Puertas” conserva la imagen concreta del hebreo y, en el contexto, puede incluir por metonimia las ciudades enteras con sus accesos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵצַר
  english_pob_choice: he will besiege
  chosen_spanish: te asediará
  alternatives_spanish:
  - te oprimirá
  - te cercará
  - te angustiará
  lexicon: HALOT
  rationale: En el contexto militar de puertas y murallas, el sentido es de sitio/bloqueo militar, no de angustia general. ‘Asediará’ conserva la imagen concreta y el valor repetido del verbo en el versículo.
- source_word: שְׁעָרֶיךָ
  english_pob_choice: your gates
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus ciudades
  - tus portales
  lexicon: HALOT
  rationale: ‘Puertas’ mantiene la imagen concreta del asedio. En español bíblico ‘puertas’ funciona bien como metonimia de las ciudades amuralladas sin perder la literalidad básica.
- source_word: עַד רֶדֶת
  english_pob_choice: until ... come down
  chosen_spanish: hasta que caigan
  alternatives_spanish:
  - hasta que desciendan
  - hasta que se derriben
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘hasta el descender’ de las murallas. En español, ‘caigan’ comunica naturalmente el derrumbe sin borrar la imagen de descenso/colapso implícita en el verbo.
- source_word: חֹמֹתֶיךָ
  english_pob_choice: your ... walls
  chosen_spanish: tus murallas
  alternatives_spanish:
  - tus muros
  - tus murallas de la ciudad
  lexicon: HALOT
  rationale: ‘Murallas’ es más preciso que ‘muros’ para un contexto de defensa urbana y asedio. El plural y la fuerza fortificada quedan claros.
- source_word: הַגְּבֹהוֹת וְהַבְּצֻרוֹת
  english_pob_choice: high and fortified
  chosen_spanish: altas y fortificadas
  alternatives_spanish:
  - altas y amuralladas
  - elevadas y fortificadas
  lexicon: HALOT
  rationale: Se conservan ambos adjetivos. ‘Fortificadas’ expresa היטב el valor de בָּצוּר dentro del lenguaje de defensa militar.
- source_word: אֲשֶׁר אַתָּה בֹּטֵחַ בָּהֵן
  english_pob_choice: in which you trust
  chosen_spanish: en las cuales tú confías
  alternatives_spanish:
  - en las que confías
  - en las cuales te apoyas
  lexicon: HALOT
  rationale: ‘Confiar en’ reproduce el valor de בטח con ב. ‘En las cuales’ mantiene la referencia a las murallas/fortificaciones en español formal y claro.
- source_word: בְּכָל אַרְצֶךָ
  english_pob_choice: throughout all your land
  chosen_spanish: por toda tu tierra
  alternatives_spanish:
  - en toda tu tierra
  - a lo largo de toda tu tierra
  lexicon: HALOT
  rationale: ‘Por toda tu tierra’ comunica la distribución total del asedio mejor que una mera ubicación estática. ‘Tierra’ conserva el campo semántico territorial del hebreo.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֶיךָ לָךְ
  english_pob_choice: that Yahweh your God has given you
  chosen_spanish: que Yahvé tu Dios te ha dado
  alternatives_spanish:
  - que Yahvé tu Dios te dio
  - que te ha dado Yahvé tu Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino ‘Yahvé’ según el criterio del proyecto, y el perfecto ‘ha dado’ refleja el don ya concedido con vigencia presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’. Evita la sustitución por un título y conserva el nombre propio del pacto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura española ‘Yahvé’ preserva el nombre divino revelado a Israel, coherente con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene la lectura militar de וְהֵצַר como ‘besiege/asediar’, la conservación de ‘gates/puertas’, la imagen de las murallas que ‘come down/caigan’, la distribución total de בְּכָל אַרְצֶךָ como ‘por toda tu tierra’, y el uso de Yahvé para יְהוָה. La única adaptación principal es la naturalización española de ‘come down’ como ‘caigan’, sin perder el derrumbe implícito.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene el paralelismo de la repetición del asedio en la segunda mitad del versículo.
  - ‘Tierra’ se usa para אַרֶץ en un sentido territorial, no geológico.
  - Se evita ‘SEÑOR’ para no ocultar el nombre divino en el texto principal.
