translation:
  language: es
  text: 'Porque he dado a los levitas, como heredad, el diezmo de los hijos de Israel, que ellos presentan a Yahvé como ofrenda[a]; por eso les he dicho: «Entre los hijos de Israel no tendrán heredad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «como contribución»; tradicionalmente, «como ofrenda elevada». El término hebreo denota una porción apartada y presentada a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la relación explicativa del versículo anterior con una conjunción causal natural en español. 'Porque' conserva el valor de explicación/razón sin endurecer el flujo discursivo.
- source_word: מַעְשַׂר
  english_pob_choice: tithe
  chosen_spanish: diezmo
  alternatives_spanish:
  - tithe
  - décima parte
  lexicon: HALOT
  rationale: En español bíblico y eclesial, 'diezmo' es el equivalente preciso y comprensible para la porción del diez por ciento dedicada cultualmente. 'Décima parte' sería más analítico, pero menos natural aquí.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la expresión filial/covenantal del hebreo. 'Israelitas' sería idiomático, pero suaviza la forma מקור original; aquí la fórmula tradicional sigue siendo clara en español.
- source_word: יָרִימוּ
  english_pob_choice: offer
  chosen_spanish: presentan
  alternatives_spanish:
  - ofrecen
  - levantan / alzan
  lexicon: HALOT
  rationale: El hebreo usa el gesto cultual de elevar/presentar una contribución. Dado el giro del texto y la revisión inglesa hacia 'offer', 'presentan' transmite en español la acción sacrificial sin el calco duro 'levantan'.
- source_word: לַיהוָה
  english_pob_choice: to the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el Nombre divino: ''Yahvé''. En esta cláusula es el destinatario de la ofrenda; la preposición ''a'' naturaliza el español sin ocultar el Nombre.'
- source_word: תְּרוּמָה
  english_pob_choice: as a contribution
  chosen_spanish: como ofrenda
  alternatives_spanish:
  - como contribución
  - como ofrenda elevada
  lexicon: HALOT
  rationale: El término denota una porción apartada y presentada a Dios. En español, 'ofrenda' es claro y reverente; 'contribución' expresa bien la noción, pero suena menos cultual. No empleo 'ofrenda elevada' como forma fija porque sería demasiado técnica para este contexto.
- source_word: נָתַתִּי לַ/לְוִיִּם לְ/נַחֲלָה
  english_pob_choice: I have given to the Levites as an inheritance
  chosen_spanish: he dado a los levitas, como heredad
  alternatives_spanish:
  - he dado a los levitas como herencia
  - lo he dado a los levitas como heredad
  lexicon: HALOT
  rationale: Mantengo el valor legal de concesión y el término 'heredad', que en español bíblico comunica la posesión asignada por pacto. El orden permite que 'como heredad' funcione con naturalidad y refleje el estatuto legal del diezmo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Expresa la inferencia causal del texto con un español claro y solemne. 'Por tanto' sería más formal; 'por eso' mantiene mejor la fluidez del tono narrativo-legal.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: Among the children of Israel
  chosen_spanish: Entre los hijos de Israel
  alternatives_spanish:
  - En medio de los hijos de Israel
  - Entre los israelitas
  lexicon: HALOT
  rationale: '''Entre'' comunica adecuadamente el sentido de ubicación dentro del pueblo. ''En medio de'' es posible, pero más pesado; ''entre los israelitas'' perdería parte de la fórmula del hebreo.'
- source_word: לֹא יִנְחֲלוּ נַחֲלָה
  english_pob_choice: they shall have no inheritance
  chosen_spanish: no tendrán heredad
  alternatives_spanish:
  - no heredarán heredad
  - no recibirán heredad
  lexicon: HALOT
  rationale: Conservo 'heredad' para mantener la red de vocabulario del versículo y el contraste con la heredad dada a los levitas. 'Tendrán no heredad' sería torpe; 'recibirán' suaviza demasiado el verbo de exclusión legal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El proyecto establece 'Yahvé' como representación principal del Tetragrama. Mantengo esa decisión en lugar de la convención eclesiástica 'SEÑOR', porque el texto hebreo nombra explícitamente a Yahvé y no solo un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Naturaleza de תְּרוּמָה
  english_pob_reading: as a contribution
  chosen_spanish_reading: como ofrenda
  alternative_spanish_readings:
  - como contribución
  - como ofrenda elevada
  rationale: No reduzco el término a una simple donación general. 'Ofrenda' conserva el carácter cultual de algo apartado y presentado a Dios; la alternativa 'contribución' es válida, pero menos natural en español religioso.
  doctrine_reference: Lexical note on dedicated offerings and cultic presentation
- issue: Sentido legal de נַחֲלָה
  english_pob_reading: inheritance
  chosen_spanish_reading: heredad
  alternative_spanish_readings:
  - herencia
  - posesión
  rationale: '''Heredad'' mantiene mejor el trasfondo de asignación territorial/pactual y evita asociarlo de manera demasiado amplia con una mera posesión privada. Así se conserva la tensión legal del pasaje: el diezmo es su porción asignada, pero no tierra tribal.'
  doctrine_reference: Covenant allotment / land inheritance language
translation_notes:
  revision_awareness: La base inglesa revisó 'lift up' a 'offer' para naturalidad, manteniendo el gesto cultual de presentar la contribución. En español, esa decisión se refleja mejor con 'presentan ... como ofrenda' que con un calco de 'alzan'; además, se conservó la equivalencia auditada entre el regalo asignado a los levitas y su exclusión de una heredad territorial entre Israel.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología del proyecto para יהוה.
  - '''Heredad'' se mantiene de forma consistente para נַחֲלָה en esta cláusula legal.'
  - '''Los hijos de Israel'' conserva la fórmula covenantal del hebreo y coincide con el estilo del pasaje.'
  - La nota al pie marca la alternativa cultual de תְּרוּמָה sin introducir una glosa excesiva en el texto principal.
