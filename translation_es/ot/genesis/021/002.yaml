translation:
  language: es
  text: Así, Sara concibió y dio a luz un hijo a Abraham en su vejez[a], en el tiempo señalado[b] del que Dios le había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ya era de edad avanzada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el tiempo establecido sobre el cual Dios le había hablado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - se embarazó
  lexicon: HALOT
  rationale: הרה indica concebir/quedar encinta. «Concibió» es natural, sobrio y mantiene la secuencia narrativa sin añadir matices ajenos al hebreo.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - dio nacimiento a
  lexicon: HALOT
  rationale: יַלַד en este contexto narra el parto. «Dio a luz» es idiomático en español y preserva el evento de nacimiento sin endurecer el registro.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: El hebreo especifica un descendiente masculino. «Un hijo» es claro y natural en español; el contexto ya lo determina como varón.
- source_word: לִזְקֻנָיו
  english_pob_choice: in his old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - en su edad avanzada
  - cuando era ya viejo
  lexicon: HALOT
  rationale: La expresión señala circunstancia temporal de Abraham, no propósito. «En su vejez» conserva el sentido idiomático con buen flujo en español.
- source_word: לַמּוֹעֵד
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el tiempo fijado
  - a la hora establecida
  lexicon: HALOT
  rationale: מוֹעֵד expresa un tiempo determinado o fijado. «Tiempo señalado» mantiene la idea de un momento establecido de antemano por Dios.
- source_word: אֲשֶׁר דִּבֶּר אֹתוֹ אֱלֹהִים
  english_pob_choice: that God had spoken to him
  chosen_spanish: que Dios le había hablado
  alternatives_spanish:
  - de que Dios le había hablado
  - sobre el cual Dios le había hablado
  lexicon: HALOT
  rationale: El relativo se refiere al tiempo previamente anunciado por Dios. «Le había hablado» conserva la relación verbal y la referencia personal sin forzar la sintaxis española.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el hebreo usa el nombre común para Dios. «Dios» es la equivalencia directa y apropiada; no hay una cuestión de reemplazo del nombre divino en este versículo.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: narrative waw
  rationale: La waw narrativa enlaza con la promesa anterior. «Así» expresa la continuidad y el cumplimiento sin sonar demasiado coloquial.
theological_decisions:
- issue: Cómo rendir la relación entre el tiempo señalado y la palabra previa de Dios
  english_pob_reading: at the appointed time that God had spoken to him
  chosen_spanish_reading: en el tiempo señalado que Dios le había hablado
  alternative_spanish_readings:
  - en el tiempo señalado del que Dios le había hablado
  - en el tiempo establecido que Dios había anunciado
  rationale: El hebreo vincula el nacimiento con el momento previamente prometido por Dios. La redacción española conserva esa relación de cumplimiento y evita interpretar más allá de la sintaxis del texto.
  doctrine_reference: Fidelidad de Dios a su palabra; primacía del texto original.
translation_notes:
  revision_awareness: El inglés auditado pasó por ajustes menores en la cláusula final para clarificar que el tiempo señalado era el tema de lo que Dios había dicho. La versión española sigue esa solución natural con «que Dios le había hablado», manteniendo la relación de cumplimiento sin ambigüedad innecesaria.
  spanish_consistency_notes:
  - Se prefirió «Dios» sin notas adicionales, porque el versículo no usa YHWH ni presenta un caso de ocultación del nombre divino.
  - «Tiempo señalado» conserva el peso de מוֹעֵד como tiempo fijado/establecido, sin suavizarlo a una simple referencia temporal.
  - Se evitó «Cristo» u otra terminología confesional no presente en el hebreo.
  - La puntuación busca una cadencia narrativa fluida y fiel al orden del hebreo, pero natural en español.
