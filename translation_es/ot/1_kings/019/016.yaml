translation:
  language: es
  text: Y ungirás a Jehú hijo de Nimsí como rey sobre Israel, y a Eliseo hijo de Safat, de Abel-meholá, ungirás como profeta en tu lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘después de ti’ o ‘en vez de ti’; el hebreo puede expresar sucesión o reemplazo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשַׁח
  english_pob_choice: you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - deberás ungir
  - has de ungir
  lexicon: HALOT
  rationale: En este contexto de comisión profética, el verbo expresa una orden divina de investidura. 'Ungirás' conserva la forma directa, la fuerza imperativa y el registro bíblico sin volver el español antinatural.
- source_word: לְמֶלֶךְ
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - para rey
  - para ser rey
  lexicon: HALOT
  rationale: La preposición ל con cargo o función se vierte naturalmente en español como 'como' para indicar nombramiento a un oficio.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - encima de Israel
  lexicon: HALOT
  rationale: El hebreo usa עַל para autoridad real. 'Sobre Israel' comunica gobierno y dominio sin perder la imagen original.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma establecida en español bíblico para el nombre propio, que es plenamente reconocible y fiel a la identificación del personaje.
- source_word: מֵאָבֵל מְחוֹלָה
  english_pob_choice: from Abel-meholah
  chosen_spanish: de Abel-mehola
  alternatives_spanish:
  - de Abel-meholá
  - desde Abel-mehola
  lexicon: HALOT
  rationale: El מִן de origen/hogar se expresa en español con 'de'. Se conserva el topónimo transliterado de manera estándar y legible.
- source_word: לְנָבִיא
  english_pob_choice: as prophet
  chosen_spanish: como profeta
  alternatives_spanish:
  - para profeta
  - para ser profeta
  lexicon: HALOT
  rationale: El ל de función/oficio se vierte de modo idiomático como 'como'.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: in your place
  chosen_spanish: en tu lugar
  alternatives_spanish:
  - después de ti
  - en vez de ti
  lexicon: HALOT
  rationale: La expresión puede señalar sucesión o reemplazo. 'En tu lugar' preserva esa tensión en español sin cerrarla de forma excesiva, y es equivalente al valor que el POB inglés quiso mantener.
- source_word: וְאֵת ... וְאֶת
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Además ... y
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce; en español se mantiene la coordinación con 'y' para reflejar la estructura de las dos comisiones.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de la casa de
  lexicon: HALOT
  rationale: Se conserva la identificación patronímica de forma natural en español bíblico.
theological_decisions:
- issue: Relación entre Eliseo y Elías en תַּחְתֶּיךָ
  english_pob_reading: Elisha is appointed as Elijah's prophetic successor, rendered 'in your place.'
  chosen_spanish_reading: Eliseo es designado sucesor profético de Elías, sin cerrar del todo si el matiz principal es sucesión temporal o reemplazo funcional.
  alternative_spanish_readings:
  - Eliseo será profeta después de ti
  - Eliseo será profeta en vez de ti
  rationale: La frase hebrea admite una gama entre sucesión y sustitución. 'En tu lugar' preserva la tensión teológica y funcional que la versión inglesa documentó, sin sobreinterpretar el alcance exacto de la sustitución.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control cruzado informó alta concordancia y solo observaciones menores, por lo que no se requieren ajustes al sentido base.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo apunta explícitamente al nombre divino; este versículo no lo contiene.
  - Se prefiere 'como rey' y 'como profeta' para los cargos, siguiendo el valor funcional de ל.
  - Se mantiene 'en tu lugar' como solución que conserva la ambigüedad útil de תַּחְתֶּיךָ.
  - Se adopta 'Eliseo' como forma española estable del nombre propio, coherente con el registro bíblico en español.
