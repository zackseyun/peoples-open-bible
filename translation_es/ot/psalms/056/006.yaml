    issue: Ausencia de nota para la dificultad léxica de יְעַצֵּבוּ
    rationale: El inglés conserva una nota sobre la dificultad del verbo y la alternativa «distort». Sin embargo, como «tuercen» ya incorpora esa solución principal y el español no introduce ambigüedad nueva, la omisión no obliga a revisión.
