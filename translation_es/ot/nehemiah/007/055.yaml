lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En listas genealógicas y de clanes, בְּנֵי expresa pertenencia a una línea familiar. En español, «los hijos de» mantiene la estructura formal del original y sigue siendo natural en este tipo de registro. «Los descendientes de» explicita la relación genealógica, pero suaviza la forma hebrea.
- source_word: בַרְקוֹס
  english_pob_choice: Barkos
  chosen_spanish: Barkos
  alternatives_spanish:
  - Barcos
  lexicon: nombre propio
  rationale: Es un nombre propio de clan/familia; se translitera. Se conserva «Barkos» para reflejar la forma adoptada por la POB en inglés.
- source_word: סִֽיסְרָא
  english_pob_choice: Sisera
  chosen_spanish: Sísara
  alternatives_spanish:
  - Sisera
  lexicon: nombre propio
  rationale: Es un nombre propio; en español bíblico es más transparente la forma adaptada «Sísara». No cambia el referente, solo ajusta la ortografía y acentuación al español.
- source_word: תָֽמַח
  english_pob_choice: Temah
  chosen_spanish: Temah
  alternatives_spanish:
  - Tamah
  lexicon: nombre propio
  rationale: El hebreo permite una transliteración directa como «Temah». La alternativa «Tamah» queda reflejada en nota por la oscilación vocálica/tradicional documentada en la fuente inglesa.
theological_decisions:
- issue: Valor genealógico de «los hijos de» en una lista de clanes
  english_pob_reading: the sons of
  chosen_spanish_reading: los hijos de
  alternative_spanish_readings:
  - los descendientes de
  - las familias de
  rationale: 'No hay una afirmación doctrinal explícita, pero sí una decisión terminológica importante: mantener la forma genealógica compacta del hebreo sin reinterpretarla. Esto preserva el carácter de registro administrativo y la relación de pertenencia familiar.'
  doctrine_reference: Nehemías 7:55; listas de retorno y afiliación familiar en el postexilio
translation_notes:
  revision_awareness: El testimonio textual y la revisión auditada muestran alta concordancia y ningún cambio sustantivo; la única variación relevante en el aparato inglés es la alternativa de transliteración para Temah/Tamah, preservada en nota.
  spanish_consistency_notes:
  - Se mantiene el orden y la repetición de la fórmula hebrea «los hijos de» para conservar el paralelismo del listado.
  - Se adaptó «Sisera» a «Sísara» por claridad y pronunciación natural en español bíblico.
  - La nota conserva la alternativa inglesa documentada para Temah/Tamah sin ampliar el alcance del nombre.
