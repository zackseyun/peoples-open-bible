translation:
  language: es
  text: Y levantarás el tabernáculo conforme a su ordenanza[a], la cual te fue mostrada en el monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que viste en el monte». El texto principal expresa la idea de manera idiomática como «la cual te fue mostrada en el monte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקֵמֹתָ
  english_pob_choice: you shall set up
  chosen_spanish: levantarás
  alternatives_spanish:
  - erigirás
  - pondrás en pie
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer que algo quede en pie. En español, «levantar» transmite de forma natural la acción de montar o poner en su lugar una estructura sagrada, sin perder la idea de establecerla.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el término consagrado para el מִשְׁכָּן en Éxodo y conserva precisión referencial. «Morada» sería más general y menos exacto en este contexto técnico.
- source_word: כְּמִשְׁפָּטוֹ
  english_pob_choice: according to its ordinance
  chosen_spanish: conforme a su ordenanza
  alternatives_spanish:
  - según su orden
  - según su prescripción
  - de acuerdo con su norma
  lexicon: HALOT
  rationale: מִשְׁפָּט en un contexto de construcción/instalación puede referirse a una disposición prescrita, no solo a juicio o sentencia. «Ordenanza» conserva el matiz de norma establecida y encaja bien con el registro bíblico en español.
- source_word: אֲשֶׁר הָרְאֵיתָ
  english_pob_choice: which you were shown
  chosen_spanish: como te fue mostrado
  alternatives_spanish:
  - que viste
  - que te mostraron
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es activa («que viste»), el contexto de la revelación divina hace natural en español explicitar la pasiva implícita: lo que Moisés recibió por visión. Esto sigue la decisión auditada del POB inglés de clarificar el sentido sin alejarse del hebreo.'
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: «Monte» preserva el tono bíblico y el referente de Sinaí; «en» expresa bien el valor locativo del hebreo ב en este contexto.
theological_decisions:
- issue: La relación entre la forma hebrea activa «que viste» y la comprensión revelacional de «te fue mostrado»
  english_pob_reading: which you were shown
  chosen_spanish_reading: como te fue mostrado
  alternative_spanish_readings:
  - que viste
  - que te fue dado a ver
  rationale: La lectura inglesa del POB asume que Moisés vio porque Dios se lo mostró. En español, la pasiva refleja mejor esa mediación revelacional y evita que la frase suene meramente perceptiva o accidental.
  doctrine_reference: Revelación divina mediada a Moisés (cf. Éxodo 25–27)
- issue: El valor de כְּמִשְׁפָּטוֹ como norma prescrita de construcción
  english_pob_reading: according to its ordinance
  chosen_spanish_reading: conforme a su ordenanza
  alternative_spanish_readings:
  - según su patrón
  - según su prescripción
  rationale: No se debe reducir מִשְׁפָּט a una idea puramente abstracta de 'patrón' si el propio audit trail corrigió el inglés hacia 'ordinance'. «Ordenanza» mantiene la idea de disposición autorizada y normativa en una instrucción cultual.
  doctrine_reference: Instrucciones cultuales dadas por Yahvé para el santuario (Éxodo 25–26)
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se corrigió ''pattern'' a ''ordinance'' para reflejar más literalmente כמשפטו. La versión española sigue esa decisión con «ordenanza» en vez de «patrón». También se conserva la clarificación revelacional (''te fue mostrado'') adoptada en el texto inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la terminología del proyecto, aunque en este versículo no aparece explícitamente.
  - «Tabernáculo» se usa de manera consistente para מִשְׁכָּן dentro de Éxodo.
  - Se conserva el registro bíblico sobrio y no se sustituye «ordenanza» por un equivalente más moderno que diluya el matiz normativo.
  - La nota al pie marca la alternativa literal del hebreo sin romper la fluidez del texto principal.
