    text: O «hasta que fueron consumidos» / «hasta que llegaron a su fin» para la expresión «hasta ser destruidos».
    reason: lexical_alternative
  revision_rationale: Se corrigió «desierto» a «región desierta» para reflejar mejor מִדְבָּר en este contexto, se reemplazó «la hirió» por «la golpeó» para un español natural y fiel con objeto referido a la ciudad, y se movió el marcador de nota al lugar correcto junto a «hasta ser destruidos».
