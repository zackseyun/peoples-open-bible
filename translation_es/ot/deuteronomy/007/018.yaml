    issue: El marcador de nota [a] está anclado a la frase equivocada.
    rationale: La nota explica la construcción enfática hebrea זָכֹר תִּזְכֹּר ('recordar, recordarás'), pero en el borrador el marcador aparece en 'No temas[a]'. Debe ir junto a 'recuerda bien' o su equivalente.
  - severity: low
    issue: '''No temas a ellos'' es menos idiomático que ''No les temas''.'
    rationale: La redacción actual no es incorrecta, pero en español natural el objeto pronominal con 'temer' suele expresarse como 'No les temas'. Aun así, esto no exige rechazo; es una mejora estilística menor.
  revised_spanish_text: No les temas; recuerda bien[a] lo que Yahvé tu Dios hizo a Faraón y a todo Egipto.
