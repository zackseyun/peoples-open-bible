- from: Y vinieron a él todos los hombres sin ley[a] e impíos de Israel, y Alcimo los encabezaba, queriendo ejercer el sacerdocio.
  to: Y vinieron a él todos los hombres inicuos e impíos de Israel, y Alcimo los dirigió, queriendo ejercer el sacerdocio.[a]
  rationale: Se ajusta «sin ley» a «inicuos» para lograr un español más natural y eclesialmente legible sin perder la carga moral-legal de ἄνομοι. También se cambia «los encabezaba» a «los dirigió» para una narración más fluida y directa en español. La nota sobre ἱερατεύειν se conserva, pero se ancla correctamente en la frase correspondiente.
