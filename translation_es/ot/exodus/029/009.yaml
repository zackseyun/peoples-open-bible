translation:
  language: es
  text: Les ceñirás cintos a Aarón y a sus hijos, y les pondrás gorros. El sacerdocio será suyo por estatuto perpetuo. Así investirás[a] a Aarón y a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «llenarás la mano de Aarón y la mano de sus hijos», un modismo hebreo para instalarlos u ordenarlos en el servicio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָגַרְתָּ ... אַבְנֵט
  english_pob_choice: fasten sashes
  chosen_spanish: atarás ... el cinto
  alternatives_spanish:
  - ceñirás ... con el cinturón
  - ajustarás ... el cinto
  lexicon: HALOT
  rationale: חגר con אַבְנֵט expresa ceñir o ajustar una prenda de cintura, en contexto sacerdotal. En español, ‘atar’ conserva la acción de fijar la prenda, y ‘cinto’ suena más natural y digno que un calco rígido de ‘sash’, sin perder el matiz ritual.
- source_word: וּבָנָיו
  english_pob_choice: on Aaron and on his sons
  chosen_spanish: de Aarón y de sus hijos
  alternatives_spanish:
  - sobre Aarón y sobre sus hijos
  - para Aarón y para sus hijos
  lexicon: HALOT
  rationale: El hebreo repite la referencia para aclarar quiénes reciben la prenda. En español, ‘de Aarón y de sus hijos’ integra esa aclaración de manera natural dentro del sintagma nominal.
- source_word: וְחָבַשְׁתָּ ... מִגְבָּעֹת
  english_pob_choice: bind caps on them
  chosen_spanish: les pondrás gorros
  alternatives_spanish:
  - les ceñirás turbantes
  - les pondrás tocados
  lexicon: HALOT
  rationale: חבש aquí es poner o envolver sobre la cabeza; מִגְבָּעוֹת designa los cubrecabezas sacerdotales plurales. ‘Gorros’ comunica la idea de manera clara y sin arrastrar la terminología específica del sumo sacerdote, mientras conserva el sentido de una cobertura ritual de cabeza.
- source_word: וְהָיְתָה לָהֶם כְּהֻנָּה
  english_pob_choice: The priesthood shall be theirs
  chosen_spanish: El sacerdocio será de ellos
  alternatives_spanish:
  - El sacerdocio les pertenecerá
  - El sacerdocio será suyo
  lexicon: HALOT
  rationale: La frase expresa pertenencia/asignación del oficio sacerdotal. ‘Será de ellos’ reproduce de forma sobria y transparente la posesión implícita en el hebreo, y evita sobrecargar el texto con un verbo administrativo más interpretativo.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: por estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - por decreto perpetuo
  lexicon: HALOT
  rationale: חֻקָּה es estatuto u ordenanza fija, y עוֹלָם indica duración continua en el marco del pacto. ‘Estatuto perpetuo’ es una fórmula bíblica clara en español y comunica mejor el carácter normativo duradero que una paráfrasis moderna.
- source_word: וּמִלֵּאתָ יַד
  english_pob_choice: ordain
  chosen_spanish: investirás
  alternatives_spanish:
  - ordenarás
  - consagrarás
  lexicon: HALOT
  rationale: El idiomático ‘llenar la mano’ designa la instalación en el servicio sacerdotal. ‘Investirás’ comunica bien la ceremonia de instalación/encargo en español formal y conserva el acto de conferir un cargo; la literalidad se documenta en la nota.
theological_decisions:
- issue: Duración de la institución sacerdotal en לְחֻקַּת עוֹלָם
  english_pob_reading: as a permanent statute
  chosen_spanish_reading: por estatuto perpetuo
  alternative_spanish_readings:
  - como estatuto permanente
  - por decreto perpetuo
  rationale: La frase debe reflejar la obligatoriedad duradera de la institución dentro del marco pactual de Israel, sin forzar conclusiones ajenas al contexto inmediato. ‘Perpetuo’ mantiene la fuerza de permanencia legal-cultual que el inglés POB preservó con ‘permanent’.
  doctrine_reference: Translation philosophy §1, §6
- issue: El idiomático sacerdotal וּמִלֵּאתָ יַד
  english_pob_reading: ordain Aaron and his sons
  chosen_spanish_reading: investirás a Aarón y a sus hijos
  alternative_spanish_readings:
  - ordenarás a Aarón y a sus hijos
  - consagrarás a Aarón y a sus hijos
  rationale: El hebreo usa un modismo técnico para instalar en el oficio sacerdotal. ‘Investir’ comunica en español el acto formal de conferir la función sin perder del todo la dimensión ceremonial. La lectura más literal se preserva en la nota para mantener la transparencia del giro hebreo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El inglés POB revisó solo la frase de posesión, pasando de ‘shall belong to them’ a ‘shall be theirs’ para mayor naturalidad. La presente versión española sigue esa misma línea con ‘será de ellos’, manteniendo la claridad formal y el valor posesivo del hebreo. También se preserva la decisión auditada de traducir el idiomático וּמִלֵּאתָ יַד con un verbo de instalación sacerdotal, documentado en la nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - ‘Sacerdocio’ se usa para כְּהֻנָּה por ser el término natural y exacto en español bíblico formal.
  - ‘Estatuto perpetuo’ conserva la fuerza jurídico-cultual de לְחֻקַּת עוֹלָם sin expandirla innecesariamente.
  - Se evita ‘Cristo’ u otra terminología no pertinente al versículo.
  - La nota a documenta el modismo hebreo para mantener auditabilidad sin recargar el texto principal.
