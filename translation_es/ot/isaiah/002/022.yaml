translation:
  language: es
  text: Dejen de depender del hombre[a], cuyo aliento está en sus narices[b]; porque ¿qué valor tiene él?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dejen de considerar al hombre». El hebreo אָדָם es un singular representativo para los seres humanos, y la expresión puede referirse a dejar de poner la mirada o la confianza en la mera humanidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cuyo aliento está en su nariz». La expresión subraya la fragilidad humana y la dependencia de Dios para la vida.'
    reason: cultural_note
  - marker: c
    text: 'O: «¿de qué cuenta es él?». El hebreo pregunta por el valor o la estima que se le puede atribuir.'
    reason: alternative_reading
lexical_decisions:
- source_word: חִדְלוּ
  english_pob_choice: Stop / Stop regarding
  chosen_spanish: Dejen de considerar
  alternatives_spanish:
  - Cesen de considerar
  - Dejen de atender a
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural que pide cesar una actitud o dependencia. En español, «dejen de considerar» conserva la fuerza exhortativa y refleja mejor el matiz ampliado del POB inglés revisado, sin restringirlo solo a «confiar».
- source_word: לָכֶם
  english_pob_choice: (implicit address to the audience)
  chosen_spanish: (implícito en el imperativo)
  alternatives_spanish:
  - para ustedes
  - por ustedes
  lexicon: HALOT
  rationale: El dativo pronominal se integra naturalmente en el imperativo dirigido al plural, sin necesidad de una expresión separada en español.
- source_word: מִן הָאָדָם
  english_pob_choice: man / regarding man
  chosen_spanish: al hombre
  alternatives_spanish:
  - de parte del hombre
  - de la humanidad
  - en el hombre
  lexicon: HALOT
  rationale: La preposición con חדל marca el objeto del que se debe cesar. «Al hombre» funciona bien en español y mantiene el referente representativo singular de אָדָם, en línea con el criterio del POB de conservar la forma masculina genérica cuando corresponde.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם tiene valor representativo/colectivo, pero en singular masculino. «El hombre» preserva esa fuerza y evita diluir la imagen con una abstracción más interpretativa.
- source_word: אֲשֶׁר נְשָׁמָה בְּאַפּוֹ
  english_pob_choice: whose breath is in his nostrils
  chosen_spanish: cuyo aliento está en sus narices
  alternatives_spanish:
  - cuya respiración está en sus narices
  - cuyo soplo de vida está en sus narices
  lexicon: HALOT
  rationale: נְשָׁמָה es «aliento/soplo de vida», y אַף con sufijo apunta literalmente a «nariz/narices». «Aliento» y «narices» conservan la imagen concreta de fragilidad humana, sin volverla demasiado explicativa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» es natural y claro en español, y mantiene la relación causal sin añadir énfasis no presente.
- source_word: בַמֶּה
  english_pob_choice: of what account
  chosen_spanish: ¿de qué cuenta
  alternatives_spanish:
  - ¿qué valor tiene
  - ¿de qué estima
  lexicon: HALOT
  rationale: La construcción interrogativa con ב interrogativo pide una valoración. «¿De qué cuenta?» es una traducción sobria y bastante literal en español, cercana al POB inglés revisado.
- source_word: נֶחְשָׁב
  english_pob_choice: is he accounted / is he worth
  chosen_spanish: es él
  alternatives_spanish:
  - se le considera
  - es tenido por
  lexicon: HALOT
  rationale: El pasivo de חשב expresa ser contado o considerado. En la pregunta retórica española, «¿de qué cuenta es él?» mantiene el sentido de valoración sin sobreexplicarlo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - tal hombre
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo, correspondiente a אָדָם.
theological_decisions:
- issue: Sentido de la prohibición de חדל + מן
  english_pob_reading: A prohibition against relying on mere human beings
  chosen_spanish_reading: Una prohibición contra fijar la atención o la dependencia en el hombre
  alternative_spanish_readings:
  - Una prohibición de confiar en el hombre
  - Una orden de apartarse de la humanidad
  rationale: El contexto de Isaías contrasta la soberbia humana con la exaltación de Yahvé. El español «dejen de considerar al hombre» conserva el alcance amplio del POB revisado («regarding») y permite entender la exhortación como dejar de poner la mirada/dependencia en la mera humanidad, sin reducirla a mero alejamiento social.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Valor representativo de אָדָם
  english_pob_reading: man as a representative singular for human beings
  chosen_spanish_reading: el hombre como singular representativo de la humanidad
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: Se conserva el masculino singular del hebreo porque la figura retórica no habla de un individuo aislado, sino de la humanidad en general. Una nota ayuda a evitar que el lector lo entienda como exclusión del sentido colectivo.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
- issue: Imagen corporal de ‘narices’
  english_pob_reading: Literally 'whose breath is in his nose.' The expression emphasizes human frailty and dependence on God for life.
  chosen_spanish_reading: La imagen de «narices» se mantiene para preservar la fragilidad humana y la dependencia de Dios para la vida.
  alternative_spanish_readings:
  - su nariz
  - sus fosas nasales
  - su aliento está en él
  rationale: Aunque suena menos idiomático que una paráfrasis, la imagen corporal es parte de la fuerza profética. Mantenerla ayuda a no borrar la tensión lexical y teológica del texto.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Pregunta retórica final
  english_pob_reading: for of what account is he?
  chosen_spanish_reading: porque ¿de qué cuenta es él?
  alternative_spanish_readings:
  - porque ¿qué valor tiene?
  - porque ¿qué es él?
  rationale: La frase conserva el tono de valoración/estimación del hebreo y del POB inglés revisado. Se evita una traducción más libre que pudiera perder la idea de ser ‘contado’ o ‘considerado’.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que sustituyó «Stop trusting in man» por «Stop regarding man» y que ajustó la clausula final a la forma más formal «of what account is he?». La versión española sigue esa revisión, evitando introducir «confiar» en el texto principal y manteniendo una pregunta de valoración sobria.
  spanish_consistency_notes:
  - Se prefirió «aliento» para נְשָׁמָה y no «espíritu», porque aquí la imagen es corporal y concreta.
  - Se mantuvo «el hombre» por coherencia con la política de representar אָדָם como singular genérico cuando el contexto lo exige.
  - Se evitó «SEÑOR» y otros reemplazos no pedidos, ya que este versículo no contiene el tetragrámaton.
  - La puntuación y el uso de comillas/acentos siguen normas de español moderno y lectura eclesial clara.
