translation:
  language: es
  text: Busquen a Yahvé, todos los humildes[a] de la tierra,[b] los que han practicado su justicia; busquen rectitud,[c] busquen humildad; quizá serán escondidos[d] en el día de la ira de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mansos' o 'afligidos'.
    reason: lexical_alternative
  - marker: b
    text: O 'de la tierra' también puede entenderse 'del país'.
    reason: lexical_alternative
  - marker: c
    text: O 'justicia'.
    reason: lexical_alternative
  - marker: d
    text: O 'quizá sean escondidos', 'quizá sean ocultados' o 'quizá serán protegidos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּקְּשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busca / busquen
  alternatives_spanish:
  - busquen
  - busquen a
  - procuren
  lexicon: HALOT
  rationale: 'El hebreo usa un imperativo plural directo. En español conviene variar el verbo según el paralelismo: ''Busca'' al inicio mantiene el tono exhortativo, y ''busquen'' en la repetición conserva la fuerza retórica sin sonar forzado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito como 'Yahvé', siguiendo la convención proyectiva indicada, en lugar de sustituirlo por un título. Esto mantiene la transparencia respecto del Tetragrámaton.
- source_word: עַנְוֵי הָאָרֶץ
  english_pob_choice: you humble of the land
  chosen_spanish: los humildes de la tierra
  alternatives_spanish:
  - los humildes de la tierra
  - los mansos de la tierra
  - los afligidos de la tierra
  - los humildes de la tierra
  lexicon: HALOT
  rationale: עַנְוֵי expresa los humildes / mansos / abatidos. 'Humildes' encaja con el paralelismo con 'humildad' más adelante. 'De la tierra' se conserva porque el hebreo permite 'tierra' o 'país'; en español 'tierra' es natural y suficientemente amplio.
- source_word: אֲשֶׁר מִשְׁפָּטוֹ פָּעָלוּ
  english_pob_choice: who have carried out his justice
  chosen_spanish: los que han practicado su justicia
  alternatives_spanish:
  - los que han hecho su ordenanza
  - los que han ejecutado su juicio
  - los que han practicado su sentencia
  lexicon: HALOT
  rationale: פָּעָלוּ indica 'hacer, obrar, practicar'. 'Practicado' conserva ese valor activo. מִשְׁפָּט puede ser justicia, juicio u ordenanza; 'justicia' mantiene la tensión ética/jurídica sin endurecerla en una sola dirección.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  - lo recto
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'righteousness', en español 'rectitud' comunica mejor la cualidad moral sin repetir demasiado 'justicia' del miembro anterior. Se preserva así la distinción semántica posible entre מִשְׁפָּט y צֶדֶק.
- source_word: עֲנָוָה
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - mansedumbre
  - lowliness
  - meekness
  lexicon: HALOT
  rationale: El sustantivo designa humildad / mansedumbre / modestia. 'Humildad' es la opción más clara y natural en español y responde al paralelismo con 'los humildes' al comienzo del verso.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  - puede que
  lexicon: HALOT
  rationale: '''Quizá'' preserva la posibilidad sin volver la frase más pesada. Mantiene la contingencia marcada por el hebreo y por la lectura inglesa.'
- source_word: תִּסָּתְרוּ
  english_pob_choice: you will be hidden
  chosen_spanish: sean escondidos
  alternatives_spanish:
  - sean ocultados
  - serán escondidos
  - sean protegidos
  lexicon: HALOT
  rationale: El nifal de סתר significa ser escondido / ocultado. En español, la forma pasiva 'sean escondidos' comunica bien el resultado sin exigir una literalidad poco natural. Se evita 'protegidos' porque introduce una interpretación no explicitada por el verbo.
- source_word: בְּיוֹם אַף יְהוָה
  english_pob_choice: in the day of Yahweh’s anger
  chosen_spanish: en el día de la ira de Yahvé
  alternatives_spanish:
  - en el día de la ira de Yahvé
  - el día de la ira de Yahvé
  - en el día del enojo de Yahvé
  lexicon: HALOT
  rationale: אַף aquí expresa ira / furor. 'Ira' es la equivalencia más estable y solemne en español bíblico, y 'de Yahvé' conserva el nombre divino explícito.
theological_decisions:
- issue: Alcance de la protección prometida al remanente humilde
  english_pob_reading: 'The verse expresses possibility, not certainty: ''perhaps you will be hidden.'''
  chosen_spanish_reading: 'El verso expresa posibilidad, no certeza: ''quizá sean escondidos.'''
  alternative_spanish_readings:
  - quizá serán escondidos
  - tal vez serán protegidos
  rationale: La partícula אוּלַי marca contingencia. La traducción española mantiene esa tensión y no convierte la expresión en una garantía absoluta de escape.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el contexto de revisión más reciente, que no introdujo cambios y fue confirmado con alta concordancia; por ello no se alteró la lectura central. La solución española sigue de cerca el audit trail inglés: preserva el nombre divino, mantiene la ambigüedad de מִשְׁפָּט y צֶדֶק, y conserva la contingencia de אוּלַי.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, coherente con el proyecto.
  - Se mantiene la distinción entre 'justicia' (מִשְׁפָּט) y 'rectitud' (צֶדֶק) en el texto principal, con nota alternativa para 'justicia'.
  - Se usa 'humildes' / 'humildad' para עַנְוֵי / עֲנָוָה, preservando el paralelismo.
  - Se traduce תִּסָּתְרוּ con una pasiva refleja natural en español, sin perder el sentido de ocultamiento.
  - Se conserva el valor condicional de אוּלַי con 'quizá'.
