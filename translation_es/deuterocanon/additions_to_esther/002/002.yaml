    issue: «reclinados a la mesa» es poco idiomático en español
    rationale: Aunque intenta preservar la imagen del griego ἐκωθωνίζοντο, la expresión suena forzada. Una formulación como «estaban reclinados a la mesa de banquete» mantiene la postura formal de comida y mejora la legibilidad.
