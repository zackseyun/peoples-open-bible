translation:
  language: es
  text: Hazles como a Madián[a], como a Sísara, como a Jabín, junto al arroyo Quisón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Hazles como Madián, como Sísara, como Jabín». El hebreo es elíptico; la comparación no repite un verbo expreso en cada miembro.'
    reason: alternative_reading
  - marker: b
    text: Cf. Jueces 4:7, 13; 5:21, donde Sísara y Jabín son derrotados junto al Quisón.
    reason: cross_reference
lexical_decisions:
- source_word: עֲשֵׂה
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - Trata
  - Actúa
  lexicon: HALOT
  rationale: El imperativo de עשה aquí pide una acción divina concreta contra los enemigos. En español, «Haz» conserva la fuerza directa del mandato sin añadir explicación interpretativa.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: El pronombre dativo en español reproduce bien la relación de destino del verbo. «Contra ellos» sería más explícito, pero añade una orientación no expresada de forma directa por la partícula.
- source_word: כְּמִדְיָן
  english_pob_choice: as to Midian
  chosen_spanish: como a Madián
  alternatives_spanish:
  - como Madián
  - como con Madián
  lexicon: HALOT
  rationale: El כ comparativo se refleja de modo natural con «como a». Se conserva el nombre propio Madián, transliterado para el grupo/pueblo.
- source_word: כְּסִיסְרָא
  english_pob_choice: as to Sisera
  chosen_spanish: como a Sísara
  alternatives_spanish:
  - como Sísara
  - como con Sísara
  lexicon: HALOT
  rationale: Se mantiene la comparación paralela y el nombre propio en transliteración española estándar.
- source_word: כְיָבִין
  english_pob_choice: as to Jabin
  chosen_spanish: como a Jabín
  alternatives_spanish:
  - como Jabín
  - como con Jabín
  lexicon: HALOT
  rationale: Se conserva el paralelismo sintáctico y el nombre propio en forma transliterada, adaptada a ortografía española.
- source_word: בְּנַחַל קִישׁוֹן
  english_pob_choice: at the Kishon Brook
  chosen_spanish: en el arroyo Quisón
  alternatives_spanish:
  - junto al arroyo Quisón
  - en el torrente Quisón
  - en el wadi Quisón
  lexicon: HALOT
  rationale: נחל puede designar un cauce estacional, arroyo o torrente. «Arroyo» comunica bien en español general sin perder la idea de un cauce natural asociado al lugar histórico; «Quisón» respeta el nombre propio del curso de agua.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: conserva el imperativo breve, el paralelo comparativo repetido con כ, y el complemento locativo final. Se evita introducir un verbo suplementario como «hiciste» o «hiciste a» que no está explícito en el texto fuente, aunque la comparación remite claramente a una acción previa de juicio divino.'
  spanish_consistency_notes:
  - Se usa «Madián» con tilde final conforme a adaptación española habitual de topónimos bíblicos.
  - Se mantiene el orden de los tres paralelos («Madián», «Sísara», «Jabín») para reflejar la estructura hebrea.
  - «Arroyo» se emplea como equivalente amplio y lector-friendly de נחל, sin forzar una traducción técnica uniforme en toda la obra.
