translation:
  language: es
  text: Los condujo con seguridad, y no tuvieron miedo; y el mar[a] cubrió a sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el mar»; el versículo alude al paso de Israel en el éxodo. Posibles ampliaciones interpretativas incluyen «el mar Rojo» o «el mar de Juncos», pero el texto hebreo aquí no es más específico.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּנְחֵם
  english_pob_choice: He led them
  chosen_spanish: Él los condujo
  alternatives_spanish:
  - Él los guió
  - Él los condujo
  lexicon: HALOT
  rationale: נחה en forma causativa expresa conducir o guiar a un grupo. «Condujo» conserva la imagen concreta del movimiento dirigido y suena natural en español bíblico moderno.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en seguridad
  lexicon: HALOT
  rationale: El valor adverbial de לָבֶטַח es de seguridad o protección. «Con seguridad» comunica bien la manera del acto sin sonar forzado en español.
- source_word: וְלֹא פָחָדוּ
  english_pob_choice: and they were not afraid
  chosen_spanish: y no tuvieron miedo
  alternatives_spanish:
  - y no temieron
  - y no estuvieron atemorizados
  lexicon: HALOT
  rationale: פחד significa temer o tener miedo. «No tuvieron miedo» es claro, natural y conserva la negación simple del hebreo coordinado.
- source_word: אוֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a sus enemigos
  - a sus adversarios
  lexicon: HALOT
  rationale: אויב designa enemigos en sentido directo. Se mantiene el posesivo y el objeto directo marcado con «a» por la sintaxis natural del español con personas.
- source_word: כִּסָּה
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - cubrió
  - envolvió
  lexicon: HALOT
  rationale: כסה significa cubrir. «Cubrió» preserva la imagen concreta y evita intensificar el verbo más allá de lo que el hebreo afirma.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el mar Rojo
  - el mar de Juncos
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el mar» con artículo definido. En español, «mar» transmite con naturalidad la referencia histórica sin añadir una especificación que el texto no da.
theological_decisions:
- issue: Alusión al cruce del éxodo sin nombrar específicamente el mar
  english_pob_reading: Retain the generic expression 'the sea' rather than specifying 'the Red Sea' in the main text.
  chosen_spanish_reading: Conservar «el mar» en el cuerpo del texto, con nota sobre la alusión al éxodo.
  alternative_spanish_readings:
  - el mar Rojo
  - el mar de Juncos
  rationale: El texto hebreo no precisa un nombre propio; la referencia histórica se entiende por el contexto, pero no debe introducirse en la línea principal una identificación no expresada explícitamente.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantiene la coordinación simple de las cláusulas («y ... y ... y ...») en lugar de introducir una relación de consecuencia o contraste, y se conserva el sentido concreto de «covered» como «cubrió».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o «Yahvé» porque el hebreo aquí no contiene el nombre divino explícito en este versículo.
  - «Mar» se usa como equivalente neutral de הַיָּם, sin ampliar a «mar Rojo» en el texto principal.
  - La puntuación refleja la coordinación hebrea sencilla y la cadencia poética del salmo.
