translation:
  language: es
  text: Su alma[a] no se aterrorizará[c] en el cruce de ríos y en la agitación de los mares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida» o «su propio ser» para «su alma».
    reason: lexical_alternative
  - marker: b
    text: O «el oleaje de los mares» para «la agitación de los mares».
    reason: lexical_alternative
  - marker: c
    text: O «no tendrá miedo».
    reason: previous_rendering
lexical_decisions:
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - sí mismo
  lexicon: BDAG
  rationale: En este contexto poético, ψυχή apunta a la persona interior o la vida animada. «Alma» conserva el registro elevado de «soul» en inglés y es natural en español bíblico, sin reducir la idea a «vida» ni volverla demasiado abstracta con «sí mismo».
- source_word: διάβασις
  english_pob_choice: crossing
  chosen_spanish: cruzar
  alternatives_spanish:
  - paso
  - vado
  - travesía
  lexicon: LSJ
  rationale: El sustantivo expresa la acción o el lugar de cruzar. En español, «al cruzar» comunica con claridad la situación peligrosa de atravesar ríos y evita una construcción más técnica o menos fluida como «en el paso de los ríos».
- source_word: σάλος
  english_pob_choice: tossing
  chosen_spanish: tumulto
  alternatives_spanish:
  - oleaje
  - agitación
  - embate
  lexicon: LSJ
  rationale: σάλος describe un movimiento agitado, de mar revuelto. «Tumulto» conserva la idea de agitación intensa y funciona bien junto con «los mares»; otras opciones como «oleaje» o «embate» serían más interpretativas o más específicas del agua.
- source_word: πτοηθήσεται
  english_pob_choice: will not be terrified
  chosen_spanish: no será aterrada
  alternatives_spanish:
  - no tendrá miedo
  - no será amedrentada
  - no se espantará
  lexicon: LSJ
  rationale: El verbo πτοέω lleva la fuerza de quedar aterrado, alarmado o desanimado, más fuerte que un simple «tener miedo». «No será aterrada» preserva esa intensidad y sigue el pasivo futuro del griego; en español suena algo literario, pero fiel al tono del texto.
translation_notes:
  revision_awareness: Se refleja la revisión que elevó πτοηθήσεται de una simple ausencia de miedo a «terrified/terrified»; por eso la traducción principal usa un verbo pasivo fuerte («ser aterrada») y no una formulación suavizada. También se conservó la imagen poética de ríos y mares sin explicitarla más allá del griego.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y moderno, evitando calcos excesivamente duros.
  - «Mares» se deja en plural como en el griego; «tumulto» intenta preservar la agitación sin reemplazar la imagen marítima.
  - Las alternativas de nota mantienen opciones semánticas reales sin introducir interpretaciones doctrinales.
