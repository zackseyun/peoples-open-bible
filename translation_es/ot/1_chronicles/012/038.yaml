translation:
  language: es
  text: Y del otro lado del Jordán[a], de los rubenitas, de los gaditas y de la media tribu de Manasés, con todo tipo de pertrechos de guerra, ciento veinte mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «desde la otra parte del Jordán». La expresión hebrea puede traducirse, según el punto de vista geográfico, como «desde el otro lado del Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: And from beyond the Jordan
  chosen_spanish: Y desde más allá del Jordán
  alternatives_spanish:
  - Y desde al otro lado del Jordán
  - Y desde la otra orilla del Jordán
  lexicon: HALOT
  rationale: מֵעֵבֶר expresa la ubicación en la región al otro lado del río según el punto de vista del hablante. 'Más allá del Jordán' conserva la expresión geográfica breve y natural, mientras mantiene abierta la perspectiva relativa que el inglés POB anotó.
- source_word: הָראוּבֵנִי וְהַגָּדִי
  english_pob_choice: the Reubenites, the Gadites
  chosen_spanish: los rubenitas, los gaditas
  alternatives_spanish:
  - los de Rubén y los de Gad
  - la tribu de Rubén y la tribu de Gad
  lexicon: HALOT
  rationale: Los gentilicios hebreos funcionan colectivamente para los grupos tribales. En español, el plural étnico 'rubenitas' y 'gaditas' comunica de manera natural esa referencia colectiva sin perder la conexión con Rubén y Gad.
- source_word: וַחֲצִי שֵׁבֶט מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - la media tribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' reproduce la estructura idiomática tradicional del hebreo y conserva la unidad tribal dividida. ''Manasés'' es la forma usual y clara en español para el nombre propio.'
- source_word: בְּכֹל כְּלֵי צְבָא מִלְחָמָה
  english_pob_choice: with every kind of military equipment for war
  chosen_spanish: con todo tipo de pertrechos de guerra
  alternatives_spanish:
  - con toda clase de equipo militar
  - con toda clase de armas de guerra
  - plenamente equipados para la batalla
  lexicon: HALOT
  rationale: כְּלֵי nombra instrumentos o implementos, y en contexto militar se refiere de manera amplia a pertrechos, no solo a armas. 'Pertenchos de guerra' preserva esa amplitud concreta; 'todo tipo de' refleja בְּכֹל como 'every kind of'.
- source_word: מֵאָה וְעֶשְׂרִים אָלֶף
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - cien y veinte mil
  - ciento veinte mil
  lexicon: HALOT
  rationale: Es un cardinal directo. 'Ciento veinte mil' es la forma natural y precisa en español contemporáneo y mantiene el valor numérico sin añadir elementos interpretativos.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditable POB inglés, sin cambios revisionales reportados; se conserva la misma decisión geográfica principal con nota alternativa equivalente en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Manasés'' se usa como forma bíblica asentada y reconocible en español.'
  - '''Pertenchos de guerra'' evita limitar indebidamente כְּלֵי a ''armas'' solamente.'
  - El orden de los complementos conserva el paralelismo de procedencia tribal del hebreo.
