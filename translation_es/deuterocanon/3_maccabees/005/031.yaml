  to: Todos los padres que estaban presentes, y los hijos[a] con ellos, han preparado este abundante banquete para las fieras salvajes, en lugar de los judíos, que me han demostrado a mí y a mis antepasados tener una fidelidad completa y firme, sin reproche[b].
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al término que explica; se reemplaza el calco «han sido mostrados a mí» por una construcción idiomática y fiel en español («me han demostrado... tener»); y se ajusta «niños» a «hijos» para reflejar mejor la amplitud del griego según la auditoría inglesa, manteniendo la alternativa en nota. El resto del sentido y las decisiones léxicas principales se conservan.
