review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro inglés: mantiene la secuencia de maldición, el sentido agrícola de «plantar» y «cultivar», la negación de beber el vino y de recoger/asegurar la cosecha, y la causa final de que un gusano la coma. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica documentada, porque repite la misma opción ya usada en el texto en vez de reflejar la alternativa «almacenarlo / guardarlo».'
  spanish_quality_summary: El español principal es claro, natural y digno. «Viñas» y «las cultivarás» son buenas elecciones. «Ni lo recogerás» suena bien en contexto de cosecha. La única reparación necesaria es la nota, para que no sea redundante y corresponda al motivo léxico real. También conviene pulir ligeramente la redacción de la nota para mejor estilo español.
  glossary_alignment: 'No hay términos del glosario doctrinal principal implicados aquí. Las decisiones léxicas agrícolas son adecuadas: כְּרָמִים -> «viñas», וְעָבָדְתָּ -> «las cultivarás», הַתּוֹלָעַת -> «el gusano». La excepción relevante está en la nota de אגר, donde debe preservarse la alternativa «almacenar / guardar» en vez de duplicar «recoger».'
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de dar una alternativa real.
    rationale: El texto principal ya dice «ni lo recogerás», pero la nota dice «O «lo recogerás»». Según el rastro inglés, la nota debe preservar una alternativa como «almacenarlo» o «guardarlo», no reiterar la opción principal.
  revised_spanish_text: Plantarás viñas y las cultivarás[a], pero no beberás el vino ni lo recogerás, porque lo comerá el gusano.
  revised_footnotes:
  - marker: a
    text: O «lo almacenarás» o «lo guardarás». El verbo hebreo puede significar reunir, recoger o almacenar.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que refleje una alternativa léxica genuina del verbo אגר, en línea con la documentación inglesa, en vez de repetir la traducción principal.
