  verdict: revise
  source_alignment_summary: El borrador sigue de cerca el griego y el rastro POB en la secuencia verbal, la referencia a 'los tres', la ubicación 'en el horno' y la introducción 'diciendo'. También preserva correctamente la nota sobre ὡς ἐξ ἑνὸς στόματος. Sin embargo, 'como con una sola boca' suena poco idiomático en español y además no refleja con precisión la preposición implícita en la alternativa literal documentada ('como de una sola boca').
  spanish_quality_summary: La redacción es mayormente clara y digna, pero la cadena 'como con una sola boca' resulta áspera y poco natural para lectura pública. 'Estaban cantando himnos' es comprensible, aunque algo perifrástico; no exige cambio. El ajuste principal es volver la imagen griega más fiel y legible en español.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ''Dios'' y ''horno'' son adecuados; no aparecen términos sensibles como Yahvé/Mesías. La distinción entre ''glorificando'' y ''bendiciendo'' se mantiene correctamente.'
  issues:
  - severity: medium
    issue: 'Frase poco idiomática y ligeramente imprecisa: ''como con una sola boca'''
    rationale: El griego ὡς ἐξ ἑνὸς στόματος significa literalmente 'como de una sola boca / como si fuera de una sola boca'. La forma 'como con' debilita la imagen de procedencia y suena menos natural en español. Dado que la nota ya explica la alternativa 'con una sola voz', conviene ajustar el texto principal a 'como de una sola boca'.
  revised_spanish_text: 'Entonces los tres[a], como de una sola boca, estaban cantando himnos y glorificando y bendiciendo a Dios en el horno, diciendo:'
  revised_footnotes:
  - marker: a
    text: 'O: «con una sola voz». El griego dice literalmente «como de una sola boca», subrayando la completa unidad de los tres en su alabanza.'
    reason: lexical_alternative
  revision_rationale: Se corrige la frase principal para reflejar mejor la imagen griega y mejorar la naturalidad del español sin perder la vividez literal que el POB quiso preservar. El resto del versículo puede mantenerse tal como está.
