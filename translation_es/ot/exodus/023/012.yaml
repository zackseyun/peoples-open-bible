review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: seis días de trabajo, el séptimo de cesación, con propósito de descanso para animales y alivio para dependientes. Sin embargo, no preserva adecuadamente dos elementos del rastro auditado: (1) la nota [a] fue alterada para explicar תַּעֲשֶׂה (''harás'') cuando en la POB inglesa la nota documenta la alternativa de תִּשְׁבֹּת (''cesarás'' / ''descansarás''); y (2) בֶּן אֲמָתְךָ lleva en inglés una nota léxica alternativa que falta en español. Además, ''forastero'' debilita la categoría legal-social de הַגֵּר frente a una opción más fiel como ''residente extranjero'' o ''extranjero residente''.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos detalles mejorables de naturalidad y precisión: ''en el séptimo día'' suena menos idiomático que ''en el séptimo'' o ''el séptimo día''; y ''forastero'' sugiere alguien pasajero, no un residente protegido por el orden social israelita. ''Cesarás'' está bien y refleja con acierto el valor de שׁבת.'
  glossary_alignment: 'Alineación parcial. No hay conflicto con términos teológicos mayores del proyecto en este versículo, pero la decisión para הַגֵּר debería acercarse a la rationale auditada de ''sojourner'' como categoría legal-social. También debe preservarse la documentación léxica existente: nota para ''cesarás'' y nota alternativa para ''hijo de tu sierva''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar y contenido equivocados.
    rationale: La POB inglesa pone la nota en 'you shall do your work[a]' pero el contenido de la nota explica el verbo שׁבת ('cease/rest'), no תַּעֲשֶׂה. En español debe corregirse para documentar la alternativa de 'cesarás' o reubicarse coherentemente en el texto revisado.
  - severity: medium
    issue: Falta la nota léxica alternativa para בֶּן אֲמָתְךָ.
    rationale: El rastro auditado inglés conserva la alternativa 'your female servant’s son'. En español debe preservarse con nota equivalente, por ejemplo 'O "el hijo de tu sierva"' si se invierte el orden principal.
  - severity: medium
    issue: '''Forastero'' no refleja bien הַגֵּר como residente extranjero.'
    rationale: En español 'forastero' suele sonar transitorio o visitante. La rationale inglesa enfatiza una categoría social y legal estable; 'residente extranjero' o 'extranjero residente' la expresa mejor.
  - severity: low
    issue: '''En el séptimo día'' es menos natural que otras formulaciones en español actual.'
    rationale: No es incorrecto, pero 'pero el séptimo día' fluye mejor en español bíblico contemporáneo sin pérdida de sentido.
  revised_spanish_text: Por seis días harás tu trabajo, pero el séptimo día cesarás[a], para que descansen tu buey y tu asno, y se refresquen el hijo de tu sierva[b] y el residente extranjero[c].
  revised_footnotes:
  - marker: a
    text: O «descansarás»; el verbo hebreo significa fundamentalmente «cesar, parar».
    reason: lexical_alternative
  - marker: b
    text: O «el hijo de tu sierva».
    reason: lexical_alternative
  - marker: c
    text: «Residente extranjero» designa aquí al extranjero que vive entre Israel bajo su orden social y legal.
    reason: cultural_note
  revision_rationale: Se corrige la documentación auditada para que la nota léxica corresponda a שׁבת ('cesarás') y se restaura la nota alternativa sobre בֶּן אֲמָתְךָ. También se sustituye 'forastero' por 'residente extranjero' para reflejar mejor הַגֵּר como categoría legal-social, y se mejora la fluidez con 'pero el séptimo día'.
