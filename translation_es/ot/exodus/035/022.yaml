base_translation:
  language: en
  yaml_path: translation/ot/exodus/035/022.yaml
  text: So the men came with the women[a]. Everyone whose heart was willing brought brooches, earrings, rings, and ornaments—all kinds of gold jewelry[b]. And every man who presented a wave offering of gold to Yahweh did so.
  footnotes:
