translation:
  language: es
  text: 'Y de los hijos de Mani[a]: Olamo, Mamucus, Jedaeo, Jasubus, Asael[b] y Jeremoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Μανί; el paralelo hebreo en Esdras suele relacionarse con Bani.
    reason: alternative_reading
  - marker: b
    text: Varios de estos nombres probablemente corresponden a formas hebreas conocidas en la lista paralela; aquí se sigue la forma griega de 1 Esdras como texto primario.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - También
  lexicon: LSJ
  rationale: Conjunción aditiva que introduce otro grupo en la lista; «Y» conserva la secuencia del griego de manera natural en español.
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - entre los hijos de
  - de entre los hijos de
  lexicon: LSJ
  rationale: La construcción marca pertenencia a una lista de clan/familia. En español bíblico natural, «de los hijos de» refleja bien la relación de procedencia.
- source_word: Μανί
  english_pob_choice: Mani
  chosen_spanish: Mani
  alternatives_spanish:
  - Bani
  - Maani
  lexicon: transliteration
  rationale: Se sigue la forma griega como fuente primaria. La correspondencia hebrea probable con Bani se preserva como alternativa en nota.
- source_word: Ὤλαμος
  english_pob_choice: Olamus
  chosen_spanish: Olamo
  alternatives_spanish:
  - Olamos
  lexicon: transliteration
  rationale: Se translitera el nombre propio desde la forma griega, adaptándolo a una forma española legible sin imponer una armonización hebrea no explícita en el texto griego.
- source_word: Μάμουχος
  english_pob_choice: Mamuchus
  chosen_spanish: Mamucus
  alternatives_spanish:
  - Mamouchos
  - Malluc
  lexicon: transliteration
  rationale: Nombre propio rendido por transliteración desde el griego. Se simplifica la terminación para fluidez en español, manteniendo la forma de la fuente.
- source_word: Ἰεδαῖος
  english_pob_choice: Jedaeus
  chosen_spanish: Jedaeo
  alternatives_spanish:
  - Jedeo
  - Adaías
  lexicon: transliteration
  rationale: Transliteración del nombre griego; se evita sustituirlo por una equivalencia hebrea no escrita en esta línea griega.
- source_word: Ἰάσουβος
  english_pob_choice: Jasubus
  chosen_spanish: Jasubus
  alternatives_spanish:
  - Jasubo
  - Jashub
  lexicon: transliteration
  rationale: Se conserva la forma amplia transmitida por el griego, evitando reducirla a la forma hebraizada más breve.
- source_word: Ἀσάηλος
  english_pob_choice: Asael
  chosen_spanish: Asael
  alternatives_spanish:
  - Asaelo
  - Azael
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
- source_word: Ἰερεμώθ
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jeremoth
  lexicon: transliteration
  rationale: Transliteración del nombre griego adaptada a una ortografía española fluida, sin alterar la identidad del nombre.
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español. También se ajustaron algunas transliteraciones para que la línea resulte publicable en español sin perder el anclaje al griego.
  spanish_consistency_notes:
  - Se mantiene la prioridad del testimonio griego de 1 Esdras sobre la lista paralela hebrea, usando las equivalencias hebreas solo en notas.
  - Se conserva un estilo bíblico sobrio y legible en español, sin introducir términos eclesiásticos ajenos al nombre-lista del versículo.
  - Los nombres propios se adaptan a una forma española estable cuando ayuda a la lectura, pero sin armonizarlos al hebreo más allá de lo que la nota permite.
