revisions:
- from: Y cuando los sacerdotes de Nanea habían puesto estas cosas[a], y él había entrado con unos pocos hombres en el recinto del templo, cerraron el santuario en cuanto Antioquías entró.
  to: Y cuando los sacerdotes de Nanea[a] habían dispuesto estas cosas, y él había llegado con unos pocos hombres al recinto del templo, cerraron el templo en cuanto Antíoco entró.
  rationale: 'Se corrigen tres puntos principales: (1) Ἀντίοχος → ''Antíoco'', la forma española correcta; (2) προσελθόντος → ''había llegado'', para no anticipar la entrada que el griego reserva a ὡς εἰσῆλθεν; (3) συγκλείσαντες τὸ ἱερόν → ''cerraron el templo'', que es la correspondencia más directa y además evita una oposición espacial invertida. También se mejora προθεμένων con ''habían dispuesto'', más natural en español para objetos presentados o puestos en orden. No hace falta adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:17:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia básica, pero no preserva con suficiente fidelidad varias decisiones fuente/POB: προσελθόντος se acerca más a ''había llegado/venido'' que a ''había entrado''; la distinción espacial entre περίβολος + τέμενος y ἱερόν queda desbalanceada; y Ἀντίοχος no debe traducirse como ''Antioquías'' sino como ''Antíoco'' en español bíblico e histórico.'
  spanish_quality_summary: El texto es comprensible, pero 'habían puesto' suena menos natural que 'habían dispuesto' o 'habían puesto ... a la vista' en este contexto cultual. 'Cerraron el santuario' combinado con 'recinto del templo' produce una oposición espacial menos clara que la del griego y del audit trail. Además, 'Antioquías' se entiende como topónimo o antropónimo distinto, no como la forma española normal del rey Antiochus.
  glossary_alignment: 'No hay términos teológicos mayores en juego, pero sí hay que seguir la rationale documentada del POB: mantener ''Nanea'' con nota; preservar la referencia abierta de αὐτά; y reflejar el contraste espacial sin invertirlo ni oscurecerlo. La forma propia correcta es ''Antíoco'', no ''Antioquías''.'
  issues:
  - severity: high
    issue: 'Nombre propio mal vertido: ''Antioquías'' por Ἀντίοχος'
    rationale: Ἀντίοχος corresponde en español a 'Antíoco'. 'Antioquías' no es la forma española estándar del personaje y puede confundirse con otro nombre o con la ciudad Antioquía.
  - severity: high
    issue: προσελθόντος traducido como 'había entrado'
    rationale: El participio describe el acercamiento/llegada al recinto; el ingreso propiamente dicho se expresa después con ὡς εἰσῆλθεν Ἀντίοχος. Usar 'había entrado' duplica y adelanta indebidamente la entrada.
  - severity: medium
    issue: Distinción espacial entre περίβολον τοῦ τεμένους y τὸ ἱερόν poco fiel
    rationale: El griego distingue el recinto cercado del complejo sagrado y luego el templo/santuario que se cierra. 'Recinto del templo' / 'santuario' es posible, pero el conjunto del borrador no refleja tan bien como podría el contraste auditado; conviene 'recinto del precinto del templo' sería torpe, así que una solución idiomática es 'recinto del templo' / 'templo' con nota no necesaria.
  - severity: low
    issue: '''Habían puesto estas cosas'' suena algo plano en contexto de objetos presentados'
    rationale: Aunque no es incorrecto, 'habían dispuesto estas cosas' o 'habían puesto estas cosas a la vista' representa mejor προθεμένων como presentación/disposición de objetos sin sobreinterpretar.
  revised_spanish_text: Y cuando los sacerdotes de Nanea[a] habían dispuesto estas cosas, y él había llegado con unos pocos hombres al recinto del templo, cerraron el templo en cuanto Antíoco entró.
  revised_footnotes:
  - marker: a
    text: El griego Ναναίου puede representarse en español como «Nanea» o «Nanaia». El texto principal conserva la forma más cercana al testimonio griego de esta edición.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres puntos principales: (1) Ἀντίοχος → ''Antíoco'', la forma española correcta; (2) προσελθόντος → ''había llegado'', para no anticipar la entrada que el griego reserva a ὡς εἰσῆλθεν; (3) συγκλείσαντες τὸ ἱερόν → ''cerraron el templo'', que es la correspondencia más directa y además evita una oposición espacial invertida. También se mejora προθεμένων con ''habían dispuesto'', más natural en español para objetos presentados o puestos en orden. No hace falta adjudicación adicional.'
