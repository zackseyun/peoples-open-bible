revisions:
- from: Pero toda ciudad o región, en su totalidad, que no obre conforme a estas órdenes será consumida con lanza y fuego, en ira[a]; no solo será inaccesible para los hombres[b], sino que también será hecha, por todo el tiempo, la más odiosa para los animales salvajes y las aves.
  to: Pero toda ciudad o región en su totalidad que no obre conforme a estas órdenes será consumida con lanza y fuego, con ira[a]; no solo quedará intransitable para los hombres[b], sino que también será hecha sumamente detestable, aun para los animales salvajes y las aves, por todo tiempo.
  rationale: 'Se revisa para mejorar fidelidad y naturalidad del español sin apartarse del griego ni del audit trail inglés: «intransitable» refleja mejor ἄβατος; «con ira» expresa de forma idiomática μετʼ ὀργῆς; y la cláusula final se reordena para preservar el pasivo resultativo y la fuerza superlativa de ἔχθιστος κατασταθήσεται. También se corrige la nota [a] para que realmente presente una alternativa distinta del texto principal.'
