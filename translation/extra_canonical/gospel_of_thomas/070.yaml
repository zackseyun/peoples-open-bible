translation:
  text: Jesus said, “When you bring it forth within yourselves, this—what you have—will
    save you; otherwise, poverty is in you. This—what you do not have within yourselves,
    inside—will kill you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The periphrastic ⲉⲣϣⲁⲛ_ⲛⲧⲟⲟⲩϫⲡⲟⲡⲏ is rendered ‘bring it forth’; more woodenly,
      ‘cause it to come to be’ within you.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲟⲩϫⲟⲛ is translated ‘save’; alternatives like ‘deliver/benefit’ are possible,
      but the antithesis with ‘kill’ favors ‘save.’
    reason: lexical_alternative
  - marker: c
    text: ⲡⲏ is taken disjunctively as ‘otherwise/or else’; some take it as ‘rather’
      or omit the clause for smoother English.
    reason: alternative_reading
  - marker: d
    text: ⲙⲛⲧⲁⲁⲛⲟⲛ literally ‘poverty’; we keep the stark term rather than paraphrasing
      as ‘lack.’
    reason: cultural_note
  - marker: e
    text: 'Line damage in NHAM02.45 lb 33: Dilley restores ⲛⲁ- in ⲛⲁⲙⲟⲩⲟⲩⲧ ‘will kill’;
      reading is secure in sense though letters are partially lost.'
    reason: lacuna_or_restoration
  - marker: f
    text: ϩⲛⲧⲏⲛⲉ ‘inside/inwardly’ underscores interiority; we translate explicitly
      to preserve the double emphasis in the Coptic.
    reason: dialect_note
lexical_decisions:
- source_word: ϩⲟⲧⲁⲛ
  chosen: when(ever)
  alternatives:
  - if/whenever
  lexicon: Layton grammar; Crum
  rationale: Temporal subordinator marking a general condition; chose plain “when”
    to retain Thomas’s terse cast.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲟⲟⲩϫⲡⲟⲡⲏ
  chosen: bring it forth / cause it to come to be
  alternatives:
  - make it happen
  - produce it
  lexicon: Crum; Layton
  rationale: Periphrastic construction ⲉⲣϣⲁⲛ + infinitive; ⲡⲟⲡⲏ conveys coming-to-be.
    Idiomatic “bring it forth” preserves recognized Thomasine phrasing while reflecting
    the causative nuance.
- source_word: ϩⲛⲛⲧⲱⲧⲛ
  chosen: within yourselves
  alternatives:
  - among you
  - in you
  lexicon: Crum
  rationale: Locative ϩⲛ + dative 2pl; interiority is clearly intended; chose “within
    yourselves” to stress inwardness.
- source_word: ⲡⲁⲓ
  chosen: this
  alternatives:
  - this thing
  - this one
  lexicon: Crum
  rationale: Demonstrative pointing to the referent in view; kept terse deictic force
    by simply “this.”
- source_word: ⲉⲧⲉⲣⲉⲟⲩⲛⲧⲱⲧⲛⲛⲧⲟϥ (ⲟⲩⲛ … ⲛⲧⲱⲧⲛ ⲛⲧⲟϥ)
  chosen: which you have
  alternatives:
  - that there is to you
  - that is yours
  lexicon: Layton; Crum
  rationale: Existential ⲟⲩⲛ with dative ‘to you’ idiomatically renders possession;
    “have” is the natural English equivalent.
- source_word: ⲧⲟⲩϫⲟⲛ
  chosen: save
  alternatives:
  - deliver
  - benefit
  lexicon: Crum
  rationale: Given the antithesis with ⲙⲟⲩⲟⲩⲧ ‘kill,’ the semantic field is soteriological;
    “save” is the most pointed counterpart.
- source_word: ⲉϣⲱⲡⲉ
  chosen: (aspectual; left unexpressed)
  alternatives:
  - come to be
  - indeed
  lexicon: Layton; Crum
  rationale: Functions here as an aspectual/auxiliary “to happen/come to be” accompanying
    the future; translating it would clutter English without adding content. Its presence
    is noted in the textual note.
- source_word: ⲙⲛⲧⲁⲁⲛⲟⲛ
  chosen: poverty
  alternatives:
  - destitution
  - lack
  lexicon: Crum
  rationale: Abstract noun ‘poverty’; kept literal despite interpretive difficulty
    to preserve Thomas’s strangeness.
- source_word: ⲡⲏ
  chosen: otherwise
  alternatives:
  - or else
  - rather
  lexicon: Layton; Crum
  rationale: Disjunctive particle introducing an alternative; “otherwise” best fits
    the admonitory cadence.
- source_word: ϩⲛⲧⲏⲛⲉ
  chosen: inside
  alternatives:
  - in the inner part
  - inwardly
  lexicon: Crum
  rationale: Noun ⲧⲏⲛⲉ ‘interior’; translated concretely as “inside” to mirror the
    double insistence on inwardness.
- source_word: ⲙⲟⲩⲟⲩⲧ
  chosen: kill
  alternatives:
  - put to death
  - destroy
  lexicon: Crum
  rationale: Causative of ‘die’; “kill” is the sharpest, keeping Thomas’s stark antithesis.
textual_note: 'Dialect: Sahidic with Lycopolitan color; repeated dative 2pl pronoun
  appears as ⲛⲧⲱⲧⲛ, with one orthographic irregularity in the manuscript line-break
  (printed ⲛ̄ⲧ[ⲏ]ⲩⲧⲛ), normalized by Dilley as ⲛⲛⲧⲱⲧⲛ ‘to you (pl).’ Syntax: The periphrastic
  ⲉⲣϣⲁⲛ_ + infinitive and the existential ⲟⲩⲛ/ⲙⲛⲧⲁⲛ with dative are typical Sahidic
  possessive constructions. We read ⲡⲏ as a disjunctive ‘otherwise/or else,’ yielding
  a brief middle clause “otherwise poverty is in you,” which many translators omit
  or smooth; we retain it for transparency. Orthography/damage: final line shows damage/restoration
  (NHAM02.45 lb 33: ϥ̣[ⲛⲁⲙ]ⲟ̣ⲩ̣ⲧ̣⳿ⲧⲏⲛⲉ), normalized as ⲛⲧⲟϥ ⲛⲁ ⲙⲟⲩⲟⲩⲧ ⲛⲧⲱⲧⲛ ‘it will
  kill you.’ The small bracketed [ⲏ] in ϩⲛ̄ⲧ[ⲏ]ⲩⲧⲛ reflects uncertainty in the vowel;
  meaning remains ‘within you (pl).’ The particle ⲉϣⲱⲡⲉ, present after ⲛⲁ ⲧⲟⲩϫⲟⲛ,
  is taken as aspectual and left unrendered in English.'
