  - marker: c
    text: 'La última cláusula hebrea es difícil: literalmente, «y su vida/alma no vivificó»; a menudo se entiende como «incluso él que no pudo mantener viva su propia vida».'
    reason: alternative_reading
  revision_rationale: 'Se hicieron tres ajustes menores pero necesarios: (1) «los prósperos» reemplaza el poco natural «los prosperados»; (2) «se arrodillarán» preserva la distinción verbal entre השתחוה y כרע; (3) la cláusula final se reformuló en español más claro y fiel a la lectura adoptada por el POB, sin resolver en exceso la dificultad del hebreo.'
