translation:
  language: es
  text: Acércate y no te demores[a], y encontrarás vida para ti. Y cuando estés cerca, sé como un guerrero y como un hombre valiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto hebreo provisto en este paquete fue el que se tomó como base para esta revisión. El griego de Sirácides 1:30 contiene otra sentencia: «El agua apaga un fuego ardiente, y la limosna expía los pecados».'
    reason: source_note
lexical_decisions:
- source_word: קְרַב
  english_pob_choice: Draw near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Arrímate
  - Acércate más
  lexicon: BDB
  rationale: El hebreo exige una exhortación directa de aproximación; en español, «acércate» conserva el imperativo breve y natural sin perder el movimiento hacia delante.
- source_word: תְּאַחֵר
  english_pob_choice: do not delay
  chosen_spanish: no te demores
  alternatives_spanish:
  - no tardes
  - no te retrases
  lexicon: BDB
  rationale: La idea es posponer o tardar en responder. «No te demores» suena natural en español y mantiene la urgencia del mandato.
- source_word: חַיִּים לְנַפְשְׁךָ
  english_pob_choice: life for yourself
  chosen_spanish: vida para ti
  alternatives_spanish:
  - vida para tu alma
  - vida para ti mismo
  lexicon: BDB
  rationale: El hebreo literalmente habla de «vida para tu נפש». En español, «para ti» comunica el beneficio personal sin introducir una antropología más interpretativa con «alma».
- source_word: כְּגִבּוֹר
  english_pob_choice: like a warrior
  chosen_spanish: como un guerrero
  alternatives_spanish:
  - como un valiente
  - como un héroe
  lexicon: BDB
  rationale: «Guerrero» mantiene la imagen de fuerza y disposición para la batalla que sugiere גִּבּוֹר, sin depender de una connotación épica que «héroe» podría añadir.
- source_word: וְכְאִישׁ חַיִל
  english_pob_choice: like a mighty man
  chosen_spanish: como un hombre valiente
  alternatives_spanish:
  - como un hombre fuerte
  - como un hombre de valor
  lexicon: BDB
  rationale: La expresión hebrea apunta a capacidad, vigor y valor militar/cívico. «Hombre valiente» conserva bien ese campo semántico en un español contemporáneo y digno.
theological_decisions:
- issue: Seguimiento del hebreo frente al texto griego paralelo de Sirácides 1:30
  english_pob_reading: The English POB corrected an earlier unrelated draft and translated the supplied Hebrew, noting the Greek proverb as a textual mismatch for this zone.
  chosen_spanish_reading: Traducir el hebreo provisto en el paquete, sin importar la máxima del agua y el fuego del griego en el texto principal.
  alternative_spanish_readings:
  - «El agua apaga un fuego ardiente, y la limosna expía los pecados»
  rationale: El paquete de fuente indica que el hebreo disponible para esta referencia es la lectura a seguir en la revisión aplicada. Por transparencia textual, conviene reflejar esa decisión en español y no fusionar los dos testimonios en una sola línea.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva y documentar honestamente las divergencias con el griego'
translation_notes:
  revision_awareness: 'El audit trail muestra una revisión importante: se descartó un borrador que seguía el griego y se adoptó una traducción del hebreo suministrado, aunque el propio archivo señala que ese hebreo es un compuesto con posible desajuste. La redacción española sigue esa revisión aplicada y documenta la existencia del paralelo griego como nota de fuente, no como texto base principal.'
  spanish_consistency_notes:
  - Se mantuvo el imperativo directo en segunda persona singular para conservar la fuerza exhortativa del hebreo.
  - «Valiente» y «guerrero» se usan de manera complementaria para evitar redundancia mecánica y conservar el paralelismo poético.
  - No se introdujo «alma» en lugar de נפש, siguiendo la preferencia del proyecto por no sobreteologizar cuando el hebreo permite una lectura personal más amplia.
  - La nota explica la divergencia con el griego sin mezclar ambos testigos en el cuerpo del verso.
