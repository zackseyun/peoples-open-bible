translation:
  language: es
  text: 'No digas[a]: «Tengo bastante delante de mí; ¿qué desastre me sobrevendrá?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No introduzcas a toda persona en tu casa, porque muchas son las emboscadas del engañoso». Esto refleja una forma textual sustancialmente distinta del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No hables
  - Nunca digas
  lexicon: HALOT
  rationale: El mandato negativo directo de אמר se expresa con naturalidad en español como «No digas», manteniendo la fuerza admonitiva del original sin suavizarla.
- source_word: דַּיִּי
  english_pob_choice: I have enough
  chosen_spanish: Tengo bastante
  alternatives_spanish:
  - Me basta
  - Tengo suficiente
  lexicon: HALOT
  rationale: די comunica suficiencia. «Tengo bastante» conserva el sentido de suficiencia objetiva y suena natural en español; «me basta» es posible, pero desplaza el énfasis hacia una valoración subjetiva.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - a mi alcance
  - a la mano
  lexicon: HALOT
  rationale: La imagen hebrea de lo que está «delante de mí» se preserva con «delante de mí», que resulta idiomático en español y no añade la inferencia de disponibilidad que tendrían opciones más dinámicas.
- source_word: מַה אָסוֹן
  english_pob_choice: what disaster
  chosen_spanish: qué desastre
  alternatives_spanish:
  - qué calamidad
  - qué daño
  lexicon: HALOT
  rationale: אָסוֹן denota un daño grave o desastre. «Desastre» transmite mejor la seriedad del término que una traducción más leve como «daño».
- source_word: יְהִי עָלָי
  english_pob_choice: will come upon me
  chosen_spanish: me sobrevendrá
  alternatives_spanish:
  - vendrá sobre mí
  - me acontecerá
  - me llegará
  lexicon: HALOT
  rationale: La forma hebrea mantiene el movimiento de algo que recae o viene sobre la persona. «Me sobrevendrá» expresa bien esa irrupción futura en un español claro y bíblico sin ser arcaizante.
theological_decisions:
- issue: Forma textual divergente entre hebreo y griego en Sirácida 11:29
  english_pob_reading: Follow the extant Hebrew as the main text, with the Greek preserved in a footnote.
  chosen_spanish_reading: Seguir el hebreo conservado como texto principal, con el griego indicado en nota como lectura alternativa.
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: «No introduzcas a toda persona en tu casa, porque muchas son las emboscadas del engañoso».'
  - Fusionar hebreo y griego en una sola paráfrasis.
  rationale: En Sirácida, cuando el hebreo está conservado, la política del proyecto es traducir ese testimonio principal y documentar honestamente la forma griega cuando difiere sustancialmente. Aquí el griego no armoniza naturalmente con el hebreo, por lo que debe quedar como lectura alternativa y no mezclarse en el cuerpo del texto.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; preservar con honestidad la incertidumbre textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó «could come upon me» por «will come upon me» para reflejar de modo más directo el imperfecto hebreo. Por eso la traducción española usa una forma futura simple («me sobrevendrá») sin modalización innecesaria.
  spanish_consistency_notes:
  - Se mantuvo una puntuación sobria y bíblica, con comillas angulares para el discurso directo.
  - Se evitó «SEÑOR» o terminología eclesiástica tradicional, porque el versículo hebreo no contiene el nombre divino.
  - La nota reproduce el contraste textual con el griego sin introducir conciliaciones no atestiguadas.
