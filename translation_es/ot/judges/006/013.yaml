translation:
  language: es
  text: 'Gedeón le dijo[a]: «Por favor, señor mío, si Yahvé está con nosotros, ¿por qué entonces nos ha sucedido todo esto? ¿Y dónde están todas sus maravillas[b] que nuestros padres nos contaron, diciendo: “¿No nos hizo subir Yahvé de Egipto?” Pero ahora Yahvé nos ha abandonado y nos ha entregado en manos[c] de Madián».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Perdón, señor mío». El hebreo es una forma cortés de dirigirse a alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus obras maravillosas» o «sus milagros».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en manos de Madián», un modismo que significa bajo el poder de Madián.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  english_pob_choice: Please, my lord
  chosen_spanish: Por favor, señor mío
  alternatives_spanish:
  - Te ruego, señor mío
  - Perdón, señor mío
  lexicon: HALOT
  rationale: בִּי es una interjección cortés de ruego o disculpa; en español, «Por favor» comunica esa cortesía de modo natural. אֲדֹנִי aquí es un trato respetuoso humano, no un título divino, por lo que «señor mío» conserva la deferencia sin elevar innecesariamente el registro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de transliterar el nombre propio divino en vez de sustituirlo por un título. En español, «Yahvé» es la forma de uso más estable y readable para este proyecto, preservando el nombre del pacto.
- source_word: וְיֵשׁ יְהוָה עִמָּנוּ
  english_pob_choice: if the LORD is with us
  chosen_spanish: si Yahvé está con nosotros
  alternatives_spanish:
  - y Yahvé está con nosotros
  - puesto que Yahvé está con nosotros
  lexicon: HALOT
  rationale: Aunque la forma hebrea dice literalmente «y hay Yahvé con nosotros», el contexto retórico exige una prótasis condicional; en español, «si Yahvé está con nosotros» reproduce con naturalidad la fuerza argumentativa de la queja de Gedeón.
- source_word: לָמָּה מְצָאַתְנוּ כָּל זֹאת
  english_pob_choice: why then has all this happened to us?
  chosen_spanish: ¿por qué entonces nos ha sucedido todo esto?
  alternatives_spanish:
  - ¿por qué entonces nos ha sobrevenido todo esto?
  - ¿por qué entonces nos ha acontecido todo esto?
  lexicon: HALOT
  rationale: מָצָא con calamidad expresa que una desgracia sobreviene o acontece. «Nos ha sucedido» es idiomático en español y mantiene la idea de que el mal les ha alcanzado; «entonces» conserva la inferencia del razonamiento.
- source_word: אַיֵּה
  english_pob_choice: where are
  chosen_spanish: ¿Y dónde están
  alternatives_spanish:
  - ¿Y dónde está
  - ¿Y dónde quedaron
  lexicon: HALOT
  rationale: אַיֵּה pregunta por ausencia o localización. En español, el plural «están» concuerda con «todas sus maravillas» y evita una construcción forzada.
- source_word: נִפְלְאֹתָיו
  english_pob_choice: his wonders
  chosen_spanish: todas sus maravillas
  alternatives_spanish:
  - todas sus obras maravillosas
  - todos sus prodigios
  lexicon: HALOT
  rationale: El término apunta a actos extraordinarios que inspiran asombro; «maravillas» conserva bien ese valor y su vínculo con la memoria salvífica de Israel. «Todas» refleja el alcance total del hebreo.
- source_word: סִפְּרוּ לָנוּ אֲבוֹתֵינוּ
  english_pob_choice: that our fathers told us about
  chosen_spanish: que nuestros padres nos contaron
  alternatives_spanish:
  - que nuestros antepasados nos relataron
  - que nuestros padres nos narraron
  lexicon: HALOT
  rationale: סִפֵּר es «contar/relatar». «Nuestros padres» mantiene el lenguaje de tradición heredada del texto, y «nos contaron» reproduce con sencillez la transmisión oral implícita.
- source_word: הֲלֹא מִמִּצְרַיִם הֶעֱלָנוּ יְהוָה
  english_pob_choice: Did not Yahweh bring us up from Egypt?
  chosen_spanish: “¿No nos hizo subir Yahvé de Egipto?”
  alternatives_spanish:
  - “¿No nos sacó Yahvé de Egipto?”
  - “¿Acaso no nos hizo subir Yahvé de Egipto?”
  lexicon: HALOT
  rationale: Se conserva la imagen del éxodo con «hacer subir», correspondiente al idiomático hebreo הֶעֱלָנוּ. Aunque «sacar» sería más fluido, «hacer subir» preserva mejor la huella léxica y teológica del original.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Mas ahora
  lexicon: HALOT
  rationale: La partícula introduce contraste fuerte entre la tradición del éxodo y la situación presente. «Pero ahora» comunica ese giro de manera clara y natural.
- source_word: נְטָשָׁנוּ
  english_pob_choice: has abandoned us
  chosen_spanish: nos ha abandonado
  alternatives_spanish:
  - nos ha dejado
  - nos ha desamparado
  lexicon: HALOT
  rationale: נטש expresa dejar o abandonar con carga relacional fuerte. «Abandonado» reproduce esa queja de desamparo sin suavizarla.
- source_word: וַיִּתְּנֵנוּ בְּכַף מִדְיָן
  english_pob_choice: and given us into the hand of Midian
  chosen_spanish: y nos ha entregado en manos de Madián
  alternatives_spanish:
  - y nos ha puesto en manos de Madián
  - y nos ha entregado en la mano de Madián
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de poder/sujeción con «en manos de». «Entregado» refleja bien וַיִּתְּנֵנוּ y evita una paráfrasis excesiva.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Midián
  lexicon: HALOT
  rationale: Se adopta la transliteración española habitual del nombre propio para coherencia y legibilidad en el texto bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה en discurso directo de Gedeón
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso usa el Tetragrama explícitamente, y el proyecto evita el sustituto litúrgico. «Yahvé» conserva el nombre propio revelado y sigue la política terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de וְיֵשׁ יְהוָה עִמָּנוּ
  english_pob_reading: if the LORD is with us
  chosen_spanish_reading: si Yahvé está con nosotros
  alternative_spanish_readings:
  - y Yahvé está con nosotros
  - puesto que Yahvé está con nosotros
  rationale: Aunque la forma hebrea es asertiva, la función retórica aquí es condicional e interrogativa dentro de una queja. Traducirla como condicional preserva el argumento de Gedeón sin convertirlo en una simple afirmación.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia de אֲדֹנִי en el saludo de Gedeón
  english_pob_reading: human honorific ('my lord') addressed to the messenger
  chosen_spanish_reading: honorífico humano («señor mío»)
  alternative_spanish_readings:
  - título divino («Señor mío» con mayúscula)
  - «mi señor»
  rationale: En el contexto inmediato Gedeón se dirige respetuosamente al mensajero. Mantener el trato humano evita adelantar una identificación teológica no exigida por la cláusula.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se revisó la lectura inglesa auditada y se mantuvieron sus decisiones clave: el nombre divino como transliteración, el matiz condicional de וְיֵשׁ, la idiomática de מָצָא con calamidad y la imagen de poder en «en manos de». No se registraron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio POB español.
  - Se prefirió «Madián» como transliteración española coherente del nombre propio.
  - La puntuación y comillas siguen convención española, con la cita interna marcada dentro del discurso directo.
  - Los corchetes de notas aparecen exactamente en los puntos correspondientes del texto.
