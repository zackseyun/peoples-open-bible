revisions:
- from: Entonces el rey Nabucodonosor cayó sobre su rostro y rindió homenaje[a] a Daniel, y ordenó que se le ofrecieran una ofrenda y perfumes[b][c].
  to: Entonces el rey Nabucodonosor cayó sobre su rostro y rindió homenaje[a] a Daniel, y ordenó[b] que se le ofrecieran una ofrenda y incienso[c].
  rationale: Se reemplazó "perfumes" por "incienso" para conservar mejor el matiz cultual del arameo y seguir la decisión léxica documentada del POB en inglés. También se corrigió el anclaje de la nota sobre libación para que corresponda al verbo לְנַסָּכָה, no al sustantivo final. Se mantuvo "rindió homenaje" por fidelidad a la cautela teológica del original y del audit trail.
