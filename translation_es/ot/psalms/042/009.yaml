translation:
  language: es
  text: 'De día Yahvé ordena su amor leal[b][a], y de noche su canto está conmigo: una oración al Dios de mi vida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios que me da vida». El hebreo, más literalmente, dice «el Dios de mi vida».
    reason: lexical_alternative
  - marker: b
    text: O «un canto para él está conmigo», si שִׁירָה se toma sin el sentido posesivo; el texto principal sigue la lectura «su canto».
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹמָם
  english_pob_choice: By day
  chosen_spanish: De día
  alternatives_spanish:
  - Durante el día
  - En el día
  lexicon: HALOT
  rationale: Es un adverbio de tiempo; «De día» es natural en español y mantiene el paralelismo con «de noche».
- source_word: יְצַוֶּה
  english_pob_choice: commands
  chosen_spanish: ordena
  alternatives_spanish:
  - manda
  - dispone
  - comisiona
  lexicon: HALOT
  rationale: El verbo piel expresa acción verbal fuerte; «ordena» conserva la fuerza directiva sin sonar demasiado explicativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton en vez de sustituirlo por un título. «Yahvé» es la forma habitual elegida para la edición española.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su amor de pacto
  lexicon: HALOT
  rationale: חסד combina lealtad, misericordia y amor de pacto. «Amor leal» comunica bien esa densidad en español sin perder el vínculo relacional.
- source_word: וּבַלַּיְלָה
  english_pob_choice: and at night
  chosen_spanish: y de noche
  alternatives_spanish:
  - y en la noche
  - pero de noche
  lexicon: HALOT
  rationale: La conjunción es coordinante, no adversativa; «de noche» es la equivalencia más natural y mantiene el paralelismo temporal.
- source_word: שִׁירָה
  english_pob_choice: his song
  chosen_spanish: su canto
  alternatives_spanish:
  - su canción
  - un canto para él
  - canto
  lexicon: HALOT
  rationale: Con el sufijo posesivo, el sustantivo puede leerse como algo que pertenece a Dios o procede de él. «Su canto» conserva la ambigüedad sin forzar una interpretación.
- source_word: עִמִּי
  english_pob_choice: is with me
  chosen_spanish: está conmigo
  alternatives_spanish:
  - conmigo
  lexicon: HALOT
  rationale: En español se expresa con verbo copulativo; «está conmigo» comunica presencia continua.
- source_word: תְּפִלָּה
  english_pob_choice: a prayer
  chosen_spanish: una oración
  alternatives_spanish:
  - oración
  - una súplica
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «oración» transmite bien el matiz de oración dirigida a Dios; el artículo indefinido refleja la apposición del hebreo.
- source_word: לְאֵל
  english_pob_choice: to the God
  chosen_spanish: al Dios
  alternatives_spanish:
  - a Dios
  - al Dios que es
  lexicon: HALOT
  rationale: 'El ל indica dirección/destino: la oración se dirige a Dios. «Al Dios» conserva además la construcción definida del hebreo antes del complemento genitivo.'
- source_word: חַיָּי
  english_pob_choice: of my life
  chosen_spanish: de mi vida
  alternatives_spanish:
  - mi vida
  - que me da vida
  - de mi vivir
  lexicon: HALOT
  rationale: La forma con sufijo es literalmente «mi vida». Se evita armonizarla con «el Dios viviente» para respetar la redacción particular del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino; se conserva como «Yahvé» en vez de una sustitución titular. Esto mantiene la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de חַיָּי en לְאֵל חַיָּי
  english_pob_reading: the God of my life
  chosen_spanish_reading: el Dios de mi vida
  alternative_spanish_readings:
  - el Dios que me da vida
  - el Dios viviente
  rationale: Aquí חַיָּי funciona como «mi vida» con sufijo, no como adjetivo que califique a Dios. «El Dios de mi vida» mantiene la estructura genitiva y evita homogenizarla con otros pasajes cercanos.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
- issue: Ambigüedad de שִׁירָה
  english_pob_reading: his song / a song to him
  chosen_spanish_reading: su canto
  alternative_spanish_readings:
  - un canto para él
  - canto suyo
  rationale: El hebreo admite una lectura posesiva o direccional; «su canto» deja abierta la tensión observada por la POB inglesa y no la resuelve de manera prematura.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; la última pasada de revisión indica que no hubo cambios necesarios y el dictamen fue de alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme a la política del proyecto.
  - Se traduce חסד de manera relacional como «amor leal», evitando tanto la banalización como una paráfrasis excesiva.
  - Se conserva la ambigüedad de שירָה mediante «su canto» y nota alternativa, en línea con la auditoría inglesa.
  - Se usa «oración» para תְּפִלָּה como término bíblico natural en español, sin perder la idea de plegaria dirigida a Dios.
