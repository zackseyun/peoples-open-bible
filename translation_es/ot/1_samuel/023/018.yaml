- from: Y los dos hicieron un pacto delante de Yahvé[a]. Después David permaneció en el bosque[b], y Jonatán fue a su casa.
  to: Y los dos hicieron un pacto delante de Yahvé[a]. Después David permaneció en la zona boscosa[b], y Jonatán fue a su casa.
  rationale: La revisión es menor. Se cambia 'en el bosque' por 'en la zona boscosa' para reflejar mejor el hebreo חֹרְשָׁה y la elección auditada en inglés ('the wooded area'), manteniendo en nota la posibilidad de topónimo. También se pule la redacción de las notas para un español más natural y consistente.
