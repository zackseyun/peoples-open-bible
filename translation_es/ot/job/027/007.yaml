review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene el valor desiderativo de יְהִי con «Que ... sea», conserva la comparación con כ en ambas mitades, traduce אֹיְבִי como «mi enemigo» y preserva la imagen verbal de וּמִתְקוֹמְמִי con «el que se levanta contra mí». «El injusto» también representa adecuadamente כְעַוָּל.'
  spanish_quality_summary: 'El texto español es claro y natural, con buen paralelismo. Sin embargo, la nota al pie actual no preserva correctamente la alternativa inglesa documentada: repite casi el mismo texto en vez de reflejar la opción más compacta equivalente a «mi adversario». Conviene corregir esa nota para que sea una verdadera alternativa lexical y estilística en español.'
  glossary_alignment: No hay términos del glosario principal en juego. Las decisiones léxicas «malvado» para רָשָׁע e «injusto» para עַוָּל son aceptables y legibles en español eclesial general. «El que se levanta contra mí» sigue correctamente la racionalidad auditada frente a una reducción a «adversario» en el texto principal.
  issues:
  - severity: medium
    issue: La nota al pie [a] no corresponde a una alternativa real del inglés auditado.
    rationale: 'La nota actual dice: «O: “como el malvado, y el que se levanta contra mí como el injusto”», lo cual omite el inicio de la cláusula y no presenta una variante significativa. El inglés documenta la alternativa «May my enemy be as the wicked, and my adversary as the unjust», por lo que la nota española debe reflejar una alternativa como «mi adversario» y, si se desea, «como»/«cual». '
  revised_spanish_text: Que mi enemigo sea como el malvado[a], y el que se levanta contra mí como el injusto.
  revised_footnotes:
  - marker: a
    text: 'O: «Que mi enemigo sea cual malvado, y mi adversario cual injusto».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que refleje una alternativa léxica y de formulación genuina, en línea con la auditoría inglesa.
