- from: 'Esto es lo que me mostró[a]: el Señor estaba de pie junto a un muro hecho con una plomada, con una plomada en su mano.'
  to: 'Esto es lo que me mostró: y vi[a] al Señor de pie junto a un muro hecho con una plomada, con una plomada en su mano.'
  rationale: Se mueve la nota al lugar correcto y se añade una representación explícita de וְהִנֵּה en el texto principal. «Y vi[a]» preserva la presentación súbita de la visión con mejor naturalidad en español que «he aquí», mientras la nota mantiene la alternativa más literal y tradicional. El resto del versículo puede conservarse tal como está, pues refleja bien el hebreo y la decisión léxica documentada sobre «plomada».
