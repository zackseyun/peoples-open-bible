id: ROM.14.14
reference: Romans 14:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἶδα καὶ πέπεισμαι ἐν κυρίῳ Ἰησοῦ ὅτι οὐδὲν κοινὸν δι’ ⸀ἑαυτοῦ· εἰ μὴ τῷ λογιζομένῳ τι κοινὸν εἶναι, ἐκείνῳ κοινόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/014.yaml
  text: I know and am persuaded in the Lord Jesus that nothing is unclean in itself; except that to the one who considers anything to be unclean, to that person it is unclean.
translation:
  language: ko
  text: 나는 주 예수 안에서 알고 확신합니다. 무엇이든 그 자체로는 부정한[a] 것이 없다는 것을. 다만 어떤 것을 부정하다고 여기는 자에게는 그것이 부정합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 κοινός는 본래 「공동의·일반의」 뜻이나, 유대인 의식적 문맥에서는 「정결하지 않은」으로 사용되었다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα καὶ πέπεισμαι
  english_pob_choice: I know and am persuaded
  chosen_korean: 알고 확신합니다
  alternatives_korean:
  - 알고 설득되어 있습니다
  lexicon: BDAG
  rationale: 완료 시제 πέπεισμαι의 현재적 상태를 「확신합니다」로.
- source_word: ἐν κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_korean: 주 예수 안에서
  lexicon: BDAG
  rationale: 바울의 정형. 「주」 정책 글로사리.
- source_word: κοινὸν
  english_pob_choice: unclean
  chosen_korean: 부정한
  alternatives_korean:
  - 정결하지 않은
  - 평범한
  lexicon: BDAG
  rationale: 의식적 문맥의 κοινός는 「부정한」을 뜻한다. 한국 성경 관행에 따라 「부정한」으로.
- source_word: δι’ ἑαυτοῦ
  english_pob_choice: in itself
  chosen_korean: 그 자체로
  lexicon: BDAG
  rationale: 「자체로」가 한국어로 자연스러움.
- source_word: τῷ λογιζομένῳ
  english_pob_choice: to the one who considers
  chosen_korean: 여기는 자에게
  alternatives_korean:
  - 헤아리는 자에게
  lexicon: BDAG
  rationale: λογίζομαι의 평가적 의미.
theological_decisions:
- issue: κοινός의 의식적 의미
  chosen_reading: 「부정한」으로 옮겨 의식적 정결 논쟁의 어휘를 보존
  alternative_readings:
  - 「평범한」
  rationale: 본문은 유대 의식적 정결을 두고 한 진술이므로 「부정한」이 적합하다. 「평범한」은 일반적 의미만 살려 본문 무게를 약화한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선; 본문 무게를 약화하지 말 것'
