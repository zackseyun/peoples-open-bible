translation:
  language: es
  text: Si un hombre tiene un hijo terco y rebelde, que no escucha la voz de su padre ni la voz de su madre[a], y aunque[b] lo disciplinan, no les escucha[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a la voz de su padre y a la voz de su madre». «Voz» es un modismo de instrucción o autoridad parental. También puede traducirse: «Si un hombre tiene ...» o «Cuando un hombre tiene ...»; la fórmula legal hebrea admite ambas opciones para la apertura del caso.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo permite leer la conjunción de forma simple: «y lo disciplinan»; el contexto también favorece el sentido concesivo: «aunque».'
    reason: alternative_reading
  - marker: c
    text: «Escuchar» aquí conserva el sentido de prestar atención y obedecer a la instrucción parental.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La fórmula legal casuística permite ambas opciones. En español jurídico-bíblico, «Si» expresa con naturalidad la condición planteada, sin perder el sentido de caso hipotético que también puede tener «Cuando».
- source_word: יִהְיֶה לְאִישׁ
  english_pob_choice: a man has
  chosen_spanish: un hombre tiene
  alternatives_spanish:
  - un hombre llegue a tener
  - hay para un hombre
  lexicon: HALOT
  rationale: La construcción hebrea de posesión se vuelve idiomáticamente clara en español con «tiene». Mantiene el valor legal de la cláusula sin calco innecesario.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  - hijo
  lexicon: HALOT
  rationale: «Hijo» comunica el referente natural en español. «Hijo varón» sería más explícito, pero aquí no añade fuerza de sentido suficiente para preferirse sobre la forma más sobria.
- source_word: סוֹרֵר
  english_pob_choice: stubborn
  chosen_spanish: terco
  alternatives_spanish:
  - obstinado
  - rebelde
  lexicon: HALOT
  rationale: El hebreo describe una resistencia persistente. «Terco» conserva esa dureza de voluntad; se complementa con el siguiente término para evitar perder el matiz doble.
- source_word: מוֹרֶה
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - desobediente
  - insumiso
  lexicon: HALOT
  rationale: «Rebelde» retiene el carácter activo y desafiante del término. Junto con «terco» mantiene la tensión lexical sin suavizarla a simple desobediencia.
- source_word: אֵינֶנּוּ שֹׁמֵעַ
  english_pob_choice: does not listen
  chosen_spanish: no escucha
  alternatives_spanish:
  - no obedece
  - no atiende
  lexicon: HALOT
  rationale: «Escuchar» preserva la conexión con שמע y deja visible el valor de atender/obedecer que el contexto exige. «No obedece» explicitaría la implicación, pero perdería la repetición léxica.
- source_word: בְּקוֹל אָבִיו וּבְקוֹל אִמּוֹ
  english_pob_choice: to the voice of his father or to the voice of his mother
  chosen_spanish: la voz de su padre ni la voz de su madre
  alternatives_spanish:
  - la voz de su padre y la voz de su madre
  - la instrucción de su padre y de su madre
  lexicon: HALOT
  rationale: Se conserva «voz» porque el hebreo usa un idiomático «voz de» para la autoridad de la instrucción parental. En español, la negación pide «ni» para reflejar la coordinación negativa natural, sin cambiar la referencia a ambos padres.
- source_word: וְיִסְּרוּ אֹתוֹ
  english_pob_choice: though they discipline him
  chosen_spanish: aunque lo disciplinan
  alternatives_spanish:
  - y lo disciplinan
  - aunque lo corrigen
  lexicon: HALOT
  rationale: 'El contexto favorece el matiz concesivo: incluso después de la disciplina, persiste la negativa. «Disciplinan» mantiene el sentido correctivo de יסר sin cargarlo de castigo físico no explicitado.'
- source_word: וְלֹא יִשְׁמַע אֲלֵיהֶם
  english_pob_choice: he does not listen to them
  chosen_spanish: no les escucha
  alternatives_spanish:
  - no los obedece
  - no les atiende
  lexicon: HALOT
  rationale: Se conserva la repetición de שמע con «escucha». El complemento indirecto «les» naturaliza la relación en español y mantiene la idea de atender a su palabra.
translation_notes:
  revision_awareness: 'La versión se mantiene alineada con el audit trail inglés: se preserva la fórmula casuística, la repetición de «voz» y la doble noción de שמע como escuchar/obedecer, mientras se adapta la negación y la coordinación a un español natural. No se observan revisiones previas que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no lo contiene.
  - Se conserva el paralelismo léxico entre «escucha» / «escucha» para reflejar la repetición de שמע.
  - «Terco y rebelde» sigue de cerca la pareja semántica del hebreo sin convertirla en una mera sinonimia estilística.
