  text: וְ/טִמֵּאתֶ֗ם אֶת צִפּוּי֙ פְּסִילֵ֣י כַסְפֶּ֔/ךָ וְ/אֶת אֲפֻדַּ֖ת מַסֵּכַ֣ת זְהָבֶ֑/ךָ תִּזְרֵ/ם֙ כְּמ֣וֹ דָוָ֔ה צֵ֖א תֹּ֥אמַר לֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/022.yaml
  text: And you will defile the silver overlay of your carved idols and the gold plating of your cast images. You will scatter them like a menstrual cloth; you will say to it[a], “Go out!”
  footnotes:
