  text: כִּֽי אֲנִ֞י חָשַׂ֣פְתִּי אֶת עֵשָׂ֗ו גִּלֵּ֨יתִי֙ אֶת מִסְתָּרָ֔י/ו וְ/נֶחְבָּ֖ה לֹ֣א יוּכָ֑ל שֻׁדַּ֥ד זַרְע֛/וֹ וְ/אֶחָ֥י/ו וּ/שְׁכֵנָ֖י/ו וְ/אֵינֶֽ/נּוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/010.yaml
  text: For I have stripped Esau bare[a]; I have uncovered his hiding places, and he will not be able to hide himself. His offspring, his brothers, and his neighbors are destroyed[b], and he is no more.
  footnotes:
