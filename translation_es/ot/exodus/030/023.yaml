translation:
  language: es
  text: 'Y tú, toma para ti las mejores especias: quinientos siclos de mirra fluida[a], y de canela aromática, la mitad de esa cantidad —doscientos cincuenta—, y doscientos cincuenta de caña aromática[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mirra pura’. La expresión hebrea probablemente se refiere a mirra que fluye libremente en su estado natural.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente ‘canela dulce’ y ‘caña dulce’. El hebreo, más ampliamente, denota canela y caña aromáticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׂמִים רֹאשׁ
  english_pob_choice: the finest spices
  chosen_spanish: las mejores especias
  alternatives_spanish:
  - especias principales
  - especias selectas
  - especias finas
  lexicon: HALOT
  rationale: בְּשָׂמִים designa sustancias aromáticas/especias, y רֹאשׁ funciona idiomáticamente como ‘lo principal’ o ‘lo mejor’. En español, ‘las mejores especias’ conserva el valor idiomático y la cualidad superlativa sin sonar artificial.
- source_word: מָר דְּרוֹר
  english_pob_choice: flowing myrrh
  chosen_spanish: mirra fluida
  alternatives_spanish:
  - mirra líquida
  - mirra libre
  - mirra pura
  lexicon: HALOT
  rationale: מָר es ‘mirra’; דְּרוֹר sugiere soltura/libertad, probablemente la mirra en su estado natural, que fluye. ‘Mirra fluida’ mantiene la imagen y evita forzar ‘pura’, que sería más interpretativa.
- source_word: חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred shekels
  chosen_spanish: quinientos siclos
  alternatives_spanish:
  - quinientas medidas
  - quinientos
  lexicon: HALOT
  rationale: El hebreo solo da el número, pero el contexto inmediato de la fórmula presupone la unidad de peso. En español, ‘siclos’ explicita la unidad con naturalidad y evita ambigüedad.
- source_word: קִנְּמָן בֶּשֶׂם
  english_pob_choice: fragrant cinnamon
  chosen_spanish: canela aromática
  alternatives_spanish:
  - canela fragante
  - canela dulce
  - canela olorosa
  lexicon: HALOT
  rationale: קִנְּמָן es ‘canela’, y בֶּשֶׂם califica el aroma. ‘Aromática’ conserva el matiz olfativo del hebreo de forma clara y moderna; ‘dulce’ sería tradicional pero menos preciso respecto al énfasis en el aroma.
- source_word: מַחֲצִיתוֹ
  english_pob_choice: half as much
  chosen_spanish: la mitad de eso
  alternatives_spanish:
  - la mitad de él
  - su mitad
  - la mitad
  lexicon: HALOT
  rationale: El sufijo remite a la cantidad anterior de quinientos. ‘La mitad de eso’ expresa la relación de manera natural en español y prepara la aclaración numérica siguiente.
- source_word: חֲמִשִּׁים וּמָאתָיִם
  english_pob_choice: two hundred fifty
  chosen_spanish: doscientos cincuenta
  alternatives_spanish:
  - doscientos y cincuenta
  lexicon: HALOT
  rationale: Es el valor explícito de la mitad. Mantenerlo en aposición reproduce la precisión del hebreo y ayuda a la lectura fluida.
- source_word: קְנֵה בֹשֶׂם
  english_pob_choice: fragrant cane
  chosen_spanish: caña aromática
  alternatives_spanish:
  - caña fragante
  - caña olorosa
  - calamo aromático
  lexicon: HALOT
  rationale: קָנֶה es ‘caña/reed’; בֹשֶׂם añade la cualidad aromática. ‘Caña aromática’ es fiel y comprensible; ‘cálamo’ sería más específico y menos transparente para el lector general.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro de auditoría en inglés. Se conservó la estructura enumerativa, la aclaración numérica de ‘la mitad’ y las equivalencias aromáticas sin recurrir a fórmulas eclesiásticas tradicionales que oculten el léxico original. No hubo revisiones aplicadas en el último pase, y el cotejo previo indicó alto acuerdo.
  spanish_consistency_notes:
  - Se usó ‘Y tú’ para reflejar el arranque enfático de וְאַתָּה.
  - Se mantuvo ‘siclos’ como unidad de peso implícita por el contexto inmediato y por la decisión auditada en inglés.
  - Se eligió ‘aromática’ para בֶּשֶׂם en ambas locuciones, preservando la coherencia léxica.
  - Se evitó ‘SEÑOR’ y otras sustituciones no motivadas, ya que este versículo no contiene el Nombre divino.
  - Las notas[a] y [b] se anclan en el texto exactamente donde surge la alternativa léxica relevante.
