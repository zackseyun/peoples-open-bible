- from: Porque el impío se jacta de los deseos de su alma, y el avaro bendice[a] y desprecia a Yahvé.
  to: Porque el impío se jacta del deseo de su alma, y el avaro bendice[a], pero desprecia a Yahvé.
  rationale: Se corrige «los deseos» a «el deseo» para ajustarse al singular hebreo y a la imagen preservada por el POB. Se añade «pero» para reflejar el matiz contrastivo adoptado en la revisión inglesa sin introducir interpretación excesiva. Se pule la nota para que recoja con más fidelidad y claridad las alternativas léxicas documentadas para בֵּרֵךְ. No requiere adjudicación adicional.
