id: ISA.41.24
reference: Isaiah 41:24
source:
  edition: WLC
  text: הֵן אַתֶּ֣ם מֵ/אַ֔יִן וּ/פָעָלְ/כֶ֖ם מֵ/אָ֑פַע תּוֹעֵבָ֖ה יִבְחַ֥ר בָּ/כֶֽם־׃
translation:
  text: Look[a], you are from nothing, and your work is from nonexistence; whoever chooses you is an abomination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'your work is from nonexistence'; the Hebrew term translated 'less than nothing' is rare and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an emphatic declaration. 'Look' is natural modern English and preserves the force without archaic tone.
- source_word: מֵאַיִן
  chosen: nothing
  alternatives:
  - from nothing
  - nonexistent
  lexicon: HALOT
  rationale: In context of polemic against idols, the phrase predicates worthlessness/nonentity. 'You are nothing' communicates the idiomatic sense better than a wooden 'from nothing.'
- source_word: וּפָעָלְכֶם
  chosen: and your work
  alternatives:
  - and what you do
  - and your deed
  lexicon: HALOT
  rationale: Refers to the idols' product/effect or workmanship associated with them. 'Your work' is broad enough to preserve the Hebrew while fitting the parallelism.
- source_word: מֵאָפַע
  chosen: less than nothing
  alternatives:
  - from nonexistence
  - from a viper
  - nothingness
  lexicon: HALOT
  rationale: The noun is rare and difficult; in this context and in parallel with מֵאַיִן it intensifies the claim of worthlessness. 'Less than nothing' reflects the common contextual sense and the rhetorical escalation. A lexical alternative is preserved in a footnote because the form is obscure.
- source_word: תּוֹעֵבָה
  chosen: an abomination
  alternatives:
  - detestable
  - a disgusting thing
  lexicon: HALOT
  rationale: A strong covenantal term of revulsion used frequently in the Hebrew Bible. 'Abomination' preserves the theological and moral weight better than a flatter modern synonym.
- source_word: יִבְחַר בָּכֶם
  chosen: whoever chooses you
  alternatives:
  - he who chooses you
  - the one who chooses you
  lexicon: HALOT
  rationale: Singular verb with preposition 'in/among/with you' idiomatically means choosing or preferring these idols. 'Whoever chooses you' renders the generic singular naturally in English.
