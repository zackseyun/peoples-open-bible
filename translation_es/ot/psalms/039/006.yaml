  to: Mira[a], has hecho que mis días midan apenas unos pocos palmos, y mi vida es como nada delante de ti; ciertamente todo hombre[b], aunque esté firme[c], es del todo vapor[d]. Selah
  rationale: 'Se ajustó el texto para reflejar mejor el hebreo y el rastro POB: se mejoró la naturalidad de la medición en español, se evitó el tono algo coloquial de «¡Mira!», se añadió la nota inclusiva requerida para «todo hombre», y se fortaleció «del todo vapor» para conservar el valor totalizador de כָּל הֶבֶל documentado en el inglés POB.'
