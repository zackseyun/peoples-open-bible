theological_decisions:
- issue: Joseph’s moral reasoning in vv. 5–6 includes patriarchal instruction and heavenly record language absent from a simpler Genesis retelling.
  chosen_reading: Retained the expanded admonition about adultery, heavenly death-judgment, and the eternal books in full.
  alternative_readings:
  - Compress to a brief refusal speech
  - Harmonize closely to Genesis 39
  rationale: Jubilees intentionally expands Joseph’s refusal into covenantal and heavenly-legal terms; this should not be flattened.
  doctrine_reference: Preserve theological tension and original-language primacy; do not harmonize Jubilees into Genesis.
- issue: Rendering of heavenly record motif in v. 5.
  chosen_reading: “the sin is recorded against him in the eternal books continually before the LORD.”
  alternative_readings:
  - “written in the heavenly tablets”
  - “entered in the books forever”
  rationale: The Ethiopic here speaks of eternal books and ongoing presence before God. 'Recorded' communicates juridical inscription without importing wording from other passages.
  doctrine_reference: Consistency of key terms, documented exception; preserve apocalyptic-revelatory density.
- issue: Status term for Joseph in the wife’s accusation in v. 8.
  chosen_reading: “Your Hebrew slave”
  alternative_readings:
  - “Your Hebrew servant”
  rationale: The accusation is socially degrading and ownership is salient; 'slave' better reflects bonded status in this context.
  doctrine_reference: 'DOCTRINE.md contested terms: render bonded service as ''slave'' where ownership/service is salient.'
