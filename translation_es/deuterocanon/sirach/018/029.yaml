revisions:
- from: Los prudentes en palabras también se hicieron sabios, y derramaron proverbios exactos[a].
  to: Los prudentes en palabras también se hicieron sabios, e hicieron llover proverbios exactos[a].
  rationale: Se revisa «derramaron» a «hicieron llover» para preservar de manera más visible la metáfora de lluvia de ἀνώμβρησαν, que el expediente inglés considera significativa. Se mantiene el resto del texto, que es fiel y natural. También se suaviza ligeramente la redacción de la nota para armonizar con la nueva formulación principal.
