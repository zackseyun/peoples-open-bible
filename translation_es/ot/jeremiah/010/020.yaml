translation:
  language: es
  text: Mi tienda[a] está destruida, y todas mis cuerdas[b] están arrancadas. Mis hijos[c] se han ido de mí, y ya no están. No hay nadie que vuelva a extender mi tienda ni a levantar mis cortinas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saqueada» o «devastada» para «destruida». El verbo hebreo puede enfatizar tanto la ruina violenta como el despojo.
    reason: lexical_alternative
  - marker: b
    text: O «cordeles» para «cuerdas».
    reason: lexical_alternative
  - marker: c
    text: «Mis hijos» puede referirse literalmente a hijos o figurativamente al pueblo o a los habitantes que se han ido.
    reason: cultural_note
  - marker: d
    text: O «No hay nadie ya para extender mi tienda y levantar mis cortinas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלִי
  english_pob_choice: my tent
  chosen_spanish: mi tienda
  alternatives_spanish:
  - mi tienda de campaña
  - mi tabernáculo
  - mi morada
  lexicon: HALOT
  rationale: El hebreo conserva la imagen concreta de una tienda; en español, «tienda» mantiene esa metáfora sin introducir el peso cultual de «tabernáculo» ni la generalidad de «morada». En este contexto de cuerdas y cortinas, la imagen de una tienda es la más transparente.
- source_word: שֻׁדָּד
  english_pob_choice: is destroyed
  chosen_spanish: está destruida
  alternatives_spanish:
  - está saqueada
  - está devastada
  - está arruinada
  lexicon: HALOT
  rationale: El verbo puede abarcar ruina violenta, despojo o devastación. «Está destruida» comunica el estado resultante de forma natural en español y conserva la amplitud semántica sin cerrarla excesivamente a «saqueada».
- source_word: מֵיתָרַי
  english_pob_choice: my ropes
  chosen_spanish: mis cuerdas
  alternatives_spanish:
  - mis sogas
  - mis cordeles
  - mis cuerdas de tienda
  lexicon: HALOT
  rationale: La referencia es a las amarras de la tienda. «Cuerdas» es idiomático y claro en español; además preserva la opción inglesa de no forzar un tecnicismo. Se evita «sogas» por ser más pesada y menos acorde al registro.
- source_word: נִתָּקוּ
  english_pob_choice: are torn away
  chosen_spanish: están arrancadas
  alternatives_spanish:
  - están rotas
  - han sido desprendidas
  - están desgarradas
  lexicon: HALOT
  rationale: El verbo expresa desprendimiento violento o ruptura de la sujeción. «Arrancadas» reproduce bien esa imagen de ser quitadas de su lugar, con un verbo natural en español para objetos sujetos por cuerdas.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis muchachos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en este lamento poético la expresión puede referirse literalmente a hijos o figurativamente a los habitantes. «Mis hijos» conserva la fuerza afectiva y permite esa amplitud, mientras que «hijos varones» endurecería innecesariamente el español.
- source_word: יְצָאֻנִי
  english_pob_choice: have gone from me
  chosen_spanish: se han ido de mí
  alternatives_spanish:
  - han salido de mí
  - me han dejado
  - han partido de mí
  lexicon: HALOT
  rationale: La idea es de partida o alejamiento respecto del hablante. «Se han ido de mí» es natural y mantiene el matiz de pérdida sin añadir una localización no explícita.
- source_word: וְאֵינָם
  english_pob_choice: and they are no more
  chosen_spanish: y ya no existen
  alternatives_spanish:
  - y ya no están
  - y no son más
  - y han desaparecido
  lexicon: HALOT
  rationale: La expresión hebrea marca ausencia real desde la perspectiva del hablante. «Ya no existen» conserva la fuerza de desaparición total; es algo más enfático que «ya no están» y evita sugerir necesariamente muerte literal.
- source_word: אֵין נֹטֶה עוֹד אָהֳלִי
  english_pob_choice: There is no one left to stretch out my tent again
  chosen_spanish: No hay nadie que vuelva a extender mi tienda
  alternatives_spanish:
  - No hay nadie que la vuelva a montar
  - No queda quien tienda mi tienda otra vez
  - No hay quien vuelva a levantar mi tienda
  lexicon: HALOT
  rationale: נֹטֶה con tienda implica extenderla/presentarla como tienda. «Volver a extender» conserva el componente de restauración presente en עוֹד y mantiene la imagen literal, sin sobrecargar con «montar» o «levantar» como única opción.
- source_word: וּמֵקִים
  english_pob_choice: and set up
  chosen_spanish: ni a levantar
  alternatives_spanish:
  - ni a erigir
  - ni a poner en pie
  - ni a colocar
  lexicon: HALOT
  rationale: El participio expresa hacer que algo quede en pie. En coordinación con la tienda y sus cortinas, «levantar» funciona bien en español y conserva la imagen de restauración de la estructura.
- source_word: יְרִיעוֹתַי
  english_pob_choice: my curtains
  chosen_spanish: mis cortinas
  alternatives_spanish:
  - mis lonas
  - mis velos
  - mis telas de tienda
  lexicon: HALOT
  rationale: Se refiere a las cubiertas o paños de la tienda. «Cortinas» es una equivalencia natural y comprensible en español; aunque puede sonar doméstica, aquí preserva la imagen de los paños de una tienda mejor que términos más técnicos o más opacos.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y no introdujo cambios sustanciales; por ello se conserva la lectura base de destrucción de la tienda, ruptura de sus cuerdas, partida de los hijos y ausencia de quien restaure la estructura.
  spanish_consistency_notes:
  - Se mantiene «tienda» de forma consistente para אָהֳלִי, para preservar la imagen extendida en el versículo.
  - Se usa «cuerdas» para מֵיתָרַי como opción clara y compatible con el campo semántico de amarras de tienda.
  - 'Se conserva el paralelismo con dos acciones finales: extender la tienda y levantar sus cortinas.'
  - El texto evita términos eclesiásticos no motivados por el hebreo, como «tabernáculo», para no desplazar la metáfora original.
