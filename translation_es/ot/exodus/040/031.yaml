review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador no preserva bien el valor narrativo del wayyiqtol hebreo: וְרָחֲצוּ aquí describe una acción pasada en secuencia, no futuro. Sí acierta al mantener מִמֶּנּוּ como «de él», con nota para la alternativa instrumental, y «sus hijos» refleja bien וּבָנָיו en contexto sacerdotal.'
  spanish_quality_summary: 'La redacción actual suena poco natural y gramaticalmente defectuosa en español: «Y se lavarán de él Moisés, Aarón y sus hijos sus manos y sus pies» mezcla futuro con orden de palabras forzado y repetición posesiva innecesaria. Una formulación clara y digna es «De él lavaron Moisés, Aarón y sus hijos sus manos y sus pies[a]».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios «Moisés» y «Aarón» están bien. «De él» mantiene correctamente la decisión léxica auditada para מִמֶּנּוּ, con nota alternativa «con él».
  issues:
  - severity: high
    issue: 'Tiempo verbal incorrecto: «se lavarán»'
    rationale: El hebreo וְרָחֲצוּ es wayyiqtol narrativo pasado; el inglés auditado correctamente lo traduce «washed». El futuro español altera el sentido temporal del texto.
  - severity: high
    issue: Construcción española antinatural y poco clara
    rationale: «Y se lavarán de él Moisés, Aarón y sus hijos sus manos y sus pies» suena forzado y dificulta la comprensión. El orden debe ajustarse al español sin perder el sentido fuente.
  - severity: medium
    issue: Ubicación del anclaje de nota
    rationale: La nota explica «de él», pero el marcador está puesto en «sus hijos». Debe anclarse donde aparece la expresión explicada, o al menos al final de la frase pertinente.
  revised_spanish_text: De él[a] lavaron Moisés, Aarón y sus hijos sus manos y sus pies.
  revised_footnotes:
  - marker: a
    text: O «con él»; el hebreo dice más literalmente «de él», refiriéndose al lavacro.
    reason: lexical_alternative
