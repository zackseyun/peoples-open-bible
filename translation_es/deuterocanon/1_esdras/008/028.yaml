  - marker: b
    text: The Greek reads 'their divisions,' while the Hebrew parallel has a genealogical expression ('their enrollment by genealogy' / 'their lineage'). The translation follows the Greek as the primary witness for 1 Esdras.
    reason: alternative_reading
