    rationale: Aunque es idiomático y transmite confianza, la construcción preposicional puede sonar más cercana a «hope in you» que a la espera dirigida al destinatario; «te espero» preserva mejor el valor verbal básico con la nota alternativa para la esperanza.
  - severity: low
