translation:
  language: es
  text: 'Se acercó a ella, y la mujer dijo: «¿Eres tú Joab?». Él respondió: «Sí, yo soy». Entonces ella le dijo: «Escucha las palabras de tu sierva[a]». Él respondió: «Estoy escuchando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu esclava». El término hebreo es una autodesignación femenina de humildad y servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַב
  english_pob_choice: He came near
  chosen_spanish: Se acercó
  alternatives_spanish:
  - Vino cerca
  - Se llegó
  lexicon: HALOT
  rationale: קרב en qal expresa acercamiento físico. «Se acercó» es natural en español y conserva el movimiento sin añadir intención no explícita.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - hacia ella
  - junto a ella
  lexicon: HALOT
  rationale: La preposición con sufijo indica dirección hacia la mujer; «a ella» mantiene esa relación de destino de forma clara y sobria.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En este contexto narrativo אִשָּׁה se refiere simplemente a una mujer adulta, no a una esposa.
- source_word: הַאַתָּה יוֹאָב
  english_pob_choice: Are you Joab?
  chosen_spanish: ¿Eres tú Joab?
  alternatives_spanish:
  - ¿Eres Joab?
  - ¿Acaso eres Joab?
  lexicon: HALOT
  rationale: La pregunta busca identificación. En español, la inversión con pronombre explícito reproduce bien el matiz directo del hebreo sin forzar el orden.
- source_word: אָ֑נִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo
  lexicon: HALOT
  rationale: La forma aislada de la primera persona funciona como autoidentificación breve. «Yo soy» es breve, idiomática y conserva la sencillez del hebreo.
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escuchad
  lexicon: HALOT
  rationale: El imperativo de שמע pide atención. «Escucha» expresa mejor la apelación a una respuesta atenta que «oye» en español contemporáneo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - lo que dice
  lexicon: HALOT
  rationale: El constructo plural de דבר es literalmente «palabras de». Se preserva la forma y el tono del hebreo.
- source_word: אֲמָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu servidora
  - tu esclava
  lexicon: HALOT
  rationale: אָמָה es una autodesignación femenina deferente. «Sierva» mantiene el registro de humildad y servicio; «esclava» sería más fuerte pero menos natural en español aquí.
- source_word: שֹׁמֵעַ אָנֹכִי
  english_pob_choice: I am listening
  chosen_spanish: Estoy escuchando
  alternatives_spanish:
  - Escucho
  - Estoy oyendo
  lexicon: HALOT
  rationale: El participio con pronombre expresa atención continua. «Estoy escuchando» comunica bien esa acción en curso en español.
translation_notes:
  revision_awareness: El inglés POB pasó de «your female servant» a «your servant» para mayor naturalidad, sin perder el matiz femenino del hebreo. En español se conserva explícitamente «sierva» para reflejar ese rasgo de forma auditable, manteniendo la alternativa «tu esclava» como nota léxica.
  spanish_consistency_notes:
  - Se mantuvo «Joab» como nombre propio sin adaptación.
  - Se preservó la diferencia entre la autoidentificación breve «Yo soy» y la respuesta continua «Estoy escuchando».
  - Se eligió vocabulario sobrio y moderno, evitando arcaísmos innecesarios.
  - La nota [a] está anclada exactamente en «sierva[a]» en el texto.
