review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: alegría del corazón, alabanza al nombre de Dios, súplica al Señor y alcance por todo su οἶκος. Sin embargo, hay dos puntos mejorables: (1) ἐν εὐφρίᾳ καρδίας αὐτοῦ se expresa con más fidelidad y naturalidad como ''con alegría en su corazón'' que ''con alegría de corazón''; (2) παντὸς τοῦ οἴκου αὐτοῦ aquí apunta al conjunto doméstico/familiar, y ''por toda su casa'' puede sonar a edificio en español actual, mientras ''por toda su familia'' o ''por toda su casa'' con nota no es necesario. La solución principal ''al Señor'' para τοῦ προσώπου Κυρίου es aceptable si la nota preserva el hebraísmo literal.'
  spanish_quality_summary: El español es claro y digno, pero 'Con alegría de corazón' suena algo rígido y menos idiomático que 'Con alegría en su corazón'. Además, 'entonó alabanzas' es comprensible, aunque 'cantó alabanzas' fluye mejor y conserva el matiz hímnico sin afectación. 'Por toda su casa' es bíblico, pero en lectura neutral latinoamericana 'por toda su familia' comunica mejor el referente humano de οἶκος.
  glossary_alignment: 'No hay conflicto grave con el glosario del proyecto: θεοῦ → ''Dios'' está bien, κύριος → ''Señor'' es adecuado aquí porque el griego dice Κυρίου y no hay base suficiente para imponer ''Yahvé'' en este contexto de los Salmos de Salomón. La conservación del hebraísmo de ''rostro'' en nota está bien encaminada.'
  issues:
  - severity: medium
    issue: '''Con alegría de corazón'' suena menos natural y menos preciso que el giro correspondiente al griego.'
    rationale: ἐν εὐφρίᾳ καρδίας αὐτοῦ corresponde mejor a 'con alegría en su corazón' o 'con gozo en su corazón'; 'de corazón' en español puede leerse adverbialmente ('sinceramente') y desplaza el valor antropológico de καρδία.
  - severity: low
    issue: '''Entonó alabanzas'' es algo forzado en español corriente.'
    rationale: Aunque intenta reflejar ἐξύμνησεν, 'cantó alabanzas' o 'cantó alabanza' comunica mejor el sentido hímnico con mayor naturalidad eclesial.
  - severity: medium
    issue: '''Por toda su casa'' puede resultar ambiguo en español moderno.'
    rationale: παντὸς τοῦ οἴκου αὐτοῦ se refiere al hogar/familia/household, no a la construcción. 'Por toda su familia' evita ambigüedad y preserva el sentido colectivo humano.
  revised_spanish_text: Con alegría en su corazón cantó alabanzas al nombre de Dios, y suplicó al Señor[a] por toda su familia.
  revised_footnotes:
  - marker: a
    text: Lit., 'el rostro del Señor'; es decir, su presencia o favor.
    reason: lexical_alternative
  revision_rationale: Se ajusta el primer giro para reflejar mejor καρδία como 'corazón' interior; se mejora la naturalidad de ἐξύμνησεν con 'cantó alabanzas'; y se aclara οἶκος como referente familiar con 'familia', evitando una lectura física de 'casa'. Se mantiene 'al Señor' en el texto principal con nota literal sobre 'el rostro del Señor', lo que preserva el hebraísmo sin volver torpe el español.
