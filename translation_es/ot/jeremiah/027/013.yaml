revisions:
- from: ¿Por qué morirás tú y tu pueblo[a] por la espada, por el hambre y por la peste, como Yahvé ha hablado acerca de la nación que no servirá al rey de Babilonia?
  to: ¿Por qué morirán tú y tu pueblo por la espada, por el hambre y por la peste[a], como Yahvé ha hablado acerca de la nación que no servirá al rey de Babilonia?
  rationale: Se corrige la formulación verbal para reflejar de manera natural en español que la advertencia se dirige al rey junto con su pueblo, preservando el sentido del plural hebreo sin la discordancia de 'morirás tú y tu pueblo'. También se reemplaza la nota por la alternativa léxica documentada en la auditoría inglesa para דֶּבֶר, manteniendo la práctica de notas del proyecto. No se requieren cambios doctrinales ni adjudicación adicional.
