id: JDG.7.1
reference: Judges 7:1
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם יְרֻבַּ֜עַל ה֣וּא גִדְע֗וֹן וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אִתּ֔/וֹ וַֽ/יַּחֲנ֖וּ עַל עֵ֣ין חֲרֹ֑ד וּ/מַחֲנֵ֤ה מִדְיָן֙ הָיָה ל֣/וֹ מִ/צָּפ֔וֹן מִ/גִּבְעַ֥ת הַ/מּוֹרֶ֖ה בָּ/עֵֽמֶק־־־׃
translation:
  text: Then Jerubbaal (that is[a], Gideon) and all the people who were with him rose early and camped by the spring of Harod. The camp of Midian was north of him, by the hill of Moreh in the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by En-harod.” The Hebrew name literally includes the word for “spring.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early in the morning
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of שׁכם commonly means to rise early. 'Rose early' is idiomatic modern English and preserves the temporal nuance without unnecessary expansion.
- source_word: יְרֻבַּעַל הוּא גִדְעוֹן
  chosen: Jerubbaal (that is, Gideon)
  alternatives:
  - Jerubbaal—he is Gideon
  - Jerubbaal, that is Gideon
  lexicon: HALOT
  rationale: The appositional pronoun הוּא identifies Jerubbaal with Gideon. Parenthetical 'that is' communicates the explanatory force naturally in English while preserving both names.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  chosen: and all the people who were with him
  alternatives:
  - and all the troops with him
  - and all the people with him
  lexicon: HALOT
  rationale: עָם is broadly 'people.' Although the context is military, the Hebrew does not use a more specific military term here, so 'people' is retained rather than 'troops.'
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - set up camp
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' 'Camped' is readable modern English; 'encamped' is slightly more formal but not necessary.
- source_word: עַל עֵין חֲרֹד
  chosen: by the spring of Harod
  alternatives:
  - at En-harod
  - by En-harod
  lexicon: HALOT
  rationale: עֵין can denote a spring as a place-name element. Rendering it as 'spring of Harod' translates the meaning rather than simply transliterating the toponym, aiding readability while preserving the location.
- source_word: וּמַחֲנֵה מִדְיָן
  chosen: The camp of Midian
  alternatives:
  - Midian's camp
  - the Midianite camp
  lexicon: HALOT
  rationale: The construct phrase is most directly 'the camp of Midian.' 'Midianite camp' is possible dynamically, but the gentilic is not explicit in the Hebrew.
- source_word: הָיָה לוֹ
  chosen: was north of him
  alternatives:
  - was his to the north
  - was north of them
  lexicon: HALOT
  rationale: לּוֹ with spatial expression indicates relation to Gideon's position. The singular pronoun is retained as 'him,' referring to Gideon as representative leader, matching the Hebrew rather than smoothing to plural 'them.'
- source_word: מִצָּפוֹן
  chosen: north of him
  alternatives:
  - to his north
  - on the north side
  lexicon: HALOT
  rationale: The preposition מן with צָפוֹן marks location on the north side relative to Gideon’s camp. 'North of him' is concise and natural.
- source_word: מִגִּבְעַת הַמּוֹרֶה
  chosen: by the hill of Moreh
  alternatives:
  - from the hill of Moreh
  - near the hill of Moreh
  lexicon: HALOT
  rationale: The מן here is locative in the larger spatial description, not necessarily separative. 'By the hill of Moreh' communicates proximity in idiomatic English within the topographical notice.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  - in the vale
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley. 'In the valley' is the most straightforward rendering for the terrain reference.
