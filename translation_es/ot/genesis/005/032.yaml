translation:
  language: es
  text: Cuando Noé tenía quinientos años, él engendró[a] a Sem, a Cam y a Jafet[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Noé engendró».'
    reason: previous_rendering
  - marker: b
    text: El orden «Sem, Cam y Jafet» sigue el texto hebreo; esa secuencia no necesariamente indica el orden de nacimiento ni que los tres nacieran en el mismo año.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: When ... was
  chosen_spanish: Cuando ... tenía
  alternatives_spanish:
  - Y sucedió que ... tenía
  - Cuando ... fue
  lexicon: HALOT
  rationale: La forma hebrea introduce una circunstancia temporal. En español, «Cuando ... tenía» comunica de modo natural esa relación sin añadir fórmula narrativa innecesaria.
- source_word: בֶּן חֲמֵשׁ מֵאוֹת שָׁנָה
  english_pob_choice: five hundred years old
  chosen_spanish: quinientos años
  alternatives_spanish:
  - de quinientos años
  - a los quinientos años
  lexicon: HALOT
  rationale: La construcción hebrea expresa edad. En español, «quinientos años» es la forma más natural y fiel; el verbo «tenía» ya fija el valor de edad.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  - engendró como padre
  lexicon: HALOT
  rationale: El hifil de ילד con sujeto masculino expresa «engendrar / ser padre de». «Engendró» conserva la fuerza léxica y la concisión del texto.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española establecida y ampliamente inteligible.
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: HALOT
  rationale: Nombre propio transliterado según la convención española habitual.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Ham
  lexicon: HALOT
  rationale: Nombre propio con la forma española tradicional y reconocible.
- source_word: יָפֶת
  english_pob_choice: Japheth
  chosen_spanish: Jafet
  alternatives_spanish:
  - Jafet
  lexicon: HALOT
  rationale: Nombre propio con la forma española estándar.
- source_word: אֶת שֵׁם אֶת חָם וְאֶת יָפֶת
  english_pob_choice: Shem, Ham, and Japheth
  chosen_spanish: Sem, a Cam y a Jafet
  alternatives_spanish:
  - Sem, Cam y Jafet
  - Sem, a Cam, y a Jafet
  lexicon: HALOT
  rationale: El hebreo enumera los nombres con marcador de objeto directo. En español, las preposiciones repetidas son naturales con nombres personales y ayudan a mantener la individualidad de cada hijo sin forzar una literalidad extraña.
theological_decisions:
- issue: Orden de los nombres y posible implicación de orden de nacimiento
  english_pob_reading: Retain the Hebrew order of names without implying that all three were born when Noah turned five hundred.
  chosen_spanish_reading: 'Conservar el orden hebreo: Sem, Cam y Jafet, sin deducir de esa secuencia el orden de nacimiento ni que los tres nacieran exactamente en el mismo año.'
  alternative_spanish_readings:
  - Reordenar los nombres para sugerir un probable orden de nacimiento
  - Explicitar en el texto principal que los tres nacieron en el año quinientos de Noé
  rationale: La secuencia hebrea debe preservarse, pero el texto no obliga a resolver la cuestión cronológica. Mantener el orden evita importar una armonización al cuerpo principal y deja intacta la tensión documental.
  doctrine_reference: Preservar la tensión textual sin armonizarla en el texto principal.
translation_notes:
  revision_awareness: El texto inglés más reciente mantuvo sin cambios la decisión de leer la cláusula temporal de forma natural y de conservar el orden hebreo de los nombres. La redacción española refleja esa misma línea, con equivalencias naturales para la edad y el verbo de engendrar, sin resolver la posible tensión sobre el orden de nacimiento.
  spanish_consistency_notes:
  - Se usa «Noé» para el nombre propio y «engendró» para ילד en hifil, manteniendo la fuerza causal/parental del verbo.
  - Se conserva la secuencia nominal hebrea «Sem, Cam y Jafet», pero con marcas preposicionales naturales en español.
  - No se introduce lenguaje eclesiástico innecesario; la redacción busca claridad bíblica y fidelidad al hebreo.
