translation:
  language: es
  text: He hallado a David, mi siervo[a]; con mi aceite santo lo he ungido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hallé a David, mi siervo; con mi aceite santo lo ungí». Los perfectos hebreos también pueden traducirse como pasados simples en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי
  english_pob_choice: I have found
  chosen_spanish: Yo he hallado
  alternatives_spanish:
  - Yo he encontrado
  - Yo encontré
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción cumplida con vigencia en el discurso divino. En español, «he hallado» conserva bien ese matiz retrospectivo y resulta natural en un registro bíblico digno.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Aunque en muchos contextos españoles «siervo» suaviza el término, la POB inglesa documenta la fuerza léxica de עבד y solo la atenúa cuando el contexto lo exige. Aquí, el lenguaje de pacto y elección real permite mantener la dureza semántica de «esclavo» sin negar la dignidad relacional del término.
- source_word: בְּשֶׁמֶן
  english_pob_choice: with ... oil
  chosen_spanish: con mi óleo
  alternatives_spanish:
  - con mi aceite
  - en mi óleo
  lexicon: HALOT
  rationale: La preposición ב en un contexto de unción se vierte de modo idiomático como «con». «Óleo» preserva mejor el registro cultual que «aceite», aunque ambos son posibles.
- source_word: קָדְשִׁי
  english_pob_choice: my holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - santo mío
  lexicon: HALOT
  rationale: «Santo» expresa la cualidad de apartamiento/consagración. Se evita «sagrado» por ser menos preciso en el registro bíblico y por sonar más general.
- source_word: מְשַׁחְתִּיו
  english_pob_choice: I have anointed him
  chosen_spanish: lo he ungido
  alternatives_spanish:
  - lo ungí
  - lo he consagrado por unción
  lexicon: HALOT
  rationale: «Ungir» es el equivalente técnico más fiel para מָשַׁח. Se conserva el perfecto español para mantener la misma relación aspectual que el hebreo y la solución inglesa auditada.
theological_decisions:
- issue: Tensión entre la designación real histórica de David y la resonancia mesiánica del salmo
  english_pob_reading: Retain the historical reference to David without importing an explicit messianic title into the translation.
  chosen_spanish_reading: Conservar la referencia histórica a David sin introducir un título mesiánico explícito en el texto.
  alternative_spanish_readings:
  - David, mi ungido
  - David, mi Mesías
  rationale: El verso nombra a David de manera directa y habla de su unción; traducirlo como si ya dijera «Mesías» excedería el hebreo. La posible tipología mesiánica queda disponible para la lectura canónica, pero no se impone en la línea principal.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el pasaje base sin cambios textuales reportados en la revisión más reciente; el ajuste principal fue la elección española entre «esclavo» y «siervo» para reflejar la tensión léxica documentada en el inglés auditado.
  spanish_consistency_notes:
  - Se mantiene la traducción de יהוה como «Yahvé» en este proyecto, pero este versículo no lo contiene.
  - Se usó «he hallado» / «he ungido» para reflejar el perfecto hebreo con relevancia presente, en paralelo con la solución inglesa auditada.
  - «Óleo» se eligió por registro bíblico, aunque «aceite» sería comprensible en español general.
