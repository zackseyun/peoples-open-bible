translation:
  language: es
  text: En aquel día, Israel será el tercero con Egipto y Asiria, una bendición en medio de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en medio del país'. El hebreo אֶרֶץ puede significar tanto 'tierra' como 'país'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una equivalencia natural en español. 'Aquel' mantiene el matiz solemne y de referencia escatológica de la expresión hebrea y del inglés POB.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - vendrá a ser
  lexicon: HALOT
  rationale: El imperfecto hebreo se vierte con futuro simple en español. 'Será' es directo y mantiene la relación predicativa del texto.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin adaptación.
- source_word: שְׁלִישִׁיָּה
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - un tercero
  - tercer miembro
  lexicon: HALOT
  rationale: La forma femenina ordinal funciona sustantivamente en hebreo. En español, 'el tercero' conserva la idea de un tercer integrante del conjunto con Egipto y Asiria, sin añadir interpretación innecesaria.
- source_word: לְמִצְרַיִם וּלְאַשּׁוּר
  english_pob_choice: with Egypt and Assyria
  chosen_spanish: con Egipto y Asiria
  alternatives_spanish:
  - para Egipto y Asiria
  - junto con Egipto y Asiria
  lexicon: HALOT
  rationale: El ל aquí expresa asociación dentro de un grupo. 'Con' comunica bien la relación triádica destacada por el POB en inglés.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - una fuente de bendición
  lexicon: HALOT
  rationale: Sustantivo predicativo claro y natural en español. 'Bendición' conserva la fuerza covenantal del hebreo sin ampliarla.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - en el corazón de
  lexicon: HALOT
  rationale: '''En medio de'' refleja fielmente la imagen espacial de בְּקֶרֶב y es idiomático en español.'
- source_word: הָאָרֶץ
  english_pob_choice: earth / land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra/país
  lexicon: HALOT
  rationale: El POB inglés opta por 'earth' con nota alternativa 'land'. En español, 'la tierra' mantiene la amplitud semántica y evita estrechar prematuramente el alcance universal del versículo. La nota preserva la alternativa 'tierra/país' implícita en el hebreo.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth, with 'land' as a lexical alternative
  chosen_spanish_reading: la tierra, con 'país' o 'tierra' como alternativa léxica cercana
  alternative_spanish_readings:
  - la tierra
  - el país
  rationale: El contexto inmediato presenta a Egipto, Asiria e Israel en una relación de bendición de alcance amplio; por eso 'la tierra' conserva mejor la lectura universal del POB. La alternativa 'país' existe léxicamente, pero reduce el horizonte del texto y no se privilegia en el cuerpo principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Alineado con la revisión inglesa más reciente, que no introdujo cambios sustantivos y mantuvo la lectura óptima-equivalente del versículo. La versión española sigue esa misma línea sin añadir interpretaciones ajenas al audit trail.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como default del proyecto para el tetragrámaton, aunque este versículo no lo contiene.
  - '''Asiria'' y ''Egipto'' se mantienen como nombres propios estándar en español.'
  - Se usa 'bendición' y no 'bendecimiento' para respetar el sustantivo hebreo predicativo.
  - La nota de pie se vincula a 'la tierra' para preservar la alternativa léxica documentada en el POB inglés.
