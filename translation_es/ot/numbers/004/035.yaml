translation:
  language: es
  text: desde los treinta años en adelante[a], hasta los cincuenta años, todo el que entra al servicio[b] para hacer la obra en la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde la edad de treinta años en adelante».'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «servicio» (צָבָא) también puede expresar deber organizado o una compañía de servicio, reflejando la estructura del trabajo levítico.
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  english_pob_choice: from thirty years old and upward
  chosen_spanish: desde los treinta años y más
  alternatives_spanish:
  - desde la edad de treinta años y en adelante
  - desde los treinta años hacia arriba
  lexicon: HALOT
  rationale: La expresión hebrea fija un punto de inicio de edad y añade la idea de continuidad ascendente. En español, «desde los treinta años y más» conserva el umbral y evita una paráfrasis demasiado explicativa.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: up to fifty years old
  chosen_spanish: hasta los cincuenta años
  alternatives_spanish:
  - hasta la edad de cincuenta años
  - incluso hasta los cincuenta años
  lexicon: HALOT
  rationale: Se mantiene el límite superior de edad con una formulación natural y clara en español, sin añadir información ajena al texto.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who enters
  chosen_spanish: todo el que entra
  alternatives_spanish:
  - todos los que entran
  - todo aquel que entra
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva para designar a quienes ingresan a esta categoría de servicio. «Todo el que entra» conserva el valor general sin sobredeterminar el matiz.
- source_word: לַצָּבָא
  english_pob_choice: for service
  chosen_spanish: al servicio
  alternatives_spanish:
  - para el servicio
  - para la labor organizada
  - para el deber
  lexicon: HALOT
  rationale: En este contexto levítico, צָבָא apunta a una obligación o turno de servicio ordenado, no a guerra. «Al servicio» sigue de cerca el valor funcional y mantiene la fuerza institucional del término.
- source_word: לַעֲבֹדָה
  english_pob_choice: to do the work
  chosen_spanish: para hacer la obra
  alternatives_spanish:
  - para hacer el trabajo
  - para cumplir la labor
  - para ministrar
  lexicon: HALOT
  rationale: עֲבֹדָה designa trabajo/servicio. «Obra» permite un registro bíblico digno sin cargar el término con una lectura eclesiástica posterior como «ministerio».
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo del encuentro
  lexicon: HALOT
  rationale: Se opta por la designación tradicional y transparente del santuario portátil. «Tabernáculo de reunión» es la forma establecida y comunica bien el referente cultual del hebreo.
theological_decisions:
- issue: Rango de edad para el servicio levítico
  english_pob_reading: from thirty years old and upward, up to fifty years old
  chosen_spanish_reading: desde los treinta años y más, hasta los cincuenta años
  alternative_spanish_readings:
  - desde la edad de treinta años hasta los cincuenta
  - desde los treinta años en adelante, hasta los cincuenta
  rationale: El versículo fija un marco normativo para el servicio levítico; la traducción debe preservar tanto el inicio como el límite sin suavizarlos ni expandirlos.
  doctrine_reference: Números 4:35; cf. Números 8:24-26
- issue: Sentido de צָבָא en contexto cultual
  english_pob_reading: enters the service
  chosen_spanish_reading: entra al servicio
  alternative_spanish_readings:
  - entra en el deber
  - entra al servicio organizado
  - entra en la formación de servicio
  rationale: La POB entiende צָבָא como servicio organizado o deber estructurado, no como guerra literal. La traducción española conserva esa tensión funcional sin militarizar el texto.
  doctrine_reference: Números 4:3, 23, 30, 35
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que cambió una formulación más general por «enters the service», por considerarse una expresión más natural y precisa para לַצָּבָא. En español se reflejó ese mismo ajuste con «entra al servicio».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Tabernáculo de reunión» se conserva como término cultual estable para אֹהֶל מוֹעֵד.
  - No se sustituyó «obra» por «ministerio» para no introducir una carga eclesiástica posterior.
