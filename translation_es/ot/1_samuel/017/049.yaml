translation:
  language: es
  text: Entonces David metió su mano en la bolsa[a], tomó de allí una piedra, la lanzó con la honda y golpeó al filisteo en la frente. La piedra se hundió en su frente[b], y cayó sobre su rostro al suelo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en la bolsa de cuero». El término hebreo es amplio y aquí se refiere al contenedor de las piedras de David.
    reason: lexical_alternative
  - marker: b
    text: O, «La piedra se incrustó en su frente».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cayó sobre su rostro al suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ אֶל הַכֶּלִי
  english_pob_choice: reached his hand into the bag
  chosen_spanish: metió su mano en el recipiente
  alternatives_spanish:
  - metió la mano en el bolso
  - extendió su mano hacia el recipiente
  - metió su mano en la bolsa
  lexicon: HALOT
  rationale: El hebreo expresa una acción dirigida de la mano hacia/entro del כְּלִי. En español, «metió su mano en» conserva la inmediatez de la acción y evita un calco torpe. «Recipiente» mantiene la amplitud semántica documentada para כְּלִי sin fijar indebidamente un tipo de bolsa.
- source_word: הַכֶּלִי
  english_pob_choice: the bag
  chosen_spanish: el recipiente
  alternatives_spanish:
  - la bolsa
  - la bolsa de cuero
  - el bolso
  lexicon: HALOT
  rationale: כְּלִי es un término amplio en hebreo; el contexto indica el contenedor de las piedras. Aunque «bag» en inglés resuelve el contexto, en español «recipiente» preserva mejor la amplitud del término base y permite la nota alternativa contextual «bolsa».
- source_word: אֶבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una piedra de arrojar
  - una roca
  lexicon: HALOT
  rationale: «Piedra» es la equivalencia natural y precisa para el proyectil de la honda. «Roca» sería demasiado grande o marcado en español para este contexto.
- source_word: וַיְקַלַּע
  english_pob_choice: slung it
  chosen_spanish: la hizo girar con la honda
  alternatives_spanish:
  - la lanzó con la honda
  - la arrojó con la honda
  - la hizo volar con la honda
  lexicon: HALOT
  rationale: El verbo alude al acto específico de usar la honda. En español, «la hizo girar con la honda» conserva el procedimiento implícito sin añadir más de lo que el hebreo dice; evita un término demasiado general como «lanzó» si no explicita el instrumento.
- source_word: וַיַּךְ אֶת הַפְּלִשְׁתִּי אֶל מִצְחוֹ
  english_pob_choice: struck the Philistine on his forehead
  chosen_spanish: golpeó al filisteo en la frente
  alternatives_spanish:
  - hirió al filisteo en la frente
  - pegó al filisteo en la frente
  - lo golpeó en la frente
  lexicon: HALOT
  rationale: El hebreo usa un verbo de impacto directo. «Golpeó» reproduce bien la fuerza del evento y «en la frente» refleja el valor local de אֶל en este contexto.
- source_word: וַתִּטְבַּע הָאֶבֶן בְּמִצְחוֹ
  english_pob_choice: The stone sank into his forehead
  chosen_spanish: La piedra se hundió en su frente
  alternatives_spanish:
  - La piedra se incrustó en su frente
  - La piedra se embebió en su frente
  - La piedra quedó clavada en su frente
  lexicon: HALOT
  rationale: La forma verbal comunica hundimiento/penetración. «Se hundió en» sigue de cerca la imagen hebrea sin exagerar el detalle anatómico; «incrustó» sería más interpretativo y «quedó clavada» demasiado específico.
- source_word: וַיִּפֹּל עַל פָּנָיו אָֽרְצָה
  english_pob_choice: he fell on his face to the ground
  chosen_spanish: cayó sobre su rostro hasta el suelo
  alternatives_spanish:
  - cayó de cara a tierra
  - cayó sobre su rostro a tierra
  - cayó sobre su rostro al suelo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «cayó sobre su rostro, a tierra». «Sobre su rostro» preserva la imagen, y «hasta el suelo» comunica el movimiento direccional de אָרְצָה con un registro natural y formal en español.
theological_decisions:
- issue: Término étnico/gentilicio para הַפְּלִשְׁתִּי
  english_pob_reading: the Philistine
  chosen_spanish_reading: el filisteo
  alternative_spanish_readings:
  - el filisteo aquel
  - el filisteo enemigo
  rationale: 'No hay una tensión teológica aquí, pero sí una decisión de consistencia histórica y narrativa: el hebreo señala al combatiente como filisteo, no requiere expansión interpretativa.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente en la cláusula final: se prefirió una formulación más cercana al hebreo («cayó sobre su rostro hasta el suelo») en lugar de una paráfrasis más idiomática. También se mantuvo la equivalencia óptima para el verbo de honda, evitando tanto la vaguedad como la sobreexplicación.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en la tradición del proyecto solo cuando el texto lo exigiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo «filisteo» para el etnónimo, con artículo definido singular como en el relato narrativo.
  - Se eligió «frente» para מִצְחֹו por claridad y naturalidad, conservando la referencia anatómica directa.
