translation:
  language: es
  text: 'Por eso, esto dice Yahvé, el Dios de Israel: «He aquí, yo voy a traer desastre[a] sobre Jerusalén y Judá, de modo que a todo el que lo oiga le zumbarán los dos oídos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidad». El hebreo רָעָה aquí se refiere a un juicio desastroso, no a mal moral.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «le zumbarán los dos oídos», expresión de conmoción u horror ante la noticia.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton con la forma estándar del proyecto en español, en lugar de sustituirlo por un título. 'Yahvé' mantiene la referencia personal y auditiva del nombre revelado.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa la fuerza inferencial del hebreo en un español natural y digno, sin perder el vínculo causal con el contexto previo.
- source_word: כֹּה אָמַר
  english_pob_choice: this is what ... says
  chosen_spanish: esto dice ...
  alternatives_spanish:
  - así dice ...
  - esto es lo que ... dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera clara y directa; 'esto dice' reproduce el anuncio solemne sin cargarlo de arcaísmo innecesario.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: La construcción genitiva se refleja de forma directa y natural en español, manteniendo el matiz pactual e identificador del original.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Miren, yo
  alternatives_spanish:
  - He aquí que yo
  - Vean, yo
  lexicon: HALOT
  rationale: Se preserva el valor deíctico y enfático del hebreo con una invitación a atender el anuncio. 'Miren' suena más natural en español moderno que un calco rígido, y el 'yo' explícito mantiene el énfasis del sujeto.
- source_word: מֵבִיא
  english_pob_choice: bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción divina inminente; 'traigo' comunica esa inmediatez en español con concisión y fuerza profética.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - desgracia
  lexicon: HALOT
  rationale: En contexto de juicio, רָעָה no significa mal moral sino desastre punitivo. 'Desastre' comunica el impacto catastrófico sin atribuir maldad moral a Dios.
- source_word: עַל יְרוּשָׁלַם וִיהוּדָה
  english_pob_choice: on Jerusalem and Judah
  chosen_spanish: sobre Jerusalén y Judá
  alternatives_spanish:
  - contra Jerusalén y Judá
  - sobre Jerusalén y sobre Judá
  lexicon: HALOT
  rationale: '''Sobre'' refleja bien la carga de juicio que cae encima de ambas entidades, manteniendo la imagen preposicional del hebreo y un español fluido.'
- source_word: אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - para que
  - así que
  lexicon: HALOT
  rationale: Introduce con claridad la consecuencia del desastre en español formal, sin forzar una finalidad que el contexto no exige.
- source_word: כָּל שֹׁמְעָיו
  english_pob_choice: everyone who hears of it
  chosen_spanish: a todos los que lo oigan
  alternatives_spanish:
  - a todos los que lo escuchen
  - a cualquiera que lo oiga
  lexicon: HALOT
  rationale: El sufijo se refiere naturalmente al desastre/noticia del juicio. 'Lo oigan' conserva el referente implícito y el alcance universal de כָּל.
- source_word: תִּצַּלְנָה שְׁתֵּי אָזְנָיו
  english_pob_choice: both ears ... will tingle
  chosen_spanish: les zumbarán ambos oídos
  alternatives_spanish:
  - les sonarán ambos oídos
  - les tintinarán ambos oídos
  lexicon: HALOT
  rationale: Se reproduce el modismo hebreo de reacción física ante una noticia estremecedora. 'Zumbarán' comunica el efecto auditivo y la extrañeza del giro idiomático en un español comprensible.
theological_decisions:
- issue: Sentido de רָעָה en un acto divino de juicio
  english_pob_reading: disaster, not moral evil
  chosen_spanish_reading: desastre, no mal moral
  alternative_spanish_readings:
  - calamidad, no maldad
  - desgracia, no perversidad
  rationale: El texto presenta a Yahvé como quien trae juicio devastador. Traducir רָעָה como 'desastre' evita sugerir que Dios sea autor de mal moral y conserva el sentido punitivo del pasaje.
  doctrine_reference: Principio de fidelidad léxica al contexto; distinción entre juicio divino y mal moral.
- issue: Modismo de las orejas que zumban
  english_pob_reading: Hebrew idiom expressing shock or horror at the report
  chosen_spanish_reading: modismo que expresa conmoción ante la noticia
  alternative_spanish_readings:
  - giro idiomático para asombro
  - expresión de horror o estremecimiento
  rationale: El texto no describe un fenómeno auditivo literal, sino la reacción de horror ante la noticia del desastre. Se conserva el modismo con una equivalencia española que no lo aplana ni lo explica de más en el cuerpo del versículo.
  doctrine_reference: Principio de equivalencia idiomática; respeto por el valor figurado del texto original.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó la relación consecutiva a 'so that' por naturalidad. En español se reflejó con 'de modo que', manteniendo la función resultativa sin volverla finalidad indebida. También se respetó la decisión auditada de traducir רָעָה como calamidad/desastre en contexto de juicio y de conservar el modismo auditivo de los oídos que zumban.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para el tetragrámaton.
  - '''Dios de Israel'' se mantuvo como construcción natural y fiel al hebreo.'
  - El plural 'ambos oídos' conserva el paralelismo de שְׁתֵּי אָזְנָיו.
  - La puntuación y comillas siguen el uso editorial de español moderno.
  - No se empleó 'SEÑOR' ni 'Cristo', pues no corresponden al pasaje ni al estándar auditado.
