translation:
  language: es
  text: No venderán nada de ello[a], ni lo intercambiarán, ni pasará la primicia de la tierra, porque es santo para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las primicias de la tierra' o 'la primera porción de la tierra'; el hebreo רֵאשִׁית הָאָרֶץ puede resaltar tanto la parte primera/escogida de la tierra como su carácter de primicia consagrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְכְּרוּ
  english_pob_choice: sell
  chosen_spanish: venderán
  alternatives_spanish:
  - comerciarán
  - dispondrán de
  lexicon: HALOT
  rationale: El verbo expresa una venta/prohibición de enajenación en un contexto legal de porción sagrada; 'venderán' es la equivalencia directa y natural en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: any of it
  chosen_spanish: nada de ello
  alternatives_spanish:
  - algo de ello
  - ninguna parte de ello
  lexicon: HALOT
  rationale: La construcción negativa con el sufijo remite a la porción previamente delimitada; en español, 'nada de ello' comunica la prohibición completa sin forzar una literalidad extraña.
- source_word: יָמֵר
  english_pob_choice: exchange
  chosen_spanish: lo cambiarán
  alternatives_spanish:
  - lo intercambiarán
  - lo permutarán
  lexicon: HALOT
  rationale: El verbo denota intercambio o sustitución; 'cambiar' conserva el sentido legal y es idiomático en español.
- source_word: יעבור
  english_pob_choice: pass over to another
  chosen_spanish: pasará
  alternatives_spanish:
  - será transferida
  - pasará a otro
  lexicon: HALOT
  rationale: Aunque el inglés explicita el matiz de transferencia, el hebreo solo dice 'pasar'. En español, 'pasará' mantiene la imagen verbal y el contexto legal da por entendido el desplazamiento de la porción.
- source_word: רֵאשִׁית הָאָרֶץ
  english_pob_choice: the firstfruits of the land
  chosen_spanish: la primicia de la tierra
  alternatives_spanish:
  - la primera parte de la tierra
  - la porción principal de la tierra
  lexicon: HALOT
  rationale: '''Primicia'' conserva tanto la idea de ''primer fruto'' como la de ''primera porción''; es más natural que una glosa larga y mantiene la tensión entre sentido agrícola y porción consagrada.'
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: cosa santa
  alternatives_spanish:
  - santa
  - consagrada
  lexicon: HALOT
  rationale: En este cierre predicativo, 'cosa santa' expresa mejor en español el estado de pertenencia consagrada del terreno que un adjetivo suelto, y evita ambigüedad de género respecto a 'tierra/porción'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la norma del proyecto; 'para' refleja la dedicación/belonging del hebreo ל en un contexto de santidad consagrada.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige transliterar el Tetragrámaton con un nombre audible y transparente. 'Yahvé' es la forma estándar en español para este marco editorial y evita el reemplazo reverencial por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Estatus sagrado del terreno
  english_pob_reading: for it is holy to Yahweh
  chosen_spanish_reading: porque es cosa santa para Yahvé
  alternative_spanish_readings:
  - porque es santo para Yahvé
  - porque es consagrado a Yahvé
  rationale: El hebreo presenta una declaración de estado sagrado, no solo una cualidad moral. 'Cosa santa' mantiene el valor de consagración del objeto/porción en un español natural.
  doctrine_reference: HALOT; uso contextual de קֹדֶשׁ
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB al reflejar רֵאשִׁית הָאָרֶץ como 'firstfruits of the land' en vez de una glosa más general, y omite cualquier añadido explícito de 'a otro' porque el hebreo solo dice 'pasará'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en vez de 'SEÑOR' para la cohesión terminológica del proyecto.
  - '''Venderán'' y ''cambiarán'' conservan el paralelismo legal del hebreo con un registro claro y bíblico.'
  - '''Primicia'' se usa como equivalente flexible para רֵאשִׁית, sin comprometerse exclusivamente con imaginería agrícola en la línea principal.'
