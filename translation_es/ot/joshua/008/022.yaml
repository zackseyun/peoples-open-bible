base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/022.yaml
  text: And these came out from the city to meet them[a], so that they were in the midst of Israel, these on one side and those on the other[b]; and they struck them down until he left him neither survivor nor fugitive.
  footnotes:
  - marker: a
    text: 'Hebrew: ''these from this side and those from that side,'' an idiom indicating that Israel hemmed them in from both sides.'
    reason: lexical_alternative
  - marker: b
    text: Or, more idiomatically, 'until he left him no survivor or fugitive,' meaning that none were left alive or able to escape.
    reason: lexical_alternative
