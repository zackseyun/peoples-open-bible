base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/007.yaml
  text: Be strong and courageous[a]. Do not fear or be dismayed before the king of Assyria or before all the multitude that is with him[b], for there are more with us than with him.
  footnotes:
  - marker: a
    text: Or 'all the army that is with him.' The Hebrew word can denote a multitude or mass of troops in context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for with us is more than with him,' an elliptical comparison clarified by the following verse.
    reason: lexical_alternative
