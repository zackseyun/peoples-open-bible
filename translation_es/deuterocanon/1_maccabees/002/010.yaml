revisions:
- from: ¿Qué nación no ha heredado un reino y ha saqueado sus despojos?[a]
  to: ¿Qué nación no ha heredado un reino y se ha apoderado de sus despojos?[a]
  rationale: Se reemplaza «ha saqueado» por «se ha apoderado de» para reflejar con más precisión ἐκράτησεν como posesión o toma de control, no el acto de saqueo. Se conserva «despojos» para σκῦλα y se ajusta la nota para eliminar la alternativa menos precisa «saqueo».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:46:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador acierta en la estructura retórica y en «¿Qué nación… no ha heredado un reino…?», y «sus despojos» refleja bien τῶν σκύλων αὐτῆς. Sin embargo, «ha saqueado» no corresponde bien a ἐκράτησεν. El griego expresa apoderarse, tomar posesión o adueñarse de los despojos, no realizar el acto de saquear. Esto desplaza el foco desde la posesión del botín al acto de pillaje.
  spanish_quality_summary: 'El español es legible y digno, pero «ha saqueado sus despojos» suena menos natural y algo semánticamente torpe: uno saquea una ciudad o un pueblo, no normalmente «sus despojos». «Se ha apoderado de sus despojos» o «ha tomado sus despojos» fluye mejor y preserva el sentido del griego.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Nación», «heredado», «reino» y «despojos» están bien alineados. La corrección necesaria es lexical y semántica en ἐκράτησεν: conviene «se ha apoderado de» o «ha tomado», no «ha saqueado».'
  issues:
  - severity: high
    issue: «ha saqueado» sobrerrepresenta ἐκράτησεν
    rationale: κρατέω aquí significa apoderarse de, tomar control de, hacerse con. «Saquear» introduce una acción distinta y más específica que no está en el verbo griego.
  - severity: medium
    issue: La combinación «saqueado sus despojos» es poco idiomática
    rationale: En español, «saquear» suele tomar como objeto una ciudad, casa o territorio. Con «despojos», la colocación resulta forzada; el griego habla de tomar posesión del botín.
  - severity: low
    issue: La nota al pie ofrece «saqueo» como alternativa para σκῦλα
    rationale: σκῦλα denota el botín o los despojos mismos, no el acto de saquear. «Botín» o «despojos» son mejores alternativas léxicas que «saqueo».
  revised_spanish_text: ¿Qué nación no ha heredado un reino y se ha apoderado de sus despojos?[a]
  revised_footnotes:
  - marker: a
    text: «Despojos» mantiene el valor bélico de σκῦλα; también podría traducirse «botín».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «ha saqueado» por «se ha apoderado de» para reflejar con más precisión ἐκράτησεν como posesión o toma de control, no el acto de saqueo. Se conserva «despojos» para σκῦλα y se ajusta la nota para eliminar la alternativa menos precisa «saqueo».
