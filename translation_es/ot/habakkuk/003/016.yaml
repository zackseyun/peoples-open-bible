  text: שָׁמַ֣עְתִּי וַ/תִּרְגַּ֣ז בִּטְנִ֗/י לְ/קוֹל֙ צָלֲל֣וּ שְׂפָתַ֔/י יָב֥וֹא רָקָ֛ב בַּ/עֲצָמַ֖/י וְ/תַחְתַּ֣/י אֶרְגָּ֑ז אֲשֶׁ֤ר אָנ֨וּחַ֙ לְ/י֣וֹם צָרָ֔ה לַ/עֲל֖וֹת לְ/עַ֥ם יְגוּדֶֽ/נּוּ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/016.yaml
  text: I heard[a], and my inward parts trembled; at the sound my lips quivered. Rot enters into my bones, and beneath me I tremble, as I wait quietly for the day of distress[b], for the coming up of the people who will invade us.
  footnotes:
  - marker: a
    text: Or 'that I may rest for the day of distress.' The Hebrew verb can mean 'rest' or 'settle/be quiet'; here it is rendered 'wait quietly' because the context emphasizes hushed expectation before coming trouble.
    reason: alternative_reading
  - marker: b
    text: Or 'the people who attack us' or 'the raiding people.' The Hebrew verb refers to invading or raiding.
    reason: lexical_alternative
