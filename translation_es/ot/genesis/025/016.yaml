review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: presentación de la lista, ''los hijos de Ismael'', ''sus nombres'', las dos expresiones locativas y la cláusula final sobre los doce gobernantes. Sin embargo, no sigue del todo el rastro auditado del POB inglés en dos puntos relevantes: el inglés final revirtió a ''by their settlements and by their encampments'', mientras que el español mantuvo ''en'', y además se omitieron las notas léxicas conservadas en el POB para las alternativas de חַצְרֵיהֶם / טִירֹתָם y נְשִׂיאִם. En español, puede mantenerse una solución idiomática, pero conviene reflejar la relación clasificatoria del hebreo con ''según'' y preservar las alternativas en notas.'
  spanish_quality_summary: El texto es claro y legible en español general. 'Asentamientos' y 'campamentos' funcionan bien; 'príncipes' es digno y comprensible. No obstante, 'en sus asentamientos y en sus campamentos' suena más puramente locativo que clasificatorio, y pierde el matiz de enumeración por lugares que el expediente inglés decidió preservar. 'Según sus asentamientos y según sus campamentos' suena natural y se ajusta mejor al contexto de una lista de nombres. También hace falta incorporar notas para transparentar alternativas léxicas importantes.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Ismael', 'hijos', 'príncipes' y 'pueblos' son compatibles con el expediente. 'Príncipes' preserva la preferencia documentada para נְשִׂיאִם, con 'jefes' o 'caudillos' como alternativas en nota. 'Pueblos' sigue la revisión final del inglés para אֻמֹּתָם.
  issues:
  - severity: medium
    issue: La preposición se vierte como 'en' en vez de reflejar el valor clasificatorio preservado en el POB inglés final.
    rationale: Aunque בְ puede leerse locativamente, el expediente auditado terminó con 'by ... by ...' para indicar que los nombres se dan según sus lugares. En español, 'según sus asentamientos y según sus campamentos' comunica ese matiz sin sonar forzado.
  - severity: medium
    issue: Faltan notas al pie para alternativas léxicas significativas presentes en el POB inglés.
    rationale: El encargo pide preservar alternativas significativas cuando el POB inglés las conserva. Aquí faltan notas para 'asentamientos/campamentos' frente a 'aldeas/campamentos' y para 'príncipes' frente a 'jefes/caudillos'.
  revised_spanish_text: 'Estos son los hijos de Ismael, y estos son sus nombres, según[a] sus asentamientos y según sus campamentos: doce príncipes[b] según sus pueblos.'
  revised_footnotes:
  - marker: a
    text: O 'aldeas' para 'asentamientos', y 'campamentos' para 'campamentos'.
    reason: lexical_alternative
  - marker: b
    text: O 'jefes' o 'caudillos' según sus pueblos.
    reason: alternative_reading
  revision_rationale: Se ajusta la preposición para reflejar mejor la relación de clasificación por lugares que el expediente inglés final decidió preservar, usando una solución idiomática en español ('según'). Además, se restauran notas para alternativas léxicas significativas ya documentadas en el POB inglés. No se requiere cambio doctrinal ni adjudicación compleja.
