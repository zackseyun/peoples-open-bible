lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: δέ / λέγω
  rationale: δέ es transicional y aquí mantiene un contraste suave con la situación previa; «pero» reproduce bien ese matiz. Se explicita «él» para conservar la referencia del sujeto en español sin perder naturalidad narrativa.
- source_word: Τὰ ἀδύνατα
  english_pob_choice: what is impossible
  chosen_spanish: Lo imposible
  alternatives_spanish:
  - Las cosas imposibles
  - Lo que es imposible
  lexicon: ἀδύνατος
  rationale: El plural neutro substantivado expresa una categoría de realidad imposible. En español, «lo imposible» conserva esa abstracción de manera natural y fiel, sin añadir contenido no presente en el griego.
- source_word: παρὰ ἀνθρώποις
  english_pob_choice: with men
  chosen_spanish: para los hombres
  alternatives_spanish:
  - con los hombres
  - en el caso de los hombres
  - entre los seres humanos
  lexicon: παρά + dativo
  rationale: 'El griego indica referencia o esfera: aquello que es imposible en relación con los humanos. «Para los hombres» mantiene la relación/ámbito de imposibilidad y sigue de cerca el contraste con «para Dios». Se conserva «hombres» como genérico humano, en línea con la decisión inglesa auditada.'
- source_word: δυνατὰ
  english_pob_choice: possible
  chosen_spanish: posible
  alternatives_spanish:
  - posibles
  - factible
  lexicon: δυνατός
  rationale: Como antónimo de ἀδύνατα en la misma construcción neutra substantivada, «posible» comunica con precisión la afirmación paralela y es idiomático en español.
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: with God
  chosen_spanish: para Dios
  alternatives_spanish:
  - con Dios
  - en cuanto a Dios
  - del lado de Dios
  lexicon: παρά + dativo / θεός
  rationale: La misma relación expresada por παρά con dativo se mantiene en español con «para», preservando el paralelismo con «para los hombres». Aunque «con Dios» es muy natural, «para Dios» refleja mejor la simetría del griego y evita suavizar la estructura comparativa.
theological_decisions:
- issue: Alcance de la posibilidad divina
  english_pob_reading: The verse states that what is impossible in the human sphere is possible with God, without specifying every conceivable action.
  chosen_spanish_reading: El versículo afirma que lo que es imposible en el ámbito humano es posible para Dios, sin convertirlo en una tesis filosófica sobre toda acción imaginable.
  alternative_spanish_readings:
  - Dios puede hacer absolutamente cualquier cosa
  - Para Dios no hay imposibles en sentido absoluto
  rationale: La frase se conserva como contraste entre imposibilidad humana y posibilidad divina, sin resolver la tensión más allá de su contexto inmediato (el pasaje sobre la entrada de los ricos en el reino). Esto evita añadir una formulación metafísica no explicitada por el texto.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de exagerar su alcance.
translation_notes:
  revision_awareness: El texto griego presenta una construcción substantivada en neutro plural (Τὰ ἀδύνατα / δυνατὰ) y una doble frase preposicional con παρά + dativo. La redacción española busca conservar esa simetría, mientras que la alternativa inglesa auditada («with / for») se refleja en la nota para no perder la opción interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque aquí el texto griego nombra explícitamente a θεός.
  - Se conserva el contraste paralelo entre lo imposible y lo posible, sin introducir verbos modales añadidos.
  - La nota a pie de página preserva la alternativa semántica de παρά con dativo en ambos miembros del paralelismo.
