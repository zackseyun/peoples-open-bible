    text: 'Hebreo: «YHWH shalom»; tradicionalmente transliterado «Yahvé-shalom».'
    reason: lexical_alternative
  revision_rationale: Se revisa solo la segunda oración para hacer explícito el referente de עוֹדֶנּוּ y conservar mejor la idea de que el altar sigue allí hasta el día del narrador. Se mantiene el resto del texto, incluida la forma «Yahvé» y la nota léxica del nombre conmemorativo.
