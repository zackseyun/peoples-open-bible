translation:
  language: es
  text: 'Como con un quebrantamiento en mis huesos[a], mis adversarios me reprochan, diciéndome todo el día: «¿Dónde está tu Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Como con muerte en mis huesos»; el hebreo presenta una imagen difícil, y puede expresar o bien una herida mortífera o bien un dolor aplastante y desgarrador en lo más profundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֶצַח
  english_pob_choice: As with a shattering
  chosen_spanish: Como con un quebrantamiento
  alternatives_spanish:
  - Con asesinato
  - Como con una herida mortal
  - Como con un destrozo
  lexicon: HALOT
  rationale: רֶצַח puede significar asesinato o muerte violenta, pero en esta construcción poética con ‘en mis huesos’ el audit trail inglés lo entiende como imagen de dolor interno aplastante o quebrantamiento. ‘Quebrantamiento’ conserva la fuerza violenta y evita reducirlo a una literalidad oscura o excesivamente forense.
- source_word: בְּעַצְמוֹתַי
  english_pob_choice: in my bones
  chosen_spanish: en mis huesos
  alternatives_spanish:
  - hasta mis huesos
  - dentro de mis huesos
  lexicon: HALOT
  rationale: La expresión sitúa el dolor en lo más profundo del ser. ‘En mis huesos’ reproduce bien la imagen hebrea en español natural y mantiene la localización corporal intensa.
- source_word: חֵרְפוּנִי
  english_pob_choice: taunt me
  chosen_spanish: me ultrajan
  alternatives_spanish:
  - me reprochan
  - me escarnecen
  - me insultan
  lexicon: HALOT
  rationale: חרף denota reproche, burla o deshonra verbal. ‘Ultrajan’ preserva la idea de afrenta hostil y funciona con dignidad en español bíblico moderno; ‘reprochan’ es posible, pero puede sonar más débil en este contexto de hostilidad abierta.
- source_word: צוֹרְרַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - mis enemigos hostiles
  - mis opresores
  lexicon: HALOT
  rationale: El participio de צרר designa a quienes se oponen hostilmente. ‘Adversarios’ sigue de cerca la decisión inglesa, conserva amplitud semántica y evita estrecharlo innecesariamente a ‘enemigos’.
- source_word: בְּאָמְרָם
  english_pob_choice: saying
  chosen_spanish: diciéndome
  alternatives_spanish:
  - al decirme
  - cuando me dicen
  - mientras me dicen
  lexicon: HALOT
  rationale: La forma introduce el contenido de la burla. ‘Diciéndome’ enlaza de modo natural con el discurso directo en español y mantiene el matiz de habla continua.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - contra mí
  lexicon: HALOT
  rationale: Aunque literalmente es ‘a mí’, en español el dativo ‘me’ es la forma más natural para introducir la agresión verbal dirigida al salmista.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - todo el tiempo
  - constantemente
  lexicon: HALOT
  rationale: El modismo expresa repetición continua. ‘Todo el día’ reproduce con claridad la duración insistente sin volver la línea pesada.
- source_word: אַיֵּה אֱלֹהֶיךָ
  english_pob_choice: Where is your God?
  chosen_spanish: ¿Dónde está tu Dios?
  alternatives_spanish:
  - ¿Dónde, pues, está tu Dios?
  - ¿Dónde está tu Dios entonces?
  lexicon: HALOT
  rationale: La pregunta funciona como desafío burlón sobre la ayuda o presencia de Dios. ‘¿Dónde está tu Dios?’ conserva la tersura del insulto sin añadir explicación; ‘¿Dónde, pues…?’ introduciría un matiz no explicitado por el hebreo.
theological_decisions:
- issue: Mantener la tensión lamentativa de la burla sobre Dios
  english_pob_reading: Where is your God?
  chosen_spanish_reading: ¿Dónde está tu Dios?
  alternative_spanish_readings:
  - ¿Dónde está entonces tu Dios?
  - ¿Dónde, pues, está tu Dios?
  rationale: 'La línea se deja como una provocación hostil sin resolverla ni suavizarla. Esto preserva la tensión teológica del lamento: el salmista sufre la burla sobre la aparente ausencia de ayuda divina, pero la traducción no añade una interpretación que cierre esa herida.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail inglés, que prefirió una apertura similiaр más natural (‘As with...’) sin perder la imagen de dolor profundo. En español se optó por ‘Como con...’ para reflejar esa misma comparación y mantener el paralelismo poético con el hebreo. También se conservó la fuerza del reproche hostil y la pregunta desafiante final sin resolver la tensión del lamento.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para אֱלֹהִים conforme al criterio general del proyecto.
  - Se evitó ‘Señor’ o cualquier máscara por tratarse de אֱלֹהִים, no del Tetragrámaton.
  - ‘Mis adversarios’ y ‘me ultrajan’ siguen el tono del audit trail inglés sin volverlo más suave de lo que el hebreo permite.
  - La nota de pie de página preserva la ambigüedad lexical del primer hemistiquio, que es central para la lectura del verso.
