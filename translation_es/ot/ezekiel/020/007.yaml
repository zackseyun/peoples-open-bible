base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/007.yaml
  text: And I said to them[a], ‘Each man, throw away the detestable things before his eyes, and do not defile yourselves with the idols of Egypt[b]. I am Yahweh your God.’
  footnotes:
  - marker: a
    text: Hebrew 'the detestable things of his eyes,' an idiom for the abhorrent objects each man looks to or desires; likely idolatrous objects.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'idols' here is a strongly contemptuous word in Ezekiel; alternatively, 'filthy idols' or more literally 'dung-idols.'
    reason: lexical_alternative
