  - severity: low
    issue: El matiz léxico de «repugnen» suena algo menos natural/literario en este contexto sapiencial.
    rationale: Aunque expresa aversión, en español bíblico de registro digno «aborrezcas» encaja mejor con la fuerza de rechazo moral/volitivo y con el tono exhortativo del pasaje.
