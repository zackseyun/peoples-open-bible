translation:
  language: es
  text: Y Daniel pidió al rey, y él puso a Sadrac, Mesac y Abed-nego sobre la administración de la provincia de Babilonia. Pero Daniel permaneció en la corte del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la puerta del rey». La expresión probablemente se refiere al lugar de Daniel en la corte real o a su presencia administrativa ante el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָא
  english_pob_choice: requested
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - rogó
  - presentó su petición
  lexicon: HALOT
  rationale: El verbo arameo expresa pedir o solicitar. En español, «pidió» comunica de forma natural la acción formal de Daniel ante el rey sin sobrecargarla con un matiz jurídico que el texto no exige.
- source_word: מִן מַלְכָּא
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - al rey
  - ante el rey
  lexicon: HALOT
  rationale: La construcción con preposición se conserva de manera idiomática como «del rey», manteniendo la relación origen/objeto de la petición y la naturalidad en español.
- source_word: וּמַנִּי
  english_pob_choice: he appointed
  chosen_spanish: él puso
  alternatives_spanish:
  - él nombró
  - él asignó
  - él designó
  lexicon: HALOT
  rationale: El verbo indica colocar o nombrar a alguien en un cargo. «Puso» refleja esa acción de establecerlos en una función, y evita añadir una formalidad administrativa no explícita en el arameo.
- source_word: עַל עֲבִידְתָּא
  english_pob_choice: over the administration
  chosen_spanish: sobre la administración
  alternatives_spanish:
  - sobre los asuntos
  - sobre la obra
  - a cargo de la administración
  lexicon: HALOT
  rationale: En este contexto gubernamental, עֲבִידְתָּא se entiende como la administración o gestión de asuntos públicos. «Sobre la administración» reproduce ese sentido oficial mejor que un genérico «trabajo».
- source_word: דִּי מְדִינַת בָּבֶל
  english_pob_choice: of the province of Babylon
  chosen_spanish: de la provincia de Babilonia
  alternatives_spanish:
  - de Babilonia, provincia
  - del estado de Babilonia
  lexicon: HALOT
  rationale: מְדִינָה designa una división administrativa, por lo que «provincia» es la equivalencia más clara y precisa en español.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Sadrach, Mesac y Abed-nego
  lexicon: Uso bíblico tradicional en español
  rationale: Se conservan los nombres propios en su forma bíblica usual en español, que es la más reconocible para el lector. El hebreo/arameo solo requiere transliteración; no hay una carga semántica adicional que deba explicitarse aquí.
- source_word: בִּתְרַע מַלְכָּא
  english_pob_choice: at the king’s court
  chosen_spanish: en el tribunal del rey
  alternatives_spanish:
  - en la puerta del rey
  - en la corte del rey
  - junto a la puerta del rey
  lexicon: HALOT
  rationale: El sustantivo «puerta» puede funcionar idiomáticamente como lugar de acceso y administración real. «Tribunal del rey» intenta conservar el valor institucional del lugar de audiencia y gobierno sin reducirlo solo a una puerta física.
theological_decisions:
- issue: 'La frase final: valor idiomático de "la puerta del rey" frente a una equivalencia institucional'
  english_pob_reading: But Daniel remained at the king’s court.
  chosen_spanish_reading: Pero Daniel quedó en el tribunal del rey.
  alternative_spanish_readings:
  - Pero Daniel quedó en la puerta del rey.
  - Pero Daniel permaneció en la corte del rey.
  rationale: El texto arameo dice literalmente «en/at la puerta del rey», pero en el contexto cortesano esa expresión puede señalar la esfera de acceso y administración real. «Tribunal del rey» intenta mantener la idea de un espacio oficial de juicio/audiencia y gobierno, sin hacerla meramente arquitectónica. Aun así, la lectura literal queda preservada como alternativa.
  doctrine_reference: Lexical/idiomatic sense only; no doctrinal issue
translation_notes:
  revision_awareness: 'La versión inglesa reciente mantiene alto acuerdo y no requiere cambios textuales; en español, la decisión principal está en cómo rendir בִּתְרַע מַלְכָּא sin perder su sentido cortesano. También se ha conservado la secuencia narrativa del hebreo/arameo: petición de Daniel, nombramiento de sus compañeros y permanencia de Daniel en el ámbito real.'
  spanish_consistency_notes:
  - Se usó «Babilonia» para מְדִינַת בָּבֶל, siguiendo el sentido administrativo de «provincia».
  - Se mantuvo «Abed-nego» con guion, conforme al uso bíblico español y para reflejar el nombre propio compuesto.
  - Se prefirió «pidió» a un verbo más técnico como «solicitó» para un español claro y natural, sin perder formalidad.
  - La nota [a] preserva la alternativa literal «puerta del rey» porque el texto fuente la permite y el POB inglés la documenta.
