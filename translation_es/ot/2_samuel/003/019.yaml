translation:
  language: es
  text: Abner también habló ante Benjamín[a], y Abner también fue a hablar con David en Hebrón todo lo que parecía bueno a los ojos de Israel y a los ojos de toda la casa de Benjamín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: literalmente, ''en los oídos de'', un modismo que significa ''ante'', ''en presencia de'' o simplemente ''a''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''todo lo que parecía agradable a Israel y a toda la casa de Benjamín''.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/אָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: al oído de
  alternatives_spanish:
  - en presencia de
  - en la audiencia de
  - a
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente 'en los oídos de'. En español, 'al oído de' conserva la imagen auditiva sin sonar forzado y permite el mismo valor direccional/comunicativo que el inglés POB quiso preservar.
- source_word: בִנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - la tribu de Benjamín
  - los benjaminitas
  lexicon: HALOT
  rationale: Aquí funciona como nombre colectivo tribal. 'Benjamín' mantiene la concisión del hebreo y queda aclarado por 'la casa de Benjamín' al final del versículo.
- source_word: לְ/דַבֵּר
  english_pob_choice: to speak
  chosen_spanish: a hablar
  alternatives_spanish:
  - a decir
  - a conversar
  - a tratar
  lexicon: HALOT
  rationale: El infinitivo de דבר se vierte de forma directa con 'hablar'. Se evita 'tratar' o 'conversar' porque añadirían matices de negociación o diálogo que el texto no exige.
- source_word: בְּ/חֶבְרוֹן
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  - en la ciudad de Hebrón
  lexicon: HALOT
  rationale: El hebreo sitúa la acción en Hebrón; 'en Hebrón' es natural en español y conserva el valor locativo sin añadir precisión no explicitada por el texto.
- source_word: אֵת כָּל אֲשֶׁר טוֹב בְּ/עֵינֵי
  english_pob_choice: all that seemed good in the eyes of
  chosen_spanish: todo lo que parecía bueno a los ojos de
  alternatives_spanish:
  - todo lo que era agradable a
  - todo lo que era bueno para
  - todo lo que resultaba aceptable a
  lexicon: HALOT
  rationale: Se mantiene la idiomática 'a los ojos de' porque el POB inglés revisado reforzó esta repetición para reflejar בְּעֵינֵי. 'Parecía bueno' refleja el juicio evaluativo sin convertirlo en un valor absoluto o meramente afectivo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo, que en esta construcción funciona como sujeto evaluativo nacional.
- source_word: כָּל בֵּית בִּנְיָמִן
  english_pob_choice: the whole house of Benjamin
  chosen_spanish: toda la casa de Benjamín
  alternatives_spanish:
  - toda la tribu de Benjamín
  - todo el linaje de Benjamín
  lexicon: HALOT
  rationale: Se retiene 'casa' para preservar la textura kinship-política del hebreo. En español 'casa de Benjamín' es transparente y refleja el alcance colectivo del grupo.
- source_word: גַּם ... גַּם
  english_pob_choice: also ... also
  chosen_spanish: también ... también
  alternatives_spanish:
  - igualmente ... igualmente
  - asimismo ... asimismo
  - no solo ... sino también
  lexicon: HALOT
  rationale: La repetición de גַּם marca adición paralela en ambas cláusulas. 'También ... también' reproduce ese paralelismo de manera natural en español.
- source_word: וַיְדַבֵּר ... וַיֵּלֶךְ
  english_pob_choice: spoke ... went
  chosen_spanish: habló ... fue
  alternatives_spanish:
  - habló ... se dirigió
  - dijo ... fue
  - habló ... caminó
  lexicon: HALOT
  rationale: Los perfectos narrativos se expresan con pasado simple. 'Fue a hablar' conserva el movimiento y la finalidad del hebreo sin sobreespecificar el modo del desplazamiento.
theological_decisions:
- issue: Repetición de 'los ojos de' como idiomática evaluativa
  english_pob_reading: all that seemed good in the eyes of Israel and in the eyes of the whole house of Benjamin
  chosen_spanish_reading: todo lo que parecía bueno a los ojos de Israel y a los ojos de toda la casa de Benjamín
  alternative_spanish_readings:
  - todo lo que agradaba a Israel y a toda la casa de Benjamín
  - todo lo que era aceptable para Israel y para toda la casa de Benjamín
  rationale: Se preserva la formulación idiomática porque el auditorio bíblico distingue el juicio subjetivo/comunitario de una mera afirmación moral objetiva. La repetición de 'a los ojos de' corresponde al énfasis del hebreo y al ajuste revisado del POB inglés.
  doctrine_reference: Principio de fidelidad semántica e idiomática; no hay carga doctrinal específica, pero sí una distinción hermenéutica sobre juicio evaluativo comunitario.
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final para repetir 'in the eyes of' dos veces, a fin de reflejar más de cerca בְּעֵינֵי. La versión española mantiene esa repetición con 'a los ojos de' en ambos miembros.
  spanish_consistency_notes:
  - Se mantuvo 'Benjamín' como nombre tribal y 'casa de Benjamín' como expresión político-familiar.
  - Se eligió 'al oído de' para conservar el modismo hebreo sin calco rígido.
  - Se conservó la repetición evaluativa 'a los ojos de' en la cláusula final para reflejar el paralelismo del hebreo.
  - Se usó pasado simple narrativo ('habló', 'fue') para corresponder al valor secuencial de los verbos waw-consecutivos.
