    rationale: Aunque defendible, el audit trail inglés privilegia la esfera relacional «with». En español, «con los hombres ... con Dios» transmite mejor el contraste idiomático y evita una lectura de destinatario o conveniencia.
  - severity: low
    issue: La nota al pie está invertida respecto a la mejor opción española principal.
    rationale: Si el texto principal se corrige a «con», la alternativa «para» puede preservarse en nota como variante léxica legítima.
