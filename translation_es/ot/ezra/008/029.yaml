review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: dos imperativos de vigilancia/protección, el pesaje posterior ante autoridades específicas, Jerusalén, las cámaras y la casa de Yahvé. También preserva correctamente יְהוָה como «Yahvé». Sin embargo, hay un problema de alineación en שָׂרֵי הַכֹּהֲנִים: «los jefes de los sacerdotes» suena poco natural y además puede sugerir jefes sobre un grupo de sacerdotes en vez de la expresión establecida «los principales sacerdotes», que comunica mejor líderes sacerdotales en este contexto sin forzar un tecnicismo neotestamentario. Además, la serie coordinada quedó algo desajustada con «delante de los jefes de los sacerdotes, de los levitas y de los jefes…», donde el hebreo coordina tres grupos, no una cadena genitiva española.'
  spanish_quality_summary: El español es en general claro y digno. «Velen con cuidado» y «guárdenlos» funcionan bien. No obstante, la coordinación de los grupos oficiales necesita pulirse para sonar natural y reflejar mejor la sintaxis. «Cámaras» y «casa de Yahvé» son buenas elecciones. Las notas actuales son útiles, pero falta una nota para la alternativa de los dos imperativos, preservada en la auditoría inglesa, y conviene ajustar la nota sobre «cámaras» para no sobreexplicar sin necesidad.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Yahvé» está correcto; «casa de Yahvé» preserva בית יהוה; «casas paternas» mantiene el modismo con nota explicativa; «cámaras» concuerda con הַלִּשְׁכוֹת. La principal mejora léxica es usar «principales sacerdotes» para שָׂרֵי הַכֹּהֲנִים y coordinar explícitamente «y los levitas» en vez de integrarlo como genitivo.'
  issues:
  - severity: medium
    issue: «los jefes de los sacerdotes» para שָׂרֵי הַכֹּהֲנִים es poco idiomático
    rationale: Aunque es formalmente cercano al hebreo, en español bíblico natural suena forzado. «Los principales sacerdotes» comunica mejor sacerdotes dirigentes en este contexto y evita una lectura torpe.
  - severity: medium
    issue: La lista de autoridades quedó mal coordinada en español
    rationale: 'El hebreo presenta tres grupos coordinados: líderes sacerdotales, levitas y jefes de casas paternas. «de los levitas» después de «delante de los jefes de los sacerdotes» puede sugerir dependencia genitiva en lugar de coordinación paralela.'
  - severity: low
    issue: Falta la alternativa léxica de los imperativos de vigilancia preservada en la auditoría inglesa
    rationale: 'El inglés mantuvo una nota relevante: «Be watchful and keep them». En español conviene conservar una nota equivalente porque documenta la amplitud semántica de שׁקד y שׁמר.'
  revised_spanish_text: Velen con cuidado[a] y guárdenlos hasta que los pesen delante de los principales sacerdotes, y los levitas, y los jefes de las casas paternas[b] de Israel, en Jerusalén, en las cámaras[c] de la casa de Yahvé[d].
  revised_footnotes:
