translation:
  language: es
  text: Entonces Josías se volvió y vio las sepulturas[a] que estaban allí en el monte, y envió a sacar los huesos de las sepulturas, y los quemó sobre el altar y lo profanó, conforme a la palabra de Yahvé que el hombre de Dios proclamó[b], el cual proclamó estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las tumbas'. El término hebreo puede referirse a lugares de sepultura en general, no solo a construcciones funerarias.
    reason: lexical_alternative
  - marker: b
    text: O 'clamó' / 'proclamó en voz alta'. El verbo hebreo puede enfatizar una proclamación pública en voz alta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - volvió la vista
  lexicon: HALOT
  rationale: פנה expresa el giro físico de Josías antes de ver las sepulturas. En español, 'se volvió' suena natural y conserva el movimiento narrativo previo a la visión.
- source_word: הַקְּבָרִים
  english_pob_choice: the tombs
  chosen_spanish: las sepulturas
  alternatives_spanish:
  - las tumbas
  - las sepulturas funerarias
  lexicon: HALOT
  rationale: קבר puede significar 'tumba' o 'sepultura'. 'Sepulturas' mantiene la amplitud del término para lugares de enterramiento, como indica la nota inglesa sobre burial places generales.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en el monte
  - en la montaña
  lexicon: HALOT
  rationale: הַר puede referirse a montaña o monte. 'En el monte' es idiomático en español bíblico y conserva la referencia topográfica sin sobreprecisar la elevación.
- source_word: הָעֲצָמוֹת
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los restos
  - los huesos humanos
  lexicon: HALOT
  rationale: עצמות significa literalmente 'huesos'. Se mantiene el sustantivo concreto porque el acto de profanación se realiza quemando huesos humanos.
- source_word: וַיִּשְׂרֹף עַל הַמִּזְבֵּחַ
  english_pob_choice: burned them on the altar
  chosen_spanish: los quemó sobre el altar
  alternatives_spanish:
  - los quemó en el altar
  - los quemó encima del altar
  lexicon: HALOT
  rationale: La preposición על se puede expresar de forma natural como 'sobre'. Así se conserva la escena cultual ofensiva de quemar los huesos en el altar.
- source_word: וַיְטַמְּאֵהוּ
  english_pob_choice: defiled it
  chosen_spanish: lo profanó
  alternatives_spanish:
  - lo contaminó ritualmente
  - lo hizo inmundo
  lexicon: HALOT
  rationale: טמא en contexto ritual implica contaminar/profanar. 'Profanó' comunica bien la afrenta al altar en un registro claro y bíblico, sin reducirlo a un mero estado ceremonial abstracto.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de cumplimiento con 'conforme a' para reflejar la obediencia de Josías al anuncio previo. Yahvé sigue el estándar del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el valor por defecto del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: HALOT
  rationale: El hebreo es un título idiomático literal. 'El hombre de Dios' mantiene la forma establecida y evita una paráfrasis no exigida por el texto.
- source_word: קָרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - clamó
  - anunció
  - llamó
  lexicon: HALOT
  rationale: En este contexto profético, קרא enfatiza una declaración pública y autoritativa. 'Proclamó' sigue la decisión inglesa y comunica bien el tono de anuncio.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - estos asuntos
  lexicon: HALOT
  rationale: דברים puede ser 'palabras' o 'cosas/matters'. Dado que se trata de hechos profetizados y ahora cumplidos, 'estas cosas' reproduce bien la amplitud semántica.
theological_decisions:
- issue: Relación entre la acción de Josías y el cumplimiento de la palabra divina
  english_pob_reading: 'Render the clause as explicit fulfillment of prior divine speech: ''according to the word of Yahweh that the man of God proclaimed.'''
  chosen_spanish_reading: conforme a la palabra de Yahvé que el hombre de Dios proclamó
  alternative_spanish_readings:
  - según la palabra de Yahvé que el hombre de Dios proclamó
  - de acuerdo con la palabra de Yahvé que el hombre de Dios proclamó
  rationale: La cláusula se entiende como cumplimiento de una palabra divina previa mediada por el hombre de Dios. 'Conforme a' preserva esa relación de obediencia y cumplimiento sin añadir interpretaciones ajenas al hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene la transliteración del nombre divino según la norma del proyecto, en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la auditoría inglesa: conserva la secuencia narrativa, la fórmula de cumplimiento, y las dos ambigüedades léxicas documentadas (קבר, קרא) sin suavizarlas. No se detectaron revisiones posteriores que alteraran la decisión base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה en todo el pasaje.
  - '''Hombre de Dios'' conserva el título idiomático sin convertirlo en ''profeta''.'
  - '''Profanó'' traduce טמא con un matiz ritual claro y natural en español.'
  - '''Estas cosas'' respeta la amplitud de דברים en un contexto de cumplimiento profético.'
  - Los marcadores [a] y [b] aparecen en el texto exactamente donde corresponden.
