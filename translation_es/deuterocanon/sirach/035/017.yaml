translation:
  language: es
  text: La garganta[a] come toda clase de alimento,[b] pero un alimento es más agradable que otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el gargüero».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es un proverbio breve y algo áspero en su forma conservada. El paralelo griego de este versículo difiere de manera considerable («Un hombre pecador evitará la reprensión, y según su voluntad hallará juicio/argumento»), lo que sugiere una Vorlage distinta o una alteración textual en la tradición hebrea.
    reason: textual_variant
lexical_decisions:
- source_word: כל
  english_pob_choice: every kind of
  chosen_spanish: toda clase de
  alternatives_spanish:
  - cada clase de
  - todo tipo de
  lexicon: HALOT
  rationale: En un proverbio, la expresión general funciona mejor en español como una fórmula natural de universalidad. «Toda clase de» conserva el alcance sin sonar rígido.
- source_word: מאכל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimento ingerido
  lexicon: HALOT
  rationale: «Alimento» mantiene el sentido amplio de lo que se come y suena más neutro y publicable que «comida» en una sentencia sapiencial.
- source_word: אוכל
  english_pob_choice: eats
  chosen_spanish: se come
  alternatives_spanish:
  - come
  - ingiere
  lexicon: HALOT
  rationale: El hebreo usa el verbo ordinario de comer; en español, la construcción pronominal resulta más natural con «el cuello» como sujeto figurado y conserva el sentido literal sin forzar la sintaxis.
- source_word: גרגרת
  english_pob_choice: the throat
  chosen_spanish: el cuello
  alternatives_spanish:
  - la garganta
  - el gaznate
  lexicon: HALOT
  rationale: La referencia anatómica apunta al conducto por donde pasa el alimento. «Cuello» evita una elección demasiado técnica o coloquial; «garganta» sería también posible, pero «cuello» preserva la imagen del órgano de paso de manera sobria.
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sin embargo
  lexicon: HALOT
  rationale: La partícula introduce contraste entre la generalidad y la preferencia. «Pero» es la contrapartida natural y clara en español.
- source_word: יש
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - se encuentra
  lexicon: HALOT
  rationale: 'Aunque en esta línea el contraste se expresa de modo implícito en español, el valor existencial queda bien representado por una construcción comparativa natural: «un alimento es más agradable que otro».'
- source_word: אכל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - lo que se come
  lexicon: HALOT
  rationale: El término se repite con el mismo valor general de lo ingerido. Unificarlo como «alimento» ayuda a mantener el paralelismo sin perder el sentido.
- source_word: נעים
  english_pob_choice: more pleasant
  chosen_spanish: más agradable
  alternatives_spanish:
  - más delicioso
  - más placentero
  lexicon: HALOT
  rationale: «Agradable» expresa bien la cualidad de lo que resulta preferible o deleitoso, sin cargar el verso con un matiz excesivamente subjetivo o culinario.
theological_decisions:
- issue: Tensión textual entre el hebreo sapiencial y el paralelo griego distinto
  english_pob_reading: The Hebrew is a terse proverb and somewhat awkward in its surviving form; the Greek parallel differs substantially, suggesting either a different Vorlage or textual disturbance in the Hebrew tradition.
  chosen_spanish_reading: Se traduce el hebreo conservado como proverbio breve sobre la ingestión y la preferencia, sin armonizarlo con el griego.
  alternative_spanish_readings:
  - El hombre pecador rehúye la reprensión, y según su voluntad hallará juicio/argumento.
  - Otra lectura apoyada por el griego podría reconstruir una sentencia sobre el pecador y la reprensión.
  rationale: La base canónica aquí es el hebreo transmitido en Kahana, y el audit trail indica una divergencia importante con el griego. La traducción española debe reflejar ese estado textual sin borrar la tensión documental.
  doctrine_reference: crítica textual; tradición hebrea y paralelo griego
- issue: Valor de גרגרת como órgano de paso del alimento
  english_pob_reading: Or 'the gullet' for 'the throat.'
  chosen_spanish_reading: Se deja una imagen anatómica general con «el cuello», con nota de alternativa si se desea una precisión más corporal.
  alternative_spanish_readings:
  - la garganta
  - el gaznate
  rationale: El español necesita una elección legible y sobria. «Cuello» mantiene la fuerza proverbial y evita sonar demasiado técnico o regional, mientras que la nota preserva la alternativa lexical.
  doctrine_reference: anatomía figurada; equivalencia léxica
translation_notes:
  revision_awareness: Se corrigió la omisión previa del marcador de nota al insertar [a] directamente en el texto español junto a «El cuello». La redacción sigue de cerca el hebreo transmitido y mantiene visible la tensión con el paralelo griego señalado por el POB inglés.
  spanish_consistency_notes:
  - Se conserva una voz sapiencial breve y directa, sin armonizar el versículo con el griego.
  - «Alimento» se usa de manera consistente para מאכל / אכל.
  - Se evita el calco demasiado literal de la estructura inglesa y se privilegia una construcción natural en español.
  - La nota [a] está anclada en el texto y corresponde exactamente a una alternativa léxica y crítica textual.
