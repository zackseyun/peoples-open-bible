translation:
  language: es
  text: Y le puso la túnica, y lo ciñó con la faja, y lo vistió con el manto, y le puso el efod, y lo ciñó con la banda[a] del efod, y se lo sujetó con ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la banda adornada del efod» o «el ceñidor del efod».
    reason: lexical_alternative
  - marker: b
    text: Es probable que el verbo hebreo aquí signifique que el efod fue asegurado a Aarón por medio de su banda tejida.
    reason: cultural_note
lexical_decisions:
- source_word: כֻּתֹּנֶת
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - vestidura
  - túnica interior
  lexicon: HALOT
  rationale: El término designa la prenda básica que va sobre el cuerpo. «Túnica» es natural en español bíblico contemporáneo y conserva la precisión cultual mejor que «vestidura», que sería más general.
- source_word: אַבְנֵט
  english_pob_choice: sash
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  lexicon: HALOT
  rationale: En este contexto sacerdotal se trata de una banda para ceñir la cintura. «Cinturón» es claro y readable en español; «faja» o «ceñidor» también son posibles, pero menos transparentes para el lector general.
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - ropa exterior
  - vestidura exterior
  lexicon: HALOT
  rationale: La prenda es la capa exterior sobre la túnica. «Manto» comunica bien la función de prenda exterior sin sonar demasiado técnica; en español, «robe» como préstamo no sería natural.
- source_word: אֵפֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - efod sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico por no tener equivalente preciso en español. La transliteración mantiene la especificidad cultual y sigue la decisión auditada del inglés POB.
- source_word: חֵשֶׁב
  english_pob_choice: skillfully woven band
  chosen_spanish: tejido
  alternatives_spanish:
  - banda tejida
  - ceñidor tejido
  - banda hábilmente tejida
  lexicon: HALOT
  rationale: El término se refiere al material/elemento tejido que sujeta el efod. «Tejido» conserva la conexión con la fabricación artesanal; en la frase se integra como «el tejido del efod» para reflejar la idea de la banda asociada al efod sin forzar una paráfrasis.
- source_word: וַיַּחְגֹּר אֹתוֹ
  english_pob_choice: girded him with the sash
  chosen_spanish: lo ciñó con el cinturón
  alternatives_spanish:
  - lo ciñó con la faja
  - lo ajustó con el cinturón
  lexicon: HALOT
  rationale: חגר implica ceñir alrededor de la cintura. «Ceñir» reproduce bien el verbo; «lo ciñó con el cinturón» mantiene un registro bíblico claro y preciso.
- source_word: וַיֶּאְפֹּד לוֹ בּוֹ
  english_pob_choice: bound it to him with it
  chosen_spanish: lo ajustó a él con él
  alternatives_spanish:
  - lo sujetó a él con él
  - lo vinculó a él con él
  lexicon: HALOT
  rationale: La construcción final es difícil y el hebreo sugiere que el efod queda asegurado por medio de su propia banda. «Lo ajustó a él con él» conserva la relación pronominal y la acción de fijación sin inventar un objeto ausente.
theological_decisions:
- issue: Terminología sacerdotal para las vestiduras
  english_pob_reading: Retain technical cultic term 'ephod' while translating more common garments dynamically
  chosen_spanish_reading: Conservar «efod» como término técnico y verter las prendas comunes con vocabulario español natural
  alternative_spanish_readings:
  - traducir «efod» descriptivamente como «delantal ritual»
  - usar «ropa» para todos los elementos
  rationale: El versículo describe el atavío sacerdotal de Aarón; la precisión cultual importa. Mantener «efod» preserva la terminología especializada, mientras que «túnica», «cinturón» y «manto» hacen la frase legible en español sin diluir el contexto sacerdotal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; terminology consistency for cultic vestments'
- issue: Valor del verbo final de sujeción
  english_pob_reading: The Hebrew verb here likely means that the ephod was secured to Aaron by means of its woven band.
  chosen_spanish_reading: La frase final se traduce de modo que indique sujeción o ajuste del efod mediante su tejido
  alternative_spanish_readings:
  - lo ató a él con él
  - lo sujetó a él con él
  - lo ciñó con él
  rationale: 'El hebreo es raro y no conviene aplanarlo. «Lo ajustó a él con él» mantiene la tensión interpretativa: el efod queda fijado mediante su elemento tejido, sin resolver de forma excesiva una ambigüedad que el audit trail conserva.'
  doctrine_reference: Textual/lexical caution in ambiguous cultic descriptions
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «girded» para חגר y «bound it to him» para el verbo final de sujeción; la versión española conserva esa precisión con «ciñó» y «lo ajustó a él con él».
  spanish_consistency_notes:
  - Se mantuvo la distinción entre prendas comunes y el término técnico «efod».
  - «Ceñir» se usó de forma consistente para reproducir חגר en un registro bíblico natural.
  - El pronombre final «con él» conserva la ambigüedad referencial del hebreo, evitando explicitar de más la banda o el efod.
  - Se evitó traducir «Yahvé» porque el versículo no contiene el nombre divino.
