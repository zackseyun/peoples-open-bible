- from: Entonces sabrán que yo soy Yahvé[a], cuando ponga fuego en Egipto y todos sus ayudadores[b] sean quebrantados.
  to: Entonces sabrán que yo soy Yahvé[a], cuando ponga fuego en Egipto y todos los que la ayudan[b] sean quebrantados.
  rationale: Se reemplaza 'sus ayudadores' por 'los que la ayudan' para mantener la transparencia léxica de עֹזְרֶיהָ con español natural y ampliamente legible. Se conserva 'Yahvé', la estructura temporal con 'cuando', el locativo 'en Egipto' y la nota alternativa contextual sobre 'aliados'.
