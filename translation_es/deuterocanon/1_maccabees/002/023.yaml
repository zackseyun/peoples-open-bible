translation:
  language: es
  text: Y apenas terminó de hablar estas palabras[a], un hombre judío[b] se acercó a la vista de todos, para ofrecer sacrificio en el altar en Modeín, conforme al mandato del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando cesó de hablar estas palabras». El griego indica sucesión inmediata después de terminar el discurso.
    reason: alternative_reading
  - marker: b
    text: O «un judío» o «un hombre de Judea». El griego Ἰουδαῖος puede señalar identidad judía o procedencia judeana; aquí el contexto favorece la identidad judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐπαύσατο
  english_pob_choice: as soon as he had finished
  chosen_spanish: cuando acabó de hablar
  alternatives_spanish:
  - cuando cesó de hablar
  - apenas terminó de hablar
  lexicon: LSJ
  rationale: La idea principal es la secuencia inmediata tras el fin del discurso. En español, «cuando acabó de hablar» comunica con naturalidad esa transición temporal sin perder el valor aspectual del griego.
- source_word: λαλῶν τοὺς λόγους τούτους
  english_pob_choice: speaking these words
  chosen_spanish: hablar estas palabras
  alternatives_spanish:
  - decir estas cosas
  - pronunciar estas palabras
  lexicon: LSJ
  rationale: El participio expresa la acción verbal concreta. «Hablar estas palabras» sigue de cerca el sentido y mantiene el tono sobrio del relato.
- source_word: προσῆλθεν
  english_pob_choice: came forward
  chosen_spanish: se acercó
  alternatives_spanish:
  - se adelantó
  - vino hacia adelante
  lexicon: LSJ
  rationale: En el contexto público, el movimiento a la escena se puede expresar de forma natural con «se acercó», sin forzar un calco que suene artificial en español.
- source_word: ἀνὴρ Ἰουδαῖος
  english_pob_choice: a Jewish man
  chosen_spanish: un hombre judío
  alternatives_spanish:
  - un judío
  - un hombre de Judea
  lexicon: LSJ
  rationale: Se conserva la referencia a la identidad judía y la fuerza masculina de ἀνήρ. «Judío» aquí comunica mejor la pertenencia étnico-religiosa que un mero origen geográfico.
- source_word: ἐν ὀφθαλμοῖς πάντων
  english_pob_choice: in the sight of all
  chosen_spanish: a la vista de todos
  alternatives_spanish:
  - ante la vista de todos
  - delante de todos
  lexicon: LSJ
  rationale: Es un modismo de visibilidad pública; «a la vista de todos» reproduce bien el valor idiomático del griego con español idiomático y solemne.
- source_word: θυσιάσαι
  english_pob_choice: to offer sacrifice
  chosen_spanish: para ofrecer sacrificio
  alternatives_spanish:
  - para sacrificar
  - para hacer un sacrificio
  lexicon: LSJ
  rationale: Se preserva el valor cultual explícito de θυσιάσαι. «Ofrecer sacrificio» evita ambigüedad y es más claro que un simple «sacrificar» en español bíblico.
- source_word: ἐπὶ τοῦ βωμοῦ
  english_pob_choice: on the altar
  chosen_spanish: en el altar
  alternatives_spanish:
  - sobre el altar
  - encima del altar
  lexicon: LSJ
  rationale: En español bíblico, «en el altar» es natural para el lugar de la acción y mantiene la referencia cultual sin sonar mecánico.
- source_word: ἐν Μωδεείμ
  english_pob_choice: in Modein
  chosen_spanish: en Modín
  alternatives_spanish:
  - en Modeín
  - en Modiin
  lexicon: LSJ
  rationale: Se usa una transliteración española comprensible y relativamente estable. «Modín» evita una grafía excesivamente técnica y se ajusta al nombre del lugar en este contexto.
- source_word: κατὰ τὸ πρόσταγμα τοῦ βασιλέως
  english_pob_choice: according to the king's command
  chosen_spanish: conforme al mandato del rey
  alternatives_spanish:
  - según el mandato del rey
  - por orden del rey
  lexicon: LSJ
  rationale: πρόσταγμα señala una orden autoritativa. «Mandato» conserva ese matiz formal y encaja bien con la presión imperial del relato.
theological_decisions:
- issue: 'Ἰουδαῖος: identidad étnico-religiosa vs. origen regional'
  english_pob_reading: Jewish man
  chosen_spanish_reading: un hombre judío
  alternative_spanish_readings:
  - un judío
  - un hombre de Judea
  rationale: En este pasaje la oposición narrativa tiene que ver con fidelidad del pueblo bajo imposición real, por lo que conviene explicitar la identidad judía y no reducirla a procedencia regional.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: Se revisó el valor temporal de ὡς ἐπαύσατο para expresar sucesión inmediata en español, y se mantuvo la decisión POB de entender Ἰουδαῖος como identidad judía en este contexto narrativo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Modín» se adoptó como transliteración española funcional del topónimo griego Μωδεείμ.
  - Se preservó la voz cultual de «ofrecer sacrificio» para θυσιάσαι, en lugar de un verbo más genérico.
