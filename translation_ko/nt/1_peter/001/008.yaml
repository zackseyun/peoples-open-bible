  yaml_path: translation/nt/1_peter/001/008.yaml
  text: 'Though you have not seen him, you love him. Though you do not now see him, yet believing in him, you rejoice with inexpressible and glorious joy,'
translation:
  language: ko
  text: '여러분은 그분을 보지 못하였으되 사랑하고, 지금 보지 못해도 믿으므로, 말로 다 할 수 없는 영광스러운 기쁨으로 크게 기뻐합니다.'
