translation:
  language: es
  text: Todos invocaron al Señor todopoderoso[a], soberano sobre todo dominio, su Dios y Padre misericordioso, con lágrimas y con un clamor incesante, suplicándole.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «soberano sobre toda autoridad». La serie griega usa términos cognados de gobierno para subrayar la supremacía de Dios sobre todo dominio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παντοκράτορα
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - poderoso sobre todo
  lexicon: LSJ
  rationale: Todopoderoso es la equivalencia más natural y reverente en español para παντοκράτωρ, y conserva el título divino sin sonar técnico o forzado.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: LSJ
  rationale: Señor es el título bíblico habitual para κύριος y funciona bien en un contexto de invocación religiosa.
- source_word: πάσης δυνάστην δυναστεύοντα
  english_pob_choice: the sovereign over every dominion
  chosen_spanish: soberano sobre todo dominio
  alternatives_spanish:
  - soberano sobre toda autoridad
  - el que domina sobre todo poder
  lexicon: LSJ
  rationale: La expresión griega acumula términos de gobierno y dominio. 'Soberano sobre todo dominio' mantiene la fuerza totalizadora y evita suavizar la repetición conceptual del original.
- source_word: ἐλεήμονα
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - clemente
  - compasivo
  lexicon: LSJ
  rationale: Misericordioso es el equivalente más directo y claro para ἐλεήμων en un registro bíblico natural en español.
- source_word: θεὸν αὐτῶν καὶ πατέρα
  english_pob_choice: their merciful God and Father
  chosen_spanish: su Dios misericordioso y Padre
  alternatives_spanish:
  - su Dios y Padre misericordioso
  - su Dios, su Padre misericordioso
  lexicon: LSJ
  rationale: El posesivo 'su' puede gobernar ambos sustantivos en español sin perder el sentido relacional. Se conserva 'Padre' explícitamente, como en el griego.
- source_word: δυσκαταπαύστῳ βοῇ
  english_pob_choice: with an unceasing cry
  chosen_spanish: con un clamor incesante
  alternatives_spanish:
  - con un grito incesante
  - con un clamor que no cesaba
  lexicon: LSJ
  rationale: '''Clamor incesante'' expresa bien la idea de un grito difícil de detener o callar, con tono solemne y fluidez natural en español.'
- source_word: πάντες
  english_pob_choice: They all
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos ellos
  - Ellos todos
  lexicon: LSJ
  rationale: Colocar 'Todos' al inicio refleja el énfasis colectivo del griego sin añadir redundancia innecesaria.
- source_word: μετὰ δακρύων
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - entre lágrimas
  - llorando
  lexicon: LSJ
  rationale: '''Con lágrimas'' es una traducción directa, sobria y plenamente idiomática del acompañamiento emotivo del acto de súplica.'
- source_word: ἐπεκαλέσαντο
  english_pob_choice: called upon
  chosen_spanish: invocaron
  alternatives_spanish:
  - clamaron a
  - apelaron a
  lexicon: LSJ
  rationale: En un contexto de oración, 'invocaron' transmite la acción religiosa de dirigirse a Dios de modo solemne y preciso.
- source_word: δεόμενοι
  english_pob_choice: begging him
  chosen_spanish: suplicándole
  alternatives_spanish:
  - rogándole
  - implorándole
  lexicon: LSJ
  rationale: El participio expresa una súplica insistente; 'suplicándole' conserva la fuerza de la petición sin cargar el español con una traducción demasiado coloquial.
theological_decisions:
- issue: Acumulación de títulos divinos sin reducir su fuerza retórica
  english_pob_reading: the almighty Lord, the sovereign over every dominion, their merciful God and Father
  chosen_spanish_reading: el Señor todopoderoso, soberano sobre todo dominio, su Dios misericordioso y Padre
  alternative_spanish_readings:
  - el Señor todopoderoso, soberano sobre toda autoridad, su Dios misericordioso y Padre
  - el Señor todopoderoso, dueño de todo dominio, su Dios misericordioso y Padre
  rationale: El griego apila títulos y descripciones para exaltar la grandeza y cercanía de Dios. La versión española conserva esa acumulación sin convertirla en una paráfrasis más plana. 'Padre' se mantiene explícitamente por estar presente en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension; gender-accurate over gender-neutral'
- issue: Relación entre 'κύριος' y el lenguaje de la autoridad divina
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: '''Señor'' es el título bíblico convencional en español y comunica reverencia y autoridad divina sin perder naturalidad litúrgica.'
  doctrine_reference: Project terminology default for κύριος
- issue: Modo de la súplica comunitaria
  english_pob_reading: with tears and with an unceasing cry, begging him
  chosen_spanish_reading: con lágrimas y con un clamor incesante, suplicándole
  alternative_spanish_readings:
  - entre lágrimas y con un clamor incesante, rogándole
  - con lágrimas y con un clamor que no cesaba, implorándole
  rationale: La combinación de lágrimas y clamor sostiene la intensidad emocional del pasaje. 'Suplicándole' preserva el carácter reverente y urgente de δεόμενοι sin introducir un matiz ajeno al contexto.
  doctrine_reference: LSJ/Contextual prayer language
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'sovereign over every dominion' frente a una redacción más pesada. Por eso la versión española usa 'soberano sobre todo dominio', manteniendo la fuerza del original con una formulación natural y compacta.
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος conforme al uso bíblico reverente en español.
  - Se mantuvo 'todopoderoso' para παντοκράτωρ, que es la forma más estable y comprensible en español eclesial.
  - Se conservó 'Padre' explícitamente, sin neutralizar el parentesco divino.
  - Se eligió 'invocaron'/'suplicándole' para mantener el registro de oración intensa y comunitaria.
  - '''Dominio'' traduce mejor la idea de δυνάστης/δυναστεύω en este contexto que ''poder'' aislado, porque refleja el campo de gobierno y autoridad.'
