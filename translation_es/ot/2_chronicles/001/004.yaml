translation:
  language: es
  text: Pero David había llevado el arca de Dios desde Quiriat-jearim al lugar que David le había preparado[a], porque había armado una tienda para ella en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a lo que David había preparado para ella»; la expresión hebrea es condensada, y el sentido es que David llevó el arca al lugar que había dejado listo para ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Ahora bien
  lexicon: HALOT
  rationale: Introduce el contraste con el contexto inmediato. En español, «Pero» transmite de forma natural la oposición sin añadir mayor intensidad que el hebreo.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios verdadero
  lexicon: HALOT
  rationale: Se mantiene la expresión directa y natural del constructo hebreo, sin expandir «Dios» con un calificativo no necesario para el sentido.
- source_word: הֶעֱלָה
  english_pob_choice: had brought up
  chosen_spanish: había subido
  alternatives_spanish:
  - había traído
  - había hecho subir
  lexicon: HALOT
  rationale: El hiphil de עלה con el arca expresa traslado ascendente/trasladar hacia arriba. «Había subido» conserva bien la imagen verbal y funciona en español bíblico actual.
- source_word: מִקִּרְיַת יְעָרִים
  english_pob_choice: from Kiriath-jearim
  chosen_spanish: desde Quiriat-jearim
  alternatives_spanish:
  - desde Quiriat Yearim
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma reconocible en español, con grafía habitual «Quiriat-jearim».
- source_word: בַּהֵכִין לוֹ דָוִיד
  english_pob_choice: to the place David had prepared for it
  chosen_spanish: al lugar que David le había preparado
  alternatives_spanish:
  - al lugar preparado por David para ello
  - a lo que David había preparado para ello
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida; en español se explicita «al lugar» para hacer inteligible el destino sin perder la relación con la preparación hecha por David. «Le» mantiene la referencia al arca.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la explicación causal de por qué ese lugar estaba preparado. «Porque» es la causal más clara en español.
- source_word: נָטָה לוֹ אֹהֶל
  english_pob_choice: he had pitched a tent for it
  chosen_spanish: le había levantado una tienda
  alternatives_spanish:
  - le había puesto una tienda
  - le había tendido una tienda
  lexicon: HALOT
  rationale: נטה + אֹהֶל significa tender o levantar una tienda. «Le había levantado una tienda» evita un calco demasiado crudo y conserva la idea de instalarla para el arca.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Traslación directa del complemento locativo con el nombre tradicional y plenamente inteligible en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el testimonio hebreo y el audit trail inglés: conserva el contraste inicial, el movimiento del arca desde Quiriat-jearim, la construcción elíptica sobre el lugar preparado y la cláusula causal sobre la tienda en Jerusalén. No se registran revisiones textuales adicionales en el expediente inglés, y el cotejo final indicó acuerdo alto sin cambios requeridos.'
  spanish_consistency_notes:
  - Se usa «arca de Dios» en lugar de una formulación eclesiástica más expandida, para mantener el paralelismo directo con el hebreo.
  - Se conserva la referencia al arca con pronombre de objeto indirecto («le») siguiendo el antecedente implícito del contexto.
  - Se emplea pasado compuesto («había subido», «había preparado», «había levantado») para reflejar el pluperfecto narrativo del audit trail inglés y la anterioridad respecto al marco del versículo.
