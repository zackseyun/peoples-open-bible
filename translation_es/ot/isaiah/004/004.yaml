translation:
  language: es
  text: cuando el Señor haya lavado la inmundicia de las hijas de Sion y haya enjuagado las manchas de sangre[a] de Jerusalén de en medio de ella, con espíritu de juicio y con espíritu de quema[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Manchas de sangre» también puede entenderse como «derramamiento de sangre» o «culpa de sangre».
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» puede entenderse también como «viento» o «aliento»; otra lectura posible es «el Espíritu de juicio y el Espíritu de quema».
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: En este contexto profético marca el momento en que se cumple la acción prometida; «cuando» comunica mejor esa relación temporal que un condicional simple.
- source_word: רָחַץ
  english_pob_choice: has washed away
  chosen_spanish: haya lavado
  alternatives_spanish:
  - haya lavado y quitado
  - haya limpiado
  lexicon: HALOT
  rationale: El verbo expresa lavado con sentido de eliminación de la suciedad; el subjuntivo perfecto en español encaja con la cláusula temporal y conserva la imagen de limpieza.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el hebreo lee Adonai, el contexto refiere a la acción divina del pacto y la pauta del proyecto en español es no enmascarar el nombre divino; por eso se expresa «Yahvé» en el texto principal.
- source_word: צֹאַת
  english_pob_choice: the filth
  chosen_spanish: la inmundicia
  alternatives_spanish:
  - la suciedad
  - la basura
  lexicon: HALOT
  rationale: El término es fuerte y denota impureza ofensiva; «inmundicia» conserva mejor la carga moral y cultual que un término más suave.
- source_word: בְּנוֹת צִיּוֹן
  english_pob_choice: the daughters of Zion
  chosen_spanish: las hijas de Sion
  alternatives_spanish:
  - las mujeres de Sion
  - las hijas de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la personificación y el paralelo profético literal. «Hijas» es más fiel que una explicación como «mujeres».
- source_word: דְּמֵי יְרוּשָׁלִַם
  english_pob_choice: the bloodstains of Jerusalem
  chosen_spanish: la sangre derramada de Jerusalén
  alternatives_spanish:
  - la culpa de sangre de Jerusalén
  - las manchas de sangre de Jerusalén
  lexicon: HALOT
  rationale: El plural «sangres» suele expresar derramamiento de sangre o culpa de sangre. En español, «sangre derramada» es natural y conserva la imagen sin forzar una interpretación legal única.
- source_word: יָדִיחַ
  english_pob_choice: rinsed away
  chosen_spanish: ha enjuagado
  alternatives_spanish:
  - ha lavado
  - ha purgado
  - ha quitado
  lexicon: HALOT
  rationale: El verbo en hifil puede transmitir arrastrar o lavar fuera. «Enjuagar» mantiene la idea de remover por agua y distingue esta acción de la primera acción de lavado.
- source_word: מִקִּרְבָּהּ
  english_pob_choice: from her midst
  chosen_spanish: de en medio de ella
  alternatives_spanish:
  - de su interior
  - de su medio
  lexicon: HALOT
  rationale: La expresión conserva el sentido espacial y la personificación de Jerusalén como mujer o ciudad; «de en medio de ella» es idiomático y preciso.
- source_word: בְּרוּחַ
  english_pob_choice: by a spirit
  chosen_spanish: con espíritu
  alternatives_spanish:
  - por un espíritu
  - por el Espíritu
  - con viento
  lexicon: HALOT
  rationale: «רוּחַ» admite espíritu, viento o aliento. El español «con espíritu» preserva la ambigüedad instrumental sin decidir prematuramente entre espíritu personal, viento o aliento.
- source_word: מִשְׁפָּט
  english_pob_choice: justice / judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - justicia
  - sentencia
  lexicon: HALOT
  rationale: En este contexto de purificación judicial, «juicio» conserva el matiz de acción decisiva y queda cerca del campo semántico de la revisión inglesa sin fijar solo el lado retributivo o solo el rectificador.
- source_word: בָּעֵר
  english_pob_choice: burning
  chosen_spanish: ardor
  alternatives_spanish:
  - quemadura
  - fuego
  - combustión
  lexicon: HALOT
  rationale: La forma participial evoca quemar/arder. «Ardor» preserva la imagen de fuego purificador y suena más natural en español que una calco demasiado técnico.
theological_decisions:
- issue: Valor de רוּחַ en las dos frases instrumentales
  english_pob_reading: instrumental 'by a spirit of judgment and by a spirit of burning' with preserved ambiguity
  chosen_spanish_reading: «con espíritu de juicio y con espíritu de ardor» mantiene la ambigüedad entre espíritu, viento o aliento sin capitalizar ni identificar explícitamente al Espíritu Santo.
  alternative_spanish_readings:
  - «con el Espíritu de juicio y con el Espíritu de ardor»
  - «con viento de juicio y con viento de ardor»
  rationale: El hebreo no nombra de manera explícita al Espíritu Santo. Mantener «espíritu» sin artículo definido ni mayúscula deja abierta la tensión textual que la POB inglesa preserva.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: Tratamiento del nombre divino en Adonai
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Adonai
  rationale: La pauta del proyecto español favorece Yahvé para el nombre divino. Aunque el hebreo vocaliza Adonai, el sentido es una referencia al Dios de Israel y no una mera designación genérica.
  doctrine_reference: Convención editorial del POB español sobre el Tetragrámaton y sus sustitutos reverenciales.
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, pero ajusta el segundo verbo para no repetir «lavar» y conserva la oscilación de רוּחַ. En lugar de traducir mecánicamente «bloodstains», opta por una formulación española natural que sigue admitiendo la alternativa legal de «culpa de sangre».
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal para el nombre divino según la pauta del proyecto.
  - «Hijas de Sion» conserva el paralelismo profético y la personificación femenina de la ciudad.
  - «Con espíritu de juicio / ardor» preserva la ambigüedad de רוּחַ sin imponer mayúsculas doctrinales.
  - La expresión «sangre derramada» evita un tecnicismo innecesario y sigue siendo compatible con la imagen de contaminación purificada.
