translation:
  language: es
  text: Al director del coro. Un salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por David' o 'para David'; la expresión hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro del coro
  - Para el director musical
  lexicon: HALOT
  rationale: En los encabezados de salmos, la expresión apunta al responsable de la ejecución musical. 'Director del coro' comunica bien esa función en español moderno y conserva el marco cultico-musical sin volverlo demasiado técnico o arcaico.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: '''Salmo'' es el equivalente establecido y más fiel para el género del encabezado. Mantiene la forma literaria reconocible para el lector en español.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: 'La preposición hebrea admite asociación amplia: autoría, pertenencia o dedicación. ''De David'' preserva esa ambigüedad en español mejor que ''por David'', que sugiere autoría con más fuerza, o ''para David'', que desplaza el sentido.'
theological_decisions:
- issue: Alcance de la atribución davídica en el superscrito
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a una sola relación entre David y el salmo. Mantener 'de David' conserva la tensión documental y no resuelve indebidamente la cuestión de autoría o dedicación.
  doctrine_reference: Preservar la ambigüedad textual cuando el original la permite.
translation_notes:
  revision_awareness: 'Se respetó la corrección de ubicación del marcador: la nota queda anclada en ''David'', no en ''director del coro''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la serie cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantiene la estructura breve del superscrito sin añadir elementos interpretativos.
  - '''Salmo'' se conserva como término de género literario estándar y transparente en español.'
