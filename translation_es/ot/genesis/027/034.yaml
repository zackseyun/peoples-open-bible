translation:
  language: es
  text: 'Cuando Esaú oyó las palabras de su padre[a], lanzó un grito sumamente grande y amargo, y dijo a su padre: «¡Bendíceme a mí también, padre mío!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «clamó con un clamor grande y amargo, en extremo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/שְׁמֹ֤עַ
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyó
  alternatives_spanish:
  - Al oír
  - En cuanto oyó
  lexicon: HALOT
  rationale: La construcción temporal se expresa de manera natural en español con «Cuando». «Oyó» conserva el valor simple de escuchar/percibir sin añadir interpretación.
- source_word: דִּבְרֵי אָבִיו
  english_pob_choice: his father’s words
  chosen_spanish: las palabras de su padre
  alternatives_spanish:
  - lo que dijo su padre
  - las palabras de su padre
  lexicon: HALOT
  rationale: «Palabras» reproduce bien דִּבְרֵי y mantiene el sustantivo concreto del hebreo; el posesivo «su padre» conserva la relación explícita del texto.
- source_word: וַיִּצְעַק צְעָקָה
  english_pob_choice: he cried out with a ... cry
  chosen_spanish: soltó un clamor
  alternatives_spanish:
  - clamó con un clamor
  - dio un grito
  lexicon: HALOT
  rationale: En español, el cognado directo «gritó un grito» suena forzado; «soltó un clamor» transmite la fuerza del verbo-nombre intensificado sin perder naturalidad ni solemnidad.
- source_word: גְּדֹלָה
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - fuerte
  - enorme
  lexicon: HALOT
  rationale: «Grande» conserva el sentido básico de גְּדֹלָה y acompaña bien el sustantivo «clamor».
- source_word: וּ/מָרָה
  english_pob_choice: bitter
  chosen_spanish: amargo
  alternatives_spanish:
  - doloroso
  - amarguísimo
  lexicon: HALOT
  rationale: «Amargo» es la equivalencia más directa de מָר y puede describir tanto el tono emocional como la angustia del clamor.
- source_word: עַד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en extremo
  - muchísimo
  lexicon: HALOT
  rationale: La locución intensifica lo anterior; «sumamente» mantiene el énfasis elevado y fluye bien en español bíblico contemporáneo.
- source_word: בָּרֲכֵ֥/נִי
  english_pob_choice: Bless me
  chosen_spanish: ¡Bendíceme!
  alternatives_spanish:
  - Bendíceme
  - Dame tu bendición
  lexicon: HALOT
  rationale: El imperativo directo se conserva con «Bendíceme». Se mantiene la urgencia emocional del hebreo y de la traducción inglesa auditada.
- source_word: גַם אָ֖נִי
  english_pob_choice: me too
  chosen_spanish: a mí también
  alternatives_spanish:
  - yo también
  - también yo
  lexicon: HALOT
  rationale: «A mí también» reproduce de forma natural la petición enfática de inclusión que hace Esaú.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: padre mío
  alternatives_spanish:
  - mi padre
  - padre
  lexicon: HALOT
  rationale: El vocativo final se vierte con «padre mío» para conservar el tono afectivo y respetuoso del hebreo, sin perder claridad en español.
theological_decisions:
- issue: Intensificación retórica del clamor
  english_pob_reading: an exceedingly great and bitter cry
  chosen_spanish_reading: un clamor grande y amargo, sumamente
  alternative_spanish_readings:
  - un clamor muy grande y muy amargo
  - un clamor grandísimo y amarguísimo
  rationale: No se atenúa la intensidad del texto. Se conserva la duplicación semántica de grande/amargo más la intensificación final de עַד מְאֹד, aunque en español la posición de «sumamente» resulte marcada.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente indicado como sin cambios, junto con la concordancia alta del control cruzado; por ello no se introdujeron variantes textuales ni ajustes de fondo respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin aparecer en este versículo.
  - Se evitó «Señor» o lenguaje eclesiástico añadido porque el hebreo solo presenta la dirección filial de Esaú.
  - Se conservó la intensidad del doblete hebreo con una solución española natural, sin convertirlo en paráfrasis libre.
