translation:
  language: es
  text: Salmo de David. Atribuyan a Yahvé[a], hijos de Dios, atribuyan a Yahvé gloria y fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de los poderosos» o «seres celestiales». La frase hebrea probablemente se refiere a miembros de la corte celestial.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: El término es la superscripción estándar del género; "salmo" es el equivalente español natural y preciso en este contexto literario.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en las superscripciones puede marcar autoría, pertenencia o dedicación. "De David" conserva esa ambigüedad mejor que una opción más interpretativa.
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Asignen
  alternatives_spanish:
  - Atribuyan
  - Den
  - Rindan
  lexicon: HALOT
  rationale: En este llamado poético, el sentido es reconocer o atribuir a Yahvé lo que le pertenece. "Asignen" reproduce esa fuerza exhortativa sin forzar un giro demasiado litúrgico.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino como "Yahvé", conforme a la directriz del proyecto, en lugar de ocultarlo tras una mayúscula convencional.
- source_word: בְּנֵי אֵלִים
  english_pob_choice: O sons of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos de los poderosos
  - hijos de los fuertes
  - seres celestiales
  lexicon: HALOT
  rationale: La frase hebrea es difícil y puede referirse a miembros de la corte celestial. "Hijos de Dios" sigue de cerca la lectura revisada del POB en inglés y mantiene la tensión interpretativa sin resolverla demasiado.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: '"Gloria" es el equivalente normal y poéticamente adecuado para el paralelismo del versículo.'
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y fuerza
  alternatives_spanish:
  - y poder
  - y vigor
  - y fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza o poder. "Fuerza" es claro en español y mantiene bien el paralelismo con "gloria".
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la norma del proyecto pide representarlo como "Yahvé". Esto conserva el nombre del pacto en vez de neutralizarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación de בְּנֵי אֵלִים
  english_pob_reading: O sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos de los poderosos
  - seres celestiales
  rationale: El hebreo probablemente alude a seres del consejo celestial, pero el matiz exacto es debatido. "Hijos de Dios" refleja la revisión inglesa reciente y preserva la ambigüedad relevante para la exégesis.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que cambió "sons of the mighty" por "sons of God" para reflejar con mayor precisión בְּנֵי אֵלִים, sin perder el registro formal ni la estructura paralela del verso.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente con la directriz del proyecto para יְהוָה.
  - Se usa "hijos de Dios" para seguir la revisión inglesa más reciente y evitar una expansión innecesaria.
  - '"Asignen" conserva el imperativo poético y la simetría del paralelismo hebreo.'
  - '"Gloria y fuerza" mantiene una equivalencia sobria y natural en español, adecuada para lectura pública.'
