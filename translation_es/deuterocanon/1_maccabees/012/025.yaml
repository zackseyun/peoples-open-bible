translation:
  language: es
  text: Y salió de Jerusalén y les salió al encuentro en la tierra de Hamat[a]; porque no les dio oportunidad[b] de entrar en su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la región hamatita» o «la región de Hamat». La expresión griega se refiere al territorio de Hamat.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no les dio respiro». Aquí ἀνοχή puede sugerir demora, tolerancia o margen de acción, no necesariamente una tregua formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se puso en camino
  - marchó
  lexicon: LSJ
  rationale: El aoristo aquí expresa partida desde Jerusalén. «Salió» es natural en español y conserva el movimiento sin sobrecargar el verso con matiz militar innecesario.
- source_word: ἀπήντησεν
  english_pob_choice: met
  chosen_spanish: se encontró con
  alternatives_spanish:
  - fue a encontrarse con
  - se reunió con
  - encontró
  lexicon: LSJ
  rationale: El verbo puede significar encontrarse o ir al encuentro. «Se encontró con» mantiene el sentido relacional y funciona bien en español con la frase locativa que sigue.
- source_word: εἰς τὴν Ἀμαθεῖτιν χώραν
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Amat
  alternatives_spanish:
  - en la región de Amat
  - en el territorio de Amat
  - en la tierra de Jamat
  lexicon: LSJ
  rationale: Ἀμαθεῖτις designa la región de Hamat/Hamathe. Se eligió «Amat» para seguir una forma breve y clara en español; la expresión indica territorio/región, no solo una ciudad.
- source_word: ἀνοχήν
  english_pob_choice: opportunity
  chosen_spanish: oportunidad
  alternatives_spanish:
  - respiro
  - permiso
  - tregua
  - aplazamiento
  lexicon: BDAG
  rationale: En este contexto militar, ἀνοχή no apunta necesariamente a una tregua formal sino a dejar espacio o posibilidad de avanzar. «Oportunidad» refleja bien la idea de no concederles ocasión para entrar.
- source_word: τοῦ ἐμβατεῦσαι
  english_pob_choice: to enter
  chosen_spanish: de entrar
  alternatives_spanish:
  - de invadir
  - de penetrar
  - de poner pie en
  lexicon: LSJ
  rationale: El infinitivo expresa el acto de entrar o poner pie en un lugar. «De entrar» es la solución más fiel y sobria; evita añadir una violencia interpretativa que el verbo por sí solo no exige.
- source_word: τὴν χώραν αὐτοῦ
  english_pob_choice: his land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su territorio
  - en su país
  - en su región
  lexicon: LSJ
  rationale: «χώρα» puede ser tierra, territorio o región. «Su tierra» conserva la posesión y suena natural en español bíblico sin perder precisión geográfica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del inglés POB, que reemplazó «no respite» por «no opportunity» para ἀνοχή. En español se preserva esa decisión con «no les dio oportunidad», evitando convertirla en una tregua formal. También se mantiene la referencia territorial de Ἀμαθεῖτις con una nota alternativa para la forma regional.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se mantiene «Amat» como forma breve en el texto principal y se aclara en nota la posibilidad de «región de Amat».
  - «Oportunidad» se reserva aquí por el contexto militar; no se usa «tregua» en el texto principal para no introducir una relación diplomática no explicitada por el griego.
