id: EZR.6.14
reference: Ezra 6:14
source:
  edition: WLC
  text: וְ/שָׂבֵ֤י יְהוּדָיֵ/א֙ בָּנַ֣יִן וּ/מַצְלְחִ֔ין בִּ/נְבוּאַת֙ חַגַּ֣י נביא/ה וּ/זְכַרְיָ֖ה בַּר עִדּ֑וֹא וּ/בְנ֣וֹ וְ/שַׁכְלִ֗לוּ מִן טַ֨עַם֙ אֱלָ֣הּ יִשְׂרָאֵ֔ל וּ/מִ/טְּעֵם֙ כּ֣וֹרֶשׁ וְ/דָרְיָ֔וֶשׁ וְ/אַרְתַּחְשַׁ֖שְׂתְּא מֶ֥לֶךְ פָּרָֽס־־׃
translation:
  text: And the elders of the Jews were building and prospering through the prophecy of Haggai the prophet and Zechariah son of Iddo[c][b][a]. They finished building by the decree of the God of Israel and by the decree of Cyrus and Darius and Artaxerxes king of Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and succeeding' or 'and making progress.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the command of' for 'by the decree of.'
    reason: lexical_alternative
  - marker: c
    text: The verse attributes the completion both to God's decree and to the decrees of Persian kings, with God's decree named first.
    reason: cross_reference
lexical_decisions:
- source_word: שָׂבֵי יְהוּדָיֵא
  chosen: the elders of the Jews
  alternatives:
  - the Jewish elders
  - the elders of Judah
  lexicon: HALOT
  rationale: The Aramaic phrase denotes the leading older men/community leaders among the Judeans/Jews. 'Elders of the Jews' is a transparent rendering that preserves both the social role and the ethnic designation without overinterpreting geographically as 'Judah'.
- source_word: בָּנַיִן
  chosen: were building
  alternatives:
  - were rebuilding
  - built
  lexicon: HALOT
  rationale: The participle gives ongoing action. 'Were building' preserves the progressive sense. 'Rebuilding' is contextually true but not explicit in the verb itself.
- source_word: וּמַצְלְחִין
  chosen: and prospering
  alternatives:
  - and succeeding
  - and making progress
  lexicon: HALOT
  rationale: The participle from the root for prosper/succeed indicates that the work was going well. 'Prospering' keeps the lexical connection to success under divine favor, while still sounding natural in English.
- source_word: בִּנְבוּאַת
  chosen: through the prophecy of
  alternatives:
  - by the prophesying of
  - because of the prophecy of
  lexicon: HALOT
  rationale: The preposition marks means/instrumentality. 'Through the prophecy of' communicates that the prophets' ministry was the means by which the builders prospered.
- source_word: חַגַּי נביאה
  chosen: Haggai the prophet
  lexicon: HALOT
  rationale: Standard appositional rendering of the name plus title.
- source_word: וּזְכַרְיָה בַּר עִדּוֹא
  chosen: and Zechariah son of Iddo
  alternatives:
  - and Zechariah the son of Iddo
  lexicon: HALOT
  rationale: '''bar'' is the normal Aramaic filial marker. ''Son of Iddo'' is the natural English equivalent.'
- source_word: וּבְנוֹ
  chosen: They finished building
  alternatives:
  - and they built
  - and they completed it
  lexicon: HALOT
  rationale: In context the verb resumes the builders' action and leads into completion. Rendering with 'finished building' captures the sense in coordination with the following verb 'completed/perfected' and avoids an awkwardly wooden sequence in English.
- source_word: וְשַׁכְלִלוּ
  chosen: finished building
  alternatives:
  - completed it
  - brought it to completion
  lexicon: HALOT
  rationale: 'This verb carries the sense of completing or bringing to full finish. In English, the preceding and following clauses are best represented by a single smooth completion statement: ''They finished building.'''
- source_word: מִן טַעַם
  chosen: by the decree of
  alternatives:
  - according to the command of
  - by the decision of
  lexicon: HALOT
  rationale: In Imperial Aramaic this noun commonly refers to an official command, decree, or authorization. 'By the decree of' fits both the divine and royal references in this verse and preserves the repeated structure.
- source_word: אֱלָהּ יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward genitival title; no need to expand beyond the source.
- source_word: וּמִטְּעֵם כּוֹרֶשׁ וְדָרְיָוֶשׁ וְאַרְתַּחְשַׁשְׂתְּא
  chosen: and by the decree of Cyrus and Darius and Artaxerxes
  alternatives:
  - and by the command of Cyrus, Darius, and Artaxerxes
  lexicon: HALOT
  rationale: The repeated noun with prefixed preposition is best carried over once in idiomatic English while preserving the list of Persian kings whose decrees authorized the work.
- source_word: מֶלֶךְ פָּרָס
  chosen: king of Persia
  alternatives:
  - the king of Persia
  lexicon: HALOT
  rationale: The singular title most naturally apposes the final named king in form, but in English it can stand after the list without obscuring that these are Persian kings. The anarthrous English 'king of Persia' is idiomatic here.
