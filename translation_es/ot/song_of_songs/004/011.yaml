    text: Or 'comb honey'; the Hebrew נֹפֶת is more specific than the later word for 'honey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'honey and milk,' not the more familiar phrase 'milk and honey.'
    reason: lexical_alternative
