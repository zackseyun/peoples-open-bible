base_translation:
  language: en
  yaml_path: translation/ot/genesis/039/009.yaml
  text: There is no one greater in this house than I am[a], and he has withheld nothing from me except you, because you are his wife[b]. So how could I do this great evil and sin against God?
  footnotes:
  - marker: a
    text: Or, 'No one in this house is greater than I.' The Hebrew literally negates the existence of anyone greater than Joseph within the house.
    reason: lexical_alternative
  - marker: b
    text: Or, 'this great wickedness.' The Hebrew רָעָה can denote evil, wickedness, or wrong.
    reason: lexical_alternative
