base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/015/009.yaml
  text: And when they came to her[a], they all with one accord blessed her and said to her, “You are the glory of Jerusalem, you are the great boast of Israel[b], you are the great pride of our people.”
  footnotes:
