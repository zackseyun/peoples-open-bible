  yaml_path: translation/nt/acts/028/015.yaml
  text: And from there the brothers[a], when they heard about us, came to meet us as far as Appius Forum and Three Taverns. When Paul saw them, he gave thanks to God and took courage.
  footnotes:
  - marker: a
    text: "Or, 'the brothers and sisters'; the Greek says 'brothers,' a common form for fellow believers that may include women in context."
    reason: lexical_alternative
translation:
  language: ko
  text: 그곳에서부터 형제들이 우리에 관한 소식을 듣고, 우리를 맞이하러 압비오 광장과 삼관까지 왔습니다. 바울이 그들을 보고 하나님께 감사드리며 용기를 얻었습니다.
  philosophy: optimal-equivalence
