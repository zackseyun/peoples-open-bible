translation:
  language: es
  text: Ven[a], bebamos a saciedad de amores[b] hasta la mañana; deleitémonos con amor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Anda». El hebreo es una invitación imperativa idiomática; «Ven» expresa bien el tono del llamamiento seductor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «bebamos hasta saciarnos de caricias». El hebreo usa términos sensuales que también pueden traducirse de manera más concreta como expresiones físicas de amor.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «recreémonos en amor»; también puede entenderse con un matiz más erótico, como disfrute amoroso en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Anda
  lexicon: HALOT
  rationale: El hebreo funciona como una invitación/exhortación idiomática. «Ven» es natural en español y conserva el tono de seducción mejor que un calco más literal.
- source_word: נִרְוֶה
  english_pob_choice: let us drink our fill
  chosen_spanish: bebamos a saciedad
  alternatives_spanish:
  - bebamos hasta saciarnos
  - saciémonos
  lexicon: HALOT
  rationale: El verbo expresa la idea de saciarse, con imagen de beber hasta quedar satisfechos. «Bebamos a saciedad» mantiene esa metáfora sin sonar torpe en español.
- source_word: דֹדִים
  english_pob_choice: love
  chosen_spanish: amores
  alternatives_spanish:
  - amor
  - caricias
  lexicon: HALOT
  rationale: En este contexto erótico, el plural hebreo sugiere expresiones o actos de amor. «Amores» conserva el plural y la carga sensual sin añadir más especificación de la que el texto exige.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta el alba
  lexicon: HALOT
  rationale: Es una indicación temporal directa. «Hasta la mañana» es natural y fiel al sentido básico del hebreo.
- source_word: נִתְעַלְּסָה
  english_pob_choice: let us delight ourselves
  chosen_spanish: deleitémonos
  alternatives_spanish:
  - gocemos
  - recreémonos
  lexicon: HALOT
  rationale: El hitpael comunica gozo y regocijo sensual/reflexivo. «Deleitémonos» preserva esa nuance sin volver el español demasiado explícito o coloquial.
- source_word: בָּאֳהָבִים
  english_pob_choice: with love
  chosen_spanish: con amores
  alternatives_spanish:
  - con amor
  - con caricias
  lexicon: HALOT
  rationale: 'La revisión inglesa prefirió «love» para no expandir a «lovemaking». En español, «con amores» sigue la misma prudencia: conserva el plural y el campo erótico, evitando una interpretación más fuerte que el hebreo.'
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una lectura más explícita («with lovemaking») a «with love» para ajustarse mejor al plural hebreo y evitar una expansión interpretativa. La traducción española sigue esa revisión y mantiene el paralelismo entre los dos miembros del versículo.
  spanish_consistency_notes:
  - Se mantiene «amores» en ambos casos para reflejar la repetición del hebreo y conservar la tensión erótica del paralelismo.
  - Se evita «SEÑOR» y terminología cultual, porque el verso no contiene el nombre divino ni vocabulario teológico técnico.
  - El registro es moderno y digno, pero con suficiente literalidad para conservar el tono persuasivo y sensual del original.
