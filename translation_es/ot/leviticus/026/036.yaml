    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar mejor el plural hebreo «tierras», mejorar la naturalidad de la imagen de la hoja sin perder la alternativa lexical documentada, y hacer más clara la comparación de la huida con la espada. También se suaviza una construcción española algo rígida al inicio. No hace falta adjudicación adicional.
