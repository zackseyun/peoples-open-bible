translation:
  language: es
  text: ¿Por qué he visto esto? Están aterrados, retrocediendo; sus guerreros son derribados[a], y han huido apresuradamente y no volvieron atrás. Hay terror por todas partes, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus hombres poderosos son abatidos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué?
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Interrogativo que abre la exclamación profética; en español mantiene bien el tono sorprendido sin añadir explicación.
- source_word: רָאִיתִי
  english_pob_choice: have I seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - estoy viendo
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso profético se entiende naturalmente en español con perfecto compuesto, conservando el efecto vívido de visión inmediata.
- source_word: חַתִּים
  english_pob_choice: terrified
  chosen_spanish: aterrados
  alternatives_spanish:
  - desalentados
  - consternados
  lexicon: HALOT
  rationale: Expresa el estado de pánico y quiebre anímico en contexto militar; 'aterrados' comunica bien la intensidad sin perder naturalidad.
- source_word: נְסֹגִים אָחוֹר
  english_pob_choice: turning back
  chosen_spanish: volviéndose atrás
  alternatives_spanish:
  - retrocediendo
  - retirándose
  lexicon: HALOT
  rationale: Conserva la idea de retroceso físico y de retirada, de manera idiomática en español.
- source_word: גִבּוֹרֵיהֶם
  english_pob_choice: their warriors
  chosen_spanish: sus guerreros
  alternatives_spanish:
  - sus valientes
  - sus poderosos
  lexicon: HALOT
  rationale: En contexto bélico, 'guerreros' transmite la referencia a combatientes fuertes sin la carga más arcaica de 'hombres poderosos'.
- source_word: יֻכַּתּוּ
  english_pob_choice: are crushed
  chosen_spanish: son derribados
  alternatives_spanish:
  - son aplastados
  - son golpeados
  lexicon: HALOT
  rationale: La pasiva de הכה indica derrota violenta; 'derribados' preserva la caída en combate y resulta natural en español.
- source_word: וּמָנ֥וֹס נָ֖סוּ
  english_pob_choice: and they have fled hastily
  chosen_spanish: y han huido apresuradamente
  alternatives_spanish:
  - y han huido a la carrera
  - y han huido en fuga
  lexicon: HALOT
  rationale: Reproduce la intensidad del sustantivo cognado con el verbo de huir, sin calcar de forma extraña la expresión hebrea.
- source_word: וְלֹא הִפְנוּ
  english_pob_choice: and have not turned back
  chosen_spanish: y no se han vuelto
  alternatives_spanish:
  - y no han vuelto atrás
  - y no han volteado
  lexicon: HALOT
  rationale: En español, 'se han vuelto' comunica bien la ausencia de giro o regreso; evita ambigüedad estilística y conserva el sentido de no reorientarse hacia el combate.
- source_word: מָגוֹר מִסָּבִיב
  english_pob_choice: Terror is on every side
  chosen_spanish: Terror por todas partes
  alternatives_spanish:
  - Pánico por todas partes
  - Terror en derredor
  lexicon: HALOT
  rationale: Es la fórmula recurrente de Jeremías; 'por todas partes' conserva la extensión total del pavor y su carácter proverbial.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el nombre divino y el fórmula profética, manteniendo solemnidad sin ocultar el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa la forma recomendada por el proyecto para el Nombre divino, de acuerdo con la fuente hebrea directa.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: El hebreo emplea explícitamente el Tetragrámaton; por tanto se preserva el Nombre propio en español en vez de sustituirlo por una máscara devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que prefirió 'this' y 'fled hastily' para el matiz demostrativo e intensivo; el español refleja ese mismo impulso con 'esto' y 'han huido apresuradamente'.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה según el estándar del proyecto.
  - Se prefirió 'sus guerreros' frente a 'sus hombres poderosos' por claridad moderna, dejando esa alternativa en nota.
  - 'La secuencia verbal conserva el paralelismo del hebreo: terror/retroceso, derrota de guerreros, huida precipitada, y ausencia de regreso.'
