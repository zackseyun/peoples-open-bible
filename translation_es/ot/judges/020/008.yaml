translation:
  language: es
  text: 'Entonces todo el pueblo se levantó como un solo hombre[a], diciendo: «Ninguno de nosotros irá a su tienda, y ninguno de nosotros se apartará a su casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un solo hombre», un modismo que expresa acción unificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo narrativo expresa el inicio de una acción colectiva y resoluta. «Se levantó» conserva el movimiento concreto y suena natural en español bíblico actual.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el ejército
  - toda la multitud
  lexicon: HALOT
  rationale: «Pueblo» refleja bien el cuerpo reunido de Israel en este contexto, sin introducir una precisión militar que el hebreo no exige.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como una sola persona
  - con un solo acuerdo
  lexicon: HALOT
  rationale: La imagen idiomática de unidad se conserva mejor con «como un solo hombre». Mantiene el singular concreto del hebreo y evita una paráfrasis más abstracta.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula narrativa normal para introducir el discurso directo. «Diciendo» corresponde con claridad al flujo del hebreo.
- source_word: לֹא נֵלֵךְ אִישׁ לְאָהֳלוֹ
  english_pob_choice: None of us will go to his tent
  chosen_spanish: Ninguno de nosotros irá a su tienda
  alternatives_spanish:
  - Ningún hombre irá a su tienda
  - Ninguno irá a su tienda
  lexicon: HALOT
  rationale: «Tienda» conserva el sentido literal de אָהֶל. «Ninguno de nosotros» reproduce en español la fuerza distributiva del hebreo y la resolución colectiva del verbo en primera persona plural.
- source_word: אָהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - campamento
  lexicon: HALOT
  rationale: En español, «tienda» es la equivalencia más directa y breve para אָהֶל. «Tienda de campaña» sería más explicativa de lo necesario.
- source_word: וְלֹא נָסוּר אִישׁ לְבֵיתוֹ
  english_pob_choice: and none of us will turn aside to his house
  chosen_spanish: y ninguno de nosotros se apartará a su casa
  alternatives_spanish:
  - y ninguno de nosotros se desviará a su casa
  - y ninguno de nosotros volverá a su casa
  lexicon: HALOT
  rationale: סור significa «apartarse / desviarse». «Se apartará» preserva el matiz de abandonar temporalmente la causa común para ir a casa, sin forzar el sentido de «volver».
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - morada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». «Casa» mantiene la distinción con la cláusula anterior sobre la «tienda» y evita suavizar demasiado el paralelo.
translation_notes:
  revision_awareness: La versión inglesa de referencia pasó de 'rose up' a 'arose' y de una negación enfática más literal a una más natural. En español se optó por un equivalente sobrio y formal («se levantó»), manteniendo la unidad idiomática del hebreo con una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se preserva el paralelo entre «tienda» y «casa», evitando nivelarlo como «hogar».
  - La negación colectiva se formula con «ninguno de nosotros» para reflejar tanto la primera persona plural como el distributivo hebreo.
  - La nota al pie marca la idiomaticidad de «como un solo hombre» sin desactivar su fuerza concreta.
