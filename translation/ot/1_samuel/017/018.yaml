id: 1SA.17.18
reference: 1 Samuel 17:18
source:
  edition: WLC
  text: וְ֠/אֵת עֲשֶׂ֜רֶת חֲרִצֵ֤י הֶֽ/חָלָב֙ הָ/אֵ֔לֶּה תָּבִ֖יא לְ/שַׂר הָ/אָ֑לֶף וְ/אֶת אַחֶ֨י/ךָ֙ תִּפְקֹ֣ד לְ/שָׁל֔וֹם וְ/אֶת עֲרֻבָּתָ֖/ם תִּקָּֽח־־־׃
translation:
  text: Also bring these ten cuts of cheese to the commander of the thousand[a], check on your brothers’ welfare, and bring back some token from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their pledge,” that is, some item or sign brought back as proof of your brothers’ condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲרִצֵי הֶחָלָב
  chosen: cuts of cheese
  alternatives:
  - cheeses
  - curds of milk
  - slices of cheese
  lexicon: HALOT
  rationale: חֲרִיצִים can denote cut pieces or cakes; with הֶחָלָב the sense is dairy products formed into portions. 'Cuts of cheese' is natural modern English while preserving the concrete image better than the vaguer 'cheeses.'
- source_word: שַׂר הָאָלֶף
  chosen: commander of the thousand
  alternatives:
  - captain of the thousand
  - officer over the thousand
  lexicon: HALOT
  rationale: שַׂר is a leader/commander, and הָאָלֶף refers to a military unit of a thousand. 'Commander of the thousand' keeps the military structure visible without using archaic 'captain.'
- source_word: תִּפְקֹד לְשָׁלוֹם
  chosen: check on your brothers’ welfare
  alternatives:
  - visit your brothers for peace
  - see how your brothers are doing
  - attend to your brothers' well-being
  lexicon: HALOT
  rationale: פקד here means to attend to, look after, or ascertain the condition of someone; לְשָׁלוֹם indicates their well-being/welfare. The idiomatic English 'check on ... welfare' conveys the sense accurately.
- source_word: עֲרֻבָּתָם
  chosen: some token from them
  alternatives:
  - their pledge
  - evidence from them
  - a sign from them
  lexicon: HALOT
  rationale: The noun likely refers to a pledge, token, or proof brought back as confirmation of their condition. In this context Jesse wants tangible evidence from his sons; 'some token from them' is idiomatic and contextually clear while preserving the underlying idea of a returned pledge.
- source_word: וְאֵת
  chosen: also
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces another item in the sequence of instructions. Rendering the initial waw as 'also' improves English flow while preserving additive force.
- source_word: תָּבִיא
  chosen: bring
  alternatives:
  - take
  - carry
  lexicon: HALOT
  rationale: In context of delivering provisions to the camp, 'bring' is the most natural English equivalent from the speaker's perspective.
- source_word: תִּקָּח
  chosen: bring back
  alternatives:
  - take
  - receive
  lexicon: HALOT
  rationale: Although לקח is literally 'take,' the context requires taking something back to Jesse. 'Bring back' makes the directional sense explicit in natural English.
