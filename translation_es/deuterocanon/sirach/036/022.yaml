translation:
  language: es
  text: Un corazón torcido[a] causa tristeza, y un hombre muy experimentado le retribuirá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «retorcido» o «perverso».'
    reason: lexical_alternative
  - marker: b
    text: El griego también puede entenderse más generalmente como «un hombre muy experimentado le responderá» o «le retribuirá». El matiz exacto de la respuesta no se especifica.
    reason: alternative_reading
lexical_decisions:
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: LSJ
  rationale: «Corazón» conserva en español bíblico la sede de la disposición moral y del pensamiento práctico, sin perder la imagen proverbial del texto.
- source_word: στρεβλή
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - retorcido
  - perverso
  lexicon: LSJ
  rationale: «Torcido» comunica la imagen de deformidad moral de manera natural en español. «Perverso» sería más interpretativo y más fuerte de lo que el griego exige.
- source_word: δώσει λύπην
  english_pob_choice: causes grief
  chosen_spanish: causa tristeza
  alternatives_spanish:
  - causa dolor
  - produce aflicción
  lexicon: LSJ
  rationale: La combinación verbal se vierte con un verbo causativo claro y un sustantivo comprensible. «Tristeza» conserva el efecto de λύπη sin sobrecargarlo con un matiz físico o teológico no explícito.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: LSJ
  rationale: Se mantiene el singular masculino proverbial del griego. En este dicho sapiencial no hay base suficiente para neutralizarlo sin perder la forma original.
- source_word: πολύπειρος
  english_pob_choice: very experienced
  chosen_spanish: de mucha experiencia
  alternatives_spanish:
  - muy experimentado
  - experimentado
  lexicon: LSJ
  rationale: «De mucha experiencia» reproduce con más transparencia el valor de πολύπειρος como alguien probado por mucho trato con la vida; evita convertir el adjetivo en un simple elogio coloquial.
- source_word: ἀνταποδώσει
  english_pob_choice: will repay
  chosen_spanish: le dará su merecido
  alternatives_spanish:
  - le responderá
  - le retribuirá
  lexicon: LSJ
  rationale: El griego permite una respuesta o retribución recíproca, sin especificar si es favorable o adversa. «Le dará su merecido» preserva la idea de retribución en un español idiomático, aunque con leve coloración negativa; por eso se documentan alternativas más neutras.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: LSJ
  rationale: El dativo se integra de forma natural en español con pronombre enclítico/átono. La referencia personal singular se mantiene sin añadir un antecedente explícito no presente en el griego.
theological_decisions:
- issue: Alcance moral de στρεβλή aplicado al corazón
  english_pob_reading: A crooked heart
  chosen_spanish_reading: Un corazón torcido
  alternative_spanish_readings:
  - Un corazón perverso
  - Un corazón retorcido
  rationale: El griego describe una deformidad moral/psicológica, pero no desarrolla una doctrina de corrupción total. «Torcido» mantiene la tensión entre imagen moral y sobriedad léxica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Naturaleza de la respuesta en ἀνταποδώσει
  english_pob_reading: will repay him
  chosen_spanish_reading: le dará su merecido
  alternative_spanish_readings:
  - le responderá
  - le retribuirá
  rationale: La frase griega deja indeterminado el contenido exacto de la respuesta. La traducción española conserva la reciprocidad, pero documenta una opción idiomática que no debe leerse como especificación doctrinal del tipo de retribución.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa más reciente pasó de «gives grief» a «causes grief» y de «of much experience» a «very experienced». La redacción española sigue esa orientación causativa y la idea de experiencia abundante, pero mantiene una formulación idiomática natural en español.
  spanish_consistency_notes:
  - Se emplea «corazón» para καρδία, en línea con el uso bíblico estándar y con el valor moral-psicológico del contexto.
  - «Torcido» evita intensificar innecesariamente el juicio moral y deja abierta la gama semántica documentada por la tradición auditada.
  - «De mucha experiencia» conserva el carácter proverbial de πολύπειρος sin convertirlo en una descripción técnica.
  - La retribución final se formula de modo idiomático, pero queda anotada la ambigüedad del griego respecto de si se trata de responder o recompensar.
