translation:
  language: es
  text: y para ponerte en alto sobre todas las naciones que él ha hecho, para alabanza y para renombre y para gloria[a], y para que seas un pueblo santo consagrado a Yahvé tu Dios, como él ha hablado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esplendor» o «hermosura» para תִפְאָרֶת. «Gloria» conserva un registro bíblico natural en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O «como él prometió». Literalmente: «como él ha hablado».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְתִתְּךָ
  english_pob_choice: and to set you
  chosen_spanish: y para ponerte
  alternatives_spanish:
  - y para colocarte
  - y para establecerte
  lexicon: HALOT
  rationale: 'El infinitivo constructo con prefijo expresa propósito/resultad: en español, «para ponerte» conserva la idea de ser puesto en una posición elevada sin sonar rígido.'
- source_word: עֶלְיוֹן
  english_pob_choice: high
  chosen_spanish: en alto
  alternatives_spanish:
  - alto
  - elevado
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona de modo predicativo con la idea de elevar; «en alto» suena natural en español y mantiene la imagen espacial de exaltación.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: above all the nations
  chosen_spanish: sobre todas las naciones
  alternatives_spanish:
  - por encima de todas las naciones
  - sobre todos los pueblos
  lexicon: HALOT
  rationale: «Sobre» reproduce היטב el sentido comparativo/exaltativo de עַל. «Naciones» mantiene el valor habitual de גוים en este contexto pactal.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has made
  chosen_spanish: que él ha hecho
  alternatives_spanish:
  - que él hizo
  - que él creó
  lexicon: HALOT
  rationale: «Ha hecho» sigue de cerca el hebreo sin intensificar a «crear». Conserva la referencia a las naciones como obra de Yahvé.
- source_word: לִתְהִלָּה
  english_pob_choice: for praise
  chosen_spanish: para alabanza
  alternatives_spanish:
  - para alabar
  - para elogio
  lexicon: HALOT
  rationale: El sustantivo se vierte con otro sustantivo español igualmente abstracto; «alabanza» preserva la triada nominal del hebreo.
- source_word: וּלְשֵׁם
  english_pob_choice: for renown
  chosen_spanish: y para renombre
  alternatives_spanish:
  - y para nombre
  - y para fama
  lexicon: HALOT
  rationale: El POB inglés revisado optó por «renown» por el sentido figurado de שֵׁם. En español, «renombre» expresa esa reputación pública mejor que «nombre», que sería demasiado literal y opaco.
- source_word: וּלְתִפְאָ֑רֶת
  english_pob_choice: for glory
  chosen_spanish: y para gloria
  alternatives_spanish:
  - y para esplendor
  - y para hermosura
  lexicon: HALOT
  rationale: «Gloria» sigue la revisión inglesa del POB y recoge bien la fuerza de תפארת como esplendor/honor/gloria en un registro bíblico natural.
- source_word: וְלִהְיֹתְךָ עַם קָדֹשׁ
  english_pob_choice: and for you to be a holy people
  chosen_spanish: y para que seas un pueblo santo
  alternatives_spanish:
  - y para ser un pueblo santo
  - y para que seas un pueblo consagrado
  lexicon: HALOT
  rationale: La construcción final expresa propósito. «Pueblo santo» es la equivalencia más directa de עם קדוש; «para que seas» fluye mejor en español que un infinitivo demasiado pesado.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: para Yahvé tu Dios
  alternatives_spanish:
  - de Yahvé tu Dios
  - perteneciente a Yahvé tu Dios
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto: Yahvé para יהוה. Aquí el lamed expresa relación/ pertenencia dentro del propósito del versículo; «para Yahvé» mantiene la economía y la relación del texto.'
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: as he has spoken
  chosen_spanish: como él ha hablado
  alternatives_spanish:
  - como ha dicho
  - como él prometió
  lexicon: HALOT
  rationale: «Ha hablado» es más literal que «prometió» y no importa una inferencia no explicitada por el verbo, aunque el contexto sea claramente pactal.
theological_decisions:
- issue: Si traducir el cierre como promesa explícita o como simple decir/hablar
  english_pob_reading: as he has spoken
  chosen_spanish_reading: como él ha hablado
  alternative_spanish_readings:
  - como él prometió
  - como él dijo
  rationale: El hebreo usa דִּבֵּר, «habló/dijo». En un contexto de pacto la idea de promesa está implicada, pero el texto no la verbaliza; por eso la redacción principal conserva la forma más cercana al hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar el nombre divino יהוה
  english_pob_reading: the LORD / Yahweh in the source packet default
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide Yahvé en el texto principal para יהוה. Se evita la sustitución litúrgica «SEÑOR» porque ocultaría el nombre propio del original.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Valor semántico de שֵׁם y תִפְאָרֶת
  english_pob_reading: for renown and for glory
  chosen_spanish_reading: para renombre y para gloria
  alternative_spanish_readings:
  - para nombre y para hermosura
  - para fama y para esplendor
  rationale: La revisión inglesa del POB ya adjudicó estas opciones. En español, «renombre» y «gloria» transmiten mejor la reputación pública y el esplendor/honor sin borrar la doble dimensión del hebreo.
  doctrine_reference: HALOT lexical notes; revision_pass 2026-04-23
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que cambió «for name» a «for renown» y «for beauty» a «for glory». También preserva la cláusula final literal «as he has spoken» frente a la paráfrasis «as he promised», y mantiene la elevación comparativa de עֶלְיוֹן como posición de exaltación sobre las naciones.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - Se usa «pueblo santo» para עַם קָדֹשׁ, con registro bíblico claro y natural.
  - «Renombre» y «gloria» se alinean con la revisión del POB y evitan literalismos opacos como «nombre» y «belleza» en español.
  - La puntuación conserva la cadencia acumulativa del hebreo con una serie de propósitos introducidos por «para».
