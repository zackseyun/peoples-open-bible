translation:
  language: es
  text: 'Entonces aparté a doce de los principales sacerdotes[a]: Serebías, Jasabías, y con ellos diez de sus hermanos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los jefes de los sacerdotes».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» puede referirse en sentido más amplio a sus parientes o asociados, pero el hebreo usa el término familiar masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַבְדִּילָה
  english_pob_choice: Then I set apart
  chosen_spanish: Entonces aparté
  alternatives_spanish:
  - Entonces separé
  - Entonces puse aparte
  lexicon: HALOT
  rationale: El verbo hifil de בדל expresa separar o apartar. «Aparté» comunica bien la acción de distinguir o destinar a un grupo para una función concreta, y el «Entonces» conserva la secuencia narrativa del hebreo y del inglés POB.
- source_word: מִשָּׂרֵי הַכֹּהֲנִים
  english_pob_choice: of the leading priests
  chosen_spanish: de los principales sacerdotes
  alternatives_spanish:
  - de los jefes de los sacerdotes
  - de los sacerdotes principales
  - de los líderes de los sacerdotes
  lexicon: HALOT
  rationale: שָׂרִים denota jefes, príncipes o líderes. En español, «principales sacerdotes» expresa con naturalidad la idea de sacerdotes de rango destacado sin forzar una construcción pesada como «jefes de los sacerdotes». La preposición מִן queda bien reflejada por «de» en sentido partitivo.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Número cardinal directo y sin tensión semántica.
- source_word: לְשֵׁרֵבְיָה חֲשַׁבְיָה
  english_pob_choice: Sherebiah, Hashabiah
  chosen_spanish: Serebías, Jasabías
  alternatives_spanish:
  - Serebía, Jasabía
  - Sherebías, Hashabías
  lexicon: Proyecto onomástico; transliteración adaptada al español
  rationale: Los nombres propios se transliteran al español con adaptación ortográfica para lectura natural. Se conserva la distinción de los nombres sin introducir equivalencias interpretativas.
- source_word: וְעִמָּהֶם
  english_pob_choice: and with them
  chosen_spanish: y con ellos
  alternatives_spanish:
  - y con ellos mismos
  - junto con ellos
  lexicon: HALOT
  rationale: La conjunción y la frase preposicional se conservan explícitamente. «Con ellos» reproduce de forma natural la relación aditiva y acompañante del hebreo.
- source_word: מֵאֲחֵיהֶם
  english_pob_choice: of their brothers
  chosen_spanish: de sus hermanos
  alternatives_spanish:
  - de sus parientes
  - de sus compatriotas
  - de sus allegados
  lexicon: HALOT
  rationale: אֲחִים puede abarcar hermanos literales o parientes cercanos/comunidad afín; sin embargo, el texto usa el término familiar masculino, por lo que «hermanos» es la opción más directa y fiel. En este contexto sacerdotal puede incluir asociados del mismo linaje o grupo ministerial, pero la traducción no debe borrar esa forma concreta.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: Número cardinal directo y sin dificultad interpretativa.
translation_notes:
  revision_awareness: El pasaje no requirió cambios respecto del último pase de revisión en el contexto inglés; se mantuvo la lectura narrativa y la estructura partitiva del hebreo, con adaptación ortográfica de nombres propios al español.
  spanish_consistency_notes:
  - Se usa «aparté» para בדל en línea con el valor de separación funcional, no meramente física.
  - Se evita «SEÑOR» o sustituciones teológicas, porque aquí no aparece el Nombre divino.
  - «Principales sacerdotes» conserva el matiz de rango/liderazgo sin introducir terminología eclesial ajena.
  - Los nombres propios se adaptan al español para legibilidad, manteniendo el vínculo identificable con la forma inglesa auditada.
