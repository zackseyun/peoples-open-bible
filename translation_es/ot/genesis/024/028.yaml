- from: Entonces la joven corrió y se lo contó a la familia de su madre[a], conforme a estas cosas.
  to: Entonces la joven corrió y le contó a la familia de su madre[a] estas cosas.
  rationale: Se corrige la frase final para reflejar naturalmente el sentido de כַּדְּבָרִים הָאֵלֶּה como contenido de lo narrado, no como conformidad. También se elimina el pronombre anticipatorio «lo» para mejorar la claridad en español. Se conserva la alternativa léxica sobre «casa»/«familia» mediante nota al pie, ya que בַּיִת puede abarcar ambas ideas.
