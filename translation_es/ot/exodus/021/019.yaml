    reason: lexical_alternative
  revision_rationale: Se ajustó el español para reflejar con más precisión el matiz jurídico de וְנִקָּה y para expresar de manera más idiomática la obligación causativa e intensiva de וְרַפֹּא יְרַפֵּא. También se mejoró la naturalidad de la compensación por שִׁבְתּוֹ sin perder el sentido auditado de tiempo de incapacidad.
