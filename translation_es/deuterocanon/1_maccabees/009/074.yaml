translation:
  language: es
  text: Cuando Jonatán oyó las palabras de Apolonio, se conmovió en su mente, y escogió diez mil hombres, y salió de Jerusalén; y Simón, su hermano, se encontró con él[a] para ayudarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «se encontró con él para su ayuda». La expresión indica que Simón salió a su encuentro para apoyarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyó
  alternatives_spanish:
  - Y cuando ... oyó
  - Ahora, cuando ... oyó
  lexicon: LSJ
  rationale: La cláusula temporal de Ὡς δὲ ἤκουσεν se vierte de manera natural con «Cuando ... oyó», conservando la secuencia narrativa sin sobrecargar el español.
- source_word: τῶν λόγων
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - lo que dijo
  lexicon: LSJ
  rationale: λόγων es literalmente «palabras»; «las palabras» mantiene la cercanía al griego y funciona bien en español.
- source_word: ἐκινήθη τῇ διανοίᾳ
  english_pob_choice: he was stirred in his mind
  chosen_spanish: se agitó en su mente
  alternatives_spanish:
  - fue movido en su mente
  - se turbó en su mente
  - se agitó en su espíritu
  lexicon: LSJ
  rationale: La expresión apunta a una conmoción interior de la διανοία. «Se agitó en su mente» conserva el ámbito mental sin forzar una emoción específica ni desplazarla a «espíritu».
- source_word: ἐπέλεξεν
  english_pob_choice: he chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: «Escogió» refleja de forma directa el aoristo y suena natural en español narrativo.
- source_word: δέκα χιλιάδας ἀνδρῶν
  english_pob_choice: ten thousand men
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil soldados
  - diez mil tropas
  lexicon: LSJ
  rationale: ἀνδρῶν significa literalmente «hombres». Aunque el contexto es militar, el griego no dice explícitamente «soldados», por lo que se conserva «hombres».
- source_word: ἐξῆλθεν ἐξ Ἱερουσαλήμ
  english_pob_choice: went out from Jerusalem
  chosen_spanish: salió de Jerusalén
  alternatives_spanish:
  - partió de Jerusalén
  - marchó fuera de Jerusalén
  lexicon: LSJ
  rationale: «Salió de Jerusalén» es la forma más natural y fiel para ἐξῆλθεν ἐξ Ἱερουσαλήμ, sin añadir matiz militar no presente en el griego.
- source_word: συνήντησεν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: se encontró con él
  alternatives_spanish:
  - lo encontró
  - se reunió con él
  lexicon: LSJ
  rationale: El verbo literalmente es «se encontró con». Se evita un giro más interpretativo como «se reunió con él» y se mantiene la imagen de encuentro.
- source_word: ἐπὶ βοήθειαν αὐτοῦ
  english_pob_choice: to help him
  chosen_spanish: para ayudarlo
  alternatives_spanish:
  - en ayuda de él
  - para asistirlo
  lexicon: LSJ
  rationale: La frase expresa finalidad. «Para ayudarlo» comunica con claridad la intención de apoyo y conserva el sentido de βοήθεια.
theological_decisions:
- issue: El sentido de συνήντησεν αὐτῷ con ἐπὶ βοήθειαν αὐτοῦ
  english_pob_reading: Simon his brother met him to help him.
  chosen_spanish_reading: Simón, su hermano, se encontró con él para ayudarlo.
  alternative_spanish_readings:
  - Simón, su hermano, lo encontró para ayudarlo
  - Simón, su hermano, se reunió con él para ayudarlo
  rationale: El griego permite tanto un simple «encontrarse» como un encuentro orientado a apoyo. Se mantiene el valor básico de συνήντησεν y se añade en la nota la implicación funcional de ayuda, sin sustituir el verbo por una interpretación más fuerte que el texto no exige.
  doctrine_reference: Ninguno; decisión de sentido léxico-narrativo.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «joined him» a «met him» para reflejar más directamente συνήντησεν. La versión española sigue esa corrección con «se encontró con él», evitando una interpretación demasiado dinámica como «se reunió con él».
  spanish_consistency_notes:
  - Se conserva «Yahvé» no aplica aquí, pues el versículo no contiene el nombre divino.
  - Se usa «hombres» para δέκα χιλιάδας ἀνδρῶν por fidelidad al sustantivo griego, no «soldados».
  - «Mente» traduce διανοία según el énfasis interior señalado por el audit trail inglés.
