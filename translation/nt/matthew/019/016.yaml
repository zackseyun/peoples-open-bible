id: MAT.19.16
reference: Matthew 19:16
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ εἷς προσελθὼν ⸂αὐτῷ εἶπεν⸃· ⸀Διδάσκαλε, τί ἀγαθὸν ποιήσω ἵνα ⸀σχῶ ζωὴν αἰώνιον;
translation:
  text: And behold[a], one who had come up to him said, “Teacher, what good thing must I do so that I may have eternal life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what good deed shall I do ... ?' The Greek τί ἀγαθὸν can refer to a 'good thing' or, by implication with 'do,' a 'good deed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: BDAG
  rationale: Retains the discourse particle καί and the attention-getting force of ἰδού. 'Behold' is slightly traditional but still transparent and preserves the narrative vividness better than omitting it.
- source_word: εἷς
  chosen: one
  alternatives:
  - a man
  - someone
  lexicon: BDAG
  rationale: The Greek literally says 'one,' without yet specifying 'man' in this verse. Rendering it as 'one' preserves the source wording and avoids importing detail from parallels.
- source_word: προσελθὼν
  chosen: who had come up
  alternatives:
  - approaching
  - coming up
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating approach prior to speaking. 'Who had come up' gives natural English while preserving the participial sequence.
- source_word: αὐτῷ εἶπεν
  chosen: to him said
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: Standard indirect object plus speech verb. In the final English, reordered as 'said' after the relative clause for readability.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Title meaning 'teacher/instructor.' 'Teacher' is the plain lexical sense and avoids the potentially misleading connotations of 'Master' in modern English.
- source_word: τί ἀγαθὸν
  chosen: what good thing
  alternatives:
  - what good deed
  - what good
  lexicon: BDAG
  rationale: τί with neuter singular ἀγαθόν asks about a good act/thing to do. 'What good thing' is formally close; 'deed' is interpretive but plausible. The chosen rendering preserves the open wording while fitting the following verb 'do.'
- source_word: ποιήσω
  chosen: must I do
  alternatives:
  - shall I do
  - should I do
  lexicon: BDAG
  rationale: Aorist subjunctive in a deliberative question. English idiom commonly uses 'must I do' here to express the practical force of the question, without overstating theology.
- source_word: ἵνα σχῶ
  chosen: so that I may have
  alternatives:
  - that I may have
  - so that I may obtain
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result; σχῶ is aorist subjunctive of ἔχω. 'Have' is the direct lexical sense; 'obtain' is possible but more interpretive.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age to come
  - everlasting life
  lexicon: BDAG
  rationale: Established and accurate rendering of the phrase in this context. 'Life of the age to come' captures αἰώνιος more literally in some contexts, but 'eternal life' is both idiomatic and faithful here.
