translation:
  language: es
  text: '«Soberbio, arrogante, burlador[a]» es su nombre: el que actúa con furor arrogante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soberbio, altivo, mofador es su nombre; actúa con furor arrogante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵד
  english_pob_choice: proud
  chosen_spanish: soberbio
  alternatives_spanish:
  - orgulloso
  - presuntuoso
  lexicon: HALOT
  rationale: זֵד describe a una persona marcada por arrogancia o presunción. «Soberbio» funciona de manera natural en español y conserva el matiz de orgullo altivo sin volver el verso pesado.
- source_word: יָהִיר
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - altivo
  - jactancioso
  lexicon: HALOT
  rationale: El segundo adjetivo intensifica la autoexaltación. «Arrogante» es claro y mantiene la duplicación de rasgos sin fundirlos en uno solo.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: burlador
  alternatives_spanish:
  - escarnecedor
  - mofador
  lexicon: HALOT
  rationale: לֵץ en Proverbios suele señalar al tipo que se burla y desprecia la sabiduría. «Burlador» comunica bien esa categoría en español contemporáneo.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - así se llama
  - es su reputación
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática hebrea de caracterización, literalmente «su nombre», en una forma natural en español.
- source_word: עֹשֶׂה
  english_pob_choice: one who acts
  chosen_spanish: el que actúa
  alternatives_spanish:
  - el que obra
  - quien hace
  lexicon: HALOT
  rationale: El participio expresa conducta habitual. «El que actúa» reproduce el valor gnómico y evita reducirlo a un hecho puntual.
- source_word: בְּעֶבְרַת
  english_pob_choice: with arrogant fury
  chosen_spanish: con furor
  alternatives_spanish:
  - con ira desbordada
  - con rabia
  lexicon: HALOT
  rationale: עֶבְרָה denota ira intensa, desbordada. «Con furor» preserva la fuerza afectiva y permite combinarse con el modificador siguiente.
- source_word: זָדוֹן
  english_pob_choice: arrogant fury / presumption
  chosen_spanish: arrogante
  alternatives_spanish:
  - presuntuoso
  - con presunción
  lexicon: HALOT
  rationale: זָדוֹן aporta la nota de presunción o insolencia. En español, integrarlo como adjetivo dentro de la frase «furor arrogante» evita una abstracción extra y mantiene el vínculo semántico con los dos adjetivos iniciales.
translation_notes:
  revision_awareness: El inglés POB pasó de una clausula más abstracta («in the fury of presumption») a «with arrogant fury». La versión española sigue esa revisión reciente con una formulación natural, evitando abstraer זָדוֹן como un sustantivo independiente y manteniendo la fuerza proverbial del paralelismo.
  spanish_consistency_notes:
  - Se mantiene el registro proverbial y sintético del hebreo.
  - Se conserva la acumulación de descriptores para no neutralizar la intensidad retórica.
  - Se usa «furor» para עֶבְרָה, que en español comunica mejor la energía de la ira desbordada que «ira» a secas.
