translation:
  language: es
  text: El rey Demetrio a Jonatán su hermano, saludos, y a la nación de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los judeanos'. El griego Ἰουδαίων puede entenderse con énfasis étnico o geográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  - El monarca
  lexicon: LSJ
  rationale: Se conserva el título real inicial del encabezamiento epistolar. En español, el artículo definido da naturalidad sin cambiar el valor formal del original.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrius
  lexicon: transliteración convencional
  rationale: Nombre propio con forma bíblica usual en español.
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración convencional
  rationale: Se usa la forma bíblica habitual en español.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: to ... his brother
  chosen_spanish: a Jonatán, su hermano
  alternatives_spanish:
  - a Jonatán, el hermano
  - a Jonatán, hermano
  lexicon: LSJ
  rationale: El dativo con artículo funciona como fórmula de dirección en una carta. 'Su hermano' reproduce la relación expresada por ἀδελφός sin forzar una lectura de hermandad literal; en español, además, suena más natural que un calco directo.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - que te vaya bien
  lexicon: LSJ
  rationale: Se vierte como fórmula epistolar breve y digna. 'Salud' mantiene el valor convencional de salutación sin convertirlo en una oración exhortativa.
- source_word: ἔθνει
  english_pob_choice: nation
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la nación
  - al etnos
  lexicon: LSJ
  rationale: Aquí ἔθνος puede referir a un pueblo corporativo. En español, 'pueblo' comunica bien la colectividad y evita una rigidez política innecesaria, aunque se mantiene en nota la alternativa 'nación'.
- source_word: Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: LSJ
  rationale: Se conserva la designación tradicional e inmediatamente reconocible en español, coherente con el uso convencional de 1 Macabeos; la alternativa 'judeanos' queda como posibilidad semántica del griego.
theological_decisions:
- issue: Ἀδελφός como trato diplomático, no necesariamente parentesco literal
  english_pob_reading: courteous/political 'brother' retained in the main text
  chosen_spanish_reading: '''su hermano'' se mantiene como fórmula de cortesía o alianza'
  alternative_spanish_readings:
  - hermano literal de sangre
  - aliado/compañero sin 'hermano'
  rationale: El griego incluye explícitamente ἀδελφός y el contexto epistolar sugiere un tratamiento diplomático. La traducción española conserva la expresión para no eliminar la tensión semántica entre parentesco literal y título honorífico.
  doctrine_reference: Preservar la ambigüedad del original; primacía del texto fuente sobre la armonización interpretativa.
- issue: Ἔθνος aplicado a una colectividad judía
  english_pob_reading: nation
  chosen_spanish_reading: '''pueblo'' como equivalente contextual, con ''nación'' como alternativa válida'
  alternative_spanish_readings:
  - nación
  - etnia
  rationale: No se trata de una corrección doctrinal, sino de una decisión de estilo y precisión. 'Pueblo' suena natural en español para una carta real dirigida a una colectividad; la nota deja abierta la lectura 'nación' del griego.
  doctrine_reference: Mantener el rango semántico de ἔθνος sin reducirlo prematuramente.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y el control auditado en inglés: se conservan el encabezamiento real, el nombre propio, la fórmula epistolar de saludo y la ambigüedad de ἀδελφός/ἔθνος sin resolverla por completo. No se detectaron revisiones previas necesarias en el expediente fuente.'
  spanish_consistency_notes:
  - 'Se prefieren formas bíblicas habituales en español: Demetrio, Jonatán, judíos.'
  - Se evita 'SEÑOR' u otra máscara teológica porque no aparece el nombre divino en este versículo.
  - '''Salud'' funciona aquí como saludo epistolar, no como mandato.'
  - '''Pueblo'' en el cuerpo y ''nación'' en la nota preservan el rango de ἔθνος sin forzar una sola lectura.'
