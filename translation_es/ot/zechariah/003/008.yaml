revisions:
- from: ¡Escucha ahora, Josué, el sumo sacerdote, tú y tus compañeros que se sientan delante de ti, porque son hombres de una señal[a]; porque he aquí, yo traigo a mi siervo, el Renuevo.
  to: Escucha ahora[a], Josué, el sumo sacerdote, tú y tus compañeros que están sentados ante ti, porque son hombres de una señal; porque he aquí, traigo a mi siervo, el Renuevo.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y reflejar mejor el valor del participio hebreo, sin cambiar el sentido: se quitó la exclamación, se ancló la nota en «ahora» para conservar la alternativa documentada del inglés asociada a la apertura exhortativa del versículo, se suavizó «que se sientan delante de ti» a «que están sentados ante ti», y se pulió el formato de la nota. Se mantuvo «hombres de una señal» y «el Renuevo» por fidelidad a las decisiones léxicas y teológicas auditadas.'
  reviewer_model: gpt-5.4
