translation:
  language: es
  text: 'y dijo que a los hijos de Judá se les enseñara el arco[a]. He aquí, está escrito en el Libro de Jasar[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «y dijo que se enseñara a los hijos de Judá la arquería/el uso del arco». El hebreo קָשֶׁת puede referirse al arma misma, pero aquí comúnmente se entiende como el título o palabra inicial del lamento.
    reason: lexical_alternative
  - marker: b
    text: «Libro de Jasar» también puede rendirse «Libro de los Rectos» o «Libro de los Upright», es decir, «Libro de los Íntegros / del Recto».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y él dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol mantiene la secuencia narrativa; en español, «y dijo» comunica el avance del relato sin sobrecargar con el sujeto explícito, que se entiende por el contexto.
- source_word: לְלַמֵּד
  english_pob_choice: should be taught
  chosen_spanish: se les enseñara
  alternatives_spanish:
  - para enseñarles
  - debería enseñarse
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad o contenido del decir. En español, una pasiva impersonal refleja bien la idea de instruir a Judá sin forzar una construcción poco natural.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - la gente de Judá
  - los hombres de Judá
  lexicon: HALOT
  rationale: «Hijos de Judá» conserva la expresión semítica literal y su valor colectivo/genealógico. Se evita «gente» para no suavizar el lenguaje del hebreo.
- source_word: קָשֶׁת
  english_pob_choice: The Bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el tiro con arco
  - la arquería
  - Arco
  lexicon: HALOT
  rationale: El hebreo permite tanto el arma como, probablemente, el encabezado/título del lamento. «El arco» preserva la palabra clave sin añadir una interpretación más allá de lo que el texto exige. La mayúscula no es necesaria en español para marcar un posible título.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: «He aquí» reproduce el valor deíctico y enfático de la partícula y funciona bien en un registro bíblico digno.
- source_word: כְתוּבָה
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - fue escrito
  - se encuentra escrito
  lexicon: HALOT
  rationale: La forma participial pasiva se expresa de modo natural con «está escrito», fórmula idiomática para citar una fuente escrita.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book of
  chosen_spanish: en el Libro de
  alternatives_spanish:
  - sobre el libro de
  - en el rollo de
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», con escritura en un documento la idea es la de pertenencia o inserción en una obra escrita. «En el Libro de» es la solución española más natural y transparente.
- source_word: הַיָּשָׁר
  english_pob_choice: Jashar
  chosen_spanish: Jasar
  alternatives_spanish:
  - Yasar
  - el Justo
  lexicon: HALOT
  rationale: Se translitera el título tradicional del libro en forma española. «Jasar» mantiene cercanía fonética con el hebreo y evita una traducción interpretativa como «el Justo», que podría confundir el nombre del libro con un adjetivo.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó las comillas alrededor de «The Bow» para hacer más natural la traducción, manteniendo la ambigüedad entre arma y posible título. El español sigue esa decisión al usar «el arco» sin comillas, y conserva la nota de alternativa lexical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Libro de Jasar» de manera consistente con la transliteración española del título tradicional.
  - Se evita «Cristo» y otros términos no pertinentes al versículo.
  - Se conserva el registro bíblico formal con sintaxis breve y directa.
