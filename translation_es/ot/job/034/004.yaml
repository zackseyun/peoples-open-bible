translation:
  language: es
  text: Elijamos para nosotros lo que es justo[a]; sepamos entre nosotros lo que es bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Elijamos para nosotros la justicia; discernamos entre nosotros lo que es bueno».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  english_pob_choice: what is just
  chosen_spanish: lo que es justo
  alternatives_spanish:
  - justicia
  - lo correcto
  - lo que es recto
  lexicon: HALOT
  rationale: 'מִשְׁפָּט puede expresar justicia, juicio o decisión legal. Aquí, dentro de una exhortación volitiva, funciona como el objeto elegido; por eso en español conviene una frase sustantivada: ''lo que es justo'', que conserva el sentido ético/judicial sin volverlo técnico o forense.'
- source_word: נִבְחֲרָה
  english_pob_choice: let us choose
  chosen_spanish: Elijamos
  alternatives_spanish:
  - escojamos
  - seleccionemos
  lexicon: HALOT
  rationale: La forma imperfecta con valor exhortativo/cohortativo pide un imperativo inclusivo en español. 'Elijamos' es natural, digno y refleja la decisión compartida del hablante.
- source_word: לָּנוּ
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  - por nuestra parte
  lexicon: HALOT
  rationale: La preposición ל con pronombre de 1ª plural marca beneficio o referencia. 'Para nosotros' comunica bien la orientación deliberativa del acto; el matiz reflexivo queda implícito por el contexto.
- source_word: נֵדְעָה
  english_pob_choice: let us know
  chosen_spanish: conozcamos
  alternatives_spanish:
  - sepamos
  - discernamos
  - conozcamos bien
  lexicon: HALOT
  rationale: ידע aquí no es solo posesión de información, sino reconocimiento/discernimiento de lo valioso. 'Conozcamos' mantiene la raíz semántica y, en este contexto, puede abarcar discernir sin añadir una explicación ajena al texto.
- source_word: בֵינֵינוּ
  english_pob_choice: among ourselves
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - unos con otros
  lexicon: HALOT
  rationale: El idioma hebreo indica deliberación mutua dentro del grupo. 'Entre nosotros' es la correspondencia natural en español y conserva la idea de consulta compartida.
- source_word: מַה טּוֹב
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - lo bueno
  - qué es bueno
  - lo mejor
  lexicon: HALOT
  rationale: 'טוֹב tiene amplitud semántica: bueno, beneficioso, apropiado. ''Lo que es bueno'' reproduce la apertura del hebreo y mantiene el paralelismo con ''lo que es justo''.'
theological_decisions:
- issue: Relación entre justicia y bondad como criterios de evaluación
  english_pob_reading: The verse invites choosing what is just and knowing what is good, without collapsing the two terms or adding doctrinal specificity.
  chosen_spanish_reading: El versículo invita a elegir lo que es justo y a reconocer lo que es bueno, manteniendo la distinción entre ambos términos.
  alternative_spanish_readings:
  - Elijamos la justicia; conozcamos el bien.
  - Escojamos lo correcto y discernamos lo bueno.
  rationale: El hebreo presenta dos expresiones paralelas con alcance relacionado pero no idéntico. En español conviene mantenerlas separadas para no borrar la tensión semántica entre מִשְׁפָּט y טוֹב.
  doctrine_reference: Sabiduría/ética bíblica, paralelismo poético
- issue: Valor exhortativo inclusivo de las formas verbales
  english_pob_reading: The English uses inclusive cohortative 'let us' to render the Hebrew volitional forms.
  chosen_spanish_reading: 'Se usa primera persona plural exhortativa: ''Elijamos... conozcamos...''.'
  alternative_spanish_readings:
  - Vamos a elegir...
  - Que elijamos...
  rationale: Las formas exhortativas en español preservan el llamado colectivo del hebreo. 'Elijamos' y 'conozcamos' son más directas y fieles al tono deliberativo del verso.
  doctrine_reference: Retórica poética hebrea
translation_notes:
  revision_awareness: Se sigue la revisión más reciente sin cambios sustanciales; el texto inglés aprobado mantiene la lectura optimal-equivalence con una nota léxica alternativa para מִשְׁפָּט / מַה טּוֹב. La versión española conserva el paralelismo, la exhortación inclusiva y la distinción semántica entre justicia y bondad.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología litúrgica no presente en el versículo.
  - '''Justo'' y ''bueno'' se eligieron por naturalidad en español y por su cercanía al campo semántico de מִשְׁפָּט y טוֹב.'
  - No se introdujo 'Cristo', 'Mesías' ni otros términos ajenos al texto.
  - La nota al pie refleja una alternativa válida sin duplicar el contenido principal.
