    rationale: La forma reflexiva en español no comunica bien 'entrar en hostilidad/contienda' y puede interpretarse como alterarse uno mismo. El hebreo apunta a involucrarse en conflicto con ellos, no a 'provocarse' interiormente.
  - severity: low
