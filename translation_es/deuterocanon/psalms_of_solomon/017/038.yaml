translation:
  language: es
  text: Yahvé mismo es el rey de ellos[a], la esperanza del poderoso en Dios[b]; y tendrá misericordia de todas las naciones delante de él con temor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos leen 'su rey' en vez de 'el rey de ellos', lo que haría que la línea se refiera más directamente a la subordinación del gobernante davídico al Señor.
    reason: textual_variant
  - marker: b
    text: La cláusula griega detrás de 'la esperanza del poderoso en Dios' es difícil en el texto transmitido y puede reflejar una lectura irregular o incierta.
    reason: textual_variant
  - marker: c
    text: O 'delante de él con reverencia'; la expresión 'con temor' puede denotar tanto temor como reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - El Soberano
  - El Dueño
  lexicon: BDAG
  rationale: Se conserva el título divino como 'Señor' para reflejar κύριος y la decisión doctrinal del POB, sin reemplazarlo por una paráfrasis.
- source_word: βασιλεὺς αὐτῶν
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey de ellos
  - su rey[a]
  lexicon: LSJ
  rationale: '''Su rey'' comunica la relación posesiva del plural αὐτῶν con naturalidad en español y mantiene el contraste teológico de que Yahvé es rey sobre su pueblo.'
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - la confianza
  - la expectativa
  lexicon: BDAG
  rationale: '''Esperanza'' preserva el campo léxico repetido en el verso y evita diluir la fuerza nominal del término griego.'
- source_word: τοῦ δυνατοῦ
  english_pob_choice: the mighty one
  chosen_spanish: del poderoso
  alternatives_spanish:
  - del fuerte
  - del poderoso varón
  lexicon: LSJ
  rationale: '''Poderoso'' mantiene el sentido personal del singular sin volverlo abstracto; en español es natural y suficientemente sobrio para este contexto.'
- source_word: ἐλπὶθ θεοῦ
  english_pob_choice: hope in God / whose hope is in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - cuya esperanza está en Dios
  - la esperanza en Dios
  lexicon: LSJ
  rationale: La transmisión griega es difícil e irregular; siguiendo la revisión auditada, se conserva la estructura nominal con una frase breve que refleja la orientación hacia Dios sin sobreexplicar ni resolver del todo la tensión textual.
- source_word: ἐλεήσει
  english_pob_choice: will have mercy on
  chosen_spanish: tendrá misericordia de
  alternatives_spanish:
  - mostrará misericordia a
  - se compadecerá de
  lexicon: BDAG
  rationale: '''Tendrá misericordia de'' es la equivalencia española más estable para el verbo de misericordia y conserva el tono bíblico sin arcaísmo excesivo.'
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones
  lexicon: BDAG
  rationale: '''Naciones'' reproduce el alcance colectivo de ἔθνη; se añade ''todas'' como en el inglés POB para respetar la totalidad del juicio/misericordia del pasaje.'
- source_word: ἐνώπιον αὐτοῦ ἐν φόβῳ
  english_pob_choice: before him in fear
  chosen_spanish: delante de él con temor
  alternatives_spanish:
  - en su presencia con temor
  - delante de él con reverencia
  lexicon: BDAG
  rationale: '''Delante de él'' conserva la relación espacial de ἐνώπιον y ''con temor'' mantiene la ambigüedad reverencial del φόβος sin resolverla únicamente como ''reverencia''.'
theological_decisions:
- issue: Cómo reflejar el reinado de Yahvé frente al posible rey davídico del contexto
  english_pob_reading: The Lord himself is their king
  chosen_spanish_reading: El Señor mismo es su rey
  alternative_spanish_readings:
  - El Señor mismo es el rey de ellos
  - El Señor mismo es su rey[a]
  rationale: Se mantiene la afirmación directa del reinado de Yahvé y la tensión teológica con el gobernante davídico sin armonizarla artificialmente. La puntuación con punto y coma separa la cláusula de realeza de la frase nominal siguiente, conforme al corte marcado en el griego.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la tendencia a convertir la frase nominal griega en una cláusula relativa. Por eso el español evita 'cuya esperanza es...' y conserva una estructura nominal breve después del punto y coma, aunque de forma idiomática en español. También se respetó la separación de cláusulas indicada por el alto signo de pausa del griego.
  spanish_consistency_notes:
  - Se usó 'Señor' para Κύριος conforme al estándar del proyecto.
  - Se eligió 'misericordia' para ἐλεήσει por consistencia con el registro bíblico del POB.
  - '''Temor'' se dejó sin glosa interpretativa para preservar la tensión entre miedo y reverencia.'
  - No se añadieron notas al pie porque no había un marcador anclado necesario en el texto español.
