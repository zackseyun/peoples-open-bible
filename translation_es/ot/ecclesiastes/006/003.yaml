  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «Alma» para נֶפֶשׁ está alineado con la decisión inglesa. La mejor alineación léxica para הַנָּפֶל en español, siguiendo la decisión principal inglesa y manteniendo legibilidad, es «el niño nacido muerto», con alternativas en nota («el abortivo», «el aborto», «el nacimiento prematuro»/«malogrado») si se desea preservar el rango léxico.
