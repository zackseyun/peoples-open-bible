    rationale: Aunque posible, en español puede leerse como mera adecuación al evento. El hebreo idiomático y el griego paralelo señalan más bien una amistad limitada al momento favorable, mejor expresada por «por un tiempo» y aclarada con nota.
  - severity: low
    issue: La nota al pie comienza con comillas y apóstrofo innecesarios
    rationale: 'La formulación «''O: …» es tipográficamente extraña en español. Conviene normalizarla a «O: …».'
