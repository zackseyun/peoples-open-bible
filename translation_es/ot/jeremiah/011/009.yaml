    rationale: El hebreo בְּ aquí se entiende mejor como «entre/entre los de», no como una localización interna. En español, «en los hombres de Judá» resulta torpe y menos fiel al sentido colectivo indicado en el análisis inglés.
  - severity: medium
    issue: Faltan las notas léxicas preservadas por el POB inglés
    rationale: El audit trail inglés incluye una nota sobre alternativas de קֶשֶׁר y otra sobre el singular colectivo de אִישׁ. Deben preservarse en español, especialmente porque la segunda ayuda a evitar malentendidos gramaticales.
  revised_spanish_text: 'Y Yahvé me dijo: «Se ha hallado una conspiración[a] entre los hombres[b] de Judá y entre los habitantes de Jerusalén.»'
