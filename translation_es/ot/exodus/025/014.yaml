review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: introducir los polos en los anillos laterales del arca para poder transportarla. Sin embargo, dos elecciones españolas reducen la naturalidad o la precisión locativa frente al original y al rastro POB: «meterás» suena algo coloquial para este registro, y «sobre los lados del arca» es menos natural que «en los lados del arca»/«en los costados del arca» para עַל צלעת en este contexto estructural.'
  spanish_quality_summary: El texto es mayormente claro y comprensible, pero puede mejorarse para lograr un español más digno y fluido sin perder literalidad. «Pondrás» encaja mejor en registro bíblico moderno que «meterás», y «en los costados del arca» suena más idiomático que «sobre los lados del arca».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Arca» es correcto. «Varales» es aceptable y claro en contexto cultual; la nota léxica está bien orientada, aunque «staves» no necesita preservarse como anglicismo en la nota española.
  issues:
  - severity: medium
    issue: «meterás» resulta demasiado coloquial para el registro buscado
    rationale: Aunque comunica inserción, el estilo meta pide español moderno pero digno. «Pondrás» conserva la naturalidad y se alinea mejor con la decisión inglesa «put», dejando la alternativa más formal/literal en nota.
  - severity: medium
    issue: «sobre los lados del arca» es poco natural en español
    rationale: Para los anillos fijados a las partes laterales del arca, «en los costados del arca» expresa mejor la relación locativa/estructural que «sobre los lados», que puede sugerir encima de la superficie.
  - severity: low
    issue: La nota al pie usa «staves», que no aporta claridad al lector hispanohablante
    rationale: La nota debe servir al lector en español. Es mejor mantener alternativas españolas relevantes como «varas» o explicar el matiz tradicional sin introducir el término inglés.
  revised_spanish_text: Y pondrás los varales[a] en los anillos, en los costados del arca, para llevar el arca con ellos.
  revised_footnotes:
  - marker: a
    text: O «varas». «Varales» se usa aquí para los elementos de transporte del arca; una opción más tradicional sería «varas».
    reason: lexical_alternative
  revision_rationale: Se ajusta el registro de «meterás» a «pondrás» para un español más digno y acorde con el POB, y se mejora la locución espacial a «en los costados del arca» para reflejar mejor el hebreo en español natural. Se simplifica la nota para conservar alternativas útiles en español sin introducir anglicismos innecesarios.
