  text: וּ/נְבִיאֶ֗י/הָ טָח֤וּ לָ/הֶם֙ תָּפֵ֔ל חֹזִ֣ים שָׁ֔וְא וְ/קֹסְמִ֥ים לָ/הֶ֖ם כָּזָ֑ב אֹמְרִ֗ים כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וַֽ/יהוָ֖ה לֹ֥א דִבֵּֽר׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/028.yaml
  text: And her prophets have plastered for them with whitewash[a], seeing falsehood and divining lies for them, saying[b], ‘Thus says the Lord GOD,’ when Yahweh has not spoken.
  footnotes:
