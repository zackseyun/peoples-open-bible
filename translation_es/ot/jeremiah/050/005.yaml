translation:
  language: es
  text: 'Ellos preguntarán por el camino a Sion, con sus rostros vueltos hacia ella: «Vengan[a], unámonos a Yahvé en un pacto eterno que no será olvidado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y unámonos a Yahvé»; el hebreo admite tanto un tono exhortativo directo como una lectura reflexiva más literal de «ser/juntarse» a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  - Zion
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español bíblico puede escribirse «Sion» de forma natural y reconocible, sin trasladarlo a una paráfrasis.
- source_word: יִשְׁאָלוּ
  english_pob_choice: they will ask
  chosen_spanish: preguntarán
  alternatives_spanish:
  - inquirirán
  - preguntarán por
  lexicon: HALOT
  rationale: El verbo שאל admite la idea de preguntar/inquirir. En este contexto, con דֶּרֶךְ y destino implícito, «preguntarán por» comunica con naturalidad la búsqueda del camino.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: «Camino» preserva el sentido concreto y la resonancia figurada de dirección y retorno sin endurecer el español.
- source_word: פְנֵיהֶם
  english_pob_choice: with their faces turned
  chosen_spanish: con el rostro vuelto
  alternatives_spanish:
  - con el rostro orientado
  - mirando hacia
  lexicon: HALOT
  rationale: La imagen literal es «su rostro». En español, «con el rostro vuelto» conserva la orientación corporal sin sonar extraño.
- source_word: הֵנָּה
  english_pob_choice: toward it
  chosen_spanish: hacia ella
  alternatives_spanish:
  - hacia allí
  - en dirección a ella
  lexicon: HALOT
  rationale: El adverbio direccional apunta a Sion, nombre femenino en español; «hacia ella» mantiene la orientación del texto.
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Venga
  - Venid
  lexicon: HALOT
  rationale: Es un imperativo plural exhortativo. «Vengan» conserva el tono de invitación directa en español contemporáneo.
- source_word: וְנִלְווּ
  english_pob_choice: let us join ourselves
  chosen_spanish: unámonos
  alternatives_spanish:
  - juntémonos
  - hagámonos uno con
  lexicon: HALOT
  rationale: El niphal de לוה tiene matiz reflexivo de unión voluntaria. «Unámonos» preserva esa iniciativa compartida sin perder naturalidad.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se traduce como «Yahvé» para mantener el nombre del pacto con transparencia textual.'
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perpetuo
  - un pacto para siempre
  lexicon: HALOT
  rationale: «Pacto» expresa בְּרִית con un registro bíblico claro; «eterno» comunica עוֹלָם como duración perdurable. En español, esta combinación es idiomática y fiel.
- source_word: לֹא תִשָּׁכֵחַ
  english_pob_choice: that will not be forgotten
  chosen_spanish: que no será olvidado
  alternatives_spanish:
  - que no se olvidará
  - que no quedará en el olvido
  lexicon: HALOT
  rationale: El nifal pasivo de שכח se traduce de manera directa con «ser olvidado». Concuerda con «pacto» y mantiene la pasividad del hebreo.
theological_decisions:
- issue: Rendering the divine name יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Conforme a la terminología del proyecto, se preserva el nombre propio del pacto como «Yahvé», evitando el ocultamiento mediante un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Reflexive nuance of joining to Yahweh
  english_pob_reading: let us join ourselves
  chosen_spanish_reading: unámonos
  alternative_spanish_readings:
  - juntémonos
  - seamos unidos
  rationale: El hebreo permite una lectura reflexiva/volitiva en el llamado. «Unámonos» conserva la decisión personal y comunitaria de acercarse al pacto, sin convertirlo en una simple pasividad.
  doctrine_reference: Jeremiah 50:5 lexical audit for וְנִלְווּ
translation_notes:
  revision_awareness: El pasaje coincide con el último pass revisado como unchanged; no se aplicaron cambios sustanciales de la auditoría inglesa, y la decisión principal para el español fue mantener la transparencia del nombre divino y el matiz reflexivo de וְנִלְווּ.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה, conforme al criterio del proyecto.
  - Se mantuvo el tono exhortativo del discurso directo entre comillas.
  - Se evitó «SEÑOR» para no ocultar el nombre divino en este registro de la POB.
  - «Pacto eterno» conserva la fuerza de בְּרִית עוֹלָם sin introducir una paráfrasis doctrinal.
