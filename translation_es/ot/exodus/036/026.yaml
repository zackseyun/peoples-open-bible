translation:
  language: es
  text: 'y sus cuarenta bases de plata: dos bases bajo la una tabla[a], y dos bases bajo la una tabla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo la una tabla» en ambas cláusulas. El hebreo repite literalmente «la una» dos veces; no hay contraste con «la otra» en el texto base.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִים
  english_pob_choice: and ... forty
  chosen_spanish: y ... cuarenta
  alternatives_spanish:
  - con cuarenta
  - así como cuarenta
  lexicon: HALOT
  rationale: La conjunción solo continúa la enumeración. En español, «y» conserva esa simple adición, y el cardinal se expresa de forma directa como «cuarenta».
- source_word: אַדְנֵי/הֶם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus pedestales
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, אֲדָנִים designa las piezas de apoyo o alojamiento de las tablas. «Bases» es claro y natural en español, y mantiene la imagen constructiva sin imponer un término técnico más especializado de lo necesario.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de plata fina
  - plateadas
  lexicon: HALOT
  rationale: En español, el atributo material se expresa con naturalidad como «de plata». Conserva el valor nominal del hebreo sin perder claridad idiomática.
- source_word: שְׁנֵי אֲדָנִים
  english_pob_choice: two bases
  chosen_spanish: dos bases
  alternatives_spanish:
  - dos zócalos
  - dos pedestales
  lexicon: HALOT
  rationale: Se mantiene la correspondencia directa con la elección anterior para אֲדָנִים, conservando la repetición numérica del hebreo.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo de
  lexicon: HALOT
  rationale: «Bajo» es una opción breve y natural en español para la colocación debajo de cada marco/tabla.
- source_word: הַ/קֶּרֶשׁ
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - tabla
  - tabla de madera
  lexicon: HALOT
  rationale: Aunque muchas traducciones tradicionales usan «tabla» o «tablón», «marco» sigue la decisión inglesa de resaltar la función estructural del elemento en vez de atarse a una equivalencia material más rígida. En español, «marco» comunica bien esa función sin exceder el sentido del texto.
- source_word: הָ/אֶחָד
  english_pob_choice: the one
  chosen_spanish: el uno
  alternatives_spanish:
  - el único
  - el primero
  lexicon: HALOT
  rationale: El hebreo repite literalmente «el uno» en ambas cláusulas. Se conserva esa repetición en español para no borrar la simetría del original; la sintaxis suena algo marcada, pero es preferible a introducir «el otro» sin base textual.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. También se preservó la repetición hebrea de הָאֶחָד en ambas cláusulas, evitando la interpretación contrastiva «el otro».
  spanish_consistency_notes:
  - Se mantuvo «bases» para אַדְנִים de manera consistente con el contexto tabernacular.
  - Se prefirió «de plata» para el material, siguiendo un español natural y transparente.
  - Se conservó la repetición de «el uno» para reflejar la estructura distributiva del hebreo.
  - No se introdujeron notas teológicas porque el versículo es descriptivo y arquitectónico.
