review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la distribución «dos por dos», el movimiento hacia Noé y hacia el arca, la pareja sexual «macho y hembra», y la conformidad con el mandato previo de Dios. Sin embargo, «al arca» en español suena incompleto o poco natural con «venir», y no comunica tan claramente la entrada como el ajuste de equivalencia óptima documentado en inglés («into the ark»).'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «vinieron a Noé, al arca» resulta algo trabada en español. «Entraron en el arca» sería demasiado interpretativo para בָּאוּ, pero «vinieron a Noé y entraron en el arca» añadiría un verbo no presente. La mejor reparación mínima es mantener «vinieron» y explicitar el destino interior con «al interior del arca», aunque más natural y fluido es «vinieron a Noé para entrar en el arca», que ya introduce finalidad. Por fidelidad y naturalidad, conviene usar «vinieron a Noé al arca» no; mejor «vinieron a Noé hacia el arca» tampoco. La solución más fiel y legible es «Dos por dos vinieron a Noé y al arca» no, porque altera la sintaxis. Por tanto, se recomienda una leve revisión a «Dos por dos vinieron a Noé, dentro del arca[a]...»? Eso cambia el sentido. La opción más estable es «Dos por dos vinieron a Noé al arca[a]» no es buen español. Se necesita ajustar la frase y la nota.
  glossary_alignment: «Dios», «Noé» y «macho y hembra» están alineados con las decisiones del proyecto y del expediente auditado. No hay términos teológicos conflictivos. La principal cuestión es sintáctico-lexical en la representación de אֶל הַתֵּבָה.
  issues:
  - severity: medium
    issue: «al arca» suena poco natural y no expresa bien la entrada implícita en el ajuste de equivalencia óptima
    rationale: El inglés auditado eligió «into the ark» para reflejar el destino de entrada. En español, «vinieron ... al arca» comunica acercamiento más que ingreso, y con la doble secuencia «a Noé, al arca» resulta forzado.
  - severity: low
    issue: La nota [a] propone «en el arca», que invierte la dirección en una localización estática
    rationale: El hebreo usa movimiento hacia el arca, no mera ubicación dentro de ella. La nota alternativa debería preservar mejor el matiz direccional o la forma distributiva inglesa documentada.
  revised_spanish_text: Dos por dos vinieron a Noé para entrar en el arca[a], macho y hembra[b], tal como Dios había mandado a Noé.
  revised_footnotes:
  - marker: a
    text: O «en pares» o, más formalmente, «dos y dos».
    reason: lexical_alternative
  - marker: b
    text: O «Vinieron a Noé, dos por dos, para entrar en el arca».
    reason: previous_rendering
  revision_rationale: 'Se revisa la frase para resolver una construcción poco natural en español y para comunicar con claridad el valor de destino interior que el expediente inglés expresó con «into the ark», sin sustituir el verbo principal «vinieron». También se corrigen las notas para que correspondan al contenido auditado: la primera nota pertenece a «Dos por dos», y la segunda conserva la alternativa de orden sintáctico.'
