theological_decisions:
- issue: Rendering of צֶדֶק in a context of divine judgment
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse links God's judgments with what the world's inhabitants learn. 'Righteousness' preserves the ethical and theological dimension of conformity to what is right before God, while 'justice' remains a legitimate lexical possibility and is preserved in a footnote. This follows the project's principle of preserving theological tension where a term can bear overlapping senses.
