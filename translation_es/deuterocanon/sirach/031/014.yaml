translation:
  language: es
  text: 'No digas: «Basta para él»[b]; recuerda que un ojo malo[a] es malo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «ojo malo» suele referirse a una disposición tacaña, envidiosa o renuente a dar.'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego suministrado para esta referencia dice: «El espíritu de los que temen al Señor vivirá», pero no coincide con la redacción hebrea aquí y probablemente refleja otra alineación textual o numeración de versículos.'
    reason: textual_variant
lexical_decisions:
- source_word: אל תאמר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No pienses
  - No digas para ti mismo
  lexicon: HALOT
  rationale: El imperativo negativo de אמר se reproduce de forma directa y natural en español con «No digas», manteniendo el tono admonitorio breve del hebreo.
- source_word: ספוק
  english_pob_choice: it is enough / there is enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - Hay suficiente
  - Hay bastante
  lexicon: HALOT
  rationale: En este contexto sentencioso, «Basta» expresa la idea de suficiencia de manera idiomática y concisa, sin añadir contenido que el hebreo no exige.
- source_word: עליו
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para esa persona
  - para aquél
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal conserva la referencia singular masculina; «para él» mantiene la relación interpersonal de la frase sin sobreexplicar.
- source_word: זכור
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - acuérdate
  lexicon: HALOT
  rationale: El imperativo se conserva con un verbo natural y directo en español, correspondiente al valor exhortativo del hebreo.
- source_word: רעה עין רעה
  english_pob_choice: an evil eye is evil
  chosen_spanish: un ojo malo es malo
  alternatives_spanish:
  - un ojo maligno es malo
  - un ojo envidioso es malo
  - un ojo avaro es malo
  lexicon: HALOT
  rationale: Se preserva la repetición proverbial del hebreo y la imagen concreta de «ojo malo». En la nota se explica su sentido idiomático de actitud mezquina, codiciosa o envidiosa, siguiendo la decisión inglesa de mantener el modismo visible.
theological_decisions:
- issue: Mantenimiento del modismo «ojo malo»
  english_pob_reading: Retain 'evil eye' in the main text
  chosen_spanish_reading: Mantener «ojo malo» en el texto principal
  alternative_spanish_readings:
  - codicia
  - envidia
  - actitud avara o mezquina
  rationale: El hebreo usa una expresión proverbial concreta. Traducirla literalmente conserva la transparencia al fuente y deja espacio para que la nota explique su valor idiomático en contextos de mesa y generosidad.
  doctrine_reference: PHILOSOPHY.md §§1, 3, 6
- issue: Desajuste entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as primary, while noting the Greek parallel diverges substantially
  chosen_spanish_reading: Traducir primariamente el hebreo conservado y señalar que el paralelo griego diverge de manera sustancial
  alternative_spanish_readings:
  - Traducir desde el griego paralelo
  - fusionar hebreo y griego en una sola línea
  rationale: La política del proyecto da prioridad al hebreo cuando subsiste. Aquí el griego suministrado («El espíritu de los que temen al Señor vivirá») no corresponde al hebreo de esta línea; por transparencia, se documenta la divergencia sin alterar la base textual principal.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew where it survives; transparency about source uncertainty'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó «There is enough for him» a «It is enough for him» para reflejar con mayor directo naturalidad el hebreo. En español se adoptó «Basta para él» como equivalente breve y natural, preservando el paralelo de sentido y la concisión proverbial.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH como «Yahvé» por norma del proyecto, aunque en este verso el hebreo fuente citado no lo contiene.
  - Se conserva el modismo proverbial «ojo malo» en el texto principal y se explica su valor semántico en nota.
  - No se armoniza el texto con el paralelo griego, porque la política del proyecto prioriza el hebreo conservado donde existe y documenta la discrepancia.
