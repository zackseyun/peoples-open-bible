revisions:
- from: Y fortificó Joppe[a], la que está junto al mar, y a Gazara, la que está en los límites de Azoto, donde antes habitaban los enemigos; y estableció allí a judíos, y puso en ellos todo lo necesario para su restauración[b].
  to: Y fortificó Jope[a], la que está junto al mar, y a Gazara, la que está en los límites de Azoto, donde antes habitaban los enemigos; y asentó allí a judíos, y puso allí todo lo necesario para su restauración[b].
  rationale: Se ajusta «Joppe» a «Jope» por ser la forma española más natural y reconocible; se cambia «estableció allí a judíos» por «asentó allí a judíos» para reflejar mejor el sentido causativo de κατοικίζω en contexto de repoblación; y se reemplaza «puso en ellos» por «puso allí» para evitar una construcción poco idiomática en español, manteniendo el sentido locativo del griego.
