translation:
  language: es
  text: Nadie[a] dedicado[b] de entre los seres humanos[c] podrá ser redimido; ciertamente será condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nadie» expresa el sujeto humano del hebreo; el texto habla de una persona, no de una cosa.
    reason: lexical_alternative
  - marker: b
    text: '«Dedicado» conserva el término técnico de חֵרֶם, es decir, algo o alguien irrevocablemente entregado o puesto bajo el anatema. Otras posibilidades: «consagrado», «entregado al anatema».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «de hombre»; aquí se refiere a un ser humano, es decir, de entre los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵרֶם
  english_pob_choice: devoted thing
  chosen_spanish: dedicado
  alternatives_spanish:
  - consagrado
  - entregado al anatema
  - puesto bajo el anatema
  lexicon: HALOT
  rationale: En este contexto, חֵרֶם es un término técnico cultual/jurídico de dedicación irrevocable. «Dedicado» conserva el valor terminológico sin introducir una interpretación más amplia que el hebreo no explicita en la cláusula principal.
- source_word: יָחֳרַם
  english_pob_choice: is devoted
  chosen_spanish: dedicado
  alternatives_spanish:
  - está bajo el anatema
  - está consagrado
  - está entregado al anatema
  lexicon: HALOT
  rationale: El verbo comparte la misma raíz que חֵרֶם, por lo que conviene mantener la correspondencia léxica en español. «Dedicado» reproduce esa relación y deja que la frase final de muerte conserve la severidad del mandato.
- source_word: מִן הָאָדָם
  english_pob_choice: from man
  chosen_spanish: de entre la humanidad
  alternatives_spanish:
  - de entre los hombres
  - de entre las personas
  - de la humanidad
  lexicon: HALOT
  rationale: El hebreo singular אָדָם funciona aquí de modo representativo para un ser humano. «De entre la humanidad» hace explícito el sentido de pertenencia a la categoría humana y evita en español la ambigüedad de un «de hombre» demasiado literal.
- source_word: יִפָּדֶה
  english_pob_choice: may be redeemed
  chosen_spanish: podrá ser redimido
  alternatives_spanish:
  - podrá ser rescatado
  - podrá ser comprado de vuelta
  - podrá ser rescatado por precio
  lexicon: HALOT
  rationale: «Redimido» es el equivalente bíblico más estable para פדה y encaja con el campo legal-sacral de Levítico 27. «Podrá ser» refleja la posibilidad jurídica negada por el texto.
- source_word: מוֹת יוּמָת
  english_pob_choice: it must surely be put to death
  chosen_spanish: ciertamente deberá morir
  alternatives_spanish:
  - seguramente deberá ser muerto
  - deberá morir sin falta
  - morirá ciertamente
  lexicon: HALOT
  rationale: La construcción intensiva hebrea expresa certeza enfática. En español, «ciertamente deberá morir» mantiene el carácter solemne y legal sin forzar una pasiva poco natural. Se evita «ser muerto» por estilo.
theological_decisions:
- issue: Sentido de חֵרֶם aplicado a una persona
  english_pob_reading: Render with the technical language of devotion rather than immediately interpret as a judicial death sentence alone.
  chosen_spanish_reading: Conservar el lenguaje técnico de dedicación y dejar que la cláusula final de muerte muestre la gravedad del caso.
  alternative_spanish_readings:
  - Nadie entregado al anatema de entre la humanidad podrá ser redimido; ciertamente deberá morir.
  - Nadie consagrado para destrucción de entre la humanidad podrá ser rescatado; deberá morir sin falta.
  rationale: El hebreo une el vocabulario de ḥerem con la imposibilidad de redención y una fórmula de muerte. La traducción principal preserva esa tensión sin resolverla prematuramente en una sola interpretación judicial o cultual.
  doctrine_reference: Translation philosophy §3; §5
- issue: Valor de אָדָם en la cláusula מִן הָאָדָם
  english_pob_reading: man / humankind (context)
  chosen_spanish_reading: de entre la humanidad
  alternative_spanish_readings:
  - de entre los hombres
  - de entre el ser humano
  - de la humanidad
  rationale: El POB inglés decidió explicitar el sentido humano de אָדָם con una nota. En español, «de entre la humanidad» comunica esa referencia colectiva y evita un masculino genérico innecesariamente rígido en una formulación legal.
  doctrine_reference: 'Contested terms table: אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una lectura que trataba el sujeto como cosa y lo ajustó a una persona ('No one devoted from mankind'). La versión española sigue esa adjudicación, manteniendo a la vez el enlace técnico entre חֵרֶם y la imposibilidad de redención.
  spanish_consistency_notes:
  - Se mantuvo «redimido» para פדה conforme al uso bíblico estándar y al audit trail inglés.
  - Se evitó «SEÑOR» u otra convención de sustitución porque el versículo no contiene el Tetragrámaton.
  - La frase final usa una construcción modal natural en español para reflejar el infinitivo absoluto intensivo hebreo.
  - Se preservó la tensión lexical entre dedicación cultual y sentencia de muerte sin resolverla en una sola paráfrasis.
