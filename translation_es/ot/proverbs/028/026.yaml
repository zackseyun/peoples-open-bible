translation:
  language: es
  text: Quien confía en su propio corazón es un necio[a][b]; pero el que anda en sabiduría escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «corazón» suele referirse al ser interior, incluyendo pensamiento, juicio y voluntad, no solo la emoción.
    reason: cultural_note
  - marker: b
    text: O «será librado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹטֵחַ
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - se apoya
  - pone su confianza
  lexicon: HALOT
  rationale: El participio de בטח expresa poner confianza o seguridad en algo. «Confía» es natural en español y conserva el sentido de dependencia personal que el proverbio advierte contra la autosuficiencia.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his own heart
  chosen_spanish: en su propio corazón
  alternatives_spanish:
  - en su corazón
  - en sí mismo
  - en su propia mente
  lexicon: HALOT
  rationale: לֵב/לֵבָב puede abarcar interioridad, juicio y voluntad, no solo emoción. «Corazón» preserva la antropología hebrea; «propio» expresa con claridad el sufijo posesivo y la idea de auto-confianza.
- source_word: כְסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  lexicon: HALOT
  rationale: כְסִיל es un término sapiencial técnico para la persona moralmente y espiritualmente torpe. «Necio» transmite mejor esa categoría bíblica que un adjetivo meramente psicológico.
- source_word: וְהוֹלֵךְ
  english_pob_choice: he who walks
  chosen_spanish: el que anda
  alternatives_spanish:
  - el que camina
  - el que vive
  - el que se conduce
  lexicon: HALOT
  rationale: En literatura sapiencial, הלך describe el modo de vida o conducta. «Anda» mantiene la metáfora hebrea y suena más natural en español que una formulación demasiado literal.
- source_word: בְּחָכְמָה
  english_pob_choice: in wisdom
  chosen_spanish: en sabiduría
  alternatives_spanish:
  - con sabiduría
  - sabia y rectamente
  lexicon: HALOT
  rationale: Se conserva la preposición para reflejar la construcción hebrea y el paralelismo con la primera línea. «Sabiduría» es el equivalente directo de חָכְמָה en el marco sapiencial.
- source_word: יִמָּלֵט
  english_pob_choice: will escape
  chosen_spanish: escapará
  alternatives_spanish:
  - será librado
  - se salvará
  lexicon: HALOT
  rationale: El nifal de מלט puede significar escapar o ser librado. «Escapará» sigue la concisión proverbial y evita imponer una lectura más teológica de lo que el hebreo exige.
- source_word: ה֣וּא ... ה֣וּא
  english_pob_choice: is ... he who
  chosen_spanish: es ... el que
  alternatives_spanish:
  - es ... quien
  - será ... el que
  lexicon: Hebrew grammar
  rationale: Los pronombres explícitos hebreos añaden énfasis. En español se representa de modo idiomático con la estructura de la sentencia, sin repetir innecesariamente el pronombre.
theological_decisions:
- issue: Antropología de 'corazón'
  english_pob_reading: Retain 'heart' rather than interpretively replacing it with 'mind' or 'self'.
  chosen_spanish_reading: Mantener «corazón» en lugar de sustituirlo por «mente» o «sí mismo».
  alternative_spanish_readings:
  - en su mente
  - en sí mismo
  rationale: En hebreo, «corazón» incluye pensamiento, juicio y voluntad. Conservarlo evita reducir la imagen bíblica a categorías psicológicas modernas y respeta la fuerza sapiencial del texto.
  doctrine_reference: 'Principio de primacía de la fuente: preservar la antropología bíblica sin aplanarla.'
- issue: Masculino genérico
  english_pob_reading: Use masculine singular forms ('his,' 'he who') to match the Hebrew generic masculine.
  chosen_spanish_reading: Usar formas masculinas singulares («su», «el que») para reflejar el masculino genérico hebreo.
  alternative_spanish_readings:
  - quien
  - la persona que
  rationale: El hebreo es masculino singular con fuerza representativa. En este registro, conservar esa forma evita neutralizaciones que borren la correspondencia gramatical del original.
  doctrine_reference: Exactitud gramatical y respeto por el género lingüístico del texto fuente.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el control más reciente: no se registran revisiones aplicadas y el juicio de concordancia fue alto. La redacción española preserva el paralelismo sapiencial, la antropología de «corazón» y la ambigüedad controlada de יִמָּלֵט.'
  spanish_consistency_notes:
  - Se mantuvo «corazón» de forma consistente con la antropología hebrea del POB.
  - Se eligió «necio» para כְסִיל, en línea con el valor sapiencial del término.
  - «Anda en sabiduría» conserva la metáfora conductual de הלך.
  - «Escapará» respeta la concisión proverbial y deja abierta la alternativa «será librado».
