translation:
  language: es
  text: 'Los serafines estaban de pie por encima de él. Cada uno tenía seis alas[a]: con dos cubría su rostro, y con dos cubría sus pies, y con dos volaba.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente relacionado con una raíz que significa «seres ardientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂרָפִים
  english_pob_choice: Seraphim
  chosen_spanish: serafines
  alternatives_spanish:
  - serafines
  - seres ardientes
  lexicon: HALOT
  rationale: Conservo el término técnico del ser celestial en forma castellanizada, porque el contexto visionario de Isaías 6 apunta a una clase específica de seres y no exige traducir etimológicamente como «seres ardientes». La forma «serafines» es transparente y natural en español.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban
  - permanecían de pie
  lexicon: HALOT
  rationale: El participio describe una postura continua en la visión; «estaban de pie» conserva esa escena estática sin volverla meramente puntual.
- source_word: מִמַּעַל לוֹ
  english_pob_choice: above him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - por encima de él
  lexicon: HALOT
  rationale: La relación espacial se expresa de manera natural en español con «sobre él», manteniendo el referente personal del sufijo masculino singular.
- source_word: שֵׁשׁ כְּנָפַיִם ... שֵׁשׁ כְּנָפַיִם לְאֶחָד
  english_pob_choice: Each had six wings
  chosen_spanish: Cada uno tenía seis alas
  alternatives_spanish:
  - Cada uno tenía seis alas
  - seis alas tenía cada uno
  lexicon: HALOT
  rationale: El hebreo repite «seis alas» y luego especifica distributivamente «a cada uno». En español, «Cada uno tenía seis alas» reproduce esa distribución con fluidez y evita una calca pesada.
- source_word: בִּשְׁתַּיִם
  english_pob_choice: with two
  chosen_spanish: con dos
  alternatives_spanish:
  - con dos de ellas
  - con un par
  lexicon: HALOT
  rationale: «Con dos» refleja bien el valor instrumental de la preposición y mantiene la referencia a dos alas empleadas en cada acción.
- source_word: יְכַסֶּה
  english_pob_choice: he covered
  chosen_spanish: cubría
  alternatives_spanish:
  - cubrió
  - cubriría
  lexicon: HALOT
  rationale: El imperfecto hebreo en la descripción visionaria funciona como acción repetida o caracterizada en escena; «cubría» preserva ese aspecto descriptivo mejor que un pretérito puntual.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su rostro
  lexicon: HALOT
  rationale: «Rostro» es más digno y acorde con el registro visionario que «cara», sin alterar el sentido del hebreo.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pies
  - sus piernas
  lexicon: HALOT
  rationale: «Pies» es la equivalencia directa y natural en contexto; «piernas» ampliaría indebidamente el término.
- source_word: יְעוֹפֵף
  english_pob_choice: he flew
  chosen_spanish: volaba
  alternatives_spanish:
  - voló
  - iba volando
  lexicon: HALOT
  rationale: El verbo final completa la escena con una acción en curso en la visión; «volaba» mantiene el carácter descriptivo y coordinado del hebreo.
theological_decisions:
- issue: Si traducir שְׂרָפִים con un sentido etimológico o como nombre técnico
  english_pob_reading: Seraphim
  chosen_spanish_reading: serafines
  alternative_spanish_readings:
  - seres ardientes
  - serafines
  rationale: La visión presenta un ser celestial identificado por una designación especial. En español, la transliteración castellanizada conserva esa identificación sin imponer una interpretación etimológica que el versículo no explicita.
  doctrine_reference: Principio de primacía del texto original con lectura sobria del género visionario.
- issue: Referente de לוֹ
  english_pob_reading: above him
  chosen_spanish_reading: sobre él
  alternative_spanish_readings:
  - sobre eso
  - sobre ello
  rationale: El contexto inmediato es Yahvé en la visión de Isaías, por lo que el pronombre masculino singular debe mantenerse personal y no neutro.
  doctrine_reference: Lectura contextual del referente divino en el pasaje.
- issue: Mantenimiento de la singular distributiva en la escena
  english_pob_reading: 'Each had six wings: with two he covered...'
  chosen_spanish_reading: 'Cada uno tenía seis alas: con dos cubría...'
  alternative_spanish_readings:
  - 'Ellos tenían seis alas: con dos cubrían...'
  rationale: El hebreo alterna a un singular distributivo. En español, «cada uno» preserva mejor esa estructura que una pluralización general que suavizaría el foco individual de la escena.
  doctrine_reference: Fidelidad gramatical al hebreo sin neutralizar el singular distributivo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] en el texto principal exactamente donde corresponde, de modo que la nota léxica sobre «serafines» queda anclada en la palabra referida. La redacción mantiene concordancia con el hebreo y con la decisión auditada de la POB en inglés, sin añadir material ajeno al versículo.
  spanish_consistency_notes:
  - Se usa «serafines» como transliteración castellanizada consistente con el término técnico del ser celestial.
  - Se conserva el pronombre singular «él» para el referente divino, de acuerdo con el contexto inmediato.
  - Se prefirió «rostro» y «pies» por claridad y registro elevado, sin desplazar el contenido semántico del hebreo.
  - La nota [a] está anclada en «alas» para señalar la alternativa léxica del término, sin duplicar marcadores.
