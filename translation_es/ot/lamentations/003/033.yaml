translation:
  language: es
  text: Porque no aflige[a] desde su corazón, ni entristece a los hijos de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voluntariamente»; literalmente, «desde su corazón».'
    reason: lexical_alternative
  - marker: b
    text: Expresión hebrea que se refiere a los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de lo anterior; 'Porque' conserva la relación causal/expositiva de forma natural en español.
- source_word: לֹא
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no ... en absoluto
  lexicon: HALOT
  rationale: Negación simple y directa, suficiente para el alcance del hebreo.
- source_word: עִנָּה
  english_pob_choice: afflict
  chosen_spanish: aflige
  alternatives_spanish:
  - humilla
  - oprime
  - causa sufrimiento
  lexicon: HALOT
  rationale: El verbo aquí expresa causar aflicción o sufrimiento; 'aflige' mantiene la fuerza del verbo sin volverlo más interpretativo de lo que exige el hebreo.
- source_word: מִלִּבּוֹ
  english_pob_choice: from his heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - voluntariamente
  - desde su corazón
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. En español, 'de su corazón' reproduce el idioma corporal/afectivo sin reducirlo a una paráfrasis como 'voluntariamente'.
- source_word: וַיַּגֶּה
  english_pob_choice: or grieve
  chosen_spanish: ni entristece
  alternatives_spanish:
  - ni aflige
  - ni causa dolor
  lexicon: HALOT
  rationale: El segundo verbo expresa causar tristeza o dolor; 'entristece' distingue bien este matiz del verbo anterior y suena natural en español.
- source_word: בְנֵי אִישׁ
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: La expresión hebrea es masculina y representativa. Se mantiene la forma literal tradicional en español para no neutralizar el paralelo ni borrar la marca gramatical del hebreo.
theological_decisions:
- issue: La afirmación sobre la disposición divina al castigo
  english_pob_reading: does not afflict from his heart / Or 'willingly'; literally, 'from his heart.'
  chosen_spanish_reading: no aflige de su corazón
  alternative_spanish_readings:
  - no aflige voluntariamente
  - no le agrada afligir
  rationale: Se preserva la metáfora antropomórfica del corazón para no aplanar el dicho hebreo. La nota permite entender el sentido idiomático de 'voluntariamente' sin sustituir el texto principal.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Expresión masculina representativa
  english_pob_reading: the sons of men
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: Se conserva la representación masculina del hebreo en el texto principal, siguiendo la política de fidelidad al registro gramatical, mientras el referente humano queda claro por el contexto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene la lectura explicativa de כִּי como ''For'', conserva la imagen literal de מִלִּבּוֹ (''from his heart'') y, tras revisión, regulariza la expresión final a plural (''sons of men''). La versión española sigue esas decisiones: ''Porque'', ''de su corazón'' y ''los hijos de los hombres''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino explícito.
  - '''hijos de los hombres'' mantiene la forma representativa masculina y el plural del cierre revisado en inglés.'
  - '''de su corazón'' preserva la metáfora hebrea; la nota aclara el sentido posible de ''voluntariamente''.'
  - '''aflige'' y ''entristece'' distinguen los dos verbos hebreos sin colapsarlos en un solo matiz.'
