translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: «Aún dirán esta palabra en la tierra de Judá y en sus ciudades, cuando yo restaure su suerte[b]: “Que Yahvé te bendiga, morada de justicia, monte santo”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las huestes».
    reason: lexical_alternative
  - marker: b
    text: O «cuando yo haga volver su cautiverio»; o «cuando yo los recobre de la cautividad». La expresión hebrea puede referirse específicamente al regreso del exilio o, de modo más amplio, a una restauración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo con la forma ya fijada por el proyecto en español. ‘Yahvé’ preserva el valor del Tetragrámaton sin ocultarlo tras un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: ‘Ejércitos’ conserva la amplitud de צְבָאוֹת y es natural en español. ‘Huestes’ sería más tradicional, pero menos transparente para lectores modernos.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: Traducción directa y estable del genitivo constructo. Se conserva el vínculo pactal con Israel sin añadir matices no presentes en el hebreo.
- source_word: ע֣וֹד יֹאמְר֞וּ
  english_pob_choice: They will yet say
  chosen_spanish: Aún dirán
  alternatives_spanish:
  - Todavía dirán
  - Volverán a decir
  lexicon: HALOT
  rationale: ‘Aún’ comunica la expectativa futura de repetición. Evita la rigidez de una repetición mecánica y mantiene el valor profético de continuidad/restauración.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este dicho
  - este asunto
  lexicon: HALOT
  rationale: ‘Palabra’ es una buena correspondencia para דָּבָר en un contexto de fórmula profética y cita. ‘Dicho’ sería posible, pero menos literal; ‘asunto’ diluye el efecto de cita.
- source_word: בְּאֶרֶץ יְהוּדָה וּבְעָרָיו
  english_pob_choice: in the land of Judah and in its cities
  chosen_spanish: en la tierra de Judá y en sus ciudades
  alternatives_spanish:
  - en el país de Judá y en sus ciudades
  - en la tierra de Judá y en sus pueblos
  lexicon: HALOT
  rationale: ‘Tierra’ conserva el valor territorial bíblico de אֶרֶץ mejor que ‘país’. ‘Sus ciudades’ refleja correctamente el sufijo posesivo referido a Judá como región.
- source_word: בְּשׁוּבִי אֶת שְׁבוּתָם
  english_pob_choice: when I restore their fortunes
  chosen_spanish: cuando yo haga volver su cautiverio[b]
  alternatives_spanish:
  - cuando yo restaure su suerte
  - cuando yo los recobre de la cautividad
  - cuando yo restaure su fortuna
  lexicon: HALOT
  rationale: Se sigue de cerca el hebraísmo שׁוּב שְׁבוּת, que puede aludir a regreso de cautiverio o a restauración más amplia. ‘Haga volver su cautiverio’ conserva la ambigüedad documentada sin imponer solo el sentido idiomático de ‘fortuna’.
- source_word: יְבָרֶכְךָ
  english_pob_choice: May Yahweh bless you
  chosen_spanish: Yahvé te bendiga
  alternatives_spanish:
  - Que Yahvé te bendiga
  - Yahvé te bendecirá
  lexicon: HALOT
  rationale: El imperfecto funciona como jussivo dentro de la bendición. En español, el subjuntivo expresa mejor el valor desiderativo/benedictorio que un futuro simple.
- source_word: נְוֵה צֶדֶק
  english_pob_choice: habitation of righteousness
  chosen_spanish: morada de justicia
  alternatives_spanish:
  - habitación de justicia
  - morada de rectitud
  - morada de justicia
  lexicon: HALOT
  rationale: ‘Morada’ es natural en español y mantiene la idea de lugar habitado. Se eligió ‘justicia’ porque צֶדֶק en este título describe la cualidad moral/covenantal del lugar; ‘rectitud’ sería posible pero menos idiomática aquí.
- source_word: הַר הַקֹּדֶשׁ
  english_pob_choice: holy mountain
  chosen_spanish: monte santo
  alternatives_spanish:
  - monte santo
  - montaña santa
  lexicon: HALOT
  rationale: ‘Monte’ es una forma bíblica natural para הַר en español y conserva el eco tradicional sin perder claridad. ‘Santo’ reproduce el valor adjetival de הַקֹּדֶשׁ con sobriedad.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión editorial del proyecto de preservar el nombre propio divino en español. ‘Yahvé’ evita el reemplazo por un título y mantiene la trazabilidad con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בְּשׁוּבִי אֶת שְׁבוּתָם
  english_pob_reading: when I restore their fortunes
  chosen_spanish_reading: cuando yo haga volver su cautiverio
  alternative_spanish_readings:
  - cuando yo restaure su suerte
  - cuando yo los recobre de la cautividad
  - cuando yo restaure su fortuna
  rationale: La expresión hebrea puede abarcar regreso del exilio o restauración más amplia. La redacción elegida preserva esa tensión sin cerrarla prematuramente a una sola paráfrasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión más reciente se mantuvo sin cambios, con acuerdo alto entre revisiones y sin observaciones sustantivas pendientes; por eso el borrador español conserva la decisión de traducir el nombre divino como ‘Yahvé’, ‘צְבָאוֹת’ como ‘de los ejércitos’ y el hebraísmo de restauración en una forma cercana al original.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton, coherente con el estándar del proyecto.
  - Se conserva el paralelismo del versículo con una cita interna entre comillas españolas.
  - ‘Morada de justicia’ y ‘monte santo’ preservan los títulos poéticos sin sobreexplicar.
  - El pie de nota b introduce la alternativa idiomática reconocida sin borrar la ambigüedad del hebreo.
