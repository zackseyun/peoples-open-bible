translation:
  language: es
  text: gobernantes de la tierra en sus reinos[a], y hombres renombrados por su poder; consejeros en su entendimiento, y videntes de todo en su profecía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo דורי ארץ es difícil; el paralelo griego dice 'ejerciendo dominio en sus reinos', lo cual apoya la traducción 'gobernantes de la tierra'.
    reason: alternative_reading
  - marker: b
    text: 'O: ''videntes de todas las cosas'' o ''los que anuncian en profecías''. El hebreo es conciso aquí, mientras que el paralelo griego enfatiza más explícitamente la proclamación profética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριεύοντες ἐν ταῖς βασιλείαις αὐτῶν / דורי ארץ במלכותם
  english_pob_choice: rulers of the land in their kingdoms
  chosen_spanish: los que dominan en sus reinos
  alternatives_spanish:
  - gobernantes de la tierra en sus reinos
  - rulers de la tierra en sus reinos
  lexicon: LSJ; HALOT
  rationale: El hebreo y el griego apuntan a personas que ejercen dominio político. En español, 'los que dominan' mantiene el participio y el sentido de gobierno activo; 'en sus reinos' sigue el plural de βασιλείαις / במלכותם sin forzar una equivalencia técnica como 'reinos' vs. 'reinado'.
- source_word: ἄνδρες ὀνομαστοὶ / אנשי שם
  english_pob_choice: men renowned
  chosen_spanish: hombres ilustres
  alternatives_spanish:
  - hombres renombrados
  - hombres famosos
  lexicon: HALOT; LSJ
  rationale: '''Hombres de nombre'' es idiomático en hebreo y griego para prestigio. ''Ilustres'' expresa dignidad y renombre en español culto sin perder la idea de notoriedad pública.'
- source_word: ἐν δυνάμει / בגבורתם
  english_pob_choice: for their might
  chosen_spanish: por su poder
  alternatives_spanish:
  - por su fuerza
  - por su valentía
  lexicon: LSJ; HALOT
  rationale: '''Poder'' corresponde bien a δυνάμει y a גבורתם, manteniendo el campo semántico de capacidad, vigor y autoridad. ''Por'' refleja la relación causal o característica del rasgo distintivo.'
- source_word: βουλεύσονται ἐν συνέσει αὐτῶν / היועצים בתבונתם
  english_pob_choice: counselors in their understanding
  chosen_spanish: consejeros en su entendimiento
  alternatives_spanish:
  - consejeros por su entendimiento
  - los que aconsejan en su discernimiento
  lexicon: HALOT; LSJ
  rationale: '''Consejeros'' conserva el valor nominal del participio hebreo/griego. ''En su entendimiento'' sigue de cerca la preposición y preserva la idea de que su consejo opera dentro del ámbito de su discernimiento.'
- source_word: ἀπηγγελκότες ἐν προφητείαις / וחוזי כל בנבואתם
  english_pob_choice: seers of all things in their prophecy
  chosen_spanish: videntes de todo en su profecía
  alternatives_spanish:
  - videntes de todas las cosas en su profecía
  - los que anuncian en profecías
  lexicon: LSJ; HALOT
  rationale: '''Videntes'' traduce bien חזי/ἀπηγγελκότες en el campo profético. ''De todo'' conserva la tersura y amplitud de כל / ἐν προφητείαις sin añadir un objeto demasiado específico; ''en su profecía'' mantiene el marco profético del texto.'
theological_decisions:
- issue: Catálogo honorífico de líderes y profetas masculinos
  english_pob_reading: men renowned / counselors / seers
  chosen_spanish_reading: hombres ilustres / consejeros / videntes
  alternative_spanish_readings:
  - personas ilustres
  - consejeras
  - visionarias
  rationale: El hebreo usa formas masculinas explícitas (אנשי, היועצים, וחוזי en este catálogo tradicional), y el POB inglés mantiene el lenguaje masculino. En español se conserva el masculino genérico de forma fiel al testimonio del texto, sin neutralizarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente indicó 'No changes needed' y el cotejo hebreo-griego presenta alta concordancia. Esta versión sigue de cerca ambos testigos, conservando el paralelismo poético y la tensión entre el hebreo terso y el griego más explícito en la línea profética.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se usa 'consejeros' y 'videntes' para preservar el paralelismo nominal de la lista.
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al contenido del versículo.
  - La puntuación conserva el ritmo en dos hemistiquios con cierre en punto y coma y punto final.
