translation:
  language: es
  text: Y todos por igual, por una misma clase de muerte, tenían incontables muertos; porque los vivos ni siquiera bastaban para sepultarlos, puesto que en un instante fue destruida su descendencia más estimada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus primogénitos»; el contexto alude a la plaga sobre los primogénitos de Egipto, aunque el griego aquí dice más literalmente «su descendencia/línea más estimada».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁμοθυμαδόν
  english_pob_choice: all alike
  chosen_spanish: todos
  alternatives_spanish:
  - todos a una
  - todos por igual
  lexicon: LSJ
  rationale: En este contexto, la idea principal es la simultaneidad y la condición compartida de todos, no una deliberación unánime. «Todos» conserva esa colectividad en un español natural; «todos por igual» sería más explícito, pero menos ágil.
- source_word: ἐν ἑνὶ ὀνόματι θανάτου
  english_pob_choice: by one form of death
  chosen_spanish: por una sola forma de muerte
  alternatives_spanish:
  - bajo un solo nombre de muerte
  - por una sola sentencia de muerte
  lexicon: LSJ
  rationale: El griego habla literalmente de «un nombre» de muerte, pero la frase funciona como una designación única de muerte que afectó a todos. «Por una sola forma de muerte» evita endurecerlo como sentencia jurídica y mantiene el alcance calamitoso que el contexto exige.
- source_word: νεκροὺς εἶχον ἀναριθμήτους
  english_pob_choice: had countless dead
  chosen_spanish: tenían incontables muertos
  alternatives_spanish:
  - tenían innumerables cadáveres
  - tenían muertos sin cuento
  lexicon: LSJ
  rationale: Conserva la construcción posesiva y el peso de una mortandad desbordante. «Muertos» reproduce el sustantivo sin volverlo demasiado clínico; «incontables» mantiene la hipérbole del original.
- source_word: οὐδὲ γὰρ πρὸς τὸ θάψαι
  english_pob_choice: for the living were not even sufficient to bury them
  chosen_spanish: porque los vivos ni siquiera eran suficientes para sepultarlos
  alternatives_spanish:
  - porque los vivos ni siquiera bastaban para enterrarlos
  - porque los vivos no alcanzaban ni para sepultarlos
  lexicon: LSJ
  rationale: La construcción expresa incapacidad para realizar el entierro. «Sepultarlos» es más formal y bíblico, pero sigue siendo claro en español; «eran suficientes» refleja bien la idea de no bastar.
- source_word: οἱ ζῶντες
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que vivían
  - los sobrevivientes
  lexicon: LSJ
  rationale: Es un participio sustantivado muy natural en español. «Los vivos» preserva el contraste directo con «los muertos» sin añadir interpretación.
- source_word: πρὸς μίαν ῥοπὴν
  english_pob_choice: in a single instant
  chosen_spanish: en un instante
  alternatives_spanish:
  - en un solo momento
  - de un solo golpe
  lexicon: LSJ
  rationale: La frase denota extrema súbitidad. «En un instante» mantiene el registro sobrio y ajusta bien al valor temporal del griego.
- source_word: ἡ ἐντιμοτέρα γένεσις αὐτῶν
  english_pob_choice: their most honored offspring
  chosen_spanish: su descendencia más honrada
  alternatives_spanish:
  - su prole más estimada
  - sus primogénitos
  lexicon: LSJ
  rationale: Γένεσις aquí apunta a linaje, descendencia o prole, no al acto de nacer. «Descendencia más honrada» conserva la relación con honor/estima del adjetivo comparativo y evita importar «primogénitos» como si el texto lo dijera explícitamente.
- source_word: διεφθάρη
  english_pob_choice: was destroyed
  chosen_spanish: fue destruida
  alternatives_spanish:
  - pereció
  - fue arruinada
  lexicon: LSJ
  rationale: El pasivo de διαφθείρω comunica destrucción catastrófica. «Fue destruida» refleja esa fuerza con un español directo y solemne.
theological_decisions:
- issue: Alusión al juicio sobre los primogénitos de Egipto sin que el griego use aquí el término explícito «primogénito»
  english_pob_reading: 'their most honored offspring; footnote: Or ''their firstborn''; the context alludes to the plague on Egypt''s firstborn, though the Greek here says more literally ''their most honored offspring/line.'''
  chosen_spanish_reading: su descendencia más honrada
  alternative_spanish_readings:
  - sus primogénitos
  - su primer linaje
  rationale: El contexto narrativo sí apunta a la plaga sobre los primogénitos de Egipto, pero esta cláusula usa una expresión más descriptiva. El texto principal conserva esa mayor literalidad; la nota ofrece la lectura contextual «primogénitos» sin borrar la tensión entre contexto y dicción precisa del griego.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego de Swete 1909 y toma en cuenta el audit trail inglés: mantengo ὁμοθυμαδόν como colectividad simultánea, ἐν ἑνὶ ὀνόματι θανάτου como una forma única de muerte sin cargar el texto con una sentencia jurídica explícita, y ἡ ἐντιμοτέρα γένεσις αὐτῶν como «su descendencia más honrada» en lugar de imponer «primogénitos» en el cuerpo principal.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto base lo requiera explícitamente; aquí no aparece el nombre divino en esta cláusula.
  - «Sepultar» y «destruir» mantienen un registro bíblico sobrio y comprensible en español contemporáneo.
  - No se usa «Cristo» ni terminología cristológica; el pasaje pertenece a Sabiduría y el contenido es narrativo-jurídico sobre muerte y entierro.
  - La puntuación con dos puntos y punto y coma se ajusta al flujo causal del original sin exagerar la segmentación.
