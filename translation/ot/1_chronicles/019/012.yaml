id: 1CH.19.12
reference: 1 Chronicles 19:12
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אִם תֶּחֱזַ֤ק מִמֶּ֨/נִּי֙ אֲרָ֔ם וְ/הָיִ֥יתָ לִּ֖/י לִ/תְשׁוּעָ֑ה וְ/אִם בְּנֵ֥י עַמּ֛וֹן יֶֽחֶזְק֥וּ מִמְּ/ךָ֖ וְ/הוֹשַׁעְתִּֽי/ךָ־ס־׃
translation:
  text: And he said[a], “If Aram is too strong for me, then you shall be my salvation; but if the Ammonites are too strong for you[b], then I will save you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “If Aram is stronger than me … and if the sons of Ammon are stronger than you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “you shall be to me for salvation,” an idiom for coming to aid or deliver in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחֱזַק / יֶחֶזְקוּ (חזק)
  chosen: is too strong / are too strong
  alternatives:
  - prevails against
  - is stronger than
  - overpowers
  lexicon: HALOT
  rationale: 'The verb חזק with מן here expresses comparative strength in battle context: ''be stronger than'' or ''prevail over.'' English idiom is smoother with ''is too strong for'' / ''are too strong for,'' which preserves the military sense without wooden literalism.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as Aram. Per philosophy, names are transliterated rather than replaced with later geopolitical labels like 'Syria.' 'Aram' also matches the singular verb form in Hebrew.
- source_word: וְהָיִיתָ לִּי לִתְשׁוּעָה
  chosen: you shall come to my rescue
  alternatives:
  - you shall be salvation for me
  - you shall be help to me
  - you shall save me
  lexicon: HALOT
  rationale: Literally, 'you shall be to me for salvation/deliverance.' In English, 'be salvation for me' is awkward and overly literal. 'Come to my rescue' captures the idiomatic military sense of providing deliverance/help in battle while preserving the future commitment.
- source_word: תְּשׁוּעָה
  chosen: rescue
  alternatives:
  - salvation
  - deliverance
  - help
  lexicon: HALOT
  rationale: In this immediate battlefield setting, 'rescue' communicates concrete military deliverance more naturally than the more theologically loaded 'salvation,' while remaining faithful to the Hebrew noun's semantic range.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: This is the standard English ethnonym for בני עמון. It is more natural than the formally literal 'sons of Ammon' while preserving the referent.
- source_word: וְהוֹשַׁעְתִּיךָ (ישע)
  chosen: I will rescue you
  alternatives:
  - I will save you
  - I will deliver you
  - I will help you
  lexicon: HALOT
  rationale: The Hiphil of ישע means to save/deliver. In battle context, 'rescue' best matches the concrete military sense and also corresponds well to the earlier תְּשׁוּעָה rendering for coherence.
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The standard narrative wayyiqtol is adequately represented by 'And he said.' 'Then he said' is possible, but 'And' better reflects the Hebrew narrative flow.
