  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - «Limpia» se usa en sentido ritual, coherente con el vocabulario levítico del proyecto.
  - La cláusula relativa final se vierte con futuro de obligación/proyección («ha de ser sembrada») para reflejar el hebreo sin sobreexplicación.
