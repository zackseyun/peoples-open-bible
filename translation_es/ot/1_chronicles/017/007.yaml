translation:
  language: es
  text: 'Ahora, pues, esto dirás a mi siervo David: Así dice Yahvé de los ejércitos: Yo te tomé de la pastura[a], de seguir al rebaño, para ser gobernante[b] sobre mi pueblo Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del redil» para «de la pastura».
    reason: lexical_alternative
  - marker: b
    text: O «líder» o «príncipe» para «gobernante».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La combinación introduce transición e inferencia en el mensaje divino; «pues» conserva ese valor discursivo mejor que un simple dato temporal.
- source_word: כֹּה תֹאמַר
  english_pob_choice: this is what you shall say
  chosen_spanish: esto dirás
  alternatives_spanish:
  - así dirás
  - esto es lo que dirás
  lexicon: HALOT
  rationale: En español, la fórmula profética suena natural y fiel con «esto dirás», manteniendo el encargo directo sin rigidez innecesaria.
- source_word: לְעַבְדִּי
  english_pob_choice: to my servant
  chosen_spanish: a mi siervo
  alternatives_spanish:
  - a mi esclavo
  lexicon: HALOT
  rationale: Aquí el término funciona como designación honorífica y pactal de David; «siervo» conserva ese registro mejor que «esclavo» en español.
- source_word: כֹּה אָמַר
  english_pob_choice: This is what ... says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural y solemne en español con «Así dice», reflejando el valor performativo del perfecto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton como «Yahvé».
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» conserva el título divino tradicional sin limitarlo a fuerzas humanas בלבד; en español es claro y solemne.
- source_word: לְקַחְתִּיךָ
  english_pob_choice: I took you
  chosen_spanish: Yo te tomé
  alternatives_spanish:
  - Yo te saqué
  - Yo te llevé
  lexicon: HALOT
  rationale: La forma verbal expresa la iniciativa divina en la elevación de David; «tomé» reproduce con sencillez esa acción.
- source_word: מִן הַנָּוֶה
  english_pob_choice: from the pasture
  chosen_spanish: del pastizal
  alternatives_spanish:
  - de la pradera
  - del redil
  lexicon: HALOT
  rationale: En el contexto pastoril, «pastizal» comunica el campo de pastoreo con naturalidad; se deja abierta la alternativa léxica de «redil/pastura» según el matiz.
- source_word: מִן אַחֲרֵי הַצֹּאן
  english_pob_choice: from following the flock
  chosen_spanish: de detrás del rebaño
  alternatives_spanish:
  - de seguir al rebaño
  - de apacentar el rebaño
  lexicon: HALOT
  rationale: La frase hebrea conserva la imagen pastoral de estar al servicio del rebaño; «de detrás del rebaño» es suficientemente literal y comprensible.
- source_word: לִהְיוֹת נָגִיד
  english_pob_choice: to be ruler
  chosen_spanish: para que fueras gobernante
  alternatives_spanish:
  - para ser príncipe
  - para ser líder
  - para que fueras jefe
  lexicon: HALOT
  rationale: נָגִיד denota una función de liderazgo/autoridad. «Gobernante» expresa bien esa función en español sin cargar el texto con terminología monárquica más estrecha.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo, Israel
  - sobre Israel, mi pueblo
  lexicon: HALOT
  rationale: Se conserva el vínculo posesivo y la identificación del pueblo con Israel, siguiendo el orden conceptual del hebreo y la POB inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa; se preserva el nombre pactal como «Yahvé» conforme a la práctica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Título funcional de David עַבְדִּי
  english_pob_reading: my servant David
  chosen_spanish_reading: mi siervo David
  alternative_spanish_readings:
  - mi esclavo David
  rationale: El contexto presenta a David como escogido y comisionado en servicio a Dios; en español, «siervo» preserva la dimensión honorífica sin perder la relación de subordinación.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested servant/slave nuance
- issue: נָגִיד como cargo
  english_pob_reading: ruler
  chosen_spanish_reading: gobernante
  alternative_spanish_readings:
  - líder
  - príncipe
  rationale: La designación apunta a autoridad delegada sobre Israel. «Gobernante» comunica el alcance gubernativo sin imponer una lectura técnica posterior.
  doctrine_reference: Lexical theology of governance titles in historical narrative
translation_notes:
  revision_awareness: La versión inglesa auditada está marcada como sin cambios tras la última revisión; se mantiene la lectura estable y no se incorporan enmiendas textuales nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva «siervo» para עֶבֶד en este contexto honorífico/pactual, coherente con el criterio del proyecto.
  - Se traduce צְבָאוֹת como «de los ejércitos» para mantener el título divino sin volverlo opaco.
  - 'Se mantiene la metáfora pastoral con un español natural: «pastizal» / «rebaño».'
  - «Gobernante» conserva la fuerza de נָגִיד sin desplazar el foco hacia una terminología eclesiástica o regia no explicitada.
