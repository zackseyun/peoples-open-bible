translation:
  language: es
  text: ¿Podrá un trono de destrucción[a] estar aliado contigo, el que forma daño[b] por estatuto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un trono de ruina» o «un trono de malicia destructora».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que forma daño bajo apariencia de ley»; literalmente, «forma daño sobre estatuto», es decir, usa la ley o el decreto como medio o pretexto para producir daño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיְחָבְרְךָ
  english_pob_choice: Can ... be allied with you
  chosen_spanish: ¿Podrá ... asociarse contigo?
  alternatives_spanish:
  - ¿Podrá ... unirse a ti?
  - ¿Podrá ... estar en alianza contigo?
  - ¿Podrá ... tener comunión contigo?
  lexicon: HALOT
  rationale: La forma interrogativa retórica expresa alianza o asociación. En español, «asociarse contigo» conserva mejor la idea relacional/política que un simple «estar contigo», y evita una carga eclesiástica no presente en el hebreo.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento de gobierno
  - sede de poder
  lexicon: HALOT
  rationale: El sentido básico es «trono», con valor metonímico para el poder gobernante. «Trono» mantiene la imaginería judicial y política del salmo.
- source_word: הַוּוֹת
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - maldad
  - ruina
  - miseria
  lexicon: HALOT
  rationale: El sustantivo plural puede denotar ruina o acciones destructivas. «Destrucción» conserva la fuerza de daño y derrumbe que la POB inglesa quiso destacar.
- source_word: יֹצֵר
  english_pob_choice: forms
  chosen_spanish: forma
  alternatives_spanish:
  - moldea
  - fabrica
  - maquina
  lexicon: HALOT
  rationale: El participio qal de יצר conserva la imagen concreta de formar o dar forma. «Forma» es la equivalencia natural en español y no sobreinterpreta el verbo.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: la desgracia
  alternatives_spanish:
  - el mal
  - la opresión
  - el sufrimiento
  lexicon: HALOT
  rationale: «עָמָל» puede referirse a aflicción, daño o trabajo opresivo; en este contexto de gobierno injusto, «desgracia» comunica el resultado nocivo sin perder la amplitud semántica. Se evita «opresión» porque adelanta una especificación que el término solo no exige.
- source_word: עֲלֵי חֹק
  english_pob_choice: by statute
  chosen_spanish: por estatuto
  alternatives_spanish:
  - bajo apariencia de ley
  - por decreto
  - mediante ley
  lexicon: HALOT
  rationale: La frase literalmente es «sobre/por ley o estatuto». «Por estatuto» preserva el registro jurídico y la ambigüedad instrumental/pretextual sin convertirla en una explicación demasiado larga dentro del texto principal.
theological_decisions:
- issue: Relación entre Dios y el poder corrupto en la pregunta retórica
  english_pob_reading: The verse denies that a destructive, law-twisting regime can be allied with God.
  chosen_spanish_reading: El versículo niega que un trono destructivo pueda asociarse con Dios/contigo.
  alternative_spanish_readings:
  - El versículo pregunta si ese poder puede tener comunión con Dios.
  - El versículo plantea si ese gobierno puede estar en alianza con Dios.
  rationale: La pregunta retórica debe conservar su fuerza de incompatibilidad moral y política. En español, «asociarse contigo» transmite esa imposibilidad sin resolver el contraste ni suavizar la denuncia.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no había cambios necesarios. Mantengo la lectura central del audit trail: un trono/autoridad destructiva no puede estar en alianza con Dios, y la frase jurídica final conserva la ambigüedad de ley como medio o pretexto.'
  spanish_consistency_notes:
  - Se conserva «trono» como metáfora de poder gobernante, en línea con el audit trail.
  - «Destrucción» mantiene la fuerza del sustantivo hebreo sin caer en un término eclesiástico tradicional no motivado por el texto.
  - «Por estatuto» conserva el registro legal y la posible ambigüedad instrumental de עֲלֵי חֹק.
  - La pregunta retórica queda abierta en español, como en el original, sin añadir una respuesta explícita.
