  text: פִּזַּ֤ר נָ֘תַ֤ן לָ/אֶבְיוֹנִ֗ים צִ֭דְקָת/וֹ עֹמֶ֣דֶת לָ/עַ֑ד קַ֝רְנ֗/וֹ תָּר֥וּם בְּ/כָבֽוֹד׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/112/009.yaml
  text: He has distributed freely[a]; he has given to the poor. His righteousness stands forever[c][b]; his horn will be lifted up in honor.
  footnotes:
