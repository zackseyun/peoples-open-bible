translation:
  language: es
  text: Y te humilló, y te dejó pasar hambre, y te alimentó con el maná, que no habías conocido, ni tus padres habían conocido; para hacerte saber que no solo de pan vivirá el hombre[a], sino que el hombre vivirá de toda palabra que sale de la boca de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hombre» aquí significa la humanidad en general, no solo varones.
    reason: cultural_note
  - marker: b
    text: 'O: «de todo lo que sale de la boca de Yahvé». La expresión hebrea es más amplia que «palabra» sola, aunque «palabra» encaja bien en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְעַנְּךָ
  english_pob_choice: he humbled you
  chosen_spanish: te humilló
  alternatives_spanish:
  - te afligió
  - te hizo sufrir
  lexicon: HALOT
  rationale: ענה en piel puede significar afligir o humillar. En este contexto de prueba e instrucción en el desierto, «humilló» conserva el sentido disciplinario de rebajamiento sin cargar más de lo que exige el texto.
- source_word: וַיַּרְעִבֶךָ
  english_pob_choice: let you hunger
  chosen_spanish: te dejó tener hambre
  alternatives_spanish:
  - te hizo tener hambre
  - te causó hambre
  lexicon: HALOT
  rationale: El verbo causativo expresa que Dios permitió/produjo el hambre como parte de la prueba. «Te dejó tener hambre» es natural en español y conserva la agencia divina sin sonar forzado.
- source_word: וַיַּאֲכִלְךָ
  english_pob_choice: fed you
  chosen_spanish: te alimentó
  alternatives_spanish:
  - te dio de comer
  - te hizo comer
  lexicon: HALOT
  rationale: El causativo de אכל se expresa bien con «alimentó», que resulta breve y fiel al acto de provisión divina.
- source_word: הַמָּן
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - maná
  lexicon: HALOT
  rationale: Se conserva el nombre establecido del alimento del desierto; el artículo hebreo se refleja naturalmente en español con «el maná».
- source_word: אֲשֶׁר לֹא יָדַעְתָּ וְלֹא יָדְעוּן אֲבֹתֶיךָ
  english_pob_choice: which you had not known, nor had your fathers known
  chosen_spanish: que no conocías ni conocieron tus padres
  alternatives_spanish:
  - que no habías conocido ni habían conocido tus padres
  - que ni tú ni tus padres conocían
  lexicon: HALOT
  rationale: En hebreo, «conocer» implica aquí haber experimentado o tenido trato con algo. La forma en español mantiene esa relación previa de desconocimiento sin volverla demasiado rígida.
- source_word: לְמַעַן הוֹדִעֲךָ
  english_pob_choice: so that he might make you know
  chosen_spanish: para hacerte saber
  alternatives_spanish:
  - para enseñarte
  - para darte a conocer
  lexicon: HALOT
  rationale: 'El hiphil de ידע tiene fuerza causativa: «hacer saber» preserva la idea de que Dios produce el conocimiento mediante la experiencia del desierto.'
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la persona
  lexicon: HALOT
  rationale: Se conserva el valor genérico representativo del hebreo masculino. «El hombre» mantiene además la formulación tradicional de la cita posterior sin perder el sentido inclusivo.
- source_word: הַלֶּחֶם לְבַדּוֹ
  english_pob_choice: bread alone
  chosen_spanish: solo de pan
  alternatives_spanish:
  - de pan solamente
  - únicamente de pan
  lexicon: HALOT
  rationale: La preposición hebrea y el adverbio de exclusión se expresan de manera idiomática en español como «solo de pan», que conserva el contraste con lo que sigue.
- source_word: מוֹצָא פִי יְהוָה
  english_pob_choice: every word that comes from the mouth of Yahweh
  chosen_spanish: todo lo que sale de la boca de Yahvé
  alternatives_spanish:
  - toda palabra que sale de la boca de Yahvé
  - cada palabra que sale de la boca de Yahvé
  lexicon: HALOT
  rationale: מוֹצָא significa literalmente lo que sale o procede. «Todo lo que sale de la boca de Yahvé» conserva esa amplitud sin restringirla de antemano a «palabra», aunque esa sea una posible implicación contextual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino.
theological_decisions:
- issue: Valor genérico de הָאָדָם en una afirmación sobre la vida humana
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El hebreo usa un sustantivo masculino con fuerza representativa universal. «El hombre» respeta esa forma y su fuerza intertextual, sin limitar el alcance a varones.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam'
- issue: Alcance de מוֹצָא פִי יְהוָה
  english_pob_reading: every word that comes from the mouth of Yahweh
  chosen_spanish_reading: todo lo que sale de la boca de Yahvé
  alternative_spanish_readings:
  - toda palabra que sale de la boca de Yahvé
  - cada palabra que sale de la boca de Yahvé
  rationale: El hebreo puede abarcar tanto palabra como lo que procede de la boca de Dios. En español, «todo lo que sale» preserva mejor la amplitud semántica y deja visible la tensión léxica que el contexto especifica.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; lexical note on divine utterance
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de origen; la versión inglesa final fue marcada como sin cambios en la última pasada, con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «el maná» como término ya lexicalizado en español.
  - Se mantiene «el hombre» por el valor genérico de אדם y por continuidad intertextual.
  - La primera cláusula sigue el orden hebreo de humillación, hambre y provisión, sin suavizar la secuencia causal.
  - No se traduce מוֹצָא como «palabra» en el cuerpo principal para no cerrar prematuramente la amplitud del hebreo.
