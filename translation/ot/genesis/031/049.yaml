id: GEN.31.49
reference: Genesis 31:49
source:
  edition: WLC
  text: וְ/הַ/מִּצְפָּה֙ אֲשֶׁ֣ר אָמַ֔ר יִ֥צֶף יְהוָ֖ה בֵּינִ֣/י וּ/בֵינֶ֑/ךָ כִּ֥י נִסָּתֵ֖ר אִ֥ישׁ מֵ/רֵעֵֽ/הוּ׃
translation:
  text: And Mizpah[a], because he said[b], “May Yahweh watch between me and you when we are hidden from each other.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mizpah sounds like the Hebrew word for 'watchtower' or 'lookout,' linking the place-name to 'May the LORD keep watch.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when we are out of each other's sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמִּצְפָּה
  chosen: And Mizpah
  alternatives:
  - And the watchtower
  - And the lookout
  lexicon: HALOT
  rationale: The noun derives from the root צפה ('to watch/look out') and can denote a watchtower or lookout place. Here it functions as a place-name/explanatory naming formula in Jacob and Laban's covenant setting, so transliterating as 'Mizpah' best reflects the onomastic use while preserving the wordplay through the following clause.
- source_word: אֲשֶׁר אָמַר
  chosen: because he said
  alternatives:
  - for he said
  - which he called because he said
  lexicon: HALOT
  rationale: The relative particle plus verb introduces the explanation for the name. English idiom is smoother with 'because he said.' Some translations supply 'he called it' from context, but that is not explicit in the Hebrew of this verse and is therefore avoided.
- source_word: יִצֶף
  chosen: keep watch
  alternatives:
  - watch
  - look out
  lexicon: HALOT
  rationale: From צפה, 'to watch, keep watch.' 'Keep watch' captures the jussive sense in the quoted wish and echoes the place-name Mizpah without forcing an awkwardly literal repetition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between you and me
  lexicon: HALOT
  rationale: A direct rendering of the Hebrew prepositional phrase. 'Between me and you' preserves the source order and remains natural enough in English.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - if
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which the requested watching applies. 'When' fits the sense better than a causal 'for' in contemporary English.
- source_word: נִסָּתֵר
  chosen: we are hidden
  alternatives:
  - we are out of sight
  - we are absent
  lexicon: HALOT
  rationale: The Niphal of סתר means 'be hidden/concealed.' The first common plural form is reflected by 'we are hidden.' This is preferable to paraphrastic renderings like 'we are absent,' though the idiomatic sense is separation from one another's sight.
- source_word: אִישׁ מֵרֵעֵהוּ
  chosen: from each other
  alternatives:
  - each man from his companion
  - one from his neighbor
  lexicon: HALOT
  rationale: Literally, 'a man from his companion/friend.' In this reciprocal context referring to the two parties, idiomatic English 'from each other' communicates the sense clearly without unnecessary stiffness. The masculine singular distributive force is represented by the reciprocal expression.
