revisions:
- from: 'Cuando me acuesto[a], digo: «¿Cuándo me levantaré?». Pero la tarde[b] se prolonga, y estoy hastiado de dar vueltas hasta el alba[c].'
  to: 'Cuando me acuesto[a], digo: «¿Cuándo me levantaré?». Pero la noche[b] se alarga, y estoy lleno de inquietud hasta el alba[c].'
  rationale: 'La revisión es pequeña y no doctrinal: mejora la naturalidad contextual del español al cambiar «la tarde» por «la noche» en el texto principal, sin perder la precisión filológica gracias a la nota; además, «estoy lleno de inquietud» se acerca mejor a la estructura hebrea y al inglés «I am full of tossing» que «estoy hastiado de dar vueltas».'
