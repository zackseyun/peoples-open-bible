translation:
  language: es
  text: Y cinco codos medía el ala una del querubín[a], y cinco codos el ala segunda del querubín; diez codos desde el extremo de sus alas hasta el extremo de sus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la punta de sus alas hasta la punta de sus alas», es decir, la extensión total de una punta de ala a la otra.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco ammas
  lexicon: HALOT
  rationale: «Codo» es el equivalente español convencional y claro de אַמָּה en medidas arquitectónicas. Conserva el valor técnico sin introducir una transliteración innecesaria.
- source_word: כְּנַף
  english_pob_choice: wing
  chosen_spanish: ala
  alternatives_spanish:
  - extremidad
  - pluma
  lexicon: HALOT
  rationale: En el contexto de los querubines del templo, כָּנָף se refiere naturalmente a un ala. «Ala» es la opción más directa y comprensible en español.
- source_word: הַכְּרוּב
  english_pob_choice: the cherub
  chosen_spanish: el querubín
  alternatives_spanish:
  - el querub
  - la figura de querubín
  lexicon: HALOT
  rationale: En español bíblico, «querubín» es la forma estándar y evita una rareza innecesaria. Mantiene el singular de cada figura tallada, como en el hebreo.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: una de las
  alternatives_spanish:
  - la una
  - la primera
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la una» ala; en español, «una de las alas» comunica con naturalidad la contraposición con la otra ala sin perder la referencia al primer miembro.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: la otra
  alternatives_spanish:
  - la segunda
  lexicon: HALOT
  rationale: Aunque el hebreo usa un ordinal femenino («la segunda»), en español «la otra ala» reproduce bien la pareja contrastiva y resulta más natural que repetir un ordinal en una descripción mecánica.
- source_word: עֶשֶׂר אַמּוֹת
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez ammas
  lexicon: HALOT
  rationale: Se mantiene la medida arquitectónica con el equivalente español habitual, preservando la exactitud numérica del total del envergadura.
- source_word: מִקְצוֹת ... וְעַד קְצוֹת
  english_pob_choice: from the end of ... to the end of
  chosen_spanish: desde la punta de ... hasta la punta de
  alternatives_spanish:
  - desde el extremo de ... hasta el extremo de
  - desde el final de ... hasta el final de
  lexicon: HALOT
  rationale: En alas, «punta» expresa de manera más natural la idea de extremidad que «extremo» en español, sin cambiar el sentido de alcance total del borde a borde.
- source_word: כְּנָפָיו
  english_pob_choice: its wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - las alas de él
  - las alas suyas
  lexicon: HALOT
  rationale: El sufijo hebreo es masculino singular; en español, «sus alas» evita un pronombre posesivo marcado por género personal y conserva la referencia al objeto/figura.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del texto masorético según WLC y la solución inglesa POB: descripción cuantitativa de las alas del querubín con un total de diez codos de envergadura. Se ajustó la sintaxis al español para sonar natural sin añadir interpretaciones.'
  spanish_consistency_notes:
  - Se usó «codos» para אַמּוֹת en coherencia con el resto de la traducción bíblica en español.
  - Se prefirió «ala»/«alas» para כְּנַף/כְּנָפָיו por ser el sentido evidente en contexto templario.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - La nota al pie conserva la alternativa lexical importante sobre la extensión total de las alas.
