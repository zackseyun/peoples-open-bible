translation:
  language: es
  text: 'Pero, alzándose por la ira, pensó descargar sobre los judíos la maldad de los que lo habían puesto en fuga. Por eso ordenó al auriga[a], que conducía sin cesar, que apresurara la marcha, mientras el juicio desde el cielo lo acompañaba. Porque con arrogancia había dicho: “Cuando llegue allí, haré de Jerusalén un lugar de sepultura[b] para los judíos”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “auriga de carro”. ἁρματηλάτης nombra de modo específico al conductor del carro; en español clásico y eclesial, “auriga” es la forma más concisa.
    reason: lexical_alternative
  - marker: b
    text: O “fosa común”. Πολυάνδριον designa un lugar para muchos muertos; la amenaza puede entenderse como un entierro colectivo de judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαρθεὶς ... τῷ θυμῷ
  english_pob_choice: in his rage
  chosen_spanish: alzándose por la ira
  alternatives_spanish:
  - inflamado de ira
  - arrastrado por la ira
  lexicon: LSJ
  rationale: El participio con θυμός expresa ser levantado o enardecido por la ira. En español, “alzándose por la ira” conserva ese matiz de impulso interior y mantiene un tono natural sin perder la imagen original.
- source_word: ᾤετο
  english_pob_choice: he thought
  chosen_spanish: pensó
  alternatives_spanish:
  - se imaginó
  - supuso
  lexicon: LSJ
  rationale: Es una equivalencia directa que conserva la intención subjetiva de Antíoco sin convertirla en certeza narrativa.
- source_word: τῶν πεφυγαδευκότων αὐτὸν κακίαν
  english_pob_choice: the malice of those who had put him to flight
  chosen_spanish: la maldad de los que lo habían puesto en fuga
  alternatives_spanish:
  - la malicia de los que lo habían hecho huir
  - la perversidad de los que lo habían expulsado
  lexicon: LSJ
  rationale: La frase retiene la referencia a quienes lo hicieron huir y la carga negativa de κακία. “Puesto en fuga” conserva el eco fuerte del original y evita suavizar el agravio.
- source_word: ἐναπερείσασθαι
  english_pob_choice: to vent on
  chosen_spanish: descargar sobre
  alternatives_spanish:
  - volcar sobre
  - imponer sobre
  lexicon: LSJ
  rationale: El verbo sugiere poner o echar encima algo hostil. “Descargar sobre” transmite bien el traslado de resentimiento hacia los judíos sin añadir una paráfrasis excesiva.
- source_word: συνέταξεν τὸν ἁρματηλάτην
  english_pob_choice: he ordered the charioteer
  chosen_spanish: ordenó al auriga
  alternatives_spanish:
  - ordenó al carrero
  - mandó al conductor del carro
  lexicon: LSJ
  rationale: ἁρματηλάτης designa específicamente al conductor del carro de guerra o carro. “Auriga” es el término clásico y claro en español para este oficio.
- source_word: ἀδιαλείπτως ἐλαύνοντα
  english_pob_choice: driving without stopping
  chosen_spanish: que conducía sin cesar
  alternatives_spanish:
  - que avanzaba sin detenerse
  - que iba sin descanso
  lexicon: LSJ
  rationale: La combinación indica una conducción continua e ininterrumpida. “Sin cesar” comunica la persistencia del movimiento con buena naturalidad en español.
- source_word: καταλύειν τὴν πορείαν
  english_pob_choice: to press on with the journey
  chosen_spanish: que apresurara la marcha
  alternatives_spanish:
  - que continuara el viaje
  - que no interrumpiera la ruta
  lexicon: LSJ
  rationale: El griego apunta al avance del trayecto hasta su término o punto de detención. En contexto, la orden es ir más rápido, y “apresurara la marcha” comunica esa fuerza práctica sin perder el sentido del pasaje.
- source_word: τῆς ἐξ οὐρανοῦ τῆς κρίσεως συνοδούσης αὐτῷ
  english_pob_choice: while the judgment from heaven was accompanying him
  chosen_spanish: mientras el juicio desde el cielo lo acompañaba
  alternatives_spanish:
  - mientras el juicio del cielo iba con él
  - con el juicio celestial siguiéndolo
  lexicon: LSJ
  rationale: Se conserva el valor judicial de κρίσις y su procedencia celestial. “Lo acompañaba” preserva συνοδούσης y evita reducir el pasaje solo a castigo físico.
- source_word: ὑπερηφάνως
  english_pob_choice: in his arrogance
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - con soberbia
  - altivamente
  lexicon: LSJ
  rationale: El adverbio expresa orgullo insolente. “Con arrogancia” es claro y recoge bien la valoración moral del narrador.
- source_word: Πολυάνδριον
  english_pob_choice: a burial place
  chosen_spanish: un lugar de sepultura
  alternatives_spanish:
  - una fosa común
  - un sepulcro colectivo
  lexicon: LSJ
  rationale: El término designa un sitio para muchos muertos. “Lugar de sepultura” preserva la amplitud del vocablo sin cerrar el sentido solo a “fosa común”, aunque esa sea una posibilidad contextual.
theological_decisions:
- issue: Juicio divino sobre Antíoco
  english_pob_reading: the judgment from heaven was accompanying him
  chosen_spanish_reading: el juicio desde el cielo lo acompañaba
  alternative_spanish_readings:
  - el juicio del cielo iba con él
  - el castigo del cielo lo seguía
  rationale: Se conserva la atribución explícita del evento al cielo y el matiz judicial de κρίσις. No se reemplaza por un término meramente punitivo para no resolver la tensión teológica del texto.
  doctrine_reference: Providencia y retribución divina; primacía del texto original sobre la suavización interpretativa.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y la base griega, manteniendo el tono narrativo sombrío y la amenaza final de Πολυάνδριον sin resolverla demasiado. La formulación española conserva la secuencia causal, la simultaneidad del juicio celestial y el matiz de orgullo insolente.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantuvo “judíos” y no se amplió a otros referentes, conforme al griego.
  - Se eligió “juicio” para κρίσις, preservando su peso judicial y teológico.
  - Se evitó “Cristo” y vocabulario litúrgico no presente en el pasaje.
  - La nota sobre Πολυάνδριον preserva la alternativa interpretativa sin imponerla en el texto principal.
