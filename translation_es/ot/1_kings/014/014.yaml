review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: Yahvé como nombre divino, ''levantará para sí'', ''un rey sobre Israel'', ''la casa de Jeroboam'' y el cierre abrupto con nota. Sin embargo, el verbo יַכְרִית fue auditado en inglés como ''cut off'' para preservar el modismo de juicio pactual; ''exterminará'' intensifica e interpreta más de lo necesario. Además, la puntuación inicial ''Y Yahvé'' suena poco natural en español bíblico corriente; conviene ''Yahvé levantará...'' sin perder el sentido coordinante implícito del contexto.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste menor para sonar más natural en español y alinearse mejor con la filosofía de equivalencia óptima. 'Aun ahora' funciona, aunque 'incluso ahora' también sería posible; no es necesario cambiarlo. La nota al pie está bien planteada y preserva la dificultad textual.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; ''casa de Jeroboam'' preserva la terminología dinástica; no hay conflictos cristológicos ni doctrinales. La única desviación relevante es יכרית, donde el proyecto inglés prefirió un equivalente más literal (''cut off''); en español ''cortará de raíz'' o ''eliminará'' preserva mejor esa fuerza que ''exterminará''.'
  issues:
  - severity: medium
    issue: '''exterminará'' sobreinterpreta יַכְרִית'
    rationale: El hebreo y la auditoría inglesa preservan el modismo 'cut off' con fuerza de juicio/corte, no necesariamente la noción explícita de exterminio total. 'Exterminará' añade una intensidad interpretativa mayor.
  - severity: low
    issue: '''Y Yahvé'' resulta poco natural en español'
    rationale: Aunque refleja la conjunción hebrea, en español de lectura fluida es preferible comenzar 'Yahvé levantará...' en este versículo sin perder la conexión contextual.
  revised_spanish_text: Yahvé levantará para sí un rey sobre Israel, que cortará de raíz la casa de Jeroboam este día[a]. Pero, ¿qué? Aun ahora.
  revised_footnotes:
  - marker: a
    text: 'El final hebreo es abrupto y difícil: literalmente, «y ¿qué? aun ahora». Algunos lo entienden como una exclamación que subraya la inmediatez del juicio, por ejemplo: «¿pero qué? ¡aun ahora!» o «¿y qué más? ya ahora».'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'exterminará' por 'cortará de raíz' para reflejar mejor el modismo hebreo de juicio preservado en la auditoría inglesa ('cut off') sin suavizarlo ni intensificarlo indebidamente. También se elimina la conjunción inicial 'Y' para mejorar la naturalidad del español. Se conserva el cierre abrupto y la nota explicativa.
