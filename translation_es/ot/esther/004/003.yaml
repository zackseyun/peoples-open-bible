translation:
  language: es
  text: Y en cada provincia[a], en todo lugar donde llegaba la palabra del rey y su decreto, había gran duelo entre los judíos, con ayuno, llanto y lamentación; cilicio y ceniza[b] fueron extendidos para muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda provincia». La repetición hebrea «provincia y provincia» es distributiva y subraya la totalidad.
    reason: lexical_alternative
  - marker: b
    text: O «eran usados por muchos». El hebreo לָרַבִּים después de «fueron extendidos» es conciso y puede indicar tanto uso difundido entre muchos como que estos signos de duelo fueron extendidos para muchos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל מְדִינָה וּמְדִינָה
  english_pob_choice: in every province
  chosen_spanish: en toda provincia y provincia
  alternatives_spanish:
  - en cada provincia
  - en toda provincia
  lexicon: HALOT
  rationale: La repetición distributiva hebrea se conserva de manera audible en español con «provincia y provincia», mientras que «toda» expresa la extensión total. Mantiene el énfasis de abarcar cada provincia sin volver la frase rígida.
- source_word: מְקוֹם אֲשֶׁר
  english_pob_choice: wherever
  chosen_spanish: en todo lugar donde
  alternatives_spanish:
  - dondequiera que
  - en cada lugar donde
  lexicon: HALOT
  rationale: La combinación introduce el ámbito en que actúa la cláusula siguiente. «En todo lugar donde» es natural en español y conserva la fuerza distributiva de «wherever».
- source_word: דְּבַר הַמֶּלֶךְ
  english_pob_choice: the king’s word
  chosen_spanish: la palabra del rey
  alternatives_spanish:
  - la orden del rey
  - el decreto del rey
  lexicon: HALOT
  rationale: דבר puede ser «palabra», «asunto» o «mensaje». En este contexto la formulación real transmitida se expresa mejor como «palabra del rey», preservando el matiz textual del hebreo y dejando que el contexto jurídico lo complete.
- source_word: וְדָתוֹ
  english_pob_choice: his decree
  chosen_spanish: su decreto
  alternatives_spanish:
  - su ley
  - su edicto
  lexicon: HALOT
  rationale: דת en Ester suele referirse a una disposición legal oficial. «Decreto» comunica bien esa fuerza jurídica en español y evita diluirla con «ley».
- source_word: מַגִּיעַ
  english_pob_choice: reached
  chosen_spanish: llegaba
  alternatives_spanish:
  - alcanzaba
  - arribaba
  lexicon: HALOT
  rationale: El participio indica la difusión de la orden por las provincias. «Llegaba» reproduce el movimiento hacia cada lugar sin sonar forzado.
- source_word: אֵבֶל גָּדוֹל
  english_pob_choice: great mourning
  chosen_spanish: gran duelo
  alternatives_spanish:
  - gran luto
  - gran lamento
  lexicon: HALOT
  rationale: אֵבֶל expresa duelo/mourning en un sentido ritual y comunitario. «Duelo» resulta más natural que «luto» en español corriente y mantiene la gravedad del término.
- source_word: לַיְּהוּדִים
  english_pob_choice: among the Jews
  chosen_spanish: entre los judíos
  alternatives_spanish:
  - para los judíos
  - en medio de los judíos
  lexicon: HALOT
  rationale: El hebreo sitúa el duelo dentro de la comunidad. «Entre los judíos» conserva ese carácter colectivo mejor que una traducción finalista como «para los judíos».
- source_word: וְצוֹם וּבְכִי וּמִסְפֵּד
  english_pob_choice: with fasting and weeping and lamentation
  chosen_spanish: con ayuno, llanto y lamento
  alternatives_spanish:
  - con ayuno, llanto y lamentación
  - con ayuno, llanto y duelo
  lexicon: HALOT
  rationale: Se conserva la tríada de formas de aflicción. «Ayuno» y «llanto» son directos; «lamento» mantiene la idea de lamentación pública sin hacer la frase demasiado técnica.
- source_word: שַׂק וָאֵפֶר
  english_pob_choice: sackcloth and ashes
  chosen_spanish: cilicio y ceniza
  alternatives_spanish:
  - saco y ceniza
  - sackcloth y ceniza
  lexicon: HALOT
  rationale: El par tradicional de duelo se vierte al español con «cilicio y ceniza». «Cilicio» es el equivalente bíblico usual para שַׂק y es comprensible en registro eclesial; «ceniza» mantiene el sustantivo concreto.
- source_word: יֻצַּע
  english_pob_choice: were spread out
  chosen_spanish: se extendían
  alternatives_spanish:
  - eran extendidos
  - se desplegaban
  lexicon: HALOT
  rationale: El pasivo hebreo de יצע expresa el acto de extender o desplegar. En español, «se extendían» conserva la imagen con fluidez y sin obligar a especificar el sujeto agente.
- source_word: לָרַבִּים
  english_pob_choice: for many
  chosen_spanish: para muchos
  alternatives_spanish:
  - por muchos
  - ante muchos
  lexicon: HALOT
  rationale: 'La frase es concisa y ambigua. «Para muchos» deja abierta la misma tensión del hebreo: puede señalar disponibilidad, uso o destino de los elementos de duelo.'
theological_decisions:
- issue: Naturaleza del duelo comunitario en Ester 4:3
  english_pob_reading: there was great mourning among the Jews, with fasting and weeping and lamentation
  chosen_spanish_reading: había gran duelo entre los judíos, con ayuno, llanto y lamento
  alternative_spanish_readings:
  - había gran luto entre los judíos
  - había gran lamento entre los judíos
  rationale: No se suaviza la intensidad del pasaje ni se reduce a una emoción privada. La redacción mantiene el carácter comunitario, visible y ritual del duelo, coherente con el contexto de crisis nacional.
  doctrine_reference: Lamentaciones bíblicas y prácticas de duelo comunitario; cf. Joel 2:12-13, Ester 4:1-3
- issue: Sentido de la expresión de duelo externa
  english_pob_reading: sackcloth and ashes were spread out for many
  chosen_spanish_reading: cilicio y ceniza se extendían para muchos
  alternative_spanish_readings:
  - cilicio y ceniza eran usados por muchos
  - cilicio y ceniza se ponían para muchos
  rationale: 'Se conserva la ambigüedad documentada por la versión inglesa: puede referirse al uso de prendas/elementos de duelo por muchas personas o a que estos se extendían como provisión/manifestación pública. No se resuelve artificialmente una tensión que el hebreo permite.'
  doctrine_reference: Uso simbólico del cilicio y la ceniza en la Biblia; cf. Job 2:8, Jonás 3:6
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su última pasada, con acuerdo alto y solo observaciones menores. Esta propuesta sigue de cerca esa solución, pero adapta la sintaxis a un español natural y conserva la ambigüedad notada en לָרַבִּים mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva el lenguaje de «judíos», «ayuno», «llanto», «lamento» y «cilicio y ceniza» por su correspondencia bíblica y porque el contexto exige un registro solemne.
  - No se introduce «SEÑOR» ni otro sustituto para el nombre divino, pues no aparece en este versículo.
  - La repetición distributiva hebrea se refleja de forma legible en español sin eliminar su efecto retórico.
