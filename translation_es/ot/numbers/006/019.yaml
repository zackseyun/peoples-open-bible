translation:
  language: es
  text: Entonces el sacerdote tomará la espaldilla cocida del carnero, una torta sin levadura de la canasta y una oblea sin levadura, y las pondrá sobre las palmas del nazareo[a], después de que se haya rapado la cabeza consagrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «después de haber rapado su consagración». En contexto, esto se refiere al cabello o la cabeza que llevaba la señal de su consagración nazarea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - y tomó
  lexicon: HALOT
  rationale: En un mandato ritual, el hebreo secuencial se expresa de forma natural en futuro modal español con «Entonces ... tomará», conservando el orden de la acción sin sonar mecánico.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: «Sacerdote» es la equivalencia directa y natural para el oficial cultual; mantiene la referencia definida sin añadir matices eclesiásticos ajenos.
- source_word: הַזְּרֹעַ
  english_pob_choice: the ... shoulder
  chosen_spanish: la espaldilla
  alternatives_spanish:
  - el hombro
  - la pata delantera
  lexicon: HALOT
  rationale: En contexto sacrificial, זְרוֹעַ designa una porción concreta del animal. «Espaldilla» comunica mejor esa pieza de carne en español que «hombro», y evita ambigüedad anatómica.
- source_word: בְּשֵׁלָה
  english_pob_choice: boiled
  chosen_spanish: cocida
  alternatives_spanish:
  - hervida
  - cocida en agua
  lexicon: HALOT
  rationale: El adjetivo señala que la porción fue preparada por cocción. «Cocida» es natural en español; «hervida» sería más estrecho y menos idiomático en este contexto ritual.
- source_word: מִן הָאַיִל
  english_pob_choice: from the ram
  chosen_spanish: del carnero
  alternatives_spanish:
  - del macho carnero
  - de entre el carnero
  lexicon: HALOT
  rationale: La preposición marca procedencia de la pieza tomada del animal. «Del carnero» preserva la relación fuente-partes de manera clara y concisa.
- source_word: חַלַּת מַצָּה אַחַת
  english_pob_choice: one unleavened loaf
  chosen_spanish: una torta sin levadura
  alternatives_spanish:
  - un pan sin levadura
  - una torta ácima
  lexicon: HALOT
  rationale: חלה puede referirse a una torta o pan redondo; «torta» evita forzar una forma moderna de pan y mantiene el carácter de pieza ritual. «Sin levadura» traduce מַצָּה con transparencia.
- source_word: מִן הַסַּל
  english_pob_choice: from the basket
  chosen_spanish: de la canasta
  alternatives_spanish:
  - del canasto
  - del cesto
  lexicon: HALOT
  rationale: «Canasta» es una equivalencia natural y clara para סַל en español, con registro apropiado para instrucción litúrgica.
- source_word: וּרְקִיק מַצָּה אֶחָד
  english_pob_choice: and one unleavened wafer
  chosen_spanish: y una galleta sin levadura
  alternatives_spanish:
  - y una oblea sin levadura
  - y una torta delgada sin levadura
  lexicon: HALOT
  rationale: רְקִיק denota una pieza delgada de pan; «galleta» expresa brevedad y delgadez en español contemporáneo, aunque «oblea» es una alternativa posible. Se evita «Cristiano/eucarístico» por no pertenecer al texto.
- source_word: וְנָתַן
  english_pob_choice: and put
  chosen_spanish: y las pondrá
  alternatives_spanish:
  - y las colocará
  - y las echará
  lexicon: HALOT
  rationale: «Pondrá» es la forma más simple y fiel para el acto de colocar los elementos sobre las manos; conserva la concreción del gesto ritual.
- source_word: עַל כַּפֵּי
  english_pob_choice: on the palms of
  chosen_spanish: sobre las palmas de
  alternatives_spanish:
  - en las palmas de
  - sobre las manos de
  lexicon: HALOT
  rationale: «Palmas» reproduce con precisión כַּפַּיִם, manteniendo el detalle físico del gesto mejor que el general «manos».
- source_word: הַנָּזִיר
  english_pob_choice: the Nazirite
  chosen_spanish: el nazareo
  alternatives_spanish:
  - el nazareo consagrado
  - el nazareno
  lexicon: HALOT
  rationale: «Nazareo» es la forma técnica en español para el consagrado bajo voto nazareo. Se evita «nazareno», que en español remite naturalmente a Jesús o a un habitante de Nazaret.
- source_word: אַחַר הִתְגַּלְּחוֹ
  english_pob_choice: after he has shaved
  chosen_spanish: después de que haya raspado
  alternatives_spanish:
  - después de haberse rapado
  - tras rasurarse
  lexicon: HALOT
  rationale: El verbo implica afeitar por completo la cabeza en el rito. «Raspar» intenta reflejar el sentido de quitar el cabello hasta dejar la cabeza sin el marcador de consagración; se mantiene la secuencia temporal con subjuntivo perfecto.
- source_word: אֶת נִזְרוֹ
  english_pob_choice: his consecrated head
  chosen_spanish: su consagración
  alternatives_spanish:
  - su consagración nazarea
  - el cabello de su consagración
  - su cabeza consagrada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su consagración», pero en contexto se refiere al signo corporal de esa consagración, ahora afeitado. Para no perder la tensión entre estado y signo ritual, se conserva la abstracción de forma breve en el texto principal y se aclara en nota.
theological_decisions:
- issue: Sentido de נִזְרוֹ en el rito nazareo
  english_pob_reading: his consecrated head
  chosen_spanish_reading: su consagración
  alternative_spanish_readings:
  - su cabeza consagrada
  - el cabello de su consagración
  - su consagración nazarea
  rationale: El hebreo condensado nombra la consagración misma, pero el acto descrito es el rapado que marca el final del voto. En español se conserva la abstracción del sustantivo para no perder el eco semántico del original, y se aclara en nota que en contexto se trata del signo corporal de esa consagración.
  doctrine_reference: Números 6:18–21; filosofía de traducción §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del audit trail inglés y mantiene la solución contextual para נִזְרוֹ. Se ajustó el español para que el participio de culminación ritual sea natural y para conservar la precisión cultual de las piezas del sacrificio sin introducir glosas innecesarias en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «nazareo» como término técnico, en coherencia con la terminología bíblica del voto nazareo.
  - «Consagración» traduce נִזְרוֹ en el texto principal para preservar la tensión textual; la nota aclara su referente corporal en el rito.
  - «Espaldilla» se eligió para la pieza sacrificial por ser la equivalencia más natural en español para la porción delantera del animal.
  - El registro es litúrgico pero moderno, evitando formas arcaizantes que no aportan fidelidad adicional.
