    issue: '''hasta el regocijo'' no comunica bien el valor idiomático intensificador de אֱלֵי גִיל.'
    rationale: La evidencia y la POB inglesa tratan la frase como intensificador ('exceedingly'), con alternativa más literal en nota. En español, 'hasta el regocijo' suena forzado y oscurece el sentido poético.
  - severity: medium
    issue: Las notas a y b separan artificialmente una sola decisión léxica.
    rationale: La expresión אֱלֵי גִיל funciona como unidad idiomática. Conviene una sola nota que preserve la alternativa más literal y explique la intensificación, en vez de anclar dos notas a una misma zona semántica.
  - severity: low
    issue: La nota sobre 'encuentran' no refleja una ambigüedad relevante preservada por la auditoría inglesa.
    rationale: '''Hallan'' es solo sinónimo estilístico, no una alternativa exegética significativa. Puede omitirse para no sobrecargar el aparato.'
