- from: Y yo los llevaré a la tierra que juré dar a Abraham, a Isaac y a Jacob, y se la daré a ustedes como posesión. Yo soy Yahvé.[a]
  to: Y los llevaré a la tierra que juré[a] dar a Abraham, a Isaac y a Jacob, y se la daré a ustedes como posesión. Yo soy Yahvé.
  rationale: Se corrige el anclaje de la nota para que comente el modismo de juramento donde realmente aparece en el texto, y se suaviza el inicio eliminando el pronombre explícito innecesario para mejorar la naturalidad del español sin perder el sentido ni la solemnidad.
