id: 2SA.18.3
reference: 2 Samuel 18:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הָ/עָ֜ם לֹ֣א תֵצֵ֗א כִּי֩ אִם נֹ֨ס נָנ֜וּס לֹא יָשִׂ֧ימוּ אֵלֵ֣י/נוּ לֵ֗ב וְ/אִם יָמֻ֤תוּ חֶצְיֵ֨/נוּ֙ לֹֽא יָשִׂ֤ימוּ אֵלֵ֨י/נוּ֙ לֵ֔ב כִּֽי עַתָּ֥ה כָמֹ֖/נוּ עֲשָׂרָ֣ה אֲלָפִ֑ים וְ/עַתָּ֣ה ט֔וֹב כִּי תִֽהְיֶה לָּ֥/נוּ מֵ/עִ֖יר ל/עזיר־־־־־־־׃ס
translation:
  text: But the people said[a], “You must not go out, for if we flee, they will not pay attention to us; and if half of us die, they will not pay attention to us. For you are worth ten thousand of us[c][b]; so now it is better that you be ready to help us from the city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they will not set their heart on us,” an idiom meaning they will not regard us as their main concern.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “for now you are like ten thousand of us.”
    reason: lexical_alternative
  - marker: c
    text: The final phrase likely means David should remain in the city to provide support or reinforcements if needed.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא תֵצֵא
  chosen: You must not go out
  alternatives:
  - Do not go out
  - You shall not go out
  lexicon: HALOT
  rationale: The imperfect with negation in direct speech functions as a strong prohibition/admonition. 'You must not go out' captures the force in natural English without sounding overly legal.
- source_word: כִּי אִם נֹס נָנוּס
  chosen: for if we flee
  alternatives:
  - for even if we surely flee
  - for if we should flee
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. In English, a simple 'if we flee' communicates the conditional sense adequately; the intensification is not naturally reproduced woodenly here.
- source_word: לֹא יָשִׂימוּ אֵלֵינוּ לֵב
  chosen: they will not pay attention to us
  alternatives:
  - they will not set their heart on us
  - they will not care about us
  - they will not take notice of us
  lexicon: HALOT
  rationale: 'The idiom literally means ''set heart toward us,'' here meaning to give attention or regard. ''Pay attention to us'' best fits the military context: the enemy''s focus is not on the troops if David is absent.'
- source_word: וְאִם יָמֻתוּ חֶצְיֵנוּ
  chosen: and if half of us die
  alternatives:
  - and if half of us are killed
  lexicon: HALOT
  rationale: The verb is simply 'die,' though in battle context 'are killed' is interpretive. 'Die' stays closer to the Hebrew while remaining clear.
- source_word: כִּי עַתָּה כָמֹנוּ עֲשָׂרָה אֲלָפִים
  chosen: But you are worth ten thousand of us
  alternatives:
  - for now you are like ten thousand of us
  - for now you count as ten thousand of us
  lexicon: HALOT
  rationale: The clause expresses David's comparative value to the army. 'Are worth ten thousand of us' conveys the sense idiomatically in English better than a wooden 'are like ten thousand of us.'
- source_word: וְעַתָּה טוֹב
  chosen: so now it is better
  alternatives:
  - and now it is good
  - therefore now it is better
  lexicon: HALOT
  rationale: טוֹב here introduces the preferable course of action, so 'it is better' is the natural English rendering.
- source_word: מֵעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: The preposition מן marks source/location. 'From the city' is straightforward and idiomatic.
- source_word: לְעָזִיר
  chosen: that you be ready to help us
  alternatives:
  - to help us
  - to come to our aid
  lexicon: HALOT
  rationale: The form is commonly understood as related to עזר, 'help/aid.' The broader clause likely means David should remain in the city as a reserve/support. 'Be ready to help us' makes the implied military support function explicit in readable English without overparaphrasing.
