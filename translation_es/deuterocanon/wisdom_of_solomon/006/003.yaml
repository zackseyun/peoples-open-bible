translation:
  language: es
  text: Porque la autoridad les fue dada por Yahvé[a], y la soberanía por el Altísimo, quien examinará sus obras e investigará sus planes[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de Yahvé'; el griego con παρά + genitivo marca la fuente de la autoridad.
    reason: lexical_alternative
  - marker: b
    text: '''Planes'' también puede verterse ''counselos'' o ''intenciones'', subrayando la deliberación interior además de las acciones externas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράτησις
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  - gobierno
  lexicon: LSJ
  rationale: En este contexto de gobernantes, κράτησις expresa la autoridad o el ejercicio del poder de gobierno. 'Autoridad' comunica bien ese matiz en español y evita sugerir fuerza física.
- source_word: δυναστεία
  english_pob_choice: sovereignty
  chosen_spanish: soberanía
  alternatives_spanish:
  - dominio
  - señorío
  - poder
  lexicon: LSJ
  rationale: Aquí designa poder real de gobierno, no una dinastía. 'Soberanía' mantiene la distinción con κράτησις y expresa con claridad la idea de autoridad suprema.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - por el Señor
  lexicon: BDAG
  rationale: La preposición παρά con genitivo marca origen. En español, 'por' en pasiva refleja bien la fuente de la concesión. Se usa 'Yahvé' conforme al criterio del proyecto para el nombre divino, en lugar de una máscara como 'SEÑOR'.
- source_word: παρὰ Ὑψίστου
  english_pob_choice: by the Most High
  chosen_spanish: por el Altísimo
  alternatives_spanish:
  - de parte del Altísimo
  - por el Supremo
  lexicon: LSJ
  rationale: Se conserva el título divino tradicional 'Altísimo', que corresponde de manera natural a Ὕψιστος y mantiene el registro elevado del texto.
- source_word: ἐξετάσει
  english_pob_choice: will examine
  chosen_spanish: examinará
  alternatives_spanish:
  - escrutará
  - investigará
  lexicon: BDAG
  rationale: El verbo indica examen cuidadoso y formal. 'Examinará' es claro y suficiente en español, y prepara la segunda acción más intensiva.
- source_word: διεραυνήσει
  english_pob_choice: investigate
  chosen_spanish: investigará
  alternatives_spanish:
  - escudriñará
  - sondeará
  - pesquisará
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de búsqueda minuciosa. 'Investigará' comunica esa pesquisa profunda sin sonar artificiosa.
- source_word: βουλάς
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - counsels
  - intenciones
  - deliberaciones
  lexicon: BDAG
  rationale: βουλαί se refiere a deliberaciones o propósitos internos. 'Planes' es natural en español y conserva la amplitud de sentido; 'intenciones' también sería posible, pero menos paralelo con 'obras'.
theological_decisions:
- issue: 'Títulos divinos en paralelo: κύριος y Ὕψιστος'
  english_pob_reading: Render as 'the Lord' and 'the Most High'
  chosen_spanish_reading: Renderizar como 'Yahvé' y 'el Altísimo'
  alternative_spanish_readings:
  - '''el Señor'' y ''el Altísimo'''
  - '''Yahvé'' y ''el Supremo'''
  rationale: El versículo atribuye la autoridad de los gobernantes a Dios mediante dos títulos en paralelo. Se sigue el criterio del proyecto de usar 'Yahvé' para κύριος cuando el referente es el nombre divino, y 'Altísimo' para Ὕψιστος, preservando la afirmación teológica de que el poder humano procede de Dios y le rinde cuentas.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate titles'
translation_notes:
  revision_awareness: La versión griega de alta confianza concuerda con el flujo de traducción adjudicado. No se registran revisiones sustantivas en el pasaje; se mantiene el paralelismo entre autoridad/soberanía y examinar/investigar, sin suavizar la fuerza del doble juicio sobre obras y planes.
  spanish_consistency_notes:
  - Se mantiene el paralelismo semántico entre 'autoridad' y 'soberanía' para distinguir los dos sustantivos griegos.
  - Se conserva el tratamiento directo de la fuente divina con 'por', reflejando παρά con genitivo.
  - Se usa 'Yahvé' según la terminología por defecto del proyecto para el nombre divino.
  - Se preserva la secuencia verbal 'examinará... investigará' para reflejar la diferencia aspectual entre ἐξετάσει y διεραυνήσει.
