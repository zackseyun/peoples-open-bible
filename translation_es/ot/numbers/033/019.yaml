translation:
  language: es
  text: Partieron de Ritmá[a] y acamparon en Rimón-Peres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se pusieron en marcha desde Ritmá y acamparon en Rimón-Peres».'
