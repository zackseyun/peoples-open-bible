translation:
  language: es
  text: 'Entonces el pueblo fue a Moisés y dijo: «Hemos pecado, porque hemos hablado contra Yahvé y contra ti. Ruega a Yahvé, para que quite de encima de nosotros la serpiente[a]». Y Moisés oró por el pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plaga de serpientes». El sustantivo hebreo está en singular y puede representar colectivamente la plaga de serpientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא הָעָם
  english_pob_choice: Then the people came
  chosen_spanish: Entonces el pueblo fue
  alternatives_spanish:
  - Y el pueblo fue
  - Entonces el pueblo vino
  lexicon: HALOT
  rationale: El hebreo presenta un avance narrativo con waw consecutivo; «Entonces» conserva la secuencia. «El pueblo» mantiene el sujeto colectivo. «Fue a Moisés» expresa naturalmente el movimiento hacia él sin forzar un calco de ‘came’ que en español podría sonar menos fluido.
- source_word: חָטָאנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos cometido pecado
  - Pecamos
  lexicon: HALOT
  rationale: La confesión usa el perfecto con relevancia presente; «Hemos pecado» reproduce bien el valor confesional y es idiomático en español.
- source_word: דִבַּרְנוּ בַיהוָה וָבָךְ
  english_pob_choice: we have spoken against the LORD and against you
  chosen_spanish: hemos hablado contra Yahvé y contra ti
  alternatives_spanish:
  - hemos hablado contra Yahvé y contra ti
  - hemos hablado en contra de Yahvé y de ti
  lexicon: HALOT
  rationale: 'Con דבר + ב, el sentido es hostil: «hablar contra». Se conserva el paralelismo con «contra ti». Se mantiene «Yahvé» como forma española del nombre divino, conforme al criterio del proyecto.'
- source_word: הִתְפַּלֵּל אֶל יְהוָה
  english_pob_choice: Pray to Yahweh
  chosen_spanish: Ruega a Yahvé
  alternatives_spanish:
  - Ora a Yahvé
  - Intercede ante Yahvé
  lexicon: HALOT
  rationale: El hitpael de פלל aquí expresa oración/intercesión. «Ruega» es claro, solemne y natural en español, y preserva el tono de petición dirigida a Dios.
- source_word: וְיָסֵר מֵעָלֵינוּ
  english_pob_choice: that he may take away from us
  chosen_spanish: para que quite de nosotros
  alternatives_spanish:
  - para que lo quite de nosotros
  - para que lo aleje de nosotros
  lexicon: HALOT
  rationale: El prefijo verbal expresa el contenido de la petición. «Quite de nosotros» comunica la remoción del mal de manera natural; «de nosotros» refleja el valor de מֵעָלֵינוּ sin necesidad de un calco literal 'de sobre nosotros'.
- source_word: אֶת הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - el serpiente
  - el ser serpiente
  lexicon: HALOT
  rationale: נָחָשׁ puede ser «serpiente» o «serpiente/serpiente» en sentido genérico. En español, «serpiente» es la opción más formal y transparente. Se conserva el singular del hebreo, que puede funcionar colectivamente.
- source_word: וַיִּתְפַּלֵּל מֹשֶׁה בְּעַד הָעָם
  english_pob_choice: So Moses prayed for the people
  chosen_spanish: Y Moisés oró por el pueblo
  alternatives_spanish:
  - Y Moisés intercedió por el pueblo
  - Así que Moisés oró en favor del pueblo
  lexicon: HALOT
  rationale: בְּעַד expresa intercesión en favor de alguien. «Oró por» es natural en español y conserva la idea de intercesión; «intercedió» sería más explícito pero menos frecuente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, la convención del proyecto es «Yahvé», no una sustitución por mayúsculas. Se mantiene de forma consistente en las dos ocurrencias del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope of the serpent reference
  english_pob_reading: The Hebrew noun is singular and may represent the snake plague collectively.
  chosen_spanish_reading: la serpiente
  alternative_spanish_readings:
  - las serpientes
  - la plaga de serpientes
  rationale: Se preserva el singular hebreo como en la tradición auditada en inglés, sin eliminar la posible referencia colectiva. El singular en español mantiene la misma tensión interpretativa.
  doctrine_reference: POB audit trail on lexical singular/collective tension
translation_notes:
  revision_awareness: El audio textual en inglés muestra una revisión reciente de ‘snake’ a ‘serpent’ por correspondencia más formal con הַנָּחָשׁ. La versión española sigue esa decisión con «serpiente» y conserva el singular para no borrar la posible fuerza colectiva del sustantivo hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en ambas apariciones del nombre divino para coherencia con la terminología del proyecto.
  - «Moisés» se conserva sin variación por tratarse del nombre propio estándar en español bíblico.
  - La cláusula de petición usa subjuntivo («para que quite») para reflejar la finalidad solicitada en el hebreo.
  - Se evita sustituir «orar/ruega» por vocabulario eclesiástico más cargado que no añade precisión semántica.
