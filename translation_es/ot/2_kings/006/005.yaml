translation:
  language: es
  text: 'Pero mientras uno derribaba una viga[a], el hierro cayó al agua, y él gritó y dijo: «¡Ay, mi amo! ¡Era prestado!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «el hierro cayó al agua». La expresión se refiere a la parte de hierro de la herramienta, es decir, a la cabeza del hacha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפִּיל
  english_pob_choice: was felling
  chosen_spanish: derribaba
  alternatives_spanish:
  - estaba derribando
  - cortaba
  - estaba cortando
  lexicon: HALOT
  rationale: El participio hifil de נפל se usa aquí idiomáticamente en el trabajo de cortar madera. «Derribaba» comunica bien la acción en curso y el contexto de tala sin sonar forzado en español.
- source_word: הַקּוֹרָה
  english_pob_choice: a beam
  chosen_spanish: una viga
  alternatives_spanish:
  - la viga
  - un madero
  - la madera
  lexicon: HALOT
  rationale: קוֹרָה designa una pieza de madera larga o viga. «Una viga» es natural y suficientemente preciso para el contexto de construcción o corte de madera.
- source_word: הַבַּרְזֶל
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - la pieza de hierro
  - la cabeza de hierro
  - el hierro del hacha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el hierro». Se conserva esa forma, porque el contexto permite entender que se trata de la parte de hierro de la herramienta, sin añadir explícitamente «hacha» en el texto principal.
- source_word: וַיִּצְעַק
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  - dio un grito
  lexicon: HALOT
  rationale: Verbo de exclamación repentina y angustiada; «gritó» es directo y natural en español.
- source_word: אֲהָהּ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Ah!
  - ¡Oh no!
  lexicon: HALOT
  rationale: Interjección de dolor o desazón. «¡Ay!» conserva mejor el tono de lamento que una expresión más coloquial.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi maestro
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: En el contexto, Elíseo es tratado como superior/respetado. «Mi señor» es la forma más natural y reverente en español contemporáneo; «mi maestro» explicita la relación pero suena menos directo aquí.
- source_word: שָׁאוּל
  english_pob_choice: borrowed
  chosen_spanish: prestado
  alternatives_spanish:
  - tomado en préstamo
  - pedido prestado
  - lo había pedido prestado
  lexicon: HALOT
  rationale: El participio pasivo comunica que el objeto no era suyo. «Era prestado» expresa de forma breve y fiel la preocupación del hablante por la pérdida de algo ajeno.
theological_decisions:
- issue: Tratamiento de הַבַּרְזֶל como referencia metonímica a la parte de hierro de la herramienta, sin especificar en exceso en el texto principal.
  english_pob_reading: The iron fell into the water, with a footnote explaining that the phrase refers to the iron part of the tool, that is, the axe head.
  chosen_spanish_reading: El hierro cayó al agua, con una nota que aclara que se trata de la parte de hierro de la herramienta.
  alternative_spanish_readings:
  - el hacha cayó al agua
  - la cabeza del hacha cayó al agua
  - el hierro del hacha cayó al agua
  rationale: El hebreo dice literalmente «el hierro». Mantener esa literalidad preserva la tensión lexical y evita resolver en el texto principal una identificación que el original no formula explícitamente. La aclaración puede ir en nota, como en el audit trail inglés.
  doctrine_reference: Fidelidad lexical y principio de transparencia textual
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir «the iron» en lugar de expandir a «iron axe head» en el texto principal. La traducción española conserva esa decisión de literalidad y desplaza la aclaración al pie de página.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - «Mi señor» se usa como vocativo reverente y no como título divino.
  - Se preservó la distinción entre el término literal «hierro» y la aclaración interpretativa en nota.
  - El tono es sobrio y narrativo, adecuado para una versión pública y auditable.
