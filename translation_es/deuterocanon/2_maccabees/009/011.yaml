translation:
  language: es
  text: Entonces su gran arrogancia comenzó a llegar a su fin[a], quebrantado, y comenzó a llegar a comprender[b] bajo un azote divino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su gran arrogancia comenzó a cesar, estando ya quebrantada». La expresión griega τὸ πολὺ τῆς ὑπερηφανίας es algo idiomática y también puede explicitar la magnitud: «la gran extensión de su arrogancia».'
    reason: lexical_alternative
  - marker: b
    text: O «a llegar al reconocimiento» o «a llegar al conocimiento pleno». El griego no exige por sí mismo el sentido más fuerte de arrepentimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνταῦθα οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así pues
  - De modo que
  lexicon: LSJ
  rationale: Marca un giro narrativo e inferencial. «Entonces» conserva la secuencia temporal y la fuerza conclusiva de οὖν en español natural.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: Conserva el valor incoativo del verbo y encaja de forma natural con los infinitivos siguientes.
- source_word: τὸ πολὺ τῆς ὑπερηφανίας
  english_pob_choice: the great extent of his arrogance
  chosen_spanish: la gran extensión de su arrogancia
  alternatives_spanish:
  - la mayor parte de su arrogancia
  - su gran arrogancia
  lexicon: LSJ
  rationale: La expresión es idiomática y señala magnitud o alcance; «gran extensión» mantiene esa amplitud sin reducirla a un sustantivo abstracto simple. Se eligió «arrogancia» en vez de «orgullo» por el matiz de insolencia ante Dios.
- source_word: λήγειν
  english_pob_choice: to come to an end
  chosen_spanish: llegar a su fin
  alternatives_spanish:
  - cesar
  - terminar
  lexicon: LSJ
  rationale: Expresa bien el sentido de cese gradual o declive del movimiento iniciado por ἤρξατο, con español idiomático.
- source_word: τεθραυσμένος
  english_pob_choice: shattered
  chosen_spanish: quebrantado
  alternatives_spanish:
  - quebrado
  - destrozado
  lexicon: LSJ
  rationale: El participio perfecto pasivo describe un estado resultante de haber sido roto o aplastado. «Quebrantado» conserva la idea de ruina física y humillación sin sonar excesivamente literal.
- source_word: εἰς ἐπίγνωσιν ἔρχεσθαι
  english_pob_choice: to come to recognition
  chosen_spanish: a llegar al reconocimiento
  alternatives_spanish:
  - a llegar al entendimiento
  - a llegar al conocimiento pleno
  lexicon: BDAG
  rationale: ἐπίγνωσις puede ser reconocimiento, comprensión o conocimiento pleno. «Reconocimiento» mantiene la cautela del texto y evita introducir arrepentimiento explícito que el griego no dice.
- source_word: θείᾳ μάστιγι
  english_pob_choice: under a divine scourge
  chosen_spanish: bajo un azote divino
  alternatives_spanish:
  - bajo un castigo divino
  - por un azote divino
  lexicon: LSJ
  rationale: μάστιξ puede ser azote literal o castigo/punición figurada. «Azote divino» preserva la metáfora judicial del texto sin precisar indebidamente la forma del sufrimiento.
theological_decisions:
- issue: Si el versículo implica arrepentimiento genuino o solo reconocimiento forzado bajo juicio
  english_pob_reading: The wording is kept at the level of recognition/acknowledgment rather than repentance.
  chosen_spanish_reading: El versículo queda en el nivel de reconocimiento/constatación, no de arrepentimiento explícito.
  alternative_spanish_readings:
  - llegar al arrepentimiento
  - llegar al pleno conocimiento espiritual
  rationale: εἰς ἐπίγνωσιν ἔρχεσθαι apunta a reconocimiento o conocimiento; no exige por sí mismo arrepentimiento. La traducción preserva esa tensión teológica en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: Se revisó el pasaje con el texto griego de Swete (1909) y el audit trail inglés. No se detectaron revisiones aplicadas en el historial; la redacción española sigue la misma lectura conservadora de reconocimiento bajo juicio, manteniendo la ambigüedad teológica documentada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino en forma explícita.
  - Se eligió «arrogancia» para ὑπερηφανία por su carga de insolencia soberbia; no se usó «orgullo» para no suavizar el matiz.
  - «Azote divino» conserva la imagen de μάστιξ sin convertirla directamente en «castigo», aunque esa sea una paráfrasis posible.
  - Se evitó traducir εἰς ἐπίγνωσιν como «arrepentimiento» para no exceder el alcance del griego y del audit trail inglés.
