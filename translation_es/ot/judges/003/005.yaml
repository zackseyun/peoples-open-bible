translation:
  language: es
  text: Y los hijos de Israel[a] vivían entre los cananeos, los hititas, los amorreos, los ferezeos, los heveos y los jebuseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Israel» refleja más de cerca el hebreo וּבְנֵי יִשְׂרָאֵל; «israelitas» sería una alternativa española más idiomática, pero menos literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: And the sons of Israel
  chosen_spanish: Y los hijos de Israel
  alternatives_spanish:
  - Y los israelitas
  - Y los hijos de Israel
  lexicon: HALOT
  rationale: בְּנֵי es literalmente «hijos de». En español, «hijos de Israel» conserva con fidelidad la forma familiar masculina plural del hebreo; «israelitas» sería más idiomático pero menos transparente respecto de la estructura léxica.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: El verbo ישׁב puede significar habitar, vivir o permanecer. En este contexto de residencia continuada entre otros pueblos, «habitaron» expresa bien la idea sin reducirla a un matiz de asentamiento inicial.
- source_word: בְּקֶרֶב
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: La expresión ישׁב בקרב comunica vivir «entre» o «en medio de» otros grupos. «En medio de» preserva la relación espacial y social del hebreo con buena naturalidad en español.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, en español la lista de pueblos se expresa naturalmente en plural. «Cananeos» mantiene el valor colectivo del etnónimo.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - el hitita
  lexicon: HALOT
  rationale: Se traduce como plural colectivo por naturalidad en una enumeración de pueblos.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Se conserva el valor colectivo del etnónimo en plural, como en la lista hebrea.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los ferezeos
  alternatives_spanish:
  - los perizitas
  - el ferezeo
  lexicon: HALOT
  rationale: «Ferezeos» es la forma tradicional y transparente en español bíblico para este pueblo, más reconocible que un calco menos asentado.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los heveos
  alternatives_spanish:
  - los hivitas
  - el heveo
  lexicon: HALOT
  rationale: «Heveos» es la forma española tradicional y bibliográfica para este etnónimo; mantiene inteligibilidad y continuidad terminológica.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - los jebuseítas
  - el jebuseo
  lexicon: HALOT
  rationale: «Jebuseos» es la forma establecida en español bíblico para este grupo, adecuada en una lista de pueblos.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo quedó en alto acuerdo; por eso no se reflejan variantes textuales ni ajustes de última hora. La frase hebrea y la lista de etnónimos se conservan de manera directa y estable.
  spanish_consistency_notes:
  - Se mantuvo el plural colectivo para los pueblos enumerados, como en la práctica habitual del español bíblico y en la lógica colectiva del hebreo.
  - No se introdujo terminología eclesiástica no sustentada por el texto; el verso es puramente descriptivo.
  - Se preservó «hijos de Israel» como opción más transparente frente a «israelitas», coherente con la preferencia auditada por la precisión formal.
