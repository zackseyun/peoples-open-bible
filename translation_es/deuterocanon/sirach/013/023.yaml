translation:
  language: es
  text: Cuando habla un rico[a], todos callan, y exaltan su entendimiento hasta las nubes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y elevaron su palabra hasta las nubes». El hebreo, seguido aquí como testigo principal, lee «su entendimiento».'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר / πλούσιος
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - el rico
  lexicon: HALOT; LXX πλούσιος
  rationale: El hebreo y el griego presentan un sujeto proverbial singular y genérico. «Un rico» conserva esa generalidad en español y evita volverlo un individuo concreto; «hombre» es posible, pero no está exigido por el texto.
- source_word: דּוֹבֵר / ἐλάλησεν
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - habla
  - está hablando
  - pronuncia palabras
  lexicon: HALOT; LXX λαλέω
  rationale: El presente gnómico en español transmite mejor el valor proverbial que un pasado narrativo. «Habla» es natural y suficiente para el enunciado sapiencial.
- source_word: הַכֹּל / πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos
  - todo el mundo
  - la compañía entera
  lexicon: HALOT; LXX πάντες
  rationale: «Todos» reproduce bien el sujeto colectivo y mantiene el paralelismo breve del dicho sapiencial.
- source_word: נִסְכָּתוּ / ἐσίγησαν
  english_pob_choice: falls silent
  chosen_spanish: callan
  alternatives_spanish:
  - guardan silencio
  - se quedan callados
  - enmudecen
  lexicon: HALOT; LXX σιγάω
  rationale: La idea central confirmada por el paralelo griego es el silencio reverente o sumiso. «Callan» es conciso, natural y no añade matiz no sustentado.
- source_word: שִׂכְלוֹ / λόγον αὐτοῦ
  english_pob_choice: his understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su entendimiento
  - su razón
  - su saber
  lexicon: HALOT; LXX λόγος / heb. שׂכל
  rationale: Se sigue el hebreo como testigo principal de la lección «entendimiento», aunque el griego habla de «palabra». «Entendimiento» conserva la tensión textual documentada por la nota inglesa y evita homogeneizar ambas tradiciones.
- source_word: עַד עָב / ἕως τῶν νεφελῶν
  english_pob_choice: to the clouds
  chosen_spanish: hasta las nubes
  alternatives_spanish:
  - hasta las nubes
  - a las nubes
  - tan alto como las nubes
  lexicon: HALOT; LXX νεφέλη
  rationale: La imagen de elevación/exaltación se expresa de modo idiomático en español con «hasta las nubes», que conserva el valor hiperbólico y el paralelo griego.
- source_word: יַגִּיעוּ / ἀνήγαγον
  english_pob_choice: they exalt
  chosen_spanish: exaltan
  alternatives_spanish:
  - exaltan
  - elevan
  - levantan
  lexicon: HALOT; LXX ἀνάγω
  rationale: El verbo expresa ensalzamiento retórico, no solo movimiento físico. «Exaltan» refleja bien la intención de exagerada alabanza y corresponde al giro proverbial del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «exalt his understanding» frente a «lift up his sense», manteniendo en español la lectura hebrea principal «su entendimiento» y conservando la imagen hiperbólica «hasta las nubes». La nota registra la variante griega documentada por la POB.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento proverbial en presente gnómico, aunque el griego use aoristos, para reflejar mejor la forma sapiencial en español.
  - Se evitó «SEÑOR» o terminología eclesiástica ajena al pasaje; no aplica aquí ningún nombre divino.
  - «Entendimiento» se eligió para preservar la tensión entre el hebreo y el griego sin borrar la variante textual.
