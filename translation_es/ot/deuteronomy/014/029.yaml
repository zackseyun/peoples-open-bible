    text: O 'el forastero'. El término hebreo designa a una persona no israelita que vive entre Israel.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'dentro de tus puertas', un hebraísmo para los que viven dentro de tus ciudades o comunidad local.
    reason: cultural_note
  revision_rationale: 'Se corrigió la representación de הַגֵּר a ''residente extranjero'' para reflejar mejor el sentido de no israelita asentado entre Israel. También se separaron y reanclaron correctamente las notas: una para la alternativa léxica de גֵּר y otra para el hebraísmo ''dentro de tus puertas''. No se requieren cambios doctrinales ni sintácticos mayores.'
