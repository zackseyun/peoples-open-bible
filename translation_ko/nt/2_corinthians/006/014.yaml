id: 2CO.6.14
reference: 2 Corinthians 6:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μὴ γίνεσθε ἑτεροζυγοῦντες ἀπίστοις· τίς γὰρ μετοχὴ δικαιοσύνῃ καὶ ἀνομίᾳ, ⸂ἢ τίς⸃ κοινωνία φωτὶ πρὸς σκότος;
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/006/014.yaml
  text: Do not become unequally yoked with unbelievers. For what partnership has righteousness with lawlessness? Or what fellowship has light with darkness?
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνῃ).
    reason: lexical_alternative
  - marker: b
    text: The expression 'unequally yoked' evokes the image of mismatched animals under one yoke; compare Deuteronomy 22:10.
    reason: cross_reference
translation:
  language: ko
  text: 여러분은 믿지 않는 자들과 짝지어 함께 멍에를 메지 마십시오. 의가 불법과 어떤 동참이 있겠습니까? 빛이 어둠과 어떤 사귐이 있겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἑτεροζυγοῦντες
  english_pob_choice: unequally yoked
  chosen_korean: 짝지어 함께 멍에를 메다
  alternatives_korean:
  - 이질적으로 멍에를 메다
  lexicon: BDAG
  rationale: 신 22:10의 인유 (서로 다른 짐승을 한 멍에에 매는 금지). 한국어 정립 「멍에를 메다」.
- source_word: μετοχὴ / κοινωνία
  english_pob_choice: partnership / fellowship
  chosen_korean: 동참 / 사귐
  alternatives_korean: []
  lexicon: BDAG
  rationale: 본 절은 두 명사가 평행 대구로 사용. 「동참」/「사귐」으로 어휘 차이 보존.
- source_word: φωτὶ / σκότος
  english_pob_choice: light / darkness
  chosen_korean: 빛 / 어둠
  alternatives_korean: []
  lexicon: BDAG
  rationale: 4:6과 일관.
theological_decisions:
- issue: 6:14-7:1 단락의 OT 카테나 — LXX의 κύριος를 야훼로 옮길 것인가
  chosen_reading: 6:14-7:1의 LXX 인용 어구에 등장하는 κύριος는 모두 「주」로 옮기되 footnote에서 야훼 가능성을 명시한다
  alternative_readings:
  - κύριος = 야훼로 직접 옮긴다 (6:17, 6:18)
  - κύριος = 주로 옮기되 LXX의 일관성을 따른다
  rationale: 6:16-18은 레 26:12 (또는 겔 37:27), 사 52:11, 겔 20:34, 삼하 7:14의 OT 본문들을 짜깁기한 카테나이다. 원 히브리어 본문에서 야훼(יהוה)였던 부분이 LXX에서 κύριος로 번역되었고, 바울은 LXX 형태로 인용한다. DOCTRINE.md는 NT의 κύριος가 OT의 야훼를 명백히 인유할 때 「야훼」로 옮기도록 한다. 그러나 (1) 바울이 LXX 형태(κύριος)를 의식적으로 채택했다는 점, (2) 본 단락의 어조가 신구약 통합적 호소라는 점, (3) 신학적 결정의 일관성을 위해 본 단락에서는 「주」로 옮기되 footnote에서 야훼 인유를 명시한다. 일부 절(6:17의 「주께서 말씀하시기를」)은 「야훼께서 말씀하시기를」로 옮길 수도 있으나, 본 번역에서는 절제된 「주」를 선택한다. — 추후 revision pass에서 재고할 여지를 둔다.
  doctrine_reference: DOCTRINE.md OT citations; LXX κύριος when quoting YHWH — preserved as 주 with explanatory footnote
