revisions:
- from: Envió a Judá delante de él, a José[a], para que le indicara el camino[b] antes de él hacia Gosén[c]; y llegaron a la tierra de Gosén.
  to: Envió a Judá delante de él, a José, para mostrar el camino[a] delante de él, a Gosén[b]; y llegaron a la tierra de Gosén.
  rationale: Se revisa la cláusula de propósito para hacerla fiel y natural en español, siguiendo más de cerca la decisión final del POB inglés («to show the way») sin resolver indebidamente la compresión del hebreo. Se elimina una nota innecesaria sobre «a José» y se simplifican las notas a alternativas léxicas reales.
