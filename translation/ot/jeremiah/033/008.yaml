id: JER.33.8
reference: Jeremiah 33:8
source:
  edition: WLC
  text: וְ/טִ֣הַרְתִּ֔י/ם מִ/כָּל עֲוֺנָ֖/ם אֲשֶׁ֣ר חָֽטְאוּ לִ֑/י וְ/סָלַחְתִּ֗י ל/כול עֲוֺנֽוֹתֵי/הֶם֙ אֲשֶׁ֣ר חָֽטְאוּ לִ֔/י וַ/אֲשֶׁ֖ר פָּ֥שְׁעוּ בִֽ/י־־־־׃
translation:
  text: And I will cleanse them from all their guilt by which they have sinned against me[b][a], and I will forgive all their guilty deeds by which they have sinned against me and by which they have rebelled against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all their iniquity.' The Hebrew עָוֹן can denote both wrongdoing and the guilt that comes from it.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their iniquities.' The Hebrew again uses עָוֹן, here in the plural, emphasizing their many culpable offenses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִהַרְתִּים
  chosen: And I will cleanse them
  alternatives:
  - And I will purify them
  - And I will make them clean
  lexicon: HALOT
  rationale: The piel of טהר commonly carries the sense of cleansing/purifying. 'Cleanse' is natural modern English and fits both moral and covenantal restoration without sounding overly ritualistic, while still preserving the active divine action.
- source_word: מִכָּל עֲוֺנָם
  chosen: from all their guilt
  alternatives:
  - from all their iniquity
  - from all their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote both guilt and iniquity, including the culpability attached to sin. Here, after 'cleanse,' 'guilt' brings out the defiling and culpable aspect well. 'Iniquity' is traditional but less accessible in modern English.
- source_word: אֲשֶׁר חָטְאוּ לִי
  chosen: by which they have sinned against me
  alternatives:
  - which they committed against me
  - wherein they sinned against me
  lexicon: HALOT
  rationale: חטא with ל marks sin directed against God. 'Sinned against me' is the plain sense. Rendering אֲשֶׁר with 'by which' links the guilt/deeds to the acts that incurred it.
- source_word: וְסָלַחְתִּי
  chosen: and I will forgive
  alternatives:
  - and I will pardon
  lexicon: HALOT
  rationale: סלח is the standard verb for divine forgiveness. 'Forgive' is the clearest and most idiomatic English equivalent.
- source_word: לְכָל עֲוֺנוֹתֵיהֶם
  chosen: all their guilty deeds
  alternatives:
  - all their iniquities
  - all their sins
  lexicon: HALOT
  rationale: The plural of עָוֹן here points to their many culpable acts/offenses. To avoid flattening the distinction with חטא and פשע in the same verse, 'guilty deeds' preserves the concrete plural sense while retaining culpability.
- source_word: וַאֲשֶׁר פָּשְׁעוּ בִי
  chosen: and by which they have rebelled against me
  alternatives:
  - and in which they transgressed against me
  - and by which they have broken faith with me
  lexicon: HALOT
  rationale: פשע often denotes rebellion or revolt, especially against rightful authority. 'Rebelled against me' best preserves the relational and covenantal force of the verb in accessible English.
