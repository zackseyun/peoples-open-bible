  spanish_consistency_notes:
  - Se mantiene el estilo de registro genealógico/listado, breve y sobrio.
  - Se usa «Hasum» como transliteración naturalizada en español, coherente con la práctica de nombres propios en la serie.
  - Se expresa el número con palabras, como en el inglés POB, en vez de convertirlo a cifras.
