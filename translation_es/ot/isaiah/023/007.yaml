review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: pregunta retórica sobre Tiro, su antigüedad y su expansión lejana. Sin embargo, hay dos desajustes relevantes: (1) לָכֶם es 2mp y no debe reducirse a singular ''tu''; (2) la nota alternativa no refleja la alternativa inglesa preservada, porque repite la misma elección ''antigüedad'' en lugar de conservar la variante ''origen/antigüedad'' y además omite mejor la matización de גור.'
  spanish_quality_summary: El español es claro y digno, pero 'tu ciudad' introduce un cambio innecesario de número y registro. 'Habitar como extranjera' comunica bien la idea de גור, aunque 'residir como forastera' suena algo más natural y preciso en español bíblico moderno. El resto fluye bien.
  glossary_alignment: No hay conflictos con la terminología teológica global del proyecto. Las decisiones léxicas clave están mayormente alineadas, pero conviene ajustar la representación de לָכֶם a plural y hacer que la nota léxica preserve la alternativa documentada entre 'origen' y 'antigüedad'.
  issues:
  - severity: medium
    issue: '''tu ciudad'' reduce לָכֶם (2mp) a singular'
    rationale: El hebreo se dirige a un auditorio plural. Aunque el inglés use 'your' sin marcar número, en español sí conviene preservar el plural con 'su ciudad' o 'la ciudad de ustedes' para no perder información gramatical.
  - severity: medium
    issue: La nota [a] no conserva la alternativa auditada entre 'origen' y 'antigüedad'
    rationale: El texto principal usa 'antigüedad', pero la nota debería preservar la otra posibilidad documentada por el POB inglés, idealmente 'cuyo origen es desde días de antaño', no repetir prácticamente la misma formulación.
  - severity: low
    issue: '''habitar como extranjera'' es correcto pero algo menos natural que ''residir como forastera'''
    rationale: Para גור, 'residir como forastera' expresa mejor la idea de estancia como extranjera/forastera sin sonar técnico ni forzado.
  revised_spanish_text: ¿Es esta para ustedes su ciudad exultante[a], cuya antigüedad es desde días de antaño, cuyos pies la llevaron lejos para residir como forastera?
