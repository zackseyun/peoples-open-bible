base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/009.yaml
  text: 'Thus says Yahweh: In this way I will ruin the pride of Judah and the great pride of Jerusalem[a][b].'
  footnotes:
  - marker: a
    text: Or 'I will destroy' or 'I will mar.' The Hebrew verb can denote ruining, spoiling, or destroying; 'ruin' best fits the immediate imagery of the spoiled waistband in this chapter.
    reason: lexical_alternative
  - marker: b
    text: '''Pride'' may also be understood as ''arrogance'' or, less likely here, ''majesty.'''
    reason: lexical_alternative
