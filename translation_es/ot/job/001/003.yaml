translation:
  language: es
  text: Sus posesiones ganaderas eran siete mil ovejas[a], tres mil camellos, quinientas yuntas de bueyes, quinientas asnas y una servidumbre muy numerosa; y aquel hombre era más importante que todos los hijos de oriente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Ovejas’ sigue la enumeración de animales; el hebreo צֹאן puede abarcar también ganado menor en general.
    reason: lexical_alternative
  - marker: b
    text: O también ‘la gente de oriente’ o ‘los orientales’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: Tenía...
  alternatives_spanish:
  - Poseía...
  - Tenía su ganado...
  lexicon: HALOT
  rationale: En español, el verbo posesivo/tenencial introduce de manera natural el inventario de bienes sin forzar un sustantivo abstracto. Aquí el contexto enumera animales y bienes ganaderos, así que el sentido de propiedad está suficientemente expresado por el verbo y la lista posterior.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaño
  lexicon: HALOT
  rationale: En este inventario numérico, 'ovejas' es la equivalencia más natural y clara en español. Aunque el hebreo puede abarcar más que ovejas, la lista concreta favorece un animal específico más que un término colectivo.
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: HALOT
  rationale: Equivalente léxico directo y ampliamente inteligible en español bíblico contemporáneo.
- source_word: צֶמֶד בָּקָר
  english_pob_choice: yoke of oxen
  chosen_spanish: yuntas de bueyes
  alternatives_spanish:
  - pares de bueyes
  - yuntas de ganado
  lexicon: HALOT
  rationale: צֶמֶד indica una pareja unida para labor; en español 'yunta' transmite bien el par de animales de tiro. 'Bueyes' conserva el valor agrícola de בָּקָר en este contexto de trabajo, y es más natural que 'cattle' o 'ganado' en una lista de unidades contables.
- source_word: אֲתוֹנ֔וֹת
  english_pob_choice: female donkeys
  chosen_spanish: asnas
  alternatives_spanish:
  - asnas hembras
  - burras
  lexicon: HALOT
  rationale: El hebreo marca explícitamente el sexo femenino; 'asnas' es la forma breve y transparente en español. Evita perder el rasgo semántico que la POB inglesa preservó con 'female donkeys'.
- source_word: וַ/עֲבֻדָּ֖ה רַבָּ֣ה מְאֹ֑ד
  english_pob_choice: a very large household
  chosen_spanish: una casa muy grande
  alternatives_spanish:
  - un gran establecimiento doméstico
  - una casa/servicio muy extenso
  - un muy numeroso personal
  lexicon: HALOT
  rationale: La POB inglesa entiende עֲבֻדָּה aquí como el conjunto doméstico/establishment del patriarca, no solo como 'siervos' de forma directa. 'Casa' en español puede abarcar la unidad doméstica y patrimonial; la nota aclara que no se trata meramente del edificio, sino del amplio conjunto de dependientes/administración de la casa.
- source_word: גָּדוֹל
  english_pob_choice: greater
  chosen_spanish: era más grande
  alternatives_spanish:
  - era mayor
  - era más prominente
  lexicon: HALOT
  rationale: El comparativo hebreo con מִכָּל requiere una comparación explícita. 'Más grande' reproduce la imagen de superioridad en magnitud/status y sigue de cerca la elección inglesa 'greater'.
- source_word: בְּנֵי קֶדֶם
  english_pob_choice: the sons of the east
  chosen_spanish: los hijos de oriente
  alternatives_spanish:
  - la gente de oriente
  - los orientales
  lexicon: HALOT
  rationale: 'Se conserva el idiomatismo hebreo con ''hijos de oriente'', equivalente natural y comprensible en español. Mantiene la forma representativa masculina plural del original; la posible referencia colectiva queda implícita en el idiomático ''hijos de''. '
theological_decisions:
- issue: El alcance de עֲבֻדָּה רַבָּה מְאֹד
  english_pob_reading: a very large household
  chosen_spanish_reading: una casa muy grande
  alternative_spanish_readings:
  - muchos siervos
  - un gran número de servidores
  - un hogar muy grande
  rationale: La POB evita reducir el término a 'siervos' exclusivamente y lo entiende como una realidad doméstico-patrimonial amplia. En español, 'casa' puede conservar esa amplitud semántica de unidad familiar, económica y servicial; la formulación mantiene la tensión entre hogar y establecimiento sin convertirla en una mera lista de empleados.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (source-shaped semantics)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió 'a great many servants' por 'a very large household' para reflejar mejor עֲבֻדָּה רַבָּה מְאֹד como un establecimiento doméstico amplio. La versión española sigue esa lectura revisada y evita estrecharla a 'siervos' únicamente. También se conservó la alternativa idiomática sobre בני קדם como expresión colectiva de origen oriental, sin neutralizarla.
  spanish_consistency_notes:
  - Se mantuvo 'hijos de oriente' para reflejar el idiomático hebreo בני קדם de manera consistente con una traducción que preserva la forma del original.
  - Se usó 'asnas' para conservar el rasgo femenino del hebreo.
  - La elección de 'casa' para עֲבֻדָּה requiere la nota explicativa para evitar que el lector lo entienda solo como el edificio y no como el conjunto doméstico.
