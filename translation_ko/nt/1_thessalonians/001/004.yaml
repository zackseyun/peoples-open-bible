id: 1TH.1.4
reference: 1 Thessalonians 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰδότες, ἀδελφοὶ ἠγαπημένοι ὑπὸ ⸀θεοῦ, τὴν ἐκλογὴν ὑμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/004.yaml
  text: For we know[a], brothers loved by God, your election[b],
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' but in Paul's letters this often addresses the whole believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'your being chosen.' The Greek noun is 'election,' a term that should not be narrowed here to a particular theological system beyond what the text itself states.
    reason: alternative_reading
translation:
  language: ko
  text: 하나님께 사랑받는 형제[a] 여러분, 우리는 여러분의 택하심[b]을 알고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수형이지만 바울 서신에서는 흔히 신앙 공동체 전체를 가리킨다. 직역의 「형제」를 본문에 두되, 자매를 포함하는 호칭의 포괄성을 본 각주에 명시한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「택하여 주심」. 헬라어 ἐκλογή는 「선택·택하심」을 가리키며, 본문이 말하는 것 이상의 신학 체계를 본문에 끼워 넣지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: For we know
  chosen_korean: 알고 있습니다
  alternatives_korean:
  - 알기에
  - 우리는 알고 있으므로
  lexicon: BDAG
  rationale: 분사형이나 3절을 이어 받아 종결 동사로 풀어내는 편이 한국어 어순상 자연스럽다. 합쇼체 종결로 마무리한다.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  - 형제들
  lexicon: BDAG
  rationale: DOCTRINE.md의 성별 정확성 원칙에 따라 남성 복수형을 본문에 그대로 보존한다. 포괄적 함의는 각주로 살린다.
- source_word: ἠγαπημένοι ὑπὸ θεοῦ
  english_pob_choice: loved by God
  chosen_korean: 하나님께 사랑받는
  alternatives_korean:
  - 하나님의 사랑을 입은
  - 하나님께서 사랑하시는
  lexicon: BDAG
  rationale: 완료 수동 분사. 하나님의 사랑이 정착된 상태임을 「~받는」으로 보존하면서도 한국어 관형구문으로 자연스럽게 옮긴다.
- source_word: ἐκλογὴν
  english_pob_choice: election
  chosen_korean: 택하심
  alternatives_korean:
  - 선택
  - 뽑힘
  - 택정
  lexicon: BDAG
  rationale: 한국 교회 전통의 「택하심」이 하나님의 능동적 선택 행위를 자연스럽게 담는다. 「선택」은 일상어로 무게가 약하고, 「택정」은 후대 신학 어휘에 가깝다. 본문 어휘의 신학적 무게를 보존하되 특정 체계로 좁히지 않는다.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_korean: 여러분의
  alternatives_korean:
  - 여러분들의
  lexicon: BDAG
  rationale: 2인칭 복수 속격을 한국어 합쇼체 호칭 「여러분」으로 일관되게 옮긴다.
theological_decisions:
- issue: ἐκλογή의 번역에서 신학 체계화의 회피
  chosen_reading: 택하심
  alternative_readings:
  - 택하여 주심
  - 하나님의 선택
  rationale: 본문은 데살로니가 신자들이 하나님께 택함을 받은 사실을 분명히 진술하지만, 칼뱅주의/아르미니우스주의 논쟁의 어느 입장도 본문 이상으로 들여오지 않는다. 명사형 「택하심」을 보존해 본문의 신학적 긴장을 그대로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: ἀδελφοί를 본문에서 포괄적으로 옮길지 여부
  chosen_reading: 형제
  alternative_readings:
  - 형제자매
  rationale: 성별 정확성 원칙에 따라 남성 복수형을 본문에 보존한다. 호칭의 포괄성은 각주로 살려 본문 어형과 사역적 함의를 모두 보존한다.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
