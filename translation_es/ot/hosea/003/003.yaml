    rationale: 'El contenido de la nota dice «O: “a ella”», pero el anclaje actual está después de «le dije[a]». La variante o aclaración corresponde al complemento «a ella», no al verbo «dije». Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante.'
