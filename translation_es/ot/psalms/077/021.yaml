translation:
  language: es
  text: Tú condujiste a tu pueblo como un rebaño[a], por la mano de Moisés y Aarón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como ovejas'. El hebreo צאן es un término colectivo para un rebaño, especialmente de ovejas o cabras.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'por la mano de Moisés y Aarón', un modismo que significa por medio de ellos o bajo su liderazgo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחִיתָ
  english_pob_choice: You led
  chosen_spanish: guiaste
  alternatives_spanish:
  - condujiste
  - llevaste
  lexicon: HALOT
  rationale: El verbo hebreo expresa dirigir o conducir en contexto de liderazgo pastoral. En español, "guiaste" conserva bien la idea de conducción activa y suena natural junto con la imagen del rebaño.
- source_word: כַצֹּאן
  english_pob_choice: like a flock
  chosen_spanish: como a un rebaño
  alternatives_spanish:
  - como ovejas
  - como un rebaño de ovejas
  lexicon: HALOT
  rationale: צאן es un sustantivo colectivo para ganado menor, especialmente ovejas y cabras. "Rebaño" preserva el carácter colectivo mejor que "ovejas" y mantiene la imagen pastoral del texto.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: El hebreo עם en este contexto tiene sentido pactual/nacional. "Tu pueblo" es la forma más natural y fiel en español.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por la mano de
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala agencia o mediación. "Por la mano de" conserva ese giro semítico sin volver opaco el sentido en español.
- source_word: מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  lexicon: conventional transliteration
  rationale: Los nombres propios se mantienen con las transliteraciones españolas estándar y reconocibles.
theological_decisions:
- issue: Agencia divina y mediación humana
  english_pob_reading: God is the primary actor who led the people, and Moses and Aaron are the human agents through whom he did so.
  chosen_spanish_reading: Dios es el actor principal que guio a su pueblo, y Moisés y Aarón son los agentes humanos por medio de los cuales lo hizo.
  alternative_spanish_readings:
  - Dios solo aparece como referencia histórica mientras Moisés y Aarón son los protagonistas
  - Moisés y Aarón son meramente acompañantes del pueblo
  rationale: 'El verso se dirige a Dios en segunda persona y luego añade un complemento instrumental que indica mediación. La traducción conserva ambas cosas: la iniciativa divina y la agencia humana, sin diluir ninguna.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue de cerca el texto fuente hebreo y el audit trail inglés, sin introducir ajustes no sustentados.
  spanish_consistency_notes:
  - Se mantiene "tu pueblo" de forma consistente para עַמֶּךָ.
  - Se conserva la imagen pastoral con "rebaño" para el valor colectivo de צאן.
  - La locución "por la mano de" preserva la idiomaticidad hebrea documentada en el audit trail.
