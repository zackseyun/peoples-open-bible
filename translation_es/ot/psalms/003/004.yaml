base_translation:
  language: en
  yaml_path: translation/ot/psalms/003/004.yaml
  text: But you[a], O Yahweh, are a shield around me, my glory[b], and the one who lifts up my head.
  footnotes:
  - marker: a
    text: Or 'a shield for me' or 'a shield on my behalf'; the Hebrew preposition can express protection in favor of someone, though here it likely carries the sense of protective encirclement.
    reason: lexical_alternative
  - marker: b
    text: '''Lifts up my head'' is a Hebrew idiom for restoring dignity, confidence, or vindication.'
    reason: cultural_note
