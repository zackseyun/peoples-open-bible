review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: los gentilicios singulares con artículo se entienden colectivamente, יוֹשֵׁב expresa residencia continua, y la orden de cambiar de rumbo y salir hacia el desierto por la ruta del mar Rojo/de Juncos está bien captada. Sin embargo, hay un problema de anclaje de nota: la nota [a] se colocó sobre «amalecitas» aunque explica יַם סוּף, por lo que no preserva correctamente la evidencia fuente ni la disciplina de notas.'
  spanish_quality_summary: El español es claro y legible, pero «para ustedes» suena algo forzado en este contexto imperativo, y «den vuelta» puede afinarse a una formulación más natural y bíblicamente digna. También conviene recolocar la nota al sintagma «mar Rojo[a]».
  glossary_alignment: No hay conflicto con los términos teológicos principales del proyecto. «Mar Rojo» en texto con nota «mar de Juncos» sigue la pauta auditada. «Desierto» es aceptable aquí para הַמִּדְבָּר, aunque «wilderness»/«desierto» sigue siendo una decisión contextual válida. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «amalecitas» pero su contenido explica «mar Rojo / mar de Juncos».
    rationale: Las instrucciones exigen que cada marcador aparezca exactamente en la palabra o frase pertinente del texto. Tal como está, la nota falsea la relación entre texto y evidencia léxica.
  - severity: medium
    issue: «para ustedes» suena poco natural en español en «pónganse en marcha para ustedes hacia el desierto».
    rationale: לָכֶם añade matiz enfático/dativo, pero en español esa reproducción literal resulta torpe. Puede conservarse mejor con «váyanse» o simplemente omitirse si el mandato ya está claramente dirigido al pueblo.
  - severity: low
    issue: «den vuelta» es entendible, pero «dense vuelta» o «vuélvanse»/«den media vuelta» puede sonar más natural según registro.
    rationale: No es un error de sentido, pero una leve mejora estilística ayuda a la dignidad y fluidez del español bíblico moderno.
  revised_spanish_text: Ahora los amalecitas y los cananeos están viviendo en el valle. Mañana, vuélvanse y pónganse en marcha hacia el desierto, por el camino del mar Rojo[a].
  revised_footnotes:
