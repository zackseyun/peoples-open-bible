translation:
  language: es
  text: Yahvé solo será declarado justo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé solo será justificado» o «Yahvé solo será vindicado». El verbo griego puede llevar fuerza declarativa o vindicativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  - el Maestro
  lexicon: LSJ
  rationale: El griego Κύριος corresponde al título divino; en este proyecto el nombre divino se vierte como «Yahvé» en el texto principal. Aquí no se usa «Señor» como máscara, porque la evidencia de la serie traductora favorece una referencia al nombre divino y la economía de la línea es doxológica.
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: Solo
  alternatives_spanish:
  - únicamente
  - solamente
  - por sí solo
  lexicon: LSJ
  rationale: μόνος expresa exclusividad. «Solo» mantiene la restricción semántica con naturalidad en español y conserva el énfasis de que nadie más comparte esa condición.
- source_word: δικαιωθήσεται
  english_pob_choice: will be declared righteous
  chosen_spanish: será declarado justo
  alternatives_spanish:
  - será justificado
  - será vindicado
  - será mostrado como justo
  lexicon: BDAG
  rationale: El futuro pasivo de δικαιόω permite un sentido declarativo y también vindicativo. En español, «declarado justo» preserva el matiz jurídico-declarativo sin cargar el término con una lectura técnica posterior; «justificado» es posible, pero puede sonar más doctrinal o menos transparente para lectores modernos.
theological_decisions:
- issue: Tensión entre lectura declarativa y vindicativa de δικαιωθήσεται
  english_pob_reading: will be declared righteous / will be justified / will be vindicated
  chosen_spanish_reading: será declarado justo
  alternative_spanish_readings:
  - será justificado
  - será vindicado
  rationale: La forma griega admite una gama semántica real. La versión española conserva esa tensión mediante «declarado justo», que sigue siendo compatible con una vindicación pública sin resolver el verbo hacia un solo marco doctrinal.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; consistency of key terms, or documented exception'
- issue: Tratamiento del nombre divino en un dicho sapiencial griego
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el griego conserva κύριος, el proyecto exige exponer el nombre divino como «Yahvé» cuando el contexto lo permite. Dado que el enunciado es absoluto y teológico, la elección hace visible la referencia divina sin el encubrimiento habitual de «Señor».
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; use of Yahvé for יהוה / YHWH in main Spanish text'
translation_notes:
  revision_awareness: El texto fuente griego es breve y claro, aunque el paquete de validación marque un desajuste mayor; por eso la traducción se mantiene estrictamente anclada al testimonio griego disponible y no reconstruye una línea más amplia desde materiales externos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en vez de «Señor» para seguir la terminología proyectual sobre el nombre divino.
  - «Declarado justo» preserva la fuerza jurídica/declarativa de δικαιόω sin eliminar la alternativa de vindicación indicada por el audit trail.
  - «Solo» conserva el énfasis exclusivo de μόνος en una colocación natural del español.
  - La nota al pie recoge explícitamente las alternativas léxicas documentadas en el POB inglés.
