translation:
  language: es
  text: 'Entonces me dijo: «¿Has visto, hijo de hombre, lo que están haciendo los ancianos de la casa de Israel en la oscuridad, cada uno en los cuartos de su imagen tallada[a]? Porque dicen: “Yahvé no nos ve; Yahvé ha abandonado la tierra[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las cámaras de su imaginería» o «en los cuartos de su imagen». El término hebreo puede referirse a representaciones figuradas o talladas, probablemente imágenes idolátricas.'
    reason: lexical_alternative
  - marker: b
    text: «La tierra» puede referirse a la tierra de Israel o Judá; algunos traducen «la tierra» como «la tierra» o «el mundo».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Y luego me dijo
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo se expresa naturalmente con «Entonces»; mantiene el avance del relato sin añadir contenido ajeno al hebreo.
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen
  chosen_spanish: ¿Has visto?
  alternatives_spanish:
  - ¿Ves?
  - ¿Has mirado?
  lexicon: HALOT
  rationale: El qatal con interrogación en este contexto visionario apunta a una experiencia ya mostrada; el pretérito perfecto transmite mejor «¿has visto?» que un presente simple.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva la fórmula fija y profética dirigida a Ezequiel. «Hijo de hombre» mantiene la repetición literaria y la forma tradicional del llamado, sin paraphrasear el título.
- source_word: זִקְנֵי בֵית יִשְׂרָאֵל
  english_pob_choice: the elders of the house of Israel
  chosen_spanish: los ancianos de la casa de Israel
  alternatives_spanish:
  - los ancianos de Israel
  lexicon: HALOT
  rationale: Se preserva «casa de Israel» como expresión significativa en Ezequiel, en vez de compactarla, y «ancianos» refleja con precisión זִקְנֵי.
- source_word: עֹשִׂים בַּחֹשֶׁךְ
  english_pob_choice: are doing in the darkness
  chosen_spanish: están haciendo en la oscuridad
  alternatives_spanish:
  - están haciendo en secreto
  - están haciendo en lo oscuro
  lexicon: HALOT
  rationale: «Oscuridad» conserva el sentido literal del espacio oculto de la visión y también su carga moral, sin reemplazarla por una paráfrasis más interpretativa como «en secreto».
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada uno de ellos
  lexicon: HALOT
  rationale: El distributivo hebreo puede expresarse de modo natural en español con «cada uno», evitando una redundancia de género en una frase ya marcada por el contexto masculino de los ancianos.
- source_word: בְּחַדְרֵי מַשְׂכִּיתוֹ
  english_pob_choice: in the rooms of his carved image
  chosen_spanish: en los cuartos de su imagen tallada
  alternatives_spanish:
  - en las cámaras de su imagen
  - en las habitaciones de su figura esculpida
  - en los cuartos de su ídolo
  lexicon: HALOT
  rationale: חַדְרֵי se traduce con «cuartos/habitaciones» y מַשְׂכִּיתוֹ se vierte como «imagen tallada» para comunicar de forma clara la referencia a representación idolátrica, sin borrar la ambigüedad lexical entre imagen figurada y talla.
- source_word: כִּי אֹמְרִים
  english_pob_choice: For they are saying
  chosen_spanish: Porque dicen
  alternatives_spanish:
  - Pues dicen
  - Ya que dicen
  lexicon: HALOT
  rationale: La conjunción causal explica lo que motiva la acción clandestina; «Porque dicen» es directo y fiel al valor explicativo de כִּי en este contexto.
- source_word: אֵין יְהוָה רֹאֶה אֹתָנוּ
  english_pob_choice: Yahweh does not see us
  chosen_spanish: Yahvé no nos ve
  alternatives_spanish:
  - Yahvé no nos está viendo
  - Yahvé no nos mira
  lexicon: HALOT
  rationale: Se usa «Yahvé» según la convención del proyecto para יְהוָה. «No nos ve» conserva la negación del participio con naturalidad en español y respeta la afirmación impía de los hablantes.
- source_word: עָזַב יְהוָה אֶת הָאָרֶץ
  english_pob_choice: Yahweh has abandoned the land
  chosen_spanish: Yahvé ha abandonado la tierra
  alternatives_spanish:
  - Yahvé ha abandonado el país
  - Yahvé ha dejado la tierra
  lexicon: HALOT
  rationale: «Abandonado» transmite bien עָזַב en sentido de retirada/forsakening. Se mantiene «la tierra» porque el hebreo usa הָאָרֶץ y el contexto puede abarcar el territorio, sin restringirlo demasiado en el texto principal.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto para el nombre divino es usar «Yahvé» en el texto principal. En este versículo, además, la mención directa del nombre por los hablantes debe quedar visible, no enmascarada como título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra de Israel/Judá
  rationale: Aunque en este contexto puede aludir a la tierra de Israel/Judá, el hebreo dice literalmente «la tierra». En español, «la tierra» preserva esa amplitud sin forzar una localización más específica en el texto principal.
  doctrine_reference: Ezequiel 8:12 en contexto exílico y cultual; decisión semántica sobre alcance geográfico
- issue: Valor de מַשְׂכִּיתוֹ
  english_pob_reading: carved image / imagery / image
  chosen_spanish_reading: imagen tallada
  alternative_spanish_readings:
  - imagen
  - figura tallada
  - cámara de su imaginería
  rationale: El hebreo admite un rango semántico relacionado con imagen/representación/figura tallada. «Imagen tallada» comunica la fuerza idolátrica con claridad y mantiene abierta la tensión lexical, sin reducirlo a una sola solución interpretativa.
  doctrine_reference: HALOT; nota lexical preservada en el audit trail
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo base y el audit trail inglés, sin introducir revisiones no atestiguadas. Se conservan las tensiones lexicales documentadas: מַשְׂכִּיתוֹ como imagen/figura tallada, y הָאָרֶץ como tierra con posible referencia local a Israel/Judá.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la convención del proyecto.
  - Se usa «casa de Israel» y no una forma abreviada para conservar la expresión ezequielina.
  - «Oscuridad» traduce בַּחֹשֶׁךְ de forma literal y estilísticamente natural.
  - El discurso directo se marca con comillas angulares y puntuación española.
  - La nota [a] se ancla en «imagen tallada» para reflejar la alternativa lexical documentada.
