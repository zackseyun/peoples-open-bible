translation:
  language: es
  text: 'Aún antes[a], se enviaron cartas a Onias, el sumo sacerdote, de parte de Areo, que reinaba entre ustedes, diciendo: «Ustedes son nuestros hermanos», como lo muestra la copia adjunta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Incluso antes». El griego expresa anterioridad enfática; la frase también puede entenderse como «antes aún».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι πρότερον
  english_pob_choice: Even earlier
  chosen_spanish: Aún antes
  alternatives_spanish:
  - Todavía antes
  - Incluso antes
  lexicon: LSJ
  rationale: La expresión marca anterioridad enfática. «Aún antes» conserva el valor de ἔτι πρότερον con un español natural y solemne.
- source_word: ἀπεστάλησαν ἐπιστολαὶ
  english_pob_choice: letters were sent
  chosen_spanish: se enviaron cartas
  alternatives_spanish:
  - fueron enviadas cartas
  - se despacharon cartas
  lexicon: LSJ
  rationale: El griego está en plural; por eso se mantiene «cartas». «Se enviaron» es idiomático y refleja bien la voz pasiva.
- source_word: πρὸς Ὀνίαν τὸν ἀρχιερέα
  english_pob_choice: to Onias the high priest
  chosen_spanish: a Onias, el sumo sacerdote
  alternatives_spanish:
  - para Onias, el sumo sacerdote
  - a Onias, el gran sacerdote
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado y el título se traduce con una forma clara y bíblica. «Sumo sacerdote» es la equivalencia española más natural para ἀρχιερεύς.
- source_word: παρὰ δʼ Ἀρείου
  english_pob_choice: from Areus
  chosen_spanish: de parte de Areo
  alternatives_spanish:
  - de Areus
  - por Areo
  lexicon: LSJ
  rationale: παρά con genitivo indica origen o procedencia. «De parte de» comunica ese matiz documental. Se usa «Areo» como adaptación española del nombre.
- source_word: τοῦ βασιλεύοντος ἐν ὑμῖν
  english_pob_choice: who was reigning among you
  chosen_spanish: que reinaba entre ustedes
  alternatives_spanish:
  - que gobernaba entre ustedes
  - que era rey entre ustedes
  lexicon: LSJ
  rationale: El participio expresa la acción de reinar; «reinaba» mantiene esa fuerza verbal. «Entre ustedes» sigue de cerca ἐν ὑμῖν sin forzar «sobre».
- source_word: ὅτι ἐστὲ ἀδελφοὶ ἡμῶν
  english_pob_choice: saying, ‘You are our brothers,’
  chosen_spanish: 'diciendo: «Ustedes son nuestros hermanos»'
  alternatives_spanish:
  - 'diciendo: «Ustedes son nuestros hermanos y parientes»'
  - 'afirmando: «Ustedes son nuestros hermanos»'
  lexicon: LSJ
  rationale: ὅτι introduce el contenido citado; por eso se vierte naturalmente con «diciendo». «Hermanos» mantiene el término de parentesco/alianza del griego.
- source_word: ὡς τὸ ἀντίγραφον ὑπόκειται
  english_pob_choice: as the copy appended here shows
  chosen_spanish: como muestra el ejemplar adjunto aquí
  alternatives_spanish:
  - como muestra la copia adjunta aquí
  - según muestra el ejemplar que sigue aquí
  - como muestra el transcrito adjunto aquí
  lexicon: LSJ
  rationale: ἀντίγραφον puede referirse a una copia, ejemplar o transcripción; «ejemplar adjunto» conserva la idea documental sin estrechar demasiado el sentido. ὑπόκειται sugiere algo puesto delante o añadido, no meramente 'abajo'.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del inglés auditado: mantiene el plural de «cartas», expresa ὅτι con una cita introducida por «diciendo», y vierte ὑπόκειται con una fórmula documental natural en español que sugiere un texto adjunto o presentado.'
  spanish_consistency_notes:
  - Se conserva el orden documental y narrativo del versículo.
  - Se mantiene el tono formal sin arcaísmos innecesarios.
  - 'Los nombres propios se adaptan al español de manera consistente: Onias, Areo.'
  - «Sumo sacerdote» se usa como término estándar para ἀρχιερεύς en este contexto.
