revisions:
- from: 'Entonces Joab vino al rey y dijo[a]: «¿Qué has hecho? Mira, Abner vino a ti. ¿Por qué, entonces, lo despachaste, de modo que se fue y se fue del todo?».'
  to: 'Entonces Joab vino al rey y dijo: «¿Qué has hecho? Mira, Abner vino a ti. ¿Por qué, entonces, lo dejaste ir, de modo que ya se ha ido por completo[a]?».'
  rationale: Se reubicó la nota al pie en la expresión hebrea realmente enfática (וַיֵּלֶךְ הָלוֹךְ), se reemplazó la nota incorrecta sobre «dijo», y se mejoró la naturalidad del español manteniendo el sentido del hebreo y la auditoría inglesa. También se ajustó שִׁלַּחְתּוֹ a «lo dejaste ir» para una lectura más idiomática y fiel al contexto.
