review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: Yahvé como sujeto, encuentro con Balaam, el modismo de poner una palabra en su boca, el mandato de volver a Balac y la fórmula profética final. Sin embargo, la nota alternativa no preserva con precisión las alternativas auditadas en inglés y contiene una forma española incorrecta. Además, «se encontró con Balaam» es aceptable, pero «encontró a Balaam» se ajusta mejor al inglés auditado revisado («met Balaam») y suena más directo en español bíblico-natural.'
  spanish_quality_summary: 'La redacción principal es clara y digna. «Puso una palabra en su boca» y «Vuelve a Balac, y así hablarás» son naturales y fieles. El único problema real de calidad está en la nota: «encuentró» está mal escrito y «vino sobre Balaam» pierde la preposición implícita de la alternativa inglesa «came upon Balaam».'
  glossary_alignment: 'Se alinea correctamente con la terminología del proyecto: יְהוָה → «Yahvé»; דָּבָר → «palabra»; no introduce paráfrasis teológica indebida. No hay conflicto con otros términos doctrinales del glosario.'
  issues:
  - severity: medium
    issue: La nota léxica alternativa no reproduce con precisión ni buen español las alternativas auditadas.
    rationale: El inglés conserva «came upon Balaam» / «encountered Balaam». En español, «encuentró» es incorrecto; además, conviene dar alternativas idiomáticas correctas como «encontró a Balaam» o «vino sobre Balaam». La nota actual debilita la calidad editorial.
  - severity: low
    issue: «Se encontró con Balaam» es aceptable pero menos directo que «encontró a Balaam».
    rationale: El expediente inglés fue revisado de «met with Balaam» a «met Balaam» para mayor naturalidad. En español, «Yahvé encontró a Balaam» preserva mejor esa sencillez narrativa sin cambiar el sentido.
  revised_spanish_text: 'Yahvé encontró a Balaam y puso una palabra en su boca[a], y le dijo: «Vuelve a Balac, y así hablarás».'
  revised_footnotes:
  - marker: a
    text: 'O: «vino sobre Balaam» o «se encontró con Balaam».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a una forma más directa y natural en español, en línea con la revisión auditada del inglés («met Balaam»). Se corrige y mejora la nota alternativa para reflejar con español correcto las opciones léxicas documentadas sin introducir lecturas más fuertes que el hebreo.
