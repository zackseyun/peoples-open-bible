base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/013.yaml
  text: In the cities of the hill country[a], in the cities of the lowland, and in the cities of the Negeb, and in the land of Benjamin, and around Jerusalem, and in the cities of Judah, the flocks will again pass under the hands of the one who counts them[c][b], says Yahweh.
  footnotes:
  - marker: a
    text: Or 'the Shephelah,' the Judean foothill region.
    reason: lexical_alternative
  - marker: b
    text: Or 'the South'; Hebrew 'the Negeb,' a southern region of Judah.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'under the hands of the one who counts,' preserving the image of a shepherd counting livestock as they pass by.
    reason: cultural_note
