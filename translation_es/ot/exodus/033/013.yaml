base_translation:
  language: en
  yaml_path: translation/ot/exodus/033/013.yaml
  text: Now therefore[a], if I have found favor in your eyes, please make your way known to me, so that I may know you, in order that I may find favor in your eyes[c][b]. And see that this nation is your people.
  footnotes:
  - marker: a
    text: Or, 'show me your way.' The Hebrew has the plural 'your ways,' but some English versions smooth it to the singular for style.
    reason: lexical_alternative
  - marker: b
    text: 'Or, ''see'' or ''look.'' Here the sense is idiomatic: ''take notice'' or ''consider.'''
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''this nation.'' The clause also says ''your people,'' preserving both national and covenantal language.'
    reason: cultural_note
