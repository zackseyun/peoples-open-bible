revisions:
- from: Ella quitará de sí la ropa de su cautiverio[a] y permanecerá en tu casa, y llorará a su padre y a su madre por un mes de días. Después de eso podrás entrar a ella y ser su esposo, y ella será para ti esposa.
  to: Ella quitará de sí la ropa de su cautiverio[a] y permanecerá en tu casa, y llorará por su padre y por su madre por un mes de días. Después de eso podrás llegarte a ella y ser su esposo, y ella será tu esposa.
  rationale: 'Se hicieron reparaciones menores de idiomaticidad y legibilidad en español sin alterar el sentido fuente ni las decisiones teológicas auditadas: «llegarte a ella» conserva mejor el idiomático sexual hebreo que «entrar a ella»; «será tu esposa» naturaliza la fórmula marital; y «llorará por su padre y por su madre» mejora la sintaxis de duelo en español.'
