  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal, el singular de «al que heriste» y la idea de hostilidad continuada. Sin embargo, la nota al pie está mal anclada: la alternativa léxica documentada corresponde a «tus heridos», no a «heriste». Además, puede afinarse «cuentan» a «relatan» para reflejar mejor el matiz de יְסַפֵּרוּ como «recount».'
  spanish_quality_summary: 'El español es claro y natural, con registro digno y legible. «Porque ellos persiguen al que heriste» suena bien. El principal problema es técnico-editorial: el marcador [a] está en el lugar equivocado. «Relatan» ofrece un matiz un poco más preciso que «cuentan», aunque «cuentan» no es incorrecto.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones «heriste», «persiguen», «dolor» y «tus heridos» concuerdan con el razonamiento del POB en inglés. La ambigüedad de חֲלָלֶיךָ está debidamente preservada en nota, pero debe vincularse a la frase correspondiente.
  issues:
  - severity: medium
    issue: El marcador de nota [a] está colocado sobre «heriste» en vez de sobre «tus heridos».
    rationale: La nota explica la ambigüedad léxica de חֲלָלֶיךָ («tus heridos / tus muertos / tus atravesados»), no la de הִכִּיתָ («heriste»). Esto desalineá la evidencia fuente con la anotación.
  - severity: low
    issue: «Cuentan» podría afinarse a «relatan».
    rationale: יְסַפֵּרוּ en Piel tiene matiz de narrar/referir detalladamente. «Relatan» recoge mejor ese valor que «cuentan», aunque ambas son aceptables.
  revised_spanish_text: Porque ellos persiguen al que heriste, y relatan el dolor de tus heridos[a].
