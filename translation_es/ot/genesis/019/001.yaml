revisions:
- from: Los dos ángeles llegaron a Sodoma[a] al atardecer, y Lot estaba sentado a la puerta de Sodoma[b]. Cuando Lot los vio, se levantó para recibirlos y se inclinó rostro en tierra[c].
  to: Los dos ángeles llegaron a Sodoma[a] al atardecer, y Lot estaba sentado a la puerta de Sodoma[b]. Cuando Lot los vio, se levantó para salir a su encuentro y se inclinó con el rostro en tierra[c].
  rationale: Se ajusta la frase final para un español más natural y fiel al modismo hebreo de postración completa, y se fortalece לִקְרָאתָם con 'salir a su encuentro'. Las notas se mantienen en línea con la auditoría inglesa, pero con formulación española más clara.
