translation:
  language: es
  text: El rey Salomón hizo para sí un palanquín[a] con madera de los árboles del Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «litera», «carroza» o «silla de mano». El término hebreo es raro y su referente exacto es incierto, aunque claramente designa un vehículo regio lujoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַפִּרְיוֹן
  english_pob_choice: palanquin
  chosen_spanish: palanquín
  alternatives_spanish:
  - litera
  - carroza
  - silla de mano
  lexicon: HALOT
  rationale: El hebreo es un término raro y de referente preciso incierto, pero claramente designa un medio de transporte regio y lujoso. «Palanquín» conserva esa idea de vehículo llevado, sin precisar indebidamente su forma. Se mantienen alternativas porque el término es debatido y el POB inglés también las preserva.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - fabricó
  - elaboró
  lexicon: HALOT
  rationale: El verbo común «hacer» se expresa naturalmente con «hizo» en español. Es amplio y fiel, sin imponer más detalles de los que da el hebreo.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «para él», el contexto de Salomón favorece un sentido reflexivo de posesión o uso personal. «Para sí» comunica mejor ese matiz en español.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Salomón, el rey
  lexicon: HALOT
  rationale: Se conserva el orden natural del español con título + nombre propio. «El rey Salomón» corresponde bien al hebreo y al uso bíblico.
- source_word: מֵעֲצֵי
  english_pob_choice: from the trees of
  chosen_spanish: de madera de
  alternatives_spanish:
  - de los árboles de
  - de los maderos de
  - hecho de madera de
  lexicon: HALOT
  rationale: El hebreo habla literalmente de material procedente de los árboles/ bosques del Líbano. En español, «de madera de» comunica la materia de forma natural; se preserva el vínculo con el Líbano sin forzar una imagen extraña. La opción inglesa «trees of» se vuelve algo menos idiomática en español si se traduce de modo rígido.
- source_word: הַלְּבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: el Líbano
  alternatives_spanish:
  - Líbano
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico.
translation_notes:
  revision_awareness: 'El texto inglés POB adopta «palanquin» y conserva una nota de alternativas por la rareza del hebreo. En español se mantiene la misma cautela: se usa «palanquín» como término principal y se preserva la incertidumbre del referente en nota. Se evita una traducción demasiado literal de «from the trees of Lebanon» porque en español resulta más natural y fiel al material traducir la materia con «de madera de» sin perder la procedencia del Líbano.'
  spanish_consistency_notes:
  - Se preserva el nombre divino ausente en este versículo, por lo que no aplica ninguna convención de Yahvé.
  - «Palanquín» se usa como equivalente principal por su valor de vehículo lujoso llevado a mano; se registran alternativas para reflejar la incertidumbre lexical.
  - La frase «de madera de» prioriza naturalidad española y la idea de material, equivalente al trasfondo de la construcción con árboles del Líbano.
  - Se mantiene «para sí» para reflejar el matiz reflexivo que el inglés POB expresó con «for himself».
