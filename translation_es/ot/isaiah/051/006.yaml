    text: Or, 'the heavens will dissipate like smoke.' The Hebrew verb is difficult; the sense is that the heavens pass away.
    reason: lexical_alternative
  - marker: b
    text: Or, 'my justice.' The Hebrew word can denote both righteousness and justice.
    reason: lexical_alternative
