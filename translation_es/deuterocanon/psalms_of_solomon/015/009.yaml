base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/015/009.yaml
  text: For they will flee from the holy ones as those pursued by war[a], but they will pursue sinners and overtake them; and those who practice lawlessness will not escape the Lord’s judgment[c][b]; they will be captured like those seized by experienced enemies.
  footnotes:
