review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: fórmula profética, título divino, doble imperativo, identificación de Sebna y el modismo «sobre la casa». Sin embargo, omite en el texto principal el componente אֲדֹנָי del título compuesto אֲדֹנָי יְהוִה; «Yahvé de los ejércitos» no preserva plenamente «el Señor Yahvé de los ejércitos». Además, la colocación de notas desplaza la nota cultural desde «quien está sobre la casa» hacia «Sebna», y «entra a este mayordomo» suena menos natural que una formulación con «ve, preséntate ante» o similar.'
  spanish_quality_summary: El español es generalmente claro, pero «Ve, entra a este mayordomo» resulta torpe en registro natural; en español «entrar a una persona» no funciona bien. También conviene alinear mejor las notas con sus referentes y evitar una segmentación innecesaria de tres notas cuando dos bastan. «Mayordomo» es aceptable, aunque «administrador» sería más transparente; puede mantenerse si se conserva la aclaración cultural.
  glossary_alignment: Buen cumplimiento en «Yahvé», «Sebna», y la conservación del doble imperativo. No obstante, para el título compuesto del hebreo debe aparecer también «el Señor». «De los ejércitos» es aceptable como equivalente de צבאות. «Mayordomo» concuerda razonablemente con steward, con apoyo de nota.
  issues:
  - severity: high
    issue: Falta «el Señor» en el título divino compuesto
    rationale: אֲדֹנָי יְהוִה incluye tanto el título como el nombre divino. El borrador reduce esto a «Yahvé», perdiendo una parte significativa del texto fuente.
  - severity: medium
    issue: «Entra a este mayordomo» es poco natural en español
    rationale: Aunque busca reflejar בֹּא, en español la construcción con objeto personal suena incorrecta o forzada. Se puede conservar la doble fuerza con «ve, preséntate ante» o «ve, entra donde está».
  - severity: medium
    issue: La nota cultural está anclada en «Sebna» en vez de en «el que está sobre la casa»
    rationale: La explicación cultural corresponde al cargo, no al nombre propio. El anclaje actual puede inducir a confusión.
  revised_spanish_text: 'Así dice el Señor Yahvé de los ejércitos: Ve[a], preséntate ante este mayordomo, ante Sebna, el que está sobre la casa[b]:'
  revised_footnotes:
  - marker: a
    text: 'O: «Ve, entra adonde este funcionario, Sebna». El hebreo conserva dos imperativos, «ve, ven/entra», que pueden funcionar juntos de manera idiomática.'
    reason: lexical_alternative
  - marker: b
    text: «El que está sobre la casa» designa a un alto administrador del palacio, es decir, un mayordomo principal.
    reason: cultural_note
  revision_rationale: Se añadió «el Señor» para representar plenamente אֲדֹנָי יְהוִה junto con «Yahvé», conforme al hebreo y a la terminología del proyecto. Se reemplazó «entra a este mayordomo» por «preséntate ante este mayordomo» para lograr español natural sin perder la idea de aproximación del doble imperativo; la nota conserva la alternativa más literal. Se reubicó la nota cultural al sintagma del cargo, que es donde realmente aplica.
