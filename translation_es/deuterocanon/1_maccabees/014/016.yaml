translation:
  language: es
  text: Y en Roma[a], e incluso hasta Esparta, oyeron que Jonatán había muerto, y se entristecieron profundamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene un verbo singular («oyó») antes del plural («se entristecieron»). La traducción expresa el sentido colectivo: los de Roma, e incluso hasta Esparta, oyeron la noticia.'
    reason: textual_variant
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: they heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - se oyó
  - oyeron ellos
  lexicon: LSJ
  rationale: Aunque el griego transmitido tiene verbo singular, el contexto coordinado con el plural de ἐλυπήθησαν y con los ámbitos geográficos sugiere un sujeto colectivo implícito. En español, «oyeron» expresa naturalmente ese valor colectivo sin forzar una impersonalidad que aquí sonaría menos clara.
- source_word: ἐν Ῥώμῃ
  english_pob_choice: in Rome
  chosen_spanish: en Roma
  alternatives_spanish:
  - en la ciudad de Roma
  lexicon: LSJ
  rationale: Uso locativo simple con nombre propio de ciudad; «en Roma» reproduce con naturalidad el valor de ἐν.
- source_word: καὶ ἕως Σπάρτης
  english_pob_choice: and even as far as Sparta
  chosen_spanish: y aun hasta Esparta
  alternatives_spanish:
  - y aun hasta la misma Esparta
  - y hasta Esparta
  lexicon: LSJ
  rationale: ἕως con genitivo indica alcance o extensión. «Aun hasta» preserva el matiz de extensión enfática reflejado en la revisión inglesa con «even», sin convertirlo en una mera segunda localización.
- source_word: ἀπέθανεν
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - murió
  - estaba muerto
  lexicon: LSJ
  rationale: 'El pluscuamperfecto español funciona bien en discurso indirecto: sitúa la muerte como anterior al acto de oírla. «Había muerto» conserva el valor narrativo del inglés auditado.'
- source_word: ἐλυπήθησαν σφόδρα
  english_pob_choice: they were deeply grieved
  chosen_spanish: se entristecieron muchísimo
  alternatives_spanish:
  - fueron profundamente afligidos
  - sintieron un gran dolor
  lexicon: LSJ
  rationale: El verbo pasivo/deponente con σφόδρα expresa una tristeza intensa. «Se entristecieron muchísimo» es idiomático en español y mantiene la intensidad sin suavizarla ni añadir una teología o psicología no presentes en el texto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «and as far as Sparta» a «and even as far as Sparta» para reflejar mejor ἕως. La formulación española adopta ese matiz con «aun hasta Esparta», manteniendo la estructura coordinada del griego y la lectura colectiva implícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - «Jonatán» se conserva con acento español estándar.
  - La puntuación coordina dos acciones principales con una sola oración, siguiendo de cerca la sintaxis griega.
