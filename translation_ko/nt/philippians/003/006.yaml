id: PHP.3.6
reference: Philippians 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ ⸀ζῆλος διώκων τὴν ἐκκλησίαν, κατὰ δικαιοσύνην τὴν ἐν νόμῳ γενόμενος ἄμεμπτος.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/006.yaml
  text: as to zeal[a], persecuting the church; as to righteousness under the law[b], having become blameless.
  footnotes:
  - marker: a
    text: Or “justice” for “righteousness.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “in the law.”
    reason: lexical_alternative
translation:
  language: ko
  text: 열심으로 말하면 회중을 박해하던 자요; 율법 안의 의[a]로 말하면 흠 없는 자가 되었습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「정의」. 본 번역은 바울의 구원론적 문맥에서 δικαιοσύνη를 기본형 「의」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「율법 안에서」. 바리새적 평가 체계 내에서의 「흠 없음」을 가리키며, 하나님 앞에서의 절대적 무죄를 함의하지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: as to
  chosen_korean: ~으로 말하면
  alternatives_korean:
  - ~에 관하여는
  - ~에 따라
  lexicon: BDAG
  rationale: 평가 기준을 도입하는 κατά. 한국어 「~으로 말하면」이 반복되는 수사 구조와 잘 어울리며 5절의 「율법으로 말하면」과도 일관성을 유지한다.
- source_word: ζῆλος
  english_pob_choice: zeal
  chosen_korean: 열심
  alternatives_korean:
  - 열의
  - 열정
  lexicon: BDAG
  rationale: 「열심」은 유대 언약적·종파적 문맥에서 가장 표준적이고 투명한 한국어 등가어이며, 바울의 옛 종교적 헌신의 강도를 보존한다.
- source_word: διώκων
  english_pob_choice: persecuting
  chosen_korean: 박해하던 자
  alternatives_korean:
  - 박해하던
  - 추적하던
  lexicon: BDAG
  rationale: 본 문맥에서 동사는 신자들에 대한 적대적 행동을 분명히 가리키므로 「박해하다」가 적절하다. 미완료 분사의 지속적 과거 행위를 「~던 자」로 옮긴다.
- source_word: ἐκκλησίαν
  english_pob_choice: the church
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  - 회집
  lexicon: BDAG
  rationale: 글로사리 기본형 「회중」 유지. 바울 서신에서 ἐκκλησία는 모인 신자 공동체를 가리키므로, 후대 제도적 함의가 강한 「교회」 대신 「회중」으로 옮긴다.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: '글로사리 기본형: 구원론적·바울적 문맥에서는 「의」를 기본으로 한다. 본 절은 율법으로 측정된 언약적·법적 정직성을 가리킨다.'
- source_word: ἐν νόμῳ
  english_pob_choice: under the law
  chosen_korean: 율법 안의
  alternatives_korean:
  - 율법 안에서의
  - 율법에 따른
  lexicon: BDAG
  rationale: 직역의 「~안에서」를 살리되, 「의」와 결합한 한국어 자연 구문 「율법 안의 의」로 옮긴다. 「~아래의」(under)는 영어 관용이며 헬라어 ἐν과는 거리가 있다.
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_korean: ~ 자가 되었습니다
  alternatives_korean:
  - 된 자
  - 입증된 자
  lexicon: BDAG
  rationale: 분사를 완료된 행위 결과의 술어로 옮긴다. 합쇼체 「되었습니다」가 격식과 회상의 어조를 함께 살린다.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_korean: 흠 없는
  alternatives_korean:
  - 책망 받을 것이 없는
  - 책잡힐 데 없는
  lexicon: BDAG
  rationale: 「흠 없는」이 가장 정착되고 간결한 한국어 등가어이다. 명시된 평가 틀(율법) 내에서 비난 받을 거리가 없음을 가리키며, 절대적 무죄를 함의하지 않는다.
theological_decisions:
- issue: 바울의 「흠 없음」 주장의 범위
  chosen_reading: 율법으로 측정된 의의 범위 내에서의 흠 없음
  alternative_readings:
  - 절대적 무죄
  - 반어적 표현
  rationale: 문법상 ἄμεμπτος는 δικαιοσύνη τὴν ἐν νόμῳ에 연결된다. 본 절은 바리새적·율법적 평가 안에서의 옛 위치를 말하며, 하나님 앞에서의 절대적 인간 완전을 주장하지 않는다.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #3 (preserve theological tension).'
