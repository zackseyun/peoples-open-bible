translation:
  language: es
  text: Y yo—he aquí[a], te he puesto hoy como ciudad fortificada, como columna de hierro y como muros de bronce, contra toda la tierra[b]—contra los reyes de Judá, sus oficiales, sus sacerdotes y el pueblo de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mira». El hebreo usa una partícula de énfasis y presentación solemne.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «tierra» se refiere al territorio de Judá, no a toda la tierra en sentido mundial.
    reason: contextual_clarification
  - marker: c
    text: «El pueblo de la tierra» puede en algunos contextos referirse a la gente común en contraste con los gobernantes, pero aquí también puede abarcar más ampliamente a la población en su conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y en cuanto a mí
  - Pero yo
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente conserva el énfasis discursivo y el contraste implícito sin forzarlo a un matiz adversativo que el hebreo no exige claramente.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: '''Mira'' transmite la deixis y el énfasis profético en un español natural y digno; evita una formulación demasiado arcaica, pero mantiene la solemnidad.'
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he establecido
  lexicon: HALOT
  rationale: El verbo נתן aquí funciona idiomáticamente como 'poner/establecer/nombrar'. 'Te he puesto' conserva la idea de designación y encaje bien con los complementos predicativos siguientes, sin perder la tensión entre 'dar' y 'constituir'.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalente temporal directo y natural en español.
- source_word: לְעִיר מִבְצָר
  english_pob_choice: a fortified city
  chosen_spanish: como ciudad fortificada
  alternatives_spanish:
  - para ciudad fortificada
  - en ciudad fortificada
  lexicon: HALOT
  rationale: El ל- predicativo se vierte mejor con 'como' en español para expresar función/constitución. 'Ciudad fortificada' preserva el valor adjetival de מִבְצָר sin añadir elementos no presentes.
- source_word: וּלְעַמּוּד בַּרְזֶל
  english_pob_choice: an iron pillar
  chosen_spanish: como columna de hierro
  alternatives_spanish:
  - como pilar de hierro
  - como columna férrea
  lexicon: HALOT
  rationale: '''Columna'' es natural y bíblicamente transparente en español; ''de hierro'' mantiene el sustantivo genitivo del original. ''Pilar'' también sería posible, pero ''columna'' suele comunicar mejor la imagen de soporte resistente.'
- source_word: וּלְחֹמוֹת נְחֹשֶׁת
  english_pob_choice: bronze walls
  chosen_spanish: como muros de bronce
  alternatives_spanish:
  - como murallas de bronce
  - como paredes de bronce
  lexicon: HALOT
  rationale: '''Muros'' conserva el plural y el paralelismo con el hebreo; ''bronce'' sigue la convención bíblica para נְחֹשֶׁת en imaginería de resistencia. La formulación mantiene la metáfora sin suavizarla.'
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: against the whole land
  chosen_spanish: contra toda la tierra
  alternatives_spanish:
  - contra todo el país
  - sobre toda la tierra
  lexicon: HALOT
  rationale: El contexto conflictivo favorece 'contra'. 'Tierra' conserva la ambigüedad semántica de אֶרֶץ, pero en esta escena apunta a Judá en su conjunto; 'país' sería más explicativo y menos literal.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: against the kings of Judah
  chosen_spanish: contra los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - frente a los reyes de Judá
  lexicon: HALOT
  rationale: La repetición de 'contra' explicita la relación sintáctica y semántica que el hebreo establece por contexto entre עַל y las series de destinatarios adversativos.
- source_word: לְשָׂרֶיהָ
  english_pob_choice: its officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus líderes
  lexicon: HALOT
  rationale: '''Oficiales'' refleja bien שָׂרִים como funcionarios gobernantes y evita un término demasiado monárquico o medieval como ''príncipes''.'
- source_word: לְכֹהֲנֶיהָ
  english_pob_choice: its priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus ministros sagrados
  lexicon: HALOT
  rationale: '''Sacerdotes'' es la equivalencia normal y precisa para כֹּהֲנִים.'
- source_word: וּלְעַם הָאָרֶץ
  english_pob_choice: and the people of the land
  chosen_spanish: y el pueblo de la tierra
  alternatives_spanish:
  - y la gente de la tierra
  - y el pueblo del país
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea sin sociologizarla prematuramente. 'Pueblo de la tierra' mantiene la amplitud del grupo y la posible tensión entre sentido común y técnico.
theological_decisions:
- issue: Alcance de 'la tierra' en el verso
  english_pob_reading: Rendered as 'the whole land' rather than 'the whole earth,' with the following groups showing Judah in view.
  chosen_spanish_reading: '''Toda la tierra'' se entiende como el ámbito de Judá, no como el globo entero.'
  alternative_spanish_readings:
  - toda la tierra
  - todo el país
  rationale: La enumeración inmediata de reyes, oficiales, sacerdotes y pueblo de Judá restringe el referente de אֶרֶץ al ámbito nacional. 'Tierra' preserva la polisemia; el contexto evita sobregeneralizar.
  doctrine_reference: Lectura contextual del alcance territorial en profecía histórica; coherencia con el uso de אֶרֶץ en Jer 1:18.
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada del POB inglés de mantener el sentido predicativo de נתן sin añadir 'into'. También conserva la serie adversativa y la restricción contextual de 'la tierra' a Judá, de acuerdo con el aparato auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en este texto.
  - '''Bronce'' se usa como equivalente bíblico convencional de נְחֹשֶׁת, en consonancia con el POB inglés.'
  - La expresión 'pueblo de la tierra' preserva la ambigüedad útil del hebreo sin convertirla en 'pueblo común' de forma interpretativa.
