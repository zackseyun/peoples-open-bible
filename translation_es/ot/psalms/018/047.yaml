translation:
  language: es
  text: ¡Vive Yahvé, y bendito sea mi roca, y exaltado sea[a] el Dios de mi salvación!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sea exaltado el Dios de mi salvación», o «y el Dios de mi salvación es exaltado».'
    reason: alternative_reading
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: The LORD lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Yahvé vive!
  - ¡Vive el SEÑOR!
  lexicon: HALOT
  rationale: La expresión hebrea funciona como una proclamación breve y enfática de la realidad viviente de YHWH. En español, '¡Vive Yahvé!' conserva el valor doxológico e idiomático sin introducir la fórmula juramentada 'Como vive...' que no está explícita en este versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva la transliteración del Nombre divino según la norma del proyecto. 'Yahvé' es la forma establecida en español para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: וּבָרוּךְ
  english_pob_choice: and blessed be
  chosen_spanish: y bendito sea
  alternatives_spanish:
  - y bendito es
  - y sea bendito
  lexicon: HALOT
  rationale: En este contexto de alabanza, la forma funciona como aclamación benedictoria. 'Bendito sea' preserva mejor el tono litúrgico y voluntativo que una simple afirmación descriptiva.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: HALOT
  rationale: '''Roca'' reproduce directamente la metáfora hebrea de estabilidad y protección. Es claro en español y mantiene la imagen original sin interpretarla excesivamente.'
- source_word: וְיָרוּם
  english_pob_choice: and exalted be
  chosen_spanish: y exaltado sea
  alternatives_spanish:
  - y sea exaltado
  - y es exaltado
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en paralelismo poético tiene fuerza jussiva/aclamativa. 'Exaltado sea' conserva esa tensión entre deseo y proclamación mejor que una mera forma indicativa.
- source_word: אֱלוֹהֵי יִשְׁעִי
  english_pob_choice: the God of my salvation
  chosen_spanish: el Dios de mi salvación
  alternatives_spanish:
  - el Dios que me salva
  - mi Dios salvador
  lexicon: HALOT
  rationale: La construcción en genitivo se refleja de manera natural como 'el Dios de mi salvación', manteniendo tanto la estructura como el énfasis teológico en Dios como fuente de liberación.
theological_decisions:
- issue: Force of the opening declaration חַי יְהוָה
  english_pob_reading: The LORD lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - ¡Yahvé vive!
  - ¡Como vive Yahvé!
  rationale: La lectura principal sigue siendo una proclamación de la vida y realidad activa de YHWH. Se evita añadir la forma juramentada 'Como vive...' porque no aparece de manera explícita en el hebreo de este versículo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Rendered force of וְיָרוּם in praise poetry
  english_pob_reading: and exalted be
  chosen_spanish_reading: y exaltado sea
  alternative_spanish_readings:
  - y sea exaltado
  - y es exaltado
  - y sea ensalzado
  rationale: La poesía hebrea admite formas imperfectas con valor acclamativo o desiderativo. 'Exaltado sea' mantiene la apertura semántica entre una declaración de hecho y una aclamación de deseo, sin cerrar indebidamente la ambigüedad.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto español sigue de cerca el análisis del paquete fuente hebreo y el audit trail inglés. Se conservan las tres cláusulas poéticas del verso, con el Nombre divino transliterado como Yahvé y con el valor aclamativo/jussivo de las dos últimas cláusulas reflejado en español sin resolver la ambigüedad del imperfecto hebreo. No hubo revisiones aplicadas en la última pasada; el acuerdo de revisión fue alto y sin objeciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se mantiene 'mi roca' como metáfora literal, no como paráfrasis interpretativa.
  - '''Exaltado sea'' conserva el paralelismo con ''bendito sea'' y evita aplanar el hebreo en una simple descripción.'
  - La nota al pie refleja la alternativa textual/funcional preservada por la edición inglesa.
