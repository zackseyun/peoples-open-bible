  to: 'Así dice el Señor Yahvé: Si el príncipe da un regalo a uno de sus hijos[a], es su herencia[b]; pertenecerá a sus hijos como su posesión por herencia.'
  rationale: Se corrige «será» a «es» para reflejar con precisión la cláusula nominal hebrea נַחֲלָתוֹ הִיא. Se mantiene el resto de la redacción, que es natural y fiel. También se ajusta la nota b para alinearla mejor con la alternativa léxica documentada para el cierre jurídico del versículo.
