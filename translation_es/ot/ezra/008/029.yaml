  language: en
  yaml_path: translation/ot/ezra/008/029.yaml
  text: Be watchful and guard them until you weigh them out before the chief priests and the Levites and the heads of the fathers’ houses of Israel in Jerusalem[c][b][a], in the chambers of the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'Be watchful and keep them.' The Hebrew imperatives emphasize careful vigilance over the entrusted items.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the heads of the fathers’ houses of Israel,' referring to clan or ancestral-house leaders.
    reason: cultural_note
  - marker: c
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
