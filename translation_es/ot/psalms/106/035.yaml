translation:
  language: es
  text: pero se mezclaron con las naciones y aprendieron[a] sus prácticas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se mezclaron entre las naciones».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sus obras» o «sus hechos»; aquí se refiere a las costumbres y conductas habituales de las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְעָרְבוּ
  english_pob_choice: they mixed
  chosen_spanish: se mezclaron
  alternatives_spanish:
  - se minglaron
  - se entremezclaron
  - se asociaron con
  lexicon: HALOT
  rationale: El hitpael de ערב expresa mezcla o asociación social con otros pueblos. «Se mezclaron» es natural en español y conserva la idea de asimilación relacional sin añadir una carga interpretativa mayor que la del hebreo.
- source_word: בַגּוֹיִם
  english_pob_choice: with the nations
  chosen_spanish: con las naciones
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  - con los gentiles
  lexicon: HALOT
  rationale: גוֹיִם puede referirse a naciones o pueblos. En este contexto histórico se trata de los pueblos no israelitas circundantes. «Con las naciones» sigue de cerca el sentido del verbo y evita introducir matices posteriores de «gentiles» que no son necesarios aquí.
- source_word: וַיִּלְמְדוּ
  english_pob_choice: learned
  chosen_spanish: aprendieron
  alternatives_spanish:
  - llegaron a aprender
  - fueron enseñados
  lexicon: HALOT
  rationale: El qal significa sencillamente «aprendieron». La forma activa conserva la responsabilidad de Israel al adoptar esos comportamientos.
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their practices
  chosen_spanish: sus prácticas
  alternatives_spanish:
  - sus obras
  - sus hechos
  - sus maneras
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «sus obras/hechos», el contexto apunta a conductas habituales y modos de actuar de las naciones. «Prácticas» comunica bien esa idea en español moderno y mantiene abierta la referencia a patrones de conducta, no solo a actos aislados.
theological_decisions:
- issue: Culpa moral implícita de la asimilación a las naciones
  english_pob_reading: Render the verse as culpable assimilation ('mixed with the nations and learned their practices') without adding explicit condemnation beyond what the context implies.
  chosen_spanish_reading: Traducir con un tono que muestre la asimilación culpable, pero sin añadir una condena explícita que el versículo mismo no formula.
  alternative_spanish_readings:
  - vivieron entre las naciones y aprendieron sus prácticas
  - se contaminaron con las naciones y adoptaron sus prácticas
  rationale: El hebreo describe la mezcla y el aprendizaje; la valoración negativa proviene del contexto más amplio del salmo. Por eso conviene preservar esa tensión en lugar de resolverla con una versión más neutral o más intensificada.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no se requerían cambios; este borrador mantiene la misma decisión de sentido que la auditoría inglesa, con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם, en línea con la decisión inglesa y sin importar «gentiles» como término teológico posterior.
  - Se conserva el matiz activo de «aprendieron» para וַיִּלְמְדוּ, evitando una formulación pasiva.
  - «Prácticas» busca reproducir el valor contextual de מַעֲשֵׂיהֶם sin reducirlo a actos aislados ni expandirlo a una interpretación explícita del versículo.
