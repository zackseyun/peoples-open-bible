translation:
  language: es
  text: Ando oscurecido[a], pero no por el sol[b]; me levanto en la asamblea y clamo pidiendo ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «de luto» o «ennegrecido». El hebreo puede evocar tanto duelo como una apariencia oscurecida.'
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «no por el sol». La frase sugiere que su estado oscurecido no se debe a la exposición solar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֵר
  english_pob_choice: darkened
  chosen_spanish: oscuro
  alternatives_spanish:
  - de luto
  - ennegrecido
  lexicon: HALOT
  rationale: El participio puede sugerir tanto un estado de duelo como una apariencia oscura o ennegrecida. 'Oscuro' conserva esa ambigüedad sin decidir demasiado rápido por una sola lectura. En español, 'de luto' es posible, pero restringe más el sentido emocional; 'ennegrecido' enfatiza lo físico.
- source_word: הִלַּכְתִּי
  english_pob_choice: I go about
  chosen_spanish: ando
  alternatives_spanish:
  - he andado
  - voy andando
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto poético describe un modo de vivir o moverse continuo. 'Ando' transmite en español esa vividez habitual mejor que un simple pasado, y mantiene el tono de lamento del verso.
- source_word: בְּלֹא חַמָּה
  english_pob_choice: but not by the sun
  chosen_spanish: pero no por el sol
  alternatives_spanish:
  - sin el sol
  - no a causa del sol
  lexicon: HALOT
  rationale: 'La idea es causal: su estado no proviene de la exposición solar. ''Pero no por el sol'' conserva el contraste y la causalidad de forma natural en español. ''Sin el sol'' puede sonar más general y perder el matiz causal.'
- source_word: קַמְתִּי
  english_pob_choice: I stand up
  chosen_spanish: me levanto
  alternatives_spanish:
  - me puse de pie
  - me alcé
  lexicon: HALOT
  rationale: Aquí קום introduce una acción pública y visible. 'Me levanto' es natural en español y mantiene la imagen de ponerse en pie ante la comunidad.
- source_word: בַקָּהָל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la reunión
  - en el congregado
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce bien קהל como un grupo reunido sin cargar el verso con un matiz eclesial posterior. ''Congregación'' es posible, pero en español suele sonar más confesional.'
- source_word: אֲשַׁוֵּעַ
  english_pob_choice: cry for help
  chosen_spanish: clamo pidiendo ayuda
  alternatives_spanish:
  - grito pidiendo ayuda
  - clamo
  lexicon: HALOT
  rationale: El piel de שוע expresa un clamor urgente de auxilio. 'Clamo pidiendo ayuda' explicita la dirección del ruego sin desbordar el hebreo. 'Grito pidiendo ayuda' es más áspero; 'clamo' solo podría quedar demasiado general.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del texto hebreo y el audit trail inglés: conserva la ambigüedad de קֹדֵר, mantiene el matiz causal de בְּלֹא חַמָּה y usa un verbo natural en español para la acción pública de Job.'
  spanish_consistency_notes:
  - Se usa 'asamblea' para קהל, en línea con el criterio de evitar sobretonos eclesiales no presentes en el hebreo.
  - Se evita 'Cristo', 'SEÑOR' o terminología doctrinal ajena al verso.
  - Los dos miembros del versículo se presentan con puntuación semicolonada para reflejar el paralelismo poético sin añadir contenido.
