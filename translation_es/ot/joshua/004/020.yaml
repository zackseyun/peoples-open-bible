  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Josué levantó/estableció las doce piedras que habían tomado del Jordán en Gilgal. Conserva bien el orden informativo principal y el pluscuamperfecto para la acción previa de tomar las piedras.'
  spanish_quality_summary: El español es claro y digno, pero «erigió» suena algo más monumental y formal de lo que exige הֵקִים en este contexto narrativo; «levantó» o «puso en pie» encaja mejor con piedras conmemorativas sin sobrerregistrar. Además, «las cuales» es gramatical pero menos natural que «que» en español bíblico moderno legible.
  glossary_alignment: 'No hay términos de glosario mayores en juego aparte de nombres propios. «Josué», «Jordán» y «Gilgal» están bien. La decisión principal es estilístico-lexical sobre הֵקִים: mejor «levantó» que «erigió» para fidelidad y naturalidad.'
  issues:
