translation:
  language: es
  text: Entonces Yahvé me mostró cuatro artesanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuatro herreros»; el término hebreo puede referirse más específicamente a trabajadores hábiles, como trabajadores del metal, pero en sentido más amplio significa artesanos o artífices.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יַּרְאֵ/נִי
  english_pob_choice: Then ... showed me
  chosen_spanish: Entonces ... me mostró
  alternatives_spanish:
  - Y me hizo ver
  - Y me mostró
  lexicon: HALOT
  rationale: El wayyiqtol con sufijo de 1cs expresa secuencia narrativa y acción visionaria; en español, «Entonces» conserva el avance del relato y «me mostró» reproduce de forma natural el sentido de «he caused me to see / showed me».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del tetragrámaton como «Yahvé», conforme al criterio terminológico del proyecto en español, preservando el nombre personal del pacto en lugar de sustituirlo por un título.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - cuatro
  lexicon: HALOT
  rationale: Es el cardinal masculino plural sencillo; «cuatro» expresa fielmente el número sin necesidad de matiz adicional.
- source_word: חָרָשִׁים
  english_pob_choice: craftsmen
  chosen_spanish: artesanos
  alternatives_spanish:
  - herreros
  - obreros especializados
  - artífices
  lexicon: HALOT
  rationale: El término hebreo puede abarcar trabajadores hábiles en varias disciplinas, no solo metalurgia. «Artesanos» conserva esa amplitud en español y evita restringir injustificadamente a «herreros» o «smiths».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrámaton. La forma española adoptada por defecto en este proyecto es «Yahvé», manteniendo el nombre propio de Dios y evitando la sustitución por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance semántico de חָרָשִׁים
  english_pob_reading: craftsmen
  chosen_spanish_reading: artesanos
  alternative_spanish_readings:
  - herreros
  - artífices
  rationale: La nota inglesa reconoce que el hebreo puede ser más específico («smiths») pero en el contexto visionario es más amplio. «Artesanos» conserva esa amplitud sin perder el rasgo de habilidad técnica.
  doctrine_reference: HALOT; nota lexical de ZEC.2.3
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre la traducción inglesa auditada y la revisión más reciente, sin cambios pendientes; la redacción española sigue la misma decisión léxica central y conserva la apertura semántica de חָרָשִׁים mediante la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Entonces» mantiene la secuencia narrativa del waw consecutivo sin sobretraducir.
  - «Artesanos» evita una restricción innecesaria a metalurgia y deja la alternativa documentada en nota.
