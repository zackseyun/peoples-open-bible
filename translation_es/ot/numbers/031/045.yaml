    rationale: La nota inglesa conserva una alternativa léxica real ('asses') frente al principal 'donkeys'. En español, la nota debe preservar una alternativa significativa; repetir la forma principal no aporta información y falla el propósito documental de la nota.
  revised_spanish_text: y los asnos[a], treinta mil y quinientos.
