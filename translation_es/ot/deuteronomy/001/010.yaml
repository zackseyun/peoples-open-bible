translation:
  language: es
  text: Yahvé su Dios los ha multiplicado[a], y he aquí, hoy ustedes son tan numerosos como las estrellas de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como las estrellas del cielo, en multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La elección inglesa del POB translitera el Nombre divino; en español, el equivalente estandarizado en este proyecto es «Yahvé», manteniendo el nombre propio del pacto y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - sus Dioses
  lexicon: HALOT
  rationale: En el contexto de pacto con YHWH como sujeto, el plural hebreo funciona como singular colectivo/titular. En español, «tu Dios» conserva la relación directa con la audiencia y reproduce el sentido singular del sustantivo.
- source_word: הִרְבָּה
  english_pob_choice: has multiplied
  chosen_spanish: te ha multiplicado
  alternatives_spanish:
  - te ha hecho numeroso
  - te ha aumentado
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer numeroso/aumentar. «Te ha multiplicado» conserva la fuerza verbal y la relación con la promesa de descendencia sin añadir explicación interpretativa.
- source_word: וְהִנְּכֶם
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y ved
  lexicon: HALOT
  rationale: La partícula deíctica introduce atención retórica al estado presente. «Y he aquí» reproduce ese golpe discursivo con dignidad y naturalidad en español bíblico contemporáneo.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: La referencia temporal inmediata se expresa de forma natural con «hoy», sin perder el énfasis de actualidad del hebreo.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: as the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - cual las estrellas del cielo
  lexicon: HALOT
  rationale: Se mantiene la imagen comparativa y el genitivo plural «de los cielos», que refleja de cerca la sintaxis hebrea y evita simplificarla a un singular donde el texto tiene plural.
- source_word: לָרֹב
  english_pob_choice: as numerous
  chosen_spanish: tan numerosos
  alternatives_spanish:
  - en gran multitud
  - en abundancia
  lexicon: HALOT
  rationale: La idea de cantidad/extensión en contexto comparativo se vierte de manera idiomática como «tan numerosos», que comunica el resultado sin sobrecargar con una construcción extraña en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el Nombre propio del pacto en la forma adoptada por el proyecto para español, coherente con la transliteración inglesa del POB y con la intención de no ocultar el Tetragrámaton tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se documentan revisiones posteriores que alteren el sentido. Se conserva la comparación poética y la partícula deíctica sin atenuarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el plural «los cielos» para reflejar el hebreo, en vez de reducirlo a «el cielo».
  - «Y he aquí» preserva la fuerza de atención del marcador discursivo.
  - La construcción «tan numerosos como» expresa bien el paralelo comparativo sin perder la imagen original.
