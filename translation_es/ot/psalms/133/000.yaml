  text: שִׁ֥יר הַֽ/מַּעֲל֗וֹת לְ/דָ֫וִ֥ד הִנֵּ֣ה מַה טּ֭וֹב וּ/מַה נָּעִ֑ים שֶׁ֖בֶת אַחִ֣ים גַּם יָֽחַד־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/133/000.yaml
  text: A Song of Ascents[a]. Of David. Behold[c][b], how good and how pleasant it is for brothers to dwell together.
  footnotes:
  - marker: a
    text: Or 'when kindred dwell together'; 'brothers' may refer to literal brothers or, more broadly, to members of the covenant community.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'together, indeed together'; the phrase emphasizes harmonious shared dwelling.
    reason: lexical_alternative
  - marker: c
    text: Or 'together in unity'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:44Z'
    unchanged: false
    changes_summary: 'Completed the verse by adding the omitted main clause: ''Behold, how good and how pleasant it is for brothers to dwell together.'''
translation:
  language: es
  text: Cántico de las subidas[a]. De David. Mira[c][b], cuán bueno y cuán agradable es que los hermanos habiten juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los parientes habitan juntos»; «los hermanos» puede referirse a hermanos literales o, de manera más amplia, a los miembros de la comunidad del pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «juntos, sí, juntos»; la expresión subraya la convivencia compartida.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en unidad».'
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁ֥יר הַֽמַּעֲל֗וֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de las subidas
  - Canto de ascensos
  lexicon: שִׁיר
  rationale: שִׁיר es simplemente 'cántico/canto'; 'ascensos' reproduce הַמַּעֲלֹות según la tradición auditada de la POB y evita una paráfrasis interpretativa.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  lexicon: לְ
  rationale: La preposición permite autoría o dedicación; 'De David' es la forma sobria y natural en español y conserva la ambigüedad del encabezado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: הִנֵּה
  rationale: '''Mira'' comunica la llamada retórica sin sonar tan arcaica como ''he aquí'', mientras mantiene el giro exhortativo del hebreo.'
- source_word: מַה טּוֹב וּמַה נָּעִים
  english_pob_choice: how good and how pleasant
  chosen_spanish: cuán bueno y cuán agradable
  alternatives_spanish:
  - qué bueno y qué agradable
  - cuán bueno y cuán placentero
  lexicon: טוֹב; נָעִים
  rationale: '''Bueno'' y ''agradable'' corresponden de forma directa a טוב y נעים; ''cuán'' refleja el valor exclamativo-retórico de מה sin añadir contenido.'
- source_word: שֶׁבֶת
  english_pob_choice: to dwell
  chosen_spanish: habiten
  alternatives_spanish:
  - vivan
  - habitar
  lexicon: יָשַׁב / שֶׁבֶת
  rationale: Aunque el sustantivo verbal puede sugerir 'sentarse', en este contexto la POB lo entiende como residencia compartida; 'habiten' preserva ese sentido de permanencia.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - hermanos
  - los miembros de la comunidad del pacto
  lexicon: אָח
  rationale: '''Los hermanos'' mantiene la forma básica de la POB y deja abierta la posibilidad de un sentido más amplio de parentesco o comunidad del pacto, sin forzarlo en el texto.'
- source_word: גַּם יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - también juntos
  - en unidad
  lexicon: גַּם; יַחַד
  rationale: El ajuste inglés reciente evitó 'in unity' por ser explicativo; en español 'juntos' transmite la cohesión del hebreo y funciona de manera natural. 'También juntos' sería demasiado literal y torpe; 'en unidad' introduce una expansión interpretativa no exigida por el hebreo.
theological_decisions:
- issue: Alcance de 'hermanos'
  english_pob_reading: brothers may refer to literal brothers or, more broadly, to members of the covenant community
  chosen_spanish_reading: los hermanos puede referirse a hermanos literales o, de modo más amplio, a los miembros de la comunidad del pacto
  alternative_spanish_readings:
  - hermanos de sangre
  - los creyentes
  rationale: La nota inglesa documenta una tensión lexical real; la traducción principal conserva 'los hermanos' sin cerrar el alcance, y la nota preserva la alternativa más amplia en español.
  doctrine_reference: Ps 133:1; lexical note on אָח
- issue: Énfasis de גַּם יָחַד
  english_pob_reading: the phrase emphasizes harmonious shared dwelling
  chosen_spanish_reading: juntos
  alternative_spanish_readings:
  - en armonía
  - en unidad
  rationale: El hebreo intensifica la idea de estar juntos; 'juntos' conserva el dato básico sin sobreteologizarlo. 'En armonía' y 'en unidad' explicitan más de lo que el texto exige y, en la revisión auditada, fueron evitadas por ese motivo.
  doctrine_reference: Ps 133:1; phrase-level emphasis
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'in unity' por 'together' para reflejar con más precisión יחד y evitar expansión interpretativa; por eso el español usa 'juntos' y no 'en unidad' en el texto principal, reservando 'en unidad' solo como alternativa en nota. También se incorporó la cláusula principal completa que faltaba en una revisión anterior.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - '''Cántico de ascensos'' sigue la terminología POB para el encabezado de peregrinación.'
  - Se prefirió 'habiten' para el valor durativo de שֶׁבֶת en contexto poético.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no presentes en el source packet.
