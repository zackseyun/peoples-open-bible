translation:
  language: es
  text: En aquel día haré de Jerusalén una piedra pesada[a] para todos los pueblos. Todos los que la carguen[b] se lastimarán gravemente[c], y todas las naciones de la tierra se reunirán contra ella[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una piedra de carga». El hebreo sugiere una piedra pesada o destinada a ser cargada, con matiz de peso gravoso.
    reason: lexical_alternative
  - marker: b
    text: O «los que la levanten». El verbo hebreo puede referirse tanto a cargar como a levantar una piedra pesada.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «ciertamente se cortarán / se harán heridas», una expresión hebrea intensificada para una lesión grave autoinfligida.
    reason: lexical_alternative
  - marker: d
    text: O «todas las naciones del país», si הָאָרֶץ se entiende en un sentido más local. Aquí se entiende en sentido amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בַיּוֹם הַהוּא
  english_pob_choice: And on that day
  chosen_spanish: Y sucederá en aquel día
  alternatives_spanish:
  - Y en aquel día
  - Y acontecerá en aquel día
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un anuncio profético y narrativo. «Sucedrá» conserva el valor idiomático de evento futuro; «en aquel día» mantiene el marcador temporal y su tono profético.
- source_word: אָשִׂים
  english_pob_choice: I will make
  chosen_spanish: haré de
  alternatives_spanish:
  - pondré
  - estableceré
  lexicon: HALOT
  rationale: Con Jerusalén como objeto y «piedra pesada» como complemento resultativo, «haré de» comunica bien el cambio de estado sin perder la fuerza causativa de שׂים.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio usual en español bíblico y plenamente inteligible.
- source_word: אֶבֶן מַעֲמָסָה
  english_pob_choice: a heavy stone
  chosen_spanish: una piedra pesada
  alternatives_spanish:
  - una piedra de carga
  - una piedra de tropiezo por su peso
  - una piedra gravosa
  lexicon: HALOT
  rationale: La expresión alude a una piedra para cargar/levantar, con peso que provoca daño. «Piedra pesada» conserva la imagen concreta y la incomodidad física; «de carga» sería más literal pero menos natural en español.
- source_word: לְכָל הָעַמִּים
  english_pob_choice: for all the peoples
  chosen_spanish: para todos los pueblos
  alternatives_spanish:
  - para todas las naciones
  lexicon: HALOT
  rationale: עַמִּים se distingue aquí de גּוֹיֵי más adelante. «Pueblos» conserva mejor esa diferencia léxica que «naciones».
- source_word: כָּל עֹמְסֶיהָ
  english_pob_choice: All who lift it
  chosen_spanish: Todos los que la carguen
  alternatives_spanish:
  - Todos los que la levanten
  - Todos los que la intenten cargar
  lexicon: HALOT
  rationale: El participio de עמס remite a cargar o levantar un peso. En español, «carguen» conserva la idea de intentar manejar la piedra pesada sin restringirla a un gesto técnico específico.
- source_word: שָׂרוֹט יִשָּׂרֵטוּ
  english_pob_choice: will surely injure themselves
  chosen_spanish: se lastimarán gravemente
  alternatives_spanish:
  - se cortarán gravemente
  - serán fuertemente rasgados
  lexicon: HALOT
  rationale: La combinación intensifica la lesión; el hebreo puede implicar corte/gasgado. «Se lastimarán gravemente» comunica el daño sin ocultar la intensidad ni forzar una imagen demasiado específica en español.
- source_word: וְנֶאֶסְפוּ עָלֶיהָ
  english_pob_choice: will gather against her
  chosen_spanish: se juntarán contra ella
  alternatives_spanish:
  - se reunirán contra ella
  - se agolparán contra ella
  lexicon: HALOT
  rationale: אָסף con עַל en contexto hostil expresa reunión adversaria. «Se juntarán contra ella» es natural en español y deja clara la hostilidad indicada por «contra».
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todas las naciones de la tierra habitada
  - todas las naciones del país
  lexicon: HALOT
  rationale: En este contexto profético amplio, «tierra» mejor refleja el alcance universal que «país»; además mantiene el contraste con «pueblos» de la primera mitad del versículo.
theological_decisions:
- issue: Alcance de la coalición hostil contra Jerusalén
  english_pob_reading: all the nations of the earth will gather against her
  chosen_spanish_reading: todas las naciones de la tierra se juntarán contra ella
  alternative_spanish_readings:
  - todas las naciones de la tierra se reunirán contra ella
  - todas las naciones del país se juntarán contra ella
  rationale: Se conserva la lectura amplia y escatológica del hebreo en este contexto, en línea con la decisión inglesa de preferir «earth» sobre «land». No se suaviza la oposición hostil; el «contra ella» mantiene el sentido adversativo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre «pueblos» y «naciones»
  english_pob_reading: peoples / nations
  chosen_spanish_reading: pueblos / naciones
  alternative_spanish_readings:
  - naciones / naciones
  - pueblos / pueblos
  rationale: 'Se preserva la distinción lexical del hebreo: עַמִּים y גּוֹיֵי no se nivelan en una sola palabra. Esto ayuda a reflejar el matiz y la progresión del verso sin introducir interpretación doctrinal adicional.'
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se comparó con el paquete fuente hebreo y con la traducción auditada en inglés POB. La versión española sigue las decisiones léxicas principales del inglés, pero ajusta la sintaxis para que suene natural en español y conserva las tensiones interpretativas relevantes: peso/carga de la piedra, intensidad de la lesión y alcance de «la tierra»/«el país».'
  spanish_consistency_notes:
  - Se mantuvo «Jerusalén» como nombre propio estándar.
  - Se distinguió «pueblos» de «naciones» para reflejar la diferencia entre עַמִּים y גּוֹיֵי.
  - Se usó «Yahvé» solo cuando corresponda en otros textos; este versículo no contiene el Tetragrámaton.
  - La imagen de daño se dejó general («se lastimarán gravemente») para no cerrar en exceso la posible fuerza de corte/gasgado del hebreo.
  - La puntuación conserva la articulación profética del inicio del versículo con dos segmentos bien marcados.
