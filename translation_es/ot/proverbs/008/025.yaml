revisions:
- from: Antes que los montes fueran asentados[a], antes de las colinas, yo fui dada a luz.
  to: Antes que los montes fueran asentados[a], antes de que existieran las colinas, fui dada a luz.
  rationale: Se conserva la elección central «fui dada a luz» por su fidelidad a la imaginería de origen sin imponer una lectura doctrinal más fuerte. Se repara la segunda cola para que el paralelismo temporal sea natural y completo en español, y se corrige la nota al pie para usar alternativas idiomáticas.
