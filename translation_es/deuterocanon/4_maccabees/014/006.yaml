translation:
  language: es
  text: Porque, así como las manos y los pies se mueven en armonía con las direcciones del alma, así también aquellos santos jóvenes, como si por el alma inmortal de la piedad[a], estuvieron en armonía con la muerte por causa de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la devoción» para εὐσέβεια.
    reason: lexical_alternative
  - marker: b
    text: 'El griego repite la familia συμφων-: las extremidades se mueven «en armonía», y los jóvenes también estuvieron «en armonía» con la muerte, destacando su resolución unificada.'
    reason: cross_reference
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - De la misma manera que
  lexicon: LSJ
  rationale: Introduce una comparación correlativa que en español se expresa de manera natural con "así como", manteniendo la estructura que se completa con οὕτως.
- source_word: συμφώνως
  english_pob_choice: in harmony
  chosen_spanish: en armonía
  alternatives_spanish:
  - en acuerdo
  - armónicamente
  lexicon: LSJ
  rationale: Conserva la imagen de concordia o ajuste entre las partes del cuerpo y evita una formulación demasiado técnica o abstracta.
- source_word: τοῖς τῆς ψυχῆς ἀφηγήμασιν
  english_pob_choice: the directions of the soul
  chosen_spanish: las direcciones del alma
  alternatives_spanish:
  - las indicaciones del alma
  - las órdenes del alma
  - las guías del alma
  lexicon: LSJ
  rationale: '"ἀφήγημα" puede abarcar guía, dirección o mandato; "direcciones" preserva la idea de conducción interna sin endurecer innecesariamente el matiz como "órdenes".'
- source_word: ἱεροὶ μειρᾶκες
  english_pob_choice: holy youths
  chosen_spanish: santos jóvenes
  alternatives_spanish:
  - jóvenes santos
  - jóvenes sagrados
  - muchachos santos
  lexicon: LSJ
  rationale: '"μειρᾶκες" designa jóvenes varones; "santos jóvenes" mantiene la fuerza moral/religiosa de ἱεροί y suena natural en español bíblico contemporáneo.'
- source_word: ὡς ὑπὸ ψυχῆς ἀθανάτου τῆς εὐσεβείας
  english_pob_choice: as if by the immortal soul of godliness
  chosen_spanish: como movidos por el alma inmortal de la piedad
  alternatives_spanish:
  - como si por el alma inmortal de la piedad
  - como movidos por el espíritu inmortal de la piedad
  - como si por el espíritu inmortal de la piedad
  lexicon: LSJ
  rationale: Conservo la personificación retórica sin convertirla en una afirmación doctrinal sobre una entidad separada. "Piedad" refleja bien εὐσέβεια en 4 Macabeos; "alma inmortal" mantiene el paralelismo figurado del griego.
- source_word: πρὸς τὸν ὑπὲρ αὐτῆς ... θάνατον
  english_pob_choice: with death for its sake
  chosen_spanish: con la muerte por causa de ella
  alternatives_spanish:
  - hacia la muerte por ella
  - con la muerte en favor de ella
  - para la muerte por ella
  lexicon: LSJ
  rationale: La frase griega expresa una muerte asumida en beneficio de la piedad; "por causa de ella" conserva el sentido direccional/teleológico sin forzar una construcción extraña.
- source_word: συνεφώνησαν
  english_pob_choice: were in accord with
  chosen_spanish: estuvieron en armonía con
  alternatives_spanish:
  - estuvieron de acuerdo con
  - concordaron con
  - estuvieron en acuerdo con
  lexicon: LSJ
  rationale: Mantiene el eco semántico de συμφώνως y el juego verbal con el verbo compuesto, preservando la insistencia retórica en la concordia.
theological_decisions:
- issue: Personificación de εὐσέβεια como "alma inmortal"
  english_pob_reading: Retained the figurative personification without turning it into a doctrinal statement about an actual separate soul.
  chosen_spanish_reading: Se conservó la personificación figurada sin convertirla en una afirmación doctrinal sobre un alma separada real.
  alternative_spanish_readings:
  - por el alma inmortal, es decir, la piedad
  - por el espíritu inmortal de la piedad
  - como impulsados por la piedad inmortal
  rationale: El griego es retórico y comparativo; la traducción debe preservar la imagen de una vida interior que mueve a los jóvenes, sin fijar una antropología filosófica que el texto no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma doctrinal.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB en inglés: se prefirió una equivalencia natural para ἀφηγήμασιν, se reflejó οὕτως con «así también», y se mantuvo la repetición de la raíz συμφων- con un mismo campo semántico de armonía/concuerdo en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto no trata este versículo.
  - Se conserva «piedad» como alternativa a «piedad/godliness» en la nota, porque εὐσέβεια admite ambos matices y el contexto de 4 Macabeos favorece el valor religioso.
  - Se evitó «Cristo», «siervo» y otras terminologías no pertinentes al versículo.
  - El tono es bíblico contemporáneo, no arcaizante, pero sin perder solemnidad.
