translation:
  language: es
  text: Me diste la espalda[a] de mis enemigos; destruí a los que me odiaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «me diste la nuca/el cuello de mis enemigos»; es un modismo para poner a los enemigos en fuga o dar victoria sobre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis foes
  - los que me son hostiles
  lexicon: HALOT
  rationale: אֹיֵב designa un adversario/enemigo personal; en español, «enemigos» es el equivalente natural y conserva la relación posesiva de primera persona.
- source_word: נָתַתָּה לִּי
  english_pob_choice: you gave me
  chosen_spanish: pusiste a ... la espalda
  alternatives_spanish:
  - me diste
  - entregaste a ...
  lexicon: HALOT
  rationale: El verbo נתן aquí funciona en un giro idiomático con עֹרֶף; en español, la construcción más fiel y comprensible no es literalizar «dar», sino expresar la imagen de derrotar al enemigo haciéndolo volver la espalda.
- source_word: עֹרֶף
  english_pob_choice: the backs
  chosen_spanish: la espalda
  alternatives_spanish:
  - la nuca
  - la parte posterior del cuello
  - las espaldas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cuello/nuca», pero el POB inglés revisado optó por el valor idiomático de derrota/ruta. En español, «la espalda» comunica bien esa imagen de fuga o retirada sin sonar forzado.
- source_word: וּמְשַׂנְאַי
  english_pob_choice: those who hated me
  chosen_spanish: a los que me odiaban
  alternatives_spanish:
  - a mis enemigos
  - a los que me aborrecían
  lexicon: HALOT
  rationale: El participio de שׂנא expresa una clase de personas caracterizadas por odio continuo; «a los que me odiaban» mantiene el participial y evita suavizar la hostilidad.
- source_word: אַצְמִיתֵם
  english_pob_choice: I destroyed
  chosen_spanish: los destruí
  alternatives_spanish:
  - los aniquilé
  - los exterminé
  - acabé con ellos
  lexicon: HALOT
  rationale: El hiphil de צמת denota hacer perecer o destruir. «Los destruí» conserva la fuerza sin añadir matices más absolutos que el español moderno podría cargar excesivamente.
theological_decisions:
- issue: Imagen idiomática de derrota en עֹרֶף
  english_pob_reading: Rendered concretely as 'the backs' rather than smoothing to 'the necks.'
  chosen_spanish_reading: «la espalda» / «volver la espalda» como imagen de derrota
  alternative_spanish_readings:
  - «la nuca»
  - «la parte posterior del cuello»
  - «hacer huir»
  rationale: 'La tensión no es doctrinal sino idiomática: el hebreo usa una imagen corporal de retirada/derrota. La redacción española conserva la imagen de forma natural, sin convertirla en una paráfrasis explicativa.'
  doctrine_reference: 'Principio de equivalencia óptima: prioridad al sentido figurado del texto fuente con inteligibilidad moderna.'
translation_notes:
  revision_awareness: El POB inglés pasó de 'necks' a 'backs' para reflejar mejor el modismo de derrota en עֹרֶף. La versión española sigue esa revisión, pero elige 'la espalda' en singular colectivo para una formulación más natural en español y mantiene el valor idiomático sin perder la imagen corporal.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo del verso: una cláusula de victoria sobre los enemigos y otra de destrucción de los que lo odiaban.'
  - No se usa 'SEÑOR' como sustituto; el versículo no nombra explícitamente a Yahvé en esta línea.
  - '''Odiaban'' conserva el matiz relacional y continuo del participio hebreo mejor que un sustantivo más genérico.'
  - La puntuación con punto y coma refleja dos miembros poéticos coordinados sin sobreexplicar la relación.
