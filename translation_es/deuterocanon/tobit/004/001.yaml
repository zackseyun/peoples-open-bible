translation:
  language: es
  text: Aquel día Tobit recordó[a] la plata[b] que había depositado con Gabael en Rages de Media[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acordó de». El verbo griego indica volver a pensar en algo ya conocido; «recordó» mantiene bien el sentido general.
    reason: lexical_alternative
  - marker: b
    text: O «el dinero». El griego ἀργύριον puede designar plata como metal o, por extensión, dinero acuñado o pesado.
    reason: lexical_alternative
  - marker: c
    text: «Rages» también se traduce comúnmente «Rhages».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: On that day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - En aquel día
  - Ese día
  lexicon: LSJ
  rationale: La expresión temporal griega es una referencia definida y directa. «Aquel día» conserva la deixis del texto y suena natural en español moderno sin añadir matiz interpretativo.
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - trajo a la memoria
  lexicon: BDAG
  rationale: El aoristo medio comunica que Tobit volvió a pensar en algo ya conocido. «Recordó» es claro y público en español; «se acordó de» sería también posible, pero menos sobrio en este registro.
- source_word: περὶ τοῦ ἀργυρίου
  english_pob_choice: the silver
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - la suma de dinero
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «la plata», el propio audit trail inglés reconoce que aquí ἀργύριον puede funcionar como dinero acuñado o pesado. En español, «el dinero» comunica mejor el valor funcional del depósito sin perder la referencia financiera.
- source_word: ὃ παρέθετο
  english_pob_choice: that he had deposited
  chosen_spanish: que había depositado
  alternatives_spanish:
  - que había confiado
  - que había puesto en depósito
  lexicon: LSJ
  rationale: El verbo παρατίθημι en este contexto tiene sentido financiero de entregar/poner en depósito. «Había depositado» reproduce bien ese valor técnico y mantiene la relación con la custodia del dinero.
- source_word: Γαβαήλῳ
  english_pob_choice: Gabael
  chosen_spanish: Gabael
  alternatives_spanish:
  - Gabaiel
  lexicon: transliteration
  rationale: Se conserva la transliteración del nombre propio según la forma griega del texto fuente.
- source_word: ἐν Ῥάγοις
  english_pob_choice: in Rages
  chosen_spanish: en Rages
  alternatives_spanish:
  - en Rhages
  lexicon: transliteration
  rationale: Se mantiene el topónimo transliterado desde el griego. «Rages» sigue la forma de Swete y es transparente para la lectura bíblica en español.
- source_word: τῆς Μηδίας
  english_pob_choice: of Media
  chosen_spanish: de Media
  alternatives_spanish:
  - en Media
  lexicon: transliteration
  rationale: La construcción genitiva griega identifica la región; en español, «de Media» es la forma más natural y fiel.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el griego de Swete y el audit trail inglés. La decisión principal en español fue resolver ἀργύριον con «dinero» para hacer explícita su función económica, sin perder la idea de depósito; el resto sigue de cerca la sintaxis y los nombres propios del original.
  spanish_consistency_notes:
  - Se mantiene «Gabael» y «Rages» como transliteraciones consistentes con la base griega.
  - Se usa «Media» como región, no «de los medos», para conservar la referencia geográfica del texto.
  - El verbo «recordó» evita una paráfrasis excesiva y conserva el valor puntual del aoristo.
