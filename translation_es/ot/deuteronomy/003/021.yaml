revisions:
- from: 'Y le mandé a Josué en aquel tiempo, diciendo: «Tus ojos han visto todo lo que Yahvé tu Dios hizo a estos dos reyes; así hará Yahvé a todos los reinos por los que tú vas pasando».[a]'
  to: 'Y le ordené a Josué en aquel tiempo, diciendo: «Tus ojos han visto todo lo que Yahvé tu Dios hizo a estos dos reyes; así hará Yahvé a todos los reinos por los que vas pasando[a]».'
  rationale: Se corrige la ubicación del marcador de nota para ajustarla a la cláusula que comenta, se afina צִוֵּיתִי como «ordené», y se mejora la fluidez de la cláusula final sin alterar el sentido documentado en la auditoría inglesa.
