review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego: «cruzaron el Jordán» refleja correctamente διέβησαν τὸν Ἰορδάνην, y los nombres están bien identificados. Sin embargo, dos elecciones se apartan del matiz documentado: ἐπορεύθησαν se entiende mejor aquí como «fueron» o «anduvieron/emprendieron camino» que «caminaron», y ἐν τῇ ἐρήμῳ según la auditoría inglesa debe conservar el sentido más amplio de «en la región despoblada / en el desierto silvestre», no cambiarse a «por el desierto», que además altera la preposición de ubicación.'
  spanish_quality_summary: El texto español es legible, pero «caminaron un trayecto de tres días» suena algo forzado y menos natural que «hicieron un viaje de tres días» o «fueron camino de tres días». También «por el desierto» introduce un giro menos fiel al original y menos acorde con la decisión auditada de evitar limitar ἔρημος a desierto arenoso. Una redacción más natural y fiel en español es «hicieron un viaje de tres días en la región despoblada».
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Los nombres propios están bien. La principal cuestión léxica es ἐρήμῳ: el proyecto inglés documenta «wilderness», por lo que en español conviene evitar una reducción innecesaria a «desierto»; «región despoblada» o «soledad» preservan mejor el alcance semántico. Asimismo, ἐπορεύθησαν no exige específicamente «caminaron».'
  issues:
  - severity: medium
    issue: «caminaron» para ἐπορεύθησαν es demasiado específico
    rationale: El griego expresa movimiento o viaje, no necesariamente el acto físico de caminar. «Caminaron» estrecha el sentido más de lo necesario y combina de manera poco natural con «un trayecto de tres días».
  - severity: medium
    issue: «por el desierto» cambia y estrecha ἐν τῇ ἐρήμῳ
    rationale: La preposición griega ἐν es locativa («en»), y la auditoría inglesa prefirió «wilderness» precisamente para no limitar el término a desierto arenoso. «Por el desierto» introduce una idea de tránsito y un paisaje más estrecho.
  - severity: low
    issue: «un trayecto de tres días» suena poco idiomático en este contexto
    rationale: Aunque es comprensible, en español bíblico y narrativo resulta más natural «un viaje de tres días» para expresar ὁδὸν τριῶν ἡμερῶν.
  revised_spanish_text: Y Judas Macabeo y Jonatán su hermano cruzaron el Jordán, e hicieron un viaje de tres días en la región despoblada.
  revision_rationale: 'Se revisa para reflejar mejor el sentido del griego y la auditoría inglesa: «hicieron un viaje de tres días» comunica mejor ἐπορεύθησαν ὁδὸν τριῶν ἡμερῶν que «caminaron un trayecto de tres días», y «en la región despoblada» preserva el valor más amplio de ἐν τῇ ἐρήμῳ sin reducirlo a un desierto arenoso ni cambiar la relación locativa.'
