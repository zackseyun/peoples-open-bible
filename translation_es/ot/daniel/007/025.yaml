translation:
  language: es
  text: Él hablará palabras contra el Altísimo, y desgastará a los santos del Altísimo. Pensará en cambiar los tiempos[a] y la ley, y ellos serán entregados en su mano[b] por un tiempo, tiempos[c], y medio tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiempos señalados»; posiblemente se refiere a estaciones fijas o tiempos festivos.
    reason: lexical_alternative
  - marker: b
    text: O «serán entregados a él»; el referente implícito más natural es los santos.
    reason: alternative_reading
  - marker: c
    text: Literalmente, «por un tiempo, tiempos, y medio tiempo»; puede denotar un período limitado, a menudo entendido como tres tiempos y medio o años.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִלִּין / מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - cosas
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: El sustantivo arameo plural significa ‘palabras’ o ‘asuntos’. En este contexto de habla hostil, ‘palabras’ es la opción más directa y natural en español, y mantiene la fuerza del ataque verbal.
- source_word: לְצַד עֶלְיָא
  english_pob_choice: against the Most High
  chosen_spanish: contra el Altísimo
  alternatives_spanish:
  - frente al Altísimo
  - al lado del Altísimo
  - contra el Más Alto
  lexicon: HALOT
  rationale: 'El valor contextual es adversativo: el cuerno se opone a Dios. ‘Altísimo’ conserva el título divino usual y suena natural en español bíblico.'
- source_word: יְמַלִּל
  english_pob_choice: he will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - dirá
  - pronunciará
  - expresará
  lexicon: HALOT
  rationale: El verbo denota hablar o decir. ‘Hablará’ es idiomático en español y conserva el matiz predictivo sin añadir intensidad innecesaria.
- source_word: קַדִּישֵׁי עֶלְיוֹנִין
  english_pob_choice: the saints of the Most High
  chosen_spanish: los santos del Altísimo
  alternatives_spanish:
  - los santos del Más Alto
  - los santos del Altísimo Dios
  - los seres santos del Altísimo
  lexicon: HALOT
  rationale: ‘Santos’ mantiene la lectura tradicional y concisa adoptada por el POB, sin forzar aquí una aclaración como ‘seres’ o ‘ángeles’. En Daniel, el referente más probable son los fieles de Dios, pero el texto deja la expresión abierta.
- source_word: יְבַלֵּא
  english_pob_choice: he will wear out
  chosen_spanish: agotará
  alternatives_spanish:
  - desgastará
  - hostigará
  - oprimirá
  - consumirá
  lexicon: HALOT
  rationale: El verbo puede expresar desgaste o agotamiento por presión continua. ‘Agotará’ comunica bien la acción sostenida y evita una lectura demasiado física de ‘desgastar’, aunque esa imagen permanece implícita.
- source_word: וְיִסְבַּר
  english_pob_choice: he will intend
  chosen_spanish: pensará en
  alternatives_spanish:
  - intentará
  - propondrá
  - planea
  - pretenderá
  lexicon: HALOT
  rationale: El verbo puede significar pensar, proponerse o intentar. ‘Pensará en’ conserva el carácter mental/volitivo y deja claro que se trata de una intención, no de un hecho consumado.
- source_word: לְהַשְׁנָיָה
  english_pob_choice: to change
  chosen_spanish: cambiar
  alternatives_spanish:
  - alterar
  - modificar
  lexicon: HALOT
  rationale: 'El sentido causativo es directo: buscar cambiar realidades establecidas. ‘Cambiar’ es claro y fiel sin sobreinterpretación.'
- source_word: זִמְנִין
  english_pob_choice: times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las estaciones
  - los tiempos señalados
  - los tiempos fijados
  - los momentos
  lexicon: HALOT
  rationale: ‘Tiempos’ mantiene la ambigüedad del arameo, que puede aludir a tiempos fijados o a temporadas/fechas. El artículo plural en español ayuda a que la frase suene natural.
- source_word: וְדָת
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - el decreto
  - la norma
  - la sentencia
  lexicon: HALOT
  rationale: Aunque el arameo puede significar ‘ley’ o ‘decreto’, ‘ley’ encaja mejor con el paralelo ‘tiempos y ley’ y es la forma más inteligible en español bíblico.
- source_word: וְיִתְיַהֲבוּן
  english_pob_choice: they will be given
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán dados
  - serán puestos
  - serán puestos en manos
  lexicon: HALOT
  rationale: La pasiva expresa entrega o traspaso de control. ‘Serán entregados’ suena natural en español y conserva la idea de cesión bajo poder ajeno.
- source_word: בִּידֵהּ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - bajo su control
  - en su dominio
  lexicon: HALOT
  rationale: La imagen idiomática de la ‘mano’ como poder se conserva en español. ‘En su mano’ mantiene la metáfora bíblica sin explicitarla excesivamente.
- source_word: עַד עִדָּן וְעִדָּנִין וּפְלַג עִדָּן
  english_pob_choice: for a time, times, and half a time
  chosen_spanish: por un tiempo, tiempos, y medio tiempo
  alternatives_spanish:
  - por un tiempo, dos tiempos, y medio tiempo
  - por un tiempo, tiempos, y la mitad de un tiempo
  - por un tiempo, tiempos, y medio período
  lexicon: HALOT
  rationale: Se conserva la fórmula apocalíptica idiomática sin convertirla en años exactos. ‘Medio tiempo’ refleja bien la estructura del hebreo/arameo y preserva la tensión interpretativa.
theological_decisions:
- issue: Referente de ‘los santos del Altísimo’
  english_pob_reading: God's holy people
  chosen_spanish_reading: los santos del Altísimo, sin precisar más en el texto
  alternative_spanish_readings:
  - el pueblo santo del Altísimo
  - los seres santos del Altísimo
  - los ángeles del Altísimo
  rationale: En Daniel 7, los ‘santos’ se relacionan estrechamente con quienes reciben el reino (vv. 18, 22, 27). La traducción mantiene la expresión tradicional sin resolver dentro del texto si son el pueblo fiel, seres celestiales o ambas cosas en la perspectiva profética.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Sentido de la fórmula temporal final
  english_pob_reading: retain the idiomatic apocalyptic formula without converting it into exact calendar units
  chosen_spanish_reading: mantener la fórmula apocalíptica sin convertirla en años exactos
  alternative_spanish_readings:
  - tres años y medio
  - un período simbólico limitado
  - tres tiempos y medio
  rationale: La frase puede leerse numéricamente o simbólicamente, pero el texto usa una fórmula fija. La versión española conserva esa forma para no imponer un esquema cronológico concreto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se revisó el pasaje y no se requirieron cambios respecto del último pase auditado; la concordancia con la fuente y con el POB inglés es alta, con solo matices menores de estilo español.
  spanish_consistency_notes:
  - Se mantuvo ‘Altísimo’ para el título divino, coherente con el uso bíblico y con la política de no ocultar el nombre divino cuando el contexto arameo lo expresa directamente.
  - Se conservó la metáfora de la ‘mano’ para b/yadêh, en lugar de reemplazarla por una paráfrasis abstracta.
  - Se optó por ‘santos’ en vez de ‘santos/seres santos/ángeles’ para seguir el POB inglés y no cerrar indebidamente el referente.
  - La fórmula temporal final quedó literal y con nota, para preservar la ambigüedad apocalíptica del arameo.
