translation:
  language: es
  text: una tierra que Yahvé tu Dios cuida; los ojos de Yahvé tu Dios están siempre sobre ella[a], desde el comienzo del año hasta el fin del año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'busca' o 'se ocupa de'. El verbo hebreo puede denotar buscar, inquirir o cuidar; aquí expresa la atención activa de Yahvé a la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - terreno
  lexicon: HALOT
  rationale: En Deuteronomio aquí se refiere a la tierra prometida como territorio de pacto; en español, "tierra" es natural y fiel. "País" suena más moderno pero puede perder el matiz bíblico; "terreno" es demasiado restringido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del texto hebreo. "Yahvé" sigue la convención del proyecto para יְהוָה y evita la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: El sufijo de 2 ms se rinde de forma directa y natural en español como "tu Dios".
- source_word: דֹּרֵשׁ אֹתָהּ
  english_pob_choice: cares for
  chosen_spanish: cuida
  alternatives_spanish:
  - busca
  - se ocupa de
  - atiende
  lexicon: HALOT
  rationale: El verbo דרש puede expresar buscar, inquirir o cuidar/ocuparse de. Con un objeto como "tierra" y a la luz de la cláusula sobre los ojos de Yahvé, "cuida" comunica bien la atención activa sin perder la tensión semántica documentada.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: La revisión inglesa prefirió "always" por naturalidad formal; en español, "siempre" es el equivalente más claro y idiomático, manteniendo la duración continua.
- source_word: עֵינֵי יְהוָה אֱלֹהֶיךָ בָּהּ
  english_pob_choice: the eyes of Yahweh your God are always on it
  chosen_spanish: los ojos de Yahvé tu Dios están siempre sobre ella
  alternatives_spanish:
  - los ojos de Yahvé tu Dios están en ella
  - los ojos de Yahvé tu Dios la observan siempre
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de "los ojos" para no diluir el texto. "Sobre ella" reproduce bien la idea de atención vigilante; "en ella" suena menos natural en español para esta metáfora.
- source_word: מֵרֵשִׁית הַשָּׁנָה
  english_pob_choice: from the beginning of the year
  chosen_spanish: desde el comienzo del año
  alternatives_spanish:
  - desde el principio del año
  - desde el inicio del año
  lexicon: HALOT
  rationale: '"רֵאשִׁית" designa el inicio o comienzo. "Comienzo" es claro, elevado y fiel al valor temporal del hebreo.'
- source_word: וְעַד אַחֲרִית שָׁנָה
  english_pob_choice: to the end of the year
  chosen_spanish: hasta el fin del año
  alternatives_spanish:
  - hasta el final del año
  - hasta el término del año
  lexicon: HALOT
  rationale: '"אַחֲרִית" aquí significa el final o término de un período. "Fin" mantiene la simetría con "comienzo" y resulta sobrio y bíblicamente natural.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se conserva el nombre personal de Dios revelado a Israel, en lugar de sustituirlo por un título. La forma "Yahvé" es la convención del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen antropomórfica de "los ojos" de Dios
  english_pob_reading: the eyes of Yahweh your God are always on it
  chosen_spanish_reading: los ojos de Yahvé tu Dios están siempre sobre ella
  alternative_spanish_readings:
  - Dios la vigila siempre
  - está siempre atento a ella
  rationale: La frase mantiene la metáfora hebrea de vigilancia y atención divina. Evitar una paráfrasis como "vigila" o "está atento" preserva mejor el efecto textual y la transparencia semántica.
  doctrine_reference: Antropomorfismo bíblico controlado por el contexto
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió "always" sobre "continually" por naturalidad formal, y se reflejó en español con "siempre". También se conservó el ajuste del audit trail que mantiene la imagen de vigilancia de los ojos de Yahvé sobre la tierra.
  spanish_consistency_notes:
  - Se usó "Yahvé" de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió "tierra" para אֶרֶץ como equivalente bíblico natural y no se sustituyó por "país".
  - Se mantuvo la metáfora de "los ojos" sin desactivarla en una paráfrasis.
  - '"Comienzo" y "fin" preservan el paralelismo temporal del hebreo y suenan naturales en español.'
  - La nota al pie aclara la amplitud semántica de דרש sin perder la elección principal del texto.
