translation:
  language: es
  text: 'Habla a los hijos de Israel[a] y diles: Cuando un hombre[b] de entre ustedes traiga una ofrenda a Yahvé, ustedes traerán su ofrenda de entre el ganado: del vacuno o del rebaño.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'el pueblo de Israel'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'una persona' o 'cualquiera'. El hebreo tiene 'un hombre' (adam) usado aquí en sentido representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conservo la fórmula hebrea formal y su fuerza genealógica/covenantal. En español, 'hijos de Israel' es fiel, inteligible y mantiene la imagen original mejor que una generalización como 'pueblo de Israel'.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - cualquiera
  - alguien
  lexicon: HALOT
  rationale: El sustantivo singular funciona aquí de manera representativa en una instrucción legal. 'Un hombre' preserva la forma masculina del hebreo y el caso individual; las opciones inclusivas suavizan demasiado esa fuerza.
- source_word: יַקְרִיב
  english_pob_choice: brings
  chosen_spanish: presente
  alternatives_spanish:
  - traiga
  - ofrezca
  - acerque
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa presentar o acercar una ofrenda. 'Presente' suena natural en español y mantiene la idea de llevar algo delante de Yahvé sin reducirla a 'ofrezca', que puede sonar más interpretativo.
- source_word: מִכֶּם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - entre ustedes
  lexicon: HALOT
  rationale: 'La partícula es partitiva: no dice simplemente ''de ustedes'' sino ''de entre ustedes''. Esa precisión evita perder el matiz comunitario del caso legal.'
- source_word: קָרְבָּן
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - una ofrenda presentada
  - un sacrificio
  - una presentación
  lexicon: HALOT
  rationale: '''Ofrenda'' es el equivalente más natural y amplio en español para qorban en esta ley introductoria. ''Sacrificio'' es demasiado estrecho porque el término abarca más que un acto de inmolación.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Sigo el criterio del proyecto de renderizar el nombre divino como 'Yahvé' y mantengo la preposición con valor direccional/relacional como en el hebreo. 'A Yahvé' es más directo que 'para Yahvé'.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: del ganado
  alternatives_spanish:
  - de los animales domésticos
  - de la ganadería
  lexicon: HALOT
  rationale: '''Ganado'' funciona bien en español general para la categoría doméstica apta para sacrificio y resulta más natural que un calco como ''livestock''.'
- source_word: הַבָּקָר
  english_pob_choice: the herd
  chosen_spanish: del vacuno
  alternatives_spanish:
  - del hato
  - de la res
  lexicon: HALOT
  rationale: Aquí el término se refiere al ganado bovino como subcategoría. 'Vacuno' expresa con claridad esa clase animal y evita una posible ambigüedad de 'herd' traducido solo como 'rebaño'.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de las ovejas y las cabras
  - del hato menor
  lexicon: HALOT
  rationale: El término colectivo se refiere a ovinos y caprinos. 'Rebaño' conserva el valor colectivo y la pareja natural con 'vacuno' en español.
- source_word: תַּקְרִיבוּ אֶת קָרְבַּנְכֶם
  english_pob_choice: you shall bring your offering
  chosen_spanish: ustedes presentarán su ofrenda
  alternatives_spanish:
  - ustedes traerán su ofrenda
  - ustedes ofrecerán su ofrenda
  lexicon: HALOT
  rationale: Mantengo la segunda persona plural como instrucción comunitaria. 'Presentarán' enlaza con el mismo campo semántico de יקריב y evita repetir 'ofrenda' de manera torpe, aunque la repetición del sustantivo sigue siendo fiel al hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide usar 'Yahvé' como forma principal en español. Esto conserva el nombre propio del pacto y evita la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Valor representativo de אָדָם
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - cualquiera
  rationale: La escena legal introduce un caso singular representativo. Mantener 'un hombre' preserva la señalización masculina del hebreo y su función ejemplar sin convertirla en abstracto general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Ámbito del ofrecimiento sacrificial
  english_pob_reading: an offering
  chosen_spanish_reading: una ofrenda
  alternative_spanish_readings:
  - un sacrificio
  - una ofrenda presentada
  rationale: '''Ofrenda'' respeta el alcance amplio de קָרְבָּן en esta legislación inicial. ''Sacrificio'' podría sugerir solo inmolación y empobrecer el término.'
  doctrine_reference: HALOT; sacrificial-context usage
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la traducción española sigue la lectura auditada estable, conservando las decisiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Conservo 'hijos de Israel' para reflejar la fórmula hebrea formal y evitar una neutralización innecesaria.
  - Uso 'Yahvé' de forma consistente para יהוה, conforme a la directriz del proyecto en español.
  - Mantengo la segunda persona plural ('ustedes') para el mandato comunitario final.
  - '''Ofrenda'' se usa de manera uniforme para קָרְבָּן, sin forzarlo a ''sacrificio''.'
