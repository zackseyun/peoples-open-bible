translation:
  language: es
  text: No les ocultaré ninguna palabra[a]. Ya he dicho que es bueno ocultar el secreto de un rey, pero es bueno revelar gloriosamente[b] las obras de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nada». El griego πᾶν ῥῆμα puede entenderse literalmente como «toda palabra» o, en este contexto, como «ningún asunto / nada de lo que voy a decir».
    reason: lexical_alternative
  - marker: b
    text: O «con honor» o «honrosamente». El adverbio puede describir la manera conveniente y digna de dar a conocer las obras de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ κρύψω
  english_pob_choice: I will certainly not hide
  chosen_spanish: No les ocultaré
  alternatives_spanish:
  - No esconderé
  - De ningún modo les ocultaré
  lexicon: BDAG
  rationale: La combinación enfática οὐ μή + subjuntivo con valor futuro requiere una negación muy fuerte. «No les ocultaré» comunica con naturalidad la certeza y la fuerza negativa sin añadir paráfrasis.
- source_word: ἀφʼ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: les
  alternatives_spanish:
  - de ustedes
  - de vosotros
  lexicon: BDAG
  rationale: 'En español, con «ocultar» la idea de retener algo de alguien se expresa de forma idiomática con complemento indirecto: «ocultarles». Conserva el sentido de withholding implícito en el griego.'
- source_word: πᾶν ῥῆμα
  english_pob_choice: any word
  chosen_spanish: ninguna palabra
  alternatives_spanish:
  - ningún asunto
  - nada
  lexicon: BDAG
  rationale: El sentido es que no omitirá nada de lo que va a comunicar. «Ninguna palabra» preserva la correspondencia léxica con ῥῆμα y su fuerza totalizante, sin sonar rígido en español.
- source_word: εἴρηκα δὴ
  english_pob_choice: I have indeed said
  chosen_spanish: Ya he dicho
  alternatives_spanish:
  - He dicho en efecto
  - Sí he dicho
  lexicon: BDAG
  rationale: El perfecto con δή aporta énfasis y estado vigente. «Ya he dicho» transmite esa afirmación previa y enfática en un español natural y solemne.
- source_word: μυστήριον βασιλέως
  english_pob_choice: a king’s secret
  chosen_spanish: el secreto de un rey
  alternatives_spanish:
  - un secreto real
  - el misterio de un rey
  lexicon: BDAG
  rationale: Aquí μυστήριον no debe cargarse con el sentido teológico de «misterio»; en contexto designa un asunto confidencial. «El secreto de un rey» sigue de cerca la lectura auditada en inglés y evita introducir connotaciones ajenas.
- source_word: κρύψαι καλόν
  english_pob_choice: It is good to hide
  chosen_spanish: es bueno ocultar
  alternatives_spanish:
  - es bueno esconder
  - conviene ocultar
  lexicon: BDAG
  rationale: El infinitivo con καλόν expresa una máxima general. «Es bueno ocultar» conserva el valor proverbial y el paralelo con «revelar» del segundo miembro.
- source_word: τὰ δὲ ἔργα τοῦ θεοῦ
  english_pob_choice: the works of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - los hechos de Dios
  - las acciones de Dios
  lexicon: BDAG
  rationale: «Obras» es la equivalencia más directa y solemne para ἔργα, manteniendo la amplitud de las acciones divinas.
- source_word: ἀνακαλύπτειν
  english_pob_choice: to reveal
  chosen_spanish: revelar
  alternatives_spanish:
  - descubrir
  - desvelar
  lexicon: BDAG
  rationale: El verbo significa desvelar o hacer conocido. «Revelar» preserva el contraste con «ocultar» y suena natural en español bíblico contemporáneo.
- source_word: ἐνδόξως
  english_pob_choice: gloriously
  chosen_spanish: gloriosamente
  alternatives_spanish:
  - con honor
  - honrosamente
  - de modo glorioso
  lexicon: LSJ
  rationale: El adverbio puede denotar una manera espléndida o con honor. «Gloriosamente» mantiene la conexión con la gloria, siguiendo la solución auditada en inglés.
theological_decisions:
- issue: Sentido de μυστήριον en un contexto sapiencial/proverbial
  english_pob_reading: secret
  chosen_spanish_reading: secreto
  alternative_spanish_readings:
  - misterio
  rationale: En este versículo se trata de información confidencial, no del uso doctrinal posterior de «misterio». «Secreto» evita imponer una lectura teológica que el contexto no exige.
  doctrine_reference: Translation philosophy §1; priorizar el sentido llano del texto fuente sobre terminología tradicional.
- issue: Matiz de ἐνδόξως
  english_pob_reading: gloriously
  chosen_spanish_reading: gloriosamente
  alternative_spanish_readings:
  - con honor
  - honrosamente
  rationale: El griego permite una manera honorable o espléndida de hacer algo público. La forma elegida conserva la relación con «gloria» y deja abierta la posible resonancia de honor sin borrar la tensión semántica.
  doctrine_reference: Principio de equivalencia óptima; mantener ambigüedad significativa cuando el original la admite.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y el griego de Swete. Se conservó la negación enfática, el valor de μυστήριον como «secreto» y la ambigüedad de ἐνδόξως mediante «gloriosamente», sin cambios respecto al pase revisado más reciente.
  spanish_consistency_notes:
  - Se emplea «Dios» para τοῦ θεοῦ, conforme al estándar del proyecto.
  - Se usa «obras» para ἔργα por su registro bíblico amplio y solemne.
  - Se evitó «misterio» para μυστήριον porque en este contexto el inglés auditado documenta la opción «secret».
