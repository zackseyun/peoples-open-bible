id: JHN.3.18
reference: John 3:18
source:
  edition: SBLGNT
  text: ὁ πιστεύων εἰς αὐτὸν οὐ κρίνεται· ὁ ⸀δὲ μὴ πιστεύων ἤδη κέκριται, ὅτι μὴ πεπίστευκεν εἰς τὸ ὄνομα τοῦ μονογενοῦς υἱοῦ τοῦ θεοῦ.
translation:
  text: The one who believes in him is not judged[a]; but the one who does not believe has already been judged[b], because he has not believed in the name of the one and only Son of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judged' in both occurrences of 'condemned.' The Greek verb is κρίνω, which can mean 'judge' or, in context, 'condemn.'
    reason: lexical_alternative
  - marker: b
    text: Or 'only Son,' 'unique Son'; traditionally, 'only begotten Son.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - whoever believes
  - the one believing
  lexicon: BDAG
  rationale: Articular present participle used substantivally; 'the one who believes' preserves the ongoing/generic force without sounding wooden. 'Whoever believes' is possible but slightly more idiomatic than the Greek form requires here.
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  lexicon: BDAG
  rationale: With πιστεύω, εἰς commonly expresses personal trust directed toward someone; standard English idiom is 'believes in him.'
- source_word: οὐ κρίνεται
  chosen: is not condemned
  alternatives:
  - is not judged
  lexicon: BDAG
  rationale: In Johannine context κρίνω here carries the sense of adverse judgment resulting in condemnation, especially in contrast with 'has already been condemned' later in the verse. 'Judged' is more formally possible, but 'condemned' better captures the judicial force in context.
- source_word: ὁ δὲ μὴ πιστεύων
  chosen: but the one who does not believe
  alternatives:
  - but whoever does not believe
  - but the one not believing
  lexicon: BDAG
  rationale: δέ marks contrast; the articular participle is again rendered substantivally. 'Does not believe' is natural English for μή with the participle.
- source_word: ἤδη κέκριται
  chosen: has already been condemned
  alternatives:
  - has already been judged
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior action; 'has already been condemned' preserves both the completed and continuing force. Context favors 'condemned' over the broader 'judged.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the prior statement; 'because' is the clearest modern English rendering.
- source_word: μὴ πεπίστευκεν
  chosen: he has not believed
  alternatives:
  - he did not believe
  lexicon: BDAG
  rationale: Perfect tense again suggests an abiding condition of unbelief rather than a mere past momentary act; 'has not believed' preserves that force.
- source_word: εἰς τὸ ὄνομα
  chosen: in the name
  alternatives:
  - into the name
  - in the authority of the name
  lexicon: BDAG
  rationale: This is standard Johannine idiom. 'Name' includes the person's revealed identity and authority, but the text itself says 'name,' so the translation keeps the concrete term rather than unpacking it in the main text.
- source_word: τοῦ μονογενοῦς υἱοῦ
  chosen: of the one and only Son
  alternatives:
  - of the only Son
  - of the unique Son
  - of the only begotten Son
  lexicon: BDAG
  rationale: μονογενής in Johannine usage emphasizes uniqueness/one-of-a-kind sonship. 'One and only Son' communicates this clearly in modern English. 'Only begotten' preserves historical tradition but can mislead modern readers into hearing a biological nuance not required by current lexical evidence.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward genitive identifying whose Son is in view.
