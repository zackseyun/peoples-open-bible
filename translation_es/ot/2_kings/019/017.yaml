translation:
  language: es
  text: Verdaderamente[a], oh Yahvé[b], los reyes de Asiria han asolado las naciones y sus tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En verdad» o «Ciertamente» para la afirmación de apertura.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «su tierra»; el singular probablemente tiene sentido colectivo/distributivo, por eso se traduce «sus tierras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְנָם
  english_pob_choice: Truly
  chosen_spanish: Verdaderamente
  alternatives_spanish:
  - En verdad
  - Ciertamente
  - Seguro
  lexicon: HALOT
  rationale: אָמְנָם introduce una afirmación enfática; «Verdaderamente» conserva esa fuerza con un español natural y digno. Evita sonar demasiado arcaico y sigue de cerca la función discursiva del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'El Tetragrámaton se vierte con el nombre divino en la forma usada por el proyecto en español: «Yahvé». Conserva el nombre propio del pacto, no un título sustituto.'
- source_word: הֶחֱרִיבוּ
  english_pob_choice: have laid waste
  chosen_spanish: han asolado
  alternatives_spanish:
  - han devastado
  - han destruido
  - han arrasado
  lexicon: HALOT
  rationale: El hifil de חרב expresa causar ruina o devastación militar. «Han asolado» comunica bien esa devastación histórica sin reducirla a una destrucción genérica.
- source_word: מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria
  chosen_spanish: los reyes de Asiria
  alternatives_spanish:
  - los reyes asirios
  - los monarcas de Asiria
  lexicon: HALOT
  rationale: La cadena constructa es directa; «los reyes de Asiria» es transparente, fiel y natural en español.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: En este contexto bélico y geopolítico, גוים designa naciones conquistadas. «Las naciones» conserva el alcance colectivo del hebreo.
- source_word: אַרְצָם
  english_pob_choice: their lands
  chosen_spanish: sus tierras
  alternatives_spanish:
  - su tierra
  - sus países
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo plural, funciona de modo colectivo/distributivo en referencia a «las naciones». «Sus tierras» refleja mejor ese sentido en español que un singular literal.
theological_decisions:
- issue: Uso del nombre divino יהוה/YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión doctrinal y traductológica del proyecto de no ocultar el nombre divino bajo un título. En español, «Yahvé» es la forma preferida y reconocible para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: opening affirmation emphatic, divine name rendered as Yahvé, military devastation sense for הֶחֱרִיבוּ, and distributive plural sense for אַרְצָם. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para preservar el nombre divino según la política del proyecto.
  - «Han asolado» mantiene el matiz de devastación bélica sin añadir interpretación.
  - «Sus tierras» sigue la decisión distributiva ya documentada para אַרְצָם.
  - El registro es sobrio y bíblico, pero no arcaizante.
