translation:
  language: es
  text: Como zorros[a] entre las ruinas[b], así han sido[c] tus profetas, Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como chacales entre las ruinas». La palabra hebrea (שׁוּעָל) se traduce generalmente como «zorro», pero algunos la interpretan más ampliamente como un carroñero del desierto similar al chacal.
    reason: lexical_alternative
  - marker: b
    text: O «en las ruinas» o «en los lugares desolados».
    reason: lexical_alternative
  - marker: c
    text: O «fueron».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשֻׁעָלִים
  english_pob_choice: Like foxes
  chosen_spanish: Como zorros
  alternatives_spanish:
  - Como chacales
  lexicon: HALOT
  rationale: El prefijo כְּ marca comparación ('como/al igual que'). שׁוּעָל se traduce establemente como 'zorro' en español, siguiendo el inglés POB 'foxes.' La imagen del carroñero astuto encaja con el contexto de denuncia profética. La alternativa 'chacales' queda documentada en la nota [a], al igual que en el inglés.
- source_word: בָּחֳרָבוֹת
  english_pob_choice: among ruins
  chosen_spanish: entre las ruinas
  alternatives_spanish:
  - en las ruinas
  - en los lugares desolados
  lexicon: HALOT
  rationale: חֳרָבוֹת denota ruinas o lugares devastados. La forma בָּ ante ח lleva alargamiento compensatorio del artículo definido הַ, lo que morfológicamente justifica 'las ruinas.' La preposición española 'entre' corresponde al ב locativo con matiz distributivo y es más natural que 'en medio de' o 'en.' Se preserva la imagen de desolación sin paráfrasis.
- source_word: נְבִיאֶיךָ
  english_pob_choice: your prophets
  chosen_spanish: tus profetas
  lexicon: HALOT
  rationale: Plural constructo de נָבִיא con sufijo pronominal de 2ms. 'Tus profetas' preserva la fuerza posesiva y la interpelación directa a Israel sin añadir valoraciones ajenas al texto. La posesión implica responsabilidad colectiva, pertinente al contexto de denuncia.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel (vocative)
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Sustantivo propio en función vocativa. La revisión inglesa del POB (2026-04-23) adoptó 'O Israel' en lugar de la aposición 'your prophets, Israel.' El español equivalente es 'oh Israel,' que marca claramente el vocativo en el registro profético solemne sin resultar arcaico. La coma antes de 'oh Israel' delimita el vocativo.
- source_word: הָיוּ
  english_pob_choice: have been
  chosen_spanish: han sido
  alternatives_spanish:
  - fueron
  lexicon: HALOT
  rationale: Qal perfecto 3cp de היה. El pretérito perfecto compuesto español 'han sido' recoge la fuerza estativa y resultativa que el inglés POB documentó con 'have been,' destacando que el estado acusado persiste como hecho establecido. El pretérito indefinido 'fueron' es posible y queda consignado en la nota [c], pero pierde el matiz resultativo.
theological_decisions:
- issue: Si 'tus profetas' debe calificarse explícitamente como 'falsos' en el texto principal
  english_pob_reading: Retain 'your prophets' without adding 'false'
  chosen_spanish_reading: tus profetas (sin calificativo)
  alternative_spanish_readings:
  - tus falsos profetas
  rationale: 'El texto hebreo dice simplemente נְבִיאֶיךָ (''tus profetas''). El inglés POB documentó explícitamente la decisión de no añadir ''false/falsos,'' pues importaría un juicio interpretivo derivado del contexto en lugar de traducir las palabras presentes. El español mantiene la misma fidelidad al texto fuente: la condena emerge del contexto inmediato (Ez 13:1–3), no de un añadido editorial.'
  doctrine_reference: 'Filosofía de traducción: nunca parafrasear más allá de lo que el texto fuente justifica; preservar la dicción propia del texto.'
translation_notes:
  revision_awareness: 'El inglés POB fue revisado el 2026-04-23 (gpt-5.4): el orden de palabras se ajustó a un inglés formal natural y se añadió ''so'' para hacer más explícita la estructura comparativa; el vocativo pasó de aposición a ''O Israel.'' El borrador español incorpora ambas decisiones: ''así'' refleja el ''so'' conectivo de la revisión (fortaleciendo la comparación כְּ...הָיוּ), y ''oh Israel'' adopta el tratamiento vocativo. El español no genera tensiones adicionales respecto a la revisión inglesa; la posición final del vocativo es la más natural en español para el registro profético solemne.'
  spanish_consistency_notes:
  - El nombre divino יהוה no aparece en este versículo; la norma del proyecto ('Yahvé') no se aplica aquí.
  - La voz 'profetas' (נְבִיאֶיךָ) se usa sin calificativo, conforme a la decisión teológica documentada.
  - El vocativo 'oh Israel' sigue la convención de discurso profético directo adoptada en el proyecto para los libros proféticos del AT.
  - No hay ocurrencias de δοῦλος, χάρις, σάρξ ni otros términos del glosario del proyecto en este versículo.
