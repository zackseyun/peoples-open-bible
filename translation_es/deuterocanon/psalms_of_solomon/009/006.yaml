translation:
  language: es
  text: Y las obras de justicia[a] de tus piadosos[b] están delante de ti, Señor; y ¿dónde se esconderá un hombre[c] de tu conocimiento, oh Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego αἱ δικαιοσύναι es el plural de δικαιοσύνη y expresa actos concretos de rectitud. También puede traducirse «las justicias» o «los actos de rectitud».
    reason: lexical_alternative
  - marker: b
    text: Griego ὁσίων, término de piedad convenantal distinto de ἁγίων («santos»). En este contexto también podría traducirse «tus fieles».
    reason: lexical_alternative
  - marker: c
    text: 'Griego ἄνθρωπος, masculino singular de uso genérico: se refiere a cualquier ser humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοσύναι
  english_pob_choice: righteous deeds
  chosen_spanish: obras de justicia
  alternatives_spanish:
  - las justicias
  - los actos de rectitud
  - las rectitudes
  lexicon: BDAG
  rationale: El griego δικαιοσύναι es el plural de δικαιοσύνη y denota actos concretos de rectitud, no la cualidad abstracta en singular. «Las justicias» preservaría el plural del original pero resulta arcaica y torpe en español moderno. «Obras de justicia» agrega «obras» (ausente en el lexema griego), pero reproduce fielmente la concreción que el plural expresa —paralelo al razonamiento documentado en el POB inglés para preferir «righteous deeds» sobre el calco literal «righteousnesses». El valor por defecto del proyecto (δικαιοσύνη → «justicia/rectitud») queda honrado en el término base.
- source_word: ὁσίων
  english_pob_choice: holy ones
  chosen_spanish: piadosos
  alternatives_spanish:
  - santos
  - fieles
  - devotos
  - consagrados
  lexicon: BDAG
  rationale: ὅσιος denota piedad convenantal y devoción leal, y es léxicamente distinto de ἅγιος (el término propio de «santos» en sentido cultual-sagrado). En el contexto de los Salmos de Salomón, ὅσιοι muy probablemente refleja el hebreo ḥasidim, el grupo sociológico de fieles del Segundo Templo. En español, «santos» es la traducción convencional más conocida pero arrastra fuertes connotaciones eclesiásticas (canonizados, intercesores). «Piadosos» captura mejor la piedad activa, convenantal, sin esas resonancias. El rastro de revisiones del POB inglés registra tensión entre «holy ones» y «pious ones»; para el borrador español se opta por «piadosos» con documentación explícita.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - Amo
  lexicon: BDAG
  rationale: 'El valor por defecto del proyecto para יהוה/YHWH es «Yahvé», pero la instrucción exige explicar la decisión cuando la fuente inmediata es el griego κύριος. Los Salmos de Salomón se conservan únicamente en griego, sin original hebreo extante, de modo que κύριε funciona aquí como título divino de pleno derecho, no como sustituto convencional del Tetragrámaton en una traducción de la LXX. Por tanto, «Señor» es la opción correcta: preserva la fuerza del título sin imponer la lectura Yahvé a un texto en el que no hay un יהוה subyacente identificable.'
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - nadie
  lexicon: BDAG
  rationale: ἄνθρωπος en singular masculino genérico se vierte como «un hombre» siguiendo la política del proyecto (género preciso, no neutro) y la decisión documentada en el POB inglés. En la pregunta retórica española «¿dónde se esconderá un hombre…?», el uso genérico —cualquier ser humano— es transparente para el lector.
- source_word: κρυβήσεται
  english_pob_choice: hide himself
  chosen_spanish: se esconderá
  alternatives_spanish:
  - podría esconderse
  - estará oculto
  - se ocultará
  lexicon: BDAG
  rationale: El futuro medio κρυβήσεται lleva fuerza reflexiva («esconderse a sí mismo»). El español «se esconderá» reproduce ambas dimensiones —futuro e implicación reflexiva— de forma idiomática y natural.
- source_word: γνώσεώς
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - ciencia
  - sabiduría
  lexicon: BDAG
  rationale: γνῶσις/γνώσεως en este contexto expresa la consciencia omnisciente de Dios. «Conocimiento» es la traducción directa y natural; «sabiduría» correspondería a σοφία y sería inexacta aquí.
- source_word: ἐνώπιόν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: BDAG
  rationale: «Delante de» es idiomático en español moderno y refleja el sentido espacial de presencia abierta que ἐνώπιον conlleva. «Ante» es ligeramente más formal y igualmente válido; se prefiere «delante de» por mayor accesibilidad.
theological_decisions:
- issue: Representación genérica de ἄνθρωπος en pregunta retórica
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - nadie
  - alguien
  rationale: El proyecto adopta la política de género preciso (gender-accurate) en lugar de género neutro. ἄνθρωπος singular masculino con referencia genérica se preserva como «un hombre» en la pregunta retórica; el referente abarca a toda la humanidad, lo que el contexto retórico deja claro.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: κύριε como título divino en texto griego sin original hebreo — ¿«Señor» o «Yahvé»?
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: La política del proyecto ordena «Yahvé» para יהוה/YHWH y exige explicar el caso cuando la fuente es el griego κύριος. Los Salmos de Salomón son un texto deuterocanónico conservado en griego, posiblemente compuesto en hebreo pero sin original extante. En ausencia de un יהוה subyacente identificable, κύριε es un título divino autónomo y no un enmascaramiento del Tetragrámaton. «Señor» es por tanto la opción fiel y transparente, coherente con el tratamiento del proyecto para κύριος en textos griegos propios.
  doctrine_reference: Política de nombre divino del proyecto — Yahvé reservado para יהוה/YHWH; κύριος en textos griegos propios → «Señor»
- issue: 'ὅσιοι: piedad convenantal frente a santidad cultual'
  english_pob_reading: holy ones
  chosen_spanish_reading: piadosos
  alternative_spanish_readings:
  - santos
  - fieles
  rationale: El rastro de revisiones del POB inglés documenta tensión real entre «holy ones» y «pious ones» para ὅσιοι en este texto. La distinción léxica entre ὅσιος (piedad activa, fidelidad convenantal) y ἅγιος (santidad, separación) es teológicamente significativa y no debe borrarse. En español, «santos» transmite de forma casi automática la connotación de ἅγιος, mientras que «piadosos» refleja mejor la devoción convenantal de ὅσιος, especialmente en el contexto de los Salmos de Salomón, donde el término alude probablemente a los ḥasidim.
  doctrine_reference: Fidelidad léxica al campo semántico de ὅσιος frente a ἅγιος en literatura del Segundo Templo
translation_notes:
  revision_awareness: 'El rastro de revisiones del POB inglés (PSS.9.6) registra dos debates documentados: (1) δικαιοσύναι: el adjudicador de fase 10 cambió «the righteousnesses» a «righteous deeds» por ser un calco anglicado; la revisión final de gpt-5.4 confirmó «righteous deeds». El borrador español adopta «obras de justicia», paralelo al razonamiento del POB inglés. (2) ὁσίων: el adjudicador propuso «pious ones» aludiendo a los ḥasidim; la revisión final revirtió a «holy ones» por registro formal. El borrador español prefiere «piadosos» sobre «santos» con justificación fuente-explícita, preservando la tensión documentada en nota al pie en lugar de aplanarla.'
  spanish_consistency_notes:
  - κύριε (κύριος) se vierte «Señor», no «Yahvé», conforme a la política del proyecto para κύριος en textos griegos propios donde no hay un יהוה subyacente identificable.
  - ὁ θεός se vierte «Dios» según el valor por defecto del proyecto (θεός → «Dios»).
  - δικαιοσύναι plural se vierte «obras de justicia» para preservar la concreción del plural griego sin recurrir al calco «las rectitudes» o la forma arcaica «las justicias».
  - ὅσιοι se vierte «piadosos» en lugar de «santos», manteniendo la distinción léxica con ἅγιοι y reflejando la fuerza convenantal del término en la literatura del Segundo Templo.
  - ἄνθρωπος genérico se vierte «un hombre» conforme a la política de género preciso del proyecto.
