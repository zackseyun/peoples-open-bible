translation:
  language: es
  text: Y el Jordán servía de límite para él por el lado oriental[a]. Esta fue la herencia de los hijos de Benjamín, según sus límites por todos lados[b], por sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo delimitaba» / «era su límite». El hebreo indica que el Jordán servía como linde territorial.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Benjamín», designación tribal para los descendientes de Benjamín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיַּרְדֵּן
  english_pob_choice: And the Jordan
  chosen_spanish: Y el Jordán
  alternatives_spanish:
  - Y el río Jordán
  lexicon: HALOT
  rationale: Se conserva el nombre propio del río con el artículo normal en español. No hace falta añadir 'río' porque 'el Jordán' es natural y fiel al uso bíblico y geográfico.
- source_word: יִגְבֹּל אֹתוֹ
  english_pob_choice: formed its border
  chosen_spanish: formó su límite
  alternatives_spanish:
  - fue su límite
  - delimitó su territorio
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto territorial expresa función de linde o delimitación. 'Formó su límite' conserva la fuerza geográfica sin sonar forzado en español.
- source_word: לִפְאַת קֵדְמָה
  english_pob_choice: on the east side
  chosen_spanish: por el lado oriental
  alternatives_spanish:
  - al lado oriental
  - hacia el oriente
  lexicon: HALOT
  rationale: '''פאה'' es ''lado/borde'' y ''קֵדְמָה'' señala el oriente. ''Por el lado oriental'' comunica la orientación territorial con claridad y dignidad.'
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Ésta fue
  lexicon: HALOT
  rationale: El demostrativo resume la declaración sobre la herencia. En español se expresa naturalmente con verbo copulativo en pasado, como en la línea narrativa.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión heredada
  - el patrimonio
  lexicon: HALOT
  rationale: '''נחלה'' en Josué designa la porción territorial asignada a la tribu. ''Herencia'' conserva el peso legal y pactual sin perder naturalidad.'
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los descendientes de Benjamín
  - la tribu de Benjamín
  lexicon: HALOT
  rationale: Se mantiene la designación tribal literal del hebreo. 'Hijos de Benjamín' es transparente y conserva el carácter genealógico del texto.
- source_word: לִגְבוּלֹתֶיהָ
  english_pob_choice: according to its borders
  chosen_spanish: según sus límites
  alternatives_spanish:
  - conforme a sus fronteras
  - según sus fronteras
  lexicon: HALOT
  rationale: La forma femenina remite a la herencia/territorio. 'Límites' reproduce bien la idea de lindes fijadas; 'fronteras' es posible, pero menos exacto en este contexto de reparto tribal.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno
  - por todos lados
  lexicon: HALOT
  rationale: Indica el contorno perimetral del territorio. 'Alrededor' es claro y corresponde al valor espacial del término.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus grupos familiares
  lexicon: HALOT
  rationale: '''מִשְׁפָּחוֹת'' aquí señala subgrupos tribales. ''Clanes'' evita diluir la organización tribal y sigue de cerca la precisión del inglés POB.'
translation_notes:
  revision_awareness: Coincide con el pasaje auditado de alta concordancia; no se detectaron revisiones aplicadas en el inglés POB más reciente, por lo que la redacción española sigue de cerca la lectura aprobada y conserva las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto solo cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se usa 'herencia' para נַחֲלָה en sentido de reparto territorial tribal, coherente con Josué.
  - '''Hijos de Benjamín'' conserva la designación tribal literal y se acompaña de nota para aclarar el valor colectivo.'
