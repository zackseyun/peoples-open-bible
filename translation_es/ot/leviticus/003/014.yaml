review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y preserva los elementos principales: presentación ritual, porción tomada del animal, ofrenda a Yahvé, y la descripción de la grasa que cubre y está sobre las entrañas. Sin embargo, hay dos desajustes relevantes con la evidencia y la auditoría inglesa: (1) מִמֶּנּוּ se refiere al animal/ofrenda y en español "de él" suena personal/masculino, cuando el referente no debe leerse como persona; conviene "de esta" o una formulación equivalente. (2) La POB inglesa escogió como texto principal para אִשֶּׁה "a food offering" y reservó "offering by fire" para nota; el español invirtió esa decisión sin justificar suficientemente una excepción. Debe mantenerse un equivalente principal que refleje la decisión documentada y dejar la alternativa tradicional en nota.'
  spanish_quality_summary: El español es generalmente claro y digno, pero "Y presentará de él" resulta poco natural y ambiguo en lectura pública. La frase mejora con "Y de esta presentará su ofrenda". Además, "una ofrenda de alimento" suena mejor en español bíblico moderno que "una ofrenda hecha por fuego" como texto principal, siempre con nota para la opción tradicional. El resto —"la grasa", "que cubre", "las entrañas", "sobre las entrañas"— es legible y fiel.
  glossary_alignment: 'Se alinea correctamente con el proyecto en "Yahvé" para יהוה. También conserva bien "ofrenda" para קָרְבָּן y "grasa" para חֵלֶב. El principal problema terminológico es אִשֶּׁה: el borrador usa en texto principal la alternativa tradicional, mientras que la auditoría inglesa fijó como principal "food offering". En español, "ofrenda de alimento" preserva mejor esa decisión, y la alternativa "ofrenda hecha por fuego" debe quedar en nota.'
  issues:
  - severity: medium
    issue: '"de él" para מִמֶּנּוּ'
    rationale: Aunque gramaticalmente posible, en español sugiere con facilidad un referente personal masculino. El hebreo remite al animal/ofrenda del contexto. "De esta" o "de él" no son equivalentes en claridad; aquí conviene evitar ambigüedad.
  - severity: medium
    issue: Texto principal para אִשֶּׁה no sigue la decisión auditada
    rationale: La POB inglesa eligió "a food offering" como lectura principal y dejó "an offering by fire" en nota. El borrador español invierte esa jerarquía sin necesidad suficiente. Debe reflejarse la decisión documentada en el texto principal español.
  - severity: low
    issue: Fluidez sintáctica inicial
    rationale: '"Y presentará de él su ofrenda" suena trabado en español. Reordenar a "Y de esta presentará su ofrenda" mejora naturalidad sin perder formalidad ni precisión.'
  revised_spanish_text: 'Y de esta presentará su ofrenda, una ofrenda de alimento[a] a Yahvé: la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas,'
  revised_footnotes:
  - marker: a
    text: O «una ofrenda hecha por fuego». El término hebreo אִשֶּׁה se suele verter tradicionalmente así en contextos sacrificiales.
    reason: lexical_alternative
