translation:
  language: es
  text: 'Y la sembraré para mí en la tierra[b], y tendré misericordia de Sin Misericordia[a], y diré a No Pueblo Mío[a]: «Tú eres mi pueblo», y él dirá[c]: «Mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: los nombres tradicionalmente transliterados Lo-ruhamá y Lo-ammi; aquí se traducen como «Sin Misericordia» y «No Pueblo Mío» para conservar el juego verbal de juicio revertido en restauración.'
    reason: alternative_reading
  - marker: b
    text: O «en el país». El hebreo puede significar «tierra» o «país»; aquí «tierra» conserva un sentido más amplio, mientras el contexto de restauración del pacto también favorece la idea de la tierra del pueblo.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «y él dirá». El singular masculino probablemente personifica al pueblo restaurado como un solo respondiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְרַעְתִּיהָ
  english_pob_choice: I will sow her
  chosen_spanish: la sembraré
  alternatives_spanish:
  - la plantaré
  - la esparciré
  lexicon: HALOT
  rationale: זרע en sentido agrícola se conserva mejor con «sembrar», que mantiene la imagen de restauración y el juego profético con el trasfondo de juicio/reanudación. El sufijo femenino singular se refleja con «la», coherente con la referencia a la comunidad/persona simbólica.
- source_word: לִּי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en favor de mí
  lexicon: HALOT
  rationale: El dativo expresa beneficio/pertenencia. «Para mí» es natural en español y conserva la idea de apropiación/restauración por parte de Yahvé sin sobrecargar el texto.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país». Aquí «tierra» es fiel al campo semántico y suficientemente amplio; en español bíblico también puede aludir al ámbito del pacto sin forzar una precisión geográfica mayor de la que el hebreo requiere.
- source_word: וְרִחַמְתִּי
  english_pob_choice: I will have mercy on
  chosen_spanish: tendré misericordia de
  alternatives_spanish:
  - me compadeceré de
  - mostraré misericordia a
  lexicon: HALOT
  rationale: רחם expresa compasión/misericordia. «Tendré misericordia de» es una fórmula bíblica clara en español y conserva la reversión del nombre simbólico Lo-Ruhamah. Se evita «compadecer» porque en español puede sonar menos directo y menos litúrgico en este contexto.
- source_word: לֹא רֻחָמָה
  english_pob_choice: No Mercy
  chosen_spanish: No Compadecida
  alternatives_spanish:
  - Sin Misericordia
  - No Misericordiada
  - Lo-Ruhamá
  lexicon: HALOT
  rationale: Es un nombre simbólico que conviene traducir para preservar el juego verbal con la promesa de misericordia. «No Compadecida» intenta mantener el valor pasivo del participio y la fuerza de reversión; se documenta la alternativa tradicional transliterada para lectores familiarizados con el nombre hebreo.
- source_word: וְאָמַרְתִּי
  english_pob_choice: I will say
  chosen_spanish: diré
  alternatives_spanish:
  - diré entonces
  - declararé
  lexicon: HALOT
  rationale: אָמַר es un verbo simple de habla. «Diré» es la equivalencia más directa y natural en español, sin introducir matices declarativos que no están explicitados en el hebreo.
- source_word: לְלֹא עַמִּי
  english_pob_choice: to Not My People
  chosen_spanish: a No Mi Pueblo
  alternatives_spanish:
  - a Lo-Ammi
  - a No es mi pueblo
  lexicon: HALOT
  rationale: El nombre simbólico se traduce para mantener la transparencia del oráculo y su reversión. «No Mi Pueblo» conserva la estructura nominal breve; el «a» responde al complemento de destinatario del verbo decir.
- source_word: עַמִּי אַתָּה
  english_pob_choice: You are my people
  chosen_spanish: Tú eres mi pueblo
  alternatives_spanish:
  - Vosotros sois mi pueblo
  - Ustedes son mi pueblo
  lexicon: HALOT
  rationale: La fórmula del pacto se vierte de manera natural en español. El hebreo marca singular; «tú» preserva esa singularidad, aunque el referente sea colectivo, sin necesidad de pluralizar ni neutralizar la personificación.
- source_word: וְהוּא יֹאמַר
  english_pob_choice: and he will say
  chosen_spanish: y él dirá
  alternatives_spanish:
  - y dirá
  - y ellos dirán
  lexicon: HALOT
  rationale: El hebreo usa un masculino singular. «Él dirá» respeta la forma gramatical y la personificación del pueblo restaurado como un solo respondiente, siguiendo la observación del audit trail.
- source_word: אֱלֹהָי
  english_pob_choice: My God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La confesión de pertenencia del pacto se expresa con «mi Dios», forma transparente y sobria en español. Se evita invertir el orden a «Dios mío», que en español puede sonar exclamativo o devocional de manera distinta a la simple confesión relacional del hebreo.
theological_decisions:
- issue: Traducción de los nombres simbólicos como reversión profética
  english_pob_reading: Translate the names as 'No Mercy' and 'Not My People' in the main text
  chosen_spanish_reading: Traducir los nombres como «No Compadecida» y «No Mi Pueblo» en el texto principal
  alternative_spanish_readings:
  - Lo-Ruhamá / Lo-Ammi
  - Sin Misericordia / No Mi Pueblo
  rationale: La teología del pasaje depende del contraste entre juicio y restauración. Traducir los nombres hace visible la inversión profética en español y evita ocultar el juego de palabras bajo transliteraciones. Se mantiene la tensión semántica sin resolverla; la transliteración queda como alternativa legítima para lectores que conocen la tradición.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Singular masculino en la respuesta del pueblo restaurado
  english_pob_reading: Retain singular masculine 'he will say'
  chosen_spanish_reading: Mantener «él dirá»
  alternative_spanish_readings:
  - dirán
  - ellos dirán
  rationale: El hebreo es explícitamente singular masculino. Conservarlo en español respeta la forma del texto y la personificación corporativa del pueblo, en vez de suavizarla a un plural genérico.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral'
- issue: Elección de «tierra» frente a «país» o «tierra prometida»
  english_pob_reading: '''land'' fits Hosea''s covenant-restoration context more specifically'
  chosen_spanish_reading: «en la tierra»
  alternative_spanish_readings:
  - en el país
  - en la tierra prometida
  rationale: El hebreo אֶרֶץ admite varios matices, pero el contexto del pacto favorece «tierra». «Tierra prometida» añade una especificación que el hebreo no dice aquí; «país» puede sonar demasiado moderno o político.
  doctrine_reference: 'Translation philosophy: lexical specificity without over-interpretation'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que prefirió «have mercy on» por ser más natural; en español se optó por la fórmula bíblica «tendré misericordia de», igualmente natural y fiel al verbo רחם. También se conservó la lectura singular masculina de la respuesta final y la traducción transparente de los nombres simbólicos, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino en el proyecto, pero en este versículo no aparece el tetragrámaton; por eso no se introduce en el texto.
  - «Mi Dios» se conserva sin capitalización especial en español, conforme a la puntuación y uso natural.
  - La secuencia nominal de los nombres simbólicos se traduce de modo consistente para no ocultar la reversión retórica del pasaje.
