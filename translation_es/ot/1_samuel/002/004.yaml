review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el paralelismo y conserva la imaginería concreta del hebreo: arcos, tropiezo y ceñir con fuerza. Sin embargo, la nota c no preserva fielmente la alternativa inglesa documentada, porque ''han ceñido fuerza'' omite el pronombre reflexivo necesario en español para la lectura alternativa de ''have girded themselves with strength''.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial general. 'Los arcos de los valientes son quebrados, pero los que tropiezan son ceñidos con fuerza' suena bien y mantiene el tono poético. La única reparación necesaria es la formulación de la nota alternativa final para que sea idiomática y exacta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones 'arcos', 'valientes', 'quebrados', 'tropiezan', 'ceñidos' y 'fuerza' son coherentes con el análisis fuente y con la filosofía de preservar la metáfora poética.
  issues:
  - severity: medium
    issue: La nota al pie c está mal formulada en español.
    rationale: El inglés auditado ofrece la alternativa 'have girded themselves with strength'. En español, 'han ceñido fuerza' es poco natural y además no expresa el matiz reflexivo; debe ser algo como 'se han ceñido de fuerza' o equivalente idiomático.
  revised_spanish_text: Los arcos de los valientes[a] son quebrados[b], pero los que tropiezan son ceñidos con fuerza[c].
  revised_footnotes:
  - marker: a
    text: O 'los poderosos'.
    reason: lexical_alternative
  - marker: b
    text: O 'son rotos'.
    reason: lexical_alternative
  - marker: c
    text: O 'se han ceñido de fuerza'.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota c para reflejar con precisión e idiomaticidad la alternativa documentada en inglés, añadiendo el valor reflexivo requerido en español.
