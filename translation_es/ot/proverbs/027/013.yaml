translation:
  language: es
  text: Toma su prenda[a], porque salió fiador por un extraño; y reténla en prenda por una mujer extranjera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toma una prenda de él por una mujer extranjera». El hebreo de la segunda línea es muy conciso, y el verbo puede entenderse como tomar o retener una garantía del propio hombre.'
    reason: lexical_alternative
  - marker: b
    text: «Mujer extranjera» traduce un término hebreo que puede significar una mujer no israelita o, en Proverbios, una mujer social o moralmente ajena; se conserva aquí la redacción amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Coge
  lexicon: HALOT
  rationale: El imperativo de לקח pide una orden directa. «Toma» es natural, claro y mantiene la fuerza proverbial sin añadir matices ajenos.
- source_word: בִּגְדוֹ
  english_pob_choice: his garment
  chosen_spanish: su ropa
  alternatives_spanish:
  - su manto
  - su vestidura
  lexicon: HALOT
  rationale: בגד puede referirse a una prenda o ropa exterior. «Ropa» es un equivalente amplio y comprensible en español, sin restringir indebidamente la imagen legal de garantía.
- source_word: עָרַב
  english_pob_choice: has put up security
  chosen_spanish: salió fiador
  alternatives_spanish:
  - se comprometió como garantía
  - se hizo garante
  lexicon: HALOT
  rationale: En este contexto משפטי/financiero, ערב expresa salir fiador o garantizar una obligación ajena. «Salió fiador» es idiomático en español y conserva la carga legal.
- source_word: זָר
  english_pob_choice: a stranger
  chosen_spanish: un extraño
  alternatives_spanish:
  - un forastero
  - un desconocido
  lexicon: HALOT
  rationale: El término señala a alguien ajeno al círculo propio; «extraño» conserva esa idea relacional y prudencial mejor que una traducción étnica más específica.
- source_word: וּבְעַד
  english_pob_choice: and ... for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en favor de
  lexicon: HALOT
  rationale: La preposición introduce la persona por quien se asume la garantía. En español, «por» mantiene la brevedad del paralelismo hebreo.
- source_word: נָכְרִיָּה
  english_pob_choice: a foreign woman
  chosen_spanish: una mujer extranjera
  alternatives_spanish:
  - una mujer forastera
  - una mujer extraña
  lexicon: HALOT
  rationale: נכריה denota literalmente una mujer extranjera o ajena. «Extranjera» es la opción más directa y deja abierta la posible connotación moral sin imponerla.
- source_word: חַבְלֵהוּ
  english_pob_choice: hold it in pledge
  chosen_spanish: reténla en prenda
  alternatives_spanish:
  - tómala en prenda
  - úsala como prenda
  lexicon: HALOT
  rationale: חבל en contextos de prenda expresa tomar o retener una garantía. «Reténla en prenda» preserva el valor jurídico y el referente implícito al objeto empeñado, aquí femenino por concordancia con «ropa».
theological_decisions:
- issue: Sentido de נָכְרִיָּה en Proverbios
  english_pob_reading: foreign woman retains broader wording, since the term can mean non-Israelite or morally illicit woman
  chosen_spanish_reading: mujer extranjera mantiene el sentido amplio, sin limitarlo a una categoría moral específica
  alternative_spanish_readings:
  - mujer extraña
  - adúltera
  rationale: El hebreo admite una referencia social/étnica amplia y, en Proverbios, puede evocar también una mujer moralmente peligrosa. «Mujer extranjera» preserva esa tensión sin cerrarla interpretativamente.
  doctrine_reference: Proverbios 2; Proverbios 5–7; cautela sapiencial sobre vínculos ilícitos
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene la lectura óptima-equivalente del texto fuente y del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo jurídico-económico de la línea hebrea sin suavizarlo a una expresión general.
  - Se conservó «mujer extranjera» para reflejar la amplitud semántica documentada por el POB en inglés.
  - No se sustituyó la imagen de prenda por un lenguaje más explicativo que borrara la tensión léxica del segundo hemistiquio.
  - La concordancia pronominal en «reténla» sigue a «ropa», que funciona como referente implícito de la prenda.
