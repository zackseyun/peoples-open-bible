id: MRK.4.30
reference: Mark 4:30
source:
  edition: SBLGNT
  text: Καὶ ἔλεγεν· ⸀Πῶς ὁμοιώσωμεν τὴν βασιλείαν τοῦ θεοῦ, ἢ ἐν ⸀τίνι ⸂αὐτὴν παραβολῇ θῶμεν⸃;
translation:
  text: And he was saying[a], “How should we compare the kingdom of God, or in what parable should we set it forth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with what parable should we present it?” The Greek ἐν τίνι παραβολῇ θῶμεν can be rendered more instrumentally, emphasizing the means by which the kingdom is described.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or iterative speech in narrative. 'He was saying' preserves the aspect more transparently than the simple past 'he said,' while remaining natural English.
- source_word: Πῶς
  chosen: How
  alternatives:
  - By what means
  - In what way
  lexicon: BDAG
  rationale: Introduces the manner of comparison. 'How' is the most natural and direct English equivalent in this rhetorical question.
- source_word: ὁμοιώσωμεν
  chosen: should we compare
  alternatives:
  - shall we liken
  - may we compare
  lexicon: BDAG
  rationale: Aorist subjunctive in a deliberative question is well represented by 'should we compare.' 'Liken' is more traditional but less natural in contemporary English.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and transparent rendering. 'Kingdom' preserves the established semantic range and imagery; 'reign' captures dynamic rule but is narrower and less idiomatic here.
- source_word: ἢ
  chosen: or
  alternatives:
  - or else
  lexicon: BDAG
  rationale: Coordinates the second deliberative question as an alternative formulation of the first.
- source_word: ἐν τίνι ... παραβολῇ
  chosen: in what parable
  alternatives:
  - with what parable
  - by what parable
  lexicon: BDAG
  rationale: The preposition ἐν with the dative can be rendered instrumentally or associatively here. 'In what parable' is a close rendering of the Greek wording, while still intelligible in English.
- source_word: παραβολῇ
  chosen: parable
  alternatives:
  - illustration
  - comparison
  lexicon: BDAG
  rationale: '''Parable'' is the established and contextually precise term in the Synoptic Gospels. Alternatives flatten the literary and theological category.'
- source_word: αὐτὴν ... θῶμεν
  chosen: should we set it forth
  alternatives:
  - should we present it
  - should we put it
  - should we place it
  lexicon: BDAG
  rationale: τίθημι literally means 'put/place,' but in this idiom with 'parable' the sense is to present or express something by means of a parable. 'Set it forth' preserves the metaphorical force without becoming wooden.
