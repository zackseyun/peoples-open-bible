translation:
  language: es
  text: Entonces clamaron a gran voz y se cortaron[a], conforme a su costumbre[b], con espadas y lanzas, hasta que les brotara sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se laceraron'. El hebreo se refiere a una autolesión ritual.
    reason: lexical_alternative
  - marker: b
    text: O 'según su práctica' o 'como era su costumbre'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽיִּקְרְאוּ
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - invocaron
  lexicon: HALOT
  rationale: En este contexto de invocación ritual a Baal, el verbo no es un simple 'llamar', sino un clamor fuerte. 'Clamaron' comunica bien la intensidad y evita un tono demasiado neutral.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: HALOT
  rationale: La expresión española 'a gran voz' es una fórmula natural y reverente que conserva la imagen concreta del hebreo sin sonar forzada.
- source_word: וַיִּתְגֹּדְדוּ
  english_pob_choice: cut themselves
  chosen_spanish: se cortaron
  alternatives_spanish:
  - se hirieron
  - se laceraron
  lexicon: HALOT
  rationale: El hebreo indica autolesión ritual. 'Se cortaron' es claro y directo en español; 'se laceraron' sería más técnico y menos natural.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their custom
  chosen_spanish: conforme a su costumbre
  alternatives_spanish:
  - según su práctica
  - como era su manera
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí expresa una práctica establecida, no una norma jurídica abstracta. 'Conforme a su costumbre' refleja bien ese sentido y mantiene la ambigüedad entre costumbre y práctica ritual.
- source_word: בַּחֲרָבוֹת
  english_pob_choice: with swords
  chosen_spanish: con espadas
  alternatives_spanish:
  - con cuchillos largos
  - con sables
  lexicon: HALOT
  rationale: '''Espadas'' es el equivalente moderno más natural y fiel al instrumento mencionado.'
- source_word: וּבָרְמָחִים
  english_pob_choice: and spears
  chosen_spanish: y lanzas
  alternatives_spanish:
  - y jabalinas
  - y picas
  lexicon: HALOT
  rationale: רְמָחִים puede traducirse 'spears' o 'lances'. 'Lanzas' es la opción más natural y amplia en español contemporáneo.
- source_word: עַד שְׁפָךְ דָּם
  english_pob_choice: until the blood gushed out
  chosen_spanish: hasta que la sangre brotó
  alternatives_spanish:
  - hasta que la sangre manó
  - hasta que la sangre salió a chorros
  lexicon: HALOT
  rationale: 'El hebreo expresa el resultado de la autolesión: sangre derramada/vertida. ''Brotó'' conserva la imagen viva sin exagerar más allá del texto.'
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - en ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' reproduce de forma natural el sentido de sangre cayendo o quedando sobre sus cuerpos.'
theological_decisions:
- issue: Autolesión ritual de los profetas de Baal
  english_pob_reading: The Hebrew refers to ritual self-laceration.
  chosen_spanish_reading: El verbo se entiende como autolesión ritual, no como un corte accidental o meramente simbólico.
  alternative_spanish_readings:
  - se hirieron por emoción
  - se golpearon
  rationale: El contexto de 1 Reyes 18 muestra una práctica cultual pagana extrema. La traducción evita suavizar el acto y preserva su carácter ritual y violento.
  doctrine_reference: 1 Reyes 18:28; cf. Levítico 19:28 para el trasfondo bíblico de prohibición de estas prácticas
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una imagen más natural y vívida para עַד שְׁפָךְ דָּם ('the blood gushed out'). En español, 'la sangre brotó' conserva esa vivacidad sin depender de un calco innecesariamente fuerte.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda en el proyecto; este versículo no lo requiere.
  - Se evitó 'SEÑOR' por consistencia con la norma del proyecto, aunque el versículo no contiene el nombre divino.
  - '''Conforme a su costumbre'' conserva la ambigüedad de מִשְׁפָּטָם entre norma, práctica y rito.'
  - '''Lanzas'' traduce רְמָחִים con un término amplio y comprensible para lectores hispanos de distintos registros.'
