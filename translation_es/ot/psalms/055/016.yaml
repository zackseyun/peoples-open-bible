    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in their habitation' / 'in their sojourning.'
    reason: lexical_alternative
  - marker: d
    text: Or 'within them' or 'among them.'
    reason: lexical_alternative
