translation:
  language: es
  text: Porque él la fundó sobre los mares[a], y la estableció sobre los ríos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues él la fundó sobre los mares y la estableció sobre los ríos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - ya que
  lexicon: HALOT
  rationale: En español, aquí introduce la razón del enunciado previo y funciona de manera natural en poesía. 'Porque' conserva la relación causal/explicativa que el POB inglés expresa con 'For' sin volver la línea rígida.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente se conserva para mantener el sujeto explícito y el énfasis del hebreo. En español, 'él' es suficiente y natural; 'él mismo' añadiría un énfasis que el texto no exige en la línea principal.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: En este contexto cosmológico-poético, עַל marca la colocación de una fundación. 'Sobre' reproduce mejor la elevación y el registro poético que 'en'.
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: El plural de יָם puede expresarse como 'mares' para conservar la imagen de aguas primordiales. 'Aguas' sería más interpretativo y menos preciso como equivalente léxico directo.
- source_word: יְסָדָהּ
  english_pob_choice: founded it
  chosen_spanish: la fundó
  alternatives_spanish:
  - la estableció
  - puso su fundamento a
  lexicon: HALOT
  rationale: De יסד, 'fundar' conserva la imagen de poner fundamento. En español, 'la fundó' es breve y poético; el objeto femenino mantiene la referencia implícita a la tierra/mundo del verso anterior.
- source_word: וְעַל
  english_pob_choice: and upon
  chosen_spanish: y sobre
  alternatives_spanish:
  - y encima de
  lexicon: HALOT
  rationale: La conjunción suma el segundo miembro paralelo. 'Y sobre' mantiene la cadencia y la repetición de עַל sin forzar una versión más pesada.
- source_word: נְהָרוֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - las corrientes
  - los cauces
  lexicon: HALOT
  rationale: El sentido básico es 'ríos'. En poesía puede aludir a cursos de agua o profundidades, pero 'los ríos' preserva la transparencia léxica y el paralelismo con 'mares'.
- source_word: יְכוֹנְנֶהָ
  english_pob_choice: established it
  chosen_spanish: la estableció
  alternatives_spanish:
  - la afirmó
  - la hizo firme
  lexicon: HALOT
  rationale: De כון, comunica hacer firme o dejar establecido. 'La estableció' mantiene la distinción respecto de יסד y resulta natural en español sin perder el matiz de firmeza.
theological_decisions:
- issue: Imaginería cosmológica de la creación sobre mares y ríos
  english_pob_reading: Retain the poetic-cosmological language straightforwardly without demythologizing or scientific paraphrase.
  chosen_spanish_reading: Conservar el lenguaje poético-cosmológico sin convertirlo en una explicación científica ni atenuar la imagen.
  alternative_spanish_readings:
  - Parafrasear para evitar la imaginería antigua
  - Interpretarlo solo como una metáfora abstracta de estabilidad
  rationale: El hebreo presenta una imagen poética tradicional del orden de la creación. La traducción debe respetar esa tensión y no reemplazarla por lenguaje moderno que borre el efecto del texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; el texto inglés permanece estable y la versión española sigue su decisión léxica principal, manteniendo la imaginería cosmológica y el paralelismo poético.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en esta línea no porque aparezca aquí, sino porque el versículo depende del contexto inmediato de Salmo 24:1-2; en este registro no se sustituye por una fórmula de ocultamiento del nombre divino.
  - '''mares'' y ''ríos'' conservan el plural hebreo y el paralelismo sin suavizar la imagen hacia ''aguas'' genérico.'
  - La puntuación con coma después de la primera cláusula refleja el paralelismo poético y la lectura natural en español.
