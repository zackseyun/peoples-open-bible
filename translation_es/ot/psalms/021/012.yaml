review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: una cláusula causal/explanatoria, la intención hostil contra el destinatario, la planificación deliberada y la incapacidad final de ejecutar el plan. Sin embargo, ''tramaron mal contra ti'' suaviza y desplaza un poco el primer colon: el hebreo conserva mejor la idea de dirigir/intentar ''el mal'' contra alguien, no solo obrar ''mal'' en general. Además, repetir dos verbos de intriga distintos (''tramaron'' / ''concibieron'') puede sonar algo redundante.'
  spanish_quality_summary: El español es natural y digno, pero puede afinarse para mayor precisión semántica y mejor paralelismo. 'Pues' funciona, aunque 'Porque' conecta con más claridad la explicación del versículo anterior en registro bíblico natural. 'Intentaron hacerte mal' sería demasiado interpretativo; 'intentaron el mal contra ti' o 'dirigieron el mal contra ti' preserva mejor el sustantivo. La nota b necesita limpieza tipográfica.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas principales son en general congruentes con el expediente inglés. Conviene mantener רָעָה como 'el mal' en vez de solo 'mal' para conservar la fuerza nominal y moral documentada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: 'Primer colon: ''tramaron mal contra ti'' no preserva del todo רָעָה como sustantivo (''evil'').'
    rationale: La auditoría inglesa justificó 'evil' frente a 'harm/disaster' para mantener la dimensión moral. En español, 'tramaron mal' puede entenderse adverbialmente ('actuaron maliciosamente') más que como objeto sustantivo de la intención hostil.
  - severity: low
    issue: '''Pues'' es aceptable, pero ''Porque'' liga con mayor transparencia la fuerza explicativa de כִּי.'
    rationale: No es error, pero la conjunción causal simple suena más directa en este contexto poético y expositivo.
  - severity: low
    issue: La nota b tiene comillas y puntuación torpes.
    rationale: 'La formulación actual (''También: ''''un complot''''...'') afecta la legibilidad editorial aunque no el contenido.'
  revised_spanish_text: Porque intentaron el mal contra ti[a]; idearon una maquinación[b], pero no pudieron llevarla a cabo.
  revised_footnotes:
