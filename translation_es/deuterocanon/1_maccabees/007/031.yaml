translation:
  language: es
  text: Y Nicanor supo que su plan había sido descubierto, y salió al encuentro de Judas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - se enteró
  - llegó a saber
  - conoció
  lexicon: BDAG
  rationale: El aoristo de γινώσκω señala llegar a conocer un hecho. En español, «supo» comunica ese descubrimiento puntual de manera natural y fiel, sin volver la frase excesivamente analítica.
- source_word: ἀπεκαλύφθη
  english_pob_choice: had been uncovered
  chosen_spanish: había sido descubierto
  alternatives_spanish:
  - había sido revelado
  - había sido puesto al descubierto
  - había sido dado a conocer
  lexicon: BDAG
  rationale: El pasivo expresa que el plan de Nicanor quedó al descubierto. «Descubierto» conserva la pasividad y la idea de quedar expuesto, sin introducir resonancias teológicas ajenas al contexto.
- source_word: ἡ βουλὴ αὐτοῦ
  english_pob_choice: his plan
  chosen_spanish: su plan
  alternatives_spanish:
  - su consejo
  - su propósito
  - su estratagema
  lexicon: BDAG
  rationale: βουλή puede abarcar consejo, propósito o plan. En este contexto político-militar, «plan» es la opción más clara y sobria en español; «estratagema» cargaría el tono más de lo que permite el griego.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - marchó
  - se dirigió
  lexicon: BDAG
  rationale: El verbo básico significa salir. «Salió» es la forma natural en español y mantiene la neutralidad del griego, sin añadir explícitamente un matiz militar no dicho por el verbo mismo.
- source_word: εἰς συνάντησιν
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - para un encuentro con
  - a enfrentar a
  lexicon: LSJ
  rationale: La expresión apunta a salir para un encuentro. «Al encuentro de» reproduce bien la construcción y deja que el contexto hostil determine el carácter del encuentro sin explicitarlo de más.
- source_word: τῷ Ἰούδα
  english_pob_choice: Judas
  chosen_spanish: de Judas
  alternatives_spanish:
  - con Judas
  - contra Judas
  lexicon: BDAG
  rationale: Como nombre propio, Ἰούδας se translitera «Judas». Tras «salió al encuentro de», el complemento «de Judas» suena natural en español y conserva la referencia personal sin traducir el nombre.
translation_notes:
  revision_awareness: 'Texto alineado con el griego de Swete 1909 y con la traducción auditada en inglés. No se documentan notas textuales ni variantes relevantes en el paquete provisto; se preserva la secuencia narrativa simple: descubrimiento del plan y salida al encuentro de Judas.'
  spanish_consistency_notes:
  - Se mantiene «Judas» como transliteración del nombre propio, según la política del proyecto.
  - Se usa «plan» para βουλή por claridad contextual, evitando sobrecargar con «consejo» o «propósito».
  - No se introduce lenguaje militar explícito («marchó», «combatió») porque el griego aquí solo dice que salió al encuentro.
