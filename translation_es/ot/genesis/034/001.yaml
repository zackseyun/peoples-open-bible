review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «salió», la identificación de Dina como hija de Lea, y el propósito «ver a las hijas de la tierra». También conserva adecuadamente la alternativa léxica en nota. Sin embargo, la cláusula «a quien ella había dado a luz a Jacob» no es español natural y además sugiere una construcción torpe que entorpece la relación sintáctica del hebreo. La referencia es que Lea dio a luz a Dina para Jacob/como hija de Jacob; en español debe expresarse de forma idiomática sin perder ese vínculo.'
  spanish_quality_summary: La frase principal es legible, pero «a quien ella había dado a luz a Jacob» suena forzada y poco natural en español eclesial general. También «Ahora» es posible como equivalente de discourse marker, pero aquí puede sentirse algo mecánico; «Dina..., salió...» funciona mejor sin añadir énfasis temporal innecesario. El resto del versículo es claro y digno.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. El nombre «Dina» es apropiado en español. «Hijas de la tierra» preserva bien la expresión hebrea, y la nota con «mujeres de la tierra» mantiene la alternativa contextual. No se detectan conflictos con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: 'Cláusula relativa poco natural: «a quien ella había dado a luz a Jacob»'
    rationale: Aunque intenta reflejar לְיַעֲקֹב, en español la secuencia «dar a luz a alguien a Jacob» es incorrecta o muy torpe. Una formulación como «que ella le había dado a luz a Jacob» o «que le había dado a Jacob» es más idiomática; la primera preserva mejor el verbo de nacimiento.
  - severity: low
    issue: Uso de «Ahora» al inicio
    rationale: Puede calcar el inglés «Now», pero el hebreo no exige aquí un adverbio temporal explícito. En español narrativo bíblico, omitirlo mejora la fluidez sin pérdida de sentido.
  revised_spanish_text: Dina[a], la hija de Lea, que ella le había dado a luz a Jacob, salió para ver a las hijas de la tierra.
  revised_footnotes:
  - marker: a
    text: O «a visitar a las mujeres de la tierra». El hebreo dice literalmente «ver a las hijas de la tierra».
    reason: lexical_alternative
