  to: 'Y de Neftalí dijo: «Neftalí[a], saciado de favor y colmado de la bendición de Yahvé, toma posesión del mar y del sur»'
  rationale: Se corrige la forma verbal final para reflejar la segunda persona exhortativa/benedictiva del hebreo (יְרָשָׁה) y preservar mejor el matiz territorial de ירשׁ en español natural. Se mantiene el resto del borrador, incluida la nota léxica sobre «mar/occidente», porque es fiel al source packet y al audit trail inglés.
