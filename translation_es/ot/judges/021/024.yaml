translation:
  language: es
  text: Entonces los hijos de Israel partieron de allí en aquel tiempo, cada hombre a su tribu y a su familia[a], y salieron de allí, cada hombre a su heredad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y a su clan»; el término hebreo puede designar un grupo de parentesco más amplio que la familia inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «a su tierra asignada»; «heredad» aquí se refiere a la posesión territorial hereditaria de cada israelita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  english_pob_choice: departed
  chosen_spanish: se apartaron
  alternatives_spanish:
  - partieron
  - se fueron
  - salieron
  lexicon: HALOT
  rationale: El hitpael de הלך aquí expresa el acto de retirarse o dispersarse desde el lugar de reunión. «Se apartaron» comunica bien la salida narrativa sin forzar una imagen demasiado literal de caminar.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma formal y cercana al hebreo. «Hijos» mantiene la correspondencia con בְּנֵי y evita sustituirla por un equivalente más general cuando el texto fuente conserva la expresión de filiación.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  - en aquel momento
  lexicon: HALOT
  rationale: Es un marcador temporal directo. «En aquel tiempo» suena natural en español y refleja con precisión el hebreo sin añadir matices interpretativos.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  - cada hombre
  lexicon: HALOT
  rationale: El uso distributivo de אִישׁ se preserva con una fórmula repetida y representativa. «Cada hombre» reproduce el valor distributivo y la forma masculina singular del original.
- source_word: לְשִׁבְטוֹ
  english_pob_choice: to his tribe
  chosen_spanish: a su tribu
  alternatives_spanish:
  - a su grupo tribal
  - a su clan tribal
  lexicon: HALOT
  rationale: «Tribu» es el equivalente estándar y preciso de שֵׁבֶט en este contexto social de Israel. No hace falta ampliar la expresión en el texto principal.
- source_word: וּלְמִשְׁפַּחְתּוֹ
  english_pob_choice: and to his family
  chosen_spanish: y a su familia
  alternatives_spanish:
  - y a su clan
  - y a su parentela
  lexicon: HALOT
  rationale: «Familia» es claro y fiel, aunque el término hebreo puede abarcar un grupo de parentesco más amplio que la familia nuclear moderna. Esa amplitud se preserva en nota.
- source_word: וַיֵּצְאוּ
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - se fueron
  - partieron
  - salieron de allí
  lexicon: HALOT
  rationale: יצא se traduce aquí con el sentido básico de salir. «Salieron» evita repetir innecesariamente la idea de marcha y conserva el movimiento desde el lugar de reunión.
- source_word: לְנַחֲלָתוֹ
  english_pob_choice: to his inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su posesión asignada
  - a su tierra asignada
  lexicon: HALOT
  rationale: «Heredad» expresa en español bíblico la idea de posesión territorial heredada y asignada, manteniendo tanto el sentido legal como el territorial de נַחֲלָה. Es más exacto que «herencia» en este contexto de reparto de tierra.
theological_decisions:
- issue: Sentido de נַחֲלָה como posesión territorial heredada
  english_pob_reading: '''inheritance'' here refers to each Israelite''s hereditary territorial possession.'
  chosen_spanish_reading: «heredad» se entiende como la posesión territorial heredada de cada israelita.
  alternative_spanish_readings:
  - «herencia» como bien recibido
  - «tierra asignada»
  rationale: El contexto de Jueces 21:24 es el de distribución y retorno a la porción propia. «Heredad» preserva la idea de posesión hereditaria, sin reducirla a una herencia abstracta ni limitarla solo al aspecto geográfico.
  doctrine_reference: Distribución de la tierra en Israel; heredad tribal bajo el pacto
translation_notes:
  revision_awareness: Coincide con la revisión más reciente del texto fuente en el paquete auditado; no se registran cambios posteriores relevantes. La traducción mantiene alta concordancia con la evaluación de revisión (agreement 1.0).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «heredad» para נַחֲלָה por su valor bíblico-territorial, con nota aclaratoria sobre la alternativa «tierra asignada».
  - «Hijos de Israel» conserva la forma fuente y el paralelismo distributivo con «cada hombre».
