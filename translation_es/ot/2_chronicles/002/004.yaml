translation:
  language: es
  text: Y la casa que yo estoy edificando será grande[a][b], porque nuestro Dios es más grande que todos los dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el templo que yo estoy edificando será grande’. El hebreo dice literalmente ‘la casa que yo estoy edificando’.
    reason: lexical_alternative
  - marker: b
    text: O ‘nuestro Dios es grande sobre todos los dioses’. El hebreo usa ‘grande’ con una expresión equivalente a ‘sobre todos los dioses’ para expresar comparación.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הַ/בַּיִת
  english_pob_choice: And the house
  chosen_spanish: Y la casa
  alternatives_spanish:
  - Y el templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente “casa”. En este contexto alude al santuario/templo, pero “casa” conserva mejor la forma hebrea y la resonancia teológica de la casa de Dios. “Templo” es viable por sentido, pero menos cercano al término de origen.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: HALOT
  rationale: El relativo se expresa de manera natural en español con “que”, sin perder la relación con el antecedente.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  lexicon: HALOT
  rationale: Pronombre de primera persona singular, explícito en español para mantener el énfasis del hebreo.
- source_word: בוֹנֶה
  english_pob_choice: am building
  chosen_spanish: estoy edificando
  alternatives_spanish:
  - estoy construyendo
  - edifico
  lexicon: HALOT
  rationale: El participio indica acción en curso o en proceso. “Estoy edificando” conserva el aspecto progresivo y el registro bíblico; “construyendo” sería más general, y “edifico” suena menos idiomático para este valor aspectual.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grandiosa
  - magnífica
  lexicon: HALOT
  rationale: En este versículo el adjetivo describe magnitud/estatura de la obra. “Grande” es la correspondencia directa y evita sobreinterpretar con matices más valorativos como “magnífica”.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación precedente; “porque” expresa con claridad esa relación causal en español moderno.
- source_word: גָדוֹל
  english_pob_choice: greater
  chosen_spanish: más grande
  alternatives_spanish:
  - mayor
  - más grande aún
  lexicon: HALOT
  rationale: Aunque el hebreo no usa una forma comparativa morfológica, la construcción con מִן exige comparación. “Más grande” reproduce el valor comparativo de forma transparente y natural.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona plural se traduce de modo estándar como “nuestro Dios”.
- source_word: מִכָּל
  english_pob_choice: than all
  chosen_spanish: que todos
  alternatives_spanish:
  - más que todos
  - por encima de todos
  lexicon: HALOT
  rationale: En español, el comparativo idiomático exige “más grande que todos”. La relación comparativa de מִן se mantiene con “que”.
- source_word: הָאֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - los demás dioses
  - las deidades
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere a otras deidades. “Los dioses” conserva el plural y la fuerza polémica del contraste sin suavizarlo a una paráfrasis explicativa.
theological_decisions:
- issue: Comparación de Yahvé con otros dioses
  english_pob_reading: our God is greater than all gods
  chosen_spanish_reading: nuestro Dios es más grande que todos los dioses
  alternative_spanish_readings:
  - nuestro Dios es grande sobre todos los dioses
  - nuestro Dios es mayor que todos los dioses
  rationale: La frase hebrea afirma una comparación real entre el Dios de Israel y todos los demás dioses/deidades. En español, “más grande que todos los dioses” conserva el paralelismo y la tensión del texto sin resolverla filosóficamente ni sustituirla por un giro interpretativo.
  doctrine_reference: Preservar la tensión teológica del texto sin armonizarla de antemano.
- issue: Referencia a la casa frente a ‘templo’
  english_pob_reading: the house that I am building
  chosen_spanish_reading: la casa que yo estoy edificando
  alternative_spanish_readings:
  - el templo que yo estoy edificando
  - la casa que estoy construyendo
  rationale: El hebreo dice literalmente “la casa”. Aunque el contexto apunta al santuario, mantener “casa” preserva la huella lexical del original y la idea de la casa de Yahvé; “templo” sería contextual pero más interpretativo.
  doctrine_reference: Mantener la metáfora/terminología del texto cuando el contexto la sostiene.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en filosofía de equivalencia óptima y en las dos decisiones clave: בַּיִת como ‘casa’ y גָדוֹל ... מִכָּל הָאֱלֹהִים como comparativo explícito. No se registran revisiones posteriores que cambien la lectura.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֱלֹהִים cuando se refiere a nuestro Dios, y ‘dioses’ para הָאֱלֹהִים en el contraste polémico.
  - Se evita ‘SEÑOR’ porque el texto hebreo aquí usa אֱלֹהִים, no יהוה.
  - El orden y la puntuación siguen un español bíblico contemporáneo, sin calco innecesario del inglés.
