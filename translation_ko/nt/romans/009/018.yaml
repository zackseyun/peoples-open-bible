  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἄρα οὖν ὃν θέλει ἐλεεῖ, ὃν δὲ θέλει σκληρύνει.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/018.yaml
  text: So then[a], he shows mercy to whom he wills[b], and he hardens whom he wills.
  footnotes:
  - marker: a
    text: Or, 'he has mercy on whom he wills.'
    reason: lexical_alternative
  - marker: b
    text: '''Hardens'' can also be rendered ''makes stubborn'' or ''renders obstinate''; the Greek uses an active verb and should not be softened to mere permission.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 그분은 원하시는 자에게 긍휼을 베푸시고, 원하시는 자를 완악하게 하십니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σκληρύνει
  english_pob_choice: hardens
  chosen_korean: 완악하게 하다
  alternatives_korean:
  - 굳어지게 하다
  - 강퍅하게 하다
  lexicon: BDAG
  rationale: 정책 지정 어휘. 본문의 무게를 약화시키지 않는다.
theological_decisions:
- issue: σκληρύνω를 「완악하게 하다」로 직역할 것인지, 「버려두다」 등으로 약화시킬 것인지
  chosen_reading: 「완악하게 하다」로 직역
  alternative_readings:
  - 버려두다
  - 굳어지게 하다
  rationale: 바울은 출애굽기의 σκληρύνω 본문을 직접 인용하며 하나님의 능동적 행위로 제시한다. 정책상 그 무게를 약화시키지 않고 직역한다. 신학적 해석(허용적 강퍅케 하심 vs 능동적 강퍅케 하심)은 독자에게 열어둔다.
  doctrine_reference: 'DOCTRINE.md: 본문 무게 보존; 강퍅케 하심 어휘'
