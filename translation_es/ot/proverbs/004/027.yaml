review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: una prohibición de desviarse hacia cualquiera de los dos lados y un mandato de apartar el pie del mal. Sin embargo, el sistema de notas no preserva fielmente la lógica del rastro de auditoría inglés: la nota [a] española no corresponde al alternativo documentado (''swerve/turn''), y la nota [b] marcada como ''Lit.'' duplica exactamente el texto principal en vez de ofrecer una alternativa real. Conviene ajustar las notas para que representen alternativas léxicas genuinas y queden ancladas donde corresponden.'
  spanish_quality_summary: El español es natural, claro y digno. «No te desvíes ni a la derecha ni a la izquierda; aparta tu pie del mal» suena idiomático y conserva la metáfora corporal. No hay problemas de legibilidad ni de registro. La reparación necesaria es menor y afecta sobre todo la formulación y correspondencia de las notas.
  glossary_alignment: No hay conflictos con la terminología proyectual principal. «Mal» para רַע y «pie» para רַגְלְךָ están bien elegidos. «Desvíes» para תֵּט es una buena opción española, con «te apartes» como alternativa plausible en nota. «Aparta» para הָסֵר mantiene bien la metáfora, aunque una nota puede registrar «retira» como alternativa más cercana a 'remove'.
  issues:
  - severity: medium
    issue: La nota [a] no refleja con precisión la alternativa auditada para תֵּט.
    rationale: 'El inglés documenta como alternativa principal ''Do not swerve ...'', no simplemente ''no te apartes'' sin referencia al movimiento lateral. En español conviene una alternativa más cercana, como «no te desvíes»/«no te apartes del camino», pero dado que el texto principal ya usa «desvíes», la nota debe reformularse como alternativa real, por ejemplo «O: “no te apartes ni a la derecha ni a la izquierda”».'
  - severity: medium
    issue: La nota [b] es defectuosa porque presenta como literal exactamente la misma redacción del texto principal.
    rationale: 'Una nota de alternativa debe aportar información distinta. Aquí el rastro inglés usa la literalidad para ''remove your foot from evil''. En español, si el texto principal queda como «aparta tu pie del mal», la nota debería ofrecer una alternativa distinta y más literal al matiz de הָסֵר, por ejemplo «O: “retira tu pie del mal”».'
  revised_spanish_text: No te desvíes ni a la derecha ni a la izquierda[a]; aparta tu pie del mal[b].
  revised_footnotes:
  - marker: a
    text: 'O: «no te apartes ni a la derecha ni a la izquierda».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «retira tu pie del mal».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, idiomático y claro. Se corrigen únicamente las notas para que representen alternativas léxicas reales, coincidan mejor con el expediente inglés y eviten una nota 'literal' que repetía exactamente la redacción principal.
