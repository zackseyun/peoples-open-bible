base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/014/015.yaml
  text: But when they heard of Nikanor’s advance and the attack of the Gentiles[a], they sprinkled dust upon themselves and implored the one who had established his people forever[c][b], and who always comes to the aid of his own portion with manifestation.
  footnotes:
  - marker: a
    text: Or 'the nations.' The Greek term can mean 'nations' generally, but in this setting it refers to non-Jewish peoples opposed to the Jews.
    reason: lexical_alternative
  - marker: b
    text: Or 'with visible intervention' or 'openly.' The Greek phrase suggests aid accompanied by manifest divine action.
    reason: alternative_reading
  - marker: c
    text: '''His own portion'' may also be rendered ''his own inheritance,'' preserving the covenantal sense of God''s people as his allotted possession.'
    reason: lexical_alternative
