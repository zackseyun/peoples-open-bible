translation:
  language: es
  text: Te daré gracias[a], porque me respondiste y llegaste a ser mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘liberación’. El término hebreo puede referirse tanto al rescate en una situación concreta como a la salvación en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אודך
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te agradezco
  - Te alabaré
  lexicon: HALOT
  rationale: El hifil de ידה abarca ‘dar gracias, alabar, confesar’. En un salmo de acción de gracias, ‘dar gracias’ comunica mejor el sentido cultual y de gratitud que una alabanza más general o un presente simple. El dativo de 2ms se expresa naturalmente con ‘te’.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la acción de gracias. ‘Porque’ es la relación causal más clara y natural en español.
- source_word: עניתני
  english_pob_choice: you answered me
  chosen_spanish: me respondiste
  alternatives_spanish:
  - me contestaste
  - me respondiste a mí
  lexicon: HALOT
  rationale: El verbo es ענה II, ‘responder’, no ענה I, ‘afligir/humillar’. En español, ‘me respondiste’ reproduce el sentido directo y la relación oracional de la respuesta divina sin añadir énfasis innecesario.
- source_word: ותהי
  english_pob_choice: and became
  chosen_spanish: viniste a ser
  alternatives_spanish:
  - y llegaste a ser
  - y fuiste
  - y te hiciste
  lexicon: HALOT
  rationale: 'El wayyiqtol de היה avanza la secuencia: ‘y llegaste a ser’. ‘Viniste a ser’ mantiene el valor verbal y evita una formulación demasiado estática. Se conserva la transición dinámica hacia el resultado.'
- source_word: לי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'Aunque ל con sufijo puede ser ‘para mí / a mí’, en español el sintagma con ‘salvación’ se expresa con más naturalidad y densidad teológica como posesivo: ‘mi salvación’.'
- source_word: לישועה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: HALOT
  rationale: ישועה puede referirse tanto a rescate concreto como a salvación en sentido más amplio. ‘Salvación’ preserva ese peso literario y teológico, mientras que ‘liberación’ o ‘rescate’ estrechan demasiado el campo semántico.
theological_decisions:
- issue: אלcance de ישועה en un salmo de rescate
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: La palabra hebrea puede señalar una intervención concreta de rescate, pero el contexto de alabanza permite una resonancia más amplia. ‘Salvación’ conserva esa amplitud sin imponer una doctrina ajena al verso.
  doctrine_reference: 'Translation philosophy: preserve theological weight without paraphrase.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de auditoría es alto y el texto se mantiene estable. La versión española sigue de cerca esa lectura estable sin añadir matices no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma normal para el nombre divino cuando aparezca; aquí no aparece.
  - Se usa ‘salvación’ para ישועה, en consonancia con la decisión inglesa y su nota alternativa.
  - Se preserva el valor verbal de ותהי con una solución dinámica en español (‘viniste a ser’) para evitar una cópula demasiado plana.
