translation:
  language: es
  text: Al grupo más numeroso aumentarás su herencia, y al grupo menos numeroso disminuirás su herencia; a cada uno[a] se le dará su herencia según sus contados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «cada hombre», usado distributivamente; el sentido es que cada grupo tribal recibe su herencia en proporción a su número censado.
    reason: lexical_alternative
  - marker: b
    text: 'O: «según el número de los contados de él»; también, «según su censo». El hebreo es conciso y vincula directamente la herencia con el número contado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרַב
  english_pob_choice: to the larger group
  chosen_spanish: al grupo más numeroso
  alternatives_spanish:
  - al mayor grupo
  - a los muchos
  - al de mayor número
  lexicon: HALOT
  rationale: El hebreo usa el adjetivo רַב de modo sustantivado y comparativo en contexto de repartición censal. En español, «grupo más numeroso» comunica con naturalidad la comparación de tamaño/población sin perder el sentido distributivo.
- source_word: תַּרְבֶּה
  english_pob_choice: you shall increase
  chosen_spanish: aumentarás
  alternatives_spanish:
  - harás crecer
  - ensancharás
  - incrementarás
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer más grande o más numeroso. «Aumentarás» conserva el valor causativo y encaja bien con la distribución proporcional de la herencia.
- source_word: נַחֲלָתוֹ
  english_pob_choice: its inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión asignada
  - su heredad
  - su herencia asignada
  lexicon: HALOT
  rationale: נַחֲלָה designa la porción heredada o adjudicada. «Herencia» es la forma más natural y fiel en español bíblico; el posesivo singular mantiene el referente colectivo del grupo.
- source_word: וְלַמְעַט
  english_pob_choice: and to the smaller group
  chosen_spanish: y al grupo menos numeroso
  alternatives_spanish:
  - y al menor grupo
  - y a los pocos
  - y al de menor número
  lexicon: HALOT
  rationale: Como con לָרַב, el hebreo funciona de manera sustantivada. «Grupo menos numeroso» expresa con claridad la oposición proporcional del versículo.
- source_word: תַּמְעִיט
  english_pob_choice: you shall diminish
  chosen_spanish: disminuirás
  alternatives_spanish:
  - reducirás
  - harás menor
  - aminorarás
  lexicon: HALOT
  rationale: El hifil de מעט significa hacer menor o reducir. «Disminuirás» es directo, formal y mantiene la correspondencia con el aumento del primer miembro.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo masculino singular distributivo, el español puede conservar la distribución sin forzar género marcado. «A cada uno» refleja mejor la función distributiva y evita una restricción innecesaria.
- source_word: לְפִי
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - en proporción a
  - conforme a
  lexicon: HALOT
  rationale: El giro לְפִי significa «según / de acuerdo con». «Según» es breve y natural; el contexto de censos aporta la idea proporcional.
- source_word: פְקֻדָיו
  english_pob_choice: those numbered of him
  chosen_spanish: los contados de él
  alternatives_spanish:
  - los contados a él
  - según su censo
  - sus censados
  lexicon: HALOT
  rationale: La forma concisa del hebreo vincula la herencia con el número contado. «Los contados de él» conserva la relación posesiva y el énfasis censal sin convertirlo en paráfrasis interpretativa.
- source_word: יֻתַּן
  english_pob_choice: shall be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - será dada
  - se le asignará
  - se le adjudicará
  lexicon: HALOT
  rationale: La pasiva de נתן pide una construcción pasiva o impersonal en español. «Se le dará» mantiene la cercanía al hebreo y funciona bien en estilo bíblico contemporáneo.
theological_decisions:
- issue: Distribución de la herencia según el censo tribal
  english_pob_reading: The allotment is proportional to the census count, with no hidden theological re-interpretation beyond the legal instruction.
  chosen_spanish_reading: La asignación de la herencia se presenta como proporcional al número contado, sin añadir matices ajenos al texto.
  alternative_spanish_readings:
  - La herencia se reparte en proporción al censo
  - La porción se otorga según el número registrado
  rationale: El versículo regula una adjudicación legal basada en el censo. La traducción debe conservar ese vínculo proporcional explícito, sin suavizarlo a una generalidad devocional.
  doctrine_reference: Números 26:52-56; reparto de la tierra por sorteo y según población censada
- issue: Valor distributivo del singular masculino אִישׁ
  english_pob_reading: each one / each man uses a masculine singular distributively; the sense is each tribal group receives proportionally.
  chosen_spanish_reading: «A cada uno» conserva la distribución sin imponer una lectura masculina exclusiva.
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  - cada tribu
  rationale: En español, el distributivo puede expresarse sin trasladar el género masculino del hebreo cuando ese género no aporta precisión adicional. Así se preserva la función gramatical y se evita un tropiezo de recepción.
  doctrine_reference: Uso distributivo del singular en hebreo bíblico
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la oposición mayor/menor, la causalidad de los verbos hifil y la frase final concisa vinculada al censo. Se evita traducir mecánicamente «each man» como masculino exclusivo cuando el español puede preservar mejor el distributivo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología POB para el tetragrámaton, pero este versículo no lo contiene.
  - Se mantiene «herencia» para נַחֲלָה por su valor técnico en el reparto de la tierra.
  - Se conserva el paralelismo verbal aumentarás/disminuirás para reflejar la simetría del hebreo.
  - La última cláusula se vierte con pasiva refleja para mantener naturalidad en español sin perder la relación con el censo.
