review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo como texto principal y conserva la nota sobre la divergencia griega, en línea con el rastro de auditoría POB. «No envidies» refleja bien אַל תְּקַנֵּא, y «hombre malvado» reproduce adecuadamente בְּאִישׁ רָשָׁע. La cláusula final, sin embargo, «cómo será su día», se aparta del valor interrogativo de מַה y suena menos fiel que una formulación con «qué».
  spanish_quality_summary: El español es claro y legible, con tono sapiencial apropiado. No obstante, «cómo será su día» resulta algo menos natural y menos preciso que «qué será de su día», que conserva mejor la tersura y la indeterminación del hebreo sin añadir «traerá/deparará».
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La nota alternativa está bien formulada. La única corrección necesaria es afinar la representación de מַה יּוֹמוֹ para mayor fidelidad semántica en español.
  issues:
  - severity: medium
    issue: La frase «cómo será su día» no refleja de la mejor manera el interrogativo hebreo מַה.
    rationale: El hebreo usa «qué»/«cuál» más que «cómo». En español, «qué será de su día» mantiene mejor la ambigüedad del original y evita desplazar el foco a la mera cualidad del día.
  revised_spanish_text: No envidies a un hombre malvado[a], porque no sabes qué será de su día.
