  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión sobre ὁποῖοί ἐστε γνώμης como 'propósito' concuerda con la auditoría inglesa. La revisión propuesta mantiene esa línea y mejora el español meta.
