translation:
  language: es
  text: Es una porción santa de la tierra; será para los sacerdotes, los ministros del santuario, los que se acercan para ministrar a Yahvé. Y será para ellos un lugar para casas y un lugar santo para el santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y un lugar santo para el santuario»; la expresión hebrea es compacta y puede referirse a un área consagrada perteneciente al santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  english_pob_choice: a holy portion
  chosen_spanish: una porción santa
  alternatives_spanish:
  - una porción sagrada
  - algo santo
  - un lugar santo
  lexicon: HALOT
  rationale: En este contexto de repartición de tierra, el sustantivo no expresa santidad abstracta sino una porción apartada. 'Porción santa' conserva la idea partitiva y evita añadir una explicación excesiva.
- source_word: מִן הָאָרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de entre la tierra
  - desde la tierra
  lexicon: HALOT
  rationale: 'El מן aquí es partitivo: una sección tomada de la tierra. ''De la tierra'' es natural en español y mantiene la relación de pertenencia/porción.'
- source_word: לַכֹּהֲנִים
  english_pob_choice: for the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - para los sacerdotes ministrantes
  - para los presbíteros
  lexicon: HALOT
  rationale: El referente es cultual y sacerdotal. 'Sacerdotes' es la equivalencia directa y clara en español; 'presbíteros' introduciría un término eclesial ajeno al hebreo.
- source_word: מְשָׁרְתֵי הַמִּקְדָּשׁ
  english_pob_choice: the ministers of the sanctuary
  chosen_spanish: los ministros del santuario
  alternatives_spanish:
  - los que sirven en el santuario
  - los servidores del santuario
  lexicon: HALOT
  rationale: משרתים señala servicio ministerial/cultual. 'Ministros' preserva ese matiz sin convertirlos en clero cristiano moderno. 'Santuario' traduce מקדש en su sentido de espacio sagrado.
- source_word: הַקְּרֵבִים
  english_pob_choice: who draw near
  chosen_spanish: los que se acercan
  alternatives_spanish:
  - los que se aproximan
  - los que se acercan al altar
  lexicon: HALOT
  rationale: 'El participio tiene fuerza cultual: se acercan para el servicio sagrado. ''Los que se acercan'' conserva el hebreo de forma natural; el contexto ya indica el propósito ritual.'
- source_word: לְשָׁרֵת אֶת יְהוָה
  english_pob_choice: to minister to Yahweh
  chosen_spanish: para ministrar a Yahvé
  alternatives_spanish:
  - para servir a Yahvé
  - para ejercer su ministerio ante Yahvé
  lexicon: HALOT
  rationale: '''Ministrar'' mantiene el verbo cultual de servicio sagrado y evita reducirlo a servicio general. Se conserva ''Yahvé'' por el nombre divino explícito en el hebreo.'
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un espacio
  - un sitio
  lexicon: HALOT
  rationale: '''Lugar'' es la equivalencia más directa y adecuada en una descripción territorial.'
- source_word: לְבָתִּים
  english_pob_choice: for houses
  chosen_spanish: para casas
  alternatives_spanish:
  - para viviendas
  - para hogares
  lexicon: HALOT
  rationale: בתים significa literalmente 'casas'. 'Casas' conserva la forma concreta del hebreo; 'viviendas' o 'hogares' suavizarían el término.
- source_word: וּמִקְדָּשׁ לַמִּקְדָּשׁ
  english_pob_choice: and as a holy place for the sanctuary
  chosen_spanish: y un lugar santo para el santuario
  alternatives_spanish:
  - y un espacio santo para el santuario
  - y un recinto santo para el santuario
  - y una zona santa para el santuario
  lexicon: HALOT
  rationale: La construcción es compacta y algo difícil. En español, 'lugar santo para el santuario' conserva la ambigüedad productiva del hebreo sin añadir 'tierra', que no aparece en la frase final. 'Santuario' se mantiene para el segundo מקדש, en línea con la revisión inglesa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de forma explícita. Conforme al criterio del proyecto, se traduce con el nombre propio divino 'Yahvé' y no con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מִקְדָּשׁ en la clausula final
  english_pob_reading: a holy place for the sanctuary
  chosen_spanish_reading: un lugar santo para el santuario
  alternative_spanish_readings:
  - un espacio santo para el santuario
  - un recinto santo para el santuario
  - una porción santa para el santuario
  rationale: La frase hebrea es breve y admite varias lecturas. Se conserva la tensión entre espacio consagrado y área perteneciente al santuario, sin resolverla en exceso. Esto refleja el tratamiento prudente del POB inglés tras su revisión.
  doctrine_reference: Textual/lexical issue in Ezekiel 45:4
translation_notes:
  revision_awareness: El inglés revisado cambió 'holy land' por 'a holy place' para reflejar con más precisión מִקְדָּשׁ y evitar introducir 'land' en la cláusula final. La versión española sigue esa revisión y conserva la ambigüedad espacial del hebreo en 'un lugar santo para el santuario'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con el criterio del proyecto.
  - '''Sacerdotes'' y ''ministros del santuario'' evitan una lectura eclesial cristianizada del pasaje.'
  - 'Se conserva la estructura repetitiva del hebreo: porción santa / para los sacerdotes / para ellos un lugar.'
  - '''Lugar santo para el santuario'' refleja la tensión léxica de מִקְדָּשׁ sin añadir elementos no presentes en el texto.'
