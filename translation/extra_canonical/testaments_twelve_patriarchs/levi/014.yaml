theological_decisions:
- issue: Bracketed clause in v. 2 identifying the chief priests as those who lay hands on 'the savior of the world'
  chosen_reading: Included in the main text with a note of probable secondary or Christian expansion
  alternative_readings:
  - Omit the bracketed clause as secondary
  - Retain but mark as uncertain interpolation
  rationale: The supplied Greek witness includes the clause in brackets, and the project philosophy requires translating what is present in the witness honestly while being transparent about textual complexity. The phrase is theologically charged and may reflect later Christian interpolation, but it should not be silently removed.
  doctrine_reference: 'PHILOSOPHY.md: translate the Greek witness honestly and use notes rather than harmonizing'
- issue: Referent of 'the Lord' / 'him' in v. 1
  chosen_reading: Rendered as the direct object implied by the Greek, preserving the startling formulation 'against the Lord ... laying hands on him'
  alternative_readings:
  - Interpret more loosely as rebellion against the Lord's authority
  - Harmonize the referent explicitly to the later 'savior of the world'
  rationale: The Greek presents a bold prophetic accusation. Preserving the directness maintains the testamentary and prophetic force without resolving the referent beyond the text itself.
