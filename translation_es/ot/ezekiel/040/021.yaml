translation:
  language: es
  text: 'Sus cámaras eran tres de este lado y tres de aquel lado, y sus pilares laterales[a] y su pórtico[b] tenían las mismas medidas que la primera puerta: su longitud era de cincuenta codos, y su anchura de veinticinco codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'jambas' o 'pilastras' para 'pilares laterales'; el término arquitectónico hebreo es algo incierto.
    reason: lexical_alternative
  - marker: b
    text: O 'vestíbulo' o 'porche' para 'pórtico'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  english_pob_choice: guardrooms
  chosen_spanish: cámaras
  alternatives_spanish:
  - guardias
  - salas laterales
  - cuartos
  lexicon: HALOT
  rationale: En este pasaje arquitectónico, el término designa pequeños espacios integrados en la estructura de la puerta. En español, 'cámaras' comunica bien esa idea sin cargar innecesariamente la función militar; 'guardrooms' del POB inglés deja la función implícita por el contexto.
- source_word: שְׁלוֹשָׁה מִפּוֹ ... וּשְׁלוֹשָׁה מִפּוֹ
  english_pob_choice: three on this side and three on that side
  chosen_spanish: tres de este lado y tres de aquel lado
  alternatives_spanish:
  - tres acá y tres allá
  - tres de un lado y tres del otro
  lexicon: HALOT
  rationale: La fórmula distributiva hebrea señala simetría en ambos lados de la entrada. 'De este lado / de aquel lado' preserva la oposición espacial de forma natural en español.
- source_word: אֵיל
  english_pob_choice: side pillars
  chosen_spanish: pilares laterales
  alternatives_spanish:
  - jambas
  - pilastras
  - postes laterales
  lexicon: HALOT
  rationale: El término arquitectónico es algo incierto; el POB inglés opta por una expresión funcional y no excesivamente técnica. 'Pilares laterales' mantiene esa sobriedad y sugiere el elemento estructural asociado a la puerta.
- source_word: אֵלַם
  english_pob_choice: portico
  chosen_spanish: pórtico
  alternatives_spanish:
  - vestíbulo
  - porche
  lexicon: HALOT
  rationale: El espacio de entrada del complejo se expresa de manera más natural en español como 'pórtico', que conserva el carácter arquitectónico y evita ambigüedad interior.
- source_word: הָיָה כְּמִדַּת הַשַּׁעַר הָרִאשׁוֹן
  english_pob_choice: had the same measurements as the first gate
  chosen_spanish: tenían las mismas medidas que la primera puerta
  alternatives_spanish:
  - tenían la misma medida que la primera puerta
  - eran conforme a las medidas de la primera puerta
  lexicon: HALOT
  rationale: El hebreo compara esta estructura con la puerta descrita antes. 'Las mismas medidas' reproduce la equivalencia dimensional de modo claro y fiel.
- source_word: הַשַּׁעַר הָרִאשׁוֹן
  english_pob_choice: the first gate
  chosen_spanish: la primera puerta
  alternatives_spanish:
  - la puerta primera
  - la puerta anterior
  lexicon: HALOT
  rationale: '''ראשון'' marca secuencia en la visión; ''primera puerta'' es la manera más directa y comprensible de reproducirlo en español.'
- source_word: חֲמִשִּׁים אַמָּה אָרְכּוֹ
  english_pob_choice: its length was fifty cubits
  chosen_spanish: su longitud era de cincuenta codos
  alternatives_spanish:
  - era de cincuenta codos de largo
  - medía cincuenta codos de longitud
  lexicon: HALOT
  rationale: El hebreo expresa explícitamente 'longitud'; conservar ese sustantivo respeta la estructura dimensional del texto. 'Codos' mantiene la unidad bíblica tradicional y auditable.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים בָּאַמָּה
  english_pob_choice: and the width twenty-five cubits
  chosen_spanish: y su anchura de veinticinco codos
  alternatives_spanish:
  - y su ancho de veinticinco codos
  - y era de veinticinco codos de ancho
  lexicon: HALOT
  rationale: La cláusula paralela a la anterior indica la medida del ancho. 'Anchura' conserva el paralelismo formal con 'longitud' y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El texto inglés POB fue marcado como sin cambios en la última pasada y el resumen de revisión indica solo cuestiones menores; por eso la versión española conserva la misma estructura descriptiva y las mismas alternativas léxicas donde el hebreo presenta incertidumbre arquitectónica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Puerta'' se usa para שַׁעַר en coherencia con el contexto arquitectónico de Ezequiel 40-48.'
  - '''Codos'' conserva la unidad de medida bíblica sin conversión, siguiendo el tratamiento del POB inglés.'
  - Las dos cláusulas dimensionales se han alineado con sustantivos explícitos ('longitud', 'anchura') para reflejar la sintaxis del hebreo.
