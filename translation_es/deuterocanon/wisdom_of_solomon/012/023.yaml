translation:
  language: es
  text: Por tanto, también tú atormentaste[a], por medio de sus propias abominaciones, a aquellos hombres injustos que habían vivido en la necedad de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “mediante sus propias prácticas detestables”. El griego puede abarcar cosas abominables en sentido amplio, incluso actos u objetos idolátricos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: LSJ
  rationale: Introduce la conclusión de manera natural en español y conserva la fuerza inferencial del griego sin añadir contenido.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  - y
  lexicon: LSJ
  rationale: Mantiene el matiz adverbial de suma o énfasis en la acción divina.
- source_word: τοὺς ... ἀδίκους
  english_pob_choice: those unrighteous men
  chosen_spanish: a esos hombres injustos
  alternatives_spanish:
  - a esos hombres impíos
  - a los injustos
  - a esos hombres no rectos
  lexicon: LSJ
  rationale: ἀδίκους apunta a personas caracterizadas por injusticia o falta de rectitud. 'Injustos' conserva el valor moral-jurídico directo; se explicita 'hombres' para reproducir el referente personal substantivado del griego.
- source_word: ἐν ἀφροσύνῃ ζωῆς
  english_pob_choice: in the folly of life
  chosen_spanish: en la necedad de la vida
  alternatives_spanish:
  - en la insensatez de la vida
  - en la locura de la vida
  - en una vida necia
  lexicon: LSJ
  rationale: ἀφροσύνη es 'necedad' o 'insensatez'. Se eligió 'necedad' por ser natural en español y bastante cercano al tono sapiencial; 'de la vida' conserva la construcción compacta del genitivo sin expandirla indebidamente.
- source_word: βιώσαντας
  english_pob_choice: who had lived
  chosen_spanish: que habían vivido
  alternatives_spanish:
  - habiendo vivido
  - que llevaron su vida
  - que habían pasado su vida
  lexicon: LSJ
  rationale: El participio aoristo se vierte de forma idiomática como relativa pasada, preservando la relación temporal con el verbo principal.
- source_word: διὰ τῶν ἰδίων ... βδελυγμάτων
  english_pob_choice: through their own abominations
  chosen_spanish: por medio de sus propias abominaciones
  alternatives_spanish:
  - a través de sus propias abominaciones
  - mediante sus propias prácticas detestables
  - por sus propias abominaciones
  lexicon: LSJ
  rationale: διά con genitivo expresa medio o instrumento; 'por medio de' hace explícita esa relación. 'Abominaciones' conserva el término bíblico fuerte y el eco de prácticas u objetos detestables sin precisar más de lo que el griego garantiza.
- source_word: ἐβασάνισας
  english_pob_choice: you tormented
  chosen_spanish: atormentaste
  alternatives_spanish:
  - afligiste
  - castigaste
  - torturaste
  lexicon: LSJ
  rationale: βασανίζω en este contexto judicial expresa aflicción severa o tormento. 'Atormentaste' mantiene la intensidad sin volver la frase excesivamente técnica o dura en español actual.
theological_decisions:
- issue: Instrumentalidad del castigo expresada por διὰ τῶν ἰδίων βδελυγμάτων
  english_pob_reading: God punished them by means corresponding to their own abominable practices or objects.
  chosen_spanish_reading: Dios los castigó por medio de sus propias abominaciones, es decir, mediante aquello mismo que caracterizaba su pecado.
  alternative_spanish_readings:
  - Dios los castigó a causa de sus abominaciones
  - Dios los castigó mediante sus propios ídolos o prácticas detestables
  rationale: El griego favorece un valor instrumental ('por medio de') más que una simple causalidad. La redacción española conserva esa tensión retributiva sin decidir el mecanismo concreto más allá de lo que el verso afirma.
  doctrine_reference: Preservar la retribución proporcional sin resolver el símbolo o el medio exacto del juicio.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y el audit trail inglés: conserva la lógica inferencial de ὅθεν, el valor adverbial de καί, el substantivo moral de ἀδίκους, la expresión compacta de ἐν ἀφροσύνῃ ζωῆς, y el matiz instrumental de διὰ con genitivo. Se evitó traducir mecánicamente desde el inglés cuando el español requería una solución más natural, pero sin diluir la fuerza de juicio del verbo βασανίζω.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' cuando el contexto pide el nombre divino, pero aquí el verso no lo contiene explícitamente.
  - Se prefirió 'injustos' para ἀδίκους por su cercanía semántica y naturalidad; no se usó 'siervos' ni 'pecadores' porque el griego no lo dice.
  - '''Abominaciones'' se mantiene como término bíblico fuerte para βδελύγματα, con nota para la posible referencia a prácticas u objetos idolátricos.'
  - '''Por medio de'' explicita la instrumentación de διά con genitivo, alineándose con la lectura teológica de juicio correspondiente.'
