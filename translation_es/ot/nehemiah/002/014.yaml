revisions:
- from: Entonces avancé hasta la Puerta de la Fuente[a] y hasta el Estanque del Rey, pero no había lugar para que pasara el animal[b] que iba debajo de mí.
  to: Entonces avancé hasta la Puerta de la Fuente[a] y hasta el Estanque del Rey, pero no había lugar para que el animal[b] que estaba debajo de mí pasara.
  rationale: Se ajusta la cláusula final para representar con mayor fidelidad e inteligibilidad la expresión hebrea literal «el animal debajo de mí», evitando el giro menos natural «iba debajo de mí». El resto del versículo puede mantenerse.
