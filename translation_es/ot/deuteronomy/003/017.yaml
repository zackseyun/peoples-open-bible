translation:
  language: es
  text: también el Arabá, con el Jordán como su límite, desde Kinéret[a] hasta el Mar del Arabá, el Mar de la Sal[b], debajo de las laderas de Pisgá, al oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde Jineret»; el hebreo conserva el nombre del lugar en una forma que suele transliterarse de maneras distintas.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el Mar Muerto.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: el Arabá
  alternatives_spanish:
  - la Arabá
  - la llanura
  - el valle del Jordán
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como topónimo, no como sustantivo genérico. «Arabá» reproduce el valor de región reconocida en el contexto de fronteras y evita diluirlo en «llanura» o «valle».
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico estándar sin añadir «río», porque en una lista de fronteras esa información ya va implícita y el texto hebreo funciona de modo elíptico.
- source_word: וּגְבֻל
  english_pob_choice: as its border
  chosen_spanish: como su límite
  alternatives_spanish:
  - y límite
  - como frontera
  lexicon: HALOT
  rationale: «Límite» expresa con claridad el valor de borde territorial. Se evita una traducción demasiado literal que sonaría fragmentaria en español, pero se conserva la relación posesiva implícita.
- source_word: מִכִּנֶּרֶת
  english_pob_choice: from Kinnereth
  chosen_spanish: desde Kinéret
  alternatives_spanish:
  - desde Jineret
  - desde Quinéret
  lexicon: HALOT
  rationale: Se translitera el topónimo. «Kinéret» conserva la forma hebrea y la opción de footnote mantiene la tensión documental entre transliteraciones posibles sin imponer una sola grafía tradicional.
- source_word: יָם הָעֲרָבָה
  english_pob_choice: the Sea of the Arabah
  chosen_spanish: el Mar del Arabá
  alternatives_spanish:
  - el mar de la Arabá
  - el Mar del Arabá
  lexicon: HALOT
  rationale: Se traduce la designación geográfica de modo directo para preservar la secuencia del hebreo antes de la aclaración appositiva siguiente. «Mar» mantiene el paralelo formal con el original.
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: el Mar de la Sal
  alternatives_spanish:
  - el Mar Salado
  - el Mar Muerto
  lexicon: HALOT
  rationale: Se sigue la forma hebrea con una traducción literal de la denominación. No se sustituye por «Mar Muerto», porque esa es la identificación moderna, no la expresión del texto fuente.
- source_word: תַּחַת
  english_pob_choice: below
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - al pie de
  lexicon: HALOT
  rationale: En una descripción topográfica, «debajo de» comunica la relación espacial de manera natural en español sin convertirla innecesariamente en dirección cardinal.
- source_word: אַשְׁדֹּת
  english_pob_choice: the slopes of
  chosen_spanish: las laderas de
  alternatives_spanish:
  - las pendientes de
  - los declives de
  lexicon: HALOT
  rationale: En este contexto geográfico el término señala laderas o declives de terreno. «Laderas» es claro y natural en español, manteniendo la imagen topográfica.
- source_word: הַפִּסְגָּה
  english_pob_choice: Pisgah
  chosen_spanish: Pisgá
  alternatives_spanish:
  - Pisga
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento gráfico español para facilitar la lectura. Se conserva como topónimo, no como sustantivo común.
- source_word: מִזְרָחָה
  english_pob_choice: on the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - al este
  lexicon: HALOT
  rationale: Se opta por una orientación adverbial natural en español que preserve el sentido locativo. «Hacia el oriente» mantiene el matiz direccional del hebreo sin añadir precisión no explícita.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con el texto fuente y con la auditoría inglesa; no se requirieron cambios de revisión. Se mantuvo la secuencia topográfica y la identificación tradicional del segundo mar mediante nota, como en el POB inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo nombra el tetragrámaton; aquí no aparece.
  - «Arabá» y «Kinéret» se trataron como topónimos transliterados para mantener la consistencia geográfica.
  - Se preservó la distinción entre designación literal («Mar de la Sal») e identificación explicativa en nota («Mar Muerto»).
  - «Lí­mite» se escogió por su naturalidad en una lista de fronteras y su fidelidad al valor de גְבֻל.
