translation:
  language: es
  text: Harán subir contra ti una asamblea[a], te apedrearán y te harán pedazos con sus espadas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «traerán contra ti una asamblea». El hebreo puede expresarse de manera más idiomática en español con «traerán contra ti» que con la forma más literal «harán subir contra ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te cortarán con sus espadas». El verbo hebreo sugiere un corte violento, incluso de despedazamiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלוּ
  english_pob_choice: they will bring up
  chosen_spanish: levantarán
  alternatives_spanish:
  - traerán
  - harán subir
  lexicon: HALOT
  rationale: El hifil de עלה conserva la idea de hacer subir o levantar; en este contexto hostil, «levantarán» permite mantener la imagen verbal sin forzar una paráfrasis más explicativa.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: La preposición עַל aquí tiene valor adversativo en un acto de juicio/ataque; «contra ti» expresa de manera natural esa fuerza en español.
- source_word: קָהָל
  english_pob_choice: an assembly
  chosen_spanish: una asamblea
  alternatives_spanish:
  - una congregación
  - una muchedumbre
  lexicon: HALOT
  rationale: «Asamblea» conserva el sentido de grupo reunido de forma formal y no introduce un matiz eclesiástico que no está en el hebreo.
- source_word: וְרָגְמוּ
  english_pob_choice: they will stone
  chosen_spanish: te apedrearán
  alternatives_spanish:
  - te lapidarán
  - te arrojarán piedras
  lexicon: HALOT
  rationale: רגם es el verbo normal de ejecutar o atacar mediante pedradas; «apedrear» comunica de forma clara y natural la acción.
- source_word: בָּאָבֶן
  english_pob_choice: with stones
  alternatives_spanish:
  - con piedras
  lexicon: HALOT
  rationale: Se omite la equivalencia literal porque en español «apedrear» ya implica el medio; conservar «con piedras» resultaría redundante. Esto sigue la decisión revisada del POB inglés.
- source_word: וּבִתְּקוּךְ
  english_pob_choice: cut you down
  chosen_spanish: te atravesarán
  alternatives_spanish:
  - te harán pedazos
  - te harán trizas
  lexicon: HALOT
  rationale: בתק indica un corte violento, incluso de desmembramiento; «atravesarán» preserva la violencia letal de la espada sin ir más allá de lo que exige el hebreo.
- source_word: בְּחַרְבוֹתָם
  english_pob_choice: with their swords
  chosen_spanish: con sus espadas
  alternatives_spanish:
  - por sus espadas
  lexicon: HALOT
  rationale: La preposición marca instrumento; «con sus espadas» es la forma natural en español y conserva el plural posesivo.
theological_decisions:
- issue: Imagen de juicio público y violencia judicial
  english_pob_reading: Render the verse as a public, violent judgment against Jerusalem personified as a woman, without softening the legal-execution imagery.
  chosen_spanish_reading: Presentar el versículo como un juicio público y violento contra Jerusalén personificada, sin suavizar la imaginería de ejecución.
  alternative_spanish_readings:
  - Reducirlo a un ataque militar general
  - Suavizarlo como una mera amenaza
  rationale: La secuencia de asamblea, apedreamiento y espada conserva una tensión de castigo comunitario y violencia bélica. La redacción española mantiene esa tensión en lugar de resolverla en una sola categoría.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que eliminó el redundante equivalente explícito de «with stones», porque en español «apedrear» ya comunica el medio sin necesidad de añadir «con piedras». También se conservó el paralelismo entre asamblea, apedreamiento y espada, reflejando el ajuste final del POB inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma POB cuando el texto no contiene el tetragrámaton explícito en este versículo.
  - «Asamblea» evita el sesgo eclesiástico de «congregación» y mantiene el valor formal del término hebreo.
  - «Apedrearán» es más idiomático que «lapidarán» para un registro bíblico contemporáneo en español, sin perder la fuerza penal.
  - Se prefirió «espadas» sobre «sables» o «cuchillos» porque reproduce mejor el plural léxico del hebreo.
