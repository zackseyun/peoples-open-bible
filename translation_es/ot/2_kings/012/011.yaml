translation:
  language: es
  text: Y sucedía que, cada vez que veían que había gran cantidad de plata en el cofre, subían el escriba del rey y el sumo sacerdote, y embolsaban[a] y contaban la plata hallada en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la guardaban en bolsas» o «la ataban en paquetes»; el hebreo probablemente se refiere a asegurar la plata en bolsas o bultos antes de contarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּרְאוֹתָם
  english_pob_choice: whenever they saw
  chosen_spanish: cuando veían
  alternatives_spanish:
  - cada vez que veían
  - cuando llegaban a ver
  lexicon: HALOT
  rationale: La forma infinitiva con prefijo temporal expresa una situación repetida o habitual; en español, 'cuando veían' comunica bien la iteración narrativa sin forzar un adverbio como 'siempre' o 'cada vez'.
- source_word: רַב הַכֶּסֶף
  english_pob_choice: there was much silver
  chosen_spanish: había mucho plata
  alternatives_spanish:
  - había mucho dinero
  - había gran cantidad de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mucho plata/silver'. En español, para evitar una construcción poco natural, se mantiene el sustantivo léxico 'plata' como metal/precio, aunque el contexto lo trate como fondos; se deja la abundancia explícita con 'mucho'.
- source_word: בָּאָרוֹן
  english_pob_choice: in the chest
  chosen_spanish: en el arca
  alternatives_spanish:
  - en el cofre
  - en la caja
  lexicon: HALOT
  rationale: El objeto es el receptáculo de ofrendas del pasaje; 'arca' conserva la relación con el objeto alargado/contendedor del hebreo, aunque en este contexto no es el arca del pacto. Se evita 'cofre' porque desplaza demasiado el término hacia un registro moderno no necesariamente bíblico.
- source_word: סֹפֵר הַמֶּלֶךְ
  english_pob_choice: the king’s scribe
  chosen_spanish: el escriba del rey
  alternatives_spanish:
  - el secretario del rey
  - el escribano del rey
  lexicon: HALOT
  rationale: '''Escriba'' preserva el oficio administrativo-cultual del término hebreo y coincide con el rango oficial del pasaje. ''Secretario'' podría ser posible, pero reduce el color histórico del cargo.'
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''Sumo sacerdote'' es la equivalencia española estable y fiel al oficio. Mantiene la dignidad jerárquica sin añadir explicación interpretativa.'
- source_word: וַיָּצֻרוּ
  english_pob_choice: bagged
  chosen_spanish: la guardaban en bolsas
  alternatives_spanish:
  - la embolsaban
  - la metían en bolsas
  - la ataban en haces
  lexicon: HALOT
  rationale: El verbo sugiere asegurar o reunir el dinero en paquetes/bolsas antes del conteo. 'La guardaban en bolsas' conserva la acción concreta sin asumir demasiado la técnica exacta, mientras refleja la revisión inglesa que favoreció una imagen de embolsado/agrupamiento.
- source_word: וַיִּמְנוּ
  english_pob_choice: counted
  chosen_spanish: contaban
  alternatives_spanish:
  - la contaban
  - la numeraban
  lexicon: HALOT
  rationale: '''Contaban'' es el equivalente natural y administrativo de מנה en este contexto. Se evita ''numeraban'' por sonar más técnico y menos idiomático en español.'
- source_word: הַכֶּסֶף הַנִּמְצָא
  english_pob_choice: the silver found
  chosen_spanish: la plata hallada
  alternatives_spanish:
  - la plata encontrada
  - el dinero hallado
  lexicon: HALOT
  rationale: Se conserva 'plata' para mantener la transparencia léxica del hebreo. 'Hallada' reproduce el participio pasivo con estilo bíblico claro en español.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de YHWH
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé''. ''Casa de Yahvé'' preserva la expresión hebrea בית יהוה sin sustituirla por ''templo'', que sería interpretativo.'
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea explícitamente el Tetragrámaton, y la política del proyecto pide transcribirlo como 'Yahvé' en el texto principal. Esto mantiene la referencia al nombre de pacto sin ocultarla bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de בָּאָרוֹן en el contexto
  english_pob_reading: in the chest
  chosen_spanish_reading: en el arca
  alternative_spanish_readings:
  - en el cofre
  - en la caja
  rationale: Aunque 'arca' puede evocar para lectores modernos el arca del pacto, en este pasaje la referencia es al receptáculo de las ofrendas. Se conserva el término más cercano al hebreo y al trazado narrativo, evitando la generalización a 'cofre' que perdería la resonancia bíblica.
  doctrine_reference: Contexto narrativo de 2 Reyes 12:9-11
translation_notes:
  revision_awareness: El inglés auditado revisó la acción de וַיָּצֻרוּ desde 'tied up' a 'bagged', favoreciendo la imagen de embolsar o agrupar la plata. La versión española sigue esa revisión y evita una traducción más literal pero menos clara. También se mantuvo la decisión documentada de traducir el Tetragrámaton como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה según la convención del proyecto.
  - Se conservó 'plata' en lugar de generalizar a 'dinero' para respetar la transparencia del hebreo.
  - '''Sumo sacerdote'' y ''escriba del rey'' siguen la terminología administrativa y cultual del original.'
  - La nota de pie marca la alternativa léxica principal para וַיָּצֻרוּ sin duplicar marcadores.
