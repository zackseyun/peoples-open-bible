translation:
  language: es
  text: Y la colgarás de cuatro pilares de madera de acacia, recubiertos de oro, con sus ganchos de oro, sobre cuatro bases de plata[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "zócalos de plata".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall hang
  chosen_spanish: colgarás
  alternatives_spanish:
  - pondrás
  - colocarás
  - asentarás
  lexicon: HALOT
  rationale: En este contexto de tabernáculo, el verbo hebreo expresa la acción de suspender la cortina/velo de manera idiomática; en español, 'colgar' comunica mejor esa función que 'poner' o 'colocar' sin perder fidelidad.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: El pronombre retoma el velo, sustantivo femenino en español; por eso corresponde 'la'.
- source_word: עַמּוּדֵי
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - postes
  - columnas
  lexicon: HALOT
  rationale: '''Pilares'' preserva la idea de soporte vertical y resulta natural en español para el mobiliario del tabernáculo, sin volverlo demasiado arquitectónico como ''columnas''.'
- source_word: שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - acacia
  - acacias
  lexicon: HALOT
  rationale: El hebreo se refiere al material de los pilares; 'madera de acacia' explicita que no se trata de árboles vivos sino del material de construcción.
- source_word: מְצֻפִּים זָהָב
  english_pob_choice: overlaid with gold
  chosen_spanish: recubiertos de oro
  alternatives_spanish:
  - forrados de oro
  - chapados en oro
  - cubiertos de oro
  lexicon: HALOT
  rationale: El participio pasivo indica una capa aplicada sobre la madera. 'Recubiertos de oro' transmite bien la idea de recubrimiento sin forzar una metáfora moderna de chapado.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: con sus ganchos
  alternatives_spanish:
  - con sus clavijas
  - con sus anzuelos
  lexicon: HALOT
  rationale: '''Ganchos'' corresponde al accesorio funcional para colgar el velo y es la equivalencia más clara y natural en español.'
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: La forma posesiva/material en español se expresa naturalmente con 'de oro'.
- source_word: אַדְנֵי כָסֶף
  english_pob_choice: silver bases
  chosen_spanish: bases de plata
  alternatives_spanish:
  - zócalos de plata
  - soportes de plata
  - enchufes de plata
  lexicon: HALOT
  rationale: '''Bases'' es claro y moderno para el soporte estructural. Se evita ''sockets'' como calco técnico; ''plata'' mantiene el metal mencionado en hebreo y suena más natural que ''sockets'' o un término demasiado especializado.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca en el texto principal y que la nota corresponda a una alternativa léxica realmente anclada en esa frase.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y culto, adecuado para una traducción pública.
  - Se prefirió 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se conservó la terminología de mobiliario del tabernáculo con equivalencias transparentes y no eclesiásticas.
