translation:
  language: es
  text: para idear diseños[a], para trabajar en oro, en plata y en bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para planear diseños artísticos».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo נְחֹשֶׁת puede referirse a cobre o bronce; aquí «bronce» encaja mejor con el contexto de la obra del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחְשֹׁב
  english_pob_choice: to devise
  chosen_spanish: idear
  alternatives_spanish:
  - pensar
  - planear
  - concebir
  lexicon: HALOT
  rationale: En este contexto artesanal, la raíz חשׁב no expresa solo actividad mental, sino elaboración intencional de proyectos o diseños. «Idear» conserva la idea de planificación creativa sin reducirla a mero pensamiento.
- source_word: מַחֲשָׁבֹת
  english_pob_choice: designs
  chosen_spanish: diseños
  alternatives_spanish:
  - planes
  - diseños artísticos
  - proyectos
  lexicon: HALOT
  rationale: Dado el contexto del tabernáculo y la labor de artesanía, «diseños» comunica de forma natural las formas concebidas para ser ejecutadas. Mantiene la fuerza concreta del sustantivo mejor que una equivalencia más abstracta.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to work
  chosen_spanish: para trabajar
  alternatives_spanish:
  - para hacer
  - para fabricar
  - para elaborar
  lexicon: HALOT
  rationale: La secuencia verbal no solo dice hacer en general, sino ejecutar habilidad artesanal con materiales específicos. «Trabajar» en español transmite mejor el oficio metalúrgico que una repetición plana de «hacer».
- source_word: בַּזָּהָב
  english_pob_choice: in gold
  chosen_spanish: en oro
  alternatives_spanish:
  - con oro
  - en metal precioso
  lexicon: HALOT
  rationale: La preposición ב aquí introduce el material de la labor. «En oro» es natural en español bíblico y conserva la referencia al material sobre el que se trabaja.
- source_word: וּבַכֶּסֶף
  english_pob_choice: and in silver
  chosen_spanish: en plata
  alternatives_spanish:
  - con plata
  lexicon: HALOT
  rationale: Se mantiene la misma estructura material que en la cláusula anterior, con «plata» como equivalente claro de כֶּסֶף en este contexto.
- source_word: וּבַנְּחֹשֶׁת
  english_pob_choice: and in bronze
  chosen_spanish: y en bronce
  alternatives_spanish:
  - y en cobre
  lexicon: HALOT
  rationale: Como en el audio textual inglés de POB, נחשת puede referirse a cobre o bronce. Aquí «bronce» es la opción más probable para el contexto de la artesanía del tabernáculo y coincide con el valor adoptado por la traducción inglesa.
translation_notes:
  revision_awareness: El texto inglés de POB mantiene una lectura estable sin cambios en la última revisión; la versión española sigue la misma línea interpretativa, conservando la ambigüedad útil en חשׁב/מחשבות con una nota alternativa y la decisión contextual «bronce» para נְחֹשֶׁת.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; este versículo no contiene el nombre divino.
  - 'Se mantuvo un registro artesanal coherente: idear/diseños/trabajar en lugar de un calco literal de «pensar» y «hacer».'
  - Se evitó «cobre» en el texto principal para no debilitar la correspondencia con la decisión auditada de POB sobre el contexto del tabernáculo.
