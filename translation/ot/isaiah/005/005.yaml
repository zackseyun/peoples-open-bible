theological_decisions:
- issue: Metaphorical vineyard imagery as judgment
  chosen_reading: Preserve the agricultural metaphor without explicating its referent in the verse itself.
  alternative_readings:
  - Interpretively expand the vineyard as Israel/Judah in the main text
  rationale: The immediate context identifies the vineyard metaphorically, but this verse itself speaks in image. The translation should not import the interpretation into the main text; it should preserve the prophetic metaphor and its judgment force.
  doctrine_reference: Translation philosophy §1, §3
