  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jeroboam», «reinó», «libro de las Crónicas» y «reyes de Israel» son adecuados. La decisión de mantener «Crónicas» con nota aclaratoria concuerda con el rastro inglés, siempre que la nota explique con claridad que no se refiere al libro bíblico de 1–2 Crónicas.
  issues:
