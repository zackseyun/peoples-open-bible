translation:
  language: es
  text: No te apartes ante un burlador,[a] para que no se ponga como uno que está al acecho delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la segunda línea es difícil. Literalmente, «para que no lo siente como uno que está al acecho delante de ti». El paralelo griego ofrece el sentido más amplio de un hombre peligroso y voluntarioso que actúa contra ti.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תָּזוּחַ
  english_pob_choice: Do not move aside
  chosen_spanish: No te apartes
  alternatives_spanish:
  - No te desvíes
  - No retrocedas
  - No cedas
  lexicon: HALOT
  rationale: El verbo expresa apartarse o ceder posición. «Apartes» conserva la imagen física y el tono exhortativo, sin volverlo demasiado interpretativo.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de ...
  alternatives_spanish:
  - ante
  - delante de
  - por causa de
  lexicon: HALOT
  rationale: En español, la combinación con «apartarse de» comunica naturalmente la relación de alejamiento/cara a cara sin forzar una calca literal.
- source_word: לֵץ
  english_pob_choice: scoffer
  chosen_spanish: burlador
  alternatives_spanish:
  - escarnecedor
  - mofador
  - socarrón
  lexicon: HALOT
  rationale: «Burlador» transmite bien el matiz sapiencial de una persona despectiva y burlona. Es más natural en español bíblico actual que «escarnador» y menos coloquial que «mofador».
- source_word: לְהוֹשִׁיבוֹ
  english_pob_choice: lest he set himself
  chosen_spanish: para que no se siente
  alternatives_spanish:
  - para que no lo siente
  - para que no lo coloque
  - para que no se coloque
  lexicon: HALOT
  rationale: La evidencia hebrea es difícil. Tomar el verbo en forma reflexiva produce una frase española inteligible y sigue la revisión inglesa que entendió el movimiento hostil como una acción del propio burlador. La lectura es conservadora frente al hebreo, pero evita una construcción imposible en español.
- source_word: כְּאוֹרֵב
  english_pob_choice: like one lying in wait
  chosen_spanish: como un acechador
  alternatives_spanish:
  - como uno que está al acecho
  - como un emboscador
  - como quien acecha
  lexicon: HALOT
  rationale: «Acechador» conserva la imagen de alguien que espera oculto para hacer daño. Es una equivalencia natural de אֹרֵב y mantiene el matiz de amenaza.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  - contra ti
  lexicon: HALOT
  rationale: «Delante de ti» respeta la imagen espacial básica del hebreo y sugiere presencia hostil sin añadir explícitamente la adversatividad que el original no formula de modo directo.
theological_decisions:
- issue: Manejo de la línea hebrea difícil frente al paralelo griego
  english_pob_reading: The Hebrew of the second line is difficult; the Greek parallel gives the broader sense of a dangerous, self-willed man acting against you.
  chosen_spanish_reading: Se conserva el giro hebreo difícil, pero la redacción española deja visible el sentido de amenaza activa.
  alternative_spanish_readings:
  - No te apartes de un burlador, para que no se coloque como emboscador delante de ti.
  - No te apartes de un burlador, para que no se siente contra ti como un acechador.
  rationale: Dado que el hebreo conservado es la base primaria y la tradición inglesa de POB prefirió no disolver la dificultad, la versión española mantiene una formulación cercana al hebreo, aunque naturalizada. El paralelo griego respalda la idea general de un hombre temerario y peligroso que actúa con voluntad propia.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, usando el paralelo griego como apoyo de sentido sin sustituir el testimonio principal.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que corrigió la segunda cláusula hacia un sentido reflexivo/agentivo del propio burlador. Se evita la lectura torpe de «sentarlo» y se conserva el eje de hostilidad mediante «acechador».
  spanish_consistency_notes:
  - Se usa «burlador» para לֵץ en consonancia con el registro sapiencial y con la preferencia POB por términos moralmente precisos.
  - Se evita «SEÑOR» u otras convenciones de sustitución porque este versículo no contiene el nombre divino.
  - «Acechador» y «delante de ti» mantienen la imaginería espacial y hostil sin añadir interpretación excesiva.
  - La puntuación reproduce dos miembros con una coma principal y una subordinada final en estilo bíblico moderno.
