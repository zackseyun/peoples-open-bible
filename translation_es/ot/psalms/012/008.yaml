review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente la evidencia fuente en un punto clave: el hebreo masorético tiene cambio de plural a singular entre תִּשְׁמְרֵם (''los guardarás'') y תִּצְּרֶנּוּ (''lo/lo guardarás''), mientras que el borrador adopta ''nos guardarás'' por una revisión inglesa posterior. Como revisor orientado primero por la fuente, conviene restaurar la tensión del hebreo y señalarla en nota. El resto del verso se alinea bien: אַתָּה enfático como ''Tú'', יְהוָה como ''Yahvé'', ''de esta generación'', y ''para siempre''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''oh Yahvé'' suena menos natural en español bíblico que ''oh, Yahvé,'' con comas, o simplemente ''Yahvé''. Además, la nota actual es confusa: dice ''cambia de plural ... a plural'' y explica una revisión inglesa en vez de aclarar el dato hebreo para el lector español. ''Lo guardarás'' funciona mejor que ''nos guardarás'' para reflejar la fuente; mantiene legibilidad aunque introduce una tensión deliberada que debe explicarse en nota.'
  glossary_alignment: 'Se respeta correctamente ''Yahvé'' para יהוה. ''Guardar'' es adecuado para ambos verbos y conserva el paralelismo. No hay otros términos del glosario comprometidos. La principal desalineación no es terminológica sino textual-teológica: el borrador sigue una armonización inglesa en vez de la forma hebrea auditada previamente.'
  issues:
  - severity: high
    issue: La segunda cláusula usa 'nos guardarás' en lugar del singular del texto hebreo.
    rationale: תִּצְּרֶנּוּ lleva sufijo singular masculino en el texto masorético. El proyecto pide trabajar desde la evidencia fuente primero y preservar tensiones significativas; aquí el español debería reflejar el singular y no una armonización posterior del inglés.
  - severity: medium
    issue: La nota al pie actual describe incorrectamente el cambio pronominal.
    rationale: Afirma 'cambia de plural ... a plural', lo cual no corresponde ni al hebreo ni a la explicación útil para el lector. La nota debe explicar que el hebreo pasa de plural a singular y que algunas traducciones lo armonizan.
  - severity: low
    issue: Puntuación y vocativo mejorables en 'Tú[a], oh Yahvé'.
    rationale: En español suena más natural y cuidado escribir 'Tú[a], oh, Yahvé,' con la interjección entre comas, o simplificar el vocativo. La mejora es estilística, no sustancial.
  revised_spanish_text: Tú[a], oh, Yahvé, los guardarás; lo guardarás de esta generación para siempre.
  revised_footnotes:
