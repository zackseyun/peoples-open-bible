review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: incluye el matiz enfático inicial, conserva las cuatro clases (''reyes, oficiales, sacerdotes y padres''), traduce idiomáticamente לֹא עָשׂוּ תּוֹרָתֶךָ como ''no guardaron tu ley'', y mantiene la relación instrumental en ''con los cuales''. Sin embargo, hay un problema de anclaje de nota: la nota [a] está colocada sobre ''reyes'', pero en la evidencia inglesa y hebrea la alternativa corresponde a ''nuestros padres''. También conviene evitar ''ni'' porque el hebreo tiene dos objetos coordinados positivos (''tus mandamientos y tus testimonios''), ambos bajo una sola negación previa.'
  spanish_quality_summary: El español es claro, digno y natural. 'Aun nuestros reyes' suena bien en registro bíblico; 'oficiales' y 'sacerdotes' son adecuados; 'no escucharon' funciona. La frase 'tus mandamientos y tus testimonios' es más fiel y más limpia que 'ni tus testimonios' después de 'no escucharon'. 'Con los cuales los amonestaste' es comprensible y conserva el matiz solemne, aunque la nota debe aclarar la alternativa más literal.
  glossary_alignment: 'La terminología concuerda con las decisiones POB: תּוֹרָה -> ''ley'', אָבוֹת -> ''padres'', מִצְוֺת -> ''mandamientos'', עֵדוֹת -> ''testimonios''. No hay conflicto con los términos teológicos por defecto del proyecto. La principal corrección es editorial/semántica menor: reubicar la nota de ''antepasados'' a ''padres'' y alinear la coordinación con el hebreo.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'reyes' pero explica una alternativa para 'nuestros padres'.
    rationale: Esto altera la correspondencia entre texto y nota y puede confundir al lector sobre qué término tiene la alternativa 'antepasados'.
  - severity: medium
    issue: '''ni tus testimonios'' introduce una coordinación española menos alineada con el hebreo y con la POB inglesa.'
    rationale: 'El original tiene una sola negación que gobierna dos complementos coordinados: ''a tus mandamientos y a tus testimonios''. ''Y'' preserva mejor la estructura y evita sugerir un contraste innecesario.'
  - severity: low
    issue: La nota [b] presenta como alternativa 'los advertiste' aunque el texto principal ya usa 'amonestaste'.
    rationale: No es erróneo, pero la nota queda más útil si explica también la opción más literal de 'diste testimonio contra ellos/les advertiste solemnemente', dado el vínculo léxico con 'testimonios'.
  revised_spanish_text: Aun nuestros reyes, nuestros oficiales, nuestros sacerdotes y nuestros padres[a] no guardaron tu ley, y no escucharon tus mandamientos y tus testimonios, con los cuales los amonestaste[b].
  revised_footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: O «los advertiste»; también puede traducirse «con los cuales diste testimonio contra ellos», conservando el matiz solemne y pactual del hebreo.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] al término correcto ('nuestros padres'), se ajusta 'ni' a 'y' para reflejar mejor la coordinación hebrea y la POB inglesa, y se afina la nota [b] para preservar mejor la relación léxica entre 'testimonios' y el verbo de advertencia/testimonio.
