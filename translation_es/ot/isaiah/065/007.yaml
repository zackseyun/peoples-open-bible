revisions:
- from: Tus iniquidades y las iniquidades de tus padres, juntamente[a], dice Yahvé, porque quemaron incienso sobre los montes y me reprocharon en las colinas[b]; así mediré su obra primera en su seno.
  to: Tus iniquidades y las iniquidades de tus padres, juntamente, dice Yahvé, porque quemaron incienso sobre los montes y me reprocharon en las colinas; así mediré su obra anterior[a] en su seno[b].
  rationale: Se corrigió el anclaje de la nota lexical para que recaiga sobre 'obra anterior', que es donde corresponde la alternativa 'retribución'. Además, 'anterior' refleja mejor רִאשֹׁנָה que 'primera' en este contexto de conducta previa ahora retribuida. Se mantuvo el resto del verso porque es sustancialmente fiel al hebreo y al razonamiento auditado.
