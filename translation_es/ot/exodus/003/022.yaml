    reason: lexical_alternative
  - marker: b
    text: O 'de la mujer residente/forastera en su casa'.
    reason: lexical_alternative
  - marker: c
    text: O 'saquearéis' o 'desvestiréis/despojaréis por completo' a Egipto.
    reason: lexical_alternative
