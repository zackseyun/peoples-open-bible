base_translation:
  language: en
  yaml_path: translation/nt/mark/014/060.yaml
  text: And the high priest stood up in the midst and questioned Jesus[a], saying[c][b], “Do you answer nothing? What are these men testifying against you?”
  footnotes:
  - marker: a
    text: Or “into the midst.” The phrase indicates that the high priest took a central position before the assembly.
    reason: lexical_alternative
  - marker: b
    text: Or “Do you make no answer?”
    reason: lexical_alternative
  - marker: c
    text: Literally “these men”; Greek has a masculine plural demonstrative referring to the witnesses present.
    reason: lexical_alternative
