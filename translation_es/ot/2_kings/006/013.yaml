translation:
  language: es
  text: 'Y dijo[a]: «Vayan y vean dónde está, para que yo capture». Y se le informó, diciendo: «He aquí[b], está en Dotán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y enviaré y lo tomaré». La secuencia hebrea puede leerse con mayor literalidad, pero aquí probablemente expresa propósito: «para que yo envíe y lo capture».'
    reason: lexical_alternative
  - marker: b
    text: Dotán era una ciudad al norte de Samaria; también aparece en la narración de José (Gn 37:17).
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa וַיֹּאמֶר introduce discurso directo; en español, «Y dijo» conserva el flujo narrativo sin añadir matiz temporal innecesario.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vengan y vayan
  - Anden
  lexicon: HALOT
  rationale: Imperativo plural dirigido a varios agentes; «Vayan» es natural en español y conserva la fuerza exhortativa del hebreo.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y averigüen
  lexicon: HALOT
  rationale: ראה mantiene su sentido básico de ver; «vean» es la equivalencia más directa y evita sobreinterpretar la intención investigativa.
- source_word: אֵיכֹה הוּא
  english_pob_choice: where he is
  chosen_spanish: dónde está
  alternatives_spanish:
  - dónde se encuentra
  - dónde pudiera estar
  lexicon: HALOT
  rationale: La expresión interrogativa con pronombre indica ubicación; «dónde está» es idiomático y fiel al sentido llano.
- source_word: וְאֶשְׁלַח
  english_pob_choice: that I may send
  chosen_spanish: para que yo envíe
  alternatives_spanish:
  - y enviaré
  - entonces enviaré
  lexicon: HALOT
  rationale: En esta secuencia tras imperativos, el imperfecto expresa propósito/resultando; «para que yo envíe» refleja mejor la sintaxis que un simple futuro coordinado.
- source_word: וְאֶקָּחֵהוּ
  english_pob_choice: and seize him
  chosen_spanish: y lo capture
  alternatives_spanish:
  - y lo tome
  - y lo prenda
  lexicon: HALOT
  rationale: לקח literalmente puede ser «tomar», pero aquí el contexto hostil exige el matiz de aprehensión; «capture» comunica esa fuerza sin perder neutralidad.
- source_word: וַיֻּגַּד לוֹ
  english_pob_choice: And it was reported to him
  chosen_spanish: Y se le informó
  alternatives_spanish:
  - Y le dijeron
  - Y se le comunicó
  lexicon: HALOT
  rationale: El pasivo de נגד conserva el tono formal de comunicación; «se le informó» mantiene la voz pasiva y el registro cortesano.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  lexicon: HALOT
  rationale: La fórmula quotativa introduce el discurso citado; «diciendo» es la equivalencia transparente en español.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, bien
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención. «Mira» comunica la función discursiva en español moderno, aunque se mantiene la solemnidad del contexto. El uso de la nota explica que el hebreo tiene un matiz más formal que el español corriente.
- source_word: בְדֹתָן
  english_pob_choice: in Dothan
  chosen_spanish: en Dotán
  alternatives_spanish:
  - en Dothán
  lexicon: HALOT
  rationale: Topónimo transliterado de forma estable en español bíblico; la preposición locativa ב se rinde con «en».
translation_notes:
  revision_awareness: Se adoptó la revisión del inglés POB que prefiere una construcción de propósito en lugar de una coordinación estrictamente formal, y un deíctico más solemne para הִנֵּה. En español, se resolvió con «para que yo envíe y lo capture» y se mantuvo una fórmula breve de atención con nota para no perder la función del hebreo.
  spanish_consistency_notes:
  - Se preservó el nombre propio como «Dotán» para coherencia bíblica en español.
  - Se mantuvo la distinción entre imperativo plural («Vayan y vean») y propósito en primera persona («para que yo envíe»).
  - Se optó por «capturar» en lugar de «tomar» para conservar el matiz hostil del contexto.
  - Se usó «Y se le informó» para reflejar la voz pasiva del hebreo y evitar una construcción demasiado interpretativa.
