translation:
  language: es
  text: El forastero[a] que habita con ustedes será para ustedes como un nativo entre ustedes, y lo amarán como a ustedes mismos, porque forasteros fueron ustedes en la tierra de Egipto. Yo soy Yahvé, el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjero», «residente extranjero» o «desconocido». El término hebreo se refiere a una persona no nativa que vive entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּאֶזְרָח
  english_pob_choice: like a native
  chosen_spanish: como un natural entre ustedes
  alternatives_spanish:
  - como un nativo entre ustedes
  - como uno nacido en la tierra
  - como un ciudadano entre ustedes
  lexicon: HALOT
  rationale: אֶזְרָח designa a un miembro nativo de la comunidad. En español, «natural» comunica esa pertenencia de nacimiento o condición propia del lugar mejor que un calco rígido, y mantiene la comparación introducida por כְּ.
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el sojourner
  - el extranjero
  - el residente foráneo
  lexicon: HALOT
  rationale: En este contexto legal, גֵּר no es un simple transeúnte. La POB inglesa usó «sojourner» para preservar la categoría social de un no nativo que vive entre Israel. En español, «forastero» comunica esa condición de no originario sin sonar tan técnico como «residente extranjero», y la nota preserva las alternativas semánticas.
- source_word: הַגָּר אִתְּכֶם
  english_pob_choice: who sojourns with you
  chosen_spanish: que habita con ustedes
  alternatives_spanish:
  - que reside con ustedes
  - que vive entre ustedes
  - que mora con ustedes
  lexicon: HALOT
  rationale: El participio repite la idea de permanencia junto con ustedes. «Habita con ustedes» conserva la relación estable y evita forzar el cognado español con «forastero». Aunque se pierde la aliteración hebrea, el sentido relacional queda claro.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: shall be to you
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - deberá ser para ustedes
  - ha de ser para ustedes
  lexicon: HALOT
  rationale: La construcción expresa la forma en que ha de ser considerado ese forastero. «Será para ustedes» mantiene el futuro normativo y suena natural en español legal-bíblico.
- source_word: וְאָהַבְתָּ ל/וֹ
  english_pob_choice: and you shall love him
  chosen_spanish: y lo amarás
  alternatives_spanish:
  - y debes amarlo
  - y amarás a él
  lexicon: HALOT
  rationale: El mandato singular se conserva con «amarás». En español, el complemento directo «lo» mantiene la referencia masculina sin introducir un sustantivo innecesario.
- source_word: כָּמוֹךָ
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - igual que a ti mismo
  lexicon: HALOT
  rationale: Esta comparación es la fórmula clásica del pasaje. «Como a ti mismo» es la forma más natural y mantiene el vínculo intertextual con Levítico 19:18.
- source_word: כִּי גֵרִים הֱיִיתֶם
  english_pob_choice: for you were sojourners
  chosen_spanish: porque forasteros fueron ustedes
  alternatives_spanish:
  - porque ustedes fueron forasteros
  - pues forasteros fueron ustedes
  - porque ustedes fueron residentes foráneos
  lexicon: HALOT
  rationale: El motivo de la orden se apoya en la experiencia histórica de vulnerabilidad. Repetir «forasteros» conserva la conexión conceptual con גֵּר; el orden de palabras suena más solemne en español y permanece fiel al énfasis del hebreo.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en la tierra egipcia
  lexicon: HALOT
  rationale: «Tierra de Egipto» reproduce la expresión bíblica fija y mantiene el tono histórico-covenantal del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto exige renderizar el Tetragrámaton como «Yahvé». Se conserva el nombre propio divino, no el título sustituto «Señor».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: Aunque el hebreo tiene sufijo de segunda persona plural, en español moderno «su Dios» evita duplicación incómoda. El referente queda claro por el contexto inmediato y por la cláusula posesiva previa.
theological_decisions:
- issue: Rango semántico de גֵּר en una ley ética
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - extranjero
  - residente extranjero
  - forastero residente
  rationale: La POB inglesa privilegia la categoría social del no nativo integrado en la comunidad. En español, «forastero» conserva la idea de alguien que no es del lugar pero vive entre ellos, sin importar categorías migratorias modernas. Se mantiene la tensión útil entre pertenencia provisional y protección debida.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nombre divino en la fórmula final
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente יְהוָה. La traducción preserva el nombre propio de Dios, en continuidad con la decisión editorial del proyecto y con la necesidad de no ocultar el Tetragrámaton bajo un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Possessive in אֱלֹהֵיכֶם
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - vuestro Dios
  - su Dios de ustedes
  rationale: En español latinoamericano, la segunda persona plural posesiva directa puede sonar marcada o regional; «su Dios» es más ampliamente readable. El contexto de alianza y la yuxtaposición con Yahvé impiden cualquier ambigüedad doctrinal.
  doctrine_reference: Spanish style and clarity
translation_notes:
  revision_awareness: 'Concordant with the latest revision pass: no changes required against the audited English POB decision set; the Spanish draft follows the same lexical/theological distinctions while adapting them idiomatically.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre el no nativo residente («forastero») y el miembro nativo («natural»).
  - Se preserva el mandato singular con verbo en segunda persona singular («amarás»), como en el hebreo.
  - «Yahvé» se usa consistentemente para יְהוָה, sin sustituirlo por «Señor».
  - La referencia a Egipto conserva la fórmula bíblica completa «tierra de Egipto».
  - El posesivo final se adapta a un español natural sin perder el referente plural de la comunidad.
  - La nota al pie recoge las alternativas semánticas del término גֵּר sin diluir la opción principal del texto.
