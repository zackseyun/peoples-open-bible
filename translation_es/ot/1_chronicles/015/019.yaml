translation:
  language: es
  text: Los cantores eran Hemán, Asaf y Etán, con címbalos de bronce para hacerlos oír[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para sonar con fuerza». El infinitivo hebreo significa literalmente «causar que se oiga» o «hacer oír».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְשֹׁרְרִים
  english_pob_choice: The singers
  chosen_spanish: Los cantores
  alternatives_spanish:
  - Los cantores y
  - Los cantores musicales
  lexicon: HALOT
  rationale: מְשֹׁרְרִים designa específicamente a los que cantan. En español, «cantores» conserva esa precisión mejor que un genérico como «músicos». Se omite el valor coordinante de ו de manera natural, como en el inglés POB.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Hemán
  alternatives_spanish:
  - Heman
  lexicon: Nombre propio bíblico
  rationale: Se translitera el nombre propio con acentuación española normal para lectura pública, sin alterar la identidad del referente.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaf
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio en forma transliterada al español. La forma «Asaf» es la más natural y reconocible en español bíblico moderno.
- source_word: וְאֵיתָן
  english_pob_choice: and Ethan
  chosen_spanish: y Etán
  alternatives_spanish:
  - y Ethan
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se translitera al español y se mantiene la conjunción explícita por la estructura enumerativa del hebreo.
- source_word: בִּמְצִלְתַּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con campanas
  - con platillos
  lexicon: HALOT
  rationale: El sentido instrumental de ב se expresa naturalmente con «con». «Címbalos» corresponde al instrumento mencionado y evita sustituirlo por términos menos precisos.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  - de latón
  lexicon: HALOT
  rationale: נְחֹשֶׁת suele referirse al metal aleado usado en instrumentos y objetos bíblicos; «bronce» es el equivalente moderno más estándar en español.
- source_word: לְהַשְׁמִיעַ
  english_pob_choice: to sound aloud
  chosen_spanish: para hacerse oír
  alternatives_spanish:
  - para sonar aloud
  - para ser oídos
  lexicon: HALOT
  rationale: 'El hifil de שׁמע expresa causación: «hacer oír». En español, «para hacerse oír» comunica la fuerza instrumental y performativa sin añadir un objeto inexistente en el hebreo, en línea con la revisión inglesa que eliminó «them».'
theological_decisions:
- issue: Valor del infinitivo causativo לְהַשְׁמִיעַ en contexto musical
  english_pob_reading: to sound aloud / to cause to be heard
  chosen_spanish_reading: para hacerse oír
  alternative_spanish_readings:
  - para sonar con fuerza
  - para ser escuchados
  rationale: 'No hay contenido doctrinal delicado, pero sí una tensión léxica: el hebreo no dice simplemente «sonar», sino causar audición. «Para hacerse oír» preserva esa fuerza sin introducir un objeto no presente en el texto.'
  doctrine_reference: Ninguna; decisión léxica de traducción
- issue: Tratamiento de nombres propios en lista ritual
  english_pob_reading: Heman, Asaph, and Ethan
  chosen_spanish_reading: Hemán, Asaf y Etán
  alternative_spanish_readings:
  - Heman, Asaph y Ethan
  rationale: No cambia el sentido teológico, pero la forma española facilita lectura pública sin perder identificación textual. Se mantiene la lista nominal y su función litúrgica/histórica.
  doctrine_reference: Ninguna; decisión de onomástica bíblica
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó un objeto añadido («them») que no estaba en el hebreo y simplificó la frase final a «sound aloud». La redacción española evita igualmente introducir objeto alguno y opta por una construcción natural que conserve el valor causativo del infinitivo hebreo.
  spanish_consistency_notes:
  - Se usa «de bronce» para נְחֹשֶׁת, alineado con el uso bíblico estándar del metal.
  - Se mantiene la conjunción entre nombres propios para reflejar la enumeración original.
  - «Cantores» se prefiere a «músicos» para no ampliar indebidamente el referente léxico.
  - La nota al pie se ancla en «hacerse oír» para reflejar la alternativa lexical documentada.
