translation:
  language: es
  text: No te rebajes ante lo que ven tus ojos[a], ni quedes consternado tras su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «No examines a una virgen, no sea que tropieces en sus reprensiones/penas». El hebreo y el griego difieren de manera sustancial en este versículo.'
    reason: alternative_reading
  - marker: b
    text: El hebreo «tras su casa» es difícil y puede aludir a perseguir su casa o entorno doméstico, o a quedar arruinado por involucrarse con su esfera doméstica.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהִתְנַבֵּל
  english_pob_choice: debase yourself
  chosen_spanish: te rebajes
  alternatives_spanish:
  - te deshonres
  - te envilezcas
  - te humilles
  lexicon: HALOT
  rationale: 'El hitpael de נבל conserva fuerza reflexiva: la advertencia es contra rebajarse moralmente. «Te rebajes» comunica esa degradación en un español natural y sobrio, sin perder el sentido de envilecimiento.'
- source_word: בְּמַרְאֵה עֵינֵיךָ
  english_pob_choice: by the sight of your eyes
  chosen_spanish: por la vista de tus ojos
  alternatives_spanish:
  - por lo que ven tus ojos
  - ante lo que ven tus ojos
  - a causa de lo que tus ojos ven
  lexicon: HALOT
  rationale: La expresión hebrea es literal y extraña; se refiere al impacto de la visión o apariencia percibida. «Por la vista de tus ojos» mantiene la concreción visual del hebreo y su posible matiz de tentación por lo visto.
- source_word: וּלְשׁוֹמֵם
  english_pob_choice: be appalled
  chosen_spanish: te espantes
  alternatives_spanish:
  - te desoles
  - te estremezcas
  - quedes devastado
  lexicon: HALOT
  rationale: שמם puede abarcar quedar desolado, sobrecogido o devastado. En este contexto, la revisión inglesa favorece la idea de quedar appalled/devastated; «te espantes» conserva el golpe de alarma en español y permite la ambigüedad del término hebreo.
- source_word: אֲחַר בֵּיתָהּ
  english_pob_choice: after her house
  chosen_spanish: tras su casa
  alternatives_spanish:
  - después de su casa
  - en pos de su casa
  - tras su hogar
  lexicon: HALOT
  rationale: El hebreo es breve y difícil. «Tras su casa» reproduce la dureza sintáctica del texto y deja abierta la incertidumbre semántica señalada por la nota inglesa, sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as primary, while preserving the Greek's substantially different warning in a footnote.
  chosen_spanish_reading: Traducir el hebreo como texto principal y señalar en nota la advertencia griega distinta.
  alternative_spanish_readings:
  - 'Adoptar en el texto principal la lectura griega: «No examines a una virgen, no sea que tropieces en sus reprensiones/penas».'
  - Combinar ambas lecturas en una sola paráfrasis armonizada.
  rationale: En Sirácides, donde el hebreo está conservado, la política del proyecto prioriza ese testimonio. Pero aquí el griego no es una simple variante estilística, sino una advertencia diferente; por fidelidad auditada conviene exponer la divergencia sin ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; preservar transparentemente variantes y ambigüedades'
- issue: Sentido de la advertencia moral
  english_pob_reading: Do not debase yourself... nor be appalled...
  chosen_spanish_reading: No te rebajes... ni te espantes...
  alternative_spanish_readings:
  - No te envilezcas... ni quedes devastado...
  - No te deshonres... ni te desalientes...
  rationale: La línea del hebreo advierte contra una degradación moral vinculada con la mirada y una posible ruina posterior. «Rebajes» y «espantes» conservan esa secuencia sin imponer una interpretación más específica que la que permite el texto.
  doctrine_reference: Sirácides 9:5; advertencia sapiencial sobre la conducta y sus consecuencias
translation_notes:
  revision_awareness: He tomado en cuenta la revisión inglesa más reciente, que prefirió «be appalled» frente a «be desolated» y ajustó la frase visual para acercarse más al hebreo. En español, por naturalidad y cercanía semántica, opté por «te espantes» para conservar el efecto de sobresalto/ruina potencial sin cerrar la ambigüedad de שמם.
  spanish_consistency_notes:
  - Mantuve un registro sobrio y bíblico, pero no arcaizante.
  - No sustituí la dificultad textual de «tras su casa» por una explicación intratextual; la complejidad queda visible en la nota.
  - Usé «espantes» como solución amplia para שמם, evitando fijar un único matiz donde el hebreo y la revisión inglesa dejan margen.
  - La nota griega se ancla en el texto porque la divergencia es sustancial y debe permanecer auditable.
