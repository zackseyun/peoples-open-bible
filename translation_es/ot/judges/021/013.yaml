translation:
  language: es
  text: Entonces toda la asamblea mandó decir y habló a los hijos de Benjamín que estaban en la peña de Rimón[a], y les proclamaron paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Sela-rimón»; el hebreo puede entenderse como una frase descriptiva, «la peña de Rimón», o como un nombre de lugar más fijo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: sent word
  chosen_spanish: envió aviso
  alternatives_spanish:
  - envió
  - envió mensajeros
  - mandó decir
  lexicon: HALOT
  rationale: El hebreo indica una acción de enviar vinculada inmediatamente al hablar a los destinatarios; en español, «envió aviso» comunica bien una misión de comunicación sin añadir mensajeros que el texto no explicita.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - toda la comunidad
  lexicon: HALOT
  rationale: «עֵדָה» designa al cuerpo reunido de Israel. «Asamblea» conserva el sentido corporativo y suena natural en español bíblico contemporáneo.
- source_word: וַיְדַבְּרוּ אֶל
  english_pob_choice: spoke to
  chosen_spanish: habló a
  alternatives_spanish:
  - hablaron a
  - se dirigió a
  - habló con
  lexicon: HALOT
  rationale: La construcción hebrea es el giro normal de comunicación dirigida a alguien. En español, «habló a» transmite de manera directa la relación verbal sin diluir el destinatario.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Se conserva la expresión familiar/tribal literal del hebreo. «Hijos de Benjamín» mantiene la forma del original y evita una generalización idiomática.
- source_word: אֲשֶׁר בְּסֶלַע רִמּוֹן
  english_pob_choice: who were at the rock of Rimmon
  chosen_spanish: que estaban en la peña de Rimón
  alternatives_spanish:
  - que estaban en Sela Rimón
  - que estaban en la roca de Rimón
  lexicon: HALOT
  rationale: «סֶלַע» puede ser «roca», «peña» o «peñasco». «Peña» da un español natural y mantiene la imagen geográfica; se conserva «Rimón» como topónimo.
- source_word: וַיִּקְרְאוּ לָהֶם שָׁלוֹם
  english_pob_choice: proclaimed peace to them
  chosen_spanish: les proclamó paz
  alternatives_spanish:
  - les anunció paz
  - les ofreció paz
  - les llamó paz
  lexicon: HALOT
  rationale: La expresión hebrea comunica una declaración formal de paz. «Proclamó paz» preserva ese tono declarativo mejor que una simple traducción literal de «llamó paz».
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - reconciliación
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם se refiere a relaciones pacíficas entre bandos. «Paz» es la forma más directa y amplia en español.
theological_decisions:
- issue: La frase final puede sonar como un saludo genérico o como una oferta pública de reconciliación.
  english_pob_reading: proclaimed peace to them
  chosen_spanish_reading: les proclamó paz
  alternative_spanish_readings:
  - les ofreció paz
  - les anunció paz
  rationale: Se mantiene el carácter público y formal de la declaración, sin reducirla a un saludo cotidiano. El contexto narrativo de Jueces favorece una iniciativa de pacificación.
  doctrine_reference: Narrativa histórica; no implica doctrina específica.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del borrador inglés POB y conserva su nota alternativa sobre la posible lectura del topónimo; no se identificaron revisiones aplicadas en el tramo auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se mantiene «hijos de Benjamín» para conservar la estructura tribal literal.
  - «Peña de Rimón» traduce el valor geográfico de סֶלַע sin perder la alternativa toponímica documentada en la nota.
