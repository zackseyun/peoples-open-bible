translation:
  language: es
  text: Y Holofernes estaba reclinado en su lecho, bajo el dosel[a], que estaba tejido con púrpura, oro, esmeraldas y piedras preciosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mosquitero» o «cortinaje de cama»; el término griego puede referirse a una cubierta tejida o colgante sobre el lecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπαυόμενος
  english_pob_choice: reclining
  chosen_spanish: estaba reclinado
  alternatives_spanish:
  - estaba descansando
  - yacía
  lexicon: LSJ
  rationale: En el contexto de banquete o aposento, la idea es una postura de reposo sobre el lecho; «estaba reclinado» conserva esa imagen con naturalidad en español sin añadir interpretación.
- source_word: κλίνη
  english_pob_choice: bed
  chosen_spanish: lecho
  alternatives_spanish:
  - cama
  - couch
  lexicon: LSJ
  rationale: «Lecho» comunica bien el objeto de descanso y mantiene un registro algo más elevado, adecuado al contexto literario. «Cama» sería más directo, pero menos solemne.
- source_word: κωνώπιον
  english_pob_choice: canopy
  chosen_spanish: dosel
  alternatives_spanish:
  - mosquitero
  - cortinaje de cama
  lexicon: LSJ
  rationale: El griego puede referirse a una cubierta tejida o colgante sobre la cama. «Dosel» es la forma más natural en español para una cubierta ornamental de cama; la alternativa más específica se conserva en la nota.
- source_word: πορφύρα
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tela púrpura
  lexicon: LSJ
  rationale: Aquí el término señala material/color lujoso. «Púrpura» conserva tanto el valor cromático como la asociación de riqueza.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - hilo de oro
  - oro tejido
  lexicon: LSJ
  rationale: En una lista de materiales tejidos, «oro» reproduce de forma breve y fiel el valor del material sin especificar más de lo que el texto dice.
- source_word: σμαράγδος
  english_pob_choice: emeralds
  chosen_spanish: esmeraldas
  alternatives_spanish:
  - piedras verdes preciosas
  lexicon: LSJ
  rationale: El plural es natural en español para el listado de adornos. «Esmeraldas» sigue la equivalencia habitual y mantiene el efecto lujoso.
- source_word: λίθων πολυτελῶν
  english_pob_choice: costly stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedras costosas
  - gemas preciosas
  lexicon: LSJ
  rationale: Aunque el griego subraya el alto valor, en español «piedras preciosas» expresa con claridad el sentido de lujo y adorno; «piedras costosas» sonaría menos idiomático.
- source_word: καθυφασμένων
  english_pob_choice: woven with
  chosen_spanish: tejido de
  alternatives_spanish:
  - entretejido con
  - bordado con
  lexicon: LSJ
  rationale: La forma participial indica confección textil incorporando los materiales mencionados. «Tejido de» es la construcción más natural en español para esa relación material.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de manera alta; no hay revisiones aplicadas ni variantes textuales relevantes en el expediente. Se siguió el valor ornamental de κωνώπιον con una solución española natural, preservando en nota la alternativa más literal.
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reflejar la coordinación narrativa del original.
  - Se usó un registro literario moderado («lecho», «dosel») coherente con el tono elevado del pasaje.
  - Se evitó traducir mecánicamente como «mosquitero» en el texto principal porque en español moderno reduciría indebidamente el matiz ornamental del contexto.
