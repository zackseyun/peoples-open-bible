review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva correctamente el nombre divino como «Yahvé». Sin embargo, dos decisiones no reflejan óptimamente el sentido fuente ni el rastro de auditoría: «comerán» atenúa el matiz permisivo de תֹּאכְלוּ en este contexto legal, y «cosecha» para תְּבוּאָתוֹ es más estrecho que «produce/rendimiento».'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse para sonar más natural y más preciso jurídicamente: «podrán comer» comunica mejor permiso que futuro simple, y «su producción» o «su rendimiento» evita la posible reducción a una sola cosecha puntual. También conviene mantener el posesivo comunitario neutral «su Dios» sin problema.'
  glossary_alignment: Alinea bien con el glosario en «Yahvé», «Dios» y «fruto». Requiere ajuste menor en el valor contextual de תֹּאכְלוּ y en la amplitud semántica de תְּבוּאָתוֹ.
  issues:
  - severity: medium
    issue: «comerán» no expresa con suficiente claridad el valor permisivo de תֹּאכְלוּ
    rationale: El inglés POB documenta correctamente que el imperfecto en este contexto legal expresa permiso tras prohibición previa. En español bíblico actual, «podrán comer» preserva mejor esa autorización que el futuro simple, que puede leerse como mera predicción o mandato.
  - severity: medium
    issue: «cosecha» estrecha el sentido de תְּבוּאָתוֹ
    rationale: 'תְּבוּאָה denota producción/rendimiento/produce. «Cosecha» puede entenderse como una recolección puntual, mientras que aquí el sentido es más amplio: el incremento del rendimiento del árbol o plantación.'
  - severity: low
    issue: La frase «para que les aumente su cosecha» suena algo menos natural que una formulación con sujeto explícito
    rationale: 'Una leve reestructuración mejora la fluidez en español sin apartarse del hebreo: «para que su producción les aumente» o «para que aumente su producción para ustedes». '
  revised_spanish_text: Y en el quinto año podrán comer su fruto, para que su producción les aumente. Yo soy Yahvé, su Dios.
  revision_rationale: Se ajusta el verbo principal a «podrán comer» para reflejar el permiso legal del hebreo, y se sustituye «cosecha» por «producción» para conservar la amplitud de תְּבוּאָה y distinguirla de «fruto». No se requieren notas al pie porque no queda una ambigüedad nueva en español.
