  rationale: Se corrige una construcción poco natural en español («el cordero uno») por «el primer cordero» para mantener claridad y dignidad estilística. Aunque el hebreo dice literalmente «el uno», en español esa literalidad suena forzada; el paralelo con «el segundo» conserva adecuadamente la secuencia. También se mueve el marcador de nota a la frase «entre las tardes», que es el elemento realmente comentado por la nota.
