revisions:
- from: Entonces el rey de Israel fue[a], junto con el rey de Judá y el rey de Edom, y dieron un rodeo de siete días; pero no había agua para el campamento ni para el ganado que iba tras ellos.
  to: Entonces el rey de Israel fue, junto con el rey de Judá y el rey de Edom, y dieron un rodeo de siete días de camino; pero no había agua para el campamento ni para los animales[a] que iban tras ellos.
  rationale: Se reubica la nota al pie para que ancle correctamente en la frase que explica el idiomatismo hebreo. También se ajusta ‘ganado’ a ‘animales’ para reflejar mejor el alcance contextual de בְּהֵמָה y se precisa ligeramente el recorrido con ‘siete días de camino’. No se requiere adjudicación adicional porque la corrección es editorial y lexicalmente directa.
