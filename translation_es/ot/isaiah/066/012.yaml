base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/012.yaml
  text: 'For thus says Yahweh: Behold[a], I am extending peace to her like a river, and the glory of the nations like an overflowing stream; and you will nurse, you will be carried on the hip[b], and bounced on the knees.'
  footnotes:
  - marker: a
    text: Or 'the wealth/abundance of the nations.' The Hebrew 'glory' can include the nations' splendor and riches.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be dandled on the knees.' The Hebrew depicts affectionate, childlike care.
    reason: lexical_alternative
