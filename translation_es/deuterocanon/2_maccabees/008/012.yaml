translation:
  language: es
  text: Pero la noticia del avance de Nicanor llegó a Judas[a]; y, cuando había comunicado a los que estaban con él la llegada del ejército[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la noticia sobre el ataque de Nicanor llegó a Judas’. El griego ἐφόδου puede significar ‘ataque’, ‘asalto’ o ‘avance’.
    reason: lexical_alternative
  - marker: b
    text: O ‘de la presencia del ejército’. La frase griega τὴν παρουσίαν τοῦ στρατοπέδου es compacta y puede aludir tanto a la presencia del ejército cerca de allí como a su llegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέπεσεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - alcanzó
  - se presentó
  lexicon: LSJ
  rationale: En la construcción idiomática con πληροφορία o noticia que se acerca a alguien, el sentido es que la noticia ‘llegó’ a Judas, no que algo cayera literalmente sobre él. ‘Llegó’ conserva la fuerza informativa y suena natural en español.
- source_word: περὶ τῆς τοῦ Νικάνορος ἐφόδου
  english_pob_choice: news of Nicanor’s advance
  chosen_spanish: la noticia del avance de Nicanor
  alternatives_spanish:
  - la noticia del ataque de Nicanor
  - la noticia de la incursión de Nicanor
  - la noticia del asalto de Nicanor
  lexicon: LSJ
  rationale: ἐφόδος puede ser ‘ataque’, ‘asalto’ o ‘avance’. Como el contexto presenta la aproximación previa al combate, ‘avance’ evita exagerar el matiz de ataque consumado y sigue de cerca la idea de movimiento hostil.
- source_word: μεταδόντος
  english_pob_choice: he had informed
  chosen_spanish: había comunicado
  alternatives_spanish:
  - había informado
  - había dado aviso
  - había dado a conocer
  lexicon: LSJ
  rationale: El genitivo absoluto expresa la acción de transmitir la información a los compañeros de Judas. ‘Había comunicado’ conserva el valor de ‘dar a participar / transmitir’ del verbo griego y mantiene un tono sobrio.
- source_word: τοῖς σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a sus compañeros
  - a los que iban con él
  - a los que estaban junto a él
  lexicon: LSJ
  rationale: La frase es sencilla y de referencia amplia. ‘Los que estaban con él’ preserva el referente sin añadir precisión no presente en el griego.
- source_word: τὴν παρουσίαν τοῦ στρατοπέδου
  english_pob_choice: the army’s arrival
  chosen_spanish: la llegada del ejército
  alternatives_spanish:
  - la presencia del ejército
  - la presencia del campamento
  - la llegada del campamento
  lexicon: LSJ
  rationale: παρουσία puede significar ‘presencia’ o ‘llegada/arribo’. στρατόπεδον puede referirse al ejército o al campamento. En español, ‘la llegada del ejército’ expresa de forma natural el posible sentido de presencia cercana o arribo, sin forzar la imagen de un ‘campamento’ presente como sujeto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al preferir un verbo natural para μεταδόντος y una solución más clara para τὴν παρουσίαν τοῦ στρατοπέδου. También se evitó calcar la ambigüedad del sintagma final de forma opaca en español, pero se preservó mediante nota la alternativa de ‘presencia’.
  spanish_consistency_notes:
  - Se mantuvo ‘Judas’ para Ἰούδας y ‘Nicanor’ como nombre propio transliterado estándar.
  - Se evitó ‘SEÑOR’ u otras equivalencias no pertinentes; el pasaje no contiene el nombre divino.
  - ‘Ejército’ se usa como solución contextual para στρατόπεδον, ya que en español ‘campamento’ resultaría menos natural en el complemento nominal final.
