revisions:
- from: 'Y cuando se acercó el momento de su muerte, las mujeres que estaban junto a ella le dijeron: «No temas, porque has dado a luz un hijo». Pero ella no respondió, ni puso [a] atención en ello.'
  to: 'Y cerca del momento de su muerte, las mujeres que estaban junto a ella le dijeron: «No temas, porque has dado a luz un hijo». Pero ella no respondió, ni lo tomó a pecho[a].'
  rationale: Se ajustó la frase temporal para reflejar más de cerca וּכְעֵת מוּתָהּ sin añadir la noción de que 'se acercó' el momento. También se reemplazó 'puso atención en ello' por 'lo tomó a pecho', que es más idiomático en español y preserva mejor la fuerza del hebreo y de la POB inglesa 'take it to heart', mientras la nota mantiene la alternativa más literal del corazón.
