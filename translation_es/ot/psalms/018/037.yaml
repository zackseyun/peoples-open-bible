translation:
  language: es
  text: Ensanchas mis pasos debajo de mí[a], y mis tobillos no han cedido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haces anchos mis pasos debajo de mí». La imagen hebrea presenta a Yahvé dando espacio amplio o firmeza para los pasos del salmista.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis tobillos no han resbalado» / «mis pies no han resbalado» / «mis tobillos no han vacilado». El hebreo describe que no se pierde la firmeza del apoyo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְחִיב
  english_pob_choice: You broaden
  chosen_spanish: Ensanchas
  alternatives_spanish:
  - Agrandas
  - Ensanchas para mí
  lexicon: HALOT
  rationale: El hifil de רחב expresa hacer ancho/ensanchar. En español, «ensanchas» conserva bien la acción causativa y suena natural en un registro bíblico moderno.
- source_word: צַעֲדִי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mi paso
  - mis pisadas
  - mi andar
  lexicon: HALOT
  rationale: El sustantivo se refiere a pasos o zancadas. En español, el plural «mis pasos» refleja el plural hebreo y mantiene la imagen del caminar sin introducir una interpretación excesiva.
- source_word: תַחְתָּי
  english_pob_choice: beneath me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - por debajo de mí
  lexicon: HALOT
  rationale: La preposición expresa ubicación inferior. «Debajo de mí» reproduce de forma natural la relación espacial del hebreo.
- source_word: מָעֲדוּ
  english_pob_choice: have not given way
  chosen_spanish: no han resbalado
  alternatives_spanish:
  - no han vacilado
  - no han tropezado
  - no han cedido
  lexicon: HALOT
  rationale: Con tobillos como sujeto, el verbo sugiere pérdida de firmeza o de apoyo. «No han resbalado» preserva la imagen de pie seguro y encaja con el campo semántico de deslizarse/ceder.
- source_word: קַרְסֻלָּי
  english_pob_choice: my ankles
  chosen_spanish: mis tobillos
  alternatives_spanish:
  - mis pies
  - mis corvejones
  lexicon: HALOT
  rationale: El término designa específicamente los tobillos/los huesos del tobillo. «Mis tobillos» conserva la concreción corporal del hebreo mejor que una generalización a «pies».
theological_decisions:
- issue: La imagen idiomática de seguridad en el andar
  english_pob_reading: God gives secure footing or ample room for the psalmist's steps.
  chosen_spanish_reading: Dios ensancha el camino de andar del salmista mediante pasos firmes, sin convertir el objeto del verbo en 'el terreno'.
  alternative_spanish_readings:
  - Dios me da pisada segura
  - Dios ensancha el suelo debajo de mí
  rationale: El texto hebreo habla de pasos ensanchados 'debajo de mí' y de tobillos que no resbalan. La traducción mantiene la metáfora del caminar y su sentido de estabilidad, sin reemplazar el objeto verbal por 'suelo' o 'terreno', lo cual sería una explicación interpretativa no exigida por el hebreo.
  doctrine_reference: Salmo 18:36-37; cf. la continuidad temática de Yahvé como quien afirma los pies del justo.
translation_notes:
  revision_awareness: Se tomó en cuenta el control de revisión que corrigió una sobreinterpretación anterior de צַעֲדִי como 'the ground' y la posterior actualización inglesa a 'my steps'. Por eso el español conserva el objeto verbal ('mis pasos') y evita desplazar la imagen al terreno.
  spanish_consistency_notes:
  - Se mantiene «pasos» en plural para reflejar el plural hebreo y la revisión inglesa reciente.
  - Se conserva la concreción anatómica de «tobillos» para קַרְסֻלָּי, coherente con la imagen de estabilidad corporal.
  - No se introduce «SEÑOR»; el versículo no contiene el tetragrámaton explícito en esta línea, aunque el contexto salmódico se dirige a Yahvé.
