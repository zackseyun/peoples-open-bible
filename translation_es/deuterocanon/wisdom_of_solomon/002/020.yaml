lexical_decisions:
- source_word: θανάτῳ
  english_pob_choice: to a ... death
  chosen_spanish: a una muerte
  alternatives_spanish:
  - con una muerte
  - por una muerte
  lexicon: LSJ
  rationale: El dativo con καταδικάζω expresa la pena a la que se lo condena; en español, la construcción natural y fiel es 'condenarlo a una muerte'.
- source_word: ἀσχήμονι
  english_pob_choice: shameful
  chosen_spanish: vergonzosa
  alternatives_spanish:
  - deshonrosa
  - ignominiosa
  - indecente
  lexicon: LSJ
  rationale: El adjetivo apunta a algo que causa deshonra o vergüenza pública. 'Vergonzosa' mantiene ese matiz social con español claro y digno.
- source_word: καταδικάσωμεν
  english_pob_choice: Let us condemn
  chosen_spanish: Condenémoslo
  alternatives_spanish:
  - Sentenciémoslo
  - Condenémoslo judicialmente
  lexicon: LSJ
  rationale: Es un subjuntivo exhortativo en primera persona plural; el imperativo exhortativo español 'Condenémoslo' preserva la deliberación colectiva y el sentido judicial.
- source_word: ἐπισκοπή
  english_pob_choice: examination
  chosen_spanish: examen
  alternatives_spanish:
  - visita
  - visitación
  - cuidado
  - vindicación
  lexicon: LSJ
  rationale: Siguiendo la revisión inglesa reciente, 'examen' refleja bien el sentido de escrutinio o inspección en este contexto. En la nota se preserva la tensión de posibles sentidos más amplios del término griego.
- source_word: ἐκ λόγων αὐτοῦ
  english_pob_choice: according to his words
  chosen_spanish: conforme a sus palabras
  alternatives_spanish:
  - según sus palabras
  - a partir de sus palabras
  - sobre la base de sus palabras
  lexicon: LSJ
  rationale: La frase indica que el juicio o escrutinio se hará en relación con lo que él ha dicho. 'Conforme a' es idiomático y conserva la relación normativa/criterial del griego.
theological_decisions:
- issue: Alcance de ἐπισκοπή en este contexto
  english_pob_reading: examination
  chosen_spanish_reading: examen
  alternative_spanish_readings:
  - visita
  - visitación
  - cuidado
  - vindicación
  rationale: El griego permite una gama semántica que incluye atención divina, inspección o intervención. En esta línea los hablantes maliciosos anticipan que las palabras del justo serán sometidas a escrutinio; 'examen' es natural en español y mantiene abierta la posibilidad de una intervención divina sin resolverla demasiado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó una formulación más literal de 'visitation' por 'examination' para reflejar mejor ἐπισκοπή en este contexto, sin cerrar el abanico semántico del término griego.
  spanish_consistency_notes:
  - Se mantuvo 'Condenémoslo' como exhortación colectiva, coherente con el subjuntivo griego.
  - Se evitó 'SEÑOR' u otra máscara, porque este versículo no contiene el nombre divino.
  - '''Examen'' fue preferido por la naturalidad en español y por su compatibilidad con el sentido de escrutinio judicial.'
  - La nota conserva alternativas interpretativas relevantes para ἐπισκοπή, evitando fijar indebidamente un único sentido.
