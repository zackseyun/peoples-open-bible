  to: Los rectos se horrorizan ante esto, y el inocente se despierta contra el impío[a].
  rationale: Se conserva la traducción general, pero se ajusta יִתְעֹרָר a «se despierta» para reflejar mejor el matiz reflexivo de activación personal documentado en el POB inglés. La nota alternativa sobre חָנֵף se mantiene, anclada directamente en «el impío», que es donde corresponde la ambigüedad léxica.
