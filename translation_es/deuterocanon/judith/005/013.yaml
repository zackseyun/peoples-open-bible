translation:
  language: es
  text: Y Dios secó el mar Rojo delante de ellos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo en algunas traducciones la tradición hebrea subyacente del éxodo, «el mar de Juncos». El texto griego aquí dice «el mar Rojo».
    reason: alternative_reading
lexical_decisions:
- source_word: κατεξήρανεν
  english_pob_choice: dried up
  chosen_spanish: secó
  alternatives_spanish:
  - secó por completo
  - dejó seco
  lexicon: LSJ
  rationale: El verbo griego expresa causar que algo quede totalmente seco. En español, «secó» comunica de forma natural y fiel la acción divina sobre el mar; el contexto ya sugiere que se trata de dejarlo transitable, sin necesidad de una perífrasis más larga.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: LSJ
  rationale: Corresponde directamente al sujeto con artículo. En español bíblico normal se omite el artículo ante «Dios».
- source_word: τὴν ἐρυθρὰν θάλασσαν
  english_pob_choice: the Red Sea
  chosen_spanish: el Mar Rojo
  alternatives_spanish:
  - el Mar de Juncos
  lexicon: LSJ
  rationale: El griego de la Septuaginta dice literalmente «Mar Rojo», por lo que esa es la forma principal en el texto español. Se preserva así el testimonio griego directo; la alternativa basada en la tradición hebrea se documenta en nota.
- source_word: ἔμπροσθεν αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: LSJ
  rationale: Es una equivalencia natural y clara en español para indicar la posición del mar al ser abierto por Dios en favor del pueblo.
theological_decisions:
- issue: Tensión entre el testimonio griego de la Septuaginta y la tradición hebrea subyacente sobre el nombre del mar del éxodo
  english_pob_reading: the Red Sea, with a footnote noting the Reed Sea alternative from Hebrew-based renderings
  chosen_spanish_reading: el Mar Rojo, con nota sobre «el Mar de Juncos» como alternativa basada en la tradición hebrea
  alternative_spanish_readings:
  - el Mar de Juncos
  rationale: El texto fuente inmediato es griego y usa ἐρυθρὰν θάλασσαν; por fidelidad al testimonio griego, el cuerpo principal conserva «Mar Rojo». Para mantener la transparencia auditiva, la nota registra la alternativa conocida en algunas traducciones apoyadas en el hebreo.
  doctrine_reference: 'Translation philosophy: primacía del original griego con preservación de la tensión textual; no armonizar prematuramente entre tradiciones'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la redacción española sigue de cerca la lectura griega de Swete y conserva la alternativa hebrea en nota, conforme al aparato auditado.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo, conforme al uso bíblico natural en español.
  - Se mantiene «Mar Rojo» en el texto principal por fidelidad al griego de la Septuaginta.
  - La nota a preserva explícitamente la tensión entre la lectura griega y la alternativa hebrea sin resolverla en el cuerpo del verso.
