translation:
  language: es
  text: Mientras aún hablaba y oraba, confesando mi pecado y el pecado de mi pueblo, Israel, y presentando mi súplica[a] ante Yahvé, mi Dios, acerca del monte santo de mi Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi petición’. El modismo hebreo dice literalmente ‘haciendo caer mi súplica’ delante de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: El ‘monte santo de mi Dios’ se refiere a Sion/Jerusalén, el lugar del santuario de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: While I was still
  chosen_spanish: Mientras aún
  alternatives_spanish:
  - Y aún mientras
  - Y todavía
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor temporal de continuidad de la forma hebrea, manteniendo la idea de una acción en curso.
- source_word: מְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - decía
  - estaba hablando
  lexicon: HALOT
  rationale: El participio hebreo describe una acción en progreso; en español, el imperfecto transmite bien esa simultaneidad en un registro sobrio.
- source_word: וּמִתְפַּלֵּל
  english_pob_choice: praying
  chosen_spanish: oraba
  alternatives_spanish:
  - orando
  - orando a Dios
  - rogaba
  lexicon: HALOT
  rationale: En este contexto de petición a Dios, 'orar' comunica adecuadamente la acción sin forzar un calco; 'rogaba' es posible, pero menos paralelo al resto de la cláusula.
- source_word: וּמִתְוַדֶּה
  english_pob_choice: confessing
  chosen_spanish: confesando
  alternatives_spanish:
  - reconociendo
  - declarando
  lexicon: HALOT
  rationale: Con el objeto 'mi pecado', el valor es confesión de culpa, no alabanza ni agradecimiento; 'confesando' conserva esa carga.
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi culpa
  - mi pecado personal
  lexicon: HALOT
  rationale: El contexto inmediato exige el sentido moral de 'pecado', no 'ofrenda por el pecado'. 'Pecado' mantiene la tensión lexical del hebreo.
- source_word: וְחַטַּאת עַמִּי יִשְׂרָאֵל
  english_pob_choice: and the sin of my people Israel
  chosen_spanish: y el pecado de mi pueblo Israel
  alternatives_spanish:
  - y el pecado de Israel, mi pueblo
  - y el pecado de mi pueblo, Israel
  lexicon: HALOT
  rationale: Conserva la relación de posesión y la apposición sin sonar rígido en español. 'Pueblo Israel' preserva la unidad del nombre propio con el sustantivo colectivo.
- source_word: וּמַפִּיל
  english_pob_choice: presenting
  chosen_spanish: presentando
  alternatives_spanish:
  - echando
  - poniendo delante de
  lexicon: HALOT
  rationale: El hebreo literalmente expresa 'hacer caer'; aquí el modismo significa poner o presentar una súplica delante de Dios. 'Presentando' comunica el sentido idiomático sin perder la imagen subyacente.
- source_word: תְּחִנָּתִי
  english_pob_choice: my plea
  chosen_spanish: mi súplica
  alternatives_spanish:
  - mi ruego
  - mi petición
  lexicon: HALOT
  rationale: '''Súplica'' conserva el tono urgente y reverente del término hebreo y el matiz de petición implorante.'
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: '''Ante'' es natural en registro bíblico y refleja la relación espacial/relacional de estar en la presencia de Dios.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton con la forma 'Yahvé' en español.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: Reproduce de forma directa el posesivo hebreo y mantiene el paralelismo de las dos apariciones del nombre divino.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca del
  alternatives_spanish:
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: En este contexto introduce el tema de la súplica, no un objeto físico; 'acerca del' expresa bien el valor tópico.
- source_word: הַר קֹדֶשׁ אֱלֹהָי
  english_pob_choice: the holy mountain of my God
  chosen_spanish: el monte santo de mi Dios
  alternatives_spanish:
  - la montaña santa de mi Dios
  - el monte santo de mi Dios
  lexicon: HALOT
  rationale: '''Monte santo'' es una expresión natural y tradicional en español bíblico, adecuada para el probable referente de Sion/Jerusalén sin explicitar más de lo que el verso dice.'
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo presenta directamente el Tetragrámaton. El proyecto pide no enmascararlo con 'SEÑOR'; 'Yahvé' preserva el nombre propio divino de manera transparente y lecturable en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Identidad del 'monte santo de mi Dios'
  english_pob_reading: The 'holy mountain of my God' refers to Zion/Jerusalem, the site of God's sanctuary.
  chosen_spanish_reading: el monte santo de mi Dios, con referencia a Sion/Jerusalén
  alternative_spanish_readings:
  - el monte santo literal sin identificación
  - el monte de la santidad de mi Dios
  rationale: La nota inglesa identifica el referente tradicional de la expresión. En español conviene preservar el texto principal sin glosar dentro del versículo, pero la referencia cultural puede explicitarse en nota.
  doctrine_reference: DOCTRINE.md Geographic/cultural referents in prophetic texts
translation_notes:
  revision_awareness: Se ha seguido de cerca el audit trail inglés y la fuente hebrea, manteniendo el valor aspectual de las participiales, la confesión de pecado, el modismo de la súplica presentada delante de Dios y la transliteración española coherente del nombre divino. No se detectan revisiones previas que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se usa ‘mi Dios’ para ambas apariciones de אֱלֹהַי, preservando el énfasis del hebreo.
  - ‘Súplica’ conserva mejor el matiz implorante que ‘petición’ en este contexto litúrgico.
  - La puntuación y el ritmo siguen un registro bíblico moderno y claro, sin calcos innecesarios.
