revisions:
- from: Porque también Dios[a] aborrece a los malhechores[b], y a los impíos les devolverá venganza.
  to: Porque también Dios[a] aborrece a los malhechores, y a los malvados[b] les pagará con venganza.
  rationale: Se corrigió el segundo grupo a 'los malvados' para seguir la preferencia hebrea documentada en el POB inglés y se dejó 'los impíos' como alternativa griega en nota. También se mejoró la naturalidad de la retribución futura con 'les pagará con venganza', que conserva el sentido judicial y la fuerza del original sin sonar torpe en español.
