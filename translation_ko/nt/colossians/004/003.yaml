id: COL.4.3
reference: Colossians 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: προσευχόμενοι ἅμα καὶ περὶ ἡμῶν, ἵνα ὁ θεὸς ἀνοίξῃ ἡμῖν θύραν τοῦ λόγου, λαλῆσαι τὸ μυστήριον τοῦ Χριστοῦ, δι’ ὃ καὶ δέδεμαι,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/003.yaml
  text: while also praying for us, that God may open to us a door for the word, to speak the mystery of Messiah, because of which I am also bound,
translation:
  language: ko
  text: 또한 우리를 위하여 함께 기도하십시오. 하나님께서 우리에게 말씀의 문을 여시어 메시아의 비밀[a]을 전하게 하시기를 구하는 것입니다. 나는 이 비밀 때문에 매여 있습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도의 비밀」. Χριστός의 칭호성을 보존하여 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「쇠사슬에 매여 있다」. 헬라어 완료 수동은 현재 매여 있는 상태를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσευχόμενοι ἅμα καὶ περὶ ἡμῶν
  english_pob_choice: while also praying for us
  chosen_korean: 또한 우리를 위하여 함께 기도하십시오
  alternatives_korean:
  - 함께 우리를 위해서도 기도하면서
  - 동시에 우리를 위해서도 기도하며
  lexicon: BDAG
  rationale: ἅμα와 καί를 「또한 함께」로 결합. 분사를 합쇼체 명령으로 자연스럽게 풀어 옮긴다.
- source_word: ἵνα ὁ θεὸς ἀνοίξῃ ἡμῖν θύραν τοῦ λόγου
  english_pob_choice: that God may open to us a door for the word
  chosen_korean: 하나님께서 우리에게 말씀의 문을 여시어
  alternatives_korean:
  - 하나님께서 우리에게 말씀의 문을 열어 주시고
  - 하나님이 우리에게 메시지의 기회를 열어 주시기를
  lexicon: BDAG
  rationale: 「말씀의 문」 비유를 한국 교회의 정립된 표현으로 보존.
- source_word: λαλῆσαι τὸ μυστήριον τοῦ Χριστοῦ
  english_pob_choice: to speak the mystery of Messiah
  chosen_korean: 메시아의 비밀을 전하게 하시기를
  alternatives_korean:
  - 메시아의 비밀을 말하게 하시기를
  - 메시아의 비밀을 선포하게 하시기를
  lexicon: BDAG
  rationale: 부정과거 부정사. 「전하게」가 한국 교회의 정립된 표현. Χριστός는 칭호 「메시아」.
- source_word: δι’ ὃ καὶ δέδεμαι
  english_pob_choice: because of which I am also bound
  chosen_korean: 나는 이 비밀 때문에 매여 있습니다
  alternatives_korean:
  - 그 때문에 나도 매임을 받았으며
  - 이 까닭으로 내가 결박되어 있으며
  lexicon: BDAG
  rationale: 완료 수동 「현재 매여 있는」 상태를 살린다. 「이 비밀」을 명시하여 가독성 살림.
