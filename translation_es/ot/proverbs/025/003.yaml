  to: 'Los cielos, por su altura[a], y la tierra, por su profundidad, y el corazón de los reyes: es inescrutable[b].'
  rationale: Se ajusta la cláusula final para reflejar mejor el nominal hebreo אֵין חֵקֶר sin añadir un sujeto y objeto no expresados. También se mejora la naturalidad de los dos primeros miembros con «por su altura / por su profundidad», manteniendo el sentido comparativo y la tersura proverbial. Se añade una nota para preservar la alternativa más literal documentada en el rastro inglés.
