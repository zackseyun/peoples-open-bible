translation:
  language: es
  text: Y el sacerdote pondrá un poco del aceite que está sobre su palma sobre el lóbulo de la oreja derecha del que está siendo purificado[a], y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho, en el lugar de la sangre de la ofrenda por la culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sobre el sitio donde se había aplicado la sangre de la ofrenda por la culpa».
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: shall put
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - aplicará
  - dará
  lexicon: HALOT
  rationale: נתן en este rito expresa la acción concreta de colocar/aplicar algo. En español, 'pondrá' conserva la naturalidad del acto sin añadir una interpretación excesiva.
- source_word: מִן הַשֶּׁמֶן
  english_pob_choice: some of the oil
  chosen_spanish: un poco del aceite
  alternatives_spanish:
  - algo del aceite
  - parte del aceite
  lexicon: HALOT
  rationale: El מן partitivo se expresa de forma idiomática como 'un poco del aceite', manteniendo la idea de una porción sin forzar una construcción literal.
- source_word: אֲשֶׁר עַל כַּפּוֹ
  english_pob_choice: that is on his palm
  chosen_spanish: que está sobre su palma
  alternatives_spanish:
  - que está en su palma
  - que está sobre la palma de su mano
  lexicon: HALOT
  rationale: כַּף aquí se refiere a la palma/hueco de la mano. 'Palma' en español es claro y respeta la imagen ritual de algo que está sobre la mano del sacerdote.
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: the lobe of the ... ear
  chosen_spanish: el lóbulo de la oreja
  alternatives_spanish:
  - el lóbulo de la oreja
  - el borde de la oreja
  - la parte blanda de la oreja
  lexicon: HALOT
  rationale: תנוך en este contexto ritual apunta al lóbulo de la oreja. 'Lóbulo' es el equivalente anatómico más preciso y comprensible en español actual.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: del que se está purificando
  alternatives_spanish:
  - del que se está limpiando
  - del purificado
  lexicon: HALOT
  rationale: El participio hitpael describe un proceso de purificación ritual en curso. 'Se está purificando' preserva esa dinámica mejor que una forma completada como 'purificado'.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - diestro
  - del lado derecho
  lexicon: HALOT
  rationale: El adjetivo anatómico se traduce de manera normal como 'derecha' en cada miembro, manteniendo la claridad sin tecnicismos innecesarios.
- source_word: בֹּהֶן יָדוֹ
  english_pob_choice: the thumb of his ... hand
  chosen_spanish: el pulgar de su mano
  alternatives_spanish:
  - el dedo gordo de su mano
  - el pulgar de la mano
  lexicon: HALOT
  rationale: בֹּהֶן se entiende aquí como el pulgar en la mano. 'Pulgar' es preciso y natural en español.
- source_word: בֹּהֶן רַגְלוֹ
  english_pob_choice: the big toe of his ... foot
  chosen_spanish: el dedo gordo de su pie
  alternatives_spanish:
  - el pulgar de su pie
  - el dedo mayor de su pie
  lexicon: HALOT
  rationale: Para el pie, בֹּהֶן se refiere al dedo gordo. 'Dedo gordo' conserva el paralelismo con el texto y es comprensible en español.
- source_word: עַל מְקוֹם דַּם הָאָשָׁם
  english_pob_choice: on the place of the guilt-offering blood
  chosen_spanish: sobre el lugar de la sangre de la ofrenda por la culpa
  alternatives_spanish:
  - sobre el sitio de la sangre de la ofrenda por la culpa
  - sobre el lugar donde se puso la sangre de la ofrenda por la culpa
  - sobre el sitio de la sangre de la ofrenda por la culpa
  lexicon: HALOT
  rationale: מקום se traduce como 'lugar'. אָשָׁם se rinde con 'ofrenda por la culpa' para conservar el sentido sacrificial explícito en español, en línea con el valor cultual del término.
theological_decisions:
- issue: Traducción de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de culpa
  - ofrenda de reparación
  rationale: En este contexto levítico, אָשָׁם nombra la ofrenda sacrificial asociada con la culpa. 'Ofrenda por la culpa' comunica el valor cultual sin ocultar el término detrás de una formulación genérica.
  doctrine_reference: Levítico 5–7; 14:12–18
- issue: Estado del sujeto de הַמִּטַּהֵר
  english_pob_reading: the one being cleansed
  chosen_spanish_reading: el que se está purificando
  alternative_spanish_readings:
  - el que es purificado
  - el purificado
  rationale: La forma verbal sugiere un proceso ritual en marcha, no solo un estado alcanzado. El español debe conservar ese aspecto dinámico.
  doctrine_reference: Levítico 14:2–32
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y solo señala cuestiones menores. Esta redacción sigue de cerca la sintaxis hebrea y el audit trail inglés, manteniendo la terminología sacrificial explícita y la progresión ritual del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque el hebreo de este texto no contiene el Tetragrámaton.
  - '''Ofrenda por la culpa'' preserva la referencia cultual de אָשָׁם sin sustituirla por un término más interpretativo.'
  - '''Se está purificando'' conserva el carácter procesual del participio hebreo.'
  - Se evita 'SEÑOR' para el nombre divino por consistencia con la política terminológica del proyecto, aunque aquí no aparece ningún nombre divino.
