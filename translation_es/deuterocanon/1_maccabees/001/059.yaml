translation:
  language: es
  text: Y el día veinticinco del mes estaban sacrificando sobre el altar[a] que estaba sobre el altar del holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos palabras distintas aquí: βωμός («altar») y θυσιαστήριον («altar del holocausto»), lo que sugiere un altar colocado sobre el altar principal del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμπτῃ καὶ εἰκάδι
  english_pob_choice: the twenty-fifth day
  chosen_spanish: el día veinticinco
  alternatives_spanish:
  - el día veinticinco del mes
  - el vigésimo quinto día
  lexicon: LSJ
  rationale: La expresión griega indica una fecha del mes; en español, "el día veinticinco" suena natural y conserva el valor temporal sin calcado excesivo. Se mantiene la referencia al mes en la frase siguiente, como hace el griego.
- source_word: τοῦ μηνός
  english_pob_choice: of the month
  chosen_spanish: del mes
  alternatives_spanish:
  - en el mes
  - de ese mes
  lexicon: LSJ
  rationale: El genitivo con la fórmula de fecha se expresa de manera directa y natural con "del mes".
- source_word: θυσιάζοντες
  english_pob_choice: they were sacrificing
  chosen_spanish: estaban sacrificando
  alternatives_spanish:
  - sacrificaban
  - ofrecían sacrificios
  lexicon: LSJ
  rationale: El participio presente se vierte con aspecto progresivo para reflejar la acción en curso. "Sacrificando" conserva el sentido cultual y la continuidad narrativa.
- source_word: ἐπὶ τὸν βωμόν
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: LSJ
  rationale: Con acusativo, ἐπί expresa dirección o contacto sobre una superficie; "sobre el altar" reproduce bien esa relación espacial en español.
- source_word: βωμός
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar pequeño
  - altar pagano
  lexicon: LSJ
  rationale: Se conserva "altar" para mantener la distinción léxica con θυσιαστήριον sin introducir interpretación adicional en el cuerpo del versículo.
- source_word: θυσιαστήριον
  english_pob_choice: altar of burnt offering
  chosen_spanish: altar del holocausto
  alternatives_spanish:
  - altar del sacrificio
  - altar de los holocaustos
  lexicon: LSJ
  rationale: En contexto del templo, "altar del holocausto" comunica el altar principal sobre el cual se colocó el otro altar. Mantiene la especificidad cultual que la POB inglesa preserva con "altar of burnt offering".
theological_decisions:
- issue: Distinción entre βωμός y θυσιαστήριον en contexto de profanación del templo
  english_pob_reading: Render βωμός as 'altar' and θυσιαστήριον as 'altar of burnt offering'
  chosen_spanish_reading: Traducir βωμός como "altar" y θυσιαστήριον como "altar del holocausto"
  alternative_spanish_readings:
  - Traducir ambos simplemente como "altar"
  - Traducir βωμός como "altar pagano" y θυσιαστήριον como "altar"
  rationale: El griego usa dos términos distintos, lo que sugiere un altar añadido sobre el altar mayor del templo. La traducción conserva esa distinción sin añadir en el texto principal una calificación interpretativa que el versículo no explicita.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El pasaje ha sido revisado y se mantiene sin cambios sustanciales respecto del último pase: la decisión clave sigue siendo preservar la distinción entre βωμός y θυσιαστήριον con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma de proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - '"Holocausto" se emplea aquí en sentido cultual tradicional para θυσιαστήριον, siguiendo el valor del altar del sacrificio en el contexto del templo.'
  - La puntuación y el orden de la frase buscan claridad moderna sin perder la estructura narrativa del griego.
