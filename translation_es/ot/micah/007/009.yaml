review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido forense del hebreo: soportar la indignación de Yahvé por haber pecado contra él, hasta que él tome la causa del hablante, haga justicia en su favor, lo saque a la luz y el hablante vea su צדקה. Sin embargo, no sigue la decisión auditada del POB inglés sobre בְּצִדְקָתוֹ, que mantiene «righteousness» en el texto principal y reserva «justice» como alternativa en nota. También «Cargaré la indignación» suena menos idiomático en español bíblico que «Soportaré» o «Llevaré».'
  spanish_quality_summary: 'La redacción es clara y legible, con buen español general y terminología adecuada para «Yahvé». No obstante, «Cargaré la indignación de Yahvé» es algo rígido/extraño en español natural. Además, la nota al pie está mal anclada: el marcador [a] aparece junto a «Yahvé», pero la nota explica «su justicia/rectitud», que corresponde a la frase final. Conviene mover el marcador a «su rectitud[a]» y ajustar el texto principal.'
  glossary_alignment: 'Alinea bien con «Yahvé» para יהוה. El problema principal es la falta de alineación con la rationale documentada para בְּצִדְקָתוֹ: el inglés POB eligió «his righteousness» en el texto principal con nota «Or ‘his justice’». En español, la mejor correspondencia es «su rectitud» en el texto principal con nota alternativa «O «su justicia»».'
  issues:
  - severity: high
    issue: La traducción principal de בְּצִדְקָתוֹ como «su justicia» no preserva la decisión auditada del POB inglés.
    rationale: El expediente documenta que el texto principal debe conservar la tensión con «righteousness», dejando «justice» como alternativa en nota por el contexto forense. El español debe reflejar esa misma decisión, idealmente con «su rectitud» en texto y «su justicia» en nota.
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: El marcador [a] aparece tras «Yahvé», pero el contenido de la nota trata sobre el significado de בְּצִדְקָתוֹ («su justicia/rectitud»). Esto incumple la disciplina de anclaje de notas.
  - severity: medium
    issue: «Cargaré la indignación de Yahvé» suena poco idiomático en español.
    rationale: Aunque «cargar» reproduce la imagen de נשא, en este contexto de soportar disciplina/ira divina «soportaré» comunica mejor el sentido y resulta más natural y digno en español eclesial.
  revised_spanish_text: Soportaré la indignación de Yahvé, porque he pecado contra él, hasta que él defienda mi causa y haga justicia por mí. Él me sacará a la luz; veré su rectitud[a].
  revised_footnotes:
  - marker: a
    text: O «su justicia». El término hebreo puede abarcar tanto la justicia como la rectitud, especialmente en un contexto de vindicación legal.
    reason: lexical_alternative
  revision_rationale: Se revisa para 1) alinear בְּצִדְקָתוֹ con la decisión auditada del POB inglés, manteniendo en el texto principal el valor de «righteousness» mediante «rectitud» y preservando «justicia» como alternativa en nota; 2) corregir el anclaje de la nota al lugar correspondiente; y 3) mejorar la naturalidad del español con «Soportaré» en vez de «Cargaré».
