translation:
  language: es
  text: Un cántico[a], un salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'por David' o 'para David'; el hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: En español, 'cántico' comunica bien la idea de una composición cantada y mantiene un registro bíblico digno. Se evita 'canción' por ser más coloquial y 'canto' por sonar menos específico como género literario en un encabezado.
- source_word: מִזְמ֣וֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - melodía
  - salmo musical
  lexicon: HALOT
  rationale: '''Salmo'' es el equivalente natural y estable en español para este término de encabezamiento, preservando el sentido de pieza lírica asociada al culto o a la música.'
- source_word: לְ/דָוִֽד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - a David
  lexicon: HALOT
  rationale: '''De David'' mantiene en español la misma ambigüedad que el hebreo: puede señalar autoría, pertenencia, dedicación o asociación, sin imponer una decisión más precisa que la del texto fuente.'
theological_decisions:
- issue: Ambigüedad del superscrito davídico
  english_pob_reading: Retain the ambiguous 'of David' rather than specifying authorship or dedication.
  chosen_spanish_reading: Mantener 'de David' sin precisar si indica autoría, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo permite varias relaciones y el testimonio auditado del POB en inglés preserva esa tensión. En español, 'de David' reproduce fielmente esa apertura interpretativa sin resolverla indebidamente.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo del control cruzado fue alto y sin observaciones, por lo que se conserva la lectura auditada sin ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene la distinción entre 'cántico' y 'salmo' para reflejar los dos sustantivos hebreos.
  - Se conserva la ambigüedad del encabezamiento davídico con 'de David' y una nota explicativa.
  - El registro es formal y bíblico, pero en español natural y publicable.
