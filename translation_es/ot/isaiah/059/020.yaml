base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/020.yaml
  text: And a Redeemer will come to Zion[a], and to those in Jacob who turn from transgression[d][c][b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'for Zion'; the Hebrew preposition can sometimes be rendered this way, though 'to Zion' fits the verb 'come' most naturally here.
    reason: lexical_alternative
  - marker: b
    text: '''Redeemer'' translates Hebrew go''el, a term used for one who acts to redeem or reclaim, often with covenantal or kinship overtones.'
    reason: cultural_note
  - marker: c
    text: Or 'to the repentant in Jacob' or 'to those in Jacob who turn back from rebellion.'
    reason: alternative_reading
  - marker: d
    text: Paul cites this verse in Romans 11:26, where the wording differs in part under the influence of the Greek tradition.
    reason: cross_reference
