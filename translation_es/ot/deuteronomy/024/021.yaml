translation:
  language: es
  text: Cuando recojas las uvas de tu viña, no vuelvas a rebuscar[a] detrás de ti; será para el extranjero residente[b], para el huérfano[c] y para la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no la rebusques otra vez» o «no vuelvas a pasar para recoger lo que quedó»; el verbo hebreo se refiere a hacer una segunda pasada para recoger lo que permanece.
    reason: lexical_alternative
  - marker: b
    text: «Extranjero residente» se refiere a un no israelita que vive entre Israel; alternativamente, «forastero».
    reason: cultural_note
  - marker: c
    text: O «huérfano». El término hebreo es literalmente «sin padre» en muchos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En legislación casuística, כִּי introduce una circunstancia esperada. «Cuando» conserva ese valor situacional mejor que un condicional más hipotético.
- source_word: תִבְצֹר
  english_pob_choice: gather the grapes
  chosen_spanish: recojas las uvas
  alternatives_spanish:
  - coseches las uvas
  - juntes las uvas
  lexicon: HALOT
  rationale: El verbo hebreo se refiere específicamente a la recolección de uvas en la viña. En español, «recojas las uvas» comunica de forma natural la acción concreta sin perder precisión.
- source_word: כַּרְמְךָ
  english_pob_choice: your vineyard
  chosen_spanish: tu viña
  alternatives_spanish:
  - tu viñedo
  - tu viña de uvas
  lexicon: HALOT
  rationale: כֶּרֶם es «viña/viñedo». «Viña» es la forma más natural y directa en español bíblico contemporáneo, y mantiene el campo agrícola específico.
- source_word: לֹא תְעוֹלֵל
  english_pob_choice: you shall not glean after yourself
  chosen_spanish: no la rebusques después de ti
  alternatives_spanish:
  - no la rebusques otra vez
  - no la espigues después de ti
  - no vuelvas a pasarla
  lexicon: HALOT
  rationale: El hebreo prohíbe hacer un segundo recorrido para recoger lo que quedó. «Rebuscar» transmite bien la idea de revisar de nuevo para recoger restos; «espigar» sería menos natural en español para una viña, y «vuelvas a pasarla» es más explicativo que el hebreo.
- source_word: אַחֲרֶיךָ
  english_pob_choice: after yourself
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras de ti
  - después de haber pasado
  lexicon: HALOT
  rationale: La expresión conserva la idea reflexiva de una segunda pasada hecha por el dueño o segador principal. «Después de ti» mantiene el orden temporal y la relación con la primera cosecha.
- source_word: לַגֵּר
  english_pob_choice: for the sojourner
  chosen_spanish: para el extranjero residente
  alternatives_spanish:
  - para el forastero
  - para el residente extranjero
  lexicon: HALOT
  rationale: גֵּר designa a un no israelita que vive entre el pueblo. «Extranjero residente» explica esa condición social y evita la ambigüedad de «forastero», que puede sonar demasiado general.
- source_word: לַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: para el huérfano
  alternatives_spanish:
  - para el desamparado
  - para el sin padre
  lexicon: HALOT
  rationale: Aunque literalmente significa «sin padre», en español bíblico «huérfano» comunica con claridad la categoría protegida por la ley. La tensión literal puede explicarse en la nota.
- source_word: וְלָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: y para la viuda
  alternatives_spanish:
  - y para la mujer viuda
  lexicon: HALOT
  rationale: אַלְמָנָה significa directamente «viuda»; la forma simple es la más fiel e idiomática.
- source_word: יִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - pertenecerá
  - quedará
  lexicon: HALOT
  rationale: En fórmula legal, יִהְיֶה expresa el destino asignado de lo restante. «Será para» reproduce naturalmente la función posesiva/distributiva del hebreo.
theological_decisions:
- issue: 'Triada social de protección: extranjero residente, huérfano y viuda'
  english_pob_reading: It shall be for the sojourner, the fatherless, and the widow.
  chosen_spanish_reading: será para el extranjero residente, para el huérfano y para la viuda.
  alternative_spanish_readings:
  - será para el forastero, para el huérfano y para la viuda
  - será para el residente extranjero, para el huérfano y para la viuda
  rationale: La ley presenta una provisión concreta para personas vulnerables. Mantener la triada sin suavizarla conserva el énfasis social y covenantal del texto. «Extranjero residente» hace explícita la posición legal y comunitaria del גֵּר.
  doctrine_reference: Éxodo 22:21–24; Levítico 19:9–10; Deuteronomio 14:28–29
- issue: Sentido literal de yָתוֹם como 'fatherless'
  english_pob_reading: the fatherless
  chosen_spanish_reading: el huérfano
  alternative_spanish_readings:
  - el sin padre
  - el huérfano o sin padre
  rationale: El hebreo subraya la condición de carecer de padre, pero en español «huérfano» es la equivalencia estable más clara para la categoría legal protegida. La literalidad se preserva en la nota de decisión lexical sin sacrificar inteligibilidad.
  doctrine_reference: Salmo 68:5; Santiago 1:27
translation_notes:
  revision_awareness: Se siguió el último ajuste del POB inglés al preferir una formulación vinculada específicamente a la recolección de uvas y a la prohibición de un segundo paso. La traducción española conserva esa precisión con «recojas las uvas» y «no la rebusques después de ti», evitando una paráfrasis más general como «cosechar» o «volver a pasar».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Viña» se prefirió sobre «viñedo» por naturalidad bíblica y correspondencia con כֶּרֶם.
  - La secuencia preposicional repetida («para el... y para la...») reproduce la estructura distributiva del hebreo.
  - No se introdujo «Cristo» ni terminología cristológica, pues el pasaje es legal y agrario.
