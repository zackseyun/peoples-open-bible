  text: Any wound[a], but not the wound of those who hate; and any vengeance[b], but not the vengeance of enemies.
  footnotes:
  - marker: a
    text: Or 'Any affliction, but not the affliction of those who hate.' The Greek noun rendered 'wound' can be understood more broadly as harm or affliction.
    reason: lexical_alternative
  - marker: b
    text: The Greek is an elliptical proverb, literally 'any wound ... and not the wound of those who hate; and any vengeance ... and not the vengeance of enemies,' expressing that such hostility is worse than other injuries.
