  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» es correcto para אֱלֹהִים. «Asaf» es la forma española esperable. Las decisiones «cantores», «jefes» y «acción de gracias» son compatibles con la evidencia fuente y el rastro léxico inglés.
