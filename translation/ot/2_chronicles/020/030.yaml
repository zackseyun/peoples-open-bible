id: 2CH.20.30
reference: 2 Chronicles 20:30
source:
  edition: WLC
  text: וַ/תִּשְׁקֹ֖ט מַלְכ֣וּת יְהוֹשָׁפָ֑ט וַ/יָּ֧נַֽח ל֦/וֹ אֱלֹהָ֖י/ו מִ/סָּבִֽיב׃פ
translation:
  text: So the kingdom of Jehoshaphat was at peace[a], and his God gave him rest all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the kingdom of Jehoshaphat was quiet, and his God gave him rest all around.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁקֹט
  chosen: was at peace
  alternatives:
  - was quiet
  - was tranquil
  - had rest
  lexicon: HALOT
  rationale: The verb שׁקט denotes being quiet, undisturbed, or at peace. With 'kingdom' as subject, idiomatic English is best expressed as 'was at peace' rather than the more wooden 'was quiet.'
- source_word: מַלְכוּת
  chosen: kingdom
  alternatives:
  - realm
  - royal rule
  lexicon: HALOT
  rationale: The noun refers to Jehoshaphat's kingdom/realm. 'Kingdom' is the most natural and standard rendering in this historical context.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: וַיָּנַח
  chosen: gave him rest
  alternatives:
  - settled him
  - caused him to rest
  - gave him relief
  lexicon: HALOT
  rationale: 'The Hiphil of נוח here is causative: God caused him to have rest. ''Gave him rest'' is clear, idiomatic, and preserves the causative sense.'
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The form is 'his God,' referring to Jehoshaphat's God. The singular sense is clear despite the plural form morphology of אֱלֹהִים.
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - from all around
  - round about
  lexicon: HALOT
  rationale: In this context the phrase indicates rest from surrounding threats in every direction. 'On every side' is idiomatic modern English and preserves the spatial-total sense.
- source_word: וַ
  chosen: for
  alternatives:
  - and
  rationale: Although waw can be rendered simply 'and,' here English style and the semantic relation favor 'for,' making explicit that the kingdom's peace resulted from God giving rest. This is an optimal-equivalence adjustment rather than a strict formal retention of coordination.
