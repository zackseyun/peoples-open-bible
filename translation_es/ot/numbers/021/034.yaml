  to: 'Y Yahvé dijo a Moisés[a]: «No le temas, porque lo he entregado en tu mano[b], junto con todo su pueblo y su tierra. Harás con él como hiciste con Sehón, rey de los amorreos, que habitaba en Hesbón».'
