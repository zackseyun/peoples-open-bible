source:
  edition: SBLGNT
  text: ὁ παρακαλῶν ἡμᾶς ἐπὶ πάσῃ τῇ θλίψει ἡμῶν, εἰς τὸ δύνασθαι ἡμᾶς παρακαλεῖν τοὺς ἐν πάσῃ θλίψει διὰ τῆς παρακλήσεως ἧς παρακαλούμεθα αὐτοὶ ὑπὸ τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/004.yaml
  text: who comforts us in all our affliction, so that we may be able to comfort those in any affliction through the comfort with which we ourselves are comforted by God.
  footnotes:
  - marker: a
    text: Or 'encourages ... encouragement'; the Greek uses the same word family throughout the verse.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 모든 환난 가운데서 우리를 위로하시는 분이시니, 이는 우리 자신이 하나님께 받는 위로로 모든 환난 가운데 있는 자들을 우리도 위로할 수 있게 하시려 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρακαλῶν / παρακαλεῖν / παρακαλούμεθα
  english_pob_choice: comforts / comfort / are comforted
  chosen_korean: 위로하시는 / 위로하다 / 위로를 받다
  alternatives_korean:
  - 격려하다
  lexicon: BDAG
  rationale: 본 단락의 핵심 동사 παρακαλέω의 세 굴절형을 모두 「위로하다」 어간으로 통일하여 반복을 보존한다.
- source_word: θλίψει
  english_pob_choice: affliction
  chosen_korean: 환난
  alternatives_korean:
  - 고난
  lexicon: BDAG
  rationale: θλῖψις는 외적 압박·박해의 무게를 담은 단어로 「환난」이 신학적 정립어. 「고난」(πάθημα)과 구별된다.
- source_word: παρακλήσεως
  english_pob_choice: comfort
  chosen_korean: 위로
  alternatives_korean: []
  lexicon: BDAG
  rationale: 1:3-7 단락 통일.
