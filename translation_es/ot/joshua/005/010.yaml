review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וַיַּחֲנוּ = ''acamparon'', בַּגִּלְגָּל = ''en Gilgal'', וַיַּעֲשׂוּ אֶת־הַפֶּסַח = ''celebraron la Pascua'', la fecha calendárica está bien representada, y בְּעַרְבוֹת יְרִיחוֹ = ''en los llanos de Jericó'' es fiel. El punto principal a corregir es la nota al pie: ofrece como alternativa ''los hijos de Israel'', que ya es la lectura principal, cuando el rastro inglés preserva como alternativas ''los israelitas'' y ''los hijos de Israel'' frente a una principal más literal ''los hijos/los hijos varones de Israel'' en inglés. En español, dado que la principal ya es ''los hijos de Israel'', la nota debe reflejar alternativas reales y no repetir la lectura principal.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Celebraron la Pascua'' y ''al atardecer'' leen bien. ''En los llanos de Jericó'' es plenamente inteligible. La única deficiencia de calidad es editorial: la nota actual está mal formulada porque repite la lectura principal y no aporta una alternativa útil. También conviene eliminar ''los niños de Israel'' de las decisiones léxicas internas por impropio, aunque eso no afecta el texto publicado.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. 'La Pascua' para הַפֶּסַח y 'los hijos de Israel' para בְּנֵי יִשְׂרָאֵל están alineados con la evidencia y la política de transparencia. Se mantiene la decisión documentada de preservar la expresión familiar hebrea en vez de normalizarla a 'los israelitas' en el texto principal.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal como si fuera alternativa.
    rationale: El texto principal ya dice 'los hijos de Israel', pero la nota dice 'O "los israelitas" o "los hijos de Israel"'. Una nota de alternativa no debe listar la misma formulación que está en el cuerpo del texto; debe ofrecer alternativas reales y explicar la literalidad hebrea.
  - severity: low
    issue: La nota explicativa puede formularse con más precisión en español.
    rationale: Dado que el hebreo בְּנֵי יִשְׂרָאֵל es literalmente 'hijos de Israel', una nota más limpia sería 'O "los israelitas". El hebreo dice literalmente "los hijos de Israel".' Esto evita redundancia y mejora la legibilidad editorial.
  revised_spanish_text: Y los hijos de Israel acamparon en Gilgal[a], y celebraron la Pascua el día catorce del mes, al atardecer, en los llanos de Jericó.
  revised_footnotes:
  - marker: a
    text: O 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota al pie para que presente una alternativa real y refleje con precisión la decisión léxica documentada, sin repetir la lectura ya usada en el texto.
