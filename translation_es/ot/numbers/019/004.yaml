revisions:
- from: Entonces Eleazar, el sacerdote, tomará con su dedo algo de su sangre y rociará algo de su sangre siete veces hacia el frente de la tienda de reunión[a].
  to: Entonces Eleazar, el sacerdote, tomará con su dedo algo de su sangre y asperjará algo de su sangre siete veces hacia el frente de la tienda de reunión[a].
  rationale: Se reemplaza «rociará» por «asperjará» para reflejar con mayor precisión y dignidad el verbo ritual hebreo הִזָּה en un contexto sacerdotal. Se mantienen las demás decisiones porque son fieles al hebreo, al rastro de auditoría inglés y a un español eclesial claro.
