translation:
  language: es
  text: 'Para los hijos de Judá[a], por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón que sale a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que salen a la guerra». El hebreo es un modismo que se refiere a quienes son aptos para el servicio militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יְהוּדָה
  english_pob_choice: For the sons of Judah
  chosen_spanish: Para los hijos de Judá
  alternatives_spanish:
  - Para los descendientes de Judá
  - De los hijos de Judá
  lexicon: HALOT
  rationale: בנים / בני conserva el sentido literal de filiación masculina y, en este contexto censal, designa a los miembros tribales de Judá. «Hijos» mantiene la forma del hebreo y el marco masculino del texto, mientras «Para» reproduce la función de encabezado de lista.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus genealogías
  - por su linaje
  lexicon: HALOT
  rationale: תולדות puede referirse a generaciones, descendencia o registros genealógicos. Aquí el sentido formulaico y de linaje se conserva mejor con «por sus generaciones», que sigue de cerca el hebreo sin convertirlo en una referencia demasiado documental.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  lexicon: HALOT
  rationale: En los censos tribales, משפחה designa una subdivisión social más precisa que «familia» en español moderno. «Clanes» comunica mejor esa unidad colectiva.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - por sus casas de los padres
  lexicon: HALOT
  rationale: La expresión conserva el orden idiomático del hebreo y el énfasis en la estructura paternal del parentesco. «Casas de sus padres» es claro y fiel al giro semítico.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - por número de nombres
  - según la cuenta de nombres
  lexicon: HALOT
  rationale: La fórmula hebrea indica contar personas nominalmente. «Según el número de nombres» conserva la expresión sin paraphrasearla como «censo» o «recuento».
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años arriba
  alternatives_spanish:
  - desde los veinte años y más
  - de veinte años y adelante
  lexicon: HALOT
  rationale: Es una fórmula de edad establecida. «De veinte años arriba» es natural en español bíblico moderno y preserva la idea de umbral etario.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every male going out to war
  chosen_spanish: todo varón que sale a la guerra
  alternatives_spanish:
  - todo varón que va a la guerra
  - todos los que salen a la guerra
  lexicon: HALOT
  rationale: El hebreo es un modismo militar que se refiere a los aptos para servicio bélico. «Todo varón» refleja el masculino del contexto censal, y «que sale a la guerra» conserva la imagen idiomática sin añadir la glosa interpretativa «apto».
theological_decisions:
- issue: Lenguaje censal masculino y elegibilidad militar
  english_pob_reading: every male going out to war
  chosen_spanish_reading: todo varón que sale a la guerra
  alternative_spanish_readings:
  - todo hombre que sale a la guerra
  - todos los que salen a la guerra
  rationale: El hebreo usa una fórmula masculina en un censo de varones en edad de servicio. «Varón» conserva el matiz de género y evita suavizar el referente colectivo que el texto impone.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que reemplazó «every man able to go out to war» por «every male going out to war» para acercarse más al hebreo sin añadir la idea interpretativa de «able to». La versión española sigue esa decisión al usar «todo varón que sale a la guerra» y evita añadir equivalentes explicativos no presentes en el texto fuente.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia formulaica del censo: descendencia, clanes, casas paternas, número de nombres y umbral de edad.'
  - Se evitó «SEÑOR» o «Cristo», pues no aparecen en este versículo.
  - «Varón» y «hijos» conservan el tono masculino del hebreo y del contexto censal.
  - La nota al pie está anclada únicamente en «guerra[a]» para evitar footnotes sin marca en el texto.
