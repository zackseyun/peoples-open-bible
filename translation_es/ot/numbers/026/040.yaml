translation:
  language: es
  text: 'Y los hijos de Bela fueron Ard y Naamán: de Ard, el clan ardita; de Naamán[a], el clan naamita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «el naamita» es la forma gentilicia derivada de Naamán; también podría verterse de modo más transparente como «el naamanita».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: And ... were
  chosen_spanish: Y ... fueron
  alternatives_spanish:
  - Y ... estaban
  - Ahora ... fueron
  lexicon: HALOT
  rationale: En una fórmula genealógica, וַיִּהְיוּ introduce una lista factual; «fueron» conserva el valor de simple existencia/asignación sin añadir matiz interpretativo.
- source_word: בְנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En este contexto tribal y genealógico, «hijos de» refleja de forma directa la relación de filiación del hebreo y mantiene el registro bíblico.
- source_word: בֶלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אַרְדְּ
  english_pob_choice: Ard
  chosen_spanish: Ard
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וְנַעֲמָן
  english_pob_choice: and Naaman
  chosen_spanish: y Naamán
  alternatives_spanish:
  - y Naamán
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para la pronunciación natural en español.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  lexicon: HALOT
  rationale: En contextos censales de Números, מִשְׁפָּחָה designa una unidad de parentesco menor que la tribu; «clan» reproduce mejor esa fuerza que «familia».
- source_word: הָאַרְדִּי
  english_pob_choice: the Ardite
  chosen_spanish: el ardita
  alternatives_spanish:
  - el ardita
  - la familia del ardita
  lexicon: HALOT
  rationale: El gentilicio hebreo se vierte como sustantivo de pertenencia. En español, la minúscula funciona bien como adjetivo/substantivo gentilicio dentro de la frase «el clan del ardita».
- source_word: לְנַעֲמָן
  english_pob_choice: from Naaman
  chosen_spanish: de Naamán
  alternatives_spanish:
  - desde Naamán
  - de Naamán
  lexicon: HALOT
  rationale: El prefijo ל expresa derivación/pertenencia en esta fórmula genealógica; «de» comunica esa procedencia de manera natural en español.
- source_word: הַנַּעֲמִי
  english_pob_choice: the Naamite
  chosen_spanish: el naamita
  alternatives_spanish:
  - el naamanita
  - el naamí
  lexicon: HALOT
  rationale: Se mantiene el gentilicio derivado de Naamán. «Naamita» preserva la equivalencia tradicional de la forma gentilicia breve que usa la POB en inglés.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alta concordancia. Se conservó la estructura genealógica y la diferencia entre el nombre propio Naamán y su gentilicio correspondiente, siguiendo la nota lexical de la POB en inglés.
  spanish_consistency_notes:
  - Se usó «clan» para מִשְׁפָּחָה por consistencia con Números en contexto censal.
  - Se mantuvo «hijos de» como fórmula genealógica directa.
  - Se transliteró Naamán con acento gráfico en español para lectura natural.
  - Se distinguió entre el nombre propio «Naamán» y el gentilicio «naamita».
