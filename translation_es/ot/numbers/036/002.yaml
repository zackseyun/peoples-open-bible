translation:
  language: es
  text: 'Y dijeron[a]: «Yahvé mandó a mi señor dar la tierra como herencia por sorteo a los hijos de Israel, y a mi señor se le mandó por Yahvé dar la herencia de Zelofehad, nuestro hermano, a sus hijas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de Israel» o «israelitas». El hebreo dice literalmente «hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: HALOT
  rationale: Es un título humano de respeto en discurso directo a Moisés. «Mi señor» conserva el registro deferente mejor que fórmulas más fuertes o serviles como «mi amo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino como nombre propio, según la política del proyecto, en vez de sustituirlo por un título. «Yahvé» es la forma española consistente con el criterio dado.
- source_word: לָתֵת אֶת הָאָרֶץ
  english_pob_choice: to give the land
  chosen_spanish: dar la tierra
  alternatives_spanish:
  - asignar la tierra
  - conceder la tierra
  lexicon: HALOT
  rationale: El verbo נתן aquí expresa la concesión de la tierra; «dar la tierra» es natural en español y no añade matices no garantizados por el texto.
- source_word: בְּנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - en posesión hereditaria
  lexicon: HALOT
  rationale: El sustantivo נחלה apunta a una porción heredada/otorgada legalmente. «Herencia» comunica bien el sentido jurídico y patrimonial en español.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - echando suertes
  lexicon: HALOT
  rationale: El término señala el medio de distribución. «Por sorteo» transmite el procedimiento con claridad moderna; «echando suertes» sería más expresivo, pero menos directo como frase nominal.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación masculina plural del hebreo, siguiendo la decisión de mantener la expresión formal del pacto. «Hijos de Israel» es la forma española más natural y fiel al encabezado corporativo.
- source_word: צֻוָּה בַיהוָה
  english_pob_choice: was commanded by Yahweh
  chosen_spanish: se le mandó por Yahvé
  alternatives_spanish:
  - fue mandado por Yahvé
  - recibió mandato de Yahvé
  lexicon: HALOT
  rationale: El pasivo comunica que el mandamiento vino de Yahvé y que Moisés fue el receptor. La construcción impersonal en español evita una pasiva rígida y mantiene la idea de mandato recibido.
- source_word: נַחֲלַת צְלָפְחָד
  english_pob_choice: the inheritance of Zelophehad
  chosen_spanish: la herencia de Zelofehad
  alternatives_spanish:
  - la heredad de Zelofehad
  - el patrimonio de Zelofehad
  lexicon: HALOT
  rationale: La expresión constructa se rinde de manera transparente como una herencia perteneciente a la línea de Zelofehad. «Herencia» conserva el valor jurídico del reparto.
- source_word: אָחִינוּ
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro pariente
  - nuestro consanguíneo
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal del hebreo. Aunque puede referirse de forma amplia a un miembro del clan, «nuestro hermano» es la forma más directa y fiel.
- source_word: לִבְנֹתָיו
  english_pob_choice: to his daughters
  chosen_spanish: a sus hijas
  alternatives_spanish:
  - para sus hijas
  - a las hijas de él
  lexicon: HALOT
  rationale: El complemento indica a las receptoras de la herencia. «A sus hijas» es la forma más natural en español en este contexto legal.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso legal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrammaton de manera explícita; se conserva como nombre propio para no borrar la identidad pactual de Dios. «Yahvé» sigue la decisión doctrinal del proyecto y mantiene transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish counterpart Yahvé'
- issue: Lenguaje corporativo masculino en לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - israelitas
  rationale: Se preserva el plural masculino del hebreo sin neutralizarlo, porque el proyecto prioriza la correspondencia formal cuando el texto fuente lo marca explícitamente. La referencia sigue siendo corporativa para todo el pueblo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés, sin cambios sustantivos respecto a la lectura aprobada; se ha adaptado el registro al español bíblico moderno y se ha mantenido la transparencia en el nombre divino y en la fórmula corporativa «hijos de Israel».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «hijos de Israel» para reflejar la forma masculina plural del hebreo.
  - «Herencia» y «sorteo» se usan para mantener el matiz jurídico de נחלה y גורל.
  - La puntuación y comillas se ajustan a norma española, con nota al pie anclada en «hijos de Israel».
