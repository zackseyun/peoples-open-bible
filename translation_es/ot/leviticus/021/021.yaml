review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo, mantiene correctamente ''Yahvé'' por יְהוָה, preserva la repetición de ''se acercará'' por יִגַּשׁ y conserva el idiomático ''el pan de su Dios'' con nota útil. Sin embargo, en אִשֵּׁי יְהוָה se aparta del razonamiento documentado del POB inglés: el inglés eligió ''food offerings'' precisamente para enlazar semánticamente con ''bread of his God''. ''Ofrendas encendidas'' no es una equivalencia natural en español y debilita ese vínculo.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'ofrendas encendidas' suena poco idiomático en español bíblico moderno. 'Ofrendas de alimento' o 'ofrendas de comida' comunican mejor la relación interna del versículo y suenan más naturales. La frase 'Un defecto hay en él' es comprensible y aceptable por énfasis legal, aunque algo rígida; puede mantenerse para conservar la estructura solemne.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה -> ''Yahvé''; לֶחֶם אֱלֹהָיו -> ''el pan de su Dios''; מוּם -> ''defecto''. El principal desajuste es אִשֵּׁי יְהוָה, donde conviene seguir la decisión auditada de resaltar el campo semántico de alimento y relegar ''ofrendas por fuego'' a nota alternativa.'
  issues:
