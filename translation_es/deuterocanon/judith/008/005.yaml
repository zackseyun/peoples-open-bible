  to: Y se hizo una tienda[a] en la azotea de su casa, y se puso saco[b] alrededor de la cintura, y sobre ella estaban las vestiduras de su viudez.
  rationale: Se corrige el dativo reflexivo αὐτῇ con «se hizo» para preservar fielmente el sentido del griego. También se ajusta «le puso» a «se puso» por claridad y naturalidad en español, sin cambiar el contenido léxico ni las notas existentes.
