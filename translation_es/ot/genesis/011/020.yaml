lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - siguió viviendo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa la duración de la vida hasta la edad indicada. «Vivió» reproduce con naturalidad ese valor idiomático en español sin añadir matiz no presente en el hebreo.
- source_word: רְעוּ
  english_pob_choice: Reu
  chosen_spanish: Reú
  alternatives_spanish:
  - Reu
  lexicon: Convención onomástica bíblica en español
  rationale: Se mantiene el nombre propio mediante transliteración. «Reú» adapta la acentuación al español para facilitar la lectura pública; conserva la identidad del nombre sin alterar su forma básica.
- source_word: שְׁתַּיִם וּשְׁלֹשִׁים שָׁנָה
  english_pob_choice: thirty-two years
  chosen_spanish: treinta y dos años
  alternatives_spanish:
  - dos y treinta años
  lexicon: HALOT
  rationale: El hebreo presenta el número compuesto en orden inverso al español. Se traduce de manera idiomática como «treinta y dos años», preservando con exactitud el valor numérico.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En genealogías, ילד indica la relación de procreación. «Engendró» conserva la fuerza genealógica y la concisión del hebreo. «Fue padre de» sería más explicativo, pero menos directo.
- source_word: שְׂרוּג
  english_pob_choice: Serug
  chosen_spanish: Serug
  alternatives_spanish:
  - Serug
  lexicon: Convención onomástica bíblica en español
  rationale: El nombre propio se translitera sin alterar la forma de referencia tradicional. No se requiere adaptación adicional.
