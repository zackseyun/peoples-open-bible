translation:
  language: es
  text: Sin embargo, vuelve tu atención a la oración de tu siervo y a su súplica de favor[a], Yahvé mi Dios, para oír el clamor[b] y la oración que tu siervo está orando delante de ti hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su súplica». El término hebreo puede denotar una petición ferviente de favor o misericordia.
    reason: lexical_alternative
  - marker: b
    text: O «el grito resonante». La palabra hebrea puede referirse a un grito fuerte; aquí se entiende mejor como un clamor dirigido a Dios en oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתָ
  english_pob_choice: Yet turn toward
  chosen_spanish: Sin embargo, vuelve tu rostro a
  alternatives_spanish:
  - y vuelve hacia
  - vuelve tu atención a
  - presta atención a
  lexicon: HALOT
  rationale: פנה conserva la imagen concreta de girarse o volverse hacia algo. En español, «volver tu rostro a» mantiene esa imagen sin sonar rígido. «Sin embargo» refleja el matiz adversativo/continuativo del contexto de la oración de Salomón.
- source_word: תְּפִלַּת
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la petición de oración
  lexicon: HALOT
  rationale: תפלה es el término normal para una oración dirigida a Dios. «Oración» es el equivalente más directo y natural en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto de invocación reverente a Dios, el término expresa sumisión y servicio humilde. En español bíblico y eclesial, «siervo» comunica mejor esa relación que «esclavo», aunque se evita «siervo» cuando pudiera sonar a título honorífico cristianizado sin perder el sentido básico.
- source_word: תְּחִנָּתוֹ
  english_pob_choice: his plea for favor
  chosen_spanish: su súplica de favor
  alternatives_spanish:
  - su súplica
  - su petición de misericordia
  - su entreaty
  lexicon: HALOT
  rationale: תחנה denota una petición insistente de gracia, favor o misericordia. «Súplica de favor» conserva esa fuerza y refleja mejor la nota semántica que una simple «súplica».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino y no sustituyéndolo por un título.'
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: La posesión de primera persona es directa y se expresa naturalmente en español como «mi Dios».
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para atender
  lexicon: HALOT
  rationale: שמע aquí introduce el propósito de atender la oración. «Oír» conserva el paralelismo semítico y encaja bien con el resto del verso.
- source_word: הָרִנָּה
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - el grito jubiloso
  - la voz
  lexicon: HALOT
  rationale: רנה puede aludir a un clamor o grito alto, y en este contexto de petición dirigida a Dios se entiende mejor como un clamor. «Clamor» preserva la intensidad sin decidir indebidamente por el matiz de canto.
- source_word: הַתְּפִלָּה
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  lexicon: HALOT
  rationale: Se mantiene el paralelismo hebreo con una repetición de «oración», en vez de variar estilísticamente y perder la correspondencia.
- source_word: מִתְפַּלֵּל
  english_pob_choice: is praying
  chosen_spanish: está haciendo
  alternatives_spanish:
  - está orando
  - está orando delante de
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «está haciendo» seguido de «la oración» se entiende de forma natural y evita una repetición excesiva de «orar» con el sustantivo «oración».
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión es literalmente espacial y, en contexto de oración, «delante de ti» resulta clara y fiel.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y conserva la referencia temporal inmediata.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto pide conservar el nombre divino en vez de sustituirlo por un título. «Yahvé» es la forma estándar elegida en esta serie para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de תְּחִנָּה en un contexto de oración regia
  english_pob_reading: his plea for favor
  chosen_spanish_reading: su súplica de favor
  alternative_spanish_readings:
  - su súplica
  - su ruego de misericordia
  rationale: 'No se reduce el término a una petición genérica: se conserva la idea de una imploración orientada al favor misericordioso de Dios, como indica el audit trail en inglés.'
  doctrine_reference: Lexical-theological nuance in prayer language
- issue: Sentido de הָרִנָּה junto a oración y súplica
  english_pob_reading: the cry
  chosen_spanish_reading: el clamor
  alternative_spanish_readings:
  - el grito
  - el clamor elevado
  rationale: La POB en inglés nota la posibilidad de un grito sonoro, pero aquí lo entiende como un clamor dirigido a Dios. «Clamor» mantiene la tensión entre intensidad vocal y carácter orante.
  doctrine_reference: Lexical-theological nuance in prayer language
translation_notes:
  revision_awareness: 'El registro inglés indica alta concordancia y sin cambios en la última revisión. La presente redacción sigue ese estado estable, conservando las dos tensiones léxicas documentadas: תְּחִנָּה como súplica de favor y הָרִנָּה como clamor.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefiere «siervo» para עבד en este contexto devocional de dirección a Dios.
  - Se conserva el paralelismo de «oración» para תְּפִלָּה en ambos casos.
  - «Clamor» evita perder el matiz intenso de רנה sin forzarlo a «canto».
  - El participio מִתְפַּלֵּל se vierte de manera progresiva con una construcción natural en español.
