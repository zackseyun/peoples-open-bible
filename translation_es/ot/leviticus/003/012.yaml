translation:
  language: es
  text: Pero si su ofrenda es una cabra, entonces la presentará delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino); tradicionalmente se traduce «el SEÑOR», pero aquí se conserva «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La conjunción condicional introduce un caso adicional dentro de la secuencia ritual. «Pero si» conserva el matiz de transición y suena natural en español bíblico moderno sin endurecer la oposición.
- source_word: עֵז
  english_pob_choice: a goat
  chosen_spanish: una cabra
  alternatives_spanish:
  - una cabra
  - una cabra hembra
  - una cabra (macho/hembra no especificado)
  lexicon: HALOT
  rationale: El hebreo designa la especie cabruna; en español, «cabra» es la equivalencia natural. Se evita «chivo» porque en el uso común puede sonar más marcado para macho y no refleja tan claramente la neutralidad del término hebreo en este contexto.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda
  - su sacrificio
  - su presentación
  lexicon: HALOT
  rationale: קָרְבָּן nombra una ofrenda llevada para ser presentada. «Ofrenda» mantiene el sentido general sin restringirlo indebidamente a una categoría más estrecha como «sacrificio».
- source_word: וְהִקְרִיבוֹ
  english_pob_choice: then he shall present it
  chosen_spanish: entonces la presentará
  alternatives_spanish:
  - y la presentará
  - entonces la ofrecerá
  - entonces la acercará
  lexicon: HALOT
  rationale: El hifil de קרב expresa hacer acercar/presentar. «Presentará» comunica bien la acción cultual en español y evita la posible ambigüedad de «ofrecerá», que puede sonar demasiado general o litúrgica.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En lenguaje cultual, «delante de» reproduce de forma clara y natural la idea espacial de presentarse ante la presencia de alguien.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: HALOT
  rationale: Se usa la forma española «Yahvé» para el nombre divino YHWH, conforme al criterio del proyecto de no sustituirlo por un título como «SEÑOR». Mantiene el valor de nombre propio y es comprensible para lectores de español.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahweh
  rationale: El texto hebreo emplea el Tetragrámaton. En español, «Yahvé» preserva el nombre divino como nombre propio y evita la sustitución por un título. Se refleja así la decisión teológica y editorial de la POB de no ocultar el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión auditada más reciente: no hubo cambios necesarios y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y culto, apto para lectura pública.
  - «Ofrenda» conserva la amplitud semántica de קָרְבָּן sin añadir interpretaciones.
  - El nombre divino se uniforma como «Yahvé» conforme al estándar del proyecto.
