base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/030/012.yaml
  text: And I will make the Nile channels dry[a], and I will sell the land into the hand of evil men; and I will devastate the land and its fullness by the hand of foreigners. I am Yahweh[c][b]; I have spoken.
  footnotes:
  - marker: a
    text: Or 'the canals' or 'the rivers'; in Egypt the term likely refers to the Nile waterways.
    reason: lexical_alternative
  - marker: b
    text: Or 'hand over the land'; the Hebrew verb is literally 'sell,' a judgment image for giving a people over to hostile power.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land and all that is in it.'
    reason: lexical_alternative
