translation:
  language: es
  text: 'Y muchas naciones pasarán por esta ciudad[a], y cada hombre dirá a su vecino[b]: «¿Por qué ha hecho Yahvé así a esta gran ciudad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pasarán por/ante esta ciudad». La preposición puede sugerir movimiento junto a la ciudad o al pasar por ella; no obliga a la idea de atravesarla.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre a su vecino», un modismo distributivo que indica conversación recíproca entre individuos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבְרוּ
  english_pob_choice: will pass by
  chosen_spanish: pasarán por
  alternatives_spanish:
  - pasarán junto a
  - pasarán al lado de
  lexicon: HALOT
  rationale: En contexto profético futuro, el verbo comunica tránsito futuro. Con עַל, el sentido es de pasar por la ciudad en observación, sin requerir la idea de atravesarla. «Pasarán por» mantiene la naturalidad del español y la relación espacial sugerida por el hebreo.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  - muchas gentes
  lexicon: HALOT
  rationale: גוֹיִם en Jeremías suele conservar el sentido político-colectivo de «naciones». «Pueblos» es posible, pero «naciones» preserva mejor el alcance internacional del juicio.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esta urbe
  lexicon: HALOT
  rationale: Se mantiene la referencia demostrativa simple y directa. «Ciudad» es el equivalente natural y fiel al sustantivo hebreo.
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man will say to his neighbor
  chosen_spanish: cada hombre dirá a su vecino
  alternatives_spanish:
  - uno al otro dirán
  - cada uno dirá a su compañero
  lexicon: HALOT
  rationale: La expresión es distributiva. «Cada hombre» conserva el singular masculino del hebreo y «su vecino» expresa la reciprocidad de manera natural en español.
- source_word: עַל מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿A causa de qué?
  lexicon: HALOT
  rationale: La pregunta causal se expresa de forma idiomática en español con «¿Por qué?», sin perder el sentido interrogativo del hebreo.
- source_word: עָשָׂה יְהוָה כָּכָה
  english_pob_choice: has Yahweh done thus
  chosen_spanish: ha hecho Yahvé así
  alternatives_spanish:
  - ha obrado así
  - ha hecho Yahvé de esta manera
  lexicon: HALOT
  rationale: «Ha hecho ... así» reproduce la construcción verbal sin forzar un calco. Se conserva «Yahvé» conforme al criterio del proyecto para el nombre divino. «Así» mantiene el peso de כָּכָה.
- source_word: לָעִיר הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: to this great city
  chosen_spanish: a esta gran ciudad
  alternatives_spanish:
  - a esta ciudad grande
  - a esta ciudad tan grande
  lexicon: HALOT
  rationale: גְּדוֹלָה aquí comunica prominencia e impacto; en español, «gran ciudad» es la forma más natural y solemne, más cercana al registro de lamento/juicio que «ciudad grande».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de sustituirlo por un título. Esto mantiene la audibilidad teológica del pasaje.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión distributiva masculina אִישׁ אֶל רֵעֵהוּ
  english_pob_reading: each man will say to his neighbor
  chosen_spanish_reading: cada hombre dirá a su vecino
  alternative_spanish_readings:
  - cada uno dirá a su vecino
  - unos a otros dirán
  rationale: Se conserva la forma masculina singular del hebreo, porque funciona como expresión representativa y el audit trail inglés la mantiene. No se neutraliza a «cada uno» para no borrar esa huella formal del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés: conserva el futuro profético, «muchas naciones», el giro distributivo masculino y el nombre divino como Yahvé/Yahweh. La principal decisión de estilo en español es usar «pasarán por» como equivalencia idiomática de עַל, sin perder la nota de observación externa al final del juicio.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Naciones» se reserva para גּוֹיִם en contextos internacionales/judiciales.
  - La construcción «cada hombre dirá a su vecino» conserva el distributivo masculino del original y su ritmo proverbial.
  - «Gran ciudad» se prefiere a «ciudad grande» por naturalidad y tono solemne.
