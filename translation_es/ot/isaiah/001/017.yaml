  to: Aprendan a hacer el bien; busquen la justicia, corrijan al opresor[a]; hagan justicia al huérfano, aboguen por la viuda.
  rationale: Se conserva la traducción principal del borrador porque es fiel al hebreo y al POB inglés. La revisión corrige el anclaje de la nota para que recaiga sobre la frase difícil אַשְּׁרוּ חָמוֹץ, que es donde existe la ambigüedad textual, y pule la redacción de una alternativa en la nota para un español más natural.
