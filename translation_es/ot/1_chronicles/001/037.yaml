  - Se mantuvo el formato breve de lista genealógica, con dos puntos tras el nombre del antepasado, como en la traducción inglesa auditada.
  - Los nombres propios se conservaron como transliteraciones, con ajustes mínimos de ortografía española donde mejoran la legibilidad sin cambiar la identificación.
  - No se introdujeron notas al pie porque el versículo no presenta variantes textuales ni alternativas de sentido que el POB inglés haya destacado.
