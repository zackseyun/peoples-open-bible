  to: Si puede[a], apenas recuperará la mitad, y la tendrá por un hallazgo; pero si no, ha sido privado de su dinero, y se ha ganado un enemigo por nada[b]. Le devolverá maldiciones e insultos, y en vez de honra le devolverá deshonra.
