id: 1PE.1.17
reference: 1 Peter 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ εἰ πατέρα ἐπικαλεῖσθε τὸν ἀπροσωπολήμπτως κρίνοντα κατὰ τὸ ἑκάστου ἔργον, ἐν φόβῳ τὸν τῆς παροικίας ὑμῶν χρόνον ἀναστράφητε·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/017.yaml
  text: "And if you call as Father the one who judges impartially according to each person's work, conduct yourselves in fear during the time of your sojourn."
translation:
  language: ko
  text: '여러분이 각 사람의 행위를 따라 편견 없이 심판하시는 분을 아버지라 부른다면, 여러분이 나그네로 살아가는 동안 두려움 가운데 처신하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπροσωπολήμπτως
  english_pob_choice: impartially
  chosen_korean: 편견 없이
  alternatives_korean:
  - 외모로 사람을 보지 아니하고
  - 차별 없이
  lexicon: BDAG
  rationale: 「외모로 보지 아니하다」(개역)는 셈어적 표현이지만 현대 합쇼체에서는 「편견 없이」가 자연스럽다.
- source_word: κατὰ τὸ ἑκάστου ἔργον
  english_pob_choice: according to each person's work
  chosen_korean: 각 사람의 행위를 따라
  alternatives_korean:
  - 각 사람의 행한 대로
  lexicon: BDAG
  rationale: 단수 ἔργον을 분배적 의미로 「행위」(총칭)로 옮긴다.
- source_word: τῆς παροικίας ὑμῶν χρόνον
  english_pob_choice: the time of your sojourn
  chosen_korean: 나그네로 살아가는 동안
  alternatives_korean:
  - 너희의 거류하는 때
  - 나그네 생활의 기간
  lexicon: BDAG
  rationale: παροικία(타향에서 잠시 사는 거주)를 1:1의 παρεπίδημος(나그네)와 연결하여 「나그네로 살아가는」으로 옮긴다.
- source_word: ἐν φόβῳ ... ἀναστράφητε
  english_pob_choice: conduct yourselves in fear
  chosen_korean: 두려움 가운데 처신하십시오
  alternatives_korean:
  - 경외함으로 행하십시오
  - 두려워하며 살아가십시오
  lexicon: BDAG
  rationale: φόβος를 「두려움」으로 직역하되, 심판자 하나님 앞의 경건한 떨림임을 문맥으로 드러낸다.
