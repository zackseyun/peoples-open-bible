translation:
  language: es
  text: Y en tu amor fiel cortarás a mis enemigos[a], y destruirás a todos los adversarios de mi alma[b], porque yo soy tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por tu amor fiel'; la preposición hebrea puede expresar también instrumento, además de esfera o base.
    reason: lexical_alternative
  - marker: b
    text: '''Mi alma'' también puede entenderse como ''mi vida'' o simplemente ''yo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְחַסְדְּךָ
  english_pob_choice: in your steadfast love
  chosen_spanish: por tu lealtad amorosa
  alternatives_spanish:
  - en tu amor constante
  - en tu misericordia
  - por tu fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal, misericordia y fidelidad relacional. En español, 'lealtad amorosa' comunica mejor la fuerza pactual y afectiva que una sola palabra como 'misericordia'. La preposición ב admite matiz de esfera o base, y aquí 'por' conserva con naturalidad esa base causal/instrumental.
- source_word: תַּצְמִית
  english_pob_choice: you will cut off
  chosen_spanish: cortarás
  alternatives_spanish:
  - extirparás
  - harás cesar
  - eliminarás
  lexicon: HALOT
  rationale: El hifil de צמת puede significar hacer cesar, acabar con o cortar de raíz. 'Cortarás' mantiene la imagen verbal fuerte y, en español, corresponde bien al valor de 'cut off' sin diluir la dureza del verbo.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a mis adversarios
  - a mis foes
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo se rinde de manera directa como 'mis enemigos'. Es la equivalencia natural y conserva el contraste con el siguiente hemistiquio.
- source_word: וְהַאֲבַדְתָּ
  english_pob_choice: you will destroy
  chosen_spanish: destruirás
  alternatives_spanish:
  - harás perecer
  - aniquilarás
  - borrarás
  lexicon: HALOT
  rationale: El hifil de אבד significa causar perecer o destruir. 'Destruirás' es fuerte, claro y mantiene la variación semántica respecto de 'cortarás' en la primera cola.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno de
  - a todos los
  lexicon: HALOT
  rationale: El distributivo כָּל se expresa naturalmente con 'a todos' en este contexto verbal y acusativo implícito.
- source_word: צֹרֲרֵי
  english_pob_choice: the adversaries of
  chosen_spanish: los adversarios de
  alternatives_spanish:
  - los que afligen a
  - los que hostigan a
  - los opresores de
  lexicon: HALOT
  rationale: צֹרֲרֵי deriva de צרר y denota hostilidad activa, presionar o afligir. 'Adversarios de' conserva el valor relacional sin forzar una perífrasis demasiado explicativa. Evita también suavizar el término a solo 'enemigos', ya ya aparece אֹיְבַי en la primera cola.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. Aquí 'mi vida' es una opción más natural en español que 'mi alma' cuando el paralelismo ya contiene 'enemigos' y 'adversarios', y evita una lectura excesivamente dualista. Mantiene la intensidad personal del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces la causal grounding of the psalmist's plea. 'Porque' is the clearest Spanish causal connector here.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque el uso religioso tradicional suele decir 'siervo', el sustantivo עֶבֶד tiene fuerza de dependencia y pertenencia servil. Dado el marco terminológico del proyecto, 'esclavo' preserva mejor la carga lexical y el vínculo de propiedad-lealtad implícito en el hebreo.
theological_decisions:
- issue: Lenguaje imprecatorio sobre enemigos
  english_pob_reading: Retain the direct petition that God cut off and destroy the psalmist's enemies.
  chosen_spanish_reading: Mantener la petición directa de que Dios corte y destruya a los enemigos del salmista.
  alternative_spanish_readings:
  - Suavizar a 'derrotar' o 'hacer callar'
  - Interpretar el lenguaje como meramente figurado sin fuerza judicial
  rationale: Los verbos hebreos son fuertes y el texto presenta una súplica de juicio dentro del marco del pacto y de la aflicción del salmista. La traducción debe conservar esa tensión sin atenuarla artificialmente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefirió una formulación más cercana a צֹרֲרֵי ('los adversarios de') en lugar de una paráfrasis verbal más amplia. En español se mantuvo esa mayor correspondencia con 'los adversarios de mi vida'.
  spanish_consistency_notes:
  - Se preservó Yahvé no porque aparezca aquí, sino porque en este verso no hay tetragrámaton explícito; por tanto no aplica.
  - Se evitó 'Cristo'/'Mesías' por no corresponder al texto.
  - Se optó por 'esclavo' para עבד, siguiendo la fuerza lexical documentada del proyecto.
  - Se eligió 'porque' para כִּי como conector causal natural y transparente.
  - Las notas a y b están ancladas en el texto exactamente en los segmentos correspondientes.
