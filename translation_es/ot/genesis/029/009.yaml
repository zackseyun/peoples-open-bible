revisions:
- from: Mientras él aún hablaba con ellos, Raquel llegó con el rebaño de su padre, porque ella era pastora.[a]
  to: Mientras él aún hablaba con ellos, Raquel vino con el rebaño de su padre, porque ella era pastora.[a]
  rationale: Se ajusta «llegó» a «vino» para reflejar más de cerca בָּאָה y la decisión auditada inglesa. Se corrige la nota para que preserve una alternativa léxica real y explique con claridad por qué el texto principal usa «pastora».
