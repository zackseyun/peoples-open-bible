translation:
  language: es
  text: Jeshua y Anniut y Serebías[a], Jadinus, Jarsubus, Abteus, Autaias, Maiannas y Kelitas, Azarías, Katezabdus, Annas, Phalias—los levitas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de este versículo son textualmente inciertos en el testimonio griego, y algunos pueden corresponder a la lista de levitas de Nehemías 8:7. El texto principal conserva formas mayormente cercanas al griego, salvo donde el paralelo hebreo ofrece una identificación especialmente fuerte.
    reason: textual_variant
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jesús
  - Josué
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Aunque la forma griega es Ἰησοῦς, el contexto de Esdras-Nehemías apunta al nombre semítico Yeshua/Jeshua. En español, «Jesúa» conserva esa identificación histórica sin forzar la forma del NT «Jesús» ni generalizar a «Josué».
- source_word: Ἀννιοὺθ
  english_pob_choice: Anniuth
  chosen_spanish: Anniut
  alternatives_spanish:
  - Aniut
  - Anniot
  lexicon: Greek proper-name tradition
  rationale: Es una transliteración conservadora de un nombre propio de atestiguación incierta. Se mantiene una forma cercana al griego sin pretender una identificación más segura de la que el texto permite.
- source_word: Σαραβίας
  english_pob_choice: Sherebiah
  chosen_spanish: Serebías
  alternatives_spanish:
  - Sarabías
  - Sherebías
  lexicon: Greek proper-name tradition / MT parallel
  rationale: La lista paralela hebrea sugiere el nombre semítico correspondiente a Sherebiah. En español, «Serebías» preserva el valor propio del nombre y su relación con el paralelo de Nehemías, sin depender de una transliteración puramente griega.
- source_word: Ἰάδεινος
  english_pob_choice: Jadinus
  chosen_spanish: Yadino
  alternatives_spanish:
  - Jadino
  - Yadinus
  lexicon: Greek proper-name tradition
  rationale: La correspondencia exacta no es segura; por eso se conserva una forma cercana al griego. «Yadino» evita añadir una terminación latina innecesaria y sigue siendo reconocible como nombre propio.
- source_word: Ἰαρσούβοος
  english_pob_choice: Jarsubus
  chosen_spanish: Jarsubos
  alternatives_spanish:
  - Jarsubus
  - Yarsubos
  lexicon: Greek proper-name tradition / MT parallel
  rationale: El griego es difícil y el paralelo hebreo no exige una normalización fuerte en el cuerpo del texto. Se mantiene una transliteración conservadora, con adaptación española mínima en la terminación.
- source_word: Ἀβταῖος
  english_pob_choice: Abteus
  chosen_spanish: Abteo
  alternatives_spanish:
  - Abteus
  - Abtaios
  lexicon: Greek proper-name tradition / MT parallel
  rationale: El nombre es incierto; se conserva la base griega con una terminación española naturalizada. No se fuerza una identificación más especulativa con un equivalente hebreo concreto.
- source_word: Αὐταίας
  english_pob_choice: Autaias
  chosen_spanish: Autaías
  alternatives_spanish:
  - Autaias
  - Autaías
  lexicon: Greek proper-name tradition
  rationale: Se sigue de cerca la forma griega y se adapta la acentuación al español. La incerteza del nombre aconseja no sustituirlo por una reconstrucción hebrea más arriesgada.
- source_word: Μαιάννας
  english_pob_choice: Maiannas
  chosen_spanish: Maiannas
  alternatives_spanish:
  - Mayannas
  - Maiánnas
  lexicon: Greek proper-name tradition
  rationale: Se conserva prácticamente la forma griega, dado que el testimonio es inestable y el nombre aparece en una lista de nombres propios. La prioridad es no sobreinterpretar.
- source_word: Καλείτας
  english_pob_choice: Kelitas
  chosen_spanish: Kelitas
  alternatives_spanish:
  - Kalitas
  - Quelitas
  lexicon: Greek proper-name tradition / MT parallel
  rationale: El paralelo hebreo apunta al nombre conocido en Esdras-Nehemías. «Kelitas» mantiene una forma transparente para el lector español y evita una latinizacion innecesaria.
- source_word: Ἀζαρίας
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  - Azarías
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Es la equivalencia habitual y más natural en español para el nombre griego/hebreo, y no introduce ninguna pérdida de información.
- source_word: Κατέθζαβδος
  english_pob_choice: Katezabdus
  chosen_spanish: Katetzabdos
  alternatives_spanish:
  - Katezabdos
  - Jozabad
  lexicon: Greek proper-name tradition / MT parallel
  rationale: El griego transmitido parece corrupto o muy transformado; sin embargo, el auditable trail inglés mostró una oscilación entre la forma griega y la identificación hebrea. Aquí se privilegia la base griega en el texto principal, como pide el testimonio, dejando la tensión sin borrar.
- source_word: Ἄννας
  english_pob_choice: Annas
  chosen_spanish: Anás
  alternatives_spanish:
  - Annas
  - Hanan
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Aunque el paralelo hebreo sugiere Hanan, la revisión inglesa reciente volvió a una forma más cercana al griego. En español, «Anás» refleja esa cercanía y evita imponer una armonización que el texto griego no garantiza.
- source_word: Φαλίας
  english_pob_choice: Phalias
  chosen_spanish: Falias
  alternatives_spanish:
  - Phalias
  - Pelayas
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Se sigue la forma griega de manera directa y con ortografía española natural. No se sustituye por el equivalente hebreo, porque aquí el audit trail favorece mantener la forma transmitida.
- source_word: οἱ Λευεῖται
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  - los levíticos
  lexicon: LSJ
  rationale: La frase identifica a la lista como levitas; en español, «los levitas» es claro, sobrio y fiel al valor nominal del griego.
theological_decisions:
- issue: Identificación de la lista como levitas y no como un grupo más general
  english_pob_reading: the Levites
  chosen_spanish_reading: los levitas
  alternative_spanish_readings:
  - los levíticos
  - aquellos eran los levitas
  rationale: La cláusula final funciona como identificación del listado anterior. Se conserva sin explicitar más de lo que el griego dice, manteniendo la referencia cultual/tribal intacta.
  doctrine_reference: Neh. 8:7; Esd. 8:18
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés, que osciló entre formas más hebraizantes y formas más griegas. Para el español se eligió una vía intermedia: conservar la lista como transmisión griega, pero con adaptación natural al español y sin ocultar la incertidumbre textual en la nota.'
  spanish_consistency_notes:
  - Se usó «levitas» en minúscula por tratarse del nombre de un grupo tribal/cultual dentro de la oración, no de un título reverencial.
  - Se mantuvo la secuencia de nombres sin intentar armonizar completamente con Nehemías 8:7 en el cuerpo principal, porque el auditorio textual del versículo es inestable.
  - La nota a pie marca la tensión textual sin convertirla en paráfrasis interpretativa.
