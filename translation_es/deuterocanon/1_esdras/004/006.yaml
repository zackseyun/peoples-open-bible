translation:
  language: es
  text: y vestirse de púrpura[a], y beber de vasos de oro, y dormir sobre oro[b], y un carro con bridas de oro[c], y un turbante de lino fino, y un collar alrededor del cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ponerse púrpura» / «vestirse de ropa púrpura»; el griego nombra la púrpura como objeto de vestir, sin precisar la prenda exacta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «dormir sobre oro»; probablemente alude a un lecho o diván adornado de oro, pero la palabra para lecho no está expresada en el griego.
    reason: lexical_alternative
  - marker: c
    text: O «un carro con arreos de oro» / «un carro con arnés de oro»; el compuesto griego puede abarcar el aparejo del carro, no solo una pieza específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - ropa púrpura
  - púrpura real
  lexicon: LSJ
  rationale: El sustantivo designa la púrpura como material, tinte o vestido lujoso; en español, «púrpura» conserva ese valor material y de lujo sin añadir más de lo que exige el griego. El infinitivo siguiente ya expresa la acción de vestirse.
- source_word: περιβαλέσθαι
  english_pob_choice: to put on
  chosen_spanish: vestirse
  alternatives_spanish:
  - ponerse
  - clotarse con
  lexicon: LSJ
  rationale: El infinitivo medio implica colocarse una prenda sobre sí mismo. «Vestirse» mantiene la acción reflexiva y suena natural en español dentro de la serie de infinitivos.
- source_word: ἐν χρυσώμασιν
  english_pob_choice: from gold vessels
  chosen_spanish: en vasos de oro
  alternatives_spanish:
  - de vasos de oro
  - en copas de oro
  lexicon: LSJ
  rationale: La expresión alude a beber usando objetos de oro, sin precisar la forma exacta. «Vasos de oro» conserva el material y evita sobreespecificar, mientras que «en» refleja la construcción preposicional del griego.
- source_word: πίνειν
  english_pob_choice: to drink
  chosen_spanish: beber
  alternatives_spanish:
  - tomar
  lexicon: LSJ
  rationale: Verbo directo y natural para la serie de acciones de lujo.
- source_word: ἐπὶ χρυσῷ καθεύδειν
  english_pob_choice: to sleep on gold
  chosen_spanish: dormir sobre oro
  alternatives_spanish:
  - dormir en oro
  - dormir sobre un lecho de oro
  lexicon: LSJ
  rationale: El griego es compacto y no menciona cama o lecho; «dormir sobre oro» conserva esa compactación y la imagen extravagante sin añadir un sustantivo ausente en la fuente.
- source_word: ἅρμα χρυσοχάλινον
  english_pob_choice: a chariot with gold bridles
  chosen_spanish: un carro con frenos de oro
  alternatives_spanish:
  - un carro con bridas de oro
  - un carro con arreos de oro
  lexicon: LSJ
  rationale: El compuesto remite al aparejo del carro relacionado con el freno/bridle; en español «frenos» comunica esa pieza del arnés de manera comprensible y mantiene la idea de lujo. «Bridas» y «arreos» son posibles, pero «frenos» resulta más claro y cercano al valor del compuesto.
- source_word: κίδαριν βυσσίνην
  english_pob_choice: a turban of fine linen
  chosen_spanish: un turbante de lino fino
  alternatives_spanish:
  - un tocado de lino fino
  - un turbante de byssus
  lexicon: LSJ
  rationale: κίδαρις designa un turbante o tocado; βυσσίνην especifica lino fino/byssus. «Turbante de lino fino» es claro, dignificado y fiel al material indicado.
- source_word: μανιάκην
  english_pob_choice: a necklace
  chosen_spanish: un collar
  alternatives_spanish:
  - un collarillo
  - un torque
  lexicon: LSJ
  rationale: El término denota un adorno para el cuello; «collar» es la equivalencia moderna más natural en español y no restringe innecesariamente la forma exacta.
- source_word: περὶ τὸν τράχηλον
  english_pob_choice: around the neck
  chosen_spanish: alrededor del cuello
  alternatives_spanish:
  - en torno al cuello
  - sobre el cuello
  lexicon: LSJ
  rationale: La preposición fija la ubicación del adorno. «Alrededor del cuello» reproduce con claridad el valor espacial del griego.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete y refleja el mismo conjunto de imágenes de lujo que la revisión inglesa auditada: púrpura, vasos de oro, dormir sobre oro, carro con aparejo dorado, turbante de lino fino y adorno para el cuello. No se introdujeron cambios sustantivos respecto de la lectura inglesa, solo ajustes naturales de español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «púrpura» como sustantivo material, no como adjetivo ornamental, para conservar la economía del griego.
  - «Vasos de oro» evita fijar «copas» o «cáliz», ya que el texto no especifica el recipiente.
  - «Dormir sobre oro» conserva la elipsis del original y evita inferir un lecho inexistente en la frase griega.
  - «Frenos de oro» se emplea como solución funcional para χρυσοχάλινον, reconociendo que el término puede abarcar el aparejo del carro.
