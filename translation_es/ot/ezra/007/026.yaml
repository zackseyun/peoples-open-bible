revisions:
- from: Y cualquiera que no haga la ley de tu Dios y la ley del rey[a], de inmediato se le hará juicio, ya sea para muerte, para destierro, para confiscación de bienes o para prisión.
  to: Y cualquiera que no cumpla la ley de tu Dios y la ley del rey, que se ejecute sentencia contra él de inmediato, ya sea para muerte, para destierro[a], para confiscación de bienes o para encarcelamiento.
  rationale: Se ajusta «no haga» a «no cumpla» para reflejar mejor la idea de obedecer la ley; se reemplaza «se le hará juicio» por «que se ejecute sentencia contra él» para expresar la ejecución judicial del arameo; se mejora la naturalidad penal con «encarcelamiento»; y se corrige la nota al pie eliminando la forma no española «uprootamiento» y preservando las alternativas documentadas.
