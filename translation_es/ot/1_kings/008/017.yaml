translation:
  language: es
  text: Ahora bien, estuvo en el corazón de David mi padre edificar una casa para el nombre de Yahvé[a], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «edificar un templo para el nombre de Yahvé». El hebreo dice literalmente «edificar una casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it was
  chosen_spanish: Ahora bien, estaba
  alternatives_spanish:
  - Y sucedió
  - Y estaba
  lexicon: HALOT
  rationale: El wayyiqtol introduce aquí una situación pasada y no solo un evento puntual. En español, «Ahora bien, estaba» conserva la transición narrativa y el valor de estado de manera natural.
- source_word: עִם לְבַב
  english_pob_choice: in the heart of
  chosen_spanish: en el corazón de
  alternatives_spanish:
  - con el corazón de
  - sobre el corazón de
  - era intención de
  lexicon: HALOT
  rationale: La expresión hebrea comunica una disposición interior, deseo o intención. «En el corazón de» mantiene la metáfora bíblica sin reducirla a una paráfrasis puramente abstracta.
- source_word: דָּוִד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  - David mi padre
  lexicon: HALOT
  rationale: El orden español más natural es mantener el nombre propio seguido del posesivo, con coma explicativa. Conserva la relación filial sin forzar la sintaxis.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: HALOT
  rationale: «Edificar» es fiel, elevado y adecuado en un contexto de templo/casa sagrada. Reproduce bien el valor de בנה sin caer en un tecnicismo ajeno al registro bíblico.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». Mantener «casa» preserva la imagen teológica de la morada para Dios; «templo» interpreta el referent,e pero no es la forma literal del texto.
- source_word: לְשֵׁם
  english_pob_choice: for the name of
  chosen_spanish: para el nombre de
  alternatives_spanish:
  - en honor de
  - para la honra de
  lexicon: HALOT
  rationale: La fórmula bíblica «para el nombre de» debe conservarse porque expresa dedicación a la identidad revelada de Yahvé, no solo homenaje general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción identifica covenantalmente a Yahvé. «El Dios de Israel» es la forma natural en español y conserva la relación de alianza implícita en el hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Nombre divino propio, no un título. «Yahvé» preserva esa referencia personal y coincide con la norma del proyecto para יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether בַּיִת should be rendered literally or interpretively
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: El hebreo usa «casa», y esa elección mantiene la imagen bíblica de morada. «Templo» es una glosa interpretativa posible, pero la traducción principal debe respetar la literalidad del sustantivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios sustanciales en el sentido ni en la formulación base. Se conserva la tensión léxica entre «casa» y la interpretación implícita de «templo» en nota, y se mantiene el Nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Mantener «Yahvé» en todo el proyecto para יְהוָה, salvo casos de cita estilística excepcional debidamente justificados.
  - Conservar «casa» cuando el hebreo diga בַּיִת en contextos de santuario, añadiendo nota si conviene explicitar el sentido de templo.
  - Usar un registro bíblico claro y moderno, evitando tanto arcaísmos innecesarios como paráfrasis explicativas que diluyan la metáfora del texto.
