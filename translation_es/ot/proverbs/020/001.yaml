translation:
  language: es
  text: El vino es un burlador[a], la bebida fuerte es alborotadora, y cualquiera que se desvía por ello no es sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El vino es un escarnecedor; la bebida fuerte es bulliciosa/ruidosa». El hebreo personifica las bebidas intoxicantes y advierte que quien se desvía por ellas carece de sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵץ
  english_pob_choice: mocker
  chosen_spanish: burlador
  alternatives_spanish:
  - escarnecedor
  - burlón
  - scoffer
  lexicon: HALOT
  rationale: El sustantivo describe a quien se burla o escarnece; aquí se personifica el vino. «Burlador» conserva el valor de agente personal y suena natural en español, sin perder la fuerza irónica del hebreo.
- source_word: הַיַּיִן
  english_pob_choice: Wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: יין se traduce de forma estándar como «vino». Mantener el artículo definido ayuda a reflejar el hebreo y la personificación proverbial.
- source_word: הֹמֶה
  english_pob_choice: a brawler
  chosen_spanish: un alborotador
  alternatives_spanish:
  - bullicioso
  - ruidoso
  - agitado
  lexicon: HALOT
  rationale: El participio expresa tumulto, ruido o agitación. En español, «alborotador» comunica mejor la personificación activa y el efecto perturbador que «ruidoso».
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: la bebida fuerte
  alternatives_spanish:
  - bebida embriagante
  - licor fuerte
  - bebida alcohólica
  lexicon: HALOT
  rationale: שֵׁכָר designa una bebida embriagante distinta del vino. «Bebida fuerte» sigue de cerca el sentido tradicional del término sin limitarlo a una bebida moderna específica.
- source_word: שֹׁגֶה
  english_pob_choice: is led astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - yerra
  - es descarriado
  - se extravía
  lexicon: HALOT
  rationale: El verbo indica apartarse del camino correcto o errar. «Se desvía» conserva la idea de apartamiento moral y práctico; en este contexto evita añadir una pasividad que el hebreo no exige explícitamente.
- source_word: בּוֹ
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - por ello
  - por él
  lexicon: HALOT
  rationale: El sufijo singular remite colectivamente a la bebida mencionada. En español, «por ella» concuerda con «la bebida fuerte» y mantiene la referencia colectiva al intoxicante.
- source_word: לֹא יֶחְכָּם
  english_pob_choice: is not wise
  chosen_spanish: no es sabio
  alternatives_spanish:
  - no llegará a ser sabio
  - no se hace sabio
  - no tiene sabiduría
  lexicon: HALOT
  rationale: El imperfecto expresa una verdad proverbial general. «No es sabio» es la formulación más natural y fiel al juicio gnómico del texto.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: personificación de las bebidas intoxicantes, paralelismo entre vino y bebida fuerte, y cierre gnómico sobre la falta de sabiduría. No se introdujeron cambios textuales ni interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «vino» para יין y «bebida fuerte» para שֵׁכָר, evitando especificar una bebida moderna.
  - 'Se preservó la personificación del hebreo mediante sustantivos de agente: «burlador» y «alborotador».'
  - «Se desvía» refleja el matiz moral/práctico de שֹׁגֶה sin forzar una traducción más interpretativa como «es llevado astray».
  - La nota a pie de página conserva una alternativa lexical breve y la observación sobre la personificación, en línea con el audit trail inglés.
