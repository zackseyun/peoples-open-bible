translation:
  language: es
  text: 'Entonces David dijo: «Ciertamente he guardado todo lo que pertenece a este hombre en el campo[a] por nada,[b] de modo que nada de todo lo que le pertenecía le faltó; y él me ha pagado mal por bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el desierto». El hebreo se refiere al territorio despoblado o agreste donde se movían los rebaños.
    reason: lexical_context
  - marker: b
    text: O «en vano». La expresión hebrea comunica que la protección de David a los bienes de Nabal resultó inútil o vacía.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Sin duda
  - De veras
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y resentida; «Ciertamente» comunica bien la fuerza de la protesta sin volverla demasiado coloquial.
- source_word: לַשֶּׁקֶר
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - por nada
  - falsamente
  - para nada
  lexicon: HALOT
  rationale: El giro idiomático con שׁמרתי expresa que la protección resultó inútil o vacía. «En vano» es el equivalente natural y formal en español.
- source_word: שָׁמַרְתִּי
  english_pob_choice: I have guarded
  chosen_spanish: he guardado
  alternatives_spanish:
  - he vigilado
  - he custodiado
  - he protegido
  lexicon: HALOT
  rationale: En este contexto pastoril y de seguridad, «guardar» mantiene la idea de protección vigilante sin endurecer el español.
- source_word: אֶת כָּל אֲשֶׁר לָזֶה
  english_pob_choice: all that belongs to this man
  chosen_spanish: todo lo que pertenece a este hombre
  alternatives_spanish:
  - todo lo que era de este hombre
  - todo lo que pertenecía a éste
  - todo lo de este hombre
  lexicon: HALOT
  rationale: «Este hombre» conserva el matiz ligeramente despectivo del demostrativo. «Pertenece» hace explícita la relación posesiva en un español claro y fiel.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el campo abierto
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «desierto» puede sonar más árido, en español bíblico sigue siendo una opción válida y comprensible para מִדְבָּר; el contexto aquí permite esa traducción.
- source_word: וְלֹא נִפְקַד
  english_pob_choice: nothing ... was missing
  chosen_spanish: nada ... le faltó
  alternatives_spanish:
  - no se echó en falta nada
  - nada fue echado de menos
  - no faltó nada
  lexicon: HALOT
  rationale: El niphal de פקד expresa ausencia o falta tras el cuidado. «Le faltó» es una solución breve y natural en español, manteniendo el sentido de inventario/comprobación.
- source_word: מְאוּמָה
  english_pob_choice: nothing / not a thing
  chosen_spanish: nada
  alternatives_spanish:
  - ni una cosa
  - ni lo más mínimo
  - nada en absoluto
  lexicon: HALOT
  rationale: Con negación total, el sustantivo aporta énfasis cuantitativo. «Nada» cubre la fuerza total sin sonar forzado.
- source_word: וַיָּשֶׁב לִי
  english_pob_choice: he has repaid me
  chosen_spanish: me ha pagado
  alternatives_spanish:
  - me ha devuelto
  - me ha recompensado
  - me ha retribuido
  lexicon: HALOT
  rationale: El verbo en esta construcción comunica devolución o compensación recíproca. «Me ha pagado» conserva de modo claro la idea de retribución.
- source_word: רָעָה תַּחַת טוֹבָה
  english_pob_choice: evil for good
  chosen_spanish: mal por bien
  alternatives_spanish:
  - daño por bien
  - mal a cambio de bien
  - maldad por bondad
  lexicon: HALOT
  rationale: La antítesis moral compacta se conserva mejor con una fórmula breve. «Mal por bien» es idiomática, concisa y fiel al paralelismo hebreo.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo WLC y toma en cuenta el audit trail inglés: se conserva el matiz enfático de אַךְ, el valor idiomático de לַשֶּׁקֶר como inutilidad, el sentido de custodia de שׁמרתי, la fuerza total de מְאוּמָה y la retribución moral de רָעָה תַּחַת טוֹבָה. Se prefirió un español publicable y natural, evitando calcos duros como «guardé» o «pagué de vuelta»; «desierto» se mantiene por su viabilidad bíblica en español, aunque el término hebreo abarque territorio despoblado más que arena árida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto cuando aparezca en el contexto inmediato; aquí no ocurre.
  - Se mantiene «mal por bien» como fórmula compacta equivalente a la antítesis hebrea.
  - El demostrativo «este hombre» conserva la distancia evaluativa de לָזֶה sin sobreinterpretarla.
