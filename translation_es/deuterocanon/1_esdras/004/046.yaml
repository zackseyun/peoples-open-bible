translation:
  language: es
  text: 'Y ahora esto es lo que pido[a], señor rey, y lo que te solicito, y esta es la grandeza que procede de ti: te suplico, pues, que cumplas el voto que hice al Rey del cielo, que has de realizar por tu boca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'hacer de tu boca'—es decir, llevarlo a cabo por tu decreto o mandato hablado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ
  english_pob_choice: I ask
  chosen_spanish: pido
  alternatives_spanish:
  - solicito
  - ruego
  lexicon: LSJ
  rationale: En contexto de súplica ante un monarca, ἀξιῶ expresa una petición formal; 'pido' mantiene naturalidad en español sin volverlo demasiado coloquial.
- source_word: κύριε βασιλεῦ
  english_pob_choice: lord king
  chosen_spanish: rey señor
  alternatives_spanish:
  - señor rey
  - mi señor el rey
  lexicon: LSJ
  rationale: Se conserva el doble vocativo sin añadir posesivo. 'Rey señor' mantiene la cercanía al griego y evita confundir 'señor' con el título divino.
- source_word: αἰτοῦμαί
  english_pob_choice: I request
  chosen_spanish: te solicito
  alternatives_spanish:
  - te pido
  - te requiero
  lexicon: LSJ
  rationale: Se distingue de ἀξιῶ para conservar la duplicación retórica de la petición. 'Solicito' es más formal y refleja bien el matiz de solicitud.
- source_word: μεγαλωσύνη
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la generosidad
  lexicon: LSJ
  rationale: La forma más directa y amplia es 'grandeza'; en este contexto puede sugerir nobleza o generosidad real, pero sin desplazar el término base.
- source_word: ἡ παρὰ σοῦ
  english_pob_choice: that comes from you
  chosen_spanish: que procede de ti
  alternatives_spanish:
  - que viene de ti
  - de tu parte
  lexicon: LSJ
  rationale: La expresión griega califica la grandeza como originada en el rey. 'Procede de ti' conserva la relación de origen con estilo claro en español.
- source_word: δέομαι
  english_pob_choice: I beg
  chosen_spanish: te suplico
  alternatives_spanish:
  - te imploro
  - te ruego
  lexicon: LSJ
  rationale: El verbo intensifica la petición; 'te suplico' refleja mejor la urgencia respetuosa que un simple 'pido'.
- source_word: ποιήσῃς τὴν εὐχήν
  english_pob_choice: you fulfill the vow
  chosen_spanish: cumplas el voto
  alternatives_spanish:
  - realices el voto
  - hagas el voto
  lexicon: LSJ
  rationale: Aquí εὐχή se entiende como 'voto' a la luz de ηὔξω. 'Cumplas' expresa adecuadamente la ejecución de un voto prometido.
- source_word: ἣν ηὔξω
  english_pob_choice: which I vowed
  chosen_spanish: que hice
  alternatives_spanish:
  - que prometí
  - que voté
  lexicon: LSJ
  rationale: El verbo confirma el valor de voto/promesa. 'Hice' es una forma idiomática en español para 'hice un voto', más natural que un calco.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: to the King of heaven
  chosen_spanish: al Rey del cielo
  alternatives_spanish:
  - al Rey celestial
  - al Rey de los cielos
  lexicon: LSJ
  rationale: Se conserva el título divino de manera literal y transparente, distinguiéndolo del rey humano al que se habla.
- source_word: ποιῆσαι ἐκ στόματός σου
  english_pob_choice: to accomplish by your mouth
  chosen_spanish: para realizarlo por tu boca
  alternatives_spanish:
  - para cumplirlo por tu palabra
  - para ejecutarlo por tu decreto
  lexicon: LSJ
  rationale: La imagen literal de 'de tu boca' se mantiene en español, preservando el valor de autorización verbal o decreto real. Se añade el pronombre para claridad referencial.
theological_decisions:
- issue: Distinción entre el rey humano y el Rey del cielo
  english_pob_reading: A title for God, distinguished from the human king addressed in the verse.
  chosen_spanish_reading: Se distingue claramente al rey humano como 'rey señor' y al destinatario del voto como 'Rey del cielo'.
  alternative_spanish_readings:
  - '''señor rey'' / ''Rey celestial'''
  - '''mi señor el rey'' / ''el Rey de los cielos'''
  rationale: 'La traducción conserva la tensión retórica del original: el hablante se dirige al monarca terrenal mientras recuerda que el voto fue hecho al Rey celestial. No se fusionan ambos referentes.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos y preservar tensiones teológicas sin resolverlas'
translation_notes:
  revision_awareness: El texto griego y la POB inglesa coinciden sustancialmente en la estructura peticional y en la distinción entre la autoridad del rey humano y el voto hecho al Rey del cielo. La revisión inglesa más reciente no introduce cambios sustantivos; esta versión española sigue esa lectura estable y mantiene el valor idiomático de ποιῆσαι ἐκ στόματός σου mediante una nota de boca/decreto.
  spanish_consistency_notes:
  - Se usa 'Rey del cielo' para el título divino y 'rey señor' para el vocativo humano, evitando 'Señor' con mayúscula para el monarca.
  - '''voto'' se emplea por la confirmación de εὐχή mediante ηὔξω; no se traduce como ''oración'' porque el contexto es de promesa hecha.'
  - '''por tu boca'' conserva la metáfora del mandato hablado; la nota aclara su sentido como decreto.'
  - Se mantiene un registro formal y sobrio, adecuado para una edición bíblica pública en español.
