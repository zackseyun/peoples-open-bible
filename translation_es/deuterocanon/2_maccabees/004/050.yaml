revisions:
- from: Pero Menelao, por la avaricia de los que tenían el poder, permaneció en el cargo, creciendo en maldad, y llegó a ser un gran conspirador[a] contra sus conciudadanos.
  to: Pero Menelao, por la avaricia de los que estaban en el poder, permaneció en el cargo, creciendo en maldad, hecho ya un gran maquinador[a] contra sus conciudadanos.
  rationale: Se ajusta «los que estaban en el poder» para reflejar mejor κρατούντων en contexto político, y se reemplaza «conspirador» por «maquinador» para conservar la amplitud hostil de ἐπίβουλος sin restringirla a una conspiración formal. También se afina la nota para que corresponda mejor a la alternativa lexical documentada en la auditoría inglesa.
