- from: Así Yahvé se enojó mucho con Israel y los apartó de delante de su rostro[a]; no quedó sino la tribu de Judá sola.
  to: Así Yahvé se enojó mucho con Israel y los quitó de delante de su rostro[a]; no quedó sino la tribu de Judá sola.
  rationale: Se reemplaza «los apartó» por «los quitó» para reflejar con más precisión la acción de removerlos de delante de Yahvé, en línea con el hebreo וַיְסִרֵם y con el audit trail inglés «removed them». Se conserva la imagen antropomórfica «de delante de su rostro» y su nota alternativa, así como el resto del verso, que ya era fiel y claro.
