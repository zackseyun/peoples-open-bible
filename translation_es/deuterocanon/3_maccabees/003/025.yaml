  yaml_path: translation/deuterocanon/3_maccabees/003/025.yaml
  text: We have ordered that[a], as soon as this letter arrives, those registered, together with their wives and children, be sent to us at once in iron bonds, shut in on every side, with abuse and mistreatment[c][b], for an irreparable and disgraceful pit fit for enemies.
  footnotes:
