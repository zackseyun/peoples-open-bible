translation:
  language: es
  text: Él hizo lo recto a los ojos de Yahvé[a], pero no con un corazón entero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no con un corazón perfecto» o «no de todo corazón». El hebreo dice «no con un corazón entero/completo», refiriéndose a una devoción incompleta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - E hizo
  lexicon: HALOT
  rationale: El imperfecto narrativo con waw consecutiva expresa una acción pasada; en español conviene un pretérito simple natural. Se mantiene el sujeto explícito para claridad en contexto de Crónicas.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo recto y bueno
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado designa la conducta moral recta. «Lo recto» conserva bien la fuerza evaluativa sin añadir matices ajenos.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La imagen evaluativa se mantiene de forma transparente en español. «A los ojos de» reproduce el modismo hebreo sin forzarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal en la forma de proyecto «Yahvé», conforme a la directriz del corpus. No se sustituye por un título.
- source_word: רַק
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - aunque
  lexicon: HALOT
  rationale: Aquí introduce una limitación contrastiva respecto de lo anterior. «Pero» comunica de modo natural esa restricción en español.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no fue
  - no estaba
  lexicon: HALOT
  rationale: Negación simple.
- source_word: בְּלֵבָב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con un corazón íntegro
  alternatives_spanish:
  - con un corazón completo
  - con un corazón entero
  - con un corazón perfecto
  lexicon: HALOT
  rationale: La expresión hebrea apunta a devoción completa e íntegra. «Íntegro» conserva la idea de totalidad e integridad interior sin sugerir perfección sin pecado; «corazón» mantiene la metáfora bíblica.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa explícitamente el tetragrámaton; se preserva el nombre divino en español para mantener la referencia al pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión teológica sobre la devoción incompleta de Amasías
  english_pob_reading: not with a whole heart
  chosen_spanish_reading: no con un corazón íntegro
  alternative_spanish_readings:
  - no de todo corazón
  - no con un corazón perfecto
  - no con un corazón dividido
  rationale: 'La frase hebrea critica la integridad interior de su obediencia sin afirmar explícitamente una piedad totalmente falsa. «Íntegro» preserva la tensión: hizo lo recto, pero su lealtad interna fue incompleta.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador sigue el acuerdo alto del audit trail inglés y mantiene la decisión central de traducir YHWH como Yahvé, junto con la tensión semántica de לבב שלם como devoción no íntegra.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología del proyecto.
  - «Corazón» se usa para לבב por coherencia bíblica y naturalidad en español.
  - «Íntegro» evita la lectura de perfección moral absoluta y conserva la observación crítica del texto.
  - La nota al pie usa un único marcador y está anclada al giro «corazón íntegro» en el texto.
