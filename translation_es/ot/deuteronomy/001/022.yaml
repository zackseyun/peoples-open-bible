translation:
  language: es
  text: 'Entonces todos ustedes se acercaron a mí y dijeron: «Enviemos hombres[a] delante de nosotros, para que exploren la tierra para nosotros y nos traigan informe[b] del camino por el cual debemos subir a ella, y de las ciudades a las que iremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Enviemos hombres». Se mantiene «hombres» porque el sustantivo es masculino plural y aquí designa a los enviados para la exploración.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «nos traigan palabra / informe». La expresión hebrea alude a hacer volver un reporte; «informe» lo expresa de manera clara en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרְבוּן אֵלַי כֻּלְּכֶם
  english_pob_choice: Then all of you came near to me
  chosen_spanish: Entonces todos ustedes se acercaron a mí
  alternatives_spanish:
  - Entonces todos se acercaron a mí
  - Entonces ustedes todos se acercaron a mí
  lexicon: HALOT
  rationale: קָרַב expresa acercarse/venir cerca. «Se acercaron» conserva el movimiento concreto; «todos ustedes» refleja el matiz enfático de כֻּלְּכֶם en español natural.
- source_word: נִשְׁלְחָה אֲנָשִׁים
  english_pob_choice: Let us send men
  chosen_spanish: Enviemos hombres
  alternatives_spanish:
  - Enviemos personas
  - Enviemos algunos hombres
  lexicon: HALOT
  rationale: 'El cohorte expresa una propuesta inclusiva: «Enviemos». אֲנָשִׁים es masculino plural y en este contexto designa varones escogidos; «hombres» mantiene la precisión lexical y el acuerdo con la decisión inglesa.'
- source_word: לְפָנֵינוּ
  english_pob_choice: ahead of us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - antes de nosotros
  - en frente de nosotros
  lexicon: HALOT
  rationale: La expresión es idiomática. «Delante de nosotros» comunica el avance sin sonar forzado en español, manteniendo la idea de ir por delante.
- source_word: וְיַחְפְּרוּ לָנוּ אֶת הָאָרֶץ
  english_pob_choice: so that they may explore the land for us
  chosen_spanish: para que exploren la tierra por nosotros
  alternatives_spanish:
  - para que espíen la tierra por nosotros
  - para que investiguen la tierra por nosotros
  lexicon: HALOT
  rationale: חָפַר puede significar buscar/explorar/investigar. «Exploren» sigue la elección inglesa y preserva una investigación amplia sin introducir la carga de espionaje que «espíen» podría sugerir.
- source_word: וְיָשִׁבוּ אֹתָנוּ דָּבָר
  english_pob_choice: and bring us back word
  chosen_spanish: y nos traigan noticia
  alternatives_spanish:
  - y nos traigan palabra
  - y nos reporten
  lexicon: HALOT
  rationale: La construcción causativa de שׁוּב con דָּבָר alude a hacer volver un informe. «Traigan noticia» comunica el regreso de un reporte con español digno y claro; «noticia» aquí funciona como información informada, no como noticia periodística.
- source_word: אֶת הַדֶּרֶךְ אֲשֶׁר נַעֲלֶה בָּהּ
  english_pob_choice: of the way by which we should go up into it
  chosen_spanish: del camino por el cual debemos subir a ella
  alternatives_spanish:
  - del camino por el cual habremos de subir a ella
  - de la ruta por la cual debemos ascender a ella
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino/ruta. Se conserva «subir» para reflejar el idiomatismo hebreo de עָלָה relacionado con la entrada a la tierra. «Debemos» expresa la deliberación del plan; «a ella» mantiene el antecedente femenino de la tierra.
- source_word: וְאֵת הֶעָרִים אֲשֶׁר נָבֹא אֲלֵיהֶן
  english_pob_choice: and of the cities into which we shall come
  chosen_spanish: y de las ciudades a las cuales habremos de llegar
  alternatives_spanish:
  - y de las ciudades a las que entraremos
  - y de las ciudades en las que entraremos
  lexicon: HALOT
  rationale: La idea es el destino de entrada a las ciudades. «Habremos de llegar» conserva el matiz prospectivo y formal del futuro deliberativo; aunque «entrar» sería más literal, «llegar» evita sobreespecificar el acto de entrada física cuando el texto enfatiza el itinerario y las ciudades objetivo.
translation_notes:
  revision_awareness: 'Se siguió la lectura de alta concordancia del texto base inglés y sus notas: se conservó el sentido de exploración para חָפַר y el idiomatismo de «subir» para עָלָה. No se incorporaron cambios de revisión posteriores porque el registro indica que no hubo modificaciones necesarias.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantuvo el registro formal y transparente, evitando calcos duros como «antes de nuestra faz» o «espionar» que no añade el hebreo.
  - «Tierra» traduce הָאָרֶץ en estilo bíblico común y claro para lectores en español.
  - Se preserva el paralelismo entre el informe sobre el camino y el informe sobre las ciudades.
