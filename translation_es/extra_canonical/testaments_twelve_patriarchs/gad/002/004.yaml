id: T12P.GAD.2.4
reference: Testament of Gad 2:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: '[α-text] 5. Οὕτως¹⁴ ὁ Θεὸς τῶν πατέρων ἡμῶν ἐρρύσατο αὐτὸν ἐκ τῶν χειρῶν ἡμῶν, ἵνα μὴ ποιήσωμεν ἐν τῷ Ἰσραὴλ ἀνομίαν μεγάλην. [β, Α, S¹] 4. Καὶ οὕτως τῇ πλεονεξίᾳ ἐπληροφορήθημεν¹⁹ τῆς ἀναιρέσεως αὐτοῦ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/002/004.yaml
  text: 'Thus the God of our fathers rescued him from our hands, so that we might not commit a great lawless deed in Israel.


    And so, through greed, we were fully persuaded of his murder.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:48Z'
    unchanged: false
    changes_summary: Revised the second sentence to reflect ἐπληροφορήθημεν more accurately as 'were fully persuaded' rather than 'were fully set on,' while retaining the formal register and the sense of τῆς ἀναιρέσεως αὐτοῦ as 'his murder.'
translation:
  language: es
  text: 'Así, el Dios de nuestros padres lo libró de nuestras manos, para que no cometiéramos una gran iniquidad en Israel.


    Y así, por la codicia, fuimos plenamente persuadidos[a] de su asesinato.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedamos plenamente decididos a su asesinato'. El verbo griego ἐπληροφορήθημεν combina los matices de plena persuasión y de propósito asentado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - salvó
  - liberó
  lexicon: BDAG
  rationale: '''Libró'' encaja con el sentido concreto de liberación de un peligro inminente y mantiene un registro elevado natural en español bíblico.'
- source_word: ἀνομίαν μεγάλην
  english_pob_choice: a great lawless deed
  chosen_spanish: una gran iniquidad
  alternatives_spanish:
  - una gran maldad
  - un gran acto sin ley
  lexicon: BDAG
  rationale: Conserva la fuerza legal-moral de ἀνομία mejor que un genérico 'maldad'; 'iniquidad' es término bíblico estándar.
- source_word: πλεονεξίᾳ
  english_pob_choice: through greed
  chosen_spanish: por la codicia
  alternatives_spanish:
  - por la avaricia
  - por la concupiscencia
  lexicon: BDAG
  rationale: '''Codicia'' es término moderno y claro que nombra el vicio sin perder el peso ético.'
- source_word: ἐπληροφορήθημεν
  english_pob_choice: we were fully persuaded
  chosen_spanish: fuimos plenamente persuadidos
  alternatives_spanish:
  - fuimos plenamente convencidos
  - quedamos plenamente decididos
  lexicon: BDAG
  rationale: El verbo es difícil; 'plenamente persuadidos' refleja el matiz pasivo de quedar enteramente convencido tras la deliberación, según la última revisión inglesa.
- source_word: ἀναιρέσεως
  english_pob_choice: murder
  chosen_spanish: asesinato
  alternatives_spanish:
  - matanza
  - muerte violenta
  lexicon: BDAG
  rationale: Dada la intención personal e ilícita contra José, 'asesinato' expresa con mayor precisión la fuerza moral del término.
translation_notes:
  revision_awareness: El revisor inglés ajustó 'fully set on' a 'fully persuaded' para reflejar mejor ἐπληροφορήθημεν; el español refleja esta corrección con 'plenamente persuadidos' y registra el matiz volitivo en nota.
  spanish_consistency_notes:
  - '''iniquidad'' para ἀνομία/ἀνόμημα'
  - '''libró'' para ἐρρύσατο en toda la unidad'
