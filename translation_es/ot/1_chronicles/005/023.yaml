translation:
  language: es
  text: Y los hijos de la media tribu de Manasés vivieron en la tierra desde Basán hasta Baal-hermón, Senir y el monte Hermón[b]; se hicieron numerosos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se multiplicaron» o «aumentaron en número». El verbo hebreo destaca su crecimiento numérico.
    reason: lexical_alternative
  - marker: b
    text: Baal-hermón, Senir y el monte Hermón son nombres de lugares que marcan el límite septentrional del territorio.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y la gente de
  lexicon: HALOT
  rationale: בני en contexto tribal y genealógico designa a los miembros de un grupo. «Hijos de» conserva esa forma formal y reconocible en español, sin volverlo más interpretativo que el hebreo.
- source_word: חֲצִי שֵׁבֶט
  english_pob_choice: the half-tribe
  chosen_spanish: la media tribu
  alternatives_spanish:
  - la mitad de la tribu
  lexicon: HALOT
  rationale: La expresión es un sintagma técnico para la entidad tribal de Manasés al oriente del Jordán. «Media tribu» es idiomático en español bíblico y preserva el valor de unidad tribal reconocida.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaban
  - morararon
  lexicon: HALOT
  rationale: ישב expresa habitar/residir. «Vivieron» comunica residencia continua en español moderno sin cargar arcaísmo ni implicar solo un asentamiento inicial.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el territorio
  - en la región
  lexicon: HALOT
  rationale: ארץ suele traducirse «tierra» en contexto territorial bíblico. Mantiene el enlace directo con el hebreo y es suficientemente claro en este versículo.
- source_word: מִבָּשָׁן עַד
  english_pob_choice: from Bashan as far as
  chosen_spanish: desde Basán hasta
  alternatives_spanish:
  - desde Basán y hasta
  - de Basán hasta
  lexicon: HALOT
  rationale: La pareja preposicional marca extensión geográfica. «Desde… hasta…» reproduce bien el alcance territorial con naturalidad en español.
- source_word: בַּעַל חֶרְמוֹן
  english_pob_choice: Baal-hermon
  chosen_spanish: Baal-hermón
  alternatives_spanish:
  - Baal Hermón
  lexicon: HALOT
  rationale: Topónimo compuesto transliterado. El guion ayuda a reconocer la unidad del nombre propio y a conservar la forma equivalente del inglés POB.
- source_word: וּשְׂנִיר
  english_pob_choice: Senir
  chosen_spanish: Senir
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se conserva la transliteración estándar, ya que no hay una equivalencia semántica útil aquí.
- source_word: וְהַר חֶרְמוֹן
  english_pob_choice: and Mount Hermon
  chosen_spanish: y el monte Hermón
  alternatives_spanish:
  - y el monte de Hermón
  - y el monte Hermon
  lexicon: HALOT
  rationale: הר denota un monte o montaña. «Monte Hermón» es la forma española natural del topónimo y mantiene la referencia geográfica precisa.
- source_word: הֵמָּה רָבֽוּ
  english_pob_choice: they became numerous
  chosen_spanish: ellos se hicieron numerosos
  alternatives_spanish:
  - se multiplicaron
  - aumentaron
  lexicon: HALOT
  rationale: רבה en qal puede significar «ser/multiplicarse, aumentar en número». «Se hicieron numerosos» refleja crecimiento numérico sin exagerar el matiz de multiplicación cuando el español puede sonar más interpretativo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el POB en inglés. Se corrigió la validación anterior asegurando que los marcadores [a] y [b] aparezcan exactamente en el cuerpo del texto junto a los topónimos correspondientes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en el hebreo de esta unidad.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se preservó el orden territorial y la secuencia de topónimos del original.
  - Se evitó «dieron fruto» o equivalentes no respaldados por רבה en este contexto.
  - 'Los nombres propios se unificaron con ortografía española estable: Basán, Hermón, Baal-hermón, Senir.'
