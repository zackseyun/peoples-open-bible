- from: 'Y él dijo[a]: «Échalo en tierra». Y él lo echó en tierra, y se convirtió en una serpiente[b], y Moisés huyó de ella.'
  to: 'Y dijo: «Échalo al suelo». Entonces lo echó al suelo, y se convirtió en una serpiente, y Moisés huyó de ella[a].'
  rationale: Se corrigió el español para mayor naturalidad («al suelo», omisión de sujetos explícitos redundantes) y se restauró la nota relevante del expediente inglés en el lugar correcto, preservando la alternativa literal de מִפָּנָיו. Se eliminó la nota sobre wayyiqtol por no ser necesaria en el texto español y la alternativa «víbora» por no estar justificada por el hebreo.
