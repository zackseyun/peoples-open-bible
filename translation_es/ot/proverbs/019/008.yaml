translation:
  language: es
  text: Quien adquiere sensatez[a] ama su propia vida[b]; quien guarda entendimiento hallará el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «adquiere corazón». En la sabiduría hebrea, «corazón» suele referirse a la mente o a la capacidad de discernimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se ama a sí mismo» o «ama su vida/ser». נפש puede denotar la persona misma o la vida, no solo el «alma» en sentido estrecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹנֶה
  english_pob_choice: gains
  chosen_spanish: adquiere
  alternatives_spanish:
  - gana
  - obtiene
  - compra
  lexicon: HALOT
  rationale: El participio qal de קנה tiene el sentido amplio de adquirir/obtener. «Adquiere» conserva esa amplitud y suena natural en español; «compra» sería demasiado literal y más restrictivo.
- source_word: לֵּב
  english_pob_choice: sense
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - entendimiento
  - sensatez
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «corazón», y en la literatura sapiencial designa el centro de pensamiento y discernimiento. En español, «corazón» preserva la metáfora bíblica y deja a una nota la aclaración del valor cognitivo.
- source_word: אֹהֵב נַפְשׁוֹ
  english_pob_choice: loves his own life
  chosen_spanish: ama su propia vida
  alternatives_spanish:
  - se ama a sí mismo
  - ama su alma
  - ama su ser
  lexicon: HALOT
  rationale: נפש aquí apunta a la vida/el yo de la persona, no a un «alma» en sentido estrecho. «Su propia vida» mantiene la fuerza de interés personal sin introducir una antropología ajena al proverbio.
- source_word: שֹׁמֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - preserva
  - cuida
  - mantiene
  lexicon: HALOT
  rationale: El participio expresa una vigilancia activa y cuidadosa. «Guarda» funciona bien con un objeto abstracto como «entendimiento» y retiene la idea de custodia.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  - comprensión
  lexicon: HALOT
  rationale: Es un término sapiencial para discernimiento/entendimiento. «Entendimiento» es claro en español y conserva el campo semántico sin volverse técnico.
- source_word: לִמְצֹא טוֹב
  english_pob_choice: will find good
  chosen_spanish: hallará el bien
  alternatives_spanish:
  - encontrará el bien
  - obtendrá el bien
  - llegará al bien
  lexicon: HALOT
  rationale: La construcción expresa resultado o consecuencia. «Hallará el bien» es natural y mantiene la apertura semántica de טוֹב como «bien» en sentido amplio.
translation_notes:
  revision_awareness: 'El texto se mantuvo alineado con el último pase revisado del paquete fuente: no se registraron cambios posteriores ni objeciones en la revisión cruzada; por eso la redacción española sigue de cerca la lectura auditada sin introducir ajustes interpretativos nuevos.'
  spanish_consistency_notes:
  - Se conservó el paralelismo proverbial con dos miembros coordinados por punto y coma.
  - Se evitó «alma» en el texto principal para no estrechar נפש más de lo que permite el hebreo.
  - «Corazón» se dejó con nota explicativa para respetar la metáfora sapiencial sin perder inteligibilidad.
  - «Bien» traduce טוֹב en sentido amplio, coherente con el tono proverbial y no meramente moral.
