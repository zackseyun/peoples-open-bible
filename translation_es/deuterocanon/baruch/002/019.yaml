translation:
  language: es
  text: porque no es con base en las obras justas de nuestros padres y de nuestros reyes que presentamos nuestra súplica de misericordia delante de ti[a], oh Yahvé, nuestro Dios[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante ti»; la expresión griega es literalmente «delante de tu rostro», un modismo que significa comparecer en la presencia de alguien.
    reason: lexical_alternative
  - marker: b
    text: En la LXX, Κύριε traduce con frecuencia el nombre divino; por eso aquí se vierte «Yahvé» en el texto principal.
    reason: source_note
lexical_decisions:
- source_word: δικαιώματα
  english_pob_choice: righteous deeds
  chosen_spanish: obras justas
  alternatives_spanish:
  - actos justos
  - obras de justicia
  - justicias
  - estatutos
  lexicon: LSJ
  rationale: En este contexto penitencial, δικαιώματα no apunta primariamente a «estatutos» sino a acciones o méritos atribuidos como justos. «Obras justas» conserva esa fuerza moral sin convertir el término en lenguaje técnico legal.
- source_word: καταβάλλομεν
  english_pob_choice: lay
  chosen_spanish: presentamos
  alternatives_spanish:
  - ponemos
  - depositamos
  - colocamos
  - ofrecemos
  lexicon: LSJ
  rationale: La imagen es la de poner algo delante de alguien. En español, «presentamos» expresa con naturalidad la acción de poner una súplica ante Dios sin perder el matiz ritual y concreto.
- source_word: τὸν ἔλεον
  english_pob_choice: our plea for mercy
  chosen_spanish: nuestra súplica de misericordia
  alternatives_spanish:
  - nuestra petición de misericordia
  - nuestra imploración de misericordia
  - misericordia
  - compasión
  lexicon: LSJ
  rationale: El griego literalmente dice «la misericordia», pero en el contexto oracional el sentido es una petición dirigida a Dios. «Súplica de misericordia» evita la ambigüedad de hacer de la misericordia el objeto ofrecido por los orantes.
- source_word: κατὰ πρόσωπόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  - frente a ti
  lexicon: LSJ
  rationale: La expresión es idiomática y literalmente facial. «Delante de ti» comunica bien la postura de oración sin sonar demasiado literal en español, pero conserva la idea de comparecer ante Dios.
- source_word: Κύριε ὁ θεὸς ἡμῶν
  english_pob_choice: O Lord our God
  chosen_spanish: oh Yahvé, nuestro Dios
  alternatives_spanish:
  - oh Señor, nuestro Dios
  - oh Señor Dios nuestro
  - oh Yahvé Dios nuestro
  lexicon: Proyecto POB default YHWH
  rationale: El texto griego tiene Κύριε, pero en el marco de la LXX este vocativo suele corresponder al nombre divino. Conforme al criterio del proyecto, se usa «Yahvé» en vez de ocultarlo tras «Señor», preservando además la aposición «nuestro Dios».
theological_decisions:
- issue: ¿La frase niega la base meritória de la oración o alude a preceptos/estatutos ancestrales?
  english_pob_reading: The speakers confess that their appeal to God is not grounded in the righteous deeds of their fathers or kings.
  chosen_spanish_reading: Los orantes confiesan que su súplica no se apoya en méritos o acciones justas heredadas de sus padres y reyes.
  alternative_spanish_readings:
  - No fundamentan su petición en estatutos u ordenanzas asociados con sus padres y reyes.
  - No basan su ruego en la justicia legal de sus antepasados y reyes.
  rationale: El contexto de penitencia y apelación favorece entender una renuncia a todo fundamento meritório. Sin cerrar del todo la tensión del término δικαιώματα, la traducción mantiene abierta la posibilidad de un matiz de «obras/justicias» sin imponer un sentido legalista que el contexto no exige.
  doctrine_reference: Preservar la tensión lexical sin resolverla artificialmente; primacía del contexto inmediato de oración penitencial.
translation_notes:
  revision_awareness: El audit trail inglés revisó «before your face» hacia «before you» por naturalidad; en español se optó por mantener una forma transparente («delante de ti») y explicarla en nota, ya que conserva mejor el color idiomático original sin resultar extraña.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el vocativo divino conforme al criterio del proyecto.
  - «Súplica de misericordia» evita que ἔλεον se lea como objeto poseído por los suplicantes.
  - Se preserva la estructura causal de apertura con «porque» para reflejar ὅτι.
  - Se usa un registro reverente pero actual, apto para lectura litúrgica o comunitaria.
