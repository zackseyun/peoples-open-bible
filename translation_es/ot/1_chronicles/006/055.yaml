  - severity: medium
    issue: La nota textual está anclada en 'pastizales' en vez de 'Bileam'
    rationale: La nota explica la variante Bileam/Ibleam, por lo que el marcador debe aparecer junto al nombre afectado para preservar claridad documental.
  revised_spanish_text: 'Y de la media tribu de Manasés: Aner con sus pastizales, y Bileam[a] con sus pastizales, para el clan de los hijos restantes de Cohat.'
