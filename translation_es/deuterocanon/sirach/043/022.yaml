translation:
  language: es
  text: 'Una sanación para todos: una nube cargada de rocío[a][c], que aparta el calor abrasador[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea detrás de «nube cargada de rocío» es difícil; el griego paralelo habla de «niebla» y «rocío», lo que refuerza la idea de una humedad refrescante más que de una nube de tormenta.
    reason: lexical_alternative
  - marker: b
    text: «Aparta» intenta reflejar el valor de quitar o alejar lo dañino; otras opciones posibles son «ahuyenta» o «disipa».
    reason: lexical_alternative
  - marker: c
    text: El manuscrito de Masada para esta zona es fragmentario y no ofrece una lectura alternativa clara para este versículo; la traducción se apoya en el hebreo de la Geniza de El Cairo, con el griego paralelo como control.
    reason: textual_variant
lexical_decisions:
- source_word: מרפא כל / ἴασις πάντων
  english_pob_choice: A healing for all
  chosen_spanish: Una sanación para todos
  alternatives_spanish:
  - Una curación para todos
  - Sanación para todos
  lexicon: HALOT; LXX ἴασις
  rationale: מרפא y ἴασις expresan la idea de remedio/sanación. En español, «sanación» conserva el sentido general y suena natural en un enunciado poético; «curación» también sería posible, pero puede sonar más clínico. «Para todos» refleja πάντων con amplitud inclusiva sin forzar un universalismo doctrinal.
- source_word: מערף ענן טל / ὁμίχλη, δρόσος
  english_pob_choice: a massing cloud of dew
  chosen_spanish: una nube de rocío
  alternatives_spanish:
  - una nube cargada de rocío
  - una niebla de rocío
  - una nube de niebla y rocío
  lexicon: HALOT; LXX ὁμίχλη, δρόσος
  rationale: El hebreo es difícil y el paralelo griego apunta a humedad refrescante más que a lluvia. «Nube de rocío» conserva la imagen de nube/moistura y evita sobreinterpretar «massing» o «massing cloud» en español.
- source_word: פורע / ἀπαντῶσα ἀπὸ καύσωνος
  english_pob_choice: driving back the scorching heat
  chosen_spanish: que aparta el calor abrasador
  alternatives_spanish:
  - que ahuyenta el calor abrasador
  - que aleja el calor abrasador
  - que disipa el calor abrasador
  lexicon: HALOT; LXX ἀπαντῶσα ἀπὸ καύσωνος
  rationale: פורע en este contexto funciona como quitar/retirar/ahuyentar lo nocivo. «Aparta» es un verbo claro y sobrio en español, y «calor abrasador» representa bien καύσωνος y שרב.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «for refreshment» por no estar representado de forma explícita en el hebreo; por eso el español evita añadir una frase equivalente y mantiene una clausula breve y directa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otros términos teológicos no pertinentes porque el versículo describe un fenómeno natural.
  - «Sanación» se eligió por su amplitud poética; «curación» queda como alternativa viable si se prefiere un matiz más médico.
  - No se incorporó una equivalencia explícita de «for refreshment» para respetar la última revisión del texto base.
