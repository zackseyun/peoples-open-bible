review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: vocativo a las hijas de Jerusalén, condicional «si encuentran», «mi amado», la pregunta sobre qué mensaje darán, y la declaración «estoy enferma de amor». Sin embargo, usa formas peninsulares de segunda persona plural («os», «encontráis», «diréis») que no se ajustan al objetivo de español neutral latinoamericano / ampliamente eclesialmente legible.'
  spanish_quality_summary: El texto es claro y poético, pero conviene evitar el voseo/vosotros peninsular. «Les ruego» o «les conjuro» con verbos en «ustedes» mejora la neutralidad. También la nota al pie actual no ofrece una verdadera alternativa, porque repite exactamente la misma frase que ya está en el texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mi amado» para דּוֹדִי y «enferma de amor» para שֶׁחוֹלַת אַהֲבָה están bien alineados con la evidencia y el razonamiento léxico. «Conjuro» es defendible, pero en español neutral «les ruego solemnemente» o «les conjuro» funciona mejor que «os conjuro».
  issues:
  - severity: medium
    issue: Uso de formas peninsulares («os», «encontráis», «diréis»).
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en la iglesia. Las formas de «vosotros» suenan regionales y reducen la adecuación estilística del borrador.
  - severity: medium
    issue: La nota [a] no aporta una alternativa real.
    rationale: El texto principal ya dice «enferma de amor», y la nota repite «El hebreo dice literalmente “enferma de amor”». Debe conservarse la alternativa documentada por el inglés, que es algo como «estoy enamorada hasta enfermar» o mejor «estoy enferma de amor» en el texto y «estoy enamorada hasta enfermar / estoy consumida de amor» sería demasiado libre; la alternativa más natural y fiel es «estoy enamorada hasta enfermar» no ideal. En español, la mejor equivalencia para la alternativa inglesa es «estoy enferma de amor» frente a «estoy consumida de amor», pero como el texto principal ya usa la literal, la nota debe registrar una alternativa idiomática distinta.
  revised_spanish_text: 'Les conjuro, hijas de Jerusalén: si encuentran a mi amado, ¿qué le dirán? Que estoy enferma de amor[a].'
  revised_footnotes:
  - marker: a
    text: O, «que estoy consumida de amor». El hebreo dice literalmente «enferma de amor».
    reason: lexical_alternative
  revision_rationale: Se cambian las formas peninsulares por un español neutral de amplio alcance («les», «encuentran», «dirán»). Se mantiene la literalidad poética del hebreo en «estoy enferma de amor» y se corrige la nota para que aporte una alternativa real, en lugar de repetir el texto principal.
