translation:
  language: es
  text: Pero la persona que coma carne del sacrificio de las ofrendas de paz que pertenece a Yahvé, estando su impureza sobre él, esa persona será excluida de entre su pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será cortada de entre su pueblo». La fórmula hebrea puede indicar remoción del pueblo; el texto no precisa aquí si se trata de expulsión o de muerte.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  english_pob_choice: the person
  chosen_spanish: la persona
  alternatives_spanish:
  - el alma
  - la vida
  lexicon: HALOT
  rationale: En contexto legal, נֶפֶשׁ se refiere al individuo responsable, no al alma inmaterial. «La persona» es natural en español y conserva el valor jurídico general del hebreo.
- source_word: תֹּאכַל
  english_pob_choice: eats
  chosen_spanish: coma
  alternatives_spanish:
  - come
  - coma de
  lexicon: HALOT
  rationale: En una cláusula casuística, el imperfecto hebreo expresa caso general. El subjuntivo español en «que coma» reproduce bien la condición sin volverlo narrativo.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne sacrificial
  - flesh
  lexicon: HALOT
  rationale: Aquí בשר es el alimento sacrificial. «Carne» es el equivalente más directo y comprensible en español; «carne sacrificial» sería más explicativo de lo que pide el texto.
- source_word: מִזֶּבַח הַשְּׁלָמִים
  english_pob_choice: from the sacrifice of peace offerings
  chosen_spanish: del sacrificio de las ofrendas de paz
  alternatives_spanish:
  - del sacrificio de las ofrendas de comunión
  - del sacrificio de paz
  lexicon: HALOT
  rationale: Se conserva el término cultual tradicional «ofrendas de paz», que corresponde al campo semántico de שְׁלָמִים y mantiene la referencia sacrificial reconocible.
- source_word: אֲשֶׁר לַיהוָה
  english_pob_choice: that belongs to Yahweh
  chosen_spanish: que pertenece a Yahvé
  alternatives_spanish:
  - que es para Yahvé
  - que es de Yahvé
  lexicon: HALOT
  rationale: La frase expresa pertenencia consagrada. «Pertenece a Yahvé» comunica la propiedad sacra con claridad y conserva el nombre divino pedido por la política del proyecto.
- source_word: וְטֻמְאָתוֹ עָלָיו
  english_pob_choice: while his uncleanness is on him
  chosen_spanish: estando su impureza sobre él
  alternatives_spanish:
  - mientras su impureza está sobre él
  - con su impureza sobre él
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de la impureza «sobre» la persona, sin neutralizarla con «mientras está impuro». «Impureza» recoge היטב el término ritual de טֻמְאָה.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será excluida
  - será eliminada
  lexicon: HALOT
  rationale: «Cortar» conserva la fórmula jurídica tradicional y la ambigüedad del hebreo sobre el modo exacto del castigo. Se evita resolverla como mera expulsión o muerte.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus gentes
  lexicon: HALOT
  rationale: «De entre su pueblo» refleja bien la idea de remoción desde la comunidad y suena más natural en español bíblico que una calca rígida.
theological_decisions:
- issue: Alcance de וְנִכְרְתָה ... מֵעַמֶּיהָ
  english_pob_reading: shall be cut off from his people
  chosen_spanish_reading: será cortada de entre su pueblo
  alternative_spanish_readings:
  - será excluida de entre su pueblo
  - morirá / será dada muerte
  rationale: El hebreo formula una remoción severa del ámbito del pacto, pero no especifica aquí el mecanismo. Se preserva la tensión teológica con «será cortada», sin convertirla en excomunión explícita ni en pena de muerte determinada.
  doctrine_reference: Preservar la ambigüedad textual y jurídica del hebreo.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del inglés: no se requieren cambios de contenido. La versión española mantiene el mismo equilibrio entre claridad y ambigüedad jurídica que el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se conserva la fórmula cultual «ofrendas de paz» por su valor técnico y reconocibilidad.
  - «Impureza» se usa para טֻמְאָה; no se sustituye por «inmundicia» por ser menos preciso en contexto ritual.
  - La voz pasiva «será cortada» preserva el carácter jurídico de la fórmula hebrea.
