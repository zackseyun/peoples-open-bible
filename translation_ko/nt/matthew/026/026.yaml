id: MAT.26.26
reference: Matthew 26:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐσθιόντων δὲ αὐτῶν λαβὼν ὁ Ἰησοῦς ⸀ἄρτον καὶ ⸀εὐλογήσας ἔκλασεν καὶ ⸂δοὺς τοῖς μαθηταῖς⸃ εἶπεν· Λάβετε φάγετε, τοῦτό ἐστιν τὸ σῶμά μου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/026.yaml
  text: While they were eating[a], Jesus took bread, and after blessing it, he broke it and gave it to the disciples and said, “Take, eat[d][c][b]; this is my body.”
  footnotes:
  - marker: a
    text: Or, 'As they were eating.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'having blessed it'; some understand the action as giving thanks over the bread.
    reason: lexical_alternative
  - marker: c
    text: Or, 'Take and eat.'
    reason: lexical_alternative
  - marker: d
    text: The Greek reads literally, 'this is my body'; some interpret this as 'this means/signifies my body,' but the translation preserves the wording of the source text.
    reason: alternative_reading
translation:
  language: ko
  text: 그들이 먹고 있을 때에, 예수께서 떡을 들어 축복하시고 떼어 제자들에게 주시며 말씀하셨습니다, 「받아 먹으십시오. 이것은 내 몸입니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 26:26-29 성찬 제정사 — 본문 그대로 보존
  chosen_reading: 「이것은 내 몸입니다」 / 「이것은 내 피입니다」 — 헬라어 본문대로 직설법 보존
  alternative_readings:
  - 「이것은 내 몸을 상징합니다」 등의 신학적 해석 첨가
  rationale: 예수께서 사용하신 ἐστιν은 직설법 현재 3인칭으로, 본문은 「이것이 ~이다」라고 단순히 말한다. 이 표현이 화체설·공재설·상징설 등 어느 신학에 정렬되는지는 본 번역의 영역이 아니다. 본 번역은 원문의 단순함을 그대로 옮겨, 독자가 본문에서 직접 그 의미를 받아들이게 한다. 26-29절 전체에서 「언약(διαθήκη)」, 「많은 사람을 위하여(περὶ πολλῶν)」, 「죄 사함(εἰς ἄφεσιν ἁμαρτιῶν)」, 「아버지의 나라에서 새로(καινὸν)」 등 모든 핵심 표현을 빠짐없이 보존한다.
  doctrine_reference: 'DOCTRINE.md §1, §5: render the source''s strongest plain meaning'
