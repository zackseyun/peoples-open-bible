    reason: lexical_alternative
  - marker: b
    text: O «extendieron su ropa de luto». El griego es algo inusual, y la acción física exacta puede referirse a desplegar las vestiduras de saco o extenderse ante Dios vestidos de saco como señal de duelo y súplica.
    reason: lexical_alternative
  revision_rationale: Se revisa para ajustar el texto a la terminología obligatoria del proyecto («Yahvé»), evitar la ambigüedad moderna de «sacos» para σάκκους y mejorar la naturalidad de la postración sin perder literalidad. Se conserva la enumeración explícita del griego y la nota léxica sobre la expresión distributiva.
