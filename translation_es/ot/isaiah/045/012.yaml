    text: O 'humanidad' o 'género humano'. El hebreo אָדָם aquí es un singular colectivo para la raza humana.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al término אָדָם, y se ajusta 'todo su ejército' a 'toda su multitud' para reflejar mejor el sentido cósmico de צְבָאָם en español claro y fiel, sin cambiar el contenido esencial del versículo.
