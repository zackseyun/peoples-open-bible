id: 2PE.1.16
reference: 2 Peter 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ γὰρ σεσοφισμένοις μύθοις ἐξακολουθήσαντες ἐγνωρίσαμεν ὑμῖν τὴν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ δύναμιν καὶ παρουσίαν, ἀλλ’ ἐπόπται γενηθέντες τῆς ἐκείνου μεγαλειότητος.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/016.yaml
  text: For we did not make known to you the power and coming of our Lord Jesus Messiah by following cleverly devised myths[b][a], but by becoming eyewitnesses of his majesty.
  footnotes:
  - marker: a
    text: Or 'presence' (or 'arrival') of our Lord Jesus Messiah.' The Greek παρουσία can denote presence, arrival, or, in many New Testament contexts, the Messiah's coming.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 우리 주 예수 메시아의 능력과 임재[a]를 여러분에게 알린 것은 교묘하게 꾸민 신화들을 따른 것이 아니라, 그분의 위엄을 직접 본 목격자가 되었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παρουσία는 「임재·도래·재림」을 가리킨다. 본 구절은 변화산에서 그분의 위엄을 미리 목격한 일과 그분의 종말적 재림을 함께 함의한다. 본 번역은 두 함의를 모두 살리는 「임재」를 본문에 두고, 종말적 도래의 의미는 문맥과 각주로 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρουσία
  english_pob_choice: coming
  chosen_korean: 임재
  alternatives_korean:
  - 재림
  - 도래
  - 오심
  lexicon: BDAG
  rationale: 1:16에서는 변화산의 영광 목격이 미래 재림의 전조로 기능하므로, 임재와 도래를 모두 함의하는 「임재」를 본문에 두고 각주로 종말적 의미를 보충. 3:4·3:12와는 다른 결정(거기서는 「재림」)을 한다.
- source_word: σεσοφισμένοις μύθοις
  english_pob_choice: cleverly devised myths
  chosen_korean: 교묘하게 꾸민 신화들
  alternatives_korean:
  - 지혜롭게 지어낸 이야기들
  lexicon: BDAG
  rationale: σοφίζω의 완료 수동 분사는 의도적이고 솜씨 있게 꾸며진 것을 가리킨다.
- source_word: ἐπόπται
  english_pob_choice: eyewitnesses
  chosen_korean: 목격자
  alternatives_korean:
  - 직접 본 자
  lexicon: BDAG
  rationale: 신비 종교에서 「입문한 자·직접 본 자」를 가리키던 용어를 변화산의 직접 목격에 적용.
- source_word: μεγαλειότης
  english_pob_choice: majesty
  chosen_korean: 위엄
  alternatives_korean:
  - 장엄
  - 위대함
  lexicon: BDAG
  rationale: 신적 위엄을 가리키는 표준 등가어.
