translation:
  language: es
  text: Y Nob[a], la ciudad de los sacerdotes, la hirió con el filo de la espada, de hombre a mujer, de niño a lactante, y buey y asno y oveja, con el filo de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo, literalmente, ‘a la boca de la espada’; es un modismo que significa muerte por la espada.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹב
  english_pob_choice: Nob
  chosen_spanish: Nob
  alternatives_spanish:
  - Nob
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera, no se traduce.
- source_word: עִיר הַכֹּהֲנִים
  english_pob_choice: the city of the priests
  chosen_spanish: la ciudad de los sacerdotes
  alternatives_spanish:
  - la ciudad sacerdotal
  - la ciudad de los sacerdotes
  lexicon: HALOT
  rationale: La construcción en español transmite bien la relación posesiva/caracterizadora del hebreo. ‘De los sacerdotes’ mantiene la referencia al grupo sin introducir una noción técnica ajena.
- source_word: הִכָּה
  english_pob_choice: he struck
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo hirió de muerte
  lexicon: HALOT
  rationale: En este contexto de matanza masiva, ‘hirió’ conserva la fuerza de נכה sin sobre-explicitar el acto como si fuera solo un golpe físico. El complemento ‘con el filo de la espada’ fija el sentido letal.
- source_word: לְפִי חֶרֶב / לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘a la boca de la espada’, un modismo para muerte por espada. En español, ‘con el filo de la espada’ conserva la imaginería concreta y suena natural; ‘a filo de espada’ es posible, pero menos transparente para lectura pública.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: de hombre a mujer
  alternatives_spanish:
  - de varón a mujer
  - de hombre hasta mujer
  lexicon: HALOT
  rationale: La construcción distributiva expresa totalidad entre sexos. ‘De hombre a mujer’ mantiene el paralelismo y la amplitud inclusiva del hebreo sin neutralizar el contraste.
- source_word: מֵעוֹלֵל וְעַד יוֹנֵק
  english_pob_choice: from child to nursing infant
  chosen_spanish: de niño a lactante
  alternatives_spanish:
  - de niño a bebé lactante
  - de pequeño a lactante
  lexicon: HALOT
  rationale: עוֹלֵל apunta a un niño pequeño; יוֹנֵק a uno que todavía mama. ‘Niño’ y ‘lactante’ conservan el descenso de edad y la crudeza del merismo. ‘Lactante’ expresa mejor el acto de amamantar que ‘bebé’.
- source_word: וְשׁוֹר וַחֲמוֹר וָשֶׂה
  english_pob_choice: and ox and donkey and sheep
  chosen_spanish: y buey y asno y oveja
  alternatives_spanish:
  - y buey y burro y oveja
  - y toro y asno y oveja
  lexicon: HALOT
  rationale: Los tres animales son domésticos y representan el ganado y animales de carga. ‘Buey’ corresponde bien a שׁוֹר en español bíblico y común; ‘asno’ y ‘oveja’ son equivalentes directos y naturales.
theological_decisions:
- issue: Retención del modismo hebreo de la espada
  english_pob_reading: with the edge of the sword
  chosen_spanish_reading: con el filo de la espada
  alternative_spanish_readings:
  - a filo de espada
  - por la espada
  rationale: La POB inglesa conserva el modismo con una imagen concreta, en vez de reducirlo a ‘por la espada’. El español elegido mantiene esa tensión entre literalidad e inteligibilidad. La repetición al final del versículo se conserva para reflejar la gravedad y la insistencia retórica del hebreo.
  doctrine_reference: DOCTRINE.md § Translation philosophy; optimal equivalence
- issue: Merismo humano y alcance total
  english_pob_reading: from man to woman, from child to nursing infant
  chosen_spanish_reading: de hombre a mujer, de niño a lactante
  alternative_spanish_readings:
  - de personas a mujeres y niños
  - de hombre hasta mujer, de pequeño a lactante
  rationale: El hebreo usa dos pares distributivos para expresar totalidad sin limitarse a una categoría. ‘Hombre/mujer’ y ‘niño/lactante’ preservan esa amplitud y el registro severo del texto. No se neutraliza el lenguaje porque la forma hebrea es explícitamente sexuada y etaria.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Violencia narrativa y precisión semántica
  english_pob_reading: he struck ... with the edge of the sword
  chosen_spanish_reading: lo hirió ... con el filo de la espada
  alternative_spanish_readings:
  - lo mató ... con la espada
  - lo atacó ... con la espada
  rationale: ‘Hirió’ evita sobre-traducir נכה como ‘mató’, pero el contexto ya deja claro que se trata de una matanza. Así se conserva la amplitud del verbo fuente y la dureza narrativa sin introducir una interpretación más estrecha que la del hebreo.
  doctrine_reference: DOCTRINE.md § Translation philosophy
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el contexto fuente; el último pase indicó que no había cambios necesarios y el cotejo mostró alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa ‘lactante’ para יוֹנֵק por precisión etaria y para mantener el merismo con ‘niño’.
  - Se evita ‘SEÑOR’ o ‘Cristo’ porque no aparecen en el texto fuente.
  - La puntuación reproduce la enumeración acumulativa del hebreo y la repetición final del modismo de la espada.
