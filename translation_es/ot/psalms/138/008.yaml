translation:
  language: es
  text: Yahvé cumplirá su propósito para mí[a]; Yahvé, tu amor fiel permanece para siempre. No abandones la obra de tus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé completará lo que me concierne»; la frase hebrea también puede expresar la acción de Dios en favor del orante.'
    reason: alternative_reading
  - marker: b
    text: 'O: «No abandones las obras de tus manos». El hebreo está en plural, aunque en español el singular colectivo «la obra de tus manos» suena natural y puede abarcar tanto la obra de Dios en el salmista como sus obras en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la transliteración usada por el proyecto en español. Se evita sustituirlo por un título, en fidelidad al principio de preservar el nombre personal de Dios.
- source_word: יִגְמֹר
  english_pob_choice: will fulfill
  chosen_spanish: cumplirá
  alternatives_spanish:
  - completará
  - llevará a término
  - hará realidad
  lexicon: HALOT
  rationale: El verbo expresa completar o llevar algo a su culminación. 'Cumplirá' comunica con naturalidad en español la acción de Dios de llevar a término lo que ha dispuesto para el salmista, sin sugerir una terminación abrupta.
- source_word: בַּעֲדִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en favor de mí
  - por mí
  - concerniente a mí
  lexicon: HALOT
  rationale: La preposición puede significar 'por, a favor de, concerniente a'. 'Para mí' es la opción más idiomática y deja abierta la idea de acción divina en favor del orante.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu amor fiel
  - tu bondad leal
  lexicon: HALOT
  rationale: חֶסֶד denota amor leal, fiel y de pacto. 'Misericordia' es una opción tradicional en español bíblico y aquí puede comunicar compasión fiel; se preserva la tensión entre ternura y lealtad sin recurrir a una paráfrasis extensa. La nota permite una lectura alternativa si se desea destacar el matiz de amor constante.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - es para siempre
  - dura por siempre
  - es eterno
  lexicon: HALOT
  rationale: La fórmula expresa permanencia duradera. 'Permanece para siempre' fluye bien en español y conserva el valor temporal de la expresión hebrea.
- source_word: מַעֲשֵׂי יָדֶיךָ
  english_pob_choice: the work of your hands
  chosen_spanish: la obra de tus manos
  alternatives_spanish:
  - las obras de tus manos
  - lo que tus manos han hecho
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural constructo, en español la colectiva singular 'la obra de tus manos' suena natural y mantiene la amplitud posible del referente. Respeta la apertura del texto entre la obra en la vida del salmista y la obra de Dios en general.
- source_word: אַל תֶּרֶף
  english_pob_choice: Do not forsake
  chosen_spanish: No abandones
  alternatives_spanish:
  - No dejes
  - No te separes de
  - No desistas de
  lexicon: HALOT
  rationale: El verbo puede significar dejar caer, soltar o abandonar. 'No abandones' comunica bien la súplica relacional dirigida a Dios y mantiene la fuerza del ruego sin sobreexplicar.
theological_decisions:
- issue: Alcance de יִגְמֹר בַּעֲדִי
  english_pob_reading: The LORD will fulfill his purpose for the psalmist
  chosen_spanish_reading: Yahvé cumplirá su propósito para mí
  alternative_spanish_readings:
  - Yahvé completará lo que concierne a mí
  - Yahvé obrará en favor de mí hasta completarlo
  rationale: El hebreo no explicita 'propósito', pero la frase pide un objeto entendido. 'Su propósito para mí' refleja la lectura del POB inglés sin cerrar innecesariamente la expresión hebrea, que también puede entenderse como lo que concierne al salmista.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Sentido de מַעֲשֵׂי יָדֶיךָ
  english_pob_reading: A prayer that God not abandon what he has made/done, likely including the psalmist
  chosen_spanish_reading: No abandones la obra de tus manos
  alternative_spanish_readings:
  - No abandones las obras de tus manos
  - No dejes la obra que has hecho
  rationale: 'Se mantiene la amplitud del hebreo: puede referirse al salmista como obra de Dios, a la obra que Dios ha comenzado en su vida, o a la obra divina en general. La formulación singular en español conserva esa apertura.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Valor de חַסְדְּךָ לְעוֹלָם
  english_pob_reading: your steadfast love endures forever
  chosen_spanish_reading: tu misericordia permanece para siempre
  alternative_spanish_readings:
  - tu amor fiel permanece para siempre
  - tu amor constante es para siempre
  rationale: La decisión equilibra el matiz de fidelidad pactal de חסד con la inteligibilidad litúrgica de 'misericordia' en español. La nota alternativa permite recuperar explícitamente el aspecto de amor constante si se desea.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: Se revisó el texto frente al audit trail en inglés y no se introdujeron cambios sustantivos respecto de la lectura base. La principal decisión fue mantener la apertura semántica de יִגְמֹר בַּעֲדִי y de מַעֲשֵׂי יָדֶיךָ, mientras que חַסְדְּךָ se vertió con una opción española litúrgicamente estable pero anotada para no perder el matiz de lealtad pactal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La singularidad de «la obra de tus manos» en español conserva la apertura del plural hebreo sin forzar el referente.
  - Las notas a pie de página señalan las alternativas relevantes donde el hebreo permite más de una lectura razonable.
