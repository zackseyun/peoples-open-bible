  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la imaginería del griego: condición + resultado, logro de lo perseguido y metáfora de vestirse con ello como prenda de gloria. Sin embargo, «buscas» debilita el vigor de διώκῃς («persigues / vas tras / te esfuerzas por alcanzar»), y «la justicia» estrecha o desplaza el sentido de τὸ δίκαιον frente al inglés auditado, que privilegia una cualidad moral amplia («righteousness») con alternativas como «what is right» y «justice».'
  spanish_quality_summary: 'El español es claro y natural, con buena fluidez. «Te la pondrás como una túnica de gloria» funciona bien y conserva la metáfora. No obstante, una mejora leve hace el texto más fiel y más idiomáticamente preciso en contexto sapiencial: «Si persigues la rectitud…».'
  glossary_alignment: No hay términos del glosario mayor en conflicto directo, pero la familia δικ- en este contexto sapiencial se alinea mejor con «rectitud» que con «justicia», porque evita una lectura primariamente jurídica y sigue mejor la rationale inglesa para τὸ δίκαιον. También conviene acercarse más al valor activo de διώκῃς con «persigues».
  issues:
  - severity: medium
    issue: «buscas» suaviza demasiado διώκῃς
    rationale: El griego y la auditoría inglesa enfatizan un esfuerzo activo de perseguir o ir tras algo, no solo buscarlo. «Persigues» suena más fuerte y más cercano al original; en este contexto moral no resulta ininteligible en español.
  - severity: medium
    issue: «la justicia» no es la mejor opción para τὸ δίκαιον aquí
    rationale: Aunque es posible, «justicia» en español tiende a oírse más jurídica o social. El contexto y la rationale inglesa favorecen una virtud moral amplia que se ‘viste’; «la rectitud» comunica mejor esa cualidad.
  - severity: low
    issue: La nota al pie podría alinearse mejor con la decisión principal revisada
    rationale: Si el texto principal usa «rectitud», conviene que la nota preserve las otras posibilidades («lo que es justo», «justicia») y explique la amplitud del griego sin invertir la jerarquía semántica.
  revised_spanish_text: Si persigues la rectitud[a], la alcanzarás, y te la pondrás como una túnica de gloria.
  revised_footnotes:
