translation:
  language: es
  text: 'Pero el rey dijo[a]: «¿Qué tengo yo que ver con ustedes, hijos de Saruía? Si él está maldiciendo, porque Yahvé le ha dicho: “Maldice a David”, entonces ¿quién puede decir: “¿Por qué has actuado así?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque él está maldiciendo, porque Yahvé le ha dicho: “Maldice a David”». Las partículas hebreas también pueden entenderse de manera más explicativa que condicional.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לִּי וְלָכֶם
  english_pob_choice: What have I to do with you
  chosen_spanish: ¿Qué tengo yo que ver con ustedes?
  alternatives_spanish:
  - ¿Qué tengo yo en común con ustedes?
  - ¿Qué relación tengo yo con ustedes?
  lexicon: HALOT
  rationale: El hebreo expresa distanciamiento o reprensión idiomática, no una pregunta literal sobre posesión. En español, «¿Qué tengo yo que ver con ustedes?» comunica esa separación con naturalidad y conserva el tono del rey.
- source_word: בְּנֵי צְרֻיָה
  english_pob_choice: sons of Zeruiah
  chosen_spanish: hijos de Saruía
  alternatives_spanish:
  - hijos de Zeruía
  - hijos de Tseruía
  lexicon: HALOT
  rationale: La construcción identifica a Joab y Abisai por su madre. «Saruía» sigue una transliteración española clara y legible; «hijos» mantiene el plural idiomático del hebreo.
- source_word: יְקַלֵּל / קַלֵּל
  english_pob_choice: is cursing / Curse
  chosen_spanish: está maldiciendo / Maldice
  alternatives_spanish:
  - está maldiciendo / Maldiga
  - está profiriendo maldición / Maldice
  lexicon: HALOT
  rationale: קלל aquí denota maldecir o lanzar una maldición contra David. «Maldiciendo» y «Maldice» conservan la relación léxica entre la acción descrita y la cita del mandato, sin suavizarla con un término más débil.
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Porque
  - Puesto que
  lexicon: HALOT
  rationale: El primer כי puede entenderse condicionalmente o de modo más explicativo. «Si» deja abierta esa relación sintáctica como en la POB inglesa, sin resolverla de antemano.
- source_word: וְכִי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: El segundo כי introduce la base causal de la frase anterior. «Porque» expresa esa relación de manera directa y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma española de transliteración, en lugar de sustituirlo por un título. «Yahvé» sigue el criterio del proyecto para el Tetragrámaton.
- source_word: אָמַר לוֹ
  english_pob_choice: has said to him
  chosen_spanish: le ha dicho
  alternatives_spanish:
  - le dijo
  - le ha ordenado
  lexicon: HALOT
  rationale: El perfecto hebreo y la lógica del contexto se reflejan bien con el presente perfecto español, que mantiene la conexión entre el mandato previo y la acción presente.
- source_word: אֶת דָּוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - contra David
  - de David
  lexicon: HALOT
  rationale: El marcador de objeto directo exige una solución idiomática en español. Aquí «a David» funciona dentro de la cita imperativa «Maldice a David» y conserva el flujo natural del mandato.
- source_word: וּמִי יֹאמַר
  english_pob_choice: then who can say
  chosen_spanish: entonces ¿quién puede decir?
  alternatives_spanish:
  - y ¿quién dirá?
  - ¿quién puede decir entonces?
  lexicon: HALOT
  rationale: La pregunta es retórica y expresa que nadie tiene autoridad para objetar. «¿Quién puede decir?» transmite mejor la aptitud/autoridad implícita que un simple futuro.
- source_word: מַדּוּעַ עָשִׂיתָה כֵּן
  english_pob_choice: Why have you done so?
  chosen_spanish: ¿Por qué has hecho así?
  alternatives_spanish:
  - ¿Por qué hiciste eso?
  - ¿Por qué has actuado así?
  lexicon: HALOT
  rationale: La pregunta retórica final puede sonar más literal o más idiomática. «¿Por qué has hecho así?» conserva la forma general del hebreo y la relación con la cita, sin añadir explicación que el texto no da.
theological_decisions:
- issue: Participación divina en la maldición de Simei
  english_pob_reading: Render the verse so that David presents the cursing as possibly commanded by the LORD, without softening or resolving the theological tension.
  chosen_spanish_reading: Traducir de modo que David presente la maldición como algo que posiblemente Yahvé le ha dicho a Simei que haga, sin suavizar ni resolver la tensión teológica.
  alternative_spanish_readings:
  - Traducirlo como mera अनुमति / permiso divino
  - Traducirlo como un mandato directo inequívoco sin el marco retórico del versículo
  rationale: 'El hebreo dice que Yahvé le dijo: «Maldice a David», y la respuesta de David acepta esa posibilidad. La versión española conserva esa tensión difícil sin convertirla en simple permiso ni eliminar su fuerza declarativa.'
  doctrine_reference: Preservar la tensión teológica; YHWH -> Yahvé
translation_notes:
  revision_awareness: No hay cambios respecto al último pase de revisión; la lectura se mantiene estable y de alta concordancia con el análisis auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «maldiciendo/maldice» para קלל, evitando suavizar el término.
  - La puntuación reproduce el quiebre retórico del hebreo con una cita directa y una pregunta final.
  - «Hijos de Saruía» sigue el patrón genealógico del hebreo y la transliteración española habitual del nombre.
