  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «porque/ya que la δικαιοσύνη es inmortal». La draft española comunica bien ἀθάνατος e introduce adecuadamente el valor causal de γάρ con «Porque». Sin embargo, no sigue de manera suficientemente fiel la decisión auditada del POB inglés para δικαιοσύνη como término principal: allí se eligió «righteousness» y se preservó «justice» solo como alternativa. En español, «justicia» es posible, pero aquí estrecha el matiz ético-teológico más amplio que el inglés quiso mantener como principal.'
  spanish_quality_summary: 'La redacción es clara y natural, breve y digna. No hay problemas gramaticales. La mejora necesaria es terminológica: «rectitud» o una forma equivalente moral es mejor como término principal en este contexto sentencioso; la nota debe conservar «justicia» como alternativa para reflejar la amplitud semántica.'
  glossary_alignment: El proyecto indica δικαιοσύνη -> «justicia» / «rectitud» según contexto. Dado que la evidencia auditada favorece el sentido ético amplio y el inglés principal es «righteousness», la mejor alineación en español aquí es «rectitud» en texto principal, con nota alternativa «justicia». Los demás términos no presentan conflicto terminológico.
  issues:
  - severity: medium
    issue: Término principal para δικαιοσύνη
    rationale: La draft usa «justicia» como principal, pero el expediente inglés documenta que en este versículo el peso semántico es ético/teológico más que jurídico. «Rectitud» preserva mejor ese enfoque y refleja mejor la elección principal auditada de «righteousness».
  - severity: low
    issue: Nota alternativa invertida respecto al audit trail
    rationale: 'La nota española ofrece «rectitud» como alternativa, cuando el inglés preserva «justice» como alternativa. En español conviene invertir: texto principal «rectitud», nota «justicia». Esto mantiene la lógica del expediente y evita desplazar el matiz principal.'
  revised_spanish_text: Porque la rectitud[a] es inmortal.
  revised_footnotes:
