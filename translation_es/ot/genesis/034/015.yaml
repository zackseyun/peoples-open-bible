translation:
  language: es
  text: 'Sólo con esta condición aceptaremos con ustedes[a]: si llegan a ser como nosotros, circuncidando a todo varón entre ustedes.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sólo en esto consentiremos con ustedes».'
    reason: lexical_alternative
  - marker: b
