translation:
  language: es
  text: Y fue de allí a Gaza, y los de Gaza le cerraron el paso; y acampó alrededor de ella[a], y quemó sus alrededores[b] con fuego, y los saqueó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sitió». El griego dice literalmente que «acampó/se sentó alrededor de ella».'
    reason: lexical_alternative
  - marker: b
    text: La frase traducida «sus alrededores» es difícil; puede referirse a las zonas alrededor de Gaza, como sus alrededores o suburbios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: salió de allí
  alternatives_spanish:
  - fue
  - partió de allí
  - se fue de allí
  lexicon: LSJ
  rationale: El griego expresa un movimiento narrativo simple desde el lugar anterior. «Salió de allí» comunica bien el desplazamiento sin sobrecargar el verso, y mantiene el valor de salida implícito en el contexto.
- source_word: εἰς Γάζαν
  english_pob_choice: to Gaza
  chosen_spanish: a Gaza
  alternatives_spanish:
  - hacia Gaza
  - hasta Gaza
  lexicon: LSJ
  rationale: La preposición de destino se rinde naturalmente con «a». El topónimo se mantiene sin adaptación.
- source_word: ἀπέκλεισαν
  english_pob_choice: shut him out
  chosen_spanish: le cerraron el paso
  alternatives_spanish:
  - lo cerraron fuera
  - le cerraron la entrada
  - le negaron el acceso
  lexicon: LSJ
  rationale: El verbo implica impedir la entrada o bloquear el acceso. En español, «le cerraron el paso» conserva la acción hostil de forma idiomática y clara.
- source_word: οἱ ἀπὸ Γάζης
  english_pob_choice: the men of Gaza
  chosen_spanish: los de Gaza
  alternatives_spanish:
  - los hombres de Gaza
  - la gente de Gaza
  - los habitantes de Gaza
  lexicon: LSJ
  rationale: La expresión griega es literalmente «los de Gaza». En este contexto militar puede entenderse como los defensores de la ciudad; «los de Gaza» conserva esa referencia sin especificar de más el género o el alcance del grupo.
- source_word: περιεκάθισεν περὶ αὐτήν
  english_pob_choice: he encamped around it
  chosen_spanish: acampó alrededor de ella
  alternatives_spanish:
  - la sitió
  - se sentó alrededor de ella
  - acamparon alrededor de ella
  lexicon: LSJ
  rationale: El giro describe literalmente sentarse o acampar alrededor de la ciudad. «Acampó alrededor de ella» preserva la imagen y deja abierta la implicación de sitio, como en el audit trail en inglés.
- source_word: τὰ περίπολα αὐτῆς
  english_pob_choice: its outlying parts
  chosen_spanish: sus alrededores
  alternatives_spanish:
  - sus alrededores exteriores
  - sus suburbios
  - sus distritos circundantes
  lexicon: LSJ
  rationale: El sustantivo es difícil y el contexto sugiere las zonas alrededor de Gaza. «Sus alrededores» es una forma amplia y natural que recoge esa referencia sin forzar una precisión no segura.
- source_word: ἐνεπύρισεν ... ἐν πυρί
  english_pob_choice: burned ... with fire
  chosen_spanish: quemó ... con fuego
  alternatives_spanish:
  - prendió fuego a ...
  - lo incendió
  - quemó ... en fuego
  lexicon: LSJ
  rationale: La construcción griega es enfática. «Quemó ... con fuego» reproduce la insistencia del original con un español sobrio y bíblicamente natural.
- source_word: ἐσκύλευσεν
  english_pob_choice: plundered
  chosen_spanish: los saqueó
  alternatives_spanish:
  - los despojó
  - los desvalijó
  - los robó
  lexicon: LSJ
  rationale: Es un término militar de saqueo. «Los saqueó» expresa bien la toma de botín en un registro histórico adecuado.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y el audit trail inglés. Se ha conservado la ambigüedad de περιεκάθισεν con una solución literal-idiomática («acampó alrededor de ella») y se ha reflejado la dificultad de τὰ περίπολα αὐτῆς con una opción amplia («sus alrededores»), manteniendo la nota alternativa.
  spanish_consistency_notes:
  - Se usa «Gaza» sin artículo por tratarse del topónimo.
  - Se mantiene el femenino singular «ella» para la ciudad, conforme al antecedente implícito en el griego.
  - «Saqueó» se eligió para conservar el tono militar y narrativo del verbo griego.
