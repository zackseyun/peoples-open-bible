    text: Or 'Bring there' or 'Send there' one of the priests.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom you deported from there.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew has plural verbs here (''let them go'' / ''let them live''), though the sense is singular: ''one of the priests'' ... ''let him teach them.'''
    reason: textual_variant
  - marker: d
    text: Or 'teach them the law/requirement of the god of the land.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the God of the land'; lower-case 'god' reflects the Assyrian speaker's perspective.
    reason: alternative_reading
