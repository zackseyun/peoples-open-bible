revisions:
- from: Yo lo desperté en justicia[a], y haré rectos todos sus caminos. Él reconstruirá mi ciudad[b] y pondrá en libertad a mis desterrados, no por precio y no por soborno, dice Yahvé de los ejércitos[c].
  to: Yo lo desperté en justicia[a], y haré rectos todos sus caminos. Él reconstruirá mi ciudad[b] y dejará ir a mis exiliados, no por precio y no por soborno, dice Yahvé de los ejércitos[c].
  rationale: Se revisa principalmente יְשַׁלֵּחַ para reflejar mejor el verbo fuente (‘dejar ir’) en lugar de la interpretación más libre ‘poner en libertad’. También se ajusta ‘mis exiliados’ para alinearse más de cerca con גָּלוּתִי / ‘my exiles’, y se corrige la nota sobre la forma tradicional del título divino.
  reviewer_model: gpt-5.4
