  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y conserva correctamente el cambio de sufijos en la nota. Sin embargo, falla en un punto léxico importante: כָּל אֶרֶץ מֶמְשַׁלְתּוֹ fue auditado en inglés como distributivo (''every land of his dominion''), mientras que «toda la tierra de su dominio» tiende a leerse como totalidad territorial singular (''the whole land''). También hay desajuste de anclaje de notas: la nota sobre «consagra» está marcada en [b] sobre «prefectos», mientras debería anclarse al verbo; y la nota [a] sobre «los reyes de los medos» debe anclarse a «Media», no a «naciones».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para precisión y legibilidad. «Consagra» en singular imperativo no corresponde al hebreo plural; conviene «Consagren». Además, para reflejar mejor el distributivo del original y del POB inglés, «cada tierra bajo su dominio» o «toda tierra bajo su dominio» funciona mejor que «toda la tierra de su dominio».
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Media», «gobernadores» y «prefectos» son aceptables. «Consagra»/«consagren» preserva bien el matiz de קדשׁ en contexto bélico-sacral. La principal corrección es semántica y de anclaje de notas, no de glosario base.
  issues:
  - severity: medium
    issue: Imperativo singular en vez de plural
    rationale: קַדְּשׁוּ es imperativo plural masculino. «Consagra» no reproduce ese número; «Consagren» sí.
  - severity: high
    issue: «toda la tierra de su dominio» debilita el valor distributivo de כָּל אֶרֶץ
    rationale: El audit trail inglés preserva «every land of his dominion». En español, «toda la tierra» suele sonar a territorio total singular, no a cada país/tierra bajo dominio.
  - severity: medium
    issue: Notas mal ancladas en el texto
    rationale: La nota lexical alternativa sobre «Media/medos» está puesta en [a] tras «naciones», y la nota cultural sobre «consagra» está en [b] tras «prefectos». Cada marcador debe aparecer en la palabra o frase pertinente.
  revised_spanish_text: 'Consagren[a] contra ella a las naciones: los reyes de Media[b], sus gobernadores y todos sus prefectos, y cada tierra bajo su dominio[c].'
  revised_footnotes:
