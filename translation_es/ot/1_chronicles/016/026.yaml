translation:
  language: es
  text: Porque todos los dioses de los pueblos son ídolos[a], pero[b] Yahvé hizo los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones» en vez de «los pueblos».
    reason: lexical_alternative
  - marker: b
    text: 'La conjunción hebrea es literalmente «y», pero aquí tiene un sentido contrastivo: «pero Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la razón del llamado a la alabanza; «porque» conserva la fuerza explicativa de כִּי en un español natural y bíblicamente digno.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada
  lexicon: HALOT
  rationale: «Todos» reproduce el alcance total del hebreo sin añadir matices distributivos que no están en el texto.
- source_word: אֱלֹהֵי
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: HALOT
  rationale: En constructo con «los pueblos», se refiere a las deidades adoradas por esos pueblos; «dioses» es la equivalencia directa y clara en español.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: «Los pueblos» sigue de cerca el plural hebreo עַמִּים y evita cargar el verso con un matiz político que «las naciones» puede sugerir.
- source_word: אֱלִילִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos vanos
  - nada
  lexicon: HALOT
  rationale: El término es peyorativo, pero el sustantivo básico «ídolos» comunica de forma fiel y sobria la comparación con Yahvé como Creador.
- source_word: וַיהוָה
  english_pob_choice: but Yahweh
  chosen_spanish: pero Yahvé
  alternatives_spanish:
  - y Yahvé
  lexicon: HALOT
  rationale: El hebreo trae una conjunción coordinante, pero el contraste del contexto exige un valor adversativo; «pero» preserva esa oposición entre falsos dioses y el Dios verdadero. «Yahvé» sigue el criterio POB para יהוה.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «los cielos», especialmente en lenguaje de creación.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: HALOT
  rationale: «Hizo» sigue de cerca el verbo עָשָׂה sin intensificarlo a «creó», que sería más interpretativo, y funciona bien en español bíblico.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el criterio POB en español es conservar el nombre pactal como «Yahvé» en vez de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la conjunción antes de יהוה
  english_pob_reading: adversative contrast ('but the LORD')
  chosen_spanish_reading: contraste adversativo ('pero Yahvé')
  alternative_spanish_readings:
  - coordinación simple ('y Yahvé')
  rationale: El verso contrapone los dioses de los pueblos con Yahvé como el que hizo los cielos; «pero» expresa ese contraste sin añadir contenido ajeno al hebreo.
  doctrine_reference: 'POB translation philosophy: optimal equivalence; preserve source-text sense in readable target language'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; esta versión mantiene el sentido ya validado y simplemente lo vierte al español con terminología POB consistente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se mantiene el contraste adversativo con «pero» por fidelidad al sentido discursivo del hebreo.
  - «Los cielos» conserva el plural hebreo שָׁמַיִם.
  - «Ídolos» se conserva sin amplificación para no perder la sobriedad del original.
