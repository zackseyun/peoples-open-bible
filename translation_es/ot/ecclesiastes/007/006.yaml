translation:
  language: es
  text: Porque como el crujir de los espinos bajo una olla[a], así es la risa del necio[b]; esto también es vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el sonido de los espinos bajo la olla». El hebreo dice literalmente «como el sonido/voz de espinos»; el contexto sugiere el crujido agudo que producen al quemarse.
    reason: lexical_alternative
  - marker: b
    text: Hebreo hebel, a menudo traducido «vanidad» o «aliento». Aquí «vapor» conserva mejor la imagen de algo pasajero e insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la comparación explicativa con un conector natural en español. «Porque» conserva la fuerza causal/explicativa de כִּי sin endurecer el vínculo lógico.
- source_word: כְקֹול
  english_pob_choice: like the crackling
  chosen_spanish: como el crujir
  alternatives_spanish:
  - como el sonido
  - como el ruido
  lexicon: HALOT
  rationale: El hebreo dice literalmente «como la voz/el sonido». Siguiendo la decisión auditada en inglés, «crujir» comunica el efecto acústico específico de espinas ardiendo y mantiene la imagen concreta.
- source_word: הַסִּירִים
  english_pob_choice: thorns
  chosen_spanish: las espinas
  alternatives_spanish:
  - los espinos
  - los zarzales
  lexicon: HALOT
  rationale: En español, «espinas» transmite bien el material combustible y la dureza visual del hebreo. Evita una perífrasis más técnica y conserva la imagen proverbial.
- source_word: תַּחַת הַסִּיר
  english_pob_choice: under a pot
  chosen_spanish: bajo la olla
  alternatives_spanish:
  - debajo de la olla
  - bajo el recipiente
  lexicon: HALOT
  rationale: «Olla» es la forma natural y clara en español para el recipiente de cocción del proverbio. Mantiene el paralelismo con la escena doméstica del texto.
- source_word: כֵּן
  english_pob_choice: so is
  chosen_spanish: así es
  alternatives_spanish:
  - tal es
  - de igual modo es
  lexicon: HALOT
  rationale: Marca la correspondencia entre la imagen y su referente. «Así es» es idiomático y conserva la estructura comparativa del hebreo.
- source_word: שְׂחֹק
  english_pob_choice: the laughter
  chosen_spanish: la risa
  alternatives_spanish:
  - la carcajada
  - el reír
  lexicon: HALOT
  rationale: «Risa» mantiene el sustantivo concreto y el tono proverbial. Es más neutro que «carcajada» y suficientemente fiel al término hebreo.
- source_word: הַכְּסִיל
  english_pob_choice: the fool
  chosen_spanish: el insensato
  alternatives_spanish:
  - el necio
  - el tonto
  lexicon: HALOT
  rationale: En la sabiduría bíblica, כְּסִיל no es solo falta de inteligencia, sino torpeza moral y espiritual. «Insensato» preserva mejor ese peso que «tonto» y evita un matiz demasiado coloquial de «necio».
- source_word: וְגַם זֶה
  english_pob_choice: this too
  chosen_spanish: también esto
  alternatives_spanish:
  - esto también
  - y esto asimismo
  lexicon: HALOT
  rationale: Conserva el valor aditivo y evaluativo de la cláusula final. «También esto» suena natural y reproduce la brevedad del hebreo.
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - futilidad
  lexicon: HALOT
  rationale: Se mantiene «vapor» para reflejar la imagen concreta de algo fugaz e insustancial, tal como la decisión auditada en inglés. Es preferible a «vanidad», que en español puede sonar moralizante o abstracto.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión inglesa más reciente; no se requirieron cambios sustanciales. La decisión principal en español fue mantener el valor imagístico de הָבֶל como «vapor» y traducir el efecto sonoro de כְקֹול como «crujir» para evitar una calca demasiado literal.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial sobrio y la imagen sensorial del proverbio.
  - «Insensato» se usa aquí por su capacidad de reflejar el valor sapiencial de כְּסִיל sin caer en coloquialismo.
  - «Vapor» conserva el término clave de Qohelet para la transitoriedad, en coherencia con el proyecto POB.
