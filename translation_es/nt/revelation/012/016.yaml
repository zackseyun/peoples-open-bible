review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: la tierra ayuda a la mujer, abre su boca y traga el río que el dragón arrojó de su boca. Conserva correctamente la personificación apocalíptica, el valor básico de βοηθέω, καταπίνω, ποταμός y la cláusula relativa con ἔβαλεν. La única desalineación relevante está en las notas: la nota [a] no ofrece una alternativa real al texto, y la nota [b] pierde el matiz de ''desde/fuera de su boca'' al decir solo ''de su boca''.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Y la tierra ayudó a la mujer, y la tierra abrió su boca y tragó el río que el dragón había arrojado de su boca». La repetición de «la tierra» refleja bien el griego y funciona en español. «Tragó el río» y «había arrojado» son idiomáticos. Las únicas reparaciones necesarias son de calidad editorial en las notas, no del texto principal.'
  glossary_alignment: No hay términos del glosario principal en disputa aquí (Yahvé, Mesías, etc.). «La tierra», «la mujer» y «el dragón» concuerdan con las decisiones del POB y con la imaginería apocalíptica. La elección de «su boca» para la tierra es adecuada en español y preserva la personificación sin forzar una forma extraña.
  issues:
  - severity: medium
    issue: La nota [a] repite el mismo texto principal en vez de dar una alternativa léxica real.
    rationale: El inglés auditado preserva la alternativa «the land helped the woman». En español, la nota debería ofrecer una opción como «la tierra/territorio ayudó a la mujer» o explicar el rango semántico de γῆ sin repetir exactamente la lectura principal.
  - severity: low
    issue: La nota [b] no refleja con suficiente precisión la alternativa inglesa «out of/from his mouth».
    rationale: '«Echó de su boca» y «envió de su boca» son comprensibles, pero en español suenan más naturales y precisas como «echó/expulsó de entre su boca» no; mejor «echó de su boca» todavía es posible, aunque la formulación principal de la nota debe marcar que es una alternativa de verbo, no solo repetir la preposición. Conviene ajustar la redacción para mayor naturalidad: «echó de su boca» o «envió desde su boca».'
  revised_spanish_text: Y la tierra ayudó a la mujer[a], y la tierra abrió su boca y tragó el río[b] que el dragón había arrojado de su boca.
  revised_footnotes:
  - marker: a
    text: O «la tierra ayudó a la mujer», en el sentido de «la tierra» como «territorio» o «suelo». El griego γῆ puede significar «tierra», «territorio» o «suelo».
    reason: lexical_alternative
  - marker: b
    text: O «el río que el dragón echó de su boca» o «envió desde su boca».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse tal como está porque es fiel al griego y suena bien en español. Se revisan solo las notas para que realmente preserven las alternativas léxicas documentadas en el POB inglés y para mejorar su utilidad editorial.
