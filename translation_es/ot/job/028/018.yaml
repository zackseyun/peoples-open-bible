translation:
  language: es
  text: El coral[a][c] y el cristal no valen la pena mencionarlos[b], y la adquisición de la sabiduría está por encima de las perlas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido aquí «coral» es raro e incierto; también puede entenderse como «madreperla» o, menos probablemente en este contexto, como una forma relacionada con «alturas».
    reason: lexical_alternative
  - marker: b
    text: 'O: «no serán recordados». El hebreo probablemente expresa que estos tesoros son insignificantes en comparación con la sabiduría.'
    reason: lexical_alternative
  - marker: c
    text: La palabra hebrea también puede verterse «rubíes», porque no se puede precisar con seguridad la piedra preciosa exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאמוֹת
  english_pob_choice: coral
  chosen_spanish: coral
  alternatives_spanish:
  - madreperla
  - alturas
  - ramot
  lexicon: HALOT
  rationale: El contexto es un catálogo de objetos preciosos; ‘coral’ da en español una equivalencia natural y mantiene el valor de lujo que el POB inglés privilegia. Se conserva la incertidumbre léxica en nota, porque el hebreo es raro y admite otras posibilidades.
- source_word: גָבִישׁ
  english_pob_choice: crystal
  chosen_spanish: cristal
  alternatives_spanish:
  - hielo
  - cuarzo
  lexicon: HALOT
  rationale: ‘Cristal’ comunica bien una sustancia transparente y preciosa en una enumeración de tesoros. ‘Hielo’ es posible etimológicamente, pero no encaja tan bien en el paralelo poético.
- source_word: לֹא יִזָּכֵר
  english_pob_choice: are not worth mentioning
  chosen_spanish: no se mencionan
  alternatives_spanish:
  - no serán recordados
  - no vale la pena mencionarlos
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘no será recordado/ mencionado’. En este contexto de comparación con la sabiduría, el sentido es de insignificancia; ‘no se mencionan’ conserva la idiomática sin sobreinterpretar con una paráfrasis excesiva.
- source_word: מֶשֶׁךְ
  english_pob_choice: acquisition
  chosen_spanish: adquisición
  alternatives_spanish:
  - obtención
  - precio
  - posesión
  lexicon: HALOT
  rationale: El sustantivo puede expresar lo que se obtiene o adquiere. ‘Adquisición’ sigue de cerca la revisión inglesa y evita reducirlo a un valor monetario de ‘precio’.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  lexicon: HALOT
  rationale: Es el término central del versículo y debe conservarse de forma directa y estable.
- source_word: מִפְּנִינִים
  english_pob_choice: above pearls
  chosen_spanish: por encima de las perlas
  alternatives_spanish:
  - más que las perlas
  - por encima de rubíes
  lexicon: HALOT
  rationale: ‘Perlas’ ofrece una equivalencia clara y natural en español. Se mantiene la comparación de superioridad del hebreo y se reconoce en nota la incertidumbre sobre la gema exacta.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que prefirió ‘acquisition’ en lugar de ‘price’ para מֶשֶׁךְ, y refleja la misma decisión semántica en español. También conserva la idea comparativa de ‘are not worth mentioning’ mediante una forma idiomática breve, sin convertirla en una paráfrasis interpretativa más amplia.
  spanish_consistency_notes:
  - Se usa ‘sabiduría’ de manera uniforme para חָכְמָה.
  - Se mantiene ‘cristal’ y no ‘hielo’, porque el verso enumera bienes preciosos.
  - Se evita ‘SEÑOR’ u otras convenciones de ocultamiento del nombre divino, ya que este versículo no contiene el Tetragrámaton.
  - Las comillas y la puntuación siguen la norma española y el estilo publicable del proyecto.
