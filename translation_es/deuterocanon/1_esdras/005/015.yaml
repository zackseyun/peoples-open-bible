translation:
  language: es
  text: Los hijos de Azeir Ezekias[a], los hijos de Keilan y Azetas, sesenta y siete; los hijos de Azaros, cuatrocientos treinta y dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos de este versículo difieren notablemente del paralelo masorético aproximado, que en el lugar correspondiente lee “los hijos de Adín, cuatrocientos cincuenta y cuatro”. Como 1 Esdras a menudo reordena o remodela estas listas de los repatriados, aquí se sigue el testimonio griego en vez de armonizarlo con el hebreo paralelo.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - miembros de la familia de
  lexicon: LSJ
  rationale: En esta lista censal/genealógica, υἱοὶ funciona como fórmula de linaje. «Los hijos de» conserva la estructura formal del griego y mantiene el registro de los listados de repatriados mejor que una paráfrasis más interpretativa.
- source_word: Ἀζὴρ Ἐζεκίου
  english_pob_choice: Azeir Ezekias
  chosen_spanish: Azeir Ezekias
  alternatives_spanish:
  - Azir Ezekias
  - Azer Hezekiah
  lexicon: transliteración del griego
  rationale: Son nombres propios transmitidos en forma griega transliterada. Se conserva esa forma en español para reflejar el testimonio griego sin armonizarlo con una forma hebrea alternativa no segura.
- source_word: Κειλὰν
  english_pob_choice: Keilan
  chosen_spanish: Keilan
  alternatives_spanish:
  - Keila
  - Keilan
  lexicon: transliteración del griego
  rationale: Nombre propio transliterado directamente del griego. No se normaliza a otra forma hebrea o castellana sin evidencia más fuerte.
- source_word: Ἀζητάς
  english_pob_choice: Azetas
  chosen_spanish: Azetas
  alternatives_spanish:
  - Azetas
  - Azeta
  lexicon: transliteración del griego
  rationale: Se conserva la forma griega del nombre propio. Dado que el testimonio griego no coincide notablemente con el paralelo masorético aproximado, no se armoniza en el texto principal.
- source_word: ἐξήκοντα ἑπτά
  english_pob_choice: sixty-seven
  chosen_spanish: sesenta y siete
  alternatives_spanish:
  - '67'
  lexicon: LSJ
  rationale: El cardinal se vierte en palabras para una lectura litúrgica y fluida, preservando con exactitud el conteo.
- source_word: Ἀζάρου
  english_pob_choice: Azaros
  chosen_spanish: Azaros
  alternatives_spanish:
  - Azar
  - Azaru
  lexicon: transliteración del griego
  rationale: Nombre propio en caso genitivo traducido mediante una transliteración directa de la forma griega. Se mantiene la distinción del testimonio griego como fuente primaria de 1 Esdras.
- source_word: τετρακόσιοι τριάκοντα δύο
  english_pob_choice: four hundred thirty-two
  chosen_spanish: cuatrocientos treinta y dos
  alternatives_spanish:
  - '432'
  lexicon: LSJ
  rationale: El número cardinal se traduce de forma directa e idiomática al español, conservando el valor exacto del recuento.
theological_decisions:
- issue: Diferencia textual entre el griego de 1 Esdras y el paralelo masorético aproximado
  english_pob_reading: The Greek names in this verse differ notably from the approximate Masoretic parallel... Because 1 Esdras often reorders or reshapes these returnee lists, the Greek witness is followed here rather than harmonizing to the Hebrew parallel.
  chosen_spanish_reading: Se sigue el testimonio griego sin armonizarlo con el paralelo hebreo aproximado.
  alternative_spanish_readings:
  - armonizar los nombres y el número con el paralelo masorético
  - sustituir los nombres griegos por la forma hebrea más conocida
  rationale: 'La decisión preserva la evidencia textual específica de 1 Esdras y evita borrar una tensión documentada entre tradiciones textuales. El lector en español recibe el mismo tipo de señal que en el audit trail inglés: el griego es la base de la traducción, no una reconstrucción conciliada.'
  doctrine_reference: Crítica textual / transmisión de los listados de retorno
translation_notes:
  revision_awareness: 'No se requirieron cambios respecto del pasaje fuente auditado: el texto griego sigue siendo el ancla primaria, y la versión española conserva la lista nominal y los números sin armonización con el paralelo masorético aproximado.'
  spanish_consistency_notes:
  - Se usa «hijos de» para conservar la fórmula genealógica/censal.
  - Los nombres propios se transliteran de la forma griega y no se sustituyen por equivalentes hebreos más conocidos.
  - Los números se escriben en palabras para una presentación bíblica natural en español.
  - La nota textual advierte la divergencia con el paralelo masorético sin desplazar la base griega del versículo.
