translation:
  language: es
  text: 'Así que dejó los bueyes y corrió tras Elías, y dijo: “Te ruego que me dejes besar[a] a mi padre y a mi madre, y luego iré tras de ti”. Y él le dijo: “Vuelve[b], porque ¿qué te he hecho?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más general: “Te ruego que me dejes despedirme de mi padre y de mi madre”. El verbo hebreo significa literalmente “besar”.'
    reason: lexical_alternative
  - marker: b
    text: La respuesta de Elías es difícil y también puede entenderse como “Vuelve, porque ¿qué he hecho por ti?” o como una frase elíptica que deja la decisión en manos de Eliseo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲזֹב / he left
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó atrás
  lexicon: HALOT
  rationale: עזב en este contexto narrativo expresa simplemente dejar algo; “dejó” es natural en español y no intensifica indebidamente la acción como una abandono definitivo.
- source_word: הַבָּקָר / the oxen
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - el ganado
  - las reses
  lexicon: HALOT
  rationale: Como el contexto inmediato es de arado, “bueyes” capta mejor los animales de tiro concretos que “ganado” o “reses”.
- source_word: וַיָּרָץ אַחֲרֵי / ran after
  english_pob_choice: ran after
  chosen_spanish: corrió tras
  alternatives_spanish:
  - corrió detrás de
  - fue corriendo tras
  lexicon: HALOT
  rationale: La construcción hebrea comunica persecución/movimiento detrás de alguien; “corrió tras” es directo y natural en español.
- source_word: אֶשְּׁקָה נָּא / Please let me kiss
  english_pob_choice: Please let me kiss
  chosen_spanish: Te ruego que me deje[b] besar
  alternatives_spanish:
  - Te ruego que me permita besar
  - Permíteme besar, por favor
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente “besar”, y la escena es una despedida ritual. Mantener el gesto concreto evita diluir el matiz del texto; se deja la alternativa de despedida en nota.
- source_word: לְאָבִי וּלְאִמִּי / my father and my mother
  english_pob_choice: my father and my mother
  chosen_spanish: a mi padre y a mi madre
  alternatives_spanish:
  - a mis padres
  lexicon: HALOT
  rationale: El hebreo nombra a cada progenitor por separado; el español conserva esa explicitud en vez de resumirla en “mis padres”.
- source_word: וְאֵלְכָה אַחֲרֶיךָ / and then I will go after you
  english_pob_choice: and then I will go after you
  chosen_spanish: y luego iré tras de ti
  alternatives_spanish:
  - y te seguiré
  - y después iré contigo
  lexicon: HALOT
  rationale: “Iré tras de ti” preserva la imagen hebrea de seguir detrás; “luego” refleja la secuencia temporal sin añadir interpretación.
- source_word: לֵךְ שׁוּב / Go back
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Ve, vuelve
  lexicon: HALOT
  rationale: שוב pide un retorno; “Vuelve” es la forma más natural y breve en español para este mandato.
- source_word: כִּי מֶה עָשִׂיתִי לָךְ / for what have I done to you?
  english_pob_choice: for what have I done to you?
  chosen_spanish: porque ¿qué he hecho yo para ti?
  alternatives_spanish:
  - porque ¿qué te he hecho?
  - porque ¿qué he hecho por ti?
  - porque ¿qué he hecho yo contigo?
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad del hebreo sin resolverla: puede leerse como pregunta abierta, como permiso implícito o como frase elíptica. “Para ti” mantiene la misma tensión que el inglés auditado y no suaviza la dificultad del texto.'
theological_decisions:
- issue: Ambigüedad de la respuesta de Elías en כִּי מֶה עָשִׂיתִי לָךְ
  english_pob_reading: Retain the literal question 'for what have I done to you?' without resolving its nuance in the main text.
  chosen_spanish_reading: Conservar la pregunta literal “¿qué he hecho yo para ti?” sin aclarar en el texto principal si es permiso, reproche o invitación implícita.
  alternative_spanish_readings:
  - ¿qué te he hecho?
  - ¿qué he hecho por ti?
  - vuelve, y piensa en lo que he hecho por ti
  rationale: La frase hebrea es realmente difícil y ha recibido lecturas distintas. La traducción debe preservar esa tensión textual en vez de fijar una interpretación no exigida por el מקור; la nota recoge la alternativa de sentido sin sustituir el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue la última revisión auditada del inglés en el punto de ‘Go back’, usando una forma más natural en español (“Vuelve”) y manteniendo sin resolver la dificultad de la pregunta final. Se preserva además la literalidad del verbo “besar”, tal como exige el trail lexical del POB.
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantiene “Elías” como nombre propio sin adaptación.
  - Se conserva el paralelismo entre los dos padres nombrados individualmente.
  - La nota b va anclada en “deje[b]” para evitar repetir marcador en otro lugar del mismo registro.
  - La nota c está anclada en “Vuelve[c]” porque ahí se introduce la respuesta ambigua de Elías.
