revisions:
- from: 'Pero Esaú dijo[a]: «Yo tengo mucho, hermano mío; sea tuyo lo que es tuyo».'
  to: 'Pero Esaú dijo[a]: «Tengo mucho, mi hermano; que sea tuyo lo que es tuyo».'
  rationale: 'Se ajusta el español para mayor naturalidad y legibilidad sin apartarse del hebreo ni del rastro de auditoría inglés: se elimina el pronombre innecesario, se cambia el vocativo a la forma más idiomática «mi hermano», y se suaviza la cláusula final con «que sea tuyo...» para reflejar mejor el valor jussivo en español natural. La nota alternativa se mantiene en paralelo con esos mismos ajustes.'
