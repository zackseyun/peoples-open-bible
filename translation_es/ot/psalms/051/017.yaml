translation:
  language: es
  text: Señor, abre mis labios, y mi boca declarará tu alabanza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: En vocativo directo, אֲדֹנָי funciona como título reverente dirigido a Dios. En español, “Señor” reproduce ese tratamiento con naturalidad y mantiene la dirección de la súplica sin añadir el posesivo que no está en el hebreo.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi habla
  - mis labios de habla
  lexicon: HALOT
  rationale: El sustantivo es concreto y plural con sufijo de primera persona singular. “Mis labios” conserva la imagen corporal de la apertura divina como fuente del habla y sigue de cerca el hebreo.
- source_word: תִּפְתָּח
  english_pob_choice: open
  chosen_spanish: abre
  alternatives_spanish:
  - abrirás
  - desatarás
  - descorcharás
  lexicon: HALOT
  rationale: El verbo פתח pide una apertura literal; en español, el imperativo “abre” comunica con naturalidad la petición implícita en la oración, sin perder la fuerza del verbo hebreo.
- source_word: וּפִי
  english_pob_choice: and my mouth
  chosen_spanish: y mi boca
  alternatives_spanish:
  - entonces mi boca
  - mi boca
  lexicon: HALOT
  rationale: La conjunción más el sustantivo con sufijo se rinden de manera directa como “y mi boca”, preservando el paralelismo con “mis labios” sin introducir una inferencia no explícita.
- source_word: יַגִּיד
  english_pob_choice: will declare
  chosen_spanish: declarará
  alternatives_spanish:
  - dirá
  - proclamará
  lexicon: HALOT
  rationale: El hiphil de נגד expresa hacer saber, declarar. “Declarará” conserva el matiz de anuncio formal y se ajusta al resultado esperado de la súplica.
- source_word: תְּהִלָּתֶךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - alabanza de ti
  - tu gloria
  lexicon: HALOT
  rationale: תְּהִלָּה es “alabanza”. “Tu alabanza” es una equivalencia idiomática en español que mantiene el objeto de la declaración y evita suavizar el sustantivo hacia una idea más general de renombre.
theological_decisions:
- issue: Tratamiento del título divino en vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  - Señor Dios
  rationale: La lectura inglesa trata אֲדֹנָי como título divino en oración directa, no como nombre propio. En español, “Señor” conserva la reverencia y la naturalidad litúrgica sin convertirlo en un sustituto oculto del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; rendering of divine address in prayer'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y coincide en sustancia con la auditoría inglesa: una petición directa a Dios para que abra los labios, seguida por la declaración futura de alabanza. No se detectaron variantes textuales ni tensiones léxicas adicionales en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo el vocativo “Señor” como título divino, coherente con la política del proyecto para אֲדֹנָי.
  - Se usó “alabanza” para תְּהִלָּה, conservando el sustantivo de praise y evitando paráfrasis.
  - El futuro “declarará” refleja el resultado de la petición sin forzar una forma meramente imperativa en la segunda cláusula.
