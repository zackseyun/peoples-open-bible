base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/013/017.yaml
  text: You shall gather all its spoil into the middle of its open square[a], and you shall burn the city and all its spoil with fire as a whole offering to Yahweh your God. It shall remain a perpetual ruin mound[b]; it shall not be rebuilt again.
  footnotes:
  - marker: a
    text: Or 'completely for the LORD your God.' The Hebrew כָּלִיל can be taken adverbially ('wholly, completely') or with sacrificial force, indicating something entirely consumed for God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a mound forever' or 'an everlasting heap,' that is, a lasting ruin.
    reason: lexical_alternative
