translation:
  language: es
  text: Busqué a Yahvé[a], y él me respondió; me libró de todos mis temores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todos los que temía», «de todos mis terrores» o «de todas las cosas que me daban miedo».
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַשְׁתִּי
  english_pob_choice: I sought
  chosen_spanish: Busqué
  alternatives_spanish:
  - Busqué a
  - Busqué tras
  - Inquirí de
  lexicon: HALOT
  rationale: En este contexto, דרשׁ expresa buscar a Yahvé con dependencia y oración, no simplemente hacer una consulta. «Busqué» es natural en español y conserva el sentido relacional y devocional del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política de la POB en español mantiene el nombre divino como transliteración del Tetragrámaton. «Yahvé» preserva el nombre propio del pacto, en vez de sustituirlo por un título.
- source_word: וְעָנָנִי
  english_pob_choice: and he answered me
  chosen_spanish: y él me respondió
  alternatives_spanish:
  - y me respondió
  - y contestó mi oración
  - y me respondió él
  lexicon: HALOT
  rationale: ענה con sufijo de primera persona significa «me respondió». En español conviene explicitar el sujeto con «él» para evitar ambigüedad y mantener claro que se refiere a Yahvé.
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todas
  - de entre todos
  - de cada uno de
  lexicon: HALOT
  rationale: La preposición מן con כל marca una liberación total. «De todos» transmite bien la amplitud del alcance en español sin sobreexplicar.
- source_word: מְגוּרוֹתַי
  english_pob_choice: my fears
  chosen_spanish: mis temores
  alternatives_spanish:
  - mis miedos
  - mis terrores
  - las cosas que temía
  lexicon: HALOT
  rationale: En este verso, מְגוּרוֹת apunta a aquello que inspira pavor o temor. «Temores» mantiene un registro digno y suficientemente amplio, cercano al sentido del hebreo y al inglés auditado.
- source_word: הִצִּילָנִי
  english_pob_choice: he delivered me
  chosen_spanish: me libró
  alternatives_spanish:
  - me rescató
  - me salvó
  - me liberó
  lexicon: HALOT
  rationale: נצל en hiphil significa librar, arrebatar o rescatar. «Me libró» comunica bien la acción de sacar de peligro sin cargar el verbo con un matiz exclusivamente soteriológico.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La traducción en español debe conservar el nombre propio divino, no sustituirlo por un título, para mantener la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la liberación en מִכָּל מְגוּרוֹתַי
  english_pob_reading: from all my fears
  chosen_spanish_reading: de todos mis temores
  alternative_spanish_readings:
  - de todos mis miedos
  - de todos mis terrores
  - de las cosas que temía
  rationale: El hebreo admite una gama de matices que va desde temores internos hasta objetos de pavor. «Temores» conserva esa amplitud sin forzar el verso hacia una intensidad mayor de la que el contexto exige.
  doctrine_reference: Lexical theology of מְגוּרוֹת in Psalm 34:5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y concuerda con el audit trail en inglés: דרשׁ como buscar a Yahvé, יְהוָה como Yahvé, ענה como responder, and נצל como librar. No se introdujeron cambios textuales ni variantes manuscritas; la única nota responde a la amplitud semántica de מְגוּרוֹתַי, tal como refleja la nota inglesa.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «libró» frente a «salvó» para evitar una lectura demasiado doctrinalmente especializada en este verso.
  - «Temores» mantiene un registro natural en español y conserva la posibilidad de equivaler a miedos o terrores según el contexto.
