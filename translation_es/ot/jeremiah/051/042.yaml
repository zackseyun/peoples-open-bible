revisions:
- from: El mar[a] ha subido contra Babilonia; ella está cubierta de la multitud[b] de sus olas.
  to: El mar[a] ha subido sobre Babilonia; ella está cubierta por la multitud[b] de sus olas.
  rationale: 'Se ajusta la redacción para un español más natural y fiel a la imagen profética: «ha subido sobre Babilonia» encaja mejor con el mar que irrumpe y cubre, y «cubierta por la multitud de sus olas» mejora la sintaxis. También se corrige la nota léxica para que la alternativa sea una frase española viable y refleje con más precisión la ambigüedad de הֲמוֹן.'
  reviewer_model: gpt-5.4
