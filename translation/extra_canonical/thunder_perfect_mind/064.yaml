  from: For be wise—and be a fool;
  to: For she is wise, and she is a small one;
  rationale: The Coptic `ⲥⲥⲁⲃⲉ` is the 3rd person feminine singular prefix `ⲥ-` with
    the adjective `ⲥⲁⲃⲉ` ("she is wise"), and `ⲟⲩⲕⲟⲩⲉⲓ ⲧⲉ` uses the 3rd person feminine
    singular copula `ⲧⲉ` ("she is a small one"). The draft incorrectly translates
    these as imperatives ("be wise", "be a fool").
- timestamp: '2026-04-22T23:01:49Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_coptic_gnostic/extra_canonical/thunder_perfect_mind/001/064.job-73467.json
  category: mistranslation
  tier: 2
  from: 'and do not take away greatness in parts;

    in ignorance, until they come to know ignorance—

    for they know ignorance.'
  to: 'nor turn away great things in parts

    from smallness—

    for they know smallness.'
  rationale: '`ⲉⲃⲟⲗ ϩⲛ` pairs with `ⲧⲥⲧⲟ` to mean "turn away from", so `ⲉⲃⲟⲗ ϩⲛ ⲧⲙⲛⲧⲕⲟⲩⲉⲓ`
    is "from smallness". `ⲙⲛⲧⲕⲟⲩⲉⲓ` means "smallness", contrasting directly with `ϩⲉⲛⲙⲛⲧⲛⲟϭ`
    ("great things") and connecting to 1:65; translating it as "ignorance" breaks
    this link. Finally, `ⲉϣⲁⲩ-` is the circumstantial aorist ("for they know"), not
    the limitative `ϣⲁⲛⲧ-` ("until"), and the draft erroneously double-translates
    the final clause.'
