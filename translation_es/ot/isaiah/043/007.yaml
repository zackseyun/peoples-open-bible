translation:
  language: es
  text: Todo el que es llamado por mi nombre[a], a quien creé para mi gloria, a quien formé, sí, a quien hice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Todo el que es llamado por mi nombre, y para mi gloria lo creé; lo formé; sí, lo hice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: everyone
  chosen_spanish: Todo el que
  alternatives_spanish:
  - todos los que
  - cada uno que
  lexicon: HALOT
  rationale: El hebreo funciona aquí como un colectivo distributivo referido al pueblo reunido por Dios; en español, «todo el que» comunica con naturalidad esa distribución sin perder el referente personal.
- source_word: הַנִּקְרָא
  english_pob_choice: is called
  chosen_spanish: es llamado
  alternatives_spanish:
  - es nombrado
  - es invocado
  lexicon: HALOT
  rationale: El nifal de קרא expresa pasividad de «ser llamado/nombrado». «Es llamado» conserva la voz pasiva y encaja bien con la expresión siguiente «por mi nombre».
- source_word: בִשְׁמִי
  english_pob_choice: by my name
  chosen_spanish: por mi nombre
  alternatives_spanish:
  - en mi nombre
  - con mi nombre
  lexicon: HALOT
  rationale: La construcción hebrea de pertenencia e identificación se vierte naturalmente en español como «por mi nombre», manteniendo la idea de ser designado como perteneciente a Yahvé.
- source_word: וְלִכְבוֹדִי
  english_pob_choice: for my glory
  chosen_spanish: para mi gloria
  alternatives_spanish:
  - para mi honor
  - para mi esplendor
  lexicon: HALOT
  rationale: כבוד conserva su fuerza teológica como «gloria». «Para mi gloria» expresa bien el propósito de la creación en este contexto.
- source_word: בְּרָאתִיו
  english_pob_choice: I created
  chosen_spanish: he creado
  alternatives_spanish:
  - lo creé
  - lo he creado
  lexicon: HALOT
  rationale: El perfecto hebreo puede leerse con valor de acción pasada; en español, «he creado» mantiene cercanía verbal con la serie acumulativa y suena natural sin forzar el tiempo simple.
- source_word: יְצַרְתִּיו
  english_pob_choice: I formed
  chosen_spanish: he formado
  alternatives_spanish:
  - lo formé
  - lo he moldeado
  lexicon: HALOT
  rationale: יצר conserva la imagen de dar forma. «He formado» preserva la progresión distinta de «crear» y «hacer».
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí,
  alternatives_spanish:
  - también
  - incluso
  - ciertamente
  lexicon: HALOT
  rationale: Aquí אַף intensifica la cláusula final. «Sí,» refleja la fuerza enfática y marca el clímax sin añadir una interpretación excesiva.
- source_word: עֲשִׂיתִיו
  english_pob_choice: I made
  chosen_spanish: he hecho
  alternatives_spanish:
  - lo hice
  - lo he hecho
  lexicon: HALOT
  rationale: עשה es amplio («hacer/realizar»). «He hecho» preserva el cierre triple de los verbos divinos con un español fluido y digno.
theological_decisions:
- issue: Referente colectivo singular con valor representativo
  english_pob_reading: Render the verse with a plural-inclusive head term ('everyone') followed by relative clauses with singular English pronouns absorbed into 'whom'.
  chosen_spanish_reading: Usar un singular distributivo («todo el que») seguido de relativas con valor personal («a quien»), evitando un masculino innecesario.
  alternative_spanish_readings:
  - todos los que
  - cada uno que
  rationale: El hebreo usa una forma colectiva singular con sufijos singulares; la traducción debe conservar esa relación sin imponer lectura masculina ni sonar artificial en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §6
- issue: Relación del propósito con la acción creadora
  english_pob_reading: 'Attach ''for my glory'' to God''s act of creation: ''whom I created for my glory.'''
  chosen_spanish_reading: Vincular «para mi gloria» con «he creado».
  alternative_spanish_readings:
  - a quien para mi gloria he creado
  - y para mi gloria lo he creado
  rationale: El hebreo permite esta asociación de propósito; en español la colocación elegida comunica de manera clara que la creación tuvo como fin la gloria de Dios, sin perder la secuencia verbal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El inglés POB fue revisado para eliminar un «and» innecesario y conservar una secuencia más fluida. La propuesta española sigue esa misma preferencia por una serie compacta de relativas y verbos, sin añadir conectores que no están requeridos por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando el contexto menciona el nombre divino; aquí el verso no lo nombra explícitamente, pero el posesivo «mi» conserva la primera persona divina del original.
  - 'Se preserva la progresión verbal hebrea: crear / formar / hacer, evitando colapsar los tres verbos en uno solo.'
  - Se evita «Cristo» u otra terminología no pertinente; no hay lenguaje mesiánico en este versículo.
  - «Gloria» se mantiene como equivalente estable de כבוד, no «honor» o «esplendor», por la carga teológica del pasaje.
