lexical_decisions:
- source_word: לְ/שִׁמְעוֹן
  english_pob_choice: for Simeon
  chosen_spanish: para Simeón
  alternatives_spanish:
  - de Simeón
  - para la tribu de Simeón
  lexicon: HALOT
  rationale: El לְ prefijado aquí marca afiliación o asignación dentro de la lista de jefes censales. En español, «para Simeón» conserva la función relacional y la estructura breve del hebreo y del inglés POB, sin sobreexplicar «la tribu de» si el contexto ya lo aporta.
- source_word: שְׁלֻמִיאֵל
  english_pob_choice: Shelumiel
  chosen_spanish: Shelumiel
  alternatives_spanish:
  - Selumiel
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. Se mantiene la forma de nombre bíblico establecida; «Shelumiel» respeta la convención inglesa auditada y resulta reconocible en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  - el hijo de
  lexicon: HALOT
  rationale: En esta fórmula genealógica, בֶּן se rinde naturalmente como «hijo de». «Descendiente de» sería posible en sentido amplio, pero aquí la relación inmediata de filiación es la lectura más directa y fiel.
- source_word: צוּרִישַׁדָּי
  english_pob_choice: Zurishaddai
  chosen_spanish: Zurisaddai
  alternatives_spanish:
  - Zurisadai
  - Tsurisaddai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a la ortografía española con «Zuri-» para mantener el valor consonántico inicial y una forma legible para lectores hispanos, sin traducir el nombre.
