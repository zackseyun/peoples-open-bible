review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la línea de la POB inglesa: los recursos del villano son malos, él trama planes para arruinar a los humildes por medio de palabras falsas, incluso cuando el necesitado habla justicia. Sin embargo, algunos giros españoles no preservan del todo el matiz ni la legibilidad: ''dispositivos'' suena demasiado tecnológico para כֵלַי/כֵּלָיו en este contexto metafórico, y ''hombre malo'' es más débil y menos idiomático que el referente contextual esperado. La cláusula final ''habla justicia'' es defendible por cercanía formal, pero en español queda algo dura; aun así puede mantenerse si el resto se afina y una nota explica la tensión semántica.'
  spanish_quality_summary: La redacción es generalmente clara, pero 'dispositivos del hombre malo' suena poco natural en español bíblico actual. 'Los recursos del malvado' o 'los medios del malvado' leen mejor y conservan el sentido metafórico. 'Menesteroso' es comprensible pero más marcado y menos natural para un español eclesial amplio; 'necesitado' funciona mejor. La puntuación y el flujo general son buenos.
  glossary_alignment: 'No hay conflicto con terminología doctrinal principal. Las decisiones sobre ''justicia'', ''humildes'' y el singular representativo están alineadas. La principal desviación es estilístico-lexical: ''dispositivos'' no encaja bien con la racionalidad documentada para ''devices'' en español; ''recursos'' o ''medios'' representa mejor el valor metafórico de כלי aquí.'
  issues:
  - severity: medium
    issue: '''dispositivos'' para כֵלַי/כֵּלָיו'
    rationale: Aunque intenta reflejar 'devices', en español actual suena técnico/tecnológico y no transmite bien 'implementos/métodos/recursos' en sentido metafórico. 'Recursos' o 'medios' preserva mejor el campo semántico y la legibilidad.
  - severity: medium
    issue: '''del hombre malo'' para el referente implícito'
    rationale: Es comprensible, pero resulta débil y poco idiomático frente al contraste contextual. 'Del malvado' expresa mejor el sujeto moral del pasaje sin sobreinterpretar.
  - severity: low
    issue: '''el menesteroso'''
    rationale: Es correcto pero más arcaizante y menos natural para lectura amplia. 'El necesitado' mantiene el singular representativo y es más claro.
  - severity: low
    issue: Falta una nota española para la cláusula final comparable a la nota inglesa c
    rationale: La POB inglesa conserva explícitamente la alternativa 'and when the poor man speaks justice/judgment' y explica el sentido. Dado que el español 'habla justicia' puede sonar ambiguo, conviene añadir una nota allí en vez de usar la nota actual solo para 'palabras engañosas'.
