translation:
  language: es
  text: 'Entonces los hijos de los profetas que estaban en Betel salieron a Eliseo y le dijeron[a]: «¿Sabes que hoy Yahvé está tomando a tu maestro de sobre tu cabeza?» Y él respondió: «Yo también lo sé; callen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de encima de ti»; el hebreo dice literalmente «de sobre tu cabeza», un modismo para la remoción de quien está en autoridad sobre otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  english_pob_choice: the sons of the prophets
  chosen_spanish: los hijos de los profetas
  alternatives_spanish:
  - la comunidad de los profetas
  - los discípulos de los profetas
  lexicon: HALOT
  rationale: Conservo la relación idiomática de parentesco para reflejar la expresión hebrea sin suavizarla a una paráfrasis interpretativa. 'Hijos' mantiene la forma visible del hebreo y es entendible en español bíblico contemporáneo.
- source_word: אֲשֶׁר בֵּית אֵל
  english_pob_choice: who were at Bethel
  chosen_spanish: que estaban en Betel
  alternatives_spanish:
  - que estaban en Betén
  - que eran de Betel
  lexicon: HALOT
  rationale: La frase identifica al grupo por ubicación. 'Estaban en Betel' suena natural y preserva el valor locativo del hebreo mejor que una construcción posesiva.
- source_word: הֲיָדַעְתָּ
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes?
  alternatives_spanish:
  - ¿Has sabido?
  - ¿Te das cuenta?
  lexicon: HALOT
  rationale: El interrogativo hebreo con perfecto funciona aquí como pregunta directa e idiomática. '¿Sabes?' comunica la vivacidad del diálogo sin forzar una perífrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigo la convención del proyecto para el nombre divino, manteniendo el Tetragrámaton como 'Yahvé' y no sustituyéndolo por un título.
- source_word: לֹקֵחַ
  english_pob_choice: is taking
  chosen_spanish: está tomando
  alternatives_spanish:
  - va a tomar
  - está por tomar
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. 'Está tomando' conserva esa inmediatez narrativa mejor que un futuro simple.
- source_word: אֲדֹנֶיךָ
  english_pob_choice: your master
  chosen_spanish: a tu señor
  alternatives_spanish:
  - a tu amo
  - a tu maestro
  lexicon: HALOT
  rationale: Aquí se refiere a la relación de superioridad humana entre Eliseo y Elías. 'Señor' reproduce la dignidad del término sin introducir la ambigüedad de un uso divino; el contexto evita confundirlo con Yahvé.
- source_word: מֵעַל רֹאשֶׁךָ
  english_pob_choice: from over your head
  chosen_spanish: de sobre tu cabeza
  alternatives_spanish:
  - de encima de ti
  - de estar sobre ti
  lexicon: HALOT
  rationale: Mantengo la imagen corporal del hebreo, que en contexto funciona como idiomismo para la retirada de quien está por encima en autoridad. 'De sobre tu cabeza' conserva la metáfora visible.
- source_word: גַּם אֲנִי יָדַעְתִּי
  english_pob_choice: I also know
  chosen_spanish: Yo también lo sé
  alternatives_spanish:
  - También yo lo sé
  - Sí, lo sé
  lexicon: HALOT
  rationale: La secuencia enfatiza coincidencia de conocimiento. 'Yo también lo sé' refleja con precisión גַּם אֲנִי y su tono de respuesta firme.
- source_word: הֶחֱשׁוּ
  english_pob_choice: be silent
  chosen_spanish: callen
  alternatives_spanish:
  - guarden silencio
  - quédense callados
  lexicon: HALOT
  rationale: Es un imperativo plural dirigido al grupo. 'Callen' es breve, directo y conserva la fuerza del mandato mejor que una formulación más explicativa.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto pide preservarlo en español. 'Yahvé' es la forma coherente con la transliteración adoptada y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión de autoridad en מֵעַל רֹאשֶׁךָ
  english_pob_reading: from over your head
  chosen_spanish_reading: de sobre tu cabeza
  alternative_spanish_readings:
  - de encima de ti
  - de estar sobre ti
  rationale: La frase es idiomática y alude a la remoción de quien está por encima en autoridad. Mantener la imagen literal permite que el lector perciba la tensión semántica sin perder inteligibilidad.
  doctrine_reference: Lexical/theological idiom in the narrative context
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al incluir [a] en el verbo de habla, manteniendo el sentido del hebreo y la lectura de POB sobre el modismo de 'sobre tu cabeza'. También se preservó la precisión de גַּם אֲנִי con 'Yo también lo sé'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'hijos de los profetas' para reflejar el hebreo y la auditabilidad del término.
  - Se mantiene el imperativo plural 'callen' para הֶחֱשׁוּ.
  - La nota [a] queda anclada y explica la alternativa idiomática sin duplicar marcadores.
