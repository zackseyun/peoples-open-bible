theological_decisions:
- issue: Interpretation of Levi's visionary assessment of his sons
  chosen_reading: The text is rendered as a straightforward report of prophetic insight into the relative standing of Gersam and Kohath, without expanding it into later priestly hierarchy beyond what the Greek states.
  alternative_readings:
  - A more explicit allusion to later Levitical rank and cultic precedence
  - A purely symbolic family omen without priestly implications
  rationale: The Greek gives brief visionary notices tied to naming and status. The translation preserves the ambiguity and does not resolve it into a fuller historical or theological scheme not explicit in the chapter.
