theological_decisions:
- issue: ἐλέγξει를 「책망하다」로 옮김
  chosen_reading: 책망하다
  alternative_readings:
  - 깨우치다
  - 드러내다
  - 정죄하다
  rationale: ἐλέγχω는 단순 정죄가 아니라 죄를 드러내어 깨닫게 함을 포괄하지만, 한국 신약의 안정된 어휘인 「책망하다」가 가장 자연스럽다. 각주에 깨우침의 차원을 보존.
