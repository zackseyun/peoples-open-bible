translation:
  language: es
  text: 'Entonces David dijo a Joab y a los jefes del pueblo: «Vayan, cuenten a Israel desde Beerseba hasta Dan[a], y tráiganmelo, para que yo sepa su número».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «desde Beerseba hasta Dan» significa de un extremo de Israel al otro.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia de manera natural en español sin perder el valor narrativo.
- source_word: שָׂרֵי הָעָם
  english_pob_choice: the commanders of the people
  chosen_spanish: los jefes del pueblo
  alternatives_spanish:
  - los comandantes del pueblo
  - los líderes del pueblo
  - los oficiales del pueblo
  lexicon: HALOT
  rationale: En este contexto administrativo y ligado a Joab, «jefes» comunica autoridad y evita forzar una lectura militar demasiado específica donde el hebreo permite un rango de funciones de mando/dirigencia.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ya
  - Procedan
  lexicon: HALOT
  rationale: El imperativo plural de הלך se traduce de forma directa y natural con «Vayan».
- source_word: סִפְרוּ
  english_pob_choice: count
  chosen_spanish: cuenten
  alternatives_spanish:
  - hagan un censo de
  - numeren
  lexicon: HALOT
  rationale: El verbo ספר aquí significa contar/enumerar; «cuenten» es la opción más directa y fluida, sin añadir la explicación interpretativa de «hacer un censo».
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - al pueblo de Israel
  - a la nación de Israel
  lexicon: HALOT
  rationale: Se mantiene el objeto directo simple del hebreo. En español, la preposición personal hace natural «a Israel» sin expandir el sustantivo.
- source_word: מִבְּאֵר שֶׁבַע וְעַד דָּן
  english_pob_choice: from Beersheba to Dan
  chosen_spanish: desde Beerseba hasta Dan
  alternatives_spanish:
  - de Beerseba a Dan
  - desde Beerseba hasta Dan
  lexicon: HALOT
  rationale: Se conserva el modismo geográfico tradicional que señala la extensión completa del territorio, con formas españolas usuales de los topónimos.
- source_word: וְהָבִיאוּ אֵלַי
  english_pob_choice: and bring it to me
  chosen_spanish: y tráiganmelo
  alternatives_spanish:
  - y tráiganlo a mí
  - y llévenlo a mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y tráigan[lo] a mí», con objeto implícito. «Tráiganmelo» reproduce ese valor sin añadir «total» ni explicar el referente más allá del contexto.
- source_word: וְאֵדְעָה
  english_pob_choice: so that I may know
  chosen_spanish: para que yo sepa
  alternatives_spanish:
  - para que pueda saber
  - y así sabré
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad. «Para que yo sepa» comunica bien el propósito sin sobrerrepresentar el matiz voluntitivo.
- source_word: אֶת מִסְפָּרָם
  english_pob_choice: their number
  chosen_spanish: su número
  alternatives_spanish:
  - el número de ellos
  - la cantidad de ellos
  lexicon: HALOT
  rationale: La expresión nominal finaliza la idea del conteo. «Su número» es una equivalencia natural y fiel al hebreo.
theological_decisions:
- issue: Alcance idiomático de «de Beerseba hasta Dan»
  english_pob_reading: 'Hebrew idiom: ''from Beersheba to Dan'' means from one end of Israel to the other.'
  chosen_spanish_reading: Se conserva el modismo geográfico sin explicitarlo en el versículo; el sentido de totalidad queda implícito.
  alternative_spanish_readings:
  - desde un extremo de Israel hasta el otro
  - desde Beerseba hasta Dan, es decir, por toda Israel
  rationale: El hebreo usa un modismo reconocible cuyo valor totalizante no necesita ser paraphraseado dentro del texto principal. Mantener la forma preserva la textura original y deja la explicación para nota.
  doctrine_reference: Nota cultural/idiomática, no doctrinal
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail en cuanto a la objetividad del mandato («bring it to me»), evitando añadir elementos no presentes en el hebreo. También conserva la lectura idiomática de «from Beersheba to Dan» sin explicitarla en el cuerpo del versículo, como hace la POB inglesa con nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - «Jefes del pueblo» traduce שָׂרֵי הָעָם con una opción amplia y sobria, coherente con el contexto administrativo-militar.
  - «Tráiganmelo» refleja el objeto implícito del hebreo sin introducir «total» u otra explicitación adicional.
  - Se conserva la capitalización y puntuación españolas para discurso directo publicado.
