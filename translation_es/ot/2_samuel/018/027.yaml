revisions:
- from: 'Entonces el centinela dijo[a]: «Veo la carrera del primero, como la carrera de Ahimaaz hijo de Sadoc». Y el rey dijo: «Este es un buen hombre[b], y viene con buena noticia».'
  to: 'Entonces el centinela dijo[a]: «Veo que la carrera del primero es como la carrera de Ahimaaz hijo de Sadoc». Y el rey dijo: «Es un buen hombre[b], y viene con buenas noticias».'
  rationale: 'La revisión realinea el texto principal y la nota [a] con la estructura hebrea y con la auditoría inglesa: el cuerpo ahora expresa explícitamente la comparación (''es como''), y la nota conserva la alternativa más literal sin ''Veo que''. Además, se mejora la naturalidad del español con ''buenas noticias'' y una formulación menos rígida de la valoración del rey.'
