translation:
  language: es
  text: Y Judith entonaba esta acción de gracias[a] en todo Israel, y todo el pueblo respondía con esta alabanza[b]; y Judith dijo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confesión» o «alabanza» para ἐξομολόγησιν; el término griego puede denotar reconocimiento público, acción de gracias o alabanza en uso bíblico.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego sugiere una respuesta sonora o antifonal; también puede traducirse «hacía eco de esta alabanza» o «respondía con esta alabanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆρχεν
  english_pob_choice: sang forth / kept bringing forth
  chosen_spanish: entonaba
  alternatives_spanish:
  - cantaba
  - proclamaba
  - hacía resonar
  lexicon: LSJ
  rationale: El imperfecto sugiere una acción en curso o repetida. En este contexto litúrgico, «entonaba» conserva el carácter de canto/himno sin perder la idea de una proclamación pública continua.
- source_word: ἐξομολόγησιν
  english_pob_choice: thanksgiving / confession
  chosen_spanish: confesión
  alternatives_spanish:
  - acción de gracias
  - alabanza
  - reconocimiento público
  lexicon: LSJ
  rationale: En griego bíblico el término puede abarcar confesión, reconocimiento y agradecimiento. Se mantiene «confesión» para no borrar la distinción léxica con αἴνεσιν («alabanza») y preservar la tensión semántica documentada; en este contexto puede entenderse como confesión pública de Dios.
- source_word: ἐν παντὶ Ἰσραήλ
  english_pob_choice: in all Israel
  chosen_spanish: en todo Israel
  alternatives_spanish:
  - por todo Israel
  - entre todo Israel
  - en todo el Israel
  lexicon: LSJ
  rationale: Es una correspondencia directa y natural en español, adecuada para el alcance distributivo/comunitario del sintagma.
- source_word: ὑπεφώνει
  english_pob_choice: echoed
  chosen_spanish: respondía
  alternatives_spanish:
  - repetía en respuesta
  - contestaba
  - resonaba en respuesta
  lexicon: LSJ
  rationale: El verbo indica respuesta sonora o antífona. «Respondía» conserva la idea de réplica coral sin introducir un calco extraño; el contexto musical queda reforzado por la expresión completa «respondía con esta alabanza».
- source_word: λαὸς
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - asamblea
  - comunidad
  lexicon: LSJ
  rationale: «Pueblo» es la forma más natural y solemne en este contexto narrativo y colectivo.
- source_word: αἴνεσιν
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - elogio
  - canto de alabanza
  - bendición
  lexicon: LSJ
  rationale: «Alabanza» es el equivalente más directo y natural para este término de respuesta cultual.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: LSJ
  rationale: Introducción narrativa estándar; «dijo» es la opción más idiomática y sobria.
theological_decisions:
- issue: Mantener la distinción entre ἐξομολόγησις y αἴνεσις
  english_pob_reading: 'Maintain a distinction: ''confession'' ... ''praise'''
  chosen_spanish_reading: 'Mantener una distinción: «confesión» ... «alabanza»'
  alternative_spanish_readings:
  - «acción de gracias» ... «alabanza»
  - «alabanza» ... «alabanza»
  rationale: El griego usa dos sustantivos diferentes en cláusulas paralelas. En español se preserva la distinción para no aplanar el ritmo y el contraste del texto, respetando la evidencia auditada y la decisión de no resolver la tensión léxica prematuramente.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del contexto inglés, que prefirió una formulación más natural y cultual para ἐξομολόγησις. Sin embargo, en español se retuvo «confesión» en el texto principal para preservar la distinción léxica con αἴνεσιν y dejar visible la ambigüedad documentada por el aparato.
  spanish_consistency_notes:
  - Se evitó el calco mecánico de «sang forth»; «entonaba» suena natural en español y conserva el registro litúrgico.
  - 'Se mantuvo el orden narrativo del griego: acción de Judith, respuesta del pueblo, introducción de su discurso.'
  - «En todo Israel» sigue el alcance distributivo sin sobreinterpretar geografía o institución.
  - Se usó «alabanza» para αἴνεσιν y no «acción de gracias», a fin de no confundirlo con ἐξομολόγησιν.
  - La puntuación con punto y coma refleja la coordinación de las dos cláusulas principales antes de la cita directa.
