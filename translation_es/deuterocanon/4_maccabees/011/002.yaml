  source_alignment_summary: 'El borrador capta correctamente el sentido general del griego: una negativa enfática a rehuir el sufrimiento, con vocativo confrontativo («tirano») y el motivo ético («por causa de la virtud»). Sin embargo, «No estoy a punto de» no refleja bien el valor de Οὐ μέλλω en español natural, porque sugiere inminencia negativa más que resolución. Además, «retroceder ante el tormento» es entendible, pero «echarme atrás ante la tortura» expresa mejor la combinación de παραιτεῖσθαι + βασανισμός en este contexto martirial.'
  spanish_quality_summary: 'El español es mayormente claro, pero «No estoy a punto de retroceder» suena poco idiomático en español bíblico-natural. La frase mejoraría con una formulación más directa y fluida: «No voy a echarme atrás». También conviene usar «tortura» en vez de «tormento» por mayor precisión léxica respecto de βασανισμός y por coherencia con la justificación del POB inglés.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Virtud» para ἀρετή y «tirano» para τύραννε están bien alineados con el expediente. La revisión propuesta ajusta sobre todo naturalidad y precisión léxica: Οὐ μέλλω → «No voy a», παραιτεῖσθαι → «echarme atrás», βασανισμός → «tortura».'
  issues:
  - severity: medium
    issue: «No estoy a punto de» es una reproducción demasiado literal de «I am not about to» y no suena natural en español.
    rationale: Aunque intenta conservar la inmediatez de μέλλω, en español esta locución suele indicar proximidad de una acción más que resolución firme. «No voy a» comunica mejor la negativa decidida sin perder fuerza.
  - severity: medium
    issue: «Tormento» es menos preciso que «tortura» para βασανισμός en este contexto.
    rationale: El expediente inglés eligió «torture» explícitamente por el contexto martirial. «Tormento» puede sonar más amplio o psicológico, mientras que «tortura» refleja mejor el sufrimiento infligido.
  - severity: low
    issue: «Retroceder» funciona, pero «echarme atrás» refleja mejor la fuerza contextual de παραιτεῖσθαι.
    rationale: La nota léxica inglesa destaca la idea de no rehuir o no acobardarse ante el sufrimiento, no simplemente moverse hacia atrás. «Echarme atrás» es más idiomático y semánticamente cercano.
  revised_spanish_text: No voy a echarme atrás[a], tirano, ante la tortura por causa de la virtud.
  revised_footnotes:
