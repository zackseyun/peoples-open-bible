lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  chosen: I am
  alternatives:
  - It is I
  - I myself am
  lexicon: Coptic copular construction
  rationale: Standard Sahidic first-person predication; preserving repeated “I am”
    cadence is essential to the poem’s voice.
- source_word: ⲡⲡⲱⲧⲣ
  chosen: inside
  alternatives:
  - interior
  - the first (uncertain)
  lexicon: Crum s.v. pōtr
  rationale: pōtr commonly denotes the interior/inside; paired with an outward term
    in the next cola supports “inside” rather than “first.”
- source_word: ⲡⲕⲱⲗⲉⲃⲟⲗ
  chosen: outside
  alternatives:
  - far-away
  - outer
  lexicon: Crum s.v. kōl, kōlebōl
  rationale: Compound with ⲉⲃⲟⲗ ‘out(ward)’ yields “the outside / far-away (the outward).”
    Given the antithesis with ‘inside,’ “outside” is the natural choice.
- source_word: ⲧⲙⲟⲛⲏ
  chosen: dwelling
  alternatives:
  - abode
  - abiding
  lexicon: Loan from Greek μονή (monē)
  rationale: μονή means ‘dwelling/abode, staying’; “dwelling” keeps the concrete,
    locative sense, fitting the spatial imagery (inside/outside).
- source_word: ⲡⲕⲱⲗ
  chosen: outside
  alternatives:
  - the far (distance)
  - the outer
  lexicon: Crum s.v. kōl
  rationale: Likely the simplex of the previous compound, repeating the ‘outside/outer/far’
    idea; retained to preserve parallelism and refrain-like repetition. Sense is somewhat
    uncertain but best kept consistent.
- source_word: ⲡⲉⲧⲛⲁⲩ
  chosen: the one who sees
  alternatives:
  - the seer
  lexicon: Sahidic relative participle (pe- + et- + nao ‘to see’)
  rationale: Standard relative form; “the one who sees” preserves verbal nuance over
    abstract “seer.”
- source_word: ⲉⲧⲛⲏⲟⲩ
  chosen: what is visible
  alternatives:
  - the visible (one)
  - the manifest
  lexicon: Crum s.v. nēou (visible)
  rationale: Attributive relative; translating concretely as “what is visible” matches
    the direct object of ‘sees.’
- source_word: ⲉϩⲣⲁⲓ
  chosen: here
  alternatives:
  - below
  - here below
  lexicon: Crum s.v. eḥrai
  rationale: Commonly ‘below, here (in the lower)’; “here” with a note of spatial
    immediacy pairs with ‘before (the face).’
- source_word: ⲉⲧⲟⲟⲧ
  chosen: before
  alternatives:
  - in front (of)
  - in the presence (of)
  lexicon: Crum s.v. etoot ‘before (the face of)’
  rationale: Locative/prepositional; “before” is concise and idiomatic while preserving
    spatial imagery.
- source_word: ⲫⲱⲧ
  chosen: light
  alternatives:
  - the light
  lexicon: Loan from Gk. φῶς (phōs)
  rationale: Standard, widely attested loan; definite sense carried by the copular
    construction contextually.
- source_word: ⲙⲡⲕⲱ ⲉⲃⲟⲗ
  chosen: has not gone out
  alternatives:
  - the All has gone forth (if read ⲙⲡⲧⲟⲟⲩ ⲉⲃⲟⲗ)
  - has not come forth
  lexicon: Neg. perfect m-p- + verbal complex; cf. Crum s.v. toou ‘the All’
  rationale: As printed, reads like negated perfect with ‘go/come out’; however, many
    witnesses in Thunder have “the All has gone out (from me),” suggesting a possible
    misread of ⲕ for ⲧ and/or missing ⲟⲟ. Uncertain; rendered conservatively and footnoted.
parallelism_check: The opening bicola form a clear antithesis (inside // outside).
  This spatial paradox is sustained by “dwelling” and a likely refrain-like repetition
  of “outside,” then moves to a perceptual axis (“the one who sees” // “what is visible”
  // “here before”), and culminates in a light/outgoing motif. The contradictory pair
  is preserved without smoothing, and the repeated “I am” cadence is kept.
voice_check: First-person, authoritative/enigmatic “I am” voice is maintained throughout,
  including the emphatic “I am I.” Repetitions are preserved rather than consolidated
  to retain the poem’s incantatory rhythm.
alignment_risk_note: 'Overall alignment confidence is only medium, and the consult
  English for segment 8 speaks of ‘those near/far’ knowing/ignoring, which does not
  directly match this OCR block’s lexicon (inside/outside, light). This suggests either
  segment misalignment or OCR noise. Specific risks: (1) ⲡⲡⲱⲧⲣ is taken as ‘inside’
  by parallelism, but the form is unusual and could be misread; (2) ⲙⲡⲕⲱ ⲉⲃⲟⲗ likely
  reflects a mis-OCR of ⲙⲡⲧⲟⲟⲩ ⲉⲃⲟⲗ (‘the All has gone forth’). I avoid forcing the
  consult’s sense and note the uncertainty.'
