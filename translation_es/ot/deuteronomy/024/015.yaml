review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida el sentido del hebreo: pago el mismo día, antes del ocaso, por la pobreza y dependencia vital del jornalero, para evitar su clamor a Yahvé y la consecuencia de pecado. Sin embargo, introduce dos desajustes importantes: (1) la última cláusula invierte el sentido al decir ''y no haya pecado en ti'', cuando el hebreo afirma la consecuencia (''y haya/será pecado en ti''); (2) ''para que no clame'' debilita el matiz preventivo de advertencia, mejor expresado como ''no sea que clame'' o ''para que no llegue a clamar''. Además, ''sobre ello'' resulta poco natural en español para el referente salario.'
  spanish_quality_summary: 'El español es comprensible y bastante digno, pero hay formulaciones algo rígidas o poco idiomáticas: ''el sol no se pondrá sobre ello'' suena forzado; ''porque él es pobre'' puede simplificarse; y el anclaje de la nota [a] está mal ubicado, pues la nota explica la cláusula de dependencia vital, no ''el mismo día''. La corrección requerida es pequeña pero necesaria para fidelidad y legibilidad.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'salario', 'pobre' y 'pecado'. No hay conflicto con el glosario principal. La decisión para el modismo 'de ello depende su vida' es adecuada, pero la nota debe anclarse a esa frase, no a 'el mismo día'.
  issues:
  - severity: high
    issue: La última cláusula dice 'y no haya pecado en ti'
    rationale: 'El hebreo וְהָיָה בְךָ חֵטְא expresa consecuencia positiva: ''y habrá/será pecado en ti'' o ''y habrá pecado en ti'', no su negación. La redacción actual invierte el sentido del texto.'
  - severity: medium
    issue: La construcción 'para que no clame contra ti a Yahvé' no refleja bien el valor de advertencia
    rationale: וְלֹא יִקְרָא aquí funciona como consecuencia a evitar ('no sea que clame', 'lest he cry out'). 'Para que no' puede sonar a propósito buscado más que a advertencia legal.
  - severity: medium
    issue: La nota [a] está anclada a la frase equivocada
    rationale: La nota explica el modismo וְאֵלָיו הוּא נֹשֵׂא אֶת נַפְשׁוֹ, correspondiente a 'de ello depende su vida', no 'el mismo día'.
  - severity: low
    issue: '''Sobre ello'' suena poco natural en español'
    rationale: Aunque intenta conservar la imagen hebrea, en español bíblico natural 'antes que se ponga el sol' o 'el sol no se pondrá sobre su salario' comunica mejor el límite temporal sin torpeza.
  revised_spanish_text: Le darás su salario el mismo día, antes que se ponga el sol, porque es pobre y de ello depende su vida[a]; no sea que clame contra ti a Yahvé, y haya en ti pecado.
  revised_footnotes:
  - marker: a
    text: 'O: "depende de él para su vida". El hebreo dice literalmente: "a ello lleva/carga su vida", un modismo que expresa una dependencia urgente del salario.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la inversión de sentido en la cláusula final, se ajustó la advertencia a un español más fiel ('no sea que clame'), se reemplazó la formulación rígida sobre el ocaso por una expresión natural y exacta, y se movió la nota al modismo que realmente explica.
