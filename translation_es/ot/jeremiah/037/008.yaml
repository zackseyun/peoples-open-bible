translation:
  language: es
  text: Entonces los caldeos[a] volverán y pelearán contra esta ciudad, y la capturarán y la quemarán con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los babilonios’. El hebreo dice ‘los caldeos’, la designación histórica usada en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ
  english_pob_choice: Then ... will return
  chosen_spanish: Entonces ... volverán
  alternatives_spanish:
  - Y ... volverán
  - Pero ... volverán
  lexicon: HALOT
  rationale: שׁוּב en este contexto significa ‘volver/retornar’. ‘Entonces’ expresa bien la secuencia profética sin añadir contenido ajeno, de modo semejante al inglés POB.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo usa la designación histórica y étnica ‘caldeos’. En español, ‘caldeos’ conserva mejor la forma del original; ‘babilonios’ sería equivalente contextual, pero más interpretativo.
- source_word: וְנִלְחֲמוּ עַל
  english_pob_choice: and fight against
  chosen_spanish: y pelearán contra
  alternatives_spanish:
  - y guerrearán contra
  - y combatirán contra
  lexicon: HALOT
  rationale: נלחם con עַל expresa guerra o combate dirigido contra un objetivo. ‘Pelear contra’ es natural en español y mantiene el sentido militar directo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: HALOT
  rationale: זֹאת es demostrativo proximal; ‘esta ciudad’ refleja de manera directa la cercanía deíctica del hebreo.
- source_word: וּלְכָדֻהָ
  english_pob_choice: and they will capture it
  chosen_spanish: y la capturarán
  alternatives_spanish:
  - y la tomarán
  - y la apresarán
  lexicon: HALOT
  rationale: לכד se usa con ciudades fortificadas en el sentido de capturar o tomar por asalto. ‘Capturar’ conserva bien la fuerza militar del verbo.
- source_word: וּשְׂרָפֻהָ בָאֵשׁ
  english_pob_choice: and burn it with fire
  chosen_spanish: y la quemarán con fuego
  alternatives_spanish:
  - y la incendiarán
  - y la quemarán en fuego
  lexicon: HALOT
  rationale: 'La construcción hebrea es idiomática: ‘quemar en/ con fuego’. ‘Quemarán con fuego’ mantiene la imagen y el énfasis del hebreo sin volverla torpe en español.'
translation_notes:
  revision_awareness: El inglés POB eligió ‘Then the Chaldeans will return and fight against this city, and they will capture it and burn it with fire.’ sin cambios en la revisión más reciente; la presente versión española sigue ese mismo sentido, preservando la designación histórica ‘caldeos’ y la secuencia profética del enunciado.
  spanish_consistency_notes:
  - 'Se mantiene el futuro simple para la serie verbal profética: volverán, pelearán, capturarán, quemarán.'
  - Se conserva la referencia demostrativa ‘esta ciudad’ para reflejar el hebreo proximal.
  - Se evita ‘SEÑOR’ u otra terminología no pertinente, pues el verso no contiene el nombre divino.
  - La nota al pie se ancla en ‘caldeos’ porque ahí se da la alternativa lexical documentada.
