id: PHP.2.6
reference: Philippians 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς ἐν μορφῇ θεοῦ ὑπάρχων οὐχ ἁρπαγμὸν ἡγήσατο τὸ εἶναι ἴσα θεῷ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/006.yaml
  text: 'who, though he was in the form of God, did not consider equality with God something to be grasped,'
translation:
  language: ko
  text: 그분은 하나님의 형체[a]로 계셨지만[b], 하나님과 동등함[d]을 움켜쥘 것[c]으로 여기지 않으시고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님의 본질로」, 「본성상 하나님으로」. 헬라어 μορφή는 본질적 정체를 드러내는 「형체」를 가리키며, 단순한 외양인 「모양」과 구분된다. 본 번역은 후대 신학 용어로 환원하지 않고 본문의 어휘를 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님의 형체로 존재하시면서」. 분사 ὑπάρχων은 양보적 의미(「~이셨음에도」)로 읽을 수도, 단순한 상태(「~이시면서」)로 읽을 수도 있어 주석가들의 견해가 갈린다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「착취할 것」, 「강탈할 것」. 헬라어 ἁρπαγμός는 본문에서 가장 논쟁적인 어휘 중 하나이다. 다음 절의 자기 비움으로 이어지는 흐름은 「자기 이익을 위해 움켜쥐고 활용할 것」의 의미를 강하게 지지한다.
    reason: alternative_reading
  - marker: d
    text: 문자 그대로는 「하나님과 동등하게 되는 것」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν μορφῇ θεοῦ
  english_pob_choice: in the form of God
  chosen_korean: 하나님의 형체로
  alternatives_korean:
  - 하나님의 본질로
  - 본성상 하나님으로
  - 하나님의 모양으로
  lexicon: BDAG
  rationale: μορφή는 본질적 정체성을 드러내는 「형체」를 가리키며, 단순한 외양인 「모양」(σχῆμα)과 구분된다. DOCTRINE.md와 같이 후대 신학 어휘로 환원하지 않고, 본문의 어휘 「형체」를 보존하면서도 높은 기독론을 그대로 담는다. 「모양」은 7절의 σχῆμα에 배정하여 두 어휘의 의미 구분을 살린다.
- source_word: ὑπάρχων
  english_pob_choice: though he was
  chosen_korean: 계셨지만
  alternatives_korean:
  - 존재하시면서
  - 계시면서
  - 계셨음에도
  lexicon: BDAG
  rationale: 양보적 의미를 살린다. 본문 흐름이 메시아의 이전 상태와 다음 절의 자기 비움 사이의 대조에 의존하므로, 한국어 「~지만」으로 그 양보를 드러낸다. 단순 상태 해석도 가능하므로 각주로 보존한다.
- source_word: ἁρπαγμὸν
  english_pob_choice: something to be grasped
  chosen_korean: 움켜쥘 것
  alternatives_korean:
  - 강탈할 것
  - 착취할 것
  - 붙잡고 놓지 않을 것
  lexicon: BDAG
  rationale: ἁρπαγμός는 본문에서 가장 논쟁적인 어휘이다. 다음 절의 자기 비움 흐름은 「자기 이익을 위해 움켜쥐고 활용할 것」의 의미를 지지한다. 「움켜쥘 것」은 한국어로 그 잡아 두려는 욕망의 함의를 가장 자연스럽게 담아낸다. 다른 가능성은 각주로 보존한다.
- source_word: ἡγήσατο
  english_pob_choice: did not consider
  chosen_korean: 여기다
  alternatives_korean:
  - 간주하다
  - 셈하다
  lexicon: BDAG
  rationale: ἡγέομαι는 평가적 「여기다」의 의미. 한국어 「여기지 않으시고」가 부정 어미를 자연스럽게 결합한다.
- source_word: τὸ εἶναι ἴσα θεῷ
  english_pob_choice: equality with God
  chosen_korean: 하나님과 동등함
  alternatives_korean:
  - 하나님과 동등하게 되는 것
  - 하나님과 같은 자리에 있음
  lexicon: BDAG
  rationale: 관사 부정사 구문을 한국어 명사구 「하나님과 동등함」으로 자연스럽게 옮긴다. ἴσα의 「동등」의 무게를 보존한다.
theological_decisions:
- issue: μορφή θεοῦ의 기독론적 무게
  chosen_reading: 본문의 어휘 「형체」를 그대로 보존
  alternative_readings:
  - 「하나님의 본성으로」
  - 「본성상 하나님으로」
  rationale: 본 절은 정통적 고기독론과 일치하는 본문이지만, 번역은 바울의 어휘를 후대 교리 어휘로 대체해서는 안 된다. 「형체」는 본문 표현을 보존하면서도 문맥이 담아내는 존재론적 무게를 그대로 허용한다. 「모양」(σχῆμα)과의 어휘적 구분을 절 7과의 평행에서 살린다.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
- issue: 메시아의 하나님과의 동등함과 관련해 ἁρπαγμός의 의미
  chosen_reading: 본문은 「움켜쥘 것」으로, 「강탈할 것」 같은 대안은 각주로 보존
  alternative_readings:
  - 강탈할 것
  - 붙잡고 놓지 않을 것
  rationale: 직접 문맥은 획득적 행동이 아니라 자기 내어줌을 강조하므로 「자기 이익을 위해 활용·움켜쥘 것」의 의미가 우세하다. 그러나 진정한 해석상 난제이므로 전통적 대안을 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
