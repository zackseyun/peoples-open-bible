  lexicon: BDAG
  rationale: 하나님의 자기 책임으로 주신 약속. 「언약」(διαθήκη)과 구별하여 「약속」.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_korean: 아멘
  alternatives_korean: []
  lexicon: BDAG
  rationale: 히브리어 אמן의 음역. 한국어에서도 음역 정립.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_korean: 영광
  alternatives_korean: []
  lexicon: BDAG
  rationale: 신학 정립 어휘.
