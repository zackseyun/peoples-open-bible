theological_decisions:
- issue: Identity/status of Samuel in the necromancy narrative
  chosen_reading: Translate the narrative straightforwardly as presenting Samuel speaking to Saul, without adding interpretive qualifiers such as 'supposedly' or 'apparition.'
  alternative_readings:
  - Interpret the figure as an impersonating spirit or merely the medium's perception
  rationale: The Hebrew narrative says 'Samuel said to Saul' and later Saul addresses him directly. The translation should reflect the text's presentation while not resolving broader theological debates about the event beyond what the verse states.
  doctrine_reference: Translation philosophy §1, §3
