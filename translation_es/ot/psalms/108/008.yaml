  text: אֱלֹהִ֤ים דִּבֶּ֥ר בְּ/קָדְשׁ֗/וֹ אֶעְלֹ֥זָה אֲחַלְּקָ֥ה שְׁכֶ֑ם וְ/עֵ֖מֶק סֻכּ֣וֹת אֲמַדֵּֽד׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/108/008.yaml
