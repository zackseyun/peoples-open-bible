  to: Ahora, el resto de los hechos[a] de Salomón, desde el principio hasta el fin, ¿no están escritos en los registros de Natán el profeta, y en la profecía de Ahías el silonita, y en las visiones de Iddo el vidente, acerca de Jeroboam hijo de Nabat[b]?
