revisions:
- from: Entonces lo llevará al sacerdote[a], y el sacerdote tomará de él un puñado como su porción memorial y lo quemará sobre el altar, en adición a las ofrendas encendidas de Yahvé[b]. Es una ofrenda por el pecado.
  to: Entonces lo llevará al sacerdote, y el sacerdote tomará de él un puñado como su porción memorial y lo quemará sobre el altar, además de las ofrendas de alimento de Yahvé. Es una ofrenda por el pecado[a].
  rationale: 'Se corrigió el español para que sea más natural y para reflejar mejor la decisión léxica documentada: ''además de'' en lugar de ''en adición a'', y ''ofrendas de alimento de Yahvé'' en lugar de ''ofrendas encendidas de Yahvé''. También se trasladó la nota al término final ''ofrenda por el pecado'' para preservar la alternativa teológica significativa de חַטָּאת (''ofrenda de purificación'') conforme al rastro de auditoría inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia y el sentido del hebreo: llevar la ofrenda al sacerdote, tomar de ella un puñado como porción memorial, quemarlo sobre el altar y clasificarla como חַטָּאת. Sin embargo, dos puntos necesitan ajuste para alinearse mejor con la evidencia y con la auditoría inglesa: (1) la nota [a] no preserva la alternativa teológica documentada sobre חַטָּאת/purification offering, sino que comenta innecesariamente ''al sacerdote''; y (2) ''en adición a'' y ''ofrendas encendidas'' no son el español más natural ni reflejan tan bien la decisión auditada de expresar אִשֵּׁי יְהוָה como ''food offerings'' con lenguaje sacrificial claro.'
  spanish_quality_summary: El texto es comprensible, pero 'en adición a' suena calcado del inglés y poco idiomático; 'además de' o 'junto con' es mejor español. 'Ofrendas encendidas' también resulta forzado; 'ofrendas de alimento' comunica mejor la decisión del POB inglés y es más natural en español bíblico moderno. La nota [a] actual es débil y poco útil para el lector.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה y 'sacerdote' para כֹּהֵן. 'Ofrenda por el pecado' es aceptable para חַטָּאת como texto principal, siempre que se conserve en nota la alternativa 'ofrenda de purificación' documentada por el POB inglés. 'Porción memorial' es adecuado para אַזְכָּרָה.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'sacerdote' pero la nota auditada corresponde a חַטָּאת
    rationale: El rastro de auditoría inglés preserva la alternativa significativa 'purification offering' para la fórmula final 'It is a sin offering'. La nota española actual no transmite esa tensión léxico-teológica y en su lugar ofrece una observación redundante sobre 'al sacerdote'.
  - severity: medium
    issue: '''en adición a'' es un calco poco natural en español'
    rationale: Aunque intenta seguir la revisión inglesa 'in addition to', en español estándar y eclesial suena impropio. 'además de' comunica el mismo sentido con naturalidad.
  - severity: medium
    issue: '''ofrendas encendidas'' no refleja bien la decisión auditada sobre אִשֵּׁי יְהוָה'
    rationale: La auditoría inglesa cambió a 'food offerings' para evitar jerga arcaica de 'offerings by fire'. En español, 'ofrendas de alimento' o equivalente sacrificial claro preserva mejor esa racionalidad que 'ofrendas encendidas'.
  revised_spanish_text: Entonces lo llevará al sacerdote, y el sacerdote tomará de él un puñado como su porción memorial y lo quemará sobre el altar, además de las ofrendas de alimento de Yahvé. Es una ofrenda por el pecado[a].
  revised_footnotes:
  - marker: a
    text: 'O también: «Es una ofrenda de purificación». El término hebreo puede denotar la ofrenda que trata con el pecado por medio de purificación.'
    reason: alternative_reading
  revision_rationale: 'Se corrigió el español para que sea más natural y para reflejar mejor la decisión léxica documentada: ''además de'' en lugar de ''en adición a'', y ''ofrendas de alimento de Yahvé'' en lugar de ''ofrendas encendidas de Yahvé''. También se trasladó la nota al término final ''ofrenda por el pecado'' para preservar la alternativa teológica significativa de חַטָּאת (''ofrenda de purificación'') conforme al rastro de auditoría inglés.'
