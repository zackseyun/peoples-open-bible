translation:
  language: es
  text: 'Y de la izquierda: Faladaios[a], Meisael, Melqueias, Lotasubos, Nabareías[b], Zacarías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la izquierda». La frase griega indica la posición dentro del grupo o la asamblea.'
    reason: lexical_alternative
  - marker: b
    text: Varios nombres aquí reflejan la forma griega de 1 Esdras y pueden corresponder a formas hebreas más familiares en el paralelo aproximado del texto masorético; sin embargo, en el texto principal se sigue el testimonio griego.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξ εὐωνύμων
  english_pob_choice: from the left
  chosen_spanish: desde la izquierda
  alternatives_spanish:
  - por la izquierda
  - del lado izquierdo
  lexicon: LSJ
  rationale: La frase griega señala posición dentro de una lista o grupo ordenado. «Desde la izquierda» conserva el sentido espacial y suena natural en español sin añadir explicaciones ajenas al texto.
- source_word: Φαλαδαῖος
  english_pob_choice: Phaladaios
  chosen_spanish: Faladaíos
  alternatives_spanish:
  - Phaladaios
  - Faladías
  lexicon: transliteración del griego
  rationale: Es un nombre propio en forma griega. Se translitera para reflejar el testimonio de 1 Esdras sin armonizarlo a una forma hebrea hipotética.
- source_word: Μεισαήλ
  english_pob_choice: Meisael
  chosen_spanish: Meisael
  alternatives_spanish:
  - Misael
  - Mishael
  lexicon: transliteración del griego
  rationale: La POB inglesa sigue la forma griega y no la normaliza al hebreo. En español, «Meisael» conserva esa base y resulta legible.
- source_word: Μελχείας
  english_pob_choice: Melcheias
  chosen_spanish: Melqueías
  alternatives_spanish:
  - Melcheías
  - Melquías
  lexicon: transliteración del griego
  rationale: El nombre refleja una forma griega particular. «Melqueías» mantiene la aspiración gráfica del grupo -ch-/kh- y un final inteligible en español, sin forzar la equivalencia con una reconstrucción hebrea incierta.
- source_word: Λωθάσουβος
  english_pob_choice: Lothasoubos
  chosen_spanish: Lotasubos
  alternatives_spanish:
  - Lothasoubos
  - Lotasubus
  lexicon: transliteración del griego
  rationale: Es una forma de nombre difícil y propia de 1 Esdras. Se conserva la transliteración del griego para no sustituirla por una identificación hebrea no segura.
- source_word: Ναβαρείας
  english_pob_choice: Nabareias
  chosen_spanish: Nabareías
  alternatives_spanish:
  - Nabareias
  - Nabarias
  lexicon: transliteración del griego
  rationale: Se sigue la forma griega del texto fuente. La acentuación española ayuda a la lectura sin alterar la base transliterada.
- source_word: Ζαχαρίας
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  - Zaqueo
  lexicon: forma bíblica tradicional
  rationale: Este nombre tiene una forma española bíblica bien establecida y plenamente reconocible. Es una transliteración convencional del mismo nombre griego/hebreo, adecuada para un lector en español.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal, con el paralelo hebreo/masorético solo como verificación aproximada de nombres propios. No se detectaron revisiones anteriores que exigieran cambios.
  spanish_consistency_notes:
  - Se mantuvo el orden del listado y la función direccional de ἐξ εὐωνύμων sin convertirla en una interpretación narrativa.
  - Los nombres propios se trataron como transliteraciones o formas bíblicas convencionales, evitando armonizarlos con equivalentes hebreos inciertos.
  - Se usó puntuación española estándar con dos puntos introductorios y coma en la serie de nombres.
