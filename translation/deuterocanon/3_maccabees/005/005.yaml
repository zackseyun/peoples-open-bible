theological_decisions:
- issue: Collective term τὸ φύλον
  chosen_reading: the race
  alternative_readings:
  - the people
  - the nation
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it bears interpretive weight because it identifies the targeted group corporately and ethnically. 'The race' best reflects the hostile collective sense in context, while alternatives are preserved because modern English can hear 'race' differently.
