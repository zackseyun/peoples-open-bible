translation:
  language: es
  text: Los habitantes de Samaria tiemblan por los becerros de Bet-avén[a], porque su pueblo se lamenta por él, y sus sacerdotes idólatras se alegran por él[b], por su gloria, porque se ha alejado de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-avén es un nombre profético y polémico para Betel, con un sentido aproximado de «casa de maldad» o «casa de vanidad».
    reason: cultural_note
  - marker: b
    text: 'O: «sus sacerdotes se regocijan/exultan por él»; el verbo hebreo suele significar «alegrarse/exultar», aunque aquí muchos lo entienden con ironía o dentro de un contexto de lamento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se ha ido al destierro de él» / «ha sido llevado de él»; el hebreo también permite la idea de exilio o traslado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֶגְלוֹת
  english_pob_choice: for the calves
  chosen_spanish: por los becerros
  alternatives_spanish:
  - a causa de los becerros
  - por los terneros
  lexicon: HALOT
  rationale: El ל prefijado expresa aquí causa/objeto de alarma más que destino; en español, «por» comunica bien ese motivo. «Becerros» conserva el referente cultual de los ídolos del norte y resulta más natural que un calco como «terneros» en este contexto profético.
- source_word: בֵּית אָוֶן
  english_pob_choice: Beth-aven
  chosen_spanish: Bet-avén
  alternatives_spanish:
  - Betel
  - Casa de iniquidad
  lexicon: HALOT
  rationale: Se mantiene como topónimo transliterado, porque el profeta lo usa como nombre polémico para Betel. «Bet-avén» conserva esa ironía sin borrar el juego profético del hebreo.
- source_word: יָג֖וּרוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblan
  alternatives_spanish:
  - temen
  - dudan
  lexicon: HALOT
  rationale: El verbo puede incluir temor/del temor, pero en este contexto la imagen concreta de «temblar» reproduce bien la alarma de la población ante la pérdida del ídolo.
- source_word: שְׁכַן שֹׁמְרוֹן
  english_pob_choice: the inhabitants of Samaria
  chosen_spanish: los habitantes de Samaria
  alternatives_spanish:
  - los moradores de Samaria
  - los que habitan en Samaria
  lexicon: HALOT
  rationale: El participio singular funciona colectivamente; en español la forma plural es la manera más natural y fiel de expresar el sujeto colectivo.
- source_word: אָבַל
  english_pob_choice: mourn
  chosen_spanish: se lamenta
  alternatives_spanish:
  - hace duelo
  - llora
  lexicon: HALOT
  rationale: El verbo expresa duelo/llanto funerario o público. «Se lamenta» mantiene ese tono de duelo y evita una precisión excesiva que en español sonaría rígida.
- source_word: עַמּוֹ
  english_pob_choice: its people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su pueblo propio
  lexicon: HALOT
  rationale: El sufijo es masculino singular y remite al centro/objeto de culto; en español, «su pueblo» conserva la ironía de una lealtad popular ligada al ídolo o santuario.
- source_word: כְמָרָיו
  english_pob_choice: its idolatrous priests
  chosen_spanish: sus sacerdotes idólatras
  alternatives_spanish:
  - sus sacerdotes
  - sus quemarim
  lexicon: HALOT
  rationale: כמרים designa sacerdotes paganos o ilegítimos. «Sacerdotes idólatras» preserva el matiz descalificador sin recurrir a un tecnicismo poco transparente para el lector hispano.
- source_word: יָגִילוּ
  english_pob_choice: wail / exult
  chosen_spanish: se alegran
  alternatives_spanish:
  - exultan
  - se regocijan
  lexicon: HALOT
  rationale: El verbo significa normalmente «alegrarse/exultar». Aunque el contexto es de pérdida y duelo, el texto hebreo conserva esa forma; en español se mantiene el sentido lexical y la tensión contextual, sin forzar una paráfrasis que lo invierta.
- source_word: עַל כְּבוֹד֖וֹ
  english_pob_choice: over it, over its glory
  chosen_spanish: por él, por su gloria
  alternatives_spanish:
  - sobre él, sobre su gloria
  - acerca de él, acerca de su gloria
  lexicon: HALOT
  rationale: La preposición עַל admite aquí una relación de objeto/tema. En español, «por» funciona de modo natural con verbos de emoción y conserva el vínculo repetido con el referente del culto. «Su gloria» reproduce כבוד sin sustituirlo por «ídolo» en el texto principal.
- source_word: גָלָה מִמֶּנּוּ
  english_pob_choice: it has departed from it
  chosen_spanish: se ha alejado de él
  alternatives_spanish:
  - ha sido llevado de él
  - se ha ido de él
  lexicon: HALOT
  rationale: גלה puede implicar ir al destierro o ser llevado, pero el sentido básico de alejamiento/pérdida se expresa con claridad en «se ha alejado», sin añadir una especificación que el hebreo permite pero no exige en la línea principal.
theological_decisions:
- issue: Referente de los sufijos masculinos y el tono irónico del versículo
  english_pob_reading: The suffixes primarily refer to the calf-image/cult center of Beth-aven, rendered with 'its' language.
  chosen_spanish_reading: Los sufijos se entienden primariamente del becerro/culto de Bet-avén, expresado con «su/él» según la naturalidad del español.
  alternative_spanish_readings:
  - Los sufijos se entienden de Bet-avén como lugar
  - Los sufijos se entienden de un becerro masculino, con «su/él»
  rationale: El hebreo usa sufijos masculinos singulares; en español, el antecedente más natural es el objeto o centro de culto, pero el texto conserva la ambigüedad irónica del profeta. No se neutraliza esa tensión con un término más doctrinal como «Señor» ni se aclara artificialmente el referente.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sentido de יָגִילוּ en un contexto de duelo
  english_pob_reading: Literal lexical sense 'rejoice/exult' retained as irony.
  chosen_spanish_reading: Se mantiene «se alegran» para preservar el valor léxico del verbo, aun dentro de un contexto de lamento.
  alternative_spanish_readings:
  - se lamentan
  - exultan
  - se regocijan
  rationale: El hebreo ordinariamente significa alegrarse/exultar; aunque la escena general es de pérdida, la forma verbal no debe borrarse. En español se conserva la tensión textual y el posible matiz irónico, en vez de reemplazarlo por un verbo de duelo que armonice demasiado con el contexto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de ‘wail’ a ‘exult’ para יָגִילוּ, corrigiendo una lectura demasiado contextualizada. La presente versión española sigue esa revisión y conserva el verbo de alegría para reflejar el valor léxico principal, mientras mantiene en nota la alternativa contextual y la posible ironía.
  spanish_consistency_notes:
  - Se conserva Yahvé en otros pasajes según la norma del proyecto, pero este versículo no lo contiene.
  - «Bet-avén» mantiene la transliteración del topónimo polémico, sin reemplazarlo por «Betel» en el texto principal.
  - «Becerros» y «sacerdotes idólatras» reflejan el registro cultual y descalificador del hebreo.
  - No se suaviza la tensión entre lamento y alegría; la nota b preserva la alternativa contextual y la ambigüedad del verbo.
  - «Su gloria» preserva כבוד con su carga irónica sin explicitar ‘ídolo’ en el texto principal.
