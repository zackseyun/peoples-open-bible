  alternatives_spanish:
  - Hatush
  - Jatús
  lexicon: HNp
  rationale: Es un nombre propio hebreo; en español se translitera para conservar la referencia histórica. Se adapta la acentuación gráfica a la forma llana final en -s, sin cambiar el nombre.
- source_word: שְׁבַנְיָה
  english_pob_choice: Shebaniah
  chosen_spanish: Sebanías
  alternatives_spanish:
  - Shebanías
  - Sebanía
  lexicon: HNp
  rationale: Es un nombre propio. Se mantiene la raíz consonántica reconocible y se ajusta la forma a una transliteración natural para el español bíblico, con acento gráfico para indicar la pronunciación.
- source_word: מַלּוּךְ
  english_pob_choice: Malluk
  chosen_spanish: Maluc
  alternatives_spanish:
  - Malluc
  - Malluk
  - Malluc
  lexicon: HNp
  rationale: Es un nombre propio. Se refleja el cierre en consonante gutural final del hebreo con una forma breve y legible en español. Se evita 'Mallucho' porque añadiría una vocal no respaldada por el hebreo.
translation_notes:
  revision_awareness: El inglés POB mantiene los tres nombres como transliteraciones y solo anota una variante tradicional para el tercero (‘Malluch’). No se detectan revisiones textuales ni cambios de sentido; el hebreo masorético y el contexto auditado coinciden en una simple lista de nombres propios.
  spanish_consistency_notes:
  - Se conservó el orden de los tres nombres conforme al texto hebreo.
  - No se añadieron artículos, verbos ni conectores que el hebreo no contiene.
  - La nota al pie marca únicamente la variante tradicional del tercer nombre, siguiendo el modelo auditado en inglés.
