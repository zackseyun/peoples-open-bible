base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/004.yaml
  text: And I will stretch out my hand against Judah and against all the inhabitants of Jerusalem[a], and I will cut off from this place the remnant of Baal, the name of the idolatrous priests along with the priests[b],
  footnotes:
  - marker: a
    text: Or 'the memory of the idolatrous priests.' Hebrew 'the name of the idolatrous priests' is an idiom for removing even their remembrance.
    reason: lexical_alternative
  - marker: b
    text: '''Idolatrous priests'' renders Hebrew kemarim, a term for pagan or syncretistic priests, distinguished here from the ordinary ''priests.'''
    reason: cultural_note
