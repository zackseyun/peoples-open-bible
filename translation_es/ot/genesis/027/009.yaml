translation:
  language: es
  text: Por favor, ve al rebaño y consígueme de allí dos buenos cabritos, y haré con ellos unos manjares[a] para tu padre, tal como a él le gustan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «platos sabrosos» o «delicias» para מַטְעַמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶךְ נָא
  english_pob_choice: Please go
  chosen_spanish: Por favor ve
  alternatives_spanish:
  - Ve, por favor
  - Por favor, anda
  lexicon: HALOT
  rationale: El imperativo לֶךְ pide una acción inmediata; נָא suaviza la orden y añade cortesía. «Por favor ve» conserva esa combinación de urgencia y tono cortés en un español natural.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras, es decir, ganado menor. «Rebaño» es amplio y natural en español, y permite que la especificación posterior de cabritos complete el sentido.
- source_word: וְקַח לִי מִשָּׁם
  english_pob_choice: and get for me from there
  chosen_spanish: y tráeme de allí
  alternatives_spanish:
  - y toma para mí de allí
  - y consígueme de allí
  lexicon: HALOT
  rationale: En contexto, לקח implica ir a obtener algo. «Tráeme de allí» expresa bien la idea de ir a buscar y traer, sin sonar forzado en español.
- source_word: שְׁנֵי גְּדָיֵי עִזִּים
  english_pob_choice: two young goats
  chosen_spanish: dos buenos cabritos
  alternatives_spanish:
  - dos cabritos de cabra
  - dos crías de cabra
  lexicon: HALOT
  rationale: El hebreo literalmente habla de «dos crías de cabras». «Cabritos» comunica la edad y especie de forma natural; «buenos» refleja טֹבִים como calidad/aprovechamiento, no solo moralidad.
- source_word: טֹבִים
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - selectos
  - finos
  lexicon: HALOT
  rationale: טוֹב aquí califica la calidad de los animales para la preparación. «Buenos» es la equivalencia directa y flexible en español, manteniendo la valoración positiva sin sobreinterpretar.
- source_word: וְאֶעֱשֶׂה אֹתָם מַטְעַמִּים
  english_pob_choice: and I will make them into tasty food
  chosen_spanish: y yo los haré manjares
  alternatives_spanish:
  - y los prepararé como manjares
  - y los haré un plato sabroso
  lexicon: HALOT
  rationale: מַטְעַמִּים denota platos sabrosos o delicados. «Manjares» conserva el carácter apetitoso y algo especial del término, y suena más digno que «comida rica» o una paráfrasis excesiva.
- source_word: לְאָבִיךָ
  english_pob_choice: for your father
  chosen_spanish: para tu padre
  alternatives_spanish:
  - para tu papá
  lexicon: HALOT
  rationale: «Tu padre» mantiene el registro narrativo y la relación familiar sin volverlo demasiado coloquial.
- source_word: כַּאֲשֶׁר אָהֵב
  english_pob_choice: just as he loves
  chosen_spanish: tal como a él le gustan
  alternatives_spanish:
  - como a él le agrada
  - tal como él los ama
  lexicon: HALOT
  rationale: El hebreo describe la preferencia de Isaac por ese tipo de comida. En español, «le gustan» expresa mejor esa preferencia culinaria que un «ama» más abstracto o afectivo, aunque la frase sigue siendo ligeramente interpretativa para evitar una construcción rígida.
translation_notes:
  revision_awareness: El inglés POB resolvió מַטְעַמִּים con «tasty food» y dejó nota de alternativas («savory dishes», «delicacies»). La versión española sigue esa decisión con «manjares», que conserva el matiz de comida sabrosa/especial sin perder naturalidad. También se mantiene la amplitud de צֹאן con «rebaño», y se evita una traducción mecánica de לקח como solo «tomar», prefiriendo «tráeme» por el contexto de obtención.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término base del proyecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - «Cabritos» se usa para preservar la edad de los animales y la naturalidad del español.
  - La nota de pie conserva la alternativa semántica de מַטְעַמִּים, ya que el término puede abarcar «manjares», «delicias» o «platos sabrosos».
