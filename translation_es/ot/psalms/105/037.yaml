translation:
  language: es
  text: Los sacó con plata y oro[a], y entre sus tribus no hubo quien tropezara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hubo quien se debilitara entre sus tribus». El participio hebreo puede denotar tropiezo, vacilación o debilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵם
  english_pob_choice: He brought them out
  chosen_spanish: Los sacó
  alternatives_spanish:
  - Los llevó fuera
  - Los hizo salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir o sacar. «Los sacó» conserva la agencia divina y suena natural en español, sin perder la imagen del éxodo.
- source_word: בְּכֶסֶף וְזָהָב
  english_pob_choice: with silver and gold
  chosen_spanish: con plata y oro
  alternatives_spanish:
  - cargados de plata y oro
  - llevando plata y oro
  lexicon: HALOT
  rationale: El ב aquí funciona de modo acompañante/instrumental. «Con plata y oro» es la forma más directa y fiel, sin añadir la idea de carga pesada que el hebreo no exige.
- source_word: וְאֵין
  english_pob_choice: and ... there was no
  chosen_spanish: y ... no hubo
  alternatives_spanish:
  - y no había
  - y no existió
  lexicon: HALOT
  rationale: El hebreo usa una construcción existencial negativa. «No hubo» resulta idiomático en español y mantiene el valor existencial del texto.
- source_word: בִּשְׁבָטָיו
  english_pob_choice: among his tribes
  chosen_spanish: entre sus tribus
  alternatives_spanish:
  - en sus tribus
  - entre las tribus de él
  lexicon: HALOT
  rationale: Se conserva el sufijo singular de tercera persona con «sus», siguiendo de cerca el hebreo y manteniendo la referencia corporativa a Israel como un solo sujeto colectivo.
- source_word: כּוֹשֵׁל
  english_pob_choice: one who stumbled
  chosen_spanish: quien tropezara
  alternatives_spanish:
  - quien vacilara
  - quien desfalleciera
  - uno débil
  lexicon: HALOT
  rationale: El participio puede denotar tropezar, tambalear o debilitarse. «Quien tropezara» preserva la imagen concreta del tropiezo, sin cerrar del todo la amplitud semántica que la nota inglesa también reconoce.
theological_decisions:
- issue: Sentido del participio final כּוֹשֵׁל
  english_pob_reading: '''there was no one who stumbled''; the Hebrew participle can also suggest weakness or feebleness'
  chosen_spanish_reading: no hubo quien tropezara
  alternative_spanish_readings:
  - no hubo nadie débil entre sus tribus
  - no hubo quien vacilara
  rationale: La POB inglesa retiene la imagen de tropiezo y deja constancia de la posible extensión a debilidad. El español principal conserva esa imagen concreta; la amplitud semántica queda reconocida en la nota.
  doctrine_reference: Salmo 105:37; nota lexical del POB en inglés
- issue: Posesivo singular en 'sus tribus'
  english_pob_reading: '''his tribes'' refers corporately to Israel/Jacob'
  chosen_spanish_reading: sus tribus
  alternative_spanish_readings:
  - sus tribus de ellos
  - las tribus de Israel
  rationale: Se mantiene el posesivo singular del hebreo de manera natural en español. El referente colectivo no requiere explicitarse más, y así se conserva la tensión textual sin sobreinterpretar.
  doctrine_reference: Salmo 105:37; decisión teológica del POB en inglés
translation_notes:
  revision_awareness: El texto inglés más reciente quedó sin cambios tras revisión; la versión española sigue esa lectura estable y conserva la nota léxica sobre כּוֹשֵׁל, trasladando su amplitud semántica al español sin resolverla de manera indebida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Plata y oro» sigue la elección inglesa de valor instrumental/acompafiante, sin añadir matices de peso o abundancia no explicitados.
  - La nota a pie de página conserva la alternativa semántica documentada por el POB inglés y adapta «feeble» a «debilitara/debilidad» en español.
