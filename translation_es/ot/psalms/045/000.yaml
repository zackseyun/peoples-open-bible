translation:
  language: es
  text: 'Para el director musical: según “Lirios”[a]. De los hijos de Coré. Un Maskil[b]. Un canto de amores[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Shoshannim, tradicionalmente entendido como nombre de una melodía o arreglo musical; literalmente, “Lirios”.
    reason: lexical_alternative
  - marker: b
    text: Maskil es un término técnico en los encabezamientos de los Salmos; puede denotar una composición contemplativa o instructiva.
    reason: lexical_alternative
  - marker: c
    text: O “un canto de amor”. El hebreo dice literalmente “un canto de amores”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el término señala una función musical/directiva. 'Director musical' comunica esa función en español contemporáneo sin perder el sentido litúrgico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con la melodía de
  - sobre
  - con arreglo a
  lexicon: HALOT
  rationale: En superscripciones musicales, introduce probablemente una melodía o indicación de ejecución. 'Según' mantiene la relación abierta sin forzar una especificación técnica.
- source_word: שֹׁשַׁנִּים
  english_pob_choice: “Lilies”
  chosen_spanish: “Lirios”
  alternatives_spanish:
  - “Lilies”
  - Shoshannim
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'lirios'. En el encabezado probablemente designa una melodía; por eso se conserva el sentido léxico en español, con comillas para señalar la posible referencia técnica.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: Of the sons of Korah
  chosen_spanish: De los hijos de Coré
  alternatives_spanish:
  - Para los hijos de Coré
  - Por los hijos de Coré
  lexicon: HALOT
  rationale: La preposición admite varias relaciones, pero 'de los hijos de Coré' es la formulación más neutral y natural para el encabezamiento, sin fijar innecesariamente autoría o dedicación.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un maskil
  - Un canto didáctico
  - Un canto contemplativo
  lexicon: HALOT
  rationale: Es un término técnico de los encabezamientos salmódicos cuyo valor exacto es incierto. Se conserva transliterado para no falsear precisión; se mantiene capitalizado como en la revisión inglesa.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Un canto
  alternatives_spanish:
  - Un poema
  - Una canción
  lexicon: HALOT
  rationale: '''Canto'' es un equivalente natural y digno en español para el género poético-musical del encabezamiento.'
- source_word: יְדִידֹת
  english_pob_choice: of loves
  chosen_spanish: de amores
  alternatives_spanish:
  - de amor
  - un canto de amor
  - de seres amados
  lexicon: HALOT
  rationale: El plural hebreo es inusual y conserva una ambigüedad poética. 'De amores' reproduce esa pluralidad y evita reducirlo prematuramente a un singular interpretativo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando todo pie de nota no anclado en el texto. El resultado mantiene la información auditada del inglés POB, pero sin notas, porque en español no era necesario introducir una alternativa textual explícita dentro de esta línea de encabezamiento.
  spanish_consistency_notes:
  - Se mantuvo 'Coré' como forma española estable del nombre propio.
  - Se usó 'Maskil' transliterado para conservar el carácter técnico del encabezamiento.
  - Se eligió 'canto' en lugar de 'canción' por registro bíblico más formal.
  - Se evitó 'SEÑOR' para no introducir una convención de máscara del nombre divino que no aparece en este versículo.
