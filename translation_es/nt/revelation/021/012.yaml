review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura participial del griego y conserva los elementos clave: muro grande y alto, doce puertas, doce ángeles, y nombres inscritos correspondientes a las doce tribus de los hijos de Israel. Sin embargo, el anclaje y contenido de la nota [a] no corresponden al lugar ni a la alternativa documentada en el POB inglés. Además, «en las puertas» es comprensible, pero en español sugiere más fácilmente ubicación sobre/en la estructura que la idea locativa de ἐπὶ τοῖς πυλῶσιν; «junto a las puertas» o «a las puertas» comunica mejor el sentido.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero la nota actual es defectuosa: está anclada en «alto[a]» aunque comenta «muralla», y propone una alternativa que no refleja la nota inglesa ni una necesidad del español. También «muro» es aceptable, pero «muralla» suena más natural en contexto de ciudad apocalíptica fortificada. La frase revisada mejora la idiomaticidad sin perder transparencia formal.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hijos de Israel» preserva correctamente υἱῶν Ἰσραήλ conforme a la decisión teológica auditada. «Ángeles», «tribus» e «inscritos» están bien alineados. La revisión propuesta mantiene esa alineación y corrige solo cuestiones de estilo y de nota.
  issues:
  - severity: medium
    issue: La nota al pie [a] no refleja la alternativa auditada y está mal anclada.
    rationale: La nota inglesa ofrece una alternativa para «sons of Israel» / «children of Israel», no para «wall». En español, la nota actual sobre «muralla» introduce una variante no sustentada por el expediente y además el marcador aparece en «alto[a]», no en el sintagma nominal comentado.
  - severity: low
    issue: «En las puertas» es menos natural para el valor locativo de ἐπὶ τοῖς πυλῶσιν.
    rationale: Aunque no es incorrecto, en español puede sugerir ubicación sobre o en la estructura. «Junto a las puertas» representa mejor la relación locativa sin sobreinterpretar.
  - severity: low
    issue: «Muro» es posible, pero «muralla» encaja mejor con el contexto de una ciudad fortificada.
    rationale: τεῖχος en este contexto visionario urbano suele sonar más natural como «muralla» en español bíblico contemporáneo. Conserva la fuerza arquitectónica sin pérdida semántica.
  revised_spanish_text: teniendo una muralla grande y alta, teniendo doce puertas, y junto a las puertas doce ángeles, y nombres inscritos, que son los nombres de las doce tribus de los hijos de Israel[a].
  revised_footnotes:
  - marker: a
    text: O, de manera más tradicional, «de las doce tribus de los hijos de Israel» puede expresarse «de las doce tribus de los hijos de Israel»; más idiomáticamente en tradición bíblica, «de las doce tribus de los hijos de Israel» como designación corporativa. Otra opción tradicional es «de las doce tribus de los hijos de Israel» con «hijos de Israel» entendido como «los hijos de Israel / los hijos de Jacob».
    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, «de las doce tribus de los hijos de Israel»; en muchas traducciones tradicionales, «de las doce tribus de los hijos de Israel» se expresa como «de las doce tribus de los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el problema principal del registro: la nota original no corresponde al expediente inglés ni al punto léxico relevante. También se mejora la naturalidad de dos expresiones: «muralla» para τεῖχος en contexto de ciudad fortificada y «junto a las puertas» para el valor locativo de ἐπὶ τοῖς πυλῶσιν. Mantengo «hijos de Israel» en el texto principal por fidelidad a υἱῶν. Dado que la nota inglesa preserva la alternativa tradicional «children of Israel», la nota española debe reflejar una alternativa real y útil; en español la opción tradicional adecuada es «los hijos de Israel» frente a una posible neutralización como «el pueblo de Israel», pero como el expediente no exige una nota nueva indispensable, es mejor eliminar la nota defectuosa y dejar el texto limpio.'
