translation:
  language: es
  text: Y le dieron aviso acerca de ella, y él salió al atrio[b], con lámparas[a] de plata que iban delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'antorchas' para 'lámparas'; el término griego puede referirse a ambas, aunque la mención de plata favorece aquí un elemento de iluminación ceremonial.
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido 'atrio' se refiere al área delante de la tienda principal o del espacio de audiencia; 'vestíbulo' o 'frente de la tienda' también son posibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἀνήγγειλαν αὐτῷ περὶ αὐτῆς
  english_pob_choice: And they reported her to him
  chosen_spanish: Y les dieron aviso acerca de ella
  alternatives_spanish:
  - Y le informaron acerca de ella
  - Y le notificaron acerca de ella
  lexicon: BDAG; contexto narrativo courtly/ceremonial
  rationale: El verbo comunica que se le hace llegar una noticia o informe. En español, 'dar aviso' conserva el valor de comunicación de una noticia sin imponer un registro burocrático excesivo. 'Acerca de ella' mantiene el referente femenino explícito del griego y del contexto.
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - salió al exterior
  lexicon: BDAG
  rationale: El movimiento es de dentro hacia fuera, hacia el espacio público. 'Salió' es la forma natural y fiel en español; el complemento 'al atrio' precisa la dirección.
- source_word: εἰς τὸ προσκήνιον
  english_pob_choice: into the forecourt
  chosen_spanish: al atrio
  alternatives_spanish:
  - al vestíbulo
  - a la antecámara
  - al frente de la tienda
  lexicon: LSJ
  rationale: El término griego designa el espacio delante de la tienda o sala principal. 'Atrio' comunica un espacio formal de acceso/presentación en español bíblico moderno, sin forzar el sentido teatral de 'escenario' y manteniendo la idea de un área frontal.
- source_word: λαμπάδες
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - antorchas
  - faroles
  lexicon: LSJ
  rationale: La palabra puede significar lámparas o antorchas. Dado que el contexto menciona que son de plata, 'lámparas' encaja mejor con un elemento ceremonial; además evita introducir una imagen de fuego que el texto no explicita.
- source_word: ἀργυραῖ
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - plateadas
  - de plata pura
  lexicon: LSJ
  rationale: El adjetivo indica material de plata o hecho de plata. En español, 'de plata' es la formulación más natural y precisa para un objeto ceremonial.
- source_word: προάγον
  english_pob_choice: going before
  chosen_spanish: que iban delante de él
  alternatives_spanish:
  - que lo precedían
  - precediéndolo
  lexicon: BDAG
  rationale: El participio describe un acompañamiento procesional. 'Que iban delante de él' conserva el movimiento y la imagen de precedencia de modo claro y reverencial.
translation_notes:
  revision_awareness: Coincide con el tramo principal del testimonio griego de Swete LXX 1909 y con el audit trail inglés; no se registran revisiones aplicadas en el contexto aportado.
  spanish_consistency_notes:
  - Se mantuvo el referente femenino explícito ('ella') según el griego.
  - Se evitó 'SEÑOR' o términos teológicos no pertinentes; el versículo es puramente narrativo.
  - '''Atrio'' se eligió como solución española natural para προσκήνιον, siguiendo la intención espacial del inglés ''forecourt''.'
  - '''Lámparas'' preserva la ambigüedad histórica con ''antorchas'' en nota, como hace el inglés POB.'
