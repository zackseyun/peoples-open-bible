translation:
  language: es
  text: 'Entonces Yahvé me dijo: «¿Qué ves, Jeremías?» Y respondí: «Higos. Los higos buenos son muy buenos, y los higos malos son muy malos, tan malos que no se pueden comer[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no se pueden comer por su mal estado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo el criterio POB de no sustituirlo por un título. «Yahvé» es la forma establecida en español para una transliteración reverente y legible.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y habló
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» reproduce bien la secuencia en español sin volverla mecánica.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Con el verbo de habla, el complemento indirecto simple «me» es natural y fiel al hebreo.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  - ¿Qué contemplas?
  lexicon: HALOT
  rationale: El participio/pregunta se expresa de modo idiomático en presente simple, preservando la inmediatez de la visión.
- source_word: תְּאֵנִים
  english_pob_choice: Figs
  chosen_spanish: Higos
  alternatives_spanish:
  - Higos
  - Higuera (por el fruto, no preferible aquí)
  lexicon: HALOT
  rationale: El objeto visto son los frutos; «higos» es el equivalente directo y claro en español.
- source_word: הַתְּאֵנִים הַטֹּבוֹת טֹבוֹת מְאֹד
  english_pob_choice: the good figs are very good
  chosen_spanish: Los higos buenos son muy buenos
  alternatives_spanish:
  - Los higos buenos, muy buenos
  - Los higos buenos son buenísimos
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática adjetivo + adverbio, sin suavizarla a una sola palabra para no borrar la intensificación hebrea.
- source_word: וְהָרָעוֹת רָעוֹת מְאֹד
  english_pob_choice: and the bad figs are very bad
  chosen_spanish: los higos malos son muy malos
  alternatives_spanish:
  - los malos son muy malos
  - los higos malos, muy malos
  lexicon: HALOT
  rationale: A diferencia de una traducción más elíptica, se conserva «higos» en la segunda cláusula para corresponder más de cerca al hebreo y a la revisión inglesa, donde se añadió la repetición completa.
- source_word: אֲשֶׁר לֹא תֵאָכַלְנָה
  english_pob_choice: that they cannot be eaten
  chosen_spanish: tan malos que no se pueden comer
  alternatives_spanish:
  - que no se pueden comer
  - de modo que no se pueden comer
  lexicon: HALOT
  rationale: El valor causal/resultativo se expresa naturalmente con «tan ... que», reflejando la idea de que su mal estado los hace incomibles.
- source_word: מֵרֹעַ
  english_pob_choice: so bad
  chosen_spanish: tan malos
  alternatives_spanish:
  - por su maldad
  - por estar malos
  lexicon: HALOT
  rationale: El sustantivo de cualidad expresa la razón de la incomestibilidad. En español, «tan malos» enlaza bien con la cláusula resultativa sin introducir una interpretación más fuerte que el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre personal del pacto en lugar de ocultarlo tras un título. Esto sigue la línea doctrinal del POB en favor de la transliteración del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la frase final sobre la imposibilidad de comer
  english_pob_reading: so bad that they cannot be eaten
  chosen_spanish_reading: tan malos que no se pueden comer
  alternative_spanish_readings:
  - que no se pueden comer por su mal estado
  - tan malos que no puedan comerse
  rationale: Se preserva la relación de causa/resultado sin convertirla en una glosa explicativa excesiva. La ambigüedad entre «por su mal estado» y la simple imposibilidad se deja implícita como en el original.
  doctrine_reference: Jeremiah 24:3 lexical causation note
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al final de la cláusula correspondiente en el texto español mediante el marcador [a]. Además, se alineó la repetición de «higos» en ambas cláusulas con la revisión inglesa más reciente para mayor correspondencia al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el paralelismo intensificado con «muy buenos / muy malos».
  - Se conserva el registro bíblico claro y sobrio, evitando un calco rígido pero sin ampliar el sentido del texto.
