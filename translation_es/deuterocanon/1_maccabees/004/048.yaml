translation:
  language: es
  text: Y reedificaron el santuario[a] y el interior de la casa[b], y consagraron los atrios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “el lugar santo”; el griego τὰ ἅγια puede designar el área sagrada del templo.
    reason: lexical_alternative
  - marker: b
    text: “Casa” aquí se refiere al edificio del templo.
    reason: cultural_note
lexical_decisions:
- source_word: ᾠκοδόμησαν
  english_pob_choice: rebuilt
  chosen_spanish: reedificaron
  alternatives_spanish:
  - reconstruyeron
  - restauraron
  lexicon: LSJ
  rationale: El verbo οἰκοδομέω es literalmente “construir/edificar”; en este contexto de reparación y reconsagración del templo, “reedificaron” comunica bien la obra de reconstrucción sin perder el matiz arquitectónico.
- source_word: τὰ ἅγια
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - las cosas santas
  lexicon: LSJ
  rationale: En contexto de templo, τὰ ἅγια puede referirse al espacio sagrado. “Santuario” mantiene ese valor locativo y evita convertir la frase en una referencia vaga a objetos santos.
- source_word: τὰ ἐντὸς τοῦ οἴκου
  english_pob_choice: the interior of the house
  chosen_spanish: el interior de la casa
  alternatives_spanish:
  - las partes interiores de la casa
  - lo que estaba dentro de la casa
  lexicon: LSJ
  rationale: La frase es espacial y concreta. “Interior” conserva el sentido de lo que está dentro; “casa” reproduce el idioma bíblico del templo como “casa” de Dios, tal como lo hace el inglés POB.
- source_word: οἴκου
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  lexicon: LSJ
  rationale: “Casa” refleja con mayor cercanía el término griego y preserva la expresión bíblica tradicional de la casa de Dios. El contexto deja claro que se trata del edificio del templo.
- source_word: τὰς αὐλὰς
  english_pob_choice: the courts
  chosen_spanish: los atrios
  alternatives_spanish:
  - los patios
  - los patios interiores
  lexicon: LSJ
  rationale: En arquitectura del templo, αὐλαί son “atrios”. En español bíblico, “atrios” es el equivalente natural y conserva la distinción espacial del texto.
- source_word: ἡγίασαν
  english_pob_choice: consecrated
  chosen_spanish: consagraron
  alternatives_spanish:
  - santificaron
  - dedicaron
  lexicon: LSJ
  rationale: Ἁγιάζω aquí expresa poner algo aparte para uso sagrado. “Consagraron” comunica bien ese acto ritual en español moderno, sin la carga eclesial más estrecha de “santificaron”.
theological_decisions:
- issue: Distinción entre espacios del templo
  english_pob_reading: Render τὰ ἅγια as 'the sanctuary' and distinguish it from 'the interior of the house.'
  chosen_spanish_reading: Traducir τὰ ἅγια como “el santuario” y distinguirlo de “el interior de la casa”.
  alternative_spanish_readings:
  - “el lugar santo”
  - “las cosas santas”
  rationale: El versículo enumera partes del complejo del templo. “El santuario” nombra un espacio sagrado y, junto con “el interior de la casa”, mantiene la diferenciación arquitectónica que el griego presenta.
  doctrine_reference: 'Translation philosophy: primacía del original, legibilidad moderna y consistencia terminológica documentada.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto base permanece en alto acuerdo con la fuente griega y con el análisis auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo “casa” para οἶκος, en continuidad con el valor idiomático del templo como casa de Dios.
  - Se eligió “consagraron” para ἡγίασαν para conservar el matiz ritual sin confundirlo con una noción doctrinal más técnica de “santificar”.
  - “Atrios” preserva el vocabulario bíblico arquitectónico y la distinción espacial del original.
