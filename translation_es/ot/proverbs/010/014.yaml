base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/014.yaml
  text: Wise men store up knowledge[c][b][a], but the mouth of a fool is near ruin.
  footnotes:
  - marker: a
    text: Or 'The wise store up knowledge, and the mouth of a fool brings near ruin.' The Hebrew conjunction can be read as either simple 'and' or adversative 'but'; the context favors contrast.
    reason: lexical_alternative
  - marker: b
    text: '''Store up'' may also be rendered ''treasure up'' or ''hide,'' conveying the prudent preservation of knowledge.'
    reason: lexical_alternative
  - marker: c
    text: '''Ruin'' may also be translated ''destruction'' or ''dismay/terror,'' depending on how מְחִתָּה is understood in context.'
    reason: lexical_alternative
