translation:
  text: |-
    1. Now therefore know that the Lord will execute judgment upon the sons of men. For when rocks are being split, and the sun is being extinguished, and waters are drying up, and fire is cowering, and all creation is being shaken, and the invisible spirits are melting away, and Hades is being plundered at the suffering of the Most High, men will persist in disobedience and remain in their injustices. Therefore they will be judged with a greater punishment.
    
    2. Therefore the Most High has heard your prayer, to separate you from unrighteousness and for you to become to him a son and a servant and a minister of his presence.
    
    3. You shall shine forth the light of knowledge in Jacob, and you shall be like the sun to all the seed of Israel.
    
    4. And a blessing shall be given to you and to all your seed, until the Lord visits all the nations in the tender mercies of his son forever.
    
    5. And for this reason counsel and understanding have been given to you, so that you may instruct your sons concerning this.
    
    6. For those who bless him will be blessed, and those who curse him will perish.
