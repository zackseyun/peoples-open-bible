review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido del hebreo: declaración pasada, condición negativa, descenso del hermano menor, y prohibición posterior de acceso a José. Sin embargo, omite explícitamente el acompañamiento «con ustedes», presente en אִתְּכֶם y reflejado en el POB inglés. También «su hermano menor» puede sonar simplemente comparativo; el hebreo apunta al más joven del grupo, mejor como «su hermano más joven» o «el menor de sus hermanos».'
  spanish_quality_summary: 'El español es claro y digno, pero hay una inconsistencia de tratamiento en la misma línea: «tú dijiste» junto con «ustedes». Dado que Judá habla a una sola persona de alto rango, conviene mantener segunda persona singular para el destinatario y plural solo para los hermanos. Además, la ausencia de «con ustedes» deja la oración ligeramente incompleta respecto al original.'
  glossary_alignment: «siervos» para עֲבָדֶיךָ está bien justificado por el contexto cortesano; no hay conflicto con la política general de δοῦλος porque aquí la fuente es hebrea עבד en autodesignación deferente. No hay asuntos teológicos o terminológicos mayores.
  issues:
  - severity: medium
    issue: Falta «con ustedes» en la cláusula condicional.
    rationale: 'אִתְּכֶם es un elemento explícito del hebreo y del POB inglés. Omitirlo reduce la precisión del sentido: no basta con que el hermano baje, sino que baje acompañado por ellos.'
  - severity: medium
    issue: Inconsistencia pronominal entre «tú» y «ustedes».
    rationale: El destinatario singular del discurso directo puede mantenerse como «tú» o elevarse a «usted», pero mezclar «tú dijiste» con referencias internas en plural de cortesía no es el problema; el problema real es que el texto suena menos pulido al no mantener una línea estilística plenamente natural. La revisión propuesta conserva «tú» para el singular y «ustedes» para los hermanos, pero ajusta la frase para mayor fluidez.
  - severity: low
    issue: «su hermano menor» puede sonar ambiguo frente a «your youngest brother».
    rationale: Aunque aceptable, «su hermano más joven» refleja mejor que se trata del menor entre los hermanos, no solo de un hermano más joven que otro.
  revised_spanish_text: 'Y tú dijiste a tus siervos[a]: «Si su hermano más joven no baja con ustedes, no volverán a ver mi rostro[b]»'
  revised_footnotes:
  - marker: a
    text: Lexicalmente, עֲבָדֶיךָ puede traducirse «siervos» o «esclavos». En este contexto de corte y deferencia, «siervos» expresa mejor el tono relacional sin borrar el trasfondo de subordinación.
    reason: lexical_alternative
  - marker: b
    text: O, más idiomáticamente, «no volverán a presentarse ante mí». El hebreo dice literalmente «no añadirán a ver mi rostro», una forma idiomática de negar el acceso futuro.
    reason: lexical_alternative
  revision_rationale: La revisión restaura «con ustedes» para reflejar plenamente אִתְּכֶם, mejora «su hermano menor» a «su hermano más joven» para expresar con más claridad el superlativo implícito, y conserva la imagen hebrea «ver mi rostro» con una nota idiomática alineada con el POB inglés.
