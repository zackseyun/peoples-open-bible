base_translation:
  language: en
  yaml_path: translation/ot/judges/004/015.yaml
  text: And Yahweh threw Sisera[a], all the chariots, and all the army into confusion before Barak by the sword[c][b]. Then Sisera got down from the chariot and fled on foot.
  footnotes:
