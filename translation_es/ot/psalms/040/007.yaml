  text: זֶ֤בַח וּ/מִנְחָ֨ה לֹֽא חָפַ֗צְתָּ אָ֭זְנַיִם כָּרִ֣יתָ לִּ֑/י עוֹלָ֥ה וַ֝/חֲטָאָ֗ה לֹ֣א שָׁאָֽלְתָּ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/040/007.yaml
  text: Sacrifice and offering you did not desire[a]; ears you have opened for me[b]; burnt offering and sin offering you did not ask for.
  footnotes:
  - marker: a
    text: 'Hebrew: ''ears you have dug for me,'' likely an idiom for enabling hearing or obedience; compare ''you have opened my ears.'' The Septuagint, followed in Hebrews 10:5, reads ''a body you prepared for me.'''
    reason: alternative_reading
  - marker: b
    text: Or more specifically, 'grain offering.'
    reason: lexical_alternative
