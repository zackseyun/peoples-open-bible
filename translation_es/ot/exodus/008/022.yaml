translation:
  language: es
  text: 'Pero Moisés dijo[a]: «No sería correcto hacer eso, porque sacrificaríamos a Yahvé nuestro Dios lo que es detestable para los egipcios. Si sacrificamos lo que es detestable para los egipcios delante de sus ojos, ¿no nos apedrearían?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la abominación de los egipcios». La frase probablemente significa lo que los egipcios consideraban abominable u ofensivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  english_pob_choice: it would not be right
  chosen_spanish: no sería correcto
  alternatives_spanish:
  - no sería apropiado
  - no sería adecuado
  - no estaría bien
  lexicon: HALOT
  rationale: נָכוֹן expresa aquí lo que es apropiado, firme o aceptable. En español, «no sería correcto» comunica de manera natural la impropiedad moral y práctica sin endurecer el sentido.
- source_word: לַעֲשׂוֹת כֵּן
  english_pob_choice: to do so
  chosen_spanish: hacer así
  alternatives_spanish:
  - hacer eso
  - actuar de ese modo
  - hacerlo así
  lexicon: HALOT
  rationale: La expresión es idiomática y breve. «Hacer así» conserva la referencia a una acción propuesta sin añadir interpretación extra.
- source_word: תּוֹעֲבַת מִצְרַיִם
  english_pob_choice: what is detestable to the Egyptians
  chosen_spanish: lo que es detestable para los egipcios
  alternatives_spanish:
  - la abominación de los egipcios
  - lo que los egipcios detestan
  lexicon: HALOT
  rationale: La construcción puede entenderse como lo que resulta abominable u ofensivo para ellos. Se prefirió una formulación natural en español que preserve el sentido objetivo y la tensión lexical sin volverla más rígida de lo necesario.
- source_word: נִזְבַּח
  english_pob_choice: we would sacrifice
  chosen_spanish: sacrificaríamos
  alternatives_spanish:
  - sacrificaremos
  - sacrificamos
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea no es un condicional formal, en este contexto expresa una acción hipotética o contemplada. El condicional en español reproduce bien la lógica argumentativa de Moisés.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יהוה: «Yahvé». Aquí el dativo hebreo se vierte naturalmente con «a» en español, manteniendo el nombre divino sin máscara litúrgica.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - nuestro Dios y Dios de nosotros
  lexicon: HALOT
  rationale: Es una posesión covenantal directa y transparente. «Nuestro Dios» conserva el vínculo de pertenencia del hebreo.
- source_word: הֵן
  english_pob_choice: If
  chosen_spanish: si
  alternatives_spanish:
  - he aquí si
  - ciertamente si
  lexicon: HALOT
  rationale: En esta cláusula introduce una condición vívida. «Si» es la opción más natural en español para sostener el argumento hipotético.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  - a la vista de ellos
  lexicon: HALOT
  rationale: El hebreo es idiomático y visual. «Delante de sus ojos» preserva la fuerza concreta de la escena y su carácter provocador.
- source_word: יִסְקְלֻנוּ
  english_pob_choice: will they not stone us?
  chosen_spanish: ¿no nos apedrearían?
  alternatives_spanish:
  - ¿no nos apedrearían con piedras?
  - ¿no nos tirarían piedras hasta matarnos?
  lexicon: HALOT
  rationale: El verbo designa muerte o ataque por apedreamiento. El condicional interrogativo en español transmite bien la pregunta retórica y la posibilidad temida.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El proyecto en español establece «Yahvé» como forma principal para el Tetragrámaton. Se mantiene el nombre propio divino, acorde con la decisión doctrinal de no ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of תּוֹעֲבַת מִצְרַיִם
  english_pob_reading: 'objective sense: what is detestable to the Egyptians'
  chosen_spanish_reading: 'objetivo: lo que es detestable para los egipcios'
  alternative_spanish_readings:
  - la abominación de los egipcios
  - lo que los egipcios detestan
  rationale: La escena explica el peligro de sacrificar animales que los egipcios considerarían ofensivos. La versión española conserva esa lectura objetiva y evita endurecer la frase en un giro demasiado técnico o arcaizante.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene la misma decisión de fondo en la revisión más reciente: no hubo cambios necesarios y la concordancia externa marcó acuerdo alto. La versión española sigue esa línea, conservando la tensión léxica de תּוֹעֲבַת מִצְרַיִם y el tratamiento explícito de יהוה como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar español del proyecto.
  - Se usa «esclavo/siervo» no aplica en este versículo; no se introduce terminología ajena.
  - Se preserva el carácter retórico de la pregunta final con «¿no nos apedrearían?», evitando suavizarla.
  - La nota al pie recoge la alternativa léxica principal sin desplazarla del texto principal.
