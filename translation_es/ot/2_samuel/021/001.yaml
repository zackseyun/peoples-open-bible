    issue: Marcador de nota [a] colocado en la frase equivocada
    rationale: La nota [a] comenta וַיְבַקֵּשׁ ... אֶת־פְּנֵי יְהוָה ('buscó el rostro de Yahvé'), pero en el borrador el marcador está después de 'tres años'. Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: '''Su casa de sangre'' no transmite bien el sentido idiomático de culpabilidad por derramamiento de sangre'
    rationale: El hebreo 'casa de sangres' es un modismo de culpa de sangre. En español, 'casa de sangre' resulta oscuro y puede sugerir violencia genérica o linaje sangriento, en vez de responsabilidad judicial-moral.
  - severity: low
    issue: La nota [b] explica bien el modismo, pero el texto principal puede mejorarse sin perder la referencia idiomática
    rationale: Dado que el inglés POB optó por explicitar 'bloodguilty', el español puede hacer lo mismo con 'casa culpable de sangre' y conservar una nota sobre el hebreo literal.
