translation:
  language: es
  text: Y el Espíritu de Yahvé comenzó a impulsarlo[a] en Mahaneh-dan[b], entre Zora y Estaol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comenzó a moverlo»; también puede implicar agitarlo o impulsarlo interiormente.
    reason: lexical_alternative
  - marker: b
    text: «Mahaneh-dan» significa «campamento de Dan»; aquí funciona como nombre de lugar.
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: El hebreo expresa un inicio de acción (valor incoativo). «Comenzó» mantiene ese matiz de comienzo natural en español sin cargar la frase con una explicación adicional.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el viento de Yahvé
  lexicon: HALOT
  rationale: En este contexto narrativo, la expresión designa la presencia activa y capacitadota de Dios sobre Sansón. «Espíritu» conserva el sentido personal y teológico; se capitaliza por tratarse del Espíritu divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre del pacto y evita el encubrimiento convencional con «SEÑOR».
- source_word: לְפַעֲמוֹ
  english_pob_choice: to stir him
  chosen_spanish: a impulsarlo
  alternatives_spanish:
  - a moverlo
  - a estimularlo
  - a inquietarlo
  lexicon: HALOT
  rationale: El verbo puede expresar impulso, movimiento o agitación. «Impulsarlo» comunica bien la acción iniciada por el Espíritu sin sugerir necesariamente alteración emocional o perturbación, y conserva la fuerza dinámica del hebreo.
- source_word: בְּמַחֲנֵה דָן
  english_pob_choice: in Mahaneh-dan
  chosen_spanish: en Mahane-dan
  alternatives_spanish:
  - en el campamento de Dan
  lexicon: HALOT
  rationale: Se trata aquí de un topónimo ya fijado en el relato. La transliteración mantiene su valor de nombre propio, mientras que la nota aclara su significado literal.
- source_word: בֵּין צָרְעָה וּבֵין אֶשְׁתָּאֹל
  english_pob_choice: between Zorah and Eshtaol
  chosen_spanish: entre Zora y Estaol
  alternatives_spanish:
  - entre Zorá y Eshtaol
  lexicon: HALOT
  rationale: Se conservan los nombres geográficos con una transliteración española natural y reconocible. Se evita una forma excesivamente castellanizada que podría alejarse del uso bíblico habitual.
theological_decisions:
- issue: Naturaleza de «רוּחַ יְהוָה» en Jueces 13:25
  english_pob_reading: the Spirit of Yahweh as divine empowering presence
  chosen_spanish_reading: el Espíritu de Yahvé como presencia divina que lo impulsa
  alternative_spanish_readings:
  - el Espíritu de Yahvé
  - el viento de Yahvé
  - el soplo de Yahvé
  rationale: En el contexto de Sansón, la frase no describe viento físico sino la acción capacitadora de Dios. «Impulsa» conserva el efecto operativo sobre el personaje sin introducir una explicación doctrinal ajena al pasaje.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: La lectura del proyecto favorece la transliteración del Nombre divino, no su sustitución por un título. Esto mantiene la distinción entre nombre propio y designación reverencial.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia y no registra revisiones aplicadas en este versículo; por eso la redacción española sigue de cerca la lectura establecida, con una única decisión de estilo para hacer natural «to stir him» como «a impulsarlo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se capitaliza «Espíritu» por referirse al Espíritu divino en contexto.
  - La transliteración de los topónimos sigue una forma breve y legible en español, sin traducir el nombre propio de lugar.
