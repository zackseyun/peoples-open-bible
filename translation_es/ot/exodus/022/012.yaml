translation:
  language: es
  text: Pero si es despedazado por bestias[a], lo traerá como prueba; no hará restitución por lo que fue despedazado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Si en verdad es despedazado, traerá el animal despedazado como prueba; no pagará".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En la serie casuística del derecho pactal, "pero" marca bien la continuación contrastiva respecto del caso previo. "Si" por sí solo también sería posible, pero "pero si" refleja mejor el giro adversativo que el inglés POB documentó.
- source_word: טָרֹף יִטָּרֵף
  english_pob_choice: it is torn by beasts
  chosen_spanish: es despedazado por bestias
  alternatives_spanish:
  - es hecho pedazos
  - es despedazado
  - es presa de bestias
  lexicon: HALOT
  rationale: El hebreo intensifica la acción con infinitivo absoluto + verbo finito; el español debe preservar la fuerza resultativa sin añadir "truly/indeed". "Despedazado por bestias" comunica el escenario legal de manera natural y específica, sin exagerar el texto.
- source_word: יְבִאֵהוּ
  english_pob_choice: he shall bring it
  chosen_spanish: lo traerá
  alternatives_spanish:
  - lo presentará
  - deberá traerlo
  lexicon: HALOT
  rationale: El verbo causativo aquí significa llevar/presentar el objeto. "Lo traerá" es directo y fiel; "presentará" sería más jurídico pero menos transparente en español común.
- source_word: עֵד
  english_pob_choice: as evidence
  chosen_spanish: como evidencia
  alternatives_spanish:
  - como prueba
  - como testimonio
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar "testigo" o "testimonio", en este contexto forense el objeto mutilado funciona como prueba material. "Evidencia" conserva esa función sin forzar la imagen de una persona-testigo.
- source_word: הַטְּרֵפָה
  english_pob_choice: what was torn
  chosen_spanish: lo que fue despedazado
  alternatives_spanish:
  - el animal despedazado
  - la víctima despedazada
  - lo despedazado
  lexicon: HALOT
  rationale: El hebreo nombra "lo desgarrado/despedazado" de forma compacta. "Lo que fue despedazado" mantiene esa generalidad y evita especificar más de lo que el texto dice.
- source_word: לֹא יְשַׁלֵּם
  english_pob_choice: he shall not make restitution
  chosen_spanish: no hará restitución
  alternatives_spanish:
  - no pagará
  - no compensará
  - no devolverá el valor
  lexicon: HALOT
  rationale: En contexto legal, שלם en pi‘el expresa compensación/reparación formal. "Hacer restitución" preserva el matiz jurídico mejor que un simple "pagar".
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se omitió cualquier intensificador no atestiguado (''truly/indeed'') y se mantuvo la estructura legal condicional con un verbo causativo de traer/presentar y una negativa de restitución. La nota alternativa conserva la posibilidad de una formulación más explícitamente forense sin sobretraducir el hebreo.'
  spanish_consistency_notes:
  - Se mantiene "evidencia" para עֵד en sentido forense, coherente con el valor contextual del sustantivo.
  - Se usa "restitución" para יְשַׁלֵּם dentro de lenguaje jurídico, evitando reducirlo a mero "pagar".
  - '"Despedazado por bestias" conserva la imagen animal implícita en טרף sin añadir un adverbio intensificador no presente en el hebreo.'
