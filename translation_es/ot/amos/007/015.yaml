translation:
  language: es
  text: 'Pero Yahvé me tomó de seguir al rebaño[a], y Yahvé me dijo: «Ve[b], profetiza a mi pueblo Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de detrás del rebaño», más literalmente, reflejando el modismo hebreo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «a mi pueblo Israel»; en contexto el mensaje profético incluye juicio, pero el versículo mismo no dice explícitamente «contra».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּחֵנִי
  english_pob_choice: took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me arrebató
  - me agarró
  lexicon: HALOT
  rationale: לקח aquí expresa que Yahvé sacó a Amós de su ocupación anterior para llamarlo al ministerio profético. «Me tomó» conserva la sencillez y la dirección del acto sin forzar una idea de violencia que el contexto no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrámaton en la forma de POB «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מֵאַחֲרֵי הַצֹּאן
  english_pob_choice: from following the flock
  chosen_spanish: de detrás del rebaño
  alternatives_spanish:
  - de seguir al rebaño
  - de detrás del ganado menor
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de detrás del rebaño». En español, «de detrás del rebaño» refleja con mayor transparencia el modismo original y conserva la nota espacial/ocupacional que el inglés POB quiso preservar. Se evita una versión más interpretativa que suavice la imagen.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - las ovejas
  - el ganado menor
  lexicon: HALOT
  rationale: צאן designa colectivamente animales de pastoreo; «rebaño» es el equivalente natural en español y mantiene el valor colectivo mejor que «ovejas».
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me habló y dijo
  lexicon: HALOT
  rationale: אמר + אל se traduce de manera directa y natural con «me dijo», sin añadir matices que el hebreo no exige.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo de הלך se rinde con el imperativo simple «Ve», que conserva la fuerza comisional y suena natural en español.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla como profeta
  - declara proféticamente
  lexicon: HALOT
  rationale: El nifal imperativo de נבא se expresa de forma idiomática con «profetiza», equivalente usual y preciso en español bíblico contemporáneo.
- source_word: אֶל עַמִּי יִשְׂרָאֵל
  english_pob_choice: to my people Israel
  chosen_spanish: a mi pueblo Israel
  alternatives_spanish:
  - contra mi pueblo Israel
  - para mi pueblo Israel
  lexicon: HALOT
  rationale: Se conserva la preposición de dirección con «a», que corresponde al valor básico de אֶל. Aunque el contexto profético incluye juicio, el hebreo no dice explícitamente «contra» en este versículo, por lo que no debe importarse ese matiz al texto base.
theological_decisions:
- issue: Renderizado del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo contiene directamente el Tetragrámaton; POB lo vierte con el nombre propio divino y no como sustitución reverencial. En español, «Yahvé» preserva esa decisión y evita la ocultación del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Dirección de la comisión profética hacia Israel
  english_pob_reading: to my people Israel
  chosen_spanish_reading: a mi pueblo Israel
  alternative_spanish_readings:
  - contra mi pueblo Israel
  rationale: La preposición hebrea אֶל normalmente significa «a». Dado que el texto no usa una preposición hostil, la traducción mantiene el mandato como envío a Israel, dejando el tono de juicio al contexto más amplio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del texto hebreo masorético con alta concordancia respecto del audit trail inglés; no se documentaron revisiones que alteren el sentido, y la traducción conserva las decisiones léxicas y teológicas ya acordadas.
  spanish_consistency_notes:
  - Se usa consistentemente «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Rebaño» traduce de forma natural y colectiva צאן, evitando pluralizar innecesariamente.
  - «Profetiza» mantiene el verbo profético directo sin paráfrasis.
  - La nota [a] preserva la alternativa más literal del modismo hebreo sin recargar el texto principal.
  - La nota [b] evita importar el matiz de hostilidad al valor preposicional de אֶל.
