translation:
  language: es
  text: Entonces el hombre quedará libre de culpa[a], pero aquella mujer llevará su culpa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el esposo quedará libre de culpa».
    reason: lexical_alternative
  - marker: b
    text: O «llevará su iniquidad»; el idiomatismo hebreo también puede implicar llevar las consecuencias de la culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקָּה
  english_pob_choice: will be free
  chosen_spanish: quedará libre
  alternatives_spanish:
  - será absuelto
  - quedará limpio
  - será libre
  lexicon: HALOT
  rationale: El nifal de נקה comunica ser limpiado, descargado o exento de responsabilidad. «Quedará libre» conserva la idea de liberación de culpa o responsabilidad y suena natural en español bíblico moderno.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el esposo
  lexicon: HALOT
  rationale: אִישׁ significa literalmente «hombre». Aunque el contexto se refiere al esposo, «el hombre» sigue más de cerca el término hebreo y mantiene la formulación formal del texto base.
- source_word: מֵעָוֺן
  english_pob_choice: from guilt
  chosen_spanish: de culpa
  alternatives_spanish:
  - de iniquidad
  - de culpa o responsabilidad
  - de la culpa
  lexicon: HALOT
  rationale: עָוֹן puede expresar culpa, iniquidad o la responsabilidad derivada del mal. «Culpa» comunica bien la carga moral-jurídica del pasaje en español contemporáneo sin introducir arcaísmo.
- source_word: וְהָאִשָּׁה הַהִוא
  english_pob_choice: but that woman
  chosen_spanish: pero aquella mujer
  alternatives_spanish:
  - y aquella mujer
  - mientras aquella mujer
  lexicon: HALOT
  rationale: El hebreo contrapone el estado del hombre con el de la mujer. «Pero» hace explícita la oposición implícita en la secuencia, y «aquella mujer» refleja el énfasis del demostrativo.
- source_word: תִּשָּׂא אֶת עֲוֺנָהּ
  english_pob_choice: will bear her guilt
  chosen_spanish: llevará su culpa
  alternatives_spanish:
  - llevará su iniquidad
  - cargará con su culpa
  - soportará las consecuencias de su culpa
  lexicon: HALOT
  rationale: La expresión נשׂא עָוֹן suele significar llevar la culpa o la responsabilidad por el mal. «Llevará su culpa» conserva la brevedad idiomática y la relación con el primer miembro del verso.
theological_decisions:
- issue: Cómo rendir עָוֹן en ambos miembros del verso
  english_pob_reading: Render as 'guilt' in both occurrences to preserve the legal-moral parallel between the man's exoneration and the woman's liability.
  chosen_spanish_reading: «culpa» en ambos miembros, para mantener el paralelismo entre la exoneración del hombre y la responsabilidad de la mujer.
  alternative_spanish_readings:
  - iniquidad
  - castigo por la iniquidad
  - responsabilidad
  rationale: Mantener «culpa» en ambos lados preserva la simetría legal-moral del hebreo y evita que el segundo miembro se vuelva demasiado interpretativo. La frase sigue siendo clara en español y no borra la tensión entre exoneración y carga de culpa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional; por eso esta propuesta sigue de cerca el acuerdo alto con el texto fuente y la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «culpa» de forma consistente para עָוֹן en ambos miembros del verso.
  - Se conserva la oposición marcada por «pero» para reflejar el contraste del hebreo.
  - «Aquella mujer» preserva la referencia demostrativa sin volverla innecesariamente explícita.
