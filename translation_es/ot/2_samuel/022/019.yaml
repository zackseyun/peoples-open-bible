translation:
  language: es
  text: Me enfrentaron[a] en el día de mi calamidad, pero Yahvé fue mi apoyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me salieron al paso», «vinieron sobre mí» o «me encontraron» en el día de mi calamidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקַדְּמֻנִי
  english_pob_choice: They confronted me
  chosen_spanish: me salieron al encuentro
  alternatives_spanish:
  - me confrontaron
  - me encontraron
  - me salieron al paso
  lexicon: HALOT
  rationale: El verbo puede expresar venir antes de alguien o encontrarse con alguien; en este contexto hostil, la idea es adversativa. En español, «me salieron al encuentro» conserva el choque del encuentro sin sonar tan abstracto como «confrontaron», y evita forzar un matiz técnico no explicitado por el hebreo.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - en aquel día de
  lexicon: HALOT
  rationale: La preposición temporal se mantiene de forma directa para preservar el giro hebreo y la relación con el sustantivo siguiente.
- source_word: אֵידִי
  english_pob_choice: my calamity
  chosen_spanish: mi calamidad
  alternatives_spanish:
  - mi desastre
  - mi desgracia
  - mi aflicción
  lexicon: HALOT
  rationale: «Calamidad» comunica ruina o desgracia grave sin reducir el término a un estado interno, y sigue de cerca la opción auditada en inglés.
- source_word: וַיְהִי
  english_pob_choice: but ... was
  chosen_spanish: pero ... fue
  alternatives_spanish:
  - y ... fue
  - y ... era
  lexicon: HALOT
  rationale: Aunque el hebreo usa una simple coordinación verbal, el contraste del contexto favorece una relación adversativa en español. «Pero» reproduce bien la tensión entre la amenaza y el auxilio divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política terminológica del proyecto pide «Yahvé» como forma española del nombre divino. Se evita la sustitución por un título para mantener el nombre propio revelado en el texto fuente.
- source_word: מִשְׁעָן
  english_pob_choice: my support
  chosen_spanish: mi apoyo
  alternatives_spanish:
  - mi sostén
  - mi soporte
  - mi bastón
  lexicon: HALOT
  rationale: El sustantivo describe algo en lo que uno se apoya. «Apoyo» transmite de forma natural la metáfora de sostén personal, sin introducir un objeto demasiado concreto como «bastón».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene el Tetragrámaton y la línea editorial del proyecto pide verterlo como «Yahvé» en el texto principal. Esto preserva el nombre personal de Dios y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el análisis auditado en inglés: la secuencia describe un encuentro hostil en el día de la calamidad del hablante, seguido por un contraste con la acción protectora de Yahvé. No se detectaron revisiones pendientes en el registro fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para YHWH, conforme al criterio del proyecto.
  - Se evitó «Señor» como sustituto del nombre divino.
  - «Apoyo» refleja el valor metafórico de מִשְׁעָן sin volverlo demasiado literal.
  - La nota textual queda anclada solo en la frase que admite alternativas léxicas en español.
