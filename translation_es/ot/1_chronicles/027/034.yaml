revisions:
- from: Después de Ahitofel, Jehoiada hijo de Benaía y Abiatar[a]; y Joab era comandante del ejército para el rey.
  to: Después de Ahitofel vinieron Jehoiada hijo de Benaía y Abiatar[a]; Joab fue comandante del ejército para el rey.
  rationale: Se añade un verbo mínimo en la primera cláusula para reflejar la decisión ya documentada en el POB inglés de hacer explícita la sucesión implícita del hebreo, mejorando así la naturalidad del español sin cambiar el sentido. También se ajusta «era» a «fue» para una identificación más adecuada del cargo en esta lista administrativa, y se suaviza la puntuación.
