translation:
  language: es
  text: Mi alma se acercó a la muerte[a], y mi vida a las profundidades del Seol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tocó la muerte». El verbo hebreo es literalmente «tocar/alcanzar», pero aquí probablemente significa «acercarse», como muestra el paralelo griego «se acercó a la muerte».'
    reason: lexical_alternative
  - marker: b
    text: «Seol» es el término hebreo para la esfera de los muertos; el paralelo griego tiene «Hades abajo».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּגַּע / ἤγγισεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - tocó
  - llegó
  lexicon: HALOT; Greek ἤγγισεν
  rationale: El hebreo נגע puede significar literalmente 'tocar' o 'alcanzar', pero aquí con לַמָּוֶת expresa proximidad a la muerte, no contacto físico. 'Se acercó' transmite esa cercanía en español natural y refleja bien el paralelo griego ἤγγισεν ('se acercó').
- source_word: נַפְשִׁי / ἡ ψυχή μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT; LXX ψυχή
  rationale: '''Alma'' preserva el paralelismo poético con ''mi vida'' en la segunda cola y mantiene la flexibilidad semántica de נפש, que puede abarcar alma, vida o persona. ''Mi vida'' en ambos miembros aplanaría la figura poética.'
- source_word: חַיָּתִי / ἡ ζωὴ μου
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser vivo
  - mi alma
  lexicon: HALOT; LXX ζωή
  rationale: La palabra denota la vida del hablante o su fuerza vital. 'Mi vida' es la forma más clara y directa en español, y coincide con el paralelo griego ἡ ζωή μου.
- source_word: לִשְׁאוֹל / ᾅδου
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Hades
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT; LXX ᾅδης
  rationale: Se conserva el término hebreo como 'Seol' porque el testimonio hebreo es առաջնario donde está disponible y porque el propio audit trail inglés opta por transliterarlo. 'Hades' aparece en el griego, pero en español 'Seol' evita cargar el verso con asociaciones mitológicas ajenas al hebreo.
- source_word: תַּחְתִּיּוֹת / κάτω
  english_pob_choice: the depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - las regiones inferiores
  - lo más hondo
  lexicon: HALOT; Greek κάτω
  rationale: El plural intensivo apunta a lo más hondo o a las regiones más bajas. 'Las profundidades' conserva ese valor intensivo y funciona con naturalidad como complemento de 'Seol'.
theological_decisions:
- issue: Cómo traducir שְׁאוֹל en una sección deuterocanónica con paralelo griego ᾅδης
  english_pob_reading: Sheol; the Greek parallel has 'Hades below' but does not require replacing the Hebrew concept
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - Hades
  - el sepulcro
  - el reino de los muertos
  rationale: Se mantiene el concepto hebreo en transliteración para respetar la primacía del testimonio hebreo y no importar una carga doctrinal más específica que la del texto. El griego confirma el sentido general de la esfera de los muertos, pero no obliga a sustituir el término hebreo.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El pasaje se mantiene conforme al último pase de revisión, que indicó que no eran necesarios cambios adicionales y confirmó acuerdo alto entre hebreo y griego.
  spanish_consistency_notes:
  - Se conserva «Seol» de manera consistente para el término hebreo del ámbito de los muertos.
  - Se usa «alma» para נַפְשִׁי y «vida» para חַיָּתִי para reflejar el paralelismo poético sin homogeneizar ambos miembros.
  - La estructura en dos colonas reproduce el paralelismo del original y del audit trail en inglés.
