translation:
  language: es
  text: Estoy angustiado por ti[a], hermano mío, Jonatán; me fuiste muy grato. Tu amor por mí fue maravilloso, superando el amor de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más que el amor de las mujeres» o «el amor de las mujeres». La comparación hebrea es poética y no especifica por sí misma la naturaleza exacta de la comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי עָלֶיךָ
  english_pob_choice: I am distressed over you
  chosen_spanish: Estoy angustiado por ti
  alternatives_spanish:
  - Estoy en angustia por ti
  - Te lloro con dolor
  lexicon: HALOT
  rationale: El valor del predicado expresa aflicción personal y duelo. 'Angustiado' conserva el peso lamentativo sin suavizarlo ni introducir una paráfrasis excesiva. 'Por ti' reproduce el sentido relacional de עַל en contexto de lamentación.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  - hermano mío
  lexicon: HALOT
  rationale: Se mantiene 'hermano' de manera literal, preservando el vínculo afectivo y de pacto que el texto expresa sin reinterpretarlo.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Convención onomástica española
  rationale: Se usa la forma española estándar del nombre propio, inteligible y reconocible en lectura eclesial.
- source_word: נָעַמְתָּ לִּי מְאֹד
  english_pob_choice: you were very pleasant to me
  chosen_spanish: muy amable fuiste para mí
  alternatives_spanish:
  - muy agradable fuiste para mí
  - muy grato fuiste para mí
  lexicon: HALOT
  rationale: '''Amable'' en español puede expresar trato benévolo, agradable y placentero; aquí evita una sonoridad demasiado fría de ''agradable'' y no sugiere romanticismo. El orden invertido responde a la naturalidad del español poético.'
- source_word: נִפְלְאָתָה
  english_pob_choice: was wonderful
  chosen_spanish: fue maravilloso
  alternatives_spanish:
  - fue admirable
  - fue extraordinario
  lexicon: HALOT
  rationale: '''Maravilloso'' comunica el carácter extraordinario del amor sin perder el tono laudatorio. Conserva el predicado evaluativo del hebreo.'
- source_word: אַהֲבָתְךָ לִי
  english_pob_choice: Your love to me
  chosen_spanish: tu amor para mí
  alternatives_spanish:
  - tu amor por mí
  - tu amor hacia mí
  lexicon: HALOT
  rationale: Se mantiene la relación direccional del hebreo ('a/para mí') como en la POB inglesa, sin forzar una formulación más idiomática que borre la estructura original.
- source_word: מֵאַהֲבַת נָשִׁים
  english_pob_choice: surpassing the love of women
  chosen_spanish: superando el amor de las mujeres
  alternatives_spanish:
  - más que el amor de las mujeres
  - sobrepasando el amor de las mujeres
  lexicon: HALOT
  rationale: '''Superando'' reproduce la comparación de superioridad sin aclararla en exceso. ''El amor de las mujeres'' se mantiene literal para preservar la tensión interpretativa documentada por la POB inglesa.'
theological_decisions:
- issue: Naturaleza de la comparación con 'el amor de las mujeres'
  english_pob_reading: Retain the literal comparative statement without specifying sexual, romantic, or merely platonic categories.
  chosen_spanish_reading: Mantener la comparación literal sin precisar si se trata de amor romántico, sexual o solo afectivo.
  alternative_spanish_readings:
  - El amor de Jonatán superó el afecto que dan las mujeres
  - El amor de Jonatán fue más fuerte que el amor conyugal
  rationale: El hebreo y la auditoría inglesa no resuelven la categoría del amor comparado. La traducción española conserva esa tensión en vez de cerrarla con una interpretación moderna.
  doctrine_reference: Preservar la tensión teológica e interpretativa; no resolverla en el texto principal.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'beyond' por 'surpassing' para hacer más natural y precisa la comparación; la línea española refleja esa precisión con 'superando' en el texto principal y conserva la alternativa comparativa literal en nota.
  spanish_consistency_notes:
  - Se usa 'Jonatán' como forma española habitual del nombre.
  - Se mantiene 'amor de las mujeres' de manera literal para no borrar la ambigüedad interpretativa del hebreo.
  - La sintaxis se adapta al español poético sin cambiar el contenido semántico del lamento.
  - No se introduce 'SEÑOR' ni terminología eclesiástica no presente en el versículo.
