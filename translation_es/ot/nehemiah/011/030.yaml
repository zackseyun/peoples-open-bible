translation:
  language: es
  text: Zanoaj, Adulam y sus aldeas, Laquis y sus campos, Azeca y sus ciudades hijas[a]. Así acamparon[b] desde Beerseba hasta el valle de Hinom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus aldeas» / «sus poblados dependientes» para «sus ciudades hijas».
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede renderizarse «acamparon» o, por extensión en este contexto, «se establecieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנֹחַ
  english_pob_choice: Zanoah
  chosen_spanish: Zanoaj
  alternatives_spanish:
  - Zanoa
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en español para mantener la referencia geográfica y la auditabilidad con la forma inglesa del POB.
- source_word: עֲדֻלָּם
  english_pob_choice: Adullam
  chosen_spanish: Adulam
  alternatives_spanish:
  - Adullán
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva en forma transliterada, adaptada a la ortografía española más natural y reconocible.
- source_word: חַצְרֵיהֶם
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus asentamientos
  - sus poblados
  - sus dependencias rurales
  lexicon: HALOT
  rationale: En listas geográficas, חָצֵר alude a dependencias rurales ligadas a una ciudad. "Aldeas" comunica bien la idea sin el falso amigo de "patios" o "corrales".
- source_word: לָכִישׁ
  english_pob_choice: Lachish
  chosen_spanish: Laquis
  alternatives_spanish:
  - Lakis
  lexicon: HALOT
  rationale: Nombre propio de lugar; se traduce por transliteración estándar en español.
- source_word: שְׂדֹתֶיהָ
  english_pob_choice: its fields
  chosen_spanish: sus campos
  alternatives_spanish:
  - su territorio
  - su campo
  - su campiña
  lexicon: HALOT
  rationale: שָׂדֶה significa literalmente "campo". En este catálogo urbano, "campos" mantiene el sentido concreto de tierras de labor asociadas a la ciudad.
- source_word: עֲזֵקָה
  english_pob_choice: Azekah
  chosen_spanish: Azeca
  alternatives_spanish:
  - Aseca
  lexicon: HALOT
  rationale: Nombre propio de lugar; transliteración española estándar.
- source_word: בְנֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus pueblos hijos
  - sus aldeas dependientes
  - sus poblados dependientes
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de "hijas" para asentamientos subordinados. "Ciudades hijas" refleja el vínculo jerárquico sin borrar la imagen original; la alternativa más llana quedaría en nota si se necesitara.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se establecieron
  - se asentaron
  lexicon: HALOT
  rationale: חנה significa literalmente "acampar". En este contexto de redistribución territorial, el verbo puede sugerir residencia, pero "acamparon" conserva la base léxica sin forzar la interpretación.
- source_word: מִבְּאֵר שֶׁבַע
  english_pob_choice: from Beer-sheba
  chosen_spanish: desde Beerseba
  alternatives_spanish:
  - desde Beer-seba
  - desde Beersheba
  lexicon: HALOT
  rationale: Nombre propio ampliamente conocido; se usa la forma española tradicional y se ajusta la preposición para una lectura geográfica natural.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - así como hasta
  lexicon: HALOT
  rationale: Marca extensión espacial; "hasta" es la forma natural en español y conserva el alcance del recorrido.
- source_word: גֵּיא הִנֹּם
  english_pob_choice: the Valley of Hinnom
  chosen_spanish: el valle de Hinón
  alternatives_spanish:
  - el Valle de Hinom
  - el valle de Hinom
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico en transliteración española. "Valle" traduce גֵּיא y se conserva la referencia topográfica conocida.
theological_decisions:
- issue: ¿"ciudades hijas" debe suavizarse a una expresión más interpretativa?
  english_pob_reading: The POB preserves the Hebrew metaphor 'daughter towns' and notes the lexical alternative 'villages' / 'dependent towns'.
  chosen_spanish_reading: sus ciudades hijas
  alternative_spanish_readings:
  - sus aldeas
  - sus poblados dependientes
  rationale: La metáfora hebrea forma parte del dato geográfico y no se debe borrar. En español, "ciudades hijas" conserva la relación de dependencia sin sustituirla por una paráfrasis plana; la nota puede ofrecer la alternativa más llana.
  doctrine_reference: Principio de preservación de imágenes del texto base y del marco geográfico bíblico.
translation_notes:
  revision_awareness: Se revisó el estado más reciente del POB en inglés, que permanece sin cambios sustantivos y con valoración de alta concordancia; la versión española sigue esa línea, conservando los nombres propios, la metáfora de "hijas" y el valor básico de חנה como "acampar".
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se conserva la metáfora geográfica hebrea de asentamientos subordinados con "ciudades hijas"; si el lector necesita una lectura más llana, la nota ofrece la alternativa.
  - La toponimia se adapta a formas españolas corrientes sin perder la transliteración identificable con el texto fuente.
