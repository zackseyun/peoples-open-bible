review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: sujetos paralelos, oposición adversativa con contra, Yahvé por יְהוָה, y su Ungido por מְשִׁיחוֹ según la revisión inglesa auditada. Sin embargo, se debilita el matiz deliberado y confrontativo de יִתְיַצְּבוּ con se ponen en pie, que en español suena más a levantarse que a tomar posición. También se pierde la fuerza de יָחַד en el texto principal, pues se traduce solo se reúnen y se deja juntos únicamente en nota.'
  spanish_quality_summary: El texto es claro y legible, con registro digno y natural. No obstante, se ponen en pie resulta menos idiomático para este contexto de desafío político que se levantan o toman posición, y la omisión de juntos en el cuerpo reduce la plenitud semántica. Las notas son comprensibles, pero la de b introduce se reúnen juntos, formulación poco elegante en español; conviene ofrecer alternativas más naturales.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: Yahvé está correctamente usado; Ungido encaja con la revisión inglesa auditada y con la racionalidad léxica documentada; gobernantes para רוֹזְנִים y contra para עַל son adecuados. La principal corrección es estilístico-semántica en יִתְיַצְּבוּ y la explicitación de יָחַד.'
  issues:
