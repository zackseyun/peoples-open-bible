translation:
  language: es
  text: Líbrame[a] de los malhechores, y sálvame de los hombres de sangre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescátame», con el matiz de sacarme de un peligro.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hombres de sangre», es decir, hombres sanguinarios o culpables de derramamiento de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sácame
  lexicon: HALOT
  rationale: El imperativo de נצל pide una acción de rescate/liberación. «Líbrame» es natural en español bíblico y conserva la fuerza de ser sacado del peligro sin calcar de manera rígida el inglés.
- source_word: מִפֹּעֲלֵי אָוֶן
  english_pob_choice: from evildoers
  chosen_spanish: de los que hacen maldad
  alternatives_spanish:
  - de los malhechores
  - de los hacedores de maldad
  - de los evildoers
  lexicon: HALOT
  rationale: El participio plural de פעל con אָוֶן puede entenderse literalmente como «los que hacen maldad/iniquidad». Opto por una frase española transparente que preserve el carácter agentivo del hebreo sin introducir un término eclesiástico ajeno.
- source_word: וּמֵאַנְשֵׁי
  english_pob_choice: and from men of
  chosen_spanish: y de los hombres de
  alternatives_spanish:
  - y de los varones de
  - y de las personas de
  lexicon: HALOT
  rationale: אַנְשֵׁי es constructo plural masculino; mantener «hombres» conserva la marca gramatical y el referente masculino contextual que el POB inglés también preserva.
- source_word: דָמִים
  english_pob_choice: bloodshed
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - sangre derramada
  - violencia
  lexicon: HALOT
  rationale: דָמִים es un plural idiomático ligado a sangre culpable o derramada. En español, «hombres de sangre» mantiene la textura del modismo; la nota aclara su sentido de violencia y derramamiento de sangre.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - vívame
  - hazme salvo
  lexicon: HALOT
  rationale: ישׁע expresa salvar/liberar. «Sálvame» es el equivalente más directo y idiomático en español, adecuado para una súplica de peligro inmediato.
theological_decisions:
- issue: Conservar el modismo hebreo דָמִים sin neutralizarlo
  english_pob_reading: men of blood / men of bloodshed
  chosen_spanish_reading: hombres de sangre
  alternative_spanish_readings:
  - hombres sanguinarios
  - hombres de derramamiento de sangre
  rationale: El POB inglés conserva la imagen bíblica con una aclaración en nota. En español, «hombres de sangre» reproduce el modismo de forma transparente; la nota explica que se trata de hombres sanguinarios o culpables de derramamiento de sangre.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Mantener el masculino plural de אַנְשֵׁי
  english_pob_reading: men of bloodshed
  chosen_spanish_reading: los hombres de sangre
  alternative_spanish_readings:
  - las personas de sangre
  - los violentos
  rationale: El hebreo es masculino y describe adversarios humanos concretos. No se neutraliza el género donde el texto lo marca, para conservar la correspondencia formal y la referencia contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción sigue el último estado de revisión del POB inglés, que prefirió una equivalencia más natural («evildoers», «men of bloodshed») sin perder el trasfondo hebreo. La versión española mantiene esa misma tensión: fluidez pública en el texto principal y conservación del modismo en una nota explicativa.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal del hebreo con dos imperativos: «Líbrame» / «sálvame».'
  - No se usa «SEÑOR» ni terminología litúrgica no requerida, porque el versículo no contiene el nombre divino.
  - «Maldad» se elige como equivalente funcional de אָוֶן en este contexto moral, sin forzar «iniquidad» como término más técnico.
  - La nota sobre «hombres de sangre» evita perder la carga idiomática del plural hebreo דָמִים.
