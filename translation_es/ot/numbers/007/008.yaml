translation:
  language: es
  text: Y dio las cuatro carretas[a] y los ocho bueyes a los hijos de Merari, conforme a su servicio, bajo la dirección de Itamar[b], hijo de Aarón, el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Carretas'' traduce el vehículo con ruedas; también puede entenderse como ''carros''.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por la mano de Itamar', un hebraísmo que indica agencia o supervisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲגָלֹת
  english_pob_choice: carts
  chosen_spanish: carretas
  alternatives_spanish:
  - carros
  - carruajes
  - carretas de carga
  lexicon: HALOT
  rationale: עֲגָלָה nombra un vehículo con ruedas; en español, 'carretas' comunica de forma natural un vehículo de transporte y mantiene el matiz de carga/tabernáculo. 'Carros' puede sonar demasiado general o moderno; 'carruajes' sería más literario y menos preciso.
- source_word: הַבָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: El contexto es de animales para arrastrar las carretas, así que el español más natural y específico es 'bueyes'. 'Ganado' es demasiado amplio; 'toros' no expresa tan bien el animal de tiro.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - asignó
  lexicon: HALOT
  rationale: El verbo básico es 'dar'. En español, 'dio' preserva la sencillez del hebreo sin convertir de entrada la acción en una interpretación administrativa más fuerte.
- source_word: לִבְנֵי מְרָרִי
  english_pob_choice: to the sons of Merari
  chosen_spanish: a los hijos de Merari
  alternatives_spanish:
  - a los meraritas
  - a los descendientes de Merari
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica literal del hebreo. 'Hijos de Merari' es clara y suficientemente formal; 'meraritas' sería más idiomático pero menos transparente al dato textual.
- source_word: כְּפִי עֲבֹדָתָם
  english_pob_choice: according to their service
  chosen_spanish: conforme a su servicio
  alternatives_spanish:
  - según su servicio
  - de acuerdo con su labor
  - proporcionalmente a su servicio
  lexicon: HALOT
  rationale: '''Conforme a'' reproduce bien el sentido de ''según/en proporción a'' sin exagerar el matiz. ''Servicio'' conserva el lenguaje cultual del hebreo, más preciso que ''trabajo'' en este contexto.'
- source_word: בְּיַד אִיתָמָר
  english_pob_choice: under the direction of Ithamar
  chosen_spanish: bajo la dirección de Itamar
  alternatives_spanish:
  - por mano de Itamar
  - bajo la supervisión de Itamar
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica supervisión o agencia. 'Bajo la dirección de' comunica esa función con naturalidad en español y evita una traducción demasiado literal que sonaría extraña.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote Aarón
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''El sacerdote'' es la forma natural para el título apposicional que identifica a Aarón. Se evita redundar con ''Aarón el sacerdote'' como posesión o cargo distinto; la coma mantiene la apposición.'
theological_decisions:
- issue: Naturaleza de la asignación de los vehículos y animales
  english_pob_reading: gave / under the direction of Ithamar
  chosen_spanish_reading: dio ... bajo la dirección de Itamar
  alternative_spanish_readings:
  - entregó ... bajo la supervisión de Itamar
  - asignó ... por medio de Itamar
  rationale: El hebreo usa un verbo simple de dar, seguido de una idiomática 'por la mano de Itamar'. En español se conserva la acción básica ('dio') y se explicita la supervisión ('bajo la dirección de') sin añadir un grado de interpretación mayor que el requerido por el texto.
  doctrine_reference: Administración sacerdotal del culto y organización levítica (Núm. 7)
translation_notes:
  revision_awareness: 'La revisión más reciente del testigo inglés indica que no hubo cambios sustantivos y que la concordancia con la fuente es alta. Por ello, el español sigue de cerca la solución inglesa auditable: verbo simple (''dio''), objeto concreto (''carretas'', ''bueyes'') y explicación idiomática de בְּיַד mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Itamar'' conserva la forma española estándar del nombre propio.'
  - Se usa 'hijos de Merari' para mantener la transparencia genealógica del hebreo.
  - '''Sacerdote'' se deja en singular y con artículo definido, en apposición a Aarón.'
