translation:
  language: es
  text: Por eso mi corazón gime por Moab como flautas[a], y mi corazón gime como flautas por los hombres de Kir-heres[b], porque la abundancia que ellos adquirieron[c] ha perecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “como pitos”. El hebreo designa un instrumento de viento asociado especialmente con contextos de duelo.
    reason: lexical_alternative
  - marker: b
    text: Kir-heres se ha traducido tradicionalmente también como “Kir-Hareset” o “Kir-Hereset”.
    reason: alternative_reading
  - marker: c
    text: O “la riqueza que ellos acumularon ha perecido”. La expresión hebrea puede referirse a lo que Moab hizo, produjo o acumuló.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi ser interior
  - mi interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב nombra el corazón como sede de la respuesta emocional e interior. En este lamento, ‘mi corazón’ es la forma española más natural y fiel.
- source_word: לְמוֹאָב
  english_pob_choice: for Moab
  chosen_spanish: por Moab
  alternatives_spanish:
  - para Moab
  - contra Moab
  lexicon: HALOT
  rationale: La preposición ל aquí introduce el objeto del lamento. En español, ‘por Moab’ expresa mejor la compasión doliente que un ‘para’ más literal.
- source_word: כַּחֲלִלִים
  english_pob_choice: like flutes
  chosen_spanish: como flautas
  alternatives_spanish:
  - como pitos
  - como tubos
  lexicon: HALOT
  rationale: חָלִיל designa un instrumento de viento, asociado al duelo. ‘Flautas’ conserva la imagen sonora y es claro en español moderno; ‘flautas’ también evita la ambigüedad de ‘pipas’ o ‘tubos’.
- source_word: יֶהֱמֶה
  english_pob_choice: moans
  chosen_spanish: gime
  alternatives_spanish:
  - murmura
  - resuena
  - gime con dolor
  lexicon: HALOT
  rationale: הָמָה expresa un sonido grave, agitato y doliente. ‘Gime’ comunica bien el tono de lamentación sin forzar el español.
- source_word: אֶל אַנְשֵׁי קִיר חֶרֶשׂ
  english_pob_choice: for the men of Kir-heres
  chosen_spanish: por los hombres de Kir-Héres
  alternatives_spanish:
  - por la gente de Kir-Héres
  - por los habitantes de Kir-Héres
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente ‘hombres de’. Se conserva la construcción y el topónimo en transliteración española, con acento adaptado para lectura pública.
- source_word: קִיר חֶרֶשׂ
  english_pob_choice: Kir-heres
  chosen_spanish: Kir-Héres
  alternatives_spanish:
  - Kir-Hareset
  - Kir-Hereset
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera en español siguiendo más de cerca la forma consonántica del hebreo, manteniendo la nota para las variantes tradicionales.
- source_word: יִתְרַת
  english_pob_choice: the abundance
  chosen_spanish: la abundancia
  alternatives_spanish:
  - la riqueza
  - el excedente
  - lo que habían acumulado
  lexicon: HALOT
  rationale: יִתְרָה puede aludir a abundancia, excedente o riqueza acumulada. ‘La abundancia’ es amplia y permite abarcar el matiz de posesión/provisión sin estrechar demasiado el sentido.
- source_word: עָשָׂה
  english_pob_choice: they acquired
  chosen_spanish: ellos adquirieron
  alternatives_spanish:
  - ellos hicieron
  - ellos produjeron
  - ellos acumularon
  lexicon: HALOT
  rationale: Aunque עשה literalmente es ‘hacer’, en este contexto la auditoría inglesa reconoce que apunta a lo ganado o acumulado. ‘Adquirieron’ expresa esa idea con naturalidad en español y conserva la tensión lexical entre hacer y obtener.
- source_word: אָבָדוּ
  english_pob_choice: has perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - se ha perdido
  - ha desaparecido
  - ha sido destruida
  lexicon: HALOT
  rationale: אָבַד comunica perderse o perecer. ‘Ha perecido’ mantiene el peso poético del verbo y la conclusión lamentosa del verso.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que entendió el final como ‘the abundance they acquired has perished’, y se trasladó a español con ‘la abundancia que ellos adquirieron ha perecido’ para respetar tanto el matiz de acumulación como la lectura colectiva del plural. También se mantuvo la comparación con un instrumento de viento en tono de lamento, y se evitó suavizar el hebreo de אַנְשֵׁי con una paráfrasis más general.
  spanish_consistency_notes:
  - Se preservó ‘Yahvé’ no aplica aquí, ya que el verso no contiene el nombre divino.
  - Se mantuvo un registro sobrio y poético, compatible con el resto de la POB.
  - Se prefirió ‘flautas’ en el texto principal y se dejó la variante léxica en nota, siguiendo el audit trail inglés.
  - ‘Kir-Héres’ se capitaliza como topónimo español, con acento gráfico para facilitar lectura.
