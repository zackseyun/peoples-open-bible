id: COL.2.17
reference: Colossians 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἅ ἐστιν σκιὰ τῶν μελλόντων, τὸ δὲ σῶμα ⸀τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/017.yaml
  text: These are a shadow of the things to come, but the body is Messiah's.
translation:
  language: ko
  text: 이것들은 장차 올 것들의 그림자이지만, 그 실체[a]는 메시아의 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「몸」(σῶμα). 「그림자」와 대조되어 그림자를 드리우는 「실체」를 가리킨다. 「몸」으로 옮길 수도 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅ
  english_pob_choice: These
  chosen_korean: 이것들은
  alternatives_korean:
  - 이러한 것들은
  lexicon: BDAG
  rationale: 중성 복수 관계대명사. 앞 절의 「먹는 것·마시는 것·절기·초하루·안식일들」을 받는다.
- source_word: σκιὰ τῶν μελλόντων
  english_pob_choice: a shadow of the things to come
  chosen_korean: 장차 올 것들의 그림자
  alternatives_korean:
  - 다가올 것들의 그림자
  - 미래의 것들의 그림자
  lexicon: BDAG
  rationale: μέλλω의 미래 분사를 「장차 올」로 옮긴다. 「그림자」는 한국 교회의 정립된 표현.
- source_word: τὸ ... σῶμα
  english_pob_choice: the body
  chosen_korean: 그 실체
  alternatives_korean:
  - 그 몸
  - 그 본체
  lexicon: BDAG
  rationale: σῶμα는 일반적으로 「몸」이나, σκιά와의 대조에서 「실체」(그림자를 드리우는 본체)를 가리킨다. 한국어 자연성을 위해 「실체」로 옮기고 「몸」을 각주로 보존.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: Messiah's
  chosen_korean: 메시아의 것
  alternatives_korean:
  - 그리스도의 것
  - 메시아에게 속한 것
  lexicon: BDAG
  rationale: 속격을 소유적 「~의 것」으로 옮긴다. Χριστός는 칭호 「메시아」.
theological_decisions:
- issue: σῶμα를 「실체」 또는 「몸」으로 번역
  chosen_reading: 「실체」(σκιά와의 대조 살림)
  alternative_readings:
  - 「몸」(문자적·전통적)
  rationale: 그림자-실체의 대조 비유에서 「실체」가 한국어로 가장 명료하게 의미를 전달한다. 「몸」 직역은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §6'
