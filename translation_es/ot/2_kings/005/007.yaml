translation:
  language: es
  text: 'Y aconteció que, cuando el rey de Israel leyó la carta[a], rasgó sus vestidos y dijo: «¿Acaso soy yo Dios, para matar y dar vida, para que este hombre me envíe a curar a un hombre de su lepra? Solo, por favor[b], dense cuenta y vean que busca pleito conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo צָרַעַת puede referirse de manera más amplia a una enfermedad grave de la piel, no necesariamente a la lepra en sentido médico moderno.
    reason: lexical_alternative
  - marker: b
    text: O «busca una ocasión contra mí» / «busca un pretexto contra mí».
    reason: alternative_reading
lexical_decisions:
- source_word: הַסֵּפֶר
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - el rollo
  lexicon: HALOT
  rationale: En este contexto narrativo, סֵפֶר se refiere a una comunicación escrita enviada por el rey de Aram; en español, «carta» es la equivalencia natural y clara, más precisa que «libro» y más idiomática que «rollo» o «documento».
- source_word: וַיִּקְרַע בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó su ropa
  - rasgó sus prendas
  lexicon: HALOT
  rationale: Se conserva el idiomático gesto de duelo o alarma. «Vestidos» mantiene un registro digno y bíblico en español sin perder la literalidad básica del hebreo.
- source_word: הַאֱלֹהִים אָנִי
  english_pob_choice: Am I God
  chosen_spanish: ¿Acaso soy yo Dios?
  alternatives_spanish:
  - ¿Soy yo Dios?
  - ¿Soy yo un dios?
  lexicon: HALOT
  rationale: El hebreo formula una pregunta retórica de contraste con la prerrogativa divina sobre la vida y la muerte. «¿Acaso soy yo Dios?» preserva esa fuerza sin debilitarla a una mera referencia genérica a «un dios».
- source_word: לְהָמִית וּלְהַחֲיוֹת
  english_pob_choice: to put to death and to make alive
  chosen_spanish: para matar y dar vida
  alternatives_spanish:
  - para dar muerte y hacer vivir
  - para quitar la vida y dar vida
  lexicon: HALOT
  rationale: La pareja verbal expresa la prerrogativa soberana de Dios. En español, «matar y dar vida» comunica con naturalidad el paralelismo; «dar vida» mantiene el balance con «matar».
- source_word: שֹׁלֵחַ אֵלַי
  english_pob_choice: sends word to me
  chosen_spanish: me envíe
  alternatives_spanish:
  - me mande
  - me envíe un mensaje
  lexicon: HALOT
  rationale: Como el objeto ya es una carta, el español puede expresar el acto comunicativo de forma breve con «me envíe». Esto evita redundancia innecesaria y sigue la relación contextual entre carta y envío.
- source_word: לֶאֱסֹף אִישׁ מִצָּרַעְתּוֹ
  english_pob_choice: to cure a man of his leprosy
  chosen_spanish: a quitarle a un hombre su lepra
  alternatives_spanish:
  - a curar a un hombre de su lepra
  - a librar a un hombre de su lepra
  - a sanar a un hombre de su lepra
  lexicon: HALOT
  rationale: אָסַף + מן expresa retirar o sacar a alguien de una condición. «Quitarle... su lepra» reproduce esa idea de remoción sin sobreespecificar el mecanismo; se conserva el lenguaje tradicional «lepra» para la narrativa, como en el inglés POB.
- source_word: צָּרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección cutánea
  lexicon: HALOT
  rationale: Se mantiene la forma tradicional «lepra» por continuidad narrativa y por la lectura recibida del pasaje, aunque el hebreo puede abarcar una afección más amplia. La alternativa semántica queda implícitamente disponible y se explicita en nota.
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Tan solo
  - Únicamente
  lexicon: HALOT
  rationale: אַךְ introduce restricción o énfasis. «Solo» transmite bien ese foco discursivo en español contemporáneo, con un tono sobrio y natural.
- source_word: דְּעוּ נָא וּרְאוּ
  english_pob_choice: take note, please, and see
  chosen_spanish: reconozcan y vean
  alternatives_spanish:
  - tomen nota, por favor, y vean
  - consideren, por favor, y vean
  - entiendan, por favor, y vean
  lexicon: HALOT
  rationale: Los imperativos exhortan a percibir correctamente la situación. «Reconozcan y vean» conserva el paralelismo y suena más natural en español que una traducción demasiado literal de «saber».
- source_word: מִתְאַנֶּה
  english_pob_choice: seeking a quarrel
  chosen_spanish: me busca pleito
  alternatives_spanish:
  - busca pleito conmigo
  - busca un pretexto contra mí
  - me busca ocasión
  lexicon: HALOT
  rationale: El verbo expresa provocación o búsqueda de motivo hostil. «Me busca pleito» comunica en español la intención adversativa con fuerza idiomática; el sentido de pretexto o ocasión queda como alternativa semántica.
- source_word: לִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - para mí
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «with me» por idiomática con «quarrel», en español la relación adversativa se expresa con «conmigo» en la locución «buscar pleito conmigo», manteniendo el matiz de hostilidad.
theological_decisions:
- issue: La prerrogativa divina de dar muerte y vida
  english_pob_reading: Am I God, to put to death and to make alive
  chosen_spanish_reading: ¿Acaso soy yo Dios, para matar y dar vida?
  alternative_spanish_readings:
  - ¿Acaso soy yo un dios, para matar y dar vida?
  - ¿Soy yo Dios, para dar muerte y hacer vivir?
  rationale: La pregunta retórica remite a la soberanía exclusiva de Dios sobre la vida y la muerte. En español, «Dios» comunica mejor esa afirmación monoteísta que «un dios», que podría sonar más genérico y debilitar el contraste narrativo.
  doctrine_reference: Afirmaciones; filosofía de traducción §1
- issue: El alcance de צָּרַעַת
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  rationale: Se retiene la lectura tradicional por continuidad narrativa y porque es la forma más reconocible en español para este relato. A la vez, se preserva la tensión semántica del hebreo mediante la nota que advierte su amplitud posible.
  doctrine_reference: Filosofía de traducción §1, §5
- issue: 'La acusación final: hostilidad o pretexto'
  english_pob_reading: he is seeking a quarrel with me
  chosen_spanish_reading: me busca pleito conmigo
  alternative_spanish_readings:
  - busca un pretexto contra mí
  - busca ocasión contra mí
  - me está provocando
  rationale: El hebreo admite una gama de hostilidad, desde «buscar pleito» hasta «buscar un pretexto/ocasión». La redacción española conserva el tono acusatorio del rey sin fijar indebidamente una sola interpretación.
  doctrine_reference: Filosofía de traducción §1
translation_notes:
  revision_awareness: El texto y las decisiones siguen el sentido del original hebreo y concuerdan con el audit trail inglés; no se identificaron revisiones aplicadas en el expediente, y el estado de revisión más reciente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera explícitamente; en este versículo no aparece el tetragrámaton.
  - Se prefirió «lepra» por coherencia narrativa, con nota explicativa sobre el alcance semántico de צָרַעַת.
  - Se evitó el calco rígido de la sintaxis inglesa donde el español exigía una formulación más natural, sin añadir contenido ajeno al hebreo.
  - Se conservaron el paralelismo verbal y el tono de reproche del rey, que son centrales para la fuerza retórica del versículo.
