revisions:
- from: Porque los rectos habitarán en la tierra[a], y los íntegros permanecerán en ella.
  to: Porque los rectos habitarán en el país[a], y los íntegros permanecerán en él.
  rationale: Se ajusta אָרֶץ a «el país» para reflejar mejor la decisión contextual auditada de ‘the land’ frente a ‘earth’, y se corrige la nota para presentar con claridad la alternativa léxica real en español. El resto del versículo se conserva porque es fiel, claro y natural.
