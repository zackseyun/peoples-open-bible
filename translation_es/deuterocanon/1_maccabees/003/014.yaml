translation:
  language: es
  text: 'Y dijo: «Me haré un nombre para mí mismo, y seré glorificado en el reino[c], y pelearé contra Judas[a] y contra los que están con él, los que desatienden[b] la palabra del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá»; el nombre griego aquí se refiere a Judas Macabeo.
    reason: alternative_reading
  - marker: b
    text: O «desprecian la palabra del rey».
    reason: lexical_alternative
  - marker: c
    text: O «el mandato del rey» o «el decreto del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποιήσω ἐμαυτῷ ὄνομα
  english_pob_choice: I will make a name for myself
  chosen_spanish: Haré un nombre para mí mismo
  alternatives_spanish:
  - Me ganaré renombre
  - Me haré famoso
  lexicon: LSJ
  rationale: La expresión griega es idiomática para buscar fama o reputación. En español, «hacer un nombre» suena natural y conserva la autoexaltación del hablante; «para mí mismo» refleja ἐμαυτῷ sin perder el matiz reflexivo.
- source_word: δοξασθήσομαι
  english_pob_choice: I will be glorified
  chosen_spanish: seré glorificado
  alternatives_spanish:
  - seré honrado
  - alcanzaré gloria
  lexicon: LSJ
  rationale: El pasivo futuro expresa recibir gloria u honor. «Seré glorificado» mantiene explícito el campo semántico de gloria, que el texto griego presenta con fuerza.
- source_word: ἐν τῇ βασιλείᾳ
  english_pob_choice: in the kingdom
  chosen_spanish: en el reino
  alternatives_spanish:
  - en el reino del rey
  - en la esfera real
  lexicon: LSJ
  rationale: βασιλεία significa de manera directa «reino» o «realeza/ámbito real». «En el reino» sigue de cerca el griego y evita añadir «del rey», que no está explícito.
- source_word: πολεμήσω
  english_pob_choice: I will fight
  chosen_spanish: pelearé
  alternatives_spanish:
  - haré guerra contra
  - combatiré
  lexicon: LSJ
  rationale: «Pelearé» es breve y natural en español, y comunica hostilidad militar sin expandir el verbo más allá de lo que exige el griego.
- source_word: τὸν Ἰούδαν
  english_pob_choice: Judah
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Aquí el referente histórico es Judas Macabeo. En español bíblico, «Judas» es el nombre reconocido y fiel al nombre propio del personaje; «Judá» podría sugerir el territorio o el patriarca, creando confusión.
- source_word: τοὺς σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: los que están con él
  alternatives_spanish:
  - sus compañeros
  - los que lo acompañan
  lexicon: LSJ
  rationale: La frase es abierta y no especifica función; «los que están con él» preserva esa amplitud sin interpretar de más.
- source_word: τοὺς ἐξουθενοῦντας
  english_pob_choice: who are disregarding
  chosen_spanish: los que desprecian
  alternatives_spanish:
  - los que desatienden
  - los que hacen caso omiso de
  lexicon: LSJ
  rationale: ἐξουθενέω puede implicar desprecio o tratar como nada. Dado que el objeto es la palabra del rey, «desprecian» comunica mejor la carga de rechazo con tono bíblico claro.
- source_word: τὸν λόγον τοῦ βασιλέως
  english_pob_choice: the king’s word
  chosen_spanish: la palabra del rey
  alternatives_spanish:
  - el mandato del rey
  - el decreto del rey
  lexicon: LSJ
  rationale: λόγος significa literalmente «palabra», y el POB en inglés mantiene esa forma. En español, «la palabra del rey» conserva la literalidad y deja abierta la posibilidad de mandato o decreto sin forzarlo.
theological_decisions:
- issue: Identificación de Ἰούδαν con Judas Macabeo
  english_pob_reading: The Greek name here refers to Judas Maccabeus.
  chosen_spanish_reading: El nombre griego aquí se refiere a Judas Macabeo.
  alternative_spanish_readings:
  - Aquí se refiere a Judá Macabeo.
  - El griego alude a Judas Macabeo.
  rationale: No es una cuestión doctrinal, sino de identificación histórica y de nombre propio. Se mantiene «Judas» en el texto principal por claridad en español bíblico, y la nota preserva la identificación con Macabeo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Valor de τὸν λόγον τοῦ βασιλέως
  english_pob_reading: the king’s word / the king’s command / the king’s decree
  chosen_spanish_reading: la palabra del rey / el mandato del rey / el decreto del rey
  alternative_spanish_readings:
  - la orden del rey
  - el edicto del rey
  rationale: El griego usa λόγος, cuyo sentido básico es «palabra», pero en contexto puede abarcar mandato o decreto. La traducción principal mantiene la forma lexical, y la nota recoge las alternativas legítimas que el español también permite.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension where text permits'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; se mantiene el sentido del texto griego y el audit trail en inglés sin alteraciones sustantivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto original exige el nombre divino; aquí no aparece.
  - Se preserva la tensión lexical de λόγος mediante nota, sin sustituirla automáticamente por «mandato» o «decreto» en el texto principal.
  - Se evita una traducción mecánica desde el inglés al ajustar la identificación de Ἰούδαν al uso bíblico natural en español.
  - El registro es formal y bíblico, con puntuación moderna y comillas angulares para lectura pública.
