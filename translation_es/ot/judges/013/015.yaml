translation:
  language: es
  text: 'Entonces Manoa dijo al ángel de Yahvé[a]: «Por favor, déjanos retenerte, y prepararemos delante de ti[b] un cabrito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «delante de ti»; es decir, prepararlo para ti como huésped.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar tanto «mensajero» como «ángel». En este relato la figura aparece con rasgos sobrenaturales, por lo que «ángel» comunica mejor el uso narrativo habitual sin perder la construcción hebrea. YHWH se rinde como «Yahvé» conforme al estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal en transliteración española, siguiendo la decisión del proyecto de no sustituirlo por una perífrasis reverencial.
- source_word: נַעְצְרָה נָּא
  english_pob_choice: Please let us detain
  chosen_spanish: déjanos detenerte
  alternatives_spanish:
  - déjanos retenerte
  - déjanos quedarte aquí
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa una petición cortés. «Detenerte» conserva la idea de pedirle que permanezca, con el matiz de hospitalidad, sin sugerir coerción hostil.
- source_word: אוֹתָךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: Aunque la morfología recibida marca un sufijo femenino, el referente contextual es el mensajero/ángel, tratado como masculino en el pasaje; por eso en español se usa el pronombre de objeto directo en segunda persona singular informal «te», neutro en género aquí.
- source_word: וְנַעֲשֶׂה
  english_pob_choice: and we will prepare
  chosen_spanish: y prepararemos
  alternatives_spanish:
  - y haremos
  - y dispondremos
  lexicon: HALOT
  rationale: עָשָׂה en este contexto de hospitalidad significa preparar comida para un invitado. «Prepararemos» es natural en español y comunica mejor la acción que «haremos».
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: Literalmente «delante de ti». En este contexto de comida ofrecida a un huésped, español «delante de ti» mantiene la imagen espacial y es más cercano al hebreo que una paráfrasis con «para ti».
- source_word: גְּדִי עִזִּים
  english_pob_choice: a young goat
  chosen_spanish: un cabrito de cabras
  alternatives_spanish:
  - un cabrito
  - una cría de cabra
  lexicon: HALOT
  rationale: La expresión hebrea designa un cabrito o cría de cabra. «Cabrito de cabras» preserva la estructura nominal del original y el valor léxico, aunque es menos idiomático que «cabrito» solo.
theological_decisions:
- issue: Traducción del nombre divino dentro de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el ángel de Yahvé
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española mantiene «Yahvé» para conservar el nombre personal de Dios, en vez de sustituirlo por una fórmula reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del inglés, especialmente el ajuste de «before you» para reflejar más exactamente לְפָנֶיךָ, pero lo expresa en español con una construcción más natural para hospitalidad. Se conserva la tensión léxica entre «ángel» y «mensajero» mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefiere «prepararemos» en el contexto de hospitalidad, no «haremos» a secas.
  - «Delante de ti» preserva la imagen espacial del hebreo y evita borrar la nota explicativa.
  - El pronombre «te» evita introducir un género no marcado en el castellano del texto principal, dado el referente masculino contextual.
