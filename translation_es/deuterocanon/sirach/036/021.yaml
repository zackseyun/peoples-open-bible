  spanish_consistency_notes:
  - Se mantuvo «corazón» como término sapiencial estándar en lugar de «mente».
  - Se prefirió un verbo dinámico («prueba/examina») para hacer explícita la comparación elíptica del griego.
  - Se conservó la imagen física sin convertirla en una paráfrasis interpretativa más amplia.
