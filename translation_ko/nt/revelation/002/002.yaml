  text: 'I know your works[a], your labor, and your endurance, and that you cannot tolerate evil people. You tested those who call themselves apostles and are not[b], and you found them to be false.'
  footnotes:
  - marker: a
    text: Or 'you are not able to bear evil people.' The Greek is more literally 'you cannot bear,' with the sense here of refusing to tolerate them.
    reason: lexical_alternative
  - marker: b
    text: Or 'those claiming to be apostles.'
    reason: lexical_alternative
