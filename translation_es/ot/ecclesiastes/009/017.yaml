translation:
  language: es
  text: Las palabras de los sabios, oídas en quietud, son mejores que el grito de un gobernante entre necios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oídas en quietud» conserva la fuerza pasiva del hebreo; también puede entenderse como «escuchadas en calma» o «escuchadas en silencio».
    reason: lexical_alternative
  - marker: b
    text: «Entre necios» también puede entenderse por algunos como «sobre necios», pero aquí la preposición sugiere más naturalmente ubicación o asociación.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: words of
  chosen_spanish: palabras de
  alternatives_spanish:
  - dichos de
  - palabras
  lexicon: HALOT
  rationale: דִּבְרֵי es el constructo plural de דָּבָר y aquí se refiere a expresiones habladas. «Palabras de» conserva la relación constructa con «los sabios» y suena natural en español.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - las personas sabias
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «Los sabios» mantiene el sentido representativo del hebreo sin restringir innecesariamente el género en español.
- source_word: בְּנַחַת
  english_pob_choice: in quiet
  chosen_spanish: en quietud
  alternatives_spanish:
  - con calma
  - en tranquilidad
  - en silencio
  lexicon: HALOT
  rationale: נַחַת expresa quietud, calma o serenidad. «En quietud» preserva el valor nominal de la expresión preposicional y refleja bien el contraste con el grito.
- source_word: נִשְׁמָעִים
  english_pob_choice: are heard
  chosen_spanish: oídas
  alternatives_spanish:
  - son escuchadas
  - son oídas
  - son atendidas
  lexicon: HALOT
  rationale: 'El pasivo de שׁמע se traduce de manera natural con una construcción participial en español: «oídas». Esto mantiene la pasividad del hebreo y produce una frase más fluida que un verbo pleno con repetición pesada.'
- source_word: מִזַּעֲקַת
  english_pob_choice: more than the shouting of
  chosen_spanish: que el grito de
  alternatives_spanish:
  - más que el grito de
  - más que el clamor de
  - que la voz alzada de
  lexicon: HALOT
  rationale: El hebreo usa un comparativo con מִן. En español se expresa naturalmente con «son mejores que», siguiendo la revisión inglesa que explicita la comparación. זַעֲקָה puede ser clamor o grito; «grito» encaja bien con el contraste con la quietud.
- source_word: מוֹשֵׁל
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un ruler
  - un gobernante
  - un jefe
  lexicon: HALOT
  rationale: El participio nominal designa a quien ejerce autoridad. «Un gobernante» es amplio, digno y claro en español contemporáneo.
- source_word: בַּכְּסִילִים
  english_pob_choice: among fools
  chosen_spanish: entre necios
  alternatives_spanish:
  - entre los necios
  - entre los insensatos
  - sobre necios
  lexicon: HALOT
  rationale: La preposición ב se entiende mejor aquí como locativa/social, no dominativa. «Entre necios» preserva la relación de compañía y el contraste con la voz de los sabios.
theological_decisions:
- issue: Valor comparativo de la sentencia
  english_pob_reading: The words of the wise heard in quiet are better than the shouting of a ruler among fools.
  chosen_spanish_reading: Las palabras de los sabios, oídas en quietud, son mejores que el grito de un gobernante entre necios.
  alternative_spanish_readings:
  - Las palabras de los sabios, oídas en quietud, valen más que el grito de un gobernante entre necios.
  - Las palabras de los sabios, oídas en quietud, son más que el grito de un gobernante entre necios.
  rationale: El hebreo introduce una comparación evaluativa. «Son mejores que» comunica con claridad la superioridad implícita sin forzar el verso hacia una paráfrasis moral ajena al texto.
  doctrine_reference: Sabiduría proverbial y discernimiento práctico; no implica doctrina sistemática específica.
- issue: Sentido de בַּכְּסִילִים
  english_pob_reading: Among fools
  chosen_spanish_reading: entre necios
  alternative_spanish_readings:
  - sobre necios
  - en medio de necios
  - entre los necios
  rationale: Se mantiene la lectura locativa/social que la auditoría inglesa juzga más natural. No se adopta un sentido de dominio («sobre») porque no es el más probable según la preposición.
  doctrine_reference: Principios de interpretación contextual y semántica preposicional.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que explicita el comparativo («are better than») y ajusta el orden para una lectura formal más fluida. Se preserva la tensión interpretativa del comparativo hebreo y la posible lectura locativa de בַּכְּסִילִים.
  spanish_consistency_notes:
  - Se usa «sabios» para חֲכָמִים en coherencia con la terminología POB habitual.
  - Se mantiene «necios» para כְּסִילִים, evitando suavizar el contraste sapiencial.
  - Se evita introducir terminología eclesiástica no presente en el hebreo.
  - La puntuación conserva el paralelismo del verso y marca claramente la comparación.
