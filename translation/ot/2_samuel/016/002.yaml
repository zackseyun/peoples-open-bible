id: 2SA.16.2
reference: 2 Samuel 16:2
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר הַ/מֶּ֛לֶךְ אֶל צִיבָ֖א מָה אֵ֣לֶּה לָּ֑/ךְ וַ/יֹּ֣אמֶר צִ֠יבָא הַ/חֲמוֹרִ֨ים לְ/בֵית הַ/מֶּ֜לֶךְ לִ/רְכֹּ֗ב ו/ל/ה/לחם וְ/הַ/קַּ֨יִץ֙ לֶ/אֱכ֣וֹל הַ/נְּעָרִ֔ים וְ/הַ/יַּ֕יִן לִ/שְׁתּ֥וֹת הַ/יָּעֵ֖ף בַּ/מִּדְבָּֽר־־־׃
translation:
  text: Then the king said to Ziba[a], “What are these for?” And Ziba said, “The donkeys are for the king’s household to ride on, and the bread and summer fruit are for the young men to eat[c][b], and the wine is for the weary in the wilderness to drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What do you mean by these?' The Hebrew idiom literally asks, 'What are these to/for you?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'summer produce.' The Hebrew term can refer broadly to fruit gathered in the summer season.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the attendants' or 'the servants' for 'the young men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֵלֶּה לָּךְ
  chosen: What are these for?
  alternatives:
  - What do you mean by these?
  - Why do you have these?
  lexicon: HALOT
  rationale: The idiom literally reads 'What are these to/for you?' In context David is asking the purpose of the items Ziba has brought, so 'What are these for?' best captures the sense in natural English without over-paraphrasing.
- source_word: הַחֲמוֹרִים
  chosen: the donkeys
  alternatives:
  - the asses
  lexicon: HALOT
  rationale: Standard modern English rendering for the animal; 'asses' is archaic in contemporary usage.
- source_word: לְבֵית הַמֶּלֶךְ
  chosen: for the king’s household
  alternatives:
  - for the house of the king
  - for the king’s house
  lexicon: HALOT
  rationale: בַּיִת/בֵּית often means household, not merely physical house. Here it refers to the king’s retinue/family group traveling with him, so 'household' is more precise than a literal 'house.'
- source_word: לִרְכֹּב
  chosen: to ride on
  alternatives:
  - for riding
  - to ride
  lexicon: HALOT
  rationale: Infinitive of purpose after 'the donkeys'; English idiom naturally supplies 'on' with the object 'donkeys.'
- source_word: הַלֶּחֶם
  chosen: the bread
  alternatives:
  - bread
  - the food
  lexicon: HALOT
  rationale: Definite noun retained straightforwardly. 'Bread' is the plain lexical sense and need not be generalized to 'food' since additional food items are separately listed.
- source_word: הַקַּיִץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - figs
  lexicon: HALOT
  rationale: The noun can denote summer fruit/produce generally. Since the specific fruit is not stated in the Hebrew, 'summer fruit' preserves the lexical breadth better than specifying 'figs.'
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: The term often means young men, lads, or attendants depending on context. Here it likely refers to the younger members/servants of the royal party. 'Young men' keeps the lexical form while remaining natural; more interpretive options are preserved as alternatives.
- source_word: הַיָּעֵף
  chosen: whoever becomes weary
  alternatives:
  - the weary one
  - the exhausted person
  - the one who is weary
  lexicon: HALOT
  rationale: 'The singular adjective functions generically: wine is for any individual in the wilderness who grows faint. ''Whoever becomes weary'' conveys this distributive/generic force in idiomatic English.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/pastureland/desert region. 'Wilderness' fits the narrative setting of David's flight and avoids implying only sandy desert terrain.
