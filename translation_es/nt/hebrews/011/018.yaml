  text: 'a quien se dijo: «En Isaac tu descendencia será llamada»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πρὸς ὃν
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - para quien
  - con referencia a quien
  lexicon: BDAG
  rationale: La construcción con πρός + relativo aquí introduce a la persona a la que se dirige o de la que se habla. En español, «a quien» conserva esa referencia sin forzar una paráfrasis.
- source_word: ἐλαλήθη
  english_pob_choice: it was said
  chosen_spanish: se dijo
  alternatives_spanish:
  - le dijeron
  - fue hablado
  lexicon: BDAG
  rationale: El aoristo pasivo de λαλέω se refleja mejor con una pasiva impersonal natural en español. «Se dijo» preserva la forma pasiva sin añadir un sujeto explícito.
- source_word: Ἐν Ἰσαὰκ
  english_pob_choice: In Isaac
  chosen_spanish: En Isaac
  alternatives_spanish:
  - Por medio de Isaac
  - A través de Isaac
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por una equivalencia idiomática, el griego y la cita de Génesis permiten mantener «En Isaac» de modo más cercano a la forma fuente y más transparente para la audición textual.
- source_word: κληθήσεταί
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será considerado
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se refleja con «será llamado», que mantiene el vínculo verbal con el campo de «llamar / nombrar» y sigue siendo natural en español.
- source_word: σοι
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - de ti
  - para ti
  lexicon: BDAG
  rationale: El dativo posesivo se expresa de forma idiomática en español con el posesivo «tu» en la frase «tu descendencia».
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - posteridad
  lexicon: BDAG
  rationale: «Descendencia» comunica bien el sentido colectivo y genealógico de σπέρμα en este contexto de promesa de linaje. «Simiente» sería más literal pero menos transparente para lectores actuales.
theological_decisions:
- issue: La cita de Génesis sobre la línea pactal por Isaac
  english_pob_reading: In Isaac your offspring will be called
  chosen_spanish_reading: En Isaac será llamado tu descendencia
  alternative_spanish_readings:
  - En Isaac tu descendencia será llamada
  - Por medio de Isaac será llamada tu descendencia
  rationale: La frase conserva la forma de cita y el sentido de descendencia pactal vinculada a Isaac, sin desplazar el peso léxico de Ἐν hacia una interpretación más explicativa de la necesaria.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto griego presenta una cita indirecta con pasivo y una preposición que puede leerse de manera más literal («En Isaac») o más idiomática («por medio de Isaac / a través de Isaac»). Siguiendo el audit trail, la versión española conserva la forma cercana al griego y mantiene la alternativa literal como nota.
  spanish_consistency_notes:
  - Se mantiene el campo léxico de καλέω con «llamado» para no perder la relación verbal con la cita bíblica.
  - «Descendencia» se usa como singular colectivo, acorde con el valor de σπέρμα en contextos genealógicos.
  - La puntuación de cita respeta el estilo editorial español con dos puntos y comillas angulares.
