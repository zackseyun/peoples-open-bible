  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión terminológica es léxica: הִתְחַפֵּשׂ debe representarse con «disfrazarse», no con «despojarse». «Josafat» es aceptable. «Vestiduras» comunica mejor el contexto regio que «ropas», y sigue siendo eclesialmente legible sin arcaísmo excesivo.'
