translation:
  language: es
  text: 'excepto por su pariente cercano[a], que es su pariente más cercano: su madre, su padre, su hijo, su hija y su hermano—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שְׁאֵר tiene literalmente el sentido de «carne» o de parentesco de sangre; por eso también podría traducirse «pariente de sangre» o «consanguíneo cercano».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: except for
  chosen_spanish: excepto por
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: En este contexto legal introduce una excepción a la prohibición anterior; «excepto por» expresa con naturalidad esa restricción y conserva el valor exceptivo del hebreo.
- source_word: שְׁאֵרוֹ
  english_pob_choice: his close relative
  chosen_spanish: su pariente cercano
  alternatives_spanish:
  - su pariente de sangre
  - su pariente consanguíneo
  - su familia cercana
  lexicon: HALOT
  rationale: שְׁאֵר puede aludir a la relación de parentesco y, literalmente, a la idea de «carne». «Pariente cercano» comunica el sentido kinship sin forzar una traducción demasiado literal.
- source_word: הַקָּרֹב אֵלָיו
  english_pob_choice: who is nearest to him
  chosen_spanish: el que le es más cercano
  alternatives_spanish:
  - el que está más cerca de él
  - el más cercano a él
  lexicon: HALOT
  rationale: La frase califica a שְׁאֵר con proximidad de parentesco. «Le es más cercano» mantiene el valor relacional y la fuerza comparativa del hebreo.
- source_word: לְאִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - para su madre
  - por su madre
  lexicon: HALOT
  rationale: Aunque la preposición ל puede marcar a la persona por quien se permite la acción, en español la lista funciona mejor como enumeración simple de los parientes involucrados; el valor se preserva en el contexto de la excepción.
- source_word: וּלְאָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - y su padre
  - para su padre
  lexicon: HALOT
  rationale: Se mantiene la enumeración familiar del hebreo con una forma natural en español, sin repetir innecesariamente la preposición.
- source_word: וְלִבְנוֹ
  english_pob_choice: for his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - y su hijo
  - para su hijo
  lexicon: HALOT
  rationale: El referente filial es directo; el singular se conserva para reflejar el estilo legal hebreo.
- source_word: וּלְבִתּוֹ
  english_pob_choice: for his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - y su hija
  - para su hija
  lexicon: HALOT
  rationale: El referente filial es directo; el singular se conserva para reflejar el estilo legal hebreo.
- source_word: וּלְאָחִיו
  english_pob_choice: and for his brother
  chosen_spanish: y su hermano
  alternatives_spanish:
  - y para su hermano
  - y el hermano
  lexicon: HALOT
  rationale: אָח en esta lista de parentescos denota un hermano varón literal; «hermano» respeta el valor de parentesco y el género del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la repetición de «for» antes de cada miembro de la familia para reflejar mejor la lista hebrea. La versión española sigue esa misma estructura más natural, sin añadir repeticiones que el hebreo no exige.
  spanish_consistency_notes:
  - Se preserva el tono legal y restrictivo del versículo anterior con una sola frase exceptiva.
  - La lista familiar se mantiene en singular, como en el hebreo.
  - Se evita el uso de «SEÑOR» o equivalentes porque este versículo no contiene el Tetragrámaton ni una cita de κύριος.
  - La nota de pie de página se ancla correctamente en el texto con [a].
