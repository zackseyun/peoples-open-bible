revisions:
- from: Porque odia el divorcio[a], dice Yahvé, el Dios de Israel, y al que cubre su vestidura con violencia, dice Yahvé de los Ejércitos. Así que guárdense en su espíritu[b], y no actúen con traición.
  to: Porque odia el divorcio[a], dice Yahvé, el Dios de Israel, y también odia al que cubre su vestidura con violencia, dice Yahvé de los ejércitos. Así que guárdense en su espíritu[b], y no obren deslealmente.
  rationale: La revisión hace la cláusula central gramatical y natural en español sin abandonar la ambigüedad del hebreo difícil, y mejora la equivalencia de בגד con una expresión más idiomática y más cercana al matiz de deslealtad de pacto. También normaliza «ejércitos» en minúscula en el título divino.
