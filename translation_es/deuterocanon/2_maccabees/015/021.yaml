    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes y contenidos de las notas para que correspondan a la evidencia fuente y a la auditoría inglesa: [a] ahora acompaña «bestias», y [b] documenta la alternativa léxica de τερατοποιὸν. Se mantiene el texto base casi intacto porque es fiel y legible en español.'
