  to: Así, Eleazar el sacerdote tomó los incensarios[a] de bronce que habían ofrecido los que fueron quemados[b], y los martillaron para hacer un revestimiento[c] para el altar.
  rationale: Se restaura en el texto principal el referente explícito de הַשְּׂרֻפִים ('los que fueron quemados'), que no puede quedar solo en nota sin pérdida de sentido. También se recolocan las notas en los términos correctos y se alisa la redacción de la acción de martillar para un español más claro y fiel.
