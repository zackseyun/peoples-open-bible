translation:
  language: es
  text: Así, toda la congregación lo sacaron fuera del campamento y lo apedrearon con piedras, y murió, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa la comunidad reunida del pacto; “congregación” preserva mejor ese matiz corporativo que “comunidad”. כָּל se refleja con “toda”.
- source_word: וַיֹּצִיאוּ אֹתוֹ
  english_pob_choice: brought him
  chosen_spanish: lo sacó
  alternatives_spanish:
  - lo llevaron fuera
  - lo trajeron
  lexicon: HALOT
  rationale: El hifil de יצא admite “sacar” o “hacer salir”. En español, “lo sacó” es natural y conserva la dirección explícita hacia fuera.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - a un lugar fuera del campamento
  - al exterior del campamento
  lexicon: HALOT
  rationale: La construcción indica movimiento a un lugar exterior al campamento; “fuera del campamento” es idiomática y precisa.
- source_word: וַיִּרְגְּמ֥וּ אֹת֛וֹ בָּאֲבָנִ֖ים
  english_pob_choice: stoned him with stones
  chosen_spanish: lo apedreó con piedras
  alternatives_spanish:
  - lo lapidó con piedras
  - lo apedreó
  lexicon: HALOT
  rationale: רגם significa apedrear/lapidar. “Apedreó con piedras” conserva el instrumento explícito בָּאֲבָנִים sin sonar excesivamente técnico.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y fue muerto
  lexicon: HALOT
  rationale: מות es el verbo ordinario “morir”; “y murió” sigue de cerca el hebreo sin introducir una pasiva interpretativa.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: כַּאֲשֶׁר expresa correspondencia (“tal como”). צִוָּה se vierte “había mandado” para reflejar el cumplimiento de una orden previa. יְהוָה se mantiene como “Yahvé” según la terminología base del proyecto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política española del proyecto pide “Yahvé” en el texto principal para preservar el nombre del pacto sin el encubrimiento de “Señor”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota sin anclaje en el texto. La redacción mantiene el paralelismo con el hebreo y conserva el nombre divino según la guía española del proyecto.
  spanish_consistency_notes:
  - Se usó “congregación” para עֵדָה por su valor corporativo y covenantal.
  - Se prefirió la forma verbal simple “lo sacó” y “lo apedreó” para un español bíblico claro y natural.
  - Se mantuvo “Yahvé” de manera consistente con el estándar del proyecto para יְהוָה.
  - No se añadieron notas al pie porque no era necesario introducir alternativas textuales en este versículo.
