translation:
  language: es
  text: Entonces Hiram, rey de Tiro, envió a sus siervos a Salomón, porque había oído que lo habían ungido rey en lugar de su padre, porque Hiram había amado siempre[a] a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque Hiram era amigo de David todos sus días». Literalmente, el hebreo dice que Hiram estaba «amando a David todos los días», expresión de una relación favorable y constante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de שלח se expresa de manera natural con el pretérito simple «envió», que conserva el flujo narrativo sin añadir matices ausentes en el hebreo.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Juram
  lexicon: HALOT
  rationale: Se conserva la forma usual del nombre propio en Reyes; «Hiram» es clara y reconocible en español bíblico.
- source_word: מֶלֶךְ צֹר
  english_pob_choice: king of Tyre
  chosen_spanish: rey de Tiro
  alternatives_spanish:
  - el rey de Tiro
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte con la relación posesiva normal en español, manteniendo la identificación real y geográfica.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: Aquí עבדָיו puede referirse a servidores de corte o enviados oficiales. «Siervos» conserva la amplitud de la designación y evita imponer «esclavos» en un contexto diplomático.
- source_word: אֶל שְׁלֹמֹה
  english_pob_choice: to Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - hacia Salomón
  lexicon: HALOT
  rationale: La preposición אֶל se expresa con «a»; no se añade finalidad que el hebreo no marca explícitamente.
- source_word: כִּי שָׁמַע
  english_pob_choice: because he had heard
  chosen_spanish: porque había oído
  alternatives_spanish:
  - pues había oído
  - ya que había oído
  lexicon: HALOT
  rationale: כִּי introduce la razón de la acción; el pluscuamperfecto «había oído» refleja que la noticia precede al envío.
- source_word: מָשְׁח֥וּ
  english_pob_choice: they had anointed
  chosen_spanish: lo habían ungido
  alternatives_spanish:
  - lo habían consagrado rey
  - lo habían coronado
  lexicon: HALOT
  rationale: El verbo משח en contexto real se traduce con «ungir», término bíblico preciso para la instalación de un rey. Se mantiene el objeto pronominal explícito para claridad en español.
- source_word: לְמֶ֖לֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  lexicon: HALOT
  rationale: En español, después de «ungir» basta «rey» para reproducir la estructura de nombramiento sin sobrecargar la frase.
- source_word: תַּחַת אָבִ֑יהוּ
  english_pob_choice: in place of his father
  chosen_spanish: en lugar de su padre
  alternatives_spanish:
  - en vez de su padre
  - después de su padre
  lexicon: HALOT
  rationale: תחת en contexto sucesorio indica reemplazo; «en lugar de» es la equivalencia más transparente y natural en español.
- source_word: כִּי אֹהֵב הָיָה חִירָם לְדָוִד כָּל הַיָּמִים
  english_pob_choice: for Hiram had always loved David
  chosen_spanish: porque Hiram había amado siempre a David
  alternatives_spanish:
  - porque Hiram era amigo de David todos sus días
  - porque Hiram amó a David toda su vida
  lexicon: HALOT
  rationale: La secuencia אֹהֵב הָיָה expresa una disposición continua; se vierte con pluscuamperfecto durativo para conservar el afecto sostenido, sin reducirlo a una mera alianza política. «Amado siempre» mantiene el énfasis de permanencia.
theological_decisions:
- issue: Naturaleza del vínculo de Hiram con David
  english_pob_reading: for Hiram had always loved David
  chosen_spanish_reading: porque Hiram había amado siempre a David
  alternative_spanish_readings:
  - porque Hiram era amigo de David todos sus días
  - porque Hiram amó a David toda su vida
  rationale: El texto presenta una relación favorable y duradera; no obliga a limitarla a amistad, pero tampoco a convertirla en un amor romántico o meramente político. La formulación elegida conserva la tensión del hebreo entre afecto personal y lealtad persistente.
  doctrine_reference: Relación humana/cortesana en narrativa histórica; no implica formulación doctrinal directa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el alineamiento del POB en inglés: mantiene el orden narrativo, conserva la causalidad de כִּי y usa pluscuamperfecto para las acciones previas («había oído», «lo habían ungido»). También conserva la observación del audit trail sobre el afecto duradero de Hiram, sin suavizar la fuerza relacional del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Ungir» se mantuvo para משח por ser el término bíblico preciso en contexto real.
  - «Siervos» se eligió por amplitud semántica en diplomacia cortesana; no se sustituyó por «esclavos» porque el contexto no lo exige.
  - La nota al pie marca la alternativa léxica documentada para el final del versículo y preserva la tensión semántica del hebreo.
