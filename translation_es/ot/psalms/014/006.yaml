translation:
  language: es
  text: Ustedes ponen en vergüenza el consejo del pobre[a], porque Yahvé es su refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «ponen en vergüenza el plan del pobre», entendiendo עֲצַת עָנִי como «el consejo/plan del pobre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  english_pob_choice: the counsel of
  chosen_spanish: el consejo de
  alternatives_spanish:
  - el plan de
  - el consejo/purpose de
  - el designio de
  lexicon: HALOT
  rationale: עֲצָה en constructo puede significar consejo, plan o propósito. En español, «consejo» conserva bien la amplitud semántica sin reducirlo solo a una idea interna ni solo a una sugerencia verbal.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el necesitado
  - el humilde
  lexicon: HALOT
  rationale: עָנִי abarca al pobre, afligido u oprimido. Aquí «el pobre» reproduce con naturalidad la referencia social y vulnerable que el contexto demanda, sin estrechar demasiado el término.
- source_word: תָבִישׁוּ
  english_pob_choice: You shame
  chosen_spanish: avergüenzan
  alternatives_spanish:
  - ponen en vergüenza
  - avergüenzan por completo
  - deshonran
  lexicon: HALOT
  rationale: El hifil de בוש expresa causar vergüenza o poner en vergüenza. «Avergüenzan» es natural en español y preserva la fuerza directa del verbo sin introducir una interpretación más débil como «mock».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: כִּי introduce la causa o fundamento. «Porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal en la forma establecida por el proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: מַחְסֵהוּ
  english_pob_choice: his refuge
  chosen_spanish: es su refugio
  alternatives_spanish:
  - es su amparo
  - es su resguardo
  - es su refugio seguro
  lexicon: HALOT
  rationale: מַחְסֶה designa refugio o lugar de amparo con sufijo de tercera persona masculina singular. «Es su refugio» es la manera más directa y fiel de conservar la metáfora de protección.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. Se preserva el nombre propio de Dios en español como «Yahvé», coherente con la política del proyecto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עֲצַת עָנִי
  english_pob_reading: the counsel of the poor
  chosen_spanish_reading: el consejo del pobre
  alternative_spanish_readings:
  - el plan del pobre
  - el consejo del pobre hombre
  rationale: La construcción puede referirse al consejo, plan o propósito del pobre. «El consejo del pobre» conserva la amplitud semántica y deja abierta la alternativa reconocida en la nota inglesa.
  doctrine_reference: HALOT; English POB footnote a
translation_notes:
  revision_awareness: 'La redacción sigue el resultado más reciente del pasaje sin incorporar cambios posteriores: mantiene la lectura causal de כִּי, el valor directo del verbo hifil de בוש y la traducción del Tetragrámaton como nombre propio. Se conserva además la alternativa léxica del sintagma עֲצַת עָנִי mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto en español.
  - Se mantiene «el pobre»/«del pobre» para עָנִי, en línea con el valor social y vulnerable del término.
  - «Avergüenzan» conserva el tono directo de la reprensión sin suavizar el verbo hebreo.
  - La nota a recoge la alternativa «plan» para reflejar la ambigüedad léxica documentada en el audit trail.
