revisions:
- from: Y en el día en que entre en el santuario[a], en el atrio interior, para ministrar en el santuario, presentará su ofrenda por el pecado[b], declara Yahvé, el Señor.
  to: Y el día que entre en el santuario[a], en el atrio interior, para ministrar en el santuario, presentará su ofrenda por el pecado[b], declara el Señor Yahvé.
  rationale: Se corrigió la fórmula final a «declara el Señor Yahvé» para reflejar el orden y sentido de אֲדֹנָי יְהוִה conforme a la política del proyecto sobre יהוה. Se suavizó la apertura a «Y el día que» para mejor naturalidad sin perder la conexión discursiva. También se reparó la nota [a] eliminando el posesivo no presente en el hebreo.
