translation:
  language: es
  text: Y resultó falso en todo lo que dijo[a], y se apartó de Jonatán, y no recompensó los favores que le había mostrado, y lo oprimió severamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mintió en todo lo que dijo»; «actuó falsamente en todo lo que dijo». El verbo griego puede enfatizar la mentira verbal o un engaño más amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐψεύσατο
  english_pob_choice: proved false
  chosen_spanish: habló falsamente
  alternatives_spanish:
  - mintió
  - actuó con engaño
  - se mostró falso
  lexicon: LSJ
  rationale: El griego medio puede expresar tanto mentir como obrar con falsedad. En español, 'habló falsamente' conserva la referencia inmediata a lo dicho sin estrechar demasiado el sentido ni introducir una inferencia más amplia de conducta si no se exige.
- source_word: πάντα ὅσα εἶπεν
  english_pob_choice: everything that he said
  chosen_spanish: en todo lo que dijo
  alternatives_spanish:
  - en todas las cosas que dijo
  - en todo cuanto dijo
  - en todo lo que había dicho
  lexicon: LSJ
  rationale: La frase griega tiene fuerza comprehensiva. 'En todo lo que dijo' comunica esa totalidad de manera natural y fiel al alcance del original.
- source_word: ἠλλοτριώθη
  english_pob_choice: became estranged
  chosen_spanish: se apartó
  alternatives_spanish:
  - se volvió extraño
  - se alienó
  - se hizo ajeno
  lexicon: LSJ
  rationale: El verbo expresa volverse ajeno o separado. 'Se apartó' mantiene la ruptura relacional en español claro; 'se volvió extraño' podría sonar más psicológico de lo que el contexto exige.
- source_word: τῷ Ἰωνάθαν
  english_pob_choice: from Jonathan
  chosen_spanish: de Jonathan
  alternatives_spanish:
  - de parte de Jonathan
  - respecto de Jonathan
  - hacia Jonathan
  lexicon: LSJ
  rationale: Aunque el dativo griego no es idéntico a una preposición española, con un verbo de separación 'de Jonathan' es la forma idiomática y transparente para expresar el alejamiento relacional.
- source_word: οὐκ ἀνταπέδωκεν
  english_pob_choice: did not repay
  chosen_spanish: no recompensó
  alternatives_spanish:
  - no devolvió
  - no pagó de vuelta
  - no correspondió
  lexicon: LSJ
  rationale: Aquí el verbo indica retribuir o devolver en reciprocidad. 'Recompensó' funciona bien con 'favores' en español y refleja la idea de respuesta debida, sin forzar una imagen exclusivamente monetaria.
- source_word: τὰς εὐνοίας
  english_pob_choice: the favors
  chosen_spanish: los favores
  alternatives_spanish:
  - la buena voluntad
  - las muestras de favor
  - las bondades
  lexicon: LSJ
  rationale: En este contexto político-relacional, εὐνοία refiere benefacciones concretas. 'Favores' es la equivalencia más natural y precisa en español.
- source_word: ἃς ἀνταπέδωκεν αὐτῷ
  english_pob_choice: that Jonathan had shown him
  chosen_spanish: que le había mostrado
  alternatives_spanish:
  - que Jonathan le había hecho
  - que le había devuelto
  - que le había correspondido
  lexicon: LSJ
  rationale: El texto griego habla de favores ya concedidos a él, no de favores que Jonathan 'recompensó' a alguien. 'Le había mostrado' preserva la dirección correcta del beneficio y evita invertir la relación verbal.
- source_word: ἔθλιψεν
  english_pob_choice: oppressed
  chosen_spanish: lo oprimió
  alternatives_spanish:
  - lo afligió
  - lo presionó
  - lo maltrató
  lexicon: LSJ
  rationale: En este marco de abuso y presión política, 'oprimió' transmite con fidelidad el peso hostil del verbo mejor que opciones más generales como 'afligió'.
- source_word: σφόδρα
  english_pob_choice: severely
  chosen_spanish: severamente
  alternatives_spanish:
  - grandemente
  - mucho
  - con gran dureza
  lexicon: LSJ
  rationale: Es un adverbio intensivo. 'Severamente' corresponde bien al tono de 'oprimió' y mantiene la intensidad del cierre.
theological_decisions:
- issue: No hay un término teológico doctrinal dominante; la cuestión principal es la intensidad ética y relacional de la denuncia.
  english_pob_reading: And he proved false in everything that he said, and became estranged from Jonathan, and did not repay the favors that Jonathan had shown him, and he oppressed him severely.
  chosen_spanish_reading: Y habló falsamente en todo lo que dijo, y se apartó de Jonathan, y no recompensó los favores que le había mostrado, y lo oprimió severamente.
  alternative_spanish_readings:
  - Y mintió en todo lo que dijo...
  - Y se volvió hostil a Jonathan...
  - Y no devolvió los favores que le había mostrado...
  rationale: 'La traducción procura conservar la progresión moral del texto: falsedad, ruptura relacional, ingratitud y opresión. No se suaviza la acusación, pero tampoco se intensifica más allá de lo que el griego asegura.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su revisión más reciente: el griego habla de favores ya mostrados a Jonathan, no de favores ''recompensados'' por Jonathan. Por eso se eligió ''que le había mostrado'' para reflejar con precisión la dirección del beneficio, y se evitó cualquier giro que invirtiera esa relación.'
  spanish_consistency_notes:
  - Se mantiene 'Jonathan' como nombre propio según el estándar del proyecto.
  - Se usa 'Dios/Yahvé' solo cuando el texto lo requiere; aquí no aparece ningún término divino.
  - Se conserva la intensidad del final con 'severamente' para σφόδρα, en paralelo con el tono de opresión del verbo principal.
