translation:
  language: es
  text: Enoc fue hallado sin culpa[a], y caminó con Yahvé[b], y fue llevado—una señal de conocimiento para generaciones y generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La lectura griega dice: «un ejemplo de arrepentimiento para las generaciones». El hebreo conservado aquí, en cambio, lee «conocimiento».'
    reason: alternative_reading
  - marker: b
    text: Masada conserva la línea sobre Enoc en una forma más cercana a Génesis 5:24 («Enoc caminó con Dios, y desapareció, porque Dios se lo llevó»), mientras que el hebreo de la Geniza de El Cairo representado aquí dice «fue hallado sin culpa ... y fue llevado».
    reason: textual_variant
lexical_decisions:
- source_word: חנוך / Ἐνὼχ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: Convención onomástica bíblica estándar
  rationale: El nombre propio se translitera al español como «Enoc», forma común, clara y fiel al uso bíblico en español.
- source_word: נמצא / εὐηρέστησεν
  english_pob_choice: was found blameless
  chosen_spanish: fue hallado sin culpa
  alternatives_spanish:
  - fue hallado íntegro
  - fue hallado irreprensible
  - fue hallado justo
  lexicon: HALOT; LXX context
  rationale: El hebreo נמצא + תמים expresa una evaluación favorable; «sin culpa» conserva la fuerza moral sin exigir la abstracción de «perfecto». Se evita «justo» porque puede desplazar el matiz de integridad moral.
- source_word: תמים
  english_pob_choice: blameless
  chosen_spanish: sin culpa
  alternatives_spanish:
  - íntegro
  - irreprensible
  - perfecto
  lexicon: HALOT
  rationale: «Sin culpa» comunica bien la integridad evaluativa del término en un registro bíblico natural para el español. «Perfecto» sería excesivo; «íntegro» es posible, pero menos explícito en la dimensión moral.
- source_word: והתהלך עם יהוה
  english_pob_choice: he walked with Yahweh
  chosen_spanish: caminó con Yahvé
  alternatives_spanish:
  - anduvo con Yahvé
  - vivió en comunión con Yahvé
  lexicon: HALOT; biblical idiom
  rationale: «Caminó con» mantiene el idiom a la vez que suena natural en español. Se conserva «Yahvé» por la política terminológica del proyecto para יהוה.
- source_word: ונלקח
  english_pob_choice: he was taken away
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue tomado
  - fue arrebatado
  - fue llevado lejos
  lexicon: HALOT
  rationale: «Fue llevado» es la forma más sobria y fiel del pasivo hebreo; también deja abierta la alusión a Génesis 5:24 sin sobreexplicar.
- source_word: אות
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - ejemplo
  - modelo
  lexicon: HALOT
  rationale: El hebreo אות admite «señal» o «signo». En español, «señal» es claro y conserva el valor simbólico sin forzar el sentido didáctico de «ejemplo».
- source_word: דעת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría
  lexicon: HALOT
  rationale: Se preserva el sustantivo abstracto «conocimiento» para reflejar el hebreo דעת, sin armonizarlo con la lectura griega de «arrepentimiento».
- source_word: לדור ודור
  english_pob_choice: for generation after generation
  chosen_spanish: para generación tras generación
  alternatives_spanish:
  - para todas las generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La fórmula española tradicional y transparente «de generación en generación» se ajusta bien; aquí se usa «para generación tras generación» para reflejar el valor distributivo del hebreo y la construcción de destino/testimonio.
theological_decisions:
- issue: 'Base textual final: hebreo frente a griego'
  english_pob_reading: Main text follows Hebrew 'a sign of knowledge'; Greek alternative 'an example of repentance to the generations' is preserved in a footnote.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «una señal de conocimiento para generación tras generación».'
  alternative_spanish_readings:
  - «un ejemplo de arrepentimiento para las generaciones»
  - «un modelo de arrepentimiento para las generaciones»
  rationale: En Sirácides, donde el hebreo está preservado con buen grado de confianza, se prioriza el testimonio hebreo en el texto principal. La lectura griega es antigua y teológicamente significativa, así que se mantiene explícitamente en una nota para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve theological tension rather than resolve it silently.'
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: «Yahvé». Se evita «SEÑOR» porque ocultaría el nombre propio divino sin necesidad de esa convención en este proyecto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del audit trail: la formulación inglesa pasó de «an example of knowledge» a «a sign of knowledge» para acercarse más a אות. Por eso el español principal usa «señal de conocimiento», manteniendo la corrección léxica y la lectura hebrea base. También se preservó la alternativa griega en nota para no perder la tensión textual documentada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Enoc» sigue la transliteración habitual en español bíblico.
  - Se prefirió un registro sobrio y bíblico, evitando paráfrasis explicativas fuera de lo que exige el texto.
  - La nota sobre la lectura griega se ancla en la frase clave para que la alternativa permanezca auditable.
