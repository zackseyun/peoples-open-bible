revisions:
- from: Y los magos hicieron lo mismo con sus artes secretas para sacar los mosquitos[a], pero no pudieron; y los mosquitos estaban sobre el hombre y sobre el ganado.
  to: Y los magos hicieron lo mismo con sus artes secretas para sacar los jejenes[a], pero no pudieron; y los jejenes estaban sobre el hombre y sobre las bestias.
  rationale: Se corrige «mosquitos» a «jejenes» para reflejar mejor la elección principal del English POB ('gnats') y evitar una especie más específica y potencialmente engañosa en español. Se cambia «ganado» por «las bestias» para no estrechar בְּהֵמָה y para preservar mejor el contraste colectivo con «el hombre», en línea con el rationale documentado. Se mantienen «magos», «artes secretas» y la nota sobre «piojos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:52:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: los magos intentan reproducir la plaga con sus artes secretas, fracasan, y los insectos quedan sobre seres humanos y animales. También preserva la nota de incertidumbre léxica sobre כִּנִּים. Sin embargo, «mosquitos» no corresponde tan bien como «jejenes» o «mosquitos pequeños» al campo semántico de ''gnats'', y «ganado» estrecha innecesariamente בְּהֵמָה, que aquí funciona mejor como colectivo más amplio (''bestias/animales'').'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para alinearse mejor con el audit trail y la legibilidad eclesial amplia. «Sobre el hombre» suena algo rígido; «sobre la gente» sería más natural, pero el expediente inglés decidió conservar el singular representativo. Para mantener ese rationale sin sonar demasiado forzado, «sobre el ser humano» sería más natural, aunque se aparta del paralelismo formal. La reparación mínima recomendable es ajustar el insecto y el animal colectivo.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. «Magos» y «artes secretas» están bien alineados con las decisiones documentadas. El punto principal es lexical: הַכִּנִּים no se refleja bien con «mosquitos», y בְּהֵמָה no conviene limitarlo a «ganado» cuando el inglés preservó ''beast'' por su valor colectivo formal.'
  issues:
  - severity: medium
    issue: «Mosquitos» para הַכִּנִּים
    rationale: El English POB eligió 'gnats' con nota 'or lice'. «Mosquitos» en español suele evocar zancudos/mosquitoes, no jejenes/gnats, y puede desviar el referente. «Jejenes» preserva mejor la elección principal y deja «piojos» como alternativa documentada.
  - severity: medium
    issue: «Ganado» para וּבַבְּהֵמָה
    rationale: «Ganado» restringe el colectivo a reses/livestock, mientras que בְּהֵמָה aquí contrasta colectivamente con אָדָם. Una opción como «las bestias» preserva mejor el singular colectivo del hebreo y la decisión inglesa 'beast'.
  - severity: low
    issue: Ritmo y naturalidad de la cláusula final
    rationale: 'La frase final funciona, pero con los ajustes sugeridos queda más cercana al paralelismo fuente: «y los jejenes estaban sobre el hombre y sobre las bestias».'
  revised_spanish_text: Y los magos hicieron lo mismo con sus artes secretas para sacar los jejenes[a], pero no pudieron; y los jejenes estaban sobre el hombre y sobre las bestias.
