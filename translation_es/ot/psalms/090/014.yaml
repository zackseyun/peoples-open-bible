  revision_rationale: Se cambia la primera cláusula de respuesta a 'cantaremos de gozo' para reflejar la fuerza vocal de רנן y seguir la decisión documentada por la POB inglesa ('sing for joy'). Se mantiene 'nos alegraremos' para שמח, evitando redundancia y preservando mejor el paralelismo hebreo. El resto del texto puede mantenerse como fiel y natural en español.
