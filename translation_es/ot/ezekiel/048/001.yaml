translation:
  language: es
  text: 'Ahora bien, estos son los nombres de las tribus: desde el extremo norte, junto al camino de Hetlón hasta Lebo-hamat[a], Hazar-enán, en el límite de Damasco hacia el norte, junto a Hamat; y su territorio se extenderá desde el lado oriental hasta el mar: Dan, una porción.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Lebo-hamat, entendido tradicionalmente como topónimo; literalmente, «la entrada de Hamat».
    reason: lexical_alternative
  - marker: b
    text: O «y tendrá su lado desde el oriente hasta el mar»; la cláusula hebrea es comprimida y describe la extensión de este a oeste de la porción de Dan.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estos son
  alternatives_spanish:
  - Y estos son
  - Ahora estos son
  lexicon: HALOT
  rationale: Introduce la lista con fluidez natural en español sin perder la fuerza conjuntiva del hebreo.
- source_word: שְׁמוֹת הַשְּׁבָטִים
  english_pob_choice: the names of the tribes
  chosen_spanish: los nombres de las tribus
  alternatives_spanish:
  - los nombres de las tribus de Israel
  - los nombres de los clanes tribales
  lexicon: HALOT
  rationale: ‘Tribus’ reproduce el sentido habitual del listado territorial israelita y evita una paráfrasis más amplia que el hebreo no exige.
- source_word: מִקְצֵה צָפוֹנָה
  english_pob_choice: from the northern extremity
  chosen_spanish: desde la extremidad norte
  alternatives_spanish:
  - desde el extremo norte
  - desde el límite norte
  lexicon: HALOT
  rationale: ‘Extremidad’ mantiene el registro formal y la idea de un punto límite; ‘norte’ conserva la orientación del hebreo.
- source_word: אֶל יַד
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto al
  lexicon: HALOT
  rationale: La locución de frontera expresa adyacencia; ‘junto a’ es natural en español y conserva la relación topográfica.
- source_word: דֶּרֶךְ חֶתְלֹן
  english_pob_choice: the way of Hethlon
  chosen_spanish: el camino de Hetlón
  alternatives_spanish:
  - la ruta de Hetlón
  - el camino hacia Hetlón
  lexicon: HALOT
  rationale: ‘Camino’ traduce דֶּרֶךְ de manera directa y legible; se conserva el topónimo transliterado.
- source_word: לְבוֹא חֲמָת
  english_pob_choice: Lebo-hamath
  chosen_spanish: Lebo-hamat
  alternatives_spanish:
  - la entrada de Hamat
  - Lebo-Hamat
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalmente transliterado en español, evitando forzar una explicación dentro del texto principal.
- source_word: חֲצַר עֵינָן
  english_pob_choice: Hazar-enan
  chosen_spanish: Hazar-enán
  alternatives_spanish:
  - Hazar Enán
  - Hazar-enan
  lexicon: HALOT
  rationale: Topónimo transliterado según uso castellano; el acento ayuda a la pronunciación sin alterar el nombre.
- source_word: גְּבוּל דַּמֶּשֶׂק צָפוֹנָה
  english_pob_choice: at the border of Damascus northward
  chosen_spanish: al límite de Damasco hacia el norte
  alternatives_spanish:
  - en el límite de Damasco al norte
  - al borde de Damasco hacia el norte
  lexicon: HALOT
  rationale: ‘Límite’ comunica el valor de frontera del sustantivo hebreo; ‘hacia el norte’ reproduce la orientación del adverbio sin rigidizar el orden español.
- source_word: אֶל יַד חֲמָת
  english_pob_choice: beside Hamath
  chosen_spanish: junto a Hamat
  alternatives_spanish:
  - al lado de Hamat
  - junto a Hamat
  lexicon: HALOT
  rationale: Se mantiene la misma locución de adyacencia que antes del versículo para consistencia estilística.
- source_word: וְהָיוּ לוֹ
  english_pob_choice: and extending for it
  chosen_spanish: y se extenderá para él
  alternatives_spanish:
  - y será para él
  - y le corresponderá
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica; en español conviene explicitar la extensión del territorio sin perder la idea de posesión/asignación.
- source_word: פְאַת קָדִים הַיָּם
  english_pob_choice: from the east side to the sea
  chosen_spanish: desde el lado oriental hasta el mar
  alternatives_spanish:
  - desde el lado este hasta el mar
  - desde el oriente hasta el mar
  lexicon: HALOT
  rationale: ‘Lado oriental’ mantiene el valor espacial de פְאַת קָדִים y suena natural en español bíblico contemporáneo.
- source_word: דָּן אֶחָד
  english_pob_choice: Dan, one portion
  chosen_spanish: Dan, una porción
  alternatives_spanish:
  - Dan, un lote
  - Dan, una asignación
  lexicon: HALOT
  rationale: ‘Porción’ refleja el reparto territorial y evita un término demasiado técnico que el contexto no obliga.
theological_decisions:
- issue: Referencia implícita a la distribución territorial de las tribus
  english_pob_reading: The verse lists tribal allotment boundaries without doctrinal expansion.
  chosen_spanish_reading: El versículo presenta límites de reparto tribal sin añadir interpretación doctrinal.
  alternative_spanish_readings:
  - El versículo describe herencias tribales con lenguaje puramente geográfico.
  - El texto establece la asignación territorial sin implicación teológica explícita.
  rationale: No hay un problema doctrinal específico en el verso; la traducción debe conservar su carácter topográfico y administrativo.
  doctrine_reference: none
translation_notes:
  revision_awareness: Coincide sustancialmente con el expediente inglés POB de alta concordancia; se conserva la decisión de tratar לְבוֹא חֲמָת como topónimo y la de explicitar la cláusula comprimida de extensión territorial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se transliteran los topónimos de forma consistente y con acentuación española cuando ayuda a la lectura.
  - Se conserva la estructura de lista de fronteras sin suavizarla en una paráfrasis narrativa.
