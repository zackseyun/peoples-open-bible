lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La combinación condicional con valor adversativo se expresa de forma natural en español con «Pero si», conservando el contraste con lo anterior sin perder la condición.
- source_word: מָאֵן
  english_pob_choice: refuse
  chosen_spanish: te niegas
  alternatives_spanish:
  - rehúsas
  - rechazas
  lexicon: HALOT
  rationale: El verbo señala una negativa volitiva; «te niegas» comunica bien la resistencia personal y resulta idiomático en español bíblico contemporáneo.
- source_word: לָצֵאת
  english_pob_choice: to go out
  chosen_spanish: salir
  alternatives_spanish:
  - irte
  - salir afuera
  lexicon: HALOT
  rationale: «Salir» reproduce con naturalidad el sentido básico de ir hacia afuera, sin añadir explícitamente la idea de rendición que el hebreo no dice de manera directa.
- source_word: זֶה הַדָּבָר
  english_pob_choice: this is the word
  chosen_spanish: esta es la palabra
  alternatives_spanish:
  - este es el asunto
  - esta es la cosa
  lexicon: HALOT
  rationale: Aunque דָּבָר puede significar también «asunto» o «cosa», «palabra» conserva mejor el tono profético de una comunicación divina, en línea con la decisión inglesa.
- source_word: אֲשֶׁר הִרְאַנִי
  english_pob_choice: that ... has shown me
  chosen_spanish: que me ha mostrado
  alternatives_spanish:
  - que me ha revelado
  - que me ha hecho ver
  lexicon: HALOT
  rationale: El causativo de ראה puede traducirse como «mostrar»; «me ha mostrado» mantiene el matiz visual-revelatorio y suena natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la norma del proyecto en español, evitando la sustitución por un título y manteniendo la correspondencia directa con el Tetragrámaton.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
