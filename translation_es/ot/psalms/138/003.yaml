translation:
  language: es
  text: El día en que te llamé, tú me respondiste; me hiciste valiente[a] en mi alma con fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ensanchaste en mi alma con fuerza», o más idiomáticamente, «me fortaleciste por dentro». El verbo hebreo es difícil y puede expresar la idea de infundir valor, ensanchar o fortalecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - Cuando
  - El día en que
  lexicon: HALOT
  rationale: La expresión temporal concreta se conserva con una construcción natural en español. «En el día» refleja de cerca el valor del preposición + sustantivo, sin perder legibilidad.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: clamé
  alternatives_spanish:
  - llamé
  - grité
  lexicon: HALOT
  rationale: En contexto de oración, «clamar» comunica bien el acto de dirigirse a Dios con urgencia o súplica, sin añadir una intensidad emocional mayor que la del hebreo. «Llamé» es más literal pero menos idiomático aquí.
- source_word: וַתַּעֲנֵנִי
  english_pob_choice: you answered me
  chosen_spanish: tú me respondiste
  alternatives_spanish:
  - me respondiste
  - tú me contestaste
  lexicon: HALOT
  rationale: «Responder» es el equivalente más natural en español para el hebreo ענה en este contexto. Se conserva el pronombre explícito «me» para reflejar el sufijo y la relación personal del verso.
- source_word: תַּרְהִבֵנִי
  english_pob_choice: you made me bold
  chosen_spanish: me hiciste valiente
  alternatives_spanish:
  - me embargaste de valor
  - me diste ánimo
  - me agrandaste
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y admite varias lecturas. «Me hiciste valiente» preserva la idea de emboldening/fortalecimiento interior en un español claro. Se evita cerrar el sentido a una sola paráfrasis más interpretativa.
- source_word: בְנַפְשִׁי
  english_pob_choice: in my soul
  chosen_spanish: en mi alma
  alternatives_spanish:
  - dentro de mí
  - en mi ser
  lexicon: HALOT
  rationale: «Alma» mantiene visible la referencia al interior de la persona y corresponde bien al valor de נפש. «Dentro de mí» sería más fluido, pero borra la forma lexical del original.
- source_word: עֹז
  english_pob_choice: with strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - con vigor
  - con fortaleza
  lexicon: HALOT
  rationale: «Fuerza» es un equivalente claro y amplio para עֹז. La preposición «con» mantiene la lectura adverbial/instrumental propuesta en el audit trail inglés, sin forzar una explicación más específica.
theological_decisions:
- issue: Interpretación de תַּרְהִבֵנִי בְנַפְשִׁי עֹז
  english_pob_reading: you made me bold in my soul with strength
  chosen_spanish_reading: me hiciste valiente en mi alma con fuerza
  alternative_spanish_readings:
  - me agrandaste en mi alma con fuerza
  - me diste valor en mi interior
  rationale: La frase hebrea es léxicamente difícil y el POB inglés preserva esa tensión. La traducción elegida mantiene la idea de fortalecimiento/emboldening interior sin resolver de manera excesiva si la imagen primaria es valentía, ensanchamiento o fortaleza. Así se conserva la ambigüedad auditable del original.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica/teológica cuando el texto fuente es genuinamente ambiguo.'
translation_notes:
  revision_awareness: El texto coincide con la decisión editorial inglesa más reciente (sin cambios necesarios) y mantiene la misma solución para la cláusula difícil de תַּרְהִבֵנִי, conservando la ambigüedad documentada en el aparato auditado.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para YHWH porque este versículo no lo contiene.
  - «Alma» se usa de forma consistente con נפש, manteniendo la referencia al interior personal.
  - «Fuerza» conserva la fuerza semántica de עֹז sin introducir un matiz doctrinal nuevo.
  - La nota al pie señala alternativas reales del hebreo, no una paráfrasis libre.
