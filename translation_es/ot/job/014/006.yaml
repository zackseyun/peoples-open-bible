translation:
  language: es
  text: Aparta de él tu mirada[a], para que repose, hasta que cumpla su día como un jornalero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aparta de él tu mirada, y déjalo cesar, hasta que goce de su día como un jornalero». El hebreo permite una lectura que resalta la cesación o el respiro, o bien el disfrute al completar el día asignado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁעֵה
  english_pob_choice: Look away
  chosen_spanish: Aparta de él tu mirada
  alternatives_spanish:
  - Aparta tu vista de él
  - Deja de mirarlo
  - Vuelve tu mirada de él
  lexicon: HALOT
  rationale: El imperativo pide retirar la atención o mirada; «aparta tu mirada» conserva la imagen directa y natural en español.
- source_word: מֵעָלָיו
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - apartándose de él
  - lejos de él
  lexicon: HALOT
  rationale: La preposición expresa alejamiento de la atención o presión sobre la persona. En español, «de él» funciona de forma idiomática con «aparta».
- source_word: וְיֶחְדָּל
  english_pob_choice: so that he may rest
  chosen_spanish: para que repose
  alternatives_spanish:
  - y cese
  - para que descanse
  - y tenga respiro
  lexicon: HALOT
  rationale: חדל puede significar cesar o detenerse; aquí el contexto favorece cesación de la aflicción. «Repose» conserva la idea de alivio sin volverla demasiado interpretativa.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: HALOT
  rationale: Marca límite temporal de la petición, y «hasta que» es la equivalencia natural en español.
- source_word: יִרְצֶה
  english_pob_choice: he fulfills
  chosen_spanish: cumpla
  alternatives_spanish:
  - se satisfaga
  - disfrute
  - complete
  lexicon: HALOT
  rationale: רצה admite la idea de estar satisfecho o llegar al cumplimiento debido. En combinación con «su día», «cumpla» comunica el llegar al término asignado sin exagerar el matiz emocional.
- source_word: כְּשָׂכִיר
  english_pob_choice: like a hired worker
  chosen_spanish: como un jornalero
  alternatives_spanish:
  - como un obrero contratado
  - como un trabajador asalariado
  - como un contratado
  lexicon: HALOT
  rationale: שָׂכִיר designa a quien trabaja por paga; «jornalero» es breve, comprensible y reproduce bien la imagen social del trabajador por día.
- source_word: יוֹמוֹ
  english_pob_choice: his day
  chosen_spanish: su día
  alternatives_spanish:
  - su jornada
  - su día de trabajo
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea. El contexto laboral ya queda indicado por «jornalero».
translation_notes:
  revision_awareness: El texto inglés POB más reciente mantiene la lectura óptima «Look away from him, so that he may rest, until he fulfills his day like a hired worker» y añade una nota alternativa que permite también «and let him cease» / «until he enjoys his day». La versión española conserva esa tensión léxica mediante «repose» y la nota al pie.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera; este versículo no lo contiene.
  - «Jornalero» se usa aquí por la imagen de trabajo por día, sin introducir terminología eclesiástica.
  - La nota [a] preserva la alternativa de cesación/disfrute reflejada en el aparato inglés, sin duplicar marcadores.
