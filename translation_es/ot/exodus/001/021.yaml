translation:
  language: es
  text: Y porque las parteras temieron a Dios, él les hizo hogares[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «él les hizo casas». El hebreo puede referirse a establecer hogares o familias, más que a construir casas físicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Y sucedió que, porque
  - Y cuando
  lexicon: HALOT
  rationale: La secuencia introduce una relación causal o circunstancial. En español, «y porque» comunica con naturalidad el nexo que la POB inglesa resolvió con «And because», sin recargar la frase con un giro más literal y pesado.
- source_word: יָרְאוּ
  english_pob_choice: feared
  chosen_spanish: temieron
  alternatives_spanish:
  - reverenciaron
  - tuvieron miedo de
  lexicon: HALOT
  rationale: «Temieron» mantiene el peso bíblico del verbo y puede abarcar tanto temor como reverencia ante Dios. «Reverenciaron» suaviza demasiado el término y perdería la tensión lexical que la POB inglesa preserva con «feared».
- source_word: הַמְיַלְּדֹת
  english_pob_choice: the midwives
  chosen_spanish: las parteras
  alternatives_spanish:
  - las comadronas
  lexicon: HALOT
  rationale: El participio sustantivado con artículo se refiere a las mujeres ya presentadas en el contexto. «Parteras» es claro, natural y fiel al referente social del pasaje.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español idiomático aquí corresponde «Dios». Mantiene la referencia al Dios verdadero sin forzar una forma no natural.
- source_word: וַיַּעַשׂ
  english_pob_choice: he made
  chosen_spanish: él les hizo
  alternatives_spanish:
  - él les estableció
  - él les proporcionó
  lexicon: HALOT
  rationale: «Hizo» reproduce de cerca la amplitud de עשה, como la POB inglesa con «made». Conserva la transparencia lexical y deja que el objeto determine el alcance del acto.
- source_word: בָּתִּים
  english_pob_choice: households
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - familias
  lexicon: HALOT
  rationale: La POB inglesa decidió mantener la tensión entre el sentido literal «houses» y el posible sentido idiomático de linaje o familia. En español, «casas» conserva esa literalidad, y el sentido más amplio queda accesible sin cerrar la ambigüedad.
theological_decisions:
- issue: Sentido de «he made houses for them»
  english_pob_reading: God granted the midwives households/families.
  chosen_spanish_reading: Dios les dio casas, con posible sentido de hogar, linaje o familia establecida.
  alternative_spanish_readings:
  - Dios les construyó casas.
  - Dios les estableció hogares o familias.
  rationale: El hebreo עשׂה ... בתים puede referirse a un establecimiento de casa/linaje, pero el texto también admite la lectura más literal de casas físicas. La traducción principal mantiene la transparencia con «casas», mientras que la nota conserva la alternativa interpretativa sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Se mantiene el acuerdo alto del pasaje con la revisión más reciente: no se introdujeron cambios sustantivos respecto del sentido auditado en la POB inglesa. La única decisión sensible es conservar en el texto principal «casas» y explicar en nota la posible lectura idiomática de «hogares/familias».'
  spanish_consistency_notes:
  - Se preservó «Dios» y no «el Dios» para evitar una dureza no idiomática en español.
  - Se usó «temieron» para sostener la fuerza bíblica del verbo sin convertirlo en una simple emoción.
  - El pronombre «él» se refiere a Yahvé por el contexto narrativo; no se necesitó explicitar el nombre divino en esta línea.
  - La nota al pie conserva la tensión entre literalidad y sentido idiomático sin resolverla de forma unilateral.
