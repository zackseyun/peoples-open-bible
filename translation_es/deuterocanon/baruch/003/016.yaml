translation:
  language: es
  text: ¿Dónde están los gobernantes de las naciones, y los que ejercen dominio sobre las bestias[a] de la tierra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «animales salvajes de la tierra». El griego θηρίων puede designar bestias en general o, más específicamente, animales salvajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde... ?
  alternatives_spanish:
  - ¿Dónde ahora... ?
  lexicon: BDAG
  rationale: La pregunta griega es interrogativa directa sobre el paradero o la situación presente; «¿Dónde» reproduce esa fuerza sin añadir énfasis que no está en el texto.
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - líderes
  - regentes
  lexicon: BDAG
  rationale: El término señala personas con autoridad. En español, «gobernantes» conserva la referencia política y resulta natural en un registro bíblico contemporáneo; «príncipes» sería más arcaico y «líderes» demasiado amplio.
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: BDAG
  rationale: Aquí el sentido es político/colectivo, no el contraste técnico «gentiles» de otros contextos. «De las naciones» sigue de cerca el griego y evita una carga confesional ajena al pasaje.
- source_word: κυριεύοντες
  english_pob_choice: those who rule over
  chosen_spanish: los que dominan sobre
  alternatives_spanish:
  - los que gobiernan sobre
  - los que ejercen dominio sobre
  - los que mandan sobre
  lexicon: BDAG
  rationale: El participio expresa ejercer dominio. «Los que dominan sobre» reproduce bien la fuerza verbal y mantiene la relación con el objeto dominado; «gobiernan sobre» suena más administrativo y menos enérgico.
- source_word: θηρίων
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales salvajes
  - las fieras
  lexicon: BDAG
  rationale: «Bestias» preserva el tono elevado y amplio del griego. «Animales salvajes» aclara el referente, pero interpreta más de lo necesario; «fieras» estrecha demasiado el campo semántico.
- source_word: τῶν ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - sobre la tierra
  - de la tierra, es decir, terrenales
  lexicon: BDAG
  rationale: En español, la relación más natural con «bestias» es «de la tierra», que comunica la pertenencia o ámbito sin forzar un giro locativo duro. «Sobre la tierra» sería más literal, pero menos idiomático aquí.
translation_notes:
  revision_awareness: El texto griego de Baruc 3:16 en la capa de traducción corresponde al override normalizado del corpus adjudicado; la lectura del pasaje fue verificada como de alta concordancia y no hubo cambios posteriores que afecten esta línea. La versión española refleja directamente el griego auditado y conserva la alternativa léxica documentada para θηρίων.
  spanish_consistency_notes:
  - 'Se usa «gobernantes/gobernantes»? No: se eligió «gobernantes» como forma más natural en español bíblico moderno para ἄρχοντες, manteniendo la idea de autoridad.'
  - Se conserva «las bestias» para θηρίων, en línea con la decisión inglesa de preservar el tono elevado; la nota al pie mantiene la alternativa «animales salvajes» sin borrar la tensión léxica.
  - No se introduce lenguaje teológico adicional ni equivalencias confesionales; el versículo es una pregunta retórica de desaparición/pérdida de poder.
  - La puntuación española sigue la interrogación directa y mantiene el paralelismo de los dos miembros coordinados.
