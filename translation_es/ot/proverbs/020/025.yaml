review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura proverbial y la secuencia reprendida en el hebreo: primero una declaración impulsiva sobre lo santo, y después la revisión de los votos. Sin embargo, «prometer precipitadamente» no preserva con suficiente fidelidad la revisión inglesa auditada («say, “It is holy,”») ni la alternativa documentada de habla impulsiva; además introduce más específicamente la idea de promesa que el texto principal ya expresa después con «votos».'
  spanish_quality_summary: 'El español es claro y digno, pero «prometer precipitadamente: “Es santo”» suena semánticamente tenso y menos natural que una formulación centrada en decir/declarar. Cambiar a «decir precipitadamente» mejora la legibilidad y evita duplicar innecesariamente el campo semántico de votos/promesas.'
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Lazo», «el hombre», «santo» y «votos» son adecuados. El ajuste principal es lexical: para יָלַע conviene «decir precipitadamente» en el texto principal, dejando en nota la otra posibilidad interpretativa ligada a la consagración.'
  issues:
  - severity: medium
    issue: «prometer precipitadamente» sobreinterpreta יָלַע en el texto principal
    rationale: La versión inglesa auditada fue revisada expresamente a «rashly say, “It is holy,”» para acercarse más al hebreo. El español actual vuelve a una interpretación más fuerte, como si el verbo principal fuera prometer o hacer voto, lo cual reduce la fidelidad al ajuste documentado.
  - severity: low
    issue: Redundancia conceptual con «sus votos»
    rationale: 'Usar «prometer» al inicio y luego «sus votos» al final carga dos veces el mismo campo semántico y vuelve menos nítido el paralelismo: palabra impulsiva primero, examen de votos después.'
  revised_spanish_text: 'Es un lazo para el hombre decir precipitadamente: «Es santo»[a], y sólo después considerar sus votos.'
  revised_footnotes:
  - marker: a
    text: 'O: «consagrar precipitadamente». El verbo hebreo es difícil; el proverbio advierte contra hablar o actuar impulsivamente respecto de lo que se ha apartado para Dios.'
    reason: lexical_alternative
