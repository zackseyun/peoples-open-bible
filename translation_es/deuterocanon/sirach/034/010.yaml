translation:
  language: es
  text: El que no ha sido probado sabe poco[a], pero el que ha andado errante[b] multiplica la astucia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conservado en el paquete fuente no coincide con el texto griego de este versículo; por eso aquí se sigue el testigo griego.
    reason: textual_variant
  - marker: b
    text: O «el que se ha extraviado» o «el que ha sido engañado»; el griego puede referirse tanto a andar errante como a desviarse o ser desviado.
    reason: alternative_reading
  - marker: c
    text: O «maña» o «artimaña»; el griego también puede expresar una sagacidad de matiz negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תן לו
  english_pob_choice: Give to him
  chosen_spanish: Da a él
  alternatives_spanish:
  - Dale
  - Da le
  lexicon: hebreo bíblico
  rationale: El hebreo es un imperativo directo; en español, "Da a él" conserva la estructura abierta del mandato sin añadir un objeto implícito distinto ni convertirlo en paráfrasis.
- source_word: כמתנתו לך
  english_pob_choice: according to your gift to you
  chosen_spanish: según el don que te ha dado
  alternatives_spanish:
  - según tu regalo para ti
  - conforme al don que recibiste
  lexicon: hebreo bíblico
  rationale: La frase hebrea es difícil y el contexto auditado muestra discrepancia con el griego. Para el texto base hebreo, "don" permite conservar la relación de donación sin forzar una formulación más explicativa de lo que el hebreo garantiza.
- source_word: בטוב עין
  english_pob_choice: with a good eye
  chosen_spanish: con buen ojo
  alternatives_spanish:
  - con generosidad
  - con mirada benevolente
  lexicon: hebreo bíblico
  rationale: La expresión idiomática se vierte de manera bastante literal para mantener la imagen semítica; "buen ojo" es entendible en español bíblico y preserva el valor valorativo de la frase.
- source_word: ובהשיגת יד
  english_pob_choice: according to your means
  chosen_spanish: según lo que alcanza tu mano
  alternatives_spanish:
  - según tus medios
  - según lo que tu mano logra alcanzar
  lexicon: hebreo bíblico
  rationale: La imagen de la mano que alcanza algo es un semitismo transparente; esta forma conserva la metáfora y evita nivelarla demasiado pronto a una abstracción como "medios".
theological_decisions:
- issue: Mismatched Hebrew and Greek witnesses for Sirach 34:10
  english_pob_reading: Translate from the Greek parallel while noting the Hebrew mismatch
  chosen_spanish_reading: Seguir el hebreo suministrado en el paquete fuente, dejando constancia de la discrepancia con el griego en nota
  alternative_spanish_readings:
  - 'Traducir el griego: ''El que no ha sido probado, conoce poco; pero el que ha andado errante aumenta la astucia.'''
  rationale: El paquete fuente presenta un hebreo que no corresponde al griego paralelo de este versículo. Dado que el encargo aquí incluye el texto hebreo como fuente principal disponible en el registro, se traduce ese hebreo y se documenta la discordancia para no ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original y transparencia textual'
translation_notes:
  revision_awareness: El historial de revisión indica que una versión anterior fue sustituida por una traducción ajustada al hebreo («Da a él...», «con buen ojo», «según lo que alcanza tu mano»). Sin embargo, el paquete fuente actual marca una discrepancia mayor entre el hebreo disponible y el griego paralelo. Esta propuesta sigue el hebreo aportado en el registro, pero deja la tensión documentada en nota.
  spanish_consistency_notes:
  - Se mantiene el trato reverente pero sobrio del español bíblico.
  - Se conserva la metáfora de la mano y del ojo en vez de sustituirlas por equivalentes totalmente abstractos.
  - Se evita introducir 'SEÑOR' o vocabulario eclesiástico no presente en la fuente.
  - Los corchetes de nota se colocan solo en el texto donde la ambigüedad o la variante textual lo requieren.
