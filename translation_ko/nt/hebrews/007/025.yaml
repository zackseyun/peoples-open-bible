  yaml_path: translation/nt/hebrews/007/025.yaml
  text: Therefore he is also able to save completely those who draw near to God through him, since he always lives to intercede for them.
translation:
  language: ko
  text: 그러므로 그분은 자기를 통하여 하나님께 나아오는 자들을 끝까지[a] 구원하실 수 있으니, 항상 살아 계셔서 그들을 위하여 중보하시기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 εἰς τὸ παντελές는 「완전히, 끝까지, 영원히」를 모두 의미한다. 시간적 완전성(영원토록)과 정도적 완전성(완전히)이 함께 담겨 있다.
    reason: lexical_alternative
theological_decisions:
- issue: εἰς τὸ παντελές의 번역 — 정도적 완전 vs. 시간적 완전
  chosen_reading: 끝까지 (시간·정도 함께 포함하는 한국어 표현)
  alternative_readings:
  - 완전히
  - 영원토록
  - 온전히
  rationale: παντελές는 두 의미를 모두 담고 있어 어느 한 쪽으로만 옮기면 손실이 있다. 「끝까지」는 시간적 종결성과 행위의 철저함을 동시에 시사하므로, 양 의미를 함께 보존한다. 각주에서 두 가능성을 다 밝힌다.
  doctrine_reference: 'DOCTRINE.md: preserve theological ambiguity where source carries both'
