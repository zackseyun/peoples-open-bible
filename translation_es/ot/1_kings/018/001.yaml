translation:
  language: es
  text: 'Y aconteció después de muchos días que la palabra de Yahvé vino a Elías en el tercer año[a], diciendo: «Ve, muéstrate a Acab, y yo daré lluvia sobre la tierra».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y enviaré lluvia sobre la tierra». El hebreo dice literalmente: «daré lluvia sobre la faz de la tierra».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre la faz de la tierra».
    reason: literal_image_preservation
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo episodio; «aconteció» conserva el tono bíblico sin caer en un calco rígido del inglés.
- source_word: יָמִים רַבִּים
  english_pob_choice: after many days
  chosen_spanish: después de muchos días
  alternatives_spanish:
  - tras muchos días
  - después de largo tiempo
  lexicon: HALOT
  rationale: Expresa con naturalidad la idea idiomática de un lapso prolongado y mantiene la proximidad al hebreo.
- source_word: וּדְבַר יְהוָה הָיָה אֶל
  english_pob_choice: the word of Yahweh came to
  chosen_spanish: la palabra de Yahvé vino a
  alternatives_spanish:
  - la palabra de Yahvé llegó a
  - vino a Elías la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética clásica con el nombre divino Yahvé, conforme al criterio del proyecto, y con «vino a» como equivalente idiomático de הָיָה אֶל.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁית
  english_pob_choice: in the third year
  chosen_spanish: en el tercer año
  alternatives_spanish:
  - durante el tercer año
  lexicon: HALOT
  rationale: La expresión temporal es directa; en español, «en el tercer año» es la forma más natural y fiel.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Introduce el discurso directo de manera transparente y cercana al patrón hebreo.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  lexicon: HALOT
  rationale: Imperativo breve y natural en español para reproducir la orden simple del hebreo.
- source_word: הֵרָאֵה אֶל
  english_pob_choice: show yourself to
  chosen_spanish: muéstrate a
  alternatives_spanish:
  - preséntate ante
  - aparecer ante
  lexicon: HALOT
  rationale: 'El nifal imperativo de ראה tiene sentido reflexivo: hacerse ver. «Muéstrate a» conserva la fuerza del mandato y su orientación a Acab.'
- source_word: וְאֶתְּנָה מָטָר
  english_pob_choice: and I will give rain
  chosen_spanish: y yo daré lluvia
  alternatives_spanish:
  - y enviaré lluvia
  lexicon: HALOT
  rationale: Se mantiene el valor literal de נתן («dar») y la idea de que la lluvia es concedida por Dios, sin borrar la tensión entre «dar» y «enviar» registrada en el audit trail inglés.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: upon the face of the land
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la faz del suelo
  - sobre la tierra
  lexicon: HALOT
  rationale: «Faz» conserva la imagen hebrea de פְּנֵי; «tierra» resulta más natural en español que una repetición literal de «tierra/terreno» y sigue la lectura contextual del pasaje de sequía.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino según la doctrina del proyecto y el audit trail inglés; no se sustituye por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre «dar lluvia» y «enviar lluvia»
  english_pob_reading: and I will give rain
  chosen_spanish_reading: y yo daré lluvia
  alternative_spanish_readings:
  - y enviaré lluvia
  rationale: El hebreo usa נתן, «dar». La traducción conserva esa formulación para no perder el énfasis teológico de la lluvia como don concedido por Dios, aunque en español exista la alternativa idiomática «enviar lluvia».
  doctrine_reference: 'DOCTRINE.md: Fidelity to source wording over idiomatic smoothing when theological force is at stake'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se preservó la fórmula profética, el nombre divino Yahvé, el valor literal de נתן («dar») y la imagen hebrea de «la faz de la tierra», ajustando la sintaxis al español natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «muéstrate a» para הֵרָאֵה אֶל, evitando una paráfrasis más débil.
  - «Lluvia» se mantuvo como objeto directo de «dar» para reflejar el hebreo y el audit trail inglés.
  - Se empleó «faz» para פְּנֵי para conservar la imagen semítica sin oscurecer la lectura.
  - La puntuación del discurso directo sigue la norma española con comillas angulares.
