translation:
  language: es
  text: Y se le informó a David lo que había hecho Rispa, hija de Aía, concubina de Saúl.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le reportó
  - se le dijo
  lexicon: HALOT
  rationale: El pasivo de נגד transmite que la información llegó a David sin enfatizar al agente. «Se le informó» conserva bien esa pasividad y resulta natural en español moderno, más cercano a «it was reported» que un simple «se le dijo».
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: La preposición ל marca destinatario del informe. En español, «a David» expresa con claridad el complemento indirecto sin añadir matiz de propósito.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - que
  lexicon: HALOT
  rationale: La secuencia objeto + relativo introduce el contenido informado. «Lo que» es la opción más natural en español y preserva el valor de contenido del hebreo sin volverlo demasiado abstracto.
- source_word: עָשְׂתָה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había realizado
  - hizo
  lexicon: HALOT
  rationale: El perfecto hebreo refiere una acción anterior al reporte. El pluscuamperfecto español «había hecho» reproduce esa anterioridad narrativa mejor que un simple pretérito.
- source_word: רִצְפָּה
  english_pob_choice: Rizpah
  chosen_spanish: Rispa
  alternatives_spanish:
  - Rizpa
  - Rispá
  lexicon: transliteración del nombre propio
  rationale: Se adapta el nombre a la ortografía española habitual para nombres bíblicos, manteniendo la identificación del personaje sin sobrecargar con una grafía demasiado inglesa.
- source_word: בַת אַיָּה
  english_pob_choice: daughter of Aiah
  chosen_spanish: hija de Aía
  alternatives_spanish:
  - hija de Aya
  - la hija de Aía
  lexicon: HALOT
  rationale: La construcción patronímica se vierte de manera directa. «Hija de Aía» conserva la relación familiar y evita añadir artículos innecesarios.
- source_word: פִּלֶגֶשׁ שָׁאוּל
  english_pob_choice: Saul’s concubine
  chosen_spanish: concubina de Saúl
  alternatives_spanish:
  - la concubina de Saúl
  - mujer secundaria de Saúl
  lexicon: HALOT
  rationale: El término פִּלֶגֶשׁ pide un equivalente fuerte y sin eufemismo. «Concubina» preserva el valor social y relacional del hebreo, acorde con la decisión inglesa de no suavizarlo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se registran revisiones posteriores ni variantes textuales relevantes para esta cláusula.
  spanish_consistency_notes:
  - Se mantiene «David» y el nombre divino no aparece en este versículo.
  - Se conserva el registro narrativo directo y sobrio del relato, sin ampliar el contenido del informe.
  - «Concubina» se usa en sentido histórico-social, no como término moralizante adicional.
