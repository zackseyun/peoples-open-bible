  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> «Yahvé» está correcto; no hay otros términos doctrinales sensibles. La decisión para הָאֹמְנוֹת queda bien representada con una nota léxica contextual.'
