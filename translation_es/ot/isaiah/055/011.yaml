    rationale: Aunque no es incorrecto, la auditoría inglesa justifica «accomplish» por el matiz de realización eficaz tras la negación de «no volverá vacía». En español, «cumplirá» o «realizará» comunica mejor ese resultado efectivo sin sobreinterpretar.
  - severity: low
