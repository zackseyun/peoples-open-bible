  pericope is omitted by p66, p75, א, A*, B, C*, L, N, T, W, X, Δ, Θ, Ψ, 33, 565,
  1241, copsa, copbo, syrs, syrc. Present in D, K, M, U, Γ, f1 (after John 21:25),
  f13 (after Luke 21:38), 28, 700, 892, 1009, the Majority Text, the Latin tradition.
  Floats in different positions across manuscripts — clear evidence of an originally-independent
  oral tradition incorporated into the textual stream. Theologically and pastorally
  beloved across 1500 years of Christian reading; preserved here on those grounds
