revisions:
- from: Y aconteció que, el día en que Moisés terminó de levantar el tabernáculo[a], lo ungió y lo consagró, junto con todos sus utensilios, y el altar con todos sus utensilios; los ungió y los consagró.
  to: Y sucedió el día en que Moisés terminó de levantar el tabernáculo[a], que lo ungió y lo consagró, junto con todos sus objetos, y el altar con todos sus utensilios; los ungió y los consagró.
  rationale: La revisión hace un ajuste menor de fluidez en la apertura narrativa y recupera mejor la distinción contextual documentada entre los objetos generales del tabernáculo y los utensilios específicos del altar, sin apartarse del hebreo ni del rastro de auditoría inglés.
