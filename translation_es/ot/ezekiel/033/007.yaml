translation:
  language: es
  text: Y tú, hijo de hombre, te he puesto[a] como centinela para la casa de Israel; y oirás una palabra de mi boca y los advertirás de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te he nombrado un centinela para la casa de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conservo el giro idiomático y su fuerza literaria en Ezequiel. En español, 'hijo de hombre' mantiene la resonancia tradicional y el paralelismo con el uso repetido como vocativo divino, sin neutralizar el matiz masculino singular del hebreo.
- source_word: צֹפֶה
  english_pob_choice: watchman
  chosen_spanish: centinela
  alternatives_spanish:
  - atalaya
  - vigía
  lexicon: HALOT
  rationale: El sustantivo designa a quien vela y da aviso. 'Centinela' comunica bien la función de vigilancia y advertencia en un registro natural para el español bíblico; 'atalaya' puede sonar más arcaico y 'vigía' menos cargado de la metáfora de responsabilidad.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he नियुक्तado
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'te he dado', pero en esta construcción con el predicado nominal es más natural en español 'te he puesto' o 'te he hecho'. 'Te he puesto' preserva la idea de comisión/establecimiento sin burocratizarla.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - sobre la casa de Israel
  lexicon: HALOT
  rationale: La preposición ל expresa asignación y relación. 'Para la casa de Israel' comunica la comisión y el encargo en favor de Israel, manteniendo el sentido funcional de la frase.
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: and you shall hear
  chosen_spanish: y oirás
  alternatives_spanish:
  - y escucharás
  - y habrás de oír
  lexicon: HALOT
  rationale: Sigo la secuencia verbal hebrea de forma directa. 'Y oirás' es una forma clara y sobria que conserva el valor de la comisión sin volverlo explicativo de más.
- source_word: מִפִּי
  english_pob_choice: from my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - de mi boca
  - de mí
  lexicon: HALOT
  rationale: Mantengo la metáfora antropomórfica del hebreo. 'De mi boca' preserva la imagen de la palabra divina como pronunciada directamente por Yahvé; 'de mí' suavizaría esa concreción.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - una palabra
  lexicon: HALOT
  rationale: '''Palabra'' reproduce el valor amplio de דָּבָר en contexto profético y encaja naturalmente con ''de mi boca''. Evita sobreinterpretar como ''mensaje'' y mantiene la sobriedad del original.'
- source_word: וְהִזְהַרְתָּ
  english_pob_choice: you shall warn
  chosen_spanish: amonestarás
  alternatives_spanish:
  - advertirás
  - les darás aviso
  lexicon: HALOT
  rationale: El Hifil expresa hacer que alguien quede advertido. 'Amonestarás' transmite bien la acción de advertir con responsabilidad profética; 'advertirás' también sería posible, pero 'amonestar' conserva un tono más solemne en español bíblico.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los
  - a ellos
  lexicon: HALOT
  rationale: El objeto directo se refiere a la casa de Israel. En español, el clítico 'los' fluye mejor en la secuencia verbal y evita redundancia innecesaria.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mi parte
  alternatives_spanish:
  - de mi parte
  - de mí
  lexicon: HALOT
  rationale: El hebreo indica el origen y la autoridad del aviso. 'De mi parte' expresa con claridad que la amonestación viene con encargo y respaldo divinos; en español suena más idiomático que una repetición literal de 'de mí' al final de la cláusula.
theological_decisions:
- issue: Retención del vocativo profético בֶן אָדָם
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: Sigo la lectura literal tradicional para conservar el patrón recurrente del libro y su peso literario. En Ezequiel no se neutraliza el vocativo, porque forma parte de la voz divina dirigida al profeta y de su identidad textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Comisión profética con metáfora de vigilancia
  english_pob_reading: I have made you a watchman ... and you shall hear ... and warn
  chosen_spanish_reading: te he puesto como centinela ... y oirás ... y los amonestarás
  alternative_spanish_readings:
  - te he hecho centinela ... y oirás ... y los advertirás
  - te he puesto como atalaya ... y escucharás ... y los advertirás
  rationale: Opto por un equivalente natural que conserve la estructura de encargo, recepción de la palabra y deber de advertencia. No elimino la metáfora, porque es central para la responsabilidad profética en este pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy; optimal equivalence
- issue: Fuente inmediata del aviso profético
  english_pob_reading: from my mouth ... from me
  chosen_spanish_reading: de mi boca ... de mi parte
  alternative_spanish_readings:
  - de mi boca ... de mí
  - de mi boca ... por mí
  rationale: 'Mantengo la doble referencia a la procedencia divina: la palabra sale de la boca de Yahvé y la advertencia se hace con su autoridad. ''De mi parte'' evita una repetición dura y refleja el encargo delegativo del hebreo.'
  doctrine_reference: Teología bíblica de la palabra profética; comisión divina en Ezequiel
translation_notes:
  revision_awareness: 'He seguido de cerca el audit trail inglés: ''watchman'' se mantiene como metáfora de vigilancia; נְתַתִּיךָ admite tanto ''he made'' como ''appointed'', y en español se resuelve como ''te he puesto'' para una comisión natural; la revisión inglesa que fijó la secuencia verbal (''you shall hear ... and warn'') se refleja con la coordinación directa ''y oirás ... y los amonestarás''. También he conservado la imagen antropomórfica ''de mi boca'' y la fuente divina del encargo en ''de mi parte''.'
  spanish_consistency_notes:
  - Uso 'Yahvé' para el nombre divino cuando aparezca en el tramo inmediato del contexto mayor, conforme a las pautas del proyecto.
  - He preferido 'centinela' frente a 'atalaya' o 'vigía' por equilibrio entre claridad y registro bíblico.
  - '''Hijo de hombre'' se conserva como vocativo fijo, no como descripción genérica.'
  - '''Amonestarás'' mantiene el tono profético y la idea de advertencia con responsabilidad.'
  - La cláusula final 'de mi parte' recoge la autoridad del envío sin borrar la procedencia divina.
