translation:
  language: es
  text: Que no tense su arco[a] el arquero, ni se levante con su armadura[b]. No perdonen a sus jóvenes; consagren[c] a destrucción todo su ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que el arquero tense su arco»; el hebreo del miembro inicial es difícil y repetitivo, pero el sentido es una prohibición dirigida al que maneja el arco.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con su cota de malla» o «con su coraza».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «consagren a destrucción», término usado para poner personas o cosas bajo el ban en juicio divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל / וְאֶל / וְאַל
  english_pob_choice: Let not / and let him not / Do not
  chosen_spanish: No deje / ni se levante / No perdonen
  alternatives_spanish:
  - Contra
  - A
  - 'No'
  lexicon: HALOT
  rationale: Las formas con אֶל y וְאַל funcionan como prohibiciones en el contexto; en español conviene expresarlas con negación imperativa o exhortativa. 'No deje... ni se levante... No perdonen' refleja el valor prohibitivo sin conservar artificialmente el preposición literal.
- source_word: יִדְרֹךְ ... הַדֹּרֵךְ קַשְׁתּוֹ
  english_pob_choice: the archer bend his bow
  chosen_spanish: el armero tensar su arco
  alternatives_spanish:
  - el arquero tensar su arco
  - el que tensa su arco
  - el bowman tensar su arco
  lexicon: HALOT
  rationale: דָּרַךְ con קשת describe tensar o preparar el arco. 'Armero' no es adecuado here, so the clearer and faithful rendering is 'arquero'; the repeated Hebrew is difícil, y la prohibición recae sobre el que está por tensar el arco. Spanish accepts the infinitive after 'dejar' in a prohibition-like construction, but the clause remains awkward because the source is deliberately repetitivo.
- source_word: יִתְעַל
  english_pob_choice: rise up
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - se eleve
  - se suba
  lexicon: HALOT
  rationale: El hitpael de עלה aquí comunica alzarse o ponerse en posición de avance. 'Se levante' is natural in Spanish and preserves the military sense without overdetailing.
- source_word: בְּסִרְיֹנוֹ
  english_pob_choice: in his armor
  chosen_spanish: con su armadura
  alternatives_spanish:
  - en su armadura
  - con su coraza
  - con su cota de malla
  lexicon: HALOT
  rationale: סִרְיוֹן refiere a una pieza de armamento corporal; 'armadura' es la opción más clara en español general. Se evita 'cota de malla' o 'coraza' porque especifican más de lo que el término garantiza en este contexto.
- source_word: תַּחְמְלוּ
  english_pob_choice: spare
  chosen_spanish: No perdonen
  alternatives_spanish:
  - No tengan piedad de
  - No escatimen a
  - No se apiaden de
  lexicon: HALOT
  rationale: חמל en un oráculo bélico equivale a 'perdonar/ahorrar' la vida. 'No perdonen' recoge bien la fuerza práctica del mandamiento; 'tener piedad' sería posible pero menos directo.
- source_word: בַּחֻרֶיהָ
  english_pob_choice: her young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus jóvenes hombres
  - sus guerreros jóvenes
  - sus muchachos
  lexicon: HALOT
  rationale: בָּחוּר suele denotar joven varón en edad vigorosa; en español 'jóvenes' es natural y conserva la amplitud del término, mientras que 'guerreros' ya interpreta demasiado el contexto militar.
- source_word: הַחֲרִימוּ
  english_pob_choice: devote ... to destruction
  chosen_spanish: dediquen a destrucción
  alternatives_spanish:
  - destruyan por completo
  - pongan bajo el anatema
  - consagren a destrucción
  lexicon: HALOT
  rationale: חרם en hifil tiene el peso de 'consagrar/entregar al exterminio bajo juicio'. 'Dediquen a destrucción' intenta conservar la fuerza técnica sin imponer una formulación eclesiástica tradicional. Se evita 'anatema' por ser menos transparente para lectores amplios.
- source_word: כָּל צְבָאָהּ
  english_pob_choice: all her army
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - toda su hueste
  - todas sus fuerzas
  - todo su host
  lexicon: HALOT
  rationale: צָבָא aquí es la fuerza militar organizada. 'Ejército' es la mejor equivalencia moderna y mantiene el singular colectivo.
theological_decisions:
- issue: Lenguaje de חרם en un oráculo de juicio
  english_pob_reading: devote all her army to destruction
  chosen_spanish_reading: dediquen a destrucción todo su ejército
  alternative_spanish_readings:
  - destruyan por completo todo su ejército
  - pongan todo su ejército bajo el anatema
  rationale: El hebreo usa חחרם, término cargado teológicamente con la idea de poner algo bajo juicio divino y entregarlo a destrucción. La formulación elegida conserva ese peso sin añadir explicaciones doctrinales que no están en el versículo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hubo cambios requeridos en el control de alta concordancia. La redacción española se ajusta al mismo juicio auditado sobre la sintaxis prohibitiva, el sentido martial de דרך con קשת, la ambigüedad de סִרְיוֹן y el valor técnico de חרם.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé no pertinente aquí, por no aparecer el nombre divino en el versículo.
  - Se eligió una formulación prohibitiva natural en español para reproducir la función de אֶל / וְאַל.
  - '''Armadura'' se usa como equivalente general de סִרְיוֹן; la nota conserva alternativas más específicas.'
  - '''Dediquen a destrucción'' preserva el valor técnico de חרם sin recurrir a terminología eclesiástica opaca.'
