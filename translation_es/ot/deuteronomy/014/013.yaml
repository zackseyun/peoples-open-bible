lexical_decisions:
- source_word: הָרָאָה
  english_pob_choice: the glede
  chosen_spanish: el milano
  alternatives_spanish:
  - el kite
  - el busardo
  lexicon: HALOT
  rationale: El hebreo designa un ave rapaz de identificación incierta. Dado que la tradición inglesa del POB oscila entre 'glede', 'kite' y 'red kite', en español 'milano' ofrece un nombre común de rapaz que mantiene la idea general sin fijar indebidamente una especie moderna demasiado precisa.
- source_word: הָאַיָּה
  english_pob_choice: the falcon
  chosen_spanish: el halcón
  alternatives_spanish:
  - el milano
  - el kite
  lexicon: HALOT
  rationale: La equivalencia española más natural y estable para un ave rapaz distinta en la lista es 'halcón'. Conserva el contraste con los otros términos y sigue la decisión inglesa de distinguir este vocablo del resto.
- source_word: הַדַּיָּה
  english_pob_choice: the kite
  chosen_spanish: el busardo
  alternatives_spanish:
  - el milano
  - el halcón
  lexicon: HALOT
  rationale: Como el hebreo nombra otro raptor distinto, 'busardo' permite diferenciarlo de 'milano' y 'halcón' en español. La identificación zoológica exacta sigue siendo incierta, por lo que se evita repetir 'milano' o 'halcón' para tres términos hebreos diferentes.
- source_word: לְמִינָהּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su género
  - de acuerdo con su clase
  lexicon: HALOT
  rationale: La fórmula hebrea clasifica por tipo o especie. 'Según su especie' comunica bien la categoría taxonómica general en español y conserva la estructura formularia del original.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Hebrew grammar
  rationale: El marcador de objeto directo no se traduce de manera separada en español; el sentido coordinante queda expresado con 'y' dentro de la enumeración.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'red kite' por 'glede' para distinguir mejor los tres nombres de aves y evitar repetir 'kite' para dos términos hebreos distintos. La versión española sigue esa intención de diferenciación léxica sin imponer una identificación zoológica cerrada.
  spanish_consistency_notes:
  - Se mantiene 'según su especie' como fórmula bíblica transparente y coherente con otros pasajes de clasificación.
  - Se evita 'SEÑOR' o terminología no pertinente, ya que el versículo pertenece a una lista dietética de aves impuras y no contiene nombres divinos.
  - La nota a pie de página se usa solo para la incertidumbre zoológica, no para introducir interpretaciones adicionales.
