translation:
  language: es
  text: Grande es su gloria por tu salvación[a][b]; tú le confieres esplendor y majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Salvación» también puede entenderse aquí como «liberación» o, en este contexto real, «victoria».
    reason: lexical_alternative
  - marker: b
    text: La preposición hebrea puede expresar medio o esfera; por eso también podría leerse «mediante tu salvación» o «en tu salvación».
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  english_pob_choice: Great is
  chosen_spanish: Grande es
  alternatives_spanish:
  - Es grande
  - Grande
  lexicon: HALOT
  rationale: El adjetivo va en posición enfática al inicio de la cláusula; en español, «Grande es» conserva bien ese énfasis y suena natural y solemne.
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su peso de gloria
  lexicon: HALOT
  rationale: כָּבוֹד suele significar «gloria» u «honor»; aquí «gloria» es la opción más natural y fiel al tono real del salmo.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: through your salvation
  chosen_spanish: por tu salvación
  alternatives_spanish:
  - en tu salvación
  - mediante tu salvación
  - a causa de tu salvación
  lexicon: HALOT
  rationale: La preposición ב puede expresar medio, esfera o causa. «Por tu salvación» comunica de manera natural el medio/instrumento, sin cerrar indebidamente la ambigüedad del hebreo. «Salvación» conserva el valor léxico básico de יְשׁוּעָה, aunque en contexto real pueda incluir liberación o victoria.
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: הוֹד denota esplendor, magnificencia o brillo regio. «Esplendor» conserva ese sentido y se distingue bien del segundo término del paralelismo.
- source_word: וְהָדָר
  english_pob_choice: and majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - honor
  - adorno
  - dignidad
  lexicon: HALOT
  rationale: En pareja con הוֹד, הָדָר expresa dignidad regia, ornamento y majestad. «Majestad» funciona bien en español y mantiene el paralelismo poético.
- source_word: תְּשַׁוֶּה
  english_pob_choice: you bestow
  chosen_spanish: tú le das
  alternatives_spanish:
  - tú colocas sobre él
  - tú pones sobre él
  - tú le otorgas
  lexicon: HALOT
  rationale: El verbo transmite la idea de poner o conferir algo sobre alguien. «Tú le das» es una forma española natural para expresar concesión sin perder el sentido de conferir honor.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: HALOT
  rationale: עַל con sufijo puede traducirse con «sobre». En español «sobre él» conserva la imagen de colocar atributos reales sobre la persona del rey.
theological_decisions:
- issue: Sentido de יְשׁוּעָה en un salmo real
  english_pob_reading: salvation; may also be understood as deliverance or, in this royal context, victory
  chosen_spanish_reading: salvación, con posible matiz de liberación o victoria según el contexto
  alternative_spanish_readings:
  - liberación
  - victoria
  rationale: «Salvación» mantiene el núcleo semántico del término hebreo y no reduce el verso a éxito militar. A la vez, el contexto real admite los matices de liberación y victoria, que quedan preservados como posibilidad interpretativa.
  doctrine_reference: Salmos 21:6; uso contextual de יְשׁוּעָה
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español se alinea con la lectura aprobada y conserva la ambigüedad léxica documentada en בִּישׁוּעָתֶךָ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada en el proyecto, aunque este versículo no la contiene.
  - Se prefiere «salvación» frente a «victoria» para respetar el núcleo léxico de יְשׁוּעָה.
  - «Esplendor» y «majestad» se distinguen para conservar el paralelismo poético hebreo.
  - «Sobre él» reproduce con naturalidad la imagen de conferir honor colocado sobre la persona del rey.
