translation:
  language: es
  text: 'y la señal o el prodigio se cumple[a], de la que te habló, diciendo: «Vayamos tras otros dioses, que no has conocido[b], y sirvámosles[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el prodigio»; la pareja hebrea suele funcionar idiomáticamente como «señal o prodigio».
    reason: lexical_alternative
  - marker: b
    text: O «a quienes no has conocido».
    reason: lexical_alternative
  - marker: c
    text: O «y adorémoslos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: comes to pass
  chosen_spanish: se cumple
  alternatives_spanish:
  - viene a pasar
  - ocurre
  lexicon: HALOT
  rationale: En español, con «la señal o el prodigio», «se cumple» comunica de modo natural que el hecho anunciado llega a realizarse, preservando el valor idiomático del hebreo sin calcarlo mecánicamente.
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la señal
  lexicon: HALOT
  rationale: «Señal» es el equivalente natural y bíblicamente transparente para אוֹת en este contexto de autenticación profética.
- source_word: וְהַמּוֹפֵת
  english_pob_choice: or the wonder
  chosen_spanish: o el prodigio
  alternatives_spanish:
  - y el prodigio
  - o la maravilla
  lexicon: HALOT
  rationale: La pareja hebrea אוֹת / מוֹפֵת suele funcionar como binomio idiomático, por lo que «señal o prodigio» conserva la alternancia semántica de la fuente. «Prodigio» mantiene la fuerza extraordinaria del término mejor que una glosa más débil.
- source_word: אֲשֶׁר דִּבֶּר אֵלֶיךָ
  english_pob_choice: about which he spoke to you
  chosen_spanish: acerca de la cual él te habló
  alternatives_spanish:
  - de la que él te habló
  - que él te habló
  lexicon: HALOT
  rationale: Se conserva la relativa con valor de referencia al fenómeno mencionado. «Acerca de la cual» suena algo más sobrio en español y mantiene la relación con la señal/prodigio sin añadir matices ajenos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Forma directa y natural para introducir la cita inmediata.
- source_word: נֵלְכָה אַחֲרֵי
  english_pob_choice: Let us go after
  chosen_spanish: Vayamos tras
  alternatives_spanish:
  - Vayamos después de
  - Sigamos tras
  lexicon: HALOT
  rationale: «Ir tras» preserva la imagen hebrea de seguir con lealtad/adhesión, pero en español «vayamos tras» resulta más fluido que un calco rígido. Mantiene el sentido religioso de orientación y seguimiento.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - otras deidades
  - dioses ajenos
  lexicon: HALOT
  rationale: «Otros dioses» es la traducción estándar y más fiel al lenguaje deuteronómico. Evita suavizar el polemismo del texto con una perífrasis más explicativa.
- source_word: אֲשֶׁר לֹא יְדַעְתָּם
  english_pob_choice: which you have not known
  chosen_spanish: que no has conocido
  alternatives_spanish:
  - a quienes no has conocido
  - que no conoces
  lexicon: HALOT
  rationale: «Conocer» conserva la resonancia bíblica relacional/covenantal del verbo hebreo. «Que no has conocido» sigue el valor del perfecto y deja abierta la ambigüedad documental sin resolverla de más.
- source_word: וְנָעָבְדֵם
  english_pob_choice: and let us serve them
  chosen_spanish: y sirvámosles
  alternatives_spanish:
  - y adorrémoslos
  - y démosles culto
  lexicon: HALOT
  rationale: «Servir» mantiene la fuerza cultual del hebreo עבד y la formulación de lealtad religiosa. En español, el imperativo cohortativo se expresa naturalmente con «sirvámosles».
theological_decisions:
- issue: Relación entre la «señal/prodigio» y la prueba de fidelidad
  english_pob_reading: the sign or the wonder comes to pass
  chosen_spanish_reading: la señal o el prodigio se cumple
  alternative_spanish_readings:
  - la señal o el prodigio ocurre
  - la señal o el prodigio llega a cumplirse
  rationale: 'El texto no valida la procedencia de la señal; solo afirma que el evento anunciado llega a realizarse. «Se cumple» preserva esa tensión: el hecho puede acontecer y, aun así, conducir a idolatría.'
  doctrine_reference: Mantener la tensión textual entre autenticidad fenomenológica y falsedad teológica; no convertir el cumplimiento del signo en aprobación divina.
- issue: Sentido de «servir» en la cláusula final
  english_pob_reading: and let us serve them
  chosen_spanish_reading: y sirvámosles
  alternative_spanish_readings:
  - y adorémoslos
  - y demos culto a ellos
  rationale: «Servir» conserva mejor el marco de lealtad cultual del hebreo y evita reducir el acto a una sola dimensión litúrgica. La alternativa «adorar» existe, pero estrecha el campo semántico.
  doctrine_reference: Preservar el lenguaje bíblico de servicio culto a falsas deidades sin domesticarlo con terminología exclusivamente litúrgica.
translation_notes:
  revision_awareness: No se documentaron revisiones aplicadas en el antecedente inglés; la presente redacción sigue de cerca el estado auditado más reciente y conserva las alternativas relevantes señaladas por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la estructura de advertencia deuteronómica sin añadir explicaciones interpretativas ajenas al verso.
  - Se prefiere «otros dioses» sobre formas más explicativas para respetar el léxico pactal del texto.
