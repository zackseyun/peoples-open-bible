id: REV.12.6
reference: Revelation 12:6
source:
  edition: SBLGNT
  text: καὶ ἡ γυνὴ ἔφυγεν εἰς τὴν ἔρημον, ὅπου ἔχει ἐκεῖ τόπον ἡτοιμασμένον ⸀ἀπὸ τοῦ θεοῦ, ἵνα ἐκεῖ ⸀τρέφωσιν αὐτὴν ἡμέρας χιλίας διακοσίας ἑξήκοντα.
translation:
  text: And the woman fled into the wilderness[a], where she has there a place prepared by God, so that there they might nourish her for one thousand two hundred sixty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that she might be nourished there for one thousand two hundred sixty days.' The Greek has an unspecified third-person plural verb, literally, 'so that they might nourish her there.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: BDAG
  rationale: Aorist of φεύγω denotes flight/escape. 'Fled' is concise, vivid, and standard English for urgent departure without adding details not in the text.
- source_word: ἔρημον
  chosen: wilderness
  alternatives:
  - desert
  lexicon: BDAG
  rationale: ἔρημος can mean desert or wilderness. 'Wilderness' better preserves the broader biblical resonance of a desolate, solitary place and does not over-specify sandy terrain.
- source_word: τόπον
  chosen: a place
  alternatives:
  - a location
  lexicon: BDAG
  rationale: τόπος is straightforwardly 'place.' The indefinite sense is retained.
- source_word: ἡτοιμασμένον ἀπὸ τοῦ θεοῦ
  chosen: prepared by God
  alternatives:
  - made ready by God
  - prepared from God
  lexicon: BDAG
  rationale: Perfect passive participle indicates a place already made ready; ἀπό with personal agent here is naturally rendered 'by God' in English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result. 'So that' is natural modern English while preserving the clause's purposive force.
- source_word: τρέφωσιν αὐτὴν
  lemma: τρέφω
  chosen: they might nourish her
  alternatives:
  - they might feed her
  - she might be nourished
  lexicon: BDAG
  rationale: The verb τρέφω means to feed or nourish. Because the Greek verb is third person plural active with an unspecified subject, 'they might nourish her' preserves the active form and the text's indefiniteness better than a passive paraphrase. 'Nourish' fits the sustained-care sense in context.
- source_word: ἡμέρας χιλίας διακοσίας ἑξήκοντα
  chosen: for one thousand two hundred sixty days
  alternatives:
  - for 1,260 days
  lexicon: BDAG
  rationale: The accusative of extent of time is best rendered with 'for.' Spelling out the number suits running biblical prose and preserves the explicit duration.
- source_word: ἔχει ἐκεῖ
  chosen: has there
  alternatives:
  - has
  - has there available
  lexicon: BDAG
  rationale: The text includes both ἔχει and ἐκεῖ. Retaining 'there' reflects the Greek emphasis on location, even though English style is slightly awkward.
