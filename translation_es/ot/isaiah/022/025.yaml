review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mantiene la fórmula profética, la metáfora de la estaca/clavo, la secuencia de fracaso y caída, y la clausura de certeza. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y el rastro POB: (1) תָּמוּשׁ se acerca mejor a «cederá» que a «se aflojará», porque el foco es que el soporte falla, no meramente que se suelta; (2) וְנִגְדְּעָה corresponde mejor a «será cortada» que a «será arrancada», ya que la raíz גדע enfatiza cortar/lopar, y el inglés auditado preserva esa imaginería de corte. Además, la nota b introduce indebidamente el inglés «burden» en vez de una alternativa española.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. «Declara Yahvé de los ejércitos» y «en un lugar seguro» funcionan bien. No obstante, «estaca clavada» puede mantenerse, pero la secuencia mejora con verbos más ajustados al hebreo y más idiomáticos en paralelo: «cederá, será cortada y caerá». La puntuación también fluye mejor sin punto y coma antes de «y la carga». La nota b necesita corrección para legibilidad y consistencia en español.'
  glossary_alignment: Se respeta correctamente «Yahvé» y no se enmascara el nombre divino. No hay conflictos con otros términos doctrinales del glosario. La elección «de los ejércitos» es aceptable para צְבָאוֹת. «Carga» para מַשָּׂא está bien y coincide con la justificación auditada; la alternativa en nota debe quedar en español («peso» o «carga pesada» / «carga» frente a «peso»), no en inglés.
  issues:
  - severity: medium
    issue: «se aflojará» suaviza תָּמוּשׁ
    rationale: El hebreo y el English POB apuntan a que el soporte «cede/falla»; «se aflojará» es posible, pero transmite más una pérdida gradual de tensión que el colapso funcional de la imagen.
  - severity: medium
    issue: «será arrancada» no refleja con precisión וְנִגְדְּעָה
    rationale: גדע se relaciona con cortar/tronchar/lopar. «Arrancada» cambia la imaginería desde corte a extracción, alejándose tanto de la raíz hebrea como de la decisión POB «cut down».
  - severity: low
    issue: La nota b usa el anglicismo «burden»
    rationale: Las notas deben ser plenamente españolas y coherentes con el propósito lexical. Incluir una palabra inglesa sin necesidad reduce calidad y no sigue el estilo meta.
  revised_spanish_text: En aquel día[a], declara Yahvé de los ejércitos, la estaca clavada en un lugar seguro cederá, será cortada y caerá, y la carga[b] que estaba sobre ella será cortada, porque Yahvé ha hablado.
  revised_footnotes:
