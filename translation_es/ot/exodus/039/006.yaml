revisions:
- from: Y hicieron las piedras de ónice[a], enclavadas en engastes de oro, grabadas como grabados de sello, según los nombres de los hijos de Israel.
  to: Y hicieron las piedras de ónice[a], montadas en engastes de oro, grabadas como las inscripciones de un sello, según los nombres de los hijos de Israel.
  rationale: Se ajusta 'enclavadas' a 'montadas' para reflejar mejor el hebreo de piedras rodeadas/fijadas en engastes de oro con español natural de joyería. Se reemplaza 'grabadas como grabados de sello' por 'grabadas como las inscripciones de un sello' para conservar la imagen de grabado de sello sin un calco incómodo. Se mantiene la nota sobre 'shoham' y la expresión 'los hijos de Israel' por fidelidad al original y a la política del proyecto.
