    reason: lexical_alternative
  - marker: b
    text: 'O: «estaban entre los hijos de Benjamín», es decir, eran descendientes de la tribu de Benjamín.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ciento cincuenta en total».'
    reason: previous_rendering
  revision_rationale: Se ajustó el verbo a un valor descriptivo más fiel al hebreo genealógico ('tenían'), se reemplazó 'tiradores del arco' por 'los que tensan el arco' para conservar mejor la imagen léxica de דֹּרְכֵי קֶשֶׁת en español natural, y se corrigieron las notas para que presenten alternativas reales y coherentes con la auditoría inglesa.
