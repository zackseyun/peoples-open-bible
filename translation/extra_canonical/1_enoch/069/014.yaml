translation:
  text: This one asked Mikael to show him the hidden name[a], so that they might remember it in the oath, and so that they might tremble before that name and oath[d][c][b], those who revealed to the children of men all that is hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the secret name.' The Ge'ez adjective means hidden or concealed; the verse does not require a later mystical technical sense.
    reason: lexical_alternative
  - marker: b
    text: '''In the oath'' may also imply invocation of the name within a solemn adjuration, not mere recollection.'
    reason: lexical_alternative
  - marker: c
    text: 'The closing clause likely identifies those who are to tremble: the ones who disclosed hidden things to humankind.'
    reason: alternative_reading
  - marker: d
    text: Or 'This one said to Mikael, “Show him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዝንቱ
  chosen: This one
  alternatives:
  - This
  - He
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative/pronominal opening referring back to the previously mentioned angelic figure; 'This one' preserves the marked deictic force better than a bare 'he.'
- source_word: ይቤሎ ለሚካኤል
  chosen: said to Mikael
  alternatives:
  - spoke to Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward speech formula. The name is transliterated rather than translated, following project policy; 'Mikael' reflects the Ge'ez form more directly than the anglicized 'Michael.'
- source_word: ያርእዮ
  chosen: Show him
  alternatives:
  - Make him see
  - Reveal to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/causative sense from the verb 'to see/show.' 'Show him' is concise and natural while preserving the directness of the command.
- source_word: ስመ ኅቡአ
  chosen: the hidden name
  alternatives:
  - the secret name
  - the concealed name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ስመ is 'name'; ኅቡአ carries the sense hidden/concealed. 'Hidden' preserves apocalyptic reserve without over-interpreting as esoteric 'secret' terminology.
- source_word: ከመ ይዝክርዎ በመሐላ
  chosen: so that they may remember it in the oath
  alternatives:
  - that they may commemorate it by the oath
  - so that they may invoke it in the oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is related to remembering/mentioning. Because the object is the hidden name and the context is oath-taking, 'remember it in the oath' keeps the wording broad enough to include solemn invocation without forcing a narrower legal idiom.
- source_word: መሐላ
  chosen: oath
  alternatives:
  - curse
  - sworn oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The primary sense is oath. In this context the oath carries fearful power, but 'oath' should remain in the main text; any stronger nuance can be noted in a footnote.
- source_word: ከመ ይርዓዱ እምውእቱ ስም ወማሐላ
  chosen: so that they may tremble before that name and oath
  alternatives:
  - so that they may fear that name and oath
  - so that they may quake because of that name and oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys fear/trembling. 'Tremble before' preserves the visceral apocalyptic response and reads naturally with both 'name' and 'oath' as the source of dread.
- source_word: እለ አርአዩ ለውሉደ ሰብእ ኵሎ ዘበኅቡእ
  chosen: those who revealed to the children of men all that is hidden
  alternatives:
  - those who showed the sons of men everything hidden
  - those who made known to human beings all the hidden things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative clause identifying the offenders, likely the angelic revealers of forbidden mysteries. 'Children of men' preserves the traditional anthropological idiom without importing later christological language.
