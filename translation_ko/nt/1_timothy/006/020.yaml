id: 1TI.6.20
reference: 1 Timothy 6:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὦ Τιμόθεε, τὴν παραθήκην φύλαξον, ἐκτρεπόμενος τὰς βεβήλους κενοφωνίας καὶ ἀντιθέσεις τῆς ψευδωνύμου γνώσεως,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/020.yaml
  text: O Timothy[a], guard the deposit entrusted to you[b], turning away from the profane empty talk and contradictions of what is falsely called knowledge.
  footnotes:
  - marker: a
    text: Or 'oppositions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'of so-called knowledge.'
    reason: lexical_alternative
translation:
  language: ko
  text: 오 디모데여, 그대에게 맡겨진 것을 지키십시오. 속된 헛된 말과 거짓되이 일컬어지는 지식[b]의 반대 주장[a]에서 돌이키십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「대립」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「소위 지식」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν παραθήκην φύλαξον
  english_pob_choice: guard the deposit entrusted to you
  chosen_korean: 그대에게 맡겨진 것을 지키십시오
  alternatives_korean:
  - 위탁받은 것을 보존하십시오
  - 부탁받은 것을 지키십시오
  lexicon: BDAG
  rationale: παραθήκη는 1:18 παρατίθεμαι와 같은 어근(맡김·위탁). 「맡겨진 것」으로 일관.
- source_word: ἐκτρεπόμενος
  english_pob_choice: turning away from
  chosen_korean: 돌이키십시오
  alternatives_korean:
  - 외면하십시오
  - 비켜 가십시오
  lexicon: BDAG
  rationale: 1:6 ἐκτρέπω와 일관 「돌이키다」.
- source_word: τὰς βεβήλους κενοφωνίας
  english_pob_choice: the profane empty talk
  chosen_korean: 속된 헛된 말
  alternatives_korean:
  - 속된 공허한 말
  lexicon: BDAG
  rationale: 1:9·4:7 βέβηλος와 일관 「속된」. 「헛된 말」은 1:6 ματαιολογία와 어휘 변화이나 의미 호응.
- source_word: ἀντιθέσεις τῆς ψευδωνύμου γνώσεως
  english_pob_choice: contradictions of what is falsely called knowledge
  chosen_korean: 거짓되이 일컬어지는 지식의 반대 주장
  alternatives_korean:
  - 가짜 이름의 지식이 내세우는 대립
  lexicon: BDAG
  rationale: ἀντίθεσις의 「반대·대립 주장」을 「반대 주장」으로. ψευδώνυμος의 「거짓 이름」을 「거짓되이 일컬어지는」으로 자연스럽게.
