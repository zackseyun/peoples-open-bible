translation:
  language: es
  text: Tengan cuidado en el caso de un brote de enfermedad de la piel[a], para observar cuidadosamente y hacer conforme a todo lo que los sacerdotes levitas les instruyan; como yo les he mandado, así tendrán cuidado de hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, 'lepra'. El término hebreo se refiere de manera más amplia en la Torá a un conjunto de afecciones de la piel, no específicamente a la enfermedad de Hansen moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  lexicon: HALOT
  rationale: El niphal imperativo de שׁמר funciona como advertencia o exhortación. 'Ten cuidado' transmite con naturalidad en español la fuerza imperativa sin volverse arcaico.
- source_word: בְּנֶגַע הַצָּרַעַת
  english_pob_choice: in the case of an outbreak of skin disease
  chosen_spanish: en el caso de un brote de enfermedad de la piel
  alternatives_spanish:
  - con respecto a un brote de enfermedad de la piel
  - ante una afección de la piel
  lexicon: HALOT
  rationale: נֶגַע comunica una afección o brote, y צָרַעַת en la Torá abarca un conjunto de condiciones rituales de la piel, no la lepra moderna. 'Enfermedad de la piel' evita el término tradicional potencialmente engañoso y conserva el marco legal-ritual.
- source_word: לִשְׁמֹר מְאֹד וְלַעֲשׂוֹת
  english_pob_choice: to observe diligently and to do
  chosen_spanish: para guardar diligentemente y hacer
  alternatives_spanish:
  - para observar diligentemente y hacer
  - para cumplir con diligencia y hacer
  lexicon: HALOT
  rationale: Los infinitivos expresan el contenido de la advertencia. 'Guardar' conserva היטב la idea de observar/guardar cuidadosamente, y 'diligentemente' refleja מְאֹד con naturalidad en español.
- source_word: כְּכֹל אֲשֶׁר יוֹרוּ אֶתְכֶם
  english_pob_choice: according to all that ... instruct you
  chosen_spanish: conforme a todo lo que ... te instruyan
  alternatives_spanish:
  - según todo lo que ... te enseñen
  - de acuerdo con todo lo que ... te indiquen
  lexicon: HALOT
  rationale: יוֹרוּ en piel hifil suele significar enseñar o instruir. 'Instruyan' es apropiado para orientación legal-sacerdotal y evita reducirlo a mera información.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los sacerdotes levíticos
  lexicon: HALOT
  rationale: La expresión designa un solo grupo sacerdotal vinculado a Leví. 'Sacerdotes levitas' es una forma natural en español y preserva la cualificación tribal sin dividir indebidamente la frase.
- source_word: כַּאֲשֶׁר צִוִּיתִם
  english_pob_choice: as I have commanded them
  chosen_spanish: como yo les he mandado
  alternatives_spanish:
  - tal como yo les mandé
  - así como yo les he ordenado
  lexicon: HALOT
  rationale: El verbo en primera persona con sufijo de tercera persona plural remite al mandato previo de Moisés a los sacerdotes. El pretérito perfecto conecta ese mandato previo con la obligación presente.
- source_word: תִּשְׁמְרוּ לַעֲשׂוֹת
  english_pob_choice: you shall be careful to do
  chosen_spanish: así deberás tener cuidado de hacerlo
  alternatives_spanish:
  - así deberéis tener cuidado de hacerlo
  - así cuidarás de hacerlo
  lexicon: HALOT
  rationale: 'La repetición de שׁמר + לעשות refuerza la insistencia. ''Tener cuidado de hacerlo'' conserva la duplicación semántica: atención cuidadosa seguida de acción obediente.'
theological_decisions:
- issue: Rendering of צָרַעַת
  english_pob_reading: skin disease
  chosen_spanish_reading: enfermedad de la piel
  alternative_spanish_readings:
  - lepra
  - afección cutánea
  rationale: La Torá usa צָרַעַת para un espectro de condiciones rituales de la piel, no para la enfermedad moderna conocida como lepra. 'Enfermedad de la piel' evita una equivalencia anacrónica y mantiene el contexto legal.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la tradición de traducción)
- issue: Identification of הַכֹּהֲנִים הַלְוִיִּם
  english_pob_reading: the Levitical priests
  chosen_spanish_reading: los sacerdotes levitas
  alternative_spanish_readings:
  - los sacerdotes, los levitas
  - los levitas sacerdotes
  rationale: La frase funciona como un solo sintagma de identificación sacerdotal dentro de Deuteronomio. No se trata de dos grupos separados, sino de sacerdotes pertenecientes a Leví.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y excepciones documentadas)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: ''concerning'' pasó a ''in the case of'', ''very carefully'' a ''diligently'', y se hizo explícito el ''so'' del segundo miembro comparativo. La versión española refleja esos ajustes con ''en el caso de'', ''diligentemente'' y ''así''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - '''Sacerdotes levitas'' se usa como equivalente natural de ''the Levitical priests'' sin fragmentar la apposición hebrea.'
  - '''Enfermedad de la piel'' conserva la decisión POB de evitar ''lepra'' como equivalencia automática.'
