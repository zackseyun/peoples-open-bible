translation:
  language: es
  text: Y el campamento de Timoteo reconoció que era Macabeo, y huyeron de delante de él; y él les asestó un gran golpe, y cayeron de entre ellos aquel día hasta ocho mil hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta ocho mil hombres»; la expresión griega puede leerse como un total aproximado o redondeado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνω
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - llegó a reconocer
  - se dio cuenta de
  lexicon: BDAG
  rationale: En el contexto militar, el verbo expresa identificar a alguien. «Reconoció» conserva esa identificación sin añadir matices no presentes en el griego.
- source_word: ἡ παρεμβολὴ Τιμοθέου
  english_pob_choice: Timothy’s camp
  chosen_spanish: el campamento de Timoteo
  alternatives_spanish:
  - el ejército de Timoteo
  - la campa de Timoteo
  lexicon: LSJ
  rationale: παρεμβολή designa un campamento o encampment militar. «Campamento» es natural en español y mantiene el sentido concreto del texto.
- source_word: ὁ Μακκαβαῖός
  english_pob_choice: Maccabeus
  chosen_spanish: Macabeo
  alternatives_spanish:
  - el Macabeo
  - Maccabeo
  lexicon: LSJ
  rationale: Se conserva el nombre/título tradicional transliterado en forma natural para español. «Macabeo» comunica bien el apelativo sin explicarlo como título separado.
- source_word: ἔφυγον ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: fled from before him
  chosen_spanish: huyeron de delante de él
  alternatives_spanish:
  - huyeron de él
  - se retiraron delante de él
  lexicon: LSJ
  rationale: La expresión es semítica y literalmente significa huir de la presencia de alguien. «De delante de él» preserva ese color del original mejor que «de él».
- source_word: ἐπάταξεν αὐτοὺς πληγὴν μεγάλην
  english_pob_choice: he struck them with a great blow
  chosen_spanish: los hirió con un gran golpe
  alternatives_spanish:
  - los golpeó con un gran golpe
  - les dio una gran derrota
  lexicon: LSJ
  rationale: En español, «hirió» y «gran golpe» mantienen la imagen de la acción bélica sin convertirla en una paráfrasis como «derrota». Se conserva la fuerza idiomática del griego.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron abatidos
  lexicon: BDAG
  rationale: En contexto de batalla, «cayeron» reproduce el uso idiomático de muerte o abatimiento sin explicitar más de lo que el texto dice.
- source_word: εἰς ὀκτακισχιλίους ἄνδρας
  english_pob_choice: as many as eight thousand men
  chosen_spanish: hasta ocho mil hombres
  alternatives_spanish:
  - como hasta ocho mil hombres
  - unas ocho mil personas
  lexicon: LSJ
  rationale: La construcción puede señalar un total que llega a esa cifra. «Hasta ocho mil hombres» es una forma idiomática en español que conserva la posible aproximación o cota superior.
translation_notes:
  revision_awareness: El inglés POB leyó ἐπέγνω como “recognized”, ἡ παρεμβολὴ Τιμοθέου como “Timothy’s camp”, ἀπὸ προσώπου αὐτοῦ como “from before him”, y el cierre numérico como “as many as eight thousand of them fell”. La versión española mantiene esas decisiones de manera transparente, pero adapta la sintaxis para que suene natural en español. Se evita suavizar el final numérico; en cambio, se conserva la ambigüedad aproximada con «hasta ocho mil hombres» y nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Macabeo» se mantiene como apelativo propio conforme al nombre del personaje.
  - Se conserva el tono militar directo del original sin añadir interpretaciones teológicas.
