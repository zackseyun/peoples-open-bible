review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: juicio divino contra Gog, localizado en los montes de Dios, seguido por violencia fratricida entre los invasores. Conserva el distributivo de אִישׁ y el posesivo «mis montes». También preserva adecuadamente la alternativa léxica de וְקָרָאתִי en nota. Sin embargo, la combinación «llamaré contra él una espada sobre todos mis montes» suena sintácticamente forzada en español y mezcla dos complementos de modo poco natural, aunque el sentido subyacente sea correcto.'
  spanish_quality_summary: La calidad general es buena y comprensible, pero requiere una reparación menor de fluidez y naturalidad. «Y llamaré contra él una espada» es menos idiomático que «Y llamaré una espada contra él» o mejor aún «Y convocaré una espada contra él». Además, «sobre todos mis montes» es posible, pero «en todos mis montes» suena más natural en español para una localización de juicio sin perder fidelidad. La fórmula profética con rayas es legible. «La espada de cada hombre será contra su hermano» es fiel, aunque «la espada de cada uno» también sería más natural; no es necesario cambiarla.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה se representa como «Yahvé» y no se oculta; אֲדֹנָי יְהוָה se vierte aceptablemente como «el Señor Yahvé». No hay conflicto con otros términos doctrinales del glosario. La elección de «hermano» conserva bien la fuerza idiomática del hebreo.'
  issues:
  - severity: medium
    issue: Sintaxis poco natural en «llamaré contra él una espada»
    rationale: Aunque cada elemento refleja el hebreo, en español el orden produce una construcción rígida y poco idiomática. Reordenar a «llamaré una espada contra él» preserva el sentido y mejora la legibilidad.
  - severity: low
    issue: Localización espacial menos natural en «sobre todos mis montes»
    rationale: «Sobre» no es imposible, pero «en todos mis montes» comunica mejor en español que la acción de juicio ocurre a lo largo del territorio montañoso, sin alterar el contenido fuente.
  revised_spanish_text: Y llamaré una espada contra él en todos mis montes[a] —declara el Señor Yahvé—; la espada de cada hombre será contra su hermano.
