  to: Y llegando de improviso a ciudades y al campo, los incendiaba; y, apoderándose de lugares estratégicos[a], ponía en fuga a no pocos de los enemigos.
  rationale: Se sustituyó el calco poco idiomático «al venir ... sobre» por «llegando de improviso a», que transmite bien el ataque sorpresivo del participio con ἀπροσδοκήτως. Se cambió «campos» por «al campo» para reflejar mejor χώρας como territorio rural en contraste con «ciudades». Se conservan el sentido iterativo, la litotes y la nota léxica del inglés POB.
