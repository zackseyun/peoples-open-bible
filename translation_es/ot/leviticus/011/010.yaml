translation:
  language: es
  text: Pero todo lo que no tiene aletas ni escamas, en los mares y en los arroyos[a], entre todas las criaturas que se mueven en las aguas y entre todos los seres vivientes que están en las aguas, son detestables[b] para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arroyos» también puede traducirse «ríos» o «wadis», según el contexto; el hebreo se refiere en sentido amplio a cauces de agua que fluyen.
    reason: lexical_alternative
  - marker: b
    text: «Detestables» conserva el valor ritual-legal de שֶׁקֶץ en este contexto; también puede traducirse «una abominación para ustedes», pero esa formulación suena más arcaica en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: But everything
  chosen_spanish: Pero todo lo que
  alternatives_spanish:
  - Y todo lo que
  - Pero todo
  lexicon: HALOT
  rationale: El hebreo abre con una frase totalizadora con valor contrastivo respecto del versículo anterior. «Pero» conserva mejor la oposición contextual que un simple «Y», y «todo lo que» reproduce con naturalidad el alcance general.
- source_word: אֲשֶׁר אֵין לוֹ
  english_pob_choice: that does not have
  chosen_spanish: que no tiene
  alternatives_spanish:
  - que no posee
  - que carece de
  lexicon: HALOT
  rationale: La construcción relativa expresa ausencia de rasgos requeridos. «Que no tiene» es un equivalente natural en español y mantiene la sencillez descriptiva del hebreo.
- source_word: סְנַפִּיר וְקַשְׂקֶשֶׂת
  english_pob_choice: fins and scales
  chosen_spanish: aletas ni escamas
  alternatives_spanish:
  - aletas y escamas
  - una aleta y escamas
  lexicon: HALOT
  rationale: En español, dentro de la negación, «ni» refleja mejor que «y» la ausencia conjunta de ambos rasgos. «Aletas» y «escamas» mantienen la referencia anatómica concreta.
- source_word: בַּיַּמִּים וּבַנְּחָלִים
  english_pob_choice: in the seas and in the streams
  chosen_spanish: en los mares y en los arroyos
  alternatives_spanish:
  - en los mares y en los ríos
  - en los mares y en los cauces
  lexicon: HALOT
  rationale: יַמִּים se traduce de forma directa como «mares». נְחָלִים puede referir corrientes de agua; «arroyos» ofrece una opción amplia y natural en español, sin cerrar innecesariamente el sentido a «ríos».
- source_word: מִכֹּל שֶׁרֶץ הַמַּיִם
  english_pob_choice: among all the swarming things in the waters
  chosen_spanish: entre todas las criaturas que se mueven en las aguas
  alternatives_spanish:
  - entre todas las cosas que se agitan en las aguas
  - entre todo ser que se arrastra en las aguas
  lexicon: HALOT
  rationale: שֶׁרֶץ alude a criaturas que pululan o se mueven rápidamente. «Criaturas que se mueven» conserva la idea de movilidad/teemimiento con español claro, evitando un giro demasiado técnico o extraño.
- source_word: וּמִכֹּל נֶפֶשׁ הַחַיָּה
  english_pob_choice: and among all the living creatures
  chosen_spanish: y entre todos los seres vivientes
  alternatives_spanish:
  - y entre toda criatura viviente
  - y entre todo ser vivo
  lexicon: HALOT
  rationale: נֶפֶשׁ הַחַיָּה es una expresión amplia para seres animados. «Seres vivientes» conserva la amplitud semántica sin reducirla a una categoría zoológica más estrecha.
- source_word: אֲשֶׁר בַּמָּיִם
  english_pob_choice: that are in the waters
  chosen_spanish: que están en las aguas
  alternatives_spanish:
  - que están en el agua
  - que viven en las aguas
  lexicon: HALOT
  rationale: El plural hebreo «las aguas» se conserva en español porque el texto abarca diversos ambientes acuáticos. «Están en» mantiene la relación locativa simple del hebreo.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominables
  - repugnantes
  lexicon: HALOT
  rationale: 'Se preserva el término ya auditado por el POB inglés: en este contexto legal alimentario, «detestable» comunica el valor ritual-legal de שֶׁקֶץ sin desplazarlo hacia una condena moral generalizada.'
- source_word: הֵם לָכֶם
  english_pob_choice: they are detestable to you
  chosen_spanish: les es detestable
  alternatives_spanish:
  - son para ustedes detestables
  - les son detestables
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal; el español requiere una forma copulativa. «Les es detestable» mantiene el predicado de estado/valor ritual y evita añadir un futuro o una formulación más pesada.
theological_decisions:
- issue: Clasificación ritual de los animales acuáticos sin aletas ni escamas
  english_pob_reading: detestable
  chosen_spanish_reading: detestable
  alternative_spanish_readings:
  - abominables
  - impuros
  rationale: El versículo establece una clasificación dietética de la ley de santidad. «Detestable» reproduce la fuerza del hebreo שֶׁקֶץ sin introducir el tecnicismo «impuro», que aquí no es el sustantivo principal del texto.
  doctrine_reference: Levítico 11; consistencia terminológica del POB
- issue: Valor colectivo de las categorías acuáticas y vivientes
  english_pob_reading: seas / streams / swarming things / living creatures
  chosen_spanish_reading: mares / arroyos / criaturas que se mueven / seres vivientes
  alternative_spanish_readings:
  - mares / ríos / seres que pululan / criaturas vivientes
  rationale: El español conserva la amplitud de los dos conjuntos acuáticos y de las dos categorías zoológicas, sin reducirlas a equivalencias más técnicas que el hebreo no exige.
  doctrine_reference: Principio de equivalencia óptima; Levítico 11:9–12
translation_notes:
  revision_awareness: El inglés POB vigente ya fue revisado y quedó sin cambios; esta propuesta española sigue ese estado estable, conservando las mismas decisiones léxicas y la misma lectura ritual-legal de שֶׁקֶץ, pero adaptándolas a un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en toda la traducción del proyecto, aunque este versículo no lo contenga.
  - «Detestable» se conserva como término clave para שֶׁקֶץ en la ley alimentaria.
  - «Mares» y «arroyos» reflejan la amplitud de יַּמִּים y נְחָלִים sin forzar una sola especie de curso de agua.
  - La negación española exige «ni» con la pareja «aletas ni escamas», mientras que el hebreo coordina positivamente los dos sustantivos dentro de la cláusula negativa.
