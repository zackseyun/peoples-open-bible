translation:
  language: es
  text: Porque por ti puedo correr contra una tropa[a][b]; por mi Dios puedo saltar por encima de un muro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «contigo» / «mediante ti»; la preposición hebrea puede expresar compañía o medio. Aquí se toma como medio: Dios capacita la acción.'
    reason: lexical_alternative
  - marker: b
    text: O «una partida de saqueo».
    reason: lexical_alternative
  - marker: c
    text: O «una muralla» / «un baluarte».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la razón o fundamento de lo anterior. En español, «Porque» conserva esa relación causal y funciona con naturalidad en poesía bíblica.
- source_word: בְּכָה
  english_pob_choice: by you
  chosen_spanish: por ti
  alternatives_spanish:
  - contigo
  - mediante ti
  lexicon: HALOT
  rationale: 'La preposición ב con sufijo puede expresar medio o acompañamiento. Aquí, como en el inglés POB, se entiende como medio/agencia divina: Dios capacita la acción. «Por ti» transmite bien esa idea en español.'
- source_word: אָרוּץ
  english_pob_choice: I can run
  chosen_spanish: puedo correr
  alternatives_spanish:
  - corro
  - puedo correr velozmente
  lexicon: HALOT
  rationale: El imperfecto qal 1cs en este contexto poético expresa capacidad sostenida por Dios. «Puedo correr» reproduce la fuerza de habilidad/enablement sin añadir más de lo que el hebreo dice.
- source_word: גְּדוּד
  english_pob_choice: a troop
  chosen_spanish: una tropa
  alternatives_spanish:
  - una banda
  - una partida de saqueo
  lexicon: HALOT
  rationale: El sustantivo puede referirse a tropa, banda o partida de incursión. «Tropa» es claro, militar y natural en español; mantiene el sentido del inglés POB sin restringir innecesariamente la imagen.
- source_word: בֵּאלֹהַי
  english_pob_choice: by my God
  chosen_spanish: por mi Dios
  alternatives_spanish:
  - con mi Dios
  - mediante mi Dios
  lexicon: HALOT
  rationale: Se repite el valor de medio/agencia. «Mi Dios» preserva el tono relacional y de pacto del hebreo. La repetición de «por» mantiene el paralelismo de los dos cola.
- source_word: אֲדַלֶּג
  english_pob_choice: I can leap over
  chosen_spanish: puedo saltar
  alternatives_spanish:
  - puedo brincar
  - puedo saltar por encima de
  lexicon: HALOT
  rationale: El piel imperfecto 1cs de דלג significa saltar o brincar. En español, el complemento «un muro» ya aporta la idea de superar; por eso «puedo saltar» es suficiente y natural, sin perder la imagen.
- source_word: שׁוּר
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una muralla
  - un baluarte
  lexicon: HALOT
  rationale: El término puede denotar muro o estructura fortificada. «Muro» es el equivalente más directo y comprensible en español contemporáneo; «muralla» o «baluarte» serían posibles, pero menos neutros o más interpretativos.
theological_decisions:
- issue: Capacidad otorgada por Dios en imaginería militar
  english_pob_reading: The verse is rendered as describing ability granted by God ('I can run... I can leap') rather than as a bare statement of action.
  chosen_spanish_reading: 'El verso expresa capacidad concedida por Dios: «puedo correr... puedo saltar».'
  alternative_spanish_readings:
  - corro... salto
  - correré... saltaré
  rationale: Los imperfectos hebreos en poesía pueden expresar capacidad o experiencia habitual. La traducción con «puedo» conserva esa fuerza de habilitación divina, que es la lectura seguida por el POB inglés, sin convertirla en un simple futuro ni en una acción desnuda.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El contexto auditado del POB inglés no requirió cambios de fondo en esta línea: mantiene la lectura de capacidad divina, el paralelo poético entre correr y saltar, y las alternativas léxicas principales (medio/compañía, troop/raiding band, wall/rampart).'
  spanish_consistency_notes:
  - Se usó «Dios» para el posesivo «mi Dios», en línea con la terminología del proyecto.
  - Se evitó «SEÑOR» porque el verso hebreo contiene אֱלֹהַי («mi Dios»), no el nombre divino.
  - Se mantuvo un registro poético sobrio y directo, adecuado para una edición pública y auditada.
  - Los corchetes de notas se colocan en el texto donde la alternativa afecta directamente el sentido léxico.
