  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδεὶς ὑμᾶς καταβραβευέτω θέλων ἐν ταπεινοφροσύνῃ καὶ θρησκείᾳ τῶν ἀγγέλων, ⸀ἃ ἑόρακεν ἐμβατεύων, εἰκῇ φυσιούμενος ὑπὸ τοῦ νοὸς τῆς σαρκὸς αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/018.yaml
  text: Let no one disqualify you, delighting in humility and the worship of angels, dwelling on what he has seen, vainly puffed up by the mind of his flesh,
translation:
  language: ko
  text: 겸손과 천사 숭배[a]를 즐기며, 본 것에 깊이 빠져, 자기 육체의 생각으로 헛되이 우쭐대는 어떤 사람도 여러분의 상을 박탈하지 못하게 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「천사들의 종교」, 「천사들과 함께 드리는 예배」. 헬라어 어구는 여러 의미로 읽힐 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδεὶς ὑμᾶς καταβραβευέτω
  english_pob_choice: Let no one disqualify you
  chosen_korean: 어떤 사람도 여러분의 상을 박탈하지 못하게 하십시오
  alternatives_korean:
  - 아무도 여러분을 탈락시키지 못하게 하십시오
  - 누구도 여러분의 상을 빼앗지 못하게 하십시오
  lexicon: BDAG
  rationale: καταβραβεύω의 「심판이 상을 박탈함」을 「상을 박탈함」으로 직역적으로 살린다. 영어 POB 「disqualify」와 의미상 일치.
- source_word: θέλων
  english_pob_choice: delighting in
  chosen_korean: 즐기며
  alternatives_korean:
  - 좋아하며
  - 기뻐하며
  lexicon: BDAG
  rationale: 본 문맥에서 θέλω + 여격은 「~을 즐기다·기뻐하다」 어감을 가진다.
- source_word: ταπεινοφροσύνῃ
  english_pob_choice: humility
  chosen_korean: 겸손
  alternatives_korean:
  - 겸비
  - 자기 비하
  lexicon: BDAG
  rationale: 「겸손」을 본문에 유지하고, 문맥상 가식적·금욕적 함의는 본문 외에서 드러나도록 둔다.
- source_word: θρησκείᾳ τῶν ἀγγέλων
  english_pob_choice: the worship of angels
  chosen_korean: 천사 숭배
  alternatives_korean:
  - 천사들의 종교
  - 천사들과 함께 드리는 예배
  lexicon: BDAG
  rationale: 대상 속격 해석을 따라 「천사 숭배」로 옮기되 모호성은 각주로 보존.
- source_word: ἃ ἑόρακεν ἐμβατεύων
  english_pob_choice: dwelling on what he has seen
  chosen_korean: 본 것에 깊이 빠져
  alternatives_korean:
  - 본 것에 자세히 들어가며
  - 본 것을 두고 늘어놓으며
  lexicon: BDAG
  rationale: ἐμβατεύω의 「깊이 들어감·자세히 다룸」을 「깊이 빠져」로 자연스럽게 옮긴다.
- source_word: εἰκῇ φυσιούμενος
  english_pob_choice: vainly puffed up
  chosen_korean: 헛되이 우쭐대는
  alternatives_korean:
  - 까닭 없이 부풀려진
  - 헛되이 교만해진
  lexicon: BDAG
  rationale: φυσιόω의 「부풀어 오름·교만」을 한국어 「우쭐대다」로 살린다.
- source_word: ὑπὸ τοῦ νοὸς τῆς σαρκὸς αὐτοῦ
  english_pob_choice: by the mind of his flesh
  chosen_korean: 자기 육체의 생각으로
  alternatives_korean:
  - 자기 육체적 마음에 의해
  - 자기 육신의 생각으로
  lexicon: BDAG
  rationale: σάρξ는 글로사리 「육체」. 「육체의 생각」은 한국 교회의 정립된 표현으로 타락한 인간 지향성을 보존한다.
theological_decisions:
- issue: θρησκείᾳ τῶν ἀγγέλων의 속격 해석
  chosen_reading: 대상 속격 「천사 숭배」
  alternative_readings:
  - 주체 속격 「천사들이 드리는 예배」
  - 동반적 「천사들과 함께 드리는 예배」
  rationale: 어구는 진정으로 모호하다. 본문은 가장 자연스러운 「천사 숭배」를 채택하고, 다른 가능성은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
- issue: σάρξ의 의미
  chosen_reading: 「육체」(원어 그대로)
  alternative_readings:
  - 「죄성」
  rationale: 본 어구 「육체의 생각」은 신학적으로 중요하나 본문은 「육체」를 그대로 보존하여 바울적 인간학적 긴장을 살린다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for σάρξ; preserve tension'
