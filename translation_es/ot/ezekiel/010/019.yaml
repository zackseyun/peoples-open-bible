review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la escena básica: los querubines levantan sus alas, se elevan, salen con las ruedas a su lado, llegan a la entrada de la puerta oriental de la casa de Yahvé, y la gloria del Dios de Israel está sobre ellos. Sin embargo, no preserva adecuadamente dos decisiones auditadas importantes: (1) se omite la nota sobre לְעֻמָּתָם como posición correspondiente (''junto a / frente a / en correspondencia con''), y (2) se pierde la tensión del singular hebreo וַיַּעֲמֹד, además de suavizarse como ''se detuvieron'' en vez de ''se pararon/estuvieron''. También ''desde arriba'' suena añadido y pesado en español, y la revisión inglesa ya lo descartó por redundante.'
  spanish_quality_summary: El español es claro y generalmente natural, con buen registro bíblico moderno. 'Entonces', 'ante mis ojos', 'la casa de Yahvé' y 'la gloria del Dios de Israel' funcionan bien. Pero 'se detuvieron' introduce un matiz aspectual de pausa más que de posición, y 'desde arriba' resulta poco idiomático aquí. Conviene también anclar notas solo donde realmente preservan alternativas significativas, y evitar notas meramente explicativas de palabras transparentes.
  glossary_alignment: 'Alinea correctamente ''Yahvé'' para יְהוָה, ''querubines'' para הַכְּרוּבִים, y mantiene ''casa'' en vez de ''templo''. No hay problemas doctrinales mayores. La principal desalineación está en la gestión de וַיַּעֲמֹד: el borrador sigue la pluralización contextual inglesa, pero su elección ''se detuvieron'' no refleja bien ni la postura/ubicación del hebreo ni la nota auditada sobre el singular. También falta trasladar la alternativa léxica relevante de לְעֻמָּתָם.'
  issues:
  - severity: medium
    issue: '''se detuvieron'' para וַיַּעֲמֹד'
    rationale: El hebreo es singular y el valor básico es 'estar de pie/pararse', no primariamente 'detenerse'. Aunque el texto principal puede seguir la revisión contextual plural, en español conviene 'se pararon' o 'se quedaron' y añadir nota sobre el singular hebreo.
  - severity: medium
    issue: Falta nota sobre לְעֻמָּתָם
    rationale: El expediente inglés conserva la alternativa 'opposite them / alongside them' porque el término denota posición correspondiente. El borrador la reduce a 'junto a ellos' sin nota, perdiendo una decisión auditada significativa.
  - severity: low
    issue: '''desde arriba'' al final'
    rationale: Aunque מִלְמָעְלָה refuerza la altura, en español después de 'estaba sobre ellos' suena redundante y torpe. La revisión inglesa ya lo eliminó por naturalidad, y el sentido permanece intacto sin esa cola adverbial.
  - severity: low
    issue: Notas a, b, c actuales no priorizan las más relevantes
    rationale: 'Las notas sobre ''alzaron'', ''al salir'' y ''oriental'' no son incorrectas, pero no son las más necesarias. Es preferible dedicar las notas a las alternativas semánticas realmente significativas del expediente auditado: ''junto a ellos'' y el singular hebreo de וַיַּעֲמֹד.'
  revised_spanish_text: Entonces los querubines alzaron sus alas y se elevaron de la tierra ante mis ojos al salir, con las ruedas junto a ellos[a]; y se pararon[b] a la entrada de la puerta oriental de la casa de Yahvé, y la gloria del Dios de Israel estaba sobre ellos.
  revised_footnotes:
