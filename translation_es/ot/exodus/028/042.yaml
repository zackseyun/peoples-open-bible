review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato de hacer una prenda inferior de lino para cubrir la desnudez corporal, con el alcance desde las caderas/lomos hasta los muslos. Sin embargo, «calzoncillos» introduce un registro demasiado coloquial y moderno para el contexto sacerdotal, y «la desnudez de su carne» suena menos natural que una formulación que preserve mejor el concreto hebreo sin torpeza.'
  spanish_quality_summary: 'La oración es clara, pero «calzoncillos» rebaja el tono digno buscado para una Biblia eclesialmente legible. Además, la nota b está anclada en la frase equivocada: trata de «desde los lomos», pero el marcador aparece sobre «su carne». Conviene usar una expresión más digna y natural en español y recolocar los marcadores.'
  glossary_alignment: 'No hay conflicto con los términos globales del proyecto. La principal cuestión léxica es מִכְנְסֵי בָד: mejor «prendas interiores de lino» que «calzoncillos de lino» para mantener fidelidad funcional y registro bíblico digno. «Caderas» para מָתְנַיִם y «muslos» para יְרֵכַיִם son aceptables; la alternativa «lomos» debe quedar en nota. «Carne desnuda» preserva mejor בְּשַׂר עֶרְוָה que «la desnudez de su carne» en español corriente.'
  issues:
  - severity: medium
    issue: «calzoncillos de lino» suena demasiado coloquial
    rationale: Aunque comunica la función de prenda interior, el término en español contemporáneo tiene un registro doméstico e incluso trivial, impropio del contexto de vestiduras sacerdotales. «Prendas interiores de lino» conserva el sentido sin bajar el tono.
  - severity: medium
    issue: La nota b está anclada en el lugar equivocado
    rationale: La nota b explica «desde los lomos hasta los muslos», pero en el texto actual el marcador [b] aparece tras «su carne», creando desajuste entre ancla y contenido.
  - severity: low
    issue: «la desnudez de su carne» es algo rígido en español
    rationale: Es bastante literal, pero «su carne desnuda» suena más natural y sigue representando bien la idea concreta de בְּשַׂר עֶרְוָה sin caer en eufemismo excesivo.
  revised_spanish_text: Y harás para ellos prendas interiores de lino[a], para cubrir su carne desnuda; serán desde las caderas[b] hasta los muslos.
