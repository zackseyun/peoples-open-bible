    issue: La nota [a] está colocada en «Padre» pero su contenido explica πληθύνoντα θράμασιν.
    rationale: La disciplina requerida exige que cada nota esté anclada exactamente en la palabra o frase pertinente. Tal como está, induce a error sobre qué elemento textual comenta.
  - severity: low
