id: 1PE.4.14
reference: 1 Peter 4:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ ὀνειδίζεσθε ἐν ὀνόματι Χριστοῦ, μακάριοι, ὅτι τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα ἐφ’ ὑμᾶς ἀναπαύεται.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/014.yaml
  text: 'If you are insulted in the name of Messiah, you are blessed, because the Spirit of glory and of God rests upon you.'
translation:
  language: ko
  text: '여러분이 메시아의 이름으로 모욕을 당한다면 복이 있는 자들입니다. 영광의 영 곧 하나님의 영이 여러분 위에 머무시기 때문입니다.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 11:2의 인유 (「여호와의 영이 그 위에 강림하시리니」).
    reason: cross_reference
lexical_decisions:
- source_word: ὀνειδίζεσθε
  english_pob_choice: are insulted
  chosen_korean: 모욕을 당한다면
  alternatives_korean:
  - 비난을 받는다면
  - 욕을 듣는다면
  lexicon: BDAG
  rationale: ὀνειδίζω는 「공개적 비난·모욕」. 「모욕」으로 옮긴다 (3:16의 ἐπηρεάζω와 어휘 차별).
- source_word: ἐν ὀνόματι Χριστοῦ
  english_pob_choice: in the name of Messiah
  chosen_korean: 메시아의 이름으로
  alternatives_korean:
  - 그리스도의 이름 때문에
  - 메시아의 이름에서
  lexicon: BDAG
  rationale: ἐν ὀνόματι는 「이름을 매개로·이름을 인하여」. 「메시아의 이름으로」로 자연스럽게 옮긴다.
- source_word: τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα
  english_pob_choice: the Spirit of glory and of God
  chosen_korean: 영광의 영 곧 하나님의 영
  alternatives_korean:
  - 영광과 하나님의 영
  - 영광의 성령 곧 하나님의 성령
  lexicon: BDAG
  rationale: 한 영을 두 속격으로 한정한 구조. 「곧」으로 동격임을 살린다.
