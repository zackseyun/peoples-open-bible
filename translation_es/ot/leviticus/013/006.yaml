  to: Entonces el sacerdote lo examinará de nuevo el séptimo día, y si la infección se ha atenuado y la infección no se ha extendido en la piel, el sacerdote lo declarará limpio; es una erupción escamosa[a]. Lavará su ropa y quedará limpio.
