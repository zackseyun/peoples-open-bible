theological_decisions:
- issue: Divine self-sufficiency expressed by ἀπροσδεὴς τῶν ὅλων
  chosen_reading: though needing nothing from anyone
  alternative_readings:
  - being in need of nothing at all
  - being independent of all things
  rationale: The verse emphasizes that God does not require the temple for his own sake, yet graciously chose to let a temple exist among his people. The rendering preserves that theological tension without flattening the Greek into a philosophical abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Corporate versus interior sense of ἐν ἡμῖν
  chosen_reading: among us
  alternative_readings:
  - in us
  - within us
  rationale: Given the explicit mention of the temple and God's dwelling, the communal/local sense is more likely than an inward spiritualized sense. The alternative is preserved in a footnote because the Greek preposition itself can support either in English.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve theological tension where ambiguity remains.'
