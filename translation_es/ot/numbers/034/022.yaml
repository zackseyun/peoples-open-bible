lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En el contexto de reparto tribal en Números, מַטֶּה se entiende naturalmente como 'tribu'. El prefijo conjuntivo y la preposición se integran de forma idiomática con 'Y para'.
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los descendientes de Dan
  - los danitas
  lexicon: HALOT
  rationale: La frase hebrea es literalmente filial y conviene conservarla como 'hijos de Dan' para mantener la transparencia formal que el registro exige. 'Danitas' es más idiomático, pero borra la expresión de parentesco del hebreo.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  lexicon: HALOT
  rationale: En este pasaje נָשִׂיא designa al representante tribal para la distribución de la tierra. 'Líder' comunica bien la función administrativa sin introducir el matiz monárquico o cortesano de 'príncipe'.
- source_word: בֻּקִּי
  english_pob_choice: Bukki
  chosen_spanish: Bukki
  alternatives_spanish:
  - Buki
  lexicon: transliteración estándar
  rationale: Nombre propio conservado por transliteración, como en el texto inglés auditado.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La identificación genealógica en hebreo se expresa de forma directa con 'hijo de'. 'Descendiente de' es posible, pero menos preciso para la fórmula nominal.
- source_word: יָגְלִי
  english_pob_choice: Jogli
  chosen_spanish: Jogli
  alternatives_spanish:
  - Yogli
  - Jagli
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con una transliteración reconocible para lectores bíblicos en español. 'Jogli' mantiene la convención usada en muchas biblias en inglés para inicial yod.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustantivos respecto del contenido fuente y la lectura inglesa auditada.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto en la serie, pero este versículo no lo contiene.
  - '''Líder'' se usa aquí como término funcional para נָשִׂיא en el contexto administrativo de Números 34.'
  - Los nombres propios se transliteran de manera consistente y sin adaptar al español más allá de lo necesario para legibilidad.
