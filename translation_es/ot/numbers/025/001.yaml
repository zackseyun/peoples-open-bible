translation:
  language: es
  text: Mientras Israel estaba en Sitim[a], el pueblo comenzó a prostituirse con las hijas de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzó a cometer inmoralidad sexual con las hijas de Moab»; el hebreo dice literalmente «comenzó a prostituirse con las hijas de Moab».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: was staying
  chosen_spanish: estaba
  alternatives_spanish:
  - se hallaba
  - permanecía
  - habitaba
  lexicon: HALOT
  rationale: יׁשׁב puede expresar residir, permanecer o estar establecido. En español, «estaba en Sitim» comunica de forma natural la permanencia en el lugar sin exagerar la idea de asentamiento definitivo.
- source_word: בַּשִּׁטִּים
  english_pob_choice: at Shittim
  chosen_spanish: en Sitim
  alternatives_spanish:
  - en Shittim
  - en Sitim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Mantener la transliteración «Sitim» sigue la política del proyecto y «en» es la preposición natural en español para ubicación.
- source_word: וַיָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: HALOT
  rationale: El valor narrativo idiomático es de inicio de acción. «Comenzó» es la forma clara y estándar en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo colectivo
  lexicon: HALOT
  rationale: Aquí se refiere a Israel como colectivo. «El pueblo» conserva esa referencia corporativa de manera natural en español.
- source_word: לִזְנוֹת
  english_pob_choice: to prostitute themselves
  chosen_spanish: a prostituirse
  alternatives_spanish:
  - a cometer inmoralidad sexual
  - a entregarse a la prostitución
  lexicon: HALOT
  rationale: זנה tiene fuerza sexual y también una carga de prostitución/infidelidad. «Prostituirse» preserva esa contundencia mejor que una paráfrasis suavizada.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - con relación a
  - con
  lexicon: HALOT
  rationale: Con זנה y un objeto personal, la relación es idiomáticamente sexual; en español «con» expresa ese enlace de modo claro y fiel al sentido.
- source_word: בְּנוֹת מוֹאָב
  english_pob_choice: the daughters of Moab
  chosen_spanish: las hijas de Moab
  alternatives_spanish:
  - las mujeres de Moab
  - las moabitas
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea de forma cercana. «Hijas de Moab» es más fiel a la imagen del texto que sustituirla por una categoría más interpretativa.
theological_decisions:
- issue: Fuerza moral y sexual del verbo זנה
  english_pob_reading: Render the verb with explicit sexual-prostitution language rather than a softened generality.
  chosen_spanish_reading: Traducirlo con lenguaje explícito de prostitución sexual en vez de una generalidad suavizada.
  alternative_spanish_readings:
  - comenzó a cometer inmoralidad sexual con las hijas de Moab
  - comenzó a entregarse a relaciones sexuales ilícitas con las hijas de Moab
  rationale: El hebreo es más vívido que una formulación genérica. «Prostituirse» conserva la aspereza moral y la carga de infidelidad del texto sin añadir interpretación ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el packet original hebreo y la auditoría inglesa. Se conserva la intensidad de זנה con una opción española equivalente y se mantiene la referencia geográfica transliterada, sin suavizar el juicio moral del texto.
  spanish_consistency_notes:
  - Se usa «Sitim» como transliteración estable del topónimo.
  - «Prostituirse» mantiene el tono fuerte del verbo hebreo, en línea con la decisión inglesa auditada.
  - Se evita «SEÑOR» o formulaciones teológicas no presentes en este versículo.
  - La preposición «con» se emplea por idiomatismo español para la relación sexual implícita en el hebreo.
