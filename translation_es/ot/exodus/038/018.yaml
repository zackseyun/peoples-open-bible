  yaml_path: translation/ot/exodus/038/018.yaml
  text: And the screen for the gate of the courtyard was the work of an embroiderer[a], in blue and purple and scarlet yarn, and fine twined linen, twenty cubits long, and five cubits high[c][b], corresponding in width to the hangings of the courtyard.
  footnotes:
