    text: O, más literalmente, «se afligirán». La expresión se entiende tradicionalmente como que incluye el ayuno.
    reason: lexical_alternative
  - marker: b
    text: O, «el residente foráneo que reside entre ustedes». El hebreo conserva un matiz legal de permanencia dentro de la comunidad.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota léxica principal para reflejar la alternativa literal documentada por el POB inglés, se mejora la naturalidad y precisión legal del español («séptimo mes», «ningún trabajo», «el nativo»), y se reformula la cláusula final con una estructura inclusiva que refleja mejor el hebreo.
