base_translation:
  language: en
  yaml_path: translation/ot/leviticus/027/008.yaml
  text: But if he is too poor for your valuation[a], then he shall be made to stand before the priest, and the priest shall assess him[b]; the priest shall assess him according to what the one making the vow can afford.
  footnotes:
  - marker: a
    text: Or 'than your valuation.' The Hebrew construction may be rendered more literally this way, but 'too poor for your valuation' expresses the sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to what the hand of the one making the vow reaches.' This is a Hebrew idiom for financial ability.
    reason: lexical_alternative
