review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: «La tierra ha dado su fruto; Dios, nuestro Dios, nos bendice». Conserva correctamente la repetición enfática «Dios, nuestro Dios» y la lectura principal indicativa de יְבָרְכֵנוּ. Sin embargo, las notas al pie están invertidas respecto del audit trail inglés: la nota [a] en inglés corresponde a la ambigüedad de יְבָרְכֵנוּ, mientras que la [b] corresponde a la alternativa léxica de אֶרֶץ. En español, [a] se ancla en «fruto» pero mezcla alternativas de אֶרֶץ y de נָתְנָה, y [b] se ancla en «nuestro Dios» aunque trata la ambigüedad verbal. Eso desaline­a la documentación con las palabras relevantes del texto.'
  spanish_quality_summary: El español es claro, natural y digno. «La tierra ha dado su fruto» y «nos bendice» son plenamente legibles y fieles. La única reparación necesaria es reubicar las notas para que cada una quede anclada en la frase correspondiente y simplificar su contenido según la razón documentada. Además, «país» como alternativa para אֶרֶץ suena menos adecuado aquí que «tierra»/«land»; si se conserva una alternativa, «la tierra»/«la tierra cultivada» no mejora mucho, por lo que basta con explicar «tierra» o «territorio/la tierra» de forma sobria. Dado el audit trail inglés, la mejor alternativa española para the land es «la tierra» en sentido de territorio, pero en nota puede mantenerse «la tierra»/«la tierra (o el país/territorio)»; «país» solo no es ideal en registro bíblico.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים / אֱלֹהֵינוּ se traducen correctamente como «Dios» / «nuestro Dios». No aparecen Yahvé, Mesías, Espíritu, etc. La decisión principal «nos bendice» concuerda con la rationale teológica del POB. La repetición «Dios, nuestro Dios» preserva el énfasis pactual. La mejora requerida es documental y de anclaje de notas, no de glosario principal.'
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota sobre la ambigüedad verbal de יְבָרְכֵנוּ debe ir en «nos bendice», no en «nuestro Dios». La nota sobre אֶרֶץ debe ir en «La tierra», no en «fruto».
  - severity: medium
    issue: La nota [a] mezcla dos decisiones léxicas distintas (אֶרֶץ y נָתְנָה) en un solo lugar.
    rationale: El audit trail inglés separa la alternativa verbal de la alternativa léxica principal. En español conviene mantener esa correspondencia para trazabilidad y claridad.
  - severity: low
    issue: «país» como alternativa de אֶרֶץ resulta menos natural en este contexto poético y litúrgico.
    rationale: Aunque posible, «país» suena más político-moderno. «Tierra» es mejor opción principal y la nota debe formular la alternativa con más cautela.
  revised_spanish_text: La tierra[b] ha dado su fruto; Dios, nuestro Dios, nos bendice[a].
  revised_footnotes:
