revisions:
- from: Y cuando Yahvé tu Dios te introduzca en la tierra que vas a poseer, pondrás[a] la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal.
  to: Y cuando Yahvé tu Dios te introduzca en la tierra a la que vas para poseerla, pondrás[a] la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal.
  rationale: La revisión mínima restituye las dos ideas del hebreo —entrada en la tierra y posesión de ella— sin perder naturalidad en español. Se mantiene «Yahvé» según la norma del proyecto y se conserva la nota léxica sobre «pondrás/proclamarás».
