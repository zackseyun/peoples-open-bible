theological_decisions:
- issue: Metaphorical force of זנה in a royal-apostasy context
  chosen_reading: Render with sexual-immorality language while allowing the covenant-unfaithfulness/idolatry metaphor to remain implicit in context.
  alternative_readings:
  - Render explicitly as idolatry or unfaithfulness
  - Render more literally as 'played the prostitute/whoredom'
  rationale: The verse condemns Jehoram for leading Judah into the same kind of apostasy associated with Ahab's house. A fully literal rendering can sound archaic in English, while an explicitly interpretive rendering ('idolatry') would narrow the metaphor beyond the lexical wording. The chosen phrasing preserves the prophetic sexualized metaphor and remains readable.
  doctrine_reference: Translation philosophy §§1, 3, 6
