translation:
  language: es
  text: 'Porque si de veras se cuidan de guardar[a] todo este mandamiento[b] que yo les mando cumplir: amar a Yahvé su Dios, caminar en todos sus caminos y apegarse a él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guardan diligentemente». El hebreo intensifica el verbo con un infinitivo absoluto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo este mandamiento» (singular), probablemente como expresión colectiva de la exigencia del pacto en su conjunto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aferrarse a él» o «mantenerse unidos a él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Ciertamente si
  lexicon: HALOT
  rationale: La construcción introduce una condición con fuerza enfática y conexión al contexto previo. «Porque si» conserva el enlace causal/continuativo y suena natural en español.
- source_word: שָׁמֹר תִּשְׁמְרוּן
  english_pob_choice: you carefully keep
  chosen_spanish: en verdad guardan
  alternatives_spanish:
  - guardan cuidadosamente
  - guardan con diligencia
  - si cuidan de guardar
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito. En español, «en verdad guardan» expresa bien el énfasis sin volver la frase pesada. «Guardar» conserva el sentido de observancia fiel del mandamiento.
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  english_pob_choice: all this commandment
  chosen_spanish: todo este mandamiento
  alternatives_spanish:
  - este mandamiento entero
  - toda esta ordenanza
  - todos estos mandamientos
  lexicon: HALOT
  rationale: El hebreo es singular y colectivo; «todo este mandamiento» mantiene esa singularidad sin pluralizar indebidamente.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם
  english_pob_choice: that I am commanding you
  chosen_spanish: que yo les mando hacer
  alternatives_spanish:
  - que yo les estoy mandando
  - que yo les ordeno
  - que yo les mando
  lexicon: HALOT
  rationale: El participio tiene fuerza progresiva/presente en contexto. «Les mando» comunica la acción vigente del hablante; se añade «hacer» para enlazar con לַעֲשֹׂתָהּ en una sintaxis natural en español.
- source_word: לַעֲשֹׂתָהּ
  english_pob_choice: to do it
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - realizar
  - obedecer
  lexicon: HALOT
  rationale: El verbo עשה es amplio y concreto. En español, «hacer» es la opción más directa y evita estrechar el sentido hacia una mera observancia ritual.
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - amar a
  - por amor a
  - para amar
  lexicon: HALOT
  rationale: «Amar» reproduce de forma directa la finalidad o contenido del mandamiento y funciona bien en coordinación con los infinitivos siguientes.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrama: «Yahvé» en lugar de la sustitución tradicional por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - tu Dios
  - su Dios de pacto
  lexicon: HALOT
  rationale: La forma plural de segunda persona se vierte con «su» en español de trato respetuoso/bíblico para un grupo. Conserva la relación de pertenencia y pacto.
- source_word: לָלֶכֶת בְּכָל דְּרָכָיו
  english_pob_choice: to walk in all his ways
  chosen_spanish: andar en todos sus caminos
  alternatives_spanish:
  - caminar en todos sus caminos
  - vivir conforme a todos sus caminos
  - seguir todos sus caminos
  lexicon: HALOT
  rationale: Se preserva la metáfora bíblica de conducta con «andar», que es natural en español bíblico y mantiene el valor exhortativo del hebreo.
- source_word: וּלְדָבְקָה בוֹ
  english_pob_choice: and to cling to him
  chosen_spanish: apegarse a él
  alternatives_spanish:
  - aferrarse a él
  - unirse a él
  - permanecer fiel a él
  lexicon: HALOT
  rationale: דבק expresa adhesión estrecha y leal. «Apegarse» es moderno, claro y conserva la idea de unión afectiva y de fidelidad; «a él» evita repetir el nombre divino innecesariamente.
theological_decisions:
- issue: El nombre divino יְהוָה (Tetragrama)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el nombre divino. Se mantiene como «Yahvé» para preservar el nombre revelado, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahweh'
- issue: Metáfora de fidelidad de ‘andar en todos sus caminos’ y ‘apegarse a él’
  english_pob_reading: Preserve the metaphors in the main text
  chosen_spanish_reading: Preservar las metáforas en el texto principal
  alternative_spanish_readings:
  - vivir conforme a todos sus caminos y permanecer fiel a él
  - seguir sus caminos y mantenerse unido a él
  rationale: El hebreo usa lenguaje pactual establecido. Se conservan las metáforas para no diluir su fuerza relacional y ética.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Intensificación verbal de שָׁמֹר תִּשְׁמְרוּן
  english_pob_reading: you carefully keep
  chosen_spanish_reading: en verdad guardan
  alternative_spanish_readings:
  - guardan diligentemente
  - cuidan de guardar
  rationale: La intensificación se expresa sin sobrecargar el verso; se deja visible que no es un simple «guardar», sino un guardar enfático y cuidadoso.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés: se elimina cualquier redundancia innecesaria en la cláusula de propósito con לַעֲשֹׂתָהּ, pero se conserva el valor semántico de «hacer» como verbo amplio. También se mantiene el tratamiento del Tetragrama como nombre propio y no como sustitución titulada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el singular colectivo «todo este mandamiento».
  - 'Se mantienen los infinitivos en serie: amar, andar, apegarse.'
  - «Ustedes/les/su» se ajusta al habla bíblica plural respetuosa en español.
  - No se introduce un equivalente doctrinalmente más estrecho para דבק; se mantiene la imagen de adhesión cercana.
