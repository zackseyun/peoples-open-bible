- from: 'El hombre dijo a Eli[a]: «Yo soy el que ha venido de la línea de batalla, y hoy huí de la línea de batalla». Y él dijo: «¿Qué ha pasado, hijo mío?»'
  to: 'El hombre dijo a Elí[a]: «Yo soy el que vino del frente de batalla, y hoy huí del frente de batalla». Y él dijo: «¿Qué pasó, hijo mío?»'
  rationale: 'La revisión mantiene todas las decisiones semánticas del POB, pero mejora la naturalidad del español latinoamericano y la fluidez narrativa: “vino” en vez de “ha venido”, “frente de batalla” en vez de la formulación algo más calcada “línea de batalla”, y “¿Qué pasó?” en vez de “¿Qué ha pasado?”. También se ajusta “de los rangos” a “de las filas” en la nota, que es una alternativa española más idiomática para el contexto militar.'
