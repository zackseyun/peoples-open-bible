translation:
  language: es
  text: Su alma se acerca a la fosa[a], y su vida a los que causan muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la sepultura» o «a la destrucción» para «la fosa».
    reason: lexical_alternative
  - marker: b
    text: O «a los muertos» o «a los que dan muerte»; la expresión hebrea es difícil y puede referirse tanto a agentes de muerte como al ámbito o poder de la muerte.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְרַב
  english_pob_choice: draws near
  chosen_spanish: se acerca
  alternatives_spanish:
  - se aproxima
  - llega cerca
  lexicon: HALOT
  rationale: קרב expresa acercarse o aproximarse. En español, "se acerca" conserva el movimiento progresivo y funciona bien en el tono poético del versículo.
- source_word: לַשַּׁחַת
  english_pob_choice: to the pit
  chosen_spanish: al hoyo
  alternatives_spanish:
  - a la fosa
  - a la sepultura
  - a la destrucción
  lexicon: HALOT
  rationale: שַׁחַת puede significar hoyo, fosa, sepultura o destrucción. "Hoyo" mantiene la imagen concreta del texto y permite que el matiz de ruina mortal quede implícito, en línea con la decisión inglesa de preservar la metáfora.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser
  - su persona
  lexicon: HALOT
  rationale: 'נֶפֶשׁ tiene un campo amplio: alma, vida, ser, persona. "Alma" conserva la distinción poética con el siguiente cola sin imponer una antropología técnica rígida.'
- source_word: וְחַיָּתוֹ
  english_pob_choice: and his life
  chosen_spanish: y su vida
  alternatives_spanish:
  - y su existir
  - y su vitalidad
  - y su ser vivo
  lexicon: HALOT
  rationale: חַיָּה/חַיּוּת aquí funciona como vida o existencia viviente. "Vida" es la opción más natural en español y mantiene el paralelismo con "su alma".
- source_word: לַמְמִתִים
  english_pob_choice: to those who bring death
  chosen_spanish: a los que causan muerte
  alternatives_spanish:
  - a los que dan muerte
  - a los homicidas
  - a los muertos
  lexicon: HALOT
  rationale: 'La forma verbal se entiende mejor como participio causativo: los que producen o ocasionan muerte. "Causan muerte" preserva esa fuerza sin restringir prematuramente el referente a verdugos humanos.'
theological_decisions:
- issue: Tensión semántica de נֶפֶשׁ y חַיָּה en paralelo
  english_pob_reading: Render the pair as 'his soul' and 'his life' without implying a strict body-soul dualism.
  chosen_spanish_reading: Traducir como "su alma" y "su vida" sin convertir el paralelismo en una definición doctrinal del ser humano.
  alternative_spanish_readings:
  - '"su vida" y "su ser"'
  - '"su persona" y "su vida"'
  rationale: El hebreo poético usa paralelismo cercano y no exige resolver la antropología humana. La traducción conserva la distinción léxica y evita sobreinterpretar el pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto base; el juicio de alta concordancia confirma que no se requieren ajustes adicionales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «alma» para נֶפֶשׁ y «vida» para חַיָּה/חַיּוּת, conservando el paralelismo sin doctrinas implícitas.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - «Causan muerte» conserva el participio activo sin cerrar la ambigüedad del hebreo respecto de seres, agentes o ámbito de muerte.
