    rationale: Añadir 'él' mejora la claridad del contenido jurado en español formal sin alterar el sentido.
  revised_spanish_text: Un juramento de Yahvé[a] estará entre los dos, de que él no ha metido su mano en la propiedad de su prójimo[b]; y su dueño lo aceptará[c], y no hará restitución.
