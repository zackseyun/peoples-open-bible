translation:
  language: es
  text: Porque Yahvé es Dios, el que destroza las guerras[a]; porque en su campamento, en medio del pueblo[b], me libró de la mano de los que me perseguían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rompe las guerras' o 'aplasta las guerras'. El participio griego es vívido y enérgico.
    reason: lexical_alternative
  - marker: b
    text: El griego dice 'en sus campamentos, en medio del pueblo', una expresión locativa comprimida que puede referirse al entorno del campamento militar.
    reason: cultural_note
lexical_decisions:
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: LXX/uso bíblico
  rationale: Conserva el valor teológico del sustantivo sin convertirlo en un nombre propio; en español bíblico actual, 'Dios' es la forma natural y reverente.
- source_word: συντρίβων
  english_pob_choice: shatters
  chosen_spanish: destroza
  alternatives_spanish:
  - rompe
  - aplasta
  - hace pedazos
  lexicon: BDAG
  rationale: El participio es vívido y enérgico; 'destroza' comunica mejor la fuerza violenta del verbo que una opción más débil, sin volverlo demasiado técnico o arcaico.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: las guerras
  alternatives_spanish:
  - las batallas
  - la guerra
  lexicon: LSJ
  rationale: El plural griego apunta directamente a 'guerras'. Mantener el plural preserva el alcance del sustantivo y la imagen de conflictos quebrantados.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: LSJ / criterio del proyecto
  rationale: El texto griego usa κύριος como título divino en aposición con θεός. Según el criterio del proyecto, cuando corresponde al nombre divino se traduce 'Yahvé' en el texto principal, no como ocultamiento en 'Señor'.
- source_word: παρεμβολὰς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamentos
  - real
  lexicon: LSJ
  rationale: La expresión locativa es comprimida; 'campamento' conserva el sentido militar y resulta natural en español. El singular idiomático sigue la decisión auditada en inglés.
- source_word: ἐξείλατό
  english_pob_choice: delivered
  chosen_spanish: me libró
  alternatives_spanish:
  - me rescató
  - me sacó
  - me liberó
  lexicon: BDAG
  rationale: El verbo expresa librar o salvar de un peligro. 'Me libró' es una forma española clara y formal, cercana a 'delivered', sin perder el matiz de salvación concreta.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del alcance de
  lexicon: LSJ
  rationale: Se mantiene el modismo bíblico de 'mano' para conservar la imagen de dominio y amenaza, tal como la retuvo el texto inglés auditado.
- source_word: καταδιωκόντων
  english_pob_choice: those pursuing
  chosen_spanish: los que me perseguían
  alternatives_spanish:
  - los que me daban caza
  - los perseguidores
  lexicon: LSJ
  rationale: El participio denota persecución hostil. 'Los que me perseguían' es natural y suficientemente amplio para incluir persecución militar sin cargar el término con matices posteriores ajenos al contexto.
theological_decisions:
- issue: Relación entre θεὸς y Κύριος en la cláusula inicial
  english_pob_reading: '''the Lord is a God who shatters wars'' (cláusula nominal con títulos en aposición)'
  chosen_spanish_reading: '''Yahvé es un Dios que destroza las guerras'''
  alternative_spanish_readings:
  - '''Dios, Yahvé, destroza las guerras'''
  - '''Yahvé, Dios, destroza las guerras'''
  rationale: El griego carece de verbo finito explícito; la lectura nominal/apositiva se conserva de manera natural en español. Se mantiene el doble testimonio divino sin resolverlo en una paráfrasis más interpretativa.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido fuente y el uso de κύριος según el criterio del proyecto'
- issue: Alcance de 'en su campamento, en medio del pueblo'
  english_pob_reading: Locación compacta que se refiere al contexto del campamento militar y del pueblo reunido
  chosen_spanish_reading: '''en su campamento, en medio del pueblo'''
  alternative_spanish_readings:
  - '''en su campamento, en medio de la gente'''
  - '''en el campamento de su pueblo'''
  rationale: Se conserva la tensión locativa del griego en vez de reconstruir más de lo que dice el texto. 'Pueblo' mantiene la referencia comunitaria sin añadir una explicación no presente en la frase.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales y no resolverlas prematuramente'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés al preferir una forma formal de 'deliver/ἐξείλατό' y conserva la decisión auditada de mantener la imagen locativa de 'camp'/'campamento' en vez de expandirla interpretativamente. También respeta la nota inglesa sobre la fuerza vívida de συντρίβων y la tensión sintáctica de la cláusula nominal inicial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al criterio del proyecto para el nombre divino, evitando la sustitución por 'SEÑOR'.
  - Se mantiene 'Dios' como título teológico en aposición.
  - Se preserva la imagen corporal 'de la mano de' por coherencia bíblica y lexical.
  - El registro es formal y apto para lectura eclesial amplia, sin calco excesivo del inglés.
