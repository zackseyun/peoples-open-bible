    text: 'O: “a los que se apartan de la guerra” / “a los que son apartados de la batalla”. La frase final en hebreo es difícil y puede describir a no combatientes pacíficos más que a soldados que regresan a casa.'
    reason: alternative_reading
  revision_rationale: Se revisa para preservar el matiz de מִמּוּל שַׂלְמָה ('de sobre el manto'), mantener un español más natural en 'como enemigo', evitar una especificación excesiva en אֶדֶר con 'prenda', y ajustar la nota al pie a las alternativas documentadas en el POB inglés.
