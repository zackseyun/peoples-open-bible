revisions:
- from: Incluso él será llevado a Asiria como tributo para el rey Yareb[a]; Efraín recibirá vergüenza[b], e Israel se avergonzará de su consejo.
  to: Aun eso será llevado a Asiria como tributo para el rey Yareb[a]; Efraín recibirá vergüenza[b], e Israel se avergonzará de su consejo.
  rationale: Se sustituyó «Incluso él» por «Aun eso» para reflejar que el pronombre hebreo remite al ídolo/becerro como objeto inanimado, en línea con la decisión auditada del POB en inglés, y para mejorar la naturalidad del español sin perder el énfasis de גַּם.
