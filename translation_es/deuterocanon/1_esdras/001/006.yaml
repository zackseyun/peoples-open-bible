translation:
  language: es
  text: En orden[a], sacrifiquen la Pascua y preparen los sacrificios para sus hermanos[b], y guarden la Pascua conforme al mandato del Señor, que fue dado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el debido orden» o «según el orden establecido»; la expresión apunta a una disposición ordenada, no solo a una secuencia temporal.
    reason: alternative_reading
  - marker: b
    text: «Hermanos» aquí se refiere a los miembros del pueblo, no necesariamente solo a hermanos varones de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τάξει
  english_pob_choice: In order
  chosen_spanish: En orden
  alternatives_spanish:
  - con orden
  - en el debido orden
  - según el orden establecido
  lexicon: LSJ
  rationale: La frase es adverbial y apunta a una disposición ordenada; «En orden» conserva la concisión del griego y el sentido de arreglo ritual. Evita sobreexplicar sin perder la fuerza de organización que señala el paralelo hebreo.
- source_word: θύσατε
  english_pob_choice: sacrifice
  chosen_spanish: sacrifiquen
  alternatives_spanish:
  - ofrezcan en sacrificio
  - inmolen
  - ofrezcan
  lexicon: BDAG
  rationale: En contexto cultual, θύω implica el acto sacrificial; «sacrifiquen» mantiene ese valor con naturalidad en español y preserva la fuerza ritual del imperativo.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Passover
  - la Pascua pascual
  - el cordero de Pascua
  lexicon: BDAG
  rationale: El griego puede referirse a la celebración o al sacrificio pascual. «La Pascua» es la forma más natural en español y conserva esa amplitud, sin estrechar indebidamente el referente.
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas
  - las víctimas sacrificadas
  lexicon: BDAG
  rationale: El plural es directo y cultual; «los sacrificios» mantiene la correspondencia léxica con θύσατε y el registro ritual del pasaje.
- source_word: ἑτοιμάσατε
  english_pob_choice: prepare
  chosen_spanish: preparen
  alternatives_spanish:
  - dispongan
  - dejen listos
  - alisten
  lexicon: BDAG
  rationale: «Preparar» es la equivalencia más clara y sobria para la preparación ritual requerida por el texto.
- source_word: τοῖς ἀδελφοῖς ὑμῶν
  english_pob_choice: for your brothers
  chosen_spanish: para sus hermanos
  alternatives_spanish:
  - para sus hermanos y hermanas
  - para sus parientes
  - para sus compatriotas
  lexicon: BDAG
  rationale: Se conserva el lenguaje masculino plural del griego, como el POB inglés. En este contexto designa a los miembros del pueblo, pero «hermanos» mantiene la forma textual sin neutralizarla.
- source_word: ποιήσατε τὸ πάσχα
  english_pob_choice: keep the Passover
  chosen_spanish: celebren la Pascua
  alternatives_spanish:
  - guarden la Pascua
  - observen la Pascua
  - realicen la Pascua
  lexicon: BDAG
  rationale: Con Pascua, ποιέω funciona como un semitismo de observancia. «Celebren» expresa bien la acción ritual en español y evita el artificio de «hacer la Pascua», aunque se reconoce que el énfasis es observacional.
- source_word: κατὰ τὸ πρόσταγμα
  english_pob_choice: according to the command
  chosen_spanish: conforme al mandato
  alternatives_spanish:
  - según el mandato
  - de acuerdo con el mandato
  - con arreglo al mandato
  lexicon: LSJ
  rationale: «Mandato» conserva el tono autoritativo de πρόσταγμα. «Conforme a» suena más idiomático en español bíblico que una repetición pesada de «según».
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para el tetragrámaton, aquí el griego tiene explícitamente κύριος; por eso se mantiene «Señor» para seguir la forma inmediata del texto fuente y la decisión auditada del POB inglés.
- source_word: τὸ δοθὲν τῷ Μωυσῇ
  english_pob_choice: that was given to Moses
  chosen_spanish: que fue dado a Moisés
  alternatives_spanish:
  - que le fue dado a Moisés
  - entregado a Moisés
  lexicon: BDAG
  rationale: La pasiva participial modifica al «mandato». «Que fue dado a Moisés» conserva la relación sintáctica y la referencia a la mediación mosaica de manera clara y fiel.
theological_decisions:
- issue: Ἀδελφοῖς como referencia comunitaria amplia
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - compatriotas
  - miembros del pueblo
  rationale: Se mantiene la forma masculina del original, siguiendo la preferencia del proyecto por una traducción con género gramatical acorde al texto. El contexto sugiere una referencia colectiva al pueblo, pero esa ampliación se deja implícita sin sustituir el término base.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: κύριος en contexto de la Septuaginta/deuterocanon
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto griego usa κύριος de forma explícita. Conforme a la política del proyecto para este tipo de fuente, se traduce «Señor» en lugar de retrovertir al tetragrámaton en la línea principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de ποιέω con τὸ πάσχα
  english_pob_reading: keep the Passover
  chosen_spanish_reading: celebren la Pascua
  alternative_spanish_readings:
  - guarden la Pascua
  - observen la Pascua
  - hagan la Pascua
  rationale: La lectura no describe simplemente ejecutar una acción, sino observar ritualmente la Pascua. «Celebren» comunica el carácter litúrgico sin perder el valor de cumplimiento del mandamiento.
  doctrine_reference: Pasaje cultual; equivalencia funcional limitada por la forma idiomática
translation_notes:
  revision_awareness: 'Se mantuvo la estructura del texto griego: imperativo de orden, sacrificio pascual, preparación de los sacrificios para los hermanos y observancia de la Pascua conforme al mandato dado a Moisés. La redacción española sigue el audit trail inglés pero evita calcos innecesarios, especialmente en ποιήσατε τὸ πάσχα, donde «celebren» comunica mejor el valor idiomático de observancia ritual.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος en coherencia con el contexto griego explícito y con la pauta del proyecto para este caso.
  - Se usó «Pascua» para τὸ πάσχα por ser la forma estándar y suficientemente amplia en español.
  - Se conservó «hermanos» en masculino plural por fidelidad al griego y al enfoque del POB; la nota aclara el alcance comunitario.
  - El tono general es bíblico moderno, sobrio y apto para publicación, sin arcaísmos innecesarios.
