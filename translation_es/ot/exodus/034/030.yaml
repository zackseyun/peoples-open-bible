translation:
  language: es
  text: Cuando Aarón y todos los hijos de Israel vieron a Moisés[a], vieron que la piel de su rostro resplandecía, y tuvieron miedo de acercarse a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brillaba» o «emitía rayos»; el verbo hebreo es raro y, en la historia de la traducción, también se entendió como «tenía cuernos», aunque el contexto favorece la radiancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - observaron
  lexicon: HALOT
  rationale: El verbo de visión en narración se expresa naturalmente como «vieron». Conserva la acción perceptiva sin añadir matices no presentes en el hebreo.
- source_word: וְכָל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: and all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  - todos los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la expresión familiar masculina del hebreo («hijos de Israel») en lugar de neutralizarla a «israelitas», manteniendo la correspondencia formal y la decisión de precisión del POB.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» reproduce la fuerza deíctica y la sorpresa narrativa de la partícula hebrea sin paraphrasear.
- source_word: קָרַן
  english_pob_choice: was radiant
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - emitía rayos
  - era radiante
  lexicon: HALOT
  rationale: La forma rara קָרַן se entiende aquí como irradiar luz. «Resplandecía» comunica el efecto visual de manera natural en español y conserva la tensión textual, mientras que la nota puede registrar la alternativa léxica histórica de «cornuda»/«con cuernos».
- source_word: עוֹר פָּנָיו
  english_pob_choice: the skin of his face
  chosen_spanish: la piel de su rostro
  alternatives_spanish:
  - su rostro
  - la superficie de su rostro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la piel de su rostro». «Piel» preserva la concreción del original y evita suavizar el detalle anatómico.
- source_word: וַיִּירְאוּ
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - se asustaron
  lexicon: HALOT
  rationale: «Tuvieron miedo» es una equivalencia idiomática y clara en español moderno, fiel al estado emocional descrito.
- source_word: מִגֶּשֶׁת אֵלָיו
  english_pob_choice: to come near him
  chosen_spanish: de acercarse a él
  alternatives_spanish:
  - de llegar a él
  - de aproximarse a él
  lexicon: HALOT
  rationale: La construcción expresa retraimiento ante la aproximación. «Acercarse a él» mantiene el sentido de no atreverse a aproximarse, con español natural y preciso.
theological_decisions:
- issue: Designación de Israel
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Jacob
  rationale: Se conserva la designación familiar masculina del hebreo, en consonancia con la decisión del POB de reflejar el texto fuente sin neutralización innecesaria.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido de קָרַן aplicado al rostro de Moisés
  english_pob_reading: was radiant
  chosen_spanish_reading: resplandecía
  alternative_spanish_readings:
  - brillaba
  - emitía rayos
  - era radiante
  rationale: El contexto inmediato es una manifestación visible que produce temor reverente al acercarse, por lo que la lectura principal es de radiancia. La interpretación histórica de «con cuernos» se documenta como alternativa léxica, pero no se adopta en el texto principal porque no corresponde al sentido contextual.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios y el cotejo posterior mostró alto acuerdo, por lo que este borrador mantiene la lectura aprobada con una formulación española natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «hijos de Israel» según la preferencia de precisión y género del POB.
  - «Resplandecía» equilibra fidelidad semántica y fluidez; la nota preserva la alternativa histórica relevante.
  - La puntuación y el orden sintáctico siguen un estilo bíblico moderno, legible y digno en español.
