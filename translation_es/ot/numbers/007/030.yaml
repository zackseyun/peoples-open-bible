    rationale: La alternativa inglesa es 'In the ... day', pero en español bíblico natural la opción cercana sería 'el cuarto día', no 'en el cuarto día'.
  - severity: low
    issue: '''Jefe'' para נָשִׂיא es aceptable, pero ''líder'' refleja mejor la decisión terminológica del POB auditado.'
    rationale: Ayuda a mantener coherencia interlingüística y evita matices algo más coloquiales o administrativos de 'jefe'.
  revised_spanish_text: En el cuarto día[a], el líder[b] de los hijos de Rubén[c] fue Elizur, hijo de Sedeur.
