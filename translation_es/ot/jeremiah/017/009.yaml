translation:
  language: es
  text: El corazón es más engañoso que cualquier otra cosa[a], y está gravemente enfermo[b]—¿quién puede conocerlo?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El corazón es engañoso por encima de todo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «incurable». El término hebreo describe algo gravemente enfermo o fuera de remedio.'
    reason: lexical_alternative
  - marker: c
    text: En hebreo, «corazón» se refiere a la persona interior, incluyendo pensamiento, voluntad y deseo, no solo a las emociones.
    reason: cultural_note
lexical_decisions:
- source_word: עָקֹב
  english_pob_choice: deceitful
  chosen_spanish: engañoso
  alternatives_spanish:
  - torcido
  - decepcionante
  - devious
  lexicon: HALOT
  rationale: El adjetivo describe una cualidad moral de engaño o torcida deslealtad. En español, «engañoso» comunica bien esa fuerza sin caer en una rareza léxica; «torcido» o «devious» serían posibles, pero menos naturales para lectura pública.
- source_word: הַלֵּב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  - el ser interior
  lexicon: HALOT
  rationale: Como en el inglés POB, se conserva el término bíblico central para la interioridad humana. «Corazón» en español puede abarcar pensamiento, voluntad y deseo, por lo que preserva la antropología bíblica sin reducirla a emoción.
- source_word: מִכֹּל
  english_pob_choice: more deceitful than anything else
  chosen_spanish: más engañoso que todo
  alternatives_spanish:
  - por encima de todo
  - más engañoso que cualquier cosa
  lexicon: HALOT
  rationale: La construcción comparativa se vierte de forma natural en español con «más ... que todo», manteniendo el sentido de superlativo relacional. «Por encima de todo» sería más tradicional, pero menos transparente en español moderno.
- source_word: וְאָנֻשׁ
  english_pob_choice: desperately sick
  chosen_spanish: gravemente enfermo
  alternatives_spanish:
  - incurable
  - desesperadamente enfermo
  - muy enfermo
  lexicon: HALOT
  rationale: אָנֻשׁ expresa una enfermedad o debilidad severa, incluso incurable. «Gravemente enfermo» conserva la metáfora patológica y evita introducir explícitamente la categoría moral «malvado», tal como el POB inglés prefirió no hacerlo.
- source_word: הוּא
  english_pob_choice: and desperately sick
  chosen_spanish: está
  alternatives_spanish:
  - es
  - y está
  lexicon: HALOT
  rationale: El predicado hebreo se integra de modo natural en español con un verbo copulativo implícito/expreso. Se expresa con «está» para mantener el estado descrito por el adjetivo sin sobrecargar la frase.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  lexicon: HALOT
  rationale: El interrogativo simple reproduce la fuerza retórica del hebreo y el inglés POB.
- source_word: יֵדָעֶנּוּ
  english_pob_choice: can know it
  chosen_spanish: puede conocerlo
  alternatives_spanish:
  - puede saberlo
  - puede entenderlo
  - puede discernirlo
  lexicon: HALOT
  rationale: «Conocerlo» refleja el alcance de ידע como penetrar/comprender realmente la condición interior. «Saberlo» es posible, pero «conocerlo» comunica mejor la imposibilidad de captar a fondo el corazón.
theological_decisions:
- issue: Antropología de "corazón"
  english_pob_reading: Retain 'heart' as the seat of the inner person rather than narrowing it to emotions alone.
  chosen_spanish_reading: Conservar «corazón» como centro de la persona interior, no solo como sede de sentimientos.
  alternative_spanish_readings:
  - la mente
  - el interior
  - el ser interior
  rationale: El hebreo לֵב abarca pensamiento, voluntad y deseo. Mantener «corazón» preserva la tensión bíblica y evita modernizarlo de forma reductiva.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de אָנֻשׁ
  english_pob_reading: Translate as severe inner sickness rather than explicit moral category 'wicked.'
  chosen_spanish_reading: Traducir con lenguaje de enfermedad grave, no con una categoría moral explícita como «malvado».
  alternative_spanish_readings:
  - desesperadamente enfermo
  - incurable
  - gravemente corrupto
  rationale: La imagen hebrea es patológica antes que abstractamente moral. «Gravemente enfermo» conserva el choque semántico sin resolverlo en un juicio doctrinal más plano.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Revisión actual sin cambios sustanciales respecto al último pase; se mantiene el acuerdo alto con el control cruzado y no se detectaron problemas de revisión.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב, conforme a la antropología bíblica del proyecto.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se conserva una metáfora de enfermedad para אָנֻשׁ, coherente con la auditoría inglesa.
  - El orden y la puntuación preservan el contraste retórico y la pregunta final del hebreo.
