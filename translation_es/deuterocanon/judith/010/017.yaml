translation:
  language: es
  text: Y eligieron a cien hombres de entre ellos, y las escoltaron, a ella y a su criada, y las llevaron a la tienda de Holofernes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέλεξαν
  english_pob_choice: selected
  chosen_spanish: eligieron
  alternatives_spanish:
  - seleccionaron
  - escogieron
  lexicon: LSJ
  rationale: El verbo expresa escoger a unos de entre un grupo mayor. «Eligieron» conserva esa acción deliberada en español y suena natural en una narración histórica.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de entre los mismos
  - entre ellos
  lexicon: LSJ
  rationale: La partícula partitiva marca elección desde un grupo mayor. «De entre ellos» reproduce con claridad ese valor sin forzar la sintaxis española.
- source_word: ἄνδρας ἑκατόν
  english_pob_choice: one hundred men
  chosen_spanish: cien hombres
  alternatives_spanish:
  - ciento de hombres
  - cien varones
  lexicon: LSJ
  rationale: «Cien hombres» es la forma más natural y fiel para el numeral y el sustantivo masculino plural en español.
- source_word: παρέζευξαν
  english_pob_choice: escorted
  chosen_spanish: la escoltaron
  alternatives_spanish:
  - la acompañaron
  - les asignaron escolta
  lexicon: LSJ
  rationale: En este contexto militar/oficial, el verbo comunica acompañamiento protector. «Escoltaron» conserva mejor esa función que un simple «acompañaron».
- source_word: τῇ ἄβρᾳ αὐτῆς
  english_pob_choice: her maid
  chosen_spanish: su sirvienta
  alternatives_spanish:
  - su criada
  - su doncella
  - su doncella/servidora
  lexicon: LSJ
  rationale: Ἄβρα designa a la mujer subordinada que va con Judit. «Sirvienta» expresa con claridad el estatus doméstico; «doncella» puede sonar más ambiguo o arcaizante.
- source_word: ἤγαγον
  english_pob_choice: brought
  chosen_spanish: las llevaron
  alternatives_spanish:
  - las condujeron
  - las guiaron
  lexicon: LSJ
  rationale: El verbo puede significar llevar o conducir. Como hay dos mujeres en el objeto, «las llevaron» es natural en español y mantiene el sentido de traslado hacia un destino.
- source_word: σκηνήν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - pabellón
  lexicon: LSJ
  rationale: Aunque «tent» suele traducirse como «tienda de campaña», en español bíblico y narrativo «tienda» es más breve y fiel; el contexto militar lo hace claro.
- source_word: Ὀλοφέρνου
  english_pob_choice: Holofernes
  chosen_spanish: Holofernes
  alternatives_spanish:
  - Holofernes
  lexicon: policy transliteration
  rationale: Se conserva la transliteración del nombre propio según la política del proyecto.
theological_decisions:
- issue: Acompañamiento escoltado de Judit y su sierva
  english_pob_reading: escorted her and her maid
  chosen_spanish_reading: la escoltaron a ella y a su sirvienta
  alternative_spanish_readings:
  - la acompañaron a ella y a su sirvienta
  - les dieron escolta
  rationale: No hay que diluir el matiz de protección u oficialidad que sugiere el verbo en contexto. «Escoltaron» mantiene ese valor sin introducir interpretación doctrinal.
  doctrine_reference: Narrative context; lexical/theological restraint
- issue: Destino como tienda de Holofernes
  english_pob_reading: the tent of Holofernes
  chosen_spanish_reading: la tienda de Holofernes
  alternative_spanish_readings:
  - el pabellón de Holofernes
  - la carpa de Holofernes
  rationale: «Tienda» es el equivalente más directo y sobrio del griego σκηνήν. No se añade mayor especificación porque el texto no la da.
  doctrine_reference: Narrative fidelity
