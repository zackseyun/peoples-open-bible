translation:
  language: es
  text: Hemos ordenado que[a], en cuanto llegue esta carta, los registrados, junto con sus esposas y sus hijos, sean enviados de inmediato ante nosotros en cadenas de hierro, encerrados por todos lados, con abuso y maltrato[c][b], para una fosa irremediable y vergonzosa, propia de enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los inscritos» o «los listados por nombre»; el participio griego se refiere a personas oficialmente anotadas en un registro.
    reason: lexical_alternative
  - marker: b
    text: La expresión puede sugerir tanto abuso humillante como despojo o saqueo; el griego ὕβρις καὶ σκυλμοί concentra ambas ideas de vejación violenta.
    reason: lexical_alternative
  - marker: c
    text: «Fosa» puede ser literal o funcionar como imagen vívida de un lugar de destrucción y vergüenza.
    reason: lexical_alternative
lexical_decisions:
- source_word: προστετάχαμεν
  english_pob_choice: We have ordered
  chosen_spanish: Hemos ordenado
  alternatives_spanish:
  - hemos mandado
  - hemos dado órdenes
  lexicon: LSJ
  rationale: El perfecto griego expresa una orden ya emitida con vigencia presente. «Hemos ordenado» conserva el tono autoritativo y suena natural en español contemporáneo.
- source_word: ἅμα τῷ προσπεσεῖν τὴν ἐπιστολὴν τήνδε
  english_pob_choice: as soon as this letter arrives
  chosen_spanish: en cuanto llegue esta carta
  alternatives_spanish:
  - tan pronto como llegue esta carta
  - al llegar esta carta
  lexicon: LSJ
  rationale: La construcción temporal indica inmediatez. «Llegue» capta el valor de llegada/delivería de la carta sin traducirla mecánicamente como «cae».
- source_word: αἰθωρεὶ
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: LSJ
  rationale: Adverbio de urgencia; «de inmediato» conserva la fuerza administrativa del decreto.
- source_word: τοὺς ἐννεμομένους
  english_pob_choice: those registered
  chosen_spanish: los registrados
  alternatives_spanish:
  - los inscritos
  - los listados
  lexicon: LSJ
  rationale: El participio remite a personas asentadas en un registro oficial. «Registrados» mantiene el matiz burocrático y el contexto de lista/censo.
- source_word: σὺν ταῖς γυναιξὶ καὶ τέκνοις
  english_pob_choice: together with their wives and children
  chosen_spanish: junto con sus esposas y sus hijos
  alternatives_spanish:
  - con sus mujeres y niños
  - junto con sus mujeres y sus hijos
  lexicon: LSJ
  rationale: Aquí γυναιξί se entiende naturalmente como «esposas» en relación con los varones registrados; «hijos» conserva τέκνα como descendencia familiar.
- source_word: μετὰ ὕβρεως καὶ σκυλμῶν
  english_pob_choice: with abuse and mistreatment
  chosen_spanish: con abuso y maltrato
  alternatives_spanish:
  - con ultraje y despojo
  - con violencia y saqueo
  lexicon: LSJ
  rationale: ὕβρις expresa trato humillante e insolente; σκυλμός puede implicar despojo o trato vejatorio. «Abuso y maltrato» reproduce la pareja sin sobreespecificar el modo exacto de la violencia.
- source_word: ἀποστεῖλαι πρὸς ἡμᾶς
  english_pob_choice: be sent to us
  chosen_spanish: sean enviados a nosotros
  alternatives_spanish:
  - sean remitidos a nosotros
  - los envíen a nosotros
  lexicon: LSJ
  rationale: El infinitivo depende del mandato. La pasiva española mantiene el estilo de decreto y el foco en la orden.
- source_word: ἐν δεσμοῖς σιδηροῖς
  english_pob_choice: in iron bonds
  chosen_spanish: con cadenas de hierro
  alternatives_spanish:
  - en cadenas de hierro
  - con grilletes de hierro
  lexicon: LSJ
  rationale: δεσμοί son ataduras o ligaduras; «cadenas de hierro» es claro, idiomático y preserva la materialidad del castigo.
- source_word: πάντοθεν κατακεκλεισμένους
  english_pob_choice: shut in on every side
  chosen_spanish: encerrados por todos lados
  alternatives_spanish:
  - completamente encerrados
  - cerrados por todas partes
  lexicon: LSJ
  rationale: El participio perfecto intensifica el estado de estar totalmente clausurados. «Por todos lados» conserva el alcance total de la reclusión.
- source_word: εἰς ἀνήκεστον καὶ δυσκλεῆ πρέποντα δυσμενέσιν βόθρον
  english_pob_choice: for an incurable and disgraceful pit fit for enemies
  chosen_spanish: para un pozo irreparable y vergonzoso, propio de enemigos
  alternatives_spanish:
  - para un pozo irremediable e infame, apto para enemigos
  - hacia un pozo irreparable y deshonroso, digno de enemigos
  lexicon: LSJ
  rationale: βόθρος es literalmente «pozo», aunque puede ser imagen de destrucción y vergüenza. ἀνήκεστος se traduce mejor aquí como «irreparable»; δυσκλεής como «vergonzoso» conserva la nota de infamia; πρέποντα δυσμενέσιν se expresa como «propio de enemigos» para mantener la idea de adecuación/ajuste al destino hostil.
theological_decisions:
- issue: βόθρος como imagen de destino punitivo
  english_pob_reading: '''Pit'' may be literal or may function as a vivid image for a place of destruction and disgrace.'
  chosen_spanish_reading: «pozo» puede entenderse literalmente o como imagen vívida de destrucción y vergüenza.
  alternative_spanish_readings:
  - «fosa» puede ser literal o figurada
  - «pozo» puede funcionar como metáfora de ruina
  rationale: El griego permite una referencia concreta o una imagen retórica. La traducción no debe cerrar la ambigüedad; por eso se conserva el término espacial básico y se reconoce su posible valor figurado.
  doctrine_reference: No aplica; observación literaria sobre imaginería de juicio/castigo
translation_notes:
  revision_awareness: Se tuvieron en cuenta las revisiones inglesas que ajustaron ‘enrolled’ a ‘registered’, ‘plundering’ a ‘mistreatment’ y ‘incurable’ a ‘irreparable’. La versión española sigue esos refinamientos para evitar sobretraducir σκυλμοί como saqueo cuando el contexto enfatiza maltrato, y para preferir un adjetivo más natural que ‘incurable’ en referencia a un pozo/destino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o terminología litúrgica ajena al texto.
  - Se preservó el registro administrativo del decreto con sintaxis formal pero natural en español.
  - Se usó «abuso y maltrato» para no imponer un matiz más técnico de saqueo donde el contexto puede ser más amplio.
