translation:
  language: es
  text: Y cuando murió Ana[a], la enterró con su padre. Luego Tobías se fue con su esposa y sus hijos a Ecbátana, a Ragüel, su suegro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «la enterró con su padre». El sujeto de esa cláusula no se expresa; la cláusula siguiente nombra explícitamente a Τωβίας/Tobías.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω indica muerte; en español, "murió" es la equivalencia directa, clara y natural en registro narrativo.
- source_word: ἔθαψεν
  english_pob_choice: buried
  chosen_spanish: la enterró
  alternatives_spanish:
  - la sepultó
  - la enterró
  lexicon: BDAG
  rationale: θάπτω significa enterrar. "La enterró" es transparente y conserva la acción funeraria sin elevar innecesariamente el registro.
- source_word: μετὰ τοῦ πατρὸς αὐτοῦ
  english_pob_choice: with his father
  chosen_spanish: con su padre
  alternatives_spanish:
  - junto a su padre
  - con su padre
  lexicon: BDAG
  rationale: μετά con genitivo normalmente significa "con". En contexto funerario puede sugerir la misma sepultura familiar, pero la frase griega no precisa más; "con su padre" preserva esa ambigüedad.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: ἀπέρχομαι expresa salida o partida. "Se fue" mantiene naturalidad en español y refleja el movimiento después del entierro.
- source_word: Τωβίας
  english_pob_choice: Tobias
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  lexicon: Nombre propio en la tradición española
  rationale: El griego nombra aquí a Τωβίας; en español es más fiel y reconocible traducirlo como "Tobías" en lugar de "Tobit".
- source_word: Ἐκβάτανα
  english_pob_choice: Ecbatana
  chosen_spanish: Ecbátana
  alternatives_spanish:
  - Ecbatana
  - Ecbátana
  lexicon: LSJ
  rationale: Es un topónimo propio; "Ecbátana" adapta la transliteración al patrón ortográfico español con acento gráfico para la pronunciación.
- source_word: πρὸς Ῥαγουὴλ τὸν πενθερὸν αὐτοῦ
  english_pob_choice: to Raguel his father-in-law
  chosen_spanish: a Ragüel, su suegro
  alternatives_spanish:
  - a Ragüel, su suegro
  - a Ragüel, el padre de su esposa
  lexicon: BDAG
  rationale: πρός con objeto personal indica movimiento "hacia / a" una persona. πενθερός significa "suegro"; "su suegro" reproduce la relación familiar de modo natural y preciso.
theological_decisions:
- issue: Sujeto implícito en la primera cláusula
  english_pob_reading: '"he buried her with his father" leaves the subject implied in Greek; the next clause names Tobias explicitly.'
  chosen_spanish_reading: '"la enterró con su padre" deja implícito el sujeto en la primera cláusula y mantiene la secuencia del griego.'
  alternative_spanish_readings:
  - '"Tobías la enterró con su padre"'
  - '"él la enterró con su padre"'
  rationale: El griego introduce un verbo con sujeto no expresado y luego nombra explícitamente a Τωβίας. En español conviene conservar esa tensión sintáctica sin resolverla prematuramente con un nombre propio en la primera cláusula.
  doctrine_reference: Primacía del texto fuente y preservación de ambigüedad gramatical documentada.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "Tobit" por "Tobias" para ajustarse al griego Τωβίας; esta versión española sigue esa corrección y mantiene la cláusula de entierro con sujeto implícito, como en el audit trail.
  spanish_consistency_notes:
  - Se usa "Tobías" para Τωβίας, en coherencia con el griego y con la revisión inglesa.
  - Se evita convertir "con su padre" en una especificación espacial más fuerte (como "junto a su padre") porque el griego permite una ambigüedad funeraria útil.
  - Se mantiene "suegro" para πενθερός, sin recargar con glosas adicionales en el texto principal.
