- from: 'Y los hijos de Israel dijeron a Moisés, diciendo: «¡Mira[a][b], perecemos! ¡Estamos arruinados! ¡Todos nosotros estamos arruinados!»'
  to: 'Y los hijos de Israel[a] dijeron a Moisés, diciendo: «¡Miren[b][c], morimos! ¡Estamos perdidos! ¡Todos nosotros estamos perdidos!»'
  rationale: Se revisó para reflejar mejor el contraste léxico hebreo entre גָּוַעְנוּ y אָבַדְנוּ, mantener la repetición del segundo verbo, y restaurar la nota explicativa presente en la auditoría inglesa. También se cambió '¡Mira!' por '¡Miren!' para mayor naturalidad en español sin perder la fuerza de alarma de הֵן.
