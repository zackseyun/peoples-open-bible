translation:
  language: es
  text: Y lo degolló, y Moisés arrojó la sangre contra el altar por todos sus lados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrojó de golpe la sangre contra el altar por todos sus lados». El verbo hebreo indica una aplicación enérgica de la sangre sacrificial, no un rociado leve.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחָט
  english_pob_choice: he slaughtered it
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  lexicon: HALOT
  rationale: שָׁחַט en contexto sacrificial denota degollar o sacrificar un animal mediante el corte ritual; en español, «degollar» conserva mejor la violencia ritual y la especificidad cultual que «matar».
- source_word: וַיִּזְרֹק
  english_pob_choice: threw
  chosen_spanish: arrojó
  alternatives_spanish:
  - lanzó
  - salpicó
  - esparció
  lexicon: HALOT
  rationale: זָרַק en este contexto describe el acto de lanzar la sangre sobre el altar. «Arrojó» mantiene la fuerza del gesto mejor que «esparció» o «roció», que suavizarían la acción ritual.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  lexicon: HALOT
  rationale: Sustantivo definido directo; «la sangre» conserva el referente sacrificial sin añadir matiz interpretativo.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Equivalente estándar y transparente para מִזְבֵּחַ en contexto sacrificial.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: «Alrededor» reproduce la fuerza distributiva de סָבִיב de forma natural en español; preserva el sentido de aplicación circunferencial sin sobreexplicar.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Standard Spanish biblical onomastics
  rationale: Nombre propio con forma tradicional y universalmente reconocible en español bíblico.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa presentan acuerdo sustancial; no se aplicaron revisiones posteriores. Se mantuvo la fuerza ritual del hebreo en español sin atenuar el acto de la sangre sobre el altar.
  spanish_consistency_notes:
  - Se evitó «rociar» porque en español puede sugerir una aspersión más ligera que el gesto ritual del verbo hebreo.
  - Se mantuvo el nombre «Moisés» por consistencia bíblica en español.
  - La colocación de «alrededor» al final conserva el valor distributivo de סָבִיב en una frase natural para lector hispanohablante.
