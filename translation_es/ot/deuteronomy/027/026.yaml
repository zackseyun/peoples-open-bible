review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: fórmula de maldición pactal, referencia a «las palabras de esta ley», y respuesta congregacional «Amén». Sin embargo, «para hacerlas» no reproduce bien el valor explicado en la auditoría inglesa para לַעֲשׂוֹת אֹתָם, que aquí expresa el modo o la realización práctica de «sostener/confirmar» la ley («by doing them»), no finalidad. Además, la nota al pie actual está anclada a «Maldito», pero la nota preservada por la auditoría inglesa corresponde al verbo יָקִים, no a אָרוּר.'
  spanish_quality_summary: El español es claro y digno, pero «sostiene ... para hacerlas» suena algo rígido y menos natural en español bíblico actual. «mantiene vigentes ... al ponerlas por obra» o «confirma ... al cumplirlas» serían opciones más idiomáticas; de ellas, «mantiene vigentes ... al ponerlas por obra» conserva mejor la distinción léxica entre יָקִים y עָשָׂה. También conviene mover la nota al pie al verbo relevante.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Maldito», «ley» y «Amén» están bien. La decisión clave es mantener una diferencia entre יָקִים y לַעֲשׂוֹת, evitando a la vez un calco poco natural.
  issues:
  - severity: medium
    issue: «para hacerlas» expresa finalidad en lugar de modo/resultante
    rationale: La auditoría inglesa justifica «by doing them» como enlace entre sostener la ley y obedecerla concretamente. En español, «para hacerlas» sugiere propósito («con el fin de hacerlas»), mientras que el hebreo aquí apunta más a la manera en que se sostiene/ratifica la ley.
  - severity: medium
    issue: La nota al pie está anclada al término equivocado
    rationale: La nota inglesa preserva alternativas para יָקִים («uphold / confirm / establish»). El borrador español pone la nota en «Maldito», y además introduce alternativas no priorizadas por la auditoría para אָרוּר.
  - severity: low
    issue: «sostiene» es posible pero algo duro en español para este contexto
    rationale: Aunque semánticamente defendible, «mantiene vigentes» o «confirma» comunican con más claridad la idea de mantener en vigor la ley. Conviene conservar la distinción con «ponerlas por obra».
  revised_spanish_text: 'Maldito el que no mantiene vigentes[a] las palabras de esta ley al ponerlas por obra. Y todo el pueblo dirá: «Amén».'
  revised_footnotes:
  - marker: a
    text: 'O «no confirma» o «no establece» las palabras de esta ley. El verbo hebreo puede expresar la idea de mantener o validar la vigencia de la ley; aquí está vinculado con la obediencia práctica: «al ponerlas por obra».'
    reason: lexical_alternative
