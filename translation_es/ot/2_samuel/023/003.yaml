translation:
  language: es
  text: 'El Dios de Israel ha hablado; la Roca de Israel me ha hablado: «Uno que gobierna a la humanidad con justicia[a], gobernando en el temor de Dios[b],»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el género humano». El hebreo אָדָם puede usarse de manera representativa para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: La frase también puede leerse con alcance mesiánico, como una descripción ideal del rey que culmina en el Mesías.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - habló
  lexicon: BDB / HALOT
  rationale: El perfecto hebreo introduce un dicho oracular con vigencia actual; «ha hablado» conserva ese valor y suena natural en español bíblico contemporáneo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: The God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: BDB / HALOT
  rationale: La construcción de estado constructo nombra al Dios propio de Israel. El artículo es natural en español y no altera el sentido.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - con respecto a mí
  lexicon: BDB / HALOT
  rationale: Aquí funciona como dativo de discurso directo; en español, el clítico «me» expresa de forma más directa que «a mí» la recepción de la palabra.
- source_word: דִבֶּר
  english_pob_choice: has said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - habló
  lexicon: BDB / HALOT
  rationale: Se conserva el paralelismo con אָמַר mediante un verbo normal de habla. «Ha dicho» es idiomático y mantiene el tono solemne.
- source_word: צוּר יִשְׂרָאֵל
  english_pob_choice: the Rock of Israel
  chosen_spanish: la Roca de Israel
  alternatives_spanish:
  - el Roca de Israel
  lexicon: BDB / HALOT
  rationale: צוּר es un título metafórico de Dios y debe traducirse literalmente como «Roca», preservando la imagen de firmeza y protección.
- source_word: מוֹשֵׁל
  english_pob_choice: One who rules
  chosen_spanish: Uno que gobierna
  alternatives_spanish:
  - Quien gobierna
  - el que gobierna
  - un gobernante
  lexicon: BDB / HALOT
  rationale: El participio funciona de modo general y proverbial. «Uno que gobierna» conserva la fuerza descriptiva sin convertirlo prematuramente en un título fijo.
- source_word: בָּאָדָם
  english_pob_choice: over mankind
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - sobre la humanidad
  - sobre los seres humanos
  - sobre el hombre
  lexicon: BDB / HALOT
  rationale: La preposición más el sustantivo en este contexto expresa el ámbito humano sobre el que ejerce su gobierno. «A la humanidad» evita un calco duro y refleja el sentido colectivo reconocido en el audit trail.
- source_word: צַדִּיק
  english_pob_choice: justly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - de manera justa
  lexicon: BDB / HALOT
  rationale: Aunque formalmente es adjetivo, aquí cualifica la manera de gobernar. «Con justicia» reproduce bien el valor adverbial/predicativo sin perder la raíz de justicia/rectitud.
- source_word: מוֹשֵׁל יִרְאַת אֱלֹהִים
  english_pob_choice: ruling in the fear of God
  chosen_spanish: gobernando en el temor de Dios
  alternatives_spanish:
  - gobernando con el temor de Dios
  - gobernando bajo el temor de Dios
  - un gobernante en el temor de Dios
  lexicon: BDB / HALOT
  rationale: La expresión constructa comunica una esfera o marco de gobierno. «En el temor de Dios» es una fórmula natural en español y conserva la idea de reverencia responsable ante Dios.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: BDB / HALOT
  rationale: Aunque morfológicamente plural, aquí designa al único Dios de Israel; en español debe traducirse con singular.
theological_decisions:
- issue: Lectura mesiánica versus principio real ideal
  english_pob_reading: The verse is rendered as a general principle about the ideal ruler, without making an explicit messianic identification in the main text.
  chosen_spanish_reading: El texto principal presenta una descripción ideal del gobernante justo, sin explicitar en la línea principal una identificación mesiánica.
  alternative_spanish_readings:
  - Una lectura mesiánica que vea esta línea cumplida finalmente en el Mesías
  - Una lectura directamente cristológica en el texto principal
  rationale: El hebreo formula una descripción sapiencial/profética del rey ideal. El contexto permite una resonancia mesiánica, pero no la nombra de modo explícito; por eso conviene mantener la tensión interpretativa en vez de resolverla en la línea principal.
  doctrine_reference: Preservar la tensión teológica sin forzarla en la traducción principal.
translation_notes:
  revision_awareness: El draft inglés fue revisado de «over man» a «over mankind» para reflejar mejor el sentido colectivo de בָּאָדָם. En español, la elección «a la humanidad» recoge ese matiz colectivo y evita una lectura restringida a varón singular. Se mantiene además el paralelismo verbal de אָמַר/דִבֶּר con dos verbos equivalentes en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton cuando aparezca en otros versículos; aquí no hay sustitución porque el hebreo usa אֱלֹהִים.
  - «Roca de Israel» se conserva como título metafórico de Dios, no se paraphrasea.
  - «Temor de Dios» se traduce de manera estable como fórmula reverencial, sin convertirla en mera emoción de miedo.
  - La versificación y la puntuación siguen el orden poético del hebreo, con pausa fuerte tras el primer hemistiquio.
