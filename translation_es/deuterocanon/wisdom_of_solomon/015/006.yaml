translation:
  language: es
  text: Amantes del mal son dignos de tales esperanzas[a], tanto los que hacen[b] los ídolos como los que los desean y los que los adoran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de esperanzas como estas». La frase remite hacia atrás a las expectativas asociadas con los ídolos en el contexto circundante.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que hacen». En este contexto se refiere a quienes fabrican o modelan los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακῶν
  english_pob_choice: of evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de males
  - de cosas malas
  lexicon: LSJ
  rationale: El genitivo plural expresa la cualidad moral de aquello que se ama; en español, «del mal» comunica mejor el valor ético que un plural más mecánico como «de males».
- source_word: ἐρασταὶ
  english_pob_choice: Lovers
  chosen_spanish: Amantes
  alternatives_spanish:
  - los que aman
  - devotos
  lexicon: LSJ
  rationale: «Amantes» preserva la fuerza nominal compacta de ἐρασταί y mantiene el tono acusatorio del pasaje.
- source_word: ἄξιοί
  english_pob_choice: are worthy
  chosen_spanish: son dignos
  alternatives_spanish:
  - merecen
  - son merecedores
  lexicon: LSJ
  rationale: «Son dignos» es la forma más natural y cercana al valor predicativo del adjetivo en español.
- source_word: τοιούτων ἐλπίδων
  english_pob_choice: of such hopes
  chosen_spanish: de tales esperanzas
  alternatives_spanish:
  - de esperanzas como estas
  - de semejantes esperanzas
  lexicon: LSJ
  rationale: «Tales» conserva bien el demostrativo anafórico; «esperanzas» mantiene el sustantivo del original sin suavizar su alcance contextual.
- source_word: οἱ δρῶντες
  english_pob_choice: those who make them
  chosen_spanish: los que las hacen
  alternatives_spanish:
  - los que las fabrican
  - los que las producen
  lexicon: LSJ
  rationale: En el contexto inmediato de ídolos/imágenes, δρῶντες apunta a quienes las fabrican; «las hacen» es natural en español y conserva la referencia implícita.
- source_word: οἱ ποθοῦντες
  english_pob_choice: those who desire them
  chosen_spanish: los que las desean
  alternatives_spanish:
  - los que las anhelan
  - los que las codician
  lexicon: LSJ
  rationale: ποθέω expresa deseo intenso; «las desean» es claro y no añade una intensidad no requerida por el contexto.
- source_word: οἱ σεβόμενοι
  english_pob_choice: those who worship them
  chosen_spanish: los que las veneran
  alternatives_spanish:
  - los que las adoran
  - los que las reverencian
  lexicon: LSJ
  rationale: En contexto idolátrico, σέβομαι puede ir de reverencia a culto. «Veneran» evita una equivalencia excesivamente moderna de «adoran» y conserva el matiz religioso; además sigue la misma referencia pronominal a los ídolos.
theological_decisions:
- issue: Objeto implícito en los participios finales
  english_pob_reading: Render the participles with the implied object 'them,' referring to the idols discussed in context.
  chosen_spanish_reading: Mantener el objeto implícito recuperable con el pronombre átono femenino plural «las», referido a los ídolos/imágenes del contexto.
  alternative_spanish_readings:
  - «los que hacen, desean y veneran» sin objeto explícito
  - «los que hacen, desean y veneran esas cosas»
  rationale: El griego omite el objeto porque es recuperable del contexto. En español conviene expresarlo para evitar ambigüedad; «las» mantiene la referencia sin sobreexplicar ni introducir una abstracción ajena al pasaje.
  doctrine_reference: Traducción de equivalencia óptima; fidelidad al referente contextual sin añadir contenido doctrinal.
- issue: Valor de σεβόμενοι en contexto idolátrico
  english_pob_reading: those who worship them
  chosen_spanish_reading: los que las veneran
  alternative_spanish_readings:
  - los que las adoran
  - los que las reverencian
  rationale: La línea enumera a quienes fabrican, desean y rinden culto a los ídolos. «Veneran» conserva el sentido cultual de σέβομαι sin imponer un registro demasiado fuerte o demasiado devocional en español; el contexto asegura que la referencia es idolátrica.
  doctrine_reference: Semántica de σέβομαι en contexto religioso idolátrico; uso contextual de culto falso.
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente inglés no introdujo cambios. Se conservó la lectura óptima-equivalente del audito inglés, pero se ajustó el objeto implícito al español con pronombre de género femenino plural para concordar con «esperanzas» y con el referente contextual de los ídolos/imágenes.
  spanish_consistency_notes:
  - Se evitó «SEÑOR»/«Cristo» porque no aplican a este versículo.
  - Se mantuvo un registro sobrio y bíblico, sin calco mecánico del inglés.
  - «Amantes del mal» preserva el golpe retórico del nominativo griego.
  - El referente pronominal de «las» queda anclado en el contexto de los ídolos mencionados por la nota y por la estructura del verso.
