lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Al maestro de coro
  - Para el director de música
  - Para el líder
  lexicon: HALOT
  rationale: El encabezado del salmo usa una fórmula superscripcional que señala al responsable musical. «Maestro de coro» conserva la función litúrgica y musical con naturalidad en español; «para» refleja el valor direccional/dedicativo del prefijo ל en este contexto.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: En los títulos de salmos, מִזְמוֹר funciona como rótulo genérico del género. «Salmo» es el equivalente estable y reconocible en español, sin añadir contenido interpretativo.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición לְ en los encabezados puede indicar autoría, asociación, pertenencia o dedicación. «De David» preserva esa amplitud semántica en español sin cerrarla a una sola relación.
theological_decisions:
- issue: Alcance del encabezado davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a decidir entre autoría directa, asociación o dedicación. Se mantiene la tensión documental del título del salmo en vez de resolverla de forma más específica de lo que permite la fuente.
  doctrine_reference: 'Translation philosophy §3: conservar la tensión teológica y textual cuando el original es amplio.'
translation_notes:
  revision_awareness: 'El audit trail inglés corrigió la ubicación del marcador: la nota debe referirse a «David» y no a «maestro de coro». La redacción española coloca la nota en «David» para alinearse con la decisión revisada y con el alcance real de לְדָוִד.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se mantiene un registro sobrio y litúrgico, adecuado para encabezados poéticos.
  - No se introduce puntuación o formulación que reduzca la ambigüedad del superscrito hebreo.
