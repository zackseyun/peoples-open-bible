revisions:
- from: Las montañas se derretirán debajo de él, y los valles se partirán, como cera delante del fuego, como aguas derramadas cuesta abajo.
  to: Las montañas se derretirán debajo de él, y los valles se abrirán, como cera delante del fuego, como aguas vertidas por una pendiente.
  rationale: Se ajusta «se partirán» a «se abrirán» para reflejar mejor יִתְבַּקָּעוּ, y se cambia «aguas derramadas cuesta abajo» por «aguas vertidas por una pendiente» para representar con mayor fidelidad y dignidad literaria מֻגָּרִים בְּמוֹרָד. No hacen falta notas al pie.
