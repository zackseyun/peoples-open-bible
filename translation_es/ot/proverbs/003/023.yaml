translation:
  language: es
  text: Entonces caminarás con seguridad por tu camino[a], y tu pie no tropezará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en seguridad". La frase hebrea puede traducirse más literalmente como "en seguridad" o "con seguridad".
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así
  lexicon: HALOT
  rationale: Marca la consecuencia temporal del proverbio anterior; "Entonces" conserva la relación lógica de resultado sin sonar rígido en español.
- source_word: תֵּלֵךְ
  english_pob_choice: you will walk
  chosen_spanish: caminarás
  alternatives_spanish:
  - irás
  - andarás
  lexicon: HALOT
  rationale: '"Caminarás" mantiene la imagen sapiencial del avance por un camino y suena natural en español contemporáneo.'
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - en seguridad
  - seguramente
  lexicon: HALOT
  rationale: La expresión hebrea apunta a seguridad objetiva; "con seguridad" reproduce bien el matiz adverbial sin convertirlo en mera confianza subjetiva.
- source_word: דַּרְכֶּךָ
  english_pob_choice: on your way
  chosen_spanish: por tu camino
  alternatives_spanish:
  - en tu camino
  - por tu senda
  lexicon: HALOT
  rationale: '"Caminar... por tu camino" conserva el paralelismo y la metáfora del andar sapiencial; "camino" es más natural y abarca lo literal y lo figurado.'
- source_word: וְרַגְלְךָ
  english_pob_choice: and your foot
  chosen_spanish: y tu pie
  alternatives_spanish:
  - y tus pies
  lexicon: HALOT
  rationale: El singular hebreo se preserva con "pie", manteniendo la correspondencia morfológica y la imagen concreta del proverbio.
- source_word: תִגּוֹף
  english_pob_choice: will not stumble
  chosen_spanish: no tropezará
  alternatives_spanish:
  - no se golpeará
  - no dará un traspié
  lexicon: HALOT
  rationale: En este contexto נגף alude a golpear el pie al andar y, por extensión, a tropezar; "tropezará" es la forma española más clara y idiomática.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan estrechamente; no se registran revisiones aplicadas y se mantiene el sentido resultante con una equivalencia óptima natural en español.
  spanish_consistency_notes:
  - Se preservó el singular de "pie" para reflejar el singular hebreo.
  - '"Camino" se mantuvo como metáfora sapiencial central, evitando sustituirla por un término más interpretativo.'
  - La nota al pie conserva la alternativa léxica documentada para לָבֶטַח sin introducir matices no atestiguados.
