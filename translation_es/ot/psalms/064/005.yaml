translation:
  language: es
  text: para disparar desde lugares ocultos[a] al íntegro[b]; de repente disparan contra él y no temen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. "en lugares ocultos"; el hebreo usa una preposición que dice "en", pero en español la imagen se expresa mejor como ataque "desde" un lugar de ocultamiento.
    reason: lexical_alternative
  - marker: b
    text: O "al inocente". El término hebreo puede destacar tanto la inocencia como la integridad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִירוֹת
  english_pob_choice: to shoot
  chosen_spanish: disparar
  alternatives_spanish:
  - tirar
  - lanzar
  - disparar flechas
  lexicon: HALOT
  rationale: En este contexto hostil, ירה expresa la acción de herir con proyectiles. En español, "disparar" comunica con naturalidad la fuerza agresiva del verbo sin añadir un objeto inexistente en el hebreo. "Disparar flechas" sería más específico de lo que el texto dice.
- source_word: בַּמִּסְתָּרִים
  english_pob_choice: from hiding places
  chosen_spanish: desde lugares ocultos
  alternatives_spanish:
  - en lugares secretos
  - desde escondites
  - en escondites
  lexicon: HALOT
  rationale: El hebreo tiene literalmente la preposición 'en', pero el sentido contextual es de emboscada desde posiciones ocultas. "Desde lugares ocultos" conserva la imagen de ataque encubierto y suena natural en español.
- source_word: תָּם
  english_pob_choice: the blameless
  chosen_spanish: al íntegro
  alternatives_spanish:
  - al inocente
  - al irreprochable
  - al justo
  lexicon: HALOT
  rationale: '"תָּם" puede referirse a integridad moral más que a simple inocencia. "Íntegro" conserva ese matiz ético y evita restringir el término a un solo aspecto.'
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  - allí mismo
  lexicon: HALOT
  rationale: El adverbio expresa abruptitud. "De repente" es una equivalencia natural y fiel en español contemporáneo.
- source_word: יֹרֻהוּ
  english_pob_choice: they shoot at him
  chosen_spanish: le disparan
  alternatives_spanish:
  - le tiran
  - disparan contra él
  - le disparan a él
  lexicon: HALOT
  rationale: El sufijo singular retoma al 'íntegro' como objeto representativo. En español, el dativo "le" mantiene esa referencia sin sobrecargar el verso; "disparan" preserva la hostilidad y evita introducir flechas o armas modernas.
- source_word: וְלֹא יִירָאוּ
  english_pob_choice: and do not fear
  chosen_spanish: y no temen
  alternatives_spanish:
  - y no tienen miedo
  - y no se asustan
  - y no sienten temor
  lexicon: HALOT
  rationale: La cláusula final es breve y sin objeto explícito. "No temen" reproduce la tersura hebrea y deja abierta la referencia implícita del temor.
translation_notes:
  revision_awareness: 'El audit trail inglés coincide de forma alta con el hebreo: ataque desde ocultamiento, abrupto, dirigido contra el תָּם y seguido por ausencia de temor. Se mantuvo la misma estructura semántica, ajustando solo la preposición inglesa ''from'' a una solución española idiomática (''desde'') y conservando la ambigüedad ética de תָּם con ''íntegro''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece ningún nombre divino en el versículo.
  - Se mantuvo un tono poético y sobrio, acorde con el género de salmo.
  - '''Disparar'' se usa sin especificar armas para no añadir información al texto.'
  - '''Íntegro'' y la nota alternativa preservan la tensión moral/inocente del hebreo.'
