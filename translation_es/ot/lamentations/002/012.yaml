translation:
  language: es
  text: 'Ellos dicen a sus madres: «¿Dónde están el grano y el vino?», mientras desfallecen como los heridos[a] en las calles de la ciudad, mientras su vida[b] se derrama en el seno[c] de sus madres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «como los muertos» o «como los caídos». El hebreo חָלָל puede referirse a alguien muerto, atravesado o mortalmente herido; aquí probablemente sugiere niños que se desploman como bajas de guerra.
    reason: lexical_alternative
  - marker: b
    text: Hebreo nephesh, a menudo «alma», aquí probablemente significa «vida», en el sentido de vida que se va apagando.
    reason: lexical_alternative
  - marker: c
    text: O «en los brazos de sus madres» o «en el regazo de sus madres». «Seno» conserva la imagen materna íntima y literal del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאִמֹּתָם
  english_pob_choice: to their mothers
  chosen_spanish: a sus madres
  alternatives_spanish:
  - a sus propias madres
  - para sus madres
  lexicon: HALOT
  rationale: El ל marca aquí destinatario o dirección del dicho; en español, «a sus madres» reproduce de manera natural la relación de habla y la carga afectiva sin añadir énfasis innecesario.
- source_word: יֹאמְרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dirán
  - decían
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona en una descripción vívida; «dicen» mantiene la inmediatez narrativa que el POB inglés captó con presente.
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están?
  alternatives_spanish:
  - ¿Dónde está?
  - ¿Dónde hay?
  lexicon: HALOT
  rationale: 'La pregunta busca dos bienes concretos, por lo que en español es idiomático usar plural: «¿Dónde están?».'
- source_word: דָּגָן וָיָיִן
  english_pob_choice: grain and wine
  chosen_spanish: el grano y el vino
  alternatives_spanish:
  - el cereal y el vino
  - la comida y el vino
  lexicon: HALOT
  rationale: דָּגָן se refiere al grano/cereal, no a «maíz» en sentido moderno; «grano» conserva la concreción agrícola y el paralelismo con «vino».
- source_word: בְּהִתְעַטְּפָם
  english_pob_choice: as they faint
  chosen_spanish: mientras desfallecen
  alternatives_spanish:
  - cuando desfallecen
  - mientras se desvanecen
  - mientras se desmayan
  lexicon: HALOT
  rationale: El hitpael de עטף en contextos de lamentación expresa languidez y desmayo por agotamiento; «desfallecen» comunica bien esa pérdida de fuerzas sin exagerar el matiz.
- source_word: כֶּחָלָל
  english_pob_choice: like the wounded
  chosen_spanish: como los heridos
  alternatives_spanish:
  - como los muertos
  - como los caídos
  - como los que han sido atravesados
  lexicon: HALOT
  rationale: חָלָל puede abarcar al muerto o al herido mortalmente; aquí, por el cuadro de niños que colapsan en la calle, «los heridos» preserva la violencia de la imagen sin decidir prematuramente por «muertos».
- source_word: בִּרְחֹבוֹת עִיר
  english_pob_choice: in the streets of the city
  chosen_spanish: en las calles de la ciudad
  alternatives_spanish:
  - en las plazas de la ciudad
  - en las anchas calles de la ciudad
  lexicon: HALOT
  rationale: רְחֹבוֹת nombra los espacios abiertos de la ciudad; «calles» es la opción española más clara y natural, manteniendo la escena pública.
- source_word: בְּהִשְׁתַּפֵּךְ נַפְשָׁם
  english_pob_choice: as their life is poured out
  chosen_spanish: mientras su vida se derrama
  alternatives_spanish:
  - mientras su alma se derrama
  - mientras su vida se va derramando
  - mientras se les escapa la vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar vida, alma o ser; aquí la metáfora apunta al desvanecimiento vital por inanición, por lo que «vida» hace explícita la fuerza del pasaje sin perder el tropo del derramamiento.
- source_word: אֶל חֵיק אִמֹּתָם
  english_pob_choice: into their mothers’ bosom
  chosen_spanish: en el seno de sus madres
  alternatives_spanish:
  - en el regazo de sus madres
  - en los brazos de sus madres
  - contra el pecho de sus madres
  lexicon: HALOT
  rationale: חֵיק es literalmente «seno/bosom» y en español «seno de sus madres» conserva la intimidad materna del cuadro; se evita «brazos» para no suavizar la imagen que el texto resalta.
theological_decisions:
- issue: Sentido de חָלָל en la comparación
  english_pob_reading: Or “like the slain.” The Hebrew חלל can refer to one slain, pierced, or mortally wounded; here it likely evokes children collapsing as if battlefield casualties.
  chosen_spanish_reading: «como los heridos», con la nota de que también puede entenderse como «los muertos / los caídos» en sentido de bajas de combate.
  alternative_spanish_readings:
  - como los muertos
  - como los caídos
  - como los atravesados
  rationale: El texto no exige decidir entre herido, muerto o caído; conservar «heridos» mantiene abierta la tensión semántica y refleja la imagen de víctimas de guerra sin borrar la posibilidad de muerte implícita.
  doctrine_reference: Lamentaciones 2:12; HALOT על חָלָל
- issue: Sentido de נֶפֶשׁ en el cierre
  english_pob_reading: Hebrew nephesh, often rendered “soul,” here likely means “life” in the sense of life ebbing away.
  chosen_spanish_reading: «su vida» en vez de «su alma»
  alternative_spanish_readings:
  - su alma
  - su ser
  - su vida se les va
  rationale: En este contexto de hambre y colapso, נֶפֶשׁ describe la vitalidad que se agota; «vida» es la equivalencia española más transparente y evita una lectura espiritualizante ajena al pasaje.
  doctrine_reference: Lamentaciones 2:12; HALOT נפשׁ
- issue: Imagen corporal de חֵיק
  english_pob_reading: Or “into their mothers’ arms” or “on their mothers’ lap.” Hebrew “bosom” is a literal, intimate maternal image.
  chosen_spanish_reading: «en el seno de sus madres»
  alternative_spanish_readings:
  - en los brazos de sus madres
  - en el regazo de sus madres
  rationale: «Seno» conserva el valor corporal e íntimo de חֵיק y la imagen de niños muriendo apoyados contra su madre; no se suaviza la crudeza con una versión menos concreta.
  doctrine_reference: Lamentaciones 2:12; HALOT חיק
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo WLC y el trazado auditado en inglés. No se detectaron cambios de sentido necesarios respecto de la última pasada; se mantuvieron las tensiones léxicas documentadas en חָלָל, נֶפֶשׁ y חֵיק, preservando la imagen poética sin normalizarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se prefirió «grano» para דָּגָן y «vino» para יָיִן, en paralelo directo con el audit trail inglés.
  - Se mantuvo el registro sobrio y poético, evitando un giro devocional más interpretativo que el hebreo.
  - Los marcadores de nota a, b, c aparecen en el texto exactamente donde corresponde cada alternativa léxica.
