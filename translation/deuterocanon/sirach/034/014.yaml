translation:
  text: One who fears the Lord will not be shaken, and will not be afraid, for he is his hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Cairo Geniza Hebrew line for this verse reads, 'He will not neglect the cry of an orphan, nor a widow when she multiplies her complaint,' which does not match the Greek wording here and likely reflects a verse-line mismatch in the source data.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ φοβούμενος
  chosen: One who fears
  alternatives:
  - He who fears
  - The one fearing
  lexicon: BDAG
  rationale: The Hebrew witness supplied for this verse appears to reflect a different line, while the Greek parallel gives a coherent reading for Sirach 34:14. The articular participle is rendered generically and naturally in English as 'One who fears,' preserving the singular representative sense without archaic diction.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος as a divine title. The article is retained in idiomatic English because the referent is God.
- source_word: οὐ μὴ πτοηθῇ
  chosen: will not be shaken
  alternatives:
  - will certainly not be terrified
  - will not be alarmed
  lexicon: BDAG
  rationale: πτοέω can denote being frightened or thrown into agitation. 'Will not be shaken' captures both emotional disturbance and destabilization, fitting wisdom-style assurance and pairing well with the following clause.
- source_word: οὐ μὴ δειλιάσῃ
  chosen: will not be afraid
  alternatives:
  - will not lose courage
  - will not be cowardly
  lexicon: BDAG
  rationale: δειλιάω emphasizes fearfulness or loss of courage. 'Will not be afraid' is clear modern English and avoids overinterpreting the nuance as moral cowardice.
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - confidence
  lexicon: BDAG
  rationale: The noun denotes hope or ground of confidence. 'Hope' is the more direct rendering and preserves the theological resonance of trust placed in the Lord.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - the Lord himself
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the Lord as the subject complement in the explanatory clause. 'He' keeps the sentence concise; the referent is clear from context.
