translation:
  language: es
  text: En cuanto a la tierra, de ella sale el pan, pero por debajo de ella es removida como por fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por debajo de ella es removida como fuego». El hebreo puede describir ya sea la manera («como por fuego») o una simple semejanza («como fuego»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el suelo
  lexicon: HALOT
  rationale: '''La tierra'' conserva el sentido amplio de la hebrea אֶרֶץ como superficie terrestre o terreno general. En español suena más natural que ''la tierra'' con artículo indefinido, y mantiene la contraposición con la zona subterránea del verso.'
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ella
  - de ésta
  - de la tierra
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a 'tierra'. 'De ella' evita la frialdad repetitiva de 'de la tierra' y conserva la referencia pronominal de modo natural en español.
- source_word: יֵצֵא
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale
  - sale de
  - sale hacia fuera
  lexicon: HALOT
  rationale: El verbo expresa salida concreta. 'Sale' es breve, idiomático y suficientemente literal para preservar la imagen de algo que emerge desde la tierra.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el pan
  - alimento
  - comida
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto 'pan', como en el inglés POB. Aunque en español puede abarcar alimento por extensión, aquí conserva mejor la imagen convencional del producto que la tierra da.
- source_word: וְתַחְתֶּיהָ
  english_pob_choice: but underneath it
  chosen_spanish: y por debajo de ella
  alternatives_spanish:
  - y por debajo de ella
  - pero por debajo de ella
  - y debajo de ella
  lexicon: HALOT
  rationale: El hebreo marca contraste entre la superficie fértil y el interior alterado. Opto por 'y por debajo de ella' para mantener la relación coordinada sin forzar demasiado la adversativa; el contraste lo aporta el contenido y la segunda mitad del verso.
- source_word: נֶהְפַּךְ
  english_pob_choice: is turned up
  chosen_spanish: se revuelve
  alternatives_spanish:
  - se revuelve
  - se vuelve
  - se voltea
  - se trastorna
  lexicon: HALOT
  rationale: El nifal de הפך comunica ser volteado o removido. 'Se revuelve' comunica bien en español la imagen de tierra removida en la minería, sin perder la idea de inversión/alteración del terreno.
- source_word: כְּמוֹ אֵשׁ
  english_pob_choice: as by fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como fuego
  - como por fuego
  - igual que el fuego
  lexicon: HALOT
  rationale: 'Sigo la ambigüedad documentada en el POB inglés: la comparación puede ser de modo (''como por fuego'') o de semejanza simple (''como fuego''). En el verso español, ''como fuego'' preserva la literalidad y deja abierta la tensión interpretativa.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el juicio de alta concordancia y la indicación de que no había revisiones aplicadas. La redacción mantiene la estructura y las decisiones léxicas principales del paquete auditado, incorporando en español la ambigüedad final ya señalada por el POB inglés.
  spanish_consistency_notes:
  - Se usa 'tierra' para אֶרֶץ, coherente con el contraste entre superficie fértil e interior minado.
  - Se conserva 'pan' para לָחֶם por su concreción léxica.
  - Se evita 'SEÑOR' o terminología teológica no pertinente, porque el verso no contiene el Tetragrámaton ni lenguaje de pacto.
  - La comparación final queda deliberadamente abierta entre 'como fuego' y 'como por fuego', siguiendo la nota del POB inglés.
