translation:
  language: es
  text: Él también le entregó una copia del decreto escrito[a] que había sido promulgado en Susa para su destrucción, para mostrárselo a Ester y decirle, y para mandarle que se presentara ante el rey, para implorar su favor y pedir delante de él[b] en favor de su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una copia del edicto». פַּתְשֶׁגֶן designa el texto o copia de un documento oficial persa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de él» o «desde delante de él». Es una fórmula cortesana para presentar una petición en la presencia del rey.
    reason: cultural_note
lexical_decisions:
- source_word: פַּתְשֶׁגֶן כְּתָב
  english_pob_choice: a copy of the written decree
  chosen_spanish: una copia del escrito del decreto
  alternatives_spanish:
  - el texto del documento
  - una copia del edicto
  lexicon: HALOT
  rationale: פַּתְשֶׁגֶן es un préstamo persa que remite a una copia o documento oficial; unido a כְּתָב, el sentido completo es el de un escrito/decreto en copia. «Copia del escrito del decreto» conserva el matiz documental y oficial sin volverse opaco en español.
- source_word: הַדָּת
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - ley
  - edicto
  lexicon: HALOT
  rationale: En Ester, דָּת se refiere al ordenamiento u orden oficial del ámbito persa. «Decreto» comunica bien la naturaleza promulgada de la orden y evita el sentido demasiado general de «ley».
- source_word: נִתַּן
  english_pob_choice: had been issued
  chosen_spanish: había sido promulgado
  alternatives_spanish:
  - había sido dado
  - había sido publicado
  lexicon: HALOT
  rationale: Aunque literalmente es «fue dado», en un contexto administrativo el pasivo funciona como promulgación de un decreto. «Había sido promulgado» expresa esa función oficial con naturalidad en español.
- source_word: בְּשׁוּשָׁן
  english_pob_choice: in Susa
  chosen_spanish: en Susa
  alternatives_spanish:
  - en la ciudad de Susa
  lexicon: HALOT
  rationale: La preposición locativa es directa y la forma habitual en español es mantener el topónimo sin añadir más.
- source_word: לְהַשְׁמִידָם
  english_pob_choice: for their destruction
  chosen_spanish: para su destrucción
  alternatives_spanish:
  - para destruirlos
  - para su aniquilación
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa la finalidad mortal del decreto. «Para su destrucción» conserva la intención letal con concisión y sin intensificar más allá del hebreo.
- source_word: נָתַן לוֹ
  english_pob_choice: He also gave him
  chosen_spanish: Él también le entregó
  alternatives_spanish:
  - Y le dio
  - Él le dio
  lexicon: HALOT
  rationale: «Entregó» es más natural que «dio» para un documento oficial, y mantiene el resumido enlace narrativo del hebreo y del inglés POB.
- source_word: לְהַרְאוֹת אֶת אֶסְתֵּר
  english_pob_choice: to show Esther
  chosen_spanish: para mostrárselo a Ester
  alternatives_spanish:
  - para mostrarlo a Ester
  - para enseñárselo a Ester
  lexicon: HALOT
  rationale: El objeto implícito es la copia del decreto. En español conviene explicitar «lo» para no perder la referencia del documento; «mostrar» conserva el sentido directo del verbo.
- source_word: וּלְהַגִּיד לָהּ
  english_pob_choice: and tell her
  chosen_spanish: y decírselo
  alternatives_spanish:
  - e informarle
  - y explicárselo
  lexicon: HALOT
  rationale: El verbo הִגִּיד es simplemente «decir, informar, declarar». «Decírselo» se ajusta al flujo natural del español y retiene la referencia al documento.
- source_word: וּלְצַוּוֹת עָלֶיהָ
  english_pob_choice: and to command her
  chosen_spanish: y para mandarle
  alternatives_spanish:
  - y para ordenarle
  - y para encargarle
  lexicon: HALOT
  rationale: צוה pide un verbo fuerte. «Mandarle» expresa bien la carga imperativa sobre Ester, sin introducir un matiz más técnico que el español común no necesita aquí.
- source_word: לָבוֹא אֶל הַמֶּלֶךְ
  english_pob_choice: to go in to the king
  chosen_spanish: que fuera al rey
  alternatives_spanish:
  - que entrara ante el rey
  - que se presentara ante el rey
  lexicon: HALOT
  rationale: Aunque el hebreo usa lenguaje de acceso cortesano, en español «ir al rey» comunica el desplazamiento hacia su presencia; la idea de audiencia se refuerza por el contexto inmediato.
- source_word: לְהִתְחַנֶּן לוֹ
  english_pob_choice: to implore his favor
  chosen_spanish: a implorar su favor
  alternatives_spanish:
  - a rogarle
  - a suplicarle
  lexicon: HALOT
  rationale: El hitpael de חנן expresa súplica intensa. «Implorar su favor» sigue de cerca el sentido del inglés auditado y preserva el componente de favor real implorado.
- source_word: וּלְבַקֵּשׁ מִלְּפָנָיו
  english_pob_choice: and seek before him
  chosen_spanish: y pedir ante él
  alternatives_spanish:
  - y buscar ante él
  - y solicitar ante él
  lexicon: HALOT
  rationale: La expresión es una fórmula cortesana de petición en la presencia del rey. «Pedir ante él» mantiene la referencia espacial y protocolaria sin sobrecargar el español.
- source_word: עַל עַמָּהּ
  english_pob_choice: on behalf of her people
  chosen_spanish: por su pueblo
  alternatives_spanish:
  - en favor de su pueblo
  - a favor de su pueblo
  lexicon: HALOT
  rationale: עַל puede expresar representación o defensa. «Por su pueblo» es conciso y natural; el contexto de intercesión ante el rey explicita el sentido de representación.
theological_decisions:
- issue: Lenguaje de intercesión ante el rey
  english_pob_reading: to implore his favor and seek before him on behalf of her people
  chosen_spanish_reading: a implorar su favor y pedir ante él por su pueblo
  alternative_spanish_readings:
  - a suplicarle y pedir ante él por su pueblo
  - a implorarle y buscar ante él por su pueblo
  rationale: 'No hay una doctrina específica en juego, pero sí una tensión de registro entre la súplica y la fórmula cortesana. La redacción española conserva ambos elementos: petición intensa y acceso protocolario ante el monarca.'
  doctrine_reference: N/A
- issue: Representación del pueblo de Ester
  english_pob_reading: on behalf of her people
  chosen_spanish_reading: por su pueblo
  alternative_spanish_readings:
  - en favor de su pueblo
  - por causa de su pueblo
  rationale: La preposición hebrea permite el matiz de representación/intercesión. «Por su pueblo» expresa con sencillez que Ester debe actuar como abogada o mediadora de su pueblo frente al rey.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés: mantiene «decreto» para דָּת, refleja el valor oficial de נִתַּן como promulgación, usa un verbo fuerte para צוה («mandarle»), y conserva el matiz cortesano de חנן/בקש mediante «implorar su favor» y «pedir ante él». También explicita el objeto implícito del documento con pronombres enclíticos para mayor claridad en español.'
  spanish_consistency_notes:
  - Se usa «Ester» para el nombre propio y «Susa» para el topónimo, conforme a la forma habitual en español bíblico.
  - Se prefiere «decreto» frente a «ley» o «edicto» por la función contextual en el relato persa.
  - Se mantiene «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el Tetragrámaton.
  - «Por su pueblo» conserva la relación de representación/intercesión sin añadir conceptos doctrinales ajenos al texto.
