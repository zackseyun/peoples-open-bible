  rationale: Se corrigieron los imperativos al plural para reflejar fielmente el hebreo y para mantener concordancia con 'ustedes'. Se eliminó la nota [a] porque estaba mal anclada y no debía ir sobre 'se fueron'. Se reemplazó 'subieron del pozo' por 'salieron del pozo' para una lectura española más natural, y 'lo dieron a conocer' por 'se lo dijeron' para claridad idiomática. Se ajustó 'las aguas' a 'el agua' conforme a la decisión auditada y a la nota contextual sobre el Jordán.
