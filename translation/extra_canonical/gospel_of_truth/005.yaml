lexical_decisions:
- source_word: ⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ
  chosen: ignorance
  alternatives:
  - non-knowledge
  lexicon: Crum; Layton
  rationale: Standard Coptic term for ignorance as the negation of knowing; keeps
    the Valentinian contrast with knowledge (gnosis).
- source_word: ⲧⲙⲛⲧⲟⲩⲉⲉⲓⲛ / ⲙⲛⲧⲟⲩⲉⲉⲓ
  chosen: Unity
  alternatives:
  - oneness
  lexicon: Crum; Lambdin
  rationale: Technical Valentinian concept of Oneness/Unity; capitalized to preserve
    conceptual weight and to distinguish from generic numerical ‘one’.
- source_word: ⲥⲭⲏⲙⲁ
  chosen: appearance
  alternatives:
  - form
  - figure
  lexicon: Greek loan; LSJ; Crum s.v. ⲥⲭⲏⲙⲁ
  rationale: Here denotes the outward ‘schema’ of the deficiency; ‘appearance’ best
    fits the contrast with its dissolution.
- source_word: ⲕⲟⲥⲙⲟⲥ
  chosen: world
  alternatives:
  - cosmos
  lexicon: Greek loan; LSJ
  rationale: Common rendering; ‘world’ fits the ethical-ontological sense of the present
    order as the ‘appearance.’
- source_word: ⲧϩⲩⲗⲏ (ὕλη)
  chosen: matter
  alternatives:
  - materiality
  - stuff
  lexicon: Greek loan; LSJ; Crum
  rationale: Hylē is a technical term in Valentinian discourse; ‘matter’ is the established
    philosophical gloss.
- source_word: ⲁⲓⲱⲛ
  chosen: Aeon(s)
  alternatives:
  - age(s)
  lexicon: Greek loan; LSJ; NH Coptic usage
  rationale: Retained as a technical cosmological term in Valentinian theology rather
    than neutral ‘age.’
- source_word: ⲥⲁⲩⲛⲉ
  chosen: Knowledge
  alternatives:
  - gnosis
  - understanding
  lexicon: Crum; Layton
  rationale: Translates the gnosis concept; capitalized when functioning as the salvific,
    technical ‘Knowledge.’
- source_word: ⲕⲉⲕⲉ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: Crum
  rationale: Established gloss; part of a triad with light and life.
- source_word: ⲟⲉⲓⲛ
  chosen: light
  alternatives:
  - radiance
  lexicon: Crum
  rationale: Standard rendering; contrasts with ‘darkness’ in dissolution imagery.
- source_word: ⲙⲟⲩ
  chosen: death
  alternatives:
  - mortality
  lexicon: Crum
  rationale: Default gloss; paired with ‘life.’
- source_word: ⲱⲛϩ
  chosen: life
  alternatives:
  - living
  lexicon: Crum
  rationale: Default gloss; paired with ‘death.’
- source_word: ⲡⲏⲡ / ⲡⲉⲑⲏⲡ
  chosen: bosom
  alternatives:
  - breast
  - lap
  lexicon: Crum
  rationale: Traditional rendering in the fixed phrase ‘the Father revealed his bosom’;
    preserves Johannine resonance and Valentinian identification with the Spirit.
- source_word: ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ
  chosen: the Holy Spirit
  alternatives:
  - the holy spirit
  lexicon: Crum
  rationale: Definite, titular phrase; capitalized per doctrinal title conventions.
- source_word: ⲭⲱⲗⲡ
  chosen: fruit
  alternatives:
  - produce
  lexicon: Crum
  rationale: Common gloss; context specifies ‘fruit of his heart.’
- source_word: ⲧⲁⲡ
  chosen: heart
  alternatives:
  - inner self
  lexicon: Crum
  rationale: Concrete anthropological term; ‘heart’ fits the idiom ‘fruit of his heart.’
- source_word: ⲅⲁⲗⲟⲥ
  chosen: Sweetness
  alternatives:
  - milk
  - gentleness
  lexicon: Greek loan; cf. gal- semantic field; Crum notes; NH tradition
  rationale: Valentinian usage typically titles Jesus as ‘the Sweetness’; preserves
    affective nuance and traditional reception.
technical_vocabulary_note: 'This passage retains several technical terms central to
  Valentinian theology: ‘Aeon’ (ⲁⲓⲱⲛ) is left as Aeon rather than generalized to ‘age’;
  ‘Unity’ (ⲙⲛⲧⲟⲩⲉⲉⲓ) is capitalized as the ontological Oneness into which multiplicity
  returns; ‘Knowledge’ (ⲥⲁⲩⲛⲉ) renders gnosis as the salvific knowledge by which ignorance
  dissolves; ‘matter’ (ⲧϩⲩⲗⲏ, hylē) is the philosophical term for the material substrate;
  and ‘appearance’ (ⲥⲭⲏⲙⲁ, schema) names the outward figure of the deficiency identified
  with the ‘world.’ The identification of the Father’s ‘bosom’ with ‘the Holy Spirit’
  is preserved as a direct theological assertion in the text; ‘Sweetness’ is kept
  as a title for Jesus (ⲅⲁⲗⲟⲥ) to reflect the affective and mystical register of the
  source.'
textual_note: The draft follows NHC I, Codex I, pp. 24–25 OCR lines. The sequence
  ‘the Father made his bosom known; his bosom is the Holy Spirit; he manifested the
  hidden of himself—his Son’ corresponds directly to the Greek/Coptic phrasing with
  ‘bosom’ (ⲡⲏⲡ/ⲡⲉⲑⲏⲡ) and ‘Holy Spirit’ (ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ). The thematic chain ‘envy/strife
  → deficiency; unity → completion’ is taken from the lines with ⲕⲱϩ (‘envy’), ⲙⲙⲉⲩ
  (‘strife’), ⲟⲩϣⲧⲁ (‘deficiency’; in the context of ⲧⲙⲛⲧⲟⲩⲉⲉⲓ/Unity), and ⲁϫⲱⲕ (‘completion’).
  Where the lineation is terse or elliptical (e.g., the triad ‘matter … darkness …
  death’ overturned by ‘fire … light … life’), parallelism and internal rhyme in the
  Coptic guide the English syntactic balance without smoothing away the contemplative
  texture. The opening fragmentary lineation naming ‘Jesus … the Sweetness … the fruit
  of his heart’ (ⲓⲏⲥ … ⲅⲁⲗⲟⲥ … ⲉϥϭⲱⲗⲡ ⲙⲡⲉϥⲧⲁⲡ) is reflected summarily to preserve
  the title and the metaphor that frame the section.
