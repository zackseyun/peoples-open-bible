translation:
  language: es
  text: Tú serás sobre mi casa[a], y todo mi pueblo obedecerá tu mandato. Solo en cuanto al trono seré mayor que tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y a tu boca besará todo mi pueblo». La expresión suele entenderse aquí como obedecer o rendir homenaje al mandato de José.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל בֵּיתִי
  english_pob_choice: over my house
  chosen_spanish: sobre mi casa
  alternatives_spanish:
  - al frente de mi casa
  - encargado de mi casa
  - sobre mi palacio
  lexicon: HALOT
  rationale: The Hebrew עַל with בֵּיתִי marks authority or oversight. «Sobre mi casa» preserves that spatial/relational force in Spanish while remaining natural and broad enough to include the administrative domain of Pharaoh.
- source_word: פִּיךָ
  english_pob_choice: your command
  chosen_spanish: tu mandato
  alternatives_spanish:
  - tu boca
  - tu palabra
  - tu orden
  lexicon: HALOT
  rationale: The Hebrew is literally «tu boca», but in this construction it refers idiomatically to Joseph's authoritative speech. «Tu mandato» conveys the administrative force clearly in Spanish without losing the underlying command-by-speech sense.
- source_word: יִשַּׁק
  english_pob_choice: shall obey
  chosen_spanish: obedecerá
  alternatives_spanish:
  - besará
  - rendirán homenaje
  - se someterá
  lexicon: HALOT
  rationale: The Hebrew verb normally means «besar», but in this idiom many understand obedience or homage. The main text follows the practical sense emphasized in the English POB, while the literal possibility is retained in a footnote.
- source_word: כָּל עַמִּי
  english_pob_choice: all my people
  chosen_spanish: todo mi pueblo
  alternatives_spanish:
  - todo mi gente
  - todo mi nación
  - todos mis pueblos
  lexicon: HALOT
  rationale: עַם is the collective «people». «Todo mi pueblo» is natural Spanish and preserves the collective sense of Pharaoh's subjects.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto que
  - Únicamente
  lexicon: HALOT
  rationale: רַק marks limitation or exception. «Solo» is concise and idiomatic in Spanish.
- source_word: הַכִּסֵּא
  english_pob_choice: the throne
  chosen_spanish: el trono
  alternatives_spanish:
  - el trono real
  - el trono del rey
  lexicon: HALOT
  rationale: כִּסֵּא is literally «throne». The Spanish keeps the same noun without extra expansion, since the context already identifies Pharaoh's royal office.
- source_word: אֶגְדַּל מִמֶּךָּ
  english_pob_choice: will I be greater than you
  chosen_spanish: seré mayor que tú
  alternatives_spanish:
  - seré más grande que tú
  - estaré por encima de ti
  - tendré más autoridad que tú
  lexicon: HALOT
  rationale: גדל with מן expresses superiority. «Seré mayor que tú» keeps the comparative force in natural Spanish and fits the throne limitation stated immediately before it.
translation_notes:
  revision_awareness: High-agreement source packet consulted; no revisions were applied in the English audit trail, and the Spanish draft follows the stable reading reflected there.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «trono» para כִּסֵּא sin añadir adjetivos interpretativos.
  - La nota conserva la tensión lexical entre el hebreo literal «besar» y el sentido contextual de obedecer/rendir homenaje.
  - El comparativo final («seré mayor que tú») refleja la superioridad posicional, no moral, que el contexto atribuye al faraón.
