revisions:
- from: Después de él estaba Samá hijo de Agee el hararita. Los filisteos se reunieron[a] en Lehi, donde había allí una parcela[b] del campo llena de lentejas, y el pueblo huyó de delante de los filisteos.
  to: Después de él estaba Samá hijo de Agee el hararita. Los filisteos se reunieron en Lehi[a], donde había una parcela del campo llena de lentejas, y el pueblo huyó de delante de los filisteos.
  rationale: Se elimina la redundancia «allí» para lograr un español natural sin perder el sentido locativo. Se reescribe la nota principal para que explique directamente la dificultad del hebreo y las alternativas, sin referencias al proceso de revisión en inglés. Se suprime la nota sobre «parcela» por no ser necesaria.
