translation:
  language: es
  text: Quemará la vestidura, o la urdimbre o la trama[a] en lana o en lino, o cualquier artículo de cuero en el que esté la mancha, porque es una enfermedad destructora de la piel[b]; será quemado en el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "el tejido transversal". El hebreo usa dos términos técnicos de tejido: "urdimbre" y "trama".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo צָרַעַת (tradicionalmente "lepra"): una categoría más amplia de impureza/afección que la lepra moderna, aplicada también a prendas y casas.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂרַף
  english_pob_choice: He shall burn
  chosen_spanish: Quemará
  alternatives_spanish:
  - Y quemará
  - Entonces quemará
  lexicon: HALOT
  rationale: En español jurídico-procedimental, el futuro simple transmite bien la fuerza prescriptiva del hebreo en esta secuencia legal. Se evita una traducción demasiado calcada que suene menos natural.
- source_word: הַבֶּגֶד
  english_pob_choice: the garment
  chosen_spanish: la vestidura
  alternatives_spanish:
  - la prenda
  - el vestido
  - la ropa
  lexicon: HALOT
  rationale: El hebreo es un término amplio para una prenda o pieza de ropa. 'Vestidura' conserva amplitud y un registro digno; 'prenda' sería posible, pero algo más moderno y menos solemne.
- source_word: הַשְּׁתִי
  english_pob_choice: the warp
  chosen_spanish: la urdimbre
  alternatives_spanish:
  - el urdido
  - los hilos de urdimbre
  lexicon: HALOT
  rationale: El término es técnico de tejido. 'Urdimbre' es el equivalente español estándar y mantiene el par técnico con 'trama'.
- source_word: הָעֵרֶב
  english_pob_choice: the woof
  chosen_spanish: la trama
  alternatives_spanish:
  - la weft
  - el contrahilo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'woof' por fuerza técnica/tradicional, en español 'trama' es el término natural y exacto para el hilo transversal, preservando la pareja técnica con 'urdimbre'.
- source_word: בַּצֶּמֶר
  english_pob_choice: in wool
  chosen_spanish: en lana
  alternatives_spanish:
  - de lana
  - hecha de lana
  lexicon: HALOT
  rationale: La preposición hebrea puede marcar la esfera material del tejido. 'En lana' reproduce la construcción de manera natural en español dentro de esta lista de materiales.
- source_word: בַפִּשְׁתִּים
  english_pob_choice: in linen
  chosen_spanish: en lino
  alternatives_spanish:
  - de lino
  - hecha de lino
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'en lana' y se emplea el material textil usual en español, 'lino'.
- source_word: כָּל כְּלִי הָעוֹר
  english_pob_choice: any article of leather
  chosen_spanish: cualquier artículo de cuero
  alternatives_spanish:
  - cualquier objeto de cuero
  - cualquier utensilio de cuero
  - cualquier vasija de piel
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto, utensilio o artículo. 'Artículo de cuero' comunica amplitud sin restringir a recipientes y sigue de cerca el rango del hebreo.
- source_word: אֲשֶׁר יִהְיֶה בוֹ הַנָּגַע
  english_pob_choice: in which the infection is
  chosen_spanish: en el que esté la plaga
  alternatives_spanish:
  - en el que esté la infección
  - en el que haya la marca
  - en el que esté el mal
  lexicon: HALOT
  rationale: '''Nega‘'' en Levítico 13 nombra la marca/aflicción ritual. ''Plaga'' mantiene la tradición léxica bíblica y conserva el peso del término sin medicalizarlo excesivamente; se usa ''esté'' para reflejar la situación presente del objeto.'
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección impura de la piel
  - tzaraat
  lexicon: HALOT
  rationale: Aquí se conserva 'lepra' porque el contexto y la tradición léxica española bíblica permiten una lectura estable, pero el adjetivo 'destructora' evita identificarla sin más con la lepra moderna. El término mantiene la tensión documental del hebreo como afección ritual más amplia.
- source_word: מַמְאֶרֶת
  english_pob_choice: destructive
  chosen_spanish: destructora
  alternatives_spanish:
  - corrosiva
  - devoradora
  - maligna
  lexicon: HALOT
  rationale: El adjetivo expresa una acción persistente y consumidora. 'Destructora' es claro y suficientemente fuerte para el contexto de objeto contaminado.
- source_word: בָּאֵשׁ תִּשָּׂרֵף
  english_pob_choice: it shall be burned in the fire
  chosen_spanish: será quemado en el fuego
  alternatives_spanish:
  - deberá ser quemado en el fuego
  - será consumido por el fuego
  lexicon: HALOT
  rationale: Se mantiene el pasivo legal y el complemento preposicional directo. 'Será quemado en el fuego' es natural en español y conserva el tono normativo.
theological_decisions:
- issue: Alcance ritual de צָרַעַת aplicado a tejidos y cuero
  english_pob_reading: skin disease
  chosen_spanish_reading: lepra destructora
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección ritual destructora
  - tzaraat
  rationale: El pasaje no describe una patología médica moderna sino una impureza ritual que afecta objetos. La traducción española conserva el término tradicional 'lepra' por legibilidad bíblica, pero lo modifica con 'destructora' para no equipararlo sin más con la lepra clínica; así se mantiene la tensión entre tradición y precisión del hebreo.
  doctrine_reference: Leviticus 13; principio POB de primacía del texto original y claridad lectora sin anacronismo médico.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios en la última pasada; aquí se sigue su solución léxica y su nota cultural para צָרַעַת, pero se ajusta al español con una pareja técnica natural ('urdimbre' / 'trama') y con un equivalente bíblico tradicional matizado ('lepra destructora') para evitar una medicalización anacrónica.
  spanish_consistency_notes:
  - Se mantiene el registro legal y cultual, no devocional-explicativo.
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Plaga'' se reserva para נגע y no se confunde con צָרַעַת, que recibe su propia caracterización en la nota.'
  - La nota a marca la alternativa técnica de tejido; la nota b preserva la tensión semántica de צָרַעַת en español.
