    rationale: El hebreo אֲשֶׁר עָשָׂה עִמָּכֶם לְהַפְלִיא expresa obrar de manera maravillosa con el pueblo. «Hacer maravillas» en español es posible, pero aquí «ha obrado maravillosamente con ustedes» preserva mejor el valor verbal-adverbial de לְהַפְלִיא y suena más idiomático.
