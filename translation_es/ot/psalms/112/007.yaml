translation:
  language: es
  text: No temerá malas noticias[a]; su corazón está firme; confía en Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un mal informe».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «su corazón está firme, confiado en Yahvé». O «su corazón es firme» o «su corazón está establecido».
    reason: lexical_and_structural_clarification
lexical_decisions:
- source_word: מִשְּׁמוּעָה רָעָה
  english_pob_choice: bad news
  chosen_spanish: malas noticias
  alternatives_spanish:
  - un mal informe
  - noticias malas
  - un informe malo
  lexicon: HALOT
  rationale: La expresión hebrea combina la idea de una noticia o informe oído con un contenido adverso. En español, «malas noticias» reproduce con naturalidad la misma clase de evento temido sin sobrecargar el texto con una formulación más técnica o menos idiomática.
- source_word: לֹא יִירָא
  english_pob_choice: will not fear
  chosen_spanish: No temerá
  alternatives_spanish:
  - No teme
  - No estará temeroso
  - No tendrá miedo
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto sapiencial expresa una disposición general o característica. «No temerá» conserva esa fuerza verbal y suena natural en español bíblico contemporáneo.
- source_word: נָכוֹן
  english_pob_choice: steadfast
  chosen_spanish: está firme
  alternatives_spanish:
  - está estable
  - está establecido
  - está firme y seguro
  lexicon: HALOT
  rationale: נָכוֹן describe un corazón asentado, fijo o establecido. «Está firme» expresa bien la estabilidad interior y evita una abstracción innecesaria; además permite dejar visible la tensión con las alternativas tradicionales de «firme» o «establecido».
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su mente
  - su ánimo
  lexicon: HALOT
  rationale: «Corazón» es el equivalente normal y fiel para לֵב en español bíblico, porque designa la persona interior, no solo el sentimiento.
- source_word: בָּטֻחַ
  english_pob_choice: trusting
  chosen_spanish: confiado
  alternatives_spanish:
  - seguro
  - fiado
  - confiando
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa un estado de confianza. «Confiado» mantiene ese valor relacional y prepara naturalmente la frase final «en Yahvé».
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvéh
  - en el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino como «Yahvé», conforme a la política del proyecto para יְהוָה, en lugar de sustituirlo por una forma de máscara litúrgica. Esto conserva la referencia explícita al nombre del pacto.
theological_decisions:
- issue: Nombre divino יְהוָה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Para la POB en español se mantiene la transliteración «Yahvé», que preserva el nombre propio del Dios del pacto y evita el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de נָכוֹן aplicado al corazón
  english_pob_reading: steadfast
  chosen_spanish_reading: está firme
  alternative_spanish_readings:
  - es firme
  - está establecido
  - está firme y establecido
  rationale: La imagen no apunta solo a emoción interna, sino a una estabilidad moral y volitiva. «Está firme» conserva esa tensión sin diluirla en una paráfrasis expansiva.
  doctrine_reference: HALOT; sabiduría poética sobre la estabilidad interior del justo
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con la lectura inglesa revisada y el control cruzado reporta acuerdo alto; no se detectan cambios textuales pendientes. La versión española conserva la misma estructura semántica: negativa de temor ante noticias adversas, seguido de la estabilidad del corazón y su confianza en Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para el Tetragrámaton.
  - Se usa «corazón» como antropología bíblica estándar para לֵב, sin sustituirlo por términos psicológicos modernos.
  - «Confiado en Yahvé» conserva la relación directa de confianza con la preposición hebrea ב־.
  - La nota a pie de página del primer hemistiquio preserva la alternativa léxica documentada por la POB inglesa.
