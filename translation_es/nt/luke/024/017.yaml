translation:
  language: es
  text: 'Y les dijo: «¿Qué palabras[a] son estas que intercambian unos con otros mientras caminan?». Y se detuvieron[b], con semblante triste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué asuntos están discutiendo unos con otros mientras caminan?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se quedaron quietos, con semblante triste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - les dijo
  - dijo
  lexicon: BDAG
  rationale: λέγω se expresa naturalmente en español con «decir». Dado que el griego usa un verbo de decir, no uno específico de preguntar, «le dijo» conserva el valor verbal sin convertirlo en «preguntó».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como conexión narrativa suave. «Y» mantiene el avance del relato sin añadir contraste fuerte.
- source_word: Τίνες οἱ λόγοι οὗτοι
  english_pob_choice: What are these words
  chosen_spanish: ¿Cuáles son estas palabras[a]
  alternatives_spanish:
  - ¿Cuáles son estas cosas?
  - ¿De qué tratan estas palabras?
  lexicon: BDAG
  rationale: λόγοι puede ser «palabras», «asuntos» o «conversación». Se eligió «palabras» por transparencia léxica cercana al griego; el español admite esa literalidad sin perder inteligibilidad. La nota alternativa explica que también puede entenderse como «asuntos» o «conversación».
- source_word: ἀντιβάλλετε
  english_pob_choice: you are exchanging
  chosen_spanish: están intercambiando
  alternatives_spanish:
  - están conversando
  - están discutiendo
  - están hablando
  lexicon: BDAG
  rationale: ἀντιβάλλω aquí denota intercambio verbal recíproco. «Intercambiando» conserva la reciprocidad y evita aplanar el matiz con un simple «hablar».
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: con unos y otros
  alternatives_spanish:
  - entre sí
  - unos con otros
  lexicon: BDAG
  rationale: La frase marca reciprocidad. «Con unos y otros» es natural en español y refleja la interacción mutua; «entre sí» también sería posible.
- source_word: περιπατοῦντες
  english_pob_choice: as you walk
  chosen_spanish: mientras caminan
  alternatives_spanish:
  - al caminar
  - mientras iban caminando
  lexicon: BDAG
  rationale: El participio expresa acción simultánea. «Mientras caminan» conserva el valor temporal con una construcción clara y idiomática.
- source_word: ἐστάθησαν
  english_pob_choice: they stood still
  chosen_spanish: se detuvieron[b]
  alternatives_spanish:
  - se quedaron quietos
  - se detuvieron en seco
  - se pararon
  lexicon: BDAG
  rationale: El aoristo intransitivo de ἵστημι aquí indica que llegaron a un alto. «Se detuvieron» expresa ese cese del movimiento de modo natural; la alternativa inglesa «stood still» queda explicada en la nota.
- source_word: σκυθρωποί
  english_pob_choice: looking sad
  chosen_spanish: con semblante triste
  alternatives_spanish:
  - con rostro sombrío
  - con aspecto abatido
  - con semblante adusto
  lexicon: BDAG
  rationale: σκυθρωπός describe una apariencia visible, de rostro/semblante sombrío o triste. «Con semblante triste» preserva el rasgo facial y su tono afectivo sin volverlo demasiado literario.
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas al incorporar [a] en «palabras» y [b] en «se detuvieron», de modo que cada marcador aparezca exactamente en el texto español. El resto mantiene alta concordancia con el paquete fuente y el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Y» para δέ como conector narrativo suave.
  - Se evitó «SEÑOR» u otros equivalentes innecesarios porque no aparecen en este versículo.
  - «Con semblante triste» conserva la dimensión visible de σκυθρωποί sin añadir contenido doctrinal.
  - La puntuación y el orden reflejan una redacción publicable en español moderno y reverente.
