  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión «castigar» para פקד concuerda con la rationale auditada. La principal mejora léxica es alinear רָעָב más estrechamente con «famine» mediante «hambruna» en lugar de «hambre».
