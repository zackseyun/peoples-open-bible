    text: 'Hebreo: «de la mano de sus hermanos»; el paralelo griego dice «de las manos de los sacerdotes». El contexto indica que se trata de compañeros sacerdotes.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea es difícil. El paralelo griego orienta la escena, pero el texto hebreo conserva la idea de orden o disposición.
    reason: textual_variant
  revision_rationale: Se revisa la frase difícil para evitar un calco poco idiomático ('estuvo en su orden') y expresar mejor en español la noción de disposición/orden sin añadir 'altar' al texto principal. También se mejora la fluidez de la cláusula de 'corona de hijos' con una sintaxis más natural y fiel.
