translation:
  language: es
  text: Para los hijos de Aarón harás túnicas, les harás fajines y les harás gorros[a] para gloria y para hermosura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tocas» o «coberturas para la cabeza» para el tocado sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי אַהֲרֹן
  english_pob_choice: for Aaron’s sons
  chosen_spanish: para los hijos de Aarón
  alternatives_spanish:
  - para los hijos de Aarón
  - para los descendientes de Aarón
  lexicon: HALOT
  rationale: La relación filial directa es la lectura más inmediata del hebreo. «Hijos de Aarón» mantiene la referencia sin ampliar innecesariamente a «descendientes», que sería más interpretativo.
- source_word: תַּעֲשֶׂה / וְעָשִׂיתָ
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - harás de
  lexicon: HALOT
  rationale: En contexto legal-instructivo, el imperfecto funciona como mandato. «Harás» conserva el tono formal y directo del texto sin sonar artificioso en español.
- source_word: כֻתֳּנֹת
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - vestiduras
  - vestidos
  - ropas
  lexicon: HALOT
  rationale: «Túnicas» es el equivalente español más preciso y natural para una prenda básica de cuerpo. Evita tanto el anglicismo semántico como la vaguedad de «vestiduras».
- source_word: אַבְנֵטִים
  english_pob_choice: sashes
  chosen_spanish: fajines
  alternatives_spanish:
  - cinturones
  - ceñidores
  - fajas
  lexicon: HALOT
  rationale: El término designa una banda ceñida a la cintura, de uso sacerdotal. «Fajines» comunica mejor ese sentido ceremonial que «cinturones», y evita reducirlo a un accesorio rígido.
- source_word: מִגְבָּעוֹת
  english_pob_choice: caps
  chosen_spanish: gorros
  alternatives_spanish:
  - capas
  - tocas
  - cubrecabezas
  lexicon: HALOT
  rationale: El audit trail inglés revisó varias opciones y finalmente prefirió un término de prenda concreta para el tocado sacerdotal. «Gorros» es una opción amplia y comprensible en español; no especifica de más la forma, pero sí conserva la idea de cobertura de la cabeza.
- source_word: לְכָבוֹד
  english_pob_choice: for glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - para honor
  - para esplendor
  lexicon: HALOT
  rationale: «Gloria» preserva el registro elevado del hebreo y la simetría con el siguiente miembro de la frase. «Honor» sería posible, pero desplaza el matiz hacia reputación o dignidad social.
- source_word: וּלְתִפְאָרֶת
  english_pob_choice: and for beauty
  chosen_spanish: y para hermosura
  alternatives_spanish:
  - y para belleza
  - y para esplendor
  lexicon: HALOT
  rationale: «Hermosura» conserva el tono bíblico y solemne de תִפְאָרֶת, con un matiz estético más natural en español litúrgico que «belleza» en esta combinación. «Esplendor» también sería válido, pero menos directo.
theological_decisions:
- issue: Propósito de las vestiduras sacerdotales
  english_pob_reading: for glory and for beauty
  chosen_spanish_reading: para gloria y para hermosura
  alternative_spanish_readings:
  - para honor y para esplendor
  - para gloria y para belleza
  rationale: El hebreo presenta una finalidad estética y de dignidad para la vestimenta sacerdotal. La traducción mantiene ese par sin añadir simbolismo posterior que el verso no explicita.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El testigo inglés revisado pasó de «headbands» a «caps» para מִגְבָּעוֹת, priorizando un término más concreto para el tocado sacerdotal. La versión española refleja esa decisión con «gorros», manteniendo una solución natural y no demasiado específica.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no porque aparezca aquí, sino para coherencia general del proyecto cuando corresponda; en este versículo no hay sustitución nominal divina.
  - Se eligieron términos de vestimenta sobrios y no arcaizantes, pero compatibles con registro bíblico y culto público.
  - «Hermosura» se usa para sostener la pareja estilística con «gloria» y evitar una dicción excesivamente moderna que debilitara el tono solemne.
