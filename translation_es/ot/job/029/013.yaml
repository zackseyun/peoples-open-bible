translation:
  language: es
  text: La bendición del que perecía vino sobre mí[a], y yo hice que el corazón de la viuda se alegrara[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bendición del que estaba pereciendo vino sobre mí». El participio hebreo אֹבֵד puede referirse a alguien que perece, se arruina o está cerca de morir.
    reason: lexical_alternative
  - marker: b
    text: O «hice que el corazón de la viuda cantara de gozo» o «que gritara de gozo».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  english_pob_choice: the blessing of
  chosen_spanish: la bendición de
  alternatives_spanish:
  - la bendición desde
  - la bendición del
  lexicon: HALOT
  rationale: El constructo hebreo expresa relación genitiva; en español, «la bendición de» conserva esa relación de manera natural y transparente.
- source_word: אֹבֵד
  english_pob_choice: the perishing man
  chosen_spanish: el que perecía
  alternatives_spanish:
  - el que estaba pereciendo
  - el hombre que perecía
  - el que estaba por morir
  lexicon: HALOT
  rationale: El participio qal admite la idea de alguien que perece, se arruina o está en peligro de muerte. «El que perecía» mantiene el valor participial sin cerrar indebidamente el matiz hacia una sola causa.
- source_word: עָלַי
  english_pob_choice: upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - sobre mí
  lexicon: HALOT
  rationale: La preposición con sufijo expresa llegada/carga «sobre» la persona; en español «sobre mí» conserva la imagen y suena natural.
- source_word: תָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - venía
  - vendría
  - llegó
  lexicon: HALOT
  rationale: Aunque formalmente es imperfecto, en este contexto retrospectivo poético funciona con valor pasado. «Vino» comunica ese valor sin forzar un futuro o habitual en español.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - interior
  - mente
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «corazón» preserva el centro interior afectivo y volitivo que el hebreo לֵב suele designar.
- source_word: אַלְמָנָה
  english_pob_choice: widow’s
  chosen_spanish: de la viuda
  alternatives_spanish:
  - de la viuda
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como «de la viuda»; evita el anglicismo posesivo y conserva el sentido relacional.
- source_word: אַרְנִֽן
  english_pob_choice: I made ... sing for joy
  chosen_spanish: hice que ... cantara de gozo
  alternatives_spanish:
  - hice que ... se alegrara
  - hice que ... gritara de gozo
  - la hice cantar de gozo
  lexicon: HALOT
  rationale: La forma hifil es causativa; «hice que ... cantara de gozo» preserva esa causatividad y el matiz jubiloso del verbo, sin perder claridad en español.
theological_decisions:
- issue: 'Sentido del participio אֹבֵד: ¿muerte, ruina o aflicción?'
  english_pob_reading: The perishing man; the Hebrew participle can denote someone perishing, ruined, or near death.
  chosen_spanish_reading: el que perecía
  alternative_spanish_readings:
  - el que se arruinaba
  - el que estaba por morir
  - el que se perdía
  rationale: Se mantiene la tensión semántica del participio sin decidir de antemano entre ruina material y peligro mortal. «Perecía» deja abierto el alcance del sufrimiento implícito en el contexto.
  doctrine_reference: Hebreos 13:3; Job 29:12-17 (contexto de compasión y justicia social)
- issue: 'Verbo causativo final: expresión de la ayuda a la viuda'
  english_pob_reading: I caused the widow’s heart to rejoice / shout for joy.
  chosen_spanish_reading: hice que el corazón de la viuda cantara de gozo
  alternative_spanish_readings:
  - hice que el corazón de la viuda se alegrara
  - hice que el corazón de la viuda gritara de gozo
  rationale: La traducción conserva la acción activa de Job sobre la alegría de la viuda; no suaviza el causativo a mera coincidencia emocional. «Cantara de gozo» expresa bien el movimiento jubiloso del hifil.
  doctrine_reference: Deuteronomio 15:7-11; Proverbios 19:17
translation_notes:
  revision_awareness: Revisado contra el audit trail inglés y el hebreo base; se conservó el paralelismo, la fuerza causativa del hifil y la ambigüedad léxica de אֹבֵד sin reducirla a una sola interpretación. No hubo revisiones aplicadas en el pass más reciente del inglés.
  spanish_consistency_notes:
  - Se usó «corazón» para לֵב por consistencia con el español bíblico natural y por su capacidad de abarcar el centro interior de la persona.
  - Se prefirió «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton ni un sustituto griego relevante.
  - «Perecía» mantiene la neutralidad semántica entre ruina y muerte, acorde con el valor participial documentado.
  - La puntuación y la colocación de los corchetes siguen el estilo del proyecto POB para notas textuales/lexicales.
