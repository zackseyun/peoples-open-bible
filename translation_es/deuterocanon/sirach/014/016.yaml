translation:
  language: es
  text: Da a un hermano[a], y sé generoso, y date gustos, porque en Sheol[b] no se puede buscar placer. Y todo lo que es bueno hacer, hazlo delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «da y toma, y engaña tu alma»; es una frase difícil que probablemente apunta a un goce autoindulgente. El testimonio hebreo es más claro: «consiéntete» o «date gustos».'
    reason: alternative_reading
  - marker: b
    text: «Sheol» es el ámbito de los muertos; alternativamente, «el sepulcro» o «el inframundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּן לְאָח
  english_pob_choice: Give to a brother
  chosen_spanish: Da a un hermano
  alternatives_spanish:
  - Da a un pariente
  - Da a otro
  lexicon: HALOT
  rationale: Conservo el sustantivo concreto «hermano» porque el hebreo lo usa literalmente y el POB inglés también preserva esa imagen social/familiar. En español bíblico suena natural y mantiene la fuerza comunitaria sin diluirla en un término más general.
- source_word: וְחֹנֵן
  english_pob_choice: be gracious
  chosen_spanish: sé clemente
  alternatives_spanish:
  - sé gracioso
  - sé generoso
  - muéstrate favorable
  lexicon: HALOT
  rationale: חנן expresa mostrar gracia/favor. En español, «sé clemente» comunica bien la disposición benevolente y ética sin reducirla solo a lo económico. «Sé generoso» sería posible, pero estrecha el matiz de gracia/favor.
- source_word: וּפַנֵּק נַפְשֶׁךָ
  english_pob_choice: indulge yourself
  chosen_spanish: indúlgate
  alternatives_spanish:
  - consiéntete
  - déjate llevar
  - pamper yourself
  lexicon: HALOT
  rationale: El hebreo פנק sugiere tratarse con delicadeza o lujo, con una carga de auto-complacencia. «Indúlgate» preserva ese matiz y encaja con la lectura de la POB inglesa «indulge yourself». «Consiéntete» suena más suave y puede perder la nota de autoindulgencia.
- source_word: כִּי אֵין בִּשְׁאוֹל
  english_pob_choice: for in Sheol there is no
  chosen_spanish: porque en Sheol no se puede
  alternatives_spanish:
  - porque en el sepulcro no se puede
  - porque en el sepulcro no hay
  lexicon: HALOT
  rationale: Mantengo «Sheol» sin sustituirlo por «sepulcro» o «sepulcro/tumba», para conservar el término hebreo que designa el ámbito de los muertos. La construcción impersonal «no se puede» ayuda a expresar la idea verbal de la fuente sin forzarla a una sola formulación nominal.
- source_word: לְבַקֵּשׁ תַּעֲנוּג
  english_pob_choice: seeking pleasure
  chosen_spanish: buscar placer
  alternatives_spanish:
  - buscar deleite
  - buscar gozo
  - buscar lujo
  lexicon: HALOT
  rationale: La combinación verbal-natural en español es «buscar placer». Conserva el campo semántico de תַּעֲנוּג y responde bien al griego ζητῆσαι τρυφήν, que apunta a placer/luxuria. «Deleite» sería viable, pero menos directo en este contexto.
- source_word: וְכָל דָּבָר שֶׁיָּפֶה לַעֲשׂוֹת
  english_pob_choice: whatever is good to do
  chosen_spanish: Y todo lo que es bueno hacer
  alternatives_spanish:
  - Y todo lo que conviene hacer
  - Y todo lo que es apropiado hacer
  - Y todo lo que está bien hacer
  lexicon: HALOT
  rationale: «יפה» aquí funciona como «bueno/apropiado/adecuado», no como belleza estética. «Todo lo que es bueno hacer» es una solución idiomática y sobria que preserva el criterio moral general sin sobreinterpretarlo.
- source_word: לִפְנֵי אֱלֹהִים עֲשֶׂה
  english_pob_choice: do it before God
  chosen_spanish: hazlo delante de Dios
  alternatives_spanish:
  - hazlo en presencia de Dios
  - hazlo ante Dios
  - hazlo frente a Dios
  lexicon: HALOT
  rationale: «Delante de Dios» reproduce con fidelidad la idea de actuar bajo la mirada o presencia de Dios. Es una fórmula natural en español bíblico y mantiene la carga de responsabilidad ante Él.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - la tumba
  - el lugar de los muertos
  rationale: Conservar «Sheol» preserva la concepción hebrea del ámbito de los muertos sin reducirla a mera tumba ni trasladarla a un marco doctrinal posterior sobre el infierno. Esto mantiene la tensión conceptual documentada por la POB inglesa.
  doctrine_reference: Translation philosophy §3; término contestado preservado.
- issue: Interpretation of the self-regarding imperative
  english_pob_reading: indulge yourself
  chosen_spanish_reading: indúlgate
  alternative_spanish_readings:
  - consiéntete
  - deléitate
  - deceive your soul
  rationale: La tradición textual hebrea apoya el sentido de autoindulgencia; el testimonio griego añade la extrañeza de «engaña tu alma». La versión española sigue el hebreo como base principal, pero el verbo elegido conserva la idea de complacerse con cierta intensidad, sin borrar la tensión textual entre ambas formas.
  doctrine_reference: Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió «indulge yourself» frente a «pamper yourself». Por eso la redacción española evita un verbo demasiado suave y adopta «indúlgate», manteniendo la autoindulgencia sugerida por el hebreo y el trasfondo griego. También se respetó la decisión de conservar «Sheol» como término técnico.
  spanish_consistency_notes:
  - Se mantiene «Sheol» sin equivalerlo a «infierno», para no resolver indebidamente el concepto.
  - Se usa «hermano» de manera literal, coherente con el patrón de conservación del término concreto en el POB.
  - «Delante de Dios» conserva la fórmula relacional y de responsabilidad moral.
  - La frase final se ajusta al paralelismo hebreo y al control griego sin forzar un calco
