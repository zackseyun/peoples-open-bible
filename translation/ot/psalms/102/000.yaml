id: PSA.102.0
reference: Psalms 102:0
source:
  edition: WLC
  text: תְּ֭פִלָּה לְ/עָנִ֣י כִֽי יַעֲטֹ֑ף וְ/לִ/פְנֵ֥י יְ֝הוָ֗ה יִשְׁפֹּ֥ךְ שִׂיחֽ/וֹ־׃
translation:
  text: A prayer of the afflicted one when he grows faint and pours out his complaint before Yahweh[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he is overwhelmed' for 'when he grows faint.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his meditation' or 'his lament' for 'his complaint.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  chosen: A prayer
  alternatives:
  - Prayer
  lexicon: HALOT
  rationale: Superscription-style nominal opening; English idiom naturally supplies the indefinite article.
- source_word: לְעָנִי
  chosen: of the afflicted man
  alternatives:
  - for the afflicted
  - of the poor man
  - of the afflicted
  lexicon: HALOT
  rationale: The lamed here is best taken as marking relation in a heading ('of/for'). עָנִי denotes one who is afflicted, oppressed, or poor. 'Afflicted man' preserves the masculine singular and the experiential sense better than the narrower economic 'poor.'
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: In this heading כִּי introduces the circumstance under which the prayer is offered; 'when' fits the temporal sense in context better than a causal 'for.'
- source_word: יַעֲטֹף
  chosen: he grows faint
  alternatives:
  - he is overwhelmed
  - he faints
  - he languishes
  lexicon: HALOT
  rationale: The verb can convey being weak, faint, or overwhelmed. 'Grows faint' is clear modern English and suits the psalm heading's description of distress without overinterpreting the emotional nuance.
- source_word: וְלִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational 'before/in the presence of.' 'Before the LORD' is concise and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יִשְׁפֹּךְ
  chosen: pours out
  alternatives:
  - empties out
  - spills out
  lexicon: HALOT
  rationale: Common idiom for pouring out one's inner distress in prayer; 'pours out' preserves the metaphor naturally in English.
- source_word: שִׂיחוֹ
  chosen: his complaint
  alternatives:
  - his meditation
  - his lament
  - his troubled speech
  lexicon: HALOT
  rationale: שִׂיחַ can denote musing, meditation, or complaint/lament depending on context. In a psalm heading describing distress and prayer, 'complaint' best captures the lament-oriented sense.
