translation:
  language: es
  text: Y sabrán que yo soy Yahvé, su Dios. Y yo les daré un corazón y oídos que oyen[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oídos oyentes». La expresión griega es literalmente «oídos oyentes» y comunica oídos hechos receptivos.
