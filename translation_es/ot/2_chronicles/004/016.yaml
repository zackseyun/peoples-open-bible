translation:
  language: es
  text: Y Huram-abi[a] hizo las ollas, las palas, los garfios y todos sus utensilios[c], para el rey Salomón, para la casa de Yahvé, de bronce bruñido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Huram-abi»; alternativamente, «Huram su padre», aunque aquí probablemente sea un nombre propio o un título del artesano.'
    reason: alternative_reading
  - marker: b
    text: O «de bronce pulido».
    reason: lexical_alternative
  - marker: c
    text: O «y todos los utensilios para ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּירוֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - las vasijas
  - las cazuelas
  lexicon: HALOT
  rationale: El término hebreo designa recipientes de uso práctico; en este contexto de utensilios del templo, 'ollas' comunica con naturalidad la idea de recipientes/cocción sin exagerar el matiz técnico.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las cucharas
  - las azadillas
  lexicon: HALOT
  rationale: Se trata de implementos para mover ceniza o brasas. 'Palas' es una equivalencia clara y funcional en español, más natural que un calco rígido.
- source_word: הַמִּזְלָגוֹת
  english_pob_choice: the forks
  chosen_spanish: los garfios
  alternatives_spanish:
  - los tenedores
  - las horquillas
  - los ganchos
  lexicon: HALOT
  rationale: En un contexto cultual, el hebreo apunta a implementos tipo gancho/horquilla. 'Garfios' conserva mejor la idea de herramienta para manipular carne o brasas que 'tenedores', que sonaría doméstico y anacrónico.
- source_word: כָּל כְּלֵיהֶם
  english_pob_choice: all their utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  lexicon: HALOT
  rationale: '''כְּלִי'' es un término amplio para objetos/recipientes/implementos. ''Utensilios'' sigue bien el valor general y encaja con la lista de instrumentos del templo.'
- source_word: חוּרָם אָבִיו
  english_pob_choice: Huram-abi
  chosen_spanish: Huram-abi
  alternatives_spanish:
  - Huram su padre
  - Huram-abi
  lexicon: HALOT
  rationale: Conservar el compuesto evita imponer la lectura 'su padre'. En español, como en el POB inglés, funciona mejor como designación propia o título del artesano.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para la casa de Yahweh
  - para el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea 'casa de Yahvé', fiel al valor literal de בית y al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se aplica el criterio del proyecto: el nombre divino se vierte ''Yahvé'' en el texto principal, preservando el Tetragrámaton sin máscara litúrgica.'
- source_word: נְחֹשֶׁת מָרֽוּק
  english_pob_choice: of polished bronze
  chosen_spanish: de bronce bruñido
  alternatives_spanish:
  - de bronce pulido
  - de bronce abrillantado
  lexicon: HALOT
  rationale: '''Bruñido'' expresa bien el acabado trabajado del metal y corresponde al valor de ''pulido/bruñido'' en este contexto artesanal.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto, se traduce con el nombre propio reverencial 'Yahvé' en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de חוּרָם אָבִיו
  english_pob_reading: Huram-abi as a proper name/title
  chosen_spanish_reading: Huram-abi como designación propia/título
  alternative_spanish_readings:
  - Huram su padre
  rationale: No se fuerza una relación de paternidad literal. En esta clase de listas artesanales, la forma funciona mejor como nombre o designación del artesano, preservando la ambigüedad documentada.
  doctrine_reference: 'DOCTRINE.md: Avoid unwarranted genealogical expansion'
translation_notes:
  revision_awareness: El texto base en inglés mantuvo 'all their utensils' frente a una revisión previa más expansiva ('the related utensils'). La versión española sigue la lectura más directa del hebreo כְּלֵיהֶם con 'todos sus utensilios', sin introducir expansión interpretativa. También conserva el compuesto 'Huram-abi' y el nombre divino 'Yahvé' según el criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - '''Utensilios'' conserva el valor genérico de כְּלִי sin volverlo demasiado técnico.'
  - '''Bruñido'' evita la ambigüedad de ''cobre'' y sigue el valor de נְחֹשֶׁת como aleación de bronce en este contexto.'
  - No se tradujo 'Huram-abi' por una frase posesiva para no imponer una relación filial no segura.
