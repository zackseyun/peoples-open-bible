id: 1PE.3.1
reference: 1 Peter 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὁμοίως γυναῖκες ὑποτασσόμεναι τοῖς ἰδίοις ἀνδράσιν, ἵνα καὶ εἴ τινες ἀπειθοῦσιν τῷ λόγῳ διὰ τῆς τῶν γυναικῶν ἀναστροφῆς ἄνευ λόγου κερδηθήσονται
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/001.yaml
  text: 'Likewise, wives, being subject to your own husbands, so that even if some are disobeying the word, they may be won without a word through the conduct of their wives,'
translation:
  language: ko
  text: '아내 된 여러분도 마찬가지로 자기 남편에게 복종하십시오. 이는 어떤 이가 말씀에 순종하지 아니할지라도, 말 없이 아내들의 행실로 말미암아 얻어지게 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁμοίως
  english_pob_choice: Likewise
  chosen_korean: 마찬가지로
  alternatives_korean:
  - 이와 같이
  - 동일하게
  lexicon: BDAG
  rationale: 2:13의 정치적 복종, 2:18의 가복의 복종에 이어, 3:1의 아내의 복종을 동일한 흐름으로 연결.
- source_word: ὑποτασσόμεναι
  english_pob_choice: being subject
  chosen_korean: 복종하십시오
  alternatives_korean:
  - 자신을 굴복시키며
  - 순복하며
  lexicon: BDAG
  rationale: 2:13의 ὑποτάγητε와 어휘 일관성. 분사형이지만 문맥상 명령적 기능을 한다.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  english_pob_choice: your own husbands
  chosen_korean: 자기 남편
  alternatives_korean:
  - 본인의 남편
  - 자기 자신의 남편
  lexicon: BDAG
  rationale: ἴδιος의 「자기 자신의」를 「자기」로 평이하게 옮긴다.
- source_word: ἀπειθοῦσιν τῷ λόγῳ
  english_pob_choice: are disobeying the word
  chosen_korean: 말씀에 순종하지 아니할지라도
  alternatives_korean:
  - 말씀에 불순종할지라도
  lexicon: BDAG
  rationale: 2:8과 어휘 일관성을 위해 「순종하지 아니하다」로 옮긴다.
- source_word: κερδηθήσονται
  english_pob_choice: may be won
  chosen_korean: 얻어지게
  alternatives_korean:
  - 얻어지도록
  - 얻을 수 있게
  lexicon: BDAG
  rationale: κερδαίνω의 「얻어 들임」(전도·구원으로 인도)을 「얻어지다」로 옮긴다. 신적 수동의 어감을 살린다.
theological_decisions:
- issue: 3:1-7 아내·남편 단락의 균형
  chosen_reading: '본문의 강도를 누그러뜨리지도 강화하지도 않고 직역에 가깝게 옮김; 「복종」(2:13ff 정치 복종과 동일 어휘) 사용'
  alternative_readings:
  - 「순복」 「존중」 등으로 완화
  - 「예속」 등으로 강화
  rationale: 본문 자체가 위계적 가내 윤리표를 그대로 진술하면서도, 그 안에서 메시아를 본받는 위계 전복(2:21-25)의 흐름을 깔고 있다. 한쪽으로 기울이지 않고 본문대로 둔다.
  doctrine_reference: 'DOCTRINE.md: 원어의 진실하고 강한 의미 보존; 미화·완화·강화 모두 회피'
