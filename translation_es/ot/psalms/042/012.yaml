revisions:
- from: ¿Por qué te abates[a], alma mía, y por qué te turbas dentro de mí? Espera en Dios, porque todavía lo alabaré[b], la salvación de mi rostro y mi Dios.
  to: ¿Por qué estás abatida, alma mía, y por qué te turbas dentro de mí? Espera en Dios, porque todavía lo alabaré, la salvación de mi semblante[a] y mi Dios.
  rationale: Se corrigieron las notas para que anclen la frase realmente comentada y se eliminó la nota errónea sobre «lo alabaré». Se ajustó «te abates» a «estás abatida» por naturalidad en español. Se cambió «rostro» por «semblante» en la expresión final para mantener la imagen hebrea con mejor claridad y dignidad en español, mientras la nota preserva la literalidad más estricta y la alternativa tradicional.
  reviewer_model: gpt-5.4
