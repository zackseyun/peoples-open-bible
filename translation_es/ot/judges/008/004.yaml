translation:
  language: es
  text: Entonces Gedeón llegó al Jordán y lo cruzó[a], él y los trescientos hombres que estaban con él, agotados, pero todavía persiguiéndolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cansados, pero todavía persiguiéndolos» o «desfallecidos, pero aún persiguiéndolos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: WLC / HALOT
  rationale: El verbo de llegada a un destino se expresa de forma natural con «llegó» en español. Mantiene el movimiento narrativo sin sobreespecificar la dirección.
- source_word: הַיַּרְדֵּנָה
  english_pob_choice: to the Jordan
  chosen_spanish: al Jordán
  alternatives_spanish:
  - al río Jordán
  - hacia el Jordán
  lexicon: WLC / HALOT
  rationale: La terminación direccional del hebreo se refleja con «al». «Jordán» conserva el nombre propio sin añadir «río» en el texto principal.
- source_word: עֹבֵר הוּא
  english_pob_choice: and crossed over, he
  chosen_spanish: y lo cruzó, él
  alternatives_spanish:
  - y cruzó, él
  - estaba cruzando, él
  lexicon: WLC / HALOT
  rationale: El participio con pronombre enfático exige conservar tanto la acción como la presencia explícita de Gedeón. «Lo cruzó» es la forma española más natural para el cruce del Jordán, y el pronombre separado conserva el énfasis del hebreo.
- source_word: וּשְׁלֹשׁ מֵאוֹת הָאִישׁ אֲשֶׁר אִתּוֹ
  english_pob_choice: and the three hundred men who were with him
  chosen_spanish: y los trescientos hombres que estaban con él
  alternatives_spanish:
  - y los trescientos hombres con él
  - junto con los trescientos hombres que estaban con él
  lexicon: WLC / HALOT
  rationale: «Hombres» reproduce איש en contexto militar. «Que estaban con él» explicita la relación personal del hebreo אִתּוֹ sin endurecer la sintaxis.
- source_word: עֲיֵפִים
  english_pob_choice: exhausted
  chosen_spanish: agotados
  alternatives_spanish:
  - cansados
  - rindidos
  lexicon: HALOT
  rationale: «Agotados» comunica bien el desgaste físico intenso de la marcha y la persecución, cercano a la fuerza del hebreo y al inglés POB.
- source_word: וְרֹדְפִים
  english_pob_choice: yet pursuing
  chosen_spanish: pero persiguiendo
  alternatives_spanish:
  - y persiguiendo
  - aunque persiguiendo
  lexicon: HALOT
  rationale: El valor concesivo se conserva con «pero», que en español transmite con claridad la tensión entre fatiga y continuidad de la acción. Se mantiene el participio para reflejar la cualidad durativa del hebreo.
theological_decisions:
- issue: Tensión aspectual entre «cruzó» y el participio «estaba cruzando / cruzando»
  english_pob_reading: and crossed over, he
  chosen_spanish_reading: y lo cruzó, él
  alternative_spanish_readings:
  - y estaba cruzando, él
  - y cruzando, él
  rationale: El hebreo usa un participio para un trasfondo simultáneo, pero el relato español fluye mejor con un verbo simple de acción. El pronombre separado conserva el énfasis del sujeto sin perder legibilidad.
  doctrine_reference: Narrative aspect / discourse style; no doctrinal issue
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente hebreo y el rastro de decisiones del inglés POB. Se conserva la estructura narrativa, el énfasis en que Gedeón va personalmente con su gente, y la tensión concesiva entre agotamiento y persecución. No se detectaron revisiones aplicadas en el registro inglés posterior.
  spanish_consistency_notes:
  - Se usa «Jordán» como nombre propio sin añadir «río» en el texto principal, coherente con un español bíblico sobrio.
  - «Agotados» y «persiguiendo» mantienen la relación de contraste del hebreo; la nota ofrece alternativas semánticamente cercanas sin suavizar la tensión.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el tetragrámaton ni un título divino explícito.
