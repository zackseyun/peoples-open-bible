  language: en
  yaml_path: translation/ot/judges/020/036.yaml
  text: So the sons of Benjamin saw that they were defeated[a]. Now the men of Israel had given place to Benjamin[b], because they trusted in the ambush that they had set against Gibeah.
  footnotes:
  - marker: a
    text: Or 'relied on the ambush force that they had stationed at Gibeah.' The Hebrew אֹרֵב can refer either to the ambush itself or to those lying in wait.
    reason: lexical_alternative
  - marker: b
    text: Or 'gave place to Benjamin.' The Hebrew idiom means that Israel deliberately yielded space or retreated to draw Benjamin out.
    reason: lexical_alternative
