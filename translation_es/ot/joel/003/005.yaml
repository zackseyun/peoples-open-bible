    reason: lexical_alternative
  - marker: b
    text: 'Hebreo פְלֵיטָה: puede significar «escape», «libramiento», «liberación» o, según el contexto, «sobrevivientes escapados/remanente».'
    reason: lexical_alternative
  - marker: c
    text: 'El versículo mantiene ambas realidades: quienes invocan a Yahvé y los sobrevivientes que Yahvé llama.'
    reason: theological_note
  revision_rationale: 'Se corrige la cláusula final para que el español sea natural y para preservar mejor la relativa restrictiva del hebreo: «entre los sobrevivientes que Yahvé llama». También se reubica la nota teológica [c] sobre «ha dicho» para evitar anclarla a «llama» y reflejar la práctica de la auditoría inglesa. Se amplía la nota [b] para incluir el matiz de «sobrevivientes/remanente» documentado para פְלֵיטָה.'
