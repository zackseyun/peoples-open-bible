translation:
  language: es
  text: Los Emim vivían allí[a], un pueblo grande, numeroso y alto como los anaquitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tiempos pasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵמִים
  english_pob_choice: The Emim
  chosen_spanish: los emitas
  alternatives_spanish:
  - los emim
  - los Eimim
  lexicon: HALOT
  rationale: Es un etnónimo propio; en español puede transliterarse. "Emitas" conserva la forma del nombre y evita una adaptación más explicativa que el hebreo no exige.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antiguamente
  alternatives_spanish:
  - antes
  - en tiempos pasados
  - anteriormente
  lexicon: HALOT
  rationale: El hebreo expresa un valor temporal adverbial, no espacial. "Antiguamente" es natural en español y mantiene la referencia a un tiempo anterior.
- source_word: יָשְׁבוּ בָהּ
  english_pob_choice: lived there
  chosen_spanish: habitaban allí
  alternatives_spanish:
  - vivían allí
  - moraban allí
  - habitaban en ella
  lexicon: HALOT
  rationale: יׁשב con ב indica residencia. "Habitaban allí" expresa con sobriedad la permanencia en ese lugar; "allí" evita forzar una referencia explícita al sustantivo implícito sin perder el sentido.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: Aquí עַם designa un grupo étnico colectivo. "Pueblo" preserva el valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - formidable
  - vasto
  lexicon: HALOT
  rationale: En la serie descriptiva de tamaño y estatura, "grande" comunica tamaño sin añadir connotaciones ajenas.
- source_word: וְרַב
  english_pob_choice: numerous
  chosen_spanish: numeroso
  alternatives_spanish:
  - mucho
  - abundante
  lexicon: HALOT
  rationale: רב describe cantidad. "Numeroso" mantiene el paralelismo con los otros adjetivos y evita una repetición menos elegante de "muchos".
- source_word: וָרָם
  english_pob_choice: tall
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - de gran estatura
  lexicon: HALOT
  rationale: En este contexto comparativo con los anaceos, el adjetivo se refiere a estatura física. "Alto" es la equivalencia más directa y clara.
- source_word: כָּעֲנָקִים
  english_pob_choice: as the Anakim
  chosen_spanish: como los anaceos
  alternatives_spanish:
  - como los anakitas
  - como los anaqim
  lexicon: HALOT
  rationale: Es un nombre propio de pueblo. "Anaceos" sigue una adaptación española legible y evita la traducción interpretativa de un etnónimo que no conviene verter como término común.
translation_notes:
  revision_awareness: Se siguió el texto hebreo base con el apoyo del audit trail en inglés. No hubo revisiones aplicadas en la fuente de referencia; la redacción española mantiene el valor adverbial de לְפָנִים, el sentido locativo de יָשְׁבוּ בָּהּ y la serie descriptiva de los tres adjetivos del pueblo.
  spanish_consistency_notes:
  - Se mantuvo el etnónimo como nombre propio transliterado/adaptado, en vez de verterlo como apelativo común.
  - Se eligió un estilo bíblico moderno y claro, sin arcaísmos innecesarios.
  - 'La comparación final conserva el paralelismo del hebreo: grande, numeroso y alto.'
