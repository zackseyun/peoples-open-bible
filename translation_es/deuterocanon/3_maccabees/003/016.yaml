review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia griega y la lectura hostil documentada: asignar ingresos a templos urbanos, proceder, subir a Jerusalén, y honrar el templo identificado por sus adherentes. Sin embargo, «de las ciudades» suena menos preciso que el griego «en las ciudades», y «nunca son aventados» introduce una pasiva poco natural en español y se aleja del ajuste inglés revisado hacia la imagen de trillar. Conviene una reparación menor para fidelidad léxica y naturalidad.'
  spanish_quality_summary: 'El español es claro y digno, pero dos puntos requieren ajuste menor: «templos de las ciudades» puede entenderse como pertenencia más que ubicación, y «los que nunca son aventados» suena extraño en español bíblico corriente. «los que nunca son trillados» preserva mejor la metáfora agrícola con mayor inteligibilidad. También es más idiomático «de las ciudades» -> «en las ciudades».'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «templo», «Jerusalén», «honrar» e «insensatez» son adecuados. La decisión sobre ἀλητρίων debe mantener el insulto agrícola; en español «trillados» alinea mejor con el POB inglés revisado («never threshed») que «aventados», aunque la nota puede seguir explicando la dificultad y mencionar la alternativa de aventar/aventar el grano.
  issues:
  - severity: medium
    issue: «templos de las ciudades» debilita el valor locativo de κατὰ πόλεσιν
    rationale: El griego apunta a templos situados por las distintas ciudades, no tanto a una relación posesiva. «templos en las ciudades» representa mejor el alcance distributivo/locativo.
  - severity: medium
    issue: «los que nunca son aventados» es poco natural y menos alineado con la revisión inglesa
    rationale: Aunque la metáfora agrícola está bien detectada, la formulación pasiva con «aventados» suena forzada y menos accesible. Dado que la revisión inglesa fijó «never threshed», «los que nunca son trillados» conserva mejor la imagen hostil con mayor claridad para el lector hispano.
  revised_spanish_text: Y después de asignar muy grandes rentas a los templos en las ciudades[a], también procedimos y subimos a Jerusalén para honrar el templo de los que nunca son trillados y nunca cesan de su insensatez.
  revised_footnotes:
  - marker: a
    text: La expresión griega vertida aquí como «nunca son trillados» es rara y difícil. Puede funcionar como metáfora hostil para personas consideradas toscas, sin refinar o no purificadas; algunos intérpretes la entienden de manera más positiva y la traducen menos pejorativamente.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para reflejar mejor el griego y la línea auditada del POB: «en las ciudades» expresa con más precisión el valor locativo de κατὰ πόλεσιν, y «nunca son trillados» alinea el español con la revisión inglesa hacia la imagen de trillar, manteniendo la aspereza metafórica y mejorando la naturalidad del español. La nota se actualiza para concordar con el nuevo anclaje textual.'
