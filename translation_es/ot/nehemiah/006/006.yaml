review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: introduce el contenido de la carta, conserva el rumor entre las naciones, la corroboración de Gashmu/Geshem, la acusación de rebelión, la inferencia hacia la reconstrucción del muro y la pretensión de realeza. Sin embargo, hay dos desajustes importantes: ''tú y los judíos están'' rompe la concordancia y ''están pensando rebelarse'' suena poco natural y menos preciso que la intención/proyecto de חֹשְׁבִים לִמְרוֹד.'
  spanish_quality_summary: El español es mayormente claro, pero necesita reparación menor para concordancia y naturalidad. 'Se ha informado entre las naciones' es comprensible, aunque 'se informa' o 'se oye' sería más idiomático; no obstante, el problema principal no está allí. 'Vas a ser su rey' comunica bien el valor prospectivo, pero 'llegar a ser' encaja un poco mejor con הֹוֶה. La nota al pie está correctamente anclada.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el nombre propio. Mantener 'Gashmu' en el texto con nota a 'Geshem' es defendible por la evidencia y el rastro de auditoría. 'Rey' para מֶלֶךְ y 'muro' para חוֹמָה están bien. No hay conflictos con Yahvé/Mesías/Cristo u otros términos de proyecto.
  issues:
  - severity: high
    issue: Concordancia gramatical incorrecta en 'tú y los judíos están'
    rationale: El sujeto coordinado con 'tú' requiere 'están' solo si se reformula la persona, pero aquí la construcción más natural y fiel es 'tú y los judíos están planeando' o mejor 'piensan rebelarse'. Tal como está, mezcla segunda persona y tercera persona de modo incorrecto en español.
  - severity: medium
    issue: '''están pensando rebelarse'' es poco idiomático para expresar intención de rebelión'
    rationale: חשׁב + infinitivo aquí comunica plan/intención. En español bíblico legible, 'piensan rebelarse' o 'están planeando rebelarse' preserva mejor el sentido sin torpeza sintáctica.
  - severity: low
    issue: '''vas a ser su rey'' es entendible pero algo coloquial'
    rationale: Para un registro digno y una mejor correspondencia con 'become', 'llegar a ser su rey' suena más natural y preciso en este contexto de acusación proyectada.
  revised_spanish_text: 'Estaba escrito en ella[a]: «Se informa entre las naciones —y Gashmu también lo dice— que tú y los judíos piensan rebelarse. Por eso estás reconstruyendo el muro, y según estas palabras llegarás a ser su rey».'
  revised_footnotes:
