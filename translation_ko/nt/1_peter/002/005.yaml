id: 1PE.2.5
reference: 1 Peter 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ὡς λίθοι ζῶντες οἰκοδομεῖσθε οἶκος πνευματικὸς εἰς ἱεράτευμα ἅγιον, ἀνενέγκαι πνευματικὰς θυσίας εὐπροσδέκτους θεῷ διὰ Ἰησοῦ Χριστοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/005.yaml
  text: 'you yourselves also, as living stones, are being built up as a spiritual house into a holy priesthood, to offer spiritual sacrifices acceptable to God through Jesus Messiah.'
translation:
  language: ko
  text: '여러분 자신도 산 돌들로서 신령한 집으로 세워져, 거룩한 제사장 직분을 이루며, 메시아 예수로 말미암아 하나님이 기쁘게 받으시는 신령한 제사를 드리는 자들이 됩니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἰκοδομεῖσθε
  english_pob_choice: are being built up
  chosen_korean: 세워져
  alternatives_korean:
  - 지어지며
  - 건축되며
  lexicon: BDAG
  rationale: 현재 수동(또는 중간) 직설법/명령법 둘 다 가능하나, 흐름상 직설법으로 「세워져」로 옮긴다.
- source_word: οἶκος πνευματικὸς
  english_pob_choice: a spiritual house
  chosen_korean: 신령한 집
  alternatives_korean:
  - 영적인 집
  - 성령의 집
  lexicon: BDAG
  rationale: πνευματικός를 한국 성서 전통의 「신령한」으로 옮긴다 (2:2의 λογικός도 「신령한」으로 옮긴 것과 의도적 차이는 없으나, 두 단어 모두 「영적」 영역에 속함).
- source_word: ἱεράτευμα ἅγιον
  english_pob_choice: a holy priesthood
  chosen_korean: 거룩한 제사장 직분
  alternatives_korean:
  - 거룩한 제사장단
  - 거룩한 사제직
  lexicon: BDAG
  rationale: ἱεράτευμα는 「제사장단·제사장 직분」 모두 가능. 2:9의 βασίλειον ἱεράτευμα(왕같은 제사장 직분)와 통일하여 「제사장 직분」으로 옮긴다.
- source_word: πνευματικὰς θυσίας εὐπροσδέκτους
  english_pob_choice: spiritual sacrifices acceptable
  chosen_korean: 하나님이 기쁘게 받으시는 신령한 제사
  alternatives_korean:
  - 하나님께 받으실 만한 영적 제물
  lexicon: BDAG
  rationale: εὐπρόσδεκτος를 「기쁘게 받으시는」으로 풀어 옮긴다 (롬 12:1과 유사한 표현).
theological_decisions:
- issue: 2:4-10 단락 도입에서 만인 제사장직의 표현
  chosen_reading: '「거룩한 제사장 직분」 (2:9과 통일)'
  alternative_readings:
  - 「거룩한 제사장단」
  rationale: 베드로전서 2:4-10은 만인 제사장직의 OT 뿌리(출 19:6)를 가장 명시적으로 드러내는 단락이다. 어휘를 통일하여 그 신학적 흐름을 보존한다.
  doctrine_reference: 'DOCTRINE.md: OT 인용·심상 보존'
