translation:
  language: es
  text: Y ustedes, hijos de Sion, regocíjense y alégrense en Yahvé, su Dios, porque él les ha dado la lluvia temprana[a] para vindicación[b]; y hace descender para ustedes la lluvia, la lluvia temprana y la lluvia tardía, como antes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el maestro para justicia» o «el maestro de justicia». La palabra hebrea moreh puede significar «maestro» o «lluvia temprana»; la mención inmediata de la lluvia favorece aquí «lluvia temprana».
    reason: alternative_reading
  - marker: b
    text: O, «para justicia» o «en justa medida». La frase hebrea literalmente dice «para justicia».
    reason: lexical_alternative
  - marker: c
    text: O, «en el primer mes». El hebreo también puede entenderse como una referencia calendárica, aunque «como antes» encaja bien con el contexto de restauración.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי צִיּוֹן
  english_pob_choice: And you, children of Zion
  chosen_spanish: Y ustedes, hijos de Sion
  alternatives_spanish:
  - Y ustedes, niños de Sion
  - Oh hijos de Sion
  lexicon: HALOT
  rationale: בְּנֵי funciona aquí como apelación colectiva al pueblo de Sion. «Hijos de Sion» conserva el vínculo filial/covenantal sin restringirlo a varones; «ustedes» mantiene el valor vocativo del contexto.
- source_word: גִּילוּ וְשִׂמְחוּ
  english_pob_choice: rejoice and be glad
  chosen_spanish: regocíjense y alégrense
  alternatives_spanish:
  - exulten y regocíjense
  - gócense y alégrense
  lexicon: HALOT
  rationale: Los dos imperativos intensifican la exhortación a la alegría. «Regocíjense y alégrense» conserva la duplicación semántica con español claro y digno.
- source_word: בַּיהוָה אֱלֹהֵיכֶם
  english_pob_choice: in Yahweh your God
  chosen_spanish: en Yahvé, su Dios
  alternatives_spanish:
  - en Yahvé, el Dios de ustedes
  - en el Señor, su Dios
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según el criterio del proyecto para יהוה. «Su Dios» reproduce el posesivo de segunda plural y el vínculo relacional del texto.
- source_word: כִּי נָתַן לָכֶם
  english_pob_choice: for he has given you
  chosen_spanish: porque él les ha dado
  alternatives_spanish:
  - pues él les ha dado
  - porque les dio
  lexicon: HALOT
  rationale: 'כִּי introduce la razón del gozo. El perfecto se vierte como acción cumplida con efecto presente: «les ha dado».'
- source_word: הַמּוֹרֶה
  english_pob_choice: the early rain
  chosen_spanish: la lluvia temprana
  alternatives_spanish:
  - el maestro
  - la lluvia de otoño
  lexicon: HALOT
  rationale: El contexto inmediato menciona lluvia de modo explícito («lluvia... lluvia temprana y lluvia tardía»), por lo que el sentido meteorológico es el más sólido. En español se evita «maestro» en el cuerpo principal para no introducir una lectura que el contexto no exige.
- source_word: לִצְדָקָה
  english_pob_choice: for righteousness / for vindication
  chosen_spanish: '[a][b]'
  alternatives_spanish:
  - para justicia
  - para vindicación
  - en justa medida
  lexicon: HALOT
  rationale: 'La frase hebrea es semánticamente densa. En español se conserva la tensión con notas: una lectura orientada a «vindicación» y otra al valor lexical de «justicia». Así se evita una reducción indebida del término צדקה.'
- source_word: וַיּוֹרֶד לָכֶם
  english_pob_choice: and he causes the rain to come down for you
  chosen_spanish: y hará descender para ustedes
  alternatives_spanish:
  - y hace bajar para ustedes
  - y derramará para ustedes
  lexicon: HALOT
  rationale: El verbo hifil de ירד es causativo. En español, «hará descender» reproduce la causa de manera natural; el objeto «la lluvia» se explicita después para no cargar la frase inicial.
- source_word: גֶּשֶׁם
  english_pob_choice: rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - el agua
  - la precipitación
  lexicon: HALOT
  rationale: Término genérico para lluvia; «la lluvia» es la equivalencia directa y natural.
- source_word: מוֹרֶה וּמַלְקוֹשׁ
  english_pob_choice: the early rain and the latter rain
  chosen_spanish: la lluvia temprana y la lluvia tardía
  alternatives_spanish:
  - la lluvia de otoño y la lluvia de primavera
  - la temprana y la tardía
  lexicon: HALOT
  rationale: Se preserva la pareja agrícola tradicional. «Temprana/tardía» mantiene el paralelismo y la referencia estacional sin forzar una glosa interpretativa.
- source_word: בָּרִאשׁוֹן
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - al principio
  - en el primer mes
  lexicon: HALOT
  rationale: En este contexto de restauración, la lectura adverbial «como antes» comunica mejor el sentido de la frase que una referencia calendárica obligatoria.
theological_decisions:
- issue: Sentido de הַמּוֹרֶה
  english_pob_reading: Rendered as 'the early rain' in the main text, with the teacher reading preserved as alternative
  chosen_spanish_reading: «la lluvia temprana» en el texto principal
  alternative_spanish_readings:
  - «el maestro»
  - «el maestro para justicia»
  rationale: El entorno textual habla explícitamente de lluvia; por ello la lectura meteorológica es la más coherente. Se conserva la alternativa tradicional en nota para transparencia interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de לִצְדָקָה
  english_pob_reading: Rendered literally as 'for righteousness' / revised discussion toward 'for vindication'
  chosen_spanish_reading: Mantener la tensión semántica con nota sobre «vindicación» y «justicia»
  alternative_spanish_readings:
  - para justicia
  - para vindicación
  - en justa medida
  rationale: El sustantivo צדקה puede abarcar justicia, rectitud y vindicación. En español, una sola palabra puede empobrecer el campo semántico; por eso el texto principal evita fijar demasiado y las notas explican las opciones.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «for vindication» frente a «for righteousness» y añadió el artículo antes de rain. La versión española refleja esa sensibilidad manteniendo el término más amplio en nota, mientras conserva una forma natural y transparente en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se mantiene «hijos de Sion» como vocativo colectivo, no como referencia restringida a varones.
  - Se traduce la pareja agrícola como «lluvia temprana» y «lluvia tardía» para conservar el paralelismo.
  - Las notas a y b están ancladas explícitamente en «[a][b]» en el texto; la nota c está anclada en «[c]» junto a «lluvia tardía».
  - Se evita «SEÑOR» y también una paráfrasis que borre la tensión de צדקה.
