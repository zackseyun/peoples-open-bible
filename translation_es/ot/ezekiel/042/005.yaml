translation:
  language: es
  text: Y las cámaras superiores eran más estrechas, porque las galerías[a] les quitaban espacio, más que a las inferiores y a las intermedias del edificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las terrazas', 'las columnatas' o 'los salientes' les quitaban espacio. El término hebreo traducido aquí 'galerías' (אַטִּיקִים) es raro y su referente arquitectónico preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las habitaciones
  - las estancias
  - los aposentos
  lexicon: HALOT
  rationale: לשכה en un contexto arquitectónico del templo designa compartimentos o cuartos laterales. 'Cámaras' conserva el tono técnico y arquitectónico del pasaje mejor que un término más general como 'habitaciones'.
- source_word: הָעֶלְיוֹנֹת
  english_pob_choice: the upper
  chosen_spanish: superiores
  alternatives_spanish:
  - altas
  - más altas
  - de arriba
  lexicon: HALOT
  rationale: El adjetivo marca el nivel superior en contraste con los niveles inferior e intermedio. 'Superiores' es natural en español y mantiene la relación espacial.
- source_word: קְצֻרוֹת
  english_pob_choice: were narrower
  chosen_spanish: eran más estrechas
  alternatives_spanish:
  - eran más cortas
  - estaban reducidas
  - eran angostas
  lexicon: HALOT
  rationale: En este contexto arquitectónico la idea no es de longitud sino de menor amplitud. 'Más estrechas' comunica bien el efecto espacial que produce la cláusula causal siguiente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la estrechez de las cámaras superiores. 'Porque' es la conexión causal más clara y natural en español.
- source_word: יוֹכְלוּ
  english_pob_choice: took away
  chosen_spanish: les quitaban espacio
  alternatives_spanish:
  - les quitaban
  - reducían su espacio
  - les restaban espacio
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente significa 'comer/consumir', aquí funciona metafóricamente para indicar ocupación de espacio por elementos arquitectónicos. 'Les quitaban espacio' preserva la imagen de reducción espacial sin sonar forzado.
- source_word: אַתִּיקִים
  english_pob_choice: the galleries
  chosen_spanish: los pasillos
  alternatives_spanish:
  - las galerías
  - las terrazas
  - los corredores
  lexicon: HALOT
  rationale: El término es raro y su referente arquitectónico preciso es incierto. Dado que la POB inglesa mantiene una nota con alternativas, 'pasillos' funciona como una opción española comprensible para una estructura longitudinal proyectada; se conserva la incertidumbre en una nota.
- source_word: מֵהֵנָה
  english_pob_choice: from them
  chosen_spanish: les
  alternatives_spanish:
  - de ellas
  - a ellas
  - desde ellas
  lexicon: HALOT
  rationale: El hebreo remite a las cámaras superiores como aquello de lo que se toma el espacio. En español, el dativo 'les' expresa mejor la pérdida de espacio que un literal 'de ellas' dentro de la frase verbal.
- source_word: מֵהַתַּחְתֹּנֹת
  english_pob_choice: from the lower
  chosen_spanish: a las inferiores
  alternatives_spanish:
  - de las inferiores
  - a las de abajo
  - a las inferiores inferiores
  lexicon: HALOT
  rationale: La comparación implícita se entiende mejor en español con una estructura contrastiva que preserve la distribución espacial. 'Inferiores' mantiene el nivel arquitectónico.
- source_word: וּמֵהַתִּיכֹנוֹת
  english_pob_choice: and middle parts
  chosen_spanish: y a las intermedias
  alternatives_spanish:
  - y a las de en medio
  - y a las medianas
  - y al nivel intermedio
  lexicon: HALOT
  rationale: El término señala el nivel medio de la estructura de tres pisos. 'Intermedias' mantiene el paralelismo con 'superiores' e 'inferiores' y suena natural en español.
- source_word: בִּנְיָן
  english_pob_choice: of the building
  chosen_spanish: del edificio
  alternatives_spanish:
  - de la construcción
  - de la estructura
  - del conjunto
  lexicon: HALOT
  rationale: Es un término sumario para el complejo construido. 'Edificio' es claro, formal y suficientemente amplio para el contexto de la visión.
theological_decisions:
- issue: Término arquitectónico raro אַתִּיקִים y su incertidumbre léxica
  english_pob_reading: the galleries, with a footnote preserving 'terraces,' 'colonnades,' or 'ledges' as alternatives
  chosen_spanish_reading: los pasillos, con nota que preserva la incertidumbre y alternativas como 'las galerías', 'las terrazas' o 'los corredores'
  alternative_spanish_readings:
  - las galerías
  - las terrazas
  - los corredores
  - las colonnadas
  rationale: No hay una equivalencia plenamente segura para el término. Se evita fijar indebidamente un sentido arquitectónico cerrado, y la nota conserva la tensión léxica tal como la POB inglesa la documenta.
  doctrine_reference: Principio de transparencia textual y cautela exegética; no se sobreespecifica el referente arquitectónico.
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente al mantener la coma explicativa después de 'espacio' y al conservar la comparación 'más que a...'. También refleja la decisión revisada de dar claridad formal al paralelismo de los niveles inferior e intermedio sin alterar el sentido.
  spanish_consistency_notes:
  - Se usa 'cámaras' para לשכות en coherencia con el léxico arquitectónico de Ezequiel.
  - Se mantiene 'superiores', 'inferiores' e 'intermedias' para conservar el contraste de tres niveles.
  - Se evita 'SEÑOR' y no aparece material divino directo en este verso.
  - La nota a conserva la ambigüedad del término raro sin añadir una interpretación no sustentada.
