translation:
  text: Instruction in understanding and mastery of expression[a], by Shimon son of Yeshua, son of Eleazar son of Sira, who poured forth wisdom from his heart[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and mastery of expression'' reflects a difficult phrase (מוֹשֵׁל אוֹפַנִּים). The wording may point to skill in ordered speech or composition; the exact nuance is uncertain.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clause is uncertain in the Geniza witness. The Greek parallel reads, 'who poured forth wisdom from his heart,' which guides the main text here.
    reason: textual_variant
lexical_decisions:
- source_word: מוּסַר
  chosen: Instruction
  alternatives:
  - Discipline
  - Teaching
  lexicon: HALOT
  rationale: The noun commonly denotes instruction with formative force. 'Instruction' fits a book title-like colophon better than the harsher 'discipline,' while preserving the didactic sense.
- source_word: שֵׂכֶל
  chosen: understanding
  alternatives:
  - insight
  - good sense
  lexicon: HALOT
  rationale: In construct with מוּסַר, it describes the kind of instruction given. 'Understanding' is broad and natural English, matching the wisdom context.
- source_word: וּמוֹשֵׁל אוֹפַנִּים
  chosen: mastery of expression
  alternatives:
  - governance of turns
  - rule of forms
  - ordering of modes
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult and likely reflects idiom or a somewhat unstable textual form. Taken with the Greek parallel παιδείαν συνέσεως καὶ ἐπιστήμης and the surrounding colophon context, it points to skilled, ordered articulation rather than literal 'wheels/turnings.' 'Mastery of expression' communicates the likely sense without wooden obscurity, while acknowledging uncertainty in a footnote.
- source_word: לְשִׁמְעוֹן
  chosen: by Shimon
  alternatives:
  - of Shimon
  - for Shimon
  lexicon: HALOT
  rationale: In this colophon-like line, the prefixed ל likely marks authorship/attribution rather than direction. 'By' is the clearest English rendering for the superscriptional function.
- source_word: נִיבַּע
  chosen: poured forth
  alternatives:
  - gushed out
  - uttered
  - bubbled up
  lexicon: HALOT
  rationale: The verb evokes springing or flowing speech. The Greek ἀνώμβρησεν ('rained down/poured down') supports an image of abundant outpouring rather than simple speaking.
- source_word: בִּפְתוֹר לְבָן
  chosen: from his heart
  alternatives:
  - with a pure interpretation
  - in clear exposition
  lexicon: HALOT
  rationale: The Hebrew here is textually difficult and does not yield a secure literal sense from the composite Geniza reading alone. The Greek parallel has ἀπὸ καρδίας αὐτοῦ, which provides a strong control for the sense of the clause. Because the task requires using the Greek parallel as actual translation input, 'from his heart' is adopted, with the Hebrew difficulty noted in a footnote.
- source_word: הִבִּיעַ
  chosen: poured forth
  alternatives:
  - expressed
  - uttered
  lexicon: HALOT
  rationale: Although the second Hebrew verb differs from נבע, the English repeats 'poured forth' to preserve the image of abundant expression supported by both Hebrew and Greek. This is a documented stylistic consolidation rather than a claim of strict lexical identity.
- source_word: בִּתְבוּנוֹת
  chosen: wisdom
  alternatives:
  - understandings
  - insights
  - discernments
  lexicon: HALOT
  rationale: Literally the form points to 'understandings/insights,' but the Greek parallel explicitly has σοφίαν ('wisdom'). In this colophon, 'wisdom' better captures the book's self-description and reads naturally in English, while the more literal alternative is preserved in the note on source tension.
