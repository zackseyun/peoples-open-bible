  spanish_quality_summary: El español es claro, pero la mezcla de voseo reverencial/castellano ('vuestra') con imperativos de ustedes ('humíllense', 'siéntense') resulta poco natural para un español neutro latinoamericano. Conviene unificar en 'ustedes/su/sus'.
  glossary_alignment: '''Reina madre'' alinea bien con la decisión documentada para גְּבִירָה. No hay conflictos con la terminología base del proyecto. La nota cultural está bien, pero las notas a y b están invertidas respecto de sus anclajes: [a] aparece en ''reina madre'' pero contiene la alternativa formal sobre la corona, mientras [b] aparece en ''siéntense'' pero contiene la nota cultural sobre ''reina madre''.'
  issues:
