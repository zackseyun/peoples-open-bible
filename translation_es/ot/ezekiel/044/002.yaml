  rationale: Se movió la nota al pie para anclarla correctamente en «nadie», que es el elemento que la nota explica, y se ajustó «no será abierta» a «no se abrirá» para mejorar la naturalidad del español sin cambiar el sentido del hebreo ni las decisiones léxicas centrales.
