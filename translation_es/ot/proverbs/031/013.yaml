translation:
  language: es
  text: Ella busca lana y lino[a], y trabaja con manos dispuestas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y trabaja con agrado con sus manos» o «y trabaja con empeño con sus manos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרְשָׁה
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - busca con empeño
  lexicon: HALOT
  rationale: דרשׁ expresa buscar, indagar o procurar. 'Busca' comunica la acción activa sin especificar en exceso si el énfasis cae en la búsqueda, la selección o la adquisición.
- source_word: צֶמֶר
  english_pob_choice: wool
  chosen_spanish: lana
  alternatives_spanish:
  - lana de oveja
  lexicon: HALOT
  rationale: El sustantivo designa lana de manera directa; 'lana' es el equivalente natural y fiel en español.
- source_word: וּפִשְׁתִּים
  english_pob_choice: flax
  chosen_spanish: lino
  alternatives_spanish:
  - lino en rama
  - lino
  lexicon: HALOT
  rationale: En español, 'lino' puede referirse al material textil equivalente al flax del texto. Aunque el hebreo nombra la planta/material, 'lino' resulta más idiomático y transparente para el lector, sin perder el campo semántico del tejido.
- source_word: וַתַּעַשׂ
  english_pob_choice: works
  chosen_spanish: trabaja
  alternatives_spanish:
  - hace
  - labora
  lexicon: HALOT
  rationale: עשה es amplio ('hacer/obrar'). En este contexto de labor doméstica y textil, 'trabaja' transmite la actividad productiva de forma natural en español.
- source_word: בְּחֵפֶץ
  english_pob_choice: with willing
  chosen_spanish: con diligencia
  alternatives_spanish:
  - con gusto
  - con disposición
  - con placer
  lexicon: HALOT
  rationale: חֵפֶץ puede significar deleite, deseo o disposición. Aquí describe la manera de trabajar; 'con diligencia' comunica una voluntad aplicada y positiva sin introducir una nota emocional excesiva.
- source_word: כַּפֶּיהָ
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - palmas
  - sus manos
  lexicon: HALOT
  rationale: כף en este giro idiomático se refiere naturalmente a las manos como instrumentos de trabajo. 'Manos' preserva el sentido directo y fluido en español.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando la nota [a] en el texto español junto a “lana y lino”.
  spanish_consistency_notes:
  - Se evita traducir mecánicamente 'willing hands' como 'manos dispuestas' porque en español la idea de disposición se comunica mejor con un adverbial de modo.
  - Se prefirió 'lino' como equivalente contextual de פִשְׁתִּים para mantener naturalidad y legibilidad, aunque el hebreo alude directamente al material/planta.
  - No se introduce terminología eclesiástica tradicional; el verso conserva un registro sobrio y doméstico acorde con el hebreo.
