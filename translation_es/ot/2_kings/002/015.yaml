translation:
  language: es
  text: 'Cuando los hijos de los profetas que estaban en Jericó lo vieron de lejos[a], dijeron[b]: «El espíritu de Elías reposa sobre Eliseo». Entonces fueron a su encuentro y se postraron en tierra delante de él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a distancia»; la expresión hebrea puede indicar estar enfrente o dentro del campo visual de ellos.
    reason: alternative_reading
  - marker: b
    text: Es decir, reconocieron que el espíritu profético de Elías ahora descansaba sobre Eliseo.
    reason: cross_reference
  - marker: c
    text: O «se postraron delante de él»; el gesto expresa honor y sumisión, no necesariamente adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  english_pob_choice: the sons of the prophets
  chosen_spanish: los hijos de los profetas
  alternatives_spanish:
  - los discípulos de los profetas
  - los miembros de la comunidad profética
  lexicon: HALOT
  rationale: Conservo la forma idiomática hebrea de manera transparente. «Hijos de los profetas» mantiene el vínculo textual y la organización grupal sin imponer una reconstrucción más interpretativa.
- source_word: אֲשֶׁר בִּירִיחוֹ
  english_pob_choice: who were at Jericho
  chosen_spanish: que estaban en Jericó
  alternatives_spanish:
  - que estaban en la ciudad de Jericó
  - que estaban en Jericó
  lexicon: HALOT
  rationale: «Estaban en Jericó» es la manera más natural y fiel de ubicar al grupo dentro del relato, sin añadir matices no presentes en el hebreo.
- source_word: מִנֶּגֶד
  english_pob_choice: from a distance
  chosen_spanish: de lejos
  alternatives_spanish:
  - a distancia
  - desde enfrente de ellos
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que prefirió la lectura más natural y precisa en el contexto narrativo. «De lejos» expresa bien la percepción visual sin forzar una construcción espacial más literal pero menos clara en español.
- source_word: נָחָה ר֥וּחַ אֵלִיָּהוּ עַל אֱלִישָׁע
  english_pob_choice: The spirit of Elijah rests on Elisha
  chosen_spanish: El espíritu de Elías reposa sobre Eliseo
  alternatives_spanish:
  - El espíritu de Elías está sobre Eliseo
  - El espíritu de Elías ha reposado sobre Eliseo
  lexicon: HALOT
  rationale: «Reposa sobre» comunica la permanencia del estado, como en el inglés auditado. Conservo «espíritu» para רוח y «sobre» para עַל, respetando la imagen de investidura o permanencia reconocida por los profetas.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ אָרְצָה
  english_pob_choice: bowed down to the ground before him
  chosen_spanish: se postraron en tierra delante de él
  alternatives_spanish:
  - se inclinaron hasta el suelo delante de él
  - se prosternaron delante de él
  lexicon: HALOT
  rationale: «Postrarse en tierra» expresa la acción física de שחה con el complemento direccional hacia el suelo. Mantengo «delante de él» para señalar el destinatario humano del homenaje sin convertirlo en adoración divina.
theological_decisions:
- issue: Sentido de «el espíritu de Elías»
  english_pob_reading: A recognition that Elijah's prophetic spirit or prophetic empowerment now rests on Elisha.
  chosen_spanish_reading: Un reconocimiento de que el espíritu profético o la capacitación profética de Elías reposa ahora sobre Eliseo.
  alternative_spanish_readings:
  - Una transferencia literal de la persona o alma de Elías a Eliseo
  - Una expresión meramente emotiva sin peso profético
  rationale: El contexto inmediato de 2 Reyes 2:9, 15 favorece la continuidad profética y la investidura reconocida, no una transmigración personal. La traducción debe preservar esa tensión teológica sin suavizarla.
  doctrine_reference: 2 Reyes 2:9, 15
- issue: Valor del gesto de postración ante Eliseo
  english_pob_reading: An act of reverence/submission to Elisha as Elijah's prophetic successor, not divine worship.
  chosen_spanish_reading: Un gesto de reverencia y sumisión hacia Eliseo como sucesor profético de Elías, no adoración divina.
  alternative_spanish_readings:
  - Adoración religiosa a Eliseo
  - Simple cortesía sin carga de reverencia
  rationale: El verbo hebreo puede describir postración ante personas o ante Dios. Aquí el objeto es Eliseo y la escena expresa reconocimiento de autoridad profética; por eso evito un lenguaje que sugiera culto divino.
  doctrine_reference: 2 Reyes 2:15; cf. el uso contextual de שׁחה
translation_notes:
  revision_awareness: El inglés auditable pasó de «from across from them» a «from a distance» por ser más natural y exacto. En español, la elección «de lejos» sigue esa revisión y evita una literalidad espacial innecesaria. También conservo la lectura teológica del «espíritu de Elías» como reconocimiento profético en Eliseo, y del gesto final como homenaje reverente, no culto.
  spanish_consistency_notes:
  - Usé «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Mantuve «espíritu» para רוח y no lo convertí en «viento» ni en una paráfrasis psicológica.
  - Conservé la fórmula hebrea «hijos de los profetas» por transparencia textual.
  - Elegí «postraron en tierra» para reflejar la intensidad física del verbo sin sobretraducirlo como adoración.
