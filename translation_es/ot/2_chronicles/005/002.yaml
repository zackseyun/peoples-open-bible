revisions:
- from: Entonces Salomón reunió a los ancianos de Israel, a todos los jefes de las tribus[a], a los jefes de las casas paternas[b] de los hijos de Israel, en Jerusalén, para subir el arca del pacto de Yahvé desde la ciudad de David[c], que es Sion.
  to: Entonces Salomón reunió a los ancianos de Israel, a todos los jefes de las tribus, a los jefes de las casas paternas de los hijos[a] de Israel, en Jerusalén, para hacer subir el arca del pacto de Yahvé desde la ciudad de David[b], que es Sion.
  rationale: La revisión corrige las notas para que coincidan con las alternativas preservadas en el rastro auditado del POB, elimina una nota extra no necesaria y mejora ligeramente la representación del causativo hebreo con «hacer subir». El resto del texto ya era fiel, claro y conforme al glosario del proyecto.
