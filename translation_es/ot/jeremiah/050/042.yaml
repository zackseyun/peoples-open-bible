translation:
  language: es
  text: Empuñan arco y jabalina; son crueles y no tendrán compasión. Su estruendo ruge como el mar, y montan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como uno solo», enfatizando la formación unida del ejército.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  english_pob_choice: bow
  chosen_spanish: arco
  alternatives_spanish:
  - arco y flecha
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular colectivo para el arma principal; en español, «arco» comunica de forma natural el arma sin añadir elementos no presentes. Mantiene la concisión militar del original.
- source_word: כִידֹן
  english_pob_choice: javelin
  chosen_spanish: jabalina
  alternatives_spanish:
  - lanza
  - dardo
  lexicon: HALOT
  rationale: El término apunta a un arma arrojadiza o de empuje distinta del arco. «Jabalina» preserva mejor esa idea que «lanza», y funciona bien en español moderno.
- source_word: יַחֲזִיקוּ
  english_pob_choice: seize
  chosen_spanish: empuñan
  alternatives_spanish:
  - toman
  - sujetan
  - agarran
  lexicon: HALOT
  rationale: En este contexto militar, el verbo expresa tomar las armas en mano y prepararlas. «Empuñan» conserva el valor activo y bélico con buena naturalidad en español.
- source_word: אַכְזָרִי
  english_pob_choice: cruel
  chosen_spanish: crueles
  alternatives_spanish:
  - feroces
  - despiadados
  lexicon: HALOT
  rationale: «Crueles» es la equivalencia más directa y mantiene el juicio moral del texto. No se atenúa a una mera ferocidad física.
- source_word: לֹא יְרַחֵמוּ
  english_pob_choice: will show no mercy
  chosen_spanish: no tendrán compasión
  alternatives_spanish:
  - no mostrarán misericordia
  - no serán misericordiosos
  lexicon: HALOT
  rationale: La negación del verbo de compadecerse se expresa de forma idiomática en español con «no tendrán compasión». Conserva la fuerza de la ausencia de misericordia sin sonar forzado.
- source_word: קוֹלָם
  english_pob_choice: their sound
  chosen_spanish: Su voz
  alternatives_spanish:
  - Su sonido
  - Su ruido
  lexicon: HALOT
  rationale: Aunque el término puede abarcar voz, sonido o ruido, el contexto poético de una tropa tumultuosa permite «voz» como término amplio y natural. Se deja la imagen de una presencia audible y colectiva.
- source_word: כַּיָּם יֶהֱמֶה
  english_pob_choice: roars like the sea
  chosen_spanish: ruge como el mar
  alternatives_spanish:
  - retumba como el mar
  - brama como el mar
  lexicon: HALOT
  rationale: «Ruge» transmite el tumulto sonoro del verbo hebreo de forma viva y entendible. Se eligió «mar» en vez de «mar» como referente natural del símil, conforme al texto fuente.
- source_word: וְעַל סוּסִים יִרְכָּבוּ
  english_pob_choice: they ride on horses
  chosen_spanish: montan sobre caballos
  alternatives_spanish:
  - cabalgan sobre caballos
  - van a caballo
  lexicon: HALOT
  rationale: El verbo describe acción militar de desplazamiento montado. «Montan sobre caballos» es claro y mantiene el plural del ejército; «caballos» es la equivalencia usual y transparente en español.
- source_word: עָרוּךְ
  english_pob_choice: arrayed
  chosen_spanish: dispuestos
  alternatives_spanish:
  - formados
  - alineados
  - preparados
  lexicon: HALOT
  rationale: El participio expresa ordenación para combate. «Dispuestos» conserva la idea de formación militar sin forzar una lectura demasiado técnica.
- source_word: כְּאִישׁ
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como uno solo
  - como un guerrero
  lexicon: HALOT
  rationale: Se mantiene la forma singular masculina del hebreo. Aunque puede entenderse idiomáticamente como acción unificada, en el texto principal se preserva la imagen literal para no borrar la tensión interpretativa.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: «Batalla» resulta natural en español y conserva el sentido bélico inmediato del pasaje, sin ampliar innecesariamente a un estado general de guerra.
- source_word: בַּת בָּבֶל
  english_pob_choice: daughter Babylon
  chosen_spanish: hija de Babilonia
  alternatives_spanish:
  - oh hija de Babilonia
  - hija Babilonia
  lexicon: HALOT
  rationale: La construcción poética se preserva como personificación y vocativo directo. «Hija de Babilonia» mantiene el paralelismo y evita sustituir el recurso hebreo por un título más interpretativo.
theological_decisions:
- issue: Similitud militar en כְּאִישׁ
  english_pob_reading: like a man
  chosen_spanish_reading: como un hombre
  alternative_spanish_readings:
  - como uno solo
  - como un guerrero
  rationale: 'Se conserva la forma masculina singular del hebreo en lugar de resolverla por completo como «como uno solo». Así no se elimina la ambigüedad documentada: puede aludir a la formación unificada del ejército, pero el texto conserva la imagen literal.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, que mantuvo «like a man» en el texto principal y reservó en nota la alternativa idiomática «like one man». No hubo revisiones aplicadas en el último pase, y la propuesta española conserva esa misma tensión interpretativa sin diluirla.
  spanish_consistency_notes:
  - Se mantuvo el registro poético y militar del hebreo sin añadir sujetos explícitos inexistentes.
  - Se prefirió «arco/jabalina» y no términos eclesiásticos o más abstractos, para conservar la concreción bélica del pasaje.
  - La personificación «hija de Babilonia» se mantuvo como vocativo poético consistente con el patrón del libro.
  - La nota se ancla en «Su voz[a]» para reflejar la alternativa interpretativa del símil sin alterar el cuerpo principal.
