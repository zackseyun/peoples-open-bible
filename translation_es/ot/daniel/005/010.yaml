base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/010.yaml
  text: Because of the words of the king and his nobles[a], the queen entered the banquet hall. The queen spoke and said, “O king, live forever! Do not let your thoughts terrify you[b], and do not let your countenance change.”
  footnotes:
  - marker: a
    text: Or 'answered and said.' The Aramaic idiom can introduce speech either as a response or simply as the beginning of a statement.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your brightnesses do not change,' an idiom referring to the appearance of the face; compare the similar expression in this chapter for a face changing color from fear.
    reason: lexical_alternative
