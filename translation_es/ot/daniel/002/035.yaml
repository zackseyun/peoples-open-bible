base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/035.yaml
  text: Then the iron[a], the clay, the bronze, the silver, and the gold were crushed all at once and became like chaff from the summer threshing floors, and the wind carried them away so that no place was found for them[c][b]. But the stone that struck the statue became a great mountain and filled the whole earth.
  footnotes:
  - marker: a
    text: Or 'together' / 'as one' for 'all at once.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like dust'; the Aramaic image is light refuse from threshing, hence 'chaff.'
    reason: lexical_alternative
  - marker: c
    text: '''Earth'' could also be rendered ''land,'' but here the broader scope of the vision favors ''earth.'''
    reason: alternative_reading
