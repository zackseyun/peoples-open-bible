  language: en
  yaml_path: translation/ot/exodus/016/003.yaml
  text: And the sons of Israel said to them[a], “If only we had died by the hand of Yahweh in the land of Egypt, when we sat by the pots of meat, when we ate bread to the full[c][b]. For you have brought us out into this wilderness to kill this whole assembly with hunger.”
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions render this more idiomatically as 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when we sat by the flesh pots'—a traditional rendering of the Hebrew idiom for cooking pots filled with meat.
    reason: lexical_alternative
  - marker: c
    text: The divine name is Hebrew YHWH, rendered here as 'the LORD' in keeping with the translation's standard practice; alternatively, 'Yahweh.'
    reason: alternative_reading
