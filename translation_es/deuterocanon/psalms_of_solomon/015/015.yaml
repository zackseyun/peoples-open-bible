    issue: «serán mostrados misericordia» es español no idiomático
    rationale: Aunque intenta reflejar la pasiva de ἐλεηθήσονται, en español esa construcción es defectuosa. «Se les mostrará misericordia» conserva mejor el sentido de misericordia concedida y es plenamente natural.
  - severity: medium
    issue: La nota [a] sobre «Señor» es innecesaria y potencialmente desalineada con la política de «Yahvé»
    rationale: No preserva una alternativa significativa del original ni aclara una ambigüedad real de este versículo. Además, llamar la atención a «Señor» puede crear tensión innecesaria con la pauta terminológica del proyecto.
  revised_spanish_text: Pero a los que temen al Señor se les mostrará misericordia en ella[a], y vivirán por la misericordia de su Dios; pero los pecadores perecerán para siempre.
