review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: ἐξῆλθεν = «salió», μετὰ = «con», y los dos grupos militares con sus cantidades. Sin embargo, «cuatrocientos de a caballo» omite un sustantivo explícito para ἱππέων («jinetes»/«hombres de caballo») y suena más elíptico que el griego, que nombra personas montadas. También conviene mejorar el paralelismo militar del español.'
  spanish_quality_summary: «Entonces salió con tres mil soldados de a pie y cuatrocientos de a caballo» es entendible, pero «de a caballo» sin sustantivo resulta algo coloquial y menos digno en registro bíblico. «Tres mil soldados de infantería y cuatrocientos jinetes» suena natural, claro y equilibrado en español eclesial moderno.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La revisión propuesta mantiene fidelidad léxica: «salió», «con», «infantería» para πεζῶν y «jinetes» para ἱππέων. «Infantería» es una excepción aceptable frente a una forma más literal porque el referente es claramente militar y mejora la naturalidad española sin pérdida de sentido.'
  issues:
  - severity: medium
    issue: «cuatrocientos de a caballo» carece de sustantivo explícito para ἱππέων.
    rationale: El griego nombra personas montadas («horsemen» en el POB inglés). En español, dejar solo «de a caballo» suena elíptico y algo coloquial; «jinetes» expresa mejor el referente personal.
  - severity: low
    issue: «soldados de a pie» es fiel, pero menos idiomático que una opción militar más natural.
    rationale: πεζῶν contrasta con ἱππέων en contexto militar. «Infantería» o «soldados de infantería» ofrece un paralelismo más limpio con «jinetes» sin alejarse del sentido.
  revised_spanish_text: Entonces salió con tres mil soldados de infantería y cuatrocientos jinetes.
  revision_rationale: Se sustituye la expresión elíptica «de a caballo» por «jinetes», que representa de manera explícita a los ἱππέων como personas montadas. También se ajusta «soldados de a pie» a «soldados de infantería» para lograr un español más natural y un paralelismo militar más claro, manteniendo intacto el sentido del griego y del POB inglés.
