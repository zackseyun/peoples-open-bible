translation:
  language: es
  text: Y Judas cayó[a], y los demás huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue derribado» / «murió». El griego dice «cayó», una expresión común de batalla que puede implicar muerte sin decirla de manera más explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Es nombre propio transliterado por convención. En 1 Macabeos se refiere a Judas Macabeo, y en español bíblico la forma normal es «Judas»; «Judá» sugeriría el patriarca o la tribu, no esta figura narrativa.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - fue derribado
  - murió
  lexicon: LSJ
  rationale: El aoristo de πίπτω significa literalmente «caer». En contexto de combate puede implicar muerte, pero el griego conserva la expresión sobria «cayó» sin explicitar más. «Murió» interpretaría demasiado; «fue derribado» es posible, pero menos directo.
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los otros
  lexicon: LSJ
  rationale: λοιποί designa a los que quedan aparte del nombrado. «Los demás» es natural en español y mantiene la oposición narrativa con Judas.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron huyendo
  - escaparon
  lexicon: LSJ
  rationale: φεύγω en este contexto expresa huida ante el peligro. «Huyeron» conserva el tono grave y conciso del relato de batalla; «escaparon» podría sonar menos marcado por el miedo o la retirada.
translation_notes:
  revision_awareness: 'El texto griego es breve y coincide plenamente con el audit trail inglés: Judas cae y los demás huyen. No se introducen ampliaciones narrativas ni se suaviza la dureza del verbo de combate.'
  spanish_consistency_notes:
  - Se mantiene «Judas» como nombre propio según la convención bíblica habitual y el paralelismo con el inglés POB.
  - Se eligió «cayó» para conservar la ambigüedad respetuosa del griego; la nota explica la posible implicación de muerte.
  - «Los demás» y «huyeron» mantienen la simplicidad sintáctica del original y su tono de crónica militar.
