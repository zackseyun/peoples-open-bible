    issue: La frase «será culpable de su pecado» no preserva suficientemente el modismo hebreo «llevar/cargar con su pecado».
    rationale: El original usa וְנָשָׂא חֶטְאוֹ, y el POB inglés decidió mantener el modismo en el texto principal con aclaración en nota. La versión española debería hacer algo semejante en vez de sustituirlo por una explicación interpretativa en el cuerpo del texto.
  - severity: medium
    issue: La nota sobre el distributivo de אִישׁ אִישׁ está anclada al lugar equivocado.
    rationale: La nota [b] explica «Cualquier hombre / quienquiera», pero en el borrador aparece junto a «diciendo». Debe colocarse sobre la expresión que traduce el hebreo repetido «hombre, hombre».
  - severity: low
    issue: La combinación «culpable de su pecado» suena redundante en español.
    rationale: Aunque inteligible, no es la forma más idiomática ni más fuerte para un contexto legal-sacral. «Cargará con su pecado» mantiene mejor el tono bíblico-jurídico y evita la tautología.
  revised_spanish_text: 'Y hablarás a los hijos de Israel[a], diciendo: «Cualquier hombre[b] que maldiga a su Dios cargará con su pecado[c].»'
