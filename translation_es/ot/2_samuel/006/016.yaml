translation:
  language: es
  text: Cuando el arca de Yahvé venía a la ciudad de David[a], Mical, hija de Saúl, se asomó por la ventana y vio al rey David saltando y girando delante de Yahvé, y lo despreció en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «saltando y girando»; los verbos retratan un movimiento exuberante y celebratorio delante de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: As
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y aconteció que
  - Y sucedió que
  lexicon: HALOT
  rationale: La forma narrativa introduce una escena circunstancial. En español, «Cuando» transmite con naturalidad la simultaneidad/trasfondo del movimiento del arca sin volver la frase pesada.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahveh
  - el arca del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el sustantivo «arca» y se rinde el nombre divino como «Yahvé», conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: La transliteración estable del nombre divino en español del proyecto es «Yahvé», que preserva el nombre personal de Dios sin sustituirlo por un título.
- source_word: בָּא
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - iba entrando
  - llegaba
  lexicon: HALOT
  rationale: El imperfecto narrativo expresa acción en curso; «venía» reproduce ese aspecto mejor que un pretérito puntual.
- source_word: עִיר דָּוִד
  english_pob_choice: the city of David
  chosen_spanish: la ciudad de David
  alternatives_spanish:
  - la ciudad davídica
  lexicon: HALOT
  rationale: Se mantiene la designación estable del lugar sin innovaciones innecesarias.
- source_word: מִיכַל בַּת שָׁאוּל
  english_pob_choice: Michal daughter of Saul
  chosen_spanish: Mical, hija de Saúl
  alternatives_spanish:
  - Mical, la hija de Saúl
  lexicon: HALOT
  rationale: Se conserva la identificación aposicional y se adapta el nombre propio a la forma usual en español.
- source_word: נִשְׁקְפָה
  english_pob_choice: looked out
  chosen_spanish: se asomó
  alternatives_spanish:
  - miró hacia fuera
  - se puso a mirar
  lexicon: HALOT
  rationale: El verbo sugiere mirar desde un punto elevado o desde una abertura; «se asomó» expresa bien la acción desde la ventana y su orientación espacial.
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - desde la ventana
  lexicon: HALOT
  rationale: En español, con «asomarse» resulta natural «por la ventana», sin perder el matiz espacial del hebreo.
- source_word: וַתֵּרֶא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - miró
  lexicon: HALOT
  rationale: Se conserva el verbo simple de percepción visual, acorde con la secuencia narrativa.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: al rey David
  alternatives_spanish:
  - al rey, David
  - al rey David
  lexicon: HALOT
  rationale: 'El orden natural del español favorece la construcción con artículo y complemento directo: «al rey David».'
- source_word: מְפַזֵּז
  english_pob_choice: leaping
  chosen_spanish: saltando
  alternatives_spanish:
  - brincando
  - dando saltos
  lexicon: HALOT
  rationale: El verbo describe un movimiento exuberante y celebratorio. «Saltando» es natural en español y conserva la vivacidad del gesto.
- source_word: וּמְכַרְכֵּר
  english_pob_choice: whirling
  chosen_spanish: girando
  alternatives_spanish:
  - girando en derredor
  - dando vueltas
  lexicon: HALOT
  rationale: «Girando» preserva el movimiento circular del hebreo sin exagerar el color interpretativo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de» conserva la orientación espacial y ceremonial del original, manteniendo la referencia teológica a la presencia de Dios.
- source_word: וַתִּבֶז לוֹ
  english_pob_choice: she despised him
  chosen_spanish: lo despreció
  alternatives_spanish:
  - lo menospreció
  - lo tuvo en desprecio
  lexicon: HALOT
  rationale: «Despreció» reproduce la fuerza del verbo de menosprecio/aversión sin suavizarlo.
- source_word: בְּלִבָּהּ
  english_pob_choice: in her heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en lo íntimo de su ser
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo que señala la actitud interior, no una expresión pública.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como «Yahvé», manteniendo el nombre propio del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión de la acción de David delante de Yahvé
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: «Delante de Yahvé» mantiene la orientación pública y cultual de la danza, sin convertirla en una formulación más abstracta de la necesaria.
  doctrine_reference: 'DOCTRINE.md: Cultic posture and public action before God'
- issue: Contempt of Michal as inward posture
  english_pob_reading: she despised him in her heart
  chosen_spanish_reading: lo despreció en su corazón
  alternative_spanish_readings:
  - lo menospreció en su interior
  - en su corazón lo tuvo por nada
  rationale: Se conserva la idiomática hebrea del interior del corazón para evitar psicologizar o reinterpretar el juicio de Mical.
  doctrine_reference: 'DOCTRINE.md: Inner disposition and idiom preservation'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: no hubo cambios de revisión en el pasaje, y la versión final mantiene la decisión léxica central sobre los verbos de movimiento y el nombre divino, ajustándolos a un español natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la identificación «Mical, hija de Saúl» sin añadir interpretaciones.
  - Los verbos «saltando y girando» preservan la doble imagen del hebreo y quedan explicados en la nota.
  - Se mantiene el modismo «en su corazón» para el juicio interior de Mical.
