id: LUK.1.35
reference: Luke 1:35
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ ἄγγελος εἶπεν αὐτῇ· Πνεῦμα ἅγιον ἐπελεύσεται ἐπὶ σέ, καὶ δύναμις Ὑψίστου ἐπισκιάσει σοι· διὸ καὶ τὸ γεννώμενον ἅγιον κληθήσεται, υἱὸς θεοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/035.yaml
  text: And the angel answered and said to her[a], “The Holy Spirit will come upon you, and the power of the Most High will overshadow you[b]; therefore also the holy one being born will be called the Son of God.”
  footnotes:
  - marker: a
    text: Or “the child to be born.” The Greek phrase τὸ γεννώμενον is literally “the one being born” or “what is being born.”
    reason: lexical_alternative
  - marker: b
    text: “The Son of God” translates a Greek expression without the article before “Son,” but in context it functions as a title, not as an indefinite expression.
    reason: lexical_alternative
translation:
  language: ko
  text: 천사가 대답했습니다. 「성령이 당신 위에 임하시고 지극히 높으신 분의 능력이 당신을 덮으실 것입니다. 그러므로 태어날 거룩한 분은 하나님의 아들이라 일컬어질 것입니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 수태 고지의 「τὸ γεννώμενον ἅγιον … υἱὸς θεοῦ」
  chosen_reading: 태어날 거룩한 분은 하나님의 아들이라 일컬어질 것입니다
  alternative_readings:
  - 태어날 그 거룩한 아이는 하나님의 아들이라 불릴 것입니다
  - 태어날 자는 거룩하니, 하나님의 아들이라 불릴 것입니다
  rationale: 분사 구문 「τὸ γεννώμενον」을 무성격화된 「태어날 그것」으로 옮기지 않고 「태어날 거룩한 분」으로 인격화한다. 「υἱὸς θεοῦ」는 관사 없는 칭호적 용법이며, 본문은 그분의 신적 기원과 거룩성을 강조한다.
  doctrine_reference: 'DOCTRINE.md: Christological titles'
