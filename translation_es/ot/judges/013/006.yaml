translation:
  language: es
  text: 'Entonces la mujer vino y dijo a su esposo: «Un hombre de Dios vino a mí, y su aspecto era como el aspecto de un[a] ángel de Dios, muy temible[b]. No le pregunté de dónde era, y él no me dio a conocer su nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘mensajero de Dios’. El hebreo puede entenderse como una comparación con un enviado divino sin exigir que la mujer lo haya identificado plenamente en este punto.
    reason: alternative_reading
  - marker: b
    text: ‘Temible’ también puede expresarse como ‘impresionante’, ‘terrible’ o ‘sobrecogedor’; el hebreo comunica un aspecto que inspira intenso temor y reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En el contexto narrativo se trata de la esposa de Manoa, pero el hebreo usa simplemente el artículo con ‘mujer’. ‘La mujer’ preserva esa forma y suena natural en español.
- source_word: לְאִישָׁהּ
  english_pob_choice: to her husband
  chosen_spanish: a su esposo
  alternatives_spanish:
  - a su marido
  - a su hombre
  lexicon: HALOT
  rationale: El sufijo posesivo y el contexto marital muestran que אִישׁ aquí significa ‘esposo’. ‘Esposo’ es claro y dignificado en español.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - el hombre de Dios
  lexicon: HALOT
  rationale: El hebreo no lleva artículo en אִישׁ, así que el sentido es indefinido. ‘Un hombre de Dios’ conserva el título sin convertirlo prematuramente en identificación técnica.
- source_word: בָּא אֵלַי
  english_pob_choice: came to me
  chosen_spanish: vino a mí
  alternatives_spanish:
  - llegó a mí
  lexicon: HALOT
  rationale: El verbo בוא con la preposición אל expresa llegada/presencia hacia la hablante; ‘vino a mí’ es directo y fiel.
- source_word: וּמַרְאֵהוּ
  english_pob_choice: and his appearance
  chosen_spanish: y su aspecto
  alternatives_spanish:
  - y su apariencia
  - y su apariencia visible
  lexicon: HALOT
  rationale: מַרְאֶה puede referirse al aspecto visible. ‘Aspecto’ funciona bien en español y evita la repetición pesada de ‘apariencia’.
- source_word: כְּמַרְאֵה מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: was like the appearance of an angel of God
  chosen_spanish: como el aspecto de un mensajero de Dios
  alternatives_spanish:
  - como el aspecto de un ángel de Dios
  - como el aspecto del mensajero de Dios
  lexicon: HALOT
  rationale: ‘Mensajero’ mantiene el valor léxico de מַלְאָךְ sin decidir de manera cerrada entre ‘mensajero’ y ‘ángel’. Como el texto compara su apariencia con la de esa figura, la formulación conserva la tensión narrativa y evita sobredeterminar la identificación.
- source_word: מַלְאַךְ
  english_pob_choice: angel
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: HALOT
  rationale: Aunque en español ‘ángel’ es posible, ‘mensajero’ refleja mejor el rango semántico de מַלְאָךְ y preserva la ambigüedad del relato sobre la identidad de la figura.
- source_word: נוֹרָא מְאֹד
  english_pob_choice: very fearsome
  chosen_spanish: muy temible
  alternatives_spanish:
  - muy impresionante
  - muy terrible
  - muy temeroso
  lexicon: HALOT
  rationale: נוֹרָא expresa algo que inspira temor o sobrecogimiento. ‘Temible’ conserva ese peso, más cercano al registro bíblico que ‘impresionante’.
- source_word: וְלֹא שְׁאִלְתִּיהוּ
  english_pob_choice: I did not ask him
  chosen_spanish: No le pregunté
  alternatives_spanish:
  - No lo interrogué
  lexicon: HALOT
  rationale: 'El verbo שאל seguido de objeto directo se resuelve naturalmente como ‘preguntar’. El objeto pronominal se adapta al español con dativo: ‘le’.'
- source_word: אֵי מִזֶּה הוּא
  english_pob_choice: where he was from
  chosen_spanish: de dónde era
  alternatives_spanish:
  - de qué lugar era
  - de dónde venía
  lexicon: HALOT
  rationale: La expresión idiomática pide origen/procedencia. ‘De dónde era’ comunica bien esa idea en conversación reportada.
- source_word: וְאֶת שְׁמ֖וֹ לֹא הִגִּ֥יד לִי
  english_pob_choice: and he did not tell me his name
  chosen_spanish: y él no me dio a conocer su nombre
  alternatives_spanish:
  - y no me dijo su nombre
  - y no me reveló su nombre
  lexicon: HALOT
  rationale: הִגִּיד puede significar ‘decir, dar a conocer’. ‘Dar a conocer su nombre’ preserva el matiz de comunicar/manifestar, un poco más formal y cercano al hebreo que un simple ‘dijo’.
theological_decisions:
- issue: Cómo traducir מַלְאַךְ הָאֱלֹהִים sin resolver de antemano la identidad del visitante
  english_pob_reading: an angel of God; the Hebrew can be understood as a comparison to a divine messenger without requiring the woman to have fully identified him at this point
  chosen_spanish_reading: un mensajero de Dios, manteniendo la comparación abierta
  alternative_spanish_readings:
  - un ángel de Dios
  - el ángel de Dios
  rationale: La POB inglesa preserva la posibilidad de leer la frase como comparación con un mensajero divino, sin forzar todavía una identificación completa. ‘Mensajero de Dios’ conserva esa tensión y evita cerrar el sentido en una sola dirección.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que afinó la referencia a ‘an angel of God’ para reflejar la ausencia de artículo en hebreo y evitar una sobreespecificación. La versión española conserva esa cautela mediante ‘un mensajero de Dios’ y una nota alternativa que permite ‘ángel de Dios’.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֱלֹהִים, en coherencia con el proyecto.
  - Se evita ‘SEÑOR’ porque aquí no aparece el tetragrámaton.
  - ‘Mensajero’ se usa solo por la ambigüedad de מַלְאָךְ en este contexto; no pretende normalizar el término en toda la obra.
  - La puntuación dialogal y la comilla de apertura siguen el uso español moderno y legible.
