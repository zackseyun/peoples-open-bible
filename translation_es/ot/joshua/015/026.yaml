  glossary_alignment: No hay términos teológicos del glosario principal implicados. En nombres propios, el proyecto favorece transliteración estable y auditada; por eso «Moladah» se alinea mejor que «Moladá». La nota sobre «Shemah» puede mantenerse como alternativa transliterativa.
