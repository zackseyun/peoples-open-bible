translation:
  language: es
  text: 'No digas: «¿Por qué fueron mejores los días anteriores que estos?»[a] Porque esto no procede de la sabiduría: preguntas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Qué fue que los días anteriores fueron mejores que estos?», un modismo que significa «¿Por qué fueron mejores los días anteriores que estos?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Porque esto no procede de la sabiduría: has preguntado acerca de esto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No digas nunca
  - No vayas a decir
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa una prohibición dirigida a la segunda persona masculina singular. «No digas» reproduce con naturalidad la fuerza imperativa sin añadir énfasis no explícito en el hebreo.
- source_word: מֶה הָיָה
  english_pob_choice: Why were
  chosen_spanish: ¿Por qué fueron?
  alternatives_spanish:
  - ¿Qué fue?
  - ¿Cómo fue que fueron?
  lexicon: HALOT
  rationale: La construcción funciona idiomáticamente como una pregunta por la causa o el motivo. En español, «¿Por qué fueron?» comunica mejor ese sentido que una versión literal como «¿qué fue?».
- source_word: הַיָּמִים הָרִאשֹׁנִים
  english_pob_choice: the former days
  chosen_spanish: los días primeros
  alternatives_spanish:
  - los días antiguos
  - los días de antes
  lexicon: HALOT
  rationale: La frase se refiere a tiempos anteriores. «Los días primeros» conserva la referencia temporal comparativa y suena natural en español, aunque «los días antiguos» también sería posible.
- source_word: טוֹבִים מֵאֵלֶּה
  english_pob_choice: better than these
  chosen_spanish: mejores que estos
  alternatives_spanish:
  - más buenos que estos
  - mejores que los de ahora
  lexicon: HALOT
  rationale: El comparativo es directo. «Mejores que estos» mantiene la relación de comparación sin introducir elementos no presentes en el hebreo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la prohibición. «Porque» expresa con claridad la relación explicativa en español.
- source_word: לֹא מֵחָכְמָה
  english_pob_choice: it is not from wisdom
  chosen_spanish: no es con sabiduría
  alternatives_spanish:
  - no procede de sabiduría
  - no nace de sabiduría
  lexicon: HALOT
  rationale: La preposición מִן señala origen o base. En español, «no es con sabiduría» transmite de modo natural que la pregunta no surge de una disposición sabia, sin perder la idea de fuente/basis.
- source_word: שָׁאַלְתָּ
  english_pob_choice: you ask
  chosen_spanish: preguntas
  alternatives_spanish:
  - has preguntado
  - inquieres
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en perfecto, en este proverbio funciona de manera gnómica/general. El presente «preguntas» expresa mejor la validez proverbial del enunciado.
- source_word: עַל זֶה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - sobre esto
  - acerca de esto
  lexicon: HALOT
  rationale: Después de «preguntas», el objeto puede quedar simplemente como «esto» en español, preservando la concisión del hebreo y la fluidez natural.
theological_decisions:
- issue: La insinuación de que los tiempos pasados fueron mejores
  english_pob_reading: The verse rebukes the rhetorical nostalgia implied by asking why earlier days were better than these.
  chosen_spanish_reading: El versículo reprende la nostalgia retórica de pensar que los días anteriores fueron mejores que los presentes.
  alternative_spanish_readings:
  - El versículo condena la idealización del pasado.
  - El versículo prohíbe comparar de forma descontenta el pasado con el presente.
  rationale: El hebreo presenta una advertencia sapiencial contra una pregunta motivada no por discernimiento sino por nostalgia desordenada. La redacción española debe conservar ese tono de reprensión, no suavizarlo ni volverlo meramente descriptivo.
  doctrine_reference: Sabiduría sapiencial; discernimiento frente a la nostalgia (Eclesiastés 7:10)
translation_notes:
  revision_awareness: 'Se siguió de cerca el valor idiomático del hebreo y el audit trail inglés: la pregunta retórica se vertió de manera natural en español, y la cláusula final mantiene la idea de origen en sabiduría sin forzar una literalidad extraña.'
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה, en coherencia con el uso sapiencial del libro.
  - Se optó por «días primeros» para conservar el matiz de anterioridad sin caer en un arcaísmo innecesario.
  - Se usó el presente gnómico «preguntas» para reflejar el valor proverbial del hebreo perfecto en este contexto.
