review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: el mandato enfático de diezmar, el alcance de ''todo el producto'', la imagen literal de lo que sale del campo, y la recurrencia anual. Sin embargo, dos elecciones en español suenan poco naturales o levemente imprecisas para lectura bíblica fluida: ''Ciertamente diezmarás'' no es la mejor manera de expresar el infinitivo absoluto enfático en español, y ''que salga del campo'' usa un subjuntivo menos adecuado que una relativa indicativa (''que sale'').'
  spanish_quality_summary: El texto es mayormente claro, pero necesita un ajuste de naturalidad y dignidad estilística. 'Sin falta diezmarás' comunica mejor la intensificación que 'Ciertamente diezmarás', y 'que sale del campo' suena más directo y fiel que 'que salga del campo'. El resto ('producto', 'tu semilla', 'año tras año') es legible y aceptable en español neutro eclesial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Diezmar' es apropiado para עַשֵּׂר תְּעַשֵּׂר. 'Tu semilla' preserva la imagen fuente, conforme a la decisión léxica auditada. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías, espíritu, etc.
  issues:
  - severity: medium
    issue: La frase 'Ciertamente diezmarás' suena forzada en español bíblico moderno.
    rationale: Aunque intenta conservar la intensificación del infinitivo absoluto, 'ciertamente' con futuro aquí no es la opción más natural ni idiomática. 'Sin falta diezmarás' o 'deberás diezmar' comunican mejor la fuerza del mandato; la primera además preserva mejor el énfasis formal del hebreo.
  - severity: low
    issue: '''Que salga del campo'' emplea subjuntivo donde el hebreo y la sintaxis española piden mejor indicativo.'
    rationale: La relativa describe un referente real y definido ('todo el producto ... que sale del campo'), no una finalidad o posibilidad. 'Que sale del campo' es más natural y más cercano a la expresión fuente.
  - severity: low
    issue: La nota al pie tiene comillas innecesarias y una puntuación poco pulida.
    rationale: 'Conviene presentar la alternativa de forma limpia en español editorial: ''O, de manera más dinámica: «Debes diezmar todo el producto que tu campo da cada año».'''
  revised_spanish_text: Sin falta diezmarás[a] todo el producto de tu semilla que sale del campo, año tras año.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Debes diezmar todo el producto que tu campo da cada año».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión del mandato enfático para un español más natural y digno, preservando la intensificación del hebreo; se cambia el subjuntivo a indicativo en la relativa para mayor fidelidad sintáctica y claridad; y se pule la nota al pie sin alterar su contenido sustancial.
