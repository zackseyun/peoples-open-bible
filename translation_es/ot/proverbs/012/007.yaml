    rationale: El hebreo literal es «y no son» y el inglés POB escogió «are no more». En español, «ya no están» o «ya no son más» conserva mejor la idea de desaparición/ruina en registro sapiencial. «Ya no existen» no es incorrecto, pero es menos idiomático aquí.
  revised_spanish_text: Los malvados son derribados y ya no están[b], pero la casa[a] de los justos permanecerá.
