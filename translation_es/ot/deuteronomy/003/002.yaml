  to: 'Yahvé me dijo: «No le temas, porque lo he entregado en tu mano[a], a él, a todo su pueblo y a su tierra; y harás con él[b] tal como hiciste con Sehón, rey de los amorreos, que habitaba en Hesbón».'
  rationale: Se revisa para conservar el sentido exacto del hebreo y de la auditoría inglesa, pero en español natural y digno. Se eliminan calcos innecesarios ('dijo a mí', 'No temas a él', 'he puesto a él'), se mantiene la imagen 'en tu mano', y se ajusta el gentilicio a 'rey de los amorreos', que comunica mejor la referencia del texto fuente. También se simplifican las notas para que sirvan a verdaderas ambigüedades o decisiones léxicas significativas.
