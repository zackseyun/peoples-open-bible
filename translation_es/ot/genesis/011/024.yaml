translation:
  language: es
  text: Nahor vivió veintinueve años y engendró a Taré.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa el lapso de vida hasta el siguiente evento; en español, "vivió" reproduce de manera natural ese uso idiomático sin añadir matices ajenos.
- source_word: נָחוֹר
  english_pob_choice: Nahor
  chosen_spanish: Nahor
  alternatives_spanish:
  - Nacor
  lexicon: convención de transliteración
  rationale: Se mantiene el nombre propio en transliteración directa desde el hebreo. Aunque existe la forma tradicional "Nacor", "Nahor" conserva mejor la forma del texto fuente y coincide con la política de transliterar nombres.
- source_word: תֵּשַׁע וְעֶשְׂרִים שָׁנָה
  english_pob_choice: twenty-nine years
  chosen_spanish: veintinueve años
  alternatives_spanish:
  - nueve y veinte años
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'nueve y veinte año', pero en español la forma idiomática y clara es "veintinueve años". Se conserva el valor numérico sin calco innecesario.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo como hijo a
  lexicon: HALOT
  rationale: En genealogías, ילד en hifil indica la acción de dar origen a un descendiente. "Engendró" mantiene la fuerza genealógica y la brevedad del original; "fue padre de" es más explicativo, pero menos directo.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce de manera independiente]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente autónomo en español y queda absorbido por el orden normal de la oración.
- source_word: תָּרַח
  english_pob_choice: Terah
  chosen_spanish: Taré
  alternatives_spanish:
  - Teraj
  lexicon: convención bíblica española
  rationale: Se usa la forma española asentada "Taré", ampliamente reconocible en biblias en español, para mantener legibilidad y continuidad con el uso bíblico hispano.
translation_notes:
  revision_awareness: El texto inglés POB no presenta notas ni revisiones aplicadas en este versículo; el borrador español sigue directamente el acuerdo alto del audit trail y conserva la estructura genealógica simple del hebreo.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y genealogico propio de listas patriarcales.
  - No se introduce un equivalente artificioso para el marcador de objeto directo.
  - Los nombres propios se tratan con una combinación de transliteración fiel y forma española asentada cuando esta favorece la lectura pública.
