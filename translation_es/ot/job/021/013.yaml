translation:
  language: es
  text: Pasan sus días en prosperidad[a], y en un momento descienden a Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el sepulcro', 'el reino de los muertos' o 'la muerte'. El hebreo dice Sheol.
    reason: lexical_alternative
lexical_decisions:
- source_word: יבלו
  english_pob_choice: they spend
  chosen_spanish: pasan
  alternatives_spanish:
  - gastan
  - transcurren
  - pasan sus días
  lexicon: HALOT
  rationale: El hebreo expresa que los días se consumen o transcurren. En español, 'pasan' comunica de forma natural ese transcurrir temporal sin forzar una imagen innecesariamente mecánica. Se mantiene el valor durativo del verbo dentro del contexto.
- source_word: בַטּוֹב
  english_pob_choice: in prosperity
  chosen_spanish: en prosperidad
  alternatives_spanish:
  - en el bien
  - en bienestar
  - en felicidad
  lexicon: HALOT
  rationale: Aunque el sentido básico es 'bueno', aquí el contexto de los impíos favorecidos apunta a una condición de bienestar material o tranquilidad. 'Prosperidad' refleja ese sentido contextual con naturalidad en español.
- source_word: יְמֵיהֶם
  english_pob_choice: their days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de ellos
  - su vida
  lexicon: HALOT
  rationale: Es una correspondencia directa y conserva la expresión temporal hebrea sin ampliarla a 'vida'.
- source_word: וּבְרֶגַע
  english_pob_choice: and in a moment
  chosen_spanish: y en un momento
  alternatives_spanish:
  - y de repente
  - y en un instante
  lexicon: HALOT
  rationale: '''Régua'' indica un instante breve. ''En un momento'' preserva la medida temporal y el contraste con la duración previa de prosperidad.'
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera para conservar el término hebreo y su carga conceptual propia, sin resolverlo prematuramente con un equivalente más estrecho. Así se mantiene la transparencia al texto fuente.
- source_word: יֵחָתּוּ
  english_pob_choice: they go down
  chosen_spanish: descienden
  alternatives_spanish:
  - bajan
  - son llevados abajo
  - caen
  lexicon: HALOT
  rationale: El verbo, en este paralelo con Sheol, se entiende mejor como movimiento hacia abajo. 'Descienden' reproduce la imagen de descenso con mayor precisión que una simple 'caída' y suena natural en español.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - la tumba
  - el reino de los muertos
  - la muerte
  rationale: La opción transliterada preserva la tensión lexical y teológica del término hebreo. Evita cerrar el sentido en una sola noción posterior o tradicional, manteniendo la amplitud del concepto bíblico original.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El contexto auditado en inglés fue revisado y no muestra cambios aplicados; el presente borrador sigue de cerca la lectura aprobada, con ajuste natural al español y conservación de Sheol como transliteración.
  spanish_consistency_notes:
  - Se mantuvo 'Sheol' para la coherencia terminológica con el proyecto y con la decisión inglesa de no sustituirlo por un equivalente interpretativo fijo.
  - '''Prosperidad'' traduce el valor contextual de טוב en este versículo, sin perder la literalidad necesaria para una lectura bíblica transparente.'
  - La construcción verbal en plural ('pasan', 'descienden') respeta el sujeto plural del hebreo.
