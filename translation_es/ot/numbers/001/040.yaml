    text: 'Hebreo literalmente: «todo el que sale a la guerra», un modismo para los que eran elegibles para el servicio militar.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura formular del hebreo y del POB auditado, pero se hacen dos ajustes menores: «de veinte años en adelante» mejora la naturalidad de וָמַעְלָה en español, y «todo varón» preserva la explicitación contextual masculina ya documentada por el POB inglés para כֹּל יֹצֵא צָבָא. La nota se mantiene como alternativa literal hebrea y explicación del modismo militar.'
