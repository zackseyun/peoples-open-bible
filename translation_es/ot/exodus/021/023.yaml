translation:
  language: es
  text: Pero si hay daño[a], entonces darás vida por vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grave daño», «lesión grave» o «fatalidad»; el hebreo puede designar un daño serio, un desastre o incluso la muerte, y los intérpretes discrepan sobre si el contexto implica lesión en general o muerte en particular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En este contexto legal, la partícula introduce una condición con contraste respecto del caso anterior. «Pero si» conserva ese matiz adversativo de manera natural en español.
- source_word: אָסוֹן
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - grave daño
  - desgracia
  - lesión grave
  - fatalidad
  lexicon: HALOT
  rationale: El término hebreo puede abarcar daño grave, desastre o desgracia sin precisar aquí si el resultado es letal. «Daño» mantiene la amplitud semántica sin cerrar la tensión interpretativa.
- source_word: יִהְיֶה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - ocurre
  - se produce
  - llega a haber
  lexicon: HALOT
  rationale: La construcción existencial se expresa de modo idiomático en español con «hay», que refleja bien la simple cláusula condicional del hebreo.
- source_word: וְנָתַתָּה
  english_pob_choice: then you shall give
  chosen_spanish: entonces darás
  alternatives_spanish:
  - entonces pagarás
  - entonces entregarás
  lexicon: HALOT
  rationale: נָתַן significa literalmente «dar». En esta fórmula legal, «darás» preserva la forma verbal y la equivalencia jurídica sin reducirla a una compensación monetaria explícita.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - persona
  lexicon: HALOT
  rationale: En la expresión legal נֶפֶשׁ תַּחַת נָפֶשׁ, el sentido es «vida», no el más abstracto «alma». «Vida por vida» conserva la simetría forense del hebreo.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - en vez de
  - a cambio de
  lexicon: HALOT
  rationale: En lenguaje taliónico, la preposición marca sustitución o equivalencia. «Por» es la forma española más breve y estable para esta fórmula legal.
- source_word: נָפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - persona
  lexicon: HALOT
  rationale: Se repite el mismo valor léxico para conservar la correspondencia exacta y la simetría jurídica del hebreo.
theological_decisions:
- issue: Alcance de אָסוֹן en esta norma
  english_pob_reading: Render broadly as 'harm' without specifying whether the harm is to the woman, the child, or whether it is necessarily fatal.
  chosen_spanish_reading: Traducir de manera amplia como «daño», sin precisar si es lesión, desgracia o muerte.
  alternative_spanish_readings:
  - lesión grave
  - fatalidad
  - desgracia
  rationale: El versículo no determina por sí mismo la clase exacta de daño. Mantener un término amplio en español preserva la tensión interpretativa del pasaje y evita resolver una cuestión debatida por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final del texto fuente y del audit trail inglés quedó sin modificaciones respecto del pase aprobado.
  spanish_consistency_notes:
  - Se usa «vida» en ambos miembros de la fórmula para conservar la simetría del hebreo נֶפֶשׁ תַּחַת נָפֶשׁ.
  - Se prefiere «daño» en lugar de una especificación más fuerte para no resolver la ambigüedad del término אָסוֹן.
  - La construcción «Pero si» mantiene el contraste contextual del hebreo וְאִם de acuerdo con el audit trail inglés.
  - No se introduce terminología eclesiástica tradicional innecesaria; el registro es jurídico y transparente.
