translation:
  language: es
  text: Entonces el rey mandó[a], y ellos hicieron un cofre[b] y lo pusieron afuera, a la puerta de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ordenó»; el hebreo literalmente dice «dijo», pero aquí el verbo funciona con la fuerza de una instrucción real.
    reason: lexical_alternative
  - marker: b
    text: O «caja»; אֲרוֹן puede designar un recipiente o cofre. «Cofre» evita confundirlo con el arca del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - dijo
  - ordenó
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dijo», pero en este contexto administrativo la acción resultante es una orden. «Mandó» conserva esa fuerza pragmática sin volver la frase pesada.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del sustantivo definido.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - prepararon
  - fabricaron
  lexicon: HALOT
  rationale: עשה aquí expresa la fabricación de un objeto físico. «Hicieron» comunica ese sentido de manera natural en español.
- source_word: אֲרוֹן אֶחָד
  english_pob_choice: a chest
  chosen_spanish: un cofre
  alternatives_spanish:
  - una caja
  - un arca
  lexicon: HALOT
  rationale: אֲרוֹן designa un recipiente o cofre, no el arca del pacto. «Cofre» evita la ambigüedad de «arca» y mantiene el valor de contenedor; el indefinido «un» refleja bien la función de un receptáculo designado, sin forzar en español la literalidad de «uno».
- source_word: וַיִּתְּנֻהוּ
  english_pob_choice: set it
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo colocaron
  - lo dejaron
  lexicon: HALOT
  rationale: נתן, en este contexto, significa poner o colocar. «Lo pusieron» es claro y fiel al acto físico descrito.
- source_word: בְּשַׁעַר
  english_pob_choice: at the gate
  chosen_spanish: a la puerta
  alternatives_spanish:
  - en la puerta
  - junto a la puerta
  lexicon: HALOT
  rationale: En español bíblico y moderno, «puerta» comunica bien la entrada o acceso del recinto. «A la puerta» refleja la localización sin sonar forzado.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se sigue el término POB para el nombre divino, «Yahvé», y «casa» mantiene la imagen concreta del hebreo sin sustituirla por «templo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre del pacto según el criterio del proyecto: «Yahvé».'
- source_word: חוּצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: La partícula adverbial indica ubicación exterior. «Afuera» es natural en español y comunica bien que el cofre quedó fuera del edificio/santuario.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrama directamente; el proyecto pide transliterarlo como «Yahvé» en el cuerpo del texto, preservando el nombre del pacto en lugar de ocultarlo con una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אֲרוֹן אֶחָד
  english_pob_reading: a chest / one chest
  chosen_spanish_reading: un cofre
  alternative_spanish_readings:
  - un arca
  - una caja
  - un solo cofre
  rationale: La POB inglesa oscila entre la naturalidad de «a chest» y la posible énfasis de «one chest». En español, el artículo indefinido basta para el objeto singular; añadir «uno/solo» sería posible, pero suena más marcado de lo que exige el verso.
  doctrine_reference: 'DOCTRINE.md: Lexical precision in concrete nouns'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de «one chest» a «a chest» para naturalidad, manteniendo el valor singular de אֶחָד. La versión española sigue esa misma línea: usa el indefinido «un cofre» sin añadir un énfasis artificial en «uno», y conserva la idea de colocación exterior en la puerta de la casa de Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Casa» se conserva donde el hebreo dice בֵּית, sin sustituir por «templo» salvo que el contexto lo exigiera.
  - Se evita «arca» para אֲרוֹן, porque en español puede sugerir el arca del pacto y no un cofre de recolección.
