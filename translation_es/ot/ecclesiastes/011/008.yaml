translation:
  language: es
  text: Porque si un hombre vive muchos años, que se alegre en todos ellos; pero que recuerde los días de oscuridad, porque serán muchos. Todo lo que llega es vapor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo lo que llega es aliento», o tradicionalmente «vanidad». El hebreo hebel es un término recurrente en Eclesiastés para lo que es pasajero, insustancial o evasivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Y si
  - Pues si
  lexicon: HALOT
  rationale: La combinación introduce una condición con fuerza explicativa; «Porque si» conserva ese doble valor de enlace y condición en un español natural y sobrio.
- source_word: שָׁנִים הַרְבֵּה
  english_pob_choice: many years
  chosen_spanish: muchos años
  alternatives_spanish:
  - gran cantidad de años
  - largos años
  lexicon: HALOT
  rationale: El hebreo alude a una vida prolongada. «Muchos años» es la forma más natural y fiel en español.
- source_word: הָאָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el hombre
  - la gente
  lexicon: HALOT
  rationale: El singular hebreo es genérico y representativo. Se mantiene «un hombre» para respetar la forma masculina del מקור, entendida de manera general para la humanidad.
- source_word: בְּכֻלָּם
  english_pob_choice: in them all
  chosen_spanish: en todos ellos
  alternatives_spanish:
  - en todos
  - a través de todos ellos
  lexicon: HALOT
  rationale: La referencia vuelve a los muchos años. «En todos ellos» es idiomático en español y conserva el valor preposicional sin ampliar el sentido.
- source_word: יִשְׂמָח
  english_pob_choice: let him rejoice
  chosen_spanish: que se alegre
  alternatives_spanish:
  - que se regocije
  - que goce
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza exhortativa; «que se alegre» transmite bien el tono de recomendación sin sonar forzado.
- source_word: וְיִזְכֹּר
  english_pob_choice: but let him remember
  chosen_spanish: pero que recuerde
  alternatives_spanish:
  - y que recuerde
  - sin embargo, que recuerde
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el contexto es contrastivo. «Pero» expresa mejor la oposición discursiva entre gozo y memoria.
- source_word: יְמֵי הַחֹשֶׁךְ
  english_pob_choice: the days of darkness
  chosen_spanish: los días de oscuridad
  alternatives_spanish:
  - los días de tinieblas
  - los días oscuros
  lexicon: HALOT
  rationale: 'Se mantiene la metáfora literal para no cerrar su alcance poético: puede aludir a aflicción, vejez, muerte o sepulcro. «Oscuridad» conserva el valor imagístico.'
- source_word: כִּי הַרְבֵּה יִהְי֖וּ
  english_pob_choice: for they will be many
  chosen_spanish: porque serán muchos
  alternatives_spanish:
  - pues serán muchos
  - porque muchos serán
  lexicon: HALOT
  rationale: El pronombre está implícito en español y se refiere a los días de oscuridad. La frase mantiene la explicación causal de manera clara y directa.
- source_word: כָּל שֶׁבָּא
  english_pob_choice: All that comes
  chosen_spanish: Todo lo que viene
  alternatives_spanish:
  - Todo cuanto viene
  - Todo lo que ha de venir
  lexicon: HALOT
  rationale: La fórmula es amplia y gnómica. «Todo lo que viene» preserva el carácter general sin estrechar el referente.
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vaho
  - aliento
  - vanidad
  lexicon: HALOT
  rationale: Se conserva el término clave de Eclesiastés con su metáfora de fugacidad e insustancialidad. «Vapor» es más fiel al sustrato imagético que «vanidad».
theological_decisions:
- issue: Masculino genérico en הָאָדָם
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - uno
  - la humanidad
  rationale: Se mantiene el masculino singular representativo del hebreo sin convertirlo en una abstracción neutra que borre la forma original. La oración sigue siendo aplicable de modo general.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם adam'
- issue: Traducción de הָבֶל en Eclesiastés
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - aliento
  - fugacidad
  rationale: Se preserva la imagen concreta de lo efímero e insustancial. «Vapor» evita la carga interpretativa de «vanidad» y mantiene la coherencia del motivo en Eclesiastés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'La redacción sigue la lectura final del inglés auditado: «All that comes is vapor» se refleja como «Todo lo que viene es vapor», manteniendo el ajuste de registro señalado en la revisión más reciente y conservando la metáfora de הָבֶל.'
  spanish_consistency_notes:
  - Se mantiene «vapor» para הָבֶל como término clave coherente con Eclesiastés.
  - Se conserva el contraste entre gozo y memoria con «pero».
  - Se usa puntuación y mayúsculas propias del español, con tono digno y publicable.
  - La nota al pie se ancla en «se alegre» para señalar una alternativa verbal legítima sin alterar el texto principal.
