  spanish_quality_summary: 'El español es claro, natural y digno. ''Enfermedades mortales'', ''sepultados'', ''consumidos'', ''cadáveres'' y ''bestias de la tierra'' funcionan bien. El único problema real es técnico-editorial: la ubicación de [b] debe moverse a la frase espacial correspondiente para que la nota sea inteligible.'
