review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la disposición espacial del hebreo: mesa fuera del velo, menorá frente a la mesa, en el lado sur del tabernáculo, y la mesa en el lado norte. Sin embargo, «candelabro» no preserva tan bien como «lampadario» o mejor «soporte para lámparas/lámpara» el referente de מְנֹרָה, ya que introduce velas/candelas ajenas al contexto del tabernáculo. También conviene mejorar «al lado sur/norte» a «en el lado sur/norte» o «en el costado sur/norte» para reflejar ubicación sobre un lado del recinto, no mera proximidad.'
  spanish_quality_summary: El español es claro y legible, pero «candelabro» puede inducir una imagen anacrónica o imprecisa. «En el lado sur del tabernáculo» y «en el lado norte» suenan más naturales y exactos que «al lado sur/norte». El resto del verso mantiene un registro digno y fluido.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto (Yahvé, Mesías, etc.). La principal cuestión léxica es הַמְּנֹרָה: aunque el inglés auditado usa ''lampstand'', el español draft escogió «candelabro», que no sigue de cerca esa decisión semántica. Se recomienda «el candelero» como equivalente bíblico tradicional y comprensible, o alternativamente «el soporte para lámparas».'
  issues:
  - severity: medium
    issue: «candelabro» para הַמְּנֹרָה
    rationale: La menorá del tabernáculo es un soporte de lámparas de aceite, no un candelabro de velas. El inglés POB explicitó 'lampstand' precisamente para preservar el sentido. En español, «candelero» reproduce mejor la referencia cultual tradicional sin transliterar.
  - severity: low
    issue: «al lado sur / al lado norte»
    rationale: Puede entenderse como 'junto al lado sur' más que 'en el lado sur'. El hebreo עַל צֶלַע indica ubicación en el costado/lado del tabernáculo. «En el lado sur» y «en el lado norte» son más precisos e idiomáticos.
  revised_spanish_text: Y pondrás la mesa fuera del velo[a], y el candelero[b] frente a la mesa, en el lado sur del tabernáculo; y pondrás la mesa en el lado norte.
  revised_footnotes:
  - marker: a
    text: O «fuera de la cortina». פָּרֹכֶת nombra la partición interior del tabernáculo; «velo» se conserva por ser el equivalente tradicional más específico en español.
    reason: lexical_alternative
  - marker: b
    text: Hebreo menorá; se traduce aquí por «candelero» para expresar en español el soporte de lámparas, en lugar de transliterar el término.
    reason: cultural_note
  revision_rationale: Se ajusta «candelabro» a «candelero» para conservar mejor el sentido de מְנֹרָה y alinearse con la decisión auditada de traducir el objeto como soporte de lámparas, no por transliteración. También se mejora la precisión espacial con «en el lado sur/norte».
