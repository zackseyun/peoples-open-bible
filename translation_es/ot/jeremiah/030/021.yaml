base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/030/021.yaml
  text: His ruler will be one of them[a], and his governor will come out from his midst. I will bring him near, and he will approach me[c][b], for who is this who has pledged his heart to approach me? declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'his noble one'; the Hebrew term can denote a prominent, mighty, or noble leader.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among them' for 'one of them'; the Hebrew expression indicates that the leader arises from the people themselves.
    reason: lexical_alternative
  - marker: c
    text: Or 'who has dared in his heart to approach me?' The Hebrew idiom literally speaks of pledging or staking one's heart.
    reason: alternative_reading
