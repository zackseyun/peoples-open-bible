  - severity: low
    issue: «Heth» suena anglicado y menos natural que «Het» en español.
    rationale: Aunque el referente es correcto, la forma «Het» es más legible para lectores hispanos y sigue mejor una transliteración española sobria sin expansión interpretativa.
  revised_spanish_text: Y Canaán engendró a Sidón, su primogénito, y a Het[a].
