translation:
  language: es
  text: Entonces fueron aplastados[a] a la vez el hierro, el barro, el bronce, la plata y el oro, y llegaron a ser como tamo[b] de las eras de verano; el viento los llevó, de modo que no se halló lugar para ellos. Pero la piedra que golpeó la estatua se convirtió en un gran monte y llenó toda la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''juntos'' o ''como uno'' para la expresión ''a la vez''.'
    reason: lexical_alternative
  - marker: b
    text: O 'polvo'; la imagen aramea es la de un residuo ligero de la trilla, por eso se eligió 'tamo'.
    reason: lexical_alternative
  - marker: c
    text: '''Tierra'' también podría verterse ''país'' o ''territorio'', pero el alcance de la visión favorece la traducción amplia.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcar la secuencia narrativa con un adverbio natural en español; 'Entonces' conserva el valor discursivo de transición inmediata sin añadir interpretación.
- source_word: דָּקוּ
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron triturados
  - fueron quebrados
  lexicon: HALOT
  rationale: El verbo pasivo expresa la destrucción por fuerza. 'Aplastados' comunica bien la reducción violenta de los materiales y funciona con la imagen posterior de paja.
- source_word: כַחֲדָה
  english_pob_choice: all at once
  chosen_spanish: a la vez
  alternatives_spanish:
  - todos juntos
  - de un solo golpe
  lexicon: HALOT
  rationale: La expresión aramea indica simultaneidad/unidad. 'A la vez' preserva ese sentido en un español fluido; la idea de repentinidad queda implícita en el contexto.
- source_word: פַּרְזְלָא
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - el metal
  - el hierro de la estatua
  lexicon: HALOT
  rationale: Material concreto de la estatua; se mantiene el sustantivo directo y definido.
- source_word: חַסְפָּא
  english_pob_choice: the clay
  chosen_spanish: el barro
  alternatives_spanish:
  - la arcilla
  - el lodo
  lexicon: HALOT
  rationale: Aunque la forma puede referirse a arcilla/barro, en español 'barro' comunica con mayor naturalidad la fragilidad material de la estatua; se evita un tecnicismo innecesario. La imagen es la de un material terroso quebradizo.
- source_word: נְחָשָׁא
  english_pob_choice: the bronze
  chosen_spanish: el bronce
  alternatives_spanish:
  - el cobre
  lexicon: HALOT
  rationale: Se conserva el equivalente tradicional y contextual en la secuencia de metales; 'bronce' es la opción más natural para español bíblico moderno.
- source_word: כַּסְפָּא
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata refinada
  lexicon: HALOT
  rationale: Término directo del material; 'plata' es la forma natural en español.
- source_word: וְדַהֲבָא
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el oro puro
  lexicon: HALOT
  rationale: Se mantiene el material precioso correspondiente en la serie de metales.
- source_word: וַהֲווֹ כְּעוּר
  english_pob_choice: and became like chaff
  chosen_spanish: y llegaron a ser como paja
  alternatives_spanish:
  - y fueron como polvo
  - y se volvieron como tamo
  lexicon: HALOT
  rationale: La comparación apunta a residuo agrícola ligero fácilmente dispersable. 'Paja' es comprensible y natural en español; se evita 'tamo' por ser más técnico o regional, aunque 'tamo' es una alternativa posible.
- source_word: אִדְּרֵי קַיִט
  english_pob_choice: the summer threshing floors
  chosen_spanish: de las eras de verano
  alternatives_spanish:
  - de las eras en verano
  - de las eras estivales
  lexicon: HALOT
  rationale: Reproduce la imagen agrícola con una formulación idiomática y clara en español; 'eras de verano' conserva el vínculo con la temporada seca de trilla.
- source_word: וּנְשָׂא הִמּוֹן רוּחָא
  english_pob_choice: and the wind carried them away
  chosen_spanish: el viento los llevó
  alternatives_spanish:
  - el viento los arrastró
  - el viento los dispersó
  lexicon: HALOT
  rationale: La construcción verbal se expresa de manera natural en español. 'Llevó' refleja el movimiento causado por el viento sin sobredeterminar la imagen.
- source_word: וְכָל אֲתַר לָא הִשְׁתֲּכַח לְהוֹן
  english_pob_choice: so that no place was found for them
  chosen_spanish: y no se halló lugar para ellos
  alternatives_spanish:
  - y no se encontró lugar para ellos
  - y ningún lugar quedó para ellos
  lexicon: HALOT
  rationale: Mantiene la pasiva impersonal y la idea de desaparición total. 'Se halló' reproduce bien la impersonalidad del arameo.
- source_word: וְאַבְנָא
  english_pob_choice: But the stone
  chosen_spanish: Pero la piedra
  alternatives_spanish:
  - Y la piedra
  lexicon: HALOT
  rationale: Se conserva el contraste discursivo que el inglés POB marca con 'But'. 'Pero' resulta más natural en español para oponer la piedra al destino de los materiales anteriores.
- source_word: דִּי מְחָת לְצַלְמָא
  english_pob_choice: that struck the statue
  chosen_spanish: que había golpeado la estatua
  alternatives_spanish:
  - que golpeó la estatua
  - que había herido la estatua
  lexicon: HALOT
  rationale: El relativo identifica la piedra por su acción; el pluscuamperfecto ayuda a ordenar la secuencia respecto del resultado posterior. 'Golpeado' es fiel y evita el arcaísmo 'herido' o 'smote' equivalente.
- source_word: הֲוָת לְטוּר רַב
  english_pob_choice: became a great mountain
  chosen_spanish: se convirtió en un gran monte
  alternatives_spanish:
  - se volvió un gran monte
  - llegó a ser un gran monte
  lexicon: HALOT
  rationale: '''Monte'' conserva el matiz bíblico más que ''montaña'' en español, aunque ambos son posibles; ''gran'' reproduce la magnitud del original.'
- source_word: וּמְלָת כָּל אַרְעָא
  english_pob_choice: and filled the whole earth
  chosen_spanish: y llenó toda la tierra
  alternatives_spanish:
  - y llenó toda la tierra habitada
  - y llenó la tierra entera
  lexicon: HALOT
  rationale: Se sigue la lectura de alcance universal adoptada por el POB inglés. 'Tierra' preserva la amplitud cosmológica que el contexto de la visión favorece.
theological_decisions:
- issue: Alcance de אַרְעָא
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: En Daniel 2 la visión tiene un horizonte de alcance universal; 'tierra' comunica mejor esa amplitud que 'país' o 'territorio'. No se introduce una explicación doctrinal ajena al versículo, solo se preserva el ámbito amplio del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Matiz adversativo antes de la piedra
  english_pob_reading: But the stone
  chosen_spanish_reading: Pero la piedra
  alternative_spanish_readings:
  - Y la piedra
  - Mas la piedra
  rationale: El giro adversativo señala el contraste entre la desaparición de los materiales de la estatua y la permanencia/crecimiento de la piedra. 'Pero' reproduce ese contraste de manera natural en español sin añadir contenido interpretativo.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto arameo y el audit trail en inglés. Se mantienen las decisiones principales sin cambios sustantivos respecto del último pase: simultaneidad de la destrucción, imagen agrícola del residuo ligero, contraste adversativo con la piedra y alcance amplio de ''tierra''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en otros contextos del proyecto; este versículo no lo contiene.
  - Se mantiene 'monte' como opción bíblica natural en español para טוּר, en lugar de 'montaña', por coherencia con un registro más escritural.
  - Se evita 'Cristo' porque no corresponde al léxico del versículo.
  - Se conserva el tono narrativo y visionario sin paráfrasis expansiva.
