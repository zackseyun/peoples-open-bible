translation:
  language: es
  text: Entonces Salomón reunió a los ancianos de Israel, a todos los jefes de las tribus, a los jefes de las casas paternas de los hijos[a] de Israel, en Jerusalén, para hacer subir el arca del pacto de Yahvé desde la ciudad de David[b], que es Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel», preservando la identidad genealógica y del pacto de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «la cual es Sion». La frase final identifica la ciudad de David con Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: HALOT
  rationale: Marca secuencia narrativa inmediata; «Entonces» conserva el flujo temporal natural del relato sin añadir matiz interpretativo.
- source_word: יַקְהֵיל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hifil de קהל implica hacer que otros se congreguen. «Reunió» comunica la acción de forma clara y digna en español, sin perder el sentido de convocatoria.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  - los viejos de Israel
  lexicon: HALOT
  rationale: «Ancianos» es el equivalente estable para el grupo de autoridad reconocido en contexto administrativo y cultual.
- source_word: כָּל רָאשֵׁי הַמַּטּוֹת
  english_pob_choice: all the heads of the tribes
  chosen_spanish: todos los jefes de las tribus
  alternatives_spanish:
  - todos los cabezas de las tribus
  - todos los principales de las tribus
  lexicon: HALOT
  rationale: «Jefes» preserva el valor de liderazgo de רָאשֵׁי y «tribus» refleja el sentido contextual de מַטּוֹת, que aquí no son bastones sino divisiones tribales.
- source_word: נְשִׂיאֵי הָאָבוֹת
  english_pob_choice: the leaders of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los príncipes de las casas paternas
  - los jefes de los linajes paternos
  lexicon: HALOT
  rationale: «Casas paternas» conserva la estructura social hebrea de hogares/linajes familiares; «jefes» traduce bien נְשִׂיאֵי sin introducir lenguaje eclesiástico.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Se mantiene la formulación genealógica del hebreo. «Hijos de Israel» preserva mejor la identidad covenantal y tribal que una generalización como «israelitas».
- source_word: אֶל יְרוּשָׁלָם
  english_pob_choice: at Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: 'Con el verbo de reunir, el español pide un complemento locativo natural: «en Jerusalén».'
- source_word: לְהַעֲלוֹת
  english_pob_choice: to bring up
  chosen_spanish: para subir
  alternatives_spanish:
  - para hacer subir
  - para llevar arriba
  lexicon: HALOT
  rationale: עלה conserva en este contexto el movimiento ascendente hacia Jerusalén/Sion. «Subir» mantiene el idiomatismo bíblico en español sin volverse forzado.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahweh
  lexicon: HALOT
  rationale: «Arca del pacto» reproduce la cadena nominal con claridad. Se usa «Yahvé» según el criterio español del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto en español para el nombre divino: «Yahvé».'
- source_word: מֵעִיר דָּוִיד
  english_pob_choice: from the city of David
  chosen_spanish: desde la ciudad de David
  alternatives_spanish:
  - de la ciudad de David
  lexicon: HALOT
  rationale: «Desde» expresa con naturalidad el punto de origen del traslado del arca.
- source_word: הִיא צִיּוֹן
  english_pob_choice: that is Zion
  chosen_spanish: que es Sion
  alternatives_spanish:
  - es decir, Sion
  - la cual es Sion
  lexicon: HALOT
  rationale: La cláusula explicativa identifica la ciudad de David con Sion. «Que es Sion» es natural y fiel; se prefiere «Sion» como forma española tradicional de topónimo bíblico.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La norma del proyecto en español pide «Yahvé» en el texto principal para evitar el ocultamiento del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conservación de la estructura genealógica/covenantal de Israel
  english_pob_reading: the sons of Israel / fathers’ houses
  chosen_spanish_reading: los hijos de Israel / las casas paternas
  alternative_spanish_readings:
  - los israelitas / las familias
  - el pueblo de Israel / los linajes
  rationale: El verso enumera autoridades según tribus, linajes y casas paternas; por eso se conserva la terminología estructural del hebreo en vez de diluirla en una referencia genérica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se ha revisado el pasaje con concordancia alta respecto del audit trail inglés. No se detectaron revisiones textuales sustanciales en el último pase; la versión española conserva el paralelismo de títulos de liderazgo, la localización en Jerusalén y la identificación final de Sion, ajustando solo el español para mayor naturalidad y fidelidad estructural.
  spanish_consistency_notes:
  - «Yahvé» se mantiene de forma consistente para יְהוָה conforme al estándar del proyecto.
  - Se preserva la estructura social de «hijos de Israel» y «casas paternas» para reflejar el hebreo genealógico.
  - «Sion» se usa como forma española bíblica estable del topónimo.
  - 'El orden de los grupos de liderazgo sigue el hebreo: ancianos, jefes de tribus, jefes de casas paternas.'
