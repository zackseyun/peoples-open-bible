revisions:
- from: 'Y en tu prostitución fuiste el reverso[a] de las mujeres: nadie te solicitó[b], pero tú diste pago, y no se te dio pago; así llegaste a ser el reverso.'
  to: 'Y en tu prostitución fuiste lo contrario[a] de las demás mujeres: nadie te buscó[b], pero tú diste pago, y no se te dio pago; así llegaste a ser lo contrario.'
  rationale: Se ajusta הֵפֶךְ a «lo contrario» para un español más natural y fiel al sentido de inversión contextual, manteniendo la repetición al inicio y al final del versículo. También se cambia «nadie te solicitó» por «nadie te buscó», que conserva la misma interpretación documentada por el POB pero mejora la legibilidad y el registro en español eclesial general.
