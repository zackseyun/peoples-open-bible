translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «¿Hasta cuándo se negarán a guardar mis mandamientos y mis leyes[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis instrucciones». El hebreo torot (plural de torah) puede denotar instrucción autorizada además de leyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» conserva la secuencia de manera natural en español sin perder el valor narrativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo como «Yahvé», siguiendo el criterio del proyecto de no sustituirlo por un título.
- source_word: עַד אָנָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Por cuánto tiempo?
  - ¿Hasta cuándo será?
  lexicon: HALOT
  rationale: El modismo expresa duración de una conducta continuada y de reproche; «¿Hasta cuándo?» es la equivalencia natural en español.
- source_word: מֵאַנְתֶּם
  english_pob_choice: will you refuse
  chosen_spanish: rehusarán
  alternatives_spanish:
  - rechazarán
  - se negarán
  lexicon: HALOT
  rationale: El verbo significa rehusar o no querer. En una pregunta retórica de reproche, «rehusarán» comunica la obstinación sin añadir elementos ajenos al hebreo.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - cumplir
  lexicon: HALOT
  rationale: שׁמר aplicado a mandamientos puede ser «guardar/observar». «Guardar» mantiene la relación de fidelidad y obediencia sin sonar forzado.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: «Mandamientos» conserva el registro jurídico y pactual de la voz divina en el contexto.
- source_word: וְתוֹרֹתָי
  english_pob_choice: and my laws
  chosen_spanish: y mis leyes
  alternatives_spanish:
  - y mis instrucciones
  - y mis enseñanzas
  lexicon: HALOT
  rationale: En este contexto de desobediencia en el desierto, תּוֹרָה tiene fuerza normativa; «leyes» expresa bien ese valor. «Instrucciones» se deja como alternativa semántica más amplia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre revelado a Israel con una transliteración española estable y reverente, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Plural de תּוֹרָה en paralelo con mandamientos
  english_pob_reading: laws
  chosen_spanish_reading: leyes
  alternative_spanish_readings:
  - instrucciones
  - enseñanzas
  rationale: La pareja «mandamientos/leyes» conserva el paralelismo y la fuerza normativa del reproche. La alternativa más amplia «instrucciones» queda como posible matiz, sin resolver la tensión del término hebreo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'La redacción se ajusta al audit trail inglés: se conserva el avance narrativo, el nombre divino como Yahvé, la pregunta retórica de reproche y el paralelismo mandamientos/leyes, con la alternativa semántica de תּוֹרָה preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Mandamientos» y «leyes» conservan el registro normativo del hebreo.
  - La nota [a] está anclada en «Moisés[a]» y explica la alternativa lexical de תּוֹרֹתָי sin alterar el texto principal.
