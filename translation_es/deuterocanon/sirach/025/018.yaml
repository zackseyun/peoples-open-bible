  to: Su marido se sienta entre sus compañeros[a], y sin juicio gime.
  rationale: 'Se hace una reparación mínima: «sin juicio» comunica mejor en español el valor de טַעַם como discernimiento o sentido práctico, evitando la ambigüedad de «sin sentido». Se conserva la estructura, la prioridad del hebreo y la nota sobre la variante griega.'
