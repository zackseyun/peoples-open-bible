lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo דבר introduce una fórmula narrativa de habla. En español, «habló» conserva el matiz formal de discurso directo y encaja bien con la fórmula profética/sacerdotal del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política española del proyecto pide «Yahvé» para el Tetragrámaton. Mantiene el nombre propio divino y evita la sustitución por un título como «SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia natural y clara para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: La repetición del marcador direccional con la conjunción preserva que el hebreo menciona explícitamente a ambos destinatarios, no solo al primero.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula לֵאמֹר funciona como introducción de discurso. «Diciendo» reproduce de forma transparente la estructura hebrea sin añadir contenido.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión teológica y editorial de representar el Tetragrámaton con el nombre propio divino, no con una sustitución reverencial. En español, «Yahvé» es la forma adoptada por el proyecto y resulta publicable y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el testimonio hebreo y el audit trail inglés: la única decisión sensible es la representación del Nombre divino. No se observan variantes textuales ni ajustes de revisión pendientes.'
  spanish_consistency_notes:
  - Se conserva la coordinación explícita «a Moisés y a Aarón» para reflejar el doble destinatario del hebreo.
  - Se usa la fórmula verbal simple «habló ... diciendo» para mantener el tono narrativo y la sintaxis de introducción de discurso.
  - Se emplea «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
