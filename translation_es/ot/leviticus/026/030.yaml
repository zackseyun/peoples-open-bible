translation:
  language: es
  text: Y destruiré tus lugares altos[a], y derribaré tus altares de incienso, y pondré tus cadáveres sobre los cadáveres de tus ídolos[b]; y mi alma los aborrecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus pilares solares». El término hebreo se refiere a objetos de culto asociados con la adoración ilícita; su forma exacta es debatida.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite una palabra para «cadáveres» tanto para el pueblo como para sus ídolos, enfatizando la condición inerte y la vergüenza de los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁמַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - aniquilaré
  - arrasaré
  lexicon: HALOT
  rationale: El hiphil de שׁמד expresa causar destrucción o exterminio. En español, «destruiré» comunica con claridad la acción judicial sin cargar más de lo que el contexto inmediato exige.
- source_word: בָּמֹתֵיכֶם
  english_pob_choice: your high places
  chosen_spanish: tus lugares altos
  alternatives_spanish:
  - tus altos cultuales
  - tus santuarios en las alturas
  lexicon: HALOT
  rationale: La expresión hebrea designa sitios de culto elevados. «Lugares altos» es la correspondencia tradicional y transparente en español, y conserva el carácter cultual del término.
- source_word: הִכְרַתִּי
  english_pob_choice: cut down
  chosen_spanish: derribaré
  alternatives_spanish:
  - cortaré
  - destruiré
  lexicon: HALOT
  rationale: כרת tiene sentido literal de cortar o derribar. Con objetos cultuales, «derribaré» conserva la imagen concreta mejor que un abstracto «destruiré».
- source_word: חַמָּנֵיכֶם
  english_pob_choice: your incense altars
  chosen_spanish: tus altares de incienso
  alternatives_spanish:
  - tus pilares solares
  - tus incensarios cultuales
  lexicon: HALOT
  rationale: El término es debatido y puede aludir a objetos ligados al culto solar o al incienso. En español, «altares de incienso» da una lectura funcional clara en el texto principal, sin ocultar la incertidumbre del objeto.
- source_word: פִּגְרֵיכֶם
  english_pob_choice: your carcasses
  chosen_spanish: tus cadáveres
  alternatives_spanish:
  - tus cuerpos muertos
  - tus carroñas
  lexicon: HALOT
  rationale: פגר designa un cadáver o cuerpo muerto. «Cadáveres» es directo, solemne y adecuado para personas; «carroñas» sería demasiado animalizante en este contexto.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La preposición expresa colocación física. «Sobre» reproduce naturalmente la imagen de juicio y deshonra.
- source_word: פִּגְרֵי גִּלּוּלֵיכֶם
  english_pob_choice: the carcasses of your idols
  chosen_spanish: los cadáveres de tus ídolos
  alternatives_spanish:
  - las carroñas de tus ídolos
  - los cuerpos muertos de tus ídolos
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término fuertemente despectivo para ídolos. «Ídolos» mantiene la claridad, y la repetición de «cadáveres» preserva el paralelismo y la idea de lifelessness que el hebreo enfatiza.
- source_word: גִּלּוּלֵיכֶם
  english_pob_choice: your idols
  chosen_spanish: tus ídolos
  alternatives_spanish:
  - tus ídolos detestables
  - tus ídolos de estiércol
  lexicon: HALOT
  rationale: Aunque el vocablo hebreo es peyorativo, «ídolos» es la base más clara y comprensible en español. La carga de desprecio queda reforzada por el contexto de juicio y por el paralelismo con los cadáveres.
- source_word: גָעֲלָה נַפְשִׁי אֶתְכֶם
  english_pob_choice: my soul will abhor you
  chosen_spanish: mi alma se aborrecerá de ustedes
  alternatives_spanish:
  - mi alma los aborrecerá
  - yo los aborreceré
  lexicon: HALOT
  rationale: Se conserva la expresión antropopática «mi alma» para no suavizar la tensión teológica del hebreo. «Se aborrecerá de ustedes» refleja con sobriedad el verbo געלה y mantiene la fuerza de rechazo del texto.
theological_decisions:
- issue: Expresión antropopática de rechazo divino
  english_pob_reading: my soul will abhor you
  chosen_spanish_reading: mi alma se aborrecerá de ustedes
  alternative_spanish_readings:
  - yo los aborreceré
  - mi ser los rechazará
  rationale: El hebreo habla de נַפְשִׁי con געלה para expresar repulsión y rechazo del pacto. Mantener «mi alma» preserva la tensión teológica y el énfasis retórico, en vez de diluirlo en una formulación más plana.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Seguí la revisión auditada del inglés POB que prefirió 'carcasses' por encima de 'corpses' para פגרים, y conservé en español un registro formal y severo con 'cadáveres'. También mantuve la nota de ambigüedad para חַמָּנִים y el paralelismo repetido de 'cadáveres' para reflejar la carga retórica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto general cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se usa 'ídolos' como base por claridad, sin perder la fuerza despectiva del hebreo, que queda sostenida por el contexto y la repetición.
  - Se conserva el antropopatismo 'mi alma' para no resolver la tensión teológica del texto.
