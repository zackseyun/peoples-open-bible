translation:
  language: es
  text: Se transforma[a] como barro bajo un sello, y se destacan[b] como una vestidura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se vuelve». El verbo hebreo puede traducirse más literalmente como «se vuelve» o «es vuelto»/«se da vuelta».'
    reason: lexical_alternative
  - marker: b
    text: El plural «se destacan» probablemente se refiere a los rasgos de la tierra que se hacen nítidos con la luz del amanecer.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְהַפֵּךְ
  english_pob_choice: is changed
  chosen_spanish: Se cambia
  alternatives_spanish:
  - Se vuelve
  - Se transforma
  - Se da vuelta
  lexicon: HALOT
  rationale: El hitpael de הפך expresa aquí un cambio de aspecto o configuración. «Se cambia» conserva el matiz de cambio pasivo/reflexivo sin añadir una interpretación más fuerte que el hebreo no exige.
- source_word: כְּחֹמֶר
  english_pob_choice: like clay
  chosen_spanish: como barro
  alternatives_spanish:
  - como arcilla
  - como lodo
  lexicon: HALOT
  rationale: חֹמֶר se refiere a barro/arcilla moldeable. «Barro» comunica bien la imagen en español y sigue la comparación de una materia que recibe forma o impresión.
- source_word: חוֹתָם
  english_pob_choice: under a seal
  chosen_spanish: bajo un sello
  alternatives_spanish:
  - bajo un sello de impresión
  - bajo la impronta de un sello
  - con un sello
  lexicon: HALOT
  rationale: El hebreo es elíptico; la idea es la de barro que recibe la huella de un sello. «Bajo un sello» reproduce la imagen con naturalidad en español y mantiene la tensión interpretativa sin explicitar demasiado.
- source_word: וְיִתְיַצְּב֗וּ
  english_pob_choice: they stand forth
  chosen_spanish: se destacan
  alternatives_spanish:
  - se yerguen
  - aparecen claramente
  - se presentan
  lexicon: HALOT
  rationale: El plural probablemente alude a los rasgos de la tierra que emergen con claridad. «Se destacan» comunica la aparición visible y conserva un registro digno sin sonar demasiado mecánico.
- source_word: כְּמ֣וֹ לְבֽוּשׁ
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una prenda
  - como ropa
  - como un manto
  lexicon: HALOT
  rationale: לְבוּשׁ denota ropa o vestidura. «Vestido» es una forma natural en español y mantiene la comparación poética de contornos o pliegues que se hacen visibles.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés, pero se ajustó la imaginería a un español natural y publicable: «como barro bajo un sello» para la comparación con חֹמֶר חוֹתָם, y «se destacan» para reflejar el sentido plural y visual de ויתיצבו. Se mantuvo una equivalencia óptima sin perder la tensión lexical del hebreo.'
  spanish_consistency_notes:
  - Se preservó el paralelismo poético de dos miembros.
  - Se evitó «SEÑOR» o terminología teológica no presente en el verso.
  - Se mantuvo el registro reverente y sobrio, adecuado para poesía sapiencial.
  - Los marcadores de nota aparecen exactamente en el texto principal y corresponden a las decisiones léxicas.
