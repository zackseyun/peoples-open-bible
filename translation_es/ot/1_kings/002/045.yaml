translation:
  language: es
  text: Pero el rey Salomón será bendito[a], y el trono de David será establecido delante de Yahvé para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey Salomón es bendito». El predicado hebreo puede leerse como una afirmación presente, aunque el contexto también respalda la traducción prospectiva usada en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  english_pob_choice: But King
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  lexicon: HALOT
  rationale: El ו inicial funciona aquí como enlace discursivo de contraste con el juicio anterior; en español, «Pero» preserva mejor ese giro que «Y». מֶלֶךְ se traduce directamente como «rey».
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: בָּרוּךְ
  english_pob_choice: will be blessed
  chosen_spanish: será bendecido
  alternatives_spanish:
  - es bendecido
  - quedará bendecido
  lexicon: HALOT
  rationale: El participio/adjetivo predicado admite lectura presente o prospectiva; en el contexto del pronunciamiento real, el valor prospectivo queda bien expresado en español con futuro pasivo.
- source_word: וְ/כִסֵּא
  english_pob_choice: and the throne
  chosen_spanish: y el trono
  alternatives_spanish:
  - y el trono de
  lexicon: HALOT
  rationale: כִּסֵּא significa «trono». Se mantiene la coordinación simple con «y».
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: de David
  alternatives_spanish:
  - davídico
  - de David el rey
  lexicon: Nombre propio bíblico
  rationale: La relación constructa se expresa naturalmente en español como «el trono de David».
- source_word: יִהְיֶה נָכוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - será firme
  - quedará firme
  - permanecerá establecido
  lexicon: HALOT
  rationale: La combinación de היה + נכון comunica quedar firmemente establecido o asegurado; «será establecido» conserva bien la imagen dinástica y judicial sin perder la tensión lexical.
- source_word: לִ/פְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי se traduce de modo literal y idiomático como «delante de». Se mantiene el nombre divino «Yahvé» según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, preservando el nombre del pacto en español.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión fija de duración indefinida se comunica con la fórmula natural y clara «para siempre».
theological_decisions:
- issue: Valor temporal de בָּרוּךְ dentro de la proclamación regia
  english_pob_reading: future-oriented 'will be blessed'
  chosen_spanish_reading: futuro prospectivo 'será bendecido'
  alternative_spanish_readings:
  - presente declarativo 'es bendecido'
  - adjetival 'bendito'
  rationale: El contexto del veredicto/pronunciamiento sobre Salomón y el trono de David favorece una formulación prospectiva, sin negar que el hebreo permita también una lectura descriptiva presente. La traducción conserva esa tensión con un futuro español natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre divino explícito, conforme al criterio del proyecto, en lugar de sustituirlo por un título velado. Esto preserva la referencia al Dios del pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones aplicadas y el informe de control cruzado indica alto acuerdo; por eso la versión española se alinea estrechamente con la lectura aprobada, manteniendo la única tensión lexical relevante en בָּרוּךְ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se preservó la distinción entre el contraste discursivo («Pero») y la simple coordinación («y»).
  - «Será bendecido» y «será establecido» conservan el tono prospectivo del pronunciamiento real.
  - «Para siempre» refleja la duración indefinida de עַד עוֹלָם en español natural y claro.
