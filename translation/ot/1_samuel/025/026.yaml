theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns with established English Bible convention while preserving reverential usage.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of Abigail's statement about David's prevented action
  chosen_reading: The verse refers to the LORD preventing David from incurring bloodguilt and from taking deliverance/vengeance into his own hands.
  alternative_readings:
  - The second clause could be rendered more explicitly as 'from avenging yourself with your own hand.'
  rationale: The Hebrew idiom with ישׁע ('save/deliver') plus 'your hand' is contextually about self-wrought deliverance through violent retaliation. The main text keeps the lexical sense 'saving yourself' while a footnote preserves the more explicit contextual interpretation.
