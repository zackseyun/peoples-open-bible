translation:
  language: es
  text: Cuando yo salía a la puerta[a], junto a la ciudad, cuando preparaba mi asiento en la plaza[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la puerta de la ciudad»; el hebreo dice literalmente «la puerta» y luego añade una frase que la relaciona con «la ciudad».
    reason: lexical_alternative
  - marker: b
    text: O «en la calle» o «en el lugar abierto»; el término se refiere a un espacio público amplio, no necesariamente a una vía estrecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵאתִי
  english_pob_choice: When I went out
  chosen_spanish: Cuando salía
  alternatives_spanish:
  - Cuando salí
  - Al salir
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición y sufijo de 1cs funciona aquí como marco temporal. En español, el imperfecto 'salía' conserva la acción habitual o circunstancial de salir en contexto narrativo retrospectivo, con fluidez natural y sin perder el valor temporal.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - la puerta
  lexicon: HALOT
  rationale: Aunque el término hebreo suele referirse al acceso cívico/judicial, 'puerta' es un equivalente natural en español que puede mantener esa carga en contexto. La nota a pie de página preserva la posibilidad de 'la puerta de la ciudad' sin forzar una calca.
- source_word: עֲלֵי קָרֶת
  english_pob_choice: by the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - junto a la ciudad
  - por la ciudad
  - hacia la ciudad
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y relaciona la puerta con la ciudad. En español, 'de la ciudad' integra con naturalidad la relación locativa y deja abierto que se trata de la puerta urbana, sin añadir más de lo que el texto exige.
- source_word: בָּרְחוֹב
  english_pob_choice: in the square
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en la calle
  - en el lugar abierto
  - en la plaza pública
  lexicon: HALOT
  rationale: רחוב designa un espacio público amplio, no simplemente una calle estrecha. 'Plaza' comunica mejor el ámbito cívico y de reunión pública que el contexto presupone.
- source_word: אָכִין
  english_pob_choice: I prepared
  chosen_spanish: preparaba
  alternatives_spanish:
  - preparé
  - disponía
  lexicon: HALOT
  rationale: El verbo en hifil de כון puede significar preparar, disponer o establecer. El imperfecto español 'preparaba' mantiene el trasfondo de acción continuada o habitual al recordar la antigua honra de Job en la esfera pública.
- source_word: מוֹשָׁבִי
  english_pob_choice: my seat
  chosen_spanish: mi asiento
  alternatives_spanish:
  - mi puesto
  - mi lugar para sentarme
  lexicon: HALOT
  rationale: En el contexto de la puerta y la plaza, מושב se refiere a un lugar para sentarse o tomar asiento, probablemente un sitio de honor. 'Asiento' es breve, claro y fiel al sentido concreto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la solución inglesa auditada, pero adapta a español la temporalidad y la relación locativa para que la frase suene natural sin perder la distinción entre 'puerta' y 'ciudad', ni entre 'plaza' y un simple tramo de calle.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece ningún tetragrámaton ni referencia divina explícita.
  - '''Plaza'' se eligió para רחוב conforme al sentido de espacio público amplio documentado en la auditoría inglesa.'
  - '''Asiento'' traduce מושב en su valor de lugar para sentarse, no como residencia.'
