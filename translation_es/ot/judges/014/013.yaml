translation:
  language: es
  text: 'Pero si no pueden decirme, entonces ustedes me darán treinta prendas de lino[a] y treinta cambios de ropa.” Y ellos le dijeron: “Di tu acertijo, y oigámoslo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘treinta piezas de lino’. El término hebreo puede referirse a artículos de lino fino, pero aquí probablemente alude a prendas de vestir, en paralelo con ‘cambios de ropa’.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוּכְלוּ
  english_pob_choice: you cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no serán capaces de
  - no podrán
  lexicon: HALOT
  rationale: El verbo יכל expresa capacidad; en este condicional, el presente de capacidad negativa en español es natural y fiel a la imposibilidad, no a la falta de voluntad.
- source_word: לְהַגִּיד לִי
  english_pob_choice: tell me
  chosen_spanish: decírmelo
  alternatives_spanish:
  - decírmelo a mí
  - declarármelo
  lexicon: HALOT
  rationale: El hebreo dice simplemente ‘decirme’. En español conviene expresar el objeto implícito de la solución del acertijo con pronombre enclítico, sin añadir ‘explicarlo’ ni ampliar el sentido.
- source_word: וּנְתַתֶּם אַתֶּם לִי
  english_pob_choice: then you must give me
  chosen_spanish: entonces ustedes me darán
  alternatives_spanish:
  - entonces ustedes me tendrán que dar
  - entonces me darán
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto de apuesta expresa consecuencia obligatoria. ‘Me darán’ comunica bien la obligación implícita sin introducir un modal más fuerte que el hebreo.
- source_word: שְׁלֹשִׁים סְדִינִים
  english_pob_choice: thirty linen garments
  chosen_spanish: treinta prendas de lino
  alternatives_spanish:
  - treinta lienzos de lino
  - treinta piezas de lino
  lexicon: HALOT
  rationale: סְדִינִים puede referirse a artículos de lino fino; en este contexto, donde se paraleliza con prendas de vestir, ‘prendas de lino’ preserva la posible ambigüedad entre tela y vestimenta sin caer en ‘sábanas’.
- source_word: וּשְׁלֹשִׁים חֲלִיפוֹת בְּגָדִים
  english_pob_choice: thirty changes of clothes
  chosen_spanish: treinta mudas de ropa
  alternatives_spanish:
  - treinta cambios de ropa
  - treinta juegos de ropa
  lexicon: HALOT
  rationale: La expresión denota conjuntos o repuestos de ropa. ‘Mudas de ropa’ es un equivalente idiomático claro en español y conserva la idea de un conjunto reemplazable.
- source_word: ח֥וּדָה
  english_pob_choice: Tell
  chosen_spanish: Propón
  alternatives_spanish:
  - Di
  - Presenta
  lexicon: HALOT
  rationale: En el contexto de plantear un enigma, el imperativo funciona como ‘propón’ o ‘plantea’. ‘Propón’ mantiene la fuerza conversacional del original sin sonar extraño en español.
- source_word: חִידָתְךָ
  english_pob_choice: your riddle
  chosen_spanish: tu enigma
  alternatives_spanish:
  - tu acertijo
  - tu riddle
  lexicon: HALOT
  rationale: חִידָה puede ser ‘acertijo’ o ‘enigma’. ‘Enigma’ conserva algo más del carácter retador y formal del contexto, aunque ‘acertijo’ sigue siendo una buena alternativa.
- source_word: וְנִשְׁמָעֶנָּה
  english_pob_choice: and let us hear it
  chosen_spanish: y lo escucharemos
  alternatives_spanish:
  - y dejemos que lo oigamos
  - y lo oiremos
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención/voluntad colectiva. ‘Lo escucharemos’ comunica con naturalidad la respuesta pretendida; ‘oírlo’ sería también posible, pero ‘escuchar’ encaja mejor con la petición de atención al enigma.
translation_notes:
  revision_awareness: Se corrigió la anclaje de nota al pie del borrador anterior eliminando la nota no anclada [a]. En esta versión no se incluyen notas, porque la elección léxica para סְדִינִים se integra directamente en el texto como ‘prendas de lino’ y no requiere una nota visible para mantener la legibilidad.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera de este versículo porque el texto no contiene el nombre divino.
  - Se prefirió ‘enigma’ para חִידָה en coherencia con un registro bíblico culto, aunque ‘acertijo’ queda reconocido como alternativa.
  - Se evitó ‘señor’ o terminología eclesiástica no presente en el hebreo.
  - El pronombre enclítico en ‘decírmelo’ respeta el objeto implícito del hebreo sin sobreexplicar.
