  footnotes:
  - marker: a
    text: 'The Latin has a striking split wording in this passage: 7:28 reads filius meus Iesus (‘my son Jesus’), while 7:29 reads filius meus Christus (‘my son the Messiah’). The passage describes a four-hundred-year reign, then the Messiah’s death, followed by seven days of primeval silence and then resurrection—one of the most striking messianic passages in early Jewish apocalypse.'
    reason: messianic_passage
    anchor_ref: '7:28'
  - marker: b
    text: Verses 7:36-105 are Bensly's 'Missing Fragment.' Cut from most medieval Latin manuscripts -- almost certainly because this section teaches that intercession for the damned is refused, which later Christian piety found difficult -- and therefore absent from the Vulgate and from the KJV 1611, where verse 7:35 was followed directly by what older editions numbered as verse 7:36 some seventy verses later. Robert Bensly recovered the fragment from a Spanish manuscript in 1875 and it is now restored in all modern critical editions.
    reason: recovered_fragment
    anchor_ref: '7:36'
  - marker: i
    text: The paired images of the appearing bride and the city now hidden likely compress Zion/Jerusalem restoration imagery into apocalyptic symbolism. The Latin is terse and does not explain the relationship between bride and city.
    reason: compositional_layer
    anchor_ref: '7:26'
  - marker: h
    text: The Latin says the judgment-day span will be 'like a week of years' (sicut ebdomada annorum), an unusual temporal comparison. This may mean a period analogous to seven years rather than a literal ordinary week.
    reason: lexical_alternative
    anchor_ref: '7:43'
  - marker: g
    text: The Latin text here is difficult and likely corrupt. The translation 'Weigh within yourself what you have thought' follows the general sense of the argument rather than pressing the damaged wording too mechanically.
    reason: textual_variant
    anchor_ref: '7:59'
  - marker: f
    text: 'Several words in this verse are textually rough in the Latin tradition. The sense is clear enough: the wicked undergo the most severe anguish when confronted with the glory of the Most High before whom they sinned.'
    reason: textual_variant
    anchor_ref: 7:87
  - marker: e
    text: The phrase about the glory awaiting the righteous in the last times is textually uncertain in the Latin, but the overall sense of guarded rest now and future glory later is secure.
    reason: textual_variant
    anchor_ref: 7:95
  - marker: d
    text: Part of this verse belongs to the restored fragment absent from most medieval Latin manuscripts. The examples stress personal non-transferability in ordinary life as an analogy for the final judgment.
    reason: recovered_fragment
    anchor_ref: 7:104
  - marker: c
    text: '''Joshua ... in the days of Achan'' reflects the Latin Iesus, the same form used for Joshua and Jesus. In this Old Testament setting the reference is to Joshua son of Nun.'
    reason: lexical_alternative
    anchor_ref: 7:107
lexical_decisions:
- source_word: Altissimus
  chosen: the Most High
  alternatives:
  - God
  lexicon: Lewis & Short
  rationale: Project policy requires preserving the divine title rather than flattening it to a generic term; the title is theologically important throughout 4 Ezra.
- source_word: saeculum
  chosen: age
  alternatives:
  - world
  - era
  lexicon: Lewis & Short
  rationale: In this apocalyptic chapter the term regularly contrasts the present order with the coming order; 'age' preserves that eschatological sense better than 'world'.
- source_word: angustus / angustia
  chosen: narrow / narrow things
  alternatives:
  - strait
  - constricted
  - distress
  lexicon: Lewis & Short
  rationale: The chapter's controlling image is the narrow entrance and path; keeping 'narrow' visible preserves the metaphor and its ethical force.
- source_word: spatiosus / latitudo
  chosen: broad / breadth
  alternatives:
  - wide
  - spacious
  lexicon: Lewis & Short
  rationale: Chosen to maintain the contrast with 'narrow' in the inheritance imagery and later eschatological reward.
- source_word: filius meus Christus
  chosen: my son the Messiah
  alternatives:
  - my son Christ
  - my anointed son
  lexicon: Lewis & Short
  rationale: Per project policy, Christus is translated as title-sense 'Messiah' here; the phrase is messianic, not a fixed proper name.
- source_word: cor malignum
  chosen: evil heart
  alternatives:
  - wicked heart
  - malignant heart
  lexicon: Lewis & Short
  rationale: This preserves the recurring theological thread across 4 Ezra concerning the inward source of human ruin.
- source_word: promptuaria
  chosen: storehouses
  alternatives:
  - chambers
  - treasuries
  lexicon: Lewis & Short
  rationale: The image is of reserved places where souls are kept; 'storehouses' preserves the concrete metaphor without overinterpreting.
- source_word: habitationes
  chosen: habitations
  alternatives:
  - dwelling places
  - abodes
  lexicon: Lewis & Short
  rationale: Retains the formal, somewhat spatial language of postmortem lodging without smoothing into sentimental diction.
- source_word: gehenna
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: Lewis & Short
  rationale: The transliterated term preserves Jewish apocalyptic texture and avoids importing later flattened English associations.
- source_word: longanimitas
  chosen: long-suffering
  alternatives:
  - patience
  - forbearance
  lexicon: Lewis & Short
  rationale: A weightier rendering suits the solemn judicial context and preserves the sense of extended divine restraint.
- source_word: fides
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: Lewis & Short
  rationale: In 7:34 the abstract virtue stands in a list of eschatological realities; 'faith' is the most natural main-text rendering, while related nuances remain possible contextually.
- source_word: testamenta / sponsiones
  chosen: covenants
  alternatives:
  - promises
  - testimonies
  lexicon: Lewis & Short
  rationale: The relational and legal force in this chapter is stronger than a bare 'promises'; 'covenants' fits the law-and-obligation context.
- source_word: spiramentum
  chosen: breath
  alternatives:
  - spirit
  - life-breath
  lexicon: Lewis & Short
  rationale: In 7:29 the phrase 'all who have the breath of man' points to mortal human life generally; 'breath' keeps the anthropological concreteness.
- source_word: vasa corruptibilia / vaso corruptibili
  chosen: corruptible vessel
  alternatives:
  - perishable body
  - mortal container
  lexicon: Lewis & Short
  rationale: The metaphor of the body as vessel should remain visible in this apocalyptic anthropology.
- source_word: iucunditas
  chosen: delight
  alternatives:
  - joy
  - gladness
  lexicon: Lewis & Short
  rationale: Used for paradise and eschatological blessedness; 'delight' gives a concrete, experiential quality without sounding casual.
theological_decisions:
- issue: Messianic title and death in 7:28-29
  chosen_reading: Rendered 7:28 as ‘my son Jesus’ and 7:29 as ‘my son the Messiah,’ preserving the Latin split wording and the statement that he dies after the four hundred years.
  alternative_readings:
  - Render both verses as Messiah
  - Render both verses as Jesus Christ
  - Omit or soften the death statement
  rationale: The Latin witness splits the wording across the two verses. Rather than harmonizing it silently, the translation preserves the textual tension while keeping the passage’s messianic force and its startling statement of the Messiah’s death.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
- issue: Judgment without post-judgment intercession in 7:102-115
  chosen_reading: 'Rendered the refusal starkly: no one will then pray for another; each bears his own unrighteousnesses or righteousnesses.'
  alternative_readings:
  - soften to general inability to help
  - leave room for continued intercession after judgment
  rationale: The restored fragment's hard edge is central to the chapter's theology and must not be muted.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Anthropology of the evil heart in 7:48
  chosen_reading: Kept 'evil heart' as the cause of alienation and corruption.
  alternative_readings:
  - wicked impulse
  - sinful mind
  rationale: The phrase is a thematic thread in 4 Ezra and should remain visible for readers tracing the book's doctrine of human ruin.
  doctrine_reference: Consistency of key terms, or documented exception.
- issue: Eschatological framework of saeculum
  chosen_reading: Used 'age' consistently for present and future orders.
  alternative_readings:
  - world
  - era
  rationale: The chapter contrasts two divinely ordered ages rather than merely two locations or historical moments; 'age' best preserves apocalyptic structure.
  doctrine_reference: Original-language primacy over translation tradition.
