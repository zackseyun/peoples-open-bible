translation:
  language: es
  text: ¡Ay de ustedes, los que han perdido la esperanza[a]! ¿Qué harán en la visitación[b] de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «los que han perdido la perseverancia» o «la paciencia» (τὴν ὑπομονήν), mientras que el hebreo lee «esperanza».
    reason: alternative_reading
  - marker: b
    text: «Visitación» traduce un término hebreo que puede designar la atención interventora de Yahvé, muchas veces en juicio en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  - ¡Woe de ustedes!
  lexicon: HALOT
  rationale: En español, «¡Ay de ustedes!» transmite con naturalidad el valor de lamento y amenaza del interjección profética sin sonar forzado. Mantiene la fuerza admonitoria de «Woe».
- source_word: אוֹבְדֵי תִּקְוָה
  english_pob_choice: who have lost hope
  chosen_spanish: los que han perdido la esperanza
  alternatives_spanish:
  - los que han perdido la esperanza
  - los que han perecido de esperanza
  - los destructores de la esperanza
  lexicon: HALOT
  rationale: La frase hebrea describe de manera más natural a quienes han perdido la esperanza; en español, «han perdido la esperanza» es idiomático y conserva el sentido principal. Se evita una paráfrasis más fuerte que la evidencia no exige.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza
  - expectación
  lexicon: HALOT
  rationale: «Esperanza» es el equivalente español más claro y natural en este contexto sapiencial. «Expectación» es posible, pero suena menos directo en español.
- source_word: פְקוֹד
  english_pob_choice: visitation
  chosen_spanish: haga su visita
  alternatives_spanish:
  - visite
  - haga una visita
  - intervenga
  lexicon: HALOT
  rationale: «Visita»/«hacer su visita» preserva el registro teológico de פקד sin cerrar el sentido solo a castigo. En español, esta formulación permite que el contexto ominoso comunique la advertencia sin perder la amplitud semántica del hebreo.
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahweh
  lexicon: HALOT
  rationale: La convención del proyecto exige «Yahvé» para el Tetragrama. Aquí se mantiene de forma directa y transparente, conforme al texto fuente hebreo.
theological_decisions:
- issue: Cómo traducir פקד en un contexto de amenaza sin reducirlo a castigo explícito
  english_pob_reading: at the visitation of the LORD
  chosen_spanish_reading: cuando Yahvé haga su visita
  alternative_spanish_readings:
  - cuando Yahvé visite
  - cuando Yahvé castigue
  - en la visita de Yahvé
  rationale: La lectura inglesa preserva la tensión teológica de una intervención divina que puede implicar juicio sin nombrarlo de manera plana. El español «haga su visita» conserva esa ambigüedad reverente y deja que el contexto de advertencia cargue el tono amenazante.
  doctrine_reference: Preservar la tensión teológica de la visita divina sin simplificarla a una sola función.
- issue: Relación entre el hebreo 'esperanza' y el paralelo griego 'endurance/patience'
  english_pob_reading: who have lost hope
  chosen_spanish_reading: los que han perdido la esperanza
  alternative_spanish_readings:
  - los que han perdido la paciencia
  - los que han perdido la perseverancia
  rationale: El texto hebreo es primario en este expediente, por lo que «esperanza» debe permanecer en el cuerpo principal. El paralelo griego se reconoce como equivalente interpretativo y no como sustitución del hebreo.
  doctrine_reference: Mantener la prioridad del hebreo sin borrar el testimonio del paralelo griego.
translation_notes:
  revision_awareness: 'Se siguió el expediente más reciente sin cambios sustantivos: la elección principal mantiene el hebreo como base textual y conserva la tensión del término de ''visita'' divina; el paralelo griego queda preservado en nota como lectura alternativa interpretativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrama, conforme a la política del proyecto.
  - Se evitó «Señor» en el texto principal para no enmascarar el nombre divino.
  - La nota [a] conserva el paralelo griego sin desplazar el hebreo, que es la base del verso.
  - La nota [b] explica la ambigüedad de פקד sin convertirla en 'castigo' de manera reductiva.
  - El español elegido es natural y litúrgicamente digno, sin calco excesivo.
