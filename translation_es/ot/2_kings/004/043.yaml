  yaml_path: translation/ot/2_kings/004/043.yaml
  text: 'But his servant said[a], “How am I to set this before a hundred men?” And he said, “Give it to the people, and let them eat[b], for thus says Yahweh: ‘They shall eat and have some left over.’”'
