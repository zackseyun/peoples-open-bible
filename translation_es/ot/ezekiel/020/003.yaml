base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/003.yaml
  text: 'Son of man[a], speak to the elders of Israel and say to them, Thus says the Lord GOD: Is it to inquire of me that you have come? As I live, I will not be inquired of by you[b], declares the Lord GOD.'
  footnotes:
  - marker: a
    text: Or 'Is it to consult me that you have come?' The verb can denote seeking an oracle or inquiry from God.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew literally, ''As I live, if I am inquired of by you''—an oath formula expressing strong negation: ''I will not be inquired of by you.'''
    reason: lexical_alternative
