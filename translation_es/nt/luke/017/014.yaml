translation:
  language: es
  text: 'Y al verlos, les dijo: «Vayan y preséntense ante los sacerdotes». Y, mientras iban[a], fueron purificados[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La indicación de presentarse ante los sacerdotes remite al examen sacerdotal requerido para quienes eran sanados de una afección cutánea; véase Levítico 14.
    reason: cross_reference
  - marker: b
    text: 'O: «fueron limpiados». El verbo griego puede denotar limpieza tanto en sentido físico como ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when he saw them
  chosen_spanish: al verlos
  alternatives_spanish:
  - cuando los vio
  - después de verlos
  lexicon: BDAG
  rationale: El participio aoristo de ὁράω introduce la acción previa a lo dicho. «Al verlos» reproduce esa relación temporal de forma natural en español sin volver mecánico el orden griego.
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Vayan y
  lexicon: BDAG
  rationale: Aunque formalmente es un participio, funciona imperativamente con ἐπιδείξατε. En español, «Vayan» comunica la secuencia mandatoria de manera fluida y fiel.
- source_word: ἐπιδείξατε ἑαυτοὺς
  english_pob_choice: show yourselves
  chosen_spanish: preséntense
  alternatives_spanish:
  - muéstrense
  - preséntense ustedes mismos
  lexicon: BDAG
  rationale: En este contexto de inspección sacerdotal, el matiz no es exhibirse sino comparecer ante una autoridad para ser examinado. «Preséntense» conserva esa idea mejor que una traducción más literal y evita una frase poco natural en español. El reflexivo queda implícito en el verbo pronominal.
- source_word: τοῖς ἱερεῦσιν
  english_pob_choice: the priests
  chosen_spanish: ante los sacerdotes
  alternatives_spanish:
  - a los sacerdotes
  - delante de los sacerdotes
  lexicon: BDAG
  rationale: El artículo griego puede expresarse naturalmente sin un equivalente rígido. «Ante los sacerdotes» hace explícita la dirección de la comparecencia vinculada a la revisión sacerdotal.
- source_word: ἐγένετο ἐν τῷ ὑπάγειν αὐτοὺς
  english_pob_choice: as they were going
  chosen_spanish: mientras iban
  alternatives_spanish:
  - cuando iban
  - al ir de camino
  lexicon: BDAG
  rationale: La construcción temporal indica acción concomitante. «Mientras iban» preserva que la limpieza ocurrió en el trayecto, con un español sobrio y natural.
- source_word: ἐκαθαρίσθησαν
  english_pob_choice: they were cleansed
  chosen_spanish: quedaron limpios
  alternatives_spanish:
  - fueron limpiados
  - quedaron purificados
  lexicon: BDAG
  rationale: «Limpios» conserva la dimensión física y ritual del verbo καθαρίζω en este contexto, sin reducirlo a «sanados». La pasiva divina/resultado queda bien expresada con «quedaron» en español.
theological_decisions:
- issue: Cleansing language in a skin-disease healing context
  english_pob_reading: they were cleansed
  chosen_spanish_reading: quedaron limpios
  alternative_spanish_readings:
  - fueron sanados
  - quedaron purificados
  - fueron limpiados
  rationale: El griego destaca la idea de quedar limpio, no solo recuperarse físicamente. «Quedaron limpios» preserva la dimensión corporal y ritual de la purificación antes de la verificación sacerdotal, en consonancia con la lectura auditada de POB.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Priestly inspection implied by the command
  english_pob_reading: show yourselves to the priests
  chosen_spanish_reading: preséntense ante los sacerdotes
  alternative_spanish_readings:
  - muéstrense a los sacerdotes
  - preséntense a los sacerdotes
  rationale: La instrucción presupone el examen sacerdotal de Levítico 14. En español, «preséntense ante» comunica mejor la idea de comparecer para ser verificados que una forma más literal que podría sonar menos clara.
  doctrine_reference: Levítico 14; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se mantiene la lectura auditada de POB: el mandato se expresa con naturalidad en español, y καθαρίζω se traduce con un término de limpieza/pureza que conserva tanto el sentido físico como el ritual. No se observan revisiones textuales en el pasaje fuente ni cambios necesarios respecto del acuerdo alto del auditor.'
  spanish_consistency_notes:
  - Se evita usar «SEÑOR» o terminología eclesiástica ajena al pasaje, porque no hay nombres divinos ni títulos cristológicos en este versículo.
  - «Sacerdotes» se mantiene en plural y con sentido funcional, conforme al contexto levítico implícito.
  - «Limpios» preserva la tensión entre curación y purificación ritual sin restringir el sentido a «sanados».
