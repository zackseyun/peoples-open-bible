translation:
  language: es
  text: 'Dijeron en su corazón[a]: «Destruyámoslos todos juntos». Quemaron todos los lugares de reunión de Dios[b] en el país.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: la forma נִינָם admite otras posibilidades de sentido, como «Oprimámoslos» o «Subyuguémoslos».'
    reason: lexical_alternative
  - marker: b
    text: O «los lugares señalados de Dios»; tradicionalmente, algunas versiones dicen «las sinagogas de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: אָמְרוּ
  english_pob_choice: They said
  chosen_spanish: Dijeron
  alternatives_spanish:
  - Han dicho
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía narrativa se vierte naturalmente en pasado simple en español. «Dijeron» conserva el valor de informe de palabra interior sin sobrecargar el verbo.
- source_word: בְלִבָּם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su mente
  - para sí
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para habla o intención interna. «En su corazón» preserva la imagen antropológica y es idiomático en español bíblico moderno.
- source_word: נִינָם
  english_pob_choice: Let us destroy them
  chosen_spanish: Destruyámoslos
  alternatives_spanish:
  - Oprimámoslos
  - Subyuguémoslos
  - Anulemos a su descendencia
  lexicon: HALOT
  rationale: La forma es difícil y el audit trail inglés opta por el sentido contextual de intención hostil y destructiva. «Destruyámoslos» sigue ese valor sin fingir una certeza léxica que el hebreo no ofrece. Se mantiene la tensión textual implícita en la nota.
- source_word: יָחַד
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - enteramente
  - por completo
  lexicon: HALOT
  rationale: «Todos juntos» reproduce la fuerza colectiva/completa del adverbio en un español natural y enfático.
- source_word: שָׂרְפוּ
  english_pob_choice: They burned
  chosen_spanish: Quemaron
  alternatives_spanish:
  - Incendiaron
  - Prendieron fuego a
  lexicon: HALOT
  rationale: El verbo hebreo indica acción de fuego; «quemaron» es directo, claro y suficientemente fuerte en español para la destrucción cultual.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - completamente
  lexicon: HALOT
  rationale: Se mantiene la totalización del cuantificador en forma natural con el plural español.
- source_word: מוֹעֲדֵי אֵל
  english_pob_choice: the meeting places of God
  chosen_spanish: los lugares de reunión de Dios
  alternatives_spanish:
  - las citas señaladas de Dios
  - las asambleas de Dios
  - las sinagogas de Dios
  lexicon: HALOT
  rationale: Se conserva el sentido locativo/assembleario que el audit trail considera preferible por el verbo «quemaron» y la referencia espacial «en la tierra». «Lugares de reunión» evita el anacronismo de «sinagogas» y no reduce el término a festivales/tiempos.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra del país
  lexicon: HALOT
  rationale: En contexto poético, «en la tierra» conserva la amplitud geográfica del hebreo y sigue la formulación del texto fuente sin necesidad de especificar un territorio moderno.
theological_decisions:
- issue: Valor de מוֹעֲדֵי אֵל como referencia a lugares de culto/assemblea
  english_pob_reading: physical meeting places devoted to God
  chosen_spanish_reading: lugares de reunión de Dios
  alternative_spanish_readings:
  - asambleas de Dios
  - lugares señalados por Dios
  - sinagogas de Dios
  rationale: La acción de quemar y la localización en la tierra favorecen un sentido espacial. La redacción conserva la ambigüedad productiva entre reunión, lugar asignado y culto, sin imponer «sinagogas», que sería históricamente posterior.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Interpretación de נִינָם en una línea de resolución hostil
  english_pob_reading: an expression of hostile intent meaning 'Let us destroy them'
  chosen_spanish_reading: expresión de intención hostil traducida como «Destruyámoslos»
  alternative_spanish_readings:
  - Oprimámoslos
  - Subyuguémoslos
  - Aniquilemos a su descendencia
  rationale: El hebreo presenta una dificultad real y el inglés POB reconoce alternativas. El español mantiene una opción contextual fuerte pero no absolutiza una lectura que sigue siendo debatida, preservando la tensión documental.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que sustituyó una traducción más fuerte por «destroy/destroy them» en favor de un verbo más exacto y natural. Por eso el español usa «Destruyámoslos» y no una opción más figurativa o intensificada. También conserva la decisión estable de traducir מוֹעֲדֵי אֵל con un término espacial y cultual, sin adoptar «sinagogas» como lectura principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, no un título litúrgico más marcado.
  - Se conserva el registro poético y sobrio, sin modernizar excesivamente la imagen de «en su corazón».
  - El plural totalizador «todos juntos» refleja el énfasis de יָחַד sin añadir comentario interpretativo.
  - «En la tierra» mantiene la referencia geográfica amplia del hebreo y la coherencia con el audit trail inglés.
