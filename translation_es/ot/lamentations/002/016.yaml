review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB en casi todo el versículo: oposición hostil («contra ti»), burla («silban»), furia («crujen/rechinan los dientes»), y la triple culminación («esperábamos… hemos hallado… hemos visto»). Sin embargo, hay dos desajustes importantes con la evidencia auditada: (1) la nota [a] está anclada en «contra ti», pero el contenido de la nota trata del verbo «silbar/sisear»; y (2) la nota [b] ofrece una alternativa equivocada («lo hemos devorado») cuando la variante documentada se refiere a בלע como «tragar/engullir/devorar» aplicado a «te» en este contexto, no a «lo».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. Hay una mejora pequeña pero recomendable de naturalidad/precisión idiomática: «crujen los dientes» funciona, pero «rechinan los dientes» es una colocación más estable en español bíblico y general para ויחרקו שן. También conviene corregir la nota [a], cuyo texto actual incluso contiene el anglicismo «gape».'
  glossary_alignment: 'No hay conflicto con la terminología doctrinal del proyecto. Las decisiones léxicas principales son aceptables: «abren la boca», «contra ti», «silban», «te hemos devorado», «ciertamente». La excepción necesaria es corregir las notas para que correspondan al lugar y al sentido adecuados. «Devorado» es una adaptación válida de בלע, pero la nota alternativa debe formularse con objeto de segunda persona («te hemos tragado/engullido») o explicar la metáfora sin introducir «lo».'
  issues:
  - severity: high
    issue: La nota [a] está colocada en la frase equivocada.
    rationale: El marcador [a] aparece tras «contra ti», pero el contenido de la nota explica שָׁרְקוּ («silban/sisean»), no «abren la boca contra ti». Esto rompe la trazabilidad entre texto, fuente y nota.
  - severity: high
    issue: La nota [b] da una alternativa semánticamente incorrecta para בִּלָּעְנוּ.
    rationale: La nota dice «O ‘lo hemos devorado’», pero el discurso directo va dirigido a «ti» y la revisión inglesa auditada cambió precisamente a segunda persona. La alternativa debe conservar ese referente («te hemos tragado/engullido») o explicar la metáfora sin cambiar el objeto.
  - severity: medium
    issue: 'La nota [a] usa un anglicismo/metalingüismo poco apropiado: «gape».'
    rationale: En una nota para lectores de una Biblia en español, conviene usar equivalentes españoles como «abrir de par en par» o «abrir ampliamente», no una palabra inglesa.
  - severity: low
    issue: «Crujen los dientes» es entendible, pero «rechinan los dientes» sería más idiomático.
    rationale: Para ויחרקו שן, «rechinar los dientes» es una formulación más estable y transparente en español bíblico, aunque la actual no distorsiona el sentido.
  revised_spanish_text: 'Todos tus enemigos abren la boca contra ti; silban[a] y rechinan los dientes. Dicen: «¡Te hemos devorado![b] Ciertamente este es el día que esperábamos; lo hemos hallado, lo hemos visto».'
  revised_footnotes:
