translation:
  language: es
  text: Y la tierra hizo brotar vegetación[a], plantas que dan semilla según sus tipos, y árboles que dan fruto, con su semilla en él, según sus tipos[b]. Y Dios vio que era bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'verdor' o 'crecimiento vegetal'. El hebreo דֶּשֶׁא designa crecimiento vegetal fresco en sentido amplio, no solo 'hierba'.
    reason: lexical_alternative
  - marker: b
    text: O 'según su clase'. La expresión hebrea apunta a categorías creadas, no a una noción técnica moderna de 'especie'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹצֵא
  english_pob_choice: brought forth
  chosen_spanish: produjo
  alternatives_spanish:
  - hizo salir
  - sacó
  lexicon: HALOT
  rationale: El hiphil de יצא expresa que la tierra hace salir la vegetación. En español, 'produjo' conserva la fuerza generativa sin sonar forzado como un calco de 'sacó'.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: HALOT
  rationale: En Génesis 1 el marco es cósmico; 'la tierra' corresponde mejor que 'el suelo' y mantiene la coherencia con el relato de la creación.
- source_word: דֶּשֶׁא
  english_pob_choice: vegetation
  chosen_spanish: vegetación
  alternatives_spanish:
  - verdor
  - brotación
  - hierba
  lexicon: HALOT
  rationale: דֶּשֶׁא designa crecimiento vegetal fresco en sentido amplio. 'Vegetación' preserva ese valor colectivo sin reducirlo a 'hierba'.
- source_word: עֵשֶׂב
  english_pob_choice: plants
  chosen_spanish: plantas
  alternatives_spanish:
  - hierbas
  - vegetación
  - plantas verdes
  lexicon: HALOT
  rationale: עֵשֶׂב puede referirse a plantas o herbaje, y aquí va modificado por la frase de semilla. 'Plantas' es claro y natural en español.
- source_word: מַזְרִיעַ זֶרַע
  english_pob_choice: yielding seed
  chosen_spanish: que dan semilla
  alternatives_spanish:
  - que producen semilla
  - que llevan semilla
  - semillando
  lexicon: HALOT
  rationale: La combinación participial destaca capacidad reproductiva continua. 'Que dan semilla' expresa bien esa idea sin sonar técnica ni arcaica.
- source_word: לְמִינֵהוּ
  english_pob_choice: according to their kinds
  chosen_spanish: según sus clases
  alternatives_spanish:
  - según sus especies
  - según su clase
  - conforme a sus clases
  lexicon: HALOT
  rationale: מין indica categoría o clase, no una taxonomía moderna. 'Clases' conserva el valor clasificatorio y evita importar el término científico 'especies'.
- source_word: וְעֵץ עֹשֶׂה פְּרִי
  english_pob_choice: and trees bearing fruit
  chosen_spanish: y árboles que dan fruto
  alternatives_spanish:
  - y árboles frutales
  - y árboles produciendo fruto
  lexicon: HALOT
  rationale: Aunque עֵץ está en singular, funciona colectivamente. 'Árboles que dan fruto' suena natural y mantiene la descripción de fecundidad.
- source_word: אֲשֶׁר זַרְעוֹ בוֹ
  english_pob_choice: in which their seed is
  chosen_spanish: en los cuales está su semilla
  alternatives_spanish:
  - con semilla dentro
  - en el cual está su semilla
  lexicon: HALOT
  rationale: La cláusula relativa indica que la semilla está contenida en el fruto. En español, 'en los cuales está su semilla' reproduce la relación sin perder claridad.
- source_word: וַיַּרְא אֱלֹהִים כִּי טוֹב
  english_pob_choice: And God saw that it was good
  chosen_spanish: Y Dios vio que era bueno
  alternatives_spanish:
  - Y Dios vio que esto era bueno
  - Y Dios vio que estaba bien
  lexicon: HALOT
  rationale: Esta es la fórmula evaluativa regular de Génesis 1. 'Era bueno' es la forma más directa y fiel en español.
theological_decisions:
- issue: Evitar la taxonomía biológica moderna en לְמִינֵהוּ
  english_pob_reading: according to their kinds
  chosen_spanish_reading: según sus clases
  alternative_spanish_readings:
  - según sus especies
  - según su especie
  rationale: מין no equivale a una categoría científica moderna. 'Clases' transmite la idea de categorías creadas sin forzar un debate científico ajeno al texto.
  doctrine_reference: Principio de fidelidad al sentido llano del texto; no introducir precisiones que el hebreo no exige.
translation_notes:
  revision_awareness: 'El audit trail en inglés pasó por ajustes estilísticos menores: se alternó entre ''in which is their seed'' y ''with their seed in it'' para mejorar naturalidad sin alterar el sentido. La versión española conserva el sentido de contención de la semilla dentro del fruto y evita una calca rígida. También se mantuvo la decisión interpretativa de renderizar מין como categoría/clase en lugar de especie científica.'
  spanish_consistency_notes:
  - Se usa 'la tierra' para הָאָרֶץ en coherencia con Génesis 1.
  - '''Dios'' traduce אֱלֹהִים de forma estándar en este contexto narrativo.'
  - '''semilla'' conserva el sustantivo concreto del hebreo זֶרַע y evita una abstracción innecesaria.'
  - '''clases'' mantiene el valor clasificatorio de מין sin importar terminología biológica moderna.'
  - La puntuación refleja la cadencia del relato de creación y mantiene la enumeración de dos miembros vegetales.
