lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una experiencia previa con efecto presente; en español, el perfecto compuesto suena natural y conserva ese matiz de algo ya escuchado y vigente en la reprensión.
- source_word: כְאֵלֶּה רַבּוֹת
  english_pob_choice: many such things
  chosen_spanish: muchas cosas como estas
  alternatives_spanish:
  - muchas cosas semejantes
  - cosas como estas, muchas
  lexicon: HALOT
  rationale: La construcción comparativa más demostrativa comunica en español la idea idiomática de 'cosas como estas'. Se mantiene 'muchas' para רַבּוֹת y el orden fluido en español evita un calco áspero.
- source_word: מְנַחֲמֵי
  english_pob_choice: comforters
  chosen_spanish: consoladores
  alternatives_spanish:
  - consueladores
  lexicon: HALOT
  rationale: El participio sustantivado de נחם puede traducirse por 'consoladores' sin perder el sentido lexical. 'Consoladores' es claro y mantiene la ironía del reproche.
- source_word: עָמָל
  english_pob_choice: miserable
  chosen_spanish: miserables
  alternatives_spanish:
  - de miseria
  - fatigosos
  - molestos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de captar la carga de עמל como aflicción/trabajo penoso, pero en español 'miserables' funciona como calificativo directo y natural de los consoladores, preservando la fuerza irónica del giro.
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - ustedes todos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: La forma plural enfática requiere una dirección colectiva explícita. 'Todos ustedes' es claro en español latinoamericano y conserva el señalamiento a todo el grupo.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alto acuerdo; no hay revisiones aplicadas y la traducción sigue de cerca las decisiones léxicas documentadas, adaptándolas a un español natural sin perder la ironía del reproche.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí ningún tetragrámaton ni sustitución divina relevante.
  - '''He oído'' refleja mejor el perfecto hebreo que un simple pasado y conserva el tono de experiencia acumulada.'
  - '''Consoladores miserables'' de la tradición inglesa se vierte como ''consoladores miserables'', pero se mantiene una nota alternativa porque en español también es posible entender el giro como ''consoladores de miseria''.'
