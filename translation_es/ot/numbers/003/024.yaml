translation:
  language: es
  text: Y el jefe[a] de la casa paterna de los gersonitas era Eliasaf, hijo de Lael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «casa del padre», un término de parentesco israelita para una unidad familiar o clánica patrilineal.'
    reason: cultural_note
lexical_decisions:
- source_word: וּנְשִׂיא
  english_pob_choice: And the chief
  chosen_spanish: Y el jefe
  alternatives_spanish:
  - Y el líder
  - Y el príncipe
  lexicon: HALOT
  rationale: נָשִׂיא designa a una persona elevada, es decir, un jefe, líder o príncipe. En este contexto administrativo y genealógico, «jefe» comunica bien la función de cabeza del grupo sin sugerir monarquía. Mantengo la conjunción inicial para conservar la continuidad de la enumeración.
- source_word: בֵּית אָב
  english_pob_choice: of the ancestral house
  chosen_spanish: de la casa paterna
  alternatives_spanish:
  - de la casa ancestral
  - de la casa de los padres
  lexicon: HALOT
  rationale: La expresión hebrea es un término de parentesco israelita para una unidad familiar/clánica patrilineal. «Casa paterna» preserva esa estructura y suena más natural en español bíblico moderno que una traducción demasiado explicativa.
- source_word: לַגֵּרְשֻׁנִּי
  english_pob_choice: of the Gershonites
  chosen_spanish: de los gersonitas
  alternatives_spanish:
  - del clan gersonita
  - del gersonita
  lexicon: HALOT
  rationale: La preposición לַ aquí marca relación o pertenencia al grupo de los gersonitas. El plural colectivo español «los gersonitas» comunica mejor el conjunto clánico descendiente de Gersón.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliásaf
  lexicon: Transliteración convencional
  rationale: Nombre propio transliterado. Uso «Eliasaf» como forma española sobria y reconocible, evitando añadir vocales o acentos que no estén exigidos por la convención adoptada.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: Fórmula genealógica estándar en español; reproduce fielmente la relación paterna explícita del hebreo.
- source_word: לָאֵל
  english_pob_choice: Lael
  chosen_spanish: Lael
  lexicon: Transliteración convencional
  rationale: Nombre propio transliterado según la convención habitual; no hay base para traducirlo.
translation_notes:
  revision_awareness: El texto y la distribución de funciones concuerdan con el testimonio hebreo base y con el audit trail inglés; no se reportan revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del versículo porque no aparece el tetragrámaton en el texto base.
  - Conservo una sintaxis breve y enumerativa, acorde con el hebreo y con la lectura administrativa del contexto.
  - «Casa paterna» preserva el valor técnico de בֵּית אָב sin forzar una paráfrasis extensa.
