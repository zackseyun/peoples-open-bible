translation:
  language: es
  text: 'Y el ángel de Yahvé dijo a Manoa: «Si me detienes, no comeré tu pan[a]. Pero si preparas un holocausto[b], ofrécelo a Yahvé». Porque Manoa no sabía que él era el ángel de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no comeré tu pan». Aquí «pan» probablemente significa alimento o una comida en general.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Si haces un holocausto, debes ofrecerlo a Yahvé». El hebreo usa un verbo para hacer o preparar la ofrenda y otro para ofrecerla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar 'mensajero' o 'ángel'; en este relato la figura es un ser celestial, por lo que 'ángel' es la equivalencia española más natural. Se mantiene Yahvé para el nombre divino, conforme al criterio del proyecto.
- source_word: מָנוֹחַ
  english_pob_choice: Manoah
  chosen_spanish: Manoa
  alternatives_spanish:
  - Manóaj
  lexicon: BHS/WLC transliteration convention
  rationale: Se conserva el nombre propio en forma castellana fluida. 'Manoa' es más legible para una audiencia amplia que una transliteración más marcada.
- source_word: תַּעְצְרֵנִי
  english_pob_choice: you detain me
  chosen_spanish: me detienes
  alternatives_spanish:
  - me retienes
  - me detienes aquí
  - me mantienes aquí
  lexicon: HALOT
  rationale: El verbo עצר aquí expresa retener o detener. En español, 'detener' comunica bien la idea de hacer que el visitante permanezca mientras se prepara la comida, sin perder la fuerza literal.
- source_word: לֹא אֹכַל בְּלַחְמֶךָ
  english_pob_choice: I will not eat your food
  chosen_spanish: no comeré tu pan
  alternatives_spanish:
  - no comeré tu comida
  - no comeré de tu pan
  lexicon: HALOT
  rationale: לֶחֶם significa literalmente 'pan', pero también puede referirse a alimento o comida en general. Aquí se conservó 'pan' para reflejar el hebreo con mayor cercanía, apoyado por la nota que explica su sentido amplio.
- source_word: תַּעֲשֶׂה עֹלָה
  english_pob_choice: you prepare a burnt offering
  chosen_spanish: haces un holocausto
  alternatives_spanish:
  - preparas un holocausto
  - haces una ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio que asciende en humo; en español bíblico, 'holocausto' es el término tradicional y preciso. 'Haces' conserva el primer verbo de la secuencia, sin fusionarlo con el siguiente.
- source_word: לַיהוָה תַּעֲלֶנָּה
  english_pob_choice: offer it up to Yahweh
  chosen_spanish: ofrécelo en holocausto
  alternatives_spanish:
  - ofrécelo a Yahvé
  - súbelo a Yahvé
  - preséntalo a Yahvé
  lexicon: HALOT
  rationale: El verbo en hifil de עלה con עֹלָה expresa la acción de presentar/ofrecer el sacrificio. En español, 'ofrécelo en holocausto' comunica el valor sacrificial del giro y mantiene la relación con la ofrenda ascendente.
- source_word: כִּי לֹא יָדַע מָנוֹחַ
  english_pob_choice: For Manoah did not know
  chosen_spanish: Porque Manoa no sabía
  alternatives_spanish:
  - Pues Manoa no sabía
  - Porque Manoa no conocía
  lexicon: HALOT
  rationale: כִּי introduce aquí una explicación narrativa. 'No sabía' refleja la falta de reconocimiento de manera natural en español.
- source_word: מַלְאַךְ יְהוָה הוּא
  english_pob_choice: that he was the angel of Yahweh
  chosen_spanish: que él era el ángel de Yahvé
  alternatives_spanish:
  - que era el ángel de Yahvé
  - que se trataba del ángel de Yahvé
  lexicon: HALOT
  rationale: Se conserva la afirmación explícita del sujeto pronominal הוּא. 'Él era' mantiene la referencia directa del texto hebreo y la identificación narrativa.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio divino, no un título sustitutivo. En español bíblico, 'Yahvé' es la forma establecida en este proyecto para preservar el nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido sacrificial de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda de ascensión
  rationale: '''Holocausto'' es el equivalente bíblico tradicional para עֹלָה y conserva el matiz de una ofrenda totalmente consumida por el fuego. No se sustituye por ''ofrenda'' genérica para no perder la especificidad ritual.'
  doctrine_reference: Levítico 1; uso léxico bíblico sacrificial
- issue: Secuencia verbal de 'hacer' y 'ofrecer'
  english_pob_reading: prepare a burnt offering ... offer it up
  chosen_spanish_reading: haces un holocausto ... ofrécelo en holocausto
  alternative_spanish_readings:
  - preparas un holocausto ... ofrécelo
  - haces un holocausto ... ofrécelo a Yahvé
  rationale: El hebreo distingue entre preparar/hacer la ofrenda y elevarla/ofrecerla. La redacción española conserva esa tensión con dos verbos distintos, evitando borrar el matiz observado en la nota inglesa.
  doctrine_reference: Nota textual/lexical del audit trail inglés
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservaron la distinción entre ''hacer'' y ''ofrecer'' la ofrenda, el nombre divino como Yahvé en español, y la nota sobre el hebreo literal ''pan'' para לֶחֶם. No hubo revisiones aplicadas en la última pasada del inglés, y el acuerdo de revisión fue alto, por lo que no se introdujeron cambios textuales sustantivos más allá de la adaptación al español.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se optó por 'holocausto' para עֹלָה, coherente con el registro bíblico y sacrificial.
  - Se mantuvo la diferencia entre 'detienes' y 'ofrécelo' para reflejar dos verbos hebreos distintos.
  - Se prefirió 'Manoa' como forma castellana legible del nombre propio.
  - La puntuación y las comillas siguen normas del español moderno.
