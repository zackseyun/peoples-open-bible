id: GAL.4.1
reference: Galatians 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Λέγω δέ, ἐφ’ ὅσον χρόνον ὁ κληρονόμος νήπιός ἐστιν, οὐδὲν διαφέρει δούλου κύριος πάντων ὤν,
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/001.yaml
  text: Now I say that as long as the heir is a child[a], he differs in nothing from a slave, though he is lord of all[b],
  footnotes:
  - marker: a
    text: 'Or ''a minor.'' The Greek νήπιος can refer to an immature child and, in this context, carries the sense of one not yet of age.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''servant.'' The Greek δοῦλος often denotes a slave or bonded person; here ''slave'' is used to preserve the force of Paul''s comparison.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 말하는 것은 이것입니다. 상속자가 어린아이[a]일 동안에는, 모든 것의 주인이라 할지라도 노예[b]와 다를 바가 없고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「미성년자」. 헬라어 νήπιος는 아직 성년에 이르지 못한 자를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 δοῦλος. 본 비유는 바울이 노예-자유 대조를 본격적으로 전개하는 곳이므로, 매임의 무게를 살리는 「노예」를 택한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: νήπιός
  english_pob_choice: a child
  chosen_korean: 어린아이
  alternatives_korean:
  - 미성년자
  lexicon: BDAG
  rationale: 본문은 법적 미성년 신분을 가리키지만, 한국어로는 「어린아이」가 자연스럽고 각주로 보완한다.
- source_word: δούλου
  english_pob_choice: a slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  lexicon: BDAG
  rationale: 본 비유는 바울의 노예-자유 대조의 시작이며, DOCTRINE.md §1을 따라 「노예」를 택한다.
- source_word: κύριος πάντων ὤν
  english_pob_choice: though he is lord of all
  chosen_korean: 모든 것의 주인이라 할지라도
  alternatives_korean:
  - 모든 것의 주(主)이지만
  lexicon: BDAG
  rationale: 본 비유의 κύριος는 일반 「주인」의 의미이므로 신학적 칭호 「주」와 구분한다.
theological_decisions:
- issue: 갈 4:1의 δοῦλος를 「노예」로 옮김
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 하인
  rationale: 갈 4:1-7과 4:21-31은 바울이 「노예-자유」 대조를 신학적으로 본격 전개하는 곳이다. 「종」은 매임의 무게를 약화시키므로, 글로사리 권고를 따라 「노예」를 채택한다.
  doctrine_reference: DOCTRINE.md §1; KOREAN_PIPELINE.md glossary
