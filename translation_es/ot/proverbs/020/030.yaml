translation:
  language: es
  text: Los moretones de una herida limpian el mal[a], y los golpes limpian lo más profundo del vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «purgan el mal»; el verbo hebreo puede implicar la idea de frotar o purificar hasta quitar algo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cámaras del vientre», una expresión hebrea para lo más profundo del interior de una persona.
    reason: cultural_note
lexical_decisions:
- source_word: חַבֻּרוֹת
  english_pob_choice: bruises
  chosen_spanish: cardenales
  alternatives_spanish:
  - moretones
  - contusiones
  - magulladuras
  lexicon: HALOT
  rationale: El término hebreo describe marcas dejadas por golpes. En español, «cardenales» es natural y comunica esa huella visible del golpe sin perder la concreción física que tiene el verso.
- source_word: פֶּצַע
  english_pob_choice: of a wound
  chosen_spanish: de una herida
  alternatives_spanish:
  - de una lesión
  - de una llaga
  lexicon: HALOT
  rationale: 'Sigo la construcción genitiva del hebreo para mantener la imagen compacta: no se trata de un solo término abstracto, sino de «cardenales de una herida», que intensifica el cuadro de disciplina corporal.'
- source_word: תמריק
  english_pob_choice: cleanse away
  chosen_spanish: limpian
  alternatives_spanish:
  - purgan
  - depuran
  - raspan
  lexicon: HALOT
  rationale: El verbo hifil de מרק tiene fuerza causativa de limpiar, pulir o frotar hasta quitar algo. En este contexto, «limpian» transmite la acción efectiva de remover el mal sin sonar demasiado técnico o arcaico.
- source_word: בְּרָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  - la perversidad
  lexicon: HALOT
  rationale: «El mal» conserva el peso moral del hebreo רע y funciona bien en el registro sapiencial. Evita rebajar el término a una idea meramente pragmática de «lo malo».
- source_word: וּמַכּוֹת
  english_pob_choice: and blows
  chosen_spanish: y los golpes
  alternatives_spanish:
  - y los azotes
  - y los castigos
  - y las heridas
  lexicon: HALOT
  rationale: «Golpes» es la equivalencia más directa e idiomática para el sustantivo de golpear. Mantiene el paralelo con el primer hemistiquio y conserva la crudeza disciplinaria del hebreo.
- source_word: חַדְרֵי בָטֶן
  english_pob_choice: the innermost parts of the belly
  chosen_spanish: las partes más íntimas del vientre
  alternatives_spanish:
  - las cámaras del vientre
  - las entrañas más profundas
  - los recovecos del vientre
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «las cámaras del vientre», una metáfora para el interior más profundo de la persona. En español, «las partes más íntimas del vientre» preserva la imagen corporal y su sentido antropológico sin volverla opaca.
theological_decisions:
- issue: Imagen de disciplina dolorosa y efecto moral
  english_pob_reading: The verse teaches that painful correction can remove moral evil and penetrate to a person's deepest interior.
  chosen_spanish_reading: El verso presenta el dolor de la corrección como algo capaz de quitar el mal y alcanzar lo más hondo de la persona.
  alternative_spanish_readings:
  - El verso habla de manera general del efecto purificador del sufrimiento.
  - El verso describe solo una metáfora de experiencia dolorosa, sin implicar disciplina correctiva.
  rationale: 'La forma más natural en Proverbios es leer estas imágenes como disciplina correctiva, pero el texto no debe ampliarse a una doctrina general sobre todo sufrimiento. La redacción española conserva la tensión: dolor real, efecto purificador real, sin extrapolar más allá de lo que el hebreo dice.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó el segundo hemistiquio para reflejar con más claridad el paralelismo verbal: se mantuvo en español la repetición de «limpian» en ambos miembros para corresponder a ese efecto de paralelismo completo sin introducir una paráfrasis.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «siervo» o vocabulario eclesial tradicional porque el hebreo aquí es imaginería corporal sapiencial y no lo requiere.
  - «Vientre» conserva la metáfora corporal; la nota aclara el valor antropológico sin sustituirlo por una abstracción.
