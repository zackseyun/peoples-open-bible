  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; categorías morales bien conservadas; «conoce» respeta la decisión lexical de no sobreinterpretar ידע. No hay conflicto doctrinal ni terminológico serio.'
