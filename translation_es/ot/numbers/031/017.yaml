  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Maten», «varón», «mujer» y el manejo del modismo sexual son coherentes con las decisiones léxicas auditadas. La revisión solo ajusta español idiomático y la nota para reflejar mejor la alternativa literal del hebreo.
