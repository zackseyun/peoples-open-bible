theological_decisions:
- issue: 12:18-29 — 시내산 vs 시온의 종말론적 대조 보존
  chosen_reading: 시내산의 두려운 신현과 시온의 종말론적 도성 이미지를 풀어쓰지 않고 보존
  alternative_readings:
  - 설명적 의역
  rationale: 본 단락은 옛 언약의 신현(시내산)과 새 언약의 종말론적 도성(시온)의 강한 대조를 펼친다. 한국어 번역은 「만질 수 있는」, 「흔들리지 않는」, 「소멸하는 불」 등 본문의 강한 종말론적 어휘를 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve eschatological imagery'
