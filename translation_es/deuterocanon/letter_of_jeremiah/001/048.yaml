review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: una contingencia futura, guerra y calamidades que sobrevienen a los ídolos, y la consulta de los sacerdotes acerca de dónde ocultarse con ellos. Sin embargo, «caen sobre ellos» no reproduce tan bien como «vienen sobre ellos» o «les sobrevienen» la fuerza direccional de ἐπέλθῃ ἐπʼ αὐτά, que en el expediente inglés se entendió como «come upon», no como algo que literalmente ‘cae’.'
  spanish_quality_summary: El español es claro y digno, pero el arranque «Porque, cuando…» suena algo trabado en español bíblico corriente; «Porque cuando…» fluye mejor. Además, la nota al pie está bien, pero debe anclarse exactamente donde corresponde en el texto revisado. El resto del versículo es natural y legible.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la referencia pronominal a los ídolos/imágenes, que el borrador maneja correctamente manteniendo el pronombre en el texto y aclarándolo en nota. «Calamidades», «sacerdotes», «deliberan entre sí» y «esconderse con ellos» son compatibles con las decisiones auditadas.
  issues:
  - severity: medium
    issue: «caen sobre ellos» para ἐπέλθῃ ἐπʼ αὐτὰ
    rationale: Aunque es entendible, «caen sobre» introduce una imagen de caída que no es la mejor correspondencia para el compuesto verbal entendido en el POB como «come upon». «Vienen sobre ellos» preserva mejor el matiz de sobrevenir/llegar contra ellos.
  - severity: low
    issue: Coma innecesaria tras «Porque»
    rationale: «Porque, cuando…» suena menos natural en español. «Porque cuando…» mantiene mejor la fluidez sin cambiar el sentido.
  revised_spanish_text: Porque cuando la guerra y las calamidades vienen sobre ellos[a], los sacerdotes deliberan entre sí dónde esconderse con ellos.
