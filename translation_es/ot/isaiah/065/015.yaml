translation:
  language: es
  text: Dejarán su nombre como maldición[a] para mis escogidos; y el Señor Yahvé te hará morir[b]; pero a sus siervos les dará otro nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para un juramento’; es decir, su nombre se usaría en una fórmula oral de maldición o imprecación.
    reason: lexical_alternative
  - marker: b
    text: O ‘él llamará otro nombre a sus siervos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנַּחְתֶּם
  english_pob_choice: you will leave
  chosen_spanish: Dejarán
  alternatives_spanish:
  - abandonarán
  - dejarán atrás
  lexicon: HALOT
  rationale: El Hiphil de נוח/הניח con 'nombre' como objeto expresa dejar algo en una condición o uso posterior. 'Dejarán' es natural en español y conserva la idea de dejar el nombre disponible para lo que sigue.
- source_word: שִׁמְכֶם
  english_pob_choice: your name
  chosen_spanish: su nombre
  alternatives_spanish:
  - vuestro nombre
  - tu nombre
  lexicon: HALOT
  rationale: Se mantiene el sustantivo básico 'nombre'. En español, 'su' funciona bien para el destinatario plural implícito y evita forzar un singular inexistente en el hebreo.
- source_word: לִשְׁבוּעָה
  english_pob_choice: as a curse
  chosen_spanish: como juramento
  alternatives_spanish:
  - como juramento-formula
  - como maldición
  - para juramento
  lexicon: HALOT
  rationale: La POB inglesa preserva en nota la lectura más literal 'for an oath', y el hebreo permite la idea de fórmula jurada o de invocación solemne. En español, 'como juramento' comunica mejor la forma lingüística básica sin borrar la tensión con el uso imprecatorio del contexto; la nota explica la alternativa.
- source_word: לִבְחִירַי
  english_pob_choice: for my chosen ones
  chosen_spanish: para mis escogidos
  alternatives_spanish:
  - para mi escogido
  - para mis elegidos
  lexicon: HALOT
  rationale: El plural con sufijo de primera persona pide plural en español. 'Escogidos' conserva el valor sustantivo del participio/adjetivo y suena más bíblico y directo que 'elegidos'.
- source_word: וֶהֱמִיתְךָ
  english_pob_choice: will put you to death
  chosen_spanish: los hará morir
  alternatives_spanish:
  - los matará
  - los dará muerte
  - los hará morir a ustedes
  lexicon: HALOT
  rationale: El Hiphil de מות es causativo. 'Hará morir' refleja esa causatividad y suena más cercano al hebreo que un simple 'matará'; se adapta el objeto al plural implícito por el cambio de referente en la línea española.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord Yahweh
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahweh
  - el Señor YHWH
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el nombre divino: YHWH → ''Yahvé''. En el compuesto אֲדֹנָי יְהוִה, ''el Señor Yahvé'' preserva ambos títulos de manera inteligible en español y evita la sustitución tradicional por ''SEÑOR''.'
- source_word: וְלַעֲבָדָיו
  english_pob_choice: but to his servants
  chosen_spanish: pero a sus siervos
  alternatives_spanish:
  - y a sus siervos
  - pero para sus siervos
  - pero a sus esclavos
  lexicon: HALOT
  rationale: La relación de contraste es clara en el contexto. 'Siervos' se conserva como opción contextual ya documentada en la POB inglesa para resaltar pertenencia y servicio, sin imponer aquí la fuerza social de 'esclavos'.
- source_word: יִקְרָא שֵׁם אַחֵר
  english_pob_choice: he will call another name
  chosen_spanish: les pondrá otro nombre
  alternatives_spanish:
  - les llamará otro nombre
  - les dará otro nombre
  - llamará otro nombre a
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'llamará un nombre otro', en español 'poner nombre' expresa de manera natural el acto de asignar una nueva designación. Se conserva el sentido de cambio de identidad sin perder claridad.
theological_decisions:
- issue: Forma de traducir el nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahweh
  - el Señor YHWH
  rationale: La directriz del proyecto exige Yahvé para YHWH. En este verso, el hebreo combina אֲדֹנָי con el tetragrámaton, así que se preserva la doble referencia como título + nombre propio. 'Señor Yahvé' mantiene la solemnidad y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; lectura directa del nombre divino'
- issue: Sentido de לִשְׁבוּעָה en contexto judicial
  english_pob_reading: as a curse / for an oath
  chosen_spanish_reading: como juramento[a]
  alternative_spanish_readings:
  - como maldición
  - para juramento
  - como fórmula de juramento
  rationale: El hebreo puede funcionar como fórmula solemne evocada al jurar, y la tradición auditada en inglés retuvo una nota para la lectura más literal. En español se elige 'juramento' para no cerrar prematuramente el matiz; la nota preserva la alternativa de lectura 'para un juramento'.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas cuando el contexto permite más de una lectura'
translation_notes:
  revision_awareness: 'La traducción inglesa más reciente corrigió la primera cláusula desde ''curse'' a ''oath'' y ajustó el nombre divino a ''the Lord Yahweh''. Esta versión española sigue esa revisión: opta por ''juramento'' en lugar de ''maldición'', y por ''Yahvé'' para reflejar directamente YHWH, manteniendo la cláusula final como un acto de asignación de nombre. También se conserva la tensión contextual entre juramento y uso imprecatorio mediante la nota.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en mayúsculas como sustituto del nombre divino, siguiendo la norma del proyecto para YHWH.
  - '''Escogidos'' y ''siervos'' se usan de forma coherente con el contraste del verso y con la terminología habitual del POB cuando no se requiere ''esclavos''.'
  - La clausula final se naturaliza como 'poner otro nombre' para no forzar un calco poco idiomático, pero la nota conserva la alternativa literal 'llamar otro nombre'.
  - Se mantiene la mayúscula reverencial en 'Yahvé' como forma estable del nombre divino en español del proyecto.
