translation:
  language: es
  text: cuando el Todopoderoso todavía estaba conmigo[a], y mis muchachos estaban alrededor de mí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis servidores estaban alrededor de mí». El hebreo נְעָרַי puede significar «mis muchachos», «mis ayudantes» o «mis servidores», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹד
  english_pob_choice: when ... was still
  chosen_spanish: cuando ... estaba todavía
  alternatives_spanish:
  - mientras
  - así que aún
  lexicon: HALOT
  rationale: En este contexto retrospectivo, בְּעוֹד marca una situación pasada que aún continuaba. «cuando ... estaba todavía» conserva la idea temporal y la sensación de una condición ya concluida.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Job usa este título divino; en español, «el Todopoderoso» transmite el valor del título con claridad y sin transliteración innecesaria.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - junto a mí
  lexicon: HALOT
  rationale: La preposición עם con sufijo de primera persona expresa compañía o presencia cercana. «Conmigo» es natural en español y mantiene la relación personal.
- source_word: סְבִיבוֹתַי
  english_pob_choice: around me
  chosen_spanish: alrededor de mí
  alternatives_spanish:
  - rodeándome
  - en torno a mí
  lexicon: HALOT
  rationale: El término indica circunferencia o entorno. «Alrededor de mí» reproduce de manera transparente la imagen espacial.
- source_word: נְעָרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis servidores
  - mis criados
  - mis sirvientes
  lexicon: HALOT
  rationale: נַעַר puede denotar joven, ayudante, servidor o criado según el contexto. Dado el marco doméstico y de séquito, «mis jóvenes» preserva el sentido básico sin fijar de más la función social. La alternativa «servidores» queda como posibilidad contextual, como en el auditorial inglés.
translation_notes:
  revision_awareness: El pasaje no presenta cambios de revisión en el paquete auditado; se mantiene la lectura estable del texto hebreo con la misma decisión lexical principal del inglés, adaptada a un español natural y fiel.
  spanish_consistency_notes:
  - Se conserva «Todopoderoso» para שַׁדַּי, en línea con la tradición de POB de traducir títulos divinos en vez de transliterarlos.
  - «Mis jóvenes» evita imponer «siervos» o «criados» donde el hebreo admite varias posibilidades; la nota recoge esa tensión lexical.
  - 'La puntuación y el orden responden al español moderno: la cláusula temporal abre la oración y la segunda parte coordina la escena de manera clara.'
