translation:
  language: es
  text: Vienen desde el norte, en el gozo de su Dios[a]; desde islas lejanas Dios los ha reunido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «costas lejanas» en vez de «islas lejanas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ βορρᾶ
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  - desde la región norteña
  lexicon: BDAG
  rationale: ἀπό con genitivo indica origen o procedencia. «Desde el norte» preserva ese valor direccional de manera natural en español.
- source_word: ἔρχονται
  english_pob_choice: they come
  chosen_spanish: vienen
  alternatives_spanish:
  - están viniendo
  - llegan
  lexicon: BDAG
  rationale: El presente griego conserva una vividez de acción en curso; «vienen» reproduce bien ese valor en español sin forzar una perífrasis.
- source_word: τῇ εὐφροσύνῃ
  english_pob_choice: in the joy
  chosen_spanish: en el gozo
  alternatives_spanish:
  - con gozo
  - en la alegría
  lexicon: BDAG
  rationale: El dativo expresa modo o estado acompañante. «En el gozo» mantiene el sustantivo nominal de εὐφροσύνη y evita reducirlo a un adverbio.
- source_word: τοῦ θεοῦ αὐτῶν
  english_pob_choice: of their God
  chosen_spanish: de su Dios
  alternatives_spanish:
  - de su propio Dios
  - que viene de su Dios
  lexicon: BDAG
  rationale: La relación posesiva es directa y natural en español. «Su Dios» conserva la pertenencia sin añadir un matiz causal no explícito en el griego.
- source_word: ἐκ νήσων μακρόθεν
  english_pob_choice: from distant islands
  chosen_spanish: desde islas lejanas
  alternatives_spanish:
  - desde las islas lejanas
  - desde costas lejanas
  lexicon: BDAG
  rationale: ἐκ marca procedencia. «Islas lejanas» conserva la imagen geográfica; se evita fijar «costas» porque νῆσοι significa primariamente «islas», aunque el sentido marítimo más amplio sigue siendo posible en la nota.
- source_word: συνήγαγεν
  english_pob_choice: has gathered
  chosen_spanish: ha reunido
  alternatives_spanish:
  - reunió
  - ha congregado
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto para reflejar una acción ya cumplida con resultado presente. «Reunido» comunica bien la idea de juntar o congregar sin cargar un matiz eclesiástico.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Altísimo
  lexicon: BDAG
  rationale: Se mantiene el sujeto explícito al final de la cláusula para conservar el énfasis en la agencia divina y el orden natural del español.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran acuerdo alto; no se requieren revisiones sustantivas. Se conserva la estructura doble del versículo y la tensión léxica de νῆσοι como «islas», con una nota que admite el valor ampliado de «costas».
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo posesivo añadido, siguiendo el posesivo «su Dios» del griego.
  - Se evita «SEÑOR» porque aquí el texto griego tiene ὁ θεός explícito, no κύριος.
  - Se mantiene el paralelismo de dos cláusulas con punto y coma para reflejar la coordinación del original.
