translation:
  language: es
  text: Sus piernas eran de hierro; sus pies, en parte de hierro y en parte de barro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arcilla» o «loza» para «barro» (arameo חֲסַף).
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁק֖וֹ/הִי
  english_pob_choice: its legs
  chosen_spanish: sus piernas
  alternatives_spanish:
  - sus piernas inferiores
  - sus espinillas
  lexicon: HALOT
  rationale: El término arameo se refiere a la parte inferior de la estatua, equivalente a piernas en español general. «Piernas» es más natural y claro que «espinillas», que suena demasiado anatómico y estrecho para una estatua.
- source_word: דִּ֣י פַרְזֶ֑ל
  english_pob_choice: of iron
  chosen_spanish: de hierro
  alternatives_spanish:
  - de hierro puro
  - hechas de hierro
  lexicon: HALOT
  rationale: La relación posesiva/compositiva del arameo se expresa de forma natural en español con «de hierro». No hay indicio en el texto de pureza o manufactura que justifique añadir más.
- source_word: רַגְל֕וֹ/הִי
  english_pob_choice: its feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus patas
  lexicon: HALOT
  rationale: El término distingue claramente los pies de las piernas anteriores. «Pies» preserva esa distinción anatómica y el avance de la descripción.
- source_word: מנ/הון
  english_pob_choice: partly
  chosen_spanish: en parte
  alternatives_spanish:
  - parcialmente
  - una parte
  lexicon: HALOT
  rationale: La expresión distributiva aramea se vierte con la locución española «en parte», que comunica de modo natural que los pies estaban compuestos de materiales mixtos.
- source_word: ו/מנ/הון
  english_pob_choice: and partly
  chosen_spanish: y en parte
  alternatives_spanish:
  - y parcialmente
  - y una parte
  lexicon: HALOT
  rationale: La construcción coordinada mantiene la idea distributiva del miembro anterior. «Y en parte» conserva la repetición enfática sin sonar forzado.
- source_word: חֲסַֽף
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - barro cocido
  - loza
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «clay», en español «barro» funciona con la misma amplitud semántica en esta imagen y resulta más idiomático. «Arcilla» es posible, pero puede sonar más técnico; «barro» mantiene la imaginería concreta del pasaje.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y ninguna revisión aplicada; la versión española sigue de cerca la segmentación del original arameo, preservando la distinción entre «piernas» y «pies» y la composición mixta final.
  spanish_consistency_notes:
  - Se mantiene el paralelismo interno con dos miembros coordinados por punto y coma, como en la estructura breve del original.
  - Se conserva la distinción léxica entre «piernas» y «pies» para reflejar dos términos arameos distintos.
  - «Barro» se usa en el cuerpo principal por naturalidad española, con nota para las alternativas léxicas del término arameo.
