translation:
  text: 'You look on me[a], cast out from yourselves,

    and you are defeated.

    Listen to me, you hearers,

    and learn my words,

    you who know me[g][f][e][d][c][b].

    I am...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲭⲓⲥⲃⲱ can be rendered ‘whisper against’ or ‘revile,’ highlighting secretive
      or abusive speech.
    reason: lexical_alternative
  - marker: b
    text: ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ is taken as an adverbial ‘in the open’; the exact idiomatic
      value is uncertain in this line’s segmentation.
    reason: alignment_note
  - marker: c
    text: The public/private contrast (‘in the open’/‘in your soul’) is a recurrent
      device in Thunder, pairing overt acknowledgment with hidden opposition.
    reason: parallelism_note
  - marker: d
    text: Or 'you who prosper in the open'.
    reason: previous_rendering
  - marker: e
    text: Or 'and you cry out.'.
    reason: previous_rendering
  - marker: f
    text: Or 'and you slander in your soul.'.
    reason: previous_rendering
  - marker: g
    text: 'Or ''Those who know me: I am the one.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲉⲧⲛⲛⲁⲩ ⲉⲣⲟⲓ
  chosen: you look on me
  alternatives:
  - you see me
  - behold me
  lexicon: Crum; Layton
  rationale: ⲛⲁⲩ ⲉⲣⲟⲓ is a common construction for ‘see/look at me.’ Chose ‘look on’
    to keep the directness and cadence while avoiding archaic ‘behold’.
- source_word: ⲙⲡⲉⲧⲛⲥⲁⲛϩⲟⲩ
  chosen: you who prosper
  alternatives:
  - you who gain/benefit
  - you who succeed
  lexicon: Crum (s.v. possible ⲥⲁⲛϩⲟⲩ roots); context-driven
  rationale: Taken as a relative clause ‘the one(s) among you who have advantage/success.’
    Rendered ‘prosper’ to fit the antithetical pair with those who ‘slander in [their]
    soul.’ Alignment medium-confidence.
- source_word: ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ
  chosen: in the open
  alternatives:
  - publicly
  - outwardly
  lexicon: Coptic preposition ⲉⲃⲟⲗ ‘out, forth’; ⲟⲛϩ ‘life’ (possible idiom)
  rationale: Understood as an adverbial nuance of publicity (‘out in the open’). Idiomatic
    value uncertain; captured with ‘in the open’ and noted in risk.
- source_word: ⲣⲥⲱ
  chosen: cry out
  alternatives:
  - proclaim
  - shout
  lexicon: Crum; Layton
  rationale: Basic meaning ‘call, cry out.’ Kept neutral to avoid over-specifying
    praise; fits contrast with ‘slander in your soul.’
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: Standard Sahidic usage
  rationale: Chosen ‘listen’ to preserve imperative-like appeal to the audience (though
    formally indicative), matching the poem’s cadence.
- source_word: ⲁⲕⲣⲟⲁⲧⲏⲥ
  chosen: hearers
  alternatives:
  - listeners
  lexicon: Greek loanword ἀκροατής
  rationale: ‘Hearers’ preserves the register and echoes the formulaic address in
    the poem.
- source_word: ⲭⲓⲥⲃⲱ
  chosen: slander
  alternatives:
  - revile
  - whisper against
  lexicon: Crum; Berrettoni (Coptic-Greek semantic links)
  rationale: Verb denotes abuse/insult/slander. Kept strong with ‘slander’; ‘whisper
    against’ offered as an alternative to reflect the inward, secretive nuance tied
    to ‘in your soul.’
- source_word: ⲉⲛⲁⲯⲩⲭⲏ
  chosen: in your soul
  alternatives:
  - within yourselves
  - in your heart
  lexicon: Greek ψυχή as ‘soul; life’; Coptic preposition ⲉⲛ-
  rationale: Literal ‘in your soul’ maintains the inner/private contrast with ‘in
    the open.’ Alternatives note possible idiomatic English equivalents.
- source_word: ⲛⲉⲧⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ
  chosen: Those who know me
  alternatives:
  - The ones who understand me
  lexicon: Standard Sahidic (ⲥⲟⲟⲩⲛ ‘know’)
  rationale: Straightforward relative clause; retained succinctly.
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  chosen: I am the one
  alternatives:
  - I am
  lexicon: Standard copular formula
  rationale: The poem often ends lines with emphatic ‘I am (the one).’ Kept explicit
    to preserve the voice’s self-identification.
parallelism_check: 'The rendering preserves a public/private antithesis: ‘prosper
  in the open’ and ‘cry out’ versus ‘slander in your soul’ (inner, secret opposition).
  This mirrors the poem’s recurring contrast between overt acknowledgment and covert
  hostility. The closing ‘Those who know me: I am the one’ retains the gnosis motif
  that frames the addresses.'
voice_check: 'The ‘Thunder’ voice remains imperative-assertive: direct second-person
  address (‘You look on me… Listen to me, you hearers…’) and the climactic self-assertion
  (‘I am the one’). Repetitive structures are retained without smoothing to keep the
  oracular cadence.'
alignment_risk_note: 'Overall alignment confidence is medium. Specific risks: (1)
  ⲙⲡⲉⲧⲛⲥⲁⲛϩⲟⲩ and ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ are parsed as ‘you who prosper’ and ‘in the open’; the
  exact idiomatic force is uncertain and could alternatively point to ‘public life’
  or another collocation. (2) ⲣⲥⲱ is taken as ‘cry out’; it could bear the nuance
  ‘proclaim’ or even ‘praise,’ which would tighten the winners/losers contrast. (3)
  The object ‘me’ is explicit earlier (ⲉⲣⲟⲓ) but not repeated before ⲭⲓⲥⲃⲱ; the translation
  keeps the verb absolute (‘slander’) with the implicit object understood from context,
  but this could be revised to ‘slander me’ if the object is to be supplied. Line
  divisions may shift in a normalized edition.'
