translation:
  language: es
  text: Y llegó delante de Ezdrelón[a], cerca de Dotaia, que está frente a la gran sierra[b] de Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante Ezdrelón» o «frente a Ezdrelón»; la expresión griega κατὰ πρόσωπον puede verterse de varias maneras espaciales estrechamente relacionadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la gran sierra de Judea». El griego probablemente usa «sierra» en sentido metafórico para una cresta o escarpadura montañosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἦλθεν
  english_pob_choice: And he came
  chosen_spanish: Y llegó
  alternatives_spanish:
  - Y vino
  - Y arribó
  lexicon: LSJ
  rationale: El verbo de movimiento exige en español una forma natural y breve; «llegó» comunica la llegada sin añadir matices no presentes en el griego.
- source_word: κατὰ πρόσωπον
  english_pob_choice: to the front of
  chosen_spanish: de frente a
  alternatives_spanish:
  - antes de
  - frente a
  - en dirección a
  lexicon: LSJ
  rationale: La expresión espacial con verbo de movimiento se rinde de modo idiomático como «de frente a», preservando la relación de ubicación sin forzar una lectura confrontativa.
- source_word: Ἐσδρηλών
  english_pob_choice: Esdrelon
  chosen_spanish: Ezdrelón
  alternatives_spanish:
  - Esdrelón
  - Esdraelón
  - Jezreel
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre griego. «Ezdrelón» refleja la forma tradicional en español para este topónimo sin sustituirlo por una identificación armonizada posterior.
- source_word: πλησίον
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  - próximo a
  lexicon: LSJ
  rationale: «Cerca de» es la equivalencia más natural y fiel para indicar proximidad geográfica.
- source_word: Δοταίας
  english_pob_choice: Dothaia
  chosen_spanish: Dotaia
  alternatives_spanish:
  - Dotaías
  - Dotaía
  - Dotán
  lexicon: LSJ
  rationale: Se translitera la forma griega Δοταίας como topónimo propio, sin sustituirla por una identificación geográfica posterior que el texto no da explícitamente.
- source_word: ἀπέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - al otro lado de
  lexicon: LSJ
  rationale: «Frente a» expresa con claridad la relación espacial de oposición visual o geográfica que indica ἀπέναντι.
- source_word: πρίονος
  english_pob_choice: ridge
  chosen_spanish: sierra
  alternatives_spanish:
  - sierra montañosa
  - cresta
  - escarpe
  lexicon: LSJ
  rationale: Aunque literalmente el griego puede sugerir «sierra» en sentido de «saw», aquí el contexto topográfico apunta a una cadena o lomo montañoso. «Sierra» da una imagen natural en español y mantiene el valor geográfico.
- source_word: τῆς Ἰουδαίας
  english_pob_choice: of Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - de la Judea
  - de la región de Judea
  lexicon: LSJ
  rationale: Se conserva el nombre geográfico estándar «Judea» para Ἰουδαία, conforme al uso español habitual y al valor local del término.
