base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/028.yaml
  text: Jesus said[1], "I stood in the midst of the world, and I appeared to them in flesh.[1] I found them all drunk; I found not one of them thirsting.[2] And my soul was pained over the children of humanity,[3] for they are blind in their heart and they do not see that they came into the world empty, seeking also to go out of the world empty.[4] But now they are drunk. When they have shaken off their wine[a][5][4][3][2], then they will repent."[5]
  footnotes:
  - marker: '1'
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ can mean ‘shone forth’ or ‘was manifested’; ‘appeared’ balances literal sense and English idiom.
    reason: lexical_alternative
  - marker: '2'
    text: The Coptic construction is compressed; the Greek POxy witness reads explicitly ‘I found not one thirsting among them,’ which supports the negative sense taken here.
    reason: textual_variant
  - marker: '3'
    text: Lit. ‘sons of men’ in the Greek fragment; the Coptic has ‘children of the human,’ here rendered inclusively as ‘children of humanity.’
    reason: cross_reference
  - marker: '4'
    text: ⲉⲓ … ⲉⲃⲟⲗ is literally ‘go out’; ‘leave’ is a possible alternative.
    reason: lexical_alternative
  - marker: '5'
    text: The idiom ‘shake off their wine’ renders ⲛⲟⲩϩⲉ with ⲡⲉⲩⲏⲣⲡ as object; alternatives include ‘when the wine leaves them’ or ‘when they sober up.’
    reason: lexical_alternative
  - marker: a
    text: Or 'and that they also seek'.
    reason: previous_rendering
