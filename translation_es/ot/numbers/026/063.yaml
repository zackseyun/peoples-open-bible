translation:
  language: es
  text: Estos son los que fueron contados por Moisés y Eleazar el sacerdote, que contaron a los hijos de Israel[a] en las llanuras de Moab, junto al Jordán, frente a Jericó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «junto al Jordán, en Jericó».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los numerados
  - el censo de
  lexicon: HALOT
  rationale: El sustantivo de פּקד en contexto censal se refiere a personas contadas o censadas. «Los contados» conserva la referencia personal y la repetición léxica con el verbo siguiente sin volverlo abstracto.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el sacerdote»; en español, «sacerdote» comunica el título sin añadir el rango de «sumo sacerdote», que no aparece en el texto.
- source_word: פָּקְדוּ
  english_pob_choice: counted
  chosen_spanish: contaron
  alternatives_spanish:
  - registraron
  - numeraron
  - hicieron un censo de
  lexicon: HALOT
  rationale: Se mantiene la misma raíz conceptual que en פְּקוּדֵי con un verbo natural en español. «Contaron» preserva la relación interna del hebreo con la primera aparición del término.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica del hebreo. En español, «hijos de Israel» es natural y fiel al valor del constructo masculino plural sin neutralizarlo.
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en las estepas de Moab
  - en las llanuras de Moabland
  lexicon: HALOT
  rationale: «Llanuras» transmite el valor geográfico de עַרְבוֹת de manera clara y fluida en español, equivalente a la expresión idiomática inglesa del POB.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  english_pob_choice: by the Jordan at Jericho
  chosen_spanish: junto al Jordán, en Jericó
  alternatives_spanish:
  - al otro lado del Jordán frente a Jericó
  - cerca del Jordán, frente a Jericó
  lexicon: HALOT
  rationale: La preposición puede señalar cercanía o ubicación relativa. «Junto al Jordán, en Jericó» mantiene concisión y legibilidad; la alternativa con «frente a Jericó» queda implícita pero no se sobreexpresa.
theological_decisions:
- issue: Expresión de género en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: Se conserva la forma masculina y genealógica del hebreo, en vez de neutralizarla. Esto mantiene la textura del texto fuente y su referencia covenantal/tribal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Título de Eleazar
  english_pob_reading: the priest
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - el sumo sacerdote
  rationale: No se añade un título superior que el hebreo no expresa. La traducción evita expandir el cargo y se mantiene en la restricción del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en su preferencia por «those counted» como un giro formal y natural; en español, «los contados» conserva esa sobriedad. También respeta la decisión de no ampliar «the priest» a «high priest» y mantiene la localización geográfica con la misma economía descriptiva del audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Jordán» como nombre propio y no «río Jordán», para seguir de cerca la localización del hebreo.
  - Se prefirió «hijos de Israel» por fidelidad al constructo masculino plural, sin convertirlo en un plural genérico distinto.
  - Los corchetes de nota se colocaron en el texto exactamente donde anclan las alternativas, evitando notas flotantes.
