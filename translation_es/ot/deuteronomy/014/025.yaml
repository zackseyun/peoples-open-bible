translation:
  language: es
  text: entonces lo cambiarás por plata[a], envolverás la plata en tu mano[b] e irás al lugar que Yahvé tu Dios escogerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo cambiarás por dinero». El hebreo menciona literalmente «plata», que aquí funciona como medio de intercambio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «atarás la plata en tu mano»; es decir, la asegurarás en tu posesión para el viaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה בַּכָּסֶף
  english_pob_choice: you shall turn it into silver
  chosen_spanish: lo cambiarás por plata
  alternatives_spanish:
  - lo convertirás en plata
  - lo cambiarás por dinero
  lexicon: HALOT
  rationale: El hebreo usa נתן con בְּ/בַּ + כֶּסֶף en un sentido transaccional; en contexto funciona como intercambio por plata. En español, «cambiarlo por plata» comunica bien la acción sin perder la referencia literal al metal que opera como moneda.
- source_word: וְצַרְתָּ הַכֶּסֶף בְּיָדְךָ
  english_pob_choice: bind the silver in your hand
  chosen_spanish: atarás la plata en tu mano
  alternatives_spanish:
  - envolverás la plata en tu mano
  - asegurarás la plata en tu mano
  - llevarás la plata contigo
  lexicon: HALOT
  rationale: צָרַר conserva la idea concreta de atar o envolver. «Atarás la plata en tu mano» mantiene la imagen física de asegurarla para el viaje, como en el audit trail inglés, sin pasar a una paráfrasis más abstracta.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu posesión
  - contigo
  lexicon: HALOT
  rationale: Se conserva la expresión corporal literal. En este mandato legal, «en tu mano» es suficientemente claro en español y retiene la concreción del hebreo.
- source_word: וְהָלַכְתָּ אֶל הַמָּקוֹם
  english_pob_choice: and go to the place
  chosen_spanish: y irás al lugar
  alternatives_spanish:
  - y viajarás al lugar
  - y te dirigirás al lugar
  lexicon: HALOT
  rationale: הלך se traduce naturalmente con «ir». La forma simple mantiene el tono instructivo y legal del texto.
- source_word: אֲשֶׁר יִבְחַר
  english_pob_choice: that Yahweh your God will choose
  chosen_spanish: que Yahvé tu Dios escogerá
  alternatives_spanish:
  - que Yahvé tu Dios elegirá
  - que Yahvé tu Dios habrá escogido
  lexicon: HALOT
  rationale: El futuro en español reproduce bien el valor prospectivo del imperfecto hebreo en esta instrucción. «Escogerá» conserva la formulación habitual del pasaje sin suavizar el acto soberano de selección.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa «Yahvé» según la convención del proyecto para el nombre divino. Esto evita la sustitución por un título y preserva el nombre personal del pacto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: 'La fórmula de alianza se conserva de manera directa y estándar en español: «tu Dios».'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, no un mero título. Mantener «Yahvé» preserva el nombre propio revelado a Israel y sigue la práctica del proyecto, en vez de enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del inglés, que prefirió «turn it into silver» frente a «convert it into silver». En español se reflejó con «cambiarás por plata», una solución directa y natural que conserva el valor transaccional del verbo y el objeto literal «plata».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conservó «plata» en lugar de «dinero» en el texto principal para respetar el sustantivo hebreo y dejar la posible equivalencia monetaria en nota.
  - «En tu mano» preserva la imagen concreta y coincide con el audit trail inglés.
  - La estructura de mandato futuro («cambiarás», «atarás», «irás») refleja el tono legal del hebreo y del inglés auditado.
