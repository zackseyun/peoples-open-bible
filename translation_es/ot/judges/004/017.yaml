  glossary_alignment: No hay términos del glosario teológico principal en juego. El gentilicio הַקֵּינִי está vertido como «ceneo», que es una forma española conocida y aceptable. La decisión de mantener «casa» para בֵּית concuerda con la racionalidad documentada del POB y permite explicar en nota el sentido de hogar/clan.
  issues:
