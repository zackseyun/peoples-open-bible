  revision_rationale: 'La revisión hace tres ajustes menores pero importantes: mejora la naturalidad española de וַתַּעַל con «se había levantado», reemplaza «escamoso» por «como en hojuelas» para evitar una connotación poco adecuada y reflejar mejor la rareza/ambigüedad de מְחֻסְפָּס, y usa «suelo» en vez de «tierra» para el referente físico inmediato de עַל הָאָרֶץ. El resto del versículo puede mantenerse.'
