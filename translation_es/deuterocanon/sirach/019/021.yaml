translation:
  language: es
  text: Hay una astucia[a] meticulosa, y esta también es injusta; y hay quien tuerce las cosas para sacar a luz un juicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «astucia cuidadosa».
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «justicia» o «veredicto»; el griego es lo bastante amplio como para permitir cualquiera de esos matices.
    reason: alternative_reading
lexical_decisions:
- source_word: πανουργία ἀκριβὴς
  english_pob_choice: a meticulous cunning
  chosen_spanish: astucia meticulosa
  alternatives_spanish:
  - cunning meticulosa
  - astucia cuidadosa
  - perspicacia meticulosa
  lexicon: LSJ
  rationale: πανουργία lleva normalmente una carga moral negativa; «astucia» la preserva mejor que opciones más neutras como «perspicacia». ἀκριβής aporta la idea de algo exacto, minucioso o cuidadosamente calculado; «meticulosa» transmite bien esa precisión en español natural.
- source_word: ἄδικος
  english_pob_choice: unjust
  chosen_spanish: injusta
  alternatives_spanish:
  - incorrecta
  - mala
  - inicua
  lexicon: LSJ
  rationale: En el contexto sapiencial, ἄδικος marca una evaluación moral y jurídica. «Injusta» conserva ese valor y se alinea con κρίμα en el final del versículo.
- source_word: διαστρέφων
  english_pob_choice: twists things
  chosen_spanish: tuerce las cosas
  alternatives_spanish:
  - distorsiona las cosas
  - pervierte las cosas
  - retuerce las cosas
  lexicon: LSJ
  rationale: El participio expresa desviar o deformar lo debido. «Tuerce las cosas» mantiene la imagen verbal y sigue de cerca la elección inglesa sin sonar demasiado abstracta.
- source_word: χάριν τοῦ
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  - para que
  lexicon: LSJ
  rationale: La construcción es final; en español, «para» es la forma más directa y natural para conservar el valor de propósito.
- source_word: ἐκφᾶναι
  english_pob_choice: bring ... to light
  chosen_spanish: sacar a luz
  alternatives_spanish:
  - poner de manifiesto
  - dar a conocer
  - revelar
  lexicon: LSJ
  rationale: El verbo indica hacer evidente o manifestar. «Sacar a luz» reproduce la imagen idiomática de manera clara y bíblica, sin forzar un matiz más técnico que el griego no exige.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - justicia
  - veredicto
  - sentencia
  lexicon: LSJ
  rationale: κρίμα puede abarcar juicio, decisión o veredicto. «Juicio» conserva esa amplitud en español y permite mantener la tensión semántica que el POB inglés dejó abierta.
theological_decisions:
- issue: Valor moral de la primera cláusula
  english_pob_reading: The verse condemns a kind of exact or careful cleverness as unjust, rather than praising prudence.
  chosen_spanish_reading: El versículo condena una astucia precisa o calculada, no una prudencia legítima.
  alternative_spanish_readings:
  - Hay una astucia precisa, y esta también es injusta.
  - Existe una sagacidad meticulosa, y también es injusta.
  rationale: La segunda cláusula con αὕτη ἄδικος aplica un juicio negativo a la primera. Por eso el español debe conservar la crítica moral, no suavizarla como si fuera una mera descripción neutral.
  doctrine_reference: Proverbial/Wisdom moral discernment; no doctrinal resolution beyond the text.
- issue: Alcance de κρίμα
  english_pob_reading: Rendered as 'judgment' and left somewhat open.
  chosen_spanish_reading: «Juicio», dejado abierto entre decisión judicial y evaluación justa.
  alternative_spanish_readings:
  - justicia
  - veredicto
  - sentencia
  rationale: El griego no obliga a una sola equivalencia. «Juicio» mantiene la amplitud legal y ética, sin cerrar la lectura hacia una interpretación doctrinal o forense más estrecha de la que el texto da.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «matters» a «things» para reflejar con más inmediatez el objeto implícito de διαστρέφων. El español «las cosas» sigue esa misma dirección y conserva el tono formal del pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo «juicio» para κρίμα, en coherencia con la apertura semántica preservada por el POB inglés.
  - «Astucia» se eligió por su carga negativa, equivalente al valor moral de πανουργία en este contexto sapiencial.
  - La sintaxis española respeta la estructura coordinada del griego sin calcarla de modo pesado.
