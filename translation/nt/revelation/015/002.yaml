id: REV.15.2
reference: Revelation 15:2
source:
  edition: SBLGNT
  text: Καὶ εἶδον ὡς θάλασσαν ὑαλίνην μεμιγμένην πυρί, καὶ τοὺς νικῶντας ἐκ τοῦ θηρίου καὶ ἐκ τῆς εἰκόνος αὐτοῦ καὶ ἐκ τοῦ ἀριθμοῦ τοῦ ὀνόματος αὐτοῦ ἑστῶτας ἐπὶ τὴν θάλασσαν τὴν ὑαλίνην, ἔχοντας κιθάρας τοῦ θεοῦ.
translation:
  text: And I saw what appeared to be a sea of glass mixed with fire[a], and those who were victorious over the beast and over its image and over the number of its name, standing on the sea of glass[b], holding harps of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those overcoming the beast and its image and the number of its name,' or more literally, 'those victorious from the beast ...' The Greek construction can emphasize either victory over the beast or emergence from its power.
    reason: alternative_reading
  - marker: b
    text: Or 'God's harps.' The genitive may indicate possession, source, or dedication.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: what appeared to be
  alternatives:
  - like
  - something like
  lexicon: BDAG
  rationale: Introduces visionary comparison rather than strict identification. 'What appeared to be' communicates the apocalyptic, appearance-based nature of the sight more naturally than a bare 'like' in English.
- source_word: θάλασσαν ὑαλίνην
  chosen: a sea of glass
  alternatives:
  - a glassy sea
  - a sea like glass
  lexicon: BDAG
  rationale: ὑάλινος denotes something made of or resembling glass/crystal. 'Sea of glass' is idiomatic, preserves the imagery, and matches the repeated phrase later in the verse.
- source_word: μεμιγμένην πυρί
  chosen: mixed with fire
  alternatives:
  - mingled with fire
  - blended with fire
  lexicon: BDAG
  rationale: Perfect participle describing the sea's appearance. 'Mixed with fire' is clear modern English and preserves the unusual composite image without overinterpreting it.
- source_word: τοὺς νικῶντας
  chosen: those who were victorious
  alternatives:
  - those conquering
  - the ones overcoming
  - the victors
  lexicon: BDAG
  rationale: The participle identifies the people by their overcoming. In Revelation νικάω often carries the sense of overcoming or conquering; here 'were victorious' reads naturally with the following repeated ἐκ/over phrases and avoids implying merely military aggression.
- source_word: ἐκ τοῦ θηρίου ... καὶ ἐκ τῆς εἰκόνος αὐτοῦ καὶ ἐκ τοῦ ἀριθμοῦ τοῦ ὀνόματος αὐτοῦ
  chosen: over the beast and over its image and over the number of its name
  alternatives:
  - from the beast ...
  - out of the beast ...
  - over the beast and its image and the number of its name
  lexicon: BDAG
  rationale: Although ἐκ normally means 'from/out of,' with νικάω in this construction the sense is victory over or escape from the beast's power. Rendering each phrase with 'over' makes the relation explicit in idiomatic English while preserving the threefold structure.
- source_word: ἑστῶτας ἐπὶ τὴν θάλασσαν τὴν ὑαλίνην
  chosen: standing on the sea of glass
  alternatives:
  - standing by the sea of glass
  - standing upon the sea of glass
  lexicon: BDAG
  rationale: ἐπί with the accusative can indicate position on/upon in visionary description. 'Standing on' preserves the striking image; 'by' would weaken the force and likely undertranslate the preposition.
- source_word: κιθάρας τοῦ θεοῦ
  chosen: harps of God
  alternatives:
  - God's harps
  - harps given by God
  - divine harps
  lexicon: BDAG
  rationale: The genitive is retained literally because it may denote source, possession, or consecration, and the exact nuance need not be resolved. 'Harps of God' preserves the solemnity and ambiguity better than a more interpretive paraphrase.
