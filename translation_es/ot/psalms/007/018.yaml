translation:
  language: es
  text: Daré gracias a Yahvé conforme a su rectitud[a], y cantaré alabanzas al nombre de Yahvé, el Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su justicia» / «conforme a su justicia». El hebreo צדק puede llevar tanto la idea de «rectitud» como la de «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדֶה
  english_pob_choice: I will give thanks
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te alabaré
  - confesaré
  lexicon: HALOT
  rationale: El verbo hifil de ידה en contextos de salmo expresa agradecimiento y alabanza. En español, «dar gracias» comunica con naturalidad el acto de adoración dirigido a Dios sin perder el matiz de reconocimiento agradecido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como «Yahvé», conforme al criterio del proyecto en español, en lugar de sustituirlo por un título.
- source_word: כְּצִדְקוֹ
  english_pob_choice: according to his righteousness
  chosen_spanish: conforme a su justicia
  alternatives_spanish:
  - según su justicia
  - conforme a su rectitud
  - por causa de su justicia
  lexicon: HALOT
  rationale: El hebreo puede abarcar tanto «justicia» como «rectitud». Aquí «conforme a» reproduce bien la relación del כְ y «justicia» conserva la fuerza moral y judicial del término en un contexto de alabanza por el actuar justo de Dios.
- source_word: וַאֲזַמְּרָה
  english_pob_choice: and I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - y cantaré
  - y haré música
  lexicon: HALOT
  rationale: El verbo זמר en esta forma volitiva tiene sentido de cantar alabanzas. «Cantaré alabanzas» explicita el carácter doxológico sin añadir contenido ajeno al hebreo.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la fama
  - la reputación
  lexicon: HALOT
  rationale: «Nombre» conserva el sentido bíblico de identidad revelada y no necesita una equivalencia interpretativa más amplia.
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - Dios Altísimo
  lexicon: HALOT
  rationale: Como título divino, «el Altísimo» es la forma natural y fiel en español. Añadir «Dios» excedería el hebreo.
theological_decisions:
- issue: Cómo traducir יְהוָה en un salmo de alabanza
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre pactal del texto hebreo y la práctica terminológica del proyecto, evitando la sustitución por un título. En español «Yahvé» funciona como transliteración reverente y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de צדק aplicado a Dios
  english_pob_reading: righteousness / justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia o rectitud
  rationale: En este contexto de confesión y alabanza, «justicia» comunica mejor el carácter y las acciones correctas de Dios; no se excluye la resonancia de rectitud, pero no se desplaza al texto principal.
  doctrine_reference: Principio de preservar tensiones léxicas donde el hebreo las permite, sin colapsar el término a una sola noción si el contexto sostiene ambas.
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia con el texto fuente y no registró cambios; por eso no se introducen ajustes textuales ni notas adicionales más allá de la alternativa léxica principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el nombre divino.
  - Se conservó «el Altísimo» como título, sin añadir «Dios» al final.
  - La cláusula hebrea con כְ se reflejó con «conforme a», una solución idiomática y transparente en español.
  - La puntuación reproduce dos miembros poéticos coordinados, como en el hebreo.
