translation:
  language: es
  text: 'Por tanto[a], vivo yo —declara Yahvé de los ejércitos, Dios de Israel—: Moab ciertamente será como Sodoma, y los hijos de Amón como Gomorra: un lugar de ortigas y pozos de sal, y una desolación perpetua. El remanente de mi pueblo los saquearán, y el resto de mi nación los heredarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «una posesión de ortigas». La frase hebrea es difícil; la traducción transmite la imagen de tierra abandonada invadida por vegetación urticante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca una conclusión inferencial a partir del contexto previo. 'Por tanto' conserva el valor lógico profético sin sonar artificial en español.
- source_word: חַי אָנִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - como yo vivo
  - por mi vida
  lexicon: HALOT
  rationale: Es la fórmula juratoria divina. 'Vivo yo' es solemne, natural en español bíblico y preserva el énfasis de juramento.
- source_word: נְאֻם יְהוָה צְבָאוֹת אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: declares Yahweh of hosts, the God of Israel
  chosen_spanish: declara Yahvé de los ejércitos, Dios de Israel
  alternatives_spanish:
  - oráculo de Yahvé de los ejércitos, Dios de Israel
  - declara Yahvé de los ejércitos, el Dios de Israel
  lexicon: HALOT
  rationale: '''נְאֻם'' funciona como fórmula profética de declaración; ''declara'' la comunica con claridad. ''Yahvé'' sigue la decisión terminológica del proyecto para יהוה, y ''Dios de Israel'' conserva el apelativo del pacto.'
- source_word: כִּי
  english_pob_choice: will surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - de veras
  lexicon: HALOT
  rationale: Aquí introduce el contenido enfático del juramento. 'Ciertamente' refleja la fuerza aseverativa sin forzar la sintaxis española.
- source_word: מוֹאָב כִּסְדֹם תִּהְיֶה
  english_pob_choice: Moab will surely become like Sodom
  chosen_spanish: Moab ciertamente será como Sodoma
  alternatives_spanish:
  - Moab ciertamente se volverá como Sodoma
  - Moab será como Sodoma
  lexicon: HALOT
  rationale: '''Será como'' es suficiente y más natural que un calco de ''become'' en español; conserva la comparación de juicio sin añadir matiz no requerido por el hebreo.'
- source_word: וּבְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Amón
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea literal, como hizo la POB en inglés, en vez de sustituirla por el etnónimo tradicional.
- source_word: כַּעֲמֹרָה
  english_pob_choice: like Gomorrah
  chosen_spanish: como Gomorra
  lexicon: HALOT
  rationale: Comparación directa con la ciudad paradigmática del juicio.
- source_word: מִמְשַׁק חָרוּל
  english_pob_choice: a place of nettles
  chosen_spanish: un lugar de ortigas
  alternatives_spanish:
  - una posesión de ortigas
  - un terreno de ortigas
  lexicon: HALOT
  rationale: La frase es difícil. 'Ortigas' comunica la idea de vegetación espinosa o urticante que invade ruinas y terreno abandonado, y evita una precisión botánica excesiva.
- source_word: וּמִכְרֵה מֶלַח
  english_pob_choice: salt pits
  chosen_spanish: salinas
  alternatives_spanish:
  - pozos de sal
  - minas de sal
  lexicon: HALOT
  rationale: '''Salinas'' transmite un lugar salino, improductivo y castigado; en español es una forma natural que conserva la imagen de esterilidad del original.'
- source_word: וּשְׁמָמָה עַד עוֹלָם
  english_pob_choice: a perpetual desolation
  chosen_spanish: una desolación perpetua
  alternatives_spanish:
  - una desolación para siempre
  - un desierto perpetuo
  lexicon: HALOT
  rationale: La combinación nominal más el adverbio temporal se vierte de manera directa y solemne, preservando la permanencia del juicio.
- source_word: שְׁאֵרִית עַמִּי
  english_pob_choice: The remnant of my people
  chosen_spanish: El remanente de mi pueblo
  alternatives_spanish:
  - Lo que queda de mi pueblo
  - El resto de mi pueblo
  lexicon: HALOT
  rationale: '''Remanente'' conserva el término profético técnico y su carga teológica de supervivencia preservada.'
- source_word: יְבָזּוּם
  english_pob_choice: will plunder them
  chosen_spanish: los saqueará
  alternatives_spanish:
  - los despojará
  - los despojarán
  lexicon: HALOT
  rationale: '''Saquea'' reproduce el sentido de tomar botín de enemigos vencidos y es idiomático en español.'
- source_word: וְיֶתֶר גּוֹי
  english_pob_choice: the remainder of my nation
  chosen_spanish: el resto de mi nación
  alternatives_spanish:
  - el resto de mi pueblo
  - el residuo de mi nación
  lexicon: HALOT
  rationale: '''Nación'' mantiene la distinción léxica frente a ''pueblo'' y sigue de cerca el paralelo con ''remanente''.'
- source_word: יִנְחָלוּם
  english_pob_choice: will inherit them
  chosen_spanish: los heredará
  alternatives_spanish:
  - tomará posesión de ellos
  - los poseerá como herencia
  lexicon: HALOT
  rationale: '''Heredará'' conserva la semántica de herencia/posesión territorial, importante en el lenguaje bíblico.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El proyecto español pide 'Yahvé' como forma principal para preservar el nombre del pacto sin ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Fórmula de juramento divina
  english_pob_reading: as I live
  chosen_spanish_reading: vivo yo
  alternative_spanish_readings:
  - como yo vivo
  - por mi vida
  rationale: La expresión funciona como juramento solemne de Dios y no como mera descripción. 'Vivo yo' mantiene la voz juratoria y la dignidad profética.
  doctrine_reference: Uso bíblico de juramentos divinos en fórmulas proféticas
- issue: Término profético de supervivencia
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - resto
  - lo que queda
  rationale: '''Remanente'' conserva el peso técnico-teológico del término profético, importante en juicios y restauración.'
  doctrine_reference: Motivo del remanente en la profecía bíblica
translation_notes:
  revision_awareness: La lectura inglesa de referencia pasó de 'overgrown with weeds' a 'a place of nettles' y luego se consolidó como 'a place of nettles and salt pits'. En español se optó por mantener la fuerza imagística del hebreo con 'ortigas' y una pluralidad natural en 'salinas', evitando una paráfrasis demasiado interpretativa. También se preservó la decisión del proyecto de usar 'Yahvé' para יהוה.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al criterio global del proyecto.
  - '''Remanente'' y ''resto'' se usan para distinguir שְׁאֵרִית y יֶתֶר sin borrar el paralelismo.'
  - '''Hijos de Amón'' conserva la forma hebrea equivalente a la elección inglesa ''sons of Ammon''.'
  - La puntuación con raya introduce la cláusula explicativa sin alterar el contenido del juramento.
