  yaml_path: translation/deuterocanon/sirach/005/012.yaml
  text: Do not trust in deceitful wealth[b][a], for it will not profit in the day of wrath.
  footnotes:
  - marker: a
    text: 'The Greek parallel tradition for this verse reads instead: ''If you have understanding, answer your neighbor; but if not, let your hand be upon your mouth.'' The Hebrew witness here is substantially different, and this translation follows the extant Hebrew as primary.'
    reason: textual_variant
  - marker: b
    text: Or 'false wealth,' 'fraudulent riches,' or 'wealth of falsehood.' The Hebrew can describe wealth marked by deception, whether because it is dishonestly gained or because it proves unreliable.
    reason: lexical_alternative
