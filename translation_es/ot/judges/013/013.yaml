translation:
  language: es
  text: 'Y el ángel[a] de Yahvé dijo a Manoaj: «La mujer debe tener cuidado de hacer todo lo que yo le dije».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el mensajero de Yahvé». El término hebreo puede significar tanto «ángel» como «mensajero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se reproduce de manera natural con "Y ... dijo", conservando la secuencia del relato sin añadir matices temporales que el hebreo no exige.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el mensajero de Yahvéh
  lexicon: HALOT
  rationale: En este contexto narrativo, מַלְאַךְ se entiende de forma natural como un ser celestial, y el nombre divino se mantiene como "Yahvé" según la terminología proyectual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español, sin sustituirlo por una mayúscula funcional. "Yahvé" es la forma estándar del proyecto para el Tetragrámaton.
- source_word: אֶל מָנוֹחַ
  english_pob_choice: to Manoah
  chosen_spanish: a Manoaj
  alternatives_spanish:
  - a Manoah
  - para Manoaj
  lexicon: HALOT
  rationale: La preposición direccional se rinde con "a". Se usa "Manoaj" para una transliteración española uniforme del nombre propio.
- source_word: מִכֹּל אֲשֶׁר
  english_pob_choice: about everything that
  chosen_spanish: de todo lo que
  alternatives_spanish:
  - acerca de todo lo que
  - en cuanto a todo lo que
  lexicon: HALOT
  rationale: La construcción expresa el alcance total de lo dicho previamente. "De todo lo que" comunica de forma fluida y completa la totalidad del mandato sin sobrerreformularla.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: yo dije
  alternatives_spanish:
  - dije
  - yo he dicho
  lexicon: HALOT
  rationale: Se mantiene el verbo sencillo de habla. El pronombre puede omitirse en español, pero se incluye aquí para enfatizar la referencia directa del hablante a sus propias instrucciones.
- source_word: אֶל הָאִשָּׁה
  english_pob_choice: to her
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a ella
  - a la esposa
  lexicon: HALOT
  rationale: El hebreo dice explícitamente "a la mujer"; se conserva el sustantivo en español para no suavizarlo ni sustituirlo por una relación no expresada en el texto.
- source_word: תִּשָּׁמֵר
  english_pob_choice: must be careful
  chosen_spanish: debe cuidarse
  alternatives_spanish:
  - debe guardarse
  - debe estar atenta
  lexicon: HALOT
  rationale: El nifal de שׁמר aquí tiene sentido reflexivo de vigilarse o cuidarse respecto de una instrucción. "Debe cuidarse" comunica esa obligación con naturalidad en español.
- source_word: מִכֹּל אֲשֶׁר אָמַרְתִּי
  english_pob_choice: everything that I said
  chosen_spanish: todo lo que yo le dije
  alternatives_spanish:
  - todo lo que le dije
  - todo cuanto le mandé
  lexicon: HALOT
  rationale: Se preserva la referencia a la totalidad de las palabras previamente pronunciadas. Se conserva "le dije" para reflejar el dativo implícito del receptor, sin introducir "mandé", que no está en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvéh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se traduce con el nombre propio divino "Yahvé" para preservar el valor nominal y la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Se mantiene la tensión léxica entre "ángel" y "mensajero" sin resolverla artificialmente, pero en el texto principal se conserva la lectura narrativa más natural en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa añadió la idea de hacer/observar todo lo dicho. La versión española la integra con «de hacer todo lo que yo le dije», manteniendo el sentido de vigilancia obediente sin ampliar el contenido del mandato.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se conserva la secuencia narrativa con «Y ... dijo».
  - Se mantiene «la mujer» en vez de «tu esposa» para no introducir una relación posesiva no explícita en el hebreo.
  - La transliteración de Manoah se normaliza como «Manoaj» en el texto principal.
