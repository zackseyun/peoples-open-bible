  rationale: Se conserva toda la estructura y las decisiones léxicas principales del borrador, pero se sustituye «por amor de mí mismo» por «por causa de mí mismo» para representar con mayor naturalidad y precisión el sentido causal/reflexivo de לְמַעֲנִי en español contemporáneo. Se ajusta en paralelo «por causa de David, mi siervo».
