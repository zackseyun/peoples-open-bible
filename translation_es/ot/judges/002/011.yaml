revisions:
- from: Y los hijos de Israel hicieron lo malo[a] ante los ojos de Yahvé, y sirvieron a los baales[b].
  to: Y los hijos de Israel hicieron lo malo[a] a los ojos de Yahvé, y sirvieron a los Baales[b].
  rationale: 'La revisión hace dos ajustes menores: se reemplaza «ante los ojos de Yahvé» por «a los ojos de Yahvé» para un español más idiomático sin perder la metáfora hebrea, y se capitaliza «Baales» como designación propia/plural del culto a Baal. El resto del borrador es fiel al texto fuente y a las decisiones léxicas del POB.'
