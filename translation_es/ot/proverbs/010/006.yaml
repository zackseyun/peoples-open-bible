  - severity: medium
    issue: La nota del segundo colon está anclada a «malvados» en lugar de al segmento verbal donde surge la ambigüedad.
    rationale: La alternativa afecta la relación entre «boca», «cubre/encubre» y «violencia», por lo que conviene anclarla en «encubre violencia» o equivalente para mayor precisión.
  revised_spanish_text: Las bendiciones están sobre la cabeza del justo, pero la boca de los malvados encubre violencia[a].
