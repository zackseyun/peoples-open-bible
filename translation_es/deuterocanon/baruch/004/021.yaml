translation:
  language: es
  text: Cobren ánimo[a], hijos e hijas; clamen a Dios, y él los librará de la opresión[b], de la mano de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengan valor».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «de la mano de sus enemigos» conserva una imagen bíblica que significa estar bajo el control o poder de los enemigos.
    reason: cultural_note
lexical_decisions:
- source_word: Θαρρεῖτε
  english_pob_choice: Take courage
  chosen_spanish: Tengan valor
  alternatives_spanish:
  - Cobren ánimo
  - Sean valientes
  - Tengan courage
  lexicon: LSJ
  rationale: El imperativo plural exhorta a confiar con firmeza. 'Tengan valor' expresa bien la carga de ánimo y confianza sin sonar arcaico, y conserva el tono directo de exhortación.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - descendientes
  lexicon: LSJ
  rationale: En vocativo plural, el término puede referirse a los miembros de una comunidad como hijos. 'Hijos' es natural en español bíblico y mantiene el matiz familiar del llamado, aunque en sentido inclusivo el griego no es masculino exclusivo.
- source_word: βοήσατε
  english_pob_choice: cry out
  chosen_spanish: clamen
  alternatives_spanish:
  - griten
  - proclamen en voz alta
  - clamen a viva voz
  lexicon: LSJ
  rationale: El verbo pide un clamor dirigido a Dios. 'Clamen' conserva la urgencia y el carácter de llamada audible sin volverlo excesivamente coloquial.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: LSJ
  rationale: Con un verbo de invocación, la preposición indica dirección del clamor. 'A Dios' es la fórmula española más natural y fiel al movimiento del texto.
- source_word: ἐξελεῖται
  english_pob_choice: he will deliver you
  chosen_spanish: él los librará
  alternatives_spanish:
  - él los rescatará
  - él los salvará
  - él los entregará
  lexicon: LSJ
  rationale: El futuro medio de ἐξαιρέω expresa liberación efectiva. 'Librará' es un equivalente bíblico claro y natural en español, cercano a 'deliver' del audit trail, sin añadir matices ajenos.
- source_word: ἐκ δυναστείας
  english_pob_choice: from oppression
  chosen_spanish: de la opresión
  alternatives_spanish:
  - del poder opresor
  - de la dominación
  - de la tiranía
  lexicon: LSJ
  rationale: δυναστεία puede significar dominio, poder opresivo o tiranía. El audit trail revisó 'tyranny' por 'oppression'; 'opresión' transmite bien la fuerza negativa y es más idiomático en español bíblico.
- source_word: ἐκ χειρὸς ἐχθρῶν
  english_pob_choice: from the hand of enemies
  chosen_spanish: de la mano de enemigos
  alternatives_spanish:
  - del poder de los enemigos
  - de manos enemigas
  - de los enemigos
  lexicon: LSJ
  rationale: La imagen de 'mano' es un hebraísmo/biblicismo que comunica control y poder. Se conserva para no perder la metáfora concreta documentada por la nota auditada.
theological_decisions:
- issue: Promesa de liberación divina
  english_pob_reading: and he will deliver you
  chosen_spanish_reading: y él los librará
  alternative_spanish_readings:
  - y él los rescatará
  - y él los salvará
  rationale: El versículo presenta una promesa de intervención futura de Dios ante el clamor del pueblo. 'Librará' mantiene el sentido de liberación sin cargar el texto con inferencias doctrinales ajenas.
  doctrine_reference: Deliverance as straightforward divine action; preserve the source's plain promise.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: se prefiere un equivalente formal y común para ἐξελεῖται (''librará'') y un término más natural para δυναστείας (''opresión''), evitando intensificar innecesariamente a ''tiranía''.'
  spanish_consistency_notes:
  - Se mantiene el tono exhortativo plural del griego con verbos en segunda persona plural de trato general.
  - Se conserva la metáfora de 'la mano' para reflejar el idiom bíblico y no despojar el texto de su concreción.
  - Se usa 'Dios' de manera directa, conforme al griego θεόν, sin sustituirlo por perífrasis reverenciales.
  - La puntuación separa los dos imperativos y la promesa final de modo fluido y publicable.
