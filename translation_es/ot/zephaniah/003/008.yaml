base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/003/008.yaml
  text: Therefore wait for me[a], declares Yahweh, for the day when I rise up for plunder; for my judgment is to gather nations, to assemble kingdoms, to pour out on them my indignation, all my burning anger[c][b]; for in the fire of my jealousy all the earth will be consumed.
  footnotes:
  - marker: a
    text: Or, “for the day when I rise up for prey.” The Hebrew term rendered “as a witness” is difficult and may be understood differently.
    reason: alternative_reading
  - marker: b
    text: “Jealousy” may also be rendered “zeal.”
    reason: lexical_alternative
  - marker: c
    text: “Earth” may also be translated “land,” but the broader context of nations and kingdoms supports the wider sense here.
    reason: lexical_alternative
