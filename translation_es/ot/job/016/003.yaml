lexical_decisions:
- source_word: הֲקֵץ
  english_pob_choice: Is there no end
  chosen_spanish: ¿No hay fin
  alternatives_spanish:
  - ¿Hay un fin?
  - ¿No habrá fin?
  lexicon: HALOT
  rationale: 'קֵץ significa “fin, término, límite”. En este contexto retórico de reproche, el español natural expresa mejor la exasperación con una pregunta negativa: “¿No hay fin...?”, sin perder el valor de “end/limit” del hebreo.'
- source_word: לְדִבְרֵי רוּחַ
  english_pob_choice: to windy words
  chosen_spanish: a las palabras de viento
  alternatives_spanish:
  - a palabras de viento
  - a palabras vacías
  - a charla vacía
  lexicon: HALOT
  rationale: La expresión es literalmente “palabras de viento/espíritu”. Se conserva la metáfora para no borrar la imagen del hebreo. En español, “palabras de viento” suena más fiel y auditable que una explicación interpretativa como “palabras vacías”.
- source_word: אוֹ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O bien
  - ¿Sino
  lexicon: HALOT
  rationale: Conjunción disyuntiva simple que introduce la segunda pregunta retórica.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  - por qué
  lexicon: HALOT
  rationale: Interrogativo directo que pregunta por la causa o el motivo de la respuesta de Bildad; “qué” mantiene la amplitud semántica del hebreo sin fijarla prematuramente en una sola explicación.
- source_word: יַּמְרִיצְךָ
  english_pob_choice: provokes you
  chosen_spanish: te impulsa
  alternatives_spanish:
  - te provoca
  - te incita
  - te da valor
  lexicon: HALOT
  rationale: El hiphil de מרץ puede implicar estimular, incitar o dar ímpetu/valor. “Te impulsa” conserva la idea de mover a hablar, sin decidir demasiado entre irritación, estímulo o audacia. La alternativa “te provoca” queda cercana al tono adversarial; “te da valor” recoge una lectura afín a “emboldens you” preservada en la nota inglesa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido o resultado de la incitación: “¿qué te impulsa, para que respondas...?” En español, “para que” reproduce bien la relación final/resultativa sin sonar forzado.'
- source_word: תַעֲנֶה
  english_pob_choice: you answer this way
  chosen_spanish: respondas así
  alternatives_spanish:
  - respondas
  - contestes así
  lexicon: HALOT
  rationale: ענה en qal significa “responder/contestar”. “Respondas así” refleja la reprensión implícita de Job sin añadir material ajeno al hebreo; “así” da cuenta del modo despectivo sugerido por el contexto.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la imagen de “windy words” y deja en nota la alternativa “emboldens you”. La versión española conserva la metáfora de “palabras de viento” y el valor amplio de מרץ con “te impulsa”, sin cerrar indebidamente la tensión entre ‘provocar’, ‘incitar’ y ‘dar valor’.
  spanish_consistency_notes:
  - Se usa “respondas” con subjuntivo por la estructura final “para que”.
  - Se conserva la metáfora hebrea de “viento” en vez de reemplazarla por una interpretación como “vacías”, siguiendo el principio de no borrar la imagen original.
  - No se introduce terminología doctrinal, porque el versículo es una reprensión poética y no contiene vocabulario técnico teológico.
