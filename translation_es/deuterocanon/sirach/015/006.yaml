translation:
  language: es
  text: Encontrará gozo y alegría, y un nombre eterno[a] será su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «heredará un nombre eterno». El hebreo permite también entender el verbo en sentido de heredar, y el paralelo griego usa explícitamente lenguaje de herencia.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂשׂוֹן
  english_pob_choice: gladness
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  - regocijo
  lexicon: HALOT
  rationale: El hebreo expresa alegría intensa y positiva. 'Gozo' comunica bien ese matiz en español bíblico contemporáneo sin sonar forzado; además permite distinguirlo de 'alegría' en el término paralelo.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - júbilo
  - contentamiento
  lexicon: HALOT
  rationale: Como segundo miembro del paralelismo, conviene una equivalencia cercana pero no idéntica. 'Alegría' mantiene el paralelismo semántico y suena natural en español.
- source_word: יִמְצָא
  english_pob_choice: will find
  chosen_spanish: Encontrará
  alternatives_spanish:
  - hallará
  - obtendrá
  - alcanzará
  lexicon: HALOT
  rationale: El verbo básico es 'encontrar', pero en este contexto el sentido es de recibir o llegar a poseer. 'Encontrará' conserva la cercanía al hebreo y funciona con fluidez en español.
- source_word: שֵׂם עוֹלָם
  english_pob_choice: an everlasting name
  chosen_spanish: un nombre eterno
  alternatives_spanish:
  - un nombre perdurable
  - un nombre para siempre
  - una fama eterna
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'nombre de eternidad'. 'Nombre eterno' preserva la metáfora de renombre duradero y sigue de cerca tanto el hebreo como el griego ὄνομα αἰώνιον.
- source_word: תּוֹרִישֶׁנּוּ
  english_pob_choice: will be his inheritance
  chosen_spanish: le tocará en herencia
  alternatives_spanish:
  - lo heredará
  - heredará un nombre eterno
  - se le dará en herencia
  lexicon: HALOT
  rationale: El hebreo admite una construcción de causación/inherencia, y el paralelo griego usa explícitamente lenguaje de herencia. 'Le tocará en herencia' comunica el resultado recibido sin forzar una reconstrucción sintáctica más técnica de la que permiten los testigos.
theological_decisions:
- issue: Cómo traducir el cierre de la línea con el verbo hebreo de heredar/causar heredar
  english_pob_reading: The clause means that an everlasting name becomes the person's inheritance.
  chosen_spanish_reading: Un nombre eterno se recibe como herencia.
  alternative_spanish_readings:
  - Él heredará un nombre eterno.
  - Un nombre eterno le será dado en herencia.
  rationale: La evidencia hebrea y la versión griega convergen en la idea de herencia, aunque con posible ambigüedad sobre si el sujeto 'hereda' o 'recibe como herencia'. La formulación elegida conserva esa tensión sin imponer una sola reconstrucción.
  doctrine_reference: Sirach 15:6; paralelo griego κατακληρονομήσει
- issue: Cómo reflejar el paralelismo de los dos sustantivos hebreos de alegría
  english_pob_reading: gladness and joy
  chosen_spanish_reading: gozo y alegría
  alternative_spanish_readings:
  - alegría y gozo
  - júbilo y alegría
  rationale: Se mantiene el paralelismo poético con dos términos distintos pero cercanos, tal como lo hace el hebreo y lo confirma el griego con εὐφροσύνην.
  doctrine_reference: Sirach 15:6; εὐφροσύνην καὶ ... ἀγαλλιάματος
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del pasaje y no introduce cambios textuales respecto del último repaso; la principal decisión es mantener en español la ambigüedad hereditaria del hebreo con apoyo del griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda, pero aquí no aparece.
  - 'Se conserva el paralelismo poético con dos sustantivos cercanos pero no idénticos: ''gozo'' / ''alegría''.'
  - '''Nombre eterno'' mantiene la metáfora de renombre duradero, evitando una paráfrasis como ''fama''.'
  - La nota [a] acompaña directamente la cláusula con ambigüedad hereditaria para reflejar la alternativa documentada.
