id: 1CH.6.46
reference: 1 Chronicles 6:46
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֨י קְהָ֜ת הַ/נּוֹתָרִ֗ים מִ/מִּשְׁפַּ֣חַת הַ/מַּטֶּ֡ה מִֽ֠/מַּחֲצִית מַטֵּ֨ה חֲצִ֧י מְנַשֶּׁ֛ה בַּ/גּוֹרָ֖ל עָרִ֥ים עָֽשֶׂר׃ס
translation:
  text: And to the sons of Kohath[a] who remained, from the families of the tribe, from the half-tribe, the half of Manasseh, ten cities were given by lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the families of the tribe, from the half-tribe, the half of Manasseh,' a formula referring to the half-tribe of Manasseh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: And to the sons of
  alternatives:
  - And for the sons of
  - And to the descendants of
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition naturally continue the allocation list: ''and to the sons of.'' ''Sons of'' is retained rather than flattened to ''descendants of'' to preserve the genealogical idiom, while still functioning corporately.'
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Kehath
  lexicon: HALOT
  rationale: Standard English transliteration of the personal/clan name.
- source_word: הַנּוֹתָרִים
  chosen: who remained
  alternatives:
  - who were left
  - the rest
  lexicon: HALOT
  rationale: The participle denotes those remaining from the Kohathites after prior distributions. 'Who remained' is clear modern English and preserves the sense of remainder.
- source_word: מִמִּשְׁפַּחַת
  chosen: from the families of
  alternatives:
  - from the clan of
  - out of the families of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often refers to a clan/family grouping. The plural sense is implied in context by the collective distribution formula; 'families of' reads naturally in English.
- source_word: הַמַּטֶּה
  chosen: the tribe
  alternatives:
  - the staff/tribe
  lexicon: HALOT
  rationale: In tribal-allotment contexts מַטֶּה means 'tribe,' not the literal 'staff.'
- source_word: מִמַּחֲצִית מַטֵּה חֲצִי מְנַשֶּׁה
  chosen: from the half-tribe, the half of Manasseh
  alternatives:
  - from half the tribe of the half of Manasseh
  - from the half-tribe of Manasseh
  lexicon: HALOT
  rationale: The Hebrew is somewhat repetitive, literally reflecting the chronicler's formulaic style. The translation preserves that repetition enough to remain auditable while still being readable. It refers to the half-tribe of Manasseh.
- source_word: בַּגּוֹרָל
  chosen: by lot
  alternatives:
  - by casting lots
  - by allotment
  lexicon: HALOT
  rationale: The phrase indicates allocation by lot. 'By lot' is concise and idiomatic.
- source_word: עָרִים עָשֶׂר
  chosen: ten cities were given
  alternatives:
  - ten cities
  - ten towns were given
  lexicon: HALOT
  rationale: The Hebrew is verbless in this distribution formula, so English supplies 'were given' from context. 'Cities' is the standard rendering of עָרִים in these allotment lists.
