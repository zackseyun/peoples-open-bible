translation:
  language: es
  text: 'Y José dijo a sus hermanos: «Yo estoy muriendo, pero Dios ciertamente los visitará[a] y los hará subir de esta tierra a la tierra que juró a Abraham, a Isaac y a Jacob».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente los atenderá». El hebreo פקד יפקד puede denotar la atención decisiva e intervención de Dios en favor de su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus parientes
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino plural con sufijo de tercera persona singular, y en este contexto de Génesis se refiere a los hermanos varones de José. «Sus hermanos» conserva con precisión ese valor y suena natural en español.
- source_word: אָנֹכִי מֵת
  english_pob_choice: I am dying
  chosen_spanish: Yo estoy muriendo
  alternatives_spanish:
  - Estoy por morir
  - Yo muero
  lexicon: HALOT
  rationale: La expresión señala una muerte inminente, no un estado ya cumplido. «Estoy muriendo» conserva la cercanía temporal y el tono directo del hebreo sin endurecerlo en una fórmula antinatural.
- source_word: וֵאלֹהִים
  english_pob_choice: but God
  chosen_spanish: pero Dios
  alternatives_spanish:
  - y Dios
  lexicon: HALOT
  rationale: 'Aunque la conjunción hebrea es coordinante, en el discurso el contraste es claro: José muere, pero Dios actuará. «Pero Dios» reproduce ese contraste de manera natural en español.'
- source_word: פָּקֹד יִפְקֹד
  english_pob_choice: will surely visit you
  chosen_spanish: ciertamente los visitará
  alternatives_spanish:
  - ciertamente los atenderá
  - ciertamente se ocupará de ustedes
  - ciertamente los tendrá en cuenta
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica el verbo, por lo que conviene expresar certeza con «ciertamente». El verbo פקד puede implicar atención decisiva e intervención; siguiendo el POB inglés, «visitará» conserva la forma breve y deja visible la tensión semántica, que se explica en nota.
- source_word: וְהֶעֱלָה אֶתְכֶם
  english_pob_choice: and bring you up
  chosen_spanish: y los hará subir
  alternatives_spanish:
  - y los subirá
  - y los llevará arriba
  lexicon: HALOT
  rationale: El hifil de עלה expresa hacer subir. «Los hará subir» mantiene la dirección ascendente y evita una paráfrasis que borraría el verbo específico.
- source_word: מִן הָאָרֶץ הַזֹּאת
  english_pob_choice: from this land
  chosen_spanish: de esta tierra
  alternatives_spanish:
  - desde esta tierra
  - fuera de esta tierra
  lexicon: HALOT
  rationale: La preposición con el demostrativo se puede expresar de forma natural como «de esta tierra», que conserva la idea de procedencia y salida sin calco rígido.
- source_word: אֶל הָאָרֶץ אֲשֶׁר נִשְׁבַּע
  english_pob_choice: to the land that he swore
  chosen_spanish: a la tierra que juró
  alternatives_spanish:
  - a la tierra que prometió con juramento
  - a la tierra que juró dar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la tierra que juró», sin explicitar el objeto de dar. Se conserva esa cercanía al texto, dejando la promesa implícita como en el original.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, a Isaac y a Jacob
  - a Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: La repetición de la preposición en hebreo da solemnidad; en español puede reflejarse de manera fluida con «a Abraham, a Isaac y a Jacob», sin perder el paralelismo ni cargar la frase.
theological_decisions:
- issue: Sentido de פקד יפקד
  english_pob_reading: A strong assurance that God will decisively attend to and act for Joseph's descendants.
  chosen_spanish_reading: Una fuerte promesa de que Dios ciertamente los visitará e intervendrá a favor de ellos.
  alternative_spanish_readings:
  - Dios ciertamente los atenderá
  - Dios ciertamente se acordará de ustedes y actuará
  rationale: El hebreo no implica solo una visita física; en el contexto del pacto expresa atención decisiva y acción en favor del pueblo. «Los visitará» conserva el vínculo con la formulación tradicional del pasaje y deja abierta la fuerza teológica que la nota explicita.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referencia de «Dios» y el sujeto implícito de la acción
  english_pob_reading: but God will surely visit you and bring you up
  chosen_spanish_reading: pero Dios ciertamente los visitará y los hará subir
  alternative_spanish_readings:
  - pero Dios ciertamente los atenderá y los hará subir
  - pero Dios ciertamente se ocupará de ustedes y los hará subir
  rationale: No hay motivo para sustituir «Dios» por un título más interpretativo. La lectura conserva a Dios como agente directo de la liberación prometida, coherente con el discurso patriarcal y con la precisión del hebreo.
  doctrine_reference: Génesis 12:1-3; 15:13-16; 50:24
- issue: Fórmula patriarcal final
  english_pob_reading: to Abraham, to Isaac, and to Jacob
  chosen_spanish_reading: a Abraham, a Isaac y a Jacob
  alternative_spanish_readings:
  - a Abraham, Isaac y Jacob
  rationale: La fórmula tríadica es una alusión pactal importante. Mantener los tres nombres con preposición expresa el carácter solemne de la promesa sin recargar el español.
  doctrine_reference: Génesis 28:13-15; 46:3-4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión más reciente prefería «visit you» sobre «attend to you» para reflejar con más transparencia el intensivo de פקד יפקד. En español se eligió «los visitará» por esa misma razón, añadiendo una nota que preserva la alternativa «atenderá» y la tensión semántica del hebreo. También se respetó la relación gramatical del texto hebreo: muerte inminente de José, contraste adversativo con la acción de Dios, verbo causativo de ascenso y la fórmula solemne de los patriarcas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים.
  - Se usa «tierra» para אֶרֶץ en coherencia con el registro bíblico y con el contexto de promesa territorial.
  - Se conserva el contraste narrativo con «pero», aunque el hebreo use una conjunción coordinante, porque el sentido discursivo así lo exige en español.
  - Se evita ampliar explícitamente «juró dar», ya que el hebreo no lo dice de forma directa.
