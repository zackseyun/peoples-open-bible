translation:
  language: es
  text: Con un espíritu de poder vio el fin[a], y consoló a los dolientes de Sión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "en un gran espíritu vio las cosas postreras". El hebreo dice: "con un espíritu de poder vio el fin".'
    reason: alternative_reading
  - marker: b
    text: O "a los que lloraban en Sión", siguiendo más de cerca el paralelo griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ברוח / πνεύματι
  english_pob_choice: By a spirit
  chosen_spanish: Con un espíritu
  alternatives_spanish:
  - Por un espíritu
  - En un espíritu
  lexicon: HALOT; LXX πνεύματι
  rationale: El hebreo usa ב con רוח, y la POB inglesa lo leyó instrumentalmente ('By a spirit'). En español, 'Con un espíritu' conserva mejor la idea de medio o esfera sin forzar una construcción poco natural. 'Por un espíritu' suena más causal; 'en un espíritu' podría perder el valor instrumental.
- source_word: גבורה / μεγάλῳ
  english_pob_choice: of might
  chosen_spanish: de poder
  alternatives_spanish:
  - de might
  - de fuerza
  - grande
  lexicon: HALOT; LXX μεγάλῳ
  rationale: La POB inglesa privilegia el hebreo גבורה como fuerza/might, mientras que el griego refleja 'grande'. En español, 'de poder' comunica bien la idea de capacidad vigorosa y mantiene una resonancia amplia entre ambos testigos; 'grande' sería demasiado genérico.
- source_word: חזה
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - contempló
  - tuvo visión de
  lexicon: HALOT
  rationale: El verbo se refiere a ver en sentido profético o visionario. 'Vio' es la forma más directa y fiel, dejando que el contexto profético aporte el matiz.
- source_word: אחרית / τὰ ἔσχατα
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el final
  - lo venidero
  - las cosas postreras
  lexicon: HALOT; LXX τὰ ἔσχατα
  rationale: '''El fin'' reproduce de manera concisa la idea de אחרית y también puede abarcar el sentido de ''las últimas cosas'' del griego. ''Las cosas postreras'' sería más técnico y menos natural en español.'
- source_word: וינחם
  english_pob_choice: and he comforted
  chosen_spanish: y consoló
  alternatives_spanish:
  - y confortó
  - y dio consuelo a
  lexicon: HALOT
  rationale: El sentido aquí es consolar, no 'arrepentirse'. 'Consoló' es el equivalente más natural y mantiene la relación con el griego παρεκάλεσεν.
- source_word: אבלי ציון / τοὺς πενθοῦντας ἐν Σειών
  english_pob_choice: the mourners of Zion
  chosen_spanish: los que lloraban en Sión
  alternatives_spanish:
  - los dolientes de Sión
  - los que estaban de duelo en Sión
  - los que lloran en Sión
  lexicon: HALOT; LXX
  rationale: La POB inglesa preservó la tensión entre el hebreo constructo ('mourners of Zion') y el griego ('those mourning in Zion'). En español, 'los que lloraban en Sión' sigue de cerca el griego y conserva el sentido de personas en duelo; 'dolientes' sería más compacto pero menos transparente.
theological_decisions:
- issue: Relación entre el hebreo 'espíritu de poder' y el griego 'gran espíritu'
  english_pob_reading: By a spirit of might
  chosen_spanish_reading: Con un espíritu de poder
  alternative_spanish_readings:
  - Con un espíritu grande
  - En un gran espíritu
  rationale: La prioridad textual recae en el hebreo, pero el griego aporta una lectura alternativa legítima. La redacción española mantiene el valor de fuerza/poder del hebreo sin borrar que el testimonio griego expresa 'grande' en lugar de 'poder'.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve genuine tension between witnesses.'
- issue: Naturaleza de los sujetos en duelo
  english_pob_reading: those mourning in Zion
  chosen_spanish_reading: los que lloraban en Sión
  alternative_spanish_readings:
  - los dolientes de Sión
  - los que lloran en Sión
  rationale: La POB inglesa dejó abierta la posibilidad de referirse a personas que están llorando en Sión, más cercano al griego. La forma elegida en español conserva esa apertura y evita decidir innecesariamente entre duelo por Sión o duelo dentro de Sión.
  doctrine_reference: Source-priority and retention of textual ambiguity where warranted.
translation_notes:
  revision_awareness: El texto inglés auditado no tuvo revisiones aplicadas y fue confirmado en un pase reciente como sin cambios necesarios; la versión española sigue esa línea, conservando la tensión entre el hebreo y el griego sin armonizarlos artificialmente.
  spanish_consistency_notes:
  - Se mantiene 'Sión' con tilde y el valor toponímico bíblico.
  - '''Espíritu'' se usa en minúscula porque aquí expresa medio o disposición, no una referencia explícita al Espíritu Santo.'
  - Se eligió 'con' para reflejar el instrumental hebreo ב sin sobrerregularizar la sintaxis.
  - No se introdujo 'Mesías', 'SEÑOR' ni otros términos no presentes en el versículo.
