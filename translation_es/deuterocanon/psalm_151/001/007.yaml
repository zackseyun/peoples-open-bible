translation:
  language: es
  text: Pero yo desenvainé su propia espada y le corté la cabeza[a], y quité el oprobio de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo decapité».
    reason: lexical_alternative
  - marker: b
    text: Lit. «de los hijos de Israel»; se conserva la fórmula colectiva masculina del griego.
    reason: cultural_note
lexical_decisions:
- source_word: σπασάμενος
  english_pob_choice: drew
  chosen_spanish: desenvainé
  alternatives_spanish:
  - saqué
  - extraje
  lexicon: LSJ
  rationale: El participio aoristo medio aquí indica sacar un arma para usarla. «Desenvainé» comunica con naturalidad el gesto militar de tomar la espada para la acción, sin perder la idea de extraerla de su vaina.
- source_word: τὴν παρ' αὐτοῦ μάχαιραν
  english_pob_choice: his own sword
  chosen_spanish: su propia espada
  alternatives_spanish:
  - la espada que llevaba
  - la espada de él
  lexicon: LSJ
  rationale: La expresión griega señala posesión y cercanía respecto de la persona. «Su propia espada» conserva ese matiz y reproduce bien el efecto de reversión dramática del original.
- source_word: ἀπεκεφάλισα
  english_pob_choice: cut off his head
  chosen_spanish: le corté la cabeza
  alternatives_spanish:
  - lo decapité
  lexicon: LSJ
  rationale: El verbo significa decapitar. En español, «le corté la cabeza» expresa la acción con claridad y fuerza narrativa, mientras que «lo decapité» es más técnico.
- source_word: ἦρα
  english_pob_choice: removed
  chosen_spanish: quité
  alternatives_spanish:
  - aparté
  - eliminé
  lexicon: LSJ
  rationale: Con ὄνειδος, αἴρω funciona idiomáticamente como “quitar” o “remover” una afrenta. «Quité» conserva esa fuerza figurada de forma directa en español.
- source_word: ὄνειδος
  english_pob_choice: disgrace
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - oprobio
  lexicon: LSJ
  rationale: ὄνειδος denota afrenta, reproche o deshonra pública. «Vergüenza» comunica bien el sentido de humillación colectiva; se mantiene la tensión con «deshonra»/«oprobio» como alternativas posibles según el tono.
- source_word: ἐξ υἱῶν Ἰσραήλ
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - del pueblo de Israel
  lexicon: LSJ
  rationale: Se conserva el giro masculino plural del griego («hijos»). «Hijos de Israel» es además una fórmula bíblica natural en español y mantiene la forma del original sin neutralizarla.
theological_decisions:
- issue: Expresión colectiva masculina
  english_pob_reading: from the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - del pueblo de Israel
  rationale: El griego usa υἱῶν, plural masculino. Se conserva la referencia colectiva masculina del texto fuente en lugar de suavizarla con una expresión neutral, siguiendo la política de fidelidad de la POB.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El testimonio inglés auditado presenta alta concordancia y no requiere cambios sustanciales; se mantiene la doble posibilidad lexical en la decapitación y la expresión colectiva masculina, ajustando el español a una formulación natural y publicable.
  spanish_consistency_notes:
  - Se preserva el paralelismo entre la acción violenta y la remoción de la afrenta.
  - «Espada» mantiene el registro bíblico natural en español para μάχαιρα en este contexto.
  - No se neutraliza «hijos de Israel», para mantener la forma del texto fuente.
  - La puntuación refleja la coordinación final del griego con una cadencia fluida en español.
