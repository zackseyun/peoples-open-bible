translation:
  language: es
  text: Y ambos estaban[a] heridos de deseo por ella, y ninguno de los dos le revelaba al otro la pasión perversa que los dominaba[b] respecto de ella; y la mujer no supo de este asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «heridos/perforados respecto de ella»; aquí la imagen expresa una fuerte fijación o deseo por ella.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el mal deseo que se había apoderado de ellos respecto de ella».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμφότεροι
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: LSJ
  rationale: El griego se refiere claramente a los dos ancianos ya presentes; «ambos» es natural en español y conserva la referencia dual sin añadir énfasis innecesario.
- source_word: κατανενυγμένοι
  english_pob_choice: inflamed with desire
  chosen_spanish: heridos de deseo
  alternatives_spanish:
  - atravesados de deseo
  - heridos
  - inflamados de deseo
  - profundamente conmovidos
  lexicon: LSJ
  rationale: El participio perfectivo pasivo conserva la imagen de estar «herido/perforado», pero en este contexto expresa una fijación erótica. «Heridos de deseo» mantiene la imagen literal de la herida y, a la vez, comunica la fuerza afectiva sin borrar la tensión del griego.
- source_word: περὶ αὐτῆς
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - con respecto a ella
  - acerca de ella
  - por ella
  lexicon: BDAG
  rationale: En español, con un estado afectivo, «por ella» es la forma más natural y comunica el objeto de su deseo. Se conserva el vínculo directo con Susana.
- source_word: οὐ προσεποιεῖτο
  english_pob_choice: disclosed
  chosen_spanish: le descubría
  alternatives_spanish:
  - se lo revelaba
  - se lo daba a conocer
  - lo confesaba
  lexicon: LSJ
  rationale: Aquí el verbo funciona en el sentido de hacer saber o sacar a la luz. «Le descubría al otro» conserva la idea de no revelar el secreto y suena idiomático en español.
- source_word: τὸ κακὸν
  english_pob_choice: the wicked passion
  chosen_spanish: el mal
  alternatives_spanish:
  - la pasión perversa
  - el deseo malo
  - la maldad
  lexicon: LSJ
  rationale: El griego habla de «el mal» de manera amplia; el contexto permite entender que se trata de su deseo culpable, pero el texto no exige especificarlo tanto como «pasión». Mantener «el mal» evita sobreinterpretar y preserva la tensión léxica.
- source_word: τὸ ἔχον αὐτοὺς
  english_pob_choice: that held them
  chosen_spanish: los tenía atrapados
  alternatives_spanish:
  - los dominaba
  - los poseía
  - los sujetaba
  lexicon: BDAG
  rationale: La imagen es de algo que los tiene en su poder. «Los tenía atrapados» conserva el sentido de dominio/agarre con una expresión clara para el español contemporáneo.
- source_word: περὶ αὐτῆς
  english_pob_choice: concerning her
  chosen_spanish: respecto de ella
  alternatives_spanish:
  - acerca de ella
  - en cuanto a ella
  lexicon: BDAG
  rationale: En la segunda aparición de la frase, el griego modifica el sustantivo/participio y no simplemente expresa afecto. «Respecto de ella» reproduce esa relación de referencia de forma sobria.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la señora
  lexicon: LSJ
  rationale: El texto griego dice literalmente «la mujer»; conservarlo respeta el punto de vista narrativo externo y evita introducir una designación más interpretativa.
- source_word: ἔγνω
  english_pob_choice: know
  chosen_spanish: conoció
  alternatives_spanish:
  - supo
  - llegó a saber
  - percibió
  lexicon: BDAG
  rationale: El aoristo se refiere a no llegar a conocer/hecho alguno. «Conoció» en pretérito es un equivalente sobrio en español y funciona bien con la negación.
- source_word: τὸ πρᾶγμα τοῦτο
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este hecho
  - este caso
  lexicon: BDAG
  rationale: «Este asunto» es idiomático y suficientemente amplio para el contenido oculto de la escena, sin introducir una especificación como «trama» o «plan» que el griego todavía no explicita.
theological_decisions:
- issue: Grado de explicitud del deseo culpable de los ancianos
  english_pob_reading: Render τὸ κακὸν as 'the wicked passion' rather than a bare 'evil'
  chosen_spanish_reading: Traducir con «el mal» y dejar que el contexto muestre que se trata de un deseo culpable
  alternative_spanish_readings:
  - la pasión perversa
  - el deseo malo
  - la maldad
  rationale: El griego presenta una evaluación moral fuerte, pero la forma nominal es todavía amplia. En español, «el mal» conserva la amplitud del original y evita cerrar la interpretación antes de que el contexto la complete.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza imagística de κατανενυγμένοι
  english_pob_reading: Translate idiomatically as 'inflamed with desire'
  chosen_spanish_reading: 'Conservar una imagen corporal de herida: «heridos de deseo»'
  alternative_spanish_readings:
  - inflamados de deseo
  - atravesados de deseo
  - profundamente conmovidos
  rationale: La literalidad subyacente del participio merece quedar perceptible en español. «Heridos de deseo» mantiene la metáfora de lesión/punción y, al mismo tiempo, permite entender el sentido afectivo sin borrar la tensión semántica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluyendo la decisión de no volver opaca la imagen de κατανενυγμένοι y la observación de que τὸ κακὸν puede expresarse más ampliamente como «el mal». La versión española busca conservar la tensión entre literalidad y claridad sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usa «la mujer» siguiendo el griego y el patrón narrativo del pasaje.
  - Se preserva una imagen corporal en «heridos de deseo» para no borrar la fuerza metafórica del original.
  - «Este asunto» evita una interpretación excesiva del contenido oculto.
  - No se introduce terminología doctrinal ajena al texto; se traduce el marco narrativo con sobriedad.
