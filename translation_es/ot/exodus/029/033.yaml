  to: Comerán aquellas cosas por las cuales se hizo expiación[b], para ordenarlos[a] y para consagrarlos; pero un extraño no las comerá[c], porque son santas.
  rationale: Se reubicó la nota del modismo sacerdotal al lugar correcto ('ordenarlos') y se añadió la alternativa lexical faltante para la frase de expiación, preservando mejor el rastro de auditoría en inglés y la posible ambigüedad instrumental del hebreo. Se mantuvo el texto principal casi intacto porque es fiel y natural en español.
