id: MAT.15.28
reference: Matthew 15:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τότε ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτῇ· Ὦ γύναι, μεγάλη σου ἡ πίστις· γενηθήτω σοι ὡς θέλεις. καὶ ἰάθη ἡ θυγάτηρ αὐτῆς ἀπὸ τῆς ὥρας ἐκείνης.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/028.yaml
  text: 'Then Jesus answered her[a], "O woman, great is your faith[b]; let it be done for you as you desire." And her daughter was healed from that hour.'
translation:
  language: ko
  text: '그때에 예수께서 그 여자에게 대답하여 말씀하셨습니다. 「여자여, 네 믿음이 크다. 네가 원하는 대로 너에게 이루어지기를.」 그리고 그 여자의 딸이 그 시각부터 나았습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「네 신뢰가 크다」. 헬라어 πίστις는 「믿음·신뢰·신실함」을 모두 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그 순간부터」. 헬라어는 문자적으로 「그 시(時)부터」이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ γύναι
  english_pob_choice: O woman
  chosen_korean: 여자여
  alternatives_korean:
  - 부인이여
  lexicon: BDAG
  rationale: 호격. 「여자여」는 무례한 함의 없이 정중한 부름의 역할을 한다.
- source_word: μεγάλη σου ἡ πίστις
  english_pob_choice: great is your faith
  chosen_korean: 네 믿음이 크다
  lexicon: BDAG
  rationale: πίστις는 글로사리상 기본값 「믿음」.
- source_word: γενηθήτω σοι ὡς θέλεις
  english_pob_choice: let it be done for you as you desire
  chosen_korean: 네가 원하는 대로 너에게 이루어지기를
  lexicon: BDAG
  rationale: 신적 수동 3인칭 명령형. 한국어 기원형 「-기를」로 부드럽게 옮긴다.
