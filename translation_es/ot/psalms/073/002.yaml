translation:
  language: es
  text: Pero en cuanto a mí[a], mis pies casi tropezaron; mis pasos por poco resbalaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis pies estuvieron a punto de tropezar; mis pasos casi resbalaron». El paralelismo poético hebreo permite imágenes ligeramente distintas pero cercanas de inestabilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - Y yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La combinación de conjunción y pronombre independiente marca contraste enfático con el contexto previo. «Pero en cuanto a mí» conserva tanto la oposición como el énfasis personal sin sonar artificial en español.
- source_word: כִּמְעַט
  english_pob_choice: almost / nearly
  chosen_spanish: casi
  alternatives_spanish:
  - por poco
  - apenas
  - casi a punto de
  lexicon: HALOT
  rationale: El adverbio expresa que el hecho estuvo muy cerca de ocurrir. «Casi» es la forma natural en español para reproducir esa cercanía sin añadir interpretación.
- source_word: נטוי
  english_pob_choice: had stumbled
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se torcieron
  - vacilaron
  - estuvieron a punto de desviarse
  lexicon: HALOT
  rationale: En el contexto poético, el verbo comunica desviación o pérdida de firmeza más que un giro literal. «Se apartaron» mantiene la imagen corporal de los pies y deja abierta la tensión metafórica que el POB inglés preserva.
- source_word: רַגְלָי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis piernas
  - mis pasos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal directa. En poesía hebrea, «pies» puede funcionar como metáfora del andar o del rumbo sin necesidad de explicitarlo.
- source_word: כְּאַיִן
  english_pob_choice: nearly
  chosen_spanish: casi
  alternatives_spanish:
  - como nada
  - por poco
  - apenas
  lexicon: HALOT
  rationale: La expresión idiomática transmite el sentido de «a punto de» o «casi». «Casi» reproduce el valor adverbial con naturalidad en español.
- source_word: שָׁפְכָה
  english_pob_choice: had slipped
  chosen_spanish: resbalaron
  alternatives_spanish:
  - se deslizaron
  - cedieron
  - se fueron
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar «derramar», en este paralelismo con «pasos» expresa perder firmeza o deslizarse. «Resbalaron» comunica claramente la imagen idiomática de inestabilidad.
- source_word: אֲשֻׁרָי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis pisadas
  - mi andar
  - mis andanzas
  lexicon: HALOT
  rationale: «Pasos» es la equivalencia más natural y mantiene el paralelismo poético con «pies», preservando el lenguaje de recorrido o conducta.
theological_decisions:
- issue: Imagen de inestabilidad física sin explicitación moral
  english_pob_reading: Retain the bodily/path imagery ('feet,' 'steps,' 'stumbled,' 'slipped') without making the moral application explicit.
  chosen_spanish_reading: Conservar la imagen corporal y de andar («pies», «pasos», «se apartaron», «resbalaron») sin explicitar una caída moral o de fe.
  alternative_spanish_readings:
  - «Casi perdí la fe»
  - «Casi tropecé moralmente»
  - «Casi me desvié de Dios»
  rationale: El hebreo presenta una metáfora concreta de inestabilidad; no especifica por sí misma el ámbito exacto de la caída. La traducción debe preservar esa tensión teológica y no resolverla con una explicación interpretativa que el texto no da.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el contexto auditado en inglés, pero evita traducir mecánicamente. Se conserva el paralelismo poético y la ambigüedad metafórica del hebreo, mientras se adopta un español natural y publication-readable. La revisión inglesa desplazó la primera cola de «turned aside» a «stumbled»; en español se prefirió mantener una imagen de desviación compatible con el hebreo y con el segundo miembro («resbalaron»), sin forzar un equivalente único donde el original admite solapamiento semántico.
  spanish_consistency_notes:
  - Se usa «Pero en cuanto a mí» para reflejar el contraste enfático de וַאֲנִי.
  - Se mantiene «pies» y «pasos» como imagen corporal poética, no como paráfrasis moral.
  - «Casi» se emplea en ambos hemistiquios para reproducir la fuerza de כִּמְעַט / כְּאַיִן.
  - «Resbalaron» conserva el valor idiomático del verbo hebreo en el segundo cola.
  - La nota alternativa preserva la posibilidad de leer «se desviaron» sin imponerla como única opción.
