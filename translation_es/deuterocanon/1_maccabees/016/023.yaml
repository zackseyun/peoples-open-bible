lexical_decisions:
- source_word: τὰ λοιπά
  english_pob_choice: the rest
  chosen_spanish: lo restante
  alternatives_spanish:
  - el resto
  - lo demás
  lexicon: LSJ
  rationale: Tomo la fórmula conclusiva en un español natural y formal. 'Lo restante' conserva el sentido de material no incluido aquí sin convertirlo en una paráfrasis excesiva.
- source_word: λόγων
  english_pob_choice: accounts
  chosen_spanish: relatos
  alternatives_spanish:
  - cuentas
  - informes
  - narraciones
  lexicon: LSJ
  rationale: En este cierre historiográfico, λόγοι no son solo 'palabras', sino materia narrada o registrada. 'Relatos' comunica bien el valor de 'accounts' en español bíblico actual.
- source_word: πολέμων
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - batallas
  - campañas
  lexicon: LSJ
  rationale: El plural abarca conflictos militares amplios. 'Guerras' preserva mejor el alcance que 'batallas'.
- source_word: ἀνδραγαθιῶν
  english_pob_choice: mighty deeds
  chosen_spanish: hazañas
  alternatives_spanish:
  - hechos valerosos
  - hechos heroicos
  - proezas
  lexicon: LSJ
  rationale: El término denota acciones de valor o heroísmo. 'Hazañas' mantiene ese tono laudatorio con buena naturalidad en español.
- source_word: ἠνδραγάθησεν
  english_pob_choice: he did
  chosen_spanish: realizó
  alternatives_spanish:
  - hizo
  - llevó a cabo
  - actuó con valor
  lexicon: LSJ
  rationale: El verbo cognado expresa la ejecución de actos valientes. Dado que el sustantivo ya porta la idea de valor, 'realizó' evita una repetición forzada y sigue siendo fiel al relativo.
- source_word: οἰκοδομῆς
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - el edificio
  - la edificación
  lexicon: LSJ
  rationale: Aquí el sustantivo describe la obra de construir. 'La construcción' es transparente y natural en español.
- source_word: τειχέων
  english_pob_choice: walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  - las paredes
  lexicon: LSJ
  rationale: Aunque 'walls' es amplio, el contexto defensivo sugiere muros/murallas. 'Muros' funciona bien en español sin sobreactuar el término técnico.
- source_word: πράξεων
  english_pob_choice: acts
  chosen_spanish: acciones
  alternatives_spanish:
  - actos
  - hechos
  - obras
  lexicon: LSJ
  rationale: Es un término general de cierre. 'Acciones' conserva la amplitud semántica sin elevarlo innecesariamente a un registro más solemne que el griego.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: LSJ
  rationale: Mantengo el enlace narrativo simple con 'Y', como en la estructura acumulativa del original.
translation_notes:
  revision_awareness: La versión española se ajusta al texto griego y al cierre enumerativo reflejado en la traducción inglesa auditada, sin introducir notas porque no hay variantes textuales ni tensiones léxicas que requieran anclaje explícito en este versículo.
  spanish_consistency_notes:
  - Se conservó la secuencia acumulativa del griego con coordinaciones simples.
  - Se evitó traducir λόγοι mecánicamente como 'palabras' para respetar el valor historiográfico del contexto.
  - No se añadieron notas al pie porque no hay una alternativa textual documentada que deba anclarse en el verso.
