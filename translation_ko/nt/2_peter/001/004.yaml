id: 2PE.1.4
reference: 2 Peter 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δι’ ὧν τὰ ⸂τίμια καὶ μέγιστα ἡμῖν⸃ ἐπαγγέλματα δεδώρηται, ἵνα διὰ τούτων γένησθε θείας κοινωνοὶ φύσεως, ἀποφυγόντες τῆς ἐν ⸀τῷ κόσμῳ ἐν ἐπιθυμίᾳ φθορᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/004.yaml
  text: through which he has granted to us his precious and very great promises[a], so that through these you may become sharers in the divine nature[b], having escaped the corruption that is in the world because of sinful desire.
  footnotes:
  - marker: a
    text: Or 'participants in the divine nature.' The phrase speaks of sharing in what comes from God, not of becoming divine in essence.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of desire' or 'by lust.' The Greek term can mean 'desire' generally, but here it is morally negative in context.
    reason: lexical_alternative
translation:
  language: ko
  text: 이로써 그분께서는 보배롭고도 지극히 위대한 약속들을 우리에게 주셨으니, 이는 여러분이 이것들을 통하여 정욕으로 인한 세상의 부패를 피하고 신성의 본성에 참여하는 자[a]가 되게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 θείας κοινωνοὶ φύσεως. 본문은 하나님께로부터 오는 본성에 실제로 참여함을 강하게 말하되, 신자가 본질상 신이 된다는 뜻은 아니다. 후대의 신학 정식(theosis 등)을 본문에 미리 끌어들이지 않고 본문 자체의 강한 표현을 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: θείας κοινωνοὶ φύσεως
  english_pob_choice: sharers in the divine nature
  chosen_korean: 신성의 본성에 참여하는 자
  alternatives_korean:
  - 신성한 본성의 동참자
  - 신적 본성에 참여하는 자
  lexicon: BDAG
  rationale: 프로젝트 용어집의 표준 등가어. κοινωνός는 실제 참여·동반자성을 뜻한다. 본문의 강한 언어를 약화시키지 않으면서, 본질상 신이 됨이 아닌 본성에의 참여로 명확히 표현한다.
- source_word: ἐπαγγέλματα
  english_pob_choice: promises
  chosen_korean: 약속들
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: φθορά
  english_pob_choice: corruption
  chosen_korean: 부패
  alternatives_korean:
  - 멸망
  - 썩어짐
  lexicon: BDAG
  rationale: 도덕적·영적 부패의 의미를 살린다.
- source_word: ἐπιθυμία
  english_pob_choice: sinful desire
  chosen_korean: 정욕
  alternatives_korean:
  - 욕망
  - 죄된 욕망
  lexicon: BDAG
  rationale: 문맥상 부정적 의미가 분명하므로 한국어 신약 어휘 「정욕」을 채택한다.
theological_decisions:
- issue: θείας κοινωνοὶ φύσεως와 신성 참여 교리
  chosen_reading: 신성의 본성에 참여하는 자
  alternative_readings:
  - 신적 본성의 동참자
  - 신성한 본성의 참여자
  rationale: 본문은 신자의 성화·그리스도와의 연합·theosis 등과 관련하여 다양하게 읽혀 왔다. 번역은 본문의 강한 언어를 보존하면서도 후대 교리 정식을 미리 끌어들이지 않는다. 「신성의 본성에 참여하는 자」는 실제 참여를 분명히 전하되, 본질상 신이 된다는 뜻은 아니다.
  doctrine_reference: Affirmations; Translation philosophy §3
