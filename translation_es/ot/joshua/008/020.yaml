  to: Entonces los hombres de Hai se volvieron y miraron detrás de sí, y he aquí que el humo de la ciudad subía al cielo[a], y no había poder en ellos[b] para huir ni de un lado ni del otro. Y el pueblo que había huido al desierto se volvió contra el perseguidor[c].
  rationale: Se corrigió la ubicación de la nota [a] para que ancle la expresión que realmente explica; se mejoró la naturalidad de la primera cláusula manteniendo la doble acción del hebreo («se volvieron» + «miraron»); y se ajustó el modismo sobre «manos» a «no había poder en ellos» para preservar el sentido documentado de capacidad, no solo fuerza física.
