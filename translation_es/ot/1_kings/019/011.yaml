translation:
  language: es
  text: 'Y él dijo: «Sal y quédate de pie en el monte delante de Yahvé». Y he aquí que Yahvé pasaba, y un viento grande y fuerte desgarraba los montes y quebraba las peñas delante de Yahvé; pero Yahvé no estaba en el viento[a]. Después del viento, un terremoto[b]; pero Yahvé no estaba en el terremoto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé no estaba en el viento». Esto puede implicar que no se reveló en él, pero la traducción conserva la formulación más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé no estaba en el terremoto». El texto no niega la soberanía de Yahvé sobre ese evento; afirma que no estaba en él en el sentido expresado por la narración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como transliteración reverente y reconocible en español. Se evita la sustitución por un título como «Señor», en línea con la auditoría inglesa.
- source_word: צֵא
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Ve afuera
  lexicon: HALOT
  rationale: El imperativo de יצא expresa salida desde el lugar actual; «sal» es natural, fiel y breve en español.
- source_word: וְעָמַדְתָּ
  english_pob_choice: stand
  chosen_spanish: ponte
  alternatives_spanish:
  - mantente de pie
  - permanece de pie
  lexicon: HALOT
  rationale: En español, «ponte en el monte» comunica la postura requerida con naturalidad. Mantiene la idea posicional de עמד sin añadir énfasis interpretativo.
- source_word: בָהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: «En el monte» es idiomático y conserva la referencia locativa del hebreo sin sonar forzado.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de» mantiene el valor espacial y relacional de לִפְנֵי con una formulación bíblica clara en español.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí que
  lexicon: HALOT
  rationale: «Y he aquí» preserva la fuerza discursiva de הִנֵּה y el tono narrativo solemne.
- source_word: עֹבֵר
  english_pob_choice: was passing by
  chosen_spanish: pasaba
  alternatives_spanish:
  - iba pasando
  - estaba pasando
  lexicon: HALOT
  rationale: El participio en contexto expresa acción en curso; «pasaba» transmite bien esa continuidad sin sobrerrepresentar futuro o inmediatez.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - ráfaga
  lexicon: HALOT
  rationale: Aquí el contexto físico —desgarrar montes y quebrar peñas— exige «viento», no «espíritu».
- source_word: גְּדוֹלָה וְחָזָק
  english_pob_choice: great and strong
  chosen_spanish: un gran y fuerte
  alternatives_spanish:
  - un viento grande y fuerte
  - un viento grande y poderoso
  lexicon: HALOT
  rationale: Se mantienen ambos adjetivos separados para reflejar la intensificación hebrea. «Gran y fuerte» suena natural y fiel.
- source_word: מְפָרֵק
  english_pob_choice: was tearing apart
  chosen_spanish: desgarraba
  alternatives_spanish:
  - rasgaba
  - destrozaba
  lexicon: HALOT
  rationale: «Desgarraba» comunica una acción violenta y continua, acorde con el participio y con la imagen de montes sometidos a fuerza extrema.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Montes» es una opción bíblica y natural en español para הָרִים, con registro ligeramente más solemne que «montañas».
- source_word: וּמְשַׁבֵּר סְלָעִים
  english_pob_choice: and shattering rocks
  chosen_spanish: y quebraba las peñas
  alternatives_spanish:
  - y rompía las rocas
  - y hacía pedazos las peñas
  lexicon: HALOT
  rationale: «Quebraba las peñas» conserva el paralelismo verbal y el matiz de fractura violenta. «Peñas» representa bien סְלָעִים con tono bíblico sin caer en tecnicismo.
- source_word: לֹא בָרוּחַ יְהוָה
  english_pob_choice: but Yahweh was not in the wind
  chosen_spanish: pero Yahvé no estaba en el viento
  alternatives_spanish:
  - pero Yahvé no se hallaba en el viento
  - pero Yahvé no estaba presente en el viento
  lexicon: HALOT
  rationale: Se conserva la formulación sobria «no estaba en» para retener la tensión del hebreo sin explicitar más de lo que el texto dice.
- source_word: וְאַחַר הָרוּחַ רַעַשׁ
  english_pob_choice: And after the wind, an earthquake
  chosen_spanish: Después del viento, un terremoto
  alternatives_spanish:
  - Y después del viento, un terremoto
  - Luego del viento, un terremoto
  lexicon: HALOT
  rationale: «Terremoto» es la equivalencia contextual más clara para רַעַשׁ en esta escena narrativa.
- source_word: לֹא בָרַעַשׁ יְהוָה
  english_pob_choice: but Yahweh was not in the earthquake
  chosen_spanish: pero Yahvé no estaba en el terremoto
  alternatives_spanish:
  - pero Yahvé no estaba presente en el terremoto
  - pero Yahvé no se hallaba en el terremoto
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón que en el miembro anterior para preservar la repetición hebrea y la cautela teológica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - Señor
  rationale: La decisión española sigue la transliteración del nombre divino, manteniendo la identidad personal del pacto y la consistencia con el proyecto POB.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahweh (trasladado al español como Yahvé)'
- issue: Sentido de «no estaba en el viento / terremoto»
  english_pob_reading: Retain the locative wording 'in' without interpretive expansion
  chosen_spanish_reading: Retener «no estaba en» sin expandir a «se reveló en» o «se manifestó en»
  alternative_spanish_readings:
  - Yahvé no se reveló en el viento
  - Yahvé no se manifestó en el terremoto
  rationale: El hebreo expresa literalmente la ausencia locativa; traducirlo así preserva la tensión narrativa y evita resolver teológicamente lo que el texto deja en suspenso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y la auditoría inglesa revisada, manteniendo la secuencia narrativa, los paralelismos y la tensión teológica de «no estaba en». No se detectaron revisiones aplicadas en el último pase inglés, por lo que la propuesta española adopta una equivalencia óptima estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del Tetragrámaton.
  - Se conserva el patrón repetido «pero Yahvé no estaba en…» para reflejar el paralelismo hebreo.
  - «Monte» y «terremoto» se usan con registro bíblico claro y contemporáneo.
  - No se introduce terminología eclesiástica ajena al hebreo; se prioriza la transparencia léxica.
