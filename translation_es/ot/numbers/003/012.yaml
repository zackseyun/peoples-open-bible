translation:
  language: es
  text: Y yo—he aquí—he tomado a los levitas de entre los hijos de Israel[a], en lugar de todo primogénito que abre el vientre entre los hijos de Israel, y los levitas serán míos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» para «los hijos de Israel». La expresión hebrea es literalmente masculina y formulaica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Ahora yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: Conserva el énfasis del pronombre explícito y la transición enfática del hablante sin forzar una formulación antinatural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira,
  - he ahí
  lexicon: HALOT
  rationale: Reproduce la fuerza deíctica y solemne del hebreo con una fórmula reverente y comprensible en español bíblico moderno.
- source_word: לָקַחְתִּי
  english_pob_choice: I have taken
  chosen_spanish: he tomado
  alternatives_spanish:
  - tomé
  - estoy tomando
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya establecida con vigencia presente; en español, el perfecto compuesto comunica bien ese estado resultante.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Mantiene el nombre tribal estándar en español sin añadir carga interpretativa.
- source_word: מִתּוֹךְ
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - del medio de
  - de en medio de
  lexicon: HALOT
  rationale: ‘De entre’ es la equivalencia española más natural para selección desde dentro de un grupo mayor.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Preserva la expresión fórmulaica y formal del hebreo; no se neutraliza a ‘israelitas’ en el texto principal porque el patrón original es masculino y conviene mantenerlo visible.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - sustituyendo a
  lexicon: HALOT
  rationale: Expresa con claridad el sentido sustitutivo/legal del contexto cultual.
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo hijo primogénito
  lexicon: HALOT
  rationale: ‘Primogénito’ transmite el valor distributivo y legal de בְּכוֹר de manera natural en español.
- source_word: פֶּטֶר רֶחֶם
  english_pob_choice: that opens the womb
  chosen_spanish: que abre el vientre
  alternatives_spanish:
  - que abre el seno
  - el que abre el vientre
  lexicon: HALOT
  rationale: La imagen corporal del hebreo se conserva de modo directo; ‘vientre’ mantiene el registro bíblico y el valor legal-cultual de la expresión.
- source_word: וְהָיוּ לִי
  english_pob_choice: shall be mine
  chosen_spanish: serán míos
  alternatives_spanish:
  - pertenecerán a mí
  - serán para mí
  lexicon: HALOT
  rationale: ‘Serán míos’ expresa posesión/consecración de forma breve y fiel; mantiene la fuerza futura/resultativa del hebreo.
theological_decisions:
- issue: Expresión masculina y fórmulaica בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina y tradicionalmente formulaica del hebreo, siguiendo el criterio de transparencia del POB; se evita una neutralización que borre la forma del original sin necesidad contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación de pertenencia en וְהָיוּ לִי
  english_pob_reading: the Levites shall be mine
  chosen_spanish_reading: los levitas serán míos
  alternative_spanish_readings:
  - los levitas pertenecerán a mí
  - los levitas serán para mí
  rationale: El hebreo declara una apropiación/consecración divina, no una categoría doctrinal posterior. ‘Serán míos’ preserva esa afirmación de pertenencia de manera directa y sobria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Coincide con el cotejo más reciente: no se requirieron revisiones adicionales y el acuerdo con la auditoría inglesa fue alto.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ como sustituto no presente en el hebreo.
  - Se preservó el paralelismo entre ‘de entre’ / ‘en lugar de’ / ‘serán míos’ para reflejar la lógica legal del verso.
  - La nota al pie se ancla en ‘los hijos de Israel’ para reflejar la alternativa lexical ya documentada en la auditoría inglesa.
