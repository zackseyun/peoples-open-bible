translation:
  language: es
  text: Quitó los lugares altos y los altares de incienso[a] de todas las ciudades de Judá, y el reino tuvo paz delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente “los pilares del sol”. El término hebreo se refiere a objetos de culto y en algunos contextos puede asociarse con la adoración solar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: He removed
  chosen_spanish: Quitó
  alternatives_spanish:
  - Retiró
  - Removió
  - Quitó de en medio
  lexicon: HALOT
  rationale: El Hifil de סור expresa hacer que algo sea quitado o removido. En español, 'quitó' comunica la acción concreta de manera natural y fiel, sin añadir la fuerza de 'abolió'.
- source_word: מִכָּל עָרֵי יְהוּדָה
  english_pob_choice: from all the cities of Judah
  chosen_spanish: de todas las ciudades de Judá
  alternatives_spanish:
  - de cada ciudad de Judá
  - de todas las ciudades de Judá
  lexicon: HALOT
  rationale: La frase marca el alcance geográfico de la reforma. 'De todas las ciudades de Judá' sigue de cerca la construcción hebrea y su sentido distributivo.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altares altos
  - los santuarios en las alturas
  - las alturas cultuales
  lexicon: HALOT
  rationale: En español, 'lugares altos' conserva el término bíblico tradicional y la referencia a sitios cultuales elevados. Aunque 'altos' es menos idiomático que en inglés, evita paraphrasear en exceso y mantiene la categoría histórica-religiosa.
- source_word: הַחַמָּנִים
  english_pob_choice: the incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los pilares del sol
  - los postes solares
  - los objetos de culto solar
  lexicon: HALOT
  rationale: El término es léxicamente difícil y puede aludir a objetos cultuales ligados al incienso o al culto solar. 'Altares de incienso' reproduce la elección auditada del inglés POB en una forma natural para el español, dejando abierta la tensión lexical sin resolverla de manera excesiva.
- source_word: וַתִּשְׁקֹט
  english_pob_choice: had rest
  chosen_spanish: tuvo paz
  alternatives_spanish:
  - descansó
  - quedó en paz
  - estuvo en reposo
  lexicon: HALOT
  rationale: שׁקט expresa estar quieto, en reposo o sin perturbación. 'Tuvo paz' funciona bien en español para el resultado político y encaja con el motivo cronista de tranquilidad nacional, aunque la idea básica es de reposo/quietud.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la monarquía
  - el reino
  lexicon: HALOT
  rationale: '''מַמְלָכָה'' se traduce de manera directa como ''reino''. En español, ''el reino'' es más fluido que ''la reino'' y mantiene el referente político.'
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - bajo su mando
  lexicon: HALOT
  rationale: La expresión literalmente significa 'delante de él'. 'Delante de él' preserva la imagen espacial y es comprensible en español; aquí puede implicar el período de su reinado o su presencia, sin explicitarlo más allá del hebreo.
theological_decisions:
- issue: Naturaleza de los objetos cultuales de חַמָּנִים
  english_pob_reading: Render as a cultic object removed by Asa, while preserving the lexical uncertainty with an alternative note about sun-pillars.
  chosen_spanish_reading: Se traduce como 'altares de incienso', manteniendo la referencia a un objeto cultual concreto sin decidir de forma cerrada si se trata de pilares solares.
  alternative_spanish_readings:
  - los pilares del sol
  - los postes solares
  - los objetos de culto solar
  rationale: El hebreo admite más de una identificación. La traducción principal sigue el audit trail inglés y evita imponer una interpretación más específica de la que el texto garantiza. La alternativa se conserva implícitamente en las opciones léxicas.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas y el control cruzado indica alta concordancia; por eso la redacción española sigue de cerca la lectura aprobada, conservando la ambigüedad lexical de חַמָּנִים con nota.
  spanish_consistency_notes:
  - Se mantiene 'Judá' como nombre propio estándar.
  - Se usa 'reino' para מַמְלָכָה y no 'monarquía' para evitar sobreinterpretación.
  - Se conserva una formulación bíblica sobria y publicable, sin añadir explicaciones históricas que el versículo no ofrece.
  - Las notas al pie distinguen la ambigüedad de los lugares altos y de los חַמָּנִים sin forzar una sola solución.
