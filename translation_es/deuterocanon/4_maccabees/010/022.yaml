translation:
  language: es
  text: No voy a rehusar[a], tirano, la tortura por causa de la virtud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no voy a declinar la tortura por causa de la virtud».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλλω
  english_pob_choice: I am not about to
  chosen_spanish: No estoy dispuesto
  alternatives_spanish:
  - No voy a
  - No tengo intención de
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa una disposición inmediata o una intención firme hacia el acto futuro. «No estoy dispuesto» conserva esa resolución presente y funciona con naturalidad en español sin reducirlo a un futuro simple.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - despota
  - tirano rey
  lexicon: LSJ
  rationale: El vocativo dirige un reproche al gobernante perseguidor. «Tirano» es el equivalente directo y transparente en español para mantener la carga moral del término griego.
- source_word: πρὸς τὸν ... βασανισμόν
  english_pob_choice: the torture
  chosen_spanish: el tormento
  alternatives_spanish:
  - la tortura
  - la aflicción
  lexicon: LSJ
  rationale: βασανισμός puede denotar tortura o tormento severo. «Tormento» preserva la amplitud semántica y suena más natural en español que una construcción demasiado técnica o repetitiva.
- source_word: ὑπὲρ τῆς ἀρετῆς
  english_pob_choice: for the sake of virtue
  chosen_spanish: por causa de la virtud
  alternatives_spanish:
  - por virtud
  - en favor de la virtud
  lexicon: LSJ
  rationale: ὑπέρ aquí expresa causa o motivo. «Por causa de» mantiene ese valor causal y hace explícito que el sufrimiento se asume en defensa de la virtud/moralidad.
- source_word: παραιτεῖσθαι
  english_pob_choice: refuse
  chosen_spanish: rehusar
  alternatives_spanish:
  - rechazar
  - declinar
  - esquivar
  lexicon: BDAG
  rationale: El infinitivo medio puede significar rehusar o declinar. «Rehusar» refleja bien la negativa deliberada a apartarse del castigo dispuesto, sin perder la fuerza volitiva del verbo.
theological_decisions:
- issue: Naturaleza del sufrimiento aceptado
  english_pob_reading: the torture for the sake of virtue
  chosen_spanish_reading: el tormento por causa de la virtud
  alternative_spanish_readings:
  - la tortura por causa de la virtud
  - el sufrimiento por causa de la virtud
  rationale: El texto subraya una aceptación voluntaria del castigo por fidelidad a la virtud. «Tormento» conserva la severidad del castigo sin forzar una tecnicidad donde el griego admite un campo semántico más amplio.
  doctrine_reference: martirio/virtud ética en 4 Macabeos
- issue: Dirigirse al perseguidor como autoridad cruel
  english_pob_reading: tyrant
  chosen_spanish_reading: tirano
  alternative_spanish_readings:
  - déspota
  - opresor
  rationale: La forma vocativa y el contexto de persecución justifican mantener el término de denuncia moral. «Tirano» preserva la confrontación ética del original.
  doctrine_reference: ética del testimonio fiel bajo persecución
translation_notes:
  revision_awareness: Se revisó el auditorial inglés y no se adoptaron cambios recientes; la lectura permanece estable. Se mantuvo la fuerza resolutiva del griego μελλω + infinitivo y la acusación directa del vocativo.
  spanish_consistency_notes:
  - Se usa «tirano» para τύραννε, en continuidad con la traducción inglesa auditada.
  - Se eligió «tormento» como equivalente amplio de βασανισμός; «tortura» queda como alternativa anotada.
  - Se evitó un calco con «estoy por» para preservar la intención firme sin sonar demasiado coloquial.
  - La nota al pie conserva la alternativa semántica principal del POB inglés con adaptación natural al español.
