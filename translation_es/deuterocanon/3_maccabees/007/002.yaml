translation:
  language: es
  text: Y nosotros mismos y nuestros hijos estamos bien[a], mientras el gran Dios dirige para nosotros las ordenanzas, tal como lo proponemos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estamos fuertes», «nos hallamos bien» o «estamos en buena salud» para ἐρρώμεθα.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρώμεθα
  english_pob_choice: are well
  chosen_spanish: estamos bien
  alternatives_spanish:
  - estamos fuertes
  - nos hallamos bien
  - estamos en buena salud
  lexicon: LSJ
  rationale: El verbo perfecto con sentido idiomático expresa bienestar o buena disposición. En español, «estamos bien» comunica de forma natural ese estado general sin limitarlo solo a salud física.
- source_word: καὶ αὐτοὶ καὶ τὰ τέκνα ἡμῶν
  english_pob_choice: we ourselves and our children
  chosen_spanish: nosotros mismos y nuestros hijos
  alternatives_spanish:
  - tanto nosotros como nuestros hijos
  - nosotros y nuestros hijos
  - nosotros mismos y nuestros niños
  lexicon: LSJ
  rationale: La construcción es enfática; «nosotros mismos» conserva esa fuerza. «τέκνα» abarca descendencia en general, y «hijos» es el equivalente natural y amplio en español.
- source_word: κατευθύνοντος
  english_pob_choice: directs
  chosen_spanish: dirige
  alternatives_spanish:
  - guía
  - endereza
  - ordena
  lexicon: LSJ
  rationale: El valor básico es hacer recto o dirigir. «Dirige» mantiene el sentido rector de la acción divina sin volver la frase artificiosa.
- source_word: τοῦ μεγάλου θεοῦ
  english_pob_choice: the great God
  chosen_spanish: el gran Dios
  alternatives_spanish:
  - Dios grande
  - el Dios grande
  lexicon: LSJ
  rationale: La frase titular se traduce de manera directa y reverente. «El gran Dios» reproduce bien el énfasis del griego.
- source_word: τὰ προστάγματα
  english_pob_choice: the ordinances
  chosen_spanish: los decretos
  alternatives_spanish:
  - los mandatos
  - las ordenanzas
  - los preceptos
  lexicon: LSJ
  rationale: En este contexto, προστάγματα puede referirse a mandatos o disposiciones establecidas. «Decretos» preserva el tono formal y normativo; «ordenanzas» quedaría también posible, pero en español suena más técnico-eclesiástico.
- source_word: καθὼς προαιρούμεθα
  english_pob_choice: just as we intend
  chosen_spanish: tal como nos proponemos
  alternatives_spanish:
  - así como lo intentamos
  - tal como pensamos
  - según nuestro propósito
  lexicon: LSJ
  rationale: προαιρέομαι puede expresar elegir, proponerse o tener la intención. «Nos proponemos» conserva la voluntad deliberada y evita resolver la tensión entre la acción divina y la intención humana.
theological_decisions:
- issue: Relación entre la dirección divina y la intención humana
  english_pob_reading: The text preserves both divine agency and human volition without harmonizing the tension.
  chosen_spanish_reading: El texto conserva tanto la dirección del gran Dios como la intención humana sin resolver su relación.
  alternative_spanish_readings:
  - el gran Dios gobierna y nosotros decidimos
  - Dios dirige todo, y nosotros solo obedecemos
  rationale: El griego coloca juntos el obrar rector de Dios y la deliberación de los hablantes. La traducción debe dejar visible esa tensión, no neutralizarla ni explicarla en exceso.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, pero adapta los ajustes al español: τὰ προστάγματα se vierte con un sustantivo formal y natural («los decretos») y προαιρούμεθα con una expresión de intención deliberada («nos proponemos») para reflejar mejor la tensión entre la dirección divina y la voluntad humana.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se usa un registro digno y publicable, evitando calcos innecesarios.
  - «Hijos» se emplea para τέκνα por su amplitud natural en español.
  - La nota [a] se ancla en «estamos bien» y recoge alternativas léxicas reales preservadas por el audit trail.
