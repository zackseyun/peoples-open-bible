translation:
  language: es
  text: 'Porque dijo[a]: «Adelantémonos a él haciendo la paz con él, antes de que se alíe con Alejandro contra nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que se una a Alejandro contra nosotros». El griego dice literalmente «antes de que se ponga con Alejandro contra nosotros», un giro idiomático de alineación política.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν γάρ
  english_pob_choice: For he said
  chosen_spanish: Porque dijo
  alternatives_spanish:
  - Pues dijo
  - Y dijo
  lexicon: LSJ
  rationale: γάρ introduce la explicación del motivo; en español ‘porque’ comunica mejor la relación causal que un simple ‘pues’ en este contexto narrativo.
- source_word: Προφθάσωμεν
  english_pob_choice: Let us get ahead of him
  chosen_spanish: Acerquémonos a él
  alternatives_spanish:
  - Anticipémoslo
  - Seamos los primeros
  lexicon: LSJ
  rationale: El verbo hortatorio expresa adelantarse estratégicamente. En español, ‘acercarnos a él’ con el matiz añadido por el resto de la cláusula conserva la intención diplomática sin sonar forzado; se mantiene la idea de actuar antes que él.
- source_word: τοῦ εἰρηνεῦσαι
  english_pob_choice: by making peace
  chosen_spanish: haciendo paz
  alternatives_spanish:
  - para hacer paz
  - al hacer paz
  lexicon: LSJ
  rationale: El infinitivo articular expresa el medio o acción por la que se adelantan; ‘haciendo paz’ reproduce esa función de manera natural y mantiene el sentido diplomático de εἰρηνεύω.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a su favor
  - en acuerdo con él
  lexicon: LSJ
  rationale: Preposición estándar de compañía/relación; ‘con él’ es la correspondencia directa y clara.
- source_word: πρὶν ἢ
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes que
  - previo a que
  lexicon: LSJ
  rationale: Introduce una acción temida que ocurra previamente; ‘antes de que’ es la forma más natural y precisa en español.
- source_word: θεῖναι αὐτὸν μετὰ Ἀλεξάνδρου
  english_pob_choice: he makes common cause with Alexander
  chosen_spanish: se alíe con Alejandro
  alternatives_spanish:
  - se ponga con Alejandro
  - se una a Alejandro
  lexicon: LSJ
  rationale: τίθημι con μετά expresa colocarse en asociación política; el inglés POB optó por un equivalente idiomático. En español, ‘se alíe con’ conserva el valor político de alianza sin perder la tensión del griego.
- source_word: καθʼ ἡμῶν
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - en nuestra contra
  - en oposición a nosotros
  lexicon: LSJ
  rationale: κατά con genitivo indica hostilidad dirigida al grupo del hablante; ‘contra nosotros’ es la forma más directa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la frase a un inglés más natural ('by making peace') sin alterar el sentido del griego. La versión española adopta una solución igualmente natural, evitando calcos rígidos y conservando el matiz estratégico y político del pasaje.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se evita traducir mecánicamente el idiomático θεῖναι con una construcción extraña en español; se expresa mediante 'se alíe con'.
  - La nota [a] está anclada exactamente en la frase correspondiente del texto para cumplir la trazabilidad textual.
