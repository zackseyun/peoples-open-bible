revisions:
- from: ¿No he sido enviado contra ti por Yahvé, el Dios? Porque mi guerra está en el Éufrates[a], y ahora Yahvé está conmigo, y Yahvé está conmigo, urgéndome[b]. Apártate, y no te pongas contra Yahvé.
  to: ¿No he sido enviado contra ti por Yahvé Dios? Porque mi guerra es junto al Éufrates[a], y ahora Yahvé está conmigo, y Yahvé está conmigo, apremiándome[b]. Apártate, y no te opongas a Yahvé.
  rationale: Se corrige un calco poco natural ('el Dios'), se mejora la expresión de la localización de la campaña, se sustituye un participio español poco idiomático por uno más natural, y se reubica la nota [b] para que corresponda al término griego correcto. Los cambios son menores y no alteran la decisión exegética básica del borrador.
