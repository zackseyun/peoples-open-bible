translation:
  language: es
  text: Oigan esto, sacerdotes; presten atención, casa de Israel; y escuchen, casa del rey. Porque el juicio es para ustedes[a], pues han sido un lazo en Mispá[b] y una red tendida sobre Tabor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Porque el juicio es contra ustedes». El hebreo es compacto y permite leer la frase como concerniente a ellos o dirigida contra ellos.'
    reason: alternative_reading
  - marker: b
    text: Mispá y Tabor son nombres de lugares; aquí evocan sitios conocidos de Israel asociados con la imagen de captura.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan
  lexicon: HALOT
  rationale: Se conserva el imperativo profético de convocatoria. En español, «Oigan» mantiene un tono directo y natural, con valor de llamada pública, sin volverlo demasiado coloquial.
- source_word: הַקְשִׁיבוּ
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - escuchen atentamente
  - presten oído
  lexicon: HALOT
  rationale: El segundo verbo intensifica la exhortación a escuchar. «Presten atención» distingue bien esta intensificación en español contemporáneo y evita repetir exactamente el primer imperativo.
- source_word: הַאֲזִינוּ
  english_pob_choice: give ear
  chosen_spanish: escuchen
  alternatives_spanish:
  - dense oído
  - atiendan
  lexicon: HALOT
  rationale: El tercer imperativo conserva el crescendo retórico con una fórmula natural en español. Aunque podría diferenciarse más, «escuchen» sigue siendo claro y solemne sin sonar artificial.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva y representativa del hebreo. «Casa de Israel» mantiene el paralelismo con «casa del rey».
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: house of the king
  chosen_spanish: casa del rey
  alternatives_spanish:
  - casa real
  - palacio del rey
  lexicon: HALOT
  rationale: La forma literal preserva el paralelismo formal con «casa de Israel» y no adelanta una interpretación institucional más específica que el hebreo no obliga a fijar.
- source_word: כִּי לָכֶם הַמִּשְׁפָּט
  english_pob_choice: For the judgment is for you
  chosen_spanish: Porque el juicio es para ustedes
  alternatives_spanish:
  - Porque el juicio es contra ustedes
  - Porque a ustedes les corresponde el juicio
  lexicon: HALOT
  rationale: Se mantiene la concisión ambigua del hebreo y de la POB inglesa. «Juicio» reproduce el campo judicial de מִשְׁפָּט; «para ustedes» deja abierta la tensión entre pertenencia y dirección adversa que el contexto resuelve.
- source_word: מִּשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - justicia
  - sentencia
  lexicon: HALOT
  rationale: En este contexto profético, la referencia es al proceso/veredicto judicial en clave acusatoria. «Juicio» en español conserva esa amplitud mejor que una reducción a «sentencia».
- source_word: פַח
  english_pob_choice: trap
  chosen_spanish: lazo
  alternatives_spanish:
  - trampa
  - trampa de caza
  - snare
  lexicon: HALOT
  rationale: «Lazo» mantiene la imagen de captura y funciona bien con el paralelismo poético. Es ligeramente más literario que «trampa», pero sigue siendo transparente y bíblicamente comprensible.
- source_word: לְמִצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mispá
  alternatives_spanish:
  - en Mizpá
  - para Mispá
  lexicon: HALOT
  rationale: Se translitera el nombre propio como topónimo bíblico. Se prefirió «Mispá» para aproximar mejor la vocalización hispana tradicional del hebreo, manteniendo la referencia geográfica.
- source_word: רֶשֶׁת פְּרוּשָׂה
  english_pob_choice: a net spread out
  chosen_spanish: una red tendida
  alternatives_spanish:
  - una red extendida
  - una red desplegada
  lexicon: HALOT
  rationale: «Tendida» reproduce con naturalidad la imagen de una red colocada para atrapar. Conserva la vividez del participio sin añadir matices inexistentes.
- source_word: עַל תָּבוֹר
  english_pob_choice: upon Tabor
  chosen_spanish: sobre Tabor
  alternatives_spanish:
  - encima de Tabor
  - en Tabor
  lexicon: HALOT
  rationale: «Sobre» preserva el valor espacial elevado del hebreo y encaja con la metáfora de la red extendida. El nombre se translitera como topónimo.
theological_decisions:
- issue: Alcance de כִּי לָכֶם הַמִּשְׁפָּט
  english_pob_reading: The phrase can mean either that judgment pertains to them or is directed against them; the POB preserves this compactness as 'For the judgment is for you.'
  chosen_spanish_reading: «Porque el juicio es para ustedes» conserva la misma compacta ambigüedad, con el contexto inmediato inclinando la frase hacia una acusación judicial adversa.
  alternative_spanish_readings:
  - Porque el juicio es contra ustedes
  - Porque a ustedes les corresponde el juicio
  rationale: La frase hebrea es breve y tensa; no conviene resolverla de manera excesiva en la línea principal. El contexto de reproche y las imágenes de trampa/red justifican leerla como juicio condenatorio, sin perder la posibilidad formal de que el hebreo diga solo que el asunto judicial les concierne.
  doctrine_reference: Juicio divino / responsabilidad del liderazgo
- issue: Identidad y función de los grupos interpelados
  english_pob_reading: The verse addresses priests, Israel, and the royal house as those liable to divine judgment.
  chosen_spanish_reading: 'La traducción conserva los tres destinatarios como sujetos de advertencia y responsabilidad: sacerdotes, casa de Israel y casa del rey.'
  alternative_spanish_readings:
  - '...como destinatarios de un litigio divino'
  - '...como acusados por Dios'
  rationale: El hebreo organiza una llamada profética escalonada hacia los líderes religiosos, el pueblo y la corte real. Mantener esa estructura ayuda a que el peso del juicio quede en el texto, sin convertir la frase en una paráfrasis doctrinal.
  doctrine_reference: Responsabilidad corporativa del pacto
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no hubo revisiones aplicadas en el último pase. La versión española preserva la triple llamada a escuchar, la ambigüedad breve de כִּי לָכֶם הַמִּשְׁפָּט y la imaginería de trampa/red con topónimos transliterados.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «Juicio» conserva el valor judicial de מִשְׁפָּט sin convertirlo en mera 'sentencia'.
  - Se mantuvo el paralelismo formal entre «casa de Israel» y «casa del rey».
  - Los topónimos se transliteran para preservar la referencia geográfica y el efecto retórico del texto.
