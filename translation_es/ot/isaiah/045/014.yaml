base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/014.yaml
  text: 'Thus says Yahweh: The wealth of Egypt and the merchandise of Cush and the Sabeans[a], men of stature, will pass over to you and will be yours; they will walk behind you, they will pass over in chains; they will bow down to you, they will pray to you: ‘Surely God is in you, and there is no other[b]; there is no other God.’'
  footnotes:
  - marker: a
    text: Or 'they will make supplication to you.' The Hebrew verb can denote prayer or earnest entreaty.
    reason: lexical_alternative
  - marker: b
    text: '''Cush'' is the Hebrew place-name, traditionally rendered ''Ethiopia'' in some English versions.'
    reason: cultural_note
