  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La decisión sobre ἐνεφυσιώθησαν puede mantenerse como «imbuidos» con nota explicativa. Conviene ajustar la preposición a «en las palabras» para alinearse mejor con el griego y con la justificación léxica documentada.
