translation:
  language: es
  text: ¿Se toma de él madera para hacer algo? ¿O toman de él una clavija para colgar en ella cualquier objeto[a][b][c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacer algo para trabajo» / «para cualquier tarea útil». El hebreo לַעֲשׂוֹת לִמְלָאכָה enfatiza la utilidad práctica.'
    reason: lexical_alternative
  - marker: b
    text: «Clavija» también podría verterse «estaca» o «clavo», pero el sentido es un soporte fijo del que se cuelgan objetos.
    reason: lexical_alternative
  - marker: c
    text: «Objeto» traduce un término amplio que puede referirse a un artículo, implemento, utensilio o recipiente, no solo a una vasija.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֻקַּח
  english_pob_choice: Is ... taken
  chosen_spanish: ¿Se toma ...
  alternatives_spanish:
  - ¿Puede tomarse ...
  - ¿Se podría tomar ...
  lexicon: HALOT
  rationale: La forma hebrea es una pregunta retórica pasiva; en español, el pasivo con 'se' conserva mejor la naturalidad y el valor interrogativo sin añadir elementos ajenos al texto.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de esto
  - de esa vid
  lexicon: HALOT
  rationale: El pronombre remite a la vid/ madera del contexto previo. 'De él' mantiene la referencia anafórica sin explicitar más de lo que el verso dice.
- source_word: עֵץ
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leño
  - madera de la vid
  lexicon: HALOT
  rationale: En este contexto no se trata de un árbol vivo sino de material aprovechable; 'madera' es el equivalente natural y preciso en español.
- source_word: לַעֲשׂוֹת לִמְלָאכָה
  english_pob_choice: to make anything
  chosen_spanish: para hacer algo
  alternatives_spanish:
  - para hacer algo útil
  - para hacer alguna obra
  lexicon: HALOT
  rationale: La expresión hebrea apunta a fabricar algo para un uso práctico, pero la revisión inglesa retiró 'useful' por no estar explícito. 'Para hacer algo' conserva la amplitud literal sin añadir calificación.
- source_word: אִם
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O si
  - ¿O acaso
  lexicon: HALOT
  rationale: Aquí introduce la alternativa retórica paralela; en español funciona mejor como segunda pregunta encabezada por '¿O', sin forzar una condicional explícita.
- source_word: יָתֵד
  english_pob_choice: a peg
  chosen_spanish: una estaca
  alternatives_spanish:
  - un clavo
  - un poste
  lexicon: HALOT
  rationale: '''Yatéd'' puede ser ''peg'', ''stake'' o ''nail''. En español, ''estaca'' comunica bien una pieza fija de soporte, sin reducirlo indebidamente a un clavo pequeño.'
- source_word: לִתְלוֹת
  english_pob_choice: to hang
  chosen_spanish: para colgar
  alternatives_spanish:
  - para suspender
  - para colgar de
  lexicon: HALOT
  rationale: Infinitivo simple y directo, plenamente natural en español, que reproduce la función del soporte.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - de ella
  lexicon: HALOT
  rationale: La referencia inmediata es la estaca; por concordancia natural en español, 'en ella' evita una estructura rígida y expresa la relación de soporte.
- source_word: כָּל כֶּלִי
  english_pob_choice: every vessel
  chosen_spanish: todo vaso
  alternatives_spanish:
  - todo utensilio
  - todo recipiente
  - todo objeto
  lexicon: HALOT
  rationale: כֶּלִי es un término amplio para artículo, implemento o recipiente. 'Vaso' es una posibilidad tradicional en español bíblico, pero aquí se elige por su amplitud concreta; puede abarcar recipiente o utensilio según contexto.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: se evitó introducir ''útil'' o ''de cualquier clase'' porque no están explícitos en el texto fuente, y se mantuvo la estructura retórica de dos preguntas paralelas con una segunda opción introducida por ''¿O''.'
  spanish_consistency_notes:
  - Se mantuvo 'madera' para עֵץ por coherencia con el contexto material del verso.
  - Se evitó 'SEÑOR' o terminología teológica no pertinente, ya que el verso no contiene nombres divinos.
  - '''Vaso'' se usa en sentido amplio, no litúrgico, para reflejar כֶּלִי sin reducir su rango semántico.'
