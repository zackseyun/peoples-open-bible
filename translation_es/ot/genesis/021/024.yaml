translation:
  language: es
  text: 'Y Abraham dijo: «Juro[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Juraré» o «haré juramento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración de manera simple. «Y ... dijo» conserva esa secuencia sin añadir matices discursivos no exigidos por el hebreo.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abram
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se mantiene en su forma habitual en español. Aquí no hay variante textual ni razón contextual para «Abram».
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis o explicitud antes del verbo. En español, «Yo» expresa esa presencia del sujeto de forma natural; «yo mismo» sería más marcado de lo que pide el contexto.
- source_word: אִשָּׁבֵעַ
  english_pob_choice: I swear it
  chosen_spanish: juro
  alternatives_spanish:
  - juro por mí mismo
  - hago un juramento
  - voy a jurar
  lexicon: HALOT
  rationale: El nifal de שבע expresa jurar o tomar un juramento. Dado que el contexto es una respuesta solemne de compromiso, «juro» comunica bien el valor performativo del hebreo y evita imponer un futuro que el texto hebreo no requiere.
theological_decisions:
- issue: Respuesta de juramento y fuerza performativa del verbo
  english_pob_reading: I swear it.
  chosen_spanish_reading: Yo juro.
  alternative_spanish_readings:
  - Yo lo juro.
  - Hago juramento.
  rationale: El hebreo presenta una declaración juratoria breve. «Yo juro» mantiene la fuerza de compromiso inmediato sin sobrecargar con un objeto implícito que el texto no expresa. «Yo lo juro» también es posible, pero el objeto no está explícito en el hebreo.
  doctrine_reference: Uso bíblico del juramento; no implica una formulación doctrinal especial.
translation_notes:
  revision_awareness: 'El inglés POB revisó su propia redacción de «I will swear» a «I swear it» para reflejar mejor el hebreo como respuesta juratoria directa. La línea española sigue esa revisión: prefiere una forma presente/performatica («juro») en vez de un futuro («juraré»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en este proyecto, pero no aparece en este versículo.
  - Se conserva el nombre «Abraham» por convención onomástica española.
  - La puntuación con dos puntos antes de la cita directa es estilísticamente natural en español bíblico moderno.
