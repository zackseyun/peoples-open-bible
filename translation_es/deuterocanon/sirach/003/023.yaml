translation:
  language: es
  text: No indagues[a] en lo que está más allá de ti[b], porque lo que es demasiado grande para ti se te ha mostrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No investigues cosas mayores que tú». El verbo hebreo es difícil, y el paralelo griego dice: «No seas demasiado curioso en tus muchas obras».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también podría leerse: «porque has visto muchas cosas más allá de ti»; pero el paralelo griego respalda: «lo que es demasiado grande para ti se te ha mostrado».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹתֵר מִמְּךָ / ἐν τοῖς περισσοῖς τῶν ἔργων σου
  english_pob_choice: what is beyond you / do not be over-curious in your many works
  chosen_spanish: lo que está más allá de ti / no te ocupes de lo que está más allá de ti
  alternatives_spanish:
  - lo que es demasiado grande para ti
  - no investigues lo que excede tu medida
  - no te metas en asuntos que te sobrepasan
  lexicon: HALOT; Greek parallel
  rationale: La expresión hebrea y el paralelo griego apuntan a lo que rebasa el ámbito propio de una persona. "Más allá de ti" conserva esa idea de excedencia y límite; "te ocupes" refleja la prohibición de meterse en una indagación excesiva sin volver el texto técnico o duro en español.
- source_word: אַל תַּמֵּר / μὴ περιεργάζου
  english_pob_choice: do not probe into
  chosen_spanish: no te ocupes
  alternatives_spanish:
  - no investigues
  - no indagues
  - no te metas
  lexicon: HALOT; Greek περιεργάζομαι
  rationale: El verbo hebreo es difícil, y el griego apoya la idea de una curiosidad excesiva o de una búsqueda indebida. "No te ocupes" comunica la advertencia contra el afán inquisitivo, con un registro natural en español y suficientemente fuerte para el contexto sapiencial.
- source_word: כִּי / γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT; Greek γάρ
  rationale: La conjunción introduce la razón de la advertencia. "Porque" expresa con claridad la base explicativa sin perder la concisión del original.
- source_word: רַב מִמְּךָ / πλείονα... συνέσεως
  english_pob_choice: what is too great for you
  chosen_spanish: lo que es demasiado grande para ti
  alternatives_spanish:
  - lo que es mayor que tú
  - cosas demasiado grandes para ti
  - lo que te sobrepasa
  lexicon: HALOT; Greek πλείονα
  rationale: La frase indica asuntos que exceden la capacidad humana. "Demasiado grande para ti" conserva la comparación de exceso y suena idiomático en español, manteniendo el matiz sapiencial de límite.
- source_word: הָרְאֵיתָ / ὑπεδείχθη σοι
  english_pob_choice: has been shown to you
  chosen_spanish: te ha sido mostrado
  alternatives_spanish:
  - has visto
  - te fue mostrado
  - se te ha mostrado
  lexicon: HALOT; Greek ὑπεδείχθη
  rationale: 'La lectura griega favorece una idea pasiva: no solo se trata de algo visto por el lector, sino de algo ya expuesto o presentado por Dios. "Te ha sido mostrado" refleja bien ese pasivo y mantiene la tensión entre revelación suficiente y límite humano.'
theological_decisions:
- issue: Relación entre la lectura hebrea posible ('you have seen') y el pasivo griego ('has been shown to you')
  english_pob_reading: Hebrew could also be read, 'for you have seen many things beyond you,' but the Greek parallel supports, 'what is too great for you has been shown to you.'
  chosen_spanish_reading: porque lo que es demasiado grande para ti te ha sido mostrado
  alternative_spanish_readings:
  - porque tú has visto muchas cosas más allá de ti
  - porque has visto muchas cosas que te exceden
  rationale: 'Se sigue la línea que armoniza mejor con el paralelo griego, sin negar que la vocalización hebrea pueda sugerir una lectura activa. El pasivo conserva el sentido de advertencia sapiencial: hay límites reales para la investigación humana, pero también una revelación suficiente ya dada.'
  doctrine_reference: 'PHILOSOPHY.md: para Sirach, traducir desde el hebreo donde se conserva, usando el paralelo griego como entrada de traducción real cuando aclara la lectura.'
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del expediente y no introduce cambios sustanciales respecto del sentido ya auditado. Se conserva la tensión entre la posible lectura activa del hebreo y la lectura pasiva apoyada por el griego, expresándola en notas sin borrarla del texto principal.
  spanish_consistency_notes:
  - Se usa «te ha sido mostrado» para mantener el valor pasivo avalado por el griego.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque no aparece el Tetragrámaton en este versículo.
  - Se prefiere un español sobrio y contemporáneo, apto para lectura eclesial, sin paraphrasear más allá del alcance de las fuentes.
