translation:
  language: es
  text: No han cumplido el encargo de mis cosas santas, sino que han nombrado a otros para que cumplan mi encargo en mi santuario, para ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en lugar de ustedes", destacando que otros fueron designados para cumplir el encargo del santuario en su lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַרְתֶּם
  english_pob_choice: have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han mantenido
  - han observado
  lexicon: HALOT
  rationale: שׁמר en este contexto sacerdotal no es solo 'vigilar', sino cumplir fielmente una responsabilidad asignada. 'Han guardado' conserva el valor de custodia/observancia y encaja con la expresión de carga o encargo.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: charge
  chosen_spanish: la carga
  alternatives_spanish:
  - el encargo
  - la responsabilidad
  - el deber
  lexicon: HALOT
  rationale: En español, 'carga' puede expresar la idea de una obligación confiada; aquí mantiene el sentido cultual-administrativo del término sin volverlo excesivamente abstracto. Se conserva la relación con el deber sacerdotal más que con mera vigilancia física.
- source_word: קָדָשַׁי
  english_pob_choice: my holy things
  chosen_spanish: mis cosas santas
  alternatives_spanish:
  - mis cosas sagradas
  - mis cosas santas del santuario
  - mi cargo santo
  lexicon: HALOT
  rationale: La forma plural con sufijo puede abarcar objetos, asuntos o deberes sagrados. 'Mis cosas santas' preserva esa amplitud sin restringirlo solo a objetos materiales; 'cosas santas' es más natural en español que una calca como 'cosas sagradas' en este contexto.
- source_word: וַתְּשִׂימוּן
  english_pob_choice: have appointed
  chosen_spanish: han nombrado
  alternatives_spanish:
  - han puesto
  - han designado
  - han establecido
  lexicon: HALOT
  rationale: שׂים aquí tiene la fuerza funcional de asignar personas a un servicio. 'Han nombrado' transmite bien la idea de designación para una función, con naturalidad en español.
- source_word: לְשֹׁמְרֵי
  english_pob_choice: to keep
  chosen_spanish: para que guardaran
  alternatives_spanish:
  - para guardar
  - como guardianes de
  - para custodiar
  lexicon: HALOT
  rationale: El participio de שׁמר describe a los que ejercen custodia. En español, la subordinada 'para que guardaran' fluye mejor y preserva la función asignada sin repetir mecánicamente 'guardar carga' de forma forzada.
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: charge
  chosen_spanish: la carga
  alternatives_spanish:
  - mi encargo
  - mi responsabilidad
  - mi deber
  lexicon: HALOT
  rationale: Se mantiene la misma solución léxica para conservar coherencia terminológica. La repetición de 'carga' refleja la repetición del hebreo y el carácter de encargo cultual confiado por Dios.
- source_word: בְּמִקְדָּשִׁי
  english_pob_choice: in my sanctuary
  chosen_spanish: en mi santuario
  alternatives_spanish:
  - en mi templo
  - en mi lugar santo
  lexicon: HALOT
  rationale: '''Santuario'' es el término más preciso para מִקְדָּשׁ en este contexto de servicio sacerdotal y recinto sagrado, y es idiomático en español bíblico contemporáneo.'
theological_decisions:
- issue: Alcance de 'mis cosas santas'
  english_pob_reading: A broad reference to the sacred responsibilities and holy matters of the sanctuary
  chosen_spanish_reading: Una referencia amplia a las cosas, asuntos y deberes sagrados del santuario
  alternative_spanish_readings:
  - Una referencia solo a objetos sagrados concretos
  - Una referencia exclusivamente al oficio santo
  rationale: El hebreo es deliberadamente amplio y no debe reducirse. 'Mis cosas santas' conserva esa amplitud y permite incluir tanto objetos como responsabilidades rituales, sin resolver la tensión semántica que el texto deja abierta.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Sentido de לָכֶם
  english_pob_reading: for you / instead of you
  chosen_spanish_reading: en lugar de ustedes
  alternative_spanish_readings:
  - para ustedes
  - por ustedes
  rationale: 'El hebreo permite la idea de sustitución funcional: otros fueron puestos a cumplir el encargo en su lugar. ''En lugar de ustedes'' expresa mejor esa tensión que un simple ''para ustedes'', aunque el sentido de beneficio/relación también queda implicado.'
  doctrine_reference: Lexical decision on prepositional nuance; preserve the documented alternative reading.
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios; se conservó el juicio del POB inglés sobre la amplitud de מִשְׁמֶרֶת/קָדָשַׁי y la alternativa de לָכֶם ('for you' / 'instead of you').
  spanish_consistency_notes:
  - Se mantuvo una terminología coherente con 'guardado/guardar' para שׁמר y 'carga' para מִשְׁמֶרֶת/מִשְׁמַרְתִּי.
  - '''Santuario'' se usa de forma consistente para מִקְדָּשׁ.'
  - La nota al pie preserva la lectura alternativa de sustitución sin eliminar la lectura principal del texto.
