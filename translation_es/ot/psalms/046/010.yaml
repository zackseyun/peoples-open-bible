revisions:
- from: Hace cesar las guerras hasta el extremo de la tierra; rompe el arco y corta la lanza en dos; quema los carros[a] con fuego.
  to: Hace cesar las guerras hasta el extremo de la tierra; rompe el arco y corta la lanza en dos; quema las carretas[a] con fuego.
