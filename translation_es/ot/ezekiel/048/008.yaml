base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/048/008.yaml
  text: 'Along the border of Judah[a], from the east side to the west side, shall be the contribution that you shall set apart: twenty-five thousand in width, and in length like one of the portions, from the east side to the west side[c][b]; and the sanctuary shall be in its midst.'
  footnotes:
  - marker: a
    text: Or 'the offering' or 'the district set apart.' The Hebrew term refers to a portion specially set apart for holy use.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the east edge to the seaward edge'; 'west side' expresses the idiomatic directional sense.
    reason: lexical_alternative
  - marker: c
    text: That is, like one of the tribes' allotted land portions in length.
    reason: cultural_note
