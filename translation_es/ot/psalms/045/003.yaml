translation:
  language: es
  text: Eres más hermoso que los hijos de los hombres[a]; gracia[b] es derramada sobre tus labios; por tanto, Dios te ha bendecido para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de אדם», una expresión poética que compara al rey con otros seres humanos.
    reason: cultural_note
  - marker: b
    text: También puede entenderse como «favor» o «graciosidad es derramada sobre tus labios».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפְיָפִיתָ
  english_pob_choice: You are more beautiful
  chosen_spanish: Eres más hermoso
  alternatives_spanish:
  - Eres más bello
  - Eres más hermoso de aspecto
  lexicon: HALOT
  rationale: El hebreo expresa una belleza intensiva/comparativa. En español, «más hermoso» conserva la comparación con un registro digno y natural. «Más bello» también sería válido, pero «hermoso» suena más fluido en este contexto poético.
- source_word: מִבְּנֵי אָדָם
  english_pob_choice: than the sons of men
  chosen_spanish: que los hijos de los hombres
  alternatives_spanish:
  - que los hijos de los seres humanos
  - que los hombres
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «de/entre los hijos de אדם». Se conserva el paralelismo poético con «hijos de los hombres» para no neutralizar el rasgo idiomático y masculino del original, siguiendo la decisión auditada en inglés.
- source_word: הוּצַק
  english_pob_choice: is poured
  chosen_spanish: fue derramada
  alternatives_spanish:
  - se derrama
  - ha sido derramada
  lexicon: HALOT
  rationale: El pasivo de יצק sugiere una imagen de algo vertido abundantemente. En español, «fue derramada» mantiene la metáfora y refleja bien el perfecto pasivo del hebreo. «Se derrama» sería más fluido, pero diluye el matiz de acción recibida.
- source_word: חֵן
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - graciosidad
  - encanto
  lexicon: HALOT
  rationale: En este verso, unido a la imagen de los labios, חֵן apunta a habla grata y favorecida. «Gracia» preserva el rango semántico religioso y estético que la POB inglesa quiso mantener. «Favor» es posible, pero en español aquí suena algo más abstracto.
- source_word: בְּשְׂפְתוֹתֶיךָ
  english_pob_choice: upon your lips
  chosen_spanish: sobre tus labios
  alternatives_spanish:
  - en tus labios
  - en tus labios se ha derramado
  lexicon: HALOT
  rationale: La preposición hebrea permite una imagen locativa/relacional. «Sobre tus labios» conserva la metáfora de algo depositado encima de ellos y suena más natural que calcar «en».
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Conector inferencial formal y claro en español bíblico contemporáneo. «Por tanto» mantiene la lógica poética entre la descripción del rey y la bendición divina.
- source_word: בֵּרַכְךָ אֱלֹהִים
  english_pob_choice: God has blessed you
  chosen_spanish: Dios te ha bendecido
  alternatives_spanish:
  - Dios te bendijo
  - Dios te bendecirá
  lexicon: HALOT
  rationale: Se sigue la lectura sintáctica en la que אֱלֹהִים es sujeto. El pretérito perfecto compuesto expresa en español el resultado vigente de la bendición. «Bendijo» también sería posible, pero el compuesto encaja mejor con el sentido de estado permanente.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es el equivalente más natural y claro en español actual para la duración indefinida de לְעוֹלָם. Mantiene el tono solemne sin arcaizar.
theological_decisions:
- issue: 'Lectura de אֱלֹהִים en la cláusula final: sujeto o vocativo'
  english_pob_reading: 'Subject: ''therefore God has blessed you forever.'''
  chosen_spanish_reading: 'Sujeto: «por tanto, Dios te ha bendecido para siempre».'
  alternative_spanish_readings:
  - 'Vocativo: «por tanto, oh Dios, te ha bendecido para siempre»'
  - 'Vocativo armonizado con el siguiente verso: «por tanto, oh Dios, tu Dios te ha bendecido para siempre»'
  rationale: La sintaxis inmediata del hebreo favorece tomar אֱלֹהִים como sujeto de בֵּרַכְךָ. En español se mantiene esa lectura para no importar la formulación del verso siguiente ni resolver anticipadamente la tensión cristológica del salmo. Así se preserva la primacía del texto fuente y la ambigüedad reconocida por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica donde el original lo permite; no forzar una armonización interversicular.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «sons of man» a «sons of men» por naturalidad, sin cambiar el sentido. La versión española sigue esa decisión con «hijos de los hombres», manteniendo la comparación humana y el registro poético. No se observan otras revisiones sustantivas que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Dios» y no «Señor» porque el hebreo tiene אֱלֹהִים como sujeto explícito en la lectura adoptada.
  - Se mantiene «gracia» para חֵן, en línea con la POB inglesa y con el contexto de habla favorecida.
  - Se conserva el paralelismo poético sin suavizar la imagen de comparación humana.
  - La puntuación separa claramente la bendición final para reflejar la lógica inferencial del hebreo.
