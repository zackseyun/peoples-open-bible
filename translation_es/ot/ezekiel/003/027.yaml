revisions:
- from: 'Pero cuando yo hable contigo[a], abriré tu boca, y dirás a ellos: “Así ha dicho el Señor Yahvé: El que oye, oiga; y el que se detiene, deténgase[b], porque ellos son una casa rebelde.”'
  to: 'Pero cuando yo hable contigo[a], abriré tu boca, y les dirás: «Así dice el Señor Yahvé: El que oye, oiga; y el que se abstiene, absténgase, porque ellos son una casa rebelde[b]».'
  rationale: 'Se corrigen tres puntos: «Así ha dicho» a «Así dice» para la fórmula profética; «dirás a ellos» a «les dirás» por español más natural; y «se detiene, deténgase» a «se abstiene, absténgase» para reflejar mejor חדל y seguir la línea menos interpretativa documentada en la auditoría inglesa. Se conserva «Señor Yahvé» y «casa rebelde».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura general del hebreo: contraste temporal inicial, apertura de la boca, encargo profético y cierre con la fórmula fija «casa rebelde». También mantiene adecuadamente «Señor Yahvé» para אֲדֹנָי יְהוִה según la política del proyecto. Sin embargo, dos elecciones no reflejan bien ni el hebreo ni la auditoría inglesa: «Así ha dicho» debilita el valor formular presente de כֹּה אָמַר, que aquí debe ser «Así dice»; y «se detiene, deténgase» para וְהֶחָדֵל יֶחְדָּל suena menos preciso y menos natural que «se abstiene, absténgase» o «se rehúsa, rehúsese». Dado el pase de revisión inglés, conviene seguir la línea menos interpretativa de ‘refrains’, no la más fuerte de ‘refuses’.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta algunas durezas evitables. «Dirás a ellos» es gramaticalmente posible pero poco natural; «les dirás» es claramente mejor en español bíblico moderno sin pérdida de fidelidad. «Así ha dicho» suena más a cita retrospectiva que a fórmula profética viva. «El que se detiene, deténgase» resulta ambiguo en español: puede sugerir simplemente parar físicamente, no abstenerse o desistir de responder. La redacción revisada mejora naturalidad y precisión sin parafrasear.'
  glossary_alignment: Alineación buena en «Yahvé», «casa rebelde», «Dios/Señor» y mantenimiento del singular representativo. Se debe ajustar la fórmula profética a «Así dice» y el par חדל a una opción española más nítida y menos ambigua; «se abstiene, absténgase» preserva mejor el matiz de cesar/refrain que «se detiene».
  issues:
  - severity: medium
    issue: «Así ha dicho» para כֹּה אָמַר
    rationale: 'La fórmula profética estándar en este contexto funciona mejor como presente declarativo: «Así dice». «Ha dicho» introduce un matiz perfectivo menos acorde con la cadencia profética y con la auditoría inglesa.'
  - severity: medium
    issue: «y dirás a ellos» suena poco idiomático
    rationale: Aunque calca de cerca el hebreo, en español natural y digno corresponde «y les dirás». No altera el sentido ni añade interpretación.
  - severity: medium
    issue: «el que se detiene, deténgase» es ambiguo y poco preciso para וְהֶחָדֵל יֶחְדָּל
    rationale: Puede entenderse como ‘pararse’ físicamente. El contexto y la revisión inglesa favorecen una idea de abstenerse/desistir. «El que se abstiene, absténgase» comunica mejor el valor léxico sin endurecerlo a ‘rehúsa’.
  revised_spanish_text: 'Pero cuando yo hable contigo[a], abriré tu boca, y les dirás: «Así dice el Señor Yahvé: El que oye, oiga; y el que se abstiene, absténgase, porque ellos son una casa rebelde[b]».'
  revised_footnotes:
  - marker: a
    text: O, «cuando hable contigo». El hebreo puede entenderse temporalmente («cuando») y la construcción también admite el matiz «hable contigo / te hable».
    reason: alternative_reading
  - marker: b
    text: Hebreo «casa rebelde», expresión recurrente de Ezequiel para el pueblo de Israel en su rebeldía obstinada.
    reason: cultural_note
  revision_rationale: 'Se corrigen tres puntos: «Así ha dicho» a «Así dice» para la fórmula profética; «dirás a ellos» a «les dirás» por español más natural; y «se detiene, deténgase» a «se abstiene, absténgase» para reflejar mejor חדל y seguir la línea menos interpretativa documentada en la auditoría inglesa. Se conserva «Señor Yahvé» y «casa rebelde».'
