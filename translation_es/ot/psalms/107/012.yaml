review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en lo principal: mantiene el sujeto divino implícito de וַיַּכְנַע, refleja בֶּעָמָל como medio de aflicción laboral, conserva כָּשְׁלוּ como ''tropezaron'' y traduce וְאֵין עֹזֵר con una cláusula existencial natural. Sin embargo, ''duro trabajo'' suena menos idiomático que ''trabajo duro'' o mejor ''trabajo forzado/penoso'' para este contexto, y la nota [a] se aparta del inglés al introducir ''afán'', que no representa bien עָמָל aquí. La nota [b] está mal formulada en español y repite de manera confusa ''su corazón''.'
  spanish_quality_summary: 'El texto base es legible, pero necesita pulido menor para sonar natural y preciso en español bíblico moderno. ''Así humilló su corazón'' funciona, aunque ''Así humilló su corazón con trabajo forzado'' mejora la naturalidad y el matiz opresivo. Las notas requieren corrección: [b] es torpe y poco clara; [a] contiene alternativas poco adecuadas; el orden [b][c] tras ''tropezaron'' es aceptable pero conviene mantener cada nota claramente anclada y redactada con buen español.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales se alinean con el POB: ''humilló'', ''corazón'' en singular colectivo, ''tropezaron'', y ''no hubo quien ayudara''. La única desviación relevante es el campo semántico de עָמָל en la nota española, donde ''afán'' debilita el sentido de labor penosa/aflicción documentado por el POB.'
  issues:
  - severity: medium
    issue: La expresión 'con duro trabajo' suena poco idiomática en español.
    rationale: Aunque comprensible, el orden natural en español sería 'con trabajo duro'; mejor aún, 'con trabajo forzado' o 'con trabajo penoso' capta el matiz opresivo de עָמָל en este contexto carcelario.
  - severity: medium
    issue: La nota [a] introduce alternativas mal ajustadas al sentido contextual de עָמָל.
    rationale: '''Afán'' en español suele sugerir empeño o ansiedad y no comunica bien labor opresiva. El inglés auditado ofrece ''through toil'' o ''with trouble''; en español convienen ''por medio de trabajo penoso'', ''con fatiga'' o ''con aflicción''.'
  - severity: high
    issue: La nota [b] está mal redactada y resulta confusa.
    rationale: 'Dice: ''Hebreo: «su corazón», con singular colectivo para «su corazón» o «su corazón interior»'', lo cual repite la misma frase y no explica bien la alternativa. Debe aclarar que el hebreo usa singular colectivo con sufijo plural, y que también puede entenderse como ''sus corazones'' o ''su interior''.'
  revised_spanish_text: Así humilló su corazón[a] con trabajo forzado; tropezaron[c][b], y no hubo quien ayudara.
  revised_footnotes:
  - marker: a
    text: O «por medio de trabajo penoso» o «con aflicción»; el hebreo עָמָל puede denotar labor pesada, fatiga o miseria.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su corazón», con singular «corazón» usado colectivamente.
    reason: lexical_alternative
  - marker: c
    text: O «cayeron»; el verbo puede denotar tropezar o caer.
    reason: lexical_alternative
