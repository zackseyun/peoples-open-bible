translation:
  language: es
  text: Les hablarás todas estas palabras[a], pero no te escucharán; los llamarás, pero no te responderán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no te oirán» / «no te harán caso». El verbo hebreo שׁמע puede significar oír, escuchar o atender, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ
  english_pob_choice: You shall speak
  chosen_spanish: Tú hablarás
  alternatives_spanish:
  - Y hablarás
  - Deberás hablar
  lexicon: HALOT
  rationale: La forma verbal funciona en contexto profético como mandato o anuncio futuro. «Hablarás» conserva esa fuerza injuntiva de manera natural en español; se añade «Tú» para claridad y ritmo, sin necesidad de volverlo más interpretativo que el hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - contra ellos
  - para ellos
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección hacia el destinatario del habla. «A ellos» reproduce esa relación sin introducir un matiz adversativo que el contexto inmediato no exige.
- source_word: אֶת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos asuntos
  lexicon: HALOT
  rationale: En un contexto de proclamación profética, דְּבָרִים se entiende mejor como «palabras» que como «cosas» o «asuntos». El plural «palabras» preserva el contenido verbal que Jeremías debe comunicar.
- source_word: וְלֹא יִשְׁמְעוּ אֵלֶיךָ
  english_pob_choice: but they will not listen to you
  chosen_spanish: pero no te escucharán
  alternatives_spanish:
  - pero no te oirán
  - pero no harán caso de ti
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, escuchar y obedecer. «Escucharán» mantiene el sentido auditivo básico y deja abierta la implicación de no hacer caso, que el contexto ya sugiere. Se evita «obedecerán» porque estrecharía el rango semántico sin necesidad.
- source_word: וְקָרָאתָ
  english_pob_choice: you shall call
  chosen_spanish: tú clamarás
  alternatives_spanish:
  - tú llamarás
  - tú proclamarás
  lexicon: HALOT
  rationale: קרא aquí expresa llamar o clamar hacia alguien. «Clamarás» comunica mejor en español la acción insistente dirigida a ellos en este paralelo, sin convertirla en una proclamación más técnica de lo que permite el hebreo.
- source_word: וְלֹא יַעֲנוּכָה
  english_pob_choice: but they will not answer you
  chosen_spanish: pero no te responderán
  alternatives_spanish:
  - pero no te contestarán
  - y no te responderán
  lexicon: HALOT
  rationale: ענה en este uso significa responder a una llamada. «Responderán» conserva el paralelismo con «clamarás» y la relación interpersonal del verso; «contestarán» es posible, pero menos solemne.
theological_decisions:
- issue: 'La fuerza de שׁמע: escuchar, oír o obedecer'
  english_pob_reading: The Hebrew verb שׁמע can denote hearing, listening, or heeding depending on context.
  chosen_spanish_reading: «Escucharán» mantiene el sentido básico de oír con atención y deja implícita la falta de obediencia que el contexto ya sugiere.
  alternative_spanish_readings:
  - «no te oirán»
  - «no te harán caso»
  - «no te obedecerán»
  rationale: El verso describe primero la negativa a escuchar y luego la negativa a responder; en español conviene no resolver de antemano toda la tensión semántica de שׁמע en un solo verbo demasiado fuerte. «Escucharán» es suficientemente amplio para abarcar oír y prestar atención, sin perder naturalidad.
  doctrine_reference: Semántica bíblica de שׁמע; equivalencia funcional conservadora
translation_notes:
  revision_awareness: 'Se mantuvo la estructura paralela del hebreo: mandato de hablar, negativa a escuchar, mandato de clamar y negativa a responder. La redacción española sigue el audit trail inglés, pero ajusta el segundo miembro para evitar un calco rígido y conservar el paralelismo retórico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se traduce שׁמע con «escuchar» para mantener la ambigüedad auditiva/obediencial señalada en el audit trail.
  - Se mantiene el paralelismo verbal con «hablarás / clamarás» y «escucharán / responderán» para reflejar la repetición retórica del hebreo.
