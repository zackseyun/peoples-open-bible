  to: Ha redimido mi alma de pasar a la fosa[b][a], y mi vida verá la luz.
  rationale: Se ajusta שַׁחַת a «la fosa» para preservar la metáfora fuente y la decisión documentada de mantener «the pit» en el texto principal. Se corrige מֵעֲבֹר a «de pasar a» para reflejar el movimiento hacia la fosa en vez de tránsito por ella. Se simplifican y alinean las notas con el rastro inglés, manteniendo la alternativa léxica y la nota cultural sin sobreexplicación.
