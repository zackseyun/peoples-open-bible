  text: כְּ/צִנַּת שֶׁ֨לֶג בְּ/י֬וֹם קָצִ֗יר צִ֣יר נֶ֭אֱמָן לְ/שֹׁלְחָ֑י/ו וְ/נֶ֖פֶשׁ אֲדֹנָ֣י/ו יָשִֽׁיב־׀׃פ
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/025/013.yaml
  text: Like the coolness of snow on a harvest day is a faithful messenger to those who send him[b][a], for he refreshes the life of his masters.
  footnotes:
  - marker: a
    text: Or 'Like the cold of snow in harvest time.' The Hebrew image likely refers to refreshing coolness associated with snow, not snowfall damaging the harvest.
    reason: lexical_alternative
  - marker: b
    text: Or 'he restores the soul of his masters.'
    reason: lexical_alternative
