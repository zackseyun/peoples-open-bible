translation:
  language: es
  text: Los preciosos hijos de Sion, que valen su peso en oro fino[a]—¡cómo son tenidos por vasijas de barro[b], obra de manos de un alfarero!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estimados como oro fino», «comparables al oro fino» o «de gran valor como oro fino». La expresión hebrea puede destacar la valoración más que la imagen concreta de pesar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vasijas de cerámica» o «jarros de barro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי צִיּוֹן
  english_pob_choice: the sons of Zion
  chosen_spanish: los hijos de Sion
  alternatives_spanish:
  - los hijos varones de Sion
  - los hijos de la ciudad de Sion
  - la gente de Sion
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de Sion'. En español, 'hijos' conserva la filiación poética sin introducir una neutralización no exigida por el texto. 'Sons' en inglés se volvió aquí 'hijos' para mantener naturalidad y la imagen filial del lamento.
- source_word: הַיְקָרִים
  english_pob_choice: precious
  chosen_spanish: preciosos
  alternatives_spanish:
  - valiosos
  - honrados
  - preciados
  lexicon: HALOT
  rationale: El adjetivo expresa gran valor y estima. 'Preciosos' comunica tanto valor como afecto, en un tono adecuado para el lamento.
- source_word: הַמְסֻלָּאִים בַּפָּז
  english_pob_choice: worth their weight in fine gold
  chosen_spanish: de valor comparable al oro fino
  alternatives_spanish:
  - que valen su peso en oro fino
  - estimados como oro fino
  - comparables al oro fino
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza valoración elevada en relación con oro refinado. El español 'de valor comparable al oro fino' conserva la idea de comparación de valor sin forzar una imagen métrica que el hebreo puede sugerir pero no exigir de manera exclusiva.
- source_word: פָּז
  english_pob_choice: fine gold
  chosen_spanish: oro fino
  alternatives_spanish:
  - oro puro
  - oro refinado
  lexicon: HALOT
  rationale: פָּז designa oro refinado o de gran pureza. 'Oro fino' es una forma idiomática y sobria en español que conserva el registro poético.
- source_word: אֵיכָה
  english_pob_choice: how
  chosen_spanish: ¡cómo!
  alternatives_spanish:
  - ¡ay, cómo!
  - ¿cómo es que…?
  - ¡de qué manera!
  lexicon: HALOT
  rationale: En lamento, אֵיכָה introduce asombro doliente. La exclamación '¡cómo!' reproduce bien esa carga emotiva en español.
- source_word: נֶחְשְׁבוּ
  english_pob_choice: are regarded
  chosen_spanish: han sido tenidos por
  alternatives_spanish:
  - son considerados
  - han sido contados como
  - se los ha considerado
  lexicon: HALOT
  rationale: El nifal de חשׁב implica ser tenido o considerado como algo. 'Han sido tenidos por' preserva la pasiva y la evaluación implícita del texto.
- source_word: לְנִבְלֵי חֶרֶשׂ
  english_pob_choice: as earthen jars
  chosen_spanish: vasijas de barro
  alternatives_spanish:
  - vasijas de arcilla
  - vasijas de tierra cocida
  - jarros de barro
  lexicon: HALOT
  rationale: נִבְלֵי חֶרֶשׂ apunta a recipientes de material terroso/cerámico. 'Vasijas de barro' es claro y bíblicamente reconocible en español, sin perder la oposición con el oro fino. Se prefirió 'vasijas' para abarcar el sentido de recipientes y no limitarlo a un tipo específico de jarra.
- source_word: מַעֲשֵׂה יְדֵי יוֹצֵר
  english_pob_choice: the work of a potter’s hands
  chosen_spanish: obra de manos de un alfarero
  alternatives_spanish:
  - obra hecha por manos de alfarero
  - trabajo de las manos de un alfarero
  - hechura de un alfarero
  lexicon: HALOT
  rationale: La frase hebrea subraya la manufactura artesanal. 'Obra de manos de un alfarero' mantiene la concreción de 'manos' y el oficio del alfarero, con un español fluido y solemne.
theological_decisions:
- issue: Valoración y humillación contrastadas sin suavizar la degradación del lenguaje
  english_pob_reading: The verse contrasts the precious, highly valued sons of Zion with their being regarded as earthen jars.
  chosen_spanish_reading: El verso contrasta a los hijos preciosos de Sion, de gran valor, con el hecho de haber sido tratados como vasijas de barro.
  alternative_spanish_readings:
  - Los hijos de Sion han perdido su valor y ahora son simples vasijas.
  - Los hijos de Sion valían oro, pero ahora son barro.
  rationale: La traducción conserva el contraste extremo entre valor y degradación, central al lamento. Se evita atenuar 'vasijas de barro' o reemplazarlo por expresiones más interpretativas que reducirían la fuerza poética y teológica del pasaje.
  doctrine_reference: Lamentaciones 4:2; teología del juicio y la humillación de Sion en el lamento profético
- issue: Metáfora del oro como lenguaje de valoración, no necesariamente de pesaje literal
  english_pob_reading: worth their weight in fine gold
  chosen_spanish_reading: de valor comparable al oro fino
  alternative_spanish_readings:
  - que valen su peso en oro fino
  - estimados como oro fino
  - del mismo valor que el oro fino
  rationale: La nota de POB indica que el hebreo puede destacar valoración más que una imagen de pesaje estrictamente concreta. Por eso el español deja la comparación abierta y no obliga al lector a una equivalencia física literal.
  doctrine_reference: Lamentaciones 4:2; nota lexical sobre בַּפָּז / פָּז
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se pasó de una formulación más literal (''weighed out against'') a una más natural (''worth their weight in'') y de ''clay jars'' a ''earthen jars''. En español se optó por una solución igualmente natural pero sin perder la tensión poética del hebreo: ''de valor comparable al oro fino'' y ''vasijas de barro''.'
  spanish_consistency_notes:
  - Se mantuvo 'Sion' como topónimo transliterado, en coherencia con el uso bíblico estándar y con el inglés POB.
  - Se evitó 'Cristo' o terminología cristológica por no estar presente en el texto.
  - '''Alfarero'' se eligió para יוֹצֵר por ser el oficio más natural en español bíblico; ''ceramista'' sería más técnico pero menos idiomático en este registro.'
