translation:
  language: es
  text: Pero no mucho después[a], el rey envió a un ateniense anciano para obligar a los judíos a apartarse de las leyes de sus padres y a no vivir conforme a las leyes de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'después de no mucho tiempo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετʼ οὐ πολὺν ... χρόνον
  english_pob_choice: after not much time
  chosen_spanish: después de no mucho tiempo
  alternatives_spanish:
  - no mucho después
  - al cabo de poco tiempo
  lexicon: LSJ
  rationale: La expresión griega es literalmente breve en el tiempo; ‘después de no mucho tiempo’ conserva ese valor temporal sin perder claridad en español.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: LSJ
  rationale: El verbo significa enviar o despachar. ‘Envió’ es natural y suficiente en el contexto narrativo.
- source_word: γέροντι Ἀθηναῖον
  english_pob_choice: aged Athenian
  chosen_spanish: un ateniense ya anciano
  alternatives_spanish:
  - un ateniense anciano
  - un viejo ateniense
  lexicon: LSJ
  rationale: γέροντι describe edad avanzada; ‘ya anciano’ comunica bien la idea de manera formal y evita convertir el término en un cargo o título.
- source_word: ἀναγκάζειν
  english_pob_choice: to compel
  chosen_spanish: obligar
  alternatives_spanish:
  - forzar
  - compeler
  lexicon: LSJ
  rationale: El infinitivo expresa coerción. ‘Obligar’ transmite la presión con naturalidad en español moderno.
- source_word: μεταβαίνειν ἀπὸ τῶν πατρίων νόμων
  english_pob_choice: to depart from the laws of their fathers
  chosen_spanish: apartarse de las leyes de sus padres
  alternatives_spanish:
  - abandonar las leyes ancestrales
  - desviarse de las leyes de sus antepasados
  lexicon: LSJ
  rationale: La frase griega mantiene el lenguaje paterno/ancestral. ‘Leyes de sus padres’ preserva esa textura heredada y el movimiento de ‘apartarse’ refleja μεταβαίνειν ἀπό.
- source_word: πατρίων
  english_pob_choice: of their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - ancestrales
  - de sus antepasados
  lexicon: LSJ
  rationale: Se conserva el lenguaje familiar/paternal del original, sin neutralizarlo innecesariamente.
- source_word: τοῖς τοῦ θεοῦ νόμοις
  english_pob_choice: the laws of God
  chosen_spanish: las leyes de Dios
  alternatives_spanish:
  - las leyes divinas
  - las leyes de Yahvé
  lexicon: LSJ
  rationale: La construcción genitiva se vierte de forma directa y paralela a ‘las leyes de sus padres’.
- source_word: μὴ πολιτεύεσθαι
  english_pob_choice: not to live by
  chosen_spanish: no vivir conforme a
  alternatives_spanish:
  - no conducirse según
  - no ordenar su vida por
  lexicon: LSJ
  rationale: πολιτεύεσθαι puede implicar conducta de vida bajo una norma. ‘Vivir conforme a’ comunica bien la idea práctica sin restringirla solo a lo político.
theological_decisions:
- issue: Mantener el lenguaje paternal/ancestral en πατρίων νόμων
  english_pob_reading: the laws of their fathers
  chosen_spanish_reading: las leyes de sus padres
  alternative_spanish_readings:
  - las leyes ancestrales
  - las leyes de sus antepasados
  rationale: El griego usa una formulación paterna explícita; conservarla respeta la textura del texto y no atenúa el vínculo con la tradición heredada.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Verter πολιτεύεσθαι con un sentido de vida bajo ley
  english_pob_reading: not to live by the laws of God
  chosen_spanish_reading: no vivir conforme a las leyes de Dios
  alternative_spanish_readings:
  - no conducirse según las leyes de Dios
  - no ordenar su vida por las leyes de Dios
  rationale: El verbo abarca conducta y modo de vida, no solo política formal. ‘Vivir conforme a’ preserva esa amplitud con claridad.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition; §6 Readable modern Spanish
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, que ajustó la descripción de γέροντι a una forma más natural (‘aged Athenian’) y mantuvo la frase temporal literal. La versión española sigue esa decisión al usar ‘ya anciano’ y una expresión temporal igualmente cercana al griego.
  spanish_consistency_notes:
  - Se preserva la relación paralela entre ‘las leyes de sus padres’ y ‘las leyes de Dios’.
  - No se introduce ‘SEÑOR’ ni otras sustituciones litúrgicas; el texto griego habla de θεοῦ y se vierte como ‘Dios’.
  - El verbo ‘vivir conforme a’ mantiene el matiz de conducta bajo norma que tiene πολιτεύεσθαι sin forzar un sentido exclusivamente político.
