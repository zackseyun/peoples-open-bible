translation:
  language: es
  text: Así haré a este lugar, declara Yahvé, y a sus habitantes, haciendo que esta ciudad sea como Tófet[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tófet era el sitio del valle de Ben Hinom asociado con sacrificios de niños y, después, con profanación y juicio; la comparación señala que Jerusalén llegará a ser un lugar de horror e impureza.
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: El adverbio introduce la consecuencia del acto profético anterior. «Así» conserva la fuerza inferencial sin sonar forzado en español.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - actuaré
  - haré esto
  lexicon: HALOT
  rationale: El verbo hebreo es amplio («hacer/obrar»). En español, «haré» mantiene la sencillez y permite que el resto del miembro explique la acción.
- source_word: לַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - contra este lugar
  - sobre este lugar
  lexicon: HALOT
  rationale: La preposición hebrea marca el objeto afectado; «a este lugar» es una equivalencia natural. El matiz hostil queda claro por el contexto sin necesidad de añadir «contra» en el cuerpo del texto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética solemne y el nombre divino según la norma del proyecto: «Yahvé», no una sustitución por «Señor».'
- source_word: וּלְיֹשְׁבָיו
  english_pob_choice: and to its inhabitants
  chosen_spanish: y a sus habitantes
  alternatives_spanish:
  - y a los que habitan en ella
  - y contra sus habitantes
  lexicon: HALOT
  rationale: El sufijo posesivo remite al lugar/ciudad; «sus habitantes» es natural y fiel. No se explicita la hostilidad en la traducción principal porque ya está implícita en el juicio anunciado.
- source_word: וְלָתֵת
  english_pob_choice: making
  chosen_spanish: al convertir
  alternatives_spanish:
  - y al hacer
  - para hacer
  lexicon: HALOT
  rationale: El infinitivo constructo con la conjunción expresa el resultado del acto divino. «Al convertir» transmite bien la idea de transformación resultante en español y evita una estructura pesada.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad, esta
  - esta urbe
  lexicon: HALOT
  rationale: Correspondencia directa y clara del demostrativo. En contexto alude a Jerusalén, pero el hebreo mantiene la designación «esta ciudad».
- source_word: כְּתֹפֶת
  english_pob_choice: like Topheth
  chosen_spanish: en Tófet
  alternatives_spanish:
  - como Tófet
  - igual que Tófet
  lexicon: HALOT
  rationale: כ marca comparación; en español, la formulación «convertir esta ciudad en Tófet» expresa con naturalidad el resultado comparativo. Se conserva el nombre propio tradicional transliterado como «Tófet».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: La lectura auditada del POB en inglés preserva el Tetragrámaton como nombre propio. En español, el equivalente proyectado es «Yahvé», de acuerdo con la terminología del proyecto y sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la comparación con Topheth
  english_pob_reading: making this city like Topheth
  chosen_spanish_reading: al convertir esta ciudad en Tófet
  alternative_spanish_readings:
  - como Tófet
  - como el Tófet
  rationale: La comparación apunta al lugar asociado con impureza, horror y juicio. En español, «convertir ... en Tófet» comunica el efecto de asimilación/transformación que el hebreo y la versión inglesa dejan ver, sin perder la referencia cultural del sitio.
  doctrine_reference: Jeremías 19:12; nota cultural sobre Tófet en el valle de Ben Hinom
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios y con alta concordancia entre revisores; no se introdujeron variantes textuales ni ajustes de contenido respecto del paquete fuente auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «Tófet» como transliteración de lugar propio, con nota cultural para aclarar su carga histórica y teológica.
  - Se optó por una estructura verbal natural en español («al convertir») para reflejar el infinitivo hebreo sin perder la relación de resultado.
  - No se añadió un equivalente explícito de «contra» en el texto principal, porque la hostilidad ya está implícita en el contexto de juicio profético.
