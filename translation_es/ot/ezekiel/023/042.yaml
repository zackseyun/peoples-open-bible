translation:
  language: es
  text: Y el sonido de una multitud despreocupada estaba en ella[a], y a los hombres de entre la masa de la humanidad fueron traídos borrachos desde el desierto[b]; y les pusieron brazaletes en sus manos y una corona hermosa[c] sobre sus cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sonido de una multitud en calma» o «el sonido de una multitud complaciente».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de la cláusula central es difícil. También puede entenderse así: «y a los hombres de entre la multitud de la humanidad, fueron traídos borrachos desde el desierto».'
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «una corona de hermosura» o «una corona espléndida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְק֣וֹל / קוֹל
  english_pob_choice: sound
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - ruido
  lexicon: HALOT
  rationale: En este contexto poético y personificado, 'voz' conserva el valor audible de קוֹל sin sonar tan mecánico como 'sonido'; además armoniza con la imagen de una escena que se hace oír dentro de la ciudad/persona.
- source_word: הָמוֹן
  english_pob_choice: multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - turba
  lexicon: HALOT
  rationale: '''Multitud'' mantiene el sentido colectivo formal que la revisión inglesa favoreció sobre ''crowd''. ''Muchedumbre'' sería posible, pero ''multitud'' encaja mejor con el registro bíblico-digno.'
- source_word: שָׁלֵו
  english_pob_choice: carefree
  chosen_spanish: despreocupada
  alternatives_spanish:
  - en paz
  - tranquila
  - segura de sí
  lexicon: HALOT
  rationale: La idea no es solo tranquilidad neutral, sino una calma relajada y moralmente cómoda; 'despreocupada' recoge ese matiz mejor que 'tranquila'. En español también evita cargar demasiado la interpretación con 'complaciente'.
- source_word: בָּהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  lexicon: HALOT
  rationale: Se conserva la personificación femenina de la ciudad/mujer. 'En ella' es la correspondencia más natural y fiel.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y el contexto sigue la imaginería de visitantes masculinos; por eso se mantiene 'hombres' en vez de neutralizarlo.
- source_word: מֵרֹב אָדָם
  english_pob_choice: from the mass of mankind
  chosen_spanish: de entre la masa de la humanidad
  alternatives_spanish:
  - de entre la multitud humana
  - de entre la masa de gente
  lexicon: HALOT
  rationale: La frase es condensada y difícil. 'Masa de la humanidad' conserva אָדָם y el sentido de un gran conjunto humano, sin reducirlo a una mera clase social local.
- source_word: מוּבָאִים
  english_pob_choice: were brought
  chosen_spanish: les traían
  alternatives_spanish:
  - eran traídos
  - fueron traídos
  lexicon: HALOT
  rationale: Aunque el hebreo es participio pasivo, el flujo español queda más natural con una pasiva perifrástica activa en impersonal/plural. Se evita añadir 'adentro' porque no está explícito.
- source_word: סובאים
  english_pob_choice: drunkards
  chosen_spanish: borrachos
  alternatives_spanish:
  - ebrios
  - bebedores
  lexicon: HALOT
  rationale: '''Borrachos'' comunica el sentido de personas intoxicadas y conserva la dureza del término. ''Bebedores'' suavizaría demasiado la escena.'
- source_word: מִמִּדְבָּר
  english_pob_choice: from the wilderness
  chosen_spanish: desde el desierto
  alternatives_spanish:
  - del desierto
  - desde la soledad del desierto
  lexicon: HALOT
  rationale: '''Desierto'' es una equivalencia clara y natural en español. ''Desde'' refleja mejor el movimiento/origen que ''del''.'
- source_word: וַיִּתְּנוּ
  english_pob_choice: they put
  chosen_spanish: les pusieron
  alternatives_spanish:
  - colocaron
  - les dieron
  lexicon: HALOT
  rationale: En el contexto de adornar, 'poner' es la opción más idiomática. El dativo 'les' aclara a quiénes se les colocan los adornos.
- source_word: צְמִידִים
  english_pob_choice: bracelets
  chosen_spanish: brazaletes
  alternatives_spanish:
  - pulseras
  - aros
  lexicon: HALOT
  rationale: '''Brazaletes'' preserva mejor la idea de adorno en brazo/mano que ''pulseras'', que en español moderno suele sonar más pequeño o femenino en un sentido distinto.'
- source_word: אֶל יְדֵיהֶן
  english_pob_choice: on their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - sobre sus manos
  - en sus muñecas
  lexicon: HALOT
  rationale: Se mantiene la literalidad básica de 'manos', que el hebreo usa directamente. 'En' reproduce la preposición sin sobreespecificar la colocación.
- source_word: וַעֲטֶרֶת תִּפְאֶרֶת
  english_pob_choice: a beautiful crown
  chosen_spanish: una corona hermosa
  alternatives_spanish:
  - una corona de hermosura
  - una corona espléndida
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'una corona de hermosura/esplendor'. 'Hermosa' es natural en español y conserva el valor estético sin perder el vínculo constructo-adjetival.
- source_word: עַל רָאשֵׁיהֶן
  english_pob_choice: on their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - en sus cabezas
  lexicon: HALOT
  rationale: '''Sobre'' refleja bien el gesto de coronar y suena más natural con ''corona'' que ''en sus cabezas''.'
theological_decisions:
- issue: Retener el tono moralmente degradado del pasaje sin suavizarlo
  english_pob_reading: The scene depicts sensual corruption and complacent luxury with 'carefree multitude' and 'drunkards' brought in.
  chosen_spanish_reading: El pasaje queda como una escena de abundancia despreocupada y degradación, con hombres borrachos traídos desde el desierto.
  alternative_spanish_readings:
  - una multitud tranquila
  - una multitud cómoda
  rationale: No se debe neutralizar la carga moral del hebreo ni la del POB inglés. 'Despreocupada' y 'borrachos' preservan el contraste entre aparente bienestar y depravación.
  doctrine_reference: 'Ezequiel 23: contexto profético de juicio contra infidelidad y corrupción'
- issue: Mantener la personificación femenina de la ciudad/infidelidad
  english_pob_reading: The pronoun 'her' refers to the feminized city/woman imagery.
  chosen_spanish_reading: Se conserva 'en ella' y 'sus cabezas', manteniendo la imagen femenina personificada.
  alternative_spanish_readings:
  - en él
  - en la ciudad
  rationale: La metáfora es importante para la lógica del capítulo. Traducirla de modo abstracto debilitaría el recurso profético.
  doctrine_reference: 'Ezequiel 23: alegoría de las dos hermanas y la ciudad personificada'
- issue: Resolver la cláusula hebrea difícil sin borrar su ambigüedad básica
  english_pob_reading: The Hebrew of the middle clause is difficult. It may also be understood along the lines of 'and to the men from the multitude of mankind, drunkards were brought from the wilderness.'
  chosen_spanish_reading: Se traduce de forma que 'a los hombres de entre la masa de la humanidad les traían borrachos desde el desierto', dejando implícita la dificultad sintáctica.
  alternative_spanish_readings:
  - y a los hombres de entre la masa de la humanidad fueron traídos borrachos desde el desierto
  - y para los hombres de la multitud humana traían borrachos desde el desierto
  rationale: La solución española debe sonar legible, pero no cerrar indebidamente la ambigüedad del hebreo. 'Les traían borrachos desde el desierto' permite la misma vacilación interpretativa que el POB inglés documenta.
  doctrine_reference: Crítica textual y sintaxis hebrea de Ezequiel 23:42
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó el orden para acercarse más al hebreo, prefirió 'multitude' por registro formal y eliminó 'Then' por no estar explícito. La versión española reproduce ese orden relativo, mantiene la ambigüedad de la cláusula central y evita añadir conectores temporales no presentes en el מקור.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica aquí; no hay nombres divinos en el versículo.
  - Se prefirió 'brazaletes' para צְמִידִים por ser más preciso que 'pulseras' en este contexto.
  - Se mantuvo la personificación femenina con pronombres y posesivos femeninos.
  - Las notas a y b reflejan las alternativas documentadas en el audit trail inglés; la nota c conserva la equivalencia literal del constructo hebreo.
