  source_alignment_summary: 'El borrador sigue bien el sentido general del proverbio y la mayoría de las decisiones léxicas auditadas: קֹרֵא como «perdiz», עֹשֶׂה עֹשֶׁר como «hace riquezas», וְלֹא בְמִשְׁפָּט como «injustamente», בַּחֲצִי יָמָיו como «en la mitad de sus días», יַעַזְבֶנּוּ con la riqueza como sujeto implícito, y נָבָל como «necio». Sin embargo, la cláusula aviar se desvía innecesariamente del inglés auditado y del hebreo al cambiar «no hatch / no bear» por «lo que no puso», lo cual desplaza la imagen desde cría no incubada/eclosionada hacia huevos no puestos. Esa resolución interpretativa no corresponde al rationale auditado, que precisamente quería mantener la incertidumbre zoológica sin forzar ese detalle.'
