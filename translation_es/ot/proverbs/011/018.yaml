revisions:
- from: El malvado hace ganancia engañosa[a][b], pero el que siembra justicia recibe una recompensa verdadera.
  to: El malvado obtiene una ganancia engañosa[a], pero el que siembra rectitud recibe una recompensa verdadera[b].
  rationale: Se ajusta la primera cola a un español natural que aún refleja el sentido contextual de עֹשֶׂה פְעֻלַּת שָׁקֶר como ganancia/paga engañosa. Se cambia «justicia» por «rectitud» para alinearse mejor con la decisión auditada de «righteousness» y con el valor moral-personal del término en este proverbio. Se conservan las dos notas léxicas del POB inglés con anclajes claros y no duplicados.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el paralelismo antitético y la idea central: el malvado obtiene un resultado engañoso, mientras que quien siembra צְדָקָה recibe una recompensa genuina. Sin embargo, dos puntos requieren ajuste para alinearse mejor con el hebreo y con la auditoría inglesa: (1) «hace ganancia engañosa» suena poco natural en español y no expresa bien el sentido idiomático de resultado/paga; una forma como «obtiene una ganancia engañosa» preserva mejor la intención contextual documentada. (2) El POB inglés mantuvo «righteousness», y el valor por defecto del proyecto para צְדָקָה favorece «justicia/rectitud según contexto»; aquí «rectitud» preserva mejor la dimensión moral personal del proverbio que «justicia», que en español puede sonar más jurídico-social.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero «hace ganancia engañosa» resulta antinatural en español estándar. «El malvado obtiene una ganancia engañosa» fluye mejor. También conviene armonizar la nota [b] con el texto revisado: si el texto principal usa «ganancia», la nota no debe limitarse a «recompensa segura» sin mencionar la primera cola. El resto del versículo es legible y apropiado para un registro bíblico moderno.'
  glossary_alignment: 'No hay términos del glosario principal en conflicto directo. El punto terminológico importante es צְדָקָה: aunque «justicia» es posible, la documentación inglesa escogió «righteousness» y la rationale teológica pide preservar esa dimensión amplia; en este contexto sapiencial, «rectitud» alinea mejor el español con esa decisión sin introducir tecnicismo innecesario. «Recompensa verdadera» refleja bien שֶׂכֶר אֱמֶת, con alternativas en nota.'
  issues:
  - severity: medium
    issue: «Hace ganancia engañosa» es poco idiomático en español.
    rationale: Aunque intenta conservar la tensión de עֹשֶׂה con el sustantivo, el resultado suena forzado. El sentido contextual documentado en la auditoría inglesa es de ganancia/paga obtenida, no de una acción verbal literal que deba calcarse.
  - severity: medium
    issue: «Justicia» debilita la alineación con la decisión auditada de «righteousness».
    rationale: En Proverbios «justicia» puede funcionar, pero en español suele inclinarse hacia lo jurídico o social. «Rectitud» comunica mejor la conducta moral íntegra que el proverbio contrasta con la maldad y preserva mejor la rationale teológica del POB.
  - severity: low
    issue: La nota [b] no refleja de la mejor manera el contraste completo del hebreo si el texto principal habla de «ganancia».
    rationale: La nota actual solo desarrolla «recompensa/salario de verdad». Conviene mantenerla, pero el texto principal debe quedar bien balanceado para que la nota se entienda como alternativa léxica y no como corrección de una asimetría innecesaria.
  revised_spanish_text: El malvado obtiene una ganancia engañosa[a], pero el que siembra rectitud recibe una recompensa verdadera[b].
  revised_footnotes:
