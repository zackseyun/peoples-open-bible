    rationale: Aunque intenta conservar el acto declarativo de יְאַשְּׁרוּהוּ, en español suena torpe y menos idiomático. «Llámenlo bienaventurado» preserva mejor el sentido de ‘call him blessed’ y la legibilidad eclesial.
