translation:
  language: es
  text: Quizá Yahvé, tu Dios, oiga las palabras del Rabsaces[a], a quien su señor, el rey de Asiria, ha enviado para afrentar al Dios vivo, y reprenda por las palabras que Yahvé, tu Dios, ha oído[b]. Por tanto, eleva una oración por el remanente que queda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el jefe de los coperos'. 'Rabsaces' funciona aquí como título asirio usado casi como nombre propio.
    reason: cultural_note
  - marker: b
    text: O 'lo reprenda por esas palabras' o 'le pida cuentas por esas palabras'. El hebreo puede implicar que Dios responda o juzgue el discurso blasfemo que ha oído.
    reason: lexical_alternative
  - marker: c
    text: O 'el remanente que aún existe' o 'los sobrevivientes que quedan'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa posibilidad abierta sin afirmar certeza; es natural en español y conserva el matiz de esperanza contingente del hebreo.
- source_word: יִשְׁמַע
  english_pob_choice: will hear
  chosen_spanish: oiga
  alternatives_spanish:
  - oirá
  - escuche
  lexicon: HALOT
  rationale: El subjuntivo tras 'Quizá' comunica mejor la posibilidad que el futuro; 'oiga' preserva el valor de 'escuchar/atender' sin perder fluidez.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Sigue el default del proyecto para el Tetragrámaton, manteniendo el nombre divino en vez de ocultarlo con un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Traducción directa y reverente del posesivo de segunda persona dirigido a Ezequías.
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las declaraciones
  - el mensaje
  lexicon: HALOT
  rationale: El plural concreto conserva que el foco está en el discurso insultante, no solo en una idea general.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaces
  alternatives_spanish:
  - el Rabshakeh
  - el jefe de los coperos
  lexicon: HALOT
  rationale: Se usa la forma tradicional castellanizada como designación de oficio/nombre propio en contexto histórico; mantiene reconocibilidad sin forzar una explicación en el texto principal.
- source_word: אֲשֶׁר שְׁלָחוֹ מֶלֶךְ אַשּׁוּר אֲדֹנָיו
  english_pob_choice: whom his master the king of Assyria has sent
  chosen_spanish: a quien su señor, el rey de Asiria, ha enviado
  alternatives_spanish:
  - a quien el rey de Asiria, su señor, ha enviado
  - a quien el rey de Asiria ha enviado, su señor
  lexicon: HALOT
  rationale: Respeta la relación de dependencia expresada por 'su señor' y aclara en español que el rey de Asiria es el amo del oficial asirio.
- source_word: לְחָרֵף
  english_pob_choice: to reproach
  chosen_spanish: para afrentar
  alternatives_spanish:
  - para reprochar
  - para ofender
  - para insultar
  lexicon: HALOT
  rationale: '''Afrentar'' comunica el insulto público y el menosprecio reverente dirigido contra Dios; evita suavizar la fuerza del verbo y funciona bien en registro bíblico.'
- source_word: אֱלֹהִים חַי
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios viviente
  lexicon: HALOT
  rationale: Forma idiomática y clara en español, preservando el contraste teológico con los ídolos.
- source_word: וְהוֹכִיחַ
  english_pob_choice: and will rebuke
  chosen_spanish: y reprenda
  alternatives_spanish:
  - y reprove
  - y corrija
  - y llame a cuentas
  lexicon: HALOT
  rationale: En español, 'reprender' mantiene la idea de respuesta divina contra palabras blasfemas sin añadir matices judiciales que el contexto no exige de forma explícita.
- source_word: בַּדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - por las palabras
  - respecto de las palabras
  lexicon: HALOT
  rationale: Se conserva la referencia al discurso oído por Yahvé; en español la relación se expresa con naturalidad mediante el objeto directo de 'reprenda'.
- source_word: אֲשֶׁר שָׁמַע יְהוָה אֱלֹהֶיךָ
  english_pob_choice: that Yahweh your God has heard
  chosen_spanish: que Yahvé, tu Dios, ha oído
  alternatives_spanish:
  - que Yahvé, tu Dios, escuchó
  - que Yahvé, tu Dios, ha escuchado
  lexicon: HALOT
  rationale: Mantiene el perfecto con relevancia presente y el eco de 'oír' en vez de diluirlo en 'escuchar' solamente.
- source_word: וְנָשָׂאתָ תְפִלָּה
  english_pob_choice: Therefore lift up a prayer
  chosen_spanish: Por tanto, eleva una oración
  alternatives_spanish:
  - Y eleva una oración
  - Así que eleva una oración
  - Por tanto, ofrece una oración
  lexicon: HALOT
  rationale: '''Elevar una oración'' preserva la metáfora de נשא־תפילה y es natural en español culto; ''Por tanto'' expresa bien la inferencia contextual implícita en la waw.'
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  lexicon: HALOT
  rationale: '''Por'' es la forma más directa y bíblica en español para una intercesión en favor de alguien.'
- source_word: הַשְּׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - la supervivencia
  lexicon: HALOT
  rationale: '''Remanente'' preserva el término técnico-teológico de Isaías en un castellano claro y digno.'
- source_word: הַנִּמְצָאָה
  english_pob_choice: that remains
  chosen_spanish: que queda
  alternatives_spanish:
  - que permanece
  - que ha quedado
  - que se encuentra
  lexicon: HALOT
  rationale: '''Que queda'' transmite de manera natural la idea de lo que aún subsiste; evita una formulación demasiado literal que sonaría artificial en español.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino; se conserva como 'Yahvé' conforme al estándar del proyecto, sin sustituirlo por un título que lo oculte.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of the remnant expression הַשְּׁאֵרִית הַנִּמְצָאָה
  english_pob_reading: the remnant that remains
  chosen_spanish_reading: el remanente que queda
  alternative_spanish_readings:
  - los sobrevivientes que quedan
  - el resto que permanece
  rationale: '''Remanente'' conserva la resonancia isaiana de un resto preservado por Dios; ''que queda'' refleja la cualidad de los que aún subsisten sin introducir más interpretación de la necesaria.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
- issue: Verbal force of לְחָרֵף against God
  english_pob_reading: to reproach the living God
  chosen_spanish_reading: para afrentar al Dios vivo
  alternative_spanish_readings:
  - para reprochar al Dios vivo
  - para insultar al Dios vivo
  - para ultrajar al Dios vivo
  rationale: '''Afrentar'' comunica el deshonor público y blasfemo del ataque verbal. Se evita suavizar el verbo y se mantiene el objeto teológico directo: el Dios vivo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #4'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje revisado más reciente del audit trail: se aclara la relación posesiva entre el oficial y el rey de Asiria, se preserva la idea de ''oir'' para Yahvé, se mantiene el cierre con ''que queda'' como equivalente natural de ''remains'', y se evita introducir una equivalencia más interpretativa que la fuente no exija.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, coherente con el estándar del proyecto.
  - '''El Dios vivo'' conserva la oposición implícita frente a ídolos y evita calcos innecesarios.'
  - '''Remanente'' se usa como término técnico consistente con Isaías.'
  - 'La puntuación separa claramente las cláusulas y refleja la progresión lógica del hebreo: posibilidad, audiencia divina, reprensión, intercesión.'
