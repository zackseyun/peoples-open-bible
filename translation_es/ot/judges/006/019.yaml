translation:
  language: es
  text: Entonces Gedeón entró y preparó un cabrito y panes sin levadura de un efa de harina. Puso la carne en una canasta y el caldo en una olla, y se lo llevó hasta donde él estaba, debajo del terebinto[a], y se lo presentó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de la encina». El hebreo probablemente se refiere a un terebinto, aunque «encina» o «roble» son equivalencias tradicionales.
    reason: lexical_alternative
  - marker: b
    text: O «lo puso delante de él» / «lo acercó a él». El verbo hebreo significa acercar o presentar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - pasó adentro
  lexicon: HALOT
  rationale: En este contexto Gedeón se aparta para preparar los alimentos; en español, «entró» comunica ese desplazamiento hacia el interior de manera natural y fiel, sin añadir información que el hebreo no da explícitamente.
- source_word: וַיַּעַשׂ
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - hizo
  - elaboró
  lexicon: HALOT
  rationale: El verbo se refiere aquí a la preparación de comida. «Preparó» conserva el sentido amplio del hebreo y suena natural en español bíblico contemporáneo.
- source_word: גְּדִי עִזִּים
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un chivo joven
  - una cría de cabra
  lexicon: HALOT
  rationale: «Cabrito» es la forma breve y corriente en español para un animal joven de la cabra, y preserva bien el referente del hebreo sin sonar técnico ni arcaico.
- source_word: אֵיפַת קֶמַח
  english_pob_choice: an ephah of flour
  chosen_spanish: de un efa de harina
  alternatives_spanish:
  - de una medida de harina
  - de un efa de flor
  lexicon: HALOT
  rationale: Se conserva la medida específica «efa» porque el texto nombra una unidad concreta; «harina» traduce קֶמַח de manera clara y directa. Se evita generalizar a «medida» para no perder precisión.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - tortas sin levadura
  - pan ácimo
  lexicon: HALOT
  rationale: «Panes sin levadura» expresa el sentido del término de forma clara y eclesialmente legible; mantiene el matiz de pan hecho sin fermento sin depender de un tecnicismo innecesario.
- source_word: הַבָּשָׂר
  english_pob_choice: the meat
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne cocida
  - la carne del animal
  lexicon: HALOT
  rationale: En español, «carne» reproduce con más naturalidad el hebreo en este contexto de comida preparada. Aunque puede sonar algo más literal que «carne» en uso culinario moderno, aquí conserva mejor la textura del texto fuente.
- source_word: סַּל
  english_pob_choice: basket
  chosen_spanish: canasta
  alternatives_spanish:
  - cesta
  - cesto
  lexicon: HALOT
  rationale: «Canasta» es un equivalente natural y claro en español para el recipiente de transporte. Es ligeramente más transparente que «cesto» en este contexto narrativo.
- source_word: הַמָּרַק
  english_pob_choice: the broth
  chosen_spanish: el caldo
  alternatives_spanish:
  - el broth
  - la sopa
  lexicon: HALOT
  rationale: «Caldo» comunica bien el líquido de cocción sin importar una lectura más específica de «soup». Es una solución idiomática en español que conserva el sentido culinario del hebreo.
- source_word: פָּרוּר
  english_pob_choice: pot
  chosen_spanish: olla
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: «Olla» es el recipiente culinario más natural en español para contener caldo. Mantiene la imagen concreta del texto sin sobredeterminar el tipo de utensilio.
- source_word: וַיּוֹצֵא אֵלָיו
  english_pob_choice: brought it out to him
  chosen_spanish: lo sacó hasta él
  alternatives_spanish:
  - se lo llevó hasta él
  - lo trajo hasta él
  lexicon: HALOT
  rationale: 'La versión española sigue de cerca la acción del hebreo: sacar hacia la presencia del visitante. «Lo sacó hasta él» mantiene la dirección y evita añadir una idea de pluralidad que el hebreo no exige aquí.'
- source_word: תַּחַת הָאֵלָה
  english_pob_choice: under the terebinth
  chosen_spanish: debajo de la encina
  alternatives_spanish:
  - debajo del terebinto
  - bajo la encina
  lexicon: HALOT
  rationale: Se adopta «encina» porque es la equivalencia tradicional y comprensible en español bíblico para este árbol, aunque el hebreo probablemente alude a una terebinto. Se preserva así una opción legible sin perder la referencia arbórea del original.
- source_word: וַיַּגַּשׁ
  english_pob_choice: presented it
  chosen_spanish: se lo presentó
  alternatives_spanish:
  - lo presentó
  - lo puso delante de él
  lexicon: HALOT
  rationale: «Se lo presentó» refleja el sentido de acercar/ofrecer sin convertir el acto en una ofrenda sacrificial explícita. El dativo pronominal comunica adecuadamente la presentación al visitante.
theological_decisions:
- issue: Posible matiz sacrificial en el acto de Gedeón
  english_pob_reading: hospitality/presentation language rather than explicit sacrificial language
  chosen_spanish_reading: lenguaje de hospitalidad y presentación, no de sacrificio explícito
  alternative_spanish_readings:
  - lo ofreció como sacrificio
  - lo sacrificó
  rationale: El hebreo describe preparación, traslado y presentación de alimentos. Aunque la escena avanza hacia un contexto con resonancias sacrificiales, este versículo por sí solo no afirma que Gedeón ofreciera un sacrificio. La traducción española conserva esa tensión narrativa en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del texto sin anticipar interpretación posterior.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB al mantener las referencias culinarias en singular donde corresponde al flujo del hebreo: un solo conjunto de ofrenda/comida preparado y presentado. También conserva la decisión revisada de no pluralizar indebidamente los objetos finales y de traducir con sobriedad la secuencia narrativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención POB para el nombre divino, aunque en este versículo no aparece explícitamente.
  - Se conserva «efa» como unidad de medida específica, en línea con la preferencia POB por la precisión del texto fuente.
  - Se evita «siervo» u otros términos de estatus porque el versículo no los requiere.
  - «Encina» se usa en el cuerpo principal por legibilidad; la nota reconoce la alternativa «terebinto» para respetar la tensión lexical documentada.
