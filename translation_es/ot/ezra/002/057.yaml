translation:
  language: es
  text: los hijos de Shefatías, los hijos de Hatil, los hijos de Pokeret-ha-zebaim[a], los hijos de Ami.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «Pokeret de Zebaim»; el hebreo puede leerse como un nombre compuesto de familia o como un nombre seguido de un elemento calificativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En este listado genealógico, בְּנֵי introduce grupos familiares o clanales. «Los hijos de» conserva mejor la forma del hebreo y es natural en español bíblico; «descendientes de» sería más explícito pero menos formalmente cercano al texto.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Shefatías
  alternatives_spanish:
  - Safatías
  - Shephatiah
  lexicon: Nombre propio transliterado
  rationale: Es un nombre propio hebreo. Se adapta a una transliteración española usual y legible, manteniendo la referencia al mismo nombre sin traducirlo.
- source_word: חַטִּיל
  english_pob_choice: Hattil
  chosen_spanish: Hatil
  alternatives_spanish:
  - Hattil
  lexicon: Nombre propio transliterado
  rationale: Nombre propio o de clan; se translitera de manera simple al español para conservar la forma del original y la serie paralela del listado.
- source_word: פֹּכֶרֶת הַצְּבָיִים
  english_pob_choice: Pokereth-hazzebaim
  chosen_spanish: Pokeret-ha-zebaim
  alternatives_spanish:
  - Pokeret de Zebaim
  - Pokeret-ha-zebaim
  lexicon: HALOT
  rationale: La fuente inglesa preserva la tensión entre nombre compuesto y posible elemento calificativo. En español, el guion ayuda a reflejar esa unión estrecha sin resolverla interpretativamente; se mantiene la ambigüedad documentada.
- source_word: אָמִי
  english_pob_choice: Ami
  chosen_spanish: Ami
  alternatives_spanish:
  - Ammi
  lexicon: Nombre propio transliterado
  rationale: Nombre propio o de clan; se conserva la forma breve y reconocible en español, sin expandirla ni interpretarla.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el juicio auditado en inglés: se conserva la estructura genealógica repetitiva, los nombres propios se transliteran y la única tensión léxica relevante es פֹּכֶרֶת הַצְּבָיִים, que permanece ambigua según la nota inglesa. No hubo revisiones aplicadas en el antecedente inglés.'
  spanish_consistency_notes:
  - Se mantiene «hijos de» para בְּנֵי por coherencia con listas genealógicas bíblicas.
  - Se usa guion en «Pokeret-ha-zebaim» para preservar la posible compacidad del compuesto.
  - Se adapta Shephatiah a «Shefatías» para una lectura española natural, sin perder identificación del nombre.
  - Se evita «SEÑOR» o terminología teológica ajena porque el versículo es puramente onomástico y genealógico.
