  glossary_alignment: 'No hay términos del glosario principal en conflicto. La transliteración «Rabsaqué» es aceptable como forma española del título/nombre. La decisión clave es יְהוּדִית: el proyecto en inglés justificó «in Judean», por lo que en español conviene «en judeano» o equivalente explícito, no «en judío».'
