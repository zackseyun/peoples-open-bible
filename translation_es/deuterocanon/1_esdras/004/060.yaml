review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: doxología directa («Bendito eres tú»), cláusula relativa («que me has dado sabiduría»), acción de agradecimiento/reconocimiento («te doy gracias») y vocativo final. Sin embargo, no preserva del todo la decisión léxica documentada para δέσποτα. «Maestro» en español suele sugerir principalmente docente, no amo/soberano, y por eso debilita la distinción semántica que el POB quiso mantener frente a κύριος.'
  spanish_quality_summary: El español es natural y claro. «Bendito eres tú» y «que me has dado sabiduría» son idiomáticos y dignos. «Te doy gracias» funciona muy bien en contexto de oración. La principal dificultad de legibilidad/precisión está en «Maestro de los padres», que suena poco natural y puede entenderse como «profesor de los antepasados» más que como título de autoridad divina.
  glossary_alignment: 'No hay conflictos con términos del glosario principal como Yahvé/Mesías. La cuestión relevante es la consistencia interna de títulos divinos: δέσποτα no debe aplanarse a «Señor», pero tampoco conviene «Maestro» si en español pierde el matiz de autoridad dominical. «Soberano de los padres» conserva mejor la distinción léxica documentada y resulta más inteligible en español eclesial.'
  issues:
  - severity: medium
    issue: «Maestro» para δέσποτα es semánticamente equívoco en español.
    rationale: Aunque intenta distinguirse de κύριος, en español moderno «maestro» suele asociarse primero con enseñanza. Aquí δέσποτα denota autoridad soberana o señorío, y «Soberano» preserva mejor el valor del término sin confundirlo con κύριος.
  - severity: low
    issue: La nota [a] no coincide con la nota inglesa auditada.
    rationale: La huella inglesa pone la alternativa en relación con ὁμολογῶ, no con εὐλογητὸς. La nota española sobre «Alabado» no es errónea en sí, pero no reproduce la alternativa significativa documentada por el POB. Puede simplificarse eliminándola, ya que no es necesaria para resolver ambigüedad en español.
  - severity: low
    issue: Falta una nota sobre la alternativa de δέσποτα.
    rationale: El inglés conserva la alternativa «Sovereign of the fathers». Si el texto principal en español usa «Soberano», la nota puede registrar «O «Amo de los padres»» o explicar brevemente que el griego distingue este título de κύριος. Esto ayuda a preservar la racionalidad léxica auditada.
  revised_spanish_text: Bendito eres tú, que me has dado sabiduría; y a ti te doy gracias, Soberano[a] de los padres.
