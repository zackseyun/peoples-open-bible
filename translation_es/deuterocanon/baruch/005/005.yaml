review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: llamado a Jerusalén, posición elevada, mirada hacia el oriente, reunión de los hijos desde occidente hasta oriente, y gozo ligado a la μνεία de Dios. Sin embargo, hay dos desajustes importantes con el rastro auditado: (1) la nota [a] está anclada en «Levántate» pero en realidad corresponde a τῷ ῥήματι («a/por la palabra»); (2) «por la palabra del Santo» resuelve en el texto principal una posibilidad instrumental que el inglés dejó en nota, mientras que el valor más conservador es «a la palabra del Santo» o equivalente que preserve la ambigüedad del dativo.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene detalles mejorables para fidelidad y naturalidad bíblica amplia: «tus hijos» estrecha τέκνα, mejor «tus hijos e hijas» o «tus hijos» solo si se acepta como genérico; «gozándose» suena menos natural que «regocijándose» o «alegrándose» en este contexto; y «ponte sobre la altura» puede suavizarse a «ponte en lo alto» para naturalidad, aunque «la altura» es aceptable. La mayor reparación necesaria es la ubicación y contenido de las notas.'
  glossary_alignment: 'No hay conflicto con la glosa del proyecto en nombres divinos: θεοῦ -> «Dios» está bien. «del Santo» es una buena equivalencia para τοῦ ἁγίου. No intervienen términos como Yahvé/Mesías. Conviene preservar mejor la ambigüedad auditada en τῷ ῥήματι y τῇ τοῦ θεοῦ μνείᾳ.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en la palabra equivocada.
    rationale: La nota explica el valor de τῷ ῥήματι, pero el marcador aparece en «Levántate». Esto rompe la trazabilidad del aparato y debe corregirse.
  - severity: high
    issue: «por la palabra del Santo» en el texto principal sobreinterpreta el dativo τῷ ῥήματι.
    rationale: El POB inglés eligió «at the word» y dejó «by the word» como alternativa. En español conviene una forma más abierta, como «a la palabra del Santo», dejando «por la palabra» en nota.
  - severity: medium
    issue: «tus hijos» reduce el alcance inclusivo potencial de τέκνα.
    rationale: τέκνα significa ‘hijos/children’ sin restringir a varones. En español actual y ampliamente legible, «tus hijos e hijas» preserva mejor ese alcance sin perder dignidad.
  - severity: low
    issue: «gozándose» suena menos natural en este registro.
    rationale: «Regocijándose» expresa mejor el participio χαίροντες en español bíblico moderno y digno.
