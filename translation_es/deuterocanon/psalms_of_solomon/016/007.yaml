  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: súplica a Dios para ser guardado del pecado y de una mujer mala que hace tropezar a un hombre insensato. Sin embargo, el verbo inicial ἐπικράτησόν μου, auditado en inglés como ''Restrain me'', no está bien representado por «Contiéndeme», que en español suele significar discutir, litigar o reprimir de modo poco claro. También la nota alternativa debería reflejar mejor la opción inglesa documentada.'
  spanish_quality_summary: «Contiéndeme» suena poco natural y potencialmente equívoco en español bíblico actual. «Refréname» o «Deténme» comunican mucho mejor la petición de restricción. «Del pecado malo» es comprensible pero algo rígido; aun así, conserva la literalidad y puede mantenerse. El resto del verso es claro y legible.
  glossary_alignment: No hay conflictos relevantes con la terminología base del proyecto. «Dios», «mujer», «hombre insensato» y «hace tropezar» están alineados. La corrección principal es léxica en ἐπικράτησόν μου.
  issues:
  - severity: high
    issue: «Contiéndeme» no representa fielmente ἐπικράτησόν μου en este contexto.
    rationale: La decisión auditada y adjudicada en inglés es 'Restrain me', basada en el uso idiomático de ἐπικρατέω + ἀπό con sentido de refrenar o retener del mal. «Contiéndeme» en español es ambiguo y puede sugerir contienda verbal o litigio, no una súplica para ser frenado del pecado.
  - severity: medium
    issue: La nota al pie alternativa usa «Domíname... apartándome de», que suena torpe en español.
    rationale: Debe preservar la alternativa documentada ('Take charge of me, O God, away from') de forma inteligible en español. «Hazte cargo de mí, oh Dios, apartándome de» o «Ten dominio sobre mí...» reflejan mejor la opción alternativa sin sonar antinatural.
  revised_spanish_text: Refréname[a], oh Dios, del pecado malo y de toda mujer mala que hace tropezar a un hombre insensato.
