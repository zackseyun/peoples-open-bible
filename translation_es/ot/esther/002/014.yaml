translation:
  language: es
  text: Al atardecer ella entraba[a], y por la mañana volvía a la segunda casa de las mujeres, al cuidado de Shaashgaz, el eunuco del rey, guardián de las concubinas[b]. No volvería a entrar ante el rey, a menos que el rey se complaciera en ella y fuera llamada por nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «el segundo harén». El hebreo dice literalmente «la segunda casa de las mujeres».
    reason: lexical_alternative
  - marker: b
    text: «Entrar ante el rey» reproduce un modismo hebreo para acceder a la presencia/cámara del rey; el contexto implica acceso sexual sin decirlo de manera explícita.
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֶרֶב
  english_pob_choice: In the evening
  chosen_spanish: Al atardecer
  alternatives_spanish:
  - Por la tarde
  - En la noche
  lexicon: HALOT
  rationale: La expresión temporal marca el momento de la entrada. «Al atardecer» es natural en español y conserva el valor temporal sin añadir interpretación.
- source_word: בָאָה
  english_pob_choice: she would go in
  chosen_spanish: ella entraba
  alternatives_spanish:
  - ella iba a entrar
  - ella iba
  lexicon: HALOT
  rationale: En contexto, el verbo indica entrar en la esfera/presencia del rey. «Entraba» mantiene el valor de entrada y refleja el aspecto habitual del relato sin explicitar más de lo que el hebreo dice.
- source_word: וּבַבֹּקֶר
  english_pob_choice: and in the morning
  chosen_spanish: y por la mañana
  alternatives_spanish:
  - y en la mañana
  - pero por la mañana
  lexicon: HALOT
  rationale: La conjunción simple y el complemento temporal se conservan de forma directa. «Por la mañana» es idiomático en español.
- source_word: שָׁבָה
  english_pob_choice: she would return
  chosen_spanish: volvía
  alternatives_spanish:
  - regresaba
  - volvía de regreso
  lexicon: HALOT
  rationale: El verbo expresa retorno. «Volvía» es natural y suficiente para el movimiento de vuelta al mismo lugar.
- source_word: בֵּית הַנָּשִׁים שֵׁנִי
  english_pob_choice: the second house of the women
  chosen_spanish: la segunda casa de las mujeres
  alternatives_spanish:
  - la segunda morada de las mujeres
  - el segundo recinto de las mujeres
  lexicon: HALOT
  rationale: 'Se preserva la estructura del hebreo: «casa de las mujeres» calificada por «segunda». No se reemplaza por «harén» en el texto principal porque esa es una inferencia interpretativa que el POB inglés dejó en nota.'
- source_word: אֶל יַד
  english_pob_choice: into the care of
  chosen_spanish: al cuidado de
  alternatives_spanish:
  - bajo la autoridad de
  - en manos de
  lexicon: HALOT
  rationale: La idiomática hebrea «a la mano de» transmite encargo o custodia. «Al cuidado de» comunica bien la función administrativa sin perder el sentido de dependencia o responsabilidad.
- source_word: שַׁעֲשְׁגַז
  english_pob_choice: Shaashgaz
  chosen_spanish: Shaashgaz
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa para conservar la forma del original.
- source_word: סְרִיס הַמֶּלֶךְ
  english_pob_choice: the king’s eunuch
  chosen_spanish: el eunuco del rey
  alternatives_spanish:
  - el oficial del rey
  lexicon: HALOT
  rationale: En el contexto persa, סריס suele designar un eunuco. Se mantiene «eunuco» por precisión léxica y coherencia con el audit trail inglés.
- source_word: שֹׁמֵר הַפִּילַגְשִׁים
  english_pob_choice: keeper of the concubines
  chosen_spanish: guardián de las concubinas
  alternatives_spanish:
  - encargado de las concubinas
  - custodio de las concubinas
  lexicon: HALOT
  rationale: El participio indica a quien cuida o custodia. «Guardián» reproduce bien esa función de resguardo y encargo en un contexto de corte.
- source_word: לֹא תָבֹוא עוֹד אֶל הַמֶּלֶךְ
  english_pob_choice: She would not go in again to the king
  chosen_spanish: No volvería a entrar al rey
  alternatives_spanish:
  - No iría otra vez al rey
  - No entraría de nuevo al rey
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de acceso a la presencia del rey sin explicitar la implicación sexual. «Volvería a entrar» mantiene el valor de repetición de עוֹד.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: sino cuando
  alternatives_spanish:
  - excepto cuando
  - a menos que
  lexicon: HALOT
  rationale: La construcción introduce la única excepción. En español, «sino cuando» fluye con la oración negativa precedente y mantiene el contraste condicional.
- source_word: חָפֵץ בָּהּ
  english_pob_choice: delighted in her
  chosen_spanish: al rey le agradara en ella
  alternatives_spanish:
  - el rey se complaciera en ella
  - el rey la deseara
  lexicon: HALOT
  rationale: El verbo expresa complacencia/deseo. La formulación impersonal «al rey le agradara en ella» intenta preservar la frase hebrea sin reducirla de modo excesivo a un deseo meramente sexual; «en ella» conserva la locución con בָּהּ.
- source_word: וְנִקְרְאָה בְשֵׁם
  english_pob_choice: and she was summoned by name
  chosen_spanish: y fuera llamada por su nombre
  alternatives_spanish:
  - y fuese llamada por nombre
  - y fuera llamada por nombre
  lexicon: HALOT
  rationale: El pasivo con «llamar» y «por nombre» expresa una convocatoria específica. «Por su nombre» suena natural en español y mantiene la especificación personal del original.
theological_decisions:
- issue: 'La construcción final: autorización especial para volver a la presencia del rey'
  english_pob_reading: She would not go in again to the king unless the king delighted in her and she was summoned by name.
  chosen_spanish_reading: No volvería a entrar al rey, sino cuando al rey le agradara en ella y fuera llamada por su nombre.
  alternative_spanish_readings:
  - No volvería a entrar al rey, excepto que el rey se complaciera en ella y fuera llamada por su nombre.
  - No volvería a entrar al rey, a menos que el rey la deseara y la llamaran por su nombre.
  rationale: La versión mantiene la idea de excepción estricta y no aclara más allá del hebreo. También conserva la tensión del texto entre acceso restringido y favor real, sin convertirla en una paráfrasis explícita.
  doctrine_reference: Ninguna
- issue: El término «eunuco» en el contexto de corte persa
  english_pob_reading: the king’s eunuch
  chosen_spanish_reading: el eunuco del rey
  alternative_spanish_readings:
  - el oficial del rey
  rationale: Se conserva la lectura específica del contexto imperial. Traducirlo como «oficial» diluiría una distinción histórica presente en el texto.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: La traducción inglesa de referencia y su aparato de notas no presentan revisiones pendientes; el pasaje se mantiene en alta concordancia con el texto hebreo y con la decisión óptima-equivalente ya auditada.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «eunuco» y «concubinas» por fidelidad histórica y lexical.
  - La expresión idiomática hebrea de acceso al rey se conserva en forma natural en español sin explicitar más de lo que el texto warrants.
