translation:
  language: es
  text: Y a Maquir le di Galaad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «el Galaad»; en español el nombre del lugar suele funcionar sin artículo.
