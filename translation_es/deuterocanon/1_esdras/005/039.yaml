    rationale: La forma recomendada hoy es «estos» salvo ambigüedad real, que aquí no existe.
  - severity: low
    issue: Coma innecesaria antes de «y no fue hallado»
    rationale: La coma corta artificialmente una estructura ya compleja y resta fluidez sin aportar claridad.
