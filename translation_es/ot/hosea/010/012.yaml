revisions:
- from: Siembren para ustedes mismos para justicia[a]; sieguen conforme a la fidelidad amorosa. Rompan para ustedes mismos la tierra no labrada, porque es tiempo de buscar a Yahvé[b], hasta que él venga y haga llover justicia sobre ustedes.
  to: Siembren para ustedes mismos con miras a la justicia; sieguen según el amor fiel. Rompan para ustedes mismos la tierra no labrada[a], porque es tiempo de buscar a Yahvé[b], hasta que él venga y haga llover justicia sobre ustedes.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al término hebreo נִיר (‘tierra no labrada’ / ‘barbecho’), se mejora la naturalidad de חֶסֶד con ‘amor fiel’, y se aligera la frase inicial sin apartarse del sentido de finalidad en לִצְדָקָה ni del valor benefactivo de לָכֶם.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:10:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa agrícola del hebreo y conserva adecuadamente la lectura principal de וְיֹרֶה como imagen de lluvia, además de mantener la alternativa ''enseñe'' en nota. También respeta el uso de Yahvé para יהוה. Sin embargo, hay dos desajustes importantes con el expediente fuente: la nota [a] está anclada en ''justicia'' pero en realidad corresponde a נִיר (''tierra no labrada'' / ''barbecho''), y ''fidelidad amorosa'' para חֶסֶד suena menos idiomático en español bíblico general que una formulación como ''amor fiel'' o ''amor leal''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'siembren para ustedes mismos para justicia' suena algo pesado por la doble repetición de 'para', y 'fidelidad amorosa' resulta poco natural. 'Sieguen' es correcto, aunque 'cosechen' sería más común; no obstante, 'sieguen' preserva mejor el paralelo con 'siembren'. Conviene mover la nota [a] al sintagma de la tierra y pulir la frase de חֶסֶד para mayor naturalidad y legibilidad.
  glossary_alignment: Se alinea bien con los términos del proyecto en 'Yahvé', 'justicia' para צדקה/צדק en este contexto, y la preservación de la tensión semántica de וְיֹרֶה en nota. No hay conflicto doctrinal mayor. La principal corrección es de anclaje de nota y mejora idiomática de חֶסֶד.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'justicia' pero su contenido ('tierra en barbecho') corresponde a נִיר, no a לִצְדָקָה.
    rationale: El expediente inglés preserva la alternativa léxica para 'unplowed ground/fallow ground', no para 'righteousness'. Esto distorsiona la correspondencia entre texto, nota y evidencia fuente.
  - severity: medium
    issue: '''Fidelidad amorosa'' para חֶסֶד es comprensible pero poco natural en español general de lectura eclesial.'
    rationale: Aunque intenta preservar la densidad pactual de חסד, la formulación suena técnica y menos idiomática. 'Amor fiel' conserva mejor la combinación de lealtad y afecto con español más fluido.
  - severity: low
    issue: La secuencia 'para ustedes mismos para justicia' suena pesada por repetición de preposición.
    rationale: No es infiel al hebreo, pero una leve reestructuración mejora la naturalidad sin perder el valor benefactivo/reflexivo ni la meta moral.
  revised_spanish_text: Siembren para ustedes mismos con miras a la justicia; sieguen según el amor fiel. Rompan para ustedes mismos la tierra no labrada[a], porque es tiempo de buscar a Yahvé[b], hasta que él venga y haga llover justicia sobre ustedes.
  revised_footnotes:
  - marker: a
    text: O ‘tierra en barbecho’.
    reason: lexical_alternative
  - marker: b
    text: O ‘hasta que él venga y les enseñe justicia’. El verbo hebreo puede significar ‘enseñar’, pero la imaginería agrícola de este versículo favorece ‘hacer llover’.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda al término hebreo נִיר (‘tierra no labrada’ / ‘barbecho’), se mejora la naturalidad de חֶסֶד con ‘amor fiel’, y se aligera la frase inicial sin apartarse del sentido de finalidad en לִצְדָקָה ni del valor benefactivo de לָכֶם.
