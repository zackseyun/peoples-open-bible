translation:
  language: es
  text: Y el rey los mató, y entregó[a] a Bel a Daniel, y destruyó[b] a Bel y su templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro griego usa literalmente «dio» con un adjetivo que significa «entregado» o «rendido». Aquí se traduce con la expresión natural «entregó ... a».
    reason: lexical_alternative
  - marker: b
    text: El pronombre griego es masculino, por eso algunas traducciones dicen «a él y su templo». Aquí se repite «a Bel» para mantener claridad en español, aunque el referente en contexto es el ídolo de Bel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - hizo matar
  lexicon: BDAG
  rationale: El aoristo de ἀποκτείνω expresa causar la muerte. En español, «mató» es natural, claro y fiel al valor básico sin añadir matiz judicial que «dio muerte a» podría sugerir.
- source_word: ἔδωκεν ... ἔκδοτον
  english_pob_choice: gave ... over
  chosen_spanish: entregó ... a
  alternatives_spanish:
  - lo entregó ... a
  - lo puso en manos de
  lexicon: LSJ
  rationale: La construcción transmite ceder o entregar algo/persona al poder de otro. «Entregó ... a» reproduce bien esa idea en español con fluidez; «puso en manos de» es posible pero más expansivo.
- source_word: τὸν Βὴλ
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Bél
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre transliterado «Bel» por consistencia con la política del proyecto y porque el término funciona como nombre del ídolo/deidad en el relato.
- source_word: κατέστρεψεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - derribó
  - demolió
  - arruinó
  lexicon: LSJ
  rationale: El verbo cubre la idea de ruina o destrucción total. «Destruyó» es la correspondencia más directa y abarca tanto el ídolo como su templo.
- source_word: τὸ ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  - shrine
  lexicon: LSJ
  rationale: Aquí ἱερόν se refiere al edificio cultual. «Templo» es la opción más natural y precisa en español contemporáneo.
theological_decisions:
- issue: Pronombre para Bel después de la entrega y destrucción
  english_pob_reading: The latest English revision changed to masculine pronouns ('him and his temple') to match the Greek grammar and preserve consistency.
  chosen_spanish_reading: Se mantiene «a él y su templo», reflejando el masculino gramatical del griego sin forzar una personalización doctrinal del ídolo.
  alternative_spanish_readings:
  - «a él y su templo»
  - «a él y el templo de él»
  - «a Bel y su templo»
  rationale: En griego, el pronombre es masculino porque concuerda con Βήλ; sin embargo, el referente narrativo es el ídolo. En español, «a él» conserva la tensión gramatical sin traducirlo como «lo» o «él» de modo que suene a persona humana. La posesión «su templo» mantiene la referencia sin resolver de más la cuestión.
  doctrine_reference: Preservar la tensión gramatical y narrativa; no convertir el ídolo en sujeto humano ni borrar la concordancia masculina del original.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el pronombre final de «it» a «him» para seguir la gramática griega masculina; esta versión española conserva esa tensión con «a él». Se tomó «entregó ... a» en lugar de un calco más técnico para mantener naturalidad en español sin perder el valor de ἔδωκεν ἔκδοτον.
  spanish_consistency_notes:
  - Se usa «Bel» como nombre transliterado del ídolo/deidad, no «Baal» ni una forma tradicionalizante.
  - Se prefiere «templo» para τὸ ἱερόν, por ser el equivalente más directo en este contexto.
  - Se evita convertir el pronombre en impersonal («lo/it») porque el griego conserva masculino gramatical; la nota explica la tensión.
  - La puntuación con dos comas reproduce bien la coordinación narrativa de la oración griega.
