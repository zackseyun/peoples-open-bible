review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: tanto ὁ ἀσεβῶν como ἡ ἀσέβεια αὐτοῦ quedan bajo el mismo predicado, y ἐν ἴσῳ está bien representado con «igualmente». También preserva la nota alternativa verbal («odiados por Dios»), acorde con el rastro inglés. Sin embargo, «detestables para Dios» suena menos natural y algo más débil o evaluativo en español que una formulación más directa como «odiosos a Dios» o la alternativa pasiva documentada. Dado el objetivo de legibilidad e idoneidad eclesial, conviene un pequeño ajuste.'
  spanish_quality_summary: «Pues tanto el hombre impío como su impiedad son igualmente detestables para Dios» es comprensible, pero «detestables para Dios» no es la colocación más idiomática en español bíblico moderno. Una redacción más natural y fiel al matiz predicativo es «son igualmente odiosos a Dios», que mantiene el valor adjetival sin caer en un giro pasivo principal. El resto del verso es claro y bien formado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Impío / impiedad» preserva bien la relación cognada de ἀσεβῶν / ἀσέβεια. «Dios» para θεῷ es correcto. La nota alternativa con «odiados por Dios» conserva la opción verbal documentada en el POB inglés.
  issues:
  - severity: medium
    issue: Colocación poco natural en «detestables para Dios»
    rationale: Aunque semánticamente posible, en español suena menos idiomático que «odiosos a Dios» o la alternativa pasiva. El proyecto pide español moderno y digno, evitando giros poco naturales.
  - severity: low
    issue: La conjunción inicial «Pues» es aceptable pero no necesaria
    rationale: «Porque» también sería válido para γάρ, pero «Pues» no constituye error. No requiere cambio obligatorio.
