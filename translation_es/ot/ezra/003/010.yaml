translation:
  language: es
  text: Cuando los constructores echaron los cimientos del templo de Yahvé[a], colocaron a los sacerdotes, vestidos con sus vestiduras sacerdotales, con trompetas, y a los levitas, hijos de Asaf, con címbalos, para alabar a Yahvé, conforme a las instrucciones de David, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de David, rey de Israel», un modismo que significa conforme a la instrucción o prescripción de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִסְּדוּ
  english_pob_choice: laid the foundation
  chosen_spanish: echaron los cimientos
  alternatives_spanish:
  - pusieron los cimientos
  - fundaron
  lexicon: HALOT
  rationale: En este contexto de construcción del templo, יסד se refiere a poner los cimientos del edificio. «Echaron los cimientos» es una equivalencia natural y fiel al acto constructivo concreto, mientras que «fundaron» sería menos preciso en español.
- source_word: הַבֹּנִים
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los edificadores
  - los que construían
  lexicon: HALOT
  rationale: El participio funciona como sustantivo para quienes realizan la obra. «Constructores» conserva esa referencia personal y suena natural en español bíblico moderno.
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - la casa de Yahvé
  - el santuario de Yahvé
  lexicon: HALOT
  rationale: הֵיכָל designa el templo como edificio sagrado; «templo» es la traducción más clara aquí. Se conserva «Yahvé» según el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino conforme al estándar del proyecto, evitando la sustitución por un título como «Señor».
- source_word: וַיַּעֲמִידוּ
  english_pob_choice: they stationed
  chosen_spanish: colocaron
  alternatives_spanish:
  - pusieron
  - instalaron
  - designaron
  lexicon: HALOT
  rationale: El verbo en este contexto indica disponer a personas para el servicio litúrgico. «Colocaron» comunica con naturalidad esa disposición ceremonial sin introducir un matiz administrativo más fuerte que el del hebreo.
- source_word: הַכֹּהֲנִים מְלֻבָּשִׁים
  english_pob_choice: the priests, clothed in their vestments
  chosen_spanish: a los sacerdotes, vestidos con sus ornamentos
  alternatives_spanish:
  - a los sacerdotes, ataviados
  - a los sacerdotes, revestidos con sus vestiduras
  lexicon: HALOT
  rationale: מְלֻבָּשִׁים significa «vestidos». En contexto cultual, «ornamentos»/«vestiduras» explicita el carácter ceremonial de la indumentaria sin perder el sentido básico.
- source_word: בַּחֲצֹצְרוֹת
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - con las trompetas
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת son trompetas ceremoniales; «con trompetas» es español natural y suficientemente específico en este contexto litúrgico.
- source_word: וְהַלְוִיִּם בְּנֵי אָסָף
  english_pob_choice: and the Levites, the sons of Asaph
  chosen_spanish: y a los levitas, hijos de Asaf
  alternatives_spanish:
  - y a los levitas, los hijos de Asaf
  - y a los levitas, descendientes de Asaf
  lexicon: HALOT
  rationale: Se conserva la designación familiar/asociativa «hijos de Asaf», que identifica a los músicos levíticos vinculados con esa línea. El añadido de la preposición en español mantiene la coordinación del verso.
- source_word: בַּמְצִלְתַּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con címbalos de bronce
  - con campanillas
  lexicon: HALOT
  rationale: El instrumento musical corresponde a «címbalos». Se usa el término tradicional y comprensible en español bíblico.
- source_word: לְהַלֵּל אֶת יְהוָה
  english_pob_choice: to praise Yahweh
  chosen_spanish: para alabar a Yahvé
  alternatives_spanish:
  - para loar a Yahvé
  - para dar alabanza a Yahvé
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Alabar» transmite de modo directo el sentido de הלל en este contexto cultual.
- source_word: עַל יְדֵי דָּוִיד
  english_pob_choice: according to the directions of David
  chosen_spanish: conforme a las instrucciones de David
  alternatives_spanish:
  - según la prescripción de David
  - por mano de David
  lexicon: HALOT
  rationale: La expresión idiomática literalmente «por la mano de David» aquí indica regulación o prescripción davidica. «Conforme a las instrucciones de David» comunica esa idea sin oscurecer el sentido para el lector moderno.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey de Israel
  lexicon: HALOT
  rationale: Título real directo y sin variación necesaria.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue el estándar doctrinal del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio revelado a Israel y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עַל יְדֵי דָּוִיד en contexto litúrgico
  english_pob_reading: according to the directions of David
  chosen_spanish_reading: conforme a las instrucciones de David
  alternative_spanish_readings:
  - según la prescripción de David
  - por mano de David
  rationale: La expresión hebrea es idiomática y no describe una acción física de David, sino una pauta establecida por él para la alabanza del templo. La redacción elegida conserva esa relación histórica y normativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El contexto fuente y el audit trail en inglés muestran alta concordancia y ninguna revisión aplicada en la última pasada. La versión española sigue esa línea, manteniendo las decisiones léxicas principales y la nota idiomática sobre «por la mano de David».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Címbalos» y «trompetas» conservan el vocabulario cultual apropiado sin modernizar en exceso.
  - La sintaxis prioriza claridad natural en español sin perder la secuencia del hebreo.
  - La nota [a] se ancla en «templo de Yahvé» para señalar la alternativa idiomática de עַל יְדֵי דָּוִיד.
