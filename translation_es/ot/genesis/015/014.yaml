translation:
  language: es
  text: Pero yo también juzgaré a la nación a la que servirán[a], y después saldrán con grandes posesiones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la que serán esclavizados»; el hebreo usa literalmente «servir», pero en contexto se refiere a un servicio forzado bajo una nación extranjera.
    reason: lexical_alternative
  - marker: b
    text: O «con gran riqueza» o «con abundantes bienes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: But I will also
  chosen_spanish: Pero yo también
  alternatives_spanish:
  - Y también
  - Pero también
  lexicon: HALOT
  rationale: El hebreo añade continuidad con énfasis. En español, «Pero yo también» conserva la relación con el contexto previo y la fuerza enfática de la primera persona, sin forzar una construcción poco natural.
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - ese pueblo
  - la gente
  lexicon: HALOT
  rationale: גּוֹי aquí designa una potencia nacional extranjera. «La nación» es la equivalencia directa y mantiene el referente político del texto.
- source_word: אֲשֶׁר יַעֲבֹדוּ
  english_pob_choice: that they serve
  chosen_spanish: a la que servirán
  alternatives_spanish:
  - que servirán
  - a la que estarán sometidos
  lexicon: HALOT
  rationale: El verbo עבד en qal significa «servir/trabajar para». En español, «servirán» reproduce el valor verbal sin convertirlo de entrada en una paráfrasis de esclavitud; la nota conserva la tensión lexical que en contexto implica servidumbre forzada.
- source_word: דָּן אָנֹכִי
  english_pob_choice: I will judge
  chosen_spanish: juzgaré
  alternatives_spanish:
  - haré juicio
  - castigaré
  lexicon: HALOT
  rationale: La forma enfática expresa acción judicial divina. «Juzgaré» preserva el lenguaje forense del hebreo sin reducirlo a «castigaré», que sería más interpretativo.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: La frase marca secuencia temporal simple. «Y después» es natural en español y conserva el orden del evento.
- source_word: יֵצְאוּ
  english_pob_choice: they will come out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrán fuera
  - vendrán a salir
  lexicon: HALOT
  rationale: יצא significa «salir». En español, «saldrán» es la forma más directa y natural, manteniendo la imagen de salida desde la situación de opresión.
- source_word: בִּרְכֻשׁ גָּדוֹל
  english_pob_choice: with great possessions
  chosen_spanish: con grandes posesiones
  alternatives_spanish:
  - con gran riqueza
  - con abundantes bienes
  lexicon: HALOT
  rationale: רְכוּשׁ es «posesiones/bienes/propiedad». «Grandes posesiones» conserva lo concreto del término hebreo y evita reducirlo solo a riqueza abstracta.
theological_decisions:
- issue: Naturaleza del juicio divino sobre la nación opresora
  english_pob_reading: judge
  chosen_spanish_reading: juzgaré
  alternative_spanish_readings:
  - castigaré
  - condenaré
  rationale: Se mantiene el registro judicial del hebreo דָּן y la apertura del texto a juicio divino sin especificar más de lo que el verso dice. Esto preserva la tensión entre juicio legal y sanción efectiva.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El pasaje fue revisado con acuerdo alto en el contexto inglés; no se reportaron cambios pendientes. La versión española mantiene esa lectura estable, conservando la tensión lexical de עבד y la amplitud de רְכוּשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otras secciones para el nombre divino; aquí el verso no lo contiene.
  - Se conserva «nación» para גּוֹי cuando el referente es una potencia extranjera.
  - Se mantiene el verbo judicial «juzgar» para דָּן, evitando sustituirlo por una paráfrasis teológica más estrecha.
  - Las notas siguen el criterio de registrar alternativas reales del hebreo sin duplicar el texto principal.
