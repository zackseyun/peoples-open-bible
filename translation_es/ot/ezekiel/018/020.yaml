revisions:
- from: La persona que peca[a]—esa morirá. El hijo no llevará la iniquidad del padre, ni el padre llevará la iniquidad del hijo. La justicia[b] del justo será sobre él, y la maldad del malvado será sobre él.
  to: La persona que peca[a]—esa misma morirá. El hijo no llevará[b] la iniquidad del padre, ni el padre llevará[b] la iniquidad del hijo. La justicia del justo será sobre él, y la maldad del malvado será sobre él.
  rationale: Se corrige la nota léxica para preservar la alternativa más literal documentada ('alma') y se reubica la nota jurídica al verbo/frase que realmente explica ('llevar la iniquidad'). También se suaviza 'esa morirá' a 'esa misma morirá' para mejor naturalidad sin perder el énfasis del hebreo.
