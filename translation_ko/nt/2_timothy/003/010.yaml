id: 2TI.3.10
reference: 2 Timothy 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σὺ δὲ ⸀παρηκολούθησάς μου τῇ διδασκαλίᾳ, τῇ ἀγωγῇ, τῇ προθέσει, τῇ πίστει, τῇ μακροθυμίᾳ, τῇ ἀγάπῃ, τῇ ὑπομονῇ,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/010.yaml
  text: But you have closely followed my teaching, conduct, purpose, faith, patience, love, endurance,
translation:
  language: ko
  text: 그러나 그대는 나의 가르침과 행실과 목적과 믿음과 오래 참음과 사랑과 인내를 가까이서 따랐고,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρηκολούθησάς
  english_pob_choice: have closely followed
  chosen_korean: 가까이서 따랐고
  alternatives_korean:
  - 면밀히 따랐고
  - 좇아왔고
  lexicon: BDAG
  rationale: παρακολουθέω는 「곁에서 따라감·면밀히 좇음」. 「가까이서 따르다」가 그 친밀한 동행과 면밀한 관찰을 함께 담는다.
- source_word: διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_korean: 가르침
  alternatives_korean:
  - 교훈
  - 교리
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 διδασκαλία는 「가르침/교훈」으로 옮긴다. 본 절은 바울의 인격적 본을 가리키는 목록이므로 「가르침」이 자연스럽다.
- source_word: ἀγωγῇ
  english_pob_choice: conduct
  chosen_korean: 행실
  alternatives_korean:
  - 처신
  - 삶의 방식
  lexicon: BDAG
  rationale: ἀγωγή는 「삶의 양식·처신」. 「행실」이 한국 성서 전통의 자연스러운 어휘이다.
- source_word: προθέσει
  english_pob_choice: purpose
  chosen_korean: 목적
  alternatives_korean:
  - 뜻
  - 의도
  lexicon: BDAG
  rationale: 1:9와 동일 어휘. 「목적」으로 통일한다.
- source_word: μακροθυμίᾳ ... ὑπομονῇ
  english_pob_choice: patience ... endurance
  chosen_korean: 오래 참음 ... 인내
  alternatives_korean:
  - 인내 ... 인내
  - 길이 참음 ... 견딤
  lexicon: BDAG
  rationale: μακροθυμία(긴 호흡으로 참음·관용)와 ὑπομονή(외부 압력 아래 견딤)를 구별하여 「오래 참음」과 「인내」로 옮긴다. 한국 성서 전통과 일치.
