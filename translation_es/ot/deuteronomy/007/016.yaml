translation:
  language: es
  text: Y consumirás[a] a todos los pueblos que Yahvé tu Dios te da. Tu ojo no los perdonará, y no servirás a sus dioses, porque eso[b] será un lazo[c] para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los comerás’ o ‘los destruirás’. El verbo hebreo significa literalmente ‘comer/consumir’ y aquí se usa idiomáticamente para indicar derrota total.
    reason: lexical_alternative
  - marker: b
    text: O ‘él’. El pronombre hebreo puede referirse de manera más general a la situación idólatra, aunque el sentido inmediato apunta a servir a sus dioses.
    reason: alternative_reading
  - marker: c
    text: O ‘trampa’. El hebreo מוֹקֵשׁ designa un lazo o trampa de captura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  english_pob_choice: you shall consume
  chosen_spanish: consumirás
  alternatives_spanish:
  - los comerás
  - los devorarás
  - los destruirás
  lexicon: HALOT
  rationale: אכל literalmente es ‘comer’, pero en contexto de guerra y juicio expresa aniquilación/consumo total. ‘Consumirás’ conserva la fuerza figurada sin volverlo demasiado literal ni interpretar de más con ‘destruirás’.
- source_word: כָּל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - a todas las naciones
  - a todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים es plural de ‘pueblo’; ‘pueblos’ refleja mejor grupos étnicos diferenciados que ‘naciones’, aunque ambas opciones son posibles.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  english_pob_choice: whom Yahweh your God is giving to you
  chosen_spanish: que Yahvé tu Dios te da
  alternatives_spanish:
  - que Yahvé tu Dios te está dando
  - que Yahvé tu Dios te entrega
  lexicon: HALOT
  rationale: El participio hebreo tiene sentido de acción en curso o inminente; en español, el presente ‘te da’ comunica de forma natural esa acción divina continua sin forzar el aspecto. Se conserva Yahvé como nombre propio divino.
- source_word: לֹא תָחֹס עֵינְךָ עֲלֵיהֶם
  english_pob_choice: Your eye shall not spare them
  chosen_spanish: Tu ojo no los perdonará
  alternatives_spanish:
  - Tu ojo no se compadecerá de ellos
  - Tu ojo no los tendrá por dignos de piedad
  lexicon: HALOT
  rationale: 'La expresión hebrea es un modismo: ‘no tener piedad / no perdonar’. En español, ‘Tu ojo no los perdonará’ conserva la imagen corporal y la idea de no mostrarse indulgente; ‘compadecerse’ explicita el sentido pero pierde parte del giro idiomático.'
- source_word: וְלֹא תַעֲבֹד אֶת אֱלֹהֵיהֶם
  english_pob_choice: and you shall not serve their gods
  chosen_spanish: y no servirás a sus dioses
  alternatives_spanish:
  - y no adorarás a sus dioses
  - y no rendirás servicio a sus dioses
  lexicon: HALOT
  rationale: עבד con dioses suele implicar servicio de lealtad religiosa; ‘servir’ es más cercano al hebreo y más amplio que ‘adorar’, que estrecha el sentido.
- source_word: כִּי מוֹקֵשׁ הוּא לָךְ
  english_pob_choice: for that would be a snare to you
  chosen_spanish: porque eso será para ti un lazo
  alternatives_spanish:
  - porque será para ti una trampa
  - porque eso te será un lazo
  lexicon: HALOT
  rationale: 'מוֹקֵשׁ significa ‘lazo/trampa’. ‘Lazo’ mantiene el campo semántico de captura y peligro, y ‘eso’ hace explícito el referente inmediato: el servir a los dioses ajenos.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino en consonancia con el criterio del proyecto de no enmascarar el Tetragrámaton con un título.
theological_decisions:
- issue: Referente de כִּי מוֹקֵשׁ הוּא לָךְ
  english_pob_reading: The pronoun refers to serving their gods, rendered as 'for that would be a snare to you.'
  chosen_spanish_reading: 'El pronombre se expresa como ‘eso’, refiriéndose de manera inmediata a servir a sus dioses: ‘porque eso será para ti un lazo’.'
  alternative_spanish_readings:
  - porque él será para ti un lazo
  - porque serán para ti un lazo
  - porque eso te será un lazo
  rationale: El hebreo permite que el pronombre señale de modo general la situación idólatra; la forma española ‘eso’ conserva esa amplitud y, al mismo tiempo, hace inteligible la referencia más inmediata sin cerrar la tensión documental del texto.
  doctrine_reference: Preservar la tensión referencial documentada; no resolverla más allá de la sintaxis y el contexto deuteronómico.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el borrador sigue el estado más reciente con alta concordancia y sin cambios desde el pass más reciente.
  spanish_consistency_notes:
  - Se usa Yahvé para יהוה conforme al criterio del proyecto.
  - Se traduce עַמִּים como ‘pueblos’ para conservar el plural étnico.
  - Se conserva ‘servir’ para עבד con dioses, en vez de ‘adorar’, por cercanía léxica al hebreo.
  - Se mantiene el modismo corporal ‘Tu ojo’ para reflejar la idiomatización hebrea del no-piedad.
  - La nota b deja abierta la ambigüedad del pronombre, conforme al audit trail inglés.
