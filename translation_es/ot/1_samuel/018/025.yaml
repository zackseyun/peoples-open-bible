  to: 'Entonces Saúl dijo: «Así le dirán a David: “El rey no desea un precio de novia[a] sino cien prepucios de filisteos[b], para vengarse de los enemigos del rey”.» Saúl pensaba hacer caer a David[c] en manos de los filisteos.'
  rationale: Se corrigió la ubicación de los marcadores para que cada nota explique exactamente la palabra o frase pertinente, en línea con el rastro auditado. Se mejoró levemente la naturalidad con «Así le dirán a David» y «no desea»; se mantuvo «precio de novia» por fidelidad léxica a מֹהַר y «hacer caer» por respeto a la metáfora hebrea sin sobreinterpretarla. También se simplificó la puntuación y se preservó el tono digno y claro en español.
