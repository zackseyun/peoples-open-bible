base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/012.yaml
  text: 'Then the disciples came and said to him[b][a], "Do you know that the Pharisees were offended when they heard this word?"'
translation:
  language: ko
  text: '그때에 제자들이 다가와서 그에게 말합니다. 「바리새인들이 이 말씀을 듣고 걸려 넘어진 것을 아십니까?」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「분개했다」. 더 문자적으로는 「걸림돌이 되었다」 / 「걸려 넘어졌다」.
    reason: lexical_alternative
  - marker: b
    text: 「이 말씀」은 예수께서 바로 앞에서 하신 말씀을 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: ἐσκανδαλίσθησαν
  english_pob_choice: were offended
  chosen_korean: 걸려 넘어진
  alternatives_korean:
  - 거리끼게 된
  - 분개한
  lexicon: BDAG
  rationale: σκανδαλίζω는 「걸려 넘어지게 하다」가 어근 의미. 글로사리 정책상 σκάνδαλον계열은 「걸림돌/걸려 넘어지다」를 우선으로 옮긴다.
- source_word: τὸν λόγον
  english_pob_choice: this word
  chosen_korean: 이 말씀
  lexicon: BDAG
  rationale: 직전 예수의 가르침을 지시하는 정관사 + 단수 명사. 「이 말씀」으로 지시성을 명시한다.
