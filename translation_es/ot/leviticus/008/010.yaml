translation:
  language: es
  text: Entonces Moisés tomó el aceite de la unción, ungió el tabernáculo y todo lo que había en él[a], y los consagró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificó» o «los hizo santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then Moses took
  chosen_spanish: Entonces Moisés tomó
  alternatives_spanish:
  - Y Moisés tomó
  - Moisés tomó
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración en secuencia; «Entonces» comunica bien ese valor consecutivo en español sin volver la frase pesada.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite de ungir
  - el aceite para la unción
  lexicon: HALOT
  rationale: La construcción hebrea nombra el aceite destinado a ungir. «Aceite de la unción» conserva el sentido cultual y es natural en español; evita añadir «sagrado» porque no aparece explícitamente aquí.
- source_word: וַיִּמְשַׁח
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - anointió
  - aplicó el aceite
  lexicon: HALOT
  rationale: «Ungir» es el equivalente español más fiel para el acto ritual de aplicar aceite con finalidad consagratoria. «Anointió» no es idiomático y «aplicó el aceite» pierde la carga cultual.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda del santuario
  - la morada
  lexicon: HALOT
  rationale: En contextos de Éxodo y Levítico, «tabernáculo» es el término técnico establecido para el santuario portátil.
- source_word: כָּל אֲשֶׁר בּוֹ
  english_pob_choice: all that was in it
  chosen_spanish: todo lo que había en él
  alternatives_spanish:
  - todo lo que estaba dentro de él
  - todo lo que estaba en su interior
  lexicon: HALOT
  rationale: La expresión abarca el contenido del tabernáculo. «Todo lo que había en él» es claro, fiel y no sobretraduce.
- source_word: וַיְקַדֵּשׁ אֹתָם
  english_pob_choice: and consecrated them
  chosen_spanish: y los consagró
  alternatives_spanish:
  - y los santificó
  - y los hizo santos
  lexicon: HALOT
  rationale: En contexto sacerdotal, קדשׁ expresa la puesta aparte ritual. «Consagró» conserva ese valor cultual en español y evita cargar el verbo con matices doctrinales posteriores de «santificar».
theological_decisions:
- issue: Valor cultual de קדשׁ en una acción ritual sobre el tabernáculo y sus utensilios
  english_pob_reading: consecrated them
  chosen_spanish_reading: los consagró
  alternative_spanish_readings:
  - los santificó
  - los hizo santos
  rationale: El contexto trata de la dedicación ritual del tabernáculo y su contenido. «Consagró» expresa apropiadamente la separación para uso santo sin perder la dimensión ceremonial.
  doctrine_reference: Translation philosophy §6; consistencia terminológica cultual
- issue: Expresión del aceite de unción sin añadir cualificativos no atestiguados
  english_pob_reading: the anointing oil
  chosen_spanish_reading: el aceite de la unción
  alternative_spanish_readings:
  - el aceite sagrado de la unción
  - el aceite para ungir
  rationale: El texto hebreo identifica el aceite por su función; no exige la adición de «sagrado». La forma elegida mantiene la precisión y la sobriedad del pasaje.
  doctrine_reference: Translation philosophy §5; fidelidad léxica al sustantivo en constructo
translation_notes:
  revision_awareness: La versión inglesa auditada eliminó el sujeto explícito repetido «he» en la segunda cláusula para mayor fluidez. En español se mantiene la misma elipsis natural con «y los consagró», sin repetir «él».
  spanish_consistency_notes:
  - Se conserva el nombre propio «Moisés» y el término técnico «tabernáculo» para mantener consistencia con el vocabulario cultual del Pentateuco.
  - «Ungió» y «consagró» distinguen el acto físico-ritual de la acción de apartar para uso santo, sin fusionar ambos sentidos.
  - Se evita «Señor» o «SEÑOR» porque en este versículo no aparece el tetragrámaton ni una sustitución divina.
  - La nota al pie recoge la alternativa lexical relevante que en inglés fue documentada para קדשׁ.
