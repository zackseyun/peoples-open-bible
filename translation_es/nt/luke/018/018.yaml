translation:
  language: es
  text: 'Entonces un dirigente le preguntó, diciendo: «Maestro bueno, ¿qué debo hacer para heredar la vida eterna[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿qué, habiendo hecho, heredaré la vida eterna?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησέν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - le preguntó
  - interrogó
  lexicon: BDAG
  rationale: ἐπερωτάω aquí expresa una pregunta dirigida a Jesús. En español, «preguntó» es natural, claro y fiel al acto discursivo sin cargar una formalidad excesiva.
- source_word: τις
  english_pob_choice: a
  chosen_spanish: un[a]
  alternatives_spanish:
  - alguien
  - cierto
  lexicon: BDAG
  rationale: El indefinido introduce a una persona no identificada; en español puede incorporarse como artículo indefinido con el sustantivo siguiente. La forma depende del género implícito del sustantivo «gobernante»; se marca el artículo indefinido sin forzar una identificación adicional.
- source_word: ἄρχων
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - jefe
  - líder
  - funcionario
  lexicon: BDAG
  rationale: ἄρχων señala a una persona con autoridad. «Gobernante» conserva la amplitud de autoridad sin especificar un cargo técnico que el texto no da.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio funciona de manera discursiva y se traduce de forma directa con «diciendo», manteniendo el flujo narrativo del griego.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro de enseñanza
  - Profesor
  lexicon: BDAG
  rationale: διδάσκαλος significa «maestro/teacher». En español, «Maestro» es natural en el saludo directo y refleja la función docente sin imponer una connotación eclesiástica fija.
- source_word: ἀγαθέ
  english_pob_choice: Good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - excelente
  lexicon: BDAG
  rationale: ἀγαθός aquí califica al vocativo «Maestro». «Bueno» conserva la sencillez semántica del original y mantiene la tensión narrativa que Jesús responderá en el versículo siguiente.
- source_word: τί ποιήσας
  english_pob_choice: what must I do
  chosen_spanish: ¿qué debo hacer
  alternatives_spanish:
  - ¿qué, habiendo hecho, heredaré?
  - ¿qué tengo que hacer?
  lexicon: BDAG
  rationale: La construcción participial aorista con el futuro expresa medio o requisito. «¿Qué debo hacer?» comunica en español la pregunta de requisito de forma idiomática, sin perder el sentido de condición previa.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida del siglo venidero
  lexicon: BDAG
  rationale: La frase se vierte con el giro establecido en español bíblico y contemporáneo. «La vida eterna» es fiel, natural y conserva el valor escatológico de αἰώνιος.
- source_word: κληρονομήσω
  english_pob_choice: inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir en herencia
  - obtener
  lexicon: BDAG
  rationale: Se preserva el lenguaje de herencia porque es lexicál y teológicamente significativo. «Heredar» reproduce el campo semántico de κληρονομέω con naturalidad en español.
theological_decisions:
- issue: La relación entre acción humana y herencia de la vida eterna
  english_pob_reading: what must I do to inherit eternal life
  chosen_spanish_reading: ¿qué debo hacer para heredar la vida eterna?
  alternative_spanish_readings:
  - ¿qué haré para heredar la vida eterna?
  - ¿qué, habiendo hecho, heredaré la vida eterna?
  rationale: La pregunta del gobernante se conserva como su propia formulación sobre requisito/acción, sin corregirla ni armonizarla con una explicación doctrinal posterior. Así se mantiene la tensión teológica que el POB documenta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés POB. No se detectaron revisiones textuales en el pasaje; la decisión principal fue mantener el sentido de requisito de τί ποιήσας con una formulación idiomática en español, conservando además la alternativa más literal en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando corresponda; en este versículo no aparece el nombre divino.
  - Se mantuvo «vida eterna» como término escatológico establecido en español.
  - Se evitó «Cristo» y «SEÑOR» porque no aparecen en el texto fuente.
  - «Maestro» se eligió por precisión léxica en el vocativo, no como título litúrgico.
