translation:
  language: es
  text: ¿Quién es este? Llamémoslo dichoso[a], porque ha hecho maravillas entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego aquí difiere sustancialmente: «Un hombre instruido ha conocido muchas cosas, y el de mucha experiencia expondrá discernimiento». Esto probablemente refleja una forma textual distinta o una alineación diferente del versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: מי הוא זה
  english_pob_choice: Who is this?
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es él?
  - ¿Quién es este hombre?
  lexicon: HALOT
  rationale: Conserva la fuerza retórica del hebreo y el valor demostrativo de זה sin añadir un sustantivo innecesario. En español, la forma interrogativa breve suena natural y mantiene el tono de admiración.
- source_word: ונאשרנו
  english_pob_choice: Let us call him blessed
  chosen_spanish: Que lo tengamos por bendito
  alternatives_spanish:
  - Bendigámoslo
  - Llamémoslo bienaventurado
  - Pronunciémoslo bendito
  lexicon: HALOT
  rationale: La raíz אשר aquí expresa declarar a alguien feliz/bendito. En español, 'tener por bendito' comunica esa valoración declarativa sin forzar un giro demasiado devocional o eclesiástico. El subjuntivo exhortativo refleja bien el matiz cohortativo.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Introduce la razón del encomio. 'Porque' es la correspondencia más natural y clara en español.
- source_word: הפליא
  english_pob_choice: has done wonders
  chosen_spanish: ha hecho maravillas
  alternatives_spanish:
  - ha obrado maravillosamente
  - ha hecho algo extraordinario
  - se ha distinguido
  lexicon: HALOT
  rationale: La forma causativa de פלא expresa acción extraordinaria o maravillosa. 'Ha hecho maravillas' mantiene el registro elevado y el sentido de acto sorprendente sin especificar más de lo que el hebreo dice.
- source_word: לעשות
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - para hacer
  - al hacer
  lexicon: HALOT
  rationale: En combinación con הפליא, el infinitivo se integra naturalmente al español como perfecto compuesto. 'Ha hecho' conserva la acción realizada.
- source_word: בעמו
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - en su pueblo
  - para su pueblo
  - en medio de su pueblo
  lexicon: HALOT
  rationale: '''Entre su pueblo'' refleja el valor locativo-relacional de ב sin añadir explícitamente una idea de beneficio que el hebreo no exige. También mantiene una lectura pública y comunitaria adecuada al elogio.'
- source_word: Ἀνὴρ πεπαιδευμένος ἔγνω πολλά, καὶ ὁ πολύπειρος ἐκδιηγήσεται σύνεσιν
  english_pob_choice: The Greek parallel here differs substantially
  chosen_spanish: Un hombre instruido ha conocido muchas cosas, y el de mucha experiencia narrará entendimiento.
  alternatives_spanish:
  - Un hombre educado ha conocido mucho, y el muy experimentado expondrá discernimiento.
  - El hombre instruido conoce muchas cosas, y el experimentado contará entendimiento.
  lexicon: NA/Greek parallel
  rationale: No se adopta como texto principal por la fuerte divergencia con el hebreo transmitido, pero se preserva en nota como testimonio alternativo. Si se lee en español, πεπαιδευμένος se vierte como 'instruido' y πολύπειρος como 'de mucha experiencia' para conservar el contraste entre formación y experiencia.
theological_decisions:
- issue: Divergencia textual entre el hebreo transmitido y el paralelo griego
  english_pob_reading: 'The Greek parallel here differs substantially: ''A learned man has known many things, and one with much experience will recount understanding.'' This likely reflects a different textual form or verse alignment.'
  chosen_spanish_reading: Se traduce el hebreo conservado como texto principal y se indica en nota que el paralelo griego difiere sustancialmente.
  alternative_spanish_readings:
  - 'Tomar el griego como base: ''Un hombre instruido ha conocido muchas cosas, y el de mucha experiencia narrará entendimiento.'''
  - Presentar ambos como una doble redacción sin prioridad.
  rationale: Conforme al criterio del proyecto, cuando el hebreo existe y el griego ofrece una línea claramente distinta, el hebreo gobierna el texto principal. La nota preserva honestamente la tensión textual sin armonizarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el griego como testigo y preservar la incertidumbre con honestidad.'
translation_notes:
  revision_awareness: La versión sigue el hebreo Kahana/Sefaria como lectura principal, y conserva el paralelo griego de Swete solo como lectura alternativa por la discrepancia sustancial ya señalada en el audit trail inglés. No se introdujeron cambios respecto del último pase revisado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Cristo/Mesías' porque no aparece en el verso.
  - '''Bendito'' se usa en sentido declarativo, no como fórmula litúrgica.'
  - '''Maravillas'' conserva el tono elevado del hebreo פלא sin sobredeterminar el tipo de acción.'
