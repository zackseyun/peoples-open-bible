review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: la restricción exclusiva de כִּי אִם, el lugar elegido por Yahvé, la repetición enfática de «allí», y la referencia a los holocaustos y a hacer todo lo mandado. También mantiene correctamente «Yahvé» para יְהוָה y conserva «tribus» con nota cultural. Sin embargo, omite en español la nota léxica alternativa que el inglés preservó para כִּי אִם («excepto en el lugar...»), y «yo te mando» suaviza un poco el participio durativo מְצַוֶּךָּ frente a una opción más cercana como «yo te estoy mandando» o «yo te ordeno».'
  spanish_quality_summary: 'El texto es claro, natural y digno en español. «Pero solo en el lugar...» suena bien en contexto, y «allí ofrecerás tus holocaustos» es legible y fiel. La principal mejora necesaria es documental: preservar la alternativa lexical del inglés en nota, y ajustar levemente la cláusula final para reflejar mejor el valor del participio hebreo sin volverla rígida.'
  glossary_alignment: 'Hay buena alineación con el glosario del proyecto: יְהוָה → «Yahvé» está correcto; עֹלָה → «holocaustos» es una opción técnica válida y bien justificada en español bíblico; «tribus» conserva el término pactal del hebreo. No hay conflictos con terminología doctrinal mayor.'
