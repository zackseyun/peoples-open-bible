translation:
  language: es
  text: Y será[a] que, cuando peque y se haga culpable, restituirá lo que tomó por robo, o lo que obtuvo por opresión[b], o el depósito que le fue confiado, o la cosa perdida que halló[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si peca y se hace culpable». La fórmula legal hebrea también puede traducirse en sentido hipotético; aquí se conserva «cuando» por su valor casuístico.
    reason: lexical_alternative
  - marker: b
    text: O «lo que extorsionó» o «lo que defraudó». El término hebreo puede denotar apropiación opresiva, abusiva o fraudulenta de bienes ajenos.
    reason: lexical_alternative
  - marker: c
    text: O «la propiedad perdida que halló». El hebreo se refiere a un bien perdido encontrado por el culpable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula legal hebrea se conserva con un futuro impersonal y formal en español. «Sucederá» mantiene el carácter casuístico sin sonar mecánico.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: En este contexto jurídico, el caso se presenta como una situación esperable; «cuando» sigue la decisión de POB en inglés y su valor casuístico.
- source_word: יֶחֱטָא
  english_pob_choice: he sins
  chosen_spanish: peque
  alternatives_spanish:
  - cometa pecado
  - haga mal
  lexicon: HALOT
  rationale: «Peque» es claro, bíblico y natural; conserva la fuerza moral de חטא sin volverse pesado.
- source_word: וְאָשֵׁם
  english_pob_choice: becomes guilty
  chosen_spanish: se haga culpable
  alternatives_spanish:
  - incurra en culpa
  - quede culpable
  lexicon: HALOT
  rationale: La idea es volverse jurídicamente culpable o responsable; «se haga culpable» mantiene esa transición de estado sin añadir introspección no requerida.
- source_word: וְהֵשִׁיב
  english_pob_choice: he shall restore
  chosen_spanish: restituirá
  alternatives_spanish:
  - devolverá
  - restaurará
  lexicon: HALOT
  rationale: En contexto de reparación legal, «restituirá» expresa mejor la obligación de compensación que un simple «devolverá».
- source_word: הַגְּזֵלָה אֲשֶׁר גָּזָל
  english_pob_choice: what he took by robbery
  chosen_spanish: lo que tomó por robo
  alternatives_spanish:
  - lo robado que robó
  - la cosa que robó
  lexicon: HALOT
  rationale: Se conserva el sentido de sustracción violenta o ilícita con una construcción idiomática en español. «Por robo» evita sobretraducir el sustantivo abstracto.
- source_word: הָעֹשֶׁק אֲשֶׁר עָשָׁק
  english_pob_choice: what he extorted
  chosen_spanish: lo que extorsionó
  alternatives_spanish:
  - lo que oprimió
  - lo que obtuvo por opresión
  - lo que defraudó
  lexicon: HALOT
  rationale: POB en inglés eligió un verbo que expresa apropiación abusiva; en español «extorsionó» preserva la fuerza de una obtención injusta, aunque el término también puede sonar más fuerte que la simple opresión.
- source_word: הַפִּקָּדוֹן אֲשֶׁר הָפְקַד אִתּוֹ
  english_pob_choice: the deposit that was entrusted to him
  chosen_spanish: el depósito que le fue confiado
  alternatives_spanish:
  - el bien confiado a él
  - la prenda depositada con él
  lexicon: HALOT
  rationale: «Depósito» y «le fue confiado» reproducen la relación de custodia legal de manera clara y formal, sin perder la pasiva del hebreo.
- source_word: הָאֲבֵדָה אֲשֶׁר מָצָא
  english_pob_choice: the lost thing that he found
  chosen_spanish: la cosa perdida que halló
  alternatives_spanish:
  - el objeto perdido que encontró
  - lo perdido que encontró
  lexicon: HALOT
  rationale: «Cosa perdida» conserva la estructura legal de la lista; «halló» es un equivalente digno y directo de מָצָא.
theological_decisions:
- issue: 'Fórmula legal condicional: «when» vs. «if»'
  english_pob_reading: And it shall be, when he sins and becomes guilty
  chosen_spanish_reading: Y sucederá que, cuando peque y se haga culpable
  alternative_spanish_readings:
  - Y sucederá que, si peca y se hace culpable
  rationale: 'Se mantiene la lectura casuística de POB: el caso presupone una situación que puede presentarse como parte del marco legal. «Cuando» conserva mejor el tono de ley que un condicional meramente hipotético.'
  doctrine_reference: Ley casuística en la Torá; formulación legal de responsabilidad
- issue: Guilt as legal liability rather than inner feeling
  english_pob_reading: becomes guilty
  chosen_spanish_reading: se haga culpable
  alternative_spanish_readings:
  - incurra en culpa
  - reconozca su culpa
  rationale: El hebreo puede expresar carga/estado de culpa ante la ley. «Se haga culpable» evita reducirlo a una emoción o a un simple reconocimiento subjetivo.
  doctrine_reference: Responsabilidad moral y jurídica en la ley mosaica
- issue: Restitution as required repair
  english_pob_reading: he shall restore
  chosen_spanish_reading: restituirá
  alternative_spanish_readings:
  - devolverá
  - resarcirá
  rationale: La acción requerida es restitutiva, no solo la devolución física. «Restituirá» conserva el deber de reparación por el daño causado.
  doctrine_reference: Restitución por daño o apropiación indebida
translation_notes:
  revision_awareness: La base inglesa más reciente mantiene la secuencia legal y ajusta la segunda cláusula de apropiación abusiva para lograr paralelismo natural («what he extorted»). La presente versión española sigue esa revisión con un paralelismo equivalente («lo que extorsionó») y conserva la lista de restitución, sin añadir ni omitir elementos del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Restituirá» se eligió por su valor jurídico de reparación, consistente con la terminología POB para devoluciones obligatorias.
  - 'Se mantuvo una lista paralela de cuatro objetos: robo, extorsión, depósito confiado y cosa perdida hallada.'
  - El tono general es legal y sobrio, evitando paráfrasis devocionales o interpretaciones no presentes en el texto.
