review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Samuel habla a toda la casa de Israel, condiciona la liberación a un retorno total a Yahvé, exige quitar los dioses extranjeros y las Astartés, orientar el corazón a Yahvé, servirle exclusivamente, y promete liberación de los filisteos. Sin embargo, hay dos desajustes menores con la evidencia auditada: (1) «preparen su corazón para Yahvé» desplaza el matiz preferido del POB inglés, que prioriza «direct your heart to Yahweh» y deja «prepare your heart» como alternativa; (2) la nota alternativa de [a] añade «de nuevo», elemento no presente en el hebreo ni en la nota inglesa.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. No obstante, «se están volviendo» suena algo forzado en este contexto exhortativo; «están volviendo» o «vuelven» sería más natural. Además, el punto y coma antes de «y él los librará» no es necesario. Conviene también mover «de en medio de ustedes» para que modifique claramente tanto «los dioses extranjeros» como «las Astartés», siguiendo la revisión inglesa auditada.
  glossary_alignment: 'Se respeta bien la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵי הַנֵּכָר → «dioses extranjeros»; וְעִבְדֻהוּ לְבַדּוֹ → «sírvanle solo a él» mantiene el sentido amplio de servicio exclusivo. La transliteración «Astartés» es aceptable con nota cultural. El principal ajuste terminológico recomendado es reflejar en el texto principal el valor preferido de וְהָכִינוּ לְבַבְכֶם אֶל יְהוָה como «dirijan su corazón a Yahvé», dejando «preparen/dispongan» como alternativa.'
  issues:
  - severity: medium
    issue: El texto principal usa «preparen su corazón para Yahvé» en lugar del equivalente preferido «dirijan su corazón a Yahvé».
    rationale: La auditoría inglesa documenta «direct your heart to Yahweh» como opción principal para וְהָכִינוּ לְבַבְכֶם אֶל יְהוָה, y «prepare your heart» solo como alternativa. En español, «dirijan su corazón a Yahvé» preserva mejor la orientación intencional del corazón hacia Yahvé sin invertir principal y alternativa.
  - severity: low
    issue: La nota [a] introduce «de nuevo».
    rationale: El hebreo שָׁבִים comunica volver/retornar, pero la alternativa inglesa auditada es «turning back», no «turning back again». Añadir «de nuevo» explicita un matiz no expresado directamente en la nota base.
  - severity: low
    issue: La colocación de «de en medio de ustedes» puede mejorarse.
    rationale: La revisión inglesa movió «from among you» para abarcar tanto «foreign gods» como «Ashtaroths». En español, «quiten los dioses extranjeros y las Astartés de en medio de ustedes» refleja mejor ese alcance.
  - severity: low
    issue: «Se están volviendo» suena menos natural que otras opciones en español bíblico contemporáneo.
    rationale: Aunque es comprensible, el reflexivo progresivo resulta algo pesado. «Están volviendo» conserva el matiz verbal y mejora la fluidez.
  revised_spanish_text: 'Entonces Samuel dijo a toda la casa de Israel[a]: «Si ustedes están volviendo a Yahvé con todo su corazón, quiten los dioses extranjeros y las Astartés[b] de en medio de ustedes, y dirijan su corazón a Yahvé[c], y sírvanle solo a él, y él los librará de la mano de los filisteos[d]».'
  revised_footnotes:
