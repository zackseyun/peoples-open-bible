translation:
  language: es
  text: 'Joab entregó al rey el número del censo del pueblo: Israel era ochocientos mil[a] hombres valientes[b] que sacaban la espada, y los hombres de Judá eran quinientos mil hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo de 1 Crónicas 21:5 da cifras distintas (1.100.000 para Israel y 470.000 para Judá). Aquí se sigue el texto hebreo de 2 Samuel sin armonizar los números.
    reason: cross_reference
  - marker: b
    text: ‘Hombres valientes’ traduce אִישׁ חַיִל, una expresión militar que puede abarcar hombres capaces, valerosos o de valor; se prefiere ‘valientes’ por su naturalidad en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר מִפְקַד הָעָם
  english_pob_choice: the number of the census of the people
  chosen_spanish: el número del censo del pueblo
  alternatives_spanish:
  - el total del recuento del pueblo
  - el número de los contados del pueblo
  lexicon: HALOT
  rationale: La cadena constructa combina la idea de ‘número’ con ‘censo/recuento/muster’ y ‘pueblo’. ‘Censo’ conserva el valor formal del sustantivo y su referencia al conteo del capítulo, y ‘del pueblo’ refleja el genitivo final sin añadir interpretación.
- source_word: וַתְּהִי יִשְׂרָאֵל
  english_pob_choice: Israel was
  chosen_spanish: Israel era
  alternatives_spanish:
  - hubo en Israel
  - Israel fue
  lexicon: HALOT
  rationale: El verbo hebreo femenino singular con un nombre colectivo introduce el total de manera estativa. ‘Era’ comunica ese valor con naturalidad en español y evita forzar una construcción existencial innecesaria.
- source_word: שְׁמֹנֶה מֵאוֹת אֶלֶף
  english_pob_choice: eight hundred thousand
  chosen_spanish: ochocientos mil
  alternatives_spanish:
  - ochocientos mil hombres
  lexicon: HALOT
  rationale: La cifra se traduce de forma directa y normal en español. Se deja el sustantivo posterior para el grupo humano, como hace el hebreo.
- source_word: אִישׁ חַיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres guerreros
  - hombres poderosos
  lexicon: HALOT
  rationale: ‘אִישׁ חַיִל’ en este contexto militar describe hombres aptos para la guerra, con valor y capacidad. ‘Hombres valientes’ preserva la fuerza marcial sin volver técnico el español.
- source_word: שֹׁלֵף חֶרֶב
  english_pob_choice: who drew the sword
  chosen_spanish: que sacaban la espada
  alternatives_spanish:
  - que desenvainaban la espada
  - que empuñaban la espada
  lexicon: HALOT
  rationale: 'La imagen idiomática es concreta: hombres preparados para la batalla. ‘Sacaban la espada’ mantiene el acto físico de desenvainar y su valor idiomático, en un español claro y no arcaizante.'
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: and the men of Judah
  chosen_spanish: y los hombres de Judá
  alternatives_spanish:
  - y cada hombre de Judá
  - y Judá
  lexicon: HALOT
  rationale: Aunque el hebreo usa ‘hombre’ en singular con valor colectivo, en español el plural expresa de forma natural el grupo. ‘De Judá’ conserva el complemento genitivo.
- source_word: חֲמֵשׁ מֵאוֹת אֶלֶף אִישׁ
  english_pob_choice: five hundred thousand men
  chosen_spanish: quinientos mil hombres
  alternatives_spanish:
  - quinientos mil
  lexicon: HALOT
  rationale: Se conserva la repetición explícita de ‘hombres’ para reflejar el hebreo final אִישׁ y mantener el paralelismo con la primera mitad del verso.
theological_decisions:
- issue: Diferencia numérica con el pasaje paralelo de 1 Crónicas 21:5
  english_pob_reading: 'Translate the Masoretic Text of 2 Samuel as given: Israel eight hundred thousand; Judah five hundred thousand.'
  chosen_spanish_reading: 'Traducir el texto hebreo de 2 Samuel tal como está: Israel ochocientos mil; Judá quinientos mil.'
  alternative_spanish_readings:
  - armonizar numéricamente con 1 Crónicas
  - explicar la diferencia dentro del texto principal
  rationale: No se resuelve una discrepancia textual con una armonización en la línea principal. La traducción debe presentar honestamente el hebreo de 2 Samuel; las posibles explicaciones pertenecen a la nota, no al cuerpo del verso.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje fue revisado en la fuente inglesa y quedó sin cambios: se mantuvo la lectura del texto masorético y la nota de contraste con 1 Crónicas. La versión española sigue esa misma decisión sin introducir armonización.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma base para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se usa ‘Judá’ como nombre propio y ‘hombres’ para el colectivo, coherente con el registro bíblico del capítulo.
  - Se evita ‘SEÑOR’ por no aparecer el tetragrámaton ni un sustituto requerido aquí.
