translation:
  language: es
  text: El hijo del arco[a] no puede hacerlo huir; las piedras de honda se le vuelven como rastrojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijo del arco», es decir, un arquero o hombre del arco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַבְרִיחֶנּוּ
  english_pob_choice: cannot make him flee
  chosen_spanish: no puede hacerlo huir
  alternatives_spanish:
  - no puede hacer que huya
  - no puede ponerlo en fuga
  lexicon: HALOT
  rationale: 'El hifil expresa causa: hacer huir. En español, «hacerlo huir» conserva bien esa fuerza causativa y suena natural y digno.'
- source_word: בֶן קָשֶׁת
  english_pob_choice: the son of the bow
  chosen_spanish: el hijo del arco
  alternatives_spanish:
  - el arquero
  - el hombre del arco
  - el flechero
  lexicon: HALOT
  rationale: Se mantiene la imagen literal del hebreo, como hace la POB inglesa, y se deja la explicación idiomática para la nota. «Arquero» sería más claro, pero perdería la metáfora heredada del texto fuente.
- source_word: לְקַשׁ
  english_pob_choice: like stubble
  chosen_spanish: como paja
  alternatives_spanish:
  - como rastrojo
  - como hojarasca seca
  - como paja seca
  lexicon: HALOT
  rationale: El término denota material vegetal seco y ligero. «Paja» comunica bien la idea de fragilidad e insignificancia en español; «rastrojo» es posible, pero menos transparente para lectura pública amplia.
- source_word: נֶהְפְּכוּ לוֹ
  english_pob_choice: become ... to him
  chosen_spanish: se le vuelven
  alternatives_spanish:
  - se convierten para él
  - son contadas como nada para él
  - se tornan para él
  lexicon: HALOT
  rationale: El nifal indica cambio de estado o condición. «Se le vuelven» preserva esa transformación con una construcción natural en español y mantiene la relación evaluativa con él.
- source_word: אַבְנֵי קָלַע
  english_pob_choice: slingstones
  chosen_spanish: las piedras de honda
  alternatives_spanish:
  - las piedras de la honda
  - las piedras para honda
  - las piedras lanzadas con honda
  lexicon: HALOT
  rationale: La frase construida del hebreo refiere a piedras de arma arrojadiza. «Piedras de honda» es conciso, bíblico y comprensible; evita una paráfrasis excesiva.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de Job 41:20 y el audit trail inglés. La principal decisión fue conservar la imagen literal «hijo del arco» en el cuerpo y explicar su sentido idiomático en nota, mientras se tradujo el resto con equivalencia óptima sin suavizar la fuerza del verbo causativo ni la comparación final.
  spanish_consistency_notes:
  - Se mantuvo «hijo del arco» para respetar el giro hebreo y la estrategia documentada de la POB inglesa.
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes; el versículo no contiene el Tetragrámaton.
  - «Paja» fue preferido sobre «rastrojo» por claridad en español moderno, sin perder el valor de algo seco, liviano e impotente.
  - «Se le vuelven» refleja mejor el cambio de estado del nifal que una mera equivalencia estática.
