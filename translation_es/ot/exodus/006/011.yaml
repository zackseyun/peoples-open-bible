translation:
  language: es
  text: Ve[a], habla a Faraón, rey de Egipto, para que deje salir a los hijos de Israel de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ven”. El hebreo usa el imperativo de בוא.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּא
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo de בוא se adapta en español como una orden de desplazamiento. 'Ve' reproduce de forma natural la instrucción dirigida a Moisés, manteniendo el carácter directo del mandato.
- source_word: דַבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - dirígete
  lexicon: HALOT
  rationale: El piel imperativo de דבר introduce la orden de dirigirse verbalmente a Faraón. 'Habla' conserva el valor formal de comunicación directa sin añadir interpretación innecesaria.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición que marca destinatario del habla se expresa naturalmente en español con 'a'.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרָיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: Faraón, rey de Egipto
  alternatives_spanish:
  - Faraón rey de Egipto
  - Faraón, el rey de Egipto
  lexicon: HALOT
  rationale: La apposición se mantiene en español con coma para reflejar el título y el dominio, de manera clara y bíblicamente natural. La ausencia de artículo en hebreo permite esta forma compacta.
- source_word: וִישַׁלַּח
  english_pob_choice: that he may let ... go out
  chosen_spanish: para que deje salir
  alternatives_spanish:
  - y despida
  - para que envíe
  lexicon: HALOT
  rationale: El verbo שלח en este contexto exódico no es meramente 'enviar', sino liberar/dejar partir. 'Deje salir' expresa bien el resultado deseado sin perder la fuerza causal de la cláusula final.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - los hijos varones de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial masculina del hebreo. 'Hijos' mantiene la forma literal que el POB inglés documenta, sin imponer la generalización etnónima 'israelitas' como texto principal.
- source_word: מֵאַרְצוֹ
  english_pob_choice: from his land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - fuera de su tierra
  lexicon: HALOT
  rationale: אֶרֶץ se traduce de modo amplio como 'tierra' para conservar el sentido territorial y relacional del dominio de Faraón. 'De su tierra' suena natural en español y refleja la procedencia marcada por מִן.
theological_decisions:
- issue: Representación del resultado de la orden divina en la cláusula final
  english_pob_reading: that he may let the sons of Israel go out from his land
  chosen_spanish_reading: para que deje salir de su tierra a los hijos de Israel
  alternative_spanish_readings:
  - y que los deje salir de su tierra
  - a fin de que deje salir de su tierra a los hijos de Israel
  rationale: La frase final se entiende como cláusula de finalidad o resultado del mandato a Moisés, no como simple secuencia narrativa. 'Para que' comunica esa finalidad sin añadir contenido doctrinal ajeno al hebreo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2
- issue: Preservación de la expresión masculina explícita בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel y sus familias
  rationale: La forma hebrea es explícitamente masculina y filial. Se conserva en español para no aplanar el dato léxico del original ni perder la correspondencia auditada con el inglés POB.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado de 'so that' a 'that' por razones de formalidad y naturalidad sin alterar el sentido. En español se reflejó esa misma relación final con 'para que', evitando un conector demasiado narrativo y manteniendo la fuerza resultativa del hebreo.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Faraón'' se conservó como nombre/título propio sin articularlo de forma explicativa adicional.'
  - '''Hijos de Israel'' mantiene la equivalencia literal documentada por el POB inglés y la estructura masculina del hebreo.'
  - '''De su tierra'' preserva la referencia territorial de אֶרֶץ sin forzar ''país'' ni ''territorio''.'
