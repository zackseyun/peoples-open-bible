translation:
  language: es
  text: Entonces los hijos de Judá y los hijos de Israel serán reunidos juntamente[a], y pondrán para sí una sola cabeza[b], y subirán de la tierra[c], porque grande será el día de Jezreel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se congregarán». El hebreo expresa que serán reunidos juntos.
    reason: lexical_alternative
  - marker: b
    text: O «un solo jefe» o «un solo líder». El hebreo dice literalmente «una sola cabeza».
    reason: lexical_alternative
  - marker: c
    text: «De la tierra» puede referirse a salir del exilio o a un ascenso restaurado a la tierra; el hebreo deja abierta la matización exacta.
    reason: alternative_reading
  - marker: d
    text: Jezreel es tanto un nombre de lugar como un nombre teológicamente cargado en Oseas, con ecos de dispersión y siembra.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִקְבְּצוּ
  english_pob_choice: will be gathered together
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán congregados
  - se juntarán
  lexicon: HALOT
  rationale: El niphal expresa una reunión pasiva/reflexiva; en español, «serán reunidos» conserva bien esa fuerza sin sonar forzado. La idea de reunión común queda reforzada por «juntos».
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - la gente de Judá
  - los hijos de Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo hebreo y la designación literal «hijos», que preserva la simetría con la frase paralela de Israel.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: and the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - la gente de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: La repetición del mismo giro conserva la estructura paralela del hebreo y evita diluir la imagen idiomática.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - unidos
  - en conjunto
  lexicon: HALOT
  rationale: «Juntos» es la equivalencia directa y natural en español, con tono sobrio y claro.
- source_word: וְשָׂמוּ לָהֶם רֹאשׁ אֶחָד
  english_pob_choice: they will appoint for themselves one head
  chosen_spanish: se pondrán para sí un solo cabeza
  alternatives_spanish:
  - se nombrarán un solo jefe
  - se designarán un solo líder
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de רֹאשׁ como «cabeza», porque el texto no la explica ni la sustituye por «líder». «Ponerse para sí» refleja el dativo reflexivo לָהֶם, y «un solo» resalta la unidad.
- source_word: רֹאשׁ אֶחָד
  english_pob_choice: one head
  chosen_spanish: un solo cabeza
  alternatives_spanish:
  - una sola cabeza
  - un solo jefe
  lexicon: HALOT
  rationale: Se mantiene el valor metafórico de «cabeza» para no borrar la tensión léxica del hebreo. Aunque «cabeza» es femenino en español, se puede usar aquí por el carácter figurado y por fidelidad al término fuente; la lectura alternativa más natural sería «un solo jefe».
- source_word: וְעָל֣וּ
  english_pob_choice: they will go up
  chosen_spanish: subirán
  alternatives_spanish:
  - irán en ascenso
  - irán hacia arriba
  lexicon: HALOT
  rationale: «Subirán» reproduce el verbo עלה de manera natural y mantiene la imagen direccional de ascenso.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la región
  lexicon: HALOT
  rationale: Aquí el hebreo permite una amplitud entre tierra/país; «tierra» conserva mejor esa apertura que una especificación más restringida. Se deja sin precisar si alude al exilio o a una restauración hacia la tierra.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» expresa con claridad la relación causal del hebreo en un registro natural y bíblico.
- source_word: גָד֖וֹל י֥וֹם
  english_pob_choice: great will be the day
  chosen_spanish: grande será el día
  alternatives_spanish:
  - será grande el día
  - gran será el día
  lexicon: HALOT
  rationale: Se conserva el predicado enfático del hebreo con un orden natural en español.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Jezreel
  lexicon: HALOT
  rationale: Se translitera el nombre propio según la práctica POB, preservando además su carga teológica y literaria sin explicarla dentro del cuerpo del versículo.
theological_decisions:
- issue: Sentido de «un solo cabeza» para la reunificación de Judá e Israel
  english_pob_reading: Retain the metaphor 'one head' without specifying the identity of the leader.
  chosen_spanish_reading: Mantener «un solo cabeza» como metáfora explícita, sin identificar al gobernante.
  alternative_spanish_readings:
  - un solo jefe
  - un solo líder
  - un rey
  rationale: El hebreo afirma una jefatura unificada, pero no identifica a la persona. Conservar la metáfora evita imponer una solución mesiánica o política no explicitada aquí y preserva la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
- issue: Sentido de «subirán de la tierra»
  english_pob_reading: Translate spatially as 'go up from the land' and leave the exact referent open.
  chosen_spanish_reading: Traducir espacialmente «subirán de la tierra» y dejar abierto el referente exacto.
  alternative_spanish_readings:
  - saldrán de la tierra
  - subirán de la tierra al modo de un retorno del exilio
  - subirán a la tierra prometida
  rationale: La frase puede sugerir retorno del exilio, ascenso restaurativo o incluso resonancias militares/políticas. La redacción conserva la imagen sin estrechar su alcance.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue de alta concordancia y el texto base quedó confirmado sin ajustes.
  spanish_consistency_notes:
  - Se mantiene «hijos de Judá / hijos de Israel» para conservar el paralelismo del hebreo.
  - Se traduce יהוה como «Yahvé» según la norma del proyecto, aunque este versículo no lo contiene.
  - Se conserva la metáfora de רֹאשׁ como «cabeza» en el cuerpo del texto y se explica en nota la alternativa más idiomática.
  - «Tierra» se elige para mantener la amplitud semántica de אֶרֶץ sin cerrar su sentido contextual.
