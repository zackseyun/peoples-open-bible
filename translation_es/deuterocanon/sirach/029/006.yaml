base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/029/006.yaml
  text: If he is able[a], he will scarcely recover half, and will count it as a find; but if not, he has been deprived of his money, and has gained an enemy for nothing. He will repay him with curses and insults[b], and instead of honor he will repay him with dishonor.
  footnotes:
  - marker: a
    text: Or 'will count it as a windfall'; the Greek says literally 'as a find,' meaning that even recovering half is treated like unexpectedly found money.
    reason: lexical_alternative
  - marker: b
    text: Or 'has made an enemy of him for no benefit'; the Greek expression conveys the irony that the lender loses money and gains hostility in return.
    reason: lexical_alternative
