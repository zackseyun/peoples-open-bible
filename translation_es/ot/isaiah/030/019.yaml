revisions:
- from: Porque un pueblo en Sion habitará en Jerusalén; no llorarás más[a]. Ciertamente tendrá piedad de ti[b], al oír tu clamor; cuando lo oiga, te responderá.
  to: Porque un pueblo en Sion habitará en Jerusalén; no llorarás más[a]. Ciertamente te mostrará gracia[b] al sonido de tu clamor; cuando lo oiga, te responderá.
