translation:
  language: es
  text: Tú nos has hecho un oprobio[a] ante nuestros vecinos, una burla y escarnio ante los que nos rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘deshonra’. El término hebreo puede abarcar vergüenza, reproche o deshonra pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  english_pob_choice: You have made us
  chosen_spanish: Tú nos has hecho
  alternatives_spanish:
  - Tú nos haces
  - Tú nos pones
  - Tú nos has puesto
  lexicon: HALOT
  rationale: שׂים puede significar ‘poner’, ‘establecer’ o ‘hacer’. En este lamento, el perfecto con valor resultativo se expresa naturalmente en español con ‘has hecho’, manteniendo la idea de que Dios los ha convertido en esa condición.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - un reproche
  - una vergüenza
  - un escarnio
  lexicon: HALOT
  rationale: חֶרְפָּה designa vergüenza, deshonra o reproche. ‘Oprobio’ conserva el peso de deshonra pública y funciona bien con el paralelismo de ridículo que sigue.
- source_word: לִשְׁכֵנֵינוּ
  english_pob_choice: to our neighbors
  chosen_spanish: para nuestros vecinos
  alternatives_spanish:
  - a nuestros vecinos
  - entre nuestros vecinos
  - ante nuestros vecinos
  lexicon: HALOT
  rationale: La preposición ל expresa relación o referencia. ‘Para nuestros vecinos’ comunica que la condición de oprobio recae en la percepción de los pueblos vecinos, sin forzar una locución poco natural en español.
- source_word: לַעַג
  english_pob_choice: mockery
  chosen_spanish: burla
  alternatives_spanish:
  - mofa
  - escarnio
  - ridículo
  lexicon: HALOT
  rationale: לַעַג denota burla o risa insultante. ‘Burla’ es claro y directo en español, y mantiene el tono de ridiculización pública.
- source_word: קֶלֶס
  english_pob_choice: derision
  chosen_spanish: escarnio
  alternatives_spanish:
  - escarnio público
  - desprecio
  - mofa
  lexicon: HALOT
  rationale: קֶלֶס expresa ridiculización despectiva. ‘Escarnio’ distingue este término de ‘burla’ y preserva la intensificación del paralelismo hebreo.
- source_word: לִסְבִיבוֹתֵינוּ
  english_pob_choice: to those around us
  chosen_spanish: para los que nos rodean
  alternatives_spanish:
  - a los que nos rodean
  - para los pueblos que nos rodean
  - a los de alrededor
  lexicon: HALOT
  rationale: La expresión apunta a los que están alrededor, probablemente pueblos vecinos. ‘Los que nos rodean’ es una forma natural en español y conserva el referente amplio del hebreo.
translation_notes:
  revision_awareness: Seguí el sentido resultativo del perfecto hebreo, mantuve el paralelismo de dos sustantivos para la segunda cola, y preservé el valor relacional de ל sin convertirlo en una preposición más interpretativa que el texto.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando el texto fuente lo exige; aquí el verso es una acusación directa a Dios con pronombre, así que no se introduce un nombre divino.
  - Conservé una distinción entre ‘burla’ y ‘escarnio’ para reflejar לַעַג / קֶלֶס como par de términos relacionados pero no idénticos.
  - Elegí ‘vecinos’ y ‘los que nos rodean’ para seguir el campo semántico de cercanía social/geográfica sin estrechar indebidamente el alcance a una sola categoría étnica.
