translation:
  language: es
  text: El octavo día, despidió al pueblo[a], y ellos bendijeron al rey y se fueron a sus tiendas, gozosos y con el corazón alegre, por todo el bien que Yahvé había hecho a David su siervo y a Israel su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a sus casas’; literalmente, ‘a sus tiendas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: On the eighth day
  chosen_spanish: Al octavo día
  alternatives_spanish:
  - En el octavo día
  - El octavo día
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera directa y natural en español. No se añade “de la fiesta”, porque ese dato es inferible por el contexto narrativo, pero no está explícito en este versículo.
- source_word: שִׁלַּח אֶת הָעָם
  english_pob_choice: he sent the people away
  chosen_spanish: despidió al pueblo
  alternatives_spanish:
  - envió al pueblo
  - mandó irse al pueblo
  lexicon: HALOT
  rationale: El piel de שלח aquí expresa despedida/autorización para partir. “Despidió” conserva el valor causativo y suena más natural en español que una traducción más literal y pesada.
- source_word: וַיְבָרֲכוּ אֶת הַמֶּלֶךְ
  english_pob_choice: they blessed the king
  chosen_spanish: bendijeron al rey
  alternatives_spanish:
  - despidieron al rey con bendición
  - dijeron bien del rey
  lexicon: HALOT
  rationale: Se mantiene el verbo “bendecir”, que es el valor léxico normal de ברך. Aunque el gesto puede incluir una despedida cortesana, el texto no lo explicita, así que no se sustituye por un sentido paraprástico.
- source_word: לְאָהֳלֵיהֶם
  english_pob_choice: to their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus casas
  lexicon: HALOT
  rationale: Se conserva la imagen literal de “tiendas”, como hace el texto base inglés, porque es transparente y auditable. La alternativa idiomática “casas” se deja implícita, no como texto principal.
- source_word: שְׂמֵחִים
  english_pob_choice: rejoicing
  chosen_spanish: gozosos
  alternatives_spanish:
  - regocijados
  - alegres
  lexicon: HALOT
  rationale: El participio describe el estado de salida; “gozosos” comunica alegría activa y mantiene un registro bíblico sobrio sin volverse arcaico.
- source_word: וְטוֹבֵי לֵב
  english_pob_choice: glad of heart
  chosen_spanish: con el corazón alegre
  alternatives_spanish:
  - de buen corazón
  - alegres de corazón
  lexicon: HALOT
  rationale: La locución hebrea se reproduce como un modismo comprensible en español, preservando la imagen del corazón como sede del gozo interior.
- source_word: עַל כָּל הַטּוֹבָה
  english_pob_choice: because of all the good
  chosen_spanish: por todo el bien
  alternatives_spanish:
  - a causa de todo el bien
  - por toda la bondad
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa motivo; “por” comunica la causa de la alegría sin sobrecargar la frase. “Bien” mantiene la amplitud semántica de הַטּוֹבָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: “Yahvé”, conservando el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: לְדָוִד עַבְדּוֹ
  english_pob_choice: for David his servant
  chosen_spanish: a David su siervo
  alternatives_spanish:
  - para David su siervo
  - a David su esclavo
  lexicon: HALOT
  rationale: En el lenguaje pactual y real de David, “siervo” es la equivalencia establecida en español e impide una connotación de esclavitud material que no corresponde al contexto.
- source_word: וּלְיִשְׂרָאֵל עַמּוֹ
  english_pob_choice: and for Israel his people
  chosen_spanish: y a Israel su pueblo
  alternatives_spanish:
  - y para Israel su pueblo
  lexicon: HALOT
  rationale: 'Se conserva la relación posesiva/covenantal de manera directa: Israel es “su pueblo”. El uso de “a” coordina naturalmente con el miembro anterior.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton. Se mantiene el nombre propio divino en español con la forma establecida del proyecto, evitando la sustitución litúrgica “Señor” y preservando la identificación pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre “bendijeron al rey” y el gesto de despedida
  english_pob_reading: they blessed the king
  chosen_spanish_reading: bendijeron al rey
  alternative_spanish_readings:
  - se despidieron del rey con una bendición
  - lo bendijeron al despedirse
  rationale: Se evita convertir el verbo en un mero saludo de cortesía. El hebreo conserva ‘bendecir’, y esa ambigüedad ceremonial se mantiene en español sin borrar el matiz religioso del acto.
  doctrine_reference: Principio POB de preservar la forma léxica cuando el contexto no obliga a una paráfrasis
- issue: עַבְדּוֹ aplicado a David
  english_pob_reading: David his servant
  chosen_spanish_reading: David su siervo
  alternative_spanish_readings:
  - David su servidor
  - David su esclavo
  rationale: La palabra admite varias opciones, pero en el marco davídico-covenantal la forma tradicional y más fiel es ‘siervo’. ‘Esclavo’ sería semánticamente posible en abstracto, pero impondría una carga ajena al contexto.
  doctrine_reference: 'Principio POB sobre δοῦλος/עבד: distinguir siervo y esclavo según el contexto'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y mantiene el mismo perfil de decisiones del contexto inglés: preserva la imagen literal de ‘tiendas’, la ambigüedad ceremonial de ‘bendijeron al rey’ y la transliteración del nombre divino con la forma española del proyecto. No se incorporaron añadidos interpretativos ni datos implícitos del marco narrativo que no estén expresos en el versículo.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente con la política del proyecto para יְהוָה.
  - ‘Siervo’ se usó para עבד en armonía con el uso davídico del texto.
  - 'La puntuación y el orden verbal buscan sonar naturales en español sin perder la secuencia hebrea: tiempo, despedida, bendición, salida, estado interior y motivo.'
  - La nota al pie marca la alternativa ‘casas’ solo donde el inglés auditado preservó la alternativa idiomática ‘homes’.
