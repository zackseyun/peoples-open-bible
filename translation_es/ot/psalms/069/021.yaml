translation:
  language: es
  text: El oprobio me ha quebrantado el corazón[a], y estoy enfermo; esperé hallar compasión, pero no hubo ninguna; y consoladores, pero no hallé ninguno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedad» para «compasión». El término hebreo se refiere a una conmiseración compasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרְפָּה
  english_pob_choice: Reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  - deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה expresa vergüenza pública, escarnio o afrenta. En español, 'oprobio' conserva bien la carga de vergüenza social y deshonra que produce el agravio, sin reducirlo solo a una amonestación verbal como 'reproche'.
- source_word: שָׁבְרָה
  english_pob_choice: has broken
  chosen_spanish: ha quebrantado
  alternatives_spanish:
  - ha roto
  - ha quebrado
  - ha destrozado
  lexicon: HALOT
  rationale: El verbo perfecto presenta un daño ya efectuado. 'Ha quebrantado' mantiene la fuerza del quebranto interior y es natural en español bíblico sin exagerar hasta 'destrozado'.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - mi corazón
  - mi ser interior
  - mi alma
  lexicon: HALOT
  rationale: El hebreo usa 'corazón' para el centro interior de la persona. En español, mantener 'el corazón' conserva esa imagen antropológica; el posesivo queda implícito por el contexto de la primera persona.
- source_word: וָאֲנוּשָׁה
  english_pob_choice: and I am sick
  chosen_spanish: y estoy enfermo
  alternatives_spanish:
  - y estoy debilitado
  - y estoy gravemente afligido
  - y estoy incurable
  lexicon: HALOT
  rationale: La forma expresa un estado de aflicción o postración. 'Estoy enfermo' comunica bien el resultado visible y evita sobreespecificar una dolencia física que el hebreo no exige aquí.
- source_word: וָאֲקַוֶּה
  english_pob_choice: I looked for
  chosen_spanish: esperé
  alternatives_spanish:
  - busqué
  - aguardé
  - anhelé
  lexicon: HALOT
  rationale: El verbo puede significar esperar con esperanza. 'Esperé' conserva la expectativa dirigida hacia una respuesta humana y encaja con el paralelismo del versículo.
- source_word: לָנוּד
  english_pob_choice: sympathy
  chosen_spanish: compasión
  alternatives_spanish:
  - piedad
  - simpatía
  - consuelo
  lexicon: HALOT
  rationale: El sustantivo/infinitivo apunta a la conmiseración o al movimiento compasivo hacia el sufriente. 'Compasión' es la opción más amplia y digna en español; 'simpatía' puede sonar demasiado moderna o psicológica.
- source_word: וָאַיִן
  english_pob_choice: but there was none
  chosen_spanish: pero no hubo ninguna
  alternatives_spanish:
  - y no hubo ninguna
  - pero no había ninguna
  - y no hubo nadie
  lexicon: HALOT
  rationale: La partícula de inexistencia marca ausencia total. 'Pero no hubo ninguna' reproduce bien la frustración del lamento y mantiene el paralelismo con la siguiente cláusula.
- source_word: וְלַמְנַחֲמִים
  english_pob_choice: and for comforters
  chosen_spanish: y consoladores
  alternatives_spanish:
  - y para consoladores
  - y para quienes consolaran
  - y quienes me consolaran
  lexicon: HALOT
  rationale: El participio denota personas que consuelan. 'Consoladores' es breve, natural y mantiene el plural personal del hebreo.
- source_word: וְלֹא מָצָאתִי
  english_pob_choice: but I found none
  chosen_spanish: pero no hallé ninguno
  alternatives_spanish:
  - y no hallé ninguno
  - pero no encontré ninguno
  - y no encontré ninguno
  lexicon: HALOT
  rationale: '''Hallé'' conserva un tono bíblico sobrio y corresponde bien al verbo de encontrar en este lamento. ''Ninguno'' hace explícita la ausencia de personas consoladoras.'
theological_decisions:
- issue: Lectura mesiánica en el texto principal
  english_pob_reading: Translate the verse first in its Psalmic lament context without importing explicit messianic language.
  chosen_spanish_reading: Traducir el versículo primero como lamento salmódico, sin introducir lenguaje mesiánico explícito en el texto principal.
  alternative_spanish_readings:
  - Traducirlo de forma directamente mesiánica en el texto principal
  rationale: Aunque el Salmo 69 se aplica a Jesús en el Nuevo Testamento, el hebreo de este versículo es el de una lamentación individual. La redacción española debe preservar ese sentido primario y seguir siendo compatible con la lectura cristiana posterior sin imponerla aquí.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustantivos; la versión española mantiene la equivalencia óptima con atención al valor de lamento del hebreo y a la alternativa lexical ya documentada en inglés para לָנוּד.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el texto la requiera; este versículo no contiene el nombre divino.
  - Se prefirió una estructura de paralelismo breve y sobria, con repetición de 'pero no' para reflejar la cadencia del hebreo.
  - Se evitó 'simpatía' en el texto principal porque en español puede sonar menos compasivo y más psicológico que el matiz hebreo.
