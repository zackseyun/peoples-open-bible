translation:
  language: es
  text: 'Y él dijo al pueblo[a]: «Estén preparados por tres días; no se acerquen a una mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no se acerquen a una mujer»; en contexto, es una instrucción eufemística para abstenerse de relaciones sexuales durante el período de preparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte naturalmente con una secuencia narrativa simple en español. «Y él dijo» conserva el flujo del hebreo sin añadir una interpretación temporal más fuerte que el texto no exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: «עָם» designa aquí al colectivo reunido de Israel. «Al pueblo» es la equivalencia natural y mantiene el referente comunitario del contexto.
- source_word: הֱיוּ נְכֹנִים
  english_pob_choice: Be ready
  chosen_spanish: Estén preparados
  alternatives_spanish:
  - Estén listos
  - Prepárense
  lexicon: HALOT
  rationale: El imperativo con נכון comunica disposición/preparación para lo que viene. «Estén preparados» expresa bien la idea de estar listos para el encuentro y es idiomático en español.
- source_word: לִשְׁלֹשֶׁת יָמִים
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  - para tres días
  lexicon: HALOT
  rationale: La expresión señala un período de preparación de tres días. «Por tres días» comunica duración de manera natural en español y evita sobreprecisar la relación temporal.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deben
  - no han de
  lexicon: HALOT
  rationale: אַל introduce una prohibición directa; en español, «no» conserva la fuerza imperativa sin añadir matices modales ajenos al hebreo.
- source_word: תִּגְּשׁוּ
  english_pob_choice: go near
  chosen_spanish: se acerquen
  alternatives_spanish:
  - vayan cerca
  - se aproximen
  lexicon: HALOT
  rationale: נגשׁ aquí significa acercarse o aproximarse. «Se acerquen» es claro y natural en español, y mantiene la imagen espacial del hebreo.
- source_word: אֶל אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - con una mujer
  - a su mujer/esposa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a una mujer». En contexto es una formulación eufemística para la abstinencia sexual durante la preparación; por eso el texto principal mantiene la literalidad y deja la aclaración en nota.
theological_decisions:
- issue: Si explicitar en el texto principal que la prohibición implica abstinencia sexual durante la consagración
  english_pob_reading: 'Retain the Hebrew euphemism in the main text: ''do not go near a woman'''
  chosen_spanish_reading: 'Conservar el eufemismo hebreo en el texto principal: «no se acerquen a una mujer»'
  alternative_spanish_readings:
  - no tengan relaciones sexuales
  - no se acerquen sexualmente a una mujer
  - absténganse de relaciones con sus esposas
  rationale: La expresión hebrea es un eufemismo convencional y no un verbo sexual explícito. Mantenerlo en el cuerpo del texto respeta la forma fuente y preserva la transparencia; la nota aclara el sentido idiomático sin paraphrasear más allá de lo que el hebreo dice.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s plain sense without paraphrase beyond what it warrants.'
translation_notes:
  revision_awareness: No se aplicaron cambios de revisión; el pasaje mostró alta concordancia y no hubo ajustes necesarios en la última pasada.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se conserva «Yahvé» como norma del proyecto solo cuando el original lo requiere; aquí no aplica.
  - «Pueblo» mantiene el sentido colectivo de עם sin introducir una lectura nacionalista o étnica más estrecha.
  - La nota explica la ambigüedad eufemística sin reemplazarla en el cuerpo principal del texto.
