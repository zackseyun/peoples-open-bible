revisions:
- from: Pero ¿quién soy yo, y quiénes son mi pueblo, para que tengamos fuerza de ofrecer voluntariamente[a] así? Porque todo viene de ti, y de tu mano te lo hemos dado.
  to: Pero ¿quién soy yo[a], y quién es mi pueblo, para que podamos ofrecer voluntariamente así? Porque todo viene de ti, y de tu mano te lo hemos dado.
  rationale: Se corrige la concordancia de 'mi pueblo' al singular, se mejora la naturalidad y fidelidad idiomática de נַעְצֹר כֹּחַ con 'podamos', y se reestructura la nota para que preserve de verdad la alternativa más formal documentada en la auditoría inglesa.
