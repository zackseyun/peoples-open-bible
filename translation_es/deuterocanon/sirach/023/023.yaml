translation:
  language: es
  text: Porque primero desobedeció la ley del Altísimo; y segundo, pecó contra su marido; y tercero, en inmoralidad sexual cometió adulterio y tuvo hijos de otro hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más dinámicamente: «tuvo hijos de otro hombre». El griego dice más literalmente: «presentó hijos de otro hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτον μὲν ... καὶ δεύτερον ... καὶ τὸ τρίτον
  english_pob_choice: For first ... and second ... and third
  chosen_spanish: Porque primero ...; y segundo ...; y tercero ...
  alternatives_spanish:
  - Primero ...; segundo ...; tercero ...
  - En primer lugar ...; en segundo lugar ...; y en tercer lugar ...
  lexicon: LSJ
  rationale: Conserva la enumeración tripartita explícita del griego y el valor explicativo de γάρ con una estructura natural en español.
- source_word: ἐν νόμῳ Ὑψίστου
  english_pob_choice: the law of the Most High
  chosen_spanish: la ley del Altísimo
  alternatives_spanish:
  - la ley del Dios Altísimo
  - la ley del Más Alto
  lexicon: LSJ
  rationale: Ἐν aquí marca la esfera o norma violada; 'la ley del Altísimo' comunica ese sentido sin añadir 'Dios' que no está explícito en el griego, y mantiene el título divino en español bíblico claro.
- source_word: ἠπείθησεν
  english_pob_choice: disobeyed
  chosen_spanish: desobedeció
  alternatives_spanish:
  - fue desobediente
  - rehusó obedecer
  lexicon: BDAG
  rationale: El aoristo de ἀπειθέω pide una acción concreta de desobediencia; 'desobedeció' es preciso y natural en español.
- source_word: εἰς ἄνδρα ἑαυτῆς
  english_pob_choice: against her husband
  chosen_spanish: contra su marido
  alternatives_spanish:
  - respecto de su marido
  - hacia su marido
  lexicon: LSJ
  rationale: La construcción indica culpa en relación con el esposo; 'contra su marido' conserva esa relación ofensa-víctima de forma directa en español.
- source_word: ἐπλημμέλησεν
  english_pob_choice: sinned / committed an offense
  chosen_spanish: pecó
  alternatives_spanish:
  - cometió una falta
  - actuó mal
  lexicon: LSJ
  rationale: El verbo expresa cometer una falta o actuar culpablemente. 'Pecó' refleja bien el matiz moral y, unido al complemento, no borra la relación específica con el marido.
- source_word: ἐν πορνείᾳ
  english_pob_choice: in sexual immorality
  chosen_spanish: en inmoralidad sexual
  alternatives_spanish:
  - en fornicación
  - en prostitución
  lexicon: BDAG
  rationale: πορνεία abarca inmoralidad sexual en sentido amplio; esta forma evita tanto el tecnicismo estrecho como el anacronismo de un giro más antiguo.
- source_word: ἐμοιχεύθη
  english_pob_choice: she committed adultery
  chosen_spanish: cometió adulterio
  alternatives_spanish:
  - fue adúltera
  - se volvió adúltera
  lexicon: BDAG
  rationale: Aunque la forma griega es pasiva/media, el sentido es una acción realizada por ella; el español activo es la equivalencia más clara.
- source_word: ἐξ ἀλλοτρίου ἀνδρός
  english_pob_choice: by another man
  chosen_spanish: de otro hombre
  alternatives_spanish:
  - por otro hombre
  - de un hombre ajeno
  lexicon: LSJ
  rationale: ἀλλότριος significa perteneciente a otro, es decir, un hombre que no es su esposo; 'de otro hombre' es idiomático para la cláusula de los hijos.
- source_word: τέκνα παρέστησεν
  english_pob_choice: bore children by another man
  chosen_spanish: tuvo hijos de otro hombre
  alternatives_spanish:
  - presentó hijos de otro hombre
  - dio a luz hijos de otro hombre
  lexicon: LSJ
  rationale: La revisión inglesa prefirió una formulación idiomática sobre una más literal. En español, 'tuvo hijos de otro hombre' comunica la relación de paternidad sin endurecer innecesariamente el verbo griego de 'presentar/poner delante'.
theological_decisions:
- issue: Mantener separadas las tres acusaciones
  english_pob_reading: 'Render the three clauses distinctly: disobedience to divine law, offense against husband, then adultery and bearing children by another man.'
  chosen_spanish_reading: 'Mantener las tres cláusulas distintas: desobediencia a la ley divina, pecado contra su marido, y luego adulterio con hijos de otro hombre.'
  alternative_spanish_readings:
  - Fundir la segunda y la tercera acusación en una sola idea de infidelidad matrimonial
  - Reducirlo a una sola acusación general de adulterio
  rationale: El griego enumera tres transgresiones. La redacción española conserva esa progresión moral sin fusionarlas, respetando el énfasis retórico del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Renderizar Ὑψίστου sin expansión interpretativa
  english_pob_reading: Most High
  chosen_spanish_reading: Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - Más Alto
  rationale: Se traduce el título divino sin añadir palabras no presentes. 'Altísimo' es natural y fiel al uso bíblico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Valor de πορνείᾳ junto con ἐμοιχεύθη
  english_pob_reading: in sexual immorality she committed adultery
  chosen_spanish_reading: en inmoralidad sexual cometió adulterio
  alternative_spanish_readings:
  - en fornicación cometió adulterio
  - en prostitución cometió adulterio
  rationale: La secuencia griega combina un marco general de inmoralidad sexual con la acusación específica de adulterio; el español conserva ambas capas sin sobreespecificar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se mantuvo la opción idiomática para la cláusula final (''tuvo hijos de otro hombre'') en lugar de una calca más literal; también se siguió la preferencia por una formulación más natural en la segunda acusación (''pecó contra su marido'') y se evitó introducir un término más técnico que el necesario.'
  spanish_consistency_notes:
  - Se usó 'Altísimo' para Ὑψίστου, coherente con la política del proyecto para títulos divinos.
  - Se prefirió 'mujer/marido' en la relación matrimonial; aquí se escogió 'su marido' por ser neutro y natural en español bíblico actual.
  - '''Inmoralidad sexual'' conserva el campo semántico amplio de πορνεία sin reducirlo a una sola práctica.'
  - La nota [a] se ancla solo en la cláusula final porque allí aparece la alternativa más literal frente a la forma idiomática adoptada.
