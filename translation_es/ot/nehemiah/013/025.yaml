translation:
  language: es
  text: 'Así que contendí con ellos y los maldije; golpeé a algunos de los hombres y les arranqué el cabello, y los hice jurar por Dios[a]: «No darán sus hijas a sus hijos[b], ni tomarán a ninguna de sus hijas para sus hijos o para ustedes mismos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los puse bajo juramento delante de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «si dan ... y si toman ...»; en este contexto de juramento, el sentido es prohibitivo: «no darán ... ni tomarán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיב
  english_pob_choice: I contended
  chosen_spanish: contendí con ellos
  alternatives_spanish:
  - reñí con ellos
  - discutí con ellos
  lexicon: HALOT
  rationale: ריב expresa contienda o litigio; «contendí» conserva mejor la fuerza confrontativa y hasta judicial que un simple «reprendí».
- source_word: וָאֲקַלְלֵם
  english_pob_choice: cursed them
  chosen_spanish: los maldije
  alternatives_spanish:
  - pronuncié maldición contra ellos
  - los vituperé
  lexicon: HALOT
  rationale: קלל aquí denota lanzar maldición o denuncia sobre ellos; «los maldije» es la opción más directa y fiel en español.
- source_word: וָאַכֶּה מֵהֶם אֲנָשִׁים
  english_pob_choice: I struck some of the men
  chosen_spanish: golpeé a algunos de los hombres
  alternatives_spanish:
  - herí a algunos de los hombres
  - les pegué a algunos
  lexicon: HALOT
  rationale: La construcción indica un subconjunto de los hombres entre ellos; «a algunos de los hombres» refleja ese valor. «Golpeé» mantiene la violencia física sin intensificarla más allá del hebreo.
- source_word: וָאֶמְרְטֵם
  english_pob_choice: pulled out their hair
  chosen_spanish: les arranqué el cabello
  alternatives_spanish:
  - les tiré del cabello
  - les arrancé el pelo
  lexicon: HALOT
  rationale: מרט se refiere a arrancar o arrancar de raíz el cabello; «cabello» suena más natural y digno en español bíblico que una repetición demasiado coloquial de «pelo».
- source_word: וָאַשְׁבִּיעֵם בֵּאלֹהִים
  english_pob_choice: I made them swear by God
  chosen_spanish: los hice jurar por Dios
  alternatives_spanish:
  - los puse bajo juramento delante de Dios
  - los conjuré por Dios
  lexicon: HALOT
  rationale: El hiphil de שבע significa hacer jurar. «Los hice jurar por Dios» reproduce el sentido de juramento sin oscurecer la formulación idiomática española.
- source_word: אִם תִּתְּנוּ
  english_pob_choice: You shall not give
  chosen_spanish: No darán
  alternatives_spanish:
  - Si dan
  - No deben dar
  lexicon: HALOT
  rationale: En este contexto juramentado, אִם introduce contenido prohibitivo. En español, «No darán» comunica la fuerza del juramento de manera natural y clara.
- source_word: בְּנֹתֵיכֶם לִבְנֵיהֶם
  english_pob_choice: your daughters to their sons
  chosen_spanish: sus hijas a los hijos de ellos
  alternatives_spanish:
  - sus hijas para los hijos de ellos
  - sus hijas a sus hijos
  lexicon: HALOT
  rationale: Conserva la dirección del acto matrimonial expresada en hebreo, manteniendo la relación de pertenencia con «de ustedes» y «de ellos».
- source_word: וְאִם תִּשְׂאוּ מִבְּנֹתֵיהֶם
  english_pob_choice: nor take any of their daughters
  chosen_spanish: ni tomarán las hijas de ellos
  alternatives_spanish:
  - ni se casarán con alguna de sus hijas
  - ni tomarán por esposas a las hijas de ellos
  lexicon: HALOT
  rationale: נשא en contexto matrimonial es «tomar por esposa». «Tomar las hijas de ellos» preserva la formulación breve del hebreo; el sentido matrimonial queda claro por el contexto.
- source_word: לִבְנֵיכֶם וְלָכֶם
  english_pob_choice: for your sons or for yourselves
  chosen_spanish: para sus hijos ni para ustedes mismos
  alternatives_spanish:
  - para sus hijos o para ustedes mismos
  - para sus hijos y para ustedes mismos
  lexicon: HALOT
  rationale: El hebreo prolonga la prohibición al matrimonio para los hijos y también para ellos mismos. «Ni... ni...» expresa bien la prohibición coordinada en español.
theological_decisions:
- issue: Retratar la disciplina violenta de Nehemías sin suavizarla ni exagerarla
  english_pob_reading: Retain the direct report of cursing, striking, and pulling out hair in plain English
  chosen_spanish_reading: Conservar la denuncia, el golpe y el arrancamiento del cabello en español llano
  alternative_spanish_readings:
  - Suavizarlo a solo reprensión verbal
  - Intensificarlo como paliza severa
  rationale: El hebreo narra acciones físicas y verbales duras; la traducción debe mantener esa tensión histórica y moral sin edulcorarla ni aumentarla.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fórmula juramentada con אִם en contexto de prohibición
  english_pob_reading: 'Render as a prohibition within the oath: ''You shall not...'''
  chosen_spanish_reading: 'Renderizar como prohibición dentro del juramento: «No darán...»'
  alternative_spanish_readings:
  - 'Mantener un condicional literal: «Si dan...»'
  - 'Usar solo un imperativo: «No den...»'
  rationale: En juramentos, אִם puede introducir el contenido prohibitivo. El español debe reflejar esa fuerza solemne como prohibición, no como simple condición.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo base, sin cambios revisionales relevantes; la versión inglesa final fue estable y recibió concordancia alta.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en el proyecto general, pero este versículo no contiene el tetragrámaton; se usó «Dios» para בֵּאלֹהִים.
  - Se mantuvo «contendí» para ריב y «maldije» para קלל, preservando la fuerza del relato.
  - Se eligió el singular colectivo «cabello» como equivalente natural de la acción de arrancar el pelo/cabello en español bíblico.
  - La prohibición se expresó con «No darán... ni tomarán...» para reflejar la fuerza juramentada del hebreo sin introducir un condicional en el texto principal.
