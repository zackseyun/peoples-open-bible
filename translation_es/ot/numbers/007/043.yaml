translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], cuyo peso era de ciento treinta siclos, un tazón de plata[b] de setenta siclos, según el siclo del santuario[c]; ambos llenos de flor de harina mezclada con aceite, para ofrenda vegetal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente» por «plato» (קַעֲרָה).
    reason: lexical_alternative
  - marker: b
    text: O «cuenco» por «tazón» (מִזְרָק), un recipiente ritual.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «según el siclo del santuario», refiriéndose al peso estándar del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su presente fue
  - Su don ofrecido fue
  lexicon: HALOT
  rationale: קָרְבָּן denota una ofrenda presentada en contexto cultual. «Ofrenda» conserva el valor sacrificial y es natural en español; «fue» expresa la cláusula nominal del hebreo sin añadir contenido innecesario.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un disco de plata
  - un tazón de plata
  lexicon: HALOT
  rationale: קַעֲרָה puede ser un plato o recipiente plano. «Plato» es claro y digno en español para un inventario ritual; evita la rigidez de «dish» y conserva la forma general del recipiente.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - pesaba ciento treinta siclos
  - cuyo peso era de ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su peso, treinta y cien». En español, «de peso de» conserva el dato del peso sin sonar torpe; «siclos» mantiene la unidad monetario-pesada usada en el texto.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - una vasija de plata
  - un cuenco de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual, a menudo para aspersión. «Tazón» comunica el recipiente sin forzar un término técnico que en español puede sonar oscuro; se mantiene la materialidad «de plata».
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - que pesaba setenta siclos
  - de peso de setenta siclos
  lexicon: HALOT
  rationale: La expresión indica el peso del segundo recipiente. «De setenta siclos» es breve y fiel al sustantivo explícito del hebreo.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según la medida del santuario
  lexicon: HALOT
  rationale: La fórmula fija un patrón de peso sagrado/templo. «Según el siclo del santuario» mantiene el paralelo con la lectura inglesa auditada y evita reemplazar «santo» por una abstracción menos concreta.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: HALOT
  rationale: El dual hebreo refiere a los dos recipientes. «Ambos» es la forma natural y suficientemente explícita en español.
- source_word: מְלֵאִים
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - repletos de
  lexicon: HALOT
  rationale: El adjetivo indica que los recipientes están llenos. «Llenos de» es la equivalencia directa y sobria.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת es el término técnico para harina fina de ofrenda. «Flor de harina» es la equivalencia tradicional y precisa en español bíblico; conserva el matiz técnico del material cultual.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mecida con aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo expresa harina ya mezclada con aceite. «Mezclada con aceite» es claro y fiel; evita un calco innecesario.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de cereal
  - para ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal designa la ofrenda de cereal/grano. Se elige «ofrenda vegetal» siguiendo el uso POB para preservar la categoría cultual sin reducirla a una simple «ofrenda» general; en español la expresión puede requerir explicación contextual, pero mantiene el valor técnico.
theological_decisions:
- issue: Rendering of מִנְחָה in sacrificial context
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para ofrenda vegetal
  alternative_spanish_readings:
  - para ofrenda de cereal
  - para ofrenda de grano
  - para una ofrenda
  rationale: El contexto de Números 7 es una ofrenda ritual de harina y aceite, no una ofrenda genérica. «Ofrecenda vegetal» preserva la convención terminológica POB para מִנְחָה y mantiene la distinción cultual sin perder la referencia a materia alimentaria.
  doctrine_reference: Levítico 2; Números 7:13–17, 19–23, 25–29
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura inglesa auditada más reciente, que mantiene «according to the shekel of the sanctuary» y no introduce cambios de sentido. Se ha preservado la estructura enumerativa del hebreo: primer vaso, su peso, segundo vaso, su peso, medida estándar del santuario, y luego el contenido de ambos recipientes. La única decisión potencialmente sensible es el equivalente de מִנְחָה, resuelto aquí con el término técnico empleado por POB en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Siclo» se usa de manera consistente para שֶׁקֶל en unidades de peso bíblicas.
  - Se preserva la distinción entre un recipiente plano («plato») y un recipiente ritual más hondo («tazón»), reflejando las alternativas lexicográficas documentadas.
  - La frase final conserva la relación material y cultual entre flor de harina y aceite, sin convertirla en una paráfrasis general.
