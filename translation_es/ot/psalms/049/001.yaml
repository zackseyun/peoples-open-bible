translation:
  language: es
  text: Para el director del coro[a]. De los hijos de Coré[b]. Un salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al director del coro». La preposición hebrea puede entenderse de ambas maneras en los encabezados de salmos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Para» o «Por» los hijos de Coré. El encabezado probablemente indica asociación con el grupo coraíta, sin precisar si se trata de autoría, destino o colección.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de canto
  - Para el director de la música
  lexicon: HALOT
  rationale: En los encabezados de los salmos, la forma con ל admite dirección o dedicación. 'Para' conserva esa apertura, y 'director del coro' comunica de manera natural la función musical sin imponer una identificación más estrecha que la del hebreo.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición ל en este tipo de encabezados puede señalar asociación, atribución o pertenencia. 'De los hijos de' mantiene mejor esa ambigüedad que resolverla como autoría ('por') o destino ('para').
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Convención onomástica bíblica en español
  rationale: En español bíblico es más natural y reconocible la forma 'Coré'. Mantiene el referente propio sin alterar el sentido del encabezado.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Un cántico
  lexicon: HALOT
  rationale: מִזְמוֹר es el rótulo genérico del género. En un encabezado breve, 'Salmo' funciona con naturalidad y conserva el valor de designación literaria/musical.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje mantiene un alto grado de acuerdo entre los controles, así que la redacción española sigue de cerca el valor del encabezado hebreo y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene 'Coré' como forma onomástica bíblica usual en español.
  - Se conserva la ambigüedad funcional de ל en el encabezado mediante 'Para' y la nota alternativa.
  - '''Salmo'' se usa como rótulo de género, no como desarrollo explicativo.'
