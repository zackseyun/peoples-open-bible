  glossary_alignment: 'El borrador sigue bien la terminología del proyecto: יְהוָה → «Yahvé»; mantiene «corazón» para לֵב; conserva el motivo narrativo de endurecimiento con «endureció» y deja en nota las alternativas «hizo firme» y «fortaleció». No hay conflictos con las directrices teológicas o léxicas documentadas.'
