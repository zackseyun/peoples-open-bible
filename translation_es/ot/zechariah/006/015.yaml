translation:
  language: es
  text: Y vendrán los que están lejos[b], y construirán en el templo de Yahvé, y sabrán que Yahvé de los Ejércitos[a] me ha enviado a ustedes. Y esto sucederá si obedecen diligentemente la voz de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Yahvé de las huestes».
    reason: lexical_alternative
  - marker: b
    text: «Los que están lejos» puede referirse a personas geográficamente distantes, como exiliados, y también puede tener un sentido más amplio sin especificar el grupo.
    reason: alternative_reading
lexical_decisions:
- source_word: וּרְחוֹקִים
  english_pob_choice: those who are far off
  chosen_spanish: los que están lejos
  alternatives_spanish:
  - los lejanos
  - aquellos que están lejos
  lexicon: HALOT
  rationale: El hebreo funciona de manera sustantiva para personas distantes. «Los que están lejos» conserva el referente personal y mantiene abierta la distancia geográfica, covenantal o mixta, sin precisar más de lo que el texto dice.
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a
  - llegarán
  lexicon: HALOT
  rationale: El futuro simple en español expresa bien la secuencia profética sin añadir matices inexistentes.
- source_word: וּבָנוּ
  english_pob_choice: and build
  chosen_spanish: y construirán
  alternatives_spanish:
  - y edificarán
  - y levantarán
  lexicon: HALOT
  rationale: «Construirán» comunica claramente la acción futura de edificar; «edificarán» también sería posible, pero «construirán» suena más natural en español moderno y mantiene el sentido material del verbo.
- source_word: בְּהֵיכַל יְהוָה
  english_pob_choice: in the temple of Yahweh
  chosen_spanish: en el templo de Yahvé
  alternatives_spanish:
  - en el santuario de Yahvé
  - en el palacio de Yahvé
  lexicon: HALOT
  rationale: הֵיכָל aquí designa el templo/santuario; «templo» es el equivalente más claro y fiel para lectores en español. Se conserva «Yahvé» según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se translitera el nombre divino para no ocultarlo tras un título. «Yahvé» es la forma establecida del proyecto en español.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - y sabrán entonces
  lexicon: HALOT
  rationale: El hebreo expresa consecuencia/resultado; en español, «sabrán» transmite el reconocimiento derivado de lo anterior sin sobrecargar con un «entonces» no exigido por la forma.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se sigue la decisión del POB inglés de evitar «hosts» por opaco; en español «Ejércitos» comunica mejor la fuerza del título צְבָאוֹת que «huestes» o una transliteración. Se capitaliza como título divino.
- source_word: שְׁלָחַנִי אֲלֵיכֶם
  english_pob_choice: has sent me to you
  chosen_spanish: me ha enviado a ustedes
  alternatives_spanish:
  - me envió a ustedes
  - me ha enviado a vosotros
  lexicon: HALOT
  rationale: El perfecto hebreo admite presente perfecto en español. «A ustedes» mantiene un registro neutral latinoamericano y refleja correctamente el destinatario plural.
- source_word: וְהָיָה
  english_pob_choice: And this will happen
  chosen_spanish: Y esto sucederá
  alternatives_spanish:
  - Y esto acontecerá
  - Y así será
  lexicon: HALOT
  rationale: La fórmula introduce el resultado o la condición de lo anterior. «Suced erá» conserva la naturalidad del español y el carácter prospectivo del hebreo.
- source_word: אִם שָׁמוֹעַ תִּשְׁמְעוּן
  english_pob_choice: if you diligently obey
  chosen_spanish: si obedecen atentamente
  alternatives_spanish:
  - si escuchan atentamente
  - si en verdad obedecen
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica שמע. Dado el contexto pactal, «obedecen» refleja la escucha obediente, y «atentamente» comunica la intensificación sin perder el matiz de oír respondiendo.
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la voz
  lexicon: HALOT
  rationale: En contextos de pacto, קוֹל con שמע apunta a la voz autoritativa de mando, no meramente a un sonido físico. «La voz de» conserva esa fuerza relacional.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: Yahweh your God
  chosen_spanish: de Yahvé su Dios
  alternatives_spanish:
  - de Yahvé, su Dios
  - de Yahvé vuestro Dios
  lexicon: HALOT
  rationale: Se mantiene la fórmula de relación de pacto. En español, la posesión pospuesta «su Dios» es natural y preserva el vínculo entre el nombre divino y la pertenencia del pueblo.
theological_decisions:
- issue: Identidad y alcance de «los que están lejos»
  english_pob_reading: Rendered generically as 'those who are far off' without specifying Gentiles, exiles, or diaspora Israelites.
  chosen_spanish_reading: Se deja como «los que están lejos» sin especificar si son gentiles, exiliados o israelitas de la diáspora.
  alternative_spanish_readings:
  - gentiles que están lejos
  - los exiliados que regresan de tierras lejanas
  rationale: El hebreo no determina el grupo. La traducción conserva la apertura interpretativa y evita resolver una tensión que el texto no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla prematuramente.
- issue: Relación entre la promesa y la condición final
  english_pob_reading: '''And this will happen if you diligently obey...'' as a real condition on the realization/experience of the promise.'
  chosen_spanish_reading: «Y esto sucederá si obedecen atentamente...» como condición real vinculada a la promesa anterior.
  alternative_spanish_readings:
  - una observación exhortativa aparte
  - una condición que sólo afecte el reconocimiento, no toda la promesa
  rationale: La sintaxis hebrea presenta una condición después de la promesa. El español conserva esa relación sin precisar más de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; se mantiene la lectura inglesa auditada con el mismo perfil de equivalencia óptima y la misma apertura interpretativa sobre el grupo de «los que están lejos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en armonía con el estándar del proyecto.
  - Se usa «templo» para הֵיכָל por claridad natural en español.
  - Se conserva el plural de segunda persona como «ustedes», acorde con el registro neutral latinoamericano.
  - «Ejércitos» se emplea como equivalente del título צְבָאוֹת, siguiendo la decisión inglesa de evitar «hosts».
