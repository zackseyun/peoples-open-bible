id: PHM.1.8
reference: Philemon 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διό, πολλὴν ἐν Χριστῷ παρρησίαν ἔχων ἐπιτάσσειν σοι τὸ ἀνῆκον,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/008.yaml
  text: Therefore[a], though I have much boldness in Messiah to command you to do what is proper[b],
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can be rendered either way; 'Messiah' is used here to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'what is fitting.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 내가 메시아[a] 안에서 그대에게 마땅한 일[b]을 명령할 큰 담대함을 가지고 있으나,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: alternative_reading
  - marker: b
    text: 또는 「합당한 일」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διό
  english_pob_choice: Therefore
  chosen_korean: 그러므로
  alternatives_korean:
  - 그래서
  - 이런 까닭에
  lexicon: BDAG
  rationale: 추론 접속사. 앞 절의 칭찬·감사로부터 전환을 이끈다. 「그러므로」가 합쇼체 산문의 논리 전환에 가장 자연스럽다.
- source_word: πολλὴν ... παρρησίαν
  english_pob_choice: much boldness
  chosen_korean: 큰 담대함
  alternatives_korean:
  - 많은 확신
  - 큰 자유
  lexicon: BDAG
  rationale: παρρησία는 담대함·솔직한 말·확신을 함께 담는다. 「큰 담대함」이 강화어 πολλήν과 자연스럽게 결합하며, 명령권의 자신감을 잘 표현한다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에서
  alternatives_korean:
  - 그리스도 안에서
  lexicon: BDAG
  rationale: 바울의 「~안에」 정형. ἐν은 「안에」로 보존하고, Χριστῷ는 본 번역의 칭호 원칙에 따라 「메시아」로 옮긴다.
- source_word: ἔχων
  english_pob_choice: though I have
  chosen_korean: 가지고 있으나
  alternatives_korean:
  - 가지고는 있지만
  - 가졌으나
  lexicon: BDAG
  rationale: 분사는 문맥상 양보적이다(9절의 「그러나 사랑으로 인해 오히려 호소합니다」와 대비). 「~으나」가 양보의 흐름을 자연스럽게 합쇼체로 잇는다.
- source_word: ἐπιτάσσειν
  english_pob_choice: to command
  chosen_korean: 명령할
  alternatives_korean:
  - 지시할
  - 분부할
  lexicon: BDAG
  rationale: ἐπιτάσσω는 권위 있는 명령. 「명령하다」가 가장 직접적이다.
- source_word: σοι
  english_pob_choice: you
  chosen_korean: 그대에게
  lexicon: BDAG
  rationale: 단수 여격. 합쇼체에서 빌레몬에 대한 직접 호칭은 「그대」가 가장 자연스럽다.
- source_word: τὸ ἀνῆκον
  english_pob_choice: to do what is proper
  chosen_korean: 마땅한 일
  alternatives_korean:
  - 합당한 일
  - 적절한 일
  lexicon: BDAG
  rationale: ἀνήκω의 분사적 명사화. 「마땅한 일」이 도덕적 적정성과 한국어 자연스러움을 함께 살린다.
theological_decisions:
- issue: Χριστῷ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 절의 ἐν Χριστῷ는 바울의 권면 권위의 근거를 가리키며, 칭호의 무게가 그대로 살아 있다. DOCTRINE.md의 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
