  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Razón» para λογισμός, «pasiones» para πάθη e «impulsos» para κινήματα están bien. La principal cuestión léxica es preferir una expresión española más exacta para σώφρονος νοὸς y reubicar la nota de φιλοτιμοῦνται al lugar correcto.
