translation:
  language: es
  text: 'Y nuestros adversarios dijeron[a]: «No sabrán ni verán, hasta que lleguemos a estar entre ellos[b] y los matemos y detengamos la obra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijeron nuestros enemigos».
    reason: lexical_alternative
  - marker: b
    text: O «en medio de ellos» para אֶל תּוֹכָם.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרֵינוּ
  english_pob_choice: our adversaries
  chosen_spanish: nuestros adversarios
  alternatives_spanish:
  - nuestros enemigos
  - los que nos son hostiles
  lexicon: HALOT
  rationale: צַר designa aquí a un opositor hostil. «Adversarios» conserva el matiz de oposición activa y suena natural en español actual sin intensificar innecesariamente a «enemigos».
- source_word: יֵדְעוּ
  english_pob_choice: they will not know
  chosen_spanish: no lo sabrán
  alternatives_spanish:
  - no se darán cuenta
  - no lo percibirán
  lexicon: HALOT
  rationale: El verbo ידע expresa aquí conocimiento/percepción de la incursión. «Sabrán» mantiene la brevedad del hebreo y, con el objeto implícito en contexto, comunica la falta de conciencia de lo que ocurre.
- source_word: יִרְאוּ
  english_pob_choice: they will not see
  chosen_spanish: ni lo verán
  alternatives_spanish:
  - ni lo notarán
  - ni lo percibirán
  lexicon: HALOT
  rationale: רָאָה es literalmente «ver». Se conserva la paralelidad con «no lo sabrán» y la fuerza vívida del dicho hostil.
- source_word: עַד אֲשֶׁר
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - antes de que
  - hasta el momento en que
  lexicon: HALOT
  rationale: La construcción marca el límite temporal de la acción. «Hasta que» es la equivalencia más natural y precisa en español.
- source_word: נָבֹא
  english_pob_choice: we come
  chosen_spanish: entremos
  alternatives_spanish:
  - vayamos
  - lleguemos
  lexicon: HALOT
  rationale: בוא puede significar venir/entrar. En este contexto de infiltración, «entremos» expresa mejor el ingreso a escondidas que «venimos» o «llegamos».
- source_word: אֶל תּוֹכָם
  english_pob_choice: into their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: תּוֹךְ significa interior o medio. «En medio de ellos» comunica la penetración espacial del ataque y evita una formulación demasiado literal que sonaría rígida en español.
- source_word: וַהֲרַגְנוּם
  english_pob_choice: and kill them
  chosen_spanish: y los matemos
  alternatives_spanish:
  - y los matamos
  - y los matemos a todos
  lexicon: HALOT
  rationale: הָרַג es el verbo ordinario para matar. Se mantiene el tono directo y violento del hebreo; el subjuntivo en la cita reproduce bien la intención deliberada del plan expresado en discurso directo.
- source_word: וְהִשְׁבַּתְנוּ
  english_pob_choice: and stop
  chosen_spanish: y hagamos cesar
  alternatives_spanish:
  - y detengamos
  - y hagamos parar
  lexicon: HALOT
  rationale: La forma causativa de שׁבת significa «hacer cesar». «Hagamos cesar» refleja con mayor precisión la causatividad que un simple «detener», y combina bien con el sustantivo siguiente.
- source_word: הַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: En Nehemías, מְלָאכָה se refiere a la tarea de reconstrucción. «La obra» es un término natural y reverente en español bíblico para ese proyecto, y conserva el sentido colectivo del esfuerzo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés (versión aprobada sin cambios recientes) y conserva la tensión léxica principal: conocimiento/ver, entrada en medio de ellos y el causativo de «hacer cesar» aplicado a la obra.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - 'Se conserva el paralelismo breve del discurso directo con dos negaciones: «no lo sabrán ni lo verán».'
  - «Obra» se usa como equivalente natural de la tarea de reconstrucción en Nehemías, sin introducir una interpretación más específica que la del texto.
