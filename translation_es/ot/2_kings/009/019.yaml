translation:
  language: es
  text: 'Así envió un segundo jinete[a], y llegó a ellos y dijo: «Así dice el rey: ¿Hay paz?». Pero Jehú dijo: «¿Qué tienes tú que ver con la paz? Ponte detrás de mí»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “¿Está todo bien?”. El hebreo שָׁלוֹם puede significar “paz”, “bienestar” o “estar bien”.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכֵב סוּס שֵׁנִי
  english_pob_choice: a second horseman
  chosen_spanish: un segundo jinete
  alternatives_spanish:
  - otro jinete
  - un segundo hombre a caballo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “jinete de caballo, segundo”. En español, “jinete” conserva la figura del mensajero montado sin la rigidez de un calco. “Un segundo jinete” mantiene el valor narrativo y el contraste numérico del original.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  english_pob_choice: Thus says the king
  chosen_spanish: Así dice el rey
  alternatives_spanish:
  - Esto dice el rey
  - Así ha dicho el rey
  lexicon: HALOT
  rationale: Es la fórmula mensajera real estándar. “Así dice” preserva el tono solemne y formular del hebreo y coincide bien con el registro narrativo español.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - todo está bien
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona en la pregunta del rey sobre si la situación es pacífica. “Paz” conserva el vínculo léxico con la respuesta de Jehú, que repite el mismo término.
- source_word: מַה לְּךָ וּלְשָׁלוֹם
  english_pob_choice: What do you have to do with peace?
  chosen_spanish: ¿Qué tienes tú que ver con la paz?
  alternatives_spanish:
  - ¿Qué tienes tú con la paz?
  - ¿Qué es para ti la paz?
  lexicon: HALOT
  rationale: La expresión idiomática desestima la intervención del mensajero respecto del asunto de la paz. La formulación elegida es natural en español y conserva el tono cortante y la repetición del sustantivo clave.
- source_word: סֹב אֶל אַחֲרָי
  english_pob_choice: Turn behind me
  chosen_spanish: Vuelve detrás de mí
  alternatives_spanish:
  - Gira detrás de mí
  - Vuélvete y sigue detrás de mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente “gira/vuelve hacia detrás de mí”. La versión española evita expandir el sentido con “sígueme”, que iría más allá de la forma textual que el POB inglés decidió conservar en la revisión más reciente.
theological_decisions:
- issue: Sentido de שָׁלוֹם en un contexto de interrogación real y respuesta desafiante
  english_pob_reading: peace, with a footnote allowing “Is all well?”
  chosen_spanish_reading: paz, con nota que permite “¿Está todo bien?”
  alternative_spanish_readings:
  - bienestar
  - ¿Está todo bien?
  rationale: El texto no trata de paz abstracta sino del estado de la situación. Mantener “paz” en el cuerpo conserva la repetición léxica con la réplica de Jehú; la nota ofrece la alternativa semántica sin borrar la tensión del original.
  doctrine_reference: Uso contextual de שָׁלוֹם en hebreo bíblico; no implica una doctrina específica, sino precisión semántica.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del POB inglés en el final: se prefirió una traducción cercana a la forma hebrea (“Vuelve detrás de mí”) en lugar de expandirla interpretativamente con “sígueme”. También se conservó la fórmula real con “Así dice el rey” y la repetición de שָׁלוֹם mediante “paz”.'
  spanish_consistency_notes:
  - Se usó “Jehú” para יֵהוּא conforme a la forma española habitual del nombre bíblico.
  - Se mantuvo el tratamiento de discurso directo con comillas angulares españolas.
  - El orden narrativo respeta el hebreo sin añadir elementos no presentes en el texto fuente.
