translation:
  language: es
  text: Saúl inmediatamente cayó[a] al suelo, de cuerpo entero, y tuvo mucho miedo a causa de las palabras de Samuel. Tampoco tenía fuerzas, porque no había comido pan[b] todo aquel día y toda aquella noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente que cayó en toda su estatura, es decir, extendido de cuerpo entero; la traducción expresa esa imagen de una caída completa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “pan”, que también puede funcionar de modo más amplio por “alimento”; se conserva “pan” para reflejar el texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: immediately
  chosen_spanish: se precipitó
  alternatives_spanish:
  - se apresuró
  - inmediatamente
  lexicon: HALOT
  rationale: El hebreo expresa rapidez repentina en la acción. En español, 'se precipitó' comunica la inmediatez y el carácter abrupto del gesto sin sonar forzado.
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - se cayó
  lexicon: HALOT
  rationale: El verbo básico es 'caer'. 'Cayó' mantiene la sencillez del hebreo sin añadir interpretación excesiva.
- source_word: מְלֹא קוֹמָתוֹ
  english_pob_choice: full length
  chosen_spanish: de lleno
  alternatives_spanish:
  - por su plena estatura
  - completamente
  lexicon: HALOT
  rationale: La expresión idiomática indica que cayó extendido, no solo tropezó. 'De lleno' conserva la fuerza total de la caída en un español natural.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: al suelo
  alternatives_spanish:
  - a tierra
  - al piso
  lexicon: HALOT
  rationale: '''Al suelo'' es el equivalente narrativo más natural en español para la dirección hacia abajo/ tierra en este contexto.'
- source_word: וַיִּרָא מְאֹד
  english_pob_choice: he was very afraid
  chosen_spanish: tuvo mucho miedo
  alternatives_spanish:
  - temió mucho
  - se llenó de gran temor
  lexicon: HALOT
  rationale: La frase describe un estado de temor intenso. 'Tuvo mucho miedo' es claro, idiomático y fiel al matiz emocional.
- source_word: מִדִּבְרֵי שְׁמוּאֵל
  english_pob_choice: because of Samuel’s words
  chosen_spanish: a causa de las palabras de Samuel
  alternatives_spanish:
  - por las palabras de Samuel
  - debido a las palabras de Samuel
  lexicon: HALOT
  rationale: La preposición marca causalidad; 'a causa de' preserva explícitamente ese valor y suena natural en español bíblico moderno.
- source_word: גַּם כֹּחַ לֹא הָיָה בוֹ
  english_pob_choice: There was no strength in him either
  chosen_spanish: Tampoco tenía fuerza en él
  alternatives_spanish:
  - No tenía fuerza tampoco
  - Además, no había fuerza en él
  lexicon: HALOT
  rationale: Se mantiene la negación de fortaleza y el valor aditivo de גַּם. 'En él' refleja la localización hebrea sin convertirlo en una expresión extraña.
- source_word: כִּי לֹא אָכַל לֶחֶם
  english_pob_choice: because he had eaten no bread
  chosen_spanish: porque no había comido pan
  alternatives_spanish:
  - porque no había comido alimento
  - porque no había comido
  lexicon: HALOT
  rationale: Se conserva 'pan' para reflejar el lexema hebreo לֶחֶם, como en la tradición auditada inglesa. En español, 'pan' mantiene la referencia literal y permite la extensión semántica a alimento según el contexto.
- source_word: כָּל הַיּוֹם וְכָל הַלָּיְלָה
  english_pob_choice: all that day and all that night
  chosen_spanish: todo aquel día y toda aquella noche
  alternatives_spanish:
  - todo el día y toda la noche
  - a lo largo de todo aquel día y toda aquella noche
  lexicon: HALOT
  rationale: El demostrativo contextual se refleja con 'aquel', preservando la referencia narrativa específica y el paralelismo temporal del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la revisión auditada en no añadir 'left' a la falta de fuerza. También conserva la causalidad explícita de 'because of Samuel’s words' y la referencia temporal completa 'all that day and all that night'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' ausente porque este versículo no contiene el nombre divino.
  - Se evitó 'Cristo'/'Mesías' por no aplicar al pasaje.
  - '''Pan'' se conservó como equivalente literal de לֶחֶם, con nota para la posible extensión semántica a ''alimento''.'
  - '''Fuerza en él'' refleja la localización hebrea בוֹ sin forzar una paráfrasis antropológica.'
