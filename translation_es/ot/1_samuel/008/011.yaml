translation:
  language: es
  text: 'Y dijo: «Esto será el modo de actuar[a] del rey que reinará sobre ustedes: tomará a sus hijos[b] y los asignará a sus carros y entre sus jinetes, y correrán delante de sus carros[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el derecho legal del rey». El hebreo mishpat puede denotar una práctica consuetudinaria, una pretensión legal o una norma judicial; aquí se refiere al modo en que un rey actuará normalmente con el pueblo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hijos», específicamente descendencia masculina, en consonancia con el servicio militar real.'
    reason: cultural_note
  - marker: c
    text: O «delante de su carro». El singular hebreo puede entenderse de manera individual o colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּט
  english_pob_choice: custom
  chosen_spanish: modo de actuar
  alternatives_spanish:
  - costumbre
  - derecho legal
  - práctica
  lexicon: HALOT
  rationale: En este contexto no se trata de un juicio puntual, sino del patrón o manera en que actuará el rey. «Modo de actuar» comunica esa idea de práctica estable sin forzar una legitimidad jurídica que el contexto es de advertencia.
- source_word: הַמֶּלֶךְ אֲשֶׁר יִמְלֹךְ עֲלֵיכֶם
  english_pob_choice: the king who will reign over you
  chosen_spanish: el rey que reinará sobre ustedes
  alternatives_spanish:
  - el rey que gobernará sobre ustedes
  lexicon: HALOT
  rationale: «Reinará» conserva mejor el matiz real de מלך y «sobre ustedes» refleja la preposición עַל. «Gobernará» es posible, pero atenúa el color de realeza del hebreo.
- source_word: אֶת־בְּנֵיכֶם
  english_pob_choice: your sons
  chosen_spanish: a sus hijos[c]
  alternatives_spanish:
  - a sus hijos varones
  - a sus niños
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos» y el contexto militar explica que se trata de varones. En español, «hijos» permite mantener la forma del texto, mientras la nota aclara el sentido específico.
- source_word: וְשָׂם לוֹ
  english_pob_choice: and assign them
  chosen_spanish: los asignará
  alternatives_spanish:
  - los pondrá
  - los destinará
  lexicon: HALOT
  rationale: «Asignará» recoge la idea de colocar a alguien en servicio o función determinada. Es más natural que una traducción literal de «poner» y conserva la fuerza de la imposición real.
- source_word: בְּמֶרְכַּבְתּוֹ
  english_pob_choice: to his chariots
  chosen_spanish: a sus carros
  alternatives_spanish:
  - en sus carros
  - para sus carros
  lexicon: HALOT
  rationale: «Carros» es una forma clara y tradicional para מרכבה en español bíblico, y aquí el plural funciona bien por el sentido colectivo del término en contexto militar.
- source_word: וּבְפָרָשָׁיו
  english_pob_choice: among his horsemen
  chosen_spanish: y entre sus jinetes
  alternatives_spanish:
  - y con sus jinetes
  - y entre su caballería
  lexicon: HALOT
  rationale: פָרָשִׁים son jinetes/horsemen. «Entre sus jinetes» refleja bien el valor de la preposición y la idea de incorporación a un cuerpo militar.
- source_word: וְרָצוּ לִפְנֵי מֶרְכַּבְתּוֹ
  english_pob_choice: and they will run before his chariots
  chosen_spanish: y correrán delante de sus carros[d]
  alternatives_spanish:
  - y correrán delante de su carro
  - y irán corriendo delante de sus carros
  lexicon: HALOT
  rationale: La imagen es de corredores de corte precediendo el despliegue real. «Delante de» conserva el valor espacial de לִפְנֵי. Se mantiene «carros» en plural por la lectura colectiva adoptada en la versión inglesa del POB.
theological_decisions:
- issue: Sentido de מִשְׁפַּט en una advertencia sobre la monarquía
  english_pob_reading: The verse describes the customary practice or legal right of the king, with the emphasis on how a king will typically act toward the people.
  chosen_spanish_reading: El texto presenta el modo de actuar habitual del rey, no una sentencia judicial.
  alternative_spanish_readings:
  - El derecho legal del rey
  - La costumbre del rey
  - La norma judicial del rey
  rationale: El hebreo puede abarcar costumbre, norma o derecho. En este contexto narrativo-advertencial, «modo de actuar» evita una sobrecarga jurídica y transmite la intención de Samuel de describir la conducta típica del rey.
  doctrine_reference: 1 Samuel 8:11; HALOT, entrada מִשְׁפָט
- issue: Concreción del término «hijos» en contexto de conscripción militar
  english_pob_reading: Hebrew “your sons,” specifically male offspring, fitting the context of royal military service.
  chosen_spanish_reading: «Hijos» se conserva en el texto, con aclaración implícita en la nota de que son varones.
  alternative_spanish_readings:
  - hijos varones
  - varones de ustedes
  - sus hijos
  rationale: El hebreo es específico y el contexto militar requiere la referencia masculina. Mantener «hijos» en el cuerpo del texto respeta la forma léxica, y la nota evita perder la precisión contextual.
  doctrine_reference: 1 Samuel 8:11; nota cultural del POB inglés
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin traducir mecánicamente: se conservó la advertencia sobre el patrón real de conducta, la especificidad de «hijos» y la ambigüedad colectiva de «carros». No hubo revisiones aplicadas en el paso inglés más reciente, así que el borrador español refleja el estado estable del texto fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no se presenta.
  - Se emplea «rey» y «reinará» para mantener el campo semántico real de מלך.
  - «Carros» se mantiene como término bíblico claro para מרכבה; se conserva el plural por coherencia con la lectura colectiva.
  - La puntuación sigue el estilo editorial español con comillas angulares y notas al pie marcadas en el texto.
