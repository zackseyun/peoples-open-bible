translation:
  language: es
  text: 'La palabra que Yahvé habló acerca de Babilonia[a], acerca de la tierra de los caldeos, por medio de Jeremías[b] el profeta:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse ‘contra Babilonia, contra la tierra de los caldeos’. La preposición hebrea puede introducir un oráculo dirigido contra una nación, aunque aquí se vierte de manera más amplia como encabezamiento temático.
    reason: alternative_reading
  - marker: b
    text: Hebreo ‘por la mano de Jeremías’, un modismo que significa ‘por medio de Jeremías’ o ‘por Jeremías como agente’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - La cosa
  - El asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘mensaje’ o ‘asunto’. En una encabezamiento profético, ‘La palabra’ conserva la fórmula de introducción y su tono solemne sin alejarse del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa exige un relativo natural en español. ‘Que’ es la opción más directa y moderna.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: El verbo דבר en esta fórmula se expresa bien con ‘habló’. Mantiene cercanía al hebreo y es idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino con la forma establecida en el proyecto: ‘Yahvé’, en lugar de sustituirlo por un título. Esto sigue la política textual del POB en español.'
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - para
  lexicon: HALOT
  rationale: En este encabezamiento profético, אֶל introduce el asunto del oráculo. ‘Acerca de’ preserva esa amplitud sin anticipar más de lo que el hebreo dice aquí.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonía
  lexicon: HALOT
  rationale: Nombre propio geográfico normalizado en español bíblico.
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de Caldea
  lexicon: HALOT
  rationale: La construcción hebrea se refleja de forma directa con ‘la tierra de los caldeos’. ‘Caldea’ es posible, pero ‘los caldeos’ conserva mejor la expresión étnico-geográfica del original.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - por
  lexicon: HALOT
  rationale: La expresión idiomática marca agencia mediada. ‘Por medio de’ comunica la función instrumental sin forzar un calco poco natural en español.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: HALOT
  rationale: Forma española estándar del nombre del profeta.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: Título apposicional directo y claro en español.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español del POB se mantiene la forma ‘Yahvé’ para preservar el nombre personal del pacto, no un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of אֶל in the superscription
  english_pob_reading: concerning Babylon, concerning the land of the Chaldeans
  chosen_spanish_reading: acerca de Babilonia, acerca de la tierra de los caldeos
  alternative_spanish_readings:
  - contra Babilonia, contra la tierra de los caldeos
  rationale: Aunque el oráculo es de juicio, el valor preposicional en el encabezamiento sigue siendo amplio. ‘Acerca de’ evita adelantar la tonalidad de condena que se verá en el resto del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente indicada como sin cambios y coincide con el alto grado de acuerdo del control cruzado. No se requieren ajustes adicionales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se conserva la fórmula profética con tono solemne y sintaxis natural en español.
  - ‘Yahvé’ se mantiene de forma consistente con la política del proyecto para el nombre divino.
  - ‘Acerca de’ refleja el valor amplio de אֶל sin convertirlo prematuramente en ‘contra’.
  - ‘Por medio de’ comunica el hebraísmo de בְּיַד sin perder transparencia de agencia.
