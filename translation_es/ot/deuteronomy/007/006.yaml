translation:
  language: es
  text: Porque eres un pueblo santo para Yahvé tu Dios. Yahvé tu Dios te ha escogido para ser para sí un pueblo atesorado[a], de entre todos los pueblos que están sobre la faz de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una posesión atesorada para sí». El hebreo dice literalmente «un pueblo de posesión atesorada», combinando la idea de un pueblo con la de una posesión especialmente valiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o explicación de lo dicho antes; «porque» conserva la fuerza explicativa de כִּי con español natural y formal.
- source_word: עַם קָדוֹשׁ
  english_pob_choice: a holy people
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo sagrado
  - un pueblo consagrado
  lexicon: HALOT
  rationale: La combinación sustantivo + adjetivo expresa un pueblo apartado para Dios. «Santo» mantiene el valor covenantal sin volver la frase artificial en español.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: para Yahvé tu Dios
  alternatives_spanish:
  - de Yahvé tu Dios
  - perteneciente a Yahvé tu Dios
  lexicon: HALOT
  rationale: La preposición ל aquí marca relación/pertenencia y finalidad. «Para Yahvé tu Dios» preserva el enlace con el original y resulta idiomático en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino. «Yahvé» evita la sustitución por un título y mantiene la transparencia textual.
- source_word: בָּחַר
  english_pob_choice: has chosen you
  chosen_spanish: te ha escogido
  alternatives_spanish:
  - te ha elegido
  - te eligió
  lexicon: HALOT
  rationale: בחר indica elección divina. «Ha escogido» conserva la fuerza de acción realizada con relevancia actual y suena natural en español bíblico moderno.
- source_word: לִהְיוֹת לוֹ
  english_pob_choice: to be for himself
  chosen_spanish: para ser de él
  alternatives_spanish:
  - para pertenecerle
  - para ser suyo
  lexicon: HALOT
  rationale: La construcción expresa propósito y pertenencia. «Para ser de él» mantiene la relación de posesión sin añadir una idea reflexiva que el español podría volver más interpretativa de lo necesario.
- source_word: לְעַם סְגֻלָּה
  english_pob_choice: a treasured people
  chosen_spanish: un pueblo de posesión especial[a]
  alternatives_spanish:
  - un pueblo tesoro
  - un pueblo preciado
  - un pueblo de propiedad especial
  lexicon: HALOT
  rationale: סְגֻלָּה tiene el sentido de posesión valiosa o especial tesoro/propiedad. Como עַם ya está explícito, «pueblo de posesión especial» conserva ambos componentes y evita diluir el matiz de pertenencia valiosa.
- source_word: מִכֹּל הָעַמִּים
  english_pob_choice: from all the peoples
  chosen_spanish: de entre todos los pueblos
  alternatives_spanish:
  - de todos los pueblos
  - entre todos los pueblos
  lexicon: HALOT
  rationale: מן con כל expresa selección desde dentro de un conjunto mayor. «De entre» comunica elección sin convertirla en una comparación de superioridad que el hebreo no formula directamente.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - en la superficie de la tierra
  lexicon: HALOT
  rationale: Es un hebraísmo comprensible en español bíblico y preserva la imagen idiomática de toda la tierra habitada.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el nombre propio del pacto según la política del proyecto, en lugar de reemplazarlo por un título genérico. Esto conserva la transparencia y el vínculo con el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de Israel con סְגֻלָּה
  english_pob_reading: treasured people / treasured possession for himself
  chosen_spanish_reading: pueblo de posesión especial
  alternative_spanish_readings:
  - pueblo tesoro
  - pueblo preciado
  - pueblo de propiedad especial
  rationale: El hebreo combina la idea de pueblo con la de posesión especialmente valiosa. La redacción española conserva esa tensión sin resolverla en un solo lado (solo ‘tesoro’ o solo ‘propiedad’).
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Elección de entre las naciones
  english_pob_reading: from all the peoples
  chosen_spanish_reading: de entre todos los pueblos
  alternative_spanish_readings:
  - de todos los pueblos
  - entre todos los pueblos
  rationale: La frase indica elección desde dentro de un conjunto, no necesariamente superioridad intrínseca. La formulación evita añadir una inferencia doctrinal que el verso no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste revisado del audit trail inglés que prefirió «from all the peoples» por precisión preposicional. En español se reflejó con «de entre todos los pueblos». Se mantuvo la decisión del nombre divino como «Yahvé» y la elección como relación de pertenencia más que comparación de superioridad.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva el paralelismo entre «pueblo santo» y «pueblo de posesión especial» sin suavizar el lenguaje de elección.
  - «Faz de la tierra» mantiene el hebraísmo del original y el registro bíblico formal.
  - No se introduce «SEÑOR» ni «Cristo», que no corresponden al texto hebreo de este versículo.
