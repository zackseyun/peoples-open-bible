    issue: 'Cláusula final demasiado estática: «así es su maldad»'
    rationale: El hebreo difícil, leído a la luz del griego ὡς... οὕτως..., favorece una comparación más estrecha entre la corrosión del metal y la condición/acción de la maldad. «Así es su maldad» pierde el paralelismo dinámico presente en el POB inglés y en el proverbio.
  - severity: low
    issue: Nota b formulada de manera algo imprecisa
    rationale: La nota dice «O “su maldad” para la idea de “su mal”», pero el texto principal ya usa «su maldad». Debe reformularse para indicar claramente la alternativa «su mal».
