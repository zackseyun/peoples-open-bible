translation:
  language: es
  text: Y preparó el santuario interior dentro de la casa[a], para colocar allí el arca del pacto de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo dĕbîr; tradicionalmente se traduce «oráculo», pero aquí designa el santuario interior, la sala más interna del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבִיר
  english_pob_choice: inner sanctuary
  chosen_spanish: santuario interior
  alternatives_spanish:
  - oráculo
  - sala interior
  - santuario
  lexicon: HALOT
  rationale: En contexto de templo, דְבִיר designa la cámara más interna, el Lugar Santísimo. 'Santuario interior' conserva la función sagrada y la ubicación sin recurrir a 'oráculo', que en español puede sonar oscuro o técnico de manera engañosa.
- source_word: בְּתוֹךְ הַבַּיִת
  english_pob_choice: within the house
  chosen_spanish: dentro de la casa
  alternatives_spanish:
  - en medio de la casa
  - dentro del templo
  lexicon: HALOT
  rationale: La frase hebrea es una localización simple. 'Casa' conserva el término del texto fuente, aunque el referente sea el templo por el contexto.
- source_word: מִפְּנִימָה
  english_pob_choice: inner
  chosen_spanish: interior
  alternatives_spanish:
  - interna
  - más adentro
  - en lo más interior
  lexicon: HALOT
  rationale: El adverbio intensifica la idea de interioridad. En español se integra naturalmente en 'santuario interior' para evitar una redundancia torpe y mantener el énfasis espacial.
- source_word: הֵכִין
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - dispuso
  - dejó listo
  - estableció
  lexicon: HALOT
  rationale: El verbo expresa dejar listo o disponer para un fin. 'Preparó' es directo y fiel al valor funcional del verbo en esta construcción.
- source_word: לְתִתֵּן
  english_pob_choice: to place
  chosen_spanish: para colocar
  alternatives_spanish:
  - para poner
  - para poner allí
  - para situar
  lexicon: HALOT
  rationale: El infinitivo marca propósito. 'Colocar' es más preciso y digno que 'poner' en el contexto de la instalación del arca.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahweh
  - el arca del pacto de Jehová
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena constructa de forma clara y natural. 'Pacto' refleja בְּרִית, y 'Yahvé' sigue el criterio del proyecto para יְהוָה, evitando la sustitución por 'SEÑOR'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' según la norma del proyecto en español. Esta forma preserva el nombre divino en vez de reemplazarlo por un título.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio del pacto. En español se adopta 'Yahvé' como forma de nombre divino transliterado, manteniendo la decisión doctrinal de no sustituirlo por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: דְבִיר como término técnico del templo
  english_pob_reading: inner sanctuary
  chosen_spanish_reading: santuario interior
  alternative_spanish_readings:
  - oráculo
  - Lugar Santísimo
  - sala interior
  rationale: La palabra puede referir técnicamente a la cámara más interna del templo. 'Santuario interior' comunica la función cultual y la localización, mientras que 'oráculo' mantiene una tradición histórica pero puede ocultar el sentido espacial en español moderno.
  doctrine_reference: 'DOCTRINE.md: Lexical transparency and temple terminology'
- issue: ארון ברית יהוה
  english_pob_reading: the ark of the covenant of Yahweh
  chosen_spanish_reading: el arca del pacto de Yahvé
  alternative_spanish_readings:
  - el arca del pacto de Yahweh
  - el arca del pacto de Jehová
  rationale: La construcción hebrea se conserva de manera transparente con 'arca del pacto de Yahvé', manteniendo tanto el objeto como la relación de pacto sin invertir el orden ni introducir una formulación litúrgica tradicional no requerida por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Preserve construct chains when readable'
translation_notes:
  revision_awareness: 'Alineado con el contexto auditado en inglés: no se requieren cambios de revisión posteriores; se mantiene la solución estable ''inner sanctuary'' con el nombre divino transliterado. La versión española sigue la misma decisión lexical y doctrinal, adaptándola a la norma del proyecto para יְהוָה → Yahvé.'
  spanish_consistency_notes:
  - Se conserva 'casa' en lugar de 'templo' para reflejar el término hebreo, aunque el referente sea claro por el contexto.
  - '''Santuario interior'' evita el calco pesado y preserva el valor espacial del hebreo.'
  - '''Arca del pacto de Yahvé'' mantiene la cadena constructa y la terminología del proyecto para el nombre divino.'
  - La puntuación y el orden de la oración siguen un castellano natural y publicable sin perder transparencia fuente-texto.
