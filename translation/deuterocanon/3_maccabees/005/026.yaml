id: 3MA.5.26
reference: 3 Maccabees 5:26
source:
  edition: lxx-swete-1909
  text: οὔπω δὲ ἡλίου βολαὶ κατεσπείροντο, καὶ τοῦ βασιλέως τοὺς φίλους ἐκδεχόμενον, ὁ Ἕρμων παραστὰς ἐπικαλεῖ πρὸς τὴν ἔξοδον, ὑποδεικνὺς τὸ πρόθυμον τοῦ βασιλέως ἐν ἑτοίμῳ κεῖσθαι.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: But the sun’s rays had not yet spread out[a], and while the king was receiving his friends, Hermon came forward and summoned them to the departure[b], pointing out that the king’s eagerness was in readiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his courtiers' for 'his friends'; in Hellenistic court language, 'friends' can function as an official designation for royal companions.
    reason: lexical_alternative
  - marker: b
    text: The Greek expression 'called for the departure' likely means that Hermon summoned those present to set out.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  chosen: had not yet
  alternatives:
  - not yet
  lexicon: LSJ
  rationale: 'With the imperfect verb, this naturally gives a past-progressive sense in narrative: the action had not yet occurred.'
- source_word: ἡλίου βολαὶ
  chosen: the sun’s rays
  alternatives:
  - beams of the sun
  - sunbeams
  lexicon: LSJ
  rationale: βολαί literally are 'casts/shots,' but with ἡλίου the idiomatic sense is the sun’s rays or beams. 'Rays' is natural modern English while staying close to the image.
- source_word: κατεσπείροντο
  chosen: had ... spread out
  alternatives:
  - were being scattered
  - were spreading
  lexicon: LSJ
  rationale: The verb literally suggests being scattered/sown down, here of light spreading abroad. 'Spread out' communicates the image clearly without over-literal awkwardness.
- source_word: τοῦ βασιλέως ... ἐκδεχόμενον
  chosen: while the king was receiving
  alternatives:
  - while the king was waiting for
  - while the king was admitting
  lexicon: LSJ
  rationale: ἐκδέχομαι can mean await or receive. With τοὺς φίλους as object in court setting, 'receiving' best fits the scene of the king admitting or welcoming his companions/courtiers.
- source_word: τοὺς φίλους
  chosen: his friends
  alternatives:
  - his companions
  - his courtiers
  lexicon: LSJ
  rationale: Literally 'the friends.' In Hellenistic royal context this can denote the king’s official companions/courtiers, but the Greek term itself is φίλους. Main text keeps the literal rendering; the courtly nuance is worth noting as an alternative.
- source_word: ὁ Ἕρμων
  chosen: Hermon
  rationale: Personal name transliterated per project philosophy.
- source_word: παραστὰς
  chosen: came forward
  alternatives:
  - having stepped forward
  - standing by
  lexicon: LSJ
  rationale: Aorist participle of παρίστημι here marks Hermon’s approach into the king’s presence. 'Came forward' is idiomatic in English narrative.
- source_word: ἐπικαλεῖ πρὸς τὴν ἔξοδον
  chosen: called for the departure
  alternatives:
  - summoned them to go out
  - called them to the procession out
  lexicon: LSJ
  rationale: The phrase indicates a summons toward going out/departure. Because the object is implicit, 'called for the departure' preserves the compactness of the Greek, though the sense is a summons to set out.
- source_word: ὑποδεικνὺς
  chosen: pointing out
  alternatives:
  - indicating
  - making clear
  lexicon: LSJ
  rationale: This participle introduces Hermon’s explanation or justification for the summons.
- source_word: τὸ πρόθυμον τοῦ βασιλέως
  chosen: the king’s eagerness
  alternatives:
  - the king’s readiness
  - the king’s zeal
  lexicon: LSJ
  rationale: πρόθυμον denotes willingness, eagerness, readiness. 'Eagerness' best captures the motivational force in context.
- source_word: ἐν ἑτοίμῳ κεῖσθαι
  chosen: stood ready
  alternatives:
  - was lying ready
  - was prepared
  lexicon: LSJ
  rationale: The idiom means to be in readiness. 'Stood ready' is idiomatic English and conveys the state of preparedness without wooden literalism.
