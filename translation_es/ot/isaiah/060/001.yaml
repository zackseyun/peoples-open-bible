translation:
  language: es
  text: ¡Levántate[a], resplandece, porque ha venido tu luz, y la gloria de Yahvé ha resplandecido sobre ti.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘¡Levántate, sé radiante!’; el imperativo hebreo puede implicar volverse luminosa o dar luz.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘YHWH’; se vierte como ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֥וּמִי
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  lexicon: HALOT
  rationale: El imperativo femenino singular de קום convoca a ponerse de pie o levantarse. 'Levántate' conserva el tono exhortativo y es natural en español sin perder la fuerza profética.
- source_word: א֖וֹרִי
  english_pob_choice: shine
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - sé radiante
  lexicon: HALOT
  rationale: El imperativo de אור comunica volverse brillante o irradiar luz. 'Resplandece' expresa mejor que 'brilla' la idea de irradiar con intensidad, y mantiene el registro elevado.
- source_word: כִּ֣י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de los imperativos. 'Porque' reproduce con claridad la fuerza causal en español.
- source_word: בָ֣א
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - vino
  lexicon: HALOT
  rationale: El perfecto de בוא en discurso profético presenta la realidad como ya asegurada. 'Ha venido' conserva ese valor de perfectividad y suena natural en español bíblico contemporáneo.
- source_word: אוֹרֵ֑/ךְ
  english_pob_choice: your light
  chosen_spanish: tu luz
  alternatives_spanish:
  - tu resplandor
  - tu claridad
  lexicon: HALOT
  rationale: אור con sufijo femenino singular se vierte de manera directa como 'tu luz', manteniendo la amplitud metafórica de iluminación, salvación y restauración sin estrechar el sentido.
- source_word: וּכְב֥וֹד
  english_pob_choice: and the glory
  chosen_spanish: y la gloria
  alternatives_spanish:
  - y el esplendor
  - y la majestad
  lexicon: HALOT
  rationale: כבוד en este contexto es la manifestación gloriosa de Dios. 'La gloria' es la opción más fiel y reconocible en español eclesial.
- source_word: יְהוָ֖ה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se adopta el nombre divino explícito del texto hebreo, conforme al criterio del proyecto, evitando la sustitución por un título reverencial genérico.
- source_word: עָלַ֥יִךְ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - encima de ti
  - sobre vosotros
  lexicon: HALOT
  rationale: La preposición על con sufijo de segunda femenina singular expresa posición 'sobre'. 'Sobre ti' es idiomático y mantiene la imagen de la gloria posándose sobre la destinataria.
- source_word: זָרָֽח
  english_pob_choice: has risen
  chosen_spanish: ha amanecido
  alternatives_spanish:
  - ha resplandecido
  - ha salido
  lexicon: HALOT
  rationale: El verbo זרח remite al resplandor y al salir del sol. 'Ha amanecido' comunica bien la imagen de irrupción de luz, sin perder la relación con el campo semántico del alba y el brillo.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El hebreo presenta el Tetragrámaton de forma explícita. En español, 'Yahvé' preserva el nombre propio del pacto y sigue el estándar terminológico del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor profético de los perfectos בָא y זָרָח
  english_pob_reading: has come / has risen
  chosen_spanish_reading: ha venido / ha amanecido
  alternative_spanish_readings:
  - viene / resplandece
  - vino / amaneció
  - vendrá / resplandecerá
  rationale: Los perfectos hebreos presentan la acción prometida como realizada con certeza. El pretérito perfecto compuesto español transmite ese valor de cumplimiento asegurado sin reducirlo a un pasado meramente narrativo.
  doctrine_reference: 'DOCTRINE.md: Prophetic perfect and aspectual certainty'
translation_notes:
  revision_awareness: 'Alineado con la auditoría inglesa de Isaías 60:1: se conservan el paralelismo imperativo, la metáfora de luz/gloria y el valor perfectivo profético. La única adaptación relevante es la elección del nombre divino en español según la norma del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en lugar de una máscara reverencial.
  - '''Levántate'' y ''resplandece'' respetan el paralelismo de dos imperativos femeninos singulares.'
  - '''Ha venido'' y ''ha amanecido'' conservan la certeza profética del perfecto hebreo.'
  - '''Sobre ti'' mantiene la imagen espacial de la gloria posándose sobre la destinataria.'
