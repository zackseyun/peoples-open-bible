translation:
  language: es
  text: ‘¿No encuentran y reparten el botín? Un vientre[a], dos vientres para cada hombre; botín de telas teñidas para Sísara, botín de telas teñidas, tela bordada, tela teñida[b], dos bordados para los cuellos del botín.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, “un vientre, dos vientres”, una metonimia brutal para mujeres tomadas como botín sexual.
    reason: lexical_alternative
  - marker: b
    text: O “para los cuellos de los cautivos / de los que fueron tomados como botín”. El hebreo de la frase final es difícil y puede referirse a telas bordadas llevadas por mujeres cautivas.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Are they not
  chosen_spanish: ¿No están…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No…?
  lexicon: HALOT
  rationale: La pregunta retórica en la escena de la madre de Sísara pide una forma natural en español que conserve el tono expectante e irónico del poema. El presente progresivo ayuda a expresar la escena imaginada como inmediata.
- source_word: יִמְצְאוּ
  english_pob_choice: finding
  chosen_spanish: están encontrando
  alternatives_spanish:
  - encuentran
  - hallan
  lexicon: HALOT
  rationale: Se mantiene el valor básico de ‘encontrar’ y la progresividad del contexto narrativo-poético. ‘Están encontrando’ refleja la expectativa continua sin desplazar el sentido.
- source_word: יְחַלְּקוּ
  english_pob_choice: dividing
  chosen_spanish: repartiendo
  alternatives_spanish:
  - dividiendo
  - distribuyendo
  - apropiándose y repartiendo
  lexicon: HALOT
  rationale: En español ‘repartir’ comunica con más naturalidad la distribución del botín después de la batalla. Se conserva la idea de división/apartición sin forzar un calco.
- source_word: שָׁלָל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa
  - saqueo
  lexicon: HALOT
  rationale: ‘Botín’ es el equivalente militar claro y natural en español. Evita ambigüedades modernas de ‘presa’ y mantiene el registro poético.
- source_word: רַחַם
  english_pob_choice: a womb
  chosen_spanish: Un vientre
  alternatives_spanish:
  - Un seno
  - Una mujer
  - Una muchacha
  lexicon: HALOT
  rationale: Se conserva la literalidad anatómica para no suavizar el metonímico y brutal lenguaje del texto. ‘Vientre’ mantiene el choque retórico que documenta el auditable POB en inglés.
- source_word: רַחֲמָתַיִם
  english_pob_choice: two wombs
  chosen_spanish: dos vientres
  alternatives_spanish:
  - un par de vientres
  - dos mujeres
  - dos muchachas
  lexicon: HALOT
  rationale: La forma dual se traduce de manera transparente como ‘dos vientres’, preservando la dureza del giro y la intensificación numérica.
- source_word: לְרֹאשׁ גֶּבֶר
  english_pob_choice: for the head of each man
  chosen_spanish: para cada hombre
  alternatives_spanish:
  - para la cabeza de cada hombre
  - para cada guerrero
  - por hombre
  lexicon: HALOT
  rationale: La revisión inglesa ya clarifica el idiom a como distributivo (‘for each man’). En español, ‘para cada hombre’ expresa ese valor sin recargar con una calca extraña de ‘cabeza’.
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - guerrero
  lexicon: HALOT
  rationale: ‘Hombre’ conserva el valor léxico básico y el paralelismo distributivo del hebreo. ‘Guerrero’ interpretaría más de lo que el término dice por sí mismo.
- source_word: צְבָעִים
  english_pob_choice: dyed cloths
  chosen_spanish: telas teñidas
  alternatives_spanish:
  - telas de color
  - vestidos teñidos
  - paños teñidos
  lexicon: HALOT
  rationale: ‘Telas teñidas’ reproduce de forma sobria el valor de textiles coloreados/teñidos. Mantiene la imaginería de inventario de botín sin precisar indebidamente la prenda.
- source_word: רִקְמָה
  english_pob_choice: embroidered
  chosen_spanish: tela bordada
  alternatives_spanish:
  - bordado
  - bordada
  - bordado de tela
  lexicon: HALOT
  rationale: El hebreo funciona appositivamente en la secuencia textil. ‘Tela bordada’ suena natural y conserva la referencia a un objeto textil concreto, como en la revisión inglesa ‘embroidered cloth’.
- source_word: צֶבַע רִקְמָתַיִם
  english_pob_choice: dyed cloth, two embroideries
  chosen_spanish: tela teñida, dos bordados
  alternatives_spanish:
  - tela teñida, dos bordados
  - tejido teñido, dos bordados
  - tela teñida, dos piezas bordadas
  lexicon: HALOT
  rationale: Se mantiene la secuencia comprimida del hebreo y la repetición poética. ‘Dos bordados’ conserva el dual y la rareza de la expresión sin resolverla demasiado.
- source_word: לְצַוְּארֵי שָׁלָל
  english_pob_choice: for the necks of the spoil
  chosen_spanish: para los cuellos del botín
  alternatives_spanish:
  - para los cuellos de los cautivos
  - para los cuellos de los que fueron tomados como botín
  - para los cuellos del despojo
  lexicon: HALOT
  rationale: La frase final es difícil y se preserva una traducción cercana y auditable. ‘Cuellos del botín’ reproduce la literalidad del original y deja abierta la interpretación, como en el POB inglés.
theological_decisions:
- issue: Cómo traducir el lenguaje sexualmente deshumanizante de רַחַם רַחֲמָתַיִם
  english_pob_reading: Retain the literal metonymy 'a womb, two wombs'
  chosen_spanish_reading: Mantener la metonimia literal ‘un vientre, dos vientres’
  alternative_spanish_readings:
  - una mujer, dos mujeres
  - una muchacha, dos muchachas
  - una mujer para cada hombre
  rationale: La escena refleja la expectativa cruel y objetificante asociada al botín de guerra; no es aprobación narrativa. Conservar la literalidad preserva la dureza retórica y la tensión moral del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Cómo resolver la frase final comprimida y debatida לְצַוְּארֵי שָׁלָל
  english_pob_reading: Keep a close rendering in the main text and preserve a smoother interpretive alternative in a footnote
  chosen_spanish_reading: Conservar una traducción cercana en el texto principal y ofrecer una alternativa interpretativa en nota
  alternative_spanish_readings:
  - para los cuellos de los cautivos
  - para los cuellos de los que fueron tomados como botín
  - para mi cuello como botín
  rationale: El hebreo es difícil y permite varias reconstrucciones. La opción principal debe seguir siendo transparente y no demasiado segura; la nota preserva una lectura más fluida sin borrar la ambigüedad documentada.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó la fórmula demasiado literal ‘for the head of each man’ por ‘for each man’ y aclaró la secuencia textil como ‘embroidered cloth’. La propuesta española sigue esa revisión: usa un distributivo natural (‘para cada hombre’) y explicita ‘tela bordada’ sin borrar la repetición poética ni la dificultad de la última frase.'
  spanish_consistency_notes:
  - Se mantiene ‘botín’ para שָׁלָל en todo el versículo.
  - Se conserva la literalidad de la metonimia corporal con ‘vientre’ para reflejar la dureza del original.
  - ‘Telas teñidas’ y ‘tela bordada’ preservan el campo semántico textil sin sobreinterpretar.
  - La nota final mantiene abierta la ambigüedad de לְצַוְּארֵי שָׁלָל sin imponer una resolución no garantizada por el hebreo.
