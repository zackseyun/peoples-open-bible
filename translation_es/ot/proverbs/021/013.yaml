- from: El que cierra su oído al clamor del pobre, también él clamará y no será escuchado[a].
  to: El que cierra su oído al clamor del pobre,[a] también él clamará y no recibirá respuesta.
  rationale: 'Se conserva la redacción general del borrador porque es fiel y natural en español. Se corrige únicamente la cláusula final para reflejar con más precisión el pasivo de ענה nifal: no mera falta de escucha, sino falta de respuesta, manteniendo además el agente implícito del hebreo. La nota léxica sobre דָּל se conserva sin cambios.'
  reviewer_model: gpt-5.4
