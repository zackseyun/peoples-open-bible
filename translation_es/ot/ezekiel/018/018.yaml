translation:
  language: es
  text: En cuanto a su padre[a], porque practicó extorsión, despojó a su hermano[b], e hizo lo que no era bueno entre su pueblo, he aquí[c], morirá[d] en su iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «practicó opresión». El hebreo usa un par verbo-sustantivo para intensificar la acción.
    reason: lexical_alternative
  - marker: b
    text: O «despojó a un hermano». «Hermano» puede entenderse de manera genérica como un miembro de la comunidad.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «he aquí», un marcador discursivo enfático.'
    reason: lexical_alternative
  - marker: d
    text: O «muere en su iniquidad» o «está muerto en su iniquidad»; el perfecto hebreo presenta el desenlace como seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - en cuanto a su padre
  - su padre, por su parte
  lexicon: HALOT
  rationale: El sintagma retoma al padre mencionado en el contexto inmediato y funciona aquí como enlace discursivo. «Su padre» conserva la relación familiar sin añadir interpretación.
- source_word: עָשַׁק עֹשֶׁק
  english_pob_choice: practiced extortion
  chosen_spanish: practicó extorsión
  alternatives_spanish:
  - practicó opresión
  - oprimió con opresión
  lexicon: HALOT
  rationale: El par verbo-sustantivo intensifica la acción. «Practicó extorsión» comunica en español una explotación abusiva y mantiene una equivalencia natural con la fuerza repetitiva del hebreo.
- source_word: גָּזַל גֵּזֶל אָח
  english_pob_choice: robbed his brother
  chosen_spanish: robó a su hermano
  alternatives_spanish:
  - robó a un hermano
  - saqueó a su hermano
  lexicon: HALOT
  rationale: Se conserva la relación fraterna/generacional del hebreo. «A su hermano» refleja el sufijo posesivo que el contexto aporta y evita forzar una lectura exclusivamente literal o excesivamente genérica.
- source_word: וַאֲשֶׁר לֹא טוֹב עָשָׂה
  english_pob_choice: and did what was not good
  chosen_spanish: y hizo lo que no era bueno
  alternatives_spanish:
  - y hizo lo que no es bueno
  - y hizo el mal
  lexicon: HALOT
  rationale: Se mantiene el giro hebreo «lo que no era bueno» sin convertirlo en la síntesis más fuerte «el mal». Así se preserva la cautela del original y la tensión lexical.
- source_word: בְּתוֹךְ עַמָּיו
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - en medio de su pueblo
  - dentro de su pueblo
  lexicon: HALOT
  rationale: «Entre su pueblo» expresa la ubicación social/comunitaria de la conducta en español natural y conserva el marco comunitario del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: Se preserva el marcador discursivo enfático sin suavizarlo a una simple conjunción. «He aquí» es la forma española más fiel y reconocible para este giro profético.
- source_word: מֵת
  english_pob_choice: he shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - muere
  - está muerto
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto judicial-profético expresa certeza de consecuencia. «Morirá» comunica esa certeza en español sin perder el valor resultativo del original.
- source_word: בַּעֲוֹנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su iniquidad
  - en su culpa
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral de עָוֹן y el enlace «en» mantiene la imagen de morir en el estado/carga de su propia culpa, como en el audit trail inglés.
theological_decisions:
- issue: Responsabilidad individual en Ezequiel 18
  english_pob_reading: The verse states that the father dies for his own iniquity, not for another's sin.
  chosen_spanish_reading: El versículo afirma que el padre morirá en su propia iniquidad, no por el pecado de otro.
  alternative_spanish_readings:
  - El versículo solo describe una muerte vinculada a culpa, sin subrayar responsabilidad individual.
  - El versículo presenta una consecuencia moral, sin desarrollar la discusión sobre culpa heredada.
  rationale: La traducción mantiene los posesivos y la relación causal implícita sin añadir explicación doctrinal. Así se preserva la tensión del capítulo sobre responsabilidad personal sin resolverla más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica; no importar una tesis doctrinal que el pasaje no formula explícitamente.
translation_notes:
  revision_awareness: 'Revisión concordante con el audit trail inglés: se conservaron los cuatro núcleos léxicos principales (extorsión/opresión, hermano, he aquí, morirá en su iniquidad) y no se introdujeron ajustes doctrinales nuevos. La forma española evita el calco duro pero sigue de cerca el original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Iniquidad» se mantiene para preservar la red semántica del capítulo.
  - «He aquí» se conserva como marcador profético enfático, en paralelo al inglés «behold».
  - La opción «su hermano» se entiende relacionalmente, como en el audit trail inglés; la nota alternativa queda preservada.
