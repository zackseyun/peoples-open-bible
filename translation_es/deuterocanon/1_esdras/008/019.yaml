base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/019.yaml
  text: And I[a], King Artaxerxes, have given orders to the treasurers of Syria and Phoenicia, that whatever Ezra the priest and reader of the law of God Most High may send for, they are to give him carefully, up to one hundred talents of silver[b],
  footnotes:
  - marker: a
    text: Or 'may request.' The Greek verb literally means 'may send,' but in this supply context it likely refers to sending a requisition or request.
    reason: lexical_alternative
  - marker: b
    text: Greek 'reader of the law.' In parallel Ezra traditions he is often described as a scribe; this Greek witness explicitly uses 'reader.'
    reason: alternative_reading
