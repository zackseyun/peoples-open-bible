translation:
  language: es
  text: Y tomó posesión del territorio de Cilicia, y abatió a todos los que le resistieron, y llegó hasta las fronteras de Japhet[a], al sur, frente a Arabia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «Japheth». La localización es incierta; algunos intérpretes lo conectan con un topónimo más familiar, pero aquí se conserva el nombre transmitido sin enmienda.
    reason: alternative_reading
lexical_decisions:
- source_word: κατελάβετο
  english_pob_choice: seized
  chosen_spanish: tomó posesión de
  alternatives_spanish:
  - se apoderó de
  - ocupó
  lexicon: LSJ
  rationale: El verbo medio expresa toma de control sobre un territorio; en español, «tomó posesión de» comunica adquisición territorial con fuerza, sin volver mecánica la frase ni exagerar el matiz militar.
- source_word: τὰ ὅρια
  english_pob_choice: the territory / borders
  chosen_spanish: las fronteras
  alternatives_spanish:
  - el territorio
  - los límites
  lexicon: LSJ
  rationale: Aquí el griego funciona de modo geográfico y metonímico. «Las fronteras» conserva la idea de extensión territorial y enlaza bien con la segunda aparición de ὅρια en el mismo versículo.
- source_word: Κιλικίας
  english_pob_choice: Cilicia
  chosen_spanish: Cilicia
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre propio geográfico tradicional en español.
- source_word: κατέκοψε
  english_pob_choice: cut down
  chosen_spanish: abatió
  alternatives_spanish:
  - derribó
  - destruyó
  lexicon: LSJ
  rationale: «Abatió» conserva la violencia del verbo y sugiere derrota o matanza en contexto militar, sin sonar tan literal como «cortó abajo».
- source_word: πάντας τοὺς ἀντιστάντας αὐτῷ
  english_pob_choice: all who resisted him
  chosen_spanish: a todos los que le resistieron
  alternatives_spanish:
  - a todos los que se le opusieron
  - a todos los que se le enfrentaron
  lexicon: LSJ
  rationale: La construcción participial pide una forma que preserve la acción de resistencia. «Le resistieron» es directa, fiel y plenamente natural en español bíblico contemporáneo.
- source_word: ἦλθεν ἕως ὁρίων
  english_pob_choice: came as far as the borders
  chosen_spanish: llegó hasta las fronteras
  alternatives_spanish:
  - avanzó hasta los límites
  - alcanzó las fronteras
  lexicon: LSJ
  rationale: «Llegó hasta» reproduce el alcance del avance y evita sobreinterpretar la acción como conquista total.
- source_word: Ἰάφεθ
  english_pob_choice: Japheth
  chosen_spanish: Japhet
  alternatives_spanish:
  - Jafet
  - Japet
  lexicon: transliteración del testimonio griego
  rationale: El texto griego transmitido lee Ἰάφεθ; en español se preserva la forma transliterada cercana al griego, sin emendar el topónimo por una forma más familiar.
- source_word: τὰ πρὸς νότον
  english_pob_choice: to the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - en dirección al sur
  lexicon: LSJ
  rationale: «Al sur» es la equivalencia natural y concisa para la orientación geográfica indicada por la frase griega.
- source_word: κατὰ πρόσωπον τῆς Ἀραβίας
  english_pob_choice: opposite Arabia
  chosen_spanish: frente a Arabia
  alternatives_spanish:
  - opuesto a Arabia
  - de cara a Arabia
  lexicon: LSJ
  rationale: La locución idiomática se rinde con «frente a», que conserva la relación espacial sin forzar una paráfrasis excesiva.
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada del inglés POB al usar una orientación más natural para τὰ πρὸς νότον («al sur») y mantiene la preservación del topónimo transmitido en Ἰάφεθ sin emendarlo. También conserva el paralelismo geográfico de ὅρια en ambas apariciones, adaptándolo de modo idiomático al español.
  spanish_consistency_notes:
  - Se mantiene la distinción entre el primer ὅρια como extensión territorial («las fronteras de Cilicia») y el segundo como límite de avance («hasta las fronteras de Japhet»).
  - Se evita «SEÑOR» u otra terminología no presente en el versículo; no hay decisiones teológicas explícitas en este pasaje.
  - 'La secuencia verbal mantiene el tono narrativo bélico del griego: posesión territorial, aniquilación de resistencia y avance geográfico.'
