  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y la auditoría inglesa: mantiene la condición inicial («Si» por כִּי), el abandono pactual de Yahvé, el servicio a dioses extranjeros, el giro en la acción divina («él se volverá»), la agencia directa de Yahvé en el daño y la consumación/destrucción, y el contraste final con el bien previo que él les había hecho.'
  spanish_quality_summary: El español es natural, claro y digno. «Abandonan a Yahvé», «sirven a dioses extranjeros», «les hará daño» y «después de haberles hecho bien» suenan bien en español eclesial contemporáneo. «Se volverá» y «los consumirá» son algo literarios, pero siguen siendo comprensibles y adecuados al tono solemne del pasaje.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה = «Yahvé»; אֱלֹהֵי נֵכָר = «dioses extranjeros»; no se suaviza la agencia divina en el juicio. Las notas léxicas preservan alternativas pertinentes («dioses ajenos», «los destruirá»).'
