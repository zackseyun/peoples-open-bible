base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/019.yaml
  text: Then the king said to Ittai the Gittite[a], “Why are you also going with us? Return and stay with the king[c][b], for you are a foreigner and also an exile from your own place.”
  footnotes:
  - marker: a
    text: Or 'Why will you also go with us?'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'stay with the king' may refer to remaining under the reigning royal authority in Jerusalem; the Hebrew does not explicitly name the referent.
    reason: alternative_reading
  - marker: c
    text: Or 'and also an exile to your place.' The Hebrew wording is compressed and may emphasize Ittai's displaced status and his connection to his own homeland/place.
    reason: lexical_alternative
