translation:
  language: es
  text: Un amigo pelea con un extraño[a] por una cosa buena[b], y contra ciudades tomará un escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece otra lectura significativa: «un compañero sufre con un amigo por causa de su estómago, y frente a la guerra tomará un escudo». El texto principal sigue el testimonio hebreo, pero la diferencia con el griego se conserva como alternativa importante.'
    reason: alternative_reading
  - marker: b
    text: En el hebreo, טוב puede significar también «beneficio» o «ventaja»; por eso la frase queda abierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוהב
  english_pob_choice: a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - uno que ama
  - un amante
  - un compañero
  lexicon: HALOT
  rationale: En contexto sapiencial, el participio funciona como sustantivo para una relación de amistad o compañía; «amigo» es natural en español y conserva esa función substantiva.
- source_word: טוב
  english_pob_choice: a good thing
  chosen_spanish: una cosa buena
  alternatives_spanish:
  - un bien
  - un beneficio
  - una ventaja
  lexicon: HALOT
  rationale: El hebreo es breve y no explicita objeto; «una cosa buena» mantiene la amplitud semántica de טוב y permite la posible idea de beneficio sin cerrarla demasiado.
- source_word: נלחם עם זר
  english_pob_choice: fights with a stranger
  chosen_spanish: pelea con un extraño
  alternatives_spanish:
  - contiende con un extraño
  - pelea contra un extraño
  - lucha con un forastero
  lexicon: HALOT
  rationale: «Pelear» expresa bien el conflicto sin sobreinterpretar la preposición; «extraño» conserva el valor amplio de alguien ajeno al círculo propio.
- source_word: זר
  english_pob_choice: stranger
  chosen_spanish: extraño
  alternatives_spanish:
  - forastero
  - outsider
  - desconocido
  lexicon: HALOT
  rationale: «Extraño» en español cubre la idea de alguien ajeno o no perteneciente al grupo, sin restringir innecesariamente a nacionalidad o etnia.
- source_word: נגד ערים
  english_pob_choice: against cities
  chosen_spanish: contra ciudades
  alternatives_spanish:
  - frente a ciudades
  - ante ciudades
  - en contra de ciudades
  lexicon: HALOT
  rationale: «Contra ciudades» sigue de cerca el valor confrontativo de נגד y suena natural en español, manteniendo la dificultad del miembro hebreo sin suavizarla.
- source_word: יחזיק צנה
  english_pob_choice: he will take up a shield
  chosen_spanish: levantará un escudo
  alternatives_spanish:
  - tomará un escudo
  - empuñará un escudo
  - sostendrá un escudo
  lexicon: HALOT
  rationale: El verbo hebreo de agarrar/sujetar describe armarse; «levantará un escudo» es idiomático en español y refleja la acción de prepararse para la guerra.
- source_word: צנה
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  - protector
  - escudo grande
  lexicon: HALOT
  rationale: «Escudo» es la equivalencia clara y común en español; evita arcaísmos y no añade precisión no documentada sobre el tamaño.
translation_notes:
  revision_awareness: 'Se tomó como base el testimonio hebreo de Sirácida 37:5, siguiendo la línea del POB en inglés: el primer miembro permanece con el sentido de amistad y conflicto sobre algo bueno, y el segundo conserva la imagen militar de enfrentar ciudades con un escudo. Se retuvo la alternativa griega en nota porque representa una divergencia textual importante en el primer miembro y en el referente bélico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino esté presente; aquí no aplica.
  - Se evitó «SEÑOR» y se mantuvo el registro sapiencial con español claro y sobrio.
  - «Extraño» se usa en sentido de ajeno, no de raro.
  - La nota [a] corresponde al valor léxico de טוב; la nota [b] marca la variante griega significativa, como en el audit trail inglés.
