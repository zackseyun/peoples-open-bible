id: 1TH.3.6
reference: 1 Thessalonians 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἄρτι δὲ ἐλθόντος Τιμοθέου πρὸς ἡμᾶς ἀφ’ ὑμῶν καὶ εὐαγγελισαμένου ἡμῖν τὴν πίστιν καὶ τὴν ἀγάπην ὑμῶν, καὶ ὅτι ἔχετε μνείαν ἡμῶν ἀγαθὴν πάντοτε ἐπιποθοῦντες ἡμᾶς ἰδεῖν καθάπερ καὶ ἡμεῖς ὑμᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/006.yaml
  text: But now that Timothy has come to us from you and has brought us the good news of your faith and love[a], and that you always have a good remembrance of us, longing to see us just as we also long to see you,
  footnotes:
  - marker: a
    text: Or "your faithfulness." The Greek word pistis can denote faith, trust, or faithfulness; the main text follows the project's default rendering "faith."
    reason: alternative_reading
translation:
  language: ko
  text: 그런데 이제 디모데가 여러분에게서 우리에게 돌아와, 여러분의 믿음[a]과 사랑의 좋은 소식을 우리에게 전해 주었습니다. 또한 여러분이 늘 우리를 좋게 기억하고 있고, 우리가 여러분을 보고자 갈망하는 것처럼 여러분도 우리를 보고자 갈망한다는 것도 전해 주었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 신실함」. 헬라어 πίστις는 믿음·신뢰·신실함을 함께 담는다. 본문은 본 번역의 기본값 「믿음」을 따른다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλθόντος Τιμοθέου πρὸς ἡμᾶς ἀφ’ ὑμῶν
  english_pob_choice: Timothy has come to us from you
  chosen_korean: 디모데가 여러분에게서 우리에게 돌아와
  alternatives_korean:
  - 디모데가 여러분으로부터 우리에게 와서
  - 디모데가 여러분에게서 우리에게 이르러
  lexicon: BDAG
  rationale: 부정과거 분사의 시간적 배경을 「~ 돌아와」로 자연스럽게 옮긴다.
- source_word: εὐαγγελισαμένου ... τὴν πίστιν καὶ τὴν ἀγάπην ὑμῶν
  english_pob_choice: brought us the good news of your faith and love
  chosen_korean: 여러분의 믿음과 사랑의 좋은 소식을 ... 전해 주었습니다
  alternatives_korean:
  - 여러분의 믿음과 사랑을 복음의 기쁜 소식처럼 전하였습니다
  - 여러분의 믿음과 사랑에 관한 좋은 소식을 알려주었습니다
  lexicon: BDAG
  rationale: εὐαγγελίζομαι가 본 절에서는 복음 선포가 아닌 「기쁜 소식 전함」의 일반 의미. 「좋은 소식을 전하다」가 자연스럽다.
- source_word: ἐπιποθοῦντες ἡμᾶς ἰδεῖν
  english_pob_choice: longing to see us
  chosen_korean: 우리를 보고자 갈망한다
  alternatives_korean:
  - 우리를 보기를 사모한다
  - 우리를 만나기를 그리워한다
  lexicon: BDAG
  rationale: ἐπιποθέω의 「깊이 갈망함」. 「갈망」이 가장 직접적이며 양측의 상호적 그리움을 잘 담는다.
