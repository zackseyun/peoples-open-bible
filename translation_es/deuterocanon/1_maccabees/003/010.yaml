    rationale: ἀπὸ Σαμαρίας expresa procedencia. En español bíblico-natural, 'de Samaria' suena más directo y menos espacial que 'desde Samaria'.
  - severity: low
    issue: '''hacer guerra'' suena incompleto sin artículo'
    rationale: La locución idiomática más natural es 'hacer la guerra'. También podría usarse 'combatir', pero 'hacer la guerra' preserva mejor el matiz de πολεμῆσαι.
