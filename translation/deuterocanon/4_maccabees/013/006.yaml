translation:
  text: For just as towers on harbor breakwaters[a], beating back the threats of the waves, provide a calm harbor for those sailing in,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harbor' for 'haven' at the end; Greek ὅρμον can denote a harbor, anchorage, or haven.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as indeed
  lexicon: LSJ
  rationale: Introduces an illustrative comparison with explanatory force; 'For just as' preserves both the comparative and connective sense in natural English.
- source_word: προβλῆτες λιμένων πύργοι
  chosen: towers on harbor breakwaters
  alternatives:
  - harbor-mole towers
  - towers of harbor breakwaters
  - towers jutting out from harbors
  lexicon: LSJ
  rationale: προβλῆτες are projecting structures such as moles or breakwaters; with λιμένων they describe harbor defenses. πύργοι is literally 'towers.' 'Towers on harbor breakwaters' is clear modern English while retaining the concrete maritime image.
- source_word: τὰς κυμάτων ἀπειλάς
  chosen: the threats of the waves
  alternatives:
  - the assaults of the waves
  - the menaces of the waves
  lexicon: LSJ
  rationale: ἀπειλή is literally 'threat'; the phrase is metaphorical for the dangerous force of surf. 'Threats of the waves' keeps the personified imagery rather than flattening it to mere physical impact.
- source_word: ἀνακόπτοντες
  chosen: by beating back
  alternatives:
  - checking
  - holding back
  - warding off
  lexicon: LSJ
  rationale: The participle conveys active repelling or driving back. 'By beating back' captures the vigorous defensive action and fits the maritime context.
- source_word: γαληνὸν παρέχουσιν
  chosen: provide a calm haven
  alternatives:
  - provide calm
  - make it calm
  - offer tranquility
  lexicon: LSJ
  rationale: γαληνός denotes calm, especially of the sea. Because the object is τὸν ὅρμον ('the harbor/haven'), English idiom is improved by expressing the result as 'a calm haven' rather than the less natural 'provide the harbor calm.'
- source_word: τοῖς εἰσπλέουσιν
  chosen: for those sailing in
  alternatives:
  - for those entering by ship
  - for those sailing into port
  lexicon: LSJ
  rationale: The present participle refers to mariners entering the harbor. 'Those sailing in' is concise and natural while preserving the nautical sense.
- source_word: τὸν ὅρμον
  chosen: haven
  alternatives:
  - harbor
  - anchorage
  lexicon: LSJ
  rationale: ὅρμος can mean harbor, anchorage, or haven. Since λιμένων already supplied 'harbor' earlier in the sentence, 'haven' avoids awkward repetition while preserving the sense of sheltered arrival.
