translation:
  language: es
  text: Las balanzas fraudulentas son abominación de Yahvé, pero la pesa completa[a] es su deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'una piedra completa'; es decir, una pesa patrón completa y exacta usada en el comercio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹאזְנֵי
  english_pob_choice: scales
  chosen_spanish: balanzas
  alternatives_spanish:
  - escales
  - pesas
  lexicon: HALOT
  rationale: El hebreo en construcción plural/dual se refiere al instrumento para pesar. En español, 'balanzas' mantiene la imagen comercial y suena natural y bíblico; 'pesas' podría confundirse con el objeto de peso, no con el aparato.
- source_word: מִרְמָה
  english_pob_choice: dishonest
  chosen_spanish: fraudulentas
  alternatives_spanish:
  - engañosas
  - deshonestas
  - tramposas
  lexicon: HALOT
  rationale: El sustantivo expresa engaño o fraude. Como modifica a 'balanzas', conviene un adjetivo en español; 'fraudulentas' conserva la fuerza moral y comercial del término mejor que una opción más suave.
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa detestable
  - algo abominable
  lexicon: HALOT
  rationale: La expresión hebrea es fuerte y técnica en sentido moral/covenantal. 'Abominación' conserva esa severidad y su correspondencia bíblica estable sin diluirla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La política terminológica del proyecto pide 'Yahvé' para el Tetragrámaton. Se preserva el nombre divino propio en lugar de sustituirlo por un título.
- source_word: אֶבֶן
  english_pob_choice: weight
  chosen_spanish: pesa
  alternatives_spanish:
  - peso
  - piedra
  - peso de balanza
  lexicon: HALOT
  rationale: En contexto comercial, 'stone' alude a una pesa patrón usada en la balanza. 'Pesa' comunica con claridad el objeto funcional sin perder el trasfondo material.
- source_word: שְׁלֵמָה
  english_pob_choice: full
  chosen_spanish: completa
  alternatives_spanish:
  - íntegra
  - entera
  - exacta
  lexicon: HALOT
  rationale: El adjetivo significa completa/íntegra. 'Completa' reproduce bien la idea de una medida sin falta, coherente con la nota inglesa 'a complete stone'.
- source_word: רְצוֹנוֹ
  english_pob_choice: his delight
  chosen_spanish: su deleite
  alternatives_spanish:
  - su favor
  - su complacencia
  lexicon: HALOT
  rationale: El paralelo con 'abominación' pide un término evaluativo personal. 'Deleite' mantiene el contraste y refleja bien el sentido de placer/aprobación divina.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa יְהוָה directamente. Según la norma del proyecto, se traduce con el nombre propio divino 'Yahvé', preservando la referencia personal del texto hebreo y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia y ningún cambio en la última revisión; por eso el borrador español sigue de cerca la decisión léxica establecida, manteniendo la equivalencia óptima sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se conservó el nombre divino como Yahvé, de acuerdo con la terminología del proyecto.
  - Se eligió 'balanzas' para מֹאזְנֵי por ser el equivalente natural en español y mantener la imagen comercial.
  - Se usó 'pesa completa' para reflejar la nota inglesa 'a complete stone' sin calcar de forma áspera.
  - El paralelismo antitético se mantiene con 'abominación' / 'deleite'.
