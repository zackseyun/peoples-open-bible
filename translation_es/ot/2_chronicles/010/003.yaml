review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: enviaron / llamaron / vino Jeroboam con todo Israel / hablaron a Roboam / diciendo. Conserva adecuadamente ''todo Israel'' y el valor discursivo de לֵאמֹר. Sin embargo, la nota al pie no preserva realmente la alternativa inglesa, porque repite la misma frase del texto principal en vez de ofrecer una alternativa distinta para la elipsis de וַיִּשְׁלְחוּ.'
  spanish_quality_summary: El español es claro y natural. No obstante, 'lo mandaron llamar' en el texto principal más una nota que también dice 'lo mandaron llamar' es redundante y defectuoso. Además, 'hablaron a Roboam' es comprensible, pero 'hablaron con Roboam' o 'le hablaron a Roboam' sonaría más natural; aun así, puede mantenerse para cercanía formal. El ajuste principal necesario es la nota léxica.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Los nombres propios, 'todo Israel' y la estructura narrativa están alineados con las decisiones de la POB. No hay conflicto con el glosario del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite el texto principal en vez de dar una alternativa léxica real.
    rationale: La POB inglesa documenta como alternativa 'they sent word and summoned him'. En español, la nota debería ofrecer algo como 'enviaron aviso y lo convocaron' o similar, no repetir 'lo mandaron llamar'.
  - severity: low
    issue: La formulación 'hablaron a Roboam' es menos idiomática en español actual.
    rationale: Aunque es aceptable por literalidad, en español más natural sería 'hablaron con Roboam' o 'le hablaron a Roboam'. No es un error de fidelidad, así que no exige cambio obligatorio.
  revised_spanish_text: 'Así que enviaron y lo mandaron llamar[a]; y Jeroboam y todo Israel vinieron y hablaron a Roboam, diciendo:'
  revised_footnotes:
  - marker: a
    text: 'O: «enviaron aviso y lo convocaron». El hebreo deja implícito el objeto de «enviaron».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y legible, pero se corrige la nota para que realmente preserve la alternativa léxica documentada en la auditoría inglesa y explique la elipsis hebrea sin redundancia.
