translation:
  language: es
  text: 'Y Moisés llamó a todo Israel y les dijo[a]: «Ustedes han visto todo lo que Yahvé hizo ante sus ojos en la tierra de Egipto, a Faraón, a todos sus siervos y a toda su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Faraón, contra todos sus siervos y contra toda su tierra». La preposición hebrea puede traducirse de manera más interpretativa en contexto para mostrar que las acciones de Yahvé en Egipto fueron actos de juicio contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa reunir o llamar a una asamblea. «Llamó» es natural en español y conserva la acción directa sin sobrerinterpretar solemnidad.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: Es una designación colectiva del pueblo del pacto. «Todo Israel» es la forma breve, idiomática y fiel en español.
- source_word: רְאִיתֶם
  english_pob_choice: you have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - ustedes vieron
  lexicon: HALOT
  rationale: El perfecto hebreo apunta a una experiencia ya cumplida con vigencia presente. En español, el pretérito perfecto compuesto comunica mejor esa relevancia actual que el pretérito simple.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma POB en español, «Yahvé», en vez de sustituirlo por un título. Esto mantiene la referencia al nombre propio del pacto.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  lexicon: HALOT
  rationale: La imagen idiomática se conserva de manera natural en español. «Ante sus ojos» expresa la visibilidad directa de lo ocurrido.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se retiene «tierra» porque está explícita en el hebreo y delimita formalmente el lugar de los hechos.
- source_word: לְפַרְעֹה וּלְכָל עֲבָדָיו וּלְכָל אַרְצוֹ
  english_pob_choice: to Pharaoh and to all his servants and to all his land
  chosen_spanish: contra Faraón, contra todos sus siervos y contra toda su tierra
  alternatives_spanish:
  - a Faraón, a todos sus siervos y a toda su tierra
  - para Faraón, para todos sus siervos y para toda su tierra
  lexicon: HALOT
  rationale: 'La preposición hebrea admite una lectura más interpretativa según el contexto: las acciones de Yahvé en Egipto son actos de juicio dirigidos contra ellos. «Contra» comunica esa fuerza contextual sin perder la base léxica.'
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: En este contexto egipcio, el término puede abarcar cortesanos o subordinados del faraón. «Siervos» conserva una amplitud semántica algo más cercana al español bíblico y evita introducir con demasiada fuerza la esclavitud si no es imprescindible aquí.
theological_decisions:
- issue: Valor contextual de la preposición ל en la serie final
  english_pob_reading: to Pharaoh and to all his servants and to all his land
  chosen_spanish_reading: contra Faraón, contra todos sus siervos y contra toda su tierra
  alternative_spanish_readings:
  - a Faraón, a todos sus siervos y a toda su tierra
  - para Faraón, para todos sus siervos y para toda su tierra
  rationale: La POB inglesa preserva la literalidad con una nota que reconoce la lectura contextual de juicio. En español, «contra» expresa con claridad que los actos de Yahvé fueron adversos y judiciales, sin negar que el hebreo usa una preposición más general.
  doctrine_reference: Deu 29:1; nota de alternativa lexical basada en el valor contextual de ל
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la política del proyecto para el Tetragrámaton en español, preservando el nombre propio divino en vez de una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: Se revisó la nota al pie para asegurar que el marcador [a] aparezca en el texto principal. La redacción española sigue de cerca el hebreo y la auditoría inglesa, pero usa la lectura contextual «contra» conforme a la nota permitida.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Siervos» se mantiene en la serie final porque el contexto no exige «esclavos» y el español bíblico lo hace natural.
  - La puntuación de cita y el uso de comillas angulares siguen la norma editorial en español.
