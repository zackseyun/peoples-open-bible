translation:
  language: es
  text: Pero si la erupción escamosa[a] realmente se extiende en la piel después de su purificación,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tiña»; el hebreo נֶתֶק se refiere a una afección cutánea particular descrita en este capítulo, probablemente con descamación y pérdida de cabello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La combinación condicional introduce un caso contrario dentro del procedimiento; en español, «Pero si» comunica mejor ese giro que un simple «Y si», sin perder la condición.
- source_word: פָּשֹׂה יִפְשֶׂה
  english_pob_choice: does indeed spread
  chosen_spanish: se extiende de veras
  alternatives_spanish:
  - se extiende
  - sigue extendiéndose
  - se extiende ciertamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito aporta énfasis. «De veras» preserva esa fuerza enfática en un español natural, sin volverlo demasiado explicativo.
- source_word: הַנֶּתֶק
  english_pob_choice: the scaly eruption
  chosen_spanish: la tiña
  alternatives_spanish:
  - la erupción escamosa
  - la afección descamativa
  - la llaga escamosa
  lexicon: HALOT
  rationale: El término hebreo designa una afección cutánea concreta tratada en este capítulo, asociada con descamación y caída del cabello. «Tiña» es un equivalente médico común en español que puede comunicar una lesión visible de la piel; se mantiene la nota porque el término original es más amplio y técnico que la etiqueta española.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  - en la carne
  lexicon: HALOT
  rationale: «Piel» reproduce de manera natural el campo semántico de עוֹר en este contexto y es más claro que «carne», que aquí sería menos preciso.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Valor temporal estándar en esta ley ritual.
- source_word: טָהֳרָתוֹ
  english_pob_choice: his cleansing
  chosen_spanish: su purificación
  alternatives_spanish:
  - su limpieza
  - su purificación ritual
  - su declaración de limpio
  lexicon: HALOT
  rationale: En contexto ritual, el sustantivo apunta al proceso o estado de quedar limpio; «purificación» conserva la referencia ritual sin reducirla a higiene física. «Su» evita una perífrasis interpretativa excesiva.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que reforzó el matiz intensivo del hebreo (infinitivo absoluto + verbo finito). Por eso se traduce con un adverbio enfático («de veras») en lugar de una simple repetición o de un verbo neutro.
  spanish_consistency_notes:
  - Se mantiene el registro legal-ritual sobrio y claro.
  - «Purificación» se usa en sentido ritual, no moral.
  - La nota de pie de página preserva la tensión lexical del término hebreo sin sobrecargar el texto principal.
