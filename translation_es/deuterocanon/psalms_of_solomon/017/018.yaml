translation:
  language: es
  text: Los que amaban las asambleas[a] de los santos[b] huyeron de ellas; como gorriones, se fueron volando de su lugar de descanso[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reuniones» o «sinagogas» para «asambleas».
    reason: lexical_alternative
  - marker: b
    text: O «los piadosos» o «los consagrados» para «los santos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente «lecho» o «lugar de reposo»; aquí se usa «lugar de descanso» por la imagen de los gorriones.
    reason: lexical_alternative
  - marker: d
    text: O «volaron fuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγοσαν
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se alejaron apresuradamente
  lexicon: BDAG
  rationale: El aoristo de φεύγω expresa una huida puntual y completa; «huyeron» conserva ese valor narrativo sin añadir matices inexistentes.
- source_word: οἱ ἀγαπῶντες
  english_pob_choice: those who loved
  chosen_spanish: los que amaban
  alternatives_spanish:
  - los que amaron
  - los que querían
  lexicon: BDAG
  rationale: El participio sustantivado se vuelve natural en español con una relativa; «amaban» preserva la cualidad habitual o característica del grupo.
- source_word: συναγωγὰς
  english_pob_choice: assemblies
  chosen_spanish: asambleas
  alternatives_spanish:
  - reuniones
  - sinagogas
  lexicon: BDAG
  rationale: «Asambleas» mantiene el sentido de reunión congregada sin importar una institución judía específica en el español principal; reproduce bien la opción contextual de la POB inglesa.
- source_word: ὁσίων
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos piadosos
  - los devotos
  lexicon: BDAG
  rationale: Aunque «santos» es una equivalencia tradicional, aquí conserva el valor de personas marcadas por santidad/piedad y resulta idiomático en español. Mantiene la tensión entre una traducción más literal («los santos») y el matiz de ὅσιος sin sobreexplicar.
- source_word: στρουθία
  english_pob_choice: sparrows
  chosen_spanish: gorriones
  alternatives_spanish:
  - aves pequeñas
  - pájaros
  lexicon: LSJ
  rationale: «Gorriones» comunica la imagen aviar con naturalidad en español y corresponde al referente común de στρουθία, como en la traducción inglesa 'sparrows'.
- source_word: ἐξεπετάσθησαν
  english_pob_choice: flew away
  chosen_spanish: volaron lejos
  alternatives_spanish:
  - salieron volando
  - volaron fuera
  lexicon: LSJ
  rationale: La forma griega funciona como aoristo pasivo con sentido de vuelo hacia afuera/alejamiento; «volaron lejos» preserva la acción aviar activa señalada por la revisión inglesa y no introduce una pasiva falsa.
- source_word: κοίτης
  english_pob_choice: resting place
  chosen_spanish: lugar de descanso
  alternatives_spanish:
  - nido
  - lecho
  lexicon: LSJ
  rationale: κοίτη significa literalmente «lecho»/«lugar de reposo», pero en el símil con gorriones el español «lugar de descanso» reproduce con claridad el sentido contextual sin forzar «nido».
theological_decisions:
- issue: ὁσίων como grupo de los piadosos/santos
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los piadosos
  - los devotos
  rationale: Se conserva la referencia a un grupo definido por santidad/piedad, evitando una lectura eclesiástica posterior más pesada que «santos» puede tener en algunos contextos, pero manteniendo la transparencia del término de base.
  doctrine_reference: Santificación y pertenencia del pueblo fiel; no se introduce una afirmación doctrinal adicional fuera del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'were driven' a 'flew away' al corregir la voz y el valor verbal de ἐξεπετάσθησαν; también revisó κοίτης de 'nest' a 'resting place'. La propuesta española sigue esa revisión, evita una pasiva indebida y conserva la imagen de vuelo con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita «sinagoga» en el texto principal porque el contexto admite una referencia más general a asambleas.
  - «Santos» se usa por economía y fidelidad al grupo designado por ὁσίων; la nota ofrece alternativas semánticas más explícitas.
  - «Lugar de descanso» equilibra literalidad y claridad, en línea con la revisión inglesa que abandonó 'nest'.
